id: vn
name: Socialist Republic of Vietnam
short_name: Vietnam
summary: |
  Vietnam runs a state-aligned cyber program small in headcount
  but distinctive in tasking mix. Three threads dominate: (a)
  commercial IP collection focused on the automotive and aerospace
  sectors that the Communist Party of Vietnam has flagged as
  strategic for indigenous industrial upgrading; (b) ASEAN /
  Cambodian / Laotian political-intelligence collection in service
  of Hanoi's regional posture; and (c) heavy domestic and
  diaspora dissident surveillance, the latter regularly executed
  through the OceanLotus / APT32 cluster against Vietnamese-language
  journalists, NGOs, and opposition figures abroad.

  Doctrinal anchors are the Politburo's Resolution 29-NQ/TW (2018)
  on cybersecurity tasks under the 12th Party Congress, the
  Cybersecurity Law of 2018 (effective 2019), and successive
  national cyberspace strategies under the Ministry of Information
  and Communications. Cyber tasking is run primarily from the
  General Department II / Military Intelligence (TC2) of the
  People's Army of Vietnam and the Ministry of Public Security
  (Bộ Công an) cyber units (A05). Vietnamese state-aligned
  activity is well-attested by Western vendor reporting (FireEye /
  Mandiant, ESET, Volexity, Amnesty International) but rarely by
  US government primary-source attestation — there has been no
  DOJ-style indictment of Vietnamese officers as of 2026.
