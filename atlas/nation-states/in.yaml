id: in
name: Republic of India
short_name: India
summary: |
  India runs a multi-service cyber program straddling state and
  contractor lanes, with offensive collection oriented to two
  theaters: (a) the Pakistan-Afghanistan-China arc, focused on
  military, foreign-ministry, and counterterrorism collection;
  and (b) domestic political and corporate intelligence, much of
  which has migrated into a well-developed mercenary
  hack-for-hire ecosystem exposed in successive disclosures
  (Citizen Lab's "Dark Basin" 2020 naming BellTroX; Reuters
  2023 naming Appin Security).

  State doctrinal anchors are the National Cyber Security Policy
  2013 (the only published cyber-strategic text), the (drafted
  but as of 2026 unpublished) National Cybersecurity Strategy
  shepherded by the NCIIPC and the NSCS, the Defence Cyber Agency
  (DCyA) stand-up in 2018 under HQ Integrated Defence Staff, and
  the post-2020 Aatmanirbhar Bharat / self-reliance and
  Indo-Pacific Quad-aligned posture. Indian state-aligned
  clusters (SideWinder, Patchwork, DoNot Team) are well-attested
  in Western vendor reporting but have not been the subject of
  US-government primary-source attribution analogous to PRC or
  DPRK indictments.
