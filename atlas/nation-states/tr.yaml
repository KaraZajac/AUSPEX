id: tr
name: Republic of Türkiye
short_name: Türkiye
summary: |
  Türkiye runs a state-aligned cyber program oriented to three
  principal lines of effort: (a) diaspora and opposition
  surveillance against Gülenist (Hizmet) movement targets,
  Kurdish (PKK / PYD / HDP-aligned) diaspora figures, and
  Turkish journalists in exile; (b) regional political-intelligence
  collection across Greece, Cyprus, the Eastern Mediterranean
  energy theater, the Caucasus (Armenia-Azerbaijan), and
  Iraq / Syria; and (c) the distinctive DNS-hijacking operational
  pattern documented in the Sea Turtle / MARBLED DUST cluster,
  exposed by Cisco Talos and ICANN in 2019.

  Doctrinal anchors are Mavi Vatan (Blue Homeland), the maritime
  doctrine articulated by Adm. (ret.) Cem Gürdeniz that became
  formal Turkish strategic framing under the Erdoğan government
  in 2019; the National Cyber Security Strategy and Action Plan
  cycles (2013–2014, 2016–2019, 2020–2023, 2024–2028) published
  by the Ministry of Transport and Infrastructure; the
  Millî İstihbarat Teşkilatı (MIT — National Intelligence
  Organization) post-2014 reorganization that expanded foreign-
  operations authority; and the post-2016 coup attempt
  counter-Gülen / counter-FETÖ posture that reorganized
  intelligence tasking.
