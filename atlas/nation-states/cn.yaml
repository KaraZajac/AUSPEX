id: cn
name: People's Republic of China
short_name: China
summary: |
  Largest state-sponsored cyber program by volume, multi-service
  (MSS, MPS, PLA SSF / Cyberspace Force, contractor ecosystem
  surfaced by the 2024 i-SOON leak). Strategic posture is
  doctrine-rich and publicly documented: Made in China 2025
  (2015), Military-Civil Fusion (formalized 2014, Central
  Commission 2017), the 14th and 15th Five-Year Plans, China
  Standards 2035, the Belt and Road / Digital Silk Road, plus
  the 2017 National Intelligence Law that codifies private-sector
  cooperation with state intelligence collection.

  Cyber operations cluster heavily around (a) economic-strategic
  IP collection aligned to MIC2025 sectors, (b) Taiwan-related
  pre-positioning in adversary critical infrastructure (Volt /
  Salt Typhoon), and (c) PLA SSF military intelligence collection.
