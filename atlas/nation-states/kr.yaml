id: kr
name: Republic of Korea
short_name: South Korea
summary: |
  Mature, doctrinally published, defensively-oriented cyber program
  shaped by a permanent armistice posture against the DPRK and an
  alliance integration with the United States dating to the 1953
  Mutual Defense Treaty. Four civilian/military pillars: the National
  Intelligence Service (NIS, foreign and counter-intelligence with a
  dedicated Cyber Security Center coordinating state cyber defense),
  the Korea Internet & Security Agency (KISA, the public-facing
  defensive coordinator hosting KrCERT/CC), the ROK Cyber Operations
  Command (COC, military cyber subordinate to the Ministry of
  National Defense, established 2010 as Cyber Command), and the
  Defense Counterintelligence Command (DCC, formerly Defense Security
  Command / Defense Security Support Command, military counter-intel).

  Doctrinal posture is comparatively well published for an East
  Asian state. The April 2019 National Cybersecurity Strategy
  (Cheong Wa Dae / National Security Office, Moon administration)
  was the first explicit national-level strategy and codified six
  strategic tasks centred on critical-infrastructure protection,
  counter-cybercrime, defense capability, and trust-based ecosystem
  development. The NIS counter-DPRK doctrine pre-dates explicit
  publication and runs through successive administrations as a
  standing posture. The KORUS Combined Cyber Cooperation Framework
  (long-running bilateral upgraded at the August 2023 Camp David
  trilateral with Japan) defines the alliance integration leg.

  Distinctive editorial problem: South Korean offensive-cyber
  attribution in the public record is extremely thin. Most NIS
  operational cyber and COC activity is classified; AUSPEX records
  one well-documented domestic-politics misuse case (the NIS
  Psychological Warfare Bureau's 2012 presidential-election
  interference, indicted 2013 and adjudicated through the Korean
  courts to Won Sei-hoon's 2017 conviction) and otherwise treats
  the SK posture as predominantly defensive. KISA / KrCERT and
  the NIS are recurring co-publishers of joint advisories with
  CISA, FBI, NCSC-UK, and BfV on DPRK threat clusters
  (Kimsuky, Lazarus / Andariel, TraderTraitor).

  The 2012 NIS election-interference event is included not as
  offensive cyber abroad but as a *doctrine-codified case of
  cyber misuse for domestic politics* — framed neutrally per
  AUSPEX editorial policy.
