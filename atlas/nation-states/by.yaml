id: by
name: Republic of Belarus
short_name: Belarus
summary: |
  Belarus runs a small state-aligned cyber program oriented to
  three lines of effort: (a) domestic surveillance and regime-
  stability operations against the post-2020-election opposition
  and Belarusian civil society; (b) operational support to
  Russia's Ukraine theater under the Union State framework, with
  Belarusian-aligned clusters increasingly visible in Ukraine-
  targeting tasking since 2022; and (c) limited but distinctive
  diplomatic-surveillance operations via Belarusian internet
  infrastructure (the MoustachedBouncer ISP-position cluster
  ESET disclosed in 2023).

  Doctrinal anchors are the Concept of Information Security
  approved by the Security Council in March 2019, the deepening
  Union State integration with Russia (the 2021 union-treaty
  cycle), and the post-August 2020 election repression regime.
  Cyber tasking runs through the KGB (Committee for State
  Security — Belarus retained the Soviet-era name), GUBOPiK (the
  Main Directorate for Combating Organized Crime and Corruption,
  with cyber elements), and military cyber under the Ministry of
  Defense. The Belarusian opposition's Cyber Partisans group
  is an operational counterweight noted in this dossier for
  context.
