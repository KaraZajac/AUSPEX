id: fr
name: French Republic
short_name: France
summary: |
  France runs one of the more mature Western European state cyber
  programs, structurally divided between a foreign-intelligence pole
  (DGSE — Direction Générale de la Sécurité Extérieure, including
  the Technical Directorate's SIGINT / CNE mandate), a domestic
  counter-espionage and counter-terror pole (DGSI — Direction
  Générale de la Sécurité Intérieure), a published defensive
  authority (ANSSI — Agence nationale de la sécurité des systèmes
  d'information, est. 2009, with its CERT-FR sub-component), and
  a military cyber command (COMCYBER — Commandement de la
  Cyberdéfense, est. 2017 under the Chief of the Defence Staff).

  Doctrinal posture is unusually well-published for a Western
  offensive-cyber state: the Revue stratégique de cyberdéfense
  (February 2018, SGDSN) frames the integrated defensive /
  resilience posture; the Lutte Informatique Offensive (LIO)
  doctrine announced by Defence Minister Florence Parly in
  January 2019 publicly acknowledged that France conducts
  offensive cyber operations as a legitimate military instrument
  — a posture few Western states have stated so directly. The
  Lutte Informatique Défensive (LID) doctrine codifies ANSSI /
  COMCYBER defensive division of labor; the Lutte Informatique
  d'Influence (LII) doctrine published by the Armed Forces
  Ministry in October 2021 publicly committed France to
  information-warfare operations including active counter-
  disinformation. LPM 2024-2030 (Loi de Programmation Militaire)
  extends cyber funding through the decade.

  Distinctive editorial problem: French offensive cyber operations
  have been publicly attributed almost exclusively through vendor
  research and Le Monde investigation. The Animal Farm tooling
  family (Babar, Casper, Bunny, Dino, NBot, EvilBunny, Snowglobe /
  SNOWBALL / Snowman) was disclosed in 2014-2015 by ESET, G Data,
  Cyphort (Marion Marschalek), and Kaspersky, and pieced back to
  French government tasking via the 2014 Le Monde report drawing
  on Communications Security Establishment Canada slides leaked
  by Snowden. France has never formally acknowledged any of the
  Animal Farm operations as French. AUSPEX records vendor and
  Le Monde attribution as the editorial baseline and flags the
  absence of French government attestation.
