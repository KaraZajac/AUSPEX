id: ir
name: Islamic Republic of Iran
short_name: Iran
summary: |
  Dual-service program: IRGC (and its Intelligence Organization,
  IRGC-IO) and the Ministry of Intelligence and Security (MOIS).
  Quds Force directs regional / proxy cyber tasking. A distinctive
  contractor ecosystem (Najee Technology, Afkar System, Rana
  Intelligence Computing, Emennet Pasargad) executes work on
  behalf of state services, with a thinner OFAC paper trail than
  the PRC equivalents.

  No published Iranian cyber doctrine document exists; strategic
  posture must be inferred from constitutional role of the IRGC,
  the Supreme Leader's "Year of..." economic-priority designations,
  and stated regional-policy doctrines (Forward Defense, the
  Axis of Resistance). Cyber serves as deniable retaliation
  (hacktivist fronts such as CyberAv3ngers, HomeLand Justice,
  Moses Staff) and as asymmetric pressure on adversaries.
