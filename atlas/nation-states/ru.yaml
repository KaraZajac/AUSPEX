id: ru
name: Russian Federation
short_name: Russia
summary: |
  Mature, multi-service cyber program: GRU (sabotage and influence,
  notably Units 74455 / Sandworm and 26165 / Fancy Bear), FSB
  (espionage and infrastructure access, Centers 16 and 18), SVR
  (strategic espionage, APT29). Distinguished from peers by
  willingness to conduct destructive operations against civilian
  infrastructure (Ukraine power grid 2015/16, NotPetya 2017,
  Viasat 2022) and by the use of a criminal-proxy buffer layer
  (Conti / TrickBot, Killnet, NoName057(16)) for plausibly
  deniable activity.

  Doctrinal posture published openly: Foreign Policy Concept 2023,
  Information Security Doctrine 2016, National Security Strategy
  2021, Military Doctrine 2014. The "Gerasimov doctrine" label is
  a Western mistranslation Galeotti retracted; treat it as a
  framework, not formal doctrine.
