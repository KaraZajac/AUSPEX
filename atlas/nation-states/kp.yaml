id: kp
name: Democratic People's Republic of Korea
short_name: North Korea
summary: |
  Cyber program runs under the Reconnaissance General Bureau (RGB)
  with subordinate Bureau 121, Lab 110, and the financial Office
  39 ecosystem. Distinctive in two ways: (1) cyber is the regime's
  primary asymmetric force-projection AND primary hard-currency
  revenue mechanism — UN Panel of Experts and Chainalysis have
  quantified crypto-theft funding of the WMD/missile program in
  the hundreds of millions to billions per year; (2) the "DPRK IT
  worker" fraud ecosystem extends cyber operations into civilian
  remote employment, generating revenue and creating insider
  access at western firms (Treasury sb0416, May 2024).

  Doctrinal context: Juche (self-reliance), Songun (military-first,
  de-emphasized since 2021), Byungjin (parallel nuclear+economic,
  formally completed 2018), and the 8th Party Congress 2021–2025
  Five-Year Defense Plan with its 13 enumerated weapon systems.

  Data-availability caveat: the UN Panel of Experts mandate ended
  April 2024 after Russia veto, degrading the independent
  monitoring baseline; the MSMT replacement is limited.
