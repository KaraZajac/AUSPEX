id: us
name: United States of America
short_name: USA
summary: |
  Structurally asymmetric from the four adversaries above: cyber
  *doctrine* is published in detail (National Cybersecurity
  Strategy 2023 and successor 2026 Trump Cyber Strategy, DoD Cyber
  Strategy 2023, "Defend Forward" / "Persistent Engagement",
  Hunt Forward), while *operations* are mostly classified with
  public knowledge coming from leaks (Snowden 2013, Shadow
  Brokers 2016–17, Vault 7 2017) and rare declassified cases
  (Olympic Games / Stuxnet, IRA disruption, KV-Botnet / Volt
  Typhoon takedown).

  Operating services: NSA TAO / Computer Network Operations
  (CNO), CIA's Center for Cyber Intelligence (Engineering
  Development Group), USCYBERCOM and its subordinate Cyber
  Mission Force (CMTs / CPTs / NMTs), and the integrated Joint
  Force HQ-DODIN posture. Title 10 (military) and Title 50
  (covert action / IC) authorities overlap; NSPM-13 (2018,
  classified) eased delegation of offensive operations to the
  SecDef.

  Editorial treatment: AUSPEX should record the published US
  doctrine in detail and treat US offensive operations with a
  consistent honesty about what is officially acknowledged vs
  journalistically reported vs leak-attributed.
