summary: |
  Lebanon's offensive cyber footprint in the atlas is, to date, a non-state
  one: the Hezbollah-affiliated cyber unit publicly tracked as Lebanese Cedar /
  Volatile Cedar (Check Point; ClearSky 2021), which collects against telecom,
  ISP, and hosting providers across the region and beyond. The unit is reported
  to operate under the direction of Iran's IRGC-Quds Force and to have been built
  with Iranian cyber-capability transfer (Iran International / The National
  Interest, 2022) — Lebanon is the HOST of the actor; the Iran / Quds-Force tie
  is a sponsorship nexus, not the placement. There is no published Lebanese state
  cyber doctrine; per AUSPEX's host-nation rule for proxy actors and MISP-galaxy's
  country=LB assignment for Volatile Cedar, the group is homed here.
