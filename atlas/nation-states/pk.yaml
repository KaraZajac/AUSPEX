id: pk
name: Islamic Republic of Pakistan
short_name: Pakistan
summary: |
  Pakistan's cyber program is small in headcount but operationally
  persistent, oriented almost exclusively to the India-facing
  theater with secondary collection against Afghan and Western
  diplomatic targets. Tasking is run primarily through the
  Inter-Services Intelligence (ISI) directorate of the military,
  with adjacent functions under the Strategic Plans Division (SPD)
  for nuclear-program security and the Ministry of Information
  Technology and Telecommunication for civilian internet
  governance.

  Doctrinal anchors are the National Cyber Security Policy 2021
  (Ministry of IT and Telecom; the first formally promulgated
  national cyber strategy), the asymmetric posture vs. India
  developed under the National Command Authority's Strategic
  Plans Division since the early 2000s, and Kashmir-conflict
  cyber operations that intensified after the August 2019 Indian
  abrogation of Article 370. Pakistani-aligned clusters
  (Transparent Tribe / APT36, SideCopy) are well-attested in
  Western and Indian vendor reporting but, like Indian-aligned
  clusters, have not been the subject of US-government indictments.
