id: il
name: State of Israel
short_name: Israel
summary: |
  Mature, technically dominant offensive cyber program embedded in a
  state for which strategic existential threat is policy-defining.
  Three civilian/military pillars: Mossad (foreign HUMINT + covert
  action, with internal cyber units), Aman / IDF Military Intelligence
  Directorate (parent of Unit 8200 SIGINT and Unit 81 technological
  R&D), and Shin Bet / Shabak (domestic security and counter-intel,
  with a substantial cyber wing). The 8200 / Unit 81 alumni pipeline
  also seeds the Israeli commercial cyber sector — including the
  commercial-spyware vendors NSO Group, Candiru, and Paragon — and
  much of the global offensive-tooling ecosystem.

  Doctrinal posture is partly published, partly inferred. The Begin
  Doctrine (1981 Osirak) is the load-bearing counter-WMD axiom and
  the doctrinal anchor for cyber-as-sabotage (Stuxnet, Flame, Duqu,
  Gauss). The Qualitative Military Edge is codified in US law as a
  bilateral commitment (Naval Vessel Transfer Act of 2008) but
  functions as Israeli doctrine for force-posture decisions. Counter-
  Iran and counter-Resistance-Axis postures are operational doctrine
  reaffirmed at successive escalation rungs: 2002 Iran nuclear file,
  2010 Stuxnet, 2018 US JCPOA withdrawal, 7 October 2023, the
  April / October 2024 IL-IR direct exchanges, and the June 2025
  Twelve-Day War.

  Distinctive editorial problem: Israeli offensive cyber operations
  are essentially never officially attested by the Israeli
  government. Predatory Sparrow / Gonjeshke Darande, Stuxnet, Flame,
  the Beirut pager / walkie-talkie operations of September 2024 —
  none has carried direct Israeli-government attribution at the
  time of operation. AUSPEX records vendor and journalistic
  attribution and flags the non-attestation explicitly.
