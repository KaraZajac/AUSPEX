id: uk
name: United Kingdom of Great Britain and Northern Ireland
short_name: UK
summary: |
  Mature, doctrinally published cyber program built on the UKUSA SIGINT
  partnership (1946) and a long institutional lineage from Bletchley
  Park. Three principal pillars: GCHQ (signals intelligence, defensive
  cyber via NCSC, and offensive cyber as the joint lead of the
  National Cyber Force), the Secret Intelligence Service / MI6
  (HUMINT with limited declared cyber role), and Defence Intelligence
  / Strategic Command (military cyber, with JFCC / Joint Forces Cyber
  Group historically and the National Cyber Force from 2020).

  Doctrinal posture is unusually well published for a Five Eyes
  partner. The National Cyber Security Strategy 2016 (£1.9bn programme)
  stood up the NCSC inside GCHQ in October 2016 and codified
  "defend, deter, develop" plus Active Cyber Defence. The National
  Cyber Strategy 2022 (December 2022) replaced it with five pillars
  (ecosystem, resilience, technology, global leadership, deter-disrupt-
  deny). The 2020 announcement of the National Cyber Force and the
  April 2023 "Responsible Cyber Power in Practice" paper from NCF made
  the UK the first state to publish an operational doctrine for
  offensive cyber activity, articulating the "doctrine of cognitive
  effect" and tests of accountability, precision, calibration, and
  legality.

  Operationally, UK offensive cyber is most publicly visible through
  the Snowden archive (Operation Socialist / Belgacom 2010–13, the
  Regin / WARRIORPRIDE platform with NSA, the TEMPORA bulk cable-tap
  programme, MUSCULAR / TURBULENCE / Cable & Wireless partnerships).
  Like Israel, the UK government rarely formally attests its own
  offensive operations at the time of operation; AUSPEX records the
  vendor/journalistic record and notes non-attestation explicitly.

  Defensive posture under NCSC is comparatively transparent: annual
  reports, the Active Cyber Defence Programme, and a steady cadence
  of joint advisories co-signed with CISA, FBI, NSA, ACSC, CCCS, and
  GCSB-NZ.
