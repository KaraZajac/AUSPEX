notes: |
  DPRK national-day pattern: missile tests, parade reveals of new
  systems, and Kim Jong Un policy speeches all cluster within 14 days
  of 9 September. Years 2017 and 2022 included nuclear-test threats;
  2023 and 2024 emphasized strategic-cruise-missile and tactical-
  nuclear displays. Concurrent RGB / Lazarus cyber-financial
