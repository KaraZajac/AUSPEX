summary: |
  8th Korean Workers' Party Congress concluded with the announcement
  of a 5-year defense plan (2021-2025) covering hypersonic missiles,
  tactical nuclear weapons, SSBN development, MIRV-capability, and
  reconnaissance satellites — explicitly framed as the resource
  requirement that domestic + cyber revenue must support. Direct
  doctrinal license for the post-2021 Lazarus crypto-theft wave that
  AUSPEX tracks (Ronin, Harmony, Atomic Wallet, DMM Bitcoin, Bybit).
