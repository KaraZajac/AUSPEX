id: kp/2017-09-03_dprk-sixth-nuclear-test
issued_by_state_id: kp
targets_state_ids: [kp]
action_type: weapons-test
date: 2017-09-03
summary: |
  DPRK conducted its sixth and most-powerful nuclear test (claimed
  thermonuclear, ~140-250 kt yield) at Punggye-ri. Triggered UNSC
  Resolution 2375 (September 11, 2017) — the most expansive UN
  sanctions package against DPRK to date, including a 30% petroleum-
  refinery cap. Doctrinal anchor for the byungjin pivot toward
  cyber-enabled sanctions evasion as primary revenue stream.
