notes: |
  KWP party congresses are doctrinal markers — the 8th Congress set
  explicit weapons-development objectives (tactical nuclear weapons,
  hypersonic glide vehicles, SLBMs, reconnaissance satellites) that
  drove the 2021-2025 testing cadence. The 9th Congress is the most
  important DPRK calendar event in the AUSPEX window. Expect Western/
  ROK/JP collection focus on succession positioning (Kim Ju Ae),
  Russia-DPRK military alignment language, and the next five-year
  defense plan. RGB cyber tasking against ROK MOU/MFA/think-tank
  Korea-watchers historically spikes 3-6 months pre-congress.
