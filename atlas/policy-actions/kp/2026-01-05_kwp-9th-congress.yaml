summary: |
  9th Congress of the Workers' Party of Korea — projected for 2026
  or early 2027 on the five-year cycle established by the 8th Congress
  (January 2021). Will close out the five-year economic and defense
  plans set in 2021 and announce the next plan cycle.
official_url: null
confidence: projected
sources:
