date: 2014-02-27
summary: |
  Russian "little green men" (unmarked Russian troops) seized the
  Crimean Parliament and key infrastructure, beginning the operation
  that formally annexed Crimea to the Russian Federation on
  2014-03-18 following a non-recognized referendum. The reference
  doctrinal pivot for Russian "hybrid warfare" (Gerasimov-doctrine
  era) and the Sandworm wave of BlackEnergy attacks against Ukrainian
  infrastructure (2015 onward) that flowed from this conflict.
