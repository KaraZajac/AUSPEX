summary: |
  Russian Federation launched a full-scale conventional invasion of
  Ukraine, preceded by hours by the GRU 74455 Viasat KA-SAT
  AcidRain wiper attack — the most documented case of synchronized
  kinetic + cyber operations to date. Functions as the master timeline
  anchor for the 2022+ Russian cyber-doctrine reset: pivot from
  pre-invasion strategic-disruption to wartime intelligence collection,
  infrastructure-targeting, hacktivist-as-front, and ransomware-FSB
  convergence. Most consequential geopolitical event AUSPEX tracks.
