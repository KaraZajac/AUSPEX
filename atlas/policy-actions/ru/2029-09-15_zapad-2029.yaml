notes: |
  Zapad cycles are the most-watched Russian exercise series by NATO.
  Pre-exercise period sees elevated NATO MSO, US EUCOM, and Polish
  / Baltic / Romanian national-cyber-defense tasking on RU MOD
  logistics movements. Russian GRU Sandworm / APT28 / Snake/Turla
  operations against Baltic and Polish government/telecom historically
  spike in the 60 days before each Zapad. Buffer of Belarusian
  forward-staging exercises typical in the May-August preceding window.
