summary: |
  Zapad 2029 — quadrennial Russian-Belarusian Western Military District
  strategic command exercise, expected September 2029 per cycle
  (Zapad 2013, 2017, 2021, 2025). Date placeholder. Will exercise
  Russian-Belarusian joint-defense scenarios on NATO border.
