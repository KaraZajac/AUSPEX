summary: |
  Vostok 2026 — quadrennial Russian Eastern Military District strategic-
  command exercise, expected late August or early September 2026 per
  the four-year cycle (Vostok 2014, 2018, 2022). Includes Chinese PLA
  participation in recent iterations (since 2018). Date placeholder.
