notes: |
  Vostok exercises historically generate elevated US/JP/ROK collection
  on Russia-PRC joint-operations tactical-fusion patterns, particularly
  air and naval coordination in the Sea of Japan and around the Kurils.
  Expect intensified RU GRU / SVR counter-intelligence against foreign
  diplomatic and journalist presence in Vladivostok and Khabarovsk
  pre-exercise. PRC participation level (post-Ukraine-war alignment)
  is a key indicator to track.
