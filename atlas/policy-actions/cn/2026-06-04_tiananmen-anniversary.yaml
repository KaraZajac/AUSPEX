summary: |
  37th anniversary of the 4 June 1989 PLA action against Tiananmen
  Square protesters. Topic remains heavily censored within China; the
  pre-anniversary window each year is the highest-intensity domestic
  cyber-control and overseas-dissident-surveillance period in the PRC
  calendar.
official_url: null
confidence: confirmed
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  MSS and MPS cyber tasking against overseas Chinese pro-democracy
  groups, Hong Kong diaspora figures, US/EU-based human-rights NGOs,
  and academic China-critics spikes in the May-June window each year.
  Documented patterns include APT31 (Zirconium / Judgment Panda) and
  APT41 targeting of Chinese-language activist networks and the
  Tibetan and Uyghur diasporas. Censorship-evasion VPN/proxy
  infrastructure also targeted.
