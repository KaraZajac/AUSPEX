summary: |
  29th anniversary of the Hong Kong handover from UK to PRC sovereignty
  (1 July 1997). Also CPC founding anniversary. PRC officials deliver
  major HK policy speeches; HK SAR government parades.
official_url: null
confidence: confirmed
sources:
