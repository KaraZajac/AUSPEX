notes: |
  Hong Kong handover anniversary is a Cantonese-diaspora and HK-civil-
  society surveillance window. Article 23 / National Security Law
  enforcement (since 2024) makes the period a sensitive cyber-control
  moment. Watch for SOSC and HK Police National Security Department
  cyber-collection against overseas HK activists. Doubles as CPC
  founding anniversary (national party-pride messaging).
