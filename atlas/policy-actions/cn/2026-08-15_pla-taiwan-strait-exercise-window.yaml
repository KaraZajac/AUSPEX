summary: |
  Projected PLA major Taiwan Strait exercise window — Aug-Oct 2026.
  Annual pattern since the August 2022 Pelosi-visit retaliation
  exercises has been increasing tempo of named PLA exercises (Joint
  Sword 2023, Joint Sword 2024A, Joint Sword 2024B) clustering in
  the late-summer / early-autumn window before PRC National Day and
  inter-leadership messaging anchors.
