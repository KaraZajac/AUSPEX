notes: |
  Window-style entry rather than point-date entry because exact
  exercise scheduling depends on Taiwan political signaling (Lai
  speeches, ROC defense reviews, US arms-sale announcements). Each
  named PLA exercise historically correlates with: increased PRC-
  attributed cyber probing of ROC government and CII, increased
  Taiwan-language disinformation amplification, and Taiwan Strait
  underseacable-incident concentration. Expect 1-2 major exercises
  in this window.
