summary: |
  20th CPC Central Committee Third Plenum communique (July 2024,
  delayed from typical autumn timing) — re-emphasized "new
  productive forces," self-reliance in core technologies, and the
  link between national security and tech-development. Direct
  doctrinal license for accelerated PRC cyber collection against
  semiconductor, biotech, and AI supply chains in 2024-2026.
