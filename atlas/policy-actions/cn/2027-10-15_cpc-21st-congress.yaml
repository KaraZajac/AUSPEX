summary: |
  21st National Congress of the Chinese Communist Party — second half
  of 2027 (date provisional, traditionally late October). Politburo
  Standing Committee reshuffle expected; first plausible window for
  Xi Jinping succession signaling. Coincides with Davidson Window
  endpoint for PLA Taiwan-action capability assessment.
official_url: null
