notes: |
  Critical anchor in the PRC strategic calendar. Pre-congress period
  (April-October 2027) historically the highest-intensity counter-
  intelligence window in PRC: Western collection on Politburo
  shortlist and faction realignment is a top-tier Five Eyes priority,
  while MSS counter-collection (against Chinese diaspora dissidents,
  former PSC family networks, Hong Kong democracy figures, Tibetan
  and Uyghur diaspora) intensifies. Watch for a PLA exercise window
  around late September - early October 2027 demonstrating Taiwan
  cross-strait capability ahead of the congress political messaging.
