action_type: political-transition
date: 2022-10-22
summary: |
  20th National Congress of the Communist Party of China — Xi Jinping
  secured an unprecedented third term as General Secretary; Politburo
  Standing Committee reshuffled to include only Xi loyalists. Work
  Report named Taiwan reunification and tech-self-reliance as core
  political tasks. Coincided with Volt Typhoon pre-positioning being
  in flight — doctrinal anchor for the more aggressive PRC posture
  on US CII (later disclosed May 2023).
