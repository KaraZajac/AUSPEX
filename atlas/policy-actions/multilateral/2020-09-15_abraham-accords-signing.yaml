date: 2020-09-15
summary: |
  Abraham Accords signed at the White House — UAE and Bahrain
  normalized diplomatic relations with Israel; Morocco and Sudan
  followed within months. Reordered the Gulf cyber-threat landscape:
  Iranian doctrine pivoted to treat Gulf normalizers as Resistance
  Axis adversaries, accelerating MOIS/IRGC cyber operations against
  UAE, Bahraini, and Saudi targets — the proximate driver of the
  2020-2023 Resistance Axis cyber wave.
