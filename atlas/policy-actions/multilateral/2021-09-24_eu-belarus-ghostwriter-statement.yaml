id: multilateral/2021-09-24_eu-belarus-ghostwriter-statement
issued_by_state_id: multilateral
targets_state_ids: [ru, by]
action_type: diplomatic-statement
date: 2021-09-24
summary: |
  EU HR/VP issued a joint declaration attributing the Ghostwriter
  influence operation (impersonating German politicians, planting
  fabricated NATO-Baltic stories) to Russian state actors — the first
  EU-level attribution of a Russian information operation as
  state-tasked. Set the precedent later applied to Doppelganger and
  the post-invasion Russia info-ops attribution track.
