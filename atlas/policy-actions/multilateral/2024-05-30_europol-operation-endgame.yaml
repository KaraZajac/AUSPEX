summary: |
  Europol-coordinated Operation Endgame — largest-ever international
  malware-takedown action, dismantling botnet infrastructure of
  IcedID, SystemBC, Pikabot, Smokeloader, Bumblebee, and TrickBot
  with 4 arrests, 16 location searches across multiple jurisdictions,
  and 100+ servers seized. Targeted the credential-and-loader
  ecosystem upstream of Russian ransomware operations.
