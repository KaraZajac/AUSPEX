notes: |
  Indonesia is the world's third-largest democracy and the largest
  Muslim-majority democracy. PRC influence operations targeting
  South China Sea positioning, US/Russia-aligned narratives, and
  Indonesian-language disinformation around Natuna and BRI all
  documented. Cyber-targeting tempo lower than Philippines or Taiwan
  but increasing.
