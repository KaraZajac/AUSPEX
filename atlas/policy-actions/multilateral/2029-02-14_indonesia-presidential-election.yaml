summary: |
  Indonesian general election — president, vice president, DPR, DPD,
  provincial and district legislatures. Date provisional (KPU
  traditionally sets second-Wednesday-of-February; 2024 was 14 Feb).
  Incumbent Prabowo Subianto term not term-limited but successor
  competition expected; inauguration 20 October 2029.
official_url: https://www.kpu.go.id/
confidence: scheduled
sources:
