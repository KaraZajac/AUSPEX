date: 2024-02-20
summary: |
  Operation Cronos — UK NCA-led international action seizing LockBit
  ransomware infrastructure, decryption keys, and victim-data archive,
  coordinated with US DOJ, Europol, and 10 other national partners.
  Most successful single-operation disruption of a Russian-aligned
  ransomware-as-a-service operation; LockBit had been the dominant
  ransomware brand 2022-2024.
