summary: |
  South African general election (National Assembly and provincial
  legislatures) — constitutional deadline mid-2029, conventionally
  late May. ANC-led GNU coalition with DA, IFP and minor parties
  defending against EFF, MK Party and DA. Date placeholder mirrors
  2024 election date.
official_url: https://www.elections.org.za/
confidence: projected
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  South Africa hosts G20 2025 and is a BRICS member with growing
  Russian and PRC alignment. Influence-operation interest comes from
  multiple directions (Russian Wagner-successor networks active in
  southern Africa; US-pro-democracy NGOs; Israeli-Palestinian conflict
  amplification). Cyber-targeting moderate; election-infrastructure
  intrusion risk noted by SITA after 2024 cycle.
