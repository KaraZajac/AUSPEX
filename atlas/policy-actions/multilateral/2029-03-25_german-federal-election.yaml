notes: |
  Germany is a top-tier Russian influence-operation and cyber target
  (Sandworm, APT28, Snake/Turla operations against Bundestag 2015,
  Doppelganger campaign ongoing). PRC industrial-espionage tempo also
  elevated. Expect both pre-election influence operations and
  post-election strategic-collection against new coalition formation
  documents.
