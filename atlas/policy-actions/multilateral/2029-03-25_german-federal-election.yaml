summary: |
  German federal election (Bundestag) — constitutional deadline 25 March
  2029; exact date set by Federal President. CDU-led Merz government
  (formed after 2025 snap election) seeking renewal vs SPD/Greens/AfD/
  Linke. AfD trajectory post-2025 makes this a high-stakes cycle.
