summary: |
  Games of the XXXIV Olympiad — Los Angeles, USA. ~10,500 athletes,
  ~206 NOCs, 35 sports. Largest sporting event on US soil since LA84.
  Followed by Paralympic Games 15-27 August 2028.
official_url: https://la28.org/
confidence: confirmed
sources:
