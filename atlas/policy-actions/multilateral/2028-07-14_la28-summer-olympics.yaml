notes: |
  Six-month cyber-targeting buildup expected: telecom (AT&T, Verizon,
  T-Mobile LA infrastructure), transportation (LA Metro, LAX, Port of
  LA), power (LADWP, SoCal Edison), broadcasters (NBCUniversal,
  international rights-holders), payment processing, ticketing
  (Ticketmaster post-2024-breach hardening), and the LA28 organizing
  committee itself. PRC pre-positioning posture (Volt Typhoon pattern
  in US CII) extends into Olympic-adjacent infrastructure. Iranian-
  aligned hacktivism (Cyber Av3ngers / Predatory Sparrow-imitator
  groups) historically targets sporting and entertainment events with
  Israeli participation. Russian-aligned operations contingent on
  Russia's IOC status at the time.
