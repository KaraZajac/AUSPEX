id: multilateral/2022-05-10_eu-viasat-russia-attribution
issued_by_state_id: multilateral
targets_state_ids: [ru]
action_type: diplomatic-statement
date: 2022-05-10
summary: |
  EU Council formally attributed the February 24, 2022 Viasat KA-SAT
  modem wiper attack (AcidRain malware) to the Russian Federation,
  coordinated with US, UK, Estonian, and Five Eyes statements. First
  multilateral attribution of a sabotage-class cyber operation
  conducted *as a kinetic-warfare adjunct* — the wiper hit at the
  moment of the invasion to degrade Ukrainian C2.
