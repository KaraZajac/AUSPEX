summary: |
  26th Shanghai Cooperation Organisation Council of Heads of State —
  Bishkek, Kyrgyzstan. Kyrgyz Republic holds 2025-2026 SCO
  chairmanship. Exact date not yet announced; placeholder set to
  early September matching SCO calendar conventions. Pakistan
  announced as 2027 chair.
official_url: https://eng.sectsco.org/
confidence: scheduled
sources:
  - sectsco/bishkek-2026
notes: |
  SCO summits are intelligence-collection priorities for Western
  services (US/UK/IN) on PRC-Russia tactical coordination, Central
  Asian leverage signals, and Iran SCO-observer-to-full-member
  trajectory. Host Kyrgyzstan has a relatively shallow cyber-defense
  posture; expect contestation between PRC and Russian-aligned
  services for collection access against delegations. Watch for
  India-Pakistan bilateral framing and any joint counter-terrorism
  language as actionable signals.
