summary: |
  Exercise Talisman Sabre 2027 — biennial Australia-led major
  multilateral exercise, expected mid-July to early August 2027 across
  northern and eastern Australia. Talisman Sabre 25 (July 2025)
  involved 35,000 personnel from 19 nations; TS27 expected to expand.
  Date placeholder per historical scheduling pattern.
