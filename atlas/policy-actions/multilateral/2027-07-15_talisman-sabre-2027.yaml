notes: |
  Talisman Sabre is a top-tier PRC PLA SSF cyber and SIGINT target
  given AUKUS dimension and demonstrated joint-fires integration with
  US Pacific Fleet and JMSDF. PRC Type 815 / 815G electronic-recon
  vessels (Tianwangxing, Dongdiao-class) have shadowed every TS
  since 2017. Expect cyber probing of ADF networks, BAE Systems
  Australia, Northrop Grumman Australia, and Defence Industry
  Security Office in the May-July 2027 pre-exercise window.
