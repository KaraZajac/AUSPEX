id: multilateral/2020-07-30_eu-first-cyber-sanctions
issued_by_state_id: multilateral
targets_state_ids: [cn, ru, kp]
action_type: sanction
date: 2020-07-30
summary: |
  EU Council imposed the first-ever EU cyber sanctions under
  Council Decision (CFSP) 2019/797 — six individuals (including
  Russian GRU 26165 officers from the OPCW close-access operation,
  and PRC nationals tied to Wuhan Xiaoruizhi / APT10) and three
  entities (Chosun Expo / DPRK, Tianjin Huaying Haitai / PRC, and
  the GRU Main Centre for Special Technologies / RU). Established
  the EU's standalone cyber-sanctions architecture parallel to OFAC.
official_url: https://www.consilium.europa.eu/en/press/press-releases/2020/07/30/
significance: high
