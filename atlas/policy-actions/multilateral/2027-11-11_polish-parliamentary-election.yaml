summary: |
  Polish parliamentary election (Sejm and Senate) must be held by
  11 November 2027 at the latest; exact date to be set by the
  President of Poland. Tusk-led coalition (KO/PSL/Lewica/Trzecia
  Droga) defending against PiS opposition.
official_url: https://pkw.gov.pl/
confidence: scheduled
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  Poland is a sustained Russian-aligned cyber and influence-operation
  target as a front-line NATO state hosting US troops, Ukraine
  logistics, and Patriot batteries. Documented GRU/Sandworm and FSB
  activity against Polish government, telecom, and media targets
  2022-2025. Expect intensification 6-9 months pre-election.
