date: 2015-07-14
summary: |
  Joint Comprehensive Plan of Action signed in Vienna by Iran and the
  P5+1 (US, UK, France, Russia, China, Germany) + EU. Iran agreed to
  limits on uranium enrichment and additional IAEA verification in
  exchange for relief from nuclear-related sanctions. Implementation
  Day was 2016-01-16. The deal that the 2018 US withdrawal would
  collapse, triggering the Iran-cyber escalation cycle AUSPEX
  documents.
