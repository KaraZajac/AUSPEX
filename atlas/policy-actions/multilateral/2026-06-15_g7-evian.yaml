summary: |
  52nd G7 Leaders' Summit — Évian-les-Bains, Haute-Savoie, France,
  15-17 June 2026. France holds 2026 G7 presidency. Member states:
  Canada, France, Germany, Italy, Japan, UK, US, plus EU. Agenda
  expected to cover Ukraine, Indo-Pacific, AI governance, economic
  security.
