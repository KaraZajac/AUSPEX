notes: |
  G7 summits historically attract heightened collection activity from
  RU SVR (foreign ministry / sherpa targeting), PRC MSS (industrial-
  policy and Indo-Pacific deliverable collection), and Iranian actors
  (sanctions-coordination intelligence). Operational tempo peaks 30-60
  days before summit on participating delegations' MFAs, prime
  ministers' offices, and policy think tanks. Host-country French
  ANSSI traditionally publishes post-event lessons-learned.
