notes: |
  Russian-aligned actors historically increase activity 60-90 days
  before Olympic Games (Sochi 2014 collection, PyeongChang 2018
  Olympic Destroyer wiper attributed to GRU 74455 / Sandworm,
  Tokyo 2021 phishing waves, Beijing 2022 IOC-targeted GRU
  reconnaissance). With Russia banned from Milan-Cortina under the
  post-Ukraine sanctions posture, retaliation-motivated GRU activity
  against Italian host infrastructure, IOC, broadcaster (RAI, OBS),
  and ticketing systems should be modeled as elevated. Watch for IT-
  infrastructure pre-positioning at host-country telecom and event-
  logistics targets in November 2025 - January 2026 window (largely
  in the past at this point but useful retrospectively).
