summary: |
  XXV Olympic Winter Games — Milan and Cortina d'Ampezzo, Italy.
  Approximately 2,900 athletes from 90+ NOCs across 8 sports / 16
  disciplines / 116 events. Host-country IT infrastructure includes
  TIM Group telecom, Atos integrator services, and Italian government
  cyber-defense (ACN, CSIRT-Italia).
