summary: |
  NATO Heads of State and Government Summit — Beştepe Presidential
  Compound, Ankara, Türkiye, 7-8 July 2026. Second Türkiye-hosted
  NATO summit after Istanbul 2004. Expected agenda: Ukraine support
  trajectory, defense-spending compliance (5% target debate), Black
  Sea security, China challenge language.
