notes: |
  NATO summits are the single highest-priority intelligence-collection
  event in the Russian state calendar (FSB, SVR, GRU all task against
  delegation comms, summit communiqué drafting, allied policy
  divergence points). Documented intrusion attempts at every summit
  since 2014. PRC interest secondary but increasing given expected
  China-challenge language. Host-country Türkiye is itself a
  contested cyber environment (TR/CN/RU/IR all active). Expect peak
  pre-summit operations May-June 2026.
