id: multilateral/2028-01-15_taiwan-presidential-election
issued_by_state_id: multilateral
targets_state_ids: []
action_type: election
date: 2028-01-15
summary: |
  Taiwan presidential and legislative elections. Incumbent President Lai
  Ching-te (DPP) eligible for second term. KMT and TPP contesting.
  Inauguration 2028-05-20. Date provisional pending CEC announcement;
  historically held on second Saturday of January (the 2024 election
  was 13 January; 2020 was 11 January).
official_url: https://web.cec.gov.tw/english/
confidence: scheduled
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  Highest-intensity foreign-influence-op window in the Indo-Pacific
  calendar. PRC MSS and PLA SSF historically operate sustained
  influence operations through Taiwanese-language social media,
  PRC-aligned media-outlet investment, and DDoS/website-defacement
  operations against ROC government and party infrastructure
  (documented patterns: 2020, 2024 elections). Issued by "multilateral"
  rather than tw/ because AUSPEX does not currently model Taiwan as
  a separate nation-state slug; revisit when actor scope expands.
