summary: |
  Australian federal election — must be held on or before 20 May 2028
  for House of Representatives and half-Senate. Date set by Prime
  Minister; placeholder set to constitutional deadline.
official_url: https://www.aec.gov.au/
confidence: scheduled
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  Australia hosts AUKUS submarine basing, Pine Gap, and key US Indo-
  Pacific infrastructure; PRC MSS-linked cyber and influence operations
  documented against political parties (2019 APH compromise), state
  governments, defense industrial base. ASIO Annual Threat Assessments
  2023-2025 elevated foreign-interference concern. Expect intensified
  influence operations around China policy and AUKUS criticism.
