summary: |
  Brazilian general election, first round 4 October 2026, runoff 25
  October 2026 if no candidate clears 50%. President, vice president,
  National Congress, governors, state legislative assemblies. Lula da
  Silva (PT) eligible for re-election; Bolsonaro family fielding
  Flávio Bolsonaro as opposition standard-bearer.
official_url: https://www.tse.jus.br/
confidence: confirmed
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  Brazil is a notable target for foreign and domestic disinformation;
  TSE (Superior Electoral Court) ran active counter-disinformation
  operations in 2022. Watch for cross-border information operations
  from Russian-aligned and US-domestic far-right networks; PRC
  diaspora-messaging activity also documented.
