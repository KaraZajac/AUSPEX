summary: |
  UK general election — must be held by 17 December 2029 (five years
  from 2024 election + dissolution allowance); convention places it
  in spring or autumn 2029. Date provisional. Starmer Labour government
  seeking second term against reconstituted Conservatives and Reform UK.
official_url: https://www.electoralcommission.org.uk/
confidence: projected
sources:
