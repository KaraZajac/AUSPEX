notes: |
  UK is a sustained Russian (FSB Star Blizzard / Cold River, GRU)
  and Iranian (APT42/Charming Kitten) targeting priority — government,
  defense, academic Russia-watchers, and political-campaign staff.
  GCHQ/NCSC have flagged spear-phishing of UK MPs and aides as a
  persistent pre-election pattern. Date placeholder 2029-08-31;
  refine when dissolution date announced.
