notes: |
  Month-long NYC diplomatic event with all P5 + NPT-state-party
  delegations co-located — exceptional collection opportunity. Expect
  elevated cyber-collection on delegations' MFA-back-channel comms,
  draft-language negotiations, and side-event coordination. Iranian
  diplomatic delegation will be a particular target for Israeli
  (Unit 8200) and Saudi-aligned actors. PRC and Russian counter-
  collection against US and EU positions on Iran enrichment.
