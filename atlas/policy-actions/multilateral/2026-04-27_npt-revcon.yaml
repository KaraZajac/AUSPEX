summary: |
  Eleventh Review Conference of the Parties to the Treaty on the
  Non-Proliferation of Nuclear Weapons — UN Headquarters, New York,
  27 April - 22 May 2026. Conference reviews treaty operation since
  the failed 2022 RevCon. Iran post-JCPOA-snapback status, DPRK
  withdrawal, and New START expiration are major friction points.
