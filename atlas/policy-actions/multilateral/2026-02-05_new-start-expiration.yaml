id: multilateral/2026-02-05_new-start-expiration
issued_by_state_id: multilateral
targets_state_ids:
  - us
  - ru
action_type: treaty
date: 2026-02-05
summary: |
  Expiration of the New Strategic Arms Reduction Treaty (New START)
  between the United States and the Russian Federation. No in-force
  successor treaty. First time since 1972 that no bilateral strategic-
  arms-control limits constrain the US and Russian nuclear arsenals.
  Putin offered (September 2025) to maintain treaty limits unilaterally
  through February 2027 contingent on US reciprocity; Trump
  administration response inconclusive.
official_url: https://www.state.gov/new-start-treaty
confidence: confirmed
sources:
  - us-state/new-start
notes: |
  Post-expiration cyber-collection priorities re-baseline: both sides
  lose treaty-mandated data exchanges and inspections, raising the
  intelligence-collection requirement on strategic-arsenal posture
  (production rates, deployment, alert status). Expect intensified
  RU SVR collection against US national-labs (LANL, LLNL, Sandia),
  NNSA, and US-strategic-forces contractors. Symmetrically, US/UK
  collection on Rosatom, Sarov, Mayak, and Russian strategic-rocket-
  force comms elevated.
