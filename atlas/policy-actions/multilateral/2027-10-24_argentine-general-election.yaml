summary: |
  Argentine general election, first round 24 October 2027. President,
  vice president, half of Chamber of Deputies, one-third of Senate,
  most provincial governorships. Incumbent Javier Milei (LLA) seeking
  second term. Runoff (if needed) within 30 days.
