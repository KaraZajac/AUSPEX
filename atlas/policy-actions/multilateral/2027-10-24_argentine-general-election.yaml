notes: |
  Cyber-targeting interest moderate by regional standards; Milei's
  pro-Israel and pro-US-alignment policies plus libertarian crypto
  posture make Argentine government and financial infrastructure
  plausible targets for ideologically-motivated and state-aligned
  actors (Iranian-aligned hacktivism noted in regional pattern
  post-2024).
