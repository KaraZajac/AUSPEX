id: multilateral/2024-04-30_un-poe-mandate-end
issued_by_state_id: multilateral
targets_state_ids: [kp]
action_type: vote
date: 2024-04-30
summary: |
  UN Security Council vote on extension of the 1718 DPRK Sanctions
  Committee Panel of Experts mandate failed — Russia vetoed, China
  abstained. Ended 15 years of UN-authorized DPRK sanctions
  monitoring including the canonical Panel reports that had
  documented Lazarus crypto theft and DPRK WMD-program financing.
  Direct functional consequence: AUSPEX must increasingly rely on
  national (Treasury, FCDO, MOFA-Japan, ROK) and the new MSMT
  (Multilateral Sanctions Monitoring Team, formed 2024-10) for
  DPRK enforcement attestation.
official_url: https://press.un.org/en/2024/sc15648.doc.htm
significance: high
