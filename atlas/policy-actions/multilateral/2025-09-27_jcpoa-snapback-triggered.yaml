id: multilateral/2025-09-27_jcpoa-snapback-triggered
issued_by_state_id: multilateral
targets_state_ids: [ir]
action_type: vote
date: 2025-09-27
summary: |
  E3 (UK, France, Germany) triggered JCPOA Section 36
  dispute-resolution snapback, reimposing UN Security Council
  resolutions including the pre-2015 arms embargo on Iran.
  Snapback automatically restored the pre-JCPOA sanctions
  architecture after the 30-day dispute window expired. Major
  doctrinal trigger for Iranian cyber retaliation posture — AUSPEX
  observed an immediate ~30-day spike in IRGC-IO and MOIS
  cyber-operations against European-aligned regional targets.
