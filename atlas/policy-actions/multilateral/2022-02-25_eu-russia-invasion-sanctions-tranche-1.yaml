id: multilateral/2022-02-25_eu-russia-invasion-sanctions-tranche-1
issued_by_state_id: multilateral
targets_state_ids: [ru]
action_type: sanction
date: 2022-02-25
summary: |
  EU Council adopted the first major sanctions package in response
  to the Russian full-scale invasion of Ukraine — financial-sector
  measures against major Russian banks, asset freezes on Putin and
  Lavrov, and the closure of EU airspace to Russian aircraft.
  Beginning of what would become 15+ sanctions packages by 2026.
