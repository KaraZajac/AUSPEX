notes: |
  BRICS summits attract Western (US/UK/Five Eyes/EU) collection
  interest on de-dollarization, BRICS Pay infrastructure, Russia
  sanctions-evasion coordination, and Iran-China-Russia tactical
  alignment signals. Indian CERT-In and NCIIPC traditionally elevate
  defensive posture pre-summit. Expect Pakistani-aligned and Iranian
  diaspora-monitoring operations against Indian civil-society
  attendees.
