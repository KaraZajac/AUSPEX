summary: |
  18th BRICS Heads of State and Government Summit — New Delhi, India,
  12-13 September 2026. India holds 2026 BRICS chairship (assumed
  from Brazil 1 January 2026). Theme "Building for Resilience,
  Innovation, Cooperation and Sustainability". Expanded BRICS+
  membership including UAE, Iran, Egypt, Ethiopia, Indonesia.
official_url: https://www.brics2026.gov.in/
confidence: confirmed
