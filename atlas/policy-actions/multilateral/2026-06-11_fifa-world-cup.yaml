notes: |
  Tri-national mega-event with massive cross-border digital
  infrastructure footprint: ticketing (FIFA + venue platforms),
  broadcast (Telemundo, Fox, TSN, Televisa), payment processing,
  border/customs IT, biometric entry systems, and 16-city
  transportation networks. Cyber-targeting interest from multiple
  vectors — Iranian-aligned actors (Israel participation), Russian-
  aligned actors (Russia banned under FIFA Council suspension; possible
  reinstatement debated through 2025-2026), PRC industrial-espionage
  collection on US/Canadian transportation IT, and financially-
  motivated criminal groups exploiting ticketing/payment surfaces.
