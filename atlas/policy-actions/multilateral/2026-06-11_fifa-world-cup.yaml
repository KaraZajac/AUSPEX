summary: |
  FIFA World Cup 2026 — first 48-team tournament, co-hosted by USA
  (11 cities), Canada (Toronto, Vancouver), and Mexico (Mexico City,
  Guadalajara, Monterrey). Opening match Mexico City 11 June 2026,
  final New Jersey 19 July 2026. ~5 million ticketed attendees
  expected.
