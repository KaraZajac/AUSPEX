notes: |
  Pan-EU influence-operation window. Doppelganger / Russian-aligned
  amplification networks were heavily documented during 2024 cycle
  (Viginum, EU DisinfoLab). Expect equivalent or expanded operations
  in 2029, with AI-generated content as standard. PRC influence
  posture more selective, targeted at specific member-state debates
  (China-skeptic policy circles, BRI-recipient states).
