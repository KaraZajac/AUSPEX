id: us/2022-09-09_mois-albania-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2022-09-09
summary: |
  US Treasury OFAC designated the Iranian Ministry of Intelligence
  and Security (MOIS) and Minister Esmail Khatib for the July 2022
  destructive cyberattack on Albanian government infrastructure.
  First sanction levied for a cyber-enabled attack against a NATO
  member that triggered diplomatic expulsion — Albania broke
  diplomatic relations with Iran the week prior.
