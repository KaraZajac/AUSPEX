id: us/2014-05-19_pla-unit-61398-indictment
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2014-05-19
summary: |
  US DOJ unsealed criminal indictments against five PLA Unit 61398
  (APT1) officers — Wang Dong, Sun Kailiang, Wen Xinyu, Huang Zhenyu,
  Gu Chunhui — for cyber-economic espionage against Westinghouse, US
  Steel, Alcoa, Allegheny Technologies, SolarWorld, and the United
  Steelworkers union. First-ever US criminal charges against uniformed
  foreign military officers for cyber espionage. Watershed for the
  US "name and shame" cyber-deterrence doctrine; PRC immediately
  withdrew from the bilateral cyber working group.
official_url: https://www.justice.gov/opa/pr/us-charges-five-chinese-military-hackers-cyber-espionage-against-us-corporations-and-labor
significance: high
