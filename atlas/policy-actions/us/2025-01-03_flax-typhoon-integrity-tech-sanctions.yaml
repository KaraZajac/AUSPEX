id: us/2025-01-03_flax-typhoon-integrity-tech-sanctions
issued_by_state_id: us
targets_state_ids: [cn]
action_type: sanction
date: 2025-01-03
summary: |
  US Treasury OFAC designated Integrity Technology Group (Beijing) —
  an MSS-tasked PRC contractor — for the Flax Typhoon
  botnet/intrusion campaign that pre-positioned in US critical
  infrastructure including telecom routers. Part of the
  late-Biden-administration "name the company" wave alongside the
  Sichuan Juxinhe Salt Typhoon designation two weeks later.
official_url: https://home.treasury.gov/news/press-releases/jy2769
significance: high
notes: |
  URL corrected 2026-05-26: previously cited jy2762 was the
  digital-asset broker tax-reporting regulation. Verified
  jy2769 page title: "Treasury Sanctions Technology Company
  for Support to Malicious Cyber Group" (published 2025-01-03,
  designates Integrity Technology Group / Flax Typhoon).
