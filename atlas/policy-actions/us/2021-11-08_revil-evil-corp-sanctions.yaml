targets_state_ids: [ru]
action_type: sanction
date: 2021-11-08
summary: |
  US Treasury OFAC designated REvil/Sodinokibi operator Yevgeniy
  Polyanin and Yaroslav Vasinskyi alongside the cryptocurrency
  exchange Chatex, paired with DOJ indictments of the same
  individuals for the Kaseya supply-chain ransomware attack and
  related extortion. Part of the post-Kaseya/Colonial pipeline
  ransomware accountability push.
