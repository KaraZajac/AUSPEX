targets_state_ids: [cn]
action_type: indictment
date: 2019-08-15
summary: |
  US DOJ unsealed first APT41 indictments (Zhang Haoran and Tan Dailin
  a.k.a. "Wicked Rose") for computer intrusion and money-laundering
  offenses against US video-game and tech firms. First public
  documentation of APT41's dual-mode operating pattern (state-tasked
  espionage interleaved with financially-motivated criminal activity)
  that would be expanded in the September 2020 second indictment.
