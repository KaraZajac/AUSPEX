id: us/2025-05-13_huawei-ascend-enforcement
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2025-05-13
summary: |
  US Commerce / BIS published enforcement guidance asserting that use
  of Huawei Ascend AI accelerators (910B, 910C, 910D) anywhere in the
  world violates US export controls due to their FDPR-implicated
  fabrication. Sharp escalation of US extraterritorial technology
  enforcement; triggered an immediate PRC MOFCOM countermeasure
  statement. Marks Trump-era continuation of the China tech-decoupling
  track despite the AI Diffusion Rule rescission.
official_url: https://www.bis.doc.gov/index.php/policy-guidance/2025-ascend-enforcement
significance: high
sources:
  - bis/2025-05-13_huawei-ascend-enforcement
