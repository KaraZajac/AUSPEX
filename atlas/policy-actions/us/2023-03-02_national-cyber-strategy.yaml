date: 2023-03-02
summary: |
  Biden administration released the 2023 National Cybersecurity
  Strategy (NCS 2023), shifting cyber-defense responsibility "to the
  most capable and best-positioned actors" — software vendors,
  cloud providers, critical-infrastructure owners — and explicitly
  endorsing "disruption operations" against criminal cyber actors.
  Doctrinal anchor for the 2023-2025 OFAC + DOJ + CISA + Cyber
  Command coordinated disruption track.
