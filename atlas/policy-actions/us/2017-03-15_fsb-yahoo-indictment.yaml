id: us/2017-03-15_fsb-yahoo-indictment
issued_by_state_id: us
targets_state_ids: [ru]
action_type: indictment
date: 2017-03-15
summary: |
  US DOJ indicted two FSB officers (Dmitry Dokuchaev and Igor Sushchin)
  along with criminal hackers Alexsey Belan and Karim Baratov for the
  2014 Yahoo breach affecting 500M user accounts. First US indictment
  of FSB officers for cyber-enabled intelligence collection. Notable
  because Dokuchaev was simultaneously prosecuted in Moscow for
  treason — illustrating Russian-side awareness of US-Russian FSB
  cooperation breakdown.
