id: us/2026-01-15_zedcex-zedxion-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2026-01-15
summary: |
  US Treasury OFAC designated Zedcex/Zedxion — an IRGC-linked
  cryptocurrency exchange — for laundering IRGC-Quds Force funds and
  servicing Houthi maritime revenue. Continues the 2025 IRGC-finance
  enforcement track into 2026; notable for the first-time use of
  jointly-issued OFAC + State MSMT (Multilateral Sanctions Monitoring
  Team) advisories.
official_url: null  # jy prefix was retired at 2025-01 admin transition; jy3104 cannot exist. Canonical ZedCEX/Zedxion sb-series ID not yet identified.
significance: medium
