action_type: indictment
date: 2024-07-25
summary: |
  US DOJ indicted Rim Jong Hyok, an Andariel (RGB Lab 110) officer,
  for a global ransomware campaign targeting US hospitals (including
  the 2021 Center for Cancer Research breach), defense contractors,
  and energy companies. Indictment explicitly documents DPRK using
  hospital-ransomware proceeds to fund espionage operations against
  US defense IP — the byungjin revenue-feeds-WMD-program pattern.
