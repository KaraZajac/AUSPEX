id: us/2025-11-04_dprk-launderers-cybercrime-it-workers
issued_by_state_id: us
targets_state_ids: [kp]
action_type: sanction
date: 2025-11-04
summary: |
  US Treasury OFAC designated eight individuals and two entities for
  their role in laundering funds derived from DPRK illicit schemes,
  including cryptocurrency cybercrime proceeds and IT-worker fraud
  revenue that ultimately support North Korea's sanctioned weapons
  programs. The action targets the financial-facilitation layer — DPRK
  bankers and front institutions that move stolen and fraudulently
  earned funds back to the regime — complementing earlier designations
  of the Lazarus-linked theft operations themselves.
