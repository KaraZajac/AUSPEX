id: us/2021-04-08_supercomputing-entities
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2021-04-08
summary: |
  US Commerce / BIS added seven Chinese supercomputing entities
  including Tianjin Phytium Technology, Tianjin Sunway
  Microelectronics, Shanghai High-Performance Integrated Circuit
  Design Center, Sunway Microelectronics, and three National
  Supercomputing Centers to the Entity List. First HPC-specific entity
  list action — important precedent for the 2022 advanced-computing
  category.
