id: us/2021-06-07_colonial-pipeline-recovery
issued_by_state_id: us
targets_state_ids: [ru]
action_type: asset-seizure
date: 2021-06-07
summary: |
  US DOJ announced recovery of USD 2.3M of the USD 4.4M ransom paid
  by Colonial Pipeline to DarkSide ransomware operators in May 2021.
  First major demonstration of the DOJ Ransomware and Digital
  Extortion Task Force's ability to claw back cryptocurrency
  ransom payments. Followed the May 13, 2021 closure of DarkSide as
  the operators went dark facing the Biden administration response.
