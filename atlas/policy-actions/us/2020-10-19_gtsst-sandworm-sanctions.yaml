id: us/2020-10-19_gtsst-sandworm-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2020-10-19
summary: |
  US Treasury OFAC designated the GRU's Main Centre for Special
  Technologies (GTsST / Unit 74455 — Sandworm) for destructive cyber
  operations including NotPetya (June 2017), the BlackEnergy attacks
  on the Ukrainian power grid (2015 and 2016), and the Olympic
  Destroyer attack on PyeongChang 2018. First Treasury designation
  squarely targeting a named GRU technical unit for sabotage-class
  operations.
