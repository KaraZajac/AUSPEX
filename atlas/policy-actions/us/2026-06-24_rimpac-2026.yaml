summary: |
  Exercise Rim of the Pacific (RIMPAC) 2026 — 30th iteration, hosted
  by US Pacific Fleet in and around the Hawaiian Islands and San Diego,
  24 June - 31 July 2026. 31 nations, ~40 surface ships, 5 submarines,
  140 aircraft, 25,000+ personnel. Largest RIMPAC to date. Taiwan
  reportedly invited as observer (TBC).
official_url: https://www.cpf.navy.mil/rimpac/
confidence: confirmed
sources:
  - cpf-navy/rimpac-2026
notes: |
  RIMPAC is consistently the most-cyber-targeted exercise in the US
  calendar: PRC PLA SSF tasking on participating-nation tactical
  comms, sensor-data integration patterns, and unmanned-systems
  interoperability has been publicly attributed in prior cycles
  (2018, 2020, 2022, 2024). Russian SIGINT historically passively
  collects via fishing-trawler proxies; PRC SIGINT now uses dual-
  purpose civilian research vessels (Yuanwang-class). Expect cyber
  probing of host-nation logistics IT (Pearl Harbor, Joint Base
  Pearl Harbor-Hickam) and visiting-navy comms-relay infrastructure.
