targets_state_ids: [ir]
action_type: sanction
date: 2024-09-27
summary: |
  US Treasury OFAC designated seven IRGC-affiliated individuals for
  the cyber-enabled hack-and-leak interference operation against the
  Trump 2024 presidential campaign. Paired with same-day DOJ
  indictment of Masoud Jalili, Sayyed Ali Aghamiri, and Yasar Balaghi.
official_url: https://home.treasury.gov/news/press-releases/jy2621
significance: medium
notes: |
