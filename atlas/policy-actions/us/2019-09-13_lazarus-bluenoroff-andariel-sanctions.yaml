id: us/2019-09-13_lazarus-bluenoroff-andariel-sanctions
issued_by_state_id: us
targets_state_ids: [kp]
action_type: sanction
date: 2019-09-13
summary: |
  US Treasury OFAC designated three DPRK state-sponsored cyber groups —
  Lazarus Group, Bluenoroff, and Andariel — as agencies, instrumentalities,
  or controlled entities of the Reconnaissance General Bureau (RGB).
  Cited WannaCry 2.0, the 2014 Sony attack, the Bangladesh Bank heist,
  and a sustained pattern of cryptocurrency theft funding WMD/ballistic
  missile programs. Canonical anchor for the byungjin
  sanctions-evasion-revenue doctrine.
