id: us/2023-02-09_trickbot-conti-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2023-02-09
summary: |
  US Treasury OFAC, in coordination with the UK NCA, designated seven
  Russian TrickBot/Conti operators in the first joint US-UK cyber
  sanctions action. Identified individuals included Vitaly Kovalev,
  Maksim Mikhailov, Valentin Karyagin, Maksim Galochkin, Dmitry
  Pleshevskiy, Mikhail Iskritskiy, and Ivan Vakhromeyev — Trickbot
  is the laundering rails for much of the Conti ransomware
  ecosystem.
