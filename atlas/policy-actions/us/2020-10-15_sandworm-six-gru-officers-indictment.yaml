date: 2020-10-15
summary: |
  US DOJ indicted six GRU 74455 (Sandworm) officers — Yuriy
  Andrienko, Sergey Detistov, Pavel Frolov, Anatoliy Kovalev, Artem
  Ochichenko, Petr Pliskin — for NotPetya, the 2015/2016 Ukraine
  power-grid attacks, the PyeongChang Olympic Destroyer attack, the
  Macron campaign hack, and the Skripal-investigation cyber
  interference. Most comprehensive single charging document of
  GRU 74455 sabotage doctrine.
