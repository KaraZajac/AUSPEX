id: us/2020-12-18_smic-entity-list
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2020-12-18
summary: |
  US Commerce / BIS added SMIC and 60 Chinese affiliates to the Entity
  List, with a license presumption-of-denial for 10nm-and-below
  technology — the first BIS action explicitly targeting a Chinese
  leading-edge foundry. Directly motivated subsequent PRC-state cyber
  collection against ASML, Applied Materials, KLA, and Tokyo Electron
  documented under MIC2025/semiconductors doctrine.
official_url: https://www.federalregister.gov/documents/2020/12/22/2020-28031/addition-of-entities-to-the-entity-list-revision-of-entry-on-the-entity-list-and-removal-of-entities
significance: high
