id: us/2018-05-08_jcpoa-withdrawal
issued_by_state_id: us
targets_state_ids: [ir]
action_type: treaty
date: 2018-05-08
summary: |
  Trump administration announced US withdrawal from the Joint
  Comprehensive Plan of Action, reimposing all pre-deal nuclear
  sanctions on Iran. Triggered the Iranian "maximum pressure
  response" doctrinal phase — including the demonstrative
  Saudi-Aramco-degradation cyber posture (Shamoon resurgence, the
  September 2019 Abqaiq attack support), the Soleimani-strike cycle,
  and the long-tail wave of MOIS / IRGC cyber operations against US
  CII that AUSPEX tracks.
