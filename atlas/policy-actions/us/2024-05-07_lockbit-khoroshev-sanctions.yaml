action_type: sanction
date: 2024-05-07
summary: |
  US Treasury OFAC designated Dmitry Yuryevich Khoroshev — LockBitSupp,
  the LockBit ransomware lead administrator — alongside UK NCA and
  Australian government sanctions. Followed the February 2024
  Operation Cronos disruption of LockBit infrastructure; the
  identification was the joint US-UK-AU follow-through to put a name
  on the previously-doxxed admin.
