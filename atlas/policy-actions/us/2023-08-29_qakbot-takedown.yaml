id: us/2023-08-29_qakbot-takedown
issued_by_state_id: us
targets_state_ids: [ru]
action_type: indictment
date: 2023-08-29
summary: |
  US DOJ + FBI Operation Duck Hunt disrupted the Qakbot (Qbot)
  botnet — a 15-year-old loader-malware platform used by Conti,
  ProLock, Egregor, BlackBasta, REvil, and other ransomware
  affiliates as initial-access. Court-authorized infrastructure
  seizure and a remote-uninstall payload pushed to ~700,000 infected
  endpoints. Largest single-operation FBI botnet disruption to date
  in 2023.
official_url: https://www.justice.gov/opa/pr/qakbot-malware-disrupted-international-cyber-takedown
significance: medium
