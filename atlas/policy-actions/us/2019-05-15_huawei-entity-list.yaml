id: us/2019-05-15_huawei-entity-list
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2019-05-15
summary: |
  US Commerce / BIS added Huawei Technologies and 68 non-US
  affiliates to the Entity List, citing acts contrary to US national
  security and foreign policy interests (including the indictment
  for Iran-sanctions violations). The watershed US-China
  technology-decoupling action — first major US move to deny a Chinese
  national champion access to the US semiconductor and software
  supply chain. Triggered the cascade of subsequent FDPR amendments
  and the later October-7 controls.
