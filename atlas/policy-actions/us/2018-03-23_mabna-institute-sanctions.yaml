id: us/2018-03-23_mabna-institute-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2018-03-23
summary: |
  US Treasury OFAC designated the Mabna Institute and nine Iranian
  nationals for conducting a years-long cyber-enabled theft campaign
  against universities, private companies, and government agencies
  on behalf of the IRGC. Paired with a same-day DOJ indictment of
  the same nine individuals — the first coordinated Treasury/DOJ
  "name and shame" action against Iranian state-contractor cyber
  operations, establishing the template later used for APT39, APT34,
  and IRGC-CEC designations.
official_url: https://home.treasury.gov/news/press-releases/sm0332
significance: high
