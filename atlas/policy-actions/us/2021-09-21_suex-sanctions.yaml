id: us/2021-09-21_suex-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2021-09-21
summary: |
  US Treasury OFAC designated SUEX OTC, a Czech-registered virtual
  currency exchange, for facilitating financial transactions for
  Russian-aligned ransomware actors. First-ever Treasury designation
  of a cryptocurrency exchange — established the precedent later used
  against Chatex, Garantex, Bitzlato, and the broader ransomware
  laundering ecosystem.
