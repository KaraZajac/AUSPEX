id: us/2025-01-15_ai-diffusion-rule
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2025-01-15
summary: |
  US Commerce / BIS Final Rule — "Framework for Artificial
  Intelligence Diffusion" — tiered global controls on US AI compute
  access. Tier 1 (allies, unrestricted), Tier 2 (most countries,
  capped at fleet sizes), Tier 3 (PRC + embargoed, denial).
  Rescinded by the Trump administration in May 2025 but framed the
  policy debate over global-scale AI-compute allocation. Heavily
  watched indicator for whether US extends FDPR-style logic to
  cloud-services.
official_url: https://www.federalregister.gov/documents/2025/01/15/
significance: high
