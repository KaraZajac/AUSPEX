targets_state_ids: [ru]
action_type: sanction
date: 2023-09-07
summary: |
  US Treasury OFAC, again jointly with UK NCA, designated 11
  additional TrickBot/Conti operators — the second tranche of the
  Feb-2023 action. Notably tied alleged Russian intelligence
  cooperation: identified that the TrickBot group had been targeting
  US Government and Department of Energy systems, evidence of
  ransomware-FSB convergence.
