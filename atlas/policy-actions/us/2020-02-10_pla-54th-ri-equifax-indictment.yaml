id: us/2020-02-10_pla-54th-ri-equifax-indictment
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2020-02-10
summary: |
  US DOJ indicted four PLA 54th Research Institute officers (Wu Zhiyong,
  Wang Qian, Xu Ke, Liu Lei) for the 2017 Equifax intrusion that
  exfiltrated PII for ~147M Americans. First indictment naming a PLA
  Strategic Support Force / 54th RI unit for an explicit
  bulk-data-collection / counterintelligence-targeting operation
  against US population. Cited in MSS bulk-PII-acquisition doctrine
  narratives.
official_url: https://www.justice.gov/opa/pr/chinese-military-personnel-charged-computer-fraud-economic-espionage-and-wire-fraud-hacking
significance: high
