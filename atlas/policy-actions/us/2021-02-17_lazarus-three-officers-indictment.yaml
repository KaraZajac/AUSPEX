summary: |
  US DOJ unsealed expanded indictment of three DPRK military
  intelligence officers — Jon Chang Hyok, Kim Il, and Park Jin Hyok
  (the latter already charged in 2018) — for Sony, WannaCry, the
  Bangladesh Bank heist, the AppleJeus crypto-malware campaigns, and
  the SWIFT/ATM cashout operations. Definitive public US framing of
  the Lazarus / Bluenoroff / Andariel umbrella as RGB-tasked
  revenue-generation cyber.
