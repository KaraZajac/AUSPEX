date: 2026-01-08
summary: |
  US State Department announcement consolidating DPRK
  sanctions-monitoring under the Multilateral Sanctions Monitoring
  Team (MSMT) — the post-UN-1718-PoE successor body formed October
  2024 by US, ROK, Japan, UK, France, Germany, Australia, Canada,
  Italy, Netherlands, and New Zealand. The MSMT's first consolidated
  annual report on DPRK cyber-enabled sanctions evasion is the
  primary multilateral-attribution anchor for byungjin
  revenue-doctrine claims going forward.
