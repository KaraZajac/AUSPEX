targets_state_ids: [ru]
action_type: indictment
date: 2022-03-24
summary: |
  US DOJ unsealed two indictments against four Russian intelligence
  officers: three FSB Center 16 (Military Unit 71330) officers for
  Dragonfly/Berserk Bear intrusions of US energy-sector entities
  including the Wolf Creek nuclear facility, and one TsNIIKhM
  employee for the Triton/Trisis attack on a Saudi petrochemical
  plant. Released alongside same-day Treasury sanctions.
