id: us/2024-02-02_cyberav3ngers-irgc-cec-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2024-02-02
summary: |
  US Treasury OFAC designated six IRGC-Cyber Electronic Command
  (IRGC-CEC) officials for cyberattacks against US, Israeli, and
  European water and wastewater systems — including the November 2023
  attacks on Unitronics PLCs at the Aliquippa, PA water authority and
  a dozen other US utilities. The CyberAv3ngers persona had been
  active since the Iran-Israel cyber escalation of October 2023.
