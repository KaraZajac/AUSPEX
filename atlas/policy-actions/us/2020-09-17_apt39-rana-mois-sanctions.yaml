id: us/2020-09-17_apt39-rana-mois-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2020-09-17
summary: |
  US Treasury OFAC designated Rana Intelligence Computing Company
  (APT39) and 45 employees as a front for the Iranian Ministry of
  Intelligence and Security (MOIS), targeting dissidents, journalists,
  and international travel/aerospace sectors. First public US
  designation explicitly mapping a vendor-named APT cluster to MOIS
  (vs. IRGC) — important for the bifurcated Iranian cyber-doctrine
  picture.
