action_type: sanction
date: 2023-11-30
summary: |
  US Treasury OFAC designated Kimsuky (an RGB-affiliated cyber
  collection actor) and eight DPRK foreign-based agents for
  intelligence collection supporting the DPRK weapons program,
  including spear-phishing of think tanks, academics, and journalists.
  First OFAC designation specifically of the Kimsuky cluster as a
  distinct entity.
