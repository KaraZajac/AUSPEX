targets_state_ids: [kp]
action_type: indictment
date: 2018-09-06
summary: |
  US DOJ unsealed criminal complaint against Park Jin Hyok, a Lazarus
  Group hacker affiliated with DPRK Lab 110 (RGB), for the 2014 Sony
  Pictures attack, the 2016 Bangladesh Bank USD 81M theft, and the
  2017 WannaCry 2.0 ransomware outbreak. First US criminal charge
  against a named DPRK cyber actor. Established the precedent of
  treating DPRK state cyber as criminally indictable rather than
  purely diplomatic.
