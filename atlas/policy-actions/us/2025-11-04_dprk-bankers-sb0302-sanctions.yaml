summary: |
  US Treasury OFAC designated additional DPRK-linked bankers and
  facilitators under SB0302, expanding the network identified in
  March 2023 and 2024. Paired with State Department parallel
  announcements — part of the 2025 ramp-up against DPRK
  sanctions-evasion banking infrastructure following the Bybit
  USD 1.5B theft.
