id: us/2016-03-22_su-bin-plea
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2016-03-22
summary: |
  US DOJ secured guilty plea from Su Bin (a.k.a. Stephen Su), a
  PRC-national businessman who conspired with PLA hackers to steal
  C-17, F-22, and F-35 design data from Boeing and other US defense
  contractors. First conviction explicitly tying a Chinese
  commercial intermediary to PLA cyber operations — the
  intermediary-broker pattern later seen in APT41 and Chengdu 404.
