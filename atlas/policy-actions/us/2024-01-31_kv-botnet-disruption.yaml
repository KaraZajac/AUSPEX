id: us/2024-01-31_kv-botnet-disruption
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2024-01-31
summary: |
  US DOJ + FBI court-authorized disruption of the KV-botnet — a
  PRC-MSS-controlled SOHO-router botnet used by Volt Typhoon for
  pre-positioning collection against US critical infrastructure.
  First disclosed public takedown of a Volt-Typhoon C2 infrastructure
  set. Released concurrently with FBI Director Wray's House Select
  Committee testimony naming Volt Typhoon as preparation for Taiwan
  contingency disruption.
