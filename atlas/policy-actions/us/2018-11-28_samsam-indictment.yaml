id: us/2018-11-28_samsam-indictment
issued_by_state_id: us
targets_state_ids: [ir]
action_type: indictment
date: 2018-11-28
summary: |
  US DOJ indicted two Iranian nationals (Faramarz Shahi Savandi and
  Mohammad Mehdi Shah Mansouri) for the SamSam ransomware campaign
  that targeted US municipalities (Atlanta, Newark), hospitals
  (Hollywood Presbyterian), and the Port of San Diego. Paired with
  same-day Treasury designation. First US action treating Iranian
  ransomware-style operations as state-tolerated revenue generation
  for sanctions evasion.
