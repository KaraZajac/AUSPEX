id: us/2021-07-19_apt40-indictment
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2021-07-19
summary: |
  US DOJ indicted four MSS Hainan State Security Department officers
  (Ding Xiaoyang, Cheng Qingmin, Zhu Yunmin, Wu Shurong) tied to
  Hainan Xiandun Technology Development Co. for APT40 / Leviathan
  campaigns against maritime, aviation, defense, education,
  government, and healthcare sectors across multiple countries.
  Released same day as the White House and Five Eyes joint
  Exchange/HAFNIUM attribution. First US action squarely targeting an
  MSS provincial state security department cyber operation.
