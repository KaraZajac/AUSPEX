id: us/2018-12-20_apt10-indictment
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2018-12-20
summary: |
  US DOJ indicted two Chinese nationals (Zhu Hua and Zhang Shilong)
  affiliated with the APT10 / MenuPass / Stone Panda group operating
  under MSS Tianjin State Security Bureau for the years-long managed
  service provider (MSP) supply-chain campaign affecting ~45 entities
  across 12 countries. Watershed for MSP-as-strategic-vector doctrine
  documentation. Coordinated with UK, Canada, and Japanese statements.
official_url: https://www.justice.gov/opa/pr/two-chinese-hackers-associated-ministry-state-security-charged-global-computer-intrusion
significance: high
