id: us/2021-11-18_emennet-pasargad-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2021-11-18
summary: |
  US Treasury OFAC designated Emennet Pasargad (an Iranian IRGC-linked
  cyber company) and six associated individuals for attempted
  interference in the 2020 US presidential election (the "Proud Boys"
  voter-intimidation email campaign). Paired with a same-day DOJ
  indictment of Seyyed Mohammad Hosein Musa Kazemi and Sajjad Kashian.
