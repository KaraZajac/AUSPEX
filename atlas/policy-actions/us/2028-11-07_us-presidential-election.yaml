summary: |
  US presidential election, all 435 House seats, 33-34 Senate seats.
  First open-seat presidential race since 2016 (Trump term-limited).
  Highest-stakes cyber-targeting window in the four-year US calendar.
official_url: https://www.eac.gov/
confidence: confirmed
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  Foreign cyber-influence operations historically intensify 12-18 months
  pre-election. Expect strategic-document collection against both major
  campaigns (RU SVR pattern, 2016 + 2020), election-infrastructure
  probing (CISA pattern 2018-2024), and integrity-of-vote influence
  operations targeting battleground states. Iran also entered this
  space publicly in 2020 and 2024. PRC influence-op posture less
  overtly disruptive but increasingly active against Asian-American
  diaspora messaging.
