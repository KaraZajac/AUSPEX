id: us/2024-07-19_carr-gru-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2024-07-19
summary: |
  US Treasury OFAC designated two members of the Cyber Army of Russia
  Reborn (CARR), a GRU 74455-linked Russian hacktivist persona,
  responsible for cyberattacks on US water utilities (including the
  January 2024 Muleshoe TX water tower incident). First OFAC
  designation of "patriotic hacktivist" front actors as instruments
  of GRU tasking — important precedent for treating NoName057(16),
  KillNet, and similar fronts as state-actor extensions.
