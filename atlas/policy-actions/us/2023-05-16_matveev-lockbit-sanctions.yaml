id: us/2023-05-16_matveev-lockbit-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2023-05-16
summary: |
  US Treasury OFAC designated Mikhail Pavlovich Matveev ("Wazawaka")
  for participation in LockBit, Babuk, and Hive ransomware operations
  targeting US critical infrastructure and law enforcement (including
  the Washington DC Metro Police). Paired with DOJ indictment and a
  USD 10M State Department Rewards-for-Justice bounty — Matveev had
  been publicly trolling Western law enforcement on Telegram while
  inside Russia.
