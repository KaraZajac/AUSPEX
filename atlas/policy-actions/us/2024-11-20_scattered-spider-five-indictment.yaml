date: 2024-11-20
summary: |
  US DOJ indicted five Scattered Spider (UNC3944 / Octo Tempest)
  members — four US nationals and one UK national — for the broad
  social-engineering and SIM-swapping campaign that hit Caesars, MGM
  Resorts, and dozens of other US firms in 2023. Notable because
  Scattered Spider is not state-aligned: included as a baseline event
  marking the late-2024 enforcement push against the Anglo-American
  cybercrime cohort that later partnered with LockBit affiliates.
