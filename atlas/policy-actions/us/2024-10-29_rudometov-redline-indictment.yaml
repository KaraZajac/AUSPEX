id: us/2024-10-29_rudometov-redline-indictment
issued_by_state_id: us
targets_state_ids: [ru]
action_type: indictment
date: 2024-10-29
summary: |
  US DOJ indicted Maxim Rudometov for development and operation of
  the RedLine and META infostealer malware families, in coordination
  with the Dutch-led Operation Magnus disruption of RedLine/META
  infrastructure. Notable as an infostealer-focused action — the
  upstream of much of the credential supply for ransomware
  initial-access brokers.
