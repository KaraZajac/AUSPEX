id: us/2022-10-07_october-7-semis-controls
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2022-10-07
summary: |
  US Commerce / BIS implemented the "October 7" controls — the
  watershed export-control package restricting advanced computing
  chips, semiconductor manufacturing equipment, and supercomputing
  technology to China. Introduced (a) parameter-based controls on
  AI chips (TPP/density thresholds), (b) end-use and end-user
  restrictions on PRC advanced-IC fabs, (c) a novel
  US-person restriction prohibiting US nationals from supporting PRC
  advanced-IC development without a license. Single most consequential
  US tech-controls action of the post-Cold-War era — the policy
  forcing function behind much of the 2023+ PRC cyber-collection
  surge tracked under MIC2025/semiconductors doctrine.
