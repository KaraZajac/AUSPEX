id: us/2025-09-16_irgc-crypto-shadow-banking-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2025-09-16
summary: |
  US Treasury OFAC designated a multi-jurisdictional IRGC-linked
  cryptocurrency shadow-banking network — exchanges, OTC desks, and
  facilitators in the UAE, Hong Kong, and Iran moving sanctioned
  oil-revenue proceeds via stablecoin rails. Major broadening of
  the IRGC-financial enforcement target set from individual cyber
  actors to the underlying laundering infrastructure.
