targets_state_ids: [cn]
action_type: sanction
date: 2024-03-25
summary: |
  US Treasury OFAC designated Wuhan Xiaoruizhi Science and Technology
  Company Ltd. (an MSS Hubei State Security Department front) and two
  Chinese nationals — Zhao Guangzong and Ni Gaobin — for APT31
  operations targeting US Government agencies, defense industrial base,
  political campaigns, and journalists. Coordinated transatlantic
  action with UK (NCSC + sanctions) and EU statements the same day.
