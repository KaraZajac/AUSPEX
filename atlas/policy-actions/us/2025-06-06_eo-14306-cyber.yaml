summary: |
  Trump administration Executive Order 14306 reshaped US federal
  cybersecurity policy — amended EO 13694 and EO 14144, ended the
  Biden-era cybersecurity workforce orders, and reset
  software-supply-chain attestation requirements. Pre-cursor to the
  March 2026 "Cyber Strategy for America" framing.
