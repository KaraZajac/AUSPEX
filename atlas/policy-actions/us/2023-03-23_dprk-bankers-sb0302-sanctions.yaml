date: 2023-03-23
summary: |
  US Treasury OFAC designated three individuals based in China and
  the UAE for laundering virtual currency stolen by DPRK cyber actors
  (including Lazarus Group). Action framed under E.O. 13722 and tied
  to the OFAC SB0302 anti-DPRK-financial-revenue mission set.
