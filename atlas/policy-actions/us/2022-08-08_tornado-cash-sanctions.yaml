id: us/2022-08-08_tornado-cash-sanctions
issued_by_state_id: us
targets_state_ids: [kp]
action_type: sanction
date: 2022-08-08
summary: |
  US Treasury OFAC designated Tornado Cash — an Ethereum-based
  smart-contract mixer — citing its role in laundering over USD 7B
  in virtual currency since 2019, including more than USD 455M
  stolen by Lazarus Group. The first OFAC designation of immutable
  smart-contract software (later partially reversed by 2024 Fifth
  Circuit ruling in Van Loon v. Treasury), but the watershed
  precedent for sanctioning crypto-infrastructure.
