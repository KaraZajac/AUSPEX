id: us/2023-10-17_october-7-amendments
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2023-10-17
summary: |
  US Commerce / BIS issued amendments closing loopholes in the
  October-7-2022 controls — particularly the "performance density"
  redefinition that captured the NVIDIA H800 / A800 / L40S
  workaround chips, and the addition of ~13 PRC GPU-design firms
  including Moore Threads and Biren to the Entity List. Restored the
  intended denial scope after twelve months of corporate workaround.
