summary: |
  US DOJ indicted two FSB Center 18 officers (Ruslan Aleksandrovich
  Peretyatko and Andrey Stanislavovich Korinets) for Star Blizzard /
  ColdRiver spear-phishing campaigns against US-UK think tanks,
  academics, defense industrial base, government, journalists,
  and the Steele dossier orbit. Coordinated with UK Foreign Office
  sanctions of the same individuals same day — first joint US-UK
  sanctions of FSB Center 18 personnel.
