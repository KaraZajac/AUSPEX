id: us/2020-10-23_tsniikhm-triton-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2020-10-23
summary: |
  US Treasury OFAC designated the Russian State Research Center of
  the Russian Federation FGUP Central Scientific Research Institute
  of Chemistry and Mechanics (TsNIIKhM) for developing the Triton
  (Trisis) safety-instrumented-system malware used against a Saudi
  petrochemical facility in 2017 — the first sanction against the
  developer of an industrial safety-system attack toolkit.
