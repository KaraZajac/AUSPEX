id: us/2018-07-13_mueller-gru-twelve-indictment
issued_by_state_id: us
targets_state_ids: [ru]
action_type: indictment
date: 2018-07-13
summary: |
  US Special Counsel Robert Mueller unsealed indictment of 12 GRU
  officers (Units 26165 and 74455) for the 2016 DNC/DCCC hack-and-leak
  operation against the Clinton campaign. Established the public record
  of GRU 26165 (APT28/Fancy Bear) and GRU 74455 (Sandworm) as the
  two principal Russian state cyber units, and the
  Guccifer 2.0/DCLeaks personas as GRU cutouts. Watershed for
  Russian cyber-doctrine documentation.
