id: us/2024-12-12_dprk-it-worker-14-national-indictment
issued_by_state_id: us
targets_state_ids: [kp]
action_type: indictment
date: 2024-12-12
summary: |
  US DOJ indicted 14 DPRK nationals tied to two Chinese-based
  IT-worker front companies (Yanbian Silverstar and Volasys
  Silverstar) for a long-running scheme generating an estimated USD
  88M for the DPRK regime via remote IT-worker placement at Fortune-500
  US companies. Most comprehensive single DPRK IT-worker fraud
  indictment to date; anchored the FY2025 expansion of the OFAC SB0230
  enforcement track.
