summary: |
  US Treasury OFAC designated Song Kum Hyok, an Andariel
  (RGB-affiliated) cyber actor, for orchestrating the DPRK
  IT-worker fraud scheme — the named individual behind the
  large-scale remote-worker placement and identity-theft revenue
  stream. Paired with same-day FBI/State Rewards-for-Justice
  bounty.
