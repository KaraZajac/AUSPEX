summary: |
  Trump administration released "Cyber Strategy for America" —
  successor to the 2023 National Cybersecurity Strategy. Reframed
  US cyber posture around deterrence-by-denial, named PRC as the
  pacing threat with particular emphasis on Salt Typhoon /
  Volt Typhoon-class pre-positioning, and reorganized federal cyber
  governance under a strengthened ONCD.
