summary: |
  US Treasury OFAC designated the Ethereum address
  0x098B716B8Aaf21512996dC57EB0615e2383E2f96 used in the Ronin
  Bridge theft as Lazarus Group property, invoking E.O. 13722.
  Explicitly linked stolen funds to DPRK WMD/missile programs —
  the canonical attestation pattern for byungjin /
  sanctions-evasion-revenue doctrine linkage in AUSPEX.
