id: us/2023-01-26_hive-takedown
issued_by_state_id: us
targets_state_ids: [ru]
action_type: indictment
date: 2023-01-26
summary: |
  US DOJ + FBI + Europol disrupted the Hive ransomware operation,
  having covertly seized decryption keys for ~336 victims over a
  7-month operation prior to public takedown — saved an estimated
  USD 130M in ransom payments. Demonstrated the disruption-operation
  doctrine articulated in NCS 2023; Hive was the precursor template
  for the LockBit Cronos operation a year later.
