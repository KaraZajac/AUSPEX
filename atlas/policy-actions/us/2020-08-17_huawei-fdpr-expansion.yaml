id: us/2020-08-17_huawei-fdpr-expansion
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2020-08-17
summary: |
  US Commerce / BIS extended the Foreign-Produced Direct Product Rule
  (FDPR) to Huawei, blocking any foreign-fabricated semiconductor
  made with US technology in design or manufacture from sale to
  Huawei. The legal-extraterritoriality template for the broader
  October-7-2022 controls. Caused the immediate ~70% revenue collapse
  of Huawei's consumer-electronics business.
