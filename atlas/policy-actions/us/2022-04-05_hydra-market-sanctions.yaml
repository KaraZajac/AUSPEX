id: us/2022-04-05_hydra-market-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2022-04-05
summary: |
  US Treasury OFAC (in coordination with German federal police BKA)
  designated and took down Hydra Market, the largest Russian-language
  darknet marketplace handling ~80% of all darknet crypto-volume in
  2021 and serving as a key ransomware-cashout venue. Paired
  Treasury designation with German law-enforcement seizure of
  server infrastructure.
official_url: https://home.treasury.gov/news/press-releases/jy0701
significance: medium
