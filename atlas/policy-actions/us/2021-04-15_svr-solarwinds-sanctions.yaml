id: us/2021-04-15_svr-solarwinds-sanctions
issued_by_state_id: us
targets_state_ids: [ru]
action_type: sanction
date: 2021-04-15
summary: |
  US Treasury OFAC, under newly issued E.O. 14024, designated six
  Russian technology companies and formally attributed the SolarWinds
  supply-chain compromise to the SVR (APT29 / Cozy Bear). First use
  of E.O. 14024 — the standing authority later used for the bulk of
  the post-invasion Russia financial sanctions architecture.
