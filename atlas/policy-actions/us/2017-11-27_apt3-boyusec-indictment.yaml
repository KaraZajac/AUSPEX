id: us/2017-11-27_apt3-boyusec-indictment
issued_by_state_id: us
targets_state_ids: [cn]
action_type: indictment
date: 2017-11-27
summary: |
  US DOJ indicted three Chinese nationals (Wu Yingzhuo, Dong Hao, Zha
  Rong) employed by Guangzhou Bo Yu Information Technology Company
  Limited (Boyusec) for hacking Moody's, Siemens, and Trimble. First
  US indictment explicitly tying an APT cluster (APT3/Gothic Panda)
  to an MSS-tasked private contractor — Boyusec was already
  publicly tied to MSS Guangdong State Security Department.
