id: us/2022-09-14_irgc-ransomware-contractors-sanctions
issued_by_state_id: us
targets_state_ids: [ir]
action_type: sanction
date: 2022-09-14
summary: |
  US Treasury OFAC designated ten Iranian IRGC-affiliated individuals
  and two front companies (Najee Technology Hooshmand Fater LLC and
  Afkar System Yazd) for ransomware operations targeting US, UK, and
  Israeli critical-infrastructure entities. Paired with same-day DOJ
  indictment — first formal US characterization of IRGC-tasked
  contractors as financially-motivated ransomware operators
  servicing intelligence requirements.
