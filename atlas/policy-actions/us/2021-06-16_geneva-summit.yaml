date: 2021-06-16
summary: |
  Biden-Putin Geneva summit. Biden presented Putin with a list of 16
  US critical-infrastructure sectors as "off-limits" for Russian
  cyber operations — the most explicit redline-declaration of US
  cyber doctrine in the post-NotPetya era. The summit followed the
  May 2021 Colonial Pipeline and JBS ransomware attacks. Cited in
  the September 2021 SUEX action and the September 2022 White House
  ransomware-summit follow-through.
