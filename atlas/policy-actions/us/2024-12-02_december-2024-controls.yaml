id: us/2024-12-02_december-2024-controls
issued_by_state_id: us
targets_state_ids: [cn]
action_type: export-control
date: 2024-12-02
summary: |
  US Commerce / BIS issued the most expansive entity-list and
  semiconductor-equipment package since the original October-7
  rule — 140 PRC entities added (including SME firms Naura, AMEC,
  ACM Research subsidiaries), HBM (high-bandwidth memory) controls
  explicitly aimed at denying AI-accelerator memory stacks, and
  software-toolchain (EDA) controls. Last major Biden-era China
  controls package; effective heading into the administration
  change.
official_url: https://www.federalregister.gov/documents/2024/12/05/
significance: high
