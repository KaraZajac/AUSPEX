date: 2025-01-17
summary: |
  US Treasury OFAC designated Sichuan Juxinhe Network Technology Co.
  Ltd. — an MSS contractor — and Yin Kecheng (again) for the Salt
  Typhoon intrusions of at least nine US telecommunications providers
  including AT&T, Verizon, and Lumen, exposing call-records of senior
  US officials. The watershed PRC-telco doctrine action. Followed by
  May 2025 Senate Intelligence hearings naming Salt Typhoon as the
  worst US telecom compromise in history.
