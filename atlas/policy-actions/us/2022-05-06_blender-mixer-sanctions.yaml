id: us/2022-05-06_blender-mixer-sanctions
issued_by_state_id: us
targets_state_ids: [kp]
action_type: sanction
date: 2022-05-06
summary: |
  US Treasury OFAC designated Blender.io — the first sanctioning of
  a virtual currency mixer — for laundering ~USD 20.5M of the
  Lazarus Group's Ronin Bridge proceeds. Established the playbook
  later used against Tornado Cash and Sinbad: target the privacy
  infrastructure, not just the wallets.
