action_type: indictment
date: 2018-10-04
summary: |
  US DOJ indicted seven GRU 26165 officers (Aleksei Morenets, Yevgeniy
  Serebriakov et al.) for close-access hacking operations against
  WADA, the OPCW (during Skripal poisoning investigation), Westinghouse
  nuclear, and IAAF — coordinated with Dutch MIVD's public revelation
  of the Hague-airport-parking-lot Wi-Fi access attempt. First
  documentation of GRU 26165 *physical* close-access cyber teams.
