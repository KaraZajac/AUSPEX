summary: |
  US DOJ unsealed second APT41 indictment naming five Chinese
  nationals (Jiang Lizhi, Qian Chuan, Fu Qiang, Zhang Haoran, Tan
  Dailin) and two Malaysian co-conspirators tied to Chengdu 404
  Network Technology. Canonical APT41 documentation: state-tasked
  intrusions in ~100 companies plus simultaneous criminal monetization
  via cryptojacking and game-currency theft. The "two-faced" PRC
  contractor cluster — illustrative of MSS-MPS tasking ambiguity.
