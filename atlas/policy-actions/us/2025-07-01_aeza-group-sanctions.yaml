targets_state_ids: [ru]
action_type: sanction
date: 2025-07-01
summary: |
  US Treasury OFAC designated Aeza Group, a Russian bulletproof
  hosting provider servicing post-LockBit ransomware operators
  (BianLian, RedLine, Meduza, Lumma stealer) and Russian
  state-affiliated information-operation infrastructure. Coordinated
  with UK NCSC. Part of the post-Operation-Cronos
  bulletproof-hosting accountability push.
