notes: |
  Historically the highest-volume cyber-targeting window in the US
  political calendar: state-election-office intrusion attempts, voter-roll
  data exfiltration, candidate-campaign phishing, and influence
  operations (RU GRU 26165 / SVR / IRGC-IO / MSS observed in prior cycles
  per CISA, FBI, ODNI joint advisories 2016, 2018, 2020, 2022, 2024).
  Expect peak operational tempo 90 days pre-election; influence-op
  amplification across August-November 2026.
