date: 2022-08-09
summary: |
  US CHIPS and Science Act signed into law (P.L. 117-167), authorizing
  ~USD 52.7B in semiconductor manufacturing subsidies, a 25%
  investment tax credit for fab equipment, and ~USD 200B in
  science-funding authorizations. Crucially included a 10-year
  "China guardrail" prohibiting recipient firms from expanding
  leading-edge production in China. The economic-statecraft pair
  to the BIS October-7 controls — incentive plus restriction.
