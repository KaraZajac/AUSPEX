targets_state_ids: [kp]
action_type: sanction
date: 2023-11-29
summary: |
  US Treasury OFAC designated Sinbad.io, a Bitcoin mixer servicing
  Lazarus Group laundering of proceeds from Horizon Bridge (USD
  100M), Atomic Wallet (USD 100M), and other thefts. Successor to
  Blender.io (sanctioned May 2022) — Sinbad operators had reportedly
  recycled Blender infrastructure.
