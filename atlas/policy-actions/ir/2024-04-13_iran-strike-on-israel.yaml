summary: |
  First-ever direct Iranian state-level ballistic-missile and drone
  attack against Israel — ~300 projectiles in retaliation for the
  April 1, 2024 Damascus consulate strike. Most projectiles
  intercepted. Marked decisive escalation in the Iran-Israel direct
  conflict track; correlated with elevated IRGC-IO / MOIS cyber
  posture against Israeli and US-aligned regional targets through
  2024-2025.
