date: 2025-06-13
summary: |
  Israel launched Operation Rising Lion, a sustained air-and-missile
  campaign against Iranian nuclear and missile-production sites
  including Natanz, Fordow, and IRGC headquarters. US joined the
  campaign with B-2 strikes on Fordow on June 22. Iran retaliated
  with missile barrages including a strike on US Al-Udeid airbase
  in Qatar. Twelve-day war ended in ceasefire June 24. Followed by
  IRGC-IO cyber-retaliation wave against US, Israeli, and Gulf
  targets through Q3 2025.
