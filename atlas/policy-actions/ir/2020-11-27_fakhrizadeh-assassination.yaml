targets_state_ids: [ir]
action_type: political-transition
date: 2020-11-27
summary: |
  Assassination of Iranian nuclear scientist Mohsen Fakhrizadeh near
  Tehran via remote-controlled gunfire — widely attributed to
  Israeli Mossad. Triggered an Iranian cyber-retaliation wave including
  the Pay2Key ransomware-as-influence-op against Israeli firms
  (attributed to Fox Kitten / APT34) and elevated MOIS/IRGC operations
  against Israeli infrastructure through 2021-2022.
