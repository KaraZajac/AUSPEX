summary: |
  Projected Iranian satellite-launch-vehicle (SLV) test window —
  spring 2026. Pattern-based (Iran has conducted SLV tests
  approximately bi-annually since 2020, with launches from Imam
  Khomeini Spaceport and Shahroud). Each launch is treated by US
  State / IISS as dual-use for ballistic-missile technology
  development.
