notes: |
  Iranian SLV tests draw US/IL/Five Eyes / Sunni-Gulf intelligence-
  collection focus on launch telemetry, payload analysis, and post-
  test reactor / centrifuge correlated activity. Watch for Mossad-
  attributed pre-launch interdiction operations (kinetic and cyber)
  during pre-launch staging windows. Iranian SLV programmes feed
  into the IRGC-Aerospace-Force missile capability arc.
