date: 2024-10-01
summary: |
  Second large-scale Iranian ballistic-missile strike against Israel
  (~180 missiles) following the Israeli decapitation campaign against
  Hezbollah leadership (Nasrallah killed 2024-09-27). Triggered the
  Israeli October 26 strike on Iranian air-defense and
  missile-production sites — the most kinetic Iran-Israel exchange
  to date. IRGC-IO cyber operations against Israel surged in the
  30-day window following.
