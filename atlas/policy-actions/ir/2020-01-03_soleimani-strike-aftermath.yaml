action_type: military-exercise
date: 2020-01-03
summary: |
  US Reaper-strike at Baghdad International Airport killed IRGC-Quds
  Force commander Qasem Soleimani. Triggered an immediate Iranian
  cyber-retaliation wave: APT39 / APT33 / OilRig activity against
  US Government, defense, energy, and financial-sector targets;
  defacements of US municipal websites; the January 8, 2020
  Iranian ballistic-missile strike on Al-Asad airbase. Single
  highest-volume Iranian state-cyber response event in the AUSPEX
  timeline.
