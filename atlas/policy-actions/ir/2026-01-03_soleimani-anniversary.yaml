summary: |
  Sixth anniversary of the US strike that killed IRGC Quds Force
  commander Qasem Soleimani in Baghdad (3 January 2020). Annual
  observance with state speeches by Supreme Leader's office, IRGC
  commemorations, and historically a retaliation-pressure window
  for IRGC-aligned cyber and kinetic actions.
official_url: null
confidence: confirmed
sources:
  - wikipedia/upcoming-elections-calendar
notes: |
  Recurring annual cyber-pressure window. IRGC-IO and MOIS-aligned
  actors (APT35/Charming Kitten, APT42, MuddyWater) historically
  spike phishing and influence-op tempo against US, Israeli, Saudi
  and UAE targets in the 7-14 days surrounding 3 January. Iranian-
  aligned hacktivist personas (Cyber Av3ngers, Handala, IRGC-claimed
  fronts) issue retaliation-themed statements. Watch ICS-water/-
  energy targeting in the US in the week of the anniversary
  (pattern: 2021, 2022, 2023, 2024, 2025).
