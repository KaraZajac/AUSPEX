id: 2021-11/mandiant-unc1151-microbackdoor-tooling
name: Mandiant attributes UNC1151 (the Ghostwriter operator) to the Belarusian government with high confidence
start_date: 2017-01-01
disclosure_date: 2021-11-16
end_date: null
incident_type:
  - documentary
  - espionage
initial_vector: phishing
outcome_summary: |
  In a November 16, 2021 follow-on to its April 2021 report,
  Mandiant published its first high-confidence nation-state
  attribution of UNC1151 — the cyber-espionage cluster that
  provides technical support to the Ghostwriter influence campaign
  — assessing "with high confidence that UNC1151 is linked to the
  Belarusian government and with moderate confidence is linked to
  the Belarusian military." Mandiant stated that "sensitive
  technical information locates the operation in Minsk, Belarus and
  links it to the Belarusian Military," that it has tracked UNC1151
  since 2017 with a targeting focus on Ukraine, Lithuania, Latvia,
  Poland, and Germany, and that it assessed "with moderate
  confidence that Belarus is also likely at least partially
  responsible for the Ghostwriter campaign." It added that it
  "cannot rule out Russian contributions to either UNC1151 or
  Ghostwriter" but had "not uncovered direct evidence of such
  contributions," noting UNC1151 has "no overlaps with other
  tracked Russian groups, including APT28, APT29, Turla, Sandworm,
  and TEMP."
false_flag_risk: none
summary: |
  Mandiant's foundational nation-state attribution of the
  Ghostwriter / UNC1151 cluster to Belarus, published seven months
  after its April 2021 report tying UNC1151 to Ghostwriter (which
  named no nation). The attribution is graduated, not flat: HIGH
  confidence linking UNC1151 to the Belarusian government, MODERATE
  confidence to the Belarusian military, and MODERATE confidence
  that Belarus is at least partially responsible for the Ghostwriter
  campaign itself. Mandiant did not rule out Russian contributions
  but reported no direct evidence of them — a hedge that matters
  because two Western government attributions (Germany 2021-09-06,
  EU Council 2021-09-24) instead named Russia / the GRU, leaving a
  standing Belarus-vs-Russia contest recorded on the actor.
  NB: this event was previously mis-framed around a non-existent
  Mandiant "MicroBackdoor variants in Belarus-aligned operations"
  report. No such Mandiant report exists — that title is a corrupted
  copy of Cluster25/DuskRise's real "Ghostwriter / UNC1151 Adopts
  Microbackdoor Variants in Cyber Operations Against Ukraine" (March
  8, 2022), and the Nov-16-2021 Mandiant report carries zero mentions
  of MicroBackdoor. The fabricated tooling narrative was stripped and
  the event re-anchored to Mandiant's actual Belarus attribution (see
  qc).
attributions:
  - actor_id: by/unscoped/ghostwriter
    attributing_org: Mandiant
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2021-11-16
    attribution_source_id: mandiant/2021-04-28_ghostwriter-unc1151
    notes: |
      Graduated attribution — do NOT over-specify to a flat "Belarus"
      or to a named unit. Mandiant states HIGH confidence UNC1151 is
      "linked to the Belarusian government," MODERATE confidence "linked
      to the Belarusian military," and MODERATE confidence that Belarus
      is "at least partially responsible for the Ghostwriter campaign."
      attribution_level=nation reflects the HIGH-confidence government
      (state) link; the Belarusian-military lean is only MODERATE, so it
      is deliberately NOT raised to named-unit. Russia hedge preserved:
      "We cannot rule out Russian contributions to either UNC1151 or
      Ghostwriter. However, at this time, we have not uncovered direct
      evidence of such contributions." auspex_assessment=concur follows
      the canonical actor homing (by/unscoped/ghostwriter, Belarus nexus)
      while the Germany/EU-Council Russia-attribution contest is flagged
      on the actor record, not resolved here.
doctrine_links:
  - doctrine_id: by/concept-info-security-2019
    pillar_id: by/concept-info-security-2019/information-sphere-defense
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale
    reasoning: |
      Mandiant attributes UNC1151 to the Belarusian government (high
      confidence) and reports that observed Ghostwriter narratives are
      "consistent with Belarusian government interests," assessing
      Belarus "at least partially responsible for the Ghostwriter
      campaign" — anti-NATO / pro-regime narrative operations run in the
      service of Belarusian state information objectives, the substance
      of the 2019 Concept of Information Security's information-sphere-
      defense pillar. Strongly_inferred (not attested) because the source
      corroborates the alignment with government interests but does not
      name the 2019 doctrine or articulate its terminal goal.
    attesting_source_id: null
    inference_basis:
      source_id: mandiant/2021-04-28_ghostwriter-unc1151
      signals:
        - "Mandiant: 'assesses with high confidence that UNC1151 is linked to the Belarusian government and with moderate confidence is linked to the Belarusian military'"
        - "Mandiant: 'UNC1151 provides technical support to the Ghostwriter information operations campaign; this assessment, along with observed Ghostwriter narratives consistent with Belarusian government interests, causes us to assess with moderate confidence that Belarus is also likely at least partially responsible for the Ghostwriter campaign'"
        - "Mandiant distinguishes UNC1151 from Russian groups — tracked 'since 2017, and during this time there have been no overlaps with other tracked Russian groups, including APT28, APT29, Turla, Sandworm, and TEMP' — supporting a Belarusian, not Russian, operator"
      alternatives:
        - "Russian information confrontation (ru/info-security-2016): two Western government attributions cited on the actor — the German Federal Foreign Office (2021-09-06) and the EU Council (2021-09-24) — instead named Russia / the GRU, and Mandiant itself 'cannot rule out Russian contributions.' If the true sponsor were Russia, the operative doctrine would be Russian information confrontation, not Belarusian information-sphere defense."
    counter_explanation: |
      The Belarus-vs-Russia contest is live at the nation level: Germany
      and the EU Council formally attributed Ghostwriter to Russia, so a
      Russian-doctrine reading survives. This source, however,
      affirmatively distinguishes UNC1151 from tracked Russian groups and
      locates the operation in Minsk, favouring the Belarusian reading.
    contested: true
    analyst: claude
