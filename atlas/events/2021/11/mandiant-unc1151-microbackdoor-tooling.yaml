qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-10
  level: full
  notes: |
    PHANTOM/FABRICATED-TOOLING remediation, path = RE-SOURCE + correct-to-
    truthful-minimum. Audited against the captured primary
    mandiant/2021-04-28_ghostwriter-unc1151 (raw_snapshot
    mandiant__2021-04-28_ghostwriter-unc1151.html, sha256
    d273878617f53e9674944dbb49b295682bbdc0316dbb78f12bd2e08f9f7ea095) — which,
    despite its April-dated slug, IS Mandiant's captured NOVEMBER 16, 2021
    report "UNC1151 Assessed with High Confidence to have Links to Belarus,
    Ghostwriter Campaign Aligned with Belarusian Government Interests"
    (snapshot dateline "November 16, 2021"; the original April URL 301-redirects
    to it; resolved in that record 2026-07-01).

    CORE DEFECT (fabricated tooling + phantom source): the event was built around
    a Mandiant report titled "Ghostwriter / UNC1151 Adopts MicroBackdoor Variants
    in Belarus-aligned Operations," cited to mandiant/2021-11-16_unc1151-belarus-link
    (url .../ghostwriter-unc1151-microbackdoor/). NO such Mandiant report exists:
    (1) the cited cloud.google.com URL returns only a client-side JS shell (HTTP
    200, <title>Google Cloud Blog</title>, zero "belarus", the three "microbackdoor"
    hits are the slug echoed in nav JSON — no article body); (2) the title is a
    corrupted copy of Cluster25/DuskRise's REAL report "Ghostwriter / UNC1151 Adopts
    Microbackdoor Variants in Cyber Operations Against Ukraine" (March 8, 2022) with
    "Cyber Operations Against Ukraine" swapped for "Belarus-aligned Operations" and
    publisher/date restamped to Mandiant / 2021-11-16; (3) the genuine, captured
    Nov-16-2021 Mandiant report carries ZERO occurrences of "MicroBackdoor." The
    entire "adoption and adaptation of the open-source MicroBackdoor implant" outcome
    was therefore fabricated for this date/publisher and STRIPPED. The MicroBackdoor
    tradecraft is real but belongs to Cluster25's March 2022 Ukraine reporting (a
    separate, later event), not to Mandiant's Nov 2021 Belarus attribution.

    RE-ANCHORED the event to what Mandiant's Nov-16-2021 report actually is: its
    first high-confidence Belarus attribution of UNC1151 (an unrepresented event the
    sibling 2021-04 disclosure forward-references — "the high-confidence Belarus
    attribution came only in Mandiant's later November 16, 2021 follow-on"). NOT a
    duplicate (April = UNC1151<->Ghostwriter link, no nation; 2021-09 = EU/Council
    attribution). Removed the phantom mandiant/2021-11-16_unc1151-belarus-link from
    sources[] and re-pointed sources[] + attribution_source_id to the captured real
    report.

    [a] FACTS (all now source-carried, verbatim from the snapshot): "Mandiant
    Threat Intelligence assesses with high confidence that UNC1151 is linked to the
    Belarusian government and with moderate confidence is linked to the Belarusian
    military." "Sensitive technical information locates the operation in Minsk,
    Belarus and links it to the Belarusian Military." "UNC1151 provides technical
    support to the Ghostwriter information operations campaign; this assessment,
    along with observed Ghostwriter narratives consistent with Belarusian government
    interests, causes us to assess with moderate confidence that Belarus is also
    likely at least partially responsible for the Ghostwriter campaign." "UNC1151 has
    targeted a wide variety of governmental and private sector entities, with a focus
    in Ukraine, Lithuania, Latvia, Poland, and Germany." "We cannot rule out Russian
    contributions to either UNC1151 or Ghostwriter. However, at this time, we have
    not uncovered direct evidence of such contributions." "Mandiant has tracked
    UNC1151 since 2017, and during this time there have been no overlaps with other
    tracked Russian groups, including APT28, APT29, Turla, Sandworm, and TEMP."
    STRIPPED (fabricated / not in any real Mandiant source): the MicroBackdoor
    adoption/adaptation narrative, "infrastructure overlaps," "combined-influence-
    and-intrusion tradecraft after initial public exposure," and the claim of
    "Russian operational coordination" (Mandiant's actual wording is a hedge — it
    "cannot rule out" but has "not uncovered direct evidence").

    [b] ATTRIBUTION: Mandiant, HIGH confidence UNC1151<->Belarusian government;
    MODERATE UNC1151<->Belarusian military; MODERATE that Belarus is partially
    responsible for Ghostwriter. attributing_org_confidence=high reflects the
    headline government link; attribution_level=nation (deliberately NOT named-unit
    — the military lean is only moderate). auspex_assessment=concur per canonical
    actor homing. Did NOT over-specify to a Belarusian service/unit; the actor is
    correctly by/unscoped/ghostwriter (no cited source names a specific Belarusian
    service).

    [c] DATES: disclosure_date 2021-11-16 = the report's dateline (verified in
    snapshot text). start_date corrected 2021-04-01 (unsourced) -> 2017-01-01,
    source-carried: "Mandiant has tracked UNC1151 since 2017" / "Since 2017, UNC1151
    operations have leveraged evolving but contiguous TTPs." end_date null (ongoing
    cluster). Source published_on for the primary is 2021-11-16 (already corrected
    in that record; its id-slug still reads 2021-04-28 per the stable-slug rule).

    [d] DOCTRINE: kept by/concept-info-security-2019/information-sphere-defense at
    strongly_inferred (up from the sibling April event's plausible, because this
    source now carries the high-confidence Belarus-government link + narratives
    "consistent with Belarusian government interests"), NOT attested (the source does
    not name the 2019 doctrine or its terminal goal). perspective=attacker-rationale
    (Belarus's own doctrine on Belarusian operations). contested=true with
    inference_basis.signals[] + alternatives[] (the live Russia reading: Germany
    2021-09-06 and EU Council 2021-09-24 named Russia/GRU) + counter_explanation.
    attesting_source_id=null.

    [e] ATTRIBUTION_LEVEL: set nation (was missing) — the HIGH-confidence Belarusian-
    government (state) link; not raised to named-unit despite the moderate military
    lean.

    [f] ACTOR_ID: by/unscoped/ghostwriter resolves (atlas/actors/by/ghostwriter.yaml);
    no actor edit made. incident_type corrected [disclosure, intrusion] ->
    [documentary, espionage] (a vendor attribution report about an espionage cluster).
    TARGETS re-set to the report's stated focus countries using resolving ids:
    orgs/polish-government (pl), orgs/ukrainian-government (ua), sectors/government
    (lt, lv, de). Dropped orgs/lithuanian-government (DANGLING — no target file) and
    upgraded Ukraine primary=collateral (the report lists Ukraine first in its focus
    set, not as collateral).

    FLAGS for orchestrator (out of single-event remit): (1) RETIRE candidate
    mandiant/2021-11-16_unc1151-belarus-link — a phantom: its title/publisher/date/url
    are a fabricated mashup of Cluster25/DuskRise's real March-8-2022 Ukraine report;
    it is NOT a distinct Nov-2021 Mandiant report (correcting the 2026-07-01 note in
    mandiant/2021-04-28_ghostwriter-unc1151, which wrongly assumed "two distinct
    Nov-2021 Mandiant reports"). Its other citers — actor by/unscoped/ghostwriter and
    event 2020-09/ghostwriter-poland-government-leaks — cite it AS the Nov-2021 Belarus
    source and should be re-pointed to mandiant/2021-04-28_ghostwriter-unc1151. (2)
    The event id-slug "mandiant-unc1151-microbackdoor-tooling" is now a misnomer;
    consider re-slug to a belarus-attribution slug. (3) If AUSPEX wants the Cluster25
    March-2022 MicroBackdoor-vs-Ukraine tradecraft represented, it is a NEW event +
    new cluster25 source (candidate fold with 2022-02/ghostwriter-ukraine-targeting-
    invasion-eve), not this record.
