id: 2021-11/mandiant-unc1151-microbackdoor-tooling
name: Mandiant follow-on — UNC1151 adopts MicroBackdoor variants in Belarus-aligned operations
start_date: 2021-04-01
disclosure_date: 2021-11-16
end_date: null
incident_type:
  - disclosure
  - intrusion
initial_vector: phishing
outcome_summary: |
  Mandiant published a follow-on to its April 2021 UNC1151
  attribution, documenting the cluster's adoption and adaptation
  of the open-source MicroBackdoor implant in Belarus-aligned
  operations following the public attribution. The report
  detailed UNC1151 infrastructure overlaps, additional victim
  targeting in Poland, Lithuania, and Ukraine, and the cluster's
  continued combined-influence-and-intrusion tradecraft after
  initial public exposure.
false_flag_risk: low
summary: |
  Important reinforcement of the April 2021 attribution: documents
  that UNC1151 continued to operate (rather than going dark) after
  the Mandiant disclosure, and provides additional tooling
  fingerprints (MicroBackdoor variants) for downstream tracking.
  The Ghostwriter / UNC1151 cluster-attribution debate (Belarus
  vs. Russia, or joint) remains active in vendor reporting —
  Mandiant's position is firmly Belarus-aligned with Russian
  operational coordination.
