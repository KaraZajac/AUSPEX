id: 2021-11/revil-vasinskyi-indictment
name: DOJ indictments of REvil operators Vasinskyi and Polyanin
start_date: 2021-10-08  # Vasinskyi arrest in Poland
disclosure_date: 2021-11-08
end_date: 2024-05-01  # Vasinskyi sentencing
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  DOJ unsealed indictments against Yaroslav Vasinskyi (Ukrainian
  national, 22, alleged Kaseya operator) and Yevgeniy Polyanin
  (Russian national, 28, alleged JBS operator) for REvil
  intrusions. Vasinskyi arrested in Poland Oct 8 2021 and
  extradited to the US March 2022; convicted by jury May 2024,
  sentenced to 13 years and ordered to pay USD 16M restitution.
  Polyanin remains at large; USD 6.1M in cryptocurrency seized
  from Polyanin wallets. Treasury OFAC concurrently sanctioned
  REvil (named SDN entity) and the Chatex cryptocurrency exchange.
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
operators_named:
  - vasinskyi-yaroslav  # REvil, DOJ Nov 2021
  - polyanin-yevgeniy  # REvil, DOJ Nov 2021
summary: |
  First successful US prosecution of a major ransomware-as-a-
  service operator. Vasinskyi's Polish arrest + US extradition +
  conviction pathway became the model for subsequent Anglophone-
  jurisdictional cyber-criminal cases (Scattered Spider, UNC5537,
  Lapsus$).
