summary: |
  Administrative / law-enforcement counter-action — not a cyber
  operation — modeled as a US cost-imposition action against the
  criminal/revil ransomware-as-a-service brand. On Nov 8 2021 DOJ
  unsealed indictments against two REvil actors (Vasinskyi, the alleged
  Kaseya operator, and Polyanin) and seized USD 6.1M in ransom proceeds
  traceable to Polyanin; the case is "part of the Department of Justice's
  Ransomware and Digital Extortion Task Force," which DAG Monaco framed
  as continuing "to dismantle ransomware groups and disrupt the
  cybercriminal ecosystem." The same day, Treasury OFAC sanctioned the
  two operators and the Chatex exchange / support network, and the State
  Department offered up to USD 10M for REvil leadership. REvil is a
  criminal RaaS brand (stateless criminal/revil), NOT a state organ:
  neither cited source asserts a Russian-state nexus — the sole Russia
  token is Polyanin's nationality ("a Russian national"). Vasinskyi was
  later extradited (Mar 2022) and, after pleading guilty, sentenced May
  2024 — that disposition is modeled in the sibling event
  lockbit-2-vasinskyi-extradition. Siblings: 2021-07/kaseya-vsa (the
  underlying attack) and 2022-01/fsb-revil-raid (the Russian raid).
