    [a] FACTS — three material corrections + several tightenings.
    * "alleged JBS operator" (Polyanin) — FABRICATION, STRIPPED. "JBS"
      occurs 0x in BOTH raws. DOJ charges Polyanin with REvil attacks
      "against multiple victims, including businesses and government
      entities in Texas on or about Aug. 16, 2019" (the Texas local-gov
      mass attack, not JBS); Treasury: "Polyanin also deployed ransomware,
      targeting several U.S. government entities and private-sector
      companies." Prose now states the Texas Aug-2019 attacks.
    * "Treasury OFAC ... sanctioned REvil (named SDN entity)" — WRONG,
      CORRECTED. DOJ mentions no sanctions at all ("sanction" 0x in DOJ
      raw). Treasury designated the two INDIVIDUALS (Vasinskyi, Polyanin +
      "a company owned by Polyanin") and the Chatex exchange + its support
      network (IZIBITS OU, Chatextech SIA, Hightrade Finance Ltd) under
      E.O. 13694 — the REvil *group* was NOT an SDN designation. Treasury
      states verbatim: "Today's action does not implicate a sanctions
      nexus to any particular Ransomware-as-a-Service (RaaS) or variant"
      (2x in raw). What targeted the REvil group was a State Dept TOC
      REWARD offer (up to $10M leadership / $5M participants), now stated
      as such — not a designation.
    * "convicted by jury May 2024, sentenced to 13 years ... extradited
      ... March 2022" — these downstream facts are NOT carried by either
      Nov-2021 source, AND were factually wrong (bleepingcomputer
      2024-05-02: Vasinskyi "pleaded guilty," was sentenced to "13 years
      and seven months," not a jury conviction / bare 13 yr). REMOVED from
      this indictment event and cross-referenced to the sibling
      lockbit-2-vasinskyi-extradition, which carries the extradition/plea/
      sentencing with its own sources. end_date narrowed 2024-05-01 ->
      2021-11-08 (the counter-action date) accordingly.
    * VERBATIM-CARRIED and kept: "An indictment unsealed today charges
      Yaroslav Vasinskyi, 22, a Ukrainian national ... including the July
      2021 attack against Kaseya"; "Yevgeniy Polyanin, 28, a Russian
      national"; "seizure of $6.1 million in funds traceable to alleged
