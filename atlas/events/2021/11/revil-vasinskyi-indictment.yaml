outcome_summary: |
  Companion DOJ / Treasury counter-action of Nov 8 2021 against the
  Sodinokibi/REvil ransomware group. DOJ unsealed separate indictments
  charging Yaroslav Vasinskyi (Ukrainian national, 22) — alleged to be
  responsible for the July 2 2021 Kaseya VSA supply-chain attack — and
  Yevgeniy Polyanin (Russian national, 28), charged with REvil attacks
  against multiple victims including businesses and government entities
  in Texas on/about Aug 16 2019. Each is charged in a separate indictment
  with conspiracy to commit fraud, damage to protected computers, and
  conspiracy to commit money laundering (statutory maxima 115 and 145
  years, respectively). DOJ announced the seizure of USD 6.1M in funds
  traceable to ransom payments received by Polyanin (seizure warrant,
  N.D. Tex.). Vasinskyi had been arrested in Poland on Oct 8 2021 pending
  US extradition; Polyanin is believed to be abroad. (FBI also noted the
  arrests of two other REvil actors in Romania.) Concurrently, Treasury
  OFAC designated Vasinskyi and Polyanin (plus a company owned by
  Polyanin) and the Chatex virtual-currency exchange and its support
  network (IZIBITS OU, Chatextech SIA, Hightrade Finance Ltd) under E.O.
  13694; the State Department offered Transnational Organized Crime
  reward offers of up to USD 10M (REvil leadership) and USD 5M
  (participants). OFAC stated the group had received more than USD 200M
  in Bitcoin/Monero ransom payments.
false_flag_risk: none
