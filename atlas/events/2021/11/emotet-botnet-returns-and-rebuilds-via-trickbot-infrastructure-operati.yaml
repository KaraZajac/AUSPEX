id: 2021-11/emotet-botnet-returns-and-rebuilds-via-trickbot-infrastructure-operati
name: "Emotet botnet returns and rebuilds via TrickBot infrastructure ('Operation Reacharound')"
start_date: 2021-11-14
incident_type:
  - intrusion
  - supply-chain
initial_vector: unknown
false_flag_risk: none
summary: |
  In November 2021 researchers (Cryptolaemus, GData, AdvIntel) observed the Emotet botnet returning roughly ten months after its January 2021 law-enforcement takedown, rebuilt through existing TrickBot infrastructure in a process Cryptolaemus dubbed 'Operation Reacharound'. Rather than Emotet installing TrickBot as in the past, TrickBot was now dropping an Emotet loader (compilation timestamp Sun Nov 14 2021) onto already-infected devices, with over 246 compromised systems acting as command-and-control servers. The new Emotet build expanded its command set (7 commands, up from 3-4) with additional execution options for downloaded binaries, and abuse.ch published C2 server lists. The source describes botnet rebuilding and infrastructure but names no specific victim sectors, organizations, or countries for this event — and names no state, nation, or Russia nexus: it is a purely criminal botnet-rebuild report.
