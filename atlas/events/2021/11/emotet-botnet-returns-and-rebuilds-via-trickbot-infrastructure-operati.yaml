id: 2021-11/emotet-botnet-returns-and-rebuilds-via-trickbot-infrastructure-operati
name: "Emotet botnet returns and rebuilds via TrickBot infrastructure ('Operation Reacharound')"
start_date: 2021-11-14
incident_type:
  - intrusion
  - supply-chain
initial_vector: unknown
false_flag_risk: none
summary: |
  In November 2021 researchers (Cryptolaemus, GData, AdvIntel) observed the Emotet botnet returning roughly ten months after its January 2021 law-enforcement takedown, rebuilt through existing TrickBot infrastructure in a process Cryptolaemus dubbed 'Operation Reacharound'. Rather than Emotet installing TrickBot as in the past, TrickBot was now dropping an Emotet loader (compiled 14 November 2021) onto already-infected devices, with over 240 compromised systems acting as command-and-control servers. The new Emotet build expanded its command set (about seven commands) with additional execution options for downloaded binaries, and abuse.ch published C2 server lists. The source describes botnet rebuilding and infrastructure but names no specific victim sectors, organizations, or countries for this event.
