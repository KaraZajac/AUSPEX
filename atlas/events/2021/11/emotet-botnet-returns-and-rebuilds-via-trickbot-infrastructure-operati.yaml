    ts 'Sun Nov 14 20:50:34 2021'; 7 commands up from 3-4 + execution options for downloaded binaries;
    abuse.ch C2 lists; over 246 C2 devices. CORRECTIONS: '240'->'246' (exact); added attribution_level:
    named-actor; removed the misleading 'mapped from ICD link-confidence' comment on org-confidence; removed
