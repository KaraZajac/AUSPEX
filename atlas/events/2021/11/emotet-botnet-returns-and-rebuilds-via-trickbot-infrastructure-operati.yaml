    strings on the page are an unrelated 'Related Articles' link (Kazuar). It is a purely CRIMINAL botnet-
    rebuild report; the only actor named is the Emotet/TA542 crew (jokingly 'Ivan' in a Cryptolaemus tweet).
    attribution_level therefore = named-actor (NOT nation/named-unit); confidence kept moderate; assessment
    concur-with-caveat. doctrine_links left [] : source states no strategic purpose AND the actor's only
    candidate doctrine (ru/sanctions-response-2022) postdates this event (issued 2022-02-24) -> anachronism.
    ACTOR CONSISTENCY (ru/proxies/emotet, marked DONE, NOT modified): the ru/proxies/ placement is loose — it
    rides on Emotet's coupling to TrickBot/Conti/Wizard Spider (FSB Center 18 / ContiLeaks 2022; Treasury 2023
