        - "Israeli companies are the primary victim set (both sources); Israel is 'the main target of the group' (Cybereason)."
        - "Cybereason: goals 'aligned with Iran's cyber warfare doctrine, seeking to sabotage ... its geo-political opponents'."
      ruled_out: "Not a source-attested Iran-directed op — the Iran-doctrine attachment is inferred; Check Point declines nation attribution and notes Palestinian-territory artifacts (OICe.exe from Palestine, GMT+3 leak-site metadata), an alternative that keeps the confidence below attested."
    attesting_source_id: null
