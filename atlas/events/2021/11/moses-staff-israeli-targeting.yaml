id: 2021-11/moses-staff-israeli-targeting
name: Moses Staff emergence — no-ransom destructive hack-and-leak against Israeli companies
start_date: 2021-09-01   # Check Point: "In September 2021, the hacker group MosesStaff began targeting Israeli organizations"
disclosure_date: 2021-11-15  # Check Point report (byline "November 15, 2021"; meta article:published_time 2021-11-15T10:17:04+00:00)
end_date: 2022-01-12   # last activity documented by the cited sources (Cybereason StrifeWater report; group reported "still active"). Continued persona activity into 2023 is the separate 2023-01 Abraham's Ax sibling event.
incident_type:
  - intrusion
  - data-theft
  - leak
  - destructive
initial_vector: n-day   # Check Point: "known vulnerabilities" that "are not zero days" in public-facing infrastructure (asserted "presumably")
outcome_summary: |
  Israeli companies (Israel the primary target) had networks
  encrypted by the DiskCryptor-based DCSrv payload — deployed by
  the PyDCrypt loader — with NO ransom demand and NO decryption
  option (encryption used for destruction, not extortion). Stolen
  data was leaked via a "MosesStaff" Telegram channel
  (t.me/moses_staff) and the moses-staff[.]se site. Cybereason
  additionally observed victims in finance, energy, manufacturing,
  government and utilities across several countries.
false_flag_risk: none
summary: |
  Moses Staff (MosesStaff) is a hacktivist-persona group that
  emerged in September 2021 attacking Israeli companies, leaking
  their data and encrypting their networks with, in Check Point's
  words, "no ransom demand and no decryption option; their motives
  are purely political." The group's own stated purpose is to
  "Fight against the resistance and expose the crimes of the
  Zionists in the occupied territories."

  Check Point documents initial access "presumably" via known
  (non-zero-day) vulnerabilities in public-facing infrastructure
  "such as Microsoft Exchange Servers," followed by a
  password-protected webshell for persistence, and lateral
  movement with compromised administrator credentials over PsExec,
  WMIC and PowerShell. The Python PyDCrypt loader spreads through
  the network and drops DCSrv — a custom encryptor built on the
  open-source DiskCryptor driver — which locks volumes with a
  bootloader and offers no working decryptor, which Check Point
  reads as "an attempt to cause irreversible damage." Cybereason
  (Jan 2022) adds StrifeWater, a stealthy RAT used in the initial
  stage (masqueraded as calc.exe and self-deleting before the
  encryptor runs, to frustrate forensics). Stolen documents are
  posted to a "MosesStaff" Telegram channel and the moses-staff[.]se
  leak site as anti-Israel hack-and-leak.

  Attribution is HEDGED. Cybereason calls it "the Iranian hacker
  group known as Moses Staff" and assesses that it "leverages cyber
  espionage and sabotage to advance Iran's geopolitical goals,"
  with goals "aligned with Iran's cyber warfare doctrine" — an Iran
  NEXUS with NO named Iranian service (no IRGC/MOIS/Quds). Check
  Point, the primary-access report, explicitly DECLINES nation
  attribution ("we can't draw any definitive conclusions") and its
  only artifacts point toward the Palestinian territories (the
  OICe.exe tool "submitted to VT from Palestine"; leak-site image
  metadata created in the GMT+3 timezone "of Israel and the
  Palestinian territories"). Check Point places Moses Staff as a
  SEPARATE group from the earlier Pay2Key and BlackShadow gangs —
  which "demand[ed] money" and ran public ransom negotiations —
  distinguishing Moses Staff precisely by its refusal to demand a
  ransom; the corpus keeps Moses Staff DISTINCT from Pay2Key /
  Black Shadow / Agrius. Actor tracked at ir/unscoped/moses-staff
  (Iran-aligned, service unscoped).
attributions:
  - actor_id: ir/unscoped/moses-staff
    attributing_org: Check Point
    attributing_org_confidence: moderate
    attribution_level: named-actor   # names the MosesStaff persona; explicitly DECLINES nation attribution -> not nation/named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-11-15
    attribution_source_id: checkpoint/2021-11_moses-staff
    notes: |
      Check Point discovered and named the MosesStaff persona but
      explicitly DECLINES nation attribution: "Attributing
      politically motivated cyberattacks is always complicated ...
      we can't draw any definitive conclusions." Its only
      attribution artifacts point toward the Palestinian territories
      (OICe.exe "submitted to VT from Palestine"; leak-site image
      metadata authored in GMT+3, "the time zone of Israel and the
      Palestinian territories"). So this source carries the
      named-actor identification and the no-ransom / destructive
      finding, but NOT the Iran nexus — hence concur-with-caveat.
  - actor_id: ir/unscoped/moses-staff
    attributing_org: Cybereason
    attributing_org_confidence: moderate
    attribution_level: named-actor   # "Iranian APT Moses Staff" — actor + Iran nexus; NO Iranian service named -> not named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-01-12
    attribution_source_id: cybereason/2022_moses-staff
    notes: |
      Cybereason Nocturnus tracks "the Iranian hacker group known as
      Moses Staff" and assesses it "leverages cyber espionage and
      sabotage to advance Iran's geopolitical goals," with goals
      "aligned with Iran's cyber warfare doctrine." Iran NEXUS at
      named-actor level; NO IRGC/MOIS/Quds or any Iranian service is
      named ("State-Sponsored Ransomware" is a motive subheading,
      not a service attribution) — hence ir/unscoped and
      concur-with-caveat.
