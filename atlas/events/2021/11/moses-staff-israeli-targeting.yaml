    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Moses Staff is a named hacktivist persona (a "MosesStaff"
      Telegram channel + moses-staff[.]se leak site) running
      destructive, no-ransom coercive operations against Israeli
      civilian companies while deliberately obfuscating its arsenal
      (Cybereason: StrifeWater masqueraded as calc.exe and
      self-deleted before the encryptor ran; ransomware used "to
      obfuscate espionage activity" and "advance Iran's geopolitical
      goals"). That is the deniable persona-laundering pattern this
      pillar describes, and the pillar names Moses Staff itself as
      an example ("Moses Staff -> Iran-aligned (inferred)"). NOT
      attested: no cited source confirms STATE DIRECTION or names an
      Iranian service — Cybereason hedges ("seem aligned",
      "assessed") and Check Point declines nation attribution
      outright — so the laundering-of-state-ops reading is AUSPEX's
      strongly-inferred WHY, not a source-attested fact.
    perspective: attacker-rationale
    inference_basis:
      signals:
        - "Named hacktivist persona claims and publishes the ops on a Telegram channel + moses-staff[.]se leak site, affording a state sponsor plausible deniability."
        - "Tooling deliberately masqueraded (StrifeWater as calc.exe) and self-deleted to frustrate forensics (Cybereason)."
        - "Cybereason assesses the ransomware is used 'to obfuscate espionage activity' and to 'advance Iran's geopolitical goals'."
        - "This doctrine's persona-laundering pillar lists Moses Staff as an example persona (Iran-aligned, inferred)."
      ruled_out: "Financially-motivated ransomware — both Check Point ('no ransom demand and no decryption option; their motives are purely political') and Cybereason ('will leak sensitive information without demanding a ransom fee') state encryption was for destruction, not extortion."
