  notes: |
    Opus 4.8 / effort max. Full 6-point audit of the event vs the two
    cited RAW snapshots (both already captured + hashed on 2026-06-24;
    hashes RE-VERIFIED intact this pass):
      checkpoint/2021-11_moses-staff  sha256 d32a0fd1…21aa1ef · 199,908 B
      cybereason/2022_moses-staff     sha256 721fddec…9cd692d8 · 86,162 B
    Both fetched HTTP 200 with full article text -> level: full. PRESERVE
    tier: source records left untouched (tier/url correct; snapshots +
    audit notes already present from 2026-06-24).

    [a] FACTS — STRIPPED a fabricated/garbled cross-group paragraph, the
    same class of defect the shirbit + cyberserve audits found. The prior
    summary claimed "PyDCrypt uses DiskCryptor under the hood — same
    primitive Iran-linked Agrius / Pay2Key clusters use." WRONG on two
    counts: (1) it is DCSrv (not PyDCrypt) that is built on DiskCryptor —
    Check Point: "The complete encryption tool is based on a powerful 3rd
    party open-source tool called DiskCryptor"; Cybereason: PyDCrypt's
    "goal is to spread ... and to drop the payload 'DCSrv', a ransomware
    variant based on the publicly available tool DiskCryptor." PyDCrypt is
    the Python LOADER that drops DCSrv. (2) Neither source says Agrius or
    Pay2Key use DiskCryptor; Agrius is not mentioned at all, and Check
    Point treats Pay2Key/BlackShadow as SEPARATE predecessor groups that
    "demand[ed] money and conduct[ed] lengthy and public negotiations" —
    the OPPOSITE of Moses Staff — "Unlike those predecessors, however,
    they made an outright mistake when they put together their own
    encryption scheme." Moses Staff kept DISTINCT from Pay2Key / Black
    Shadow / Agrius per the corpus. Also STRIPPED "ProxyShell (CVE-2021-
    34473 / -34523 / -31207)": neither source names ProxyShell or any CVE;
    Check Point says only initial access "presumably ... known
    vulnerabilities in publicly facing infrastructure such as Microsoft
    Exchange Servers" that "are not zero days" -> hedged to that. STRIPPED
    unsourced sectors "engineering" and "retail": Check Point enumerates
    no sectors; Cybereason lists "Government, Finance, Travel, Energy,
    Manufacturing, and the Utilities industry" (no engineering, no retail)
    and notes multi-country targeting (Italy, India, Germany, Chile,
    Turkey, UAE, US) with "Israel ... the main target." STRIPPED the
    Microsoft aliases "Marigold Sandstorm / DEV-0500" and the editorial
    "service attribution less firm than CyberAv3ngers or HomeLand Justice"
    from the event prose (not carried by either cited source; the aliases
    remain on the actor record). KEPT + verified: no ransom / no decryptor
    = destruction (Check Point: "There is no ransom demand and no
    decryption option; their motives are purely political"; "an attempt to
    cause irreversible damage"); webshell for persistence + PsExec/WMIC/
    PowerShell lateral movement with compromised admin creds; PyDCrypt ->
    DCSrv; StrifeWater RAT (Cybereason only); Telegram t.me/moses_staff +
    moses-staff[.]se leak site (Check Point bootloader message: "Hacked By
    <https://moses-staff.se> ! Join Us in Telegram : <https://t.me/
    moses_staff>"); stated anti-Zionist purpose.

    [b] ATTRIBUTION — Both entries carry actor_id ir/unscoped/moses-staff
    (the persona), auspex_assessment moved concur -> concur-with-caveat.
    Check Point: added a note that it explicitly DECLINES nation
    attribution ("we can't draw any definitive conclusions") and its only
    artifacts point to the Palestinian territories (OICe.exe "submitted to
    VT from Palestine"; GMT+3 leak-site image metadata) — so Check Point
    supports the named-actor ID and the no-ransom/destructive finding but
