id: 2021-11/moses-staff-israeli-targeting
name: Moses Staff emergence and Israeli engineering / manufacturing targeting
start_date: 2021-09-01
disclosure_date: 2021-11-15  # Check Point report
end_date: 2022-12-31
incident_type:
  - destructive
  - data-theft
  - influence-operation
initial_vector: n-day
outcome_summary: |
  Israeli engineering, finance, retail, and manufacturing firms
  hit by PyDCrypt encryption (no decryption offered); data
  leaks via Telegram channel.
false_flag_risk: none
summary: |
  Moses Staff (Marigold Sandstorm / DEV-0500) persona — Iran-
  aligned, service attribution less firm than CyberAv3ngers or
  HomeLand Justice. Coercive leak / disruption rather than
  revenue. Check Point and Cybereason document initial access via
  exploitation of Microsoft Exchange ProxyShell (CVE-2021-34473
  / -34523 / -31207) on internet-facing Israeli servers, web shell
  deployment for persistence, valid credentials harvested for
  lateral movement, and deployment of the PyDCrypt Python-based
  encryptor along with the DCSrv driver and the StrifeWater RAT.
  PyDCrypt uses DiskCryptor under the hood — same primitive Iran-
  linked Agrius / Pay2Key clusters use — and the operators never
  offer a working decryptor, confirming the campaign as
  destructive coercion. Stolen documents are serialized to a
  Telegram "MosesStaff" persona channel as anti-Israel
  hack-and-leak.
