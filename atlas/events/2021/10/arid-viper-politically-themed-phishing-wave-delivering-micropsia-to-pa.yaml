summary: |
  Cisco Talos detailed an Arid Viper (Desert Falcon / APT-C-23) campaign beginning in October 2021 that targeted Palestinian individuals and organizations with politically themed phishing lures. The actor used its Delphi-based Micropsia implant, delivered through decoy documents with politically themed file names written in Arabic, to conduct reconnaissance and information theft. Talos noted Arid Viper maintains a toolkit of Delphi packers and compilers around Micropsia, with the implant also ported to Python (PyMicropsia) and Android. Talos assessed the actor as espionage-motivated and increasingly dangerous as it iterates its tools against its targets.
