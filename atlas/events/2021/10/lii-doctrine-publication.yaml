id: 2021-10/lii-doctrine-publication
name: Ministry of the Armed Forces publishes Lutte Informatique d'Influence (LII) doctrine
start_date: 2021-10-20
disclosure_date: 2021-10-20
end_date: 2021-10-20
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Public-version publication on 20 October 2021 by the Ministry
  of the Armed Forces — presented by Defence Minister Florence
  Parly alongside CHOD Gen. Thierry Burkhard — of the Lutte
  Informatique d'Influence (L2I / LII) doctrine: France's
  information-warfare posture, committing publicly to conducting
  military information operations in the informational layer of
  cyberspace (to detect, characterise and counter informational
  attacks, gather intelligence, or conduct deception) in support
  of military operations, exclusively outside national territory
  and under the principles of international law.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Companion to the 2019 LIO speech: France makes information
  operations a publicly declared military instrument. Subsequent
  events involving VIGINUM Doppelganger / RRN attribution,
  COMCYBER-declared Sahel-theater info ops, and counter-FIMI
  cooperation link here.
