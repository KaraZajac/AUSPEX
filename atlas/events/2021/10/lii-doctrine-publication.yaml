initial_vector: unknown
outcome_summary: |
  Public-version publication on 20 October 2021 by the Ministry
  of the Armed Forces (Florence Parly) of the Lutte Informatique
  d'Influence (LII) doctrine — France's information-warfare
  posture, committing publicly to counter-disinformation and
  active information operations as military instruments. VIGINUM
  had stood up under the SGDSN earlier the same year (July 2021).
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Companion to the 2019 LIO speech: France makes information
  operations a publicly declared military instrument. Subsequent
  events involving VIGINUM Doppelganger / RRN attribution,
  COMCYBER-declared Sahel-theater info ops, and counter-FIMI
  cooperation link here.
