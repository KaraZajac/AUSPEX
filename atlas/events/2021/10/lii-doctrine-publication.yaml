id: 2021-10/lii-doctrine-publication
name: Ministry of the Armed Forces publishes Lutte Informatique d'Influence (LII) doctrine
start_date: 2021-10-20
disclosure_date: 2021-10-20
end_date: 2021-10-20
incident_type:
