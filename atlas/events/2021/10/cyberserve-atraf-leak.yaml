id: 2021-10/cyberserve-atraf-leak
name: CyberServe / Atraf leak — Black Shadow against Israeli hosting and LGBTQ community
start_date: 2021-10-29
disclosure_date: 2021-10-30
end_date: 2021-11-30
incident_type:
  - intrusion
  - data-theft
  - leak
  - extortion
initial_vector: unknown
outcome_summary: |
  Israeli web-host CyberServe breached (Friday 29 Oct 2021);
  several hosted sites taken offline and client databases stolen.
  The Atraf LGBTQ dating/nightlife app's database — said to hold
  data on ~1 million people, of which Black Shadow claimed to have
  leaked ~1% — was published on Telegram, exposing users' names,
  locations, sexual orientation and HIV status. Additional
  CyberServe clients were hit, including (per CyberScoop) the
  Machon Mor Medical Institute (~290,000 patients' medical data),
  the transport firms Dan and Kavim, the tourism firm Pegasus and
  Doctor Ticket. Black Shadow demanded $1M in crypto within 48
  hours to halt the leak.
false_flag_risk: none
summary: |
  The "Black Shadow" persona claimed a breach of the Israeli web-
  hosting provider CyberServe (compromised Friday 29 Oct 2021),
  taking down several hosted sites and exfiltrating client
  databases — most notoriously that of Atraf, a geo-located dating
  and nightlife app popular in Israel's LGBTQ community. The group
  demanded $1 million in cryptocurrency within 48 hours to stop the
  leak, then serially published data on Telegram: names, locations,
  sexual orientation and HIV status of Atraf users, plus client
  records from the public-transport firms Dan and Kavim, the
  tourism firm Pegasus, the Doctor Ticket medical-appointment
  service, a children's museum and a public-radio blog. CyberScoop
  (Dec 2021) adds that the same intrusion exposed medical data on
  roughly 290,000 patients of the Machon Mor Medical Institute.

  Iranian attribution is analytic and HEDGED, not state-declared.
  The Times of Israel (31 Oct 2021) described Black Shadow only as
  "believed to be linked to Iran" and "a group of Iran-linked
  hackers who use cyberattacks for criminal ends." SentinelOne's
  Amitai Ben Shushan Ehrlich (via CyberScoop) equates the Black
  Shadow persona with the Iran-affiliated Agrius cluster ("one of
  several" extortion aliases); Israeli researchers at CYE and
  Profero assess it as "thought to be operated in conjunction with
  the government of Iran" and "it does look like [Iran]." No cited
  source names a specific Iranian service -> ir/unscoped, named-
  actor level. Analysts read the deliberate publication of the most
  sensitive Atraf data (HIV status) as revealing coercive/messaging
  intent — "a strategic way that countries can pass messages to
  each other or create some kind of deterrence" (CYE's Sigal) —
  even though the operators also issued an explicit money demand.
  Tradecraft is assessed as low ("super weak," scanning known
  Fortinet / Microsoft vulnerabilities). Moses Staff and Pay2Key
  are SEPARATE-but-similar Israeli-targeting groups (Check Point),
  not the same actor.
