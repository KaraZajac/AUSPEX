  notes: |
    Opus 4.8 / effort max. Full 6-point audit vs raw snapshots.
    SIBLING RE-SOURCE (badrabbit model) — this Oct-2021 event had
    the IDENTICAL defects as its sibling 2020-12/shirbit-leak (same
    actor, same phantom pattern, same fabricated paragraph):

    PHANTOM primary removed. incd/2021-10_cyberserve-atraf cited
    https://www.gov.il/en/departments/israel_national_cyber_directorate
    — the generic INCD department homepage (returns a Cloudflare
    403 shell / department landing page with ZERO CyberServe/Atraf/
    Black Shadow/Iran content; record title "CyberServe / Atraf
    Incident — Black Shadow Iran-Aligned Attribution" is fabricated).
    Removed from sources[] and from the attribution; it is now
    orphaned (grep-confirmed cited nowhere else) -> RETIRE candidate
    (annotated in place in the source record, NOT deleted — this is
    the same phantom the shirbit audit flagged; the shirbit twin
    incd/2020-12_shirbit was subsequently orchestrator-retired).

    [a] FACTS — Rewrote summary/outcome_summary to the raw. STRIPPED
    a fabricated technical paragraph (MuddyWater / MOIS tradecraft,
    "Fortinet / Pulse Secure VPN n-day" initial access, valid-
    credential reuse, "web shells on Linux web hosts," and a Pay2Key
    / Moses Staff EQUIVALENCE) — none of it appears in either cited
    source. CyberScoop in fact rates Black Shadow's tradecraft
    "super weak" ("scanning for known vulnerabilities in technology
    made by commercial firms like Fortinet and Microsoft" — NOT
    Pulse Secure, NOT MuddyWater), and treats Moses Staff and
    Pay2Key as SEPARATE-but-similar groups (Check Point: Moses Staff
    "had some similarities to Black Shadow… and another group called
    Pay2Key"). Also CORRECTED garbled victim facts: prior "Dan
    Hotels customer database" -> the transport company Dan (ToI:
    "Israeli public transportation companies Dan and Kavim"); prior
    "Kavim / Dan public-transit driver records" -> Kavim/Dan CLIENT
    records ("names, email addresses and phone numbers of Kavim
    clients"), not driver records; "Pegasus Tours" -> the tourism
    firm "Pegasus"; added the real, sourced victims Doctor Ticket
    and Machon Mor Medical Institute (~290,000 patients, CyberScoop).
    Verified vs raw: ToI — "Hackers believed to be linked to Iran
    demanded on Sunday a ransom payment of $1 million… to stop the
    online leak"; Atraf "contained information on some one million
    people"; "$1 million in our [digital] wallet in the next 48
    hours"; "The names of some Atraf users and their locations have
    already been posted online, as well as the HIV status"; "the
    information leaked online so far represented just 1 percent";
    "they breached on Friday"; fuel-network context. CyberScoop —
    "went public with data it appeared to have stolen from an
    Israeli LGBTQ app, doxing users"; "a larger incident at
    Cyberserve… also yielded sensitive information from the Machon
    Mor Medical Institute — which included medical data on roughly
    290,000 patients"; "names and passwords… which also included
    sexual orientation and HIV status… betrays the intent"; "an
    attention-seeking effort more along the lines of an information
    operation." incident_type [data-theft, influence-operation] ->
    [intrusion, data-theft, leak, extortion] (influence-operation
    kept as a narrative reading only, per the IO framing; the op is
    an intrusion + hack-and-leak extortion).

    [b] ATTRIBUTION — Was over-attested: ir/unscoped/agrius
    "attributed by INCD, high confidence, concur." No cited source
    shows INCD attributing this to Iran/Black Shadow (the anchor was
    the phantom). Re-anchored to SentinelOne (Black Shadow ≡ Iran-
    affiliated Agrius) as carried by CyberScoop, attributing_org_
    confidence moderate, auspex_assessment concur-with-caveat,
    attribution_level named-actor. Iran link kept HEDGED per the raw
    ("believed to be linked to Iran"; "appears to be aligned with
    Iranian government interests"; "thought to be operated in
    conjunction with"; "it does look like [Iran]").

    [c] DATES — start 2021-10-29 (ToI: breached "on Friday"; Oct 31
    2021 was Sunday) kept. disclosure 2021-10-30 kept (the ToI Oct-31
    snapshot states Atraf data was "already posted online," so public
    disclosure was ≤Oct 30; no Oct-30-dated source is snapshotted, so
    this is corroborated-but-not-directly-datelined). end 2021-11-30
    kept (leak wave ran into November; CyberScoop notes Nov-18
    re-post of Shirbit data). Source published_on verified: ToI
    2021-10-31 (datePublished 2021-10-31T12:04:04) — CORRECT, no
    change; CyberScoop 2021-12-06 — correct.

    [d] DOCTRINE — Both links kept (each doctrine file explicitly
    names Black Shadow). persona-laundering: strongly_inferred (Black
    Shadow is the doctrine's own textbook example; cyber_relevance:
    "Black Shadow for Israeli data-leak extortion"), perspective
    attacker-rationale, inference_basis signals/ruled_out added (the
