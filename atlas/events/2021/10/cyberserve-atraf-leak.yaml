id: 2021-10/cyberserve-atraf-leak
name: CyberServe / Atraf leak — Black Shadow against Israeli hosting and LGBTQ community
start_date: 2021-10-29
disclosure_date: 2021-10-30
end_date: 2021-11-30
incident_type:
  - data-theft
  - influence-operation
initial_vector: unknown
outcome_summary: |
  Israeli hosting provider CyberServe intruded; collateral leak
  of Atraf LGBTQ dating-site user database. Thousands of
  Atraf users outed; broader Israeli SME data also leaked.
false_flag_risk: none
summary: |
  Black Shadow persona claimed; INCD-attributed Iran-aligned.
  Among the most ideologically targeted Iranian operations —
  the Atraf leak weaponised civilian PII against a vulnerable
  population in Israel. Initial access was via exploitation of
  internet-facing infrastructure at CyberServe (consistent with
  the broader MuddyWater / MOIS pattern: Fortinet / Pulse Secure
  VPN n-day exploitation, valid credentials reused across tenant
  environments, web shells on Linux web hosts), with lateral
  movement into multiple hosted client databases. The operators
  then ran a serialized public-leak campaign on Telegram of the
  Atraf LGBTQ dating-site database, the Dan Hotels customer
  database, the Pegasus Tours travel database, and the Kavim /
  Dan public-transit driver records — the same persona-laundered
  coercive PII-leak pattern Pay2Key and Moses Staff use against
  Israeli targets.
