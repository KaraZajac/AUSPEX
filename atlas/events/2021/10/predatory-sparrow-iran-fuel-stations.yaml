    outcome: |
      All ~4,300 Iranian fuel stations affected; subsidized-fuel-card
      payment functionality disrupted nationwide. Partially restored
      by 29 October (1,450 of 4,300 reconnected to the central
      distribution system; ~2,350 selling unsubsidized fuel);
      normalization and a compensatory fuel quota followed in early
      November. Roadside digital billboards in Iranian cities defaced
      with messages addressed to Supreme Leader Khamenei; pump
      displays showed "cyberattack 64411" (Khamenei's office hotline).
