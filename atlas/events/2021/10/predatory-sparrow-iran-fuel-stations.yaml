id: 2021-10/predatory-sparrow-iran-fuel-stations
name: Predatory Sparrow — Iranian fuel-station network disruption (first major)
start_date: 2021-10-26
disclosure_date: 2021-10-26
end_date: 2021-11-08  # approximate: subsidized-card system only partially restored by 29 Oct (1,450/4,300); normalization + compensatory quota early Nov
incident_type:
  - disruption
  - destructive
  - cyber-physical
initial_vector: unknown
outcome_summary: |
  On 26 October 2021, a cyberattack disrupted Iran's nationwide
  subsidized-fuel-card payment system — rendering useless the
  government-issued electronic cards Iranians use to buy subsidized
  fuel and bringing all approximately 4,300 of the country's fuel
  stations to a halt. Affected pump displays read "cyberattack
  64411" (the hotline number for the office of Supreme Leader
  Khamenei — the same number surfaced in the July 2021 railway
  operation), and roadside digital billboards in Iranian cities were
  altered to read "Khamenei! Where is our fuel?" Iranian authorities
  initially blamed a technical fault, then confirmed a cyberattack by
  an unnamed state actor; the Predatory Sparrow / Gonjeshke Darande
  persona claimed responsibility. President Raisi said the attack was
  meant to "create disorder and disruption" but stopped short of
  assigning blame, while Iran's civil-defense chief Gholamreza Jalali
  publicly accused Israel and the United States. The subsidized-card
  system was only partially restored three days later (1,450 of 4,300
  stations reconnected by 29 October); normalization and a
  compensatory fuel quota followed in early November.
quantified_impact:
  gas_stations_affected_estimate: 4300
false_flag_risk: suspected  # Predatory Sparrow / Gonjeshke Darande hacktivist persona is the IL deniability layer
campaign_id: predatory-sparrow-iran-coercion
summary: |
  First major Predatory Sparrow operation against Iran's civilian
  fuel-distribution network — the operational template subsequently
  repeated in December 2023. Operationally significant for the
  scope (nationwide single-day disruption of subsidized-fuel
  distribution) and for the influence-operation layer (roadside
  billboard messages and the "64411" Khamenei-office reference
  ported from the July 2021 railway operation). A senior Iranian
  official's — civil-defense chief Gholamreza Jalali's — attribution
  to Israel and the United States is one of the rare Iranian-state
  public attributions of a cyber operation to specific external
  nation-states.

  Editorial: Israel has never formally attested. But the operator-
  state attribution here is firmer than a persona claim alone: two US
  defense officials attributed the operation to Israel to the New
  York Times (Nov 2021), and Iran's own civil-defense chief publicly
  blamed Israel and the United States. The Predatory Sparrow /
  Gonjeshke Darande hacktivist framing is the IL deniability layer
  (false_flag_risk recorded as `suspected` on that basis). Held at
  concur-with-caveat because the US-official attribution is anonymous
  and Israel maintains its standing non-attestation discipline.
