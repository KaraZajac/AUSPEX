    attribution_source_id: timesofisrael/2021-11-27_us-officials-israel-hacked-iran-gas-nyt
    notes: |
      Persona-level Telegram self-claim, corroborated by (a) two US
      defense officials who attributed the operation to Israel to the
      New York Times (reported 2021-11-27) and (b) Iran's civil-defense
      chief Gholamreza Jalali, who told state TV he believed it was
      "carried out by the Zionist regime, the Americans and their
      agents" (2021-10-30/31). NOTE: it was Jalali, NOT Supreme Leader
      Khamenei, who publicly blamed Israel/US — corrected in this audit;
      President Raisi's statement stopped short of assigning blame.
      Iranian authorities officially attributed the attack to an
      unnamed state actor. Israel has not formally attested; the
      hacktivist persona is the IL deniability layer.
