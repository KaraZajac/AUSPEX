id: 2021-10/predatory-sparrow-iran-fuel-stations
name: Predatory Sparrow — Iranian fuel-station network disruption (first major)
start_date: 2021-10-26
disclosure_date: 2021-10-26
end_date: 2021-11-08  # service restoration took roughly two weeks; degraded payment for longer
incident_type:
  - destructive
  - disruption
initial_vector: unknown
outcome_summary: |
  On 26 October 2021, a cyberattack disrupted Iran's nationwide
  subsidized-fuel-card payment system — affecting all approximately
  4,300 of the country's gas stations. Affected pump screens
  displayed "cyberattack 64411" (the same Supreme-Leader-office
  number used in the July 2021 railway operation), and roadside
  digital billboards in Tehran were modified to display the
  message "Khamenei, where's our fuel?" Iranian authorities
  attributed the operation to an unnamed state actor; Predatory
  Sparrow / Gonjeshke Darande claimed responsibility, and Iranian
  Supreme Leader Khamenei subsequently blamed Israel and the
  United States. Service restoration took approximately two weeks;
  payment-system degradation persisted longer.
quantified_impact:
  gas_stations_affected_estimate: 4300
false_flag_risk: suspected  # Predatory Sparrow / Gonjeshke Darande hacktivist persona is the IL deniability layer
campaign_id: predatory-sparrow-iran-coercion
summary: |
  First major Predatory Sparrow operation against Iran's civilian
  fuel-distribution network — the operational template subsequently
  repeated in December 2023. Operationally significant for the
  scope (nationwide single-day disruption of subsidized-fuel
  distribution) and for the influence-operation layer (roadside
  billboard messages and the "64411" Khamenei-office reference
  ported from the July 2021 railway operation). Iranian officials'
  attribution to Israel and the United States is one of the rare
  Iranian-state public attributions of a cyber operation to an
  external nation-state.

  Editorial: Israel has not formally attested. Attribution rests on
  Israeli-aligned media (Times of Israel), CCDCOE analysis, and
  the operator persona's own claim. Predatory Sparrow's hacktivist
  framing is the IL deniability layer; the operator-state
  attribution is firm at the journalistic-consensus level.
