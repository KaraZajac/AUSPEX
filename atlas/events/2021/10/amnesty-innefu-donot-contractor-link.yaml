id: 2021-10/amnesty-innefu-donot-contractor-link
name: Amnesty Security Lab links DoNot Team Android tooling to Indian commercial vendor Innefu Labs
start_date: 2021-04-01
disclosure_date: 2021-10-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Amnesty International's Security Lab published a forensic
  investigation that connected Android spyware used in an
  attempted compromise of a Togolese pro-democracy activist
  to a malware family operationally associated with the DoNot
  Team / APT-C-35 cluster. The investigation traced
  command-and-control infrastructure and code-signing certificates
  to Innefu Labs, a Delhi-based "AI and big-data" surveillance
  vendor that supplies the Indian government. This is the most
  direct publicly documented contractor-to-state-actor link in
  the Indian cyber ecosystem.
false_flag_risk: none
summary: |
  Foundational open-source attestation that an Indian commercial
  vendor (Innefu Labs) supplies the operational tooling for a
  publicly attributed Indian-aligned APT (DoNot Team). The
  link is the editorial cornerstone of the AUSPEX contractor-
  hack-for-hire doctrine's political-espionage pillar and a
  rare evidentiary chain from vendor → tooling → operational
  use in any state cyber program globally. The Togolese
  activist victim profile (foreign civil society) departs from
  the cluster's typical South Asian victim set, suggesting
  brokered access to Innefu / DoNot capability for parties
  unrelated to canonical Indian regional collection.
