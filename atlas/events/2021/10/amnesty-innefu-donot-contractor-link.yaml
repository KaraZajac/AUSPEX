  notes: |
    Audited vs Amnesty Security Lab "Togo: Prominent activist targeted with
    Indian-made spyware linked to notorious hacker group" (7 Oct 2021). RAW snapshot
    re-verified on disk: sha256 40d71076…cd1b9c8a (40d71076ea56deca4608ea702b62b6a38e59527741007cad6555f77dcd1b9c8a),
    102473 bytes; matches the stored content_sha256. Real article (not a phantom) —
    body directly matches the event subject.
    [a] FACTS: corrected several. (i) DATES — source states the devices "were targeted
    between December 2019 and January 2020"; event had start_date 2021-04-01 (unsupported/
    fabricated) → set start_date 2019-12-01, end_date 2020-01-31; disclosure_date 2021-10-07
    (report publication) kept. (ii) STRIPPED fabricated tradecraft: "code-signing
    certificates" and "command-and-control infrastructure" appear nowhere in the source,
    which says only that "a trail of technical evidence … identified links between the attack
    infrastructure and … Innefu Labs" → rewrote to "attack infrastructure." (iii) SOFTENED
    Innefu descriptors to source wording: removed "Delhi-based" (source says only "based in
    India"), removed the invented '"AI and big-data"' quote, and downgraded "supplies the
    Indian government" → "claims to work with the Indian government" (verbatim source). (iv)
    ADDED Amnesty's explicit hedges that the prior prose omitted: Innefu "denied 'the
    existence of any link whatsoever'"; "There is no evidence to suggest Innefu Labs had a
    direct involvement"; "The activity linked to the Donot Team may involve multiple distinct
    actors or organisations with access to the same custom spyware toolset and shared
    infrastructure." (v) incident_type intrusion+data-theft → surveillance: the source frames
    this as an ATTEMPT ("attempt to put them under unlawful surveillance"; "tried to trick the
    victim into installing"; the spyware "would have enabled" access) — no confirmed
    compromise/exfiltration, so intrusion and data-theft are not source-carried; surveillance
    (targeted activist spyware) is. initial_vector phishing kept (spyware-loaded emails +
    WhatsApp/email social engineering to install a fake chat app) ✓. Removed the unsupported
    superlative "most direct publicly documented contractor-to-state-actor link."
    [b] ATTRIBUTION: Amnesty firmly ties the spyware/apps to "the notorious Donot Team hacker
    group" (unhedged) → attributing_org_confidence high kept; auspex_assessment concur kept
    (the caveat is on the doctrine/Innefu link, not the actor). Added attribution_level:
    named-actor (Amnesty names the DoNot Team cluster; it names no Indian intelligence service
    — India nexus is via the commercial vendor Innefu + DoNot's alignment).
    [c] DATES: fixed the start_date conflation (see [a]); source published_on 2021-10-07 correct.
    [d] DOCTRINE_LINKS: DOWNGRADED attested → strongly_inferred. The old reasoning justified
    attested via an "explicit vendor-to-state-actor handshake," which the source does NOT
    provide — Amnesty hedges the Innefu link, Innefu denies it, and the AUSPEX doctrine itself
    is defined as a commercial for-hire ecosystem "not exclusively or even primarily the Indian
    state." Amnesty DOES state the hack-for-hire purpose and a political-activist target at the
    goal level (cyber-mercenaries selling to private clients; activist surveilled ahead of an
    election), so the doctrine fit is strong, but the load-bearing contractor→state chain is
    hedged → strongly_inferred with inference_basis.signals + ruled_out. Kept attesting_source_id
    pointing at the Amnesty source as the primary supporting source (permitted on
    strongly_inferred). Reasoning rewritten to remove the false handshake claim.
    [e] ATTRIBUTION_LEVEL: added named-actor (was missing).
    [f] ACTOR_ID: in/unscoped/donot-team resolves (atlas/actors/in/donot-team.yaml, id matches).
    Recently de-provisionalized/demoted from in/ntro; placement consistent with this source. No
    actor edit made. Minor residual FLAG (not edited): that actor's ttp_summary still cites
    "Amnesty 2023 documenting Kashmir activist targeting," which the actor's own notes flag as a
    non-existent phantom source — orchestrator may want to scrub that line from the actor record.
