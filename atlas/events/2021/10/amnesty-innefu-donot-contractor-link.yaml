doctrine_links:
  - doctrine_id: in/contractor-hack-for-hire
    pillar_id: in/contractor-hack-for-hire/political-espionage
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Amnesty explicitly characterizes the operators as
      "cyber-mercenaries" / "hacker-for-hire" who surveil a
      political activist to sell data to private clients, and links
      the attack infrastructure to Innefu Labs, an India-based
      commercial vendor that claims to work with the Indian
      government — squarely the privatized hack-for-hire ecosystem
      this doctrine encodes, with a human-rights-defender /
      pro-democracy target matching the political-espionage pillar.
      NOT attested: Amnesty hedges the load-bearing contractor link
      (Innefu denies it; Amnesty says there is "no evidence" of
      direct involvement and the activity "may involve multiple
      distinct actors"), so no source-stated contractor-to-state
      chain exists — the India-ecosystem reading is strongly
      inferred from DoNot's India alignment plus the hedged Innefu
      link rather than attested.
    attesting_source_id: amnesty/2021-10-07_donot-yty-android-innefu
    inference_basis:
      signals:
        - "Amnesty's own framing: operators are 'cyber-mercenaries' / 'hacker-for-hire' who 'steal victims' private information to sell to private clients' — the hack-for-hire purpose stated at the goal level."
        - "Amnesty links the attack infrastructure to Innefu Labs, an India-based commercial vendor that 'claims to work with the Indian government' — the contractor node of the ecosystem (denied by Innefu)."
        - "Victim is a Togolese human-rights defender / pro-democracy activist targeted Dec 2019-Jan 2020 ahead of the 2020 presidential election — the political-espionage pillar's target profile."
      ruled_out: "Purely private mercenary activity with no India-ecosystem nexus: weakened but not eliminated by DoNot's established India alignment and the Innefu vendor link; because Amnesty hedges that link (Innefu denial, 'no evidence' of direct involvement, 'multiple distinct actors'), the label is strongly_inferred rather than attested."
