id: 2021-10/amnesty-innefu-donot-contractor-link
name: Amnesty Security Lab links DoNot Team Android tooling to Indian commercial vendor Innefu Labs
start_date: 2019-12-01
disclosure_date: 2021-10-07
end_date: 2020-01-31
incident_type:
  - surveillance
initial_vector: phishing
outcome_summary: |
  Amnesty International's Security Lab published a forensic
  investigation reporting that Android spyware and fake chat
  applications used in an attempted compromise of an anonymous
  Togolese human-rights defender were tied to the DoNot Team /
  APT-C-35 hacker group. Amnesty said a trail of technical
  evidence linked the attack infrastructure to Innefu Labs, an
  India-based cybersecurity company that advertises data-analytics
  and predictive-policing services to law enforcement and armed
  forces and claims to work with the Indian government. Innefu
  denied any link, and Amnesty cautioned there was no evidence
  Innefu had direct involvement and that the activity "may involve
  multiple distinct actors or organisations" sharing the same
  custom toolset and infrastructure. Amnesty framed the wider
  ecosystem as "cyber-mercenaries" / "hacker-for-hire."
false_flag_risk: none
summary: |
  Open-source reporting from Amnesty's Security Lab connecting a
  publicly tracked hacker-for-hire cluster (DoNot Team) to a
  commercial Indian vendor (Innefu Labs) via shared attack
  infrastructure — a hedged technical link that Innefu denies.
  Amnesty explicitly frames the operators as "cyber-mercenaries"
  selling stolen data to private clients, and notes this is the
  first time DoNot Team tooling was documented against an activist
  outside South Asia (its usual targeting being concentrated in
  the north of India, Pakistan and Kashmir). The event anchors the
  AUSPEX contractor / hack-for-hire doctrine's political-espionage
  pillar, while carrying Amnesty's own caveats that the vendor link
  is not proof of direct involvement and that multiple actors may
  share the toolset.
