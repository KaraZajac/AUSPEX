id: 2021-12/hunt-forward-ukraine-pre-invasion
name: Hunt Forward Ukraine (pre-Russian invasion deployment)
start_date: 2021-12-01  # joint Navy/Marine team deployment
disclosure_date: 2022-11-28  # NSArchive declassified CNMF doc
end_date: 2022-02-23  # withdrew days before Feb 24 invasion
incident_type:
  - intrusion  # defensive hunt
initial_vector: unknown
outcome_summary: |
  Two-month CNMF deployment to Ukrainian government and CI networks
  December 2021 – February 2022, persisting until days before the
  February 24, 2022 Russian invasion. Hardened Ukrainian networks
  pre-invasion; intelligence collected on Russian pre-positioning
  (NotPetya-family tradecraft, WhisperGate and HermeticWiper
  precursors).
false_flag_risk: none
summary: |
  Joint Navy / Marine CMF team deployment. Nakasone publicly cited
  the operation in Senate Armed Services testimony May 2022; the
  National Security Archive obtained the declassified CNMF "Before
  the Invasion: Hunt Forward Operations in Ukraine" document
  November 28, 2022. The operation is the canonical Hunt Forward
  case study used in subsequent posture statements.

  Prior 2018 Hunt Forward deployments to Ukraine are not separately
  enumerated in this atlas; this event represents the pre-invasion
  deployment specifically.
