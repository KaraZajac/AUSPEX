id: 2021-12/hunt-forward-ukraine-pre-invasion
name: Hunt Forward Ukraine (pre-Russian invasion deployment)
start_date: 2021-12-01  # CNMF: joint Navy/Marine hunt team deployed "December 2021"; exact day not stated (approximate)
disclosure_date: 2022-04-05  # first public disclosure: Nakasone SASC posture testimony (5 Apr 2022) "we deployed a hunt team who sat side-by-side with our [Ukrainian] partners"; detailed CNMF acknowledgment followed 28 Nov 2022
end_date: 2022-02-23  # on-the-ground team withdrew days before the 24 Feb 2022 invasion; CNMF states the wider operation ran "December 2021 to March 2022" (remote analytic/advisory-support tail)
incident_type:
  - documentary  # invited consensual allied hunt-forward at Ukraine's request — a defensive operation on Ukrainian networks, not an adversarial intrusion (CNMF cohort convention; CNMF release: "purely defensive activities... with the consent of Ukraine")
initial_vector: unknown  # defensive deployment at host invitation
outcome_summary: |
  CNMF hunt-forward deployment to Ukrainian government and national
  critical networks, December 2021 to March 2022 — described by
  CYBERCOM as its "largest hunt forward team" to that point, composed
  of U.S. Navy and U.S. Marine Corps operators working side-by-side
  with Ukrainian Cyber Command at Ukraine's invitation. The on-the-
  ground team was present when Russia began executing destructive
  cyberattacks in mid-January 2022 (the WhisperGate wiper campaign),
  assisted Ukrainian partners in analyzing them, and shared indicators
  of compromise with U.S. interagency and industry partners; it
  persisted until days before the 24 February 2022 invasion, after
  which CYBERCOM continued remote analytic/advisory support.
false_flag_risk: none
summary: |
  Invited CNMF Hunt Forward deployment to Ukraine ahead of Russia's
  February 2022 invasion. Gen. Paul Nakasone first disclosed the
  deployment publicly in his 5 April 2022 Senate Armed Services
  Committee posture testimony ("Coordinating with the Ukrainians in an
  effort to help them harden their networks, we deployed a hunt team
  who sat side-by-side with our partners"); CNMF Public Affairs
  published the detailed account — "Before the Invasion: Hunt Forward
  Operations in Ukraine" — on 28 November 2022 (archived by the
  National Security Archive Cyber Vault). CYBERCOM frames the operation
  within its "Defend Forward" and persistent-engagement strategies and
  calls hunt forward "purely defensive." It is the canonical Hunt
  Forward case study cited in subsequent posture statements.

  Prior 2018 Hunt Forward deployments to Ukraine are not separately
  enumerated in this atlas; this event represents the pre-invasion
  deployment specifically.
