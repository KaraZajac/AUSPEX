outcome_summary: |
  Publication of the UK National Cyber Strategy 2022 by the
  Cabinet Office. Replaces the NCS 2016 and re-frames UK cyber
  posture from "cyber security" to "cyber power" with five
  pillars (ecosystem, resilience, technology, global leadership,
  detect-disrupt-deter).
false_flag_risk: none
summary: |
  Modelled as a doctrinal publication event analogous to the NCF
  establishment (2020-11) and the Responsible Cyber Power paper
  (2023-04). Anchor date for all UK cyber-event doctrine tagging
  from December 2021 forward.

  Key analytical shift from NCS 2016: explicit codification of
  offensive cyber as a strategic instrument (Pillar 5), explicit
  framing of cyber as a "whole-of-society" responsibility, and
  cross-references to the March 2021 Integrated Review as the
  parent strategic frame.
