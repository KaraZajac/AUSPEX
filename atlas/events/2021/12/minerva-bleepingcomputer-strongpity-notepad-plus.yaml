  notes: |
    Audited vs BleepingComputer "Malicious Notepad++ installers push StrongPity malware"
    (Bill Toulas, 2021-12-09), the ONE cited source. Raw article captured + hashed:
    sha256 d01db5b0…163d154b, 88,950 bytes — real, complete article (title + byline + body
    all present); NOT a phantom.
    [a] FACTS ✓ every claim now source-carried. Verbatim support: "The sophisticated hacking
    group known as StrongPity is circulating laced Notepad++ installers"; "also known as
    APT-C-41 and Promethium, was previously seen distributing trojanized WinRAR installers …
    between 2016 and 2018, so this technique is not new"; discovery "from a threat analyst
    known as 'blackorbird' … while Minerva Labs reports on the malware"; blackorbird tweet
