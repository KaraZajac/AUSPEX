id: 2021-12/minerva-bleepingcomputer-strongpity-notepad-plus
name: Researcher "blackorbird" + Minerva Labs disclose StrongPity Notepad++ trojanized installer
start_date: 2021-11-01
disclosure_date: 2021-12-09
end_date: 2021-12-09
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Independent researcher "blackorbird" identified a malicious
  Notepad++ installer (npp.8.1.7.Installer.x64.exe), tweeting the
  sample on 30 November 2021. Minerva Labs analyzed the sample and
  BleepingComputer identified the group as StrongPity (APT-C-41 /
  PROMETHIUM), noting the trojanized-installer technique matched the
  group's 2016-2018 trojanized-WinRAR campaigns — i.e. operational-
  pattern continuity, not fresh victim-set evidence. On execution the
  installer drops the genuine Notepad++ binary (so the install looks
  ordinary) plus a keylogger, ntuis32.exe, into
  C:\\ProgramData\\Microsoft\\WindowsData and a companion component,
  winpickr.exe, into C:\\Windows\\System32; a "PickerSrv" service
  runs the keylogger for persistence, winpickr.exe exfiltrates the
  captured keystroke/file logs to C2 and then deletes them. The
  distribution vector (how victims obtained the trojanized installer)
  was not detailed, though the source notes such installers circulate
  on unofficial sites posing as the official Notepad++ portal.
false_flag_risk: suspected
summary: |
  Late-2021 PROMETHIUM tempo data point bridging the post-2020
  Talos / Bitdefender disclosures and the January 2023 ESET
  Android disclosure. Operationally unremarkable continuation
  of the trojanized-installer pattern but valuable as evidence
  of unbroken cluster activity. Doctrinal-pillar mapping is
  not isolatable from the public reporting; the Notepad++
  victim audience is broader than the cluster's traditional
  Kurdish / Syrian / Italian-encryption-user focus.
