    is created" for persistence; keylogger "records all user keystrokes"; winpickr.exe checks
    the folder and "establishes a C2 connection to upload the stolen data" then the log "is
    deleted to wipe the traces". CORRECTIONS: rewrote outcome_summary — removed the unsourced
