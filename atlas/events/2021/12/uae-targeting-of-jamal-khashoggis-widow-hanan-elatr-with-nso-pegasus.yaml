    reasoning: |
      Pegasus targeting of the wife of murdered dissident journalist Jamal Khashoggi is surveillance of the exiled-dissident/journalist milieu the regime treats as a security threat; CFR categorises the incident as civil-society espionage, and the op advances regime-protection surveillance of diaspora critics rather than any state-collection objective. strongly_inferred (not attested): the cited CFR record states the WHO (UAE, suspected) and the target category (civil society) but does not state the strategic purpose in its own words.
    attesting_source_id: null
