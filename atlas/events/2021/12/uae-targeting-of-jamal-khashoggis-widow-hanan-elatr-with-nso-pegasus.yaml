    attributing_org: "CFR Cyber Operations Tracker (citing The Washington Post / The Verge)"
    attributing_org_confidence: moderate   # CFR labels the state sponsor "Suspected"
    attribution_level: nation              # CFR names the UAE (a state); no specific Emirati service named
    auspex_assessment: concur
    attribution_date: 2021-12-01
    attribution_source_id: cfr/2021-12_uae-targeting-of-jamal-khashoggis-widow-
doctrine_links:
