  notes: "Audited vs CFR Cyber Operations Tracker (raw captured, sha256 755f35c9...). Source is unambiguous: structured 'Suspected state sponsor: United Arab Emirates', 'at the request of the United Arab Emirates', 'Type of incident: Espionage', 'Target category: Civil society'; 'Read more' = WaPo ('A UAE agency put Pegasus...') + The Verge (both 403/blocked, not separate corpus sources). CORRECTIONS: (1) attributing_org_confidence high->moderate — CFR labels the sponsor 'Suspected', not confirmed (matches the mirror Saudi/KINGDOM event). (2) Added attribution_level: nation — CFR names the UAE (a state) and only 'a UAE agency'; no specific Emirati service named -> nation, NOT named-unit. (3) Summary rewritten to the source: 'wife' (CFR's word) not 'widow', Dubai-airport detention added, and CFR's internal contradiction flagged (free-text 'Affiliations' says Saudi govt while the structured sponsor field + WaPo/Verge say UAE; AUSPEX follows the structured UAE field). doctrine_link kept strongly_inferred (CFR states WHO+target-category but not the purpose in its own words); pillar journalists-in-exile FK verified. ACTOR: de-provisionalized ae/state-security/uae-pegasus and DEMOTED ae/state-security/uae-pegasus -> ae/unscoped/uae-pegasus (no cited source names a UAE service; ae/state-security.yaml itself says open-source attribution to it as a named operator is rare); id+primary_service_id changed, former id recorded in actor notes, #FK=1 (this event). ae/unscoped service verified to exist."
