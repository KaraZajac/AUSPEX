id: 2021-12/uae-targeting-of-jamal-khashoggis-widow-hanan-elatr-with-nso-pegasus
name: "UAE targeting of Jamal Khashoggi's widow Hanan Elatr with NSO Pegasus"
start_date: 2021-12-01
incident_type:
  - surveillance
  - espionage
initial_vector: physical
false_flag_risk: none
summary: |
  CFR's Cyber Operations Tracker records (report dated Dec 2021, citing The Washington Post / The Verge) that Hanan Elatr — the wife of murdered Saudi journalist Jamal Khashoggi — was targeted with NSO Group's Pegasus spyware 'at the request of the United Arab Emirates,' with the malware allegedly installed while she was detained at Dubai airport. CFR labels the UAE a 'Suspected state sponsor' and categorises the incident as civil-society espionage. (CFR's free-text 'Affiliations' line conflictingly says 'Believed to be the work of the Saudi Arabian government,' but its structured sponsor field, the headline of its cited WaPo source, and the Verge piece all name the UAE as the requesting party.)
