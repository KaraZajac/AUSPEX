  notes: |
    Full 6-point audit vs the two cited primary sources, both
    snapshotted (PRESERVE tier) and byte-verified:
    - CISA AA21-356A: raw cisa__2021-12-22_aa21-356a-log4shell.html
      sha256 b78c0b801163d5b9df68dd9e95ac6a44fdb95ad988e2f575dfc7d738a0d53bdf
      (85018 bytes, HTTP 200 live).
    - NCSC-UK alert: raw ncsc-uk__2021-12-10_apache-log4j-vulnerability.html
      sha256 fe173b9f27e224c7aa651f52ab0680986f6e13c96cd28afa10f50c98dfff9c1b
      (147999 bytes, HTTP 200 live).

    [a] FACTS. Scope corrected to the three CVEs the advisory itself
    enumerates: "CVE-2021-44228 (known as 'Log4Shell'), CVE-2021-45046,
    and CVE-2021-45105." Stripped CVE-2021-44832 (0 occurrences in
    either source; disclosed 28 Dec 2021, AFTER the 22 Dec advisory /
    23 Dec last-revision — an anachronism). Signatory count corrected
    seven -> EIGHT: the advisory lists CISA, FBI, NSA, ACSC, CCCS,
    CERT NZ, NZ NCSC, and NCSC-UK (New Zealand fields two agencies —
    CERT NZ had been dropped). Removed the unsourced "most
    operationally consequential joint AA of 2021" ranking and the
    earlier "substantial fraction of internet-facing Java services"
    figure (no such stat in either source). Retained only verbatim
    advisory language: "Sophisticated cyber threat actors are actively
    scanning networks to potentially exploit Log4Shell, CVE-2021-45046,
    and CVE-2021-45105 in vulnerable systems" and "assume their assets
    that use Log4j may have been compromised."

    [b] ATTRIBUTION. actor_id null is correct — the advisory names NO
    responsible actor (0 mentions of Lazarus / MuddyWater / Charming
    Kitten / China / Iran / DPRK / "nation-state"; FBI language is
    generic "cryptomining and botnet malware" / "cyber criminal
    schemes"). Stripped the summary's specific-actor exploitation list
    (DPRK Lazarus, MuddyWater, Charming Kitten, Chinese MSS) as
    unsupported by the cited sources, out of scope for a documentary
    advisory, and internally inconsistent (the sibling sequel records
    DPRK RGB/Andariel, not "Lazarus"). attributing_org kept as the
    verbatim eight-agency roster; confidence high.

    [c] DATES. start 2021-12-09 (CVE-2021-44228 public disclosure) and
    disclosure 2021-12-22 (AA21-356A original release; page "Last
    Revised December 23, 2021") verified. Source published_on verified:
    CISA 2021-12-22; NCSC 2021-12-10 (page labelled "Version 1", 10
    December 2021). Softened the NCSC "updated through January 2022"
    claim to "subsequently updated" — the snapshotted page carries no
    January-2022 marker.

    [d] DOCTRINE_LINKS. Re-homed from UK to US defensive doctrine
    (perspective defender-response throughout). Removed uk/five-eyes
    (that record is the SIGINT-COLLECTION leg — wrong fit for a
    defensive mitigation advisory — and was over-attested via a bare
    signatory quote), and uk/ncs-2016 + uk/ncs-2022 (which mis-framed a
    CISA-numbered, US-led advisory as a UK NCS-doctrine event).
    Replaced with: us/five-eyes (attested; the eight-agency joint-
    advisory format is exactly what the us/five-eyes record names as
    the partnership's standard modality, and the co-authorship
    corroborates the joint-FVEY-defensive strategic purpose — quote
    carried), and us/os3i (plausible, forward-doctrine; OS3I names
    Log4Shell as a catalysing event but postdates the 2021 advisory).
    NCSC-UK's genuine co-authorship is preserved as fact in the
    attributing_org roster and the summary prose.

    [e] ATTRIBUTION_LEVEL. Added attribution_level: null — a null-actor
    documentary advisory supports no nation/cluster/actor level
    (matches the aa20-099a null-actor joint-advisory precedent).

    [f] ACTOR_ID. Null is correct: AA21-356A is a defensive vuln-
    mitigation advisory (documentary), not an attack and not an
    attribution — no perpetrator. incident_type corrected to
    [documentary] (removed "attribution-publication" — the advisory
    attributes no one — and "bulk-collection" — no collection occurs).
    initial_vector n-day -> unknown (documentary convention). Named-
    actor exploitation lives at the sibling 2021-12/log4shell-dprk-
    exploitation.
