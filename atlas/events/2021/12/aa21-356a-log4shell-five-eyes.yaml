id: 2021-12/aa21-356a-log4shell-five-eyes
name: AA21-356A — Five Eyes joint Log4Shell mitigation advisory (NCSC + CISA + ACSC + CCCS + NCSC-NZ)
start_date: 2021-12-09  # CVE-2021-44228 public disclosure
disclosure_date: 2021-12-22
end_date: null
incident_type:
  - attribution-publication
  - bulk-collection
initial_vector: n-day
outcome_summary: |
  Seven-signatory Five Eyes joint mitigation advisory on
  CVE-2021-44228 (Log4Shell) and the follow-on CVE-2021-45046 /
  CVE-2021-45105 / CVE-2021-44832 Log4j chain. Co-signed by US
  CISA, FBI, NSA; Australian ACSC; Canadian CCCS; New Zealand
  NCSC-NZ; and UK NCSC. The most operationally consequential
  joint AA of 2021 — Log4Shell affected a substantial fraction
  of internet-facing Java services and was rapidly exploited
  by both nation-state and criminal actors.
false_flag_risk: none
summary: |
  AA21-356A is operationally one of the highest-volume joint
  advisories of the modern AA cadence and a load-bearing
  reference for the Five Eyes defensive coordination model.
  NCSC's parallel 10 December 2021 alert was the UK side's
  first-day technical response, updated through January 2022
  as the Log4j chain expanded.

  Doctrinally a UK NCS-2016 "defend" pillar event tagged at the
  cusp of the NCS 2022 transition (the 2022 strategy was
  published 15 December 2021, one week before the joint
  advisory). AUSPEX tags primary doctrine to NCS 2016 because
  the operational cadence of the advisory was structured under
  the predecessor strategy; secondary tagging to NCS 2022
  Pillar 2 (resilience) reflects forward-doctrinal continuity.

  Operationally Log4Shell was exploited by both criminal
  ransomware actors and nation-state clusters — including
  DPRK Lazarus (recorded at 2021-12/log4shell-dprk-exploitation),
  multiple Iranian clusters (MOIS-affiliated MuddyWater, IRGC-
  affiliated Charming Kitten), and Chinese MSS-affiliated APTs.
