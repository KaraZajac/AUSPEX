id: 2021-12/aa21-356a-log4shell-five-eyes
name: AA21-356A — Five Eyes joint Log4Shell (Log4j) mitigation advisory (CISA/FBI/NSA + ACSC + CCCS + CERT NZ/NZ NCSC + NCSC-UK)
start_date: 2021-12-09  # CVE-2021-44228 public disclosure
disclosure_date: 2021-12-22  # AA21-356A original release; page "Last Revised December 23, 2021"
end_date: null
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Eight-signatory Five Eyes joint mitigation advisory scoped to
  three CVEs: CVE-2021-44228 (Log4Shell), CVE-2021-45046, and
  CVE-2021-45105. Co-authored by US CISA, FBI, and NSA; Australia's
  ACSC; Canada's CCCS; New Zealand's CERT NZ and NZ NCSC; and the
  UK's NCSC. Generic, actor-agnostic mitigation guidance: it names
  no responsible actor, warns that "sophisticated cyber threat
  actors are actively scanning networks to potentially exploit" the
  Log4j vulnerabilities, and urges organisations to "assume their
  assets that use Log4j may have been compromised." Named-actor
  exploitation of Log4Shell is recorded at separate sequel events.
false_flag_risk: none
summary: |
  AA21-356A is a documentary "advisory-as-event": a joint Five Eyes
  defensive mitigation advisory on the Apache Log4j / Log4Shell
  chain, not an attack and not an attribution. It carries no
  perpetrator — actor_id is null — and the advisory itself names no
  responsible threat actor, describing exploitation only in the
  abstract ("sophisticated cyber threat actors," "cyber criminal
  schemes," cryptomining and botnet malware).

  NCSC-UK's parallel 10 December 2021 alert (its "Version 1," dated
  that day) was the UK side's first-day technical response and was
  subsequently updated as the Log4j chain expanded to CVE-2021-45046
  and CVE-2021-45105.

  Named-actor exploitation of Log4Shell is recorded at separate
  sequel events (e.g. 2021-12/log4shell-dprk-exploitation); this
  advisory event deliberately holds no actor attribution of its own.
