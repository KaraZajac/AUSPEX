outcome_summary: |
  AUDIT 2026-07-01 (claude-opus-4.8): no recoverable primary
  source documents this specific campaign. The only cited source
  (seqrite/2021-12-08_apt36-pension-portal) has url: null and its
  own record admits the claimed late-2021 pension-portal blog post
  was never located (Seqrite's public APT36 corpus surfaces only
  "Operation Honey Trap" 2020-07 and the 2025 Pahalgam advisory).
  Independent web search (2026-07-01) found APT36 pension-scheme /
  SPARSH lures documented ONLY in later reporting (BlackBerry 2024
  SPARSH-pension PDF lures; CYFIRMA/Aryaka general lure lists) — no
  vendor corroborates a discrete December-2021 "pension portal /
  Army-veterans" operation. The prior prose (credential-harvesting
  clones of MoD pension/welfare portals, compromised retired-Army
  family data, Crimson-RAT secondary stage for THIS campaign) was
  uncorroborated and has been stripped as unsupportable.
false_flag_risk: none
summary: |
  UNSUPPORTABLE / possible fabricated event (flagged for Kara).
  APT36 / Transparent Tribe (Pakistan-nexus) is a real actor that
  genuinely targets Indian military personnel and uses Crimson RAT,
  and pension-scheme lures are a documented APT36 theme in later
  years — but the specific incident this record asserts (a discrete
  late-2021 Indian-Army-veterans pension-portal campaign) is carried
  by no recoverable source. The prior summary was explicitly
  speculative ("fits a pattern", "often less aggressive security
  posture") and internally inconsistent (start_date 2021-08 vs prose
  "October 2021 timing"). No sourcing was invented to keep it alive;
  see qc.notes and the RETIRE flag.
