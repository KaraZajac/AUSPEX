id: 2021-12/apt36-pension-portal-lures
name: Transparent Tribe pension-portal phishing wave against Indian military veterans
start_date: 2021-08-01
disclosure_date: 2021-12-08
end_date: 2021-12-08
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Indian commercial-threat-intelligence reporting (Quick Heal /
  Seqrite Threat Labs) and adjacent vendor analysis documented
  a Transparent Tribe campaign through late 2021 themed on
  Indian Army veterans' pension portals. Lures included links
  to credential-harvesting clones of legitimate Indian Ministry
  of Defence pension and welfare portals. Compromised personnel
  data on retired Indian Army staff and family members fits a
  pattern of intelligence-collection against retirees with
  ongoing network access to military reservist or contractor
  roles. The Crimson RAT was deployed in the secondary stage.
false_flag_risk: none
summary: |
  Reflects the operational thoroughness of Transparent Tribe's
  Indian-military collection: lures themed on veteran benefits
  exploit a population with credible reasons to engage and
  often less aggressive security posture than active-duty
  personnel. The October 2021 timing follows the Article 370
  anniversary and continued post-Galwan India-China
  preoccupation in Indian SOC environments.
