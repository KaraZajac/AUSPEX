  notes: |
    PHANTOM-REMEDIATION audit -> UNSUPPORTABLE / RETIRE candidate.
    Path taken: not re-sourced (no genuine source exists to point at)
    and not a clean duplicate of a real event; treated as UNSUPPORTABLE.
    No source was invented. FLAG: possible fabricated event for Kara to
    delete.

    [STEP 0 triage] Sole cited source seqrite/2021-12-08_apt36-pension-portal
    has url: null — nothing to curl, no content hash possible. Its own
    record notes (pre-audit) already admit a second-attempt URL
    verification failed and "no specific late-2021 pension-portal blog
    post was recovered"; Seqrite's public APT36 corpus surfaces only
    "Operation Honey Trap" (2020-07-08) and the 2025 Pahalgam advisory.
    PHANTOM confirmed. This event is the source's ONLY consumer (grep of
    atlas/), so the source record is now orphaned; annotated its notes
    with an AUDIT phantom line (STEP 0c).

    [STEP 0b re-source attempt, negative] Web search 2026-07-01 across
    Seqrite, Cyble, CYFIRMA, Zscaler, BlackBerry, Aryaka, Trend Micro:
    APT36 pension/SPARSH lures are a REAL theme but appear only in LATER
    reporting — BlackBerry (2024-05) SPARSH "System for Pension
    Administration (RAKSHA)" PDF lures (late-2023->Apr-2024), and general
    lure lists (Aryaka/CYFIRMA) mentioning "pension schemes" among many
    themes. NO vendor documents a discrete December-2021 Indian-Army-
    veterans pension-portal campaign with Crimson RAT. The nearest Seqrite
    "lures Indian Army" blog is 2023-05 and is about officer-posting-policy
    decoys, not pensions. So the asserted 2021 incident cannot be
    re-sourced.

    [a FACTS] Stripped as uncorroborated: MoD pension/welfare portal
    credential-harvesting clones; compromised retired-Army staff/family
    data; Crimson-RAT secondary stage for THIS op; the "October 2021 /
    Article 370 anniversary" framing (also internally inconsistent with
    start_date 2021-08-01). None carried by any recoverable source.
    outcome_summary/summary rewritten to state the unsupportable finding
    honestly rather than assert the incident.

    [b ATTRIBUTION] APT36 / Transparent Tribe (Pakistan-nexus) is a real,
    correctly-identified actor in the abstract, but the tie to THIS
    incident rests entirely on the phantom source. Downgraded
    attributing_org_confidence high->moderate, auspex_assessment
    concur->concur-with-caveat, added attribution_level: named-actor and a
    phantom-source caveat note.

    [c DATES] No verifiable operation dates. start_date 2021-08-01 and the
    "October 2021" prose are both unsupported and mutually inconsistent;
    left the date fields in place (schema-required) but flagged as
    unverified — the event is a deletion candidate, not a re-date target.
    Source published_on 2021-12-08 is itself unverifiable (url null).

    [d DOCTRINE_LINKS] Link is not attested (no attesting_source_id), so no
    attested-gate violation. Downgraded strongly_inferred->plausible: the
    link cannot rest on verified operational facts when the operation is
    unsupportable. Added inference_basis.alternatives.

    [e ATTRIBUTION_LEVEL] Set named-actor (APT36/Transparent Tribe + nation
    named; no ISI/service) — but see the phantom caveat; the level
    describes the abstract actor, not a verified attribution of this op.

    [f ACTOR_ID] pk/unscoped/transparent-tribe RESOLVES to
    atlas/actors/pk/transparent-tribe.yaml (file id is
    pk/unscoped/transparent-tribe). No actor-file edits. Not flagging the
    actor — it is sound.

    Not a duplicate of siblings audited-around: earth-karkaddan (2022-01,
    naming/arsenal profile), the 2025-06 CYFIRMA NIC-pension-adjacent
    credential-theft op, SideCopy events, and the 2023-05 Seqrite
    "lures Indian Army" education/officer-posting blog are all distinct
    incidents/dates. This event is not a merge target — it is an
    unsupportable standalone. level: partial (load-bearing source is a
    null-URL phantom; claims could not be corroborated).
