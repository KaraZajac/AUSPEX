id: 2021-06/molerats-lastconn-espionage-campaign-against-middle-eastern-government
name: "Molerats 'LastConn' espionage campaign against Middle Eastern governments (June 2021)"
start_date: 2021-06-01
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Proofpoint reported (16 June 2021) that TA402 (Molerats / GazaHackerTeam) resumed email threat campaigns in early June 2021 using a custom malware implant it dubbed LastConn — assessed with high confidence to be an updated version of the SharpStage malware Cybereason analyzed in December 2020. The actor delivered Arabic-language spear-phishing emails with PDF attachments containing geofenced URLs that led to password-protected archives carrying the malware, enabling reconnaissance on the target host and data exfiltration; an earlier February 2021 vector used Google Apps Script URLs. Lures used Middle Eastern geopolitical themes tied to the Gaza conflict, including a subject purporting to be a Hamas delegation meeting the Syrian regime. Proofpoint assessed the malware as targeting government institutions in the Middle East and global government organizations associated with regional geopolitics, noting that TA402 "often targets entities in Israel and Palestine." Proofpoint assessed with moderate confidence — based on lure topics, targeting, and historic campaigns — that the activity likely supports military or Palestinian state objectives.
