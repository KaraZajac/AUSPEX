summary: |
  Proofpoint reported that TA402 (Molerats / GazaHackerTeam) resumed email threat campaigns in June 2021 using a custom malware implant it dubbed LastConn. The actor delivered Arabic-language spear-phishing emails with PDF attachments containing geofenced URLs that led to password-protected archives carrying the malware, enabling reconnaissance on the target host and data exfiltration. Lures used geopolitical themes tied to the Gaza conflict, including subjects such as a Hamas delegation meeting the Syrian regime. Proofpoint assessed the targets as government institutions in the Middle East, particularly entities in Israel and Palestine.
