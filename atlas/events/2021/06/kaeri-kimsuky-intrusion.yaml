id: 2021-06/kaeri-kimsuky-intrusion
name: Korea Atomic Energy Research Institute (KAERI) intrusion attributed to Kimsuky
start_date: 2021-05-14
disclosure_date: 2021-06-18
end_date: 2021-06-18
incident_type:
  - espionage
  - data-theft
initial_vector: n-day
outcome_summary: |
  Intrusion at the Korea Atomic Energy Research Institute
  (KAERI) via a VPN vulnerability; KAERI's parliamentary
  oversight disclosure on 18 June 2021 confirmed that 13
  external IP addresses had accessed the network from
  14 May 2021. ROK government and vendor reporting
  attributed the intrusion to the DPRK-aligned Kimsuky
  cluster.
false_flag_risk: none
summary: |
  Anchor event for DPRK Kimsuky targeting of ROK national
  nuclear research. The intrusion's significance is
  doctrinal as much as operational: KAERI is the ROK
  national nuclear-research institute, conducting research
  on advanced reactor design and fuel cycle, and its
  compromise reinforced the NIS counter-DPRK doctrine's
  critical-infrastructure pillar.

  KAERI initially declined to confirm the intrusion before
  the parliamentary oversight committee forced public
  disclosure; the case became a domestic-politics issue
  over the institution's communication delay rather than
  over the attribution itself.

  AUSPEX assessment: concur on Kimsuky attribution per
  vendor consensus; false-flag risk rated `low` because
  the attribution did not result in indictment-grade
  public evidence and the VPN-IP-overlap basis is
  consistent with but not exclusive to Kimsuky.
attributions:
  - actor_id: kp/rgb/kimsuky
    attributing_org: ROK National Intelligence Service (informal) + vendor consensus
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2021-06-18
    attribution_source_id: wikipedia/kaeri
    notes: |
      NIS attribution was not formally published; the
      assessment was reported via Korean press citing
      government sources and reinforced by vendor
      reporting (e.g., Korean security firms identifying
      Kimsuky infrastructure overlap). AUSPEX rates
      attributing-org confidence `moderate` to reflect
      the informal channel rather than the rigour of a
      joint advisory.
doctrine_links:
  - doctrine_id: kr/nis-counter-dprk
    pillar_id: kr/nis-counter-dprk/critical-infrastructure
    program_id: null
    confidence: attested
    reasoning: |
      Target is ROK national nuclear-research institute;
      response was coordinated under the NIS counter-DPRK
      critical-infrastructure protection posture.
    attesting_source_id: wikipedia/kaeri
    contested: false
    analyst: claude
targets:
  - target_id: orgs/kaeri
    role: primary
    outcome: |
      Network access via VPN vulnerability; data exfiltration
