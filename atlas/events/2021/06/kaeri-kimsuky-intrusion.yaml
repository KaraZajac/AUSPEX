id: 2021-06/kaeri-kimsuky-intrusion
name: Korea Atomic Energy Research Institute (KAERI) intrusion attributed to Kimsuky
start_date: 2021-05-14
disclosure_date: 2021-06-18
end_date: null
incident_type:
  - espionage
  - intrusion
initial_vector: n-day
outcome_summary: |
  Intrusion at the Korea Atomic Energy Research Institute
  (KAERI) via a VPN-server vulnerability. KAERI's public
  disclosure — a statement and press conference on 18 June
  2021 — confirmed that 13 unauthorized external IP addresses
  had accessed the internal network from 14 May 2021. One of
  those IPs was reported as overlapping infrastructure used by
  the DPRK-aligned Kimsuky cluster; KAERI patched the
  (undisclosed-vendor) VPN device.
false_flag_risk: none
summary: |
  Anchor event for DPRK Kimsuky targeting of ROK national
  nuclear research. The intrusion's significance is
  doctrinal as much as operational: KAERI is the ROK
  national nuclear-research institute, conducting research
  on advanced reactor design and fuel cycle, and its
  compromise sits squarely in the ROK NIS counter-DPRK
  doctrine's critical-infrastructure pillar (which names
  energy/nuclear explicitly) — an AUSPEX defender-frame
  reading, not a claim in the cited reporting.

  KAERI initially confirmed and then denied the attack
  before officially confirming it via a statement and press
  conference on 18 June 2021; the case became a
  domestic-communication issue over the confirm/deny/confirm
  reversal rather than over the attribution itself.

  AUSPEX assessment: concur-with-caveat on the Kimsuky
  attribution. The attribution is hedged in the reporting
  ("one of these IP addresses is linked to"/"believed to
  work under" the Reconnaissance General Bureau) and rests
  on a single intruding IP overlapping known Kimsuky
  infrastructure — consistent with but not exclusive to
  Kimsuky; it produced no indictment-grade public evidence.
  False-flag risk rated `none`: no source alleges a planted
  flag, and the target profile fits DPRK strategic
  collection.
attributions:
  - actor_id: kp/rgb/kimsuky
    attributing_org: KAERI disclosure + security reporting (one intruding IP overlapping known Kimsuky infrastructure)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-06-18
    attribution_source_id: bleepingcomputer/2021-06-19_kaeri-nuclear-research-agency-hacked-vpn
    notes: |
      The Kimsuky link surfaced from KAERI's own access-log
      analysis presented at its 18 June 2021 press conference:
      one of the 13 intruding IPs was reported as overlapping
      infrastructure used by Kimsuky, "believed to work under
      the North Korean Reconnaissance General Bureau." The
      cited reporting (BleepingComputer, The Record) does not
      name the NIS, IssueMakersLab, or any lawmaker as the
      attributing body, and does not name the VPN vendor.
      AUSPEX rates attributing-org confidence `moderate`:
      multiple outlets converge on Kimsuky, but the basis is a
      single hedged IP-infrastructure overlap disclosed through
      an informal channel, not a formal joint advisory.
      Named-actor (group + nation named; RGB named only as the
      believed parent), not named-unit.
