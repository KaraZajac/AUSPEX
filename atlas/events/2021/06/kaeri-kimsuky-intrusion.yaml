  notes: |
    PHANTOM RE-SOURCE (badrabbit model). Prior sole citation wikipedia/kaeri is a
    phantom: curl of https://en.wikipedia.org/wiki/Korea_Atomic_Energy_Research_Institute
    (78,404 bytes) is a general reference page on the institute with ZERO mention of
    the intrusion, Kimsuky, North Korea, hack/breach, or VPN — so no content hash
    recorded for it and it was removed from the event's sources[]. Event is REAL and
    well-documented -> re-sourced to two tier-1 secondary reports, both raw-snapshotted
    + hashed:
      * bleepingcomputer/2021-06-19_kaeri-nuclear-research-agency-hacked-vpn — sha256
        c2fa5c34…b07317af, 89,272 bytes.
      * therecord/2021-06-19_north-korean-hackers-breach-kaeri-vpn — sha256
        0a0fd0f1…c137e2a, 83,656 bytes.
    [a] FACTS: intrusion 14 May 2021 (The Record, quoting the KAERI spokesperson:
    "the intrusion took place last month on May 14, through a vulnerability in a
    virtual private network (VPN) server"); 13 unauthorized IPs ("Thirteen different
    IPs were seen abusing the vulnerability"); one IP overlapping Kimsuky infra
    ("One of these IP addresses was linked to attack infrastructure used by Kimsuky").
    CORRECTIONS: (i) BleepingComputer's lede mis-dates the intrusion as "June 14th";
    kept 14 May per The Record. (ii) STRIPPED "Pulse Secure" — both sources state the
    VPN vendor was withheld ("undisclosed VPN device" / "name of the VPN server vendor
    was redacted"); the prompt's Pulse-Secure detail is unsupported speculation, not
    imported. (iii) STRIPPED the unsupported "parliamentary oversight committee forced
    disclosure" specific — sources support only KAERI's own confirm/deny/confirm
    reversal ("officially confirmed the attack" after "initially confirming and then
    denying"); lawmaker Ha Tae-keung / IssueMakersLab appear in OTHER outlets, not in
    the two snapshotted sources. incident_type data-theft -> intrusion (no source
    quantifies exfiltration).
    [b] ATTRIBUTION: rewrote attributing_org from the unsupported "ROK National
    Intelligence Service (informal) + vendor consensus" to what the sources carry —
    KAERI's access-log disclosure + security reporting of a single IP overlapping
    Kimsuky infrastructure. Attribution is hedged in-source ("is linked to" /
    "believed to work under the ... Reconnaissance General Bureau"); kept
    attributing_org_confidence moderate; auspex_assessment concur -> concur-with-caveat
    (single hedged IP overlap, informal channel, no indictment-grade evidence). Set
    attribution_level: named-actor. attribution_source_id re-pointed wikipedia/kaeri ->
    bleepingcomputer (explicitly names Kimsuky + RGB).
    [c] DATES: start_date 14 May 2021 ✓; disclosure_date 18 June 2021 ✓ (BC: press
    conference "held yesterday" from a 19 June article; confirms KAERI press conf =
    18 June). end_date 2021-06-18 -> null: no source bounds the intrusion's end, so the
    prior end=disclosure was a conflation.
    [d] DOCTRINE_LINKS: re-pointed the existing kr/nis-counter-dprk defender-response
    link's attesting_source_id + inference_basis.source_id off wikipedia/kaeri onto the
    real BC source; kept strongly_inferred (KAERI = energy/nuclear national-CII, the
    exact sector that pillar names; honest that no source names the NIS doctrine and the
    event is a disclosure not a counter-action). ADDED an attacker-rationale link to
    kp/8th-congress-defense-plan/strategic-tech-collection at `plausible` — grounded in
    the target (national nuclear-research institute) + this cluster's own
    default_doctrine_alignment_ids; plausible because no source states DPRK purpose and
    two readings survive (steal the reactor/fuel-cycle tech vs. collect ROK nuclear
    policy intelligence). No attested link (no source states a strategic goal).
    [e] ATTRIBUTION_LEVEL: named-actor (Kimsuky + North Korea named; RGB named only as
    believed parent; no specific tasking unit).
    [f] ACTOR_ID: kp/rgb/kimsuky resolves -> atlas/actors/kp/kimsuky.yaml (id
    kp/rgb/kimsuky). No actor-file edits.
    PHANTOM DISPOSITION: wikipedia/kaeri is still legitimately cited by
    atlas/targets/orgs/kaeri.yaml as a tertiary reference for the institute itself (a
