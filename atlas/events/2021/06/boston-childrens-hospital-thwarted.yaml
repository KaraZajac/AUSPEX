id: 2021-06/boston-childrens-hospital-thwarted
name: Boston Children's Hospital intrusion attempt (thwarted)
start_date: 2021-06-01
disclosure_date: 2022-06-01  # FBI Director Wray public statement
end_date: 2021-06-30
incident_type:
  - intrusion
initial_vector: n-day  # Fortinet vulnerability
outcome_summary: |
  Iran government-sponsored intrusion attempt against Boston
  Children's Hospital blocked before operational impact thanks
  to an allied-intelligence tip. FBI Director Christopher Wray
  publicly attributed the intrusion to Iran in June 1, 2022
  Boston College Cyber Conference address.
false_flag_risk: none
summary: |
  Notable as a US-government public attribution of an attempted
  civilian-hospital cyber operation to Iran. Aligns with the
  Najee Technology / Afkar System cluster's broader targeting of
  US healthcare via exploitation of Fortinet FortiOS
  vulnerabilities (CVE-2018-13379, CVE-2019-5591, CVE-2020-12812),
  Microsoft Exchange ProxyShell (CVE-2021-34473), and VMware
  Horizon Log4Shell (CVE-2021-44228) — the same n-day intrusion
  tradecraft catalogued in CISA AA22-257A, with post-exploitation
  via PowerShell, scheduled tasks, Mimikatz credential dumping,
  abuse of valid credentials for lateral movement, and
  BitLocker-driven full-disk encryption used as a destructive
  primitive masquerading as ransomware. FBI did not name a
  specific Iranian actor in the public statement.
