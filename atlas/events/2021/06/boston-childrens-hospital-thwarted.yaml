  notes: |
    Audited against both cited RAW sources (snapshots captured + hashed 2026-07-10).
    FBI Director Wray "Boston Conference on Cyber Security" speech HTML sha256
    5f975d0b...16af7194 (77,540 bytes; full page — Boston Children's passage verbatim).
    CNN "FBI Director Says Iran Attempted Cyber Attack on Boston Children's Hospital"
    HTML sha256 ecfe5b85...7c7f4690 (4,014,500 bytes; Bonavolonta quotes verbatim).
    [a] FACTS: MAJOR STRIP of unsourced/embellished technical detail from the summary —
    neither cited source carries it. Term-scan of the FBI speech: 0 hits for CVE,
    Fortinet, ProxyShell, Log4, Najee, Mimikatz, BitLocker; CNN mentions "Fortinet"
    generically (x2) but has 0 CVE / ProxyShell / Najee / Mimikatz / BitLocker.
    Removed: CVE-2018-13379 / 2019-5591 / 2020-12812, ProxyShell CVE-2021-34473,
    Log4Shell CVE-2021-44228 / VMware Horizon, CISA AA22-257A framed as if it described
    THIS op, and the PowerShell / scheduled-tasks / Mimikatz / valid-cred lateral-
    movement / "BitLocker full-disk encryption ... masquerading as ransomware" chain.
    The BitLocker/ransomware claim is not merely unsourced but CONTRADICTED — FBI SAC
    Bonavolonta: "there was no ransomware deployed." ProxyShell (disclosed Aug 2021) and
    Log4Shell (Dec 2021) are also ANACHRONISTIC for a June 2021 intrusion. KEPT (sourced):
    June 2021; Fortinet-software exploitation to control the network ("according to US
    officials", CNN); intelligence-community-partner tip; Boston Field Office notified
    the hospital; thwarted before impact / before the end goal was known; no ransomware.
    Najee / Afkar / AA22-257A retained only as an explicitly-labelled uncited inference.
    [b] ATTRIBUTION: DOWNGRADED service specificity. Wray: "hackers sponsored by the
    Iranian government" (nation); CNN: "Iran" / "Iranian hackers". Neither names IRGC or
    any service/actor. Set attribution_level: nation and service_id null (was ir/irgc —
    an unsourced service upgrade the entry's own note disclaimed; contrast Bowman Dam,
    where ir/irgc IS carried by a DOJ indictment naming the IRGC). Kept actor_id null,
    attributing_org FBI (Director Wray), attributing_org_confidence high (Wray stated it
    flatly as fact), auspex_assessment concur.
    [c] DATES: start/end June 2021 confirmed (CNN "which took place in June 2021"; Wray
    "in the summer of 2021"). disclosure_date 2022-06-01 = speech date; CNN published_on
    2022-06-01 (Wray spoke "Wednesday" = 1 Jun 2022); FBI published_on 2022-06-01 ok. No
    start/disclosure conflation.
    [d] DOCTRINE_LINKS: (1) ir/asymmetric-warfare/civilian-cii-coercion DOWNGRADED
    attested -> strongly_inferred. Even Bowman Dam (firmer: DOJ IRGC named-unit + SCADA
    sluice-gate access) rates this same pillar only strongly_inferred because the source
    states no CII-coercion GOAL; here the goal was explicitly UNKNOWN ("thwarted before
    it was clear what the hackers' end goal ... was"), so attested is untenable.
    attesting_source_id set null; added inference_basis (signals + ruled_out [no
    ransomware] + alternatives [espionage / pre-positioning]). (2) REMOVED
    ir/cyber-deniable-retaliation — genuine mismatch: that doctrine's defining mechanism
    is hacktivist-persona laundering via Telegram/X claim-and-leak, and this intrusion
    had NO persona, NO public claim, NO leak (thwarted quietly, goal unknown); its
    "contractor-laundered destructive/coercive" reasoning was also unsupported.
    [e] ATTRIBUTION_LEVEL: added — set nation (Wray "Iranian government"; no unit/actor).
    [f] ACTOR_ID: null retained (no named actor in either source) — correct; not a
    counter-action, so no meta incident_type needed.
