    attribution_date: 2022-06-01
    attribution_source_id: fbi/2022-06-01_wray-boston-college
    notes: |
      Wray attributed the intrusion to "hackers sponsored by the
      Iranian government" (nation level); CNN likewise says "Iran"
      / "Iranian hackers." Neither cited source names IRGC, a
      specific service, contractor, or named actor — so
      attribution_level is nation and service_id is null. The prior
      ir/irgc value asserted a service the sources do not state (and
      that the entry's own note disclaimed upgrading to); contrast
      Bowman Dam, where service_id ir/irgc IS carried by a DOJ
      indictment that explicitly names the IRGC. The Najee
      Technology / Afkar System / IRGC context (CISA AA22-257A,
      Sept 2022) is a consistent but uncited inference, not what
      Wray attested.
