id: 2021-06/boston-childrens-hospital-thwarted
name: Boston Children's Hospital intrusion attempt (thwarted)
start_date: 2021-06-01
disclosure_date: 2022-06-01  # FBI Director Wray public statement
end_date: 2021-06-30
incident_type:
  - intrusion
initial_vector: n-day  # CNN/US officials: Fortinet-software exploitation to control the network; specific CVEs NOT in either cited source
outcome_summary: |
  Iran government-sponsored intrusion attempt against Boston
  Children's Hospital blocked before operational impact thanks
  to an allied-intelligence tip. FBI Director Christopher Wray
  publicly attributed the intrusion to Iran in June 1, 2022
  Boston College Cyber Conference address.
false_flag_risk: none
summary: |
  Notable as a US-government public attribution of an attempted
  civilian-hospital cyber operation to Iran. Per CNN citing US
  officials, the June 2021 intrusion exploited software made by
  Fortinet to gain control of the hospital's network; the FBI was
  tipped by "a valued partner within the intelligence community,"
  and its Boston Field Office notified the hospital and helped
  identify and mitigate the threat before impact. FBI SAC Joseph
  Bonavolonta stated the activity was thwarted "before it was
  clear what the hackers' end goal on the hospital's network was"
  and that "there was no ransomware deployed." Wray attributed the
  operation to "the Iranian government" and named no specific
  actor, unit, contractor, CVE, or post-exploitation tooling.
  ANALYST NOTE (inference — not carried by either cited source):
  the Iran-government + Fortinet-exploitation + US-healthcare
  profile is consistent with the IRGC-affiliated Najee Technology /
  Afkar System cluster later catalogued in CISA AA22-257A (Sept
  2022), but that advisory is uncited here and neither source ties
  it — or any specific CVE — to this intrusion.
