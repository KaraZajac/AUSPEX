  notes: |
    Audited vs RAW; all 5 cited sources snapshotted (PRESERVE tier on the two pre-existing).
    [a] FACTS: two fabrications STRIPPED from outcome_summary. (1) "USDA released emergency
    stocks" — unsupported; record shows USDA "contacted several major meat processors to
    encourage them to keep supplies moving and slaughter additional livestock" (CNBC) and could
    not publish June-1 wholesale prices — corrected. (2) "spot beef prices spiked ~10%" — refuted;
    the USDA figure is boxed beef "jumped more than 1%" (CNBC) — corrected to ~1%. $11M/Bitcoin
    CONFIRMED: JBS "paid the ransom ... announced Wednesday night [June 9]"; Nogueira "'This was
    a very difficult decision ... to prevent any potential risk for our customers'" (ABC). Payment
    was made after most plants resumed and publicly confirmed June 9 — prose de-conflated. Capacity
    CONFIRMED: "almost a quarter of American [beef] supplies" (AlJazeera) + "about 20% of the
    slaughtering capacity for U.S. cattle and hogs" (CNBC). Geography (US/Canada/Australia) + ~3-day
    recovery CONFIRMED (AlJazeera/CNBC). Dropped the unverifiable "for the first time" superlative;
    softened the CI-16 wording to a sourced characterization (Food & Agriculture is 1 of the 16 US
    CI sectors under PPD-21).
    [b] ATTRIBUTION: FBI→"REvil and Sodinokibi" verbatim (fbi): "We have attributed the JBS attack
    to REvil and Sodinokibi." concur/high retained — matches the source. Directionality intact
    (JBS US/global victim; Russia-based attacker per White House/CNBC).
    [c] DATES: start 2021-05-30 (Memorial-Day-weekend onset), disclosure 2021-05-31, end 2021-06-03
    (recovery) hold; attribution_date 2021-06-02 = FBI statement date (raw "June 2, 2021"). Source
    published_on verified vs bylines: fbi 2021-06-02, whitehouse 2021-06-16, cnbc 2021-06-01, abc
    2021-06-09, aljazeera 2021-06-02.
    [d] DOCTRINE: ru/sanctions-response-2022/criminal-proxy-mobilization kept at plausible (cluster-
    consistent with Colonial + Kaseya) and upgraded to the richer schema (inference_basis.alternatives
    + perspective: attacker-rationale + counter_explanation). FLAG: actor is now criminal/revil
    (stateless, default_doctrine_alignment_ids cleared 2026-06-25) — this link is a human-pending
    DROP candidate across the whole Colonial → JBS → Kaseya cluster.
    [e] ATTRIBUTION_LEVEL: added named-actor (FBI named the REvil/Sodinokibi brand, not a state unit).
    [f] ACTOR_ID: criminal/revil resolves to atlas/actors/criminal/revil.yaml (id: criminal/revil).
    OTHER CORRECTIONS: initial_vector valid-creds → unknown (JBS access vector never officially
    confirmed; leading vendor theory = compromised employee creds, SecurityScorecard, but no cited
    source states it). incident_type ransomware+disruption → ransomware+extortion+disruption (added
    "extortion" per the $11M ransom; retained the heavily-sourced "disruption").
    FLAGS for orchestrator: (1) target atlas/targets/orgs/jbs-foods.yaml is MISSING (broken FK; only
    this event references it) — needs creation. (2) doctrine-link cluster-wide drop decision (above).
    (3) initial_vector could be restored to valid-creds if SecurityScorecard is accepted as a citable
    vendor source. Reuters $11M article (reuters.com/.../2021-06-09) is 401-walled — ABC used instead.
