id: 2021-06/jbs-revil
name: JBS Foods ransomware (REvil)
start_date: 2021-05-30
disclosure_date: 2021-05-31
end_date: 2021-06-03
incident_type:
  - ransomware
  - disruption
initial_vector: valid-creds
outcome_summary: |
  REvil affiliate intrusion of JBS USA — the world's largest meat
  processor. North American and Australian plants shut down for
  approximately three days affecting roughly one-quarter of US
  beef-processing capacity and one-fifth of US pork capacity.
  USDA released emergency stocks; spot beef prices spiked ~10%.
  JBS paid USD 11M (Bitcoin) ransom on June 9 2021; CEO Andre
  Nogueira publicly confirmed the payment.
quantified_impact:
  usd_ransom_paid: 11000000
  downtime_days: 3
  us_beef_capacity_offline_pct: 25
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
summary: |
  Second major US-CII ransomware incident in the May–July 2021
  cluster (Colonial → JBS → Kaseya). Agriculture sector inclusion
  in CISA's CI-16 framework was reinforced after this incident.
  White House follow-up included the June 16 2021 Biden–Putin
  Geneva summit, which placed Russian-territorial harboring of
  ransomware actors on the bilateral agenda for the first time.
