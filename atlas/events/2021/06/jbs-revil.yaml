id: 2021-06/jbs-revil
name: JBS Foods ransomware (REvil)
start_date: 2021-05-30
disclosure_date: 2021-05-31
end_date: 2021-06-03
incident_type:
  - ransomware
  - extortion
  - disruption
initial_vector: unknown  # AUDIT 2026-07-10: JBS access vector never officially confirmed (was: valid-creds). Leading vendor theory = compromised employee creds (SecurityScorecard), but no cited source states it.
outcome_summary: |
  REvil affiliate intrusion of JBS USA — the world's largest meat
  processor. North American and Australian plants shut down for
  approximately three days, taking offline roughly one-quarter of
  US beef-processing capacity and about one-fifth of US pork
  capacity (JBS runs ~20% of US cattle and hog slaughter). The USDA
  could not publish June-1 wholesale prices and urged other
  processors to increase output; wholesale boxed-beef prices rose
  ~1% (USDA). JBS publicly confirmed on June 9 2021 that it had paid
  a USD 11M ransom in Bitcoin; CEO Andre Nogueira said the payment
  was made — after most plants had resumed — to prevent any further
  risk to customers.
quantified_impact:
  usd_ransom_paid: 11000000
  downtime_days: 3
  us_beef_capacity_offline_pct: 25
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
summary: |
  Second major US-CII ransomware incident in the May–July 2021
  cluster (Colonial → JBS → Kaseya). The incident underscored the
  standing of Food & Agriculture as one of the 16 US critical-
  infrastructure sectors. White House follow-up included the
  June 16 2021 Biden–Putin Geneva summit, at which Biden presented
  a list of "16 specific entities ... defined as critical
  infrastructure under U.S. policy" as off-limits and pressed that
  "responsible countries need to take action against criminals who
  conduct ransomware activities on their territory."
