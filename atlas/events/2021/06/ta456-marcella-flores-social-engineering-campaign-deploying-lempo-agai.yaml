initial_vector: phishing
false_flag_risk: none
summary: |
  Proofpoint detailed a years-long social-engineering and targeted-malware campaign by the Iranian-state aligned actor TA456 (aka Tortoiseshell, Imperial Kitten). Using the fake social-media persona 'Marcella (Marcy) Flores,' TA456 cultivated a relationship with an employee at a small subsidiary of an aerospace defense contractor across corporate and personal platforms over many months. In early June 2021 the actor sent the target malware via the ongoing email chain, delivering a .rar archive containing a malicious .xlsm document that, when macros were enabled, deployed malware Proofpoint named LEMPO. LEMPO established persistence, conducted reconnaissance and exfiltrated sensitive information to an actor-controlled email account over SMTPS before deleting host artifacts. Proofpoint linked TA456 to the IRGC via association with the Iranian company Mahak Rayan Afraz.
