id: 2021-06/ta456-marcella-flores-social-engineering-campaign-deploying-lempo-agai
name: "TA456 'Marcella Flores' social-engineering campaign deploying LEMPO against a US aerospace defense contractor"
start_date: 2021-06-01
incident_type:
  - espionage
  - reconnaissance
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Proofpoint detailed a years-long social-engineering and targeted-malware campaign by the actor it calls "the Iranian-state aligned threat actor TA456" (aka Tortoiseshell, Imperial Kitten). Using the fake social-media persona 'Marcella (Marcy) Flores,' TA456 cultivated a relationship with an employee at a small subsidiary of an aerospace defense contractor across corporate and personal platforms over many months. In early June 2021 the actor sent the target malware via the ongoing email chain, delivering a .rar archive containing a malicious .xlsm document that, when macros were enabled, deployed malware Proofpoint named LEMPO (an updated version of Tortoiseshell's Liderc). LEMPO established persistence, conducted reconnaissance and exfiltrated sensitive information to an actor-controlled email account over SMTPS (port 465) before deleting that day's host artifacts. On the actor's affiliation, Proofpoint relays — and states it "concurs with" — Facebook's 15 July 2021 attribution of a portion of Tortoiseshell's activity to the Iranian IT company Mahak Rayan Afraz (MRA), which Facebook assessed has ties to the IRGC; Proofpoint characterises TA456 as "believed to be loosely aligned with the Islamic Revolutionary Guard Corps (IRGC) ... according to Facebook's analysis." The IRGC link is thus a hedged, second-hand attribution Proofpoint endorses, not its own primary finding.
attributions:
  # Proofpoint (2021) named Iran ("Iranian-state aligned threat actor TA456") -> named-actor / nation = Iran.
  # The IRGC (named-unit) link is FACEBOOK's, relayed and endorsed by Proofpoint, and explicitly hedged
  # ("loosely aligned", MRA "ties to" IRGC); the shared actor stays ir/unscoped because that IRGC nexus is
  # only suspected. So attribution_level is held at named-actor, with the IRGC/Facebook nuance in notes.
  - actor_id: ir/unscoped/imperial-kitten
    attributing_org: "Proofpoint"
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-07-28
    attribution_source_id: proofpoint/2021-06_ta456-marcella-flores-social-engineering
    notes: "Proofpoint attributes the campaign to Iran ('the Iranian-state aligned threat actor TA456'). It does NOT independently name the IRGC: it relays Facebook's 15 Jul 2021 MRA->IRGC attribution and says 'Proofpoint concurs with this attribution,' describing TA456 as 'believed to be loosely aligned with the IRGC ... according to Facebook's analysis.' Held at named-actor (not named-unit) because the IRGC nexus is second-hand and hedged, and the shared actor was demoted to ir/unscoped for exactly that reason. attribution_date is the article's real datePublished (2021-07-28), not the 2021-06-01 campaign-month placeholder."
