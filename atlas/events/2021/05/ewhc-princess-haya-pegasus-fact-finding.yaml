    attributing_org_confidence: moderate  # AUDIT 2026-07-11: downgraded from 'high' — Marczak was HIGH confidence the phones were hacked by a single nation-state operator, but only "medium confidence" that the government is the UAE; prior 'high' over-stated the UAE-government attribution
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2021-05-05
    attribution_source_id: judiciary-uk/2021-05-05_mohammed-v-hussein-hacking-fact-finding
    notes: |
      Citizen Lab forensic chain (Dr Marczak) tendered as expert
      evidence: "I conclude with high confidence that Nick Manners,
      Princess Haya and Baroness Shackleton were hacked by a single
      operator of NSO Group's spyware ... [and] that this operator
      is a nation-state," but only "medium confidence that the
      government in question is the UAE Government." The court
      accepted the forensic HACKING analysis but expressly did NOT
      rely on Marczak on the issue of ATTRIBUTION (para 158); the
      UAE-government identification is the court's own balance-of-
      probabilities finding, not Marczak's.
