id: 2021-05/ewhc-princess-haya-pegasus-fact-finding
name: English High Court Family Division fact-finds UAE-state Pegasus targeting of Princess Haya and her solicitors
start_date: 2020-07-01  # forensic-timeline window of Pegasus deployments documented in the judgment
disclosure_date: 2021-10-06  # public release of the judgment
end_date: 2020-08-31  # outermost forensic-timeline window of confirmed compromises
incident_type:
  - intrusion
  - surveillance
  - documentary  # AUDIT 2026-07-11: removed 'law-enforcement' — this is a Family Division civil fact-finding judgment, not an LE takedown/indictment/sanction; the meta type is documentary
initial_vector: unknown  # AUDIT 2026-07-11: the judgment describes Pegasus delivery only generically — zero-click "over-the-air" push-message infection OR a single-click "spoof text message" link — and does NOT pin the vector used against these six phones, nor attest a specific 0-day/iMessage/network-injection. Prior "0-day / iMessage / network-injection delivery" was not source-carried (cf. citizenlab-uk-government-pegasus-uae audit precedent)
outcome_summary: |
  Sir Andrew McFarlane, President of the Family Division of the
  English High Court, hands down a fact-finding judgment ([2021]
  EWHC 1162 (Fam)) dated 5 May 2021 (publicly released 6 October
  2021) finding on the balance of probabilities that the agents
  of HH Sheikh Mohammed bin Rashid Al Maktoum (Ruler of Dubai,
  Vice-President and Prime Minister of the UAE) caused the
  surveillance — via NSO Group Pegasus — of the mobile phones of
  HRH Princess Haya bint Al Hussein, two of her solicitors
  (including Baroness Fiona Shackleton, a sitting member of the
  House of Lords), her personal assistant, and two members of
  her security staff. Citizen Lab's Dr William Marczak gave
  expert evidence; the court recorded a figure of approximately
  265 MB of data exfiltrated from Princess Haya's phone on one
  occasion. NSO Group did not appear as a party; it engaged the
  court through correspondence (a letter dated 14 December 2020
  sent via CAFCASS) and an earlier senior-manager call relayed
  through Cherie Blair QC, confirming that the provision of
  services to the relevant customer stopped completely as of 7
  December 2020 and that its products "are used exclusively by
  government intelligence and law enforcement agencies" (the ruler
  being "not himself a customer").
false_flag_risk: none  # primary-source court fact-finding with NSO confirmation of customer access termination
summary: |
  The Princess Haya judgment is the highest-tier UAE Pegasus
  attribution in the AUSPEX corpus: a tier-1 court fact-finding
  in a Five Eyes jurisdiction, finding on the balance of
  probabilities that the Ruler of Dubai (an individual within UAE
  state leadership) authorised the operation — the Pegasus customer
  itself being a UAE/Dubai government agency, the ruler "not himself
  a customer." The intra-royal-family targeting
  dimension extends the regime-protection-surveillance doctrine
  beyond the dissidents-and-journalists pattern to family-
  internal targeting under the legal framing of the UAE Vice-
  President / Prime Minister. The targeting of Baroness
  Shackleton as a UK parliamentarian-solicitor is independently
  significant for the bilateral-trust dimension of the procurement-
  led-capability framing.

  AUSPEX records the start_date as July 2020 (the earliest
  forensic-confirmed compromise window per the judgment); the
  end_date August 2020 covers the brief operational window
  before Citizen Lab notification and NSO customer-termination.
