    [a] FACTS — all load-bearing claims carried by the primary judgment:
      • Neutral citation [2021] EWHC 1162 (Fam), dated 5 May 2021, publicly
        released 6 October 2021 (PDF ModDate 2021-10-06; Globe & Mail "Oct. 6,
        2021") — CONFIRMED.
      • Six phones (para 4(i) / para 171): "The mobile phones of the mother, two
        of her solicitors (Baroness Shackleton and Nicholas Manners), her
        Personal Assistant and two members of her security staff." IntaForensics
        found "five of the six phones may have been the subject of surveillance";
        Marczak/Beresford high-confidence on four (Mr X, Haya, Shackleton,
        Manners). Court's final finding (para 171) covers all six — victim list
        CONFIRMED, no over-scope.
      • 265 MB — verbatim "265 megabytes of data were taken from Her Royal
        Highness' phone"; caveated by the court as taken "on one occasion" and
        not the total (para 150). Added "on one occasion" to outcome_summary.
        Corroborated by Globe & Mail ("UAE agents had downloaded 265 megabytes").
      • CORRECTION (fabrication/over-statement stripped): outcome_summary said
        "NSO Group appeared via counsel and confirmed it had terminated the
        relevant customer's access." NSO did NOT appear via counsel / was not a
        party. Its involvement (paras 49–51, 102–106) was (i) a senior-manager
        call relayed via Cherie Blair QC and (ii) a letter dated 14 December 2020
        sent to the court via CAFCASS, confirming services to the customer
        "stopped completely as of 7 December 2020" and that NSO's products "are
        used exclusively by government intelligence and law enforcement agencies"
        (so "the father was not himself a customer"). Rewrote outcome_summary and
        the summary block ("as the customer authorising" → "authorised … the
        Pegasus customer itself being a UAE/Dubai government agency"). Same
        "appeared via leading counsel" error corrected in the judiciary-uk
        source-record note.
      • Father's titles: judgment states "the father is the Prime Minister of the
        UAE and Head of Government" (para 1906). "Ruler of Dubai" is source-carried
        (Globe & Mail). "Vice-President" is NOT in any snapshotted source but is a
        standard uncontested factual title — retained as non-load-bearing context.

    [b] ATTRIBUTION — court entry kept high / concur / nation (added
    attribution_level). The court's finding is emphatic ("the father, above any
    other person in the world, is the probable originator", para 168; "arm of
    the State", para 169; para 171) but at the CIVIL balance-of-probabilities
    standard, reached largely on the father's non-rebuttal — noted in the entry.
    DOWNGRADE (over-attestation): Citizen Lab entry high → moderate. Marczak was
    "high confidence" the phones were hacked by a single nation-state operator
    but only "medium confidence that the government in question is the UAE
    Government"; and the court expressly "did not place any reliance upon
    evidence from Dr Marczak on the issue of attribution" (para 158). Rewrote
    that entry's note to separate the (high) forensic-hacking finding from the
    (medium) UAE-government identification. NSO modeled as vendor (il/nso-group),
    actor_id null on both entries (documentary/court meta-event; court = attributing
    body) — per task.

    [c] DATES — verified. start_date 2020-07 and end_date 2020-08 match "The
    hacking took place in July or August 2020" (para 160) and the forensic
    markers (12 July / 3 Aug 2020); NSO's investigation concluded ~15 Sep 2020
    and services were terminated 7 Dec 2020 (post-window). disclosure_date
    2021-10-06 = public release (PDF ModDate; Globe & Mail; The Register 7 Oct).
    attribution_date 2021-05-05 = judgment date. judiciary-uk published_on
    2021-05-05 (handed-down date) ✓.

    [d] DOCTRINE_LINKS — procurement-led-capability/commercial-spyware KEPT
    attested (meets the doctrine's own bar: a primary source [court, para 4(ii)/
    171] AND a vendor source [NSO letter, para 105–106] explicitly establish UAE/
    Dubai procurement of Pegasus). Added inference_basis.source_quote: "The
    surveillance has been carried out by using software licensed to the Emirate
    of Dubai or the UAE by the NSO Group." regime-protection-surveillance:
    (1) RE-HOMED pillar /domestic-dissidents → /regional-political-targets —
    Haya is a royal-family/political target (the pillar explicitly covers
    "royal-family targets"), NOT an Emirati dissident/HRD; (2) DOWNGRADED
    attested → strongly_inferred — the court attests operator + ruler's authority
    but articulates no regime-protection strategic goal (frames it as personal
    "abuse of power" in custody litigation, and even declines to tie the timing
    to the proceedings, para 161). Added inference_basis {signals[], ruled_out}.
    Mirrors the karma-toolkit-reuters-disclosure precedent.

    [e] ATTRIBUTION_LEVEL — was MISSING on both entries; set to `nation` (court
    attributed to the UAE/Dubai state on the ruler's authority; Marczak: nation-
    state operator, UAE govt at medium). No named cyber unit was identified.

    [f] ACTOR_ID — null on both entries, correct for a documentary/court meta-
    event (subject Sheikh Mohammed named in prose; NSO = vendor). incident_type:
    removed 'law-enforcement' (a Family Division civil fact-finding is not an LE
    takedown/indictment/sanction) → intrusion + surveillance + documentary.
    initial_vector 0-day → unknown (the judgment describes Pegasus delivery only
    generically — zero-click "over-the-air" push-message OR single-click "spoof
    text message" — and does not pin the vector for these phones; "iMessage /
    network-injection" was not source-carried; cf. citizenlab-uk-government-
    pegasus-uae). service_id ae/state-security KEPT (AUSPEX customer-anchor
    convention for UAE Pegasus, per the service def's own framing) but FLAGGED:
    the court named only "servants or agents of the father, the Emirate of Dubai
    or the UAE" (no agency), and NSO's "little state" hint (para 166) points to
    Dubai specifically — a registry question for the orchestrator.

    ORCHESTRATOR FLAGS (no edits made outside the event file + its own source
    records):
      • service_id ae/state-security — the primary attributes only to the UAE/
        Dubai state on the ruler's authority (no named agency); consider whether a
        Dubai-emirate anchor better fits the NSO "little state" evidence.
      • target sectors/civil-society/dissident (ae, Haya) — poor fit; Haya is a
        royal-family/political target and there is no royal-family/individual
        sector in the taxonomy. Added sectors/legal (uk) for the directly-hacked
        solicitors; left the dissident tag flagged in place.
      • doctrine-file vs audit-protocol rubric tension: ae/regime-protection-
        surveillance's own cyber_relevance calls for `attested` on operator-
        identity, but audit [d] gates attested on a stated terminal GOAL — resolved
        here to strongly_inferred.

    RESIDUALS: (1) forbiddenstories carries no Haya-specifics — it is corpus-level
    UAE-customer corroboration; the load-bearing facts all rest on the snapshotted
    primary judgment (+ Globe & Mail on 265 MB / ruler-of-Dubai / Oct-6 release).
    (2) "Vice-President" title not in any snapshotted source (uncontested fact,
    retained). (3) false_flag_risk: none KEPT — the court affirmatively considered
    and dismissed alternative-state theories (Iran/Israel/Saudi/Jordan) as
    "insubstantial … without consequence" at the balance-of-probabilities standard
    (paras 163–165).
