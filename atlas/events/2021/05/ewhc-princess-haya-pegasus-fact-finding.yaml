    notes: |
      Primary-source judicial fact-finding on the balance of
      probabilities ("more probable than not"): the surveillance of
      the six phones by Pegasus "was carried out by servants or
      agents of the father, the Emirate of Dubai or the UAE ... with
      the express or implied authority of the father" (para 171).
      The court reached this on the father's non-rebuttal plus its
      prior findings, and expressly "did not place any reliance upon
      evidence from Dr Marczak on the issue of attribution" (para
      158). NSO's confirmation that the customer's services were
      terminated (7 December 2020) corroborates the customer-state
      identification at the vendor-cooperation level.
