      confirmed by letter that the UAE/Dubai customer's Pegasus
      services were terminated and that "our products are used
      exclusively by government intelligence and law enforcement
      agencies." Procured Israeli commercial spyware deployed by a
      UAE-government customer — the pillar's clearest tier-1
      confirmation in the corpus.
