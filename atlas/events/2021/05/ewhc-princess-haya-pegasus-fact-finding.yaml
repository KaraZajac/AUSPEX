  notes: |
    Full 6-point audit against RAW snapshots of all four cited sources.
    REAL documentary/legal meta-event (Phantom triage: all sources HTTP-200
    and on-topic — the primary is the genuine 40-page judgment PDF). The
    primary carries every load-bearing claim; the two secondaries corroborate;
    the fourth (forbiddenstories) is corpus-level UAE-customer corroboration
    only. Snapshots (raw_snapshot + content_sha256 added to each record this
    audit except forbiddenstories, pre-snapshotted 2026-07-10 and hash re-verified):
