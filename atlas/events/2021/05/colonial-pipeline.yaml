  notes: |
    Full 6-point audit vs raw cited sources (Opus 4.8, max). RE-SOURCE outcome: the event was
    REAL and accurate but its three cited US-govt sources are THIN relative to the prose — they
    carry the DarkSide attribution (FBI), the RaaS/critical-infrastructure framing (CISA
    AA21-131A) and the BTC recovery (DOJ), but NOT the vector, the physical scope, the impacts,
    the $4.4M paid, or the policy aftermath. Added four snapshot-able corroborators so every
    load-bearing claim is now carried; no fabrications found (figures are accurate, not
    embellished). level=full.

