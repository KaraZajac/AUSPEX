    [a] FACTS — verified; several claims re-sourced or corrected.
      • ATTRIBUTION/vector: DarkSide confirmed by FBI ("The FBI confirms that the Darkside ransomware
        is responsible for the compromise of the Colonial Pipeline networks"). VECTOR (task-flagged):
        carried by Bangor/Bloomberg — "Hackers gained entry … on April 29 through a virtual private
        network account … said Charles Carmakal … Mandiant"; "The VPN account … didn't use multifactor
        authentication … allowing the hackers to breach Colonial's network using just a compromised
        [password]"; "no longer in use at the time of the attack but could still be used"; password
        "discovered inside a batch of leaked passwords on the dark web." initial_vector: valid-creds ✓.
      • SHUTDOWN/scope (task-flagged): "The Colonial Pipeline comprises more than 5,500 miles … starts
        in Texas and moves all the way up through New Jersey" (TechTarget); "delivers about 45% of the
        gasoline consumed on the East Coast … halted fuel supplies for nearly a week" (PBS/AP). CISA
        AA21-131A adds the key nuance now reflected in prose: DarkSide hit the IT network and "there are
        no indications that the threat actor moved laterally to OT systems" — the shutdown was
        precautionary. downtime_days 6 / end 2021-05-12 ✓ ("May 12 … restarted as normal operations
        resumed", TechTarget; "nearly a week", PBS; note: elapsed May 7->12 is ~5–6 days, "six days" is
        the standard phrasing — retained, not embellished). pipeline_miles_offline 5500 ✓.
      • IMPACT: "panic-buying and shortages at gas stations from Washington, D.C. to Florida" (PBS);
        "panicked Americans filling bags with fuel" (CISA retro); "May 9, 2021 Emergency declaration"
        (TechTarget). GENERALIZED two over-specific decorative claims to what the snapshots carry:
        the event's "emergency declarations in 17 states + DC" -> "a federal emergency declaration"
        (the precise 17-state FMCSA count is real but not in a snapshotted source; PBS gives Colonial's
        distinct 13-state+DC *delivery* footprint); and the airport claim — the event said "Charlotte
        and Atlanta," but the snapshot (TechTarget) names American Airlines + "Atlanta and Nashville,"
        so the specific airport names were dropped rather than mis-assert.
      • MONEY (task-flagged $4.4M / $2.3M): "$4.4 million" and "75 Bitcoin … paid the day after"
        (PBS/AP; Blount confirmation) — DOJ gives the paid ransom only as "approximately 75 bitcoins"
        (no USD). Recovery: "seized 63.7 bitcoins currently valued at approximately $2.3 million …
        proceeds of a May 8 ransom payment … for which the FBI has the 'private key'" (DOJ); "June 7 …
        DOJ recovers 63.7 bitcoin -- approximately $2.3 million" (TechTarget). The differing BTC counts
        (75 paid / 63.7 recovered) and USD (4.4M / 2.3M, BTC price having fallen) are internally
        consistent and correctly preserved. incident_type +extortion added (DOJ title "Ransomware
        Extortionists DarkSide"; DarkSide double-extortion) -> [ransomware, extortion, disruption].
      • STRIPPED: the summary's "EO 14028 (Improving the Nation's Cybersecurity)" as an outcome of
        Colonial — EO 14028 was principally a SolarWinds-driven order signed 2021-05-12, is not carried
        by any snapshotted source here, and crediting Colonial with "ushering [it] in" is an
        anachronistic causal overstatement. Policy aftermath now rests on the two source-carried items:
        TSA's Security Directives and the Joint Ransomware Task Force (CISA retro).
      • CODA: the DarkSide wind-down / BlackMatter -> ALPHV lineage is not in this event's cited
        sources; it is documented+sourced in the actor file criminal/darkside, to which the event now
        defers (kept as a one-line pointer, not an event-load-bearing claim).

