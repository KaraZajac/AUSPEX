id: 2021-05/colonial-pipeline
name: Colonial Pipeline ransomware shutdown (DarkSide)
start_date: 2021-05-07  # ransomware execution + preemptive shutdown; initial VPN access was 2021-04-29 (Bloomberg/Mandiant)
disclosure_date: 2021-05-08
end_date: 2021-05-12
incident_type:
  - ransomware
  - extortion
  - disruption
initial_vector: valid-creds
outcome_summary: |
  DarkSide affiliate intrusion. Initial access on 2021-04-29 through a
  single leaked VPN account credential that lacked multi-factor
  authentication (the account was no longer in use but still active;
  its password later surfaced in a dark-web leak). On 2021-05-07
  DarkSide ransomware hit Colonial's IT/billing network — CISA found no
  indication the actor moved laterally to OT — and Colonial preemptively
  shut down its ~5,500-mile Texas-to-New Jersey refined-fuels system
  (~45% of East Coast supply) for roughly six days (restart 2021-05-12).
  Panic-buying and gasoline shortages from Washington, D.C. to Florida
  and a federal emergency declaration (2021-05-09). Colonial paid 75 BTC
  (USD ~4.4M) on 2021-05-08; on 2021-06-07 DOJ announced seizure of
  approximately 63.7 BTC (USD ~2.3M) via FBI "private key" control of
  the ransom wallet.
quantified_impact:
  usd_ransom_paid: 4400000
  usd_ransom_recovered: 2300000
  downtime_days: 6
  pipeline_miles_offline: 5500
false_flag_risk: none
summary: |
  The canonical US critical-infrastructure ransomware-disruption case.
  Prompted TSA's first cybersecurity Security Directives for pipelines
  and fed the federal ransomware-response push, including the CISA/FBI
  Joint Ransomware Task Force. DarkSide wound down its operation within
  days of the attack (server access lost amid law-enforcement pressure);
  personnel and code later resurfaced in the DarkSide -> BlackMatter ->
  ALPHV lineage, detail for which is maintained in the actor file
  (criminal/darkside).
attributions:
  - actor_id: criminal/darkside
    attributing_org: FBI
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2021-05-10
    attribution_source_id: fbi/2021-05-10_darkside-alert
doctrine_links: []  # ru/sanctions-response-2022 dropped per the 2026-07-05 Kara decision: DarkSide is a stateless profit-criminal actor (criminal/darkside); no cited source ties this ransomware op to Russian state mobilization. Do NOT re-add.
targets:
