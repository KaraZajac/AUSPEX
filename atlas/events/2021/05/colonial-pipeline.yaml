id: 2021-05/colonial-pipeline
name: Colonial Pipeline ransomware shutdown (DarkSide)
start_date: 2021-05-07
disclosure_date: 2021-05-08
end_date: 2021-05-12
incident_type:
  - ransomware
  - disruption
initial_vector: valid-creds
outcome_summary: |
  DarkSide affiliate intrusion via a leaked legacy VPN credential
  (no MFA). Colonial Pipeline preemptively shut down ~5,500 miles
  of refined-fuels pipeline serving the US East Coast for six
  days. Average retail gasoline shortages across the Southeast;
  emergency declarations in 17 states + DC; jet fuel disruption
  at Charlotte and Atlanta airports. Company paid 75 BTC
  (USD ~4.4M) ransom on day one; FBI on June 7 announced recovery
  of approximately 63.7 BTC (USD ~2.3M) via "private-key access"
  to the wallet.
quantified_impact:
  usd_ransom_paid: 4400000
  usd_ransom_recovered: 2300000
  downtime_days: 6
  pipeline_miles_offline: 5500
false_flag_risk: none
summary: |
  The canonical US-CII-ransomware-disruption case. Triggered the
  Biden TSA Pipeline Security Directives (May / July 2021),
  ushered in EO 14028 (Improving the Nation's Cybersecurity) and
  the CISA / FBI joint Ransomware Task Force. DarkSide voluntarily
  shut down operations May 13 2021 citing "pressure from US
  authorities"; servers seized by an unidentified party. Personnel
  reconstituted as BlackMatter (July 2021) then ALPHV (Nov 2021).
attributions:
  - actor_id: criminal/darkside
    attributing_org: FBI
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2021-05-10
    attribution_source_id: fbi/2021-05-10_darkside-alert
doctrine_links:
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/criminal-proxy-mobilization
    program_id: null
    confidence: plausible
    reasoning: |
      DarkSide claimed nominal apolitical intent and explicitly
      apologized for the Colonial impact, suggesting state-tolerance
      withdrawn rather than state-directed targeting. AUSPEX tags
      the broader Russian-criminal-proxy doctrine at plausible
      confidence rather than attested; the operation predates the
      Feb 2022 codification of the sanctions-response posture and
      is properly understood as the inflection event that catalyzed
      it.
    counter_explanation: |
      Pure financial-criminal motive with no state direction is
      consistent with the available evidence. Doctrine link is
      analytical overlay rather than attested.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/colonial-pipeline
    role: primary
    outcome: |
      Six-day shutdown of US East Coast refined-fuels backbone;
      USD ~4.4M ransom paid (~USD 2.3M later recovered by FBI).
sources:
