  notes: "Audited vs SentinelLabs 'From Wiper to Ransomware: The Evolution of Agrius' (raw snapshot captured + sha256). FACTS ✓: Agrius active in Israel since 2020; espionage-then-wiper masqueraded as ransomware; IPsec Helper .NET backdoor; Apostle wiper later reworked into ransomware; DEADWOOD/Detbosit reuse; public-facing-app exploitation + ProtonVPN anonymization; Apostle ransomware message naming a critical nation-owned UAE facility — all verbatim-supported. ATTRIBUTION (exact wording): 'we assess with medium confidence that the attacks were carried out by a threat group affiliated with Iran' / 'medium confidence to be of Iranian origin'; and decisively 'Throughout our analysis ... we found no solid links to any known threat groups' — nation named (moderate), service NOT named. Set attribution_level=named-actor (SentinelLabs' own named cluster 'Agrius' + Iran), confidence moderate. KEY CORRECTION: actor DEMOTED ir/mois/agrius -> ir/unscoped/agrius — neither this source nor the actor's other cited sources (Unit 42 2023 'Iranian-linked/Iranian-backed' high conf; ESET 2022 'Agrius operators') name MOIS, IRGC or any service; the MOIS placement was an unsourced provisional-backfill assertion. Actor also de-provisionalized (real ttp_summary, sourced aliases). DOCTRINE: kept plausible (honest) — source gives Iranian-strategic framing but not the specific goal, and the named victim here is in the UAE, so anti-Israel-coercion vs. broader anti-Gulf-rival pressure both survive; added inference_basis.alternatives. FK-propagated ir/mois->ir/unscoped to all 4 referencing events."
