summary: |
  SentinelLabs detailed the emergence of Agrius, a then-new Iran-affiliated threat actor active in Israel since 2020 that conducted espionage before deploying destructive attacks disguised as ransomware. Agrius dropped a custom .NET backdoor (IPsec Helper) and a novel wiper named Apostle, which was later reworked into functional ransomware; the older Deadwood/Detbosit wiper was also used. The actor gained access by exploiting public-facing applications and anonymized its operations through VPN services (primarily ProtonVPN). One Apostle sample carried a message indicating it was used against a critical, nation-owned facility in the United Arab Emirates. SentinelLabs assessed with medium confidence that the activity was carried out by an Iran-affiliated group.
