id: 2021-05/agrius-apostle-wiper-ipsec-helper-campaign-against-israel-and-a-uae-na
name: "Agrius Apostle wiper / IPsec Helper campaign against Israel and a UAE nation-owned facility"
start_date: 2021-05-01
incident_type:
  - wiper
  - destructive
  - espionage
initial_vector: n-day
false_flag_risk: none
summary: |
  SentinelLabs detailed the emergence of Agrius, a then-new Iran-affiliated threat actor active in Israel since 2020 that conducted espionage before deploying destructive attacks disguised as ransomware. Agrius dropped a custom .NET backdoor (IPsec Helper) and a novel wiper named Apostle, which was later reworked into functional ransomware; the older Deadwood/Detbosit wiper was also used. The actor gained access by exploiting public-facing applications and anonymized its operations through VPN services (primarily ProtonVPN). One Apostle sample carried a message indicating it was used against a critical, nation-owned facility in the United Arab Emirates. SentinelLabs assessed with medium confidence that the activity was carried out by a threat group affiliated with Iran, while noting it found "no solid links to any known threat groups" — i.e. no specific Iranian service or named group was identified.
