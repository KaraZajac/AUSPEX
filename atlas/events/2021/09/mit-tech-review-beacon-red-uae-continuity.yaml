outcome_summary: |
  UNSUPPORTED — DELETE candidate. This record asserts that MIT
  Technology Review (Patrick Howell O'Neill) "documents Beacon Red as
  the corporate continuity vehicle for UAE offensive-cyber-services
  contractor work after DarkMatter" — a documentary act the cited
  article does NOT perform and that no locatable source performs.
  The genuine MIT-TR article of the cited title ("The hacker-for-hire
  industry is now too big to fail") is dated 2021-12-28 (not the
  claimed 2021-09-13), is about NSO Group and the global
  hacker-for-hire industry, and — verified in the snapshotted bytes
  and via WebFetch — mentions "Beacon Red" 0×, "Project Raven" 0×,
  "DarkMatter" 0×, and "EDGE Group" 0× (its only UAE reference is the
  2016 Mansoor/NSO-Pegasus case). The cited 2021-09-13 URL
  (/1035645/uae-mercenary-spies-ex-nsa-doj/) is a phantom (HTTP 404,
  re-confirmed 2026-07-11). The other two cited sources do not carry
  the claim either: Reuters (2019) names the CyberPoint→DarkMatter
  contractor chain and never "Beacon Red"; the DOJ DPA (2021-09-14)
  anonymizes the employer as "U.A.E. CO" and names KARMA, not Beacon
  Red. Web search confirms Beacon Red is a real EDGE Group subsidiary
  (founded 2018) that employs ex-Western-intelligence personnel, but
  finds NO reporting tying it to DarkMatter/Project Raven or to
  "absorbing ex-NSA" as a post-Raven successor.
