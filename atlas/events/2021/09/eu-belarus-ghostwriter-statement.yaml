initial_vector: unknown  # documentary/policy meta-event (an EU declaration) — no initial-access vector applies
outcome_summary: |
  On 24 September 2021 the High Representative issued a Declaration
  on behalf of the European Union "on respect for the EU's
  democratic processes." It stated that "some EU Member States have
  observed malicious cyber activities, collectively designated as
  Ghostwriter, and associated these with the Russian state,"
  denounced them as "unacceptable," and described them as targeting
  "numerous members of Parliaments, government officials,
  politicians, and members of the press and civil society in the
  EU by accessing computer systems and personal accounts and
  stealing data." The declaration urged "the Russian Federation to
  adhere to the norms of responsible state behaviour in cyberspace."
  It named no specific member state and did not mention Belarus,
  the KGB, or UNC1151.
false_flag_risk: none
summary: |
  A documentary / policy meta-event: an EU collective political
  attribution of the Ghostwriter cyber-and-influence activity, made
  by the High Representative on behalf of the Union. The declaration
  attributed Ghostwriter to "the Russian state" and called on "the
  Russian Federation" to observe cyberspace norms — it did NOT name
  Belarus. It followed individual member-state statements (notably
  the German Federal Foreign Office's 6 September 2021 attribution
  of the pre-Bundestag-election operations to "cyber actors of the
  Russian State and specifically to the ... GRU"). NB the
  Ghostwriter NATION is contested: AUSPEX canonically homes the
  operator cluster to Belarus (by/unscoped/ghostwriter) on
  Mandiant's high-confidence UNC1151 technical attribution, while
  this EU declaration and the German statement — the political
  attributions — name Russia/the GRU. This event records the EU
  declaration's own language (Russian state); the Belarus-vs-Russia
  contest is flagged on the actor record and not re-homed.
