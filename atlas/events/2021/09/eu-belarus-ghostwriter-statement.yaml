id: 2021-09/eu-belarus-ghostwriter-statement
name: Council of the EU attributes Ghostwriter to Belarusian-linked threat actors
start_date: 2017-01-01
disclosure_date: 2021-09-24
end_date: null
incident_type:
  - influence-operation
  - intrusion
initial_vector: phishing
outcome_summary: |
  The Council of the European Union issued a Declaration by the
  High Representative attributing the Ghostwriter cyber-and-
  influence campaign to "Belarus-linked threat actors." The
  declaration named member states whose officials had been
  targeted (notably Germany, Poland, Lithuania, Slovakia) and
  characterized the operations as "unacceptable."
false_flag_risk: none
summary: |
  Significant as one of the few EU collective attributions of a
  Belarusian state-aligned cyber campaign. Followed Mandiant's
  April 2021 UNC1151 technical attribution and Germany's
  September 6, 2021 statement specifically attributing the
  pre-Bundestag-election operations to Ghostwriter.
