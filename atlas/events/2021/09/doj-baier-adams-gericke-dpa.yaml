outcome_summary: |
  US Department of Justice announces deferred-prosecution
  agreements with three former US intelligence-community and
  military personnel — Marc Baier (US citizen), Ryan Adams (US
  citizen), and Daniel Gericke (a former US citizen) — who agreed
  to pay $1,685,000 collectively (Baier $750,000, Adams $600,000,
  Gericke $335,000) over a three-year term to resolve criminal
  charges arising from their provision of computer-network-
  exploitation ("hacking") services to the UAE government between
  2016 and 2019. As senior managers of a UAE-based company's
  "Cyber Intelligence-Operations" team, they provided support,
  direction and supervision for the creation of "zero-click"
  exploitation systems (colloquially "KARMA" and "KARMA 2") that
  obtained unauthorized access to mobile devices and US-company
  accounts worldwide — including US persons and servers in the
  United States — in violation of US export control (ITAR "defense
  services" requiring a State Department/DDTC license), computer
  fraud, and access-device fraud statutes. The DPA also imposed
  the immediate relinquishment of security clearances, a lifetime
  ban on future US clearances, and restrictions on CNE/ITAR-
  related employment.
false_flag_risk: none
