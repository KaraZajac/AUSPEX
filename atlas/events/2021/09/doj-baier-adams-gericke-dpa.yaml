initial_vector: unknown
outcome_summary: |
  US Department of Justice announces deferred-prosecution
  agreements with three former US intelligence community and
  military personnel — Marc Baier, Ryan Adams, and Daniel
  Gericke — who agreed to pay more than $1.68 million collectively
  to resolve criminal charges arising from their provision of
  hacking-related services to the UAE government between
  approximately 2016 and 2019. The conduct included sale and
  development of advanced computer-exploitation capabilities,
  including unauthorized access to US persons and devices, in
  violation of US export control (ITAR) and computer fraud
  statutes.
false_flag_risk: none
summary: |
  The DOJ DPAs are the federal-prosecutorial confirmation of
  the Reuters Project Raven reporting (January 2019) — moving
  the procurement-led-capability doctrine label from tier-2
  journalism attribution to tier-1 government primary
  attestation. AUSPEX uses the DPA as the canonical attested
  source for Project Raven doctrine-linkages going forward.

  Importantly, the DPA documents that the operators continued
  developing capabilities for the UAE government after FBI
  notification that the activity violated US law — a finding
  that establishes the intentionality of the procurement-led
  pattern from both the UAE customer side and the contractor
  vendor side.
