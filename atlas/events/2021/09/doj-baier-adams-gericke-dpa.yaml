summary: |
  US law-enforcement counter-action, not a cyber operation: the
  DOJ's National Security Division and the US Attorney's Office for
  the District of Columbia, with the FBI's Washington Field Office,
  filed deferred-prosecution agreements (entered Sept. 7, filed
  Sept. 14, 2021) and a criminal information against three
  ex-USIC/military operators — Baier, Adams, and Gericke. AUSPEX
  models it under the directionality convention: the acting party
  is the US government; the SUBJECTS are the three US-person
  operators and the UAE company that employed them (identified in
  Reuters' Project Raven reporting as DarkMatter). There is no
  attacker actor for THIS event.

  The DOJ primary anonymizes the corporate actors. It names only
  "U.A.E. CO" (the employer), "U.S. Company One" (the prior
  ITAR-compliant US contractor — CyberPoint per Reuters), and
  "U.S. Company Two" (the victim US technology company whose
  operating system and servers KARMA leveraged — Apple per external
  reporting). "DarkMatter", "Project Raven", "CyberPoint" and
  "Apple" all appear 0× in the release. The DarkMatter / Project
  Raven identity of "U.A.E. CO" is carried by the cited Reuters
  reporting: the snapshotted Karma companion names DarkMatter as
  the operating firm and "Project Raven" as the unit, and
  independently names the same "KARMA" toolkit the DOJ release
  names — the bridge tying the anonymized DOJ description to the
  named cluster.

  Framing note (over-attestation corrected 2026-07-10): the DOJ's
  own frame is export-control and fraud, NOT the UAE
  procurement-led-capability doctrine's strategic goal. The
  defendants "proceeded to provide" ITAR "defense services"
  without the required DDTC license "despite being informed on
  several occasions" — the warnings came from U.S. Company One
  (their prior employer) and generally, about ITAR licensing. The
  prior version's claim that the operators continued "after FBI
  notification that the activity violated US law" is NOT supported:
  in the release the FBI is described only notifying the victim
  tech company ("U.S. Company Two") of the KARMA 2 vulnerability in
  summer 2017 and pledging future investigation — not warning the
  operators. The prior framing that the DPA is "the canonical
  attested source for Project Raven doctrine-linkages" is likewise
  dropped: the release neither names Project Raven nor articulates
  any UAE capability-acquisition goal, so it cannot attest the
  procurement doctrine (downgraded to strongly_inferred, below).
