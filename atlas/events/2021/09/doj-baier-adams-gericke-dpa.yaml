id: 2021-09/doj-baier-adams-gericke-dpa
name: DOJ deferred-prosecution agreements — Baier, Adams, Gericke for UAE hacking-as-a-service
start_date: 2016-01-01  # DPA scope of conduct
disclosure_date: 2021-09-14
end_date: 2019-12-31
incident_type:
  - documentary
