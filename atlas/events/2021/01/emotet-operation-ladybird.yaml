outcome_summary: |
  Europol / Eurojust coordinated multinational seizure of Emotet
  infrastructure across the Netherlands, Germany, US, UK, France,
  Lithuania, Canada, Ukraine. Three-tier C2 infrastructure
  seized; takeover module pushed to infected systems with a
  delayed self-uninstall scheduled for April 25 2021.
  Approximately two Ukrainian operators arrested.
false_flag_risk: none
