id: 2021-01/emotet-operation-ladybird
name: Operation Ladybird — Emotet botnet takedown
start_date: 2021-01-26  # takedown action; Europol frames it as "this week's action", announced 2021-01-27
disclosure_date: 2021-01-27
end_date: null  # AUDIT 2026-07-01: was 2021-04-25 (self-uninstall) — the cited Europol release does NOT carry the April-2021 mass-uninstall detail; removed rather than sourced elsewhere
incident_type:
  - disruption
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  Europol- and Eurojust-coordinated multinational law-enforcement
  takedown of the Emotet botnet by authorities in the Netherlands,
  Germany, United States, United Kingdom, France, Lithuania,
  Canada and Ukraine, in the EMPACT framework. Investigators
  gained control of Emotet's infrastructure — described as several
  hundred servers worldwide with differing functionalities — and
  "took it down from the inside," redirecting infected victim
  machines to law-enforcement-controlled infrastructure; affected
  parties were notified via the CERT network.
false_flag_risk: none
summary: |
  Coordinated international law-enforcement takedown of Emotet,
  described by Europol as one of the most significant botnets of
  the past decade and a leading "loader" service that sold access
  to top-level criminal groups (TrickBot and Ryuk among the named
  beneficiaries). Law enforcement gained control of the botnet's
  infrastructure and dismantled it from the inside — an early
  template for the later coordinated botnet-takedown operations
  (Qakbot 2023, Operation Endgame 2024).
