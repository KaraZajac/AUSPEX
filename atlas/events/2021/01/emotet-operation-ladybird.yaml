  notes: |
    Audited against the sole cited source, Europol "World's Most Dangerous
    Malware EMOTET Disrupted Through Global Action (Operation Ladybird)",
    2021-01-27 (govt-primary, tier primary). Raw snapshot on disk
    (europol__2021-01-27_operation-ladybird-emotet.html), sha256
    c405fab1…ab20ce40, 38993 bytes — hash RE-VERIFIED this audit; page is a
    JS-rendered Drupal/React SPA, substantive article extracted from the
    embedded JSON "body" field.

    STEP 0 triage: NOT a phantom — the URL resolves to the genuine Operation
    Ladybird press release matching the event; normal 6-point audit performed.

    [a] FACTS — corrected. VERBATIM-CARRIED and kept: "Law enforcement and
    judicial authorities worldwide have this week disrupted one of most
    significant botnets of the past decade: EMOTET. Investigators have now
    taken control of its infrastructure in an international coordinated
    action." / the 8-partner list "authorities in the Netherlands, Germany,
    the United States, the United Kingdom, France, Lithuania, Canada and
    Ukraine, with international activity coordinated by Europol and Eurojust"
    (and the full per-country authority roster) / EMPACT framework / "several
    hundreds of servers located across the world" with "different
    functionalities" / "gained control of the infrastructure and took it down
    from the inside. The infected machines of victims have been redirected
    towards this law enforcement-controlled infrastructure" / loader framing
    "other malware operators like TrickBot and Ryuk have benefited from it" /
    CERT-network victim notification. STRIPPED as UNSOURCED (present nowhere in
    the raw body): (1) "Three-tier C2 infrastructure seized" — the source says
    only "several hundreds of servers ... different functionalities", never
    "three-tier"; (2) "takeover module pushed ... delayed self-uninstall
    scheduled for April 25 2021" — the raw contains NO "uninstall"/"April"
    string; this is the later (Apr-2021) development the source does not carry
    (per task NB, not imported); end_date 2021-04-25 nulled accordingly; (3)
    "Approximately two Ukrainian operators arrested" — the raw contains NO
    "arrest" string; Ukraine appears only as a participating authority
    (National Police / Prosecutor General's Office). The summary's "First
    major court-authorized self-uninstall via the botnet's own C2" claim was
    likewise removed (self-uninstall is unsourced here); rewrote summary +
    outcome_summary to source-carried language, keeping only a light editorial
    forward-reference (template for Qakbot 2023 / Endgame 2024).

    [b] ATTRIBUTION — this is a counter-action: actor_id null (was
    ru/proxies→ru/unscoped/emotet per prior audits; the state action is BY the
    coalition, not an attack). attributing_org "Europol + Eurojust + 8
    partners" and attributing_org_confidence high both source-carried; kept
    auspex_assessment concur-with-caveat; attribution_date 2021-01-27 =
    publication date. No over-attestation.

    [c] DATES — source published_on 2021-01-27 confirmed by schema.org
    datePublished "2021-01-27T12:00:00" and the record already matches.
    disclosure_date 2021-01-27 solid. start_date 2021-01-26 retained (widely
    reported takedown date) with a comment noting the source itself says only
    "this week's action." end_date corrected to null (see [a]).

    [d] DOCTRINE_LINKS — single link us/ncs-2023 / disrupt-dismantle,
    confidence plausible: HONEST and unchanged — the op predates NCS-2023
    (Mar-2023) and the Europol release states no US strategic purpose, so the
    retroactive disrupt-dismantle framing correctly stays plausible (no
    attesting_source needed/added). Added perspective: defender-response — this
    is a US defender doctrine on a null-actor multinational LE counter-action,
    which also resolves the potential doctrine-state-mismatch (US doctrine, no
    actor state).

    [e] ATTRIBUTION_LEVEL — set named-actor: Emotet is named as the specific
    disrupted entity; no nation/service is attributed (consistent with the
    null actor_id).

    [f] ACTOR_ID — null (counter-action), no FK to resolve. Both doctrine FKs
    (us/ncs-2023, us/ncs-2023/disrupt-dismantle) confirmed present.

    Residual: exact operation date (26 vs 27 Jan) not pinned by this source
    ("this week"); no second source cited (single-source event) but the sole
    source is a tier-1 govt-primary release directly on the event, so level
    full.
