id: 2021-01/jokers-stash-voluntary-shutdown
name: Joker's Stash carding marketplace announces voluntary shutdown
start_date: 2020-12-17
disclosure_date: 2021-01-15
end_date: 2021-02-15
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  Joker's Stash, the largest English-Russian-speaking
  payment-card carding marketplace of the late 2010s,
  announced voluntary shutdown in mid-January 2021 following
  December 2020 FBI / Interpol seizures of several of the
  operator's blockchain-DNS resolver domains. The
  marketplace had sold stolen payment-card data from
  major US-retail POS breaches including Wawa, Hy-Vee,
  Dickey's BBQ, and Saks / Lord & Taylor. The shutdown
  followed the operator's hospitalization announcement
  citing COVID-19, which contemporaneous reporting treated
  as a likely exit-narrative pretext.
false_flag_risk: none
summary: |
  Joker's Stash is the canonical case of carding-marketplace
  voluntary shutdown driven by enforcement pressure short
  of operator arrest. AUSPEX classifies as criminal-baseline.
