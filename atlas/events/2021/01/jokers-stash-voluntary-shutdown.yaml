id: 2021-01/jokers-stash-voluntary-shutdown
name: Joker's Stash carding marketplace announces voluntary shutdown
start_date: 2020-12-16
disclosure_date: 2021-01-15
end_date: 2021-02-15
incident_type:
  - documentary
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  Joker's Stash — by some accounts the largest underground
  carding marketplace of the late 2010s, a Russian- and
  English-language store open since October 2014 — announced
  on 15 January 2021 that it would cease operations effective
  mid-February 2021. The announcement followed the 16 December
  2020 seizure of several of the operator's long-held domains
  by the U.S. Department of Justice and Interpol (the shop
  briefly recovered on new infrastructure). The marketplace
  had sold "dumps" of stolen payment-card data from major
  US-retail POS breaches including Wawa, Hy-Vee, Dickey's BBQ,
  Sonic Drive-In, and Saks Fifth Avenue / Lord & Taylor.
  Contemporaneous reporting (Intel 471 and Gemini Advisory,
  via KrebsOnSecurity) linked the wind-down to the operator's
  October 2020 COVID-19 hospitalization coinciding with a
  decline in card-data quality/inventory, to law-enforcement
  pressure, and to a Bitcoin-price windfall that may have left
  the operator wealthy enough to retire; Gemini stated the
  true reason remained unclear.
false_flag_risk: none
summary: |
  Joker's Stash is a canonical case of carding-marketplace
  voluntary shutdown amid law-enforcement pressure but short
  of operator arrest, with the operator's stated reasons
  (illness, retirement) unverifiable. AUSPEX classifies as
  criminal-baseline (no doctrine link).
