qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs Volexity "North Korean APT InkySquid Infects Victims Using Browser
    Exploits" (2021-08-17). Raw snapshot re-verified on disk:
    atlas/sources/raw/volexity__2021-08-17_inkysquid.html, sha256
    da38a38f…9c0b6160 (da38a38fd605fbc4983b91a843da95583bd1ae275a173d4aa60b59249c0b6160),
    55766 bytes — hash re-verified, matches the source record; source is the real article
    (full body present), NOT a phantom.

    [a] FACTS — corrected several unsupported/fabricated claims:
      * REMOVED "RokRAT": the source names NO RokRAT. Delivery chain per Volexity is
        exploit -> Cobalt Strike stager (initial payload, "used as an initial payload in
        both exploitation cases") -> BLUELIGHT (secondary). Added Cobalt Strike; RokRAT was
        fabricated.
      * REMOVED toolset name-drop "DOGCALL, CARROTBALL, and KARAE" — absent from the cited
        source (APT37 tooling from other reporting, not carried here).
      * REMOVED "scheduled tasks for persistence" — not in the source. BLUELIGHT's documented
        commands are: run shellcode, download/launch EXE + upload output, harvest browser
        cookies + password DB, recursive file-metadata search, ZIP-and-exfil files, uninstall.
      * REFRAMED "credential dumping" -> browser cookie + saved-password-database harvesting
        (source: "Harvest cookies and a password database for supported browsers — Win7 IE,
        Win10 IE, Edge, Chrome, and Naver Whale").
      * CVE FIX (major): initial_vector 0-day -> n-day. Both exploits were already patched
        during the campaign: CVE-2020-1380 (IE) and CVE-2021-26411 (IE / legacy Edge).
        Volexity's own conclusion: "The use of recently patched exploits for Internet Explorer
        and Microsoft Edge will only work against a limited audience." Removed all "zero-day" /
        "then-unpatched" language from summary + outcome_summary.
      * BLUELIGHT C2 confirmed: "leveraged the Microsoft Graph API for its C2 operations",
        OneDrive appfolder, hard-coded OAuth2 token, XOR-encoded uploads, ~30s C2 loop,
        periodic screenshots — all verbatim-supported.
      * Watering hole confirmed: "strategic web compromise (SWC) of the website of the Daily NK
        (www.dailynk[.]com), a South Korean online newspaper that focuses on issues relating to
        North Korea. Malicious code ... from at least late March 2021 until early June 2021."
    [b] ATTRIBUTION — Volexity: "Volexity attributes the activity ... to a threat actor
        Volexity refers to as InkySquid, which broadly corresponds to activity known publicly
        under the monikers ScarCruft and APT37." Headline: "North Korean APT". Nation (DPRK) +
        named actor; NO DPRK service/unit (RGB/MSS absent). Set attribution_level=named-actor on
        BOTH attributions (was missing). Kept attributing_org_confidence=high (direct vendor
        attribution) but noted Volexity DEFERS its attribution method to a follow-up post
        ("This will be explained further in a follow-up post, so stay tuned!"). Actors resolve:
        kp/unscoped/inkysquid, kp/unscoped/apt37 (both files present).
    [c] DATES — source: activity "from at least late March 2021 until early June 2021";
        "In April 2021 ... Volexity identified suspicious code." start_date left 2021-04-01
        (Volexity's April identification; comment clarifies late-March presence). end_date
        corrected 2021-06-30 -> 2021-06-01 (source says "early June", not late June).
        published_on on the source (2021-08-17) already correct.
    [d]/[e] DOCTRINE — both links DOWNGRADED strongly_inferred -> plausible. Volexity states
        no strategic goal and does not identify the compromised visitors (only that the outlet
        "focuses on issues relating to North Korea"). Two legitimate readings survive — the
        corpus juche/internal-security pillar names "defectors, dissident journalists, NK-focused
        researchers" and the strategic-information/policy-collection pillar names "Daily NK"
        EXPLICITLY — so neither dominates -> plausible for each, with inference_basis.alternatives
        added to both (converted from the old signals/ruled_out form; removed the stale
        attesting_source_id on link 1 since no source states the goal). No link qualifies for
        attested (no attesting source states purpose). Rewrote reasoning to stop asserting the
        unstated victim identities as fact.
    [a] TARGETS — REMOVED sectors/civil-society/dissident (sector inflation: the cited source
        does not identify Daily NK's audience as dissidents/defectors — it calls it "a South
        Korean online newspaper that focuses on issues relating to North Korea"). Kept
        orgs/daily-nk (the compromised, named outlet) and sectors/media/journalism (Daily NK is
        an online newspaper — directly supported). Softened the daily-nk outcome to the
        source-carried mechanics; the defector/journalist visitor framing is flagged as inferred
        in the summary.
    [f] ACTOR — both actor_ids resolve. No actor edits made. Note (already recorded in the
        apt37/inkysquid records): kp/unscoped placement is correct — Volexity names no DPRK
        service. Two attribution rows for the same real-world cluster (InkySquid = APT37) are
        redundant-by-design (AUSPEX keeps InkySquid as a sub-cluster slug); left as-is.
    Residual uncertainty: exact start day (Volexity says "late March"/"April", no precise date);
    who among Daily NK's visitors was actually compromised is not stated by the source.
