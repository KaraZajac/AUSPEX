id: 2021-08/inkysquid-daily-nk
name: InkySquid browser-exploit campaign (Daily NK watering-hole)
start_date: 2021-04-01  # earliest tracked compromise of Daily NK site
disclosure_date: 2021-08-17
end_date: 2021-06-30
incident_type:
  - intrusion
  - data-theft
initial_vector: 0-day
outcome_summary: |
  Watering-hole compromise of the Daily NK (South Korean
  DPRK-focused news outlet) website. IE/Edge zero-day chains
  delivered BLUELIGHT and RokRAT to targeted visitors:
  defectors, journalists covering the DPRK, and policy
  researchers. Targeted surveillance compromise.
false_flag_risk: none
summary: |
  Canonical Juche-internal-security operation: APT37 sub-cluster
  (InkySquid per Volexity) using zero-day browser exploits to
  compromise the precise audience of a defector-focused news
  outlet. The watering-hole compromise injected obfuscated
  JavaScript into the Daily NK site that exploited Internet
  Explorer / Edge zero-days (CVE-2020-1380 and a then-unpatched
  Internet Explorer vulnerability), then dropped the BLUELIGHT
  remote-access trojan (a custom Microsoft Graph API / OneDrive
  C2-channel implant) and the RokRAT backdoor — both established
  members of the APT37 / ScarCruft toolset alongside DOGCALL,
  CARROTBALL, and KARAE. Post-compromise tradecraft included
  credential dumping, scheduled tasks for persistence, and use
  of valid OneDrive credentials for low-noise data exfiltration.
  Volexity's reporting centers on Daily NK, a defector-focused
  outlet (the defector/journalist audience is inferred from the
  outlet's readership).
