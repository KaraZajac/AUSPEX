id: 2021-08/inkysquid-daily-nk
name: InkySquid browser-exploit campaign (Daily NK watering-hole)
start_date: 2021-04-01  # Volexity first identified activity April 2021; malicious code present on Daily NK from at least late March 2021
disclosure_date: 2021-08-17
end_date: 2021-06-01  # early June 2021 — malicious code observed until early June (Volexity)
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: n-day
outcome_summary: |
  Watering-hole (strategic web compromise) of the Daily NK (South
  Korean, North-Korea-focused news outlet) website, late March to
  early June 2021. Recently-patched IE / legacy-Edge exploits
  (CVE-2020-1380, CVE-2021-26411) delivered a Cobalt Strike stager
  and then the custom BLUELIGHT backdoor to visitors using
  Internet Explorer. BLUELIGHT provided host reconnaissance,
  periodic screenshots, browser-credential harvesting and
  OneDrive-based data exfiltration — a targeted espionage /
  surveillance implant. Volexity does not identify which visitors
  were compromised.
false_flag_risk: none
summary: |
  Strategic web compromise (SWC / watering-hole) of the Daily NK
  website (www.dailynk.com), a South Korean online newspaper
  focused on North Korea. Volexity attributes the activity to a
  threat actor it calls InkySquid, which "broadly corresponds to
  activity known publicly under the monikers ScarCruft and APT37"
  (DPRK-nexus). From at least late March until early June 2021 the
  attacker injected obfuscated JavaScript into legitimate Daily NK
  files (jquery.min.js) that redirected Internet Explorer users to
  attacker-controlled jquery[.]services subdomains serving browser
  exploits. Two recently-patched — not zero-day — exploits were
  used: CVE-2020-1380 (Internet Explorer) and CVE-2021-26411 (IE /
  legacy Microsoft Edge); Volexity's own conclusion characterises
  them as "recently patched exploits for Internet Explorer and
  Microsoft Edge." Successful exploitation ran a Cobalt Strike
  stager as the initial payload, which in turn delivered BLUELIGHT,
  a custom backdoor that used the Microsoft Graph API / OneDrive as
  its command-and-control channel (hard-coded OAuth2 token).
  BLUELIGHT gathered host reconnaissance, captured periodic
  screenshots, harvested browser cookies and saved-password
  databases (IE / Edge / Chrome / Naver Whale), and exfiltrated
  files via OneDrive. Volexity documents the compromise of Daily NK
  and equates InkySquid to APT37 / ScarCruft, but does not identify
  the specific visitors hit and states no strategic goal; the
  defector / NK-focused-researcher / journalist audience often
  associated with the outlet is inferred from its editorial focus,
  not stated by Volexity.
