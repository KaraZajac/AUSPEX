summary: |
  SentinelLabs reported that Agrius, a suspected Iranian threat actor, launched a ransomware attack against the Israeli higher-education institution Bar-Ilan University using a new variant of the group's custom Apostle ransomware compiled on 15 August 2021. The Apostle payload was delivered by a .NET loader SentinelLabs named Jennlog, which deobfuscated and decrypted the ransomware from embedded resources while attempting to blend in with legitimate log files. This activity continued Agrius's pattern of destructive, ransomware-styled operations against Israeli targets that began in 2020.
