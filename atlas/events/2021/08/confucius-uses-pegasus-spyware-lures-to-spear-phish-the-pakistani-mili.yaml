id: 2021-08/confucius-uses-pegasus-spyware-lures-to-spear-phish-the-pakistani-mili
name: "Confucius uses Pegasus-spyware lures to spear-phish the Pakistani military with a file stealer"
start_date: 2021-08-17
incident_type:
  - espionage
  - data-theft
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Trend Micro researcher Daniel Lunghi documented a Confucius spear-phishing campaign that abused public anxiety over Pegasus spyware as a lure to target Pakistani military personnel. The two-stage operation first sent a benign email spoofing the Pakistani Armed Forces' public-relations wing (ISPR) with content copied from a legitimate newspaper, then a follow-up email posing as a military warning about Pegasus that linked to an encrypted, password-protected Word document hosted on parinari[.]xyz. Opening the document downloaded a file stealer used to exfiltrate documents. Trend Micro had previously documented Confucius targeting the Pakistani military with multiple file stealers and disclosed infrastructure links between Confucius and the Patchwork actor.
