      'irresponsible behavior' and IP theft 'for commercial
      advantage'; it does not name Military-Civil Fusion or
      dual-use/strategic collection. The MCF dual-use-research
      linkage is inferred from the strategic-collection target set.
    attesting_source_id: state/2021-07-19_white-house-mss-attribution
    inference_basis:
      source_id: state/2021-07-19_white-house-mss-attribution
      signals:
