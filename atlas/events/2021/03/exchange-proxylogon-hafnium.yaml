id: 2021-03/exchange-proxylogon-hafnium
name: Microsoft Exchange ProxyLogon (Hafnium)
start_date: 2021-01-03
disclosure_date: 2021-03-02
end_date: 2021-03-31
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: 0-day
outcome_summary: |
  Zero-day chain CVE-2021-26855, -26857, -26858, -27065 against
  on-prem Microsoft Exchange Server enabled bulk web-shell
  deployment at unprecedented scale (tens of thousands of victim
  organizations worldwide, per the July 2021 US/allied statements).
  Selective downstream exploitation of high-value organizations
  including infectious-disease researchers, law firms, universities,
  defense contractors, think tanks, NGOs.
false_flag_risk: none
summary: |
  The White House issued a high-confidence MSS attribution on 19
  July 2021, joined by Five Eyes plus NATO and EU partners. ODNI
  / NCSC bulletin issued the same day. Microsoft's MSTIC had named
  the actor Hafnium and disclosed the zero-days on 2 March 2021,
  concurrent with Volexity's discovery report. ProxyLogon defined
  PRC bulk-initial-access tradecraft at industrial scale: a four-bug
  zero-day chain against on-premises Microsoft Exchange Server
  (CVE-2021-26855 SSRF, CVE-2021-26857 Unified Messaging
  deserialization, CVE-2021-26858 + CVE-2021-27065 post-auth
  arbitrary file write) was used to plant ASPX web shells (China
  Chopper) on the Outlook Web Access front end at unprecedented
  scale, after which Hafnium performed credential dumping (LSASS,
  via Procdump) and mailbox exfiltration. Hafnium post-exploitation
  tooling included Procdump, Nishang, and PowerCat. After Microsoft's
  emergency patch the same web shells were rapidly re-used by
  numerous other threat actors — additional China-nexus espionage
  groups and criminal ransomware operators (DearCry) — driving the
  mass-compromise well beyond the original Hafnium operation.
