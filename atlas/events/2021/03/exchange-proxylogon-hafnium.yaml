  notes: |
    Full 6-point audit vs raw snapshots (all sha256-pinned in the source records).
    [a] FACTS — corrected. The two pre-existing cited sources (WH statement + ODNI
    bulletin) carry the MSS attribution + scale but NOT the CVE/web-shell tradecraft,
    the actor name "Hafnium", or the downstream target list. Added and snapshotted the
    load-bearing FACTS primaries: microsoft/2021-03-02_hafnium-exchange-0day (MSTIC
    origin report — names HAFNIUM 48x; the four CVEs with roles "CVE-2021-26855 is a
    server-side request forgery (SSRF)", "-26857 is an insecure deserialization ...
    Unified Messaging", "-26858"/"-27065" post-auth arbitrary file write; ASPX web
    shells; Procdump/Nishang/PowerCat; LSASS; MEGA exfil; target set verbatim
    "infectious disease researchers, law firms, higher education institutions, defense
    contractors, policy think tanks, and NGOs"); volexity/2021-03-02 (discovery report,
    CVE-2021-26855 SSRF + China Chopper + early-Jan onset); cisa/2021-03-03_aa21-062a
    (all four CVEs, China Chopper 11x, DearCry ransomware follow-on). Stripped the
    unsourced "~250,000 servers" figure -> "tens of thousands of victim organizations
    worldwide" (verbatim WH "tens of thousands of computers and networks worldwide";
    ODNI "tens of thousands of victim organizations"). Fixed a factual error: the
    follow-on wave was NOT "Silk Typhoon" (Silk Typhoon = Hafnium's own 2023 Microsoft
    rename) — corrected to "numerous other threat actors ... criminal ransomware
    operators (DearCry)", the CISA-carried widening. Aligned tooling to MSTIC
    (Procdump/Nishang/PowerCat). incident_type: removed the incorrect 'supply-chain'
    (ProxyLogon is direct 0-day mass-exploitation of internet-facing servers, not a
    vendor/update supply-chain compromise) -> intrusion/espionage/data-theft.
    [b] ATTRIBUTION — KEEP. WH high-confidence "affiliated with PRC's MSS ... utilizing
    the zero-day vulnerabilities in Microsoft Exchange Server disclosed in early March
    2021"; ODNI PDF (now captured via Wayback) names "Ministry of State Security (MSS)".
    concur / high retained.
    [c] DATES — verified. start 2021-01-03 (early-Jan 2021 first exploitation,
    Volexity-corroborated); disclosure 2021-03-02 (MSTIC + Volexity + MS patches,
    byline-verified); attribution 2021-07-19 (both govt sources, byline-verified); end
    2021-03-31 acute window. Kept.
    [d] DOCTRINE — cn/mcf/dual-use-research kept strongly_inferred but inference_basis
    rewritten and re-grounded on the MSTIC target set (signals + ruled_out = commercial-
    crime motive); the prior ruled_out had inverted MCF into itself. cn/national-
    intelligence-law-2017 DOWNGRADED strongly_inferred -> plausible (background legal-
    regime alignment, not operative — no PRC vendor compelled in a foreign-server
    mass-exploitation) with inference_basis.alternatives added. Both are attacker (PRC)
    doctrine on a PRC operation -> perspective attacker-rationale (schema default, left
    implicit).
    [e] ATTRIBUTION_LEVEL — added named-actor to both attribution entries (MSTIC named
    Hafnium + nation China; WH/ODNI named the MSS-affiliated Hafnium cluster).
    [f] ACTOR_ID — cn/mss/hafnium resolves to the id: field of atlas/actors/cn/hafnium.yaml
    (canonical_name "Hafnium / Silk Typhoon") — correct, not the filepath; the task's
    cn/mss/silk-typhoon alternative is an alias, not the canonical id.
    DIRECTIONALITY: attacker = cn/mss/hafnium (China / MSS); victims = global on-prem
    Exchange servers across the six MSTIC sectors (targets[] stamped; think-tank + NGO
    added to match the source). ODNI PDF capture upgraded from prior FAILED state via
    Wayback (sha256 pinned).
