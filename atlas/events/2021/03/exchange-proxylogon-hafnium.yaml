doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/dual-use-research
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      No cited source names Military-Civil Fusion; the White House
      statement frames the activity as MSS 'irresponsible behavior'
      and IP theft 'for commercial advantage'. The MCF
      dual-use-research linkage is a strong structural inference from
      the MSTIC-documented target set — infectious-disease
      researchers, defense contractors, higher-education institutions
      and policy think tanks — the classic dual-use / strategic-R&D
      collection footprint rather than an opportunistic or purely
      financial one.
    attesting_source_id: microsoft/2021-03-02_hafnium-exchange-0day
    inference_basis:
      source_id: microsoft/2021-03-02_hafnium-exchange-0day
      signals:
        - "MSTIC target set: 'infectious disease researchers, law firms, higher education institutions, defense contractors, policy think tanks, and NGOs' — a dual-use / strategic-R&D collection footprint"
        - "Hafnium is an MSS-affiliated foreign-intelligence actor (WH/ODNI), consistent with MCF-tasked strategic collection rather than commodity crime"
      ruled_out: "Purely commercial / financially-motivated intrusion — the fixed high-value R&D + policy target set, not a broad monetizable victim pool, is inconsistent with a criminal-profit motive"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Carried as a background legal-regime alignment (it is one of
      the actor's default_doctrine_alignment_ids), NOT as an
      operative rationale for this compromise. The 2017 Intelligence
      Law is a supply-side compelled-cooperation statute aimed at
      PRC-domiciled vendors; no PRC vendor was compelled in the
      ProxyLogon operation (a direct mass-exploitation of
      foreign-hosted Exchange servers), so the statute does not
      explain the WHY of this event. Downgraded from strongly_inferred
      on the 2026-07-10 audit as over-attribution.
    attesting_source_id: null
    inference_basis:
      source_id: null
      alternatives:
        - "MSS foreign-intelligence collection under its standing mission (the National Intelligence Law as generic legal backdrop only)"
        - "Military-Civil Fusion strategic-R&D collection (see the cn/mcf link) — the stronger doctrinal fit for the observed target set"
    counter_explanation: null
    contested: false
    analyst: claude
