id: 2021-03/sidewinder-maritime-targets
name: SideWinder targeting of Pakistani maritime and naval entities
start_date: 2020-09-01
disclosure_date: 2021-03-09
end_date: 2021-02-28
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cyble and adjacent vendor reporting documented SideWinder
  operations against Pakistan-linked maritime entities (Pakistan
  Maritime Security Agency, Karachi Port Trust, and shipping-
  industry adjuncts) and naval-research equities during late
  2020 through early 2021. SideWinder used spear-phishing
  emails impersonating Pakistani military communications, with
  weaponized RTF dropping multi-stage loaders consistent with
  the cluster's BackDeer / SideWinder.SE implant families.
false_flag_risk: none
summary: |
  Notable maritime extension of the SideWinder Pakistani-military
  collection tasking. Naval and port targeting aligns with
  Indian intelligence priorities around the Pakistan-China
  Economic Corridor's Gwadar Port and the strategic Indian Ocean
  competition with China.
attributions:
  - actor_id: in/ntro/sidewinder
    attributing_org: Cyble
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-03-09
    attribution_source_id: cyble/2021-03-09_sidewinder-pakistan-maritime
    notes: |
      Cyble's attribution rests on tradecraft and infrastructure
      overlap with prior Kaspersky and Group-IB SideWinder
      reporting rather than independent attribution development.
