outcome_summary: |
  Cisco Talos published "InSideCopy," documenting SideCopy's
  continued targeting of Indian defense forces and assessing
  operational overlap with Transparent Tribe sufficient to
  characterize SideCopy as a Transparent Tribe sub-cluster. The
