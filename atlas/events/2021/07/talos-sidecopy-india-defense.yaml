  notes: |
    Audited vs Cisco Talos "InSideCopy: How this APT continues to evolve
    its arsenal" (Asheer Malhotra & Justin Thattil, 2021-07-07) — raw
    snapshot cisco-talos__2021-07-07_sidecopy-india-defense.html,
    sha256 8eb00169…aa8b8967, 69366 bytes (hash re-verified, matches the
    source record). The stored HTML is JS-rendered but preserves the full
    article body (~6.3k visible chars); the byline "Wednesday, July 7,
    2021" confirms published_on. NOT a phantom: URL resolves to the real
    article and the event's facts appear in the body.
    [a] FACTS: source-carried and corrected. Talos "tracking an increase
    in SideCopy's activities targeting government personnel in India";
    arsenal verbatim — "CetaRAT, Allakore and njRAT" (known) plus "four
    new custom RAT families" (DetaRAT, ReverseRAT, MargulasRAT, ActionRAT)
    plus commodity "Lilith and Epicenter"; post-infection plugins "file
    enumerators to credential-stealers and keyloggers"; initial access
    "malicious LNK files and documents"/"phishing emails"/"honeytrap-based
    infections" (→ initial_vector phishing). REMOVED two over-claims the
    source does NOT carry: (1) prior outcome_summary said Talos assessed
    overlap "sufficient to characterize SideCopy as a Transparent Tribe
    sub-cluster" — the blog says only "a high degree of similarity to the
    Transparent Tribe APT (aka APT36)" in targeting tactics/themes, NOT
    that SideCopy is a sub-cluster; (2) prior text said Talos "refined the
    attribution to Pakistani state-aligned activity" — the blog attributes
    to no nation ("Pakistan" appears only in "special interest in victims
    in Pakistan and India", i.e. infrastructure/victimology, not
    attribution). Rewrote the summary, which had unsourced puffery ("most
    influential Western-vendor consolidation", "bringing SideCopy into the
    broader APT36 umbrella"). Kept ReverseRAT/ActionRAT/AllaKore (all
    source-carried).
    [b] ATTRIBUTION: Talos definitively tracks SideCopy as its own named
    APT group and attributes this activity to it with high confidence
    (kept attributing_org_confidence high); but names no nation and no
    Pakistani service — "ISI"/"Inter-Services Intelligence" absent from the
    body (consistent with the source record's 2026-06-24 audit note and the
    pk/unscoped/sidecopy demotion). Changed auspex_assessment concur →
    concur-with-caveat (the pk nation head rests on the Transparent
    Tribe/APT36 association, not a Talos statement) and added a note.
    [c] DATES: disclosure_date 2021-07-07 = the blog's publication date ✓.
    end_date null ✓. start_date 2020-01-01 retained as an editorial
    best-estimate within the documented activity window (Talos: commodity
    RAT use "since as early as 2019"); not contradicted by the source.
    [d] DOCTRINE_LINKS: pk/asymmetric-posture-india/military-collection kept
    strongly_inferred (correct — no source states the strategic goal, so
    not attested; attesting_source_id null). Replaced the one-line reasoning
    and added inference_basis {signals[], ruled_out}: signals = Talos's
    "government personnel in India" victimology + military/think-tank decoys
    + collection-oriented post-infection tooling + the pillar's explicit
    SideCopy enumeration; ruled_out = the sibling kashmir-political pillar
    (victims here are military/defence-establishment + general government,
    not Kashmir dissidents).
    [e] ATTRIBUTION_LEVEL: added named-actor (Talos names the SideCopy
    group; no nation or unit stated by Talos itself).
    [f] ACTOR_ID: pk/unscoped/sidecopy resolves (atlas/actors/pk/sidecopy.yaml,
    id pk/unscoped/sidecopy) — same actor as 2020-11/sidecopy-emergence;
    already demoted from pk/isi on 2026-06-24 (no cited source names the
    ISI). No actor-file edit. Source tier secondary left unchanged: all
    vendor-research (Seqrite, every Cisco Talos source) is tiered secondary
    in this corpus by convention, so it is not a miscategorization.
    Residual: single-source event; Talos's own attribution is high-confidence
    for the SideCopy cluster but assigns no nation, so the pk head is
    inherited from the TT/APT36 association rather than independently stated.
