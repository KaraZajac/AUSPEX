id: 2021-07/talos-sidecopy-india-defense
name: Cisco Talos documents SideCopy's expanded RAT arsenal against Indian government and defense
start_date: 2020-01-01
disclosure_date: 2021-07-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cisco Talos published "InSideCopy," documenting an expansion of
  SideCopy's malware campaigns targeting government personnel in
  India. Talos extended the group's tooling inventory — adding the
  new custom RATs DetaRAT, ReverseRAT, MargulasRAT and ActionRAT
  alongside the previously known CetaRAT, AllaKore and njRAT and the
  commodity RATs Lilith and Epicenter — and observed a "high degree
  of similarity" between SideCopy's targeting tactics/themes and
  those of the Transparent Tribe APT (aka APT36), which also targets
  India. Talos continued to track SideCopy as its own named APT
  group that mimics SideWinder infection chains, and named no
  Pakistani intelligence service.
false_flag_risk: suspected
summary: |
  Cisco Talos's analysis documents SideCopy expanding both its RAT
  arsenal and its post-infection plugin set (file enumerators,
  credential-stealers, keyloggers) against Indian government and
  military-linked targets, using decoys posing as operational
  documents belonging to the military and think tanks. Talos frames
  SideCopy as sharing a "high degree of similarity" with Transparent
  Tribe / APT36 in targeting but keeps it as a separately named
  cluster that mimics SideWinder; the report names no nation and no
  Pakistani service — the Pakistan nexus rests on the Transparent
  Tribe / APT36 association rather than a Talos statement.
attributions:
  - actor_id: pk/unscoped/sidecopy
    attributing_org: Cisco Talos
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-07-07
    attribution_source_id: cisco-talos/2021-07-07_sidecopy-india-defense
    notes: |
      Talos definitively tracks SideCopy as its own named APT group
      ("Cisco Talos is tracking an increase in SideCopy's activities")
      and attributes this activity to it with high confidence — hence
      attribution_level named-actor. But Talos names NO nation and NO
      Pakistani service ("ISI"/"Inter-Services Intelligence" absent;
      "Pakistan" appears only re: infrastructure interest in "victims
      in Pakistan and India"); it notes only a "high degree of
      similarity" to Transparent Tribe / APT36, not that SideCopy is a
      sub-cluster of it. The pk/unscoped nation head rests on the
      Transparent Tribe / APT36 association, not a Talos statement —
      hence concur-with-caveat.
doctrine_links:
  - doctrine_id: pk/asymmetric-posture-india
    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A Pakistan-aligned espionage cluster targeting Indian government
      personnel with military-themed decoys and RAT-based collection
      (credential-stealers, keyloggers, file enumerators) fits the
      military-collection pillar, which itself enumerates SideCopy
      targeting Indian military/defense. No source states the strategic
      purpose, so this is inferred, not attested.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "Victimology: Talos observes SideCopy 'targeting government personnel in India' with decoys 'posing as operational documents belonging to the military and think tanks'."
        - "Actor mission: SideCopy is an espionage cluster in the Pakistan-aligned Transparent Tribe/APT36 orbit operating against India; post-infection tooling is credential-stealers, keyloggers and file enumerators (collection, not disruption or revenue)."
        - "Doctrinal fit: the military-collection pillar explicitly enumerates SideCopy targeting Indian military personnel, defense ministry and defense research."
      ruled_out: "Kashmir-political collection (the sibling pillar) — the decoys and victims here are military/defence-establishment and general government personnel, not Kashmir-issue journalists/dissidents, so the military-collection reading dominates."
targets:
