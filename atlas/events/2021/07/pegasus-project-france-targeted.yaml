id: 2021-07/pegasus-project-france-targeted
name: Pegasus Project — Emmanuel Macron and French officials identified in Moroccan customer-state target list
start_date: 2019-01-01  # Pegasus Project corpus window for the France subset
disclosure_date: 2021-07-20
end_date: 2021-07-21
incident_type:
  - documentary
  - surveillance
initial_vector: unknown
outcome_summary: |
  Pegasus Project consortium reporting (Le Monde and partner
  outlets, 20-21 July 2021) identified President Emmanuel
  Macron's personal phone number, the personal numbers of
  approximately 15 members of the French government, and a
  French ambassador on the leaked list of approximately 50,000
  numbers attributed to NSO Group's Pegasus customer states.
  The Macron number was associated with the Moroccan customer
  state per consortium reporting; Morocco denied involvement.
  Forensic confirmation of compromise of Macron's specific
  device was not established within the Pegasus Project corpus
  (the leaked numbers being selection candidates, not
  confirmed infections).
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  France as a Pegasus *target* — not an operator — recorded for
  the AUSPEX FR cluster as evidence of the defensive surface
  area French officials face from external commercial-spyware
  customer states. The follow-on ANSSI investigation in late
  July / August 2021 is a separate defensive event. The
  attribution chain (NSO customer-state to Moroccan operator)
  rests on Pegasus Project corpus assignment and Forbidden
  Stories / Amnesty Security Lab methodology; ANSSI did not
  publicly confirm operator-state attribution. France as the
  target is the doctrinally-relevant LID exposure event.
