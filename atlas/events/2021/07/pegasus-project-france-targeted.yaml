id: 2021-07/pegasus-project-france-targeted
name: Pegasus Project — Emmanuel Macron and ~15 French government members selected in the leaked NSO list, allegedly by Morocco
start_date: 2019-01-01  # France-subset selection year: Macron "selected as a person of interest by Morocco in 2019" (Guardian/Le Monde); the wider 50k list runs since 2016
disclosure_date: 2021-07-20  # Le Monde / Guardian / Washington Post consortium France revelation (Amnesty PR 20 Jul; Guardian 20 Jul 21:13Z; Al Jazeera 20 Jul)
end_date: 2021-07-21  # The Local / Macron-orders-inquiries window close; follow-on ANSSI forensic investigation is a separate defensive event
incident_type:
  - surveillance   # Pegasus mobile-surveillance targeting nature (task's "surveillance")
  - documentary    # journalism-consortium REVELATION of a selection list; actor_id is null (no ma/ Morocco operator cluster exists) -> meta-type retained
initial_vector: unknown  # France subset is selection-only within the corpus; NO French-official device compromise was forensically confirmed in scope (Macron's phone was not examinable), so no exercised infection vector is asserted
outcome_summary: |
  Pegasus Project consortium reporting (Le Monde as France lead, with
  the Guardian, Washington Post and partner outlets, 20-21 July 2021)
  identified President Emmanuel Macron's personal phone number "and 13
  other heads of state and heads of government" on the leaked list of
  more than 50,000 numbers "selected as those of people of interest"
  by NSO Group's government clients since 2016. Per the Guardian,
  Macron "appears to have been selected as a person of interest by
  Morocco in 2019"; media partners named Morocco among the ten client-
  governments "believed to be responsible for selecting the targets."

  Beyond the President, The Local (relaying Le Monde/AFP) reported that
  "Emmanuel Macron and 15 other members of the French government
  including former Prime Minister Edouard Philippe were among" the
  selected numbers — approximately 15 members of the French government,
  including the ministers for justice and foreign affairs. Le Monde
  attributed the France selection to "an unidentified Moroccan security
  service" / "Morocco's intelligence service."

  Morocco DENIED involvement — issuing a statement "denying any
  involvement in using Pegasus and rejecting what it called 'unfounded
  and false allegations'" (Al Jazeera/Reuters) and stating it "never
  acquired computer software to infiltrate communication devices" (The
  Local).

  Critical hedge (per the pegasus-project-uae sibling): the list is a
  SELECTION / interest list of potential targets, NOT a record of
  confirmed infections. Amnesty stated the phones of "at least fourteen
  heads of state MAY HAVE been hacked" and "the presence of a number in
  the data does not reveal whether there was an attempt to infect the
  phone … or whether any attempt succeeded" (Guardian). Forensic
  confirmation of compromise of Macron's specific device was not
  established (his phone was not examinable). Independent forensic proof
  that Morocco operates Pegasus exists for OTHER Moroccan targets —
  Amnesty's forensic-methodology report anchors confirmed infections to
  Moroccan journalists/activists Maati Monjib and Omar Radi — but that
  is corpus corroboration of Morocco-as-operator, not confirmation of
  the French officials' compromise.
quantified_impact: {}
false_flag_risk: none  # NSO customer-state selection; no evidence of a planted false attribution (Morocco's denial is a denial, not a false-flag claim)
operators_named:
  - "Morocco — unidentified Moroccan intelligence / security service (Le Monde/consortium corpus assignment; DENIED by Morocco). NOT yet modeled as an atlas actor: no ma/ operator cluster exists (parallel to ae/unscoped/uae-pegasus). FLAGGED for orchestrator."
summary: |
  France as a Pegasus *target*, not an operator — recorded for the
  AUSPEX FR cluster as evidence of the defensive surface French
  officials face from an external commercial-spyware customer state.

  Directionality / actor modeling (task): the French officials
  (President Macron + ~15 government members incl. former PM Philippe)
  are the TARGETS; Morocco (via an unidentified Moroccan intelligence/
  security service) is the ALLEGED operator; NSO Group of Israel is the
  commercial spyware VENDOR (tooling), modeled separately as il/nso-group
  and NOT attributed as the actor. actor_id is null because Morocco has
  no operator cluster in the corpus (no atlas/actors/ma/ — the sibling
  UAE event could set ae/unscoped/uae-pegasus; the equivalent ma/ actor
  does not yet exist and is FLAGGED). attribution_level: nation (Morocco/
  an unnamed service; no named unit).

  The follow-on ANSSI/CERT-FR forensic investigation (late July / August
  2021), which examined French officials' and journalists' devices, is a
  separate defensive event; within THIS 20-21 July revelation's scope no
  French-official compromise was forensically confirmed. The attribution
  chain (NSO customer-state -> Moroccan operator) rests on Pegasus
  Project corpus assignment and Forbidden Stories / Amnesty Security Lab
  methodology and is denied by Morocco -> auspex_assessment
  concur-with-caveat. France as the target is the doctrinally-relevant
  LID exposure event (victim-response); the Moroccan attacker-side
  surveillance doctrine is unmodeled in AUSPEX (no ma/ doctrine) and is
  FLAGGED as a corpus gap.
