      content" — a hedged, unvalidated attribution. REvil self-claimed
      the attack on its leak site on July 5 (the $70M universal-decryptor
      post; bleepingcomputer/2021-07-05).
  - actor_id: criminal/revil
    attributing_org: US Department of Justice
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2021-11-08
    attribution_source_id: doj/2021-11-08_revil-vasinskyi-polyanin-indictment
    notes: |
      DOJ indictment names Yaroslav Vasinskyi as the Sodinokibi/REvil
      operator of the July 2021 Kaseya attack — the firm named-actor
      attribution; $6.1M in ransom proceeds traceable to co-conspirator
      Polyanin seized.
doctrine_links: []  # ru/sanctions-response-2022 dropped 2026-07-10 (Kara-approved): REvil is a stateless criminal/ actor; no cited source ties this profit-motivated op to Russian state mobilization. Confirmed unchanged by the 2026-07-10 audit.
