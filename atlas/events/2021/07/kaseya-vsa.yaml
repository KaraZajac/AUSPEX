id: 2021-07/kaseya-vsa
name: Kaseya VSA supply-chain ransomware (REvil)
start_date: 2021-07-02
disclosure_date: 2021-07-02
end_date: 2021-07-23  # universal decryptor released
incident_type:
  - ransomware
  - supply-chain
  - disruption
initial_vector: 0-day
outcome_summary: |
  REvil affiliate exploited zero-day vulnerabilities (CVE-2021-30116
  authentication bypass, CVE-2021-30119 command injection) in
  Kaseya VSA — a remote-management platform used by managed-service
  providers. The exploit chain ran a malicious Kaseya VSA agent
  update against ~60 MSPs that propagated ransomware to an
  estimated 1,500 downstream customer organizations. Operators
  demanded a USD 70M universal decryptor. Coop supermarket chain
  closed ~800 Swedish stores for a week. Kaseya obtained a
  universal decryptor on July 22 from a "trusted third party"
  (widely understood to be FBI-supplied).
quantified_impact:
  organizations_affected: 1500
  msps_affected: 60
  initial_ransom_demand_usd: 70000000
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
operators_named:
  - vasinskyi-yaroslav  # REvil affiliate alleged Kaseya operator, DOJ Nov 2021
summary: |
  Largest ransomware supply-chain incident on public record.
  Third major US-CII ransomware incident in the May–July 2021
  cluster (Colonial → JBS → Kaseya). Triggered the July 9 2021
  Biden–Putin phone call where Biden reportedly told Putin he
  expected Russia "to take action" against criminal ransomware
  operators on its territory; REvil's leak site went dark July 13
  2021 (briefly), and the Jan 14 2022 FSB raid that arrested 14
  alleged REvil members followed. Affiliate Yaroslav Vasinskyi
  (Ukrainian national) was arrested in Poland Oct 2021 and
  extradited to the US Mar 2022; convicted May 2024.
attributions:
