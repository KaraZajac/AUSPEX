    [a] FACTS — CORRECTED (CVE mislabel + count embellishment).
    * CVE: prior outcome_summary asserted "CVE-2021-30116 authentication
      bypass, CVE-2021-30119 command injection." NVD (snapshotted) records
      CVE-2021-30116 verbatim as "Kaseya VSA before 9.5.7 allows credential
      disclosure, as exploited in the wild in July 2021" (credential leak →
      sessionId "to bypass authentication") — the auth-bypass label holds.
      But CVE-2021-30119 is NVD-recorded as a reflected XSS
      ("Authenticated reflective XSS in HelpDeskTab/rcResults.asp"), NOT
      command injection — a factual error. The mislabeled CVE was DROPPED;
      only CVE-2021-30116 is retained, now NVD-carried. enwikipedia
      corroborates the nature: "An authentication bypass vulnerability in
      the software allowed attackers to compromise VSA on 2 July."
    * COUNT EMBELLISHMENT (watched per task): prior text/quantified stated
      a firm "1,500 downstream customer organizations." Kaseya's own PR
      (snapshotted) says only a RANGE: "Of the approximately 800,000 to
      1,000,000 local and small businesses that are managed by Kaseya's
      customers, only about 800 to 1,500 have been compromised." Prose now
      states the 800–1,500 range; quantified_impact.organizations_affected
      1500 retained but annotated as the range CEILING, not a firm count.
    * MSP count: prior firm "~60 MSPs." Kaseya PR: "only approximately 50
      of the more than 35,000 Kaseya customers being breached." enwikipedia
      /CISA: "about 60 managed service providers (MSPs)." Both figures now
      shown (msps_affected 60 kept as the CISA/press MSP-specific figure;
      Kaseya's ~50 direct-customer count noted).
    * $70M: BleepingComputer (snapshotted) verbatim — REvil "locked more
      than a million systems and are willing to negotiate for a universal
      decryptor, starting from $70 million. This is the highest ransom
      demand to date." KEPT.
    * Coop: enwikipedia verbatim — "Visma, who manages some systems for
      Swedish supermarket chain Coop... had to close down its 800 stores
      for almost a week... did not pay ransom, but rebuilt their systems."
      KEPT; added the Visma downstream mechanism.
    * Decryptor date: prior said "July 22." enwikipedia: "On 23 July 2021,
      Kaseya announced that it had received a universal decryptor tool from
      a 'trusted third party'." Aligned to July 23 (= end_date). FBI-key:
      enwikipedia carries the Washington Post Sept-2021 report that "the
      master key came from the FBI" — the "widely understood to be FBI-
      supplied" claim is now sourced (softened to WaPo-reported).
    * summary: the uncarried diplomatic/enforcement coda (the specific
      "July 9 Biden–Putin call," a verbatim "to take action" quote, "leak
      site went dark July 13," "FSB raid arrested 14 members") was
      GENERALIZED to cross-references to the sibling events that carry it
      (fsb-revil-raid, revil-vasinskyi-indictment) rather than asserted
      here unsourced. Vasinskyi arrest/charge is DOJ-carried; his May 2024
      conviction ("13 years and seven months... $16 million restitution")
      is carried by bleepingcomputer/2024-05-02.

