id: 2021-07/kaseya-vsa
name: Kaseya VSA supply-chain ransomware (REvil)
start_date: 2021-07-02
disclosure_date: 2021-07-02
end_date: 2021-07-23  # Kaseya announced universal decryptor
incident_type:
  - ransomware
  - supply-chain
  - extortion
initial_vector: 0-day
outcome_summary: |
  A REvil affiliate exploited a zero-day authentication-bypass /
  credential-disclosure vulnerability (CVE-2021-30116) in on-premises
  Kaseya VSA servers — a remote-monitoring-and-management (RMM)
  platform used by managed-service providers — and pushed a malicious
  VSA agent "update" that deployed Sodinokibi/REvil ransomware
  downstream. Kaseya counted ~50 of its ~35,000 customers breached
  (CISA and press reporting cited ~60 MSPs); Kaseya's own estimate of
  the downstream businesses compromised was a range of 800–1,500. REvil
  posted a USD 70M universal-decryptor demand on its leak site — its
  highest ever — claiming to have locked "more than a million systems."
  Swedish supermarket chain Coop closed ~800 stores for almost a week
  after its provider Visma was hit downstream; Coop did not pay and
  rebuilt its systems. On July 23 2021 Kaseya announced it had obtained
  a universal decryptor from a "trusted third party" and did not pay the
  ransom; the Washington Post later reported the FBI had covertly held
  the key. (The event previously mislabeled a second CVE, CVE-2021-30119,
  as "command injection"; NVD records it as a reflected XSS, so it was
  dropped.)
quantified_impact:
  organizations_affected: 1500  # ceiling of Kaseya's own 800–1,500 downstream-business range (not a firm count)
  msps_affected: 60  # CISA/press ~60 MSPs; Kaseya counted ~50 of its ~35,000 direct customers breached
  initial_ransom_demand_usd: 70000000  # REvil leak-site universal-decryptor demand (BleepingComputer 2021-07-05)
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
operators_named:
  - vasinskyi-yaroslav  # REvil affiliate, alleged Kaseya operator, DOJ Nov 2021
summary: |
  Largest ransomware supply-chain incident on public record, and the
  third major US-critical-infrastructure ransomware event of the
  May–July 2021 cluster (Colonial Pipeline → JBS → Kaseya). The
  incident intensified US pressure on Russia over ransomware harboring;
  REvil's subsequent disruption and the January 2022 FSB raid on the
  group are modeled as sibling events (fsb-revil-raid,
  revil-vasinskyi-indictment). REvil affiliate Yaroslav Vasinskyi
  (Ukrainian national), the alleged Kaseya operator, was arrested in
  Poland (Oct 2021) and charged by DOJ (Nov 2021); after extradition he
  was convicted in May 2024 and sentenced to 13 years and 7 months
  (see revil-vasinskyi-indictment / lockbit-2-vasinskyi-extradition).
attributions:
