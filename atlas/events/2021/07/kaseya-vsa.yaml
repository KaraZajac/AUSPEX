  - target_id: sectors/ict/managed-services
    role: collateral
    outcome: |
      ~50–60 MSPs running on-premises VSA were the propagation layer,
      pushing REvil ransomware to their downstream SMB customers
      (directionality: Kaseya → MSPs → ~800–1,500 downstream businesses).
  - target_id: orgs/coop-sweden  # NOTE: orgs/coop-sweden registry file MISSING (pre-existing dangling FK) — flagged for orchestrator; not created (target files out of audit scope)
    role: collateral
    outcome: |
      ~800 Coop Sweden stores closed for almost a week after downstream
      provider Visma was hit; Coop did not pay and rebuilt its systems.
