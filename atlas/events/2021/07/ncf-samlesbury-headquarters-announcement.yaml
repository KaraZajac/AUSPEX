id: 2021-07/ncf-samlesbury-headquarters-announcement
name: National Cyber Force permanent headquarters announced — Samlesbury, Lancashire
start_date: 2021-07-22
disclosure_date: 2021-07-22
end_date: 2021-07-22
incident_type:
  - doctrine-publication
initial_vector: n/a
outcome_summary: |
  HM Government announced that the permanent headquarters of the
  National Cyber Force (NCF) would be co-located at Samlesbury,
  Lancashire — alongside existing BAE Systems and MoD presence —
  rather than at a Cheltenham GCHQ campus. The decision
  represented a doctrinal commitment to a geographically and
  organisationally distinct NCF outside of (though jointly led
  with) GCHQ headquarters, signaling that NCF was institutionally
  separable from the SIGINT mission.
false_flag_risk: none
summary: |
  Doctrinal landmark for the NCF as an institution distinct from
  GCHQ. Samlesbury's location in the north-west of England is
  doctrinally significant: it signals that NCF is part of the
  UK government's regional-levelling-up commitment as well as a
  cyber-power instrument, and that the operational community is
  not solely an offshoot of the Cheltenham SIGINT base. The
  announcement preceded the December 2021 NCS 2022 publication
  by five months and the April 2023 "Responsible Cyber Power
  in Practice" doctrinal paper by twenty-one months.

  AUSPEX models the announcement as a doctrine-publication
  event for the same reason as the November 2020 NCF public
  establishment event and the April 2023 NCF doctrinal paper
  event — these publications anchor downstream operational
  tagging of NCF-attributable activity and provide
  primary-source institutional fixed points for the NCF as a
  doctrinally distinct UK actor.
