id: 2021-07/ncf-samlesbury-headquarters-announcement
name: National Cyber Force permanent campus announced — Samlesbury, Lancashire
start_date: 2021-10-04
disclosure_date: 2021-10-04
end_date: 2021-10-04
incident_type:
  - doctrine-publication
initial_vector: unknown
outcome_summary: |
  HM Government (Ministry of Defence and Cabinet Office) announced
  that the permanent site of the National Cyber Force (NCF) would be
  established at Samlesbury, Lancashire, in the North West of England.
  The gov.uk release framed the choice around "levelling up" —
  high-skilled jobs and cementing the North West as "the cyber centre
  of the UK" — and described the NCF as the "joint MoD and GCHQ
  partnership" that is "the new home of offensive cyber operations,"
  drawing together GCHQ, the MoD, the Secret Intelligence Service
  (MI6) and Dstl "under one unified command for the first time."
false_flag_risk: none
summary: |
  Doctrinal landmark for the NCF as an institution. AUSPEX models the
  siting announcement as a doctrine-publication event — as with the
  November 2020 NCF public establishment and the April 2023
  "Responsible Cyber Power in Practice" paper — because these
  first-party institutional fixed points anchor downstream operational
  tagging of NCF-attributable activity and give primary-source
  anchors for the NCF as a doctrinally distinct UK actor.

  The choice of a distinct Samlesbury campus (rather than absorption
  into the Cheltenham GCHQ estate) is read by AUSPEX as signalling an
  organisationally separable offensive-cyber community, and the "cyber
  centre of the UK" / levelling-up framing ties the NCF to the wider
  regional-industrial-strategy agenda. The announcement (October 2021)
  preceded the December 2021 National Cyber Strategy 2022 by about two
  months and the April 2023 Responsible Cyber Power paper by about
  eighteen months.
