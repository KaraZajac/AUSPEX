initial_vector: unknown
outcome_summary: |
  Establishment by décret n° 2021-922 of 13 July 2021 of VIGINUM
  (service de vigilance et de protection contre les ingérences
  numériques étrangères), a service à compétence nationale placed
  under (auprès du) the SGDSN. Per the décret the service is
  charged with detecting and characterizing foreign digital
  interference operations — by analyzing publicly accessible
  content on online platforms, notably operations liable to alter
  citizens' information during electoral periods — and with
  assisting the SGDSN in coordinating the State's interministerial
  protection against such operations. The décret concurrently
  vests the SGDSN with new powers to identify foreign digital
  interference liable to harm the fundamental interests of the
  Nation, analyze its effects, and lead interministerial
  protection; a scientific and ethics committee (comité éthique et
  scientifique) is instituted alongside the service.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Institutional anchor of the French defensive counter-FIMI
  capability that the LII doctrine (announced 20 October 2021)
  subsequently codifies. The July 2021 stand-up predates LII by
  ~3 months, mirroring the COMCYBER (May 2017) / LIO (January
  2019) pattern in which the institutional structure precedes the
  published doctrine. As AUSPEX navigation, VIGINUM is treated as
  the defensive counter-interference service — institutionally
  distinct from ANSSI (defensive cyber-security, likewise
  SGDSN-side) and from COMCYBER (military information operations)
  — and as the canonical attributing organization for later events
  linking to the LII strategic-attribution and counter-
  disinformation pillars (VIGINUM's 2023+ Doppelganger/RRN and
  Portal Kombat public reports). Note the 2021 décret mandate
  itself is detect-and-characterise: public attribution is
  VIGINUM's later operational practice, not a power in the
  establishing text.
