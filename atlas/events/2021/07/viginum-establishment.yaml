    [a] FACTS — CORRECTION (fabricated scope stripped): outcome_summary
    previously claimed the mandate was to "detect, characterize, and
    PUBLICLY ATTRIBUTE foreign-state digital interference". The décret
    Article 3 mandate is only "1° Détecter et caractériser … les
    opérations … notamment lorsque celles-ci sont de nature à altérer
    l'information des citoyens pendant les périodes électorales …;
    2° Assister le secrétaire général de la défense et de la sécurité
    nationale". There is NO public-attribution power in the décret
    ("Attributions" appears solely as the SGDSN's competences, Chapitre
    Ier title), and the SGDSN VIGINUM page likewise uses no
    attribution/imputation language ("détecter et caractériser … qui
    ciblent la France", "protéger le débat public numérique"). Removed
    "publicly attribute"; rewrote outcome_summary to the décret's
    detect-and-characterise + interministerial-coordination mandate,
    the SGDSN's identify/analyse/coordinate powers over interference
    "de nature à porter atteinte aux intérêts fondamentaux de la
    Nation", and the comité éthique et scientifique (Articles 5-7).
    CORRECTION: removed the "operates separately from ANSSI … and from
    COMCYBER" sentence from outcome_summary — true/documented but
    carried by neither cited source; relocated as clearly-labelled
    AUSPEX navigation in summary. No fabricated malware/CVE/victim/
    figure/quote otherwise. Name + full French service title match the
    décret verbatim. No staffing figure asserted by the event (the
    SGDSN page's "65 agents" is a 2026 figure, not imported).
    [b] ATTRIBUTION — N/A. attributions: [] correct: establishment-by-
    decree has no perpetrator (matches siblings 2009-07/anssi-
    establishment, 2021-10/lii-doctrine-publication).
