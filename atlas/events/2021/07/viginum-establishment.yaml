id: 2021-07/viginum-establishment
name: VIGINUM stood up under SGDSN (Service de vigilance et de protection contre les ingérences numériques étrangères)
start_date: 2021-07-13
disclosure_date: 2021-07-13
end_date: 2021-07-13
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Establishment by decree of VIGINUM (Service de vigilance et de
  protection contre les ingérences numériques étrangères) under
  the SGDSN, with a mandate to detect, characterize, and publicly
  attribute foreign-state digital interference operations
  targeting French audiences and the French information
  environment. VIGINUM operates separately from ANSSI's defensive
  cyber-security mandate and from COMCYBER's military information
  operations, reflecting the French institutional choice to give
  defensive counter-FIMI its own dedicated service.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Institutional anchor of the French defensive counter-FIMI
  capability that the LII doctrine (announced October 2021)
  subsequently codified. The July 2021 stand-up predates LII by
  three months, mirroring the COMCYBER (May 2017) / LIO (January
  2019) pattern in which the institutional structure precedes
  the published doctrine. AUSPEX uses VIGINUM as the canonical
  attributing organization for events linking to the LII
  strategic-attribution and counter-disinformation pillars.
