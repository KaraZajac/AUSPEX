id: 2021-07/predatory-sparrow-iran-railway
name: Predatory Sparrow — Iranian railway disruption ('Meteor' wiper)
start_date: 2021-07-09
disclosure_date: 2021-07-09
end_date: 2021-07-11
incident_type:
  - destructive
  - disruption
  - wiper
initial_vector: unknown
outcome_summary: |
  Cyberattack against Iran's Islamic Republic of Iran Railways
  systems on 9 July 2021 disrupted train operations across the
  country and displayed taunting messages on station information
  boards — including the phone number of the office of Supreme
  Leader Khamenei as a fake passenger-complaint number ("64411").
  Check Point Research analysis (14 August 2021) identified a
  previously-unseen wiper malware family ("Meteor") and attributed
  the operation to a cluster Check Point named "Indra" — later
  treated by Israeli media and CCDCOE as overlapping with the
  Predatory Sparrow / Gonjeshke Darande persona that publicly
  claimed responsibility. First major destructive operation in
  the Predatory Sparrow series; the operational debut of the
  Meteor wiper toolkit.
false_flag_risk: suspected  # Predatory Sparrow / Indra hacktivist persona is the IL deniability layer; operator-state attribution rests on Israeli-aligned reporting and CCDCOE analysis, never on formal Israeli attestation
campaign_id: predatory-sparrow-iran-coercion
summary: |
  Opening operation of the Predatory Sparrow / Gonjeshke Darande
  series of destructive operations against Iranian civilian
  infrastructure (railway July 2021, fuel network October 2021
  and December 2023, Khuzestan Steel June 2022, Bank Sepah and
  Nobitex June 2025). Check Point Research's 14 August 2021
  Indra-cluster analysis is the canonical technical artifact;
  the operational claim came via the hacktivist persona on
  Telegram. The persona presents as Iranian anti-government
  hacktivists, but Israeli media and CCDCOE analysis treat IDF
  Unit 8200 / Mossad as the dominant operator hypothesis.

  Editorial note: Israel has maintained its standing non-attestation
  discipline throughout this and all subsequent Predatory Sparrow
  operations. Attribution is journalistic + vendor-research + Israeli-
  aligned consensus, never formal IL attestation. false_flag_risk is
  recorded as `suspected` because the hacktivist persona is itself
  a known IL deniability layer; the operator-state attribution is
  nonetheless firm at the journalistic-consensus level.
attributions:
  - actor_id: il/predatory-sparrow
    attributing_org: Check Point Research (Indra cluster); Predatory Sparrow self-claim (Telegram); Times of Israel
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-08-14
    attribution_source_id: checkpoint/2021-08-14_indra-iran-attacks
    notes: |
      Vendor-research technical clustering (Check Point's Indra
      cluster, Meteor wiper) plus persona-level Telegram self-claim.
      Israel has not formally attested. The Indra cluster is treated
      by AUSPEX (per the actor entry) as overlapping with Predatory
      Sparrow. Predatory Sparrow's hacktivist persona is the IL
      deniability layer.
