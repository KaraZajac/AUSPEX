  level: full   # every load-bearing claim carried by a snapshotted source (Check Point + Times of Israel + Wikipedia, all captured live + hashed); only the end_date tail is an unsourced analyst estimate (flagged in [c])
  notes: |
    REVERSE-DIRECTIONALITY event (Israel assessed attacker; Iran
    Railways + transport ministry victims). Full 6-point audit vs RAW
    snapshots. Snapshots (sha256 first8..last8, bytes): Check Point
    Indra 925d84a2..bca9da06 / 233,419; Times of Israel 3550d6d7..
    5993e2d5 / 391,896; Wikipedia Predatory Sparrow 5f8713ff..c9b455a9
    / 110,168 (new overlay source, badrabbit re-source model).

    [a] FACTS — verified vs RAW. Check Point (captured): "On July 9th
    and 10th, 2021 Iranian Railways and the Ministry of Roads and Urban
    Development systems became the subject of targeted cyber attacks";
    boards showed "messages about train delays or cancellations ... and
    urged passengers to call a certain phone number"; "'More
    information: 64411' message containing the Supreme Leader office
    number"; "PIS ... stands for Passenger Information System ...
    attackers made sure their message ... will be displayed properly";
    Meteor "Meteor, Stardust, and Comet are different versions of the
    same payload" with "artifacts that tie them to the attack against
    Iran Railways". Times of Israel (captured): "Iran's railroad system
    came under cyberattack on Friday ... hackers posting fake messages
    about alleged train delays or cancellations on display boards at
    stations across the country"; "64411 ... matched the number to
    Iran's Supreme Leader's Office". CORRECTIONS: (1) ADDED the
    co-target Ministry of Roads and Urban Development (July 10) — a
    documented part of the operation the prior revision omitted; name
    updated to "railway & transport-ministry" and Indra co-billed. (2)
    incident_type destructive/disruption/wiper -> [disruption,
    destructive] per the canonical PS-pair tagging (matches the Oct-2021
    fuel sibling). Meteor IS a raw-documented wiper, so a `wiper` tag
    would also be defensible — FLAG for orchestrator if the corpus
    prefers to restore it; dropped here because the observable railway
    impact was disruption + lockout + display-hijack (trains reportedly
    resumed) rather than an established production-data wipe, so the two
    effect-class tags are the conservative, non-over-asserting choice
    and Meteor stays fully described in prose. (3) Clarified that the
    "claim" was an on-screen message spread via Iranian social media,
    not a Predatory Sparrow Telegram post.

    [b] ATTRIBUTION — the key fix. Prior revision listed "Predatory
    Sparrow self-claim (Telegram)" as an attributing basis and framed
    Check Point as supporting the PS/Israel attribution — BOTH
    unsupported. Check Point attributes to "Indra" and affirmatively
    assesses NON-nation-state ("we find it unlikely that Indra is
    operated by a nation-state actor"); the named Predatory Sparrow
    persona did not contemporaneously self-claim the railway (its first
    public self-claim was Oct-2021 fuel). Restructured attributing_org
    into its true layers (Check Point→Indra/Meteor technical; NYT
    anonymous officials→Israel; retrospective vendor + Israeli-media
    consensus→Predatory Sparrow). Added the wikipedia/predatory-sparrow
    overlay source to carry the retrospective PS/Israel layer (was
    unsourced in-event). Kept actor_id il/predatory-sparrow (corpus
    alias map Indra→PS + NYT/Israeli-media consensus) but confidence
    capped at moderate, auspex concur-with-caveat, with an explicit
    hedge — Israel never confirmed; Check Point read non-nation-state.

    [c] DATES. start=disclosure 2021-07-09 verified (TOI JSON-LD
    datePublished 2021-07-09T19:53:06Z; "on Friday"; Check Point "July
    9th"). end_date 2021-07-11 is an approximate DISRUPTION-TAIL analyst
    estimate — the two cited sources document activity across 9-10 July
    only (Iran Railways 9th; Ministry of Roads 10th); flagged rather
    than tightened to avoid asserting unsourced precision (not a
    load-bearing claim). Source published_on verified: Check Point
    "August 14, 2021"; Times of Israel 2021-07-09. attribution_date
    2021-08-14 = Check Point's technical attribution.

    [d] DOCTRINE_LINK. il/counter-iran-posture / retaliatory-cyber-strike
    kept, but: added perspective: attacker-rationale (Israeli offensive
    doctrine on an Israel-attributed op; actor-state il == doctrine-state
