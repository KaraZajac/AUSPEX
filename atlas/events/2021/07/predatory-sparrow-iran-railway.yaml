id: 2021-07/predatory-sparrow-iran-railway
name: Predatory Sparrow / Indra — Iranian railway & transport-ministry disruption ('Meteor' wiper)
start_date: 2021-07-09
disclosure_date: 2021-07-09
end_date: 2021-07-11  # approximate disruption tail; cited sources document activity 9-10 Jul (Iran Railways 9th; Ministry of Roads & Urban Development 10th)
incident_type:
  - disruption
  - destructive
initial_vector: unknown
outcome_summary: |
  On 9-10 July 2021 a cyberattack struck Iran's national rail
  operator (Islamic Republic of Iran Railways) and, the next day,
  the Ministry of Roads and Urban Development. Station information
  boards across the country were hijacked to show fake train
  delays/cancellations ("long delayed because of cyberattack" /
  "canceled") and urged passengers to call "64411" for information
  — the published phone number of the office of Supreme Leader
  Khamenei — a public trolling/coercion signature rather than a
  covert operation. Check Point Research's 14 August 2021 analysis
  identified a previously-unseen wiper family ("Meteor", with the
  related Stardust/Comet variants) with artifacts tying it to the
  Iran Railways intrusion, and attributed the operation to a
  self-described regime-opposition/hacktivist cluster it named
  "Indra" — assessing it as UNLIKELY to be nation-state-operated.
  The Indra alias was later consolidated into the pro-Israel
  Predatory Sparrow / Gonjeshke Darande dossier (US defence
  officials, per the New York Times, attributed the railway attack
  to Israel; Israel has never confirmed). The operational debut of
  the Meteor toolkit and the opening entry in the Predatory Sparrow
  series of destructive strikes on Iranian civilian infrastructure.
false_flag_risk: suspected  # the "Indra" / Predatory Sparrow hacktivist framing is the assessed IL deniability layer; the operator-state attribution rests on Israeli-aligned reporting + retrospective consensus, never on formal Israeli attestation, and the strongest contemporaneous technical source (Check Point) explicitly leaned non-nation-state
campaign_id: predatory-sparrow-iran-coercion
summary: |
  Opening operation of the Predatory Sparrow / Gonjeshke Darande
  series of destructive operations against Iranian civilian
  infrastructure (railway July 2021, fuel network October 2021 and
  December 2023, Khuzestan Steel June 2022, Bank Sepah and Nobitex
  June 2025). DIRECTIONALITY IS REVERSED from most Iran events:
  Israel (assessed) is the attacker; Iran Railways + the transport
  ministry are the victims.

  Attribution has two layers that the prior revision conflated.
  (1) CONTEMPORANEOUS/TECHNICAL: Check Point Research's 14 August
  2021 report attributes the attack to "Indra", a group that
  "identify themselves as regime opposition", and finds it
  "unlikely that Indra is operated by a nation-state actor"; the
  operational "claim" was an on-screen message on the hacked
  computers ("We attacked the computer systems of the Railway
  Company and the Ministry of Roads and Urban Development") spread
  via Iranian social media — NOT a Predatory Sparrow Telegram post
  (the named Predatory Sparrow persona first publicly self-claimed
  with the October 2021 fuel-station operation, its canonical
  sibling event). (2) RETROSPECTIVE OVERLAY: the Meteor toolkit and
  the "Indra" alias were later consolidated into the pro-Israel
  Predatory Sparrow dossier; the New York Times (anonymous US
  defence officials) attributed the railway attack to Israel, and
  Predatory Sparrow is "widely believed, including by Israeli media,
  to be linked to the Israeli government or military." AUSPEX homes
  the event to il/predatory-sparrow via the actor's "Indra" alias
  (confidence: overlapping).

  Editorial note: Israel has maintained its standing non-attestation
  discipline. The Israel operator-state attribution is journalistic
  + vendor-consolidation + Israeli-media consensus, hedged, never
  formal IL attestation; false_flag_risk is `suspected` because the
  hacktivist persona is the assessed IL deniability layer AND
  because the strongest contemporaneous technical source (Check
  Point) affirmatively read the operator as non-nation-state.
attributions:
  - actor_id: il/predatory-sparrow
    attributing_org: Check Point Research (technical → "Indra" cluster / Meteor wiper; assessed non-nation-state); New York Times (anonymous US defence officials → Israel, per Wikipedia); retrospective vendor + Israeli-media consensus (Predatory Sparrow / Gonjeshke Darande)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-08-14
    attribution_source_id: checkpoint/2021-08-14_indra-iran-attacks
    notes: |
      Two-layer attribution held at concur-with-caveat / named-actor.
      The CITED contemporaneous technical source (Check Point,
      2021-08-14) attributes to "Indra" — self-identified regime
      opposition — and explicitly assesses it as UNLIKELY nation-state:
      "we find it unlikely that Indra is operated by a nation-state
      actor." So Check Point does NOT support an Israel attribution;
      it supports the Indra/Meteor technical clustering only. AUSPEX
      maps "Indra" to il/predatory-sparrow through the actor entry's
      alias table (alias: Indra, confidence: overlapping). The
      Israel/Predatory Sparrow layer is the RETROSPECTIVE consensus
      carried by the added wikipedia/predatory-sparrow overlay source:
      Predatory Sparrow is "a pro-Israel hacker group with possible
      links to the Israeli government", "claimed responsibility for a
      July 2021 cyberattack on Iranian transit systems", and "Two
      United States defense officials quoted anonymously by the New
      York Times attributed the attack to Israel" — with the standing
      hedge, "The Israeli government has not confirmed any ties with
      the group." No formal Israeli attestation; the named "Predatory
      Sparrow" persona did not contemporaneously self-claim the railway
      (the on-screen message was the July claim; the persona's first
      public self-claim was the Oct 2021 fuel operation). Kept the
      il/predatory-sparrow home (corpus policy + NYT/Israeli-media
      consensus) but confidence is capped at moderate and hedged for
      the reverse-directionality sensitivity and Check Point's
      contrary contemporaneous read.
doctrine_links:
  - doctrine_id: il/counter-iran-posture
    perspective: attacker-rationale
    pillar_id: il/counter-iran-posture/retaliatory-cyber-strike
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      IF the operation is Israeli (the assessed but unconfirmed
      attribution), a public-facing destructive/disruptive strike on
      Iranian civilian transport CII carrying political messaging that
      trolls the Supreme Leader is the textbook execution of the
      counter-Iran posture's retaliatory / tit-for-tat cyber-strike
      pillar (transport/rail is a named target sector of that pillar).
      Opening operation of the Predatory Sparrow series that sets the
      doctrinal template for the subsequent fuel-network, steel-mill
      and financial operations. Held at strongly_inferred, not
      attested: no source states an Israeli retaliatory GOAL for this
      op, and the reading is contingent on the hedged Israel
      attribution (the strongest contemporaneous source read the
      operator as non-nation-state).
    attesting_source_id: null
    inference_basis:
      signals:
        - "Public-facing coercive signature, not covert collection: station boards hijacked to display political taunts and route passengers to Khamenei's office number (64411) — 'A phone number–64411–was displayed on boards of train stations ... It matched the number to Iran's Supreme Leader's Office' (Times of Israel, captured)."
        - "Opening entry in the Predatory Sparrow series of destructive strikes on Iranian civilian CII (railway → fuel Oct-2021/Dec-2023 → Khuzestan Steel 2022 → Bank Sepah/Nobitex 2025); the Meteor/Stardust/Comet wiper family Check Point tied to this attack recurs across the series, and the corpus homes the 'Indra' alias to il/predatory-sparrow."
        - "Retrospective attribution of the railway attack to Israel: 'Two United States defense officials quoted anonymously by the New York Times attributed the attack to Israel', and Predatory Sparrow is 'widely believed, including by Israeli media, to be linked to the Israeli government or military' (Wikipedia, captured)."
      ruled_out: "NOT excluded, which is why this is strongly_inferred (contingent) and not attested: the competing reading is genuine Iranian anti-regime hacktivism / cyber-crime with no Israeli direction — Check Point's own contemporaneous assessment ('Indra ... identify themselves as regime opposition group'; 'we find it unlikely that Indra is operated by a nation-state actor'). Israel has never confirmed involvement, so an Israeli retaliatory doctrine goal cannot be asserted as attested."
    contested: false
    analyst: claude
