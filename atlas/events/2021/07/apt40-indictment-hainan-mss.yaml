id: 2021-07/apt40-indictment-hainan-mss
name: APT40 indictment + Hainan State Security Department exposure
start_date: 2021-07-19  # US counter-action date (indictment unsealed / announced; grand jury in San Diego returned it in May 2021). NOT APT40's 2011-2018 activity window (that belongs to the subject campaign / actor record).
disclosure_date: 2021-07-19
end_date: 2021-07-19
incident_type:
  - law-enforcement  # meta counter-action: DOJ indictment + joint CISA/FBI/NSA advisory. The underlying APT40 intrusion/data-theft campaign is the SUBJECT, described in prose (directionality model).
initial_vector: phishing  # subject APT40 campaign's access vector (spear-phishing, per CISA AA21-200a); the event itself is a paper LE counter-action with no initial-access vector of its own.
outcome_summary: |
  US counter-action, not a cyber operation: a DOJ two-count
  indictment (grand jury, S.D. Cal., returned May 2021) of four
  defendants, unsealed alongside a joint CISA/FBI/NSA advisory
  (AA21-200a), exposing APT40 as China's MSS Hainan State Security
  Department operating through the front company Hainan Xiandun.
  The indictment covers a global 2011-2018 campaign against victims
  in "a dozen countries"; CISA states APT40 targeted "biomedical,
  robotics, and maritime research" and "industries included in
  China's Belt and Road Initiative."
false_flag_risk: none
operators_named:
  - ding-xiaoyang  # MSS Hainan HSSD officer, DOJ Jul 2021
  - cheng-qingmin  # MSS Hainan HSSD officer, DOJ Jul 2021
  - zhu-yunmin  # MSS Hainan HSSD officer, DOJ Jul 2021
  - wu-shurong  # Hainan Xiandun employee, DOJ Jul 2021
summary: |
  A US law-enforcement counter-action that is also one of the most
  explicit public-record attestations of BRI cyber tasking. On 19
  July 2021 DOJ (S.D. Cal.) announced a two-count indictment —
  returned by a San Diego grand jury in May 2021 — of four
  defendants: three HSSD officers (Ding Xiaoyang, Cheng Qingmin,
  Zhu Yunmin) plus Wu Shurong, a Hainan Xiandun employee "hired ...
  to create malware, and hack into computer systems." DOJ states
  the HSSD is "a provincial arm of China's Ministry of State
  Security (MSS)" and that the defendants "sought to obfuscate the
  Chinese government's role ... by establishing a front company,
  Hainan Xiandun Technology Development Co., Ltd." A companion joint
  CISA/FBI/NSA advisory (AA21-200a) catalogues APT40 / Leviathan /
  TEMP.Periscope tradecraft it associates with the indicted actors:
  spear-phishing (including internal spear-phishing), exploitation
  of public-facing applications, and the BADFLICK/Greencrash,
  Murkytop, Derusbi/PHOTO and NanHaiShu malware plus China Chopper
  web shells and Cobalt Strike. Per DOJ the 2011-2018 campaign hit
  victims in "a dozen countries" across aviation, defense,
  education, government, health care, biopharmaceutical and maritime
  industries — stealing tech for "submersibles and autonomous
  vehicles," genetic-sequencing data, and infectious-disease
  research (Ebola, MERS, HIV/AIDS, Marburg, tularemia).
  (Fuller APT40 malware/CVE tradecraft lives on the cn/mss/apt40
  actor record; the Microsoft Exchange / Citrix / F5 / Pulse-Secure
  CVE table from the original AA21-200a did NOT survive CISA's CMS
  migration and is absent from the current cited snapshot, so it is
  not asserted here.)
