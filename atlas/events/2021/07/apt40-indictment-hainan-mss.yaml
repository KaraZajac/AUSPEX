  notes: |
    6-point audit of the July 2021 APT40 / Hainan-MSS indictment against
    the RAW cited sources. Both sources snapshotted + hash-verified; every
    RETAINED load-bearing claim is carried by a snapshotted govt-primary →
    level full. Reframed from a mis-modeled "APT40 intrusion" (actor_id
    cn/mss/apt40) to a US law-enforcement counter-action (directionality
    model): the DOJ indictment IS the US action; APT40 is the SUBJECT.

    SNAPSHOTS:
    - doj/2021-07-19_apt40-indictment — RE-CAPTURED as the genuine
      justice.gov page (raw_snapshot doj__2021-07-19_apt40-indictment.html,
      NEW sha256 d9bf4a56…0850538a, 89,143 B). The prior snapshot was a
      securityaffairs.com press mirror because justice.gov sits behind an
      Akamai Bot-Manager "bm-verify" interstitial. BYPASS executed: GET the
      PR URL → 1.5 KB meta-refresh challenge carrying a bm-verify token →
      re-GET /archives/opa/pr/…?bm-verify=<token> with the same cookie jar →
      HTTP 200, full clean article (headline + body, no challenge markers).
      Upgrades the snapshot from a mirror to the actual cited primary; url
      + tier PRESERVED.
    - cisa/2021-07-19_aa21-200a-apt40 — snapshot PRESERVED
      (cisa__2021-07-19_aa21-200a-apt40.html, sha256 4937dca4…e8448580,
      93,781 B, hash RE-VERIFIED unchanged). Confirmed COMPLETE, not
      truncated: a fresh live fetch of cisa.gov returns byte-identical text
      (31,942 chars, zero CVEs). CISA's CMS migration dropped the original
      AA21-200a vulnerability/CVE table (Microsoft Exchange / Citrix / F5 /
      Pulse-Secure / Mimikatz) — it is absent from the current page, so
      those specifics are no longer source-carried (see [a]).

    [a] FACTS — verified against the RAW; non-carried embellishment stripped.
    CARRIED (verbatim): DOJ headline "Four Chinese Nationals Working with the
    Ministry of State Security Charged with Global Computer Intrusion
    Campaign Targeting Intellectual Property and Confidential Business
    Information, Including Infectious Disease Research"; HSSD is "a provincial
