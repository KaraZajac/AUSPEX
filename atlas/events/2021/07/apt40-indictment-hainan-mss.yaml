    Norway, Saudi Arabia, South Africa, Switzerland and the United Kingdom";
    "Targeted industries included, among others, aviation, defense,
    education, government, health care, biopharmaceutical and maritime";
    theft of "sensitive technologies used for submersibles and autonomous
    vehicles ... proprietary genetic-sequencing technology"; "infectious-
    disease research related to Ebola, MERS, HIV/AIDS, Marburg and
    tularemia"; two-count indictment, 5-yr max, San Diego grand jury returned
