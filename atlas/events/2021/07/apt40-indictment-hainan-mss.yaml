id: 2021-07/apt40-indictment-hainan-mss
name: APT40 indictment + Hainan State Security Department exposure
start_date: 2009-01-01  # earliest APT40 activity
disclosure_date: 2021-07-19
end_date: 2021-07-19
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  DOJ indictment + CISA AA21-200a jointly exposed APT40 / Hainan
  State Security Department via Hainan Xiandun. Indictment
  covers maritime, biomedical, and robotics R&D in 12+ countries
  plus BRI-relevant industries. CISA advisory explicitly states
  the tasking covers "industries included in China's Belt and
  Road Initiative."
false_flag_risk: none
operators_named:
  - ding-xiaoyang  # MSS Hainan HSSD officer, DOJ Jul 2021
  - cheng-qingmin  # MSS Hainan HSSD officer, DOJ Jul 2021
  - zhu-yunmin  # MSS Hainan HSSD officer, DOJ Jul 2021
  - wu-shurong  # Hainan Xiandun employee, DOJ Jul 2021
summary: |
  The cleanest attested doctrine link in the public record for BRI
  / Digital Silk Road cyber tasking. Four defendants including
  three HSSD officers (Ding Xiaoyang, Cheng Qingmin, Zhu Yunmin)
  plus Wu Shurong (HXT employee). CISA AA21-200A and the
  indictment catalogue APT40 / Leviathan / TEMP.Periscope
  tradecraft: spear-phishing of researchers and government
  officials, exploitation of public-facing services (Microsoft
  Exchange, Citrix NetScaler, F5 BIG-IP, Pulse Secure VPN), web
  shells (China Chopper variants) on internet-facing servers,
  the BADFLICK, AIRBREAK, FRESHAIR, BLACKCOFFEE, and MURKYTOP
  backdoors, credential dumping via Mimikatz, and lateral movement
  on valid credentials toward maritime engineering, naval R&D,
  biomedical research, and university targets across BRI partner
  states.
