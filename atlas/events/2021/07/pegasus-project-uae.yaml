qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-10
  level: full
  notes: |
    Full 6-point audit vs RAW. Triage: NOT a phantom — both original
    sources are real and live (HTTP 200), but they are THIN on the UAE
    victim-specifics, so a badrabbit RE-SOURCE was applied (below). All
    three sources snapshotted this pass:
      • forbiddenstories/2021-07-18_pegasus-project — sha256
        b812f9a5…2e49b126, 182,150 bytes (HTML "About the Pegasus
        Project" page). Carries the CORPUS claims but Latifa/Haya/
        Khashoggi/Mansoor 0× each.
      • amnesty/2021-07-18_forensic-methodology-pegasus — sha256
        8220e19a…3710691e, 232,664 bytes (HTML). Technical forensics;
        UAE nexus is ONLY the 2016 Mansoor anchor (Latifa/Haya 0×).
      • amnesty/2021-07-21_pegasus-princess-latifa-haya-potential-targets
        — sha256 de04d89a…c87b574fa7, 110,376 bytes (HTML). NEW this
        pass; carries the royal-family + Khashoggi-family angle with the
        precise "potential targets" hedge.

    [a] FACTS — corrected against RAW.
      • STRIPPED over-claim: "UAE identified as one of the MOST PROLIFIC
        customer-state operators" (name + body). "most prolific"/"largest"
        = 0× in both original sources. Forbidden Stories names the UAE as
        an NSO client grouped with "Azerbaijan … and Saudi Arabia"; the
        one enumerated high-volume operator is MOROCCO ("more than 10,000
        phone numbers"). Reworded to "named among NSO customer states."
        (The prior source-record note "UAE … one of the largest customer-
        state operators" was likewise an over-read and was corrected.)
      • 50k HEDGE (task-critical) tightened to the source's own words:
        "more than 50,000 phone numbers selected for surveillance by the
        customers of … NSO Group" / "phone numbers of potential
        surveillance targets" — a SELECTION/interest list, NOT confirmed
        infections. Forensic subset: "infection or attempted infection …
        in 85% of cases, or 37 in total." Added NSO's rebuttal ("wrong
        assumptions", "uncorroborated theories"; HLR data "have no bearing
        on the list of the customers targets").
      • Latifa/Haya RE-SOURCED to Amnesty 2021-07-21 and hedged: "listed
        as potential targets by clients of spyware company NSO Group" /
        "selected as people of interest by clients of NSO Group." The
        press release names the selecting party as "clients of NSO Group"
        (NOT explicitly the UAE) — event now states the UAE/Dubai mapping
        as strong inference, with forensic/judicial confirmation carried
        by the dedicated Haya court event. Khashoggi's family carried by
        the same press release ("including Jamal Khashoggi's family"),
        kept hedged as a UAE/Saudi customer-state question.
      • Mansoor anchor VERIFIED in the Amnesty forensic report: "forensic
        records linking recent Pegasus infections back to the 2016 Pegasus
        payload used to target the HRD Ahmed Mansoor." Consortium scale
        (80+ journalists / 17 orgs / 10 countries) verified in both.

    [b] ATTRIBUTION — actor modeling per task. UAE = operator (attacker);
    NSO = vendor (il/nso-group), NOT the actor. actor_id null → the nation-
    scoped operator cluster ae/unscoped/uae-pegasus. service_id downgraded
    ae/state-security → ae/unscoped (over-attestation: sources name "NSO
    customer states"/"clients", no Emirati service — same rationale that
    demoted the uae-pegasus ACTOR to ae/unscoped on 2026-06-24).
    auspex_assessment concur → concur-with-caveat (50k = selections, not
    infections; NSO disputes; per-number assignment is corpus-methodology
    + inference). attributing_org_confidence kept high.

    [c] DATES — start 2016-01-01 ("since 2016", verbatim) ✓; disclosure
    2021-07-18 (project launch) ✓; end_date 2021-07-18 → 2021-07-21 to
    cover the royal-family revelation now cited (Amnesty press release
    byline "21 July 2021"). Source published_on verified: FS 2021-07-18,
    Amnesty forensic 2021-07-18, Amnesty press release 2021-07-21.

    [d] DOCTRINE_LINKS — both retargeted with inference_basis.
    procurement-led/commercial-spyware KEPT attested; added
    inference_basis.source_quote = the "decided to sell its product to
    authoritarian regimes such as … the United Arab Emirates" sentence
    (direct external-channel procurement, meeting the doctrine's own
    attested bar). regime-protection/domestic-dissidents KEPT
    strongly_inferred; reasoning rebased off the (uncited) Latifa/Haya
    onto the Mansoor forensic anchor + the royal-family press release +
    the FS victim-class framing, with signals[] + ruled_out added
