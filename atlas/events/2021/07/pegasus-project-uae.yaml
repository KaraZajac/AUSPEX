    operation → attacker-rationale, perspective left default.

    [e] ATTRIBUTION_LEVEL — was MISSING; set to nation (consortium names
    the UAE as an NSO customer STATE; no specific service/unit named).

    [f] ACTOR_ID — ae/unscoped/uae-pegasus resolves to the id: field in
