id: 2021-07/pegasus-project-uae
name: Pegasus Project — UAE identified among prolific NSO customer-state operators
start_date: 2016-01-01  # consortium-coverage start of leaked target-list window
disclosure_date: 2021-07-18
end_date: 2021-07-18
incident_type:
  - documentary
  - surveillance
initial_vector: n-a
outcome_summary: |
  Publication of the Pegasus Project — a coordinated investigation
  by 17 media organizations led by Forbidden Stories with
  forensic support from Amnesty International's Security Lab.
  Analysis of a leaked list of approximately 50,000 phone numbers
  identified as Pegasus targets or candidates by NSO customer
  states. UAE was identified as one of the most prolific
  customer-state operators in the dataset, alongside Saudi
  Arabia, Mexico, Hungary, India, Morocco, and others.

  Named UAE-targeted individuals confirmed via Amnesty Security
  Lab forensic analysis included family members of Jamal Khashoggi
  (post-October 2018 murder, the UAE / Saudi customer-state
  attribution chain), Princess Latifa bint Mohammed Al Maktoum
  (daughter of UAE Vice-President Mohammed bin Rashid Al Maktoum),
  Princess Haya bint Hussein (former wife of Mohammed bin Rashid
  Al Maktoum), and associates of Lebanese, Yemeni, and Indian
  political figures.
false_flag_risk: low
summary: |
  The Pegasus Project is the most comprehensive single source
  for UAE Pegasus customer-state attribution and the most
  consequential single publication on NSO Group's customer-state
  operational record. AUSPEX uses it as the corpus-level
  doctrine-link anchor for UAE procurement-led-capability;
  individual victim-specific events from within the Pegasus
  Project dataset are recorded separately where the source
  detail supports it.

  The targeting of UAE-royal-family members (Princess Latifa,
  Princess Haya) is particularly load-bearing for the
  regime-protection-surveillance doctrine: it documents intra-
  ruling-family surveillance, extending the doctrine's scope
  beyond outsider-dissidents to royal-family-internal targets.
