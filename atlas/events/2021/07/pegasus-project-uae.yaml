id: 2021-07/pegasus-project-uae
name: Pegasus Project — UAE named among NSO customer states in the 50,000-number leaked selection list
start_date: 2016-01-01  # "since 2016" leaked-selection-list window per Forbidden Stories
disclosure_date: 2021-07-18  # Pegasus Project launch
end_date: 2021-07-21  # royal-family (Latifa/Haya) revelation, Amnesty press release 21 Jul 2021
incident_type:
  - surveillance  # task's "targeted-surveillance" -> valid enum: UAE Pegasus mobile-collection purpose
  - intrusion     # task's "mobile-exploitation" -> valid enum: zero-click Pegasus mobile-device compromise
initial_vector: 0-day  # Pegasus zero-click / iMessage exploitation documented in the Amnesty forensic report (incl. a fully-patched iPhone 12 / iOS 14.6 in July 2021)
outcome_summary: |
  Publication of the Pegasus Project — a collaborative investigation
  by more than 80 journalists from 17 media organizations in 10
  countries, coordinated by Forbidden Stories with forensic support
  from Amnesty International's Security Lab (peer-reviewed by Citizen
  Lab). The consortium obtained a leaked list of more than 50,000
  phone numbers "selected for surveillance by the customers" of NSO
  Group across more than 50 countries since 2016.

  Critical hedge: the list is a SELECTION / interest list of potential
  targets, NOT a record of confirmed infections. Amnesty forensically
  examined only a small subset of phones and found an "infection or
  attempted infection with NSO Group's spyware in 85% of cases, or 37
  in total." NSO disputed the "targets" characterisation, calling the
  consortium's analysis "wrong assumptions" and "uncorroborated
  theories" and saying HLR-lookup data "have no bearing on the list of
  the customers targets."

  The UAE was named among the NSO customer states — Forbidden Stories
  grouped it with Azerbaijan and Saudi Arabia as authoritarian-regime
  clients NSO "decided to sell its product to." (The cited sources do
  NOT rank the UAE as the most prolific operator; the single highest-
  volume operator they enumerate is Morocco, "more than 10,000 phone
  numbers.") Numbers of interest that — by strong inference (the
  Amnesty press release names only "clients of NSO Group") — map to a
  UAE / Dubai client included the Emirati princesses Latifa bint
  Mohammed Al Maktoum and Haya bint Hussein and their circles, "listed
  as potential targets"/"selected as people of interest" (Amnesty,
  21 July 2021), and members of murdered journalist Jamal Khashoggi's
  family (a UAE / Saudi customer-state attribution question). Amnesty's
  forensic-methodology report separately anchors recent Pegasus
  infections to the 2016 payload used against Emirati human-rights
  defender Ahmed Mansoor.

  Forensic confirmation and tier-1 attribution of the specific UAE
  targets are recorded in dedicated events — Ahmed Mansoor
  (2016-08/mansoor-trident-pegasus-uae) and the English High Court
  fact-finding on Princess Haya and her solicitors
  (2021-05/ewhc-princess-haya-pegasus-fact-finding). This event is the
  corpus-level anchor for the UAE customer-state finding.
false_flag_risk: none  # NSO customer-state attribution; vendor sells only to governments
summary: |
  AUSPEX models this as the corpus-level anchor for the UAE's status
  as a long-running NSO Pegasus customer state, as revealed by the
  Pegasus Project's leaked selection list.

  Directionality / actor modeling: the UAE (the Pegasus customer-state
  operator, modeled at nation level as ae/unscoped/uae-pegasus) is the
  attacker; NSO Group of Israel is the commercial spyware VENDOR,
  modeled separately as the tooling vendor (il/nso-group) and NOT
  attributed as the actor; the dissidents, journalists, and royal-
  family members in the dataset are the victims. The cited consortium
  and forensic sources name the UAE as an NSO client at nation level
  and do not name a specific Emirati service, so the service overlay is
  ae/unscoped (downgraded from ae/state-security) and attribution_level
  is nation.

  The event is deliberately scoped to the corpus-level customer-state
  finding its cited sources carry; victim-specific UAE Pegasus
  operations with their own forensic or judicial records are recorded
  separately (Mansoor 2016; the English High Court Princess Haya fact-
  finding 2021). The intra-ruling-family dimension (Princess Latifa,
  Princess Haya) is doctrinally load-bearing: it extends regime-
  protection-surveillance beyond outsider dissidents to royal-family-
  internal targets.
attributions:
  - actor_id: ae/unscoped/uae-pegasus
    service_id: ae/unscoped  # AUDIT 2026-07-10: downgraded from ae/state-security — cited sources name "NSO customer states"/"clients of NSO Group" at nation level, no specific Emirati service (over-attestation fix; matches the actor's own primary_service_id)
    attributing_org: Forbidden Stories / Amnesty Security Lab consortium
    attributing_org_confidence: high
    auspex_assessment: concur-with-caveat  # AUDIT 2026-07-10: downgraded from concur — the 50k are selection candidates, not confirmed infections; NSO disputes the "targets" framing; per-number UAE assignment rests on corpus methodology + inference
    attribution_date: 2021-07-18
    attribution_source_id: forbiddenstories/2021-07-18_pegasus-project
    attribution_level: nation  # consortium attributes to "NSO customer states"; UAE named as a client, no specific service/unit
    notes: |
      Corpus-level customer-state attribution. Directionality: the UAE
      is the Pegasus customer/operator (attacker); NSO Group is the
      commercial vendor (tooling), modeled separately as il/nso-group
      and NOT attributed as the actor. The consortium attributes the
      50,000-number list to "NSO customer states" at NATION level — it
      names the UAE as an NSO client (grouped with Azerbaijan and Saudi
      Arabia) but does NOT name a specific Emirati service; hence
      attribution_level: nation, service_id downgraded ae/state-security
      → ae/unscoped, and actor_id set to the nation-scoped operator
      cluster ae/unscoped/uae-pegasus.

      auspex_assessment concur-with-caveat — the caveats are that (1)
      the 50,000 numbers are a SELECTION / interest list, not confirmed
      infections (only 37 forensically-examined devices showed infection
      or attempted infection); (2) NSO disputes the "targets"
      characterisation; and (3) the assignment of individual numbers to
      the UAE/Dubai client rests on the consortium's corpus methodology
      plus strong contextual inference (Emirati princesses), which the
      Amnesty press release states only as selection by "clients of NSO
      Group." attributing_org_confidence kept high (the consortium is
      confident in its customer-state finding).
