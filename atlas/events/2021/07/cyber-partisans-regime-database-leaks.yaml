  notes: |
    PHANTOM RE-SOURCE (badrabbit model). The sole cited source
    (cyber-partisans/2021-07_initial-disclosure, url https://t.me/cpartisans)
    is the group's Telegram CHANNEL HOMEPAGE, not the disclosure post: curl
    returns `<title>Telegram: View @cpartisans</title>` (12,392 B) with no
    article body and none of the event's facts — PHANTOM confirmed, so no
    content_sha256 recorded for it. The underlying incident is REAL and
    well-documented, so I re-sourced rather than retired. Kept the self-claim
    Telegram source (also cited by actor by/cyber-partisans, not orphaned;
    annotated its record) and ADDED three genuine, snapshot-verified sources.
    [a] FACTS — all now source-carried & hedged as self-claim. "On July 26, the
    Cyber Partisans reported the largest cyber attack in the history of Belarus"
    (passport database, "102"/MVD database, MVD video-surveillance system).
    MIT Tech Review (024d68b6…f12f7b, 444,651 B, pub 2021-08-26, Patrick Howell
    O'Neill): the group "began defacing government websites in September 2020"
    and its attacks gave access to "drone footage from protest crackdowns, the
    Ministry of Interior Affairs's mobile-phone surveillance database, and
    databases for passports, motor vehicles, and more." RFE/RL Current Time
    (ac5af432…d7312e, 104,662 B, pub 2021-08-03): independently tested the
    passport-DB self-claim; notes KGB and Todes (builder of the MVD passport
    database) did not respond. CyberScoop (67917684…bf0dbe91, 109,841 B, pub
    2022-08-31): retrospectively corroborates the July-2021 hack of "the
    national passport database" and wiretap exfiltration. Record counts
    (~2M minutes of audio, 11M+ passport personal numbers) rewritten as
    the collective's OWN self-reported figures, not asserted as fact. Added
    the operation codename "Heat"/Zhara/Peklo (multiple sources). Removed no
    fabricated tradecraft (none present).
    [b] ATTRIBUTION — by/cyber-partisans, self-claim, high (published proof:
    Lukashenko/sons passport data). auspex_assessment DOWNGRADED concur ->
    concur-with-caveat to mirror sibling 2024-04 event (self-claim, state
    unconfirmed). Added attribution_level: named-actor (was missing).
    attribution_source_id kept = the self-claim channel (correct for a
    self-attribution).
    [c] DATES — disclosure/start 2021-07-26 CONFIRMED ("On July 26… reported
    the largest cyber attack in the history of Belarus"). Source published_on
    set to each article's true date (2021-08-26 / 2021-08-03 / 2022-08-31),
    distinct from the 2021-07-26 operation/disclosure date. end_date null
    (rolling releases).
    [d] DOCTRINE_LINKS — [] is CORRECT and retained. This is anti-regime
    hacktivism BY a non-state collective AGAINST the Belarusian state; the
    actor's default_doctrine_alignment_ids is [] and its alignment is inverted.
    An attacker-rationale doctrine link would be semantically wrong. (A
    perspective: victim-response link to by/concept-info-security-2019 could be
    argued — matching sibling framing — but is NOT originated in this audit;
    flagged for human review.)
    [e] ATTRIBUTION_LEVEL — set named-actor.
    [f] ACTOR_ID — by/cyber-partisans resolves (atlas/actors/by/cyber-partisans.yaml),
    correctly modeled as an anti-Lukashenko counter-state collective
    (primary_service_id null). Not stale.
