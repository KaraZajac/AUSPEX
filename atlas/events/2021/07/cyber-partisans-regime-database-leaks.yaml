id: 2021-07/cyber-partisans-regime-database-leaks
name: Belarusian Cyber Partisans publish exfiltrated Lukashenko-regime state databases
start_date: 2021-07-26
disclosure_date: 2021-07-26
end_date: null
incident_type:
  - intrusion
  - data-theft
  - hack-and-leak
initial_vector: unknown
outcome_summary: |
  On 26 July 2021 the Belarusian Cyber Partisans collective announced
  what it called the largest cyberattack in Belarusian history —
  code-named "Heat" (Zhara / Пекло / Peklo) — claiming to have breached
  the Ministry of Internal Affairs' (MVD) most sensitive systems. The
  group said it had obtained the national passport / population database
  (self-reported at more than 11 million personal numbers in one sample),
  a "102" / MVD database, the registry of all registered motor vehicles,
  an archive of roughly 2 million minutes of covertly recorded phone-call
  audio, MVD video-surveillance feeds (including Okrestina detention-centre
  isolation cells), police-drone footage from protest crackdowns, lists of
  alleged police informants, and mortality statistics. It published
  passport records of Lukashenko and his sons as proof of access, and over
  the following weeks released and shared selected datasets with Belarusian
  and Western journalists and human-rights researchers. All record counts
  and dataset descriptions are the collective's own self-reported claims;
  the Belarusian state has not confirmed them.
false_flag_risk: none
summary: |
  Inverted-attribution event documented for analytical context.
  Cyber Partisans is an anti-Lukashenko opposition hacktivist
  collective — not a Belarusian state-aligned actor. Included in the
  Belarusian dossier as the principal counterweight to KGB/MVD-aligned
  operations; doctrine alignment is intentionally empty because the
  operation runs AGAINST the regime doctrines this dossier tags. The
  cited primary is the group's OWN disclosure (self-claim), so the
  breach facts are treated as self-attributed and hedged accordingly;
  they are corroborated in substance (Interior-Ministry/passport-database
  exfiltration, wiretap/surveillance archives, self-published Lukashenko
  passport data) by tier-1 journalism (MIT Technology Review, RFE/RL
  Current Time, CyberScoop). Operationally significant for the scale of
  self-claimed exfiltrated PII and for the collective's decision to make
  selected datasets available to journalists and human-rights researchers.
