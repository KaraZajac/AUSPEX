id: 2021-07/cyber-partisans-regime-database-leaks
name: Belarusian Cyber Partisans publish exfiltrated Lukashenko-regime state databases
start_date: 2021-07-26
disclosure_date: 2021-07-26
end_date: null
incident_type:
  - data-theft
  - influence-operation
initial_vector: unknown
outcome_summary: |
  The Belarusian Cyber Partisans collective began publishing
  tranches of data exfiltrated from Belarusian state systems —
  most prominently population-registry records, Ministry of
  Internal Affairs personnel files including riot-police
  identities, and vehicle-registry data. The releases were
  presented as a counter-state intelligence operation against
  the Lukashenko regime in the wake of the August 2020 election
  protests and the subsequent crackdown. The collective made
  the disclosure via its public Telegram channel and a series
  of follow-on briefings to Belarusian and Western press.
false_flag_risk: none
summary: |
  Inverted-attribution event documented for analytical context.
  Cyber Partisans is an anti-Lukashenko opposition collective —
  not a Belarusian state-aligned actor. Included in the
  Belarusian dossier as the principal counterweight to KGB-aligned
  operations; doctrine alignment is intentionally empty because
  the operation runs against the doctrines this dossier tags.
  Operationally significant for the scale of exfiltrated PII
  (Cyber Partisans has stated millions of records) and for the
  collective's subsequent decision to make selected datasets
  available to journalists and human-rights researchers.
