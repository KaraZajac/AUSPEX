id: 2021-04/svr-cloud-identity-campaign
name: SVR (APT29) post-SolarWinds tradecraft shift — Sliver + public-facing CVE exploitation (NCSC/CISA "Further TTPs")
start_date: 2021-03-02
disclosure_date: 2021-05-07
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: n-day
outcome_summary: |
  After UK/US governments attributed the SolarWinds compromise and
  COVID-19 vaccine-developer targeting to the SVR (Apr 2021), the joint
  NCSC/CISA/NSA/FBI advisory "Further TTPs associated with SVR cyber
  actors" (7 May 2021) documented the group's post-exposure tradecraft
  shift: deployment of the open-source Sliver C2 framework to retain
  access to existing WellMess/WellMail victims, continued exploitation
  of public-facing CVEs, and stolen-credential mailbox persistence for
  strategic foreign-intelligence collection.
false_flag_risk: none
campaign_id: solarwinds-chain
summary: |
  Joint NCSC/CISA/NSA/FBI advisory (7 May 2021, v1.0) detailing SVR
  (APT29 / Cozy Bear / the Dukes) tradecraft after the group reacted to
  the 2020 WellMess/WellMail vaccine-targeting exposure and the April
  2021 UK/US SolarWinds attribution. Documented tradecraft: deployment
  of the open-source Red-Team command-and-control framework Sliver (with
  separate C2 infrastructure per victim) to maintain access to existing
  WellMess/WellMail victims; rapid exploitation of publicly-available
  exploits — CVE-2018-13379 (Fortinet), CVE-2019-1653 (Cisco),
  CVE-2019-2725 (Oracle WebLogic), CVE-2019-9670 (Zimbra),
  CVE-2019-11510 (Pulse Secure), CVE-2019-19781 (Citrix), CVE-2019-7609
  (Kibana), CVE-2020-4006 (VMware), CVE-2020-5902 (F5 BIG-IP),
  CVE-2020-14882 (Oracle WebLogic), CVE-2021-21972 (VMware vSphere), and
  the March 2021 Microsoft Exchange ProxyLogon chain
  (CVE-2021-26855/26857/26858/27065); and persistence via stolen
  credentials and harvested mailbox passwords/PKI keys (ATT&CK T1552)
  rather than malware on high-value targets. The advisory names the SVR
  as Russia's civilian foreign-intelligence service, targeting overseas
  government, diplomatic, think-tank, healthcare and energy organisations
  globally "for intelligence gain."
