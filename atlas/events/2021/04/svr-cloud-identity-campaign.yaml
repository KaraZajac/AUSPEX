id: 2021-04/svr-cloud-identity-campaign
name: Continuous SVR cloud-identity campaign (post-SolarWinds)
start_date: 2021-04-01
disclosure_date: 2021-05-07
end_date: 2021-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Continuous SVR (Midnight Blizzard / Nobelium) operations against
  US/EU government agencies, NGOs, and IT service providers in
  the wake of SolarWinds: Mimecast, Microsoft customer support
  tooling, additional cloud-tenant collection. Tradecraft pivoted
  to password spray, OAuth abuse, MFA-fatigue, and golden SAML.
false_flag_risk: none
campaign_id: solarwinds-chain
summary: |
  Microsoft MSTIC and CISA reporting documents the operational
  pivot from supply-chain compromise (SolarWinds) to identity-
  provider attacks. SVR / APT29 / Midnight Blizzard tradecraft
  in this window: password spray and credential stuffing against
  Azure AD / Entra tenants, OAuth application-consent phishing,
  abuse of dormant or service-account valid credentials, MFA-
  fatigue push bombing, and golden-SAML / token-signing-key
  abuse to forge persistent access into Microsoft 365 estates.
  Post-access tooling includes the GoldMax / SUNSHUTTLE backdoor,
  the GoldFinder / Sibot loader, the FOGGYWEB ADFS implant for
  on-prem federation persistence, MagicWeb (later named) for
  authentication-bypass at ADFS, and the EnvyScout HTML smuggler
  for follow-on phishing campaigns. Pattern continues through
  the 2023–24 Microsoft corporate breach.
attributions:
  - actor_id: ru/svr/apt29
    attributing_org: Microsoft MSTIC / US CISA
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2021-05-07
    attribution_source_id: ncsc-uk/2021-05_further-ttps-svr
doctrine_links:
  - doctrine_id: ru/fpc-2023
    pillar_id: ru/fpc-2023/anti-anglo-saxon
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Continuous SVR strategic collection against the Western
      foreign-policy ecosystem. The doctrine post-dates the
      campaign start but represents the codified frame for SVR
      tasking.
    attesting_source_id: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/mimecast
    role: primary
  - target_id: orgs/microsoft
    role: primary
sources:
