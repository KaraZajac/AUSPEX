qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Phantom/over-scope remediation (RE-SOURCE + re-scope). Cited source
    ncsc-uk/2021-05_further-ttps-svr had url:null (NCSC tombstoned the HTML
    article; prior audit 2026-06-25 found it unfetchable). RECOVERED the
    live NCSC PDF at
    https://www.ncsc.gov.uk/files/Advisory%20Further%20TTPs%20associated%20with%20SVR%20cyber%20actors.pdf
    → snapshot atlas/sources/raw/ncsc-uk__2021-05_further-ttps-svr.pdf,
    content_sha256 ddb749eb…f9b68f03 (355,021 bytes, 14pp). Confirmed via
    pdftotext: "Advisory. Further TTPs associated with SVR cyber actors
    Version 1.0 / 7 May 2021".

    [a] FACTS — the event as written was a FABRICATED mega-campaign: the
    single cited May-2021 advisory carries NONE of its headline claims.
    Struck as unsupported by this (or any) cited source: "Midnight Blizzard /
    Nobelium" cloud-identity campaign framing; Mimecast; "Microsoft customer
    support tooling"; password-spray/credential-stuffing against Azure AD/
    Entra; OAuth application-consent phishing; MFA-fatigue push-bombing;
    golden-SAML / token-signing-key abuse; GoldMax/SUNSHUTTLE, GoldFinder/
    Sibot, FOGGYWEB, MagicWeb, EnvyScout; and "pattern continues through the
    2023–24 Microsoft corporate breach." pdftotext of the RAW source shows
    none of these strings appear. Rewrote summary to exactly what the advisory
    documents: reaction to the 2020 WellMess/WellMail vaccine-targeting
    exposure + Apr-2021 SolarWinds attribution; deployment of the open-source
    Sliver C2 (per-victim infrastructure) to keep access to existing WellMess/
    WellMail victims; exploitation of a specific public-facing CVE list
    (CVE-2018-13379, -2019-1653, -2019-2725, -2019-9670, -2019-11510,
    -2019-19781, -2019-7609, -2020-4006, -2020-5902, -2020-14882,
    -2021-21972, and the ProxyLogon chain CVE-2021-26855/26857/26858/27065 —
    all verbatim from the source); stolen-credential + mailbox
    passwords/PKI-key persistence (T1552). All CVE strings verified verbatim
    from the raw PDF.

    [b] ATTRIBUTION — corrected attributing_org "Microsoft MSTIC / US CISA"
    (WRONG; Microsoft is not an author of this advisory) → "NCSC-UK / CISA /
    NSA / FBI" (the advisory's actual authoring agencies). Confidence high,
    concur retained. Source verbatim: SVR "known and tracked in open source as
    APT29, Cozy Bear, and the Dukes"; "The SVR is Russia's civilian foreign
    intelligence service." actor_id ru/svr/apt29 resolves ✓.

    [c] DATES — source published_on 2021-05-07 confirmed (title page "7 May
    2021"). Fixed conflation: event was dated as an April campaign yet its
    summary described 2023–24 activity. Set start_date 2021-03-02 (the
    concrete dated operational activity in the source — SVR exploiting Exchange
    "shortly after … publicly disclosed on March 2, 2021"), disclosure_date
    2021-05-07, end_date null (removed fabricated 2021-12-31 bound). Note: the
    id path month (2021-04) is immutable; the underlying tradecraft shift began
    in 2020 post-exposure.

    [d] DOCTRINE — replaced the anachronistic ru/fpc-2023 link (a 2023
    document mapped onto a 2021 op) with ru/info-security-2016/
    information-sphere-as-domain (predates the op), strongly_inferred, mirroring
    the sibling SVR events (2023-11 midnight-blizzard, 2024-02 aa24-057a). NOT
    attested: the source states the collection purpose ("for intelligence gain")
    but not the doctrine's goal at slug level. attesting_source_id set to the
    (now-recovered) NCSC source as supporting; added inference_basis
    signals+ruled_out.

    [e] ATTRIBUTION_LEVEL — set named-unit (govts name the SVR, a specific
    state service, directly; was missing).

    [f] ACTOR — ru/svr/apt29 resolves to atlas/actors/ru/apt29.yaml
    (canonical "APT29 / Cozy Bear / Midnight Blizzard"). No actor problem.

    TARGETS — replaced orgs/mimecast + orgs/microsoft (neither is a victim
    named in this advisory; both fabricated) with the sectors the source
    actually names: government, government/foreign-ministry, civil-society/
    think-tank, healthcare, energy.

    incident_type intrusion+espionage (was intrusion+data-theft; espionage is
    the source's frame). initial_vector n-day (was valid-creds; the advisory's
    INITIAL access is public-facing exploit use — stolen creds are for
    persistence). campaign_id solarwinds-chain retained (accurate).
