id: 2021-04/parkmobile-shinyhunters
name: ParkMobile 21M user-record leak
start_date: 2021-03-01
disclosure_date: 2021-04-06
end_date: 2021-04-30
incident_type:
  - data-theft
initial_vector: n-day  # Apache Struts third-party dependency per ParkMobile attribution
outcome_summary: |
  Krebs on Security reported on April 6 2021 that approximately
  21 million ParkMobile user records had been posted for sale
  on a Russian-language cybercrime forum (Exploit). Exposed
  fields included email addresses, mobile phone numbers,
  license plate numbers, vehicle data, and bcrypt-hashed
  passwords. ParkMobile attributed the intrusion to a
  vulnerability in third-party software (later reported as an
  Apache Struts framework component). The forum posting and
  re-postings were attributed to the ShinyHunters cluster
  during the 2020-2021 RaidForums-era data-broker activity.
quantified_impact:
  individuals_affected: 21000000
false_flag_risk: suspected
summary: |
  Continuation event for the 2020-2021 ShinyHunters data-broker
  pattern documented in the 2024 Raoult sentencing. Notable
  for the license-plate + mobile-number combination, which is
  high-utility for downstream physical-surveillance-correlation
  use cases. Cluster boundary remains fuzzy: the initial leak
  appeared on a Russian-language forum rather than RaidForums,
  and the ShinyHunters attribution rests on cluster-identification
  via subsequent re-postings.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: Krebs on Security + journalism consensus
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-04-06
    attribution_source_id: krebs/2021-04-06_parkmobile-21m-users
doctrine_links: []
targets:
  - target_id: orgs/parkmobile
    role: primary
sources:
