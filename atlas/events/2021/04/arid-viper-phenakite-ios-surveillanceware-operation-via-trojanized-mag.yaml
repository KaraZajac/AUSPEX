summary: |
  In April 2021 Meta (Facebook) disrupted an Arid Viper espionage operation that deployed a custom iOS surveillanceware named Phenakite, trojanized inside a functional chat application built on the open-source RealtimeChat code and distributed through third-party app sites. Phenakite required victims to install a mobile configuration profile, then used the publicly available Osiris jailbreak with the Sock Port exploit to escalate privileges and exfiltrate sensitive data, and could redirect users to phishing pages harvesting Facebook and iCloud credentials. The operation relied on social engineering, fake personas, and over 100 websites hosting malware, phishing, and command-and-control infrastructure. Targets included government officials, Fatah party members, student groups, and security forces in the Palestinian territories. Meta attributed the activity to Arid Viper and disrupted it through developer-certificate revocation with industry partners.
