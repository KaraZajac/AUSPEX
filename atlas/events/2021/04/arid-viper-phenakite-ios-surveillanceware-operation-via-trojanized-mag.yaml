id: 2021-04/arid-viper-phenakite-ios-surveillanceware-operation-via-trojanized-mag
name: "Arid Viper 'Phenakite' iOS surveillanceware via the trojanized 'MagicSmile' chat app"
start_date: 2021-04-01
incident_type:
  - surveillance
  - espionage
initial_vector: phishing
false_flag_risk: none
summary: |
  On 21 April 2021 Meta (Facebook) disclosed and disrupted an Arid Viper espionage operation that deployed a custom iOS surveillanceware Meta named "Phenakite," trojanized inside a fully functional chat application — branded "MagicSmile" (per Meta's technical paper) and built on the open-source RealtimeChat code. Installation required tricking victims into installing a mobile configuration profile (which allowed a device-specific signed build to be installed without a pre-jailbroken device); post-installation, the malware used the publicly available Osiris jailbreak with the Sock Port exploit — both bundled in the malicious IPAs — to elevate privileges and retrieve sensitive data, and could redirect victims to phishing pages harvesting Facebook and iCloud credentials. The operation relied on social engineering, fake personas, and "over a hundred websites" that hosted iOS/Android malware, attempted credential phishing, or acted as command-and-control servers. Per Meta, this Arid Viper activity "originated in Palestine and targeted individuals in the same region, including government officials, members of the Fatah political party, student groups and security forces." Meta linked the campaign to Arid Viper ("a known advanced persistent threat actor") and disrupted distribution by sharing findings with industry partners, leading to revocation of multiple developer certificates. (Note: Meta's post documents a SECOND, "unconnected" cluster linked to the Palestinian Authority's Preventive Security Service (PSS) that targeted journalists, Fatah opponents, human-rights activists, and Syrian/Iraqi military targets — that PSS cluster is a DIFFERENT actor and is not this event.)
