qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-23
  level: full
  notes: "Audited vs the cited Meta/Facebook post (raw snapshot captured + sha256). FACTS verified verbatim: Phenakite naming, RealtimeChat-based trojanized chat app, mobile config-profile install, Osiris jailbreak + Sock Port post-install privilege escalation, Facebook/iCloud phishing, 'over a hundred websites', targets (government officials / Fatah members / student groups / security forces), developer-certificate revocation. KEY CORRECTIONS: (1) event name/summary previously asserted the chat app was 'MagicSmile' — that name appears NOWHERE in the cited Meta source (it comes from secondary reporting, e.g. SecureMac/the FB technical PDF); renamed to the source-supported 'RealtimeChat-based chat app' and dropped the unsourced product name. (2) Added attribution_level: named-actor (Meta names 'Arid Viper'); confidence stays high. (3) Clarified the summary distinguishes this Arid Viper cluster from the SEPARATE, 'unconnected' PSS-linked cluster Meta documents in the same post (avoids conflating the two). (4) Demoted target sectors/civil-society/dissident -> sectors/civil-society (Meta names students/Fatah members, not 'dissidents'). No doctrine_links (none asserted; ps has no doctrines). Actor de-provisionalized in atlas/actors/ps/arid-viper.yaml; kept ps/unscoped (Hamas nexus suspected, not established). UPDATE (2026-06-23, claude-opus-4.8/max): 'MagicSmile' RESTORED to name/summary — verified it IS in the Meta TECHNICAL PDF (p.13-15: 'the trojanized Magic Smile chat application'; install-profile PayloadDisplayName 'MagicSmile'; 74-device provisioning profile), now added as a 2nd source. The earlier removal was correct for the blog post alone but the technical primary names it."
