qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    PHANTOM/WRONG-SOURCE remediation, path = RE-SOURCE (badrabbit model).
    Audited against Mandiant/FireEye "Ghostwriter Update: Cyber Espionage Group
    UNC1151 Likely Conducts Ghostwriter Influence Activity" (April 28, 2021),
    official PDF snapshot mandiant__2021-04-28_ghostwriter-update.pdf
    (sha256 9301446d…4d6c42c4, 4,619,327 bytes).

    DEFECT FOUND: the event was cited ONLY to mandiant/2021-04-28_ghostwriter-unc1151,
    whose id/date say 2021-04-28 but whose url/title/snapshot are Mandiant's
    NOVEMBER 16, 2021 Belarus-attribution report (snapshot datePublished
    2021-11-16). The event had imported that later report's claims wholesale:
    old name/outcome/summary said Mandiant "attributes Ghostwriter to the
    Belarusian government" with "high confidence" on 2021-04-28 and cited the EU
    Sept-2021 statement — NONE of which the April source carries. RE-SOURCED to a
    new record mandiant/2021-04-28_ghostwriter-update (the genuine April report),
    and re-pointed sources[] + attribution_source_id to it. FLAGged the
    mis-dated sibling record for orchestrator re-slug/merge (it is still cited by
    2 other events + the actor, which I did not touch).

    [a] FACTS ✓ (all now source-carried, verbatim): "Recently obtained technical
    evidence now allows us to assess with high confidence that UNC1151, a
    suspected state-sponsored cyber espionage actor that engages in credential
    harvesting and malware campaigns, conducts at least some components of
    Ghostwriter influence activity; current intelligence gaps … do not allow us
    to conclusively attribute all aspects of the Ghostwriter campaign to UNC1151
    at this time." Campaign nature: "a cyber-enabled influence campaign which
    primarily targets audiences in Lithuania, Latvia and Poland and promotes
    narratives critical of the North Atlantic Treaty Organization's (NATO)
    presence in Eastern Europe"; TTPs "such as website compromises, spoofed
    emails or posts from inauthentic personas." Expanded targeting: "Since the
    start of 2021, UNC1151 has expanded its credential theft activity to target
    German politicians" (German Tagesschau); "compromised social media accounts
    of Polish officials." Appendix 2 case study: fabricated Polish military
    prostitution scandal alleging U.S. Military involvement + Polish/Lithuanian
    officials. "UNC1151 intrusion activity has been active since at least 2017"
    → supports start_date 2017-01-01. STRIPPED fabricated/imported claims: the
    Belarusian-government attribution, the "high confidence links to Belarus"
    title, and the EU September-2021 statement (all belong to Nov-2021+ events,
    not this April source).

    [b] ATTRIBUTION: source names the named cluster UNC1151 at HIGH confidence
    for conducting "at least some components" of Ghostwriter (concur-with-caveat
    — not conclusive on all aspects), and NO nation ("a suspected state-sponsored
    actor"). Set attributing_org=Mandiant (FireEye), attributing_org_confidence
    =high, attribution_level=named-actor. actor_id kept by/unscoped/ghostwriter
    (canonical, resolves) with a note that its Belarus nation rests on LATER
    reporting, not this source.

    [c] DATES: disclosure_date 2021-04-28 = actual publication of THIS report
    (verified against the sibling record's true Nov date, corrected). start_date
    2017-01-01 = UNC1151 activity "active since at least 2017" per the report.
    end_date null (ongoing campaign).

    [d] DOCTRINE: downgraded by/concept-info-security-2019/information-sphere-
    defense from strongly_inferred → plausible and set contested=true. THIS
    source states no strategic purpose, does not attribute to Belarus, and
    frames the narratives as "aligned with Russian security interests"; the two
    government attributions on the actor record name Russia/GRU. So a competing
    (Russian) strategic reading survives → plausible with alternatives[] + a
    counter_explanation. No attesting_source_id (not attested). Kept the
    Belarusian doctrine per AUSPEX's canonical actor homing, honestly flagged.

    [e] ATTRIBUTION_LEVEL: set named-actor (was missing).

    [f] ACTOR_ID: by/unscoped/ghostwriter resolves (atlas/actors/by/ghostwriter.yaml).
    No actor edit made. NB the actor record itself already flags the
    Belarus-vs-Russia nation contest and the unscoped-service frontier.

    TARGETS: old targets cited two DANGLING orgs (orgs/lithuanian-government,
    orgs/german-bundestag-members — neither exists in the registry). Replaced
    with orgs/polish-government (pl, resolves) + sectors/government for de
    (German politicians, credential theft) and lt (Lithuanian officials /
    Lithuanian-CERT-reported ops). Latvia is an influence audience only (no
    org/sector victim) — omitted.

    RESIDUAL: (1) sibling source mandiant/2021-04-28_ghostwriter-unc1151 is
    mis-dated/mis-URL'd and needs orchestrator re-slug or merge into
    mandiant/2021-11-16_unc1151-belarus-link. (2) The Belarus-vs-Russia
    attribution contest for Ghostwriter is a standing actor-level question,
    flagged not resolved.
