id: 2021-04/ghostwriter-unc1151-disclosure
name: Mandiant attributes Ghostwriter to Belarusian government via UNC1151 disclosure
start_date: 2017-01-01
disclosure_date: 2021-04-28
end_date: null
incident_type:
  - influence-operation
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Mandiant published "UNC1151 Assessed with High Confidence to
  Have Links to Belarus," attributing the long-running Ghostwriter
  campaign to the Belarusian government. The campaign — combined
  credential theft and narrative-seeding influence operations —
  targeted Polish, Lithuanian, German, and Ukrainian governments
  and media through 2017–2021. The Mandiant attribution was the
  technical underpinning for the EU's September 2021 collective
  statement on Belarusian responsibility.
false_flag_risk: none
summary: |
  Foundational public attribution of a Belarusian state-aligned
  cyber-and-influence campaign. Ghostwriter / UNC1151 had
  previously been treated by some vendors as Russian-aligned;
  Mandiant's April 2021 disclosure established the Belarusian
  attribution that EU member states subsequently endorsed.
attributions:
  - actor_id: by/kgb/ghostwriter
    attributing_org: Mandiant (Gabby Roncone, Sam Riddell, Ryan Serabian)
    attributing_org_confidence: high
    auspex_assessment: concur
