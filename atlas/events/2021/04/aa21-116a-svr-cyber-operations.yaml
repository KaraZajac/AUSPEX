initial_vector: n-day
outcome_summary: |
  Detailed network-defender guidance issued as part of the US
  government's April-2021 response to the SolarWinds compromise. On
  15 April 2021 the White House formally named Russia's Foreign
  Intelligence Service (SVR / APT29) as the perpetrator of the
  "broad-scope cyber espionage" SolarWinds campaign, Treasury/OFAC
  sanctioned six Russian technology companies under E.O. 14024 and
  the US expelled ten Russian diplomatic personnel, alongside the
  same-day NSA/CISA/FBI advisory "Russian SVR Targets U.S. and Allied
  Networks." Eleven days later (26 April 2021) the FBI, DHS and CISA
  published AA21-116A, which documents SVR / APT29 (the Dukes /
  CozyBear / Yttrium) tradecraft: "low and slow" password spraying of
  a 2018 network, exploitation of CVE-2019-19781 (Citrix, "a zero-day
  exploit at the time") against a VPN appliance, the Go-language
  WELLMESS backdoor used in the 2020 COVID-19 vaccine-research
  targeting, and the SolarWinds-enabled pivot to Microsoft 365 / cloud
  resources. The single same-day companion advisory enumerated the
  SVR's public-facing edge-device exploitation — CVE-2018-13379
  (Fortinet), CVE-2019-9670 (Zimbra), CVE-2019-11510 (Pulse Secure),
  CVE-2019-19781 (Citrix) and CVE-2020-4006 (VMware).
false_flag_risk: none
summary: |
  AA21-116A — "Russian Foreign Intelligence Service (SVR) Cyber
  Operations: Trends and Best Practices for Network Defenders" — is
  the detailed defender-guidance node of the April-2021 US response
  to SolarWinds. It was published 26 April 2021 by the FBI, DHS and
  CISA (NOT, contrary to an earlier draft, co-signed by NSA or
  NCSC-UK) and explicitly references the 15 April 2021 White House
  attribution of SolarWinds to the SVR.

  The advisory's own technical content is narrow: SVR password
  spraying (a 2018 case), a single named CVE used as a zero-day
  (CVE-2019-19781, Citrix), the WELLMESS backdoor from the 2020
  vaccine-targeting campaign, and SolarWinds-enabled M365/cloud
  tradecraft. The broader edge-device CVE list (Fortinet, Zimbra,
  Pulse Secure, Citrix, VMware) belongs to the same-day companion
  advisory "Russian SVR Targets U.S. and Allied Networks"
  (NSA/CISA/FBI), which AA21-116A cross-references for the
  vulnerability detail.

  The underlying SolarWinds campaign is recorded at
  2019-09/solarwinds-sunburst. The UK's own contribution to this
  attribution wave — the FCDO statement (15 April) and the joint
  NCSC/CISA/NSA/FBI advisory "Further TTPs associated with SVR cyber
  actors" (7 May 2021) — is recorded at
  2021-04/svr-cloud-identity-campaign.
