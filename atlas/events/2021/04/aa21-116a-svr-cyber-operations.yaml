  notes: |
    Full 6-point audit vs RAW (claude-opus-4.8/max). This event
    conflated THREE distinct advisories in the April–May 2021 SVR
    cluster: (1) the 15 Apr 2021 NSA/CISA/FBI "Russian SVR Targets
    U.S. and Allied Networks" (5-CVE edge-device advisory, same day as
    the White House attribution + OFAC sanctions); (2) AA21-116A, the
    26 Apr 2021 FBI/DHS/CISA "Trends and Best Practices for Network
    Defenders" advisory — THIS event's cited primary; and (3) the
    7 May 2021 NCSC/CISA/NSA/FBI "Further TTPs" advisory (12-CVE +
    Sliver, recorded separately at 2021-04/svr-cloud-identity-campaign).
    Corrected the event to what AA21-116A actually says, with the
    others as sourced context.

    [a] FACTS — RAW = atlas/sources/raw/cisa__2021-04-15_aa21-116a-svr-cyber-operations.html
    (sha256 fbfd3acac6708b3c08576a04ad4a8a08672251f15391be8a73a307cc49e793fa,
    67,579 bytes, HTTP 200, topic-verified). AA21-116A body carries
    only ONE CVE (verbatim: "SVR actors used CVE-2019-19781, a zero-day
    exploit at the time, against a virtual private network (VPN)
    appliance") and only ONE malware family (WELLMESS, 4 hits; verbatim:
    "malware known as WELLMESS … written in the Go programming language …
    targeting COVID-19 vaccine development"). STRUCK as not carried by
    AA21-116A: the "SoreFang" and "WellMail" backdoors (0 hits each);
    "brute force" (0 hits — the advisory describes password SPRAYING
    only, verbatim "used password spraying to identify a weak password
    associated with an administrative account"); and the fabricated
    CVE-2020-0688 (Microsoft Exchange) — NOT present in AA21-116A or the
    companion or the 7 May advisory (a phantom CVE). The event's 4-CVE
    list was wrong twice over: it belonged to the COMPANION advisory
    (not AA21-116A), it omitted Zimbra CVE-2019-9670 and VMware
    CVE-2020-4006, and it invented Exchange CVE-2020-0688.
    The correct 5-CVE list was recovered verbatim from the companion
    advisory RAW (atlas/sources/raw/nsa__2021-04-15_russian-svr-targets-us-allied-networks.pdf,
    sha256 d4b45d1885d49ff8e0b1368747339d473406ca895254cd137d0dcd1ac15ad9aa,
    Wayback id_ capture of the NSA PDF U/OO/132340-21; table verbatim:
    "CVE-2018-13379 Fortinet / CVE-2019-9670 Zimbra / CVE-2019-11510
    Pulse Secure / CVE-2019-19781 Citrix / CVE-2020-4006 VMware").
    Retained & sourced: SolarWinds M365/cloud pivot (AA21-116A verbatim
    "Beginning in 2018, the FBI observed the SVR shift from using malware
    on victim networks to targeting cloud resources"; "exploitation of
    Microsoft Office 365 environments following network access gained
    through use of modified SolarWinds software"). The 15-Apr action set
    (six sanctioned tech companies, ten expelled diplomats, E.O. 14024)
    is now carried by the White House + Treasury sources (verbatim WH:
    "Treasury designated six Russian technology companies"; "expelling
    ten personnel from the Russian diplomatic mission").

    [b] ATTRIBUTION — attributing_org "CISA + FBI + NSA + NCSC-UK"
    was WRONG. AA21-116A's opening sentence names its authors: "The
    Federal Bureau of Investigation (FBI), Department of Homeland
    Security (DHS), and Cybersecurity and Infrastructure Security Agency
    (CISA) assess Russian Foreign Intelligence Service (SVR) cyber
    actors…". Corrected to "FBI + DHS + CISA". NSA appears only as an
    author of the CROSS-REFERENCED companion advisory; NCSC's only
    mention in AA21-116A is a Resources link to the July-2020 WellMess
    advisory — NCSC did NOT co-sign AA21-116A. Confidence high / concur
    retained (US IC "high confidence"). actor_id ru/svr/apt29 resolves ✓.

    [c] DATES — disclosure_date 2021-04-15 → 2021-04-26 (AA21-116A "Last
    Revised"/"April 26, 2021: Initial Version"; day 116 of 2021 = 26 Apr).
    The 15 Apr date belongs to the White House/OFAC stack + companion
    advisory, now framed as the coordinated response AA21-116A followed.
    start_date 2018-01-01 retained (advisory: "Beginning in 2018…").
    attribution_date set to 2021-04-26. Also corrected the cited CISA
    source record's published_on 2021-04-15 → 2021-04-26 (real byline
    defect). NB for orchestrator: the CISA source id slug still embeds
    "2021-04-15" — an id rename to …2021-04-26… is a FK-propagation job;
    flagged, not renamed here (id path is otherwise immutable).

    [d] DOCTRINE — uk/ncs-2016/deter downgraded attested → strongly_inferred:
    the old link's basis ("NCSC + Five Eyes joint … attribution event")
    is false for AA21-116A (a US-only product) and neither cited advisory
    states the UK deter goal at slug level. Kept perspective
    defender-response; re-anchored attesting_source_id to the actual UK
    document (ncsc-uk/2021-05_further-ttps-svr); added inference_basis
    {signals, ruled_out}. ADDED the per-event attacker doctrine
    ru/info-security-2016/information-sphere-as-domain (strongly_inferred),
    mirroring the sibling SVR events (2019-09 solarwinds-sunburst,
    2021-04 svr-cloud-identity-campaign); the White House "broad-scope
    cyber espionage" is cited as a strategic-purpose signal, not a
    slug-level attestation, so NOT attested.

    [e] ATTRIBUTION_LEVEL — added named-unit (was missing): AA21-116A,
    the same-day White House statement and OFAC action all name the SVR,
    a specific state intelligence service.

    [f] ACTOR — ru/svr/apt29 resolves to atlas/actors/ru/apt29.yaml
    (id: ru/svr/apt29). No actor problem.

    TARGETS — added sectors/civil-society/think-tank (AA21-116A verbatim
    "primarily targets government networks, think tank and policy
    analysis organizations, and information technology companies");
    kept government + ict. incident_type documentary + attribution-publication
    (was attribution-publication only) — AA21-116A is a documentary
    advisory. initial_vector n-day retained (the advisory's described
    initial access is public-facing/unpatched-vuln exploitation +
    password spraying; matches sibling convention).

    SOURCES — added nsa/2021-04-15_russian-svr-targets-us-allied-networks
    (NEW record; carries the 5 CVEs), whitehouse/2021-04-15_svr-solarwinds-attribution
    and treasury/2021-04-15_eo-14024-svr-sanctions (both pre-existing,
    already-snapshotted; carry the 15-Apr attribution + sanctions +
    expulsions). Kept the CISA AA21-116A primary and ncsc-uk further-TTPs.
