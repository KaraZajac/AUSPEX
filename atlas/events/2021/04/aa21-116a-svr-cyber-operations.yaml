outcome_summary: |
  Companion advisory to the same-day White House attribution of
  the SolarWinds compromise to Russia's Foreign Intelligence
  Service (SVR). The joint CISA / FBI / NSA / NCSC-UK technical
  document AA21-116A details SVR / APT29 / Cozy Bear tradecraft
  post-SolarWinds: WellMess, SoreFang, and WellMail backdoors;
  password spray and brute force; exploitation of Fortinet
  CVE-2018-13379, Pulse Secure CVE-2019-11510, Citrix CVE-2019-
  19781, and Microsoft Exchange CVE-2020-0688. Doctrinally
  significant as the first multi-agency, multi-government
  attribution to SVR by codename rather than to "Russia" in the
  abstract.
false_flag_risk: none
summary: |
  Same-day stack of events on 15 April 2021: White House
  attribution statement, US Treasury OFAC sanctions on six
  Russian companies, expulsion of ten Russian diplomats, and
  the joint CISA / FBI / NSA / NCSC-UK technical advisory.
  AUSPEX records the technical advisory as a UK-anchored event
  here; the underlying SolarWinds campaign is recorded at
  2019-09/solarwinds-sunburst, and the broader 2021 cloud-
  identity SVR pivot at 2021-04/svr-cloud-identity-campaign.

  The NCSC's co-signing voice on AA21-116A is doctrinally
  load-bearing: it is the first time NCSC technically attributed
  SVR by name (Cozy Bear) in a co-published advisory, rather
  than via the diplomatic-statement modality used in October
  2018 for GRU. The pattern — NCSC technical attribution to a
  named Russian intelligence service alongside US partners —
  becomes the modal NCSC modality through 2022-2026 (Cyclops
  Blink Feb 2022, Star Blizzard Dec 2023, AA25-141A May 2025).
