id: 2021-02/anssi-sandworm-centreon-attribution
name: ANSSI / CERT-FR attributes 2017-2020 Centreon supply-chain campaign to Sandworm
start_date: 2017-01-01  # ANSSI documents intrusion-set activity beginning 2017
disclosure_date: 2021-02-15
end_date: 2021-02-15
incident_type:
  - documentary
  - espionage
initial_vector: supply-chain
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2021-CTI-005 (15 February
  2021, English-language) attributing a multi-year intrusion
  campaign (2017-2020) exploiting Centreon IT-monitoring software
  to the Sandworm intrusion set (Russian GRU Unit 74455). Affected
  French entities included IT-services providers and web-hosting
  operators; post-exploitation tooling included the P.A.S.
  webshell and the Exaramel Linux backdoor.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  First French national-CERT public attribution naming Sandworm.
  Editorially significant for two reasons: (1) Centreon is a
  French software product, and ANSSI's willingness to publicly
  attribute a supply-chain compromise touching a French vendor
  established the pattern of CERT-FR threat-intelligence
  publication continued through the 2023 APT28 and 2024
  Nobelium reports; (2) the report predates the 2022 Russian
  invasion of Ukraine by a year, demonstrating ANSSI's
  defensive-attribution practice was not solely a wartime
  posture but an ongoing LID instrument.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: ANSSI / CERT-FR
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2021-02-15
