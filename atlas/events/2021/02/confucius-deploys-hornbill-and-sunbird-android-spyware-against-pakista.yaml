    notes: "Lookout names the tooling as Confucius's 'with high confidence' but the nation only as 'pro-India' (a hedge); it places the developers in India (Chandigarh) and notes one developer's unverified DRDO LinkedIn claim, while framing the roots as evolved commercial stalkerware possibly sold to an actor. India = nation-level locus, no named Indian service — hence attribution_level nation and actor in/unscoped, not named-unit."
