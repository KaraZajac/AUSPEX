id: 2021-02/confucius-deploys-hornbill-and-sunbird-android-spyware-against-pakista
name: "Confucius deploys Hornbill and SunBird Android spyware against Pakistani military and nuclear targets"
start_date: 2021-02-10
incident_type:
  - surveillance
  - espionage
  - data-theft
initial_vector: unknown
false_flag_risk: none
summary: |
  Lookout's Threat Intelligence team disclosed two custom Android surveillanceware families, Hornbill and SunBird, used by the Confucius APT. Hornbill is a passive reconnaissance tool while SunBird has full remote-access-trojan capability; both exfiltrate SMS, encrypted-messaging content, call logs, contacts, geolocation, and files, with SunBird also pulling WhatsApp/IMO/BBM data and browser history. Lookout disguised samples as apps such as a fictional 'Google Security Framework', 'Kashmir News', and 'Quran Majeed'. Victims included an applicant to the Pakistan Atomic Energy Commission, individuals with Pakistan Air Force contacts, and Kashmir-region election officials, linking the operation to the India-Pakistan conflict. Hornbill remained active as of December 2020.
