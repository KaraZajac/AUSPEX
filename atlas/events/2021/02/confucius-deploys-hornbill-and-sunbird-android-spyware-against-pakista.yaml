  notes: |
    Audited vs the Lookout report (raw captured live: curl+WebFetch both hit CloudFront 403, a
    full-browser-header curl succeeded HTTP 200; sha256 in the source record). All facts ✓:
    Hornbill (passive recon) + SunBird (RAT), the exfil sets incl. WhatsApp/IMO/BBM + browser
    history, the decoys (Google Security Framework / Kashmir News / Quran Majeed), and the named
    victims verbatim — a Pakistan Atomic Energy Commission applicant, individuals with Pakistan
    Air Force contacts, and Pulwama-Kashmir Booth Level (election) Officers; Hornbill still active
    as of Dec 2020. ATTRIBUTION: Lookout attributes the tooling to Confucius "with high confidence"
    but names the nation only as "pro-India" (a hedge) and places the *developers* in India
    (Chandigarh; one unverified DRDO LinkedIn claim) — it does NOT name an Indian service as
    operator and frames the roots as commercial stalkerware possibly sold to an actor. SET
    attribution_level: nation (was unset); kept attributing_org_confidence: high; removed a stale
    inline '# ICD link-confidence: attested' comment that contradicted the strongly_inferred
    doctrine link. Doctrine link left strongly_inferred (honest: target mix triangulates to India
    regional collection, but no source states a strategic purpose, and the commercial-origin angle
    is about tooling provenance not an alternative sponsor) — matches the doctrine's own
    cyber_relevance note. ACTOR in/unscoped/confucius is consistent: the cited source supports a
    nation-level (India) but not service-level placement, exactly as the actor record states.
    CAVEAT logged not changed: Lookout flags one Chinese-default C2 server (23.82.19[.]250) as a
    possible false flag without retracting the Confucius attribution, so false_flag_risk: none for
    the operation overall stands.
