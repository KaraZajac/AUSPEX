    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      DOJ frames the entire conspiracy — Sony aside — as
      revenue-generation for the DPRK: SWIFT bank heists, FASTCash
      ATM cash-outs, WannaCry extortion, AppleJeus crypto theft and
      the Marine Chain ICO, all to "further the strategic and
      financial interests of the DPRK government." That is exactly
      the behaviour the Byungjin sanctions-evasion-revenue pillar
      encodes. Not `attested`, however: the pillar's terminal
      strategic purpose is hard-currency generation IN SERVICE OF
      the weapons program, and the DOJ sources name only the
      proximate goals — "evade United States sanctions" and revenue
      to "prop up its regime" — never the WMD/ballistic-missile
      funding end. Per the AUSPEX over-attestation calibration, a
      source naming "circumvent sanctions" / "generate revenue for
      the regime" (and not the weapons-funding goal) supports
      strongly_inferred, not attested.
    attesting_source_id: doj/2021-02-17_lazarus-three-officers-indictment
    inference_basis:
      signals:
        - "DOJ: the Marine Chain Token was developed 'to evade United States sanctions on North [Korea]' and to secretly obtain funds for the DPRK (indictment) — sanctions-evasion revenue motive stated on the record."
        - "DOJ: the conspiracy acted to 'further the strategic and financial interests of the DPRK government and its leader, Kim Jong Un'; Acting U.S. Attorney: the regime 'stopped at nothing to … obtain money to prop up its regime.'"
        - "Every non-Sony scheme charged (SWIFT heists, FASTCash, WannaCry extortion, AppleJeus, Marine Chain) is a financial/revenue operation attributed to RGB units whose mission is financially motivated."
      ruled_out: "kp/byungjin/nuclear-modernization (the collection-oriented, defense-contractor pillar) — this activity is theft-for-revenue, not intelligence collection; the competing reading is resolved by the DOJ's own revenue/sanctions-evasion framing."
