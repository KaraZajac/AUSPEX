id: 2021-02/three-hacker-indictment
name: Three-Hacker DOJ indictment unsealed (Jon Chang Hyok, Kim Il, Park Jin Hyok)
start_date: 2021-02-17
disclosure_date: 2021-02-17
end_date: 2021-02-17
incident_type:
  - documentary
initial_vector: unknown  # documentary event
outcome_summary: |
  DOJ unsealing of the superseding indictment (filed Dec. 8 2020)
  of three DPRK military hackers (Jon Chang Hyok, Kim Il, Park Jin
  Hyok) for a wide-ranging conspiracy covering Sony Pictures
  (2014), SWIFT-network bank heists in Vietnam / Bangladesh /
  Taiwan / Mexico / Malta / Africa (2015-2019), WannaCry 2.0
  (2017), FASTCash ATM cash-outs, AppleJeus crypto malware, and
  the Marine Chain ICO fraud — "more than $1.3 billion" in money
  and cryptocurrency stolen/extorted or attempted. Names the
  "Reconnaissance General Bureau (RGB)," a DPRK military-
  intelligence agency, as the parent organization, and equates its
  units with the "Lazarus Group" and "Advanced Persistent Threat
  38 (APT38)."
quantified_impact:
  usd_attempted_total: 1300000000
false_flag_risk: none
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
  - jon-chang-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
  - kim-il  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
summary: |
  Not a discrete cyber attack but a primary-source consolidation
  document for DPRK cyber attribution. AUSPEX uses this as the
  canonical authority for the RGB organizational placement of the
  Lazarus Group / APT38 clusters and for the Sony / Bangladesh /
  WannaCry attribution chain. Modeled as a `documentary`
  event-type to capture its analytic weight despite no on-the-wire
  incident. NB: neither the press release nor the charging
  document names "Lab 110" — that unit designation derives from
  the separate 2018 Park Jin Hyok complaint, not this source.
