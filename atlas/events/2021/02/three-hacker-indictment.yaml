  notes: |
    Audited against BOTH DOJ primaries: the 2021-02-17 press
    release (raw snapshot = globalsecurity.org mirror
    sec-210217-doj02.htm, sha256 4e3209c4…f98b8f21, 33,126 bytes,
    re-hashed matching on 2026-07-01) and the actual charging
    document, newly fetched direct from justice.gov
    (/opa/press-release/file/1367701/download, HTTP 200 — the file
    endpoint is not Akamai-walled — 334,671 bytes, sha256
    87b280f1…b79b83e5b2, source record created + added to sources[]).
    [a] FACTS — CORRECTED. Press release carries: "steal and extort
    more than $1.3 billion" (usd_attempted_total 1300000000 = exact,
    NOT inflated); Sony Pictures Nov 2014; SWIFT heists 2015-2019
    (Vietnam/Bangladesh/Taiwan/Mexico/Malta/Africa, "more than $1.2
    billion" attempted); FASTCash ATM cash-outs; WannaCry 2.0 May
    2017; AppleJeus; Marine Chain ICO. Indictment independently
    carries Sony(=5)/Bangladesh(=5)/Marine Chain(=9)/WannaCry/SWIFT/
    ATM. REMOVED the unsupported "Lab 110" claim from outcome_summary
    and summary: "Lab 110" appears in NEITHER the press release
    (term-count 0) NOR the 33-pp indictment (term-count 0). The prior
    source-record audit note asserting "Lab 110 lives in the charging
    document" is factually wrong — verified against the full
    indictment text. Also softened "Bangladesh Bank (2016)" to the
    banks/years the source actually states (2015-2019 across six
    regions). AppleJeus retained — it is in the press release +
    joint CISA/Treasury advisory, not the indictment.
    [b] ATTRIBUTION — both DOJ attributions verified high: "were
    members of units of the Reconnaissance General Bureau (RGB), a
    military intelligence agency of the DPRK … known by multiple
    names … including Lazarus Group and Advanced Persistent Threat 38
    (APT38)." concur, high — correct.
    [c] DATES — press release + indictment both dated 2021-02-17
    (unsealing); charging document filed 2020-12-08 (added to prose).
    start/disclosure/end 2021-02-17 correct for a documentary
    (unsealing) event.
    [d]+[e] ATTRIBUTION_LEVEL — set named-unit on both attributions
    (was missing): DOJ reaches the actual state organ (RGB units +
    three named officers), above named-actor. DOCTRINE — DOWNGRADED
    kp/byungjin/sanctions-evasion-revenue from attested →
    strongly_inferred. The DOJ sources name only the proximate goal
    ("evade United States sanctions", "prop up its regime", "further
    the strategic and financial interests of the DPRK government") —
    never the pillar's terminal weapons-program-funding purpose. Per
    SCHEMA's explicit boundary, "circumvent sanctions"/"generate
    revenue for the regime" earns strongly_inferred, not attested.
    Added inference_basis{signals[], ruled_out}; attesting_source_id
    retained as primary supporting source (permitted on
    strongly_inferred).
    [f] ACTOR_ID — kp/rgb/lazarus and kp/rgb/apt38 both resolve
    (files at atlas/actors/kp/lazarus.yaml, kp/apt38.yaml). See FLAGS.
    FLAGS for orchestrator:
    (1) actor kp/rgb/apt38 has primary_service_id: kp/rgb/lab-110,
        but "Lab 110" is NOT carried by either DOJ 2021 source
        (verified 0 hits in both). If Lab 110 placement is intended
        to rest on this indictment it is unsupported; the real
        Lab 110 source is the 2018 Park Jin Hyok complaint. Recommend
        confirming the service record's sourcing.
    (2) source doj/2021-02-17_lazarus-three-officers-indictment
        carries an earlier AUDIT note claiming '"Lab 110" lives in
        the charging document' — this is FALSE (indictment term-count
        0); the note should be corrected.
    (3) sibling events bangladesh-bank-swift and global-swift-campaign
        stamp this SAME DOJ source as `attested` for the identical
