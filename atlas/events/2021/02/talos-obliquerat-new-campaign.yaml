id: 2021-02/talos-obliquerat-new-campaign
name: Cisco Talos ties ObliqueRAT to Transparent Tribe in follow-on hijacked-websites campaign
start_date: 2020-04-01  # earliest new version "6.1, developed April 2020" (onset of the disclosed post-v5.2 campaign); was 2020-09-01 (only the mid-stream 6.3.2 version)
disclosure_date: 2021-03-02  # corrected from 2021-02-09 (JSON-LD datePublished 2021-03-02T13:04Z + byline "Tuesday, March 2, 2021")
end_date: 2021-03-02  # disclosure-type event; = publication date
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cisco Talos published a follow-on analysis (2 March 2021) of
  ObliqueRAT operations across 2020, documenting four new implant
  versions (6.1–6.3.5, developed April–November 2020) and an
  evolved delivery chain: malicious Office documents now reference
  ObliqueRAT payloads hidden inside benign BMP image files hosted
  on compromised ("hijacked") websites — an added detection- and
  takedown-evasion step. Talos stated ObliqueRAT "has been linked
  to the Transparent Tribe APT group in the past," a by-reference
  linkage resting on maldoc/macro delivery mechanisms "identical to
  the CrimsonRAT delivery maldocs" (Talos previously connected
  ObliqueRAT to a December 2019 CrimsonRAT campaign). The only newly
  reported C2-infrastructure overlap was with a RevengeRAT campaign,
  assessed "with low confidence." The post says the campaign "targets
  organizations in South Asia" and names no country and no victim
  sector.
false_flag_risk: none
summary: |
  Documents the evolved ObliqueRAT delivery chain — payloads hidden
  in benign BMP image files on compromised websites, referenced by
  Office maldocs — and reiterates, by reference to Talos's earlier
  post, the ObliqueRAT–Transparent Tribe linkage (maldoc/macro
  overlap with CrimsonRAT). The post itself adds only a low-confidence
  C2 overlap with a RevengeRAT campaign. The compromised-website
  staging is operationally meaningful: hosting benign-looking payloads
  on hijacked legitimate sites complicates defender takedown and
  detection. NB (audit 2026-07-10): the cited source names no country
  and no sector beyond "organizations in South Asia"; prior framing
  asserting Indian websites, Indian lure themes, and Indian
  government/defense victims was carried by neither cited Talos post
  and has been removed.
