id: 2021-02/talos-obliquerat-new-campaign
name: Cisco Talos ties ObliqueRAT operations to Transparent Tribe via hijacked websites
start_date: 2020-09-01
disclosure_date: 2021-02-09
end_date: 2021-02-09
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cisco Talos published a follow-on analysis of ObliqueRAT
  operations through late 2020 and early 2021, documenting the
  operator set's use of compromised legitimate Indian and South
  Asian websites as staging infrastructure to host implant
  payloads referenced by Office-document lures. Talos linked
  the ObliqueRAT operator cluster to Transparent Tribe / APT36
  via shared infrastructure, overlap in lure-document themes
  (Indian government, defense, diplomatic), and reuse of Crimson
  RAT delivery infrastructure. Targets remained Indian and South
  Asian government and defense entities.
false_flag_risk: none
summary: |
  Establishes the documented tradecraft linkage between ObliqueRAT
  and Transparent Tribe. The compromised-Indian-websites staging
  pattern is meaningful both operationally (it complicates
  defender takedown) and doctrinally (it leverages Indian-owned
  legitimate infrastructure against Indian targets).
