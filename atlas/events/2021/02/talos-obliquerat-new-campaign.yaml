      developed October 2020 6.3.5 developed November 2020" — onset of
      the disclosed new campaign is April 2020 (6.1); the old
      2020-09-01 matched only the mid-stream 6.3.2.

    [d] DOCTRINE: not attested (no source states a Pakistani anti-India
      goal). Downgraded strongly_inferred -> plausible; removed the
      fabricated "Indian government and defense victimology" reasoning.
      Link rests solely on actor identity (TT = Pakistan-aligned
      anti-India per actor record) while the event's own primary source
      says only "organizations in South Asia" with no India and no
      military/defense sector. Added perspective: attacker-rationale
      (attacker's own doctrine on an attack) + inference_basis
      {signals, alternatives}. colon-space list items single-quoted.

    [e] ATTRIBUTION_LEVEL: added named-actor (2021 names "the
      Transparent Tribe APT group"; no Pakistani unit named — matches
