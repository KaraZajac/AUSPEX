    - cisco-talos__2020-02_obliquerat-maldocs.html
      sha256 d88840c194448755…b0d8111fca8eba7, 110754 bytes.
    This event is the March-2021 follow-on flagged by the sibling
    2020-02/talos-obliquerat-maldocs audit; that flag is confirmed.

    [a] FACTS — corrections against the raw:
    • STRIPPED all "Indian" framing as FABRICATED. Grep of the 2021
      primary raw: India / Indian / Pakistan = 0 hits each; Southeast
      Asia = 0; South Asia = 5. The article says verbatim "This
      campaign targets organizations in South Asia" and names NO
      country and NO victim sector ("government"/"defence" tokens in
      the file are site-nav / related-article sidebar text — e.g. an
      APT41-Taiwan headline — not the ObliqueRAT body). Removed
      "compromised legitimate Indian and South Asian websites,"
      "overlap in lure-document themes (Indian government, defense,
      diplomatic)," "Targets remained Indian and South Asian government
      and defense entities," and the summary's "leverages Indian-owned
      legitimate infrastructure against Indian targets."
    • Delivery VERIFIED and rewritten to raw: "This campaign hides the
      ObliqueRAT payload in seemingly benign image files hosted on
      compromised websites"; "The image files used are BMP files hosted
      on adversary-controlled websites"; "The usage of compromised
      websites is another attempt at detection evasion." Title of the
      post: "ObliqueRAT returns with new campaign using hijacked
      websites."
    • Transparent Tribe link CORRECTED from "via shared infrastructure"
      to by-reference: raw = "ObliqueRAT has been linked to the
      Transparent Tribe APT group in the past" and "Our previous post
      on ObliqueRAT detailed its connections to CrimsonRAT and,
      subsequently, the links to the Transparent Tribe APT group." The
      CrimsonRAT tie rests on maldoc/macro mechanisms "identical to the
      CrimsonRAT delivery maldocs," NOT "reuse of Crimson RAT delivery
      infrastructure." The ONLY new infra overlap is RevengeRAT: "We
      have also observed overlaps in the C2 infrastructure used between
      ObliqueRAT and a RevengeRAT campaign," which "Talos assesses with
      low confidence." APT36 does not appear in the raw (0 hits) — kept
      the "/ APT36" alias only in doctrine reasoning as the actor's
      documented alias, not as a source assertion.
    • incident_type [intrusion, data-theft] retained — data-theft
      VERIFIED: "for the implant to later exfiltrate" + "Additional
      file enumeration and stealing capabilities."

    [b] ATTRIBUTION: downgraded attributing_org_confidence high ->
      moderate and auspex_assessment concur -> concur-with-caveat. The
      TT tag is passive/by-reference ("has been linked ... in the
      past"), carried from Talos's prior post, not freshly established
      here; the post's only NEW linkage (RevengeRAT C2 overlap) is
      explicitly low-confidence. Now consistent with the sibling
      2020-02 event (which the orchestrator will reconcile).

    [c] DATES: disclosure/end CORRECTED 2021-02-09 -> 2021-03-02
      (JSON-LD datePublished 2021-03-02T13:04:00Z + byline "Tuesday,
      March 2, 2021"); same fix applied to attribution_date and to the
