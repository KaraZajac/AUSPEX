    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: plausible
    perspective: attacker-rationale
    reasoning: |
      Neither cited Talos post states a Pakistani anti-India tasking
      or goal, names India or Pakistan, or identifies a military/
      defense victim. The March 2021 primary source says only that the
      campaign "targets organizations in South Asia" and carries the
      Transparent Tribe attribution by reference ("ObliqueRAT has been
      linked to the Transparent Tribe APT group in the past"). The
      doctrine link therefore rests solely on actor identity — Talos's
      attribution of ObliqueRAT to Transparent Tribe / APT36, whose
      documented mission (per the actor record) is Pakistan-aligned
      collection against South Asian / Indian government, defense and
      diplomatic targets. Held at plausible (not strongly_inferred)
      because the event's own sources give only a generic
      "organizations in South Asia" victimology with no India and no
      military/defense sector.
    inference_basis:
      signals:
        - 'March 2021 Talos post: "ObliqueRAT has been linked to the Transparent Tribe APT group in the past" and "This campaign targets organizations in South Asia."'
        - 'Delivery maldocs use mechanisms "identical to the CrimsonRAT delivery maldocs"; Talos previously connected ObliqueRAT to a December 2019 CrimsonRAT campaign — CrimsonRAT is Transparent Tribe''s long-running Windows implant.'
        - 'Transparent Tribe / APT36 is a documented Pakistan-aligned collector against Indian government, defense and diplomatic targets (actor record).'
      alternatives:
        - 'The cited source''s victimology is a generic "organizations in South Asia" — a region broader than India — with no country and no victim sector named in the article body.'
        - 'The only newly reported infrastructure overlap is with a RevengeRAT campaign, assessed by Talos "with low confidence"; the Transparent Tribe linkage is by-reference to the prior post, not newly established here.'
    contested: false
    analyst: claude
