id: 2021-02/amnesty-click-and-bait-diaspora
name: Amnesty International "Click and Bait" — APT32 spyware against Vietnamese human-rights defenders
start_date: 2018-02-01
disclosure_date: 2021-02-24
end_date: 2020-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Amnesty International's Security Lab documented APT32 / OceanLotus
  targeting of Vietnamese human-rights defenders and bloggers in
  Vietnam, the Philippines, and Germany between February 2018 and
  November 2020. Two confirmed victims (Bui Thanh Hieu, a Berlin-
  based blogger, and an unnamed Vietnamese NGO) were targeted with
  spear-phishing emails delivering custom macOS and Windows
  implants. Amnesty named the operation "Click and Bait" and
  publicly assessed Vietnamese government direction.
false_flag_risk: none
summary: |
  Canonical evidence for the diaspora-and-dissident surveillance
  strand of the Vietnamese cyber program. Amnesty's Security Lab
  is a high-trust civil-society source whose attribution methodology
  (sample analysis, infrastructure overlap with prior APT32
  reporting) supports a `concur` AUSPEX assessment. The targets are
  individuals — civil-society victims rather than corporate or
  governmental — which fits the MPS A05 lane more comfortably than
  TC2 military intelligence.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: Amnesty International Security Lab
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2021-02-24
    attribution_source_id: amnesty/2021-02-24_click-and-bait-apt32-diaspora
    notes: |
      Amnesty assesses APT32 as state-aligned without specifying
      TC2 vs MPS. The diaspora-civil-society victim profile
      tilts the operational placement toward MPS A05.
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targets fit the "hostile forces" / overseas dissident
      profile the resolution authorizes monitoring of. Amnesty
      did not cite the resolution by name, but the operational
      pattern is what the resolution licenses.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/vietnamese-dissident-network
    role: primary
  - target_id: persons/bui-thanh-hieu
    role: primary
sources:
