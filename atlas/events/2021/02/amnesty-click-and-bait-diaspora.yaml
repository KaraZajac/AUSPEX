  notes: |
    Audited vs Amnesty International Security Lab "Click and Bait: Vietnamese Human Rights
    Defenders Targeted with Spyware Attacks" (2021-02-24). Raw snapshot re-verified:
    amnesty__2021-02-24_click-and-bait-apt32-diaspora.html, sha256 65045c1a…df20015
    (153011 bytes; full article body present, live URL). Single source; Amnesty's own
    forensic lab = primary-tier NGO forensics (tier kept primary).
    [a] FACTS — all verbatim-supported: "campaign of spyware attacks targeting Vietnamese
    human rights defenders (HRDs) from February 2018 to November 2020" (= start_date
    2018-02-01, end_date 2020-11-30); "two HRDs and a non-profit human rights organization
    from Viet Nam have been targeted by a coordinated spyware campaign"; Bui Thanh Hieu
    ("Nguoi Buon Gio"), "lived in exile in Germany since 2013"; VOICE "established … in the
    Filipino capital of Manila … continues to operate out of Manila" (supports the
    Philippines geography); phishing — "These emails pretended to share an important
    document"; malware — "The Windows spyware was a variant of a malware family called
    Kerrdown … used exclusively by the Ocean Lotus group … it downloaded Cobalt Strike";
    "The Mac OS Spyware was a variant of a malware family for Mac OS developed and used
    exclusively by Ocean Lotus, analysed by Trend Micro." CORRECTIONS: (1) outcome_summary
    said the NGO was "unnamed" — it IS named (VOICE) — and said "two confirmed victims" when
    the source names two bloggers PLUS the NGO; rewritten. (2) DELETED the false claim that
    Amnesty "publicly assessed Vietnamese government direction" — the report says the exact
    opposite: "Our investigation was not able to attribute Ocean Lotus' activities to any
    company or government entity" and "This raises questions about whether Ocean Lotus is
    linked to Vietnamese state actors" (left open). (3) incident_type: added surveillance +
    espionage (core: spyware "allows to fully monitor a compromised system"); kept
    intrusion + data-theft.
    [b] ATTRIBUTION — Amnesty attributes to the named group Ocean Lotus / APT32 (exclusive
    malware families) = named-actor, high confidence; but does NOT reach service/government
    level (quotes only FireEye's nation-level "aligned with Vietnamese state interests").
    Added attribution_level: named-actor. Rewrote the stale attribution note that claimed
    "Amnesty assesses APT32 as state-aligned … tilts toward MPS A05" — unsupported; the
    actor is correctly vn/unscoped and Amnesty names no service. auspex_assessment concur
    (of the named-actor attribution) retained.
    [c] DATES — source published_on 2021-02-24 = report date ✓; disclosure_date 2021-02-24
    ✓; start/end 2018-02 / 2020-11 = the campaign window the source gives ✓.
    [d] DOCTRINE — vn/resolution-29-nqtw / regime-stability-surveillance, strongly_inferred
    (honest: no source states the goal, but the civil-society/dissident victim set makes
    regime-stability surveillance the single dominant reading). Added inference_basis
    (signals + ruled_out); attesting_source_id null (correctly NOT attested). Perspective
    attacker-rationale (Vietnam's doctrine on its own op; no cross-state mismatch).
    [e] ATTRIBUTION_LEVEL — set named-actor (was missing).
    [f] ACTOR_ID — vn/unscoped/apt32 resolves (file atlas/actors/vn/apt32.yaml, id
    vn/unscoped/apt32). Consistent with the actor record's 2026-06-24 demotion.
    RESIDUAL/FLAGS: (1) target persons/bui-thanh-hieu has no registry file — persons/ is an
    established unregistered-target convention used by 8 events (no atlas/targets/persons
    dir); not fixed here. (2) The named NGO VOICE (Manila) is only captured via the generic
    orgs/vietnamese-dissident-network proxy — a dedicated VOICE org target could be added by
    the orchestrator. (3) The user's NB mentioned a "Vietnamese Committee on Human Rights
    (in France)" — that entity/geography does NOT appear in this report; the report's victims
    are VOICE (Manila) + two bloggers (one, Bui Thanh Hieu, in Germany).
