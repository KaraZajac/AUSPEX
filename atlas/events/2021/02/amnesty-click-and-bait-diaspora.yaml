id: 2021-02/amnesty-click-and-bait-diaspora
name: Amnesty International "Click and Bait" — APT32 spyware against Vietnamese human-rights defenders
start_date: 2018-02-01
disclosure_date: 2021-02-24
end_date: 2020-11-30
incident_type:
  - intrusion
  - surveillance
  - espionage
  - data-theft
initial_vector: phishing
outcome_summary: |
  Amnesty International's Security Lab documented a coordinated
  Ocean Lotus / APT32 spyware campaign against two Vietnamese
  human-rights bloggers and one non-profit between February 2018
  and November 2020. The named victims are blogger Bui Thanh Hieu
  ("Nguoi Buon Gio"), in exile in Germany since 2013, a second
  Vietnamese blogger, and the NGO VOICE (Vietnamese Overseas
  Initiative for Conscience Empowerment), which operates out of
  Manila in the Philippines. Victims received phishing emails
  pretending to share a document that delivered Ocean Lotus's
  exclusive Windows spyware (a Kerrdown-family downloader that
  fetched Cobalt Strike) and Mac OS spyware. Amnesty titled the
  report "Click and Bait." Crucially, Amnesty stated it "was not
  able to attribute Ocean Lotus' activities to any company or
  government entity" and left the link to "Vietnamese state actors"
  as an open question — it quoted only FireEye's nation-level
  "aligned with Vietnamese state interests" characterisation.
false_flag_risk: none
summary: |
  Canonical evidence for the diaspora-and-dissident surveillance
  strand of the Vietnamese cyber program. Amnesty's Security Lab is
  a high-trust civil-society source; it attributes the campaign to
  Ocean Lotus / APT32 on the basis of malware families used
  exclusively by the group (the Kerrdown Windows downloader and an
  Ocean Lotus Mac OS implant analysed by Trend Micro), which
  supports a `concur` AUSPEX assessment of the named-actor
  attribution. Amnesty itself did NOT reach a service- or
  government-level attribution — it expressly could not attribute
  the activity to any company or government entity and left the
  state link open — so the actor is placed at `vn/unscoped` and no
  specific Vietnamese service (TC2 vs. MPS/A05) is asserted here.
  The victims are civil-society individuals and an NGO rather than
  corporate or governmental targets.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: Amnesty International Security Lab
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2021-02-24
    attribution_source_id: amnesty/2021-02-24_click-and-bait-apt32-diaspora
    notes: |
      Amnesty attributes the campaign to the named group Ocean Lotus
      / APT32 (via malware families used exclusively by the group)
      but explicitly stated it "was not able to attribute Ocean
      Lotus' activities to any company or government entity" and left
      the link to Vietnamese state actors open, quoting only
      FireEye's nation-level "aligned with Vietnamese state
      interests." Named-actor level; NO Vietnamese service (TC2 or
      MPS/A05) is named — hence actor vn/unscoped, not vn/tc2 or
      vn/mps.
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targets fit the "hostile forces" / overseas dissident
      profile the resolution authorizes monitoring of. Amnesty
      did not cite the resolution by name, but the operational
      pattern — sustained spyware surveillance of Vietnamese
      pro-democracy bloggers and a diaspora human-rights NGO — is
      exactly what the regime-stability-surveillance pillar
      licenses. No source states the strategic goal, so this stays
      strongly_inferred (not attested); but the civil-society /
      dissident victim set leaves regime-stability surveillance as
      the single dominant reading.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "All identified victims are Vietnamese human-rights defenders / pro-democracy bloggers (Bui Thanh Hieu) and a diaspora rights NGO (VOICE), not commercial or governmental targets."
        - "Amnesty frames the campaign against the backdrop of a domestic crackdown on online dissent, matching the resolution's overseas/hostile-forces monitoring remit."
        - "Persistent multi-year (2018-2020) targeting of the same dissident cohort indicates surveillance-for-control, not opportunistic collection."
      ruled_out: "vn/industrial-upgrading-cyber-collection (APT32's economic-espionage strand): the victims here carry no industrial or IP value, so the automotive/industrial-collection reading does not survive."
targets:
  - target_id: orgs/vietnamese-dissident-network
    role: primary
  - target_id: persons/bui-thanh-hieu
    role: primary
sources:
  - amnesty/2021-02-24_click-and-bait-apt32-diaspora
