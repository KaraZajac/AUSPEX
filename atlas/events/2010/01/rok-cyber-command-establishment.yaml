id: 2010-01/rok-cyber-command-establishment
name: ROK Cyber Command establishment
start_date: 2010-01-11
disclosure_date: 2010-01-11
end_date: 2010-01-11
incident_type:
  - doctrine-publication
initial_vector: unknown
outcome_summary: |
  Formal establishment of Cyber Command (사이버사령부) inside
  the ROK Ministry of National Defense. Anchor date for the
  modern ROK military cyber posture. The command was the
  institutional response to the July 2009 DDoS campaign that
  NIS publicly attributed to DPRK actors.
false_flag_risk: none
summary: |
  AUSPEX models the ROK Cyber Command stand-up as a doctrinal
  event analogous to the UK NCF establishment (November 2020):
  the event itself is a public doctrinal act with no associated
  intrusion, but it anchors all downstream ROK military cyber
  tagging.

  Cyber Command was renamed Cyber Operations Command
  (사이버작전사령부) in January 2019 under the Moon Jae-in
  administration to clarify operational command relationship
  with the Joint Chiefs of Staff (the original 2010 command
  had been embedded politically inside MND and was the subject
  of a 2013-2017 domestic-politics scandal over alleged
  involvement in online political messaging during the 2012
  election campaign).
