id: 2010-01/rok-cyber-command-establishment
name: ROK Cyber Command establishment
start_date: 2010-01-11
disclosure_date: 2010-01-11
end_date: 2010-01-11
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Establishment of the ROK military Cyber Command (사이버사령부)
  under the Ministry of National Defense (initially subordinate to
  the Defense Intelligence Headquarters, placed directly under the
  MND in September 2011). Anchor date for the modern ROK military
  cyber posture. A principal institutional response to the July 2009
  (7·7) DDoS campaign — which the ROK National Intelligence Service
  publicly attributed to North Korea — alongside the "Defense Reform
  2020" modernization plan.
false_flag_risk: none
summary: |
  AUSPEX models the ROK Cyber Command stand-up as a documentary
  capability-establishment event analogous to the UK NCF public
  establishment (November 2020): the event itself is a public
  institutional act with no associated intrusion, but it anchors all
  downstream ROK military cyber tagging.

  The command (국군사이버사령부) was established on 11 January 2010 as
  a unit subordinate to the Defense Intelligence Headquarters,
  prompted by the "Defense Reform 2020" modernization plan and the
  July 2009 (7·7) DDoS campaign; it was transferred to become a
  command directly under the Ministry of National Defense in
  September 2011 (Defense Reform 307 plan).

  It was renamed Cyber Operations Command (사이버작전사령부) in 2019
  — the unit designation changed on 26 February 2019 under the Cyber
  Operations Command Decree, during the Moon Jae-in administration —
  and designated a joint unit under the Chairman of the Joint Chiefs
  of Staff, clarifying the operational command relationship. The
  original command's psychological-warfare unit had earlier been the
  subject of a domestic-politics scandal (surfacing in the October
  2013 National Assembly defense audit) over alleged online
  political-messaging operations during the 2012 presidential-
  election campaign.
