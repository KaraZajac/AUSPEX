  notes: |
    HISTORICAL documentary/institutional meta-event (actor_id null — a
    capability-establishment, no attack). Audited vs 4 raw snapshots.
    Sources (sha256 first8…last8 · bytes): CCDCOE ROK country report
    cd4efbf7…8c6ed620 · 898,603 (re-verified, on disk from 2026-06-30);
    arXiv:1711.04500 1cb4a3a7…6befdc90 · 142,461 (new); Korean Wikipedia
    사이버작전사령부 5f0a7a2e…49419870 · 173,774 (new); Wikipedia "July 2009
    cyberattacks" 0cad69b3…f9b09855 · 182,317 (snapshot added this audit).

    [a] FACTS — all now source-carried. Establishment "in 2010 ... to
    carry out operations in cyberspace" (CCDCOE p.19). EXACT day 11 Jan
    2010 confirmed by Korean Wikipedia infobox "활동 기간 2010년 1월 11일
    ~ 현재" and body "2010년 1월 11일 국방정보본부 예하 사령부로서 창설";
    the event's start/disclosure/end 2010-01-11 stands. Sept-2011 move to
    MND-direct control (Defense Reform 307): Korean Wikipedia + arXiv
    ("In September 2011, the Cyber Command came under the control of the
    Korean Ministry of National Defense"). Initial subordination to the
    Defense Intelligence Headquarters (국방정보본부) added — the earlier
    prose said only "inside MND"; refined (DIH is an MND organ, so not
    wrong, just imprecise). Psychological-warfare unit ("Corps 530",
    arXiv) and the 2012-election messaging scandal (Korean Wikipedia
    "대선 개입 논란" section; raised 14 Oct 2013 NDC audit; web-corroborated
    ~300k comments vs Moon Jae-in) — kept, now sourced and dated to its
    Oct-2013 surfacing rather than an unsourced "2013-2017" span.
    [c] DATES — KEY CORRECTION: prose said the rename to Cyber Operations
    Command was "in January 2019"; it was NOT. CCDCOE footnote 80 dates
    the Cyber Operations Command Decree "Enacted in 26.02.2019" and
    Korean Wikipedia states "2019년 2월 26일, 부대명칭이 ... 변경" — corrected
    to 26 February 2019 (Moon administration retained). CCDCOE gives the
    establishment as year "2010" only; day precision comes from the
    Korean-language references (added as sources).
    [b] ATTRIBUTION — null-actor self-acknowledgement (state establishing
    its own organ); attributing_org = ROK MND, high confidence, concur,
    source CCDCOE. No over-attestation possible (no external actor).
    [e] ATTRIBUTION_LEVEL — left null: the specificity ladder (activity-
    cluster→…→named-unit) does not apply to a self-establishment; matches
    the analogous UK NCF establishment exemplar.
    [d] DOCTRINE_LINKS — link 1 kr/defense-cyber-policy-mnd kept ATTESTED:
    CCDCOE states the command's strategic purpose ("to carry out
    operations in cyberspace"), which is exactly what the MND cyber-policy
    doctrine encodes; added inference_basis.source_quote. Link 2
    kr/nis-counter-dprk kept STRONGLY_INFERRED (never upgraded per project
    rule — evidence would arguably support attested, but the 7.7-DDoS
    trigger co-exists with the "Defense Reform 2020" modernization driver,
    and the counter-DPRK doctrine is NIS's while the command is an MND
    organ, so >1 reading survives). Repointed its attesting_source_id from
    wikipedia/2009-ddos-south-korea (which does NOT mention the command —
    it only carries the NIS→DPRK attribution) to the arXiv case study,
    which explicitly states the command was "created ... in response to
    the 7.7DDOS ... attack allegedly committed by North Korea"; added
    inference_basis.signals + ruled_out. Both KR defensive-doctrine links
    tagged perspective: defender-response (no attacker; keeps this
    null-actor capability-event out of the attacker-rationale training
    set). Note: the strict schema gloss of defender-response is "the
    discloser's doctrine on someone ELSE's operation"; here it is ROK's
    own defensive doctrine on ROK's own establishment — a small
    definitional stretch chosen deliberately over the default
    attacker-rationale, which would be worse for a null-actor documentary.
    [f] ACTOR_ID — null; N/A. FKs resolve: kr/defense-cyber-policy-mnd and
    kr/nis-counter-dprk (file nis-counter-dprk-doctrine.yaml carries
    internal id kr/nis-counter-dprk) both exist.
    incident_type changed doctrine-publication → documentary (an
    institutional stand-up, not the publication of a doctrine text).
    RESIDUAL: arXiv rounds the founding day to "January 1, 2010" while
    the Korean-language refs (adopted) give 11 January 2010; the event
    uses 11 Jan. Korean Wikipedia (tertiary) is the day-precision carrier;
    CCDCOE (secondary) corroborates the year and the purpose.
