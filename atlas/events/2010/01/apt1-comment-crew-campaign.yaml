id: 2010-01/apt1-comment-crew-campaign
name: APT1 / Comment Crew campaign (PLA Unit 61398)
start_date: 2006-01-01
disclosure_date: 2013-02-19  # Mandiant report
end_date: 2013-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  PLA Unit 61398 / APT1 conducted long-running spear-phishing
  intrusions against 141 organizations across 20 industries —
  including Westinghouse (nuclear reactor designs), US Steel,
  Alcoa, SolarWorld, Allegheny Technologies, and the United
  Steelworkers — exfiltrating hundreds of terabytes of IP to
  Shanghai netblocks via HTRAN proxy chains.
false_flag_risk: none
summary: |
  Mandiant's February 2013 APT1 report was the first vendor
  exposure of a named PLA cyber unit with a specific physical
  facility (Pudong, Shanghai). DOJ followed in May 2014 with
  indictments of five PLA officers — the first US criminal
  charges against uniformed foreign military officers for cyber
  espionage.
attributions:
  - actor_id: cn/pla/apt1
    attributing_org: Mandiant
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2013-02-19
