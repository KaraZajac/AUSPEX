      ruled_out: "Made-in-China-2025 — announced 2015, so the 2014 indictment cannot name it (anachronism)"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/mcf
    pillar_id: null
    program_id: null
