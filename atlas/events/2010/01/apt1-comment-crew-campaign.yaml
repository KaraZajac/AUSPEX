doctrine_links:
  - doctrine_id: cn/mic2025
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      DOJ 2014 indictment specifies victims (Westinghouse, US Steel,
      Alcoa, SolarWorld, Allegheny) and commercial advantage to PRC
      SOEs; the victim mix maps to sectors that only became MIC2025
      pillars in 2015 — the indictment pre-dates MIC2025 and cannot
      name it (at the time: 12th Five-Year Plan / Strategic Emerging
      Industries). The MIC2025 linkage is therefore inferred (a
      12th-Five-Year-Plan attested link would be defensible).
    attesting_source_id: doj/2014-05-19_pla-five-officers-indictment
    inference_basis:
      source_id: doj/2014-05-19_pla-five-officers-indictment
      signals:
        - "DOJ 2014 indictment names the victim sectors (nuclear, steel, solar) and commercial advantage to PRC SOEs (sector map)"
      ruled_out: "Made-in-China-2025 — announced 2015, so the 2014 indictment cannot name it (anachronism)"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/mcf
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      PLA Unit 61398 tasking against US dual-use civilian industry
      (aerospace, telecom, nuclear, semiconductors) fits the MCF
      pattern of acquiring foreign technology to advance both
      military and civilian capability; MCF was elevated to national
      strategy 2014–2015 and can be read as codifying what APT1 was
      already doing. Downgraded to plausible (from strongly_inferred,
      2026-07-05 audit) because no cited source states a
      military-civil-fusion purpose — the DOJ indictment frames the
      theft as commercial/economic advantage to Chinese SOEs — and a
      competing, better-sourced strategic reading (industrial
      modernization / MIC2025 family) survives, so more than one
      reading holds.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Military-Civil Fusion: a PLA unit stealing US dual-use industrial IP feeds the civilian-to-military technology-transfer apparatus MCF encodes, but no cited source states a military end-use."
        - "Industrial modernization (MIC2025 / 12th-Five-Year-Plan family): the DOJ indictment names commercial advantage to Chinese SOEs in nuclear/steel/solar — the proximate purpose the industrial-policy doctrine specializes — making it the better-sourced competing reading."
    counter_explanation: null
    contested: false
    analyst: claude
