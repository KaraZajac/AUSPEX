      pillars in 2015 — the indictment pre-dates MIC2025 and cannot
      name it (at the time: 12th Five-Year Plan / Strategic Emerging
      Industries). The MIC2025 linkage is therefore inferred (a
      12th-Five-Year-Plan attested link would be defensible).
    attesting_source_id: doj/2014-05-19_pla-five-officers-indictment
    inference_basis:
