id: 2010-01/apt1-comment-crew-campaign
name: APT1 / Comment Crew campaign (PLA Unit 61398)
start_date: 2006-01-01
disclosure_date: 2013-02-19  # Mandiant report
end_date: 2013-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Mandiant documented APT1 / PLA Unit 61398 systematically
  compromising at least 141 organizations across 20 major
  industries since 2006 via spear-phishing and exfiltrating
  hundreds of terabytes of IP through HTRAN proxy chains to
  Shanghai netblocks (the 141 victims were anonymized in the
  report). The 2014 DOJ indictment separately named six specific
  Unit 61398 victims — Westinghouse (AP1000 nuclear power-plant
  design specs), US Steel, Alcoa, SolarWorld, Allegheny
  Technologies, and the United Steelworkers — charging theft of
  trade secrets and internal communications for the commercial
  advantage of Chinese SOEs.
false_flag_risk: none
summary: |
  Mandiant's February 2013 APT1 report was the first vendor
  exposure of a named PLA cyber unit with a specific physical
  facility (Pudong, Shanghai). DOJ followed in May 2014 with
  indictments of five PLA officers — the first US criminal
  charges against uniformed foreign military officers for cyber
  espionage.
