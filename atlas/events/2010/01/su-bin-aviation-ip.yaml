id: 2010-01/su-bin-aviation-ip
name: Su Bin / C-17, F-22, F-35 aviation IP theft
start_date: 2008-10-01
disclosure_date: 2014-07-11  # original criminal complaint unsealed
end_date: 2014-03-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Su Bin and two unnamed PLA officers conducted a long-running
  spear-phishing campaign against US defense aerospace primes —
  Boeing (C-17 transport) and Lockheed Martin (F-22, F-35
  fighters) — via subcontractor networks. ~630,000 files
  exfiltrated from the Boeing C-17 program alone. DOJ
  characterized the volume of military-aviation technical data
  as equivalent to "5 Libraries of Congress."
false_flag_risk: none
operators_named:
  - su-bin  # DOJ Mar 2016 plea, PLA-tasked aviation IP theft
summary: |
  Su Bin (a Chinese national resident in Canada operating an
  aviation-technology firm) pled guilty in March 2016 and was
  sentenced to 46 months. The case is the cleanest single
  attested correlation between PRC aerospace cyber espionage and
  PRC military aviation development — including documented PLA
  Air Force interest in the J-20 next-generation fighter program
  at Chengdu Aircraft Industry Group.
