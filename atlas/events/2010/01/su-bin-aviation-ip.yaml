id: 2010-01/su-bin-aviation-ip
name: Su Bin / C-17, F-22, F-35 aviation IP theft
start_date: 2008-10-01
disclosure_date: 2014-07-11  # original criminal complaint unsealed
end_date: 2014-03-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Su Bin and two co-conspirators in China (named in the cited DOJ
  plea only as "two other persons in China") conducted a
  long-running spear-phishing campaign against US defense
  aerospace primes — Boeing (C-17 transport) and Lockheed Martin
  (F-22, F-35 fighters) — via subcontractor networks. The
  conspirators claimed to have exfiltrated ~630,000 files (~65 GB)
  on the Boeing C-17 program alone, plus tens of thousands more on
  the F-22 and F-35.
false_flag_risk: none
operators_named:
  - su-bin  # DOJ Mar 2016 plea; aviation IP theft (cited plea names "two other persons in China" as co-conspirators, not the PLA)
summary: |
  Su Bin (a Chinese national resident in Canada operating an
  aviation-technology firm) pled guilty on 23 March 2016 to
  conspiracy to violate the Arms Export Control Act, the Computer
  Fraud and Abuse Act, and ITAR, and was sentenced in July 2016 to
  46 months. Per the cited DOJ plea he conspired with "two other
  persons in China" to steal sensitive US military-aviation
  technical data — including data on the C-17, F-22 and F-35 — for
  the purpose of exporting that information to China. The case is
  a clean attested correlation between PRC aerospace cyber
  espionage and the directed transfer of controlled US military
  aviation technology into China's defense-industrial base.
