id: 2010-05/operation-socialist-belgacom
name: Operation Socialist — GCHQ breach of Belgacom (Five Eyes)
start_date: 2010-05-01  # estimated; documented active period 2010-2013
disclosure_date: 2013-09-20  # Der Spiegel disclosure
end_date: 2013-12-31  # operational disruption following exposure
incident_type:
  - intrusion
initial_vector: phishing  # Quantum Insert fake-LinkedIn against named engineers
outcome_summary: |
  Persistent SIGINT access to EU/African telecom roaming traffic via
  compromise of Belgacom engineers' workstations and lateral movement
  to Belgacom International Carrier Services (BICS) and GRX roaming
  infrastructure. Characterized by Snowden / Der Spiegel as "the
  first documented case of EU-state cyber attack on another EU state."
false_flag_risk: none
summary: |
  GCHQ-led Five Eyes operation that the US (NSA) benefited from
  through SIGINT-sharing arrangements. Initial access via Quantum
  Insert — fake LinkedIn pages serving exploits to specific
  Belgacom engineers — followed by lateral movement to GRX
  roaming-exchange infrastructure. Belgian federal prosecutor
  publicly attributed the operation to GCHQ in February 2018.

  **Editorial note (2026-05 re-attribution)**: this event was
  originally filed in the US dossier with `us/cybercom/cmf-actor`
  as a placeholder because AUSPEX v0 lacked a UK actor subtree.
  With the addition of the UK as the 12th doctrine state, attribution
  is now correctly anchored to `uk/gchq/op-socialist-operators` as
  the primary attribution. The US Five-Eyes co-attribution is
  preserved but downgraded — NSA was a SIGINT-sharing beneficiary,
  not the operator. The event slug `2010-05/operation-socialist-belgacom`
  is preserved per the stable-slug rule.
attributions:
  - actor_id: uk/gchq/op-socialist-operators
    attributing_org: Belgian federal prosecutor (2018) + Snowden documents via Der Spiegel and The Intercept (2013-2014)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2013-09-20
    attribution_source_id: spiegel/2013-09-20_socialist-belgacom
    notes: |
      Primary attribution is to **GCHQ** (UK). Established through
      three converging sources: (1) the September 2013 Der Spiegel
      Snowden disclosure publishing the Op Socialist briefing
      slides; (2) The Intercept's December 2014 full reconstruction
      including the named MyNOC / NAC operational cells and the
      Quantum Insert initial-access tradecraft; (3) the Belgian
      federal prosecutor's February 2018 formal attribution to
      GCHQ. UK government has not formally attested.
  - actor_id: us/nsa/equation-group
    attributing_org: Snowden documents (Regin / WARRIORPRIDE platform overlap)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-12-13
    attribution_source_id: intercept/2014-12-13_operation-socialist
    notes: |
      Co-attribution to NSA reflects the Five-Eyes SIGINT-sharing
      benefit and the use of the joint Regin / WARRIORPRIDE platform
      (WARRIORPRIDE was the NSA codename; DAREDEVIL was GCHQ's).
      AUSPEX assesses NSA as beneficiary and capability co-developer
      rather than operator: the operational cell running the
      Belgacom intrusion was GCHQ's MyNOC / NAC. `concur-with-caveat`
      reflects the partial nature of US attribution.
