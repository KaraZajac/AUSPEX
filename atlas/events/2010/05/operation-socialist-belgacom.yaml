id: 2010-05/operation-socialist-belgacom
name: Operation Socialist — GCHQ breach of Belgacom (Five Eyes)
start_date: 2010-05-01  # May estimated; Der Spiegel: access "possible since 2010"; GCHQ technique dev traces to 2009 (Intercept); active 2010-2013
disclosure_date: 2013-09-20  # Der Spiegel GCHQ/Op-Socialist disclosure (Belgacom hack first reported ~16 Sep 2013)
end_date: 2013-12-31  # estimated; operational disruption / Belgacom clean-up following 2013 exposure
incident_type:
  - intrusion
initial_vector: phishing  # Quantum Insert (man-on-the-side) via a fake-LinkedIn page against targeted Belgacom engineers
outcome_summary: |
  Persistent SIGINT access to Belgacom / BICS international roaming
  traffic via compromise of Belgacom engineers' workstations and lateral
  movement to Belgacom International Carrier Services (BICS) and the
  GRX/GPRS roaming-exchange infrastructure (the BICS hub carried roaming
  for operators across Africa, the Middle East, Europe, Asia and the US).
  Der Spiegel framed the operation as an EU member state (the UK) having
  covertly penetrated the telecom of a fellow EU member — "Belgium's own
  European Union partner Britain" behind "Operation Socialist."
false_flag_risk: none
summary: |
  GCHQ-led Five Eyes operation that the US (NSA) benefited from
  through SIGINT-sharing arrangements. Initial access via Quantum
  Insert — a fake LinkedIn page serving exploits to targeted
  Belgacom engineers — followed by lateral movement toward BICS and
  the GRX/GPRS roaming-exchange infrastructure. Belgium's own federal
  criminal investigation (code-named "Trinity") found forensic evidence
  pointing to the UK; a confidential federal-prosecutor report leaked in
  October 2018 concluded the spyware operators were in Britain (three of
  the malware's command IP addresses were owned by a British company),
  consistent with GCHQ authorship — though no prosecution followed.

  **Editorial note (2026-05 re-attribution)**: this event was
  originally filed in the US dossier with `us/cybercom/cmf-actor`
  as a placeholder because AUSPEX v0 lacked a UK actor subtree.
  With the addition of the UK as the 12th doctrine state, attribution
  is now correctly anchored to `uk/gchq/op-socialist-operators` as
  the primary attribution. The US Five-Eyes co-attribution is
  preserved but downgraded — NSA was a SIGINT-sharing beneficiary,
  not the operator. The event slug `2010-05/operation-socialist-belgacom`
  is preserved per the stable-slug rule.
attributions:
  - actor_id: uk/gchq/op-socialist-operators
    attributing_org: Snowden documents via Der Spiegel and The Intercept (2013-2014) + Belgian federal criminal investigation (2018)
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2013-09-20
    attribution_source_id: spiegel/2013-09-20_socialist-belgacom
    notes: |
      Primary attribution is to **GCHQ** (UK), at named-unit level — the
      operating cell was GCHQ's Network Analysis Centre (NAC). Established
      through converging snapshotted sources: (1) the September 2013 Der
      Spiegel Snowden disclosure publishing the Op Socialist briefing
      slides — "the head of GCHQ's Network Analysis Centre (NAC) described
      Operation Socialist ... as a 'success'"; (2) The Intercept's December
      2014 reconstruction of the NAC operation and the fake-LinkedIn
      Quantum Insert initial-access tradecraft — "documents ... confirmed
      that ... Government Communications Headquarters was behind the
      attack, codenamed Operation Socialist"; (3) Belgium's "Trinity"
      criminal investigation, whose forensic evidence pointed to the UK
      (The Intercept, Feb 2018) and whose confidential federal-prosecutor
      report (leaked Oct 2018) linked the malware's command IPs to a
      British company. No formal UK government attestation; no Belgian
      prosecution followed. (Correction: earlier text dated the Belgian
      finding to "February 2018" — the substantive prosecutorial
      attribution surfaced in October 2018; Feb 2018 was The Intercept's
      retrospective, which noted the Belgian evidence "was not conclusive.")
  - actor_id: us/nsa/equation-group
    attributing_org: Snowden documents (NSA-developed Quantum Insert tech; Regin / WARRIORPRIDE Five-Eyes platform)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-12-28
    attribution_source_id: spiegel/2014-12-28_belgacom-bics-grx
    notes: |
      Co-attribution to the NSA reflects Five-Eyes SIGINT-sharing benefit
      and shared tooling, NOT operational control. Source basis: the NSA
      developed the Quantum Insert technique used against Belgacom (Der
      Spiegel 2013: "'Quantum Insert,' a technology developed by the NSA")
      and Regin was run against Belgacom under WARRIORPRIDE — "a kind of
      universal Esperanto software used by all the Five Eyes partner
      agencies" (Der Spiegel 2014, which also states "Agents also used
      Regin in attacks against ... Belgacom in 2011"). The Intercept
      expressly HEDGES direct NSA involvement: "it is not clear exactly
      which method was used by GCHQ—or whether there was any direct NSA
      assistance." AUSPEX therefore assesses the NSA as beneficiary /
      capability co-developer, not operator; the operating unit was GCHQ's
      Network Analysis Centre (NAC). `moderate` / `concur-with-caveat`
      reflects this hedge.
      NB (actor-mapping, FLAGGED): us/nsa/equation-group is the atlas's
      canonical NSA offensive-cyber node (same mapping used by the sibling
      event 2014-11/regin-warriorpride); the actual Regin/WARRIORPRIDE
      joint cluster is modelled separately as uk/gchq/regin-operators
      (with us/nsa/tao as additional service). "Equation Group" is NOT
      named in any Operation Socialist source (Equation x0 across all
      snapshots) — retained for cross-event consistency, flagged for
      orchestrator review.
