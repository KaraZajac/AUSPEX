    [b] ATTRIBUTION — directionality preserved, over-attestation trimmed:
    • GCHQ (uk/gchq/op-socialist-operators) held at high/concur, promoted
      to attribution_level: named-unit (the operating cell is GCHQ's
      Network Analysis Centre / NAC — spiegel 2013 "the head of GCHQ's
