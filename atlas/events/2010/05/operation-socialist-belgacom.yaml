    [a] FACTS — one fabrication stripped, several tightened:
    • STRIPPED fabricated quote: outcome_summary claimed the op was
      characterized by "Snowden / Der Spiegel" as '"the first documented
      case of EU-state cyber attack on another EU state."' This exact
      phrase is a 0-hit across ALL snapshots ("first documented case" x0,
      "another EU state" x0, "EU-state" x0). Replaced with the source-true
      substance Der Spiegel actually carries: "it was Belgium's own
      European Union partner Britain that is behind 'Operation Socialist'"
      (spiegel 2013, ab446333…) — an EU member covertly hacking a fellow
      EU member. No "first documented case" superlative asserted.
    • BICS/GRX/GPRS roaming — CARRIED: spiegel 2013 "GRX routers make
      roaming between different mobile phone networks possible"; "on the
      verge of accessing the Belgians' central roaming router ... used to
      process international traffic"; "the Belgacom subsidiary Bics, a
      joint venture between Swisscom and South Africa's MTN." intercept
      2014 (a30954bd…): "successfully hacked into data links carrying
      information over a protocol known as GPRS"; roaming hub spans
      "Africa, Asia, Europe, the Middle East, and the United States."
      Narrowed "EU/African roaming" (undersold the global hub) -> the
      documented region list.
    • Regin found+cleaned — CARRIED: intercept 2014 "The Intercept
      confirmed Regin as the malware found on Belgacom's systems during
      the clean-up operation." Added to target outcome.
    • Quantum Insert / fake-LinkedIn — CARRIED (x-checked 3 snapshots):
      intercept 2014 "GCHQ set up a malicious page that looked like
      LinkedIn to trick the Belgacom engineers"; intercept 2018
      (9f42e6b0…) "luring them to a fake version of the LinkedIn website."
      (No "Slashdot": x0 — not asserted. initial_vector note softened
      "named" -> "targeted" engineers; the mechanism is man-on-the-side,
