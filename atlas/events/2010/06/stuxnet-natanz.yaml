id: 2010-06/stuxnet-natanz
name: Stuxnet — destructive cyber-physical attack on Natanz enrichment centrifuges
start_date: 2009-06-01  # earliest known infections; campaign likely earlier
disclosure_date: 2010-06-17  # initial VirusBlokAda / Symantec public detection
end_date: 2010-12-31
incident_type:
  - destructive
  - cyber-physical
initial_vector: supply-chain  # USB / removable-media borne to bridge the Natanz air gap; entry via insider/contractor supply-chain
outcome_summary: |
  Approximately 1,000 IR-1 centrifuges at the Natanz Fuel
  Enrichment Plant (FEP) were decommissioned and replaced in late
  2009 / early 2010 (ISIS/Albright assessment), widely correlated
  with Stuxnet's sabotage of the Siemens S7-315 PLCs that drove the
  centrifuge frequency-converter drives, executed via Step7
  engineering-workstation compromise. A significant setback to
  Iran's uranium-enrichment programme. (ISIS hedges exact
  causation; the centrifuge-breakage count is the source-carried
  figure, not a claimed precise destruction total.)
quantified_impact:
  centrifuges_destroyed: 1000  # ISIS: ~1,000 IR-1 centrifuges decommissioned/replaced late-2009/early-2010, correlated with Stuxnet
false_flag_risk: none
campaign_id: olympic-games
summary: |
  Stuxnet was a destructive cyber-physical sabotage operation that
  covertly manipulated the Siemens S7-315 PLCs and Step7 engineering
  workstations controlling IR-1 centrifuge cascades at Iran's Natanz
  Fuel Enrichment Plant, propagating via removable media to bridge
  the facility's air gap and exploiting four Windows zero-day
  vulnerabilities. It is widely attributed to a joint US-Israeli
  covert program code-named "Olympic Games" — begun under President
  Bush and accelerated under President Obama, the malware "developed
  by the United States and Israel" (journalistically, NSA/TAO with
  Israel's Unit 8200) per NYT / David Sanger reporting — but was
  never officially acknowledged by either government. **Iran (ir) is
  the victim; the United States and Israel are the attackers.**

  In the Iran event log Stuxnet is also the **precipitating context**
  for Tehran's offensive cyber buildup: Khamenei and senior IRGC
  commanders have repeatedly cited it as the case for asymmetric
  cyber investment, and subsequent Iranian doctrines in this atlas
  (Asymmetric Warfare, Cyber-Deniable-Retaliation, Forward Defense)
  are framed as downstream of this event.
attributions:
  - actor_id: us/olympic-games-team  # joint US+Israel; anchored us/ via NSA/TAO, Unit 8200 noted in the actor record
    attributing_org: NYT / David E. Sanger ("Obama Order Sped Up Wave of Cyberattacks Against Iran", 2012)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2012-06-01
    attribution_source_id: nyt/2012-06-01_sanger-olympic-games
    notes: |
      DIRECTIONALITY: attacker = United States + Israel (joint covert
      program "Olympic Games"); VICTIM = Iran (ir). Sanger's NYT
      reporting attributes Stuxnet to a US-Israeli program begun under
      Bush and accelerated under Obama (malware "developed by the
      United States and Israel"); corroborated by Zetter (Countdown to
      Zero Day, 2014) and Snowden-era disclosures. auspex_assessment =
      concur-with-caveat (not concur): the attribution rests on tier-1
      journalism of an operation NEVER officially acknowledged by
      either government — high confidence but journalism-sourced.
      attribution_level = named-actor (the Olympic Games team cluster;
      NSA/TAO + Unit 8200 are journalistically named but the specific
      units are officially unconfirmed, so not named-unit). actor_id
      set us/olympic-games-team (was null): a dedicated, well-sourced
      actor record exists for exactly this operation and was
      previously orphaned; state derives to us via us/nsa/tao.
doctrine_links:
  - doctrine_id: us/title-10-title-50
    pillar_id: null
    program_id: null
    perspective: attacker-rationale
    confidence: strongly_inferred
    reasoning: |
      Olympic Games was run as a US covert action, not an overt
      military operation: Sanger reports a program authorized at
      presidential level and briefed to congressional leadership — the
      Title 50 covert-action track (50 U.S.C. §3093) that the Title 10
      / Title 50 framework encodes as the offensive/covert-action
      authority under US cyber operations. The more specific US
      operational cyber doctrines (NSPM-13, Defend Forward) postdate
      the 2009-2010 operation, so the covert-action statutory frame is
      the applicable US doctrinal linkage for this foundational case.
      strongly_inferred, not attested: no govt / tier-1-vendor source
      formally states the legal-authority basis; it is triangulated
      from Sanger's covert-action reporting.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Sanger reports Olympic Games as a covert program authorized at presidential level and briefed to congressional leadership — the hallmark of a Title 50 covert action (finding + notification), not a Title 10 traditional military activity."
        - "The operation (2009-2010) predates NSPM-13 (2018) and Defend Forward (2018), so no more-specific US operational cyber doctrine existed at the time; the actor record flags it as a pre-NSPM-13 foundational case."
        - "The underlying covert-action authority (National Security Act §503 / 50 U.S.C. §3093) long predates Stuxnet, even though the cyber-specific NDAA-2018 codification is later."
      ruled_out: "Title 10 traditional-military-activity framing: Sanger describes a covert action with presidential authorization and congressional-leadership notification (CIA-involved), not an overt USCYBERCOM / Title 10 operation."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: il/begin-doctrine
    pillar_id: il/begin-doctrine/counter-wmd-cyber-sabotage
    program_id: null
    perspective: attacker-rationale
    confidence: strongly_inferred
    reasoning: |
      The Israeli half of Olympic Games fits the Begin Doctrine's
      counter-WMD-cyber-sabotage pillar precisely: code-as-strike
      against a regional adversary's nuclear-enrichment programme when
      kinetic action is politically or operationally constrained.
      Sanger's reporting frames the cyber operation partly as an
      alternative to an Israeli conventional strike on Natanz — the
      exact "sabotage when a strike is infeasible" logic the doctrine
      encodes — and the il/begin-doctrine record itself lists Stuxnet /
      Olympic Games under this pillar. strongly_inferred, not attested:
      Israel has never acknowledged the operation and no Israeli govt
      source states the purpose; the inference rests on US-side
      reporting plus the doctrine's own explicit framing.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target is Iran's IR-1 uranium-enrichment centrifuges at Natanz — a WMD fuel-cycle asset, the core object of the Begin Doctrine's counter-proliferation frame."
        - "Sanger reports the cyber program was pursued partly to forestall or substitute for an Israeli conventional military strike on Iran's nuclear facilities — the doctrine's sabotage-when-kinetic-action-is-constrained logic."
        - "The il/begin-doctrine record explicitly names Stuxnet and Olympic Games as key terms under the counter-wmd-cyber-sabotage pillar."
      ruled_out: "Generic espionage / collection motive: Stuxnet was a destructive sabotage payload physically degrading centrifuges, not an intelligence-collection operation (contrast Flame / Duqu)."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/asymmetric-warfare
    perspective: victim-response
    pillar_id: null
    program_id: null
    confidence: strongly_inferred  # downgraded 2026-06-09: 'attested' requires attesting_source_id (audit H6)
    reasoning: |
      Khamenei and senior IRGC commanders (Hajizadeh, Salami) have
      repeatedly cited Stuxnet as the case for cyber as an asymmetric
      equalizer. This link is victim-response context (the effect on
      Iran's own doctrine), NOT attacker-rationale — Iran is the victim
      here — and is retained as atlas context, not as a who×why
      training signal.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/natanz-fuel-enrichment-plant
    role: primary
    country: ir
    outcome: |
      Approximately 1,000 IR-1 centrifuges decommissioned and replaced
