id: 2010-06/stuxnet-natanz
name: Stuxnet — destructive cyber-physical attack on Natanz enrichment centrifuges
start_date: 2009-06-01  # earliest known infections; campaign likely earlier
disclosure_date: 2010-06-17  # initial Symantec / VirusBlokAda public detection
end_date: 2010-12-31
incident_type:
  - destructive
  - supply-chain
initial_vector: supply-chain  # USB-borne; allegedly via insider / supply-chain entry
outcome_summary: |
  Physical destruction of approximately 1,000 IR-1 centrifuges at
  the Natanz uranium-enrichment facility via PLC manipulation
  (Siemens S7-300/400) and engineering-workstation compromise
  (Step7). Significant setback to Iran's enrichment programme.
quantified_impact:
  centrifuges_destroyed: 1000
false_flag_risk: none
campaign_id: olympic-games
summary: |
  Stuxnet is included in the Iran event log as the **precipitating
  context** — not as an Iranian operation. Widely attributed to a
  joint US-Israeli program ("Olympic Games") per NYT / Sanger
  reporting; never formally acknowledged. The operation
  catalyzed Iran's offensive cyber buildup: Khamenei and senior
  IRGC commanders have repeatedly cited Stuxnet as the case for
  asymmetric cyber investment. Every subsequent Iranian doctrine
  in this atlas (Asymmetric Warfare, Cyber-Deniable-Retaliation,
  Forward Defense) is downstream of this event.
attributions:
  - actor_id: null  # not formally indicted; "Olympic Games" per NYT
    attributing_org: NYT / David Sanger (Confront and Conceal reporting)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2012-06-01
    attribution_source_id: nyt/2012-06-01_sanger-olympic-games
    notes: |
      US-Israeli operation. Iran is the **victim** here. This
      attribution is to the operation's authors; the Iran-side
      event significance is that Stuxnet became the regime's
      narrative anchor for its offensive cyber buildup.
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    perspective: victim-response
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      Khamenei and senior IRGC commanders (Hajizadeh, Salami)
      have repeatedly cited Stuxnet as the case for cyber as
      asymmetric equalizer. The doctrine linkage here is from
      effect-on-Iran-doctrine rather than Iran-as-perpetrator.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/natanz-enrichment
    role: primary
    outcome: |
      Approximately 1,000 IR-1 centrifuges destroyed; significant
      delay to Iranian enrichment program.
sources:
  - nyt/2012-06-01_sanger-olympic-games
  - symantec/2011_stuxnet-dossier
