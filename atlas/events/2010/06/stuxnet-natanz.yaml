qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: partial
  notes: |
    HISTORICAL/canonical audit vs RAW. Level = PARTIAL: the load-bearing
    ATTRIBUTION source (NYT/Sanger) is bot-walled (HTTP 403 DataDome JS
    challenge, 774-byte non-article) and un-snapshottable; the US+Israel
    attribution is mirror-corroborated only. Technical + centrifuge
    claims are fully snapshotted.

    SNAPSHOTS: symantec/2011_stuxnet-dossier (W32.Stuxnet Dossier v1.4,
    docs.broadcom.com PDF, 69 pp) sha256 9149e107…7b63ecd7, 4,332,399
    bytes. isis/2010-12-22_stuxnet-1000-centrifuges-natanz (Albright et
    al., ISIS, PDF 10 pp) sha256 84855f3e…6def0c87, 493,154 bytes —
    ADDED this pass to source-carry the ~1,000 figure. NYT/Sanger: NOT
    snapshotted (403); junk bot-wall page discarded, no content hash.

    [a] FACTS — all technical claims verbatim-carried by the Symantec
    dossier: "first to exploit four 0-day" (verifies the 4 zero-days,
    now stated in summary); Siemens SIMATIC Step 7 + WinCC; 315-2 CPU
    PLC via CP 342-5 Profibus; frequency-converter drives (Fararo Paya
    Tehran + Vacon) manipulated between 807–1210 Hz (the rotor-speed
    sabotage / cyber-physical mechanism); "Self-replicates through
    removable drives" to bridge the air gap; PLC rootkit hiding the
    changes. The ~1,000 IR-1 figure is source-carried by ISIS: "In late
    2009 or early 2010, Iran decommissioned and replaced about 1,000
    IR-1 centrifuges in the Fuel Enrichment Plant (FEP) at Natanz,
    implying that these centrifuges broke" — ISIS hedges exact causation
    ("Stuxnet's exact purpose or its overall effect on the FEP remains
    hard to determine"), so outcome_summary reworded from flat "physical
    destruction" to the decommissioned/replaced + widely-correlated
    framing. No fabricated tradecraft found; "S7-300/400" tightened to
    the source-carried "S7-315" (the S7-417/400-family targeting is
    Langner/later analysis, outside my snapshotted set).

    [b] ATTRIBUTION — actor_id null → us/olympic-games-team (dedicated,
    well-sourced actor existed but was orphaned; state derives us via
    us/nsa/tao). auspex_assessment concur → concur-with-caveat and
    attribution_level=named-actor added, per: Sanger's NYT reporting
    ("developed by the United States and Israel", Bush-begun/Obama-
    accelerated, Olympic Games), corroborated via WebSearch (NBC
    reprint, globalsecurity, Wikipedia, ISIS technical concurrence) and
    Zetter/Snowden — high confidence but journalism of a NEVER-officially
    -acknowledged covert op, hence the caveat. Not named-unit (NSA/TAO +
    Unit 8200 journalistically named, officially unconfirmed). Symantec
    deliberately made no geopolitical attribution — it carries the
    technical facts, not the who.

    [c] DATES — start 2009-06-01 (earliest known infections; Symantec
    samples from mid-2009), disclosure 2010-06-17 (VirusBlokAda/Symantec
    detection), end 2010-12-31: all consistent with the sources. Source
    published_on dates verified: Symantec 2011-02-01, ISIS 2010-12-22,
    NYT 2012-06-01. No conflation.

    [d] DOCTRINE_LINKS — was a single victim-response link only (no
    attacker-rationale link for an attributed op = a gap). ADDED two
    attacker-rationale links: us/title-10-title-50 (Title 50 covert-
    action authority — the applicable US frame since NSPM-13/Defend
    Forward postdate the op) and il/begin-doctrine/counter-wmd-cyber-
    sabotage (the doctrine record itself names Stuxnet/Olympic Games
    under this pillar). Both strongly_inferred, NOT attested: the only
    source stating strategic purpose is journalism of an unacknowledged
    covert op (no govt/tier-1-vendor attestation, and Sanger is bot-
    walled), so no attesting_source_id — kept the honest label with
    signals[] + ruled_out. Kept ir/asymmetric-warfare as victim-response
    context (already strongly_inferred). NOTE: il/begin-doctrine on a
    us-actor event is a cross-state attacker-rationale link — correct
    for a genuinely joint US+Israel operation (tagged, so the
    doctrine-state-mismatch surfacer is expected to flag it for review).

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing).

    [f] ACTOR_ID — us/olympic-games-team resolves to
    atlas/actors/us/olympic-games-team.yaml (solid, well-sourced; its
    own auspex_assessment is concur-with-caveat; it explicitly says
    "event-level attributions list both nation-states as appropriate").
    No actor-file edit made.

    FLAGS for orchestrator: (1) DUPLICATE SOURCE — the same Sanger NYT
    article exists under two source ids: nyt/2012-06-01_sanger-olympic-
    games (this event) and nyt/2012-06-01_sanger-obama-order-
    cyberattacks-iran (cited by the actor); the latter's own notes
    already flag it for slug-cleanup. (2) TARGET FK FIXED — event
