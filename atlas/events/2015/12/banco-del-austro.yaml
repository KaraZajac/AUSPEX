id: 2015-12/banco-del-austro  # slug stable; the heist is January 2015 (see start_date) — id path retained per the never-rename rule
name: Banco del Austro (Ecuador) SWIFT theft
start_date: 2015-01-12  # Jan 12 2015 per Reuters/Mandiant; fraudulent transfers ran ~10 days (was erroneously 2015-12-01)
disclosure_date: 2016-05-20  # Reuters special report / Bloomberg / CNN, 2016-05-20 (was 2016-05-19)
end_date: 2015-01-31  # ~10-day transfer window in Jan 2015 (was erroneously 2016-01-31)
incident_type:
  - financial-theft
initial_vector: valid-creds  # hackers obtained a BDA employee's SWIFT logon credentials (Reuters; Wells Fargo defense)
outcome_summary: |
  Fraudulent SWIFT messages instructed correspondent bank Wells
  Fargo to move ~$12M out of Banco del Austro (Ecuador) over a
  ~10-day window in January 2015, to receiving accounts in Hong
  Kong, Dubai, New York and Los Angeles. The theft surfaced
  publicly only via BDA's New York lawsuit against Wells Fargo
  (Reuters, May 2016); the suit settled in February 2018 (terms
  undisclosed; partial recovery). An EARLY SWIFT-network bank
  heist — it predates the Bangladesh Bank theft (Feb 2016) by
  ~13 months and was later linked, with limited insight, to the
  same DPRK-attributed SWIFT-fraud cluster (APT38 / Lazarus).
quantified_impact:
  usd_stolen: 12000000
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
summary: |
  At disclosure (Reuters, May 2016) the Banco del Austro incident
  was framed strictly as fraud + litigation: hackers used a BDA
  employee's stolen SWIFT credentials to send authenticated
  messages instructing correspondent Wells Fargo to wire ~$12M to
  accounts in Hong Kong, Dubai, New York and Los Angeles; neither
  bank reported it to SWIFT, and the facts emerged only through
  BDA's suit against Wells Fargo (settled Feb 2018). NO attribution
  to the DPRK / Lazarus was made at the time.

  The DPRK link is LATER and INFERENTIAL, via SWIFT-fraud TTP
  clustering. Symantec (May 2016) tied the Bangladesh Bank, Tien
  Phong and Banco del Austro operations to Lazarus on shared
  tooling; Mandiant's Oct-2018 "APT38: Un-usual Suspects" report
  lists Banco del Austro among APT38-linked targets but expressly
  caveats "While we have limited insight into this targeting, we
  have identified APT38 targeting South American entities
  previously" — i.e. a hedged, public-reporting-based association,
  not a forensic attribution of this specific intrusion. Mandiant
  documents APT38's signature SWIFT tradecraft in general (long
  pre-positioning; manipulation of the Alliance Access Oracle/SQL
  records via the DYEPACK suite to erase fraudulent-transfer
  traces; NESTEGG backdoor), but does NOT establish those specific
  tools for the Banco del Austro intrusion. This is therefore one
  of the LEAST-attested events in the APT38 cluster — no DOJ
  indictment or Treasury action names this incident.
