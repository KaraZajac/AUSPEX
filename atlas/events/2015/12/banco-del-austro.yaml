      Byungjin-window (2013–2018) hard-currency generation via
      SWIFT-network theft — the same doctrinal logic as the
      Bangladesh Bank / Tien Phong cluster. strongly_inferred, NOT
      attested: neither cited source states the strategic purpose
      of THIS operation (Mandiant has "limited insight" into the
      BDA targeting; Symantec speaks to tooling, not intent), and
      the actor/cluster's revenue-for-the-regime motive is itself a
      proximate goal the byungjin pillar specializes — which is the
      strongly_inferred bar, not attested.
    inference_basis:
