    attribution_source_id: symantec/2016-05-26_swift-attacks-lazarus
    notes: |
      Earliest public linkage of Banco del Austro to the Lazarus
      cluster, via shared SWIFT-attack tooling/infrastructure across
      Bangladesh Bank, Tien Phong and Banco del Austro. AUSPEX maps
      this to the APT38 financial subset. Moderate confidence: a
      tooling-similarity inference, not a forensic attribution of
      the BDA intrusion specifically.
  - actor_id: kp/rgb/apt38
    attributing_org: Mandiant
    attributing_org_confidence: moderate
    attribution_level: named-actor  # Mandiant named APT38 but with "limited insight" into this target
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-10-03
    attribution_source_id: mandiant/2018-10-03_apt38-report
    notes: |
      Mandiant's "Un-usual Suspects" lists Banco del Austro among
      APT38-linked targets but caveats "While we have limited
      insight into this targeting" — a hedged, public-reporting
      association. concur-with-caveat (was concur): the DPRK link
      for this specific incident is inferential, not forensically
      established, and no govt action names it.
