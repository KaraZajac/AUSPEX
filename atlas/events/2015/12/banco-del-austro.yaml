          matching the cluster's signature revenue tradecraft.
      ruled_out: |
        Pure-criminal (non-state) financial crime is ruled out by the
        actor's DPRK-state attribution; an espionage/sabotage reading
        is ruled out by the financial-theft mechanism and outcome.
    contested: false
