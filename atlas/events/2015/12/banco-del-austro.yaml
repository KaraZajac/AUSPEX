  notes: |
    Early (Jan-2015) Banco del Austro / Ecuador SWIFT heist — an APT38/Lazarus
    SWIFT-fraud case that PREDATES Bangladesh Bank. FACTS verified against primary
    reporting (Reuters special report, Bloomberg, CNN, all 2016-05-20; Wikipedia
    "2015–2016 SWIFT banking hack"; PYMNTS on the settlement): ~$12M via stolen SWIFT
    credentials, correspondent Wells Fargo, receiving accounts in Hong Kong/Dubai/New
    York/Los Angeles, surfaced only via BDA's NY lawsuit, settled Feb-2018. ATTRIBUTION
    (the load-bearing point): at disclosure the incident was framed STRICTLY as
    fraud+litigation with NO Lazarus/DPRK attribution; the DPRK link is later and
    inferential. Symantec (2016-05-26, tier=primary) first tied BDA to Lazarus on
    shared tooling; Mandiant's "APT38: Un-usual Suspects" (2018-10-03) lists BDA among
    APT38 targets but EXPRESSLY caveats "While we have limited insight into this
    targeting, we have identified APT38 targeting South American entities previously"
    (verbatim, raw PDF p.6) — a hedged public-reporting association, not a forensic
    attribution. CORRECTIONS: (1) start_date 2015-12-01 → 2015-01-12 (heist is Jan
    2015, not Dec 2015 — the id slug is retained per the never-rename rule); end_date
    2016-01-31 → 2015-01-31; disclosure_date 2016-05-19 → 2016-05-20. (2) "two months
    [before Bangladesh Bank]" → ~13 months (Jan-2015 vs Feb-2016) — corrected in both
    summaries. (3) De-over-specified the TTPs: KEYMARBLE/FALLCHILL/Manuscrypt and
    MT-103-receipt-suppression are NOT in the cited Mandiant report (term-scan 0 hits;
    those are CISA Hidden-Cobra artifacts) and Mandiant does NOT establish any tooling
    for the BDA intrusion specifically; reframed to what the source supports (DYEPACK
    Alliance-Access SQL manipulation + NESTEGG as APT38's GENERAL tradecraft, both
    confirmed in the PDF). (4) initial_vector unknown → valid-creds (stolen SWIFT
    logon). (5) Added Symantec 2016-05-26 (tier=primary) as a second attribution +
    source, resolving the single-source/circularity risk flagged in the verification
    plan. (6) Both attribution entries auspex_assessment concur → concur-with-caveat
    and given attribution_level: named-actor; the inferential nature is documented in
    their notes. (7) Doctrine link KEPT strongly_inferred (correctly NOT attested — no
    source states this op's purpose; revenue motive is the proximate goal the byungjin
    pillar specializes); added inference_basis (signals + ruled_out). Added country: ec
    to the target. ACTOR: kp/rgb/apt38 resolves, freshly audited 2026-06-24 (primary
    service kp/rgb/lab-110, RGB nexus raw-verified on OFAC/DOJ/CISA). target_id
    orgs/banco-del-austro has no registry file, but that is a corpus-wide tolerated
    target-FK gap (validate.ts: "targets/ normalization deferred"; 403 orgs referenced
    vs 110 files), not an error — left as-is (mirrors sibling orgs/tien-phong-bank).
    RAW: cited Mandiant source captured as the genuine 32-page "Un-usual Suspects" PDF
    (services.google.com canonical copy), sha256
    b64603759c0a96721c69ba2083770a2a3baec1535a7f4f5ec08ef353d986ed71 — it names Banco
    del Austro (6 hits). The blog URL itself is an empty cloud.google.com SPA shell
