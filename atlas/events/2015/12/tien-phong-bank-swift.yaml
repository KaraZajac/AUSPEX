  notes: |
    Dec-2015 attempted SWIFT theft from Tien Phong Bank (TPBank, Vietnam) —
    the thwarted APT38/Lazarus precursor to the Feb-2016 Bangladesh Bank heist.
    Full 6-point audit vs raw; two sources re-fetched + snapshotted, one new
    source added.
    [a] FACTS — verified against primary raw. Reuters (2016-05-15, snapshotted
    sha f015a2c4…): "Tien Phong Bank said that it interrupted an attempted cyber
    heist that involved the use of fraudulent SWIFT messages… in the fourth
    quarter of last year it identified suspicious requests through fraudulent
    SWIFT messages to transfer more than 1 million euros ($1.1 million)… did not
    cause any losses… the transfers were made using infrastructure of an outside
    vendor hired to connect it to the SWIFT bank messaging system… malware
    installed on a software application used by the third-party vendor… servers
    of the third-party vendor were based overseas." State Bank of Vietnam via
    Reuters (2016-05-17, snapshotted sha 3f494fa2…): "a failed hacking attempt on
    Tien Phong Bank (TPBank)… sought to fraudulently transfer 1.2 million euros
    ($1.36 million) to a Slovenian bank late last year in one transaction. The
    thwarted transfer on Dec. 8 was the only hack attempt via SWIFT detected by
    TPBank… Interpol was immediately informed… A third-party vendor… was possibly
    infected with malware and its servers were based in Singapore." CORRECTIONS:
    (1) The "Slovenia-based bank" destination is REAL and now source-carried (SBV
    via Reuters) — NOT stripped (initially suspected an AI-conflation with the
    2017 NiceHash "Slovenian company" case, then web+raw-verified as genuine).
    (2) Amount kept at usd_attempted 1,100,000 (TPBank's own disclosed floor
    "more than EUR1M/$1.1M"); prose now also carries the SBV's more precise
    EUR1.2M/$1.36M. (3) Removed the unsourced over-specific mechanism ("transfer
    through a Slovenia-based bank; internal reconciliation flagged before funds
    left the correspondent system") — replaced with the source-carried halt
    (TPBank contacted SWIFT + involved parties). (4) Summary claim that the DOJ
    complaint's "SWIFT-era core" = "Tien Phong, Bangladesh Bank, and Banco del
    Austro" CORRECTED: the complaint (342 KB raw) has 0 mentions of Banco del
    Austro and 0 of Tien Phong/TPBank; it covers Bangladesh (112 hits) + the
    unnamed "Vietnamese Bank" (Vietnam 20 hits). Reworded.
    [c] DATES — start/end 2015-12-01…2015-12-31 → 2015-12-08 (SBV: "thwarted
    transfer on Dec. 8"; Mandiant: "December 2015"; DOJ: forensic artifacts "in
    late 2015"). Single thwarted attempt, so end=start. disclosure_date
    2016-05-15 confirmed (Reuters byline "Sun, May 15, 2016"). Pre-positioning
    intrusion onset is undated in sources; event scoped to the transfer attempt.
    [b]/[e] ATTRIBUTION — restructured to 3 rows with attribution_level added.
    Neither 2016-era cited source names "APT38": Symantec (2016-05-26) named
    "Lazarus"; the DOJ complaint (2018-09-06, one month BEFORE Mandiant coined
    APT38) says "the subjects comprise members of the 'Lazarus Group,' the name
    that private security researchers (including Symantec, Novetta, and BAE) have
    given to the set of hackers who perpetrated the attacks on SPE, Bangladesh
    Bank, and other entities" (raw, snapshotted PDF sha 4876114d…). So the DOJ row
    is retargeted kp/rgb/apt38 → kp/rgb/lazarus (parent umbrella), matching sibling
    bangladesh-bank-swift. APT38 is carried by a NEW cited row: Mandiant
    "APT38: Un-usual Suspects" (2018-10-03, snapshotted sha b64603759c…) firmly
    lists "Vietnam TP Bank in December 2015" among "publicly reported attempted
    heists attributable to APT38" (NOT hedged, unlike its Banco del Austro entry).
    Symantec row kept at kp/rgb/apt38 named-actor with the "named Lazarus =
    APT38 subset" mapping note (house convention per banco-del-austro). All
    confidence=high/concur (the TPBank linkage is firm, unlike BDA).
    [d] DOCTRINE — kp/byungjin is era-correct (adopted 2013-03-31, superseded by
    8th-congress-defense-plan; Dec-2015 sits inside the window). confidence
    DOWNGRADED attested → strongly_inferred: the former attesting source (DOJ 2018
    complaint) carries ZERO "weapons of mass destruction" / "ballistic missile"
    hits (its lone "nuclear" hit is a fictional TV-series plot; its only regime
    framing is "likely regime-sanctioned") — i.e. proximate state-directed-theft
    goal only, NOT the pillar's terminal weapons-program-financing purpose.
    attesting_source_id set to null; added inference_basis {signals, ruled_out}.
    This matches siblings bangladesh-bank-swift and banco-del-austro (both
    strongly_inferred); attested is reserved for the campaign roll-up
    global-swift-campaign, which cites CISA AA20-239A (terminal WMD goal).
    Perspective is attacker-rationale (default; DPRK doctrine on a DPRK op).
    [f] ACTOR_ID — kp/rgb/apt38 resolves (id in atlas/actors/kp/apt38.yaml;
    primary_service kp/rgb/lab-110; RGB nexus raw-verified on OFAC/DOJ/CISA per
    that file); kp/rgb/lazarus resolves (atlas/actors/kp/lazarus.yaml). operators
    park-jin-hyok verified against the DOJ complaint's Vietnamese-Bank coverage.
    initial_vector phishing → supply-chain: the disclosed TPBank vector is a
    malware-infected third-party SWIFT-connectivity vendor (a trusted-relationship
