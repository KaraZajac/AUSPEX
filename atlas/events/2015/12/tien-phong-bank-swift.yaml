    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: attested
    reasoning: |
      The Park Jin Hyok complaint explicitly identifies SWIFT-
      network fraud as a sanctions-evasion revenue mechanism
      for the DPRK regime. Tien Phong sits inside the Byungjin
