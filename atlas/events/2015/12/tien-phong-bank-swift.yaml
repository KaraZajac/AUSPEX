id: 2015-12/tien-phong-bank-swift
name: Tien Phong Bank (Vietnam) attempted SWIFT theft
start_date: 2015-12-08  # fraudulent SWIFT transfer attempt; State Bank of Vietnam: "thwarted transfer on Dec. 8"; Mandiant: "December 2015"
disclosure_date: 2016-05-15  # TPBank statement to Reuters, after the Bangladesh Bank disclosure
end_date: 2015-12-08  # single thwarted attempt — "the only hack attempt via SWIFT detected by TPBank" (State Bank of Vietnam)
incident_type:
  - intrusion
  - financial-theft
initial_vector: supply-chain  # via a malware-infected third-party SWIFT-connectivity vendor (servers in Singapore); NOT phishing (unsourced for TPBank) — see qc
outcome_summary: |
  Attempted fraudulent SWIFT transfer from Vietnam's Tien Phong
  Bank (TPBank) on 8 December 2015. TPBank's own statement (via
  Reuters) reported fraudulent SWIFT messages seeking to move
  "more than 1 million euros ($1.1 million)"; the State Bank of
  Vietnam subsequently specified EUR 1.2M ($1.36M) directed to a
  Slovenia-based bank in a single transaction. The transfer was
  made through the infrastructure of an outside vendor TPBank had
  hired to connect to SWIFT — a third party whose software was
  infected with malware and whose servers were based in Singapore
  (the vendor was not named). TPBank detected the fraudulent
  messages and halted the transfer by immediately contacting SWIFT
  and the involved correspondent parties; no funds were lost, and
  Interpol was informed. TPBank disclosed the December 2015 attempt
  only belatedly, in May 2016, after the Bangladesh Bank heist
  became public. Symantec (May 2016) tied the Bangladesh Bank, Tien
  Phong and Banco del Austro SWIFT operations to the Lazarus Group
  on shared malware; Mandiant's October 2018 "APT38" report
  formalized the financial-theft sub-cluster and explicitly lists
  "Vietnam TP Bank in December 2015" among APT38 heists.
quantified_impact:
  usd_attempted: 1100000  # TPBank's own disclosed floor ("more than EUR1M / $1.1M"); the State Bank of Vietnam later specified EUR1.2M / $1.36M
  usd_stolen: 0
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110; DOJ Sep 2018 complaint charges the Lazarus conspiracy incl. the "Vietnamese Bank" (=TPBank) intrusion
summary: |
  Tien Phong is one of the foundational events in the public
  evidence base for APT38 — the DPRK-attributed financial-theft
  sub-cluster within the broader Lazarus umbrella that
  operationalized SWIFT-network abuse as a hard-currency revenue
  stream. It is the direct precursor to the February 2016
  Bangladesh Bank heist: the same tradecraft, thwarted ~two months
  earlier. The September 2018 Park Jin Hyok DOJ complaint charges
  the Lazarus conspiracy and treats the "Vietnamese Bank" (TPBank,
  not named) alongside Bangladesh Bank as linked SWIFT intrusions
  (shared infrastructure; FoxItReader.exe evidence-suppression
  malware); it does not mention Banco del Austro. Mandiant's
  October 2018 report is the cited source that carries the "APT38"
  designation for this operation.
attributions:
  - actor_id: kp/rgb/apt38
    attributing_org: Symantec Security Response + BAE Systems
    attributing_org_confidence: high
    attribution_level: named-actor  # Symantec/BAE named "Lazarus" (2016); AUSPEX maps to the APT38 financial subset
    auspex_assessment: concur
    attribution_date: 2016-05-26
    attribution_source_id: symantec/2016-05-26_swift-attacks-lazarus
    notes: |
      Earliest technical linkage: Symantec (and BAE Systems) tied the
      Vietnam bank malware to the Bangladesh Bank / Banco del Austro
      SWIFT operations and to the Lazarus Group on shared wiper/tooling.
      The 2016 report named "Lazarus," not "APT38" (Mandiant coined
      APT38 in Oct 2018); AUSPEX maps it to the APT38 financial subset.
      Source is un-snapshottable (JS-shell / Broadcom 404) — see its
      record; the linkage is mirror-corroborated by the snapshotted
      Mandiant and DOJ sources below.
  - actor_id: kp/rgb/apt38
    attributing_org: Mandiant
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2018-10-03
    attribution_source_id: mandiant/2018-10-03_apt38-report
    notes: |
      Mandiant's "APT38: Un-usual Suspects" formalized the APT38
      financial sub-cluster and — unlike its hedged Banco del Austro
      entry — firmly lists "Vietnam TP Bank in December 2015" among the
      "publicly reported attempted heists attributable to APT38." This
      is the cited source that carries the APT38 designation for the
      event.
  - actor_id: kp/rgb/lazarus
    attributing_org: US DOJ (Park Jin Hyok complaint)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2018-09-06
    attribution_source_id: doj/2018-09-06_park-jin-hyok-complaint
    notes: |
      The criminal complaint charges Park Jin Hyok as a member of the
      "Lazarus Group" and treats the unnamed "Vietnamese Bank" (=TPBank)
      as a linked SWIFT intrusion: forensic artifacts from "late 2015,"
      FoxItReader.exe malware designed to conceal fraudulent SWIFT
      messages, and infrastructure/IP overlap with Bangladesh Bank. The
      2018 complaint uses "Lazarus Group" (it predates the APT38 label),
      hence actor_id kp/rgb/lazarus (the parent umbrella).
