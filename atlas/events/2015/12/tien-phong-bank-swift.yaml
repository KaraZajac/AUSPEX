id: 2015-12/tien-phong-bank-swift
name: Tien Phong Bank (Vietnam) attempted SWIFT theft
start_date: 2015-12-01
disclosure_date: 2016-05-15
end_date: 2015-12-31
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Attempted USD 1.1M fraudulent SWIFT transfer from Vietnam's
  Tien Phong Bank (TPBank) via a third-party software vendor's
  trusted infrastructure. The fraudulent message instructed a
  transfer through a Slovenia-based bank; TPBank's internal
  reconciliation flagged the message before funds left the
  correspondent system. Disclosed publicly by TPBank in May 2016
  in the aftermath of the Bangladesh Bank disclosure. Symantec
  and Mandiant subsequently linked Tien Phong, Bangladesh Bank
  (February 2016), and Banco del Austro (January 2015) to a
  common DPRK-attributed actor cluster ("APT38" / "Stardust
  Chollima" subset of Lazarus).
quantified_impact:
  usd_attempted: 1100000
  usd_stolen: 0
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Sep 2018 complaint covers this campaign
summary: |
  Tien Phong is one of the foundational events in the public
  evidence base for APT38 — the DPRK-attributed financial-
  theft cluster within the broader Lazarus umbrella that
  operationalized SWIFT-network abuse as a sanctions-evasion
  revenue stream. The September 2018 Park Jin Hyok DOJ
  complaint covers the broader campaign; Tien Phong, Bangladesh
  Bank, and Banco del Austro form the SWIFT-era core of the
  case.
attributions:
  - actor_id: kp/rgb/apt38
    attributing_org: Symantec + BAE Systems + Mandiant
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2016-05-26
    attribution_source_id: symantec/2016-05-26_swift-attacks-lazarus
    notes: |
      Initial Symantec/BAE technical linkage to Lazarus on the
      basis of shared malware (a wiper tool with Sony Pictures
      / Banco del Austro tradecraft). Mandiant's 2018 APT38
      report formalized the cluster designation.
  - actor_id: kp/rgb/apt38
    attributing_org: US DOJ (Park Jin Hyok complaint)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2018-09-06
