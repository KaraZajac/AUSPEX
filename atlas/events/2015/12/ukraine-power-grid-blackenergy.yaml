id: 2015-12/ukraine-power-grid-blackenergy
name: Ukraine power grid attack (Prykarpattyaoblenergo)
start_date: 2015-06-01  # six-month dwell preceding the December 23 cutover
disclosure_date: 2016-01-04
end_date: 2015-12-23
incident_type:
  - intrusion
  - destructive
  - disruption
initial_vector: phishing
outcome_summary: |
  Coordinated remote operation of breakers at three Ukrainian
  oblast-level electricity distribution companies
  (Prykarpattyaoblenergo, Chernivtsioblenergo, Kyivoblenergo)
  using stolen credentials, paired with KillDisk wiper deployment
  and TDoS against the operator call center. ~225,000 customers
  without power for 1–6 hours. First publicly acknowledged
  cyber-induced grid outage.
quantified_impact:
  customers_affected: 225000
  outage_hours: 6
false_flag_risk: none
campaign_id: sandworm-ukraine-grid-wave
operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  Sandworm gained initial access via spear-phishing of macro-laden
  Microsoft Office documents delivering the BlackEnergy3 backdoor
  to IT-network workstations at three oblast distribution
  companies, then spent roughly six months in dwell mapping the
  industrial network. On 23 December 2015 operators used valid
  credentials, VPN access, and the utilities' own existing
  remote-administration tools (OS-level and ICS client software)
  to take over HMI workstations and manually open breakers at
  substations, while the KillDisk wiper destroyed the engineering
  workstations, serial-to-Ethernet ICS gateways were bricked with
  malicious firmware, and a TDoS flood degraded the operator call
  center to prevent customer outage reports. The DOJ October 2020
  Sandworm indictment charges the December 2015–December 2016
  BlackEnergy/KillDisk attacks on Ukraine's electric power grid and
  states the objective of destabilizing Ukraine.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2020-10-15
    attribution_source_id: doj/2020-10-15_sandworm-six-gru-officers-indictment
    notes: |
      Named-unit attribution (GRU Unit 74455 / Sandworm) rests on the
      US DOJ Oct-2020 indictment, which charges the six officers and
      the "December 2015 through December 2016 destructive malware
      attacks against Ukraine's electric power grid… using malware
      known as BlackEnergy, Industroyer, and KillDisk." Earlier links
      in the chain were less specific: E-ISAC/SANS (2016) and ESET
      (2016) documented the BlackEnergy 3 / KillDisk tradecraft without
      naming a GRU unit, and ICS-CERT/CISA reached only nation level
      ("Russian nation-state cyber actors", 2021 update).
      attribution_date is the indictment-return date (2020-10-15); the
      DOJ press release itself was published 2020-10-19.
