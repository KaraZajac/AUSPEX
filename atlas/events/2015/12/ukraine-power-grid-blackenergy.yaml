  notes: |
    [a] FACTS — all load-bearing claims now carried by snapshotted
    primaries. ICS-CERT IR-ALERT-H-16-056-01 (sha256 90c9bc82…2de319d4,
    63,485 B) verbatim: "power outages were caused by remote cyber
    intrusions at three regional electric power distribution companies
    (Oblenergos) impacting approximately 225,000 customers"; "malicious
    remote operation of the breakers … using either existing remote
    administration tools at the operating system level or remote industrial
    control system (ICS) client software via virtual private network (VPN)
    connections"; "actors acquired legitimate credentials"; "wiped some
    systems by executing the KillDisk malware … corrupts the master boot
    record"; "rendered Serial-to-Ethernet devices at substations inoperable
    by corrupting their firmware"; "scheduled disconnects for server
    Uninterruptable Power Supplies (UPS)"; "delivered via spear phishing
    emails with malicious Microsoft Office attachments." E-ISAC/SANS DUC
    (sha256 945b431a…88119ca5, 1,805,384 B) verbatim adds what ICS-CERT
    omits: "variants of the BlackEnergy 3 malware, and the manipulation of
    Microsoft Office documents"; "persist within the environment for six
    months or more to conduct reconnaissance" (→ start_date 2015-06-01
    dwell); "Telephone denial-of-service attack on the call center" /
    "thousands of calls to the energy company's call center to deny access
    to customers reporting outages" (→ TDoS); "three Ukrainian oblenergos
    experienced coordinated cyber attacks that were executed within 30
    minutes of each other"; names Kyivoblenergo (prose) + Prykarpattyaoblenergo
    (footnote). The THIRD company name (Chernivtsioblenergo) is in NONE of the
    primaries → added tertiary corroborator
    wikipedia/december-2015-ukraine-power-grid-cyberattack (sha256
    7ca4c5f9…3de5649a, 224,563 B): "two other energy distribution companies,
    Chernivtsioblenergo … and [Prykarpattyaoblenergo]" + "1 to 6 hours"
    (→ quantified_impact outage_hours 6). Headline count kept 225,000
    (primary DUC/ICS-CERT), not Wikipedia's looser ~230,000. No fabricated
    malware/CVEs/quotes; no anachronism.
    [b] ATTRIBUTION — named-unit (GRU Unit 74455 / Sandworm) rests on the DOJ
    Oct-2020 indictment: "officers in Unit 74455 of the Russian Main
    Intelligence Directorate (GRU)". auspex_assessment=concur, org_confidence
    high — matches the indictment's firmness; not over-attested (ICS-CERT
    reached only "Russian nation-state cyber actors", 2021 update). Six
    operators_named = the six charged officers (Andrienko, Detistov, Frolov,
    Kovalev, Ochichenko, Pliskin). OK.
    [c] DATES — start_date 2015-06-01 = DUC "six months or more" dwell before
    the 23-Dec cutover; end_date 2015-12-23 verbatim in every source.
    disclosure_date 2016-01-04 anchored by the ESET WeLiveSecurity report
    (sha256 494c9cf8…a993686e, 74,671 B; "04 Jan 2016"), the first-disclosure
    artifact — "BlackEnergy backdoor has been used to plant a KillDisk
    component", "infection vector … is Microsoft Office files containing
    malicious macros", names "Prykarpattya Oblenergo … already picked up by
    the media" — pre-dating ICS-CERT (2016-02-25) and DUC (2016-03-18).
    attribution_date
    2020-10-15 = grand-jury return ("On Oct. 15, 2020, a federal grand jury
    in Pittsburgh returned an indictment"); DOJ PR itself published 2020-10-19
    (source published_on corrected in the prior source-audit). OK.
    [d] DOCTRINE_LINKS — both attested, perspective attacker-rationale
    (Russia's own doctrine on Russia's own attack; default). Added the
    protocol-required inference_basis.source_quote (verbatim DOJ) to each.
    ru/russkiy-mir/ukraine-theater + ru/energy-weaponization/grid-attack are
    BOTH carried in substance: the GRU intrusions were "intended to support
    Russian government efforts to undermine, retaliate against, or otherwise
    destabilize: (1) Ukraine", and the charge names "December 2015 through
    December 2016 destructive malware attacks against Ukraine's electric power
    grid … using malware known as BlackEnergy, Industroyer, and KillDisk" —
