      "destructive malware attacks against Ukraine's electric power
      grid … using malware known as BlackEnergy, Industroyer, and
      KillDisk," framed as intended to destabilize Ukraine.
    attesting_source_id: doj/2020-10-15_sandworm-six-gru-officers-indictment
