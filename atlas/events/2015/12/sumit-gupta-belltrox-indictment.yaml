id: 2015-12/sumit-gupta-belltrox-indictment
name: SDNY indicts BellTroX principal Sumit Gupta — first US enforcement action against Indian hack-for-hire ecosystem
start_date: 2014-01-01
disclosure_date: 2015-12-15
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  The US Attorney's Office for the Southern District of New
  York returned an indictment against Sumit Gupta, principal of
  BellTroX InfoTech Services of Delhi, on charges including
  wire fraud, conspiracy to commit computer hacking, and
  aggravated identity theft. The matter involved a US-based
  hack-for-hire conspiracy in which Gupta and others targeted
  email accounts of US persons on behalf of paying clients.
  Gupta did not appear in US court; BellTroX operations
  continued and were subsequently exposed at scale by Citizen
  Lab's 2020 "Dark Basin" report.
false_flag_risk: none
operators_named:
  - gupta-sumit  # BellTroX principal
summary: |
  The earliest US-government enforcement action touching the
  Indian commercial hack-for-hire ecosystem. Notable for the
  five-year gap between this indictment and the Citizen Lab
  / Reuters 2020 disclosures that brought BellTroX to public
  attention at scale — during which the operation continued
  without abatement. The 2022 Aviram Azari plea in SDNY
  closed the prosecutorial arc on the BellTroX-to-US-clients
  supply chain.
