  notes: "Audited vs the DOJ N.D. Cal press release 'Private Investigators Indicted In E-Mail Hacking Scheme' (justice.gov/usao-ndca). PRIMARY SOURCE BOT-WALLED: live curl + WebFetch of justice.gov returned an Akamai interstitial (raw_snapshot doj__2015-12_sumit-gupta-belltrox-indictment.html, sha256 849ad07d…, is the bot-wall page, NOT the article); the release's full text was recovered via the search-engine crawl and corroborated by 4+ independent republications (Reuters/The Record, databreaches.net, Courthouse News, thompsonburton MLM, Wikipedia Dark Basin citing the 2015-02-11 release) — hence level: partial. MAJOR CORRECTIONS — the event had inherited the WRONG case: (1) DISTRICT SDNY→N.D. California (the source file was already corrected to N.D. Cal on 2026-05-29; the event never absorbed it). (2) CHARGES 'wire fraud / aggravated identity theft' were the Azari SDNY-2022 charges, not this one; corrected to conspiracy 18 U.S.C. 1030(b) + 1030(a)(2)(C) + 2511(1)(a). (3) DATES: disclosure_date/attribution_date 2015-12-15→2015-02-11 (DOJ release; indictment unsealed in San Jose 2015-02-10, grand jury 2015-01-15); start_date 2014→2013 (est., conduct spans the 2013-14 ViSalus/Ocean Avenue litigation). (4) initial_vector phishing→unknown (indictment specifies keylogger-based access; initial vector unstated — phishing was the LATER Dark Basin tradecraft, not this charge). (5) Added the full defendant roster + the ViSalus-v-Ocean Avenue context + keylogger method to outcome_summary/summary. ATTRIBUTION: commercial hack-for-hire, NO state nexus — correct. actor in/belltrox kept (host-nation modeling of the Indian contractor ecosystem per the 2026-06-24 'proxy→host nation' directive; primary_service_id null = no state organ; mirrors sibling in/appin-security); NOT moved to criminal/, which would orphan the deliberate in/contractor-hack-for-hire doctrine. Added attribution_level: named-actor (was absent; DOJ names Gupta personally) and a no-state-nexus note. DOCTRINE LINK: kept strongly_inferred (correctly NOT attested — the indictment names the commercial-for-hire conduct, a proximate purpose, not an Indian contractor doctrine); rewrote reasoning + fixed inference_basis.ruled_out to name the rejected competing reading (Indian state-collection doctrine). doctrine_links correctly carry NO state doctrine. SOURCE FILE also corrected: published_on 2015-09-01→2015-02-11 (Wikipedia + databreaches date the release to Feb 2015; 2015-09-01 was unsupported), publisher kept N.D. Cal/FBI, retrieved_on→2026-06-25, added raw_snapshot + content_sha256 (the bot-wall page, flagged in source notes). operators_named (gupta-sumit) left as a free-string slug (not an FK; consistent w/ sibling azari-aviram). Target FK orgs/us-persons-various is part of the corpus-wide deferred targets/ registry gap (validator: informational) — clarified its meaning in a comment, not in scope to register."
