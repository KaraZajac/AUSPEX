id: 2015-12/sumit-gupta-belltrox-indictment  # slug retained (stable id); actual indictment/announcement was Feb 2015, see dates
name: N.D. California indicts BellTroX principal Sumit Gupta in the ViSalus hack-for-hire conspiracy — first US enforcement action touching the Indian hack-for-hire ecosystem
start_date: 2013-01-01  # est.; indicted conduct spans the ViSalus/Ocean Avenue civil-litigation period (2013-2014)
disclosure_date: 2015-02-11  # DOJ press release; indictment unsealed in San Jose 2015-02-10; grand jury returned it 2015-01-15
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown  # indictment describes keylogger-based unauthorized access; the initial-access method is not specified in the source
outcome_summary: |
  A federal grand jury in the Northern District of California
  returned an indictment (15 Jan 2015; unsealed in San Jose
  10 Feb 2015) against five defendants — US private investigators
  Nathan Moser and Peter Siragusa (aka Bobby Russo), ViSalus
  security director Carlo Pacileo, and hackers Trent Williams and
  Sumit Gupta (aka Sumit Vishnoi, of Jabalpur, India) — for a
  conspiracy to access the email accounts, Skype accounts and
  protected computers of parties opposing the PIs' civil-litigation
  clients. Per the indictment the defendants installed and used a
  keylogger to obtain information to aid those clients (the object
  was ViSalus's suit against Ocean Avenue). Charges: conspiracy
  (18 U.S.C. 1030(b)), accessing a protected computer (1030(a)(2)(C))
  and interception of electronic communications (2511(1)(a)). An
  arrest warrant issued for Gupta, who was believed to be in India
  and never appeared; he was declared a fugitive in 2017. BellTroX
  operations continued and were subsequently exposed at scale by
  Citizen Lab's 2020 "Dark Basin" report.
false_flag_risk: none
operators_named:
  - gupta-sumit  # BellTroX principal
summary: |
  The earliest US-government enforcement action touching the
  Indian commercial hack-for-hire ecosystem, brought in the
  Northern District of California (not the SDNY — that is the
  separate 2022 Aviram Azari matter). It arose from a domestic
  US private-investigator scheme: PIs Moser and Siragusa hired
  Gupta (BellTroX) and a US-based hacker (Williams) to break into
  the accounts of an opposing party in their client ViSalus's
  civil litigation. Notable for the roughly five-year gap between
  this indictment and the Citizen Lab / Reuters 2020 disclosures
  that brought BellTroX to public attention at scale — during which
  the operation continued without abatement. This is a commercial
  hack-for-hire / criminal matter with no state nexus: Gupta is
  charged as a paid contractor, BellTroX carries no attested
  state-service parent, and the doctrine fit is the inferred Indian
  contractor posture, not an Indian state-collection doctrine. The
  2022 Aviram Azari plea in the SDNY closed the prosecutorial arc on
  the BellTroX-to-US-clients supply chain.
