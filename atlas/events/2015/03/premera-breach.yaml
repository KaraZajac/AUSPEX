  notes: |
    Audited vs both cited sources. PRIMARY-SOURCE INTEGRITY: the cited Symantec
    Black Vine PDF (docs.broadcom.com) was re-fetched this session — HTTP 200,
    4,267,454 bytes, byte-for-byte identical to the committed raw_snapshot
