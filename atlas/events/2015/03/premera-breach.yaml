id: 2015-03/premera-breach
name: Premera Blue Cross health-insurer breach
start_date: 2014-05-05
disclosure_date: 2015-03-17
end_date: 2015-01-29
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Premera Blue Cross disclosed theft of approximately 11 million
  member records — including clinical, banking, and SSN data —
  affecting customers across Washington, Oregon, and Alaska,
  including federal-employee Blue Cross plan enrollees. Combined
  with Anthem (2015), CareFirst, and Empire BlueCross, this
  was the most concentrated healthcare-PII theft cluster in US
  history.
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  Premera, like Anthem, was tied to the Deep Panda / Black Vine
  PRC-aligned cluster on the basis of TTP overlap and shared
  infrastructure with the Anthem intrusion. Federal Blue Cross
  enrollees included a substantial population of cleared US
  personnel — making the Premera intrusion a PII-enrichment
  layer atop the OPM SF-86 base data. No DOJ indictment named
  Premera-specific defendants but the Anthem/Fujie Wang case
  is the closest legal anchor.
attributions:
  - actor_id: cn/mss/deep-panda
    attributing_org: Symantec + vendor consensus
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-08-05
    attribution_source_id: symantec/2015-08-05_black-vine-anthem
    notes: |
      Symantec's August 2015 Black Vine report linked Anthem
      and Premera to the same operational cluster via shared
      Sakula / HttpBrowser tooling and infrastructure overlap.
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/bulk-pii-humint-enabling
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Healthcare-PII enrichment of the OPM/Anthem set,
      specifically including federal Blue Cross enrollees, fits
      the bulk-PII collection pattern. Treated as strongly
      inferred rather than attested because no government
      attribution document names Premera explicitly.
    attesting_source_id: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/premera
    country: us
    role: primary
    outcome: |
      ~11M member records (PII + clinical + banking) exfiltrated.
sources:
