id: 2015-03/premera-breach
name: Premera Blue Cross health-insurer breach
start_date: 2014-05-05
disclosure_date: 2015-03-17
end_date: 2015-01-29
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Premera Blue Cross disclosed theft of approximately 11 million
  member records — including clinical, banking, and SSN data —
  affecting customers across Washington, Oregon, and Alaska,
  including federal-employee Blue Cross plan enrollees. Combined
  with Anthem (2015), CareFirst, and Empire BlueCross, this
  was the most concentrated healthcare-PII theft cluster in US
  history.
quantified_impact:
  records_exfiltrated: 11000000
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  Premera, like Anthem, was tied to the Deep Panda / Black Vine
  PRC-nexus cluster. The concrete link is the typosquat domain
  prennera.com (the "m" replaced by a double "n"), which
  ThreatConnect identified on 2015-02-27 as impersonating Premera
  — the same character-swap phishing MO as we11point.com in the
  Anthem campaign; Symantec's August-2015 Black Vine report
  separately lists prennera.com (registered 2013-09-12) on the
  Black Vine infrastructure used against Anthem. Premera disclosed
  the intrusion on 2015-03-17: a phishing email installed malware
  on or about 2014-05-05; the access went undetected until
  2015-01-29. Federal Blue Cross enrollees included a substantial
  population of cleared US personnel — making the Premera intrusion
  a PII-enrichment layer atop the OPM SF-86 base data. No DOJ
  indictment named Premera-specific defendants but the
  Anthem/Fujie Wang case is the closest legal anchor.
attributions:
  - actor_id: cn/unscoped/deep-panda
    attributing_org: ThreatConnect + vendor consensus
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-02-27
    attribution_source_id: krebs/2015-03-17_premera-blue-cross-breach
    notes: |
      The Premera-specific link is the prennera.com typosquat
      (m -> nn), which ThreatConnect identified on 2015-02-27 as
      impersonating Premera — the same MO as we11point.com in the
      Anthem campaign (reported by Krebs, 2015-03-17). Symantec's
      August 2015 Black Vine report independently lists prennera.com
      among the Black Vine healthcare-themed domains (Table 2), tying
      it to the Deep Panda / Black Vine cluster via shared Sakurel /
      Mivast tooling and infrastructure. attribution_level: nation —
      every cited source stops at "state-sponsored ... based in China"
      / "Chinese state-sponsored"; NO specific Chinese intelligence
      service (MSS / PLA unit) is named, which is why the actor sits
      at cn/unscoped/deep-panda.
