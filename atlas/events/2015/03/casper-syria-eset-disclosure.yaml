  notes: |
    Full 6-point audit vs the two cited RAW snapshots (both re-verified this date,
    hashes UNCHANGED; tier=primary PRESERVED):
      • ESET welivesecurity Casper article — content_sha256 349ffdc9…f34558, 93212 bytes.
      • Kaspersky "Animals in the APT Farm" — content_sha256 25c24574…066e5, 180845 bytes.
    PHANTOM CHECK (event was flagged phantom-suspect): NOT phantoms — both URLs resolve
    to the genuine articles (ESET <title> "Casper Malware: After Babar and Bunny…";
    Kaspersky <title> "Animals in the APT Farm | Securelist"), and bodies carry the
    claims. No re-sourcing needed.

    [a] FACTS — corrected several fabrications / over-claims:
      • DOMAIN: event said the watering-hole was "Jubilee.sy" — FALSE. ESET says the site
        is "jpic.gov.sy" (grep of raw: "jpic"=5, "Jubilee"=0), "set up in 2011 by the
        Syrian Justice Ministry … to allow Syrian people to ask for reparation for the
        damage of the civil war." Corrected throughout.
      • "MEDIA-MOTHER" PDB string / ESET-"identified French-language code artifacts" in
        Casper — FALSE. Neither string occurs in either raw ("MEDIA-MOTHER"=0, "PDB"=0 in
        both). ESET's same-developer link rests on shared CODE constructs (API-name
        hashing, WMI AV-detection, C&C delimiter generation, dropper self-removal,
        incrementing operation IDs 13001 / 12075-01 / 08184) + cartoon naming — and ESET
        EXPLICITLY says "no signs of French origin, as suggested by CSEC for Babar, were
        found in the binaries." Rewrote outcome_summary to the real evidence + disclaimer.
      • VICTIMS: event said "Syrian government employees and external interlocutors" —
        unsupported. ESET: "all the people targeted during this operation were located in
        Syria … Syrian citizens who want to file a complaint." Re-modelled targets.
      • '"previously linked to a French intelligence service" framing' — fabricated quote;
        "intelligence service" does not occur in ESET (grep=0). Removed.
      • end_date 2014-04-30 was an unsourced month-end bound → null (only April 2014
        activity documented: payload config timestamp Mon 2014-04-07 21:27 GMT; exploits
        observed mid-April 2014; site clean by the 2015-03 disclosure).
      • false_flag_risk none→suspected: ESET states the Syrian-server hosting "would
        mislead attribution efforts by raising suspicion against the Syrian government" —
        a source-stated misdirection (not a confirmed false flag).
      • CONFIRMED true: April 2014 deployment; CVE-2014-0515 Adobe Flash 0-day; multi-stage
        dropper+reconnaissance-payload backdoor with anti-AV logic + modular
        SYSINFO/EXEC/SYSTEM/PLUGIN post-exploitation; Kaspersky "watering-hole attack in
        Syria"; only 1 country affected (Syria).

    [b] ATTRIBUTION — ESET verbatim: "we assess with high confidence that Bunny, Babar,
      NBOT and Casper were all developed by the same organization" (CLUSTER, high conf);
      and "In March 2014, French newspaper Le Monde revealed that France is suspected by
      the Communications Security Establishment Canada (CSEC) of having developed and
      deployed malicious software … based on presentation slides leaked by Edward Snowden
      … published by … Der Spiegel in January 2015" (France = CSEC SUSPICION re Babar).
      Casper→France is thus transitive, and ESET disclaims French signs in Casper itself.
      Kaspersky names the "Animal Farm" group + lists Casper but does NOT attribute to
      France (sole "French" = an Occitan etymology aside). Corrections: auspex_assessment
      concur→concur-with-caveat (aligns with the actor record); added attribution_level:
      named-actor (vendors name a group; nation only suspected; no unit) + a
      per-attribution notes block. attributing_org_confidence kept moderate. service_id
      already correctly null (no DGSE named).

    [c] DATES — disclosure_date 2015-03-05 = ESET pub date ("Joan Calvet 05 Mar 2015") ✓.
      start_date 2014-04-01 = April-2014 deployment ✓ (payload timestamp 2014-04-07).
      end_date → null (see [a]). Le Monde March 2014 / Der Spiegel January 2015 verified in
      the ESET text. Source published_on (ESET 2015-03-05, Kaspersky 2015-03-06) ✓.

    [d] DOCTRINE_LINKS — one link, fr/lutte-informatique-offensive/intelligence-preparation,
      confidence PLAUSIBLE (correct — NOT attested: no source states a French strategic
      purpose and ESET makes no nation attribution of Casper). The LIO doctrine record
      itself prescribes this retroactive plausible mapping for the Animal Farm family.
      Added the ladder-required inference_basis.alternatives[] (3, colon-space-quoted);
      kept counter_explanation. perspective = attacker-rationale (default; French doctrine
      on a French-suspected op; actor-state fr = doctrine-state fr, no mismatch). pillar FK
      fr/lutte-informatique-offensive/intelligence-preparation exists ✓.

    [e] ATTRIBUTION_LEVEL — was MISSING; set named-actor (see [b]).

    [f] ACTOR_ID — fr/unscoped/casper-actor resolves to atlas/actors/fr/casper-actor.yaml
      (id fr/unscoped/casper-actor) ✓; already correctly demoted from fr/dgse/* on
      2026-06-24. No actor edit made. FLAG for orchestrator: the actor file's ttp_summary
      also carries the wrong "Jubilee.sy" domain (should be jpic.gov.sy).

    RESIDUAL UNCERTAINTY: France is suspected (CSEC), not vendor-attributed for Casper; the
