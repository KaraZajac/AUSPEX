id: 2015-03/casper-syria-eset-disclosure
name: ESET Casper disclosure (April 2014 Syrian watering-hole campaign)
start_date: 2014-04-01
disclosure_date: 2015-03-05
end_date: null  # AUDIT 2026-07-05: only April 2014 activity is documented (payload config timestamp Mon 2014-04-07 21:27 GMT; Flash 0-day exploits observed mid-April 2014 by Zakorzhevsky); site was clean by the 2015-03 disclosure. 2014-04-30 was an unsourced month-end bound.
incident_type:
  - espionage
initial_vector: 0-day
outcome_summary: |
  ESET WeLiveSecurity (Joan Calvet) disclosure on 5 March 2015 of
  the Casper implant, deployed in April 2014 against targets in
  Syria via the compromised Syrian Justice Ministry website
  "jpic.gov.sy" (a 2011 civil-war-reparations complaints portal).
  Casper leveraged CVE-2014-0515 (Adobe Flash zero-day) to deliver
  a multi-stage backdoor (dropper + reconnaissance payload) with
  extensive anti-analysis / anti-AV logic and modular
  post-exploitation (SYSINFO / EXEC / SYSTEM commands, PLUGIN
  deployment). ESET assessed "with high confidence that Bunny,
  Babar, NBOT and Casper were all developed by the same
  organization", basing that same-developer link on shared code
  constructs (identical API-name hashing, WMI antivirus-detection,
  C&C delimiter generation, dropper self-removal, an incrementing
  operation-ID scheme) and the shared cartoon-character naming
  idiom — NOT on any French-origin artifact. ESET explicitly found
  "no signs of French origin, as suggested by CSEC for Babar … in
  the binaries." Kaspersky GReAT (6 March 2015) independently named
  the "Animal Farm" group, listed Casper among its Trojans, and
  described the operation as "a watering-hole attack in Syria".
quantified_impact:
  countries_affected: 1
false_flag_risk: suspected  # AUDIT 2026-07-05: ESET states hosting the exploits/Casper/C&C on the Syrian government server "would mislead attribution efforts by raising suspicion against the Syrian government" — a source-stated misdirection consideration (not a confirmed false flag).
operators_named: []
summary: |
  Casper sits in the middle of the Animal Farm cluster timeline:
  deployed April 2014 (about one month after Le Monde's March 2014
  report of the CSEC "SNOWGLOBE" material), disclosed publicly
  March 2015. Two vendors place Casper in a single coherent
  operator: ESET links it with high confidence to the same
  organisation behind Babar / Bunny / NBOT, and Kaspersky names
  the "Animal Farm" group and lists Casper among its tools. The
  French provenance is NOT attributed by either vendor to Casper:
  it rests on CSEC's (Communications Security Establishment Canada)
  suspicion that FRANCE developed the parent Babar malware —
  revealed by Le Monde (March 2014) and Der Spiegel (January 2015)
  from Snowden's leaked SNOWGLOBE slides — applied to Casper only
  transitively via the same-developer cluster. ESET explicitly
  found "no signs of French origin … in the binaries" of Casper and
  named no French intelligence service. The narrow targeting of
  people in Syria (via a Syrian Justice-Ministry civil-war
  reparations portal) fits a foreign-intelligence interest in the
  Syrian theatre — ESET calls it "a likely interest in
  geopolitics". AUSPEX therefore records the attribution as
  concur-with-caveat: the same-developer cluster is robust, but the
  France placement is a suspected (CSEC), not vendor-attributed,
  inference and no French service is named — hence the actor is
  held at fr/unscoped.
attributions:
  - actor_id: fr/unscoped/casper-actor
    service_id: null  # was fr/dgse/technical-directorate; nulled 2026-06-24 (claude-opus-4.8/max): unsourced — ESET names only "France"/CSEC, never the DGSE. See actor notes.
    attributing_org: ESET (Joan Calvet)
    attributing_org_confidence: moderate
    attribution_level: named-actor  # AUDIT 2026-07-05: ESET (high conf) + Kaspersky establish a named same-developer group (the "Animal Farm" operator behind Babar/Bunny/NBOT/Casper). NATION not reached by the cited vendors — France is only CSEC-"suspected" for the parent Babar; no named-unit (no DGSE). Hence named-actor, moderate.
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-03-05
    attribution_source_id: eset/2015-03-05_casper-malware-babar-bunny
    notes: |
      ESET assessed "with high confidence that Bunny, Babar, NBOT and
      Casper were all developed by the same organization" (same-developer
      cluster) but of Casper itself found "no signs of French origin, as
      suggested by CSEC for Babar … in the binaries" — i.e. ESET makes NO
      nation attribution of Casper. The France placement is transitive:
      CSEC "suspected" France of developing the parent Babar (Le Monde
      2014-03; Der Spiegel 2015-01; Snowden SNOWGLOBE material), and Casper
      is the same operator's tool. Kaspersky ("Animals in the APT Farm",
      2015-03-06) names the "Animal Farm" group and lists Casper, but does
      NOT attribute to France (its sole "French" mention is an Occitan
      etymology aside). No cited source names the DGSE or any French service
      → actor held at fr/unscoped; confidence moderate; concur-with-caveat.
doctrine_links:
  - doctrine_id: fr/lutte-informatique-offensive
    pillar_id: fr/lutte-informatique-offensive/intelligence-preparation
    program_id: null
    confidence: plausible
    reasoning: |
      Pre-codification operation (LIO publicly articulated 2019,
      Casper deployed 2014) mapped retroactively to the
      intelligence-preparation-of-the-environment function LIO later
      codified — the mapping the LIO doctrine record itself
      prescribes for the Animal Farm family ("fits this pillar
      retroactively at plausible confidence"). Casper is a
      reconnaissance / espionage implant narrowly targeting people in
      Syria; ESET reads that as "a likely interest in geopolitics".
      Held at plausible because no source states a French strategic
      purpose, ESET makes no nation attribution of Casper, and the
      France provenance itself is only CSEC-suspected for the parent
      Babar.
    attesting_source_id: eset/2015-03-05_casper-malware-babar-bunny
    inference_basis:
      alternatives:
        - "French intelligence-preparation / foreign-intelligence collection (the LIO intelligence-preparation pillar, applied retroactively): a reconnaissance implant narrowly targeting people in Syria via a Justice-Ministry portal, consistent with the CSEC-suspected French provenance of the Animal Farm family and ESET's 'likely interest in geopolitics'."
        - "Pre-doctrinal DGSE foreign-intelligence collection under pre-2018 authorities with no reference to LIO: LIO was articulated in 2019, five years after the operation, so the mapping is anachronistic and the op may be generic espionage rather than preparation for later military cyber effects."
        - "Attribution-contingent: France is only CSEC-suspected for the parent Babar and explicitly NOT evidenced in Casper by ESET, so any French-doctrine reading is contingent on the cluster's suspected French provenance holding."
    counter_explanation: |
      DGSE foreign-intelligence collection under pre-2018
      authorities, without specific reference to LIO doctrine.
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government/judicial
    country: sy
    role: staging
    outcome: |
      Syrian Justice Ministry website "jpic.gov.sy" (a 2011 portal
      for civil-war reparations complaints) compromised / co-opted:
      the Flash 0-day exploits, the Casper binaries and the C&C were
      all hosted on this server. ESET floats two hypotheses — a
      watering-hole targeting the site's visitors, or the site merely
      hacked as a storage area — and notes the choice "would mislead
      attribution efforts by raising suspicion against the Syrian
      government". Delivery vehicle, not the ultimate victim.
  - target_id: sectors/civil-society
    country: sy
    role: primary
    outcome: |
      Per ESET telemetry, "all the people targeted during this
      operation were located in Syria" — most likely "Syrian citizens
      who want to file a complaint" via jpic.gov.sy. ESET could not
      confirm the victims were the site's visitors versus redirected
      from elsewhere (a link in an email or another hacked site). The
      earlier "Syrian government employees and external interlocutors"
      framing was unsupported and has been corrected.
sources:
  - eset/2015-03-05_casper-malware-babar-bunny
  - kaspersky/2015-03-06_animals-in-the-apt-farm
qc:
  verified_by: claude-opus-4.8
