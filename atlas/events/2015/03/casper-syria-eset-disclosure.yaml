id: 2015-03/casper-syria-eset-disclosure
name: ESET Casper disclosure (April 2014 Syrian watering-hole campaign)
start_date: 2014-04-01
disclosure_date: 2015-03-05
end_date: 2014-04-30
incident_type:
  - espionage
initial_vector: 0-day
outcome_summary: |
  ESET WeLiveSecurity (Joan Calvet) disclosure on 5 March 2015 of
  the Casper implant, deployed in April 2014 against Syrian
  targets via the Jubilee.sy compromised Syrian Ministry of
  Justice website. Casper leveraged CVE-2014-0515 (Adobe Flash
  zero-day) to deliver a multi-stage backdoor with anti-analysis
  features and modular post-exploitation. ESET identified
  French-language code artifacts ("MEDIA-MOTHER" PDB string,
  identical naming idiom to Babar) and joined Casper to the
  Animal Farm family disclosed earlier the same month by G Data
  and Cyphort.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  Casper sits in the middle of the Animal Farm cluster timeline:
  deployed April 2014 (one month after the Le Monde Snowglobe
  reporting), disclosed publicly March 2015. The Syrian targeting
  (Ministry of Justice watering-hole during the civil war
  conflict period) is editorially consistent with French foreign-
  intelligence priorities in the Levant theater. ESET stopped
  short of formal French attribution but used "previously linked
  to a French intelligence service" framing. AUSPEX records
  the auspex_assessment as concur on the basis of vendor consensus
  + Le Monde precedent.
