id: 2015-03/khnp-dprk-attribution
name: ROK joint investigation attributes December 2014 KHNP intrusion to DPRK (Kimsuky)
start_date: 2014-12-09
disclosure_date: 2014-12-22
end_date: 2015-03-16
incident_type:
  - espionage
  - data-theft
  - hack-and-leak
  - extortion
  - attribution-publication
initial_vector: phishing
outcome_summary: |
  Cyber intrusion at Korea Hydro & Nuclear Power (KHNP)
  exfiltrating reactor design documents, blueprints, manuals,
  electricity charts, radiation estimates, the confidential
  Safety and Performance Analysis Code (SPACE) thermal-hydraulic
  analysis, and personal data on ~10,000 employees. Documents
  were progressively released by an anonymous persona ("president
  of anti-nuclear reactor group") via Twitter from late December
  2014, with threats to leak more unless the Gori and Wolseong
  reactors were shut down by Christmas. A joint ROK government
  investigation led by the Seoul Central District Prosecutors'
  Office publicly attributed the intrusion to the DPRK on
  16 March 2015, finding the malware matched the "kimsuky" family
  used by North Korean hackers.
false_flag_risk: none
summary: |
  Anchor event in the ROK public counter-DPRK attribution
  tradition and an early DPRK hack-and-leak / coercive-disclosure
  case against critical infrastructure. The KHNP case combined a
  substantial data-exfiltration component (limited to non-OT
  systems per KHNP and the ROK government — no evidence of
  penetration into reactor control systems) with a public-pressure
  campaign: leaks released via an anonymous "anti-nuclear" Twitter
  persona threatening further disclosure unless named reactors
  (Gori, Wolseong) were shut down.

  ATTRIBUTION: the public attribution was made not by the NIS but
  by a joint ROK government investigation led by the Seoul Central
  District Prosecutors' Office, which on 16 March 2015 released an
  interim result stating the malicious code was "the same in
  composition and working methods as the so-called 'kimsuky' that
  North Korean hackers use," attributing the attack to the DPRK.
  AUSPEX therefore maps the operation to the Kimsuky cluster (per
  the investigators' own malware-family finding), not Lazarus. The
  spear-phishing emails used ~20 IP addresses supplied by three VPN
  companies in Shenyang, China — a known DPRK staging hub — and the
  same addresses were later used to post the stolen documents. The
  attribution names the DPRK at the nation level; no specific RGB
  unit was named by the prosecutors for the KHNP case.

  AUSPEX assessment: concur on the ROK joint-investigation
  attribution with the editorial caveat that the December 2014 case
  has not produced a US-indictment-grade public evidentiary record
  (contrast the 2018 Park Jin Hyok DOJ complaint for Lazarus). The
  false-flag risk is rated `none`: the named actor and the
  malware-family match are consistent, and no source raises a
  false-flag concern.
attributions:
  - actor_id: kp/rgb/kimsuky
    attributing_org: Seoul Central District Prosecutors' Office (joint ROK government investigation)
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2015-03-16
    attribution_source_id: 38north/2024-03_khnp-hack-revisited
    notes: |
      The joint-investigation interim result (16 March 2015) named
      the DPRK and identified the malware as the "kimsuky" family
      used by North Korean hackers — hence the Kimsuky actor mapping
      (corrected from kp/rgb/lazarus on 2026-06-25; the earlier
      DarkSeoul/Volgmer-overlap rationale is not what the
      investigators actually reported). Attribution is at the
      nation level (DPRK); no RGB sub-unit was named by the
      prosecutors for the KHNP case. (Kimsuky is placed under kp/rgb
      in the actor registry, but that service placement derives from
      Kimsuky's own dossier, not from this attribution.)
