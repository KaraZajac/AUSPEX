id: 2015-03/khnp-dprk-attribution
name: NIS attributes December 2014 KHNP intrusion to DPRK
start_date: 2014-12-09
disclosure_date: 2014-12-22
end_date: 2015-03-17
incident_type:
  - espionage
  - data-theft
  - attribution-publication
initial_vector: phishing
outcome_summary: |
  Cyber intrusion at Korea Hydro & Nuclear Power (KHNP)
  exfiltrating reactor design documents, blueprints, and
  personal data; documents progressively released by an
  anonymous Twitter persona ("Who am I = No Nuclear Power")
  in late December 2014. ROK NIS publicly attributed the
  intrusion to DPRK actors on 17 March 2015 following a
  joint investigation with the supreme prosecutors' office.
false_flag_risk: low
summary: |
  Anchor event in the NIS public counter-DPRK attribution
  tradition. The KHNP case combined a substantial data-
  exfiltration component (limited to non-OT systems per
  KHNP and NIS statements — no evidence of penetration
  into reactor control systems) with a public-pressure
  campaign via leak releases threatening further
  disclosure unless plants were shut down.

  NIS attribution rested on infrastructure overlap
  (a VPN traffic pattern allegedly traceable to Shenyang,
  China — a known DPRK staging area), malware similarity
  to prior DarkSeoul / Volgmer activity, and HUMINT
  inputs that NIS did not publicly detail. The Korean
  press and US vendors broadly concurred; the public
  record is consistent with attribution but lacks the
  kind of indictment-grade evidence later available for
  Lazarus operations (e.g., the 2018 Park Jin Hyok DOJ
  complaint).

  AUSPEX assessment: concur on NIS attribution with the
  editorial flag that the December 2014 case has not
  produced a US-indictment-grade public evidentiary
  record. The false-flag risk is rated `low` rather than
  `none` to reflect this gap.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: ROK National Intelligence Service
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2015-03-17
    attribution_source_id: wikipedia/khnp
    notes: |
      ROK NIS public attribution 17 March 2015. AUSPEX
      maps NIS's "North Korean" attribution to the Lazarus
      actor cluster per standard mapping; specific RGB
      sub-cluster was not named by NIS.
doctrine_links:
  - doctrine_id: kr/nis-counter-dprk
    pillar_id: kr/nis-counter-dprk/attribution
    program_id: null
    confidence: attested
    reasoning: |
      Canonical NIS-led attribution event; the NIS public
      attribution itself is the doctrinal act.
    attesting_source_id: wikipedia/khnp
    contested: false
    analyst: claude
  - doctrine_id: kr/nis-counter-dprk
    pillar_id: kr/nis-counter-dprk/critical-infrastructure
    program_id: null
    confidence: attested
    reasoning: |
      Target is ROK nuclear-fleet operator; intrusion
      triggered the NIS critical-infrastructure protection
      coordination line of effort.
    attesting_source_id: wikipedia/khnp
    contested: false
    analyst: claude
targets:
  - target_id: orgs/khnp
    role: primary
    outcome: |
      Exfiltration of reactor design documents, employee
      personal data; progressive leak campaign via anonymous
      Twitter persona. No evidence of OT-system compromise
      per KHNP and NIS statements.
sources:
