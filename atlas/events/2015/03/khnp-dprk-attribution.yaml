qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited against 38 North "Revisiting the 2014 Korea Hydro and
    Nuclear Power Hack" (Seungmin Helen Lee, Stimson Center, 2024-03-22;
    secondary; raw HTML on disk sha256 f9c4a83d…73cd4) and corroborated
    by POWER Magazine / Stanford / The Hacker News web reporting.
    SOURCING FAILURE FOUND + FIXED: the event was cited ONLY to two
    tertiary Wikipedia articles, NEITHER of which carries any of its
    claims — wikipedia/khnp is a corporate profile (zero hits for
    hack/cyber/North Korea/blueprint/leak in the captured snapshot) and
    wikipedia/nis-south-korea covers only the 2012 election-interference
    scandal (zero hits for KHNP/nuclear/2014/Kimsuky/Lazarus). Replaced
    with 38north/2024-03_khnp-hack-revisited (substantive carrier, raw +
    hashed); dropped wikipedia/nis-south-korea entirely; retained
    wikipedia/khnp ONLY as the KHNP-identity tertiary citation (snapshot
    + hash added to its source record).
    FACTS OK (38 North): KHNP intrusion Dec 2014; leaked employee data
    (~10,000), reactor blueprints, manuals, electricity charts,
    radiation estimates, and the SPACE thermal-hydraulic code; anonymous
    "president of anti-nuclear reactor group" Twitter persona posted docs
    and demanded Gori/Wolseong reactor shutdowns by Christmas; ~20 IPs
    from three Shenyang VPN firms; no OT/control-system compromise.
    ATTRIBUTION CORRECTED: attributing body was the Seoul Central
    District Prosecutors' Office (joint ROK govt investigation), NOT the
    NIS — corrected name, attributing_org, and the doctrine-link
    reasoning. The interim result (16 Mar 2015) named the DPRK and the
    "kimsuky" malware family, so ATTRIBUTION_LEVEL: nation (DPRK; no RGB
    unit named for KHNP). ACTOR CORRECTED kp/rgb/lazarus → kp/rgb/kimsuky
    (the investigators' own malware-family finding; the prior
    DarkSeoul/Volgmer-overlap rationale was unsupported and wrong).
    PUBLISHED_ON / DATE: attribution date corrected 2015-03-17 →
    2015-03-16 (Seoul prosecutors' interim result, per POWER Magazine);
    end_date moved to match. ENUM/CONSISTENCY BUG fixed: the prose
    claimed false_flag_risk "rated `low`" but the field was `none` and
    `low` is not a valid enum value — held at `none` (named actor +
    malware match, no false-flag concern in any source) and the
    contradictory prose removed. INCIDENT_TYPE: added hack-and-leak +
    extortion (the coercive disclosure / shutdown-threat campaign is
    central). TARGETS: added country: kr and the sectors/energy/nuclear
    sector target. DOCTRINE LINKS held at strongly_inferred (down from
    the prior mixed state): both re-pointed to the 38 North attesting
    source; the attribution-act is now source-attested but the LINK to
    the NIS-specific counter-DPRK posture stays inferred because the
    named attributing body was the prosecutors, not the NIS — honest
    perspective: defender-response retained.
    ACTOR FLAG: kp/rgb/kimsuky FK resolves and is not stale; its kp/rgb
    service placement is independently sourced in the actor dossier
    (Mandiant APT43 / Treasury 2023) and is unaffected by this
    nation-level KHNP attribution.
