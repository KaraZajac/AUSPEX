initial_vector: unknown
outcome_summary: |
  Kaspersky GReAT publication on 6 March 2015 of "Animals in the
  APT Farm", consolidating Bunny / EvilBunny, Dino, Babar, NBot,
  Casper, and Tafacalou — which Kaspersky "grouped into six major
  families" — into a single operator's toolkit, the Animal Farm
  group. The post is the canonical vendor-cluster reference for the
  Animal Farm tooling family and its membership decisions. Kaspersky
  does NOT itself attribute the cluster to France — its only
  "France"/"French" occurrence is an Occitan-etymology aside on the
  attacker's internal tool name "Tafacalou" ("Fa Calou" as "the
  French interpretation of the Occitane 'Fa Calor'"); the
  French-state reading rests on CSEC's Snowglobe assessment relayed
  by Le Monde (hedged), not on any Kaspersky France attribution.
  From the Tafacalou infection logs Kaspersky reported victims across
  ~18 countries — including Syrian, Iranian, Malaysian, US, Chinese,
  Turkish, and Algerian targets — spanning government, military-
  contractor, humanitarian-aid, private-company, journalist / media,
  and activist victims.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  The Kaspersky post follows the 18 February 2015 Babar disclosures
  by G Data and Cyphort and the 5 March 2015 ESET Casper post. It
  is the editorial-consolidation moment for Animal Farm: the point
  at which the family was named, the six-family tool membership was
  fixed, and the cluster targeting telemetry was published at scale.
  Kaspersky did NOT attribute the cluster to France; the French-state
  reading comes from the Le Monde / CSEC Snowglobe reporting (March
  2014) that the 2014-2015 vendor reverse-engineering (ESET, G Data,
  Cyphort, Kaspersky) corroborated technically. No cited source names
  the DGSE or any specific French service.
