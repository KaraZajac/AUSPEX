initial_vector: unknown
outcome_summary: |
  Kaspersky GReAT publication on 6 March 2015 of "Animals in the
  APT Farm", joining Babar, Casper, Bunny / EvilBunny, NBot, Dino,
  and Tafacalou into a single operator's tooling family — Animal
  Farm. The post is the canonical vendor-cluster reference for
  French-attributed DGSE-Technical-Directorate tooling. Kaspersky
  cited Iranian, Syrian, Algerian, Greek, Norwegian, US, and other
  targets in its telemetry.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  The Kaspersky post follows the 18 February 2015 Babar disclosures
  by G Data and Cyphort and the 5 March 2015 ESET Casper post. It
  is the editorial-consolidation moment for Animal Farm: the point
  at which the family was named, the tool membership was fixed,
  and the targeting telemetry was published at scale. Kaspersky
  did not formally attribute to France but used framing consistent
  with the Le Monde / CSEC Snowglobe reading.
