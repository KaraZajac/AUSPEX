doctrine_links:
  - doctrine_id: uk/five-eyes
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      KARMA POLICE / BLACK HOLE is a GCHQ bulk-SIGINT
      programme — the canonical operational expression of the
      UK's UKUSA / Five-Eyes bulk-collection leg. The cited
      Intercept article documents the GCHQ collect-everything
      modality (probes on the trans-Atlantic fiber-optic cables
      landing in Cornwall; the aim of "a web browsing profile
      for every visible user on the internet") and references
      the Five Eyes alliance, but only in the context of the
      legal/oversight regime (no extra privacy protection for
      Five-Eyes citizens; GCHQ's lighter oversight vs the NSA) —
      it does NOT state that KARMA POLICE / BLACK HOLE data is
      collected for or shared with the Five-Eyes partners (no
      collect-once / share-across-partners statement, no
      federated-query / ICReach / MAILORDER detail). The
      UKUSA-contribution reading is therefore inferred from the
      programme's nature and GCHQ's Five-Eyes membership, not
      stated in-source → strongly_inferred (NOT attested).
      Held conservative per the no-upgrade rule, consistent with
      the sibling MUSCULAR and Cable & Wireless disclosures
      (the HACIENDA source, by contrast, earns attested because
      it explicitly states the scan DB is shared across the
      Five Eyes via MAILORDER — this source has no equivalent).
    attesting_source_id: intercept/2015-09-25_karma-police-gchq
    inference_basis:
      source_id: intercept/2015-09-25_karma-police-gchq
      signals:
        - "The Intercept documents KARMA POLICE / BLACK HOLE as a GCHQ bulk web-browsing dragnet aiming for 'a web browsing profile for every visible user on the internet' — the indiscriminate bulk-SIGINT modality the UKUSA UK leg encodes"
        - "Collection is via GCHQ probes on the international fiber-optic cables landing in Cornwall (the same trans-Atlantic / EU bearer topology that is the UK's documented Five-Eyes contribution)"
        - "The article situates KARMA POLICE within the Five Eyes alliance (oversight-regime context: no extra privacy protection for Five-Eyes citizens; GCHQ's lighter oversight vs the NSA)"
      ruled_out: |
        purely-domestic / non-UKUSA collection — implausible
        given GCHQ's Five-Eyes membership and the global ("every
        visible user") scope, but the second-party collect-and-
        share PURPOSE for KARMA POLICE / BLACK HOLE is NOT stated
        in this source (unlike the HACIENDA/MAILORDER source that
        earns attested), so the link stops at strongly_inferred
        rather than attested.
    contested: false
    analyst: claude
