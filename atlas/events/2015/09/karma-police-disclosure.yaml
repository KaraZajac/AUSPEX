id: 2015-09/karma-police-disclosure
name: KARMA POLICE — Snowden disclosure of GCHQ bulk web-browsing dragnet
start_date: 2008-01-01  # earliest documented KARMA POLICE tasking in published slides
disclosure_date: 2015-09-25
end_date: null
incident_type:
  - bulk-collection
initial_vector: signals-intelligence-partnership
outcome_summary: |
  The Intercept (Ryan Gallagher, 25 September 2015) published
  Snowden-archive documents describing KARMA POLICE — GCHQ's
  flagship web-browsing-pattern dragnet, designed to link
  specific IP addresses to the websites they visit and (where
  cookie-resolution succeeds) to specific identities. Run from
  GCHQ Bude on TEMPORA bearer feed; by 2012 the underlying
  BLACK HOLE metadata pool held approximately 1.1 trillion web-
  browsing events. Companion programmes named in the disclosure:
  MUTANT BROTH (cookie-to-IP resolution), MARBLED GECKO (Google
  Maps queries), INFINITE MONKEYS (web-forum content),
  SOCIAL ANTHROPOID (social-media metadata), and the BROAD OAK /
  HARD ASSOC analytic frameworks.
false_flag_risk: low
summary: |
  KARMA POLICE is the canonical Snowden disclosure of GCHQ
  bulk web-browsing analytics. The Intercept article is the
  primary-source reference both for the named programme and
  for the broader GCHQ analytic ecosystem it sits within —
  the article publishes operator slide decks describing each
  named programme and its place in the analyst workflow.

  Doctrinally KARMA POLICE is the analytic-layer counterpart to
  TEMPORA's collection layer: TEMPORA grabs the bearer-cable
  traffic, KARMA POLICE makes that traffic searchable by
  identity over time. The two together constitute the GCHQ
  bulk-SIGINT modality whose lawfulness was litigated at the
  Investigatory Powers Tribunal (2014-2015) and re-regulated by
  the 2016 Investigatory Powers Act. AUSPEX tags this event to
  uk/five-eyes (the underlying upstream taps were Five Eyes
  cooperation) and notes it as a doctrinally significant
  predecessor to the post-2016 IPA bulk-personal-dataset
  regime.

  Significance for AUSPEX attribution work: KARMA POLICE is
  the most explicit Snowden-era documentation of GCHQ
  identity-resolution capability against generic internet
  users at scale — a load-bearing fact when assessing
  whether more recent NCSC defensive advisories reflect
  comparable retained capability on the offensive side.
