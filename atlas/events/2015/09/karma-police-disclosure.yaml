id: 2015-09/karma-police-disclosure
name: KARMA POLICE — Snowden disclosure of GCHQ bulk web-browsing dragnet
start_date: 2007-01-01  # KARMA POLICE plans drawn up 2007-2008; BLACK HOLE data from Aug 2007 per The Intercept
disclosure_date: 2015-09-25
end_date: null
incident_type:
  - bulk-collection
initial_vector: unknown
outcome_summary: |
  The Intercept (Ryan Gallagher, 25 September 2015) published
  Snowden-archive documents describing KARMA POLICE — GCHQ's
  flagship web-browsing-pattern dragnet, designed to provide
  the agency with "either (a) a web browsing profile for every
  visible user on the internet, or (b) a user profile for every
  visible website on the internet." GCHQ vacuums up browsing
  histories using "probes" tapping international fiber-optic
  cables; the data flows into a massive metadata repository named
  BLACK HOLE. Per the documents, between August 2007 and March
  2009 BLACK HOLE stored more than 1.1 trillion "events"
  (metadata records, ~10 billion added daily), of which the
  largest slice (41% as of March 2009) was internet browsing
  histories; by 2012 GCHQ was storing ~50 billion metadata
  records per day with plans to reach 100 billion/day. Companion
  systems named in the disclosure: MUTANT BROTH (cookie/IP
  resolution against BLACK HOLE), MARBLED GECKO (Google Maps
  queries), INFINITE MONKEYS (web-forum content), SOCIAL
  ANTHROPOID, and the SAMUEL PEPYS and BLAZING SADDLES analytic
  tools.
false_flag_risk: none
summary: |
  KARMA POLICE is the canonical Snowden disclosure of GCHQ
  bulk web-browsing analytics. The Intercept article is the
  primary-source reference both for the named programme and
  for the broader GCHQ analytic ecosystem it sits within —
  the article publishes operator slide decks describing each
  named programme and its place in the analyst workflow.

  Doctrinally KARMA POLICE is the analytic / identity-resolution
  layer of GCHQ bulk SIGINT: where the cable "probes" and the
  TEMPORA content-collection capability (the article notes
  TEMPORA mines email/IM/voice and exposes it via XKEYSCORE)
  feed the take, KARMA POLICE and MUTANT BROTH make that
  metadata searchable by identity over time against the BLACK
  HOLE repository. (The cited article describes BLACK HOLE as
  fed by the fiber-optic probes and describes TEMPORA as a
  parallel content capability; it does not state that KARMA
  POLICE is fed by TEMPORA specifically — AUSPEX treats them as
  components of the same GCHQ bulk-SIGINT modality.) That
  modality's lawfulness was litigated at the Investigatory
  Powers Tribunal (2014-2015) and re-regulated by the 2016
  Investigatory Powers Act. AUSPEX tags this event to
  uk/five-eyes as the GCHQ bulk-SIGINT doctrine and notes it as
  a doctrinally significant predecessor to the post-2016 IPA
  bulk-personal-dataset regime.

  Significance for AUSPEX attribution work: KARMA POLICE is
  the most explicit Snowden-era documentation of GCHQ
  identity-resolution capability against generic internet
  users at scale — a load-bearing fact when assessing
  whether more recent NCSC defensive advisories reflect
  comparable retained capability on the offensive side.
