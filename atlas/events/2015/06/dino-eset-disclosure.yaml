initial_vector: unknown
outcome_summary: |
  ESET WeLiveSecurity (Joan Calvet) disclosure on 30 June 2015 of
  the Dino espionage backdoor, joined to the Animal Farm tooling
  family (Babar, Bunny / EvilBunny, Casper). ESET analyzed a
  modular implant featuring a custom command interpreter, a
  bespoke virtual file-system, French-language code artifacts
  ("arithmetique" string, French date / time formatting in code
  paths), and Iranian targeting in the available telemetry.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Dino deepens the Animal Farm cluster characterization by
  adding a fourth distinct implant (after Babar, Bunny / EvilBunny,
  Casper) with shared French-language tradecraft. The Iranian
  targeting orientation is editorially consistent with French
  foreign-intelligence priorities and with the Le Monde / CSEC
  Snowglobe framing. ESET stops short of formal French
  attribution but uses "allegedly French" language; AUSPEX
  records auspex_assessment as concur on the basis of vendor
  consensus plus Snowden / Le Monde precedent.
