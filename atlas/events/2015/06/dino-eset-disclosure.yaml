id: 2015-06/dino-eset-disclosure
name: ESET Dino implant disclosure (Iranian-targeted Animal Farm backdoor)
start_date: 2013-01-01  # AUDIT 2026-07-10: ESET documents ONE Dino sample "used in 2013 against targets in Iran"; 2013-01-01 = year-floor placeholder, precise deployment date unpublished (v1.3 "likely deployed at some point," undated)
disclosure_date: 2015-06-30
end_date: null  # AUDIT 2026-07-10: was 2015-06-30 (= the disclosure date — a conflation). ESET documents only 2013 targeting; operational END is unpublished. disclosure != end.
incident_type:
  - documentary
  - espionage
initial_vector: unknown
outcome_summary: |
  ESET WeLiveSecurity (Joan Calvet) disclosure on 30 June 2015 of
  the Dino espionage backdoor, joined to the Animal Farm tooling
  family (Babar, Bunny / EvilBunny, Casper). ESET analyzed a C++
  modular implant (named modules PSM / CORE / CRONTAB / FMGR /
  CMDEXEC / CMDEXECQ / ENVVAR) whose main goal "seems to be the
  exfiltration of files from its targets," featuring a custom
  in-memory file system the developers named "ramFS" and a
  cron-like task-scheduling module (CRONTAB). ESET's two
  French-speaking-developer artifacts are a Windows resource
  language code 1036 = "French (France)" and GnuMP build paths
  containing the French word "arithmetique" ("the French
  translation of 'arithmetic'"). The documented sample "was used
  in 2013 against targets in Iran."
quantified_impact:
  countries_affected: 1  # AUDIT 2026-07-10: Iran (ESET: victims "located in Iran in 2013"). Was {}.
false_flag_risk: none
operators_named: []
summary: |
  Dino deepens the Animal Farm cluster characterization by adding a
  fourth distinct implant (after Babar, Bunny / EvilBunny, Casper).
  ESET is "very confident that Dino was developed by the Animal Farm
  group," basing that on shared code — the same Casper API-name
  hashing (ROL-7 + XOR), the shared sandbox-process-name check also
  seen in Bunny, the ramFS custom file system present in Animal Farm
  droppers, and a sysinfo "beacon" resembling the leaked CSE SNOWBALL
  implant. ESET stops short of formal French attribution: the title
  calls it an "allegedly French espionage group" and ESET relays
  CSE's assessment "with 'moderate certainty' that this group is a
  French intelligence agency," while adding its own
  French-speaking-developer indicators for Dino (resource language
  code 1036 = French (France); "arithmetique" build paths). The
  Iranian targeting is editorially consistent with French
  foreign-intelligence priorities and with the CSE Snowglobe framing.
  AUSPEX records auspex_assessment as concur-with-caveat: the Animal
  Farm cluster membership is robust, but France-as-state remains a
  CSE moderate-certainty relay with no French service named, so the
  actor is held at fr/unscoped.
attributions:
  - actor_id: fr/unscoped/animal-farm
    service_id: null  # was fr/dgse/technical-directorate; demoted 2026-06-24 — no cited source names the DGSE/Technical Directorate (see actor notes). Re-verified 2026-07-10: "DGSE"=0 in the ESET raw.
    attributing_org: ESET (Joan Calvet)
    attributing_org_confidence: moderate  # AUDIT 2026-07-10: ESET is "very confident" of Dino's Animal Farm membership (high, cluster) but France-as-state is only CSE "moderate certainty" (relayed) + French-speaking-developer artifacts; net moderate for the fr/ actor.
    attribution_level: named-actor  # AUDIT 2026-07-10 (was MISSING): ESET firmly names the Animal Farm GROUP (high conf). NATION reached only via CSE's relayed "moderate certainty that this group is a French intelligence agency"; no named-unit (no DGSE). Matches the Casper sibling.
    auspex_assessment: concur-with-caveat  # AUDIT 2026-07-10: was concur. ESET is hedged on France ("allegedly French"; CSE moderate-certainty relay). Robust Animal Farm cluster membership; caveat = France-as-state unproven, no service named, actor held at fr/unscoped. Aligns with the actor record + Casper sibling.
    attribution_date: 2015-06-30
    attribution_source_id: eset/2015-06-30_dino-spying-malware-analyzed
    notes: |
      ESET is "very confident that Dino was developed by the Animal
      Farm group," basing that NAMED-GROUP link on shared code (the
      same Casper API-name hashing ROL-7/XOR; the shared
      sandbox-process-name check also present in Bunny; the ramFS
      custom file system present in Animal Farm droppers; a sysinfo
      beacon resembling the leaked CSE SNOWBALL implant). On
      nationality ESET relays CSE, which "assess with 'moderate
      certainty' that this group is a French intelligence agency,"
      and titles the post "allegedly French," while adding its own
      French-speaking-developer artifacts for Dino specifically: a
      Windows resource language code 1036 = "French (France)" and
      GnuMP build paths "..\\..\\src\\arithmetique\\...". No cited
      source names the DGSE or any French service ("DGSE"=0 in the
      raw) -> service_id null; actor held at fr/unscoped;
      attribution_level named-actor; auspex_assessment
      concur-with-caveat. NB: Dino's in-binary French artifacts make
      its France nexus somewhat firmer than Casper's (where ESET
      found "no signs of French origin"), but France-as-state remains
      CSE's relayed assessment, not an ESET assertion. ESET also
      raised and REJECTED a false-flag reading of the 1036 language
      code ("Someone using the language code as a false flag would
      have likely kept the strategy going") -> false_flag_risk none.
doctrine_links:
  - doctrine_id: fr/lutte-informatique-offensive
    pillar_id: fr/lutte-informatique-offensive/intelligence-preparation
    program_id: null
    confidence: plausible
    reasoning: |
      The documented Dino sample "was used in 2013" (ESET) — six
      years before LIO was publicly articulated (2019). Mapped
      retroactively to the intelligence-preparation-of-the-environment
      function LIO later codified — the mapping the LIO doctrine
      record itself prescribes for the Animal Farm family ("fits this
      pillar retroactively at plausible confidence"). Held at
      PLAUSIBLE, not attested: no cited source states a French
      strategic GOAL for Dino — ESET describes only the malware's
      technical goal, "the exfiltration of files from its targets" —
      and France-as-state is itself only CSE moderate-certainty.
    attesting_source_id: eset/2015-06-30_dino-spying-malware-analyzed
    inference_basis:
      alternatives:
        - "French intelligence-preparation / foreign-intelligence collection (the LIO intelligence-preparation pillar, applied retroactively): Dino is a modular espionage backdoor whose main goal ESET reads as file exfiltration, deployed against targets in Iran — consistent with the CSE-relayed French provenance of the Animal Farm family and French foreign-intelligence priorities."
        - "Pre-doctrinal DGSE foreign-intelligence collection under pre-2018 authorities with no reference to LIO: the documented Dino sample was used in 2013, six years before LIO was articulated (2019), so the mapping is anachronistic and the op is more precisely generic espionage than preparation for later military cyber effects."
        - "Attribution-contingent: France-as-state rests on CSE's 'moderate certainty' relayed by ESET plus French-speaking-developer artifacts, not a formal French attestation, so any French-doctrine reading is contingent on the cluster's France provenance holding."
    counter_explanation: |
      DGSE foreign-intelligence collection under pre-2018
      authorities, without specific reference to LIO doctrine.
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government
    country: ir
    role: primary
    outcome: |
      AUDIT 2026-07-10: ESET states only that "the sample of Dino
      documented in this blog post was used in 2013 against targets
      in Iran" and that "we know very little except that they were
      located in Iran in 2013," which ESET notes "is in accordance
      with the victimology described by Canada's CSE." NO specific
      victim sector is stated for the Dino sample. sectors/government
      is retained as the broadest node consistent with the
      CSE-described state-espionage victimology and country: ir pins
      the one hard fact; the earlier sectors/government/foreign-ministry
      sub-sector was UNSOURCED (no "foreign-ministry"/diplomatic
      mention in either raw) and has been removed, as was the second
      bare sectors/government entry (no country). Kaspersky's
      cluster-wide Tafacalou victimology lists Iran among nine
      affected countries (Syria, Iran, Malaysia, USA, China, Turkey,
      Netherlands, Germany, Great Britain), not Dino-specifically.
