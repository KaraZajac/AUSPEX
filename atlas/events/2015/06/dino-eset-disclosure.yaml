id: 2015-06/dino-eset-disclosure
name: ESET Dino implant disclosure (Iranian-targeted Animal Farm backdoor)
start_date: 2013-01-01  # earliest Dino samples per ESET telemetry; precise deployment-date range unpublished
disclosure_date: 2015-06-30
end_date: 2015-06-30
incident_type:
  - documentary
