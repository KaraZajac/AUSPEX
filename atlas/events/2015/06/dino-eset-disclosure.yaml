  notes: |
    Full 6-point audit vs the two cited RAW snapshots (tier=primary PRESERVED):
      • ESET welivesecurity Dino article — NEWLY captured + hashed this date:
        content_sha256 f4e1bc0d…f2519, 97627 bytes. STEP-0 triage: NOT a phantom —
        curl HTTP 200, <title> "Dino – the latest spying malware from an allegedly
        French espionage group analyzed"; body carries the claims.
      • Kaspersky "Animals in the APT Farm" — content_sha256 25c24574…066e5, 180845
        bytes, RE-VERIFIED unchanged (secondary corroborator).

    [a] FACTS — corrected AI-embellishment + an unsourced target:
      • FABRICATION: outcome_summary claimed a French-language artifact of "French
        date / time formatting in code paths" — NOT in the raw. ESET's TWO
        French-speaking-developer artifacts are (1) a Windows resource language code
        "1036 … French (France)" and (2) GnuMP build paths "..\..\src\arithmetique\..."
        ("'arithmetique' is the French translation of 'arithmetic'"). Rewrote to the
        real evidence. ("arithmetique"=6 hits in raw; the date strings 04/01/2015 /
        "7th April 2015" are ESET's own illustrative sysinfo/cron EXAMPLES, never
        described as French formatting.)
      • "bespoke virtual file-system" → ESET's exact object is a "custom file system
        named 'ramFS'" held in memory; "custom command interpreter" → the named
        modular command architecture (PSM/CORE/CRONTAB/FMGR/CMDEXEC/CMDEXECQ/ENVVAR)
        + cron-like CRONTAB scheduler. Reworded to source wording.
      • CONFIRMED true: Dino a modular C++ espionage backdoor; main goal "the
        exfiltration of files from its targets"; joined to Animal Farm (Babar/Bunny/
        Casper); "allegedly French"; disclosed 30 Jun 2015 by Joan Calvet; sample
        "used in 2013 against targets in Iran."
      • quantified_impact {} → {countries_affected: 1} (Iran).

    [b] ATTRIBUTION — ESET verbatim: "All these indicators together make us very
      confident that Dino was developed by the Animal Farm group" (CLUSTER, high
      conf) and, on nation, relays CSE: "CSE assess with 'moderate certainty' that
      this group is a French intelligence agency"; title = "allegedly French
      espionage group." Corrections: auspex_assessment concur → concur-with-caveat
      (hedged France link; aligns with actor record + Casper sibling); added
      attribution_level: named-actor (group named high-conf; nation only CSE-moderate;
      no unit) + a per-attribution notes block. service_id already correctly null —
      grep "DGSE"=0 in the 97 KB raw. attributing_org_confidence kept moderate.

    [c] DATES — disclosure_date 2015-06-30 = ESET byline ("Joan Calvet 30 Jun 2015") ✓.
      start_date 2013 = "used in 2013 against targets in Iran" ✓ (year-floor comment
      corrected: ESET documents ONE sample, not "2013-2015 telemetry"). end_date
