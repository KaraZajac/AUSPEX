qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-10
  level: full   # every load-bearing claim carried by a snapshotted source (NPR + RAND + CNBC + BBC); the NYT primary is bot-walled/un-snapshottable but redundant (facts mirror-corroborated by snapshotted NPR)
  notes: |
    FALSE-FLAG / ATTRIBUTION-CRITICAL event (sibling of the Warsaw
    Stock Exchange and TV5Monde CyberCaliphate operations),
    re-sourced end to end. The prior event over-attested: it
    asserted a firm APT28/GRU attribution at moderate/concur-with-
    caveat + false_flag_risk: confirmed, and cited
    bbc/2015-04-09_tv5monde-cyberattack as the attribution_source_id
    — a WRONG-SOURCE (a TV5Monde article, published the day of the
    TV5Monde attack and titled "France's TV5Monde 'hit by Islamic
    State hackers'"; it carries NO Russia/APT28 attribution, only a
    one-line CENTCOM aside). Attribution re-pointed to the genuine
    iSight assessment (CNBC) and DOWNGRADED to match what sources
    support for CENTCOM specifically.
    [a] FACTS: All load-bearing facts now carried by snapshotted
    sources. NPR (sha256 3eebac6d8e8f5e41df75c4ba4d954272c40c57aa1
    ef8bb7ae268d4b9d8c6fabb): "The Twitter feed and the YouTube
    channel of U.S. Central Command were compromised on Monday";
    hackers "put up Islamic State propaganda and switched the
    avatar from the CentCom logo to a photo of a masked fighter";
    CENTCOM "viewing this purely as a case of cybervandalism,"
    "operational military networks were not compromised," "no
    classified information was posted and ... none of the
    information posted came from CENTCOM's server or social media
    sites"; hackers "released what they purported was a phone list
    of retired U.S. generals, as well as what appear to be
    presentation slides from the government-funded Lincoln
    Laboratory at MIT"; Reuters: images "do not appear to pose a
    security threat or include classified information"; "Twitter
    and YouTube have suspended the accounts." RAND (sha256
    cc77f6f077c08b17a9835499a3d9844c3d7002a470d214c8e1182792f4f04fdf):
    "ISIS hackers briefly took over the Twitter account"; "To
    hijack a Twitter account merely requires that hackers guess
    the correct password"; NIPRNet/SIPRNet not breached; "damaging
    to the counterinsurgency against ISIS"; "What ISIS did was a
    propaganda coup." STRIPPED unsupported/embellished claims from
    the prior summary: (1) the takeover occurred "during President
    Obama's prepared remarks on cybersecurity at the National
    Cybersecurity Communications Integration Center" — WRONG venue
    (Obama's 2015-01-12 cyber remarks were at the FTC on consumer
    data privacy; the NCCIC/DHS visit was 2015-01-13, and he cited
    the hack the NEXT day) and not snapshot-carried — REMOVED;
    (2) the precise "~30 minutes" duration was not in either
    snapshot, softened to "briefly" (RAND, verbatim); (3)
    "general-officer addresses" narrowed to the snapshot-carried
    "phone list of (mostly retired) generals" + Lincoln Lab slides
    (dropped "home addresses" and "maps of North Korea," which
    appear only in un-snapshotted press). name updated to flag the
    false-flag persona.
    [b] ATTRIBUTION: Restructured to the claimed-vs-assessed
    false-flag pattern (mirrors the Warsaw audit) and DOWNGRADED.
    Added the CLAIMED actor (actor_id null, jihadist "CyberCaliphate"
    persona, auspex contested). The ASSESSED APT28 entry: re-pointed
    attribution_source_id from the wrong BBC-TV5Monde article to
    cnbc/2015-07-14_cybercaliphate-not-isis (sha256 f040ad29a9b9cb0
    b21dde151e81c8e2330d7bf846afeae1b0b4f1d4f987ea372), which
    directly names CENTCOM — "the group had also seized control of
    the U.S. military's Central Command Twitter account" — and
    carries iSight's assessment: "Cyber Caliphate is likely ... a
    'false flag' operation ... operated by a group of Russians —
    not ISIS sympathizers," sharing infrastructure with "the group
    we call the Tsar Team" (iSight's APT28). Confidence lowered
    moderate->low and auspex concur-with-caveat->contested, because
    for CENTCOM the APT28 link is TRANSITIVE (persona-level only; no
    CENTCOM-specific technical attribution) and iSight could not say
    "whether the groups are operated by the Russian government,
    Russian criminals, or some other type of Russian entity" and
    "A spokesman for the director of National Intelligence declined
    to comment." attribution_level activity-cluster for both.
    false_flag_risk: confirmed -> suspected (iSight assessed the
    persona as a false flag, but the CENTCOM-specific state chain is
    unconfirmed and contemporaneous RAND read it as ISIS).
    [c] DATES: single-day event 2015-01-12 (start = disclosure =
    end) — unchanged, confirmed (NPR "compromised on Monday" =
    Mon 2015-01-12; the takeover/response resolved same day). Each
    source published_on verified: NPR 2015-01-12 (byline + "Update
    at 5:30 p.m. ET"); RAND 2015-02-03 (page JSON-LD datePublished
    "2015-02-03", authors Gompert & Libicki); CNBC 2015-07-14; BBC
    2015-04-09. Claimed-actor attribution_date 2015-01-12 (NPR);
    APT28 attribution_date 2015-07-14 (CNBC) — both align with their
    cited source's published_on.
    [d] DOCTRINE_LINKS: both NON-attested (no source cites Russian
    doctrine for this op) and DOWNGRADED to plausible with
    structured inference_basis.alternatives — because the doctrinal
    reading is contingent on the CONTESTED Russian attribution.
    ru/gerasimov-framework/non-military-means (was strongly_inferred
    -> plausible) and ru/military-doctrine-2014/destabilization-via-
    info (was strongly_inferred -> plausible). Both flag the live
    ISIS-hacktivism alternative. Note: unlike Warsaw, the 2014
    Military Doctrine (issued 2014-12-25) PREDATES this op by ~2.5
    weeks — no anachronism — but the attribution contingency
    dominates. perspective: attacker-rationale on both (Russian
    doctrine on a Russian-attributed op; the surviving APT28
    attribution keeps actor-state = ru == doctrine-state, so no
    doctrine-state-mismatch gate issue).
    [e] ATTRIBUTION_LEVEL: added — activity-cluster for the claimed
    jihadist persona AND for the assessed APT28-via-persona link
    (deliberately NOT named-actor: the CENTCOM->APT28 tie is
    transitive/persona-level and iSight hedged state-vs-criminal).
    [f] ACTOR_ID: ru/gru/26165/apt28 resolves to atlas actor id
