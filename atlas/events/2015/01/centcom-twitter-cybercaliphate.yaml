id: 2015-01/centcom-twitter-cybercaliphate
name: US Central Command Twitter/YouTube takeover under CyberCaliphate persona
start_date: 2015-01-12
disclosure_date: 2015-01-12
end_date: 2015-01-12
incident_type:
  - disruption
  - influence-operation
initial_vector: valid-creds
outcome_summary: |
  US Central Command's official Twitter and YouTube accounts
  were taken over for approximately 30 minutes on 2015-01-12 by
  an actor publishing under the CyberCaliphate persona, posting
  pro-ISIS content and a list of purported US general-officer
  addresses (later determined to be open-source aggregation, not
  classified material). The takeover occurred during President
  Obama's prepared remarks on cybersecurity at the National
  Cybersecurity Communications Integration Center. Subsequent
  Western analysis tied the persona to the GRU operations that
  also produced the Warsaw Stock Exchange (2014) and TV5Monde
  (2015) operations.
false_flag_risk: confirmed
summary: |
  The CENTCOM takeover is the highest-profile US-target instance
  of the CyberCaliphate false-flag persona. Tactically minor — no
  classified material exposed — but doctrinally significant as
  the most prominent timing-aligned Russian information-domain
  operation against a US military information channel in the
  pre-2016 election period.
