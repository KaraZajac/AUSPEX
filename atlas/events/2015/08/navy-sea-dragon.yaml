id: 2015-08/navy-sea-dragon
name: US Navy / Sea Dragon submarine-warfare data theft
start_date: 2017-01-01  # WaPo reported 2018 with intrusion period 2017-early 2018
disclosure_date: 2018-06-08
end_date: 2018-02-28
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Hundreds of GB of US Navy submarine-warfare R&D — including the
  Sea Dragon program (anti-ship Tomahawk variant for submarines) —
  exfiltrated from a Naval Undersea Warfare Center contractor.
false_flag_risk: none
summary: |
  Disclosed by Washington Post (June 2018). No DOJ indictment; US
  official attribution to "China-based" actors. Reporting and
  follow-on vendor consensus place the intrusion within the
  broader MSS-linked Cloud Hopper-era MSP and contractor-pivot
  pattern (APT10 / Stone Panda or adjacent clusters): spear-
  phishing of contractor IT staff at the Naval Undersea Warfare
  Center supplier, valid-credentials lateral movement into the
  contractor's unclassified network, deployment of PlugX and
  Cobalt Strike beacons with DLL side-loading via signed binaries
  for defense evasion, web shells on internet-facing servers,
  Mimikatz credential dumping, and bulk staged exfiltration of
  hundreds of gigabytes of Sea Dragon program documents, signals-
  data libraries, and submarine cryptographic-system materials.
