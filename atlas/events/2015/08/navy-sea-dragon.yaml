  notes: "China-nexus theft of US Navy Sea Dragon submarine-warfare data. Sole source (WaPo, 2018-06-08) fetched in full + hashed (raw_snapshot washington-post__2018-06_sea-dragon-navy.html, sha256 2bff7c34...; embedded JSON-LD datePublished 2018-06-08T18:17:08Z) -> level: full. FACTS verified verbatim: 614 GB taken ('Taken were 614 gigabytes of material relating to a closely held project known as Sea Dragon, as well as signals and sensor data, submarine radio room information relating to cryptographic systems, and the Navy submarine development unit's electronic warfare library'); victim = an unnamed contractor to the Naval Undersea Warfare Center, Newport R.I.; data on an unclassified network, classified-in-aggregate; no DOJ indictment, ongoing Navy/FBI investigation. CORRECTIONS: (1) DATES — start_date 2017-01-01 -> 2018-01-01 (WaPo: 'The breaches occurred in January and February' = 2018, not 2017); end_date 2018-02-28 kept. Slug 2015-08 is wrong but slugs are stable-forever (never renamed) so the id is retained with an inline note. (2) ATTRIBUTION — actor_id cn/pla/apt1 was FLATLY WRONG: APT1 is PLA Unit 61398, and WaPo explicitly attributes the hack to the MSS and contrasts it against the PLA ('Investigators say the hack was carried out by the Chinese Ministry of State Security ... an MSS division in the province of Guangdong'; 'Although the Chinese People's Liberation Army is far better-known than the MSS ...'). Fixed to actor_id: null + service_id: cn/mss + attribution_level: named-unit (the source names the MSS Guangdong division but NO APT cluster; AUSPEX adopts none — note that Guangdong resembles the APT3/Boyusec lineage but no back-fit is made). attributing_org_confidence kept moderate (single secondary source, anonymous officials). (3) SUMMARY — stripped FABRICATED tradecraft absent from the source: PlugX, Cobalt Strike, DLL side-loading, web shells, Mimikatz, spear-phishing of IT staff, valid-creds lateral movement, and the 'APT10/Stone Panda/Cloud Hopper-era MSP' framing (APT10 is MSS-Tianjin, contradicting the WaPo MSS-Guangdong attribution); WaPo reports NO vector or tooling. Also corrected 'anti-ship Tomahawk variant' -> 'supersonic anti-ship missile' (string 'tomahawk' appears 0x in the article; WaPo: 'a supersonic anti-ship missile for use on U.S. submarines by 2020'). (4) DOCTRINE LINKS — cn/mcf/dual-use-research kept strongly_inferred and upgraded its evidence: WaPo states the goal in substance ('blunt the U.S. advantage in military technology', 'closing the gap in undersea warfare one of its three top military priorities') so attesting_source_id set to the WaPo source and inference_basis {signals, ruled_out} added; held at strongly_inferred (not attested) because WaPo names the military-modernization end but not the civil-military-fusion mechanism MCF encodes. cn/mic2025/maritime DOWNGRADED strongly_inferred -> plausible (over-attestation): the theft is a weapons program framed as military advantage, not the civilian maritime-industry competitiveness MIC2025 is about; inference_basis {alternatives} + counter_explanation added, link kept as a documented adjacency. published_on (source) confirmed 2018-06-08. FK NOTE (out of single-event scope): target orgs/us-navy-nuwc-contractor has no targets-registry entry, but orgs/ target-FK gaps are gate-informational corpus-wide (targets/ normalization deferred), so a known tolerated gap, not a per-event defect."
