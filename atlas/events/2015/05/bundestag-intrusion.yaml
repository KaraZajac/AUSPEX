id: 2015-05/bundestag-intrusion
name: German Bundestag intrusion
start_date: 2015-04-30
disclosure_date: 2015-05-15
end_date: 2015-05-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  ~16 GB of data exfiltrated from the German Bundestag's
  parliamentary network. Network offline for days. UK FCDO Oct
  2020 sanctions on GRU Unit 26165 and officer Dmitry Badin;
  German federal prosecutor issued an arrest warrant for Badin.
quantified_impact:
  data_exfiltrated_gb: 16
false_flag_risk: none
summary: |
  Fancy Bear / APT28 spearphishing → X-Agent deployment → lateral
  movement → prolonged compromise of the German federal
  parliamentary network. Among the longest publicly known GRU
  intrusions of a NATO legislature.
attributions:
  - actor_id: ru/gru/26165/apt28
    attributing_org: German BfV / UK FCDO
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-10-22
    attribution_source_id: ukgov/2020-10-22_bundestag-gru-26165-sanctions
doctrine_links:
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/nato-as-principal-threat
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targeting of a NATO legislature for strategic political
      espionage. UK sanctions language frames the operation as
      a GRU campaign against allied governments — consistent with
      NATO-as-principal-threat targeting under the 2014 Military
      Doctrine.
    attesting_source_id: ukgov/2020-10-22_bundestag-gru-26165-sanctions
