  notes: |
    Audited vs 4 raw-snapshotted sources (RE-SOURCED per the badrabbit
    model: the event previously carried claims — 16 GB, X-Agent,
    "offline for days", the Badin name/warrant — that neither cited
    source supported; the UK FCDO page carries the attribution but not
    those specifics). Snapshots (first8…last8 · bytes):
      ukgov  c9c4560d…65d2cc70 · 79,623
      ccdcoe 096725cf…881bfc2e7c · 30,549 (curl 200; WebFetch 403-walled)
      belling 94f2b671…f88deb3c · 83,032
      netzp  d1c2ca9b…d5467b01 · 233,560

    [a] FACTS — all retained claims now source-carried.
    • 16 GB: CCDCOE "Approximately over 16 GB of data was stolen";
      Bellingcat "over 16 gigabytes of data had been sucked up ...
      complete mailboxes of German parliamentarians". quantified_impact
      data_exfiltrated_gb: 16 kept.
    • Network offline: CCDCOE "The German parliament's computer system
      was shut down for four days" — sharpened the vague "offline for
      days" to "four days".
    • Initial vector = phishing: CCDCOE "MPs received an email from the
      address 'UN.org' ... designed like a UN News Bulletin. Clicking
      on the link ... led to the installation of the malware ... The
      malware was then able to spread and eventually infiltrated the
      networks of the Parliament" — supports spear-phishing + lateral
      spread + several-months access.
    • CORRECTION: "X-Agent" → "X-Tunnel". netzpolitik (the June-2015
      forensic report) documents the implant as Xtunnel: "the same
      authors of the malware seem to have called it „Xtunnel" ... acts
      as a tunnel for the attacker to remotely access the internal
      network and maintain persistence." NO snapshotted source names
      X-Agent for this hack.
    • REMOVED unsourced superlative "Among the longest publicly known
      GRU intrusions of a NATO legislature" (no source carries it).
    • Chancellor's-office access: CCDCOE "managed to access a computer
      in the parliamentary office of the chancellor"; UK FCDO appendix
      "Chancellor Angela Merkel ... affected".
    • Badin: CORRECTION to outcome — the UK FCDO page sanctions "two
      Russian GRU officers and ... unit 26165" but does NOT print the
      officers' names (no "Badin" on the page). Reworded so the Badin
      NAME is tied to its actual source — Germany's Federal Prosecutor's
      May 2020 warrant (Bellingcat: "On 5 May 2020 ... Germany's Federal
      Prosecutor has issued an arrest warrant against Russian citizen
      Dmitry Badin", "member of GRU's elite hacking unit 26165 ...
      APT28") — and the UK sanctions to "unit 26165 and two GRU
      officers".

    [b] ATTRIBUTION — UK FCDO: "the GRU's military intelligence unit
    26165 – codenamed APT28 and Fancy Bear – which were responsible for
    the 2015 cyber attacks on Germany's Parliament"; "NCSC assess with
    high confidence that the GRU was almost certainly responsible."
    Kept attributing_org_confidence: high, auspex concur. Changed
    attributing_org "German BfV / UK FCDO" → "UK FCDO (NCSC) / German
    authorities" (BfV not named verbatim in any cited source; CCDCOE
    carries "German Authorities indicate ... 'APT 28' is responsible").

    [c] DATES — source published_on set to true pub dates (ukgov
    2020-10-22, ccdcoe 2021-06-04 "last edited", bellingcat 2020-05-05,
    netzpolitik 2015-06-19). Event start 2015-04-30 / disclosure
    2015-05-15 / end 2015-05-31 kept: consistent with UK FCDO "In April
    and May 2015 the German federal parliament ... was attacked" and
    CCDCOE "detected in May 2015" (minor tension: CCDCOE also says the
    lure arrived "At the beginning of 2015" and access ran "several
    months" — start could be earlier; the primary source's "April"
