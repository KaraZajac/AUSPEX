    [d] DOCTRINE_LINKS — kept ru/military-doctrine-2014 /
    nato-as-principal-threat at strongly_inferred (NOT upgraded to
    attested): the UK source names a general "undermine Western
    democracies" purpose, not the specific NATO-adversary goal the
