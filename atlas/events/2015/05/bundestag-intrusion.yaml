id: 2015-05/bundestag-intrusion
name: German Bundestag intrusion
start_date: 2015-04-30
disclosure_date: 2015-05-15
end_date: 2015-05-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Roughly 16 GB of data — including complete mailboxes of German
  MPs — was exfiltrated from the Bundestag network, which was taken
  offline for four days for remediation. Germany's Federal
  Prosecutor issued a May 2020 arrest warrant for GRU officer
  Dmitriy Badin (a suspected Unit 26165 / APT28 member); in October
  2020 the UK imposed asset freezes and travel bans on GRU Unit
  26165 and two GRU officers over the attack.
quantified_impact:
  data_exfiltrated_gb: 16
false_flag_risk: none
summary: |
  Fancy Bear / APT28 (Russian GRU Unit 26165) compromised the German
  federal parliament (Deutscher Bundestag). Initial access came via a
  UN-themed spear-phishing email to MPs whose malicious link
  installed malware (the X-Tunnel implant) that then spread laterally
  across the parliamentary network. The intruders held access for
  several months before detection in May 2015, reaching a computer in
  the parliamentary office of the Chancellor; roughly 16 GB of data,
  including MPs' mailboxes, was stolen.
attributions:
  - actor_id: ru/gru/26165/apt28
    attributing_org: UK FCDO (NCSC) / German authorities
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2020-10-22
    attribution_source_id: ukgov/2020-10-22_bundestag-gru-26165-sanctions
    notes: "Named-unit: the UK FCDO page names 'the GRU's military intelligence unit 26165 – codenamed APT28 and Fancy Bear' as responsible, and NCSC assesses 'with high confidence that the GRU was almost certainly responsible'. German authorities (per the CCDCOE toolkit) independently attribute the hack to APT28; Germany's Federal Prosecutor issued a May 2020 arrest warrant for GRU officer Dmitriy Badin (Bellingcat). Contemporaneous forensic reporting (netzpolitik, June 2015) tied the intrusion to Sofacy/APT28 of likely Russian origin. attributing_org generalised from the prior 'German BfV' to 'German authorities' — no cited source names the BfV verbatim."
doctrine_links:
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/nato-as-principal-threat
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      GRU Unit 26165 political-espionage penetration of the national
      legislature of Germany — a NATO member state — fits the 2014
      Military Doctrine's framing of NATO enlargement as the principal
      external military danger, whose nato-as-principal-threat pillar
      scopes cyber operations against allied-state political stability.
      The UK FCDO frames the operation as a Russian state cyber attack
      "designed to undermine Western democracies" and to "undermine
      international law and institutions". strongly_inferred rather
      than attested: the attributing source names a general
      undermining-of-allied-democracies purpose but not the specific
      NATO-adversary goal the pillar encodes.
    attesting_source_id: ukgov/2020-10-22_bundestag-gru-26165-sanctions
    inference_basis:
      signals:
        - "Target is the national parliament of Germany, a NATO member state (the intruders reached a computer in the Chancellor's parliamentary office) — the class of allied-state political target the nato-as-principal-threat pillar scopes."
        - "Perpetrator is GRU Unit 26165 (APT28), a Russian military-intelligence unit whose remit is strategic political and military espionage against NATO and allied governments."
        - "The attributing government (UK FCDO / NCSC) characterises the operation as a Russian state cyber attack 'designed to undermine Western democracies' and to 'undermine international law and institutions' — i.e. directed at the allied political order the doctrine treats as the principal adversary."
      ruled_out: "Generic opportunistic espionage with no doctrinal specificity: the deliberate targeting of a NATO-member legislature (and the Chancellor's office) by a military-intelligence unit points to the allied-political-stability objective the pillar encodes rather than untargeted collection."
    counter_explanation: null
    contested: false
    analyst: claude
