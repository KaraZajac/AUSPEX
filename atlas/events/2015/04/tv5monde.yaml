id: 2015-04/tv5monde
name: TV5Monde destructive attack under "Cyber Caliphate" false-flag persona
start_date: 2015-01-23
disclosure_date: 2015-04-08
end_date: 2015-04-09
incident_type:
  - destructive
  - influence-operation
initial_vector: phishing
outcome_summary: |
  French global broadcaster TV5Monde was knocked off air for
  18 hours on the night of April 8–9, 2015. Eleven broadcast
  channels went dark; social-media accounts were taken over to
  post pro-ISIS content under a "CyberCaliphate" persona. The
  attack involved destruction of broadcast-encoder hardware
  ("électronique grillé") requiring physical replacement and
  representing an estimated EUR 5M direct cost plus permanent
  capability damage. French (ANSSI) and partner (FireEye)
  attribution within weeks named APT28 / Sandworm-adjacent GRU
  operators, framing the CyberCaliphate persona as a Russian
  false flag.
quantified_impact:
  channels_off_air: 11
  downtime_hours: 18
  eur_estimated_cost: 5000000
false_flag_risk: confirmed
summary: |
  TV5Monde is the canonical case of a Russian false-flag cyber
  operation conducted under ISIS branding to test deniable
  destructive tradecraft against a Western broadcaster. The
  CyberCaliphate persona was used across multiple GRU operations
  in 2015 (including the Warsaw Stock Exchange and US CENTCOM
  Twitter takeover). The campaign demonstrated GRU willingness
  to mount destructive attacks against civilian media — a
  precursor pattern for subsequent operations against Olympic
  Destroyer (2018) and Ukrainian broadcasters (2022).
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: FireEye + ANSSI
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2015-06-09
    attribution_source_id: fireeye/2015-06-09_tv5monde-apt28
    notes: |
      FireEye initially attributed to APT28; subsequent analysis
      (Greenberg 2019, Mandiant) refined the assignment toward
      the Sandworm cluster on the basis of destructive-wiper
      tradecraft and infrastructure overlap with later GRU
      Unit 74455 operations.
  - actor_id: ru/gru/26165/apt28
    attributing_org: FireEye (initial)
    attributing_org_confidence: moderate
    auspex_assessment: contested
    attribution_date: 2015-06-09
    attribution_source_id: fireeye/2015-06-09_tv5monde-apt28
    notes: |
      Initial vendor attribution to APT28 (GRU Unit 26165) was
      later partially superseded by the Sandworm (Unit 74455)
      reassignment in subsequent retrospective reporting.
      Editorial decision: keep both attributions to surface the
      cluster-boundary dispute.
doctrine_links:
