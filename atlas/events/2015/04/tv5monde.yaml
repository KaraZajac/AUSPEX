    pillar_id: ru/info-security-2016/info-psychological-defense
    program_id: null
    confidence: plausible
    reasoning: |
      The 2016 Information Security Doctrine (December 2016)
      formalized the "information-psychological" sphere as a
      domain of confrontation; the TV5Monde operation operates
      under that frame but predates the doctrine's publication
      by 20 months — retrospective framing.
    attesting_source_id: null
    contested: false
    analyst: claude
  - doctrine_id: ru/gerasimov-framework
    pillar_id: ru/gerasimov-framework/non-military-means
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Operation under deniable false-flag persona — testing
      destructive Western-media disruption while attribution
      cost falls on the deniable proxy — is the canonical
      Gerasimov-framework "non-military means" execution
      pattern.
    attesting_source_id: null
    contested: false
    analyst: claude
