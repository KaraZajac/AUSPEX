id: 2015-04/tv5monde
name: TV5Monde destructive attack under "Cyber Caliphate" false-flag persona
start_date: 2015-01-23      # intrusion onset — "first penetrated the network on 23 January" (BBC 2016)
disclosure_date: 2015-04-08 # night of the destructive event: 12 channels dark 20:40 local + CyberCaliphate defacement
end_date: 2015-04-09        # broadcast restored overnight: first channel 05:25, others later that morning (BBC 2016)
incident_type:
  - destructive             # bespoke malware to "corrupt and destroy" the encoder hardware (BBC 2016)
  - disruption              # 12 channels off air ~18 hours (The Register)
  - influence-operation     # CyberCaliphate/ISIS false-flag defacement + jihadist propaganda
initial_vector: unknown     # BBC 2016: "seven different points of entry" incl. a Netherlands camera supplier; no source names phishing for the TV5Monde breach
outcome_summary: |
  French global broadcaster TV5Monde was taken off air on the night
  of 8 April 2015: at 20:40 local time all 12 of its channels went
  dark, and its website, Twitter and Facebook were defaced under a
  self-styled "CyberCaliphate" (ISIS-branded) persona that posted
  jihadist propaganda and leaked documents purporting to be ID cards
  of relatives of French soldiers in anti-IS operations. The attack
  was destructive, not merely disruptive: the perpetrators had first
  penetrated the network on 23 January 2015, ran reconnaissance, then
  built bespoke malware "to corrupt and destroy the internet-connected
  hardware ... such as the encoder systems" — TV5Monde was "a couple of
  hours from ... total destruction" before an engineer physically cut
  the affected machine off the internet. The first channel was restored
  at 05:25 on 9 April (others later that morning); The Register put the
  blackout at "around 18 hours." First-year direct cost was EUR 5M
  (~USD 5.6M), followed by over EUR 3M/year for new protection. Blamed
  initially on Islamic State, the attack was reassessed in June 2015 by
  French investigators (ANSSI/police, via L'Express and France 24) and
  by FireEye as the work of APT28 (Fancy Bear) — a Russia-based GRU-
  linked group — with the ISIS/CyberCaliphate branding assessed as a
  false flag ("ISIS was a decoy and APT28 was actually responsible").
quantified_impact:
  channels_off_air: 12       # "all 12 channels had gone off air" (BBC 2016)
  downtime_hours: 18         # "around 18 hours" (The Register); BBC 2016: 20:40 8 Apr -> first channel 05:25 9 Apr, rest later that morning
  eur_estimated_cost: 5000000 # first-year direct cost (BBC 2016: "EUR 5m ... in the first year"); +>EUR 3M/yr thereafter
false_flag_risk: confirmed
summary: |
  TV5Monde is the canonical destructive instance of the "Cyber
  Caliphate" Russian false-flag persona: an ISIS-branded takeover and
  media blackout assessed by French investigators and FireEye as an
  APT28 (Fancy Bear) operation using jihadist propaganda "to cover
  their tracks." The same persona had been used against the Warsaw
  Stock Exchange (Oct 2014) and the US CENTCOM Twitter/YouTube accounts
  (Jan 2015). What distinguishes TV5Monde is that the aim was
  DESTRUCTION — bespoke malware that fried the broadcaster's encoder
  hardware and nearly ended the company — which vendors read as a
  deniable capability test: FireEye assessed Russian hackers were
  "testing what type of damage they might be able to inflict on a media
  outlet ... the Cyber Caliphate-theme was there purely to provide
  plausible deniability," and UK analysts read it as "an attempt to
  test forms of cyber-weaponry." The attribution is held with a caveat:
  Trend Micro corroborated the APT28/Sofacy malware link but was more
  circumspect about the persona (it could not rule out "two entirely
  unrelated incidents"), and no source proved the state chain of
  command ("Who gave the order and the money to that Russian group of
  hackers"). NOTE: this event is APT28 (GRU Unit 26165), NOT Sandworm
  (Unit 74455) — a prior Sandworm attribution and a claimed
  "Greenberg/Mandiant reassignment toward Sandworm" were unsupported
  and have been removed.
attributions:
  - actor_id: null
    attributing_org: 'Self-proclaimed ISIS-aligned persona ("CyberCaliphate")'
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: contested
    attribution_date: 2015-04-08
    attribution_source_id: bbc/2015-04-09_tv5monde-cyberattack
    notes: |
      The CLAIMED actor. On the night of the attack the persona posted
      on TV5Monde's Facebook "The CyberCaliphate continues its cyberjihad
      against the enemies of Islamic State," replaced the social-media
      profile pictures with a masked Islamist fighter, and posted
      documents purporting to be ID cards of relatives of French soldiers
      involved in anti-IS operations (BBC 2015). This ISIS claim is
      assessed as a false flag and is NOT taken at face value — see the
      APT28 entry below. Recorded to preserve the claimed-vs-assessed
      false-flag structure.
  - actor_id: ru/gru/26165/apt28
    attributing_org: French investigation (ANSSI / police) + FireEye; Trend Micro (partial)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-06-10
    attribution_source_id: theregister/2015-06-10_tv5monde-apt28-russia-not-isis
    notes: |
      The ASSESSED actor. In June 2015 French investigators (via
      L'Express and France 24, per TV5Monde's president) concluded the
      attack was carried out by Russia-based hackers — malware "typed out
      on a Cyrillic keyboard and compiled during office hours in Moscow
      and St. Petersburg" — a conclusion "supported by findings from ...
      FireEye and Trend Micro." FireEye tied the Cyber Caliphate site to
      APT28 infrastructure ("same IP block ... same name server and
      registrar") and its EMEA president stated "ISIS was a decoy and
      APT28 was actually responsible for the attack on TV5Monde" (The
      Register). Corroborated by BBC 2016 (Yves Bigot: investigators
      proved the attack was "designed to destroy the channel" and "linked
      to APT 28"). CAVEATS held at concur-with-caveat / moderate: (1)
      Trend Micro's Rik Ferguson was "more circumspect" — he linked the
      malware to Pawn Storm/APT28/Sofacy but said the leak source was
      unresolved and "two entirely unrelated incidents" remained possible;
      (2) the state chain of command was never proven ("Who gave the order
      and the money to that Russian group of hackers," BBC 2016); (3) the
      GRU Unit 26165 mapping rests on the later (post-2016 / 2018 DOJ)
      consensus that APT28 is GRU Unit 26165 — hence named-actor, not
      named-unit. false_flag_risk: confirmed (FireEye: "ISIS was a decoy";
      French investigation: attackers "used the jihadist posts to ... cover
      their tracks"). The TV5Monde-specific sourcing points to APT28
      (Sofacy/Fancy Bear) — NOT the Sandworm (Unit 74455) cluster.
doctrine_links:
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/destabilization-via-info
    program_id: null
    confidence: plausible
    reasoning: |
      A Russian (APT28) actor mounting a destructive, information-effect
      attack on a global French broadcaster under a deniable jihadist
      persona fits the 2014 Military Doctrine's framing of information-
      enabled destabilization as a military threat/instrument. No
      anachronism here (unlike the sibling Warsaw case): the doctrine was
      issued 2014-12-25, ~1 month before the 23 January 2015 intrusion
      onset. Held plausible (not attested/strongly_inferred) because no
      source cites the doctrine and the state chain of command was never
      established.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "A deniable destructive-tradecraft TEST not tethered to any specific doctrine — FireEye's own read was that Russian hackers were 'testing what type of damage they might be able to inflict on a media outlet ... the Cyber Caliphate-theme was there purely to provide plausible deniability' (The Register)."
        - "An APT28 operation whose ordering authority and strategic purpose were never proven — the investigation established the attack was 'designed to destroy the channel' and 'linked to APT 28' but not 'who gave the order and the money' (BBC 2016), so any specific doctrinal tasking is inference."
    contested: false
    analyst: claude
    perspective: attacker-rationale
  - doctrine_id: ru/gerasimov-framework
    pillar_id: ru/gerasimov-framework/non-military-means
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A deniable jihadist false-flag persona masking a Russian actor, a
      destructive information-effect operation against a civilian Western
      broadcaster, and vendors' explicit reading of the op as a deniable
      capability test are the canonical "non-military means" execution
      pattern.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Deniable jihadist false-flag persona masking a Russian actor — the defining non-military-means deception technique (FireEye: 'ISIS was a decoy'; the French investigation found the attackers 'used the jihadist posts to ... cover their tracks')."
        - "Civilian Western media target attacked for destructive/information effect rather than a military target or for profit — 'the aim was destruction' (BBC 2016)."
        - "Vendors read the operation as a deniable capability test — 'testing what type of damage they might be able to inflict on a media outlet ... purely to provide plausible deniability' (The Register); UK analysts: 'an attempt to test forms of cyber-weaponry' (BBC 2016)."
      ruled_out: "Genuine ISIS/jihadist hacktivism — the surface claim — is refuted by FireEye ('ISIS was a decoy') and the French investigation, leaving a Russian deniable information operation as the operative reading."
    contested: false
    analyst: claude
    perspective: attacker-rationale
targets:
  - target_id: orgs/tv5monde
    country: fr
    role: primary
    outcome: |
      All 12 channels off air ~18 hours (20:40 on 8 Apr to first channel
      restored 05:25 on 9 Apr, rest later that morning); website + social
      media defaced under the CyberCaliphate persona; bespoke malware
      corrupted and destroyed internet-connected broadcast hardware
      (encoder systems), nearly destroying the company; EUR 5M first-year
      direct cost (+>EUR 3M/yr thereafter).
