    sandworm-book (a book, url null) to support a claimed "reassignment
    toward Sandworm." Both were wrong: every TV5Monde-specific source
    attributes the op to APT28 (Fancy Bear / Sofacy / Pawn Storm = GRU
    Unit 26165), never Sandworm. Two live secondaries were fetched,
    snapshotted, and hashed; attribution re-pointed to them.
