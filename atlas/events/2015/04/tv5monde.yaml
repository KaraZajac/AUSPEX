    Warsaw Stock Exchange and CENTCOM CyberCaliphate operations),
    RE-SOURCED end to end (badrabbit model). The event is REAL and
    well-documented, but its attribution sourcing was defective: it named
    Sandworm (Unit 74455) as the PRIMARY actor and cited a PHANTOM FireEye
    record (fireeye/2015-06-09_tv5monde-apt28, url null — the standalone
    blog is not recoverable because FireEye's TV5Monde attribution was
