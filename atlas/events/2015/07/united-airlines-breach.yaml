qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial
  notes: "Audited vs the single cited source bloomberg/2015-07-29_united-airlines (Riley & Robertson, 'China-Tied Hackers That Hit US Said to Breach United Airlines'). PARTIAL because the Bloomberg primary is bot-walled: curl and WebFetch both return HTTP 403 ('Bloomberg - Are you a robot?'), and archive.org is blocked for this audit, so the cited primary itself could not be captured. Verification instead rests on a captured + SHA-256-hashed contemporaneous corroboration (The Register, John Leyden, 30 Jul 2015, raw_snapshot on the source record) that recounts the Bloomberg story, reinforced by two independent web searches (Help Net Security, eSecurity Planet, The Hill, WeLiveSecurity). FACTS CONFIRMED: flight manifests stolen (passenger names, origins/destinations — 'data on the movements of millions of Americans'); intrusion detected/occurred May or early June 2015 (start_date 2015-05-01, end_date 2015-06-30 consistent); disclosed by Bloomberg 29 Jul 2015 (disclosure_date + source published_on correct — The Register: 'Bloomberg broke news ... on Wednesday'); no formal records-count, 'millions' per unnamed officials. ATTRIBUTION: NATION-level only — sources say investigators 'believe the hackers to be Chinese' / 'work on behalf of China's intelligence apparatus' and tie it to the OPM/Anthem cluster (Symantec 'Black Vine'); NO Chinese service (MSS/PLA unit) named. CORRECTIONS: (1) added attribution_level: nation (was absent) and expanded the attribution note to record the service-not-named finding; (2) added raw_snapshot + content_sha256 (corroboration capture) + an AUDIT note to the source. actor_id cn/unscoped/deep-panda resolves and is current (freshly demoted 2026-06-24, FK-propagated to this event — the unscoped placement matches the no-service-named evidence). doctrine_link cn/mcf/bulk-pii-humint-enabling kept strongly_inferred / attesting_source_id null (correctly NOT attested): no attributing-authority source states the MCF/HUMINT-vetting goal in doctrine terms — it is the AUSPEX intent inference triangulated from the OPM/Anthem/Premera cluster + the unique travel-pattern-enrichment value of manifest data; The Register carries a Tripwire-analyst quote about correlating cleared-personnel data with travel, a supporting signal but third-party, not the attributing authority. NB target FK orgs/united-airlines has no registry file (corpus-wide deferred targets/ registry gap; validator informational, not an error) — out of scope for a single-event audit."
