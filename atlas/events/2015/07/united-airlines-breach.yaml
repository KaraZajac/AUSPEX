id: 2015-07/united-airlines-breach
name: United Airlines passenger-data breach
start_date: 2015-05-01
disclosure_date: 2015-07-29
end_date: 2015-06-30
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  United Airlines confirmed an intrusion exfiltrating manifest
  data — passenger movements, origin/destination, flight numbers
  — for an unspecified number of passengers. The intrusion was
  reported as conducted by the same operational cluster
  responsible for the OPM and Anthem breaches earlier in 2015.
  No formal records-count disclosed; Bloomberg reporting cited
  unnamed officials estimating "millions" of passenger records.
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  United Airlines is the travel-pattern enrichment layer atop
  the OPM/Anthem/Premera bulk-PII set: combined, the four
  datasets allow an MSS-aligned analyst to identify US
  cleared personnel by SF-86 record, cross-reference family
  and employment via Anthem/Premera healthcare claims, and
  reconstruct travel patterns via United manifest data —
  arguably the most operationally valuable HUMINT-enabling
  dataset ever assembled outside a single government's own
  records.
