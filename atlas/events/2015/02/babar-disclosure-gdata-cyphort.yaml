outcome_summary: |
  Coordinated disclosure on 18 February 2015 by G Data SecurityBlog
  (Paul Rascagnères) and Cyphort Labs (Marion Marschalek) of the
  Babar espionage implant referenced in the leaked CSEC Snowden
  slides published by Le Monde in March 2014. Both posts named
  French-language code artifacts including the "MEDIA-MOTHER" PDB
  string and Babar-specific tradecraft. The coordinated disclosure
  effectively confirmed the Snowglobe cluster's technical reality
  and joined Babar to French-state attribution in vendor reporting.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Babar is the cornerstone of the Animal Farm tooling family —
  a feature-rich espionage implant whose French-language
  development-environment artifacts and naming idiom were the
  most concrete technical evidence connecting the cluster to a
  French-speaking operator. The G Data and Cyphort posts came
  three weeks before the ESET Casper disclosure (5 March 2015)
  and the Kaspersky omnibus Animal Farm post (6 March 2015). The
  coordination among vendors was unusual at the time and
  reflected the analytic confidence in shared cluster attribution.
