outcome_summary: |
  Same-day public disclosure on 18 February 2015 by G Data
  SecurityBlog (Paul Rascagnères) and Cyphort Labs (Marion
  Marschalek) of Babar — a full-featured espionage / surveillance
  implant of the Animal Farm tooling family. Both vendors reverse-
  engineered Babar samples and confirmed they match the malware
  CSEC (Communications Security Establishment Canada) described in
  the leaked SNOWGLOBE slides first reported by Le Monde in March
  2014 (from Edward Snowden's disclosures). The France provenance
  is CSEC's, relayed and explicitly hedged by both vendors: G Data
  quotes the slide verbatim — SNOWGLOBE assessed "with moderate
  certainty … a state-sponsored CNO … put forth by a French
  intelligence agency" — but concludes it "cannot contribute
  further information with regards to the malware's origin," while
  Cyphort notes the allegations are "impossible to prove without
  the shadow of a doubt." No cited source names the DGSE or any
  specific French service.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Babar is the flagship of the Animal Farm cluster. G Data and
  Cyphort independently document a modular Windows DLL implant that
  logs keystrokes (RAWINPUT), steals clipboard data, captures
  desktop screenshots (GdiPlus) and — its signature capability —
  intercepts and records audio from softphone / instant-messaging
  applications (Skype, MSN Messenger, ooVoo, Nimbuzz, Google Talk,
  Yahoo Messenger, X-Lite) via the dsound / winmm APIs, hooking
  browsers and Office applications to steal data. G Data calls it
  "a pure espionage tool"; Cyphort, "a full blown espionage tool,
  built to excessively spy on the activity on an infected machine's
  user." Cyphort ties Babar to EvilBunny by shared code
  "handwriting" ("the same author is behind both families").

  The command-and-control servers were hosted on compromised
  legitimate commercial websites (a Turkish tourism site, an
  Algerian travel agency, an Egyptian oil-and-gas services company
  and an Iranian home-appliance retailer) — infrastructure, not
  intelligence victims; G Data states it "cannot contribute further
  information with regards to … the list of victims," so the
  espionage targets are not established by the cited sources.

  The two posts preceded ESET's Casper disclosure (5 March 2015)
  and Kaspersky's "Animals in the APT Farm" cluster post (6 March
  2015) by just over two weeks. The "French-language code artifacts
  including the 'MEDIA-MOTHER' PDB string" attributed to these posts
  in the prior record were FABRICATED / an over-claim: no such
  string exists in either raw, the internal project path is
  "Babar64" (which names the malware), and the Babar strings G Data
  and Cyphort actually found are ENGLISH (with non-native mistakes).
  The French-language indicators (an fr_FR spear-phishing locale, an
  EvilBunny "fr" Accept-Language header, a developer nickname "Titi"
  and the unit "kilo-octet") come from the CSEC slides relayed via
  Le Monde, not from the vendors' Babar reverse-engineering.
