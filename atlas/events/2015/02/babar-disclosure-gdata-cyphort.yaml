id: 2015-02/babar-disclosure-gdata-cyphort
name: Babar espionage implant disclosed (G Data + Cyphort)
start_date: 2011-01-01  # AUDIT 2026-07-10: year-precision operational-era lower bound. The cited vendor sources give NO Babar-specific compile/deployment date; anchor is CSEC-relayed via G Data — the SNOWGLOBE assessment slides "originating from 2011" describe the operation, itself "discovered in 2009 (slide 9)" with a sophisticated implant "discovered in mid-2010." Event filed under the 2015-02 disclosure (see disclosure_date), per the Casper-event precedent.
