  notes: |
    Full 6-point audit vs the three cited RAW snapshots. All three now captured + hashed
    (Cyphort and Le Monde newly snapshotted this session via the Wayback Machine, which
    resolved 200 — the prior "unfetchable/url:null" states are remediated). Tiers PRESERVED.
      • G Data "Babar — Espionage Software … Under the Microscope" (primary) —
        content_sha256 915f91c8…787e51, 65113 bytes (re-verified UNCHANGED).
      • Cyphort "Babar: Suspected Nation State Spyware In The Spotlight" (primary) —
        Wayback 20150218192803 capture, content_sha256 11068750…e02e54e, 30842 bytes.
      • Le Monde "Quand les Canadiens partent en chasse de « Babar »" (secondary) —
        Wayback 20140321195810 capture, content_sha256 c798b0e6…15e8fe, 88361 bytes.

    [a] FACTS — fabrications / over-claims corrected (same family as the Casper audit):
      • "MEDIA-MOTHER" PDB string — FABRICATED. Zero occurrences in ALL sources
        ("MEDIA-MOTHER"=0 / "MEDIA"=0 in G Data + Cyphort). The real internal artifact is the
        compilation path "C:\\Documents and Settings\\admin\\Desktop\\Babar64\\Babar64\\obj\\
        DllWrapper Release\\Release.pdb" — the "Babar64" project name is what names the malware
        (sibling path "…\\bunny 2.3.2\\Release\\Transporter2.pdb" for EvilBunny). Removed.
      • "Both posts named French-language code artifacts" — OVER-CLAIM. G Data: the C&C
        interface "is in English but the choice of words is not typical for a native English
        speaker. We found English mistakes in EvilBunny and Babar samples" (e.g. "File Does
        Not Exist s -->[%s]"). The French indicators are NOT vendor-found Babar code
        artifacts: they are the CSEC slide's fr_FR spear-phishing locale + an EvilBunny HTTP
        Accept-Language "fr" (G Data relaying CSEC slide 19), and — per Le Monde relaying the
        CSEC doc — a developer nickname "Titi" ("un diminutif français") and the unit
        "kilo-octet" (vs "kilobyte"). Rewrote to the real evidence + the fabrication call-out.
      • CAPABILITIES added (were absent). G Data: key logger; clipboard stealer (passwords /
        KeePass); screenshots "thanks to the GdiPlus API"; "Babar has big ears and the malware
        is able to listen to conversations and log them by using the dsound and winmm
        libraries"; "this malware is meant to be a pure espionage tool." Cyphort: "capable of
        logging keystrokes, capturing screen shots, eavesdropping on installed softphones and
        spying on instant messengers … a full blown espionage tool, built to excessively spy
        on the activity on an infected machine's user." → supports incident_type [espionage,
        surveillance] (dropped the "documentary" meta-type; this is now framed as the operation).
      • C2 ≠ VICTIMS. The domains (alexpetro.com/Egypt oil-gas, etehadyie.ir/Iran appliances,
        horizons-tourisme.com/Algeria travel, gezelimmi.com/Turkey tourism) are C2 servers.
        G Data: "We do not know whether the command and controls were compromised legitimate
        websites … or servers dedicated to the attacks." Cyphort: "Both domains appear to be of
        legitimate use, but compromised and abused to host Babar's server side infrastructure."
        The Iranian domain is a compromised appliance-store C2, NOT an Iranian victim.
      • "coordinated" disclosure — NOT sourced (neither raw mentions the other or coordination);
        softened to "same-day." "three weeks before" Casper/Kaspersky → "just over two weeks"
        (18 Feb → 5/6 Mar = 15/16 days).

    [b] ATTRIBUTION — France is CSEC's assessment (Snowden/SNOWGLOBE slides), relayed by Le Monde
      (2014-03) and echoed by both vendors, who explicitly HEDGE. G Data verbatim: "CSEC assesses,
      with moderate certainty, SNOWGLOBE to be a state-sponsored CNO [Cyber Network Operation]
      effort, put forth by a French intelligence agency," and "cannot contribute further
      information with regards to the malware's origin … The assertion of a 'French intelligence
      community' being responsible remains unchanged." Cyphort: "impossible to prove without the
      shadow of a doubt." What the vendors DO attribute is a named same-developer group (Babar +
      EvilBunny, "same author"). Corrections: auspex_assessment concur→concur-with-caveat (both
      attributions), matching the Casper audit + the actor record; dropped the unsourced
      "(coordinated)" from attributing_org; kept attributing_org_confidence moderate (maps to CSEC
      "moderate certainty" + vendor hedge); service_id already null (no DGSE named).

    [c] DATES — disclosure_date 2015-02-18 verified in BOTH vendor raws (Cyphort footer "posted on
      Wednesday, February 18th, 2015 at 3:20 pm"; G Data byline 02/18/2015). Le Monde published_on
      2014-03-21 verified (byline "Le Monde | 21.03.2014"). Prior record conflated start=disclosure=
      end all 2015-02-18 and fabricated an end_date. Fixed: start_date → 2011-01-01 (year-precision
      operational-era lower bound — G Data relays CSEC slides "originating from 2011"; parent op
      "discovered in 2009 (slide 9)", sophisticated implant "mid-2010"; no Babar-specific compile
      date in the cited sources); end_date → null (operation end not established). Event stays filed
      under 2015/02 (disclosure), per the Casper precedent (filed by disclosure, not start).

    [d] DOCTRINE_LINKS — one link, fr/lutte-informatique-offensive/intelligence-preparation,
      confidence PLAUSIBLE (correct — NOT attested: no cited source states a French strategic goal
      in LIO terms, and France itself is CSEC-suspected + vendor-hedged). The LIO doctrine record
      prescribes this retroactive plausible mapping for the Animal Farm family. ADDED the
      ladder-required inference_basis.alternatives[] (3, colon-space-quoted) + perspective:
      attacker-rationale (French doctrine on a French-attributed op; actor-state fr = doctrine-state
      fr). pillar FK exists. Kept counter_explanation.

    [e] ATTRIBUTION_LEVEL — was MISSING on both attributions; set named-actor (vendors establish a
      named same-developer group; nation = CSEC-suspected/moderate; no unit / no DGSE).

    [f] ACTOR_ID — fr/unscoped/animal-farm resolves to atlas/actors/fr/animal-farm.yaml
      (id: fr/unscoped/animal-farm) ✓; correctly demoted from fr/dgse/* on 2026-06-24. No actor
      edit made. Directionality confirmed: France (Animal Farm) = attacker; targets = foreign
      espionage victims (undetermined by the cited sources). incident_type [espionage, surveillance].

    SOURCE-RECORD EDITS (own records only): fixed the G Data record's notes (it repeated the
    fabricated "MEDIA-MOTHER" claim); populated Cyphort + Le Monde records with raw_snapshot +
    content_sha256 (+ Cyphort archive_url) from the Wayback captures and rewrote their "unfetchable"
    notes.

    FLAGS for orchestrator (NOT edited — actor/other-event files):
      • atlas/actors/fr/animal-farm.yaml ttp_summary carries the SAME fabricated '"MEDIA-MOTHER"
        artifact' and asserts "French-language artifacts include strings, PDB paths" — both
        over-claims per the raws (Babar strings are English; no MEDIA-MOTHER). Needs the same fix.
      • atlas/events/2015/03/animal-farm-kaspersky-cluster-disclosure.yaml is UNAUDITED and still
        carries the demoted over-claim ("canonical vendor-cluster reference for French-attributed
        DGSE-Technical-Directorate tooling") + [documentary, espionage] + unsupported service level.
      • If cluster-level Iran/media/journalist targeting is desired on-corpus, it is sourced to
        Kaspersky "Animals in the APT Farm" (2015-03-06) at CLUSTER granularity ("Animal Farm has
        targeted … Journalists and media organizations …"; Tafacalou victim countries incl. Iran) —
        best kept on the Kaspersky-cluster event, not imported to this Babar-disclosure event.

    RESIDUAL UNCERTAINTY: France is CSEC-suspected (moderate) + vendor-hedged, not vendor-attributed
    or French-acknowledged; no Babar-specific operational date is given by the cited sources; and the
    espionage victims are undetermined (G Data disclaims the victim list).
