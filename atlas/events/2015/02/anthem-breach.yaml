id: 2015-02/anthem-breach
name: Anthem health-insurer breach
start_date: 2014-02-18
disclosure_date: 2015-02-04
end_date: 2015-01-29
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Theft of approximately 78.8 million member records (PII +
  employment) from US health insurer Anthem Inc. Combined with
  OPM (2014) and Equifax (2017) into the canonical MSS-aligned
  bulk-PII trinity.
quantified_impact:
  records_exfiltrated: 78800000
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  DOJ indicted Fujie Wang in May 2019. Activity assigned to the
  Deep Panda / Black Vine cluster (MSS-linked). Initial access was
  a spear-phishing campaign against an Anthem subsidiary in early
  2014 that delivered the Sakula / Mivast remote-access trojan,
  followed by lateral movement using valid credentials, Mimikatz-
  style credential dumping, and a Backdoor.Mivast / Sakula family
  with shared certificate infrastructure (the Mivast and Sakula
  payloads were code-signed with a certificate stolen from
  DTOPTOOLZ, a Korean software firm — the same cert Symantec tied
  to Black Vine and that also appears in the OPM breach). The
  intruders ran a slow, stealthy bulk-PII extraction
  of approximately 78.8 million member records — names, dates of
  birth, Social Security numbers, employment data — staged via
  internal SQL queries and exfiltrated to attacker-controlled
  infrastructure before the February 2015 detection.
attributions:
  - actor_id: cn/unscoped/deep-panda
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-05-09
    attribution_source_id: doj/2019_anthem-fujie-wang
    notes: |
      DOJ named the perpetrators only as "a Chinese national"
      (Fujie Wang) and "other members of [an] extremely
      sophisticated hacking group operating in China" — a named
      individual + named (vendor) cluster (Deep Panda / Black
      Vine), but NO Chinese intelligence service or PLA/ministry
      unit. Hence attribution_level: named-actor (not named-unit),
      and the actor sits at cn/unscoped/deep-panda — China nexus
      source-supported, service placement not (the cited
      indictment names none). See the source's AUDIT note.
