      claimed "on-record US-government attribution to Russian state
      operators ... by Deputy SecDef John Hamre in 1999 Senate
      testimony," sourced to a phantom SASC transcript. That is
      refuted by the primaries: (1) the 4 March 1999 public disclosure
      was ABC Nightly News, not Hamre testimony (Kaspersky footnote 1);
      (2) Hamre's own account (FRONTLINE, 18 Feb 2003) says the case
