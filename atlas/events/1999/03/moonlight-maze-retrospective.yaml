      personal read was "economic espionage." So Hamre made NO Russian
      state attribution. What IS supportable: FBI/DoD forensics traced
      the intrusions to Russian ISPs (Kaspersky: "forensic evidence
      pointing to Russian ISPs"; GMT+3 operator hours) and the Russian
      government was publicly blamed, but on circumstantial evidence
      that Russia denied — hence confidence low, nation-level,
      concur-with-caveat. Re-anchored to the NS Archive FBI/DoD
      investigative record; the phantom
      congress/1999-03-04_hamre-senate-cyber is retired.
