false_flag_risk: none
summary: |
  Chinese security firm Qihoo 360 reported that DarkHotel (APT-C-06) exploited a zero-day vulnerability in Sangfor SSL VPN servers during the COVID-19 pandemic to compromise Chinese government agencies relying on remote access. The attackers hijacked the VPN client update process, replacing the legitimate SangforUD.exe updater with a backdoored version to deliver malware to connected endpoints. Qihoo 360 reported more than 200 compromised VPN servers, including 174 belonging to Chinese institutions abroad and domestic government units in Beijing and Shanghai. Qihoo 360 attributed the operation to the DarkHotel APT group, though some external researchers later questioned the attribution.
