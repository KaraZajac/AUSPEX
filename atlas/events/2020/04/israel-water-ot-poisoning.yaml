id: 2020-04/israel-water-ot-poisoning
name: Attempted OT poisoning of Israeli water utilities
start_date: 2020-04-24
disclosure_date: 2020-04-26  # INCD brief acknowledgment shortly after the 24-25 Apr incident; Iran attribution broke 2020-05-08
end_date: 2020-04-25
incident_type:
  - cyber-physical
  - disruption
initial_vector: valid-creds  # internet-exposed water/wastewater OT; remediation was a forced OT password change (vector not stated precisely by sources)
outcome_summary: |
  Iran was linked to an attempted cyberattack on April 24-25, 2020
  against Israeli water/wastewater operational technology. A later
  Ynet / Channel 13 account put the count at six Israel Water Authority
  facilities; the intruders manipulated programmable logic controllers
  governing water flow and — per a Western intelligence official cited
  by the Financial Times — attempted to raise chlorine to harmful
  levels in water bound for residential areas. The attempt was detected
  in real time by the Water Authority and the National Cyber Directorate
  and thwarted: some systems were impacted (one pump entered continuous
  operation; a data irregularity was logged) but there was no disruption
  to water supply or wastewater management and no damage or harm. The
  chlorine "poisoning" was a POTENTIAL outcome — the FT source said the
  attack was "close to being successful" and could have "sickened
  hundreds" — not an achieved effect. Remediation was a forced password
  change across water-sector OT. Israel was widely reported to have
  retaliated weeks later with the cyberattack on Iran's Shahid Rajaee
  port (see 2020-05/israel-destructive-cyberattack-disrupting-irans-shahid-rajaee-port).
false_flag_risk: none
summary: |
  Attributed to Iran at nation level by foreign / Western intelligence
  officials cited by the Washington Post (Warrick & Nakashima, May 8,
  2020) and the Financial Times (relayed by the Times of Israel); the
  Iranian link was first reported by Fox News. Iran denied involvement
  ("The Iranian government does not engage in cyberwarfare") and no
  formal indictment followed. The cited reporting is hedged ("if Iran's
  involvement is verified") and names no IRGC unit, so AUSPEX holds
  attribution at nation level (actor_id / service null). Israeli
  leadership reportedly viewed the operation as a crossing of a red line
  for targeting civilian infrastructure (Channel 13). Doctrine
  confidence is strongly inferred — Western-intel attribution, not
  OFAC / DOJ attested.
attributions:
  - actor_id: null  # no atlas actor named by the cited sources; some later analyses tie water-sector ICS targeting to IRGC contractors (Fox Kitten / Pioneer Kitten ecosystem), but the cited primary/secondary sources attribute only "Iran"
    service_id: null  # was ir/irgc — over-attestation; no cited source names the IRGC or any unit
    attributing_org: Foreign / Western intelligence officials (per Washington Post; Financial Times)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2020-05-08
    attribution_source_id: washingtonpost/2020-05-08_israel-water-iran
    notes: |
      Nation-level attribution to Iran is the reporting consensus
      (WaPo foreign-intelligence officials + FT Western-intelligence
      official + Israeli officials via Channel 13), but every cited
      source is hedged: WaPo writes "if Iran's involvement is verified,
      it would not be the first time," describes only "foreign
      intelligence officials" / "two officials of a foreign government,"
      and records Iran's denial. No IRGC/MOIS unit is named and no
      OFAC/DOJ attribution exists. attribution_level therefore nation;
      actor_id and service_id null (the prior service_id: ir/irgc was
      firmer than any source and is removed). auspex_assessment concur
      at nation level (Iran is the consensus), with the unit-level
      caveat captured here rather than as concur-with-caveat.
