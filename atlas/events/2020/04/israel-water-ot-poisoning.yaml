  notes: |
    Audited vs RAW cited sources (all snapshotted + hashed). STEP-0
    triage: WaPo direct URL bot-blocks curl (HTTP/2 INTERNAL_ERROR) —
    captured via its archive.org copy (full article body present).
    Times of Israel cited url was the BARE HOMEPAGE
    (https://www.timesofisrael.com) — a homepage-shell WRONG-SOURCE.
    Path taken: RE-SOURCE (event is REAL — WaPo archive confirms the
    April 24-25 attempted attack). The phantom ToI homepage was
    re-pointed IN PLACE to the genuine ToI report it approximated
    ("Iran attempted cyber attack on Israeli water and sewage
    facilities -- report," 2020-05-07); two further genuine ToI
    articles were created + snapshotted to carry the chlorine and
    six-facility claims. Not a duplicate; the May-2020 Shahid Rajaee
    retaliation has its own event
    (2020-05/israel-destructive-cyberattack-disrupting-irans-shahid-rajaee-port),
    cross-referenced, not re-described.

    Snapshots (sha256):
    - washingtonpost__2020-05-08_israel-water-iran.html 24d11041… (471,548 B, via archive.org)
    - timesofisrael__2020-05-07_israel-water-sewage-attempt.html 1522238c… (386,901 B)
    - timesofisrael__2020-06-01_israel-water-chlorine-sickened-hundreds.html 7c7809c6… (395,913 B)
    - timesofisrael__2020-05-19_six-facilities-israel-water.html be213191… (392,036 B)

    [a] FACTS — corrected against raw:
    • ATTEMPTED/THWARTED confirmed: WaPo "an attempted cyberattack …
      quickly detected and thwarted before it could cause damage …
      causing no damage or harm to water supplies"; ToI(05-19) "did not
      cause any disruption in the water supply or waste management."
      incident_type changed [intrusion, destructive] → [cyber-physical,
      disruption]: nothing was destroyed (thwarted, no damage); the
      operation targeted OT (PLCs) with intent to disrupt.
    • CHLORINE claim VERIFIED but strictly as INTENT/POTENTIAL, not
      achieved — re-sourced to FT via ToI(06-01): "Iran tried to
      increase chlorine levels in the water flowing to residential
      areas …"; "hundreds of people would have been at risk of getting
      sick and … the attack was close to being successful"; chlorine
      "could have been mixed into the water source in the wrong
      proportions." WaPo (the prior sole chlorine "carrier") in fact
      contains ZERO mention of chlorine — it describes PLCs "that
      operate valves for water distribution networks" / "water flow and
      wastewater treatment." Outcome/summary rewritten so the poisoning
      reads as a potential, not an event.
    • "Six facilities" is NOT in WaPo (WaPo says "at least two locations"
      / "a pair of rural districts"); the six figure comes from the
      later Ynet/Channel-13 report — now sourced to ToI(05-19) "Six
      facilities were hit … in April." Kept six as the fuller figure and
      noted WaPo's contemporaneous "two rural districts" in prose.
    • PUMP detail RETAINED and correctly attributed to April: ToI(05-19)
      "At another station, a pump went into continuous operation,
      prompting operators to shut off its automatic mode." STRIPPED
      "including agricultural pumps" — "agricultural pumps" belongs to a
      SEPARATE June-2020 follow-on wave (ToI "Cyber attacks again hit
      Israel's water system, shutting agricultural pumps"), an
      anachronistic conflation; that June wave has no corpus event and
      is out of scope here.
    • Shahid Rajaee retaliation kept as cross-referenced context (its
      own event exists); softened from a precise "May 9" assertion.
    [b] ATTRIBUTION — de-attested. service_id ir/irgc → null and
    attribution_level set to nation: no cited source names the IRGC or
    any unit; WaPo attributes to "foreign intelligence officials" and
    hedges ("if Iran's involvement is verified"), FT to "a Western
    intelligence official," Iran denied. actor_id stays null (no atlas
    actor named by sources; the prompt's "Fox Kitten-adjacent" aside is
    later analytic colour, not source-carried — noted, not asserted).
    attributing_org relabelled to the actual attributors; confidence
    moderate; auspex concur at nation level.
    [c] DATES — start 2020-04-24 / end 2020-04-25 carried verbatim by
    WaPo ("occurred on April 24 and 25") and ToI(05-19) ("April 24-25").
    attribution_date 2020-05-08 = WaPo published_on (article:published_time
    2020-05-08T23:04:41Z, byline Warrick & Nakashima). Source published_on
    verified per snapshot metadata: ToI 2020-05-07, 2020-05-19, 2020-06-01.
    disclosure_date kept 2020-04-26 (INCD's brief post-incident
    acknowledgment; its substance is carried — ToI(06-01) "His office
    released a brief statement after the attempt" — though the exact
    calendar day is not independently snapshot-pinned; earliest full
    snapshot is the 2020-05-07 ToI report). WaPo source TITLE was
    FABRICATED ("Foreign Hackers Cripple Israeli Water Treatment
    Facility") and corrected to the real headline.
    [d] DOCTRINE — none attested (no source states Iran's terminal
    goal); all links carry inference_basis. Perspective = attacker-
    rationale (Iran's own doctrine on an attack Iran conducted;
    directionality Israel-victim / Iran-attacker), so no perspective
    key. asymmetric-warfare/civilian-cii-coercion → strongly_inferred
    (primary; the doctrine model itself names this event) with
    {signals[], ruled_out}. forward-defense pillar set from null →
    integrated-asymmetric-portfolio (its target_sectors include
    ics/water) strongly_inferred with {signals[], ruled_out}.
    resistance-axis/anti-israel-coercion DOWNGRADED strongly_inferred →
    plausible with {alternatives[]}: that pillar centres on joint/proxy/
    persona ops, absent here (single nation-level attribution). Removed
    the off-schema counter_explanation key.
    [e] ATTRIBUTION_LEVEL added: nation (see [b]).
    [f] ACTOR_ID null is correct — no atlas actor is named by the cited
    sources for this nation-level attribution.
    RESIDUAL: WaPo snapshot is the archive.org capture (direct URL
    bot-walled); disclosure_date exact day (26 Apr) is an approximation
