id: 2020-04/israel-water-ot-poisoning
name: Attempted OT poisoning of Israeli water utilities
start_date: 2020-04-24
disclosure_date: 2020-04-26  # INCD public statement
end_date: 2020-04-25
incident_type:
  - intrusion
  - destructive
initial_vector: n-day  # internet-exposed PLCs
outcome_summary: |
  Six Israeli Water Authority facilities including agricultural
  pumps targeted; attempt to raise chlorine levels via
  manipulation of chlorination set-points. Detected and
  remediated; no civilian harm. One pump reportedly entered
  continuous operation. Israel responded with the May 9, 2020
  Shahid Rajaee port cyberattack.
false_flag_risk: none
summary: |
  Attributed to Iran by Western intelligence cited to
  Washington Post (Joby Warrick, May 8, 2020) and Times of
  Israel / Haaretz; never formally indicted. INCD and Israeli
  government condemned the attack. Doctrine confidence
  strongly inferred — Western-intel attribution, not OFAC /
  DOJ attested.
