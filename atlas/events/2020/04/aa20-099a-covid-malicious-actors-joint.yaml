  notes: |
    Audited vs the joint CISA+NCSC advisory AA20-099A "COVID-19
    Exploited by Malicious Cyber Actors" (cisa.gov). Raw snapshot
    captured: cisa__2020-04-08_aa20-099a-covid-malicious-actors.html,
    sha256 3c5673f6…cb42a2aa, 78,191 bytes. NOT bot-walled (HTTP 200,
    full article body).
    [a] FACTS ✓: "This is a joint alert from the United States
    Department of Homeland Security (DHS) Cybersecurity and
    Infrastructure Security Agency (CISA) and the United Kingdom's
    National Cyber Security Centre (NCSC)"; "APT groups and
    cybercriminals are targeting individuals, small and medium
    enterprises, and large organizations with COVID-19-related scams
    and phishing emails"; phishing lures (30+ hits), spoofed/fake VPN
    & collaboration pages (Zoom, Microsoft Teams), and n-day VPN
    exploitation all verbatim-supported. Citrix CVE-2019-19781 named
    explicitly. CORRECTION: the record previously named
    "Pulse Secure CVE-2019-11510" — the advisory body does NOT state
    that CVE; it names only "known vulnerabilities affecting VPN
    products from Pulse Secure, Fortinet, and Palo Alto." Rewrote
    outcome_summary to "(Citrix CVE-2019-19781, plus known Pulse
    Secure, Fortinet, and Palo Alto VPN vulnerabilities)" to match
    the source. Healthcare/hospital targeting IS documented (Maze
    ransomware hitting healthcare units; Spanish hospitals hit with
    COVID-themed Netwalker lures) → sectors/healthcare kept; ICT
    (VPN/remote-work/collaboration tooling) is central → sectors/ict
    kept. Both targets source-carried.
    [b] ATTRIBUTION ✓: null actor is correct — the advisory attributes
    to no specific actor, only "APT groups and cybercriminals" in the
    abstract. attributing_org US CISA + UK NCSC, confidence high,
    concur — all honest. Added attribution_level: null (no
    cluster/nation/actor named). No fabricated actor attribution
    present.
    [c] DATES ✓: source published_on 2020-04-08 = advisory "Original
    release date: April 08, 2020" (verbatim). disclosure_date /
    end_date 2020-04-08 correct. start_date 2020-03-01 is a soft
    "period covered" estimate (referenced example reporting is dated
    Mar 2020); acceptable, labelled as such.
    [d] DOCTRINE_LINK: DOWNGRADED strongly_inferred → plausible. The
    advisory names no doctrine/pillar/purpose; and the record itself
    carried a defend-vs-deter tension (summary said "'deter' pillar
    cadence" while the link used the defend pillar). More than one
    pillar reading genuinely survives, so plausible is the honest
    label. Rebuilt inference_basis from the malformed
    signals/ruled_out into alternatives[] (defend = mitigation-led
    network protection; deter = the joint-advisory signalling cadence).
    Added perspective: defender-response (the discloser NCSC's own
    doctrine on a documentary event; a UK doctrine on a null-actor
    US+UK advisory). attesting_source_id kept as the primary
    supporting source (permitted on plausible). Also reconciled the
    summary to pillar-agnostic "defensive-coordination cadence".
    [e] ATTRIBUTION_LEVEL: set null (no specific actor named).
    [f] ACTOR_ID: null — no actor file needed. FKs verified: doctrine
    uk/ncs-2016 + pillar uk/ncs-2016/defend resolve; sectors healthcare
    + ict resolve.
    OTHER CORRECTION: incident_type attribution-publication →
    documentary — the advisory attributes no operation to any actor;
    it is a technical/documentary advisory, not an attribution
    publication.
    Residual uncertainty: start_date is an estimate; the defend-pillar
    choice over deter is analyst judgment (now graded plausible with
    both alternatives recorded).
