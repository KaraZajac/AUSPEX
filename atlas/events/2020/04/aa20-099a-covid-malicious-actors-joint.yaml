id: 2020-04/aa20-099a-covid-malicious-actors-joint
name: AA20-099A — first joint CISA + NCSC pandemic-era technical advisory
start_date: 2020-03-01  # period covered
disclosure_date: 2020-04-08
end_date: 2020-04-08
incident_type:
  - attribution-publication
initial_vector: phishing
outcome_summary: |
  Joint CISA + NCSC-UK technical advisory documenting widespread
  abuse of COVID-19 themes by Advanced Persistent Threat (APT)
  groups and cybercriminals — phishing lures, fake VPN /
  collaboration-tool pages, exploitation of n-day vulnerabilities
  in VPN and remote-work infrastructure (Citrix CVE-2019-19781,
  Pulse Secure CVE-2019-11510). First in a multi-month joint
  CISA-NCSC cadence on pandemic threats (followed by AA20-126A
  healthcare-targeting and AA20-201A vaccine-research-targeting).
false_flag_risk: none
summary: |
  AA20-099A is doctrinally significant less for the specific
  threats catalogued than as the joint-advisory template that
  becomes the modal expression of NCS 2016 "deter" pillar
  cadence through the pandemic. The advisory does not name
  specific actor clusters; the actor attribution is to
  "APT groups" in the abstract plus opportunistic criminals.
  AUSPEX records the event with a null actor (advisory-as-event)
  on the same pattern as other doctrine-publication events.

  Followed within four weeks by AA20-126A (healthcare-essential
  services) and within thirteen weeks by AA20-201A (APT29 vaccine
  targeting). Together the three-advisory cadence is the
  canonical UK-US joint technical-attribution series of the
  pandemic window and the visible doctrinal output of the
  NCSC defensive posture at peak load.
