doctrine_links:
  - doctrine_id: uk/ncs-2016
    pillar_id: uk/ncs-2016/defend
    program_id: null
    confidence: plausible
    perspective: defender-response
    reasoning: |
      First joint CISA-NCSC advisory of the pandemic period; a joint
      technical/mitigation advisory warning UK (and US) networks about
      COVID-themed threats is a defensive-coordination act that fits
      the NCS 2016 posture. The advisory does not name any doctrine,
      pillar, or strategic purpose, and more than one pillar reading
      survives (defend, i.e. mitigation-led protection of UK networks,
      vs deter, i.e. the visible joint-attribution cadence as
      signalling) — hence plausible, tagged defender-response as the
      discloser's own doctrine on a documentary event.
    attesting_source_id: cisa/2020-04-08_aa20-099a-covid-malicious-actors
    inference_basis:
      alternatives:
        - "NCS 2016 defend pillar: a joint technical advisory that catalogues COVID-themed threats and provides mitigation guidance is a mitigation-led protection of UK networks."
        - "NCS 2016 deter pillar: the joint UK-US public-advisory cadence (AA20-099A, AA20-126A, AA20-201A) reads as visible signalling/deterrence rather than pure network defence."
