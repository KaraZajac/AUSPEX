    attributing_org: vendor consensus
    attributing_org_confidence: low
    auspex_assessment: partial
    attribution_date: 2020-04-20
    attribution_source_id: cognizant/2020-04-18_maze-disclosure
    notes: |
      Maze cluster is not yet present as a separate actor entry
      in AUSPEX. Conti placeholder is operationally misleading;
      add a Maze / TA2101 actor in a subsequent pass and re-
      attribute.
