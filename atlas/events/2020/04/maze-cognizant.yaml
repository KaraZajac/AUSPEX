id: 2020-04/maze-cognizant
name: Maze ransomware against Cognizant — first double-extortion at scale
start_date: 2020-04-17
disclosure_date: 2020-04-18
end_date: 2020-05-31
incident_type:
  - ransomware
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Maze ransomware (operated by the cluster later tracked as
  TA2101 / GOLD VILLAGE) intrusion of Cognizant — one of the
  largest US IT-services / MSPs. Approximately three-week service
  disruption. Cognizant disclosed USD 50–70M of impact in
  subsequent SEC filing. Maze pioneered the double-extortion
  model (encryption + threat to publish stolen data) at scale
  with a public leak site beginning late 2019 — the operational
  template for all subsequent RaaS brands (REvil, Conti,
  LockBit, ALPHV).
quantified_impact:
  disclosed_impact_usd: 70000000
  downtime_weeks: 3
false_flag_risk: none
summary: |
  Maze ceased operations November 2020. Personnel are widely
  assessed to have reconstituted as Egregor (which itself was
  taken down February 2021 with Ukrainian arrests). The
  double-extortion model Maze introduced is the structural
  foundation of the entire 2020–2024 RaaS ecosystem.
attributions:
