id: 2020-04/maze-cognizant
name: Maze ransomware attack on Cognizant
start_date: 2020-04-17  # best estimate — incident active immediately before the 2020-04-18 confirmation; no cited primary pins the exact onset
disclosure_date: 2020-04-18
end_date: null  # recovery ran into May 2020; no cited source pins a precise op-end date
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown  # neither cited source states the initial access vector
false_flag_risk: none
outcome_summary: |
  Cognizant — a large US IT-services / managed-services provider —
  disclosed on 2020-04-18 that a security incident causing service
  disruptions for some of its clients "is the result of a Maze
  ransomware attack." In its Q1-2020 SEC Form 10-Q (filed
  2020-05-08), Cognizant stated the attack "resulted in unauthorized
  access to certain data and caused significant disruption to our
  business," including the disabling of some systems/networks and
  taking others offline as a precaution; some clients suspended
  Cognizant's access to their networks as a security precaution.
  Cognizant engaged outside forensics firms and law enforcement and
  provided clients with Indicators of Compromise (IOCs). It
  characterized the lost-revenue, containment, remediation,
  investigation and legal costs as "significant."
summary: |
  Maze was a criminal, profit-motivated ransomware / data-extortion
  operation with no documented state nexus. Cognizant publicly
  confirmed the Maze ransomware attack on 2020-04-18; the incident
  disrupted internal systems and client-facing services into
  May 2020. This record is scoped to what Cognizant's own press
  release and SEC filing carry. Broader narrative claims previously
  in this record — that Maze "pioneered double-extortion at scale,"
  the TA2101 / GOLD VILLAGE crew tracking, a specific USD 50–70M
  impact "in a SEC filing," a three-week disruption, and the Maze →
  Egregor reconstitution — are documented elsewhere but are NOT
  carried by the cited first-party sources (the $50–70M figure came
  from Cognizant's May 2020 earnings call, not the 10-Q), and have
  been removed pending proper sourcing.
