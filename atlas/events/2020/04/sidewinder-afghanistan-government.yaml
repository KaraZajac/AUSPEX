id: 2020-04/sidewinder-afghanistan-government
name: SideWinder credential-phishing against Afghan government bodies (Trend Micro Dec-2020 South Asia campaign)
start_date: 2020-01-01
disclosure_date: 2020-12-09
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Trend Micro's December 2020 report "SideWinder Uses South Asian
  Issues for Spear Phishing, Mobile Attacks" documented SideWinder
  credential-phishing infrastructure impersonating the webmail of
  Afghan government bodies: the Administrative Office of the
  President / Presidential Palace (aop.gov.af, arg.gov.af), the
  National Security Council (nsc.gov.af) and the Ministry of Higher
  Education (mohe.gov.af). The dated phishing-domain entries for the
  Afghan targets in the report's table fall in January-February
  2020. The same campaign delivered LNK -> RTF (CVE-2017-11882) ->
  JavaScript droppers that installed a "backdoor + stealer", plus
  Android APK malware; the lure themes were COVID-19 and South Asian
  territorial disputes (Nepal/India/China), not Afghan-peace-process
  content.
false_flag_risk: none
summary: |
  SideWinder -- an India-aligned espionage cluster (attributed at
  named-actor level; no Indian service named) -- ran credential-
  phishing infrastructure against Afghan government and military
  bodies as one victim set within the broader South Asian campaign
  that Trend Micro detailed in December 2020. The report's dominant
  victim set is Nepal, alongside Afghanistan, Sri Lanka and China.
  Afghan government targeting fits SideWinder's regional
  government/diplomatic-collection lane.
attributions:
  - actor_id: in/unscoped/sidewinder
    attributing_org: Trend Micro
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-12-09
    attribution_source_id: trend-micro/2020-06-04_sidewinder-nepal-bhutan
    notes: |
      Trend Micro's Dec-2020 report attributes the activity to the
      named "SideWinder" cluster but names no nation or service in
      the post (India appears only as a territorial-dispute subject
      in the lures). The India-aligned, named-actor assessment rests
      on the actor's other cited reporting (Kaspersky 2018 "low
      confidence ... an Indian company"; MITRE G0121 "suspected
      Indian") -- hence named-actor / moderate, not named-unit. The
      originally-cited source (trend-micro/2020-04_sidewinder-
      afghanistan-government) was a PHANTOM -- its URL is the
      trendmicro.com/en_us/research catalogue, not an article -- and
      was re-pointed to this real report on 2026-06-27.
doctrine_links:
