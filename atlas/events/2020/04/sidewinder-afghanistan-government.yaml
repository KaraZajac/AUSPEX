id: 2020-04/sidewinder-afghanistan-government
name: SideWinder targeting of Afghan government and diplomatic entities ahead of US-Taliban deal
start_date: 2019-09-01
disclosure_date: 2020-04-15
end_date: 2020-03-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Trend Micro and adjacent vendor reporting documented SideWinder
  operations against Afghan government ministries and diplomatic
  personnel during late 2019 and early 2020 — the immediate run-up
  to the US-Taliban Doha agreement (February 29 2020). Phishing
  lures themed on Afghan political content delivered the cluster's
  canonical RTF / HTA staging chain and SideWinder.SE loaders.
false_flag_risk: none
summary: |
  Afghanistan-targeting extension of SideWinder's regional
  diplomatic-collection lane. Notable for the timing: Indian
  intelligence has standing interest in Afghan political
  trajectory and Pakistani-Afghan diplomatic dynamics, with
  acute interest sharpened by the Doha-deal window and the
  prospect of Taliban return. The targeting profile complements
  the contemporaneous Group-IB and Trend Micro disclosures
  documenting Nepal, Bhutan, and Sri Lanka victim sets.
