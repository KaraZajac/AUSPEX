    pillar_id: in/regional-collection-pakistan-china/diplomatic-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Afghan government/military targeting (Presidential Palace,
      National Security Council, Ministry of Higher Education) is
      canonical for SideWinder's regional government/diplomatic-
