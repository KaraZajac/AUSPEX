id: 2020-04/apt32-wuhan-municipal-covid
name: APT32 spear-phishing of Wuhan municipal and Ministry of Emergency Management for COVID intel
start_date: 2020-01-06
disclosure_date: 2020-04-22
end_date: 2020-04-22
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  FireEye / Mandiant Threat Intelligence disclosed APT32
  spear-phishing operations against China's Ministry of Emergency
  Management and the Wuhan municipal government from at least
  January to April 2020. The first observed message was sent on
  6 January 2020 with an embedded tracking link; lures weaponized
  COVID-19 outbreak content and the delivery chain loaded the
  METALJACK payload into memory (C2 vitlescaux[.]com). Mandiant
  assessed the campaign as designed to collect intelligence on
  the COVID-19 crisis during the early pandemic months.
false_flag_risk: none
summary: |
  A direct Vietnamese-actor collection operation against PRC state
  targets during the early COVID period. Mandiant assessed the
  activity as intelligence collection on the COVID-19 crisis. The
  METALJACK loader is the load-bearing malware family named in the
  disclosure.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: FireEye / Mandiant Threat Intelligence
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_level: named-actor
    attribution_date: 2020-04-22
    attribution_source_id: fireeye/2020-04-22_apt32-covid-china-targeting
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      The cited FireEye/Mandiant source states an intelligence
      purpose (collection on the COVID-19 crisis) but carries no
      Vietnamese-doctrine attribution. External political-intelligence
      collection on a neighbouring state fits the broad scope of
      Vietnam's national cyber posture, but Resolution 29-NQ/TW's
      published framing emphasises internal cybersovereignty rather
      than foreign collection, and more than one strategic reading
      survives; the link is an analyst inference at plausible.
    contested: false
    analyst: claude
    inference_basis:
      alternatives:
        - "regime-security / neighbour-monitoring collection under Resolution 29-NQ/TW"
        - "ad hoc pandemic-era intelligence tasking on PRC case-count and border-policy decisions, outside any published doctrine"
targets:
  - target_id: orgs/china-ministry-emergency-management
    country: cn
    role: primary
  - target_id: orgs/wuhan-municipal-government
    country: cn
    role: primary
sources:
  - fireeye/2020-04-22_apt32-covid-china-targeting
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: partial
  notes: |
    DUPLICATE + link-rotted-source audit. This event and its sibling
    2020-04/apt32-china-covid-response are two events split from the SAME single
    FireEye/Mandiant report — both cite source records whose `url` is IDENTICAL
    (https://www.mandiant.com/resources/blog/apt32-targeting-chinese-government-in-covid-19-related-espionage).
    The two source records fireeye/2020-04-22_apt32-covid-china-targeting (this event)
    and fireeye/2020-04-22_apt32-china-covid (sibling) are duplicate records of one
    report. FLAGGED as RETIRE/MERGE candidate — see final report.

    SNAPSHOT: curled the source URL (2.3 MB) → it 302/redirects to the generic Google
    Cloud "Mandiant Cybersecurity Consulting" landing page (og:url content="/security/mandiant";
    zero hits for metaljack/wuhan/emergency-management/covid/apt32 in body). The original
    FireEye blog is LINK-ROTTED post Google-Cloud migration; no article body recoverable at
    the URL, so NO content_sha256 recorded for it (would hash the wrong page). Per protocol
    this alone forces level: partial. Facts corroborated instead against reachable mirrors:
    securityaffairs.com/102124 and SC Media (scworld.com) reproductions of the report.

    [a] FACTS — corrected. RETAINED (mirror-corroborated verbatim): APT32 spear-phishing of
    China's Ministry of Emergency Management + the Wuhan municipal government; timeframe "at
    least January to April 2020"; first message 6 Jan 2020 with an embedded tracking link
    (sender lijianxiang1870@163[.]com per mirror); COVID-19-themed lures; METALJACK payload
    loaded into memory, C2 vitlescaux[.]com; Mandiant's own framing = intelligence collection
    on the COVID-19 crisis. STRIPPED as uncarried: (1) "the Cobalt Strike beacon" — NOT
    mentioned for this campaign in any reachable mirror; the METALJACK payload is described
    only as loaded into memory. (2) "most assertive publicly documented Vietnamese-state
    cyber operation against PRC government targets" — editorial, not in source. (3) "Vietnam
    joined Russian, Iranian, and DPRK clusters in this observation" — not in source; removed.

    [b] ATTRIBUTION — Mandiant names APT32 (nation = Vietnam) as the actor: mirrors say
    "suspected Vietnamese actors APT32" / "Mandiant Threat Intelligence believes". attributing_org
    simplified FireEye (Mandiant) — Scott Henderson et al. -> "FireEye / Mandiant Threat
    Intelligence" (specific byline unverifiable off the rotted page). Added attribution_level:
    named-actor (was missing). Kept attributing_org_confidence: high, auspex_assessment: concur.

    [c] DATES — source published_on 2020-04-22 ✓ (report date). start_date 2020-01-06 ✓
    (first observed message). end_date 2020-04-22 left as the disclosure boundary; the report
    only bounds the campaign as "at least January to April 2020" so precise end is uncertain
    (residual).

    [d] DOCTRINE_LINKS — source carries NO Vietnamese-doctrine attribution. REMOVED the
    vn/industrial-upgrading-cyber-collection link (COVID government-intel collection is not
    industrial-IP/supply-chain collection — an invented fit). DOWNGRADED vn/resolution-29-nqtw
    strongly_inferred -> plausible, cleared the mismatched pillar (regime-stability-surveillance
    is an INTERNAL-surveillance pillar, ill-fitting external collection on the PRC) to null, and
    added inference_basis.alternatives. No link is `attested`, so no attesting_source_id required.

    [e] ATTRIBUTION_LEVEL — set named-actor.

    [f] ACTOR_ID — vn/unscoped/apt32 resolves to atlas/actors/vn/apt32.yaml (id field
    vn/unscoped/apt32; demoted from vn/tc2 on 2026-06-24, correctly). No actor flag.

    RESIDUAL: primary source un-snapshottable (link-rot); all facts rest on second-tier mirror
    corroboration → level partial. Dangling target_id orgs/china-ministry-emergency-management
    (no file on disk) FLAGGED for orchestrator. Source-record tier corrected secondary->primary
    (first-party vendor report) and link-rot noted in the record.
