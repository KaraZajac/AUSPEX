id: 2020-04/apt32-wuhan-municipal-covid
name: APT32 spear-phishing of Wuhan municipal and Ministry of Emergency Management for COVID intel
start_date: 2020-01-06
disclosure_date: 2020-04-22
end_date: 2020-04-22
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  FireEye / Mandiant disclosed APT32 spear-phishing operations
  against China's Ministry of Emergency Management and the
  Wuhan municipal government in January-April 2020. The lures
  weaponized COVID-19 outbreak content; tradecraft included
  METALJACK loader chains and the Cobalt Strike beacon. The
  campaign represented the most assertive publicly documented
  Vietnamese-state cyber operation against PRC government
  targets and pointed to Hanoi's heightened intelligence
  requirements during the early pandemic months.
false_flag_risk: none
summary: |
  An unusually direct Vietnamese collection operation against PRC
  state targets during the early COVID period, when Hanoi was
  making consequential decisions about border closures with
  China. FireEye's attribution framed the operation as part of a
  broader pattern of pandemic-era state-aligned intelligence
  collection on Chinese government early-pandemic decision-making
  — Vietnam joined Russian, Iranian, and DPRK clusters in this
  observation. The METALJACK loader is the load-bearing malware
  family for this disclosure.
