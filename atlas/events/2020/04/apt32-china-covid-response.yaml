    DIRECTIONALITY ✓ — Vietnam attacker → China victim (targets are PRC
    orgs); event correctly NOT bucketed to Vietnam-as-victim.

    FLAGS: (1) RETIRE/MERGE — canonical sibling
    2020-04/apt32-wuhan-municipal-covid; two duplicate FireEye source
