id: 2020-04/apt32-china-covid-response
name: APT32 intrusion attempts against Chinese COVID-response institutions
start_date: 2020-01-06
disclosure_date: 2020-04-22
end_date: 2020-04-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  FireEye / Mandiant disclosed APT32 spear-phishing operations
  beginning January 2020 against China's Ministry of Emergency
  Management and the Wuhan municipal government, with lure
  documents themed around COVID-19. The campaign coincided with
  the early Chinese pandemic response and the period of greatest
  Vietnamese strategic uncertainty about cross-border infection
  flows and PRC official information-sharing.
false_flag_risk: none
summary: |
  A high-signal data point for the regional political-intelligence
  pillar: APT32 collecting against the PRC during the COVID
  response is consistent with Hanoi's deep skepticism of Beijing's
  early case-count reporting and Vietnam's exposure to PRC
  outbreak dynamics through the shared border. Provides one of
  the clearer attested examples of Vietnamese cyber tasking
  aligned to regional security collection rather than industrial
  IP.
attributions:
