  notes: "Audited vs CFR Cyber Operations Tracker (raw HTML captured + sha256; CFR's two cited primaries cross-checked: Google TAG post fetched, Wired blocked). FACTS: five zero-days ✓ and North-Korea(n) targeting ✓ — Google TAG primary verbatim 'a single threat actor was capitalizing on five zero-day vulnerabilities' / 'the majority of targets we observed were from North Korea or individuals who worked on North Korea-related issues'; 'South Korea–linked' ✓ in the CFR description. KEY CORRECTION: removed 'and WHO' from the name + summary — the cited CFR entry and BOTH its primaries (Google TAG, Wired) mention no WHO/World Health Organization; the March-2020 WHO spear-phishing was a SEPARATE incident not attributed to DarkHotel in this source (web-search corroboration: the DarkHotel↔WHO link was 'not definitively established'). This was a two-story conflation. Slug/id left stable (slugs never renamed). Also corrected the source title to CFR's own ('Targeting of North Koreans and North Korea–focused professionals'). ATTRIBUTION: kept moderate (CFR/Wired hedge 'South Korea–linked'; Kaspersky's Raiu only 'quite likely'; Google TAG named no nation) and set attribution_level: named-actor (DarkHotel is named, but the NATION nexus is link-level/contested), auspex_assessment concur->concur-with-caveat. No attribution timeline modeled — single contemporaneous CFR record. DOCTRINE: downgraded the kr/nis-counter-dprk link strongly_inferred -> plausible (consistent with the sibling 2017 DarkHotel/Inexsmar event) because the South-Korea nexus the WHY rests on is itself only a hedged characterization; added inference_basis.alternatives (ROK collection vs an unaligned actor, since TAG named no nation). ACTOR: kr/unscoped/darkhotel left as-is (already de-provisionalized 2026-06-23); softened its TTP line's WHO assertion to note the WHO link is unattributed/separate."
