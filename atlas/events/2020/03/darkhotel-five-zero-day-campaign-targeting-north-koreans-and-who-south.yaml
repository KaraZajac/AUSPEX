id: 2020-03/darkhotel-five-zero-day-campaign-targeting-north-koreans-and-who-south
name: "DarkHotel five-zero-day campaign targeting North Koreans (South Korea-linked)"
start_date: 2020-03-01
incident_type:
  - espionage
  - surveillance
  - intrusion
initial_vector: 0-day
false_flag_risk: none
summary: |
  CFR records a campaign (publicly disclosed March 2020, exploitation observed over 2019) characterized by CFR as "DarkHotel, a South Korea–linked threat actor," in which a single actor burned five zero-days against North Koreans and North-Korea-focused professionals. The underlying Google Threat Analysis Group reporting (one of CFR's two cited primaries) states "a single threat actor was capitalizing on five zero-day vulnerabilities" and that "the majority of targets we observed were from North Korea or individuals who worked on North Korea-related issues"; the DarkHotel/South-Korea identification is Kaspersky's characterization (Raiu: "quite likely") relayed by Wired, not a Google TAG attribution.
attributions:
  - actor_id: kr/unscoped/darkhotel
    attributing_org: "CFR Cyber Operations Tracker (citing Wired and Google Threat Analysis Group)"
    attributing_org_confidence: moderate   # CFR/Wired characterize the actor as "South Korea–linked" (a hedged, link-level nexus); Google TAG named no nation
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-03-01
    attribution_source_id: cfr/2020-03_darkhotel-five-zero-day-campaign-targeti
    notes: "The named actor (DarkHotel) and the South-Korea nexus come from Kaspersky's read (relayed by Wired/CFR), not from the Google TAG primary, which attributed the five zero-days to 'a single threat actor' with no nation named — hence moderate, and the South-Korea identity is link-level, not a confirmed state attribution."
doctrine_links:
  - doctrine_id: kr/nis-counter-dprk
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      If DarkHotel is the South-Korea-linked actor CFR/Wired describe, then burning five zero-days against North Koreans and North-Korea-focused professionals is collection directed at the ROK's principal adversary, fitting the standing NIS counter-DPRK posture; no listed pillar matches offensive collection so pillar is null. Graded plausible (not strongly_inferred) because the South-Korea nexus that the WHY rests on is itself only a hedged, link-level characterization — the cited primary (Google TAG) named no nation at all.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "ROK/NIS counter-DPRK intelligence collection (the natural reading if the South-Korea-linked DarkHotel attribution holds)."
        - "An unaligned or third-party espionage actor: Google TAG attributed the five zero-days to 'a single threat actor' and named no nation; the DarkHotel/South-Korea identity is Kaspersky's 'quite likely' inference, so a non-ROK origin is not excluded by the cited sources."
