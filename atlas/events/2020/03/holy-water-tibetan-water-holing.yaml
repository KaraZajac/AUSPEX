id: 2020-03/holy-water-tibetan-water-holing
name: Holy Water watering-hole campaign against Asian religious sites
start_date: 2019-05-01
disclosure_date: 2020-03-31
end_date: 2020-02-29
incident_type:
  - intrusion
initial_vector: n-day
outcome_summary: |
  Kaspersky discloses a watering-hole campaign active since
  May 2019 against Asian religious and charity websites
  (including Tibetan-diaspora-focused sites). Visitors who
  matched a target IP profile were prompted with a fake Adobe
  Flash Player update that delivered the "Godlike12" backdoor
  alongside a Tibetan-themed second-stage payload.
false_flag_risk: none
summary: |
  Sits inside the same Tibetan-diaspora collection lane as the
  Citizen Lab Poison Carp disclosure six months earlier, but
  using a different delivery primitive (compromised
  religious-/charity-website watering holes) and a distinct
  payload family (Godlike12 / Stitch Python-derived backdoor).
  Kaspersky stops short of asserting PRC-state attribution;
  AUSPEX assesses the diaspora-and-dissident pillar fit is
  strong on victim selection (Tibetan religious community)
  regardless of which MSS-aligned cluster owns the toolset.
attributions:
  - actor_id: cn/unscoped/mustang-panda
    attributing_org: Kaspersky
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-03-31
    attribution_source_id: kaspersky/2020-03-31_holy-water-asia
    notes: |
      Kaspersky does not assert PRC-state attribution. Working
      assignment to Mustang Panda based on overlap with prior
      Tibetan-diaspora collection lanes; could equally be a
      separate MSS-aligned cluster.
doctrine_links:
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Target selection (Tibetan religious / charity sites
      and their visitors) is the diaspora-and-dissident
      pillar by victim profile alone, regardless of which
      cluster owns the toolset.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
targets:
