id: 2020-03/iran-soleimani-retaliation
name: "Pro-Iran defacement of U.S. Federal Depository Library Program site (post-Soleimani)"
start_date: 2020-01-04  # FDLP homepage defaced the evening of Jan 4, 2020
disclosure_date: 2020-01-04  # reported same night (CBS News, Lex Haris)
end_date: 2020-01-04  # brief; site taken offline the same evening
incident_type:
  - disruption
initial_vector: unknown  # BankInfoSecurity theorized a CMS vulnerability; not confirmed
outcome_summary: |
  The homepage of the U.S. Federal Depository Library Program
  (fdlp.gov, run by the U.S. Government Publishing Office) was
  briefly defaced on the evening of January 4, 2020 — a day after
  the January 3 U.S. strike in Baghdad that killed IRGC-Quds Force
  commander Qasem Soleimani — with a pro-Iran, anti-Trump message
  and a doctored image of President Trump being punched. The site
  was taken offline the same evening. CISA stated there was "no
  confirmation that this was the action of Iranian state-sponsored
  actors." Two days later (Jan 6, 2020) CISA issued Alert AA20-006A
  warning of the potential for Iranian cyber response to the strike.
false_flag_risk: none
summary: |
  Low-level website defacement claimed by a self-identified group
  calling itself "Iran Cyber Security Group Hackers" — a group
  several researchers did not recognize and whose connection to the
  Iranian state could not be verified. The defacement message read:
  "Hacked by Iran Cyber Security Group Hackers. This is only small
  part of Iran's cyber ability! We're always ready." DHS/CISA
  explicitly declined to attribute it to Iranian state-sponsored
  actors; BankInfoSecurity and others characterized the perpetrators
  as hacktivists. The incident sits in the post-Soleimani
  cyber-threat-warning window formalized by CISA Alert AA20-006A
  (Jan 6, 2020). This is a symbolic defacement, NOT an IRGC/Quds-
  tasked state operation on the available evidence.
  NOTE (2026-06-27 audit): this record previously described
  unconfirmed CYBERCOM offensive operations against Iranian
  government networks, sourced solely to a phantom Yahoo News
  citation (url was the bare yahoo.com homepage; the claimed
  article could not be found). That framing was unsupportable and
  duplicated the well-sourced June 2019 op (2019-06/iran-retaliation-
  tanker). Re-scoped and re-sourced to the documented post-Soleimani
  incident (CISA AA20-006A warning + the FDLP defacement).
