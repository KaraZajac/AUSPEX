  notes: |
    PHANTOM REMEDIATION — path taken: RE-SOURCE + RE-SCOPE (directionality
    correction). The cited source yahoo/2020_iran-soleimani-cyber-retaliation
    had url=https://www.yahoo.com/ (bare homepage; live curl returned HTTP 429
    but the URL is self-evidently the homepage root, and the source record
    itself said "Exact URL needs verification"). The claimed article ("Inside
    the U.S. cyber response to Iranian threats after Soleimani killing", attrib.
    Sean D. Naylor in the source record but "McLaughlin/Dorfman" in the event —
    an internal inconsistency) could not be located in web search → PHANTOM
    confirmed; no content hash recorded for it.

    The event-AS-WRITTEN was a US CYBERCOM offensive op against Iranian
    government networks (actor us/unscoped/cmf-actor, target Iran, doctrine
    us/defend-forward), "not officially confirmed." Research finding: the only
    well-documented US CYBERCOM offensive op against Iran in this era is the
    JUNE 2019 op that wiped an IRGC database (already captured as
    2019-06/iran-retaliation-tanker, sourced to WaPo/NYT). NO distinct,
    well-documented US offensive op against Iran exists for Jan-Mar 2020. So the
    US->Iran framing here was unsupportable AND a near-duplicate of the 2019 op.

    What IS real and well-documented in this exact window (opposite direction,
    Iran-claimed -> US) and was MISSING from the corpus: (1) the CISA AA20-006A
    warning (Jan 6 2020) and (2) the Jan 4 2020 defacement of the FDLP homepage.
    Re-scoped the event to the FDLP defacement (the concrete cyber incident),
    set in the AA20-006A warning context. Underlying incident is real -> RE-SOURCE
    (not delete).

