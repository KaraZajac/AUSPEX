id: 2020-03/vicious-panda-mongolia-covid
name: Vicious Panda COVID-themed campaign against Mongolia
start_date: 2020-01-01
disclosure_date: 2020-03-12
end_date: 2020-03-12
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  Check Point discloses a PRC-nexus campaign using
  COVID-19-themed lures (purported Mongolian Ministry of
  Foreign Affairs documents about the COVID response) to
  deliver a custom RAT to Mongolian government targets.
  Infrastructure overlaps with prior Vicious / Mustang Panda
  activity; Check Point tracks the cluster as distinct
  ("Vicious Panda") rather than directly merging it.
false_flag_risk: none
summary: |
  Sits at the head of the COVID-era PRC neighborhood-collection
  wave. Lure documents impersonating the host-country MFA
  on the host-country's own COVID response is a precise
  collection-on-collection pattern — the intelligence value
  is direct insight into how Mongolia perceived and managed
  PRC pandemic measures along the shared border. The "Vicious
  Panda" cluster name partially overlaps with Mustang Panda
  but Check Point did not fully merge the two; AUSPEX
  attributes to Mustang Panda as the most defensible cluster
  pending later vendor consolidation.
