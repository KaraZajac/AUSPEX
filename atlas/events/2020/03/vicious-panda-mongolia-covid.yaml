  notes: |
    Audited against Check Point Research "Vicious Panda: The COVID Campaign"
    (2020-03-12). RAW snapshot captured + hashed:
    sha256 20997941…a5159d09, 202,228 bytes
    (atlas/sources/raw/checkpoint__2020-03-12_vicious-panda-covid.html);
    it is the REAL article (<title>Vicious Panda: The COVID Campaign - Check
    Point Research</title>), not a homepage/phantom.
    [a] FACTS ✓ — every operational claim is source-carried, verbatim:
    "Check Point Research discovered a new campaign against the Mongolian public
    sector, which takes advantage of the current Coronavirus scare, in order to
    deliver a previously unknown malware implant"; "two suspicious RTF documents
    sent to the Mongolian public sector … one of them allegedly from the
    Mongolian Ministry of Foreign Affairs"; "These RTF files were weaponized
    using version 7.x of a tool named RoyalRoad (aka 8.t)"; final stage "the
    malicious loader downloads and decrypts a RAT module … a custom and unique
    malware." CORRECTIONS: outcome_summary/summary rewritten to drop the
    unsupported "infrastructure overlaps with prior Vicious / Mustang Panda
    activity" — the report never mentions Mustang Panda (0 occurrences). Replaced
    with the lineage Check Point ACTUALLY draws: BYEBY RAT (Palo Alto 2017,
    Government of Belarus), a 2016 Mongolian-government attack, and the Enfal
    Trojan.
    [b] ATTRIBUTION — MAJOR CORRECTION. Check Point's own words: "of what we
    believe to be a Chinese-based threat actor" (nation-level); and on actor
    attribution it HEDGES: "we believe that the naming scheme for intel.wll …
    is not enough to make a clear cut attribution." It connects the payload "to
    a known threat group" but never names it, and coins the campaign label
    "Vicious Panda." It NEVER names Mustang Panda. AUSPEX's prior
    actor_id=cn/unscoped/mustang-panda (attributing_org "Check Point Research",
    moderate, concur-with-caveat) was a fabricated pairing — Check Point made no
    such attribution. Per MEMORY (MISP-galaxy = canonical actor reference),
    threat-actor.json lists "Vicious Panda" as a DISTINCT actor (UUID
    68d8c25b-8595-4c20-a5c7-a11a2a34b717, synonym SixLittleMonkeys), NOT a
    Mustang Panda synonym (Mustang Panda's synonym set does not include it).
    Set actor_id=null (real intrusion, no named actor reached),
    attribution_level=activity-cluster, confidence moderate (Chinese-nexus +
    cluster linkage), auspex_assessment=contested.
    [c] DATES ✓ — source published_on 2020-03-12 = disclosure_date (matches the
    article date). start_date kept 2020-01-01 (Check Point frames it as the
    then-current early-2020 COVID campaign; no precise op-start given). end_date
    corrected 2020-03-12 → null (unbounded; the op did not end at disclosure).
    [d] DOCTRINE — kept cn/bri/political-intelligence-collection but DOWNGRADED
    strongly_inferred → plausible: source states no strategic purpose and the
    actor identity is unsettled (distinct Vicious Panda/BYEBY cluster, not
    Mustang Panda), so the actor-mission triangulation is absent and BRI-specific
    vs. generic PRC neighbour-collection both survive; added
    inference_basis.alternatives. attesting_source_id stays null (correct — not
    attested).
    [e] ATTRIBUTION_LEVEL — set activity-cluster (Check Point reached a self-named
    cluster "Vicious Panda" + nation=China; no known named actor).
    [f] ACTOR_ID — was cn/unscoped/mustang-panda (resolves to
    atlas/actors/cn/mustang-panda.yaml). REMOVED as unsupported. See FLAG.
    TARGETS — corrected sectors/government/foreign-ministry → sectors/government
    (country mn): Check Point says the victim is the "Mongolian public sector";
    the MFA is the IMPERSONATED lure sender, not the confirmed victim org — the
    prior foreign-ministry sector was lure-theme inflation.
    Residual: exact operation start is an estimate; the "Vicious Panda"/
    SixLittleMonkeys ↔ Mikroceen relationship is beyond this source's scope.
