id: 2020-03/vicious-panda-mongolia-covid
name: Vicious Panda COVID-themed campaign against the Mongolian public sector
start_date: 2020-01-01
disclosure_date: 2020-03-12
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Check Point Research disclosed a campaign against the
  Mongolian public sector that used COVID-19-themed lures —
  two Mongolian-language RTF documents (one purporting to be
  from the Mongolian Ministry of Foreign Affairs on the
  coronavirus response) weaponized with version 7.x of the
  RoyalRoad/8.t RTF exploit-builder — to deliver a previously
  unknown, custom RAT module via a staged DLL loader. Check
  Point assessed the operator as "a Chinese-based threat
  actor" (nation-level; it stated the intel was "not enough
  to make a clear cut attribution") and, by payload and
  infrastructure overlap, tied the activity to a recurring
  unnamed group behind the BYEBY RAT (Palo Alto, 2017, against
  the Government of Belarus), a 2016 attack on the Mongolian
  government, and the Enfal Trojan lineage. Check Point tracks
  the cluster as "Vicious Panda"; it did NOT name Mustang
  Panda or any known named actor.
false_flag_risk: none
summary: |
  Sits at the head of the COVID-era PRC neighborhood-collection
  wave. Lure documents impersonating the host-country MFA on the
  host-country's own COVID response is a precise
  collection-on-collection pattern — the intelligence value is
  direct insight into how Mongolia perceived and managed PRC
  pandemic measures along the shared border. Check Point named
  neither a service nor a known named actor: it coined the
  campaign label "Vicious Panda" and linked it to a persistent
  Chinese-nexus cluster (BYEBY RAT / 2016 Mongolia / 2017 Belarus
  government / Enfal lineage). MISP-galaxy, the canonical actor
  reference, records "Vicious Panda" (synonym SixLittleMonkeys)
  as a DISTINCT actor, not a Mustang Panda synonym; the corpus
  lacks a Vicious Panda actor record, so this event is left
  unattributed at the named-actor level pending creation of one.
