id: 2020-03/apt41-citrix-pulse-zoho-global-campaign
name: APT41 global N-day campaign (Citrix, Cisco, Zoho)
start_date: 2020-01-20
disclosure_date: 2020-03-25
end_date: 2020-03-11
incident_type:
  - intrusion
initial_vector: n-day
outcome_summary: |
  Mandiant (FireEye) discloses a high-tempo APT41 campaign
  between January 20 and March 11, 2020 against 75+ FireEye
  customers in ~20 countries. APT41 attempted to exploit three
  appliance/product families: CVE-2019-19781 (Citrix ADC /
  NetScaler path traversal), CVE-2019-1653 + CVE-2019-1652
  (Cisco RV320/RV325 small-business routers, combined for RCE),
  and CVE-2020-10189 (Zoho ManageEngine Desktop Central
  Java-deserialization RCE, a then-fresh zero-day). Targeted
  verticals: banking/finance, defense industrial base,
  government, healthcare, manufacturing, oil & gas,
  petrochemical, pharmaceutical, telecom, and utilities,
  among others.
false_flag_risk: none
summary: |
  Defining N-day-velocity event for APT41 — Mandiant frames it
  as one of the broadest campaigns by a China-nexus cyber
  espionage actor it had observed in recent years. FireEye
  observed a lull between roughly January 23 and February 19,
  2020 that Mandiant links to China's own COVID-19 measures
  (Lunar New Year plus Hubei/province quarantines) constraining
  the operators — i.e. the source's COVID discussion concerns
  the ATTACKERS' tempo, not victim remote-access exposure. The
  broad cross-vertical, cross-country victim spread (~20
  countries and ~19 industries, including allied Western states
  such as Denmark, Finland, Sweden, Canada, Australia and the
  UK/US) reads as opportunistic mass N-day exploitation of
  exposed appliances layered over APT41's standing dual
  espionage + for-profit tasking, rather than a
  doctrine-specific target set.
attributions:
  - actor_id: cn/mss/apt41
    attributing_org: FireEye / Mandiant
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-03-25
    attribution_source_id: mandiant/2020-03-25_apt41-global-intrusion-multiple-exploits
    notes: |
      Mandiant names the group ("Chinese actor APT41") and the
      nation (China) unequivocally — named-actor level. It does
      NOT name a service (no MSS claim in this report); the
      cn/mss placement rests on the actor record's other cited
      sources (the DOJ Sept-2020 indictment), not on this one.
doctrine_links:
  - doctrine_id: cn/mic2025
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Victim mix (defense industrial base, manufacturing,
      healthcare, oil-and-gas, telecom) touches most MIC2025
      pillars, but the campaign is a broad opportunistic N-day
      sweep across ~20 countries and ~19 industries (including
      allied Western states), so more than one strategic reading
      survives. Mandiant names no doctrine or purpose; a
      near-indiscriminate mass-exploitation wave hits "every
      pillar" trivially, which is weak evidence for
      doctrine-specific tasking.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "MIC2025-aligned strategic IP/collection tasking: the defense/manufacturing/pharma/oil-and-gas victims map onto China's military-industrial modernization priorities."
        - "Pure opportunism: mass N-day exploitation of whatever appliances are internet-exposed, with any doctrine-relevant victims a by-product of breadth rather than selection."
    counter_explanation: |
      Pure opportunism (N-day exploitation of whatever is
      exposed) is at least as strong a frame as doctrine-driven
      selection; downgraded from strongly_inferred to plausible
      on 2026-07-01 audit because the source states no purpose
      and both readings survive.
    contested: false
    analyst: claude
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/civil-infrastructure-targeting
    program_id: null
    confidence: plausible
    reasoning: |
      Utilities and telecom verticals in the victim mix touch
      the civil-infrastructure-targeting lane; oil-and-gas
      and banking add CII breadth.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
