qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs Mandiant/FireEye "This Is Not a Test: APT41 Initiates Global
    Intrusion Campaign Using Multiple Exploits" (2020-03-25). Raw snapshot
    captured: mandiant__2020-03-25_apt41-global-intrusion-multiple-exploits.html,
    sha256 562d1dce…e3b55180, 292,406 bytes (article body ~23.6k chars of text;
    author byline Glyer/Perez/Jones/Miller, dated March 25, 2020 — real article,
    not a homepage/phantom). This event was flagged as a suspected phantom; it is
    NOT — the source is genuine and first-party, but the EVENT PROSE carried a
    fabricated product/CVE. Corrections:
    [a] FACTS — MAJOR: the event named "CVE-2019-11510 (Pulse Secure SSL VPN)" as
    one of three exploited families. The raw source contains NO "Pulse Secure" and
    NO "11510" (grep-verified: 0 hits). Mandiant's three families are verbatim
    "Citrix NetScaler/ADC, Cisco routers, and Zoho ManageEngine Desktop Central at
    over 75 FireEye customers." Replaced Pulse Secure/CVE-2019-11510 with the real
    third family: Cisco RV320/RV325 routers via CVE-2019-1653 + CVE-2019-1652
    (source: "a Metasploit module that combines two CVE's (CVE-2019-1653 and
    CVE-2019-1652) to enable remote code execution on Cisco RV320 and RV325").
    Citrix = CVE-2019-19781 (36 hits) ✓; Zoho ManageEngine Desktop Central =
    CVE-2020-10189 (Java-deserialization RCE, characterized in-source as a
    "Zero-Day", PoC published by Steven Seeley 2020-03-05) ✓ (also
    CVE-2020-10198 in the payload IOCs). Fixed the `name` field (Pulse→Cisco); id
    slug left stable per schema. Scope: "over 75 FireEye customers"; countries
    enumerated in-source = 20 (Australia, Canada, Denmark, Finland, France, India,
    Italy, Japan, Malaysia, Mexico, Philippines, Poland, Qatar, Saudi Arabia,
    Singapore, Sweden, Switzerland, UAE, UK, USA) → "~20 countries" ✓; industries
    enumerated = 19 (Banking/Finance, Construction, Defense Industrial Base,
    Government, Healthcare, High Technology, Higher Education, Legal, Manufacturing,
    Media, Non-profit, Oil & Gas, Petrochemical, Pharmaceutical, Real Estate,
    Telecommunications, Transportation, Travel, Utility) — all four event sectors
    (finance, healthcare, telecom, critical-infrastructure≈utility/oil-gas) are a
    truthful subset, no inflation. Also STRIPPED the unsupported COVID gloss
    ("victims urgently expanding remote-access infrastructure … delayed on
    patching"): the source's only COVID content is a note that a LULL in APT41
    activity (Jan 23–Feb 19) likely reflects Chinese Lunar New Year + Hubei/province
    quarantines constraining the OPERATORS — i.e. attacker tempo, not victim
    exposure. Rewrote summary to say so.
    [b] ATTRIBUTION — source: "Chinese actor APT41 carry out one of the broadest
    campaigns by a Chinese cyber espionage actor." Names the group + nation
    unequivocally, no service. Added attribution_level: named-actor; kept
    attributing_org_confidence high (unequivocal) and auspex_assessment concur.
    Added a note that cn/mss rests on the actor record's other sources (DOJ
    Sept-2020), not this report.
    [c] DATES — source "Between January 20 and March 11" and published "March 25,
    2020." start_date 2020-01-20 ✓, end_date 2020-03-11 ✓, disclosure_date /
    source published_on 2020-03-25 ✓. No conflation.
    [d] DOCTRINE_LINKS — neither link is attested (no attesting_source needed;
    both null, correct). DOWNGRADED cn/mic2025 strongly_inferred → plausible: the
    prior grade's own counter_explanation conceded pure opportunism as a competing
    frame, and a near-indiscriminate mass-exploitation sweep across ~20 countries /
    19 industries hits "every pillar" trivially — >1 strategic reading survives, so
    plausible is the honest label. Added inference_basis.alternatives. cn/mcf
    (civil-infrastructure-targeting) kept plausible — honest as-is.
    [e] ATTRIBUTION_LEVEL — set named-actor (see [b]).
    [f] ACTOR_ID — cn/mss/apt41 resolves to atlas/actors/cn/apt41.yaml. No actor
    edit. The cn/mss placement was itself audited/kept on 2026-06-24 (DOJ Sept-2020
    boast-of-MSS-connection); no flag.
    Residual: initial_vector kept n-day (dominant campaign character), though the
    Zoho vuln was a fresh 0-day at time of exploitation — single-value field, n-day
    is the best fit for the wave overall.
