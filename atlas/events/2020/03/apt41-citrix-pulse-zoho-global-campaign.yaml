id: 2020-03/apt41-citrix-pulse-zoho-global-campaign
name: APT41 global N-day campaign (Citrix, Pulse, Zoho)
start_date: 2020-01-20
disclosure_date: 2020-03-25
end_date: 2020-03-11
incident_type:
  - intrusion
initial_vector: n-day
outcome_summary: |
  Mandiant discloses an APT41 high-tempo campaign between
  late January and early March 2020 against 75+ victims in
  20+ countries. Exploited N-days included CVE-2019-19781
  (Citrix ADC / NetScaler path traversal), CVE-2019-11510
  (Pulse Secure SSL VPN arbitrary file read), and
  CVE-2020-10189 (Zoho ManageEngine Desktop Central
  deserialization). Verticals: banking, defense, government,
  healthcare, manufacturing, oil-and-gas, telecom, utilities.
false_flag_risk: none
summary: |
  Defining N-day-velocity event for APT41 — Mandiant frames
  it as one of the broadest opportunistic N-day campaigns by
  a single PRC operator ever publicly disclosed. The timing
  is significant: APT41 ran the wave during the early COVID
  lockdown weeks when many victims were urgently expanding
  remote-access infrastructure (Citrix and Pulse Secure
  appliances in particular) and were therefore delayed on
  patching. Cross-vertical victim coverage spanning every
  MIC2025 pillar makes this a textbook case of state-aligned
  N-day opportunism layered over standing strategic
  collection tasking; sector mix runs from biotech and
  healthcare (COVID-research adjacent) through banking and
  utilities (CII pillar).
