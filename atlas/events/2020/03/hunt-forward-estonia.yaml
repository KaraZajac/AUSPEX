id: 2020-03/hunt-forward-estonia
name: Hunt Forward Estonia
start_date: 2020-09-23  # operation ran Sept 23 – Nov 6, 2020 (per press release)
disclosure_date: 2020-12-03  # CYBERCOM press release
end_date: 2020-11-06  # operation end (press release, not the disclosure date)
incident_type:
  - documentary  # retyped 2026-07-01: an invited consensual allied hunt-forward is not an adversarial intrusion (CNMF cohort decision)
initial_vector: unknown
outcome_summary: |
  Consensual, invitation-based joint defensive cyber operation: US CNMF "Hunt
  Forward" teams and Estonian Defense Forces Cyber Command personnel jointly
  hunted for malicious cyber actors on Estonian Defence Forces' networks from
  September 23 to November 6, 2020 — the first such operation between the US and
  Estonia. CYBERCOM publicly acknowledged the partnership in a December 3, 2020
  press release.
false_flag_risk: none
summary: |
  US Cyber National Mission Force (CNMF) Hunt Forward deployment to Estonia.
  Estonian and US cyber commands jointly conducted a defensive cyber operation
  on Estonian Defence Forces' networks from September 23 to November 6, 2020,
  designed to counter malicious cyber actors. US "Hunt Forward" teams and
  Estonian cyber personnel from Defense Forces Cyber Command hunted for adversary
  malware and indicators on critical networks; the CNMF then shares harvested
  malware with US government, private industry, and allies. CNMF Commander Brig.
  Gen. Joe Hartman framed the deployment as gaining "unique insight into our
  adversaries' activities that may impact the U.S." Officially acknowledged via
  CYBERCOM press release December 3, 2020; the operation was the first of its
  kind between the US and Estonia.
