id: 2020-01/winnti-hong-kong-universities
name: Winnti / APT41 intrusions into Hong Kong universities
start_date: 2019-11-01
disclosure_date: 2020-01-31
end_date: 2019-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  ESET discloses Winnti / APT41-lineage intrusions into at
  least two Hong Kong universities during November 2019,
  amid the height of the HK pro-democracy protest movement.
  Updated ShadowPad and Winnti malware variants delivered via
  spear-phishing of university employees.
false_flag_risk: none
summary: |
  Targeting Hong Kong universities during the 2019 protest
  period reads against a pure IP-theft frame; the most
  defensible reading is collection on student-activist
  organization and faculty-political-affiliation rather than
  research IP. ESET refrains from this assessment in their
  blog; AUSPEX assesses the campaign sits at the intersection
  of APT41's "private" tooling (ShadowPad / Winnti) being
  redirected to political-collection use against HK targets —
  consistent with the broader 2019 MSS surge against HK-
  affiliated targets in the run-up to the 2020 National
  Security Law.
