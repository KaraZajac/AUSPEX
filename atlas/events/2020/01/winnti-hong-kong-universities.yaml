qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs ESET "Winnti Group targeting universities in Hong Kong"
    (Mathieu Tartare, 31 Jan 2020). Raw snapshot captured + hashed:
    eset__2020-01-31_winnti-hong-kong-universities.html, 95,057 bytes,
    sha256 960d596a…9507c39. Single-source event; the ESET blog is a
    first-party vendor-research primary (tier kept).

    [a] FACTS — mostly carried, ONE fabrication removed.
    Verbatim support: "In November 2019, we discovered a new campaign
    run by the Winnti Group against two Hong Kong universities. We
    found a new variant of the ShadowPad backdoor … deployed using a
    new launcher and … Winnti"; "the Winnti malware had already been
    found at the end of October"; "at least three additional Hong Kong
    universities may have been compromised using these same ShadowPad
    and Winnti variants"; "in the context of Hong Kong facing civic
    protests that started in June 2019". So "at least two universities"
    (up to five) + "updated ShadowPad/Winnti variants" + protest
    context are all source-carried. REMOVED the fabrication "delivered
    via spear-phishing of university employees": ESET explicitly says
    "we do not have the component that dropped and executed this
    launcher" and only INFERS "the initial execution of this launcher
    is done through DLL side-loading" (malicious hpqhvsei.dll
    side-loaded by legit HP hpqhvind.exe). No phishing anywhere in the
    report. CORRECTIONS: initial_vector phishing -> unknown;
    outcome_summary rewritten to DLL-side-loading + drop the phishing
    claim; incident_type data-theft -> espionage (ESET documents
    ShadowPad/Winnti backdoor implantation for collection, not any
    established exfiltration/theft).

    [b] ATTRIBUTION — de-over-attested. ESET names ONLY "the Winnti
    Group" (declarative), no nation (no China), no service (no MSS),
    no APT41 label, no confidence wording. Added attribution_level:
    named-actor. Kept attributing_org_confidence high (ESET states the
    Winnti-Group attribution as fact) but scoped it in a new notes
    field: the cn/mss actor node is AUSPEX's canonical mapping (Winnti
    is an OVERLAPPING alias/umbrella term per the actor record), and
    the cn/mss placement derives from OTHER sources (DOJ Sep-2020
    indictment), NOT this ESET report. auspex_assessment concur ->
    concur-with-caveat (the Winnti->APT41-proper identification is
    AUSPEX's inference, not ESET's).

    [c] DATES — source published_on 2020-01-31 = byline "31 Jan 2020"
    ✓; disclosure_date 2020-01-31 ✓. start_date 2019-11-01 -> 2019-10-01
    (ESET: Winnti present "at the end of October"). end_date 2019-12-31
    -> null (ESET gives no operation end; remediation was ongoing at
    disclosure — avoids a fabricated bound).

    [d] DOCTRINE_LINKS — link 1 (national-intelligence-law-2017 /
    diaspora-and-dissident-collection) DOWNGRADED strongly_inferred ->
    plausible: ESET gives protest CONTEXT but no motive assessment, and
    APT41's pronounced IP-theft profile leaves research-IP collection
    as a serious competitor (the very reading the parallel cn/mcf link
    encodes) — so "no serious competitor" fails. Link 2 (cn/mcf /
    dual-use-research) kept plausible. Added inference_basis.alternatives
    to both (auditable, colon-space items quoted). Neither is attested,
    so attesting_source_id: null is correct.

    [e] ATTRIBUTION_LEVEL — set named-actor (ESET names the Winnti
    Group cluster; no unit).

    [f] ACTOR_ID — cn/mss/apt41 resolves (atlas/actors/cn/apt41.yaml,
    id cn/mss/apt41). FLAG (residual, not a defect): this event's sole
    source names only "Winnti Group," an umbrella term the actor record
    itself marks as OVERLAPPING (Winnti Umbrella = APT41 + related
    clusters). Assigning this campaign to APT41-proper is AUSPEX's
    identification; a Winnti-Umbrella sibling cluster cannot be fully
    excluded from ESET's evidence alone. Actor record not edited.
