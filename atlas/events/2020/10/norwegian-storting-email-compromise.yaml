id: 2020-10/norwegian-storting-email-compromise
name: Norwegian Storting email compromise
start_date: 2020-08-01
disclosure_date: 2020-09-01
end_date: 2020-09-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Compromise of email accounts in the Norwegian parliament
  (Storting). Norwegian government formally attributed the
  operation to Russia in October 2020.
false_flag_risk: none
summary: |
  One in a long sequence of APT28 / Fancy Bear targeting of
  NATO-member parliaments alongside the 2015 Bundestag and other
  operations. Norwegian MFA public attribution but no DOJ
  indictment. Initial access was achieved via password-spray and
  spear-phishing against Storting email accounts to obtain valid
  credentials, after which operators consistent with GRU Unit
  26165 tradecraft accessed mailboxes through Exchange Web
  Services / IMAP and exfiltrated message contents — the same
  identity-attack pattern visible in the contemporaneous
  Microsoft 365 password-spray waves and a smaller-scale rehearsal
  for SVR's later cloud-identity tradecraft.
attributions:
  - actor_id: ru/gru/26165/apt28
    attributing_org: Norwegian Ministry of Foreign Affairs
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-10-13
    attribution_source_id: null
    notes: |
      Norwegian MFA attribution; no separate AUSPEX source modeled
      yet. Add when ingest covers Norwegian government channels.
