  notes: |
    Audited per AUDIT-PROTOCOL + PHANTOM-REMEDIATION. Path taken:
    RE-SOURCE (not a phantom — the cited MFA statement is the genuine
    primary, but it is nation-level only and does NOT carry the APT28
    attribution the event asserted; added the real PST primary that
    does). Level: PARTIAL because one load-bearing cited source
    (regjeringen-no MFA statement) is bot-walled (Cloudflare "Just a
    moment…" / HTTP 403 to curl AND WebFetch) and un-snapshottable —
    its nation-level claim rests on mirror corroboration (Moscow
    Times / Al Jazeera / High North News, all 2020-10-13). The PST
    primary IS snapshotted + hashed.

    [a] FACTS — corrected. STRIPPED as unsourced/fabricated: "spear-
    phishing" (PST says password brute-forcing, no phishing); "Exchange
    Web Services / IMAP" mailbox-access tradecraft (no source for the
    Aug-2020 event — likely conflated with the SEPARATE Mar-2021
    Storting ProxyLogon/Exchange breach); "same identity-attack pattern
    visible in the contemporaneous Microsoft 365 password-spray waves
    and a smaller-scale rehearsal for SVR's later cloud-identity
    tradecraft" (editorial fabrication, no source). REWROTE summary to
    PST's account: Aug-2020 network operation; police report 1 Sep;
    password brute-forcing to obtain valid usernames/passwords vs a
    high number of accounts → login to a smaller number; sensitive
    content exfiltrated from some mailboxes; attempted lateral movement;
    §121 illegal-intelligence probe closed without indictment. Added
    incident_type: espionage.

    [b] ATTRIBUTION — the core defect. Event asserted a single
    high-confidence MFA→APT28(26165) attribution, but the MFA
    (2020-10-13) source names only "Russia" (nation). Split into the
    real two-entry attribution-latency chain: (1) MFA 2020-10-13,
    nation, high; (2) PST 2020-12-08, named-unit, moderate — PST
    "sannsynlig"/"likely" APT28/Fancy Bear = GRU 85th GTsSS (Unit
    26165). actor_id ru/gru/26165/apt28 is now genuinely source-carried
    (by PST), not imported without a citation.

    [c] DATES — verified. start 2020-08 (op detected Aug 2020) ✓;
    disclosure 2020-09-01 (Storting filed police report + public
    announcement, per PST + Stortinget) ✓; MFA attribution 2020-10-13 ✓;
    PST attribution 2020-12-08 ✓ (raw). Source published_on values
    correct (MFA 2020-10-13; PST 2020-12-08).

    [d] DOCTRINE — ru/military-doctrine-2014/nato-as-principal-threat
    kept at strongly_inferred (honest: neither source states the goal,
    so NOT attested; attesting_source_id null). Added inference_basis
    {signals[], ruled_out}: GRU-26165 espionage actor + NATO-member
    parliament target + sensitive-content exfiltration triangulate to
    anti-NATO strategic espionage; ruled out criminal/financial and
    hack-and-leak readings.

    [e] ATTRIBUTION_LEVEL — set: MFA nation, PST named-unit.

    [f] ACTOR_ID — ru/gru/26165/apt28 resolves (atlas/actors/ru/apt28.yaml,
    id ru/gru/26165/apt28); service ru/gru/26165 (85th GTsSS) resolves.
    Correct.

    RAW EVIDENCE — PST primary sha256 f3d03c89…361a85739, 74688 bytes:
    "Analysene viser at det er sannsynlig at operasjonen er utført av
    cyberaktøren som i åpne kilder omtales som APT28 og Fancy Bear.
    Denne aktøren knyttes til Russlands militære etterretningstjeneste
    GRU, mer spesifikt deres 85. hovedsenter for spesielle tjenester
    (GTsSS)." / "aktøren har benyttet en fremgangsmåte som kalles
    passord-«bruteforcing» for å skaffe gyldige brukernavn og passord …
    mot et høyt antall brukerkontoer … logge seg inn på et mindre antall
    kontoer." / "hentet ut sensitivt innhold fra en del av de berørte
    e-postkonti." MFA source un-snapshottable (Cloudflare) — no hash.

