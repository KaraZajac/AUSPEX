id: 2020-10/norwegian-storting-email-compromise
name: Norwegian Storting email compromise
start_date: 2020-08-01
disclosure_date: 2020-09-01
end_date: 2020-09-30
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: valid-creds
outcome_summary: |
  Compromise of a number of email accounts at the Norwegian
  parliament (Storting); sensitive content was extracted from some
  affected mailboxes. Norway's Foreign Minister publicly attributed
  the operation to Russia at the nation level on 2020-10-13; the
  Police Security Service (PST) subsequently (2020-12-08) assessed
  it likely carried out by APT28 / Fancy Bear, linked to GRU's 85th
  GTsSS (Unit 26165), and closed the case without indictment for
  lack of sufficient evidence.
false_flag_risk: none
summary: |
  In August 2020 the Norwegian parliament (Stortinget) detected a
  network operation against its email system; the Storting filed a
  police report on 1 September 2020 and publicly disclosed the
  breach the same day. Per Norway's Police Security Service (PST),
  the actor used password brute-forcing to obtain valid usernames
  and passwords against a high number of Storting email accounts,
  succeeded in logging into a smaller number of accounts, and
  exfiltrated sensitive content from some of the affected mailboxes;
  the actor also attempted to move laterally further into Storting
  systems. On 2020-10-13 Foreign Minister Ine Eriksen Søreide
  publicly attributed the attack to Russia (nation level). On
  2020-12-08 PST assessed it likely carried out by the actor known
  in open sources as APT28 / Fancy Bear, tied to GRU military
  intelligence, specifically its 85th Main Special Service Center
  (GTsSS / Unit 26165). PST investigated the operation as a possible
  breach of Penal Code §121 (illegal intelligence activity capable
  of harming fundamental national interests) but did not obtain
  sufficient evidence to indict. Part of the broader pattern of
  APT28 targeting NATO-member national legislatures (cf. the 2015
  Bundestag intrusion).
