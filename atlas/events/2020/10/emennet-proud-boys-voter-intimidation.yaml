    Organization (IRGC-EWCD)"). The IRGC-EWCD service linkage rests SOLELY on Treasury.

    [c] DATES — start 2020-09-01 -> 2020-08-01 (DOJ "Starting in approximately August
    2020"; Treasury "Between approximately August 2020 and November 2020"). end
    2020-11-03 -> 2020-11-04 (DOJ documents the Nov 4 2020 media-company intrusion as
    the campaign's last stage). disclosure 2020-10-22 CONFIRMED (AA20-296B "Last Revised
