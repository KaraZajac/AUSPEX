    attributing_org: US Treasury OFAC
    attributing_org_confidence: high
    attribution_level: named-actor  # names Emennet Pasargad + designates IRGC-EWCD as the sponsoring service
    auspex_assessment: concur
    attribution_date: 2021-11-18
    attribution_source_id: treasury/2021-11-18_emennet-pasargad
  - actor_id: ir/irgc/emennet-pasargad
    attributing_org: US DOJ SDNY
    attributing_org_confidence: high
    attribution_level: named-actor  # names Emennet Pasargad (fmr Eeleyanet Gostar) + individuals Kazemi & Kashian; does NOT name the IRGC
    auspex_assessment: concur
    attribution_date: 2021-11-18
    attribution_source_id: doj/2021-11-18_kazemi-kashian
  # CISA AA20-304A (2020-10-30) attribution entry REMOVED 2026-07-11: the 2020 CISA/FBI
