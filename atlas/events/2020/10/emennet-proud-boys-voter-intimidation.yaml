  notes: |
    Full 6-point audit vs the 4 cited RAW sources, all now snapshotted + hashed:
    CISA AA20-304A (sha256 55b7c03e…, pre-existing), CISA AA20-296B (sha256
    30b683c8…, captured this pass), Treasury jy0494 (sha256 0b7af314…, pre-existing),
    DOJ SDNY (sha256 640addeb…, captured this pass via Wayback id_ raw — the live
    justice.gov URL is Akamai-bot-walled). Framed as the operation, so actor_id is
    the Iranian cluster (not a null-actor counter-action).

    [a] FACTS — two fabricated figures STRIPPED (0-hit across ALL four raws):
    "Approximately 25,000 … intimidation emails" and "~90% spam-filtered" — no source
    states a 25,000 count or any spam-filter statistic; DOJ says only the emails went
    "to tens of thousands of registered voters." Replaced with sourced DOJ figures:
    "more than 100,000 State-1 voters' information" downloaded, recon on "approximately
    eleven state voter websites," "at least one state" exfiltrated. Also STRIPPED the
    summary claim that the "Enemies of the People" persona was used in this period —
    0 hits in every cited source (a separate, uncited doxxing campaign). Kept +
    re-sourced: cURL/misconfiguration scraping (DOJ "exploitation of a misconfigured
    computer system"; CISA "abuse of website misconfigurations and a scripted process
    using the cURL tool"); "Proud Boys" emails to registered Democrats (DOJ);
    fabricated FVAP absentee-ballot video (DOJ "False Election Video … create
    fraudulent absentee ballots through the Federal Voting Assistance Program"; CISA
    "propaganda video"; Treasury "fake video"). Added source-backed Nov-4 media-company
    breach + "Proud Boys volunteers" messages to Republican officials/media (DOJ).

    [b] ATTRIBUTION — over-attestation removed. The CISA (2020-10-30) attribution entry
    keyed to ir/irgc/emennet-pasargad at high confidence was DELETED: CISA AA20-304A /
    AA20-296B name only an "Iranian Advanced Persistent Threat Actor(s)" (nation-level)
    and do NOT name Emennet or the IRGC. Two genuine named-actor attributions retained —
    DOJ SDNY (names Emennet Pasargad fmr "Eeleyanet Gostar" + Kazemi & Kashian; does NOT
