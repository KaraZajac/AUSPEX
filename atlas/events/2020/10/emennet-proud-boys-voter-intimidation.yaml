    November 18, 2021".

    [d] DOCTRINE — persona-laundering link (strongly_inferred) re-pointed
    attesting/inference source treasury -> doj (only DOJ names "Proud Boys"); signal
    trimmed to the DOJ Proud-Boys impersonation + CISA "misattribute to a U.S. domestic
