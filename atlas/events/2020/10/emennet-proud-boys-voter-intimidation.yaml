id: 2020-10/emennet-proud-boys-voter-intimidation
name: Emennet Pasargad "Proud Boys" voter-intimidation emails and voter-data theft
start_date: 2020-09-01
disclosure_date: 2020-10-22  # CISA AA20-296B / DNI Ratcliffe press conf
end_date: 2020-11-03
incident_type:
  - influence-operation
  - data-theft
initial_vector: n-day  # cURL exploitation of misconfigured state portals
outcome_summary: |
  Voter-registration data scraped from at least one state's
  misconfigured portal via cURL exploitation. Approximately
  25,000 spoofed "Proud Boys" intimidation emails sent to US
  registered voters (~90% spam-filtered). Disinformation
  video implying fraudulent ballot casting.
quantified_impact:
  intimidation_emails_sent: 25000
  states_voter-data_scraped: 1
false_flag_risk: suspected  # operation impersonated US extremist group Proud Boys
operators_named:
  - kazemi-seyyed-mohammad-hosein-musa  # Emennet Pasargad, DOJ SDNY Nov 2021
  - kashian-sajjad  # Emennet Pasargad, DOJ SDNY Nov 2021
summary: |
  Foundational election-interference event attested by CISA
  (AA20-304A, AA20-296B), DOJ (Kazemi / Kashian indictment
  November 18, 2021), and Treasury (jy0494, November 18, 2021)
  to Emennet Pasargad / IRGC contractor. The "Enemies of the
  People" persona was also used in this period for hack-and-
  leak operations against US officials.
