id: 2020-10/emennet-proud-boys-voter-intimidation
name: Emennet Pasargad "Proud Boys" voter-intimidation emails and voter-data theft
start_date: 2020-08-01  # DOJ "Starting in approximately August 2020"; Treasury "approximately August 2020 and November 2020" (state-site scanning Sep 20-28 per CISA AA20-304A)
disclosure_date: 2020-10-22  # AA20-296B "Last Revised October 22, 2020"; first public attribution Oct 21 2020 Ratcliffe/Wray presser
end_date: 2020-11-04  # DOJ documents a Nov 4 2020 media-company intrusion attempt as the campaign's last stage; Treasury "until November 2020"
incident_type:
  - influence-operation
  - data-theft
initial_vector: unknown  # cURL scraping of a misconfigured public state voter portal — DOJ "exploitation of a misconfigured computer system", CISA "abuse of website misconfigurations" + scripted cURL; broken access control, no software CVE or stolen credential described (so not n-day/0-day/valid-creds)
outcome_summary: |
  Voter-registration data for more than 100,000 voters was scraped
  from one state's ("State-1") misconfigured portal via scripted
  cURL iteration; ~11 state voter websites were probed. Spoofed
  "Proud Boys" emails threatening physical harm were sent to tens
  of thousands of registered Democratic voters unless they changed
  party affiliation and voted for Trump. A fabricated video (built
  from State-1 voter data) purported to show a Proud Boys affiliate
  hacking voter sites to create fraudulent FVAP absentee ballots.
  "Proud Boys volunteers" messages were also sent to Republican
  members of Congress, Trump-campaign figures and media; a U.S.
  media company's network was breached (mitigated by the FBI).
quantified_impact:
  state_voter_records_stolen: 100000  # DOJ: "more than 100,000 State-1 voters' information"
  states_data_exfiltrated: 1          # State-1 (DOJ "at least one state")
  state_voter_sites_probed: 11        # DOJ: recon on "approximately eleven state voter websites"
  # intimidation emails: DOJ says "tens of thousands" — no exact count in any cited source (prior "25000" + "~90% spam-filtered" were unsourced, STRIPPED 2026-07-11)
false_flag_risk: confirmed  # DOJ: emails "purporting to be from the Proud Boys" / senders "claiming to be a 'group of Proud Boys volunteers'"; CISA video "purporting to misattribute the activity to a U.S. domestic actor" — documented impersonation, not merely suspected
operators_named:
  - kazemi-seyyed-mohammad-hosein-musa  # Emennet Pasargad, DOJ SDNY Nov 2021
  - kashian-sajjad  # Emennet Pasargad, DOJ SDNY Nov 2021
summary: |
  Iranian cyber-enabled election-interference operation (approx.
  August-November 2020): scripted cURL scraping of a misconfigured
  state voter portal, spoofed "Proud Boys" voter-intimidation emails
  to tens of thousands of registered Democrats, and a fabricated
  video implying fraudulent absentee-ballot casting. CISA/FBI
  (AA20-296B Oct 22, AA20-304A Oct 30, 2020) attributed the activity
  only to an "Iranian Advanced Persistent Threat Actor" (nation-level,
  no firm named). DOJ SDNY (Kazemi / Kashian indictment, Nov 18 2021)
  and Treasury OFAC (jy0494, Nov 18 2021) later named Emennet Pasargad,
  an IRGC-EWCD contractor firm, and its employees Kazemi and Kashian —
  the IRGC-EWCD sponsor linkage is stated only by Treasury.
attributions:
