id: 2020-06/cycldek-usbculprit-air-gap
name: Cycldek USBCulprit air-gap-bridge against SE Asian governments
start_date: 2017-01-01
disclosure_date: 2020-06-03
end_date: 2020-06-03
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky discloses an updated Cycldek / Goblin Panda
  toolset including the "USBCulprit" USB-bridge component
  used to exfiltrate data from air-gapped Vietnamese
  government networks. Cycldek also tracked against
  Laotian and Thai government targets in the same wave.
false_flag_risk: none
summary: |
  Important for two reasons. First, documents PRC-nexus
  operator-level investment in air-gap-bridging capability
  against SE Asian government targets — the first publicly
  documented USB-based PRC air-gap-bridging tool. Second,
  reinforces Cycldek's role as a regional MSS-aligned
  operator focused on the Vietnam / Laos / Thailand cluster
  of BRI-priority states, complementing Mustang Panda
  (Mongolia, Myanmar) and APT30 / Naikon (ASEAN MFAs
  broadly).
