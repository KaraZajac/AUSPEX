id: 2020-06/cycldek-usbculprit-air-gap
name: Cycldek USBCulprit air-gap-bridge against SE Asian governments
start_date: 2017-01-01
disclosure_date: 2020-06-03
end_date: 2020-06-03
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky (GReAT) discloses a previously undocumented
  Cycldek / Goblin Panda toolset including the "USBCulprit"
  USB-bridge component, which relies on USB media to reach
  and exfiltrate data from air-gapped machines in Southeast
  Asian government networks. Kaspersky assessed the activity
  concentrated on Vietnamese targets, with outliers in Laos
  and Thailand.
false_flag_risk: none
summary: |
  Documents operator-level investment in USB-based
  air-gap-bridging capability against Southeast Asian
  government targets: "USBCulprit", a previously unreported
  tool that relies on USB media to reach and exfiltrate data
  from air-gapped machines. Kaspersky attributes the activity
  to Cycldek (aka Goblin Panda / Conimes), which it
  characterises only as a "long-known Chinese-speaking threat
  actor" — a language-level inference; the report names no
  Chinese service and does not explicitly attribute the group
  to the Chinese state. AUSPEX reads the Vietnam / Laos /
  Thailand government-and-diplomatic targeting as the Mekong /
  SE Asia subset of BRI political-intelligence collection (a
  strongly-inferred doctrine link, not stated by the source).
attributions:
  - actor_id: cn/unscoped/cycldek
    attributing_org: Kaspersky
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-06-03
    attribution_source_id: kaspersky/2020-06-03_cycldek-bridging-air-gap
    notes: |
      Kaspersky (GReAT) confidently identifies the long-tracked
      Cycldek cluster (aka Goblin Panda / Conimes) as the actor —
      named-actor. Caveat on the nation nexus: the report names NO
      Chinese service (0 occurrences of "MSS"/"Ministry of State
      Security") and does not explicitly attribute Cycldek to the
      Chinese STATE — its only attribution wording is a language
      inference, "Cycldek is a long-known Chinese-speaking threat
      actor." Hence the actor is placed cn/unscoped (service
      unresolved) and the cn/ nation bucket rests on that language
      inference; see the actor-file flag (audited 2026-06-24).
doctrine_links:
  - doctrine_id: cn/bri
    pillar_id: cn/bri/political-intelligence-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Vietnam / Laos / Thailand government-and-diplomatic
      targeting is the Mekong / SE Asia subset of BRI
      political-intelligence collection. Strongly-inferred, not
      attested: Kaspersky states no strategic purpose (it frames
      the activity operationally — an espionage / info-stealing
      toolset against SE Asian governments) so there is no
      attesting source, but the actor-mission (regional political
      espionage) + target set (Mekong BRI-priority states,
      diplomatic and government entities) + long-run persistence
      triangulate to this reading with no serious competitor.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Kaspersky: Cycldek 'has been active in the past two years, conducting targeted operations against governments in Southeast Asia'; 'all targets were diplomatic and government entities'."
        - "Geographic focus on Vietnam with outliers in Laos and Thailand — the Mekong / BRI-priority subset of SE Asia; lures themed on regional political / diplomatic affairs."
        - "Custom info-stealing + air-gap-exfiltration toolset (USBCulprit) against government networks indicates political-intelligence collection, not revenue or disruption."
      ruled_out: "cn/mcf (military-civil fusion): no dual-use-research, defence-industrial, or technology-acquisition targeting is evidenced — the victims are diplomatic/government entities, which fits BRI political-intelligence collection rather than MCF."
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government/foreign-ministry
    role: primary
  - target_id: sectors/government
    role: primary
sources:
  - kaspersky/2020-06-03_cycldek-bridging-air-gap
