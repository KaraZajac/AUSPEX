id: 2020-06/belltrox-reuters-disclosure
name: Reuters / Citizen Lab disclose BellTroX hack-for-hire (Dark Basin)
start_date: 2013-01-01
disclosure_date: 2020-06-09
end_date: 2020-06-09
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Citizen Lab and Reuters published joint investigations
  identifying BellTroX InfoTech Services of Delhi as the
  operator of "Dark Basin," a hack-for-hire operation that
  targeted approximately 10,000 email accounts across thousands
  of individuals over seven years on behalf of commercial
  clients. Citizen Lab's report named US litigation finance
  firms, environmental advocacy organizations (including those
  involved in the ExxonMobil climate-change litigation), and
  short-sellers among the documented client equities. BellTroX
  principal Sumit Gupta had been previously indicted in a US
  federal case (2015 Aviram Azari adjunct) but operations
  continued.
false_flag_risk: none
operators_named:
  - gupta-sumit  # BellTroX principal, Citizen Lab 2020 + prior DOJ 2015 indictment
summary: |
  The first comprehensive public exposure of an Indian-based
  hack-for-hire operation. Foundational for the AUSPEX
  contractor-hack-for-hire doctrine entry; established the
  pattern that subsequent Appin and CyberRoot disclosures
  followed. The Aviram Azari conviction (2022) was a direct
  downstream effect — Azari was the Israeli intermediary who
  contracted BellTroX on behalf of US-litigation clients.
