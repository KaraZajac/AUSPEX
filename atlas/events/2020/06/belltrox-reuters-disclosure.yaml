id: 2020-06/belltrox-reuters-disclosure
name: Reuters / Citizen Lab disclose BellTroX hack-for-hire (Dark Basin)
start_date: 2013-01-01  # earliest Dark Basin activity; belltrox[.]org domain registered 2013-07-27 (Citizen Lab); Reuters frames the spree as "a period of seven years" ending ~2020
disclosure_date: 2020-06-09  # joint Citizen Lab report + Reuters exclusive, both dated "June 9, 2020"
end_date: 2020-06-09  # operation active until public exposure; neither source dates a distinct cessation (proxy = disclosure). Matches actor in/belltrox active_until
incident_type:
  - espionage   # Citizen Lab: "commercial espionage on behalf of their clients"; Reuters headline: "spied on politicians, investors" (schema has no 'hack-for-hire'/'credential-phishing' enum; that character is carried by initial_vector + doctrine link + prose)
  - intrusion   # successful email-account compromises
  - data-theft  # exfiltration of targeted inboxes
initial_vector: phishing  # Citizen Lab: mass "credential phishing" via shortened-URL lures — the hack-for-hire delivery mechanism
outcome_summary: |
  Citizen Lab and Reuters published companion investigations (both
  2020-06-09) identifying BellTroX InfoTech Services of Delhi / New
  Delhi as the operator of "Dark Basin," a commercial hack-for-hire
  operation run on behalf of unidentified clients. Citizen Lab linked
  Dark Basin to BellTroX "with high confidence" and documented
  targeting of "thousands of individuals and hundreds of institutions
  on six continents" — advocacy groups and journalists, elected and
  senior government officials, hedge funds, short-sellers, and
  multiple industries — enumerating 27,591 credential-phishing URLs.
  Reuters framed the same spree as an attempt to "spy on more than
  10,000 email accounts over a period of seven years," naming among
  the TARGETS government officials in Europe, gambling tycoons in the
  Bahamas, and US investors including private-equity firm KKR and
  short-seller Muddy Waters; Citizen Lab separately documented
  targeting of the #ExxonKnew climate-litigation advocacy campaign.
  Both outlets stressed that the CLIENTS who commissioned the hacking
  were NOT identified ("Reuters does not know the identity of
  BellTroX's clients"; owner Sumit Gupta declined to name them and
  denied wrongdoing). Citizen Lab noted BellTroX director Sumit Gupta
  had been indicted in California in 2015 for a similar, separate
  hack-for-hire scheme, yet operations continued.
false_flag_risk: none
operators_named:
  - gupta-sumit  # BellTroX principal, Citizen Lab 2020 + prior DOJ 2015 indictment
summary: |
  The first comprehensive public exposure of an Indian commercial
  hack-for-hire operation at scale. Foundational for the AUSPEX
  in/contractor-hack-for-hire doctrine entry and a template the later
  Appin (Reuters / SentinelOne, 2023) disclosure followed. Modeled as
  a mercenary / commercial actor, NOT a nation-state operation:
  BellTroX is an India-based firm selling hacking services to paying
  clients; the actor sits at in/belltrox with primary_service_id null
  (no attested state-service parent — host-nation modeling of the
  Indian contractor ecosystem, mirroring in/appin-security), and
  Citizen Lab / Reuters frame the tasking as "commercial espionage on
  behalf of their clients," not state collection. Directionality:
  India-based attacker, globally distributed victims, clients
  unidentified. NB — the "2015 indictment" of principal Sumit Gupta
  was the Northern-District-of-California ViSalus hack-for-hire case
  (see event 2015-12/sumit-gupta-belltrox-indictment); it is NOT the
  separate SDNY Aviram Azari matter. Azari is unmentioned in either
  2020 source and the Azari conviction (2022) post-dates them — a 2020
  report cannot cite it — so the prior claim that "Azari contracted
  BellTroX" (stripped) was neither sourced here nor established by the
  DOJ indictment, which named Azari + "a group located in India," not
  BellTroX.
