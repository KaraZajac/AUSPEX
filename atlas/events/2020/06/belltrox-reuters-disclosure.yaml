  notes: |
    6-point audit vs the two cited raws. SNAPSHOTS: Citizen Lab live
    curl HTTP 200, full report -> raw/citizenlab__2020-06-09_dark-basin.html
    (223,206 B, sha256 86d192a05c1665bfdf790a916a7b844305714ee598297312aef8e13e90b1c37b).
    Reuters live HTTP 401 (bot-walled); Wayback capture (archive_url)
    carries the full genuine article -> raw/reuters__2020-06-09_belltrox-hack-for-hire.html
    (382,340 B, sha256 1e0bdc678e2a03aa471adaae6e121596a01fb9e66de0533aa790df9ee9d87d95).
    level=full: every load-bearing claim is carried by a snapshotted
    source (Reuters via Wayback, not live).
    [a] FACTS — three corrections. (1) SCALE MIS-ATTRIBUTED: event said
    "Citizen Lab documented ~10,000 email accounts." The "more than
    10,000 email accounts over a period of seven years" figure is
    REUTERS' lead, not Citizen Lab's. Citizen Lab's own scale is
    "thousands of individuals and hundreds of institutions on six
    continents" and enumeration "uncovered 27,591 different long URLs,
    each of which led to a Dark Basin credential phishing website"
    (~28,000 URLs). Rewrote to attribute each figure to its actual
    source; neither "10,000" nor "seven years" appears anywhere in the
    Citizen Lab report (grep=0). (2) TARGET/CLIENT CONFLATION: event
    said Citizen Lab "named US litigation finance firms … short-sellers
    among the documented client equities." False — those were TARGETS,
    and both sources say clients are UNKNOWN: Reuters "Reuters does not
    know the identity of BellTroX's clients"; owner Sumit Gupta
    "declined to disclose who had hired him and denied any wrongdoing."
    Reframed as targets + explicit clients-unidentified. (3) 2015-
    INDICTMENT ERROR: event said Gupta was indicted "(2015 Aviram Azari
    adjunct)." Citizen Lab verbatim: "BellTroX's director, Sumit Gupta,
    was indicted in California in 2015 for his role in a similar
    hack-for-hire scheme" — the N.D. Cal ViSalus case (sibling event
    2015-12/sumit-gupta-belltrox-indictment), NOT the SDNY Azari matter.
    STRIPPED the anachronistic/​unsourced summary claim that "Azari …
    contracted BellTroX" (2020 sources cannot cite a 2022 conviction;
    "Azari" appears 0x in BOTH raws; actor record notes the DOJ
    indictment named Azari + "a group located in India," not BellTroX).
    Kept #ExxonKnew / short-seller (Muddy Waters) / KKR / Bahamas /
    European-officials targets — all verbatim-confirmed.
    [b] ATTRIBUTION — in/belltrox by both outlets; confidence high is
    correct (CL verbatim "With high confidence, we link Dark Basin to
    BellTroX InfoTech Services"; Reuters on ex-employees + researchers +
    online evidence). auspex_assessment concur retained. NOT a
    nation-state op — commercial mercenary; no over-attestation.
    Expanded CL author list; added Jack Stubbs to Reuters byline (per
    source record). Actor id verified: in/belltrox is the DELIBERATE
    model (host-nation India, primary_service_id null = no state organ,
    mirrors in/appin-security) — NOT moved to criminal/ (would orphan
    the in/contractor-hack-for-hire doctrine); "criminal/belltrox / in/
    unscoped" hypothesis rejected on that basis.
    [c] DATES — start 2013-01-01 kept (belltrox[.]org registered
    2013-07-27; "seven years" to 2020). disclosure 2020-06-09 confirmed
    (CL "Date Published June 9, 2020"; Reuters "released … on Tuesday"
