id: 2020-06/sidewinder-nepal-bhutan-sri-lanka
name: Trend Micro documents SideWinder targeting of Nepalese, Bhutanese, Sri Lankan governments
start_date: 2019-06-01
disclosure_date: 2020-06-04
end_date: 2020-04-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Trend Micro published a technical analysis of SideWinder /
  Rattlesnake operations against Nepalese, Bhutanese, and Sri
  Lankan government targets during 2019-2020. SideWinder used
  weaponized RTF documents exploiting CVE-2017-11882 and HTA-
  staged droppers; tradecraft was consistent with prior Kaspersky
  reporting on Pakistani targets. Lures themed on regional
  political content (Indo-Nepal border issues, Bhutanese foreign-
  ministry communications, Sri Lankan ministerial circulars).
false_flag_risk: none
summary: |
  Significant extension of the SideWinder picture beyond the
  Pakistan-primary cluster: Nepal and Bhutan are India-adjacent
  Himalayan states with extensive Indian intelligence interest;
  Sri Lanka is a recurring South Asian collection target
  consistent with Indian regional intelligence priorities. The
  BackDeer family is the canonical implant referenced in Trend
  Micro's analysis.
