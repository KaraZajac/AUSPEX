initial_vector: phishing
outcome_summary: |
  Trend Micro's December 2020 report "SideWinder Uses South Asian
  Issues for Spear Phishing, Mobile Attacks" documented a long-running
  SideWinder credential-phishing and intrusion campaign whose
  phishing-domain table spans 2019 Nov - 2020 Nov. The group's
  targets were "multiple government and military units, mainly in
  Nepal and Afghanistan". In Nepal, dozens of bodies appear in the
  table, including the Government of Nepal and the Ministries of
  Defence / Foreign Affairs / Home Affairs / Finance, the Nepali
  Army, Nepal Police, the Armed Police Force, Nepal Rastra Bank
  (central bank), the Federal Parliament of Nepal, Nepal Telecom and
  the Nepal Communist Party. In Afghanistan, the targets are the
  Administrative Office of the President / Presidential Palace
  (aop.gov.af, arg.gov.af), the National Security Council (nsc.gov.af)
  and the Ministry of Higher Education (mohe.gov.af). The table also
  lists the Ministry of Defense of Sri Lanka (defence.lk) and the
  Ministry of Foreign Affairs of China (mfa.gov.cn), and the report
  states the group "also launched attacks against Pakistan,
  Bangladesh, and China using lure files related to Covid-19" (plus
  single entries for Qatar Charity and Myanma Posts and
  Telecommunications). Delivery used weaponized RTF documents
  (CVE-2017-11882) and ZIP -> LNK -> HTA -> JavaScript droppers that
  installed a .NET "backdoor + stealer"; the group also deployed
  malicious Android APKs that rooted devices via CVE-2019-2215 and
  MediaTek-SU. Lures were themed on COVID-19 and South Asian
  territorial disputes (the Nepal-India Lipulekh / Humla rows, the
  Indo-Pakistani political-map dispute).
false_flag_risk: none
summary: |
  Trend Micro's Dec-2020 disclosure is the canonical record of
  SideWinder's broad South Asian government and military targeting.
  SideWinder is an India-aligned espionage cluster, attributed at
  named-actor level; this Trend Micro report itself names no nation or
  service - India appears only as a territorial-dispute subject in the
  lures, and the India-aligned read rests on the actor's other cited
  reporting. The dominant victim set - Nepalese and Afghan government,
  defence and security bodies, alongside Sri Lankan defence, Chinese
  foreign-affairs, and Pakistani / Bangladeshi targets - fits
  SideWinder's documented regional government / diplomatic-collection
  lane and Indian regional-collection priorities. This event is the
  canonical anchor that subsumes the per-country fragment
  2020-04/sidewinder-afghanistan-government, which rests on the same
  single Trend Micro report; the Afghan victim set is folded in here.
