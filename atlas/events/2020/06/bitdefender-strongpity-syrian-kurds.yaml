id: 2020-06/bitdefender-strongpity-syrian-kurds
name: Bitdefender documents StrongPity targeting of Syrian Kurdish community
start_date: 2019-10-01
disclosure_date: 2020-06-30
end_date: 2020-06-01
incident_type:
  - intrusion
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  Bitdefender published an extended analysis of StrongPity /
  PROMETHIUM operations targeting members of the Syrian Kurdish
  community, particularly in the period following the October
  2019 Turkish Operation Peace Spring incursion into northeast
  Syria. Targets received trojanized installers of legitimate
  Kurdish-language and security-tool software. The temporal
  alignment with the military operation is the strongest piece
  of evidence for state-direction in the public reporting.
false_flag_risk: none
summary: |
  The clearest publicly documented temporal alignment between
  Turkish kinetic operations (Operation Peace Spring) and
  contemporaneous cyber surveillance of Kurdish targets. Provides
  high-confidence evidence for the counter-Kurdish-diaspora
  pillar of the inferred Turkish surveillance doctrine.
attributions:
