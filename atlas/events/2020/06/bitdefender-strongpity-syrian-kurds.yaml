id: 2020-06/bitdefender-strongpity-syrian-kurds
name: Bitdefender documents StrongPity/PROMETHIUM watering-hole surveillance of the Kurdish community (Turkey–Syria)
start_date: 2018-01-01
disclosure_date: 2020-06-30
end_date: null
incident_type:
  - intrusion
  - data-theft
  - surveillance
initial_vector: supply-chain
outcome_summary: |
  Bitdefender published an extended technical analysis of
  StrongPity / PROMETHIUM operations. Using a watering-hole
  technique, the actor served IP-targeted trojanized installers
  of popular legitimate software (7-Zip, WinRAR, McAfee Security
  Scan Plus, Recuva, TeamViewer, WhatsApp, CCleaner, Disk Drill,
  DAEMON Tools Lite, Glary Utilities, RAR Password Unlocker) to
  selected victims, dropping a backdoor that searched for and
  exfiltrated documents over a three-tier proxied C2. Bitdefender
  reports the victims were concentrated in Turkey and Syria — most
  near the Turkey–Syria border and in Istanbul — and assesses the
  actor was "interested especially in the Kurdish community,"
  situating the threat in "the constant conflicts between Turkey
  and the Kurdish community." Bitdefender states it is "believed
  that the attacks attributed to StrongPity are government-sponsored
  and are used for population surveillance and intelligence
  exfiltration"; it does not name a specific sponsoring state or
  service.
false_flag_risk: none
summary: |
  A first-party Bitdefender whitepaper documenting StrongPity /
  PROMETHIUM watering-hole surveillance operations against the
  Kurdish community in the Turkey–Syria border region (victims
  concentrated near the border and in Istanbul, spanning Turkey
  and Syria). Bitdefender assesses the campaign as
  government-sponsored population surveillance placed in the
  geopolitical context of the Turkey–Kurdish conflict, but names
  no specific sponsoring state or service. Supports the
  counter-Kurdish-surveillance reading of Turkish state-aligned
  activity at the strongly-inferred level.
