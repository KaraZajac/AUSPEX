id: 2020-06/talos-promethium-strongpity3-global-expansion
name: Cisco Talos documents PROMETHIUM StrongPity3 global victimology expansion
start_date: 2019-07-01
disclosure_date: 2020-06-29
end_date: 2020-06-29
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Cisco Talos published a PROMETHIUM-cluster analysis documenting
  continued StrongPity operations through 2019–2020 with
  significantly expanded geographic targeting beyond the cluster's
  prior Europe / Middle East focus — Colombia, India, Canada and
  Vietnam appeared as new victim countries alongside ongoing
  Turkish, Syrian, and Kurdish-region operations. The cluster
  continued its hallmark technique of trojanizing legitimate
  software installers (Firefox, VPNpro, DriverPack, 7-Zip,
  WinBox, CCleaner) and used a multi-tier C2 infrastructure to
  complicate forensic attribution. Talos framed the report as
  documenting an "ongoing revamping after public disclosure" —
  highlighting that PROMETHIUM was responding to the 2018
  Citizen Lab disclosure by expansion rather than retreat.
false_flag_risk: suspected
summary: |
  Documents the operational pattern of PROMETHIUM responding to
  public attribution by broadening victimology rather than going
  quiet — atypical for most non-RU/non-DPRK clusters and
  consistent with strong state backing. The Colombia / India /
  Canada / Vietnam additions complicate the
  counter-Gülen/counter-Kurd reading and may reflect diaspora
  collection in expat communities or instrumented test
  victimology; the public reporting is not granular enough to
  distinguish. Suspected false-flag-risk preserved from the
  longer-running Stealth Falcon overlap discussion.
