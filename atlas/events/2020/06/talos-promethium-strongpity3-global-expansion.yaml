id: 2020-06/talos-promethium-strongpity3-global-expansion
name: Cisco Talos documents PROMETHIUM StrongPity3 global victimology expansion
start_date: 2019-07-01
disclosure_date: 2020-06-29
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: unknown
outcome_summary: |
  Cisco Talos published a PROMETHIUM-cluster (StrongPity3) analysis
  documenting continued operations through 2019–2020. By matching
  code similarity, C2 paths, toolkit structure and behaviour Talos
  identified "around 30 new C2 domains" and at least three campaigns
  since July 2019, and observed the cluster expanding "behind their
  initial focus in Europe and Middle East" to victims in Colombia,
  India, Canada and Vietnam ("seemingly non related countries"). It
  continued its hallmark technique of trojanizing legitimate
  software installers; the four new trojanized setups Talos observed
  were Firefox, VPNpro, DriverPack and 5kPlayer. Talos could not
  identify the infection vector and explicitly assessed it "does not
  seem to be related to a supply-chain attack", estimating instead
  the CitizenLab-2018-documented ISP HTTP-redirect / watering-hole
  delivery; the C2 used HTTPS with self-signed certificates. Talos
  noted the actor was "not deterred despite being exposed multiple
  times over the past four years" — changing its toolkit but not its
  techniques — and floated that StrongPity3 may be "an exported
  solution for other actors to use" / an "enterprise service for
  hire". A residual Turkey tie persists: a Turkish-language version
  of the trojanized Firefox installer, aligned with CitizenLab's
  finding that Turkish users were the most targeted. (Talos makes no
  fresh nation attribution and no mention of Kurds; the co-cited
  Bitdefender 2020 whitepaper supplies the Turkey/Syria Kurdish-
  community targeting and the three-tier proxied C2 detail.)
false_flag_risk: suspected
summary: |
  Documents the operational pattern of PROMETHIUM continuing and
  broadening operations after repeated public exposure rather than
  going quiet — Talos: the actor is "not deterred despite being
  exposed multiple times over the past four years" and continues to
  "expand their victimology". The Colombia / India / Canada /
  Vietnam additions complicate any tight counter-Gülen / counter-Kurd
  reading; Talos itself offers a competing explanation — that
  StrongPity3 may be "an exported solution for other actors to use"
  / an "enterprise service for hire", which would mean the
  scattered, unrelated victim countries reflect several operators of
  a shared commodity toolkit rather than one Turkey-nexus actor. The
  public reporting is not granular enough to distinguish diaspora
  collection from commodity-tool reuse. false_flag_risk is set to
  suspected on that exported-tooling basis (shared/for-hire tooling
  degrades single-actor attribution) — NOT on any claim in the cited
  sources of a deliberately planted flag. The Turkey-nexus and
  counter-Kurdish reading rests on the co-cited Bitdefender (2020)
  and upstream CitizenLab (2018) work, not on fresh evidence in this
  Talos report, which mentions no Kurdish targeting.
