    notes: |
      Talos independently re-identifies the named cluster
      PROMETHIUM / StrongPity3 first-party by "code similarity,
      command and control (C2) paths, toolkit structure and
      malicious behavior" — high confidence on the actor cluster,
      hence named-actor. It makes NO fresh nation attribution in
      this report ("Previous research even linked PROMETHIUM to
      state-sponsored threats"), so the Turkish-aligned / strategic
      reading rests on the upstream Citizen Lab (2018) and
      Bitdefender (2020) work, not on this report — hence
      concur-with-caveat. Talos also floats a competing possibility
      that StrongPity3 is "an exported solution for other actors to
      use" / an "enterprise service for hire", which if true would
      loosen single-actor attribution.
doctrine_links:
  - doctrine_id: tr/counter-gulen-kurdish-surveillance
    pillar_id: tr/counter-gulen-kurdish-surveillance/kurdish-diaspora
    program_id: null
    confidence: plausible
    reasoning: |
      This Talos report — the event's titular source — documents
      global victimology expansion (Colombia / India / Canada /
      Vietnam) and only a residual Turkey tie (a Turkish-language
      trojanized Firefox installer); it mentions no Kurdish
      targeting at all. The counter-Kurdish-diaspora pillar fit
      therefore rests on the co-cited Bitdefender 2020 whitepaper
      (Kurdish-community surveillance in the Turkey–Syria border
      region), not on Talos. The simultaneous expansion into
      unrelated countries — which Talos itself explains as possible
      commodity / for-hire tooling reuse — is uncomfortable for a
      tightly pillar-aligned reading and holds confidence at
      plausible rather than strongly inferred.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Residual Turkey tie in this report: a Turkish-language version of the trojanized Firefox installer, which Talos calls 'aligned with CitizenLab's claim that Turkish people were the most targeted'."
        - "Co-cited Bitdefender 2020 documents government-sponsored surveillance of the Kurdish community concentrated in the Turkey–Syria border region and Istanbul."
        - "Actor mission: PROMETHIUM / StrongPity is a Turkey-nexus espionage cluster in the cited reporting (nation-level 'government-sponsored', no service named)."
      alternatives:
        - "Commodity / 'exported solution for hire': Talos floats that StrongPity3 may be used by multiple actors, in which case the scattered Colombia / India / Canada / Vietnam victims need not reflect a single Turkey-nexus counter-Kurdish mandate."
      ruled_out: "Financially-motivated crimeware — excluded by the espionage focus (Office-document exfiltration only) and the government-sponsored linkage in prior reporting."
    contested: false
    analyst: claude
