  notes: |
    Audited against the raw Cisco Talos blog "PROMETHIUM extends global reach with
    StrongPity3 APT" (2020-06-29), captured live this audit (HTTP 200; sha256
    8251f69a4c2216da0a9d01fbbf4502bc55706008bb9b8e0f1f944fdbb85901e5, 94,561 bytes;
    raw_snapshot talos__2020-06-29_promethium-strongpity3.html) and the co-cited
    Bitdefender whitepaper (2020-06-30, sha256 f2b85d61…f72422eb, 5,426,737 bytes,
    already on disk — hash re-verified). This is the SIBLING of 2016-10/kaspersky-
    strongpity-disclosure and 2020-06/bitdefender-strongpity-syrian-kurds (same actor
    tr/unscoped/promethium; continuity chain Kaspersky 2016 → CitizenLab 2018 → Talos +
    Bitdefender 2020).

    [a] FACTS — four fabrications / mis-attributions corrected (Bitdefender-mislabel watch):
      • Trojanized-installer list "Firefox, VPNpro, DriverPack, 7-Zip, WinBox, CCleaner"
        was WRONG. Talos verbatim: "at least four new trojanized setup files … Firefox
        (a browser), VPNpro (a VPN client), DriverPack (a pack of drivers) and 5kPlayer
        (a media player)." grep of the full raw: 7-Zip/WinBox/CCleaner/WinRAR = 0 hits.
        STRIPPED those three (borrowed from Bitdefender/AT&T reporting); ADDED 5kPlayer.
      • "multi-tier C2 infrastructure to complicate forensic attribution" — NOT a Talos
        claim (grep: "multi-tier"/"proxied"/"three-tier"/"proxy" = 0). Talos documents
        "around 30 new C2 domains" over HTTPS with "self-signed certificates". The
        three-tier proxied C2 is a BITDEFENDER detail — re-attributed to Bitdefender in
        prose so nothing is falsely credited to Talos.
      • Fabricated QUOTE: outcome_summary presented Talos as documenting an "ongoing
        revamping after public disclosure" — "revamping" = 0 hits in the raw. Removed;
        replaced with Talos's actual language ("not deterred despite being exposed
        multiple times over the past four years"; "changed their toolkit but not their
        techniques or procedures").
      • "ongoing Turkish, Syrian, and Kurdish-region operations" — Talos mentions NO Kurds
        (grep "kurd" = 0). Reframed to the residual Turkey tie Talos DOES carry (a
        Turkish-language trojanized Firefox installer, "aligned with CitizenLab's claim
        that Turkish people were the most targeted") + the prior CitizenLab Turkey/Syria
        focus; Kurdish framing re-attributed to co-cited Bitdefender.
      Verified TRUE against Talos and kept: victims "in Colombia, India, Canada and
      Vietnam"; prior "initial focus in Europe and Middle East"; "around 30 new C2
      domains"; "at least three different campaigns since July 2019"; espionage +
      Microsoft-Office-file exfiltration.
    [b] ATTRIBUTION — attributing_org_confidence moderate → high (Talos re-identifies
      PROMETHIUM/StrongPity3 first-party by "code similarity, command and control (C2)
      paths, toolkit structure and malicious behavior"). Added attribution_level:
      named-actor (names the cluster; no nation named in-report — matches the sibling
      Bitdefender event's treatment). auspex_assessment concur-with-caveat RETAINED: no
      fresh nation attribution here ("Previous research even linked PROMETHIUM to
      state-sponsored threats"); Turkish/strategic reading inherited from CitizenLab
      2018 + Bitdefender 2020. Not over-attesting Turkey or the MİT.
    [c] DATES — start_date 2019-07-01 KEPT (Talos: "at least three different campaigns
      since July 2019"; "four different trojaned binaries in use since July 2019"; NB
      Talos notes some domains "going back to 2018"). disclosure_date 2020-06-29 ✓
      (byline "Monday, June 29, 2020 13:59"). end_date 2020-06-29 → null: conflated
      disclosure with operation end; Talos says the "infection vectors are still active"
      at writing (point-in-time report, nothing bounds the op) — mirrors the sibling.
    [c2] incident_type [intrusion, supply-chain] → [intrusion, espionage] and
      initial_vector supply-chain → unknown: Talos EXPLICITLY disclaims supply-chain
      ("The infection vector does not seem to be related to a supply-chain attack,
      either"; "We have no evidence that the websites of the real applications were
      compromised") and "did not identify the infection vectors" (estimates ISP
      HTTP-redirect / watering-hole per CitizenLab; neither is a schema initial_vector
      value → unknown). "espionage" is Talos's own word ("This group mainly focuses on
      espionage").
    [d] DOCTRINE — confidence KEPT plausible (honest: this report's global expansion +
      zero Kurdish mention dilutes the pillar fit, which rests on co-cited Bitdefender,
      not Talos). Rewrote reasoning; ADDED inference_basis {signals[], alternatives[],
      ruled_out} (was missing) — alternatives[] carries Talos's own "exported solution
      for hire" competing explanation. attesting_source_id: null (NOT attested — no cited
      source states a Turkish counter-Kurdish mandate). Perspective attacker-rationale
      (default, attacker's own doctrine on its operation) left implicit per sibling.
      colon-space list items quoted.
    [e] attribution_level SET (named-actor).
    [f] actor_id tr/unscoped/promethium RESOLVES → atlas/actors/tr/promethium.yaml
      (id tr/unscoped/promethium). Correct id already; no actor edits.

    false_flag_risk: suspected RETAINED but re-based — summary previously justified it by
