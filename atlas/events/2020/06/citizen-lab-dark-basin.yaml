  notes: |
    6-point audit vs the two cited raws. This is the canonical
    Citizen-Lab-angle event; the Reuters-angle disclosure of the same
    op is the SIBLING 2020-06/belltrox-reuters-disclosure (audited same
    day) — cross-linked in prose, NOT merged. SNAPSHOTS already carried
    by both shared source records (PRESERVE tier, unchanged): Citizen
    Lab live curl HTTP 200, full report -> raw/citizenlab__2020-06-09_dark-basin.html
    (223,206 B, sha256 86d192a05c1665bfdf790a916a7b844305714ee598297312aef8e13e90b1c37b);
    Reuters live HTTP 401 (bot-walled), Wayback capture ->
    raw/reuters__2020-06-09_belltrox-hack-for-hire.html (382,340 B,
    sha256 1e0bdc678e2a03aa471adaae6e121596a01fb9e66de0533aa790df9ee9d87d95).
    level=full: every load-bearing claim carried by a snapshotted source.
    [a] FACTS — four corrections. (1) SCALE MIS-ATTRIBUTED: outcome_summary
    framed "seven years … ~10,000 targets" as Citizen Lab's. Both are
    REUTERS' ("more than 10,000 email accounts over a period of seven
    years") — grep of the CL raw = 0 for both "10,000" (only CSS z-index
    /Facebook-id noise) and "seven years"; CL's own time framing is
    "multi-year investigation"/"over several years." Rewrote to CL's
    actual scale: "thousands of individuals and hundreds of institutions
    on six continents" + enumeration "27,591 different long URLs, each of
    which led to a Dark Basin credential phishing website" and "almost
    28,000 additional URLs containing e-mail addresses of targets"; added
    an explicit NB deferring the 10,000/seven-years framing to the Reuters
    sibling. (2) NORTONLIFELOCK/EFF ROLE: event said CL "worked with
    NortonLifeLock and the EFF on victim notification." Corrected per raw:
    NortonLifeLock was the technical research COLLABORATOR ("Along with
    our collaborators at NortonLifeLock, we have unearthed numerous
    technical links … These links lead us to conclude with high confidence
    that Dark Basin is linked to BellTroX"); EFF INDEPENDENTLY uncovered
    related phishing in 2017 (not a joint notification partner). (3)
    BOASTING OVER-SPECIFIED: "open social-media boasting by Sumit Gupta"
    -> CL attributes the posts to "individuals working at BellTroX"
    ("made social media posts describing and taking credit for attack
    techniques"); softened to "BellTroX personnel." (4) AZARI STRIPPED:
    removed the summary claim that the investigation "seeded subsequent
    DOJ action against Aviram Azari (2020 indictment, 2022 conviction) …
    principal sales channel," and removed azari-aviram from operators_named.
    Unsourced by BOTH cited raws ("Azari" appears 0x in the CL report; a
    2020 report cannot cite a 2022 plea) AND causally false (Azari was
    arrested Sept-2019, ~9 months BEFORE this report, so CL did not "seed"
    it). Replaced with a cross-reference NB to the dedicated event
    2022/06/aviram-azari-conviction (which notes DOJ named Azari + "a group
    located in India," NOT BellTroX). Kept #ExxonKnew / short-sellers /
    hedge funds / journalists / government-official targets — all verbatim-
    confirmed in the CL raw. Kept Gupta 2015 N.D.Cal indictment ("indicted
    in California in 2015"), cross-linked to 2015-12/sumit-gupta-belltrox-indictment.
    [b] ATTRIBUTION — in/belltrox, confidence high is correct (CL verbatim
    "With high confidence, we link Dark Basin to BellTroX InfoTech
    Services"). attributing_org tightened from "Citizen Lab (with
    NortonLifeLock & EFF)" to "Citizen Lab (with NortonLifeLock)": Norton
    is a genuine research collaborator whose technical links underpin the
    high-confidence call; EFF was an earlier independent discoverer, not a
    co-attributor (moved to prose). auspex_assessment concur retained;
    commercial mercenary, not a nation-state op — no over-attestation.
    [c] DATES — start 2013-01-01 kept (CL anchors activity to "July 27,
    2013"; year-granularity proxy = actor active_since + sibling).
    disclosure 2020-06-09 confirmed (CL "Date Published June 9, 2020").
    end was null -> set 2020-06-09 (active-until-exposure proxy;
    de-conflated from disclosure via comment) to match the actor
    active_until + sibling. Source published_on 2020-06-09 verified.
    [d] DOCTRINE — in/contractor-hack-for-hire /commercial-litigation,
    confidence attested KEPT (defensible under 2026-06-19 reframe: CL
    states the goal-level commercial-espionage purpose). Added the missing
    inference_basis.source_quote (verbatim "Over the course of our
    multi-year investigation … commercial espionage on behalf of their
    clients …"). Rewrote reasoning to flag clients-unknown. Attacker's-own-
    doctrine = default attacker-rationale perspective (omitted, matches
    sibling). No political-espionage pillar added — CL frames all targeting
    as commercial-for-client.
    [e] ATTRIBUTION_LEVEL — was ABSENT; added named-actor (a named
    commercial firm; not nation/named-unit), matching sibling.
    [f] ACTOR_ID — in/belltrox resolves (atlas/actors/in/belltrox.yaml);
    the deliberate host-nation model (primary_service_id null). operators_named
    gupta-sumit kept as a free-string slug (not an FK; consistent w/ sibling).
    incident_type: added espionage (CL "commercial espionage"; valid enum,
    213 corpus events use it) alongside intrusion/data-theft; initial_vector
    phishing kept.
    FLAGGED (out of edit scope, not changed): target FK orgs/hedge-funds-various
    is unregistered (corpus-wide targets/ gap, validator informational);
    orgs/exxonknew-defendants resolves. Doctrine file's pillar summary still
    reads "roughly seven years" / "28,000+ … targets" — that is the doctrine
    entry (not this event) and blends the Reuters framing; flagged, not edited.
    Source records already fully snapshotted by the sibling audit (same SHAs);
