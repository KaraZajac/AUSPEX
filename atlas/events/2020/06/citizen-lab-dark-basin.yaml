id: 2020-06/citizen-lab-dark-basin
name: Citizen Lab "Dark Basin" exposes BellTroX hack-for-hire operation
start_date: 2013-01-01
disclosure_date: 2020-06-09
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Citizen Lab published the "Dark Basin" report attributing seven
  years of mass-scale phishing operations (~28,000 targeted
  accounts; ~10,000 targets) to BellTroX InfoTech Services of New
  Delhi. Targets ranged from US-litigation participants and
  short-sellers to climate-change advocacy NGOs (notably the
  ExxonKnew defendants), elected officials, journalists, and
  hedge funds. Citizen Lab worked with NortonLifeLock and the
  Electronic Frontier Foundation on victim notification.
false_flag_risk: none
operators_named:
  - gupta-sumit  # BellTroX principal, Citizen Lab 2020 + prior DOJ indictment 2015
  - azari-aviram  # BellTroX sales intermediary, DOJ SDNY (2020 indictment, 2022 plea)
summary: |
  The disclosure that brought the Indian commercial hack-for-hire
  ecosystem to public attention. BellTroX's footprint included
  open social-media boasting by Sumit Gupta, which Citizen Lab
  used as a piece of attribution evidence alongside infrastructure
  overlap. The investigation seeded subsequent DOJ action against
  Aviram Azari (2020 indictment, 2022 conviction), a US-Israel
  private investigator who served as the principal sales channel
  to US-litigant clients.
