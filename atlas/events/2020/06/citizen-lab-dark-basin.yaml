id: 2020-06/citizen-lab-dark-basin
name: Citizen Lab "Dark Basin" exposes BellTroX hack-for-hire operation
start_date: 2013-01-01  # CL dates the earliest tracked activity to "July 27, 2013" (belltrox[.]org window); year-granularity proxy, matches actor in/belltrox active_since + sibling event
disclosure_date: 2020-06-09  # CL "Date Published June 9, 2020"; joint with the Reuters companion
end_date: 2020-06-09  # operation active until public exposure; no source dates a distinct cessation (proxy = disclosure), matches actor active_until + sibling
incident_type:
  - espionage   # CL: "commercial espionage on behalf of their clients" (schema has no hack-for-hire enum; that character is carried here + initial_vector + doctrine link + prose)
  - intrusion   # successful credential-phishing account compromises
  - data-theft  # exfiltration of targeted inboxes
initial_vector: phishing  # CL: mass credential phishing via shortened-URL lures
outcome_summary: |
  Citizen Lab published the "Dark Basin" report linking — "with high
  confidence" — a massive commercial hack-for-hire operation to
  India-based BellTroX InfoTech Services (Delhi). Citizen Lab
  documented targeting of "thousands of individuals and hundreds of
  institutions on six continents," enumerating 27,591 distinct
  credential-phishing URLs (plus almost 28,000 further URLs
  containing targets' e-mail addresses) across a multi-year campaign.
  Targets spanned US-litigation participants, short-sellers and hedge
  funds, climate-change advocacy NGOs (notably the #ExxonKnew
  campaign), journalists, and elected and senior government officials.
  Citizen Lab carried out the technical attribution with research
  collaborators at NortonLifeLock ("numerous technical links between
  the campaigns … and individuals associated with BellTroX"), tied
  the activity to earlier phishing the Electronic Frontier Foundation
  had independently uncovered in 2017, and notified affected targets
  and journalists. NB the widely-quoted "more than 10,000 email
  accounts over … seven years" figure is REUTERS' companion framing,
  NOT Citizen Lab's (neither "10,000" nor "seven years" appears in
  the CL report) — see the sibling event
  2020-06/belltrox-reuters-disclosure.
false_flag_risk: none
operators_named:
  - gupta-sumit  # BellTroX director, named by Citizen Lab (DOJ alias "Sumit Vishnoi"); indicted N.D. Cal 2015 (event 2015-12/sumit-gupta-belltrox-indictment)
summary: |
  The disclosure that brought the Indian commercial hack-for-hire
  ecosystem to public attention — the canonical Citizen-Lab-angle
  event for the Dark Basin operation. The Reuters-angle companion is
  the SIBLING event 2020-06/belltrox-reuters-disclosure: distinct
  disclosures of the same operation, cross-linked and NOT merged.
  Citizen Lab's attribution rested on infrastructure overlap (the
  URL-shortener and phishing-kit fingerprints), corroborated by
  NortonLifeLock's technical links, plus operational-security
  failures by BellTroX personnel, who "made social media posts
  describing and taking credit for attack techniques." Modeled as a
  mercenary / commercial actor, NOT a nation-state op: BellTroX is a
  Delhi-based firm selling hacking to paying clients (actor
  in/belltrox, primary_service_id null — no attested state-service
  parent, mirroring in/appin-security), and Citizen Lab frames the
  tasking as "commercial espionage on behalf of their clients," not
  state collection. Directionality: India-based attacker, globally
  distributed victims, commissioning CLIENTS explicitly NOT identified
  by Citizen Lab. NB the SDNY prosecution of Israeli private
  investigator Aviram Azari — the sales/coordination intermediary to
  US-litigant clients — is NOT carried by this report (a 2020 source
  cannot cite the 2022 guilty plea; "Azari" appears 0x in the Citizen
  Lab report, and his September-2019 arrest predates it): that thread
  is modeled at its own event 2022/06/aviram-azari-conviction.
