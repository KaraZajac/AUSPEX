  notes: |
    Opus 4.8 / effort max. Full 6-point audit vs raw snapshots.
    RE-SOURCE path (badrabbit model): the event is REAL but was
    built on a PHANTOM primary — incd/2020-12_shirbit cited
    https://www.gov.il/en/departments/israel_national_cyber_directorate,
    which returns a 3,280-byte generic INCD department homepage with
    ZERO Shirbit content (title/body fabricated). Removed from
    sources[] and from the attribution; it is now orphaned (cited
    nowhere else) -> RETIRE candidate (annotated in place, not
    deleted). Re-pointed to three genuine, snapshotted sources.

    [a] FACTS — Rewrote summary/outcome_summary to the raw. STRIPPED
    a fabricated technical paragraph (MuddyWater / MOIS tradecraft,
    "Pulse Secure VPN" initial access, PowerShell persistence, and a
    Pay2Key / Moses Staff equivalence) — none of it appears in any
    cited source, and CyberScoop in fact rates Black Shadow's
    tradecraft "super weak" (scanning known Fortinet/Microsoft
    vulns, not Pulse Secure) and treats Moses Staff and Pay2Key as
    SEPARATE-but-similar groups (Check Point), not the same actor.
    Verified vs raw: ToI breach — "A group calling itself
    BlackShadow took responsibility… It did not give any motive for
    the hack"; joint Capital Markets Authority + INCD statement
    "confirmed that there had been a cyberattack on the Shirbit
    insurance company and that information had been leaked." ToI
    ransom — "50 bitcoins ($950,000)… would double to 100 bitcoins
    after 9 a.m. Friday and to 200 bitcoins after 9 a.m. Saturday…
    they will sell the information to third parties"; Shirbit:
    "cyberterrorism is aimed at causing strategic harm — and there
    is no financial motive behind it"; "At 9 a.m. Friday the leaks
    began on an open channel on the Telegram app"; "we still have
    ten terabytes of information left"; "be a mentch" negotiation
    screenshots. Dropped incident_type ransomware (no file
    encryption — a hack-and-leak extortion, cf. Netenrich/analysts)
    and influence-operation (kept as narrative note only) -> now
    [intrusion, data-theft, leak, extortion].

    [b] ATTRIBUTION — Was over-attested: actor ir/unscoped/agrius
    "attributed by INCD, high confidence." INCD never attributed
    Shirbit to Iran/Black Shadow — it only co-confirmed the
    incident. Re-anchored to SentinelLabs (Black Shadow ≡ Iran-
    affiliated Agrius) as carried by CyberScoop, attributing_org_
