id: 2020-12/shirbit-leak
name: Shirbit Insurance leak — Black Shadow against Israel
start_date: 2020-12-01
disclosure_date: 2020-12-03
end_date: 2020-12-31
incident_type:
  - data-theft
  - ransomware
  - influence-operation
initial_vector: unknown
outcome_summary: |
  Intrusion of Shirbit Insurance (Israel); bitcoin ransom
  demand; serial leak of customer PII. Shirbit declined to
  pay. Extensive PII leak.
false_flag_risk: none
summary: |
  Attributed to Black Shadow (Iran-aligned) by INCD and Israeli
  reporting. Persona Telegram channel used for the serial leak.
  Operators initially demanded a 50 BTC ransom; after Shirbit
  refused, the persona released customer PII (national ID
  numbers, scanned driver's licenses, financial records,
  medical-claim documents) in scheduled drops as coercive
  pressure. Subsequent INCD reporting links the Black Shadow
  persona to MuddyWater / MOIS tradecraft — initial access via
  exploitation of an exposed Pulse Secure VPN gateway, lateral
  movement using valid credentials, and follow-on use of
  PowerShell-based persistence consistent with the broader
  MOIS-aligned hack-and-leak pattern later seen in Pay2Key and
  Moses Staff operations against Israeli targets.
