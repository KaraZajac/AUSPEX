id: 2020-12/shirbit-leak
name: Shirbit Insurance leak — Black Shadow against Israel
start_date: 2020-12-01
disclosure_date: 2020-12-01
end_date: 2020-12-31
incident_type:
  - intrusion
  - data-theft
  - leak
  - extortion
initial_vector: unknown
outcome_summary: |
  Intrusion of Shirbit Insurance (Israel). The "Black Shadow"
  persona demanded 50 BTC (~$950,000), threatening to double the
  sum to 100 then 200 BTC and to sell the data to third parties.
  Shirbit refused, framing the operation as cyberterrorism with
  "no financial motive." Black Shadow then serially leaked
  customer, employee and government-employee PII via Telegram and
  claimed to still hold ~10 TB more.
false_flag_risk: none
summary: |
  A group calling itself Black Shadow (BlackShadow) claimed the
  Shirbit breach in a series of poorly-spelled tweets and, per
  Times of Israel reporting, "did not give any motive for the
  hack." Israel's Capital Markets Authority and the Israel National
  Cyber Directorate jointly confirmed the attack and the data leak
  on Dec 1, 2020, but published no perpetrator attribution.

  Black Shadow demanded 50 bitcoins (~$950,000) by Friday morning,
  warning the sum would double to 100 BTC after 9 a.m. Friday and
  to 200 BTC after 9 a.m. Saturday, and that the data would be sold
  to third parties if unpaid. Shirbit refused, stating that after
  overnight negotiations "all the relevant professionals came to
  the unanimous conclusion that cyberterrorism is aimed at causing
  strategic harm — and there is no financial motive behind it."
  Beginning Friday the operators ran a serialized leak on an open
  Telegram channel — customer / employee / government-employee
  identity documents, financial statements and other records —
  released WhatsApp negotiation screenshots (the "be a mensch"
  exchange), and claimed to still hold roughly ten terabytes of
  data.

  Iranian attribution is analytic and hedged, not government-
  declared. Israeli researchers assessed Black Shadow as an
  attention-seeking hack-and-leak / information operation that
  "appears to be aligned with Iranian government interests" and is
  "thought to be operated in conjunction with the government of
  Iran" (CyberScoop, Dec 2021); one analyst put it as "cyber
  attribution is hard, but in this case it does look like [Iran]."
  SentinelLabs equates the Black Shadow persona with the Iran-
  affiliated Agrius cluster (one of "several" extortion aliases).
  No cited source names a specific Iranian service, and the group's
  tradecraft was assessed as low-sophistication (scanning for known
  Fortinet / Microsoft vulnerabilities) — hence the corpus places
  it at ir/unscoped/agrius. The escalating theatrical extortion,
  direct media courting, and the choice of a civilian Israeli
  insurer holding civil-servant data are the basis for the
  "coercion, not profit" reading.
attributions:
  - actor_id: ir/unscoped/agrius
    attributing_org: SentinelLabs
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-12-06
    attribution_level: named-actor
    attribution_source_id: cyberscoop/2021-12_black-shadow-israeli-victims
    notes: |
      Iran nexus is analytic and HEDGED, not state-declared. As
      carried by CyberScoop (2021-12-06), SentinelLabs' Amitai Ben
      Shushan Ehrlich equates the Black Shadow persona with the
      Iran-affiliated Agrius cluster ("one of several" extortion
      aliases); other Israeli researchers (CYE, Profero) assess it
      as "thought to be operated in conjunction with the government
      of Iran" ("it does look like [Iran]"). No source names a
      specific Iranian service -> ir/unscoped, named-actor level
      only. Contemporaneously (Dec 2020) the Shirbit-specific Iran
      link was softer still: ClearSky reportedly flagged only a
      "possible connection to Iran" at medium confidence, and
      Shirbit itself framed the attack as cyberterrorism (a motive
      claim, not a formal state attribution). The INCD / Capital
      Markets Authority Dec-1 joint statement confirmed the incident
      but made NO Iran attribution. The prior record over-attested
      this to INCD at high confidence via a phantom gov.il source
      (removed this audit).
