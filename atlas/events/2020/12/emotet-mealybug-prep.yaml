id: 2020-12/emotet-mealybug-prep
name: Emotet 2020 — pre-takedown peak operations
start_date: 2020-07-17  # Emotet returned from 5-month hiatus
disclosure_date: 2020-07-22
end_date: 2020-12-31
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  After a five-month hiatus, Emotet resumed operations July 17
  2020 with high-volume malspam delivering TrickBot and Qakbot
  loaders. CISA AA20-280A (Oct 6 2020) labeled Emotet "one of
  the most prevalent ongoing threats" to US state, local,
  tribal, and territorial governments. Operations continued
  through January 27 2021 when Operation Ladybird seized the
  botnet's three-tier C2.
false_flag_risk: none
summary: |
  Baseline-establishing year for the criminal-loader ecosystem
  immediately preceding the major 2021 ransomware wave (Colonial,
  JBS, Kaseya). Emotet → TrickBot → Conti / Ryuk delivery chain
  was the dominant pre-ransomware-payload pattern of 2020. Emotet
  malspam delivered weaponized Microsoft Office documents and
  password-protected ZIPs via reply-chain hijacking from previously
  compromised inboxes, dropping the Emotet loader which in turn
  pulled TrickBot or Qakbot for second-stage credential dumping,
  Cobalt Strike beaconing, and lateral movement across the
  victim's Active Directory before a hands-on-keyboard ransomware
  operator (most commonly Conti or Ryuk) was brought in for the
  domain-wide encryption phase.
