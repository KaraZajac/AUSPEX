id: 2020-12/emotet-mealybug-prep
name: Emotet 2020 — pre-takedown peak operations
start_date: 2020-07-17  # widely-reported return date; CISA source says only "July 2020" (dormant since Feb)
disclosure_date: 2020-07-22  # early-July researcher reporting of the return; not stated verbatim by cited sources
end_date: 2020-12-31
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  After a dormant period that began in February, Emotet resurged
  in July 2020 with high-volume malspam delivering Qakbot and
  (from September) TrickBot. CISA AA20-280A (Oct 6 2020) labeled
  Emotet "one of the most prevalent ongoing threats", noting a
  significant increase in actors using Emotet to target US state,
  local, tribal, and territorial governments. Operations continued
  until late January 2021, when Operation Ladybird (Europol,
  announced Jan 27 2021) took control of the botnet's infrastructure
  — several hundreds of servers worldwide — from the inside.
false_flag_risk: none
summary: |
  Baseline-establishing year for the criminal-loader ecosystem
  immediately preceding the 2021 ransomware surge. The Emotet
  loader operation was, per Europol, "one of the biggest players
  in the cybercrime world" — a delivery vehicle other operators
  such as TrickBot and Ryuk benefited from. Through 2020 Emotet
  malspam delivered weaponized Microsoft Office documents and
  password-protected ZIPs, using reply-chain (thread) hijacking of
  existing email conversations stolen from previously compromised
  inboxes to lure recipients into enabling macros. The Emotet loader
  then pulled Qakbot (to steal banking credentials) or TrickBot (to
  deliver ransomware payloads), proliferating within a network by
  brute-forcing local-admin credentials, dumping credentials with
  Mimikatz, and moving laterally over the Admin$ SMB share.
