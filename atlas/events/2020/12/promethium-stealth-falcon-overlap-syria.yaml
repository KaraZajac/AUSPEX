id: 2020-12/promethium-stealth-falcon-overlap-syria
name: ESET / PWC document PROMETHIUM StrongPity targeting Syrian e-government and dissidents
start_date: 2020-01-01
disclosure_date: 2020-12-21
end_date: 2020-12-21
incident_type:
  - intrusion
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  Following Bitdefender's June 2020 disclosure on Syrian Kurdish
  targeting, additional vendor reporting through late 2020
  documented continuing PROMETHIUM / StrongPity operations
  against Syrian e-government users and Syrian dissident
  populations in southern Turkey. The cluster used trojanized
  installers of legitimate software (WinRAR, 7-Zip, ESET-named
  installers) and ISP-level redirection in southern Turkey to
  deliver the StrongPity implant. Targets included Syrian
  refugees, Syrian opposition political organs, and Kurdish-
  region civil-society organizations.
false_flag_risk: suspected
summary: |
  Reinforces the multi-year PROMETHIUM operational pattern
  against Syrian opposition and Kurdish populations in southern
  Turkey. The StrongPity implant family is the cluster's
  signature. The "suspected" false-flag-risk reflects the
  longstanding partial-overlap debate with UAE-attributed
  Stealth Falcon operations; consensus reading is Turkish-
  aligned but the overlap discussion has not been fully closed.
