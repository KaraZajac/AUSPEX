initial_vector: supply-chain
outcome_summary: |
  On audit this record collapsed onto Bitdefender's June 2020
  StrongPity whitepaper — its only genuine source. Bitdefender
  documented StrongPity / PROMETHIUM watering-hole operations that
  served IP-targeted trojanized installers of popular legitimate
  software (7-Zip, WinRAR, McAfee Security Scan Plus, Recuva and
  others) to selected victims, dropping a backdoor that searched for
  and exfiltrated documents. Victims were concentrated in Turkey and
  Syria — most near the Turkey–Syria border and in Istanbul — and
  Bitdefender assessed the actor was "interested especially in the
  Kurdish community," situating the threat in "the constant conflicts
  between Turkey and the Kurdish community." Bitdefender states it is
  "believed that the attacks attributed to StrongPity are
  government-sponsored and are used for population surveillance and
  intelligence exfiltration"; it names no specific sponsoring state or
  service.
false_flag_risk: none
summary: |
  DUPLICATE / FABRICATED-PREMISE record — flagged DELETE / MERGE
  candidate (see qc). As originally written this event asserted a
  December 2020 "ESET / PwC" disclosure of a PROMETHIUM (Turkey) ↔
  Stealth Falcon (UAE) tooling overlap targeting Syrian e-government,
  refugees and dissidents in "southern Turkey," and set a "suspected"
  false-flag-risk on that overlap. On audit every distinguishing
  element was unsourced: the cited ESET source is a phantom
  (url:null; no such 2020-12-21 ESET report exists — its own record
  documents the publisher error), PwC is not cited, and the only
  genuine source — Bitdefender's June 2020 StrongPity whitepaper —
  contains ZERO mentions of "Stealth Falcon," "overlap," a UAE
  operator, "e-government," "refugee," "dissident," "opposition" or
  "southern Turkey" (the lone "UAE" token is "Dubai, UAE" in a C2
  datacenter-location list). What remains true — StrongPity
  watering-hole surveillance of the Kurdish community in the
  Turkey–Syria border region — is already fully covered by the
  canonical 2020-06/bitdefender-strongpity-syrian-kurds event, which
  cites the same whitepaper as its primary. false_flag_risk reset to
  none: the real source carries no false-flag signal.
