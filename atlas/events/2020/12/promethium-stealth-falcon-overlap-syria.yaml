  notes: |
    PREMISE-CRITICAL AUDIT — path taken: FABRICATED-PREMISE (UNSUPPORTABLE) + DUPLICATE.
    The event's core assertion — a PROMETHIUM (Turkey) ↔ Stealth Falcon (UAE) tooling
    overlap in Syria, disclosed Dec 2020 by "ESET / PwC" — is NOT source-carried and no
    such event exists. Corrected to the truthful minimum (which collapses onto the
    canonical June-2020 Bitdefender event) and flagged DELETE / MERGE.

    SOURCE TRIAGE (Phantom protocol STEP 0):
      • eset/2020-12-21_promethium-strongpity-syria — PHANTOM. url:null; its own record
        already documents the publisher error ("the canonical 2020 StrongPity/PROMETHIUM
        Kurdish-targeting reporting was published by Cisco Talos … and Bitdefender … not
        ESET. ESET WeLiveSecurity's StrongPity coverage focuses on Android (Jan 2023)").
        Removed from sources[] and from attribution_source_id. It was cited ONLY by this
        event → now orphaned → annotated RETIRE candidate in its own source record.
      • bitdefender/2020-06-30_strongpity-syrian-kurds — REAL (16-page first-party
        whitepaper). Hash re-verified against on-disk snapshot
        bitdefender__2020-06-30_strongpity-syrian-kurds.pdf (sha256 f2b85d61…f72422eb,
        5,426,737 bytes — MATCHES). pdftotext + grep of the full text performed this audit.

    [a] FACTS — the entire distinguishing payload was fabricated; grep of the Bitdefender
      raw (only genuine source):
        stealth falcon = 0 · falcon = 0 · overlap = 0 · false flag/false-flag = 0 ·
        e-government = 0 · refugee = 0 · dissident = 0 · opposition = 0 · southern turkey = 0 ·
        ESET = 0 · PWC/PwC = 0. The lone "UAE" hit is "Dubai, UAE" inside a C2
        download-server location list ("Barcelona, SPAIN | Dubai, UAE | London, UK | Hague,
        NETHERLANDS") — an infrastructure geolocation, NOT a Stealth Falcon / UAE-operator
        attribution. The lone "e government" grep hit is a false positive spanning
        "ar|e government-sponsored". STRIPPED: the Stealth Falcon overlap, the "ESET / PwC"
        documentation, "Syrian e-government," Syrian "refugees / dissidents / opposition,"
        "southern Turkey," and "ESET-named installers." KEPT (verbatim-supported in
        Bitdefender): trojanized installers of legitimate software incl. "7-zip and WinRAR
        archiver," McAfee Security Scan Plus, Recuva; watering-hole IP-targeted delivery;
        document exfiltration; victims "concentrated in the area of Turkey and Syria …
        near the border … as well as in Istanbul"; actor "interested especially in the
        Kurdish community"; "believed … government-sponsored … population surveillance and
        intelligence exfiltration."
    [b] ATTRIBUTION — attributing_org "ESET / vendor-consensus" → Bitdefender (the only
      real source); attributing_org_confidence moderate → high (first-party naming of the
      cluster); auspex_assessment concur-with-caveat → concur; added attribution_level:
      named-actor. The "moderate" grade and concur-with-caveat existed ONLY to carry the
      fabricated Stealth Falcon overlap — removed. Not over-attesting: sponsor stays
      unnamed at nation-level "government-sponsored," actor stays tr/unscoped.
    [c] DATES — start_date 2020-01-01 → 2018-01-01 (Bitdefender: the Turkey/Syria targeting
      shift dates to "2018"). disclosure_date 2020-12-21 → 2020-06-30: the Dec-2020 date
      derived entirely from the phantom ESET source; the only real disclosure is the
      Bitdefender whitepaper (published 2020-06-30). end_date 2020-12-21 → null (point-in-time
      report; nothing bounds the operation). NB the id/path (2020-12/…) is now stale vs the
      corrected June-2020 date — itself further evidence the December record is spurious;
      re-home/delete is an orchestrator action (out of audit scope).
    [d] DOCTRINE — confidence strongly_inferred KEPT; added the missing inference_basis
      {signals[], ruled_out} and attesting_source_id: null (mirrors the canonical June
      event — Bitdefender states purpose + victim + Turkey–Kurdish context but hedges the
      sponsoring state, so inferred not attested). Perspective attacker-rationale (default,
      attacker's own operation) left implicit per the sibling events. colon-space list items
      quoted.
    [e] attribution_level SET (named-actor).
    [f] actor_id tr/unscoped/promethium RESOLVES → atlas/actors/tr/promethium.yaml
      (id tr/unscoped/promethium). No actor edits.

    false_flag_risk: suspected → none. The "suspected" grade was justified solely by the
    fabricated "longstanding partial-overlap debate with UAE-attributed Stealth Falcon" —
    which no cited source carries. Matches the canonical June event (false_flag_risk: none).

