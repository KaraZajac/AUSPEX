id: 2020-12/patchwork-post-galwan-china-collection
name: Patchwork post-Galwan China-collection elevation against PRC diplomatic, military, and academic targets
start_date: 2020-06-16
disclosure_date: 2020-12-15
end_date: 2020-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Bitdefender and adjacent vendor reporting documented elevated
  Patchwork / Dropping Elephant operations against Chinese
  diplomatic, military-research, and academic equities in the
  months following the deadly June 15-16 2020 Galwan Valley
  clash between Indian and Chinese troops. Tradecraft remained
  cluster-canonical (weaponized Office documents, BADNEWS
  Windows implant, refreshed C2 infrastructure); the
  noteworthy delta was volume and PRC-equity concentration.
false_flag_risk: none
summary: |
  The Galwan-window cyber-tempo elevation against PRC equities
  is the principal Indian-aligned analog to documented Chinese
  tempo elevations against India in the same period (Recorded
  Future RedEcho 2021). Patchwork's contribution complements
  the better-documented SideWinder China-collection pivot
  Group-IB would document in 2022, suggesting the Galwan
  trigger drew cross-cluster Indian-aligned response. The
  doctrinal link to the China-collection pillar tightens
  during this window.
