id: 2020-12/patchwork-post-galwan-china-collection
name: Patchwork (Dropping Elephant) spear-phishing of a Chinese target with a fighter-planes lure
start_date: 2021-01-01
disclosure_date: 2021-01-20
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Cyble reported (20 Jan 2021) that it had observed the
  India-suspected Patchwork / Dropping Elephant APT targeting
  China with a malformed spear-phishing document named
  "Chinese_Pakistani_fighter_planes_play_war_games.docx". The
  lure exploited CVE-2017-0261 (EPS) to drop and execute a
  custom Patchwork RAT / keylogger payload (delivered via
  MSBuild.exe). This is a single observed campaign; Cyble does
  not quantify volume, name specific Chinese victims, or state
  the strategic purpose.
false_flag_risk: none
summary: |
  A single Patchwork spear-phishing campaign against a Chinese
  target, observed by Cyble in January 2021 during the period of
  elevated India-China tension that followed the June 2020 Galwan
  Valley clash. The lure ("Chinese_Pakistani_fighter_planes_play_
  war_games.docx") and Patchwork's India-suspected origin place
  the activity within India's collection interest against China.
  Cyble does NOT reference Galwan, does not use BADNEWS in this
  campaign (it observed a custom RAT/keylogger dropped via a
  CVE-2017-0261 EPS exploit), and makes no claim of tempo/volume
  "elevation" or of diplomatic/military-research/academic
  concentration — those were artifacts of a now-removed phantom
  Bitdefender citation and have been stripped.
attributions:
  - actor_id: in/unscoped/patchwork
    attributing_org: Cyble
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-01-20
    attribution_source_id: cyble/2021-01-20_deep-dive-patchwork-apt
    notes: |
      Cyble names the actor as the "Patchwork APT" cluster
      (aka Dropping Elephant / Chinastrats / Monsoon / Quilted
      Tiger / APT-C-09 / ZINC EMERSON) and states it "is
      suspected to be run by an India based threat actor". Named
      cluster + suspected nation = named-actor level; the word
      "suspected" keeps org-confidence at moderate. India-nexus
      is the broad vendor/MISP consensus for Patchwork; the
      caveat is that this single technical report attributes on
      the group's known tradecraft rather than developing an
      independent nation attribution.
doctrine_links:
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/china-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      An India-suspected espionage cluster (Patchwork) spear-
      phishing a Chinese target with a China/Pakistan military-
      themed lure is canonical India-on-China collection, the
      activity the china-collection pillar encodes. No cited
      source states the strategic purpose (Cyble's report is
      technical), so this is strongly_inferred rather than
      attested; the actor-mission + China victim + defense-themed
      lure triangulate to India collecting on its principal
      regional rival, with no serious competing strategic reading.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "Actor is Patchwork, a Cyble-named cluster 'suspected to be run by an India based threat actor'."
        - "Victim is China; delivery is a spear-phishing doc themed on Chinese/Pakistani fighter-plane war games."
        - "Patchwork's documented mission is espionage/collection focused on Pakistan and China."
      ruled_out: "Financial/criminal motive (no ransomware, extortion or theft-for-profit) and Pakistan-collection (this specific lure/victim is China) both fail the target+tradecraft test."
targets:
  - target_id: orgs/chinese-government
    country: cn
    role: primary
sources:
  - cyble/2021-01-20_deep-dive-patchwork-apt
