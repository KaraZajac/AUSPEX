id: 2020-12/facebook-cyberone-corporate-front-attribution
name: Facebook publicly names CyberOne Group as the corporate vehicle behind a subset of APT32 activity
start_date: 2018-01-01
disclosure_date: 2020-12-11
end_date: 2020-12-11
incident_type:
  - intrusion
  - influence-operation
initial_vector: phishing
outcome_summary: |
  In its 11 December 2020 disruption announcement, Facebook
  (Meta) Threat Intelligence (Mike Dvilyanski, Nathaniel Gleicher)
  publicly named "CyberOne Group" — also known as CyberOne
  Security, CyberOne Technologies, and Planet — as the
  Vietnamese IT company operating the social-media accounts,
  Android applications, and credential-phishing infrastructure
  that Facebook took down. The disclosure narrowed the
  operational placement of a subset of APT32 / OceanLotus
  activity below the generic "Vietnamese government" framing
  to a specific corporate front. CyberOne Group publicly denied
  the attribution; Facebook stood by it. Companion event to
  2020-12/facebook-apt32-takedown which catalogs the takedown
  action itself; this event catalogs the specific corporate-
  front attribution.
false_flag_risk: low
summary: |
  Among the very few publicly named corporate fronts in the
  state-aligned APT space outside of the better-known DPRK and
  PRC contractor ecosystems. The CyberOne naming is a
  consequential editorial datum: it permits AUSPEX to model a
  distinct actor entry (vn/cyberone-group) alongside the
  vn/tc2/apt32 cluster and to support analytic claims about
  contractor-mediated Vietnamese cyber operations.
  Operationally, CyberOne Group is best modeled as a contractor
  / front rather than a separate APT cluster. Facebook's
  attribution rests on infrastructure-and-persona-overlap
  analysis; no Vietnamese-government attestation followed.
attributions:
  - actor_id: vn/cyberone-group
    attributing_org: Facebook (Meta) Threat Intelligence — Mike Dvilyanski, Nathaniel Gleicher
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-12-11
