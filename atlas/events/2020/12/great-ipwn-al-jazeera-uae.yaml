id: 2020-12/great-ipwn-al-jazeera-uae
name: The Great iPwn — Citizen Lab attributes UAE Pegasus operator-cluster targeting of Al Jazeera journalists
start_date: 2020-07-01  # forensic-timeline window of compromise
disclosure_date: 2020-12-20
end_date: 2020-08-31
incident_type:
  - intrusion
  - surveillance
initial_vector: 0-day  # iMessage zero-click (KISMET-era exploitation)
outcome_summary: |
  Citizen Lab discloses Pegasus iMessage zero-click compromises
  of 36 personal phones belonging to Al Jazeera journalists,
  producers, anchors, and executives, plus one Al Araby TV
  journalist (Rania Dridi). Forensic analysis attributed the
  hacks to four distinct NSO Group Pegasus operator clusters
  (MONARCHY 18 phones, SNEAKY KESTREL 15, CENTER-1 1, CENTER-2 3);
  Citizen Lab concluded with medium confidence that MONARCHY acts
  on behalf of the Saudi Government and that SNEAKY KESTREL acts
  on behalf of the UAE Government. AUSPEX records the UAE
  (SNEAKY KESTREL) attribution here.
false_flag_risk: none
summary: |
  Citizen Lab's medium-confidence attribution of the SNEAKY
  KESTREL operator cluster to the UAE Government — targeting Al
  Jazeera staff during the GCC blockade window — is a supporting
  piece of evidence for the AUSPEX regional-influence-realigned
  doctrine (Qatar pillar) and the regime-protection-surveillance
  doctrine. The Al Jazeera victim profile is also significant:
  state-media-affiliated journalists rather than domestic
  Emirati dissidents. Citizen Lab reached the UAE and Saudi
  (MONARCHY) conclusions on an operator-behavior basis (each
  cluster's targets concentrated inside the respective country,
  plus infrastructure overlaps), explicitly hedged to medium
  confidence, and considered but viewed as less likely the
  alternative that both clusters are UAE-linked.

  The iMessage zero-click exploit chain (which Citizen Lab named
  KISMET) was a zero-day against at least iOS 13.5.1 and pre-dated
  the later FORCEDENTRY iMessage exploit (Citizen Lab, September
  2021).
