id: 2020-12/great-ipwn-al-jazeera-uae
name: The Great iPwn — Citizen Lab attributes UAE Pegasus operator-cluster targeting of Al Jazeera journalists
start_date: 2020-07-01  # forensic-timeline window of compromise
disclosure_date: 2020-12-20
end_date: 2020-08-31
incident_type:
  - intrusion
  - surveillance
initial_vector: zero-click  # iMessage zero-click (KISMET-era exploitation)
outcome_summary: |
  Citizen Lab discloses Pegasus iMessage zero-click compromises
  of 36 personal phones belonging to Al Jazeera journalists,
  producers, and executives, plus one Al Araby TV journalist
  (Rania Dridi). Forensic analysis identified two distinct
  Pegasus operator clusters as the source: one assessed as
  consistent with Saudi Arabian state operations (MONARCHY),
  one assessed as consistent with United Arab Emirates state
  operations (SNEAKY KESTREL).
false_flag_risk: low
summary: |
  Citizen Lab's high-confidence attribution to a UAE-operator
  cluster targeting Al Jazeera staff during the GCC blockade
  window is a load-bearing piece of evidence for the AUSPEX
  regional-influence-realigned doctrine (Qatar pillar) and the
  regime-protection-surveillance doctrine (regional-political-
  targets pillar). The Al Jazeera victim profile is also
  significant: state-media-affiliated journalists rather than
  domestic Emirati dissidents.

  The iMessage zero-click exploit chain pre-dated FORCEDENTRY
  (disclosed September 2021); Citizen Lab characterized it as
  KISMET-class tradecraft.
attributions:
