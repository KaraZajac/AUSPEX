  notes: |
    Audited vs Citizen Lab "The Great iPwn" (Research Report No. 135,
    2020-12-20). Source is the REAL article (not a phantom); raw
    snapshot captured, sha256 c8f54131…dde29044, 202,753 bytes.

    [a] FACTS ✓ all source-carried. "government operatives used NSO
    Group's Pegasus spyware to hack 36 personal phones belonging to
    journalists, producers, anchors, and executives at Al Jazeera";
    "The personal phone of a journalist at London-based Al Araby TV
    was also hacked" (Rania Dridi). Four operator clusters: "An
    operator that we call MONARCHY spied on 18 phones, and an
    operator that we call SNEAKY KESTREL spied on 15 phones … CENTER-1
    and CENTER-2 … spied on 1 and 3 phones." Exploit: "an exploit
    chain that we call KISMET, which appears to involve an invisible
    zero-click exploit in iMessage. In July 2020, KISMET was a
    zero-day against at least iOS 13.5.1." Timing: "In July and
    August 2020" (matches start 2020-07-01 / end 2020-08-31);
    published 2020-12-20 (matches disclosure_date). NB the TOOL is
    NSO Group's Pegasus (a private vendor's mercenary spyware) and the
    OPERATORS are the customer states — the event correctly models
    actor at customer-state level, NOT attributing the op to NSO.
    CORRECTED outcome_summary: now names all four clusters + the
    medium-confidence hedge (previously implied only two clusters).

    [b] ATTRIBUTION — KEY CORRECTION (over-attestation). Source:
    "We conclude with medium confidence that SNEAKY KESTREL acts on
    behalf of the UAE Government" and "with medium confidence that
    MONARCHY acts on behalf of the Saudi Government." Event + source
    record previously said HIGH confidence. DOWNGRADED
    attributing_org_confidence high -> moderate; fixed the source
    record note "high confidence" -> "medium confidence"; fixed the
    event summary "high-confidence" -> "medium-confidence". Basis is
    operator-behavior (targets concentrated in-country + infra/domain
    overlap with the Ahmed Mansoor case), and Citizen Lab
    "considered but view as less likely the hypothesis that MONARCHY
    and SNEAKY KESTREL are both linked to the UAE." ADDED
    attribution_level: nation (attribution reaches the customer
    NATION = UAE Government; no named UAE service/unit). actor_id
    remains null (operator cluster, no AUSPEX actor). service_id
    ae/state-security is AUSPEX's taxonomy placement of the "UAE
    Government" customer — flagged in the attribution note that the
    source names only "the UAE Government" generically.

    [c] DATES ✓ published_on 2020-12-20 = actual publication ("Date
    Published December 20, 2020"). Op window July–August 2020 matches
    start/end. (Earlier Oct–Dec 2019 KISMET deployments and Dridi's
    Oct-2019→Jul-2020 infections are noted in-source but the headline
    36-phone Al Jazeera event is the Jul–Aug 2020 window.)

    [d] DOCTRINE_LINKS — none are `attested`, so no attesting-goal
    gate applies. All three kept `strongly_inferred`; reviewed and
    honest. Source substantiates: commercial-spyware procurement
    (whole report = NSO/Pegasus procured & used); the Qatar-GCC
    blockade backdrop ("Al Jazeera and the Middle East Crisis"; the
    "four countries" vs Qatar; 2017 blockade) supports the
    qatar-pre-2021 pillar; journalist-targeting supports the
    journalists-in-exile pillar (reasoning transparently flags that
    these are Qatari-state-media journalists, not UAE-origin exiles).
    Fixed a stale summary reference (regional-political-targets pillar
    -> the actual link uses journalists-in-exile). No `attested`
    upgrade warranted — source states operator behaviour + geopolitical
    context, not the UAE's stated strategic purpose.

    [e] attribution_level SET to `nation` (was missing).

    [f] actor_id null (resolves — counter/customer-state modeling);
    service_id ae/state-security resolves to atlas/services/ae/. No
    actor-file edits.

    RESIDUAL: (1) service_id ae/state-security is an AUSPEX inference
    beyond the source's generic "UAE Government"; noted, not removed.
    (2) tier left `secondary`/kind `academic`: Citizen Lab's original
    device forensics is arguably primary-quality, but per protocol I
    did not churn tier absent clear miscategorization — FLAG for
    orchestrator if primary is preferred for original forensic
    research.
