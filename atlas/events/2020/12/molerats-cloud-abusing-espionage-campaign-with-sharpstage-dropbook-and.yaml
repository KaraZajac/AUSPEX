id: 2020-12/molerats-cloud-abusing-espionage-campaign-with-sharpstage-dropbook-and
name: "Molerats cloud-abusing espionage campaign with SharpStage, DropBook, and MoleNet backdoors"
start_date: 2020-12-01
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  The Cybereason Nocturnus Team reported in December 2020 a Molerats (Gaza Cybergang) espionage campaign using two previously unidentified backdoors, SharpStage (a .NET backdoor) and DropBook (a Python backdoor), plus a downloader called MoleNet. The attack chain began with politically themed phishing documents (lures referencing Israeli-Arab relations, Hamas elections, and Palestinian politics), and the malware abused legitimate cloud and social platforms — DropBook used fake Facebook accounts or Simplenote for command and control, while both SharpStage and DropBook abused a Dropbox client to store the espionage tools and exfiltrate stolen data (Google Docs was also abused). Cybereason assessed the operators sought to target high-ranking political figures and government officials, with victims primarily observed in the Palestinian Territories, UAE, Egypt, and (non-Arabic-speaking) Turkey. Cybereason attributed the activity to Molerats — described as an Arabic-speaking, politically-motivated APT group active in the Middle East since 2012 — and named no sponsoring government.
