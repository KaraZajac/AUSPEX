initial_vector: phishing
false_flag_risk: none
summary: |
  The Cybereason Nocturnus Team reported in December 2020 a Molerats (Gaza Cybergang) espionage campaign using two previously unidentified backdoors, SharpStage (a .NET backdoor) and DropBook (a Python backdoor), plus a downloader called MoleNet. The attack chain began with politically themed phishing documents, and the malware abused cloud and social platforms including Dropbox and Google Drive for payload delivery and Dropbox and Facebook for command and control, with DropBook operators using fake Facebook accounts to issue commands. Cybereason observed targeting of high-ranking political figures and government officials, with victims in the Palestinian Territories, UAE, Egypt, and Turkey.
