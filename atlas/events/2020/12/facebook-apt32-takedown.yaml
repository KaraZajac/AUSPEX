id: 2020-12/facebook-apt32-takedown
name: Facebook disrupts APT32 (OceanLotus) espionage infrastructure and links it to CyberOne Group
start_date: 2018-01-01
disclosure_date: 2020-12-11
end_date: 2020-12-11
incident_type:
  - intrusion
  - espionage
  - surveillance
initial_vector: phishing
outcome_summary: |
  Facebook's Threat Intelligence team disrupted APT32 by
  removing the group's accounts and blocking associated
  domains, and publicly linked the activity to "CyberOne
  Group, an IT company in Vietnam" (also known as CyberOne
  Security, CyberOne Technologies, Hành Tinh Company Limited,
  Planet and Diacauso). Facebook documented APT32 use of
  fictitious personas posing as activists and business
  entities (including romantic lures), malicious Google Play
  Store Android apps requesting broad permissions for device
  surveillance, watering-hole compromises with OS-detecting
  payloads, file-sharing/shortened-link malware delivery, and
  DLL side-loading — used against Vietnamese human rights
  activists at home and abroad, foreign governments (Laos,
  Cambodia), NGOs, news agencies and businesses across several
  sectors (IT, hospitality, agriculture, hospitals, retail,
  auto, mobile services).
false_flag_risk: none
summary: |
  Notable as a platform-level public attribution that named a
  specific Vietnamese company (CyberOne Group) as the entity
  behind the activity, rather than the generic "Vietnamese
  government" framing used in prior vendor reporting. Facebook
  named a private IT company / front, NOT a state intelligence
  service. Facebook categorized the operation as cyber
  espionage rather than a coordinated-inauthentic-behavior
  influence operation: the fictitious personas were
  social-engineering lures for later phishing and malware, and
  the Play Store apps enabled broad device surveillance of
  targeted activists.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: Facebook (Meta) Threat Intelligence
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-12-11
    attribution_source_id: facebook/2020-12-11_apt32-takedown
    notes: |
      Facebook stated flatly "Our investigation linked this
      activity to CyberOne Group, an IT company in Vietnam" —
      a named private company / front, not a state service.
      Named-actor level: Facebook names the cluster (APT32)
      and a specific corporate entity (CyberOne Group) but no
      Vietnamese intelligence service or unit; hence the
      actor resolves to vn/unscoped, not a service-scoped id.
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Facebook documented APT32 targeting Vietnamese human
      rights activists at home and in the diaspora, using
      fictitious activist personas and Play Store apps built
      for broad device surveillance — squarely the
      domestic-dissident / diaspora surveillance the
      resolution's regime-stability-surveillance pillar
      encodes, and consistent with the actor's documented
      surveillance mission. Strongly_inferred rather than
      attested because Facebook names the who (APT32 /
      CyberOne Group) and the target set but does not state a
      regime-stability strategic purpose; the label rests on
      the source-highlighted victim set plus the actor's
      mission, not a source statement of goal.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Facebook names Vietnamese human rights activists (locally and abroad) as top APT32 targets, plus Google Play Store apps with 'a wide range of permissions to allow broad surveillance of peoples' devices' — the dissident/diaspora surveillance the pillar encodes."
        - "APT32's documented mission includes surveillance of Vietnamese dissidents and diaspora (fake-persona tradecraft and domain-squatting on opposition outlets such as Viet Tan / RFA Vietnamese)."
      ruled_out: "Foreign/industrial espionage (vn/industrial-upgrading-cyber-collection): the same operation also hit foreign governments (Laos, Cambodia) and commercial sectors (auto, IT, hospitality), which reads as foreign/industrial collection rather than regime-stability surveillance. Set aside for THIS link because the pillar-relevant, source-highlighted victim set is the Vietnamese activist/diaspora community."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/vietnamese-dissident-network
    role: primary
  - target_id: orgs/asean-governments
    role: primary
sources:
  - facebook/2020-12-11_apt32-takedown
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs the sole cited source, Facebook/Meta "Taking Action Against Hackers in
    Bangladesh and Vietnam" (2020-12-11), raw snapshot facebook__2020-12-11_apt32-takedown.html,
    sha256 dab54266…f6d9bb78 (re-verified against on-disk snapshot; 314,315 bytes / ~15,190
    chars stripped text). NOT a phantom — the saved page is the real article and carries the
    APT32 section verbatim.
    [a] FACTS — corrected two fabrications and one unsupported claim. (1) REMOVED the quoted
    phrase "actors associated with the Vietnamese government": this string does NOT appear in
    the source; Facebook's only attributive sentence is "Our investigation linked this activity
    to CyberOne Group, an IT company in Vietnam (also known as CyberOne Security, CyberOne
    Technologies, Hành Tinh Company Limited, Planet and Diacauso)." (2) REMOVED "impersonating
    Vietnamese-language news outlets" from the Play Store claim — source says only that the
    Android apps "had a wide range of permissions to allow broad surveillance of peoples'
    devices"; no news-outlet impersonation is stated. (3) REMOVED "CyberOne Group denied the
    attribution; Facebook stood by it" — the cited source carries no denial and no such
    follow-up; not source-carried, stripped rather than re-sourced. Retained + verbatim-backed:
    account/domain takedown ("we blocked associated domains … removed the group's accounts");
    fictitious personas / romantic lures ("APT32 created fictitious personas … posing as
    activists and business entities, or used romantic lures"); malicious Play Store apps for
    device surveillance; watering-hole with OS-detecting payload; file-sharing/shortened-link
    delivery and DLL side-loading; target set "Vietnamese human rights activists locally and
    abroad, various foreign governments including those in Laos and Cambodia, non-governmental
    organizations, news agencies and a number of businesses across information technology,
    hospitality, agriculture and commodities, hospitals, retail, the auto industry, and mobile
    services." Also RETITLED the event and removed incident_type influence-operation (→
    intrusion/espionage/surveillance): Facebook explicitly frames APT32 as cyber espionage /
    hacking / malware and lists "influence operations" as a SEPARATE threat class it did not
    apply here; the personas are social-engineering lures for phishing/malware, not a
    disinformation/CIB influence op. start_date 2018-01-01 is a best-estimate — the source only
    says Facebook has been "tracking and taking action against this group for several years" and
    does not pin a year (residual uncertainty; not fabricated, left as estimate).
    [b] ATTRIBUTION — attributing_org_confidence: high is correct (Facebook states the CyberOne
    linkage flatly, no hedge). auspex_assessment concur retained. Added notes recording the
    CyberOne corporate link and that Facebook named a private company, not a state service.
    [c] DATES — source published_on 2020-12-11 correct; disclosure_date/end_date 2020-12-11
    match the announcement; start vs disclosure distinguished.
    [d] DOCTRINE_LINKS — kept vn/resolution-29-nqtw regime-stability-surveillance at
    strongly_inferred (NOT attested: Facebook states no regime-stability goal, so no
    attesting_source_id). Rewrote the reasoning to rest on the source-highlighted Vietnamese
    activist/diaspora surveillance (the prior reasoning wrongly cited "foreign-government
    officials" as supporting this domestic-surveillance pillar). Added inference_basis with
    signals[] + ruled_out (the competing industrial/foreign-collection reading set aside for
    this link's activist-surveillance scope).
    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): Facebook names the cluster APT32 and
    a specific company (CyberOne Group) but no Vietnamese service or unit.
    [f] ACTOR_ID — vn/unscoped/apt32 resolves to atlas/actors/vn/apt32.yaml. No actor defect;
    the actor's own audit note already reflects the CyberOne-as-private-company finding.
    Targets orgs/vietnamese-dissident-network and orgs/asean-governments both resolve and are
    source-supported (Vietnamese activists; Laos/Cambodia governments). Source record already
    carried raw_snapshot + content_sha256 from the 2026-06-24 pass; hash re-verified, left as-is.
