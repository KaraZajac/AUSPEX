id: 2020-12/facebook-apt32-takedown
name: Facebook attributes coordinated inauthentic behavior to APT32 and takes down infrastructure
start_date: 2018-01-01
disclosure_date: 2020-12-11
end_date: 2020-12-11
incident_type:
  - influence-operation
  - intrusion
initial_vector: phishing
outcome_summary: |
  Facebook's Threat Intelligence team disrupted APT32 by removing
  accounts and pages and publicly attributing the cluster to "an
  IT company in Vietnam called CyberOne Group" with assessed
  links to "actors associated with the Vietnamese government."
  Facebook documented APT32 use of fake personas, malware-laden
  Android applications in the Play Store impersonating
  Vietnamese-language news outlets, and credential phishing
  against journalists, NGOs, businesses, and foreign-government
  officials.
false_flag_risk: none
summary: |
  Notable because it was the first platform-level public
  attribution naming a specific Vietnamese front company
  (CyberOne Group), narrowing the operational placement of APT32
  beyond the generic "Vietnamese government" framing. CyberOne
  Group denied the attribution; Facebook stood by it. The
  takedown is also evidence of the influence / persona-management
  arm of the APT32 operation, distinct from the technical-intrusion
  tradecraft documented elsewhere.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: Facebook (Meta) Threat Intelligence
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-12-11
    attribution_source_id: facebook/2020-12-11_apt32-takedown
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targets included Vietnamese activists, journalists, and
      foreign-government officials — the canonical "hostile
      forces" set under the resolution's framing.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/vietnamese-dissident-network
    role: primary
  - target_id: orgs/asean-governments
    role: primary
sources:
  - facebook/2020-12-11_apt32-takedown
