id: 2020-12/solarwinds-spiral-cluster
name: SolarWinds "SPIRAL" cluster (China-nexus, distinct from SVR Sunburst)
start_date: 2020-11-01  # approx SUPERNOVA deployment on the victim Orion server
disclosure_date: 2020-12-22  # public disclosure of SUPERNOVA / CVE-2020-10148 (Dec 2020)
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: n-day  # CVE-2020-10148 SolarWinds Orion API auth-bypass, used to deploy the SUPERNOVA .NET web shell
false_flag_risk: none
outcome_summary: |
  Suspected-China (low-confidence) espionage intrusion that exploited
  CVE-2020-10148 to deploy the SUPERNOVA web shell on a victim's
  SolarWinds Orion server for follow-on credential and data
  collection. Explicitly distinct from the contemporaneous SVR /
  APT29 SUNBURST supply-chain compromise, with which it shares only
  the SolarWinds Orion product.
summary: |
  A China-nexus intrusion cluster that Secureworks Counter Threat
  Unit (CTU) tracks as SPIRAL / BRONZE SPIRAL. In late 2020 the actor
  exploited an internet-facing SolarWinds Orion server via the
  CVE-2020-10148 API authentication-bypass to drop SUPERNOVA — a .NET
  (C#) web shell that is a trojanized version of the legitimate Orion
  DLL app_web_logoimagehandler.ashx.b6031896.dll. CTU explicitly
  assessed that this activity is UNRELATED to the contemporaneous
  SUNBURST supply-chain compromise (trojanized Orion software
  updates, attributed elsewhere to Russia's SVR / APT29): SUPERNOVA
  was placed by direct exploitation, not via a poisoned update.
  Secureworks linked the SUPERNOVA/Orion activity to an earlier
  (August 2020) intrusion of a Zoho ManageEngine server that it
  attributes to the same SPIRAL group. Observed post-exploitation
  tradecraft in the CTU report was limited to living-off-the-land
  credential and data collection — comsvcs.dll to dump the LSASS
  process and ntdsutil to dump the Active Directory database. CTU
  assessed with LOW confidence that SPIRAL is of Chinese origin,
  chiefly on the basis of a brief, likely-inadvertent EDR check-in
  from infrastructure geolocated to China.
attributions:
  - actor_id: cn/unscoped/spiral  # repointed 2026-07-01: created cn/unscoped/spiral (Bronze Spiral); APT27 was an AUSPEX cross-walk the Secureworks source never makes
    attributing_org: Secureworks CTU
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-03-08
    attribution_source_id: secureworks/2020-12_spiral-solarwinds-supernova
    notes: |
      Secureworks CTU tracks the SUPERNOVA operators as BRONZE SPIRAL
      / SPIRAL and assessed with LOW confidence that the group is of
      Chinese origin (basis: a single, likely-inadvertent EDR
      check-in from a China-geolocated IP). Not a DOJ indictment.
      CAVEAT / see FLAG: Secureworks does NOT equate SPIRAL / BRONZE
      SPIRAL with TG-3390 / BRONZE UNION / APT27 — neither "TG-3390"
      nor "APT27" appears in the SPIRAL reporting; the mapping of
      this event's actor_id to cn/unscoped/apt27 is an AUSPEX
      cross-walk, not a source statement. A dedicated
      cn/unscoped/spiral (BRONZE SPIRAL) actor is the correct home.
