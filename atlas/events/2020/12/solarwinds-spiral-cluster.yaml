    reasoning: |
      A suspected-China espionage actor conducting credential and
      data collection after exploiting an internet-facing enterprise
      server is broadly consistent with Military-Civil Fusion-aligned
      intelligence collection, but no source states this strategic
      purpose and the China nexus itself is only low-confidence —
      hence plausible, not higher.
