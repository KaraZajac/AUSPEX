id: 2020-12/solarwinds-spiral-cluster
name: SolarWinds "Spiral" cluster (PRC-distinct from SVR Sunburst)
start_date: 2020-03-01
disclosure_date: 2020-12-22
end_date: 2020-12-31
incident_type:
  - intrusion
  - supply-chain
initial_vector: n-day  # CVE-2020-10148 "Supernova" / authentication bypass
outcome_summary: |
  PRC-attributed intrusion cluster exploiting CVE-2020-10148
  ("Supernova" authentication bypass in SolarWinds Orion) for
  selective second-stage targeting of US government entities.
  Distinct from the contemporaneous SVR Sunburst supply-chain
  compromise.
false_flag_risk: none
summary: |
  Disclosed alongside the SVR Sunburst event but with different
  intrusion mechanism — the SUPERNOVA web shell, a malicious
  in-memory .NET DLL (App_Web_logoimagehandler.ashx.b6031896.dll)
  deployed by exploiting the SolarWinds Orion authentication
  bypass CVE-2020-10148, not the Sunburst trojanized update.
  Attributed to TG-3390-adjacent / SPIRAL by Secureworks;
  Microsoft separately observed PRC TTPs. Post-exploitation
  tradecraft included credential dumping with Mimikatz, lateral
  movement via valid credentials, DLL side-loading using signed
  binaries, ChinaChopper-family ASPX web shells on internet-facing
  servers, and the PlugX, ShadowPad, and HyperBro implants from
  the broader TG-3390 / Iron Tiger toolset for follow-on
  collection at US-government victims.
