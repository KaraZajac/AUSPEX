qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: partial
  notes: |
    Audited vs Secureworks CTU "SUPERNOVA Web Shell Deployment Linked
    to SPIRAL Threat Group" (publisher first-party; url is now
    Sophos-migrated and Cloudflare bot-walled — HTTP 000 on live curl,
    archive.org blocked for the fetcher, so NOT snapshottable and no
    content_sha256 recorded; claims corroborated against BleepingComputer,
    The Record (therecord.media), Security Magazine, OODAloop, and
    TechTimes mirrors + the article body via WebFetch) -> level: partial.
    [a] FACTS: heavy fabrication stripped. The CTU report's
    post-exploitation tradecraft is comsvcs.dll (LSASS dump) + ntdsutil
    (AD-database dump) ONLY. Removed as unsupported: "Mimikatz" credential
    dumping (source uses comsvcs.dll), "DLL side-loading using signed
    binaries", "ChinaChopper-family ASPX web shells", the entire "PlugX,
    ShadowPad, and HyperBro implants from the broader TG-3390 / Iron Tiger
    toolset" sentence (none appear in the CTU report — imported from
    APT27's general profile), and "Microsoft separately observed PRC TTPs"
    (no Microsoft source is cited). Confirmed + kept: SUPERNOVA = .NET/C#
    trojanized app_web_logoimagehandler.ashx.b6031896.dll; CVE-2020-10148
    Orion API auth-bypass; deployed by DIRECT exploitation (~Nov 2020);
    CTU explicitly states the activity is UNRELATED to SUNBURST (no
    conflation — verified); SPIRAL also tied to an Aug 2020 Zoho
    ManageEngine intrusion. Removed incident_type "supply-chain" (SUPERNOVA
    is direct n-day exploitation, NOT a supply-chain compromise) and added
    "espionage". start_date 2020-03-01 (unsourced) -> 2020-11-01; end_date
    2020-12-31 (fabricated precision) -> null.
    [b] ATTRIBUTION: over-attestation corrected. CTU assessed China origin
    with LOW confidence (mirror-verified: "assess with low confidence that
    the group is of Chinese origin"; sole basis = one likely-inadvertent
    China-geolocated EDR check-in) -> attributing_org_confidence
    moderate->low. Added attribution_level: activity-cluster. Notes
    rewritten to state Secureworks tracks the operators as BRONZE SPIRAL /
    SPIRAL and does NOT equate them to TG-3390/APT27.
    [c] DATES: attribution_date 2020-12-22 -> 2021-03-08 and source
    published_on 2020-12-22 -> 2021-03-08 (the cited SPIRAL/China
    attribution report is dated Mar 8 2021 per OODAloop / Security Magazine
    / TechTimes; Dec 2020 was the separate SUPERNOVA/CVE disclosure, kept
    as disclosure_date).
    [d] DOCTRINE: cn/mcf kept at plausible (honest floor given the
    low-confidence nation and no stated purpose); softened reasoning
    (removed firm "US-government collection"); added inference_basis
    .alternatives.
    [e] attribution_level added = activity-cluster.
    [f] ACTOR: cn/unscoped/apt27 resolves but is MIS-SCOPED (see FLAG).
    FK-FIX: removed dangling target orgs/solarwinds-supernova (no such
    registry entry; the real orgs/solarwinds is the SolarWinds Corp /
    SUNBURST supply-chain victim and does NOT apply to the SUPERNOVA
    direct-exploitation cluster).
    RESIDUAL: sectors/government primary target is not carried by the cited
    CTU report (which names a single unattributed victim org); retained as
    broadly-reported SUPERNOVA-campaign context but flagged for review.
