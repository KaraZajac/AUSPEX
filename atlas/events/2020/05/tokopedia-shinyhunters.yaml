  notes: |
    Full 6-point audit (claude-opus-4.8, effort max) vs RAW snapshots.
    Sources hashed: zdnet__2020-05-03_tokopedia-91m-leak.html sha256
    eec9cd61..d4f1198e (1,008,107 B, NEW snapshot this audit); zdnet__2020-
    05-10_shinyhunters-73m-records.html sha256 86a069b2..000dafc4 (994,599 B,
    pre-existing, re-verified); doj__2024-01-09_raoult-shinyhunters-
    sentencing.html sha256 eb577ef4..757c3cb9 (101,375 B, pre-existing,
    re-verified). All three match their source records.

    [a] FACTS -- CORRECTED (embellishment + wrong-detail stripped). (1)
    PASSWORD HASH: prior outcome_summary said "bcrypt-hashed passwords" --
    WRONG. RAW 91m article: "The hashed passwords ... were secured with the
    SHA2-384 hashing algorithm" and "the database didn't contain the 'salt'
    random strings"; "bcrypt" has ZERO hits in the raw. bcrypt -> SHA2-384
    (unsalted). (2) FIELDS: prior list "user IDs, ..., genders, mobile
    numbers" -- "gender"/"genders" has ZERO hits in the raw and "user IDs" is
    not stated; both stripped. RAW field list: PostgreSQL dump "containing ...
    full names, emails, phone numbers, hashed passwords, dates of birth, and
    Tokopedia profile-related details (account creation date, last login, ...
    location details, messenger IDs, ...)". "mobile numbers" -> "phone
    numbers" (verbatim). (3) VENUE: prior "on RaidForums and EmpireMarket" --
    RAW 91m names ONLY the "Empire dark web marketplace" for the 91M sale
    (ZERO "RaidForums" hits); the 15M sample was "leaked ... for free" with
    no forum named. "RaidForums" is carried only generically by DoJ (one of
    three ShinyHunters venues, April 2020-July 2021), NOT tied to Tokopedia
    by any cited source. RaidForums removed from the Tokopedia-specific
    narrative; Empire/EmpireMarket retained (91m-carried). (4) COUNT: 91M is
    NOT embellished -- it is the hacker's CLAIM for the full DB ("The hacker
    claims they're in possession of 91 million user accounts", 91m) and
    ZDNET's own framing of the sold DB ("entire database of 91 million user
    records on sale for $5,000", 73m). Only the 15M sample was independently
    verified ("ZDNet has verified the authenticity of the leaked data against
    the official Tokopedia website"); prose now states claimed-91M vs
    verified-15M. individuals_affected 91,000,000 retained; asking_price_usd
    5,000 retained (73m: "on sale for $5,000"; the 91m article carries NO
    price). (5) UNSOURCED CONTEXT stripped: "merged with Gojek as GoTo" (2021,
    post-dates + not in cited sources) and EmpireMarket's "August 2020
    exit-scam shutdown" (not in cited sources) removed. (6) summary wave
    enumeration "(Tokopedia, Wishbone, Mathway, Chatbooks, ProctorU,
    Microsoft GitHub, others)" removed -- Mathway/ProctorU are NOT in any
    cited source (per the sibling aggregate audit); replaced with an explicit
    cross-link to the aggregate event id.

    [b] ATTRIBUTION -- HEDGED DOWN + RE-SOURCED. attribution_source_id
    zdnet/2020-05-03_tokopedia-91m-leak -> zdnet/2020-05-10_shinyhunters-73m-
    records: the 91m article (former attribution source) names ONLY "a hacker"
    (ZERO "ShinyHunters" hits) and cannot carry the ShinyHunters attribution.
    The 73m article carries it: "The hackers are the same group who breached
    last week Tokopedia" + "A hacker group going by the name of ShinyHunters
    claims to have breached ten companies". Self-claim / broker-listing basis
    + ZDNET's authenticity hedge ("authenticity of some of the listed
    databases cannot be verified"): attributing_org "ZDNET + journalism
    consensus" -> "ZDNET (Cimpanu) + threat-intel consensus (Nightlion, Under
    the Breach, ZeroFOX)"; attributing_org_confidence high -> moderate;
    auspex_assessment concur -> concur-with-caveat. DoJ 2024 corroborates the
    actor is real/convicted (Raoult; "more than 60 companies"). false_flag_
    risk kept `none` (NOT `suspected` like the wave/Wishbone siblings): the
    Tokopedia data was independently verified authentic against the live site
    and the same hacker did the March intrusion + the leak -- no re-post /
    misdirection; the brand softness is captured by concur-with-caveat.

    [c] DATES -- CORRECTED. RAW 91m JSON-LD datePublished 2020-05-02T14:10:00Z
    (author Catalin Cimpanu; dateModified 2020-05-07). disclosure_date
    2020-05-02 confirmed. start_date 2020-03-01 = month-granularity placeholder
    for "an intrusion that took place in March 2020" (kept; no day stated).
    end_date 2020-05-10 -> 2020-05-03: last Tokopedia-specific dated action in
    the raw is the full-DB-for-sale posting, "Updated on Sunday, May 3 ... now
    selling Tokopedia's entire user database"; the prior 05-10 traced to the
    73m article's id-slug, which is itself mis-dated (that article is 2020-05-
    09) and only references Tokopedia retrospectively. attribution_date
    2020-05-03 -> 2020-05-09 (date ZDNET attached the ShinyHunters name, per
    the 73m article). DoJ published_on 2024-01-09 confirmed (dateline "Tuesday,
    January 9, 2024").

    [d] DOCTRINE_LINKS -- none. Financially-motivated criminal data-broker /
    leak activity, no strategic doctrine; [] retained (per-event doctrine none).

    [e] ATTRIBUTION_LEVEL -- added named-actor. ShinyHunters is a named brand /
    forum-handle (not a nation or unit); self-claim + journalism identify a
    named actor, nothing narrower.

    [f] ACTOR_ID + TYPES + DIRECTIONALITY. criminal/shinyhunters resolves to
    atlas actor id criminal/shinyhunters (verified). incident_type [data-theft]
    -> [data-theft, leak] (free 15M sample leak + full-DB sale listing).
    Directionality: Tokopedia (orgs/tokopedia) is the VICTIM, role primary --
    retained. CROSS-LINK (prose, no structured field exists in corpus):
    2020-05/shinyhunters-data-broker-wave-may is the aggregate that EXCLUDES
    this 91M posting -- NOT a duplicate; named in summary + here. Sources[]
    kept at 3 (91m = breach facts/15M/91M-claim/Empire/SHA2-384; 73m =
    ShinyHunters attribution + 91M/$5,000; DoJ = actor corroboration); order
