id: 2020-05/tokopedia-shinyhunters
name: Tokopedia 91M user-record leak (ShinyHunters)
start_date: 2020-03-01
disclosure_date: 2020-05-02
end_date: 2020-05-10
incident_type:
  - data-theft
initial_vector: unknown
outcome_summary: |
  ShinyHunters posted approximately 91 million Tokopedia user
  records on RaidForums and EmpireMarket in early May 2020 —
  initial 15M sample on May 2 followed by the full database
  days later. Records included user IDs, email addresses, full
  names, dates of birth, genders, mobile numbers, and bcrypt-
  hashed passwords. The dataset was offered for USD 5,000.
  Tokopedia is Indonesia's largest e-commerce platform
  (subsequently merged with Gojek as GoTo). The breach is the
  first major incident attributed to the ShinyHunters brand and
  established the 2020 ShinyHunters data-broker pattern of
  scraping under-secured web applications and reposting on
  English-language breach forums.
quantified_impact:
  individuals_affected: 91000000
  asking_price_usd: 5000
false_flag_risk: none
summary: |
  Foundational ShinyHunters event. Notable as the first major
  incident under the ShinyHunters handle and a marker for the
  April-May 2020 data-broker wave (Tokopedia, Wishbone,
  Mathway, Chatbooks, ProctorU, Microsoft GitHub, others).
  Cluster-overlap: data was also re-traded on EmpireMarket
  before that marketplace's August 2020 exit-scam shutdown.
attributions:
