id: 2020-05/tokopedia-shinyhunters
name: Tokopedia 91M user-record leak (ShinyHunters)
start_date: 2020-03-01
disclosure_date: 2020-05-02
end_date: 2020-05-03
incident_type:
  - data-theft
  - leak
initial_vector: unknown
outcome_summary: |
  In March 2020 an intruder obtained the user database of
  Tokopedia, Indonesia's largest online store. On Friday 1 May
  2020 the hacker leaked a 15-million-record sample for free --
  reportedly to solicit help cracking the password hashes -- and
  by Sunday 3 May had listed the full database, claimed to hold
  approximately 91 million user accounts, for sale on the Empire
  (EmpireMarket) dark-web marketplace for USD 5,000. ZDNET, with
  breach-monitor Under the Breach, obtained the sample and
  verified its authenticity against Tokopedia's live site. The
  PostgreSQL dump contained full names, email addresses, phone
  numbers, dates of birth, SHA2-384 (unsalted) hashed passwords,
  and assorted profile fields (account-creation / last-login
  timestamps, location details, messenger IDs, and more). The
  ShinyHunters handle was attached to the breach a week later,
  when ZDNET reported the same group had moved on to a ten-company
  data-broker wave; the DoJ's 2024 Raoult prosecution later
  confirmed ShinyHunters as a real crew that sold data from more
  than 60 companies (April 2020 - July 2021).
quantified_impact:
  individuals_affected: 91000000
  asking_price_usd: 5000
false_flag_risk: none
summary: |
  Standalone per-company event for the Tokopedia posting in the
  April-May 2020 ShinyHunters data-broker wave -- separately
  modeled from, and explicitly excluded by, the aggregate event
  2020-05/shinyhunters-data-broker-wave-may (which brackets out
  the Tokopedia 91M and Wishbone 40M postings; NOT a duplicate).
  Widely reported as the first major data-broker sale associated
  with the ShinyHunters handle, and the profit that (per ZDNET)
  "encouraged and emboldened" the group's subsequent ten-company
  wave. Attribution note: the 1-3 May breach reporting named only
  "a hacker"; the ShinyHunters brand was attached on 9 May, and
  what ZDNET independently verified was the data's authenticity,
  not the handle.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: ZDNET (Cimpanu) + threat-intel consensus (Nightlion, Under the Breach, ZeroFOX)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-05-09
    attribution_source_id: zdnet/2020-05-10_shinyhunters-73m-records
    notes: |
      Self-claim / broker-listing basis. The 2 May breach report
      named only "a hacker"; ZDNET tied the ShinyHunters handle to
      the Tokopedia sale on 9 May ("the same group who breached
      last week Tokopedia"). Threat-intel sources (Nightlion, Under
      the Breach, ZeroFOX) regard ShinyHunters as a legitimate
      actor, but ZDNET notes the authenticity of some wave datasets
      "cannot be verified." Corroborated by the 2024 DoJ Raoult
      sentencing, which identifies ShinyHunters as the broker
      persona behind sales of data from more than 60 companies
      (April 2020 - July 2021). NB the Tokopedia data was
      independently verified authentic by ZDNET against the live
      site; the caveat attaches to the brand attribution, not to
      the breach itself.
doctrine_links: []
targets:
