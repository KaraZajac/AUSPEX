id: 2020-05/wechat-international-surveillance-citizenlab
name: WeChat international-user surveillance disclosed (Citizen Lab)
start_date: 2020-01-01
disclosure_date: 2020-05-07
end_date: 2020-05-07
incident_type:
  - surveillance
  - documentary
outcome_summary: |
  Citizen Lab demonstrates that images and documents sent in
  chats entirely among non-China-registered WeChat accounts are
  subjected to political-content surveillance by Tencent, with
  files deemed politically sensitive added to WeChat's
  sensitive-content hash index — the same censorship apparatus
  previously found to apply only to China-registered accounts —
  thereby "invisibly train[ing] and build[ing] up" the PRC
  domestic-censorship classifier off the international user base.
false_flag_risk: none
summary: |
  Documentary event rather than an incident: Citizen Lab's
  technical demonstration that the architecture of WeChat
  enforces PRC censorship across non-PRC user-pairs by
  routing all content classification through Tencent's
  Chinese infrastructure. Important for AUSPEX because it
  documents one of the clearest concrete operational
  manifestations of the 2017 National Intelligence Law's
  compelled-vendor-cooperation pillar — Tencent as a
  vendor obliged to perform classification and surveillance
  on behalf of the PRC state, across its international user
  base. (The 2017-NIL framing is AUSPEX's inference: Citizen
  Lab attributes the surveillance to Tencent acting under
  generic "laws and regulations from Chinese authorities" and
  does not name the National Intelligence Law.) The finding
  predates the US executive-order action against WeChat
  (Executive Order 13943, 2020-08-06) by roughly three months;
  the causal weight of the report in that action is not
  established by the cited source and is noted only as context.
