qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs Citizen Lab "We Chat, They Watch: How International Users
    Unwittingly Build up WeChat's Chinese Censorship Apparatus" (Knockel,
    Parsons, Ruan et al., 2020-05-07). Source is REAL (not a phantom) —
    title/body match; raw snapshot captured, sha256
    fad48923…49bb99a2, 293166 bytes.
    [a] FACTS ✓ verbatim-supported: "WeChat communications conducted entirely
    among non-China-registered accounts are subject to pervasive content
    surveillance that was previously thought to be exclusively reserved for
    China-registered accounts"; "Documents and images transmitted entirely
    among non-China-registered accounts undergo content surveillance wherein
    these files are analyzed for content that is politically sensitive in
    China"; "files deemed politically sensitive are used to invisibly train
    and build up WeChat's Chinese political censorship system"; mechanism —
    image "file hash is added to the hash index to enable future real-time
    censorship" (hash-index + content surveillance), methods "previously found
    to apply to communication to, or from, China-registered accounts."
    CORRECTIONS: (1) incident_type supply-chain-model dropped — this is a
    surveillance/censorship-infrastructure documentary finding, NOT an
    intrusion; set incident_type=[surveillance, documentary] and REMOVED the
    bogus initial_vector: supply-chain (no initial-access vector exists for a
    documentary event). (2) outcome_summary tightened to the source's actual
    mechanism (hash index / "invisibly train and build up"), replacing the
    looser "keyword surveillance lists" phrasing. (3) Summary's uncited causal
    claim that the report "provides part of the technical basis" for the Aug-2020
    US executive order was softened to neutral context (Citizen Lab predates and
    does not cite EO 13943; the causal weight is not source-carried).
    [b] ATTRIBUTION — KEY CORRECTION: actor_id cn/mss/apt41 -> null. Citizen Lab
    names NO cyber threat actor; it attributes the surveillance to Tencent
    (WeChat's operator) acting under generic "laws and regulations from Chinese
    authorities." APT41 was a disputed placeholder (the event's own prior notes
    said so) and is substantively wrong — APT41 is an espionage/financial-crime
    intrusion cluster unrelated to platform-level censorship. Modeled per the
    null-actor documentary convention (cf. snowden-disclosures): attributing_org
    = Citizen Lab, confidence high (first-party technical research), assessment
    concur. No Tencent/vendor actor record exists in the atlas.
    [c] DATES ✓: source published_on 2020-05-07 = disclosure_date/end_date;
    start_date 2020-01-01 is an estimate for the ongoing-surveillance condition
    the report documents. No conflation.
    [d] DOCTRINE_LINKS: NIL-2017/compelled-vendor-cooperation kept at
    strongly_inferred (correct, NOT attested) — the source states the mechanism
    in substance ("laws and regulations that hold companies accountable for the
    content... transmitted on their platforms"; companies "expected to invest in
    human resources and technologies") but does NOT name the National
    Intelligence Law; inference_basis.signals + ruled_out present and honest;
    attesting_source_id denotes the supporting source per schema. dsl-pipl/
    cross-border-data-review kept at plausible (honest precursor framing, DSL/PIPL
    codified 2021 > event 2020), non-contested.
    [e] ATTRIBUTION_LEVEL: null actor, so no attribution_level (documentary).
    [f] ACTOR_ID: n/a after -> null. NOTE for orchestrator: the atlas has no
    Tencent / state-aligned-vendor actor to carry platform-compelled-surveillance
    events like this one; null-actor is the current best fit.
    Residual: "content-classifier training set" framing is a fair paraphrase of
    the source's "invisibly train and build up... censorship system."
