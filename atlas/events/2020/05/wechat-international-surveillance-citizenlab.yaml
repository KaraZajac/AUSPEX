id: 2020-05/wechat-international-surveillance-citizenlab
name: WeChat international-user surveillance disclosed (Citizen Lab)
start_date: 2020-01-01
disclosure_date: 2020-05-07
end_date: 2020-05-07
incident_type:
  - documentary
initial_vector: vendor-platform
outcome_summary: |
  Citizen Lab demonstrates that images and documents sent in
  chats between non-Chinese WeChat accounts are subjected to
  political-content classification by Tencent servers, with
  matched content added to keyword surveillance lists then
  enforced against China-registered accounts. Establishes the
  international WeChat user-base as a content-classifier
  training set for the PRC domestic-censorship apparatus.
false_flag_risk: none
summary: |
  Documentary event rather than an incident: Citizen Lab's
  technical demonstration that the architecture of WeChat
  enforces PRC censorship across non-PRC user-pairs by
  routing all content classification through Tencent's
  Chinese infrastructure. Important for AUSPEX because it
  documents one of the clearest concrete operational
  manifestations of the 2017 National Intelligence Law's
  compelled-vendor-cooperation pillar — Tencent as a
  vendor obliged to perform classification and surveillance
  on behalf of the PRC state, across its international user
  base. The event also predates the formal US executive-order
  action against WeChat (August 2020) by approximately three
  months and provides part of the technical basis for that
  action.
attributions:
  - actor_id: cn/mss/apt41
    attributing_org: Citizen Lab
    attributing_org_confidence: low
    auspex_assessment: contested
    attribution_date: 2020-05-07
    attribution_source_id: citizenlab/2020-05-07_we-chat-they-watch
    notes: |
      Citizen Lab does not attribute to a specific cyber
      threat actor — the operation is a vendor-platform
      surveillance pattern enforced via Tencent's
      compelled-cooperation posture under the 2017 NIL,
      not an APT-style intrusion. APT41 reference is a
      placeholder that AUSPEX disputes — the correct
      "actor" is the Chinese state qua Tencent, not a
      named cyber-threat cluster. Assessment is contested.
