    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-05-21
    attribution_source_id: zerofox/2020-05-20_wishbone-breach
doctrine_links: []
targets:
  - target_id: orgs/wishbone
    role: primary
sources:
