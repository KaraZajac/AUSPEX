id: 2020-05/wishbone-shinyhunters
name: Wishbone 40M user-record leak (ShinyHunters)
start_date: 2020-01-01
disclosure_date: 2020-05-20
end_date: 2020-05-31
incident_type:
  - data-theft
  - leak
initial_vector: unknown
outcome_summary: |
  ShinyHunters posted approximately 40 million Wishbone user
  records on RaidForums in May 2020 and claimed responsibility
  for the underlying breach. Wishbone is a US-based polling /
  quiz mobile app marketed predominantly to teenage and
  young-women users. The exposed records included usernames,
  email addresses, phone numbers, gender, dates of birth,
  geo-location data, Facebook / Twitter access tokens, and
  MD5-hashed passwords. The full 40-million-record dataset was
  initially advertised for sale at approximately USD 8,000;
  ShinyHunters then leaked it in full for free on the same
  forum, reportedly because other actors had begun reselling
  the data.
quantified_impact:
  individuals_affected: 40000000
  asking_price_usd: 8000
false_flag_risk: suspected
summary: |
  Standalone per-company event for the Wishbone posting in the
  April-May 2020 ShinyHunters data-broker wave -- separately
  modeled from, and explicitly excluded by, the aggregate event
  2020-05/shinyhunters-data-broker-wave-may (which brackets out
  the Tokopedia 91M and Wishbone 40M postings). The DoJ's 2024
  Raoult sentencing establishes ShinyHunters as a real, convicted
  crew that posted stolen data from 60+ companies (April 2020 -
  July 2021) but does NOT name Wishbone specifically. Notable for
  the demographic skew (US minor / young-adult dataset) and the
  weak MD5 password hashing, both of which made the dataset
  unusually high-utility for credential-stuffing.
attributions:
