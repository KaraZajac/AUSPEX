id: 2020-05/wishbone-shinyhunters
name: Wishbone 40M user-record leak (ShinyHunters)
start_date: 2020-01-01
disclosure_date: 2020-05-20
end_date: 2020-05-31
incident_type:
  - data-theft
initial_vector: unknown
outcome_summary: |
  ShinyHunters posted approximately 40 million Wishbone user
  records on RaidForums in May 2020. Wishbone is a US-based
  polling / quiz mobile app marketed predominantly to teenage
  and young-women users. The exposed records included
  usernames, email addresses, phone numbers, dates of birth,
  geo-location data, and MD5-hashed passwords. A subset of the
  data was offered for USD 1,500.
quantified_impact:
  individuals_affected: 40000000
  asking_price_usd: 1500
false_flag_risk: none
summary: |
  Part of the April-May 2020 ShinyHunters data-broker wave
  documented in the 2024 DOJ Raoult sentencing as among the
  ~60 victim companies. Notable for the demographic skew (US
  minor / young-adult dataset) and the weak password hashing,
  both of which made the dataset unusually high-utility for
  credential-stuffing.
