id: 2020-05/shinyhunters-data-broker-wave-may
name: ShinyHunters May 2020 data-broker wave (aggregate)
start_date: 2020-04-01
disclosure_date: 2020-05-09
end_date: 2020-07-31
incident_type:
  - data-theft
  - leak
initial_vector: unknown
outcome_summary: |
  Aggregate event for the ShinyHunters April-May 2020 data-
  broker wave: user databases stolen from ten companies and
  offered for sale on a dark-web marketplace, beyond the
  separately-modeled Tokopedia (91M) and Wishbone (40M)
  postings. Per ZDNET (Cimpanu, 9 May 2020), ShinyHunters
  claimed to have breached ten companies and listed their
  databases -- totalling 73.2 million user records -- for a
  combined ~$18,000, with each database sold separately:
  Zoosk (30M), Chatbooks (15M), Home Chef (8M),
  SocialShare (6M, South Korea), Minted (5M),
  Chronicle of Higher Education (3M), GGuMim (2M, South Korea),
  Mindful (2M), Bhinneka (1.2M, Indonesia), and StarTribune (1M).
  ZDNET verified that samples from some datasets contained
  legitimate user records, but noted the authenticity of some
  listed databases could not be confirmed. The US DoJ (2024)
  later stated that, between April 2020 and July 2021,
  ShinyHunters posted sales of hacked data from more than 60
  companies on RaidForums, EmpireMarket, and Exploit -- the
  wave continued well beyond this initial ten-company cluster.
quantified_impact:
  individuals_affected: 73200000
  asking_price_usd: 18000
false_flag_risk: suspected
summary: |
  Aggregate "wave" event for the 2020 ShinyHunters data-broker
  output. Modeled as a single event rather than per-company to
  avoid corpus saturation; per-company events are stubbed only
  for the most consequential cases (Tokopedia, Wishbone, and
  Microsoft GitHub). Carries a `suspected` false-flag-risk
  because the ShinyHunters handle is a brand: some postings in
  this wave may have been re-postings of datasets originally
  compromised by other operators, with the ShinyHunters name
  attached for credit / monetization purposes.
