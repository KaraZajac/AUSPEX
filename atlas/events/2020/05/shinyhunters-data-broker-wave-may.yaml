id: 2020-05/shinyhunters-data-broker-wave-may
name: ShinyHunters May 2020 data-broker wave (aggregate)
start_date: 2020-04-01
disclosure_date: 2020-05-10
end_date: 2020-07-31
incident_type:
  - data-theft
initial_vector: unknown
outcome_summary: |
  Aggregate event for the April-May 2020 ShinyHunters data-
  broker wave covering datasets posted on RaidForums and
  EmpireMarket beyond the headline Tokopedia and Wishbone
  postings. Confirmed victim datasets in this wave include:
  Mathway (~25M records), Chatbooks (~15M), Promo.com (~22M),
  ProctorU (~444K), HomeChef (~8M), Star Tribune,
  Bhinneka (~1.2M, Indonesia), Mindful, Minted, GGuMim,
  Mathway, and others. Aggregate dataset size reported by
  ZDNET on 10 May 2020 as >73M records across an initial
  cluster of ten companies; the wave continued through July
  2020 covering ~30 additional companies.
quantified_impact:
  individuals_affected: 200000000
  asking_price_usd: 18000
false_flag_risk: suspected
summary: |
  Aggregate "wave" event for the 2020 ShinyHunters data-broker
  output. Modeled as a single event rather than per-company
  to avoid corpus saturation; per-company events are stubbed
  only for the most consequential cases (Tokopedia, Wishbone,
  Microsoft GitHub, ProctorU). Includes a `suspected` false-
  flag-risk because the ShinyHunters handle is a brand: some
  postings in this wave may have been re-postings of datasets
  originally compromised by other operators, with the
  ShinyHunters name attached for credit / monetization
  purposes.
