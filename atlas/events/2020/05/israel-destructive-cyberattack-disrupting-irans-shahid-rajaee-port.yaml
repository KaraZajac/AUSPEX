id: 2020-05/israel-destructive-cyberattack-disrupting-irans-shahid-rajaee-port
name: "Israel destructive cyberattack disrupting Iran's Shahid Rajaee Port"
start_date: 2020-05-01
incident_type:
  - cyber-physical
  - disruption
  - destructive
false_flag_risk: none
summary: |
  CFR records that in May 2020 Israel retaliated against Iran for the attempted poisoning of Israeli water-treatment and sewage facilities by launching a cyberattack on Iran's Shahid Rajaee Port, disrupting its operations.
attributions:
  - actor_id: il/unscoped/israeli-state-cyber-operator
    attributing_org: "CFR Cyber Operations Tracker (citing The Washington Post and Israeli/regional press)"
    attributing_org_confidence: moderate   # CFR labels the field "Suspected state sponsor: Israel" (not confirmed); WaPo headline "officials: Israel LINKED to" — hedged
    attribution_level: nation   # CFR names the nation (Israel) only; no named service/unit. Set 2026-06-23 audit.
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-05-01
    attribution_source_id: cfr/2020-05_israel-destructive-cyberattack-disruptin
doctrine_links:
  - doctrine_id: il/counter-iran-posture
    pillar_id: il/counter-iran-posture/retaliatory-cyber-strike
    program_id: null
    confidence: strongly_inferred  # held at strongly_inferred (NOT attested) 2026-06-23 audit: CFR states the retaliatory purpose, but the actor itself is only SUSPECTED Israel — purpose-statement is conditional on a hedged attribution, so confidence is not upgraded (H6: never upgrade).
    reasoning: |
      CFR's own description states Israel "retaliated against Iran for targeting of Israeli water treatment and sewage facilities by launching a cyberattack against Iran's Shahid Rajaee Port" — an explicit tit-for-tat cyber strike against Iran, which is precisely the retaliatory-cyber-strike pillar. The strategic reading is stated by the attributing source; it is held at strongly_inferred rather than attested only because the sponsor attribution is "Suspected" (CFR) / "linked" (WaPo), not confirmed.
    attesting_source_id: cfr/2020-05_israel-destructive-cyberattack-disruptin   # primary supporting source (states the retaliatory goal); see inference_basis.signals
    inference_basis:
      signals:
        - "CFR description states the retaliatory motive verbatim: Israel 'retaliated against Iran for targeting of Israeli water treatment and sewage facilities'."
        - "CFR classifies the incident type as 'Sabotage'; target is 'Shahid Rajaee Port in Iran' — Iranian civilian/dual-use infrastructure, the class the retaliatory-cyber-strike pillar covers."
        - "Timing (May 2020) directly follows the late-April/early-May 2020 attempted intrusion into Israeli water-treatment SCADA, attributed to Iran — the tit-for-tat sequence the pillar encodes."
      ruled_out: "il/counter-iran-posture/counter-nuclear-program — the target is a commercial container port, not enrichment/weapons or supply-chain industry, so the counter-WMD reading does not fit; the source frames it as retaliation, not counter-program disruption."
    contested: false
    analyst: claude
targets:
  - target_id: sectors/transport/maritime
    country: ir
    role: primary
sources:
  - cfr/2020-05_israel-destructive-cyberattack-disruptin
