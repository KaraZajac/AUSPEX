  notes: |
    Audited vs CFR Cyber Operations Tracker (raw snapshot captured + sha256). Facts ✓: CFR description
    matches the summary verbatim ("Israel retaliated against Iran for targeting of Israeli water treatment
    and sewage facilities by launching a cyberattack against Iran's Shahid Rajaee Port"); CFR fields —
    Type of incident: Sabotage; Suspected victims: Shahid Rajaee Port in Iran; Date of report: May 2020.
    ATTRIBUTION is HEDGED: CFR labels it "Suspected state sponsor: Israel" (not confirmed) and its cited WaPo
    source is headlined "officials: Israel LINKED to a disruptive cyberattack" — so attributing_org_confidence
    held at moderate (CFR "Suspected" => <= moderate) and attribution_level SET to nation (CFR names the nation
    only, no service/unit). Doctrine link held at strongly_inferred (NOT upgraded to attested): CFR states the
    retaliatory purpose, but conditional on a suspected attribution; added inference_basis (signals + ruled_out)
    and attesting_source_id (supporting). ACTOR FLAG: il/unscoped/israeli-state-cyber-operator is a known generic
    multi-op placeholder (also carries the 2017 Kaspersky op) — this destructive Iranian-port OT-sabotage op is a
    candidate to split into Predatory Sparrow / IDF-8200-class lineage (see report); flagged, NOT split here.
