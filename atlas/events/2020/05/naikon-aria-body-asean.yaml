qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited against Check Point Research "Naikon APT: Cyber Espionage
    Reloaded" (2020-05-07), raw snapshot captured:
    checkpoint__2020-05-07_naikon-aria-body.html, sha256 690e8010…008639ee
    (213127 bytes). Title/body confirm the real article (not a phantom).

    [a] FACTS — Verbatim support: "cyber espionage operation against
    several national government entities in the Asia Pacific (APAC)
    region ... we were able to attribute to the Naikon APT group ... a
    new backdoor named Aria-body"; victims "including Australia,
    Indonesia, the Philippines, Vietnam, Thailand, Myanmar and Brunei";
    target types "ministries of foreign affairs, science and technology
    ministries, as well as government-owned companies"; delivery via
    RoyalRoad-weaponized RTF email; C2 pivot "the group compromised and
    used servers within the infected ministries as command and control
    servers", plus "a foreign embassy unknowingly sent malware-infected
    documents to the government of its host country" and hacked govt IP
    (Philippines dept of science and technology) used as backup C&C; and
    "over the 5 years since the last report". CORRECTIONS: struck
    "presidential-office" and "military entities" from outcome_summary —
    the words presidential/military do NOT appear in the source (0 hits);
    Check Point names only foreign-affairs + science-and-technology
    ministries + government-owned companies. Rewrote summary to drop the
    "PLA Chengdu Second TRB (Unit 78020)" / ThreatConnect-unit-attribution
    claim, which THIS source does not carry (78020: 0 hits, PLA: 0 hits) —
    kept only what Check Point states (ThreatConnect 2015 "revealed the
    APT group's infrastructure and even exposed one of the group's
    members"). Added espionage to incident_type; set end_date null (source
    calls it an "ongoing" operation, so disclosure-day end was a
    conflation).

    [b] ATTRIBUTION — Check Point's exact words: "we were able to
    attribute our campaign to the Naikon APT group using several
    similarities ... by Kaspersky in 2015" and, in Conclusion, "a
    long-running Chinese-based operation". So it reaches named-actor
    (Naikon) + nation (Chinese-based), NOT named-unit. "APT30" appears 0
    times in the source. Kept attributing_org_confidence high (firm,
    multi-signal attribution) but added attribution_level: named-actor and
    an attribution note recording that the APT30 label and Unit-78020
    placement come from the AUSPEX actor record, not this source. No
    over-attestation to a PLA unit.

    [c] DATES — published_on 2020-05-07 matches the article; source tier
    primary (first-party vendor research) correct, unchanged. start_date
    2015-01-01 defensible ("5 years since the last report"); end_date set
    null (ongoing).

    [d] DOCTRINE — cn/bri political-intelligence-collection DOWNGRADED
    strongly_inferred -> plausible: Check Point states no strategic
    purpose, and the SCS-claimant victim set sustains a second reading
    (South-China-Sea territorial/maritime-dispute collection) alongside
    BRI economic-diplomacy collection; added inference_basis.alternatives.
    Reasoning corrected to drop the unsupported "presidential-office".
    REMOVED the cn/mcf link: it was mis-framed ("PLA-tasking ... fits the
    MCF umbrella" conflates espionage tasking with Military-Civil Fusion),
    unsupported by the source, and the dominant reading is political
    intelligence, not mil-civ tech fusion. attesting_source_id stays null.

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing).

    [f] ACTOR_ID — cn/pla/apt30 resolves to atlas/actors/cn/apt30.yaml.
    FLAG (not edited): the actor is placed at named-unit (Unit 78020) on
    ThreatConnect 2015, and its canonical_name is APT30 with Naikon as a
    Kaspersky `equivalent` alias. This event's only source (Check Point)
    names "Naikon", never "APT30" and never the unit, and MISP treats
    Naikon vs APT30 as overlapping-but-separate. The mapping is the
    documented, orchestrator-approved (2026-06-24) load-bearing caveat in
    the actor record — recorded here so the event does not silently
    inherit a unit-level claim its source does not make.

    OTHER FIX: target_id "targets/orgs/asean-governments" was a dangling
    FK (extra "targets/" prefix) — corrected to "orgs/asean-governments"
    (the convention every other event uses). Removed
    sectors/government/defense-ministry (no defense/military target in
    source); added sectors/government/civilian for the science-and-tech
    ministries + government-owned companies.

    Residual uncertainty: Australia (a named victim) is not an ASEAN
    member, so the orgs/asean-governments aggregate under-labels the
    victim set slightly; retained as the closest existing registry target
    (its own summary already spans PRC SCS/BRI regional collection).
