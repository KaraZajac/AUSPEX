id: 2020-05/naikon-aria-body-asean
name: Naikon Aria-body ASEAN intrusion campaign
start_date: 2015-01-01
disclosure_date: 2020-05-07
end_date: null
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  Check Point Research disclosure (2020-05-07) of an ongoing
  cyber-espionage operation it attributes to the Naikon APT group
  (AUSPEX canonical actor APT30) against national government
  entities across the Asia-Pacific — Australia, Indonesia, the
  Philippines, Vietnam, Thailand, Myanmar and Brunei. Named target
  types: ministries of foreign affairs, science-and-technology
  ministries, and government-owned companies. The new "Aria-body"
  custom loader/backdoor is the distinctive implant, delivered via
  RoyalRoad-weaponized RTF spear-phishing; the group compromised and
  used servers inside infected ministries as C2 to relay stolen data
  and, in at least one case, launched attacks from one breached
  government (a foreign embassy) into its host-country government.
false_flag_risk: none
summary: |
  Check Point attributes the campaign to the Naikon APT group on the
  strength of similarities to Kaspersky's 2015 Naikon reporting, and
  characterises it in its conclusion as "a long-running Chinese-based
  operation against various government entities in APAC." Significant
  for two reasons. First, it shows Naikon activity continuing in the
  five years after the 2015 ThreatConnect / Defense Group report —
  which had exposed the group's infrastructure and one of its members
  — i.e. earlier public exposure did not halt the collection. Second,
  the cross-victim C2-pivot tradecraft (using one government's
  compromised infrastructure, including hacked government IP space, to
  reach another) prefigures later PRC operations that relay through
  trusted third-party and edge infrastructure for last-mile staging.
  NB: Check Point itself does not use the label "APT30", does not name
  a PLA unit, and does not restate the ThreatConnect Unit-78020
  attribution — those rest on the AUSPEX actor record, not this source.
attributions:
  - actor_id: cn/pla/apt30
    attributing_org: Check Point Research
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-05-07
    attribution_source_id: checkpoint/2020-05-07_naikon-aria-body
    notes: |
      Check Point names the actor as "the Naikon APT group" (its own
      words), attributed via similarities to Kaspersky's 2015 Naikon
      reporting, and assesses the campaign is "Chinese-based"
      (Conclusion) — so this attribution reaches named-actor + nation,
      NOT named-unit. Check Point does not say "APT30" and does not
      name a PLA unit. AUSPEX resolves the actor to cn/pla/apt30 (APT30,
      with Naikon as a Kaspersky `equivalent` alias); the named-unit
      (Unit 78020) placement rests on ThreatConnect's 2015 report in the
      actor record, not on this source.
doctrine_links:
  - doctrine_id: cn/bri
    pillar_id: cn/bri/political-intelligence-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Persistent PRC collection against Asia-Pacific foreign-affairs
      ministries, science-and-technology ministries and government-owned
      companies fits the BRI partner-country political-intelligence
      pillar — the AUSPEX ontology places APT30/Naikon under exactly this
      pillar ("APT30 covers South and Southeast Asia"), and Check Point's
      named victim set matches its target sectors. Rated plausible rather
      than higher because Check Point states no strategic purpose (only
      "Chinese-based ... cyber espionage"), and the maritime South-East
      Asian victim set (Philippines, Vietnam, Brunei, Indonesia — all
      South China Sea claimants) sustains a second strategic reading of
      South-China-Sea territorial / maritime-dispute political-military
      collection that is not strictly a BRI economic-diplomacy objective.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "BRI partner-country political-intelligence collection: diplomatic/political reporting on Asia-Pacific governments, the pillar to which the AUSPEX ontology assigns APT30/Naikon and whose target sectors (foreign-ministry, civilian government) match Check Point's named victims."
        - "South-China-Sea / regional territorial-dispute collection: the victims are predominantly SCS maritime claimants plus Australia, reading as political-military intelligence on regional sovereignty and security postures rather than BRI economic diplomacy specifically."
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government/foreign-ministry
    role: primary
  - target_id: sectors/government/civilian
    role: primary
  - target_id: orgs/asean-governments
    role: primary
sources:
