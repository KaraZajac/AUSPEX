id: 2020-05/naikon-aria-body-asean
name: Naikon Aria-body ASEAN intrusion campaign
start_date: 2015-01-01
disclosure_date: 2020-05-07
end_date: 2020-05-07
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Check Point Research disclosure of a five-year Naikon / APT30
  campaign against ASEAN governments — Indonesia, the
  Philippines, Vietnam, Thailand, Myanmar, Brunei, Australia.
  Targets: foreign-ministry, science-and-tech-ministry,
  presidential-office, and military entities. Aria-body custom
  loader as the distinctive implant; compromised government
  servers used as C2 to pivot into peer-government targets.
false_flag_risk: none
summary: |
  Significant for two reasons. First, confirms Naikon / APT30
  remained active across the 2015–2020 window despite earlier
  ThreatConnect attribution to PLA Chengdu Second TRB (Unit
  78020) — that is, public attribution did not halt the
  collection. Second, the cross-victim C2-pivot tradecraft
  (use of one government's compromised infrastructure to
  attack another) is the ASEAN-regional precursor to later
  PRC operations using telecom and edge-router relay
  infrastructure for last-mile staging.
