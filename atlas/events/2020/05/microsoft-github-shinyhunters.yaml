  notes: |
    Phantom/wrong-source remediation (RE-SOURCE path, badrabbit model).
    The cited source zdnet/2020-05-10_shinyhunters-73m-records is a REAL
    ZDNet article but about a DIFFERENT event — the parallel 73.2M-records /
    10-company sale wave (Tokopedia, SocialShare, Chronicle of Higher
    Education, GGuMim, Chatbooks, StarTribune, Home Chef, etc.). Its body
    carries NO Microsoft or GitHub content (raw sha256 86a069b2…000dafc4,
    994,599 bytes: the "Microsoft" string hits are all site-nav menu; the lone
    "github" hit is inside a bundled uuid JS library). It is still validly
    cited by 3 other wave events, so it is retained here only as wave-context
    secondary (scope note added to its record), and the attribution was
    re-pointed to the genuine primary report.
    RE-SOURCED to bleepingcomputer/2020-05-06_microsoft-github-account-hacked
    (Lawrence Abrams; raw snapshot captured, sha256 25abf9a7…92bd6e33, 93,787
    bytes; datePublished 2020-05-06T20:04-04:00, dateModified 2020-05-08).
    [a] FACTS vs BleepingComputer — all now source-carried: 500GB claim ("A
    hacker claims to have stolen over 500GB of data from Microsoft's private
    GitHub repositories"); full access to 'Private' repos; breach date "may
    have occurred on March 28th, 2020" (file stamps); 1GB free teaser "on a
    hacker forum for registered members to use site 'credits'"; content
    "mostly code samples, test projects, an eBook, and other generic items";
    "did not contain more sensitive code for software like Windows or Office";
    API-key/password concern (Under the Breach); MS-employee legitimacy
    confirmation; Microsoft "aware of these claims and are investigating."
    CORRECTIONS: (1) initial_vector valid-creds -> unknown — "claimed via
    compromised employee credentials" is FABRICATED; the source states no
    access method. (2) outcome_summary stripped fabricated specifics not in
    any source: the "May 7 2020" posting date, "Azure, Office" content (in
    fact CONTRADICTED — source says it did NOT contain Office source code),
    "internal project metadata consistent with Microsoft-employee GitHub
    accounts", "withdrawn from sale" (source says the actor decided to leak it
    free, not that a sale was withdrawn), and "RaidForums" (source says only
    "a hacker forum"). (3) summary FIXED misattribution — the "non-sensitive /
    no source code" assessment was BleepingComputer's and Under the Breach's,
    NOT "Microsoft's public position"; Microsoft's only statement was that it
    was investigating. (4) false_flag_risk suspected -> none — the original
    rationale conflated "scope not independently verified" with false flag;
    there is no misattribution/deception (open self-claim), and the leaked
    data was corroborated as legitimate by an MS employee. (5) end_date
    2020-05-08 -> null (that date was only the article's update stamp, not an
    operation end). quantified_impact.data_exfiltrated_gb kept at 500 but
    annotated as the actor's claim (verified/shared sample ~1GB).
    [b] ATTRIBUTION: ShinyHunters self-claim to BleepingComputer;
    attributing_org_confidence low (self-claim; MS did not confirm scope);
    auspex_assessment concur-with-caveat. attribution_date 2020-05-07 ->
    2020-05-06 (BC datePublished). attribution_source_id re-pointed to BC.
    [c] DATES: disclosure_date 2020-05-07 -> 2020-05-06 (BC publication, "this
    evening"); start_date 2020-03-28 retained (source-backed); end_date
    nulled. New source published_on = 2020-05-06.
    [d] DOCTRINE_LINKS: [] correct — a criminal financial/data-theft crew with
    no source-documented state nexus; no doctrine applies. Not invented.
    [e] ATTRIBUTION_LEVEL: added named-actor (ShinyHunters named as the
    claiming group; no unit/service).
    [f] ACTOR_ID: criminal/shinyhunters resolves (primary_service_id null,
    correct for a criminal/ crew). No actor-file edit made. No flags.
    RESIDUAL UNCERTAINTY: the 500GB figure and the "full access" claim rest on
    the actor's own account; only ~1GB was ever shown and independently judged
    non-significant, hence the low attributing-org confidence and
    concur-with-caveat stance retained.
