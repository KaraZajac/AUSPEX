id: 2020-05/microsoft-github-shinyhunters
name: Microsoft private-GitHub repository leak claimed by ShinyHunters
start_date: 2020-03-28
disclosure_date: 2020-05-07
end_date: 2020-05-08
incident_type:
  - data-theft
initial_vector: valid-creds  # claimed via compromised employee credentials
outcome_summary: |
  In early May 2020 ShinyHunters claimed possession of
  approximately 500GB of source code from Microsoft's private
  GitHub repositories, posting a 1GB sample to an
  unspecified darknet site on May 7 2020. The sample contained
  internal project metadata consistent with Microsoft-employee
  GitHub accounts (Azure, Office, internal sample projects,
  documentation), but Microsoft never formally confirmed the
  scope of the compromise. The bulk dataset was withdrawn from
  sale shortly after posting; ShinyHunters subsequently leaked
  small subsets for free on RaidForums.
quantified_impact:
  data_exfiltrated_gb: 500
false_flag_risk: suspected
summary: |
  Notable as the only major-vendor source-code claim in the
  2020 ShinyHunters wave and as a marker of the brand's
  cluster-fuzziness: Microsoft's public position has been that
  the leaked content was non-sensitive and that no internal
  source code was exposed. The claim sits in the AUSPEX corpus
  with `suspected` false-flag-risk because the link from the
  ShinyHunters handle to actual demonstrated source-code access
  was never independently verified.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: ShinyHunters (self-claimed)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-05-07
    attribution_source_id: zdnet/2020-05-10_shinyhunters-73m-records
    notes: |
      Self-claim only; Microsoft did not formally confirm the
      scope. Treated as a brand-level claim rather than a
      cluster-attribution finding.
doctrine_links: []
targets:
  - target_id: orgs/microsoft
    role: primary
sources:
  - zdnet/2020-05-10_shinyhunters-73m-records
