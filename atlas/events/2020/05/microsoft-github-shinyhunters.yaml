id: 2020-05/microsoft-github-shinyhunters
name: Microsoft private-GitHub repository leak claimed by ShinyHunters
start_date: 2020-03-28
disclosure_date: 2020-05-06
end_date: null
incident_type:
  - data-theft
initial_vector: unknown  # source does not state the access method
outcome_summary: |
  In early May 2020 the criminal data-theft crew ShinyHunters
  contacted BleepingComputer claiming to have gained full access
  to Microsoft's private GitHub repositories and to have
  downloaded roughly 500GB of private projects. File stamps in
  the leaked directory listing suggested the breach may have
  occurred around March 28 2020. Having initially planned to sell
  the data, the actor instead offered a ~1GB teaser on a hacker
  forum for free (accessed via site 'credits'). BleepingComputer
  and cyber-intelligence firm Under the Breach, reviewing the
  directory listing and sample, assessed the content as mostly
  code samples, test projects, an eBook and other generic items —
  with nothing sensitive such as Windows or Office source code —
  though they noted private API keys or passwords could have been
  left in some repositories. An anonymous Microsoft employee told
  BleepingComputer the stolen data was legitimate; Microsoft's
  only formal statement was that it was "aware of these claims and
  are investigating."
quantified_impact:
  data_exfiltrated_gb: 500  # actor's claim; the shared/verified sample was ~1GB
false_flag_risk: none
summary: |
  Notable as the only major-vendor source-code claim in the 2020
  ShinyHunters wave and as a marker of the brand's
  cluster-fuzziness. The 500GB figure is the actor's own claim;
  independent review (BleepingComputer, Under the Breach) of the
  ~1GB shared sample judged the content non-sensitive and found no
  Windows or Office source code, while an anonymous Microsoft
  employee confirmed the leaked data was genuine. Microsoft itself
  said only that it was investigating and never formally confirmed
  the scope of the compromise. Kept as a named-actor self-claim
  (made directly to BleepingComputer) rather than a demonstrated
  full-scope compromise.
