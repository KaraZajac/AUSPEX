    pharmaceutical, "research organi(s)ations", academic, local
    government, all tied to "COVID-19 response" (COVID-19 16x,
    pandemic 7x). CORRECTION: outcome_summary previously claimed
    "bulk-credential-stuffing campaigns" — the advisory describes
    PASSWORD SPRAYING (a distinct technique) and names no credential
    stuffing; rewrote to password-spraying + scanning/exploitation of
    known Citrix/Pulse-Secure vulns, which the source carries. "bulk"
    in the RAW appears only in "bulk personal information ...
    intelligence that aligns with national priorities" (the goal of
    collection), not a technique.
    [b] ATTRIBUTION ✓: actor_id null is correct — RAW names NO
    perpetrator (grep for APT29/APT28/Russia/China/Iran/SVR/GRU = 0
    hits); deliberately actor-agnostic "APT groups"/"advanced
    persistent threat". No fabricated named-actor attribution present.
    Added attribution_level: activity-cluster (the advisory clusters
    the activity without naming a nation or group). attributing_org
    "US CISA + UK NCSC", confidence high, concur — all match.
    [c] DATES ✓: RAW "May 5, 2020: Initial Version" confirms
    published_on / disclosure_date / end_date = 2020-05-05.
    start_date 2020-04-01 is an explicit "period covered" estimate
    for the ongoing activity the advisory documents — acceptable.
    [d] DOCTRINE_LINKS — DOWNGRADED uk/ncs-2016/defend from attested
    to strongly_inferred: attested requires the source to state the
    strategic goal in substance, but the advisory nowhere references
