id: 2020-05/aa20-126a-apt-healthcare-joint
name: AA20-126A — joint CISA + NCSC advisory on APT targeting of healthcare and essential services
start_date: 2020-04-01  # period covered
disclosure_date: 2020-05-05
end_date: 2020-05-05
incident_type:
  - attribution-publication
initial_vector: valid-creds
outcome_summary: |
  Joint CISA + UK NCSC technical advisory documenting Advanced
  Persistent Threat (APT) group password-spraying and bulk-
  credential-stuffing campaigns against COVID-19 research
  organisations, healthcare bodies, pharmaceutical companies,
  academic institutions, and local-government entities involved
  in the pandemic response. The advisory operationally precedes
  AA20-201A (16 July 2020), which named APT29 / SVR specifically
  for the same target set.
false_flag_risk: none
summary: |
  AA20-126A is the technical-pattern predecessor to the named
  APT29 vaccine-research advisory of 16 July 2020. The May
  advisory is deliberately actor-agnostic ("APT groups") while
  the July advisory names APT29 / Cozy Bear; the sequencing
  reflects an NCSC-CISA pattern of publishing technical IOCs
  before formally attributing, allowing defenders to act on
  IOCs without the diplomatic overhead of named attribution.

  Doctrinally a UK NCS-2016 "defend" pillar event from the UK
  side. AUSPEX tags the named-actor attribution to the separate
  July 2020 AA20-201A event entry (covid-vaccine-research-
  targeting) and keeps this entry actor-null to match the
  advisory's own scoping.
