    pillar_id: uk/ncs-2016/defend
    program_id: null
    confidence: strongly_inferred
    perspective: defender-response
    reasoning: |
      Joint CISA-NCSC defensive advisory; operational expression
      of the NCS 2016 "defend" pillar's pandemic-response cadence.
      The advisory is a defensive publication (threat warning +
      mitigation guidance) by the disclosing state's cyber-defence
      body, so the link names the UK discloser's own defensive
      doctrine, not an attacker rationale (there is no attributed
      perpetrator here). Downgraded from attested because the
      advisory nowhere states a strategic doctrinal purpose or
      references NCS-2016 — the "defend" reading is inferred from
      the nature of the act, not quoted.
    attesting_source_id: cisa/2020-05-05_aa20-126a-apt-healthcare
    inference_basis:
      signals:
        - "The document is a joint NCSC/CISA technical advisory whose stated function is warning targeted organisations and providing password-policy and vulnerability-patching mitigations — a defensive act by the disclosing state's national cyber-defence body."
        - "It defends pandemic-response healthcare, pharma, research, academic and local-government targets, exactly the national-network protection the NCS-2016 defend pillar encodes."
      ruled_out: "No attacker-rationale doctrine applies: the advisory attributes to no perpetrator (deliberately actor-agnostic 'APT groups'), so this is the discloser's defensive posture, not an offensive-strategy link."
    contested: false
