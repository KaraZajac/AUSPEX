id: 2020-07/cosmic-lynx-russian-bec-disclosure
name: Agari discloses Cosmic Lynx Russian-organized BEC
start_date: 2019-07-01
disclosure_date: 2020-07-07
end_date: 2020-07-07
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Agari Cyber Intelligence Division (ACID) published the
  first significant identification of a Russian-speaking BEC
  operator — Cosmic Lynx — running approximately 200
  distinct campaigns against Fortune 500 and Global 2000
  victims from mid-2019. Average attempted-wire-fraud value
  per campaign of approximately USD 1.27M, roughly 5x the
  per-incident average of contemporaneous Nigerian-organized
  BEC. M&A-pretext lure construction; use of mid-tier
  Eastern-European mule networks.
false_flag_risk: none
summary: |
  Cosmic Lynx marked the entry of Russian-speaking operators
  into BEC, previously a West-African specialty. AUSPEX
  classifies as criminal-baseline.
