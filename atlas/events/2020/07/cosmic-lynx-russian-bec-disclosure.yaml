id: 2020-07/cosmic-lynx-russian-bec-disclosure
name: Agari discloses Cosmic Lynx Russian-organized BEC
start_date: 2019-07-01
disclosure_date: 2020-07-07
end_date: null
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Agari Cyber Intelligence Division (ACID) published the
  first significant identification of a Russian-speaking BEC
  operator — Cosmic Lynx — reporting more than 200 distinct
  BEC campaigns observed since July 2019 against professionals
  in 46 countries across six continents, with a well-defined
  victim profile of large multinationals, many of them Fortune
  500 or Global 2000 companies. Cosmic Lynx used a dual-
  impersonation, M&A-acquisition lure (spoofing the target
  company's CEO plus a purported external legal counsel). Where
  most executive-impersonation BEC requests average about
  USD 55,000, Cosmic Lynx asked for hundreds of thousands to
  millions of dollars (a USD 2.7M request in one recent scheme).
  Stolen funds were moved primarily through money-mule accounts
  in Hong Kong, with secondary accounts in Hungary, Portugal,
  and Romania; the group actively avoided US mule accounts.
false_flag_risk: none
summary: |
  Cosmic Lynx marked the entry of Russian-speaking operators
  into BEC, historically a Nigerian/West-African specialty.
  Agari assessed the group as likely composed of Russia-based
  actors from attack and infrastructure analysis (Moscow-
  timezone build stamps, ties to Russian click-fraud malware,
  a Russian carding marketplace, and Russian fake-document
  sites). AUSPEX classifies as criminal-baseline.
