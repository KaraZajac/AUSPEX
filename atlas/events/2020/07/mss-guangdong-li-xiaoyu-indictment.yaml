id: 2020-07/mss-guangdong-li-xiaoyu-indictment
name: MSS Guangdong contractor indictment (Li Xiaoyu / Dong Jiazhi)
start_date: 2009-09-01
disclosure_date: 2020-07-21
end_date: 2020-07-21
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  DOJ unseals an indictment against Li Xiaoyu and Dong Jiazhi
  — freelance hackers tasked by the MSS Guangdong State
  Security Department (GSSD) while also hacking for personal
  profit — covering an ~11-year intrusion campaign (from
  on/about 1 Sep 2009) across defense, solar-energy,
  software/high-tech and pharmaceutical victims in 11
  countries. The indictment cites recent probing of firms
  developing COVID-19 vaccines, testing technology and
  treatments (victims described by sector/location, not
  named), and MSS-tasked targeting of Chinese dissidents and
  clergy, including a Hong Kong community organizer and a
  former Tiananmen Square protester.
false_flag_risk: none
operators_named:
  - li-xiaoyu  # MSS Guangdong contractor, DOJ Jul 2020
  - dong-jiazhi  # MSS Guangdong contractor, DOJ Jul 2020
summary: |
  A granular DOJ description of the MSS contractor model:
  Li Xiaoyu and Dong Jiazhi worked freelance, tasked — and
  in one instance armed with 0-day malware — by an MSS
  Guangdong State Security Department (GSSD) officer for
  some operations while hacking for personal financial gain
  in others. The indictment cites recent probing of
  companies developing COVID-19 vaccines, testing technology
  and treatments, but describes victims by sector and
  location rather than naming specific firms (no company is
  named in the press release). Initial-access tradecraft per
  the indictment: exploitation of publicly known — often
  newly announced (n-day) — vulnerabilities in web-server
  software, web-application development suites and
  software-collaboration programs, with a China Chopper web
  shell for persistence. DOJ's naming of MSS-tasked targeting
  of Chinese dissidents and clergy — including a Hong Kong
  community organizer and a former Tiananmen Square protester,
  with the MSS supplying dissident-targeting information — is
  explicit evidence for the 2017 National Intelligence Law's
  diaspora-and-dissident collection pillar.
attributions:
  - actor_id: cn/mss/gssd-li-dong  # repointed 2026-07-01: created cn/mss/gssd-li-dong; APT40 is MSS Hainan, this is MSS Guangdong contractors
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur  # updated 2026-07-01: contested was due to the wrong-actor mis-scope, now resolved
    attribution_date: 2020-07-21
    attribution_source_id: doj/2020-07-21_mss-guangdong-li-xiaoyu-dong-jiazhi
    notes: |
      DOJ attributes the campaign to two named individuals
      (Li Xiaoyu, Dong Jiazhi) tasked by the MSS GUANGDONG
      State Security Department (GSSD) — a named-unit
      attribution to the MSS, high confidence in the MSS-GSSD
      nexus. DOJ names NO vendor APT cluster. AUSPEX's
      actor_id cn/mss/apt40 is CONTESTED and flagged for
      reassignment: APT40 is the MSS HAINAN (HSSD) cluster
      (per that actor record) — a different regional MSS
      office, so the Guangdong contractors are a poor fit; the
      dual-tasking / personal-financial-gain contractor
      pattern is closer to APT41, but DOJ named neither cluster.
      No AUSPEX actor currently models the GSSD Li/Dong
      contractor pair. The `high` confidence attaches to the
      MSS-GSSD tasking, not to the APT40 label.
