qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: partial
  notes: |
    Level=partial: the sole cited source (DOJ press release,
    govt-primary) sits behind an Akamai bot interstitial —
    curl/WebFetch of justice.gov and the /archives/ mirror
    return the JS challenge (2,564-byte interstitial) or HTTP
    403, and archive.org is blocked for this fetcher. No valid
    raw snapshot / content_sha256 could be captured; every
    claim below is corroborated against reachable mirrors that
    quote the indictment: NPR (2020-07-21), South China Morning
    Post, BleepingComputer, CyberDefenseMagazine, and the DOJ
    archive page title. Source record annotated (no hash added).
    [a] FACTS — corrections: (1) STRIPPED "naming Moderna,
    Novavax, and other identified victims" — the indictment did
    NOT name any vaccine/pharma company; multiple mirrors
    confirm victims are described by sector/location only
    (SCMP: "did not name specific pharmaceutical companies").
    (2) STRIPPED "N-day exploitation of public-facing Citrix,
    Pulse Secure, F5, and SonicWall appliances" — the press
    release names none of these; it says the defendants
    "primarily exploited publicly known software vulnerabilities
    in popular web server software, web application development
    suites, and software collaboration programs," in some cases
    "newly announced" (= n-day). The Citrix/F5/Pulse-Secure CVE
    detail belongs to the separate CISA advisory AA20-258A
    (Sept 2020), not this indictment. Kept China Chopper web
    shell (mirror-confirmed present). (3) "12+ countries" ->
    "11 countries" — DOJ enumerates 11 jurisdictions (US,
    Australia, Belgium, Germany, Japan, Lithuania, Netherlands,
    Spain, South Korea, Sweden, UK); the HK community organizer
    is a dissident target, not a 12th victim country. (4)
    "semiconductor" targeting removed — not among DOJ's named
    sectors (high-tech manufacturing, medical devices, civil/
    industrial engineering, software, solar energy,
    pharmaceuticals, defense). Kept: ~11-year campaign from
    on/about 1 Sep 2009 (verbatim in indictment), dual tasking
    (MSS + personal profit), MSS officer supplying 0-day
    malware, COVID-vaccine-research probing, dissident/clergy
    targeting incl. a HK community organizer + former Tiananmen
    protester — all mirror-confirmed.
    [b] ATTRIBUTION — DOJ names two individuals tasked by the
    MSS Guangdong SSD; NO vendor APT cluster. Set
    attribution_level=named-unit; auspex_assessment
    concur-with-caveat -> contested; notes rewritten. `high`
    confidence attaches to the MSS-GSSD nexus, not to any
    cluster label. See ACTOR FLAG.
    [c] DATES — start_date 2009-09-01 matches indictment ("from
    at least in or about September 1, 2009"); disclosure_date
    2020-07-21 = press-release date (indictment filed 2020-07-07,
    unsealed 21st); source published_on 2020-07-21 correct.
    [d] DOCTRINE — MIC2025 attested -> strongly_inferred (DOJ
    names the sectors but states no industrial-policy purpose;
    added inference_basis.signals/ruled_out). MCF attested ->
    plausible; removed the category-error reasoning that
    equated financial-vs-state "dual-tasking" with civil-military
    dual-use (added alternatives). NIL diaspora-and-dissident
    KEPT attested — DOJ explicitly states MSS-directed targeting
    of dissidents/clergy incl. a HK organizer + Tiananmen
    protester, and the MSS supplied dissident-targeting info: a
    direct statement of the collection goal the pillar encodes;
    attesting_source_id present.
    [e] ATTRIBUTION_LEVEL — added named-unit (DOJ named the MSS
    Guangdong SSD).
    [f] ACTOR_ID — cn/mss/apt40 resolves (file atlas/actors/cn/
    apt40.yaml, id cn/mss/apt40). FLAG: it is MIS-SCOPED. APT40
    is the MSS HAINAN (HSSD) maritime-espionage cluster; this
    event is MSS GUANGDONG financially-motivated contractors.
    Doctrine/target changes did not touch actor files.
