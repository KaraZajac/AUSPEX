    notes: |
      DOJ frames the defendants as MSS-Guangdong-tasked
      freelancers without naming an APT cluster. AUSPEX
      working assignment to APT40 (the MSS Hainan / Guangdong
      regional cluster) is the closest open-source consensus
      match, with caveat covering ongoing cluster-name
      ambiguity.
