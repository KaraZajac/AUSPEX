id: 2020-07/mss-guangdong-li-xiaoyu-indictment
name: MSS Guangdong contractor indictment (Li Xiaoyu / Dong Jiazhi)
start_date: 2009-09-01
disclosure_date: 2020-07-21
end_date: 2020-07-21
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  DOJ unseals an indictment against Li Xiaoyu and Dong Jiazhi
  — freelance hackers tasked by MSS Guangdong State Security
  Department — covering an 11-year intrusion campaign across
  defense, energy, semiconductor, and pharmaceutical victims
  in 12+ countries. Indictment names direct targeting of US
  COVID-19 vaccine research alongside long-running theft
  from Hong-Kong-democracy and human-rights dissident
  communications.
false_flag_risk: none
operators_named:
  - li-xiaoyu  # MSS Guangdong contractor, DOJ Jul 2020
  - dong-jiazhi  # MSS Guangdong contractor, DOJ Jul 2020
summary: |
  The most granular DOJ description to date of the MSS
  contractor model: Li Xiaoyu and Dong Jiazhi worked
  freelance, paid by MSS Guangdong SSD for some operations
  while pursuing personal financial gain for others, in
  exactly the dual-tasking pattern documented for APT41 a
  year earlier. The indictment's COVID-vaccine-research
  targeting framing — naming Moderna, Novavax, and other
  identified victims — turns the 2020 COVID-research
  collection wave into a formal attestation rather than
  vendor inference. Initial-access tradecraft per the
  indictment: N-day exploitation of public-facing Citrix,
  Pulse Secure, F5, and SonicWall appliances; web-shell
  persistence; credential dumping and lateral movement.
  Hong-Kong-dissident collection is the most explicit
  doctrine-link evidence available for the 2017 NIL's
  diaspora-and-dissident pillar.
