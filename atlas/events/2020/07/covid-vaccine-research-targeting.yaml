id: 2020-07/covid-vaccine-research-targeting
name: APT29 COVID-19 vaccine research targeting
start_date: 2020-02-01  # campaign visible from early 2020
disclosure_date: 2020-07-16
end_date: 2020-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  APT29 (SVR) campaign against COVID-19 vaccine research
  organizations in the US, UK, and Canada (including Oxford,
  AstraZeneca). WellMess and WellMail custom malware; CVE-2019-19781
  (Citrix) exploitation. Theft of vaccine research IP.
false_flag_risk: none
summary: |
  Joint Five Eyes advisory (CISA + NCSC + NSA + CSE Canada)
  published 16 July 2020. The advisory documents APT29 / Cozy
  Bear / The Dukes tradecraft: exploitation of edge-device n-days
  (Citrix ADC CVE-2019-19781, Pulse Secure CVE-2019-11510,
  Fortinet CVE-2019-13379), spear-phishing follow-on for second-
  stage access, the WellMess and WellMail custom Go-based
  backdoors with hard-coded RC6 / DES-encrypted C2, the SoreFang
  downloader exploiting the Sangfor SSL VPN client, lateral
  movement on valid credentials, and credential dumping from
  victim research environments. The campaign produced significant
  political embarrassment for Russia and coincided with the
  Russian government's domestic Sputnik V vaccine narrative.
attributions:
  - actor_id: ru/svr/apt29
    attributing_org: UK NCSC / US CISA / US NSA / Canada CSE
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-07-16
    attribution_source_id: cisa/2020-07-16_aa20-201a-covid-vaccine-targeting
doctrine_links:
  - doctrine_id: ru/info-security-2016
    pillar_id: ru/info-security-2016/information-sphere-as-domain
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Pandemic-era SVR strategic collection in pursuit of vaccine
      IP — aligns with the 2016 Information Security Doctrine's
      framing of the information sphere as a national-security
      domain. Joint advisory does not explicitly name doctrinal
      intent; inferred from target selection and timing.
    attesting_source_id: null
    counter_explanation: |
      Could be framed as competitive scientific intelligence
      rather than information-confrontation per se; AUSPEX
      preserves both readings under strongly_inferred.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/oxford-astrazeneca-vaccine
    role: primary
  - target_id: sectors/healthcare/research
    country: uk-us-canada
    role: primary
sources:
