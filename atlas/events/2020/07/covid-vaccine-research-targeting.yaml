id: 2020-07/covid-vaccine-research-targeting
name: APT29 COVID-19 vaccine research targeting
start_date: 2020-02-01  # campaign visible from early 2020
disclosure_date: 2020-07-16
end_date: null  # advisory (Jul 2020) states activity "likely to continue"; no bounded end
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  APT29 campaign against organisations involved in COVID-19 vaccine
  development in the US, UK, and Canada. WellMess and WellMail custom
  malware; public-exploit initial access (incl. CVE-2019-19781,
  Citrix). The advisory assesses the activity was conducted "highly
  likely with the intention of stealing information and intellectual
  property relating to the development and testing of COVID-19
  vaccines" (intent stated; confirmed exfiltration not detailed).
false_flag_risk: none
summary: |
  Joint advisory published 16 July 2020 by the UK NCSC and Canada's
  CSE (assessment), with the US NSA agreeing to the attribution and
  DHS CISA endorsing the technical detail (CISA mirror AA20-201A).
  The advisory documents APT29 / Cozy Bear / The Dukes tradecraft:
  use of publicly available exploits against edge devices as initial
  access (examples given: Citrix CVE-2019-19781, Pulse Secure
  CVE-2019-11510, FortiGate CVE-2018-13379, Zimbra CVE-2019-9670),
  spear-phishing to harvest credentials to internet-facing login
  pages, and the acquisition/retention of legitimate credentials for
  persistent access. It details the WellMess (Golang or .NET) and
  WellMail (ELF/Golang) custom backdoors, which run shell
  commands/scripts and communicate over HTTP/TLS/DNS using hard-coded
  TLS certificates (SKI 0102030406); the published WellMess YARA IOCs
  reference RC6 and AES cipher routines. It also names SoreFang, a
  first-stage HTTP downloader assessed as likely targeting SangFor
  SSL VPN devices. APT29 is assessed as "almost certainly part of the
  Russian intelligence services"; the advisory does not name a
  specific service (e.g. SVR).
attributions:
  - actor_id: ru/svr/apt29
    attributing_org: UK NCSC / Canada CSE (assessment); US NSA (concurs); US DHS CISA (endorses technical detail)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-07-16
    attribution_source_id: cisa/2020-07-16_aa20-201a-covid-vaccine-targeting
    notes: "Advisory assesses APT29 (the Dukes / Cozy Bear) 'almost certainly part of the Russian intelligence services' (ICD 'almost certainly' = high). named-actor NOT named-unit: it names the group + nation (Russia) but does NOT name a specific service; the ru/svr/apt29 SVR placement is the AUSPEX/consensus actor attribution, not stated in this source."
doctrine_links:
  - doctrine_id: ru/info-security-2016
    pillar_id: ru/info-security-2016/information-sphere-as-domain
    program_id: null
    confidence: plausible
    reasoning: |
      Pandemic-era Russian intelligence collection in pursuit of
      COVID-19 vaccine research/IP, loosely read against the 2016
      Information Security Doctrine's framing of the information
      sphere as a national-security domain. The advisory states a
      proximate purpose (steal vaccine information and IP) but does
      not name doctrinal intent, and the information-sphere-as-domain
      pillar is oriented at information-confrontation (media, NGOs,
      civil society), a weak fit for scientific-technical espionage —
      so more than one strategic reading survives. Kept plausible;
      flagged for possible doctrine re-scoping or removal.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Information Security Doctrine (2016), information-sphere-as-domain: pandemic-era strategic collection read as Russian activity in the information sphere as a contested national-security domain."
        - "Ordinary scientific-technical / competitive intelligence espionage: the advisory frames the goal as stealing vaccine information and IP, which reads as classic S&T collection not tied to the info-confrontation pillar."
    counter_explanation: |
      Could be framed as competitive scientific-technical intelligence
      rather than information-confrontation per se; AUSPEX preserves
      both readings under plausible.
    contested: false
    analyst: claude
