qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs the joint NCSC/CSE advisory "APT29 targets COVID-19
    vaccine development" (CISA mirror AA20-201A). Two artefacts
    captured: NCSC news landing page (HTML, sha256
    29780e60…01213389, 137533 B — the source url) and the full
    technical advisory PDF it links (sha256 82a8d7ee…3430fe5f,
    414373 B), which carries the CVEs/SoreFang/YARA. Both quotes
    below verbatim from these.
    [a] FACTS: WellMess ("written in either Golang or .NET") and
    WellMail ("ELF utility written in Golang") custom backdoors ✓;
    HTTP/TLS/DNS comms + hard-coded TLS certs (SKI '0102030406') ✓;
    SoreFang first-stage HTTP downloader, "likely … targets SangFor
    devices" ✓; spear-phishing "to obtain authentication credentials
    to internet-accessible login pages" ✓; public-exploit initial
    access ✓. CORRECTIONS: (1) Fortinet CVE fixed 2019-13379 →
    CVE-2018-13379 (advisory line: "CVE-2018-13379 FortiGate"; the
    2019 form was a typo — that CVE does not exist). (2) "DES-
    encrypted C2" struck — DES appears nowhere as a cipher; the
    WellMess YARA IOCs reference rc6cipher and AES_Encrypt (RC6/AES),
    so summary now says RC6/AES. (3) "Oxford, AstraZeneca" struck
    from outcome_summary AND the target orgs/oxford-astrazeneca-
    vaccine removed — the advisory names NO victim orgs ("various
    organisations involved in COVID-19 vaccine development in Canada,
    the United States and the United Kingdom"); Oxford/AZ came from
    press reporting, not this cited source, and the target FK was
    dangling (no registry file). (4) "Theft of vaccine research IP"
    softened to stated INTENT — advisory: "highly likely with the
    intention of stealing information and intellectual property
    relating to the development and testing of COVID-19 vaccines"
    (intent, not confirmed exfiltration). (5) Unsourced "political
    embarrassment for Russia / Sputnik V narrative" sentence struck
    (no cited source). (6) "credential dumping / lateral movement"
    softened to legitimate-credential acquisition/retention, which is
    what the Persistent-access section actually states.
    [b] ATTRIBUTION: exact wording "APT29 … is a cyber espionage
    group, almost certainly part of the Russian intelligence
    services. The … NSA agrees with this attribution … DHS CISA
    endorses the technical detail". So attributing_org rewritten to
    reflect NCSC/CSE = assessing bodies, NSA = concurs, CISA =
    endorses technical detail (NOT four co-equal attributors).
    Confidence high ("almost certainly"). auspex concur.
    [c] DATES: source published_on 2020-07-16 ✓ = disclosure_date ✓.
    end_date 2020-12-31 → null — advisory says "APT29 is likely to
    continue to target organisations involved in COVID-19 vaccine
    research and development"; no bounded end. start_date 2020-02-01
    left as a best-estimate ("Throughout 2020" per advisory; no
    precise start given).
    [d] DOCTRINE: link ru/info-security-2016/information-sphere-as-
    domain DOWNGRADED strongly_inferred → plausible. The advisory
    states only a proximate goal (steal vaccine info/IP), not
    doctrinal intent; the info-sphere-as-domain pillar is oriented at
    information-confrontation (media/NGO/civil-society, kinetic-
    equivalent response to foreign info-ops), a weak fit for S&T
    espionage, so a serious competing reading (ordinary competitive
    scientific-technical intelligence) survives → plausible, with
    inference_basis.alternatives added. attesting_source_id stays
    null (not attested).
    [e] ATTRIBUTION_LEVEL: set named-actor (group APT29 + nation
    Russia named; specific service NOT named — advisory says only
    "Russian intelligence services").
    [f] ACTOR_ID: ru/svr/apt29 resolves → atlas/actors/ru/apt29.yaml
    (id ru/svr/apt29). Note: SVR service placement is the AUSPEX/
    consensus actor attribution and is standard, but is NOT stated in
    THIS source (which says only "Russian intelligence services").
    Source tier primary retained. Snapshot discipline: HTML + PDF
    hashed above.
