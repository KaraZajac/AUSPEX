  notes: |
    Audited against the sole cited source, DOJ press release "Seven
    International Cyber Defendants, Including 'APT41' Actors, Charged..."
    (doj/2020-09-16_apt41-indictment). Raw snapshot on disk
    (doj__2020-09-16_apt41-indictment.html) is the archive.org capture —
    live justice.gov serves a JS rate-limit interstitial to curl and 403s
    WebFetch. sha256 RE-VERIFIED 4a8fdfa0…f038f9d27 (first8…last8), 100,880
    bytes; matches the source record. Source is a genuine govt-primary
    article (NOT a phantom).

    [a] FACTS — MAJOR CORRECTION. The prior summary carried a large block
    of tradecraft that this single cited source does NOT support and that I
    stripped: ShadowPad, PlugX, DLL side-loading, Crosswalk, POISONPLUG,
    SOGU, Cobalt Strike, Mimikatz, "spear-phishing against telecom/
    semiconductor/biotech/software", and "bulk SMS metadata collection from
    Taiwanese and Indian telecom … feeding the MSS tasking pool". None of
    those strings appear in the DOJ release (grep-verified: SMS/metadata/
    Mimikatz/Cobalt/ShadowPad/spear/semiconductor/biotech all absent). It
    also named "CCleaner, NetSarang, ShadowHammer" supply-chain ops — the
    DOJ says only generic "supply chain attacks" and names none of these;
    moreover AUSPEX's own actor audit (2026-06-28) removed CCleaner from
    APT41 (it is APT17/BLACKCOFFEE). Rewrote summary to only DOJ-carried
    facts: 7 defendants (5 Chinese nationals of Chengdu 404 Network
    Technology — Zhang Haoran + Tan Dailin charged Aug 2019; Jiang Lizhi,
    Qian Chuan, Fu Qiang charged Aug 2020; 2 Malaysians Wong Ong Hua + Ling
    Yang Ching / Sea Gamer Mall); 100+ victims; researcher labels APT41/
    Barium/Winnti/Wicked Panda/Wicked Spider; tradecraft = supply-chain
    attacks + C2 "dead drops" + publicly available exploits/CVEs
    (CVE-2019-19781,-11510,-16920,-16278,-1652/-1653,CVE-2020-10189); theft
    of source code, code-signing certs, customer data, business info;
    ransomware + crypto-jacking; video-game targeting. outcome_summary:
    removed unsupported "Taiwanese telecom" (Taiwan is only 1 of 15 victim
    countries listed, no sector named) and the "state-tasked espionage
    side" framing; DOJ-supported facts substituted (govt networks in India
    and Vietnam compromised; UK targeted-not-compromised — verbatim). Verbatim
    anchor: "compromised foreign government computer networks in India and
    Vietnam, and targeted, but did not compromise, government computer
    networks in the United Kingdom." initial_vector phishing → supply-chain
    (DOJ's lead technique example; no phishing mentioned); added supply-chain
    to incident_type.

    [b] ATTRIBUTION — actor cn/mss/apt41 resolves (atlas/actors/cn/apt41.yaml).
    Added attribution_level: named-actor (DOJ names individuals + Chengdu 404
    + the APT41 cluster; it does NOT attribute APT41 to a service, so NOT
