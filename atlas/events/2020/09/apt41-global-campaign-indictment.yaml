    [c] DATES — source published_on 2020-09-16 ✓ (verbatim "Wednesday,
    September 16, 2020"). disclosure_date/end_date 2020-09-16 ✓.
    RESIDUAL: start_date 2014-01-01 is a best-estimate NOT carried by this
