    reasoning: |
      The DOJ says the intrusions stole source code, code-signing
      certificates, and business information, and the Deputy AG
      states China tolerates cybercriminals "so long as they attack
      computers outside China and steal intellectual property helpful
      to China" — a general statement that the IP theft benefits the
      Chinese state, consistent with the industrial-technology
      acquisition MIC2025 encodes. Only plausible: DOJ names no
      Made-in-China-2025 / industrial-modernization purpose (and no
      semiconductor or biotech targeting), and the same indictments
      emphasize substantial for-profit crime (ransomware,
      crypto-jacking, video-game currency fraud) and political
      targeting (Hong Kong pro-democracy activists), so more than one
      strategic reading survives.
    attesting_source_id: null
