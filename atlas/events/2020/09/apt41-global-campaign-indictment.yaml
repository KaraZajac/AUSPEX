summary: |
  On September 16, 2020 the U.S. Department of Justice unsealed
  charges against seven defendants in connection with intrusion
  campaigns tracked by researchers as APT41 (also Barium, Winnti,
  Wicked Panda, Wicked Spider). Five Chinese nationals — Zhang
  Haoran and Tan Dailin (charged August 2019) and Jiang Lizhi,
  Qian Chuan, and Fu Qiang (charged August 2020) — allegedly ran
  the affairs of Chengdu 404 Network Technology, a PRC company,
  through computer intrusions affecting over 100 victim companies,
  organizations, and individuals worldwide (software developers,
  hardware manufacturers, telecom providers, social-media and
  video-game companies, universities, think tanks, non-profits,
  foreign governments, and Hong Kong pro-democracy politicians and
  activists). A third August 2020 indictment charged two Malaysian
  nationals, Wong Ong Hua and Ling Yang Ching (Sea Gamer Mall), who
  conspired with the hackers to profit from intrusions targeting
  the video-game industry. DOJ characterized the tradecraft as
  supply-chain attacks (compromising software providers and
  modifying their code to reach downstream customers), C2 "dead
  drop" web pages carrying encoded instructions to their malware,
  and use of publicly available exploits/CVEs (CVE-2019-19781,
  -11510, -16920, -16278, -1652/-1653, and CVE-2020-10189). The
  intrusions facilitated theft of source code, code-signing
  certificates, customer-account data, and business information,
  and enabled ransomware and crypto-jacking (cryptocurrency-mining)
  schemes. The release's subtitle notes one of the five fugitive
  defendants "allegedly boasted of connections to the Chinese
  Ministry of State Security" — framed by DOJ as the defendant's
  own boast, not an independent DOJ assertion of MSS tasking. The
  FBI concurrently issued a FLASH report and seized accounts,
  servers, and domains used for C2.
