initial_vector: supply-chain
outcome_summary: |
  DOJ unsealing spanning 100+ victim companies, organizations, and
  individuals worldwide — software developers, hardware
  manufacturers, telecom providers, social-media and video-game
  firms, universities, think tanks, non-profits, foreign
  governments, and Hong Kong pro-democracy activists. The
  defendants compromised government networks in India and Vietnam
  and targeted (without compromising) UK government networks.
  Companion to the August 2019 indictment of Zhang Haoran and Tan
  Dailin; the charges mix state-relevant IP theft ("intellectual
  property helpful to China", per the Deputy AG) with for-profit
  crime (ransomware, crypto-jacking, video-game currency fraud).
false_flag_risk: none
