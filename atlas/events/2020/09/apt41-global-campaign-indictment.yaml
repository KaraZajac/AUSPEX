initial_vector: phishing
outcome_summary: |
  DOJ unsealing covering 100+ victims worldwide — Taiwanese
  telecom, Indian government, SE Asian governments, US technology
  firms. The state-tasked espionage side of APT41's portfolio.
false_flag_risk: none
campaign_id: apt41-double-dragon-indictment-chain
operators_named:
  - jiang-lizhi  # APT41 / Chengdu 404, DOJ Sep 2020
  - qian-chuan  # APT41 / Chengdu 404, DOJ Sep 2020
  - fu-qiang  # APT41 / Chengdu 404, DOJ Sep 2020
  - zhang-haoran  # APT41, DOJ Aug 2019
  - tan-dailin  # APT41, DOJ Aug 2019
summary: |
  Companion to the August 2019 indictment of Zhang Haoran and Tan
  Dailin. Charges seven defendants including Jiang Lizhi, Qian
  Chuan, Fu Qiang plus two Malaysian co-conspirators. The
  indictment catalogues APT41's MSS Chengdu-area tooling: the
  ShadowPad and PlugX modular backdoors delivered via DLL side-
  loading, the Crosswalk, POISONPLUG, and SOGU implants, Cobalt
  Strike beacons for C2, supply-chain compromises (the linked
  CCleaner, NetSarang, and ShadowHammer operations), and spear-
  phishing against telecom, semiconductor, biotech, and software
  victims. Lateral movement leveraged valid credentials and
  Mimikatz-style credential dumping, with bulk SMS metadata
  collection from compromised Taiwanese and Indian telecom
  operators feeding both economic-IP collection and signals-
  intelligence value to the MSS tasking pool.
