        - "For-profit cybercrime: DOJ stresses ransomware, crypto-jacking, and video-game virtual-currency fraud, and the Deputy AG frames China as a 'safe harbor' for cybercriminals rather than asserting industrial-policy tasking."
        - "Political / internal-security espionage: targeting of Hong Kong pro-democracy politicians and activists points to repression-oriented motives distinct from industrial modernization."
