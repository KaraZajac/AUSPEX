id: 2020-09/apt39-rana-mois-sanctions
name: US OFAC + FBI action — APT39 / Rana designated a MOIS front; 45 individuals sanctioned
start_date: 2020-09-17  # the counter-action; underlying APT39 campaign onset (~2014) lives on the ir/mois/apt39 actor record, not the cited sources
disclosure_date: 2020-09-17
end_date: 2020-09-17
incident_type:
  - law-enforcement  # coordinated US criminal-justice / FBI action (FBI FLASH + concurrent DOJ indictments)
  - policy           # OFAC E.O. 13553 sanctions designation (cost-imposition)
initial_vector: unknown  # meta counter-action (OFAC designation + FBI disclosure) — no initial-access vector applies to the US action
outcome_summary: |
  US counter-action, not a cyber operation. OFAC (press release
  sm1127) designated 45 individuals and one front company — Rana
  Intelligence Computing Company (Rana) — under E.O. 13553,
  formally attributing the APT39 / Chafer intrusion set to the
  Iranian Ministry of Intelligence and Security (MOIS): "APT39 is
  being designated pursuant to E.O. 13553 for being owned or
  controlled by the MOIS." Concurrently the FBI released an FBI
  FLASH detailing "eight separate and distinct sets of malware
  used by MOIS through Rana." The same-week DOJ "coordinated
  actions" press release bundled three SEPARATE, unrelated Iranian
  indictments (D. Mass. website defacements — Mohammadzadeh /
  Abusrour; D.N.J. data theft — Heidarian / Farhadi; E.D. Va. IRGC
  aerospace/satellite espionage — Arabi / Espargham / Bayati);
  none of those defendants is an APT39 / Rana operator.
false_flag_risk: none
summary: |
  Foundational US-government public-attribution and cost-imposition
  action against Iran's MOIS dissident-surveillance cyber
  apparatus. On September 17, 2020 the Treasury's Office of Foreign
  Assets Control (OFAC), press release sm1127, sanctioned 45
  individuals and the Rana Intelligence Computing Company under
  E.O. 13553 (serious human-rights abuses), naming the MOIS as the
  parent service: OFAC states Rana "advances Iranian national
  security objectives and the strategic goals of Iran's Ministry of
  Intelligence and Security (MOIS) by conducting computer
  intrusions and malware campaigns against perceived adversaries,
  including foreign governments and other individuals the MOIS
  considers a threat." The companion FBI FLASH (ME-000134-MW)
  identifies Rana as "a Ministry of Intelligence and Security
  (MOIS) front company in Tehran" publicly known as APT39, Chafer,
  Cadelspy, Remexi, and ITG07, and details eight separate malware
  sets: VBS scripts embedded in Microsoft Office documents and
  delivered by spear phishing (with scheduled-task / PowerShell
  persistence), functionally-similar AutoIt malware, and an Android
  implant (optimizer.apk) with root access and microphone/camera
  capture. Inside Iran, Rana "used malicious intrusion tools to
  target and monitor Iranian citizens and dissidents on behalf of
  the MOIS," including journalists, former government employees,
  environmentalists, refugees, university students and faculty, and
  NGO staff. Externally the campaign was "global in scale,"
  reaching "hundreds of individuals and entities from more than 30
  different countries," compromising "approximately 15 U.S.
  companies primarily in the travel sector" plus "global airlines
  and foreign intelligence services," and using that access "to
  track the movements of individuals whom the MOIS considers a
  threat" across the travel, hospitality, academic, and
  telecommunications industries. (Subject actors: ir/mois/apt39 and
  ir/mois/rana-intelligence-computing, both status: sanctioned on
  this designation.)
