id: 2020-09/apt39-rana-mois-sanctions
name: Treasury / DOJ coordinated action — APT39 / Rana sanctioned; MOIS attribution
start_date: 2014-01-01  # underlying APT39 activity onset
disclosure_date: 2020-09-17
end_date: 2020-09-17
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  OFAC designation of 45 individuals plus the Rana Intelligence
  Computing Company entity. DOJ unsealed multiple indictments
  the same week including Heidarian / Farhadi. FBI released
  eight previously-undisclosed Rana malware sets. Formal
  attestation of APT39 to MOIS.
false_flag_risk: none
operators_named:
  - heidarian-behzad-mohammadzadeh  # APT39 / Rana, DOJ Sep 2020 (per FBI release)
  - farhadi-hooman  # APT39 / Rana, DOJ Sep 2020 (per FBI release)
summary: |
  Foundational US-government public-attribution event for Iranian
  dissident-surveillance cyber. Treasury press release named MOIS
  as the parent service. The FBI's accompanying public release
  disclosed eight previously-undocumented Rana malware sets
  including the Android implant suite (used against Iranian
  diaspora and dissident targets over Telegram-style chat lures),
  PowerShell-based persistence agents, and PII-collection tooling
  abused against airline, telecom, and tourism victims across
  30+ countries. APT39 / Chafer / Remix Kitten tradecraft includes
  spear-phishing with malicious documents, web-shell deployment
  onto Outlook Web Access / OWA servers, Mimikatz credential
  dumping, lateral movement via valid credentials, and the
  POWBAT, NotKappa, BONDUPDATER, and Remexi backdoors from the
  broader MOIS toolset.
