  notes: |
    6-point audit (claude-opus-4.8/max) of the OFAC sm1127 + FBI
    FLASH ME-000134-MW + DOJ "coordinated actions" APT39/Rana
    action against the RAW cited sources. Snapshots:
    treasury__2020-09-17_apt39-rana-mois.html
    (sha256 0456c09b…adf7986c, 883,237 B — hash RE-VERIFIED
    unchanged) and fbi__2020-09-17_rana-malware.pdf
    (sha256 6ef70361…e1893825, 1,226,737 B, 26 pp — RE-VERIFIED,
    read via pdftotext), both PRESERVE-tier, pre-captured from
    source. DOJ live URL (justice.gov) is Akamai bot-walled
    (interstitial challenge) → snapshotted the archive.org
    rendition doj__2020-09_iran-coordinated-actions.html
    (sha256 f98291cc…7253eea2, 105,143 B; = the source's
    archive_url); its content verified (correct Iran title +
    body). All load-bearing claims are carried by the two
    from-source primaries (Treasury + FBI) → level full. Reframed
    as a US counter-action per the counter-action convention
    (cf. sibling 2025-01/treasury-salt-typhoon-sanctions).

    [a] FACTS — verified verbatim and STRIPPED fabrications.
    CARRIED: "45 individuals and one front company" (OFAC/DOJ;
    Treasury "hold these 45 individuals accountable"); Rana
    designated under "E.O. 13553" (Treasury); "APT39 is being
    designated pursuant to E.O. 13553 for being owned or
    controlled by the MOIS"; FBI "Rana Intelligence Computing
    Company … is a Ministry of Intelligence and Security (MOIS)
    front company in Tehran, Iran … known in the public domain as
    Advanced Persistent Threat (APT) 39, Chafer, Cadelspy, Remexi,
    and ITG07"; "eight separate and distinct sets of malware used
    by MOIS through Rana" (Treasury); FBI "Within Iran, Rana has
    used malicious intrusion tools to target and monitor Iranian
    citizens and dissidents on behalf of the MOIS"; dissidents /
    journalists / former govt employees / environmentalists /
    refugees / students / NGO staff (Treasury+FBI); "more than 30
    different countries across Asia, Africa, Europe, and North
    America" (Treasury+FBI — so the "30+ countries" claim STANDS);
    "approximately 15 U.S. companies primarily in the travel
    sector," "global airlines and foreign intelligence services,"
    "track the movements of individuals whom the MOIS considers a
    threat," "travel, hospitality, academic, and telecommunications
    industries"; the eight sets = VBS-in-Office-docs via spear
    phishing (scheduled-task UpdatMachine + PowerShell tm.ps1
    persistence), AutoIt malware, Android optimizer.apk implant
    (root + mic/camera) — all named/described in the FBI FLASH.
    STRIPPED as carried by NO cited source (0 occurrences in both
    Treasury and FBI raw): "Telegram-style chat lures"
    (Telegram=0); "web-shell deployment onto Outlook Web Access /
    OWA servers" (OWA/Outlook Web/web shell=0); "Mimikatz
    credential dumping" (Mimikatz=0); the "POWBAT, NotKappa,
    BONDUPDATER, and Remexi backdoors" clause (POWBAT/NotKappa/
    BONDUPDATER=0 — these are OilRig/APT34 families, not APT39;
    Remexi appears only as an APT39 *alias*, not a backdoor
    deployed here); "lateral movement via valid credentials" (only
    in the FBI's generic mitigation advice, not APT39 tradecraft);
    "Remix Kitten" (a real CrowdStrike alias but absent from the
    three cited sources). Rewrote name/outcome_summary/summary to
    OFAC/FBI wording. incident_type intrusion/data-theft/
    influence-operation → [law-enforcement, policy] (the US action,
    not APT39's underlying activity). initial_vector phishing →
    unknown (meta counter-action). start_date 2014-01-01 (unsourced
    here; lives on the actor record) → 2020-09-17 = disclosure =
    end (single-day action).

    operators_named REMOVED. The two entries
    (heidarian-behzad-mohammadzadeh, farhadi-hooman) were both
    misattributed AND internally scrambled: the DOJ press release
    bundles FOUR distinct actions — the OFAC+FBI APT39/Rana
    designation (this event's subject; NO individual DOJ defendants
    tied to it) plus three unrelated indictments: D. Mass. Behzad
    Mohammadzadeh + Marwan Abusrour (website defacements,
    post-Soleimani, 1,400+), D.N.J. Hooman Heidarian + Mehdi
    Farhadi (aka "Sejeal," data theft), and E.D. Va. Said
    Pourkarim Arabi + Mohammad Reza Espargham + Mohammad Bayati
    (IRGC aerospace/satellite espionage). The removed ids fused
    Heidarian (NJ) with Mohammadzadeh (MA) and Farhadi with Hooman
    — people from different cases — and falsely labeled them
    "APT39 / Rana … per FBI release" (they appear in neither the
    OFAC designation nor the FBI Rana FLASH). Ids referenced
    nowhere else in the atlas.

    [b] ATTRIBUTION — collapsed two actor-pointing entries to one
    actor_id: null counter-action entry; subjects (ir/mois/apt39,
    ir/mois/rana-intelligence-computing) named in prose+notes. high
    + concur retained (formal OFAC designation + corroborating FBI
    FLASH, both first-party, same date). ADDED attribution_level =
    named-unit: both sources name the parent service (MOIS), not
    merely "Iranian."

    [c] DATES — all three sources published_on 2020-09-17,
    confirmed against the raw (OFAC sm1127 9/17; FBI FLASH "17 SEP
    2020"; DOJ press release 9/17 describing OFAC's 9/17 action).
    Event collapsed to the single-day counter-action 2020-09-17
    (start=disclosure=end); the unsourced 2014 onset removed from
    the date field (it is the subject actor's active_since, carried
    on ir/mois/apt39, and not stated in the cited sources, which
    say only "years-long"/"long-term").

    [d] DOCTRINE — link 1 ir/constitutional-irgc-role/
    regime-preservation KEPT at attested but hardened: added
    perspective attacker-rationale (Iranian conducting party's
    rationale) + inference_basis.source_quote (Treasury goal-level
    "target and monitor Iranian citizens, particularly dissidents,
    Iranian journalists …") — attested on strategic-purpose
    corroboration per the 2026-06-19 reframe, not on slug-naming.
    link 2 RE-HOMED ir/forward-defense → ir/cyber-deniable-
    retaliation/diaspora-targeting at strongly_inferred +
    perspective attacker-rationale + inference_basis {signals,
    ruled_out}: forward-defense (proxy projection vs Israeli/US
    critical infrastructure) is a poor fit for dissident/diaspora
    surveillance; the diaspora-targeting pillar (which the actor
    record already default-aligns) captures the transnational-
    repression purpose (30+ countries, movement-tracking of
    perceived threats). Not upgraded to attested — the parent
    doctrine's persona-laundering framing imperfectly fits a
    contractor front. Both pillar FKs resolve.

    [e] ATTRIBUTION_LEVEL — named-unit (MOIS named as parent
    service by both OFAC and FBI). See [b].

    [f] ACTOR — actor_id null (counter-action; acting bodies US
    Treasury OFAC + FBI). Subjects RESOLVE: atlas/actors/ir/
    apt39.yaml (id ir/mois/apt39, primary_service_id ir/mois,
    status sanctioned) and atlas/actors/ir/rana-intelligence-
    computing.yaml (id ir/mois/rana-intelligence-computing, status
