id: 2020-09/trickbot-disruption
name: Trickbot disruption (pre-2020-election)
start_date: 2020-09-01  # ramp-up
disclosure_date: 2020-10-09  # WaPo Nakashima
end_date: 2020-10-31
incident_type:
  - disruption
initial_vector: n/a  # config injection against bot infrastructure
outcome_summary: |
  Temporary disruption of the Trickbot botnet (~1M infected hosts).
  Russian-speaking criminal operators rebuilt the network within
  weeks; election-period ransomware threat reduced during the window
  of interest. Joint operation: USCYBERCOM under one authority,
  Microsoft DCU under a separate court order against C2
  infrastructure.
false_flag_risk: none
summary: |
  Joint USCYBERCOM + Microsoft Digital Crimes Unit operation. CYBERCOM
  side: config injection of malformed records to break bot-master
  communication. Microsoft side: court-ordered takedown of C2
  infrastructure. Coordinated pre-2020-election to reduce
  ransomware-driven election-disruption risk. Ellen Nakashima reported
  the CYBERCOM half October 9, 2020 — the first publicly attributed
  CYBERCOM operation against a *criminal* (not state) actor.
attributions:
  - actor_id: us/cybercom/cnmf-actor
    attributing_org: USCYBERCOM (via WaPo Nakashima) + DoD background confirmations
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-10-09
    attribution_source_id: wapo/2020-10-09_nakashima-trickbot
    notes: |
      Officially acknowledged on background. The Microsoft DCU side
      operated under a separate civil court order and is not a
      CYBERCOM attribution.
