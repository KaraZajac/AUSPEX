id: 2020-09/trickbot-disruption
name: TrickBot disruption — Cyber Command + Microsoft (pre-2020 election)
start_date: 2020-09-22  # first observed C2 disruption (WaPo: researchers noticed Sept 22); was unsourced 2020-09-01 "ramp-up"
disclosure_date: 2020-10-09  # WaPo Nakashima first attributed the Cyber Command half
end_date: 2020-10-12  # Microsoft's public court-ordered takedown (last sourced action, CyberScoop); was unsourced 2020-10-31
incident_type:
  - law-enforcement  # Microsoft DCU court-ordered civil takedown of C2 (E.D. Va. order)
  - disruption       # CYBERCOM offensive disruption of the botnet
initial_vector: unknown  # CYBERCOM: C2 "updates" that severed bot-to-server comms (WaPo); Microsoft: E.D. Va. court order disabling C2 IPs
outcome_summary: |
  Temporary disruption of the TrickBot botnet — described as an army of
  at least ~1 million hijacked computers run by Russian-speaking
  criminals (over one million devices infected since 2016, per
  Microsoft). Two distinct efforts: U.S. Cyber Command's offensive
  disruption of TrickBot's command-and-control, and Microsoft's
  court-ordered civil takedown of C2 infrastructure. The operators
  showed signs of restoring operations within days; the action aimed to
  reduce the pre-election ransomware threat during the window of
  interest.
false_flag_risk: none
summary: |
  Two distinct, roughly simultaneous efforts against the TrickBot
  botnet ahead of the November 2020 U.S. election. CYBERCOM side
  (reported via anonymous U.S. officials; the command declined to
  comment): threat researchers observed disruptions of TrickBot C2
  servers on Sept 22 and Oct 1, 2020 in which someone "sent out updates
  to all infected computers … that effectively severed the
  communication between the victimized computers and the servers."
  Microsoft side (on-record via Tom Burt): a takedown of TrickBot C2
  infrastructure under a U.S. District Court for the Eastern District of
  Virginia order, coordinated with ESET, FS-ISAC, NTT, Lumen's Black
  Lotus Labs and Symantec. Ellen Nakashima (Washington Post, Oct 9,
  2020) first attributed the Cyber Command half; Nakasone framed the
  effort as "persistent engagement." Brian Krebs had first reported the
  disruption's existence; Cyber Command's role was previously
  unreported.
attributions:
  - actor_id: null  # was us/cybercom/cnmf-actor — counter-action (US state action disrupting a criminal botnet); the acting entities (CYBERCOM CNMF + Microsoft DCU) belong in attributing_org, not actor_id. Subject = the TrickBot/Conti ecosystem (ru/proxies/conti), named in prose + as target orgs/trickbot-botnet
    attributing_org: USCYBERCOM (CNMF, via WaPo Nakashima — anonymous officials) + Microsoft Digital Crimes Unit (on-record, E.D. Va. court order)
    attributing_org_confidence: high
    attribution_level: named-actor  # TrickBot named as the disrupted entity ("Russian-speaking criminals"); no state/service attributed (counter-action, actor nulled)
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-10-09
    attribution_source_id: wapo/2020-10-09_nakashima-trickbot
    notes: |
      Dual-track counter-action. Microsoft's civil takedown is on-record
      (Tom Burt) under a U.S. District Court (E.D. Va.) order. The Cyber
      Command half rests on anonymous U.S. officials (four per WaPo, one
      per CyberScoop); CYBERCOM itself declined to comment / did not
      confirm on-record — hence concur-with-caveat (press-attributed, not
      officially acknowledged, unlike the sibling 2018 IRA disruption
      which Nakasone later confirmed in testimony). Subject of the
      counter-action is the Russian-speaking TrickBot operators = AUSPEX
      actor ru/proxies/conti (the Conti / TrickBot / Wizard Spider
      ecosystem; "TrickBot" is a documented alias of that actor). No
      separate ru/proxies/trickbot or criminal/trickbot actor exists.
