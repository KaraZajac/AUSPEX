  notes: |
    Full 6-point audit vs RAW, both cited sources snapshotted this pass.
    STEP 0 triage: NOT a phantom — CyberScoop resolves HTTP 200 at the
    cited permalink with the full article; WaPo's live URL bot-walls but
    the article was recovered + snapshotted via the Wayback Machine.
    Sources: wapo/2020-10-09_nakashima-trickbot (Wayback capture
    20240726003619 → wapo__2020-10-09_nakashima-trickbot.html, sha256
    cda2d875…0468f611, 466,621 B) and cyberscoop/2020-10-12_trickbot
    (live → cyberscoop__2020-10-12_trickbot.html, sha256 b1aa7aed…e88d2dba,
    113,681 B). Both carry every load-bearing claim → level full.

    [a] FACTS — corrected to the raw.
    KEPT/CARRIED: dual operation — CyberScoop headline "Cyber Command,
    Microsoft take action against TrickBot botnet before Election Day",
    "The two operations represented distinct efforts"; CYBERCOM half via
    "one U.S. government official who spoke… on the condition of
    anonymity" (WaPo: "four U.S. officials"); Microsoft half on-record —
    "The takedown took place after the U.S. District Court for the Eastern
    District of Virginia granted Microsoft's request for a court order…
    including disabling those IP addresses", coordinated with "ESET… the
    Financial Services Information Sharing and Analysis Center, NTT,
    Lumen's Black Lotus Labs, and Symantec". SCALE verified: WaPo "an army
    of at least 1 million hijacked computers run by Russian-speaking
    criminals"; CyberScoop "TrickBot has infected over one million devices
    since 2016… according to Microsoft" (a cumulative-since-2016 figure) —
    "~1M" retained but reworded to source phrasing. STRIPPED as UNSOURCED:
    (1) "config injection of malformed records" — the strings
    "malformed"/"configuration"/"bogus" appear NOWHERE in either raw;
    reworded to the carried "sent out updates… that effectively severed
    the communication between the victimized computers and the servers"
    (WaPo, describing the Sept 22 + Oct 1 disruptions). (2) "the first
    publicly attributed CYBERCOM operation against a *criminal* (not
    state) actor" — NOT in either source; WaPo's only "first" strings are
    "Brian Krebs… first reported on the existence of the operation" and
    "the first death linked to ransomware"; WaPo says only "Cyber
    Command's role was previously unreported." Superlative removed; the
    "Russian-speaking criminals" (non-state) character retained from the
    raw. incident_type [disruption] → [law-enforcement, disruption]
    (Microsoft's court-ordered civil takedown is the law-enforcement/legal
    track; CYBERCOM is the disruption track).
    [b] ATTRIBUTION — this is a COUNTER-ACTION: actor_id us/cybercom/
    cnmf-actor → null. The acting entities (CYBERCOM CNMF + Microsoft DCU)
    are the ones doing the disruption, not a hostile actor, so they move
    to attributing_org per the null-actor counter-action convention (cf.
    audited siblings qakbot, emotet-ladybird, lockbit-cronos,
    trickbot-conti-sanctions tranches). attributing_org rewritten to name
    BOTH tracks. auspex_assessment concur → concur-with-caveat: the
    CYBERCOM half is anonymous-sourced and "The command declined to
    comment" / "did not return multiple requests for comment"; only the
    Microsoft half is on-record (Tom Burt). Prior note "Officially
    acknowledged on background" was self-contradictory and is corrected.
    Subject of the counter-action named in prose = ru/proxies/conti
    (TrickBot is a documented alias of the Conti/Wizard-Spider actor;
    grep-confirmed atlas/actors/ru/conti.yaml id ru/proxies/conti, alias
    "TrickBot"). No ru/proxies/trickbot or criminal/trickbot actor exists.
    [c] DATES — start_date 2020-09-01 "ramp-up" (unsourced) → 2020-09-22,
    the first C2 disruption threat-researchers observed per WaPo ("On
    Sept. 22… noticed the disruption of command and control servers");
    WaPo also gives an Oct 1 second disruption. disclosure_date
    2020-10-09 confirmed = WaPo publication ("By Ellen Nakashima / October
    9, 2020 at 8:16 p.m. EDT"). end_date 2020-10-31 (unsourced) →
    2020-10-12, the last sourced action = Microsoft's public court-ordered
    takedown (CyberScoop, published Oct 12, "said Monday it had
    coordinated a takedown"). Source published_on both verified against
    bylines / schema.org (WaPo 2020-10-09; CyberScoop 2020-10-12).
    [d] DOCTRINE_LINKS — two US/defender doctrines on a US counter-action;
    ADDED perspective: defender-response to BOTH (was missing on both).
    NO us/ncs-2023 link present or added — NCS-2023 (issued 2023-03-02)
    POSTDATES this 2020 operation and would be anachronistic (cf. the
    pre-NCS emotet-ladybird / tranche-one handling); the chronologically
    valid doctrines are Defend Forward (2018) and NSPM-13 (Aug 2018), both
    already present and both predating the op. us/defend-forward kept
    strongly_inferred (NOT upgraded): both sources name "persistent
    engagement" (Nakasone) not "Defend Forward", and the CYBERCOM half is
    anonymous with the command declining to comment — matching the
    strongly_inferred defend-forward cohort (IRA-2018, glowing-symphony,
    iran-retaliation), not the on-record attested cohort; refreshed the
    inference_basis signals with the verified Nakasone "persistent
    engagement / imposition of cumulative costs" quote. us/nspm-13 kept
