id: 2020-09/ghostwriter-poland-government-leaks
name: Ghostwriter compromise and leak of Polish government officials' email
start_date: 2020-09-01  # APPROXIMATE — no source pins the onset day/month; VSquare (2022-03-19): Dworczyk's wp.pl accounts "were targets of phishing attacks carried out between 2020-21". Month aligned to the event id namespace (2020-09); the LEAK began June 2021 (disclosure_date).
disclosure_date: 2021-06-09  # Dworczyk's public confirmation after the Telegram leak surfaced (Notes from Poland, 2021-06-09)
end_date: null  # the hack-and-leak distribution ran on past disclosure — VSquare (2022-03-19) reports the mailbox still being leaked "daily" nine months on; no clean end date is sourced
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing  # Żaryn via Notes from Poland 2021-06-24: attacks carried out through "phishing ... several outside logins to the mailbox used by Michał Dworczyk"
outcome_summary: |
  Ghostwriter / UNC1151 ran credential-phishing against Polish
  government officials and "senior figures associated with the ruling
  Law and Justice (PiS) party" (Notes from Poland). The most
  consequential case was the compromise of the private email account
  of Michał Dworczyk — head of the Chancellery of the Prime Minister,
  a ministerial-rank post in Mateusz Morawiecki's government — whose
  mailbox of over 60,000 emails was leaked from June 2021 through a
  Telegram channel in a hack-and-leak disinformation operation
  (seeded via a fabricated post on his wife's hacked Facebook
  account). Poland's security services (ABW / SKW), via spokesman
  Stanisław Żaryn, said the attack was "carried out by the UNC1151
  group" and that they had "reliable information linking the actions
  of the UNC1151 group with the Russian security services," and
  Jarosław Kaczyński said it was "carried out from the territory of
  the Russian Federation." Mandiant separately attributes UNC1151 to
  the Belarusian government with high confidence; the EU High
  Representative's 24 September 2021 declaration associated the wider
  Ghostwriter campaign with "the Russian state."
quantified_impact:
  email_accounts_targeted: 4350  # Żaryn via Notes from Poland 2021-06-24: "attempted attacks ... against 4,350 Polish email accounts"
  public_function_holders_targeted: 100  # Żaryn via Notes from Poland 2021-06-24: "100 people holding 'public functions'"
  emails_in_dworczyk_mailbox: 60000  # VSquare 2022-03-19: "over 60,000 emails in Michał Dworczyk's hacked mailbox"
false_flag_risk: none
summary: |
  Most politically consequential Ghostwriter operation in Polish
  domestic terms — the leaked Dworczyk correspondence fuelled months
  of political controversy. Demonstrates Ghostwriter's signature
  combined operation: credential theft feeding a downstream
  hack-and-leak information operation. NB the standing Ghostwriter
  Belarus-vs-Russia attribution contest — AUSPEX canonically homes
  the operator cluster to Belarus (by/unscoped/ghostwriter) on
  Mandiant's high-confidence UNC1151 technical attribution, while
  Poland's own government and the EU Council attributed the activity
  to Russia / the Russian state. The political attributions named
  Russia; the contest is flagged on the actor record and not
  re-homed.
attributions:
  - actor_id: by/unscoped/ghostwriter
    attributing_org: Mandiant
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2021-11-16
    attribution_source_id: mandiant/2021-04-28_ghostwriter-unc1151
    notes: |
      Mandiant's 16 Nov 2021 report (captured under the April-dated slug per
      the stable-slug rule) assesses "with high confidence that UNC1151 is
      linked to the Belarusian government" and documents this very operation:
      the leaked Polish government documents "were promoted in a hack-and-leak
      style Ghostwriter operation that began in June 2021," with narratives
      "alleging corruption or scandal within the ruling parties in ... Poland"
      and "discrediting the Polish government." Graduated attribution —
      attribution_level=nation (HIGH-confidence Belarusian government); NOT
      raised to named-unit (the Belarusian-military link is only moderate).
      Russia hedge preserved: Mandiant "cannot rule out Russian contributions"
      but has "not uncovered direct evidence." auspex_assessment=concur per the
      canonical actor homing (Belarus nexus).
  - actor_id: by/unscoped/ghostwriter
    attributing_org: Polish security services (ABW / SKW, via spokesman Stanisław Żaryn; PiS chairman Jarosław Kaczyński)
    attributing_org_confidence: high
    attribution_level: named-actor  # Poland named the UNC1151 cluster AND asserted a Russian-security-services sponsor (nation-level), but no specific GRU/FSB unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-06-24
    attribution_source_id: notesfrompoland/2021-06-24_poland-russia-attribution-officials-hack
    notes: |
      Poland's own (victim-government) attribution. Żaryn: "the attack [was]
      carried out by the UNC1151 [cyber espionage] group ... [We] have reliable
      information linking the actions of the UNC1151 group with the Russian
      security services"; Kaczyński: the cyberattack was "carried out from the
      territory of the Russian Federation." Poland named the actor (UNC1151)
      but attributed the sponsor to RUSSIA (Belarus 0× in the source).
      auspex_assessment=concur-with-caveat: AUSPEX concurs the operator is
      UNC1151/Ghostwriter but does NOT adopt the Russian-state nation — the
      canonical homing is Belarus (Mandiant, high conf); the Russia framing is
      the standing contest, flagged on the actor record, not re-homed here.
  - actor_id: by/unscoped/ghostwriter
    attributing_org: EU High Representative (Declaration on behalf of the European Union)
    attributing_org_confidence: high
    attribution_level: nation  # the EU named "the Russian state" / "the Russian Federation"; no unit, no named actor/cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-09-24
    attribution_source_id: council-eu/2021-09-24_belarus-ghostwriter-statement
    notes: |
      The EU-level collective political attribution of the wider Ghostwriter
      campaign this operation belongs to. Verbatim: "Some EU Member States have
      observed malicious cyber activities, collectively designated as
      Ghostwriter, and associated these with the Russian state ... We urge the
      Russian Federation to adhere to the norms of responsible state behaviour
      in cyberspace." Names NO member state and does NOT mention Poland,
      Dworczyk, Belarus, the KGB, or UNC1151 (all 0×). attribution_level=nation
      (the Russian state). auspex_assessment=concur-with-caveat: AUSPEX does not
      adopt the Russian-state nation (canonical homing is Belarus / UNC1151).
      CORRECTS the event's prior claim that the EU attributed the operation to
      "a Belarusian-aligned actor" — it named Russia (see sibling event
      2021-09/eu-belarus-ghostwriter-statement).
doctrine_links:
  - doctrine_id: by/concept-info-security-2019
    pillar_id: by/concept-info-security-2019/information-sphere-defense
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale  # Belarus's own doctrine on Belarusian-attributed operations
    reasoning: |
      Credential theft against Polish officials feeding a hack-and-leak that
      "discredit[ed] the Polish government" and framed the leaked material as
      "evidence of alleged Polish interference in Belarus's internal affairs"
      operationalizes the 2019 Concept's information-sphere-defense pillar —
      anti-Polish / pro-regime narrative operations run in the service of
      Belarusian state information objectives. Strongly_inferred (not
      attested): Mandiant corroborates the alignment ("narratives consistent
      with Belarusian government interests") and the HIGH-confidence
      Belarus-government link, but no source names the 2019 doctrine or states
      its terminal goal.
    attesting_source_id: null
    inference_basis:
      source_id: mandiant/2021-04-28_ghostwriter-unc1151
      signals:
        - "Mandiant: 'assesses with high confidence that UNC1151 is linked to the Belarusian government'"
        - "Mandiant: the leaked Polish government documents 'were promoted in a hack-and-leak style Ghostwriter operation that began in June 2021,' with narratives 'alleging corruption or scandal within the ruling parties in ... Poland' and 'discrediting the Polish government' — narratives 'consistent with Belarusian government interests'"
        - "Notes from Poland (2021-06-09): the leaked material framed as 'evidence of alleged Polish interference in Belarus's internal affairs' — a Belarusian information-sphere-defense narrative"
      alternatives:
        - "Russian information confrontation (ru/info-security-2016): Poland's own government (Kaczyński/Żaryn, 2021-06-24) attributed the operation to Russia ('from the territory of the Russian Federation'; UNC1151 'linked ... with the Russian security services'), and the EU Council (2021-09-24) named 'the Russian state.' If the true sponsor were Russia, the operative doctrine would be Russian information confrontation, not Belarusian information-sphere defense."
    contested: true
    counter_explanation: |
      The Belarus-vs-Russia contest is live at the nation level: the victim
      government (Poland) and the EU Council both attributed the operation to
      Russia, so a Russian-doctrine reading survives. AUSPEX retains the
      Belarusian-doctrine label per its canonical actor homing (Mandiant's
      high-confidence UNC1151-to-Belarus attribution + narratives consistent
      with Belarusian government interests), honestly flagged.
    analyst: claude
