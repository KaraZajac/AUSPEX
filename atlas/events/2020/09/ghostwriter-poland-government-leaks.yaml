  notes: |
    6-point audit + RE-SOURCE (badrabbit-style enrichment) of the 2020-21
    Ghostwriter/UNC1151 compromise-and-leak of Polish government officials'
    email (the Michał Dworczyk affair), against five snapshotted sources.

    FK VERIFICATION (per task): the batch-38 re-point is CORRECT. The
    Mandiant attribution FK mandiant/2021-04-28_ghostwriter-unc1151 resolves
    to the captured 16 Nov 2021 Mandiant Belarus-attribution report
    (raw_snapshot mandiant__2021-04-28_ghostwriter-unc1151.html, sha256
    d273878617f53e9674944dbb49b295682bbdc0316dbb78f12bd2e08f9f7ea095; its slug
    keeps the April date, published_on corrected to 2021-11-16). This is the
    real report the phantom mandiant/2021-11-16_unc1151-belarus-link was a
    fabricated mashup of; the re-point off that phantom (flagged by the
    sibling 2021-11/mandiant-unc1151-microbackdoor-tooling audit) landed on
    the right record. attribution_date 2021-11-16 now matches the source's
    published_on. FIXED a duplicate mandiant/2021-04-28_ghostwriter-unc1151 in
    sources[] (was listed twice).

    STEP-0 / RE-SOURCE rationale: the two prior cited sources are REAL and
    correctly snapshotted (hashes re-verified unchanged this audit), but
    between them they carry only the GENERIC Polish hack-and-leak (Mandiant)
    and a Russia-attribution of the wider campaign (EU) — neither names
    Dworczyk, his role, the mailbox scale, the June-2021 Telegram leak, or
    Poland's own attribution. The event's load-bearing specifics were
    therefore unsourced (and one — "Minister of Defence" — was flat wrong).
    Added three genuine secondary sources (created + snapshotted + hashed this
    audit), keeping the two priors at PRESERVE tier:
      - notesfrompoland/2021-06-09_dworczyk-email-hack-confirmed (sha256
        81d204cc…a8e772cf, 290,024 B) — disclosure anchor: Dworczyk's role +
        email hack + Telegram + PiS-senior-figures scope.
      - notesfrompoland/2021-06-24_poland-russia-attribution-officials-hack
        (sha256 9e271ec5…ba37b006, 291,052 B) — Poland's own attribution +
        4,350/100 scope + phishing vector.
      - vsquare/2022-03-19_behind-hack-and-leak-scandal-poland (sha256
        2160de5b…1b47ec4d, 134,306 B) — 2020-21 phishing window + 60k-mailbox
        scale + Facebook-seeding + leak-continuation.

    [a] FACTS — corrected to strict source support.
      FIXED (fabricated / wrong scope): "Minister of Defence (later Head of
      the Chancellery of the Prime Minister)" — Dworczyk was NOT Minister of
      Defence. Both Notes from Poland pieces and the orgs/polish-government
      registry give his role as HEAD OF THE CHANCELLERY OF THE PRIME MINISTER
      ("also holds ministerial rank"). Corrected. (He was earlier a deputy
      defence minister, 2015-17 — not load-bearing, dropped.)
      NOW SOURCE-CARRIED (verbatim): "the head of the chancellery of Poland's
      prime minister ... also holds ministerial rank" (NfP 06-09); "senior
      figures associated with the ruling Law and Justice (PiS) party" (NfP
      06-09); "private email accounts belonging to him and his wife were
      hacked" (NfP 06-09); Telegram leak (NfP 06-09 / VSquare); "over 60,000
      emails in Michał Dworczyk's hacked mailbox" (VSquare); "large-scale
      disinformation campaign" (NfP 06-09); Facebook-account seeding of the
      Telegram link (VSquare); the Mandiant-carried core "leaked Polish
      government communications and documents ... promoted in a hack-and-leak
      style Ghostwriter operation that began in June 2021." Added a
      quantified_impact block (4,350 accounts / 100 public-function holders /
      60,000 emails), each with its citing comment.
      KEPT incident_type [intrusion, data-theft, influence-operation] (phishing
      intrusion -> 60k-email exfil -> hack-and-leak IO — all three verified).

    [b] ATTRIBUTION — rebuilt from one muddled entry ("Polish government / EU
      Council" attributing to "a Belarusian-aligned actor") into THREE
      accurate entries, each with attribution_level:
        1. Mandiant -> Belarusian government, HIGH conf, nation, concur
           (2021-11-16). Graduated; not raised to named-unit.
        2. Polish security services (ABW/SKW via Żaryn; Kaczyński) ->
           UNC1151 cluster + "Russian security services" / "territory of the
           Russian Federation," named-actor, concur-with-caveat (2021-06-24).
        3. EU High Representative -> "the Russian state," nation,
           concur-with-caveat (2021-09-24).
      CORRECTED the central error: the EU declaration attributed to RUSSIA,
      not "a Belarusian-aligned actor" (Belarus/KGB/UNC1151/Poland all 0× in
      that raw). Both political attributions (Poland, EU) name Russia;
      AUSPEX homes the actor to Belarus per Mandiant and flags the Russia
      contest (concur-with-caveat on the two Russia entries). Did NOT
      over-specify Russia as AUSPEX's position (per task) and did NOT
