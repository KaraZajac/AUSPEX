id: 2020-09/ghostwriter-poland-government-leaks
name: Ghostwriter compromise and leak of Polish government officials' email
start_date: 2020-04-01
disclosure_date: 2021-06-09
end_date: 2021-06-09
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Ghostwriter / UNC1151 conducted credential phishing against
  Polish government officials including senior figures in the
  ruling Law and Justice (PiS) coalition. The most consequential
  case was the compromise of Minister of Defence (later Head of
  the Chancellery of the Prime Minister) Michał Dworczyk's
  personal email account, with contents leaked through Telegram
  channels in mid-2021. The Polish government formally attributed
  the operation to a Belarusian-aligned actor at the EU collective-
  statement level in September 2021.
false_flag_risk: none
summary: |
  Most politically consequential Ghostwriter operation in Polish
  domestic terms — fueled months of political crisis and prompted
  the Polish government's formal request for EU support and
  attribution. Demonstrates the credential-theft + selective-leak
  template that is Ghostwriter's signature combined operation:
  intrusion produces material for downstream information
  operations.
