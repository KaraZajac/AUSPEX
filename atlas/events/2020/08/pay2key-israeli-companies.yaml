id: 2020-08/pay2key-israeli-companies
name: First Pay2Key wave against Israeli companies
start_date: 2020-10-01  # ClearSky timeline: ransomware compiled + first confirmed victim Oct 2020
disclosure_date: 2020-11-06  # Check Point's initial Pay2Key alert ("Last weekend we issued a ransomware alert")
end_date: 2020-12-31  # last sourced wave: ClearSky's Dec-2020 second / supply-chain wave
incident_type:
  - ransomware
  - extortion
  - leak
  - supply-chain
  - influence-operation
initial_vector: n-day  # known edge-device / VPN vulnerabilities (Pulse Secure, Fortinet)
outcome_summary: |
  Dozens of Israeli companies — across the industrial, insurance,
  and logistics sectors — hit by Pay2Key ransomware with leak-site
  (Onion / Telegram / Twitter) amplification. Some victims paid; at
  least three non-paying victims had corporate data leaked, and in
  several cases the operators did not return decryption keys even
  after payment. The public data-leak / threat channel served the
  coercive, panic-inducing function more than a revenue function.
false_flag_risk: none
summary: |
  Late-2020 ransomware campaign that Check Point named and ClearSky
  attributed to Fox Kitten / Pioneer Kitten. Check Point's "Pay2Key
  — The Plot Thickens" report (2020-11-12) traced the ransom Bitcoin
  through an intermediate wallet to the Iranian exchange Excoino,
  concluding this "wave of attacks is indeed executed by an Iranian
  based threat actor" — a nation-level ("Iranian") attribution that
  names no group. ClearSky's Pay2Kitten report (2020-12-17) supplied
  the named-actor bridge, estimating "with medium to high confidence
  that Pay2Key is a new operation conducted by Fox Kitten" on the
  basis of tool- and infrastructure-overlap with the Fox Kitten
  intrusion set. Initial access reused the same known edge-device
  vulnerabilities documented in ClearSky's Fox Kitten reporting
  (Pulse Secure CVE-2019-11510, Fortinet FortiOS CVE-2018-13379),
  followed by reverse-proxy backdoors (FRPC / Go Proxy), lateral
  movement, and manual deployment of a relatively unsophisticated
  C++ encryptor after victim data had already been exfiltrated to a
  leak server. The coercion channel is the public data dump, not the
  encryption: ClearSky assessed "with a medium level of confidence"
  that the campaign "is aimed to create panic in Israel ... only a
  propaganda campaign to cause fear and to divert attention from Fox
  Kitten. That would explain the decision to leak the data instead
  of just demanding ransom." Both vendors frame it as part of the
  ongoing Israel–Iran cyber confrontation. A November supply-chain
  compromise of the logistics-software provider Amital cascaded to
  further Israeli logistics firms.
attributions:
  - actor_id: ir/unscoped/pioneer-kitten
    attributing_org: ClearSky
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-12-17
    attribution_source_id: clearsky/2020-12_pay2kitten
    notes: |
      ClearSky's Pay2Kitten report names the operator: "medium to
      high" / "medium-high" confidence that Pay2Key is "a new
      operation conducted by Fox Kitten" (an APT33 + APT34
      collaboration), on tool/infrastructure overlap. Named-actor,
      not service-level — no IRGC named (hence actor stays
      ir/unscoped). Confidence recorded moderate to reflect the
      vendor's explicit "medium-high" hedge.
  - actor_id: ir/unscoped/pioneer-kitten
    attributing_org: Check Point
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-11-12
    attribution_source_id: checkpoint/2020-12_pay2key
    notes: |
      Check Point reached only NATION level: it traced the ransom
      Bitcoin to the Iranian exchange Excoino and concluded the wave
      "is indeed executed by an Iranian based threat actor" (wallet
      owners "most probably" Iranian) — it names no group. Caveat:
      the Fox Kitten named-actor bridge is ClearSky's, not Check
      Point's. attribution_date corrected to the report's true
      publication 2020-11-12 (was 2020-12-17).
