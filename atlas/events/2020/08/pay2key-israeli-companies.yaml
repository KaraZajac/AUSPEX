  verified_on: 2026-07-10
  level: full
  notes: |
    RE-SOURCE (PHANTOM-REMEDIATION, wrong-source path) + full 6-point audit vs raw, snapshotted sources.
    The event is real and well-documented; its ClearSky citation was the WRONG report.

    [a] FACTS — now all source-carried.
      • outcome_summary sectors fixed "logistics, insurance, and RETAIL" -> "industrial, insurance, and
        logistics" per ClearSky Pay2Kitten p.3: "During October and November, we observed a wave of
        cyber-attacks on industrial and insurance companies. In November we observed a new wave of
        attacks on logistics companies." ("retail" appears nowhere in either cited source.)
      • summary tradecraft embellishments STRUCK: (i) "Citrix ADC (CVE-2019-19781) ... for initial
        access" — the Fox Kitten PDF lists Pulse/Fortinet/Palo-Alto as exploited and only "assess[es]
        with high probability that vulnerabilities in Citrix will be used" (no CVE number, not confirmed);
        (ii) "Microsoft Exchange ... for initial access" — absent from the Fox Kitten PDF (only "Microsoft
        accessibility tools" + ProcDump); Exchange/ProxyLogon mass-exploitation is a 2021 anachronism.
        Kept Pulse CVE-2019-11510 + Fortinet FortiOS CVE-2018-13379 (both verbatim in Fox Kitten PDF pp.
        9-10; Pay2Kitten says the Pay2Key entry vector reuses "well-known vulnerabilities covered in our
        Fox Kitten reports").
      • STRUCK the unsourced sibling-op sentence ("Black Shadow Shirbit leak ... later Moses Staff PyDCrypt
        campaign") — neither is in either cited source, and Moses Staff/PyDCrypt (2021) postdates the Dec-
        2020 sources (anachronism). Amital logistics supply-chain (ClearSky p.3) added instead (sourced).
      • Carried facts: "dozens of Israeli companies" (Pay2Kitten p.1); double-extortion + Onion leak site,
        three non-paying Israeli victims leaked, "at least four" paid, law-firm + game-dev victims (Check
        Point); leak via Telegram/Twitter + "in several cases di[d] not hand over decryption keys after
        payment" (Pay2Kitten pp.3,8); Excoino/Iran Bitcoin trace (Check Point). C++/unsophisticated
        encryptor consistent with both.

    [b] ATTRIBUTION — the crux. Event previously read "Attributed to Fox Kitten / Pioneer Kitten by
        ClearSky and Check Point," citing clearsky/2020-02_fox-kitten. That Feb-2020 "Fox Kitten Campaign"
        espionage report PREDATES Pay2Key by 9 months (0 "Pay2Key" hits) and cannot attribute it —
        wrong-source. Re-pointed the ClearSky attribution to the genuine ClearSky *Pay2Kitten* report
        (2020-12-17): "We estimate with medium to high confidence that Pay2Key is a new operation
        conducted by Fox Kitten" (p.1) / "medium-high level of confidence" (p.4) -> confidence high->
        moderate, level named-actor. Check Point reached only NATION level ("an Iranian based threat
        actor"; names no group) -> confidence high->moderate, level nation, assessment concur->
        concur-with-caveat. Neither source names the IRGC -> actor id stays ir/unscoped/pioneer-kitten.

    [c] DATES. start 2020-08-01 -> 2020-10-01 (Pay2Kitten timeline p.3: ransomware compiled + first
        confirmed victim Oct 2020; 2020-08 conflated the Fox Kitten espionage wave). end 2021-03-31 ->
        2020-12-31 (2021-03-31 was unsourced; last sourced activity is ClearSky's Dec-2020 second/supply-
        chain wave). disclosure 2020-11-06 kept — corroborated by Check Point's "Last weekend we issued a
        ransomware alert" (the initial disclosure; the cited Plot-Thickens follow-up is 2020-11-12).
        Source-record date fix: checkpoint/2020-12_pay2key published_on 2020-12-17 -> 2020-11-12 (article
        body "November 12, 2020" + HTML article:published_time 2020-11-12; the 2020-12-17 value was in fact
        the Pay2Kitten date — cross-contamination).

    [d] DOCTRINE. ir/cyber-deniable-retaliation/persona-laundering strongly_inferred -> attested: ClearSky
        states the strategic purpose (persona used "to divert attention from Fox Kitten"; leak-over-ransom
        = deniable coercion) — source_quote + attesting_source_id added (perspective attacker-rationale).
        ir/forward-defense kept strongly_inferred with inference_basis signals/ruled_out (sources give the
        WHO + panic-purpose, not the forward-defense rationale; perspective attacker-rationale).

    [e] ATTRIBUTION_LEVEL added: ClearSky named-actor; Check Point nation.

    [f] ACTOR_ID ir/unscoped/pioneer-kitten confirmed as a resolvable atlas actor id (canonical_name
        "Pioneer Kitten / Fox Kitten"; alias "Pay2Key operator"). Correct.

    incident_type [ransomware, influence-operation] -> [ransomware, extortion, leak, supply-chain,
    influence-operation]: extortion (double-extortion, Check Point), leak (leak sites, both), supply-chain
    (Amital, Pay2Kitten "supply chain attacks"), influence-operation (ClearSky "propaganda campaign to
    create panic"). targets: dropped unsupported sectors/finance/banking; set logistics + finance
    (insurance) + manufacturing (industrial) + legal (law firm) per the sources.

