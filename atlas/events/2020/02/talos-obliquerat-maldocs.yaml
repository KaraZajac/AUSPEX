id: 2020-02/talos-obliquerat-maldocs
name: Cisco Talos discloses ObliqueRAT campaign delivered via malicious documents
start_date: 2019-11-01
disclosure_date: 2020-02-20
end_date: 2020-02-20
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cisco Talos published a technical disclosure of the ObliqueRAT
  implant family observed in late 2019 and early 2020 against
  targets in South Asia. The implant was delivered via weaponized
  Microsoft Office documents themed on Indian and South Asian
  diplomatic and government lures. Talos's 2020-02 publication
  did not yet attribute the operator cluster definitively, but
  the lure-mix and victimology were consistent with Transparent
  Tribe operations; subsequent Talos research (February 2021)
  formally linked ObliqueRAT to Transparent Tribe via infrastructure
  and TTP overlap with Crimson RAT operations.
false_flag_risk: none
summary: |
  Foundational disclosure for the ObliqueRAT tool family. Tagged
  to Transparent Tribe based on the subsequent Talos 2021
  attribution-linking publication; the initial 2020 disclosure
  stopped short of cluster attribution.
