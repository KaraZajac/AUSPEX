id: 2020-11/sidecopy-emergence
name: SideCopy publicly named as Pakistani-aligned cluster mimicking SideWinder
start_date: 2019-01-01
disclosure_date: 2020-11-26
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Indian vendor Seqrite (Quick Heal) published a detailed
  attribution of the SideCopy cluster, naming the actor and
  documenting its deliberate mimicry of SideWinder (Indian-aligned)
  tradecraft as an attribution-muddying technique. Targets:
  Indian Ministry of Defence and Indian Armed Forces.
false_flag_risk: suspected
summary: |
  Notable because the deliberate-mimicry tradecraft is a documented
  Pakistani contribution to the attribution-fog problem in the
  India-Pakistan cyber theater. The naming established SideCopy
  as a distinct cluster from Transparent Tribe in Indian vendor
  reporting; some Western vendors continue to treat them as
  overlapping.
