id: 2020-11/sidecopy-emergence
name: SideCopy named by Seqrite as a Transparent Tribe sub-division mimicking SideWinder TTPs against Indian defence
start_date: 2019-01-01
disclosure_date: 2020-09-23
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Indian vendor Seqrite (Quick Heal) published "Operation SideCopy!",
  naming the SideCopy cluster and documenting its deliberate copying
  of SideWinder (Indian-aligned) TTPs — "copying TTPs that point at
  Sidewinder APT group" — as an attribution-muddying technique.
  Seqrite framed SideCopy as a sub-division of / linked to Transparent
  Tribe (APT36) and named no nation or Pakistani service. Targets:
  Indian defence units and armed-forces personnel, with decoys themed
  on military allowance orders, the Defence Production Policy 2020, and
  a mod.gov.in (Ministry of Defence / DoD) lure. Initial access via LNK
  malspam and template-injection / equation-editor (CVE-2017-11882).
false_flag_risk: suspected
summary: |
  Notable because the deliberate-mimicry tradecraft — copying
  SideWinder (Indian-aligned) TTPs to point investigators at the wrong
  actor — is a documented attribution-fog technique in the
  India-Pakistan cyber theater. Seqrite framed SideCopy NOT as a group
  distinct from Transparent Tribe but as "Transparent Tribe's
  sub-division," stating it "suspect[s] this threat actor has links
  with Transparent Tribe APT group"; Seqrite named no nation and no
  Pakistani service. The Pakistan nexus is inferred through the
  Transparent Tribe / APT36 association (itself a Pakistan-aligned
  cluster) rather than stated by Seqrite; some Western vendors treat
  SideCopy and Transparent Tribe as overlapping.
attributions:
  - actor_id: pk/unscoped/sidecopy
    attributing_org: Seqrite (Quick Heal Technologies)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-09-23
    attribution_source_id: seqrite/2020-11-26_sidecopy-emergence
    notes: |
      Seqrite definitively names the SideCopy cluster and its
      India-defence targeting, but only "suspect[s] this threat actor
      has links with Transparent Tribe APT group" and names no nation
      or service (no "Pakistan"/"ISI" in the body). attribution_level
      named-actor: a named group, no nation/unit stated by Seqrite;
      the pk/unscoped nation head rests on the (suspected) Transparent
      Tribe association — hence moderate, concur-with-caveat.
doctrine_links:
  - doctrine_id: pk/asymmetric-posture-india
    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Seqrite's captured decoys — "Armed-Forces-Spl-Allowance-Order",
      "Defence-Production-Policy-2020", "ParaMil-Forces-Spl-Allowance-Order"
      and a mod.gov.in (DoD) lure — sent to "Indian defence units and
      armed forces individuals" fit the canonical military-collection
      pillar (which itself names SideCopy targeting Indian military
      personnel, defense ministry, and defense research). No source
      states the strategic purpose, so this is inferred, not attested.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "Victimology: lures/decoys themed on Indian military allowance orders, the Defence Production Policy 2020, and a mod.gov.in (Ministry of Defence / DoD) URL, delivered to 'Indian defence units and armed forces individuals' (Seqrite)."
        - "Actor mission: SideCopy is an espionage cluster in the Pakistan-aligned Transparent Tribe/APT36 orbit operating against India — collection, not disruption or revenue."
        - "Doctrinal fit: the military-collection pillar explicitly enumerates SideCopy targeting Indian military personnel, defense ministry, and defense research via military-circular-themed phishing."
      ruled_out: "Kashmir-political collection (the sibling pillar) — the decoys and victims here are military/defence-establishment (allowance orders, Defence Production Policy, MoD), not Kashmir-issue journalists/dissidents or general government, so the military-collection reading dominates."
targets:
  - target_id: orgs/indian-mod
    role: primary
  - target_id: orgs/indian-armed-forces
    role: primary
sources:
  - seqrite/2020-11-26_sidecopy-emergence
