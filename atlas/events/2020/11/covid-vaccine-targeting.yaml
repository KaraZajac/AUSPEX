id: 2020-11/covid-vaccine-targeting
name: "COVID-19 vaccine research targeting (Strontium / Zinc / Cerium; Pfizer, AstraZeneca)"
start_date: 2020-09-01  # est. — Microsoft: attacks detected "in recent months" as of 2020-11-13
disclosure_date: 2020-11-13  # Microsoft MSTIC (Tom Burt) blog
end_date: null  # op end not bounded by sources; disclosures span Nov 2020 (Microsoft/Reuters) – Feb 2021 (ROK NIS)
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: suspected
outcome_summary: |
  Microsoft MSTIC (2020-11-13) detected THREE nation-state actors targeting
  seven prominent COVID-19 vaccine/treatment firms across five countries
  (Canada, France, India, South Korea, USA): Strontium (Russia; = APT28) using
  password-spray / brute-force credential attacks; Zinc (DPRK; = Lazarus) using
  recruiter-lure spear-phishing (fabricated job descriptions); and Cerium
  (DPRK; = Ruby Sleet) using COVID-themed spear-phishing that masqueraded as
  World Health Organization representatives. Microsoft named none of the seven
  companies and said the majority of the attacks were blocked. Follow-on
  reporting named specific DPRK targets: AstraZeneca (Reuters/CNN, 2020-11-27 —
  LinkedIn/WhatsApp recruiter lures; "not thought to have been successful";
  some attacker accounts used Russian email addresses, a possible false-flag
  misdirection) and Pfizer (ROK NIS briefing to parliament, disclosed
  2021-02-16 — documents targeted but systems not breached).
summary: |
  Three nation-state actors independently targeted COVID-19 vaccine and
  treatment research during the pandemic. Microsoft attributed the activity to
  Russia's Strontium (= APT28 / GRU) and two DPRK clusters, Zinc (= Lazarus)
  and Cerium (= Ruby Sleet); it characterized neither collection-vs-revenue
  intent nor any strategic goal (the piece is a Paris Peace Forum policy blog,
  not a technical intent attribution). AUSPEX reads the DPRK collection as
  strategic tech / health-policy collection in service of the regime's domestic
  COVID response and indigenous vaccine development (Juche self-reliance
  framing). ROK NIS's February 2021 statement provided national-government
  corroboration of the DPRK targeting of Pfizer. AstraZeneca-attack accounts
  registered to Russian email addresses read as a possible false-flag
  misdirection layered on the DPRK activity (Reuters/CNN).
