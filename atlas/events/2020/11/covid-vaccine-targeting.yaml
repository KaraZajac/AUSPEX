id: 2020-11/covid-vaccine-targeting
name: COVID-19 vaccine research targeting (Pfizer, AstraZeneca, Cerba)
start_date: 2020-07-01  # earliest tracked intrusion attempts
disclosure_date: 2020-11-13  # Microsoft MSTIC disclosure
end_date: 2021-02-28
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Multi-month spear-phishing campaign by Lazarus and Kimsuky
  against pharmaceutical and vaccine-research firms across six
  countries. Impersonation of WHO recruiters; credential
  harvesting. ROK NIS reported in February 2021 that Pfizer was
  among the targeted firms. Data exfiltration confirmed; full
  scope of stolen materials not publicly enumerated.
false_flag_risk: none
summary: |
  Dual-purpose operation: strategic-intelligence collection in
  service of regime vaccine development (Juche self-reliance
  framing), with potential downstream monetization (sale or
  ransomware extortion against pharma victims). Microsoft MSTIC
  and UK NCSC publicly disclosed the targeting; ROK NIS
  February 2021 statement provided national-government
  corroboration.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-11-13
    attribution_source_id: microsoft/2020-11-13_vaccine-targeting
  - actor_id: kp/rgb/kimsuky
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2020-11-13
    attribution_source_id: microsoft/2020-11-13_vaccine-targeting
doctrine_links:
  - doctrine_id: kp/strategic-information
    pillar_id: kp/strategic-information/policy-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Strategic-tech / health-policy collection in service of regime
      priorities (domestic COVID response, vaccine development); MSTIC
      documents the vaccine-research targeting but does not
      characterize collection-vs-revenue intent, so the
      strategic-collection framing is AUSPEX's inference.
    inference_basis:
      signals:
        - "MSTIC documents Lazarus/Kimsuky spear-phishing of vaccine-research firms across six countries (target set)"
      ruled_out: "an explicit MSTIC collection-vs-revenue intent statement — not in the source (a Tom Burt policy blog, not a technical intent attribution)"
    contested: false
    analyst: claude
  - doctrine_id: kp/juche
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Juche self-reliance framing for regime indigenous vaccine
      development under hostile-environment conditions.
    contested: false
    analyst: claude
