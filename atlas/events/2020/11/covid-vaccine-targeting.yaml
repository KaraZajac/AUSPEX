  notes: |
    Audited against the Microsoft MSTIC blog (Tom Burt, "Cyberattacks targeting
    health care must stop", 2020-11-13) + two re-sourced corroborators. Raw
    snapshots captured + hashed.

    SOURCES (sha256 first8…last8 · bytes):
      microsoft/2020-11-13_vaccine-targeting — 5712f584…7fc22f90 · 168203 B
      cnn/2020-11-27_astrazeneca-north-korea-targeting — 411fa2fc…32fa1632 · 4332807 B
      aljazeera/2021-02-17_nis-pfizer-north-korea-hack — 894224f9…1864d6dd · 200311 B

    [a] FACTS — Microsoft verbatim: "we've detected cyberattacks from three
    nation-state actors targeting seven prominent companies … in Canada, France,
    India, South Korea and the United States. The attacks came from Strontium, an
    actor originating from Russia, and two actors originating from North Korea that
    we call Zinc and Cerium." Methods verbatim: Strontium "password spray and brute
    force login attempts"; Zinc "spear-phishing lures … fabricated job descriptions
    pretending to be recruiters"; Cerium "spear-phishing email lures using Covid-19
    themes while masquerading as World Health Organization representatives"; "The
    majority of these attacks were blocked." CORRECTIONS: (1) removed incident_type
    'data-theft' and the "Data exfiltration confirmed" claim — the source says most
    attacks were BLOCKED (AstraZeneca "not thought to have been successful"; Pfizer
    systems "not breached") → set incident_type [espionage, intrusion]. (2) Fixed
    country count six→FIVE (source lists five). (3) Removed unsourced "potential
    downstream monetization (sale or ransomware extortion)" speculation and the
    unsupported "UK NCSC publicly disclosed the targeting" claim (NCSC appears only
    as Oxford's defensive engagement in the CNN piece, not as a disclosure of this
    campaign). (4) Re-sourced the named victims: AstraZeneca via CNN/Reuters
    (2020-11-27); Pfizer via Al Jazeera/ROK NIS (2021-02-17). "Cerba" is
    UNSUPPORTABLE — no source names it (searched); dropped from the event name and
    targets. (5) start_date set to est. 2020-09-01 ("recent months" as of Nov 2020);
    end_date set null (op end unbounded; only disclosures are dated). (6)
    false_flag_risk none→suspected: CNN/Reuters reports DPRK AstraZeneca-attack
    accounts "using Russian email addresses", a possible misdirection.

    [b] ATTRIBUTION — THREE distinct actors, each at its Microsoft-named level
    (named-actor), attributing_org Microsoft MSTIC, confidence high (Microsoft
    states each flatly as its own tracked cluster), auspex concur. RESTORED the
    dropped Russian actor Strontium→ru/gru/26165/apt28 (STRONTIUM is Microsoft's
    APT28 alias). Zinc→kp/rgb/lazarus (ZINC = Lazarus, Microsoft alias). KEY
    CORRECTION: Cerium re-mapped kp/rgb/kimsuky→kp/unscoped/ruby-sleet. Microsoft's
    naming schema maps CERIUM→Ruby Sleet; Kimsuky = Emerald Sleet / THALLIUM — a
    distinct cluster. The corpus's own kimsuky.yaml and ruby-sleet.yaml headers
    state this equivalence explicitly (CERIUM alias 'equivalent' on ruby-sleet). ROK
    NIS corroborates the DPRK targeting at nation level (folded into summary +
    strategic-information signals, not a separate null-actor row).

    [c] DATES — Microsoft published_on 2020-11-13 (correct). CNN 2020-11-27; Al
    Jazeera 2021-02-17 (both real, dated from article). Event start est. 2020-09
    (recent months); disclosure 2020-11-13; end null (see [a]). Prior end_date
    2021-02-28 conflated the ROK NIS disclosure with an op end — removed.

    [d] DOCTRINE_LINKS — both DPRK-attacker-rationale. strategic-information/
    policy-collection kept strongly_inferred (updated actor names Lazarus/Ruby
    Sleet, tightened ruled_out on the Lazarus-revenue competitor; no source states
    the goal → not attested, no attesting_source_id). juche kept plausible; added
    inference_basis.alternatives. NB: the restored RU actor (APT28) carries NO RU
    doctrine link — Microsoft states no purpose for Strontium and any RU link would
    be speculative; this may surface a verify_atlas doctrine-state-mismatch REVIEW
    item for ru (a review surface, not an error). Flagged below.

    [e] ATTRIBUTION_LEVEL — set named-actor on all three (was absent). Microsoft
    names each as a specific tracked cluster with a stated nation of origin; no DPRK
    service/unit is named (hence ruby-sleet is unscoped, and lazarus stays at named-
    actor not named-unit here).

    [f] ACTOR_ID — all three resolve: ru/gru/26165/apt28, kp/rgb/lazarus,
    kp/unscoped/ruby-sleet. No actor files edited.

    RESIDUAL UNCERTAINTY / FLAGS: (i) TARGET REGISTRY — orgs/pfizer, orgs/
    astrazeneca, orgs/cerba-healthcare referenced by the prior version have NO
    registry files under atlas/targets/orgs/ and are referenced by no other event
    (dangling FKs). Left them out (kept only the two resolving sector targets) to
