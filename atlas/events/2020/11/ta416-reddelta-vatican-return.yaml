initial_vector: phishing
outcome_summary: |
  Proofpoint discloses TA416 / RedDelta / Mustang Panda return
  after a brief operational pause following Recorded Future's
  July / September 2020 RedDelta reports on Vatican and Hong
  Kong Catholic-diocese targeting. New activity reuses the
  same Catholic Church target set but rewrites the PlugX
  loader component in Go, presumably to evade detection
  signatures that had been published.
false_flag_risk: none
campaign_id: mustang-panda-vatican-religious
summary: |
  Documents the persistence of PRC interest in the Vatican
  during the period when Beijing was renegotiating the
  Holy See bishop-appointment agreement (the 2018 provisional
  agreement was up for two-year renewal in October 2020).
  The intelligence value is direct: insight into the Vatican's
  negotiating posture and the Holy See's evaluation of Hong
  Kong Catholic dioceses post the 2020 National Security Law.
  The Golang rewrite of PlugX is also methodologically
  interesting — early evidence that PRC operators are willing
  to rewrite established loader pipelines in response to
  vendor disclosure, a tradecraft response not consistently
  observed before 2020.
