id: 2020-11/ta416-reddelta-vatican-return
name: TA416 / RedDelta Vatican-targeting return (Golang PlugX)
start_date: 2020-10-10
disclosure_date: 2020-11-23
end_date: null
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  Proofpoint discloses a resumption of TA416 / RedDelta /
  Mustang Panda phishing activity following a documented pause
  (near-total inactivity 2020-09-16 through 2020-10-10, spanning
  China's National Day / Golden Week) that itself followed
  disclosures by threat researchers — including Recorded Future's
  July / September 2020 RedDelta reporting (which the Proofpoint
  post cites in its references, incl. a "New wave of PlugX targets
  Hong Kong" ref). The renewed activity reuses the Catholic
  Church / Vatican-CCP diplomacy target set (plus entities in
  Myanmar and organizations conducting diplomacy in Africa) but
  delivers PlugX via a loader newly rewritten in Go — changing the
  detection surface while preserving links to prior RedDelta
  tradecraft.
false_flag_risk: none
campaign_id: mustang-panda-vatican-religious
summary: |
  Documents the persistence of PRC interest in the Vatican
  during the period when Beijing and the Holy See had just
  renewed the provisional bishop-appointment agreement (the
  2018 accord was renewed for two years around October 2020);
  Proofpoint observed TA416 social-engineering lures that
  referenced this renewed provisional agreement and spoofed
  fields imitating journalists from the Union of Catholic Asia
  News. The intelligence value is direct: insight into the
  Vatican's negotiating posture on China. (Recorded Future's
  earlier RedDelta reporting, cited in Proofpoint's references,
  additionally documented Hong Kong Catholic targeting; that
  Hong Kong detail is not established in the Proofpoint body
  itself.) The Golang rewrite of the PlugX loader is also
  methodologically interesting — early evidence that PRC
  operators are willing to rewrite established loader pipelines
  in response to vendor disclosure, a tradecraft response not
  consistently observed before 2020.
