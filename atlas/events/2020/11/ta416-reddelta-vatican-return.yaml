qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs Proofpoint "TA416 Goes to Ground and Returns with a Golang PlugX
    Malware Loader" (2020-11-23). RAW snapshot captured:
    proofpoint__2020-11-23_ta416-golang-plugx.html, sha256 345b7966…948d310c,
    713190 bytes; title "TA416's Golang PlugX Malware Loader | Proofpoint US" —
    REAL article, not a phantom (Golang×36, PlugX×65, TA416×47, Vatican×6,
    Myanmar present, RedDelta present in body).

    [a] FACTS ✓ — all body-carried:
      • Golang PlugX loader: title + "Golang PlugX"; loader (not the payload)
        rewritten in Go to change detection surface. ✓
      • Targeting: "continuation of previously reported campaigns that have
        targeted entities associated with diplomatic relations between the
        Vatican and the Chinese Communist Party, as well as entities in Myanmar.
        The targeting of organizations conducting diplomacy in Africa has also
        been observed." → religious + foreign-ministry/government sectors ✓.
      • Provisional agreement: "continued use of social engineering lures
        referencing the provisional agreement recently renewed between the
        Vatican Holy See and the CCP"; spoofed from-fields imitating "journalists
        from the Union of Catholic Asia News" ✓ (added to summary).
      • Pause/return: "After nearly a month of inactivity following publications
        by threat researchers … renewed phishing activity … the Chinese APT
        group TA416"; "This most recent period of inactivity encompassed
        September 16, 2020 through October 10, 2020" (National Day / Golden
        Week). ✓
      • initial_vector phishing ✓ ("Renewed Phishing Activity").
      CORRECTION: Hong Kong Catholic-diocese targeting is NOT in the Proofpoint
      body — it appears only as a referenced RF report title ("New wave of PlugX
      targets Hong Kong", footnote 4). "diocese"/"dissident"/"Hong Kong" (body)
      absent. Softened summary + outcome_summary + doctrine-link-2 reasoning to
      attribute the HK detail to the *referenced* RF reporting, not to this
      source's body — removed the "Holy See's evaluation of Hong Kong Catholic
      dioceses post 2020 NSL" over-claim.

    [b] ATTRIBUTION ✓ — Proofpoint: renewed activity "can be attributed to the
      Chinese APT group TA416 (also referred to as Mustang Panda and RedDelta)".
      Nation = China, named group = TA416/Mustang Panda/RedDelta. Kept
      attributing_org_confidence high (stated plainly, infrastructure/TTP
      continuity). NO Chinese service named (MSS/Ministry/PLA all absent) →
      consistent with cn/unscoped. Added attribution_level: named-actor
      (was missing) + attribution notes with the quote.

    [c] DATES — source published_on 2020-11-23 = article dateline "November 23,
      2020" ✓. CORRECTED event start_date 2020-05-01 → 2020-10-10: the cited
      source anchors the *return* to the end of the documented inactivity window
      (2020-09-16→2020-10-10); May-2020 was a conflation with the earlier
      RedDelta campaign that this source does not document. CORRECTED
      end_date 2020-11-23 → null: the report describes ongoing/renewed activity,
      not a bounded op that ended on the disclosure date.

    [d] DOCTRINE_LINKS — neither is `attested`, both attesting_source_id null
      (correct; no attesting source required). Link 1 (cn/bri /
      political-intelligence-collection, strongly_inferred): source frames the
      op as "continued focus on matters pertaining to the evolving relationship
      between the Catholic Church and the CCP" and "pursuit of espionage
      objectives" → Vatican/CCP-diplomacy political-intelligence collection; the
      strategic goal is not stated verbatim (so not attested) but triangulates
      cleanly → strongly_inferred honest. Link 2 (cn/national-intelligence-law-
      2017 / diaspora-and-dissident-collection, plausible): rests on HK targeting
      that this source's body does not establish → kept plausible + reasoning now
      flags that HK comes from referenced RF reporting only. Both doctrine +
      pillar FKs resolve.

    [e] ATTRIBUTION_LEVEL — set named-actor (see [b]).

    [f] ACTOR_ID — cn/unscoped/mustang-panda resolves to
      atlas/actors/cn/mustang-panda.yaml; LEGIT placement here (TA416 =
      Proofpoint's name, RedDelta = Recorded Future's name, both established
      Mustang Panda aliases carried in the actor's aliases[]). Actor already
      correctly demoted MSS→unscoped (2026-06-24); this source confirms
      nation-only attribution. No flag.

    Residual uncertainty: start_date 2020-10-10 is the resumption boundary the
    source gives; individual Golang-PlugX samples referenced carry earlier
    2020 compile/observation dates (Jun/Aug/Sep), but those predate the "return"
    this event models.
