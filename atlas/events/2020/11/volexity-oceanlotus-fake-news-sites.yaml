    attributing_org: Volexity
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2020-11-06
    attribution_source_id: volexity/2020-11-06_oceanlotus-watering-hole
    notes: "Volexity states the activity flatly as 'the Vietnamese threat actor OceanLotus' — named-actor (group) + nation (Vietnam); no specific Vietnamese service named, consistent with vn/unscoped/apt32."
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      OceanLotus's fake-news cluster includes a site dedicated to
      the 13th National Congress of the Communist Party of Vietnam
      (nhansudaihoi13.org) plus activist/anti-corruption-themed
      properties, and Volexity notes targeting of "those within
      Vietnam." Profiling and selectively implanting a Vietnamese
      activist / political-opposition reader base is exactly the
      "hostile forces" monitoring the Resolution 29-NQ/TW
      regime-stability-surveillance pillar tasks the security
      services with. Volexity did not cite the resolution by name;
      the label is strongly_inferred rather than attested because
      the source states the who and the behaviour but not the
      strategic goal.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Fake-news cluster includes nhansudaihoi13.org, a site 'dedicated to news surrounding the upcoming 13th National Congress of the Communist Party of Vietnam', with a Facebook page focused on 'corruption within Vietnamese politics'."
        - "Volexity frames the campaign as continuing OceanLotus's 2017 'massive digital surveillance campaign' and notes targeting of 'those within Vietnam' via profiling and selective implant delivery."
      ruled_out: "Vietnam's industrial-upgrading cyber-collection doctrine (automotive/aerospace IP theft) — no commercial-IP target appears in this campaign; the audience is news/activist readers, not industry."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/vietnamese-dissident-network
    role: primary
  - target_id: sectors/civil-society
    role: primary
sources:
