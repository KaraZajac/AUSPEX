id: 2020-11/volexity-oceanlotus-fake-news-sites
name: Volexity documents OceanLotus / APT32 fake Vietnamese-language news-site infrastructure cluster
start_date: 2020-01-01
disclosure_date: 2020-11-06
end_date: 2020-11-06
incident_type:
  - intrusion
  - influence-operation
initial_vector: n-day
outcome_summary: |
  Volexity published a follow-on disclosure to its 2017 watering-
  hole research, documenting an OceanLotus / APT32 infrastructure
  cluster operating fake Vietnamese-language news websites —
  including a fake "Hà Nội Times" property — to deliver multi-
  stage implants to Vietnamese-language readers. The fake-news-site
  layer functioned both as a profiler and selective-payload
  delivery vehicle and as a persona-management asset adjacent to
  the social-media accounts Facebook would publicly take down five
  weeks later in December 2020.
false_flag_risk: none
summary: |
  Bridges the November 2017 Volexity watering-hole disclosure and
  the December 2020 Facebook takedown of APT32 / CyberOne Group
  infrastructure. The fake-news-site cluster is one of the
  clearer documented examples of APT32 operating across the
  intrusion / influence boundary — the same infrastructure that
  profiled targets for technical implants also served as a
  Vietnamese-language information-environment shaping asset.
  Plays to both the regime-stability-surveillance pillar and the
  cybersovereignty / content-control pillar of Resolution
  29-NQ/TW.
