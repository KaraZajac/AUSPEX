  notes: |
    Audited vs Volexity "OceanLotus: Extending Cyber Espionage Operations Through Fake
    Websites" (2020-11-06) — raw snapshot beee9a04…7064ba30, 78,096 bytes; hash re-verified
    on disk. Added facebook/2020-12-11_apt32-takedown (dab54266…f6d9bb78, 314,315 bytes;
    hash re-verified) to carry the Dec-2020 takedown / CyberOne bridge. Not a phantom — the
    Volexity URL is the real article and carries the core.
    [a] FACTS: SUPPORTED verbatim — OceanLotus "set up and operated multiple activist, news,
    and anti-corruption websites"; the sites "were not compromised, instead they were created
    and operated by OceanLotus"; a "web profiling framework" to "gather information about site
    visitors and, in some cases, deliver malware"; the baomoivietnam[.]com fake video player →
    "Adobe_Flash_Install.rar … designed to fool the targeted user into infect[ing] themselves
    with a Cobalt Strike implant"; Android/iOS visitors redirected to a phishing host
    (accounts.gservice[.]reviews); "targeting those within Vietnam" + "renewed targeting of
    OceanLotus's neighbors throughout Southeast Asia"; nhansudaihoi13[.]org 13th-Congress site
    with a Facebook page (1,000+ interactions, Messenger account) and a predecessor property
    with "over 20,000 followers". CORRECTIONS: (1) STRIPPED the fabricated fake "Hà Nội Times"
    property — 0 occurrences of "Hà Nội Times"/"Hanoi Times" in the raw; the sites are
    baodachieu.com / baomoivietnam.com / ledanvietnam.org / nhansudaihoi13.org / tocaoonline.org
    / thamcungbisu.org / tinmoivietnam.com / kmernews.com / laostimenews.com / malaynews.org /
    philiippinesnews.net / khmer-livenews.com / khmerleaks.com, none named "Hà Nội Times".
    (2) Reworded "multi-stage implants" → the actually-documented Cobalt Strike implant via
    fake-Flash-update RAR + credential-phishing redirect, and broadened the reader base to the
    documented Vietnamese + wider Southeast Asian scope. (3) "CyberOne Group" is NOT in the
    Volexity article (0 hits) — that claim is now carried by the added Facebook/Meta source,
    which states verbatim it "linked this activity to CyberOne Group, an IT company in Vietnam".
    [b] ATTRIBUTION: Volexity states it flatly — "the Vietnamese threat actor OceanLotus" —
    high confidence; added attribution_level=named-actor (OceanLotus named + Vietnam nation, no
    service). auspex_assessment concur unchanged.
    [c] DATES: source published_on 2020-11-06 correct; disclosure_date 2020-11-06 correct;
    start_date 2020-01-01 retained (campaigns "set up within the last year" / "throughout the
    year"). Changed end_date 2020-11-06 → null: article says "the majority of these websites
    are still live at the time of this blog post" (operation not bounded at disclosure).
    [d] DOCTRINE: REMOVED the vn/resolution-29-nqtw/cybersovereignty (plausible) link — it
    rested on an information-environment / content-control framing the source does not carry
    (0 occurrences of influence/disinformation/propaganda/narrative in the raw; the sites scrape
    legitimate news to appear real, one Facebook page even reposts anti-corruption content).
    Volexity documents espionage watering-holes, not an influence/content-control operation, so
    the cybersovereignty pillar does not genuinely apply. Kept the regime-stability-surveillance
    link at strongly_inferred (13th-Congress + activist/anti-corruption targeting of a
    Vietnamese political reader base = the pillar's "hostile forces" monitoring); added
    inference_basis (signals + ruled_out). No attested link (no attesting_source_id).
    [e] ATTRIBUTION_LEVEL: set named-actor (was missing).
    [f] ACTOR_ID: vn/unscoped/apt32 resolves (file atlas/actors/vn/apt32.yaml, id
    vn/unscoped/apt32). No actor edits.
    OTHER CORRECTIONS: incident_type [intrusion, influence-operation] → [intrusion, espionage]
    (influence-operation unsupported — see [d]). initial_vector n-day → phishing (delivery is
    social-engineering: fake Flash-update lure + "spear phishing and social media messages"; no
    n-day exploit is described). targets: replaced dangling FK
    orgs/vietnamese-language-readers-undisclosed (no such registry file) with sectors/civil-society
    (broad activist/reader base); kept orgs/vietnamese-dissident-network.
    RESIDUAL UNCERTAINTY: start_date is an estimate (source says "within the last year" /
    "throughout the year", no precise start). sectors/civil-society is a broad stand-in for the
    heterogeneous Vietnamese + Southeast-Asian news-reader victim base the watering-holes profiled.
