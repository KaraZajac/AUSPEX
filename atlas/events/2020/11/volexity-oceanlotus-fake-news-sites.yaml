id: 2020-11/volexity-oceanlotus-fake-news-sites
name: Volexity documents OceanLotus / APT32 fake Vietnamese-language news-site infrastructure cluster
start_date: 2020-01-01
disclosure_date: 2020-11-06
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Volexity published a follow-on disclosure to its 2017 watering-
  hole research, documenting an OceanLotus / APT32 infrastructure
  cluster operating multiple fake Vietnamese-language (and
  wider Southeast Asian) news websites — e.g. baodachieu.com,
  baomoivietnam.com, nhansudaihoi13.org — that OceanLotus itself
  created and operated (they were not, as first appeared,
  compromised legitimate sites). Only a handful of specific
  articles per site carried malicious code: a web-profiling
  framework fingerprinted visitors and, on a browser/OS-selective
  basis, socially engineered them into a fake Flash-update RAR
  (Adobe_Flash_Install.rar) that dropped a Cobalt Strike implant,
  or redirected them to credential-phishing pages. The fake-news
  layer thus functioned both as a visitor profiler and as a
  selective-payload delivery vehicle, and several of the sites had
  associated Facebook pages (one predecessor property had ~20,000
  followers; the 13th-Congress site nhansudaihoi13.org had a
  Facebook page with 1,000+ interactions and a Messenger account
  for direct outreach) — the same class of persona/social-media
  infrastructure that Facebook (Meta) publicly disrupted five weeks
  later, on 11 December 2020, attributing it to the Vietnamese IT
  firm CyberOne Group.
false_flag_risk: none
summary: |
  Bridges the November 2017 Volexity watering-hole disclosure
  (referenced by Volexity as its "2017 discovery" of an OceanLotus
  "massive digital surveillance campaign") and the December 2020
  Facebook takedown of APT32 / CyberOne Group persona
  infrastructure. The fake-news-site cluster is a well-documented
  example of APT32 espionage watering-hole infrastructure that
  doubled as a Vietnamese-language persona/social-media asset: the
  same sites that profiled and selectively implanted visitors also
  operated fake activist/anti-corruption/13th-National-Congress
  news brands and associated Facebook pages. The Vietnamese
  activist/political dimension of the targeting fits the
  regime-stability-surveillance pillar of Resolution 29-NQ/TW; the
  parallel Cambodian/Lao/Malay/Filipino news targeting reads as
  regional foreign collection rather than domestic regime
  surveillance.
attributions:
