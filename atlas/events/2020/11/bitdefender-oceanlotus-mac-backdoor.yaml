  notes: |
    RE-SOURCE case (PHANTOM-REMEDIATION 0b): real, well-documented event; the cited
    Bitdefender post (bitdefender/2020-11-04, url null) did not survive Bitdefender's
    blog-domain migration and has no Wayback snapshot (unfetchable, confirmed by prior
    audits + a fresh 2026-07-01 search that surfaced only later 2023 Bitdefender macOS
    posts). Added the live companion primary — Trend Micro, "New MacOS Backdoor Connected
    to OceanLotus Surfaces" (2020-11-27) — as trendmicro/2020-11-27_new-macos-backdoor-oceanlotus:
    curl 200, 98,260 bytes, sha256 464a25f2…b00c6a9f, raw_snapshot captured. All facts below
    are now carried by that verifiable raw source.
    [a] FACTS — corrected against the raw Trend Micro report:
      • "weaponized Word documents in ZIP" → the sample "arrives as an app bundled in a Zip
        archive" that "uses the icon for a Word document file as a disguise" with a Vietnamese
        decoy — NOT a macro-weaponized .doc; reworded.
      • "C2 over HTTPS" → STRIPPED: raw has zero HTTP/HTTPS/TLS/SSL; C2 is custom-encrypted
        over TCP ("collected information is encrypted and sent to the malware C&C server";
        domains mihannevis[.]com, mykessef[.]com, idtpl[.]org). Reworded to "encrypted C2".
      • "multi-stage AppleScript droppers" → CORRECTED to shell-script: the app contains "the
        shell script containing the main malicious routines" → extracts a b64 "fat binary"
        second-stage (Mach-O) → drops third-stage (~/Library/User Photos/mount_devfs). No
        AppleScript in the report.
      • "remote shell, file exfiltration, process enumeration" → CORRECTED to the documented
        command set: "Run command in terminal" (0xac), "Upload file"/"Download file"/"Download
        and execute a file"/"Remove file"/"Get file size", plus host recon (processor, memory,
        serial, MAC via system_profiler/ioreg/ifconfig). "Process enumeration" is NOT in the
        report (the recon is host/hardware info) — removed.
      • "successor to the 2018 macOS implant" → kept but reworded to "a variant of the
        previously documented OceanLotus macOS backdoor, sharing its command set" (Trend Micro:
        "confirmed to be a variant"; the supported-command codes are taken "from an earlier blog
        post that covered OceanLotus"; ESET documented the 2018 sample separately).
      • Victimology → Trend Micro states only "suspected to target users from Vietnam ... the
        document's name is in Vietnamese"; the diaspora reading is grounded in the decoy filename
        ("...Canada") + APT32's documented diaspora strand, and is now hedged rather than asserted.
    [b] ATTRIBUTION — Trend Micro: "a new backdoor that we believe to be related to the
      OceanLotus group ... confirmed to be a variant of the said malware" (+ Bitdefender named
      OceanLotus/APT32). high / concur retained; NO Vietnamese state service named by either.
    [c] DATES — Bitdefender source published_on 2020-11-04 (disclosure_date); Trend Micro
      companion published_on 2020-11-27 (its own record, not the campaign month). start_date
      2020-01-01 is a best-estimate (Trend Micro notes a C2 domain was repurposed ~end Aug 2020;
      no firm op-start given) — left as estimate.
    [d] DOCTRINE — vn/resolution-29-nqtw/regime-stability-surveillance kept at strongly_inferred
      (NOT attested: both sources are technical, neither states the strategic purpose). Added
      inference_basis.signals + ruled_out (industrial-collection strand) and set attesting_source_id
      to the supporting Trend Micro source. Directionality: Vietnam is the attacker (via APT32);
      victims are Vietnamese-language/diaspora users abroad, not the Vietnamese state.
    [e] ATTRIBUTION_LEVEL — set named-actor (OceanLotus/APT32 group + Vietnam nexus; no unit/service).
    [f] ACTOR_ID — vn/unscoped/apt32 resolves (atlas/actors/vn/apt32.yaml); no actor issue.
    FK FIX: target_id orgs/vietnamese-diaspora-mac-users was a DANGLING FK (no target-registry
      file exists; only this event referenced it) → repointed to sectors/civil-society/diaspora
      (existing sector; 8 prior uses). country null (diaspora, extraterritorial).
