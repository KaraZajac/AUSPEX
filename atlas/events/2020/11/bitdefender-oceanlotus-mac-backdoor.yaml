id: 2020-11/bitdefender-oceanlotus-mac-backdoor
name: Bitdefender documents OceanLotus macOS backdoor targeting Vietnamese diaspora
start_date: 2020-01-01
disclosure_date: 2020-11-04
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Bitdefender published a technical analysis of a new macOS
  variant of an OceanLotus / APT32 backdoor distributed via
  weaponized Word documents in Vietnamese-language ZIP archives.
  The malware (a successor to the 2018 OceanLotus macOS implant)
  established C2 over HTTPS to attacker-controlled domains and
  ran multi-stage AppleScript droppers culminating in a Mach-O
  binary providing remote shell, file exfiltration, and process
  enumeration. Victimology centered on Vietnamese diaspora users
  on macOS.
false_flag_risk: none
summary: |
  Notable for tradecraft sophistication on a non-Windows platform
  uncommon for state-aligned campaigns at the time, and for
  reaffirming the APT32 diaspora-targeting strand alongside the
  industrial-collection cluster. The Mac focus reflects the
  demographic of Vietnamese diaspora civil society —
  disproportionately Apple-platform — which the Vietnamese-state
  surveillance interest follows.
