id: 2020-11/bitdefender-oceanlotus-mac-backdoor
name: Bitdefender documents OceanLotus macOS backdoor targeting Vietnamese diaspora
start_date: 2020-01-01
disclosure_date: 2020-11-04
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Bitdefender (2020-11-04), and Trend Micro in a companion
  analysis (2020-11-27, detecting it as Backdoor.MacOS.OCEANLOTUS.F),
  documented a new macOS variant of an OceanLotus / APT32 backdoor.
  It was delivered as an app bundle disguised with a Word-document
  icon and .doc extension inside a ZIP archive, alongside a
  Vietnamese-language decoy document. The malware — a variant of
  the previously documented OceanLotus macOS backdoor, sharing its
  command set — ran a multi-stage shell-script dropper that
  extracted a second-stage Mach-O (fat) binary and a third-stage
  payload, established encrypted C2 to attacker-controlled domains
  (mihannevis[.]com, mykessef[.]com, idtpl[.]org), and provided
  terminal command execution, file download/upload/delete
  (exfiltration), and host reconnaissance (processor, memory,
  serial number, MAC addresses). The decoy filename ("ALL tim nha
  Chi Ngoc Canada") and OceanLotus's history point to Vietnamese-
  language / diaspora macOS users; Trend Micro assessed the sample
  as "suspected to target users from Vietnam."
false_flag_risk: none
summary: |
  Notable for tradecraft sophistication on a non-Windows platform
  uncommon for state-aligned campaigns at the time, and for
  reaffirming the APT32 diaspora-targeting strand alongside the
  industrial-collection cluster. The Mac focus reflects the
  demographic of Vietnamese diaspora civil society —
  disproportionately Apple-platform — which the Vietnamese-state
  surveillance interest follows.
