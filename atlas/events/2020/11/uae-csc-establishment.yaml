    state agency WAM. IISS Cyber Capabilities & National Power Vol 2 ch.13
    (sha fa6dd436…f7b712f6, 297,869 bytes): "In November 2020, the UAE
    cabinet approved the establishment of the UAE Cyber Security Council
    (CSC), which is chaired by the Head of Cyber Security. The council met
    for the first time in January 2021"; and identifies "Dr. Mohammed
    Hamad Al Kuwaiti, Head of Cyber Security for UAE Government" (Al Bayan,
    5 Jul 2020). CORRECTIONS: (1) "federal decree" → Cabinet approval —
    both sources say the Cabinet approved formation; no source calls it a
    federal decree, so removed. (2) Date 2020-11-04 was WRONG; the
    approval was 29 Nov 2020 (IISS footnote cites the WAM release
