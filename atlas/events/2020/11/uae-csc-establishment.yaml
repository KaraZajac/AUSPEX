id: 2020-11/uae-csc-establishment
name: UAE Cyber Security Council establishment (Cabinet approval)
start_date: 2020-11-29
disclosure_date: 2020-11-29
end_date: 2020-11-29
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  On 29 November 2020 the UAE Cabinet, chaired by Sheikh Mohammed
  bin Rashid Al Maktoum, approved the establishment of the UAE
  Cyber Security Council (CSC). Its mandate, as reported by state
  news agency WAM: develop a comprehensive national cyber-security
  strategy, help create a safe and strong cyber infrastructure,
  develop a legal and regulatory framework covering all types of
  cyber-crimes, secure existing and emerging technologies, and
  establish a "National Cyber Incident Response Plan". The CSC is
  chaired by the Head of Cyber Security for the UAE Government —
  the office held since July 2020 by Dr. Mohamed Hamad Al-Kuwaiti —
  and held its first meeting in January 2021.
false_flag_risk: none
summary: |
  Institutional-doctrine anchor event for the UAE digital-economy-
  protection doctrine entry. In AUSPEX taxonomy the CSC is the
  defensive / public-policy authority (national cyber-security
  strategy, federal incident-response coordination, international
  cyber diplomacy); SIGINT and offensive-coordination functions
  sit on the SIA / NESA side and the historical contractor layer,
  a functional split AUSPEX records separately. Recorded here for
  doctrine-timeline completeness; this is a government-body-creation
  policy event, not an operation, so attributions are empty.
