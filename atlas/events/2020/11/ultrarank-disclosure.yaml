id: 2020-11/ultrarank-disclosure
name: Group-IB consolidates UltraRank JS-skimming cluster
start_date: 2015-01-01
disclosure_date: 2020-08-27
end_date: 2020-08-27
incident_type:
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  In its August 2020 report, Group-IB consolidated three
  JS-sniffer campaigns — previously attributed by researchers
  to three separate Magecart clusters (Group 2, Group 5,
  Group 12) — into a single financially-motivated operator it
  named UltraRank. Group-IB identified 691 e-commerce websites
  plus 13 third-party website service providers infected over
  the group's five years of activity (the earliest campaign
  dating to 2015). The group monetized the harvested card data
  through its own affiliated card shop, ValidCC, whose revenue
  Group-IB reported exceeded $5,000 per day; Group-IB assessed
  the ValidCC administrator ("SPR") was probably a Russian
  speaker. A December 2020 Group-IB follow-up documented a new
  wave of ~12 further infected sites using the SnifLite
  sniffer.
false_flag_risk: none
summary: |
  The UltraRank consolidation is a canonical example of
  cluster-taxonomy reconciliation in the e-skimming ecosystem:
  activity split across multiple Magecart-numbered clusters
  (Group 2, Group 5, Group 12) was collapsed by Group-IB into
  a single operator entity through shared JS-sniffer families,
  TTPs, and infrastructure. Distinctively, UltraRank both stole
  the payment-card data and sold it, running its own affiliated
  ValidCC card shop rather than selling on to other carders.
  AUSPEX classifies as criminal-baseline (no documented state
  nexus).
