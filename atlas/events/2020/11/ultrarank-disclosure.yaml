id: 2020-11/ultrarank-disclosure
name: Group-IB consolidates UltraRank JS-skimming cluster
start_date: 2015-01-01
disclosure_date: 2020-11-12
end_date: 2020-11-12
incident_type:
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  Group-IB published the consolidated analysis of UltraRank,
  a Russian-speaking JS-skimming actor responsible for
  compromises across approximately 700 e-commerce sites
  since 2015, including the Volusion platform attack
  (Oct 2019) and the ValidCC carding marketplace as
  monetization channel. Group-IB attributes UltraRank as a
  single operator group often miscategorized as multiple
  separate Magecart numbered clusters (originally split
  by RiskIQ into Groups 1, 2, 5, and 12 at various points).
false_flag_risk: none
summary: |
  The UltraRank consolidation is the canonical example of
  cluster-taxonomy reconciliation in the e-skimming
  ecosystem: separate-cluster reporting by multiple vendors
  collapsed into a single operator entity through shared
  TTP and infrastructure analysis. AUSPEX classifies as
  criminal-baseline.
attributions:
