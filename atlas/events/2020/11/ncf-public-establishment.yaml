id: 2020-11/ncf-public-establishment
name: National Cyber Force publicly established (PM Commons statement)
start_date: 2020-11-19
disclosure_date: 2020-11-19
end_date: 2020-11-19
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Prime Minister Boris Johnson avowed the existence of the National
  Cyber Force in a statement to the House of Commons on the Integrated
  Review and defence spending. The NCF was "already operating in
  cyberspace" prior to the avowal; this is its public acknowledgement.
  It is a joint offensive-cyber body drawing together GCHQ, the Ministry
  of Defence, the Secret Intelligence Service (MI6) and the Defence
  Science and Technology Laboratory (Dstl) under one command for the
  first time, building on the pre-existing National Offensive Cyber
  Programme.
false_flag_risk: none
summary: |
  AUSPEX models the NCF stand-up as an institutional capability-
  establishment meta-event analogous to the ROK Cyber Command
  establishment (2010), and a companion to the December 2021 NCS 2022
  publication and the April 2023 "Responsible Cyber Power in Practice"
  paper: the event itself is a public establishment/avowal with no
  associated intrusion, but it anchors all downstream NCF operational
  tagging.

  Companion announcements in the same statement: a rise in defence
  spending of £24.1bn over four years (£16.5bn above the manifesto
  commitment), the framing of the UK as a "responsible cyber power,"
  and the subsequent March 2021 Integrated Review ("Global Britain in
  a Competitive Age") that codified the cyber posture.
