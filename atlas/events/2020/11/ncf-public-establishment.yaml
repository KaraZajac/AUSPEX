id: 2020-11/ncf-public-establishment
name: National Cyber Force publicly established (PM Commons statement)
start_date: 2020-11-19
disclosure_date: 2020-11-19
end_date: 2020-11-19
incident_type:
  - doctrine-publication
initial_vector: n/a
outcome_summary: |
  Prime Minister Boris Johnson formally announced the existence
  of the National Cyber Force in a Commons statement on the
  Integrated Review. The NCF had been operating in a low-profile
  capacity prior; this is the public acknowledgement and the
  declaration of intent to build a joint MoD-GCHQ offensive cyber
  capability at scale.
false_flag_risk: none
summary: |
  AUSPEX models the NCF stand-up as a doctrinal event analogous
  to the December 2022 NCS 2022 publication or the April 2023
  Responsible Cyber Power paper: the event itself is a public
  doctrinal act with no associated intrusion, but it anchors all
  downstream NCF operational tagging.

  Companion announcements: the parallel commitment to a £16.5bn
  defence-spending uplift (the largest in 30 years), the framing
  of the UK as a "responsible cyber power," and the subsequent
  March 2021 Integrated Review publication that codified the
  cyber posture.
