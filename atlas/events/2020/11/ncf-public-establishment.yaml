doctrine_links:
  - doctrine_id: uk/ncf-doctrine
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      The 19 November 2020 avowal IS the foundational establishment of
      the National Cyber Force, the joint offensive-cyber body this
      doctrine governs, and the gov.uk announcement states its terminal
      purpose in substance — an offensive/disruptive capability framed as
      the UK's "responsible cyber power." The three operational principles
      (accountable, precise, calibrated) and the "doctrine of cognitive
      effect" were elaborated later in the April 2023 "Responsible Cyber
      Power in Practice" paper; this event is the foundational act the
      doctrine file names as its companion.
    attesting_source_id: gov-uk/2020-11-19_ncf-transforms-cyber-capabilities
    inference_basis:
      source_quote: "the NCF plays a vital role in enhancing the UK's world-leading and responsible cyber power."
      source_id: gov-uk/2020-11-19_ncf-transforms-cyber-capabilities
    perspective: attacker-rationale
    contested: false
    analyst: claude
  - doctrine_id: uk/ncs-2022
    pillar_id: uk/ncs-2022/detect-disrupt-deter
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The NCF stand-up (Nov 2020) pre-dates NCS 2022 (published 15 Dec
      2021) by ~13 months, so this event cannot be the strategy's
      publication. But NCS 2022's Pillar 5 is the offensive / counter-
      adversary pillar that houses NCF operations, and it names the NCF as
      the very instrument of that pillar — so the establishment is the
      foundational operational expression of Pillar 5. Kept
      strongly_inferred (not attested): no source states that the Nov-2020
      establishment's PURPOSE was to serve a strategy that did not yet
      exist. Matches the sibling 2023-04/ncf-responsible-cyber-power
      event's identical Pillar-5 grading.
    attesting_source_id: gov-uk/2021-12-15_national-cyber-strategy-2022
    inference_basis:
      signals:
        - "NCS 2022 states the pillar goal verbatim: 'Pillar 5: Detecting, disrupting and deterring our adversaries to enhance UK security in and through cyberspace'."
        - "NCS 2022 names the NCF as the instrument of the pillar: 'The creation of the National Cyber Force last year represents a significant step-up in our offensive cyber capability'."
        - "The Nov-2020 gov.uk avowal frames the NCF as conducting 'cyber operations to disrupt hostile state activities, terrorists and criminals' — the detect-disrupt-deter posture Pillar 5 later codified."
      ruled_out: "The other four NCS 2022 pillars (ecosystem, resilience, technology, global leadership) — none house offensive / counter-adversary cyber operations, so the NCF maps only to Pillar 5."
    perspective: attacker-rationale
    contested: false
    analyst: claude
