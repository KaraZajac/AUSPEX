id: 2026-05/scarcruft-apt37-birdcall-multiplatform-supply-chain-compromise-of-a-ya
name: "ScarCruft (APT37) BirdCall multiplatform supply-chain compromise of a Yanbian gaming platform"
start_date: 2024-11-01
disclosure_date: 2026-05-05
incident_type:
  - supply-chain
  - espionage
  - surveillance
  - intrusion
initial_vector: supply-chain
false_flag_risk: none
summary: |
  ESET Research reported that ScarCruft (also known as APT37 or Reaper), a suspected North Korean espionage group, compromised a video-game platform (sqgame) used by ethnic Koreans living in the Yanbian Korean Autonomous Prefecture in China in a multiplatform supply-chain attack. The actor trojanized both Windows and Android game components distributed through the platform to deliver the BirdCall malware (Windows and Android variants — the Android port being internally named 'zhuagou', Chinese for 'catching dogs'), using RokRAT as an intermediate backdoor. The ultimate targets were ethnic Koreans in Yanbian deemed of interest to the North Korean regime — most likely refugees or defectors. ESET assessed the operation had probably been ongoing since late 2024 (the trojanized desktop update package was malicious since at least November 2024).
