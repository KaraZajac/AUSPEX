initial_vector: supply-chain
false_flag_risk: none
summary: |
  ESET Research reported that ScarCruft (also known as APT37 or Reaper), a suspected North Korean espionage group, compromised a video-game platform (sqgame) used by ethnic Koreans living in the Yanbian Korean Autonomous Prefecture in China in a supply-chain attack internally named 'zhuagou'. The actor trojanized both Windows and Android game components distributed through the platform to deliver the BirdCall malware (Windows and Android variants), using RokRAT as an intermediate backdoor. The ultimate targets were ethnic Koreans in Yanbian deemed of interest to the North Korean regime — most likely refugees or defectors. ESET assessed the operation had probably been ongoing since late 2024.
