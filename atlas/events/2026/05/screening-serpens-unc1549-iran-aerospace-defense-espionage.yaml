summary: |
  Palo Alto Networks Unit 42 disclosed (May 22 2026) an Iran-nexus espionage campaign by Screening Serpens (aka UNC1549, Smoke Sandstorm — the "Iranian Dream Job" cluster) running mid-February through April 2026, timed closely to the Middle East regional conflict that began Feb 28 2026. The actor used fake-recruitment social-engineering to target aerospace, defense-manufacturing, telecommunications and technology organizations in the United States, Israel and the United Arab Emirates, plus two additional Middle-Eastern entities. Unit 42 documented RAT payloads across two families — MiniUpdate (four variants) and MiniJunk V2 — and a new AppDomainManager-hijacking technique that manipulates the initialization phase of .NET applications to proactively disable their own security mechanisms via a legitimate configuration file. Sector/country pairings on the target list below are representative; the summary is authoritative on scope.
