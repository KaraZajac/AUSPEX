id: 2026-05/cisco-talos-discloses-uat-8302-china-nexus-espionage-against-south-ame
name: "Cisco Talos discloses UAT-8302 China-nexus espionage against South American and Southeastern European governments"
start_date: 2024-12-01   # approximate onset; Talos: targeting "since at least late 2024" (no exact date disclosed)
