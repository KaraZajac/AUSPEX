false_flag_risk: none
summary: |
  Cisco Talos discloses UAT-8302, assessed with high confidence as a China-nexus APT group tasked primarily with obtaining and maintaining long-term access to government and related entities worldwide. The actor has targeted government entities in South America since at least late 2024 and government agencies in Southeastern Europe in 2025. It deploys multiple malware families — including NetDraft, CloudSorcerer v3 and VSHELL — that overlap with tooling used by other China-aligned clusters such as Jewelbug/REF7707, Earth Estries, Earth Naga and UNC5174. Talos says UAT-8302 follows the same paradigm of exploiting both zero-day and n-day exploits for initial access but discloses no specific entry vector for this actor; post-compromise activity centres on reconnaissance, credential extraction and lateral movement with tools like Impacket.
