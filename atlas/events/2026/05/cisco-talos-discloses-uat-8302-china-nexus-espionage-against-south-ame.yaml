  notes: "Audited vs Cisco Talos blog (raw re-verified, sha256 cb108b44... matches the stored snapshot). FACTS OK verbatim: China-nexus APT at HIGH confidence; tasking = long-term access to govt + related entities worldwide; govt entities in South America since at least late 2024 + SE Europe in 2025; malware overlap NetDraft (Jewelbug/REF7707/CL-STA-0049/LongNosedGoblin), CloudSorcerer v3, VSHELL, Draculoader (Earth Estries/Earth Naga), SNOWLIGHT (UNC5174/UNC6586); 'same paradigm' of 0-day+n-day initial access with NO specific vector for this actor; Impacket recon/proliferation (event's 'lateral movement' = Talos's 'proliferates across endpoints'). CORRECTIONS: (1) attributing_org_confidence moderate->high (Talos states high confidence; old comment conflated the AUSPEX doctrine-link scale with ICD-203 org confidence). (2) Added attribution_level: nation (China nexus at high conf; 'UAT-' = uncategorized cluster, no MSS/PLA/service named — confirmed by 0 hits for MSS/Ministry of State Security/state security; 8 'pla' + 2 'state-sponsored' substring/teaser false-positives). (3) target country ar+rs -> null: Talos names only regions ('South America','southeastern Europe'), zero specific country names — the codes were unsourced inferences. (4) start_date 2026-05-01 -> 2024-12-01 (approx onset per 'since at least late 2024') + added disclosure_date 2026-05-05. (5) attribution_date 2026-05-01 -> 2026-05-05 and source published_on 2026-05-01 -> 2026-05-05 (article datePublished in raw HTML = 2026-05-05T10:00:30Z; 2026-05 month gave the slug). doctrine_link cn/bri/political-intelligence-collection kept strongly_inferred (NOT attested): Talos states only the proximate objective (govt access), not the BRI purpose; pillar text explicitly carries Latin America collection (APT15), supporting the inference; attesting_source_id null is consistent. actor_id cn/unscoped/uat-8302 resolves, not stale (no live cn/mss/uat-8302 FKs; only this event references it). Source raw_snapshot+content_sha256 preserved from the 2026-06-24 actor audit."
