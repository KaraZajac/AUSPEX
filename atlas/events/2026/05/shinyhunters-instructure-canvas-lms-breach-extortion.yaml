id: 2026-05/shinyhunters-instructure-canvas-lms-breach-extortion
name: "ShinyHunters breach and extortion of Instructure Canvas LMS — claimed 3.65 TB across ~9,000 institutions"
start_date: 2026-04-30      # exposure window opened ~30 Apr 2026 (Bitdefender / Reed Smith); Register dates detection to 29 Apr
disclosure_date: 2026-05-01  # Instructure CISO notified customers (Reed Smith)
end_date: 2026-05-11        # paid ransom agreement reached, one day before the deadline
incident_type:
  - data-theft
  - extortion
  - intrusion
initial_vector: unknown     # undisclosed, since-patched vulnerability in the Free-For-Teacher environment ("regarding support tickets"); technical mechanism not disclosed
false_flag_risk: none
summary: |
  Instructure — the US (Utah) educational-technology company behind the Canvas learning-management
  system — disclosed a breach of its Canvas platform when its CISO, Steve Proud, notified customers
  on May 1 2026; by May 2 the company said the situation had been "contained." The intruder had
  exploited an undisclosed, since-patched vulnerability in Canvas's free "Free-For-Teacher" account
  environment (reported as an issue "regarding support tickets"); Bitdefender dates the exposure
  window to 30 April–7 May 2026. On May 7 a second wave tied to the same incident defaced roughly
  330 Canvas login portals with extortion messages and set a May 12 leak deadline. The data-theft
  and extortion crew ShinyHunters publicly claimed the breach (a self-claim; Instructure did not name
  the group in its own notice) and claimed to have stolen roughly 3.65 TB of data affecting about
  9,000 educational institutions worldwide (Bitdefender counts 8,809) and as many as ~275 million
  individuals — students, teachers and staff — figures Instructure has not confirmed. Instructure
  confirmed only that names, email addresses, student ID numbers and some private messages between
  Canvas users were exposed, and said it found no evidence that passwords, dates of birth, government
  identifiers, financial information, or Canvas course content, submissions or credentials were
  involved. Instructure then took the controversial step of paying a ransom, reaching an agreement
  with ShinyHunters on May 11 2026 — one day before the deadline; the actors reportedly returned the
  stolen data and provided digital confirmation of its destruction (the ransom amount was not
  disclosed). This was ShinyHunters' second confirmed compromise of Instructure in roughly eight
  months, following a September 2025 social-engineering breach of the company's Salesforce
  environment. If the actor's scale figures held, the incident would rank among the largest
  education-sector breaches on record, but those figures remain the group's unverified claims.
