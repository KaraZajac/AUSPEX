    [a] FACTS — corrections: (1) initial_vector valid-creds -> unknown: the May 2026 intrusion
    exploited an UNDISCLOSED, since-patched vulnerability in the Free-For-Teacher environment ("an
    issue related to Free-For-Teacher accounts" / "regarding support tickets"; "Instructure has not
    disclosed the technical mechanism") — NOT valid-creds (that was the Sept 2025 Salesforce vector).
    (2) Stripped "billions of private messages" — absent from all 4 snapshots (0 hits for "billion");
    Instructure confirmed only "some private messages". (3) "shred logs" -> "digital confirmation of
    data destruction" (THN's actual phrasing; "shred logs" absent from all sources). (4) misleading
    "institutional course data / student records" -> the actual confirmed exposure (names, emails,
    student IDs, some private messages) plus the explicit not-compromised set (passwords, DOB, gov
    IDs, financial info, course content/submissions/credentials) — Bitdefender + THN verbatim. (5)
    275M reframed as the actor's claim of ~275 million INDIVIDUALS (Register: "more than 275 million
    students, teachers, and staff"; Bitdefender: "275 million users ... Instructure has not confirmed
    these figures") — THN alone labelled them "records". (6) 3.65 TB / ~9,000-institution figures
    marked as unverified actor claims (Bitdefender counts 8,809). Dropped an unsourced ~$10M ransom
