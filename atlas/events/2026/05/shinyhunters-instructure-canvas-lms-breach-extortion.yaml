summary: |
  Instructure disclosed (May 1 2026) a breach of its Canvas learning-management platform; the extortion group ShinyHunters claimed responsibility, alleging theft of more than 3.65 TB of data affecting roughly 9,000 educational institutions worldwide and as many as 275 million students, teachers and staff, along with billions of private messages — which, if the actor's figures are accurate, would rank among the largest education-sector breaches on record. The intrusion reportedly abused Canvas's "Free-For-Teacher" account program to reach institutional course data, student records and private communications. Instructure reached a ransom agreement with ShinyHunters on May 11 2026, one day before the threatened leak deadline; the actors reportedly returned the stolen data and supplied "shred logs" as proof of destruction. This was ShinyHunters' second compromise of Instructure within roughly eight months, following a September 2025 social-engineering breach of the company's Salesforce instance.
