summary: |
  Cisco Talos discloses UAT-7290, assessed with high confidence as a China-nexus APT active since 2022 targeting telecommunications infrastructure, primarily in South Asia with recent expansion into Southeastern Europe. Talos notes significant overlap in victimology, infrastructure and tooling with the group Recorded Future tracks as Red Foxtrot, which RF previously linked to PLA Unit 69010. The actor gains access via one-day exploits and target-specific SSH brute force against public-facing edge devices, using publicly available proof-of-concept exploit code. It deploys a Linux malware suite (RushDrop, DriveSwitch, SilentRaid, Bulbature) and builds Operational Relay Box infrastructure usable by other Chinese threat actors.
