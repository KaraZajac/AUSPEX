qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited vs the Cisco Talos blog (existing raw snapshot re-verified intact; on-disk sha256
    5dfd793e... matches the source's content_sha256). FACTS ✓ (all verbatim-supported): UAT-7290 a
    Talos-tracked China-nexus actor "active since at least 2022"; dual espionage + initial-access role;
    primarily targets South-Asian telecom providers, recent expansion into Southeastern Europe; access
    via one-day exploits + target-specific SSH brute force on public-facing edge devices using public
    PoC code; Linux suite RushDrop(=ChronosRAT)/DriveSwitch/SilentRaid(=MystRodX) + Bulbature (Sekoia
    late-2024) building ORBs reusable by other China-nexus actors; possible Windows RedLeaves(APT10
    overlap)/ShadowPad. incident_type and initial_vector(n-day) consistent with the source.
    DATE CORRECTIONS: (a) start_date 2026-01-01 -> 2022-01-01 (Talos: "active since at least 2022"; the
    old value conflated the disclosure year/month with the activity start). (b) Added disclosure_date
    2026-01-08 (article's real publish date: meta article:published_time 2026-01-08T11:00:03Z; byline
    "Thursday, January 8, 2026"). (c) attribution_date 2026-01-01 -> 2026-01-08. Source published_on
    also corrected 2026-01-01 -> 2026-01-08.
    ATTRIBUTION: Talos attributes ONLY to the China-nexus at HIGH confidence (verbatim quote captured)
    — a nation-level nexus, names no Chinese service ("MSS" appears zero times; no "moderate
    confidence" string anywhere). CORRECTIONS: attributing_org_confidence moderate -> high (the prior
    'moderate', tagged 'mapped from ICD link-confidence: strongly_inferred', wrongly put the AUSPEX
    service-chain confidence on the attributing-org field); added attribution_level: nation; removed
    the misleading inline ICD comment.
    *** cn/pla-ssf vs cn/unscoped FLAG (per memory + task) ***: this event carries actor_id
    cn/pla/uat-7290, whose cn/pla-ssf SERVICE is NOT supported by this Talos source. Talos's only unit
    reference is a hedged THIRD-PARTY overlap (UAT-7290 ~ Red Foxtrot by "significant overlap";
    Recorded Future 2021 "linked" Red Foxtrot to PLA Unit 69010). The PLA-SSF placement rests entirely
    on the MISP-galaxy DAGGER PANDA equivalence chain at the ACTOR level (MODERATE, overlap-based;
    documented in atlas/actors/cn/uat-7290.yaml, which already names cn/unscoped as the explicit
    fallback). I did NOT re-place the shared actor (FK resolves; verify_atlas PASS) and asserted no
    event-level service_id override (this source supports none). The event-level attribution now
    faithfully reflects the source: nation-level China-nexus. If the MISP synonym treatment is later
    revised, both the actor and this event's effective service fall back to cn/unscoped, NOT cn/mss.
    DOCTRINE LINKS: neither is attested (Talos states no strategic purpose beyond "espionage"), so no
    attesting_source_id required — correct. sigint-c4isr-collection kept strongly_inferred but reasoning
    softened (PLA framing is hedged, not load-bearing; SIGINT reading rests on the carrier-level telecom
    pattern + China-nexus) and a structured inference_basis{signals, ruled_out} added. bri/political-
    intelligence-collection kept plausible (a second surviving reading) with inference_basis{alternatives}
    added. Both pillar FKs resolve.
    TARGETS: sectors/ict/telecom ✓ (FK resolves). country: in (India) is a representative proxy for the
    source's "primarily in South Asia" — Talos names no specific country; kept as a documented-region
    stand-in, not a named victim. Southeastern-Europe expansion is mentioned in summary only (no second
    target row), acceptable given no country named.
