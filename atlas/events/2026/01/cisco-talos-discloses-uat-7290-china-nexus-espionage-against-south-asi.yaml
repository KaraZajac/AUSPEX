id: 2026-01/cisco-talos-discloses-uat-7290-china-nexus-espionage-against-south-asi
name: "Cisco Talos discloses UAT-7290 China-nexus espionage against South Asian telecom (Red Foxtrot / PLA Unit 69010 overlap)"
start_date: 2022-01-01   # Talos: UAT-7290 "active since at least 2022"; disclosure was 2026-01-08 (see disclosure_date)
disclosure_date: 2026-01-08
incident_type:
  - espionage
