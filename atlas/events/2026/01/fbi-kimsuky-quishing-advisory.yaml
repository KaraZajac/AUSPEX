id: 2026-01/fbi-kimsuky-quishing-advisory
name: FBI CSA 260108 — Kimsuky malicious QR-code spearphishing of US think tanks and policy orgs
start_date: 2025-05-01  # FBI-stated campaign onset
disclosure_date: 2026-01-08
end_date: null
incident_type:
  - intrusion
  - influence-operation
initial_vector: phishing
outcome_summary: |
  FBI Cybersecurity Advisory 260108 warned NGOs, think tanks,
  academic institutions, and foreign-policy experts that the
  RGB-attributed Kimsuky cluster has shifted to "quishing" —
  QR-code spearphishing — to drive victims from corporate
  endpoints to mobile devices and bypass enterprise email
  filtering. Observed May-June 2025 lures impersonated foreign
  advisors, embassy officials, and conference organisers
  inviting victims to scan QR codes leading to credential-
  harvesting pages mimicking Microsoft 365, Google, Okta, and
  VPN login portals.
false_flag_risk: none
summary: |
  Continues Kimsuky's two-decade policy-collection lineage with
  a new mobile-device pivot. The QR-code vector exploits the
  fact that scanning typically occurs on personal phones outside
  enterprise email-security perimeters. The FBI advisory is
  notable for naming Kimsuky directly rather than using a
  cluster-agnostic "DPRK-affiliated" framing.
