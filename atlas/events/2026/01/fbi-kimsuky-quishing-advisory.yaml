id: 2026-01/fbi-kimsuky-quishing-advisory
name: FBI FLASH AC-000001-MW — Kimsuky malicious QR-code (quishing) spearphishing of US think tanks and policy orgs
start_date: 2025-05-01  # FBI-stated earliest documented incident ("In May 2025")
disclosure_date: 2026-01-08  # FLASH masthead "08 JANUARY 2026"
end_date: null  # FBI frames quishing as an ongoing/emerging vector; no campaign end stated
incident_type:
  # AUDIT 2026-07-10: was [intrusion, influence-operation]. This event IS the FBI FLASH
  # documenting a Kimsuky campaign -> documentary (cf. babar/mandiant-apt43 precedent).
  # espionage = Kimsuky's activity (every Kimsuky campaign event). Dropped influence-operation
  # (WRONG: credential-harvesting espionage for policy collection, not an influence op) and
  # intrusion (subsumed; documentary-espionage disclosures omit it).
  - documentary
  - espionage
initial_vector: phishing  # FBI: "Quishing (QR Code Phishing) is a phishing technique"
outcome_summary: |
  FBI FLASH AC-000001-MW (08 January 2026, coordinated with
  DHS/CISA, TLP:CLEAR) alerted NGOs, think tanks, academia, and
  foreign-policy experts "with a nexus to North Korea" that the
  North Korean state-sponsored Kimsuky group has adopted
  "quishing" — QR-code spearphishing — to force victims to pivot
  from their corporate endpoint to a mobile device, bypassing
  traditional email security controls. Observed May-June 2025
  lures impersonated a foreign advisor, an embassy employee, a
  think-tank employee, and a non-existent conference, inviting
  victims to scan QR codes leading to credential-harvesting pages
  impersonating Microsoft 365, Okta, VPN portals, and Google.
false_flag_risk: none
summary: |
  Continues Kimsuky's decade-plus (since ~2012) policy-collection
  lineage with a new mobile-device pivot. The QR-code vector
  exploits the fact that scanning typically occurs on unmanaged
  mobile devices outside enterprise EDR and email-security
  perimeters. The FBI FLASH is notable for naming Kimsuky directly
  rather than using a cluster-agnostic "DPRK-affiliated" framing —
  though it stops at the "North Korean state-sponsored" group level
  and does not name RGB (that mapping is AUSPEX's, via CISA/Treasury/
  Mandiant, not asserted by this FLASH).
