  notes: |
    PHANTOM-REMEDIATION audit. Path taken: RE-SOURCE (badrabbit model).
    The event is real and well-documented; the citation was a phantom.

    [STEP 0 — triage] The sole cited source treasury/2026-01-15_zedcex-
    zedxion had url https://home.treasury.gov/news/ — curl -sL returned
    HTTP 200 but redirected to the /news/press-releases catalogue (title
    "Press Releases | U.S. Department of the Treasury"), zero Zedcex/
    Zedxion mentions. PHANTOM confirmed; no content hash recorded for
    the catalogue. The source record already carried a 2026-06-19 URL
    FLAG (which wrongly guessed sb0519/Nobitex).

    [STEP 0b — decide] Real event. Re-sourced to the genuine OFAC
    primary. Press release sb0375 (https://home.treasury.gov/news/
    press-releases/sb0375) curl-fetched HTTP 200, 131,370 bytes,
    sha256 b9e5c117…14e24759; mentions Zedcex 12x, Zedxion 12x, Zanjani
    20x. Added the OFAC Recent Actions / SDN listing recent-actions/
    20260130 (https://ofac.treasury.gov/recent-actions/20260130) HTTP
    200, 48,322 bytes, sha256 0cf30be3…829900fe, as a second primary.
    treasury.gov did NOT bot-wall the fetcher, both snapshotted -> full.

    [a] FACTS — every claim now carried by the sb0375 snapshot
    (verbatim): "for the first time, OFAC designated two digital asset
    exchanges linked to Zanjani that have processed large volumes of
    funds associated with IRGC-linked counterparties"; "This marks
    OFAC's first designation of a digital asset exchange for operating
    in the financial sector of the Iranian economy"; "Zedcex Exchange,
    Ltd. (Zedcex) and Zedxion Exchange, Ltd. (Zedxion) are two
    UK-registered digital asset exchanges with connections to Zanjani";
    "Since its registration in August 2022, Zedcex has processed over
    $94 billion in transactions"; "When Zedxion was registered in May
    2021, it initially listed Zanjani as its director"; "Multiple Zedcex
    and Zedxion-attributed addresses have processed funds for wallets
    linked to the IRGC"; "Freed from imprisonment in order to launder
    money for the regime…"; designations "pursuant to E.O. 13902 for
    operating in the financial sector of the economy of Iran" and "E.O.
    13224, as amended, for having materially assisted… the IRGC"; blocking
    boilerplate "all property and interests in property… are blocked".
    SDN listing (recent-actions snapshot) confirms ZEDCEX EXCHANGE LTD /
    ZEDXION EXCHANGE LTD (London, 71-75 Shelton St; zedcex.com /
    zedxion.io) and ZANJANI, Babak Morteza all "Linked To: ISLAMIC
    REVOLUTIONARY GUARD CORPS", "Subject to Secondary Sanctions".
    STRIPPED as fabricated / unsupported (absent from BOTH snapshots):
    (1) "Pioneer Kitten / Fox Kitten ransomware-affiliate brokerage
    revenue" and the "cash out proceeds of IRGC-aligned cyber
    operations" framing — zero hits; OFAC's basis is financial-sector
    operation + IRGC material support + money laundering, not cyber-op
    proceeds. (2) the claim that this builds on / was "previously
    sanctioned in the September 2025 shadow-banking action" — sb0375
    does not reference the September action (no "September"/"shadow"
    match); dropped the Treasury-attributed cross-ref (the doctrinal
    continuity remains via the crypto-laundering pillar, not asserted as
    Treasury's words). (3) "closes the loophole identified in Chainalysis
    and Elliptic blockchain-tracing reports" — not in the release;
    removed.

    [b] ATTRIBUTION — govt designation = high confidence, concur.
    actor_id null (counter-action), service_id ir/irgc, attributing_org
    US Treasury OFAC. IRGC named explicitly in both primaries.

    [c] DATES — CORRECTED 2026-01-15 -> 2026-01-30 on start/disclosure/
