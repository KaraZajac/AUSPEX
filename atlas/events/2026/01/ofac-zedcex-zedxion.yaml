initial_vector: unknown
outcome_summary: |
  First OFAC designation of a digital asset exchange for operating in
  the financial sector of the Iranian economy. Iranian financier Babak
  Morteza Zanjani and two UK-registered exchanges connected to him —
  Zedcex Exchange Ltd and Zedxion Exchange Ltd — were added to the SDN
  List under E.O. 13902 (Iran financial sector) and E.O. 13224
  (material support to the IRGC) for processing funds tied to
  IRGC-linked wallets. All property in U.S. jurisdiction is blocked and
  the exchange entries are flagged subject to secondary sanctions.
false_flag_risk: none
summary: |
  On 30 January 2026 the U.S. Treasury's Office of Foreign Assets
  Control (OFAC) designated Babak Morteza Zanjani — an Iranian
  businessman and sanctions evader sentenced to death in Iran in March
  2016 for embezzling billions from the National Iranian Oil Company
  (sentence commuted in 2024) — together with two UK-registered digital
  asset exchanges connected to him: Zedcex Exchange Ltd (zedcex.com)
  and Zedxion Exchange Ltd, a.k.a. Zedxion Limited (zedxion.io). Per
  OFAC, Zanjani was "freed from imprisonment in order to launder money
  for the regime" and has provided financial backing for projects
  supporting the Islamic Revolutionary Guard Corps (IRGC). Zedxion
  initially listed Zanjani as its director when it was registered in
  May 2021, and Zedcex has processed over $94 billion in transactions
  since its August 2022 registration. OFAC stated that "multiple Zedcex
  and Zedxion-attributed addresses have processed funds for wallets
  linked to the IRGC," and described the action as "OFAC's first
  designation of a digital asset exchange for operating in the
  financial sector of the Iranian economy." Both exchanges and Zanjani
  were designated under E.O. 13902 (operating in Iran's financial
  sector) and E.O. 13224 (materially supporting the IRGC). The
  designations were part of a broader 30 January 2026 Iran package
  (press release sb0375) that also sanctioned IRGC and security-force
  officials for the violent suppression of protests.
