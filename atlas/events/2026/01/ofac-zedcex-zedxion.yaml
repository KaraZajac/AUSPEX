id: 2026-01/ofac-zedcex-zedxion
name: OFAC designates Zedcex / Zedxion — first IRGC-linked exchange SDN
start_date: 2026-01-15
disclosure_date: 2026-01-15
end_date: 2026-01-15
incident_type:
  - influence-operation
initial_vector: unknown
outcome_summary: |
  First-ever OFAC designation of IRGC-linked digital-asset
  exchange infrastructure. Zedcex / Zedxion designated for
  facilitating IRGC sanctions evasion.
false_flag_risk: none
summary: |
  Milestone designation moving OFAC enforcement from IRGC-
  affiliated individuals and facilitators to IRGC-linked exchange
  infrastructure itself. Treasury's press release identifies
  Zedcex / Zedxion as an exchange used to cash out proceeds of
  IRGC-aligned cyber operations — including Pioneer Kitten /
  Fox Kitten ransomware-affiliate brokerage revenue and the
  broader IRGC sanctions-evasion crypto-laundering pipeline
  previously sanctioned in the September 2025 shadow-banking
  action. The designation closes the on-/off-ramp loophole
  identified in Chainalysis and Elliptic blockchain-tracing
  reports.
