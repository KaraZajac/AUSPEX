summary: |
  Structural AUSPEX-baseline document. Following the UN PoE
  mandate expiration in April 2024, this State Department
  release re-establishes a primary-source consolidated
  assessment of DPRK cyber and IT-worker sanctions evasion.
  The Multilateral Sanctions Monitoring Team (MSMT) supplies
  the analytic substrate. Documents the full $6B+ cumulative
  DPRK crypto-theft figure with USG endorsement.
