outcome_summary: |
  State Department Fact Sheet "The Democratic People's
  Republic of Korea's Violations and Evasions of UN Sanctions
  through Cyber and IT Worker Activities" (Office of the
  Spokesperson, 12 Jan 2026), issued at the United Nations to
  highlight the Multilateral Sanctions Monitoring Team (MSMT)
  report first released in October 2025. Carries the DPRK
  WMD/ballistic-missile-financing attestation with US-government
  imprimatur in the post-UN-PoE era (the UN 1718 Panel of
  Experts mandate ended April 2024).
false_flag_risk: none
summary: |
  Structural AUSPEX-baseline document. A US State Department
  Fact Sheet (12 Jan 2026) endorsing and summarizing the MSMT
  report — an unprecedented 140-page compilation drawing on
  previously non-public information from 11 UN member states
  participating in the MSMT and nine private-sector companies.
  The Fact Sheet finds that DPRK malicious cyber and IT-worker
  activities generate revenue for the regime's unlawful WMD and
  ballistic-missile programs, and reports DPRK cyber actors
  stole at least $2.8B from cryptocurrency companies and their
  customers from Jan 2024 to Sept 2025 across more than 40
  heists — over $2B in 2025 alone, including a further $400M in
  the three months after the report's release. Following the UN
  1718 Panel of Experts mandate expiration in April 2024, the
  MSMT supplies the analytic substrate that functionally
  substitutes for the discontinued UN reporting baseline.
