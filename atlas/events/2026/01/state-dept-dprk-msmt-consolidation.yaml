    [a] FACTS — corrected. (i) DATE: the Fact Sheet is bylined
    "Office of the Spokesperson / January 12, 2026", not the 15th recorded
    — fixed start/disclosure/end_date to 2026-01-12 and the source
    published_on to 2026-01-12 (was 2026-01-15 "approximate"). (ii) The
    prior summary's "$6B+ cumulative DPRK crypto-theft figure with USG
    endorsement" is UNSUPPORTED by either cited source (grep of the raw:
    the ONLY dollar figures are "$400 million" additional in the three
    months since release, "more than $2 billion" total in 2025, and
    "at least $2.8 billion from Jan. 2024 – Sept. 2025" across "over 40
    cryptocurrency heists"). The $6B reads as an undisclosed cross-source
    sum (PoE ~$3B + MSMT $2.8B); presenting a derived total as a figure
    the document "documents with USG endorsement" is unsupportable —
    STRIPPED and replaced with the source-exact figures. (iii) Reframed
    the document from a standalone "consolidated assessment" to what it
    is: a State Dept Fact Sheet issued at the UN highlighting the MSMT
    report. MSMT facts VERIFIED verbatim: "Multilateral Sanctions
    Monitoring Team (MSMT)" named in full; report "First released in
    October"; "140 pages of previously non-public information from 11 UN
    member states participating in MSMT and nine private sector companies";
    facilitator networks in China, Russia, Cambodia, Vietnam and the UAE;
    "at least 19 Chinese banks"; "Over-the-counter traders in China".

    [b] ATTRIBUTION — attributions: [] (documentary/meta event, no
    perpetrator). Correct and unchanged.

