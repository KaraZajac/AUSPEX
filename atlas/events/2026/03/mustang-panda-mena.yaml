      cluster, "the China-aligned threat actor TA416" ("Proofpoint observed
      TA416 conduct multiple campaigns targeting government and diplomatic
      entities within the Middle East") — nation-level China nexus,
      named-actor cluster, NO Chinese service (MSS) named (grep "ministry of
