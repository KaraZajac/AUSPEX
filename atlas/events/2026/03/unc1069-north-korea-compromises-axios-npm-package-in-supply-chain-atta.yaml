summary: |
  Google Threat Intelligence Group (GTIG) attributed a supply-chain compromise of the widely used axios npm package (100M+ weekly downloads) to UNC1069, a financially motivated North Korea-nexus actor. On 31 March 2026 the attacker pushed malicious axios releases (1.14.1 and 0.30.4) containing a malicious dependency 'plain-crypto-js' (SILKBELL dropper) that deployed OS-specific WAVESHAPER.V2 backdoors for Windows, macOS, and Linux, supporting reconnaissance, command execution, and PE injection. The maintainer account was taken over via tailored social engineering. UNC1069 overlaps with BlueNoroff/Sapphire Sleet/Stardust Chollima but is tracked distinctly by Google; not currently in the corpus.
