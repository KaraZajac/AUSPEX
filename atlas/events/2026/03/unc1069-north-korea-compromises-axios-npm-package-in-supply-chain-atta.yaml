  notes: "Audited vs GTIG blog (raw captured, sha 92c0b617…). FACTS OK: axios 1.14.1/0.30.4, plain-crypto-js dependency, SILKBELL (setup.js) dropper, WAVESHAPER.V2 cross-platform backdoors (recon/cmd-exec/PE-injection), 31 Mar 2026 00:21–03:20 UTC, 100M+/83M weekly downloads — all verbatim. CORRECTIONS: (1) removed unsupported 'taken over via tailored social engineering' — source states maintainer-account compromise + attacker-controlled email change but NOT the mechanism (term absent from raw); reworded to attested wording + attribution basis (WAVESHAPER lineage + AstrillVPN/ASN infra overlap). (2) removed stale 'not currently in the corpus' — UNC1069 IS in-corpus as an equivalent alias of kp/rgb/bluenoroff, which is this event's actor_id; clarified the mapping. (3) attributing_org 'cloudgoogle' (publisher slug) → 'Google Threat Intelligence Group' (the article byline org; readable-name convention used elsewhere). (4) added attribution_level: named-actor — source names UNC1069/NK-nexus, does NOT name a DPRK service or the RGB, so no service_id added here (the actor's RGB placement rests on the OFAC source in the actor record, not this blog). ATTRIBUTION: GTIG moderate (infra + malware-evolution overlap) retained. doctrine_link kp/office-39-sanctions-evasion/laundering-network = strongly_inferred is correct: source states only the PROXIMATE purpose ('financially motivated'), no revenue/WMD/sanctions-evasion language, so not attested; attesting_source_id null is gate-correct. published_on 2026-03-31 confirmed (datePublished). ACTOR NOTE: kp/rgb/bluenoroff default_doctrine_alignment_ids are 8th-congress/byungjin (not office-39); office-39 is a valid secondary financial-revenue doctrine here. All FKs resolve (actor, doctrine, pillar, sector ict/software, source). Source tier secondary unchanged."
