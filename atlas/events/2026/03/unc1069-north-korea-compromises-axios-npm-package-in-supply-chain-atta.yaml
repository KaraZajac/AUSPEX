id: 2026-03/unc1069-north-korea-compromises-axios-npm-package-in-supply-chain-atta
name: "UNC1069 (North Korea) compromises axios npm package in supply-chain attack (WAVESHAPER.V2)"
start_date: 2026-03-31
incident_type:
  - supply-chain
  - intrusion
initial_vector: supply-chain
false_flag_risk: none
summary: |
  Google Threat Intelligence Group (GTIG) attributed a supply-chain compromise of the widely used axios npm package (100M+ weekly downloads for 1.14.1; 83M+ for 0.30.4) to UNC1069, a financially motivated North Korea-nexus actor active since at least 2018. Between 00:21 and 03:20 UTC on 31 March 2026 the attacker pushed malicious axios releases (1.14.1 and 0.30.4) carrying a malicious dependency 'plain-crypto-js' (the SILKBELL dropper, setup.js) that, via an NPM postinstall hook, deployed OS-specific WAVESHAPER.V2 backdoors for Windows, macOS, and Linux, supporting reconnaissance, command execution, in-memory PE injection, and file enumeration. GTIG assessed the axios maintainer account was compromised (its email changed to an attacker-controlled address); the takeover mechanism is not detailed in the source. Attribution rests on WAVESHAPER.V2 (an evolution of WAVESHAPER previously attributed to UNC1069) and C2/AstrillVPN infrastructure overlaps with prior UNC1069 activity. UNC1069 overlaps with BlueNoroff/Sapphire Sleet/Stardust Chollima; AUSPEX maps it to kp/rgb/bluenoroff (an equivalent alias) rather than tracking a separate slug.
