  notes: |
    Audited vs the Volexity primary "VerdantBamboo: Just Another BRICKSTORM in the Firewall" (2026-06-04; raw HTTP 200, 81,669 bytes, sha256 1e9fd60b..bc1e1b93) — ADDED this audit as the primary source — and the previously sole-cited BleepingComputer secondary (2026-06-05; raw 90,637 bytes, sha256 c500a3a4..fd34770f). NOT a phantom: both snapshots are the real, on-point articles and the event is genuine (it post-dates the Jan-2026 model cutoff; confirmed live via web search + curl). PATH TAKEN: RE-SOURCE (badrabbit model) — a single-secondary-source event upgraded with the Volexity primary; attribution_source_id and the disclosure/attribution dates re-pointed to it.
    [a] FACTS: BRICKSTORM Go+Rust confirmed ("variants written initially in Golang and later in Rust") plus a FreeBSD variant on the MSP pfSense ("FreeBSD compatible variant of the backdoor"); PLENET = .NET-Native-AOT, aka Google's "Grimbolt" ("PLENET (aka GRIMBOLT)"); AGENTPSD = Python fallback backdoor — all verbatim-supported. M365 reached via BRICKSTORM SOCKS proxy + stolen creds to "blend in ... and evade Conditional Access policies" (high conf on that purpose). 18-month dwell confirmed ("the initial compromise had actually occurred at least 18 months earlier"; firewall "also ... compromised at least 18 months earlier"). CORRECTIONS: (1) "Volexity — with Google and CISA — disclosed" overstated joint disclosure -> rewritten: Volexity is the sole discloser; Google (Apr-2024, Sep-2025) and CISA (VMware vSphere) SEPARATELY reported BRICKSTORM/UNC5221, and Google independently named PLENET=Grimbolt. (2) "compromised both ... simultaneously — a supply-chain pivot to reach the target" asserted as fact -> downgraded to Volexity's own calibration: victim + MSP each compromised >=18 months earlier; MSP credential/infrastructure access at HIGH confidence, but the victim-breached-VIA-MSP pivot only MEDIUM confidence ("Volexity assesses with medium confidence that the victim organization had been compromised by way of VerdantBamboo's breach of the MSP"). (3) The "US legal / SaaS / BPO / tech" victimology is Google's Sept-2025 characterization of the broader UNC5221 campaign (carried by BleepingComputer), NOT Volexity's single named victim (whose sector Volexity does not name) — summary reframed to attribute the sector spread to Google's reporting; targets[] (legal, ict/software, ict/managed-services) retained as source-carried by the cited article, with managed-services also directly = Volexity's own MSP finding.
    [b] ATTRIBUTION: Volexity flatly attributes to "a Chinese threat actor, which Volexity tracks as VerdantBamboo (WARP PANDA, UNC5221)" — unhedged Chinese nexus (-> attributing_org_confidence high, retained); named cluster + nation, NO MSS/PLA/unit named. attributing_org retained (Volexity); attribution_source_id re-pointed bleepingcomputer -> volexity primary; attribution_date 2026-06-05 -> 2026-06-04. auspex_assessment concur-with-caveat retained (concur on the China-nexus/named-actor finding; caveat = AUSPEX has not resolved the cluster to a service and models actor_id null).
    [c] DATES: start_date 2024-12-01 (approx 9 months, too late; its inline comment also wrongly said "2026 detection") -> 2024-03-01 (approx 18 months before Volexity's ~Sept-2025 investigation; floor estimate, "at least" so possibly earlier). disclosure_date 2026-06-05 -> 2026-06-04 (Volexity primary; BleepingComputer followed 06-05). Detection occurred in 2025, NOT 2026 — 2026-06 is the DISCLOSURE, not detection. Source published_on values unchanged (BleepingComputer 2026-06-05 correct; new Volexity record 2026-06-04, URL /2026/06/04/).
    [d] DOCTRINE_LINKS: cn/national-intelligence-law-2017/compelled-vendor-cooperation HELD at strongly_inferred (matches all three sibling BRICKSTORM events); attesting_source_id null is correct — NO cited source states the strategic goal, so NOT attested. Reasoning tightened to reflect the medium-confidence MSP pivot; ADDED inference_basis{signals[], ruled_out} to ground the strongly_inferred label (competing cn/intelligentized-warfare SIGINT reading ruled out as purpose-not-mechanism). No doctrine invented; doctrine matches the attacker state (cn) so no perspective tag needed.
    [e] ATTRIBUTION_LEVEL: was MISSING -> set named-actor. Volexity names VerdantBamboo (a proper named cluster, not a bare UNC number) + Chinese nexus, and equates it with WARP PANDA (already named-actor in the corpus) and UNC5221 — matching the Agrius / WARP-PANDA precedent (named vendor cluster + nation = named-actor). Alternative reading (activity-cluster, weighting Mandiant's UNC="uncategorized") considered but rejected: the attributing org for THIS attribution is Volexity, whose designation is a named China-nexus cluster.
    [f] ACTOR_ID: null resolves trivially (no FK). FLAG for orchestrator/Kara: cn/unscoped/warp-panda (CrowdStrike's WARP PANDA) is the existing AUSPEX actor, and Volexity (June 2026) now DOCUMENTS VerdantBamboo == WARP PANDA == UNC5221. Four events — this one + 2025-09/mandiant-brickstorm-saas-legal + 2025-04/ivanti-cve-2025-22457-unc5221 + 2025-12/cisa-nsa-cccs-brickstorm-advisory — all carry actor_id null "pending cluster consolidation"; that consolidation is now source-supported. RECOMMEND deciding whether to point these four events' attributions to cn/unscoped/warp-panda and to add VerdantBamboo + UNC5221 aliases to atlas/actors/cn/warp-panda.yaml. Not done here (kept null for cross-event consistency; no actor-file edits per protocol).
    RESIDUAL: initial_vector left unset — Volexity states the original access vector only at medium confidence (MSP pivot) and could not determine how the web-SSL-VPN foothold was first obtained ("logs did not go back far enough"); no 0-day is claimed for THIS specific victim, so no vector is asserted. incident_type data-theft retained as an espionage-collection inference from the documented M365 access (Volexity documents access + proxying, not an explicitly quantified exfiltration); supply-chain rests partly on the medium-confidence MSP pivot but the MSP compromise itself is high-confidence.
