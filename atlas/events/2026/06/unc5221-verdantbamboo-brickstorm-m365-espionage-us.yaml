false_flag_risk: none
summary: |
  Volexity disclosed (June 4 2026) a long-running China-nexus espionage operation it tracks as VerdantBamboo — which it equates with UNC5221 (Mandiant/Google) and WARP PANDA (CrowdStrike) — that accessed a US victim organization's Microsoft 365 environment using the BRICKSTORM backdoor (Go and Rust variants, plus a FreeBSD variant found on the managed service provider's pfSense firewall) together with two previously undocumented malware families: PLENET (a .NET-Native-AOT backdoor that Google tracks as "Grimbolt") and AGENTPSD (a Python fallback backdoor). From a compromised Egnyte Storage Sync appliance the actor used BRICKSTORM's SOCKS proxy and stolen credentials to reach M365 and evade Conditional Access policies. Volexity found that both the victim and its managed service provider had each been compromised at least 18 months before detection, and assesses with medium confidence that the victim was breached by way of the MSP (with high confidence that the actor obtained MSP credentials and infrastructure usable to do so). The BRICKSTORM/UNC5221 activity has been separately reported by Google (April 2024; and September 2025 — describing targeting of US legal services, SaaS providers, business-process outsourcers and technology firms) and by CISA (VMware vSphere), and Google independently named PLENET as Grimbolt. The UNC5221 + BRICKSTORM footprint is the canonical PRC edge/cloud-access operator cluster also seen in the 2024–2025 Ivanti / F5 / VMware appliance campaigns.
