id: 2026-06/unc5221-verdantbamboo-brickstorm-m365-espionage-us
name: "Volexity discloses UNC5221 (VerdantBamboo) BRICKSTORM M365 espionage against US legal, SaaS and tech firms"
start_date: 2024-03-01        # approximate onset: Volexity found the Storage Sync appliance AND the MSP firewall each compromised "at least 18 months" before its ~Sept-2025 investigation (floor estimate; "at least", so possibly earlier)
