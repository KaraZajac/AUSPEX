summary: |
  Volexity — with Google and CISA — disclosed (June 5 2026) a long-running China-nexus espionage operation tracked as UNC5221 (VerdantBamboo) that accessed victims' Microsoft 365 environments using the BRICKSTORM backdoor (Go and Rust variants) alongside two previously undocumented malware families, Plenet (also "Grimbolt") and AgentPSD. The intrusion persisted at least 18 months before detection, and the actor compromised both the victim organization and its managed service provider simultaneously — a supply-chain pivot to reach the target. Reported victims span US legal services, SaaS providers, business-process outsourcers and technology firms. The UNC5221 + BRICKSTORM footprint is the canonical PRC edge/cloud-access operator cluster also seen in the 2024–2025 Ivanti / F5 / VMware appliance campaigns.
