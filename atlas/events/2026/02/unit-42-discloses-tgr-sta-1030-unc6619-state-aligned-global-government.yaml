initial_vector: phishing
false_flag_risk: none
summary: |
  Unit 42 discloses the 'Shadow Campaigns' conducted by TGR-STA-1030 (also tracked as UNC6619), assessed with high confidence as a state-aligned group operating out of Asia — Unit 42 explicitly declines to attribute it to a specific country and uses TGR-STA as a temporary placeholder. Active since at least January 2024, the group has compromised at least 70 organizations across 37 countries (with reconnaissance against government infrastructure in 155 countries in Nov-Dec 2025), targeting government ministries (interior, foreign affairs, finance, trade, economy, immigration, mining, justice, energy), law enforcement/border control, telecommunications and critical infrastructure. Initial access is via spear-phishing (e.g., ministry-reorganization lures delivering the Diaoyu Loader from mega[.]nz) and n-day exploitation (e.g., CVE-2019-11580 Atlassian Crowd, plus Exchange, D-Link, SAP), with Cobalt Strike and VShell for C2. Circumstantial indicators include GMT+8 operational timing and upstream connections from AS 9808; one operator used the handle 'JackMa' (identity unconfirmed).
