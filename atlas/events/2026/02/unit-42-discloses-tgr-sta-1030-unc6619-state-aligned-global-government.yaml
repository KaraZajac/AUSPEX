  notes: |
    Audited vs the Unit 42 "Shadow Campaigns" report (raw snapshot captured + content_sha256
    864a90c154ffe634bb3931cd9c5ca693afb6b7b96a0aa142fa459fc620b2ab4e). FACTS confirmed verbatim:
    "high confidence that TGR-STA-1030 is a state-aligned group that operates out of Asia"; aka
    UNC6619; active "as far back as January 2024"; "at least 70 organizations across 37 countries";
    reconnaissance "across 155 countries between November and December 2025"; spear-phishing with
    ministry/department-reorganization lures linking to files on mega[.]nz; Diaoyu Loader
    (DiaoYu.exe) -> Cobalt Strike, later transition to VShell (Go C2); CVE-2019-11580 (Atlassian
    Crowd) on an MFA e-passport/e-visa server; Exchange/D-Link/SAP among n-day ATP detections;
    GMT+8 activity alignment; direct connections from AS 9808 ("ISP in the group's region");
    operator handle "JackMa" (Unit 42 only notes it "could refer to" the Alibaba founder = identity
    unconfirmed). ATTRIBUTION correctly NOT over-claimed: Unit 42 EXPLICITLY declines country
    attribution -- "We use the prefix TGR-STA as a placeholder to denote a temporary group of
    state-aligned activity while we continue to refine attribution to a specific organization" --
    so NO nation and NO service. Added attribution_level: activity-cluster (was missing). The MISP
    galaxy canonical entry for UNC6619 (uuid 1006069d-722f-4149-8609-2d524b8ba9dd) ALSO carries NO
    country field (contrast APT40: country=CN) -- the cn/ placement is the atlas's own tentative
    theory-test inference, not a sourced attribution; attributing_org_confidence held at moderate.
    Doctrine link held at plausible + contested (NOT upgraded): Unit 42 states espionage purpose and
    an economic-partnership pattern but names no nation, so the PRC SIGINT/C4ISR "why" rests only on
    the tentative cn placement -- honest, attesting_source_id stays null.
