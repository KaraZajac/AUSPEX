id: 2026-02/unit-42-discloses-tgr-sta-1030-unc6619-state-aligned-global-government
name: "Unit 42 discloses TGR-STA-1030 (UNC6619) state-aligned global government-espionage campaign across 37 countries (Shadow Campaigns)"
start_date: 2026-02-01   # disclosure-month best-estimate placeholder; the documented campaign ("Shadow Campaigns") runs from infrastructure dating "as far back as January 2024" per Unit 42 — start held at placeholder, real activity-start noted in qc. 2026-06-25 audit.
