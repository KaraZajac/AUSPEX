    attributing_org_confidence: moderate   # Unit 42 is "high confidence" only that the group is state-aligned/out-of-Asia; it explicitly DECLINES country attribution -> AUSPEX holds the who-attribution at moderate (no nation, no service). Set 2026-06-25 audit.
    attribution_level: activity-cluster    # Unit 42 uses "TGR-STA" as a temporary placeholder for a cluster of state-aligned activity while it "continue[s] to refine attribution to a specific organization" — it names NO nation and NO service/unit. Set 2026-06-25 audit.
    auspex_assessment: partial
