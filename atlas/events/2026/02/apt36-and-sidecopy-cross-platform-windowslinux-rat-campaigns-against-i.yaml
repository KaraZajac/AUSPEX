    one actor (pk/unscoped/sidecopy) while both summary and source explicitly co-name TWO clusters —
    "attributed to Pakistan-aligned threat clusters tracked as SideCopy and APT36 (aka Transparent
    Tribe)", with DeskRAT attributed specifically to APT36. ADDED the missing second actor
    pk/unscoped/transparent-tribe (APT36) to attributions[]. Added attribution_level: named-actor to
    both (source names both clusters). ATTRIBUTION: source says only "Pakistan-aligned"; "ISI" /
    "Inter-Services Intelligence" appear NOWHERE in the raw page (grep-confirmed), so both actors
    correctly stay pk/unscoped (matches 2026-06-24 actor-record demotions; ids not stale).
    DIRECTIONALITY correct: PK-aligned actors in attributions[], Indian (in) victims in targets[].
    attributing_org clarified to credit THN reporting Aryaka/Aditya K. Sood (article byline is THN's
    Ravie Lakshmanan; Sood/Aryaka is the cited researcher). doctrine_link kept strongly_inferred
