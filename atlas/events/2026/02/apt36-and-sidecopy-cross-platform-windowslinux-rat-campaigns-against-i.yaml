id: 2026-02/apt36-and-sidecopy-cross-platform-windowslinux-rat-campaigns-against-i
name: "APT36 and SideCopy cross-platform (Windows/Linux) RAT campaigns against Indian defense — Geta RAT, Ares RAT, DeskRAT"
start_date: 2026-02-11
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
false_flag_risk: none
summary: |
  Aryaka (Aditya K. Sood) detailed cross-platform RAT campaigns by Pakistan-aligned APT36 and its SideCopy subdivision against Indian defense and government-aligned organizations, compromising both Windows and Linux via phishing that drops LNK files, ELF binaries and PowerPoint Add-Ins to deliver Geta RAT, Ares RAT and DeskRAT for data theft and persistent access. Documents the maturing cross-platform ecosystem of the SideCopy/APT36 pair into early 2026. Both actors already in the PK inventory, but this consolidated cross-platform Geta/Ares-RAT campaign is a new event; doctrine fit pk/asymmetric-posture-india. Confidence strongly_inferred (single vendor blog, no government corroboration).
attributions:
  - actor_id: pk/unscoped/sidecopy
    attributing_org: "The Hacker News (reporting Aryaka / Aditya K. Sood)"
    attributing_org_confidence: moderate   # mapped from ICD link-confidence: strongly_inferred
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2026-02-11
    attribution_source_id: thehackernews/2026-02_apt36-and-sidecopy-cross-platform-window
    notes: |
      Source explicitly names the cluster: the Geta RAT / Ares RAT / DeskRAT campaigns are
      "attributed to Pakistan-aligned threat clusters tracked as SideCopy and APT36 (aka
      Transparent Tribe). SideCopy, active since at least 2019, is assessed to operate as a
      subdivision of Transparent Tribe." Named-actor at moderate confidence. The article (THN
      byline Ravie Lakshmanan) reports research by Aditya K. Sood (VP, Aryaka). No Pakistani
      service / "ISI" is named anywhere in the source — only "Pakistan-aligned"; hence the actor
      stays pk/unscoped (consistent with the 2026-06-24 actor-record audit).
  - actor_id: pk/unscoped/transparent-tribe
    attributing_org: "The Hacker News (reporting Aryaka / Aditya K. Sood)"
    attributing_org_confidence: moderate   # mapped from ICD link-confidence: strongly_inferred
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2026-02-11
    attribution_source_id: thehackernews/2026-02_apt36-and-sidecopy-cross-platform-window
    notes: |
      MULTI-ACTOR: APT36 / Transparent Tribe is co-named with SideCopy as the attributed
      Pakistan-aligned cluster pair ("SideCopy and APT36 (aka Transparent Tribe)"), and the
      DeskRAT strand is attributed specifically to APT36 — "APT36's use of DeskRAT was documented
      by Sekoia and QiAnXin XLab in October 2025." SideCopy is assessed as a Transparent-Tribe
      subdivision, so both belong in attributions[]. Sood is quoted naming both: "Transparent
      Tribe and SideCopy are not reinventing espionage – they are refining it." No ISI / Pakistani
      service named; pk/unscoped retained.
