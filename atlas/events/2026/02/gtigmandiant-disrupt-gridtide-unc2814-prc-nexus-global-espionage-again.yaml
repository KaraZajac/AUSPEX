id: 2026-02/gtigmandiant-disrupt-gridtide-unc2814-prc-nexus-global-espionage-again
name: "GTIG/Mandiant disrupt GRIDTIDE — UNC2814 PRC-nexus global espionage against telecom and government (42 countries)"
start_date: 2026-02-25
incident_type:
  - espionage
