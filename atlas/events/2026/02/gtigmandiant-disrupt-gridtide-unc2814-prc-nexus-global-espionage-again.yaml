  notes: "Audited vs GTIG/Mandiant blog (raw captured + SHA verified): facts OK — GRIDTIDE C-based backdoor abusing Google Sheets API for C2, 53 victims/42 countries/four continents (Africa/Asia/Americas) + 20+ suspected, telecom-provider & government targeting, voter-ID/national-ID PII endpoint, systemd (xapt.service) persistence, Feb-2026 disruption (terminated Cloud Projects, disabled accounts/Service Account, revoked Sheets API, released IOCs), undetermined initial-access vector (UNC2814 history: web servers/edge). ATTRIBUTION: GTIG names only 'a suspected PRC-nexus cyber espionage group' — NO service organ (MSS/Ministry/PLA all absent; no confidence verb beyond 'suspected'); 'UNC'=UNCATEGORIZED. Added attribution_level: nation. actor_id cn/unscoped/unc2814 correct (de-provisionalized from cn/mss 2026-06-24; FK current). published_on 2026-02-25 = source datePublished. Doctrine cn/intelligentized-warfare/sigint-c4isr-collection strongly_inferred, attesting_source_id null — GTIG does not state the strategic SIGINT end, so attested would over-attribute; pillar target_sectors (telecom/carrier, government) match the event targets. GTIG explicitly distinguishes UNC2814 from Salt Typhoon (no overlap)."
