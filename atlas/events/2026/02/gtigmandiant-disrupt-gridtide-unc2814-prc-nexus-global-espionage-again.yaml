  - disruption
false_flag_risk: none
summary: |
  Google Threat Intelligence Group (GTIG) and Mandiant disclose GRIDTIDE, a novel C-based backdoor used by UNC2814, a suspected PRC-nexus espionage group tracked since 2017, in a global campaign against telecommunications providers and government organizations. GRIDTIDE abuses the Google Sheets API for command-and-control, disguising malicious traffic as legitimate cloud API requests. GTIG confirmed 53 victims across 42 countries on four continents (Africa, Asia and the Americas), with suspected targeting of 20+ additional countries. In February 2026 GTIG/Mandiant disrupted the operation by terminating attacker-controlled Cloud Projects and releasing IOCs. The specific initial access vector for this campaign was not determined, though UNC2814 historically exploits web servers and edge systems.
