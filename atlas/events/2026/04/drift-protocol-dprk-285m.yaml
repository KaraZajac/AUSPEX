id: 2026-04/drift-protocol-dprk-285m
name: Drift Protocol — USD 285M DPRK theft via social-engineering pre-signed transactions
start_date: 2025-10-01  # social-engineering buildup
disclosure_date: 2026-04-01
end_date: 2026-04-01
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Solana-based DeFi platform Drift was drained of USD 285M
  (Drift's own loss reckoning USD 295.4M including platform
  reserves) in a 12-minute attack on 2026-04-01 capping a
  six-month social-engineering operation. DPRK operators
  cultivated relationships with Drift Security Council members
  and abused Solana's "durable nonces" mechanism to obtain
  pre-signed administrative transactions. With admin control,
  the attackers whitelisted a worthless attacker-issued token
  (CVT) as collateral, deposited 500 million CVT, and withdrew
  USD 285M in real USDC, SOL, and ETH. Attribution by Mandiant
  at moderate confidence to UNC4736 / Citrine Sleet / AppleJeus /
  Gleaming Pisces.
quantified_impact:
  usd_stolen: 285000000
  asset_classes:
    - USDC
    - SOL
    - ETH
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Operationally similar to the Bybit February 2025 attack: a
  long-tail social-engineering operation against signers,
  culminating in a UI / signing-flow abuse that delivered an
  apparently-routine transaction with malicious effect. The
  Drift attack is the second nine-figure DPRK theft of the
  Trump-administration era and per TRM Labs accounts for the
  bulk of the 76% DPRK share of all 2026 H1 crypto theft.
