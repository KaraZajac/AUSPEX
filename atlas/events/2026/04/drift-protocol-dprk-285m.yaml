    [a] FACTS — STRIPPED 2 fabrications (0 source hits):
    (1) "Drift's own loss reckoning USD 295.4M including platform
    reserves" — the string 295 appears in ZERO of the four sources;
    Drift's OWN confirmed figure (The Record) is USD 280M. Removed.
    (2) "platform announced recovery-token plan to make users whole
    over time" — no source mentions any recovery-token/make-whole
    plan; rewritten to what Drift actually said (denied a
    contract/program bug; coordinating with firms/bridges/exchanges/
    LE to trace+freeze; pledged a fuller report — The Record) plus
    Chainalysis's note that some AFFECTED DOWNSTREAM protocols (not
    Drift) "began exploring user reimbursements". Confirmed-verbatim
    facts kept: durable nonces (Chainalysis/TRM), pre-signed
    Security-Council admin txns (all), CVT/CarbonVote fake token +
    500M CVT deposit (Chainalysis: "deposited 500 million CVT"),
    ~12-minute / 31-withdrawal drain (TRM: "31 withdrawals executed
    in approximately 12 minutes"). CORRECTED figures: usd_stolen
    kept 285M (Chainalysis+TRM) but range noted 280–286M; asset_classes
    fixed USDC/SOL/ETH → JLP/USDC/SOL/cbBTC (JLP was the single
    LARGEST asset, ~41.7M JLP ≈ USD 155–159M per Elliptic/Chainalysis,
    and was omitted; ETH was a laundering OUTPUT, not a stolen class).
    Removed editorial "second nine-figure DPRK theft of the
