id: 2026-04/drift-protocol-dprk-285m
name: Drift Protocol — ~USD 285M DPRK-suspected theft via social-engineering pre-signed transactions
start_date: 2026-03-11  # earliest SOURCED on-chain staging (TRM: single 10 ETH ex-Tornado Cash); social-engineering onset "months" earlier but undated in sources (was fabricated-precise 2025-10-01)
disclosure_date: 2026-04-01  # Drift confirmed an "active attack" on X the same day; Elliptic/The Record wrote it up 2026-04-02
end_date: 2026-04-01  # ~12-minute drain completed 01 Apr 2026 (bridging to Ethereum continued for hours after)
incident_type:
  - financial-theft
initial_vector: phishing  # enum lacks "social-engineering"; actual vector was long-tail social engineering — posing as a quant trading firm + (per TRM) in-person meetings — to induce signers to pre-sign durable-nonce txns. Drift denied any smart-contract/program bug.
outcome_summary: |
  Solana-based DeFi platform Drift Protocol was drained of an
  estimated USD 285M on 2026-04-01 (Chainalysis and TRM Labs;
  Elliptic calculated USD 286M; Drift's own same-day confirmation
  and The Record cited USD 280M). Per TRM the drain itself — 31
  withdrawals — executed in ~12 minutes, capping a months-long
  social-engineering operation with roughly three weeks of on-chain
  pre-staging. DPRK-linked operators posed as a quantitative
  trading firm and, per TRM, held in-person meetings with Drift
  personnel over a period of months; they abused Solana's "durable
  nonces" feature to get Drift Security Council multisig signers to
  unknowingly pre-sign administrative transactions handing over
  admin control. With that control the attackers whitelisted a
  worthless attacker-issued token (CVT / CarbonVote Token) as
  collateral, deposited 500 million CVT (priced at ~USD 1 via a
  wash-traded pool plus an attacker-controlled oracle), and drained
  real assets across 18+ token types — the single largest being
  ~41.7M JLP (~USD 155–159M), plus USDC, SOL, cbBTC and others —
  before bridging to Ethereum and swapping to ETH.
  ATTRIBUTION IS DPRK-SUSPECTED AND SUBGROUP-UNRESOLVED: Chainalysis
  (2026-04-09) called formal attribution "pending" ("likely" DPRK);
  Elliptic (2026-04-02) said "suspected DPRK"; the Drift team + the
  SEAL 911 collective (05-Apr X post, "medium-high" confidence,
  relayed by Elliptic) assessed the same actor as the Oct-2024
  Radiant Capital hack that Mandiant attributed to UNC4736
  (AppleJeus / Citrine Sleet); TRM Labs (2026-04-30) attributes the
  Drift theft to a DPRK group DISTINCT from both Lazarus Group and
  TraderTraitor, with the specific subgroup "under investigation."
quantified_impact:
  usd_stolen: 285000000  # Chainalysis + TRM; sourced range USD 280M (Drift/The Record) – 286M (Elliptic)
  asset_classes:  # 18+ token types drained; JLP was the single largest; funds later swapped to USDC then bridged to ETH (ETH was a laundering output, not a stolen class)
    - JLP
    - USDC
    - SOL
    - cbBTC
false_flag_risk: none
campaign_id: apt38-crypto-pivot  # FLAG(orchestrator): umbrella name implies APT38/Lazarus, but TRM assesses THIS actor distinct from Lazarus AND TraderTraitor; sister KelpDAO event (2026-04-18) carries no campaign_id — normalize the grouping
summary: |
  Operationally similar to the Bybit February 2025 attack (which
  The Record notes researchers cited as a tactical parallel): a
  long-tail social-engineering operation against signers,
  culminating in a signing-flow abuse that delivered
  apparently-routine transactions with malicious effect. Elliptic
  called it the largest DeFi hack of 2026 to date and the
  second-largest Solana-ecosystem incident after the 2022 USD 326M
  Wormhole exploit; per Elliptic/DefiLlama Drift's TVL collapsed
  from ~USD 550M to under USD 250M. Together with the 2026-04-18
  KelpDAO theft (~USD 292M), TRM Labs assessed the two attacks as
  ~76% of all crypto-hack value stolen in 2026 through April (YTD).
