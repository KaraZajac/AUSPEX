    [b] ATTRIBUTION — the load-bearing correction. Original claimed
    "Attribution by Mandiant at moderate confidence to UNC4736 /
    Citrine Sleet / AppleJeus / Gleaming Pisces" and carried TWO
    attributions: kp/rgb/citrine-sleet (org "Google Mandiant", via
    chainalysis) + kp/rgb/lazarus (org "Elliptic / TRM Labs", high,
    via elliptic).
    • "Gleaming Pisces" — 0 hits in every source. FABRICATED, removed.
    • Chainalysis names NO actor at all: "likely linked to North
      Korean (DPRK) actors ... though formal attribution remains
      pending" / "yet to be confirmed" — zero Mandiant/Citrine/UNC4736
      mentions. So the citrine attribution's source was WRONG
      (chainalysis → elliptic) and "Google Mandiant" as attributor
      was WRONG.
    • Where the Citrine name actually comes from: Elliptic RELAYS a
      Drift-team X post (05 Apr, "medium-high confidence, supported by
      SEAL 911") that Drift = "the same threat actors responsible for
      the October 2024 Radiant Capital hack attributed by Mandiant to
      UNC4736 ... also tracked as AppleJeus or Citrine Sleet." So
      Mandiant attributed RADIANT; the Drift→same-cluster link is the
      victim's + SEAL 911's inference. Reset attributing_org →
      "Drift Protocol + SEAL 911 (relayed by Elliptic)", confidence
      moderate ("medium-high"), level named-actor, date 2026-04-05,
      source → elliptic, assessment concur-with-caveat.
