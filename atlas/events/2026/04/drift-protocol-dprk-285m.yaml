      Elliptic = "suspected DPRK"; Elliptic never mentions Lazarus or
      TRM. TRM AFFIRMATIVELY REFUTES it — "assessed as distinct from
      Lazarus Group" and "distinct from TraderTraitor ... the specific
      subgroup attribution remains under investigation." This mirrors
      the kelp-dao correction. The "high" confidence + "Elliptic / TRM
      Labs (cluster overlap)" org were both unsupported.
