id: 2026-04/cordial-spider-and-snarky-spider-com-aligned-data-theft-and-extortion-
name: "CORDIAL SPIDER and SNARKY SPIDER — Com-aligned data-theft-and-extortion crews vishing identity/SaaS platforms (US multi-sector)"
start_date: 2025-10-01   # CrowdStrike: active "since at least October 2025" (op start). 2026-06-25 audit corrected from the 2026-04-30 disclosure date.
