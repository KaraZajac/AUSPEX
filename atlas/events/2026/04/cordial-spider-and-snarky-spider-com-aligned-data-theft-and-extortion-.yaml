initial_vector: phishing
false_flag_risk: none
summary: |
  CrowdStrike detailed two financially motivated e-crime crews it tracks as Cordial Spider (also CL-CRI-1116 / UNC6671) and Snarky Spider, part of a new wave of data-theft-and-extortion actors closely aligned with Scattered Spider and other subsets of The Com (including SLSH and ShinyHunters). The groups use voice-phishing (vishing), text messages and emails to direct targeted employees to phishing pages spoofing their employer's legitimate single sign-on portal, capturing credentials, session keys and tokens to break into identity and SaaS platforms. CrowdStrike says they primarily target U.S.-based organizations across the academic, aviation, retail, hospitality, automotive, financial-services, legal and technology sectors. Cordial Spider is associated with a data-leak site referred to as BlackFile.
