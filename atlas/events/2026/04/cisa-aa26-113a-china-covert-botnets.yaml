name: CISA AA26-113A — China-nexus covert botnet networks for espionage and pre-positioning
start_date: 2022-01-01  # editorial estimate of the multi-year TTP shift; advisory states only "over the past few years" (+ Raptor Train "in 2024") — NO specific onset date given
