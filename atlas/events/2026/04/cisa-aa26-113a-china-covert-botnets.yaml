        KV-botnet pattern). Arguably attested — flagged, kept conservative
        to avoid over-attestation; attesting_source_id present.
      • sigint-c4isr-collection: DOWNGRADED strongly_inferred → plausible.
        The advisory never mentions SIGINT/C4ISR/Salt Typhoon/AA25-239A;
        Flax's espionage is not carrier-SIGINT. Now an explicit AUSPEX
        cross-program inference with alternatives[]. **Candidate for
        removal — Kara's call.**
      • compelled-vendor-cooperation: reasoning had a FACTUAL ERROR
