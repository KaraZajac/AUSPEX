id: 2026-04/cisa-aa26-113a-china-covert-botnets
name: CISA AA26-113A — China-nexus covert botnet networks for espionage and pre-positioning
start_date: 2022-01-01  # CISA-stated multi-year botnet operation onset
disclosure_date: 2026-04-23
end_date: null
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day
outcome_summary: |
  CISA, NCSC-UK, and Five Eyes partners issued joint advisory
  AA26-113A documenting a structural shift in PRC operator
  TTPs: heavy reliance on professionally maintained covert
  botnets of compromised SOHO, IoT, and smart-device endpoints
  to provide low-attribution operational relays. Specifically
  named clusters include Volt Typhoon and Flax Typhoon (the
  Flax Typhoon botnet alone exploits 66 known CVEs; 47.9% of
  bots are US-located). The advisory frames the botnet model
  as enabling lateral movement to OT systems and obscuring
  origin geography for espionage and intrusion operations.
false_flag_risk: none
summary: |
  A doctrinal landmark: the first multi-government public
  characterization of PRC actor reliance on resilient botnet
  infrastructure as an operational standard rather than a
  one-off Volt Typhoon artifact. Pairs the Volt Typhoon and
  Flax Typhoon clusters explicitly under a single covert-
  networks doctrine of compromise. The 48% US-located bot
  ratio in Flax Typhoon makes the campaign one of the highest-
  intensity PRC operations against US consumer networks
  publicly disclosed.
