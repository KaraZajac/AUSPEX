  notes: |
    Audited against the RAW advisory AA26-113A "Defending Against
    China-Nexus Covert Networks of Compromised Devices" — curled live
    from cisa.gov (HTTP 200, 83,011 B), snapshot + hash captured
    (sha256 d34faf31…7c6159b0). This is the GENUINE advisory, NOT a
    phantom (title, alert code AA26-113A, Volt/Flax Typhoon, and
    "covert network" x30 all present in body).

    [a] FACTS — three fabrications STRIPPED, none source-carried:
      • "Flax Typhoon botnet ... exploits 66 known CVEs" — the advisory
        contains ZERO "CVE" tokens (the only "66" in the file is inside
        a URL, "aa25-266a"). REMOVED from event + source notes.
      • "47.9% / 48% of bots are US-located" — the advisory has ZERO
        percentage/geography breakdown (only "%" tokens are URL-encoding
        noise, "f%5B0%5D"). REMOVED.
      • "enabling lateral movement to OT systems" — "OT"/"operational
        technology" appears ZERO times. REMOVED; replaced with the real
        supported claim: Volt Typhoon uses covert networks "to
        pre-position offensive cyber capabilities on critical national
        infrastructure."
      KEPT/verified verbatim: covert networks = compromised SOHO
      routers + IoT + smart devices, used to "route ... cyber activity"
      in a "low-cost, low-risk, deniable way"; "the majority of
      China-nexus threat actors are using these networks"; Raptor Train
      "in 2024 infected more than 200,000 devices worldwide", controlled
      by Integrity Technology Group (FBI-assessed responsible for Flax
      Typhoon); KV Botnet (Volt Typhoon) "mainly ... vulnerable Cisco
      and NetGear routers" that were "end of life." start_date comment
      "CISA-stated ... onset" corrected — advisory gives NO onset, only
      "over the past few years" (2022-01-01 kept as editorial estimate).
      Added incident_type: espionage (Flax "conduct cyber espionage",
      previously missing).

    [b] ATTRIBUTION — attributing_org corrected on both actors from
      "CISA + NCSC-UK + Five Eyes": the advisory is "jointly released by
      the National Cyber Security Centre (NCSC-UK) and international
      partners" (NCSC-UK-LED, UK Crown Copyright); US co-sealers are
      CISA/FBI/NSA/DC3, and the coalition is BROADER than Five Eyes —
      adds Germany (BfV/BND/BSI), Japan (NCO), Netherlands (AIVD/MIVD),
      Spain (CCN), Sweden (NCSC-SE) alongside AU/CA/NZ. "Five Eyes"
      never appears in the source. Confidence high is honest — advisory
      names "Chinese state-sponsored actors Volt Typhoon" and
      "China-based hackers known as Flax Typhoon" without hedging. Not
      over-attributed: no MSS/PLA/service named anywhere.

    [c] DATES — published_on/disclosure_date 2026-04-23 = "Release Date
      April 23, 2026" ✓ (AA26-113A = day-113 of 2026 = 23 Apr, internally
      consistent). end_date null (ongoing) ✓.

    [d] DOCTRINE_LINKS — all three re-grounded to the real text:
      • pre-positioning: kept strongly_inferred; reasoning rewritten off
        the fabricated OT framing onto the verbatim "pre-position
        offensive cyber capabilities on critical national infrastructure"
