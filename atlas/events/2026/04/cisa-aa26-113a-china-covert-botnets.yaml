initial_vector: n-day
outcome_summary: |
  An NCSC-UK-led joint advisory (AA26-113A; co-sealed by US
  CISA/FBI/NSA/DC3 and partners in Australia, Canada, Germany,
  Japan, the Netherlands, New Zealand, Spain and Sweden)
  documenting a structural shift in China-nexus operator TTPs:
  heavy reliance on externally provisioned, large-scale "covert
  networks" of compromised SOHO routers, IoT and smart devices
  to route cyber activity in a low-cost, low-risk, deniable way
  that disguises origin and attribution. The advisory names two
  archetypes: Volt Typhoon, whose covert networks were used "to
  pre-position offensive cyber capabilities on critical national
  infrastructure," and Flax Typhoon, which "used a different
  covert network of compromised infrastructure to conduct cyber
  espionage." It reports the Raptor Train network (200,000+
  devices in 2024) as controlled by the Chinese firm Integrity
  Technology Group, FBI-assessed responsible for Flax Typhoon,
  and the KV Botnet (Volt Typhoon) as mainly end-of-life Cisco
  and NetGear routers.
false_flag_risk: none
summary: |
  A multi-government characterization of China-nexus reliance on
  compromised-device "covert networks" as a strategic, at-scale
  operational standard rather than a one-off Volt Typhoon artifact:
  the advisory states "the majority of China-nexus threat actors
  are using these networks," that multiple networks exist and are
  constantly updated, and that a single network can serve multiple
  actors. It pairs the Volt Typhoon (pre-positioning on critical
  national infrastructure) and Flax Typhoon (cyber espionage)
  clusters under one covert-network model, and ties the maintenance
  of such networks to Chinese information-security companies (naming
  Integrity Technology Group / Raptor Train). Attribution is at the
  named-actor / China-nexus level; no Chinese intelligence service
  is named.
