id: 2026-04/ncsc-apt28-router-dns-hijacking
name: UK NCSC + FBI — APT28 (GRU 26165) router DNS-hijacking campaign for credential theft
start_date: 2024-01-01  # NCSC-stated campaign onset
disclosure_date: 2026-04-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  UK NCSC plus FBI IC3 PSA 260407 publicly attributed a
  multi-year router DNS-hijacking campaign to GRU Unit 26165 /
  APT28. The actor exploits CVE-2023-50224 in TP-Link WR841N
  consumer routers and similar bugs in MikroTik devices, then
  alters DHCP DNS settings to point victims at attacker-controlled
  malicious DNS servers. The resulting adversary-in-the-middle
  position harvests OAuth tokens, passwords, and credentials
  for web mail and other Microsoft / Google services. At
  December 2025 peak, more than 18,000 unique victim IP
  addresses across 120 countries were communicating with APT28
  AitM infrastructure.
false_flag_risk: none
campaign_id: gru-26165-western-logistics
summary: |
  Companion to the July 2025 Authentic Antics disclosure of
  GRU 26165 Outlook credential-theft tooling — same actor,
  same Microsoft-credential collection objective, different
  vector (router-mediated DNS hijack rather than in-Outlook
  implant). The geographic spread (120 countries / 18,000 IPs)
  makes this one of the largest GRU credential-collection
  operations ever publicly documented.
