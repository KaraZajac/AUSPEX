id: 2026-04/ncsc-apt28-router-dns-hijacking
name: UK NCSC + FBI — APT28 (GRU 26165) router DNS-hijacking campaign for credential theft
start_date: 2024-01-01  # approx onset; NCSC "Since 2024", FBI "since at least 2024" — no exact date stated
disclosure_date: 2026-04-07
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: n-day  # CVE-2023-50224 is a public/known vuln; NCSC: "likely utilising public vulnerabilities"
outcome_summary: |
  UK NCSC and FBI/IC3 (PSA Alert I-040726-PSA), with NSA and 15
  international partners, publicly attributed a router DNS-hijacking
  credential-theft operation to GRU 85th Main Special Service Centre
  (85th GTsSS) / Military Intelligence Unit 26165 / APT28. Since 2024
  and into 2026 the actor exploited vulnerable SOHO/consumer routers —
  notably the TP-Link WR841N via CVE-2023-50224, plus other TP-Link
  models, and (in a second infrastructure cluster) compromised MikroTik
  routers, a small number often located in Ukraine — then rewrote the
  devices' DHCP/DNS settings to route downstream traffic through
  attacker-controlled DNS servers. The resulting adversary-in-the-
  middle position harvested passwords, OAuth/authentication tokens and
  other credentials for Microsoft Outlook web-mail and other web/email
  services. Both NCSC and FBI characterise the activity as opportunistic
  and indiscriminate against a wide pool of global victims, then
  filtered for users of intelligence value — especially military,
  government and critical infrastructure. The FBI further notes that the
  US Department of Justice and FBI disrupted a GRU network of
  compromised SOHO routers used to facilitate the DNS-hijacking
  operations. NCSC published corroborating VPS banner clusters, an
  exploited-TP-Link-model list, targeted Outlook domains and AitM IP
  ranges as IOCs.
false_flag_risk: none
campaign_id: gru-26165-western-logistics  # AUDIT-FLAG: free-form umbrella cluster for GRU-26165 ops (shared w/ Authentic Antics, AA25-141A, Moobot); label is a partial misnomer for this opportunistic DNS-hijack op — NCSC lists "western logistics" as a SEPARATE prior advisory. Orchestrator: consider renaming the cluster.
summary: |
  Companion to the July 2025 Authentic Antics disclosure of
  GRU 26165 Outlook credential-theft tooling — same actor, same
  Microsoft-credential collection objective, different vector
  (router-mediated DHCP/DNS hijack + adversary-in-the-middle rather
  than an in-Outlook implant). Co-released same-day (7 Apr 2026) by
  NCSC-UK and FBI/IC3 with NSA and a 15-nation partner coalition, and
  accompanied by a DOJ/FBI disruption of the GRU SOHO-router network.
