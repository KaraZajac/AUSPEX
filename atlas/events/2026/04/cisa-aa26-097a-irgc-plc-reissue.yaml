outcome_summary: |
  Multi-agency US advisory (FBI, CISA, NSA, EPA, DOE, USCYBERCOM
  CNMF) documenting an ongoing Iranian-affiliated APT campaign
  disrupting internet-exposed Rockwell Automation/Allen-Bradley
  PLCs across US Government Services and Facilities, Water and
  Wastewater Systems, and Energy sectors, amid escalation "likely
  in response to hostilities between Iran, and the United States
  and Israel." Publishes IOCs and defensive mitigations; draws a
  historical parallel to the November 2023 CyberAv3ngers /
  Unitronics campaign (IRGC Cyber-Electronic Command) without
  identifying the 2026 actors as CyberAv3ngers.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave  # NB loose thematic Iran-PLC-targeting-of-US-CII cluster ONLY; the 2026 op is NOT attributed to CyberAv3ngers by CISA (historical comparison) — FLAGGED for orchestrator to reconsider/rename
summary: |
  On 7 April 2026 the FBI, CISA, NSA, EPA, DOE and US Cyber
  Command's Cyber National Mission Force jointly issued AA26-097A,
  warning of ongoing exploitation of internet-facing operational-
  technology devices — principally Rockwell Automation/Allen-
  Bradley programmable logic controllers (CompactLogix, Micro850)
  — across multiple US critical-infrastructure sectors: Government
  Services and Facilities (including local municipalities), Water
  and Wastewater Systems (WWS), and Energy. The authoring agencies
  assess "a group of Iranian-affiliated advanced persistent threat
  (APT) actors" is conducting the activity "to cause disruptive
  effects within the United States," noting the campaign has
  "recently escalated, likely in response to hostilities between
  Iran, and the United States and Israel." Since at least March
  2026 the agencies identified, through victim engagements, PLC
  disruptions across these sectors; some victims experienced
  operational disruption and financial loss (IOC infrastructure
  association reaches back to January 2025). Reported tradecraft:
  actors reached exposed PLCs from leased, overseas-hosted
  infrastructure using legitimate configuration software (Rockwell
  Studio 5000 Logix Designer) to create an accepted connection;
  used OT ports 44818, 2222, 102, 22 and 502; deployed Dropbear
  SSH on victim endpoints for remote access over port 22; and
  achieved impact by extracting the device project file (.ACD) and
  manipulating data on HMI/SCADA displays (ATT&CK T1565). Port
  targeting suggests possible additional targeting of Siemens S7
  PLCs. The advisory references the November 2023 CyberAv3ngers
  (aka Shahid Kaveh Group) Unitronics campaign — attributed to
  Iran's IRGC Cyber-Electronic Command (CEC) — only as SIMILAR
  HISTORICAL activity; it does NOT attribute the 2026 Rockwell/
  Allen-Bradley campaign to CyberAv3ngers, and describes no
  hacktivist persona, Telegram claims, anti-Israel HMI defacement,
  Unitronics devices, or the default-credential / TCP-20256 vector
  of the historical campaign.
