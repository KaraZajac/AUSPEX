initial_vector: n-day  # exposed PLCs; default / weak credentials
outcome_summary: |
  CISA reissued the IRGC-affiliated PLC exploitation advisory
  for US critical infrastructure (water, energy, manufacturing)
  during continued post-strike tensions. Renewed defensive
  posture and notification of IRGC-affiliated TTP continuity.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
summary: |
  Follow-on advisory to the December 2023 AA23-335A — IRGC PLC
  exploitation operations continued or resumed under post-Israel-
  Iran-strike tensions. The CyberAv3ngers operational pattern
  carries over: internet-exposed Unitronics Vision-series PLCs
  (TCP 20256), default integrated-HMI credentials, OT-defacement
  with anti-Israel banners overwriting ladder-logic and HMI
  graphics, and Telegram persona claims. AA26-097A extends the
  target watchlist to Schneider Modicon, Siemens S7, and
  Allen-Bradley PLC families newly observed in IRGC-IO scanning
  data, and warns that the operators may pivot from defacement
  to process-manipulation in tense windows.
