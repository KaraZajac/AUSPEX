    Unitronics TTPs as if they were the 2026 activity).

    [a] FACTS — major corrections. The advisory documents a NEW
    2026 campaign against Rockwell Automation/Allen-Bradley PLCs
    (CompactLogix, Micro850), NOT Unitronics. Verbatim: "programmable
    logic controllers (PLCs) manufactured by Rockwell Automation/
    Allen-Bradley," "Targeted devices include CompactLogix and
    Micro850 PLC devices." Initial access: "The actors used leased,
    third-party hosted infrastructure with configuration software,
    such as Rockwell Automation's Studio 5000 Logix Designer
    software, to create an accepted connection to the victim's PLC."
    C2 ports: "44818, 2222, 102, 22, or 502"; "deployed Dropbear
    Secure Shell (SSH) software on victim endpoints … through port
    22." Impact: "extraction of the device's project file and data
    manipulation on HMI and SCADA displays [T1565]"; project file =
    ".ACD file" on Rockwell. Siemens S7 named only as INFERRED
    possible additional target ("suggests these actors may also be
    targeting devices manufactured by companies other than Rockwell
    … including the Siemens S7 PLC"). STRIPPED as fabricated /
    historical-conflation (none carried by the 2026 advisory):
    "Unitronics Vision-series PLCs (TCP 20256)"; "default integrated-
    HMI credentials"; "OT-defacement with anti-Israel banners
    overwriting ladder-logic and HMI graphics"; "Telegram persona
    claims"; "Schneider Modicon … newly observed in IRGC-IO scanning
    data" (Schneider Modicon and "scanning data" appear NOWHERE;
    "IRGC-IO" appears 0×); "pivot from defacement to process-
    manipulation in tense windows." Unitronics/CyberAv3ngers appear
    ONLY as the Nov-2023 historical comparison ("During a similar
    campaign beginning in November 2023, the IRGC CEC-affiliated
    cyber threat actors known as 'CyberAv3ngers' targeted U.S.-based
    … Unitronics PLC devices … at least 75 devices"). Summary +
    outcome_summary fully rewritten to the 2026 Rockwell campaign.
    outcome_summary "manufacturing" → the actual named sectors
    (Government Services and Facilities, WWS, Energy — "manufacturing"
    is not named). name "reissue of IRGC PLC exploitation warning" →
    accurate title (it is a new advisory on a new campaign with a
    historical parallel, not a reissue of AA23-335A). id preserved
    (stable-forever), though it retains the now-inaccurate "reissue"
