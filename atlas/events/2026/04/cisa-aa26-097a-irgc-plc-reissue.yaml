      Iranian-affiliated advanced persistent threat (APT) actors"
      (nation level; the specific 2026 group is NOT named). It does
      NOT identify the 2026 actors as CyberAv3ngers — CyberAv3ngers
      / IRGC-CEC is cited solely as a "similar" November 2023
      historical comparison ("The authoring agencies previously
      reported on similar activity targeting PLCs by CyberAv3ngers
      … affiliated with Iran's Islamic Revolutionary Guard Corps
      (IRGC) Cyber Electronic Command (CEC)"). attributing_org_
      confidence=high applies to the Iranian-affiliated-APT (nation)
      attribution, which the FBI/authoring agencies assess with
      confidence; auspex_assessment=concur-with-caveat because
      mapping this event to the specific ir/irgc-cec/cyberav3ngers
      actor is an AUSPEX inference drawn from CISA's own stated
      CyberAv3ngers lineage, not a CISA same-actor identification
      for 2026. Sub-org note: where the advisory names a sub-
      organization it names the IRGC Cyber-Electronic Command (CEC);
      the strings "IRGC-IO" and "Intelligence Organization" do not
      appear.
