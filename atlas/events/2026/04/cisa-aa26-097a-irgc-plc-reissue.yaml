    Critical Infrastructure" (source cisa/2026-04-07_aa26-097a-irgc-
    plc). Raw snapshot on disk re-verified: content_sha256
    58482fe2…caf895f4 (58482fe23b7804970e634edc38753070200024f18219e6a0fdc9976acaf895f4),
    96,758 bytes. SOURCE IS GENUINE (real CISA page: full body,
    Release Date April 07 2026, "Version History: April 7, 2026:
    Initial version," related advisories AA26-113A/AA25-343A) — NOT
    a phantom. Path taken: CORRECT-IN-PLACE (real event, real
