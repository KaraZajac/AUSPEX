id: 2011-08/operation-shady-rat
name: Operation Shady RAT — McAfee disclosure of five-year intrusion campaign
start_date: 2006-07-01
disclosure_date: 2011-08-02
end_date: 2011-08-02
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  McAfee (Dmitri Alperovitch) disclosed a five-year targeted
  intrusion campaign against 72 identified organizations across
  14 geographic locations — including the International Olympic
  Committee, the World Anti-Doping Agency, the United Nations, the
  ASEAN Secretariat, 13 defense contractors, U.S. federal/state/
  county government agencies, and Canadian government agencies.
  Access to a single command-and-control log server let McAfee
  reconstruct per-victim dwell times ranging from under a month to
  28 months. McAfee suspected "a state actor" — inferring it from
  the Olympic-committee targeting, which offered "likely no
  commercial benefit" — but explicitly declined to name any nation;
  contemporaneous reporting (Vanity Fair) inferred the PRC.
false_flag_risk: none
summary: |
  Operation Shady RAT was, after Operation Aurora (2010), an early
  large-scale public exposure of long-dwell state-actor cyber
  espionage, and McAfee framed it explicitly as one operation by a
  single actor/group. Its doctrinally distinctive feature is the
  2008-Beijing-Olympics-adjacent targeting of the IOC, national
  Olympic committees, and the World Anti-Doping Agency: McAfee
  singled this out as pointing to a state actor precisely because
  there was "likely no commercial benefit" — prestige/political
  collection rather than narrow IP theft. McAfee named no
  sponsoring nation; the attribution to China is press inference
  (Vanity Fair, "fingers point to China"), itself hedged. (The
  later APT1 / Comment Crew label from Mandiant's 2013 report is
  not applied by either 2011 source and is not asserted here.)
attributions:
  - actor_id: null
    attributing_org: McAfee (Dmitri Alperovitch)
    attributing_org_confidence: moderate
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2011-08-02
    attribution_source_id: mcafee/2011-08-02_shady-rat
    notes: |
      McAfee named and scoped a single actor/group from one
      command-and-control log server and assessed the Olympic-
      committee targeting "potentially pointed a finger at a state
      actor behind the intrusions, because there is likely no
      commercial benefit" — but explicitly declined to name any
      nation and named no group. activity-cluster: one coherent
      actor, no nation, no named group. actor_id null per the
      editorial norm for vendor disclosures that name no group
      (mirrors Operation Night Dragon).
  - actor_id: null
    attributing_org: Vanity Fair (Michael Joseph Gross)
    attributing_org_confidence: low
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2011-09-01
    attribution_source_id: vanityfair/2011-09_shady-rat
    notes: |
      Contemporaneous long-form journalism that inferred China at
      the nation level ("fingers point to China as the culprit")
      where McAfee named no state — but hedged it ("because the
      People's Republic of China is such a massive entity, it is
      impossible to know how much Chinese hacking is done on
      explicit orders from the government"). Names the nation, not a
      specific group; actor_id null. nation-level, low confidence
      (press inference, not a vendor/govt technical attribution).
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/dual-use-research
    program_id: null
    confidence: plausible
    reasoning: |
      The bulk of the identified victims — 13 defense contractors
      plus U.S. federal/state/county government and IT/electronics/
      satellite firms — maps to the dual-use R&D collection pattern
      (the pillar's target sectors include defense/contractor and
      ICT). The label is plausible, not higher, on two grounds: the
      China attribution is itself press inference (McAfee named no
      nation), and MCF as a named national strategy (2014-2017)
      postdates the 2006-2011 campaign, so this is a retrospective
      doctrinal frame and no source states an MCF purpose.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "MCF dual-use R&D collection: the defense-contractor + government + IT victim concentration is the archetypal PRC dual-use collection pattern MCF later formalized; fits if the press China attribution holds."
        - "Undifferentiated state espionage: McAfee frames the operation only as one state actor's 'hunger for secrets and intellectual property' without naming a nation or a specific strategic program, so a generic state-collection reading survives alongside the MCF-specific one."
    contested: false
    analyst: claude
targets:
