id: 2011-08/operation-shady-rat
name: Operation Shady RAT — McAfee disclosure of five-year intrusion campaign
start_date: 2006-07-01
disclosure_date: 2011-08-02
end_date: 2011-08-02
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  McAfee (Dmitri Alperovitch) disclosed a five-year intrusion
  campaign against 71 organizations across 14 countries —
  including the IOC, the World Anti-Doping Agency, the UN, ASEAN
  Secretariat, defense contractors, US federal contractors, and
  the Government of Canada. Sustained C2 from a single log
  server allowed McAfee to reconstruct dwell times ranging from
  one month to 28 months. While McAfee did not name the
  sponsoring state, the target list and timing around the 2008
  Beijing Olympics led contemporaneous reporting to attribute
  the campaign to the PRC.
false_flag_risk: none
summary: |
  Operation Shady RAT was the second-major public exposure of
  a long-running PRC-aligned campaign (after Aurora 2010) and
  contributed to the late-2011 — early-2012 inflection in
  Western public framing of PRC cyber. The 2008-Olympics-adjacent
  IOC and WADA targeting is doctrinally distinctive: prestige
  collection rather than narrow IP theft. The campaign is part
  of the broader Comment Crew / APT1 milieu though McAfee did
  not at the time use that label.
attributions:
  - actor_id: null
    attributing_org: McAfee (Dmitri Alperovitch)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2011-08-02
    attribution_source_id: mcafee/2011-08-02_shady-rat
    notes: |
      McAfee report declined to name the state actor. Press
      attribution (Vanity Fair, Reuters) named China. Cluster
      overlaps significantly with the APT1 / Comment Crew
      campaign disclosed by Mandiant two years later. Leaving
      actor_id null per editorial norm; the doctrine tag is
      load-bearing.
