qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: full
  notes: |
    Audited against both cited RAW sources (snapshots captured + hashed).
    McAfee "Revealed: Operation Shady RAT" PDF sha256 b85852bf...70fafb9f
    (5,145,815 bytes; 14-page, PDF CreationDate 2011-08-02, doc
    33000wp_shady-rat_0811 — authentic primary via airandspaceforces.com
    mirror). Vanity Fair "Enter the Cyber-dragon" HTML sha256 782f5776...4fccf01d
    (1,238,539 bytes; byline Michael Joseph Gross).
    [a] FACTS: KEY CORRECTION — victim count 71 -> 72. McAfee states it verbatim
    twice ("we identified 72 compromised parties"; "the complete list of all 72
    targets") and the country table (USA 49 + 13 others) sums to 72. "14
    countries" confirmed (McAfee: "14 geographic locations" — USA, Canada, S.Korea,
    Taiwan, Japan, Switzerland, UK, Indonesia, Vietnam, Denmark, Singapore, Hong
    Kong, Germany, India). Single C2 log server, spear-phishing initial access,
    five-year window from mid-2006, dwell "less than a single month" to 28 months —
    all verbatim-supported (fixed "one month" -> "under a month"). Added
    incident_type: espionage (McAfee: "targeted espionage operations"). STRIPPED the
    anachronistic "Comment Crew / APT1 milieu" claim (Mandiant's APT1 report is Feb
    2013, 2 yrs after both cited sources; neither carries it) and the unsourced
    "late-2011 inflection in Western framing" editorializing.
    [b] ATTRIBUTION: McAfee explicitly declined to name any nation — it assessed the
    Olympic-committee targeting "potentially pointed a finger at a state actor ...
    because there is likely no commercial benefit", i.e. suspected a STATE actor but
    named no country and no group. Modeled actor_id null, activity-cluster, moderate,
    concur-with-caveat (added attribution_level; mirrors sibling Night Dragon). ADDED
    a 2nd null-actor entry for Vanity Fair at nation level / low confidence: VF
    inferred China ("fingers point to China as the culprit") but hedged ("impossible
    to know how much Chinese hacking is done on explicit orders from the government").
    No specific group named by either 2011 source -> actor_id stays null on both
    (China nation-level = SUSPECTED / press-inferred, not firm).
    [c] DATES: McAfee published_on 2011-08-02 confirmed by PDF CreationDate; VF
    2011-09-01 (Sept 2011 issue). start_date 2006-07-01 = earliest table start
    ("mid-2006"). end_date 2011-08-02 (== disclosure) retained as the accepted corpus
    convention for McAfee-disclosure campaigns (matches Night Dragon), not a conflation.
    [d] DOCTRINE_LINKS: REMOVED cn/national-intelligence-law-2017/diaspora-and-
    dissident-collection — genuine mismatch: that pillar encodes Tibetan/Uyghur/
    dissident targeting, not IOC/WADA/Olympics prestige collection; NIL-2017 is a 2017
    supply-side vendor-compulsion statute (11 yrs post-campaign) and no source supports
    a dissident-collection purpose. KEPT cn/mcf/dual-use-research at plausible (already
    plausible — not over-attested; attesting_source_id null): 13 defense contractors +
    US federal/state/county govt + IT/electronics/satellite victims fit the pillar's
    sectors; reasoning made honest about China being press-inferred and MCF postdating;
    added inference_basis.alternatives. No corpus China doctrine cleanly encodes foreign
    prestige/political collection, so the Olympics-prestige aspect correctly carries no
    doctrine link ("do not invent one").
    [e] ATTRIBUTION_LEVEL: set activity-cluster (McAfee — no nation/no group) and nation
    (Vanity Fair — China, no group).
    [f] ACTOR_ID: null on both entries (unattributed to a named group) — trivially
    resolves; no actor file involved.
    TARGETS: fixed orgs/un country us -> ch (McAfee's table lists the UN under
    Switzerland/Geneva, not NYC). Removed orgs/government-of-canada — NOT a McAfee-named
    entity (the report anonymizes "Canadian Government Agency #1/#2"); replaced with
    sectors/government (ca). Added sectors/defense/contractor (us) and sectors/government
    (us) — the numerically dominant, fully-documented victim classes. Kept the 4
    McAfee-NAMED orgs (ioc/wada/un/asean-secretariat).
    FLAGS: (1) target-registry gap — orgs/ioc, orgs/un, orgs/asean-secretariat are
    genuinely McAfee-named victims but lack atlas/targets/orgs/*.yaml records (kept as
    sourced targets; validator treats orgs/* gaps as informational "normalization
    deferred"). Orchestrator should create these 3 registry files (orgs/wada exists).
    (2) doctrine link removal recorded above.
