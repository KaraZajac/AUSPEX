    role: primary
  - target_id: orgs/un
    country: ch  # McAfee table lists the United Nations under Switzerland (Geneva)
    role: primary
  - target_id: orgs/asean-secretariat
    country: id  # McAfee table lists the ASEAN Secretariat under Indonesia (Jakarta)
    role: primary
  - target_id: sectors/defense/contractor
    country: us
    role: primary  # McAfee: 13 defense contractors — the single largest category
  - target_id: sectors/government
    country: us
    role: primary  # McAfee: 6 federal + 5 state + 3 county U.S. government agencies
  - target_id: sectors/government
    country: ca
    role: primary  # McAfee: 2 Canadian government agencies (report anonymizes them)
sources:
