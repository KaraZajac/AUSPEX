    pillar_id: cn/mcf/dual-use-research
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Compromising RSA to reach Lockheed Martin (and Northrop
      Grumman / L-3) targets the US defense-aerospace IP base —
      "a cornucopia of ultra-secret plans for weapons and
      intelligence technologies" (WIRED) — which is precisely the
      defense/contractor collection the MCF dual-use-research
      pillar encodes (cf. the Su Bin C-17/F-22/F-35 case the
      pillar names). No cited source states the strategic purpose
      in doctrine terms, so this stays strongly_inferred rather
      than attested; the competing reading (generic financially-
      motivated theft) is ruled out by the exclusively defense-
      prime target set and the seed-theft-as-access-enabler MO.
    attesting_source_id: wired/2021-05-20_full-story-rsa-hack
    counter_explanation: null
