qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited vs primary/tier-1 sources (raw captured + hashed). FACTS: all confirmed —
    WIRED (Greenberg, 2021-05-20) corroborates the "2011 Recruitment plan" Excel phish, the
    Adobe Flash 0-day -> Poison Ivy, the SecurID "seeds" theft, and the Lockheed Martin
    follow-on (Reuters-named; Northrop Grumman + L-3 also named); Threatpost (2011-04-01)
    relays RSA's own Uri Rivner disclosure of the same Excel/Flash/Poison-Ivy chain
    contemporaneously. ATTRIBUTION (recalibrated): China-nexus is FIRM but post-hoc — NSA's
    Gen. Alexander pinned it "vaguely" on China (nation level, 2012); APT1/Unit-61398 is the
    later Mandiant/NYT consensus (named-unit, 2013). KEY CORRECTION: the prior SOLE source was
    the 2013 Mandiant APT1 report, which on firsthand re-read of the captured PDF contains
    ZERO references to RSA, SecurID, Lockheed, CVE-2011-0609, or the Flash 0-day (the 1 "RSA"
    hit was substring noise in a DoD-dictionary quote) — it cannot support the event facts.
    Added WIRED + Threatpost as the factual cites; kept the APT1 report only as actor-identity
    backing, with a note. Added attribution_level (was absent): two dated entries model the
    nation->named-unit latency. Removed the unsupported APT12 attribution from the summary's
    framing (no cited source names it; no cn/.../apt12 actor exists) -> demoted to a footnote.
    doctrine_link cn/mcf/dual-use-research kept at strongly_inferred (pillar explicitly covers
    defense/contractor + the Su Bin F-35 precedent); added WIRED as supporting source +
    ruled_out reasoning. actor_id cn/pla/apt1 resolves, not stale; defensible per WIRED.

