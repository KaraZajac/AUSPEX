id: 2011-03/rsa-securid-lockheed
name: RSA SecurID breach + Lockheed follow-on
start_date: 2011-03-01
disclosure_date: 2011-03-17
end_date: 2011-06-30
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: phishing
outcome_summary: |
  Spear-phishing of RSA (EMC) employees with a malicious Excel
  attachment compromised SecurID seed values. Stolen seeds were
  subsequently used in attempted intrusions against US defense
  primes including Lockheed Martin. Undermined confidence in
  millions of two-factor tokens; Lockheed-side follow-on intrusion
  blocked.
false_flag_risk: none
summary: |
  Attribution to China was made post-hoc and at the nation level:
  NSA Director Gen. Keith Alexander, briefing the Senate Armed
  Services Committee in 2012, pinned the RSA-derived defense-
  contractor intrusions "vaguely" on China; the specific
  identification of the PLA's Unit 61398 / APT1 followed from the
  2013 Mandiant / NYT exposé, which listed RSA among APT1's
  targets. No cited source pins the RSA operation to a named unit
  at the time, and no cited source names APT12 (an early
  conflation now treated as an overlapping-cluster footnote, not
  the cited attribution). The pattern — break the two-factor token
  vendor to reach the defense-prime customer base — was an early
  canonical supply-chain compromise. Initial access was a spear-
  phishing email titled "2011 Recruitment Plan" with a malicious
  Excel attachment exploiting an Adobe Flash zero-day
  (CVE-2011-0609) to drop the Poison Ivy remote-access trojan,
  followed by credential theft, lateral movement, and exfiltration
  of the SecurID seed-record database. The Lockheed Martin follow-
  on, blocked in May 2011, used the stolen SecurID seeds against
  Lockheed's two-factor VPN (Northrop Grumman and L-3 were also
  named in subsequent reporting) — establishing the canonical
  "compromise the supply chain to defeat the defense in depth"
  pattern that later Chinese supply-chain operations refined.
attributions:
  - actor_id: cn/pla/apt1
    attributing_org: NSA (Gen. Keith Alexander, Senate Armed Services Committee briefing)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2012-03-01
    attribution_source_id: wired/2021-05-20_full-story-rsa-hack
    notes: |
      Earliest governmental attribution: NSA's director told the
      Senate Armed Services Committee (2012) that the RSA hack led
      to a US defense contractor being compromised and pinned it
      "vaguely" on China — nation level, no unit named (per WIRED,
      Greenberg 2021).
  - actor_id: cn/pla/apt1
    attributing_org: Mandiant / New York Times (post-hoc consensus)
    attributing_org_confidence: moderate
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2013-02-19
    attribution_source_id: mandiant/2013-02-19_apt1-report
    notes: |
      The PLA Unit 61398 / APT1 identification followed from the
      Feb-2013 Mandiant report, which listed RSA among APT1's
      targets; WIRED ties the RSA breach to this group. The 2013
      report itself documents Unit 61398 generally and does NOT
      analyze the RSA intrusion — it backs the actor identity, not
      the event facts (those are in the WIRED + Threatpost cites).
      Some early reporting assigned APT12; treated as an
      overlapping-cluster footnote, not the cited attribution.
doctrine_links:
