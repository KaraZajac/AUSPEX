  notes: |
    FACTS ✓ (corroborated against contemporaneous + secondary
    reporting; both McAfee PDFs — the 2013 "Dissecting Operation
    Troy" and the dedicated July-2011 "10 Days of Rain" — are
    Akamai HTTP-403 bot-walled and archive.org is off-limits for
    this audit, so verified indirectly). Dates: attack began
    2011-03-04 and ran ~10 days then self-destructed → start_date
    2011-03-04 / end_date 2011-03-14 ✓. Targets ✓: ~40 sites —
    ROK Presidential Office (Blue House), Foreign Ministry, NIS,
    major ROK financial institutions, ROK military, AND U.S.
    Forces Korea + USAF Kunsan Air Base; 14 targets carried over
    from the 2009 set, most US-based 2009 targets dropped. So the
    outcome_summary's "ROK government, US Forces Korea, ROK
    financial sector" is accurate. Self-destruct ✓: overwrite key
    files with zeroes + zero the MBR to render hosts unbootable.
    Encryption (AES/RC4/RSA) and ~11,000 infected PCs corroborated.
    Sector targets (government/defense-ministry, finance/banking)
    match; all FKs resolve.
    SUMMARY — CORRECTED. The prior claim that the DDoS tool was
    "delivered via spear-phishing of ROK government and bank IT
    staff" is NOT supported by the sources: the documented
    contemporaneous infection vector was malware injected via two
    ROK peer-to-peer file-sharing sites (~11,000 PCs). Rewrote to
    reflect that and to note the precise initial access is not
    definitively established (initial_vector: unknown retained,
