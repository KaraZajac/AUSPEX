id: 2011-03/ten-days-of-rain
name: Ten Days of Rain
start_date: 2011-03-04
disclosure_date: 2011-03-04
end_date: 2011-03-14
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  DDoS + reconnaissance probes against ROK government, US Forces
  Korea infrastructure, and the ROK financial sector over a
  ten-day period in March 2011. Limited damage; characterized by
  McAfee as an institutional capability-development operation
  within the broader Lazarus-precursor campaign family.
false_flag_risk: none
summary: |
  Mid-tier disruption operation tying together Operation Troy
  (2009) and DarkSeoul (2013) into a single campaign family under
  McAfee's later "Operation Troy" tracking. McAfee's analysis ties
  the operation to the same DPRK toolset (the Trojan.Castov /
  HastatiWiper / Jokra family and the W32/Koredos DDoS module)
  later operationalized in DarkSeoul: a DDoS tool seeded onto
  victim hosts (the contemporaneous infection vector was malware
  injected via two ROK peer-to-peer file-sharing sites, reaching
  ~11,000 PCs; the precise initial access is not definitively
  established, hence initial_vector: unknown), an encrypted
  configuration list of ~40 target URLs (14 carried over from the
  2009 target set; most US-based 2009 targets dropped), a
  self-destruct routine that overwrites key files and zeroes the
  compromised host's MBR after a configured countdown to render it
  unbootable, and a slow-burn reconnaissance phase that maps the
  target estates before the attack window. The 10-day pattern
  prefigures DarkSeoul's 2013 coordinated 14:00 KST detonation.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: McAfee / ROK NIS
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2013-07-09
    attribution_source_id: mcafee/2013-07-09_operation-troy
    notes: |
      Attribution provenance is layered and the single cited source
      (McAfee, 2013 "Dissecting Operation Troy") does NOT itself
      name a nation. (1) McAfee labels the campaign-family actor the
      "NewRomanic Cyber Army Team," assesses it ~95% likely the same
      group behind the July 2009 DDoS and this March 2011 "Ten Days
      of Rain" event (shared compiler / directory structure / crypto
      key), and explicitly "did not go as far to point fingers at
      any country" — its contemporaneous 2011 "10 Days of Rain"
      briefing went only as far as "very clear anti-Korean and
      anti-US political motivations" and framed the operation as a
      "test run" / armed cyber-reconnaissance. McAfee names NO DPRK
      service or unit (no RGB, no Bureau 121). (2) The hard "North
      Korea" attribution is ROK NIS's (it publicly tied the 2009/2011
      ROK DDoS to the DPRK), a primary attribution that is NOT
      separately cited in this record. (3) actor_id kp/rgb/lazarus /
      attribution_level named-actor reflect the later community
      consensus (CISA, Treasury 2019, MITRE G0032, Mandiant) that
      folds Troy / Ten Days of Rain / DarkSeoul into the Lazarus
      umbrella under the RGB — that RGB-naming lives in the actor
      record's own cited sources, NOT in this event's McAfee source.
      The cited source alone reaches only a single un-nationed
      activity cluster; high confidence here rests on the convergent
      retrospective consensus, hence event-level qc level: partial.
      (Mirrors the sibling Operation Troy audit, same source.)
