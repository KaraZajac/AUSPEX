id: 2011-02/night-dragon
name: Operation Night Dragon — PRC intrusions into Western oil & gas majors
start_date: 2009-11-01
disclosure_date: 2011-02-10
end_date: 2011-02-10
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # SQL injection plus spear-phishing in the McAfee analysis
outcome_summary: |
  McAfee disclosed a two-year intrusion campaign against five
  unnamed major Western oil, gas, and petrochemical firms
  (Exxon, Royal Dutch Shell, BP, Marathon, ConocoPhillips
  per subsequent press identification). Initial access via SQL
  injection and spear-phishing; lateral movement to harvest
  competitive-intelligence material — bid information, oil-
  field exploration data, operational SCADA documentation,
  and project financing data. C2 infrastructure resolved to
  Beijing IP space; tooling overlap with prior PRC-attributed
  campaigns.
false_flag_risk: none
summary: |
  Night Dragon is the canonical pre-MIC2025 case of PRC
  cyber-targeted competitive intelligence in the
  energy/extractives sector. The campaign aligns with PRC
  state interest in equity-stake-and-acquisition strategy
  for overseas oil-and-gas assets (CNOOC, Sinopec) during
  the 11th Five-Year Plan period. McAfee declined to name a
  specific PRC service; the campaign is generally clustered
  with the broader PLA / MSS collection milieu of the period.
