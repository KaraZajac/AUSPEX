  notes: "Audited vs the McAfee Night Dragon white paper (live URL 403; archive.org snapshot fetched, HTTP 200, 19-pg PDF, sha256 b7de0515... captured as raw_snapshot). FACTS corrected: (1) report names NO victim company — the five majors (Exxon/Shell/BP/Marathon/Conoco) are LATER PRESS (Bloomberg 2011), not McAfee; moved that claim out of McAfee's voice. (2) C2 geography fixed — C&C ran on US-leased + NL-compromised servers; only data EXFILTRATION came from Beijing IPs (report p.4 + Appendix B). (3) duration 'two years' -> 'at least two years, likely as many as four' (verbatim). (4) added source-named victim geography KZ/TW/GR/US + tools (zwShell RAT, gsecdump, Cain & Abel). ATTRIBUTION: McAfee 'no direct evidence to name the originators', only 'strong evidence... based in China' — added attribution_level: activity-cluster; corrected note (the Heze/Shandong individual ran a US-hosting reseller, explicitly NOT the mastermind; 'coordinator-level attribution' was an overstatement). actor_id stays null (counter-action norm, mirrors Operation Shady RAT). FK FIX: removed dangling orgs/shell + orgs/bp (absent from targets registry AND from the cited source); kept registry-backed orgs/exxon flagged as press-named. doctrine_links: both kept at plausible (MIC2025/MCF both postdate the 2009-11 op — not over-attested); MCF pillar dropped to null (dual-use-R&D pillar covers academic/defense/ICT, not energy). published_on 2011-02-10 confirmed (PDF cover). level: full (primary source fully reviewed via archive snapshot)."
