id: 2011-02/night-dragon
name: Operation Night Dragon — PRC intrusions into Western oil & gas majors
start_date: 2009-11-01
disclosure_date: 2011-02-10
end_date: 2011-02-10
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # SQL injection of extranet web servers + spear-phishing of mobile/VPN users (McAfee report, "Details of the Attack")
outcome_summary: |
  McAfee disclosed a coordinated intrusion campaign — ongoing
  "at least two years, and likely as many as four" — against
  global oil, gas, and petrochemical companies (the report
  names no victim company), plus individuals and executives in
  Kazakhstan, Taiwan, Greece, and the United States. The five
  named majors widely cited for this case (ExxonMobil, Royal
  Dutch Shell, BP, Marathon, ConocoPhillips) come from later
  press reporting (Bloomberg, Feb 2011), NOT from the McAfee
  white paper. Initial access via SQL injection of extranet web
  servers and spear-phishing; lateral movement with pass-the-
  hash / credential tools (gsecdump, Cain & Abel) and custom
  RATs (chiefly zwShell) to harvest competitive-intelligence
  material — oil-and-gas field bid and exploration data,
  project-financing documents, and, in some cases, data from
  SCADA systems. C&C ran on attacker-leased hosting in the US
  and compromised servers in the Netherlands; McAfee found all
  identified data-exfiltration activity originated from
  Beijing-based IP addresses, operating weekdays 9–5 Beijing
  time.
false_flag_risk: none
summary: |
  Night Dragon is the canonical pre-MIC2025 case of PRC
  cyber-targeted competitive intelligence in the
  energy/extractives sector. The campaign aligns with PRC
  state interest in equity-stake-and-acquisition strategy
  for overseas oil-and-gas assets (CNOOC, Sinopec) during
  the 11th Five-Year Plan period. McAfee was explicit that it
  had "no direct evidence to name the originators" — only
  circumstantial evidence that "the attackers were based in
  China"; it named no PRC service and no PLA/MSS unit. The
  campaign is editorially clustered with the broader PRC
  state-aligned collection milieu of the period (this AUSPEX
  framing, not McAfee's).
attributions:
  - actor_id: null
    attributing_org: McAfee
    attributing_org_confidence: moderate
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2011-02-10
    attribution_source_id: mcafee/2011-02-10_night-dragon
    notes: |
      McAfee identified one individual in Heze City, Shandong
      Province, who ran a US-server-leasing reseller ("hosted
      servers in the U.S. with no records kept") used to host the
      zwShell C&C application — but states explicitly it does NOT
      believe this person is the mastermind, only that he may have
      information identifying the responsible parties. Data
      exfiltration came from Beijing-based IPs (the C&C servers
      themselves were US-leased / NL-compromised). McAfee named no
      PLA/MSS unit and "no direct evidence to name the originators";
      no DOJ indictment. activity-cluster: China-origin asserted,
      no named actor.
