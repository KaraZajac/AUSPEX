id: 2017-12/sidewinder-pakistan-air-force-early
name: Early SideWinder operations against Pakistani military networks (pre-naming)
start_date: 2017-01-01
disclosure_date: null
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Early SideWinder operations against Pakistani military targets,
  later named and dissected by Kaspersky (Securelist) in its
  Q1-2018 APT-trends report. Kaspersky documented the cluster
  spreading malware via weaponized exploits of known
  vulnerabilities — notably CVE-2017-11882 — followed by a
  PowerShell payload in the final stages.
false_flag_risk: none
summary: |
  Pre-naming window for SideWinder (aka Rattlesnake / T-APT-04),
  an India-aligned espionage cluster active since at least 2012
  whose canonical target set is Pakistani military and government
  networks. Kaspersky publicly named and dissected the cluster in
  2018, assessing with low confidence that the malware "might be
  authored by an Indian company"; no Indian-government attribution
  exists.
attributions:
  - actor_id: in/unscoped/sidewinder
    attributing_org: Kaspersky (Securelist) / vendor-consensus
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-03-07
    attribution_source_id: kaspersky/2018-03-07_sidewinder-targeting-pakistan
    notes: |
      Kaspersky's Q1-2018 APT-trends report named SideWinder as a
      cluster "mainly targeting Pakistan military targets, active
      since at least 2012", with only "low confidence that this
      malware might be authored by an Indian company" — nation
      named at low confidence, no Indian service named, hence
      named-actor (not named-unit) and in/unscoped. The
      originally-cited Trend Micro Jan-2018 report is unverifiable
      (dead catalogue stub — see qc); attribution was re-pointed to
      the Kaspersky primary.
