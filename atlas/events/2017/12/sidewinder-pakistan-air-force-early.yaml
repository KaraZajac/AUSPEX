id: 2017-12/sidewinder-pakistan-air-force-early
name: Early SideWinder operations against Pakistani Air Force and military networks (pre-naming)
start_date: 2017-01-01
disclosure_date: 2018-01-15
end_date: 2017-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Trend Micro tracked operations through 2017 attributed to the
  cluster Kaspersky would publicly name "SideWinder" in March
  2018. Targets in this earlier window included Pakistani Air
  Force personnel, Pakistani military networks, and adjacent
  defense-research entities. Tradecraft included weaponized
  RTF documents exploiting CVE-2017-11882 (which became the
  cluster's long-running staple), HTA-staged droppers, and the
  early SideWinder C# loader family.
false_flag_risk: none
summary: |
  Pre-naming continuity event for SideWinder. The Pakistani Air
  Force and military-network victim set established the
  cluster's canonical target profile that subsequent Kaspersky
  (2018), Trend Micro (2020), Group-IB (2022), and Sekoia
  (2025) reporting would extend. Useful as the timeline anchor
  for SideWinder's first documented operational year.
