  verified_on: 2026-06-27
  level: partial
  notes: |
    HEADLINE: the sole originally-cited source
    (trend-micro/2018-01_sidewinder-pakistan-air-force-early) is a DEAD
    STUB and this event is a near-duplicate of
    2018-03/kaspersky-sidewinder-pakistan — RECOMMEND RETIRE/MERGE.

    [STEP2] Snapshotted the cited Trend Micro URL
    (https://www.trendmicro.com/en_us/research/): it redirects to
    .../research.html, the generic "Research, News, and Perspectives"
    catalogue page — sha256 b8944e01…54ce2752, 137,169 bytes — with ZERO
    hits for sidewinder/rattlesnake/pakistan/"air force"/t-apt-04/
    cve-2017-11882. It carries none of the event's claims; web search
    finds no Trend Micro Jan-2018 SideWinder report (TM's earliest is
    2019 CVE-2019-2215 + Dec-2020). Re-pointed the event to the on-disk
    Kaspersky primary (kaspersky/2018-03-07_sidewinder-targeting-pakistan,
    sha256 20f8402f…02407a12b, 187,450 bytes; Q1-2018 APT-trends report).

    [a FACTS] Kaspersky verbatim (snapshot line 252): "Sidewinder – An
    actor mainly targeting Pakistan military targets, active since at
    least 2012. We have low confidence that this malware might be authored
    by an Indian company. To spread the malware, they use unique
    implementations to leverage the exploits of known vulnerabilities
    (such as CVE-2017-11882) and later deploy a Powershell payload in the
    final stages." SUPPORTED: SideWinder cluster; Pakistani-military focus;
    since 2012; India (low conf); CVE-2017-11882; spear-phishing + PowerShell.
    STRIPPED as fabricated/unsupported: (1) "Trend Micro tracked operations
    through 2017" — no such report; (2) "Pakistani Air Force personnel" +
    the orgs/pakistan-air-force target — PAF targeting is documented for
    2015 (AT&T Alien Labs "Global Perspective of the SideWinder APT"), not
    2017, AND that target FK was DANGLING (no
    atlas/targets/orgs/pakistan-air-force.yaml exists); (3) "adjacent
    defense-research entities" — unsourced; (4) "HTA-staged droppers and
    the early SideWinder C# loader family" — not in any cited source (these
    are later-report TTPs from the actor ttp_summary); (5) end_date
    2017-12-31 and disclosure_date 2018-01-15 — fabricated precision,
    nulled. start_date kept 2017-01-01 as an APPROXIMATE (CVE-2017-11882 is
    a late-2017 staple and Kaspersky's early-2018 report describes
    then-current activity); matches the sibling 2018-03 event.

    [b ATTRIBUTION] Was "Trend Micro / vendor-consensus" sourced to the
    dead stub (a fabricated attribution — the stub names no one). Re-pointed
    attribution_source_id to the Kaspersky primary; attributing_org
    "Kaspersky (Securelist) / vendor-consensus"; date 2018-03-07. Kept
    moderate / concur-with-caveat: Kaspersky names the cluster firmly but
    holds only LOW confidence on Indian-company authorship and names no
    Indian service (sibling 2018-03 uses high; moderate is the honest read).

    [c DATES] Kaspersky published_on 2018-03-07 (its record; public
    reporting also cites ~12-Apr-2018 for the Q1-2018 summary — minor
    discrepancy flagged, not in scope). Event end_date/disclosure_date
    nulled (see [a]).

    [d DOCTRINE] in/regional-collection-pakistan-china/pakistan-military,
    strongly_inferred — kept. No source states India's strategic GOAL, so
    NOT attested (no attesting_source_id); target + actor-mission
    triangulate to one reading (IN regional collection vs Pakistan).
    reasoning de-PAF'd.

    [e ATTRIBUTION_LEVEL] Added named-actor (was missing): named cluster +
    nation at low confidence, no service → named-actor, consistent with the
    actor's audited in/unscoped placement.

    [f ACTOR_ID] in/unscoped/sidewinder RESOLVES (file
    atlas/actors/in/sidewinder.yaml carries id in/unscoped/sidewinder). No
    actor edits.

    LEVEL partial: the originally-assigned load-bearing source was
    un-snapshottable as a real article (dead catalogue stub); surviving
    claims are now carried by the re-pointed Kaspersky primary, but the
    record remains a flagged duplicate pending human retire/merge.
