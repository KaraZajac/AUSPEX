id: 2017-12/sk-crypto-exchange-thefts
name: 2017 South Korean cryptocurrency exchange thefts (Youbit/Yapizon, Bithumb, Coinis)
start_date: 2017-02-01  # Bithumb theft (Feb 2017) is the earliest sourced DPRK crypto op; Yapizon Apr 2017; Youbit Dec 2017
disclosure_date: 2017-12-19  # Youbit bankruptcy filing (Security Affairs / Newsweek)
end_date: 2017-12-31  # sourced SK-exchange thefts are all 2017; Treasury's regional five-exchange window runs to Sept 2018 but is not SK-specific
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Campaign of thefts against South Korean cryptocurrency exchanges
  and their users through 2017. Bithumb lost ~$7M (February 2017);
  Yapizon lost ~4,000 BTC (~$5M at the time, ~40% of its assets) in
  April 2017; after rebranding to Youbit the same exchange was
  hacked a second time in December 2017 (losing 17% of assets) and
  filed for bankruptcy on 19 December 2017 — the first South Korean
  cryptocurrency exchange to fail from a hack (customers recovered
  ~75% pending proceedings). Coinis and Coinlink were also targeted
  by spear-phishing.
quantified_impact:
  usd_stolen_estimate: 12000000  # sum of the two cleanly-sourced SK-exchange thefts: Bithumb ~$7M (Feb, Recorded Future) + Yapizon ~$5M (Apr, Security Affairs). The Dec-2017 Youbit loss (17% of assets) was not disclosed in USD. NB Treasury 2019 gives a REGIONAL ~$571M / five-Asian-exchange figure (Jan 2017–Sept 2018) that is not SK-exchange-specific and is not summed here.
  notes: |
    Prior value 75000000 was a misattribution: it is the DOJ 2021
    indictment's "$75 million from a Slovenian cryptocurrency
    company in December 2017" (a NiceHash-class victim), which is
    not a South Korean exchange and was wrongly imported here as the
    SK "cumulative" total. Corrected 2026-07-10.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Early expression of the DPRK pivot from SWIFT-network bank theft
  toward direct cryptocurrency-exchange theft. Recorded Future
  (Insikt Group, January 2018) documented a late-2017 spear-
  phishing campaign against South Korean cryptocurrency users and
  exchanges delivered through Hancom Hangul Word Processor (.hwp)
  documents carrying a Ghostscript exploit (CVE-2017-8291); the
  payloads were 32-bit DLLs built on Destover infostealer code
  previously seen in the 2014 Sony Pictures attack, the January
  2017 Polish banking attacks, and the first WannaCry victim —
  Recorded Future's basis for the North Korea attribution. Korea
  Internet & Security Agency (KISA) attributed the first Youbit
  (Yapizon) theft of ~4,000 BTC to hackers based in North Korea,
  and researchers cited by Newsweek tied the activity to the
  BlueNoroff subgroup of Lazarus. US Treasury (2019) and DOJ (2021)
  later attributed DPRK cryptocurrency-exchange theft broadly to
  Lazarus / BlueNoroff / APT38, with Treasury assessing that the
  three RGB-controlled groups likely stole around $571 million in
  cryptocurrency from five Asian exchanges between January 2017 and
  September 2018.
