    notes: "Treasury designates BlueNoroff (an RGB-controlled Lazarus subgroup) and states DPRK cyber operations 'target Virtual Asset Providers and cryptocurrency exchanges' and that 'these three state-sponsored hacking groups likely stole around $571 million in cryptocurrency alone, from five exchanges in Asia between January 2017 and September 2018' — the regional exchange-theft campaign encompassing these SK thefts. Treasury does NOT name Youbit/Yapizon/Bithumb/Coinis individually. BlueNoroff is also the subgroup Newsweek's researchers name for this activity."
