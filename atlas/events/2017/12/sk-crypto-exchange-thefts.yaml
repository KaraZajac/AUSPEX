id: 2017-12/sk-crypto-exchange-thefts
name: 2017–2018 South Korean cryptocurrency exchange thefts (Youbit, Bithumb, Coinis, Yapizon)
start_date: 2017-04-01  # Yapizon April 2017; multiple exchanges through 2018
disclosure_date: 2017-12-19  # Youbit bankruptcy disclosure
end_date: 2018-12-31
incident_type:
  - financial-theft
  - intrusion
initial_vector: phishing
outcome_summary: |
  Multi-exchange spear-phishing campaign against ROK
  cryptocurrency exchanges and their employees. Wallet-key
  extraction; tens of millions stolen cumulatively across Yapizon
  (April 2017), Coinis, Bithumb (multiple), and Youbit
  (December 2017, forcing the exchange into bankruptcy).
quantified_impact:
  usd_stolen_estimate: 75000000  # cumulative
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Early pivot from SWIFT-network bank theft to direct
  cryptocurrency exchange theft. Established the operational
  pattern — spear-phishing of exchange engineers and finance
  staff with weaponized resume / Hangul HWP / Microsoft Office
  documents, follow-on delivery of the Manuscrypt / NukeSped
  remote-access trojans and the FALLCHILL backdoor, valid-
  credentials lateral movement on the exchange's internal
  network, and hot-wallet key extraction — that TraderTraitor
  would systematize post-2018. Symantec / Kaspersky / FireEye
  observed BLINDINGCAN, RatankbaPOS, and Volgmer artifacts
  consistent with Lazarus / APT38 / Bluenoroff overlap across
  the Yapizon, Coinis, Bithumb, and Youbit intrusions.
