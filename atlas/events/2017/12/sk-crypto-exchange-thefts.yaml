    notes: "DOJ's superseding indictment attributes DPRK cryptocurrency theft to RGB units 'known … as Lazarus Group and Advanced Persistent Threat 38 (APT38)'. Corroborates the actor/pattern only: DOJ's enumerated December-2017 crypto victim is a Slovenian company ('$75 million from a Slovenian cryptocurrency company'), NOT a South Korean exchange, so this source does not carry the SK-exchange victims of this event."
