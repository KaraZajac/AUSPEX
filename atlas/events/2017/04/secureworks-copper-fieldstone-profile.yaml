qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: "Audited vs the Secureworks CTU COPPER FIELDSTONE threat profile (raw Wayback id_ snapshot already on disk; content_sha256 9346bc80... re-verified matching — live secureworks.com URL 301-redirects to sophos.com and renders empty post-acquisition). FACTS confirmed verbatim in raw: 'COPPER FIELDSTONE is a threat group operating out of Pakistan targeting primarily Indian diplomatic and military personnel'; Crimson RAT (8x), Operation C-Major (2x), Transparent Tribe (2x); 'In late 2016, COPPER FIELDSTONE launched a campaign'. Vendor-naming-reconciliation framing (2nd tier-2 vendor lineage after Proofpoint 2016) is sound. ATTRIBUTION: Secureworks names the COUNTRY only — ZERO whole-word ISI / Inter-Services hits in raw — so pk/unscoped service placement is correct and honest; attributing_org_confidence high + auspex_assessment concur appropriate for a vendor profile. Added attribution_level: named-actor (was absent) for consistency with the 20+ sibling APT36 events — the profile names a specific cluster and reconciles aliases; NOT named-unit. actor_id pk/unscoped/transparent-tribe RESOLVES (id field on atlas/actors/pk/transparent-tribe.yaml, shared across 20+ events) — not stale. published_on 2017-04-13 matches disclosure/end dates. DOCTRINE: single link pk/asymmetric-posture-india/military-collection kept strongly_inferred (attesting_source_id null) — the profile documents Indian military/diplomatic targeting but states no PK strategic purpose, so correctly NOT attested; doctrine + pillar both resolve. Directionality OK (pk-aligned actor -> Indian victims). NB the auditor's task framing ('COBALT GYPSY / Iran-nexus / OilRig / APT34') is a distractor and does NOT match this record — zero Iran/COBALT/OilRig/APT34 content in the source; Secureworks COPPER prefix = nation-state-suspected, consistent with Pakistan. Target FK orgs/indian-military-various is part of the corpus-wide deferred targets/ registry gap (validator: warning, not error); orgs/indian-mod resolves. Left targets as-is — not in scope for a single-event audit."
