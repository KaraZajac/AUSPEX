id: 2017-04/secureworks-copper-fieldstone-profile
name: Secureworks publishes COPPER FIELDSTONE threat profile for Transparent Tribe
start_date: 2016-01-01
disclosure_date: 2017-04-13
end_date: 2017-04-13
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Secureworks Counter Threat Unit published its COPPER FIELDSTONE
  threat-group profile, formally documenting Secureworks' internal
  cluster designation for what Proofpoint had named Transparent
  Tribe / Operation C-Major in 2016. The profile established a
  second tier-2 vendor lineage on the same Pakistani-aligned
  cluster targeting Indian military and diplomatic personnel,
  reinforcing the Crimson RAT attribution and providing the COPPER
  FIELDSTONE alias that subsequent reporting (MITRE ATT&CK G0134,
  CrowdStrike Mythic Leopard) reconciled into the consolidated
  Transparent Tribe cluster identity.
false_flag_risk: none
summary: |
  Vendor-naming-reconciliation event. The COPPER FIELDSTONE
  publication is the canonical Secureworks reference for the
  Transparent Tribe cluster and is the second independent
  tier-2 vendor attribution after Proofpoint 2016, consolidating
  the Pakistani-aligned attribution.
attributions:
  - actor_id: pk/unscoped/transparent-tribe
    attributing_org: Secureworks Counter Threat Unit
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2017-04-13
    attribution_source_id: secureworks/2017-04-13_copper-fieldstone-transparent-tribe
    notes: |
      Secureworks CTU profile attributes COPPER FIELDSTONE to the
      COUNTRY, not a service: "COPPER FIELDSTONE is a threat group
      operating out of Pakistan targeting primarily Indian diplomatic
      and military personnel." The words ISI / Inter-Services
      Intelligence do NOT appear, hence the pk/unscoped service
      placement. named-actor (the profile names a specific cluster
      and reconciles the Transparent Tribe / C-Major aliases), not
      named-unit. NB Secureworks COPPER = nation-state-suspected
      cryptonym prefix, consistent with the Pakistan nexus.
doctrine_links:
  - doctrine_id: pk/asymmetric-posture-india
    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Indian military and diplomatic personnel targeting documented
      in the Secureworks profile fits the military-collection pillar
      canonically.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/indian-military-various
    country: in
    role: primary
  - target_id: orgs/indian-mod
    country: in
    role: primary
sources:
