        - "critical-infrastructure is an explicit target_sector of the non-contact-warfare pillar"
        - "campaign postdates the 25 Dec 2014 Military Doctrine, so the op-follows-doctrine temporal fit holds (unlike the 2011-2014 Havex phase)"
      ruled_out: "A one-off criminal / opportunistic intrusion — rejected: the indictment charges an FSB state unit (Center 16) running a multi-year, target-selected campaign against national critical infrastructure, which is the sub-threshold state operation the non-contact rubric describes."
