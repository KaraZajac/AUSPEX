    reasoning: |
      The DOJ indictment's formal OBJECT OF THE CONSPIRACY (¶17) states
      the terminal goal in substance: persistent covert access to US
      energy-sector systems (including power generation and the Wolf
      Creek nuclear plant) "thereby enabling the Russian government to
      disrupt and damage such systems, if it wished." That is exactly
      the energy-weaponization / oil-gas-nuclear pre-positioning purpose
      the pillar encodes — access as latent coercive leverage — and the
      pillar names Berserk Bear / FSB Center 16 / Wolf Creek / watering-
      hole by name. No disruptive action was executed, which is
      consistent with pre-positioning rather than counter to it.
    attesting_source_id: doj/2022-03-24_akulov-gavrilov-tyukov-indictment
    inference_basis:
      source_quote: "The object of the conspiracy was to establish and maintain surreptitious, unauthorized access to networks, computers, and devices of companies and other entities in the energy sector, including power generation facilities, in the United States and elsewhere, thereby enabling the Russian government to disrupt and damage such systems, if it wished."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/non-contact-warfare
