id: 2017-04/berserk-bear-us-energy-campaign
name: Berserk Bear / Dragonfly 2.0 US energy-sector campaign
start_date: 2017-04-01  # campaign visible from 2017; longer campaign 2012–17 per indictment
disclosure_date: 2018-03-15
end_date: 2018-12-31
incident_type:
  - intrusion
  - pre-positioning
initial_vector: supply-chain
outcome_summary: |
  Watering-hole compromise of ICS-vendor websites, spearphishing,
  trojaned ICS software updates, and Cisco router exploitation
  achieving pre-positioning access in US/UK/EU electric utilities,
  oil & gas, nuclear (Wolf Creek Nuclear Operating Corp), and
  petroleum environments. No observed disruptive action.
false_flag_risk: none
operators_named:
  - akulov-pavel  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
  - gavrilov-mikhail  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
  - tyukov-marat  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
summary: |
  CISA TA18-074A (Mar 2018) was the first US Government attribution
  of the Russian energy-sector campaign. DOJ Mar 2022 indictment of
  FSB Center 16 officers Pavel Akulov, Mikhail Gavrilov, and Marat
  Tyukov for the 2012–17 campaign formalizes the attribution.
  Tradecraft documented across TA18-074A and Symantec/Dragonfly
  reporting: spear-phishing carrying weaponized Word documents that
  triggered SMB credential harvesting against attacker-controlled
  servers, watering-hole compromises of trade-publication and ICS-
  vendor websites (template-injection of staged servers), trojanized
  ICS engineering-software installers on vendor download pages, and
  Cisco router exploitation via SMI / SNMP for transit access.
  Post-exploitation used valid credentials (harvested from the SMB
  template attacks and credential dumping), PowerShell, Mimikatz,
  scheduled tasks, and the Karagany / Heriplor / GoodOR backdoors,
  along with web shells planted on victim Exchange / IIS servers
  for persistence.
