    confidence: strongly_inferred
    reasoning: |
      Sustained, sub-threshold FSB intrusion into US critical-
      infrastructure networks (an explicit target sector of this pillar)
      is a textbook non-contact / gray-zone operation. The label is
      strongly_inferred, not attested: no cited source names a non-
      contact-warfare purpose — it is an analytic overlay that co-exists
      with (rather than competes against) the primary energy-
      weaponization reading, at a different level of abstraction (mode of
      warfare vs strategic effect). Unlike the 2011-2014 Havex phase
      (dragonfly-energetic-bear, tagged plausible because it predates the
      doctrine), this 2016-2018 phase POSTDATES the 25 Dec 2014 Military
      Doctrine, so the op-follows-doctrine temporal objection is removed.
    attesting_source_id: null
    inference_basis:
      signals:
