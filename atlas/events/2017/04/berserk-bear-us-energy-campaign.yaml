id: 2017-04/berserk-bear-us-energy-campaign
name: Berserk Bear / Dragonfly 2.0 US energy-sector campaign
start_date: 2017-04-01  # 2017 intensification (Wolf Creek May-2017 spearphishing); TA18-074A dates this phase-2 campaign "since at least March 2016"; indictment conspiracy 2012–2017
disclosure_date: 2018-03-15  # US-CERT TA18-074A
end_date: 2018-12-31
incident_type:
  - intrusion
  - espionage
  - pre-positioning
initial_vector: phishing  # spear-phishing (SMB credential-harvest Word docs); watering-hole co-primary (TA18-074A). Phase-1 Havex supply-chain = the 2014 dragonfly-energetic-bear event.
outcome_summary: |
  Spear-phishing (malicious Word documents that harvested SMB
  credential hashes) and watering-hole compromises of ICS / process-
  control trade-publication and vendor websites gave the FSB Center 16
  actors persistent, pre-positioned access to US and international
  energy-sector networks — electric utilities, oil & gas, and nuclear,
  including the Wolf Creek Nuclear Operating Corporation. No disruptive
  action was observed; the DOJ charged that the access enabled "the
  Russian government to disrupt and damage such systems, if it wished."
false_flag_risk: none
operators_named:
  - akulov-pavel  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
  - gavrilov-mikhail  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
  - tyukov-marat  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
summary: |
  US-CERT / DHS-FBI Technical Alert TA18-074A (15 Mar 2018) was the
  first US Government attribution of the Russian energy-sector
  intrusion campaign (Dragonfly 2.0 / Berserk Bear). The 24 Mar 2022
  DOJ indictment (D. Kansas) of FSB "Center 16" (Military Unit 71330)
  officers Pavel Akulov, Mikhail Gavrilov, and Marat Tyukov formalized
  the attribution for the 2012–2017 campaign and named the Wolf Creek
  Nuclear Operating Corporation intrusion (May 2017 spearphishing)
  explicitly as "part of Dragonfly 2.0." Tradecraft documented in
  TA18-074A: a two-tier model of "staging targets" (trusted third
  parties) pivoting to "intended targets"; spear-phishing whose
  malicious Microsoft Word/.docx attachments retrieved a remote file
  over SMB (file://) to harvest credential hashes; watering-hole
  compromises of process-control / ICS trade-publication and
  informational websites, altered (JavaScript / PHP) to force the same
  SMB credential-harvesting request; and post-exploitation using valid
  credentials, PowerShell, scheduled tasks, web shells on victims'
  public email / web servers, open-source credential tools (Hydra,
  SecretsDump, CrackMapExec), and collection of ICS / SCADA design
  documents. The indictment's 2012–2017 conspiracy also charges the
  earlier Havex supply-chain phase, modeled separately as the 2014
  Dragonfly / Energetic Bear event.
