    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: strongly_inferred  # downgraded 2026-07-11 from attested (see reasoning)
    perspective: attacker-rationale
    reasoning: |
      APT38's SWIFT-network bank thefts are the operational core of
      the DPRK's cyber-enabled hard-currency generation, which the
      Byungjin sanctions-evasion-revenue pillar encodes (the era-
      correct framework for 2017-2019; kp/8th-congress-defense-plan
      is 2021 and would be anachronistic here). CISA AA20-239A draws
      the theft-revenue -> weapons linkage, but hedges it modally
      ("North Korea CAN use these funds ...") and frames the primary
      purpose as UN-sanctions evasion / revenue generation. That is a
      strong signal of the terminal weapons-financing goal but short
      of a flat attestation of it — hence strongly_inferred, not
      attested (harmonized with the 2016-02 Bangladesh Bank sibling,
      which was likewise downgraded).
    attesting_source_id: null
    inference_basis:
      signals:
        - "CISA AA20-239A: 'North Korea can use these funds for its UN-prohibited nuclear weapons and ballistic missile programs.' — a joint govt-primary advisory drawing the theft-revenue -> WMD/ballistic-missile linkage, but modally hedged ('can use')."
        - "CISA AA20-239A frames the activity as UN-Security-Council-resolution evasion that 'generates substantial revenue for North Korea' and is 'likely a major source of funding for the North Korean regime' — the proximate revenue function the pillar encodes."
        - "APT38 / BeagleBoyz is a dedicated financial-theft element of the RGB (CISA AA20-239A; DOJ 2021), whose raison d'etre is sanctions-evasion revenue generation (Mandiant APT38 report)."
      ruled_out: "Attested: no cited source states the terminal weapons-financing purpose outright — CISA's WMD linkage is modal ('can use') and DOJ 2021 names only the proximate sanctions-evasion / revenue goal."
    contested: false
    analyst: claude
