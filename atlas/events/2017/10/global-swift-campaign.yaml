name: Global SWIFT campaign (FEIB Taiwan, Banco de Chile, Bancomext, others)
start_date: 2017-10-01  # FEIB Taiwan heist, October 2017 (Mandiant: "Far Eastern International Bank in Taiwan in October 2017") — earliest post-Bangladesh in-scope op; was an unsourced 2016-10-01
disclosure_date: 2017-10-06  # FEIB Taiwan disclosed October 2017 (first public disclosure of an in-scope op)
end_date: 2019-02-13  # Bank of Valletta (Malta) SWIFT op; DOJ 2021 bounds the bank campaign "2015 through 2019" and names Malta; was an unsourced 2019-08-01
incident_type:
  - financial-theft
  - intrusion
initial_vector: phishing
outcome_summary: |
  Post-Bangladesh wave of the APT38 / BeagleBoyz SWIFT-network
  campaign against second-tier banks. Taiwan's Far Eastern
  International Bank saw ~$60M in fraudulent SWIFT transfers
  (October 2017) routed to the US, Cambodia and Sri Lanka — all but
  ~$500K recovered, with two arrests in Sri Lanka; Mexico's Bancomext
  attempt (January 2018) was blocked; Banco de Chile lost ~$10M (May
  2018) in a SWIFT fraud masked by a KillDisk wiper that crashed
  ~9,000 workstations. DOJ 2021 bounds the whole 2015-2019 bank
  campaign at more than $1.2B attempted across Vietnam, Bangladesh,
  Taiwan, Mexico, Malta and Africa; the pattern was consolidated in
  CISA AA20-239A (BeagleBoyz).
quantified_impact:
  usd_stolen: 10000000       # Banco de Chile (24 May 2018) net SWIFT theft (~$10M, routed to Hong Kong)
  usd_attempted: 60000000    # FEIB Taiwan (Oct 2017) fraudulent SWIFT transfers; all but ~$500K recovered
  usd_recovered: 59500000    # FEIB: "all but $500,000 has been recovered" (The Register 2017-10-11)
  # Campaign-wide DOJ 2021 total: >$1.2B ATTEMPTED 2015-2019 across all banks, which INCLUDES the
  # separately-recorded Bangladesh ($81M) and Tien Phong events; CISA AA20-239A: ~$2B attempted since 2015.
false_flag_risk: none
campaign_id: apt38-swift-bank-heists  # free-text campaign tag shared with the Bangladesh / Tien Phong siblings; no campaign record exists (flag)
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 indictment (named in cited DOJ 2021 source)
  - jon-chang-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 indictment (named in cited DOJ 2021 source)
  - kim-il  # DPRK RGB / Lab 110, DOJ Feb 2021 indictment (named in cited DOJ 2021 source)
summary: |
  The post-Bangladesh wave of APT38's SWIFT-network bank campaign
  (the December 2015 Tien Phong and February 2016 Bangladesh Bank
  operations are recorded as separate events). Demonstrated the
  group's progressive operationalization of SWIFT-manipulation
  tradecraft across geographies — Taiwan (Far Eastern International
  Bank, October 2017), Mexico (Bancomext, January 2018) and Chile
  (Banco de Chile, May 2018) — alongside the FASTCash ATM cash-out
  operations and, into 2019, the Bank of Valletta (Malta) heist.
  CISA AA20-239A formally consolidated the campaign under the
  BeagleBoyz designation. Tradecraft per that advisory, Mandiant's
  October 2018 APT38 report, and the February 2021 DOJ indictment
  includes: spear-phishing of bank IT and treasury staff with
  weaponized Office documents; the DYEPACK toolkit used to
  manipulate outgoing messages and suppress confirmations on the
  targeted bank's SWIFT Alliance Access software; the NESTEGG and
  HOPLIGHT backdoors; Mimikatz credential dumping with valid-
  credential lateral movement; FASTCash ATM cash-out malware; and
  post-heist distraction / evidence-destruction payloads — the
  Hermes ransomware, and at Banco de Chile a KillDisk wiper variant
  that crashed ~9,000 workstations to mask the fraudulent SWIFT
  transfers.
