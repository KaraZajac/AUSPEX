id: 2017-10/badrabbit-ransomware
name: BadRabbit ransomware
start_date: 2017-10-24
disclosure_date: 2017-10-24
end_date: 2017-10-25
incident_type:
  - ransomware
  - destructive
initial_vector: 0-day  # drive-by water-holed news sites delivering fake Flash update
outcome_summary: |
  Drive-by water-holed news sites delivered a fake Flash update
  that dropped a SMB-worming ransomware against Russian media,
  Ukrainian Kyiv metro, Odessa airport, and Ukrainian ministries.
  Limited but visible disruption.
false_flag_risk: suspected
summary: |
  ESET and Cisco Talos assessed BadRabbit as part of the Sandworm
  / BlackEnergy ecosystem on the basis of code re-use. Hitting
  Russian outlets alongside Ukrainian targets has been read as
  false-flag obfuscation rather than genuine cross-border
  targeting. AUSPEX preserves the dossier's plausible call.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: ESET / Cisco Talos
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2017-10-25
    attribution_source_id: eset/2017-06_industroyer-win32  # ESET tracking; no separate badrabbit advisory source modeled
doctrine_links:
  - doctrine_id: ru/russkiy-mir
    pillar_id: ru/russkiy-mir/ukraine-theater
    program_id: null
    confidence: plausible
    reasoning: |
      Ukrainian critical-services targeting aligns with Ukraine-
      theater destabilization but the cross-border collateral
      to Russian targets complicates the clean tag.
    attesting_source_id: null
    counter_explanation: |
      Could be a criminal ransomware operation that recycled
      Sandworm-adjacent code rather than a state-directed
      campaign. Attribution rests on code-overlap inference; no
      government attribution exists.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/kyiv-metro
    role: primary
  - target_id: orgs/odessa-airport
    role: primary
sources:
  - eset/2017-06_industroyer-win32
