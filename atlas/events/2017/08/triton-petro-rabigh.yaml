    confidence: attested
    reasoning: |
      The Treasury designation attests the strategic substance of the
      SIS-targeting pillar directly: it names TsNIIKhM (a Russian
      government-controlled institute) as responsible for building the
      Triton tools, and states the malware was "designed specifically
      to target and manipulate industrial safety systems ... at
      critical infrastructure facilities ... to protect human life,"
      with "the capability to cause significant physical damage and
      loss of life." That is the only publicly attributed nation-state
      SIS-targeting capability and the corroborated strategic purpose
      this pillar encodes (not merely doctrine-slug naming).
    attesting_source_id: treasury/2020-10-23_tsniikhm-triton-sanctions
    inference_basis:
      source_quote: "The Triton malware — known also as TRISIS and HatMan in open source reporting — was designed specifically to target and manipulate industrial safety systems. Such systems provide for the safe emergency shutdown of industrial processes at critical infrastructure facilities in order to protect human life. ... This cyber-attack was supported by the State Research Center of the Russian Federation FGUP Central Scientific Research Institute of Chemistry and Mechanics (TsNIIKhM), a Russian government-controlled research institution that is responsible for building customized tools that enabled the attack."
      source_id: treasury/2020-10-23_tsniikhm-triton-sanctions
