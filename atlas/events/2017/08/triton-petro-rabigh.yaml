id: 2017-08/triton-petro-rabigh
name: Triton / Trisis attack on Saudi Petro Rabigh
start_date: 2017-06-01  # long-dwell preceding the August trip event
disclosure_date: 2017-12-14
end_date: 2017-08-04  # plant trip
incident_type:
  - intrusion
  - destructive
  - pre-positioning
initial_vector: unknown
outcome_summary: |
  Long-dwell IT-to-OT lateral movement and deployment of custom
  Triton/Trisis malware against Schneider Electric Triconex
  safety-instrumented-system (SIS) controllers at the Saudi
  Petro Rabigh petrochemical facility. Payload misfired during
  reconfiguration, causing an unscheduled plant shutdown. First
  known SIS-targeting nation-state malware — capable of disabling
  the last line of safety before a catastrophic physical event.
false_flag_risk: none
operators_named:
  - gladkikh-evgeny  # TsNIIKhM programmer, DOJ Mar 2022 (Triton author)
summary: |
  US Treasury OFAC October 2020 sanctions on TsNIIKhM (Russian
  state research institute) and DOJ March 2022 indictment of
  TsNIIKhM programmer Evgeny Gladkikh formalized the attribution.
  Mandiant/FireEye April 2019 TRITON Actor TTP Profile remains
  the foundational technical analysis. Tradecraft documented
  across the Mandiant and Dragos reports: spear-phishing for
  initial IT-network access, multi-year dwell, custom HATMAN /
  TRITON / TRISIS malware targeting Schneider Electric Triconex
  3008 safety-instrumented-system controllers via the proprietary
  TriStation TCM protocol, Mimikatz credential dumping, lateral
  movement on valid credentials across the IT-OT boundary,
  PowerShell-based persistence, scheduled tasks, custom remote-
  access trojans deployed on the engineering workstation, web
  shells on intermediate web servers, and the dropping of a
  payload (inject.bin) into the Triconex controller intended to
  reprogram the safety logic prior to a process-manipulation
  follow-on. The payload mis-fired during reconfiguration,
  causing the SIS to fail safe.
