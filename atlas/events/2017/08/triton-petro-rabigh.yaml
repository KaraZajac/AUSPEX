id: 2017-08/triton-petro-rabigh
name: Triton / Trisis attack on Saudi Petro Rabigh
start_date: 2017-05-01  # IT-network access "by May 2017, at least 90 days before" the attack (INL/CyOTE); DOJ charged window "between May and September 2017"
disclosure_date: 2017-12-14  # FireEye original TRITON disclosure (INL/CyOTE cites the FireEye blog dated "14 December 2017")
end_date: 2017-08-04  # 4 Aug 2017, 7:43 PM: six Triconex SIS controllers tripped to a safety shutdown (INL/CyOTE)
incident_type:
  - destructive       # sabotage payload by design; realized effect was a safe-state trip, not physical destruction
  - cyber-physical
  - pre-positioning   # Mandiant: "installing malware like TRITON and waiting for the right time to use it"
initial_vector: unknown  # contested: Treasury says "initially deployed through phishing"; INL/CyOTE (per Dragos) says initial access via "a poorly configured firewall directly exposed to the Internet"
outcome_summary: |
  Long-dwell IT-to-OT lateral movement and deployment of custom
  Triton/Trisis malware against the Schneider Electric Triconex
  Tricon safety-instrumented-system (SIS) controllers at the Saudi
  Petro Rabigh (Rabigh Refining & Petrochemical Company) facility.
  The malware first tripped a single SIS controller on 2 June 2017
  (initially misread as a mechanical fault); on 4 August 2017 it
  tripped six Triconex SIS controllers into a safety shutdown,
  leaving the plant inoperable ~10 days (~$938,000 revenue loss,
  per INL/Dragos) and prompting the investigation that discovered
  the malware. The first publicly known malware purpose-built to
  target industrial safety systems — capable of disabling the last
  line of safety before a catastrophic physical event; Dragos
  assessed the six-controller targeting "potentially could have
  caused major physical damage and loss of human life."
quantified_impact:
  sis_controllers_tripped: 6    # INL/CyOTE: six Triconex SIS controllers safety-shutdown on 4 Aug 2017
  outage_days: 10               # INL/CyOTE: plant inoperable ~10 days after the 4 Aug trip
  revenue_loss_usd: 938000      # INL/CyOTE (per Dragos): "lost approximately $938,000 in revenue"
false_flag_risk: none
operators_named:
  - gladkikh-evgeny  # TsNIIKhM programmer, DOJ Mar 2022 (Triton author)
summary: |
  US Treasury OFAC October 2020 sanctions on TsNIIKhM (Russian
  state research institute) and the DOJ March 2022 indictment of
  TsNIIKhM programmer Evgeny Gladkikh (charged conduct "between May
  and September 2017") formalized the Russia attribution;
  Mandiant/FireEye's April 2019 TRITON Actor TTP Profile is the
  foundational IT-lifecycle analysis, and the DOE/INL CyOTE case
  study (2022) the fullest govt account of the victim, timeline and
  impact. Documented tradecraft: initial IT-network access (vector
  contested — Treasury says phishing, INL/Dragos an internet-exposed
  misconfigured firewall), roughly a year of network presence before
  the actor reached the SIS engineering workstation (Mandiant),
  custom HatMan / Triton / Trisis malware targeting the Schneider
  Electric Triconex Tricon (Model 3008) SIS controllers — connecting
  to the Tricon Communication Module (TCM) via the proprietary
  TriStation protocol — Mimikatz credential harvesting, lateral
  movement on valid credentials across the IT-OT boundary,
  scheduled-task and IFEO-registry persistence, custom backdoors
  staged ahead of the SIS engineering-workstation access, webshells
  on the Outlook Exchange servers, and delivery of the TRITON
  payload (trilog.exe encoding inject.bin / imain.bin) to reprogram
  the Triconex safety logic. The payload misfired during
  reconfiguration, tripping the SIS to a fail-safe state rather than
  achieving the intended manipulation.
