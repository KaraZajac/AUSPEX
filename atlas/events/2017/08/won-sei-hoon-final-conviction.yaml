end_date: 2017-08-30
incident_type:
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  Korean Supreme Court confirmed the conviction of former
  NIS Director Won Sei-hoon for violations of the National
  Intelligence Service Act and the Public Official Election
  Act arising from the 2012 election interference campaign.
  Closes the judicial sequence on the canonical case of
  ROK intelligence-service cyber misuse for domestic
  political ends.
false_flag_risk: none
summary: |
  Final adjudication of the criminal liability arising from
  the 2012-2013 NIS Psychological Warfare Bureau cyber
  influence campaign. The Supreme Court's ruling settled a
  long judicial sequence (2013 indictment; 2014 first-
  instance conviction; 2015 appellate reversal in part;
  2016 retrial; 2017 final conviction) and provided the
  highest-court endorsement of the prosecutorial findings.

  Editorial framing: AUSPEX includes this event because the
  judicial closure is itself the doctrinal anchor — without
  it, the 2013 indictment would be a contested allegation
  rather than a doctrine-codified case. The case is now
  one of the few public-record gold-standard examples of
  cyber misuse by an intelligence service adjudicated to
  final conviction in a democratic legal system.

  Companion to the 2013-04 indictment event.
