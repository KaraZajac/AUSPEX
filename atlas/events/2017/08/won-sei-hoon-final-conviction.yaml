outcome_summary: |
  The Seoul High Court, on retrial (2017-08-30), reconvicted
  former NIS Director Won Sei-hoon and sentenced him to four
  years for violations of the National Intelligence Service
  Act and the Public Official Election Act arising from the
  2012 election-interference campaign. The Supreme Court of
  Korea UPHELD this conviction in April 2018, closing the
  judicial sequence on the canonical case of ROK
  intelligence-service cyber misuse for domestic political ends.
false_flag_risk: none
summary: |
  The 2017-08-30 Seoul High Court retrial reconviction of
  the criminal liability arising from the 2012-2013 NIS
  Psychological Warfare Bureau cyber influence campaign.
  Judicial sequence (corrected 2026-06-25 against the cited
  source): 2013 indictment; Feb-2015 first-instance
  conviction (3-year term); appellate reversal/remand;
  2017-08-30 Seoul High Court retrial reconviction (4-year
  term) — the event marked here; and April-2018 Supreme Court
  of Korea ruling UPHOLDING the conviction (the actual final
  adjudication).

  Editorial framing: AUSPEX includes this event because the
  judicial reconviction is itself the doctrinal anchor —
  without it, the 2013 indictment would be a contested
  allegation rather than a doctrine-codified case. The case
  is one of the few public-record gold-standard examples of
  cyber misuse by an intelligence service adjudicated through
  the courts of a democratic legal system to final conviction
  (upheld by the Supreme Court, April 2018).

  Companion to the 2013-04 indictment event.
