id: 2017-08/cobalt-group-atm-jackpotting
name: Group-IB profiles Cobalt Group ATM-jackpotting campaign
start_date: 2016-06-01
disclosure_date: 2018-05-29  # AUDIT 2026-06-27: was 2017-08-01 — cited report published 2018-05-29
end_date: null  # AUDIT 2026-06-27: was 2018-03-25 (leader arrest, external/Europol); cited source says group "still active" — not bounded here
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Per Group-IB, Cobalt operated from 2016 against the global
  banking sector and stole approximately €1 billion from over
  100 banks in 40 countries. Reported tradecraft: phishing of
  bank employees, roughly three weeks of reconnaissance inside
  victim networks, then cash-out — initially by attacking ATMs
  to dispense cash ("ATM jackpotting"), later expanding to SWIFT
  transfers, card processing and payment gateways. Group-IB
  states it has technical proof of joint operations with Anunak
  (Carbanak), including SWIFT thefts in Hong Kong and Ukraine.
  The report assesses the group as still active at publication.
false_flag_risk: none
summary: |
  Group-IB's "Cobalt: Evolution and Joint Operations" report
  profiles the Cobalt Group, a financially-motivated cybercrime
  cluster active since 2016 that Group-IB credits with stealing
  ~€1 billion from over 100 banks in 40 countries. The group
  began with attacks on ATMs in 2016 (the late-2010s ATM-
  jackpotting wave) and expanded to SWIFT, card-processing and
  payment-gateway fraud; Group-IB reports technical proof of
  joint operations with Anunak (Carbanak). AUSPEX classifies
  this as criminal-baseline — no documented state nexus, so
  doctrine_links is empty.
