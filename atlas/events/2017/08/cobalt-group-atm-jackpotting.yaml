notes: |
  Context NOT carried by the single cited Group-IB report
  (flagged for the orchestrator to add proper citations): the
  cluster name derives from the "Cobalt Strike" pentest tool the
  group used for C2; on ~26 March 2018 the alleged leader (named
  by Spain's Interior Ministry as "Denis K.", a Ukrainian
  national) was arrested in Alicante, Spain — per Europol, which
  described the Carbanak/Cobalt syndicate as hitting 100+
  financial institutions across 40 countries for >€1 billion.
  Cobalt is also widely linked to FIN7, and the detailed ATM-
  jackpotting tooling (e.g. ATMSpitter) is documented in
  Group-IB's earlier Nov-2016 "Cobalt: logical attacks on ATMs"
  report, not the cited "Evolution and Joint Operations" report.
