id: 2017-08/cobalt-group-atm-jackpotting
name: Group-IB profiles Cobalt Group ATM-jackpotting campaign
start_date: 2016-06-01
disclosure_date: 2017-08-01
end_date: 2018-03-25
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Group-IB's August 2017 report on Cobalt Group — a Russian-
  speaking financial-cybercrime cluster active since 2016
  against more than 250 banks across Eastern Europe, Russia,
  the CIS, Southeast Asia, and the Americas. Tradecraft:
  spear-phishing bank employees, lateral movement to ATM
  control infrastructure, deployment of ATMSpitter / atmii
  to instruct ATMs to dispense cash on demand to mule
  collectors ("ATM jackpotting"). Heavy use of Cobalt Strike
  penetration-testing tool for C2 — the source of the
  cluster name. Lead defendant "Denis K." (Ukrainian
  national) arrested in Alicante, Spain in March 2018 on a
  Spanish warrant; subsequent convictions in Spain and
  Kazakhstan through 2019–2020.
false_flag_risk: none
summary: |
  Cobalt Group is the canonical ATM-jackpotting criminal
  cluster of the late 2010s, operationally adjacent to
  Carbanak / FIN7. AUSPEX classifies as criminal-baseline.
