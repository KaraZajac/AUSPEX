  notes: |
    APT32 / OceanLotus (Vietnam-nexus) intrusion in the German automotive
    sector, cited to a single BR/NDR source whose URL is null (404, no
    wayback) — UNFETCHABLE, no raw_snapshot captured, no URL fabricated.
    Core actor + sector CONFIRMED against multiple independent mirrors
    (SecurityWeek 2019-12; CyberScoop "Vietnam's premier hacking group
    ramps up targeting of global car companies"; Security Affairs 94805;
    BleepingComputer): APT32/OceanLotus, Vietnam-aligned, ran a 2019
    automotive-IP collection cluster using Cobalt Strike; FireEye assessed
    (moderate confidence) it supported "the Vietnamese government's stated
    domestic vehicle and auto part manufacturing goals." That ties cleanly
    to Resolution 23-NQ/TW (2018, automotive indigenization) + VinFast —
    doctrine link vn/industrial-upgrading-cyber-collection/automotive holds.
    LEVEL partial — three event-specific claims could NOT be corroborated and
    conflict with the well-documented record; left in place but flagged for
    Kara (not fabricating corrections):
    (1) DATE. disclosure/attribution/source published_on = 2019-07-08. The
    major BR/NDR OceanLotus auto investigation was DECEMBER 2019 (Dec 6-10,
    widely mirrored). No independent trace of a distinct 8-Jul-2019 BR/NDR
    report survives link-rot. The 2017-06 end_date / 2016-01 start_date
    (multi-year 2016-2017 sustained intrusion) are likewise uncorroborated;
    the documented German-carmaker intrusions are spring-2019. This event may
    be the same underlying reporting as br-ndr/2019-12-06_oceanlotus-bmw-hyundai,
    back-projected — human should reconcile or merge.
    (2) VICTIM. A distinct, named German "tier-1 supplier" with a sustained
    2016-2017 intrusion is not in any locatable source; documented victims are
    OEMs (BMW + Hyundai; Toyota via fake domains). FireEye noted "5-10
    automotive-sector orgs" got lures since Feb 2019, which is the only basis
    for an unnamed supplier — hence the anonymous orgs/ slug.
    CORRECTIONS MADE (factual, in place): removed "KerrDown loader" from
    outcome_summary — KerrDown first appeared early 2018 (Unit 42), so it is
    anachronistic for a 2016-2017 op (only Cobalt Strike corroborated);
    de-claimed "VW"/"Daimler" → BMW(+Hyundai), the corroborated pair (VW and a
    separate Daimler intrusion are unverified); source title de-claimed VW;
    added AUDIT note to the source documenting unfetchable + date discrepancy.
    ATTRIBUTION: added attribution_level: named-actor (was missing). Reaches
    named-actor (OceanLotus/APT32) but NO Vietnamese service named — matches
    the vn/unscoped/apt32 actor record (demoted from vn/tc2 on 2026-06-24:
    no cited source names a service). auspex_assessment concur-with-caveat is
    apt given the single unfetchable journalism source. actor_id resolves and
    is CURRENT (not stale). DOCTRINE LINK strongly_inferred, no attesting_source_id
    — honest, no over-attestation (FireEye goal-in-substance source not cited
    here, so not upgraded to attested). Doctrine + pillar FKs resolve;
    Resolution 23-NQ/TW reference is consistent with the doctrine record (23 =
    industrial/automotive; distinct from 29-NQ/TW = cyber/regime-stability).
    Event NOT in the backfill cohort (dates to initial commit). false_flag_risk
    none and incident_type intrusion+data-theft are supported.
