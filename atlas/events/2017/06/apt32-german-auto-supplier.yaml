id: 2017-06/apt32-german-auto-supplier
name: APT32 sustained intrusion at German automotive tier-1 supplier (industry retrospective)
start_date: 2016-01-01
disclosure_date: 2019-07-08
end_date: 2017-06-01
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Bayerischer Rundfunk and Norddeutscher Rundfunk reporting tied
  OceanLotus / APT32 to a sustained intrusion at a major German
  automotive-sector victim — covered alongside the contemporaneous
  BMW (and Hyundai) intrusions broken by the same BR/NDR team. The
  reporting drew on intelligence-service briefings and on tradecraft
  analysis matching the wider 2019 OceanLotus automotive cluster.
  Tooling included Cobalt Strike beacons.
  # AUDIT (2026-06-25, claude-opus-4.8/max): removed "KerrDown loader" —
  # KerrDown was first observed in the wild early 2018 (Unit 42, Feb 2019),
  # so it cannot be the tooling of a 2016-2017 intrusion; only Cobalt Strike
  # is corroborated for the BR/NDR auto cluster. Changed "BMW and Daimler"
  # to "BMW (and Hyundai)": the well-documented BR/NDR pair is BMW+Hyundai
  # (SecurityWeek/CyberScoop/Security Affairs, Dec 2019); a distinct Daimler
  # intrusion is unverified. "July 2019" removed — see qc notes (date unsupported).
false_flag_risk: none
summary: |
  Part of the rolling 2017-2019 OceanLotus automotive cluster.
  The German-supplier intrusion fits the broader pattern of
  APT32 targeting tier-1 suppliers and OEMs whose IP would
  accelerate Vietnamese automotive indigenization under VinFast
  and the Resolution 23-NQ/TW industrial-priorities framework.
  BR / NDR reporting drew on German intelligence-service
  assessments that named the cluster.
