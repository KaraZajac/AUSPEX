id: 2017-06/notpetya
name: NotPetya
start_date: 2017-06-27
disclosure_date: 2017-06-27
end_date: 2017-07-15
incident_type:
  - destructive
  - wiper
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Supply-chain compromise of the M.E.Doc Ukrainian tax-accounting
  software pushed wiper malware (masquerading as ransomware) that
  combined EternalBlue exploitation and Mimikatz credential
  harvesting to self-propagate worm-style across affected
  networks. ~$10B global damage per White House — "the most
  destructive and costly cyberattack in history." Major victims
  included Maersk, Merck, FedEx/TNT, Mondelez, Reckitt Benckiser,
  Saint-Gobain.
quantified_impact:
  usd_damage_global: 10000000000
false_flag_risk: none  # ransomware masquerade is not state-attribution false-flag
operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020 (also Mueller 2018)
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  Targeted at Ukrainian businesses; collateral global spread
  read by US/UK governments as a feature rather than a bug.
  White House Press Statement (15 Feb 2018) and UK NCSC
  attribution (same day) called the operation a Russian military
  campaign to destabilize Ukraine. DOJ Oct 2020 indictment named
  six GRU Unit 74455 officers including Anatoliy Kovalev.
attributions:
