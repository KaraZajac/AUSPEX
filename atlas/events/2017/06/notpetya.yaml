id: 2017-06/notpetya
name: NotPetya
start_date: 2017-06-27
disclosure_date: 2017-06-27
end_date: 2017-07-15
incident_type:
  - destructive
  - wiper
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Supply-chain compromise of the M.E.Doc Ukrainian tax-accounting
  software pushed destructive wiper malware masquerading as
  ransomware (irrecoverable by design — the ransom/decrypt path
  was bogus), which self-propagated worm-style using the
  EternalBlue exploit plus a modified Mimikatz (Plainpwd)
  credential harvester and PsExec for lateral movement. The White
  House (Feb 2018) called it "the most destructive and costly
  cyber-attack in history," causing "billions of dollars in
  damage"; the total was later assessed at more than $10 billion
  (a White House assessment confirmed to WIRED by then-Homeland
  Security adviser Tom Bossert). Major victims: Maersk (~$300M),
  Merck (~$870M), FedEx/TNT Express (~$400M), Saint-Gobain
  (~$400M), Mondelez (~$188M), Reckitt Benckiser (~$129M).
quantified_impact:
  usd_damage_global: 10000000000  # ">$10B" White House assessment relayed via Tom Bossert to WIRED (2018); the Feb-2018 WH press statement itself said only "billions of dollars"
false_flag_risk: none  # ransomware masquerade is not state-attribution false-flag
operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020 (also Mueller 2018)
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  NotPetya was targeted at Ukrainian businesses via the M.E.Doc
  tax-software supply chain, but self-propagation drove
  indiscriminate global spread. The White House Press Statement
  (15 Feb 2018) and the UK FCO/NCSC (same day) attributed the
  operation to the Russian military and framed it as part of the
  Kremlin's effort to destabilize Ukraine — the White House
  calling it "the most destructive and costly cyber-attack in
  history," NCSC assessing Russia "almost certainly" responsible.
  The DOJ Oct 2020 indictment named six GRU Unit 74455 officers
  (incl. Anatoliy Kovalev). AUSPEX reads the tolerated global
  collateral as consistent with the Russkiy-Mir / Ukraine-theater
  aim, though both governments characterized the spread itself as
  "reckless and indiscriminate."
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: White House / UK NCSC
    attributing_org_confidence: high
    attribution_level: nation  # both govts said "the Russian military" — no GRU unit named in 2018
    auspex_assessment: concur
    attribution_date: 2018-02-15
    attribution_source_id: whitehouse/2018-02-15_notpetya-attribution
    notes: |
      Nation-level: the WH statement and the UK FCO/NCSC statement both
      attribute NotPetya to "the Russian military" (NCSC: "almost
      certainly"), naming no GRU unit. AUSPEX resolves this to the
      ru/gru/74455/sandworm actor with the benefit of the later DOJ
      indictment. UK half corroborated by
      ukgov/2018-02-15_notpetya-fco-ncsc-attribution.
  - actor_id: ru/gru/74455/sandworm
    attributing_org: US Department of Justice
    attributing_org_confidence: high
    attribution_level: named-unit  # DOJ names "Unit 74455 of the GRU" + six officers
    auspex_assessment: concur
    attribution_date: 2020-10-15
    attribution_source_id: doj/2020-10-15_sandworm-six-gru-officers-indictment
doctrine_links:
  - doctrine_id: ru/russkiy-mir
    pillar_id: ru/russkiy-mir/ukraine-theater
    program_id: null
    perspective: attacker-rationale
    confidence: attested
    reasoning: |
      Both the White House (Feb 2018) and the DOJ Oct-2020
      indictment state destabilization of Ukraine as the strategic
      intent in substance — the Russkiy-Mir / Ukraine-theater
      terminal goal (Ukraine as the priority Russian cyber theater).
      WH: "part of the Kremlin's ongoing effort to destabilize
      Ukraine"; DOJ: attacks "intended to support Russian government
      efforts to undermine, retaliate against, or otherwise
      destabilize: (1) Ukraine …". The tolerated global collateral to
      Western firms reads as feature, not bug, consistent with that
      framing.
    attesting_source_id: whitehouse/2018-02-15_notpetya-attribution
    inference_basis:
      source_quote: "It was part of the Kremlin's ongoing effort to destabilize Ukraine and demonstrates ever more clearly Russia's involvement in the ongoing conflict."
      source_id: whitehouse/2018-02-15_notpetya-attribution
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/non-contact-warfare
    program_id: null
    perspective: attacker-rationale
    confidence: strongly_inferred  # downgraded from attested 2026-07-10: sources name the actor ("Russian military") but do NOT state the non-contact/gray-zone-warfare doctrine goal
    reasoning: |
      A destructive military cyberattack short of kinetic war is a
      textbook instance of the 2014 doctrine's non-contact / indirect
      (gray-zone) warfare pillar, and the WH/NCSC statements confirm
      the perpetrator was "the Russian military." But NEITHER source
      states non-contact/gray-zone warfare as the operation's goal or
      doctrinal rationale — they attribute the actor and one aim
      (destabilize Ukraine, which tags Russkiy-Mir above). So this
      modality link is a strong inference, not an attestation.
    attesting_source_id: null
    inference_basis:
      signals:
        - "The White House and UK NCSC both attribute NotPetya to the Russian military (GRU) — a state military instrument, the actor the 2014 doctrine places under General Staff purview for information/cyber confrontation."
        - "NotPetya was a destructive cyber operation executed below the threshold of open armed conflict against Ukraine and spilling into NATO states — the continuous gray-zone / non-contact modality the pillar authorizes."
        - "The Sandworm actor record lists ru/military-doctrine-2014/non-contact-warfare as a default doctrine alignment."
      ruled_out: "Attested: no cited source articulates 'non-contact/indirect warfare' as the operation's stated goal — the govt statements name the actor and the destabilize-Ukraine aim, not this doctrine's terminal concept."
    counter_explanation: null
    contested: false
    analyst: claude
