  notes: |
    RE-SOURCE (badrabbit model) of a DEGRADED record. The prior stamp had nulled the
    actor and emptied doctrine because the sole citation (avast/2017-09_ccleaner = the
    Talos "CCleanup" blog) names no actor. The CCleaner compromise is genuine and
    well-documented; restored by adding the real primaries and re-pointing attribution.
    Sources snapshotted + hashed:
      - avast/2017-09_ccleaner (Talos "CCleanup", 2017-09-18): sha256 519fd6fe…eb98643c,
        91,536 B (re-verified on disk).
      - blogtalosintelligence/2017-09-20_ccleaner-c2-concern (Talos C2 follow-up): sha256
        0776f5e5…20aef845, 85,161 B (NEW).
      - avast/2017-09-21_progress-on-ccleaner-investigation (Avast figures): sha256
        49657d33…f573af75, 173,908 B (NEW).
      - intezer/2017-09-20_aurora-ccleaner-supply-chain (APT17/Axiom code overlap): sha256
        cb9e2901…5cf9f6e2, 261,583 B (NEW).
      - mandiant/2019-08-07_apt41-double-dragon (FireEye Double Dragon, full PDF mirror):
        sha256 6085d114…9ea04ec4, 8,244,365 B (snapshot ADDED; official cloud.google.com
        URL is a JS shell, so the snapshot is the publicly-mirrored full PDF,
        cross-checked vs the threatrack/cti_report_collection text mirror).

    [a] FACTS — all source-carried. Talos CCleanup carries: trojanized signed v5.33
    (rel. 2017-08-15); CCBkdr/CBkdr.dll multi-stage payload;
    __scrt_get_dyn_tls_init_callback redirect; ~601s delay; HKLM\SOFTWARE\Piriform\Agomo;
    HTTPS POST to 216.126.225.148 w/ speccy.piriform.com Host header; time-based DGA;
    Symantec-issued Piriform cert; identified 2017-09-13 / notified Avast same day /
    hosted "as recently as September 11, 2017"; v5.34 rel. 2017-09-12; DGA sinkholed;
    external-attacker-or-insider. NEWLY RESTORED + now source-carried: 2.27M install base
    ("2.27M computers between August 15, 2017 and September 15, 2017" — Avast progress;
    corroborated by the FireEye PDF "downloaded by 2.27 million customers"); stage-2
    selective targeting of "high-profile technology companies" incl. Cisco ("the array
    specified contains Cisco's domain (cisco.com) along with other high-profile
    technology companies … a very focused actor after valuable intellectual property" —
    Talos C2), with "at least 20 victim machines" (Talos C2) / "20 machines in a total
    of 8 organizations" (Avast). CAVEAT (recorded on the Talos-C2 source): the individual
    firm list (Intel/Samsung/Sony/VMware/…) is in the post's targeting-table SCREENSHOT,
    not the HTML text — only "Cisco" + "high-profile technology companies" are
    text-extractable, so the prose says "a list of high-profile technology companies" and
    names only Cisco verbatim. NOT re-introduced: the anachronistic ShadowHammer-2019
    framing (no cited 2017 source ties it) and the "third-stage ShadowPad/keylogger"
    finding (lives in Avast's 2018 TeamViewer post, not cited here); only FireEye's
    "March 2017 initial access" is noted, since the snapshotted FireEye PDF carries it.

    [b] ATTRIBUTION — restored to cn/unscoped/apt17 (APT17 / Axiom / Group 72 /
    "Operation Aurora"): named-actor, moderate, concur-with-caveat, via Intezer's base64
    code-overlap ("a unique implementation of base64 only previously seen in APT17 … a
    strong case about attribution to the same threat actor"), corroborated by
    Kaspersky/Raiu (Missl backdoor) and Cisco Talos' own "Missl backdoor - APT17/Group
    72" comparison. NOT apt41: the re-source brief's premise (that FireEye named
    APT41/Barium for CCleaner) is contradicted by the source — the FireEye Double Dragon
    PDF explicitly DECLINES ("we do not have enough information to attribute the CCleaner
    compromise to APT41 at this time"), identifies the backdoor as BLACKCOFFEE (an APT17
    tool), and calls the operators "suspected Chinese espionage operators."
    attribution_source_id → intezer/2017-09-20_aurora-ccleaner-supply-chain.

    [c] DATES — published_on verified from snapshot metadata: Talos C2 2017-09-20T21:57Z;
    Intezer 2017-09-20T10:34Z; Avast progress 2017-09-21 (only date stamp on page);
    FireEye 2019-08-07. Event start_date 2017-08-15 (v5.33 malicious-distribution start) /
    disclosure_date 2017-09-18 (Talos CCleanup) / end_date 2017-09-12 (v5.34) retained;
    FireEye's "March 2017" initial-access date noted in prose, not used as start_date
    (operationally the distribution window is the op).

    [d] DOCTRINE_LINKS — restored cn/mic2025 / next-gen-it at strongly_inferred (was [] after
    degradation; pre-degradation was strongly_inferred). Grounds now source-carried: stage-2
    selective IP-targeting of high-profile technology firms (Talos C2) by a China-nexus
    espionage actor (APT17/Axiom). attesting_source_id =
    blogtalosintelligence/2017-09-20_ccleaner-c2-concern (the supporting source; it states
    the proximate IP purpose, not the MIC2025 goal → strongly_inferred, not attested).
    inference_basis.signals + ruled_out (financial cybercrime) added.

    [e] ATTRIBUTION_LEVEL — named-actor (China-nexus group named via code overlap; no
    service/unit named → cn/unscoped, not named-unit).

    [f] ACTOR_ID — cn/unscoped/apt17 resolves (atlas/actors/cn/apt17.yaml). Added
    sectors/ict (resolves) as the stage-2 primary target; orgs/piriform-ccleaner (staging)
    retained as a known deferred orgs/ target-FK gap (not fabricating a registry entry, per
    the sibling NetSarang event's precedent).

    FLAGS:
    1) ACTOR cn/mss/apt41: its ttp_summary lists "CCleaner 2017" as an APT41 supply-chain
       compromise — NOT supported by the evidence here. FireEye (the APT41 originator)
       explicitly declined to attribute CCleaner to APT41, and the code overlap points to
       APT17/Axiom. Recommend revising the apt41 record to drop or heavily caveat the
       CCleaner claim.
    2) SOURCE mandiant/2019-08-07_apt41-double-dragon: official cloud.google.com URL is a JS
       shell (body absent from static HTML); the snapshot is the publicly-mirrored full PDF
       (hashed, text-mirror-cross-checked). A reviewer who rejects mirror snapshots may
       downgrade this event to partial.
    3) The APT17-vs-APT41-vs-"new cluster" question is genuinely contested; "Group 72" is an
       equivalent alias on BOTH cn/unscoped/apt17 (MISP) and cn/mss/apt41 (Talos) — a real
       taxonomic collision the orchestrator may want to reconcile.
