id: 2017-09/ccleaner-supply-chain
name: CCleaner supply-chain attack
start_date: 2017-08-15
disclosure_date: 2017-09-18
end_date: 2017-09-12
incident_type:
  - supply-chain
  - intrusion
initial_vector: supply-chain
outcome_summary: |
  Cisco Talos identified the trojanized CCleaner v5.33 on 2017-09-13 (it had been
  hosted on Piriform's legitimate download server "as recently as September 11,
  2017") and notified Avast the same day. The malicious v5.33 had been distributed
  from its release on 2017-08-15 until v5.34 shipped on 2017-09-12. CCleaner
  reported over 2 billion total downloads as of November 2016 and ~5 million new
  users per week, so the exposure was potentially very large; Talos did NOT state
  an infection count. Talos registered and sinkholed the malware's DGA fallback
  domains to deny them to the operators, and noted antivirus detection of the
  binary was very low (1/64) at publication.
false_flag_risk: none
summary: |
  Cisco Talos disclosed that the legitimate, code-signed CCleaner v5.33 distributed
  by Piriform (which Avast had recently acquired) had for a period carried a
  multi-stage malware payload (CCBkdr). The 32-bit CCleaner binary was modified so
  that '__scrt_get_dyn_tls_init_callback' redirected execution into malicious code
  that decrypted a position-independent PE loader and a backdoor DLL (CBkdr.dll).
  The backdoor profiled the host, stored state in HKLM\SOFTWARE\Piriform\Agomo
  registry values, delayed ~601 seconds to evade automated analysis, and beaconed
  via HTTPS POST to a hardcoded C2 (216.126.225.148) using a spoofed
  speccy.piriform.com Host header, failing back to a time-based Domain Generation
  Algorithm when the primary C2 was unreachable. The installer was signed with a
  valid certificate issued to Piriform Ltd by Symantec; Talos assessed it likely
  that an external attacker had compromised part of Piriform's development or build
  environment, while expressly noting an insider could not be ruled out. This
  report named no threat actor and made no nation-state attribution.
attributions:
  - actor_id: null
    attributing_org: Cisco Talos
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-09-18
    attribution_source_id: avast/2017-09_ccleaner
    notes: |
      The single cited source (Cisco Talos, "CCleanup: A Vast Number of Machines
      at Risk", 2017-09-18) documents the CCleaner/CCBkdr supply-chain compromise
      but NAMES NO THREAT ACTOR and makes NO nation-state attribution — it states
      only that an external attacker (or possibly an insider) compromised
      Piriform's build/dev environment. actor_id is therefore null and
      attribution_level is activity-cluster. The prior record asserted "Attributed
      to APT41 / Barium by Avast + Cisco Talos" at high confidence (concur,
      actor_id cn/mss/apt41); that attribution is NOT carried by this source and
      has been removed as over-attestation. Real-world consensus does tie CCleaner
      to a China-nexus actor (Axiom / Group 72 / APT17 via 2017 code-overlap work
      by Intezer and Kaspersky; later folded into APT41 / Barium by FireEye's 2019
      reporting), but none of that appears in any source cited by this event. See
      the QC FLAGS for the sources an orchestrator would need to add to restore a
      China-nexus / APT41 attribution.
