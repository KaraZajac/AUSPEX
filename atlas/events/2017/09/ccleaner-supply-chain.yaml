id: 2017-09/ccleaner-supply-chain
name: CCleaner supply-chain attack
start_date: 2017-08-15
disclosure_date: 2017-09-18
end_date: 2017-09-12
incident_type:
  - supply-chain
  - intrusion
  - espionage
initial_vector: supply-chain
outcome_summary: |
  Cisco Talos identified the trojanized, code-signed CCleaner v5.33 on 2017-09-13 (it
  had been hosted on Piriform's legitimate download server "as recently as September
  11, 2017") and notified Avast the same day; the malicious v5.33 was distributed from
  its 2017-08-15 release until v5.34 shipped on 2017-09-12. Avast (Piriform) put the
  scale at "2.27M computers between August 15, 2017 and September 15, 2017." Talos
  registered and sinkholed the malware's DGA fallback domains. Recovery of the stage-1
  C2 "targets.php" database then revealed a second, selective stage: the operators
  delivered a specialized second-stage payload only to a curated list of high-profile
  technology companies — Talos confirmed "at least 20 victim machines," and Avast's
  log review found "20 machines in a total of 8 organizations" over the few days of
  recovered logs — which Talos read as "a very focused actor after valuable
  intellectual property." (FireEye later dated the initial Piriform network compromise
  to March 2017.)
false_flag_risk: none
summary: |
  The legitimate, code-signed CCleaner v5.33 distributed by Piriform (which Avast had
  recently acquired) carried a multi-stage backdoor (CCBkdr). The 32-bit binary was
  modified so that '__scrt_get_dyn_tls_init_callback' redirected execution into
  malicious code that decrypted a position-independent PE loader and a backdoor DLL
  (CBkdr.dll); the backdoor profiled the host, stored state in
  HKLM\SOFTWARE\Piriform\Agomo, delayed ~601 seconds to evade automated analysis, and
  beaconed via HTTPS POST to a hardcoded C2 (216.126.225.148) using a spoofed
  speccy.piriform.com Host header, failing back to a time-based Domain Generation
  Algorithm. The installer was signed with a valid certificate issued to Piriform Ltd
  by Symantec; Talos assessed it likely that an external attacker compromised part of
  Piriform's development or build environment, while noting an insider could not be
  ruled out. The first disclosure (Cisco Talos, 2017-09-18) named no actor, but
  follow-up code analysis tied the operation to a China-nexus espionage cluster:
  Intezer and, independently, Kaspersky's Costin Raiu matched the stage-1 backdoor's
  unique base64 routine to the "Missl" backdoor used by APT17 / Axiom (a.k.a. Group
  72, Aurora / "Operation Aurora") — a comparison Cisco Talos reproduced in its C2
  follow-up post. FireEye's 2019 APT41 report described the operators as "suspected
  Chinese espionage operators" and identified the backdoor as BLACKCOFFEE (an APT17
  tool) while expressly declining to attribute CCleaner to APT41. AUSPEX therefore
  attributes the operation to the China-nexus APT17 / Axiom cluster (named-actor,
  moderate confidence, via code overlap), not to APT41 / Barium.
attributions:
  - actor_id: cn/unscoped/apt17
    attributing_org: Intezer
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-09-20
    attribution_source_id: intezer/2017-09-20_aurora-ccleaner-supply-chain
    notes: |
      First disclosure (Cisco Talos, "CCleanup", 2017-09-18) named NO actor and NO
      nation — only "an external attacker ... or an insider." The China-nexus
      attribution comes from follow-up code analysis: Intezer (Jay Rosenberg,
      2017-09-20) found the CCleaner stage-1 backdoor shares "a unique implementation
      of base64 only previously seen in APT17 and not in any public repository, which
      makes a strong case about attribution to the same threat actor," placing it in
      the APT17 / Axiom ("Operation Aurora" / #Axiom umbrella) cluster = AUSPEX
      cn/unscoped/apt17. Independently corroborated by Kaspersky's Costin Raiu (same
      base64 subroutine matched to the APT17/Axiom "Missl" backdoor) and reproduced by
      Cisco Talos, whose C2 post embeds the "Missl backdoor - APT17/Group 72" code
      comparison. attribution_level = named-actor (a China-nexus group is named via
      code overlap); NOT named-unit (no MSS/PLA service is named — the actor sits at
      cn/unscoped/apt17). attributing_org_confidence = moderate (code-overlap
      inference; the specific cluster is debated), auspex_assessment =
      concur-with-caveat. KEY CAVEAT: this is NOT attributed to APT41 / Barium. No
      cited source makes that attribution, and FireEye's 2019 Double Dragon report —
      the canonical APT41 reference — explicitly DECLINES it: "While we have identified
      some overlaps between the CCleaner activity and APT41, we do not have enough
      information to attribute the CCleaner compromise to APT41 at this time." The
      pre-degradation record's "Attributed to APT41 / Barium by Avast + Cisco Talos"
      (high) was unsupported on both counts (neither Avast nor the Talos reports name
      APT41) and is not restored. See QC FLAGS re: the cn/mss/apt41 actor record.
doctrine_links:
  - doctrine_id: cn/mic2025
    pillar_id: cn/mic2025/next-gen-it
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      After establishing a mass supply-chain foothold, the operators used the stage-1
      C2 database to selectively deliver a second-stage payload to a curated list of
      high-profile technology companies (Cisco Talos: "the array specified contains
      Cisco's domain (cisco.com) along with other high-profile technology companies ...
      a very focused actor after valuable intellectual property"; at least 20 victim
      machines across ~8 organizations). Selective IP collection from semiconductor /
      networking / software / telecom firms by a China-nexus espionage cluster (APT17 /
      Axiom) is the behaviour the MIC2025 next-generation-IT pillar encodes — narrowing
      PRC technology gaps in the ICT / semiconductor space. The label is
      strongly_inferred, not attested: Talos names only the proximate purpose
      ("valuable intellectual property"), not a MIC2025 industrial-policy goal, and no
      attesting source states the strategic end; it is above plausible because
      selective, intelligence-driven IP-targeting of technology firms by an espionage
      (non-financial) actor triangulates to industrial-tech collection with no serious
      financial-crime competitor.
    attesting_source_id: blogtalosintelligence/2017-09-20_ccleaner-c2-concern
    inference_basis:
      signals:
        - "Stage-2 selectively targeted high-profile technology companies (Cisco named in Talos' text; the targeting-table screenshot lists semiconductor/networking/software/telecom firms) rather than the full 2.27M install base."
        - "Cisco Talos states the proximate purpose: 'a very focused actor after valuable intellectual property'; the attributed actor (APT17/Axiom) is a China-nexus espionage cluster whose mission is strategic/IP collection."
      ruled_out: "Financially-motivated cybercrime: rejected because the stage-2 was a selective, intelligence-driven IP-targeting of technology firms (no ransomware, fraud, or theft-of-funds) carried out by an espionage actor, not a revenue operation."
    contested: false
    analyst: claude
