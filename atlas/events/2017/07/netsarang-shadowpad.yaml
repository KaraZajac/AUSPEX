id: 2017-07/netsarang-shadowpad
name: NetSarang supply-chain attack (ShadowPad debut)
start_date: 2017-07-17
disclosure_date: 2017-08-15
end_date: 2017-08-04
incident_type:
  - supply-chain
  - intrusion
initial_vector: supply-chain
outcome_summary: |
  Trojanized NetSarang Xmanager / Xshell server-management software
  delivered the ShadowPad backdoor to thousands of enterprise IT
  administrator customers worldwide, creating opportunity for
  selective second-stage exploitation of high-value targets.
false_flag_risk: none
summary: |
  Public debut of the ShadowPad backdoor that subsequently became
  the dominant Chinese-APT modular implant — a privately sold,
  PlugX-lineage successor delivered as an obfuscated shellcode
  loader with an encrypted "Root" plugin and additional plugins
  loaded into memory via a linked-list structure, extensible at
  C2 runtime. Kaspersky's disclosing 2017 report named NO actor or
  nation ("Attribution is hard"), noting only a PlugX/Winnti
  code-technique link "allegedly developed by Chinese-speaking
  actors"; the NetSarang victim was attributed specifically to
  BARIUM (an APT41 sub-group) only later, by SentinelLabs (2021).
  The same ShadowPad family is subsequently observed in operations
  tied to Tick, Tonto Team, Fishmonger, and other China-nexus
  clusters. The NetSarang Xmanager / Xshell server-
  management software was trojanized via a build-environment
  compromise and pushed to enterprise IT administrators worldwide
  as the staging foothold for selective second-stage exploitation.
attributions:
  # Disclosure (2017): Kaspersky named NO actor/nation — "Attribution is hard."
  - actor_id: null
    attributing_org: Kaspersky
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2017-08-15
    attribution_source_id: kaspersky/2017-08_shadowpad-netsarang
    notes: |
      Kaspersky's disclosing report (15 Aug 2017) explicitly declined
      attribution — verbatim: "Who is behind this attack? Attribution is
      hard and the attackers were very careful to not leave obvious
      traces. However certain techniques were known to be used in another
      malware like PlugX and Winnti, which were allegedly developed by
      Chinese-speaking actors." It named no nation, no actor, no APT41 and
      no Microsoft co-attribution (Microsoft is NOT a source on this
      event). Only a PlugX/Winnti code-family signal, hedged ("allegedly").
  # Attribution latency: NetSarang→BARIUM/APT41 reached named-actor only in 2021.
  - actor_id: cn/mss/apt41
    attributing_org: SentinelLabs (SentinelOne)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2021-08-19
    attribution_source_id: sentinellabs/shadowpad-masterpiece
    notes: |
      SentinelLabs' 2021 ShadowPad study attributes the NetSarang victim
      specifically to BARIUM — "BARIUM (Rose and Zhang Haoran) were one of
      the earliest threat groups with access to ShadowPad. Some of their
      victims included NetSarang, ASUS, and allegedly, CCleaner" — and
      names BARIUM/LEAD as the sub-groups under "APT41 ... the accepted
      naming convention." The same report stresses ShadowPad is privately
      sold across ≥5 clusters, so "any claim made publicly on the
      attribution of ShadowPad users requires careful validation"; hence
      moderate, not high. "APT41" did not exist in 2017 (coined by
      FireEye/Mandiant, Aug 2019), so the actor_id is the modern
      consolidated cluster, not a 2017 attribution. cn/mss placement of
      the actor was QC-verified separately (DOJ Sept-2020 indictment).
doctrine_links:
