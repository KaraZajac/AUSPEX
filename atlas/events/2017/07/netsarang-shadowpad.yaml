qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Canonical ShadowPad debut — NetSarang Xmanager/Xshell supply-chain
    compromise, disclosed by Kaspersky (Securelist, 15 Aug 2017). Both
    cited sources fetched HTTP 200 + hashed (Kaspersky 193,998 B sha256
    f62a3095…; SentinelLabs 330,198 B sha256 f566049f…).

    FACTS — all CONFIRMED against the primary Kaspersky report: nssock2.dll
    backdoor embedded in the NetSarang code library (malicious DLL compiled
    Thu Jul 13 2017); trojanized builds dated Jul 17 2017 (Xmanager
    Enterprise 5 B1232, Xmanager 5 B1045, Xshell 5 B1322, Xftp/Xlpd);
    DNS-based C2 — activation via a crafted DNS TXT record, monthly DGA
    (e.g. nylalobghyhirgh[.]com for Aug 2017); modular/tiered platform with
    encrypted layers + per-victim VFS; build-server compromise ("attackers
    either modified source codes or patched software on the build servers").
    start_date 2017-07-17 = the build date (matches). published_on
    2017-08-15 = page datePublished metadata (exact).

    ATTRIBUTION CORRECTION (key finding — prior record over-attested):
    the record claimed "Attributed to APT41 / Barium by Kaspersky and
    Microsoft" with attribution_source_id = the 2017 Kaspersky post. FALSE.
    Kaspersky 2017 verbatim: "Attribution is hard ... techniques were known
    to be used in another malware like PlugX and Winnti, which were
    allegedly developed by Chinese-speaking actors" — NO actor, NO nation,
    NO APT41, NO Barium; and Microsoft is not even a source on this event.
    Rewrote attributions to model the latency honestly: (1) actor_id null,
    Kaspersky, low / activity-cluster at disclosure (PlugX/Winnti code link
    only); (2) actor_id cn/mss/apt41, SentinelLabs (2021), moderate /
    named-actor — SentinelLabs ties the NetSarang victim to BARIUM (an APT41
    sub-group) but cautions ShadowPad is privately sold across ≥5 clusters,
    so moderate not high. attribution_date moved 2017-08-15 → 2021-08-19
    (APT41 was coined Aug 2019; NetSarang→APT41 traces to 2021). Summary
    "Attributed to APT41/Barium by Kaspersky and Microsoft" rewritten to
    reflect Kaspersky's non-attribution + the later SentinelLabs link.
    actor_id cn/mss/apt41 KEPT (SentinelLabs supports it; cn/mss verified
    separately on the DOJ Sept-2020 indictment).

    DOCTRINE LINKS: cn/mic2025/next-gen-it downgraded strongly_inferred →
    plausible (no source states a MIC2025 purpose for this op; an
    indiscriminate IT-admin supply-chain seed admits multiple strategic
    readings). cn/mcf already plausible — kept. Neither is attested, both
    attesting_source_id null — no over-attestation in the WHY layer.

    FKs: actor cn/mss/apt41 resolves (not stale); doctrines cn/mic2025 +
    pillar next-gen-it and cn/mcf resolve. NOTE (not an error, left as-is):
    targets[].target_id orgs/netsarang has no registry file — it is one of
    the 401 deferred orgs/ target-FK gaps the engine reports as
    informational ("targets/ normalization deferred"), consistent with the
    sibling CCleaner event's orgs/piriform-ccleaner. Not fabricating a
    registry entry under this single-event scope. end_date 2017-08-04 is a
    bounded-end estimate (NetSarang pulled the software shortly after
    Kaspersky's notification); not stated verbatim in-source but plausible
    and pre-existing — left untouched.

    level: full — facts + attribution independently confirmed against both
    cited sources with raw evidence captured + hashed.
