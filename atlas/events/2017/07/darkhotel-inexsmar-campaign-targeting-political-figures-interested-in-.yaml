id: 2017-07/darkhotel-inexsmar-campaign-targeting-political-figures-interested-in-
name: "DarkHotel Inexsmar campaign targeting political figures interested in North Korea"
start_date: 2017-07-01
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Bitdefender uncovered Inexsmar, an unusual DarkHotel campaign (with samples dating to September 2016) that abandoned the group's customary zero-day exploits in favor of social engineering paired with a multi-stage Trojan downloader. Victims received spear-phishing emails with a decoy Word document themed around a 'Pyongyang Directory Group' coordination role, which on opening covertly installed multiple malicious components for full device control and persistence. Unlike DarkHotel's usual corporate targets, Inexsmar focused on political figures, with the lure suggesting intended victims worked for governments or state institutions with an interest in the North Korean political situation. Bitdefender attributes the campaign to the DarkHotel threat actor.
