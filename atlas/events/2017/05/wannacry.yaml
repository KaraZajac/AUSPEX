  notes: |
    Full 6-point audit against RAW cited sources. Snapshots verified this pass:
    gov-uk__2017-12-19_fco-wannacry-attribution.html sha256
    cd03fbdcd698d4f7816c68ec2148a2d20220c0b9a06dfe96ad43544ab0055564 (NEW, HTTP 200,
    73 KB); doj__2018-09-06_park-jin-hyok-complaint.pdf sha256 4876114d...5d31ba021
    (179-pp criminal complaint, re-verified matching); doj__2021-02-17_lazarus-three-
    officers-indictment.html sha256 4e3209c4...f98b8f21 (globalsecurity mirror, matching);
    msft__2017-03-14_ms17-010-eternalblue.html sha256 33b85a5e...a84449e2 (matching).
    uknscsc/2017-12-19 has url:null (dead NCSC release, no Wayback) — UNSNAPSHOTTABLE, but
    its attribution is mirror-corroborated verbatim by the snapshotted FCO twin.

    [a] FACTS — corrections made:
      * systems_infected 200000 -> 300000. NO cited source says 200,000. FCO raw:
        "The WannaCry ransomware incident impacted 300,000 computers in 150 countries
        including 48 NHS trusts." DOJ complaint: "hundreds of thousands of computers in
        more than 150 countries have been affected" (Europol). Used the cited-primary
        hard number (FCO 300k); DOJ range noted in the inline comment.
      * usd_economic_damage_estimate 4000000000 ($4B) STRIPPED — carried by NO cited
        source (the complaint's only billion-figures are Bangladesh Bank: "$1 billion"
        attempted / "$81,000,000" actual). $4B is a secondary Cyence estimate; re-add
        only with a cited source.
      * "DoublePulsar" STRIPPED — 0 hits in all four cited sources. Mechanism now
        described per the complaint: "designed to self-propagate as a worm (using the
        SMB CVE-2017-0144 vulnerability)."
      * "leaked NSA exploit" corrected -> "Shadow Brokers"-released. NSA/"National
        Security Agency" 0 hits (word-boundary) in the complaint; it says the
        "CVE-2017-0144 exploit... was publicly released by a group calling itself the
        'Shadow Brokers.'" MS17-010 raw carries CVE-2017-0144 (x6) + the 2017-03-14 patch
        (-> initial_vector n-day) but NOT the strings EternalBlue/DoublePulsar/NSA/Shadow
        Brokers (those live only in that record's analyst notes).
      * Uncarried victim roster (FedEx/Renault/Deutsche Bahn/Telefonica/Russian Interior
        Ministry/Indian police) STRIPPED from the critical-infra target (0 hits in cited
        sources); replaced with the richly-carried DOJ NHS detail (80/236 trusts affected,
        37 infected, 603 primary-care orgs, 6,912 appts cancelled 12-18 May 2017, ~1,220
        diagnostic devices, no NHS ransom paid).
      * usd_ransom_collected 140000 CONFIRMED — complaint: "approximately 330 victims paid
        the ransom demanded by WannaCry Version 2 totaling over $140,000"; also "it does
        not appear that victims... have been able to actually decrypt their files by paying
        the ransom" (supports destructive framing).
      * Residual non-cited proper nouns RETAINED (non-load-bearing, hedged): "EternalBlue"
        (definitional alias for carried CVE-2017-0144) and "Marcus Hutchins"/"kill-switch"
        (the embedded sinkhole domain IS carried by the complaint — "a lengthy domain
        embedded in the code of the malware" that infected machines "tried to resolve";
        the registrant name + halt-causality are flagged "widely reported").
    [b] ATTRIBUTION — DPRK/Lazarus, high/concur, correct. FCO raw carries it verbatim:
        NCSC "assesses it is highly likely that North Korean actors known as the Lazarus
        Group were behind the WannaCry ransomware campaign" (highly likely = high). First
        attribution's source re-pointed uknscsc(dead) -> gov-uk FCO(live+snapshotted).
        DOJ 2018 complaint + 2021 indictment corroborate. attribution_level: named-actor
        (Lazarus Group named; kp/rgb/lazarus resolves).
    [c] DATES — start/disclosure 2017-05-12 (outbreak day), end 2017-05-15 (acute window;
        complaint puts NHS cancellations "between May 12 and 18, 2017") OK. Attribution
        2017-12-19 (FCO byline "Published 19 December 2017") and 2018-09-06 (DOJ) verified
        against source metadata.
    [d] DOCTRINE — kp/byungjin/sanctions-evasion-revenue KEPT at plausible (not upgraded,
        per over-attestation guard). Fixed schema to corpus convention for plausible links
        (attesting_source_id: null; inference_basis -> signals/alternatives/ruled_out;
        removed the mis-cited DOJ-complaint attesting pointer). Added the genuine FCO
        signal it previously omitted ("using their cyber programme to circumvent sanctions").
        NOT attested: no cited source states a revenue/WMD terminal goal for WannaCry
        (complaint: "weapons of mass destruction" 0, "ballistic" 0, revenue 0, "nuclear" 1
        = a fictional TV plot; its lone "sanction" hit = "regime-sanctioned" authorized
        accounts). perspective: attacker-rationale (default; DPRK's own tool-purpose).
    [e] ATTRIBUTION_LEVEL — named-actor (Lazarus Group). Consistent.
    [f] ACTOR_ID — kp/rgb/lazarus resolves (atlas/actors/kp/lazarus.yaml, id verified).
        operators_named park-jin-hyok/jon-chang-hyok/kim-il are free-text person slugs
        (no dedicated actor/person records; referenced in atlas/services/kp/bureau-121.yaml)
        — carried: Park in the 2018 complaint; all three in the 2021 indictment.

