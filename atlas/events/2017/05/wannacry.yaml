doctrine_links:
  - doctrine_id: kp/byungjin
    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: plausible
    reasoning: |
      The UK FCO (19 Dec 2017) framed WannaCry as "North Korean
      actors using their cyber programme to circumvent sanctions"
      — a cited primary govt signal toward the sanctions-evasion
      pillar. But the linkage is only plausible, not attested: no
      cited source states a revenue / WMD-financing terminal goal
      for WannaCry, the DOJ Park Jin Hyok complaint frames it as
      indiscriminate destructive ransomware (its hard-currency
      framing attaches to the Bangladesh Bank theft), and the
      actual yield was trivial (~$140k, ~330 payers, with paying
      failing to decrypt) — consistent with a botched test rather
      than a deliberate revenue operation.
    attesting_source_id: null
    inference_basis:
      signals:
        - "UK FCO (2017-12-19), verbatim: 'The indiscriminate use of the WannaCry ransomware demonstrates North Korean actors using their cyber programme to circumvent sanctions.'"
        - "WannaCry sits inside the Byungjin era (2013-2018) and was run by the same RGB / Lazarus apparatus the doctrine funds."
      alternatives:
        - "WannaCry as an out-of-control test / development failure rather than a deliberate revenue operation (actual yield ~$140k across ~330 payers; the DOJ complaint notes paying did not decrypt files)."
      ruled_out: "attested WMD-financing intent — no cited source states a revenue / WMD-financing terminal goal for WannaCry; the DOJ complaint's hard-currency framing attaches to the Bangladesh Bank theft, and its only 'sanction' reference is to regime-authorized ('regime-sanctioned') accounts, not sanctions-evasion."
    counter_explanation: |
      Many analysts read WannaCry as a test or development failure
      rather than a deliberate revenue operation, given the trivial
      actual yield. The doctrine tag holds only on the regime's
      *intended* sanctions-circumvention purpose for the tool (per
      the FCO); operational outcome may have been incidental.
    contested: false
    analyst: claude
targets:
  - target_id: sectors/critical-infrastructure
    role: primary
    outcome: |
      Hundreds of thousands of computers across 150+ countries
      infected (UK FCO: 300,000 in 150 countries); widespread
      cross-sector disruption. The cited govt sources detail the
      UK NHS impact specifically (see the healthcare target);
      the broader victim roster commonly reported at the time
      (FedEx, Renault, Deutsche Bahn, Telefonica, etc.) is not
      carried by these four cited sources.
  - target_id: sectors/healthcare/hospital
    role: primary
    outcome: |
      UK NHS heavily affected (DOJ complaint): at least 80 of 236
      English NHS trusts hit (37 infected) plus 603 primary-care /
      other NHS organizations; 6,912 appointments cancelled 12-18
      May 2017; ~1,220 pieces of diagnostic equipment affected; no
      NHS organization paid the ransom.
