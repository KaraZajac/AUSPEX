id: 2017-05/wannacry
name: WannaCry 2.0 global ransomware worm
start_date: 2017-05-12
disclosure_date: 2017-05-12
end_date: 2017-05-15  # kill-switch activated; tail of infections continued for years
incident_type:
  - ransomware
  - destructive
initial_vector: n-day
outcome_summary: |
  Self-propagating ransomware worm ("WannaCry Version 2" in the
  DOJ complaint) leveraging the CVE-2017-0144 SMB exploit (widely
  known as EternalBlue), which the Shadow Brokers had publicly
  released in April 2017. Hundreds of thousands of computers
  across 150+ countries were infected within days (the UK FCO
  cited 300,000 computers in 150 countries). The UK NHS was
  heavily hit: per the DOJ complaint, at least 80 of 236 English
  NHS trusts were affected (37 infected) plus 603 primary-care /
  other NHS organizations, and 6,912 appointments were cancelled
  between 12-18 May 2017; no NHS organization paid the ransom.
  Actual ransom collected: ~$140,000 from roughly 330 payers, and
  paying did not decrypt files — many assessments therefore read
  the worm as an out-of-control test or a destructive operation
  rather than a deliberate revenue op. The malware embedded a
  long domain that infected machines attempted to resolve (the
  DOJ used resolution traffic to it to count victims); registering
  that "kill-switch" domain — widely reported as the work of
  researcher Marcus Hutchins — sinkholed the primary variant.
quantified_impact:
  systems_infected_estimate: 300000  # UK FCO 2017-12-19: "300,000 computers in 150 countries"; DOJ complaint cites Europol's "hundreds of thousands ... in more than 150 countries"
  countries_affected: 150
  usd_ransom_collected: 140000  # DOJ complaint: ~330 victims paid "over $140,000"; paying did not decrypt files
false_flag_risk: none
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Sep 2018 complaint + Feb 2021 indictment
  - jon-chang-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
  - kim-il  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
summary: |
  Largest publicly impactful ransomware event in history at the
  time. Self-propagating worm built on the CVE-2017-0144 SMB
  exploit (EternalBlue), which the Shadow Brokers had leaked in
  April 2017, dropping the WannaCry / WannaCryptor payload to
  encrypt local files and spread laterally over SMB. UK NCSC,
  alongside allied governments, publicly attributed WannaCry to
  DPRK — "North Korean actors known as the Lazarus Group" — on
  19 December 2017. The DOJ Park Jin Hyok complaint (September
  2018) then charged WannaCry alongside Sony and the Bangladesh
  Bank theft, linking the worm's earlier "Version 1" to Lazarus
  development infrastructure shared with those operations.
