outcome_summary: |
  Stand-up of the Commandement de la Cyberdéfense (COMCYBER) on
  4 May 2017 by Defence Minister Jean-Yves Le Drian, consolidating
  French military cyber capabilities under a joint command
  reporting to the Chief of the Defence Staff (CEMA).
