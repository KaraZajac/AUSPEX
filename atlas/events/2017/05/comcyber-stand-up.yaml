notes: |
  Capability-establishment / policy meta-event — France is the
  SUBJECT standing up a capability, so there is no adversary,
  target, or attribution: attributions: [] and actor_id absent
  (null) are correct, mirroring the sibling anchors
  2009-07/anssi-establishment and 2021-07/viginum-establishment.

  Chronology (all source-carried): Defence Minister Jean-Yves Le
  Drian announced the future command on 12 December 2016 at the
  pôle d'excellence cyber in Bruz (Bretagne); COMCYBER began
  gathering the armed forces' cyberdéfense forces from 1 January
  2017; it was formally instituted by the arrêté du 4 mai 2017
  modifiant l'organisation de l'état-major des armées (signed by
  Le Drian; JORF n°0106 du 5 mai 2017), which adds the "officier
  général commandant de la cyberdéfense" (attributions per art.
  D. 3121-24-2 du code de la défense). start_date = end_date = the
  4 May 2017 establishing act.

  Command succession (source-carried, watched per audit brief):
  the role at the 4 May 2017 stand-up was held over from the
  prefigurative "officier général cyber" structure (Vice-amiral
  Arnaud Coustillière, 2011-2017); Gén. Olivier Bonnet de
  Paillerets became commander only from September 2017 — so he is
  NOT the founding/stand-up commander and is deliberately not
  named as such. No personnel figure is asserted in
  quantified_impact: the ~2,600 "combattants du numérique" (target
  by 2019), the "3 200 personnes" (LPM 2014-2019 cumulative
  doubling) and the current "plus de 3 600 cybercombattants" are
  all period- or projection-specific, not a stand-up-day count.
