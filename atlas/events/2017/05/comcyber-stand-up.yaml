initial_vector: unknown
outcome_summary: |
  Formal stand-up of the Commandement de la cyberdéfense
  (COMCYBER) on 4 May 2017, consolidating the French armed forces'
  cyberdéfense forces into a single joint (interarmées) operational
  command placed under the direct authority of the Chief of the
  Defence Staff (chef d'état-major des armées, CEMA). Instituted by
  the arrêté du 4 mai 2017 modifying the organisation of the
  état-major des armées, signed by Defence Minister Jean-Yves Le
  Drian (JORF 5 May 2017), who had announced the command in
  December 2016; COMCYBER had begun gathering the ministry's cyber
  forces from 1 January 2017.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Institutional anchor of France's military offensive-cyber
  doctrine (Lutte Informatique Offensive, LIO, publicly announced
  January 2019): COMCYBER is the operational command LIO codifies.
  Its 2017 creation consolidates military cyber operations under
  the CEMA as a distinct pole, structurally separated from
  intelligence collection (DGSE) and civil-defensive cyber (ANSSI)
  — the military pillar of the French cyber posture that the Revue
  stratégique de cyberdéfense (2018) subsequently documents.
