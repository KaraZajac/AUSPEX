false_flag_risk: none
operators_named: []
summary: |
  Institutional anchor of the later LIO (2019) and LII (2021)
  doctrines. Marks the formal organizational separation of
  military cyber operations from intelligence (DGSE) and
  defensive (ANSSI) functions, completing the three-pole French
  cyber posture.
