id: 2017-05/hbo-extortion-mesri
name: HBO extortion — Behzad Mesri
start_date: 2017-05-01
disclosure_date: 2017-07-31  # initial extortion demand disclosure
end_date: 2017-08-31
incident_type:
  - data-theft
  - intrusion
initial_vector: unknown  # reconnaissance and credential theft
outcome_summary: |
  ~1.5 TB of HBO pre-release content stolen, including Game of
  Thrones scripts and unaired episodes. Extortion demand
  USD 6M in Bitcoin; HBO refused payment. Some material
  leaked.
quantified_impact:
  data_stolen_tb: 1.5
  ransom_demanded_usd: 6000000
false_flag_risk: none
operators_named:
  - mesri-behzad  # Behzad Mesri, aka "Skote Vahshat"; DOJ SDNY Nov 2017 indictment
summary: |
  Defendant Behzad Mesri (Iranian national; online handle
  "Skote Vahshat"; member of the "Turk Black Hat Security"
  team) indicted November 21, 2017. Per the SDNY indictment he
  "had previously hacked computer systems for the Iranian
  military" and worked on Iranian-military cyber attacks against
  Israel — but that is framed as PRIOR / separate conduct: the
  HBO theft and $6M Bitcoin extortion is charged as Mesri's own
  scheme, and state-direction is NOT asserted for this operation
  (the indictment names the "Iranian military" generically, not
  the IRGC). Doctrine linkage held at plausible confidence — the
  op may be freelance cybercrime by an individual with an
  Iranian-military background rather than state-directed.
attributions:
  - actor_id: null
    service_id: null
    attributing_org: US DOJ SDNY
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-11-21
    attribution_source_id: doj/2017-11-21_hbo-mesri-indictment
    notes: |
      Indictment attributes the operation to Mesri PERSONALLY (a
      named individual → named-actor level), not to a state
      service. DOJ states he "had previously hacked computer
      systems for the Iranian military" and worked on attacks
      against Israel, but frames that as prior/separate conduct
      and does NOT assert the HBO op was state-directed. DOJ names
      the "Iranian military," not the IRGC; service_id therefore
      left null (the earlier ir/irgc nexus over-read the source —
      "Iranian military" generically ≠ IRGC, and no service is
      tied to THIS op). IRGC-linkage appears only in some
      secondary reporting, not the cited primary.
doctrine_links:
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Superficially fits the deniable-extortion / coercion
      pattern, but the fit is weak: the cyber-deniable-retaliation
      posture is a 2020-onward persona-laundering model (IRGC-IO /
      MOIS operations against civilian infrastructure laundered
      through named hacktivist fronts), whereas the 2017 HBO op
      used no persona, hit a US entertainment studio for money,
      and is charged as personal conduct. State-direction is NOT
      asserted in the indictment; the link cannot rise above
      plausible.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - Freelance cybercrime by an individual with an Iranian-military background (no state direction) — the indictment's own framing
        - Early/proto instance of Iran's later deniable-coercion pattern, retrofitted from 2020+ persona operations
    counter_explanation: |
      Operation may have been freelance cybercrime by an
      individual with an Iranian-military background rather than
      state-directed; the doctrine itself post-dates this op by
      ~3 years and centres on persona-fronted CII attacks, not
      studio extortion.
    contested: false
    analyst: claude
  - doctrine_id: ir/sanctions-evasion
    pillar_id: ir/sanctions-evasion/ransomware-revenue
    program_id: null
    confidence: plausible
    reasoning: |
      Revenue-generation pattern predates the Pay2Key / Najee /
      Afkar ransomware-for-revenue model (2020+), and the pillar
      describes IRGC-affiliated CONTRACTOR ransomware; HBO was a
      one-off data-theft extortion (not ransomware) charged as a
      personal scheme. Could be an early instance of the tolerated-
      cybercrime doctrine or simply freelance; no source ties the
      proceeds to state sanctions-evasion.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - Personal financial extortion with no state revenue nexus — the indictment's framing
        - Proto-instance of the later IRGC-contractor revenue model (Pay2Key/Najee), inferred backwards
    counter_explanation: |
      No source ties the extortion proceeds to Iranian state
      sanctions-evasion; the op is extortion, not the contractor
      ransomware the pillar describes, and predates that model.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/hbo
    role: primary
    outcome: |
      ~1.5 TB stolen; Game of Thrones scripts and episodes
      leaked; HBO refused to pay.
sources:
  - doj/2017-11-21_hbo-mesri-indictment
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial
  notes: |
    Audited vs the sole cited primary, DOJ/SDNY 2017-11-21
    "Iranian National Charged ... Against HBO". justice.gov is
    bot-walled (Akamai bm-verify challenge) and archive.org is
    blocked to the fetcher → the raw snapshot is the challenge
    page, not the article (sha256 ae9afc4a…cebcc) ⇒ level: partial;
    content corroborated via the DOJ page's search summary + tier-1
    mirrors (NBC, TIME, BleepingComputer, Courthouse News).
    FACTS OK: Behzad Mesri, Iranian national, handle "Skote
    Vahshat", "Turk Black Hat Security" team; ~1.5 TB stolen; Game
    of Thrones scripts/plot + unaired Ballers/Barry/Room 104/Curb/
    The Deuce; ~$6M Bitcoin demand (DOJ headline "$6 Million";
    indictment-body figure reported as $5.5M); HBO refused; May
    2017 campaign, extortion emails from ~23 Jul 2017; announced
    21 Nov 2017. published_on/attribution_date 2017-11-21 correct.
    ATTRIBUTION (key correction): DOJ states Mesri "had previously
    hacked computer systems for the Iranian military" and worked on
    attacks against Israel, but frames that as PRIOR/separate
    conduct and does NOT assert the HBO op was state-directed; DOJ
    names the "Iranian military," NOT the IRGC. CORRECTIONS:
    (1) nulled service_id (was ir/irgc) — the cited primary names
    no service and "Iranian military" generically ≠ IRGC; the
    earlier ir/irgc nexus over-read the source (IRGC-linkage is
    secondary-reporting inference only). actor_id stays null
    (no named cluster; named INDIVIDUAL only). (2) added
    attribution_level: named-actor (DOJ named the individual, not a
    unit/service). (3) rewrote summary: removed "prior IRGC
    contractor" (DOJ says "Iranian military," not "IRGC
    contractor"), added the Skote Vahshat / Turk Black Hat detail
    and the prior-conduct framing. (4) both doctrine_links kept at
    plausible (correctly never attested — DOJ asserts no state
    purpose) but reasoning/counter_explanation sharpened to reflect
    the doctrine-scope mismatch (cyber-deniable-retaliation is a
    2020+ persona-laundering posture; sanctions-evasion/ransomware-
    revenue is IRGC-contractor ransomware — HBO is neither persona-
    fronted nor ransomware nor source-tied to state revenue) +
    added inference_basis.alternatives to each. (5) created the
    missing orgs/hbo target registry entry (dangling FK; HBO is the
    source-confirmed primary victim). Source record updated with
    raw_snapshot/content_sha256 + AUDIT note; its prior "IRGC
    contractor" note also corrected to "Iranian military".
