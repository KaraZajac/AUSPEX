id: 2017-05/fireeye-apt32-disclosure
name: FireEye discloses APT32 — first canonical Vietnamese-aligned APT attribution
start_date: 2014-01-01  # earliest activity FireEye dates to
disclosure_date: 2017-05-14
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  FireEye (now Mandiant) publicly named APT32 / OceanLotus as a
  Vietnamese-aligned cluster operating against foreign corporations
  with Vietnamese business interests, ASEAN governments
  (Philippines, Cambodia, Laos), regional media, and Vietnamese
  dissidents and political opposition. The disclosure consolidated
  earlier reporting by Qihoo 360 (APT-C-00, SkyEye Labs) and ESET
  (SeaLotus) into the APT32 naming convention now used across
  Western vendors.
false_flag_risk: none
summary: |
  Anchor event for the Vietnamese cyber program: the public
  attribution that established APT32 as a state-aligned cluster
  rather than a criminal or hacktivist group. FireEye explicitly
  named "the Vietnamese government" as the assessed sponsor and
  characterized the targeting as serving Vietnamese national
  strategic interests. Subsequent reporting (Cybereason Cobalt
  Kitty, Volexity, Amnesty, Bitdefender) extended the picture
  but did not displace the FireEye 2017 disclosure as canonical.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: FireEye (Nick Carr, Nalani Fraser, Vincent Cannon, Fred Plan)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2017-05-14
    attribution_source_id: fireeye/2017-05-14_apt32-cyber-espionage
doctrine_links:
  - doctrine_id: vn/industrial-upgrading-cyber-collection
    pillar_id: vn/industrial-upgrading-cyber-collection/automotive
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      FireEye documented APT32 targeting of foreign corporations
      with Vietnamese operations, with sectoral emphasis on
      manufacturing and consumer goods. The doctrine link is
      inferred from victimology; no Vietnamese-source attestation
      of an "industrial collection" mandate exists.
    attesting_source_id: null
    counter_explanation: |
      The same targeting could reflect routine state-of-business
      monitoring of foreign investors rather than directed
      industrial-collection tasking. The pattern intensified in
      sectors aligned to Vietnamese industrial policy, which
      tilts the reading toward directed collection.
    contested: false
    analyst: claude

  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: plausible
    reasoning: |
      Resolution 29-NQ/TW post-dates the 2017 disclosure by a
      year, but the regime-stability rationale was already in
      operation under earlier Party directives; FireEye named
      "Vietnamese political opposition" and dissident targeting
      as a core APT32 mission set.
    contested: false
    analyst: claude

targets:
