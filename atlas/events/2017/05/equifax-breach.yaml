    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The DOJ indictment attests the proximate goal — economic
      espionage and the bulk collection of Americans' PII plus
      Equifax trade secrets "for the benefit of the Chinese
      government" / "the Chinese military's effort to collect
      sensitive information of Americans on an unprecedented scale".
      It does NOT state the HUMINT-vetting / counterintelligence
      purpose the bulk-PII-HUMINT-enabling pillar encodes; that
      strategic reading is an AUSPEX inference. It is nonetheless the
      dominant reading: a PLA SSF unit taking SSNs/DOBs for ~145M
      Americans, in the same OPM/Anthem/Marriott portfolio, fits the
      MCF-fused HUMINT-enabling collection pipeline with no serious
      competitor (the indictment's own "economic espionage" framing
      is the proximate, not the strategic, end). Downgraded from
      `attested` (2026-06-25): the source names the goal in substance
      only at the economic-espionage / state-benefit level, not at
      the HUMINT-vetting goal-level the pillar requires.
    attesting_source_id: doj/2020-02-10_pla-54th-ri-equifax-indictment
    inference_basis:
      signals:
        - "PLA SSF Network Systems Department 54th RI = a military SIGINT/cyber R&D unit, not a commercial actor (DOJ: 'a unit of the Chinese military')."
        - "Target set = SSN/DOB/name for ~145M Americans + driver's licenses for 10M — identity records optimized for person-vetting, not monetization."
        - "Same actor-state portfolio as OPM (SF-86 clearance records), Anthem, and Marriott — the canonical PRC bulk-PII-for-HUMINT pattern."
        - "DOJ frames it as state-directed collection 'for the benefit of the Chinese government', not financially-motivated criminal theft."
      ruled_out: "Pure financial-fraud / criminal monetization — ruled out by the military-unit attribution, the anti-forensic tradecraft, and the absence of any fraud-cashout in the record; the DOJ's 'economic espionage' charge is the proximate frame, not a revenue motive."
    counter_explanation: null
    contested: false
    analyst: claude
