id: 2017-05/equifax-breach
name: Equifax breach (PLA 54th Research Institute)
start_date: 2017-05-13
disclosure_date: 2017-09-07
end_date: 2017-07-30
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # CVE-2017-5638 Apache Struts
outcome_summary: |
  Exploitation of an Apache Struts vulnerability (CVE-2017-5638)
  in Equifax's online dispute portal; reconnaissance and credential
  harvesting to navigate the network; deletion/wiping of compressed
  and log files daily to evade detection; exfiltration routed through
  ~34 servers in nearly 20 countries. PII of ~145 million Americans
  (names, DOB, SSN), driver's-license numbers for at least 10 million,
  and credit-card data for ~200,000.
quantified_impact:
  records_exfiltrated: 145000000
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
operators_named:
  - wu-zhiyong  # PLA 54th Research Institute, DOJ Feb 2020
  - wang-qian  # PLA 54th Research Institute, DOJ Feb 2020
  - xu-ke  # PLA 54th Research Institute, DOJ Feb 2020
  - liu-lei  # PLA 54th Research Institute, DOJ Feb 2020
summary: |
  DOJ February 2020 indictment of four PLA 54th Research Institute
  officers (Wu Zhiyong, Wang Qian, Xu Ke, Liu Lei). Combined with
  OPM and Anthem, Equifax completes the MSS / PLA bulk-PII trinity.
  Per the indictment, initial access exploited a vulnerability in
  the Apache Struts Web Framework (CVE-2017-5638) used by Equifax's
  online dispute portal; the operators conducted reconnaissance and
  obtained login credentials to navigate Equifax's network, then
  spent several weeks running queries (~9,000 in total) to map the
  database structure and locate PII. They stored the output in
  temporary files, compressed and divided it, routed traffic through
  ~34 servers in nearly 20 countries to obfuscate their location,
  used encrypted channels to blend with normal activity, and deleted
  compressed files and wiped log files daily to eliminate records of
  their activity. The indictment charges economic espionage and the
  theft of Equifax's trade secrets (data compilations and database
  designs) alongside the PII theft. (Additional operational detail —
  e.g. ~48 databases queried, a misplaced credential file, and the
  unsegmented network — comes from the GAO / House Oversight Equifax
  post-mortems, not the two DOJ/FBI sources cited here.)
