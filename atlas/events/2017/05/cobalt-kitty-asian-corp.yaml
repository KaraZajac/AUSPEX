    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Cybereason states only that the operation aimed at
      "stealing proprietary business information" from "a global
      corporation based in Asia" — it names no sector, no victim,
      and no strategic motive. The industrial-collection reading
      rests on the widely-held (un-sourced-by-Cybereason) industry
      view that the victim was a Vietnamese-owned conglomerate with
      manufacturing/consumer-products lines, which would make this
      domestic/competitor business-intelligence collection rather
      than foreign industrial-upgrading collection. Because the
      victim sector is unconfirmed and more than one strategic
      reading survives (business-intelligence vs. politically
      motivated collection against the parent), kept `plausible`.
    contested: false
    analyst: claude
