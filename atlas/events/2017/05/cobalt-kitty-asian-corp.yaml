id: 2017-05/cobalt-kitty-asian-corp
name: Cobalt Kitty — APT32 multi-stage intrusion of an Asian conglomerate
start_date: 2016-04-01
disclosure_date: 2017-05-25
end_date: 2017-04-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cybereason documented a multi-stage APT32 intrusion into "a
  global corporation based in Asia," carried out "with the goal
  of stealing proprietary business information" by targeting the
  company's top-level management (vice presidents, senior
  directors and other key personnel in the operational
  departments). Operators ran a fileless first phase (PowerShell
  + Cobalt Strike beacons), then switched to custom backdoors
  (Denis and Goopy) using DLL side-loading and DNS-tunneling C2,
  maintaining persistence across more than 40 PCs and servers
  (including the domain controller) for "at least a year" before
  Cybereason was deployed. (The cited report does not name the
  victim, its sector, or its country beyond "Asia"; the
  manufacturing/consumer-products and Vietnamese-ownership
  details below are industry inference, not Cybereason claims.)
false_flag_risk: none
summary: |
  The first long-form public dissection of an APT32 intrusion
  end-to-end. Cybereason's reporting established APT32's tooling
  fingerprint (Cobalt Strike heavy, custom DNS C2, PowerShell
  TTPs) and the multi-stage "Cobalt Kitty" alias that other
  vendors subsequently adopted. The victim was widely understood
  in industry to be a major Vietnamese-owned conglomerate's
  international footprint, though Cybereason did not name it.
