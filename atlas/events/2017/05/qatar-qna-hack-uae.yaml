qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial
  notes: |
    Audited against the single cited WaPo primary (DeYoung &
    Nakashima, 16 Jul 2017). The WaPo URL is UNFETCHABLE by tooling
    — curl returns HTTP 000 (connection refused at the WaPo edge),
    WebFetch returns HTTP 403, and archive.org is blocked by
    protocol — so no raw_snapshot/content_sha256 could be captured
    (both left null); hence level: partial. The article's key text
    was cross-checked VERBATIM against four independent renderings
    that quote it (Al Jazeera 17 Jul, Daily Sabah 17 Jul, US News/
    Reuters 17 Jul, Middle East Monitor 17 Jul) plus the Qatari
    primary (Peninsula / Govt Communications Office, 24 May 2017).

    FACTS ✓ — QNA website + official Qatari govt social-media
    accounts compromised; fabricated Emir quotes published in the
    early hours of 24 MAY 2017 (~00:13), confirmed same day by
    Qatar's GCO ("hacked by an unknown entity"; "false statement
    attributed to His Highness"). Corrected the outcome_summary's
    onset framing: the false statements were PUBLISHED 24 May; 23
    May is when senior UAE officials *discussed* the plan per US IC
    ("the day before they occurred") — start_date 2017-05-23 kept
    as the planning/onset date, end_date 2017-05-24 correct. Quotes
    per WaPo: praising Hamas + Iran an "Islamic power" (added the
    Hezbollah / "good relations with Israel" fabrications attested
    by the Qatari + contemporaneous record). Blockade by KSA/UAE/
    BHR/EGY announced 5 Jun 2017 ✓; Al-Ula Jan 2021 ✓.

    ATTRIBUTION (contested) ✓ — WaPo cites UNNAMED US intelligence
    officials attributing the orchestration to the UAE; explicitly
    hedged ("remains unclear whether the UAE carried out the hacks
    itself or contracted to have them done"). Added the missing
    attribution_level: nation (state-level, no named operator/unit)
    and folded the on-record UAE denials (Gargash "simply not
    true"; al-Otaiba "no role whatsoever") into the attribution
    note. attributing_org_confidence: moderate / concur-with-caveat
    unchanged — correct for single-source unnamed-IC reporting.

    DOCTRINE — DOWNGRADED the ae/regional-influence-realigned /
    qatar-pre-2021 link `attested` → `strongly_inferred`
    (over-attestation). The cited source states the act and its
    PROXIMATE purpose (UAE "arranged ... to post fiery but false
    quotes") and frames the hack as "sparking regional upheaval"
    (the consequence), but does NOT quote US IC officials
    articulating the UAE's STRATEGIC objective of regional pressure/
    realignment — that is AUSPEX's inference. Rewrote the reasoning,
    added inference_basis (signals[] + ruled_out), retained
    attesting_source_id as the supporting source, added
    counter_explanation, contested kept true. (The pillar's own
    guidance already notes these links are "rarely the subject of
    attributing-source explicit goal articulation.")

    published_on 2017-07-16 = disclosure_date ✓; FK targets
    (sectors/government, sectors/media/journalism), service
    ae/state-security, doctrine + pillar all resolve.

    FLAG (out of scope — not edited): the doctrine record
    atlas/doctrines/ae/regional-influence-realigned.yaml carries the
    SAME "27 May 2017" date error (pillar summary) that this audit
    corrected in the source file — the QNA false statements posted
    24 May, not 27 May. Pillar text should be fixed to 24 May.
