id: 2017-05/qatar-qna-hack-uae
name: Qatar News Agency hack-and-leak — UAE-attributed false-statement injection triggering GCC blockade
start_date: 2017-05-23
disclosure_date: 2017-07-16  # Washington Post US-IC-sourced attribution
end_date: 2017-05-24
incident_type:
  - intrusion
  - hack-and-leak
  - influence-operation
initial_vector: unknown  # IC-sourced public reporting does not specify intrusion vector
outcome_summary: |
  In the early hours of 24 May 2017 (Qatar's Government
  Communications Office confirmed the breach that day; the
  fabricated story posted at ~00:13), the Qatar News Agency (QNA)
  website and the official Qatari government social-media accounts
  were compromised and used to publish fabricated quotes
  attributed to Qatari Emir Tamim bin Hamad Al Thani — per the
  Washington Post, praising Hamas and calling Iran an "Islamic
  power" (Qatari/contemporaneous reporting adds fabricated remarks
  on Hezbollah and on "good" relations with Israel). Per US
  intelligence officials, senior UAE officials had discussed the
  plan the day before, on 23 May (start_date). Saudi Arabia, the
  UAE, Bahrain, and Egypt cited the (fabricated) statements as
  justification for the diplomatic and economic blockade of Qatar
  announced 5 June 2017, which lasted until the January 2021
  Al-Ula Declaration.

  On 16 July 2017, the Washington Post (DeYoung and Nakashima),
  citing US intelligence officials, attributed the QNA
  compromise to the United Arab Emirates. The UAE government
  denied the attribution. The compromise itself was confirmed by
  Qatari investigation; the UAE-as-actor attribution rests on
  US IC sourcing via the Washington Post.
false_flag_risk: none  # fabricated quotes were the entire purpose; no third-state misdirection
summary: |
  AUSPEX includes this event in the UAE corpus on the strength
  of the US-IC-sourced Washington Post attribution. The event is
  the canonical anchor for the regional-influence-realigned
  doctrine entry's Qatar pillar and one of the rare
  cyber-enabled-influence operations attributed to UAE state
  rather than to a procured contractor / capability.

  Subsequent litigation in US courts (Broidy / Qatar suits
  2018-2020) referenced the QNA hack in pleadings; AUSPEX does
  not rely on the litigation record for attribution, which would
  raise tier concerns.
attributions:
  - actor_id: null  # no named operator cluster
    service_id: ae/state-security
    attributing_org: US Intelligence Community (via Washington Post)
    attributing_org_confidence: moderate
    attribution_level: nation  # WaPo/US-IC attribute the orchestration to the UAE *state*; explicitly unclear whether the UAE did it itself or contracted it out — no named operator cluster or unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-07-16
    attribution_source_id: wapo/2017-07-16_qatar-uae-hack
    notes: |
      Tier-2 attribution via Washington Post sourcing on unnamed
      US IC officials; the source explicitly hedges that it
      "remains unclear whether the UAE carried out the hacks
      itself or contracted to have them done." UAE denial on the
      record (Anwar Gargash, Minister of State for Foreign
      Affairs: the report "is simply not true"; Ambassador Yousef
      al-Otaiba: "no role whatsoever in the alleged hacking").
      AUSPEX models the service customer side as ae/state-security;
      no specific named operator cluster (DarkMatter / Project
      Raven involvement has been speculated in subsequent academic
      analysis but is not pinned by public reporting). Confidence
      capped at moderate accordingly.
doctrine_links:
  - doctrine_id: ae/regional-influence-realigned
    pillar_id: ae/regional-influence-realigned/qatar-pre-2021
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The Washington Post, citing US intelligence officials,
      attributes the QNA compromise to the UAE and states the
      operation's *proximate* purpose — that the UAE "arranged
      for Qatari government social media and news sites to be
      hacked ... in order to post fiery but false quotes" of the
      Qatari Emir — and frames the act as having "spark[ed]
      regional upheaval" (the June-2017 GCC blockade). The
      regional-influence / pressure-on-Qatar *strategic* goal the
      doctrine encodes is AUSPEX's inference from that consequence
      and from the well-established UAE–Qatar rivalry: the cited
      source documents the act and its immediate intent (inject
      false statements) but does not quote US IC officials
      articulating a UAE strategic objective of regional
      realignment. Graded strongly_inferred, not attested — the
      same boundary the pillar's own guidance flags ("rarely the
      subject of attributing-source explicit goal articulation").
      Held conservative and NOT upgraded.
    attesting_source_id: wapo/2017-07-16_qatar-uae-hack
    inference_basis:
      source_id: wapo/2017-07-16_qatar-uae-hack
      signals:
        - "WaPo/US-IC: the UAE 'arranged for Qatari government social media and news sites to be hacked ... in order to post fiery but false quotes' attributed to Qatar's Emir (the operation's proximate purpose)"
        - "Headline + lede frame the hack as 'sparking regional upheaval' — the false quotes praising Iran/Hamas were cited by Saudi Arabia, the UAE, Egypt and Bahrain to cut ties with Qatar on 5 June 2017 (strategic consequence consistent with a regional-pressure reading)"
        - "Well-documented pre-2021 UAE–Qatar rivalry over Iran ties, the Muslim Brotherhood, and Al Jazeera supplies the strategic context any competing reading would have to displace"
      ruled_out: "a non-strategic / purely-disruptive reading — the operation planted specific pro-Iran/pro-Hamas/pro-Israel false statements of the Emir whose only plausible payoff was the regional-isolation pretext they in fact supplied; an apolitical or opportunistic motive does not survive. The cited source nonetheless stops short of stating the regional-realignment goal in the IC's own words, so the link is inferred, not attested."
    counter_explanation: |
      Attribution itself is contested: it rests on unnamed US
      intelligence officials via the Washington Post (UAE denied
      on the record), and the source does not state the UAE's
      strategic objective — only that it orchestrated the hack to
      post false quotes. The strategic-purpose link is therefore
      AUSPEX's inference, which is why contested remains true and
      the grade is held at strongly_inferred.
    contested: true
    analyst: claude
