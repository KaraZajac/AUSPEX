id: 2017-03/operation-cloud-hopper
name: Operation Cloud Hopper (APT10)
start_date: 2014-05-01  # earliest documented MSP campaigns
disclosure_date: 2017-04-03  # PwC + BAE
end_date: 2018-12-20  # DOJ indictment / public-attribution close-out
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: phishing
outcome_summary: |
  APT10 / MSS Tianjin via contractor Huaying Haitai phished managed
  service providers (HPE, IBM, Fujitsu, NTT, others), harvested
  admin credentials, then pivoted into customer environments in
  12+ countries. Theft from aerospace, satellite, telecom,
  healthcare, manufacturing, and the US Navy explicitly cited
  in the DOJ indictment. Touched every MIC2025-listed sector
  ("10/10").
false_flag_risk: none
campaign_id: cloud-hopper
summary: |
  The canonical MSP supply-chain compromise. PwC + BAE Systems
  jointly published the "Operation Cloud Hopper" report in April
  2017; UK NCSC and Five Eyes joint statement followed the
  December 2018 DOJ indictment. APT10 / Stone Panda / MenuPass
  ran high-volume spear-phishing of managed service provider
  administrators, then used PlugX, ChChes, RedLeaves, QuasarRAT,
  and PoisonIvy backdoors with DLL side-loading via legitimately
  signed binaries for defense evasion, Mimikatz for credential
  dumping, and valid credentials harvested from MSP jump hosts
  to lateral-move into downstream customer environments — pivoting
  from a single HPE / IBM / Fujitsu / NTT administrator into
  hundreds of customer Active Directories. The indictment also
  charges direct intrusions at US Navy personnel records, NASA,
  and the DOE Lawrence Berkeley Lab, demonstrating MSP-pivot and
  direct-collection used as alternating modes inside the same
  cluster.
