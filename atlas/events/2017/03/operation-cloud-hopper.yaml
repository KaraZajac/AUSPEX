id: 2017-03/operation-cloud-hopper
name: Operation Cloud Hopper (APT10)
start_date: 2014-05-01  # earliest documented MSP campaigns
disclosure_date: 2017-04-03  # PwC + BAE
end_date: 2018-12-20  # DOJ indictment / public-attribution close-out
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: phishing
outcome_summary: |
  APT10 (per the DOJ indictment, the MSS Tianjin State Security
  Bureau operating via front company Huaying Haitai) spear-phished
  managed service providers, harvested administrator credentials,
  then pivoted through shared MSP management systems into
  downstream customer environments across 12+ countries. The DOJ
  indictment charges IP theft across aerospace, satellite, telecom
  and manufacturing verticals plus direct theft of >100,000 US
  Navy personnel records; PwC/BAE map the victim sectors onto
  multiple Made in China 2025 pillars.
false_flag_risk: none
campaign_id: cloud-hopper
summary: |
  The canonical MSP supply-chain compromise. PwC UK + BAE Systems
  jointly published the "Operation Cloud Hopper" report in April
  2017, assessing APT10 (Red Apollo / CVNX / Stone Panda / menuPass)
  as "highly likely to be a China-based threat actor"; a Five Eyes
  attribution and the December 2018 DOJ indictment followed, the
  latter naming the MSS Tianjin State Security Bureau and two
  officers (Zhu Hua, Zhang Shilong) working through the Huaying
  Haitai front company. Per PwC/BAE, APT10 ran high-volume
  spear-phishing of MSP administrators, then used PlugX, ChChes,
  RedLeaves and Quasar RAT (having retired Poison Ivy after the
  2013 FireEye exposure) with DLL search-order hijacking /
  side-loading via legitimately signed binaries (e.g. Windows
  Defender) for defense evasion, Mimikatz and PwDump for credential
  dumping, and valid MSP credentials to pivot from shared MSP
  management systems into downstream customer environments. The DOJ
  indictment additionally charges direct theft of >100,000 US Navy
  personnel records and intrusions at multiple US government
  agencies, demonstrating MSP-pivot and direct-collection used as
  alternating modes inside the same cluster. (The specific MSP
  victim identities — reported by Reuters in 2019 as HPE, IBM,
  Fujitsu and NTT — appear in neither cited source and are not
  asserted here as cited.)
attributions:
  - actor_id: cn/mss/apt10
    attributing_org: PwC + BAE Systems
    attributing_org_confidence: high
    attribution_level: nation  # PwC/BAE go only to "highly likely ... a China-based threat actor"; they never name the MSS / Tianjin SSB / Huaying Haitai (verified 0 hits in the 25-page PDF)
    auspex_assessment: concur
    attribution_date: 2017-04-03
    attribution_source_id: pwc-bae/2017-04_operation-cloud-hopper
  - actor_id: cn/mss/apt10
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit  # DOJ indictment names the MSS Tianjin State Security Bureau + Huaying Haitai front company + officers Zhu Hua & Zhang Shilong
    auspex_assessment: concur
    attribution_date: 2018-12-20
    attribution_source_id: doj/2018-12-20_apt10-indictment
doctrine_links:
  - doctrine_id: cn/mic2025
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      The cited PwC/BAE report states the strategic end at the goal
      level: it maps APT10's target set directly onto the ten "Made
      in China 2025" industries (its Figure 13) and China's 13th
      Five-Year Plan, assessing the targeting "would provide valuable
      information to advance the domestic innovation goals held within
      China." Directed collection of foreign IP in MIC2025 priority
      sectors to advance China's indigenous industrial base is the
      terminal purpose this doctrine encodes. (Corrected: the prior
      attesting_source_id was the DOJ indictment, a US prosecutorial
      document that never mentions MIC2025; re-pointed to the PwC/BAE
      report, which names the doctrine + its goal in substance and is
      snapshotted + hashed.)
    attesting_source_id: pwc-bae/2017-04_operation-cloud-hopper
    inference_basis:
      source_quote: "China is also promoting ten key industries in which it wants to improve innovation in manufacturing as part of the 'Made in China 2025' initiative. ... Observed APT10 targeting is in line with many of the historic compromises we have outlined previously as originating from China. This targeting spans industries that align with China's 13th FYP which would provide valuable information to advance the domestic innovation goals held within China."
      source_id: pwc-bae/2017-04_operation-cloud-hopper
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/dual-use-research
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Victim mix straddles civilian MSPs and dual-use research/tech
      targets; MCF is the meta-doctrine that licenses the MSS to treat
      civilian and defense-relevant collection as one target set. No
      cited source names MCF, so this stays strongly_inferred.
    attesting_source_id: null
    inference_basis:
      signals:
        - "PwC/BAE: APT10 targeting 'spans industries that align with China's 13th FYP ... to advance the domestic innovation goals held within China' — state-directed absorption of foreign IP into the national industrial base."
        - "Target set spans civilian MSPs, aerospace, telecom and manufacturing — the civ-mil dual-use collection surface MCF encodes."
      ruled_out: "Financially-motivated crime: PwC/BAE describe espionage-only exfiltration (IP and sensitive data), with no ransom or monetisation observed."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/standards-2035
    pillar_id: cn/standards-2035/telecom-standards
    program_id: null
    confidence: plausible
    reasoning: |
      Telecom-vendor and carrier targets in the victim list are
      consistent with standards-2035-aligned collection, though the
      MIC2025 framing (explicit in the cited PwC/BAE report) is more
      direct.
    attesting_source_id: null
    inference_basis:
      signals:
        - "PwC/BAE note APT10's historical focus on the 'technology and telecommunications sector' plus telecom targets in the victim set."
      alternatives:
        - "The MIC2025 next-gen-IT / telecom pillar is the more direct, source-named frame; standards-2035 is a downstream inference not named by any cited source."
    counter_explanation: null
    contested: false
    analyst: claude
