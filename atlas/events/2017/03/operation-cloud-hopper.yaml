  notes: |
    Audited vs the two cited sources. pwc-bae/2017-04_operation-cloud-hopper: raw_snapshot
    present + hash re-verified (sha256 8da2fdd15a79d777a17efb0adb6fc15ea9ff64edde8ea743395235f2816356c3,
    25-page PDF, CreationDate 2017-04-04). doj/2018-12-20_apt10-indictment: re-checked 2026-07-10 and
    STILL bot-walled — the justice.gov/archives URL returns HTTP 200 but only a 2,574-byte Akamai
    "bm-verify" JS-challenge page (no article body); the Reuters Cloud Hopper report is DataDome-401.
    No DOJ content hash; DOJ-only facts are mirror-corroborated (CyberScoop / FBI Wanted / Nextgov
    2018-12-20 + MITRE G0045, which quotes the indictment) -> event level: partial.
    [a] FACTS carried verbatim by the snapshotted PwC/BAE report: MSP supply-chain, spear-phishing of
    MSP admins, pivot on valid MSP credentials from shared MSP management systems into customer
    networks, 12+ countries (PwC map shows ~15: USA, Canada, UK, France, Switzerland, Sweden, Norway,
    Finland, Brazil, South Africa, India, Thailand, South Korea, Japan, Australia), PlugX / ChChes /
    RedLeaves / Quasar RAT, DLL search-order hijacking + sideloading via legitimately signed binaries
    ("using legitimate, signed software, such as Windows Defender to load the malicious payloads"),
    Mimikatz / PwDump credential dumping. CORRECTIONS: (1) removed 4 dangling/unsourced org targets
    orgs/hpe, orgs/ibm, orgs/fujitsu, orgs/ntt — no target file exists for any (UNRESOLVED FKs), and
    the MSP victim IDENTITIES appear in NEITHER cited source (PwC 0 hits; the DOJ indictment
    anonymised them as MSP-1 etc.). Their public naming came from Reuters (2019); consistent with the
    already-audited sibling event 2018-12/apt10-cloud-hopper-indictment they are disclaimed in prose,
    not asserted as cited. Kept the one resolving target sectors/ict/managed-services. (2) removed
    "hundreds of customer Active Directories" (figure in no source). (3) removed the "Touched every
    MIC2025-listed sector (10/10)" over-claim — PwC says APT10 targeting is "in line with MANY of"
    the MIC2025 / 13th-FYP industries, not all ten. (4) corrected malware framing: PwC states APT10
    "ceased its use of the Poison Ivy malware family after a 2013 FireEye report", so Poison Ivy is
    historical, not a Cloud Hopper (2016-17) backdoor.
    [b] ATTRIBUTION: PwC/BAE attribute at NATION level only — "PwC UK and BAE Systems assess APT10 as
    highly likely to be a China-based threat actor", targeting "closely aligned with strategic Chinese
    interests"; they NEVER name the MSS / Tianjin / Huaying (verified 0 hits). MSS Tianjin SSB +
    Huaying Haitai + officers Zhu Hua & Zhang Shilong come solely from the DOJ indictment (cited,
    bot-walled, mirror-corroborated). auspex concur retained.
    [c] DATES: start 2014 (PwC: "likely that APT10 had already begun to do so from as early as 2014");
    disclosure 2017-04-03 (report says "April 2017", PDF created 2017-04-04); end 2018-12-20
    (indictment) — all check out. The 2017-03 slug is a stable id (disclosure is April) — not changed,
    per house convention. Both source published_on dates verified.
    [d] DOCTRINE: cn/mic2025 KEPT attested but attesting_source_id corrected doj -> pwc-bae (the DOJ
    indictment never mentions MIC2025; PwC/BAE name it explicitly — Figure 13 "Industries of interest
    outlined by 'Made in China 2025' initiative" — and state the goal: APT10 targeting "spans
    industries that align with China's 13th FYP which would provide valuable information to advance the
    domestic innovation goals held within China"); added inference_basis.source_quote (verbatim,
    de-interleaved from the two-column layout). cn/mcf (strongly_inferred) + cn/standards-2035
    (plausible) each given a proper inference_basis (signals + ruled_out / alternatives). All three
    are attacker-rationale (Chinese doctrine on a China op) -> default perspective, no field needed.
    [e] ATTRIBUTION_LEVEL (added, was missing): PwC/BAE attribution -> nation; DOJ attribution ->
    named-unit (MSS Tianjin State Security Bureau + Huaying Haitai front company + two named officers).
    [f] ACTOR_ID: cn/mss/apt10 resolves to atlas/actors/cn/apt10.yaml (id: cn/mss/apt10). This is the
    espionage-campaign event (actor retained); the LE counter-action lives in the separate event
    2018-12/apt10-cloud-hopper-indictment. incident_type intrusion/data-theft/supply-chain correct.
    Source records: appended fresh 2026-07-10 audit notes to both; PwC/BAE snapshot keys unchanged
