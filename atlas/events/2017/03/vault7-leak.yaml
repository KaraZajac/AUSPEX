id: 2017-03/vault7-leak
name: Vault 7 leak (CIA CCI / EDG tooling exposed)
start_date: 2017-03-07  # WikiLeaks Year Zero release
disclosure_date: 2017-03-07
end_date: 2017-11-09  # final Vault 7 release
incident_type:
  - documentary  # leak of US capability; not an offensive US operation
initial_vector: insider  # Joshua Schulte (EDG developer), exfiltrated 2016
outcome_summary: |
  ~8,761 documents and files exposing CIA CCI / EDG cyber tooling
  published by WikiLeaks across 24 partial releases (March 7 –
  November 9, 2017). Documented sub-branches of the CCI / EDG, named
  tools (HIVE, Fluxwire, Brutal Kangaroo, Weeping Angel, Pandemic,
  ELSA, Year Zero, Athena, Marble Framework), and operational
  tradecraft. Joshua Schulte (former CIA EDG developer) convicted
  in SDNY July 13, 2022.
false_flag_risk: none
summary: |
  Companion documentary event to the Shadow Brokers leak. Filed in
  the US atlas because it is the primary documentary corroboration
  of CIA CCI / EDG attribution to the Longhorn / Lamberts cluster
  (per Symantec / Kaspersky April 2017).

  Doctrinal significance: exposed the operational architecture of
  CIA covert-action cyber under Title 50 §3093 — sub-branch
  structure (EDB, OSB, RDB, MDB, NDB), the Marble Framework's
  false-flag-capable string obfuscation with multi-language decoys
  (Chinese, Russian, Korean, Arabic, Farsi), and the tradecraft
  norms around tool revocation and burn protocols.
