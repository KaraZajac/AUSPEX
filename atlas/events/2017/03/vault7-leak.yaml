doctrine_links:
  - doctrine_id: us/title-10-title-50
    pillar_id: null
    program_id: null
    perspective: attacker-rationale
    confidence: strongly_inferred
    reasoning: |
      Vault 7 documents the CIA's own cyber tooling (CCI / EDG), so the
      exposed operations sit on the Title 50 intelligence-community
      authority track, not the Title 10 traditional-military-activity
      track that governs USCYBERCOM. The March–September 2017 exposure
      window (and the 2016 exfiltration) predates NSPM-13 and Defend
      Forward (both 2018), so no more-specific US operational cyber
      doctrine was in force; the Title 10 / Title 50 statutory frame is
      the applicable linkage. strongly_inferred, not attested: no cited
      source states the legal-authority basis, and the sources do not
      resolve whether the collection ran as §3093 covert action (finding
      + notification) or as Title 50 clandestine intelligence collection
      — only that the tooling's author is a CIA IC unit. (Prior
      `attested` + reference to "congressional reporting" was
      over-attestation: no such congressional source is cited, and the
      DOJ conviction PR does not state a legal-authority basis.)
    attesting_source_id: null
    inference_basis:
      signals:
        - "WikiLeaks Year Zero attributes the tooling to the CIA's Center for Cyber Intelligence / Engineering Development Group (\"the series, 'Year Zero', comprises 8,761 documents and files from an isolated, high-security network situated inside the CIA's Center for Cyber Intelligence\"; CIA named 105× on the Year Zero page) — a Title 50 intelligence-community agency, not a Title 10 military command."
        - "The SDNY conviction of Joshua Schulte, a CIA CCI / EDG software engineer, judicially places the tooling's authorship inside the CIA (Title 50), not the DoD (Title 10)."
        - "The 2016 exfiltration / March–September 2017 exposure window predates NSPM-13 and Defend Forward (both 2018); the Title 10 / Title 50 framework is the only US doctrinal authority in force for the period."
      ruled_out: "Title 10 traditional-military-activity (USCYBERCOM) framing: WikiLeaks and the Schulte conviction place authorship inside the CIA IC (Title 50), not a DoD military command."
    counter_explanation: null
    contested: false
    analyst: claude
