id: 2017-11/volexity-oceanlotus-asean-watering-hole
name: Volexity discloses OceanLotus / APT32 watering-hole network targeting ASEAN, regional media, and civil society
start_date: 2016-10-01  # "late 2016" estimate per source (SWC operation "since late 2016"); some civil-society orgs targeted "since early 2015"; Volexity began tracking May 2017
disclosure_date: 2017-11-06
end_date: null  # campaign explicitly "ongoing" at disclosure; do not conflate op-end with publication date
incident_type:
  - intrusion
  - espionage
  - surveillance
  - data-theft
initial_vector: n-day
outcome_summary: |
  Volexity (Dave Lassalle, Sean Koessel, and Steven Adair) published
  a long-form disclosure of a 100+ site strategic-web-compromise
  ("watering-hole") network operated by OceanLotus / APT32. The
  compromised properties span: the ASEAN organization itself
  (asean.org, the ASEAN Trade Repository, ASEAN Investment);
  government and military sites in three Vietnam-neighbouring states —
  Cambodia (Ministry of Foreign Affairs, Ministry of Environment,
  Ministry of Civil Service, National Police, National Election
  Committee and others), Laos (Bokeo Province, Ministry of Public
  Works and Transport) and the Philippines (Armed Forces of the
  Philippines and the Office of the President); Chinese state-owned
  oil/offshore-energy firms (China National United Oil, China Oilfield
  Services, China National Offshore Oil Corporation) and navigation
  firms (BDStar); and — the majority of victims — over 80
  Vietnamese-language human-rights, civil-society, independent-media,
  blogger and religious sites critical of the Vietnamese government.
  The campaign used two JavaScript profiling/fingerprinting frameworks
  to whitelist and selectively target visitors of interest, serving
  fake Google-OAuth consent popups (granting access to all e-mail and
  contacts) and fake browser-update malware; spear-phishing against
  some of the same organizations was flagged for a follow-on report.
  The disclosure complements the FireEye May 2017 APT32 attribution
  with infrastructure-level evidence and remains a foundational
  mapping of APT32's pre-2018 collection footprint.
false_flag_risk: none
summary: |
  The largest single-disclosure mapping of OceanLotus / APT32's
  strategic-web-compromise ("watering-hole") network as of late 2017;
  Volexity assessed its size and scale had "only previously been
  rivaled" by the Russian Turla/Waterbug group. Where FireEye named
  the actor (May 2017) and Cybereason dissected a single victim
  end-to-end, this report is the reference document for the *scale* of
  OceanLotus's collection footprint. The 100+ compromised properties
  resolve into three lanes: ASEAN / neighbouring-state government and
  military collection (the ASEAN organization and government sites in
  Cambodia, Laos and the Philippines); Chinese state-owned
  oil/offshore-energy and navigation collection; and — the dominant
  lane by volume — over 80 Vietnamese-language human-rights,
  civil-society, independent-media and blogger sites critical of the
  Vietnamese government, i.e. domestic and diaspora dissident
  surveillance.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: Volexity
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2017-11-06
    attribution_source_id: volexity/2017-11-06_oceanlotus-asean-watering-hole
    notes: |
      Report bylined Dave Lassalle, Sean Koessel, and Steven Adair
      (the org is credited as attributing_org). Volexity confidently
      ties the campaign to the named cluster OceanLotus / APT32
      ("Volexity has tied this attack campaign to an advanced
      persistent threat (APT) group first identified as OceanLotus")
      — named-actor, NOT named-unit (no Vietnamese service named).
      Volexity hedges the NATION attribution: "Volexity does not
      typically engage in attempting attribution of any threat
      actor, [but] does agree with previously reported assessments
      that OceanLotus is likely operating out of Vietnam ... due to
      the extreme and wide-scale nature of certain targeting that
      would be extremely unlikely to align with the interests of
      those outside of Vietnam." The high confidence is at the
      named-actor (OceanLotus) level; the Vietnam nexus is "likely" /
      concurrence with prior reporting.
doctrine_links:
  - doctrine_id: vn/resolution-29-nqtw
    pillar_id: vn/resolution-29-nqtw/regime-stability-surveillance
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The dominant victim segment — over 80 of the 100+ compromised
      sites — is Vietnamese-language human-rights, civil-society,
      independent-media, blogger and religious properties "critical of
      the Vietnamese Government," targeted with visitor profiling and
      Google-account (e-mail/contacts) surveillance. That maps
      directly onto the resolution's regime-stability-surveillance
      pillar (monitoring "hostile forces" / dissidents and the
      diaspora). Volexity adds that this targeting "would be extremely
      unlikely to align with the interests of those outside of
      Vietnam." strongly_inferred rather than attested: Volexity (a US
      vendor) documents the who/what and the Vietnamese-interest
      alignment but does not state the regime's strategic purpose, and
      Resolution 29-NQ/TW (a 2018 statute) post-dates the 2016-2017
      operation — it is linked here as the later codification of a
      pre-existing CPV regime-stability-surveillance posture rooted in
      earlier Party directives, not as a directive the op followed.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Over 80 of the 100+ compromised sites are Vietnamese individuals/orgs critical of the Vietnamese government (human rights, civil society, media, bloggers, religion) — the explicit dissident/diaspora target set the pillar encodes."
        - "Tradecraft is surveillance-oriented: JavaScript profiling/whitelisting of visitors of interest plus fake Google-OAuth consent pages granting access to all e-mail and contacts."
        - "Volexity assessed the targeting 'would be extremely unlikely to align with the interests of those outside of Vietnam.'"
        - "APT32's documented standing mission includes monitoring Vietnamese diaspora/dissident civil society (Viet Tan, RFA Vietnamese)."
      ruled_out: "Industrial-upgrading cyber-collection (automotive/aerospace IP): the disclosed victims contain no automotive or aerospace OEMs/suppliers, so that doctrine's defining victimology is absent. The foreign-government and Chinese state-oil segments are parallel foreign-intelligence collection rather than regime-stability surveillance, and have no dedicated Vietnamese doctrine in the atlas."
