id: 2017-11/volexity-oceanlotus-asean-watering-hole
name: Volexity discloses OceanLotus / APT32 watering-hole network targeting ASEAN, regional media, and civil society
start_date: 2017-01-01
disclosure_date: 2017-11-06
end_date: 2017-11-06
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  Volexity (Steven Adair) published a long-form disclosure of a
  100+ site watering-hole infrastructure operated by OceanLotus /
  APT32 against ASEAN-region governments (Cambodian Ministry of
  Foreign Affairs, Lao Ministry of Defence, the Philippines'
  Department of Foreign Affairs, the Association of Southeast
  Asian Nations secretariat), regional independent media
  properties, and Vietnamese-language civil-society sites. The
  campaign used profiler scripts to fingerprint visitors and
  selectively serve OceanLotus second-stage payloads. The
  disclosure remains a foundational mapping of APT32's pre-2018
  collection footprint and complements the FireEye May 2017
  attribution by laying out infrastructure-level evidence rather
  than victim narratives.
false_flag_risk: none
summary: |
  The largest single-disclosure mapping of APT32's watering-hole
  network. Where FireEye named the actor and Cybereason dissected
  a single victim end-to-end, Volexity's 2017 publication is the
  reference document for the *scale* of OceanLotus's regional
  political and civil-society collection footprint as of late
  2017. The 100+ compromised properties span the ASEAN
  political-collection lane (foreign and defence ministries),
  the regional-media lane (independent Vietnamese-language and
  Cambodian outlets), and the diaspora-civil-society lane.
