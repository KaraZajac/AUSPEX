qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-27
  level: full
  notes: |
    Audited against the RAW first-party source — Volexity, "OceanLotus
    Blossoms: Mass Digital Surveillance and Attacks Targeting ASEAN,
    Asian Nations, the Media, Human Rights Groups, and Civil Society"
    (2017-11-06). Snapshot volexity__2017-11-06_oceanlotus-asean-watering-hole.html,
    sha256 633c29bf…a15e9d6b, 83379 bytes (HTTP 200, full article body
    captured; the "Cloudflare" strings are CDN/mimicked-domain
    references in the body, not a bot wall).

    [a] FACTS — corrected two FABRICATED victims and one omission.
    (1) "Lao Ministry of Defence" is NOT in the source; the Laos
    victims are "Bokeo Province" (bokeo.gov.la) and "Ministry of
    Public Works and Transport" (mpwt.gov.la). (2) "the Philippines'
    Department of Foreign Affairs" is NOT in the source; the
    Philippine victims are the "Armed Forces of the Philippines"
    (afp.mil.ph) and the "Office of the President" (op-proper.gov.ph).
    Both removed/replaced in outcome_summary and targets. (3) The
    event OMITTED the China lane the source lists prominently —
    "China National United Oil Corporation" (chinaoil.com.cn), "China
    Oilfield Services Limited" and "China National Offshore Oil
    Corporation" (CNOOC, sites withheld), plus navigation firms BDStar
    Information Service / BDStar Navigation (navchina.com); key
    highlights name "State Oil Exploration" as a victim category.
    Added as sectors/energy/oil-gas (cn). Source-confirmed claims kept:
    Cambodia Ministry of Foreign Affairs (mfa.gov.kh) ✓; ASEAN org
    asean.org + ASEAN Trade Repository + ASEAN Investment ✓; "exceeds
    100" compromised sites ✓ ("Over 100 websites"); two JS
    profiling/fingerprinting frameworks (A/B) with visitor whitelisting
    ✓; fake Google-OAuth popups granting access to "all e-mail and
    contacts" ✓; fake IE/Chrome/Firefox-update malware + Cobalt Strike
    ✓; spear-phishing flagged for a follow-on report ✓; over 80
    Vietnamese anti-government civil-society/HR/media/blogger/religion
    sites = the majority ✓. Dropped unsupported summary embellishments:
    "defence ministries" (only AFP is military; Laos victims are
    provincial/public-works, Cambodia mostly civil ministries+police)
    and "Cambodian [media] outlets" (Cambodia victims are government,
    not media). Added incident_type espionage + surveillance (title is
    "Mass Digital Surveillance"; body: "mass digital surveillance and
    attack campaign", "conduct digital surveillance", CNE capability);
    kept intrusion + data-theft (webshells; e-mail/contacts theft).

    [b] ATTRIBUTION — Volexity confidently ties the campaign to the
    named cluster OceanLotus/APT32 ("Volexity has tied this attack
    campaign to an advanced persistent threat (APT) group first
    identified as OceanLotus by SkyEye Labs in 2015"). NATION is
    hedged: "Volexity does not typically engage in attempting
    attribution ... [but] does agree with previously reported
    assessments that OceanLotus is likely operating out of Vietnam ...
    extremely unlikely to align with the interests of those outside of
    Vietnam." Kept attributing_org_confidence: high (the named-actor
    tie is firsthand and definitive); captured the nation-level hedge
    in attribution notes. attributing_org corrected "Volexity (Steven
    Adair)" -> "Volexity" (three-author byline: Lassalle, Koessel,
    Adair). auspex_assessment concur retained.

    [c] DATES — published_on 2017-11-06 confirmed ("November 6,
    2017"). disclosure_date 2017-11-06 ✓. FIXED end_date 2017-11-06 ->
    null: the source repeatedly calls this an "ongoing attack
    campaign", so the prior end_date merely re-stated the publication
    date (op-end/disclosure conflation). FIXED start_date 2017-01-01 ->
    2016-10-01 as a "late 2016" estimate, per "The OceanLotus threat
    group has successfully operated ... through several high-profile
    websites since late 2016"; some civil-society orgs targeted "since
    early 2015"; Volexity "identified and started tracking" in May
    2017 (detection, not op-start).

    [d] DOCTRINE_LINKS — REMOVED the vn/industrial-upgrading-cyber-collection
    (plausible) link: its prior reasoning ("ASEAN foreign-ministry
    targeting touches on RCEP / ASEAN single-window / automotive-tariff
    harmonization") is source-unsupported speculation, and that
    doctrine's defining victimology (foreign automotive/aerospace OEMs
    & suppliers) is wholly ABSENT from the fully-disclosed victim list
    (governments, military, state oil, dissidents). KEPT
    vn/resolution-29-nqtw/regime-stability-surveillance at
    strongly_inferred and tightened its reasoning to the dominant
    Vietnamese-dissident/civil-society victim segment (the pillar's
    actual scope), dropping the over-reaching invented "neighbor-
    monitoring strand"; added inference_basis {signals[], ruled_out}
    (previously missing). Not attested (no attesting_source_id):
    Volexity states the who/what and Vietnamese-interest alignment but
    not the regime's strategic goal, and the doctrine statute (2018)
    post-dates the op — linked as codification of a pre-existing CPV
    posture. perspective = attacker-rationale (default; vn actor + vn
    doctrine, no cross-state mismatch).

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): Volexity
    names the group OceanLotus/APT32, not any Vietnamese service/unit.

    [f] ACTOR_ID — vn/unscoped/apt32 RESOLVES to atlas/actors/vn/apt32.yaml
    (file path lacks "unscoped" but the record's id field is
    vn/unscoped/apt32). Well-sourced, non-provisional; consistent with
    siblings (2018-03 ESET, 2020-11 Volexity). No actor flag.

    Residual uncertainties: (i) initial_vector kept n-day — the source
    documents n-day CMS/plugin exploitation of staging sites ("core
    components and added plugins had remotely exploitable
    vulnerabilities that lead to compromise") and this matches the
    2020 Volexity-OceanLotus sibling's convention; but access was
    mixed — credential origin is "currently unknown" (possible
    valid-creds), and the visitor-targeting itself "relied on social
    engineering" (fake OAuth / fake updates), with Volexity noting it
    "would be trivial ... to introduce an exploit" (i.e. none observed
    against visitors). (ii) The Chinese state-oil/offshore + navigation
    lane reads as South-China-Sea maritime/energy collection, but no
    Vietnamese maritime/SCS doctrine exists in the atlas (only the two
    VN doctrines), so that strategic lane is intentionally left without
    a doctrine_link rather than forced onto an ill-fitting one.
