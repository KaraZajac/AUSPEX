qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-27
  level: full
  notes: |
    RE-SOURCE + full audit 2026-06-27 (max effort). This event was stamped PARTIAL in
    batch 15 on a confirmed PHANTOM source (cisco-talos/2017-11_patchwork-badnews-
    continuation — no Cisco Talos Patchwork report exists; its url was only the Talos blog
    homepage). It has now been RE-SOURCED (the "badrabbit model") to the two genuine
    contemporaneous primaries, both fetched live (HTTP 200), snapshotted and hashed:
    - Trend Micro "Untangling the Patchwork Cyberespionage Group" (2017-12-11; Lunghi /
      Horejsi / Pernet) — raw sha256 ca087dcf...63b28e89, 88,434 bytes.
    - Palo Alto Unit 42 "Patchwork Continues to Deliver BADNEWS to the Indian Subcontinent"
      (2018-03-07; Levene / Grunzweig / Barbehenn) — raw sha256 7e9c4713...d0ff9f2e,
      271,345 bytes.
    sources[] and attribution_source_id re-pointed off the phantom; the phantom record's
    notes annotated ORPHANED per protocol STEP 0c (no event cites it now — retire candidate
    for Kara, file retained). Both sources were snapshottable so every claim is now
    source-carried => level FULL.
    [a] FACTS — all carried. BADNEWS implant: Trend Micro raw "it drops a dynamic-link
    library (DLL) that contains the Badnews backdoor"; Unit 42 raw "their updated BADNEWS
    payload". Pakistani govt/military victimology: Unit 42 raw "recent military promotions
    within the Pakistan Army, information related to the Pakistan Atomic Energy Commission,
    as well as Pakistan's Ministry of the Interior". Spear-phished weaponized Office docs:
    Trend Micro raw "Patchwork targeted multiple sectors in China and South Asia. We also
    saw spear-phishing emails ..."; Unit 42 raw "EPS exploits rolled into legitimate,
    albeit malicious, documents". CVE chain VERIFIED against the real sources: Unit 42 raw
    "malicious embedded EPS files targeting the CVE-2015-2545 and CVE-2017-0261
    vulnerabilities"; Trend Micro raw lists CVE-2015-1641 (RTF), CVE-2014-4114 (Sandworm),
    CVE-2012-1856 and CVE-2017-0199 plus DDE/SCT abuse. The phantom-era CVE-2012-0158 +
    CVE-2015-1641 claims that batch 15 had STRIPPED are confirmed wrong/incomplete:
    CVE-2012-0158 appears in NEITHER real source (grep count 0 in both raws); the genuine
    2017-18 chain is CVE-2015-2545 + CVE-2017-0261 (Unit 42). The event prose carries no
    specific CVE, so it stays clean; the real chain is recorded here and in the source
    records.
    [b] ATTRIBUTION — corrected. attribution_source_id re-pointed phantom ->
    trend-micro/2017-12-11_untangling-patchwork-cyberespionage-group; attribution_date
    2017-11-01 -> 2017-12-11 (the source's real publication date). Both real sources name
    the cluster directly (Trend Micro raw "Patchwork (also known as Dropping Elephant) is a
    cyberespionage group"; Unit 42 title "Patchwork Continues to Deliver BADNEWS").
    attributing_org kept "vendor-consensus" (multiple vendors converge on the Patchwork
    cluster). Confidence kept moderate — NOT upgraded: the cluster is named confidently but
    neither real source attributes to India or any Indian state service (India nexus is
    circumstantial), so concur-with-caveat stands. DIRECTIONALITY verified: actor
    India-aligned (in/unscoped/patchwork), victims Pakistan (pk); India is NOT a victim —
    Unit 42's named victims are exclusively Pakistani, and Trend Micro frames targeting as
    "China and South Asia" + "U.K., Turkey, and Israel" with India absent from the victim
    set in both.
    [c] DATES — fixed (the batch-15 flag). disclosure_date 2017-11-01 -> 2017-12-11 (first
    genuine public disclosure, Trend Micro; the raw's article:published_time meta =
    2017-12-11). end_date 2017-10-31 (a fabricated-source artifact) -> null: the campaign
    is an unbounded continuation — Trend Micro documents 2017 activity and Unit 42 documents
    it continuing into late January 2018 ("documents ... late January 2018"), and the actor
    remains active — so there is no clean bounded end. start_date 2017-01-01 retained as a
    defensible best-estimate for the 2017 window.
    [d] DOCTRINE_LINKS — kept the single in/regional-collection-pakistan-china/pakistan-
    military link at strongly_inferred (honest). Unit 42 directly carries the Pakistani
    military / nuclear / interior victim set; no source states India's strategic GOAL
    (neither even attributes to India), so NOT attested. Added inference_basis (signals[] +
    ruled_out) and attesting_source_id => Unit 42 as the primary SUPPORTING source (schema-
    sanctioned on strongly_inferred; it does not assert the goal). Doctrine is itself
    kind=posture / status=inferred — consistent with no attested goal-quote existing.
    [e] ATTRIBUTION_LEVEL — named-actor (kept): vendors name the "Patchwork" / Dropping
    Elephant cluster, not an Indian service/unit; consistent with actor in/unscoped.
    [f] ACTOR_ID — in/unscoped/patchwork RESOLVES (atlas/actors/in/patchwork.yaml). No
    actor flag.
    TARGETS — kept orgs/pakistani-military (pk, primary; the Pakistan Army) and ADDED
    sectors/government (pk, primary) to carry Unit 42's other two named victims (Pakistan
    Atomic Energy Commission, Ministry of the Interior). Both FKs resolve.
    RESIDUAL: (1) phantom cisco-talos/2017-11_patchwork-badnews-continuation is now
    ORPHANED — RETIRE candidate (deletion is Kara's call). (2) Unit 42's specifically-
    examined documents date to late Jan 2018 (just past the "through 2017" window) but
    document the continuation of the 2017 BADNEWS-vs-Pakistan campaign; the event name keeps
    "through 2017" as the core window and end_date=null reflects the spillover. (3) tier on
    both new source records set to secondary to match the corpus convention for vendor blog
    posts (all sibling trend-micro/ and unit42/ records).
