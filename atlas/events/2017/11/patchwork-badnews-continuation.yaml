id: 2017-11/patchwork-badnews-continuation
name: Patchwork continues BADNEWS deployment against Pakistani and South Asian government targets through 2017
start_date: 2017-01-01
disclosure_date: 2017-11-01
end_date: 2017-10-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Vendor reporting through late 2017 documented continued
  Patchwork / Dropping Elephant operations using the BADNEWS
  Windows implant against Pakistani government, military, and
  diplomatic targets, with extensions into Bangladeshi and Sri
  Lankan equities. Tradecraft included weaponized Office
  documents (CVE-2012-0158, CVE-2015-1641), PowerShell loaders,
  and BADNEWS variants with refreshed C2 infrastructure
  consistent with prior Forcepoint and Cymmetria characterization.
false_flag_risk: none
summary: |
  Continuity-tradecraft event covering the gap between the
  2016 Patchwork-naming triad (Kaspersky, Cymmetria, Forcepoint)
  and the 2018 Volexity US-think-tank disclosure. The BADNEWS
  family remained the cluster's canonical Windows implant
  through this period; operational tempo against Pakistani
  government targets was sustained rather than elevated.
