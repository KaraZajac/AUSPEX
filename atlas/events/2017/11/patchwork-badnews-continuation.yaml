id: 2017-11/patchwork-badnews-continuation
name: Patchwork continues BADNEWS deployment against Pakistani and South Asian government targets through 2017
start_date: 2017-01-01
disclosure_date: 2017-12-11
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Contemporaneous vendor reporting documented continued
  Patchwork / Dropping Elephant operations through 2017 using
  the BADNEWS Windows implant against Pakistani government and
  military targets, delivered through weaponized Office
  documents.
false_flag_risk: none
summary: |
  Continuity event for the period between the 2016 Patchwork
  naming reports (Kaspersky, Cymmetria, Forcepoint) and the
  2018 Volexity US-think-tank disclosure. Patchwork / Dropping
  Elephant remained active through 2017, with the BADNEWS
  Windows implant as its canonical first-stage tooling against
  South Asian government and diplomatic targets, delivered via
  spear-phished weaponized Office documents.
attributions:
  - actor_id: in/unscoped/patchwork
    attributing_org: vendor-consensus
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-12-11
    attribution_source_id: trend-micro/2017-12-11_untangling-patchwork-cyberespionage-group
    notes: |
      Named-actor (the "Patchwork" / Dropping Elephant cluster),
      not a named Indian service. Attribution rests on tradecraft
      and tooling overlap with prior Kaspersky / Cymmetria /
      Forcepoint Patchwork reporting; the two re-sourced primaries
      both name the cluster directly — Trend Micro (2017-12-11)
      "Patchwork (also known as Dropping Elephant) is a
      cyberespionage group" and Unit 42 (2018-03-07) "Patchwork
      Continues to Deliver BADNEWS". Neither attributes the group
      to India or any Indian state service (India nexus is
      circumstantial), consistent with actor in/unscoped/patchwork.
      AUDIT 2026-06-27: attribution_source_id re-pointed off the
      phantom cisco-talos placeholder to Trend Micro (2017-12-11);
      attribution_date corrected to that source's real publication
      date. Confidence kept moderate (cluster named confidently,
      but state/service attribution is circumstantial — not upgraded).
doctrine_links:
