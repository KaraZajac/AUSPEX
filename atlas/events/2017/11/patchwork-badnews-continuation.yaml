    confidence: strongly_inferred
    reasoning: |
      Patchwork is an India-aligned cluster whose canonical
      mission is collection against Pakistani government and
      military targets (Unit 42's 2018 BADNEWS reporting names
      the Pakistan Army, Pakistan Atomic Energy Commission, and
      Ministry of the Interior). No source states the strategic
      goal, so the link is strongly_inferred, not attested.
    attesting_source_id: unit42/2018-03-07_patchwork-continues-badnews-indian-subcontinent
    inference_basis:
      signals:
        - "Actor mission: Patchwork is a long-running India-aligned espionage cluster whose documented collection set centers on Pakistani government and military targets."
        - "Target + lure content: Unit 42 (2018-03-07) names the Pakistan Army, Pakistan Atomic Energy Commission and Ministry of the Interior as the subjects of the BADNEWS lures — a Pakistani military / nuclear / interior collection set."
        - "Timing + tooling continuity: contemporaneous 2017-2018 reporting (Trend Micro 2017-12-11; Unit 42 2018-03-07) shows sustained BADNEWS espionage tooling against South Asian government and diplomatic targets."
      ruled_out: "Financial / hacktivist motives — BADNEWS is an espionage implant and the victims are state military, nuclear and interior bodies, not commercial or revenue targets. The adjacent china-collection and diplomatic-collection pillars were considered, but the named victims for this BADNEWS window are specifically Pakistani military / government, so the pakistan-military pillar is the dominant reading with no serious competitor."
