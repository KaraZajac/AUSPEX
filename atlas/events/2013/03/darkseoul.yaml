id: 2013-03/darkseoul
name: DarkSeoul wiper attacks
start_date: 2013-03-20
disclosure_date: 2013-03-20
end_date: 2013-03-20
incident_type:
  - destructive
  - wiper
initial_vector: phishing
outcome_summary: |
  Spear-phishing-delivered wiper malware (Trojan.Jokra /
  DarkSeoul) with a delayed 14:00 KST trigger deployed against
  three ROK broadcasters (KBS, MBC, YTN) and three banks
  (Shinhan, NongHyup, Jeju). Approximately 32,000 systems wiped
  in a coordinated detonation; multi-day banking and
  broadcasting outage.
quantified_impact:
  systems_wiped: 32000
false_flag_risk: none
summary: |
  First major destructive DPRK cyber operation against ROK
  critical sectors (the 2009 and 2011 precursors were DDoS, not
  wiper). It established the destructive-wiper pattern later
  reused against Sony Pictures (2014); AUSPEX places the actor in
  the Lazarus umbrella, into which the contemporaneous "DarkSeoul"
  cluster and the later-named Andariel sub-cluster are folded (see
  the attributions block for the contemporaneous-vs-retrospective
  attribution boundary). Initial access was achieved via spear-
  phishing of broadcaster and bank IT staff; operators harvested
  valid credentials for patch-management / remote-administration
  consoles (AhnLab and Hauri update infrastructure) and used them
  to push the Trojan.Jokra / DarkSeoul wiper to ~32,000 endpoints
  in a coordinated 14:00 KST detonation. The wiper overwrites the
  MBR/VBR and logical drives with repeating "HASTATI" or
  "PR!NCPES" strings (per Symantec / Secureworks wiper analysis)
  and zeros disk contents. Symantec's "Four Years of DarkSeoul"
  report (June 2013) tied the March wiper into a multi-year
  DarkSeoul family sharing tooling (e.g. Trojan.Castov); the
  DarkSeoul-to-Destover/Sony lineage was drawn by Symantec's later
  "From Seoul to Sony" reporting (Dec 2014). The separate 25 June
  2013 anniversary wave (Trojan.Korhigh / Castov DDoS) is a
  distinct event and is not part of this March-20 wiper.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: ROK Ministry of Science, ICT and Future Planning (joint government/NIS investigation)
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2013-07-16
    attribution_source_id: bbc/2013-07-16_north-korea-behind-cyber-attack-south-websites
    notes: |
      Contemporaneous STATE attribution, at NATION level: the ROK
      government (Ministry of Science, ICT and Future Planning,
      leading a joint investigation) attributed the 20 March wiper to
      North Korea. Stated basis (via BBC): a North Korean IP found in
      the malicious code and damaged systems ("I can say this is the
      decisive evidence"), plus 82 malware samples and internet
      addresses matching prior Pyongyang hacking patterns. No unit was
      named and the government did not use "Lazarus"; actor_id
      resolves the DPRK perpetrator to the Lazarus umbrella per corpus
      modeling. The early Chinese-IP lead (NPR, 2013-03-21) was a
      preliminary regulator finding later revised, not a false flag.
  - actor_id: kp/rgb/lazarus
    attributing_org: Symantec
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2013-06-26
    attribution_source_id: symantec/2013-06-26_darkseoul-four-years
    notes: |
      Contemporaneous VENDOR attribution, at ACTIVITY-CLUSTER level:
      Symantec's "Four Years of DarkSeoul" (2013-06-26) attributed the
      March wiper and four years of prior ROK attacks to the
      "DarkSeoul" crew. It named NO nation and did not use "Lazarus"
      or "Andariel" (corroborated by SecurityWeek,
      securityweek/2013-06-27_south-korea-attack-tied-darkseoul-crew-symantec).
      DarkSeoul is folded into the Lazarus umbrella by Symantec's later
      "From Seoul to Sony" (2014) and industry / MISP-galaxy consensus;
      the corpus retains "Operation DarkSeoul" / "Dark Seoul" as
      Lazarus aliases.
  - actor_id: kp/rgb/andariel
    attributing_org: AUSPEX (retrospective Lazarus/Andariel sub-cluster note)
    attributing_org_confidence: moderate
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: null
    attribution_source_id: null
    notes: |
      RETROSPECTIVE / not carried by any 2013 source. The "Andariel"
      designation dates to ~2015; no contemporaneous report named
      Andariel for the March 2013 wiper. Retained only because the
      corpus deliberately models DarkSeoul as a fuzzy Lazarus-core /
      Andariel-boundary case (see atlas/actors/kp/andariel.yaml, which
      keeps DarkSeoul as a "historical alias only"). Kept with
      concur-with-caveat because it is post-hoc clustering, not an
      independently sourced 2013 attribution.
