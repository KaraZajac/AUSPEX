  level: partial   # every core claim snapshotted (BBC/Register/Wikipedia/NPR/SecurityWeek); only the exact MBR ASCII strings rest on un-snapshottable Symantec/Secureworks vendor analysis
  notes: |
    Fresh audit (prior agent interrupted by session restart; it had only stamped
    the two legacy source records, not the event body). HISTORICAL DarkSeoul wiper,
    20 March 2013.

    [a] FACTS — verified + corrected. CONFIRMED & snapshotted: date 20 March 2013
    (BBC "20 March"; theregister URL /2013/03/25/); ~32,000 systems wiped (BBC
    "32,000"); six named victims — broadcasters KBS/MBC/YTN + banks
    Shinhan/NongHyup(NACF)/Jeju (Wikipedia raw carries all six; BBC carries
    "broadcasters"+"banks"; Register carries "Shinhan"); coordinated 14:00 KST
    time-triggered detonation (Register raw "14:00" x2; Secureworks: "If it is
    earlier than March 20, 2013 14:00, then Wiper B will sleep"); vector =
    spear-phish -> stolen admin credentials -> push via patch-management/update
    infrastructure (Register raw "patch management" x2 + "AhnLab" x3 + "stolen"/
    "credentials"; contagio raw confirms Jokra + MBR wipe + AhnLab). CORRECTED: (1)
    STRIPPED "HastatiWiper" — not a real vendor name, an AUSPEX portmanteau of the
    HASTATI MBR string; vendors used Trojan.Jokra / DarkSeoul / "Wiper B/C". (2)
    STRIPPED "Korhigh" from the March-20 wiper — Trojan.Korhigh belongs to the
    SEPARATE 25 June 2013 anniversary wave (changes passwords to "highanon2013"),
    a conflation error; added an explicit fence in the summary. (3) FIXED
    ANACHRONISM — the summary claimed Symantec's "Four Years of DarkSeoul" (June
    2013) linked tools "prefiguring Lazarus's later Sony Pictures" operation; the
    June-2013 report cannot prefigure a Nov-2014 event. The DarkSeoul->Destover/Sony
    lineage is Symantec's LATER "From Seoul to Sony" (Dec 2014); reworded, dropped
    the specific "Tdrop" claim (not carried by the June-2013 report). (4) MBR strings
    trimmed to the two documented ("HASTATI"/"PR!NCPES"; dropped redundant unpunctuated
    "PRINCPES") and attributed to Symantec/Secureworks. (5) Removed unsourced "months
    of dwell" duration.

    [b] ATTRIBUTION — over-attestation + source mismatch fixed. The event cited
    symantec/...four-years as the attribution source for a "Lazarus" (high/concur)
    AND "Andariel" attribution, org="ROK NIS / Symantec". BUT the cited Symantec
    report named ONLY the "DarkSeoul" crew (an activity-cluster) — NO nation, NO
    "Lazarus", NO "Andariel" (SecurityWeek raw confirms "DarkSeoul"+"Crew"+"Castov",
    sha c36c93a2...). Restructured into 3 correctly-levelled, correctly-sourced
    entries: (1) ROK govt (Ministry of Science, ICT & Future Planning joint/NIS
    investigation) -> North Korea, NATION level, 2013-07-16, sourced to NEW BBC record
    (raw: "We speculate the hacking was done by North Korea"; "82 malignant codes";
    "North Korean IP ... I can say this is the decisive evidence"; sha 6b0a9086...).
    (2) Symantec -> "DarkSeoul" crew, ACTIVITY-CLUSTER level, 2013-06-26 (source
    unchanged). (3) kp/rgb/andariel kept as concur-with-caveat but relabelled AUSPEX
    retrospective (attribution_date null, source null) — the "Andariel" name dates to
    ~2015, unsupported by any 2013 source; retained only because the corpus itself
    models the Lazarus/Andariel boundary as fuzzy (kp/andariel.yaml keeps DarkSeoul
    as "historical alias only"). Corrected org "ROK NIS" -> "ROK Ministry of Science,
    ICT and Future Planning" (BBC names Park Jae-moon of MSIP, not the NIS).

    [c] DATES — start=disclosure=end 2013-03-20 correct (single-day 14:00 detonation).
    FIXED attribution_date: was 2013-06-26 (Symantec's PUBLICATION date) reused for a
    nation/Lazarus attribution; now 2013-07-16 for the ROK-govt nation attribution
    (BBC), 2013-06-26 for the Symantec activity-cluster attribution, null for the
    retrospective Andariel note. Source published_on verified in raw: BBC 2013-07-16,
    SecurityWeek datePublished 2013-06-27T16:14:23+00:00, Register 2013-03-25, NPR
    2013-03-21.

    [d] DOCTRINE_LINKS — kp/songun (pillar military-intel-cyber) + kp/juche, both
    kept strongly_inferred (correct: no source states either doctrine's terminal
    goal, so NOT attested). Brought to schema: added perspective: attacker-rationale
    (DPRK's own doctrine on an attack DPRK carried out), attesting_source_id: null,
    and inference_basis {source_id: bbc..., signals[], ruled_out} (signals = purely
    destructive payload vs national broadcasters+banks, timing after the 12 Feb 2013
    DPRK nuclear test per BBC, nation-level DPRK attribution; ruled_out = financial
    extraction).

    [e] ATTRIBUTION_LEVEL — was MISSING on both original entries; added: nation
    (ROK govt), activity-cluster (Symantec), named-unit (retrospective Andariel).

    [f] ACTOR_ID — kp/rgb/lazarus resolves to atlas/actors/kp/lazarus.yaml (id
    kp/rgb/lazarus; aliases incl. "Operation DarkSeoul"/"Dark Seoul"/"Andariel"),
    kp/rgb/andariel resolves to atlas/actors/kp/andariel.yaml — both VALID. Not a
    counter-action; actor_ids stay populated.

