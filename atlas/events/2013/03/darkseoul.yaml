id: 2013-03/darkseoul
name: DarkSeoul wiper attacks
start_date: 2013-03-20
disclosure_date: 2013-03-20
end_date: 2013-03-20
incident_type:
  - destructive
  - wiper
initial_vector: phishing
outcome_summary: |
  Spear-phishing-delivered wiper malware (Jokra / HastatiWiper)
  with delayed-trigger payload deployed against three ROK
  broadcasters (KBS, MBC, YTN) and three banks (Shinhan,
  Nonghyup, Jeju). Approximately 32,000 systems wiped in
  coordinated detonation; multi-day banking and broadcasting
  outage.
quantified_impact:
  systems_wiped: 32000
false_flag_risk: none
summary: |
  First major destructive DPRK cyber operation against ROK
  critical sectors. Established the destructive-wiper pattern
  later reused at Sony (2014) and operationalized by Andariel in
  subsequent operations. Initial access was achieved via spear-
  phishing of broadcaster and bank IT staff, followed by months
  of dwell in which operators harvested valid credentials for
  patch-management and remote-administration consoles (notably
  AhnLab APC and Hauri ViRobot) and used them to push the Jokra
  / HastatiWiper / Korhigh wiper to ~32,000 endpoints in a
  coordinated 14:00 KST detonation. The wiper overwrites the MBR
  with "HASTATI" / "PRINCPES" / "PR!NCPES" strings and zeros disk
  contents; Symantec's "Four Years of DarkSeoul" reporting links
  the Trojan.Castov, Trojan.Jokra, and Tdrop tools as a single
  cluster prefiguring Lazarus's later Sony Pictures destructive
  operation.
