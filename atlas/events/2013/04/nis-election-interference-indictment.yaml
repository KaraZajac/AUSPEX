initial_vector: insider
outcome_summary: |
  Indictment of former NIS Director Won Sei-hoon and several
  Psychological Warfare Bureau officers by the Seoul Central
  District Prosecutors' Office for online political activity
  during the 2012 ROK presidential election campaign, in
  violation of the National Intelligence Service Act
  (prohibiting NIS political involvement) and the Public
  Official Election Act.
false_flag_risk: none
summary: |
  Doctrinally and editorially significant: this is the
  publicly-codified case of ROK intelligence-service cyber
  misuse for domestic political ends, distinct from any
  foreign-attribution event in the SK atlas.

  Per court findings (Seoul Central District Court 2015
  first-instance ruling, partially reversed on appeal,
  reinstated on retrial, Supreme Court 2017 final), tens
  of NIS officers organised in teams posted political
  comments on Korean online forums (Daum Agora, DC Inside,
  Twitter) from multiple identities — supporting the
  conservative candidate (Park Geun-hye) and disparaging
  opposition candidates. The scheme was disclosed by an
  internal NIS officer in late 2012; prosecutorial
  investigation followed in early 2013.

  AUSPEX framing per editorial policy: treated as a
  doctrine-codified case of *cyber misuse outside
  doctrine*, not as evidence that ROK NIS doctrine
  authorises domestic interference. The case is in-scope
  because it has been adjudicated through the Korean
  court system to final conviction (2017-08-30; see
  the companion 2017-08 event).
