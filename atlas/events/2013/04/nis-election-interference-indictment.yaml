initial_vector: insider
outcome_summary: |
  Indictment of former NIS Director Won Sei-hoon and several
  Psychological Warfare Bureau officers by the Seoul Central
  District Prosecutors' Office for online political activity
  during the 2012 ROK presidential election campaign, in
  violation of the National Intelligence Service Act
  (prohibiting NIS political involvement) and the Public
  Official Election Act.
false_flag_risk: none
summary: |
  Doctrinally and editorially significant: this is the
  publicly-codified case of ROK intelligence-service cyber
  misuse for domestic political ends, distinct from any
  foreign-attribution event in the SK atlas.

  Per the public record, NIS officers on the agency's
  psychological-warfare team manipulated public opinion
  ahead of the December 2012 vote — posting and amplifying
  political comments on Korean social media and online
  forums from multiple identities to favour the conservative
  candidate (Park Geun-hye) and disparage opposition
  candidates. The scheme was disclosed in late 2012;
  Korean prosecutors investigated in early 2013.

  Judicial sequence per the cited sources: Won was first
  convicted (three years) in February 2015; that conviction
  was overturned on appeal; on retrial he was sentenced to
  four years by the Seoul High Court on 2017-08-30; the
  Supreme Court of Korea upheld the sentence in April 2018
  (a further set of political-interference charges brought
  under the Moon administration led to an additional 2020
  sentence). AUSPEX anchors the canonical "final conviction"
  marker at the 2017-08-30 Seoul High Court retrial ruling
  (see the companion 2017-08 event).

  AUSPEX framing per editorial policy: treated as a
  doctrine-codified case of *cyber misuse outside
  doctrine*, not as evidence that ROK NIS doctrine
  authorises domestic interference. The case is in-scope
  because it has been adjudicated through the Korean
  court system.
