  verified_on: 2026-06-25
  level: partial
  notes: |
    Audited vs the single cited DOJ primary (shared with the Operation
    Ababil event, audited the same day). The DOJ release is unfetchable
    by tooling — live URL returns HTTP 403/400 (Akamai bot-wall) and
    archive.org is blocked, so the only capture was the bot interstitial
    (discarded, not retained as a snapshot); hence level: partial. Content
    cross-checked against the DOJ domain, the SDNY companion release, and
    contemporaneous reporting quoting the release verbatim. DAM-SCADA FACTS
    ✓: defendant Hamid Firoozi (ITSecTeam, IRGC-sponsored); access "between
    August 28, 2013, and September 18, 2013" (start_date matches; corrected
    end_date 2013-09-15 → 2013-09-18 to the DOJ window); access "would
    normally have permitted Firoozi to remotely operate and manipulate the
    Bowman Dam's sluice gate" (confirms sluice-gate command access); "the
    sluice gate had been manually disconnected for maintenance at the time
    of his intrusion" (confirms manual disconnection); no operational
    impact; ~$30k remediation. ATTRIBUTION: IRGC named via two IRGC-
    sponsored companies (ITSecTeam/Mersad) + 7 individuals — named-unit
    (service_id ir/irgc; actor_id null per corpus pattern). Added the
    missing attribution_level: named-unit + an attribution note for parity
    with the sibling. DOCTRINE: DOWNGRADED the civilian-cii-coercion link
    `attested` → `strongly_inferred` (over-attestation) — the indictment
    documents the sluice-gate access factually and states NO asymmetric-
    warfare / CII-coercion strategic goal; AG Lynch's "designed
    specifically to harm America and its people" is general harm, not the
    goal the doctrine encodes (same boundary applied to the sibling Ababil
    link). attesting_source_id retained as the supporting source +
    inference_basis added. forward-defense link unchanged (strongly_inferred,
    no attesting source — correct). FLAG (not in-scope, deferred-norm,
    informational-only per validate.ts): target orgs/bowman-avenue-dam has
    no targets-registry record.
