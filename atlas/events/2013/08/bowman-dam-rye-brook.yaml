id: 2013-08/bowman-dam-rye-brook
name: Bowman Avenue Dam SCADA intrusion — Rye Brook, NY
start_date: 2013-08-28
disclosure_date: 2015-12-20  # WSJ reporting; formal DOJ unsealing 2016-03-24
end_date: 2013-09-15
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day
outcome_summary: |
  SCADA-facing system enumeration and reconnaissance of sluice-
  gate controls on a small flood-control dam in Rye Brook, NY.
  No operational impact (sluice gate was offline for
  maintenance). Demonstrated US OT vulnerability and IRGC
  intent against US critical infrastructure.
false_flag_risk: none
operators_named:
  - firoozi-hamid  # ITSecTeam / IRGC, DOJ Mar 2016 indictment
summary: |
  Indicted operator: Hamid Firoozi (IRGC-affiliated, ITSecTeam).
  Co-charged with the Ababil DDoS defendants in the March 24,
  2016 DOJ indictment. The first publicly-disclosed IRGC
  intrusion into US OT systems; established the pattern of
  demonstrative reconnaissance against US CII.
