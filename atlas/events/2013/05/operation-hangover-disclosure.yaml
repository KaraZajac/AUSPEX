id: 2013-05/operation-hangover-disclosure
name: Norman Shark discloses "Operation Hangover" — first canonical Indian-aligned APT attribution
start_date: 2010-01-01
disclosure_date: 2013-05-20
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Norwegian security firm Norman Shark, in coordination with
  the Shadowserver Foundation and others, published a report
  attributing a multi-year cyber-espionage campaign to actors
  in India. Targets included Pakistani military and government,
  Telenor (Norwegian telecom; the trigger investigation),
  Chinese targets, and South Asian regional governments. The
  report is the antecedent of the Patchwork / Dropping Elephant
  cluster naming in subsequent vendor work.
false_flag_risk: none
summary: |
  The foundational public attribution of an Indian-aligned APT.
  Norman Shark's report was unusually candid for 2013 in naming
  India as the assessed sponsor and tying operations to a
  contractor-style footprint. Subsequent vendor work (Kaspersky's
  Dropping Elephant 2016, Cymmetria's Patchwork 2016, Forcepoint's
  Monsoon 2016) refined and renamed the cluster but did not
  displace the Hangover attribution.
attributions:
  - actor_id: in/ntro/patchwork
    attributing_org: Norman Shark / Shadowserver Foundation
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2013-05-20
    attribution_source_id: normanshark/2013-05_operation-hangover
    notes: |
      Norman Shark's report attributed the operation to "Indian
      hackers" without naming a government service. Subsequent
      vendor reporting treats the cluster as state-aligned
      without resolving the precise sponsor.
