    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The WaPo article names MUSCULAR as a joint NSA-GCHQ operation
      ("MUSCULAR, operated jointly with the agency's British
      counterpart, GCHQ"; "NSA and GCHQ are copying entire data
      flows across fiber-optic cables ...") — i.e. it documents the
      UKUSA / Five-Eyes partnership in operational substance (joint
      2nd-party collection at scale, with GCHQ supplying the cable
      access leg). Graded strongly_inferred rather than attested
      only because WaPo documents the joint operation without using
      the "Five Eyes"/UKUSA label or articulating the partnership at
      the framework / strategic-purpose level. (Sibling GCHQ Snowden
      disclosures TEMPORA / BULLRUN / KARMA POLICE carry attested
      Five-Eyes links; this MUSCULAR link is kept conservative and
      is NOT upgraded per the no-upgrade rule.)
    attesting_source_id: wapo/2013-10-30_muscular-google-yahoo
