      signals:
        - "WaPo documents the MUSCULAR Google/Yahoo inter-datacenter cable tap and names it a joint NSA-GCHQ operation ('operated jointly with the agency's British counterpart, GCHQ')"
        - "WaPo: 'NSA and GCHQ are copying entire data flows across fiber-optic cables that carry information between the data centers' — joint 2nd-party (UKUSA) collection"
      ruled_out: "NSA-unilateral framing — WaPo explicitly names GCHQ as joint operator, so a single-agency reading does not survive"
