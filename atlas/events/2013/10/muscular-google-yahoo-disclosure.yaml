id: 2013-10/muscular-google-yahoo-disclosure
name: MUSCULAR / INCENSER — Snowden disclosure of GCHQ-NSA Google/Yahoo cable-tap programme
start_date: 2009-01-01  # programme operational at least from 2009 per published slides
disclosure_date: 2013-10-30
end_date: null  # programme not formally retired in any disclosed document
incident_type:
  - bulk-collection
initial_vector: signals-intelligence-partnership
outcome_summary: |
  Washington Post publication (Gellman / Soltani, 30 October 2013)
  of the Snowden-archive MUSCULAR programme — joint NSA / GCHQ
  collection inside the private inter-data-center fibre links of
  Google and Yahoo, abroad and outside the FISA / RIPA regimes.
  Collected up to 181 million records per month from the two
  providers in early 2013 per the published documents. The
  programme operated upstream of the providers' SSL termination,
  taking unencrypted internal traffic between data centres.
false_flag_risk: low
summary: |
  MUSCULAR is the canonical Snowden disclosure of UKUSA joint
  collection at the private cloud-provider backbone, distinct
  from the PRISM front-door legal-process collection. The
  programme is a GCHQ-NSA joint by design — collection access
  was on GCHQ-controlled cables abroad, but processing and tasking
  was joint per the published slide decks. The accompanying
  "Google Cloud Exploitation" slide — with the smiley-face
  annotation where SSL is added and removed at the public-internet
  boundary — became one of the iconic Snowden images.

  Related programmes named in subsequent disclosures: INCENSER
  (DS-200B, the specific cable-tap), TURMOIL (the upstream
  packet-collection system), TURBULENCE (the analytical
  framework), and the Special Source Operations relationships
  with named partner carriers. AUSPEX records MUSCULAR as the
  disclosure event; the operational programme appears in the
  Snowden archive as continuously active.

  Doctrinally this is a UK five-eyes Pillar event: GCHQ's
  geographic position vis-a-vis trans-Atlantic and EU-Asia
  fibre topology is the load-bearing UK contribution to the
  joint Five Eyes collection capability.
