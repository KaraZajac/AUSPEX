qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial   # WaPo primary URL un-snapshottable (curl 000 / WebFetch 403; archive.org blocked) — all claims corroborated via authoritative mirrors
  notes: |
    Canonical Snowden disclosure of MUSCULAR (DS-200B) — joint NSA/GCHQ tap
    of Google/Yahoo private inter-data-center fibre, WaPo Gellman/Soltani
    30 Oct 2013. FACTS verified against authoritative mirrors (CBS News
    summary of the WaPo piece; Wikipedia MUSCULAR / "SSL added and removed
    here"; electrospaces INCENSER/WINDSTOP analysis) — washingtonpost.com is
    bot-blocked (curl HTTP 000, WebFetch HTTP 403; archive.org blocked per
    policy), so NO raw_snapshot on the WaPo source → level: partial. Confirmed
    verbatim/in-substance: 181M records in the 30 days to a secret accounting
    dated 9 Jan 2013; collection inside Google/Yahoo inter-data-center fibre
    upstream of SSL termination (Google Front End servers strip/add SSL — the
    "SSL added and removed here ;-)" Google Cloud Exploitation slide); no
    FISA/RIPA warrant; MUSCULAR ~2x PRISM selectors; access via DS-200B (an
    unnamed 2nd-party telecom abroad); INCENSER (DS-300, 14.1B records, GCHQ
    Cable&Wireless/GERONTIC access at Bude) is the related WINDSTOP cable-tap.
    CORRECTIONS made: (1) doctrine_links (uk/five-eyes) reasoning was FACTUALLY
    WRONG — it claimed "the captured WaPo excerpt attributes it solely to NSA
    and does not name GCHQ". The WaPo article DOES name GCHQ jointly:
    "MUSCULAR, operated jointly with the agency's British counterpart, GCHQ"
    and "NSA and GCHQ are copying entire data flows across fiber-optic cables".
    Rewrote reasoning + inference_basis (signals/ruled_out) to reflect that
    WaPo documents the joint NSA-GCHQ (UKUSA) operation; KEPT confidence
    strongly_inferred (NOT upgraded per the no-upgrade rule — WaPo names the
    joint op but not the "Five Eyes"/UKUSA framework or its strategic purpose;
    sibling TEMPORA/BULLRUN/KARMA-POLICE links are attested, this stays
    conservative). (2) Strengthened the GCHQ attribution note: GCHQ is named
    in the WaPo text itself (not only "the archive"); cable access via DS-200B
    2nd-party bearer. ATTRIBUTION: MULTI-ACTOR verified — BOTH uk/gchq/cne-actor
    AND us/nsa/equation-group are present in attributions[] (the multi-actor
    requirement is satisfied); WaPo names BOTH agencies, GCHQ is the primary
    operator/access-leg, NSA co-tasker via SSO. attribution_level deliberately
    LEFT ABSENT on both entries (conservative): all 5 sibling GCHQ Snowden
    events (TEMPORA/BULLRUN/HACIENDA/Cable&Wireless/KARMA POLICE) also set no
    attribution_level for uk/gchq/cne-actor, and that actor's own 2026-06-25
    audit explicitly cautions against named-unit over-specification on the
    generic GCHQ bucket — WaPo names the ORGS (NSA, GCHQ) not a specific
    operational sub-unit. attributing_org_confidence kept moderate (no upgrade;
    matches the moderate sibling disclosures). ACTORS: both resolve and are
    NOT stale — both freshly audited 2026-06-25 (KEEP verdicts);
    uk/cne-actor.yaml even lists THIS event among its 6 referencing events. No
    FK changes. disclosure_date 2013-10-30 correct (= WaPo publication date);
    source published_on 2013-10-30 correct. intercept/snowden-archive raw
    snapshot present + SHA-256 matches on re-hash (104a5607...).
