  notes: |
    Audited vs the primary Der Spiegel cover story "Cover Story: How NSA
    Spied on Merkel Cell Phone from Berlin Embassy" (23 Oct 2013), raw
    snapshot spiegel__2013-10-23_merkel-phone-tap.html sha256
    cf880713…78242a9b, 695,199 bytes. DIRECTIONALITY CONFIRMED (not
    inverted): ATTACKER = US (SCS / joint NSA+CIA), VICTIM = Germany
    (Chancellor Angela Merkel) — US OFFENSIVE close-access SIGINT against
    an allied head of state.

    [a] FACTS — core claims source-carried by the snapshot:
      • 2002 "Handy" tasking record: "The order was transferred to the
        'National Sigint Requirements List,' the list of national
        intelligence targets, in 2002." → start_date 2002-01-01 upheld.
      • SCS = joint NSA/CIA: "a unit known as the 'Special Collection
        Service' (SCS) is operational in Berlin ... an elite corps run in
        concert by the US intelligence agencies NSA and CIA."
      • Embassy-rooftop close-access: "From the roof of the embassy, a
        special unit of the CIA and NSA can apparently monitor a large
        part of cellphone communication in the government quarter. And
        there is evidence that agents based at Pariser Platz recently
        targeted the cellphone that Merkel [uses most]"; equipment sits
        behind "dielectric" radio-transparent "screens" on the roof →
        initial_vector physical upheld.
      • Diplomatic fallout: Merkel at the EU summit in Brussels — "Spying
        between friends, that's just not done" / "Now trust has to be
        rebuilt"; White House press secretary Jay Carney conveyed
        assurances to Merkel's spokesman Steffen Seibert; Der Spiegel
        reports Washington signalled it "would deny" past collection.
        outcome_summary rewritten to these carried facts. CORRECTION:
        dropped the verbatim "is not monitoring and will not monitor"
        quote — that is the White House (Carney) statement of 23 Oct
        2013, widely reported but NOT verbatim in the cited article;
        replaced with the source-carried substance.
      • STATEROOM: the literal codeword is ABSENT from the cited a-930205
        snapshot (grep -ci stateroom = 0). Kept in name + summary but
        reframed as the SCS embassy-rooftop-collection cover program per
        the wider Snowden/SCS documents, independently corroborated via
        en.wikipedia.org/wiki/Stateroom_(surveillance_program) ("STATEROOM
        operations are conducted by the Special Collection Service (SCS),
        a unit ... jointly operated by the CIA and NSA"). The substance
        (SCS embassy-rooftop program) IS carried by the primary; only the
        cover-name is external.
      incident_type CORRECTED intrusion → [espionage, surveillance]
      (targeted SIGINT; source uses "surveillance target" / "matrix of
      global surveillance") per task (espionage / SIGINT); no network
      intrusion occurred.

    [b] ATTRIBUTION — Der Spiegel presents documentary Snowden-archive
      evidence naming the SCS as the operating unit; attributing_org
      "Snowden documents / Der Spiegel", confidence high and
      auspex_assessment concur-with-caveat upheld (US never officially
      confirmed Merkel-specific collection).

    [c] DATES — start_date 2002-01-01 (NSR tasking, carried);
      disclosure_date 2013-10-23 (Der Spiegel publication = snapshot's
      published_on); end_date 2013-10-23 (presumed curtailment on
      exposure — inference, noted in-line; US pledge was forward-looking).
      Source published_on 2013-10-23 confirmed = article's real pub date.

    [d] DOCTRINE_LINKS — us/title-10-title-50 kept PLAUSIBLE (NOT
      attested): no cited source states a Title-50 / strategic-leader
      SIGINT purpose in doctrine terms; the doctrine is the statutory
      backstop. attesting_source_id remains null (correct). Added
      inference_basis.alternatives (both readings survive).
      attacker-rationale (US actor ↔ US doctrine) — no perspective tag /
