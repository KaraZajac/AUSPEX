id: 2013-10/merkel-cellphone-targeting
name: Merkel cellphone targeting (SCS / STATEROOM Berlin)
start_date: 2002-01-01  # Merkel's cellphone entered the National Sigint Requirements List in 2002 (Der Spiegel)
disclosure_date: 2013-10-23  # Der Spiegel disclosure
end_date: 2013-10-23  # presumed curtailed on exposure; US pledge was forward-looking, past collection never confirmed
incident_type:
  - espionage      # targeted foreign-intelligence SIGINT against an allied head of state
  - surveillance   # sustained monitoring of a specific individual's communications ("surveillance target" — Der Spiegel)
initial_vector: physical  # close-access SIGINT from the US embassy Berlin rooftop
outcome_summary: |
  Long-running SIGINT collection of Chancellor Angela Merkel's mobile
  communications from the US embassy in Berlin, exposed by Der Spiegel
  in October 2013. The disclosure triggered a major US-German
  diplomatic crisis: Merkel declared at an EU summit in Brussels that
  "spying between friends ... is just not done" and that "now trust has
  to be rebuilt", and White House press secretary Jay Carney conveyed
  assurances to Merkel's spokesman Steffen Seibert. The US signalled it
  would not confirm past Merkel-specific collection; its public
  assurance not to monitor the Chancellor's communications was
  forward-looking.
false_flag_risk: none
summary: |
  US Special Collection Service (SCS) close-access SIGINT operation
  against German Chancellor Angela Merkel's mobile phone, run from the
  US embassy on Pariser Platz in Berlin. Per NSA documents from the
  Edward Snowden archive published by Der Spiegel (23 Oct 2013),
  Merkel's cellphone was entered on the "National Sigint Requirements
  List" in 2002 and collection continued until the 2013 disclosure. Der
  Spiegel documents the SCS as an "elite corps run in concert by the US
  intelligence agencies NSA and CIA" that operates covert interception
  equipment behind radio-transparent ("dielectric") screens on the
  embassy roof, monitoring cellphone traffic across the government
  quarter. The SCS embassy-rooftop collection program is cover-named
  STATEROOM in the wider Snowden/SCS documents. The US government never
  officially confirmed the Merkel-specific collection; its public
  assurance was pointedly forward-looking.
