id: 2013-10/merkel-cellphone-targeting
name: Merkel cellphone targeting (SCS / STATEROOM Berlin)
start_date: 2002-01-01  # Snowden documents place onset c. 2002
disclosure_date: 2013-10-23  # Der Spiegel disclosure
end_date: 2013-10-23  # operationally curtailed after exposure; Obama statement
incident_type:
  - intrusion  # SIGINT collection
initial_vector: physical  # close-access SIGINT from embassy rooftop (STATEROOM)
outcome_summary: |
  Long-running collection of Chancellor Angela Merkel's mobile
  communications from the US embassy Berlin rooftop facility. Caused
  a major US-German diplomatic incident October 2013; the Obama
  administration issued a statement that the US "is not monitoring
  and will not monitor" Merkel's communications going forward —
  declining to address past collection.
false_flag_risk: none
summary: |
  Canonical Special Collection Service (SCS) operation: close-access
  SIGINT from a diplomatic-cover facility ("STATEROOM" — the cover
  designator for SCS embassy collection sites). Joint CIA / NSA
  program. Per Snowden documents released by Der Spiegel, the
  collection ran approximately 2002 through 2013. Never officially
  confirmed by the US government; Obama's statement was forward-looking
  and pointedly silent on past activity.
