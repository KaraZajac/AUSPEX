    reasoning: |
      NSA SIGINT collection against a foreign state-owned strategic
      enterprise (Petrobras) and foreign political leadership sits
      under Title 50 SIGINT authority — the statutory backstop for US
      intelligence collection. The Globo-shown documents frame the
      collection as serving economic, political and diplomatic
      intelligence ends (the NSA/Clapper statement cites "insight into
      other countries' economic policy or behavior" and "early warning
      of international financial crises"). Confidence is plausible, not
      higher: Title-10/50 is a legal-authority backstop that every
      US-actor collection op fits by construction, and more than one
      strategic reading of the Petrobras tasking survives.
    attesting_source_id: null
