id: 2013-09/petrobras-brazil-targeting
name: Petrobras and Brazilian executive targeting (NSA)
start_date: 2010-01-01  # operational date estimated
disclosure_date: 2013-09-08  # Globo Fantastico broadcast
end_date: 2013-12-31
incident_type:
  - intrusion
initial_vector: unknown  # reported MITM on private corporate networks
outcome_summary: |
  Economic and political collection on Petrobras (Brazilian state oil
  company including pre-salt reserve data), the Brazilian presidency
  under Dilma Rousseff, and the Mexican president's office. Caused
  Rousseff to cancel her US state visit in September 2013 — the
  first state-visit cancellation over cyber issues in the modern era.
false_flag_risk: none
summary: |
  Snowden-disclosed NSA collection against Brazilian state-owned
  strategic enterprises and political leadership. Globo TV's
  Fantastico program (Sept 8, 2013) and the Washington Post (same
  date) published the disclosures. Vector reported as man-in-the-
  middle on private corporate networks plus standard SIGINT.
  Operational basis is Title 50 SIGINT; doctrine confidence dossier-
  labeled `plausible`.
attributions:
  - actor_id: us/nsa/equation-group  # placeholder; NSA generic
    attributing_org: Snowden documents / Globo Fantastico
    attributing_org_confidence: high
    auspex_assessment: concur-with-caveat
    attribution_date: 2013-09-08
    attribution_source_id: globo/2013-09-08_fantastico-nsa-petrobras
    notes: |
      Attribution is to **NSA** (generic, not a specific TAO unit).
      Anchored to us/nsa/equation-group as the closest existing
      US actor entry; AUSPEX flags this as a placeholder mapping.
doctrine_links:
