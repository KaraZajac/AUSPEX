false_flag_risk: none
summary: |
  Snowden-disclosed NSA collection against Brazil's state-controlled
  oil major Petrobras and Brazilian political leadership. TV Globo's
  Fantástico program (broadcast 8 September 2013, reported with Glenn
  Greenwald) presented a top-secret May-2012 NSA agent-training
  presentation that named Petrobras — alongside Google, the SWIFT
  interbank network and the French foreign ministry — under the
  heading "MANY TARGETS USE PRIVATE NETWORKS," and demonstrated
  interception of protected TLS/SSL traffic via a "Man in the Middle"
  attack (using GCHQ's Flying Pig / Hush Puppy programs), with data
  rerouted through NSA infrastructure. The NSA said the disclosures
  contradicted its denials of economic espionage. The broadcast came
  one week after Fantástico's 1 September report that the NSA had
  targeted the communications of the Brazilian and Mexican presidents.
  Attribution is to the NSA (US SIGINT) and its Five Eyes partner GCHQ
  via the primary leaked documents; no discrete NSA sub-unit is named.
outcome_summary: |
  Economic and political SIGINT collection targeting Petrobras's
  internal network — of strategic interest for its pre-salt deep-sea
  oil reserves and the upcoming Libra-field auction — and the
  Brazilian presidency under Dilma Rousseff. The Globo source stresses
  it is not established whether the NSA actually accessed Petrobras's
  reserve data; only that Petrobras was a confirmed target. The
  revelations drove a major Brazil–US diplomatic rupture: Rousseff
  demanded explanations at the G20 and, on 17 September 2013, postponed
  her 23 October state visit to Washington (per NPR, "postponed, not
  cancelled").
