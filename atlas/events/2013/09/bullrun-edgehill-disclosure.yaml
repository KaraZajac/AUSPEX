id: 2013-09/bullrun-edgehill-disclosure
name: BULLRUN / EDGEHILL — Snowden disclosure of NSA-GCHQ crypto-subversion programme
start_date: 2000-01-01  # NYT: "Beginning in 2000 ... the N.S.A. invested billions of dollars in a clandestine campaign"; Guardian: "10-year NSA program ... breakthrough in 2010"
disclosure_date: 2013-09-05
end_date: null
incident_type:
  - espionage      # SIGINT/eavesdropping purpose (NYT: NSA acted "to preserve its ability to eavesdrop")
  - supply-chain   # backdoors/trapdoors inserted into commercial encryption products (Guardian)
  # bulk-collection DROPPED 2026-07-11 audit: BULLRUN/EDGEHILL is the cryptanalytic
  # ENABLER that makes collected traffic decryptable; the bulk-collection programmes
  # are its TEMPORA / MUSCULAR siblings (per this event's own summary).
initial_vector: unknown
outcome_summary: |
  Joint Guardian / New York Times / ProPublica publication
  (5 September 2013) of Snowden documents identifying BULLRUN
  (NSA codename) and EDGEHILL (GCHQ codename) — sister programmes
  to deliberately weaken commercial encryption standards, insert
  exploitable flaws into vendor products, influence the design
  of widely-used cryptographic primitives, and maintain covert
  key-access into widely-deployed cryptographic infrastructure.
  Identified targets included SSL/TLS, VPN protocols, voice
  encryption on 4G mobile, and unnamed major-vendor commercial
  encryption products.
false_flag_risk: none
summary: |
  AUSPEX models the September 2013 disclosure as the event; the
  underlying programmes are continuous capability investments
  rather than discrete incidents. BULLRUN / EDGEHILL is the
  joint NSA / GCHQ analogue of the TEMPORA / MUSCULAR collection
  programmes on the upstream side: where TEMPORA collects
  encrypted traffic, BULLRUN / EDGEHILL ensures that encryption
  is, in practice, decryptable by the Five Eyes.

  The disclosure is the canonical primary-source reference for
  the long-suspected NSA-GCHQ posture toward commercial crypto
  standards. Per the NYT, the NSA spent "more than $250 million a
  year on its Sigint Enabling Project," which "actively engages
  the U.S. and foreign IT industries to covertly influence and/or
  overtly leverage their commercial products' designs" to make
  them exploitable, and cryptographers "have long suspected that
  the agency planted vulnerabilities in a standard adopted in 2006
  by the National Institute of Standards and Technology" (the
  suspicion later crystallised as the Dual_EC_DRBG controversy).
  EDGEHILL is GCHQ's named contribution: the Guardian reports its
  "initial aim was to decode the encrypted traffic certified by
  three major (unnamed) internet companies and 30 types of Virtual
  Private Network (VPN)", with a 2015 goal of "15 major internet
  companies, and 300 VPNs".

  Doctrinally this is a load-bearing event for the Five Eyes
  cryptanalysis pillar: BULLRUN / EDGEHILL is the operational
  expression of the UKUSA partnership's pre-emption of widespread
  end-to-end encryption deployment in the 2000s-early-2010s.
