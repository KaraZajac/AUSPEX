      codename specifically.
doctrine_links:
  - doctrine_id: uk/five-eyes
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      The Guardian disclosure documents TEMPORA as the UK's bulk-SIGINT
      contribution to the Five Eyes / UKUSA partnership in operational
      substance, not merely as UK-domestic collection: GCHQ processed the
      intercepted cable traffic and shared it directly with the NSA
      ("sharing [it] with its American partner, the National Security
      Agency"), "launched Tempora as a mainstream programme, shared with
      the Americans", and by 2010 could boast the "biggest internet
      access" of any Five Eyes member. That states the doctrine's terminal
      purpose — pooling second-party SIGINT across the alliance — in
      substance, so the link is attested. (Perspective is attacker-
      rationale/default: this is the UK's own SIGINT-cooperation doctrine
      applied to the UK's own collection programme, not a defender/victim
      response.) Consistent with sibling GCHQ Snowden disclosures
      BULLRUN/EDGEHILL and KARMA POLICE, which also carry attested
      uk/five-eyes links.
    attesting_source_id: guardian/2013-06-21_gchq-tempora
    inference_basis:
      source_id: guardian/2013-06-21_gchq-tempora
      source_quote: "it was able to boast it had the \"biggest internet access\" of any member of the Five Eyes electronic eavesdropping alliance, comprising the US, UK, Canada, Australia and New Zealand"
      signals:
        - "Guardian: GCHQ 'has secretly gained access to the network of cables ... and has started to process vast streams of sensitive personal information which it is sharing with its American partner, the National Security Agency (NSA)'"
        - "Guardian: 'In the autumn of 2011, it launched Tempora as a mainstream programme, shared with the Americans'"
        - "Guardian: 'a total of 850,000 NSA employees and US private contractors with top secret clearance had access to GCHQ databases'"
      ruled_out: "UK-unilateral / non-UKUSA collection — the source explicitly frames TEMPORA as shared with the NSA and situates GCHQ's cable access within the Five Eyes alliance, so a non-partnership reading does not survive"
    contested: false
    analyst: claude
