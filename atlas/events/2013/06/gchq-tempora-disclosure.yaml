  notes: |
    Canonical Snowden disclosure of GCHQ's TEMPORA bulk fibre-optic
    cable-tap programme (Guardian, MacAskill/Borger/Hopkins/Davies/Ball,
    21 Jun 2013). UK-as-ATTACKER SIGINT event: actor = uk/gchq/cne-actor
    (the collecting party); target = the intercepted telecom sector /
    global communications. Directionality NOT inverted — GCHQ collects,
    the world's cable traffic is collected. All four cited sources now
    snapshotted + hashed.

    [a] FACTS — verified verbatim against the guardian raw snapshot
    (sha256 ef5ad123…). CORRECTIONS to outcome_summary:
      • "Buffered ~21 petabytes/day" was WRONG — 21 PB/day is the tapped
        cables' THEORETICAL throughput CAPACITY, not the amount buffered:
        raw = "each of the cables carries data at a rate of 10 gigabits
        per second, so the tapped cables had the capacity, in theory, to
        deliver more than 21 petabytes a day". Reworded to theoretical
        throughput.
      • Retention was CONFLATED — event said "content and metadata for up
        to 30 days"; raw = buffers "store it – for three days in the case
        of content and 30 days for metadata". Split correctly (content 3
        days / metadata 30 days).
      • Cable/handling figures corrected to raw: "tapped more than 200
        fibre-optic cables and was able to process data from at least 46
        of them at a time" (by "last year" = 2012).
      • CARRIERS de-anachronised + re-sourced: the June-2013 Guardian did
        NOT name carriers — it says the taps were done "under secret
        agreements with commercial companies, described in one document as
        'intercept partners'" whose names "GCHQ went to great lengths to
        keep … secret". The specific carrier (Cable & Wireless / Vodafone
        Cable) was disclosed only in Nov-2014; re-pointed that claim to
        channel4/2014-11-20_spy-cable-gchq (raw sha256 0a431815…, names
        "Cable and Wireless" x7, Vodafone x11) and cross-referenced the
        dedicated 2014-11 event. DROPPED the previously-asserted "BT" —
        NOT carried by any cited/snapshotted source here (0 hits in the
        Channel 4 raw); removed rather than left as an uncited/anachronistic
        claim. MTI + GTE kept (raw: "its two principal components:
        Mastering the Internet and Global Telecoms Exploitation").

    [b] ATTRIBUTION — uk/gchq/cne-actor (resolves to atlas/actors/uk/
    cne-actor.yaml; active; KEEP-audited 2026-06-25; lists THIS event
    among its referencing events). Guardian names GCHQ-the-agency directly
    ("Britain's spy agency GCHQ has secretly gained access …"; "That
    operation, codenamed Tempora"). attributing_org_confidence high
    (unambiguous documentary attribution) KEPT. Simplified attributing_org
    to "The Guardian (Snowden archive)" — dropped the uncited "Der Spiegel
    + Channel 4" tail (the only in-repo Spiegel source is the Belgacom/BICS
    story, which carries none of these facts).

    [c] DATES — disclosure_date 2013-06-21 confirmed (raw byline "Fri 21
    Jun 2013"). start_date 2008-01-01 kept as programme genesis and
    re-commented precisely: raw supports the cable-tap project "first
    trialled" 2008 ("By 2010, two years after the project was first
    trialled") and "built up over five years", with TEMPORA launched as a
    mainstream programme in autumn 2011 — so 2008 is genesis, not the
    TEMPORA-codename date. Source published_on dates verified: guardian
    2013-06-21 (byline); channel4 2014-11-20; ipt-uk 2015-02-06 (IPT page
    "6 February 2015").

    [d] DOCTRINE — uk/five-eyes (FK resolves to atlas/doctrines/uk/
    five-eyes-signals-cooperation.yaml, id uk/five-eyes; treaty kind).
    KEPT confidence: attested (earned, matches sibling TEMPORA-class
    disclosures) but ADDED the required inference_basis with a VERBATIM
    source_quote ("biggest internet access of any member of the Five Eyes
    …") + signals + ruled_out; the Guardian states the doctrine's terminal
    purpose (second-party SIGINT pooling) in substance — data "sharing …
    with its American partner, the NSA", "launched Tempora as a mainstream
    programme, shared with the Americans", 850,000 NSA personnel with
    access to GCHQ databases. REMOVED the unsourced phrase "federated
    query" from the reasoning (not in the Guardian raw). Perspective =
    attacker-rationale/default (UK's own SIGINT doctrine on the UK's own
    programme) — no perspective tag, correct.

    [e] ATTRIBUTION_LEVEL — ADDED named-actor (GCHQ named as the operating
    agency). NB: the 5 sibling GCHQ Snowden events deliberately OMIT
    attribution_level on this generic bucket to avoid named-unit
    over-specification; this audit's protocol instructs adding it, and
    named-actor (a named agency, NOT a named-unit like JTRIG) is exactly
    the level the Guardian supports, so it does not over-specify. Flag for
    Kara: consider harmonising the siblings to named-actor for consistency.

    [f] ACTOR_ID — resolves (see [b]). This is documentary/disclosure of a
    UK offensive collection programme, so actor_id is the GCHQ actor (not
    null); no law-enforcement/meta counter-action here.

    SNAPSHOTS (PRESERVE tier on all): guardian ef5ad123… (already present,
    re-hashed OK), channel4 0a431815… (already present, re-hashed OK),
    intercept/snowden-archive 104a5607… (already present, re-hashed OK;
    generic SIDtoday index — provenance only, names no specific op).
    ipt-uk/2015-02-06_liberty-v-gchq-ruling: was url:null with NO snapshot —
    located the genuine IPT judgment ("Liberty/Privacy No 2", IPT site,
    HTTP 200), set url + captured raw (sha256 fca480ee…). Verbatim holding
    supports the summary: the Tribunal "declared that, prior to the
    disclosures … the regime governing the soliciting, receiving, storing
    and transmitting by UK authorities of private communications …
    obtained by US authorities pursuant to Prism and/or … Upstream,
    contravened Articles 8 or 10 of the Convention, but that the regime
    now complied with the Convention."

    level: full — every load-bearing incident-fact (TEMPORA = GCHQ bulk
