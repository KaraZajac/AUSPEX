id: 2013-06/gchq-tempora-disclosure
name: GCHQ TEMPORA bulk cable-tap programme — Snowden disclosure
start_date: 2008-01-01  # earliest documented TEMPORA testing
disclosure_date: 2013-06-21
end_date: null
incident_type:
  - bulk-collection
initial_vector: unknown
outcome_summary: |
  Public disclosure (via The Guardian) of GCHQ's TEMPORA programme
  — sustained bulk interception of fibre-optic cables transiting
  the UK, in partnership with carriers (Cable & Wireless / Vodafone
  Cable / BT, per subsequent Spiegel and Channel 4 reporting).
  Buffered ~21 petabytes/day of internet content and metadata for
  up to 30 days in 2012. Companion programmes named in the
  disclosures: MASTERING THE INTERNET (MTI) and GLOBAL TELECOMS
  EXPLOITATION (GTE).
false_flag_risk: none
summary: |
  TEMPORA is the principal public reference for UK bulk SIGINT
  collection and the practical operational expression of the
  Five Eyes UKUSA partnership from the UK side. AUSPEX models
  the *disclosure* as the event (the operation itself is a
  programme, not a discrete incident) on the same pattern as the
  Snowden disclosures event entry.

  The disclosure triggered: the Investigatory Powers Tribunal's
  February 2015 Liberty v GCHQ ruling (pre-disclosure regime
  unlawful, post-disclosure lawful), the 2016 Investigatory Powers
  Act overhaul of UK surveillance law, and a generational shift
  in European perception of UK SIGINT.
