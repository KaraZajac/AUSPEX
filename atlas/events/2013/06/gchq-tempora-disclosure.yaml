id: 2013-06/gchq-tempora-disclosure
name: GCHQ TEMPORA bulk cable-tap programme — Snowden disclosure
start_date: 2008-01-01  # cable-tap project first trialled 2008 (Guardian: "two years" before 2010); codenamed TEMPORA & launched mainstream autumn 2011
disclosure_date: 2013-06-21
end_date: null
incident_type:
  - surveillance
  - bulk-collection
initial_vector: unknown
outcome_summary: |
  Public disclosure (via The Guardian, from the Snowden archive) of
  GCHQ's TEMPORA programme — sustained bulk interception of the
  transatlantic fibre-optic cables landing on British shores, run
  "under secret agreements with commercial companies" GCHQ termed
  "intercept partners" whose identities it kept secret (the principal
  partner, Cable & Wireless / Vodafone Cable, was named only in later
  Nov-2014 Channel 4 / Süddeutsche Zeitung reporting — see event
  2014-11/cable-wireless-gchq-partnership). By 2012 ("last year" in the
  article) GCHQ had tapped more than 200 fibre-optic cables and could
  process data from at least 46 at a time; each cable ran at 10 Gbit/s,
  giving the tapped cables a theoretical throughput of "more than 21
  petabytes a day". TEMPORA's internet buffers stored content for three
  days and metadata for 30 days. The effort's two principal named
  components were MASTERING THE INTERNET (MTI) and GLOBAL TELECOMS
  EXPLOITATION (GTE).
false_flag_risk: none
summary: |
  TEMPORA is the principal public reference for UK bulk SIGINT
  collection and the practical operational expression of the
  Five Eyes UKUSA partnership from the UK side. AUSPEX models
  the *disclosure* as the event (the operation itself is a
  programme, not a discrete incident) on the same pattern as the
  Snowden disclosures event entry.

  The disclosure triggered: the Investigatory Powers Tribunal's
  February 2015 Liberty v GCHQ ruling (pre-disclosure regime
  unlawful, post-disclosure lawful), the 2016 Investigatory Powers
  Act overhaul of UK surveillance law, and a generational shift
  in European perception of UK SIGINT.
