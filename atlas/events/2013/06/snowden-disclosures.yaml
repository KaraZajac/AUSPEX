id: 2013-06/snowden-disclosures
name: Snowden disclosures of NSA / Five Eyes signals-intelligence programs
start_date: 2013-06-05
disclosure_date: 2013-06-05
end_date: 2014-12-31  # principal disclosure waves
incident_type:
  - data-theft
  - influence-operation
initial_vector: insider
outcome_summary: |
  Edward Snowden, a contractor (Booz Allen Hamilton) seconded to
  NSA Hawaii, exfiltrated an estimated 1.5 million classified
  documents covering NSA collection programs (PRISM, XKeyscore,
  Bullrun, TURMOIL/TURBINE, MUSCULAR, MYSTIC, EGOTISTICALGIRAFFE),
  partner SIGINT operations (GCHQ TEMPORA, Five Eyes UKUSA
  arrangements), Equation Group / Tailored Access Operations
  capabilities, and the catalog of TAO implants and toolkits.
  Coordinated publication began 2013-06-05 in The Guardian and
  The Washington Post and continued in waves through 2014. The
  disclosures triggered the Section 215 Patriot Act reform
  (USA Freedom Act 2015), the formal transparency reports from
  the IC, and a generational shift in international perception
  of US SIGINT.
false_flag_risk: none
summary: |
  Snowden is the largest single declassification event in US
  intelligence history and the primary public source for what
  AUSPEX models as the US side of the doctrine atlas:
  TAO/Equation Group capability disclosure, the operational
  scope of Five Eyes, and the Title 50 collection architecture
  that the Defend Forward (2018) and Persistent Engagement
  doctrines presupposed. AUSPEX tags Snowden as a *documentary*
  event — the cyber operation is the exfiltration; the doctrinal
  significance is the years of subsequent operational reporting
  that the documents enabled (Belgacom, Stuxnet detail,
  Equation Group, ANT catalog, MUSCULAR Google/Yahoo
  intercepts).
