id: 2013-06/snowden-disclosures
name: Snowden disclosures of NSA / Five Eyes signals-intelligence programs
start_date: 2013-06-05
disclosure_date: 2013-06-05
end_date: 2014-12-31  # principal disclosure waves
incident_type:
  - documentary  # leak of US SIGINT capability; not an offensive US operation
  - leak
initial_vector: insider
outcome_summary: |
  Edward Snowden, a contractor (Booz Allen Hamilton) seconded to
  NSA Hawaii, exfiltrated a large trove of classified documents
  covering NSA collection programs (PRISM, XKeyscore, Bullrun,
  TURMOIL/TURBINE, MUSCULAR, MYSTIC, EGOTISTICALGIRAFFE) and
  partner SIGINT operations (GCHQ TEMPORA, Five Eyes UKUSA
  arrangements). US-government estimates of the document count ran
  as high as ~1.5-1.7 million, but the figure is a contested
  official estimate that Snowden and his journalists never
  confirmed. Coordinated publication began 2013-06-05 in The
  Guardian (the Verizon / FISA bulk-metadata order) and expanded
  2013-06-06 to The Guardian and The Washington Post (PRISM),
  continuing in waves through 2014. The disclosures triggered the
  Section 215 Patriot Act reform (USA Freedom Act 2015), the IC's
  formal transparency reports, and a generational shift in
  international perception of US SIGINT.
false_flag_risk: none
summary: |
  Snowden is the largest single declassification event in US
  intelligence history and the primary public source for what
  AUSPEX models as the US side of the doctrine atlas: NSA SIGINT
  capability disclosure, the operational scope of Five Eyes, and
  the Title 50 collection architecture that the Defend Forward
  (2018) and Persistent Engagement doctrines presupposed. AUSPEX
  tags Snowden as a *documentary* event — the cyber operation is
  the exfiltration; the doctrinal significance is the years of
  subsequent operational reporting that the documents enabled
  (Belgacom / Operation Socialist, the Stuxnet US/Israel
  confirmation, MUSCULAR Google/Yahoo intercepts, TEMPORA). The
  separately-sourced Equation Group cluster (Kaspersky, Feb 2015)
  and the TAO ANT catalog (Der Spiegel, Dec 2013 — disputed
  provenance, widely assessed as likely a second leaker) are NOT
  part of the Snowden trove and are modeled elsewhere.
attributions:
  - actor_id: null
    attributing_org: US Department of Justice
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2013-06-21
    attribution_source_id: doj/2013-06-21_snowden-charges
    notes: |
      Per the unsealed criminal complaint (filed in the Eastern
      District of Virginia, initially sealed; charges reported by
      The Washington Post 2013-06-21), Snowden was charged with
      three counts — theft of government property plus two counts
      under the 1917 Espionage Act: "unauthorized communication of
      national defense information" and "willful communication of
      classified communications intelligence information to an
      unauthorized person." He is not a state-aligned actor and is
      not modeled in the atlas; actor_id left null and the leaker
      is named in prose per the documentary/leak meta-event
      convention.
doctrine_links:
  - doctrine_id: us/title-10-title-50
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The disclosed documents are the principal open-source basis
      for understanding the Title 50 SIGINT collection architecture
      (FAA 702, EO 12333, executive authorities for foreign-
      intelligence SIGINT). Downgraded from attested to
      strongly_inferred (over-attestation fix): the snapshottable
      cited sources establish provenance and charging — the WaPo/DOJ
      report confirms Snowden "leaked a trove of documents about
      top-secret surveillance programs" — but state no goal-level
      description of the Title 50 architecture. That substance sits
      in the leaked corpus and in Greenwald's "No Place to Hide,"
      which is a book (url:null) and un-snapshottable.
    attesting_source_id: greenwald/2014_no-place-to-hide
    inference_basis:
      signals:
        - "PRISM / Section 702 FAA downstream collection disclosed 2013-06-06 (Guardian + WaPo) — a Title 50 NSA-SIGINT authority (the doctrine's own summary: Title 50 covers NSA SIGINT collection, not covert action)"
        - "WaPo/DOJ charge report: Snowden 'leaked a trove of documents about top-secret surveillance programs' — the trove is the foreign-intelligence SIGINT collection corpus"
        - "Greenwald, No Place to Hide (2014): long-form documentation of the FISA-702 / EO-12333 collection architecture (secondary, un-snapshottable book)"
      ruled_out: "A Title 10 military / USCYBERCOM offensive-cyber reading — rejected: the disclosed programs are SIGINT collection (PRISM/XKeyscore/upstream), i.e. the Title 50 NSA-SIGINT branch, not traditional military activities."
    contested: false
    analyst: claude
  - doctrine_id: us/five-eyes
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Disclosed documents specify the UKUSA collection-sharing
      arrangements (TEMPORA, MUSCULAR, Belgacom / Operation
      Socialist, joint targeting) at a level of detail no prior
      open source reached. Downgraded from attested to
      strongly_inferred (over-attestation fix): the cited attesting
      source (intercept/snowden-archive) is a generic SIDtoday
      archive index that names no specific Five Eyes operation (per
      its own 2026-06-25 audit note), so it corroborates corpus
      provenance rather than stating the partnership's goal at
      doctrine level.
    attesting_source_id: intercept/snowden-archive
    inference_basis:
      signals:
        - "TEMPORA — GCHQ fibre-optic-cable tap whose product is shared with NSA (Snowden corpus, Guardian 2013-06-21)"
        - "MUSCULAR — joint NSA/GCHQ interception of Google/Yahoo inter-datacenter links (Snowden corpus, WaPo 2013-10-30)"
        - "Belgacom / Operation Socialist — GCHQ-led, US-benefiting; named 'per Snowden documents' in the us/five-eyes doctrine summary"
      ruled_out: "Unilateral NSA-only collection — rejected: the disclosed programs are explicitly joint / partner-shared UKUSA operations, not US-solo collection."
    contested: false
    analyst: claude
