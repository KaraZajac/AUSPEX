  notes: |
    Full 6-point audit vs raw cited sources. Snapshots:
    washingtonpost__2013-06-21_snowden-espionage-charges.html (WaPo/DOJ
    via Wayback) sha256
    01e7934de08fed4726c86cea7c486a4e16ba15f47e41017cd79a6b1b8f960acf;
    intercept__snowden-archive.html re-verified sha256
    104a5607867dafab238c2f3160330590f326e8aa3d6121040c05b4d843536a17.
    greenwald/2014_no-place-to-hide is a book (url:null, un-snapshottable);
    it is the load-bearing narrative for the program/architecture
    substance, which caps this event at level: partial.

    [a] FACTS — STRIPPED two misattributions from outcome_summary +
    summary: "Equation Group / Tailored Access Operations capabilities"
    and "catalog of TAO implants and toolkits" were listed as Snowden
    disclosures. Equation Group is a Kaspersky (Feb 2015) cluster (modeled
    at 2016-08/shadow-brokers-leak as us/nsa/equation-group "per Kaspersky
    2015"); the TAO ANT catalog is Der Spiegel (Dec 2013) with disputed
    provenance (widely assessed as a likely second leaker, not the Snowden
    trove). Now annotated as separately-sourced / modeled elsewhere.
    HEDGED the "estimated 1.5 million documents" figure: no cited source
    carries it (WaPo snapshot: 0 hits for "1.5 million"); it is a contested
    US-government estimate (Ledgett / DIA / HPSCI ran ~1.5-1.7M) that
    Snowden and his journalists never confirmed — reworded accordingly.
    Retained programs (PRISM/XKeyscore/Bullrun/TURMOIL-TURBINE/MUSCULAR/
    MYSTIC/EGOTISTICALGIRAFFE/TEMPORA) are genuine Snowden disclosures;
    PRISM is corroborated in the WaPo snapshot (3 hits; the images are
    "courtesy of Laura Poitras and Glenn Greenwald"), the remainder rest
    on Greenwald (book) / general reporting, not snapshotted → partial.

    [b] ATTRIBUTION — actor_id null retained (Snowden not modeled;
    documentary/leak meta-event convention). Corrected the charge note to
    the verbatim complaint language; the old note "charged on three counts
    under the Espionage Act" was wrong — it is theft of government property
    PLUS two Espionage Act counts. Raw (WaPo/DOJ, sha256 01e7934d…):
    "Snowden was charged with theft, 'unauthorized communication of
    national defense information' and 'willful communication of classified
    communications intelligence information to an unauthorized person,'
    according to the complaint. The last two charges were brought under the
    1917 Espionage Act." Also corroborated: "former National Security
    Agency contractor," Booz Allen Hamilton, EDVA venue, Hong Kong.
    auspex_assessment concur retained. Live WaPo url bot-walls (HTTP 000,
    HTTP/2 stream reset) → Wayback archive_url is the snapshot target.

    [c] DATES — start_date / disclosure_date 2013-06-05 retained (correct:
    the first Guardian story = the Verizon / FISA bulk-metadata order,
    2013-06-05). Corrected outcome_summary prose that implied WaPo also
    published on 06-05: WaPo joined 06-06 with the PRISM story. end_date
    2014-12-31 (principal waves) retained. attribution_date 2013-06-21 =
    the unsealing / charge-report date, source-supported.

    [d] DOCTRINE_LINKS — both were confidence: attested on sources that do
    NOT state the doctrine goal → OVER-ATTESTATION; downgraded to
    strongly_inferred with inference_basis {signals[], ruled_out}.
    (1) us/title-10-title-50 was attested via doj/2013-06-21_snowden-charges
    — but the charge sheet describes espionage/theft, not the Title 50
