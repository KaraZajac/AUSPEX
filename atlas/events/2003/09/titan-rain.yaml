id: 2003-09/titan-rain
name: Titan Rain — PRC intrusions into US defense networks (2003–2005)
start_date: 2003-09-01
disclosure_date: 2005-08-25  # Time magazine "The Invasion of the Chinese Cyberspies"
end_date: 2005-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown  # mixture of n-day and credential reuse per Alperovitch and later assessments
outcome_summary: |
  Multi-year intrusion campaign attributed by USAF investigators
  (notably Shawn Carpenter at Sandia) to Guangdong-based PRC
  operators against US defense contractors and DoD networks —
  Lockheed Martin, Sandia National Laboratories, Redstone Arsenal,
  NASA, the Defense Information Systems Agency, and the World Bank.
  Tradecraft involved rapid-tempo nightly intrusions originating
  from Chinese netblocks. Estimated 10–20 terabytes exfiltrated
  over the campaign period. The case is the first publicly
  reported PRC state-sponsored intrusion campaign against US
  national-security targets and the predecessor pattern for
  what Mandiant later branded APT1.
false_flag_risk: none
summary: |
  Codenamed by the FBI; partial public disclosure via Time
  magazine (August 2005) and Washington Post (December 2005)
  drawing on Sandia investigator Shawn Carpenter's whistleblower
  account. No US government attribution or indictment ever issued;
  the case ended ambiguously when Carpenter was fired for sharing
  data with the FBI outside Sandia's authorization. Retrospective
  vendor analysis (Alperovitch, Mandiant) treats Titan Rain as a
  PLA-aligned cluster overlapping the early Comment Crew /
  Byzantine Hades collection that resurfaced as APT1.
attributions:
  - actor_id: null
    attributing_org: USAF / Sandia (Shawn Carpenter)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2005-08-25
    attribution_source_id: time/2005-08-25_chinese-cyberspies
    notes: |
      Public attribution to "Guangdong-based" PRC operators is
      moderate-confidence and not tied to a specific PLA unit or
      MSS bureau. Subsequent retrospective vendor analysis maps
      the cluster onto the same broad PLA / MSS milieu that
      produced APT1 / Comment Crew, but no actor slug in this
      atlas cleanly resolves to Titan Rain. Leaving actor_id null
      per editorial norm.
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/dual-use-research
    program_id: null
    confidence: plausible
    reasoning: |
      Target mix (defense contractors, national labs, NASA) maps
      onto the dual-use research collection pattern that MCF later
      codified at national-strategy level (2014–2015). Retrospective
      framing — at the time the operating doctrine was the 10th
      Five-Year Plan and the early-2000s "informatization" push.
    attesting_source_id: null
    counter_explanation: |
      Could equally be tagged to generic PRC strategic-intelligence
      collection. MCF as a named doctrine post-dates the campaign
      by a decade.
    contested: false
    analyst: claude
  - doctrine_id: cn/intelligentized-warfare
    pillar_id: cn/intelligentized-warfare/sigint-c4isr-collection
    program_id: null
    confidence: plausible
    reasoning: |
      DISA and DoD-network targeting is consistent with C4ISR
      collection priorities that later doctrinal writing on
      "informatized" and "intelligentized" warfare made explicit.
      Retrospective framing.
    attesting_source_id: null
    contested: false
    analyst: claude
