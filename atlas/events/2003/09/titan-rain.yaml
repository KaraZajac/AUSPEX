  notes: |
    Audited vs the two cited 2005 reports. Time "The Invasion of the
    Chinese Cyberspies" (Thornburgh) was SNAPSHOTTED (googlebot UA
    bypassed the 406 WAF; direct + browser-UA curls returned 406/000)
    → raw_snapshot atlas/sources/raw/time__2005-08-25_chinese-cyberspies.html,
    sha256 92871007…c028f76144, 221,269 bytes. Washington Post
    (Graham) is un-snapshottable (curl 000; WebFetch 403 on both the
    wp-dyn and /archive/politics/ URLs; archive.org blocked for this
    fetcher) → its unique claims MIRROR-CORROBORATED via WaPo's own
    archive listing + web search; hence qc level = partial.

    [a] FACTS — corrections against the Time raw:
    • REMOVED "Estimated 10–20 terabytes exfiltrated": absent from
      both cited 2005 sources; the figure's real provenance is a
      2006/2007 USAF Maj. Gen. William Lord statement about NIPRNet
      (per CRS reporting), which is not cited here. Stripped rather
      than fabricate a carrier; Kara may re-add with the Lord/CRS
      source. Replaced with the Time-carried exfil detail (10–30-min
      intrusions staged via South Korea/Hong Kong/Taiwan to mainland
      China).
    • REMOVED the "predecessor pattern for what Mandiant later
      branded APT1" and the "Alperovitch, Mandiant … Comment Crew /
      Byzantine Hades … resurfaced as APT1" retrospective sentence:
      uncited by either source and factually shaky — cn/pla/apt1
      (Comment Crew) is dated active_since 2006 and this atlas's
      APT1 alias is "Byzantine Candor," not "Byzantine Hades." Not
      source-carried → stripped.
    • DROPPED target orgs/disa (Defense Information Systems Agency):
      not named in the Time raw (grep-confirmed absent), not in the
      CFR Titan Rain page, and not surfaced by the WaPo mirror; it
      rested only on the WaPo source record's own notes-line, which
      is un-snapshottable. General "Department of Defense networks"
      IS Time-carried ("Hundreds of Defense Department computer
      systems had been penetrated") and is retained in prose.
    • "USAF investigators" → US Army cyberintelligence + Sandia's
      Carpenter: Time ties Carpenter's handlers to "Army
      cyberintelligence"/"Army intelligence," not the Air Force.
    • "Codenamed by the FBI" → "code-named by US federal
      investigators": Time says "federal investigators code-named
      Titan Rain."
    • Verified-and-kept (Time-carried, verbatim): Lockheed Martin
      Sept-2003 break-in; Sandia; Redstone Arsenal ("military
      base"); NASA (Mars Reconnaissance Orbiter schematics); World
      Bank; Guangdong three-router origin; export-controlled-but-not-
      classified data; Army mission-/Falconview flight-planning
      software theft; Carpenter fired + Q-clearance revoked.

    [b] ATTRIBUTION — DOWNGRADED. attributing_org_confidence
    moderate→low: both sources explicitly hedge state attribution —
    Time "don't yet know whether the spying is official, a private-
    sector job or the work of many independent, unrelated hands";
    WaPo (mirror) "Is this an orchestrated campaign by PRC or just a
    bunch of disconnected hackers? We just can't say at this point";
    CFR (mirror) frames it as "suspected." actor_id kept null (no
    clean atlas resolution; APT1 postdates + uncited). Rewrote the
    over-specific attributing_org ("USAF / Sandia") to reflect the
    actual reported chain (Carpenter/Sandia + Army & FBI, via Time /
    WaPo).

    [c] DATES — FIXED. Event summary "Washington Post (December
    2005)" → "(August 2005)": the Graham piece is the same-day (25
    Aug 2005) companion to the Time story (cited URL AR2005082402318;
    WaPo live-canonical path /2005/08/25/), so the "December 2005"
    disclosure claim was wrong. The WaPo source record's own
    published_on was already correct at 2005-08-25 — only its SLUG id
    carries the stale 2005-12-04 date (kept per stable-slug rule;
    annotated in the source record). start_date 2003-09-01 (Lockheed
    Sept-2003 break-in) and disclosure_date 2005-08-25 confirmed
    against the Time raw.

    [d] DOCTRINE_LINKS — both kept at plausible (honest floor);
    neither is attested, so no attesting_source_id required and no
    over-attestation. cn/mcf/dual-use-research reasoning re-grounded
    in the Time "American know-how" / "export-control" quotes;
    cn/intelligentized-warfare/sigint-c4isr-collection re-grounded in
    the Army mission-/flight-planning-software theft (removing the
    dropped DISA hook). Added inference_basis.alternatives to both
    (colon-space items quoted per YAML gotcha); retained the MCF
    counter_explanation and contested:false. Both remain explicitly
    retrospective (MCF 2014–15, intelligentized-warfare late-2010s
    post-date this 2003–2005 activity).

    [e] ATTRIBUTION_LEVEL — added: nation (China named as apparent
    origin; no PLA unit / MSS bureau identified). Orthogonal to the
    low confidence (they pointed at a nation but were not sure it was
    state-directed).

    [f] ACTOR_ID — null; resolves trivially. FLAG: none for actors.

    RESIDUAL / FLAGS: (1) WaPo source un-snapshottable → partial.
    (2) Target-registry files missing for orgs/sandia-national-labs,
    orgs/redstone-arsenal, orgs/world-bank (informational FK gap /
    deferred normalization, not a conformance error) — all three are
    Time-verified real victims; registry entries could be created by
    the orchestrator. (3) The stripped 10–20 TB figure is a real
    (Lord 2006/07) datum available for re-sourcing.
