id: 2014-10/warsaw-stock-exchange
name: Warsaw Stock Exchange breach under "Cyber Caliphate" false-flag persona
start_date: 2014-10-01
disclosure_date: 2014-10-24
end_date: 2014-10-24
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: unknown
outcome_summary: |
  An actor publishing under the "CyberCaliphate" persona leaked
  client login credentials and personal data of investors and
  Warsaw Stock Exchange (GPW) staff, claiming Islamic State
  authorship. Approximately 350 records were published. The
  WSE confirmed unauthorized access. Subsequent analysis tied
  the operation to the same Russian GRU false-flag persona
  used against TV5Monde (April 2015) and the US Central Command
  Twitter takeover (January 2015), making this the earliest
  publicly documented CyberCaliphate deployment.
false_flag_risk: confirmed
summary: |
  Warsaw Stock Exchange marks the operational debut of the GRU
  CyberCaliphate persona. Poland's positioning as a NATO eastern-
  flank state and the WSE's symbolic role as a regional financial
  hub fit the GRU pattern of deniable-attribution operations
  testing tradecraft against NATO-aligned civilian targets.
  Polish authorities and subsequent Western analysis (notably
  the post-TV5Monde reattribution work) treat the GRU
  attribution as the canonical reading.
attributions:
