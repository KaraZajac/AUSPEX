    attributing_org: Vendor consensus (post-TV5Monde retrospective)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-04-09  # established post-TV5Monde
    attribution_source_id: bbc/2015-04-09_tv5monde-cyberattack
    notes: |
      No primary attribution document specifically names Warsaw
      Stock Exchange; the GRU CyberCaliphate attribution is by
      analogical reasoning from the TV5Monde and CENTCOM Twitter
      operations that share the persona and tradecraft. Cluster
      assignment to APT28 versus Sandworm is unsettled.
