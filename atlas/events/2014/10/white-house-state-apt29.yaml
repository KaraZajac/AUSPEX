id: 2014-10/white-house-state-apt29
name: White House / State Department APT29 intrusion
start_date: 2014-08-01
disclosure_date: 2014-10-28
end_date: 2015-04-30
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  APT29 ("Cozy Bear" / "The Dukes") — attributed by US officials
  to the Russian government — penetrated the unclassified
  Executive Office of the President network and the US State
  Department's unclassified email system in mid-to-late 2014.
  Access to the unclassified White House network was discovered
  in October 2014 following an allied tipoff; investigators
  believe the intruders reached the White House by first
  compromising State and pivoting via a phishing email sent from
  a hijacked State account. State Department remediation efforts
  continued into spring 2015 with intermittent re-compromise (US
  officials told CNN the hackers had "owned" the State system
  "for months" and were not clearly eradicated). The
  contemporaneous 2014-15 attribution was to "the Russian
  government" at nation level; the SVR-unit designation is a
  later (2016+) refinement not asserted by these sources. The
  intrusion is the most prominent pre-2016-DNC public exposure of
  Russian-state cyber capability against US executive-branch
  targets.
false_flag_risk: none
summary: |
  Reporting (notably CNN, Washington Post) framed the intrusion
  as part of a long-running Russian state cyberespionage campaign
  that F-Secure (September 2015) documented as "The Dukes" toolset
  operating "on behalf of the Russian Federation" from 2008
  onward. Neither the 2014-15 press nor the F-Secure report names
  the SVR specifically; the SVR/APT29 unit attribution
  consolidated only with later (2016+) US/allied reporting. The
  campaign is the institutional predecessor to the same actor's
  (APT29) intrusion of the DNC (2015-09 to 2016-06) and an
  operational baseline for its later SolarWinds (2020) operation.
attributions:
  - actor_id: ru/svr/apt29
    attributing_org: US officials (anonymous, press)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2014-10-28
    attribution_source_id: wapo/2014-10-28_white-house-russia
    notes: |
      Contemporaneous US-official attribution was nation-level and
      hedged: WaPo (2014-10-28) reported "hackers thought to be
      working for the Russian government," and CNN (2015-04-07)
      that investigators "found tell-tale codes and other markers
      that they believe point to hackers working for the Russian
      government." Neither press source named APT29 / Cozy Bear /
      the Dukes, nor the SVR; NSC declined to confirm ("not going
      to comment on [the] article's attribution to specific
      actors"). actor_id ru/svr/apt29 reflects the modern canonical
      identity of the cluster, NOT what the 2014 press asserted —
      hence attribution_level: nation for this source.
  - actor_id: ru/svr/apt29
    attributing_org: F-Secure
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2015-09-17
    attribution_source_id: fsecure/2015-09-17_the-dukes
    notes: |
      F-Secure's "The Dukes" whitepaper (Sept 2015) consolidated
      the toolset cluster (MiniDuke/CosmicDuke/CozyDuke/…) later
      canonized as APT29 and assessed it "operates on behalf of the
      Russian Federation," "working for the Russian Federation
      since at least 2008" — a named-actor, nation-of-origin
      attribution. The report does NOT name the SVR, and does not
      itself document the White House / State Department intrusion
      (it dates the first large CozyDuke spear-phishing campaign to
      "the early days of July 2014" and cites US "high-profile
      victims"). Supports the actor cluster + spear-phishing TTP,
      not the event specifics — hence attribution_level:
      named-actor, not named-unit.
doctrine_links:
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/nato-as-principal-threat
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale
    reasoning: |
      Russian doctrine treats NATO/US as the principal external
      danger (codified in the December 2014 Military Doctrine,
      continuous with the 2010 edition). Clandestine foreign-
      intelligence collection against US executive-branch
      decision-making — here, real-time non-public details of the
      president's schedule and foreign-policy deliberations — is
      the canonical SVR-type tasking that this posture rationalizes.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target = US executive decision-making: CNN reports the hackers reached 'real-time non-public details of the president's schedule' — political/strategic intelligence on Russia's declared principal adversary."
        - "Actor remit: APT29 / the Dukes is a foreign-intelligence collection cluster (F-Secure: it 'provides the Russian government with intelligence on foreign and security policy interests'), matching collection tasking rather than disruption."
        - "Geopolitical timing: CNN ties the intrusions to the period when 'the U.S. and Russia increasingly confront each other' over Ukraine and Syria — the NATO-confrontation frame the doctrine names."
      ruled_out: "Criminal / financially-motivated intrusion — no monetization, ransom, or data-sale is reported; the tradecraft (schedule and foreign-policy collection, months-long stealth persistence) is pure espionage. Destabilization-via-info is also ruled out here: this was covert collection, not a hack-and-leak, so the nato-as-principal-threat collection pillar fits better than the destabilization pillar used for the 2016 DNC operation."
    contested: false
    analyst: claude
  - doctrine_id: ru/gerasimov-framework
    pillar_id: ru/gerasimov-framework/non-military-means
    program_id: null
    confidence: plausible
    perspective: attacker-rationale
    reasoning: |
      The intrusion is often folded into the Western "Gerasimov"
      framing of information-domain operations as primary in modern
      conflict. Tagged only plausible: the framework is informal
      (Galeotti, who coined the label, has retracted it) and this
      operation is classic clandestine collection, not the
      influence / information-confrontation the framework emphasizes.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Military Doctrine 2014 / nato-as-principal-threat: espionage against the principal adversary's leadership is more cleanly captured by the formal collection pillar (the strongly_inferred link above) than by the informal Gerasimov 'non-military means' label."
        - "No discrete 'Gerasimov doctrine': the label is a Western reading of Gerasimov's 2013 article that may name no distinct Russian doctrine; retained only for queries that filter on the framework."
    counter_explanation: |
      Better captured under Military Doctrine 2014
      nato-as-principal-threat; the Gerasimov tag is a loose fit
      because pure collection is not the information-confrontation
      the framework centers on.
    contested: false
    analyst: claude
