id: 2014-10/white-house-state-apt29
name: White House / State Department APT29 intrusion
start_date: 2014-08-01
disclosure_date: 2014-10-28
end_date: 2015-04-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  SVR-attributed APT29 ("Cozy Bear" / "The Dukes") penetrated
  unclassified Executive Office of the President networks and
  the US State Department's unclassified email system in
  mid-to-late 2014. Access to the unclassified White House
  network was discovered in October 2014 following allied
  tipoff; State Department remediation efforts continued into
  spring 2015 with intermittent re-compromise. The intrusion is
  the most prominent pre-2016-DNC public exposure of SVR cyber
  capability against US executive-branch targets.
false_flag_risk: none
summary: |
  Reporting (notably CNN, Washington Post) framed the intrusion
  as part of a long-running SVR campaign that F-Secure had
  documented as "The Dukes" toolset from 2008 onward. The
  campaign is the institutional predecessor to the SVR
  intrusion of the DNC (2015-09 to 2016-06) and the operational
  baseline against which APT29's later SolarWinds (2020)
  operation should be evaluated.
attributions:
