  notes: |
    Full 6-point audit (claude-opus-4.8 / Opus 4.8 / effort max) vs the
    RAW cited sources; all three snapshotted to atlas/sources/raw/.

    SNAPSHOTS:
    - wapo__2014-10-28_white-house-russia.html — Wayback capture of the
      retired WaPo slug (live url is null); sha256 edd381ea…f447c5;
      159,535 B.
    - cnn__2015-04-07_state-department-russia.html — live edition.cnn.com,
      HTTP 200; sha256 f2d67832…89caa7; 4,655,590 B.
    - fsecure__2015-09-17_the-dukes.pdf — 37-pp F-Secure whitepaper via
      Wayback (live blog-assets URL CloudFront-403s to curl); sha256
      dfd8829c…791ce7; 1,789,176 B.

    [a] FACTS — CORRECTED. WH + State unclassified intrusion, allied
    tipoff, October-2014 discovery, phishing pivot, and difficulty of
    eviction are carried verbatim. WaPo: "Hackers thought to be working
    for the Russian government breached the unclassified White House
    computer networks"; "U.S. officials were alerted to the breach by an
    ally." CNN: "Russian hackers behind the damaging cyber intrusion of
    the State Department … used that perch to penetrate sensitive parts
    of the White House computer system"; "the White House intrusion began
    with a phishing email that was launched using a State Department
    email account that the hackers had taken over"; "the Russian hackers
    have 'owned' the State Department system for months and it is not
    clear the hackers have been fully eradicated." STRIPPED the "SVR"
    over-attestation from outcome_summary + summary (no cited source says
    SVR — see [b]). incident_type data-theft → espionage: WaPo hedges
    exfil ("how much data, if any, was taken"); CNN frames the loss as
    collection of information "prized by foreign intelligence agencies" —
    espionage, not established theft.

    [b] ATTRIBUTION — de-over-attested. All three sources attribute to
    "the Russian government / Russian Federation" only; NONE names the
    SVR. F-Secure (the technical anchor) says the Dukes "operates on
    behalf of the Russian Federation" and has been "working for the
    Russian Federation since at least 2008" — grep of the extracted PDF
    returns ZERO occurrences of "SVR." Per-source attribution_level
    added: WaPo = nation (hedged "thought to be"); F-Secure = named-actor
    (the Dukes / APT29). actor_id ru/svr/apt29 retained as the modern
    canonical cluster identity, with notes making explicit it is NOT what
    the 2014-15 sources asserted. NSC declined to confirm.

    [c] DATES. disclosure_date 2014-10-28 = WaPo byline (verified).
    Source published_on verified: WaPo 2014-10-28; CNN "Published Apr 7,
    2015, 5:01 PM ET" (record 2015-04-07 ✓); F-Secure page footers state
    only "F-Secure Whitepaper, September 2015" (no day; PDF CreationDate
    2020-03-26 is a re-host artifact) — published_on 2015-09-17 retained
    as the widely-cited release date. start_date 2014-08-01 and end_date
    2015-04-30 are analytic op-onset / remediation-window ESTIMATES
    bounded by sourced anchors (F-Secure dates the first large CozyDuke
    spear-phishing campaign to "the early days of July 2014"; discovery
    Oct 2014; CNN Apr-2015 shows the actor still not evicted) — not
    stated verbatim by any source.

    [d] DOCTRINE_LINKS. Neither link is `attested` (no source states a
    Russian doctrinal goal), so attesting_source_id stays null and
    inference_basis was added to both; perspective: attacker-rationale
    added to both (Russia's doctrine rationalizing Russia's own
    operation). military-doctrine-2014 / nato-as-principal-threat kept
    strongly_inferred with signals + ruled_out — collection against the
    declared principal adversary's leadership; criminal motive and
    destabilization-via-info both ruled out (covert collection, not
    hack-and-leak). gerasimov-framework / non-military-means kept
    plausible with alternatives + counter_explanation flagging the loose
    fit (pure espionage ≠ the information-confrontation the framework
    centers on; Galeotti has retracted the label). Removed the stray
    "SVR" phrasings from the reasoning.

    [e] ATTRIBUTION_LEVEL — ADDED (was absent). nation for the 2014
    press; named-actor for F-Secure. Firmest cited level is named-actor
    (the Dukes/APT29); named-unit (SVR) is NOT source-supported here —
    consistent with the 2014 attribution being less firm than the later
    2016 DNC-era APT29 attribution.

    [f] ACTOR_ID ru/svr/apt29 — VERIFIED resolves to
    atlas/actors/ru/apt29.yaml (id: ru/svr/apt29; canonical_name "APT29 /
    Cozy Bear / Midnight Blizzard"). Named-actor, not a counter-action;
    correct.

    Targets orgs/us-white-house + orgs/us-state-department both verified
