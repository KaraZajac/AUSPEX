qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited vs the SOLE cited source wikipedia/opm-data-breach (tertiary — this is the corpus
    plan's "OPM-cited-to-Wikipedia" type specimen of the single-source/circularity cohort). Raw
    HTML captured (atlas/sources/raw/wikipedia__opm-data-breach.html, sha256
    56886d65cb017ced019eb016073b15c7ffbe109d695e798f8029094057a6b4f3; page last edited 26 May
    2026, oldid 1356238118); archive.org blocked here, snapshot is the reproducible copy.
    FACTS the cited source CONFIRMS: ~22.1M people affected (the source's figure — the often-
    quoted 21.5M is the clearance-records subset; 22.1M is total persons); 127-page SF-86; 5.6M
    sets of fingerprints; two separate-but-linked intrusions (DHS "X1" discovered 20 Mar 2014;
    "X2" via an attacker posing as a KeyPoint Government Solutions employee, X2 act 7 May 2014,
    discovered 15 Apr 2015); valid creds gained "likely through social engineering"; PlugX
    backdoor; "Sakula" malware (Yu Pingan, 2017). ATTRIBUTION [b]: cited source attributes
    firmly to China / "state-sponsored attackers for the Chinese government" ("overwhelming
    consensus") and names "the Jiangsu State Security Department, a subsidiary of the [MSS]" only
    as "widely believed"/consensus — NOT a US-government formal/indictment attribution, and no
    DOJ indictment of a state actor exists (Yu Pingan was charged with conspiracy to commit
    computer hacking). So: added attribution_level: nation (source firmly supports nation; the
    JSSD/MSS named-unit claim is hedged and the actor is deliberately cn/UNSCOPED); rewrote
    attributing_org from "US Intelligence Community (public attribution)" to "open-source
    consensus...not a US-government formal attribution".
    CORRECTIONS (claims that EXCEEDED the cited source, now removed/hedged/flagged): (1) summary
    asserted the Hikit rootkit + a "Deep Panda / Hurricane Panda toolset Symantec and CrowdStrike
    later documented" + "flat internal network" + "e-QIP" — NONE of these appear in the cited
    source; only PlugX and Sakula do. Retained Hikit/Deep-Panda/Hurricane-Panda only as
    explicitly-labelled vendor/press context. (2) outcome_summary asserted OPM↔Anthem(2015)↔
    Equifax(2017) cross-referencing "created a near-comprehensive MSS dataset" — not a claim of
    the cited source (Anthem/Equifax appear only in its navigation timeline); kept as an
    explicitly-labelled AUSPEX assessment tied to campaign_id. (3) start_date 2013-11-01 retained
    (House-report/press estimate) but re-annotated: the cited source says "it is unclear when the
    first attack occurred" and does NOT support a Nov-2013 start. (4) fixed a duplicate
    disclosure_date key introduced mid-edit. DOCTRINE LINKS [d]: both already conservatively
    graded and correct — cn/mcf/bulk-pii-humint-enabling stays strongly_inferred (source documents
    the SF-86 counterintelligence/biometric value: Comey "treasure trove...counterintelligence",
    fingerprints→agent ID, "compile a database of Americans"; but does NOT name MCF/frame the
    goal — correctly NOT attested); cn/national-intelligence-law-2017 stays plausible (event
    predates the law). published_on [c]: source had an arbitrary 2024-01-01 placeholder that
    tripped verify_atlas's attribution-date-gap flag → set to null (living wiki article, no single
    pub date), which clears the spurious source-orphan. FKs [f]: doctrine cn/mcf(+pillar),
    cn/national-intelligence-law-2017, actor cn/unscoped/deep-panda (correctly demoted from
    cn/mss 2026-06-24 on the actor's own un-sourced-service grounds), and the source all resolve.
    FLAG (not fixed — pre-existing, corpus-wide deferred normalization): target orgs/keypoint has
    no registry file (only orgs/us-opm does); verify_atlas treats orgs/ gaps as informational, so
    left as-is. UNCERTAINTY: a single tertiary source under-supports a canonical national-security
    event; level: full reflects a complete audit of what IS cited, but the citation itself should
    be upgraded to the primary record (House OPM report / OPM-OIG / contemporaneous press) per the
    attribution notes.
