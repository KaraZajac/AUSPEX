id: 2014-06/opm-breach
name: Office of Personnel Management (OPM) breach
start_date: 2013-11-01  # assessed earliest "X1" compromise per the House OPM report / press timeline; NB the cited tertiary source says only that "it is unclear when the first attack occurred" (X1 discovered 20 Mar 2014) and does NOT support a Nov-2013 start — date retained as the widely-reported estimate, flagged pending a primary source
disclosure_date: 2015-06-04  # OPM's June 2015 public announcement (cited source: WSJ/WaPo ~4–5 Jun 2015)
end_date: 2014-06-30
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds  # via KeyPoint contractor compromise
outcome_summary: |
  Records on approximately 22.1 million people were affected —
  security-clearance applicants, other background-check subjects,
  and their family and friends — with the highly sensitive 127-page
  SF-86 (Questionnaire for National Security Positions) and 5.6
  million sets of fingerprints among the data exfiltrated from US
  OPM; the second of the two linked intrusions came via an attacker
  posing as a KeyPoint Government Solutions (contractor) employee.
  Among the most consequential PII thefts in US national-security
  history. (AUSPEX assessment, NOT in the cited tertiary source:
  later analysts treat the OPM, Anthem and Equifax thefts as a
  cumulative PRC bulk-PII dataset on US persons — see campaign_id.)
quantified_impact:
  records_exfiltrated: 22100000
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  China-attributed bulk theft of US security-clearance data; no DOJ
  indictment of a state actor (the only related US prosecution, of
  Yu Pingan over the "Sakula" malware, charged conspiracy to commit
  computer hacking, not state espionage). The cited (tertiary)
  source attributes the attack to "an advanced persistent threat
  based in China, widely believed to be the Jiangsu State Security
  Department, a subsidiary of the [MSS]" and to "state-sponsored
  attackers for the Chinese government" by "overwhelming consensus" —
  the JSSD/MSS service naming is the source's hedged consensus
  framing, not a cited US-government formal attribution. The OPM
  event defines the bulk-PII-for-HUMINT pattern and is AUSPEX's
  canonical anchor for the MCF bulk-PII-collection pillar. The breach
  comprised two separate but linked intrusions (DHS-named "X1" and
  "X2"); the second came via an attacker posing as a KeyPoint
  Government Solutions employee, with valid user credentials gained
  "likely through social engineering," after which attackers
  escalated privileges across OPM's systems and exfiltrated the
  SF-86 background-investigation data plus 5.6 million sets of
  fingerprints. Reported tooling: the PlugX backdoor and the "Sakula"
  malware. (Not in the cited source — vendor/press lore, retained
  only as context: clustering with the Deep Panda / Hurricane Panda
  toolset and the Hikit rootkit, attributed to Symantec/CrowdStrike.)
attributions:
  - actor_id: cn/unscoped/deep-panda  # demoted from cn/mss 2026-06-24 (the ACTOR's sole source — the 2019 DOJ Anthem indictment — names no Chinese service; see actor notes). This event's cited source DOES name "the Jiangsu State Security Department, a subsidiary of the [MSS]" but only as what is "widely believed"/the "overwhelming consensus", not a cited primary attribution.
    attributing_org: open-source consensus (Wikipedia, citing US press / DNI Clapper); not a US-government formal attribution
    attributing_org_confidence: high  # firm on the China nexus ("overwhelming consensus...state-sponsored attackers for the Chinese government"); the JSSD/MSS service naming is hedged ("widely believed")
    attribution_level: nation  # ADDED 2026-06-25: the cited source FIRMLY supports nation (China); its JSSD/MSS (named-unit) claim is hedged "widely believed"/"consensus" and the actor is deliberately cn/UNSCOPED (China nexus solid, service un-sourced) — so the source-supported level is nation, not named-unit
    auspex_assessment: concur
    attribution_date: 2015-09-01
    attribution_source_id: wikipedia/opm-data-breach
    notes: |
      The cited source attributes firmly to China / the Chinese
      government ("overwhelming consensus...state-sponsored attackers
      for the Chinese government") and names the MSS Jiangsu State
      Security Department only as "widely believed" / the consensus
      view; it is not a US-government formal/indictment attribution
      (the prior "US IC public attribution" framing overstated this
      and was corrected 2026-06-25). The AUSPEX cluster assignment is
      to the Deep Panda / Black Vine operations cluster.

      Citation weakness (flagged 2026-05-26, re-confirmed in the
      2026-06-25 LLM audit): Wikipedia is the SOLE, TERTIARY source
      for this canonical event — the corpus-plan "OPM-cited-to-
      Wikipedia" type specimen of the single-source/circularity
      cohort. Primary/secondary sources (the House Oversight OPM
      report (Chaffetz, 2016), DNI Clapper's remarks, the OPM-OIG
      report, contemporary NYT/WaPo/WSJ coverage, the Yu Pingan
      filings) should be folded in as proper source stubs to retire
      the tertiary dependence.
