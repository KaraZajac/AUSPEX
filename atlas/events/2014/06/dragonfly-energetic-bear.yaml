qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: full
  notes: |
    Audited vs the RAW primary sources (not the event prose). Path:
    NORMAL AUDIT + one re-sourced corroborator — the "phantom" suspicion
    is DISCONFIRMED (the Symantec source is the genuine primary; the DOJ
    source is genuine but bot-walled). Snapshots: Symantec "Dragonfly:
    Cyberespionage Attacks Against Energy Suppliers" (v1.21, 7 Jul 2014
    revision of the 30 Jun 2014 original) PDF, 2,885,807 bytes, sha256
    30ce77b9...9a9b6464; CISA/FBI/DOE AA22-083A HTML, 122,852 bytes,
    sha256 d9ba7a0c...cda81c25 (NEW source record created +
    snapshotted); DOJ press release UN-SNAPSHOTTABLE (live justice.gov
    serves an Akamai bm-verify interstitial stub, 2,561 bytes — no hash
    recorded).

    [a] FACTS — corrected against Symantec + CISA:
      * REMOVED the three vendor names "eWON, MB Connect Line, MESA
        Imaging": true historically but named in NEITHER cited source
        (Symantec says only "three ICS software producers"; CISA says
        "multiple ICS vendor websites"); F-Secure's Havex report, which
        named them, is 404 on all three known URLs so it could not be
        added. Softened to "three compromised ICS-software vendor
        websites" (Symantec: "three ICS software producers are known to
        have been compromised").
      * FIXED malware description: Havex IS Oldrea (Symantec: "Backdoor.
        Oldrea, which is also known as Havex or the Energetic Bear RAT")
        — the prior "Havex / Karagany / Oldrea family" implied three
        distinct families. Now Backdoor.Oldrea (aka Havex) + Trojan.
        Karagany; OPC/ICS-scanning carried by CISA ("uses the Open
        Platform Communications (OPC) standard to gather information
        about connected control systems devices").
      * REMOVED "CrowdStrike 'Energetic Bear' reporting" as a distinct
        body — no CrowdStrike source is cited; "Energetic Bear" is
        carried only as an alias (Symantec: "also known by other vendors
        as Energetic Bear"; CISA lists it).
      * REMOVED/CORRECTED "US-CERT ICS-ALERT advisories framed the
        campaign as Russian state-sponsored pre-positioning": no US-CERT
        source is cited here, and the 2014 ICS-CERT Havex advisories were
        technical, NOT a Russia attribution. The state-sponsored framing
        is 2018 (TA18-074A) / 2022 (DOJ+CISA); reworded accordingly.
      * summary DE-CONFLATED: dropped "operational predecessor of the
        2015-2016 Ukraine grid attacks and 2017 Triton" (those are GRU
        Sandworm and TsNIIKhM respectively — different services/actors)
        and the unsourced "recurred in later ... PRC operations."
      * Vector reality (both sources): spearphishing + watering-hole
        (Lightsout/Hello EK) + trojanized ICS installers; initial_vector
        kept supply-chain (the campaign's ICS signature) with a clarifying
        comment. ADDED incident_type espionage (Symantec "cyberespionage";
        CISA "collected and exfiltrated ... ICS data"); kept pre-
        positioning (Symantec's latent-sabotage assessment) + supply-chain
        + intrusion.

    [b] ATTRIBUTION — over-attribution fixed:
      * Row 1 (Symantec 2014): attributing_org "Symantec + CrowdStrike
        (cluster naming)" -> "Symantec" (only Symantec is cited).
        attribution_level ADDED = activity-cluster: Symantec named the
        "Dragonfly" cluster + UTC+4 working hours and did NOT name Russia
        or FSB (parallels the schema's Tortoiseshell activity-cluster
        case). Prior row implied moderate confidence in a Russian-unit ID
        Symantec never made — corrected via level + notes.
      * Row 2 (DOJ 2022): attribution_level ADDED = named-unit (FSB
        "Center 16" + three named officers). attributing_org refined to
        "US DOJ (indictment) + CISA/FBI/DOE (AA22-083A)". Kept high /
        concur. Attribution corroborated verbatim by the snapshotted CISA
        advisory ("three Russian Federal Security Service (FSB) officers";
        "From at least 2011 through 2018, the FSB ... conducted an
        intrusion campaign against ... U.S. Energy Sector organizations").

    [c] DATES — verified: start 2011-01-01 (Symantec "in operation since
      at least 2011"; CISA "From at least 2011"; energy focus began early
      2013). disclosure 2014-06-30 (Symantec report date; snapshot is the
      7 Jul v1.21 point-revision, published_on preserved). end 2014-12-31
      = bound on the Havex phase (CISA: "Beginning in 2013 and continuing
      through 2014, the threat actor leveraged Havex"). Source
      published_on dates confirmed (Symantec 2014-06-30; CISA 2022-03-24).

    [d] DOCTRINE_LINKS — two corrections:
      * Link 1 energy-weaponization: pillar grid-attack -> oil-gas-pre-
        positioning (grid-attack encodes Sandworm-style DISRUPTION; this
        is no-disruption pre-positioning — CISA: "no information to
        indicate these actors have intentionally disrupted any U.S. Energy
        Sector infrastructure"; the oil-gas-pre-positioning pillar names
        Berserk Bear/Havex/watering-hole/Wolf Creek explicitly).
        Confidence attested -> strongly_inferred (DOWNGRADE): the prior
        reasoning claimed "the 2022 DOJ ... explicitly identifies the
        pre-positioning purpose", but no cited source states a coercive-
        leverage GOAL — CISA documents behaviour + declines disruptive
        intent, Symantec frames intent as espionage. Added
        inference_basis.signals + ruled_out (rejected: pure intel-
        collection espionage). attesting_source_id repointed to the
        snapshotted CISA advisory as the primary SUPPORTING source.
      * Link 2 military-doctrine-2014/non-contact-warfare: strongly_
        inferred -> plausible (DOWNGRADE): the campaign (2011-2014,
        disclosed Jun 2014) PREDATES the doctrine (issued 25 Dec 2014),
        so op-follows-publication does not hold; the non-contact framing
        is a generic overlay competing with the energy-weaponization
        reading. Added inference_basis.alternatives + temporal caveat.
      Both links are attacker-rationale (Russian doctrine on a Russian
      op) — no perspective tag needed.

    [e] ATTRIBUTION_LEVEL — set on both rows (was missing): activity-
      cluster (Symantec 2014) and named-unit (DOJ/CISA 2022).

    [f] ACTOR_ID — ru/fsb/center-16/berserk-bear RESOLVES to
      atlas/actors/ru/berserk-bear.yaml (internal id matches). Actor
      record is well-formed (indicted status; MISP-galaxy G0035 /
      ENERGETIC BEAR; sourced to DOJ 2022 + TA18-074A + CISA 2025) — its
      default_doctrine_alignment_ids already point at oil-gas-pre-
      positioning, consistent with this event's corrected pillar. NO
      actor edit made / NO flag.

    TARGETS — corrected: replaced sectors/energy/electric-power/grid-ot
      (over-specific electric-grid-OT; Dragonfly's trojanized vendors were
      general industrial remote-access/ICS products, and Symantec frames
      victims as "energy" + "energy control systems") with sectors/ics.
      Country changed us -> null on both: Symantec found US infections
      "mostly ... collateral damage", with top true-victim countries Spain,
      then US, France, Italy, Germany — a multinational US+EU campaign, so
      a single primary us was misleading for this phase.

    RESIDUAL / for orchestrator: the DOJ press release is bot-walled and
    un-snapshottable; it is corroborated by its co-published, snapshotted
    CISA/FBI/DOE companion AA22-083A (added), so level = full. The one
    item resting solely on the bot-walled DOJ is the "Center 16" named-
    unit sub-label + officer names (not in the event text; corroborated by
    Treasury OFAC + TA18-074A per the actor record). A stricter auditor
    applying "load-bearing source un-snapshottable" could read this as
    partial. Source records updated: symantec (+raw_snapshot+sha256),
    doj (+AUDIT note, no hash), cisa AA22-083A (CREATED).
