id: 2014-06/dragonfly-energetic-bear
name: Dragonfly / Energetic Bear / Havex — Western energy-sector pre-positioning
start_date: 2011-01-01
disclosure_date: 2014-06-30
end_date: 2014-12-31
incident_type:
  - intrusion
  - espionage
  - pre-positioning
  - supply-chain
initial_vector: supply-chain  # signature vector: trojanized ICS-vendor installers (also used spearphishing + watering-hole)
outcome_summary: |
  Symantec disclosed a multi-year cyberespionage campaign against
  energy-sector targets in the US and Europe — energy firms and, in the
  2013-2014 phase, industrial-control-system (ICS) companies — using
  three infection vectors: spearphishing (2013), watering-hole redirects
  via the Lightsout / Hello exploit kit (from mid-2013), and trojanized
  installers planted on three compromised ICS-software vendor websites.
  The group's tools were Backdoor.Oldrea (also known as Havex or the
  "Energetic Bear RAT"), whose OPC module enumerated ICS/SCADA devices,
  and Trojan.Karagany. Symantec assessed the access gave the operators a
  latent capability to "mount sabotage operations" against energy supply,
  though it observed only espionage. Symantec named the "Dragonfly"
  activity cluster and a UTC+4 working-hours pattern but did NOT attribute
  to a state; the Russian-state / FSB attribution came later (US-CERT
  TA18-074A, 2018; DOJ + CISA/FBI/DOE AA22-083A, 2022, which folds this
  2013-2014 Havex activity into the FSB "Center 16" / Berserk Bear
  2011-2018 energy campaign). The Havex phase wound down after the 2014
  exposure; the operator cluster re-emerged as "Dragonfly 2.0" / Berserk
  Bear (2016-2018), modeled as separate later events.
false_flag_risk: none
summary: |
  Dragonfly / Energetic Bear / Havex is the foundational publicly
  documented Russian (FSB "Center 16" / Berserk Bear) energy-sector
  pre-positioning campaign. Its signature was supply-chain compromise —
  trojanizing legitimate ICS-vendor software updates to push the Havex
  RAT into operational-technology environments, where an OPC module
  fingerprinted control-systems devices. Symantec documented that the
  intrusions conferred a latent sabotage capability against energy supply
  but observed only espionage; US and allied governments later attributed
  the 2011-2018 energy campaign to the FSB and, in 2022, indicted three
  Center 16 officers. The operation is the canonical cyber instance of
  the Russian energy-weaponization posture — access and ICS
  pre-positioning as coercive leverage, without (in this phase)
  disruptive action.
attributions:
  - actor_id: ru/fsb/center-16/berserk-bear
    attributing_org: Symantec
    attributing_org_confidence: moderate
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2014-06-30
    attribution_source_id: symantec/2014-06-30_dragonfly
    notes: |
      Symantec's 2014 report coined and characterised the "Dragonfly"
      activity cluster (noting the vendor alias "Energetic Bear") and
      placed the operators in the UTC+4 working-hours band, but did NOT
      attribute to Russia or the FSB — hence attribution_level is
      activity-cluster, not a nation/unit call. The Russian-state / FSB
      identification is retrospective (row below). "+ CrowdStrike" was
      dropped: no CrowdStrike source is cited; the Russia implication of
      the "Energetic Bear" bear-name is carried, as an alias, by the
      actor record, not by this 2014 attribution.
  - actor_id: ru/fsb/center-16/berserk-bear
    attributing_org: US DOJ (indictment) + CISA/FBI/DOE (AA22-083A)
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2022-03-24
    attribution_source_id: doj/2022-03-24_berserk-bear-triton-indictment
    notes: |
      24 Mar 2022 DOJ indictment of three FSB "Center 16" officers for
      the 2011-2018 energy-sector campaign; the co-published CISA/FBI/DOE
      advisory AA22-083A (snapshotted) reproduces the state-sponsored-
      Russian / FSB attribution: "From at least 2011 through 2018, the
      FSB (also known as Berserk Bear, Energetic Bear ... Dragonfly,
      Havex, Crouching Yeti ...) conducted an intrusion campaign against
      international and U.S. Energy Sector organizations." named-unit: a
      specific FSB unit + named officers. The DOJ press release itself is
      bot-walled (Akamai); attribution corroborated via AA22-083A.
doctrine_links:
  - doctrine_id: ru/energy-weaponization
    pillar_id: ru/energy-weaponization/oil-gas-pre-positioning
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A Russian state-sponsored (FSB) multi-year intrusion campaign that
      gained access to US and European energy-sector networks and deployed
      ICS-focused malware (Havex/Oldrea, whose OPC module enumerates
      control-systems devices) — with no observed disruptive action — is
      exactly the energy-ICS pre-positioning the oil-gas-pre-positioning
      pillar encodes (its own summary names Berserk Bear / FSB Center 16,
      Havex and watering-hole). This corrects the prior pillar
      (grid-attack), which encodes Sandworm-style electric-grid
      DISRUPTION and does not fit a no-disruption pre-positioning
      campaign. Label is strongly_inferred, not attested: no cited source
      states a coercive-leverage GOAL — CISA/FBI/DOE (AA22-083A) document
      access, ICS-focused malware and data collection and explicitly note
      "no information to indicate these actors have intentionally
      disrupted any U.S. Energy Sector infrastructure", while Symantec
      frames intent as espionage yet records that the access "gave
      attackers the ability to mount sabotage operations ... could have
      caused damage or disruption to the energy supply". Target (US/EU
      energy ICS) + actor-mission (an energy-focused FSB unit) + the
      ICS/OPC-specific tradecraft + documented latent sabotage capability
      triangulate to one strategic reading — pre-positioning for coercive
      energy leverage — with no serious competitor.
    attesting_source_id: cisa/2022-03-24_aa22-083a-energy-sector
    inference_basis:
      signals:
        - "Russian state-sponsored FSB intrusion campaign against US + international Energy Sector networks, 2011-2018 (CISA AA22-083A)"
        - "ICS-focused malware Havex/Oldrea enumerates OPC servers and 'can cause PLCs inability to control connected systems' — access aimed at the OT/control layer, not just enterprise IT (CISA AA22-083A)"
        - "Symantec: access 'gave attackers the ability to mount sabotage operations ... could have caused damage or disruption to the energy supply' — latent disruptive capability pre-positioned, not used"
        - "no observed disruptive action ('no information to indicate these actors have intentionally disrupted any U.S. Energy Sector infrastructure') — i.e. pre-positioning, not attack"
      ruled_out: "Pure intelligence-collection espionage — rejected because the tradecraft specifically targets the ICS/OPC/PLC control layer and Symantec assessed it conferred a sabotage capability against energy supply, which exceeds document/secret collection; that energy-ICS-with-latent-sabotage pattern is what the energy-weaponization posture encodes."
    contested: false
    analyst: claude
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/non-contact-warfare
    program_id: null
    confidence: plausible
    reasoning: |
      Persistent Russian intrusion into NATO-state critical infrastructure
      below the threshold of armed conflict fits the non-contact /
      gray-zone rubric. The label is plausible, not higher, for two
      reasons: (1) TEMPORAL — this campaign ran 2011-2014 (disclosed Jun
      2014), predating the Military Doctrine of 25 Dec 2014, so the link
      reads as alignment with a persistent non-contact posture (already
      present in the 2010 doctrine) rather than op-follows-publication;
      and (2) no cited source names a non-contact-warfare purpose, and
      this framing is a generic overlay that competes with the more
      specific energy-weaponization reading — more than one strategic
      reading survives.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Non-contact / gray-zone warfare: sustained sub-threshold intrusion into NATO-state CII fits the rubric, but the campaign predates the cited 2014 doctrine text and no source names this purpose."
        - "Energy-weaponization (the primary link): the energy-sector-ICS specificity is better explained by the energy-weapon posture than by generic non-contact doctrine."
    contested: false
    analyst: claude
