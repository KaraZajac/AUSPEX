id: 2014-06/dragonfly-energetic-bear
name: Dragonfly / Energetic Bear / Havex — Western energy-sector pre-positioning
start_date: 2011-01-01
disclosure_date: 2014-06-30
end_date: 2014-12-31
incident_type:
  - intrusion
  - pre-positioning
  - supply-chain
initial_vector: supply-chain  # ICS vendor watering-hole + trojanized installers
outcome_summary: |
  Symantec disclosed a multi-year campaign against energy-sector
  targets in the US and Europe — operators, grid operators, ICS
  equipment manufacturers — via trojanized installers from three
  compromised ICS vendor websites (eWON, MB Connect Line, MESA
  Imaging) and the Havex / Karagany / Oldrea malware family.
  Subsequent CrowdStrike "Energetic Bear" reporting and US-CERT
  ICS-ALERT advisories framed the campaign as Russian state-
  sponsored pre-positioning against Western energy infrastructure.
  The 2014 phase wound down; the operator cluster reappeared as
  "Berserk Bear" / Dragonfly 2.0 (Symantec, 2017) — eventually
  tied to FSB Center 16 / "Energetic Bear" by 2018 US-government
  attribution and 2022 DOJ indictment.
false_flag_risk: none
summary: |
  Dragonfly is the foundational publicly documented Russian
  energy-sector pre-positioning campaign — the operational
  predecessor of the 2015–2016 Ukraine power-grid attacks and
  the 2017 Triton / Trisis assault on a Saudi petrochemical
  facility. The campaign's supply-chain leverage via ICS vendor
  installer compromise is a doctrinal pattern that recurred in
  later Russian and PRC operations.
