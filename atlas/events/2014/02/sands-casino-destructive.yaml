    [a] FACTS — all load-bearing claims carried by Bloomberg raw:
    wiper mechanics ("the script writes over the erased hard drives with
    a random pattern of ones and zeros … more cost-effective to buy new
    machines"); scope ("wiped out about three-quarters of the company's
    Las Vegas computer servers"; "laying waste to thousands of servers,
    desktop PCs, and laptops"); cost ("recovering data and building new
    systems could cost the company $40 million or more" — pres. Michael
    Leven; NOT embellished, matches source floor, kept usd_damage
    40000000 and re-labeled as a rebuild estimate); date ("released
    their malware early in the morning on Monday, Feb. 10"); initial
    access ("break into the Sands Bethlehem virtual private network, or
    VPN … software that cracks password logins" → stolen "login
    credentials of a senior computer systems engineer"). Corrected
    outcome_summary/target-outcome: prior "~75% of Las Vegas Sands Corp
    servers" over-broadened the source's "three-quarters of the
    company's LAS VEGAS servers" — tightened. Added the "Anti WMD Team"
    persona + Sony precursor framing.

    [b] ATTRIBUTION — KEY CORRECTION (over-attestation removed). Prior
    event asserted service_id: ir/irgc. NO cited source names the IRGC
    or any Iranian service. ODNI/Clapper says "Iranian actors have been
    implicated" (nation-level, hedged verb); Bloomberg/SecureWorks says
    "hacktivists based in Iran … couldn't determine if Iran's government
    played a role." Set service_id: null on both entries; attribution_
    level: nation (was missing). Downgraded attributing_org_confidence
    high→moderate (Clapper's "implicated" is deliberately weaker than
    the same passage's "The North Korean Government was responsible for"
    Sony) and auspex_assessment concur→concur-with-caveat (state
    direction unestablished). Added a second, earlier attribution entry
    (SecureWorks/Bloomberg, 2014-12-11) to capture attribution latency.

    [c] DATES — start 2014-02-10 confirmed (Bloomberg). disclosure
    2014-12-11 = Bloomberg Businessweek full disclosure (attack was kept
    secret ~10 months; company had acknowledged a breach Feb 2014).
