    pillar_id: ir/asymmetric-warfare/cost-deniability-leverage
    program_id: null
    confidence: attested
    reasoning: |
      DNI Clapper's WWTA states Iran's cyber program is valued "as one
      of many tools for carrying out asymmetric but proportional
      retaliation against political foes" — the doctrine's terminal
      goal stated in substance — and names the Sands attack in the same
      paragraph as an implicated example. Dell SecureWorks independently
      tied the wiper to retaliation for Adelson's anti-Iran remarks.
      The operation was low-cost, destructive, and not provably state-
      directed (an "Anti WMD Team" hacktivist persona supplied
      deniability): cost-and-deniability leverage against a political foe.
    attesting_source_id: odni/2015-02-26_clapper-sasc-testimony
