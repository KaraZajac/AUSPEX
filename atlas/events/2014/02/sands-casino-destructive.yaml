id: 2014-02/sands-casino-destructive
name: Las Vegas Sands Corp. destructive wiper attack
start_date: 2014-02-10  # wiper detonation, "early on the chilly morning of Feb. 10" (Bloomberg)
disclosure_date: 2014-12-11  # Bloomberg Businessweek full disclosure (attack + Iran link)
end_date: 2014-02-10
incident_type:
  - destructive
  - wiper
initial_vector: valid-creds  # brute-forced Sands Bethlehem VPN, then stole a senior engineer's credentials
outcome_summary: |
  Disk-wiping malware laid waste to thousands of servers, desktop
  PCs, and laptops — about three-quarters of the company's Las
  Vegas computer servers. Sands president Michael Leven estimated
  that recovering data and building new systems "could cost the
  company $40 million or more."
quantified_impact:
  usd_damage: 40000000  # Leven rebuild estimate, "$40 million or more" (Bloomberg); a remediation estimate, not confirmed loss
false_flag_risk: none
summary: |
  Destructive wiper attack on Sheldon Adelson's Las Vegas Sands
  Corp. — the world's largest casino company — on 10 February 2014.
  The intruders brute-forced the Sands Bethlehem (Pennsylvania) VPN,
  obtained a senior systems engineer's stolen credentials, then ran
  a wiper that overwrote hard drives "with a random pattern of ones
  and zeros," taking out thousands of machines; they posted an "Anti
  WMD Team" hacktivist-persona message aimed at Adelson. Bloomberg
  Businessweek (Ben Elgin & Michael Riley, 11 December 2014) and Dell
  SecureWorks (retained by Sands) tied the attack to "hacktivists
  based in Iran," retaliating for Adelson's October 2013 Yeshiva
  University remark suggesting the US detonate a nuclear warhead in
  the Iranian desert to coerce Tehran (Ayatollah Khamenei responded
  two weeks later via Fars News); SecureWorks could not determine
  whether Iran's government played a role. In the 26 February 2015
  DNI Worldwide Threat Assessment (SASC), James Clapper stated that
  "Iranian actors have been implicated in … the February 2014 cyber
  attack on the Las Vegas Sands casino company," framing Iran's cyber
  program as a tool for "asymmetric but proportional retaliation
  against political foes." Both attributions are nation-level (Iran) —
  no Iranian service is named — and among the first US-government
  public attributions of a destructive attack to Iran, months before
  the November 2014 Sony Pictures wiper.
attributions:
