id: 2014-02/sands-casino-destructive
name: Las Vegas Sands Corp destructive attack
start_date: 2014-02-10
disclosure_date: 2014-12-11  # Bloomberg reporting
end_date: 2014-02-10
incident_type:
  - destructive
  - wiper
initial_vector: valid-creds  # VPN credential brute-force
outcome_summary: |
  Approximately 75% of Las Vegas Sands Corp servers destroyed
  by disk-wiping malware. USD 40M+ recovery cost.
quantified_impact:
  usd_damage: 40000000
false_flag_risk: none
summary: |
  Publicly attributed to Iran by DNI James Clapper in February
  2015 Senate Armed Services Committee testimony — one of the
  first US-government public attributions of a destructive
  cyber attack to Iran. Motive cited: Sands Corp owner Sheldon
  Adelson's October 2013 public remark advocating detonating
  a nuclear weapon in the Iranian desert, which provoked a
  Khamenei response.
