    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-12-11
    attribution_source_id: bloomberg/2014-12-11_sands-iran
    notes: |
      Dell SecureWorks (retained by Sands) concluded the February
      attack "was likely the work of 'hacktivists' based in Iran" and,
      in an incident brief, that the "attack was in response to CEO
      comments regarding Iran"; the team "couldn't determine if Iran's
      government played a role." Nation-level; state direction not
      established. This Dec-2014 investigative attribution pre-dates the
      Feb-2015 US-government attribution below (attribution latency).
  - actor_id: null
    service_id: null  # Clapper named "Iranian actors" (nation), NOT the IRGC or any Iranian service
    attributing_org: US ODNI (DNI James Clapper), Worldwide Threat Assessment to SASC
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-02-26
    attribution_source_id: odni/2015-02-26_clapper-sasc-testimony
    notes: |
      "Iranian actors have been implicated in … the February 2014
      cyber attack on the Las Vegas Sands casino company" (DNI WWTA,
      Cyber §, Threat Actors → Iran, document p.3). Deliberately hedged
      verb ("implicated") and nation-level ("Iranian actors") — no
      Iranian service named; contrast the same passage's "The North
      Korean Government was responsible for" the Sony attack. CNNMoney
      (2015-02-27) corroborates but firms the paraphrase to "the
      Iranian government was behind."
doctrine_links:
