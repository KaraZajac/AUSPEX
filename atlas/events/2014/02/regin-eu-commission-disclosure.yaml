id: 2014-02/regin-eu-commission-disclosure
name: Regin / EU Commission and Council targeting disclosed (Snowden archive)
start_date: 2008-01-01  # earliest documented Regin window in EU institutions
disclosure_date: 2014-02-24
end_date: 2014-02-24
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  Süddeutsche Zeitung / WDR/NDR publication (via Snowden archive)
  documenting GCHQ + NSA targeting of EU Commission and EU Council
  networks using the Regin / WARRIORPRIDE platform. Specific
  individuals and embassies named in the disclosed slides.
false_flag_risk: none
summary: |
  AUSPEX models this as a UK-perspective Regin-deployment event
  distinct from (a) the broader Regin / WARRIORPRIDE platform-
  disclosure event under us/ (Symantec November 2014) and (b) the
  Belgacom / Op Socialist event. The EU Commission / Council
  targeting is the most prominent attributable GCHQ deployment
  of Regin after Belgacom and crystallises the EU-institutional
  collection role of UK SIGINT.

  UK government has not formally confirmed the targeting.
