id: 2014-02/regin-eu-commission-disclosure
name: Regin / EU Commission targeting disclosed (Snowden archive)
start_date: 2011-01-01  # European Commission Regin attack dated "in 2011" per both cited Der Spiegel pieces
disclosure_date: 2014-12-28  # Der Spiegel (spiegel/2014-12-28), earliest cited source naming the European Commission Regin attack; see qc FLAG re 2014/02 folder/id re-home
end_date: 2014-12-28
incident_type:
  - espionage
  - surveillance
initial_vector: unknown
outcome_summary: |
  Der Spiegel Snowden-archive reporting documenting that Regin — the
  GCHQ/NSA (Five Eyes) WARRIORPRIDE platform — was used in a cyber-
  attack on the European Commission, the EU's executive, dated to
  2011, disclosed alongside the Belgacom / Operation Socialist
  targeting.
false_flag_risk: none
summary: |
  AUSPEX models this as the GCHQ/NSA (Five Eyes) Regin deployment
  against an EU institution, distinct from (a) the broader Regin /
  WARRIORPRIDE platform-disclosure event
  (2014-11/regin-warriorpride, Symantec November 2014, anchored to
  us/nsa/equation-group) and (b) the Belgacom / Operation Socialist
  event (2010-05/operation-socialist-belgacom). The European
  Commission targeting is the most prominent attributable Five-Eyes
  (GCHQ/NSA) deployment of Regin against an EU institution after
  Belgacom and crystallises the EU-institutional collection role of
  joint UK-US SIGINT.

  UK government has not formally confirmed the targeting.
attributions:
  - actor_id: uk/gchq/regin-operators
    attributing_org: Der Spiegel (Snowden archive) + Fox IT technical assessment
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-01-27
    attribution_source_id: intercept/2015-01-27_regin-five-eyes
    notes: |
      Snowden-archive attribution: Der Spiegel names GCHQ as the
      British Five-Eyes partner behind the Belgacom attack, dates a
      "serious cyber-attack on the European Commission in 2011" to the
      same Regin platform, and Fox IT's Ronald Prins assessed that
      "Regin appeared to be a tool belonging to the NSA and GCHQ."
      Corroborated by Symantec / Kaspersky technical clustering once
      Regin was exposed publicly (November 2014 / January 2015).
      concur-with-caveat: the GCHQ-vs-NSA disaggregation for the EU
      Commission node runs through joint-platform (GCHQ-NSA
      WARRIORPRIDE) ownership rather than a node-specific operator
      attribution, and no government has formally attested.
      attribution_level named-unit: the specific services GCHQ and NSA
      are named as the tool's owners.
doctrine_links:
  - doctrine_id: uk/five-eyes
    pillar_id: null
    program_id: null
    confidence: attested
    perspective: attacker-rationale
    reasoning: |
      Der Spiegel's Snowden-archive reporting identifies the Regin /
      WARRIORPRIDE platform used against the European Commission as the
      Five-Eyes cyber-weapons system and its targets as Five-Eyes
      surveillance targets — the joint UK-US SIGINT-collection purpose
      the UK Five Eyes doctrine names. GCHQ is named as the British
      Five-Eyes partner (Belgacom); Fox IT assessed Regin as an
      NSA/GCHQ tool.
    inference_basis:
      source_quote: "There are many similarities with the cyber-weapons system that the intelligence agencies call \"Warriorpride\" in the Snowden documents. The targets thus far known are consistent with Five Eyes surveillance targets as outlined in the Snowden documents."
      source_id: intercept/2015-01-27_regin-five-eyes
    attesting_source_id: intercept/2015-01-27_regin-five-eyes
    contested: false
    analyst: claude
  - doctrine_id: us/five-eyes
    pillar_id: null
    program_id: null
    confidence: attested
    perspective: attacker-rationale
    reasoning: |
      US-side co-tag of the same UKUSA partnership: Der Spiegel
      attributes the Regin platform used against the European
      Commission to "the NSA and its Five Eyes alliance." NSA is the
      co-operator (us/nsa/tao via the actor's additional_service_ids)
      of the joint GCHQ-NSA Regin / WARRIORPRIDE platform. Mirrors the
      us/five-eyes co-tag on 2010-05/operation-socialist-belgacom.
    inference_basis:
      source_quote: "attributed to the NSA and its Five Eyes alliance based on a number of indicators. They include programs like Stuxnet, used to attack the Iranian nuclear program. Or Regin, a powerful spyware trojan that created a furor in Germany after it infected the USB stick of a high-ranking staffer to Chancellor Angela Merkel. Agents also used Regin in attacks against the European Commission, the EU's executive, and Belgian telecoms company Belgacom in 2011."
      source_id: spiegel/2014-12-28_belgacom-bics-grx
    attesting_source_id: spiegel/2014-12-28_belgacom-bics-grx
    contested: false
    analyst: claude
targets:
