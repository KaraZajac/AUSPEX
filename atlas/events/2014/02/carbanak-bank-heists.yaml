id: 2014-02/carbanak-bank-heists
name: Carbanak / Anunak bank-network intrusions and SWIFT / ATM heists
start_date: 2013-12-01
disclosure_date: 2015-02-16
end_date: null  # not bounded by either cited source; prior 2018-03-26 ("FIN7 operator Hladyr arrest") was mislabeled (Hladyr arrested Jan 2018) and actually matches the Europol Spain Carbanak/Cobalt-mastermind arrest announcement, which is not cited here — see qc
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Multi-year campaign by the Russian-speaking Carbanak / Anunak
  cluster (later separately tracked as FIN7) targeting up to
  100 financial institutions (most-affected countries per
  Kaspersky's infection telemetry: Russia, the US, Germany and
  China) with cumulative losses estimated as high as USD 1B.
  Tradecraft: spear-phishing delivery of the Carbanak / Anunak
  backdoor against bank employees, an average of two-to-four
  months of patient manual internal reconnaissance per bank,
  followed by use of the SWIFT network to transfer funds to
  criminal-controlled accounts, ATM cash-out via remote
  orchestration ("jackpotting"), and database-level adjustment
  of account balances. Kaspersky's February 2015 public
  disclosure was the first major exposure of the cluster.
quantified_impact:
  banks_targeted: 100  # Kaspersky: "up to 100 financial institutions"
  estimated_losses_usd: 1000000000  # Kaspersky: losses "could be as high as $1 billion"
  # countries_affected removed in audit: neither cited source states a total country
  # count (Kaspersky names only RU/US/DE/CN as most-affected); prior value 40 unsupported
false_flag_risk: none
operators_named:
  - kolpakov-andrii  # FIN7 / Carbanak, DOJ Aug 2018
  - fedorov-dmytro  # FIN7 / Carbanak, DOJ Aug 2018
  - hladyr-fedir  # FIN7 / Carbanak, DOJ Aug 2018
summary: |
  Foundational case in the AUSPEX criminal-baseline corpus.
  Carbanak / Anunak established the bank-intrusion-to-financial-
  theft tradecraft pattern that successor cluster FIN7 carried
  forward into PoS targeting and later ransomware-affiliate
  operations. The cluster spans the Russian-speaking criminal-
  underground but the indicted operator base (per DOJ 2018
  unsealings) was Ukrainian — no FSB-tolerance attribution has
  ever been published.
attributions:
  - actor_id: criminal/fin7
    attributing_org: Kaspersky + DOJ
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2015-02-16
    attribution_source_id: kaspersky/2015-02-16_carbanak-great-bank-robbery
    notes: |
      Kaspersky's original 2015 disclosure used the Carbanak label;
      Mandiant later separately tracked the cluster as FIN7 from
      ~2016. AUSPEX uses the FIN7 actor ID as the canonical
      successor identifier per Mandiant naming.
doctrine_links: []
targets:
  - target_id: sectors/finance/banking
    role: primary
  - target_id: sectors/finance/swift
    role: collateral
sources:
