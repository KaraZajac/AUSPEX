qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: partial
  notes: |
    Audited vs the raw sources (phantom/wrong-source remediation, "badrabbit" RE-SOURCE path).
    level: partial because the load-bearing disclosure/attribution source — the WaPo article
    (wapo/2014-08-22_usis-attribution) — is BOT-WALLED (curl HTTP 000; WebFetch HTTP 403 on
    2026-07-05), so its Aug-6-2014 disclosure + "officials say" attribution are only
    mirror-corroborated; every OTHER load-bearing claim is now hash-verified against three
    newly-captured snapshots.

    RE-SOURCE (STEP 0/0b): the two originally-cited sources were both un-snapshottable and one
    was the WRONG event. (1) wapo/... = the genuine USIS disclosure but bot-walled (kept, not
    hashed, mirror-corroborated). (2) reuters/2014-11-02_keypoint-breach = a real article about
    the KeyPoint contractor (a DISTINCT breach), NOT USIS — a wrong-event citation; reuters.com
    is also DataDome-walled (HTTP 401 captcha page). REMOVED it from sources[] and annotated its
    record as orphaned (it was the only event citing it). Added three reachable, snapshotted USIS
    sources: govexec/2014-09-10_opm-terminates-usis (sha 79ca44d4…05ac456d, 148,820 B),
    databreaches/2015-02-09_altegrity-bankruptcy-usis (sha b1fc0fe8…0b8dfc99, 158,664 B),
    infosecurity/2015-05-13_usis-sap-vector (sha b9a14e6a…f9ce3ed8, 103,157 B).

    [a] FACTS — now source-carried: USIS = largest fed background-check contractor ("had
    performed the bulk of background checks for federal security clearances", govexec; "the
    biggest commercial provider of background investigations to the federal US government",
    infosec); ~25,000 DHS/ICE/CBP personnel exposed (databreaches: "estimated 25,000 employees of
    the Department of Homeland Security, U.S. Immigrations and Customs Enforcement, and the U.S.
    Customs and Border Protection agency"); access "in late 2013", undetected "until June 2014"
    (infosec/Onapsis); OPM declined to renew contracts past "the September 30, 2014 expiration"
    (databreaches + govexec); Altegrity Chapter 11 Feb-2015 + "$304 million…22 percent of revenue"
    (databreaches). CORRECTIONS: (i) victim count 27,000 -> ~25,000 (the hashed source's figure +
    orchestrator note; kept "~27,000 federal" as a later/broader figure, hedged). (ii) STRIPPED the
    outcome/summary conflation that USIS "is generally treated as the contractor-pivot stage of the
    broader OPM operation that exfiltrated 22.1M SF-86 records via the parallel KeyPoint compromise"
    — factually muddled: it was the KeyPoint credential compromise, not USIS, that pivoted into OPM
    for the 22.1M SF-86 theft; USIS was a distinct ~25k-record contractor breach. Retained the
    campaign linkage as an explicitly-labelled AUSPEX assessment (campaign_id). (iii) initial_vector
    kept n-day but re-annotated: source says "likely…either an unpatched or zero-day SAP
    vulnerability" (Onapsis) — the prior "per subsequent litigation" was wrong (the SAP finding is
    Onapsis forensic analysis, not litigation).

    [b] ATTRIBUTION — modelled at the HEDGED/suspected level per guidance. Rewrote attributing_org
    from "US Intelligence Community (public attribution)" (overstated — there was no formal IC/DOJ
    attribution) to: USIS's own statement ("all the markings of a state-sponsored attack") + CFO
    court-filing ("state-sponsored data intrusion", databreaches) + press analogy to prior China
    intrusions ("Chinese hackers", infosec). Kept attributing_org_confidence: moderate (state-
    sponsored is moderately supported; the China nation-naming is press inference — hedged), added
    attribution_level: nation (a nation named but hedged; NO named-actor/unit in any source — the
    Deep Panda cluster is AUSPEX's assignment, not source-named), kept auspex_assessment:
    concur-with-caveat. Removed the "same MSS-Jiangsu-linked Deep Panda cluster" over-claim (the
    actor was demoted cn/mss->cn/unscoped 2026-06-24 precisely for lack of a service-naming source).

    [c] DATES — attribution_date 2014-08-22 -> 2014-08-06 (the cited WaPo URL is dated 2014/08/06;
    the "…08-22" was the source slug's stale date). disclosure_date 2014-08-06 confirmed (WaPo).
    end_date 2014-07-31 -> 2014-06-30 (unsourced -> "undetected until June 2014", Onapsis).
    start_date 2013-12-01 kept as the "late 2013" best estimate (re-annotated). New source
    published_on all verified from the snapshots (govexec 2014-09-10; databreaches 2015-02-09;
    infosec 2015-05-13).

    [d] DOCTRINE_LINKS — cn/mcf/bulk-pii-humint-enabling kept strongly_inferred (correct: bulk-PII-
    for-HUMINT is the dominant reading of a state-suspected theft of cleared/federal personnel PII,
    with the criminal/financial alternative weak; but NO source names MCF/the vetting goal, and the
    attribution is hedged — so not attested, not plausible). Re-pointed attesting_source_id +
    inference_basis.source_id from the bot-walled wapo to the hashed
    databreaches/2015-02-09_altegrity-bankruptcy-usis; rewrote the signal (removed the
    "contractor-pivot stage of the bulk-PII operation" conflation) and ruled_out. Pillar
    cn/mcf/bulk-pii-humint-enabling resolves in atlas/doctrines/cn/mcf.yaml.

    [e] ATTRIBUTION_LEVEL — added: nation (was missing).

    [f] ACTOR_ID — cn/unscoped/deep-panda resolves (file atlas/actors/cn/deep-panda.yaml carries
    id cn/unscoped/deep-panda). It is AUSPEX's working cluster for this campaign, not source-named
    for USIS — noted, not flagged as an actor-file defect. FLAG: target orgs/usis has no registry
    file (atlas/targets/orgs/usis.yaml absent) — same pre-existing informational orgs/ gap flagged
    for orgs/keypoint on the OPM event; left as-is (not created — outside audit mandate; verify_atlas
    treats orgs/ gaps as informational).

    RESIDUAL UNCERTAINTY: WaPo disclosure un-hashable (bot-walled) — hence level: partial; the
    n-day-vs-0-day SAP distinction is source-hedged ("either…or"); the ~25k vs ~27k figure reflects
    a DHS-only vs later federal-wide count; and the China nation-attribution is press-inferred, not
    government-confirmed. FLAG (orchestrator): reuters/2014-11-02_keypoint-breach is now orphaned —
    retire or repurpose to a future standalone KeyPoint event.
