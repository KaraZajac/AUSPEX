id: 2014-08/usis-contractor-breach
name: USIS background-investigation contractor breach
start_date: 2013-12-01
disclosure_date: 2014-08-06
end_date: 2014-07-31
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # SAP vulnerability per subsequent litigation
outcome_summary: |
  US Investigations Services LLC — the largest contractor
  conducting OPM background investigations for security
  clearance applicants — disclosed an intrusion affecting at
  least 27,000 DHS / federal personnel records. USIS lost its
  OPM contract in September 2014 and filed for bankruptcy in
  February 2015. The intrusion is generally treated as the
  contractor-pivot stage of the broader OPM operation that
  exfiltrated 22.1M SF-86 records via the parallel KeyPoint
  compromise.
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  USIS and KeyPoint Government Solutions — the two largest
  OPM background-investigation contractors — were compromised
  in the same operational window (late 2013 – mid 2014) by
  PRC-attributed operators. The USIS breach was the first
  publicly disclosed component; the subsequent June 2015 OPM
  disclosure absorbed the contractor compromises into the
  broader bulk-PII narrative. The combined operation produced
  the canonical MSS bulk-PII collection set on US cleared
  personnel.
attributions:
  - actor_id: cn/mss/deep-panda
    attributing_org: US Intelligence Community (public attribution)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-08-22
    attribution_source_id: wapo/2014-08-22_usis-attribution
    notes: |
      Public press attribution to PRC state operators citing IC
      officials; not tied to a DOJ indictment. Working cluster
      assignment is to the same MSS-Jiangsu-linked Deep Panda
      cluster that subsequent reporting attributed to the OPM
      and Anthem operations.
