id: 2014-08/usis-contractor-breach
name: USIS background-investigation contractor breach
start_date: 2013-12-01  # "late 2013" access per Onapsis forensic analysis (infosecurity/2015-05-13); exact date unknown — Dec-2013 is the best estimate
disclosure_date: 2014-08-06  # public disclosure (Washington Post, 6 Aug 2014)
end_date: 2014-06-30  # intrusion undetected "until June 2014" (Onapsis); the prior 2014-07-31 had no source — access window is ~late 2013 to detection in June 2014
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # SAP attack vector per Onapsis forensic analysis — "likely exploited either an unpatched or zero-day SAP vulnerability" (hedged: n-day is the conservative reading of "unpatched"; 0-day is the alternative)
outcome_summary: |
  The intrusion exposed the personal records of an estimated 25,000
  DHS / ICE / CBP personnel (some later reporting cited ~27,000 federal
  employees). After the breach, OPM declined to renew USIS's
  background-investigation contracts past their 30 September 2014
  expiration — vetting work that had brought in roughly $304M (~22% of
  revenue) — and USIS's parent, Altegrity Inc., filed for Chapter 11
  bankruptcy in February 2015.
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  US Investigations Services (USIS) — then the largest commercial
  provider of background investigations for US federal security
  clearances (it "had performed the bulk of background checks for
  federal security clearances") — was compromised by an intrusion that,
  per later Onapsis forensic analysis, "most likely utilized an SAP
  attack vector": the attackers "likely exploited either an unpatched
  or zero-day SAP vulnerability" to reach the network "in late 2013"
  and remained undetected "until June 2014." The breach exposed the
  personal details of an estimated 25,000 Department of Homeland
  Security, ICE and CBP personnel and was publicly disclosed on 6
  August 2014.

  Public attribution was HEDGED and largely victim-originated: USIS
  characterized the intrusion as having "all the markings of a
  state-sponsored attack" (its CFO later called it a "state-sponsored
  data intrusion" in the Altegrity bankruptcy court filing), and press
  reporting linked it by analogy to prior China-attributed intrusions
  ("Chinese hackers had roamed ... inside the network of USIS") — but
  there was NO formal US-government or DOJ attribution naming a Chinese
  service or actor. AUSPEX assigns the operation, as a working cluster,
  to the same Deep Panda / Black Vine (cn/unscoped) cluster it assigns
  to the contemporaneous OPM and Anthem thefts, and treats USIS as one
  component of the broader 2014–2015 PRC-attributed wave against US
  background-check / bulk-PII holders (campaign_id). NB (AUSPEX
  correction): USIS was a DISTINCT contractor compromise — it was the
  parallel KeyPoint credential compromise, not USIS, that served as the
  pivot into OPM for the 22.1M-record SF-86 theft.
attributions:
  - actor_id: cn/unscoped/deep-panda  # AUSPEX working-cluster assignment (shared with OPM/Anthem); NO cited source names Deep Panda for USIS. Actor demoted cn/mss->cn/unscoped 2026-06-24 (its sole source names no Chinese service).
    attributing_org: USIS company statement ("all the markings of a state-sponsored attack") + its CFO's bankruptcy court filing ("state-sponsored data intrusion"); press (WaPo "officials say"; Infosecurity) linked it to prior China-attributed intrusions — NOT a formal US-government / DOJ attribution
    attributing_org_confidence: moderate  # "state-sponsored" is moderately supported (victim + officials + court filing); the CHINA-specific naming is press inference by analogy — suspected/hedged
    attribution_level: nation  # press named a nation (China), hedged; USIS's own statement said only "state-sponsored". No named-actor/named-unit in any cited source — the Deep Panda cluster is AUSPEX's assignment, not source-named
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-08-06  # first public disclosure/attribution (WaPo, 6 Aug 2014); corrected from 2014-08-22 (the source slug's date — the cited WaPo article URL is dated 2014/08/06)
    attribution_source_id: wapo/2014-08-22_usis-attribution
    notes: |
      Public attribution was hedged and substantially victim-originated:
      USIS said the breach had "all the markings of a state-sponsored
      attack" and its CFO Jeffrey Campbell called it a "state-sponsored
      data intrusion" in the Altegrity bankruptcy court filing
      (databreaches/2015-02-09_altegrity-bankruptcy-usis); press linked
      it by analogy to prior China intrusions ("Chinese hackers had
      roamed ... inside the network of USIS" —
      infosecurity/2015-05-13_usis-sap-vector). There was NO formal
      US-government or DOJ attribution naming a Chinese service or actor.
      The cn/unscoped/deep-panda assignment is AUSPEX's working cluster
      (shared with the OPM/Anthem campaign events), NOT named by any
      cited source; the earlier "MSS-Jiangsu-linked" framing overstated
      it and was removed (the actor was itself demoted cn/mss->cn/unscoped
      on 2026-06-24 for lack of a service-naming source). The cited WaPo
      disclosure is bot-walled — see qc level: partial.
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/bulk-pii-humint-enabling
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A suspected state-sponsored intrusion into the largest US
      security-clearance background-check contractor, exfiltrating
      personnel PII on ~25,000 DHS/ICE/CBP staff, reads squarely as
      bulk-PII collection for HUMINT vetting — the same pattern as the
      contemporaneous OPM/Anthem thefts AUSPEX clusters with it. The
      label is strongly_inferred rather than attested because no cited
      source names Military-Civil Fusion or states a counterintelligence-
      vetting purpose (the sources say only "state-sponsored" and, by
      press analogy, "Chinese"); it is held no higher than inferred also
      because the China/state attribution itself is hedged/suspected.
    attesting_source_id: databreaches/2015-02-09_altegrity-bankruptcy-usis
    inference_basis:
      source_id: databreaches/2015-02-09_altegrity-bankruptcy-usis
      signals:
        - "The breach exposed personnel PII on an estimated 25,000 DHS/ICE/CBP staff held by the largest US security-clearance background-check contractor, characterized (by USIS's CFO, in a court filing) as a 'state-sponsored data intrusion' — a bulk-PII theft on cleared/federal personnel, the signature of the HUMINT-vetting collection pattern"
      ruled_out: "Military-Civil Fusion / a counterintelligence-vetting purpose by name — no cited source states the strategic goal (sources say only 'state-sponsored'); a purely-criminal/financial reading is weak given the target (federal background-check data, no monetization reported)"
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/usis  # FLAG: no registry file atlas/targets/orgs/usis.yaml (same informational gap flagged for orgs/keypoint on the OPM event); verify_atlas treats orgs/ gaps as informational, not a hard FK error
    country: us
    role: primary
    outcome: |
      ~25,000 DHS/ICE/CBP personnel records exposed; OPM declined to
      renew USIS's contracts (Sept 2014) and parent Altegrity filed
      Chapter 11 (Feb 2015).
