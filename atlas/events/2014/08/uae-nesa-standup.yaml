id: 2014-08/uae-nesa-standup
name: NESA stand-up — UAE establishes National Electronic Security Authority
start_date: 2014-08-01  # FLAG: NESA est. by UAE Federal Decree-Law No. 3 of 2012, NOT 2014 (2014 likely conflates the NESA IAS, ~2014); unsupported by cited source — see notes/qc
disclosure_date: 2014-08-01
end_date: 2014-08-01
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  Federal decree establishes the National Electronic Security
  Authority (NESA), later rebranded the Signals Intelligence
  Agency (SIA). NESA published the National Information Assurance
  Standards (NESA IAS) and served as the federal cybersecurity-
  authority predecessor to the Cyber Security Council (2020).
false_flag_risk: none
summary: |
  Institutional-doctrine anchor event. NESA's establishment
  marks the institutional consolidation of UAE state cyber
  authority that subsequently hosted the DarkMatter procurement
  relationship and the Project Raven customer-side tasking.
attributions: []
