    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      The NESA stand-up is plausibly an institutional precursor to
      the modern UAE federal cyber apparatus that the 2019 NCS
      represents. Label is plausible, not higher: the cited 2019 NCS
      does not mention NESA at all and was issued by the TRA (not
      under NESA's authority), so no source connects the two, and the
      institutional lineage (NESA 2012 -> TRA-issued NCS 2019 -> 2020
      Cyber Security Council) is an AUSPEX editorial inference, not
      source-attested.
    attesting_source_id: null
    inference_basis:
      alternatives:
