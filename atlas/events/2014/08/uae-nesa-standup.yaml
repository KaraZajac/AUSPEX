notes: |
  AUDIT FLAGS (2026-06-27): (1) DATE — NESA was established by UAE
  Federal Decree-Law No. 3 of 2012, not 2014; the 2014-08 anchor (and
  the "federal decree-law period" rationale) is unsupported and appears
  to conflate NESA's 2012 stand-up with the NESA IAS publication (~2014).
  The event is filed under the stable id 2014-08; re-dating/re-filing to
  2012 is an orchestrator decision. (2) SOURCE GAP — the sole cited
  source (the 2019 NCS) does not mention NESA, 2012/2014, the SIA
  rebrand, the IAS, or the 2020 CSC; the event's claims are corroborated
  only by external authoritative references (UAE Federal Decree-Law No. 3
  of 2012; Wikipedia "Signals Intelligence Agency"). A primary source for
  the 2012 NESA stand-up should be added.
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-27
  level: partial
  notes: |
    Audited vs the sole cited source u-ae/national-cybersecurity-strategy-2019
    (UAE NCS 2019), SNAPSHOTTED from the TRA full-text PDF
    (tdra.gov.ae/userfiles/assets/Lw3seRUaIMd.pdf; sha256 f8c46e22…5b930ad0,
    2,825,224 B) + the companion TRA NCSP/IA-framework PDF (vzjmlB3CM34.pdf;
    sha256 dd9767dc…c11fbbf7, 1,798,812 B). LEVEL=partial: the cited source
    does NOT carry the event's load-bearing claims; they are corroborated
    only via external authoritative references not yet in-corpus.

    [a] FACTS — UNSUPPORTED by the cited source. The 2019 NCS PDF is
    forward-looking (vision; 5 pillars: cybersecurity laws & regs, vibrant
    ecosystem, national cyber incident response plan, CIIP, partnerships;
    ~60 initiatives; TRA-issued) and never mentions NESA, the National
    Electronic Security Authority, any 2012/2014 date, a federal decree, the
    Signals Intelligence Agency, or the 2020 Cyber Security Council. The
    companion IA-framework PDF describes the UAE Information Assurance
    Standards (188 controls) but attributes them to TRA/"NCSA", gives no
    date, and also never names NESA. So none of the event's claims (NESA
    established by federal decree; later rebranded SIA; published the NESA
    IAS; predecessor to the 2020 CSC; hosted DarkMatter / Project Raven) are
    source-carried. The facts are nonetheless externally TRUE: NESA was
    created by UAE Federal Decree-Law No. 3 of 2012 (Wikipedia "Signals
    Intelligence Agency"; netsweeper legislation page; Lexis Middle East) —
    i.e. 2012, NOT 2014. The 2014 anchor appears to conflate NESA's 2012
    stand-up with the NESA IAS publication (~2014, per multiple compliance-
    vendor refs). Correction: start_date cannot change without re-filing the
    stable 2014-08 id/path (left to orchestrator); flagged inline + in notes;
    the misleading "federal decree-law period" comment corrected.

    [b] ATTRIBUTION — attributions: [] is correct (institutional/policy
    event, no perpetrator). No change.

    [c] DATES — event start/disclosure/end all 2014-08-01: unsupported and
    wrong-year (see [a]); flagged, not changed (stable id/path). SOURCE
    published_on corrected 2019-04-01 -> 2019-06-23 (TRA launched the NCS
    23 Jun 2019 per its press release; some reporting says 24 Jun). FLAG:
    doctrine ae/ncs-2019 (issued_on 2019-04-01) and sibling event
    2019-04/uae-ncs-publication still carry the April placeholder.

    [d] DOCTRINE_LINKS — one link to ae/ncs-2019. Downgraded
    strongly_inferred -> plausible and rewrote the reasoning: the prior
    rationale ("NESA ... under whose authority the 2019 NCS was published")
    is contradicted by the source — the NCS was issued by the TRA, not NESA.
    No source connects the 2012 NESA stand-up to the 2019 NCS doctrine, so
    the institutional-precursor link is an AUSPEX editorial inference; added
    inference_basis.alternatives. attested gate N/A (not attested;
    attesting_source_id stays null).

    [e] ATTRIBUTION_LEVEL — N/A (no attributions).

    [f] ACTOR_ID — N/A (no attributions).

    RESIDUAL: u.ae portal summary page was unreachable from the fetcher
