id: 2014-08/hacienda-programme-disclosure
name: HACIENDA — Snowden disclosure of GCHQ-led Five Eyes port-scanning programme
start_date: 2009-01-01  # earliest documented HACIENDA tasking in published slides
disclosure_date: 2014-08-15
end_date: null
incident_type:
  - reconnaissance
  - bulk-collection
initial_vector: unknown
outcome_summary: |
  Heise Online publication (Kirsch / Grothoff / Ermert / Appelbaum /
  Poitras / Moltke, 15 August 2014) of the Snowden-archive HACIENDA
  programme — agency-wide port-scanning of entire countries by GCHQ
  to enumerate exploitable services and identify "Operational Relay
  Boxes" (ORBs) for follow-on CNE staging. The cited article
  enumerates targeted services HTTP, FTP, SSH and SNMP (Figure 4).
  The Snowden documents identify GCHQ as the principal operator and
  the resulting scan database as shared across the Five Eyes (US,
  Canada, UK, Australia, New Zealand) via the MAILORDER transport
  protocol. ORB-hunting on the HACIENDA results is automated by
  CSEC's OLYMPIA tool and, at GCHQ, organised under the MUGSHOT
  programme.
false_flag_risk: none
summary: |
  HACIENDA is the canonical Snowden disclosure of Five Eyes
  pre-positioning reconnaissance at internet scale. The
  programme documents scanning 27 countries fully and additional
  countries selectively as of the published slides. Operational
  use was to identify both targetable victim infrastructure and
  third-party ORBs — compromised hosts in neutral jurisdictions
  that could be reused as launch infrastructure for CNE, masking
  the operational origin of attacks.

  Editorially this is one of the most-cited counter-arguments
  against the Five Eyes posture that bulk collection is
  passively defensive — HACIENDA is explicitly described in
  the Snowden material as enabling offensive CNE through ORB
  enumeration. The article also publishes a proof-of-concept
  "TCP Stealth" countermeasure (by the article's authors Julian
  Kirsch / Christian Grothoff, distributed as the "Knock" kernel
  patch) that defeats HACIENDA-style port enumeration — itself a
  small but documented entry in the post-Snowden hardening
  literature.

  Doctrinally this sits alongside TEMPORA and MUSCULAR as part
  of the upstream pre-positioning side of the joint GCHQ-NSA
  collection architecture, distinct from CNE-cluster operations
  like Op Socialist that exploit ORB infrastructure for follow-on
  collection.
