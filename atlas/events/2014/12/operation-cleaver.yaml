id: 2014-12/operation-cleaver
name: Operation Cleaver — Cylance disclosure of an Iran-based global infrastructure-targeting campaign
start_date: 2012-01-01
disclosure_date: 2014-12-02
end_date: 2014-12-02
incident_type:
  - intrusion
  - data-theft
  - pre-positioning
initial_vector: phishing
outcome_summary: |
  Cylance disclosed a two-year Iran-based campaign ("Operation
  Cleaver", run by a Tehran-based team Cylance named "Tarh
  Andishan") against critical-infrastructure targets in 16
  countries — Canada, China, England, France, Germany, India,
  Israel, Kuwait, Mexico, Pakistan, Qatar, Saudi Arabia, South
  Korea, Turkey, the UAE and the US — spanning airlines, airports,
  oil & gas, energy/utilities, transport, aerospace, defense,
  hospitals, telecommunications, chemical firms, government and
  universities (>50 entities). Specific victims named in the
  report / press coverage included the US Navy Marine Corps
  Intranet (NMCI), Calpine, Saudi Aramco, Pemex, Pakistan
  International Airlines, Korean Air and Qatar Airways. Cylance
  documented exfiltration of airport / gate credentialing data,
  VPN credentials, ID photos, passports, and facility-security
  material (network diagrams, blueprints, security codes) — i.e.
  intelligence-gathering and pre-positioning rather than active
  disruption. Cylance found no confirmed ICS/SCADA compromise but
  warned that "if the operation is left to continue unabated, it
  is only a matter of time before the world's physical safety is
  impacted by it."
false_flag_risk: none
summary: |
  Operation Cleaver is the canonical mid-decade Iran-based
  critical-infrastructure pre-positioning campaign — a doctrinal
  predecessor to APT33 (aerospace/energy 2015–2017) and the
  OilRig / APT34 long-tail. Cylance's attribution rests on
  Persian-language artifacts, Iranian (Tehran) hosting / domain
  registration via the front company "Tarh Andishan", and
  identified individual operators inside Iran; Cylance was
  careful NOT to assert the campaign was sanctioned by the
  Iranian government (CEO Stuart McClure separately stated his
  belief that the operators had "ties to" the IRGC, but the
  report itself names no Iranian service — hence the actor sits
  at ir/irgc/apt33). The "pre-positioning" framing in 2014
  predates the equivalent US-government framing applied to PRC
  Volt Typhoon (2023) by nearly a decade and is doctrinally
  load-bearing for Iranian cyber. NB: the assignment to the
  APT33 cluster is an AUSPEX working consolidation; Cylance's own
  actor name was "Tarh Andishan"/Cleaver and the cluster
  boundaries with APT33/OilRig remain unsettled.
attributions:
  - actor_id: ir/irgc/apt33
    attributing_org: Cylance
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-12-02
    attribution_source_id: cylance/2014-12-02_operation-cleaver
    notes: |
      Cylance named the actor a Tehran-based team it called "Tarh
      Andishan" (after the front company used for domain
      registration) and assessed it with high confidence as
      Iran-based / state-sponsored, but was explicitly cautious
      NOT to conclude the campaign was backed or sanctioned by the
      Iranian government and names NO Iranian service in the
      report (the "ties to the IRGC" line is CEO Stuart McClure's
      separately-stated belief, not a report attribution) — hence
      attribution_level: named-actor (cluster + Iran nexus, no
      named service) and the actor at ir/irgc/apt33.
      Subsequent vendor consolidation (FireEye) partially overlaps
      Cleaver targets and tradecraft with APT33 (Refined Kitten)
      and OilRig (APT34); cluster boundaries unsettled. Working
      assignment to APT33 is the best available actor slug; it is
      an AUSPEX consolidation, not Cylance's own naming.
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Cylance documents Iran-based pre-positioning inside civilian
      critical infrastructure across 16 countries and warns that
      "if the operation is left to continue unabated, it is only a
      matter of time before the world's physical safety is impacted
      by it" — corroborating, at the behaviour level, the
      asymmetric-coercion-of-civilian-CII pattern this pillar
      encodes. DOWNGRADED from attested (2026-06-25 audit): the
      pillar names an *Iranian state strategic purpose* (asymmetric
      coercion of adversary civilian CII as doctrine), but Cylance
      states no such purpose and was explicitly cautious NOT to
      conclude the campaign was state-backed; it attests the
      behaviour/capability, not the doctrinal goal — which is
      strongly_inferred, not attested, under the WHY-ladder.
    attesting_source_id: cylance/2014-12-02_operation-cleaver
    inference_basis:
      signals:
        - 'Cylance: pre-positioning / data exfiltration inside civilian critical-infrastructure entities (energy, transport, hospitals, telecom) across 16 countries, "only a matter of time before the world''s physical safety is impacted"'
        - Iran-based / Tehran-hosted operators (Tarh Andishan front company), Persian-language artifacts — an Iran-nexus actor whose mission profile matches the asymmetric-CII-coercion posture
        - Cleaver targets prefigure the documented Iranian CII pattern (2020 Israeli water OT, 2023-24 Aliquippa/Unitronics) the pillar enumerates
      ruled_out: |
        Pure economic / IP-import-substitution
        (ir/sanctions-evasion) does not fit Cleaver's breadth —
        airport-gate credentials, VPN creds, facility blueprints
        and security codes are pre-positioning-for-disruption
        collection, not industrial-IP theft; that strand is the
        forward-defense collection link below.
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/forward-defense
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targeting across 16 countries — including Saudi (Aramco),
      Pakistani and Qatari aviation, Korean Air, and Israeli /
      Gulf-rival infrastructure — fits Iran's forward-defense logic
      of collecting against and pre-positioning inside regional
      rivals and US allies long before kinetic confrontation; the
      forward-defense doctrine codified this pattern. Held at
      strongly_inferred (Cylance states no Iranian strategic
      purpose). Pillar set to null on 2026-06-25 audit: the prior
      proxy-projection pillar was a mismatch — Cleaver was a direct
      Tehran-team operation, not engagement *through proxies/partners*,
      which is what that pillar encodes.
    attesting_source_id: cylance/2014-12-02_operation-cleaver
    inference_basis:
      signals:
        - 'Cylance: victim set concentrated on regional rivals / US allies — Saudi Arabia (Aramco), Israel, the Gulf states (Qatar, UAE, Kuwait), Pakistan, South Korea — the canonical forward-defense adversary ring'
        - Pre-positioning collection (facility blueprints, security codes, transport/airport credentialing) against those adversaries is forward, deniable preparation consistent with fight-at-range doctrine
      ruled_out: |
        proxy-projection pillar ruled out — no proxy/partner
        intermediary; civilian-CII-coercion is the separate
        asymmetric-warfare link above.
    counter_explanation: null
    contested: false
    analyst: claude
