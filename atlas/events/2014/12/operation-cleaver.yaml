qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial
  notes: |
    Audited vs the sole cited source cylance/2014-12-02_operation-cleaver. SOURCE UNFETCHABLE:
    the report PDF URL (cylance.com/.../Cylance_Operation_Cleaver_Report.pdf) is link-rotted —
    Cylance was acquired and the domain 301-redirects to Arctic Wolf; the PDF URL returns a 200
    that is an HTML 404 app-shell (no report content), and the press-release URL redirects to
    arcticwolf.com/cylance. archive.org is BLOCKED for this audit, so no raw_snapshot/hash was
    added (the bad app-shell capture was discarded). The report's contents were instead
    corroborated against independent secondary coverage: Wikipedia (Operation Cleaver),
    Threatpost, The Hacker News, and CSO Online (all consistent). -> level: partial.
    FACTS (corroborated): 86-page report, ~2-year investigation, published 2014-12-02 (Business
    Wire dateline; CSO's "Dec 3" is the article date); >50 entities across 16 countries (Canada,
    China, England, France, Germany, India, Israel, Kuwait, Mexico, Pakistan, Qatar, Saudi
    Arabia, South Korea, Turkey, UAE, US); sectors = airlines/airports, oil & gas,
    energy/utilities, transport, aerospace, defense, hospitals, telecom, government, universities;
    named victims = NMCI, Calpine, Saudi Aramco, Pemex, Pakistan International Airlines, Korean
    Air, Qatar Airways; malware/infra = TinyZbot proprietary backdoor/botnet; actor = a
    Tehran-based team Cylance named "Tarh Andishan" (front company), "Cleaver" from custom-tool
    strings; pre-positioning framing = exfiltration of VPN creds, ID photos/passports,
    airport-gate credentialing, facility blueprints + security codes, with "only a matter of time
    before the world's physical safety is impacted" — NO confirmed ICS/SCADA compromise.
    ATTRIBUTION (key correction): Cylance attributed only "Iran-based"/"Tehran-based"/
    "state-sponsored" and was explicitly CAUTIOUS not to conclude state backing; it names NO
    Iranian service. The IRGC link is CEO Stuart McClure's separately-stated belief of "ties",
    NOT a report attribution. attribution_level = named-actor; actor correctly at
    ir/irgc/apt33 (demoted from ir/irgc 2026-06-24). published_on (2014-12-02) confirmed.
    CORRECTIONS: (1) NAME + summary + outcome_summary de-IRGC'd ("IRGC-attributed" -> "Iran-based",
    actor = Tarh Andishan/Cleaver, McClure-belief caveat added). (2) added attribution_level +
    rewrote the attribution note (Tarh Andishan, not "Tehran Team/IRGC-aligned"). (3) DOWNGRADED
    the ir/asymmetric-warfare/civilian-cii-coercion link attested -> strongly_inferred (Cylance
    attests the behaviour, not Iran's state strategic purpose; the cautious no-state-backing
    stance makes attested unsupportable) + added inference_basis. (4) ir/forward-defense pillar
    proxy-projection -> null (Cleaver was a direct Tehran-team op, not proxy/partner engagement)
    + added inference_basis + attesting_source_id. (5) FK FIX: the dangling org FKs orgs/calpine
    + orgs/nmci (no registry entries; referenced only here) converted to verified sector FKs;
    expanded the named-victim sector targets (Aramco/Pemex oil-gas, PIA/Korean Air/Qatar Airways
    aviation). All FKs (actor, doctrines, pillars, sectors, source) now resolve.
    UNCERTAINTY: primary source is single-vendor + link-rotted (corroborated via secondaries, not
    the PDF itself); APT33 cluster assignment is an AUSPEX consolidation (Cylance's own actor was
    Tarh Andishan), boundaries with APT33/OilRig unsettled; named victims modeled at sector level
    (no org-registry entries created — out of single-event scope).
