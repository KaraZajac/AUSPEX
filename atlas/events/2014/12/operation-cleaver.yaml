id: 2014-12/operation-cleaver
name: Operation Cleaver — Cylance disclosure of IRGC global infrastructure-targeting campaign
start_date: 2012-01-01
disclosure_date: 2014-12-02
end_date: 2014-12-02
incident_type:
  - intrusion
  - data-theft
  - pre-positioning
initial_vector: phishing
outcome_summary: |
  Cylance disclosed a two-year IRGC-attributed campaign
  ("Operation Cleaver") against critical-infrastructure targets
  in 16 countries: airlines, aerospace, energy/utilities, defense
  contractors, hospitals, telecommunications, chemical companies,
  and universities. Confirmed compromises included Calpine,
  Saudi Aramco airports, Pakistan International Airlines, Korean
  Air, Qatar Airways, Mexican government, Indian
  petrochemical/energy, Israeli aerospace, and US Navy Marine
  Corps Intranet (NMCI). Cylance documented exfiltration of
  airport-credentialing systems, SCADA documentation, and
  network-design diagrams — characterized as pre-positioning
  for future operations rather than immediate disruption.
false_flag_risk: none
summary: |
  Operation Cleaver is the canonical mid-decade Iranian
  critical-infrastructure pre-positioning campaign — the
  doctrinal predecessor to APT33 (aerospace/energy 2015–2017)
  and the OilRig / APT34 long-tail. Cylance's attribution rests
  on Persian-language artifacts, infrastructure overlap with
  prior Iranian persona operations, and identified individual
  operators inside Iran. The "pre-positioning" framing in 2014
  predates the equivalent US-government framing applied to PRC
  Volt Typhoon (2023) by nearly a decade and is doctrinally
  load-bearing for Iranian cyber.
attributions:
  - actor_id: ir/unscoped/apt33
    attributing_org: Cylance
    attributing_org_confidence: high
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-12-02
    attribution_source_id: cylance/2014-12-02_operation-cleaver
    notes: |
      Cylance attributed to "the Tehran Team" / IRGC-aligned
      operators. Subsequent vendor consolidation (FireEye)
      partially overlaps Cleaver targets and tradecraft with
      APT33 (Refined Kitten) and OilRig (APT34); cluster
      boundaries unsettled. Working assignment to APT33 is the
      best available actor slug.
