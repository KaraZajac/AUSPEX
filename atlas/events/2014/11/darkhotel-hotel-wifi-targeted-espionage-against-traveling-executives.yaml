summary: |
  Kaspersky Lab disclosed the DarkHotel APT, a long-running operation that compromised hotel networks to selectively serve malware to high-value guests via fake software updates as they connected to hotel Wi-Fi. The group combined precise hotel-network targeting of executives with broad peer-to-peer spreading and abused forged digital certificates from compromised certificate authorities to sign its implants. Targets were top executives in sectors such as electronics manufacturing, investment, pharmaceuticals, defense and energy policy, with around 90 percent of infections in Japan, Taiwan, China, Russia and South Korea. Kaspersky attributes the campaign to the DarkHotel APT, active for several years through 2014.
