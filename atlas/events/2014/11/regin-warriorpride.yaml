id: 2014-11/regin-warriorpride
name: Regin / WARRIORPRIDE — Five Eyes telecom-collection platform
start_date: 2003-01-01  # earliest samples
disclosure_date: 2014-11-24  # Symantec whitepaper
end_date: 2014-12-31
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  Long-haul SIGINT collection from telecom operators (notably
  Belgacom), EU institutions, governments, and individuals across
  14+ countries. GSM base-station monitoring modules. Active 2003–
  2014 prior to exposure.
false_flag_risk: none
summary: |
  Highly modular, multi-stage computer-network-exploitation platform.
  Named WARRIORPRIDE at NSA and DAREDEVIL at GCHQ per leaked
  documentation. Code-overlap with the QWERTY keylogger module
  documented in Snowden NSA documents established Five Eyes
  attribution. Symantec's Nov 2014 whitepaper and Kaspersky's Jan 2015
  Regin/QWERTY analysis triangulated the technical attribution; The
  Intercept (Jan 2015) connected to the Snowden archive.
