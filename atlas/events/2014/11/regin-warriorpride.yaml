id: 2014-11/regin-warriorpride
name: Regin / WARRIORPRIDE — Five Eyes telecom-collection platform
start_date: 2008-01-01  # Symantec: "used in systematic spying campaigns … since at least 2008"
disclosure_date: 2014-11-24  # Symantec Regin report (created 23 Nov, updated 24 Nov 2014)
end_date: 2014-12-31  # platform retired post-exposure (cf. actor active_until)
incident_type:
  - espionage
  - surveillance
initial_vector: unknown  # Symantec: "no reproducible vector had been found at the time of writing"
outcome_summary: |
  Long-haul SIGINT collection from telecom operators (notably
  Belgacom), EU institutions, governments, and private individuals
  across ten countries (Symantec telemetry). Included a mobile-
  telephone base-station-controller monitoring module. Active 2008–
  2011, withdrawn, then a second version from 2013 until public
  exposure in 2014.
false_flag_risk: none
summary: |
  Highly modular, multi-stage computer-network-exploitation platform.
  The Snowden documents refer to the cyber-weapons system as
  WARRIORPRIDE (the codename "the intelligence agencies" use per Der
  Spiegel / The Intercept). Code-overlap between Regin module 50251
  and the QWERTY keylogger published from the Snowden archive
  established the Five Eyes (GCHQ/NSA) attribution. Symantec's Nov 2014
  Regin report and Kaspersky's Jan 2015 Regin/QWERTY analysis
  triangulated the technical identity; Der Spiegel / The Intercept
  (Jan 2015) connected it to the Snowden archive and to GCHQ and the
  NSA.
attributions:
  - actor_id: uk/gchq/regin-operators
    attributing_org: Der Spiegel / The Intercept (Snowden archive) + Fox IT; technical clustering by Symantec + Kaspersky
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2015-01-27
    attribution_source_id: intercept/2015-01-27_regin-five-eyes
    notes: |
      CORRECTED ACTOR (2026-07-11): was us/nsa/equation-group — an
      AUSPEX-v0 placeholder. Regin / WARRIORPRIDE is a DISTINCT cluster
      from Equation Group (EquationDrug / GrayFish, Kaspersky Feb 2015);
      none of the three cited Regin sources name "Equation Group". The
      source-faithful actor is uk/gchq/regin-operators (canonical
      "Regin / WARRIORPRIDE Operators (GCHQ–NSA joint)", already verified
      2026-06-25), matching the sibling event
      2014-12/regin-eu-commission-disclosure. Der Spiegel / The Intercept
      names GCHQ (behind the Belgacom attack) and, via Fox IT's Ronald
      Prins, calls Regin "a tool belonging to the NSA and GCHQ"; NSA is
      the co-operator (us/nsa/tao via the actor's additional_service_ids).
      concur-with-caveat: Fox IT hedges ("appeared to be"), and Symantec
      (2014-11-24) named only a "nation-state", not the service — so
      attribution_source_id points to the Jan-2015 Snowden piece that
      actually names GCHQ/NSA, and attribution_date is 2015-01-27 (not the
      Nov-2014 platform-disclosure date). attribution_level named-unit:
      the specific services GCHQ and NSA are named as the tool's owners.
