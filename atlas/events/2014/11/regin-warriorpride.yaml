    pillar_id: null
    program_id: null
    confidence: attested
    perspective: attacker-rationale
    reasoning: |
      Der Spiegel / The Intercept's Snowden-archive reporting identifies
      the Regin platform as the Five-Eyes "Warriorpride" cyber-weapons
      system and its targets as Five-Eyes surveillance targets — the
      joint UK-US SIGINT-collection purpose the UK Five Eyes doctrine
      names. GCHQ is named as the British Five-Eyes partner (Belgacom);
      Fox IT assessed Regin as an NSA/GCHQ tool.
    inference_basis:
      source_quote: "There are many similarities with the cyber-weapons system that the intelligence agencies call \"Warriorpride\" in the Snowden documents. The targets thus far known are consistent with Five Eyes surveillance targets as outlined in the Snowden documents."
      source_id: intercept/2015-01-27_regin-five-eyes
    attesting_source_id: intercept/2015-01-27_regin-five-eyes
    contested: false
    analyst: claude
