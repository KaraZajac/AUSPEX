id: 2014-11/usps-breach
name: US Postal Service breach
start_date: 2014-09-01
disclosure_date: 2014-11-10
end_date: 2014-11-08
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  US Postal Service disclosed compromise of employee PII for
  approximately 800,000 current and former employees, plus
  customer call-center data for an estimated 2.9 million
  individuals. USPS attributed the intrusion to "a sophisticated
  actor"; IC and press attribution named PRC state-sponsored
  operators within days. The breach sits inside the broader
  2013–2015 PRC bulk-PII collection campaign that produced OPM,
  Anthem, USIS, and Premera.
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  USPS targeting is doctrinally distinctive: federal-employee
  PII at scale, but absent the SF-86 clearance-application
  specificity of OPM. The collection-value frame is enabling
  HUMINT and travel-pattern analytics on US federal personnel
  more broadly. No DOJ indictment.
attributions:
  - actor_id: cn/unscoped/deep-panda
    attributing_org: US Intelligence Community (press attribution)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-11-10
    attribution_source_id: wapo/2014-11-10_usps-china-attribution
    notes: |
      Press attribution sourced to IC officials. No DOJ
      indictment; cluster assignment to the same MSS-Jiangsu-
      linked Deep Panda / Black Vine collection set.
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/bulk-pii-humint-enabling
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Federal-employee PII at scale, in the same operational
      window as OPM/USIS, is part of the bulk-PII / HUMINT-
      enabling collection set.
    attesting_source_id: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/us-postal-service
    country: us
    role: primary
    outcome: |
      ~800,000 employee records + ~2.9M customer call-center
      records exfiltrated.
sources:
