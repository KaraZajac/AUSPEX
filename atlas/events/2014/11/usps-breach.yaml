id: 2014-11/usps-breach
name: US Postal Service breach
start_date: 2014-09-01
disclosure_date: 2014-11-10
end_date: 2014-11-08
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  US Postal Service disclosed compromise of employee PII —
  including Social Security numbers — for approximately 800,000
  current and former employees, plus customer call-center data
  (Customer Care Center contacts, Jan 1–Aug 16 2014) for an
  estimated 2.9 million individuals. USPS characterized the
  intrusion as the work of a "sophisticated actor". The intrusion
  was discovered in mid-September 2014. Attribution to "Chinese
  government hackers" was press/official-sourced suspicion (WaPo,
  Nakashima) at the nation level — USPS itself declined to name a
  responsible party and the source named no specific service or
  actor. The breach sits inside the broader 2013–2015 PRC bulk-PII
  collection campaign that produced OPM, Anthem, USIS, and Premera.
false_flag_risk: none
campaign_id: prc-bulk-pii-collection-wave
summary: |
  USPS targeting is doctrinally distinctive: federal-employee
  PII at scale, but absent the SF-86 clearance-application
  specificity of OPM. AUSPEX reads the collection value as
  enabling HUMINT and travel-pattern analytics on US federal
  personnel more broadly (the source does not state a purpose;
  this is an AUSPEX inference). No DOJ indictment, and the cited
  reporting names neither a specific actor nor a Chinese service.
attributions:
  - actor_id: cn/unscoped/deep-panda
    attributing_org: The Washington Post (Nakashima), citing US officials
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2014-11-10
    attribution_source_id: wapo/2014-11-10_usps-china-attribution
    notes: |
      The cited source attributes the breach to "Chinese government
      hackers" at the NATION level only ("China suspected"); US
      officials "declined to comment on who was thought to be
      responsible" and named no service or actor. The
      cn/unscoped/deep-panda assignment is an AUSPEX-curatorial
      cluster placement into the 2013–2015 PRC bulk-PII collection
      set (same window as OPM/USIS/Anthem/Premera) — NOT a
      source-stated identification, and NOT an MSS attribution (the
      actor record was demoted cn/mss → cn/unscoped on 2026-06-24
      because no cited source names a Chinese service). Hence
      attribution_level: nation and concur-with-caveat. No DOJ
      indictment.
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/bulk-pii-humint-enabling
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Federal-employee PII at scale, in the same operational
      window as OPM/USIS, is part of the bulk-PII / HUMINT-
      enabling collection set. The cited source does NOT state a
      strategic purpose (it notes only that a federal agency
      "would make a logical espionage target for China"), so this
      is inferred, not attested.
    attesting_source_id: null
    inference_basis:
      signals:
        - Bulk federal-employee PII (names, DOB, SSNs, addresses,
          employment dates) on ~800k current/former USPS staff —
          counterintelligence-grade data on US government personnel.
        - Same 2013–2015 collection window and victim profile
          (US-federal-personnel data) as OPM, USIS, Anthem, Premera —
          the canonical PRC bulk-PII / HUMINT-enabling campaign.
        - No financial monetization — USPS stated the actor was not
          after credit-card data or identity-theft fraud, consistent
          with intelligence collection rather than criminal use.
      ruled_out: |
        Financially-motivated criminal theft is the obvious competitor
        but is ruled out by the absence of payment-card targeting and
        USPS's own statement that the actor sought neither identity
        theft nor card fraud; the espionage/HUMINT-enabling reading is
        the only strong fit.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/us-postal-service
    country: us
    role: primary
    outcome: |
      ~800,000 employee records + ~2.9M customer call-center
      records exfiltrated.
sources:
