id: 2014-11/cable-wireless-gchq-partnership
name: Cable & Wireless / Vodafone Cable GCHQ partnership disclosure
start_date: 2008-01-01  # earliest documented partnership in archive
disclosure_date: 2014-11-20
end_date: null
incident_type:
  - bulk-collection
initial_vector: unknown
outcome_summary: |
  Disclosure (via Channel 4 News / Süddeutsche Zeitung / WDR and
  The Intercept, from the Snowden archive) that Cable & Wireless
  (acquired by Vodafone in July 2012 for ~$1.5bn, becoming Vodafone
  Cable) provided GCHQ with access to international fibre-optic
  cables under the carrier-partner codename GERONTIC, with a cable
  "access point" codenamed NIGELLA near GCHQ's Bude (Cornwall) base.
  GCHQ paid Cable & Wireless an annual lease (>£5m / $9m reported by
  The Intercept; "tens of millions of pounds" per Channel 4) and
  embedded a full-time GCHQ project-manager inside the company from
  February 2009; the company held regular meetings with GCHQ from
  2008 until at least 2010. Technical analysis (electrospaces) of
  the same documents places GERONTIC as the partner for 29 of the 63
  undersea cables GCHQ accessed in 2009 (~70% of GCHQ's cable-data
  access), and identifies an accompanying CNE program codenamed
  PFENNING ALPHA.
false_flag_risk: none
summary: |
  Companion disclosure to TEMPORA: where the June 2013 Guardian
  story established the existence of bulk fibre-optic interception,
  the November 2014 Channel 4 / SZ disclosures named the specific
  carrier partner and quantified the access (a substantial fraction
  of international transit cables landing in the UK). Reinforces
  the doctrinal frame of Five Eyes UKUSA partnership as
  fundamentally dependent on commercial-carrier cooperation.

  Vodafone declined to confirm or deny specific cooperation; the
  Investigatory Powers Act 2016 subsequently put bulk-interception
  warrant authority on statutory footing.
