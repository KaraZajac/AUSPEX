      Carrier-partnership SIGINT collection under the UKUSA
      framework. The cited Intercept / Channel 4 reports document
      the mechanism in detail — Cable & Wireless (GERONTIC) gave GCHQ
      cable access that "dramatically scale[d]-up the volume of
      internet data it collects from undersea cables" (the practical
      feedstock of UK bulk SIGINT) — and the uk/five-eyes doctrine
      record itself names the Cable & Wireless / Vodafone Cable
      partnerships as an operational expression of the UKUSA leg. But
      neither cited source states the Five-Eyes / second-party-sharing
      PURPOSE for this specific partnership (no NSA federated-query /
      TICKETWINDOW detail, unlike the TEMPORA Guardian source that
      earns attested), so the UKUSA-contribution reading is inferred,
      not stated → strongly_inferred.
