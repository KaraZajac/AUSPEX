  notes: |
    Canonical Snowden disclosure of GCHQ's Cable & Wireless (codename
    GERONTIC) undersea-cable interception partnership. SOURCING DEFECT FOUND
    AND FIXED: the event previously cited only spiegel/2014-12-28_belgacom-bics-grx
    (a Belgacom/BICS/GRX + NSA-cyber-prep story; verified raw snapshot contains
    Five Eyes x7 / GRX x2 / Belgacom x1 but Cable&Wireless/Vodafone/GERONTIC/
    NIGELLA/GCHQ all x0) plus intercept/snowden-archive (a generic SIDtoday
    index naming no specific op) — neither documents this event's facts. Added
    the two authoritative primary sources the event text already named:
    intercept/2014-11-20_vodafone-gchq-gerontic (Ryan Gallagher, The Intercept,
    20 Nov 2014) and channel4/2014-11-20_spy-cable-gchq (the lead-outlet report
    of the joint Channel 4 / Süddeutsche Zeitung / WDR investigation). Re-pointed
    attribution_source_id and the doctrine-link attesting/inference source from
    the Spiegel story to the Intercept primary. Kept Spiegel (supports the Five
    Eyes framing) + snowden-archive (provenance).

    FACTS verified verbatim against captured raw snapshots + electrospaces
    technical analysis: GERONTIC = Cable & Wireless (Intercept: "designated it
    the codename Gerontic"; Channel 4 x2; electrospaces); Vodafone bought C&W
    July 2012 for ~$1.5bn → Vodafone Cable; NIGELLA cable access point near
    Bude, Cornwall (Skewjack Farm, C&W↔Reliance cable intersection per
    electrospaces); GCHQ paid >£5m/$9m annual lease (Intercept) / "tens of
    millions" (Channel 4); full-time embedded GCHQ project-manager from Feb 2009;
    regular C&W↔GCHQ meetings 2008–2010 (basis for start_date 2008); 29 of 63
    cables / ~70% of GCHQ's 2009 cable access via GERONTIC (electrospaces).
    CORRECTION to outcome_summary: the previously-asserted per-carrier codenames
    "PFENNING, LITTLE, STREETCAR" were not all corroborated — PFENNING is real
    but is PFENNING ALPHA, an accompanying CNE program (not a per-carrier
    cable name); LITTLE and STREETCAR could not be verified in any consulted
    source, so they were removed rather than asserted as fact (conservative,
    no fabrication). published_on/disclosure_date 2014-11-20 CONFIRMED.

