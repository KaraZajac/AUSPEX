  notes: |
    HISTORICAL / canonical Sony Pictures hack (Nov 2014, "Guardians of Peace"). Audited vs
    three govt-primary sources; two snapshotted+hashed, one (DOJ 2018) bot-walled → level
    partial (STEP 2 bot-wall rule), though every retained claim is independently carried by
    the two captured sources.

    SNAPSHOTS
    - FBI 2014-12-19 "Update on Sony Investigation" — CAPTURED, sha256 aa13b731...4d7221f1,
      71117 bytes (HTTP 200, genuine FBI press release).
    - DOJ 2018-09-06 Park Jin Hyok complaint — BOT-WALLED (justice.gov Akamai bm-verify
      interstitial; 2586-byte challenge page, sha 487aa7c9...cdd09fc4 = NOT the article, hash
      NOT recorded as content). Corroborated, not captured.
    - DOJ 2021-02-17 superseding indictment — ADDED to sources[]. Press-release mirror already
      on disk, sha 4e3209c4...f98b8f21 (33126 B, re-verified matching); charging-doc PDF sha
      87b280f1...b79b83e5b2 (334671 B). Both readable; verbatim carry the Sony motive + the two
      added officers + RGB.

    [a] FACTS — CORRECTIONS. Stripped claims no cited source carries:
      - "(Destover)" wiper name: 0 hits across FBI / DOJ-2021 PR / DOJ-2021 PDF; industry name
        (Symantec/Kaspersky), not in cited sources. Removed from prose.
      - "SMB-spreading" (of the Sony wiper): the only "SMB" in the indictment is the Brambul
        worm's SMB propagation (a DIFFERENT DPRK tool), not the Sony wiper. Removed.
      - "Approximately 3,000 systems wiped" / quantified_impact.systems_wiped=3000: no cited
        source gives 3,000; FBI says only "thousands of SPE's computers inoperable." Softened to
        "thousands"; integer removed.
      - ">100TB exfiltrated" / data_exfiltrated_tb=100: no cited source; the only "100" in the
        indictment is a $100,000 crypto extortion of a DIFFERENT victim. Removed; kept
        qualitative "large-scale theft of confidential data" (FBI: "large quantities of ...
        data").
      - "~$35M cleanup" / usd_cleanup_estimate=35000000: no cited source; the indictment's "35"s
        are paragraph numbers. Removed the whole quantified_impact block.
      RETAINED (all source-carried): destructive / data-deletion malware rendering thousands of
      SPE computers inoperable (FBI); theft of proprietary info + employee PII + confidential
      comms (FBI); public dissemination of the stolen data / "publicly disseminate the victim's
      confidential internal information" (DOJ indictment); GOP persona + threats vs SPE,
      employees and theaters (FBI); spear-phishing initial access (DOJ: "computer intrusions
      often started with ... spear-phishing messages"); The Interview / AMC Theatres targeting
      (DOJ). incident_type [destructive,wiper,data-theft] -> [intrusion,destructive,wiper,
      data-theft,leak,extortion] — each newly-added type now carried.

    [b] ATTRIBUTION. FBI 2014 attributes at NATION level only ("the North Korean government is
    responsible"); names no group/unit and does NOT cite the film -> attribution_level: nation.
    DOJ 2018 (Park Jin Hyok, Lab 110) and DOJ 2021 (adds Jon Chang Hyok + Kim Il, names the RGB,
    equates group with Lazarus/APT38) are named-unit -> added a THIRD attribution entry for DOJ
    2021 and set attribution_level: named-unit on both DOJ entries. All high / concur, unchanged.

    [c] DATES. published_on all correct (FBI 2014-12-19; DOJ 2018-09-06; DOJ 2021-02-17). Event
    start=disclosure 2014-11-24 (late-Nov detonation / public GOP splash; FBI "In late
    November"); end 2014-12-25 (The Interview limited release). No conflation.

    [d] DOCTRINE. kp/juche/internal-security was attested TO THE FBI SOURCE — OVER-ATTESTED: the
    FBI statement never names The Interview or a retaliation motive (verified: 0 hits for
    "Interview" / "retaliat" / "Kim Jong" / "assassinat"); it names only coercion — "intended to
    ... suppress the right of American citizens to express themselves." The retaliation-for-The-
    Interview GOAL is stated by the DOJ, so KEPT confidence=attested but RE-POINTED
    attesting_source_id FBI -> doj/2021-02-17 (readable+hashed), rewrote the reasoning, and added
    inference_basis.source_quote. kp/byungjin kept plausible (temporal / institutional-capability
    link; op is narrative-defense not revenue) — reasoning tightened + inference_basis.
    alternatives added.

    [e] ATTRIBUTION_LEVEL — added on all three entries (nation / named-unit / named-unit).

    [f] ACTOR — kp/rgb/lazarus resolves (atlas/actors/kp/lazarus.yaml); recently audited & kept
    at kp/rgb on four RGB-naming sources. No actor change.

    FLAGS
