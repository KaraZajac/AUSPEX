id: 2014-11/sony-pictures
name: Sony Pictures Entertainment destructive attack
start_date: 2014-11-24
disclosure_date: 2014-11-24
end_date: 2014-12-25
incident_type:
  - intrusion
  - destructive
  - wiper
  - data-theft
  - leak
  - extortion
initial_vector: phishing
outcome_summary: |
  Spear-phishing-enabled destructive-wiper intrusion plus
  large-scale theft of confidential data against Sony Pictures
  Entertainment, conducted under the "Guardians of Peace" (GOP)
  persona. Per the FBI, the attack deployed destructive /
  data-deletion malware that rendered thousands of SPE computers
  inoperable and stole proprietary information, employee PII and
  confidential communications; the actors then publicly
  disseminated the stolen data and issued threats against SPE,
  its employees, and theaters distributing its films. The
  extortive campaign opposed the release of The Interview; the
  film's wide theatrical release was curtailed in favor of a
  limited / online release. (The widely-reported ~3,000-systems,
  >100TB and ~$35M figures are NOT carried by the cited primary
  sources and were removed — see qc notes.)
false_flag_risk: none
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110; DOJ 2018 complaint + 2021 superseding indictment (both cited)
  - jon-chang-hyok  # DPRK RGB; DOJ 2021 superseding indictment (now cited)
  - kim-il  # DPRK RGB; DOJ 2021 superseding indictment (now cited)
summary: |
  First US-government-attributed nation-state destructive attack
  on a US private company. The FBI's December 19 2014 public
  attribution held the North Korean government responsible and
  characterized the attack as destructive and coercive —
  "intended to inflict significant harm on a U.S. business and
  suppress the right of American citizens to express themselves"
  — but named no specific group and did not cite the film. The
  retaliation-for-The-Interview motive (a comedic film depicting
  Kim Jong Un's assassination) was stated by the DOJ: the 2018
  Park Jin Hyok complaint and the 2021 superseding indictment,
  which describe "the destructive cyberattack on Sony Pictures
  Entertainment in November 2014 in retaliation for 'The
  Interview'" and the related December 2014 targeting of AMC
  Theatres.
