id: 2014-11/sony-pictures
name: Sony Pictures Entertainment destructive attack
start_date: 2014-11-24
disclosure_date: 2014-11-24
end_date: 2014-12-25
incident_type:
  - destructive
  - wiper
  - data-theft
initial_vector: phishing
outcome_summary: |
  Spear-phishing-delivered SMB-spreading wiper (Destover) plus
  large-scale data exfiltration against Sony Pictures
  Entertainment, presented publicly under the "Guardians of
  Peace" persona. Approximately 3,000 systems wiped; >100TB
  exfiltrated and progressively leaked. Sony cancelled then
  released The Interview to limited theaters; estimated cleanup
  cost >$35M.
quantified_impact:
  systems_wiped: 3000
  data_exfiltrated_tb: 100
  usd_cleanup_estimate: 35000000
false_flag_risk: none
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Sep 2018 complaint + Feb 2021 indictment
  - jon-chang-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
  - kim-il  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
summary: |
  First US-government-attributed nation-state destructive attack
  on a US private company. FBI public attribution December 19
  2014 framed the operation as DPRK retaliation for the planned
  release of The Interview, a comedic film depicting Kim Jong
  Un's assassination. Forms the basis of the 2018 Park Jin Hyok
  DOJ complaint.
