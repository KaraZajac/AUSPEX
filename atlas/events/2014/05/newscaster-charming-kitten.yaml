id: 2014-05/newscaster-charming-kitten
name: Newscaster / Charming Kitten LinkedIn social-engineering campaign
start_date: 2011-01-01
disclosure_date: 2014-05-29
end_date: 2014-05-31
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing  # social-engineering via fake LinkedIn personas
outcome_summary: |
  iSIGHT Partners (now part of Mandiant) disclosed a three-year
  social-engineering campaign by an IRGC-attributed actor cluster
  ("Newscaster") that established a network of at least 14
  fictitious LinkedIn personas (purporting to be journalists,
  defense contractors, and US military) to phish more than 2,000
  targets — primarily senior US, UK, and Israeli defense, defense-
  industrial, and policy figures. Subsequent vendor reporting
  consolidated Newscaster with the broader Charming Kitten / APT35
  cluster.
false_flag_risk: none
summary: |
  Newscaster is the canonical foundational case in Iranian
  social-engineering tradecraft. The campaign predates the
  Sands Casino destructive attack (2014) by years and
  demonstrates the persistent IRGC-aligned collection posture
  against US/UK/Israeli defense and policy targets. APT35 /
  Charming Kitten as an actor cluster originates here; subsequent
  Citizen Lab and Microsoft work over 2014–2024 builds on this
  disclosure.
attributions:
  - actor_id: ir/irgc/apt35
    attributing_org: iSIGHT Partners (now Mandiant / Google Cloud)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2014-05-29
    attribution_source_id: isight/2014-05-29_newscaster
    notes: |
