id: 2014-05/newscaster-charming-kitten
name: Newscaster / Charming Kitten LinkedIn social-engineering campaign
start_date: 2011-01-01
disclosure_date: 2014-05-29
end_date: 2014-05-31
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing  # social-engineering via fake LinkedIn personas
outcome_summary: |
  iSIGHT Partners (now part of Mandiant) disclosed a three-year
  social-engineering campaign by Iran-based actors ("Newscaster")
  that established a network of at least 14 fictitious personas
  (purporting to be journalists, government, and defense
  contractors) across LinkedIn, Facebook, Twitter, Google+ and a
  fake journalism site (NewsOnAir.org) to connect with and phish
  more than 2,000 targets — senior US military and diplomatic
  personnel, members of Congress, DC-area journalists, think tanks,
  and US/Israeli defense contractors, plus UK and Saudi figures.
  iSIGHT could NOT confirm Iranian-government sponsorship in 2014
  (it assessed the actors were located in Iran); the IRGC
  attribution is from later vendor consolidation that folded
  Newscaster into the broader Charming Kitten / APT35 cluster.
false_flag_risk: none
summary: |
  Newscaster is the canonical foundational case in Iranian
  social-engineering tradecraft. The campaign predates the
  Sands Casino destructive attack (2014) by years and
  demonstrates the persistent IRGC-aligned collection posture
  against US/UK/Israeli defense and policy targets. APT35 /
  Charming Kitten as an actor cluster originates here; subsequent
  Citizen Lab and Microsoft work over 2014–2024 builds on this
  disclosure.
attributions:
  - actor_id: ir/irgc/apt35
    attributing_org: iSIGHT Partners (now Mandiant / Google Cloud)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2014-05-29
    attribution_source_id: isight/2014-05-29_newscaster
    notes: |
      iSIGHT 2014 reached only NATION level: it attributed to actors
      "located in Iran" and stated it could not confirm whether the
      hackers had ties to the Iranian government (verified against
      SecurityWeek 2014-05-29 + the Operation Newscaster record).
      It did NOT name the IRGC or any Iranian service. The
      ir/irgc/apt35 actor_id is the later consolidated cluster
      identity: subsequent vendor work (FireEye, ClearSky, CertFA,
      Microsoft Mint Sandstorm CII) folds Newscaster into APT35 /
      Charming Kitten with IRGC attribution; Newscaster is carried
      as an `equivalent` alias on that actor. AUSPEX concurs with
      the modern IRGC-cluster attribution, not with a 2014
      service-level claim iSIGHT never made.
