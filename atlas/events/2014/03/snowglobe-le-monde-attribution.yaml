id: 2014-03/snowglobe-le-monde-attribution
name: Le Monde / CSEC Snowden disclosure of Snowglobe (French cyber-espionage operation)
start_date: 2014-03-21
disclosure_date: 2014-03-21
end_date: 2014-03-21
incident_type:
  - documentary
  - espionage
initial_vector: unknown
outcome_summary: |
  Le Monde publication (Jacques Follorou, Martin Untersinger) of
  "Quand les Canadiens partent en chasse de Babar — la piste
  française du cyberespionnage", drawing on Communications
  Security Establishment Canada (CSEC) slides from the Snowden
  archive. The slides documented a French-attributed
  cyber-espionage cluster codenamed Snowglobe (sub-clusters
  Snowglobe-A and Snowglobe-B per CSEC). First public attribution
  of any French offensive cyber operation to French government
  sources, albeit via Canadian intelligence reporting rather than
  French acknowledgment.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  AUSPEX records this as a documentary event because the
  publication itself was the strategically significant moment:
  the first time a mainstream press source attributed a coherent
  cluster of cyber-espionage activity to French intelligence. The
  underlying CSEC analysis dates earlier and references
  Snowglobe activity from approximately 2009 onward. France has
  never officially acknowledged Snowglobe; subsequent vendor
  research (ESET, G Data, Cyphort, Kaspersky in 2014-2015)
  corroborated the cluster technically by reverse-engineering the
  Babar, Casper, Bunny, and Dino implants and joining them to the
  Animal Farm family.
