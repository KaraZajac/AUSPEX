  notes: |
    Audited against the two cited sources. Der Spiegel (PRIMARY, tier-1) fetched in FULL
    and snapshotted: sha256 934e0aa8…ee4b1d8f, 612,500 bytes. NYT (SECONDARY) is DataDome-
    bot-walled — an unauthenticated fetch returns HTTP 200 with a 774-byte captcha stub, not
    the article; no hash recorded. Load-bearing primary source captured; NYT-only quotes
    corroborated in substance by the co-disclosing Der Spiegel + universal public record →
    level: partial.

    [a] FACTS — core claims carried by captured Der Spiegel VERBATIM: operation name
    "Shotgiant" ('referred to internally as "Shotgiant"'); NSA start "at the beginning of
    2009" / email collection "beginning in January 2009"; Shenzhen HQ network infiltration;
    leadership-comms collection "including messages from company CEO Ren Zhengfei and
    Chairwoman Sun Yafang"; "secret source code of individual Huawei products"; "a list of
    1,400 customers." Counter-PRC-SIGINT rationale verbatim: "we want to make sure that we
    know how to exploit these products" + "Huawei's widespread infrastructure will provide
    the PRC ... with SIGINT capabilities." NOT-economic-espionage claim verbatim (NSA
    spokeswoman Hayden): "We do not give intelligence we collect to US companies to enhance
    their international competitiveness." NYT-only claims (kept, explicitly attributed to NYT
    in-text): the "TAO" unit-name, the Huawei–PLA-ties goal, exploitation of Huawei gear in
    third-country networks, and the "plans and intentions of the PRC" quote — NYT bot-walled,
    corroborated in substance by Der Spiegel's exploit-products/SIGINT rationale. CORRECTIONS:
    added Sun Yafang + 1,400-customers detail (Spiegel-carried); re-anchored outcome_summary
    rationale on the captured Spiegel quotes; explicitly marked the NYT-only quote as
    NYT-reported.

    [b] ATTRIBUTION — NSA attribution is high-confidence documentary (Snowden archive; joint
    SPIEGEL+NYT). Der Spiegel names "the NSA" and "a special unit with the US intelligence
    agency"; the specific "NSA TAO" naming is NYT-carried (bot-walled) but universally
    documented. Set attributing_org = "New York Times & Der Spiegel (Edward Snowden
    documents)"; attributing_org_confidence high (KEPT); auspex_assessment concur-with-caveat
    (KEPT). Switched attribution_source_id nyt→spiegel (ground on captured primary source).

    [c] DATES — start_date 2009-01-01 now source-confirmed (Spiegel: "beginning of 2009" /
    "January 2009"), comment updated. disclosure_date 2014-03-22 confirmed (Spiegel pub date;
    joint disclosure). CORRECTION: end_date 2014-03-22 → null — the old value conflated
    op-end with the disclosure date; no source bounds the operation's end (Snowden docs are a
    c.2009-2010 snapshot).

    [d] DOCTRINE — single link us/title-10-title-50, KEPT strongly_inferred (NOT upgraded to
    attested): the captured source DOES state the SIGINT-collection purpose, but
    title-10-title-50 is a statutory-authority backstop, not a strategic-goal doctrine, so
    attested is not warranted. Added attesting_source_id spiegel/2014-03-22_huawei-nsa (as the
    primary supporting source per schema) + inference_basis {signals[], ruled_out}. No
    more-specific 2009-era US operational doctrine exists (Defend Forward / NSPM-13 /
    persistent engagement are all 2018+); the requested "supply-chain-intel / counter-China
    SIGINT" character is captured in the reasoning, not a separate doctrine slug (none exists).
    perspective = attacker-rationale (default; us actor + us doctrine, same-state).

    [e] ATTRIBUTION_LEVEL — set named-unit (was absent): op attributed to NSA TAO (NYT names
    TAO; captured Spiegel names the NSA + "a special unit"). Caveat recorded in the attribution
    notes that the unit-level naming rests on the co-disclosing (bot-walled) NYT.

    [f] ACTOR_ID — us/nsa/equation-group resolves (atlas/actors/us/equation-group.yaml,
    id us/nsa/equation-group, primary_service us/nsa/tao → state us; directionality
    US-attacker is CORRECT, NOT inverted). KEPT per corpus convention (Equation Group =
    canonical NSA-TAO umbrella actor). FLAG for Kara: no SHOTGIANT source names the Kaspersky
    "Equation Group" cluster (a 2015 malware-cluster coinage) — the sources name "the NSA" /
    "a special unit" (Spiegel) and "NSA TAO" (NYT). A case exists to route this pre-2015 TAO
    CNE op to us/nsa/tao-sub-units or a bare us/nsa/tao service-actor; left as-is to respect
    the established convention.

    DIRECTIONALITY VERIFIED: US (NSA) = attacker; China / Huawei = victim (targets stamped
    country: cn). Not inverted.

