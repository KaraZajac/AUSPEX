id: 2014-03/operation-shotgiant-huawei
name: Operation Shotgiant — NSA TAO targeting of Huawei HQ
start_date: 2009-01-01  # operational date estimated
disclosure_date: 2014-03-22  # NYT / Der Spiegel
end_date: 2014-03-22
incident_type:
  - intrusion
initial_vector: unknown  # TAO network exploitation
outcome_summary: |
  Collection on Huawei HQ leadership communications (including founder
  Ren Zhengfei) and on Huawei product source code. Internal NSA
  rationale per Snowden documents: assess Huawei's links to the PLA
  and prepare to exploit Huawei equipment when deployed in foreign
  networks ("If we can determine the company's plans and intentions,
  we hope that this will lead us back to the plans and intentions of
  the PRC").
false_flag_risk: none
summary: |
  NSA TAO operation against Huawei's Shenzhen HQ disclosed via Snowden
  documents in March 2014 (NYT Sanger/Perlroth and Der Spiegel,
  simultaneously). Counter-PRC SIGINT objective rather than economic-
  espionage-for-US-industry (the latter framing was explicitly
  rejected in subsequent NSA statements).
