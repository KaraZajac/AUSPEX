initial_vector: phishing
outcome_summary: |
  This record combines two 2017 APT32 disclosures. FireEye's 14 May
  2017 report named APT32 / OceanLotus as a cluster "aligned with
  Vietnamese government interests" and documented targeting of foreign
  corporations with Vietnam business interests, foreign governments
  (a Western country's national legislature in 2014; Philippine
  government employees in 2017), Vietnamese media, and Vietnamese
  dissidents, journalists and the diaspora — using ActiveMime (.mht)
  spear-phishing lures with macros, the WINDSHIELD / KOMPROGO /
  SOUNDBITE / PHOREAL backdoors, and Cobalt Strike BEACON. FireEye's
  report does not mention ASEAN, Cambodia or Laos. Volexity's 6
  November 2017 "OceanLotus Blossoms" report separately mapped a 100+
  site watering-hole network whose government victims include the ASEAN
  organisation (asean.org), Cambodian government bodies (Ministry of
  Foreign Affairs and others), Lao ministries, and Philippine sites
  (Armed Forces of the Philippines, Office of the President), alongside
  Chinese state-oil firms and — the majority of victims — 80+
  Vietnamese anti-government civil-society sites. Neither source
  documents a "Cambodia People's Party" victim, a Philippine "foreign
  ministry", a KerrDown loader, or CACTUSTORCH / RTF tradecraft (all
  previously asserted in this record and removed — see qc notes).
false_flag_risk: none
summary: |
  RETIRE/MERGE CANDIDATE — a 2014-dated "retrospective" fragment that
  duplicates two already-canonical APT32 events and adds no source of
  its own. Its FireEye 2017 content is carried in full by
