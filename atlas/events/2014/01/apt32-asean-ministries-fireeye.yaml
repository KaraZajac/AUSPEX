  watering-hole content is carried in full by
  2017-11/volexity-oceanlotus-asean-watering-hole (with the Cambodian
  slice at 2018-03/apt32-cambodia-watering-hole). APT32's targeting of
  ASEAN and neighbour-state governments is real and firsthand-documented
  by Volexity, but this event's distinctive framing rested on fabricated
  tradecraft (KerrDown, CACTUSTORCH) and an unsupported Cambodia
  People's Party / Philippine-foreign-ministry victim set, now stripped.
