id: 2014-01/apt32-asean-ministries-fireeye
name: APT32 / OceanLotus sustained targeting of ASEAN foreign ministries (FireEye / Mandiant retrospective)
start_date: 2014-01-01
disclosure_date: 2017-05-14
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  FireEye's May 2017 APT32 disclosure documented a multi-year
  targeting pattern against Southeast Asian government, foreign-
  ministry, and dissident targets, with a particular emphasis on
  the Cambodian Cambodia People's Party, ministries in the
  Philippines, and other ASEAN foreign-ministry equities. Activity
  ran continuously from at least 2014. APT32 used the KerrDown
  loader, weaponized RTF documents (the CACTUSTORCH JS framework),
  and Cobalt Strike beacons to maintain access for collection on
  regional political and security positions.
false_flag_risk: none
summary: |
  Retrospective FireEye/Mandiant documentation of APT32's regional
  political-collection lane — distinct from the better-publicized
  automotive cluster. The ASEAN-foreign-ministry targeting is the
  most strategically significant Vietnamese cyber activity in
  doctrinal terms: it operationalizes Hanoi's neighbor-monitoring
  posture under Resolution 29-NQ/TW's regime-stability framing and
  reflects Communist Party of Vietnam concerns about Cambodia's
  drift toward Beijing and ASEAN deliberations on the South China
  Sea.
