start_date: 2014-01-01  # FireEye dates APT32 targeting of foreign governments/dissidents to "since at least 2013" and corporate targeting to "since at least 2014"; the ASEAN watering-hole segment (Volexity) is "since late 2016". No 2014-01 source exists — the id date-path is a slug misnomer (see notes).
