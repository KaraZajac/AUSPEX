id: 2014-01/apt33-saudi-korea-aerospace
name: APT33 persistent intrusions against Saudi / South Korean aerospace and petrochemicals
start_date: 2014-01-01
disclosure_date: 2017-09-20  # FireEye public report
end_date: 2015-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Persistent espionage access to Saudi and South Korean
  aerospace and petrochemical firms via aerospace-themed
  spearphish and DROPSHOT / SHAPESHIFT droppers. Aerospace IP
  collection assessed to support Iranian import-substitution.
false_flag_risk: none
summary: |
  Vendor attribution only (FireEye / Mandiant 2017 report); no
  US indictment specific to this campaign. Confidence medium-high
  per dossier. APT33 delivered recruitment-themed spear-phishing
  with malicious .hta files masquerading as Boeing, Alsalam
  Aircraft, Northrop Grumman, and Vinnell Arabia job postings,
  dropping the DROPSHOT dropper which staged the TURNEDUP custom
  backdoor and was capable of deploying the SHAPESHIFT wiper.
  Tooling also included the NANOCORE and NETWIRE RATs and the
  publicly available ALFA Shell. Operational telemetry — Iran
  Daylight Time (UTC+4:30) work hours, a Saturday–Wednesday
  workweek, Iranian hosting / DNS infrastructure, Farsi artifacts,
  and the "xman_1365_x" persona tied to the Nasr Institute —
  anchors FireEye's IRGC-aligned attribution.
