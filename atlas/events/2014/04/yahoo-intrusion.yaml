      OVER-ATTESTATION-FINDING boundary — same defect class as the
      other ru/info-security-2016 "names Centre 18 but not the
      strategic goal" links.)
    attesting_source_id: doj/2017-03-15_fsb-yahoo-indictment
    inference_basis:
      signals:
        - DOJ indictment names FSB-directed targeting of Russian journalists and Russian government officials' Yahoo accounts ("of possible interest to the FSB")
        - "~6,500 accounts were silently accessed via minted forged cookies — a selective, person-targeted collection profile, not bulk theft"
