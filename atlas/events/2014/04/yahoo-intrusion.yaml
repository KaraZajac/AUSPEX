id: 2014-04/yahoo-intrusion
name: Yahoo intrusion (FSB Dokuchaev/Sushchin)
start_date: 2014-04-01
disclosure_date: 2016-09-22
end_date: 2016-12-31
incident_type:
  - intrusion
