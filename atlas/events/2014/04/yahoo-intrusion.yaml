  notes: |
    Audited vs DOJ press release "U.S. Charges Russian FSB Officers
    and Their Criminal Conspirators for Hacking Yahoo and Millions of
    Email Accounts" (2017-03-15). PRIMARY DOJ URL IS BOT-WALLED:
    justice.gov serves an Akamai BotManager interstitial challenge to
    both curl and WebFetch (HTTP 403 on /opa/pr/ and /archives/opa/pr/;
    raw snapshot captured is the challenge page, sha256 b2a23e9c…8566,
    NOT the article) and archive.org is blocked per protocol — hence
    level: partial. All load-bearing facts independently corroborated
    against the FBI primary ("Charges Announced in Massive Cyber
    Intrusion Case", fbi.gov) and tier-1 coverage quoting the DOJ
    release verbatim (NPR, WaPo, Krebs, FP, CNN).
    FACTS OK (all confirmed): conspiracy Apr 2014–Dec 2016; ≥500M
    accounts; FSB officers Dokuchaev + Sushchin "paid, directed, and
    protected" criminal hackers Belan (Russian, FBI Cyber Most Wanted)
    + Baratov (Canadian, ~$100/account, pleaded guilty + sentenced);
    forged ("minted") cookies tied to stolen user-database secret
    seeds → silent access to "at least 6,500" specifically targeted
    accounts; targets included Russian journalists + U.S./Russian
    government officials. ("dissidents" in the summary is editorial /
    widely-reported but not in the DOJ verbatim list — kept as a
    defensible target-class characterization.)
    ATTRIBUTION: DOJ names the FSB unit verbatim — "Dokuchaev worked
    for the FSB's Center for Information Security, also known as Center
    18" — so this is named-unit. CORRECTIONS:
    (1) Added attribution_level: named-unit (was absent). service_id
    ru/fsb/center-18 resolves + is correct + not stale.
    (2) Downgraded the ru/info-security-2016/info-psychological-defense
    doctrine link attested → strongly_inferred: the DOJ names the FSB
    target set (journalists/officials) + a generic "of interest to the
    FSB" collection purpose but does NOT state the doctrine's strategic
    end, and the 2016 doctrine post-dates the 2014–16 op — the identical
    "names Centre 18, not the strategic goal" over-attestation pattern
    the OVER-ATTESTATION-FINDING flags for this exact doctrine. Removed
    the "gold-standard attestation" language; added inference_basis
    (signals + ruled_out). attesting_source_id retained as the primary
    supporting source (allowed on strongly_inferred).
    actor_id: null retained (no clean APT-cluster maps; the indictment
    charges the FSB officers directly, not the Turla cluster).
    NOTE: target orgs/yahoo is a dangling FK (no targets-registry entry)
    — informational only per validate.ts (targets/ normalization
    deferred, does not feed the error gate); flagged, not blocking.
    published_on 2017-03-15 = the DOJ indictment date (not the 2014 op
