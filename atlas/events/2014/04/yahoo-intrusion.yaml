initial_vector: unknown
outcome_summary: |
  Compromise of 500M+ Yahoo user accounts, with targeted access
  to specific selectees including journalists, US/Russian
  government officials, and dissidents via forged authentication
  cookies. First US criminal cyber charges against Russian
  government officials.
quantified_impact:
  records_exfiltrated: 500000000
false_flag_risk: none
operators_named:
  - dokuchaev-dmitry  # FSB Center 18, DOJ Mar 2017
  - sushchin-igor  # FSB Center 18, DOJ Mar 2017
  - belan-alexsey  # FBI Cyber Most Wanted, DOJ Mar 2017
  - baratov-karim  # criminal hacker, DOJ Mar 2017 (sentenced)
summary: |
  DOJ March 2017 indictment of FSB officers Dmitry Dokuchaev and
  Igor Sushchin alongside criminal hackers Alexsey Belan and
  Karim Baratov. Baratov pleaded guilty and was sentenced — the
  only successfully prosecuted FSB strategic-collection cyber
  case. Per the indictment, Belan obtained initial access to
  Yahoo's network via spear-phishing of an unidentified Yahoo
  employee, then used valid credentials and lateral movement to
  reach the Account Management Tool and the user database. The
  operators minted forged authentication cookies tied to the
  user secret seeds in the account database, granting silent
  ongoing access to ~6,500 specifically targeted accounts —
  journalists, US and Russian government officials, dissidents —
  without triggering password resets. The case is the canonical
  example of FSB Center 18 outsourcing collection to a criminal
  hacker (Belan, on FBI Cyber Most Wanted) under TsIB officer
  direction.
