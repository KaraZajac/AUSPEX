id: 2022-11/z-library-takedown
name: Z-Library e-book piracy marketplace shut down; two Russian nationals charged
start_date: 2022-11-03
disclosure_date: 2022-11-16
end_date: 2022-11-16
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown
outcome_summary: |
  US DOJ (EDNY) + FBI seized approximately 249 Z-Library-
  associated domains and unsealed an indictment and complaint
  against Russian nationals Anton Napolsky and Valeriia
  Ermakova — arrested Nov 3 2022 in Cordoba, Argentina at US
  request — for their operation of Z-Library, a large-scale
  e-book and academic-paper piracy site DOJ described as
  hosting ~11M e-books and millions of research articles.
  The pair were placed under house arrest in Cordoba in
  January 2023; in 2024, after an Argentine judge approved
  their extradition to the US, they escaped house arrest
  (their absence discovered during a May 2024 compliance
  visit) and an international arrest warrant was issued.
false_flag_risk: none
summary: |
  Z-Library is the largest single piracy-site enforcement
  action in the corpus and an edgecase: the underlying
  conduct is large-scale copyright infringement rather than
  cyber-intrusion, but the multilateral-domain-seizure-plus-
  extradition-warrant template is identical to the
  cybercrime-marketplace pattern. AUSPEX classifies as
  criminal-baseline.
attributions:
