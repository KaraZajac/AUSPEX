qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-02
  level: partial
  notes: |
    Audited vs the DOJ EDNY indictment (raw PDF snapshot, sha256
    a1fc6cd3...cb998ff, 411,503 bytes — a fresh download from the DOJ URL
    hash-matched the on-disk snapshot) + the Akamai-walled DOJ press release
    (mirror-corroborated) + TorrentFreak 2024-07-08 for the escape (raw HTML
    snapshot, sha256 434708cb...a1ae821e, 77,850 bytes). LEVEL partial: the
    load-bearing DOJ press release — the sole source for the domain count,
    e-book count and Argentina-arrest framing — is bot-walled and could only
    be mirror-corroborated, not snapshotted (the /usao-edny/pr/ HTML returns a
    bm-verify Akamai challenge to curl and 403 to WebFetch; archive.org is
    blocked for the fetcher). This event died on a transient rate-limit in
    batch 28 and was unmodified before this audit.

    [a] FACTS — corrections: (i) "approximately 250" domains -> "approximately
    249": DOJ's enumerated figure is "approximately 249 interrelated web
    domains" / "249 linked web domains" (The Record, Infosecurity-Magazine);
    "nearly 250" is DOJ's round-number phrasing. (ii) STRIPPED the unsupported
    "84M articles": no DOJ source or mirror states an 84-million article count;
    DOJ says Z-Library hosted "11 million e-books" and "millions of research
    articles" — 84M is Z-Library's own self-claim, carried by no cited source,
    so replaced with DOJ's "millions of research articles". (iii) escape claim
    was DATE-WRONG and mis-framed: event said they "remained in Argentine
    CUSTODY pending extradition through 2023, when they escaped pretrial
    supervision" — per TorrentFreak they were placed under HOUSE ARREST (not
    custody) in Cordoba in January 2023, and the escape was in 2024 (absence
    discovered during a Patronato del Liberado compliance visit in May 2024),
    AFTER an Argentine judge approved their US extradition; an international
    arrest warrant followed. outcome_summary rewritten to the correct 2024
    timeline and re-sourced to TorrentFreak. Verbatim-supported facts kept:
    DOJ + FBI seizure (FBI AD-in-Charge Michael Driscoll quoted), unsealed
    indictment + complaint, defendants Napolsky (a.k.a. Napolskiy) & Ermakova,
    Z-Library as an e-book/academic-paper piracy site, arrest Nov 3 2022 in
    Cordoba at US request, operation window Jan 2018-Nov 2022 (indictment Count 1).

    [b] ATTRIBUTION — actor_id null is CORRECT: a law-enforcement counter-action
    (takedown + indictment), not an attributed adversary op (directionality
    model). attributing_org "DOJ + FBI + Argentine cooperation" all confirmed
    (DOJ EDNY charges; FBI Driscoll quote; Argentine arrest at US request). Kept
    attributing_org_confidence high, auspex_assessment concur; no over-attestation
    risk (no threat-actor claim). Added an attribution notes block mirroring the
    bitzlato-takedown precedent.

    [c] DATES — start_date 2022-11-03 (arrest) / disclosure_date 2022-11-16
    (unsealing) / end_date 2022-11-16 all correct and source-matched; the
    indictment file-date and the press-release date are both 2022-11-16. The 2024
    escape is a downstream development recorded in outcome_summary, not the modeled
    takedown-action's end. Source published_on: press release 2022-11-16, indictment
    2022-11-16, TorrentFreak 2024-07-08 — all correct.

    [d] DOCTRINE_LINKS — [] is CORRECT and kept: a copyright-piracy criminal-baseline
    enforcement action; no state doctrine genuinely applies; none invented.

    [e] ATTRIBUTION_LEVEL — intentionally ABSENT (null): a null-actor counter-action
    naming individual criminal defendants has no adversary threat-actor to grade on
    the activity-cluster/nation/named-actor/named-unit scale (bitzlato-takedown
    precedent). Documented in the attribution notes.

    [f] ACTOR_ID — null; resolves to no actor file, correct for a counter-action.
    No actor FLAG.

    incident_type [disruption] -> [law-enforcement, disruption]: a counter-action
    takes meta types (bitzlato/hydra precedent); law-enforcement = the indictment +
    arrests + seizure, disruption = the ~249-domain seizure that took the service
    offline (mirrors chipmixer-takedown [law-enforcement, disruption, documentary]).
    "documentary" omitted (an enforcement action, not a research writeup); "policy"
    omitted (no regulatory designation, unlike bitzlato's FinCEN order). Orchestrator
    may drop to [law-enforcement] if strict all-meta consistency with bitzlato is
    preferred.

    SOURCES: added doj/2022-11-16_z-library-indictment (snapshotted primary charging
    doc, sha256 a1fc6cd3...cb998ff, obtained via the reachable
    /d9/press-releases/attachments/ route — the file/dl equivalent) and
    torrentfreak/2024-07-08_z-library-admins-escape-house-arrest (snapshotted, sha256
    434708cb...a1ae821e). The press-release source was annotated with an AUDIT note
    (walled; no content_sha256; mirror-corroborated).

    RESIDUAL / FLAGS: exact press-release wording is not hash-captured (walled); the
    "millions of research articles" phrasing comes from the DOJ press release via
    WebFetch/mirrors, not a snapshot. Minor: the event slug and the press-release
    source url embed a trailing "-z-library" variant; the canonical DOJ URL is
    /pr/two-russian-nationals-charged-running-massive-e-book-piracy-website (no
