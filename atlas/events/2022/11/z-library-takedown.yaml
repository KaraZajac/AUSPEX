id: 2022-11/z-library-takedown
name: Z-Library e-book piracy marketplace shut down; two Russian nationals charged
start_date: 2022-11-03
disclosure_date: 2022-11-16
end_date: 2022-11-16
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  US DOJ + FBI seized approximately 250 Z-Library-associated
  domains and unsealed indictments against Russian nationals
  Anton Napolsky and Valeriia Ermakova for their operation
  of Z-Library — a large-scale e-book and academic-paper
  piracy site hosting approximately 11M books and 84M
  articles. Pair were arrested in Argentina on US warrants
  and remained in Argentine custody pending extradition
  through 2023, when they escaped pretrial supervision.
false_flag_risk: none
summary: |
  Z-Library is the largest single piracy-site enforcement
  action in the corpus and an edgecase: the underlying
  conduct is large-scale copyright infringement rather than
  cyber-intrusion, but the multilateral-domain-seizure-plus-
  extradition-warrant template is identical to the
  cybercrime-marketplace pattern. AUSPEX classifies as
  criminal-baseline.
