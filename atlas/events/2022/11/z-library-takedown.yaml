    attribution_source_id: doj/2022-11-16_z-library-takedown
    notes: "Null-actor counter-action (directionality model): a criminal-baseline law-enforcement takedown — ~249-domain seizure plus a copyright / wire-fraud / money-laundering indictment against two named individuals (Napolsky, Ermakova) — not an AUSPEX-attributed adversary operation, hence no attribution_level (no adversary threat-actor to grade; mirrors bitzlato-takedown). No state nexus asserted: the defendants are Russian nationals but DOJ frames it as ordinary IP crime (criminal baseline). attributing_org_confidence high (unsealed DOJ indictment + US-government domain seizure, with Argentine cooperation on the Nov 3 2022 arrest and an FBI investigation — AD-in-Charge Michael Driscoll quoted); auspex_assessment concur. The attribution announcement is the Akamai-walled DOJ press release; the two named defendants and the five counts are additionally carried by the snapshotted indictment (doj/2022-11-16_z-library-indictment)."
doctrine_links: []
