    PHANTOM-REMEDIATION audit. PATH TAKEN: DUPLICATE -> RETIRE/MERGE candidate
    (canonical event: 2022-08/morphisec-donot-yty-framework-refresh). Not re-sourced
    (per protocol, a duplicate of an existing real event is not re-sourced).
    STEP 0 — SOURCE TRIAGE: the single cited source cyfirma/2022-11_donot-team-targeting-pakistan
    is a PHANTOM. Its url is https://www.cyfirma.com/research/ — CYFIRMA's research CATALOGUE
    landing page, not an article. The on-disk snapshot cyfirma__2022-11_donot-team-targeting-pakistan.html
    (sha256 a6906d38…89c1258c, 113,834 bytes) has <title> "DoNot APT Targets Individuals in South
    Asia using Android Malware - CYFIRMA" — a DIFFERENT CYFIRMA report (2023-04, Android), not the
    cited "Donot Team APT-C-35 Targeting Pakistani Defense and Government" (Nov 2022). Web search of
    CYFIRMA's site, the SOCRadar APT-C-35 profile (curled, 406,260 bytes — it cites CYFIRMA only for
    the 2023 Play Store Android report), and general search returned NO report matching this
    title/date. The recorded content_sha256 is therefore a hash of a mis-captured, wrong article,
    NOT of the cited report — flagged in the source record.
    DUPLICATE DETERMINATION: the substantive incident (DoNot / APT-C-35 -> Pakistani defense &
    government, 2022, yty Windows framework, phishing) is real and is already carried by
    2022-08/morphisec-donot-yty-framework-refresh (Morphisec "APT-C-35: New Windows Framework
    Revealed", 2022-08-11, QC full 2026-07-01), which states the campaign "targeted government
    departments, including Pakistan's defense sector." The near-identical 2022-09/donot-foreign-ministry-southeast-asia
    event covers the foreign-ministry slice. This event adds no verifiable content beyond those.
    [a] FACTS: STRIPPED as unsupported/fabricated — (1) the assertion that CYFIRMA published a Nov
    2022 analytical retrospective with these contents (no such report locatable); (2) "Firebird-strand
    .NET tooling" (not carried by any CYFIRMA report of this description; publicly the DoNot Firebird
    backdoor is a later disclosure); (3) "Android implants delivered via social engineering" as a
    2022 CYFIRMA claim (CYFIRMA's DoNot Android reports are 2023+); (4) the editorial "India-HQ vendor
    attributes an India-aligned APT" framing, which depends entirely on the non-existent report; (5)
    the "complements Morphisec / Amnesty" cross-references. outcome_summary/summary rewritten to the
    truthful minimum + a loud retire/merge notice.
    [b] ATTRIBUTION: actor kept in/unscoped/donot-team (resolves); attributing_org CYFIRMA retained
    but confidence kept moderate and auspex_assessment concur-with-caveat, with an explicit caveat
    that the cited source is unverifiable. added attribution_level: named-actor (the phantom's title
    names the cluster; the real DoNot=India/APT-C-35 attribution is well established elsewhere but not
    by THIS citation). No Indian service named — consistent with in/unscoped.
    [c] DATES: left start/disclosure/end keyed to the claimed Nov 2022 report but they are NOT
    source-verified (the report is unlocatable). If merged into the Morphisec event, the real
    disclosure is 2022-08-11. Flagged.
    [d] DOCTRINE_LINKS: kept the single pakistan-military link at strongly_inferred (correct — no
    source states a goal; the real Morphisec primary supplies the victim-set fact). Rewrote reasoning
    to tie the inference to the real underlying incident, not the phantom; added inference_basis
