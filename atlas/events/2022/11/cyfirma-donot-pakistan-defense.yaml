id: 2022-11/cyfirma-donot-pakistan-defense
name: CYFIRMA documents DoNot Team targeting Pakistani defense and government in 2022
start_date: 2022-06-01
disclosure_date: 2022-11-01
end_date: 2022-10-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  CYFIRMA, an India-headquartered threat-intelligence vendor,
  published an analytical retrospective of DoNot Team / APT-C-35
  operations during 2022 against Pakistani defense and
  government targets. The report documented continued use of
  the yty Windows framework, Firebird-strand .NET tooling,
  and Android implants delivered via social engineering. The
  victim set spanned Pakistani military personnel, foreign-
  ministry officials, and adjacent diplomatic and academic
  equities.
false_flag_risk: none
summary: |
  Notable case of an India-headquartered commercial threat-intel
  vendor publishing detailed attribution against an Indian-aligned
  APT. CYFIRMA's framing leans on "APT-C-35" rather than
  "DoNot Team" naming but the cluster identification is
  unambiguous in the report. The disclosure complements
  Morphisec (August 2022) on the Windows toolchain side and
  Amnesty (October 2023) on the Android-and-Innefu side.
