id: 2022-11/sidecopy-reverserat-india-government
name: SideCopy ReverseRAT campaign against Indian government documented by Cyble
start_date: 2022-06-01
disclosure_date: 2023-05-09
end_date: 2022-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cyble Research and Intelligence Labs documented a SideCopy
  campaign through the second half of 2022 deploying the
  ReverseRAT and ActionRAT implant families against Indian
  government and defense-research targets. The campaign used
  weaponized Office documents themed on Indian government
  circulars and Ministry of Defence communications, with
  ReverseRAT serving as the primary stage-two implant and
  ActionRAT as the persistent backdoor. The 2023 Cyble
  disclosure was retrospective on 2022 activity and consolidated
  earlier Talos 2021 SideCopy infrastructure reporting with
  fresh ReverseRAT variants observed through 2022.
false_flag_risk: suspected
summary: |
  Continuity event for SideCopy operations through 2022, the
  cluster's first full operational year following the 2021 Talos
  foundational disclosure. ReverseRAT and ActionRAT are
  SideCopy-specific implant families distinguishing the cluster
  from Transparent Tribe's Crimson RAT lineage. False-flag risk
  flagged because SideCopy's deliberate SideWinder-tradecraft
  mimicry persists in the lure-document mix.
