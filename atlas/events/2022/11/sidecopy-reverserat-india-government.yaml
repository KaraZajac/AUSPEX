id: 2022-11/sidecopy-reverserat-india-government
name: SideCopy updated-ReverseRAT spear-phishing campaign against Indian government entities
start_date: 2023-01-01  # APPROX early-2023 onset — sources do not pin campaign start; disclosed 2023-02-16
disclosure_date: 2023-02-16
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  ThreatMon's Malware Research Team disclosed (16 Feb 2023) a SideCopy
  spear-phishing campaign against Indian government entities. The lure was a
  macro-enabled Word document, "Cyber Advisory 2023.docm", impersonating an
  advisory from India's Ministry of Communications about "Android Threats and
  Preventions" — its text lifted almost verbatim from a genuine July-2020
  departmental alert. Enabling the macro executed malicious code delivering a
  new/updated version of ReverseRAT with enhanced obfuscation and sleep calls
  to evade detection. Once persistent, ReverseRAT enumerates the device,
  collects data, encrypts it with RC4 and exfiltrates to its C2, and supports
  screenshot capture and file download/upload. No second-stage implant beyond
  ReverseRAT is documented for this campaign.
false_flag_risk: none
summary: |
  ThreatMon-disclosed (Feb 2023) SideCopy operation against Indian government
  entities using an updated ReverseRAT delivered via a Ministry-of-
  Communications-themed maldoc. ReverseRAT was first documented (targeting
  Indian government and energy targets) by Lumen Black Lotus Labs in 2021;
  this is a newer, more obfuscated variant. The ThreatMon primary frames
  SideCopy plainly as "a Pakistani threat group" and names no intelligence
  service; the Transparent Tribe / APT36 overlap is asserted by the secondary
  coverage (The Hacker News, Heimdal), not by the primary report — so the
  actor is carried as pk/unscoped/sidecopy and the Pakistan nexus is
  vendor-assessed (no government attribution). SideCopy's defining SideWinder-
  TTP mimicry is background context here rather than an active false-flag
  risk: ThreatMon and downstream outlets attribute the campaign to SideCopy
  without hedging that identity.
