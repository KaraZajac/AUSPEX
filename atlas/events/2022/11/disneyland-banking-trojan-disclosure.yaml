initial_vector: unknown
outcome_summary: |
  Krebs on Security profiled the self-styled "Disneyland Team," a
  Russian-speaking financial cybercrime group that registers visually
  deceptive look-alike bank domains — Punycode domains whose non-Latin
  (homoglyph) characters render in the browser URL bar as e.g.
  ạmeriprisẹ[.]com (Ameriprise), cliẹntșchwab[.]com (Charles Schwab),
  singlepoint.ụșbamk[.]com (U.S. Bank) and login2.ẹmirạtesnbd[.]com
  (Emirates NBD, Dubai), plus plain misspellings such as ushank[.]com —
  used not as conventional phishing lures but in tandem with existing
  Gozi 2.0/Ursnif Windows banking-malware infections on victims'
  computers. The malware overlays a fake bank site that relays the
  victim's browser activity through to the real bank site, letting
  operators forward secondary login and multi-factor-authentication
  challenges and facilitate fraudulent bank transfers, managed via a
  web-based control panel with bot-claiming ("TAKE"/"SKIP") buttons and
  scripted victim-stalling prompts. The findings came from Hold Security
  founder Alex Holden, whose analysts gained access to the group's
  control panel; it revealed dozens of Punycode-based phishing domains
  operated for the better part of 2022.
false_flag_risk: none
summary: |
  The Disneyland Team is a Russian-speaking, profit-motivated
  banking-fraud crew pairing Punycode/homoglyph look-alike bank domains
  with Gozi 2.0/Ursnif banking-trojan infections — an adaptation to
  browser and OS protections that broke classic in-browser web injects.
  AUSPEX classifies it as criminal-baseline: no documented state nexus,
  and "Russian-speaking — if not also based in Russia" is Hold
  Security's hedged assessment, not a state attribution.
