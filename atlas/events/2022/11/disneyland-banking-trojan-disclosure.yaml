    f0ab75b1…579cd007, 73,430 bytes. Article body extracted and grepped
    claim-by-claim.
    [a] FACTS — the prior record was heavily fabricated; corrected:
      • REMOVED "IcedID banking-trojan variants" (event name,
        outcome_summary, summary) — IcedID: 0 hits in the raw. The
        article names the malware as "a powerful strain of Microsoft
        Windows-based banking malware known as Gozi 2.0/Ursnif" (used
        "to help the group steal money from victims"; Gozi "facilitate[s]
        fraudulent bank transfers"). (NB: the article says "Ursnif", not
        the ISFB alias — recorded as the source words it.)
      • REMOVED fabricated victim list "Citibank, Capital One, Chase,
        and Royal Bank of Canada" — 0 hits each; "Canad*": 0 hits. The
        brands the article actually names as spoofed: U.S. Bank
        (ushank[.]com; singlepoint.ụșbamk[.]com), Ameriprise
        (ạmeriprisẹ[.]com), Charles Schwab (cliẹntșchwab[.]com,
        cliẹrtschwạb[.]com), Emirates NBD Bank in Dubai
        (login2.ẹmirạtesnbd[.]com), plus a fake PNC overlay screenshot.
        Targets re-scoped to sectors/finance/banking country us + ae
        (US brands + Emirates NBD); the "US and Canadian banking
        customers" framing struck.
      • REMOVED "punycode-spoofed domains imitating Disneyland-themed
        homoglyphs (e.g., bаnkof-аmericа.com using Cyrillic а)" —
        doubly wrong: "Disneyland" is the crew's self-name ("calling
        itself the Disneyland Team"), the domains imitate BANK brands;
        and bankof-america/bаnkof-аmericа appears nowhere (0 hits) —
        a fabricated example. Cyrillic appears only in the article's
        definition of Punycode ("render domain names with non-Latin
        alphabets like Cyrillic"); the concrete examples shown use
        dotted-Latin homoglyphs. Replaced with the article's own
        defanged examples.
      • REMOVED "Operational since approximately mid-2021" and
        start_date 2021-06-01 — "2021" has 0 hits. Source-carried
        timing: domains operated "for the better part of 2022"; the
        earliest concrete date is ushank[.]com "used since March 2022".
        start_date set 2022-03-01 (commented as an estimate basis).
      • REMOVED "exposed operator internal chats and target-bank
        preferences" — "chat": 0 hits. What Holden's analysts accessed
        is the gang's web-based control panel and its user manual /
        instructions (SKIP "in case the account is not interesting to
        us"; TAKE bot-claiming; stalling prompts; the manual's "ddos
        will kill their network" line). Rewritten to those specifics.
      • REMOVED summary claim "canonical post-Emotet IcedID-affiliate
        banking-trojan operator in the public record" — Emotet: 0 hits,
        IcedID: 0 hits; unsupported editorial superlative. Replaced
        with the article's actual framing: look-alike domains as the
        crew's adaptation to browser protections that broke web injects
        ("The reason that it is infeasible for them to use in-browser
        injects include browser and OS protection measures…" — Holden).
      • initial_vector phishing -> unknown: Krebs states the group "is
        not a phishing gang per se" and pairs the domains with
        "malicious software that is already secretly installed on a
        victim's computer"; the Gozi infection route is never stated.
      • Deliberately NOT imported: the "tens of millions of dollars"
        figure — it refers to "a similar malware crew" Krebs tracked in
        years past, not the Disneyland Team; DDoS-distraction is
        expressly unconfirmed for this crew ("unclear if the Disneyland
        Team employs this tactic"). No quantified_impact.
