id: 2022-11/disneyland-banking-trojan-disclosure
name: Krebs profiles "Disneyland" banking-trojan / IcedID-variant operation
start_date: 2021-06-01
disclosure_date: 2022-11-21
end_date: 2022-11-21
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Krebs on Security published an investigation into the
  "Disneyland Malware Team" — a Russian-speaking criminal
  group running IcedID banking-trojan variants against US
  and Canadian banking customers via punycode-spoofed
  domains imitating Disneyland-themed homoglyphs (e.g.,
  bаnkof-аmericа.com using Cyrillic а). Operational since
  approximately mid-2021; targets included Citibank, Capital
  One, Chase, and Royal Bank of Canada. The investigation
  exposed operator internal chats and target-bank
  preferences.
false_flag_risk: none
summary: |
  The Disneyland team is the canonical post-Emotet IcedID-
  affiliate banking-trojan operator in the public record.
  AUSPEX classifies as criminal-baseline.
