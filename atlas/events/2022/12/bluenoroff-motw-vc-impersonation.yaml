  notes: |
    Audited vs Kaspersky GReAT "BlueNoroff introduces new methods bypassing MoTW" (Securelist,
    Seongsu Park, 27 Dec 2022). RAW snapshot captured + hashed: sha256
    7e2d9f5d…c1fcc0fd (7e2d9f5dca3a2145b975bd44dac423816ac76bdd37024b7204cf9e6ac1fcc0fd),
    241,840 bytes. PHANTOM TRIAGE (task flagged suspected phantom): NOT a phantom — the URL
