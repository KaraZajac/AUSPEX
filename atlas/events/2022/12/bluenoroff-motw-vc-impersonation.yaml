id: 2022-12/bluenoroff-motw-vc-impersonation
name: Kaspersky disclosure of BlueNoroff VC-impersonation MoTW-bypass campaign
start_date: 2022-09-01  # Kaspersky dates campaign onset to autumn 2022
disclosure_date: 2022-12-27
end_date: null  # AUDIT 2026-07-02: source calls this "an ongoing operation" (domain regs trace to 2021; "attacks by this group are unlikely to decrease") — not bounded at disclosure
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky GReAT (Seongsu Park) documented BlueNoroff
  adopting new malware-delivery methods observed from
  ~end of September / October 2022, atop infrastructure
  whose domain registrations trace to 2021 (an ongoing
  operation). Kaspersky found more than 70 domains used by
  the group — fake cloud-hosting domains plus domains
  impersonating venture-capital firms and banks,
  predominantly Japanese (Beyond Next Ventures, Sumitomo
  Mitsui Banking Corporation, Mitsubishi UFJ, ANOBAKA,
  Z Venture Capital, ABF Capital, Angel Bridge, Mizuho;
  also Bank of America (US) and Trans-Pacific Technology
  Fund (Taiwan)). It delivered trojanized investment-themed
  decoy documents using two new techniques: (1) ISO (.iso)
  and VHD (.vhd) container files plus a password-protected
  archive containing a "Password.txt.lnk" shortcut to evade
  the Windows Mark-of-the-Web (MOTW) flag, and (2) new
  scripts and a novel downloader. Kaspersky confirmed one
  victim in the UAE (probably a home-financing company)
  compromised by classic BlueNoroff malware, assessed the
  group had recently been attacking various
  cryptocurrency-related businesses and other financial
  companies, and judged with low confidence that Japanese
  entities were on its radar. Kaspersky did not quantify
  proceeds from this campaign (its "cryptocurrency worth
  millions" figure is attributed to a prior report).
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Tradecraft-documentation event for BlueNoroff, the
  financially-motivated DPRK threat cluster (Kaspersky's
  own designation; placed under the Reconnaissance General
  Bureau per OFAC's 2019 designation carried in the actor
  record — this report itself names no RGB or unit). In
  this Securelist report Kaspersky GReAT detailed
  BlueNoroff's shift to new malware-delivery tradecraft —
  Mark-of-the-Web bypass via ISO/VHD container files and
  LNK shortcuts, plus new scripts and a downloader — atop
  an infrastructure of 70+ domains impersonating
  venture-capital firms and banks (predominantly Japanese)
  used to lure targets in the financial and cryptocurrency
  sectors. Kaspersky characterizes BlueNoroff as a
  profit-seeking actor that "steals cryptocurrency"; the
  report states no state-strategic purpose. The
  VC-impersonation pretext documented here became a
  recurring BlueNoroff access primitive in later
  cryptocurrency-firm intrusions.
attributions:
  - actor_id: kp/rgb/bluenoroff
    attributing_org: Kaspersky GReAT
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2022-12-27
    attribution_source_id: kaspersky/2022-12-27_bluenoroff-motw-bypass
    notes: "Kaspersky names 'BlueNoroff group' (its own named cluster) flatly and without hedging = high confidence; it ties the group to Lazarus lineage but names NO service/unit (no RGB, Lab 110, or Bureau in the report) — hence named-actor, not named-unit. The kp/rgb service placement rests on the actor record's OFAC 2019 sourcing, not on this source."
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null  # AUDIT 2026-07-02: was crypto-bridge-theft, which covers the DeFi-bridge/exchange heists run by TraderTraitor (Ronin/Harmony/DMM/Bybit) — mis-scoped for this VC-impersonation access-tradecraft campaign; pillar is the correct granularity
    confidence: strongly_inferred
    reasoning: |
      BlueNoroff is the financially-motivated leg of the
      DPRK Lazarus/RGB portfolio, and this VC-impersonation
      access campaign against financial and cryptocurrency
      firms feeds the hard-currency revenue-aggregation
      pillar of the 8th-Congress defense plan. This
      Kaspersky source establishes only the PROXIMATE
      purpose — the group is "financially motivated" and
      "steals cryptocurrency" — and names no WMD, missile,
      sanctions or state purpose, so the strategic-end link
      is inferred, not attested: it rests on BlueNoroff's
      OFAC-designated RGB state-control (actor record) and
      on Treasury/FBI's standing attribution of DPRK
      crypto-theft proceeds to the WMD / ballistic-missile
      programs.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Kaspersky attributes the campaign to BlueNoroff and characterizes it as a 'financially motivated threat actor eager to profit' that 'steals cryptocurrency' — a proximate revenue purpose the revenue-aggregation pillar specializes."
        - "BlueNoroff is a state-controlled DPRK/RGB cluster per OFAC's 2019-09-13 designation (carried in the actor record), not an independent criminal crew, so its proceeds accrue to the DPRK state."
        - "Treasury/FBI consistently attribute post-2020 DPRK crypto/financial-theft proceeds to the WMD and ballistic-missile programs — the strategic end this pillar encodes; this campaign's financial/crypto-firm targeting is of that same revenue stream."
      ruled_out: "Pure apolitical criminal profit with no state-strategic end — ruled out by BlueNoroff's OFAC-designated RGB state-control (proceeds flow to the DPRK state). Note this source itself states only the proximate financial motive and names no WMD/state purpose (hence strongly_inferred, not attested)."
    contested: false
    analyst: claude
