id: 2022-12/bluenoroff-motw-vc-impersonation
name: Kaspersky disclosure of BlueNoroff VC-impersonation MoTW-bypass campaign
start_date: 2022-09-01  # Kaspersky dates campaign onset to autumn 2022
disclosure_date: 2022-12-27
end_date: 2022-12-27
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky GReAT disclosed a BlueNoroff campaign
  registering approximately 70 fake domains impersonating
  venture-capital firms and major banks (ABF Capital,
  Angel Bridge, Mitsubishi UFJ, etc.) to deliver
  trojanized investment-document droppers to
  cryptocurrency-startup executives. The campaign
  introduced novel Mark-of-the-Web bypass techniques on
  Windows. Victims span the global Web3 startup ecosystem;
  Kaspersky did not quantify total proceeds but documented
  the operational scale.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Tradecraft documentation event for the BlueNoroff
  financially-motivated leg of the Lazarus / RGB
  portfolio. Where TraderTraitor operations target
  exchanges and custodians (DMM, Stake, CoinsPaid),
  BlueNoroff targets the upstream startup-executive
  population — pre-revenue Web3 startups, individual
  founders, and senior developers. The VC-impersonation
  pretext established here is the canonical 2023-2024
  BlueNoroff access primitive subsequently observed in
  multiple individual-victim drains.
attributions:
