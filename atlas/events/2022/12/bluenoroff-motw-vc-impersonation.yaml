    "Password.txt.lnk" shortcut; onset "At the end of September 2022 … this October";
    "domain registration could be traced back to earlier in 2021, so this is an ongoing
    operation"; confirmed victim "one victim in the UAE, probably a home financing company …
    compromised by classic BlueNoroff group malware"; general MO "attacking various
    cryptocurrency-related businesses lately, but also other financial companies"; low-conf
    "we assume, with low confidence, that the entities in Japan are on the radar". STRIPPED
