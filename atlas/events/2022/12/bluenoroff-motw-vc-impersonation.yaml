    (title + body + IoC + MITRE map), NOT a homepage/catalogue. No re-sourcing needed.

    [a] FACTS — corrected. VERIFIED verbatim: "more than 70 domains used by this group"
    (event said "approximately 70" -> "more than 70"); "they also created fake domains
    disguised as legitimate companies in the financial industry and investment companies …
    imitate venture capital names or big bank names. Most of the companies are Japanese";
    impersonation table lists ABF Capital, Angel Bridge, Mitsubishi UFJ (all Japanese VC/
