  notes: |
    RE-SOURCED (badrabbit model). The cited Krebs report is REAL, not a
    phantom: the URL resolves to the genuine article "Six Charged in Mass
    Takedown of DDoS-for-Hire Sites" (sha256 85d5ad32…4ba874be, 83,815 bytes).
    But the event's "Operation PowerOFF" name and its non-US coalition are NOT
    carried by Krebs, so two primaries were added: the DOJ USAO-CDCA/AK release
    (govt-primary of record; bot-walled Akamai interstitial → no snapshot;
    mirror-corroborated) and The Hacker News (sha256 5e84c448…f4289d62,
    166,038 bytes), which carries the coalition verbatim. Every retained claim
    is now carried by a snapshotted source (Krebs + THN) → level full; the DOJ
    primary is corroborating, not sole-carrier.

    [a] FACTS — several corrections. Krebs verbatim: "The U.S. Department of
    Justice (DOJ) today seized four-dozen domains that sold 'booter' or
    'stresser' services"; "The DOJ said the 48 domains it seized"; the six
    defendants + their services (Miller→royalstresser/supremesecurityteam,
    Colon→securityteam.io, Palmer→booter.sx, Shattock→astrostress in Los
    Angeles; Dobbs→ipstresser, Laing→truesecurityservices "charged in Alaska");
    payment "via PayPal, Google Wallet, and/or cryptocurrencies … a few dollars
    to several hundred per month"; "non-technical users"; the FBI + Netherlands
    Police + UK deterrent-ad campaign. The seized list totals exactly 48
    (counting the single "stresser[.]net/stresser[.]org" entry as two).
    CORRECTIONS: (1) incident_type [disruption] → [law-enforcement, documentary]
    — this event IS the takedown, not a DDoS attack; per the directionality
    model a null-actor counter-action takes meta types. (2) "indicting six
    US-based operators in the Central District of California" → charges spanned
    TWO districts (four in CDCA/Los Angeles, two in the District of Alaska), per
    Krebs and the DOJ release title; "indicting" softened to "charged"
    (complaints; CFAA + conspiracy). (3) charged-services list was WRONG:
    dropped CyberStress, Exoticbooter and Orphic (these were SEIZED domains but
    not any charged defendant's service) and dropped "Layer7-Stresser" entirely
    — layer7-stresser is NOT in the Dec-2022 seized list at all (a wrong-wave
    import; the only "Layer 7" token in Krebs is a commenter's handle).
    Replaced with the actual six charged defendants' services. (4) removed
    "Operation PowerOFF banner pages replaced the seized domains, replicating
    the disruption template later reused for the May 2023 second wave" — "banner
    pages" is not in any Dec-2022 source and the "May 2023 second wave" is a
    wrong-wave forward-reference (the task's explicit hazard). (5) summary:
    dropped "monetizing teen and youth purchasers" (kept the sourced
    youth-marketing angle) and the unsourced motive claim "the customer base is
    overwhelmingly game-disruption and competitive-spite" — no cited source
    characterises customer motive; replaced with criminal-baseline framing.

    [b] ATTRIBUTION — null-actor law-enforcement counter-action; the six charged
    defendants are prosecution targets, not an AUSPEX-attributed threat actor,
    so actor_id stays null. attributing_org normalized "DOJ + FBI + NCA + Dutch
    + German + Polish + Europol" → "US DOJ + FBI; UK; Netherlands; Germany;
    Poland; Europol (Operation PowerOFF)". This coalition IS accurate for the
    Dec-2022 wave — it was under-sourced, not wrong (THN verbatim: "an ongoing
    coordinated law enforcement effort codenamed Operation PowerOFF in
    collaboration with authorities from the U.K., the Netherlands, Germany,
    Poland, and Europol"). attribution_source_id repointed krebs → the DOJ
    primary of record. confidence high / concur retained (govt action, no
    ambiguity).

    [c] DATES — event start=disclosure=end 2022-12-14 correct (DOJ action day;
    Krebs "today"). Krebs published_on CORRECTED 2022-12-15 → 2022-12-14
