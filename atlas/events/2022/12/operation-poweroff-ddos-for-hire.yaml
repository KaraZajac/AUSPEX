initial_vector: unknown
outcome_summary: |
  US Department of Justice / FBI seizure of 48 internet domains
  offering DDoS-for-hire ("booter" / "stresser") services, together
  with charges against six US defendants — four charged in the
  Central District of California (Los Angeles) and two in the
  District of Alaska. Charged defendants and their services:
  Jeremiah Sam Evans Miller (RoyalStresser / SupremeSecurityTeam),
  Angel Manuel Colon Jr. (SecurityTeam.io), Corey Anthony Palmer
  (Booter.sx) and Shamar Shattock (AstroStress) in Los Angeles;
  John M. Dobbs (IPStresser) and Joshua Laing (TrueSecurityServices)
  in Alaska — charged with conspiracy and/or Computer Fraud and
  Abuse Act violations. The US seizures and charges were the domestic
  portion of the international "Operation PowerOFF" effort,
  coordinated with the UK, the Netherlands, Germany, Poland and
  Europol. In conjunction, the FBI and the Netherlands Police joined
  UK authorities in running targeted search-ad placements to deter
  would-be booter customers.
false_flag_risk: none
summary: |
  DDoS-for-hire ("booter" / "stresser") services are the canonical
  low-skill cybercrime commodity: they let non-technical customers
  rent powerful DDoS attacks through low-cost subscriptions (paid via
  PayPal, Google Wallet or cryptocurrency, from a few dollars to
  several hundred per month) and are frequently marketed to young
  purchasers. AUSPEX models this takedown as a null-actor
  law-enforcement counter-action and classifies it as
  criminal-baseline: no state doctrine applies, hence
  doctrine_links [].
