id: 2022-12/operation-poweroff-ddos-for-hire
name: Operation PowerOFF — DDoS-for-hire mass takedown
start_date: 2022-12-14
disclosure_date: 2022-12-14
end_date: 2022-12-14
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  Coordinated FBI, DOJ, UK NCA, Dutch, German, Polish, and
  Europol action seizing 48 of the most-trafficked
  DDoS-for-hire (booter / stresser) services and indicting
  six US-based operators in the Central District of
  California. Charged services included CyberStress, Exoticbooter,
  Layer7-Stresser, Orphic, RoyalStresser, and SecurityTeam.
  Operation PowerOFF banner pages replaced the seized
  domains, replicating the disruption template later reused
  for the May 2023 second wave.
false_flag_risk: none
summary: |
  DDoS-for-hire is the canonical low-skill cybercrime
  service, monetizing teen and youth purchasers via
  PayPal-style subscriptions. AUSPEX records as
  criminal-baseline: the customer base is overwhelmingly
  game-disruption and competitive-spite, not state-aligned
  activity.
