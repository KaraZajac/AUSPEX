id: 2022-12/cybercom-2022-midterm-ops
name: CYBERCOM CNMF operations to protect the 2022 US midterm elections
start_date: 2022-09-01  # UNSOURCED editorial ramp estimate; the sources give only "well before the midterms began" / "before, during, and until the elections were certified" (WaPo, The Record) — no specific onset date was disclosed
disclosure_date: 2022-12-21  # The Record (Matishak) 2022-12-21; WaPo (Nakashima) 2022-12-22 — both off a mid-December Fort Meade media roundtable. Hartman's CNMF sub-unified-elevation news conference was 2022-12-19
end_date: 2022-11-08  # midterm voting day (focal anchor); per both sources the campaign ran "before, during, and until the elections were certified" — i.e. past voting day through certification
incident_type:
  - documentary  # a general disclosure/acknowledgement of a full-spectrum election-security campaign — no discrete operation, target, effect, or op-count was named (Nakasone + Hartman both declined to specify). Modeled documentary rather than 'disruption' to avoid fabricated specificity
initial_vector: unknown  # not detailed
outcome_summary: |
  US CYBERCOM disclosed (Fort Meade media roundtable; reported by
  WaPo/Nakashima 2022-12-22 and The Record/Matishak 2022-12-21) that it
  ran "full spectrum" defensive and offensive cyber operations around
  the November 2022 US midterms. Gen. Paul Nakasone (DIRNSA / CG
  USCYBERCOM): "We did conduct operations persistently to make sure that
  our foreign adversaries couldn't utilize infrastructure to impact us
  ... we wanted to make sure that we took it down at key times." WaPo
  (three anonymous US officials) attributed the 2022 effort to CYBERCOM's
  Cyber National Mission Force (CNMF), which "went after" entities
  affiliated with the Russian and Iranian governments and their proxies.
  No targets, tradecraft, or operation count were disclosed — Nakasone
  and CNMF chief Maj. Gen. William "Joe" Hartman both declined to specify
  the actions, and the two agencies' joint statement declined to confirm
  where operations were directed. Nakasone noted a "lessened degree of
  activity" by foreign influence actors versus 2018/2020 but did not
  attribute the decline to CNMF's operations.
false_flag_risk: none
summary: |
  Public disclosure of US CYBERCOM defensive and offensive cyber
  operations around the November 2022 US midterm elections, reported by
  Ellen Nakashima (Washington Post, 2022-12-22, "Cybercom disrupted
  Russian and Iranian hackers throughout the midterms") and Martin
  Matishak (The Record, 2022-12-21) off a mid-December Fort Meade media
  roundtable with Gen. Paul Nakasone. WaPo attributes the 2022 effort to
  CYBERCOM's Cyber National Mission Force (CNMF) — described by The
  Record as CYBERCOM's "lead organization on election security" —
  targeting Russian- and Iranian-government-affiliated actors and their
  proxies. Modeled as a single documentary disclosure (incident_type:
  documentary) rather than discrete operations because no specific
  operation, target, or effect was named. Third consecutive
  election-defense cycle: a sibling of the 2018 IRA disruption (CYBERCOM
  Russia Small Group) and the 2020 IRGC-targeting operations, and part
  of the same CNMF hunt-forward / election-security cohort.
