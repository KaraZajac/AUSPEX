    [a] FACTS — STRIPPED a fabricated quote: the prior outcome_summary
    put in Nakasone's mouth "we are doing operations against Russia and
    Iran ahead of the midterms" and "characterized the operations as
    successful." Neither phrase exists in WaPo, in The Record, or
