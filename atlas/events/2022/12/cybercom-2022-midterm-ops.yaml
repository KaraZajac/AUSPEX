    operations persistently to make sure that our foreign adversaries
    couldn't utilize infrastructure to impact us ... we wanted to make
    sure that we took it down at key times" and the "full spectrum"
    (defensive + offensive) framing. Removed the "successful"
    characterization — the opposite is sourced: Nakasone noted a
    "lessened degree of activity" but "did not elaborate on why ...
    whether it's because Russia was occupied elsewhere or because of
    CNMF's actions" (WaPo). No operation count exists for 2022 (the
    "more than two dozen operations" / "11 hunt-forward ops" figures in
    circulation are from March-2021 SASC testimony about the 2020 cycle —
    NOT 2022; deliberately excluded to avoid an anachronistic fabricated
