    attributing_org: USCYBERCOM (Gen. Nakasone, Fort Meade media roundtable) + WaPo (three US officials, anonymous) + The Record
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2022-12-22
    attribution_level: named-unit  # WaPo + The Record name the Cyber National Mission Force (CNMF); op specifics come from 3 anonymous officials, the general offensive-ops acknowledgement is Nakasone on the record
    attribution_source_id: wapo/2022-12-22_nakashima-midterm-ops
    notes: |
      Composed attribution. Nakasone ON THE RECORD acknowledged CYBERCOM
      ran "full spectrum" (defensive + offensive) operations around the
      2022 midterms, but "did not specify targets" (WaPo) and "repeatedly
      declined to elaborate" (The Record). The CNMF / Russia+Iran
      SPECIFICS come from three US officials speaking anonymously to WaPo;
      the two agencies' joint statement declined to confirm targets ("We
      do not comment on cyber operations, plans or activities and wouldn't
      speculate where and who those cyber operations were directed
      towards"). US self-attribution of its own defensive election-
      security campaign => attributing_org_confidence high, auspex concur.
