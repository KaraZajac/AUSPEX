  notes: |
    Audited against the real Microsoft "On the Issues" post
    "Preparing for a Russian cyber offensive against Ukraine this
    winter" (Clint Watts, Microsoft Threat Analysis Center,
    2022-12-03). RAW snapshot captured:
    microsoft__2022-12-03_preparing-russian-cyber-offensive-winter.html,
    sha256 e6481375…5d4396ca, 196,936 bytes. NOT a phantom — page
    title, og:title and article:published_time
    (2022-12-03T15:14:18Z) all match the citation; full article body
    present.

    [a] FACTS — corrected. STRIPPED two fabrications not carried by
    the article: (1) "against Ukrenergo" — grep of the raw shows zero
    occurrences of "Ukrenergo"; the source names no specific utility,
    only "organizations involved in power generation, water supply
    and the transportation of people and goods." (2) "Ukrainian
    government continuity" — zero occurrences of "continuity"; the
    source's documented targets are energy / water / transportation
    critical infrastructure and (for influence) European publics, not
    government-continuity. Rewrote outcome_summary + summary to only
    source-carried claims: IRIDIUM (= Sandworm, = GRU) October wiper
    spike using CaddyWiper + FoxBlade against power generation / water
    / transportation; the cyber+missile pairing ("these recent
    missile strikes have been accompanied by cyberattacks on the same
    sectors … strong circumstantial evidence that the efforts are
    coordinated"); the October Prestige ransomware in Poland+Ukraine
    as "the first war-related cyberattack against entities outside of
    Ukraine since the Viasat KA-SAT attack"; the 2015/2016 wintertime
    grid attacks and 2017 NotPetya lineage; and the forecast of
    continued Ukrainian critical-infra attacks + European
    cyber-enabled influence ops. Also REMOVED unsourced
    forward-references the prior summary imported (FrostyGoop /
    Lvivteploenergo Jan-2024 and the 2024-25 winter campaign, and an
    "April 2022 Hybrid War report" title) — none appear in this 2022
    source; kept only the June-2022 "Defending Ukraine" report it
    actually cites.

    incident_type: changed [disclosure, attribution-publication] ->
