id: 2022-12/microsoft-winter-cyber-offensive-warning
name: Microsoft strategic warning — Russian winter cyber offensive against Ukrainian energy
start_date: 2022-12-03
disclosure_date: 2022-12-03
end_date: 2022-12-03
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Microsoft's Clint Watts (Microsoft Threat Analysis Center)
  published a strategic-warning post forecasting an intensified
  Russian cyber-and-influence offensive over winter 2022-2023 and
  documenting the pattern behind it. It reported recent destructive
  wiper attacks (CaddyWiper, FoxBlade) by Russian military-
  intelligence actor IRIDIUM (aka Sandworm, associated with the GRU)
  against energy, water and other critical-infrastructure networks
  in Ukraine, timed with missile strikes that cut power and water to
  civilians; documented IRIDIUM's October Prestige ransomware against
  logistics and transportation networks in Poland and Ukraine (the
  first war-related cyberattack outside Ukraine since Viasat) as a
  possible harbinger of expansion beyond Ukraine; and forecast
  continued attacks on Ukrainian critical infrastructure alongside
  cyber-enabled influence operations aimed at eroding European
  support for Ukraine.
false_flag_risk: none
summary: |
  Strategic-communication / forecast post on Microsoft's "On the
  Issues" blog. Microsoft frames Russian cyber action against
  Ukrainian energy as a coordinated, seasonally-timed instrument of
  the war rather than opportunistic targeting: it reports the
  repeated temporal, sectoral and geographic pairing of GRU
  (IRIDIUM / Sandworm) wiper attacks with missile strikes on the
  same energy and water sectors as "strong circumstantial evidence
  that the efforts are coordinated," and situates the winter
  2022-2023 grid campaign in a lineage running back to IRIDIUM's
  2015/2016 wintertime attacks on Ukrainian electricity providers
  and the 2017 NotPetya operation. Companion to Microsoft's earlier
  2022 Ukraine cyber-war reporting (its June 2022 "Defending
  Ukraine: Early Lessons from the Cyber War" report is cited
  within), extending the MSTIC / MTAC public-warning cadence on
  Russia's post-invasion cyber posture.
