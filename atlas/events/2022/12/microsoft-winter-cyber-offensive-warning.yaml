    notes: |
      Microsoft names the actor behind the documented wiper and
      Prestige attacks as "a threat group – known at Microsoft by the
      element name IRIDIUM and by others as Sandworm – associated with
      Russia's military intelligence service, the GRU," stated as
      established fact (high). named-unit: a named group (Sandworm /
      IRIDIUM) tied to a specific named service (the GRU); this source
      does not cite the specific unit number 74455. The post also
      mentions SEABORGIUM (overlapping COLDRIVER / Callisto / TA446)
      targeting the UK and the SVR / FSB behind pro-Russia influence
      outlets, but IRIDIUM / Sandworm is the headline actor for the
      energy-grid warning; those secondary clusters were not added, to
      keep the attribution to what the report foregrounds.
