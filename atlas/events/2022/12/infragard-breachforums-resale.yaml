id: 2022-12/infragard-breachforums-resale
name: BreachForums actor "USDoD" exfiltrates FBI InfraGard membership data
start_date: 2022-12-10
disclosure_date: 2022-12-13
end_date: null
incident_type:
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  An actor using the handle "USDoD" (avatar: the U.S.
  Department of Defense seal) claimed compromise of the FBI
  InfraGard information-sharing portal by submitting, in
  November 2022, a fraudulent membership application in the
  identity (name, Social Security Number, date of birth) of a
  chief executive officer of a major U.S. financial company —
  an application the FBI approved in early December without
  ever contacting the real CEO to vet it. After the account
  was approved, USDoD had a friend write a Python script to
  query a built-in InfraGard API and retrieve all available
  member data, then offered the resulting dataset — "more
  than 80,000 members" per Krebs — for sale on the cybercrime
  forum BreachForums (which Krebs refers to as "Breached") for
  USD 50,000. The exposed data was names and contact
  information; per Krebs only about half the accounts held an
  email address and the Social-Security-Number and
  date-of-birth fields were mostly empty. The members are
  vetted US critical-infrastructure security personnel. Access
  was still live at publication — the actor proved it by
  messaging an InfraGard member through the portal. Krebs
  described BreachForums as widely considered the second
  incarnation of RaidForums, the forum the U.S. DOJ shuttered
  in April 2022.
false_flag_risk: none
summary: |
  Canonical case of the breach-data-marketplace ecosystem
  monetizing access to US-government partnership data via
  social-engineering of a vetting process. AUSPEX classifies
  as criminal-baseline.
