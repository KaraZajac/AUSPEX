id: 2022-12/infragard-breachforums-resale
name: BreachForums actor "USDoD" exfiltrates FBI InfraGard membership data
start_date: 2022-12-10
disclosure_date: 2022-12-13
end_date: 2022-12-13
incident_type:
  - data-theft
initial_vector: phishing
outcome_summary: |
  An actor using the handle "USDoD" claimed compromise of the
  FBI InfraGard information-sharing portal via a forged-CFO
  application that passed manual review, and offered the
  resulting ~87,000-record member dataset for sale on
  BreachForums for USD 50,000. The breach exposed names,
  email addresses, employers, and contact data of vetted
  US-CII security personnel. The InfraGard incident was
  foundational to BreachForums' rise as the principal
  successor venue to RaidForums and was a structural input
  to the March 2023 FBI arrest of BreachForums administrator
  Conor Fitzpatrick.
false_flag_risk: none
summary: |
  Canonical case of breach-data-marketplace ecosystem
  monetizing access to US-government partnership data via
  social-engineering of vetting processes. AUSPEX
  classifies as criminal-baseline.
