  notes: |
    Audited vs Krebs on Security "FBI's Vetted Info Sharing Network 'InfraGard' Hacked"
    (raw snapshot krebs__2022-12-13_infragard-hacked.html, sha256 515d65da…406a0c3c,
    100,195 bytes; URL live and body matches the citation — NOT a phantom).
    [a] FACTS: three pre-audit fabrications corrected. (1) "forged-CFO" -> CEO — the raw says
    the impersonated identity was a "chief executive officer" of "a major U.S. financial
    corporation" ("CEO" ×13, "chief executive officer" ×1; "CFO" ×0). (2) "~87,000-record"
    -> "more than 80,000" — verbatim "database of contact information on more than 80,000
    members go up for sale" (×2); 87,000 appears nowhere. (3) DELETED "was a structural input
    to the March 2023 FBI arrest of BreachForums administrator Conor Fitzpatrick" — this
    Dec-13-2022 article predates that event and mentions neither Fitzpatrick nor an arrest (the
    admin/escrow guarantor is named only as "Pompompurin"); uncited forward claim. Softened
    "passed manual review" -> "the FBI approved … without ever contacting the real CEO to vet
    it" (raw: account "vetted by the FBI itself"; the CEO "told KrebsOnSecurity they were never
    contacted by the FBI seeking to vet an InfraGard application"). Corrected exposed-fields:
    raw says "names and contact information", "only about half of the user accounts contain an
    email address, and most of the other database fields — like Social Security Number and Date
    of Birth — are completely empty" — dropped unsupported "employers". Added source-carried
    detail: application submitted in November, approved early December; "asked a friend to code
    a script in Python to query that API and retrieve all available InfraGard user data";
    "$50,000 asking price"; access still live at publication. RaidForums-successor claim
    attributed to Krebs (raw: Breached "widely considered to be the second incarnation of
    RaidForums … shuttered by the U.S. Department of Justice in April"); dropped the unsupported
    "foundational to BreachForums' rise" editorialization.
    [b] ATTRIBUTION: Krebs names the self-proclaimed handle "USDoD" and interviewed them
    directly; FBI confirmed "a potential false account". Kept attributing_org_confidence
    moderate (self-claim + corroborated live access; persona↔person link unestablished),
    auspex_assessment concur.
    [c] DATES: source published_on 2022-12-13 confirmed (dateline "December 13, 2022" ×5; body
    ref "as of publication time Tuesday evening" = Tue Dec 13 2022). start_date kept 2022-12-10
    (raw: "On Dec. 10, 2022 … featured a bombshell new sales thread") — the concrete anchor; the
    fraudulent application was Nov 2022 but no precise date is given, so no date invented.
    end_date 2022-12-13 -> null: the raw states access was ongoing ("To prove they still had
    access to InfraGard as of publication time Tuesday evening"), so the op is not bounded.
    [d] DOCTRINE_LINKS: [] retained — correct. Criminal data-theft/resale, no state nexus, no
    doctrine genuinely applies; no attested link so no attesting_source_id required.
    [e] ATTRIBUTION_LEVEL: set named-actor (was missing) — Krebs names a specific persona/handle
    ("USDoD"), i.e. named-actor granularity, not a nation or unit.
    [f] ACTOR_ID: null is correct — no criminal/usdod (or any USDoD) actor record exists under
    atlas/actors/; the persona is a self-chosen handle with no established real-world identity.
    No actor FLAG.
    OTHER: initial_vector phishing -> valid-creds — no phishing occurred; access was via a
    fraudulently-obtained but legitimately-issued InfraGard account (identity impersonation
    defeating the vetting) plus a built-in API; valid-creds is the closest of the 8-value vocab
    (unknown would understate a well-documented vector). targets [] -> sectors/government
