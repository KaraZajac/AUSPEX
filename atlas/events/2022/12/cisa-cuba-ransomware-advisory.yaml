incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Joint CISA / FBI advisory (AA22-335A) on Cuba ransomware,
  updating the December 2021 FBI Flash. As of August 2022 the
  advisory documents 101 entities compromised (65 in the US, 36
  outside the US), USD 145M in ransom demanded and USD 60M
  received, and a doubling of compromised US entities since the
  2021 Flash. Cuba ransomware actors persistently targeted five
  US critical-infrastructure sectors: financial services,
  government facilities, healthcare and public health, critical
  manufacturing, and information technology. Documented initial
  access via known vulnerabilities in commercial software,
  phishing campaigns, compromised credentials, and legitimate RDP
  tools; post-access distribution via the Hancitor loader, with
  third-party / open-source reporting noting an apparent link
  between Cuba ransomware actors, the RomCom RAT (used for C2),
  and Industrial Spy ransomware.
false_flag_risk: none
summary: |
  Foundational primary-source documentation of the Cuba
  ransomware cluster (unrelated to the Republic of Cuba despite
  branding). AUSPEX includes as a documentary event because the
  advisory is the canonical multi-government characterization of
  Cuba ransomware as a financially-motivated cybercrime operator
  rather than a state-tolerated proxy.
