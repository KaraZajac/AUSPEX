id: 2022-12/cisa-cuba-ransomware-advisory
name: CISA / FBI joint advisory on Cuba ransomware
start_date: 2022-12-01
disclosure_date: 2022-12-01
end_date: 2022-12-01
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Joint CISA / FBI advisory (AA22-335A) on Cuba ransomware,
  updating an earlier December 2021 advisory. Documents
  approximately USD 60M cumulative ransom received as of August
  2022, doubling of victim count year-over-year, and persistent
  targeting of US critical-infrastructure sectors (financial
  services, healthcare, IT, manufacturing). Advisory documents
  Cuba's Hancitor / RomCom loader ecosystem and Microsoft
  Exchange ProxyShell initial-access profile.
false_flag_risk: none
summary: |
  Foundational primary-source documentation of the Cuba
  ransomware cluster (unrelated to the Republic of Cuba despite
  branding). AUSPEX includes as a documentary event because the
  advisory is the canonical multi-government characterization of
  Cuba ransomware as a financially-motivated cybercrime operator
  rather than a state-tolerated proxy.
