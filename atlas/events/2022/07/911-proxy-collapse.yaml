id: 2022-07/911-proxy-collapse
name: 911 residential-proxy service shuts down after breach disclosure, days after Krebs deep-dive
start_date: 2022-07-19  # Krebs deep-dive exposure — precipitating public trigger (Krebs' "July 19 story"; page byline shows 18 Jul; underlying breach was "early July")
disclosure_date: 2022-07-28  # 911 posted its permanent-shutdown notice
end_date: 2022-07-28  # 911 permanently ceased operations
incident_type:
  - disruption   # criminal residential-proxy (malware-botnet) infrastructure collapsed
  - documentary  # journalism-documented (KrebsOnSecurity); NO law-enforcement action in 2022
initial_vector: unknown  # 911: "Not sure how did the hacker get in"; intruders then abused the account top-up API
outcome_summary: |
  911[.]re — a residential-proxy service operating since ~2015
  that sold daily access to hundreds of thousands of
  malware-compromised consumer Windows PCs — abruptly shut down
  on 28 July 2022. It built its proxy pool by covertly bundling
  its SOCKS5 relay software with "free VPN" apps and with
  pirated/"free" software pushed through its own pay-per-install
  affiliate schemes (e.g. backdoored torrents), turning unwitting
  users' machines into rentable exit nodes. Independent counts
  put the pool at ~120,000 PCs (University of Sherbrooke) up to
  nearly 200,000 nodes across 200+ countries, 42,000+ of them in
  the United States (Spur.us / Riley Kilmer). The shutdown came
  ten days after KrebsOnSecurity's 19 July deep-dive exposed the
  covert distribution channel and the pool's abuse for payment-
  card fraud, account-takeover, unauthorized "scam" wire
  transfers, CEO-impersonation and China-based wire laundering.
  911 said an early-July intrusion abused its account top-up API
  and then overwrote its servers, data and backups, leaving the
  service "unrecoverable." No law-enforcement action was
  involved. WHOIS and UK Companies House records tied 911 to
  Yunhe Wang of Beijing (Gold Click Ltd, registered 2016); 911
  denied the linkage.
false_flag_risk: none
summary: |
  A criminal residential-proxy provider collapsing WITHOUT a
  law-enforcement takedown — a self-disclosed destructive breach
  (911's stated cause) landing ten days after investigative
  journalism (Krebs) exposed the operation. AUSPEX classifies as
  criminal-baseline: 911 was a financially-motivated
  malware-botnet / proxy operation, not state-tasked (though
  state actors are known opportunistic consumers of such
  services). Directionality: 911's operators are the criminal
  subject; the ~120K–200K proxy nodes were its victims —
  malware-infected consumer/residential PCs whose owners were
  largely unwitting. No atlas actor exists for the 911 / Yunhe
  Wang operator, so actor_id is null and the subject is named in
  prose (mirroring the sibling 2024-05/911-s5-botnet-takedown).
  AUSPEX links this to the SAME operator: the Yunhe Wang
  identified here (Gold Click Ltd) is the person US DOJ/FBI later
  arrested and OFAC sanctioned over the "911 S5" residential-
  proxy botnet in May 2024 — i.e. 911 and "911 S5" are one
  continuous Wang-run operation, not (as previously stated on
  this record) a different operator's successor.
