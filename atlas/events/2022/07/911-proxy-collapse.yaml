id: 2022-07/911-proxy-collapse
name: 911 residential-proxy network voluntary shutdown after Krebs disclosure
start_date: 2022-07-28
disclosure_date: 2022-07-28
end_date: 2022-07-28
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  The 911 residential-proxy network — built from trojanized
  free-VPN application installs across approximately 200K
  compromised residential IP endpoints — abruptly disclosed
  a security breach and shut down voluntarily on July 28
  2022, ten days after Krebs on Security's deep-dive
  investigation exposed the trojanized-VPN distribution
  channel and the criminal-laundering use of the proxy
  pool. The 911 brand was succeeded within months by 911
  S5 (different operator), which scaled to ~19M endpoints
  before the May 2024 DOJ takedown.
false_flag_risk: none
summary: |
  The 911 collapse is a journalism-driven shutdown of a
  cybercrime-services proxy network without law-enforcement
  action — the closest analog in the corpus to a market-
  pressure rather than enforcement-pressure shutdown of a
  criminal-infrastructure provider. AUSPEX classifies as
  criminal-baseline.
