      history) characterises 911 as a criminal malware-proxy service
      and ties its domains to the email ustraffic@qq.com and to Yunhe
      Wang of Beijing — UK Companies House lists Gold Click Limited
      (registered 2016) to a 34-year-old Yunhe Wang. 911 told Krebs
      the researchers were "wrong" and denied any link to the other
