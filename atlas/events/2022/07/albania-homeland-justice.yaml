id: 2022-07/albania-homeland-justice
name: Albania destructive attack — MOIS / HomeLand Justice
start_date: 2021-05-01  # 14-month dwell prior to launch
disclosure_date: 2022-07-15
end_date: 2022-09-10  # follow-on retaliatory wave after attribution
incident_type:
  - destructive
  - wiper
  - data-theft
initial_vector: n-day
outcome_summary: |
  14-month dwell time culminating in destructive launch
  against the Government of Albania on July 15, 2022. ROADSWEEP
  wiper plus ransomware-style file encryptor. Data leak via
  HomeLand Justice site and Telegram. Forced shutdown of
  Albanian e-government services including the Total
  Information Management System, state police, immigration,
  and civil registry. Albania severed diplomatic ties with
  Iran on September 7, 2022 — the first state to do so over a
  cyber attack. Follow-on retaliatory wave September 9, 2022.
false_flag_risk: none
summary: |
  Foundational US-government attestation event for the
  hacktivist-persona-laundering doctrine. CISA AA22-264A cited
  the MEK/anti-dissident targeting motive (the Treasury release as
  cited does not name it); Mandiant published technical details.
