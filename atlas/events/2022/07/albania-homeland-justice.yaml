id: 2022-07/albania-homeland-justice
name: Albania destructive attack — MOIS / HomeLand Justice
start_date: 2021-05-01  # initial access May 2021 (MSTIC: "gained access … in May 2021" via CVE-2019-0604; CISA: ~14 months before the July-2022 launch)
disclosure_date: 2022-07-15  # destructive launch / public claim (MSTIC: "on July 15, 2022 … a destructive cyberattack")
end_date: 2022-09-10  # Sept-2022 second wave (CISA: "In September 2022 … another wave"; exact 9–10 Sept day is external reporting, not the cited primaries)
incident_type:
  - destructive
  - wiper
  - disruption
  - data-theft
  - influence-operation
initial_vector: n-day  # unpatched Internet-facing Microsoft SharePoint, CVE-2019-0604 (CISA + MSTIC)
outcome_summary: |
  Iranian state cyber actors operating as "HomeLand Justice" gained
  access to an Albanian government network in May 2021 via an
  unpatched Internet-facing SharePoint server (CVE-2019-0604),
  exfiltrated email for roughly a year, then on July 15, 2022 launched
  a destructive attack: a ransomware-style file encryptor (GoXml.exe)
  followed by disk-wiping malware (cl.exe, sharing ZeroCleare's EldoS
  RawDisk license key). The attack disrupted Albanian government
  websites and online public services (Microsoft assessed <~10%
  environmental impact). Stolen documents and personal data were
  leaked through the HomeLand Justice website and social-media
  personas as an accompanying anti-MEK information operation. Treasury
  attributed the operation to Iran's MOIS and sanctioned MOIS and
  Minister Esmail Khatib on September 9, 2022. A second wave of attacks
  followed in September 2022, which CISA assessed as retaliation for
  the public attribution and for the severing of Albania–Iran
  diplomatic ties.
false_flag_risk: none  # MSTIC: mirrored messaging "reduces the likelihood that the attack was a false flag operation by a country other than Iran"
summary: |
  US-government and Microsoft attestation event for the Iranian
  hacktivist-persona-laundering pattern — a MOIS operation run behind
  the "HomeLand Justice" persona. Treasury (jy0941) names MOIS and
  Minister Esmail Khatib but NOT the persona or the MEK motive; CISA
  AA22-264A names the persona and the anti-MEK (Mujahedin-e Khalq)
  targeting at nation level ("Iranian state cyber actors"); Microsoft
  MSTIC independently attributes the July-15 destructive attack to the
  Iranian government (high confidence) with a moderate-confidence
  EUROPIUM→MOIS link and states the MEK-retaliation motive in
  substance. Mandiant (now link-rotted) is the origin of the
  "ROADSWEEP" name for the GoXml.exe ransomware.
attributions:
  - actor_id: null
    service_id: ir/mois
    attributing_org: US Treasury OFAC
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2022-09-09
    attribution_source_id: treasury/2022-09-09_mois-albania
    notes: |
      Treasury/OFAC (jy0941) names the service explicitly — "designating
      Iran's Ministry of Intelligence and Security (MOIS)" and Minister
      Esmail Khatib — for the July 2022 attack: "cyber threat actors
      assessed to be sponsored by the Government of Iran and MOIS disrupted
      Albanian government computer systems." Treasury does NOT use the name
      "HomeLand Justice" (0 occurrences) and does NOT name the MEK motive
      (0 occurrences); those come from CISA/MSTIC. This is the firm,
      explicit MOIS attribution (named-unit).
  - actor_id: ir/mois/homeland-justice
    attributing_org: US CISA / FBI
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2022-09-21
    attribution_source_id: cisa/2022-09-21_aa22-264a-albania
    notes: |
      CISA/FBI name the "HomeLand Justice" persona and assert nation-level
      sponsorship only — "In July 2022, Iranian state cyber actors—
      identifying as 'HomeLand Justice'—launched a destructive cyber
      attack." Zero "MOIS"/"Ministry of Intelligence" in the advisory; the
      MOIS unit placement rests on the co-cited Treasury release.
  - actor_id: ir/mois/homeland-justice
    attributing_org: Microsoft (MSTIC / DART)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2022-09-08
    attribution_source_id: microsoft/2022-09-08_mstic-albania
    notes: |
      MSTIC: "high confidence that on July 15, 2022, actors sponsored by
      the Iranian government conducted a destructive cyberattack against
      the Albanian government." The MOIS nexus is MODERATE confidence, via
      EUROPIUM ("linked to EUROPIUM, which has been publicly linked to …
      MOIS"); phases tracked as DEV-0842 (ransomware+wiper), DEV-0861 /
      DEV-0166 (access+exfil), DEV-0133 (probing), with "HomeLand Justice"
      running the accompanying information operation.
doctrine_links:
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: attested
    perspective: attacker-rationale
    reasoning: |
      Textbook persona-laundering: a state intelligence operation run
      behind a hacktivist front for deniability. CISA states the
      state-actor-behind-persona structure in substance ("Iranian state
      cyber actors—identifying as 'HomeLand Justice'"); Treasury names the
      state hand (MOIS + Minister Khatib, "responsible for the leaking of
      documents"); MSTIC describes "Homeland Justice, the group overtly
      pushing messages and leaking data," amplified by "a broad-based
      information operation." That is exactly the deniable-retaliation-via-
      hacktivist-front end the doctrine encodes — the doctrine file itself
      marks HomeLand Justice → MOIS as attested.
    attesting_source_id: cisa/2022-09-21_aa22-264a-albania
    inference_basis:
      source_quote: "In July 2022, Iranian state cyber actors—identifying as “HomeLand Justice”—launched a destructive cyber attack against the Government of Albania which rendered websites and services unavailable."
      source_id: cisa/2022-09-21_aa22-264a-albania
    contested: false
    analyst: claude
  - doctrine_id: ir/constitutional-irgc-role
    pillar_id: ir/constitutional-irgc-role/regime-preservation
    program_id: null
    confidence: attested
    perspective: attacker-rationale
    reasoning: |
      The strategic purpose — regime-preservation against the MEK, the
      regime's existential opposition — is stated in substance by MSTIC:
      the attack was "retaliation … [against] the Mujahedin-e Khalq (MEK),
      an Iranian dissident group largely based in Albania that seeks to
      overthrow the Islamic Republic of Iran," with the MEK "the primary
      target," timed "one week ahead of the MEK-sponsored Free Iran World
      Summit." CISA independently carries the anti-MEK targeting ("anti-
      Mujahideen E-Khalq (MEK) message on desktops"; "posting anti-MEK
      messages"). CAVEAT: constitutional-IRGC-role is AUSPEX's frame for
      what is a MOIS operation — the doctrine's regime-preservation pillar
      is authored MOIS-inclusive (APT39/Rana = MOIS is mapped to it), so
      the corroboration here is of the counter-MEK/regime-preservation
      MOTIVE, not of an IRGC nexus.
    attesting_source_id: microsoft/2022-09-08_mstic-albania
    inference_basis:
      source_quote: "Tehran likely used the attacks as retaliation for cyberattacks Iran perceives were carried out by Israel and the Mujahedin-e Khalq (MEK), an Iranian dissident group largely based in Albania that seeks to overthrow the Islamic Republic of Iran."
      source_id: microsoft/2022-09-08_mstic-albania
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government
    country: al  # Government of Albania (dangling orgs/government-of-albania re-pointed; matches sibling 2022-09/hunt-forward-albania)
    role: primary
    outcome: |
      Government websites and online public services disrupted; email
      exfiltrated over ~a year then leaked; Albania severed diplomatic
      ties with Iran in September 2022 (CISA).
