  notes: |
    Audited against RAW snapshots — all three cited sources captured and
    hash-re-verified this pass: AA22-187A HTML sha256
    ee8368b0...10627848; AA23-040A HTML sha256 e56423c3...b4f3ba97; DOJ
    Rim Jong Hyok filed-indictment PDF (US v. Rim, 2:24-cr-20061-HLT-ADM,
    Doc 1, 17 pp) sha256 b10b92a8...f6d4589d. DOCUMENTARY advisory event
    (AA22-187A) on the DPRK Maui healthcare-ransomware campaign.

    [a] FACTS — STRUCK a heavily fabricated tradecraft sentence. Prior
    summary asserted the Maui initial-access chain "includes Log4Shell
    exploitation against VMware Horizon, web shells on internet-facing
    servers, valid credentials harvested via Mimikatz-style credential
    dumping, lateral movement on RDP and SMB, and the BLINDINGCAN,
    Dtrack, and 3PROXY tooling." Verified vs all three raws: "VMware" /
    "Horizon" 0 hits in every source; "web shell" / "webshell" 0;
    "Mimikatz" 0; "BLINDINGCAN" 0; "3proxy" 0. RDP (9) / SMB (4) appear
    in AA22-187A ONLY in mitigations boilerplate (secure RDP; restrict
    SMB), not as observed tradecraft. AA22-187A explicitly states "The
    initial access vector(s) for these incidents is unknown." Log4Shell
    IS real but tied to the DEFENSE intrusions — DOJ para 45 "exploited
    the Log4Shell vulnerability" (US Air Force bases), AA23-040A lists
    CVE-2021-44228 generically — NOT the healthcare Maui vector. Only
    DTrack survives (DOJ para 25 RGB malware list "Valefor, VSingle,
    ValidAlpha, YamaBot, DTrack, TigerRAT, and MagicRAT"). Rewrote
    summary/outcome to sourced facts: Maui = manual CLI encryptor,
    AES-128 per-file RSA-wrapped keys (maui.key / maui.evd), maui.log
    exfiltrated (AA22-187A paras re Stairwell analysis); ransom note with
    crypto address, two BTC paid by the Kansas hospital, laundered
    Bitcoin -> Tether -> yuan -> Chinese bank -> Dandong ATM (DOJ paras
    26/30-32). "ransoms paid in BTC" retained (DOJ-carried; AA22-187A
    itself only notes FBI seeking "bitcoin wallet information"). Changed
    initial_vector n-day -> unknown (AA22-187A) and incident_type
    [ransomware, intrusion] -> [documentary, ransomware] (documentary
    advisory; healthcare vector explicitly unknown). REMOVED target
    sectors/healthcare/research — unsupported: AA22-187A victims are
    hospitals / EHR / diagnostics / imaging (= healthcare/hospital
    "Hospitals & clinical care"); the lone DOJ "research and development
    data" hit (para 49) is DEFENSE R&D, not a healthcare research/vaccine
    entity.

    [b] ATTRIBUTION — CORRECTED over-attestation. Prior entry credited
    the kp/rgb/andariel attribution to AA22-187A (attributing_org "US
    CISA + FBI + HHS + Treasury", attribution_date 2022-07-06). But
    AA22-187A attributes only at NATION level ("North Korean
    state-sponsored cyber actors"; 0 raw "Andariel" / "RGB" /
    "Reconnaissance General Bureau"), and AA23-040A names neither. The
    named-unit attribution rests solely on the 2024 DOJ indictment: para
    1 "North Korea's primary military intelligence agency is the
    Reconnaissance General Bureau (RGB)"; para 2 "A cyber unit within the
    RGB is known ... as Andariel, Onyx Sleet, and Silent Chollima."
    Reassigned attributing_org -> US DOJ, attribution_date -> 2024-07-25,
    attribution_source_id -> the indictment; auspex concur, confidence
    high (grand-jury indictment). Matches sibling
    2024-07/andariel-rim-jong-hyok-indictment.

    [c] DATES ok — start_date 2021-05-01 (AA22-187A "Since May 2021"; DOJ
    Kansas hospital 4 May 2021); disclosure_date 2022-07-06 = AA22-187A
    published_on (verified vs record + snapshot); end_date null (campaign
    ongoing). Source published_on all verified: 2022-07-06 / 2023-02-09 /
    2024-07-25.

    [d] DOCTRINE_LINKS — revenue-aggregation KEPT strongly_inferred; its
    STALE reasoning fixed (prior text "indictment not re-fetched in
    pre-pass" — the PDF IS now captured/hashed). No cited source names the
    WMD / ballistic-missile PROGRAMS as the revenue's terminal goal (0
    hits WMD / ballistic / weapons of mass destruction); the indictment
    names only the proximate self-funding goal (para 23 "purchase
    internet servers to commit computer intrusions"), so strongly_inferred
    is correct; added inference_basis {signals, ruled_out}.
    strategic-tech-collection UPGRADED strongly_inferred -> attested (it
    previously carried NO inference_basis — a schema gap): the indictment
    states the terminal goal in substance — para 3 "these hacking
    operations aligned with the RGB's goal of collecting information that
    furthers the North Korean regime's military and nuclear aspirations"
    (missile / aerospace / uranium-processing tech) — and draws the full
