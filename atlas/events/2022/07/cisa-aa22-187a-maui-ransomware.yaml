id: 2022-07/cisa-aa22-187a-maui-ransomware
name: CISA AA22-187A Maui Ransomware advisory (Andariel)
start_date: 2021-05-01  # campaign onset per advisory
disclosure_date: 2022-07-06
end_date: null  # ongoing per CISA AA23-040A
incident_type:
  - ransomware
  - intrusion
initial_vector: n-day
outcome_summary: |
  Manually-deployed Maui custom ransomware (AES encryption with
  operator-supplied keys) against US healthcare and public-health
  sector targets since May 2021. Multiple hospital encryption
  events; ransoms paid in BTC. CISA / FBI / HHS / Treasury joint
  advisory consolidates the campaign and provides IoCs.
false_flag_risk: none
operators_named:
  - rim-jong-hyok  # Andariel, DOJ Kansas Jul 2024 (retroactive Maui attribution)
summary: |
  Canonical Andariel revenue-self-funding operation per the 2024
  Rim Jong Hyok DOJ indictment, which retroactively confirms that
  ransom proceeds were laundered via PRC facilitators to fund
  follow-on defense-network intrusions. Maui is a manually run
  command-line encryptor — operators pre-stage it on the victim
  domain, select files, and trigger AES encryption with an
  operator-supplied key, then leave a manual ransom demand
  outside the encrypted filesystem. Initial access tradecraft
  per the advisory and follow-on DOJ indictment includes
  Log4Shell exploitation against VMware Horizon, web shells on
  internet-facing servers, valid credentials harvested via
  Mimikatz-style credential dumping, lateral movement on RDP and
  SMB, and the BLINDINGCAN, Dtrack, and 3PROXY tooling from the
  broader Andariel toolset before the Maui encryptor runs.
