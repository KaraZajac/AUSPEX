id: 2022-07/cisa-aa22-187a-maui-ransomware
name: CISA AA22-187A Maui Ransomware advisory (Andariel)
start_date: 2021-05-01  # campaign onset — AA22-187A "Since May 2021"; DOJ Kansas hospital 4 May 2021
disclosure_date: 2022-07-06
end_date: null  # campaign ongoing at disclosure (AA23-040A / DOJ show activity into March 2023)
incident_type:
  - documentary  # CISA/FBI/HHS/Treasury joint advisory (the artifact this event anchors on)
  - ransomware
initial_vector: unknown  # AA22-187A: "The initial access vector(s) for these incidents is unknown"; the Log4Shell (n-day) vector belongs to the DEFENSE intrusions per DOJ/AA23-040A, not the healthcare Maui deployments
outcome_summary: |
  Manually-deployed custom Maui ransomware — AES-128 per-file
  encryption, RSA-wrapped, using operator-staged key files
  (maui.key / maui.evd) — against US Healthcare and Public Health
  (HPH) sector targets since May 2021. Multiple hospital /
  clinical-care encryption events disrupting electronic health
  records, diagnostics, imaging, and intranet services; at least
  one ransom (the Kansas hospital: two Bitcoin) was paid and
  laundered per the 2024 DOJ indictment. CISA / FBI / HHS /
  Treasury joint advisory (AA22-187A) consolidates the campaign
  and provides IoCs.
false_flag_risk: none
operators_named:
  - rim-jong-hyok  # Andariel, DOJ Kansas Jul 2024 (retroactive Maui attribution)
summary: |
  Canonical Andariel revenue-self-funding operation, retroactively
  resolved to Andariel by the 2024 Rim Jong Hyok DOJ indictment,
  which confirms Maui ransom proceeds were laundered via PRC
  facilitators (Bitcoin -> Tether -> Chinese yuan -> Chinese bank
  -> a Dandong ATM at the Sino-Korean Friendship Bridge) and used
  to buy the server infrastructure for the RGB's follow-on
  defense-network intrusions. Maui (maui.exe) is a manually run
  command-line encryptor: per AA22-187A the operator uses a
  command-line interface to select files and AES-128-encrypts each
  with a unique, RSA-wrapped key (the RSA pair maui.key / maui.evd
  staged in the working directory), writing a maui.log the
  operators exfiltrate to decrypt; the indictment adds that Maui
  leaves a ransom note carrying a cryptocurrency address (two
  Bitcoin demanded from the Kansas hospital). AA22-187A states the
  initial-access vector for the Maui healthcare incidents is
  UNKNOWN; the Log4Shell (CVE-2021-44228) exploitation named in
  AA23-040A and in the indictment pertains to the RGB's follow-on
  intrusions against defense targets (e.g. US Air Force bases), not
  the healthcare Maui deployments. DTrack appears in the DOJ's
  inventory of RGB/Andariel malware (para 25).
attributions:
  - actor_id: kp/rgb/andariel
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2024-07-25
    attribution_source_id: doj/2024-07-25_andariel-rim-jong-hyok-indictment
    notes: |
      Attribution reassigned from the namesake advisory to the 2024 DOJ
      indictment — the source that actually names the unit. The
      contemporaneous AA22-187A (2022) attributed only at NATION level:
      "North Korean state-sponsored cyber actors", with 0 raw occurrences
      of "Andariel" / "RGB" / "Reconnaissance General Bureau" in its
      snapshot (sha256 ee8368b0...10627848); AA23-040A (2023) likewise
      names neither. The Rim Jong Hyok indictment names the Reconnaissance
      General Bureau as "North Korea's primary military intelligence
      agency" (para 1) and Andariel / Onyx Sleet / Silent Chollima as "a
      cyber unit within the RGB" (para 2), retroactively resolving the
      Maui campaign to Andariel -> attributing_org US DOJ, attribution_date
      2024-07-25, attribution_level named-unit, auspex concur. Consistent
      with the sibling event 2024-07/andariel-rim-jong-hyok-indictment.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Maui is DPRK ransomware run for revenue. The primary advisory
      (AA22-187A) states only that paying ransoms "may ... fund illicit
      activities" (generic), and AA23-040A that DPRK ransomware revenue
      "supports DPRK national-level priorities and objectives, including
      cyber operations targeting the United States and South Korea
      governments" — neither names a WMD / regime-financing terminal
      goal. The 2024 DOJ indictment (raw captured, sha256 b10b92a8...)
      articulates the revenue->operations loop — ransom proceeds
      laundered via PRC facilitators and used to "purchase internet
      servers to commit computer intrusions" (para 23) — but names only
      that PROXIMATE self-funding goal, never the WMD / ballistic-missile
      PROGRAMS (0 raw hits "WMD" / "ballistic" / "weapons of mass
      destruction"). Terminal WMD-financing linkage therefore inferred,
      not attested.
    inference_basis:
      signals:
        - "AA22-187A: ransom payment 'may ... fund illicit activities'; AA23-040A: DPRK ransomware revenue 'supports DPRK national-level priorities and objectives'."
        - "DOJ indictment paras 23/27: ransom proceeds buy the VPS / internet servers used for the defense-tech intrusions — revenue directly underwrites the collection operations."
        - "Laundering chain routes proceeds back toward the DPRK regime (Bitcoin -> Tether -> Chinese yuan -> Chinese bank -> a Dandong ATM at the Sino-Korean Friendship Bridge; two Hong Kong intermediaries)."
      ruled_out: "Pure financially-motivated cybercrime with no state-program nexus — rejected: the indictment ties the ransom-funded operations to RGB collection furthering DPRK military/nuclear aims. Stays strongly_inferred (not attested) only because no cited source states the ransom proceeds finance the WMD / ballistic-missile PROGRAMS themselves."
    contested: false
    analyst: claude
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/strategic-tech-collection
    program_id: null
    confidence: attested
    reasoning: |
      The 2024 DOJ indictment states the terminal goal IN SUBSTANCE and
      draws the full chain from this event's healthcare ransomware to it:
      the ransoms "in turn funded the Conspirators' computer intrusions
      into government agencies, military bases, and companies supporting
      the military, including with missile, aerospace, and uranium
      processing technology[;] ... these hacking operations aligned with
      the RGB's goal of collecting information that furthers the North
      Korean regime's military and nuclear aspirations" (para 3).
      Collection against defense / aerospace / nuclear targets serving
      DPRK military modernization is exactly the goal the
      strategic-tech-collection pillar encodes; the doctrine slug need
      not appear. NB strategic-tech-collection is the DOWNSTREAM purpose
      the Maui healthcare revenue funds (this event's own targets are
      healthcare), but the indictment makes the ransom -> server-buy ->
      defense-collection -> military/nuclear-aspirations linkage
      explicit. Consistent with the sibling indictment event's treatment
      of the same DOJ source.
    attesting_source_id: doj/2024-07-25_andariel-rim-jong-hyok-indictment
    inference_basis:
      source_id: doj/2024-07-25_andariel-rim-jong-hyok-indictment
      source_quote: |
        These hacking operations aligned with the RGB's goal of
        collecting information that furthers the North Korean regime's
        military and nuclear aspirations. [DOJ indictment para 3; the
        ransom-funded intrusions exfiltrated "missile, aerospace, and
        uranium processing technology" (para 3).]
    contested: false
    analyst: claude
