id: 2022-09/donot-foreign-ministry-southeast-asia
name: DoNot Team targeting of Pakistani and Bangladeshi foreign-ministry equities
start_date: 2022-04-01
disclosure_date: 2022-09-15
end_date: 2022-09-15
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Morphisec and Cyfirma published analyses of DoNot Team
  operations through 2022 against Pakistani and Bangladeshi
  foreign-ministry personnel. DoNot Team used the yty Windows
  malware framework and the Firebird .NET backdoor (a 2022
  Morphisec disclosure); Android tooling continued to be
  deployed via WhatsApp social engineering against South Asian
  civil-society and diplomatic targets.
false_flag_risk: none
summary: |
  Continuity case for DoNot Team's regional collection lane.
  The Pakistani and Bangladeshi foreign-ministry victim set is
  the canonical pattern across Indian-aligned clusters; DoNot's
  distinctive Android capability gives the cluster a mobile
  reach that SideWinder and Patchwork largely lack.
