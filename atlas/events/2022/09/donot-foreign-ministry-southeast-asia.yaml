  Morphisec disclosure)", and a Bangladeshi / "Southeast Asian"
  foreign-ministry victim set -- are all fabricated or
  anachronistic (see qc). Corrected here to the truthful minimum
  (the real Morphisec Aug-2022 yty/Jaca disclosure against
  Pakistani government/defense) pending orchestrator retirement.
  NB: DoNot Team targets South Asia, not Southeast Asia; the file
  slug "southeast-asia" is geographically wrong (rename = FK
  change, left to the orchestrator).
