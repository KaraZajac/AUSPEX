outcome_summary: |
  Morphisec Labs published "APT-C-35: New Windows Framework
  Revealed" (11 Aug 2022), documenting a refresh of the DoNot
  Team / APT-C-35 modular Windows framework (a.k.a. yty, Jaca):
  an RTF remote-template-injection spear-phishing chain, a
  shellcode loader with an AV-driver / expiry-date evasion check,
  a new DLL variant of the reverse-shell module, and an upgraded
  Chrome/Firefox browser stealer, with C2 resolved via a Google
  Drive-hosted encrypted document. Morphisec states the latest
  spear-phishing campaign "targeted government departments,
  including Pakistan's defense sector." DoNot's general victim set
  is "government and military organizations, ministries of foreign
  affairs, and embassies" across South Asian countries.
false_flag_risk: none
