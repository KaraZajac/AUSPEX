    notes: "Third GRU-linked Telegram persona named in the report (with XakNet + CyberArmyofRussia_Reborn); actor ru/gru/infoccentr created 2026-07-02. Same MODERATE-confidence GRU-coordination basis as the sibling personas; Mandiant reserves judgement on exact composition."
