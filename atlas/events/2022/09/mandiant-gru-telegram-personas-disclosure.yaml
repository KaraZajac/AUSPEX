id: 2022-09/mandiant-gru-telegram-personas-disclosure  # re-filed 2026-07-04 (Kara-approved) from 2023-09/: the Mandiant report is dated 2022-09-23; the 2023-09 slug was a date fabrication artifact
name: Mandiant — GRU / Sandworm (APT44) coordinating with Telegram "hacktivist" personas (XakNet, Infoccentr, CARR)
start_date: 2022-03-01  # earliest observed coordination per Mandiant
disclosure_date: 2022-09-23  # AUDIT 2026-07-02: raw byline "September 23, 2022" + JSON-LD datePublished 2022-09-23 (was 2023-09-14, unsupported anywhere in source)
end_date: null
incident_type:
  - disclosure
  - influence-operation
  - hack-and-leak
initial_vector: unknown
outcome_summary: |
  Mandiant assessed with moderate confidence that the moderators of
  three self-proclaimed hacktivist Telegram channels — XakNet Team,
  Infoccentr, and CyberArmyofRussia_Reborn (CARR) — were coordinating
  their operations with GRU-sponsored cyber threat actors. The pattern:
  GRU operators (APT44 / Sandworm) conducted wiper intrusions against
  Ukrainian organizations; the personas leaked the victims' data on
  Telegram within 24 hours for psychological / influence effect,
  providing deniability and signal magnification. Mandiant identified
  at least 16 such data leaks, four coincident with APT44 wiping
  (CADDYWIPER via ARGUEPATCH). Originally (23 Sep 2022) attributed to
  APT28 on a case of network cohabitation; amended April 2024 to
  attribute the intrusion activity to APT44 (Sandworm) with high
  confidence.
false_flag_risk: none
summary: |
  Foundational documentation of the GRU's use of false "hacktivist"
  Telegram fronts (XakNet, Infoccentr, CARR) as conduits for pro-Russia
  information operations and deniable cyber effect. Mandiant roots the
  tactic in long-standing GRU tradecraft — the 2014 CyberBerkut
  compromise of Ukraine's Central Election Commission and the 2016
  Guccifer 2.0 persona — and names two influence objectives: promoting
  Russian interests abroad, and promoting the image of average Russians
  supporting the government to domestic audiences. The report ratified,
  at Mandiant's stated moderate confidence, what AUSPEX had treated as
  strongly-inferred GRU-persona coordination.
attributions:
