    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2024-04-01
    attribution_source_id: mandiant/2023-09-14_gru-telegram-minions
    notes: "Originally (23 Sep 2022) this blog attributed the persona-linked intrusions to APT28 on a case of network cohabitation; in an April 2024 UPDATE Mandiant re-analyzed the overlapping activity and re-attributed the intrusion activity to 'APT44 (aka Sandworm Team) with high confidence'. APT44 is attributed by multiple governments to GRU Unit 74455 (Mandiant notes it is possible multiple GRU units were involved). attribution_date 2024-04-01 = 'April 2024' amendment (exact day not stated)."
  - actor_id: ru/gru/xaknet
    attributing_org: Mandiant
    attributing_org_confidence: moderate
