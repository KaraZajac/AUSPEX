    notes: "Mandiant 'assesses with moderate confidence that the moderators of CyberArmyofRussia_Reborn are at least coordinating with APT44 due to the timing of the leaks and the group's connection to Xaknet, although the exact nature of the relationship is currently unclear'. MODERATE; named-actor + concur-with-caveat. Confidence downgraded from an unsupported 'high'."
  - actor_id: ru/gru/infoccentr
    attributing_org: Mandiant
    attributing_org_confidence: moderate
