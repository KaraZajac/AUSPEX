    notes: "Mandiant: 'We assess with moderate confidence that the moderators of the XakNet Team channel are directly supported by APT44' and 'either are GRU intelligence officers or work directly with the GRU APT44 operators conducting on-net operations'. MODERATE not high; Mandiant 'reserve[s] judgement as to the composition of these groups and their exact degree of affiliation with the GRU' — hence named-actor + concur-with-caveat. Confidence downgraded from an unsupported 'high'."
  - actor_id: ru/gru/carr
