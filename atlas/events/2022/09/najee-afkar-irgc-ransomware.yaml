id: 2022-09/najee-afkar-irgc-ransomware
name: Treasury / DOJ coordinated action — IRGC-affiliated ransomware contractors
start_date: 2020-01-01  # underlying campaign onset
disclosure_date: 2022-09-14
end_date: 2022-09-14
incident_type:
  - ransomware
  - data-theft
initial_vector: n-day  # Fortinet / Exchange / Log4j
outcome_summary: |
  Treasury OFAC jy0948 sanctioned the Najee Technology / Afkar
  System cluster; DOJ indicted Mansour Ahmadi, Ahmad Khatibi
  Aghda, and Amir Hossein Nikaeen Ravari. CISA AA22-257A
  documented IRGC-affiliated ransomware exploitation of
  Fortinet, Microsoft Exchange, and VMware Horizon Log4j.
  Underlying campaign hit US, UK, Israel, Australia, and Iran-
  adversary critical infrastructure including Boston Children's,
  Vermont healthcare, a US domestic-violence shelter, and US
  accounting firms. Hundreds of victims; tens of millions
  extorted.
quantified_impact:
  affected_orgs_estimate: hundreds
false_flag_risk: none
operators_named:
  - ahmadi-mansour  # Najee Technology, DOJ Sep 2022
  - khatibi-aghda-ahmad  # Afkar System, DOJ Sep 2022
  - nikaeen-ravari-amir-hossein  # DOJ Sep 2022
summary: |
  Foundational attestation of IRGC-contractor ransomware as
  state-tolerated revenue. Treasury press release identifies the
  IRGC affiliation explicitly. CISA AA22-257A documents the
  intrusion tradecraft: initial access via Fortinet FortiOS
  vulnerabilities (CVE-2018-13379, CVE-2020-12812, CVE-2019-5591),
  Microsoft Exchange ProxyShell (CVE-2021-34473), and VMware
  Horizon Log4Shell (CVE-2021-44228); post-exploitation use of
  PowerShell, scheduled tasks, BitLocker abuse for impact, the
  Plink / Ngrok / Fast Reverse Proxy tools for tunneling, and
  Mimikatz for credential dumping. The operators encrypted with
  full-disk BitLocker rather than custom ransomware on Windows
  endpoints, providing plausibly criminal cover for state-tasked
  destruction.
