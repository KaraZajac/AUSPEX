doctrine_links:
  - doctrine_id: ir/sanctions-evasion
    pillar_id: ir/sanctions-evasion/ransomware-revenue
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      DOWNGRADED from attested 2026-07-05 (over-attestation sweep;
      same pattern as pioneer-kitten). The Treasury jy0948 release
      attests the IRGC affiliation (E.O. 13694 — one actor acts "for
      or on behalf of" Khatibi) and the ransomware activity, but does
      NOT state a sanctions-evasion / regime-revenue GOAL in
      substance: it frames the designation as a response to the
      actors' ransomware targeting of US critical infrastructure, not
      as a state revenue-generation or sanctions-evasion program. The
      ransomware-for-revenue reading is a strong inference from the
      IRGC nexus, not a source-stated goal — hence strongly_inferred,
      not attested.
    attesting_source_id: treasury/2022-09-14_irgc-ransomware-contractors
    inference_basis:
      signals:
        - "OFAC designates ten IRGC-affiliated individuals + two entities for ransomware activity under E.O. 13694; one acts 'for or on behalf of' Khatibi."
        - "Documented ransomware ops (NJ municipality via Fortinet CVE, unauthorized-BitLocker extortion of small businesses, a US children's-hospital SCADA network) demonstrate a revenue-extraction function."
      ruled_out: "A pure personal-criminal-profit reading (the companion DOJ indictment emphasizes indiscriminate victim selection and individual enrichment) competes with the regime-sanctions-evasion reading; the release states neither a regime-revenue purpose nor a sanctions-evasion motive, so attested is unwarranted."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Target set (hospitals, domestic-violence shelter, local
      government, accounting firms) is consistent with civilian-CII
      impact, but CISA AA22-257A is a technical TTP advisory that
      never frames a coercion intent or names asymmetric warfare;
      the doctrine linkage is inferred from the victim set.
    attesting_source_id: cisa/2022-09-14_aa22-257a-irgc-ransomware
    inference_basis:
      source_id: cisa/2022-09-14_aa22-257a-irgc-ransomware
      signals:
        - "CISA AA22-257A documents IRGC-affiliated ransomware TTPs and a civilian-CII victim set (TTPs + targets)"
      ruled_out: "an 'asymmetric warfare' / civilian-CII-coercion strategic intent — not framed by the technical advisory"
    counter_explanation: null
    contested: false
    analyst: claude
