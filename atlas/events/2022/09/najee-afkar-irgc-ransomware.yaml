id: 2022-09/najee-afkar-irgc-ransomware
name: Treasury / DOJ / CISA coordinated action — IRGC-affiliated ransomware contractors (Najee Technology / Afkar System)
start_date: 2020-01-01  # underlying campaign onset — Treasury: "compromising networks based in the United States and other nations since at least 2020"
disclosure_date: 2022-09-14
end_date: 2022-09-14  # single-day coordinated US counter-action
incident_type:
  - law-enforcement  # DOJ (US Attorney, District of New Jersey) unsealed CFAA indictment of Mansour Ahmadi, Ahmad Khatibi, Amir Hossein Nikaeen Ravari
  - policy           # OFAC jy0948 designation of ten individuals + two entities under E.O. 13694
initial_vector: n-day  # of the UNDERLYING campaign (the counter-action itself has no access vector): CISA AA22-257A — Fortinet FortiOS (CVE-2018-13379 / 2020-12812 / 2019-5591), Exchange ProxyShell (CVE-2021-34473), Log4j on VMware Horizon (CVE-2021-44228)
outcome_summary: |
  Coordinated US counter-action of 14 September 2022 against an
  IRGC-affiliated ransomware contractor cluster. Treasury OFAC
  (jy0948) sanctioned ten individuals and two entities — Najee
  Technology Hooshmand Fater LLC and Afkar System Yazd Company —
  under E.O. 13694; the U.S. Attorney's Office for the District of
  New Jersey unsealed an indictment charging Mansour Ahmadi, Ahmad
  Khatibi Aghda, and Amir Hossein Nikaeen Ravari with violating and
  conspiring to violate the Computer Fraud and Abuse Act; and CISA
  with the FBI, NSA, Treasury, Australia's ACSC, Canada's CCCS and
  the UK's NCSC published joint advisory AA22-257A documenting the
  exploitation tradecraft. State's Rewards for Justice offered up to
  $10 million for information on the actors. Per the sources the
  underlying campaign (since at least 2020) hit US critical-
  infrastructure sectors plus Australian, Canadian and UK
  organizations; named US victims include a New Jersey municipality,
  small businesses (a law firm, an accounting firm, a construction
  contractor), a US children's-hospital SCADA network (June 2021),
  and a rural US electric utility (October 2021).
false_flag_risk: none
operators_named:
  - ahmadi-mansour  # Mansour Ahmadi, Najee Technology — DOJ (D.N.J.) indictment Sep 14 2022
  - khatibi-aghda-ahmad  # Ahmad Khatibi Aghda, Afkar System managing director — DOJ Sep 14 2022
  - nikaeen-ravari-amir-hossein  # Amir Hossein Nikaeen Ravari — DOJ Sep 14 2022 (Treasury spelling "Nikaeen")
summary: |
  Counter-action event (not an Iranian cyber operation): the 14
  September 2022 coordinated US action against the IRGC-affiliated
  ransomware contractor cluster operating "under the auspices of"
  Najee Technology Hooshmand Fater LLC (Karaj) and Afkar System Yazd
  Company (Yazd). Three instruments landed the same day: (1) an OFAC
  designation (jy0948) of ten individuals and two entities under E.O.
  13694 — Afkar System designated for having "acted for or on behalf
  of" its managing director Ahmad Khatibi; (2) a District of New
  Jersey CFAA indictment of Mansour Ahmadi, Ahmad Khatibi Aghda and
  Amir Hossein Nikaeen Ravari; and (3) joint advisory AA22-257A.
  CISA AA22-257A documents the intrusion tradecraft of the underlying
  campaign: initial access via Fortinet FortiOS vulnerabilities
  (CVE-2018-13379, CVE-2020-12812, CVE-2019-5591), Microsoft Exchange
  ProxyShell (CVE-2021-34473, with CVE-2021-34523 / CVE-2021-31207),
  and Log4Shell on VMware Horizon (CVE-2021-44228); post-exploitation
  use of PowerShell, scheduled tasks, the Plink and Fast Reverse Proxy
  tunneling utilities, LSASS memory dumping for credential harvesting,
  and — for impact — activating Microsoft BitLocker without
  authorization and holding the decryption keys for ransom (Treasury
  additionally names Mimikatz and FileZilla). Directionality: the
  victims are US (and Australian / Canadian / UK) critical
  infrastructure; the action documented by this event is US law
  enforcement and sanctions. NB the June-2021 "U.S.-based children's
  hospital" SCADA compromise named by Treasury is the real event
  behind the fenced Najee/Afkar inference note in
  2021-06/boston-childrens-hospital-thwarted, though Treasury does not
  name Boston. DOJ frames the defendants as IRGC-affiliated while
  acting substantially for ransom revenue (see doctrine links).
