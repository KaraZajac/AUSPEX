    confidence: strongly_inferred
    reasoning: |
      The IRGC affiliation and the ransomware activity are attested by
      Treasury jy0948 and CISA AA22-257A, but neither source states a
      regime sanctions-evasion / state-revenue GOAL in substance:
      Treasury frames the designation as a response to the actors'
      ransomware targeting of US critical infrastructure, not as a
      sanctions-evasion revenue program. The ransomware-for-revenue
      reading is a strong inference from the IRGC nexus plus the
      ransom-for-money character of the ops, not a source-stated goal —
      hence strongly_inferred, not attested (DOWNGRADED from attested
      2026-07-05; same over-attestation pattern as pioneer-kitten).
    attesting_source_id: treasury/2022-09-14_irgc-ransomware-contractors
    inference_basis:
      source_id: treasury/2022-09-14_irgc-ransomware-contractors
      signals:
        - "OFAC sanctioned 'ten individuals and two entities' who are 'all affiliated with Iran's Islamic Revolutionary Guard Corps (IRGC)' under E.O. 13694; Afkar System designated for having 'acted for or on behalf of' its managing director Khatibi."
