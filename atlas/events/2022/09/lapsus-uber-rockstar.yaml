    - CSRB PDF csrb__2023-08-10_lapsus-report.pdf
      sha256 d6e6382699cc4268ded2008edf358bd2ee9c50442704dad8bc3fe2846de2f8fc
    - CBS News cbsnews__2023-12-21_kurtaj-gta6-hospital-order.html
