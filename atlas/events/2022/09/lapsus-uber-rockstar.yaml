    [a] FACTS — one CONFLATION STRIPPED and the Uber access list corrected against
    first-party wording. STRIPPED: "Uber CISO Joe Sullivan separately convicted Oct 5
    2022 on charges related to the earlier 2016 breach" — 0 hits in any cited source;
    this is a SEPARATE 2016-breach cover-up prosecution, unrelated to the 2022 Lapsus$
    intrusion (classic conflation), removed. Uber access list "Slack, AWS, Google
    Workspace, vSphere, and HackerOne" corrected: Uber's statement says "elevated
    permissions to a number of tools, including G-Suite and Slack" (so "Google
    Workspace" -> "G-Suite" per source), "accessed our dashboard at HackerOne", and
    "an internal tool our finance team uses to manage some invoices" (= CSRB fn150:
    "downloaded internal Slack messages, accessed or downloaded information from an
    internal invoice management tool and bug bounty reports of one organization").
    "vSphere" REMOVED (absent from first-party; a press/screenshot artifact, no cited
    source). "AWS" REMOVED as an accessed system — the ONLY AWS mention is a NEGATIVE:
    "have not found that the attacker accessed any customer or user data stored by our
    cloud providers (e.g. AWS S3)". Added the source-carried blast-radius negatives
    (no production/user-account/sensitive-DB/codebase-change access). MFA-fatigue
    VERIFIED verbatim (Uber): "The attacker then repeatedly tried to log in ... Each
    time, the contractor received a two-factor login approval request, which initially
    blocked access. Eventually, however, the contractor accepted one" (CSRB corroborates
    the TTP: "Threat actors used MFA fatigue, spamming employees with MFA prompts ...
    until they said yes"). Initial vector VERIFIED (Uber): "likely that the attacker
    purchased the contractor's Uber corporate password on the dark web, after the
    contractor's personal device had been infected with malware" -> valid-creds correct.
    GTA VI leak VERIFIED (CSRB fn151: "stole and published source code for two flagship
    games from a gaming company, including related assets from the company's Confluence
    and Slack servers"; title "GTA 6 (Americas) leak - 90+ .mp4 footage/videos,
    September 17, 2022") + CBS ("leaked 90 clips from Rockstar Games' forthcoming Grand
    Theft Auto VI"). Extortion VERIFIED verbatim (CBS): Kurtaj "wrote, 'if Rockstar does
    not contact me on Telegram within 24 hours I will start releasing the source code.'
    He publicly posted the code and clips" -> added `extortion` to incident_type.
    Take-Two/Rockstar Sep 19 confirmation and OpenDNS graphic retained (Uber statement +
    public record).

    [b] ATTRIBUTION — high/concur upheld, NOT over-attested. Triangulated: Uber
    self-attributed ("this attacker ... affiliated with a hacking group called
    Lapsus$"), CSRB reviewed the campaign, and a UK jury CONVICTED named Lapsus$ member
    Arion Kurtaj (Aug 2023) for these acts — about as firm as attribution gets, yet
    still a criminal crew with no state nexus. attributing_org tidied to "UK criminal
    conviction (CPS) + Uber + CSRB"; attribution_level named-actor added.

    [c] DATES — start_date/disclosure_date 2022-09-15 (Uber incident surfaced Sep 15,
    Slack message posted / OpenDNS defaced that night), end_date 2022-09-19
    (Rockstar/Take-Two confirmation + Uber's dated update "September 19, 10:45am PT").
    Rockstar leak posted Sep 17-18 (CSRB fn151 Sep 17; BleepingComputer fn255 Sep 18) —
    within the window. Source published_on verified: Uber 2022-09-19 (byline
    "September 19, 10:45am PT"); CSRB 2023-08-10; CBS 2023-12-21 (byline "Updated on:
    December 22, 2023", story dated the Thursday Dec 21 sentencing). attribution_date
    2023-08-24 = the UK jury verdict (event fact), correctly distinct from source dates.

    [d] DOCTRINE_LINKS — empty, correct. Transnational youth extortion crew; CSRB frames
    Lapsus$ as non-nation-state. No attacker/defender/victim doctrine applies.

    [e] ATTRIBUTION_LEVEL — added named-actor (Lapsus$ named group; named member Kurtaj
    convicted; no finer state-unit level applies to a criminal crew).

    [f] ACTOR_ID — criminal/lapsus resolves to atlas/actors/criminal/lapsus.yaml
