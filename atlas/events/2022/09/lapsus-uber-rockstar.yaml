id: 2022-09/lapsus-uber-rockstar
name: Lapsus$ Uber and Rockstar Games (GTA VI leak) intrusions
start_date: 2022-09-15
disclosure_date: 2022-09-15
end_date: 2022-09-19
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Uber (Sep 15 2022): MFA-fatigue / push-bombing attack on a
  contractor account followed by lateral movement to Slack,
  AWS, Google Workspace, vSphere, and HackerOne. Attacker
  posted internal screenshots on Telegram. Uber CISO Joe Sullivan
  separately convicted Oct 5 2022 on charges related to the
  earlier 2016 breach. Rockstar Games (Sep 18 2022): exfiltration
  of ~90 in-development Grand Theft Auto VI gameplay videos and
  source code, posted publicly to GTAForums. Take-Two confirmed
  the breach Sep 19. Both attributed to Lapsus$ operator Arion
  Kurtaj (UK, 17 at time), already on bail for prior Lapsus$
  offenses while staying at a Travelodge hotel under police
  protection.
false_flag_risk: none
operators_named:
  - kurtaj-arion  # Lapsus$, UK CPS Aug 2023 conviction
summary: |
  Concluding cluster of Lapsus$ activity before UK arrests.
  Kurtaj convicted Aug 24 2023 in UK; sentenced to indefinite
  detention in a secure hospital Dec 21 2023 due to autism
  diagnosis preventing trial in lower court. AUSPEX uses this
  cluster as the canonical "youth-led crew with no state nexus"
  closure.
