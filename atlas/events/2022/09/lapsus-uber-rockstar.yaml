id: 2022-09/lapsus-uber-rockstar
name: Lapsus$ Uber and Rockstar Games (GTA VI leak) intrusions
start_date: 2022-09-15
disclosure_date: 2022-09-15
end_date: 2022-09-19
incident_type:
  - intrusion
  - data-theft
  - extortion  # Rockstar/GTA VI: "24 hours or I release the source code" ransom demand
initial_vector: valid-creds  # Uber: purchased contractor creds (dark web) + MFA-fatigue/push-bombing to defeat 2FA
outcome_summary: |
  Two loosely-linked Lapsus$ intrusions in one week. UBER
  (disclosed Sep 15 2022): the attacker likely bought an Uber EXT
  contractor's corporate password on the dark web (after the
  contractor's personal device was malware-infected), then defeated
  the second factor by MFA-fatigue / push-bombing — "the contractor
  received a two-factor login approval request... Eventually,
  however, the contractor accepted one." From there the attacker
  reached elevated permissions to "a number of tools, including
  G-Suite and Slack," posted to a company-wide Slack channel,
  reconfigured Uber's OpenDNS to display a graphic, downloaded some
  internal Slack messages and finance/invoice-tool data, and accessed
  Uber's HackerOne bug-bounty dashboard (reports since remediated).
  Uber found NO access to production systems, user accounts,
  sensitive-user databases, or codebase changes. ROCKSTAR GAMES (leak
  posted Sep 17-18 2022): exfiltration and public leak of 90+
  in-development Grand Theft Auto VI gameplay videos plus source code
  (with Confluence/Slack assets), posted to GTAForums; the actor
  extorted Rockstar first — "if Rockstar does not contact me on
  Telegram within 24 hours I will start releasing the source code."
  Rockstar/Take-Two confirmed the breach Sep 19. Both attributed to
  Lapsus$ operator Arion Kurtaj (UK, 17 at the time), then on bail
  for prior Lapsus$ offenses — he ran the GTA hack from a hotel using
  an Amazon Fire TV Stick, the hotel TV and his phone.
false_flag_risk: none  # attacker self-claimed as Lapsus$-affiliated; operator later criminally convicted
operators_named:
  - kurtaj-arion  # Lapsus$; UK jury conviction Aug 2023 (hacking, fraud, extortion)
summary: |
  Final Lapsus$ cluster before the group's core operators were
  convicted. Kurtaj — already on bail from a prior (Mar 2022) UK
  arrest — was re-arrested after these Sep 2022 breaches; a British
  jury convicted him and a co-defendant in Aug 2023 of hacking,
  fraud and extortion, and he was sentenced Dec 21 2023 to indefinite
  detention in a secure hospital (severely autistic, deemed unfit to
  stand trial). AUSPEX uses this cluster as the canonical "youth-led
  crew with no state nexus" closure.
