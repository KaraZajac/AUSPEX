    pillar_id: cn/intelligentized-warfare/sigint-c4isr-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Mandiant suspected this highly targeted, evasive hypervisor implantation was cyber-espionage motivated. Stealthy, persistent collection on virtualization fabric maps in substance to intelligentized-warfare's strategic SIGINT/C4ISR collection — BUT the China-nexus attribution this doctrine presupposes is only LOW confidence in this 2022 source (UNC3886 was an UNCATEGORIZED cluster), and this report names no victim sectors or countries, so the strategic-collection reading is one plausible fit among others rather than a strongly-triangulated one. The defense/technology/telecommunications victimology and the firmer "Chinese cyber espionage group" framing come from later (2023+) Mandiant reporting, not this disclosure.
    attesting_source_id: null
