initial_vector: valid-creds
false_flag_risk: none
summary: |
  Mandiant disclosed a novel attack technique in which UNC3886 abused malicious vSphere Installation Bundles (VIBs) to install two persistent backdoors, VIRTUALPITA and VIRTUALPIE, directly on VMware ESXi hypervisors, then used them to maintain access and run commands across guest virtual machines while evading EDR. Mandiant noted this was not a remote code-execution flaw — the actor required admin-level privileges to the hypervisor to deploy the VIBs. Mandiant assessed the highly targeted and evasive intrusion was cyber-espionage motivated and, with low confidence, that UNC3886 has a China-nexus.
