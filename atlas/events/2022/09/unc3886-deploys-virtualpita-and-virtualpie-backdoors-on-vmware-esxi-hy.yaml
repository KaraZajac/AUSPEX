id: 2022-09/unc3886-deploys-virtualpita-and-virtualpie-backdoors-on-vmware-esxi-hy
name: "UNC3886 deploys VIRTUALPITA and VIRTUALPIE backdoors on VMware ESXi hypervisors via malicious VIB packages"
start_date: 2022-09-29
incident_type:
  - espionage
  - intrusion
  - pre-positioning
initial_vector: valid-creds
false_flag_risk: none
summary: |
  Mandiant disclosed a novel attack technique in which UNC3886 abused malicious vSphere Installation Bundles (VIBs) to install two persistent backdoors, VIRTUALPITA and VIRTUALPIE, directly on VMware ESXi hypervisors, then used them to maintain access and run commands across guest virtual machines while evading EDR. Mandiant noted this was not a remote code-execution flaw — the actor required admin-level privileges to the hypervisor to deploy the VIBs. Mandiant suspected the highly targeted and evasive intrusion was cyber-espionage motivated and assessed, with low confidence, that UNC3886 has a China-nexus. "UNC" denotes an uncategorized cluster in Mandiant's taxonomy: at this 2022 disclosure Mandiant did not attribute the activity to any nation-state at confidence or to any specific service, and named no victim sectors or countries in this report.
attributions:
  # 2022 — Mandiant coined the "UNC3886" UNCATEGORIZED cluster. The only origin claim in this report
  # is "we assess with LOW CONFIDENCE that UNC3886 has a China-nexus" — a nation hint, no service.
  - actor_id: cn/unscoped/unc3886
    attributing_org: "Mandiant"
    attributing_org_confidence: low
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-09-29
    attribution_source_id: cloudgoogle/2022-09_unc3886-deploys-virtualpita-and-virtualp
    notes: "Mandiant assessed verbatim 'with low confidence that UNC3886 has a China-nexus'. 'UNC' = uncategorized — Mandiant deliberately did not attribute UNC3886 to a nation at confidence or to any service in this report; China-nexus is a low-confidence nation hint, not a service attribution. Hence cn/unscoped, attribution_level nation, confidence low."
