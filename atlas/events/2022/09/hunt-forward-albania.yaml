id: 2022-09/hunt-forward-albania
name: Hunt Forward Albania (post-Iranian attack)
start_date: 2022-09-01
disclosure_date: 2023-03-23  # CYBERCOM press release
end_date: 2022-12-31
incident_type:
  - documentary  # retyped 2026-07-01: an invited consensual allied hunt-forward is not an adversarial intrusion (CNMF cohort decision)
initial_vector: unknown
outcome_summary: |
  CNMF Hunt Forward deployment to Albania — CYBERCOM's first-ever
  defensive cyber operation in Albania — following Iranian state
  cyber actors' ("HomeLand Justice") destructive wiper-and-ransomware
  attacks on the Government of Albania in July and September 2022.
  A team of ~two dozen CNMF operators deployed in September 2022,
  hunted for malicious activity on networks of Albania's choice
  alongside Albanian partners (AKSHI / NAECCS) over a three-month
  mission, returned before the end of 2022, and provided technical
  findings to the Government of Albania to bolster its network
  defense. Publicly acknowledged via a CYBERCOM press release on
  23 March 2023.
false_flag_risk: none
summary: |
  Post-incident, invitation-based Hunt Forward: at Albania's
  invitation, CYBERCOM's Cyber National Mission Force conducted what
  its press release calls the "first-ever defensive cyber operation"
  in Albania, in response to Iran's July/September 2022 destructive
  attacks on the NATO ally. A defensive, consent-based hunt on
  host-chosen networks — the U.S. is the actor, Albania the inviting
  partner — framed by CYBERCOM as strengthening allied defense and
  hardening U.S. networks against shared threats before adversaries
  can reach them.
