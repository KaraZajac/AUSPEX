    [a] FACTS — corrected 3 over-reaches; enriched to source facts.
    (1) "Iranian MOIS-affiliated" -> "Iranian state cyber actors
    ('HomeLand Justice')": OVER-ATTRIBUTION. Neither cited source names
    the MOIS — the CYBERCOM release says "Iranian cyber actors," CISA
    AA22-264A attributes only at nation level ("Iranian state cyber
    actors"; zero "MOIS"). The MOIS placement rests on the Treasury OFAC
    release (jy0941), NOT cited here; removed the firmer claim.
    (2) "Persistence and lateral-movement indicators captured" -> removed:
    an EMBELLISHMENT absent from the raw. The release says the team hunted
    for malicious activity, identified vulnerabilities, "identify, monitor,
    and analyze adversary tactics, techniques, and procedures," and
    "provided technical findings from their network hunt to the Government
    of Albania." Rewrote to that sourced language.
    (3) "basis for CISA AA22-264A advisory (September 2022)" -> removed:
    ANACHRONISM / unsupported causal link. AA22-264A published 2022-09-21 —
    at the very START of the Sept-2022 -> Dec-2022 hunt — so a
    three-month hunt that "returned before the end of 2022" cannot be its
    "basis." The release instead CITES CISA ("According to CISA, these
    same Iranian actors used similar tactics, techniques, and procedures
    in another wave of cyber-attacks … in September 2022"); reframed CISA
    as documenting the attacks that PROMPTED the hunt. ADDED sourced
    facts: ~two dozen personnel, three-month mission, "networks of
    Albania's choice," AKSHI/NAECCS partners.
    Verbatim anchors: "a team of cyber operators from the U.S. Cyber
    National Mission Force (CNMF) conducted their first-ever defensive
    cyber operation there"; "Over the course of the three-month
    deployment"; "In July 2022, Iranian cyber actors launched a
    cyberattack against the Government of Albania"; The Record: "deployed
    a team of two dozen personnel … following the second hack, which took
    place in September, and returned before the end of 2022."
    Also scoped the summary's "first defensive cyber operation" to
    Albania (release: "first-ever defensive cyber operation THERE"; Hunt
    Forward Estonia 2020 predates it) and dropped the unsourced "first …
    in response to an adversary attack on an ally" superlative.

