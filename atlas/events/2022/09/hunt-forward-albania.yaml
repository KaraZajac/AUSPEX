id: 2022-09/hunt-forward-albania
name: Hunt Forward Albania (post-Iranian attack)
start_date: 2022-09-01
disclosure_date: 2023-03-23  # CYBERCOM press release
end_date: 2022-12-31
incident_type:
  - intrusion  # defensive hunt
initial_vector: unknown
outcome_summary: |
  CNMF Hunt Forward deployment to Albania following Iranian MOIS-
  affiliated Homeland Justice destructive ransomware attacks (July
  and September 2022). Persistence and lateral-movement indicators
  captured; technical findings provided to Albanian government;
  basis for CISA AA22-264A advisory (September 2022).
false_flag_risk: none
summary: |
  Allied-response Hunt Forward — first publicly described "first
  defensive cyber operation" deployment by CYBERCOM specifically in
  response to an adversary attack on an ally. Marks doctrinal
  formalization of post-incident Hunt Forward as alliance signaling.
