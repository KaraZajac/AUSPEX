id: 2022-09/mstic-zinc-weaponizing-open-source
name: MSTIC disclosure of ZINC weaponized open-source software campaign
start_date: 2022-04-01  # MSTIC dates campaign onset to spring 2022
disclosure_date: 2022-09-29
end_date: 2022-09-29
incident_type:
  - intrusion
  - supply-chain
initial_vector: phishing
outcome_summary: |
  Microsoft Threat Intelligence disclosed a ZINC (Lazarus
  core) campaign weaponizing multiple open-source software
  packages — PuTTY, KiTTY, TightVNC, Sumatra PDF Reader,
  muPDF/Subliminal Recording installer. Delivered via
  LinkedIn / WhatsApp fake-recruiter pretext targeting
  media, defense, and IT-services personnel across multiple
  geographies. Documented the operational primitive that
  subsequently supported the JumpCloud (June 2023) and
  CyberLink (October 2023) full-fledged supply-chain
  pivots.
false_flag_risk: none
summary: |
  Mid-2022 documentation of the access primitive maturation.
  Where the early-2022 Symantec chemical-sector disclosure
  documented the LinkedIn fake-recruiter pretext at the
  victim-selection stage, MSTIC's September 2022 disclosure
  documents the next stage: the trojanized open-source
  installer as the payload-delivery vehicle. This pairing —
  fake recruiter pretext + trojanized open-source installer
  — is the canonical 2022-2024 Lazarus/TraderTraitor
  tradecraft chain and supports both the revenue-aggregation
  (crypto-developer victims) and strategic-tech-collection
  (defense / IT-services victims) pillars of the
  8th-Congress defense plan.
