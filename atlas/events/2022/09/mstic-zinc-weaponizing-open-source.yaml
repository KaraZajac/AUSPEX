id: 2022-09/mstic-zinc-weaponizing-open-source
name: MSTIC disclosure of ZINC weaponized open-source software campaign
start_date: 2022-04-01  # MSTIC: campaign observed "from late April to mid-September 2022"
disclosure_date: 2022-09-29
end_date: 2022-09-15  # AUDIT 2026-07-01: campaign end per MSTIC ("mid-September 2022"); was conflated with disclosure_date
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Microsoft Threat Intelligence disclosed a ZINC campaign
  that trojanized multiple open-source packages — PuTTY,
  KiTTY, TightVNC, Sumatra PDF Reader, and a
  muPDF/Subliminal Recording installer — and delivered them
  via LinkedIn / WhatsApp fake-recruiter social engineering.
  MSTIC observed activity against employees at organizations
  in media, defense and aerospace, and IT services in the
  US, UK, India, and Russia, and stated the actors had
  "successfully compromised numerous organizations since
  June 2022." Attributed with high confidence to ZINC
  (Microsoft's pre-2023 name for the Lazarus core, later
  retracked as Diamond Sleet), a North Korean state-
  sponsored group.
false_flag_risk: none
summary: |
  MSTIC's 29 September 2022 disclosure documents ZINC
  (Microsoft's pre-2023 name for the Lazarus core)
  weaponizing legitimate open-source software — trojanized
  builds of PuTTY, KiTTY, TightVNC, Sumatra PDF Reader, and
  a muPDF/Subliminal Recording installer. From late April
  2022 (weaponized-installer compromises from June 2022),
  ZINC used fake LinkedIn recruiter profiles impersonating
  technology, defense, and media-entertainment firms to
  build trust with targets, then moved them to the encrypted
  messaging app WhatsApp to deliver the trojanized
  installers. MSTIC assessed ZINC's objectives as espionage,
  data theft, financial gain, and network destruction. The
  fake-recruiter pretext paired with a trojanized
  open-source installer is a signature Lazarus access
  primitive; the victim set here — media, defense/aerospace,
  and IT-services personnel — maps to strategic-technology
  collection rather than the crypto-revenue side of DPRK
  cyber tasking.
