id: 2022-09/mantis-arid-viper-intrusion-campaign-against-palestinian-organizations
name: "Mantis (Arid Viper) intrusion campaign against Palestinian organizations using Micropsia and Arid Gopher backdoors"
start_date: 2022-09-01
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: unknown
false_flag_risk: none
summary: |
  Symantec (Broadcom) reported (4 Apr 2023) that Mantis (Arid Viper / APT-C-23) ran an intrusion campaign against organizations in the Palestinian territories beginning in September 2022 and continuing to at least February 2023. The initial infection vector for this campaign is unknown; Symantec noted the group typically lures victims via spear-phishing emails and fake social media profiles, but did not establish the vector for these intrusions. The attackers used updated versions of their custom Micropsia (Delphi-based) and Arid Gopher (Go-based) backdoors, along with a Reverse SOCKS tunneler (Revsocks), PuTTY, and a custom exfiltration tool (WindowsUpServ.exe). The group deployed multiple tool variants across compartmentalized network segments, conducted extensive credential theft, archived data with WinRAR, and exfiltrated stolen files over HTTP POST. Symantec describes the victims only as "organizations within the Palestinian territories" and names no specific sector; the listed sectors below reflect Mantis/Arid Viper's documented general targeting, not victims Symantec identified for this campaign.
attributions:
  - actor_id: ps/unscoped/arid-viper
    attributing_org: "Symantec"
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-04-04
    attribution_source_id: security/2022-09_mantis-arid-viper-intrusion-campaign-aga
    notes: "Symantec names the actor (Mantis = Arid Viper / APT-C-23, 'a threat actor believed to be operating out of the Palestinian territories') — named-actor level — but explicitly does NOT reach nation/sponsor: 'While other vendors have linked the group to Hamas, Symantec cannot make a definitive attribution to any Palestinian organization.' Hence ps/unscoped + concur-with-caveat. Attribution date set to the report's publication (4 Apr 2023); 2022-09 is the campaign start."
doctrine_links: []
