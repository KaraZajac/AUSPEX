  notes: |
    Audited vs the sole source (Symantec/Broadcom security.com, raw snapshot captured + SHA-256d).
    FACTS ✓: Mantis = Arid Viper / APT-C-23; campaign Sep 2022 -> at least Feb 2023; updated
    Micropsia (Delphi) + Arid Gopher (Go) backdoors; Revsocks (Reverse SOCKS tunneler), PuTTY,
    custom exfil tool WindowsUpServ.exe; compartmentalized multi-variant toolsets; credential
    theft; WinRAR archiving; HTTP POST exfiltration — all verbatim-confirmed in the raw.
    CORRECTIONS: (1) initial_vector phishing -> unknown — the article states "The initial infection
    vector for this campaign remains unknown"; spear-phishing is only the group's general MO.
    (2) Sector inflation removed: dropped sectors/defense + sectors/finance (role primary) — these
    came from the article's Background sector list (government/military/financial/media/education/
    energy/think-tanks), which describes Mantis's GENERAL targeting across Israel + the Middle East,
    not this campaign's victims. Symantec names the victims only as "organizations within the
    Palestinian territories" with no sector. Kept sectors/government as the single defensible primary.
    (3) attribution_date 2022-09-01 -> 2023-04-04 (actual report publication; 2022-09 is campaign start).
    (4) Added attribution_level: named-actor.
    ATTRIBUTION: Symantec reaches named-actor (names Mantis/Arid Viper) but explicitly NOT
    nation/sponsor: "While other vendors have linked the group to Hamas, Symantec cannot make a
    definitive attribution to any Palestinian organization." Confidence moderate; auspex
    concur-with-caveat (caveat = no sponsor established). doctrine_links [] left empty — appropriate;
    no source states a strategic purpose and the actor carries no default doctrine alignment.
    ACTOR: consistent — actor_id ps/unscoped/arid-viper matches the actor record; "Mantis" is a
    Symantec alias there; Hamas nexus suspected-not-established -> ps/unscoped is correct. NOT re-homed.
