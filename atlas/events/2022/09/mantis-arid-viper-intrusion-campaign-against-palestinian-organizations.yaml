summary: |
  Symantec reported that Mantis (Arid Viper / APT-C-23) ran an intrusion campaign against organizations in the Palestinian territories beginning in September 2022 and continuing to at least February 2023. The attackers used updated versions of their custom Micropsia (Delphi-based) and Arid Gopher (Go-based) backdoors, along with a Reverse SOCKS tunneler (Revsocks), PuTTY, and a custom exfiltration tool (WindowsUpServ.exe). The group deployed multiple tool variants across compartmentalized network segments, conducted extensive credential theft, archived data with WinRAR, and exfiltrated stolen files over HTTP POST. Symantec noted the group typically lures victims via spear-phishing emails and fake social media profiles.
