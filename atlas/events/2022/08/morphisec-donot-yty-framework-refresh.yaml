  notes: |
    Audited vs the RAW Morphisec Labs post "APT-C-35: New Windows Framework
    Revealed" (redirects to www.morphisec.com/blog/apt-c-35-new-windows-framework-revealed/;
    sha256 64260420…a1e8d6fe, 842,730 bytes). NOT a phantom — real first-party
    article confirmed by page <title> and body byline.
    [a] FACTS: Corrected/tightened outcome_summary to what the source carries. RAW
    supports: DoNot Team a.k.a. APT-C-35, active "since at least 2016"; Windows
    framework "a.k.a. YTY, Jaca"; initial access "spear phishing emails" using RTF +
    "remote template injection" + Office macros; shellcode loader chain with an
    AV-driver (.sys) + expiry-date evasion check; main DLL beacon; Google Drive-hosted
    encrypted C2 address; upgraded browser stealer that "uses four additional
    executables" for Chrome/Firefox theft; reverse shell "recompile[d] … as a DLL".
    STRIPPED unsupported claims: (1) "droppers" (not detailed); (2) "Bangladeshi
    government targets" for THIS campaign — Bangladesh appears only in the group's
    general target-country list; the current campaign's named target is "government
    departments, including Pakistan's defense sector"; (3) "continued South Asian
    civil-society victims" — the source lists only "government and military
    organizations, ministries of foreign affairs, and embassies," no civil society;
    (4) the summary's Amnesty/Innefu/Android sentence — per audit NB the Innefu-Labs
    contractor link is a separate 2021 Amnesty finding and this Morphisec post says
    nothing of Android or Innefu; replaced with an explicit non-import note.
    [b] ATTRIBUTION: Morphisec names the DoNot Team / APT-C-35 named actor flatly, no
    hedge. Added attribution_level: named-actor; kept attributing_org_confidence high
    (asserted as established). Source names NO nation-sponsor / Indian service —
    added a note recording that the India-nexus is nation-level from the actor
    record's OTHER sources, not this post. auspex_assessment concur retained.
    [c] DATES: source byline is "11 Aug 2022" — corrected disclosure_date and
    attribution_date 2022-08-04 -> 2022-08-11, and source published_on likewise.
    start_date reset 2022-03-01 -> 2022-07-01 and end_date kept 2022-07-31: the source
    gives no campaign start; the only dated artifacts are the embedded AV-expiry config
    values (2022-07-11/15/17/19/23) plus the 11-Aug publication, i.e. a mid-2022
    window. Dates are best-estimate, not source-stated — flagged.
    [d] DOCTRINE_LINKS: kept strongly_inferred (correct — source states no strategic
    goal/motive and no India-nexus, so NOT attested). Rewrote reasoning to quote the
    source ("targeted government departments, including Pakistan's defense sector") and
    added inference_basis.signals + ruled_out (china-collection pillar rejected — no
    PRC target). attesting_source_id stays null.
    [e] ATTRIBUTION_LEVEL: set to named-actor (was missing).
    [f] ACTOR_ID: in/unscoped/donot-team resolves (atlas/actors/in/donot-team.yaml,
    id in/unscoped/donot-team) — consistent with the 2026-06-24 NTRO->unscoped demotion.
