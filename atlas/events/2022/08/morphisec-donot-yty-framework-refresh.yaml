id: 2022-08/morphisec-donot-yty-framework-refresh
name: Morphisec documents refreshed DoNot Team yty Windows framework
start_date: 2022-07-01
disclosure_date: 2022-08-11
end_date: 2022-07-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Morphisec Labs published "APT-C-35: New Windows Framework
  Revealed" (in-body heading "APT-C-35 Gets a New Upgrade"),
  documenting updates to the DoNot Team / yty (a.k.a. Jaca)
  modular Windows framework. The post details the shellcode-loader
  delivery chain (RTF remote-template injection -> Office macros ->
  staged shellcode with an AV-driver / expiry-date evasion check),
  a new DLL variant of the reverse-shell module, and an upgraded
  browser stealer that now offloads Chrome/Firefox credential and
  history theft to four separate helper executables. C2 addresses
  are resolved via a Google Drive-hosted encrypted document.
  Morphisec attributes the samples to DoNot / APT-C-35 and states
  the latest spear-phishing campaign "targeted government
  departments, including Pakistan's defense sector." The modular
  architecture is unchanged; the update adds/refactors modules
  rather than re-architecting the framework.
false_flag_risk: none
summary: |
  Continuity-tradecraft event for the DoNot Team's Windows
  collection lane. The 2022 Morphisec Labs post is a canonical
  mid-2022 reference for the yty framework and its evasion and
  browser-stealer upgrades. NB: this source documents the Windows
  framework only — it names no Indian intelligence service and
  makes no Android / Innefu-Labs claim (that contractor link is a
  separate 2021 Amnesty finding and is deliberately NOT imported
  here).
