id: 2022-08/morphisec-donot-yty-framework-refresh
name: Morphisec documents refreshed DoNot Team yty Windows framework
start_date: 2022-03-01
disclosure_date: 2022-08-04
end_date: 2022-07-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Morphisec published "APT-C-35 — New Windows Framework Revealed,"
  documenting a refresh of the DoNot Team / yty modular Windows
  toolchain. The post detailed updated loaders, droppers, and
  C2 infrastructure observed in operations through mid-2022
  against Pakistani and Bangladeshi government targets,
  alongside continued South Asian civil-society victims. The
  refresh was operationally minor (compatibility, evasion
  updates) rather than architecturally new.
false_flag_risk: none
summary: |
  Continuity-tradecraft event for the DoNot Team's Windows
  collection lane. yty refreshes appear roughly annually in
  vendor reporting; the 2022 Morphisec post is the canonical
  mid-2022 reference. Notable for not surfacing meaningful
  Android tooling, which Amnesty had documented under the
  Innefu / DoNot framing the prior year.
