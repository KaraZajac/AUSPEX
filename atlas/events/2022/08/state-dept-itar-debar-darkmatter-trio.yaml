outcome_summary: |
  US export-control counter-action, not a cyber operation: the US
  Department of State, Bureau of Political-Military Affairs
  (Directorate of Defense Trade Controls), publishes Federal Register
  document 2022-18504 (Vol. 87, No. 166; 29 August 2022; Public Notice
  11842) administratively debarring Ryan Adams, Marc Baier, and Daniel
  Gericke under the International Traffic in Arms Regulations (ITAR).
  Per ITAR §127.7(c)(2), the debarment follows the Respondents'
  provision — while employed by DarkMatter Group of the UAE, 2016–2019
  — of unlicensed "defense services" under U.S. Munitions List Category
  XI(d): computer-network-exploitation expertise and zero-click hacking
  systems built for the UAE government's intelligence purposes, without
  the ITAR license their prior US employer (CyberPoint) had held. The
  Respondents entered Consent Agreements on 7 July 2022 (Adams, Baier)
  and 5 August 2022 (Gericke), administratively debarring them until 7
  July 2025 and 5 August 2025 respectively; the notice states
  "Debarment imposed as of August 29, 2022." The action is the
  export-control-enforcement complement to the September 2021 DOJ
  deferred-prosecution agreements against the same three individuals
  (sibling event 2021-09/doj-baier-adams-gericke-dpa).
false_flag_risk: none
summary: |
  US State-Department export-control counter-action, modeled under the
  directionality convention: the acting party is the US government
  (Bureau of Political-Military Affairs / DDTC); the SUBJECTS are the
  three ex-USIC/military operators — Baier, Adams, Gericke — and the
  UAE firm that employed them, DarkMatter. There is no attacker actor
  for THIS event.

  Unlike the sibling DOJ deferred-prosecution agreement — whose
  press release anonymized the employer as "U.A.E. CO" — the Federal
  Register debarment notice NAMES the corporate actors directly: the
  Respondents "were employed by DarkMatter Group (DarkMatter), a
  privately held technology and cyber services company headquartered
  and organized in the United Arab Emirates (UAE) that furnished cyber
  services to the UAE government," having previously worked for
  "CyberPoint International LLC (CyberPoint) a U.S.-based company that
  furnished cyber services to the UAE government pursuant to ITAR
  licenses," before "the UAE government transitioned its contracts for
  cyber services from CyberPoint to DarkMatter." The notice is thus a
  government-primary attestation, at the export-control level, of the
  UAE procurement-led-capability doctrine's contractor-personnel
  pillar: the UAE acquiring sovereign offensive-cyber capability by
  procuring imported US operator-talent routed through a US then a
  UAE-domestic contractor. Recorded for legal-attribution-timeline
  completeness alongside the DOJ DPA (criminal) sibling.
