id: 2022-08/state-dept-itar-debar-darkmatter-trio
name: US State Department ITAR debarment of Baier, Adams, Gericke for UAE offensive-cyber services
start_date: 2022-07-07  # Adams / Baier consent-agreement debarment effective date
disclosure_date: 2022-08-29  # Federal Register publication
end_date: 2022-08-29
incident_type:
  - documentary
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  US Department of State Bureau of Political-Military Affairs
  publishes Federal Register document 2022-18504 (29 August
  2022) administratively debarring Marc Baier, Ryan Adams, and
  Daniel Gericke under the International Traffic in Arms
  Regulations (ITAR) for export-control violations arising from
  their provision of defense services — i.e., offensive-cyber
  capability development — to the UAE government. The debarments
  followed consent agreements signed 7 July 2022 (Adams, Baier)
  and 5 August 2022 (Gericke). The action is the export-control
  enforcement complement to the September 2021 DOJ deferred-
  prosecution agreements against the same three individuals.
false_flag_risk: none
summary: |
  The State Department ITAR debarment is the second federal-
  enforcement layer (after the DOJ DPA) confirming the procurement-
  led-capability framing at the US-government level. The ITAR
  treatment of offensive-cyber capability development as a
  defense-services export to a foreign government is doctrinally
  significant: it directly attests AUSPEX's procurement-led
  framing at the export-control level (i.e., the US government
  treated the underlying services as defense exports). Recorded
  in the corpus for legal-attribution-timeline completeness.
