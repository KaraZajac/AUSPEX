id: 2022-08/h0lygh0st-ransomware
name: DEV-0530 / H0lyGh0st ransomware operations
start_date: 2021-06-01  # earliest tracked DEV-0530 activity
disclosure_date: 2022-07-14
end_date: null
incident_type:
  - ransomware
  - extortion  # double-extortion: MSTIC "threaten to publish victim data ... or send the data to the victims' customers"; CISA tags "Extortion"
initial_vector: n-day
outcome_summary: |
  Opportunistic ransomware campaign against small and medium
  businesses in multiple countries; MSTIC assessed the victims
  (manufacturing firms, banks, schools, event/meeting planners)
  as targets of opportunity. Ransom demands typically 1.2–5 BTC,
  often negotiated down to less than a third of the initial ask.
  Low-yield: as of early July 2022 Microsoft's review of the
  operators' wallet transactions found no successful ransom
  payments extorted from victims.
false_flag_risk: none
summary: |
  Microsoft MSTIC introduced the DEV-0530 / H0lyGh0st cluster in
  July 2022; CISA's February 2023 AA23-040A #StopRansomware DPRK
  advisory subsequently grouped H0lyGh0st with Maui as DPRK
  ransomware. MSTIC classified the H0lyGh0st ransomware under two
  malware families — SiennaPurple (the earlier C++ portable
  executable BTLC_C.exe, few-featured, using simple 0x30-subtract
  string obfuscation) and SiennaBlue (a later Go-based family,
  e.g. BTLC.exe, encrypting to the .h0lyenc extension). MSTIC
  suspects initial access came from exploiting vulnerable
  public-facing web applications — it flags CVE-2022-26352
  (DotCMS) as a candidate and observed no 0-day use — with a
  scheduled-task ("lockertask") persistence mechanism in the
  latest variant, a clearnet HTTP C2, and an .onion site used for
  victim interaction and data-leak threats. On that site the
  operators claim to "close the gap between the rich and poor" and
  cast the intrusions as raising victims' security awareness — an
  ideological, hacktivist-style self-justification. MSTIC left the
  motive explicitly open: state-sponsored revenue generation, or
  individuals with PLUTONIUM (Andariel) ties "moonlighting for
  personal gain," calling it "equally possible" the North Korean
  government is not enabling the attacks.
attributions:
  - actor_id: kp/unscoped/h0lygh0st
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: moderate   # MSTIC's DEV-#### label is explicitly pre-high-confidence ("until we reach high confidence about the origin or identity of the actor"), and it hedges the state nexus: "equally possible that the North Korean government is not enabling or supporting these ransomware attacks" (moonlighting theory)
    attribution_level: named-actor   # MSTIC names the DEV-0530/H0lyGh0st actor but no DPRK service/unit -> named-actor, not named-unit (the 101 "RGB" hits in the raw are CSS rgb() color codes)
    auspex_assessment: concur-with-caveat   # concur with DPRK-origin (UTC+9 temporal analysis, PLUTONIUM infra/tool/comms overlap); caveat = MSTIC's own open state-sponsorship question
    attribution_date: 2022-07-14
    attribution_source_id: msft/2022-07-14_h0lygh0st-dev-0530
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      CISA AA23-040A groups H0lyGh0st with DPRK ransomware whose
      proceeds support 'DPRK national-level priorities and
      objectives, including cyber operations' — a generic
      regime-funding goal, not WMD or the 8th-Congress defense plan
      by name; the linkage is inferred.
    attesting_source_id: cisa/2023-02-09_aa23-040a-stopransomware-dprk
    inference_basis:
      source_id: cisa/2023-02-09_aa23-040a-stopransomware-dprk
      signals:
        - "AA23-040A groups H0lyGh0st with DPRK ransomware whose proceeds support 'DPRK national-level priorities... including cyber operations' (generic regime-funding)"
        - "MSTIC (2022) left motive open (state-sponsored vs. PLUTONIUM-tied 'moonlighting for personal gain'); the later joint US-ROK AA23-040A resolves toward a DPRK state-ransomware reading, which is what the revenue-aggregation link rests on"
      ruled_out: "WMD-financing / 8th-Congress defense plan by name — not named in AA23-040A"
    contested: false
    analyst: claude
