id: 2022-08/h0lygh0st-ransomware
name: DEV-0530 / H0lyGh0st ransomware operations
start_date: 2021-06-01  # earliest tracked DEV-0530 activity
disclosure_date: 2022-07-14
end_date: null
incident_type:
  - ransomware
initial_vector: n-day
outcome_summary: |
  Opportunistic ransomware campaign against small and medium
  businesses globally. Demands typically 1.2–5 BTC. Modest
  revenue; pattern of low-yield ransomware operations
  distinguishing H0lyGh0st from the more targeted Maui
  (Andariel) operations.
false_flag_risk: none
summary: |
  Microsoft MSTIC introduced the DEV-0530 / H0lyGh0st cluster in
  July 2022. Subsequently consolidated under CISA AA23-040A as one
  of multiple DPRK ransomware operations. MSTIC documents two
  generations of the H0lyGh0st encryptor — SiennaPurple (the
  earlier BTLC_C.exe portable executable, unobfuscated) and
  SiennaBlue (BTLC.exe, Go-based with .h0lyenc extension) — both
  delivered after initial access via exploitation of vulnerable
  internet-facing applications (notably CVE-2022-26352 DotCMS
  arbitrary file upload), with PowerShell-based execution chains,
  scheduled-task persistence, and the typical DPRK Tor-fronted
  C2. The operators front the campaign with an ideological
  hacktivist-style "robbing the rich" persona, providing
  plausibly criminal cover for state-tasked revenue collection.
