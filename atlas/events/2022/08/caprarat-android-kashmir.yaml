id: 2022-08/caprarat-android-kashmir
name: ESET documents Transparent Tribe (APT36) CapraRAT Android delivery via trojanized MeetsApp/MeetUp messaging apps
start_date: 2022-07-01
disclosure_date: 2023-03-07
end_date: null
incident_type:
  - intrusion
  - surveillance
  - data-theft
initial_vector: phishing
outcome_summary: |
  ESET (WeLiveSecurity) documented a Transparent Tribe / APT36 campaign
  distributing the CapraRAT Android backdoor through two trojanized
  "secure" messaging/calling apps — branded MeetsApp and MeetUp — served
  from attacker-run websites posing as official distribution pages.
  Victims were most likely lured via a honey-trap romance scam and
  convinced to install the supposedly more-secure apps manually (the
  apps were not on Google Play). CapraRAT is a modified version of the
  open-source AndroRAT that the group adopted for Android in 2021; on
  command it exfiltrates call logs, contacts, SMS messages, recorded
  phone calls and surrounding audio, screenshots, photos, device
  location, a file listing / arbitrary files, running apps, and other
  apps' notifications. ESET geolocated over 150 victims across India,
  Pakistan, Russia, Oman, and Egypt, presumed to have a military or
  political orientation, and described the campaign as narrowly targeted.
  It was most likely active since July 2022 (the two delivery domains
  were registered on 9 and 25 July 2022).
false_flag_risk: none
summary: |
  A consequential mobile-tooling development for Transparent Tribe: a
  honey-trap-driven CapraRAT distribution campaign delivered through
  fake "secure" Android messaging/calling apps rather than the cluster's
  usual spear-phishing maldocs, documenting APT36's continued Android
  expansion against Indian and Pakistani military/political personnel.
