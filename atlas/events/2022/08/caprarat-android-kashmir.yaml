id: 2022-08/caprarat-android-kashmir
name: SentinelLABS / ESET document CapraRAT Android implant for Kashmir-area targeting
start_date: 2022-04-01
disclosure_date: 2022-08-04
end_date: 2022-08-04
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  SentinelLABS and ESET independently documented Transparent
  Tribe's expansion onto Android via the CapraRAT implant
  family — initially distributed through trojanized YouTube and
  app-clone delivery in the spring and summer of 2022. CapraRAT
  is an Android port of the AndroRAT framework adapted by APT36
  for Kashmir-area civil-society and Indian military mobile
  targeting. Subsequent SentinelLABS reporting (September 2023)
  documented use of cloned dating apps for CapraRAT delivery
  against Indian military personnel.
false_flag_risk: none
summary: |
  Operationally significant cross-platform expansion for
  Transparent Tribe and the most consequential Pakistani-
  aligned mobile-tooling development of the period. The
  Kashmir civil-society and Indian-military-mobile victim sets
  span both the military-collection and Kashmir-political
  doctrinal pillars. CapraRAT continues to be observed
  operationally through 2024-2025.
