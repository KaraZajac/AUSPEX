id: 2022-08/oktapus-twilio
name: 0ktapus SMS-phishing campaign (Twilio, Cloudflare-thwarted, ~130 Okta-using orgs)
start_date: 2022-07-01
disclosure_date: 2022-08-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # SMS-phishing (smishing) of employee Okta credentials + MFA codes
outcome_summary: |
  Coordinated SMS-phishing (smishing) campaign that Group-IB named
  "0ktapus", delivering Okta-SSO-impersonating credential-harvesting
  pages to employees of organizations using Okta for single sign-on.
  Group-IB reported that over 130 organizations were compromised via a
  single phishing kit, harvesting 9,931 user credentials and 5,441 MFA
  codes across 169 unique domains, with supporting infrastructure active
  since March 2022. Twilio became aware on 4 August 2022 that its
  internal systems had been accessed after employees were smished into
  entering Okta credentials and 2FA codes. Cloudflare disclosed a
  near-identical attack (at least 76 employees texted from 2022-07-20)
  in which three employees entered their credentials, but the intrusion
  failed because every Cloudflare employee holds a FIDO2 hardware
  security key (YubiKey) with origin binding — Cloudflare confirmed "no
  Cloudflare systems were compromised". Downstream supply-chain victims
  named by Group-IB included the email/marketing platforms Mailchimp and
  Klaviyo, breached to reach cryptocurrency-related customer lists.
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Type-specimen 0ktapus campaign establishing the tradecraft pattern —
  high-volume SMS social engineering of employees, Okta-credential
  harvesting at scale, and SaaS-tenant pivoting — later consolidated by
  multiple vendors under the Scattered Spider / UNC3944 identity. The
  Cloudflare comparative case (same campaign, successful FIDO2 hardware-
  key defense) became a widely cited industry argument for hardware-
  backed, phishing-resistant MFA. Group-IB's contemporaneous label was
  "0ktapus"; the identity with Scattered Spider is a later, "overlapping"
  vendor consolidation, so attribution to criminal/scattered-spider
  carries a caveat.
attributions:
  - actor_id: criminal/scattered-spider
    attributing_org: Group-IB
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-08-25
    attribution_source_id: group-ib/2022-08-25_0ktapus-okta-phishing
    notes: |
      Group-IB directly investigated the campaign and named the cluster
      "0ktapus" (named-actor: a specific named cluster, not a state unit).
      Group-IB did NOT use the "Scattered Spider" name — zero occurrences
      of "Scattered"/"Scatter Swine" in the raw article. AUSPEX maps
      0ktapus -> criminal/scattered-spider per later vendor consolidation
      (CISA AA23-320A lists "Oktapus" as a Scattered Spider alias), but the
      actor record grades the 0ktapus<->Scattered-Spider alias "overlapping"
      (campaign-era label), hence concur-WITH-CAVEAT rather than plain
      concur.
doctrine_links: []
targets:
  - target_id: sectors/ict/identity
    role: primary
  - target_id: sectors/ict/cloud
    role: collateral
sources:
  - group-ib/2022-08-25_0ktapus-okta-phishing
  - cloudflare/2022-08-09_smishing-attack
