id: 2022-08/oktapus-twilio
name: 0ktapus / Scattered Spider SMS-phishing campaign (Twilio, Cloudflare, DoorDash, ~130 orgs)
start_date: 2022-07-15
disclosure_date: 2022-08-04
end_date: 2022-08-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Coordinated SMS-phishing campaign delivering Okta-branded
  credential-harvesting pages to employees of ~130 organizations.
  Twilio confirmed unauthorized access to 209 customer accounts
  including Authy 2FA accounts. Cloudflare detected but defended
  against the same campaign (FIDO2-backed authentication
  blocked credential reuse). DoorDash, Klaviyo, MailChimp,
  Signal (via Twilio), and others subsequently disclosed
  related compromises. Group-IB published the "0ktapus" analysis
  Aug 25 2022 documenting infrastructure overlap across ~130
  domain targets.
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Canonical Scattered Spider campaign establishing the cluster's
  SMS-phishing-to-SaaS-tenant tradecraft pattern. The Cloudflare
  comparative case (same campaign, FIDO2 successful defense)
  became the most-cited industry argument for hardware-backed
  phishing-resistant MFA.
attributions:
