id: 2022-08/tornado-cash-sanctions
name: OFAC sanctions Tornado Cash cryptocurrency mixer
start_date: 2022-08-08
disclosure_date: 2022-08-08
end_date: 2022-08-08
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  US Treasury OFAC SDN designation of Tornado Cash, an
  Ethereum-based cryptocurrency mixer, for laundering more
  than USD 7B in virtual currency since 2019 — including
  approximately USD 455M stolen by Lazarus (Axie / Ronin)
  and proceeds from Harmony Horizon and Nomad bridge thefts.
  The designation included specific smart-contract addresses
  on the SDN List, the first such action against
  immutable on-chain code. November 2024 Fifth Circuit
  ruling (Van Loon v. Department of the Treasury) partially
  vacated the designation on the immutable-smart-contract
  limb, holding such code is not "property" under IEEPA.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  Tornado Cash sits at the intersection of state-affiliated
  laundering (Lazarus, DPRK) and ordinary criminal use.
  AUSPEX records the sanction itself in the criminal-baseline
  corpus because the predominant user base — measured in
  transaction volume — was criminal monetization rather
  than state action, and the sanction targets a tool rather
  than an actor.
