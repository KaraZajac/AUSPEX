  notes: |
    Audited vs Treasury/OFAC press release jy0916 "U.S. Treasury
    Sanctions Notorious Virtual Currency Mixer Tornado Cash"
    (2022-08-08) and the Fifth Circuit opinion Van Loon v. Treasury,
    No. 23-50669 (2024-11-26). Both sources snapshotted. NOT a phantom:
    jy0916 URL resolves to the real release (title + body match).
    Snapshots: treasury__2022-08-08_jy0916-tornado-cash.html,
    sha256 be70c6b5…4897b56b, 124,856 bytes; ca5__2024-11-26_van-loon-
    v-treasury-no-23-50669.pdf, sha256 6f5274a8…f06d376dd3,
    562,945 bytes.
    [a] FACTS: jy0916 verbatim-supports the core: OFAC "sanctioned
    virtual currency mixer Tornado Cash, which has been used to launder
    more than $7 billion worth of virtual currency since its creation
    in 2019. This includes over $455 million stolen by the Lazarus
    Group, a … (DPRK) state-sponsored hacking group … in the largest
    known virtual currency heist to date"; laundering of "$96 million …
    from the June 24, 2022 Harmony Bridge Heist, and at least
    $7.8 million from the August 2, 2022 Nomad Heist"; designated
    "pursuant to Executive Order (E.O.) 13694, as amended". The outcome
    tail (SDN designation of Tornado Cash "smart contracts", their
    immutability, and the Nov-2024 partial vacatur) is NOT in the 2022
    release; RE-SOURCED it to the Fifth Circuit opinion (added as a
    second source), which carries all three verbatim: OFAC "defined [the
    designation] to include … 'smart contracts'" that are "immutable (as
    the software code is unownable, uncontrollable, and unchangeable—even
    by its creators)", and "we hold that Tornado Cash's immutable smart
    contracts … are not the 'property' of a foreign national or entity …
    We REVERSE and REMAND … partial summary judgment". RESIDUAL: (i) the
    "Axie / Ronin" identification of the $455M heist is NOT literally in
    either source (jy0916 calls it "the largest known virtual currency
    heist to date"); retained as accepted corpus-internal identification
    (campaign_id ronin-laundering-trail; sibling 2022-03/ronin-bridge);
    (ii) "first such action against immutable on-chain code" is a
    well-documented superlative the CA5 opinion supports in substance
    (treats the reach over unownable code as beyond IEEPA, requiring
    Congress to act) but does not state as literally "first".
    [b] ATTRIBUTION: actor_id null (counter-action / tool-sanction).
    jy0916 names Lazarus Group + DPRK at high confidence (govt-primary)
    → concur-with-caveat (caveat = the criminal-baseline framing below +
    the later partial vacatur). ADDED attribution_level: named-actor
    (was missing) — group + nation named, no service/unit; + notes.
    [c] DATES: jy0916 published_on 2022-08-08 ✓ = designation date =
    event start/disclosure/end ✓. New ca5 source published_on
    2024-11-26 ✓.
    [d] DOCTRINE: kept doctrine_links: []. A kp/8th-congress-defense-
    plan revenue link was CONSIDERED and REJECTED: unlike the Blender
    release jy0768 (which states the WMD/ballistic-missile-financing
    goal verbatim and earns the sibling event an attested link), jy0916
    contains NO WMD / ballistic-missile / "generate revenue" / regime
    language (grep-verified all absent) — so it could not be attested.
    A strongly_inferred/plausible kp link was also declined because the
    event is deliberately in the criminal baseline (summary: DPRK's
    ~$455M is a minority of the >$7B laundered; the sanction targets a
    predominantly-criminal tool, not an actor) and the actor is null.
    [d] holds: doctrine_links: [] is honest here.
    [e] ATTRIBUTION_LEVEL: named-actor added (see [b]).
    [f] ACTOR_ID: null; FK n/a.
    CORRECTION: incident_type [disruption] → [documentary,
    law-enforcement] — this is a legal SDN designation (counter-action,
    meta incident-type set), not an operational disruption; matches the
    audited sibling 2022-05/treasury-blender-mixer-sanction. tier of
    jy0916 unchanged (primary, govt-primary — correct). Added
    raw_snapshot+content_sha256 to jy0916; created source record
    ca5/2024-11-26_van-loon-v-treasury-no-23-50669 (primary,
    govt-primary).
    FLAG (sibling divergence, for orchestrator): the three Treasury
    mixer-sanction siblings model the DPRK nexus inconsistently — Blender
    (2022-05) carries an attested kp link + named-actor; Sinbad
    (2023-11) sets actor_id kp/rgb/lazarus; Tornado Cash (this event)
    nulls the actor AND keeps doctrine_links []. The divergence is
    source-driven (only jy0768 states the WMD goal) and framing-driven
    (Tornado is predominantly-criminal by volume), but the three should
    be reconciled corpus-wide — see the same FLAG in the Blender audit.
