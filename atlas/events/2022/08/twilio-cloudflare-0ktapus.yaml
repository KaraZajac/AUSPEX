id: 2022-08/twilio-cloudflare-0ktapus
name: 0ktapus SMS-phishing campaign against Twilio, Cloudflare, ~130 SaaS tenants
start_date: 2022-07-01
disclosure_date: 2022-08-04
end_date: 2022-09-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # SMS-phishing of employee Okta credentials
outcome_summary: |
  Coordinated SMS-phishing (smishing) campaign by the cluster
  Group-IB named "0ktapus" — later operationally contiguous
  with Scattered Spider — targeted approximately 130
  organizations using a single phishing kit impersonating Okta
  identity-provider login pages. Twilio confirmed August 4
  2022 that 163 customers' data was accessed via a successful
  social engineering of Twilio employees. Cloudflare disclosed
  the same day that the campaign attempted but failed to
  compromise Cloudflare employees because of FIDO2 hardware-
  key MFA. Downstream confirmed victims included DoorDash,
  Mailchimp, Klaviyo, and several cryptocurrency-exchange
  customer-support BPOs.
quantified_impact:
  organizations_targeted: 130
  twilio_customers_compromised: 163
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Type-specimen Scattered-Spider-precursor campaign establishing
  the cluster's later tradecraft: high-volume social engineering
  of IT-adjacent staff, SaaS-tenant pivoting, and credential-
  harvesting at scale. Notable for Cloudflare's successful
  FIDO2-key defense as a case study in MFA-format hardening
  reducing the attack-surface to authentic-only credentials.
  Operator base is the Anglophone Western-jurisdictional
  cluster later tracked as Scattered Spider with no state nexus.
attributions:
  - actor_id: criminal/scattered-spider
    attributing_org: Group-IB + Twilio + Cloudflare
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2022-08-25
    attribution_source_id: cisa/2023-11-16_aa23-320a-scattered-spider-advisory
    notes: |
      Group-IB used the "0ktapus" label; CISA AA23-320A
      retrospectively places the campaign as operationally
      contiguous with Scattered Spider.
doctrine_links: []
targets:
  - target_id: sectors/ict/identity
    role: primary
  - target_id: sectors/ict/cloud
    role: collateral
sources:
  - cisa/2023-11-16_aa23-320a-scattered-spider-advisory
