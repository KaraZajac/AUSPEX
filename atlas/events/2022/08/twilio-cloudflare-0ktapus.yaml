  notes: |
    RE-SOURCED (badrabbit model). The event was mis-cited to a single
    source — CISA AA23-320A (2023-11-16 Scattered Spider advisory) — which
    does NOT document the Aug-2022 Twilio/Cloudflare 0ktapus campaign at all.
    Raw snapshot of AA23-320A (sha256 e0dc1004…add0f64, 123,149 bytes)
    confirms: zero hits for "Twilio", "Cloudflare", "Group-IB", "130", "163",
    "209", "DoorDash"; it lists "Oktapus" only as one of Scattered Spider's
    aliases. So AA23-320A supports the actor-identity MAPPING but carries none
    of the campaign facts. Re-sourced to the genuine primaries.
    [a] FACTS — all now source-carried. Group-IB (sha256 2da602f7…b3a8eed1,
    561,850 bytes): "Over 130 organizations have been compromised"; "9931"
    credentials + "5441" MFA codes; "169 unique domains"; campaigns "since
    March 2022"; Okta-SSO-impersonating kit; names Mailchimp + Klaviyo as
    supply-chain victims. Cloudflare (sha256 6b082453…7b00fc74, 366,189 bytes):
    "three Cloudflare employees fell for the phishing message and entered their
    credentials" but FIDO2/YubiKey "origin binding" meant "no Cloudflare
    systems were compromised"; "at least 76 employees" texted from "2022-07-20
    22:50 UTC"; "Yesterday, August 8, 2022, Twilio shared that they'd been
    compromised". Cybersecuritydive (sha256 df4c3c38…dff308, 302,434 bytes):
    Twilio "gained access to some of Twilio's internal systems ... on Aug. 4",
    "current and former employees", Okta creds + 2FA via spoofed
    "Twilio"/"Okta"/"SSO" URLs. Bitdefender (sha256 fef4fc9d…ee879c86, 64,154
    bytes): "209 customers and 93 end users of its Authy" impacted; June-29-2022
    vishing precursor. CORRECTIONS: quantified_impact.twilio_customers_
    compromised 163 -> 209 (163 was the initial figure; 209 is Twilio's
    CONCLUDED tally per bitdefender — no reachable source carried 163, so used
    the sourced final number) + added authy_users 93, credentials 9931, mfa 5441.
    Removed "DoorDash" from the named downstream victims (no cited source here
    carries it; kept Mailchimp + Klaviyo, which Group-IB names).
    [b] ATTRIBUTION — was "Group-IB + Twilio + Cloudflare" sourced to CISA
    (wrong). Fixed to attributing_org: Group-IB, attribution_source_id:
    group-ib/2022-08-25_0ktapus-okta-phishing (the org that named/scoped the
    campaign). Confidence high (direct investigation). auspex_assessment
    concur -> concur-with-caveat: the actor record grades the
    0ktapus<->Scattered-Spider alias "overlapping", so mapping to
    criminal/scattered-spider carries a genuine caveat.
    [c] DATES — disclosure_date 2022-08-04 -> 2022-08-07 (Aug-4 was Twilio's
    internal awareness; the public Sunday blog disclosure was Aug 7).
    end_date 2022-09-30 -> null (no source bounds the campaign; Group-IB says it
    may continue). start_date kept 2022-07-01 (SMS wave; Group-IB dates infra to
    March 2022, noted in outcome_summary). Source published_on dates verified:
    Group-IB 2022-08-25, Cloudflare 2022-08-09, cybersecuritydive 2022-08-08,
    bitdefender 2022-10-31 (from page datePublished metadata).
    [d] DOCTRINE_LINKS — [] is correct: criminal/financial actor, no state
    nexus, no doctrine applies. Unchanged.
    [e] ATTRIBUTION_LEVEL — set named-actor (Group-IB named the "0ktapus"
    cluster; no state unit).
    [f] ACTOR_ID — criminal/scattered-spider resolves and is the corpus's
    canonical consolidation of 0ktapus (MISP-galaxy + CISA-alias-backed). No
    actor FLAG; the "overlapping"-alias caveat is captured in auspex_assessment.
    RESIDUAL: the 163-vs-209 Twilio customer count — 163 was widely reported at
    disclosure but no reachable snapshot carried it, so the sourced concluded
    figure 209 is used. Twilio's own incident-report blog URL is link-rotted
    (404); qualitative + quantitative Twilio facts corroborated via
    cybersecuritydive + bitdefender, so level=full stands.
