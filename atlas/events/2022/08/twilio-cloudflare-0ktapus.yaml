id: 2022-08/twilio-cloudflare-0ktapus
name: 0ktapus SMS-phishing campaign against Twilio, Cloudflare, ~130 SaaS tenants
start_date: 2022-07-01
disclosure_date: 2022-08-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # SMS-phishing (smishing) of employee Okta credentials + MFA codes
outcome_summary: |
  Coordinated SMS-phishing (smishing) campaign that Group-IB
  named "0ktapus", targeting employees of organizations that use
  Okta as their single-sign-on provider. Group-IB reported that
  over 130 organizations were compromised via a single phishing
  kit impersonating each victim org's Okta login page, harvesting
  9,931 user credentials and 5,441 MFA codes across 169 phishing
  domains, with campaigns running since March 2022. Twilio became
  aware on 4 August 2022 that its internal systems had been
  accessed after current and former employees were smished into
  entering Okta credentials and 2FA codes; Twilio's concluded
  investigation reported 209 customers and 93 Authy 2FA-app users
  impacted, and tied the intrusion to a June-29-2022 voice-phishing
  precursor. Cloudflare disclosed a near-identical attack (76
  employees texted from 2022-07-20) in which three employees
  entered credentials but the intrusion failed because every
  employee holds a FIDO2 hardware security key (YubiKey) with
  origin binding — no Cloudflare systems were compromised.
  Downstream supply-chain victims named by Group-IB included the
  email/marketing platforms Mailchimp and Klaviyo, breached to
  reach cryptocurrency-related customer lists.
quantified_impact:
  organizations_targeted: 130
  credentials_harvested: 9931
  mfa_codes_harvested: 5441
  twilio_customers_compromised: 209
  twilio_authy_users_compromised: 93
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Type-specimen Scattered-Spider-precursor campaign establishing
  the cluster's later tradecraft: high-volume social engineering
  of IT-adjacent staff, SaaS-tenant pivoting, and credential-
  harvesting at scale. Notable for Cloudflare's successful
  FIDO2-key defense as a case study in MFA-format hardening
  reducing the attack surface to authentic-only credentials. The
  operator base is the Anglophone, Western-jurisdictional criminal
  cluster later consolidated by multiple vendors under the
  "Scattered Spider" identity, with no state nexus. Group-IB's
  contemporaneous label for the campaign was "0ktapus"; the
  identity with Scattered Spider (UNC3944) is a later, "overlapping"
  vendor consolidation (CrowdStrike / Mandiant / Microsoft, and
  CISA AA23-320A, which lists "Oktapus" as a Scattered Spider alias).
attributions:
  - actor_id: criminal/scattered-spider
    attributing_org: Group-IB
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-08-25
    attribution_source_id: group-ib/2022-08-25_0ktapus-okta-phishing
    notes: |
      Group-IB directly investigated the campaign and named the
      cluster "0ktapus" (named-actor: a specific named cluster, not
      a mere activity-cluster; no state unit, so not named-unit).
      AUSPEX maps 0ktapus to criminal/scattered-spider per the later
      vendor consolidation — CISA AA23-320A lists "Oktapus" as a
      Scattered Spider alias — but the actor record itself grades the
      0ktapus<->Scattered-Spider alias as "overlapping" (campaign-era
      label), hence concur-WITH-CAVEAT rather than plain concur.
      Group-IB did not itself use the "Scattered Spider" name.
