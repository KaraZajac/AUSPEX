initial_vector: null
outcome_summary: |
  Microsoft (Brad Smith) published "The hybrid war in Ukraine"
  alongside an MSTIC technical "Special Report: Ukraine"
  documenting at least 237 Russian state cyber operations against
  100+ Ukrainian organisations between mid-February and mid-April
  2022. Operations spanned 8+ destructive malware families
  (FoxBlade / HermeticWiper, IsaacWiper, CaddyWiper, DesertBlade,
  Lasainraw / IsaacWiper, others), Sandworm pre-positioning, APT29
  espionage on Ukraine-aiding governments, and APT28 / STRONTIUM
  phishing of Ukrainian media and government.
false_flag_risk: none
summary: |
  Critical doctrinal disclosure: established the public baseline
  for the scale and tempo of Russian cyber operations in the
  invasion's opening phase. Microsoft observed coordinated
  cyber-kinetic timing — destructive malware against Ukrainian
  government followed by missile strikes against the same victim
  sectors within 48 hours — which the report explicitly framed as
  integrated hybrid warfare. The pairing of public disclosure with
  legal action (Trustworthy Computing, civil suits against
  STRONTIUM domains) became the template for Western private-
  sector response to invasion-phase Russian cyber activity.
