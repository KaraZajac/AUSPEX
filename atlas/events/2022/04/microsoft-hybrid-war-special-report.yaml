false_flag_risk: none  # restored 2026-07-01: dropped during the batch-25 audit edit; a Microsoft summary report with open attribution, no misattribution/deception
outcome_summary: |
  On 2022-04-27 Microsoft released, in tandem, Tom Burt's blog
  "The hybrid war in Ukraine" and an MSTIC technical "Special
  Report: Ukraine — An overview of Russia's cyberattack activity."
  Together they documented at least six Russia-aligned nation-state
  actors launching no less than 237 operations against Ukraine
  between 23 February and 8 April 2022, including 38 discrete
  destructive attacks (32% against Ukrainian government at national/
  regional/city level, 40%+ against critical-infrastructure sectors).
  The technical report catalogued multiple destructive malware
  families — including WhisperGate, FoxBlade/HermeticWiper,
  CaddyWiper, Industroyer2 and IsaacWiper/Lasainraw — and named the
  actor clusters behind the activity: IRIDIUM (Sandworm),
  STRONTIUM (Fancy Bear / APT28), NOBELIUM (the SolarWinds actor /
  APT29) and the WhisperGate cluster DEV-0586, among others.
summary: |
  Foundational doctrinal disclosure: it established the public
  baseline for the scale and tempo of Russian cyber operations in
  the invasion's opening phase. Microsoft framed the campaign as a
  "hybrid war," reporting that Russia's cyberattacks were "strongly
  correlated and sometimes directly timed" with kinetic military
  operations against the same civilian services and institutions —
  e.g. a cyberattack on a major broadcaster on 1 March, the same day
  the Russian military announced its intent to destroy "disinformation"
  targets and struck a Kyiv TV tower with a missile. Russia-aligned
  actors were reported pre-positioning as early as March 2021, with
  destructive wiper activity intensifying from early 2022. This is a
  summary/documentary event: the actor-cluster and malware specifics
  are drawn from the MSTIC technical report, not any single sub-
  operation. Microsoft explicitly attributed the previously disclosed
  wiper attacks to the actor it calls IRIDIUM (Sandworm).
