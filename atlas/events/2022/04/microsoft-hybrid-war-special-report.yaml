id: 2022-04/microsoft-hybrid-war-special-report
name: Microsoft "Hybrid War" disclosure — 237+ Russian operations against Ukraine
start_date: 2022-02-23
disclosure_date: 2022-04-27
end_date: 2022-04-27
incident_type:
  - disclosure
