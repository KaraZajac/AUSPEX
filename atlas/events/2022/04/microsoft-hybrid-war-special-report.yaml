qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: partial
  notes: |
    Documentary/summary event audited against Microsoft's 2022-04-27 disclosure. Two
    sources now cited: the Tom Burt blog "The hybrid war in Ukraine" (raw snapshot
    7a65dfd8…b172b5cc1, 172,335 bytes, real article, fully readable) and the MSTIC
    technical "Special Report: Ukraine" (NEWLY ADDED; canonical PDF RE4Vwwd is bot-walled,
    snapshot 14b91d28…08d335 / 129,929 bytes is Microsoft's live Security Insider web
    edition which no longer prints the codename tables — technical specifics
    mirror-corroborated). level=partial for that reason.
    [a] FACTS — corrected several. Blog verbatim: "at least six separate Russia-aligned
    nation-state actors launch more than 237 operations against Ukraine"; destructive
    attacks "numbering close to 40" ("38 discrete" per report mirrors), "32% ... targeted
    Ukrainian government organizations at the national, regional and city levels", "More
    than 40% ... critical infrastructure"; pre-positioning "as early as March 2021";
    example of a broadcaster hit on 1 March the same day as a missile strike on a Kyiv TV
    tower; blog "attributes wiper malware attacks we previously disclosed to a Russian
    nation-state actor we call Iridium." STRIPPED FABRICATIONS: (1) author "Brad Smith" —
    blog byline is Tom Burt (fixed in source record too; Brad Smith only appears in the
    sidebar's Related Stories); (2) "within 48 hours" — blog says "strongly correlated and
    sometimes directly timed", no 48h figure; (3) "The pairing of public disclosure with
    legal action (Trustworthy Computing, civil suits against STRONTIUM domains)" — appears
    in neither Microsoft document; the STRONTIUM domain civil suit is the SEPARATE
    2022-04-07 "Disrupting cyberattacks targeting Ukraine" action — removed as imported
    embellishment; (4) trimmed the "100+ Ukrainian organisations" claim (blog says
    "hundreds of systems", not organisations) and the loose "8+ malware families" /
    duplicated "Lasainraw / IsaacWiper" list to the families corroborated by mirrors.
    [b] ATTRIBUTION — the blog names only IRIDIUM; STRONTIUM/APT28 and NOBELIUM/APT29 were
    cited to the blog but the blog does not name them. Re-pointed all three attributions'
    attribution_source_id to the MSTIC technical report, which does name IRIDIUM (Sandworm,
    GRU), STRONTIUM (Fancy Bear/APT28, GRU) and NOBELIUM (SolarWinds actor/APT29). DOWNGRADED
    confidence high -> moderate on all three: the only explicit confidence statement located
    is "HermeticWiper/CaddyWiper/Industroyer2 attributed to Sandworm/Iridium with MODERATE
    confidence" (The Hacker News / Malwarebytes quoting the PDF); no "high confidence"
    wording found for any cluster. Added attribution_level: named-actor to all three (report
    names the cluster + service, not the numbered unit). Report also names DEV-0586,
    ACTINIUM et al.; kept the three headline clusters rather than importing every sub-actor.
    [c] DATES — published_on 2022-04-27 correct for both sources; retrieved_on updated to
    2026-07-01. Op window 23 Feb–8 Apr 2022; start_date 2022-02-23 retained (237-op window
    start), disclosure/end 2022-04-27 (report date). No conflation.
    [d] DOCTRINE_LINKS — non-contact-warfare kept ATTESTED with attesting_source_id + a
    source_quote naming the cyber-kinetic integration goal ("strongly correlated and
    sometimes directly timed with its kinetic military operations"). russkiy-mir DOWNGRADED
    attested -> strongly_inferred: Microsoft documents the Ukraine campaign but never states
    a Russkiy-Mir ideological goal, so it cannot carry attested; added inference_basis
    signals + ruled_out.
    [e] ATTRIBUTION_LEVEL — set named-actor on all three (was missing).
    [f] ACTOR_ID — ru/gru/74455/sandworm, ru/gru/26165/apt28, ru/svr/apt29 all resolve to
    real actor files (ids match despite differently-named files). No actor flags.
    FLAG: none blocking. Residual uncertainty: the codename/malware/confidence specifics
    rest on mirror-corroboration of a bot-walled first-party PDF (hence partial); if the
    original RE4Vwwd PDF becomes fetchable it should be re-snapshotted to upgrade to full.
