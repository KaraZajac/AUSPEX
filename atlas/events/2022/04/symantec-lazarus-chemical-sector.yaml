id: 2022-04/symantec-lazarus-chemical-sector
name: Symantec disclosure of Lazarus Operation Dream Job chemical-sector targeting
start_date: 2022-01-01  # Symantec dates campaign onset to early 2022
disclosure_date: 2022-04-14
end_date: 2022-04-14
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Symantec Threat Hunter Team disclosed a Lazarus
  "Operation Dream Job" campaign targeting South Korean
  chemical-sector and IT-sector firms via LinkedIn
  fake-recruiter pretext with trojanized job-description
  attachments dropping BLINDINGCAN-family implants. Same
  operational pattern subsequently documented against
  multiple Western defense-industrial-base and
  cryptocurrency victims.
false_flag_risk: none
summary: |
  Early-2022 documentation of the access primitive that
  underwrites both the strategic-tech-collection and
  revenue-aggregation pillars of the 8th-Congress defense
  plan. Same LinkedIn fake-recruiter pretext that delivers
  TraderTraitor's crypto-exchange payloads (Stake.com,
  CoinEx, Atomic Wallet) also delivers Lazarus's
  defense-collection payloads (chemical sector here, Spanish
  aerospace via LightlessCan in 2023). The dual-use of the
  pretext is the doctrinal point: one social-engineering
  primitive serves multiple pillars of the same defense plan.
