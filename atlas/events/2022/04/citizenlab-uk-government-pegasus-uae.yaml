id: 2022-04/citizenlab-uk-government-pegasus-uae
name: Citizen Lab discloses UAE-attributed Pegasus suspected infections at 10 Downing Street and UK Foreign Office
start_date: 2020-01-01  # Citizen Lab's documented suspected-infection window opens 2020
disclosure_date: 2022-04-18
end_date: 2021-12-31  # end of documented suspected-infection window
incident_type:
  - intrusion
  - surveillance
  - documentary
initial_vector: zero-click
outcome_summary: |
  Citizen Lab discloses that between 2020 and 2021 it observed
  and notified the UK government of multiple suspected Pegasus
  spyware infections within official UK networks. Citizen Lab
  attributes the 10 Downing Street (Prime Minister's Office)
  suspected infection from 2020 to a Pegasus operator it assesses
  as the United Arab Emirates. Suspected infections at the UK
  Foreign and Commonwealth Office (FCO) were attributed to
  operators assessed as UAE, India, Cyprus, and Jordan. The
  attribution rests on Citizen Lab's longstanding Pegasus
  operator-infrastructure tracking methodology — the same
  methodology that grounded the Hide and Seek (2018) operator-
  state identifications.
false_flag_risk: low  # Citizen Lab operator-infrastructure tracking methodology established by prior disclosures
summary: |
  The Downing Street / FCO disclosure is the clearest example in
  the AUSPEX corpus of UAE-attributed Pegasus deployment against
  an allied Five Eyes / NATO state's executive and foreign-
  affairs apparatus. The targeting set is independently
  significant because it indicates UAE Pegasus operations against
  states with which the UAE maintains formal strategic
  partnerships — not only against domestic dissidents, regional
  adversaries, or journalist-in-exile targets. Citizen Lab does
  not name a specific UAE customer service in the disclosure;
  AUSPEX models the customer-side as ae/state-security.

  The disclosure is the precise companion to Citizen Lab's
  CatalanGate publication (also 18 April 2022), which addressed
  Spain-attributed Pegasus operations against Catalan
  independence figures. Both disclosures used the same operator-
  infrastructure tracking methodology.
