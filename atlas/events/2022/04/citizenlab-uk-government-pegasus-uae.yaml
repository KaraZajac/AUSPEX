  notes: |
    Audited against the sole cited source, Citizen Lab, "UK
    Government Officials Infected with Pegasus" (2022-04-18),
    raw snapshot sha256 dd37a8cf…07310c13, 93,731 bytes (HTTP 200;
    url citizenlab.ca/2022/04/... 301-redirects to the canonical
    citizenlab.ca/research/... path — real article, not a phantom).

    [a] FACTS — all core claims verbatim-carried. RAW: "We confirm
    that in 2020 and 2021 we observed and notified the government
    of the United Kingdom of multiple suspected instances of
    Pegasus spyware infections within official UK networks. These
    included: The Prime Minister's Office (10 Downing Street) The
    Foreign and Commonwealth Office (FCO) (Now the Foreign
    Commonwealth and Development office – FCDO)"; "The suspected
    infections relating to the FCO were associated with Pegasus
    operators that we link to the UAE, India, Cyprus, and Jordan.
    The suspected infection at the UK Prime Minister's Office was
    associated with a Pegasus operator we link to the UAE."
    CORRECTIONS: (1) initial_vector 0-day -> unknown — the report
    does NOT describe the infection vector (no "zero-click",
    "exploit", "0-day", or CVE anywhere in the text); the vector
    was not source-carried. (2) outcome_summary reworded: removed
    the "10 Downing Street suspected infection from 2020"
    year-pin — the report dates the whole observation window to
    "2020 and 2021" and does NOT assign the No.10 case to a
    specific year; also removed the unsupported "operator-
    infrastructure tracking methodology / same methodology that
    grounded Hide and Seek (2018)" lineage — this article contains
    no methodology description or Hide-and-Seek cross-reference
    (that was AUSPEX editorial, not source-carried).

    [b] ATTRIBUTION — the OPERATOR is a state (UAE); the TOOL is
    NSO's Pegasus (private mercenary-spyware vendor). The event
    correctly models actor_id: null + service_id: ae/state-security
    (customer-side) and treats NSO/Pegasus as vendor/tool, not the
    attributed actor — matches the source. CORRECTION:
    attributing_org_confidence high -> moderate. The report uses
    the firm-but-unquantified phrasing "a Pegasus operator we link
    to the UAE" with NO explicit confidence adjective ("confidence"
    appears nowhere in the text) and pervasively frames the
    infections as "suspected"; the prior "high" rested on CL's
    cross-report track record, not this report's stated confidence.
    Kept auspex_assessment: concur.

    [c] DATES — source published_on 2022-04-18 (RAW "Date Published
    April 18, 2022") ✓. Event disclosure_date 2022-04-18 ✓.
    start_date 2020-01-01 / end_date 2021-12-31 bound the "2020 and
    2021" observation/notification window ✓ (kept; comments left).

    [d] DOCTRINE_LINKS — link #1 ae/procurement-led-capability/
    commercial-spyware KEPT attested: the doctrine's own
    cyber_relevance sets the attested bar at "a vendor source
    explicitly named UAE procurement of the specific capability",
    and CL naming a UAE Pegasus operator meets it; added
    inference_basis.source_quote ("…a Pegasus operator we link to
    the UAE"). attesting_source_id present (gate satisfied).
    CORRECTION: REMOVED link #2 ae/regional-influence-realigned/
    post-accords-cooperation as mis-scoped — that pillar is
    "Open cybersecurity cooperation with Israel post-September
    2020… Not a target-set so much as a cooperation framing", and
    the doctrine restricts itself to UAE ops against REGIONAL
    adversary states; the UK is neither a regional adversary nor an
    Abraham-Accords party, so the pillar does not genuinely apply.
    No second UAE doctrine fits (regime-protection-surveillance is
    for dissident/journalist targeting), so one attested link
    stands.

    [e] ATTRIBUTION_LEVEL — added `nation`: CL names only "the UAE",
    not a service, unit, or named operator cluster.

    [f] ACTOR_ID — null (unattributed to a named group), with
    service_id ae/state-security which resolves to
    atlas/services/ae/state-security.yaml. Both doctrine pillar FKs
    resolve.

    FLAGS: (1) MODELING — service_id ae/state-security is an AUSPEX
    modeling choice for the customer-side; CL attributes only to
    "the UAE" (nation), naming no service. Left as-is (documented
    in the summary) but flag for orchestrator review. (2) SOURCE —
    retiered the CL source secondary -> primary (first-party
    originating investigation) and added raw_snapshot +
