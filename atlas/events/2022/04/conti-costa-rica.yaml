id: 2022-04/conti-costa-rica
name: Conti ransomware against Costa Rica government
start_date: 2022-04-12
disclosure_date: 2022-04-18
end_date: 2022-06-30
incident_type:
  - ransomware
  - extortion
  - disruption
initial_vector: unknown
outcome_summary: |
  Conti probed Costa Rica's Ministry of Finance (Hacienda) during
  the week of April 10 2022; by the early hours of April 18 files
  were encrypted and two key systems — the digital tax service and
  the customs-control IT system — were crippled (disclosure April
  18). The intrusion spread across 27 government bodies through
  early May (Finance/Hacienda, the Labor ministry MTSS, MICITT, the
  national meteorological institute, RACSA, and the Cartago
  electrical board Jasec among them), of which President Chaves said
  nine were "very affected." Conti demanded USD 10M, then raised the
  figure to USD 20M, and uploaded ~672 GB of stolen data when Costa
  Rica refused to pay. On May 8 2022 — his first day in office —
  incoming President Rodrigo Chaves declared a national state of
  emergency over the attack, the first time a country has done so
  in response to a cyberattack. Import/export trade was paralyzed;
  local reports estimated losses of roughly USD 38M/day (ranges
  cited up to USD 125M over 48h). US firm AdvIntel declared Conti's
  operations "dead" on May 19 2022, reporting its leak-site admin
  panel and negotiation site shut down and infrastructure being
  reset — the group had begun dismantling its brand in early May. A
  separate follow-on attack struck the Costa Rican Social Security
  Fund (CCSS, public healthcare) on May 31 2022 using HIVE
  ransomware, which is believed — though not confirmed — to share
  ecosystem ties with Conti.
quantified_impact:
  government_bodies_affected: 27
  national_emergency: true
  ransom_demanded_usd: 20000000
  ransom_paid: false
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
summary: |
  Widely assessed as the most significant ransomware incident to
  date (Emsisoft's Brett Callow: "quite unprecedented") and one of
  the first times a criminal ransomware group explicitly held a
  national government to ransom. The operation's strategic meaning
  is genuinely contested: AdvIntel, Emsisoft and Check Point read
  it as exit-scam "showboating" — cover for Conti dismantling its
  brand (declared dead May 19) while personnel migrated to Black
  Basta / Royal / Karakurt — rather than state-directed retaliation.
  Conti's uncharacteristic political rhetoric (demanding the
  government's overthrow, addressing "US terrorists (Biden and his
  administration)") and near-simultaneous hits on Peru's finance
  ministry fit an opportunistic/theatrical reading. The Russia nexus
  (Conti's Feb 2022 pro-Kremlin pledge; ContiLeaks FSB-liaison
  documentation) keeps a sanctions-response framing plausible, but
  no cited source establishes Russian state tasking for THIS
  operation. The follow-on Hive/CCSS attack is tied to Conti only by
  "believed" ecosystem links, which the reporting itself flags as
  uncertain.
