  notes: |
    Full 6-point audit vs RAW (claude-opus-4.8/max, 2026-07-10).
    Phantom-remediation path: RE-SOURCE (badrabbit model) — event is
    REAL and well-documented; the prior primary citation
    (micitt-cr/2022-04-18_conti-attribution) was a homepage-shell
