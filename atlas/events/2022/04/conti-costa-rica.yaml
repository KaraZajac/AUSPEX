id: 2022-04/conti-costa-rica
name: Conti ransomware against Costa Rica government
start_date: 2022-04-12
disclosure_date: 2022-04-18
end_date: 2022-06-30
incident_type:
  - ransomware
  - disruption
initial_vector: phishing
outcome_summary: |
  Conti intrusion of the Costa Rican Ministry of Finance disclosed
  Apr 18 2022; spread to 27 government bodies including the social-
  security agency. Costa Rica declared a national state of emergency
  on May 8 2022 (President Rodrigo Chaves on day three of his
  administration) — the first national emergency declaration over
  a ransomware attack on public record. Tax-collection systems
  offline for weeks; estimated USD 30M / day economic impact at
  peak. Conti demanded USD 10M then USD 20M ransom; Costa Rica
  refused. Conti shut down its leak-site infrastructure May 19
  2022, treated by some analysts as the operational end of Conti
  branding. A follow-on Hive ransomware attack on CCSS (Costa
  Rica's public-healthcare agency) occurred May 31 2022.
quantified_impact:
  government_bodies_affected: 27
  national_emergency: true
  ransom_demanded_usd: 20000000
  ransom_paid: false
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
summary: |
  Most consequential government-level ransomware incident on
  public record. Notable strategic ambiguity: was Conti
  performing exit-show theater (the leak site went down weeks
  later) or executing a deliberate Latin-America-targeting
  operation? The attack came two months into the Russia-Ukraine
  war and after Costa Rica had publicly supported Ukraine. The
  follow-on Hive attack on CCSS healthcare reinforces the
  Russian-criminal-ecosystem reading.
attributions:
  - actor_id: ru/proxies/conti
    attributing_org: Costa Rica MICITT + Microsoft + Mandiant
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2022-04-18
