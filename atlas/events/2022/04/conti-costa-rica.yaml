doctrine_links:
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/criminal-proxy-mobilization
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Timing (post-invasion, after Costa Rica's public Ukraine
      support) and target (a state-aligned-against-Russia government)
      align with the criminal-proxy mobilization pattern, though
      no direct state-tasking attestation exists. Conti's own Feb
      25 "Warning" pledging support to Russia is the closest
      primary-source link.
    contested: false
    analyst: claude
