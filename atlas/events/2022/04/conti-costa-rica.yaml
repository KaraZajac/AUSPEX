    [a] FACTS — corrected against raw:
      * "day three of his administration" was WRONG. BBC: "The
        declaration was made on the day Mr Chaves took office"; Wired:
        "On May 8, Chaves started his four-year term as president and
        immediately declared a 'national emergency'"; BleepingComputer:
        "signed into law by Chaves on Sunday, May 8th." Fixed to "his
        first day in office."
      * "$30M/day" was unsourced. Wired (citing local reports): "losses
        range from $38 million per day up to $125 million over 48
        hours." Prose changed to ~USD 38M/day (range up to 125M/48h).
      * "spread to 27 ... including the social-security agency"
        conflated two separate attacks. The 27 bodies were Conti's
        (mid-April-early May); the CCSS social-security/health fund was
        hit SEPARATELY by HIVE on May 31 (Wired). De-conflated.
      * "first national emergency ... over a ransomware attack" rephrased
        to Wired's exact framing: "the first time a country has done so
        in response to a cyberattack."
      * Leak-site shutdown: refined to AdvIntel's May 19 declaration that
        Conti's operations were "dead" (admin panel + negotiation site
        down, infra reset; brand dismantling began early May) — Wired.
      * 27 bodies (BBC/Wired), $10M->$20M demand (BBC/Wired), refusal to
        pay, national emergency, tax/customs paralysis, ~672 GB exfil
        (Wired 672 GB / BBC "more than 600 GB") — all carried by
        snapshotted sources.
    [b] ATTRIBUTION — was over-attested ("Costa Rica MICITT + Microsoft +
        Mandiant"); Microsoft/Mandiant are not in any cited source.
        Corrected to what IS sourced: Conti self-claim (unc1756 on its
        own leak site, per Wired) + Costa Rican government + US Dept of
        State (RfJ; BBC: "It blamed Conti for the cyber-attacks which
        hit Costa Rica"). Russia nexus is stated at NATION level only
        ("thought to be run from Russia") — no state tasking. Confidence
        high (self-claim + govt + US) retained.
    [c] DATES — disclosure 2022-04-18 confirmed (Wired encryption "early
        hours of April 18"; BC "Since April 18th ... unavailable").
        start_date 2022-04-12 kept as a within-window representative of
        Wired's "started during the week of April 10" / "mid-April"
        probing phase (source gives a week, not a day). end_date
        2022-06-30 is an APPROXIMATE recovery-tail marker (CCSS still
        restoring systems through June per Wired 2022-06-12); not
        precisely sourced — flagged. Source bylines verified: Wired
        2022-06-12 (Matt Burgess), BBC 2022-05-18, BC 2022-05-09
        (Ax Sharma), RfJ 2022-05-06.
    [d] DOCTRINE — ru/sanctions-response-2022/criminal-proxy-mobilization
        KEPT (Kara-approved for Conti events). Downgraded
        strongly_inferred -> PLAUSIBLE and restructured with
        inference_basis {signals[], alternatives[]}; perspective
        attacker-rationale (Russian attacker doctrine on a Russian-proxy
        op); contested true. NOT attested: no cited source states the
        sanctions-response terminal goal for THIS operation, and the
        dominant sourced reading is exit-scam theater. (Contrast the
        sibling 2022-02/conti-pledge-leaks, attested, where Conti's own
        pledge IS the self-attestation.)
    [e] ATTRIBUTION_LEVEL — added: named-actor (Conti; group-level
        self-claim + govt/US attribution; no unit, not a nation-state
