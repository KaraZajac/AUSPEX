        - "The operation falls inside the post-invasion window against a state aligned rhetorically with Ukraine and the West."
        - "ContiLeaks (Feb-Mar 2022) and the US/UK Treasury/FCDO sanctions (Feb/Sep 2023) document a Conti / FSB Center-18 liaison and safe-haven — the substrate of the criminal-proxy-mobilization pillar."
      alternatives:
        - "Exit-scam / brand-cover 'showboating' — AdvIntel, Emsisoft and Check Point assessed the attack as a distraction while Conti wound down its brand (declared dead 19 May), not state-tasked retaliation (dominant sourced reading)."
        - "Opportunistic criminal targeting of soft Latin-American government IT — Conti hit Peru's finance ministry and intelligence agency around the same time; the victim looks chosen for payability, not for aiding Ukraine."
        - "No cited source establishes Russian state tasking or a sanctions-retaliation motive for this specific operation."
    reasoning: |
      KEEP (Kara-approved for Conti events): Conti is a state-adjacent,
      pledged proxy, so the sanctions-response posture is retained here
      — unlike the stateless DarkSide/REvil cases where the tag was
      dropped. Held at PLAUSIBLE (not strongly_inferred/attested)
      because the dominant sourced reading of THIS operation is
      criminal exit-scam theater and no cited source ties the Costa
      Rica targeting to Russian state direction. The attested
      criminal-proxy-mobilization attestation lives on the Feb 2022
      pledge event (2022-02/conti-pledge-leaks), not on this operation.
    contested: true
    analyst: claude
targets:
  - target_id: orgs/costa-rica-government
    role: primary
    outcome: |
      27 government bodies breached by Conti (Apr-May 2022); Ministry
      of Finance (Hacienda) tax and customs systems crippled, nine
      bodies "very affected," national emergency declared, ~672 GB
      exfiltrated. Ransom (USD 10M then 20M) refused.
  - target_id: orgs/costa-rica-ccss
    role: primary
    outcome: |
      Separate follow-on attack on the Costa Rican Social Security
      Fund (CCSS, public healthcare) on May 31 2022 — perpetrated by
      HIVE ransomware, NOT Conti. Hive is believed (not confirmed) to
      share ecosystem ties with Conti; the reporting explicitly
      questions whether the two attacks are linked. CCSS declared an
      "institutional emergency" June 3; ~759 of 1,500 servers and
      thousands of appointments affected. (Candidate for its own
      Hive-attributed event — see qc.)
