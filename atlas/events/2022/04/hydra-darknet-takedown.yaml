id: 2022-04/hydra-darknet-takedown
name: Hydra darknet marketplace seized; Garantex sanctioned
start_date: 2022-04-05
disclosure_date: 2022-04-05
end_date: 2022-04-05
incident_type:
  - law-enforcement
  - policy
initial_vector: unknown
outcome_summary: |
  German Federal Criminal Police (Bundeskriminalamt / BKA)
  seized the server infrastructure of Hydra Market — the
  world's largest and most prominent Russian-language darknet
  market, launched in 2015 — along with cryptocurrency wallets
  holding approximately USD 25M in bitcoin. Same-day US
  Treasury OFAC SDN designation of Hydra and of Garantex, a
  virtual-currency exchange founded in late 2019 (originally
  registered in Estonia) operating primarily out of Moscow and
  St. Petersburg, Russia, whose transactions Treasury tied to
  ransomware laundering (over USD 100M linked to illicit actors
  and darknet markets, nearly USD 6M from Russian RaaS).
  Treasury also cited approximately USD 8M in ransomware
  proceeds (Ryuk, Sodinokibi/REvil, Conti) that transited
  Hydra accounts, and Hydra revenue rising from under USD 10M
  in 2016 to over USD 1.3B in 2020. In the same-day companion
  action, DOJ announced criminal charges against Russian
  national Dmitry Olegovich Pavlov (conspiracy to distribute
  narcotics; conspiracy to commit money laundering) as the
  alleged operator/administrator of Hydra's servers, and stated
  Hydra had received approximately USD 5.2B in cryptocurrency
  since 2015.
false_flag_risk: none
summary: |
  Canonical case of European-led darknet-market takedown
  coupled with US Treasury financial-system pressure on the
  surrounding laundering infrastructure. Russian-based
  operators were not extradited; the action's effect was on
  the marketplace and its banking pipe rather than on the
  human operators. AUSPEX classifies as criminal-baseline:
  the underlying activity is narcotics, stolen-data, and
  cybercrime services with no state-attribution claim.
