  notes: |
    Law-enforcement/sanction counter-action against the Hydra darknet
    marketplace + Garantex exchange. RE-SOURCED (badrabbit model): the
    event carried two claims the single cited Treasury release does NOT
    state — the "~$5.2B cumulative Hydra transactions" figure (mis-cited
    to Treasury) and the DOJ/Pavlov charges — so I added the same-day DOJ
    OPA press release as a second source to carry them. Level=partial ONLY
    because that DOJ page is bot-walled (Akamai interstitial; HTTP 403 to
    WebFetch) and could not be raw-snapshotted; its figures are
    mirror-corroborated verbatim (The Record, CNBC, TheHackerNews,
    moneylaunderingnews). Treasury release fully snapshotted + hashed.

    [a] FACTS — Treasury raw (sha256 57258586…09b29882, 133,380 bytes)
    carries verbatim: OFAC "sanctioned the world's largest and most
    prominent darknet market, Hydra Market"; "international cooperation
    with the German Federal Criminal Police, who today shut down Hydra
    servers in Germany and seized $25 million worth of bitcoin"; "Hydra
    was launched in 2015 and is the most prominent Russian darknet
    market"; "approximately $8 million in ransomware proceeds that
    transited Hydra's virtual currency accounts, including from the Ryuk,
    Sodinokibi, and Conti"; "Hydra's revenue had risen dramatically from
    under $10 million in 2016, to over $1.3 billion in 2020"; Garantex
    "founded in late 2019 and originally registered in Estonia ...
    majority of Garantex's operations are carried out in Moscow ... and
    St. Petersburg, Russia"; "over $100 million in transactions are
    associated with illicit actors and darknet markets, including nearly
    $6 million from Russian RaaS". CORRECTIONS: (1) the "$5.2B ... cited by
    Treasury" line was FALSE-ATTRIBUTED — that figure ("since 2015, the
    marketplace has received approximately $5.2 billion in cryptocurrency"
    + the 80%-of-2021 figure) is a DOJ statement, not in the Treasury
    release; re-attributed to DOJ and re-sourced. (2) Added the Treasury-
    carried detail it omitted ($8M ransomware transit, $1.3B/2020 revenue,
    Garantex $100M/$6M, Estonia registration + Moscow/St.Petersburg ops)
    and dropped the imprecise "Russia-headquartered". (3) Pavlov charges
    (conspiracy to distribute narcotics + conspiracy to commit money
    laundering) are DOJ, not Treasury — now source-carried by the DOJ
    record; softened "unsealed charges" to "announced criminal charges"
    (the mirrors say charged/indictment).
    [b] ATTRIBUTION — null-actor counter-action; no adversary actor is
    attributed. attributing_org normalized to "US Treasury OFAC + German
    BKA + US DOJ"; confidence high, concur (documentary govt action).
    [c] DATES — all 2022-04-05 (start=disclosure=end); Treasury dateline
    "April 5, 2022"; DOJ same day. Both source published_on = 2022-04-05.
    Correct.
    [d] DOCTRINE_LINKS — [] retained. Criminal baseline: narcotics,
    stolen data, RaaS/cybercrime services; no state nexus asserted by
    either source. No doctrine applies.
    [e] ATTRIBUTION_LEVEL — left unset (null): actor_id is null (counter-
    action), so there is no attributed adversary to grade; rationale added
    to the attribution note.
    [f] ACTOR_ID — null (correct). No actor file needed.
    RESIDUAL: DOJ page un-snapshottable (bot-wall) → partial. Pavlov's
    non-extradition (summary) is inference from his Russia residence, not a
    quoted line, but is uncontroversial and widely reported.
    FLAG (orchestrator): consider a companion policy-action record for the
