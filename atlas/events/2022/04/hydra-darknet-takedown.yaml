id: 2022-04/hydra-darknet-takedown
name: Hydra darknet marketplace seized; Garantex sanctioned
start_date: 2022-04-05
disclosure_date: 2022-04-05
end_date: 2022-04-05
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  German Federal Criminal Police (BKA) seized the server
  infrastructure of Hydra Market, the world's largest and
  longest-running darknet marketplace, operating since 2015
  primarily in Russian language. Approximately USD 25M in
  cryptocurrency seized. Same-day US Treasury OFAC SDN action
  against Hydra and against Garantex, a Russia-headquartered
  virtual-currency exchange used to launder ransomware
  proceeds. DOJ unsealed charges against Russian national
  Dmitry Olegovich Pavlov as the alleged administrator.
  Approximately USD 5.2B in cumulative Hydra transactions
  cited by Treasury.
false_flag_risk: none
summary: |
  Canonical case of European-led darknet-market takedown
  coupled with US Treasury financial-system pressure on the
  surrounding laundering infrastructure. Russian-based
  operators were not extradited; the action's effect was on
  the marketplace and its banking pipe rather than on the
  human operators. AUSPEX classifies as criminal-baseline:
  the underlying activity is narcotics, stolen-data, and
  cybercrime services with no state-attribution claim.
