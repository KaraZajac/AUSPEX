      (4) "FALLCHILL" REMOVED — not in the advisory; only "updated macOS and Windows variants of
      Manuscrypt, a custom remote access trojan (RAT)" is named. Kept Manuscrypt/Windows/macOS.
      (5) "signed with valid code-signing certificates" SOFTENED — advisory documents ONE app
