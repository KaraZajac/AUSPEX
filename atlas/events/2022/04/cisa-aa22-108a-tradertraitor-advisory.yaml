    (8c1bfad12bbd59d9525ea95d2b9acd4dc5768e058ea33c1fe3aec60b756afcfd), 83,739 bytes. NOT a
    phantom — the raw is the real advisory (title, TTP section, IoCs, app list all present).
    [a] FACTS — corrected several fabrications/embellishments not carried by the advisory:
      (1) "LinkedIn / Telegram social engineering" REMOVED — advisory says only "a variety of
      communication platforms"; neither LinkedIn nor Telegram is named (LinkedIn appears solely
      in the cisa.gov site-footer nav). Replaced with the advisory's actual wording + its named
      victim profile: "employees of cryptocurrency companies—often working in system
      administration or software development/IT operations (DevOps)" and "messages often mimic a
      recruitment effort and offer high-paying jobs" (both verbatim-supported).
      (2) "engineers and finance staff" CORRECTED to sysadmin/DevOps per the source (advisory
