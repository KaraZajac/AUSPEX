      (6) "credential theft against exchange and DeFi hot-wallet infrastructure" → "theft of
      private keys or exploitation of other security gaps" (advisory: "steal private keys or
      exploit other security gaps"; "hot-wallet infrastructure" not stated).
      (7) The Ronin/Harmony/Atomic/Stake/DMM "precursor" line is retained as explicit AUSPEX
