outcome_summary: |
  Multi-agency joint advisory (CISA + FBI + Treasury) defining
  the TraderTraitor cluster and providing IoCs. Consolidates the
  blockchain / cryptocurrency-industry targeting pattern under a
  single named cluster. Not an attack event itself; documented as
  AUSPEX baseline for TraderTraitor attribution.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Foundational US-government cluster-definition document for
  TraderTraitor. Captured here for AUSPEX attribution-chain
  integrity. AA22-108A describes the cluster's tradecraft:
  spearphishing of cryptocurrency-company employees — often those
  working in system administration or software development / IT
  operations (DevOps) — across a variety of communication
  platforms, with recruitment-themed lures offering high-paying
  jobs; delivery of trojanized cryptocurrency applications that
  the US government collectively names "TraderTraitor" (CryptAIS,
  TokenAIS, AlticGO, Esilet, CreAI Deck), one of which (AlticGO's
  bundled Mach-O binary) carried a since-revoked Apple Developer
  code-signing signature; follow-on Manuscrypt RAT implants
  (updated Windows and macOS variants); and theft of private keys
  or exploitation of other security gaps. AUSPEX positions the
  advisory as the cluster-definition precursor to the Ronin
  Bridge, Harmony Horizon, and later Atomic Wallet, Stake.com, and
  DMM Bitcoin heists (those later incidents are not named in this
  advisory).
