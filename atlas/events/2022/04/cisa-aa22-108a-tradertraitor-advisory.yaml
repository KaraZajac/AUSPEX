  notes: |
    Audited against the sole cited primary — CISA/FBI/Treasury joint advisory AA22-108A
    "TraderTraitor: North Korean State-Sponsored APT Targets Blockchain Companies"
    (published_on 2022-04-18, tier primary, govt cert-advisory). Raw snapshot on disk
