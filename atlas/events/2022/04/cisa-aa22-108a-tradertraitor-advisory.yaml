incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Multi-agency joint advisory (CISA + FBI + Treasury) defining
  the TraderTraitor cluster and providing IoCs. Consolidates the
  blockchain / cryptocurrency-industry targeting pattern under a
  single named cluster. Not an attack event itself; documented as
  AUSPEX baseline for TraderTraitor attribution.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Foundational US-government cluster-definition document for
  TraderTraitor. Captured here for AUSPEX attribution-chain
  integrity. AA22-108A describes the cluster's tradecraft: highly-
  tailored spear-phishing of cryptocurrency-firm engineers and
  finance staff via LinkedIn / Telegram social engineering,
  delivery of trojanized cryptocurrency-trading applications
  (CryptAIS, AlticGO, Esilet, CreAI Deck, TraderTraitor-themed
  CryptoCore) signed with valid code-signing certificates, follow-
  on Manuscrypt / FALLCHILL implants on Windows and macOS, and
  credential theft against exchange and DeFi hot-wallet
  infrastructure. The advisory is the cluster-definition
  precursor to the Ronin Bridge, Harmony Horizon, and later
  Atomic Wallet, Stake.com, and DMM Bitcoin heists.
