    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      Insikt Group's DPRK cryptocurrency-theft cluster maps to
      the revenue-aggregation pillar (crypto-bridge-theft
      program) of the 8th-Congress defense plan (Jan 2021).
      The accessible summary frames the stolen funds as
      "a major revenue source" for the regime, laundered to
      operate "despite international sanctions" and for
      "funding military and weapons programs" (with an
      explicit link to "ballistic missile launches") — i.e.
      it names the WMD/weapons-financing end the pillar
      encodes, which on its face meets the attested bar.
      Held at strongly_inferred (not attested) because that
      weapons-financing language sits alongside full-year-2022
      figures that postdate the April-2022 report: the live
      landing page has been updated since publication, so it
      cannot be confirmed the original report stated the goal
      at that specificity. Downgraded conservatively pending
      the gated PDF. (See qc FLAG: upgrade to attested if the
      PDF confirms the weapons-financing framing.)
    contested: false
    analyst: claude
    inference_basis:
