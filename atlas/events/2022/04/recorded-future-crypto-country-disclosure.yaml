  notes: |
    Audited vs the RAW Recorded Future "Crypto Country: North Korea's
    Targeting of Cryptocurrency" landing page (recorded-future/2022_crypto-country-north-korea;
    sha256 145a1cb6…51def581, 9,737 bytes). PHANTOM CHECK: NOT a phantom —
    the url resolves to the genuine report page (title + body match the
    event); the SOURCE slug being date-less did not indicate a bad url.
    Level=partial because the accessible page is a summary abstract (full
    analysis is a gated PDF, "download the report as a PDF") AND the live
    summary carries post-2022 figures, so it is a load-bearing source that
    is only partially snapshot-verifiable.

    [a] FACTS — corrected substantial fabricated/backwards chronology:
      • "pre-Ronin baseline" (name + outcome) was FALSE. Report published
        2022-04-26 is AFTER the 2022-03-23 Ronin hack and AFTER the
        2022-04-14 Treasury/FBI Ronin→Lazarus attribution (web-verified:
        CyberScoop/Elliptic/CoinDesk). Renamed; removed "pre-Ronin".
      • "twelve days after Treasury's jy0768 first-ever mixer designation
        (Blender)" was FALSE/backwards: jy0768/Blender.io was 2022-05-06
        (Treasury press release jy0768; web-verified), i.e. 10 days AFTER
        this report, not before. Corrected: report is 12 days after the
        14 Apr Ronin attribution and 10 days before the 6 May Blender
        designation.
      • "Published two weeks after Ronin" corrected (~5 weeks after the
        23 Mar hack / 12 days after the 14 Apr attribution).
      • Removed unsourced editorial claims not carried by the source
        ("baseline used by Treasury, FBI, and the UN Panel of Experts",
        "frame subsequently adopted … through 2024", "was already
        preparing the case when Ronin occurred").
      • start_date 2018-01-01 → 2017-01-01: source says "Since 2017 …
        during the 2017 bubble, starting with the South Korean market and
        later expanding globally" (verbatim on the page).
      • Sub-group names (APT38/BlueNoroff/TraderTraitor) are NOT on the
        accessible summary — softened outcome_summary to state-level
        attribution; flagged that sub-group detail lives in the gated PDF.
      • CAVEAT recorded: the live summary carries full-year-2022 figures
        ($1.7B in 2022, "44% of stolen cryptocurrency in 2022", "45% of
        its military budget") that postdate an April-2022 report — the
        page was updated after publication; specific figures not treated
        as source-carried for the original report.
    [b] ATTRIBUTION — actor kp/rgb/lazarus (Lazarus umbrella), Insikt
        Group, high. Source is unequivocal on DPRK state sponsorship
        ("North Korean state-sponsored activity", "supported by the
        state") → high retained. Added attribution_level=nation (the
        summary names the nation/state-sponsorship, not the named group).
    [c] DATES — source published_on 2022-04-26 ✓ (real pub date). Event
        disclosure/end 2022-04-26 ✓; start moved to 2017 per source.
    [d] DOCTRINE — kp/8th-congress-defense-plan/revenue-aggregation/
        crypto-bridge-theft, strongly_inferred. FIXED the false reasoning
        ("report does not explicitly invoke the WMD-financing language"):
        the accessible page DOES say theft funds "military and weapons
        programs" and links to "ballistic missile launches". Held at
        strongly_inferred (not upgraded to attested) conservatively
