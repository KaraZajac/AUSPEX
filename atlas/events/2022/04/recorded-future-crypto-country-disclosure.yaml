id: 2022-04/recorded-future-crypto-country-disclosure
name: Recorded Future Crypto Country — Insikt Group cumulative DPRK cryptocurrency-targeting analysis
start_date: 2017-01-01  # AUDIT 2026-07-01: report frames DPRK crypto targeting from the 2017 bubble onward ("Since 2017 ... during the 2017 bubble"), not 2018
disclosure_date: 2022-04-26
end_date: 2022-04-26
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Recorded Future Insikt Group published Crypto Country, a
  cumulative analysis of North Korea's targeting of the
  cryptocurrency industry. The report documents DPRK
  state-sponsored cryptocurrency theft — described as
  beginning with the 2017 bubble, pivoting from the earlier
  SWIFT-network bank thefts, first hitting the South Korean
  market and later expanding globally — and frames the
  stolen funds as a major revenue source for the regime,
  laundered to evade international sanctions and to fund
  military and weapons programs. The accessible summary
  attributes the activity at the state level ("North Korean
  threat actors, supported by the state"); the full
  sub-group breakdown is in the gated PDF.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Documentary event marking Insikt Group's publication of
  Crypto Country. It appeared 12 days after the 14 April 2022
  US Treasury/FBI attribution of the March 2022 Ronin bridge
  theft to Lazarus, and 10 days before Treasury's first-ever
  virtual-currency-mixer designation (Blender.io, press
  release jy0768, 6 May 2022) — i.e. mid-way through the
  spring-2022 wave of US action on DPRK crypto laundering,
  NOT before it. The report treats DPRK cryptocurrency theft
  as a coherent, state-directed revenue campaign rather than
  a series of opportunistic thefts, and situates it as a
  regime revenue stream sustained despite sanctions.
