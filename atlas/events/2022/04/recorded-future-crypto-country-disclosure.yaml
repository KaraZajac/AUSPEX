    [e] ATTRIBUTION_LEVEL — set to nation (was missing).
    [f] ACTOR_ID — kp/rgb/lazarus resolves to atlas/actors/kp/lazarus.yaml ✓.
        doctrine/pillar/program FKs all resolve ✓.

