outcome_summary: |
  Recorded Future Insikt Group published Crypto Country —
  the canonical pre-Ronin cumulative analysis of DPRK
  cryptocurrency targeting. Documents the cluster of
  cryptocurrency-exchange thefts and supply-chain operations
  attributable to Lazarus, APT38 (later TraderTraitor), and
  BlueNoroff between 2018 and Q1 2022. Pre-dates the
  March 2022 Ronin theft attribution by less than two weeks
  and provides the open-source baseline used by Treasury,
  FBI, and the UN Panel of Experts in subsequent attribution
  documents.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Baseline doctrinal-documentation event. Published two
  weeks after Ronin and twelve days after Treasury's
  jy0768 first-ever mixer designation (Blender). The
  timing is significant: Recorded Future was already
  preparing the open-source cumulative case when Ronin
  occurred, and the report frames the 2018-2022 DPRK
  cryptocurrency-targeting cluster as a coherent strategic
  campaign rather than a series of opportunistic thefts.
  Sets the analytic frame subsequently adopted by the
  UN Panel of Experts and US-government attribution
  documents through 2024.
