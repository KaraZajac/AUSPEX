        - "Timing/actor: DPRK state-sponsored actors (Lazarus umbrella), the arm tasked with sanctions-evasion revenue generation."
      ruled_out: "Purely-criminal enrichment with no state-strategic end — excluded by the source's explicit 'supported by the state' / regime-revenue / weapons-financing framing."
