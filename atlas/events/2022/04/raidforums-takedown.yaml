id: 2022-04/raidforums-takedown
name: RaidForums seized; administrator Coelho arrested
start_date: 2022-01-31
disclosure_date: 2022-04-12
end_date: 2022-04-12
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US DOJ + FBI + UK NCA + Europol Operation TOURNIQUET
  seized RaidForums on January 31 2022 and arrested
  administrator Diogo Santos Coelho ("Omnipotent") — a
  Portuguese national — in the UK in March 2022.
  RaidForums was the predominant English-language breach-
  data marketplace of 2015–2022, with approximately
  500K registered users at takedown. Successor BreachForums
  (operated by "Pompompurin" Fitzpatrick) launched within
  weeks; was itself seized in March 2023.
false_flag_risk: none
summary: |
  The RaidForums takedown closed the first-generation
  English-language breach-data marketplace and produced
  the recurring pattern of immediate-successor-forum-launch
  that has characterized the 2022–2025 enforcement record.
  AUSPEX classifies as criminal-baseline.
