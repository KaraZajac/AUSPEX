incident_type:
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  On 12 April 2022 the U.S. Department of Justice announced the
  seizure of RaidForums and unsealed a six-count indictment
  (conspiracy, access-device fraud, aggravated identity theft)
  against its administrator, 21-year-old Diogo Santos Coelho
  ("Omnipotent") of Portugal. RaidForums had operated since 2015
  as the predominant English-language marketplace for buying and
  selling hacked and stolen databases; the DOJ said it advertised
  access to more than 10 billion consumer records stolen in some
  of the world's largest data breaches. Coelho was arrested in
  the United Kingdom on 31 January 2022 at the United States'
  request and remained in custody pending extradition. The
  takedown ran under the U.K. National Crime Agency's "Operation
  Tourniquet," a joint investigation with the U.S., Europol and
  four other countries.
false_flag_risk: none
summary: |
  The RaidForums seizure and the arrest of its administrator was
  a US/UK/EU law-enforcement takedown of the leading first-
  generation English-language breach-data marketplace. AUSPEX
  models it as a null-actor counter-action (documentary / law-
  enforcement) and classifies it as criminal-baseline: no state
  doctrine applies, hence doctrine_links [].
