  notes: |
    Audited vs Krebs on Security "RaidForums Gets Raided, Alleged Admin
    Arrested" (2022-04-12), raw snapshot captured + hashed
    (sha256 0ce00f38…c756a01d, 61,350 bytes). NOT a phantom: the cited URL
    resolves to the genuine article matching the event's claims.

    [a] FACTS — corrected. Krebs verbatim: "The U.S. Department of Justice
    (DOJ) said today it seized the website and user database for RaidForums …
    charged the alleged administrator … 21-year-old Diogo Santos Coelho, of
    Portugal — with six criminal counts, including conspiracy, access device
    fraud and aggravated identity theft"; RaidForums "sold access to more than
    10 billion consumer records stolen … since 2015"; "Coelho was arrested in
    the United Kingdom on January 31, at the United States' request, and remains
    in custody pending the resolution of his extradition hearing"; NCA statement
    said the takedown "was the result of 'Operation Tourniquet,' an investigation
    carried out by the NCA in cooperation with the United States, Europol and
    four other countries." All retained claims now source-carried.
    CORRECTIONS: (1) removed "arrested … in the UK in March 2022" — FALSE; Krebs
    (and DOJ) state the arrest was 31 January 2022. Mar. 23 in Krebs is only the
    date KrebsOnSecurity first *reported* the FBI seizure, not the arrest.
    (2) removed the conflation "seized RaidForums on January 31 2022" — Jan 31 is
    the arrest date; the DOJ seizure was announced 12 April 2022 (FBI had secretly
    operated the site for weeks). (3) removed "approximately 500K registered users"
    — NOT carried by Krebs (it is the Europol figure); replaced with Krebs's
    carried "more than 10 billion consumer records … since 2015." (4) removed the
    "Successor BreachForums (Pompompurin/Fitzpatrick) launched within weeks;
    seized March 2023" sentence — NOT carried by either cited 2022-04-12 source
    and forward-dated beyond the event; struck as unsupported. (5) removed the
    summary's unsourced "recurring immediate-successor-forum-launch 2022–2025
    pattern" framing for the same reason.

    [b] ATTRIBUTION — null-actor law-enforcement counter-action (per the
    directionality model): the perpetrator entity is not an AUSPEX-attributed
    threat actor but the prosecuted individual, so actor_id stays null and no
    attribution_level is set. attributing_org "DOJ + FBI + UK NCA + Europol" all
    named in Krebs; confidence high / concur retained (govt announcement, no
    attribution ambiguity). Added an explanatory note.

    [c] DATES — start_date 2022-01-31 = Coelho's arrest (earliest dated
    enforcement action in source); disclosure_date/end_date 2022-04-12 = DOJ
    announcement day ("said today"). Krebs published_on 2022-04-12 correct.
    DOJ source published_on 2022-04-12.

    [d] DOCTRINE_LINKS [] — correct; a criminal-marketplace takedown carries no
    state strategic doctrine. Not invented.

    [e] ATTRIBUTION_LEVEL — intentionally unset (null-actor counter-action; no
    attacker actor to specify).

    [f] ACTOR_ID null — resolves fine (counter-action). No actor file needed;
    no actor flag.

    incident_type changed [disruption] -> [law-enforcement] to place this in the
    meta counter-action bucket per the schema directionality convention (all-meta
    event, excluded from the eval label set by design).

    SOURCING — event was single-source on a secondary (Krebs). Added govt-primary
    doj/2022-04-12_raidforums-seizure as a second corroborating source; its live
    URL is bot-walled (Akamai interstitial) so it carries NO snapshot/hash, and
    it is NOT load-bearing — every retained claim is carried by the snapshotted
    Krebs report — so level remains full. DOJ/Europol primary facts (incl. EDVA,
    the 500,000-user figure, Operation Tourniquet's six-country composition) were
    cross-checked via reachable reporting during the audit.
