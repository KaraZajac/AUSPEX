    real coauthored advisory; STEP-0 triage passed (title + body match the event's claims).

    [a] FACTS ✓ — Coauthoring bodies verified: "coauthored by U.S., Australian, Canadian, New Zealand,
    and UK cybersecurity authorities" (US CISA/NSA/FBI; AU ACSC; CA CCCS; NZ NCSC; UK NCSC-UK) — matches
    outcome_summary. Named actors all present in raw: Sandworm 4x, APT28 3x, APT29 3x, BERSERK BEAR 3x,
    Killnet 7x, CoomingProject 4x, Conti 13x, Emotet 10x, MUMMY SPIDER 3x. Service→actor mappings quoted
