id: 2022-04/aa22-110a-russian-threats-to-cii
name: CISA AA22-110A — Russian state + criminal cyber threats to critical infrastructure
start_date: 2022-04-20
disclosure_date: 2022-04-20
end_date: 2022-04-20
incident_type:
  - disclosure
