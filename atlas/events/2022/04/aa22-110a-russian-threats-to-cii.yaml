doctrine_links:
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/criminal-proxy-mobilization
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      AA22-110A groups Russian state services with Russia-aligned
      criminal / hacktivist fronts (Killnet, Conti, CoomingProject)
      into a single Five-Eyes CII threat picture during the invasion,
      and documents that these groups publicly pledged support to the
      Russian government post-invasion and conducted war-retaliatory
      targeting. That is strong support for the criminal-proxy-
      mobilisation reading. It is NOT attested, however: the advisory
      does not state that Russia mobilised these groups as a strategic
      instrument — it explicitly assesses them as INDEPENDENT and
      "primarily based on financial motivations", disclaiming state
      command/tasking. Downgraded attested -> strongly_inferred on the
      2026-07-01 audit (the same disclaimer that drove the 2026-06-24
      demotion of Killnet to ru/unscoped): the proximate financial
      motive is the behaviour the pillar specializes, and the post-
      invasion pledges + war-retaliatory DDoS tip the reading to
      strategic alignment.
    attesting_source_id: cisa/2022-04-20_aa22-110a-russian-cyber-threats-to-cii
    inference_basis:
      signals:
        - "Advisory's 'Russian-Aligned Cybercrime Groups' section: post-invasion, multiple crews (Conti, CoomingProject, Killnet) publicly pledged support to the Russian government."
        - "The advisory groups these financially-motivated crews with Russian state services (GRU/FSB/SVR) into one Five-Eyes CII threat picture issued during the February 2022 invasion."
        - "Killnet claimed a DDoS against a U.S. airport in March 2022 explicitly in retaliation for U.S. materiel support to Ukraine — war-aligned targeting, not opportunistic financial crime."
      ruled_out: "The surviving competitor is the advisory's OWN assessment — that these are independent, financially-motivated criminals whose Russia-alignment is rhetorical ('cyber criminals will most likely continue to operate primarily based on financial motivations'). Because that reading is affirmatively stated by the authoritative source, the link cannot be attested; the pledge + war-retaliatory pattern is what lifts it to strongly_inferred rather than plausible."
