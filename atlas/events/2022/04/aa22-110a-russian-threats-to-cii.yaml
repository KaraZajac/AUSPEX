initial_vector: unknown
outcome_summary: |
  CISA, NSA, FBI, NCSC-UK, ACSC, CCCS, and NCSC-NZ jointly issued
  AA22-110A — a comprehensive Five-Eyes-wide threat picture for
  Russian state-sponsored and Russia-aligned criminal cyber activity
  against critical infrastructure following the February 2022
  invasion. The advisory named GRU (Sandworm, APT28), FSB (Berserk
  Bear), SVR (APT29), and explicitly grouped Killnet, CoomingProject,
  Conti, MUMMY SPIDER / Emotet, and other criminal / hacktivist
  fronts as part of the threat picture warranting defensive
  posture by CII operators.
false_flag_risk: none
summary: |
  Doctrinally foundational: AA22-110A is the first Five-Eyes-wide
  joint advisory after the invasion to explicitly treat Russian
  state services AND Russia-aligned criminal / hacktivist groups in a
  single threat picture. The advisory's framing — naming Killnet, Conti,
  and CoomingProject alongside Sandworm and APT28 — is the raw material
  for the proxy-mobilisation read of the post-2022 sanctions-response
  posture that AUSPEX uses as a working strategic frame. NB (2026-07-01
  audit): the advisory itself does NOT assert state command/tasking of
  those groups — it lists them under "Russian-Aligned Cybercrime Groups"
  as INDEPENDENT, self-pledged, and financially motivated, so AUSPEX's
  proxy-mobilisation link is a strongly_inferred read, not an attested
  one. Companion to the broader CISA "Shields Up" defensive posture and
  the subsequent MSP-protection advisory (AA22-131A).
