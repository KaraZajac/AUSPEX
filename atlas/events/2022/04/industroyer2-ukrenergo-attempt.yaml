outcome_summary: |
  Industroyer2 + CaddyWiper combo deployed against a Ukrainian
  high-voltage electrical substation with IEC 60870-5-104
  manipulation. Attempted blackout of a grid serving ~2 million
  people thwarted by ESET / Microsoft / CERT-UA collaboration before
  execution (scale + Microsoft's role per CyberScoop; the ESET blog
  anonymizes the victim and states neither).
quantified_impact:
  customers_at_risk: 2000000  # "a grid serving 2 million people" (CyberScoop 2022-04-12)
  outage_hours: 0  # thwarted
false_flag_risk: none
campaign_id: sandworm-ukraine-grid-wave
summary: |
  Joint ESET / CERT-UA technical disclosure 12 April 2022. The
  Industroyer2 codebase is a Sandworm-internal evolution of the
  2016 Industroyer / CrashOverride framework, collapsed into a
  single Windows executable that hard-codes the IEC 60870-5-104
  configuration for the specific Ukrenergo substation rather than
  loading it from a config file. Sandworm staged Industroyer2 on
  the engineering workstation alongside CaddyWiper (to destroy
  Windows hosts), ORCSHRED, SOLOSHRED and AWFULSHRED (to wipe
  Linux servers and Solaris servers in the ICS environment), and
  ArguePatch/ARGUEPATCH (a patched version of a legitimate Hex-Rays
  IDA Pro remote-debugger component, win32_remote.exe, used as a
  launcher). Lateral movement used SSH with attacker-supplied
  credentials, and the destructive actions were launched via a
  scheduled task; the operation was scheduled to fire and then wipe
  the network behind it. ESET and CERT-UA (with Microsoft aiding the
  Ukrainian response) intercepted execution before the IEC 60870-5-104
  commands could cut power in the targeted Ukrainian region — a grid
  reported to serve some 2 million people.
