outcome_summary: |
  Industroyer2 + CaddyWiper combo deployed against a Ukrainian
  high-voltage electrical substation with IEC 60870-5-104
  manipulation. Attempted blackout of ~2M customers thwarted by
  ESET / Microsoft / CERT-UA collaboration before execution.
quantified_impact:
