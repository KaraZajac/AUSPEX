outcome_summary: |
  February 25 2022 (day after full-scale invasion): Conti's leak
  site published a "Warning" pledging "full support" of the
  Russian government and threatening retaliatory cyber operations
  against any party conducting offensive activities against
  Russia. A Ukrainian Conti operator with retained chat-server
  access responded by leaking >170,000 internal Conti / TrickBot
  Jabber messages (Feb 27 onward — the "ContiLeaks" / "TrickLeaks"
  archive). Subsequent leaks included Conti source code (Mar 1)
  and internal documentation through March 2022.
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
summary: |
  ContiLeaks is the most consequential criminal-cyber leak on
  public record. Documented (a) FSB Center 18 liaison contacts
  including tasking against Bellingcat, Navalny supporters, and
  US/UK targets; (b) Conti's internal corporate structure with
  ~100 paid operators and HR / accounting roles; (c) cryptocurrency
  flows; (d) targeting deliberations for Western critical
  infrastructure. The leak directly underpinned the Feb 9 2023 and
  Sep 7 2023 US/UK sanctions tranches against TrickBot / Conti
  members and the Treasury / FCDO public-attribution of FSB
  liaison. ContiLeaks is the canonical primary-source basis for
  AUSPEX's criminal-state-symbiosis taxonomy.
