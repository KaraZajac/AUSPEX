    [a] FACTS — corrected to the raw; heavy AI-embellishment stripped.
    CARRIED & KEPT (Krebs Part I, verbatim): pledge — "In response to
    Russia's invasion of Ukraine, Conti published a statement
    announcing its 'full support.' 'If anybody will decide to organize
    a cyberattack or any war activities against Russia, we are going to
    use all our possible resources to strike back at the critical
    infrastructures of an enemy,' the Conti blog post read."; leak
    start — "On Sunday, Feb. 27, a new Twitter account 'Contileaks'
    posted links to an archive of chat messages … dating from January
    29, 2021 to the present day", "Shouting 'Glory for Ukraine'",
    "additional Conti employee conversations from June 22, 2020 to Nov.
    16, 2020"; "TrickBot was effectively shut down"; state protection —
    "Conti's top generals began receiving tips from their Russian law
    enforcement sources that the investigation was being rekindled".
    CARRIED (Treasury jy1256): "designating seven individuals who are
    part of the Russia-based cybercrime gang Trickbot"; "Current
    members of the Trickbot Group are associated with Russian
    Intelligence Services. The Trickbot Group's preparations in 2020
    aligned them to Russian state objectives … This included targeting
    the U.S. government"; "targeted critical infrastructure, including
    hospitals". CARRIED (Treasury jy1714): "sanctioned eleven
    individuals who are part of the Russia-based Trickbot cybercrime
    group"; "Russia has long been a safe haven for cybercriminals".
    STRIPPED as UNSOURCED by any cited raw: (1) leaker as "a Ukrainian
    Conti operator with retained chat-server access" — the cited Krebs
    page AFFIRMATIVELY CONTRADICTS this: Alex Holden says "the person
    who leaked the information is NOT a former Conti affiliate … the
    leaker is a Ukrainian security researcher who has chosen to stay in
    his country and fight." Rewritten to "Ukrainian security
    researcher". (2) ">170,000 internal Conti / TrickBot Jabber
    messages" — no count and no "Jabber" appears in either raw ("170,000"
    / "60,000" grep-absent); replaced with the raw's qualitative
    description (years of chat logs, Jan 2021–present + 2020). Public
    reporting elsewhere puts the initial dump near ~60k messages, but
    no cited source carries a figure, so none is asserted. (3) "FSB
    Center 18 liaison contacts", "tasking against Bellingcat, Navalny
    supporters" — "FSB"/"Center 18"/"Bellingcat" grep-absent from both
    raws; "Navalny" appears only in a reader COMMENT, not the article
