id: 2022-02/conti-pledge-leaks
name: Conti loyalty pledge to Russia and ContiLeaks
start_date: 2022-02-25
disclosure_date: 2022-02-25
end_date: 2022-03-31
incident_type:
  - leak
  - documentary
initial_vector: unknown
outcome_summary: |
  February 25 2022 (day after Russia's full-scale invasion of
  Ukraine): Conti's leak site published a statement announcing its
  "full support" of the Russian government and warning that "if
  anybody will decide to organize a cyberattack or any war
  activities against Russia, we are going to use all our possible
  resources to strike back at the critical infrastructures of an
  enemy." In retaliation, a Ukrainian security researcher — posting
  from Feb 27 2022 as the "@ContiLeaks" account ("Glory for
  Ukraine") and, per Hold Security's Alex Holden, NOT a former Conti
  affiliate — published an archive of years of internal Conti chat
  logs (spanning Jan 29 2021 to the present, plus earlier June–
  November 2020 conversations). The leaked messages showed TrickBot
  had been effectively shut down and that Conti's leaders had been
  tipped off by Russian law-enforcement sources; further dumps
  continued through March 2022.
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
summary: |
  ContiLeaks is among the most consequential criminal-cyber leaks
  on public record and AUSPEX's canonical primary-source anchor for
  the criminal-state-symbiosis taxonomy. Two things coincided: (1)
  Conti, a Russia-based ransomware group, publicly pledged "full
  support" of the Russian state and threatened retaliatory strikes
  on the critical infrastructure of any party attacking Russia; and
  (2) the retaliatory leak of its internal chat logs, which
  documented Conti's operations and double-extortion business and —
  per Krebs's "Conti Diaries" Part I — that its leaders had received
  advance warning from Russian law-enforcement sources (state
  protection). The US/UK Treasury later found Conti / TrickBot
  members "associated with Russian Intelligence Services" whose
  "preparations in 2020 aligned them to Russian state objectives,"
  including targeting the US government and critical infrastructure
  such as hospitals; that finding underpinned the Feb 9 2023 (seven
  members) and Sep 7 2023 (eleven additional members) US/UK
  sanctions tranches. The leaked corpus remains the primary
  evidentiary basis for the criminal-proxy-mobilization pillar of
  the post-2022 sanctions-response posture.
