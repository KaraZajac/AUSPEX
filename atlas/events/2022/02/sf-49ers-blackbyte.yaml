id: 2022-02/sf-49ers-blackbyte
name: BlackByte ransomware against San Francisco 49ers
start_date: 2022-02-12
disclosure_date: 2022-02-13
end_date: 2022-03-15
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown
outcome_summary: |
  BlackByte ransomware intrusion against the San Francisco 49ers
  National Football League franchise on the eve of Super Bowl
  LVI (Feb 13 2022, hosted in Los Angeles). BlackByte claimed
  responsibility via its leak site and posted approximately
  300MB of internal financial documents as proof. The team
  confirmed the incident in press statements February 13 and
  reported no impact to ticketing or game-day operations.
  The intrusion prompted the FBI / US Secret Service joint
  advisory CU-000159-MW (Feb 11 2022) on BlackByte ransomware
  against US critical infrastructure.
false_flag_risk: none
summary: |
  Notable for timing (Super-Bowl-eve, with broad press exposure
  for the BlackByte brand) and for the FBI / USSS issuing a
  joint advisory days after — the first US government primary-
  source documentation of the BlackByte cluster. AUSPEX includes
  in criminal-baseline because BlackByte tradecraft has Conti
  code-lineage overlap but no published state-nexus attribution.
attributions:
  - actor_id: criminal/blackbyte
    attributing_org: San Francisco 49ers + BlackByte (self-claimed) + FBI
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2022-02-13
    attribution_source_id: fbi/2022-02-11_cu-000159-mw-blackbyte
    notes: |
      FBI CU-000159-MW BlackByte FLASH is the gang-specific
      advisory issued the day after the 49ers disclosure; it does
      not name the 49ers explicitly. attribution_source_id is the
      nearest primary documentation of BlackByte activity.
