id: 2022-02/sf-49ers-blackbyte
name: BlackByte ransomware against San Francisco 49ers
start_date: 2022-02-12
disclosure_date: 2022-02-13
end_date: null
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown
outcome_summary: |
  BlackByte ransomware intrusion against the San Francisco 49ers
  National Football League franchise, disclosed the weekend of
  Super Bowl LVI (Feb 13 2022, held at SoFi Stadium in the Los
  Angeles area; the 49ers did not play in it). BlackByte operators
  listed the team on their dark-web leak site on Feb 12 and posted
  a ~292MB archive of purported internal financial documents (a
  folder marked "2020 Invoices") as proof-of-compromise under a
  double-extortion model. The team confirmed a "network security
  incident" that disrupted its corporate IT network on Feb 13 and
  said it had no indication the incident reached systems outside
  its corporate network, such as Levi's Stadium operations or
  ticket holders. A separate FBI / US Secret Service joint advisory
  (CU-000159-MW, Feb 11 2022) warned of BlackByte ransomware against
  US critical-infrastructure sectors but does not name the 49ers.
false_flag_risk: none
summary: |
  Notable for timing (disclosed the weekend of Super Bowl LVI, with
  broad press exposure for the BlackByte brand). A contemporaneous
  FBI / US Secret Service joint advisory (CU-000159-MW) provided
  early US-government documentation of the BlackByte cluster, though
  it is a general critical-infrastructure advisory that does not
  reference the 49ers. AUSPEX includes in criminal-baseline because
  BlackByte tradecraft has Conti code-lineage overlap but no
  published state-nexus attribution.
