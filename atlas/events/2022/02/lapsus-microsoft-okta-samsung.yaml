  notes: |
    Full 6-point audit vs RAW snapshots. Sources (all snapshotted+hashed):
    - MSTIC blog microsoft__2022-03-22_dev-0537-lapsus.html
      sha256 254c8d019dd3bbb37207db8cce94647176e745e1b3f3f910ddc1c7779142ecfc
    - CSRB PDF csrb__2023-08-10_lapsus-report.pdf
      sha256 d6e6382699cc4268ded2008edf358bd2ee9c50442704dad8bc3fe2846de2f8fc
    - Okta blog okta__2022-04-19_concludes-jan-2022-investigation.html
      sha256 20e5f414c8e5cd4f8f7cb826adb159bed8ae6803a9f810a261e8312f4b3b5d29

    [a] FACTS — several AI-embellished specifics STRIPPED (carried by NO cited
    source): "Bing/Cortana/Bing Maps source" (MSTIC blog names none of these — 0
    hits; product names are press coverage of the leaked torrent, not the sources),
    "DLSS source" (0 hits in CSRB), "TEEGRIS source"/"Galaxy bootloader" (0 hits),
    "Azure DevOps repo" (MSTIC says only generic "code repositories like GitLab and
    GitHub"), and the "~366 customer tenants potentially affected" stated as the
    outcome. Figures RETAINED are all source-carried: CSRB — "claimed to steal 1 TB
    of data, releasing approximately 150 GB, from a technology company, including
    proprietary information and two code-signing certificates that were later used to
    sign files containing malware" (NVIDIA, fn161); "stole 190 GB of a technology
    company's source code and made it available to download via torrent" (Samsung,
    fn152); "stole approximately 37 GB of source code for over 250 projects from a
    technology company ... made it available to download in an online torrent posted
    on its Telegram channel" (Microsoft, fn149). MSTIC (Microsoft's self-breach):
    "a single account had been compromised, granting limited access ... No customer
    code or data was involved." Okta: "maximum potential impact ... was 366 Okta
    customers whose tenants were accessed by any Sitel customer support engineer" =
    "the maximum potential impact Okta initially shared on March 22, 2022"; actual =
    "accessed two active customer tenants within the SuperUser application ... viewed
    limited additional information in ... Slack and Jira" and could not reset
    MFA/passwords, impersonate, or authenticate to Okta — so the 366→2 correction is
    now stated correctly (was previously the reverse, treating 366 as fact). Vodafone
    corrected: cited source only supports "investigated LAPSUS$ source-code-theft
    claims" (CSRB fn159, SecurityWeek "Vodafone Investigating Source Code Theft
    Claims") — the prior "Vodafone Portugal (Feb 7 service outage)" was a CONFLATION
    of a separate, unattributed Feb-7-2022 Vodafone Portugal outage and pre-dated the
    old start_date; removed. Extortion added to outcome+name (CSRB §1.3.2 "Extortion
    and Ransoms"; "infiltrate and extort organizations"). TTPs confirmed by both:
    MSTIC — "phone-based social engineering; SIM-swapping to facilitate account
    takeover; ... paying employees, suppliers, or business partners ... for access to
    credentials and multifactor authentication (MFA) approval," Redline stealer,
    purchased creds/session tokens, MFA-fatigue ("simple-approval MFA prompts").

    [b] ATTRIBUTION — high/concur upheld. LAPSUS$/DEV-0537 attributed by Microsoft
    (MSTIC), Okta, and the CSRB; group self-claimed on Telegram; CSRB "The cyberattacks
    were not the work of a nation-state actor ... perpetrated by a loosely organized
    threat actor group known as Lapsus$." Not over-attested. attributing_org tidied to
    "Microsoft (MSTIC) + Okta + CSRB".

    [c] DATES — start_date moved 2022-02-23 → 2022-01-16 (was a disclosure-adjacent date,
    not op onset): earliest in-scope intrusion is the Okta/Sitel compromise window
    "January 16 and 21" (Okta). disclosure_date 2022-02-25 kept (NVIDIA, first public
    disclosure of the spree). end_date 2022-03-22 → 2022-03-24: CSRB "On March 24, 2022,
    the City of London Police released information about the arrest of seven individuals
    in connection with Lapsus$" — operational end of the spree. All three source
    published_on verified against bylines/metadata (MSTIC 2022-03-22; CSRB 2023-08-10;
    Okta 2022-04-19).

    [d] DOCTRINE_LINKS — empty, correct. Criminal extortion crew; CSRB explicitly rules
    out a nation-state nexus. No attacker/defender/victim doctrine applies.

    [e] ATTRIBUTION_LEVEL — added named-actor (LAPSUS$/DEV-0537 is a named group; core
    members later arrested/charged in the UK, but the attribution here is group-level).

    [f] ACTOR_ID — criminal/lapsus resolves to atlas/actors/criminal/lapsus.yaml
    (id: criminal/lapsus; aliases include DEV-0537, Storm-0875, Strawberry Tempest).

