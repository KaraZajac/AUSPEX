id: 2022-02/lapsus-microsoft-okta-samsung
name: Lapsus$ NVIDIA, Samsung, Microsoft, Okta intrusion spree
start_date: 2022-02-23
disclosure_date: 2022-02-25
end_date: 2022-03-22
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Lapsus$ public Telegram-channel-mediated intrusion spree
  February–March 2022. NVIDIA (Feb 23 disclosed, 1TB exfiltrated
  including signing certificates and DLSS source); Samsung
  (Mar 4, 190GB Galaxy bootloader / TEEGRIS source); Vodafone
  Portugal (Feb 7 service outage); Microsoft (Mar 20, Bing /
  Cortana / Bing Maps source — Microsoft confirmed limited Azure
  DevOps repo access via a single compromised employee account);
  Okta (Mar 22, ~366 customer tenants potentially affected via
  Sitel Group third-party support contractor compromise that
  occurred Jan 21–22 2022).
false_flag_risk: none
summary: |
  Canonical case for the Microsoft / Okta lessons-learned cycle:
  third-party support-contractor compromise as identity-provider
  blast-radius. Cyber Safety Review Board (CSRB) commissioned to
  produce a public report (released Aug 10 2023). The Okta
  incident specifically catalyzed industry adoption of session-
  binding (DPoP), tightened help-desk MFA-reset procedures, and
  CIS / NIST guidance on contractor identity-pivot risks.
