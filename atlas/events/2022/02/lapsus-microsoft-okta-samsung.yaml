id: 2022-02/lapsus-microsoft-okta-samsung
name: Lapsus$ NVIDIA, Samsung, Microsoft, Okta intrusion & extortion spree
start_date: 2022-01-16
disclosure_date: 2022-02-25
end_date: 2022-03-24
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: valid-creds  # creds obtained via phone social-engineering, SIM-swap, MFA-fatigue & paid/recruited insiders (corpus has no social-engineering enum); Okta strand = third-party/BPO (Sitel) compromise
outcome_summary: |
  Early-2022 LAPSUS$ (Microsoft: DEV-0537) multi-victim intrusion,
  data-theft and extortion spree, coordinated and publicized via the
  group's Telegram channel. Earliest in-scope intrusion was the Okta
  compromise: the actor controlled a Sitel (third-party customer-support
  BPO) support engineer's machine over a Jan 16–21 2022 window — "25
  consecutive minutes on January 21, 2022" of active control. Public
  disclosures then cascaded Feb–Mar 2022: NVIDIA (LAPSUS$ claimed ~1 TB,
  released ~150 GB, including two code-signing certificates later abused
  to sign malware); a technology company's ~190 GB source-code leak
  published via torrent (Samsung, per CSRB's cited reporting); Microsoft
  (~37 GB of source code across 250+ projects leaked to LAPSUS$'s Telegram
  — Microsoft confirmed "a single account had been compromised, granting
  limited access" and "No customer code or data was involved"); and
  Vodafone (investigated LAPSUS$ source-code-theft claims). Okta's final
  assessment (Apr 19 2022) sharply narrowed the blast radius: the worst
  case was 366 customer tenants potentially reachable by the Sitel
  engineer's account (the figure Okta first shared Mar 22 2022), but the
  actor actually accessed only TWO customer tenants (via the SuperUser
  app) and could not reset MFA/passwords, impersonate, or authenticate to
  Okta accounts.
false_flag_risk: none  # LAPSUS$ loudly self-claimed each breach on its public Telegram channel
summary: |
  Canonical case for the identity-provider / third-party-support blast-radius
  lessons-learned cycle. The US Cyber Safety Review Board (CSRB) reviewed the
  LAPSUS$ campaign and published its public report on Aug 10 2023, framing
  LAPSUS$ as a loosely-organized, largely juvenile extortion crew that
  "exploited systemic ecosystem weaknesses to infiltrate and extort
  organizations" — social engineering, SIM-swap, MFA-fatigue, and
  paid/recruited insiders — rather than advanced tooling. The Okta/Sitel
  incident sharpened industry emphasis on phishing-resistant FIDO2 /
  passwordless MFA, tightened help-desk identity verification for
  credential/MFA resets, and NIST/CISA guidance on third-party /
  business-process-outsourcer (BPO) identity-pivot (supply-chain) risk. The
  City of London Police arrested seven individuals connected to LAPSUS$ on
  Mar 24 2022.
