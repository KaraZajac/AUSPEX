id: 2022-02/russian-carding-crackdown
name: Russian FSB pre-invasion carding-marketplace crackdown
start_date: 2022-01-14
disclosure_date: 2022-02-22
end_date: 2022-02-24
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  Brief Russian FSB enforcement push against Russian-speaking
  carding marketplaces (UniCC, Trump's Dumps, Ferum Shop,
  Sky-Fraud) in late January and February 2022, paired with
  the January 14 2022 arrest of 14 alleged REvil affiliates
  including Igor Olegovich Garshin. Most observers read the
  push as Russian diplomatic signaling to the United States
  in the weeks before the Russian invasion of Ukraine. The
  enforcement activity ended abruptly when the invasion began
  on February 24 2022 and Russian-state cooperation with US
  cybercrime enforcement collapsed.
false_flag_risk: none
summary: |
  The pre-invasion carding crackdown is the canonical case
  of Russian-state cooperation with Western cybercrime
  enforcement, immediately preceding the multi-year freeze
  that followed the February 2022 invasion. AUSPEX
  classifies as criminal-baseline.
