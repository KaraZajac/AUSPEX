  notes: |
    Audited against three raw-snapshotted sources. Suspected phantom —
    NOT a phantom: the Krebs URL resolves to the real article "Russian
    Govt. Continues Carding Shop Crackdown" (75,255 bytes, sha256
    b7196526…ba890394), body matches. Two corroborating sources added
    (badrabbit re-source) to carry the two legs Krebs does not.

    [a] FACTS — CORRECTED. Krebs verbatim: "On Feb. 7 and 8, the domains
    for the carding shops Trump's Dumps, Ferum Shop, Sky-Fraud and UAS
    were seized by Department K, a division of the Ministry of Internal
    Affairs of the Russian Federation" and "another major and venerated
    carding shop [UniCC] that was seized by Dept. K in January"; "six
    men … charged with 'the illegal circulation of means of payment.'"
    So the carding seizures are MVD Department K, NOT the FSB — the old
    record's "FSB carding crackdown" framing was wrong and is fixed
    (name, summary, attributing_org). STRIPPED fabrication: the old
    outcome_summary named "Igor Olegovich Garshin" as one of the 14
    REvil arrestees — that name appears in NONE of the three sources;
    removed. The 14-affiliate REvil raid is now source-carried by Al
    Jazeera (9212cb27…de5598a5, 184,073 bytes): FSB "dismantled …
    REvil at the request of the United States … raids on 25 addresses
    that swept up 14 people," naming Roman Muromsky and Andrei Bessonov
    — used in place of the fabricated name. start_date 2022-01-14 = the
    FSB raid (Al Jazeera pub 15 Jan, FSB statement "on Friday" = Jan 14).
    The "curiously timed / mostly-US-victim" framing is source-carried
    (Krebs quoting Gemini's Alforov: "most unusual for the Russians to
    go after carding sites that aren't selling data stolen from Russian
    citizens").

    [b] ATTRIBUTION — null actor (counter-action). Corrected
    attributing_org to distinguish Dept K/MVD (carding) from FSB (REvil);
    confidence high (three independent outlets + TASS/FSB statements
    corroborate the events occurred); auspex_assessment concur.
    attribution_level set null (no perpetrator to specify).

    [c] DATES — start_date 2022-01-14 (FSB REvil raid, per Al Jazeera);
    disclosure_date 2022-02-22 = Krebs publication (verified in-page);
    end_date 2022-02-24 = the invasion, the boundary after which
    cooperation stalled, now source-carried by CyberScoop (2025-06-23,
    8893014c…5eb7dd26, 108,763 bytes): "cooperation between Washington
    and Moscow later stalled amid heightened tensions over Russia's war
    with Ukraine. As a result, charges relating to computer intrusions …
    did not progress further in Russian courts." Source published_on
    dates fixed/added on all three records.

    [d] DOCTRINE_LINKS — [] retained. This is a criminal-baseline
    counter-action; no Russian doctrine is asserted by any source and
    none is invented. Correct empty.

    [e] ATTRIBUTION_LEVEL — null (counter-action, no actor).

    [f] ACTOR_ID — null; resolves trivially. No actor file touched.
    (criminal/revil.yaml exists but is not cited here, correctly — this
    event documents the enforcement action, not REvil's operations.)

    incident_type changed [disruption] -> [law-enforcement] to match the
    counter-action convention (meta incident_type + null actor).

    Residual: the precise Feb 7–8 seizure dates and the Jan UniCC seizure
    are Krebs-only (secondary); the REvil individuals and US-request
    framing are Al Jazeera/Reuters. No first-party FSB/MVD/TASS primary
    was snapshotted, but the three secondaries fully corroborate every
    retained claim.
