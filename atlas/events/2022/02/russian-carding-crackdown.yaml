id: 2022-02/russian-carding-crackdown
name: Russian pre-invasion carding-marketplace crackdown (Dept. K / MVD, with the FSB REvil raid)
start_date: 2022-01-14
disclosure_date: 2022-02-22
end_date: 2022-02-24
incident_type:
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  Brief Russian enforcement push against Russian-speaking
  carding marketplaces in January–February 2022. Department K,
  the computer-crimes division of the Russian Ministry of
  Internal Affairs (MVD), seized the domains of Trump's Dumps,
  Ferum Shop, Sky-Fraud and UAS on February 7–8 2022 (retrofitting
  them with a "Which one of you is next?" message) and had earlier
  seized UniCC in January; six men were charged with "illegal
  circulation of means of payment." The wave followed the FSB's
  January 14 2022 raid on the REvil ransomware gang — 25 addresses,
  14 people detained (among them Roman Muromsky and Andrei
  Bessonov) — which the FSB said was carried out "at the request of
  the United States." Krebs and Gemini Advisory note the closures
  were curiously timed and unusual: the targeted shops sold data
  stolen overwhelmingly from US (not Russian) cardholders. This
  short-lived US–Russia cooperation stalled once the February 24
  2022 invasion of Ukraine began; charges over computer intrusions
  did not progress in Russian courts, and prosecutions narrowed to
  bank-card offences (CyberScoop, 2025).
false_flag_risk: none
summary: |
  The pre-invasion carding crackdown is the canonical case of
  short-lived Russian-state cooperation with Western cybercrime
  enforcement immediately preceding the multi-year freeze that
  followed the February 2022 invasion of Ukraine. It is modeled
  here as a counter-action (Russian law enforcement acting against
  cybercriminals), with no perpetrator actor. AUSPEX classifies it
  as criminal-baseline; the enforcement was split across two
  bodies — Department K / MVD (the carding-shop seizures) and the
  FSB (the REvil raid).
