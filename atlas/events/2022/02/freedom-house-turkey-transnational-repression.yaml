        transnational repression since 2014" + Turkey "the world's second
        most prolific perpetrator" + top group "China, Turkey, Russia, Egypt
        and Tajikistan" + "854 direct, physical incidents" in database —
        verbatim in scf/2023_132 (sha256 ead74fdd1c93eb6599d993aea740b1557f2389b467bac50c2433023f1421a198),
        quoting Freedom House "Still Not Safe: Transnational Repression in
        2022" (April 2023).
      - "Freedom House catalogued 58 of these renditions since 2014. No other
        perpetrator state was found to have conducted such a large number of
        renditions"; officials "openly claim credit for the kidnapping
        offensive against the Gülen movement, and praise the role of the MİT";
        targets "affiliated with the PKK, but others are Gülen movement
        members, members of minor leftist groups"; "at least 31 different host
        countries" since July 2016 coup — verbatim in
