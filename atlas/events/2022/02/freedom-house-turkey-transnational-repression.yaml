id: 2022-02/freedom-house-turkey-transnational-repression
name: Freedom House documents Turkish transnational repression — physical operations and digital surveillance
start_date: 2014-01-01
disclosure_date: 2022-02-01
end_date: 2021-12-31
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Freedom House's 2022 "Out of Sight, Not Out of Reach"
  transnational-repression report documented 132 incidents of
  direct physical Turkish-state transnational repression since
  2014 — assassinations, abductions, deportations under
  coercion, and rendition cases targeting primarily Gülenist
  movement figures and Kurdish opposition activists abroad.
  The report also documented the surveillance / intimidation /
  family-pressure adjuncts to the physical operations and
  included Turkey in a small set of states characterized as
  the most prolific perpetrators of transnational repression
  worldwide. The Stockholm Center for Freedom's parallel
  annual reporting (2021 and later) provides per-case
  documentation of the digital-surveillance dimension where
  victims have publicly attested to phishing, account-
  compromise, or in-person device-seizure operations.
false_flag_risk: none
summary: |
  Documentary context event anchoring the
  counter-Gülen-Kurdish-surveillance doctrine in the
  well-documented non-cyber transnational-repression record.
  Provides the strategic frame that makes Sea Turtle's and
  PROMETHIUM's diaspora-equity victim selection legible as
  state-directed rather than as opportunistic vendor mis-
  attribution. The cyber dimension is documented less
  granularly than the physical dimension in these reports,
  but the operational pattern continuity is clear.
