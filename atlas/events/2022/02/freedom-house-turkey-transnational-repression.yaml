      STRIPPED as unsupported / embellished:
      - "assassinations" among the 132 — Freedom House does NOT attribute
        assassinations or abductions to Turkey in the origin case study; its
        Turkey tactic set is rendition, digital threat, family intimidation,
        Interpol abuse, mobility controls. Removed.
      - The entire prior sentence claiming the Stockholm Center for Freedom
