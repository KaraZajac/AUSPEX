        beyond Freedom House's undetailed "digital threat" tactic label.
      - Prior title/headline "physical operations and digital surveillance"
        overstated the cyber dimension; retitled to foreground the physical
        record. Summary reworded to state honestly that the cyber-surveillance
        mandate is inferred separately, not carried by these sources.

