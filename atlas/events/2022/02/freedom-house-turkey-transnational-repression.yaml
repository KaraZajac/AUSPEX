id: 2022-02/freedom-house-turkey-transnational-repression
name: Freedom House documents Turkey as second-most-prolific transnational-repression state — 132 physical incidents since 2014 (Gülenist/Kurdish rendition campaign)
start_date: 2014-01-01
disclosure_date: 2023-04-06
end_date: 2022-12-31
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Freedom House's transnational-repression database recorded 132
  incidents of direct, physical Turkish-state transnational
  repression since 2014 — 15 percent of the 854 physical incidents
  in the database, making Turkey the world's second-most-prolific
  perpetrator after China (the leading group being China, Turkey,
  Russia, Egypt, and Tajikistan), per the April-2023 update "Still
  Not Safe: Transnational Repression in 2022." The dominant Turkish
  tactic is rendition: Freedom House catalogued 58 renditions since
  2014 and found "No other perpetrator state ... conducted such a
  large number of renditions, from so many host countries." Turkish
  officials "openly claim credit for the kidnapping offensive
  against the Gülen movement" and praise the MİT intelligence
  service's role; targets are Gülen-movement figures, persons
  "affiliated with the PKK" / supporters of Kurdish autonomy, and
  minor leftist groups, pursued across at least 31 host countries
  since the July 2016 coup attempt. Freedom House's Turkey
  origin-country case study lists Turkey's tactic set as rendition,
  digital threat, family intimidation, Interpol abuse, and mobility
  controls; the Stockholm Center for Freedom's parallel reporting
  corroborates the physical record (per UN experts, "more than 100"
  nationals forcibly transferred since July 2016). NB: these
  transnational-repression reports document the physical repression
  and Interpol/mobility coercion — they do NOT document specific
  cyber operations against these victims beyond Freedom House's
  undetailed "digital threat" tactic label. The cyber dimension is
  carried by separate technical reporting (Sea Turtle / MARBLED
  DUST), not by this documentary record.
false_flag_risk: none
summary: |
  Documentary context event. It anchors the Turkish
  counter-Gülenist / counter-Kurdish diaspora doctrine in the
  well-documented NON-cyber transnational-repression record
  (Freedom House + Stockholm Center for Freedom) rather than
  asserting a cyber claim these reports do not make. The value of
  the frame is that it establishes the state-directed intent and
  victim selection — Gülenist and Kurdish diaspora — that make the
  atlas's Turkish-nexus cyber operations (Sea Turtle / MARBLED DUST
  DNS hijacking) legible as strategically motivated rather than
  opportunistic. The physical repression purpose is attested in
  substance (Turkish officials openly claim credit for the
  "kidnapping offensive against the Gülen movement"); the
  cyber-surveillance mandate implied by the doctrine slug is not
  attested by these sources and is inferred separately.
