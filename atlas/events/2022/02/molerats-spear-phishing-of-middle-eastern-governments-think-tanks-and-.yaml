id: 2022-02/molerats-spear-phishing-of-middle-eastern-governments-think-tanks-and-
name: "Molerats spear-phishing of Middle Eastern governments, think tanks, and a state airline"
start_date: 2021-11-01
disclosure_date: 2022-02-08
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  In late 2021 (a November 2021 campaign), the Palestinian-aligned threat actor Molerats (Proofpoint's TA402 / Gaza Cybergang) ran a geofenced spear-phishing operation against Middle Eastern governments, foreign-policy think tanks, and a state-affiliated airline, using URL redirects to legitimate sites and a Quora masquerade to deliver a remote-access trojan (Proofpoint's NimbleMamba implant). Proofpoint disclosed the activity in February 2022; the campaign is recorded by CFR's Cyber Operations Tracker citing that Proofpoint report.
attributions:
  - actor_id: ps/unscoped/molerats
    attributing_org: "CFR Cyber Operations Tracker (citing Proofpoint)"
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-02-01
    attribution_source_id: cfr/2022-02_molerats-spear-phishing-of-middle-easter
    notes: "named-actor: CFR/Proofpoint name a specific tracked group (Molerats / TA402), so the attribution is named-actor-specific even though the NATION sponsorship is only suspected. Confidence capped at moderate: CFR labels it 'Suspected state sponsor: Palestine, State of' / 'Believed to be the work of Palestine's government', but the cited Proofpoint primary only hedges to 'a likely Palestinian-aligned' APT 'believed to be operating in the interest of the Palestinian Territories' (no hard government attribution) — hence concur-with-caveat: CFR's govt framing overstates the underlying primary, and the Palestinian nexus is naming-convention/interest-alignment-derived, not established service/state tasking."
doctrine_links: []  # No doctrine link: the corpus has no Palestinian (ps) cyber-doctrine taxonomy to anchor one (confirmed 2026-06-24), and no cited source states a strategic purpose beyond generic Middle-East regional espionage. Left empty by design, not pending.
targets:
  - target_id: sectors/government
    role: primary
  - target_id: sectors/civil-society/think-tank
    role: primary
  - target_id: sectors/transport/aviation
    role: primary
sources:
