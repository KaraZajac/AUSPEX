qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-24
  level: full
  notes: "Audited vs the sole cited source CFR Cyber Operations Tracker (raw snapshot + sha256 captured); CFR cites one reference, Proofpoint 'Ugg Boots 4 Sale' (2022-02-08), which I also read to verify CFR's relay was honest. FACTS ✓: targeting (ME governments + foreign-policy think tanks + state-affiliated airline) and TTPs (geofencing, URL redirects, Quora masquerade, RAT) match both sources. DATE CORRECTION: start_date was 2022-02-01 (the CFR/Proofpoint report date); Proofpoint dates the activity to 'late 2021' / a 'November 2021 campaign', so start_date -> 2021-11-01 and disclosure_date -> 2022-02-08. ATTRIBUTION: set attribution_level=named-actor (Molerats/TA402 is a specific tracked group) but kept attributing_org_confidence=moderate and changed auspex_assessment concur -> concur-with-caveat because CFR's 'Suspected state sponsor: Palestine, State of' / 'work of Palestine's government' framing OVERSTATES the cited Proofpoint primary, which only says 'a likely Palestinian-aligned' APT 'operating in the interest of the Palestinian Territories' (no hard govt attribution; Proofpoint claims no high confidence on the nation tie). DOCTRINE: doctrine_links intentionally [] — no ps cyber-doctrine exists in the corpus and no source states a strategic purpose; resolved the stale TODO. ACTOR ps/unscoped/molerats: CONSISTENT — actor record's 'Palestinian nexus is naming-convention-derived, not hard govt attribution; service unestablished -> unscoped' matches Proofpoint's hedged language; not re-placed. Targets are the VICTIMS (ME, unspecified countries), not the Palestinian actor — left without country since neither source names specific victim states."
