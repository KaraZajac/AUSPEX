id: 2022-02/aa22-054a-cyclops-blink-sandworm
name: AA22-054A — joint US-UK attribution of Cyclops Blink botnet to Sandworm (GRU Unit 74455)
start_date: 2019-06-01  # earliest documented Cyclops Blink activity per the advisory
disclosure_date: 2022-02-23
end_date: 2022-04-06  # US-led MEDUSA-style sinkholing of the botnet completed by 6 April 2022
incident_type:
  - attribution-publication
  - intrusion
initial_vector: n-day
outcome_summary: |
  Joint CISA / FBI / NSA / NCSC-UK technical advisory AA22-054A
  attributed the Cyclops Blink botnet — targeting WatchGuard
  Firebox network-security appliances and ASUS consumer routers —
  to "the Sandworm actor, which the UK Government previously
  linked to the GRU." NCSC published a parallel statement the
  same day. The botnet was sinkholed by US DOJ / FBI court
  action in April 2022, one of the earliest documented hunt-
  forward botnet disruptions of the Ukraine war period.
false_flag_risk: none
summary: |
  Doctrinally one of the most consequential joint NCSC-CISA
  attributions: published 23 February 2022, the day before the
  Russian invasion of Ukraine. Frames the elevated-threat
  posture for the invasion window and signals UK government
  willingness to attribute GRU operations publicly at high
  tempo into the wartime period.

  Operationally Cyclops Blink succeeded the earlier VPNFilter
  Sandworm botnet (publicly attributed in May-June 2018). The
  February 2022 advisory is the first time NCSC co-signed a US
  technical advisory naming Sandworm specifically; the
  predecessor public attribution of NotPetya (UK FCDO, February
  2018) was via diplomatic statement rather than technical
  document.

  AUSPEX tags the doctrine primarily to NCS 2022 Pillar 5
  (detect-disrupt-deter), reflecting the elevated wartime tempo,
  and secondarily to NCS 2016 deter (the operational backbone
  of the joint-attribution modality predates the strategy
  transition).
