id: 2022-02/aa22-054a-cyclops-blink-sandworm
name: AA22-054A — joint US-UK advisory attributing the Cyclops Blink botnet to Sandworm (GRU Unit 74455 / GTsST)
start_date: 2019-06-01  # advisory: Cyclops Blink "deployed since at least June 2019"
disclosure_date: 2022-02-23  # AA22-054A + parallel NCSC statement both published 23 Feb 2022
end_date: null  # botnet still active at disclosure; the April-2022 US court-authorized disruption is a SEPARATE event (not carried by these Feb-23 sources) — see qc FLAG
incident_type:
  - documentary   # the joint CISA/FBI/NSA/NCSC technical advisory (AA22-054A) + parallel NCSC statement
  - intrusion     # the Cyclops Blink botnet compromise of network appliances
initial_vector: n-day  # advisory maps initial access to "External Remote Services" (T1133) — "exploiting an externally available service"; no CVE named. Only WatchGuard devices with remote management exposed to the internet were infected.
false_flag_risk: none
outcome_summary: |
  Joint CISA / FBI / NSA / NCSC-UK technical advisory AA22-054A
  ("New Sandworm Malware Cyclops Blink Replaces VPNFilter"),
  published 23 February 2022, identified the Cyclops Blink botnet —
  a modular malware framework the advisory states had been "deployed
  since at least June 2019" and had "so far primarily" been deployed
  to WatchGuard firewall devices — and reaffirmed the prior US-UK
  attribution of the Sandworm actor to the GRU's Main Centre for
  Special Technologies (GTsST, i.e. Unit 74455). A parallel NCSC
  statement published the same day carried the same attribution. The
  advisory framed Cyclops Blink as the replacement framework for
  VPNFilter — the earlier Sandworm botnet exposed by Cisco Talos and
  the US DOJ in May 2018. Trend Micro subsequently reported (17 March
  2022) that Cyclops Blink also infected ASUS routers. The advisory's
  primary content is malware detection and mitigation guidance plus
  Sandworm TTPs.
summary: |
  AA22-054A is a joint UK-US technical malware advisory on the Cyclops
  Blink botnet, co-authored by the NCSC (UK) and CISA, the FBI and NSA
  (US) and published 23 February 2022 — the day before Russia's
  invasion of Ukraine. The calendar proximity should NOT be read as a
  wartime-tempo or elevated-posture signal: the NCSC's parallel
  statement expressly cautioned that "this is a routine advisory and
  not directly linked to the situation in Ukraine."

  The advisory reaffirms (rather than newly makes) the attribution: it
  states that "the NCSC, CISA, and the FBI have previously attributed
  the Sandworm actor to the ... GRU's Main Centre for Special
  Technologies (GTsST)" and that "CISA, FBI, and NSA agree with this
  attribution." It identifies Cyclops Blink as the successor framework
  to VPNFilter (exposed 2018), reports the botnet as "so far primarily"
  targeting WatchGuard firewall devices whose remote-management
  interfaces were exposed to the internet, and supplies detection and
  mitigation guidance.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: CISA + FBI + NSA + NCSC-UK
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2022-02-23
    attribution_source_id: cisa/2022-02-23_aa22-054a-cyclops-blink
    notes: |
      AA22-054A reaffirms a prior attribution rather than making a new
      one: "The NCSC, CISA, and the FBI have previously attributed the
      Sandworm actor to the Russian General Staff Main Intelligence
      Directorate's ... Main Centre for Special Technologies (GTsST),"
      and "CISA, FBI, and NSA agree with this attribution." GTsST is
      GRU Unit 74455 — attribution_level = named-unit (the advisory
      names the unit by its GTsST designation, not the number 74455).
      The parallel NCSC statement says "Sandworm, also known as Voodoo
      Bear, has previously been attributed to Russia's GRU."
      attributing_org_confidence high (four-agency joint advisory with
      explicit agreement); auspex concur.
