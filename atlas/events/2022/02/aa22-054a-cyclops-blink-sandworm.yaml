  notes: |
    Audited vs RAW (full 6-point + phantom triage). DIRECTIONALITY confirmed and preserved:
    ATTACKER = Russia / Sandworm (GRU GTsST/Unit 74455); VICTIM = compromised network
    appliances (sectors/ict/networking). Not inverted. The event models the joint advisory
    (documentary) + the botnet it describes (intrusion).

    SOURCES snapshotted (all live HTTP 200, all REAL — none phantom):
    • cisa/2022-02-23_aa22-054a-cyclops-blink — sha256 f7cfec41…5ca67, 69,530 bytes. Live
      cisa.gov URL 200; title "New Sandworm Malware Cyclops Blink Replaces VPNFilter | CISA."
      Revisions section reads ONLY "February 23, 2022: Initial Version."
    • ncsc-uk/2022-02-23_cyclops-blink-sandworm — sha256 40f461f6…eeccc, 134,972 bytes. Live
      ncsc.gov.uk URL 200; article body server-rendered; "Publish date 23 February 2022."
    • trendmicro/2022-03-17_cyclops-blink-asus-routers — sha256 ddad4de4…1fb69, 104,095 bytes.
      NEW source created + snapshotted this audit (badrabbit/re-source model) to carry the ASUS
      claim, which AA22-054A does NOT support (see [a]). Title "Cyclops Blink Sets Sights on
      Asus Routers | Trend Micro (US)"; dated 2022-03-17.

    [a] FACTS — multiple corrections:
      (i) ASUS RE-SOURCED. The event asserted AA22-054A targeted "WatchGuard Firebox ... and
      ASUS consumer routers." The cited CISA advisory (Initial Version, 23 Feb 2022) is
      WatchGuard-ONLY — zero "ASUS": "The actor has so far primarily deployed Cyclops Blink to
      WatchGuard devices." The ASUS footprint is a LATER Trend Micro finding (17 Mar 2022,
      "targets ASUS routers ... list of more than 150 ... C&C servers"), not part of the
      advisory. Reworded so ASUS is attributed to Trend Micro (new source), not to AA22-054A;
      device claim corrected to "WatchGuard firewall devices" (the advisory says "WatchGuard
      devices"/"WatchGuard firewall devices," never "Firebox").
      (ii) APRIL-2022 DISRUPTION STRIPPED (conflation + unsourced + anachronism). Event claimed
      "sinkholed by US DOJ/FBI court action in April 2022," "MEDUSA-style sinkholing ... completed
      by 6 April 2022," "one of the earliest documented hunt-forward botnet disruptions." NONE of
      this is in either Feb-23 source (CISA Revisions = Initial Version only). "MEDUSA-style" is
      anachronistic/wrong — Operation MEDUSA was the FBI's MAY-2023 Snake/Turla takedown, not the
      April-2022 Cyclops Blink op (which was a court-authorized removal, not a sinkhole). Per the
      task NB the April-2022 disruption is a SEPARATE event → removed here; end_date → null. FLAG:
      no separate Cyclops-Blink-disruption event exists in the corpus yet — orchestrator/Kara
      should create the April-2022 (DOJ 6 Apr 2022) takedown as its own event.
      (iii) WARTIME-POSTURE THESIS REFUTED. Event summary claimed the advisory "frames the
      elevated-threat posture for the invasion window" / "high tempo into the wartime period." The
      NCSC source affirmatively rebuts this: "N.B This is a routine advisory and not directly
      linked to the situation in Ukraine." Stripped the elevated-tempo/pre-invasion framing from
      summary, outcome_summary, doctrine reasoning, and both cited source records; kept only the
      factual calendar note (published 23 Feb 2022, day before the invasion) with the NCSC caveat.
      (iv) NCSC MISQUOTE FIXED. Event quoted NCSC as: "the Sandworm actor, which the UK Government
      previously linked to the GRU." That phrasing appears in NEITHER source. Actual NCSC text:
      "Sandworm, also known as Voodoo Bear, has previously been attributed to Russia's GRU." The
      quoted wording is a paraphrase of the CISA line ("The Sandworm actor, which the United
      Kingdom and the United States have previously attributed to the Russian GRU"). Replaced with
      verbatim source text, correctly attributed.
      (v) VPNFilter-successor VERIFIED: CISA + NCSC both say Cyclops Blink "appears to be a
      replacement for the VPNFilter malware exposed in 2018"; CISA: DOJ/Cisco Talos exposed
      VPNFilter in "May 2018." Tightened event's loose "May-June 2018" → "May 2018."
      (vi) Stripped unsourced superlatives ("first time NCSC co-signed a US technical advisory
      naming Sandworm"; the NotPetya/FCDO-2018 attribution-modality digression) — carried by
      neither cited source. Removed internal doctrine-meta paragraph from summary.

    [b] ATTRIBUTION — actor ru/gru/74455/sandworm KEPT and firm. Advisory attributes Sandworm to
    "GRU's ... Main Centre for Special Technologies (GTsST)" = Unit 74455, and CISA/FBI/NSA "agree
    with this attribution." attributing_org "CISA + FBI + NSA + NCSC-UK" correct (four co-authors).
    attributing_org_confidence high (kept — four-agency joint, explicit agreement); auspex concur
    (kept). Reframed notes to flag the advisory REAFFIRMS a prior attribution (not a fresh one).

    [c] DATES — start_date 2019-06-01 SUPPORTED ("deployed since at least June 2019"). disclosure
    2022-02-23 correct (CISA "February 23, 2022: Initial Version"; NCSC "Publish date 23 February
    2022"). end_date 2022-04-06 REMOVED → null (April disruption is a separate, unsourced-here
    event). Trend Micro published_on 2022-03-17 verified in-body.

    [d] DOCTRINE — both links DOWNGRADED from attested.
      • uk/ncs-2022/detect-disrupt-deter: attested → strongly_inferred. Neither source states a
        detect/disrupt/deter GOAL (NCSC: "routine advisory ... not ... linked to ... Ukraine"),
        so attestation fails; attesting_source_id → null. Pillar 5 kept because its summary
        expressly lists "joint attribution announcements." perspective defender-response (UK
        doctrine on the UK/US defensive publication). Added inference_basis {signals, ruled_out}.
      • uk/ncs-2016/deter: attested → plausible. The event (Feb 2022) POSTDATES the NCS-2022
        transition (15 Dec 2021), so NCS 2016 is superseded; retained only as a continuity/lineage
        marker, attesting_source_id → null, inference_basis.alternatives added.
      FLAG (doctrine file, not edited): uk/ncs-2022 has an internal tension — Pillar 5's summary
      lists "joint attribution announcements," but its cyber_relevance note says "joint Five Eyes
      attribution events tag to Pillar 4 (global leadership)." Kara may prefer Pillar 4 here.

    [e] ATTRIBUTION_LEVEL — was MISSING; added named-unit (advisory names GTsST = GRU Unit 74455).

    [f] ACTOR_ID — ru/gru/74455/sandworm resolves to atlas/actors/ru/sandworm.yaml (id field
