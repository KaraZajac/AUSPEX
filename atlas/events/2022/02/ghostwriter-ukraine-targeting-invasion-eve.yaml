id: 2022-02/ghostwriter-ukraine-targeting-invasion-eve
name: Ghostwriter/UNC1151 spearphishing of Ukrainian military personnel on the eve of the Russian invasion
start_date: 2022-02-15  # APPROXIMATE — no source pins the onset; CERT-UA (25 Feb), Meta (27 Feb) and Google TAG (7 Mar) describe the activity only as "recently"/"in the past few days"/"over the past week", i.e. the days-to-weeks preceding the 24 Feb invasion
disclosure_date: 2022-02-25  # CERT-UA's first public warning (via BleepingComputer)
end_date: 2022-03-08  # last cited disclosure of the same invasion-window campaign (Cluster25)
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  In the window bracketing the 24 February 2022 Russian full-scale
  invasion, Ghostwriter/UNC1151 ran credential-spearphishing against
  Ukrainian (and Polish) military and government targets. CERT-UA
  warned on 25 February 2022 of "mass phishing emails ... targeting
  private 'i.ua' and 'meta.ua' accounts of Ukrainian military
  personnel and related individuals," compromised accounts then being
  read over IMAP and used to phish the victims' contacts; it named
  "the Minsk-based group 'UNC1151'" whose "members are officers of the
  Ministry of Defence of the Republic of Belarus." Meta (27 February)
  reported "increased targeting of people in Ukraine, including
  Ukrainian military and public figures by Ghostwriter." Google TAG
  (7 March) reported "Ghostwriter/UNC1151, a Belarusian threat actor,
  has conducted credential phishing campaigns over the past week
  against Polish and Ukrainian government and military organizations."
  Cluster25/DuskRise (8 March) documented UNC1151/Ghostwriter adopting
  MicroBackdoor implant variants in these Ukraine operations.
false_flag_risk: none
summary: |
  Ghostwriter/UNC1151's most operationally consequential targeting of
  Ukraine on record — a credential-theft-and-implant push directly
  bracketing the Russian full-scale invasion, hitting the private
  webmail of Ukrainian armed-forces personnel plus Ukrainian and Polish
  government and military organisations. Belarusian-aligned cyber
  operations integrated into the Russian-led Ukraine theatre, the
  substance of the Union State cyber-integration pillar. Belarus is
  named by CERT-UA (UNC1151 = officers of the Belarusian Ministry of
  Defence), by Google TAG ("a Belarusian threat actor") and by
  Cluster25 ("linked to the Belarusian government"); Meta named only
  "Ghostwriter" and asserted no nation. NB the FancyBear/APT28 ukr.net
  phishing described in the same Google TAG post is a SEPARATE Russian
  (GRU) actor, not this event. The standing Ghostwriter Belarus-vs-
  Russia nation contest (Germany/EU Council named Russia for the wider
  Ghostwriter campaign) is flagged on the actor record; this event's
  four sources uniformly name Belarus.
