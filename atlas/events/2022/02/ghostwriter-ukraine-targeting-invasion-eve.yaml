id: 2022-02/ghostwriter-ukraine-targeting-invasion-eve
name: Ghostwriter targeting of Ukrainian military personnel on the eve of Russian invasion
start_date: 2022-02-01
disclosure_date: 2022-02-25
end_date: 2022-02-24
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  In the days preceding and surrounding the February 24, 2022
  Russian full-scale invasion of Ukraine, Google's Threat
  Analysis Group (TAG) and Meta (Facebook) documented Ghostwriter
  / UNC1151 targeting Ukrainian military personnel and adjacent
  civilian-relevant accounts (Polish-language webmail accounts
  belonging to Ukrainians in Poland, Polish service personnel
  associated with refugee-management roles). Both vendors named
  Belarusian-aligned operations explicitly.
false_flag_risk: none
summary: |
  Most operationally consequential Ghostwriter tempo elevation
  on record — directly bracketing the Russian invasion. Demonstrates
  Belarusian-aligned cyber operations integrated into the
  Russian-led Ukraine theater, supporting the Union State cyber-
  integration doctrinal pillar. Both Google TAG and Meta provided
  rare same-week public attributions of Belarusian-state-aligned
  operations.
attributions:
