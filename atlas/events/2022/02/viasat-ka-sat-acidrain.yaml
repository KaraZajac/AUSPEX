id: 2022-02/viasat-ka-sat-acidrain
name: Viasat KA-SAT / AcidRain (invasion-day satellite disruption)
start_date: 2022-02-24
disclosure_date: 2022-03-10
end_date: 2022-02-24
incident_type:
  - destructive
  - disruption
  - wiper
initial_vector: valid-creds
outcome_summary: |
  AcidRain wiper pushed via Viasat's management network bricked
  tens of thousands of consumer modems serving Ukrainian military
  C2 and European broadband customers. Major spillover effects
  including collateral wind-turbine outages in Germany. Degraded
  Ukrainian military C2 in the opening hours of the invasion.
false_flag_risk: none
campaign_id: hermetic-wave-feb-2022
summary: |
  EU Council, UK FCDO, US State, and Five Eyes partners issued a
  coordinated joint attribution to Russia in May 2022, explicitly
  naming the invasion-support objective. SentinelLabs technical
  analysis (Mar 2022) traced AcidRain tooling to GRU/Sandworm by
  linking shared development idioms with the prior VPNFilter
  router implant. AcidRain is a MIPS ELF wiper for SurfBeam2 and
  similar satellite modems that overwrites all writable flash and
  storage paths (/dev/mtd*, /dev/mmcblk*, /dev/sd*) with bytes and
  reboots, bricking the modem until physical replacement. Initial
  access was via valid credentials abused at Viasat's KA-SAT
  management plane (operated by Skylogic), pivoting from a
  misconfigured VPN appliance and pushing the wiper over the
  legitimate modem-management channel to tens of thousands of
  consumer modems serving Ukrainian military C2 and European
  broadband customers.
