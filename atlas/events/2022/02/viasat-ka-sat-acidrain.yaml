    [a] FACTS — corrected several over-claims:
      * "tens of thousands of consumer modems" was carried by NEITHER
        cited source. Viasat's overview carries the true scale, now cited:
        "the cyber-attack did impact several thousand customers located in
        Ukraine and tens of thousands of other fixed broadband customers
        across Europe." Reworded outcome/summary to match.
      * "bricking the modem until physical replacement" overstated
        permanence. S1: after wiping "the device is rebooted ... rendered
        inoperable"; Viasat: modems "not permanently unusable" (factory
        reset or replacement). Softened accordingly.
      * "serving Ukrainian military C2" / "Degraded Ukrainian military C2"
        stated as fact; S1 carries it only as suspicion ("suspicions arose
        that an attempt to take out Ukrainian military command-and-control
        capabilities"). Reframed to "widely assessed to have degraded
        Ukrainian command-and-control," anchored to the EU's "facilitating
        the military aggression."
      * Initial-access prose said "valid credentials abused"; sources say a
        MISCONFIGURATION was exploited. Viasat: "exploiting a misconfiguration
        in a VPN appliance to gain remote access to the trusted management
        segment of the KA-SAT network"; then "legitimate, targeted management
        commands on a large number of residential modems." Corrected.
      * VERIFIED & kept: MIPS ELF wiper; /dev/mtd*, /dev/mmcblk*, /dev/sd*
        + virtual block devices; 0x40000-byte overwrite / MEM* IOCTL erase
        (all S1 verbatim); Skylogic administers KA-SAT (S1); SurfBeam2 modem
        family (S1); ~5,800 Enercon wind turbines in Germany (S1 verbatim);
        VPNFilter 'dstr' plugin code overlap (S1).
    [b] ATTRIBUTION — over-attestation fixed. SentinelLabs entry was
