id: 2022-02/viasat-ka-sat-acidrain
name: Viasat KA-SAT / AcidRain (invasion-day satellite disruption)
start_date: 2022-02-24
disclosure_date: 2022-03-30
end_date: 2022-02-24
incident_type:
  - destructive
  - wiper
initial_vector: valid-creds  # Viasat: attacker exploited a misconfiguration in a VPN appliance to reach the trusted KA-SAT management segment, then abused the legitimate modem-management channel (access-control weakness; no software CVE described)
outcome_summary: |
  AcidRain wiper, pushed over Viasat's KA-SAT modem-management
  channel, rendered several thousand satellite modems in Ukraine
  and tens of thousands of fixed broadband modems across Europe
  inoperable at the outset of Russia's 24 Feb 2022 invasion. The
  disruption is widely assessed to have degraded Ukrainian
  command-and-control connectivity as the invasion began (EU: the
  strike thereby "facilitat[ed] the military aggression").
  Notable spillover: ~5,800 Enercon wind turbines in Germany lost
  remote monitoring/control.
false_flag_risk: none
campaign_id: hermetic-wave-feb-2022
summary: |
  On 24 February 2022 a wiper later named AcidRain was pushed over
  Viasat's KA-SAT modem-management network, bricking satellite
  modems in Ukraine and across Europe at the hour of Russia's
  invasion. AcidRain is a MIPS ELF wiper (against SurfBeam2-class
  satellite modems): it iterates over device files (/dev/mtd*,
  /dev/mmcblk*, /dev/sd* and virtual block devices), overwrites
  each with up to 0x40000 bytes or erases /dev/mtd* via MEM*
  IOCTLs, then reboots the device, rendering it inoperable (per
  Viasat, not permanently — recoverable by factory reset or
  replacement). Entry, per Viasat's incident overview, was a
  misconfiguration in a VPN appliance that gave remote access to
  the trusted KA-SAT management segment (administered by
  Skylogic); the attacker moved laterally and issued "legitimate,
  targeted management commands" against a large number of
  residential modems simultaneously. SentinelLabs (31 Mar 2022)
  assessed with MEDIUM confidence a developmental link between
  AcidRain and a VPNFilter stage-3 ('dstr') plugin — shared MIPS
  ELF / libc code and compiler artifacts — but explicitly could
  not "definitively tie AcidRain to VPNFilter (or the larger
  Sandworm threat cluster)." On 10 May 2022 the EU, with US, UK
  and Five Eyes partners, formally attributed the operation to the
  Russian Federation, noting it took place "one hour before" the
  invasion "thus facilitating the military aggression."
