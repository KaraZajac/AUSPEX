id: 2022-02/sidewinder-china-academic
name: SideWinder targeting of Chinese academic and research institutes (Group-IB cluster)
start_date: 2021-08-01
disclosure_date: 2022-02-22
end_date: 2022-02-22
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Group-IB documented SideWinder targeting of Chinese academic
  institutions and research entities during late 2021 and early
  2022, following the post-Galwan India-China military standoff.
  Targets included PRC universities engaged in defense-relevant
  research, think tanks studying South Asian security, and
  scholarship adjuncts of the broader PRC academic ecosystem.
  Tradecraft was consistent with the contemporaneous SideWinder
  Pakistan campaign — weaponized RTF, BackDeer loaders, HTA
  staging.
false_flag_risk: none
summary: |
  Important early indication of SideWinder's expansion into PRC
  collection during the post-Galwan operational tempo elevation.
  The targeting of PRC academic institutions studying defense
  topics maps onto Indian intelligence interest in PLA
  modernization and PRC South Asia policy. This event is
  distinct from the broader May 2022 Group-IB SideWinder
  retrospective.
