id: 2022-02/hermeticwiper
name: HermeticWiper (invasion-eve wiper)
start_date: 2022-02-23
disclosure_date: 2022-02-24
end_date: 2022-02-24
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  Disk wiper observed on hundreds of systems at at least five
  Ukrainian organizations on the eve of the 24 February 2022
  invasion. ESET confirmed one deployment via Active Directory
  Group Policy; other initial-access vectors were not established.
  Paired with the HermeticWizard SMB/WMI worm propagator.
false_flag_risk: none
campaign_id: hermetic-wave-feb-2022
summary: |
  On 23 February 2022, hours before Russia's full-scale invasion,
  ESET detected a destructive campaign using HermeticWiper against
  at least five Ukrainian organizations, hitting hundreds of
  systems. The wiper (and the HermeticWizard worm that spread it)
  was signed with a code-signing certificate issued to Hermetica
  Digital Ltd, and it abused four legitimate EaseUS Partition
  Master drivers (signed by CHENGDU YIWO Tech) for low-level disk
  access. It overwrites the master boot record (MBR), the master
  file table (MFT), $Bitmap and $LogFile on all drives, the
  registry-key files (NTUSER*) and the Windows event logs, and
  recursively wipes further files, to maximize unrecoverability.
  ESET confirmed one instance of deployment via Active Directory
  Group Policy — implying prior access to that victim's AD server —
  but noted that initial-access vectors varied and were largely
  unknown; malware artifacts suggested the operation had been
  planned for several months. A HermeticWizard SMB/WMI worm and a
  Go-language HermeticRansom ransomware accompanied the wiper.
  ESET's initial reporting did NOT attribute the attacks ("ESET
  Research has not yet been able to attribute these attacks to a
  known threat actor"); ESET's February 2023 retrospective later
  attributed the majority of the 2022 wiper wave — HermeticWiper
  included — to Sandworm "with varying degrees of confidence."
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: ESET
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-02-24
    attribution_source_id: eset/2023-02-24_year-of-wiper-attacks-ukraine
    notes: |
      Attribution LATENCY: ESET's initial HermeticWiper/IsaacWiper
      report (01 Mar 2022, the eset/2022-02-24_… source) explicitly
      states "ESET Research has not yet been able to attribute these
      attacks to a known threat actor" and "IsaacWiper is still
      unattributed" — i.e. NO actor named at disclosure. The Sandworm
      attribution comes only from ESET's 24 Feb 2023 retrospective,
      which "attribute[s] the majority of these attacks to Sandworm,
      with varying degrees of confidence" (hence moderate /
      concur-with-caveat, not high). ESET names the group "Sandworm"
      (= GRU Unit 74455) but does not spell out the unit here, so
      attribution_level is named-actor. Earlier corpus text naming
      "ESET / Mandiant / CERT-UA … high" at 2022-02-24 was not carried
      by either cited ESET source and was removed.
