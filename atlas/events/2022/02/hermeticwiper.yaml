qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited against two ESET WeLiveSecurity sources (both raw-snapshotted + hashed).
    S1 = eset/2022-02-24_hermeticwiper-isaacwiper "IsaacWiper and HermeticWizard: New
    wiper and worm targeting Ukraine" (published 01 Mar 2022), sha256 9e7dbcbe…ec645a1,
    103985 bytes. S2 = eset/2023-02-24_year-of-wiper-attacks-ukraine "A year of wiper
    attacks in Ukraine" (24 Feb 2023), sha256 30221f95…6579ab57, 90658 bytes.

    [a] FACTS — corrected to S1's exact wording. S1: "On February 23rd, 2022, a
    destructive campaign using HermeticWiper targeted multiple Ukrainian organizations";
    "HermeticWiper was observed on hundreds of systems in at least five Ukrainian
    organizations" → kept "hundreds of systems / at least five Ukrainian organizations."
    S1 overwrite targets verbatim: "The master boot record (MBR) / The master file table
    (MFT) / $Bitmap and $LogFile on all drives / The files containing the registry keys
    (NTUSER*) / C:\\Windows\\System32\\winevt\\Logs" + recursive wipe → summary rewritten
    to match (was vaguely "MBR, partition tables, and selected file contents"). S1: drivers
    are "legitimate drivers from the EaseUS Partition Master software signed by CHENGDU
    YIWO Tech Development Co." and the wiper/wizard are "signed by a code-signing
    certificate … assigned to Hermetica Digital Ltd" → kept. STRIPPED as not carried by
    either source: the specific driver filename "empntdrv.sys"; the "bring-your-own-
    vulnerable-driver loader" framing; "HermeticRansom decoy ransomware to muddy
    attribution" (S1 lists HermeticRansom only as "ransomware written in Go" — no decoy /
    attribution-muddying claim); the sector breakdown "finance, government contractors"
    (S1 says only "five Ukrainian organizations," sector unspecified, plus one "Ukrainian
    governmental network" for IsaacWiper). S1 on access: "Initial access vectors varied
    from one organization to another. We confirmed one case of the wiper being dropped by
    GPO"; "The initial access vector is currently unknown"; "Malware artifacts suggest
    that the attacks had been planned for several months" → summary/outcome now say GPO
    confirmed in ONE instance, other vectors unknown, months of planning (was overstated
    as blanket "valid credentials pre-positioned over months of dwell … deployed via GPO
    across hundreds of systems").

    [b] ATTRIBUTION — the load-bearing correction. S1 explicitly does NOT attribute:
    "ESET Research has not yet been able to attribute these attacks to a known threat
    actor" and "IsaacWiper is still unattributed as well." The prior block (actor Sandworm,
    "ESET / Mandiant / CERT-UA", high, concur, dated 2022-02-24, sourced to S1) over-
    attested a claim S1 does not make. RE-SOURCED (badrabbit model) to S2, which states:
    "We were able to attribute the majority of these attacks to Sandworm, with varying
    degrees of confidence" and lists HermeticWiper in its 2022 timeline. Kept actor
    ru/gru/74455/sandworm but reset: attributing_org ESET; confidence moderate (S2's
    "varying degrees"); auspex_assessment concur-with-caveat; attribution_date 2023-02-24
    (when ESET actually attributed, not 2022-02-24 when it disclaimed attribution);
    attribution_source_id → S2; added attribution_level named-actor + a notes field
    documenting the latency. Dropped Mandiant + CERT-UA from attributing_org (neither is a
    cited attributing source here; S2 merely notes CERT-UA/Microsoft/SentinelOne as other
    reporters in the compilation).

    [c] DATES — start_date 2022-02-23 ✓ (S1 "On February 23rd, 2022"). disclosure_date
    2022-02-24 ✓ (ESET's first tweet/blogpost; S1 references "this ESETResearch tweet and
    WLS blogpost"). end_date 2022-02-24 ✓. S1 published_on 2022-03-01 already correct in
    the source record (the slug's "2022-02-24" is the stable id, not the pub date). S2
    published_on 2023-02-24 ✓.

    [d] DOCTRINE_LINKS — both strongly_inferred (neither attested; no attested gate).
    russkiy-mir/ukraine-theater: attesting_source_id kept as S1 (primary supporting doc);
    reworded reasoning + inference_basis.signals to drop the unsupported "government/
    contractor estates" phrasing (S1 gives no sectors for the five orgs), replaced with
    "at least five Ukrainian organizations" + invasion-eve timing + months-of-planning;
    ruled_out records that S1 neither names the doctrine nor states the purpose. military-
    doctrine-2014/non-contact-warfare: kept strongly_inferred (was already downgraded from
    attested 2026-06-09); attesting_source_id null (allowed, not attested); ADDED a missing
    inference_basis {signals, ruled_out} — cyber-kinetic synchronization signal, criminal/
    hacktivist reading ruled out. Honest that this link is an AUSPEX inference (no cited
    source discusses RU military doctrine).

    [e] ATTRIBUTION_LEVEL — set to named-actor (S2 names the group "Sandworm"; it does not
    spell out "GRU Unit 74455" in-text, so not named-unit).

    [f] ACTOR_ID — ru/gru/74455/sandworm resolves to atlas/actors/ru/sandworm.yaml
    (internal id matches). No actor-file edit. NOTE: the actor record's ttp_summary already
    lists HermeticWiper among Sandworm tooling (citing Mandiant APT44 2024) — consistent
    with S2's hedged attribution; no flag.

    DEFECTS FIXED beyond [a]-[f]: the two prior target FKs orgs/ukraine-finance-sector and
    orgs/ukraine-government-contractors were BOTH DANGLING (no such registry files) AND
    unsupported by S1 (no sector breakdown). Replaced with the single
    orgs/ukrainian-state-institutions-various (country ua) — the corpus's designated
    aggregate for the 2022 invasion-coincident wiper waves. initial_vector changed
    valid-creds → unknown (S1: "The initial access vector is currently unknown").

    RESIDUAL UNCERTAINTY: S1 gives no sectors for the five HermeticWiper victim orgs;
    later non-cited reporting (e.g. Symantec) described mixed finance/defense-contractor/
    aviation victims, so the state-institutions aggregate target may under-represent
    private-sector victims — flagged rather than asserted. The Sandworm attribution is
    ESET's hedged 2023 assessment ("varying degrees of confidence"); firmer attribution
    (Mandiant APT44) exists in the corpus but is not cited on this event.
