id: 2022-02/hermeticwiper
name: HermeticWiper (invasion-eve wiper)
start_date: 2022-02-23
disclosure_date: 2022-02-24
end_date: 2022-02-24
incident_type:
  - destructive
  - wiper
initial_vector: valid-creds
outcome_summary: |
  Signed-driver disk wiper deployed via Group Policy across
  hundreds of systems at 5+ Ukrainian organizations (finance,
  government contractors) on the eve of the 24 February 2022
  invasion. Paired with the HermeticWizard worm propagator.
false_flag_risk: none
campaign_id: hermetic-wave-feb-2022
summary: |
  ESET, Mandiant, and CERT-UA attributed to Sandworm on the basis
  of tooling and tradecraft consistency. HermeticWiper abuses the
  legitimately signed EaseUS Partition Master driver (empntdrv.sys)
  via a bring-your-own-vulnerable-driver loader to obtain raw disk
  access, then corrupts the MBR, partition tables, and selected
  file contents to maximize unrecoverability. Operators deployed
  it through Active Directory Group Policy using valid credentials
  pre-positioned over months of dwell, paired with the
  HermeticWizard SMB / WMI worm propagator and the HermeticRansom
  decoy ransomware to muddy attribution. Coordinated with invasion
  D-day to maximize disruption of Ukrainian command, control, and
  continuity-of-government functions across finance and government-
  contractor estates.
