id: 2022-02/muddywater-mois-aa22-055a
name: CISA AA22-055A — MuddyWater formally attributed to MOIS
start_date: 2017-01-01  # underlying MuddyWater activity onset
disclosure_date: 2022-02-24
end_date: 2022-02-24
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Joint CISA / FBI / NSA / CNMF / NCSC-UK advisory formally
  attributing MuddyWater to the Iranian Ministry of Intelligence
  and Security (MOIS). Documented MuddyWater operations across
  telecom, defense, local government, and oil & gas sectors in
  Asia, Africa, Europe, and North America.
false_flag_risk: none
summary: |
  Foundational public-attribution event — moves MuddyWater
  attribution from vendor-consensus to multi-government attested.
  AA22-055A catalogues MuddyWater / MERCURY / Static Kitten
  tradecraft: spear-phishing with malicious Microsoft Office
  documents and PDF lures dropping PowerShell-based payloads
  (POWERSTATS / Powerstats, PowGoop loader), the MORI backdoor,
  the SHARPSTATS .NET implant, the canary-test Mori family, and
  the publicly available remote-management tool ScreenConnect /
  ConnectWise used for hands-on-keyboard access. Operators
  habitually used DNS tunneling for C2, web shells on
  internet-facing Exchange servers, valid credentials and
  scheduled tasks for persistence, and the open-source SharpHound
  / BloodHound for Active Directory reconnaissance. Subsequent
  MuddyWater operations (Technion DarkBit February 2023) build on
  this attribution.
