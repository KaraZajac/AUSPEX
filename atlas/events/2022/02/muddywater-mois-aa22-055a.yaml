id: 2022-02/muddywater-mois-aa22-055a
name: CISA AA22-055A — MuddyWater formally attributed to MOIS
start_date: 2017-01-01  # underlying MuddyWater activity onset
disclosure_date: 2022-02-24
end_date: 2022-02-24
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Joint CISA / FBI / NSA / CNMF / NCSC-UK advisory formally
  attributing MuddyWater to the Iranian Ministry of Intelligence
  and Security (MOIS). Documented MuddyWater operations across
  telecom, defense, local government, and oil & gas sectors in
  Asia, Africa, Europe, and North America.
false_flag_risk: none
summary: |
  Foundational public-attribution event — moves MuddyWater
  attribution from vendor-consensus to multi-government named-unit
  attribution. Joint advisory AA22-055A (FBI / CISA / CNMF /
  NCSC-UK / NSA) states MuddyWater "is a subordinate element
  within the Iranian Ministry of Intelligence and Security (MOIS)"
  and is conducting cyber espionage and other malicious cyber
  operations "as part of" MOIS, targeting government and
  private-sector organizations across telecommunications, defense,
  local government, and oil & natural gas in Asia, Africa, Europe,
  and North America. The advisory notes MuddyWater is also known
  as Earth Vetala, MERCURY, Static Kitten, Seedworm, and
  TEMP.Zagros, and catalogues its tradecraft: spearphishing that
  coaxes victims into downloading ZIP files carrying either an
  Excel document with a malicious macro or a PDF that drops a
  payload; exploitation of publicly known vulnerabilities
  (Zerologon CVE-2020-1472, Exchange CVE-2020-0688); PowerShell
  and open-source tooling; and the malware families PowGoop,
  Small Sieve, Canopy (Starwhale), Mori, and POWERSTATS. The Mori
  backdoor uses DNS tunneling for C2; the actors use the
  legitimate ScreenConnect remote-management tool to control
  systems and move laterally, and scheduled tasks for
  persistence. Subsequent MuddyWater operations (Technion DarkBit,
  February 2023) build on this attribution.
attributions:
  - actor_id: ir/mois/muddywater
    attributing_org: CISA + FBI + NSA + CNMF + NCSC-UK
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2022-02-24
    attribution_source_id: cisa/2022-02-24_aa22-055a-muddywater
    notes: |
      AA22-055A names the parent organ: "MuddyWater is a
      subordinate element within the Iranian Ministry of
      Intelligence and Security (MOIS)" — named-unit (a specific
      state intelligence service, MOIS), not merely nation.
doctrine_links:
  - doctrine_id: ir/forward-defense
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      AA22-055A attributes MuddyWater to MOIS and states it
      conducts cyber espionage "in support of MOIS objectives" —
      positioned "to provide stolen data and accesses to the
      Iranian government." That is the proximate purpose
      (state-directed espionage collection and access-provision);
      forward defense is the strategic frame AUSPEX reads onto it
      (projecting Iranian power into adversary networks at
      near-zero physical risk). The source names the espionage
      mission but not the forward-defense goal in substance, so
      this is strongly_inferred, not attested.
    attesting_source_id: cisa/2022-02-24_aa22-055a-muddywater
    inference_basis:
      signals:
        - "AA22-055A: MuddyWater conducts cyber espionage 'as part of' and 'in support of MOIS objectives,' a state intelligence service."
        - "The advisory says the actors are positioned 'to provide stolen data and accesses to the Iranian government and to share these with other Iranian government actors' — collection feeding the state, the cyber expression of forward defense."
        - "MuddyWater's documented default alignment includes ir/forward-defense (MOIS foreign cyber espionage against adversary government/telecom/defense networks)."
      ruled_out: "Financial/criminal motive — the advisory frames the operations as state-tasked espionage serving MOIS objectives, not revenue generation."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/constitutional-irgc-role
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Weak/contested link. ir/constitutional-irgc-role is an IRGC
      doctrine whose regime-preservation pillar targets
      dissidents, diaspora, and journalists; MuddyWater is an MOIS
      (not IRGC) actor, and AA22-055A documents foreign espionage
      against government, telecom, defense, and oil & gas across
      four continents — not counter-dissident operations. No part
      of the source states a regime-preservation purpose, and the
      target set does not fit the pillar. Retained at plausible
      only as a generic "serves the Iranian state" reading; see
      FLAG in qc notes recommending removal as mis-scoped.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Generic service-of-the-Islamic-Republic reading: any MOIS espionage broadly advances regime security, so the constitutional mandate could be invoked at a very high level of abstraction."
        - "No fit: the IRGC constitutional-role doctrine (and its counter-dissident pillar) applies to a different service and a different target set (domestic/diaspora dissidents), neither of which AA22-055A describes — the link likely does not belong on this event."
    counter_explanation: null
    contested: true
    analyst: claude
