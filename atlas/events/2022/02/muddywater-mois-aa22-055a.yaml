qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs CISA/FBI/CNMF/NCSC-UK/NSA joint advisory AA22-055A. NOT a
    phantom: the cited source is the real advisory. Snapshots: alert-page
    (source's own url) cisa__2022-02-24_aa22-055a-muddywater.html sha256
    572ed568...7555120c, 53266 bytes (hash re-verified, matches committed);
    full joint CSA body (same advisory, .../cybersecurity-advisories/aa22-055a,
    now reachable HTTP 200 — was 403-walled at prior audit) fetched + hashed
    for TTP corroboration cisa__2022-02-24_aa22-055a-muddywater-full-csa.html
    sha256 73fb3e96...e79d3b4c, 104218 bytes.

    [a] FACTS — corrected. The alert page carries verbatim: MuddyWater
    "conducting cyber espionage and other malicious cyber operations as part
    of Iran's Ministry of Intelligence and Security (MOIS), targeting a range
    of government and private-sector organizations across sectors—including
    telecommunications, defense, local government, and oil and natural gas—in
    Asia, Africa, Europe, and North America." The full CSA carries: the exact
    "MuddyWater is a subordinate element within the Iranian Ministry of
    Intelligence and Security (MOIS)"; spearphishing coaxing victims to
    download ZIP files "containing either an Excel file with a malicious macro
    ... or a PDF file that drops a malicious file"; exploitation of CVE-2020-1472
    (Zerologon) and CVE-2020-0688 (Exchange); malware "variants of PowGoop,
    Small Sieve, Canopy (also known as Starwhale), Mori, and POWERSTATS"; "the
    Mori backdoor that uses Domain Name System tunneling to communicate with
    the group's C2"; "ScreenConnect, to manage systems remotely and move
    laterally"; and "scheduled tasks to establish persistence." STRIPPED as
    fabricated / uncited (absent from BOTH snapshots — grep-confirmed): the
    "SHARPSTATS .NET implant", "SharpHound / BloodHound for Active Directory
    reconnaissance" (sharp/blood = 0 hits), "web shells on internet-facing
    Exchange servers" (advisory documents Exchange CVE exploitation, not web
    shells), "valid credentials ... for persistence" (persistence is via
    scheduled tasks; no valid-account claim), and the redundant "canary-test
    Mori family". Summary rewritten to only source-carried tradecraft, with
    the CSA's own alias list (Earth Vetala, MERCURY, Static Kitten, Seedworm,
    TEMP.Zagros).

    [b] ATTRIBUTION — verified, unchanged (concur/high). AA22-055A explicitly
    names MOIS as the parent organ; attributing_org CISA+FBI+NSA+CNMF+NCSC-UK
    correct; high confidence honest (unqualified govt attribution).

    [c] DATES — source published_on 2022-02-24 = advisory date (correct);
    disclosure/end 2022-02-24 correct for this announcement event. RESIDUAL:
    start_date 2017-01-01 ("underlying activity onset") — AA22-055A itself
    says MuddyWater "conducted broad cyber campaigns in support of MOIS
    objectives since approximately 2018." 2017 is supported by broader
    first-reporting (Unit 42, Nov 2017) and matches the actor record's
    active_since, so LEFT as-is; noting the source-specific 2018 for the record.

    [e] ATTRIBUTION_LEVEL — was MISSING; set to named-unit (the advisory names
    a specific state intelligence service, MOIS, as MuddyWater's parent —
    "subordinate element within ... MOIS"). Added a corroborating notes quote.

    [d] DOCTRINE_LINKS — two corrections.
    (1) ir/forward-defense DOWNGRADED attested -> strongly_inferred. The
    advisory names the espionage mission ("in support of MOIS objectives",
    "provide stolen data and accesses to the Iranian government") but does NOT
    state the forward-defense goal in substance; per the over-attestation
    calibration, naming only the proximate purpose the doctrine specializes =
    strongly_inferred. Added inference_basis {signals, ruled_out(financial)};
    attesting_source_id kept as the primary supporting source.
    (2) ir/constitutional-irgc-role DOWNGRADED strongly_inferred -> plausible,
    contested: true. Added inference_basis.alternatives.

    [f] ACTOR_ID — ir/mois/muddywater RESOLVES (file atlas/actors/ir/muddywater.yaml,
    id ir/mois/muddywater). Placement source-supported by this same advisory
    (already audited in the actor record 2026-06-24). No actor edits made.

    FLAGS for orchestrator:
    - DOCTRINE MIS-SCOPE (recommend removal): ir/constitutional-irgc-role on
      this event is an IRGC-service doctrine whose regime-preservation pillar
      targets domestic/diaspora dissidents — MuddyWater is MOIS and this event
      is global foreign espionage against government/telecom/defense/oil-gas.
      No source language supports it; the target set contradicts the pillar.
      Downgraded to plausible + contested rather than deleted (deletion is
      Kara's call). Only ir/forward-defense is a defensible link here.
    - Source-vs-record date: AA22-055A says "since approximately 2018";
      event/actor use 2017 onset (defensible from broader reporting).
