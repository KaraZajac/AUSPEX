id: 2022-10/black-reward-aeoi-leak
name: Black Reward — Atomic Energy Organisation of Iran leak (counter-regime, NOT IRANIAN STATE)
start_date: 2022-10-21
disclosure_date: 2022-10-23
end_date: 2022-10-23
incident_type:
  - hack-and-leak
  - data-theft
  - influence-operation
initial_vector: unknown
outcome_summary: |
  ~50 GB / ~100,000 e-mails (324 inboxes) exfiltrated from an AEOI subsidiary (the
  Nuclear Power Production and Development Company, operator of the Bushehr plant)
  and dumped on Telegram. AEOI confirmed the breach but attributed it to an unnamed
  foreign state; Black Reward framed it as anti-regime hacktivism tied to the Mahsa
  Amini protests, with a 24-hour ultimatum to release detained protesters.
quantified_impact:
  data_leaked_gb: 50
  emails_leaked: 100000
false_flag_risk: none
summary: |
  **Counter-regime hacktivist event — NOT part of Iran's state cyber program.**
  Black Reward, an Iranian anti-regime hacktivist group (a named persona, not a state
  actor), claimed on Twitter/Telegram that it had breached the internal e-mail system
  of an Atomic Energy Organisation of Iran (AEOI) subsidiary — the Nuclear Power
  Production and Development Company that operates the Bushehr nuclear plant. After a
  24-hour ultimatum (issued Fri 21 Oct 2022) demanding the release of detained
  protesters went unanswered, the group dumped ~50 GB / ~100,000 e-mails (324 inboxes)
  on Telegram, branding the leak "in the name of Mahsa Amini and for women, life,
  freedom." On 23 Oct 2022 the AEOI confirmed the breach of a subsidiary's e-mail
  server but blamed an unnamed "specific foreign country" — an unevidenced state-backed
  framing the hacktivists explicitly rejected. Leaked material reportedly included
  Bushehr management/operational schedules, IAEA correspondence, and passports/visas of
  Iranian and Russian specialists. Retained in the Iran log only to illustrate the
  analyst-hygiene rule that Iranian-language hacktivist personas (Black Reward, Lab
  Dookhtegan) are not automatically state actors — distinct from Iranian state fronts
  (CyberAv3ngers, HomeLand Justice, Moses Staff).
attributions:
