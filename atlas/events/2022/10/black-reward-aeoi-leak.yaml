    auspex_assessment: concur-with-caveat
    attribution_date: 2022-10-23
    attribution_source_id: therecord/2022-10-24_iran-foreign-country-aeoi
    notes: |
      Black Reward is a self-named Iranian anti-regime hacktivist group (named-actor:
      a named group, NOT a nation or named-unit, and NOT Iranian state). Attribution rests
      on the group's own Twitter/Telegram claim, corroborated by the AEOI's confirmation that
      a subsidiary's e-mail server was breached and by the genuineness of the published trove —
      hence moderate confidence (no independent forensic attribution beyond the self-claim).
      auspex_assessment concur-with-caveat: the AEOI confirmed the breach but blamed an unnamed
      "specific foreign country" (The Record), an unevidenced state-backed framing the
      hacktivists explicitly denied (SOCRadar) and that contemporaneous reporting treated as
      regime deflection. No nameable foreign-state actor was identified, so no second
      attribution entry is modeled.
