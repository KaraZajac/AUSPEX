    auspex_assessment: concur
    attribution_date: 2022-11-10
    attribution_source_id: microsoft/2022-10-14_prestige-ukraine-poland
    notes: |
      The 14 Oct 2022 initial disclosure did NOT attribute the campaign;
      MSTIC tracked it as the unattributed development cluster DEV-0960.
      The IRIDIUM attribution was added in the blog's 10 Nov 2022 update
      ("MSTIC has updated this blog to document assessed attribution of
      DEV-0960 as IRIDIUM"), assessed "very likely" (= high). Microsoft
      named IRIDIUM — "a Russia-based threat actor ... publicly overlapping
      with Sandworm" — a named actor; it did NOT name GRU Unit 74455, so
      attribution_level is named-actor (the unit resolution is AUSPEX's,
      corroborated elsewhere). Apr 2023: Microsoft renamed IRIDIUM to
      Seashell Blizzard.
