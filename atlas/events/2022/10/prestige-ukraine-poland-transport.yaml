id: 2022-10/prestige-ukraine-poland-transport
name: Sandworm "Prestige" ransomware against Ukraine + Poland transportation/logistics
start_date: 2022-10-11
disclosure_date: 2022-10-14
end_date: 2022-10-11
incident_type:
  - destructive
  - disruption
initial_vector: valid-creds
outcome_summary: |
  Sandworm deployed a previously unknown ransomware family Microsoft
  labeled "Prestige" against transportation and logistics
  organisations in Ukraine and Poland on 11 October 2022. Wave of
  deployments completed in approximately one hour using highly
  privileged credentials, encrypting victim systems and disrupting
  cross-border wartime logistics operations. First publicly
  documented Russian destructive operation targeting NATO-member
  territory infrastructure since the invasion began.
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (MSTIC) disclosed the campaign on
  14 October 2022, attributing it to the actor Microsoft then
  tracked as IRIDIUM — equivalent to Sandworm / GRU Unit 74455.
  Prestige is a single-file C++ ransomware that uses CryptoPP AES
  for file encryption and was deployed using either Default Domain
  Policy, RemoteExec via WMI, or Impacket WMIexec; deployment relied
  on pre-positioned domain-admin credentials rather than initial
  compromise on the day of impact. Polish targeting marked a
  doctrinal step — the first publicly attested Sandworm destructive
  action against a NATO member-state's territory in the
  invasion-support window, framing logistics organisations
  facilitating Ukraine aid as part of the same target set as
  Ukrainian organisations.
