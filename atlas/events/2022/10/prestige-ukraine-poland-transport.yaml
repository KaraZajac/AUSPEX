id: 2022-10/prestige-ukraine-poland-transport
name: Sandworm "Prestige" ransomware against Ukraine + Poland transportation/logistics
start_date: 2022-10-11
disclosure_date: 2022-10-14
end_date: 2022-10-11
incident_type:
  - ransomware
  - destructive
  - disruption
initial_vector: valid-creds
outcome_summary: |
  Sandworm (tracked by Microsoft as IRIDIUM) deployed a previously
  unidentified ransomware family Microsoft labeled "Prestige"
  against transportation and logistics organisations in Ukraine and
  Poland on 11 October 2022. Deployments across all victims occurred
  within approximately one hour, using already-acquired highly
  privileged (Domain Admin) credentials, AES-encrypting victim
  files. Microsoft assessed the campaign may signal increased risk
  to organisations directly supplying or transporting humanitarian
  or military assistance to Ukraine, and more broadly to Eastern
  European organisations seen by the Russian state as supporting the
  war.
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (MSTIC) disclosed the campaign on
  14 October 2022. The initial disclosure did NOT attribute the
  activity — it tracked it as the unattributed cluster DEV-0960; in
  a 10 November 2022 update MSTIC assessed that IRIDIUM — a
  Russia-based actor Microsoft describes as publicly overlapping
  with Sandworm (AUSPEX: GRU Unit 74455) — "very likely" executed
  the attack. Prestige is a C++ ransomware that uses the CryptoPP
  library for AES file encryption and was deployed via one of three
  methods: Impacket-created scheduled tasks, an encoded PowerShell
  command, or a Default Domain Group Policy Object. Microsoft did
  not identify the initial access vector but noted the attacker had,
  in observed deployments, already obtained highly privileged
  credentials, possibly from a prior compromise. Polish targeting is
  notable as a Russian destructive-style action against the
  territory of a NATO member during the invasion window; Microsoft
  framed the campaign as extending risk to logistics organisations
  supplying Ukraine and to Eastern European entities seen as
  supporting the war.
attributions:
