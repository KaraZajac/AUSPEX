    sha256 7fca6f44…219cdb83, 306,312 bytes; extracted text 18,238 chars.
    [a] FACTS ✓ verbatim: "novel ransomware campaign targeting organizations
    in the transportation and related logistics industries in Ukraine and
    Poland"; "deployed on October 11"; "within an hour of each other across
    all victims"; "the attacker had already gained access to highly privileged
    credentials, like Domain Admin"; "Prestige leverages the CryptoPP C++
    library to AES-encrypt each eligible file"; three deployment methods
    (Impacket scheduled task / encoded PowerShell / Default Domain GPO);
    remote-exec utilities RemoteExec + Impacket WMIexec. CORRECTIONS:
    (1) removed the un-sourced superlative "First publicly documented Russian
    destructive operation targeting NATO-member territory" from outcome_summary
    AND summary — the source never claims a "first"; it says only that the
    campaign "may represent an increased risk to organizations in Eastern
    Europe ... considered by the Russian state to be providing support relating
    to the war." Reframed to the sourced "notable ... territory of a NATO
    member." Softened the same "first" claim in the nato-ultimatum reasoning.
    (2) Dropped "single-file" (not in source). (3) initial_vector kept
    valid-creds but flagged: source states "Initial access vector has not been
    identified at this time, but ... the attacker might have already had
    existing access to the highly privileged credentials from a prior
    compromise" — valid-creds reflects the observed deployment mechanism, not a
    confirmed initial vector. (4) incident_type: added `ransomware` (source
    calls it a "ransomware campaign"/"ransomware-style attack" throughout);
    kept destructive (Microsoft's "destructive attack calculus" / IRIDIUM
    "destructive attacks") + disruption.
    [b][c][e] ATTRIBUTION — KEY FIX: attribution_date 2022-10-14 → 2022-11-10.
    The 14 Oct initial blog did NOT attribute; it tracked the activity as the
    unattributed cluster DEV-0960. The IRIDIUM attribution is a documented
    10 Nov 2022 update: "MSTIC has updated this blog to document assessed
    attribution of DEV-0960 as IRIDIUM" / "As of November 2022, MSTIC assesses
