outcome_summary: |
  CISA, NSA, FBI, NCSC-UK, ACSC, CCCS, and NCSC-NZ issued joint
  advisory AA22-131A warning that managed service providers (MSPs)
  remain a high-value target for nation-state and criminal actors,
  expressly invoking the SolarWinds (SVR / APT29) and Kaseya (REvil)
  precedents. The advisory required MSPs and their customers to
  implement layered visibility, account hardening, and
  least-privilege controls. First Five-Eyes-wide MSP-protection
  advisory in the post-invasion window.
false_flag_risk: none
summary: |
  Doctrinally notable as a policy-companion to the operational SVR
  cloud-hopping disclosures (which culminated in the February 2024
  AA24-057A SVR cloud-access advisory). AA22-131A frames the MSP
  attack surface as a sustained Russian (and other) state-supply-
  chain target, and is the first Five-Eyes-wide alert to do so
  during the active invasion. Pairs with the parallel CISA Shields
  Up posture and the broader Western-CII hardening campaign.
