  notes: |
    Audited against the primary source CISA AA22-131A, "Protecting
    Against Cyber Threats to Managed Service Providers and their
    Customers" (raw snapshot cisa__2022-05-11_aa22-131a-msp-protection.html,
    sha256 9e2a1fa9…f4c8f16a, 89,329 bytes). This was NOT a phantom
    source — the URL resolves to the real advisory (HTML <title>
    "Protecting Against Cyber Threats to Managed Service Providers and
    their Customers | CISA"). The defect was OVER-ATTRIBUTION, corrected
    in place (no re-source needed).

    [a] FACTS — Corrected. The advisory is generic MSP-hardening
    guidance issued by all seven Five-Eyes cyber authorities (NCSC-UK,
    ACSC, CCCS, NCSC-NZ, CISA, NSA, FBI, with JCDC contributions —
    verbatim in the source). Body threat framing (quoted): "threat
    actors successfully compromising an MSP could enable follow-on
    activity—such as ransomware and cyber espionage—against the MSP as
    well as across the MSP's customer base." Guidance = MFA/remote-access
    hardening, least privilege, logging/visibility, supply-chain risk
    management, contractual clarity. REMOVED fabricated claims from the
    old prose: "expressly invoking the SolarWinds (SVR / APT29) and
    Kaseya (REvil) precedents" — SolarWinds appears 0 times, REvil 0
    times, and Kaseya appears only as a reference-list link title
    ("Kaseya Ransomware Attack: Guidance for Affected MSPs and their
    Customers (CISA)"), never as an in-body precedent-framing. Removed
    "frames the MSP attack surface as a sustained Russian … state-
    supply-chain target" — the advisory is actor-agnostic.

    [b] ATTRIBUTION — Demoted to null-actor. Raw-source keyword census:
    SVR = 0, APT29/Cozy = 0, SolarWinds = 0, REvil = 0, "nation-state"
    = 0. "Russia/Russian" = 3, all outside the advisory's own threat
    attribution: two are reference-list titles ("Russian GRU Conducting
    Global Brute Force Campaign…"; "Russian State-Sponsored Cyber Actors
    Gain Network Access by Exploiting Default MFA Protocols and
    'PrintNightmare'") and one is a generic hardening Note ("Note:
    Russian state-sponsored APT actors have recently demonstrated the
    ability to exploit default MFA protocols; organizations should
    review configuration policies…"). None attribute the MSP threat, or
    any operation, to the SVR/APT29. The prior
    attributions[].actor_id = ru/svr/apt29 (moderate,
    concur-with-caveat) was therefore an over-attribution and is
    replaced with a single null-actor entry (issuing authorities;
    high confidence in their own publication; concur), mirroring the
    ncsc-stand-up / ncsc-acd-year-2-report documentary pattern.

    [c] DATES — published_on = 2022-05-11 confirmed (advisory release
    date). start/disclosure/end all 2022-05-11 (single-day meta event);
    unchanged.

    [d] DOCTRINE_LINKS — Emptied. The prior link
    (ru/nato-ultimatum-2021 / nato-degradation, strongly_inferred,
    attacker-rationale) rested on the removed premise that the advisory
    targets Russian supply-chain intrusion. With no actor attributed
    and the advisory being generic, actor-agnostic hygiene guidance, no
    attacker-rationale doctrine genuinely applies; per protocol,
    doctrine_links: [] rather than invent a defender-response doctrine.

