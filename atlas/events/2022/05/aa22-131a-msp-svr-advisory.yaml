outcome_summary: |
  On 2022-05-11 the cybersecurity authorities of all Five Eyes
  nations — NCSC-UK, ACSC, CCCS, NCSC-NZ, and the United States'
  CISA, NSA, and FBI (with JCDC industry contributions) — issued
  joint advisory AA22-131A, "Protecting Against Cyber Threats to
  Managed Service Providers and their Customers." The advisory is
  generic MSP-supply-chain hardening guidance: it warns that a
  threat actor compromising an MSP could enable follow-on activity
  "such as ransomware and cyber espionage" across the MSP's customer
  base, and recommends layered controls — hardened remote access and
  MFA, least-privilege account management, network visibility and
  logging, supply-chain risk management, and clear provider/customer
  contractual responsibilities. It names no specific threat actor as
  responsible for any intrusion.
false_flag_risk: none
summary: |
  A defensive, actor-agnostic MSP-protection advisory, not an
  attribution or an operation. AUSPEX previously filed this under an
  SVR / APT29 supply-chain framing; audit against the primary source
  found that framing unsupported — the advisory does not mention the
  SVR, APT29, SolarWinds, REvil, or "nation-state" anywhere, and its
  only actor-specific references are (1) reference-list links to
  prior advisories and (2) a single hardening Note that Russian
  state-sponsored APT actors "have recently demonstrated the ability
  to exploit default MFA protocols." It is therefore recorded as a
  null-actor documentary of a Five-Eyes-wide MSP-hardening advisory,
  issued during the active-invasion window alongside CISA's Shields
  Up posture.
