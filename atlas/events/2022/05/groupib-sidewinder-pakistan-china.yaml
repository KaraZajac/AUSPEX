id: 2022-05/groupib-sidewinder-pakistan-china
name: Group-IB documents SideWinder targeting Pakistan and China over 12 months
start_date: 2021-04-01
disclosure_date: 2022-05-17
end_date: 2022-04-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Group-IB published a year-long view of SideWinder operations
  documenting 1,000+ attacks against Pakistani military and
  government targets, Bangladeshi government, Chinese targets,
  and adjacent victims. The report includes infrastructure
  inventory (~92 domains, ~692 sub-domains), TTPs, and
  victim-by-sector breakdown. The China-targeting strand
  intensified across the reported period in step with the
  post-Galwan India-China cyber posture.
false_flag_risk: none
summary: |
  One of the largest single public quantifications of SideWinder
  operational volume. Notable for documenting the China-targeting
  pivot — Indian-aligned operations against Chinese state targets
  had been documented at lower volume by Patchwork; SideWinder's
  China collection is more recent.
