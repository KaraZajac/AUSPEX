  notes: |
    Audited against Group-IB "Old Snake, New Skin" (2022-05-17, cited primary) and Group-IB
    "SideWinder.AntiBot.Script" (2022-06-01, added as reachable corroborating primary).
    LEVEL partial: the cited Old Snake New Skin URL resolves only to a GATED landing/summary
    page (raw snapshot bc37b284…6ace491d09, 435,560 bytes; hash re-verified — matches on
    disk); the full report sits behind a lead-gen "Download report" form. Standalone-word
    search of that snapshot returns ZERO hits for "China"/"Chinese"/"Pakistan"/"Bangladesh"
    and the "692"/"92 domains" figures, so the event's China/Pakistan claims are corroborated
    via the reachable AntiBot blog (groupib__2022-06-01_sidewinder-antibot-script.html,
    sha256 dfd20a6e…ef2ab516, 605,641 bytes, 51,694 chars body) plus public mirrors.

    [a] FACTS — corrected multiple conflations/fabrications:
      * The gated landing page's own "key highlights" state: 61 targets in government/
        military/financial/law-enforcement/political sectors across 5 countries "(Afghanistan,
        Bhutan, Myanmar, Nepal, Sri Lanka)"; "spear phishing campaign ... between June and
        November 2021"; BabyElephant "most likely the same or closely related"; "2020 attack
        on the Maldivian government attributed to SideWinder"; Central Bank of Myanmar fakes.
        outcome_summary rewritten to these source-carried facts.
      * DELETED "~92 domains, ~692 sub-domains": both Group-IB sources say "92 IP ADDRESSES",
        not 92 domains; NO source carries "692 sub-domains" (closest is Kaspersky's "no fewer
        than 400 domains and subdomains"). Fabricated infra counts removed.
      * MOVED the "1,000+ attacks since April 2020" figure out of Group-IB attribution: per
        The Hacker News / SecurityAffairs mirrors (2022-05) that figure is KASPERSKY's,
        presented at Black Hat Asia 2022 — NOT the Group-IB report cited here. Now stated in
        summary as a separate, clearly-attributed Kaspersky figure, not folded into outcome.
      * DELETED the "post-Galwan intensification" / "China-targeting pivot" / Patchwork-
        comparison editorial from outcome_summary and summary — not carried by either cited
        source (editorial inference, not documented fact).
      * Confirmed the fabricated "academic/university/defense-research" angle (stripped from
        the retired duplicate) is ABSENT here and stays absent: AntiBot names China via
        GOVERNMENT-org domain-mimicry; zero hits for "academic"/"university" in its body.
    [b] ATTRIBUTION — downgraded attributing_org_confidence high -> moderate (Group-IB:
      "believed to be an Indian nation-state threat actor" — hedged nation, no service named);
      added attribution_level: named-actor (named cluster + nation, not named-unit); added
      notes with the gated-page + hedge caveat. auspex_assessment concur retained.
    [c] DATES — start/end were 2021-04-01 / 2022-04-30 (a ~12-month framing matching neither
      source cleanly). Reset to Group-IB's documented campaign window 2021-06-01 – 2021-11-30
      ("between June and November 2021"). disclosure_date 2022-05-17 retained. Source
      published_on dates correct (Old Snake New Skin 2022-05-17; AntiBot 2022-06-01).
    [d] DOCTRINE_LINKS — both links kept at strongly_inferred (neither attested; no
      attesting_source_id, correct — the doctrine's own cyber_relevance calibrates SideWinder
      links as strongly_inferred, "target mix unambiguous", not attested). Rewrote both
      reasonings to be source-grounded and added inference_basis{signals[], ruled_out} to
      each (were missing). Removed the "post-Galwan" claim from the china link (source does
      not say it) and pinned the china link to GOVERNMENT-org targeting (not academic).
    [e] ATTRIBUTION_LEVEL — set named-actor (was absent).
    [f] ACTOR_ID — in/unscoped/sidewinder resolves (atlas/actors/in/sidewinder.yaml); the
      moderate/named-actor/no-service treatment is consistent with that record's 2026-06-24
      demotion from in/ntro/sidewinder. No actor edit made.

    FLAGS for orchestrator:
      * TARGET-REGISTRY GAP: orgs/chinese-government has NO file in atlas/targets/orgs/
        (dangling, but validator treats orgs/* as informational — "targets normalization
        deferred"). Used by 4 events (this, patchwork-post-galwan, dropping-elephant,
        monsoon); kept here for cross-event consistency. Needs a registry entry.
      * DOCTRINE TEXT: pillar in/regional-collection-pakistan-china/china-collection summary
        says "SideWinder targeting of Chinese academics and research institutes (Group-IB
        2022)". Group-IB (both 2022 reports) names Chinese GOVERNMENT organizations, not
        academics/research institutes — the pillar text imports the same fabricated angle
        that was stripped from the retired duplicate. Recommend correcting the pillar summary.
      * orgs/pakistani-military target file has empty sources: [] — minor.
