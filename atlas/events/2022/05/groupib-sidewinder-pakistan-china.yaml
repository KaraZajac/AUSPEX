id: 2022-05/groupib-sidewinder-pakistan-china
name: "Group-IB documents SideWinder's 2021 campaign and phishing infrastructure (Pakistan primary, China among targets)"
start_date: 2021-06-01
disclosure_date: 2022-05-17
end_date: 2021-11-30
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Group-IB's "Old Snake, New Skin" report detailed a previously
  undocumented SideWinder spear-phishing campaign conducted between
  June and November 2021, with 61 identified targets across the
  government, military, law-enforcement, financial, and political
  sectors of Afghanistan, Bhutan, Myanmar, Nepal, and Sri Lanka.
  Group-IB's Threat Intelligence system identified 92 IP addresses
  used for SideWinder phishing and documented domains/servers
  mimicking government organizations in Pakistan, China, and India.
  The report added new tooling analysis, YARA rules, and ATT&CK
  mapping, assessed BabyElephant as most likely the same or a closely
  related APT, and attributed a 2020 attack on the Maldivian
  government to SideWinder. Group-IB's follow-on
  "SideWinder.AntiBot.Script" blog (June 2022) reaffirmed Pakistan as
  the primary target — especially Pakistani government organizations —
  with China among the group's targets.
false_flag_risk: none
summary: |
  A detailed public view of SideWinder's 2021 operations and phishing
  infrastructure by Group-IB, which describes the actor as "believed to
  be an Indian nation-state threat actor." The Pakistan-primary /
  China-and-India government-domain-mimicry pattern is consistent with
  India-aligned regional collection against Pakistan and China.
  (Contemporaneously and separately, Kaspersky reported at Black Hat
  Asia 2022 that SideWinder had conducted 1,000+ attacks since April
  2020 using no fewer than 400 domains/subdomains — a larger-scope
  figure that is NOT from the Group-IB reporting cited here and is not
  claimed as such.)
