id: 2022-05/treasury-blender-mixer-sanction
name: Treasury SDN designation of Blender.io mixer
start_date: 2022-05-06
disclosure_date: 2022-05-06
end_date: 2022-05-06
incident_type:
  - documentary
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  US Treasury OFAC designated virtual-currency mixer Blender.io
  — the first-ever US sanction of a virtual-currency mixer — as
  used by the DPRK to support its malicious cyber activities and
  to launder stolen virtual currency. Blender processed over
  USD 20.5M of the roughly USD 620M in proceeds from the Lazarus
  Group's March 2022 Axie Infinity / Ronin Bridge heist, and had
  transferred more than USD 500M in Bitcoin since its 2017
  creation. OFAC also identified Blender's laundering for
  Russian-linked ransomware groups (Trickbot, Conti, Ryuk,
  Sodinokibi, GandCrab). Designated under E.O. 13694, as amended.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  Foundational document in the DPRK crypto-laundering
  attestation chain. Treasury's first-ever mixer sanction maps a
  specific dollar quantum — over USD 20.5M of the ~USD 620M
  Axie/Ronin Bridge proceeds — to a single laundering venue and
  invokes the standard WMD/ballistic-missile-financing
  attestation language. This designation set the
  laundering-infrastructure-as-target precedent later reused
  against Tornado Cash (jy0916, Aug 2022) and Sinbad.io (jy1933,
  Nov 2023); the later Sinbad designation identifies Sinbad as
  Blender's successor, a continuity that underwrites the Atomic
  Wallet and Harmony attribution chains.
