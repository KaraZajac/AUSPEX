id: 2022-05/treasury-blender-mixer-sanction
name: Treasury SDN designation of Blender.io mixer
start_date: 2022-05-06
disclosure_date: 2022-05-06
end_date: 2022-05-06
incident_type:
  - documentary
  - disruption
initial_vector: n/a
outcome_summary: |
  US Treasury OFAC designated Blender.io — the first sanctioning
  of a virtual-currency mixer — for processing approximately
  USD 20.5M of the Lazarus Group's Ronin Bridge proceeds.
  Designation established the laundering-infrastructure-as-target
  playbook subsequently reused against Tornado Cash (jy0916,
  August 2022) and Sinbad (jy1933, November 2023). Blender.io
  operators wound down operations within weeks; the same
  infrastructure was repurposed under the Sinbad.io brand in
  early 2023.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  Foundational attestation-chain document for the DPRK
  crypto-laundering pillar. Treasury's first-ever mixer sanction
  formally maps a specific dollar quantum of Ronin Bridge
  proceeds (USD 20.5M of the USD 625M total) to a single
  laundering venue and invokes the standard WMD-financing
  attestation language. The two-step Blender→Sinbad operator
  continuity established at this designation underwrites the
  later Atomic Wallet and Harmony attribution chains.
