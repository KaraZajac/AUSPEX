outcome_summary: |
  Sebastien Raoult ("Sezyo Kaizen"), a 21-year-old French
  computer-science student from Épinal, France, was arrested at
  Rabat international airport in Morocco on 31 May 2022 while
  attempting to board a flight to Brussels. He was wanted on a
  nine-count Western District of Washington grand-jury indictment
  (returned 23 June 2021) charging his role in the ShinyHunters
  data-theft-and-extortion conspiracy; Moroccan authorities detained
  him with US/FBI and DOJ Office of International Affairs assistance,
  pending extradition to Seattle. Two co-conspirators — Gabriel
  Kimiaie-Asadi Bildstein ("Kuroi") of Tarbes and Abdel-Hakim
  El Ahmadi ("Zac") of Lyon — were charged in the same indictment
  (not arrested here).
