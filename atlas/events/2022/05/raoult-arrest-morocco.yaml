summary: |
  Opening law-enforcement milestone of the Raoult procedural arc
  (Morocco arrest May 2022 → extradition to the US January 2023 →
  guilty plea → sentencing January 2024, each tracked as a separate
  event). Per the USAO WDWA release, the nine-count indictment
  charged conspiracy to commit computer fraud and abuse, conspiracy
  to commit wire fraud, four counts of wire fraud, and three counts
  of aggravated identity theft; Raoult ultimately pleaded guilty to
  conspiracy to commit wire fraud and aggravated identity theft and
  was sentenced to 36 months. Modeled as a null-actor counter-action
  (meta event): the acting bodies are Moroccan authorities and US
  prosecutors/FBI; the criminal subject is Raoult, a member of the
  ShinyHunters cluster (criminal/shinyhunters).
