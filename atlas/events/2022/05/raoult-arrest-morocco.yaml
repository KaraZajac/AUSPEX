id: 2022-05/raoult-arrest-morocco
name: Sebastien Raoult ("Sezyo") arrested in Morocco
start_date: 2022-05-31
disclosure_date: 2022-06-01
end_date: 2022-05-31
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  French national Sebastien Raoult ("Sezyo Kaizen"), a 21-year-
  old former computer-science student from Épinal (Vosges,
  France), was arrested at Rabat international airport in
  Morocco on May 31 2022 while attempting to board a flight to
  Brussels. The arrest was carried out by Moroccan authorities
  at the request of US authorities under a sealed September
  2021 USAO Western District of Washington indictment for
  Raoult's role in the ShinyHunters data-broker conspiracy.
  Two co-conspirators were charged in the same indictment.
false_flag_risk: none
operators_named:
  - raoult-sebastien  # ShinyHunters "Sezyo Kaizen", arrested Morocco May 2022
summary: |
  First major law-enforcement event against the ShinyHunters
  cluster. Raoult was charged with conspiracy to commit wire
  fraud, conspiracy to commit computer intrusion, wire fraud
  (six counts), money laundering, and aggravated identity
  theft. Subsequent extradition (Jan 2023) and sentencing
  (Jan 2024) tracked as separate events.
