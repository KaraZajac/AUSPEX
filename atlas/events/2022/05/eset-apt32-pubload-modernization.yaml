id: 2022-05/eset-apt32-pubload-modernization
name: Netskope documents OceanLotus (APT32) web-archive (.MHT) backdoor campaign with Glitch C2
start_date: 2021-08-01
disclosure_date: 2022-01-12
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Netskope Threat Labs documented an OceanLotus (APT32) campaign that
  abused the web-archive file format (.MHT / .MHTML) to smuggle a
  malicious Word document past Microsoft Office and antivirus defenses.
  A RAR-compressed, 35-65 MB web-archive carried a macro-laden document
  (the ZoneID metadata set to "2" to suppress the Office
  mark-of-the-web warning); execution dropped a 64-bit DLL backdoor
  injected into rundll32.exe that collected host and network
  reconnaissance and used the Glitch cloud-hosting platform for
  encrypted command-and-control. Netskope linked the technique and a
  similar backdoor first spotted in August 2021 to APT32 by tradecraft
  overlap, and reported the campaign as still active with narrow
  targeting at the time of publication.
false_flag_risk: none
summary: |
  Illustrates OceanLotus (APT32) continuing to refresh its covert
  delivery tradecraft into the 2021-2022 window — abusing the .MHT
  web-archive format and a legitimate cloud service (Glitch) for C2 to
  evade detection. Netskope attributes the activity to APT32 by TTP and
  backdoor overlap rather than by first-party high-confidence
  attribution.
