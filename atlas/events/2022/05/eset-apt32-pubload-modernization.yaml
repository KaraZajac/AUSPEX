id: 2022-05/eset-apt32-pubload-modernization
name: ESET documents APT32 tooling modernization with PubLoad and KhRAT successors
start_date: 2021-01-01
disclosure_date: 2022-05-26
end_date: 2022-05-26
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  ESET researchers published an analysis of APT32's tooling shifts
  through 2021-2022, documenting deployment of new loader chains
  (PubLoad family) and successors to the long-running KerrDown
  loader and Denis backdoor. ESET observed continued operations
  against Vietnamese diaspora and South-East Asian government
  targets, with refreshed infrastructure following the December
  2020 Facebook takedown of APT32 infrastructure. Tradecraft
  remained recognizably OceanLotus despite the tooling refresh.
false_flag_risk: none
summary: |
  Marks the continuity of APT32 operations into the 2021-2022
  window despite Facebook's takedown, the Bitdefender macOS
  disclosure, and Amnesty's diaspora-targeting reporting. The
  cluster continued to refresh tooling rather than going dormant.
