id: 2022-05/apt28-coldriver-post-invasion-phishing
name: APT28 + COLDRIVER post-invasion credential-phish wave (Ukrainian media, US defense)
start_date: 2022-03-01
disclosure_date: 2022-05-03
end_date: 2022-05-03
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Google TAG May 2022 update documented continued GRU APT28
  credential-phish operations against Ukrainian media organisations
  and Ukrainian government Gmail accounts, alongside FSB COLDRIVER
  / Star Blizzard phishing of US-based defense contractors and
  serving / retired military officials. TAG enforced against
  attacker-controlled domains and pushed Government-Backed
  Attacker warnings. Continued the operational pattern attested in
  TAG's March 2022 disclosure.
false_flag_risk: none
campaign_id: apt28-coldriver-credential-phishing
summary: |
  Doctrinally important as continued, deliberate broadening of
  Russian credential-collection beyond Ukraine into US-based
  Ukraine-supporting defense and military targets. The COLDRIVER
  pivot to US defense contractors and serving / retired military
  officials prefigures the later (Dec 2023) DOJ Star Blizzard
  indictment and FCDO sanctions, where the campaign target set is
  explicitly characterised as supporting Russian intelligence
  preparation of the strategic environment.
