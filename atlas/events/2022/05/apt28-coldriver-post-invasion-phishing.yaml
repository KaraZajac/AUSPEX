id: 2022-05/apt28-coldriver-post-invasion-phishing
name: APT28 post-invasion credential-phishing of Ukrainian media (Google TAG May 2022 update)
start_date: 2022-04-19
disclosure_date: 2022-05-03
end_date: 2022-05-03
incident_type:
  - espionage
initial_vector: phishing
outcome_summary: |
  Google TAG's May 3, 2022 update ("An update on the threat
  landscape") reported that FancyBear/APT28 — a threat actor TAG
  attributes to Russia's GRU — had run several large credential-
  phishing campaigns against ukr.net users (UkrNet is a Ukrainian
  media company). The phishing emails were sent from many
  compromised non-Google accounts and linked to attacker-controlled
  domains; in two recent campaigns the attackers used newly created
  Blogspot domains as landing pages that redirected to credential-
  phishing sites. Google took down the known attacker-controlled
  Blogspot domains. The same bulletin documented parallel
  Ghostwriter/UNC1151 (Belarusian) phishing of Polish and Ukrainian
  government and military organizations and Mustang Panda / Temp.Hex
  (China-based) targeting of European entities with invasion-themed
  lures, plus ongoing DDoS attempts. TAG noted it had issued
  hundreds of Government-Backed Attacker warnings to Ukrainian users
  over the prior year.
false_flag_risk: none
campaign_id: apt28-coldriver-credential-phishing
summary: |
  A distinct entry in Google TAG's invasion-phase bulletin cadence
  (the second, after the March 30, 2022 disclosure): GRU-attributed
  APT28 conducting credential collection against Ukrainian media
  (ukr.net) in the opening months of the full-scale invasion.
  Doctrinally an in-theater espionage-access operation against the
  Ukrainian information space, consistent with APT28's mission and
  the wider post-invasion Russian cyber tempo TAG was tracking.
