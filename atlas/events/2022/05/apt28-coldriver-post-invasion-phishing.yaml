  level: full
  notes: |
    Audited against the RAW Google TAG bulletin "An update on the
    threat landscape" (2022-05-03), snapshot
    google-tag__2022-05-03_threat-landscape-ukraine-update.html,
    sha256 c004e195…7ba9adeb, 367,910 bytes. Title verbatim: "An
    update on the threat landscape".

    PHANTOM/WRONG-SOURCE PATH → RE-SCOPE (not re-source; not retire).
    The cited source is the REAL May 3 article, but it does NOT carry
    most of what the event claimed. curl+text-extract shows the
    bulletin's actual actor content in full: (1) 'FancyBear/APT28, a
    threat actor attributed to Russia GRU, has conducted several
    large credential phishing campaigns targeting ukr.net users,
    UkrNet is a Ukrainian media company … used newly created Blogspot
    domains as the initial landing page, which then redirected
    targets to credential phishing pages. All known attacker-
    controlled Blogspot domains have been taken down.' (2)
    'Ghostwriter/UNC1151, a Belarusian threat actor … against Polish
    and Ukrainian government and military organizations.' (3)
    'Mustang Panda or Temp.Hex, a China-based threat actor, targeted
    European entities with lures related to the Ukrainian invasion.'
    (4) a DDoS section. String counts in the raw: COLDRIVER=0,
    Callisto=0, FSB=0, "Star Blizzard"=0, defense=0, contractor=0,
    Curious=0, Turla=0.

    [a] FACTS — the prior outcome/summary claimed COLDRIVER/Star
    Blizzard phishing of "US-based defense contractors and serving/
    retired military officials" and APT28 hitting "Ukrainian
    government Gmail accounts." NONE of that is in this source. The
    COLDRIVER US-defense narrative is a conflation with the March 30
    and July 19, 2022 TAG bulletins and later (Fog of War / Dec 2023
    indictment) reporting; the July 19 bulletin only says COLDRIVER
    targeted "government and defense officials," not US defense
    contractors. STRIPPED all COLDRIVER/US-defense/Star-Blizzard
    prose and the forward-looking "prefigures the Dec 2023 indictment"
    embellishment. Re-scoped outcome/summary to the APT28→ukr.net
    (Ukrainian media) campaign the source actually documents, with
    the Ghostwriter + Mustang Panda parallel activity noted as
    context (both source-carried).

    [b] ATTRIBUTION — REMOVED the ru/fsb/center-18/star-blizzard
    (COLDRIVER) attribution: the source never names COLDRIVER. Kept
    APT28 (ru/gru/26165/apt28); TAG's wording "attributed to Russia
    GRU" → attributing_org_confidence high, attribution_level
    named-actor (TAG's FancyBear/APT28 cluster + GRU service; no
    specific unit named), auspex_assessment concur. Added the
    verbatim-quote note.

    [c] DATES — source published_on 2022-05-03 confirmed (= the
    disclosure/end date). Reset start_date 2022-03-01 → 2022-04-19:
    the bulletin frames the observed activity as "over the past two
    weeks," so ~two weeks before publication is the source-honest
    best estimate (residual uncertainty: "several large campaigns"
    may have begun somewhat earlier; no exact start given).

    [d] DOCTRINE_LINKS — REMOVED two links that rested on the now-
    deleted COLDRIVER claim: ru/nato-ultimatum-2021/
    ukraine-support-interdiction and ru/sanctions-response-2022/
    aid-state-targeting (both cited US defense-contractor targeting
    that no source here supports; the latter already had
    attesting_source_id: null). Kept ru/russkiy-mir/ukraine-theater
    at strongly_inferred (honest — TAG names the target, not the
    goal), rewrote its reasoning/signals to reference the ukr.net
    Ukrainian-media target rather than "government."

    [e] ATTRIBUTION_LEVEL — set named-actor on the surviving
    attribution (was missing).

    [f] ACTOR_ID — ru/gru/26165/apt28 resolves to
    atlas/actors/ru/apt28.yaml. FLAG (minor): TAG here names only
    "Russia GRU," not unit 26165; the 26165 placement is corroborated
    by other sources on the actor record, so it is not wrong, but this
    particular source supports only nation+service granularity.

    incident_type reduced [intrusion, data-theft] → [espionage]:
    the source describes credential-phishing attempts (largely taken
    down), with no confirmed intrusion or data exfiltration; TAG
    frames the activity as "espionage to phishing campaigns."

    OVERLAP CHECK vs sibling 2022-03/google-tag-eastern-europe-
    disclosure: NOT a duplicate. The March event is the March 30
    bulletin (Sandworm + COLDRIVER + Ghostwriter); this is the
    distinct May 3 bulletin (APT28 + Ghostwriter + Mustang Panda).
    Removing COLDRIVER here also removes the only real overlap risk —
    COLDRIVER is already modeled in the March event.

    RESIDUAL: campaign_id kept as "apt28-coldriver-credential-
    phishing" (shared editorial string with 2023-12/star-blizzard-
    fsb-indictment-sanctions; not edited to avoid splitting the
    cluster and I must not touch the other event) — the "coldriver"
    token is now a slight misnomer for this APT28-only event; flag for
    orchestrator if a rename is wanted.
