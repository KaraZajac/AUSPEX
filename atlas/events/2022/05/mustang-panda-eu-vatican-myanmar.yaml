id: 2022-05/mustang-panda-eu-vatican-myanmar
name: Mustang Panda / RedDelta EU-diplomatic and Vatican/Catholic political-intelligence campaigns
start_date: 2020-05-01  # RedDelta Vatican intrusions began early May 2020 (Recorded Future)
disclosure_date: 2020-07-28  # first public disclosure (Recorded Future RedDelta); Proofpoint EU report followed 2022-03-07
end_date: null
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  Two disclosed China-nexus Mustang Panda / RedDelta political-
  intelligence campaigns. (1) Recorded Future Insikt Group (28 Jul
  2020) documented RedDelta intrusions from early May 2020 against
  the Vatican / Holy See, the Catholic Diocese of Hong Kong, the
  Hong Kong Study Mission to China, and the Pontifical Institute for
  Foreign Missions (PIME, Italy), plus law-enforcement / government
  entities in India and a government organization in Indonesia, using
  a custom PlugX variant — assessed as collection ahead of the
  September 2020 renewal of the 2018 China-Vatican provisional
  agreement. (2) Proofpoint (7 Mar 2022) documented TA416 increasing
  operational tempo against European diplomatic entities (including an
  individual involved in refugee and migrant services) as tensions
  between Russia, Ukraine and NATO escalated, using web-bug / tracking-
  pixel reconnaissance followed by PlugX payloads via malicious URLs.
false_flag_risk: none
campaign_id: mustang-panda-vatican-religious
summary: |
  Mustang Panda / TA416 / RedDelta is a long-running China-aligned
  espionage cluster. This event aggregates the two disclosed political-
  intelligence campaigns its two cited primary sources actually carry:
  Recorded Future's 2020 RedDelta reporting on the Vatican and Catholic
  organizations, and Proofpoint's March 2022 report on TA416's expanded
  European diplomatic targeting during the Russia-Ukraine conflict.
  Recorded Future tracked the 2020 activity as "RedDelta," a suspected
  Chinese state-sponsored cluster with considerable TTP overlap with
  Mustang Panda (BRONZE PRESIDENT / HoneyMyte); AUSPEX maps RedDelta as
  an equivalent alias. Modeled as a campaign envelope for the doctrine-
  tag join rather than a single discrete intrusion.
