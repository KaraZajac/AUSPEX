  Mustang Panda / TA416 / RedDelta was already a long-running
  cluster (active since ~2012); 2022 saw Proofpoint and Recorded
  Future document an expansion into European diplomatic targeting
  alongside its traditional Southeast Asia and Vatican operations.
  No single discrete intrusion — modeled as a year-long campaign
  envelope for the doctrine-tag join.
