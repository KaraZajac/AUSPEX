outcome_summary: |
  Sustained PlugX / TONESHELL spear-phishing campaigns targeting
  EU diplomatic missions, the Vatican, Southeast Asian governments
  (Myanmar, Mongolia, Vietnam, Philippines), and refugee /
  diaspora organizations. Workhorse PRC political-intelligence
  collection cluster — geography tracks Belt and Road diplomatic
  surface plus Tibet / Uyghur diaspora targeting.
