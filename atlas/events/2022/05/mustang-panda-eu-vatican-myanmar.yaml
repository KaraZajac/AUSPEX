    pillar_id: cn/bri/political-intelligence-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Targeting European foreign ministries / diplomatic entities and
      foreign-government bodies (India, Indonesia) is unambiguous PRC
      political-intelligence collection, the behaviour this pillar
      encodes. Graded plausible rather than higher because neither
      cited source names a BRI-linked purpose: Proofpoint ties the 2022
      European campaign to the Russia-Ukraine / NATO crisis, and
      Recorded Future ties the 2020 activity to the China-Vatican
      agreement — so a generic PRC diplomatic-espionage reading survives
      alongside (and arguably ahead of) a specifically BRI reading.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
    inference_basis:
      alternatives:
        - "BRI political-intelligence collection: the diplomatic/foreign-ministry target set fits the pillar's collection-against-diplomatic-decision-makers behaviour."
        - "Generic PRC diplomatic espionage unrelated to BRI: the purposes the sources actually name (Ukraine-conflict intelligence; the China-Vatican agreement) are not Belt-and-Road corridor requirements, so the BRI-specific reading is not the sole survivor."
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The 2020 RedDelta campaign targeted the Vatican and Catholic
      organizations, which Recorded Future assessed as collection to
      gain insight into the Holy See's negotiating position ahead of
      renewing the China-Vatican agreement — an agreement RF ties to the
      CCP gaining "more control and oversight" over China's persecuted
      "underground" Catholic community. Collection against a religious
      community the state seeks to control (extraterritorially, via the
      Holy See and PIME Italy) is the extraterritorial religious/dissident
      collection the pillar encodes. Strongly_inferred (not attested):
      RF states the collection purpose but frames it as diplomatic /
      religious-community intelligence, not in the 2017-law's own
      "state-security threat" terms.
    attesting_source_id: null
    contested: false
    analyst: claude
    inference_basis:
      signals:
        - "RF: intrusions occurred 'ahead of the anticipated September 2020 renewal of the landmark 2018 China-Vatican provisional agreement… the CCP gaining more control and oversight over the country's historically persecuted underground Catholic community.'"
        - "RF: 'The suspected intrusion into the Vatican would offer RedDelta insight into the negotiating position of the Holy See.'"
        - "Extraterritorial reach onto foreign soil (Holy See; PIME, Italy) targeting a religious community the CCP seeks to control."
      ruled_out: "Ordinary diplomatic espionage with no religious-community angle — ruled out because the named victims are specifically Catholic-Church bodies and the assessed purpose centres on the CCP's oversight of the underground Catholic community."
