false_flag_risk: none
summary: |
  Cisco Talos reported a Bitter APT campaign running since August 2021 that expanded the group's usual South Asian targeting to an elite unit of the Bangladeshi government, sending spear-phishing emails to high-ranking officials of the Rapid Action Battalion (RAB). The maldoc lures (RTF and Excel files) exploited CVE-2017-11882, CVE-2018-0798 and CVE-2018-0802 and asked recipients to review operational documents such as call data records and registered-case lists. The payload was a previously undocumented downloader trojan named ZxxZ, which masquerades as a Windows Security update service and supports remote file execution. Talos attributed the campaign to Bitter with moderate confidence based on shared C2 infrastructure and payload-string overlaps with prior Bitter operations.
