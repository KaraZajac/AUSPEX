    attributing_org: Cisco Talos (Asheer Malhotra, Justin Thattil)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2022-03-29
    attribution_source_id: cisco-talos/2022-03-29_transparent-tribe-india-education
    notes: "Talos attributes the campaign to its tracked group Transparent Tribe without hedging ('a campaign operated by the Transparent Tribe APT group'); the Pakistan nexus is stated as 'suspected Pakistan-linked' and NO Pakistani service (ISI) is named — hence named-actor (group + suspected nation), not named-unit, and actor is pk/unscoped/transparent-tribe. The 'high confidence' phrasing in the article attaches to the Zain Hosting infrastructure finding."
doctrine_links:
