id: 2022-03/talos-transparent-tribe-india-education
name: Cisco Talos documents Transparent Tribe shift toward Indian education sector
start_date: 2021-06-01
disclosure_date: 2022-03-29
end_date: 2022-03-01
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cisco Talos documented Transparent Tribe's expansion of
  targeting to Indian educational institutions, with phishing
  lures themed on student documents and admissions
  communications. Tradecraft included Crimson RAT variants and
  obfuscated VBA-macro-laden Office documents. Talos assessed
  the education-sector pivot as either preparation for
  defense-research collection (DRDO-adjacent universities) or
  for general influence / coercive purposes.
false_flag_risk: none
summary: |
  Notable for documenting a victim-set expansion beyond the
  canonical military-government targets — the education-sector
  pivot is one of the rare instances of an APT36 footprint
  outside the traditional collection set.
