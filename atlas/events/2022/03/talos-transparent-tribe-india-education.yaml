id: 2022-03/talos-transparent-tribe-india-education
name: Cisco Talos documents Transparent Tribe shift toward Indian education sector
start_date: 2021-06-01
disclosure_date: 2022-03-29
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cisco Talos documented Transparent Tribe expanding its
  targeting to Indian educational institutions and students — a
  deviation from the group's usual government/military focus and,
  per Talos, an expansion of its victim set to include civilian
  users. Operators delivered maldocs via spear-phishing emails
  using malicious VBA macros to deploy CrimsonRAT (the group's
  Windows implant of choice since at least 2020, seen here in an
  updated/obfuscated build), with attacker-registered domains
  named to appear relevant to students and educational entities.
  Talos assessed the pivot "might be in accordance with their
  nation-state's goal to establish long-term access and steal
  valuable and restricted research from premier research
  institutions associated with the Indian government."
false_flag_risk: none
summary: |
  Notable for documenting a victim-set expansion beyond the
  canonical military-government targets — the education-sector
  pivot is one of the rare instances of an APT36 footprint
  outside the traditional collection set.
attributions:
