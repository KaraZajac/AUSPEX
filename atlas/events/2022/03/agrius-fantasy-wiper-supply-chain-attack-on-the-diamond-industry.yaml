id: 2022-03/agrius-fantasy-wiper-supply-chain-attack-on-the-diamond-industry
name: "Agrius 'Fantasy' wiper supply-chain attack on the diamond industry"
start_date: 2022-03-01
incident_type:
  - wiper
  - destructive
  - supply-chain
initial_vector: supply-chain
false_flag_risk: none
summary: |
  ESET Research attributed a destructive supply-chain attack to the Iran-aligned Agrius group, which abused the software-update mechanism of an Israeli software developer whose suite is used in the diamond industry. On 12 March 2022 Agrius deployed a new wiper named Fantasy together with a lateral-movement and execution tool named Sandals, wiping data at victims in Israel, South Africa and Hong Kong within a few hours. Much of Fantasy's code was copied directly from Agrius's earlier Apostle wiper-turned-ransomware, but Fantasy made no attempt to masquerade as ransomware. Israeli victims included an IT support services company, a diamond wholesaler and an HR consulting firm; the South African victim was a diamond-industry organization and the Hong Kong victim was a jeweler.
attributions:
  # ESET attributes the activity "to the Agrius APT group" (firm, via direct Apostle code reuse)
  # and characterizes the group only as "a newer Iran-aligned group" — no confidence qualifier on
  # the Iran nexus, and NO Iranian service named (no MOIS/IRGC/Tehran). Hence named-actor, not
  # named-unit; the high confidence is in the Agrius-actor attribution (code-copy evidence), not an
  # ESET-stated confidence level for the nation tie. The Iran link is unqualified-aligned, not "attested".
  - actor_id: ir/unscoped/agrius
    attributing_org: "ESET"
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-12-07
    attribution_source_id: welivesecurity/2022-03_agrius-fantasy-wiper-supply-chain-attack
    notes: "ESET: activity 'attributed to the Agrius APT group' (named-actor, on direct Apostle code reuse); group described as 'a newer Iran-aligned group' — no Iranian service (MOIS/IRGC) named and no explicit confidence stated for the nation tie. attribution_date corrected to the report's actual byline (07 Dec 2022); the 2022-03 slug is the stable id, not the publish date."
