false_flag_risk: none
summary: |
  ESET Research attributed a destructive supply-chain attack to the Iran-aligned Agrius group, which abused the software-update mechanism of an Israeli software developer whose suite is used in the diamond industry. On 12 March 2022 Agrius deployed a new wiper named Fantasy together with a lateral-movement and execution tool named Sandals, wiping data at victims in Israel, South Africa and Hong Kong within a few hours. Much of Fantasy's code was copied directly from Agrius's earlier Apostle wiper-turned-ransomware, but Fantasy made no attempt to masquerade as ransomware. Israeli victims included an IT support services company, a diamond wholesaler and an HR consulting firm; the South African victim was a diamond-industry organization and the Hong Kong victim was a jeweler.
