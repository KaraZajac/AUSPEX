    supply-chain abuse of an Israeli software developer's update mechanism; Fantasy wiper +
    Sandals execution tool; wipe on 12 March 2022 (recon from 20 Feb 2022); victims in Israel
    (IT support, diamond wholesaler, HR consulting), South Africa (diamond-industry org) and
    Hong Kong (jeweler); <3-hour campaign; Fantasy = copied Apostle code, no ransomware cover.
    DATE CORRECTION: report byline is 07 Dec 2022, not 2022-03 — source.published_on and the
    attribution_date corrected to 2022-12-07; 2022-03 retained only as the stable slug.
    ATTRIBUTION (exact wording): ESET attributes the activity "to the Agrius APT group" on direct
    Apostle code reuse (named-actor) and characterizes the group only as "a newer Iran-aligned
    group targeting victims in Israel and the United Arab Emirates since 2020" — NO Iranian service
    (MOIS/IRGC/Tehran) named and NO explicit confidence level stated for the nation tie. Removed the
    misleading inline "# ICD link-confidence: attested" comment: there is no attested doctrine link
    (link is strongly_inferred, attesting_source_id null) and ESET states no confidence figure.
    Added attribution_level: named-actor (was absent) — orthogonal to the high org-confidence in the
    Agrius-actor call. Doctrine link ir/resistance-axis/anti-israel-coercion kept strongly_inferred:
    source describes purely-destructive anti-Israel ops but states no strategic purpose, so not
    attested. ACTOR ir/unscoped/agrius CONSISTENT: actor record already de-provisionalized + demoted
    off ir/mois because no cited source names a service; this ESET source's "Iran-aligned"/no-service
    wording corroborates ir/unscoped at named-actor. Targets/sectors match source (no inflation).
    Removed the DEPTH-backfill header.
