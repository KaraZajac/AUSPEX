    CONFLATION GUARDS held: HermeticWiper (2022-02/hermeticwiper,
    23 Feb) and WhisperGate (2022-01/whispergate, attributed to Cadet
    Blizzard/DEV-0586, NOT Sandworm) are separate events; this event's
    facts are confined to IsaacWiper + CaddyWiper. Industroyer2 named
    only as the incident where CaddyWiper recurred (context, not scope).

    RESIDUAL UNCERTAINTY: IsaacWiper's Sandworm attribution is ESET's
    weakest in the wave ("no strong connection yet" to HermeticWiper);
    the single actor block bundles both wipers under S2's hedged
    "majority … varying degrees of confidence," which is the honest
