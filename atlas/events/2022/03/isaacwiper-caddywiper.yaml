initial_vector: unknown
outcome_summary: |
  IsaacWiper hit a Ukrainian governmental network on invasion
  D-day (24 Feb 2022); CaddyWiper was detected on 14 March 2022
  against a Ukrainian bank. Two distinct, code-unrelated wipers in
  the invasion-coincident destructive wave against Ukraine — among
  the densest concentration of destructive nation-state operations
  on record.
false_flag_risk: none
campaign_id: hermetic-wave-feb-2022
summary: |
  Two distinct wipers in the invasion-coincident destructive wave
  against Ukraine. On 24 February 2022 — the day of the invasion —
  ESET detected IsaacWiper against a Ukrainian governmental network;
  it wipes the first 0x10000 bytes of each disk (the region holding
  the master boot record) and then recursively wipes every file,
  using random data from a Mersenne Twister PRNG. ESET recorded that
  IsaacWiper "has no code similarity with HermeticWiper and is way
  less sophisticated," and at disclosure could not attribute it. On
  14 March 2022 ESET detected CaddyWiper against a Ukrainian bank;
  it later recurred loaded by the ArguePatch loader, and in the
  8 April 2022 Industroyer2 incident appeared alongside the ORCSHRED,
  SOLOSHRED and AWFULSHRED wipers for non-Windows platforms (per the
  CERT-UA notification). ESET's February 2023 retrospective
  attributed the majority of the 2022 Ukraine wiper wave to Sandworm
  "with varying degrees of confidence," noting that Sandworm
  generally deployed its wipers through Active Directory Group Policy
  (the POWERGAP script). The broader 2022–2023 wiper wave also
  included DoubleZero, AcidRain (against Viasat KA-SAT modems) and
  SwiftSlicer.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: ESET
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-02-24
    attribution_source_id: eset/2023-02-24_year-of-wiper-attacks-ukraine
    notes: |
      Attribution LATENCY + HEDGE. ESET's initial IsaacWiper report
      (01 Mar 2022, the eset/2022-02-24_… source) explicitly states
      "ESET Research has not yet been able to attribute these attacks
      to a known threat actor," and records that IsaacWiper "has no
      code similarity with HermeticWiper … we haven't found any
      strong connection yet" — IsaacWiper was ESET's LEAST-confident
      attribution and was unattributed at disclosure. The Sandworm
      attribution comes only from ESET's 24 Feb 2023 retrospective,
      which "attribute[s] the majority of these attacks to Sandworm,
      with varying degrees of confidence" (hence moderate /
      concur-with-caveat, not high). ESET names the group "Sandworm"
      (= GRU Unit 74455) but does not spell out the unit in-text, so
      attribution_level is named-actor. Neither cited source carries
      a CERT-UA attribution of these two wipers to Sandworm.
