  notes: |
    Audited against two ESET WeLiveSecurity sources, both already
    raw-snapshotted + hashed (PRESERVE tier; snapshot keys re-verified
    this pass, hashes match byte-for-byte).
    S1 = eset/2022-02-24_hermeticwiper-isaacwiper "IsaacWiper and
    HermeticWizard: New wiper and worm targeting Ukraine" (published
    01 Mar 2022), sha256 9e7dbcbe…ec645a1, 103985 bytes.
    S2 = eset/2023-02-24_year-of-wiper-attacks-ukraine "A year of
    wiper attacks in Ukraine" (24 Feb 2023), sha256 30221f95…6579ab57,
    90658 bytes.

    [a] FACTS — the two distinct wipers verified separately.
    IsaacWiper (S1): "On February 24th, 2022, a second destructive
    attack against a Ukrainian governmental network started, using a
    wiper we have named IsaacWiper" → governmental network, invasion
    day. Mechanism corrected to S1's exact wording: "wipes the first
    0x10000 bytes of each disk using the Mersenne Twister pseudorandom
    generator … then … recursively wipes every file of each disk with
    random bytes also generated by the Mersenne Twister PRNG." STRIPPED
    the prior "zeros the MBR" (IsaacWiper overwrites the first 0x10000
    bytes — which include the MBR — with pseudo-random data; it does
    not zero the MBR). CaddyWiper (S2): "On March 14th, 2022, ESET
    researchers detected an attack using CaddyWiper, which targeted a
    Ukrainian bank" → 14 Mar 2022, a bank. STRIPPED the uncited
    CaddyWiper mechanism block ("overwrites content with null bytes …
    destroys partition information using DeviceIoControl … preserving
    the Domain Controller distinguished name") — neither cited source
    carries it (S1 predates CaddyWiper's 14 Mar discovery; S2 gives
    only the one-sentence detection). Kept only S2-carried CaddyWiper
    facts: ArguePatch loader ("loaded by the ArguePatch loader"),
    and the 8 Apr 2022 Industroyer2 incident where CaddyWiper appeared
    with "wipers for non-Windows platforms: ORCSHRED, SOLOSHRED, and
    AWFULSHRED" (S2, "see the notification by CERT-UA"). Corrected
    "Linux variants" → "wipers for non-Windows platforms" (S2's term)
    and added AWFULSHRED (S2 lists all three). Deployment: kept the
    S2-generalized "Sandworm used Active Directory Group Policy
    (T1484.001) … the POWERGAP script"; STRIPPED "scheduled tasks"
    (in NEITHER source) and dropped the IsaacWiper-specific "valid
    credentials" claim (S1's Valid-Accounts/GPO/Impacket detail is in
    its HermeticWiper section, not IsaacWiper). ANACHRONISM FIXED:
    "AcidPour" → "AcidRain" — S2 names AcidRain ("the AcidRain wiper
    campaign targeted Viasat KA-SAT modems"); AcidPour is a 2024
    successor that a Feb-2023 source cannot mention. DoubleZero
    (S2, 17 Mar 2022) ✓ and SwiftSlicer (S2, 25 Jan 2023) ✓ kept;
    framed as the "2022–2023 wiper wave" since SwiftSlicer is 2023.

    [b] ATTRIBUTION — over-attestation removed. Prior summary said
    "ESET and CERT-UA attributed both wipers to Sandworm on the basis
    of tooling and tradecraft" — NOT carried: (i) S1 explicitly
    disclaims ("ESET Research has not yet been able to attribute these
    attacks to a known threat actor"); (ii) S2 attributes only "the
    majority of these attacks to Sandworm, with varying degrees of
    confidence" (not cleanly "both wipers", no "tooling and tradecraft"
    basis stated); (iii) no CERT-UA attribution of these two wipers to
    Sandworm appears in either cited source. IsaacWiper hedge is
    load-bearing: S1 says IsaacWiper "has no code similarity with
    HermeticWiper … we haven't found any strong connection yet" — the
    weakest link in the wave. Kept actor ru/gru/74455/sandworm but the
    block already carried the correct calibration (ESET / moderate /
    concur-with-caveat / dated 2023-02-24 / sourced to S2, from the
    2026-07-01 pass); converted the stale inline comment to a proper
    notes field and ADDED attribution_level.

    [c] DATES — start_date 2022-02-24 ✓ (IsaacWiper onset, S1/S2).
    disclosure_date 2022-03-01 ✓ (S1 published_on). end_date
    2022-03-31 kept as the scoping boundary for the Feb–Mar wave;
    CaddyWiper's Apr recurrences belong to the separate Industroyer2
    event (2022-04/industroyer2-ukrenergo-attempt) and are cited here
    only as context, not claimed. S1 published_on 2022-03-01 ✓
    (URL /2022/03/01/, title matches; the id slug's "2022-02-24" is
    the stable id, PRESERVED). S2 published_on 2023-02-24 ✓.

    [d] DOCTRINE_LINKS — russkiy-mir/ukraine-theater kept
    strongly_inferred (correct — the pillar goal "Ukraine as
    continuous priority theater / protect compatriots" is strategic
    doctrine that the ESET technical reports never state); ADDED the
    missing inference_basis {source_id, signals, ruled_out}. ADDED a
    second link ru/military-doctrine-2014/non-contact-warfare
    (strongly_inferred, AUSPEX inference) — IsaacWiper's invasion-day
    timing is textbook cyber-kinetic synchronization; mirrors the
    sibling hermeticwiper event's dual-doctrine treatment for this
    same campaign. Both are Russian (attacker) doctrines on a Russian
    attack → attacker-rationale (default, omitted, matching sibling
    schema). Neither is attested (no cited source states the terminal
    goal), so attesting_source_id null on both.

    [e] ATTRIBUTION_LEVEL — was MISSING; set named-actor (S2 names the
    group "Sandworm"; it does not spell out "GRU Unit 74455" in-text,
    so not named-unit). Matches the sibling hermeticwiper event.

    [f] ACTOR_ID — ru/gru/74455/sandworm resolves to
    atlas/actors/ru/sandworm.yaml (internal id matches). No actor-file
    edit. FLAG (not a defect): the actor record's tooling list already
    names "CaddyWiper, IsaacWiper" (line 72) as Sandworm tooling —
    firmer than ESET's hedge, but consistent with the corpus's later
    Mandiant APT44-based actor model; left to the actor-file owner.

    DEFECT FIXED beyond [a]-[f]: target orgs/ukraine-banking-sector
    was a DANGLING FK (no atlas/targets/orgs/ukraine-banking-sector
    registry file; cited by this event only, orphaning nothing).
    Repointed to sectors/finance/banking + country: ua — the corpus
