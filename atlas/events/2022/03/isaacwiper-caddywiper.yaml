id: 2022-03/isaacwiper-caddywiper
name: IsaacWiper / CaddyWiper (Ukraine wiper wave continuation)
start_date: 2022-02-24
disclosure_date: 2022-03-01
end_date: 2022-03-31
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  IsaacWiper deployed against a Ukrainian government network on
  invasion D-day; CaddyWiper deployed in mid-March 2022 against
  Ukrainian banks and government. Data destruction at scale;
  part of the densest concentration of destructive nation-state
  operations on record.
false_flag_risk: none
campaign_id: hermetic-wave-feb-2022
summary: |
  ESET and CERT-UA attributed both wipers to Sandworm on the basis
  of tooling and tradecraft. IsaacWiper overwrites disk contents
  with pseudo-random data and zeros the MBR; CaddyWiper enumerates
  files and overwrites their content with null bytes, then destroys
  partition information using DeviceIoControl, while preserving
  the Domain Controller distinguished name to keep the wiper
  propagating laterally before the domain itself dies. Lateral
  movement to victim hosts used valid credentials and Active
  Directory-based deployment (Group Policy / scheduled tasks)
  consistent with prior Sandworm Ukraine operations, and CERT-UA
  observed CaddyWiper paired with the ArguePatch loader and the
  ORCSHRED / SOLOSHRED Linux variants. The wiper wave continued
  through 2022 with DoubleZero, AcidPour, and SwiftSlicer.
