id: 2022-03/hunt-forward-lithuania-latvia-croatia
name: Hunt Forward Lithuania, Latvia, Croatia (CNMF cluster)
start_date: 2022-02-01  # approximate; Lithuania hunt began before Russia's late-Feb 2022 invasion (c4isrnet 2022-05-05)
disclosure_date: 2022-05-04  # first disclosure: CYBERCOM/Lithuania MoD announced the Lithuania hunt
end_date: 2023-05-10  # last documented component disclosed: the Latvia hunt (see qc DATE/GROUPING flag)
incident_type:
  - documentary  # retyped 2026-07-01: an invited consensual allied hunt-forward is not an adversarial intrusion (CNMF cohort decision)
initial_vector: unknown
outcome_summary: |
  Cluster of officially-acknowledged CNMF Hunt Forward (defensive
  cyber) deployments to Lithuania, Latvia, and Croatia, grouped for
  atlas economy. Lithuania: first-ever US/Lithuanian hunt, a three-
  month operation begun before the late-Feb 2022 Russian invasion of
  Ukraine and concluded early May 2022 (with Lithuania's National
  Cyber Security Center and defense IT service). Croatia: first CNMF
  hunt in Croatia, team returned ~July 2022, with the Croatian SOA
  Cyber Security Centre. Latvia: the documented Latvia hunt was a
  three-month deployment with CERT.LV and the Canadian military,
  announced 10 May 2023 and described by CYBERCOM as the SECOND
  Latvia hunt — i.e. it falls in 2023, not 2022 (see qc flag). Aligns
  with NATO eastern-flank reinforcement following the 2022 invasion.
false_flag_risk: none
summary: |
  Three separate invited, consensual CNMF Hunt Forward deployments
  grouped for atlas economy. Lithuania (concluded ~4 May 2022) and
  Croatia (returned ~July 2022, disclosed 18 Aug 2022) are firmly
  2022 hunts. The Latvia component as documented is CYBERCOM's SECOND
  Latvia hunt, announced 10 May 2023; a first Latvia hunt is referred
  to but is not dated in reachable reporting. Lithuania saw a second
  Hunt Forward deployment (concluded May 2023) tracked separately.
