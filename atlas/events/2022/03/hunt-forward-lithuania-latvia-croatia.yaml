outcome_summary: |
  Cluster of 2022 CNMF Hunt Forward deployments to Lithuania, Latvia,
  and Croatia. Indicators released to VirusTotal. Partner capacity
  built. Aligns with NATO eastern-flank reinforcement following the
  February 2022 Russian invasion of Ukraine.
