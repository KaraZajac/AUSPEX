id: 2022-03/lockbit-2-vasinskyi-extradition
name: Vasinskyi extradited to US — first major RaaS-operator extradition
start_date: 2022-03-03
disclosure_date: 2022-03-03
end_date: 2022-03-03
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  Yaroslav Vasinskyi (Ukrainian national, 22), arrested in Poland
  Oct 8 2021 on a US warrant for his alleged role as the Kaseya
  REvil operator, was extradited to the US March 3 2022 — the
  first extradition of a major RaaS operator to face US criminal
  charges. Vasinskyi was subsequently convicted by jury May 1 2024
  and sentenced to 13 years US federal prison plus USD 16M
  restitution.
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
operators_named:
  - vasinskyi-yaroslav  # REvil, DOJ Nov 2021, extradited Mar 2022
summary: |
  Vasinskyi's Polish-arrest / US-extradition pathway became the
  model for subsequent Anglophone-jurisdictional cybercrime
  enforcement (Scattered Spider, UNC5537, ShinyHunters).
  Notable for occurring one week after the Feb 24 invasion of
  Ukraine — a Ukrainian national arrested for serving a Russian-
  tolerated criminal program.
