id: 2022-03/lockbit-2-vasinskyi-extradition
name: Vasinskyi (REvil/Kaseya operator) extradited to the US and arraigned in Texas
start_date: 2022-03-03
disclosure_date: 2022-03-09
end_date: 2022-03-09
incident_type:
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  Yaroslav Vasinskyi (Ukrainian national, 22), taken into custody
  in Poland on Oct 8 2021 pursuant to the US-Poland extradition
  treaty for his alleged role deploying Sodinokibi/REvil ransomware
  (including the July 2 2021 Kaseya VSA supply-chain attack), was
  extradited to the US — he arrived in Dallas on Mar 3 2022 and made
  his initial appearance / was arraigned in the Northern District of
  Texas on Mar 9 2022. Following his conviction, Vasinskyi was
  sentenced on May 1 2024 to 13 years and 7 months in prison and
  ordered to pay over USD 16M in restitution; DOJ tallied him to
  over 2,500 REvil attacks demanding more than USD 700M.
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
operators_named:
  - vasinskyi-yaroslav  # REvil, DOJ Nov 2021 indictment; extradited Mar 2022; sentenced May 2024
summary: |
  A law-enforcement / extradition milestone in the REvil (Sodinokibi)
  cases: Vasinskyi, the alleged Kaseya operator arrested in Poland,
  was surrendered to the US and arraigned in Texas. DOJ describes him
  as "a Ukrainian national with ties to a ransomware group linked to
  Russia-based actors" — a criminal RaaS affiliate, not a state
  organ (hence criminal/revil, no doctrine link). Notable for
  occurring days after the Feb 24 2022 invasion of Ukraine.
