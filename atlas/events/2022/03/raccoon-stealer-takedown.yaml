  notes: |
    Audited against the RAW cited sources. STEP 0 triage = PHANTOM SOURCE
    -> RE-SOURCE (badrabbit model). The originally cited DOJ source
    (doj/2022-10-25_sokolovsky-raccoon-extradition, slug
    `raccoon-stealer-developer-mark-sokolovsky-extradited`) is a PHANTOM:
    the URL never existed on justice.gov (Internet Archive CDX returns
    ZERO captures 2022-2025; the live URL only 200s because Akamai serves
    a bot interstitial before any 404 check). It also conflated the
    Oct-2022 indictment announcement with the Feb-2024 extradition. The
    REAL primaries were located, snapshotted and wired in.

    SNAPSHOTS (all three sources now snapshotted -> level full):
    - doj/2022-10-25_newly-unsealed-indictment-sokolovsky-raccoon (NEW,
      genuine Oct-25-2022 WDTX PR "Newly Unsealed Indictment Charges
      Ukrainian National with International Cybercrime Operation").
      Live justice.gov is Akamai bot-walled; snapshot is of the genuine
      primary preserved by IA capture 20221025173847. sha256
      f3a8962c…12146041, 45,475 bytes.
    - doj/2024-02-15_sokolovsky-raccoon-extradited (NEW, genuine Feb-15-2024
      WDTX PR "Ukrainian National Extradited to U.S. for Alleged
      Cybercrimes"; IA capture 20240215223957). sha256 d26a9c3b…e9451997,
      97,433 bytes. Pins the actual extradition to Feb 2024.
    - krebs/2022-10-25_raccoon-developer-fled-ukraine (live 200, 80,638
      bytes; sha256 e871345e…cfee7fb4). published_on date defect fixed in
      the source record (2022-10-25 -> 2022-10-31 per schema.org
      datePublished / "October 31, 2022" byline); id-slug date left as-is
      to preserve the FK (orchestrator may rename).

    [a] FACTS — corrected. KEPT (source-carried verbatim): the March-2022
    FBI + Italy + Netherlands infrastructure dismantling — DOJ: "In March
    2022, concurrent with Sokolovsky's arrest by Dutch authorities, the
    FBI and law enforcement partners in Italy and the Netherlands
    dismantled the digital infrastructure supporting the Raccoon
    Infostealer, taking its then existing version offline"; the 50M figure
