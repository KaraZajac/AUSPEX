id: 2022-03/raccoon-stealer-takedown
name: Raccoon Stealer infrastructure dismantled; Sokolovsky detained
start_date: 2022-03-20  # AUDIT 2026-07-10: was 2022-03-15 (unsourced). Krebs: Sokolovsky arrested in the Netherlands on Mar. 20, 2022 and the Raccoon infrastructure seized concurrently; DOJ says only "In March 2022".
disclosure_date: 2022-10-25  # DOJ WDTX indictment unsealed / raccoon.ic3.gov announced
end_date: 2022-10-25  # indictment-unsealing milestone (disclosure); the takedown ACTION itself was March 2022
incident_type:
  - disruption
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  In March 2022, concurrent with Mark Sokolovsky's arrest by Dutch
  authorities, the FBI and law-enforcement partners in Italy and the
  Netherlands dismantled the digital infrastructure supporting the
  Raccoon Infostealer malware-as-a-service, taking its then-existing
  version offline. Raccoon was leased to criminal customers for
  approximately $200/month in cryptocurrency and used — via ruses such
  as email phishing — to steal log-in credentials and financial data;
  the FBI identified more than 50 million unique credentials and forms
  of identification (including over four million email addresses) from
  what it described as millions of potential victims worldwide, and
  stood up raccoon.ic3.gov for victim notification. Stolen data was
  used to commit financial crimes or resold on cybercrime forums.
  Sokolovsky, a 26-year-old Ukrainian national, was detained in the
  Netherlands in March 2022 after fleeing Ukraine following the Russian
  invasion; a WDTX federal grand-jury indictment was unsealed on
  Oct 25, 2022 while he was held pending extradition, and he was
  extradited to the United States in February 2024 (initial court
  appearance Feb 9, 2024).
false_flag_risk: none
summary: |
  AUSPEX classifies this as criminal-baseline: a financially motivated
  infostealer malware-as-a-service with no state nexus or doctrinal
  targeting. Analytically, the FBI-led Raccoon takedown prefigures the
  later US-involved infostealer-enforcement tempo — court-ordered
  infrastructure seizure paired with operator indictment/extradition,
  e.g. Operation Magnus / RedLine (Oct 2024) — but that template
  lineage is AUSPEX framing, not a claim carried by the cited primaries.
