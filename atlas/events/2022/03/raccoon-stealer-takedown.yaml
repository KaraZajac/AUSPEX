id: 2022-03/raccoon-stealer-takedown
name: Raccoon Stealer infrastructure dismantled; Sokolovsky detained
start_date: 2022-03-15
disclosure_date: 2022-10-25
end_date: 2022-10-25
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  FBI, Italian, and Dutch law enforcement dismantled the
  command-and-control infrastructure of the Raccoon Stealer
  malware-as-a-service in March 2022. The malware harvested
  50M+ credentials from approximately 200K victim devices
  and was a major supply for Genesis Market and the broader
  infostealer-log resale ecosystem. Alleged developer
  Mark Sokolovsky (Ukrainian national) was detained in
  the Netherlands while fleeing the Russian invasion of
  Ukraine, and extradited to the US in October 2022 to
  face charges in the Western District of Texas.
false_flag_risk: none
summary: |
  The Raccoon takedown was the precursor to the larger
  Operation Magnus / RedLine action (Oct 2024) and the
  Lumma disruption (May 2025) — the canonical infostealer-
  enforcement template later refined into court-ordered
  domain seizure plus operator-extradition. AUSPEX
  classifies as criminal-baseline.
