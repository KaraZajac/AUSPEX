qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs the genuine live Google TAG article "Tracking cyber
    activity in Eastern Europe" (2022-03-30). Raw snapshot captured:
    sha256 839c6368…5185ac82, 363723 bytes. Source is a real primary
    article (not a phantom); NO re-sourcing needed — the defect was
    over-claiming/fabricated event prose, corrected in place.
    [a] FACTS — the article documents EXACTLY three clusters:
    "Curious Gorge, a group TAG attributes to China's PLA SSF, has
    conducted campaigns against government and military organizations
    in Ukraine, Russia, Kazakhstan, and Mongolia"; "COLDRIVER, a
    Russian-based threat actor sometimes referred to as Calisto, has
    launched credential phishing campaigns, targeting several US
    based NGOs and think tanks, the military of a Balkans country,
    and a Ukraine based defense contractor. However, for the first
    time, TAG has observed COLDRIVER campaigns targeting the military
    of multiple Eastern European countries, as well as a NATO Centre
    of Excellence"; "Ghostwriter, a Belarusian threat actor, recently
    introduced a new capability into their credential phishing
    campaigns" (Browser-in-the-Browser on compromised sites, ua-*
    domains). REMOVED as FABRICATED/unsupported (verified absent from
    the raw text): (1) the entire Sandworm attribution + "Sandworm
    credential phish against Ukrainian state employees" — "sandworm"
    does not appear in the source; (2) "FSB Center 18" and "UNC1151"
    labels — source says only "Russian-based" / "Belarusian";
    (3) COLDRIVER targeting "UK-based NGOs and European defense think
    tanks" — source says US-based NGOs/think tanks (Balkans/Eastern-
    European militaries, NATO CoE); (4) Ghostwriter targeting "Polish
    and Lithuanian government inboxes" — "poland/polish/lithuania"
    absent; (5) "domain takedowns, Safe Browsing additions, Gmail
    warnings" — none of those phrases appear in the article. Rewrote
    summary/outcome_summary to the three attested clusters. Added
    incident_type documentary (multi-actor activity/IOC report);
    initial_vector phishing (the article's subject).
    [b] ATTRIBUTION — kept COLDRIVER (star-blizzard) and Ghostwriter,
    both firmly named by TAG → attributing_org_confidence high,
    concur. NOTE: Curious Gorge IS attributed by TAG (China PLA SSF)
    but there is NO curious-gorge actor file in atlas/actors — could
    not add the FK; described in prose and FLAGGED below.
    [c] DATES — source published_on 2022-03-30 correct; disclosure
    2022-03-30 correct; start_date 2022-02-24 (invasion, the war-lure
    window the article covers) retained.
    [d] DOCTRINE_LINKS — no link is attested; both russkiy-mir/
    ukraine-theater and nato-ultimatum-2021/nato-degradation kept at
    strongly_inferred (honest: the bulletin states no goal). Fixed
    link reasoning to the actual (US/Eastern-European/NATO) targeting
    and backfilled inference_basis.signals + ruled_out on both.
    [e] ATTRIBUTION_LEVEL — set named-actor on both surviving entries
    (named group + nation; NOT named-unit — no service named here).
    [f] ACTOR_ID — ru/fsb/center-18/star-blizzard and
    by/unscoped/ghostwriter both resolve. Residual: TAG here supports
    only nation-level for COLDRIVER, while the actor id encodes FSB
    Center 18 (a later, correct attribution) — noted, not a defect.
    FLAGS: (1) MISSING ACTOR — Curious Gorge (China PLA SSF) is named
    and attributed by TAG but has no actor record (atlas/actors has
    no curious-gorge / gorge file; cn/unscoped/mustang-panda is a
    DIFFERENT group). Orchestrator should create it and add the
    attribution. (2) Removed the phantom Sandworm attribution — if no
    other event sources this actor to TAG-2022-03-30, no action
    needed; this was event-local fabrication, not a source problem.
