id: 2022-03/google-tag-eastern-europe-disclosure
name: Google TAG Eastern Europe disclosure — Curious Gorge, COLDRIVER, Ghostwriter post-invasion activity
start_date: 2022-02-24
disclosure_date: 2022-03-30
end_date: 2022-03-30
incident_type:
  - documentary
  - disclosure
  - attribution-publication
initial_vector: phishing
outcome_summary: |
  Google TAG published "Tracking cyber activity in Eastern Europe"
  documenting three named clusters observed over the preceding two
  weeks of the invasion. Curious Gorge — which TAG attributes to
  China's PLA SSF — ran campaigns against government and military
  organizations in Ukraine, Russia, Kazakhstan, and Mongolia.
  COLDRIVER (aka Calisto), described as a Russian-based threat
  actor, launched credential-phishing against several US-based NGOs
  and think tanks, the military of a Balkans country, and a
  Ukraine-based defense contractor, and — for the first time —
  against the military of multiple Eastern European countries and a
  NATO Centre of Excellence. Ghostwriter, a Belarusian threat
  actor, adopted the "Browser in the Browser" technique in its
  Ukraine-focused credential-phishing (hosting spoofed login pages
  on compromised sites).
false_flag_risk: none
summary: |
  Google TAG bulletin documenting post-invasion phishing/credential
  activity across Chinese, Russian, and Belarusian clusters using
  the Ukraine war as a lure. A documentary multi-actor activity
  report (IOC domains/IPs, no single operation); TAG attributes each
  cluster firmly by name but, in this article, gives only the
  nation-level attribution ("Russian-based", "Belarusian", "China's
  PLA SSF") — it does not name FSB Center 18, UNC1151, or any
  service, nor does it mention Sandworm or Mustang Panda (those
  appear in the separate 2022-03-07 TAG update). Pairs editorially
  with later invasion-phase reporting (Microsoft's April 2022 report
  and CERT-UA disclosures) for the broader tempo picture.
