id: 2022-03/google-tag-eastern-europe-disclosure
name: Google TAG Eastern Europe disclosure — Sandworm, COLDRIVER, Ghostwriter post-invasion activity
start_date: 2022-02-24
disclosure_date: 2022-03-30
end_date: 2022-03-30
incident_type:
  - disclosure
  - attribution
initial_vector: null
outcome_summary: |
  Google TAG published "Tracking cyber activity in Eastern Europe"
  covering post-invasion Russian / Belarusian targeting of
  Ukrainian, Polish, and European users. Documented Sandworm
  credential phish against Ukrainian state employees, COLDRIVER
  (FSB Center 18) phishing of UK-based NGOs and European defense
  think tanks, Ghostwriter (UNC1151) targeting of Polish and
  Lithuanian government inboxes, and parallel Curious Gorge (PLA)
  activity against Ukrainian and Mongolian government targets.
false_flag_risk: none
summary: |
  Foundational Google TAG disclosure for the post-invasion
  Eastern European threat picture. Doctrinally significant because
  TAG paired the actor-tracking with concrete defensive
  interventions — domain takedowns, Safe Browsing additions, Gmail
  warnings — and established the cadence of TAG quarterly bulletins
  through 2022. Pairs with Microsoft's April 2022 "Hybrid War"
  report and CERT-UA disclosures for a comprehensive picture of
  invasion-phase Russian cyber tempo.
