id: 2022-03/ronin-bridge
name: Ronin Bridge theft (Axie Infinity)
start_date: 2022-03-23
disclosure_date: 2022-03-29
end_date: 2022-03-23
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Attackers obtained five of nine Ronin sidechain validator keys
  via spear-phishing a Sky Mavis engineer with a forged job offer,
  then signed two transactions draining approximately USD 625M in
  ETH and USDC from the bridge. The theft was undetected for
  approximately six days until a user withdrawal failed and Sky
  Mavis discovered the depleted reserves.
quantified_impact:
  usd_stolen: 625000000
  asset_classes:
    - ETH
    - USDC
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  At the time, the largest DeFi theft on record. The Treasury
  designation 22 days later was the first US government action to
  formally attribute a major crypto-bridge theft to the DPRK and
  explicitly tie the proceeds to WMD-program funding, establishing
  the canonical attribution pattern subsequently used for Harmony,
  Atomic Wallet, DMM, and Bybit.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: US Treasury OFAC
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2022-04-14
    attribution_source_id: treasury/2022-04-14_lazarus-axie
    notes: |
      OFAC added the receiving Ethereum address
      0x098B716B8Aaf21512996dC57EB0615e2383E2f96 to the SDN list
      and named the Lazarus Group as the perpetrator. Chainalysis
      published the on-chain tracing the same day.
doctrine_links:
  - doctrine_id: kp/byungjin
    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: attested
    reasoning: |
      Treasury's 2022-04-14 press release states that "the Lazarus
      Group ... is a state-sponsored cyber hacking group that is
      attributed to the Reconnaissance General Bureau (RGB) ...
      [and] the funds ... support the DPRK's weapons of mass
      destruction and ballistic missile programs." This is
      gold-standard attestation per the SCHEMA definition.
    attesting_source_id: treasury/2022-04-14_lazarus-axie
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/ronin-bridge
    role: primary
    outcome: |
      USD 625M drained from bridge reserves. Sky Mavis later
      restored Axie user balances via fundraising; bridge operator
      losses absorbed by Sky Mavis and parent Animoca-backed
      investors.
sources:
  - treasury/2022-04-14_lazarus-axie
  - chainalysis/2022-04-14_ronin-tracing
  - skymavis/2022-04-27_root-cause-postmortem
  - fbi/2022-04-14_ronin-attribution
