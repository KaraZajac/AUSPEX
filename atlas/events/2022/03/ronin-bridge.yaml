  notes: |
    Full 6-point audit vs snapshotted raw. Event is REAL and
    correctly identified. Headline correction: the doctrine_link was
    OVER-ATTESTED on a fabricated quote (see [d]). level=partial
    because one cited source (Chainalysis) is un-snapshottable
    (link-rotted, no Wayback) — its one claim is mirror-corroborated.

    [a] FACTS. All on-chain figures verified against the Sky Mavis
    snapshot (sha 57197598…): "The Ronin bridge has been exploited
    for 173,600 Ethereum and 25.5M USDC", "on March 23rd ... in two
    transactions", "The attacker used hacked private keys in order to
    forge fake withdrawals", "9 validator nodes ... five out of the
    nine validator si[gnatures]" (confirms five-of-nine), Axie DAO
    validator reached "using the gas-free RPC", "increased the
    validator threshold from five to eight", discovery "after a
    report from a user being unable to withdraw 5k ETH". VECTOR: the
    snapshot says "All evidence points to this attack being socially
    engineered" — it does NOT contain "phishing", "job offer",
    "LinkedIn", "spear", or "employee" (all 0 hits). The
    "spear-phishing a Sky Mavis engineer with a forged job offer"
    prose was therefore STRIPPED and softened to "social engineering"
    (the fake-job/LinkedIn lure is from later reporting — The Block,
    Jul 2022 — not the 4 cited sources). initial_vector kept as
    "phishing" (corpus's social-engineering bucket) with a clarifying
    comment. USD: FBI (cited primary) says "$620 million"; no cited
    snapshotted source says "$625M" (that valuation traces to the
    un-snapshottable Chainalysis post). Aligned usd_stolen 625M ->
    620M and prose to "173,600 ETH + 25.5M USDC (~USD 620M)".

    [b] ATTRIBUTION. FBI snapshot (sha 2deed3ad…) is the narrative
    attributor: "we were able to confirm Lazarus Group and APT38,
    cyber actors associated with the DPRK, are responsible for the
    theft of $620 million in Ethereum reported on March 29." ADDED an
    FBI attribution entry (was only OFAC). OFAC snapshot (sha
    1487dcbb…, re-verified this audit) is a bare "North Korea
    Designation Update" adding ETH addr
    0x098B716B8Aaf21512996dC57EB0615e2383E2f96 to the LAZARUS GROUP
    SDN entry (E.O. 13722) — no narrative/figure. Both -> concur /
    high / named-actor. actor_id kp/rgb/lazarus HELD (resolves to
    atlas/actors/kp/lazarus.yaml; RGB placement rests on that actor's
    OWN cited sources — DOJ/Mandiant — NOT on the sources cited here,
    neither of which names RGB). attribution_level named-actor added
    to both entries.

    [c] DATES. start 2022-03-23 (Sky Mavis "on March 23rd") ✓;
    disclosure 2022-03-29 (Sky Mavis "posted 3/29/2022 8:29am PST";
    FBI "reported on March 29") ✓; end 2022-03-23 (single-day drain)
    ✓; attribution 2022-04-14 (FBI + OFAC, both snapshots) ✓.

    [d] DOCTRINE — headline finding. Was confidence=attested with
    reasoning quoting a "Treasury 2022-04-14 press release": "the
    Lazarus Group ... attributed to the Reconnaissance General Bureau
    (RGB) ... [and] the funds ... support the DPRK's weapons of mass
    destruction and ballistic missile programs." This quote is
    FABRICATED — it appears in NO cited source. OFAC snapshot term
    scan: Reconnaissance=0, RGB=0, WMD=0, ballistic=0, weapons=0,
    "mass destruction"=0 (and no $ figure, no "Ronin"/"Axie"). FBI
    snapshot names APT38 (not RGB) and says only "generate revenue
    for the regime" — no WMD/missile terminal goal. DOWNGRADED to
    strongly_inferred; removed the fabricated quote + the
    attesting_source_id=treasury claim; built inference_basis on the
    FBI revenue signal + OFAC sanctions-evasion action + DeFi-bridge
    target_sector; ruled_out = strategic-goal attestation. Summary's
    "explicitly tie the proceeds to WMD-program funding" over-claim
    likewise removed. (Per task rule: sanctions-evasion doctrine =
    strongly_inferred unless a cited Treasury/OFAC source states the
    WMD terminal goal in substance — none here does.)

    [e] ATTRIBUTION_LEVEL. named-actor on both attributions (FBI
    names Lazarus Group + APT38; OFAC designates the LAZARUS GROUP
    SDN entry). Not named-unit — no cited source here names RGB/a
    specific bureau.

    [f] ACTOR_ID. kp/rgb/lazarus resolves (id field in
    atlas/actors/kp/lazarus.yaml). Not a counter-action — DPRK is the
    perpetrator, actor_id correctly non-null.

