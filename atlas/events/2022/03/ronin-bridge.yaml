      and the WMD/ballistic-missile programs — that quote does NOT
      exist in the cited OFAC SDN update (snapshot term scan:
      RGB=0, WMD=0, ballistic=0, weapons=0). It was a fabrication.
    attesting_source_id: fbi/2022-04-14_ronin-attribution
    inference_basis:
