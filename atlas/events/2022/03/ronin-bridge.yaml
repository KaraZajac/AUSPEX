id: 2022-03/ronin-bridge
name: Ronin Bridge theft (Axie Infinity)
start_date: 2022-03-23
disclosure_date: 2022-03-29
end_date: 2022-03-23
incident_type:
  - financial-theft
initial_vector: phishing  # cited Sky Mavis snapshot says "socially engineered"; enum has no social-engineering value (phishing = that bucket). The fake-job-offer/LinkedIn spear-phishing lure is from later reporting (The Block, Jul 2022), not the 4 cited sources.
outcome_summary: |
  Attackers gained control of five of the nine Ronin sidechain
  validator signatures (the threshold required to approve a
  withdrawal), including the Axie DAO validator reached via a
  gas-free RPC allowlist, using hacked private keys obtained
  through social engineering of a Sky Mavis employee. They then
  signed two transactions draining 173,600 ETH and 25.5M USDC
  (valued at approximately USD 620M) from the bridge. The theft
  went undetected for roughly six days until a user reported an
  inability to withdraw 5,000 ETH and Sky Mavis discovered the
  depleted reserves.
quantified_impact:
  usd_stolen: 620000000
  asset_classes:
    - ETH
    - USDC
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  At the time, among the largest crypto thefts on record. On
  2022-04-14 — 22 days after the drain — the FBI publicly attributed
  the theft to the Lazarus Group and APT38, and OFAC added the
  receiving Ethereum address to the existing LAZARUS GROUP SDN entry.
  The FBI framed the proceeds as the DPRK's use of "cryptocurrency
  theft ... to generate revenue for the regime"; neither the FBI
  statement nor the bare OFAC SDN update named the DPRK weapons
  program or an RGB unit. This same-day FBI-attribution /
  OFAC-designation pattern was subsequently repeated for Harmony,
  Atomic Wallet, DMM, and Bybit.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: US FBI
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_level: named-actor
    attribution_date: 2022-04-14
    attribution_source_id: fbi/2022-04-14_ronin-attribution
    notes: |
      FBI statement (2022-04-14), verbatim: "Through our investigation
      we were able to confirm Lazarus Group and APT38, cyber actors
      associated with the DPRK, are responsible for the theft of $620
      million in Ethereum reported on March 29." This is the narrative
      attribution. The FBI names no specific RGB unit and no weapons
      program — only the DPRK's use of "cryptocurrency theft ... to
      generate revenue for the regime."
  - actor_id: kp/rgb/lazarus
    attributing_org: US Treasury OFAC
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_level: named-actor
    attribution_date: 2022-04-14
    attribution_source_id: treasury/2022-04-14_lazarus-axie
    notes: |
      OFAC's 2022-04-14 "North Korea Designation Update" added the
      receiving digital-currency address
      0x098B716B8Aaf21512996dC57EB0615e2383E2f96 to the existing
      LAZARUS GROUP SDN entry (E.O. 13722). The SDN update itself is a
      bare list update — it carries no narrative, no dollar figure,
      and no RGB/WMD/ballistic language (verified against snapshot,
      term scan RGB/WMD/ballistic/weapons = 0). On-chain tracing was
      attributed to Chainalysis the same day (corroborated by Sky
      Mavis: "working with Chainalysis to monitor the stolen funds");
      the Chainalysis blog post is now link-rotted / un-snapshottable.
