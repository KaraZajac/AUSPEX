id: 2022-01/trend-micro-earth-karkaddan-arsenal
name: Trend Micro publishes Earth Karkaddan (APT36) attack-chain and arsenal profile
start_date: 2020-01-01
disclosure_date: 2022-01-24
end_date: 2022-01-24
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Trend Micro Research published a technical profile of APT36 —
  internally designated Earth Karkaddan by Trend Micro — tracing
  the cluster's attack chain from spear-phishing emails and a USB
  worm through Crimson RAT, ObliqueRAT, and the Android CapraRAT
  implant. Drawing on Smart Protection Network telemetry gathered
  January 2020 to September 2021, the piece documented continued
  targeting of Indian military, diplomatic, and government entities
  (a Centre for Land Warfare Studies document was among the lures),
  and equated Earth Karkaddan with the Transparent Tribe / Operation
  C-Major / PROJECTM / Mythic Leopard cluster that has been "stealing
  information since 2016". Trend Micro's independent naming added a
  further vendor lineage on the cluster (after Proofpoint 2016 and
  Secureworks 2017).
false_flag_risk: none
summary: |
  Vendor-naming-reconciliation event introducing the Earth
  Karkaddan alias and consolidating mid-period Transparent Tribe
  tooling documentation (Crimson RAT, ObliqueRAT, CapraRAT). Trend
  Micro profiles continued targeting of Indian military and
  diplomatic resources. NB: the report contains no Afghanistan
  content — an earlier partial-excerpt Afghan-targeting claim, the
  afghan-collection doctrine link, and the afghan-government target
  were removed on audit (2026-07-01).
