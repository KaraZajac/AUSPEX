  notes: |
    Audited vs Trend Micro "Investigating APT36 or Earth Karkaddan's Attack
    Chain and Malware Arsenal" (2022-01-24). Raw snapshot captured + hashed:
    sha256 e76ee4ad…81cbf9c7, 95,543 bytes. NOT a phantom — title/body match
    the citation. NOT a duplicate of the sibling apt36-pension-portal-lures
    (2021-12) or zscaler-apt36-updated-arsenal (2023-09): this is the distinct
    2022-01 arsenal/naming-reconciliation report.
    [a] FACTS ✓/CORRECTED: verbatim-carried — "APT36, also known as Earth
    Karkaddan… has historically targeted Indian military and diplomatic
    resources"; aliases Operation C-Major / PROJECTM / Mythic Leopard /
    Transparent Tribe; arrival via "spear-phishing emails and a USB worm";
    Crimson RAT (19 hits), ObliqueRAT (3), CapraRAT/Capra Android RAT (9+);
    SPN telemetry "gathered from January 2020 to September 2021"; "stealing
    information since 2016"; Centre for Land Warfare Studies (CLAWS) lure.
    KEY CORRECTION: the report contains ZERO Afghanistan content ("Afghan"/
    "Afghanistan" = 0 hits across the full 95.5 KB). Removed the fabricated
    "Indian AND Afghan… defense-research" claim from outcome_summary, the
    afghan-collection doctrine link, and the orgs/afghan-government target.
    The event's own prior reasoning admitted the Afghan detail rested on a
    "partial excerpt… re-verify against the full report" — re-verified: it is
    unsupported. (Bonus: orgs/afghan-government was also a DANGLING FK — no
    such target file exists.) Rewrote outcome_summary/summary to source-carried
    facts.
    [b] ATTRIBUTION: Trend Micro firmly equates Earth Karkaddan with APT36/
    Transparent Tribe et al. → added attribution_level: named-actor; kept
    attributing_org_confidence high (identity/profile stated as fact),
    auspex_assessment concur. Added a note: Trend Micro does NOT name Pakistan
    or any Pakistani service as sponsor here (only a "Canteen Stores Department
    / Pakistani Ministry of Defence" LURE theme); the pk/ nexus comes from the
    actor record's other sources, not this report. No over-attestation.
    [c] DATES: source published_on 2022-01-24 matches the article ("Jan 24,
    2022") ✓. disclosure_date/end_date 2022-01-24 ✓. Corrected start_date
    2021-01-01 → 2020-01-01 to match the report's explicit observation window
