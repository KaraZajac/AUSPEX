id: 2022-01/trend-micro-earth-karkaddan-arsenal
name: Trend Micro publishes Earth Karkaddan (APT36) attack-chain and arsenal profile
start_date: 2021-01-01
disclosure_date: 2022-01-24
end_date: 2022-01-24
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Trend Micro Research published a technical profile of APT36 —
  internally designated Earth Karkaddan by Trend Micro — tracing
  the cluster's attack chain from spear-phishing through Crimson
  RAT and Capra-family implant deployment. The piece documented
  continued targeting of Indian and Afghan military, diplomatic,
  and defense-research entities through 2021. Trend Micro's
  independent naming and corroboration provided a third tier-2
  vendor lineage on the Pakistani-aligned cluster (after
  Proofpoint 2016, Secureworks 2017).
false_flag_risk: none
summary: |
  Vendor-naming-reconciliation event introducing the Earth
  Karkaddan alias and consolidating mid-period Transparent Tribe
  tooling documentation. The Afghan targeting documented in this
  piece supports the doctrine's secondary Afghan-collection
  pillar.
