id: 2022-01/cyber-partisans-bzhd-disruption
name: Belarusian Cyber Partisans disrupt BZhD railway IT systems on eve of Russian invasion
start_date: 2022-01-24
disclosure_date: 2022-01-24
end_date: null  # no source documents an end; keys were held pending demands that were never met, disruption tapered without a dated resolution
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  The Belarusian Cyber Partisans opposition collective announced
  it had encrypted servers, databases, and workstations belonging
  to Belarusian Railway (BZhD / БЖД), the state operator whose
  rolling stock was being used to move Russian military equipment
  toward the Ukrainian border. Framed as a disruption rather than
  a wiper, the collective said it would surrender the decryption
  keys only on two conditions: the release of 50 political
  prisoners it described as most in need of medical assistance,
  and the prevention of any Russian troop presence in Belarus.
  Service disruptions in ticketing systems were confirmed by BZhD
  and independent Belarusian press (the railway reported on
  24 January that electronic tickets were unavailable for
  "technical reasons"); the extent of disruption to military
  transport itself remains disputed.
false_flag_risk: none
summary: |
  Inverted-attribution event documented for context: the Belarusian
  Cyber Partisans are an anti-Lukashenko / anti-Russia opposition
  hacktivist collective — a counter-state actor acting AGAINST its
  own state, not a state-aligned cluster. Included in the Belarusian
  dossier because (a) their target was Belarusian state critical
  infrastructure being used in the lead-up to the Russian invasion
  of Ukraine, and (b) the Belarusian state's standing posture toward
  the collective — its August-2021 "extremist" designation and the
  1 December 2021 Supreme-Court "terrorist" classification of the
  Cyber Partisans network, alongside ongoing KGB/GUBOPiK surveillance
  of opposition Telegram channels — instantiates the
  regime-stability-monitoring pillar of the 2019 doctrine. That
  posture predates and frames the state's response to the railway
  action rather than being a documented reaction to it specifically.
