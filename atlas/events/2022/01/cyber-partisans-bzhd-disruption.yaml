id: 2022-01/cyber-partisans-bzhd-disruption
name: Belarusian Cyber Partisans disrupt BZhD railway IT systems on eve of Russian invasion
start_date: 2022-01-23
disclosure_date: 2022-01-24
end_date: 2022-01-27
incident_type:
  - destructive
  - intrusion
initial_vector: unknown
outcome_summary: |
  The Belarusian Cyber Partisans opposition collective announced
  it had encrypted servers, databases, and workstations belonging
  to Belarusian Railway (BZhD / БЖД), the state operator whose
  rolling stock was being used to move Russian military equipment
  toward the Ukrainian border. The collective stated its demand
  was the release of 50 named political prisoners and the
  withdrawal of Russian troops from Belarus. Service disruptions
  in ticketing systems were confirmed by BZhD and independent
  Belarusian press; the extent of disruption to military
  transport itself remains disputed.
false_flag_risk: none
summary: |
  Inverted-attribution event documented for context: Belarusian
  Cyber Partisans are an opposition / counter-state actor, not a
  state-aligned cluster. Included in the Belarusian dossier
  because (a) their target was Belarusian state critical
  infrastructure being used in the lead-up to the Russian
  invasion of Ukraine, and (b) the response from the Belarusian
  state — KGB criminal cases, expanded surveillance of
  opposition Telegram channels — illustrates the
  regime-stability-monitoring pillar of the 2019 doctrine in
  operation.
