    disrupt operations." Global Voices (962f5e6e…) quotes the same
    self-claim ("At the command of the terrorist Lukashenka, #Belarusian
    Railway allows the occupying troops to enter our land. We encrypted
    some of BR's servers, databases and workstations to disrupt its
    operations"). Ticketing disruption VERIFIED (Global Voices): "the
    Belarusian Railway service reported on January 24 that electronic
    tickets were unavailable, citing undisclosed 'technical reasons.'"
    CORRECTIONS: (1) demands "50 NAMED political prisoners and the
    WITHDRAWAL of Russian troops" -> "50 political prisoners in the most
    need of medical assistance" + "prevention of any Russian troop
    presence" (CyberScoop: "50 political prisoners they say are the most
    in need of medical attention [and] want Russian troops to stay out
    of their country"; Global Voices: keys offered "on the condition
    that 50 Belarusian political prisoners whose health was precarious
    were released and the presence of Russian troops in the country"
    prevented — "named"/"withdrawal" were inaccurate). (2) Added the
    keys-offered / reversible-encryption framing (Global Voices:
    "prepared to hand over encryption keys on the condition that…") —
    this is why the op is disruption, not a wiper. (3) summary SOFTENED:
    removed the unsourced "KGB criminal cases [in response to this hack]"
    claim; the "extremist" (Aug 2021) and Supreme-Court "terrorist"
    (1 Dec 2021) designations PREDATE the Jan-2022 attack, so they frame
    (not react to) it — reworded accordingly. "military-transport impact
    disputed" hedge kept (accurate; RFE/RL "downplaying" reporting).
    No fabricated malware/CVE/figure found; routing/switching-device
    claim present in some outlets was deliberately NOT asserted (the
    self-claim, per CyberScoop, names only servers/databases/workstations).

