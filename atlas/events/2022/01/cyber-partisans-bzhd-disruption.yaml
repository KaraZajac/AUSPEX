    [a] FACTS — all load-bearing positive claims carried by snapshotted
    sources. "encrypted servers, databases, and workstations" VERIFIED:
    CyberScoop (50f5916c…) "A group of Belarusian hackers claim to have
    encrypted the servers, databases and workstations of Belarusian
    Railways with the aim of slowing down Russian troops"; self-claim
