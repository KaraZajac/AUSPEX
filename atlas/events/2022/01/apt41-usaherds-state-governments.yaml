id: 2022-01/apt41-usaherds-state-governments
name: APT41 USAHerds US state-government breach
start_date: 2021-05-01
disclosure_date: 2022-03-08
end_date: 2022-02-28
incident_type:
  - intrusion
  - data-theft
initial_vector: 0-day  # CVE-2021-44207 USAHerds + Log4Shell
outcome_summary: |
  APT41 compromised at least six US state-government networks via a
  zero-day in the USAHerds animal-health management application
  (CVE-2021-44207) and Log4Shell (CVE-2021-44228), and was observed
  exfiltrating PII. Mandiant assessed the victimology as consistent
  with an espionage operation but could not make a definitive
  assessment given APT41's history of financially motivated
  moonlighting; the campaign's overall goals remained unknown.
false_flag_risk: none
summary: |
  Mandiant disclosed on 2022-03-08 ("Does This Look Infected? A
  Summary of APT41 Targeting U.S. State Governments") a deliberate
  APT41 campaign, running May 2021 to February 2022, that
  compromised at least six US state-government networks. Initial
  access came from exploiting internet-facing web applications
  (mostly ASP.NET): a zero-day in the USAHerds animal-health
  management application (CVE-2021-44207) — a static, shared
  validationKey/decryptionKey (machineKey) baked into all USAHerds
  installations, enabling ViewState .NET-deserialization RCE — and
  the Log4Shell zero-day (CVE-2021-44228); SQL injection and
  directory traversal were also observed. Post-exploitation tooling
  included the DEADEYE launcher, the modular KEYPLUG backdoor
  (including a new KEYPLUG.LINUX variant) with heavy Cloudflare-
  fronted C2, the new DUSTPAN in-memory ChaCha20 dropper (used to
  deploy a Cobalt Strike BEACON), BADPOTATO named-pipe privilege
  abuse, and credential harvesting via SAM/SYSTEM hive dumping and
  Mimikatz. Mandiant observed APT41 exfiltrating PII and assessed
  the activity as consistent with espionage, but could not make a
  definitive assessment given APT41's financially motivated
  moonlighting; the campaign's overall goals remained unknown.
