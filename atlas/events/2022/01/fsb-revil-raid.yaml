name: FSB raid on REvil — 14 arrests at US request (pre-invasion)
start_date: 2022-01-14
disclosure_date: 2022-01-14
end_date: 2022-01-14
incident_type:
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  The FSB, acting with the Investigative Department of the Russian
  MVD, conducted raids at 25 addresses across Moscow, St. Petersburg,
  and the Moscow, Leningrad and Lipetsk regions; 14 alleged REvil
  members were detained and charged under Part 2 of Article 187 of
  the Russian Criminal Code ("illegal circulation of means of
  payment" — a financial-crime statute, not a state-security one).
  The FSB said it seized over 426M rubles (including cryptocurrency),
  USD 600K, EUR 500K, 20 premium-class cars, plus computer equipment
  and crypto wallets, and declared the criminal group dismantled. Per
  the FSB's own statement the operation was undertaken on the basis of
  "a request from the competent authorities of the United States"
  (обращение компетентных органов США), which had reported the group's
  leader; US authorities were subsequently informed of the results —
  an unusual public acknowledgment of US–Russian law-enforcement
  cooperation on Russian territory.
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
summary: |
  Inflection event for the AUSPEX criminal-state-symbiosis thesis.
  Six weeks before the 24 February 2022 full-scale Ukraine invasion,
  and amid the pre-invasion diplomatic standoff (Russia's December
  2021 NATO draft-security-treaty ultimatum; troop buildup on the
  Ukrainian border), the Kremlin briefly produced enforcement action
  against a prominent ransomware actor — in what was widely read as a
  cooperation gesture / bargaining chip in the ultimately unsuccessful
  diplomatic track. It was Russia's first publicly announced
  ransomware-enforcement action against its own nationals. After the
  invasion no further public Russian enforcement against ransomware
  actors occurred; the pattern reverted to the prior tolerance
  baseline — which AUSPEX reads as evidence that Russian tolerance of
  criminal proxies is conditional on foreign-policy calculation rather
  than on the absence of state knowledge of their operations.
