id: 2022-01/fsb-revil-raid
name: FSB raid on REvil — pre-invasion bargaining gesture
start_date: 2022-01-14
disclosure_date: 2022-01-14
end_date: 2022-01-14
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  FSB officers conducted raids at 25 addresses in Moscow, St.
  Petersburg, Leningrad Oblast, and Lipetsk; 14 alleged REvil
  members detained. FSB seized ~426M rubles, USD 600K, EUR 500K,
  20 luxury cars, and computer equipment. Russian state TV (Rossiya
  24) aired raid footage. The action was conducted at "the
  initiative of US authorities" per FSB's own statement —
  unprecedented public acknowledgment of US cooperation in a
  Russian-territorial cyber-criminal enforcement action.
false_flag_risk: none
campaign_id: revil-kaseya-jbs-cluster
summary: |
  Inflection event for the AUSPEX criminal-state-symbiosis thesis.
  Six weeks before the Feb 24 2022 full-scale Ukraine invasion,
  the Kremlin briefly produced enforcement action against a
  prominent ransomware actor as a bargaining gesture in the
  unsuccessful pre-invasion diplomatic track (NATO ultimatum
  December 2021, Russian troop buildup on Ukraine border). Post-
  invasion, no further public Russian enforcement against
  ransomware actors has occurred — the criminal-state-symbiosis
  pattern reverted to the prior tolerance baseline.
