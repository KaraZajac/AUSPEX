id: 2022-01/whispergate
name: WhisperGate wiper (pre-invasion)
start_date: 2022-01-13
disclosure_date: 2022-01-15
end_date: 2022-01-15
incident_type:
  - destructive
  - wiper
initial_vector: unknown  # not determined in the Jan-2022 first disclosure; group's later-established pattern is web-server exploitation (see summary)
outcome_summary: |
  Two-stage MBR wiper masquerading as ransomware, deployed against
  Ukrainian government and other victim organizations in the run-up
  to the February 2022 invasion. The malware overwrites the Master
  Boot Record and posts a fake ransom note while a second stage
  corrupts files — a wiper disguised as ransomware. Accompanied by
  defacements of Ukrainian organization websites and, later, a
  "Free Civilian" hack-and-leak persona run by the same GRU cluster.
false_flag_risk: suspected  # ransomware masquerade
# FLAG (orchestrator): campaign_id "hermetic-wave-feb-2022" groups WhisperGate
# with the Feb-2022 HermeticWiper/IsaacWiper/Viasat wave, but WhisperGate is a
# Jan-2022 op by GRU Unit 29155 (Cadet Blizzard) — a DISTINCT unit from the
# Feb-wave Sandworm/Unit-74455 wipers (AA24-249A: "separate from ... Unit 74455").
# Grouping is chronological ("2022 invasion wiper wave"), not a shared operation;
# consider a unit-neutral rename or splitting WhisperGate out.
campaign_id: hermetic-wave-feb-2022
summary: |
  Microsoft MSTIC first disclosed WhisperGate on 15 January 2022,
  tracking the activity as the placeholder cluster DEV-0586; MSTIC's
  June 2023 report graduated the cluster to Cadet Blizzard, a
  GRU-sponsored group distinct from Sandworm, and the September 2024
  joint Five-Eyes advisory AA24-249A named the unit as the GRU 161st
  Specialist Training Center (Unit 29155) — the same unit named in the
  parallel 26 June 2024 US DOJ indictment for destroying Ukrainian
  government computer systems. WhisperGate executes in two
  stages: a first-stage MBR overwriter (stage1.exe) that posts a
  fake ransom note while irrecoverably corrupting the Master Boot
  Record, and a second-stage Discord-hosted downloader (stage2.exe)
  retrieving a file-corrupter that overwrites files matching a
  hard-coded extension list — defeating the ransom-note pretext on
  inspection and confirming the operation as a wiper masquerading as
  ransomware. Consistent with the group's established tradecraft,
  initial access is assessed to have leveraged exploitation of
  vulnerable internet-facing web servers (e.g. Confluence, Exchange,
  and open-source content-management platforms), abuse of valid
  accounts, and commodity web shells; parallel defacements of
  Ukrainian organization websites and a later "Free Civilian"
  hack-and-leak persona are attributed to the same GRU cluster.
attributions:
  - actor_id: ru/gru/cadet-blizzard
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: high
    attribution_level: named-actor  # GRU-sponsored Cadet Blizzard; the specific unit is not named here
    auspex_assessment: concur
    attribution_date: 2023-06-14
    attribution_source_id: mstic/2023-06-14_cadet-blizzard-novel-distinct-threat-actor
    notes: |
      MSTIC's June-2023 report attributes WhisperGate to Cadet
      Blizzard, "a Russian GRU-sponsored threat group" that is
      "separate from other known and more established GRU-affiliated
      groups such as Forest Blizzard (STRONTIUM) and Seashell Blizzard
      (IRIDIUM)" [Sandworm] — GRU affiliation at named-actor level,
      without naming the specific unit. The Jan-2022 first disclosure
      (mstic/2022-01-15, tracked as DEV-0586) asserts NO attribution
      (zero "GRU" mentions in the rendered article).
  - actor_id: ru/gru/cadet-blizzard
    attributing_org: "US FBI/CISA/NSA + Cyber Command CNMF + partners (Netherlands MIVD, Czech VZ/BIS, Germany BfV, Estonia KAPO, Latvia VDD, Ukraine SBU/CERT-UA, Canada, UK NCSC, Australia, NZ) — advisory AA24-249A"
    attributing_org_confidence: high
    attribution_level: named-unit  # GRU 161st Specialist Training Center (Unit 29155)
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-09-05
    attribution_source_id: cisa/2024-09-05_aa24-249a-gru-unit-29155
    notes: |
      The Sept-2024 joint advisory raises the attribution to
      named-unit: "GRU Unit 29155 cyber actors began deploying the
      destructive WhisperGate malware against multiple Ukrainian
      victim organizations as early as January 13, 2022"; the unit is
      the GRU "161st Specialist Training Center (Unit 29155)" and is
      "separate from other known and more established GRU-affiliated
      cyber groups, such as Unit 26165 and Unit 74455" [Sandworm].
      Same unit named in the parallel 26 June 2024 US DOJ indictment
      for destroying Ukrainian government computer systems — AA24-249A
      itself cross-references "the recent U.S. Department of Justice
      (DOJ) press releases for June 26, 2024, and September 5, 2024."
      The DOJ page is Akamai bot-walled and was not snapshotted, so the
      named-unit tier is anchored to the snapshotted AA24-249A (which
      carries the Unit-29155 → WhisperGate tie directly).
      concur-with-caveat: Cadet Blizzard = GRU is independently
      corroborated (MSTIC, CrowdStrike Ember Bear), but the specific
      unit-number (29155 / 161st STC) rests on US/Five-Eyes government
      assertion, not independent private-sector technical proof.
