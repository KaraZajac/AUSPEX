id: 2022-01/whispergate
name: WhisperGate wiper (pre-invasion)
start_date: 2022-01-13
disclosure_date: 2022-01-15
end_date: 2022-01-15
incident_type:
  - destructive
  - wiper
  - influence-operation
initial_vector: unknown
outcome_summary: |
  MBR wiper masquerading as ransomware deployed against Ukrainian
  government websites and IT systems in the run-up to the February
  2022 invasion. Defacements of >70 Ukrainian government sites
  accompanied by a "Free Civilian" hack-and-leak persona.
false_flag_risk: suspected  # ransomware masquerade
campaign_id: hermetic-wave-feb-2022
summary: |
  Microsoft MSTIC initial disclosure 15 January 2022; subsequent
  June 2023 MSTIC attribution to Cadet Blizzard / DEV-0586 — a
  GRU unit distinct from Sandworm. WhisperGate executes in two
  stages: a first-stage MBR overwriter (stage1.exe) that posts a
  fake ransom note while irrecoverably corrupting the Master Boot
  Record, and a second-stage Discord-hosted downloader
  (stage2.exe) retrieving a file-corrupter that overwrites a
  hard-coded extension list with fixed bytes — defeating the
  ransom note pretext on inspection and confirming the operation
  as a wiper masquerading as ransomware. Initial access into
  Ukrainian government estates appears to have leveraged web-
  shell access to Orion-Soft / OctoberCMS-vulnerable web servers
  alongside abuse of valid credentials, with parallel defacements
  of more than 70 government sites and a "Free Civilian" hack-
  and-leak persona used to launder the GRU operation.
