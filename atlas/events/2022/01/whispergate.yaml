  notes: |
    Audited vs three snapshotted primaries: MSTIC 2022-01-15 (sha256
    26352922…2859a368), MSTIC 2023-06-14 (sha256 e6ed7314…37d3280c),
    and CISA/Five-Eyes AA24-249A 2024-09-05 (sha256 88543e82…efabec0,
    165,527 B) — the last CREATED this session to carry the named-unit
    attribution + primary WhisperGate mechanics.
    [a] FACTS — malware mechanics all carried. MSTIC 2022-01-15
    ("overwrites the MBR"; "stage1.exe"/"stage2.exe"; "two-stage";
    "Discord"; "file corrupter"; hardcoded extensions; "0xCC") and
    AA24-249A verbatim: "The actors' use of WhisperGate involved the
    deployment of the malware files, stage1.exe and stage2.exe.
    WhisperGate has two stages that corrupts a system's master boot
    record, displays a fake ransomware note, and encrypts files based
    on certain file extensions … The actors used multiple Discord
    accounts to store malware files." CORRECTIONS: (1) outcome_summary
    ">70 Ukrainian government sites" — UNSUPPORTED by any snapshotted
    source (MSTIC 2023-06-14 says "defacements of several Ukrainian
    organization websites"; AA24-249A says "website defacements" with
    NO count; the only "70" strings in the raws are cookie-expiry
    boilerplate "01 Jan 1970") → dropped the number, now "defacements
    of Ukrainian organization websites." (2) summary "Orion-Soft /
    OctoberCMS-vulnerable web servers" — those product names appear in
    NEITHER cited MSTIC source NOR AA24-249A (they are in the
    un-snapshottable June-2024 DOJ Stigal indictment only) →
    generalized to the MSTIC-supported wording: initial access via
    exploitation of vulnerable internet-facing web servers (MSTIC
    2023-06-14: "exploiting Confluence servers through … CVE-2021-26084,
    Exchange servers through … CVE-2022-41040 and ProxyShell, and
    likely commodity vulnerabilities in various open-source platforms
    such as content management systems"; "commodity web shells"),
    marked as the group's established pattern (initial_vector kept
    "unknown" — the Jan-2022 disclosure did not determine it). "Free
    Civilian" hack-and-leak + defacements RETAINED — carried by MSTIC
    2023-06-14 ("the hack-and-leak forum known as 'Free Civilian'"; 6
    "Free Civilian" / 4 "defacements" / 7 "hack-and-leak" mentions).
    incident_type influence-operation → removed per scope ([destructive,
    wiper]); the Free Civilian/defacement influence angle survives as
    prose context (and is carried by the broader 2024-09 Unit-29155
    event).
    [b] ATTRIBUTION — split into two tiers. MSTIC 2023-06-14 =
    named-actor (concur, high): "Cadet Blizzard is a Russian
    GRU-sponsored threat group" … "separate from … Seashell Blizzard
    (IRIDIUM)" [Sandworm] — GRU affiliation without a unit number
    (0 "29155" in this source). AA24-249A = named-unit
    (concur-with-caveat, high): "GRU Unit 29155 cyber actors began
    deploying the destructive WhisperGate malware against multiple
    Ukrainian victim organizations as early as January 13, 2022"; unit
    = "161st Specialist Training Center (Unit 29155)", "separate from …
    Unit 26165 and Unit 74455." NOT over-attested: caveat records that
    the unit-number rests on US/Five-Eyes government assertion. The
    Jan-2022 source (DEV-0586) is correctly NOT used as an attribution
    anchor (zero GRU).
    [c] DATES — start_date 2022-01-13 CONFIRMED by AA24-249A ("as early
    as January 13, 2022"). disclosure_date 2022-01-15 = MSTIC first
    blog byline. end_date 2022-01-15 retained (operational-window
    close at first disclosure). Source published_on all match bylines:
    MSTIC 2022-01-15, MSTIC 2023-06-14, AA24-249A "Release Date
    September 05, 2024."
    [d] DOCTRINE_LINKS — perspective attacker-rationale on both
    (Russia's own doctrine on Russia's own attack; default, noted not
    fielded per house style). ru/russkiy-mir/ukraine-theater kept
    ATTESTED but attesting_source_id REPOINTED from mstic/2022-01-15
    (which attests nothing — no attribution, no strategic framing) to
    mstic/2023-06-14, and inference_basis.source_quote added (verbatim
    "destructive cyber operations likely supporting broader military
    objectives in Ukraine … WhisperGate … against Ukrainian government
    organizations") — strategic-purpose corroboration, not slug-naming.
    ru/nato-ultimatum-2021/ukraine-support-interdiction DOWNGRADED
    strongly_inferred → PLAUSIBLE (no source states the aid-interdiction
    goal for WhisperGate; the op hit Ukrainian government, not Western
    aid logistics — a contextual pillar fit), inference_basis
    {signals, alternatives} added, attesting_source_id null (correct).
    [e] ATTRIBUTION_LEVEL — was MISSING on the sole attribution; added
    named-actor (MSTIC) + named-unit (AA24-249A), each source-supported.
    [f] ACTOR_ID — ru/gru/cadet-blizzard resolves
    (atlas/actors/ru/cadet-blizzard.yaml, id ru/gru/cadet-blizzard;
    NOT Sandworm/ru/gru/74455 — verified distinct). target
    orgs/ukraine-government resolves (nation_state_id ua; added
    country: ua for directionality). Doctrine + both pillars resolve.
    LEVEL=full: every load-bearing claim is carried by a snapshotted
    source. The named-unit tier and the DOJ-indictment reference are
    both carried by the snapshotted AA24-249A (which cross-references
