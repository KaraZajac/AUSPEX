id: 2022-06/harmony-horizon-bridge
name: Harmony Horizon Bridge theft
start_date: 2022-06-23
disclosure_date: 2022-06-24
end_date: 2022-06-23
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  $100M in virtual currency stolen from Harmony's Horizon
  cross-chain bridge. Funds were laundered — on 13 January 2023
  over $60M in ETH was moved through the RAILGUN privacy protocol
  and partly converted to bitcoin — with a portion frozen in
  coordination with virtual asset service providers.
quantified_impact:
  usd_stolen: 100000000
false_flag_risk: none
campaign_id: bridge-theft-chain
summary: |
  Second major DeFi cross-chain bridge theft of 2022 after Axie
  Infinity's Ronin — Elliptic attributes both the Harmony Horizon
  and Ronin bridge hacks to the Lazarus Group. The FBI confirmed
  on 23 January 2023 that the Lazarus Group (also known as APT38),
  DPRK cyber actors, were responsible for the theft of $100M in
  virtual currency from Harmony's Horizon bridge, reported on
  24 June 2022. The FBI stated the DPRK used the "TraderTraitor"
  malware campaign — the subject of a prior FBI/CISA/Treasury
  joint advisory — in the Harmony intrusion. Stolen funds were
  laundered: on 13 January 2023 North Korean cyber actors moved
  over $60M in ETH through the RAILGUN privacy protocol, partly
  converting it to bitcoin, a portion of which was frozen in
  coordination with virtual asset service providers. The FBI
  framed the theft and laundering as virtual currency "used to
  support North Korea's ballistic missile and Weapons of Mass
  Destruction programs" — the standard WMD-financing attestation.
