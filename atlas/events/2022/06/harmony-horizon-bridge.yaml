id: 2022-06/harmony-horizon-bridge
name: Harmony Horizon Bridge theft
start_date: 2022-06-23
disclosure_date: 2022-06-24
end_date: 2022-06-23
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Validator-node private-key compromise via TraderTraitor social
  engineering of Harmony engineers. $100M stolen from the Horizon
  cross-chain bridge between Ethereum and Harmony. Funds
  subsequently laundered through RAILGUN privacy protocol;
  partial seizure achieved through Binance and Huobi
  cooperation.
quantified_impact:
  usd_stolen: 100000000
false_flag_risk: none
campaign_id: bridge-theft-chain
summary: |
  Second major DeFi-bridge theft of 2022 after Ronin. Initial
  access was a TraderTraitor / Lazarus social-engineering pretext
  on LinkedIn / Telegram against Harmony engineers, delivering a
  trojanized macOS / Windows dropper in the AppleJeus / Citrine
  Sleet lineage that staged the Manuscrypt / FALLCHILL backdoors;
  operators then harvested two of the five Horizon validator-node
  private keys (multisig threshold = 2) and used valid credentials
  to sign fraudulent withdrawal transactions draining $100M in
  Ethereum, USDC, BUSD, and other assets across the bridge. Funds
  were chain-hopped through Tornado Cash and the RAILGUN privacy
  protocol — the same laundering primitives later named in OFAC's
  November 2023 Sinbad mixer designation. FBI confirmed Lazarus /
  APT38 / TraderTraitor attribution on 23 January 2023, applying
  the standard WMD-financing attestation language.
