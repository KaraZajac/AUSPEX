    = attacker-rationale (correct).
    [e] ATTRIBUTION_LEVEL — set named-actor on all three (was missing).
    [f] ACTOR_ID — all resolve: kp/rgb/tradertraitor →
    atlas/actors/kp/tradertraitor.yaml; kp/rgb/lazarus → …/kp/lazarus.yaml;
