  notes: |
    Audited against both cited sources (raw snapshots captured + hashed).
    SOURCES: [1] fbi/2023-01-23_harmony-attribution (govt-primary) sha256
    272df202…5c4b4412, 89,377 bytes, hash re-verified vs on-disk snapshot.
    [2] elliptic/2023-06-13_atomic-wallet (vendor-research) sha256
    32d5624e…4ca60214, 329,504 bytes — freshly snapshotted this audit
    (none existed); it is the real article.

    [a] FACTS — the FBI release (Original 23 Jan 2023 statement) carries:
    "the Lazarus Group (also known as APT38), cyber actors associated with
    the DPRK, are responsible for the theft of $100 million of virtual
    currency from Harmony's Horizon bridge reported on June 24, 2022";
    the RAILGUN laundering ("On Friday, January 13, 2023, North Korean cyber
    actors used RAILGUN, a privacy protocol, to launder over $60 million
    worth of ethereum (ETH) … subsequently sent to several virtual asset
    service providers and converted to bitcoin (BTC)"); the partial freeze
    ("A portion of these funds were frozen, in coordination with some of the
    virtual asset service providers"); and the TraderTraitor campaign name.
    Elliptic corroborates the Ronin-first framing + Lazarus attribution
    ("several high profile hacks were attributed to Lazarus, including the
    hacks of Harmony's Horizon Bridge, and Axie Infinity's Ronin Bridge").
    STRIPPED as unsourced embellishment (present in NEITHER cited source —
    grep-confirmed 0 hits in the FBI raw): LinkedIn/Telegram social-
    engineering pretext (the 5 "LinkedIn" hits in the FBI page are share-
    button SVG boilerplate, "LinkedIn Icon"); trojanized macOS/Windows
    dropper "AppleJeus / Citrine Sleet" lineage; "Manuscrypt / FALLCHILL"
    backdoors; "two of five validator-node private keys (multisig=2)";
    "USDC, BUSD" token specifics; "Tornado Cash"; "Binance and Huobi"
    (FBI says only "some of the virtual asset service providers" — generalized);
    and the "OFAC November 2023 Sinbad mixer" conflation (the Elliptic raw
    contains ZERO occurrences of "Sinbad" — the corpus note on that source
    was wrong; RAILGUN is not Sinbad). $100M usd_stolen RETAINED — it is
    carried verbatim by THIS event's own FBI source, NOT inherited from the
    doctrine record's (now-removed) hard-coded "Harmony $100M".
    [b] ATTRIBUTION — FBI "confirm"/"were able to confirm" = high confidence;
    all three entries attributing_org US FBI, concur, 2023-01-23. Added
    attribution_level: named-actor to all three — FBI names the group
    (Lazarus/APT38) + nation (DPRK) + the TraderTraitor campaign, but NO
    service/unit (no RGB/3rd Bureau; grep-confirmed). Added clarifying note
    on the TraderTraitor entry (FBI treats it as a malware campaign, not a
    distinct named group; actor correctly stays kp/unscoped).
    [c] DATES — FBI published_on 2023-01-23 ✓ (statement so dated; page also
    carries a post-13-Jan-2023 update). disclosure_date 2022-06-24 = FBI
    "reported on June 24, 2022" ✓. start/end 2022-06-23 = the well-documented
    heist date (Harmony's Horizon exploit, 23 Jun 2022); the two cited sources
    give only "June 2022 heist"/"reported June 24" — the precise 23 Jun op-date
    is external common knowledge, not verbatim in either (minor residual, not
    contradicted).
    [d] DOCTRINE_LINK — kp/8th-congress-defense-plan / revenue-aggregation /
    crypto-bridge-theft: KEPT attested. Re-check outcome: the FBI source DOES
    state the terminal WMD/ballistic-missile-financing goal in substance —
    "…theft and laundering of virtual currency, which is used to support North
    Korea's ballistic missile and Weapons of Mass Destruction programs" — this
