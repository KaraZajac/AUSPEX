initial_vector: phishing
outcome_summary: |
  Israeli private investigator Aviram Azari pleaded guilty in the
  Southern District of New York to wire fraud, conspiracy to
  commit computer hacking, and aggravated identity theft for his
  role as the primary sales intermediary between US-litigation
  finance clients and the BellTroX hacking-for-hire operation.
  Sentenced in November 2023 to 80 months. The plea record
  consolidates the BellTroX-as-vendor + Azari-as-channel +
  US-clients architecture documented in Dark Basin.
false_flag_risk: none
operators_named:
  - azari-aviram  # BellTroX hack-for-hire intermediary, DOJ SDNY Jun 2022
summary: |
  The principal US-government enforcement action touching the
  Indian hack-for-hire ecosystem. Azari was not Indian and was
  not employed by BellTroX; he was the intermediary. The
  conviction makes the BellTroX-to-client supply chain
  US-government attested, even though no BellTroX or Indian-based
  defendant has been charged in the same matter as of 2026.
