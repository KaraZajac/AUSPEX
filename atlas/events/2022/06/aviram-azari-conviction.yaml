id: 2022-06/aviram-azari-conviction
name: Aviram Azari pleads guilty in SDNY hack-for-hire case linking BellTroX clients
start_date: 2014-11-01
disclosure_date: 2022-06-20
end_date: 2019-09-01
incident_type:
  - intrusion
