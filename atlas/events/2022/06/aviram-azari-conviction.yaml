initial_vector: phishing
outcome_summary: |
  Israeli private investigator Aviram Azari pleaded guilty on
  2022-04-20 in the Southern District of New York to wire fraud,
  conspiracy to commit computer hacking, and aggravated identity
  theft for orchestrating an international hack-for-hire
  spearphishing scheme from 2014 to 2019. Azari was the paid
  intermediary: hired by clients (unnamed except the defunct
  German payments firm Wirecard) for ~$4.8M, he in turn
  sub-contracted hackers — "a group located in India" per
  prosecutors — to phish targets' credentials. Victims included
  #ExxonKnew climate-litigation activists (Union of Concerned
  Scientists, Rockefeller Family Foundation, Conservation Law
  Foundation) and Wirecard short-sellers/journalists. Sentenced
  in November 2023 to 80 months' imprisonment, three years'
  supervised release, and ~$4.84M forfeiture.
false_flag_risk: none
operators_named:
  - azari-aviram  # Israeli PI, hack-for-hire intermediary; pleaded guilty SDNY 2022-04-20
summary: |
  The principal US-government enforcement action touching the
  Indian hack-for-hire ecosystem. Azari was an Israeli private
  investigator — not an Indian national and not a BellTroX
  employee; he was the sales/coordination intermediary between
  paying clients and the hackers he sub-contracted. NB: the
  indictment and conviction name Azari and "a group located in
  India" but do NOT name BellTroX. AUSPEX ties that Indian group
  to BellTroX (Dark Basin) on the strength of Reuters' June 2020
  reporting and Citizen Lab's disclosure, which named BellTroX as
  the firm Azari hired. As of 2026 no BellTroX or India-based
  defendant has been charged in the same matter.
