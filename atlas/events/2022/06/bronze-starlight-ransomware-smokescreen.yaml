initial_vector: n-day
outcome_summary: |
  BRONZE STARLIGHT / DEV-0401 used LockFile, AtomSilo, Rook,
  Night Sky, and Pandora ransomware as smokescreen / cover for
  state-aligned IP theft. ~15 of 21 known victims align with
  state-tasked espionage interest (pharma, electronics design,
  aerospace and defense — including a major Indian conglomerate
  — and media).
false_flag_risk: suspected  # ransomware as smokescreen for espionage
summary: |
  Secureworks documented the cluster's "ransomware as cover"
  pattern in a June 2022 threat profile.
