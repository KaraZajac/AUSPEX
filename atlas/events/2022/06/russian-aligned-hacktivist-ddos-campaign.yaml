    notes: |
      DOJ Dec 2025 assessed NoName as a state-sanctioned project
      administered partially through CISM.
  - actor_id: ru/gru/xaknet
    # was attributing_org "Microsoft MSTIC / Mandiant" citing mstic/2023-06-14 — WRONG-SOURCE:
    # the MSTIC snapshot has 0 XakNet mentions (it attributes Cadet Blizzard, a different actor).
    # Re-pointed to CISA AA22-110A, which DOES name XakNet (7 mentions). MSTIC dropped from sources[].
    attributing_org: US CISA (AA22-110A grouping)
    attributing_org_confidence: moderate
    attribution_level: named-actor  # CISA names XakNet at self-declared level; the ru/gru (named-unit) tie is NOT carried by any cited source here
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-04-20
    attribution_source_id: cisa/2022-04-20_aa22-110a-russian-cyber-threats-to-cii
    notes: |
      CISA AA22-110A names the XakNet Team as a self-declared
      Russia-aligned front: "on March 31, 2022, XakNet released a
      statement stating they would work 'exclusively for the good of
      [Russia]'" and "may be working with or associated with Killnet
      actors." CISA asserts NO Russian service for XakNet. The actor's
      ru/gru placement rests on Mandiant's 2023-09-14 "Hacktivists
      Collaborate with GRU-sponsored Threat Actors" report (moderate
      confidence: XakNet moderators "directly supported by" / "are GRU
      intelligence officers or work directly with the GRU APT44"),
      which is NOT among this event's cited sources. FLAG: add the
      Mandiant source or reconcile the actor_id's named-unit claim.
