id: 2022-06/russian-aligned-hacktivist-ddos-campaign
name: Sustained Killnet / NoName057(16) / XakNet DDoS campaign (2022-onward)
start_date: 2022-03-01  # earliest Killnet activity; NoName founded March 2022
disclosure_date: 2022-04-20  # CISA AA22-110A
end_date: null  # ongoing as of 2026
incident_type:
  - disruption
  - influence-operation
initial_vector: unknown
outcome_summary: |
  Continuous low-tier Layer-7 DDoS and defacement operations by a
  loose tier of Russia-aligned "hacktivist" fronts — Killnet,
  NoName057(16) (DDoSia), XakNet, Anonymous Russia, RaHDIt — against
  government, finance, transport, and healthcare web infrastructure
  of NATO and Ukraine-aiding states. NoName057(16) self-claimed more
  than 1,500 DDoS attacks since 2022 against Lithuania, Italy,
  Germany, Poland, Czechia, the UK, and the US. Effects are largely
  performative; strategic value is morale, signaling, and friction.
false_flag_risk: none
summary: |
  CISA AA22-110A (April 20, 2022) named Killnet, XakNet, and
  affiliated Russia-aligned cybercrime/hacktivist groups as part of
  the threat picture following the full-scale invasion. State nexus
  is assessed by US/EU services and Mandiant rather than proven for
  Killnet/XakNet (proxy posture). DOJ December 2025 announcement
  assessed NoName057(16) as state-sanctioned via CISM (Center for
  the Study and Network Monitoring of the Youth Environment);
  separate Europol "Operation Eastwood" (July 2025) took down >100
  NoName servers across 13 countries with 6 arrest warrants. AUSPEX
  treats the cluster as a single proxy-tier campaign rather than
  itemizing every claimed DDoS.
attributions:
