id: 2022-06/russian-aligned-hacktivist-ddos-campaign
name: Sustained Killnet / NoName057(16) / XakNet DDoS campaign (2022-onward)
start_date: 2022-03-01  # CISA AA22-110A: Killnet US-airport DDoS March 2022; XakNet "active as early as March 2022"
disclosure_date: 2022-04-20  # CISA AA22-110A
end_date: null  # ongoing as of 2026
incident_type:
  - disruption
  - influence-operation
initial_vector: unknown
outcome_summary: |
  Continuous low-tier Layer-7 DDoS and defacement operations by a
  loose activity-cluster of Russia-aligned "hacktivist" fronts —
  Killnet and XakNet (both named in CISA AA22-110A) and NoName057(16)
  / DDoSia (DOJ, Europol) — against government, finance, and transport
  web infrastructure of Ukraine and its NATO-aligned supporters. Per
  DOJ (Dec 2025, raw-verified), NoName "claimed credit for hundreds of
  cyberattacks" and its victims "included government agencies,
  financial institutions, and critical infrastructure, such as public
  railways and ports." Europol's Operation Eastwood (2025) documents
  named target sets: Swedish authorities and bank websites (2023-24),
  "14 separate waves of attacks targeting more than 250 companies and
  institutions" in Germany (since Nov 2023), and Switzerland (June
  2023, June 2024). Effects are largely performative (DDoS =
  availability, usually transient); strategic value is morale,
  signaling, and friction.
  # STRIPPED (2026-07-11 audit): "self-claimed more than 1,500 DDoS
  # attacks ... against Lithuania, Italy, Germany, Poland, Czechia, the
  # UK, and the US" — the 1,500 figure appears in NO cited source (DOJ
  # says "hundreds"); the country list matches Europol's LAW-ENFORCEMENT
  # participants, not NoName's victims (a conflation). Also stripped
  # "Anonymous Russia, RaHDIt" (only in the actor file, no cited source)
  # and "healthcare" (CISA's healthcare mentions attach to WIZARD
  # SPIDER/Conti ransomware, not this DDoS cluster).
false_flag_risk: none
summary: |
  CISA AA22-110A (April 20, 2022) named Killnet and XakNet — among
  other Russia-aligned "cybercrime" fronts — as self-declared,
  independently pledged actors; the advisory asserts NO Russian
  service or command relationship for them and cautions cyber
  criminals "will most likely continue to operate primarily based on
  financial motivations." A state nexus is source-documented only for
  NoName057(16): DOJ (Dec 9, 2025) assessed NoName as a
  "state-sanctioned" project "administered in part by an information
  technology organization established by order of the President of
  Russia in October 2018" — i.e. CISM (the Center for the Study and
  Network Monitoring of the Youth Environment), whose employees built
  the DDoSia infrastructure. Europol "Operation Eastwood" (action day
  15 July 2025) disrupted "over 100 servers ... worldwide" with 12
  states acting simultaneously; national authorities "issued seven
  arrest warrants ... against six Russian nationals" (six by Germany,
  one by Spain) with two arrests (France, Spain). XakNet's GRU tie
  rests on Mandiant's Sep-2023 report, which is NOT among this event's
  cited sources (FLAG). AUSPEX treats the cluster as a single
  activity-cluster campaign rather than itemizing every claimed DDoS.
