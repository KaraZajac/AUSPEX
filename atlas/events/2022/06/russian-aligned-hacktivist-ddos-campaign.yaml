    attribution_source_id: cisa/2022-04-20_aa22-110a-russian-cyber-threats-to-cii
    notes: |
      CISA lists Killnet under "Russian-Aligned Cybercrime Groups"
      (financially motivated) as a self-pledged, independent actor;
      it does not assert direct state command-and-control or name a
      Russian service. Per the 2026-06-24 audit Killnet is
      ru/unscoped (state assessed, service unresolved), not a
      documented proxy; the broader campaign's proxy/state-nexus
      framing rests on the OTHER named groups (NoName057(16) state-
      sanctioned per DOJ Dec 2025; XakNet at ru/gru via MSTIC).
