id: 2022-06/ghostwriter-german-greens-spd-targeting
name: Ghostwriter credential-phishing of German Greens and SPD politicians during war-policy debate
start_date: 2022-03-01
disclosure_date: 2022-06-09
end_date: 2022-06-09
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Following the German federal government's initial attribution
  of pre-September-2021-election Ghostwriter activity, Mandiant
  and German press reporting documented continued Ghostwriter
  targeting of Greens and SPD politicians during the March-May
  2022 German parliamentary debates on lethal-aid support to
  Ukraine and energy-policy responses to Russian gas. Phishing
  lures themed on parliamentary communications and energy-policy
  briefings. The campaign reflects integration of Belarusian
  cyber operations with broader Russian-Belarusian theater
  political objectives.
false_flag_risk: none
summary: |
  Notable for the political-debate-timing of the operation —
  Greens and SPD politicians were the swing votes on energy
  policy and lethal-aid decisions consequential for Russian war
  prosecution. Ghostwriter's continuity of operations against
  German political targets after the 2021 attribution
  underscores the cluster's operational durability under
  attribution pressure.
