    REVERSE-DIRECTIONALITY event (Israel assessed attacker; Iran's
    Khuzestan / Mobarakeh / Hormozgan steel makers are the victims) and
    a RARE CONFIRMED CYBER-PHYSICAL DESTRUCTION case. Full 6-point audit
