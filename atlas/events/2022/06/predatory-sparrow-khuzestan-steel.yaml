    BADRABBIT RE-SOURCE (phantom). The prior revision cited
    nyt/2022-06-26_predatory-sparrow-khuzestan (url nytimes.com/2022/06/
    27/world/middleeast/iran-cyberattack-steel-mill.html) as both the
    attribution_source_id and a doctrine attesting_source. That NYT URL
    is a PHANTOM: it returns a bot-block splash (HTTP 403,
    <title>nytimes.com</title>), has ZERO Wayback captures across four
    years (vs. dozens for the genuine 2021 NYT article), is cited by
    neither Wikipedia nor the exhaustive CCDCOE toolkit, and its stored
    headline is fabricated. The real NYT "anonymous US defense officials
    -> Israel" reporting is the 2021-11-27 fuel-attack article ("Israel
    and Iran Broaden Cyberwar...", .../iran-israel-cyber-hack.html),
    mis-projected onto a fabricated 2022 steel URL. REMOVED the phantom
    from sources[] + attribution_source_id + the doctrine attester; the
    phantom source file is annotated as a RETIRE candidate and left on
    disk (still cited by the actor file — flagged below).

    [a] FACTS — verified vs RAW. CCDCOE (captured): targets were
    "Khouzestan Steel Company (KSC), Mobarakeh Steel Company (MSC), and
    Hormozgan Steel Company (HOSCO) ... All three ... are state-owned";
    "As regards MSC and HOSCO, no significant damage ... As regards KSC,
    an industrial machine was caused to seriously malfunction, vomiting
    fire and molten steel across the factory floor"; "The hacking group
    also published a video of the incident, showing factory workers
    leaving part of the plant before a machine starts spewing molten
    steel and fire"; "the production line in Khouzestan Steel was shut
    down for a few days"; "around 20 GB" leaked. BBC (captured): "The
    video appears to be CCTV footage of the incident, showing factory
    workers leaving part of the plant before a machine starts spewing
    molten steel and fire"; "one of three attacks it carried out
    against Iranian steel makers on 27 June". CORRECTIONS: (1) STRIPPED
    the fabricated company name "Khuzestan Steel Mojahedin Steel
    Company" ("Mojahedin" is not part of the company name and is carried
    by no source) -> "Khuzestan Steel Company (KSC)". (2) STRIPPED
    "released video footage ... in real time" (the 'in real time'
    embellishment is unsourced) -> "published CCTV video ... showing
    workers evacuating before the molten-steel spill and fire". (3)
    EXPANDED the single-mill outcome to the documented three-mill scope
    with damage confined to KSC. (4) incident_type [destructive] ->
    [destructive, cyber-physical] (video-confirmed physical
    destruction).

    [b] ATTRIBUTION. Held at moderate / concur-with-caveat /
    named-actor. Self-claim + CCTV video make the NAMED ACTOR firm; the
    OPERATOR-STATE (Israel) is assessed only — Check Point (BBC): "we
