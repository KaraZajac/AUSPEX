id: 2022-06/predatory-sparrow-khuzestan-steel
name: Predatory Sparrow — Khuzestan Steel destructive cyber-physical attack (NOT IRANIAN)
start_date: 2022-06-27
disclosure_date: 2022-06-27
end_date: 2022-06-27
incident_type:
  - destructive
  - cyber-physical
initial_vector: unknown
outcome_summary: |
  Destructive cyber-physical attack that Predatory Sparrow / Gonjeshke
  Darande said was one of three simultaneous strikes on 27 June 2022
  against Iranian state-owned steel makers — Khuzestan Steel Company
  (KSC, in Ahvaz), Mobarakeh Steel Company (MSC) and Hormozgan Steel
  Company (HOSCO). Significant damage was confined to KSC, where an
  industrial machine was made to malfunction and spew fire and molten
  steel across the foundry floor, halting KSC's production line for
  several days; MSC and HOSCO reported no significant physical damage.
  The group published CCTV video of the incident showing workers
  evacuating before the molten-steel spill and fire — one of the very
  few cyberattacks with confirmed physical destruction. The attackers
  said they had warned Iran's emergency services in advance and later
  leaked ~20 GB of exfiltrated documents said to show the companies'
  IRGC affiliation.
false_flag_risk: suspected  # Predatory Sparrow's hacktivist persona is a known IL deniability layer; the operator-STATE attribution (Israel) is itself only assessed here, so the hedge sits at both the persona and the state layer
campaign_id: predatory-sparrow-iran-coercion
summary: |
  **NOT IRANIAN. REVERSE-DIRECTIONALITY.** Pro-Israel Predatory Sparrow
  / Gonjeshke Darande operation; Iran's steel makers (KSC / MSC / HOSCO)
  are the VICTIMS and Israel (assessed, not confirmed) is the attacker.
  Sibling of the July-2021 railway and October-2021 fuel-station
  operations (same campaign; Check Point found code overlap with the
  July-2021 railway wiper) and of the December-2023 fuel and June-2025
  Bank Sepah / Nobitex operations. Included in the Iran event log
  because Iranian state media framed it as a cyberattack on Iran, and
  because it is the canonical example of why every Iran-context
  destructive OT event must be cross-checked against Predatory Sparrow
  before tagging to an Iranian actor. The Khuzestan Steel foundry-fire
  video is the defining demonstration of the actor's willingness to
  publicize cyber-physical damage — one of the few such confirmed cases
  in the public record.
attributions:
  - actor_id: il/predatory-sparrow
    attributing_org: Predatory Sparrow self-claim (Telegram, with CCTV video); BBC; Times of Israel; NATO CCDCOE Cyberlaw Toolkit
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2022-06-27
    attribution_source_id: bbc/2022-07-11_predatory-sparrow-iran-fire
    notes: |
      Operation self-claimed by Predatory Sparrow / Gonjeshke Darande
      on Telegram and corroborated by published CCTV video of the
      molten-steel spill and fire — so the NAMED ACTOR is firm
      (named-actor). The OPERATOR-STATE attribution (Israel) is
      ASSESSED, not confirmed: Check Point judged the group "either
      operated, or sponsored by, a nation state" given its
      sophistication and impact (BBC); Israel is the leading suspect
      (Israeli TV reports prompted an Israeli Defense Ministry / Gantz
      probe into IDF involvement); but Israel has never formally
      acknowledged it, and analysts also floated the United States,
      Saudi Arabia or the UAE. NO cited source names a specific Israeli
      unit (e.g. IDF Unit 8200) for this operation — unit-level
      attribution is an actor-file inference, not carried by the event's
      sources; hence attribution_level is named-actor, not named-unit or
      nation, and confidence is capped at moderate. Predatory Sparrow's
      hacktivist persona is itself a known IL deniability layer
      (false_flag_risk suspected). [Prior revision cited a phantom NYT
      URL as the attribution source — removed; see qc notes.]
doctrine_links:
  - doctrine_id: il/counter-iran-posture
    perspective: attacker-rationale
    pillar_id: il/counter-iran-posture/retaliatory-cyber-strike
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Public-facing destructive cyber-physical strike on Iranian
      state-owned steel producers, self-framed by Predatory Sparrow as
      retaliation for "unspecified acts of aggression" by the Islamic
      Republic and justified by the targets' continued operation under
      international sanctions and their alleged IRGC affiliation — the
      tit-for-tat pattern that defines the retaliatory-cyber-strike
      pillar (ics/manufacturing is a named target sector of that
      pillar). Counter-nuclear-program disruption could be argued as an
      upstream link via the metallurgy / resource-denial tie-in, but the
      retaliatory framing is the closest and best-corroborated fit. The
      doctrinal tie is to ISRAEL's counter-Iran posture, so it can be no
      firmer than the Israel-state attribution, which is assessed rather
      than confirmed — hence strongly_inferred, not attested.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Predatory Sparrow's own statement (via BBC, captured) that the steel strikes were 'one of three attacks it carried out against Iranian steel makers on 27 June, in response to unspecified acts of \"aggression\" carried out by the Islamic Republic' — the retaliatory tit-for-tat motive that defines the pillar."
        - "Targets were three state-owned steel makers (KSC, MSC, HOSCO) allegedly selected for operating under international sanctions and for IRGC affiliation, with ~20 GB of purported 'IRGC-affiliation' documents leaked — a dual-use / counter-program resource-denial rationale (CCDCOE toolkit, captured)."
        - "Check Point found code overlap between the steel-attack malware and the July-2021 Iranian railway wiper attributed to the same actor — continuity of a single pro-Israel counter-Iran destructive campaign, and the sibling relationship to the 2021 railway / fuel operations."
        - "Israeli TV reporting prompted an Israeli Defense Ministry (Gantz) probe into IDF involvement, and Israel is the consensus leading suspect (BBC; Times of Israel, captured)."
      ruled_out: "NOT excluded, which is why this is strongly_inferred (contingent) and not attested: Israel has never formally acknowledged the operation, and Check Point noted the sponsor could alternatively be the United States, Saudi Arabia or the UAE while a purely non-state hacktivist reading cannot be wholly excluded — so the tie to Israel's STATE counter-Iran doctrine remains assessed. No source states an Israeli retaliatory GOAL for this op in Israel's own voice."
