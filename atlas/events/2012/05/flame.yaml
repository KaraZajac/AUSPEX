id: 2012-05/flame
name: Flame (sKyWIper) intelligence-collection toolkit
start_date: 2010-01-01  # Kaspersky: project created "no earlier than 2010"; seen in the wild Feb-Mar 2010; in use since Aug 2010. Publicly discovered May 2012.
disclosure_date: 2012-05-28  # parallel Kaspersky / CrySyS Lab ("sKyWIper") / Iran Maher CERT ("Flamer") disclosure
end_date: 2012-06-30  # operators pushed the "browse32" self-removal module after exposure; the self-uninstall capability is documented in the 28-May Kaspersky Q&A, the actual purge was reported in June 2012
incident_type:
  - espionage
  - surveillance
initial_vector: unknown  # Kaspersky: "The initial point of entry of Flame is unknown"
outcome_summary: |
  Long-haul intelligence collection across the Middle East — Iran the
  top-affected country, with Lebanon, Syria, Israel and others also hit —
  against state-related organisations, academic institutions and
  individuals (Kaspersky saw "no specific signs indicating a particular
  target such as the energy industry"). Flame's most distinctive
  propagation method hijacked Windows Update: its SNACK / MUNCH / GADGET
  modules man-in-the-middled the Windows Update service and served WU
  payloads fraudulently signed as "Microsoft". The counterfeit signature
  chained to a Microsoft Certificate Authority; Microsoft issued emergency
  Security Advisory 2718704 revoking the abused "Microsoft Enforced
  Licensing" (Terminal-Server licensing) intermediate certificates.
  Microsoft's own analysis attributed the forgery to a chosen-prefix MD5
  collision against that licensing certificate. Flame was itself found by
  Kaspersky during an ITU-requested investigation into the separate "Wiper"
  data-deletion attacks; Kaspersky found no evidence tying Wiper to Flame.
false_flag_risk: none  # operators falsified file timestamps (anti-forensic) but did not impersonate another actor
campaign_id: olympic-games
summary: |
  A ~20MB modular cyber-espionage toolkit — one of the most complex threats
  discovered to its date — carrying audio-via-microphone, screenshot and
  Bluetooth-proximity collection modules, keyboard interception and network
  sniffing, scripted in Lua over compiled C/C++ libraries. Kaspersky, CrySyS
  Lab ("sKyWIper") and Iran's Maher CERT ("Flamer") disclosed it in parallel
  on 28 May 2012. Kaspersky initially assessed Flame as a project running
  PARALLEL to Stuxnet/Duqu, built by a likely separate group and NOT on the
  Tilded platform, though it shared some Stuxnet tradecraft (the autorun.inf
  method unique to Stuxnet; the MS10-061 print-spooler exploit). On 11 June
  2012 Kaspersky found the missing link: an early Stuxnet module ("Resource
  207", present in the June-2009 Stuxnet variant) was in fact a Flame plugin
  — establishing that the Flame and Stuxnet development teams cooperated and
  shared code at least at the outset, while Flame itself remained a distinct
  (non-Tilded) platform. The Washington Post (Nakashima, Miller & Tate,
  19 June 2012) reported the platform as a joint US-Israeli intelligence-
  collection program built to slow Iran's nuclear efforts; never officially
  acknowledged. DIRECTIONALITY: attacker = US + Israel; victim = Iran and
  the broader Middle East.
attributions:
  - actor_id: us/olympic-games-team
    attributing_org: The Washington Post (Nakashima, Miller & Tate)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2012-06-19
    attribution_source_id: wapo/2012-06-19_flame-us-israel
    notes: |
      Nation-state (US + Israel) attribution is JOURNALISM-ONLY: the
      Washington Post, citing anonymous US officials, tied Flame to the
      joint US-Israeli program ("Olympic Games" family) built to slow
      Iran's nuclear program; never officially acknowledged by either
      government. Kaspersky, by contrast, explicitly DECLINED nation-state
      attribution ("There is no information in the code or otherwise that
      can tie Flame to any specific nation state ... its authors remain
      unknown") — its contribution was technical clustering only, so it is
      no longer co-listed as an attributing org for the US/IL claim.
      Level named-actor (a named joint program + two named nations); WaPo's
      exact agency-level wording is not re-verifiable at audit because the
      source is bot-walled (see qc: level partial). us/olympic-games-team is
      the joint US+IL actor anchor; the IL co-attacker rationale is carried
      by the two IL doctrine links below.
