qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: partial
  notes: |
    Full 6-point audit vs RAW snapshots. LEVEL partial: the sole nation-state
    (US+Israel) attribution source (wapo/2012-06-19_flame-us-israel) is bot-
    walled (HTTP/2 reset, curl exit 92) and could not be snapshotted/quote-
    verified; corroborated by public record. Re-sourced three real-but-uncited
    canonical facts (badrabbit re-source model). Snapshots (sha256 first8..last8,
    bytes): kaspersky 28-May Q&A a3f25be0..d2987676 / 196,604; kaspersky 04-Jun
    Gadget c60666e5..cb810965 / 187,899; kaspersky 11-Jun Missing-Link
    c46078378..2c83c66 / 188,099; microsoft Advisory-2718704 ef5fbe83..e30636df
    / 52,652.

    [a] FACTS. VERIFIED vs 28-May Kaspersky raw: ~20MB modular toolkit ("almost
    20 MB ... when fully deployed"); audio-via-microphone, screenshot (incl.
    on "interesting" apps / IMs) and Bluetooth-proximity collection modules;
    keyboard interception + network sniffing; Lua-over-C/C++; initial vector
    unknown; ITU→Wiper-investigation→Flame discovery; and parallel 28-May
    disclosure with CrySyS ("SkyWiper") + Iran Maher CERT ("Flamer") (Update 1).
    CORRECTIONS (all were unsupported by / contradicted by the cited sources):
    (1) STRIPPED the false "Code-overlap with Stuxnet's resource section
    established Tilded Platform authorship." The 28-May source says the OPPOSITE
    ("Flame appears to be a project that ran in parallel ... not using the
    Tilded platform"; "Flame and Stuxnet/Duqu were probably developed by two
    separate groups"). Re-sourced the REAL code link to kaspersky 11-Jun
    "Back to Stuxnet: the missing link": Resource 207 (in the June-2009 Stuxnet)
    was a Flame plugin → the two teams cooperated, yet "Flame and Tilded are
    completely different projects based on different architectures". Reworded
    summary accordingly. (2) STRIPPED "Extensive collection from Iranian Oil
    Ministry and the Iranian National Oil Company" — this is a WIPER fact, not
    Flame; the 28-May source explicitly says "there is no information currently
    that ties Flame to the Wiper attacks" and "we have not seen any specific
    signs indicating a particular target such as the energy industry". Also the
    two org FKs (orgs/iranian-oil-ministry, orgs/national-iranian-oil-company)
    DO NOT EXIST in the registry (dangling). Replaced targets with source-carried
    sectors/government (ir) + sectors/academic ("state-related organizations or
    educational institutions", Iran top-affected). (3) MD5-collision Windows-
    Update spoof was NOT in the 28-May source; re-sourced to kaspersky 04-Jun
    "Gadget in the middle" (WU MITM via SNACK/MUNCH/GADGET; payloads "signed by
    'MS'") + microsoft Advisory 2718704 (revokes the "Microsoft Enforced
    Licensing" = Terminal-Server licensing intermediate CAs used for MITM). The
    granular "chosen-prefix MD5 collision" phrasing is Microsoft's SRD-blog
    analysis (that page is now a JS SPA, un-snapshottable) — kept, attributed to
    Microsoft, corroborated by the advisory. (4) DROPPED the embellishment
    "spurring Microsoft to deprecate weak hash algorithms industry-wide" (no
    source; Microsoft revoked the specific certs + hardened Windows Update).
    (5) incident_type intrusion → [espionage, surveillance] (raw: "cyber
    espionage worm ... general cyber-espionage purposes" + microphone/screen/
    keylog = surveillance).

    [b] ATTRIBUTION. Nation-state (US+IL) attribution is journalism-only (WaPo).
    Cleaned attributing_org from "Washington Post ... + Kaspersky technical
    clustering" to "The Washington Post (Nakashima, Miller & Tate)" — Kaspersky
    explicitly declined any nation-state attribution, so co-listing it over-
    attributed. auspex_assessment concur-with-caveat retained (journalism, never
    acknowledged). attributing_org_confidence high retained (WaPo reported
    declaratively; caveat carried by the assessment + notes). actor_id
    us/olympic-games-team (joint US+IL) preserved.

    [c] DATES. disclosure_date 2012-05-28 ✓ (Kaspersky/CrySyS/Maher). start_date
    2010-01-01 estimate consistent with raw ("no earlier than 2010"; wild
    Feb-Mar 2010). end_date 2012-06-30 = post-exposure browse32 self-removal
    (capability in 28-May raw; purge June 2012). New source published_on set to
    actual pub dates (04-Jun, 11-Jun, 03-Jun) — not the campaign month.

    [d] DOCTRINE_LINKS. 3 links kept, none attested (correct: purpose statement
    is journalism, not govt/tier-1-vendor, and un-quote-verifiable). il/begin-
    doctrine and il/counter-iran-posture both name Flame in their own pillar/
    cyber_relevance text, so the placements are corpus-consistent; both stay
    strongly_inferred. Reworded the counter-iran reasoning to REMOVE its reliance
    on the (stripped) Oil-Ministry/NIOC targeting. begin-doctrine keeps WaPo as
    its supporting (not attesting-for-attested) source per schema; that source is
    bot-walled, reinforcing strongly_inferred. Both IL links carry
    perspective: attacker-rationale (joint US+IL actor → declared cross-state
    rationale, not a mismatch). us/title-10-title-50 reasoning refined to Title-50
    SIGINT collection authority.

    [e] ATTRIBUTION_LEVEL. Added named-actor (was missing) — WaPo names a named
    joint program + two nations; agency/unit granularity not snapshot-verifiable.

    [f] ACTOR_ID. us/olympic-games-team resolves (atlas/actors/us/olympic-games-
    team.yaml). FLAG: that actor's ttp_summary miscategorizes Flame (and Gauss)
    as "Tilded Platform" family — Kaspersky's own 11-Jun finding is that Flame is
    NOT on the Tilded platform (Duqu/Stuxnet are); Flame/Gauss are a separate
    platform, linked to Stuxnet only via the shared Resource-207 module. Actor
    file not edited (per protocol) — for orchestrator/Kara to fix.
