id: 2012-05/flame
name: Flame (sKyWIper) intelligence-collection toolkit
start_date: 2010-01-01  # operational date estimated; discovered May 2012
disclosure_date: 2012-05-28  # Kaspersky / MAHER CERT joint disclosure
end_date: 2012-06-30  # operators self-destructed implants after exposure
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  Extensive collection from Iranian Oil Ministry and the Iranian
  National Oil Company plus broader Middle East targets. Used an MD5
  collision attack abusing a Microsoft Terminal Services licensing
  certificate to MITM Windows Update — spurring Microsoft to deprecate
  weak hash algorithms industry-wide. Iranian discovery led to the
  "Wiper" malware sweep that revealed the Flame toolkit.
false_flag_risk: none
campaign_id: olympic-games
summary: |
  Massive 20MB modular collection toolkit. Audio, screen, and
  Bluetooth-proximity collection modules. Code-overlap with Stuxnet's
  resource section established Tilded Platform authorship. Washington
  Post (Nakashima/Miller, June 19, 2012) reported the operation as a
  joint US/IL effort. Kaspersky and MAHER (Iranian CERT) disclosed in
  parallel May 28, 2012.
attributions:
  - actor_id: us/olympic-games-team
    attributing_org: Washington Post (Nakashima/Miller) + Kaspersky technical clustering
    attributing_org_confidence: high
    auspex_assessment: concur-with-caveat
    attribution_date: 2012-06-19
    attribution_source_id: wapo/2012-06-19_flame-us-israel
    notes: |
      Attribution is `journalistic + technical clustering`; not
      officially acknowledged.
