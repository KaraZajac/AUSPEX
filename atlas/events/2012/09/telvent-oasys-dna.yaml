  notes: |
    Audited vs the cited Krebs article (raw captured + hashed; live HTTP 200, archive.org blocked).
    FACTS confirmed by source: Telvent Canada Ltd.; breach learned 10 Sep 2012; internal firewall/security
    systems breached; malware installed; project files for OASyS SCADA stolen; Schneider Electric parent;
    US/Canada/Spain ops; remote customer access indefinitely terminated. "OASyS DNA" + "oil/gas pipeline
    SCADA, N. America majority share" appear in an on-page Telvent-customer comment (Dale Peterson), not in
    Krebs's reporting — kept but flagged. ATTRIBUTION: source names only "Comment Group" (Joe Stewart, Dell
    SecureWorks) at moderate confidence ("blamed"/"strongly suggest"/"map back to"); it does NOT name APT1,
    Comment Crew, or Unit 61398 (those = later Mandiant-2013 consensus; the report postdates this article).
    Resolved Comment Group → cn/pla/apt1 via the actor's equivalent "Comment Group" alias; added attribution
    notes + attribution_level named-actor. CORRECTIONS: removed two unsupported summary claims — "AutoCAD
    pipeline-engineering drawings" (0 source hits) and "customer authentication material" (0 hits; source
    says Telvent had NO reason to believe customer-system access was acquired — direct contradiction);
    softened the "custom backdoors catalogued in the 2013 Mandiant APT1 report" extrapolation and the
    contemporaneous "Comment Crew / APT1" framing to the consensus-equivalence it actually is. published_on
    2012-09-26 matches the masthead. doctrine_link kept at plausible (no attesting source; the source's own
    IP/trade-secret framing IS the competing reading captured in counter_explanation). actor_id resolves and
    is service-verified (2026-06-24); not stale. FLAG: target orgs/telvent-canada has no registry file —
    tolerated informational FK gap (validate.ts: "targets/ normalization deferred"), left untouched (out of
    event+source scope).
