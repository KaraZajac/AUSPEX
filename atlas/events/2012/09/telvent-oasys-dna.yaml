id: 2012-09/telvent-oasys-dna
name: Telvent / OASyS DNA breach
start_date: 2012-09-01
disclosure_date: 2012-09-26
end_date: 2012-09-30
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Telvent Canada (an ICS SCADA vendor to North American oil & gas
  pipelines) discovered an intrusion that breached its internal
  firewall/security systems and stole project files for its OASyS
  product; as a precaution Telvent indefinitely terminated its
  remote access into customer systems. Telvent reported no evidence
  the intruders obtained anything enabling access to a customer
  system. An early reported PRC-attributed compromise of a US
  critical-infrastructure OT supply-chain vendor.
false_flag_risk: none
summary: |
  Reported by KrebsOnSecurity on 26 Sep 2012. Per customer letters
  obtained by Krebs, Telvent Canada Ltd. learned on 10 Sep 2012 of a
  breach of its internal firewall and security systems; the
  intruder(s) installed malicious software and stole project files
  for its OASyS SCADA product (a Telvent-customer comment on the same
  article identifies it as OASyS DNA, the dominant oil/gas-pipeline
  SCADA platform in North America). Joe Stewart of Dell SecureWorks
  told Krebs that the website and malware names in Telvent's report
  "map back to a Chinese hacking team known as the 'Comment Group'";
  Krebs frames the digital fingerprints as pointing to a Chinese
  cyber-espionage group, citing Bloomberg's July 2012 Comment Group
  investigation (IP / trade-secret harvesting from energy firms, law
  firms and banks). AUSPEX resolves Comment Group to APT1 / Unit
  61398 (the modern vendor-consensus equivalence; the Mandiant APT1
  report formalizing it came Feb 2013, after this article). The
  pattern — supply-chain compromise of an ICS-engineering vendor
  whose product touches energy critical infrastructure — prefigures
  the Volt Typhoon / Flax Typhoon civilian-CII pre-positioning
  pattern by a decade.
