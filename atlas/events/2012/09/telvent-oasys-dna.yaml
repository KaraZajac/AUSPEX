id: 2012-09/telvent-oasys-dna
name: Telvent / OASyS DNA breach
start_date: 2012-09-01
disclosure_date: 2012-09-26
end_date: 2012-09-30
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Telvent Canada (an ICS SCADA vendor to North American oil & gas
  pipelines) discovered an intrusion that compromised project
  files and access to customer networks. The first reported PRC
  pre-positioning-flavored event against US critical-infrastructure
  OT supply chain.
false_flag_risk: none
summary: |
  Reported by KrebsOnSecurity in September 2012; vendor framing
  attributed to Comment Crew / APT1. Telvent's customer
  notification described compromise of internal firewalls and
  the OASyS DNA project-file repository, with the intruders
  installing custom backdoors (later associated with the
  Comment Crew / Comment Group / Shanghai Group toolset
  catalogued in the 2013 Mandiant APT1 report) and exfiltrating
  detailed AutoCAD pipeline-engineering drawings and customer
  authentication material. The pattern — supply-chain compromise
  of an ICS-engineering vendor whose product touches energy
  critical infrastructure — foreshadows the Volt Typhoon / Flax
  Typhoon civilian-CII pre-positioning pattern by a decade.
