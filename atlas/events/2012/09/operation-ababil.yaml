    notes: |
      Indictment named Ahmad Fathi, Hamid Firoozi, Amin Shokohi,
      Sadegh Ahmadzadegan, Omid Ghaffarinia, Sina Keissar, and
      Nader Saedi (ITSecTeam / Mersad Co.).
