id: 2012-09/operation-ababil
name: Operation Ababil — IRGC DDoS campaign against 46+ US banks
start_date: 2012-09-18
disclosure_date: 2012-09-18
end_date: 2013-05-01
incident_type:
  - disruption
initial_vector: n-day  # compromised webservers used as DDoS sources
outcome_summary: |
  Sustained DDoS campaign against 46+ US financial institutions
  including Bank of America, JPMorgan Chase, Wells Fargo,
  Capital One, PNC, BB&T. itsoknoproblembro / Brobot DDoS
  botnet built on compromised webservers; sustained 65 Gbps
  peaks. Extensive online-banking disruption over months; tens
  of millions in mitigation cost.
quantified_impact:
  affected_orgs: 46
false_flag_risk: none
operators_named:
  - fathi-ahmad  # ITSecTeam / IRGC, DOJ Mar 2016
  - firoozi-hamid  # ITSecTeam / IRGC, DOJ Mar 2016 (also Bowman Dam)
  - shokohi-amin  # ITSecTeam / IRGC, DOJ Mar 2016
  - ahmadzadegan-sadegh  # Mersad Co. / IRGC, DOJ Mar 2016
  - ghaffarinia-omid  # Mersad Co. / IRGC, DOJ Mar 2016
  - keissar-sina  # Mersad Co. / IRGC, DOJ Mar 2016
  - saedi-nader  # Mersad Co. / IRGC, DOJ Mar 2016
summary: |
  Persona claim "Izz ad-Din al-Qassam Cyber Fighters." The DOJ
  March 24, 2016 indictment named seven Iranians employed by
  ITSecTeam and Mersad Co. as IRGC-affiliated operators,
  formally attributing the campaign to the IRGC and
  characterizing it as retaliation for sanctions on Iran's
  banking sector.
