id: 2012-08/rasgas-shamoon
name: RasGas Qatar Shamoon-family wiper attack
start_date: 2012-08-27
disclosure_date: 2012-08-30
end_date: 2012-09-15
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  RasGas (Ras Laffan Liquefied Natural Gas Company) of Qatar
  was hit with a Shamoon-family wiper two weeks after the
  Saudi Aramco destructive attack of 15 August 2012. The
  intrusion took the company's website and internal email
  offline; reporting indicated thousands of workstations
  affected. Like the Aramco attack, the operation was attributed
  to Iranian state-aligned operators under the "Cutting Sword of
  Justice" deniable persona. RasGas LNG production itself was
  not affected — the operational impact was on corporate IT
  systems.
false_flag_risk: suspected
campaign_id: apt33-shamoon-iran-oil
summary: |
  Together with Aramco (the Saudi national oil company), RasGas
  established the 2012 Iranian destructive-wiper campaign
  pattern against Gulf-state energy companies. The doctrine of
  retaliation against the energy infrastructure of US-aligned
  Gulf-state competitors during the Stuxnet-aftermath sanctions
  ramp-up is the canonical IRGC asymmetric-cyber response
  framework. Subsequent Shamoon waves (2016, 2018) continued
  the pattern.
attributions:
  - actor_id: ir/irgc/apt33
    attributing_org: Vendor consensus (FireEye, Symantec, retrospective)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-09-20  # FireEye APT33 attribution work
    attribution_source_id: fireeye/2017-09-20_apt33
    notes: |
      No US-government attribution at time of incident. Vendor
      retrospective attribution to APT33 / Refined Kitten on
      the basis of Shamoon-family tooling overlap. Some analysts
      assign Shamoon to a separate operator cluster ("OilRig" /
      APT34 milieu); cluster boundaries unsettled.
