id: 2012-08/rasgas-shamoon
name: RasGas Qatar Shamoon-family wiper attack
start_date: 2012-08-27
disclosure_date: 2012-08-30
end_date: null  # AUDIT 2026-07-05: no source documents a RasGas recovery/end date; prior 2012-09-15 was unsupported (office systems reported "unusable since 27 August"; disclosure 30 Aug).
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  RasGas (Ras Laffan Liquefied Natural Gas Company) of Qatar was
  hit by a suspected Shamoon-family wiper on 27 August 2012,
  roughly two weeks after the Saudi Aramco destructive attack of
  15 August 2012. The malware took the company's corporate office
  computer systems and its public website (rasgas.com) offline,
  and RasGas severed its internet connection while recovering.
  RasGas's operational and production systems were unaffected — a
  company spokesman confirmed gas extraction and processing
  continued and that onshore/offshore operational systems and
  scheduled cargoes were secure. Contemporary reporting did NOT
  establish a RasGas workstation-damage count; the widely-quoted
  ~30,000-workstation figure belongs to Aramco, not RasGas, and
  RasGas did not publicly confirm the malware strain. The
  operation is linked to the Aramco attack — and thence to
  suspected Iranian state-aligned operators fronted by the
  "Cutting Sword of Justice" hacktivist persona (which claimed the
  Aramco strike) — by timing and tooling similarity rather than by
  any RasGas-specific claim of responsibility.
false_flag_risk: suspected
campaign_id: apt33-shamoon-iran-oil
summary: |
  RasGas was the second target in the August 2012 Gulf-energy
  destructive-wiper pair, following Saudi Aramco twelve days
  earlier. Contemporary disclosure (Reuters, The Register and
  Security Affairs, 30-31 Aug 2012) established the outage of
  corporate IT and the public website while production was
  untouched; the malware strain and the perpetrator were not
  confirmed by RasGas at the time. Security researchers
  subsequently assessed the incident as part of the
  Shamoon/Disttrack campaign and — on the basis of the
  Cutting-Sword-of-Justice claim on Aramco and US intelligence's
  attribution of Aramco to Iran — as Iranian state-aligned. A
  later vendor lineage-clustering (FireEye 2017) associates the
  Shamoon family with the APT33 actor bucket used here, though
  that report itself distinguishes APT33 from the original 2012
  Shamoon operator. Subsequent Shamoon waves (2016, 2018) reused
  the destructive template.
attributions:
  - actor_id: ir/irgc/apt33
    attributing_org: Vendor/researcher retrospective (Shamoon-lineage APT33 bucket); contemporaneously only suspected state-sponsored, Iran-suspected
    attributing_org_confidence: low
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-09-20  # date of the FireEye APT33 lineage report; the named-actor label is retrospective
    attribution_source_id: fireeye/2017-09-20_apt33-report
    notes: |
      No government or vendor named a specific actor for the RasGas
      attack at the time (2012): contemporary reporting had only
      "suspected state-sponsored" attackers, with Iran suspected by
      inference from the near-simultaneous Aramco strike (which US
      intelligence attributed to Iran and which the "Cutting Sword of
      Justice" persona claimed). The APT33 (ir/irgc/apt33) label is a
      later corpus-campaign lineage bucket. IMPORTANT CAVEAT: the
      cited FireEye 2017 report attributes APT33 only to "the Iranian
      government" (it does NOT name the IRGC) AND explicitly SEPARATES
      APT33 from the 2012 Shamoon operator — "the suspected Iranian
      group that previously used SHAMOON … However … a separate, less
      widely known suspected Iranian group … whom we call APT33" and
      "we have not directly observed APT33 … carry out destructive
      operations." Confidence therefore set to LOW; the well-supported
      layer is nation-level (Iran suspected). Actor bucket kept for
      campaign continuity with the sister shamoon-saudi-aramco event;
      not independently re-attributed here.
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A destructive attack on a Gulf-state national energy company,
      twelve days after the analogous Aramco strike and during the
      post-Stuxnet sanctions confrontation, reads as the asymmetric
      retaliatory harassment of an adversary's civilian energy sector
      that this pillar encodes. Downgraded from the prior "attested":
      no cited source states the strategic purpose of the RasGas
      attack — the FireEye report names no goal, never mentions
      RasGas/Qatar, and even separates APT33 from the 2012 operator —
      so this is AUSPEX's triangulated inference, not a source-stated
      aim.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target + timing: a Gulf-state national LNG company hit 12 days after Aramco, during the Stuxnet-aftermath/sanctions confrontation — the canonical Iranian asymmetric-retaliation window."
        - "Actor-mission fit: the suspected-Iranian Shamoon/Disttrack destructive campaign matches the pillar's low-cost, deniable harassment of an adversary's civilian infrastructure."
        - "Pattern: the 2012 Aramco/RasGas pair is the template later Iranian destructive ops (Shamoon 2/3, ZeroCleare/Dustman) reused."
      ruled_out: "Espionage or financial motive — the payload is purpose-built destruction (a disk wiper) with no theft, ransom, or intelligence-collection rationale evidenced."
    contested: false
    analyst: claude
  - doctrine_id: ir/forward-defense
    pillar_id: ir/forward-defense/proxy-projection
    program_id: null
    confidence: plausible
    reasoning: |
      Destructive cyber against Gulf-state energy infrastructure can
      also be read as projecting IRGC coercive capability into the
      territory of US-aligned Gulf monarchies (Qatar hosts the US Al
      Udeid air base) at near-zero physical risk — the forward-defense
      proxy-projection logic. Kept only "plausible": the forward-
      defense doctrine was articulated more explicitly by IRGC
      leadership later in the decade, Qatar is a weaker adversary-proxy
      than Saudi Arabia, and no source ties this specific op to that
      posture.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Forward-defense proxy projection: destructive cyber into a US-aligned Gulf monarchy hosting US forces projects Iranian reach extraterritorially."
        - "Simple asymmetric retaliation (the civilian-CII-coercion reading above) with no distinct power-projection intent — the RasGas hit may just be the second half of an Aramco-style retaliation."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/rasgas
    country: qa
    role: primary
    outcome: |
      Corporate office computer systems and the public website
      (rasgas.com) taken offline; internet connection severed during
      recovery. LNG/operational production unaffected. No public
      workstation-damage count was disclosed for RasGas.
