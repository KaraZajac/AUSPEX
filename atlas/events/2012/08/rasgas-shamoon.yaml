qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: partial
  notes: |
    Audited vs raw sources; level=partial because the event's original load-bearing report
    (reuters/2012-08-30_rasgas-attack) is BOT-WALLED (curl -> HTTP 401, 771-byte stub, no
    body, no hash recordable). All factual claims are nonetheless carried by hashed,
    snapshotted contemporary corroborators added to sources[]; the partial reflects only
    Reuters' inaccessibility, not any unverified claim.

    SOURCES / HASHES:
    - theregister/2012-08-30_rasgas-malware-outbreak (John Leyden, 30 Aug 2012): raw
      f67377fd…4a5d235a, 155,082 bytes. HTTP 200.
    - securityaffairs/2012-08-31_rasgas-cyber-attack (Pierluigi Paganini, 31 Aug 2012): raw
      3989a501…4c73855, 102,281 bytes. HTTP 200.
    - fireeye/2017-09-20_apt33-report: raw ec8fe72a…e595b27, 300,441 bytes — sha256
      RE-VERIFIED against the record (matches). Re-pointed from the duplicate
      fireeye/2017-09-20_apt33 (bare) to this audited/snapshotted twin (also cited by the
      sister shamoon-saudi-aramco event and the APT33 actor).
    - reuters/2012-08-30_rasgas-attack: BOT-WALLED (HTTP 401); kept as the genuine first
      report; source record annotated; no hash.

    [a] FACTS — corrected. KEY FIX (the flagged workstation-scope conflation): the prior
    "thousands of workstations affected" for RasGas is UNSUPPORTED and was stripped from
    outcome_summary and the target outcome. The ~30,000 figure is Aramco's — The Register
    verbatim: "a strikingly similar attack against Saudi Aramco on 15 August, which hit
    30,000 workstations." No source gives a RasGas count (Security Affairs: RasGas facing
    "technical issues with its office computer systems"; web reporting confirms RasGas never
    disclosed a number). Retained/added facts, all source-carried: struck 27 Aug 2012 ("Office
    systems have been unusable since the malware struck on 27 August" — Register); website
    rasgas.com offline ("The RasGas website, rasgas.com, remains unreachable" — Register);
    internet connection pulled; PRODUCTION UNAFFECTED ("the malware outbreak was not
    affecting gas extraction and processing" — Register; "our operational systems onsite and
    offshore are secure and this does affect nor impact our production … or scheduled
    cargoes" — Security Affairs, quoting RasGas). Strain NOT confirmed by RasGas (Security
    Affairs: "there are no info regarding the nature of malware") — the "Shamoon-family"
    label softened to "suspected." end_date 2012-09-15 -> null (no source documents a RasGas
    recovery date).

    [b] ATTRIBUTION — corrected/downgraded. Actor kept ir/irgc/apt33 (corpus campaign
    continuity), but attributing_org_confidence moderate -> LOW and attributing_org reworded,
    because the cited FireEye report does NOT support APT33-as-2012-RasGas-attacker: verbatim
    it treats APT33 as "a separate, less widely known suspected Iranian group" distinct from
    "the suspected Iranian group that previously used SHAMOON," and states "we have not
    directly observed APT33 … carry out destructive operations"; it attributes APT33 only to
    "the Iranian government" (IRGC: 0 hits). Contemporary support reaches only nation-level
    "suspected state-sponsored / Iran-suspected" (CFR: US intelligence attributed Aramco to
    Iran; the Cutting-Sword persona claimed Aramco, NOT RasGas). auspex_assessment kept
    concur-with-caveat; attribution_date 2017-09-20 kept (retrospective label date).

    [c] DATES — start_date 2012-08-27 ✓ (Register/Security Affairs). disclosure_date
    2012-08-30 ✓ (Register 30 Aug; Reuters 30 Aug). end_date nulled (see [a]). Source
    published_on values correct: Register 2012-08-30 (meta datePublished 2012-08-30T16:52Z),
    Security Affairs 2012-08-31 (meta 2012-08-31T05:57Z), FireEye 2017-09-20.

    [d] DOCTRINE_LINKS — OVER-ATTESTATION FIXED. Link ir/asymmetric-warfare/
    civilian-cii-coercion: attested -> strongly_inferred, attesting_source_id fireeye/... ->
    null. The prior attested cited the FireEye report, which names NO strategic goal, never
    mentions RasGas/Qatar, and separates APT33 from the 2012 operator — it cannot carry
    attested. Added inference_basis.signals + ruled_out; the grade now matches the (more
    strongly attributed) sister Aramco event's strongly_inferred. Link ir/forward-defense/
    proxy-projection kept plausible (Qatar hosts US Al Udeid; but weak adversary-proxy and
    anachronistic doctrine articulation); added inference_basis.alternatives; attesting null.

    [e] ATTRIBUTION_LEVEL — added: named-actor (the retrospective APT33 cluster is a named
    actor; the source stops at "the Iranian government," i.e. does not reach named-unit; the
    contemporaneously-supported layer is nation-level, noted in the attribution notes).

    [f] ACTOR_ID — ir/irgc/apt33 RESOLVES (atlas/actors/ir/apt33.yaml, id ir/irgc/apt33).
    FLAG for orchestrator: that actor was re-homed ir/unscoped -> ir/irgc on 2026-07-02 on
    the basis of MSTIC's 2024-08 Tickler victimology assessment of a MODERN APT33 op; using
    the IRGC-scoped, APT33-named bucket for a 2012 attack that FireEye's own report separates
    from APT33 is a mild anachronism/over-specification — the 2012 Shamoon campaign
    attribution (across BOTH this event and shamoon-saudi-aramco, which stamps it high/concur)
    rests on weak lineage clustering and merits a campaign-level attribution review.

    RESIDUAL UNCERTAINTIES: (1) Reuters original un-snapshottable (bot-wall) — facts
    corroborated by two other hashed contemporary sources. (2) Whether RasGas's malware was
    literally Shamoon/Disttrack is a researcher inference, not a RasGas confirmation. (3)
    Duplicate source fireeye/2017-09-20_apt33 (bare) vs …_apt33-report flagged for
    consolidation (still cited by apt33-saudi-korea-aerospace + orgs/rasgas).
