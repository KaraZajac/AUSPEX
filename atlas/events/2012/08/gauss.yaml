id: 2012-08/gauss
name: Gauss (Lebanese banking surveillance)
start_date: 2011-09-01  # operational date estimated
disclosure_date: 2012-08-09  # Kaspersky disclosure
end_date: null
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  Collection on financial flows of interest in Lebanese banking
  (presumed Hezbollah-related). The Winshell.ocx module carried
  hard-coded commands to steal online-banking credentials for the
  Bank of Beirut, Byblos Bank, and Fransabank; the browser/cookie
  module additionally targeted Credit Libanais, EBLF, and BLOM
  Bank (alongside Citibank, PayPal, and webmail).
false_flag_risk: none
campaign_id: olympic-games
summary: |
  Flame-related platform with financial-targeting modules. Targeted
  Lebanese banks plus residual Middle East collection. Attribution to
  the Olympic Games / Tilded Platform cluster rests on Kaspersky's
  technical clustering rather than journalistic confirmation; doctrine
  linkage to counter-terrorism finance collection is `plausible` per
  dossier confidence label.
attributions:
  - actor_id: us/olympic-games-team
    attributing_org: Kaspersky (technical clustering)
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2012-08-09
    attribution_source_id: kaspersky/2012-08-09_gauss
    notes: |
      Kaspersky names NO state. Its verbatim attribution is
      code-clustering only: Gauss "was created by the same 'factory'
      which produced Flame ... this indicates it is most likely a
      nation-state sponsored operation" (and "the first publicly
      known nation-state sponsored banking Trojan"). It reaches the
      nation-state level, not a named state/service. AUSPEX maps the
      Flame/Tilded "factory" to the us/olympic-games-team cluster
      (the actor record's own US/IL-joint attribution rests on later
      Sanger 2012 / Zetter 2014 / Snowden 2013 reporting — NOT cited
      on this event), so the US-specific identity here is AUSPEX's
      inference from the cluster, not Kaspersky's claim. Hence
      attribution_level: nation and concur-with-caveat.
doctrine_links:
  - doctrine_id: us/title-10-title-50
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Counter-terrorism finance collection / sanctions enforcement
      against Hezbollah-adjacent banking is consistent with the
      operational tasking but is not explicitly attested. Dossier
      labels this `plausible`.
    attesting_source_id: null
    counter_explanation: |
      Could also be Israeli unilateral against Hezbollah financial
      networks; the joint authorship inference is by family-clustering
      rather than direct attestation.
    contested: false
    analyst: claude
  - doctrine_id: il/counter-iran-posture
    perspective: attacker-rationale
    pillar_id: il/counter-iran-posture/counter-resistance-axis-proxies
    program_id: null
    confidence: plausible
    reasoning: |
      Lebanese banking-sector surveillance (Bank of Beirut, Byblos
      Bank, Fransabank, plus Credit Libanais / EBLF / BLOM in the
      cookie module) is consistent with counter-Hezbollah financial
      collection — the dominant Israeli interest in Lebanese banking
      — under the long-running counter-Iran posture's proxy-
      disruption pillar (target_sectors include finance/banking).
      The il/counter-iran-posture doctrine record itself names the
      Olympic Games family including "Gauss 2012". Counter-
      explanation: the joint Olympic Games authorship inference
      rests on Kaspersky's technical clustering, so a US-lead with
      Israeli participation is equally plausible; either way the
      counter-Hezbollah-finance frame applies. (Re-pointed 2026-06-25
      from the anachronistic il/counter-resistance-axis posture,
      which was only operationally activated on 2023-10-07 and cannot
      explain a 2011-2012 operation; il/counter-iran-posture is its
      pre-2023 parent and is temporally sound.)
    attesting_source_id: null
    contested: false
    analyst: claude
targets:
  - target_id: sectors/finance/banking
    country: lb
    role: primary
sources:
  - kaspersky/2012-08-09_gauss
