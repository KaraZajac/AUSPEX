  notes: |
    Audited vs Kaspersky GReAT "Gauss" report (raw snapshot captured +
    hashed; live fetch + WebFetch cross-check both confirm). FACTS ✓:
    Flame-related ("same 'factory' which produced Flame"), Lebanon
    top-infected (1660; Israel 483, PT 261), USB spy module (dskapi.ocx,
    CVE-2010-2568 .LNK), Palida Narrow font (purpose unknown), online-
    banking credential theft. FACT CORRECTION: source names Bank of
    Beirut / Byblos Bank / Fransabank in code (cookie module adds Credit
    Libanais, EBLF, BLOM) — "BankMed" was NOT in the source and was
    removed (replaced with Bank of Beirut). ATTRIBUTION: Kaspersky names
    NO state — only "most likely a nation-state sponsored operation"
    by code-clustering to Flame. Added attribution_level: nation and
    rewrote notes so the US-specific (us/olympic-games-team) identity is
    flagged as AUSPEX's cluster inference, not Kaspersky's claim; no
    over-attestation to us/il introduced. Both doctrine_links remain
    `plausible` (correct — source states no strategic purpose).
    DOCTRINE FIX: re-pointed the IL link from il/counter-resistance-axis
    (issued_on 2023-10-07 — anachronistic for a 2011-12 op) to its
    pre-2023 parent il/counter-iran-posture / counter-resistance-axis-
    proxies pillar (finance/banking sector; doctrine text names "Gauss
    2012"). published_on 2012-08-09 ✓. actor_id resolves ✓.
