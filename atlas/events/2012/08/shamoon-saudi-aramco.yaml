    [c] DATES — start_date 2012-08-15 ✓ (pastebin + CCDCOE "unleashed on 15 August 2012").
    disclosure_date 2012-08-15 ✓ (the public claim was posted 15 Aug). end_date 2012-08-30
    RE-ANCHORED from the RasGas wave to Aramco's own recovery (CCDCOE: "By the end of August 2012,
