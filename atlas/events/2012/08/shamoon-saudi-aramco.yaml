    - nytimes/2012-10-23_cyberattack-saudi-oil-iran (Perlroth): raw 077735fd…fec2e, 62,670 B.
      Live nytimes.com is BOT-WALLED (HTTP 403) so the snapshot is the web.archive id_ copy —
      hashed, so this still counts as snapshotted.
    - ccdcoe/shamoon-cyberlaw: PHANTOM REPAIRED -> /wiki/Shamoon_(2012) (HTTP 200); raw
      a5b0cc46…e295536, 30,071 B; published_on 2018-01-01 -> 2021-09-17 (page "last edited").
    - pastebin/2012-08-15_cutting-sword-of-justice: raw 9fcbb343…722333, 15,257 B (web.archive
      capture of the primary claim; byline "Aug 15th, 2012").
    - fireeye/2017-09-20_apt33-report: raw ec8fe72a…e595b27, 300,441 B — sha256 RE-VERIFIED
