    applied: the event is REAL but was re-sourced to genuine snapshotted sources.

    SOURCES / HASHES (all HTTP 200 and snapshotted -> level=full):
    - securelist/2012-09-11_shamoon-the-wiper-part-ii (Kaspersky/Tarakanov): raw
      c446f0a3…853023, 191,003 B. published_on corrected to 2012-09-11 (page JSON-LD
