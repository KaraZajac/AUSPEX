    [a] FACTS — corrected. STRIPPED (0-hit, unsourced): "Recovery costs in the tens of millions
    USD" — no snapshotted source states any dollar figure. The 30,000 figure is now correctly
    framed as the ATTACKER'S CLAIM: pastebin verbatim "sended a malicious virus to destroy thirty
    thousand computers networked in this company," corroborated qualitatively as "three-quarters
    of Aramco's PCs" (NYT: "wiped out data on three-quarters of Aramco's PCs"; CCDCOE: "erased
    data on three-quarters of Aramco's corporate PCs … had to be replaced"). Burning-US-flag MBR
    overwrite CONFIRMED: Securelist "the overwriting of a hard drive with the mentioned JPEG …
