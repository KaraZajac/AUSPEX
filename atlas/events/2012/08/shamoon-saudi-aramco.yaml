    Securelist "just about two weeks later, another energy company … (RasGas) fell victim."

    [b] ATTRIBUTION — OVER-ATTESTATION FIXED. Prior stamp high / concur / "Mandiant / FireEye"
    -> LOW / concur-with-caveat. The one real prior source (FireEye 2017) does NOT attribute
