id: 2012-08/shamoon-saudi-aramco
name: Shamoon — destructive wiper against Saudi Aramco
start_date: 2012-08-15
disclosure_date: 2012-08-15
end_date: 2012-08-30  # AUDIT 2026-07-11: re-anchored to Aramco's recovery — "By the end of August 2012, Aramco published a statement saying that it managed to restore all the main internal network services" (CCDCOE). Prior basis (the RasGas wave) belongs to the sister event 2012-08/rasgas-shamoon.
incident_type:
  - destructive
  - wiper
initial_vector: unknown  # CCDCOE's synthesis names a privileged "company insider" as the leading (but unconfirmed) vector; no primary/forensic source proves it — held at unknown.
outcome_summary: |
  The Shamoon (Disttrack) disk-wiper struck Saudi Aramco's
  corporate network on 15 August 2012, erasing and overwriting
  the hard drives of roughly three-quarters of the company's PCs
  (NYT/CCDCOE); the attacker persona itself claimed "thirty
  thousand computers." The wiper overwrote the master boot record
  with a fragment of a JPEG of a burning U.S. flag. Damaged
  workstations had to be replaced; Aramco said it had restored its
  main internal network by the end of August 2012. A similar wiper
  struck RasGas (Qatar) about two weeks later — held canonically
  as the sister event 2012-08/rasgas-shamoon.
quantified_impact:
  endpoints_destroyed: 30000  # attacker-CLAIMED figure ("thirty thousand", Cutting Sword pastebin), corroborated qualitatively as "three-quarters of Aramco's PCs" (NYT/CCDCOE); no independent exact count is snapshotted.
false_flag_risk: suspected  # the "Cutting Sword of Justice" hacktivist persona is widely read as deniable cover for suspected Iranian state action (harmonized with sister 2012-08/rasgas-shamoon).
campaign_id: apt33-shamoon-iran-oil
summary: |
  Claimed by the hacktivist persona "Cutting Sword of Justice,"
  whose pastebin (15 Aug 2012) took credit for destroying "thirty
  thousand" Aramco computers over Saudi regional policy.
  Contemporaneous attribution to Iran is an ASSESSMENT by U.S.
  intelligence officials, explicitly hedged — "they offered no
  specific evidence" (NYT, Oct 2012; echoed by CCDCOE) — and the
  hacktivist framing is widely read as deniable cover for state
  action. The "APT33" actor bucket used here is a RETROSPECTIVE
  vendor lineage label (FireEye 2017) that the same report
  SEPARATES from the 2012 Shamoon operator ("the suspected Iranian
  group that previously used SHAMOON … a separate, less widely
  known suspected Iranian group … whom we call APT33"; "we have not
  directly observed APT33 … carry out destructive operations") and
  which it ties only to "the Iranian government," naming no IRGC
  unit (IRGC: 0 hits). Directionality Iran -> Saudi Arabia.
  Foundational event for the Iranian destructive-wiper pattern
  later reused in Shamoon 2 (2016), Shamoon 3 (2018) and
  ZeroCleare / Dustman (2019). No U.S. indictment for Shamoon 1.
attributions:
  - actor_id: ir/irgc/apt33
    attributing_org: |
      Contemporaneous layer: U.S. intelligence officials ASSESSED Iran (hedged, "no specific
      evidence" — NYT 2012 / CCDCOE). Actor label: retrospective Shamoon-lineage "APT33" bucket
      (FireEye 2017), which itself separates APT33 from the 2012 operator.
    attributing_org_confidence: low
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-09-20  # date of the retrospective FireEye APT33 lineage label; the contemporaneous nation-level assessment is Oct 2012 (NYT).
    attribution_source_id: fireeye/2017-09-20_apt33-report
    notes: |
      The well-supported layer is NATION-LEVEL (Iran, suspected/assessed). Contemporaneous
      support reaches only "U.S. intelligence officials say the attack's real perpetrator was
      Iran, although they offered no specific evidence to support that claim" (NYT 2012; CCDCOE
      repeats it). The "Cutting Sword of Justice" persona claimed Aramco (pastebin) but that is a
      hacktivist self-report, NOT a confession of state sponsorship.
      The ir/irgc/apt33 bucket is retained for CAMPAIGN CONTINUITY with the sister events
      (2012-08/rasgas-shamoon, 2016-11/shamoon-2-saudi) but is OVER-SPECIFIED for a 2012 op:
      the cited FireEye 2017 report explicitly SEPARATES APT33 from "the suspected Iranian group
      that previously used SHAMOON," states "we have not directly observed APT33 … carry out
      destructive operations," and attributes APT33 only to "the Iranian government" (IRGC /
      "Revolutionary Guard": 0 occurrences). The actor was re-homed ir/unscoped -> ir/irgc on
      2026-07-02 on the basis of a MODERN (2024 MSTIC) op, compounding the anachronism.
      confidence therefore set LOW; auspex_assessment concur-with-caveat. Prior stamp
      (high / concur, attributing_org "Mandiant / FireEye") was over-attestation and is corrected.
      No U.S. indictment for Shamoon 1. See orchestrator FLAG: campaign-level attribution review.
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A purpose-built disk wiper against the flagship national oil company of a US-aligned Gulf
      adversary, during the post-Stuxnet sanctions confrontation, reads as the low-cost, deniable
      harassment of an adversary's civilian critical infrastructure that this pillar encodes.
      Downgraded from any "attested": no cited source states the strategic PURPOSE of the attack
      (the FireEye report names no goal and separates APT33 from the 2012 operator; the pastebin
      states only an anti-Al-Saud grievance) — this is AUSPEX's triangulated inference.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target + timing: the Gulf's largest national oil company (Saudi Aramco) hit during the post-Stuxnet/sanctions confrontation — the canonical Iranian asymmetric-retaliation window against a US-aligned adversary's civilian energy sector."
        - "Payload = pure destruction: Shamoon/Disttrack overwrote ~three-quarters of corporate PCs (and the MBR) with no theft, ransom, or collection — the high-signal harassment of civilian IT this pillar describes."
        - "Deniable framing: fronted by the 'Cutting Sword of Justice' hacktivist persona, matching the pillar's cost/deniability logic."
      ruled_out: "Espionage or financial motive — Shamoon/Disttrack is a purpose-built wiper with no data-exfiltration, ransom, or intelligence-collection rationale evidenced; the goal is destruction of the adversary's civilian IT estate."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/forward-defense
    pillar_id: ir/forward-defense/proxy-projection
    program_id: null
    confidence: plausible
    reasoning: |
      Destructive cyber against the flagship energy asset of a US-aligned Gulf monarchy can also
      be read as projecting Iranian coercive reach extraterritorially at near-zero physical risk —
      the forward-defense proxy-projection logic. Kept only "plausible": the forward-defense
      doctrine was articulated more explicitly by IRGC leadership later in the decade (a mild
      anachronism for 2012), and no cited source ties this specific op to that posture.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Forward-defense proxy projection: destructive cyber against a US-aligned Gulf monarchy's flagship energy asset projects Iranian reach extraterritorially at near-zero physical risk."
        - "Simple asymmetric retaliation (the civilian-CII-coercion reading above) as post-Stuxnet/sanctions payback, with no distinct power-projection intent."
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/saudi-aramco
    country: sa
    role: primary
    outcome: |
      ~three-quarters of corporate PCs wiped and had to be replaced
      (attacker-claimed "thirty thousand computers"); MBR overwritten
      with a burning-US-flag JPEG fragment; main internal network
      restored by the end of August 2012. Production/OT not evidenced
      as affected in the cited sources.
  - target_id: orgs/rasgas
    country: qa
    role: collateral  # AUDIT 2026-07-11: demoted primary->secondary; RasGas is held canonically as its own event 2012-08/rasgas-shamoon. See orchestrator FLAG (double-representation).
    outcome: |
      Follow-on Shamoon-family wave ~2 weeks later (late Aug 2012);
      documented canonically at 2012-08/rasgas-shamoon.
