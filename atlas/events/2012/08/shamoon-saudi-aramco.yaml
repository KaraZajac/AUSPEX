id: 2012-08/shamoon-saudi-aramco
name: Shamoon — destructive wiper against Saudi Aramco and RasGas
start_date: 2012-08-15
disclosure_date: 2012-08-15
end_date: 2012-08-30
incident_type:
  - destructive
  - wiper
initial_vector: unknown  # likely insider-credential or phishing
outcome_summary: |
  Approximately 30,000 Saudi Aramco workstations destroyed by
  the Shamoon disk-wiper which overwrote the MBR with an image
  of a burning US flag. Two weeks later RasGas (Qatar) hit by a
  similar variant. Recovery costs in the tens of millions USD;
  significant operational disruption to Aramco IT operations.
quantified_impact:
  endpoints_destroyed: 30000
false_flag_risk: none
campaign_id: apt33-shamoon-iran-oil
summary: |
  Claimed by the "Cutting Sword of Justice" persona; assessed
  Iran / APT33 by vendor consensus (Mandiant / FireEye, McAfee,
  Symantec). No US indictment specifically for Shamoon 1.
  Foundational event for the Iranian destructive-wiper pattern
  later expressed in Shamoon 2 (2016), Shamoon 3 (2018), and
  ZeroCleare / Dustman (2019).
attributions:
  - actor_id: ir/irgc/apt33
    attributing_org: Mandiant / FireEye
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2017-09-20
    attribution_source_id: fireeye/2017-09-20_apt33-report
    notes: |
      No US indictment for Shamoon 1; vendor consensus
      attribution to APT33 / IRGC.
