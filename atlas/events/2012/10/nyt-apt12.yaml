    pillar_id: cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targeting of NYT correspondents specifically reporting on
      PRC leadership finance is the canonical
      counter-press / dissident-suppression pattern. The 2017
      Intelligence Law had not yet codified compelled
