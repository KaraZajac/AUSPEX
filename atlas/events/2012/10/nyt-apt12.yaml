id: 2012-10/nyt-apt12
name: New York Times intrusion by APT12 (Wen Jiabao reporting reprisal)
start_date: 2012-09-13
disclosure_date: 2013-01-30
end_date: 2013-01-25
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  The New York Times disclosed (2013-01-30) that PRC-attributed
  operators had infiltrated its corporate network for four
  months, beginning approximately on the day NYT published David
  Barboza's investigation into the family wealth of then-Premier
  Wen Jiabao (2012-10-25). Mandiant investigation identified the
  operator cluster as APT12 / IXESHE. The operators harvested
  every employee's corporate password and accessed the email
  accounts of David Barboza (Shanghai bureau chief) and Jim Yardley
  (former Beijing bureau chief). Subsequent Wall Street Journal,
  Washington Post, and Bloomberg disclosures (early 2013) cited
  similar PRC-attributed intrusions, establishing the
  press-targeting pattern as a doctrinal feature of MSS / PLA
  collection against Western reporting on Chinese leadership.
false_flag_risk: none
summary: |
  NYT/APT12 is the canonical case of PRC cyber operations
  retaliating against Western press reporting on PRC leadership
  finance. The timing — beginning the day of Barboza's
  publication, focused on reporters with leadership-finance
  reporting — establishes the dissident-and-press collection
  pattern that later codified into the broader MSS counter-
  reporting posture. Mandiant's January 2013 attribution
  immediately preceded (and contextualized) its February 2013
  APT1 report.
attributions:
  - actor_id: null
    attributing_org: Mandiant
