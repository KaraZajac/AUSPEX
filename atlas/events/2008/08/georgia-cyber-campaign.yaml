id: 2008-08/georgia-cyber-campaign
name: Georgia cyber campaign
start_date: 2008-08-07
disclosure_date: 2008-08-08
end_date: 2008-08-12
incident_type:
  - disruption
  - influence-operation
initial_vector: unknown
outcome_summary: |
  DDoS, defacements, and BGP manipulation against Georgian
  government websites, banking, and media — synchronized with
  Russian military operations against South Ossetia in the
  five-day August 2008 war. Degraded Georgian government
  communications during the war. First publicly observed
  integration of cyber with kinetic; precursor to the 2014
  Military Doctrine's non-contact concept.
false_flag_risk: none
summary: |
  Russian Business Network (RBN) executed visible disruption via
  large-scale TCP and ICMP DDoS against Georgian government
  portals (president.gov.ge, mfa.gov.ge, parliament.ge), website
  defacements substituting Saakashvili-Hitler imagery, BGP-route
  manipulation degrading external connectivity to .ge networks,
  and SQL-injection probes against media and banking front ends.
  US-CCU, Greylogic, and Bumgarner assessed GRU coordination on
  the basis of timing and target selection — DDoS waves landed
  hours before the kinetic ground advance into South Ossetia,
  with target lists distributed via Russian-language forums in
  the StopGeorgia.ru / xaker.ru ecosystem. State direction not
  legally proven; AUSPEX preserves the dossier's strongly_inferred
  call.
