id: 2008-08/georgia-cyber-campaign
name: Georgia cyber campaign
start_date: 2008-08-07
disclosure_date: 2008-08-08
end_date: 2008-08-12
incident_type:
  - disruption
  - influence-operation
initial_vector: unknown
outcome_summary: |
  DDoS, defacements, and BGP manipulation against Georgian
  government websites, banking, and media — synchronized with
  Russian military operations against South Ossetia in the
  five-day August 2008 war. Degraded Georgian government
  communications during the war. First publicly observed
  integration of cyber with kinetic; precursor to the 2014
  Military Doctrine's non-contact concept.
false_flag_risk: none
summary: |
  Russian Business Network (RBN) executed visible disruption via
  large-scale TCP and ICMP DDoS against Georgian government
  portals (president.gov.ge, mfa.gov.ge, parliament.ge), website
  defacements substituting Saakashvili-Hitler imagery, BGP-route
  manipulation degrading external connectivity to .ge networks,
  and SQL-injection probes against media and banking front ends.
  US-CCU, Greylogic, and Bumgarner assessed GRU coordination on
  the basis of timing and target selection — DDoS waves landed
  hours before the kinetic ground advance into South Ossetia,
  with target lists distributed via Russian-language forums in
  the StopGeorgia.ru / xaker.ru ecosystem. State direction not
  legally proven; AUSPEX preserves the dossier's strongly_inferred
  call.
attributions:
  - actor_id: null  # RBN-affiliated criminal infrastructure; no specific named cluster modeled
    service_id: null
    attributing_org: US-CCU / Greylogic (Bumgarner)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2009-08-01
    attribution_source_id: uscc/2009_georgia-cyber-campaign-report
    notes: |
      No DOJ or government legal attribution exists. Vendor and
      academic assessment of GRU coordination is consensus but
      not legally proven. The CCDCOE Cyber Law Toolkit source frames
      it as allegation + Russian denial: Georgia accused Russia,
      Russia denied but conceded "individuals in Russia or elsewhere
      had taken it upon themselves," and "several cyber security
      experts claimed that the attacks had been launched by a group
      known as the 'Russian Business Network', which had allegedly
      had close ties to the Russian government." attribution_level is
      nation (Russia, by allegation/expert claim), not named-unit —
      no GRU unit is legally named and AUSPEX adopts no specific
      cluster (actor_id stays null).
doctrine_links:
  - doctrine_id: ru/russkiy-mir
    pillar_id: ru/russkiy-mir/baltic-and-near-abroad
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Cyber operations synchronized with kinetic invasion of
      Georgia over the South Ossetia question — paradigmatic
      Russkiy Mir / near-abroad targeting. Subsequent 2014 Military
      Doctrine non-contact-warfare language is a retroactive
      formalization of the operational pattern visible here.
    attesting_source_id: null
    inference_basis:
      signals:
        - Target is Georgia, a post-Soviet near-abroad state the Russkiy Mir doctrine names explicitly (baltic-and-near-abroad pillar).
        - DDoS/defacement timed with the kinetic invasion over South Ossetia; CCDCOE source frames purpose as "part of Russia's warfare in the armed conflict" that "created the time and space for Russia to shape the international narrative."
        - Effect degraded Georgian government's ability to communicate during the war (Deutsche Telekom rerouting), consistent with near-abroad coercion.
      ruled_out: >
        Not strongly_inferred-to-attested: no authoritative source states the
        Russkiy Mir / near-abroad strategic PURPOSE at the goal level — the
        sources describe the operation as wartime support but do not articulate
        the civilizational/near-abroad end the doctrine encodes, and firm state
        attribution itself is contested (RBN/criminal overlap, Russian denial).
        Competing reading considered and not adopted: pure patriotic-hacker
        opportunism with no strategic direction — rejected as the SOLE
        explanation given the precise timing and target selection against
        government/MoD/media, but it remains a live enough alternative that the
        link stays strongly_inferred rather than attested.
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: orgs/georgia-government
    role: primary
  - target_id: orgs/georgia-banking-sector
    role: primary
  - target_id: orgs/georgia-media
    role: primary
sources:
  - uscc/2009_georgia-cyber-campaign-report
