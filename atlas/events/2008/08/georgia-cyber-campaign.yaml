qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial
  notes: "Canonical Aug-2008 Russia-Georgia war cyber campaign. Of two cited sources: CCDCOE Cyber Law Toolkit fetched + hashed (raw snapshot captured); US-CCU/Bumgarner report UNFETCHABLE (url: null, domain defunct, archive.org blocked) -> level: partial. FACTS verified vs the CCDCOE primary text: DDoS against Georgian government portals, defacements with Saakashvili-Hitler imagery, targets = President/Parliament/Foreign-Affairs/Defence ministries + news agencies + commercial entities, Deutsche-Telekom traffic rerouting, severely-disrupted government comms, and 'one of the first examples of offensive cyber attacks forming part of synchronized kinetic military operations.' Timing confirmed against the public record: a precursor DDoS hit president.gov.ge ~19 Jul 2008; the major war-synchronized DDoS round climaxed 8 Aug 2008; Aug-9 traffic redirection via Russian/Turkish servers corroborates the routing/BGP-manipulation claim; Saakashvili-Hitler defacement by 11 Aug. start_date 2008-08-07 / disclosure 2008-08-08 / end 2008-08-12 are sound for the war-synchronized campaign AUSPEX models. ATTRIBUTION (did NOT over-attest to the Russian state): the CCDCOE source frames it as allegation + Russian denial -- Georgia accused Russia; Russia denied but conceded 'individuals in Russia or elsewhere had taken it upon themselves'; 'several cyber security experts claimed' RBN, 'which had allegedly had close ties to the Russian government.' Firm state/GRU attribution is NOT established; actor_id correctly stays null (the only RBN/pro-Russia actor modeled, ru/gru/xaknet, is a 2022-era group -- wrong era, not a fit). CORRECTIONS: (1) added attribution_level: nation (Russia by allegation/expert claim; no GRU unit legally named, AUSPEX adopts no specific cluster) -- was missing; expanded the attribution note with the CCDCOE verbatim framing. (2) doctrine_link ru/russkiy-mir/baltic-and-near-abroad kept strongly_inferred (NOT upgraded to attested -- no source states the near-abroad strategic purpose at goal level; CCDCOE 'part of Russia's warfare' is proximate, and state attribution itself is contested); added inference_basis {signals, ruled_out} to make the WHY auditable. attesting_source_id stays null (correct for non-attested). (3) BGP-route-manipulation + banking/SQL-injection specifics rest on the unfetchable US-CCU report (banking is a subset of CCDCOE's 'commercial entities'); flagged in both source notes, not stripped (independently corroborated). FK NOTE (out of single-event scope, not an error): targets orgs/georgia-government, orgs/georgia-banking-sector, orgs/georgia-media have no targets-registry entries -- but orgs/ target FK gaps are gate-INFORMATIONAL corpus-wide ('targets/ normalization deferred' in validate.ts), so this is a known tolerated gap, not a per-event defect."
