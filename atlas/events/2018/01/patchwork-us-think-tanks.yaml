    pillar_id: in/regional-collection-pakistan-china/china-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targeting US think tanks whose China-policy output is itself
      the lure theme (CFR/CSIS/MERICS/FPRI China analysis) is a
      coherent extension of the China-collection pillar: collection
      on the PRC question by proxy through Western policy-research
      analysis, matching Patchwork's documented PRC-adjacent
      collection mission. Not attested — Volexity's report is a
      technical/targeting disclosure and states no strategic purpose.
    attesting_source_id: null
    inference_basis:
      signals:
        - "All three lures are China-policy content (CSIS 'China's Arctic Dream', CFR 'The Four Traps China May Fall Into', MERICS 'Authoritarian Advance: ... China's growing political influence in Europe')."
        - "Patchwork's actor profile and the china-collection pillar both explicitly include think tanks studying China in the target set."
        - "Volexity names the actor as 'an Indian APT group', so the doctrine state matches the actor state (attacker-rationale link, no perspective tag needed)."
      ruled_out: "Regional diplomatic-collection pillar — the victims are US (not Afghan/Sri Lankan/Nepalese) and every theme is the PRC question, so china-collection dominates within the India doctrine menu. The residual nuance (collection on US views OF the PRC vs. on the PRC directly) serves the same China-question end and keeps the link strongly_inferred rather than attested."
    contested: false
    analyst: claude
