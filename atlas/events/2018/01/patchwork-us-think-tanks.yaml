id: 2018-01/patchwork-us-think-tanks
name: Patchwork spear-phishing of US-based China-focused think tanks
start_date: 2017-05-01
disclosure_date: 2018-01-09
end_date: 2017-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Volexity and adjacent vendor reporting documented Patchwork /
  Dropping Elephant operations against US-based think tanks
  conducting China-focused policy research during 2017. Targets
  included scholars working on PLA modernization, the Belt and
  Road Initiative, and South China Sea issues. Tradecraft
  included weaponized Office documents with Patchwork's BADNEWS
  and NDiskMonitor implants; lures themed on China-policy
  conference invitations and academic correspondence.
false_flag_risk: none
summary: |
  An early high-confidence case of Patchwork's reach beyond
  South Asia into US-located China-watching scholarship — the
  precise victim set Indian intelligence is incentivized to
  collect on as it seeks insight into US views of PLA capability
  and Indo-Pacific posture. The campaign predates the formal
  emergence of the Quad as a strategic concept but is consistent
  with the underlying Indian interest in US-PRC threat
  perception.
