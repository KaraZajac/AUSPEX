id: 2018-01/patchwork-us-think-tanks
name: Patchwork spear-phishing of US-based China-focused think tanks
start_date: 2018-03-01
disclosure_date: 2018-06-07
end_date: 2018-04-30
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Volexity documented three Patchwork / Dropping Elephant spear-
  phishing campaigns in March and April 2018 in which the group
  pivoted to target US-based think tanks. The lures impersonated
  well-known China-policy institutions — copying their articles and
  spoofing look-alike domains of the Council on Foreign Relations
  (CFR), the Center for Strategic and International Studies (CSIS),
  the Foreign Policy Research Institute (FPRI), and the Mercator
  Institute for China Studies (MERICS). Each email linked to a .doc
  that was actually an RTF exploiting CVE-2017-8570 (Composite
  Moniker) using public GitHub exploit code; on success it dropped
  QuasarRAT, a freely available remote-access tool. The actors also
  embedded unique tracking links/image beacons to identify which
  recipients opened the messages.
false_flag_risk: none
summary: |
  Volexity attributed three March–April 2018 spear-phishing
  campaigns to Patchwork (an Indian APT, also known as Dropping
  Elephant) in which the group pivoted to target US-based think
  tanks. The lures impersonated US/EU foreign-policy institutions
  working on China (CFR, CSIS, FPRI, MERICS), each delivering an RTF
  that exploited CVE-2017-8570 to drop QuasarRAT. AUSPEX reads the
  operation as collection on the US China-policy debate — the view
  of the PRC that US think tanks produce — consistent with
  Patchwork's documented PRC-adjacent collection and the broader
  Indian interest in US–PRC threat perception. Volexity noted the
  activity was consistent with concurrent Patchwork reporting by 360
  Threat Intelligence Center and Trend Micro.
