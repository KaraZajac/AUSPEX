id: 2018-01/applejeus-campaign
name: AppleJeus campaign (long-running)
start_date: 2018-01-01
disclosure_date: 2018-08-23  # initial Kaspersky disclosure
end_date: null  # continuing under Citrine Sleet rebrand
incident_type:
  - financial-theft
  - intrusion
initial_vector: supply-chain
outcome_summary: |
  Long-running TraderTraitor / Citrine Sleet operation
  distributing trojanized cryptocurrency trading applications
  to cryptocurrency exchanges and traders globally. Multiple
  named versions: Celas Trade Pro (initial 2018), JMTTrading,
  Union Crypto Trader, Kupay Wallet, CoinGoTrade, Dorusio,
  Ants2Whale. Tens of millions cumulative; precursor tradecraft
  for later TraderTraitor heists.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  CISA AA21-048A (February 2021) consolidated the campaign
  attribution and named DPRK actors. The operation continues into
  the post-2021 period under the actor AUSPEX tracks as Citrine
  Sleet (a later Microsoft designation for the same DPRK lineage;
  the two CISA advisories cited here do not use that name).
  AppleJeus distributes trojanized cryptocurrency trading
  applications (Celas Trade Pro, JMTTrading, Union Crypto Trader,
  Kupay Wallet, CoinGoTrade, Dorusio, Ants2Whale) signed with
  valid code-signing certificates obtained via shell-company front
  pages — a recurring DPRK supply-chain pattern. The installers
  drop the FALLCHILL and Manuscrypt remote-access trojans on
  Windows and macOS, including documented macOS Mach-O variants.
  Post-installation, operators harvest wallet keys and exchange
  credentials, staging the theft of the targeted crypto assets to
  attacker wallets and laundering the proceeds.
attributions:
