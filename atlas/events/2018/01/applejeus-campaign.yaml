    notes: "AA22-108A: 'North Korean State-Sponsored APT Targets Blockchain Companies', 'commonly tracked by the cybersecurity industry as Lazarus Group, APT38, BlueNoroff, and Stardust Chollima' — nation + named cluster (TraderTraitor), NO service named, so kp/unscoped is correct. attribution_level=named-actor."
