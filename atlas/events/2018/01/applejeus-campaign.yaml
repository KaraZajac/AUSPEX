    notes: "AA21-048A attributes AppleJeus to 'Lazarus Group' / 'North Korean state-sponsored APT actors' / 'HIDDEN COBRA' (nation + named cluster) and names NO DPRK service — no Reconnaissance General Bureau / Bureau 121 string appears, and it predates and does not use the Microsoft 'Citrine Sleet' name. attribution_level=named-actor (not named-unit); auspex_assessment=concur-with-caveat because AUSPEX maps this to the RGB-scoped kp/rgb/citrine-sleet actor, but that unit placement rests on a later Microsoft source not cited in this event, not on AA21-048A."
