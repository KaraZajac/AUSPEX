qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-02
  level: full
  notes: |
    8th-Congress attestation re-check + full 6-point audit. Both cited CISA advisories
    were already snapshotted; both hashes RE-VERIFIED on disk 2026-07-02.
    Source A = cisa/2021-02-17_aa21-048a-applejeus (AppleJeus), sha256 1e3dde69…5afefc54,
    133,262 bytes. Source B = cisa/2022-04-18_aa22-108a-tradertraitor (TraderTraitor),
    sha256 8c1bfad1…756afcfd, 83,739 bytes. Neither is a phantom — both are the real,
    on-point CISA advisories carrying the core AppleJeus/TraderTraitor facts.

    [d] DOCTRINE_LINKS — the headline correction. The kp/8th-congress-defense-plan link
    was `attested` to Source B. Source B states ONLY the proximate goal — verbatim: "These
    actors will likely continue exploiting vulnerabilities of cryptocurrency technology
    firms, gaming companies, and exchanges to generate and launder funds to support the
    North Korean regime." Raw grep of Source B for the terminal end-use returns ZERO hits:
    no 'weapons of mass destruction', 'WMD', 'ballistic missile', 'nuclear program', or
    'missile program'. Per the SCHEMA attestation boundary (a source naming only a
    proximate/regime-funding goal earns strongly_inferred, not attested) and this
    doctrine's OWN per-event rule ("attested ONLY where the event's cited source states the
    TERMINAL WMD / ballistic-missile-financing goal in substance"), DOWNGRADED
    attested -> strongly_inferred and added inference_basis {signals[], ruled_out}.
    Temporal cross-check reinforces this: AppleJeus starts 2018 but the 8th-Congress plan
    was issued 2021-01-09, so a 2018-origin op cannot be "attested" to a 2021 plan; the
    link is retained (not deleted) because the campaign is long-running and continues
    post-2021 — AUSPEX convention re-anchors the active-era continuation to the 8th-Congress
    plan while the separately-linked kp/byungjin/sanctions-evasion-revenue carries the 2018
    origin. Also set program_id null: the previous program crypto-bridge-theft is scoped in
    the doctrine file to 2022+ DeFi/exchange bridge heists (Ronin/Harmony/…), which AppleJeus
    (trojanized-trading-app supply-chain theft) is not; the honest granularity is the
    revenue-aggregation pillar. The byungjin link (already strongly_inferred) was verified
    correct: Source A carries its cited proximate goal "circumvent international sanctions on
    North Korea" (1 hit) and no WMD wording — left unchanged.

    [a] FACTS — corrected against the raw. KEPT (source-carried): all 7 app variants
    (Celas Trade Pro, JMTTrading, Union Crypto Trader, Kupay Wallet, CoinGoTrade, Dorusio,
    Ants2Whale — all present in Source A), FALLCHILL (Source A, 6 hits), Manuscrypt as a
    macOS+Windows RAT (Source B: "updated macOS and Windows variants of Manuscrypt, a custom
    remote access trojan"), valid code-signing certificates (Source A: code-sign 5 / certificate
    18 / signed 7), macOS Mach-O variants (Source A: macOS 41 / Mach-O 1), Celas-LLC front
    (Source A, 9 hits), "steal private keys" (Source B), "launder funds" (Source B). STRIPPED
    (carried by NO cited source): "clipper modules" (0 hits both), "mixers tracked by
    Chainalysis" (Chainalysis 0 / mixer 0 — softened to "laundering the proceeds", which
    Source B carries), the "August 2024 Chrome zero-day" claim and the "Microsoft Citrine
    Sleet designation" narrative (both 0 hits in the cited advisories — reframed as the
    later AUSPEX/Microsoft actor name with an explicit note that the cited sources do not use
    it), and the "among the earliest publicly documented" superlative (unsourced). Dollar
    figure "tens of millions cumulative" is conservative vs Source A's "$100 Million" /
    "hundreds of millions" — left. disclosure_date 2018-08-23 is the real Kaspersky
    "Operation AppleJeus" date but Kaspersky is not among the two cited sources (minor
    residual sourcing gap; date is historically accurate — left, flagged below).

    [b] ATTRIBUTION / [e] ATTRIBUTION_LEVEL — both attributions lacked attribution_level; set.
    Attribution 1 (kp/rgb/citrine-sleet <- Source A): Source A reaches "Lazarus Group" (2) /
    "HIDDEN COBRA" (12) / "North Korean state-sponsored" — named-actor + nation, and names NO
    RGB/Bureau 121. Set attribution_level=named-actor and auspex_assessment concur ->
    concur-with-caveat, with a note that the RGB/Citrine-Sleet unit placement rests on a later
    Microsoft source not cited here (mirrors the source record's own audit note). Attribution 2
    (kp/rgb/tradertraitor <- Source B): "North Korean State-Sponsored APT" / "Lazarus
    Group, APT38, BlueNoroff, and Stardust Chollima" — nation + named cluster, no service; the
    kp/unscoped placement is correct; set attribution_level=named-actor, concur retained.

    [c] DATES — verified. Source A published_on 2021-02-17, Source B 2022-04-18 (both match
    advisory dates). Event start_date 2018-01-01 (AppleJeus since 2018, per Source A), end_date
    null (continuing), attribution_dates 2021-02-17 / 2022-04-18 all correct.

    [f] ACTOR_ID — both resolve: kp/rgb/citrine-sleet -> atlas/actors/kp/citrine-sleet.yaml;
    kp/rgb/tradertraitor -> atlas/actors/kp/tradertraitor.yaml. Not edited (per protocol).

    FLAGS for orchestrator: (1) Attribution-1 anachronism — the event pins an RGB/Bureau-121-
    scoped Citrine Sleet actor onto a 2021 CISA source that only reaches Lazarus/nation; the
    unit-level placement depends on an uncited Microsoft source. Consider adding that Microsoft
    source to the event, or the actor record must carry it (not verified here — actor files not
    edited). (2) disclosure_date rests on a Kaspersky disclosure not in the cited sources.
    (3) Source-record fix applied to cisa/2021-02-17_aa21-048a-applejeus: its top note claimed
    "ties proceeds to WMD financing" — false per the raw (0 WMD hits; only "circumvent
    international sanctions") and contradicted by its own 2026-06-24 audit note; corrected.
