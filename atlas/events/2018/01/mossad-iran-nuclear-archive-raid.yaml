id: 2018-01/mossad-iran-nuclear-archive-raid
name: Mossad raid on Iranian nuclear-archive warehouse (Tehran)
start_date: 2018-01-31
disclosure_date: 2018-04-30  # Netanyahu's public reveal (televised, Tel Aviv)
end_date: 2018-01-31
incident_type:
  - intrusion   # physical infiltration of the warehouse (source: "infiltrated a secret warehouse")
  - data-theft  # ~50,000 paper docs + 183 CD-ROMs of electronic files exfiltrated
  - espionage   # source infobox Motive: "Espionage"
initial_vector: physical  # HUMINT-led on-site infiltration; SIGINT pre-positioning and digital document-handling are the cyber-adjacent elements
outcome_summary: |
  Mossad agents infiltrated a secret AMAD Project archive warehouse
  in the Kahrizak District of southern Tehran in the early hours of
  31 January 2018 (00:01-06:30 IRST). Within approximately six and a
  half hours, the team cut open 6 of the 32 safes present with
  high-temperature torches and exfiltrated approximately 50,000 paper
  documents and roughly 55,000 pages of additional material on 183
  CD-ROMs, documenting the AMAD Project's nuclear-weapons work between
  1999 and 2015. Israeli Prime Minister Netanyahu publicly presented
  the seized archive on 30 April 2018 in a televised address in Tel
  Aviv. The presentation was used to argue against US continuation of
  the JCPOA; the United States withdrew from the JCPOA days later, on
  8 May 2018 (the specific date per the referenced
  il/2018-us-jcpoa-withdrawal timeline-marker — the cited Wikipedia
  source says only "Days after").
quantified_impact:
  paper_documents_seized: 50000
  cd_rom_pages_seized: 55000
  cd_roms_seized: 183
  safes_cut: 6        # source: "the agents only cut open six of the 32 safes"
  safes_present: 32   # total safes in the warehouse
false_flag_risk: none  # officially attested by Israel
summary: |
  HUMINT-led Mossad operation against the AMAD Project nuclear-archive
  warehouse, included in the AUSPEX atlas because SIGINT preparation
  and exfiltrated digital media (the 183 CD-ROM trove) are the cyber-
  adjacent elements that anchor the event to the cyber-doctrine corpus.
  AUSPEX-internal scope rule: this is the rare IL operation where the
  Israeli government has formally attested its responsibility — Prime
  Minister Netanyahu's televised 30 April 2018 reveal of the seized
  archive in Tel Aviv is the on-the-record attestation.
  The operation is the single most-documented break with the standing
  Israeli non-attestation discipline for offensive operations and is
  the type specimen for "Begin-Doctrine kinetic-and-cyber counter-WMD
  action under formal IL attribution."

  Doctrinally the operation sits squarely under the Begin Doctrine's
  no-tolerance-regional-nuclear pillar and the QME counter-
  proliferation pillar. Operationally it was timed to influence the
  US JCPOA-withdrawal decision; the 8 May 2018 US withdrawal followed
  the public reveal by eight days.

  Cyber-adjacency caveat: the operation was HUMINT-and-physical-access
  led, with cyber participation limited to (i) SIGINT pre-positioning
  for target development (intercepted Iranian communications, per the
  source), and (ii) post-exfiltration digital handling of the seized
  CDs (images transmitted to a Tel Aviv command center in real time;
  data transferred digitally before the exfiltration lorry crossed the
  border). The atlas records the event primarily for doctrinal-and-
  attestation reasons rather than as a pure cyber operation.
