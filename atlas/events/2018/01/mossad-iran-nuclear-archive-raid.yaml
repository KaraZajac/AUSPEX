id: 2018-01/mossad-iran-nuclear-archive-raid
name: Mossad raid on Iranian nuclear-archive warehouse (Tehran)
start_date: 2018-01-31
disclosure_date: 2018-04-30  # Netanyahu's public reveal at the IL defense ministry
end_date: 2018-01-31
incident_type:
  - intrusion
  - destructive  # documents and CDs physically exfiltrated; safes burned through with blowtorches
initial_vector: physical  # HUMINT-led on-site infiltration; cyber-OSINT and document-handling are the cyber-adjacent elements
outcome_summary: |
  Mossad agents infiltrated a secret AMAD Project archive warehouse
  in the Kahrizak District of southern Tehran in the early hours of
  31 January 2018. Within approximately six and a half hours, the
  team cut through 32 safes with high-temperature torches and
  exfiltrated approximately 50,000 paper documents and roughly
  55,000 pages of additional material on 183 CD-ROMs, documenting
  the AMAD Project's nuclear-weapons work between 1999 and 2015.
  Israeli Prime Minister Netanyahu publicly presented the seized
  archive on 30 April 2018 at the IL defense ministry, displaying
  binders and CDs in a televised address. The presentation was
  used to argue against US continuation of the JCPOA; the United
  States withdrew from the JCPOA eight days later on 8 May 2018.
quantified_impact:
  paper_documents_seized: 50000
  cd_rom_pages_seized: 55000
  cd_roms_seized: 183
  safes_cut: 32
false_flag_risk: none  # officially attested by Israel
summary: |
  HUMINT-led Mossad operation against the AMAD Project nuclear-archive
  warehouse, included in the AUSPEX atlas because cyber-OSINT preparation
  and exfiltrated digital media (the 183 CD-ROM trove) are the cyber-
  adjacent elements that anchor the event to the cyber-doctrine corpus.
  AUSPEX-internal scope rule: this is the rare IL operation where the
  Israeli government has formally attested its responsibility — Prime
  Minister Netanyahu's televised 30 April 2018 reveal of the seized
  archive at the IL defense ministry is the on-the-record attestation.
  The operation is the single most-documented break with the standing
  Israeli non-attestation discipline for offensive operations and is
  the type specimen for "Begin-Doctrine kinetic-and-cyber counter-WMD
  action under formal IL attribution."

  Doctrinally the operation sits squarely under the Begin Doctrine's
  no-tolerance-regional-nuclear pillar and the QME counter-
  proliferation pillar. Operationally it was timed to influence the
  US JCPOA-withdrawal decision; the 8 May 2018 US withdrawal followed
  the public reveal by eight days.

  Cyber-adjacency caveat: the operation was HUMINT-and-physical-access
  led, with cyber participation limited to (i) OSINT and SIGINT pre-
  positioning for target development, and (ii) post-exfiltration digital-
  forensics processing of the seized CDs. The atlas records the event
  primarily for doctrinal-and-attestation reasons rather than as a
  pure cyber operation.
