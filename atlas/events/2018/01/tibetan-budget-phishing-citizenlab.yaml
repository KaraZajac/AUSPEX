id: 2018-01/tibetan-budget-phishing-citizenlab
name: Long-running credential phishing against Tibetan civil society
start_date: 2016-01-01
disclosure_date: 2018-01-30
end_date: 2017-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Citizen Lab discloses a multi-year credential-phishing
  operation against Tibetan civil-society organizations.
  Lure emails impersonated trusted community organizations,
  individuals, and Google account-warning messages, directing
  victims to Gmail-clone phishing pages. Operator infrastructure
  inexpensive (commodity VPS, free Google services), in
  contrast to higher-end PRC-aligned mobile-exploit operations
  against the same community.
false_flag_risk: none
summary: |
  Establishes the persistent-baseline-operator pattern against
  the Tibetan diaspora: even when no advanced exploit
  capability is in use, MSS-aligned (or MSS-tolerated) operators
  maintain durable credential-phishing pressure against the
  same victim set. Citizen Lab refrains from explicit state
  attribution; AUSPEX assesses the diaspora-and-dissident
  pillar as defensible by victim profile alone — Tibetan
  civil-society organizations are an NIL-2017 sanctioned
  collection target regardless of which operator owns the
  infrastructure. The "budget" framing also matters for
  AUSPEX baselining: it documents that durable Tibetan
  collection does not require expensive tooling, complicating
  any threat-intel framing built around exploit-cost as a
  proxy for state intent.
attributions:
  - actor_id: cn/unscoped/mustang-panda
    attributing_org: Citizen Lab
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-01-30
    attribution_source_id: citizenlab/2018-01-30_tibetan-budget-phishing
    notes: |
      Citizen Lab does not assert state attribution. Working
