id: 2018-01/tibetan-budget-phishing-citizenlab
name: Long-running credential phishing against Tibetan civil society
start_date: 2016-01-11
disclosure_date: 2018-01-30
end_date: 2017-07-05
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  Citizen Lab discloses a long-running (19-month, 2016–2017)
  credential-phishing operation against Tibetan civil-society
  organizations. Lure emails impersonated trusted community
  organizations, individuals, and Google account-warning
  messages, directing victims to Gmail-clone phishing pages.
  Operator infrastructure was inexpensive (commodity VPS, free
  Google Drive / Gmail services; Citizen Lab estimates ~US$1,000
  total), reflecting a broader shift away from the document-based
  malware attachments that historically dominated espionage
  against the same community toward low-cost phishing.
false_flag_risk: none
summary: |
  Establishes the persistent-baseline-operator pattern against
  the Tibetan diaspora: even when no advanced exploit capability
  is in use, an operator serving PRC collection interests
  (whether state-sponsored or merely tolerated) maintained
  durable credential-phishing pressure on the same victim set for
  ~19 months. Citizen Lab explicitly refrains from state
  attribution — "it is unclear who the sponsor of the operation
  is" — and floats a low-level-contractor / for-hire reading;
  AUSPEX therefore leaves the operator unattributed (actor_id
  null) and rests the China-nexus on victim profile alone:
  Tibetan civil-society organizations, the Dalai Lama's office,
  Uyghurs, and Falun Gong media are a canonical
  diaspora-and-dissident collection set under AUSPEX's reading of
  the 2017 National Intelligence Law, regardless of which operator
  owns the infrastructure. The "budget" framing also matters for
  AUSPEX baselining: it documents that durable Tibetan collection
  does not require expensive tooling, complicating any threat-intel
  framing built around exploit-cost as a proxy for state intent.
attributions:
  - actor_id: null
    attributing_org: Citizen Lab
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-01-30
    attribution_source_id: citizenlab/2018-01-30_tibetan-budget-phishing
    notes: |
      Citizen Lab names NO actor and explicitly declines sponsor
      attribution: "it is unclear who the sponsor of the operation
      is" and "Nor is it clear if the operators had a specific
      sponsor and/or who was the ultimate consumer of data
      collected"; it assesses the operator "may be a low level
      contractor servicing multiple clients." actor_id set to null
      (unattributed): the prior cn/unscoped/mustang-panda
      assignment was an unsourced AUSPEX working guess — the words
      "Mustang Panda" (or any named group, MSS, or RedAlpha) appear
      NOWHERE in the report, and the low-budget credential-phishing
      tradecraft is the opposite of Mustang Panda's PlugX/USB-worm
      malware profile. Citizen Lab did cluster the activity into one
      coherent operation (shared registrant identity indicators
      across 172 domains, four phases) → attribution_level:
      activity-cluster, but went no further. The China-nexus is an
      AUSPEX victimology inference (see doctrine_links), not a
      Citizen Lab attribution: CL only notes the target themes are
      "all of political interest to the government of China" and
      "often suspected to be carried out by operators directly
      sponsored or tacitly supported by Chinese government agents."
doctrine_links:
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Tibetan civil-society targeting (plus Uyghur and Falun Gong
      themes) fits the diaspora-and-dissident-collection pillar by
      victim profile alone, regardless of which operator owns the
      infrastructure. Graded plausible rather than higher because
      the sole source (Citizen Lab) explicitly declines to
      establish a state sponsor and floats a low-level-contractor /
      conventional-cybercrime reading, so a non-state strategic
      reading survives alongside the PRC-collection one; the actor
      is also unattributed (actor_id null), leaving no actor-mission
      to triangulate.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "PRC diaspora/dissident collection (NIL-2017 diaspora-and-dissident pillar): the sustained 19-month core targeting is the canonical PRC-interest civil-society set — Tibetan exile government (CTA) and human-rights groups, the Dalai Lama's office, Uyghurs (World Uyghur Congress) and Falun Gong media (Epoch Times); Citizen Lab states these themes are 'all of political interest to the government of China' and that such targeting is 'often suspected to be carried out by operators directly sponsored or tacitly supported by Chinese government agents'."
        - "Freelance contractor / conventional cybercrime with no specific state sponsor: Citizen Lab explicitly declines sponsor attribution ('it is unclear who the sponsor of the operation is'), assesses the operator 'may be a low level contractor servicing multiple clients', and notes the used-car-website phishing 'may be evidence of the operators using the infrastructure for general cyber crime activities' — so a non-state reading survives."
    counter_explanation: null
    contested: false
    analyst: claude
