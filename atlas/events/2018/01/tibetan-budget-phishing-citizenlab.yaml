qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-27
  level: full
  notes: |
    Audited against the raw Citizen Lab report "Spying on a Budget: Inside a Phishing
    Operation with Targets in the Tibetan Community" (citizenlab__2018-01-30_tibetan-budget-phishing.html,
    sha256 f6fd72a5…b9404572, 308855 bytes; pre-existing snapshot, hash re-verified). Single
    source; tier primary (first-party Citizen Lab / Munk School research) — correct.
    [a] FACTS — corrected. The op ran "19 months", infrastructure "active as early as January
    11, 2016", shut down "On July 5, 2017" (all verbatim) — fixed dates (below). Verified:
    impersonation of community orgs/individuals + a "Google Mail Verification" account-warning
    template; Gmail-clone phishing pages; ~US$1,000 infrastructure ("could be run for a little
    over 1,000 USD"); commodity VPS (Choopa, Forewin) + free Google Drive (96% of decoys) /
    Gmail; exfiltration of private CTA/NGO documents from "at least two compromised accounts";
    the malware→phishing shift ("another example of a shift from targeted malware to phishing
    operations"; historically "document-based malware sent as email attachments"). REMOVED a
    fabricated embellishment from outcome_summary: "in contrast to higher-end PRC-aligned
    mobile-exploit operations" — the report says nothing about mobile exploits; its actual
    contrast is with document-malware attachments. Tightened "multi-year" → "19-month".
    [b] ATTRIBUTION — major downgrade. Citizen Lab names NO actor and explicitly declines
    sponsorship: "it is unclear who the sponsor of the operation is and how information
    collected by it may be used" and "Nor is it clear if the operators had a specific sponsor
    and/or who was the ultimate consumer of data collected"; it assesses the operator "may be a
    low level contractor servicing multiple clients." grep of the raw HTML for
    mustang|panda|redalpha|MSS|"ministry of state security" → ZERO hits. The prior
    actor_id cn/unscoped/mustang-panda with attributing_org "Citizen Lab" was therefore a
    source-unsupported attribution (and a poor TTP fit — Mustang Panda is a PlugX/USB-worm
    actor, not a $1k credential-phisher). FIXED: actor_id → null (unattributed); attributing_org
    stays Citizen Lab; attribution_level added = activity-cluster (CL clustered the activity via
    shared registrant indicators across 172 domains / four phases but went no higher);
    attributing_org_confidence kept low; auspex_assessment kept concur-with-caveat (AUSPEX
    concurs with CL's non-attribution, caveat = the victimology-based China nexus). The summary's
    "MSS-aligned (or MSS-tolerated)" was rewritten to "PRC collection interests (state-sponsored
    or merely tolerated)" to match CL's "directly sponsored or tacitly supported by Chinese
    government agents" — MSS is named by neither the report nor (per the actor file) any of the
    actor's own sources.
    [c] DATES — corrected. start_date 2016-01-01 → 2016-01-11 (CL "active as early as January
    11, 2016"; Table 1's first IP is "Between December 2015 and February 2016", so this is the
    earliest stated-in-prose date — residual ±~1mo). end_date 2017-12-31 → 2017-07-05 (CL: the
    server "was shut down" on July 5 2017 with "no evidence that the operators moved to new
    infrastructure"; the Oct/Nov-2017 items are CL's own UK2-bug disclosure, not operator
    activity). disclosure_date 2018-01-30 = source published_on ✓ (article "Date Published
    January 30, 2018").
    [d] DOCTRINE_LINKS — downgraded strongly_inferred → plausible. No source states the strategic
    purpose (not attested; attesting_source_id stays null, correct). Downgrade rationale: the
    only source explicitly declines a state sponsor and floats a non-state (contractor/cybercrime)
    reading, so more than one strategic reading survives — the plausible bar, not the
    "one reading, no serious competitor" strongly_inferred bar. Added inference_basis.alternatives
    (the two surviving readings, each with a verbatim CL quote). The link is retained because the
    diaspora-and-dissident victimology is unambiguous and CL-confirmed ("all of political interest
    to the government of China"). NOTE for orchestrator: strongly_inferred is a defensible
    alternative grade on victimology strength — flagged as a judgment call.
    [e] ATTRIBUTION_LEVEL — set to activity-cluster (was missing); see [b].
    [f] ACTOR_ID — the nulled actor cn/unscoped/mustang-panda DOES resolve
    (atlas/actors/cn/mustang-panda.yaml), so no dangling FK, but its assignment here was wrong on
    both source-support and TTP grounds (flagged below; no actor file edited).
    RESIDUAL: with actor_id null + a cn/ doctrine link this event will surface on
    verify_atlas.py doctrine-state-mismatch (expected review item — the China nexus is a
    victimology inference, not an attribution).
