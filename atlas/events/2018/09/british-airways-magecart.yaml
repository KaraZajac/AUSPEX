id: 2018-09/british-airways-magecart
name: Magecart Group 6 e-skimming attack on British Airways
start_date: 2018-08-21
disclosure_date: 2018-09-06
end_date: 2018-09-05
incident_type:
  - intrusion
  - data-theft
initial_vector: web-app
outcome_summary: |
  Magecart Group 6 operators injected 22 lines of customised
  JavaScript skimmer into the British Airways online booking
  flow (specifically the baggage-claim page baggageclaim.js
  resource). The skimmer harvested approximately 380,000 to
  430,000 payment-card transactions including CVV codes and
  cardholder details over a ~15-day window before being
  detected by RiskIQ researchers. ICO subsequently fined BA
  GBP 20M in October 2020 (reduced from a GBP 183M initial
  notice of intent under Article 83 GDPR — the largest such
  fine at that time).
quantified_impact:
  cards_compromised: 430000
  ico_fine_gbp: 20000000
  ico_initial_intent_gbp: 183000000
false_flag_risk: none
summary: |
  Canonical Magecart e-skimming case: targeted Javascript injection,
  short dwell, payment-card harvest at scale. AUSPEX classifies as
  criminal-baseline with no doctrinal targeting — Magecart Group 6
  was a primarily Russian-speaking cluster but no state-nexus
  attribution has been made and victim selection across the
  Magecart umbrella spans all major e-commerce jurisdictions.
attributions:
  - actor_id: criminal/magecart
    attributing_org: RiskIQ + Flashpoint + ICO
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2018-09-11
    attribution_source_id: riskiq/2018-11-13_magecart-inside-and-beyond-report
doctrine_links: []
targets:
