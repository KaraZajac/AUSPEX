id: 2018-09/british-airways-magecart
name: Magecart Group 6 e-skimming attack on British Airways
start_date: 2018-08-21
disclosure_date: 2018-09-06
end_date: 2018-09-05
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Magecart operators injected a small (22-line) customised
  JavaScript card-skimmer into the British Airways online
  booking/payment flow. RiskIQ found the skimmer was a
  trojanized copy of the Modernizr JavaScript library (version
  2.6.2) served from the baggage-claim information page, which
  grabbed payment-card details (including CVV) on submit and
  exfiltrated them to a look-alike domain (baways.com). Payments
  were affected from 22:58 BST 21 August 2018 until 21:45 BST
  5 September 2018 (~15 days); RiskIQ/BA estimated ~380,000
  affected card transactions. The UK ICO later (16 October 2020)
  assessed that personal data of ~429,612 data subjects had been
  accessible (~244,000 with full card details incl. CVV) and
  fined BA GBP 20M — the largest ICO penalty to that date,
  reduced from the GBP 183M it had originally announced it
  intended to issue (partly for Covid-19 and BA's remediation).
quantified_impact:
  cards_compromised: 380000
  data_subjects_accessible: 429612
  ico_fine_gbp: 20000000
  ico_initial_intent_gbp: 183000000
false_flag_risk: none
summary: |
  Canonical Magecart e-skimming case: targeted JavaScript
  injection, short dwell, payment-card harvest at scale. RiskIQ
  attributed the breach to the Magecart collective (2018-09-11)
  and its joint RiskIQ/Flashpoint "Inside Magecart" report
  (2018-11-13) placed BA under the selective "Group 6" operator
  cluster. AUSPEX classifies as criminal-baseline with no
  doctrinal targeting — Magecart is a criminal e-skimming
  umbrella spanning multiple jurisdictions and no state-nexus
  attribution has been made against Group 6.
attributions:
  - actor_id: criminal/magecart
    attributing_org: RiskIQ + Flashpoint
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2018-09-11
    attribution_source_id: riskiq/2018-09-11_magecart-british-airways-breach
    notes: |
      RiskIQ attributed the BA breach to the Magecart crime
      syndicate in its 2018-09-11 technical analysis; the joint
      RiskIQ/Flashpoint "Inside Magecart" report (2018-11-13)
      further segmented BA into the selective "Group 6" operator
      cluster. Activity-cluster level: Magecart Group 6 is a
      criminal operator cluster, not a named cohesive actor or a
      state-attributed group.
doctrine_links: []
