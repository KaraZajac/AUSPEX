id: 2018-09/citizenlab-hide-and-seek-uae
name: Citizen Lab Hide and Seek — UAE identified among 45 Pegasus operator-states
start_date: 2016-08-01  # Citizen Lab telemetry window
disclosure_date: 2018-09-18
end_date: 2018-08-31
incident_type:
  - documentary
  - surveillance
initial_vector: unknown
outcome_summary: |
  Citizen Lab publishes "HIDE AND SEEK: Tracking NSO Group's
  Pegasus Spyware to Operations in 45 Countries" — an internet-
  scanning / DNS-cache-probing paper that groups Pegasus C&C
  fingerprints into 36 suspected operators and links their
  suspected infections to 45 countries (scan window Aug 2016 –
  Aug 2018). Citizen Lab identifies "at least two [operators]
  that appear to predominantly focus on the UAE" — the named
  operators FALCON, BABYFALCON, and MAYBEFALCON — placing the UAE
  among the operator-states. Citizen Lab cautions that operator-
  to-country links rest on suspected-infection geolocation (which
  VPN / satellite connections can distort, so the 45-country list
  "necessarily includes countries that are not NSO Group
  customers") and names no UAE government agency.
false_flag_risk: none
summary: |
  AUSPEX includes the Hide and Seek disclosure as the corpus-
  level anchor for UAE Pegasus customer-state operator
  infrastructure. Individual victim-specific Pegasus events
  (Mansoor 2016, Al Jazeera journalists 2020, Pegasus Project
  2021 named victims) are recorded separately; this entry
  captures the scanning-level evidence that at least two distinct
  UAE-focused Pegasus operators (Citizen Lab codenames FALCON,
  BABYFALCON, MAYBEFALCON) were running concurrently — a key
  doctrine-link supporting the procurement-led-capability framing.
  The only UAE victim named in this report is human-rights
  defender Ahmed Mansoor (Pegasus-targeted Aug 2016); the report's
  journalist-targeting findings concern other operators (Mexico,
  Bahrain), so the UAE-journalist slice is left to the separately
  recorded events.
