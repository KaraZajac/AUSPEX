initial_vector: unknown
outcome_summary: |
  Citizen Lab publishes "HIDE AND SEEK: Tracking NSO Group's
  Pegasus Spyware to Operations in 45 Countries" — an internet-
  scanning methodology paper identifying suspected Pegasus
  operator infrastructure across 45 countries. UAE was named as
  one of the operator-states; Citizen Lab tracked multiple
  distinct UAE-attributed operator clusters (informally
  Pegasus-1, Pegasus-2, Pegasus-3) inside the country.
false_flag_risk: none
summary: |
  AUSPEX includes the Hide and Seek disclosure as the corpus-
  level anchor for UAE Pegasus customer-state operator
  infrastructure. Individual victim-specific Pegasus events
  (Mansoor 2016, Al Jazeera journalists 2020, Pegasus Project
  2021 named victims) are recorded separately; this entry
  captures the scanning-level evidence of multiple distinct UAE
  Pegasus operator clusters running concurrently — a key
  doctrine-link supporting the procurement-led-capability
  framing.
