  notes: |
    Phantom-remediation audit. STEP 0: the cited URL
    (citizenlab.ca/research/hide-and-seek-...) is the REAL article,
    NOT a phantom/homepage — snapshot captured + hashed: sha256
    2066d892…6719beba, 219401 B; <title> = "HIDE AND SEEK: Tracking
    NSO Group's Pegasus Spyware to Operations in 45 Countries". No
    re-sourcing needed; audited in place against the genuine source.

    [a] FACTS — "45 countries" ✓ verbatim ("identify 45 countries in
    which operators of NSO Group's Pegasus spyware may be conducting
    operations"); "36 suspected operators" ✓ ("36 distinct operators");
    scan window Aug 2016–Aug 2018 ✓ ("Between August 2016 and August
    2018, we scanned the Internet…"). KEY CORRECTION (fabrication): the
    event (and the source record's notes) claimed Citizen Lab tracked
    UAE clusters "Pegasus-1, Pegasus-2, Pegasus-3" — that string appears
    NOWHERE in the report (grep = 0 hits). Replaced with the actual CL
    statement "at least two [operators] that appear to predominantly
    focus on the UAE" and the real operator codenames FALCON (UAE / Yes
    / UAE), BABYFALCON (May 2018–present, GCC–UAE), MAYBEFALCON. Removed
    sectors/media/journalism target: the report's journalist-targeting
    findings are tied to Mexico ("dozens of Mexican lawyers, journalists,
    human rights defenders") and Bahrain ("Bahrain is noteworthy for
    compromising journalists…"), NOT the UAE; the only UAE victim named
    is HRD Ahmed Mansoor (Aug 2016) → sectors/civil-society/dissident
    (country ae) retained, carried.

    [b] ATTRIBUTION — Citizen Lab links operators to COUNTRIES via
    suspected-infection geolocation and explicitly hedges: "our list of
    45 countries necessarily includes countries that are not NSO Group
    customers" (VPN/satellite error). It NAMES NO UAE government agency.
    Added missing attribution_level: nation (CL reaches country-level,
    not named-unit). Downgraded auspex_assessment concur → concur-with-
    caveat: the ae/state-security service_id is an AUSPEX customer-side
    overlay (NSO government-only sales policy + Mansoor 2016 record), not
    a CL attribution. attributing_org_confidence kept moderate (multiple
    UAE-focused operators + corroborating Mansoor history, but heavily
    method-caveated). actor_id null + service_id customer-side is correct
    per the established UAE customer-operator modeling; no APT mis-placed.

    [c] DATES — source published_on 2018-09-18 ✓ (report date); event
    start_date 2016-08-01 / end_date 2018-08-31 ✓ match the scan window;
    disclosure_date 2018-09-18 ✓. No conflation.

    [d] DOCTRINE — ae/procurement-led-capability /commercial-spyware
    pillar resolves ✓. Kept strongly_inferred (correct per the doctrine's
    own cyber_relevance: attested ONLY where a source names UAE
    procurement — Reuters Raven / NSO listings; this report documents the
    operator infrastructure, not a stated procurement goal). Added
    inference_basis {signals[], ruled_out} (Pegasus is a commercial NSO
    product sold only to governments → operating it = procured capability;
    indigenous-build ruled out). attesting_source_id retained as the
    primary supporting source (schema-allowed on strongly_inferred).

    [e] ATTRIBUTION_LEVEL — set to nation (was missing).

    [f] ACTOR_ID — null (customer-side); service_id ae/state-security
    resolves to atlas/services/ae/state-security.yaml ✓. That service
    record itself notes UAE State Security is "rare[ly]" named as an
    operator and is "primarily a doctrine-link anchor" — consistent with
    the nation-level / concur-with-caveat downgrade here. No actor-file
    edit; no flag (service placement is sound as a customer anchor).

    SOURCE: tier secondary→primary (Citizen Lab first-party original
    research) + raw_snapshot/content_sha256 added; its notes' fabricated
    "Pegasus-1/2/3" likewise corrected. Residual uncertainty: CL's
    operator→country geolocation is method-limited (its own caveat), so
    the UAE-operator linkage, while well-corroborated, is not a hard
    technical attribution to a named UAE agency — captured by nation /
    moderate / concur-with-caveat.
