    notes: |
      Citizen Lab links suspected Pegasus infections to 36
      operators via internet-scanning / DNS-cache-probing, and
      ties the operators FALCON / BABYFALCON / MAYBEFALCON to the
      UAE at the COUNTRY level ("at least two [operators] that
      appear to predominantly focus on the UAE"). It does NOT name
      a UAE government agency, and cautions the 45-country list
      "necessarily includes countries that are not NSO Group
      customers" (VPN/satellite geolocation error) — hence
      attribution_level: nation, attributing_org_confidence:
      moderate. The ae/state-security service_id is an AUSPEX
      customer-side overlay (inferred from NSO's stated
      government-only sales policy plus the documented UAE Pegasus
      record — Mansoor, Aug 2016), NOT a Citizen Lab attribution;
      hence auspex_assessment: concur-with-caveat. No over-attestation
      of a UAE-state-security nexus beyond what Citizen Lab states.
doctrine_links:
  - doctrine_id: ae/procurement-led-capability
    pillar_id: ae/procurement-led-capability/commercial-spyware
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Citizen Lab documents UAE-focused Pegasus operator
      infrastructure (FALCON / BABYFALCON / MAYBEFALCON). Pegasus
      is a commercial implant sold by NSO Group only to government
      customers, so a UAE customer operating it is, by definition,
      procured commercial-spyware capability — the canonical
      procurement-led-capability signature. strongly_inferred (not
      attested) because Citizen Lab documents the operator
      infrastructure but does not state a UAE procurement strategy
      at the goal level; per the doctrine's own rule, attested
      requires a source naming UAE procurement of the capability
      (Reuters Project Raven, NSO customer-state listings).
    attesting_source_id: citizenlab/2018-09-18_hide-and-seek-pegasus-45-countries
    inference_basis:
      signals:
        - "Citizen Lab identifies UAE-focused Pegasus operators (FALCON / BABYFALCON / MAYBEFALCON); Pegasus is a proprietary NSO commercial product, so a UAE customer operating it is procured commercial-spyware capability."
        - "NSO sells Pegasus only to government customers (Citizen Lab: a 'government operator of Pegasus'), so a UAE-focused operator implies a UAE government customer that procured — rather than built — the capability."
        - "Prior Citizen Lab reporting (Ahmed Mansoor, Aug 2016) already established the UAE as an operating NSO customer-state, corroborating a sustained procurement relationship."
      ruled_out: "Indigenous / self-developed offensive capability: ruled out because Pegasus is a proprietary NSO commercial product that cannot be domestically built, leaving procured-commercial-spyware as the only strategic reading with no serious competitor for this infrastructure."
