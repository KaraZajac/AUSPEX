id: 2018-09/newegg-magecart
name: Magecart Group 6 e-skimming attack on Newegg
start_date: 2018-08-14
disclosure_date: 2018-09-19
end_date: 2018-09-18
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Magecart operators injected payment-card skimming JavaScript into
  the Newegg checkout billing page (secure.newegg.com/GlobalShopping/
  CheckoutStep2.aspx) for over a month. RiskIQ dated the skimmer
  placement to around August 14, 2018; Volexity independently
  confirmed the code live from August 16 (noting the attackers likely
  started earlier) until it was removed on September 18, 2018. The
  small (~15-line) skimmer siphoned card data on submission over
  SSL/TLS to a look-alike domain (neweggstats.com, registered via
  Namecheap on August 13 with a Comodo cert issued the same day) and
  worked on both the website and mobile app. RiskIQ and Volexity
  publicly disclosed the breach on September 19, 2018, noting the
  campaign was nearly identical to the concurrent British Airways
  skimming. RiskIQ's later "Inside Magecart" report (November 2018)
  placed Newegg under the selective "Group 6" operator cluster
  alongside British Airways.
false_flag_risk: none
summary: |
  Companion case to British Airways: same Magecart Group 6 tradecraft
  (small JavaScript skimmer, look-alike exfiltration domain), a
  month-long high-volume payment-card harvest at a top-tier retailer.
  AUSPEX classifies as criminal-baseline alongside the British
  Airways event under the `criminal/magecart` umbrella — a criminal
  e-skimming collective with no state nexus and no doctrinal
  targeting.
attributions:
  - actor_id: criminal/magecart
    attributing_org: RiskIQ + Volexity
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2018-09-19
    attribution_source_id: volexity/2018-09-19_magecart-strikes-again-newegg
    notes: |
      RiskIQ and Volexity jointly attributed the Newegg breach to
      Magecart on 2018-09-19 (Volexity: "nearly identical data theft
      campaign" to British Airways, conducted "in collaboration with
      RiskIQ"). RiskIQ's later RiskIQ/Flashpoint "Inside Magecart"
      report (2018-11-13) further segmented Newegg into the selective
      "Group 6" operator cluster ("Group 6 - Extremely selective,
      only going for top-tier targets, such as British Airways and
      Newegg"). Activity-cluster level: Magecart Group 6 is a criminal
      operator cluster, not a named cohesive actor or a
      state-attributed group.
doctrine_links: []
targets:
  - target_id: sectors/retail
    role: primary
    country: us
sources:
  - volexity/2018-09-19_magecart-strikes-again-newegg
  - riskiq/2018-09-19_magecart-newegg
  - riskiq/2018-11-13_magecart-inside-and-beyond-report
