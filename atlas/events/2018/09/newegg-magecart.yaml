id: 2018-09/newegg-magecart
name: Magecart e-skimming attack on Newegg
start_date: 2018-08-14
disclosure_date: 2018-09-19
end_date: 2018-09-18
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  Magecart operators injected payment-card skimming JavaScript
  into the Newegg checkout flow for over a month (August 14 to
  September 18, 2018). The skimmer was hosted on a typosquat
  domain (neweggstats.com) and exfiltrated card data on
  submission. Newegg confirmed the breach September 19 in
  customer notifications. Volexity and RiskIQ jointly attributed
  the campaign to Magecart Group 6 (the same cluster behind the
  British Airways skimming).
false_flag_risk: none
summary: |
  Companion case to British Airways: same Magecart Group 6
  tradecraft (small Javascript skimmer, typosquat-hosted
  exfiltration domain), short-window high-volume payment-card
  harvest. AUSPEX classifies as criminal-baseline alongside the
  British Airways event under `criminal/magecart` umbrella.
attributions:
  - actor_id: criminal/magecart
    attributing_org: Volexity + RiskIQ
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2018-09-19
    attribution_source_id: riskiq/2018-11-13_magecart-inside-and-beyond-report
doctrine_links: []
targets:
  - target_id: sectors/retail
    role: primary
sources:
