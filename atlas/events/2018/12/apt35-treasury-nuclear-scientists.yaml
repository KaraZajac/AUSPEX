id: 2018-12/apt35-treasury-nuclear-scientists
name: APT35 phishing of US Treasury, nuclear scientists, JCPOA critics
start_date: 2018-10-01
disclosure_date: 2018-12-13  # CertFA report
end_date: 2018-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Account-takeover spearphish; 2FA-bypass via reverse-proxy
  phishing kits. Credential and email theft from US Treasury
  officials, US / Israeli nuclear scientists, Iranian civil
  society figures, and JCPOA critics.
false_flag_risk: none
summary: |
  Documented by CertFA (December 2018) and ClearSky. APT35 /
  Charming Kitten ran a Gmail / Yahoo Mail account-takeover
  campaign with spear-phishing lures (themed around think-tank
  invitations, conference registrations, and Google Drive
  shares) leading to a custom reverse-proxy phishing kit that
  captured 2FA codes in real time — one of the earliest publicly
  documented MFA-bypass kits in nation-state cyber. Once inside
  the mailbox, operators set up forwarding rules, harvested
  contacts for further pivots, and dropped follow-on PowerShell-
  based implants (later tied to the POWERSTAR / CharmPower
  malware families) on devices belonging to targets of interest.
  Aligned with the November 2018 reimposition of US sanctions on
  Iran following Trump-administration JCPOA withdrawal.
