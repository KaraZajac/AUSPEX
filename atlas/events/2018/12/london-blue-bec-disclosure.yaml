id: 2018-12/london-blue-bec-disclosure
name: Agari profiles London Blue Nigerian-British BEC group
start_date: 2018-01-01
disclosure_date: 2018-12-04
end_date: 2018-12-04
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Agari Cyber Intelligence Division published its profile of
  "London Blue," a Nigerian-organized BEC group with
  significant UK-based personnel, targeting CFOs at Fortune
  500 and mid-market firms worldwide. Attempted-wire-fraud
  value reached USD 25M+ across campaigns identified. The
  group was distinguished by mature targeting research — a
  ~50,000-record curated CFO target database — and routing
  of mule operations through UK accounts. Multiple Nigerian
  and US prosecutions of named operators followed through
  2019–2020.
false_flag_risk: none
summary: |
  London Blue is the canonical Nigerian-organized BEC ring
  with UK money-mule infrastructure. AUSPEX classifies as
  criminal-baseline.
