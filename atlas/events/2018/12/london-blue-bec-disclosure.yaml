id: 2018-12/london-blue-bec-disclosure
name: Agari profiles London Blue Nigerian-British BEC group
start_date: 2018-01-01
disclosure_date: 2018-12-04
end_date: 2018-12-04
incident_type:
  - financial-theft
  - disclosure
initial_vector: phishing
outcome_summary: |
  Agari's Cyber Intelligence Division published its profile of
  "London Blue," a Nigerian-organized business-email-compromise
  (BEC) group with UK-based leadership and money-mule
  infrastructure, timed to Black Hat Europe 2018. Agari became
  aware of the group after it attempted to defraud Agari's own
  CFO, then engaged the actor to map it. The report's headline
  finding was the group's mature targeting research: a curated
  repository of more than 50,000 finance-team executives sourced
  from commercial lead-generation/data-broker services, of whom
  71% (~35,000) held the CFO title, the remainder finance
  directors, controllers and other senior finance staff. Targets
  were majority US-based, with others in the UK, Spain, Finland,
  the Netherlands, Mexico and Egypt. Agari estimated the scam had
  already caused hundreds of thousands of dollars in damage and
  cited one bank loss-prevention transaction of more than USD
  20,000 that operators nearly validated.
false_flag_risk: none
summary: |
  London Blue is a Nigerian-organized BEC ring with UK-based
  leadership and Western-European money-mule infrastructure,
  distinguished by industrial-scale, commercially-sourced CFO
  targeting. AUSPEX classifies it as criminal-baseline (no
  documented state nexus).
