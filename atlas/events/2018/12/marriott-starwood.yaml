qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-30
  level: partial
  notes: |
    Audited against the cited Reuters report (bot-walled — see below) plus two
    newly-added snapshotted sources: NPR 2018-12-12 (sha 17b83342…23912f4a, 74,856 B)
    and Marriott's own SEC 8-K Exhibit 99 of 2019-01-04 (sha 50df4b6a…c78f0d26,
    16,565 B). level=partial because the load-bearing attribution source (Reuters)
    is bot-walled (DataDome captcha, 771 B — sha e7cb636c…2333f31a, NOT committed as
    it is not the article) and archive.org is blocked here; its claims were
    corroborated via NPR + CBS + Infosecurity mirrors of the same Reuters/NYT
    reporting.

    [a] FACTS — STRIPPED as fabricated (carried by NO source): "PlugX and Cobalt
    Strike beacons", "Mimikatz for credential dumping", "valid credentials for
    lateral movement across the Starwood Active Directory", "web shells on
    customer-facing Starwood reservation servers", "large-scale staged
    exfiltration", "MSS-cluster tradecraft recovered inside the environment", and
    "APT10 / Stone Panda hospitality-collection patterns". Reuters said only that
    investigators found "hacking tools, techniques and procedures ... used in earlier
    cyberattacks ... linked to Chinese hackers" — no malware or group named.
    Rewrote summary to source-carried claims only, adding the hedges the reporting
    carried (preliminary; tools publicly available; possibly >1 group). VERIFIED:
    Starwood central reservation DB; intrusion since ~2014 through the 2016 Marriott
    acquisition; internal alert Sept 2018; disclosed 30 Nov 2018 (NPR + SEC).
    IMPACT CORRECTED: 500,000,000 -> 383,000,000. Marriott's SEC filing: initial
    estimate "up to approximately 500 million guests ... on or before September 10,
    2018"; revised to "approximately 383 million records as the upper limit" on
    2019-01-04 (far fewer unique guests). quantified_impact now the revised upper
    limit with a comment noting the initial ~500M.

    [b] ATTRIBUTION — DOWNGRADED. Sources attribute to China/MSS at nation/ministry
    level only, explicitly hedged ("most likely", "preliminary indications"); Pompeo
    concurrence is informal. attributing_org_confidence kept moderate; auspex
    concur-with-caveat. KEY CORRECTION: actor_id cn/mss/apt10 -> null. No cited
    source names a hacking group for Marriott; the APT10 assignment was an
    unsupported working assumption (the event's own prior note wrongly called it
    "open-source consensus"). APT10 shows up in Dec-2018 reporting only re the
    separate Cloud Hopper indictments. MSS attribution preserved structurally via
    service_id: cn/mss + prose; state derivation preserved via the cn/mcf
    attacker-rationale doctrine link. attribution_date corrected 2018-12-11 ->
    2018-12-05 to match the Reuters source.

    [c] DATES — start_date 2014-07-01 -> 2014-01-01 (year-only; the July precision was
    unsourced). end_date 2018-09-30 -> 2018-09-10 (Marriott/SEC boundary). Source
    published_on values verified: Reuters 2018-12-05, NPR 2018-12-12, SEC 2019-01-04.

    [d] DOCTRINE_LINKS — kept cn/mcf/bulk-pii-humint-enabling at strongly_inferred
    (not attested: purpose stated by anonymous officials via journalism, no
    govt-primary/tier-1 attesting quote captured), added inference_basis
    (signals[] + ruled_out). REMOVED the cn/national-intelligence-law-2017 link:
    anachronistic (the intrusion began 2014, three years before the June-2017 law)
    and its own reasoning conceded the op "predates routine MSS use of the law"; no
    source ties this operation to that statute.

    [e] ATTRIBUTION_LEVEL — set to nation (was missing). Sources name the sponsoring
    ministry (MSS) but no operational group/unit → nation-level.

    [f] ACTOR_ID — n/a (now null). FLAG for orchestrator: see final report — a
    generic cn/mss placeholder actor (or restoration of a specific group only on
    non-public basis) is a Kara decision. Also FLAG: the target registry
    orgs/marriott-starwood already used ~383M, so the corpus was internally
    inconsistent with this event's 500M until now.

    RESIDUAL UNCERTAINTY: the primary Reuters article could not be hashed (bot-wall);
    the ~383M is Marriott's own upper-limit of *records*, not unique guests.
