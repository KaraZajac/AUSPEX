id: 2018-12/marriott-starwood
name: Marriott / Starwood guest-database breach
start_date: 2014-01-01  # year-only: US officials/NYT date the intrusion to "at least 2014"; no month sourced
disclosure_date: 2018-11-30
end_date: 2018-09-10  # Marriott (SEC 8-K): reservations "on or before September 10, 2018"; internal alert Sept 2018
incident_type:
  - intrusion
  - data-theft
  - espionage
  - bulk-collection
initial_vector: unknown
outcome_summary: |
  Long-dwell intrusion in the Starwood central guest-reservation
  database. Marriott initially estimated (Nov 2018) that up to
  approximately 500 million guests were affected; on 4 January 2019
  it revised the figure to approximately 383 million records as the
  upper limit (with far fewer unique guests, due to duplicates),
  including passport numbers. US officials assessed the operation as
  bulk-PII collection valuable to MSS counterintelligence and HUMINT
  targeting of foreign travelers and cleared US personnel.
quantified_impact:
  records_exfiltrated: 383000000  # revised upper limit (Marriott, 2019-01-04); initial estimate was ~500M
false_flag_risk: none
summary: |
  Reuters (5 December 2018) and the New York Times, citing people
  familiar with the US investigation, reported that "preliminary
  indications" showed the Starwood breach was executed by hackers
  affiliated with China's Ministry of State Security (MSS); Secretary
  of State Mike Pompeo appeared to concur in a subsequent interview.
  Investigators reportedly found hacking tools, techniques and
  procedures previously used in attacks linked to Chinese actors, but
  the reporting was explicitly hedged — the analysis was preliminary,
  some of the tools had been publicly available, and more than one
  group may have been present in the network — so attribution was not
  definitive. No cited source named a specific hacking group (e.g.
  APT10) or any malware for the Marriott breach, and no DOJ indictment
  was issued for it. The intrusion sat undetected in the Starwood
  reservation database from at least 2014, through Marriott's 2016
  acquisition of Starwood, until an internal tool flagged access in
  September 2018; Marriott disclosed the breach on 30 November 2018.
  US officials framed the operation as part of a years-long effort
  "dating to at least 2014 to build a database containing names of
  executives and American government officials with security
  clearances" — the same bulk-PII collection pattern as OPM — making
  the stolen travel-pattern and identity data valuable for MSS
  counterintelligence targeting.
attributions:
  - actor_id: null  # no specific hacking group was ever publicly named for the Marriott breach
    attributing_org: "US officials / New York Times (reported via Reuters and NPR)"
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-12-05
    attribution_source_id: reuters/2018-12_marriott-china
    service_id: cn/mss
    notes: |
      Nation/ministry-level attribution only. Reuters (5 Dec 2018) and
      the NYT, citing people familiar with the US investigation,
      reported "preliminary indications" that the breach was executed
      by hackers affiliated with China's MSS; Pompeo appeared to concur.
      Reporting was explicitly hedged ("most likely", "preliminary"),
      noted some tools had been publicly available, and that more than
      one group may have been in the network. NO cited source names a
      specific hacking group for the Marriott breach — the prior
      actor_id cn/mss/apt10 was an unsupported working assignment and
      has been removed (APT10 appears in Dec-2018 reporting only in
      connection with the *separate* Cloud Hopper indictments, not
      Marriott). service_id cn/mss encodes the MSS attribution without
      asserting a named group. No DOJ indictment for this breach.
