        - "Reported as part of the same MSS bulk-collection pattern as OPM; no monetization or data resale reported."
      ruled_out: "Financial/criminal motive — no fraud, sale, or extortion reported; the data was assessed as feeding state intelligence, consistent with MSS espionage rather than a cybercriminal operation."
