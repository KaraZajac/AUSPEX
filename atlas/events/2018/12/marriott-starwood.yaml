id: 2018-12/marriott-starwood
name: Marriott / Starwood guest-database breach
start_date: 2014-07-01  # via legacy Starwood compromise predating the Marriott acquisition
disclosure_date: 2018-11-30
end_date: 2018-09-30
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Theft of approximately 500 million guest reservation records
  from the Starwood guest database (acquired by Marriott in 2016).
  Travel-pattern data of foreign officials and corporate executives
  particularly valuable to MSS counterintelligence.
quantified_impact:
  records_exfiltrated: 500000000
false_flag_risk: none
summary: |
  Reuters and US official statements (December 2018) attributed the
  breach to MSS-affiliated actors. No DOJ indictment. Investigators
  recovered MSS-cluster tradecraft inside the Starwood environment
  consistent with APT10 / Stone Panda hospitality-collection
  patterns: PlugX and Cobalt Strike beacons used for command and
  control, Mimikatz for credential dumping, valid credentials for
  lateral movement across the Starwood Active Directory, web shells
  on customer-facing Starwood reservation servers, and large-scale
  staged exfiltration of the central guest reservation database.
  The campaign predates the 2016 Marriott acquisition by two years
  and sat undetected through it, demonstrating long-dwell bulk-PII
  collection of foreign-traveler itineraries valuable for MSS
  counterintelligence targeting alongside the OPM, Anthem, and
  Equifax trinity.
