  notes: |
    Audited against the DOJ press release "Two Chinese Hackers Associated With
    the Ministry of State Security Charged With Global Computer Intrusion
    Campaigns…" (justice.gov, 2018-12-20) + MITRE ATT&CK G0045 (raw snapshot
    mitre-attack__g0045_apt10.html, sha256 1855bacc…2515a9b, 202,611 bytes,
    hash re-verified). LEVEL = partial: the primary DOJ source is Akamai
    bot-walled — curl of the justice.gov URL returns HTTP 200 but only a
    2,575-byte "bm-verify" JS challenge page (no article body); WebFetch → 403;
    archive.org blocked. No content hash recorded for it (challenge page deleted,
    not committed). DOJ-specific facts therefore mirror-corroborated (CyberScoop,
    FBI Wanted, Nextgov/Defense One, 2018-12-20) rather than hashed.
    [a] FACTS: Zhu Hua + Zhang Shilong, of Huaying Haitai Science & Technology
    Development Co. (Tianjin), acting in association with the MSS Tianjin State
    Security Bureau — verbatim in MITRE ("Individual members of menuPass are
    known to have acted in association with the Chinese Ministry of State
    Security's (MSS) Tianjin State Security Bureau and worked for the Huaying
    Haitai Science and Technology Development Company") and DOJ mirrors. Cloud
    Hopper MSP-pivot campaign + MSP Trusted-Relationship abuse: MITRE ("menuPass
    has used legitimate access granted to Managed Service Providers in order to
    access victims of interest") + DOJ. "12+ countries" = DOJ MSP-theft count
    (MSPs and clients in ≥ a dozen countries); "≥45 tech companies / US govt
    agencies" + "100,000+ US Navy personnel records / 40+ computers" = DOJ,
    mirror-corroborated. CORRECTIONS: (1) removed "intrusions into HPE, IBM,
    NTT" from outcome_summary — the DOJ indictment did NOT name the MSP victim
    companies (those came from Reuters, which is not cited); (2) reworded the
    summary so the implant families (ChChes/RedLeaves/UPPERCUT/QuasarRAT) are
    credited to vendor/MITRE reporting, NOT "the indictment" — the DOJ document
    does not name them (ANEL dropped: absent from the G0045 snapshot string);
    (3) tempered the "Five-Eyes-coordinated naming event" line to flag it as
    context not carried by the two cited sources.
    [b] ATTRIBUTION: US DOJ, high confidence (indictment), auspex concur — kept.
    Added attribution_level: named-unit (DOJ names the specific MSS unit, Tianjin
    SSB, + front company) per the orchestrator NB.
    [c] DATES: source published_on 2018-12-20 ✓ (press release; grand jury
    returned the indictment 2018-12-17, unsealed 2018-12-20). Event start_date
    2006-01-01 ✓ ("active since at least 2006", MITRE); disclosure/end 2018-12-20 ✓.
    [d] DOCTRINE_LINKS: cn/mic2025 DOWNGRADED attested → strongly_inferred —
    the prior reasoning claimed it was "cited explicitly by FBI/DHS as
    industrial-policy-aligned collection," which is unverifiable (neither cited
    source says that), and the attested bar (a hashed source-quote stating the
    MIC2025 goal in substance) cannot be met while the DOJ source is
    un-snapshottable and frames intent as broad economic espionage. Added
    inference_basis {signals, ruled_out}; attesting_source_id → the hashed MITRE
    G0045. cn/mcf (strongly_inferred) and cn/national-intelligence-law-2017
    (plausible, with honest pre-NIL counter_explanation) left as calibrated.
    [e] ATTRIBUTION_LEVEL: named-unit set (see [b]).
    [f] ACTOR_ID: cn/mss/apt10 resolves (file atlas/actors/cn/apt10.yaml, id
    cn/mss/apt10) — no actor edit. FLAG: target orgs/us-navy has no
