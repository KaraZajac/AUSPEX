id: 2018-12/apt10-cloud-hopper-indictment
name: APT10 Cloud Hopper indictment (Zhu Hua / Zhang Shilong)
start_date: 2006-01-01
disclosure_date: 2018-12-20
end_date: 2018-12-20
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: phishing
outcome_summary: |
  DOJ unsealing of indictments against Zhu Hua and Zhang Shilong,
  members of the "Huaying Haitai" front company acting in
  association with the MSS Tianjin SSB. Charges cover the
  Operation Cloud Hopper MSP-pivot campaign (12+ countries,
  intrusions into HPE, IBM, NTT and other managed service
  providers) and direct theft of approximately 100,000 US Navy
  personnel records.
false_flag_risk: none
campaign_id: cloud-hopper
operators_named:
  - zhu-hua  # APT10 / Huaying Haitai, DOJ Dec 2018
  - zhang-shilong  # APT10 / Huaying Haitai, DOJ Dec 2018
summary: |
  Joint UK / US / allied attribution day naming APT10 / Stone
  Panda as the operator behind Cloud Hopper — the first PRC
  industrial-espionage indictment after the 2015 Xi-Obama "no
  commercial cyber theft" agreement and a public refutation of
  that agreement's effectiveness. The indictment catalogues
  APT10 tradecraft: spear-phishing of MSP employees, harvesting
  of admin credentials, lateral pivot from MSP into customer
  environments, deployment of UPPERCUT / ANEL, ChChes,
  RedLeaves and QuasarRAT implants, theft of trade secrets and
  PII across aerospace, biotech, mining, finance, oil and gas,
  telecom, and healthcare verticals. Companion FBI, DHS, FCO
  and Australian / NZ / Canadian statements made this a
  Five-Eyes-coordinated naming event.
