id: 2018-12/apt10-cloud-hopper-indictment
name: APT10 Cloud Hopper indictment (Zhu Hua / Zhang Shilong)
start_date: 2006-01-01
disclosure_date: 2018-12-20
end_date: 2018-12-20
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: phishing
outcome_summary: |
  DOJ unsealing (2018-12-20) of a Southern District of New York
  indictment (returned 2018-12-17) against Zhu Hua and Zhang
  Shilong, who worked for the Huaying Haitai Science and
  Technology Development Company in Tianjin and acted in
  association with the MSS Tianjin State Security Bureau. Charges
  cover the Operation Cloud Hopper campaign of compromising
  managed service providers and their clients in at least a dozen
  countries, theft of intellectual property from at least 45
  technology companies and US government agencies, and direct
  theft of the personal data of more than 100,000 US Navy
  personnel. (The DOJ indictment did not publicly name the MSP
  victim companies; the HPE / IBM / NTT identifications came from
  contemporaneous Reuters reporting, not the indictment, and are
  omitted here since no such source is cited.)
false_flag_risk: none
campaign_id: cloud-hopper
operators_named:
  - zhu-hua  # APT10 / Huaying Haitai, DOJ Dec 2018
  - zhang-shilong  # APT10 / Huaying Haitai, DOJ Dec 2018
summary: |
  Joint UK / US / allied attribution day naming APT10 / Stone
  Panda as the operator behind Cloud Hopper — the first PRC
  industrial-espionage indictment after the 2015 Xi-Obama "no
  commercial cyber theft" agreement and a public refutation of
  that agreement's effectiveness. The indictment describes APT10
  tradecraft in substance — spear-phishing of MSP employees,
  harvesting of administrator credentials, and lateral pivot from
  the MSP into customer environments — and charges theft of trade
  secrets and PII across aerospace, finance, oil-and-gas, telecom,
  healthcare and other verticals. The named implant families
  (ChChes, RedLeaves, UPPERCUT, QuasarRAT) come from associated
  vendor and MITRE ATT&CK (G0045) reporting rather than the
  indictment itself. Companion US-government statements (FBI, and
  a DHS/CISA advisory) accompanied the unsealing, and the UK and
  other allied governments issued their own same-day APT10
  attributions (contextual — not carried by the two cited
  sources).
