id: 2018-03/apt32-cambodia-watering-hole
name: APT32 / OceanLotus watering-hole compromises of Cambodian government websites
start_date: 2016-10-01  # "since late 2016" per the sole source (Volexity 2017-11-06); NOT 2017-06 as previously stored
disclosure_date: 2017-11-06  # the only cited source is the 2017-11-06 Volexity report; there is no 2018-03 source
end_date: null  # source calls the campaign "ongoing"; do not conflate op-end with a publication date
incident_type:
  - intrusion
  - espionage
  - surveillance
initial_vector: n-day  # corrected from 0-day: source documents n-day exploitation of "woefully out of date" CMS cores/plugins, not 0-day
false_flag_risk: none
outcome_summary: |
  Volexity's 6 November 2017 disclosure "OceanLotus Blossoms"
  documented OceanLotus / APT32 strategic-web-compromise
  ("watering-hole") activity against Cambodian government websites as
  one country segment of a 100+ site ASEAN watering-hole network. The
  compromised Cambodian properties named in the report are all
  government bodies: the Ministry of Foreign Affairs (mfa.gov.kh),
  Ministry of Environment (moe.gov.kh), Ministry of Civil Service
  (mcs.gov.kh), National Police (police.gov.kh), Ministry of National
  Assembly-Senate Relations and Inspection (monasri.gov.kh), Ministry
  of Social Affairs, Veterans and Youth Rehabilitation (mosvy.gov.kh),
  and the National Election Committee (necelect.org.kh). OceanLotus
  injected JavaScript profiling/fingerprinting frameworks into the
  compromised sites to whitelist and selectively target visitors of
  interest. This is the Cambodian-government slice of the campaign
  disclosed in full — and from the same single Volexity report — by
  the canonical event 2017-11/volexity-oceanlotus-asean-watering-hole.
summary: |
  The Cambodian-government segment of OceanLotus / APT32's ASEAN
  watering-hole network as mapped by Volexity (6 November 2017). Every
  Cambodian victim disclosed in the source is a government site; the
  report contains no opposition-party, defence-ministry or media
  victim, and no "election-cycle" framing. Volexity describes a
  collection campaign running "since late 2016" against ASEAN /
  neighbour-state government and military sites, Chinese state-oil
  firms, and — the majority of victims — Vietnamese-language
  human-rights, civil-society and media properties.
