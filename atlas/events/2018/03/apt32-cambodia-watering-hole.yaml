id: 2018-03/apt32-cambodia-watering-hole
name: APT32 watering-hole compromises of Cambodian government and opposition sites
start_date: 2017-06-01
disclosure_date: 2018-03-01
end_date: 2018-03-01
incident_type:
  - intrusion
  - data-theft
initial_vector: 0-day
outcome_summary: |
  Volexity and ESET documented a sustained watering-hole campaign
  by OceanLotus / APT32 compromising official Cambodian government
  websites (including the Ministry of Defence and Ministry of
  Foreign Affairs) and Cambodian opposition / civil-society
  properties in the run-up to the July 2018 Cambodian general
  election. APT32 injected the OceanLotus profiler / KerrDown
  delivery into compromised sites to fingerprint visitors and
  selectively serve weaponized payloads. The campaign coincided
  with rising Vietnamese concern about Cambodia's drift toward
  PRC dependency under Hun Sen.
false_flag_risk: none
summary: |
  Among the most strategically transparent APT32 campaigns: timing
  to the Cambodian election cycle and target set (Cambodian
  government, CPP, opposition CNRP) make this an unambiguous
  political-collection operation against a Vietnamese neighbor
  in geopolitical transition. The watering-hole tradecraft is
  the signature OceanLotus pre-2019 pattern.
