id: 2018-03/kaspersky-sidewinder-pakistan
name: Kaspersky publicly documents SideWinder targeting of Pakistani military
start_date: 2017-01-01
disclosure_date: 2018-03-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist published the first long-form public
  dissection of SideWinder, attributing ongoing Pakistani-military
  targeting to the cluster and naming the actor "SideWinder" for
  the first time in Western vendor reporting. Tradecraft documented
  included weaponized RTF lures, multi-stage downloaders, and
  RAT installations consistent with the Indian-aligned operational
  pattern previously documented (less specifically) under
  Hangover.
false_flag_risk: none
summary: |
  The naming event for SideWinder as a distinct cluster. Kaspersky
  did not publicly attribute to the Indian government; subsequent
  vendor consensus has placed SideWinder among the Indian-aligned
  cluster set without authoritative government attestation.
