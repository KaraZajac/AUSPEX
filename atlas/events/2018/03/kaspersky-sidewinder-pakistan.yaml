id: 2018-03/kaspersky-sidewinder-pakistan
name: Kaspersky publicly documents SideWinder targeting of Pakistani military
start_date: 2017-01-01
disclosure_date: 2018-04-12
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  In its Q1-2018 APT-trends report, Kaspersky's Securelist gave the
  first Western-vendor profile of SideWinder as a distinct cluster,
  describing "an actor mainly targeting Pakistan military targets,
  active since at least 2012." Kaspersky documented the cluster
  spreading malware through unique implementations of known-
  vulnerability exploits — notably CVE-2017-11882 — followed by a
  PowerShell payload in the final stages. Kaspersky held only "low
  confidence that this malware might be authored by an Indian
  company" and named no Indian government service.
false_flag_risk: none
summary: |
  The Western-vendor naming event for SideWinder (aka Rattlesnake /
  T-APT-04) as a distinct India-aligned espionage cluster whose
  canonical victim set is the Pakistani military. Kaspersky's
  Q1-2018 APT-trends report profiled the actor — Pakistani-military
  focus, active since at least 2012, CVE-2017-11882 exploitation
  with a PowerShell final-stage payload — but attributed authorship
  only to an unnamed "Indian company" at low confidence and did NOT
  attribute to the Indian government. Subsequent vendor consensus
  has placed SideWinder among the India-aligned cluster set without
  authoritative government attestation.
attributions:
  - actor_id: in/unscoped/sidewinder
    attributing_org: Kaspersky (Securelist)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-04-12
    attribution_source_id: kaspersky/2018-03-07_sidewinder-targeting-pakistan
    notes: |
      Kaspersky's Q1-2018 APT-trends report firmly names the
      SideWinder cluster as "mainly targeting Pakistan military
      targets, active since at least 2012", but holds only "low
      confidence that this malware might be authored by an Indian
      company" and names no Indian service — nation asserted at low
      confidence, no service named -> named-actor (not named-unit),
      and in/unscoped placement. attributing_org_confidence is
      moderate, not high: high confidence in the cluster identity,
      low confidence in the Indian authorship -> moderate is the
      honest blend (over-attestation corrected from high, 2026-06-28).
doctrine_links:
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/pakistan-military
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      An India-aligned cluster whose documented victim set is
      "mainly Pakistan military targets" is canonical for the
      regional-collection / Pakistan-military pillar, on which
      SideWinder, Patchwork and DoNot Team all converge.
      Strongly_inferred rather than attested: Kaspersky states the
      victim profile but no source states India's strategic GOAL,
      and no Indian-government text claims this tasking (no
      attesting_source_id).
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "Victim profile: Kaspersky describes SideWinder as 'an actor mainly targeting Pakistan military targets' — squarely the Pakistan-military pillar."
        - "Actor mission + alignment: SideWinder is an India-aligned espionage cluster (vendor-consensus named-actor) active since at least 2012, converging with Patchwork and DoNot Team on the same Pakistani military/government victim set."
        - "Tradecraft fit: espionage-oriented exploitation (CVE-2017-11882) plus PowerShell staging for collection, not destruction or revenue."
      ruled_out: "Financially-motivated or hacktivist explanations are ruled out by the exclusively military/government victim profile and espionage tradecraft; the only competing strategic reading would be a non-India sponsor, which the India-aligned vendor consensus makes the weaker option."
