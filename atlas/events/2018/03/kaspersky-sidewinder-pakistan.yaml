    The entire SideWinder content in this report is ONE bullet (snapshot
    line 584), verbatim: "Sidewinder – An actor mainly targeting Pakistan
    military targets, active since at least 2012. We have low confidence
    that this malware might be authored by an Indian company. To spread the
    malware, they use unique implementations to leverage the exploits of
    known vulnerabilities (such as CVE-2017-11882) and later deploy a
    Powershell payload in the final stages."

    [a FACTS] SUPPORTED & now captured here: SideWinder cluster; "mainly
    targeting Pakistan military targets" (victim = Pakistan, NOT India);
    active since at least 2012; India authorship at LOW confidence ("an
    Indian company"); CVE-2017-11882 exploitation; PowerShell payload in
    final stages. STRIPPED as unsupported by this source (grep over the full
    187,450-byte snapshot): "weaponized RTF lures" (RTF: 0 hits), "multi-
    stage downloaders" (downloader: 0 hits), "RAT installations" (the 3 'RAT'
    hits are meta-keywords + an IronHusky paragraph re PlugX/PoisonIvy, none
    about SideWinder), and the "Hangover" lineage claim (Hangover: 0 hits).
    Softened "first long-form public dissection" -> the report devotes a
    single bullet to SideWinder, so it is a brief first Western-vendor
    profile. initial_vector kept phishing (document-exploit delivery of
    CVE-2017-11882). start_date kept 2017-01-01 as APPROXIMATE (CVE-2017-11882
    is a late-2017 staple; the Q1-2018 report describes then-current
    activity); "since at least 2012" recorded as actor history in the
    summary, not as op-start.

    [b ATTRIBUTION] attributing_org_confidence DOWNGRADED high -> moderate
    (over-attestation: Kaspersky firmly names the cluster but holds only "low
    confidence" on Indian-company authorship; high cluster-identity + low
    nation = moderate). auspex_assessment concur -> concur-with-caveat. Added
    attribution_level: named-actor (named cluster + nation at low confidence,
    no service). Consistent with the sibling fragment's audit, which already
    flagged this record's high as over-stated.

