qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-28
  level: full
  notes: |
    Audited vs Citizen Lab "Bad Traffic: Sandvine's PacketLogic Devices Used to Deploy
    Government Spyware in Turkey and Redirect Egyptian Users to Affiliate Ads?" (Research
    Report No. 107; Marczak/Dalek/McKune/Senft/Scott-Railton/Deibert; 2018-03-09). Raw snapshot
    citizenlab__2018-03-09_bad-traffic-strongpity.html re-verified this audit: sha256
    f2f803b7…d6b043fe, 321174 bytes (matches the committed hash on the source record). NOT a
    phantom — genuine first-party article; tier primary confirmed.
    [a] FACTS — corrected. Vector = ISP-level deep-packet-INJECTION, not phishing: "deep packet
    inspection (DPI) middleboxes on Türk Telekom's network… were being used to redirect hundreds
    of users in Turkey and Syria to nation-state spyware when those users attempted to download
    certain legitimate Windows applications," via injected HTTP 307 redirects. Added the
    FinFisher→StrongPity progression: "Before switching to the StrongPity spyware, the operators
    of the Turkey injection used the FinFisher 'lawful intercept' spyware." Targeted apps
    (Avast/CCleaner/Opera/7-Zip/VLC/WinRAR/Skype) and attacker-controlled mirrors verbatim per
    Fig 11. Egypt clarified as a separate AdHose ad/cryptomining-for-revenue case on the same
    fingerprint ("AdHose is likely an effort to covertly raise money") — not StrongPity, not a
    target of this event. REMOVED a fabricated quotation: the prior outcome quoted 'operators
    associated with the Turkish government' as if verbatim; the source's actual language is
    "government-linked entities" / "nation-state" / "likely by nation-states or ISPs" — de-quoted.
    REMOVED from the summary the unsupported claim that the report "prompted Sandvine to
    subsequently withdraw from certain Turkish business" — this sole source (2018-03-09) predates
    and does not carry any Sandvine withdrawal; §7 documents only Sandvine's defensive/legal
    correspondence. Kept the dual-use-governance point — it is the report's own §8 conclusion
    ("Conclusion: Dual-Use Technology, Unrestrained").
    [b] ATTRIBUTION — downgraded (was high / concur / no level). Citizen Lab's high-confidence
    forensic attribution is of the injection MIDDLEBOX to Sandvine PacketLogic (fingerprint vs a
    procured second-hand device, §3.3), NOT of the operator. On the operator it hedges — "the
    PacketLogic product MAY HAVE BEEN used by government-linked entities," "the APPARENT use,"
    "LIKELY by nation-states or ISPs" — and declines a named actor: "StrongPity was an
    unattributed APT operation in 2016." It names the MİT (Millî İstihbarat Teşkilatı) only as
    surveillance-LAW background (Law No. 6532), not as operator. Set attributing_org_confidence
    moderate, attribution_level nation, auspex_assessment concur-with-caveat; added an attribution
    notes block. The tr/unscoped/promethium named-actor placement is AUSPEX's (malware family +
    vendor consensus on the actor), not Citizen Lab's — recorded as the caveat. No over-attestation
    of a firm Turkey-service nexus, per the audit brief.
    [c] DATES — fine. published_on 2018-03-09 = disclosure_date (verified on source record).
    start_date 2017-09-01 anchors to the first public report of the injection ("A September 2017
    report revealed…"); Citizen Lab's own scans ran Oct 2017–Mar 2018; end_date null (campaign
    still rotating injection domains in Mar 2018). No start/disclosure conflation.
    [d] DOCTRINE_LINKS — downgraded strongly_inferred → plausible. Kurdish indicators are real but
    partial/hedged: "at least one targeted IP address APPEARS to serve YPG (Kurdish militia)
    users," 'ypg'-named router pages, injection reaching Diyarbakır, PKK-website blocking. But
    targeting is broad (five provinces incl. Ankara Ulus; Syrian users in non-Kurdish Idlib;
    generic software-download hijack; censorship of Wikipedia/NOS), no source states a Kurdish
    purpose, and the pillar's diaspora/KRG scope is an imperfect fit (indicators are domestic +
    Syrian-YPG). Two strategic readings survive → plausible. Rewrote reasoning honestly; added
    inference_basis.alternatives (counter-Kurdish vs broad population-surveillance). Not attested
    (no goal-level purpose stated; attesting_source_id stays null). Consistent with the
    talos-promethium-strongpity3 sibling (kurdish-diaspora / plausible).
    [e] ATTRIBUTION_LEVEL — set nation (was missing).
    [f] ACTOR_ID — tr/unscoped/promethium resolves (atlas/actors/tr/promethium.yaml, id
    tr/unscoped/promethium); consistent with that record's 2026-06-25 demotion from tr/mit. No
    actor edit.
    TARGET DEFECT FIXED — target_id orgs/turkish-syrian-internet-users was a DANGLING FK: it
    exists in no targets-registry file (grep: referenced only by this event). Re-pointed to
    sectors/civil-society for tr and sy (the targeted population, incl. the dissident/YPG subset),
    and added country codes (were absent). Egypt not modeled as a target (separate ad-fraud case).
    RESIDUAL UNCERTAINTY: Citizen Lab's Sandvine fingerprint is forensically strong, but the
    operator identity rests on circumstantial state-nexus reasoning, and the PROMETHIUM cluster
    label is AUSPEX's editorial join (malware family), not Citizen Lab's attribution.
