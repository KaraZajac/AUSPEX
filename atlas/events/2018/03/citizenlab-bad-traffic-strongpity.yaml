id: 2018-03/citizenlab-bad-traffic-strongpity
name: Citizen Lab "Bad Traffic" — Türk Telekom ISP-level redirection delivering StrongPity
start_date: 2017-09-01
disclosure_date: 2018-03-09
end_date: null
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Citizen Lab published "Bad Traffic" (Research Report No. 107),
  documenting ISP-level network-injection operations against users
  in Türkiye and Syria. Deep-packet-inspection middleboxes on Türk
  Telekom's network — fingerprinted by Citizen Lab as
  Sandvine/Procera PacketLogic equipment — injected HTTP 307
  redirects that silently sent users downloading legitimate Windows
  software (Avast, CCleaner, Opera, 7-Zip, VLC, WinRAR, Skype and
  others, fetched over unencrypted HTTP) to attacker-controlled
  mirrors serving trojanized installers. The bundled spyware was
  FinFisher "lawful intercept" malware in an earlier phase and
  StrongPity-family implants thereafter. Citizen Lab assessed the
  operators as nation-state / "government-linked entities,"
  documented spyware injection across at least five Turkish
  provinces plus Syrian users relayed via Türk Telekom (including
  at least one IP appearing to serve YPG Kurdish users), and the
  same PacketLogic fingerprint blocking political content in
  Türkiye (the PKK site, every-language Wikipedia, the Dutch NOS
  broadcaster). Egypt was a separate but related case: the same
  fingerprint drove "AdHose," redirecting Egyptian users to
  affiliate ads and browser cryptocurrency mining for revenue
  rather than spyware.
false_flag_risk: none
summary: |
  Landmark Citizen Lab investigation that captured the first-ever
  public packet-capture proof of nation-state spyware injection in
  the wild, delivered from ISP network position (Türk Telekom) via
  Sandvine/Procera PacketLogic deep-packet-inspection middleboxes —
  tradecraft requiring telecom-operator cooperation. Citizen Lab
  attributed the injection middlebox to Sandvine PacketLogic with
  high confidence (matching a distinctive packet fingerprint
  against a second-hand device it procured) and assessed the
  spyware operators as nation-state / "government-linked entities"
  in Turkey, but stopped short of a named-actor attribution — it
  explicitly called the delivered StrongPity family "an
  unattributed APT operation in 2016" and named the Turkish
  intelligence service (MİT) only as surveillance-law background.
  The PROMETHIUM / StrongPity named-actor placement here is
  AUSPEX's, carried by the malware family and the broader vendor
  consensus recorded on the actor, not by Citizen Lab. The report's
  concluding theme is the unrestrained dual-use middlebox market
  (NSO Group and Sandvine both held by Francisco Partners).
attributions:
  - actor_id: tr/unscoped/promethium
    attributing_org: Citizen Lab (Bill Marczak et al.)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-03-09
    attribution_source_id: citizenlab/2018-03-09_bad-traffic-strongpity
    notes: |
      Citizen Lab attributes at the NATION level, not named-actor or
      named-unit. It assesses the injection as "nation-state" spyware
      run by "government-linked entities" in Turkey ("the PacketLogic
      product may have been used by government-linked entities in both
      Turkey and Egypt to inject spyware"; "likely by nation-states or
      ISPs"), and its high-confidence forensic attribution concerns the
      injection MIDDLEBOX (matched to Sandvine PacketLogic via a
      second-hand device, §3.3), not the operator. It explicitly calls
      the delivered family unattributed — "StrongPity was an
      unattributed APT operation in 2016" — and names the MİT only as
      surveillance-law background (Law No. 6532), never as this
      operation's operator. attributing_org_confidence set moderate
      (operator attribution is hedged: "apparent," "may have been used
      by," "likely by nation-states or ISPs"); attribution_level nation.
      The tr/unscoped/promethium (PROMETHIUM/StrongPity) named-actor
      linkage is AUSPEX's via the malware family + the vendor consensus
      on the actor record, hence concur-with-caveat.
doctrine_links:
  - doctrine_id: tr/counter-gulen-kurdish-surveillance
    pillar_id: tr/counter-gulen-kurdish-surveillance/kurdish-diaspora
    program_id: null
    confidence: plausible
    reasoning: |
      The operation carries some specific Kurdish-targeting indicators
      consistent with the counter-Kurdish surveillance pillar: Citizen
      Lab found at least one targeted IP that "appears to serve YPG
      (Kurdish militia) users" and router pages named "ypg" (ciwan.ypg,
      ypg-matar), spyware injection reaching the Kurdish-majority
      province of Diyarbakır (among five targeted provinces), and the
      same middleboxes blocking the PKK (Kurdistan Workers' Party)
      website. But the documented targeting is broad — five provinces
      including Ankara's Ulus quarter, Syrian users in non-Kurdish areas
      such as Idlib, generic Windows-software downloads delivered to
      whoever requested them, and censorship of unrelated content
      (Wikipedia, the Dutch NOS) — and no cited source states a
      Kurdish-surveillance purpose. The pillar's "diaspora/KRG" scope is
      also an imperfect fit: the Kurdish indicators here are domestic
      Turkish and Syrian-YPG, not diaspora-abroad or KRG-Iraq. More than
      one strategic reading therefore survives, so the link is plausible
      rather than strongly_inferred.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Counter-Kurdish surveillance/coercion: YPG-serving target IPs and 'ypg'-named router pages, injection reaching Diyarbakır, and blocking of the PKK website point to selection of Kurdish-aligned targets within the campaign."
        - "Broad authoritarian population surveillance and information control: targeting spans five provinces (including Ankara) and Syrian users in non-Kurdish areas via generic software-download hijacking, alongside censorship of Wikipedia and other non-Kurdish content — a general state-surveillance/censorship reading that does not turn on Kurdish identity."
    contested: false
    analyst: claude
