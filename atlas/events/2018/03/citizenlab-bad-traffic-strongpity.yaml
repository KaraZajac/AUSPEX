id: 2018-03/citizenlab-bad-traffic-strongpity
name: Citizen Lab "Bad Traffic" — Türk Telekom ISP-level redirection delivering StrongPity
start_date: 2017-09-01
disclosure_date: 2018-03-09
end_date: null
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Citizen Lab published "Bad Traffic," documenting ISP-level
  network-injection operations against users in Türkiye and
  Syria. Türk Telekom-mediated middleboxes (assessed by Citizen
  Lab as Sandvine / Procera PacketLogic equipment) redirected
  users requesting downloads of legitimate software (Avast,
  CCleaner, 7-Zip) to attacker-controlled mirrors delivering
  StrongPity-family implants. The report named "operators
  associated with the Turkish government" and identified Türkiye
  and Syria as principal victim countries, with Egypt as a
  separate but related case.
false_flag_risk: none
summary: |
  Landmark public attribution tying a state-aligned cluster
  (PROMETHIUM / StrongPity) to ISP-network-position tradecraft
  uniquely available to a state actor with Türk Telekom
  cooperation. Citizen Lab's documentation of Sandvine
  PacketLogic equipment use prompted Sandvine to subsequently
  withdraw from certain Turkish business and led to industry
  debate about dual-use middlebox equipment governance.
