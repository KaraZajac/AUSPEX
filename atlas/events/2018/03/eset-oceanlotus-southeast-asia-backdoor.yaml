id: 2018-03/eset-oceanlotus-southeast-asia-backdoor
name: ESET documents OceanLotus / APT32 second-stage backdoor refresh against Southeast Asian targets
start_date: 2017-09-01  # est.: earliest dated artifact in the white paper is 2017-09-05 (decoy/sample); "a few months ago" rel. to Mar 2018. ESET gives no precise op-start.
disclosure_date: 2018-03-13
end_date: null  # ESET frames the activity as ongoing ("OceanLotus continues its activity"); prior end_date merely re-stated the publication date
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
false_flag_risk: none
outcome_summary: |
  ESET published a technical analysis — a WeLiveSecurity blog post
  (Tomáš Foltýn, 13 Mar 2018) plus a 21-page companion white paper
  "OceanLotus: Old Techniques, New Backdoor" — of a refreshed
  OceanLotus / APT32 dropper-plus-backdoor chain. ESET's telemetry
  named "company and government networks" in East-Asian countries —
  "Vietnam, the Philippines, Laos and Cambodia … the most targeted" —
  as the victim set, but disclosed no specific victim organizations.
  The two-stage chain runs a first-stage dropper (delivered as a
  spearphishing email attachment masquerading as a document, opening a
  password-protected decoy; "no software exploits are needed") that
  gains a foothold and establishes persistence, then loads a
  second-stage backdoor via DLL side-loading of a legitimately-signed
  executable (Symantec RasTlsc.exe / McAfee mcoemcpy.exe paired with a
  malicious rastls.dll / McUtil.dll). The backdoor fingerprints the
  host and beacons to C2 over an encrypted (RC4 + LZMA) TCP channel on
  port 25123, with an HTTP/HTTPS (and SOCKS) fallback library, behind
  heavy control-flow obfuscation and garbage code. ESET situated the
  work alongside prior OceanLotus reporting from CyberReason, FireEye,
  and Volexity.
summary: |
  A first-party ESET malware/tradecraft disclosure documenting a new
  OceanLotus / APT32 second-stage backdoor and its dropper →
  DLL-side-loading delivery, observed (per ESET telemetry) against
  company and government networks in Southeast / East Asia in the
  late-2017–early-2018 window. The report is a technical reference for
  OceanLotus second-stage tradecraft — encrypted multi-protocol C2,
  trusted-binary side-loading, and control-flow obfuscation — rather
  than a victim-named campaign disclosure; ESET names no specific
  victims and states no strategic purpose, situating its analysis
  alongside the earlier CyberReason, FireEye, and Volexity OceanLotus
  reporting.
attributions:
