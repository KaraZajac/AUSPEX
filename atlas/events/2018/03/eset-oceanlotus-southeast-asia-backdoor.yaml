    attributing_org: ESET
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2018-03-13
    attribution_source_id: eset/2018-03-13_oceanlotus-southeast-asia-backdoor
    notes: |
      ESET attributes the malware first-hand and flatly to the named
      cluster "OceanLotus, also dubbed APT32 and APT-C-00" — named-actor,
      NOT named-unit (no Vietnamese service/unit is named; the actor is
      vn/unscoped). High confidence at the named-actor level (first-party
      analysis of the actor's own toolset). attributing_org corrected
      "ESET (Romain Dumont)" -> "ESET": the blog is bylined Tomáš Foltýn
      and neither cited ESET document names Romain Dumont.
doctrine_links:
  - doctrine_id: vn/industrial-upgrading-cyber-collection
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      ESET documents targeting of "company … networks" and lists
      "intellectual property theft" among OceanLotus's stated goals, and
      the vn/industrial-upgrading-cyber-collection doctrine's own summary
      cites this very ESET 2018 report (alongside "Vietnam-adjacent ASEAN
      governments" and "select multinationals") as evidence of the
      collection cluster — so the company-network half of the targeting
      fits this doctrine. The label is plausible, not higher: ESET states
      no strategic purpose, names no specific industrial victim, and the
      report's defining industrial-pillar victimology (automotive /
      aerospace OEMs) is absent here, while the parallel "government
      networks" half reads as foreign / neighbour-state intelligence
      collection — so more than one strategic reading survives. Linked at
      the doctrine level (pillar_id null) rather than to the automotive
      or aerospace pillar, neither of whose victimology appears.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Industrial-upgrading cyber-collection: ESET documents 'company … networks' targeting and lists IP theft among OceanLotus's goals, and the industrial-upgrading doctrine's own summary names this ESET 2018 report and 'company networks' / 'select multinationals' as in-scope — but no automotive/aerospace pillar victimology appears and ESET states no purpose."
        - "Foreign political / government-intelligence collection: ESET equally documents 'government networks' in Cambodia, Laos and the Philippines (decoy lures reference a defence/MOD contract, a Mi-17 military-helicopter theme, and a Lao conglomerate), reading as neighbour-state foreign-intelligence collection — a lane for which the atlas has no dedicated Vietnamese doctrine; this reading survives alongside the industrial one."
    contested: false
    analyst: claude
