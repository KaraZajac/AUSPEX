id: 2018-03/eset-oceanlotus-southeast-asia-backdoor
name: ESET documents OceanLotus / APT32 second-stage backdoor refresh against Southeast Asian targets
start_date: 2017-06-01
disclosure_date: 2018-03-13
end_date: 2018-03-13
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  ESET (Romain Dumont) published a technical analysis of a
  refreshed OceanLotus / APT32 dropper-plus-backdoor chain
  observed against "high-profile" Southeast Asian targets in late
  2017 and early 2018. The two-stage architecture used a side-
  loaded benign-signed application to load the malicious dropper,
  followed by an obfuscated second-stage backdoor with multi-
  protocol C2 (HTTP, HTTPS, TCP) and improved anti-analysis
  measures relative to prior OceanLotus implants. ESET did not
  publicly name victims but characterized the targeting as
  consistent with the FireEye 2017 APT32 attribution.
false_flag_risk: none
summary: |
  Mid-cycle tradecraft disclosure that confirms continuity of
  APT32 operations between the FireEye May 2017 naming and the
  Volexity November 2017 watering-hole disclosure on one side
  and the 2019 automotive-OEM campaign cluster on the other.
  ESET's analysis is one of the cleanest published technical
  references for OceanLotus second-stage tradecraft in the
  pre-2020 window and is the source the WeLiveSecurity APT32
  reporting cluster builds on.
