qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-28
  level: full
  notes: |
    Audited against BOTH cited ESET documents (raw snapshots captured +
    hashed). Blog: eset__2018-03-13_oceanlotus-southeast-asia-backdoor.html,
    sha256 5fc543e7…2fb10515, 74709 bytes (HTTP 200, real article,
    bylined Tomáš Foltýn, 13 Mar 2018 — NOT a phantom). White paper
    (added this audit): eset__2018-03_oceanlotus-old-techniques-new-backdoor.pdf,
    sha256 f6a3d64a…459af9be, 1900054 bytes, 21 pp (PDF CreationDate
    2018-03-13; cover "ESET / March 2018"; no author in PDF/metadata).

    DISTINCTNESS (per orchestrator NB) — confirmed NOT a duplicate. This
    is a malware/backdoor technical analysis, not a watering-hole
    campaign disclosure. Distinct from 2017-11/volexity-oceanlotus-asean-
    watering-hole (Volexity's 100+ -site SWC network, dissident-dominated
    victimology) and from 2018-03/apt32-cambodia-watering-hole (Cambodian
    election-cycle watering holes, cites the Volexity source). No shared
    incident, victim set, or source. Kept as its own event.

    [a] FACTS — corrected several claims that the BLOG did not carry
    (sourced the true ones to the white paper, struck the false ones):
    (1) Authorship: "ESET (Romain Dumont)" -> "ESET". The blog is bylined
    Tomáš Foltýn; "Romain Dumont" appears in neither document. (2) C2:
    "multi-protocol C2 (HTTP, HTTPS, TCP)" is NOT in the blog (blog: "All
    communication with the C&C servers is encrypted") but IS in the white
    paper: "The backdoor uses a classic TCP communication protocol over
    port 25123 … All communication is encrypted using RC4 and compressed
    with LZMA … HTTPprov … sends a POST request over the HTTP protocol …
    also supports HTTPS and the usage of a SOCKS5, SOCKS4a or SOCKS4
    proxy." Re-pointed to the white paper; added RC4+LZMA + port 25123 +
    SOCKS detail. (3) "consistent with the FireEye 2017 APT32
    attribution" — the blog never mentions FireEye; the white paper
    references it only as prior reporting ("papers such as those from
    CyberReason, a lengthy global view from FireEye and the watering-hole
    explanation from Volexity"). Replaced the invented "consistency"
    claim with that accurate situating sentence. (4) Chain DIRECTION
    fixed: prior prose said side-loading "load[s] the malicious dropper"
    — backwards. Per both docs the dropper is delivered by spearphishing
    attachment (stage 1) and DLL side-loading of a signed Symantec/McAfee
    binary loads the BACKDOOR (stage 2). (5) "improved anti-analysis
    measures relative to prior OceanLotus implants" — comparative claim
    unstated; softened to the documented obfuscation/garbage-code/
    side-loading evasion. KEPT + source-confirmed: OceanLotus/APT32/
    APT-C-00 naming; two-stage dropper->backdoor; spearphishing,
    "no software exploits are needed"; signed RasTlsc.exe/mcoemcpy.exe +
    malicious rastls.dll/McUtil.dll side-loading; host fingerprint +
    encrypted C2; "company and government networks … Vietnam, the
    Philippines, Laos and Cambodia … the most targeted"; goals "include
    cyberespionage, reconnaissance and intellectual property theft"; no
    specific victims named. Added incident_type espionage (remote-access
    backdoor: system fingerprint, data exfil, file/registry/process
    manipulation, stated espionage goals); kept intrusion. initial_vector
    phishing retained ("most probably via a spearphishing email"; NOT
    exploit-based — contrast the 0-day apt32-cambodia event).

    [b] ATTRIBUTION — ESET names the actor first-hand and flatly
    ("OceanLotus, also known as APT32 and APT-C-00"); attributing_org_
    confidence high retained; auspex_assessment concur retained.
    attributing_org "ESET (Romain Dumont)" -> "ESET" (byline correction).

    [c] DATES — published_on 2018-03-13 confirmed (blog "13 Mar 2018";
    PDF CreationDate 2018-03-13). disclosure_date 2018-03-13 ✓. FIXED
    end_date 2018-03-13 -> null: the white paper says "OceanLotus
    continues its activity" (ongoing); the prior end_date only re-stated
    the publication date (op-end/disclosure conflation). FIXED start_date
    2017-06-01 -> 2017-09-01 (estimate): neither doc gives an op-start;
    the earliest dated artifacts are Sep 2017 ("Sorchornor_with_PM_-_Sep_
    2017", "20170905-Evaluation Table.xls.exe"), with "Jan 2018" decoys
    and "Last IoC update: 2018-02-22"; "a few months ago" rel. to Mar
    2018. 2017-06-01 was unsupported (too early).

    [d] DOCTRINE_LINKS — REMOVED the vn/resolution-29-nqtw/regime-
    stability-surveillance (plausible) link: that pillar's defining
    victimology is dissident / diaspora / civil-society / media monitoring
    ("hostile forces", Viet Tan), which is ABSENT from ESET's described
    targets (company + government networks abroad); the old reasoning
    conflated foreign-government espionage with domestic regime-stability
    surveillance. KEPT vn/industrial-upgrading-cyber-collection at
    plausible (pillar_id null), tightened the reasoning to the
    company-network / IP-theft half (the doctrine's own summary cites this
    exact ESET 2018 report), and added inference_basis.alternatives
    capturing the surviving competing reading — foreign / neighbour-state
    government-intelligence collection, for which the atlas has no
    dedicated VN doctrine. Not attested (no source states the strategic
    purpose). perspective attacker-rationale (default; vn actor + vn
    doctrine).

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): ESET names the
    group OceanLotus/APT32/APT-C-00, no Vietnamese service/unit.

    [f] ACTOR_ID — vn/unscoped/apt32 RESOLVES to atlas/actors/vn/apt32.yaml
    (id field vn/unscoped/apt32). Well-sourced, non-provisional; consistent
    with siblings. No actor flag.

    TARGETS — replaced the DANGLING FK orgs/southeast-asia-high-profile-
    undisclosed (no such registry record; used by this event only) with
    sectors/government (role primary) — "government networks" is the one
    explicitly-named, resolvable target type. ESET names no specific
    victim org, and there is no generic private-sector sector for the
    "company" half (captured instead in the doctrine reasoning). Per
    orchestrator NB, NO target set to Vietnam: although ESET lists Vietnam
    among most-targeted countries, OceanLotus is the Vietnamese actor, so
    tagging Vietnam as a victim would invert directionality; country left
    null (multi-country, none singled out by sector). Decoy-lure themes
    (defence/MOD contract, Mi-17 helicopter, Lao conglomerate, telecom)
    are social-engineering bait, not confirmed victims — not tagged.

    Residual uncertainties: (i) start_date is an estimate anchored to the
    earliest dated artifact (2017-09-05); ESET gives no precise op-start.
    (ii) The foreign-government-collection strategic lane is real but has
    no atlas VN doctrine, so it is recorded as a surviving alternative on
    the single industrial link rather than as its own doctrine_link.
