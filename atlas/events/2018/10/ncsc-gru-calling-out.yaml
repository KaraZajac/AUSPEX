id: 2018-10/ncsc-gru-calling-out
name: NCSC + FCO call out GRU for "reckless campaign of cyber attacks"
start_date: 2015-04-01  # period covered by the calling-out
disclosure_date: 2018-10-04
end_date: 2018-10-04
incident_type:
  - attribution-publication
initial_vector: unknown
outcome_summary: |
  NCSC and the UK Foreign and Commonwealth Office jointly published
  a public attribution naming GRU Unit 26165 (APT28 / Fancy Bear)
  as responsible for a multi-year "reckless campaign of cyber
  attacks" against international institutions, including OPCW,
  WADA, the IAAF, the 2017 French elections, the DNC (referencing
  US-attributed events), and the Skripal-investigation supporting
  agencies. Coordinated with the Netherlands' MIVD disclosure of
  the OPCW Hague disruption operation (announced same day).
false_flag_risk: none
summary: |
  First major NCSC-led public attribution of a state actor; sets
  the template for the subsequent NCSC + FCDO joint attribution
  cadence (NotPetya 2018 attribution had been UK-government voice
  but pre-NCSC-public-attribution-template). Doctrinally tied to
  the NCS 2016 "deter" pillar and to the same day's NATO and Dutch
  joint disclosures of GRU operations against OPCW.

  The October 2018 calling-out also anchored UK sanctions and
  diplomatic responses to GRU activity that would continue through
  the 2020 EU sanctions, the 2024 Salisbury attack anniversary
  attribution reaffirmations, and the 2026 NCSC APT28 router
  advisory.
