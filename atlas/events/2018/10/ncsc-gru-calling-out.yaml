id: 2018-10/ncsc-gru-calling-out
name: NCSC + FCO call out GRU for "reckless campaign of cyber attacks"
start_date: 2015-07-01  # AUDIT 2026-07-10: was 2015-04-01 (unsourced). Earliest op dated in the statement = the small UK TV station, "Between July and August 2015"
disclosure_date: 2018-10-04
end_date: 2018-10-04
incident_type:
  - documentary  # AUDIT 2026-07-10: was [attribution-publication]; retyped to the corpus meta-event type. Documentary/attribution meta-event: GRU attacker -> multiple victims
initial_vector: unknown
outcome_summary: |
  NCSC and the UK Foreign & Commonwealth Office jointly published a
  public attribution of "the GRU, the Russian military intelligence
  service" for an "indiscriminate and reckless" multi-year campaign,
  assessing "with high confidence that the GRU was almost certainly
  responsible" for each listed operation and the UK government judging
  that "the Russian Government - the Kremlin - was responsible." The
  statement mapped the GRU to a named alias set: APT28, Fancy Bear,
  Sofacy, Pawnstorm, Sednit, CyberCaliphate, Cyber Berkut, Voodoo Bear,
  BlackEnergy Actors, STRONTIUM, Tsar Team and Sandworm - i.e. spanning
  both GRU Unit 26165 (APT28) and Unit 74455 (Sandworm) tradecraft
  families.

  New attributions named in the statement: BadRabbit ransomware (Oct
  2017; disruption to the Kyiv metro, Odessa airport, Russia's central
  bank and two Russian media outlets); the WADA anti-doping (ADAMS)
  hack (Aug 2016); the DNC hack (2016); and email theft from a small
  UK-based TV station (Jul-Aug 2015). Reiterated as "previously
  attributed": NotPetya (Jun 2017; UK-attributed Feb 2018) and
  VPNFilter (Oct 2017). A 1pm update, following the Dutch statement,
  added the OPCW-related Spiez spearphishing (May 2018), the attempted
  access to official OPCW networks (Apr 2018), and attempts against the
  UK Defence Science & Technology Laboratory (DSTL, Apr 2018) and the
  FCO (Mar 2018).
false_flag_risk: none
summary: |
  A landmark NCSC + FCO joint public attribution of a state actor,
  which set the template for the subsequent NCSC + FCDO joint
  attribution cadence. (The UK had attributed NotPetya to "the Russian
  military" in February 2018 - reiterated here as "previously
  attributed" - but that preceded this multi-operation calling-out
  template.) The uk/ncs-2016 doctrine record names this October 2018
  calling-out as the canonical case of its "deter" pillar (attribution
  announcements / cost imposition).

  Coordinated with the Netherlands' MIVD (DISS) same-day disclosure of
  the 13 April 2018 interdiction of a GRU close-access team at the OPCW
  in The Hague, and companion to the same-day US DOJ indictment of
  seven GRU officers (Morenets et al.). NB: the specific GRU unit
  numbers (26165, 74455) and the additional victims IAAF, FIFA, USADA,
  CCES and Westinghouse Electric appear in that DOJ indictment, NOT in
  the NCSC statement, which attributes at "the GRU" / Kremlin level.
