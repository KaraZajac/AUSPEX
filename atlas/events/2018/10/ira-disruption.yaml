id: 2018-10/ira-disruption
name: IRA disruption (CYBERCOM Russia Small Group, 2018 midterms)
start_date: 2018-10-01  # ramp-up; targeted disruption around Nov 6 voting
disclosure_date: 2019-02-27  # WaPo Nakashima
end_date: 2018-11-06  # midterm voting day; disruption window
incident_type:
  - disruption
initial_vector: unknown  # not publicly detailed
outcome_summary: |
  "Took the IRA offline" during the US midterm voting period per
  Nakasone (then DIRNSA/CG USCYBERCOM) testimony. First publicly
  acknowledged US offensive cyber operation against a Russian
  state-aligned target. Reported denial-of-service-style internet-
  access disruption against the Internet Research Agency (Yevgeny
  Prigozhin's St. Petersburg troll farm).
false_flag_risk: none
summary: |
  Operation by the CNMF Russia Small Group (RSG) — a CNMF-internal
  task element stood up for the 2018 midterm cycle — under USCYBERCOM.
  First major exercise of the post-NSPM-13 (August 2018) authority
  delegation chain. Ellen Nakashima broke the story in the
  Washington Post (February 27, 2019); Nakasone subsequently
  confirmed in Senate Intelligence Committee testimony. NBC News
  (Kube) and follow-on reporting filled in operational details.
