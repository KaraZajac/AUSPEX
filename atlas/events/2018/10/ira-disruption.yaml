id: 2018-10/ira-disruption
name: IRA disruption (CYBERCOM Russia Small Group, 2018 midterms)
start_date: 2018-10-01  # UNSOURCED editorial ramp estimate; RSG stood up ~summer 2018 (NBC), sourced disruption window is Nov 6 +/- a day (WaPo)
disclosure_date: 2019-02-27  # WaPo Nakashima (online 2019-02-26, print 2019-02-27)
end_date: 2018-11-06  # midterm voting day; WaPo: disruption ran "as Americans went to the polls and a day or so afterward"
incident_type:
  - disruption  # DoS-style internet-access denial; NB "offensive" is not an AUSPEX incident_type vocab value
initial_vector: unknown  # not publicly detailed
outcome_summary: |
  US CYBERCOM disrupted the internet access of the Internet Research
  Agency (Yevgeny Prigozhin's St. Petersburg troll farm) around the
  2018 US midterm voting window — per Ellen Nakashima's Washington
  Post reporting, an anonymous US official said "They basically took
  the IRA offline." WaPo frames it as "the first offensive cyber
  campaign against Russia designed to thwart attempts to interfere
  with a U.S. election" and "the first muscle-flexing by U.S. Cyber
  Command … under new authorities it was granted by President Trump
  and Congress." The specific disruption method was not officially
  detailed (characterized publicly as blocking/denying network
  access). US-as-ACTOR counter-action: the actor is US CYBERCOM; the
  subject/target is the Russian IRA.
false_flag_risk: none
summary: |
  US CYBERCOM + NSA election-defense operation against the Internet
  Research Agency during the 2018 US midterm cycle, conducted under
  the "Russia Small Group" (RSG) task element. Gen. Paul Nakasone
  (then DIRNSA / CG USCYBERCOM) named the RSG on the record in his
  14 February 2019 Senate Armed Services Committee posture statement,
  describing it as a USCYBERCOM+NSA initiative "to protect the
  elections from foreign interference and influence" that
  "demonstrated persistent engagement in practice." Twelve days
  later, Ellen Nakashima broke the specific operational detail — that
  the operation disrupted the IRA's internet access on midterm voting
  day — in the Washington Post (26/27 February 2019). Later reporting
  (NBC News / Courtney Kube) characterized the RSG as a
  CYBERCOM/NSA-internal task grouping (~75-80 personnel) stood up in
  2018; AUSPEX preserves RSG as an overlapping alias of the Cyber
  National Mission Force (see us/cybercom/cnmf-actor). Widely read as
  the first major exercise of the post-NSPM-13 (Aug 2018) delegated
  offensive-cyber authority, though neither cited source names
  NSPM-13, Defend Forward, or Section 1642.
attributions:
  - actor_id: us/cybercom/cnmf-actor  # RSG = CNMF-overlapping task element; named on the record by Nakasone (SASC 2019-02-14). US offensive op => named-unit actor per glowing-symphony/trickbot convention (NOT a null-actor LE takedown)
    attributing_org: USCYBERCOM (Nakasone, SASC posture statement 2019-02-14) + WaPo (Nakashima)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2019-02-14  # Nakasone's on-the-record naming of the Russia Small Group
    attribution_source_id: nakasone/2019-02-14_sasc-posture-statement
    attribution_level: named-unit  # SASC statement names the "Russia Small Group" (RSG) for the 2018 election-defense mission; WaPo carries the specific op at command level ("U.S. Cyber Command")
    notes: |
      Composed attribution. Nakasone OFFICIALLY acknowledged the
      "Russia Small Group" and the 2018 election-defense mission on
      the record in his 2019-02-14 SASC posture statement
      (named-unit, primary). The SPECIFIC operational detail — that
      the effort disrupted the IRA's internet access on voting day —
      was reported by WaPo/Nakashima on 2019-02-26/27 sourced to
      anonymous US officials (command-level, "U.S. Cyber Command"; the
      "took the IRA offline" line is an anonymous-source quote, NOT
      Nakasone). Neither source ties the RSG by name to the IRA op
      specifically, but the IRA disruption is the concrete
      instantiation of the RSG's stated 2018 election-defense mission,
      so the named-unit (RSG => us/cybercom/cnmf-actor) attribution is
      supported at overlapping-alias granularity. Attribution-source
      kind: `officially-acknowledged` (RSG/mission) + background
      reporting (op specifics).
