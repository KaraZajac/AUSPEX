initial_vector: phishing
false_flag_risk: none
summary: |
  Trend Micro researchers Daniel Lunghi and Jaromir Horejsi documented Confucius cyberespionage operations uncovered while investigating Patchwork, targeting military personnel and businessmen across South Asian countries. Confucius deployed a range of bespoke backdoors (including sctrls, ByeBye Shell, remote-access-c3, and sip_telephone) delivered through Office files exploiting the memory-corruption vulnerabilities CVE-2015-1641 and CVE-2017-11882, then exfiltrated stolen files to an attacker-controlled cloud-storage account that held data from roughly 60 victims. The group relied heavily on social engineering, operating Windows/Android chat apps such as Secret Chat Point and Tweety Chat to lure targets, and its backdoor commands resembled Patchwork's.
