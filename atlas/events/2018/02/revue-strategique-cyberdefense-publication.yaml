outcome_summary: |
  Publication by the SGDSN on 12 February 2018 of the Revue
  stratégique de cyberdéfense, the foundational Macron-era French
  cyber-doctrine document. Establishes the four-chain posture
  (protection, military action, intelligence, judicial), the
  strict offensive / defensive separation between ANSSI and the
  military / DGSE side, and the sovereign-technology pillar.
