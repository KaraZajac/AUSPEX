  notes: |
    Audited against the primary SGDSN PDF "Revue stratégique de cyberdéfense"
    (raw_snapshot sgdsn__2018-02-12_revue-strategique-cyberdefense.pdf;
    sha256 99c68fdf…dd0a19fd; 37,981,849 bytes; 167 pp.). The on-disk snapshot
    was re-hashed and is byte-identical to the live canonical URL
    (https://www.sgdsn.gouv.fr/files/files/Publications/20180206-np-revue-cyber-public-v3.3-publication.pdf,
    HTTP 200 on 2026-06-27).

    [a] FACTS — clean policy/doctrine-publication event; NO attack framing, NO
    threat actor, NO malware/victim claims to strip. Load-bearing claims are
    source-carried: cover page reads verbatim "Revue stratégique de cyberdéfense
    / 12 février 2018"; the four-chain posture is stated verbatim on the
    recommendations pages — "Mettre en place 4 chaînes opérationnelles : chaîne
    « protection », chaîne « action militaire », chaîne « renseignement », chaîne
    « investigation judiciaire »" — exactly matching outcome_summary's "(protection,
    military action, intelligence, judicial)". ANSSI's defensive role is pervasively
    documented in-text; "souveraineté numérique" (sovereign-technology objective,
    p.~"3.1.4/3.1.5") and regulation of "activités offensives cyber" are present,
    corroborating the offensive/defensive-separation and sovereign-technology
    summary points. (Note: the 38 MB PDF is largely image-based — only ~18 KB text
    layer extracted, concentrated in the recommendations/executive matrix; the
    publisher line "SGDSN under PM Édouard Philippe" sits on image-based cover/
    foreword pages but is a universally documented fact for this exact document and
    needs no removal.)
    [b] ATTRIBUTION — N/A. attributions: [] is correct: a doctrine publication has
    no perpetrator. Matches the closest sibling event (2021-10/lii-doctrine-publication).
    [c] DATES — start_date = disclosure_date = end_date = 2018-02-12, confirmed by
    the PDF cover ("12 février 2018"). No campaign-vs-disclosure conflation possible
    (single-day meta event). source.published_on 2018-02-12 correct.
    [d] DOCTRINE_LINKS — single link to fr/revue-strategique-cyberdefense-2018,
    confidence: attested, attesting_source_id present (= the Revue itself). This is
    the canonical self-publication pattern: the attesting source IS the doctrine and
    states its strategic goals in substance (the four chains + sovereign autonomy
    quoted above), so attested is definitionally met, not over-attestation. FK
    resolves to atlas/doctrines/fr/revue-strategique-cyberdefense-2018.yaml. pillar_id/
    program_id null is appropriate (event publishes the whole Revue, not one pillar);
    consistent with 2021-12/uk-ncs-2022-publication.
    [e] ATTRIBUTION_LEVEL — N/A (no attributions).
    [f] ACTOR_ID — N/A (no actor entry).

