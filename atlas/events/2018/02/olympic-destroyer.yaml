    reasoning: |
      The DOJ Oct-2020 indictment states the strategic purpose at the
      goal level: the GRU attack on the PyeongChang Games was
      retaliation "after Russian athletes were banned from participating
      under their nation's flag, as a consequence of Russian government-
      sponsored doping effort." Russia framed the WADA/IOC doping
      sanctions and flag ban as a Western political campaign to humiliate
      the nation and undermine its patriotic prestige; a destructive
      cyber reprisal against the Games is exactly the "proportionate
      response to perceived Western information confrontation" that the
      2016 Information Security Doctrine bureaucratically licenses, and
      maps to the info-psychological-defense pillar's "patriotic
      traditions / historical foundations" clause. (Ruled out:
      ru/russkiy-mir — that doctrine is explicitly scoped to the
      post-Soviet near abroad; South Korea / the IOC fall outside it, so
      Sandworm's default Russkiy-Mir alignment does NOT drive this event.)
      The attesting quote is the DOJ's, not the FCDO's — the FCDO release
      only calls the op "cynical and reckless."
    attesting_source_id: doj/2020-10-15_sandworm-six-gru-officers-indictment
    inference_basis:
      source_quote: "These GRU hackers and their co-conspirators engaged in computer intrusions and attacks intended to support Russian government efforts to undermine, retaliate against, or otherwise destabilize: ... (5) the 2018 PyeongChang Winter Olympic Games after Russian athletes were banned from participating under their nation's flag, as a consequence of Russian government-sponsored doping effort."
