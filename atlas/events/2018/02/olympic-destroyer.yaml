id: 2018-02/olympic-destroyer
name: Olympic Destroyer (PyeongChang Winter Olympics)
start_date: 2018-02-09
disclosure_date: 2018-02-12
end_date: 2018-02-09
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  Destructive-only wiper deployed against the IT systems supporting
  the 2018 PyeongChang Winter Olympics, detonating hours before the
  Feb 9 opening ceremony. Degraded the opening-ceremony Wi-Fi and the
  ticketing system (attendees could not print tickets) and, per the
  DOJ, "disrupted thousands of computers used to support the 2018
  PyeongChang Winter Olympics." Deliberately seeded with planted
  Lazarus/DPRK and Chinese false-flag artifacts; the canonical worked
  example of nation-state false-flag tradecraft being publicly
  dissected.
false_flag_risk: confirmed  # planted DPRK/Lazarus (forged Rich header) + generic Chinese-hacker artifacts to misdirect attribution; assessed actor is ru/gru/74455/sandworm (UK FCDO + US DOJ, Oct 2020). Planted DPRK actor = kp/rgb/lazarus; no specific China actor named (FCDO says "Chinese hackers" generically).
operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  UK NCSC/FCDO and the US DOJ (both Oct 2020) attribute Olympic
  Destroyer to the GRU's Main Centre for Special Technologies
  (GTsST / Unit 74455 / Sandworm). The DOJ indictment states the
  motive at the goal level: the intrusions were "intended to support
  Russian government efforts to undermine, retaliate against, or
  otherwise destabilize ... the 2018 PyeongChang Winter Olympic Games
  after Russian athletes were banned from participating under their
  nation's flag, as a consequence of Russian government-sponsored
  doping effort." (The FCDO release itself frames the op only as
  "cynical and reckless" sabotage and does NOT use flag-ban/doping
  language — that regime-prestige attestation is the DOJ's, not the
  FCDO's; a prior draft mis-attributed it to the FCDO.)

  Per Cisco Talos, Olympic Destroyer is a self-propagating,
  destructive-only wiper ("no exfiltration of data"): it harvests
  credentials via a browser-credential stealer plus a system stealer
  that pulls LSASS secrets "with a technique similar to that used by
  Mimikatz," then spreads via PsExec and WMI using the stolen
  credentials to delete Volume Shadow Copies (vssadmin), delete the
  backup catalog (wbadmin), clear Windows event logs (wevtutil),
  disable the recovery console (bcdedit), and disable all services on
  each host. Kaspersky's GReAT showed the sample's Rich header had
  been "forged to perfectly match the fingerprint used by Lazarus" — a
  deliberately planted DPRK false flag (100% match to known Lazarus
  components) — and the FCDO confirmed the GRU "attempted to disguise
  itself as North Korean and Chinese hackers"; the operation became
  the canonical worked example of nation-state false-flag tradecraft.
