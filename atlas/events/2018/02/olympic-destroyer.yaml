  notes: |
    Full 6-point audit vs RAW. The canonical false-flag case (Feb-2018 PyeongChang).
    Two cited sources RE-SOURCED with two technical/analysis primaries added (badrabbit
    model): the pre-audit event cited only the UK FCDO attribution + DOJ indictment,
    neither of which carries the wiper mechanism or the forged-fingerprint deception.
    All four sources now snapshotted (PRESERVE tier; only snapshot keys added):
      • ukgov/2020-10-19_olympic-destroyer-attribution — content_sha256 71ed3fb6…2b3229bb,
        87389 bytes (SNAPSHOT NEWLY CAPTURED this audit; live HTTP 200).
      • doj/2020-10-15_sandworm-six-gru-officers-indictment — content_sha256 89d5d4f9…620f02eb
        (Wayback capture; live justice.gov Akamai-bot-walled).
      • blogtalosintelligence/2018-02-12_olympic-destroyer — content_sha256 f059dd0b…47721551,
        74529 bytes (NEW; the destructive-payload teardown).
      • securelist/2018-03-08_olympicdestroyer-trick-the-industry — content_sha256 ef294d01…b7e6cc36,
