    [a] FACTS — corrected two defects:
      • outcome_summary: "RFID gates" REMOVED — that detail is in NONE of the four sources
        (it is a WIRED detail). Talos carries the sourced disruption: "individuals could not
        print their tickets. The opening ceremony reporting was degraded due to WiFi failing
        for reporters on site." DOJ carries "disrupted thousands of computers used to support
        the 2018 PyeongChang Winter Olympics." "First … publicly dissected" superlative
        softened to "canonical worked example."
      • summary: the claim "UK FCDO press release directly cited retaliation for Russia's IOC
        flag ban following the McLaren-Report doping consequences" was FALSE — the full FCDO
        page (10.5K chars of text) contains NO "flag"/"doping"/"ban"/"retaliation" language
        (verified by grep of the snapshot); it says only "cynical and reckless." The
        retaliation-for-doping-ban attestation is the DOJ's. Re-attributed; "McLaren-Report"
        (uncited) dropped; the "pending QC re-verification" hedge removed (now resolved).
      • Wiper mechanism now fully carried by Talos (verbatim): "only destructive functionality.
        There does not appear to be any exfiltration of data"; "deleting shadow copies, event
        logs and trying to use PsExec & WMI to further move through the environment";
        "vssadmin.exe delete shadows /all /quiet"; "wbadmin.exe delete catalog -quiet";
        "wevtutil.exe cl System"/"cl Security"; bcdedit disables the recovery console; "the
        destroyer disables all the services on the system" (ChangeServiceConfigW → start
        type 4); "System Credential Stealer … obtain credentials from LSASS with a technique
        similar to that used by Mimikatz" + a browser stealer; propagation via ARP/WMI.
        Securelist: "a network worm … credential stealer modules and a wiper."

    [b] ATTRIBUTION — both entries kept high/concur (GTsST/Unit 74455/Sandworm). UKGOV entry
      confirmed named-unit from the snapshot: "the GRU's Main Centre for Special Technologies,
      GTsST also known by its field post number 74455 … Sandworm". DOJ entry named-unit:
      "Unit 74455 of the Russian Main Intelligence Directorate (GRU)". No over-attestation.

    [c] DATES — start 2018-02-09 (opening-ceremony detonation; DOJ: intrusions "December 2017
      through February 2018 … culminated in the Feb. 9, 2018, destructive malware attack against
      the opening ceremony"), disclosure 2018-02-12 (Talos public teardown; games officials
      confirmed 2/11), end 2018-02-09 (single-day payload) — all kept, all sourced. Source
      published_on: Talos 2018-02-12 and Securelist 2018-03-08 confirmed from snapshot metadata;
      UKGOV 2020-10-19; DOJ attribution_date 2020-10-15 (indictment-return) vs PR published
      2020-10-19.

    [d] DOCTRINE — ru/info-security-2016 / info-psychological-defense UPGRADED
      strongly_inferred → attested (added perspective: attacker-rationale). The DOJ states the
      terminal goal in substance (verbatim quote in inference_basis: the attack was retaliation
      "after Russian athletes were banned from participating under their nation's flag, as a
      consequence of Russian government-sponsored doping effort"). Re-pointed attesting_source_id
      from the FCDO (which does NOT carry the goal) to the DOJ. ru/russkiy-mir explicitly RULED
      OUT (out of near-abroad geographic scope — target is South Korea / the IOC).

    [e] ATTRIBUTION_LEVEL — added named-unit to BOTH attribution entries (was absent).

    [f] ACTOR_ID — ru/gru/74455/sandworm resolves to atlas/actors/ru/sandworm.yaml (id:
