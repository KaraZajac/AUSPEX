id: 2018-02/olympic-destroyer
name: Olympic Destroyer (PyeongChang Winter Olympics)
start_date: 2018-02-09
disclosure_date: 2018-02-12
end_date: 2018-02-09
incident_type:
  - destructive
  - disruption
initial_vector: unknown
outcome_summary: |
  Destructive malware deployed during the PyeongChang Winter
  Olympics opening ceremony. Disrupted Wi-Fi, the ticketing
  application, and RFID gates. Deliberately seeded with Lazarus/
  Chinese false-flag artifacts; widely cited as the first
  nation-state operation in which false-flag tradecraft was
  publicly dissected.
false_flag_risk: confirmed
operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  UK NCSC and DOJ Oct 2020 attribution confirmed GRU Unit 74455
  responsibility. UK FCDO press release directly cited retaliation
  for Russia's IOC flag ban following the McLaren-Report doping
  consequences — gold-standard regime-prestige attestation.
  Olympic Destroyer is a modular self-propagating wiper that
  performs credential dumping via embedded Mimikatz-equivalent and
  browser-credential modules, then spreads laterally with the
  harvested valid credentials via PsExec and WMI to wipe Volume
  Shadow Copies, clear Windows event logs, delete backup catalogs,
  and disable services on each host. Kaspersky's GReAT
  documented attribution-misdirection artifacts deliberately
  seeded to point at Lazarus (a forged Rich header matching
  Bluenoroff samples) — the operation became the canonical
  worked example of false-flag tradecraft in nation-state cyber.
