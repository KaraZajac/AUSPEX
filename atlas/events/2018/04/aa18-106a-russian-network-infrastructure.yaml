  notes: |
    Audited against the RAW CISA / US-CERT advisory TA18-106A / AA18-106A
    "Russian State-Sponsored Cyber Actors Targeting Network Infrastructure
    Devices" (snapshot atlas/sources/raw/cisa__2018-04-16_aa18-106a-russian-
    network-infrastructure.html, sha256 61cba0da…53df5877, 94294 bytes;
    cisa.gov returned HTTP 200 with the real article (node/9396) — NOT
    bot-walled and NOT a phantom, so level = full.
    [a] FACTS ✓: tri-government joint Technical Alert (DHS, FBI, UK NCSC);
    worldwide campaign against network-infrastructure devices — enterprise
    and SOHO/residential routers, switches, firewalls; protocols GRE,
    Cisco Smart Install (SMI, TCP/4786), SNMP (161/162), Telnet (23);
    configuration-file exfiltration over TFTP, credential harvesting,
    persistent access; victims = network-device vendors, ISPs, public- and
    private-sector orgs, SOHO, "U.S. critical infrastructure" — all
    verbatim in the raw. initial_vector corrected n-day -> valid-creds per
    "Legitimate user masquerade is the primary method ... cyber actors are
    able to easily obtain legitimate credentials."
    [b] ATTRIBUTION — KEY CORRECTION: actor_id ru/fsb/center-16/berserk-bear
    (named-unit) -> null. The advisory names ONLY "Russian state-sponsored
    cyber actors" / "The U.S. Government assesses that cyber actors supported
    by the Russian government carried out this worldwide campaign." Raw-text
    scan returned 0 occurrences of Dragonfly / Energetic Bear / Berserk /
    Crouching Yeti / FSB / Center 16 / GRU / Symantec / CrowdStrike. The
    berserk-bear / FSB Center 16 claim was unsupported by the only cited
    source and conflated this April router advisory with the separate
    March-2018 energy-sector advisory TA18-074A (the genuine Dragonfly /
    Berserk Bear anchor, already cited by berserk-bear-us-energy-campaign).
    Demoted per the Estonia-2007 / Georgia-2008 nation-level-Russia
    convention (actor_id null + attribution_level nation).
    attributing_org_confidence kept moderate (govt assessment, not legal
    proof). auspex_assessment concur-with-caveat -> concur (the caveat's
    referent — the cluster scoping — is removed). The unsourced "subsequent
    industry consolidation (Symantec, CrowdStrike, Microsoft)" embellishment
    was stripped from the summary.
    [c] DATES ✓: published / disclosure 2018-04-16 (Original Post; Update
    2018-04-19); start_date 2015-01-01 carried by "Since 2015, the U.S.
    Government received information"; the dated scanning evidence in the
    advisory is 2016-07 (SNMP) and 2017-06/07 (SMI). source published_on
    2018-04-16 ✓.
    [d] DOCTRINE ✓: uk/ncs-2016 deter link downgraded strongly_inferred ->
    plausible. The advisory states no deterrence purpose and is in form a
    defensive Technical Alert, so a competing NCS-2016 'defend' reading
    survives; restructured the malformed inference_basis (signals + a
    self-referential ruled_out that named the chosen deter pillar) into
    alternatives[] (deter vs defend). perspective defender-response retained
    (UK doctrine on an advisory about a Russian operation). Not attested, so
    attesting_source_id denotes the supporting source only.
    [e] ATTRIBUTION_LEVEL: set to nation (was missing) — exactly what the
    source names.
    [f] ACTOR_ID: now null (no FK to resolve). Note for the orchestrator:
    the berserk-bear actor file lives at atlas/actors/ru/berserk-bear.yaml
    but carries id ru/fsb/center-16/berserk-bear (FK resolves by id, not by
    path) — left untouched; it is correctly used by the energy-sector events
    (dragonfly-energetic-bear, berserk-bear-us-energy-campaign,
    aa22-110a-russian-threats-to-cii, the 2025 Cisco-IOS events), just not
    here. The cited source record was updated with raw_snapshot +
    content_sha256; tier primary preserved (correct for a first-party govt
    advisory). Also removed from name/prose: the unsourced "first joint"
    superlative, and the summary's Salisbury / GRU-Unit-29155 and
