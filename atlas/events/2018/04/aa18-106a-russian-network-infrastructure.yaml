    perspective: defender-response
    pillar_id: uk/ncs-2016/deter
    program_id: null
    confidence: plausible
    reasoning: |
      The UK NCSC co-signing a public, multi-government attribution
      of Russia can be read as a defender-response act under the
      NCS-2016 'deter' pillar (attribution-as-signalling), and AUSPEX
      records this advisory as an early template for that joint-
      attribution cadence. But the advisory neither names the NCS-2016
      deter pillar nor frames its publication as deterrence, and in
      form it is a defensive Technical Alert (detection and mitigation
      guidance) — at least as readable as an NCS-2016 'defend' act.
      Because more than one strategic reading survives, the link is
      plausible rather than strongly_inferred.
    attesting_source_id: cisa/2018-04-16_aa18-106a-russian-network-infrastructure
    inference_basis:
      alternatives:
        - "NCS-2016 'deter' pillar: a joint DHS / FBI / NCSC public attribution naming the Russian government functions as attribution-as-deterrence signalling — the modality that becomes the post-2018 NCSC + CISA + FBI cadence."
        - "NCS-2016 'defend' pillar: the document is in form a defensive Technical Alert (detection signatures, log-review and mitigation guidance for vendors / ISPs / operators), i.e. national network defence rather than deterrence signalling."
