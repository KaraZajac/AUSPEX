id: 2018-04/aa18-106a-russian-network-infrastructure
name: AA18-106A — first joint US-CERT + NCSC technical advisory on Russian network-infrastructure targeting
start_date: 2015-01-01  # campaign period covered by the advisory
disclosure_date: 2018-04-16
end_date: null
incident_type:
  - attribution-publication
  - intrusion
initial_vector: n-day
outcome_summary: |
  US-CERT (now CISA) and UK NCSC published a joint technical
  alert (then TA18-106A, now AA18-106A) attributing a sustained
  campaign to "Russian state-sponsored cyber actors" targeting
  enterprise routers, switches, and firewalls (Cisco Smart Install,
  SNMP, Telnet) at ISPs, critical-infrastructure operators, and
  government targets across the US, UK, and Europe. The advisory
  is the first NCSC + US-CERT co-published technical attribution
  and established the operating template for the post-2018
  NCSC + CISA + FBI joint AA cadence.
false_flag_risk: low
summary: |
  Doctrinally significant as the operational origin of the
  joint UK-US technical-attribution AA cadence. The advisory
  was published the same week as the UK government's Salisbury
  novichok attribution to GRU Unit 29155 (March-April 2018) and
  immediately precedes the watershed 4 October 2018 NCSC + FCO
  GRU calling-out. AUSPEX models it as a UK NCS-2016 "deter"
  pillar event from the UK side (attributing UK; targeted actor
  is Russian state-sponsored) and as the first instance of the
  multi-government technical-attribution mode that becomes the
  default modality through 2020-2025.

  The targeted-actor attribution is by behavioural and TTP
  overlap to the cluster broadly tracked as Dragonfly / Energetic
  Bear / Berserk Bear (FSB Center 16). AUSPEX records the FSB
  attribution as `concur-with-caveat` because the 2018 joint
  advisory itself did not name the cluster by codename — the
  cluster attribution is by subsequent industry consolidation
  (Symantec, CrowdStrike, Microsoft) rather than by the
  advisory's own naming.
