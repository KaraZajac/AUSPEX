id: 2018-04/aa18-106a-russian-network-infrastructure
name: AA18-106A — joint US-CERT + FBI + NCSC technical advisory on Russian network-infrastructure-device targeting
start_date: 2015-01-01  # advisory: "Since 2015, the U.S. Government received information ..."
disclosure_date: 2018-04-16
end_date: null
incident_type:
  - attribution-publication
  - intrusion
initial_vector: valid-creds  # advisory: "Legitimate user masquerade is the primary method ... able to easily obtain legitimate credentials"
outcome_summary: |
  On 16 April 2018 DHS (NCCIC / US-CERT), the FBI, and the UK
  NCSC published joint Technical Alert TA18-106A (re-issued as
  AA18-106A) on a worldwide campaign against network-
  infrastructure devices — enterprise and SOHO/residential
  routers, switches, and firewalls. The advisory states "The
  U.S. Government assesses that cyber actors supported by the
  Russian government carried out this worldwide campaign,"
  describing the use of Generic Routing Encapsulation (GRE),
  Cisco Smart Install (SMI, TCP/4786), SNMP (161/162), and
  Telnet (23) to scan and fingerprint devices, exfiltrate
  configuration files over TFTP, harvest credentials, and gain
  persistent access at ISPs, public- and private-sector
  organizations, and U.S. critical infrastructure. In form it
  is principally a defensive Technical Alert: detection
  signatures, log-review guidance, and mitigations for network-
  device vendors, ISPs, and operators.
false_flag_risk: none
summary: |
  AUSPEX records this as a doctrinally significant instance of
  joint UK-US public technical attribution: a Technical Alert
  co-authored by DHS / US-CERT, the FBI, and the UK NCSC that
  attributes a sustained network-infrastructure-targeting
  campaign to "Russian state-sponsored cyber actors" / "cyber
  actors supported by the Russian government." AUSPEX reads it
  from the UK side as a defender-response act consistent with
  the NCS-2016 'deter' pillar (public, multi-government
  attribution as signalling) — part of the joint-attribution
  modality that becomes routine in the post-2018 NCSC + CISA +
  FBI advisory cadence.

  Attribution is at NATION level only. The advisory names no
  specific cluster, intelligence service, or unit — it says
  "Russian state-sponsored cyber actors" and "the Russian
  government" throughout — so AUSPEX adopts no named cluster for
  it (actor_id null, following the Estonia-2007 and Georgia-2008
  nation-level Russia records). This advisory must not be
  conflated with the separate March 2018 energy-sector advisory
  TA18-074A, which is the one tied to the Dragonfly / Energetic
  Bear / Berserk Bear cluster and anchors the
  berserk-bear-us-energy-campaign event rather than this one.
