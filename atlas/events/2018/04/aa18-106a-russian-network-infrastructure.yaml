    notes: |
      The joint TA18-106A / AA18-106A states "The U.S. Government
      assesses that cyber actors supported by the Russian
      government carried out this worldwide campaign" and refers to
      "Russian state-sponsored cyber actors" throughout. The
      attribution is at NATION level: no codename, intelligence
      service, or unit is named anywhere in the advisory (raw-text
      scan: zero occurrences of Dragonfly / Energetic Bear / Berserk
      Bear / Crouching Yeti / FSB / Center 16 / GRU). attribution_level
      set to nation and actor_id to null accordingly — AUSPEX adopts
      no named cluster for this router campaign. Confidence moderate:
      a government assessment, not indictment-grade proof, calibration-
      consistent with the Georgia-2008 nation-level Russia record. The
      prior ru/fsb/center-16/berserk-bear (named-unit) attribution was
      an over-reach unsupported by the only cited source and conflated
      this April network-infrastructure advisory with the separate
      March 2018 energy-sector advisory TA18-074A.
