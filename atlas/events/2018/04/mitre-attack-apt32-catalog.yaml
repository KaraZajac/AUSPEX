qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-28
  level: full
  notes: |
    Documentary/reference event — MITRE ATT&CK's creation of the APT32 (G0050) group
    profile. Audited against the live G0050 page. Raw snapshot
    atlas/sources/raw/mitre-attack__g0050_apt32.html, sha256 3376746b…45b7f1e3
    (217,223 bytes) — re-verified against the committed hash AND a fresh curl of
    https://attack.mitre.org/groups/G0050/ (byte-identical, exit 0). NOT a phantom:
    title "APT32, SeaLotus, OceanLotus, APT-C-00, Canvas Cyclone, BISMUTH, Group G0050 |
    MITRE ATT&CK", full article body present.
    [a] FACTS — corrected three unsupported claims. (1) "Roland" removed from the
    associated-software list — absent from the page (0 hits); the page's Software section
    lists Cobalt Strike (S0154), WINDSHIELD (S0155), KOMPROGO (S0156), SOUNDBITE (S0157),
    PHOREAL (S0158), Denis (S0354), Goopy (S0477), Kerrdown (S0585) — all verified — plus
    OceanLotus macOS variants documented via technique citations. (2) "Bitdefender Mac
    disclosure (2020)" removed from summary — "Bitdefender" appears 0× on the page; the
    page's macOS sources are TrendMicro ("TrendMicro MacOS April 2018", retrieved Nov 13
    2018) and ESET (Dumont, OceanLotus macOS update, 2019). (3) "Facebook takedown (2020)"
    removed — the lone Facebook mention is a TTP ("APT32 has set up Facebook pages in
    tandem with fake websites"), not the Dec-2020 takedown; the page documents no takedown.
    Verified-and-kept citations: FireEye May 2017, Cybereason/Cobalt Kitty May 2017,
    Volexity Nov 2017, Amnesty Intl 24 Feb 2021.
    [b] ATTRIBUTION — over-attestation downgraded high → moderate. MITRE verbatim: "APT32
    is a suspected Vietnam-based threat group that has been active since at least 2014. The
    group has targeted multiple private sector industries as well as foreign governments,
    dissidents, and journalists with a strong focus on Southeast Asian countries like
    Vietnam, the Philippines, Laos, and Cambodia." "Suspected" is a nation-level hedge →
    moderate. auspex_assessment concur retained (Vietnam nexus well-sourced at named-actor
    level across the actor's 7 cited sources).
    [c] DATES — disclosure_date + attribution_date + source.published_on corrected
    2018-04-18 → 2017-12-14, the page's own "Created: 14 December 2017" metadata (Last
    Modified 17 April 2024). The only "April 2018" string on the page is a citation
    retrieval tag (TrendMicro), NOT a publication date — 2018-04-18 was unsupported.
    start_date 2014-01-01 kept ("active since at least 2014", page-verbatim). FLAG: the
    immutable slug/path (2018-04/…, events/2018/04/) now disagree with the true 2017-12-14
    date; slug left unchanged per stable-id rule — orchestrator's call whether to relocate.
    [d] DOCTRINE_LINKS — both links plausible (no attesting_source_id; correct — plausible
    requires none). Reasoning made page-faithful: link 1 (industrial-upgrading) softened to
    the page's "multiple private sector industries" wording; link 2 (resolution-29-nqtw/
    regime-stability-surveillance) anchored to the page's "foreign governments, dissidents,
    and journalists … Southeast Asia" summary. Neither states a strategic goal, so neither
    can rise above plausible on a doctrine-agnostic catalog page.
    [e] ATTRIBUTION_LEVEL — set to named-actor (was missing): MITRE names the group + the
    Vietnam nation, no service/unit.
    [f] ACTOR_ID — vn/unscoped/apt32 resolves (file atlas/actors/vn/apt32.yaml whose id is
    vn/unscoped/apt32 — FK is by id, not path). No actor-file edit.
    Source record: tier secondary retained (cross-vendor synthesis; defensible);
    raw_snapshot + content_sha256 already present and re-verified; added a 2026-06-28 AUDIT
    line and corrected published_on to 2017-12-14.
