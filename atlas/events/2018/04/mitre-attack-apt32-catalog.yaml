id: 2018-04/mitre-attack-apt32-catalog
name: MITRE ATT&CK publishes APT32 (G0050) group profile
start_date: 2014-01-01
disclosure_date: 2017-12-14  # page's own "Created" metadata; slug 2018-04 kept (stable-id rule)
end_date: null
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  MITRE ATT&CK created the APT32 (G0050) group profile on
  14 December 2017 (per the page's own "Created" metadata),
  synthesizing vendor reporting from FireEye (May 2017),
  Cybereason (Cobalt Kitty, May 2017), Volexity (watering-hole
  research, November 2017), TrendMicro (macOS, April 2018), and
  ESET (OceanLotus macOS update, 2019) into a canonical TTP
  catalog. The page's associated-software list includes Cobalt
  Strike, KerrDown, WINDSHIELD, KOMPROGO, SOUNDBITE, PHOREAL,
  Denis, Goopy, and the OceanLotus macOS variants, and maps
  observed techniques across initial-access, execution,
  persistence, and defense-evasion tactics. The MITRE catalog
  is the canonical cross-vendor synthesis for APT32 tooling and
  tradecraft.
false_flag_risk: none
summary: |
  Documentary marker for the maturation of public OSINT on
  APT32. The MITRE ATT&CK G0050 page became a
  reference-of-first-resort for analysts working APT32
  intrusions and a bibliographic spine for subsequent
  third-party reporting. The catalog page has been version-
  updated repeatedly since its December 2017 creation (last
  modified April 2024), incorporating later research it cites
  including ESET's OceanLotus macOS analysis (2019) and Amnesty
  International's diaspora-targeting investigation (February
  2021).
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: MITRE ATT&CK
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2017-12-14
    attribution_source_id: mitre-attack/g0050_apt32
    notes: |
      MITRE's own wording attributes APT32 only at the nation
      level and hedges: "APT32 is a suspected Vietnam-based
      threat group that has been active since at least 2014" —
      no Vietnamese service/unit is named (hence named-actor,
      not named-unit; the actor is vn/unscoped). MITRE inherits
      this attribution from the vendor corpus it catalogs
      (FireEye 2017 first; Cybereason, Volexity, ESET
      subsequently); the entry is a cross-vendor synthesis
      rather than primary attribution. "Suspected" supports
      moderate (not high) attributing-org confidence.
