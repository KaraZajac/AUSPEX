id: 2018-04/mitre-attack-apt32-catalog
name: MITRE ATT&CK publishes APT32 (G0050) group profile
start_date: 2014-01-01
disclosure_date: 2018-04-18
end_date: null
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  MITRE ATT&CK created the APT32 (G0050) group profile on
  18 April 2018, consolidating vendor reporting from FireEye
  (May 2017), Cybereason (Cobalt Kitty, May 2017), Volexity
  (ASEAN watering hole, November 2017), and ESET (March 2018
  backdoor refresh) into a canonical TTP catalog. The page
  lists associated software (Cobalt Strike, KerrDown,
  WINDSHIELD, KOMPROGO, SOUNDBITE, PHOREAL, DENIS, OceanLotus
  Mac variants, Goopy, Roland) and maps observed techniques
  across initial-access, execution, persistence, and
  defense-evasion tactics. The MITRE catalog is the canonical
  cross-vendor synthesis for APT32 tooling and tradecraft.
false_flag_risk: none
summary: |
  Documentary marker for the maturation of public OSINT on
  APT32. The MITRE ATT&CK G0050 page became the
  reference-of-first-resort for analysts working APT32
  intrusions and is the bibliographic spine of subsequent
  third-party reporting. The catalog page has been version-
  updated multiple times since 2018 to incorporate the
  Bitdefender Mac disclosure (2020), the Facebook takedown
  (2020), the Amnesty diaspora-targeting research (2021), and
  later ESET retrospectives.
