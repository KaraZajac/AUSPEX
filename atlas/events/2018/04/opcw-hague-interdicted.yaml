id: 2018-04/opcw-hague-interdicted
name: OPCW Hague close-access operation (interdicted)
start_date: 2018-04-10  # MIVD deck slide 2: "Arrival from Moscow at Amsterdam Schiphol Airport"
disclosure_date: 2018-10-04
end_date: 2018-04-13  # MIVD: interdicted / escorted out on 13 Apr 2018
incident_type:
  - espionage  # thwarted close-access Wi-Fi collection; interdicted before any OPCW network intrusion
initial_vector: physical  # close-access Wi-Fi proximity (car-boot antenna adjacent to the OPCW)
outcome_summary: |
  Four GRU officers — two of them (Morenets, Serebriakov) named by
  the US DOJ as Military Unit 26165, the other two (Sotnikov, Minin)
  named only as GRU officers — travelled to The Hague on diplomatic
  passports to mount a close-access Wi-Fi compromise of the
  Organisation for the Prohibition of Chemical Weapons (OPCW), whose
  accredited labs were analysing the chemical agent UK authorities
  connected to the Salisbury poisoning of a former GRU officer
  (Novichok / the Skripal case). The Dutch MIVD, with AIVD and UK
  support, interdicted them on 13 April 2018 with the attack
  equipment operational; the four were escorted out of the country
  and their identities exposed. No OPCW network intrusion was
  achieved.
false_flag_risk: none
operators_named:
  - morenets-aleksei  # GRU Unit 26165; Hague close-access team — DOJ/MIVD Oct 2018
  - serebriakov-evgenii  # GRU Unit 26165; Hague close-access team — DOJ/MIVD Oct 2018
  - sotnikov-oleg  # GRU officer (DOJ names unit only as "GRU"); Hague close-access team — DOJ/MIVD Oct 2018
  - minin-alexey  # GRU officer (DOJ names unit only as "GRU"); Hague close-access team — DOJ/MIVD Oct 2018
summary: |
  On 13 April 2018 the Netherlands Defence Intelligence and Security
  Service (MIVD), with support from the AIVD and UK counterparts,
  disrupted a GRU close-access operation against the OPCW in The
  Hague; it was made public on 4 October 2018 in a coordinated
  release with the US DOJ Morenets indictment and a UK NCSC/FCO
  calling-out. The four Russian intelligence officers — Morenets,
  Serebriakov, Sotnikov and Minin — had arrived from Moscow at
  Schiphol on 10 April on diplomatic passports and hired a car,
  which they parked in the lot of the Marriott Hotel adjacent to the
  OPCW offices. Wi-Fi attack equipment was set up in the car's boot,
  with the antenna hidden under a jacket on the rear shelf, and was
  operational when the MIVD intervened. Per the DOJ indictment the
  team intended to travel onward to the Spiez Swiss Chemical
  Laboratory — an OPCW-accredited lab analysing the chemical agent
  UK authorities connected to the poisoning of a former GRU officer;
  data recovered from the seized equipment showed its prior
  operational use at the Lausanne hotel of a CCES anti-doping
  official and at a Kuala Lumpur hotel in December 2017. The MIVD
  further disclosed that one of the four officers had also been
  active in Malaysia targeting the MH17 crash investigation. The four
  were escorted out of the Netherlands (not arrested — they held
  diplomatic passports) and the Russian ambassador was summoned.
