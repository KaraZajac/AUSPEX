id: 2018-04/opcw-hague-interdicted
name: OPCW Hague close-access operation (interdicted)
start_date: 2018-04-10
disclosure_date: 2018-10-04
end_date: 2018-04-13
incident_type:
  - intrusion
initial_vector: physical
outcome_summary: |
  Four GRU Unit 26165 officers travelled to The Hague to conduct
  an on-site Wi-Fi compromise of the Organisation for the
  Prohibition of Chemical Weapons (OPCW), which was investigating
  the Skripal Novichok poisoning and Syrian chemical-weapons
  cases. Interdicted by Dutch AIVD/MIVD; equipment seized;
  identities exposed.
false_flag_risk: none
operators_named:
  - morenets-aleksei  # GRU Unit 26165, DOJ Oct 2018 / Dutch MIVD interdicted
  - serebriakov-evgenii  # GRU Unit 26165, DOJ Oct 2018 / Dutch MIVD interdicted
  - sotnikov-oleg  # GRU Unit 26165, DOJ Oct 2018 / Dutch MIVD interdicted
  - minin-alexey  # GRU Unit 26165, DOJ Oct 2018 / Dutch MIVD interdicted
  - yermakov-ivan  # GRU Unit 26165, DOJ Oct 2018 (US-side)
  - malyshev-artem  # GRU Unit 26165, DOJ Oct 2018 (US-side)
  - badin-dmitriy  # GRU Unit 26165, DOJ Oct 2018 (US-side)
summary: |
  Dutch MIVD October 2018 press conference publicly disclosed the
  interdiction in coordinated release with the DOJ October 2018
  Morenets indictment. The four GRU Unit 26165 officers travelled
  to The Hague with diplomatic passports and a hire car loaded
  with the GRU's standard close-access Wi-Fi attack kit — a hidden
  Pineapple-style Wi-Fi tap, directional antennas, and a laptop
  preloaded with credential-harvesting and X-Agent (CHOPSTICK)
  installer tooling — intended to capture OPCW staff credentials
  from the conference hotel and parking-lot adjacent to the OPCW
  building. The Dutch AIVD/MIVD interdicted them mid-operation,
  recovered the equipment and the team's prior travel artifacts
  (including images linking the cell to a parallel attempted
  intrusion of the Spiez chemical-weapons laboratory in
  Switzerland), and PNG'd their identities back to GRU Moscow.
