    reasoning: |
      The OPCW Hague operation was close-access espionage — an
      attempted network collection against an international body
      investigating Russia's use of chemical weapons — interdicted
      before any collection. Unlike the sibling anti-doping
      hack-and-leak (2016-08/wada-iaaf-campaign, which is
      info-psychological-defense/attested), the cited sources state
      no publicise or influence terminal goal for the OPCW op, so the
      doctrinal linkage is inferred, not attested. Target selection
      (the OPCW/Spiez Skripal-agent inquiry, plus one officer's
      parallel targeting of the MH17 investigation) fits the 2016
      doctrine's framing of the information sphere as a
      national-security domain in which Russia wages continuous
      "information confrontation" against foreign accountability and
      attribution mechanisms — the information-sphere-as-domain
      pillar, consistent with how this GRU Unit 26165 activity
      cluster's collection operations are modelled elsewhere in the
      atlas. Downgraded from the prior "attested /
      info-psychological-defense" stamp, which describes the WADA
      leak op, not this interdicted espionage op.
