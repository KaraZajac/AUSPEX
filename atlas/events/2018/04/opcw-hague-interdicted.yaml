    [a] FACTS — every load-bearing claim now carried by a snapshotted
    source. Interdiction verified (MIVD: "On 13 April 2018 ... the
    Netherlands Defence Intelligence and Security Service (DISS)
    disrupted a cyber operation being carried out by a Russian
    military intelligence (GRU) team ... targeted the [OPCW] in The
