outcome_summary: |
  Unnamed Texas-based energy company compromised by APT31 / MSS
  Hubei SSD via Wuhan XRZ. Specific intrusion cited in the March
  2024 DOJ indictment and the OFAC SDN press release as evidence
  of PRC critical-infrastructure targeting predating the Volt
  Typhoon era.
false_flag_risk: none
operators_named:
  - zhao-guangzong  # APT31 / Wuhan XRZ, DOJ + OFAC Mar 2024
  - ni-gaobin  # APT31 / Wuhan XRZ, DOJ + OFAC Mar 2024
summary: |
  Disclosed publicly only via the March 2024 DOJ indictment and
  Treasury press release. The indictment describes APT31 / Wuhan
  XRZ tradecraft: spear-phishing of US energy-company employees
  with tracking-pixel "reconnaissance" emails (used to enumerate
  IP addresses and device fingerprints prior to the exploitation
  email), follow-on weaponized links that downloaded the RAWDOOR
  remote-access trojan and Trochilus / 9002 RAT variants from the
  broader Hurricane Panda / ZIRCONIUM toolset, the use of Cobalt
  Strike beacons, credential dumping with Mimikatz, web shells on
  internet-facing servers, and lateral movement on valid
  credentials. Significance: documents that APT31 conducted CII-
  energy collection well before the post-2021 pre-positioning
  wave, establishing continuity of intent.
