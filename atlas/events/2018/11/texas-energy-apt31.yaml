id: 2018-11/texas-energy-apt31
name: Texas energy-company compromise (APT31)
start_date: 2018-01-01  # year-granularity: Treasury says only "In 2018"; month unknown (path "/11/" is unsourced)
disclosure_date: 2024-03-25  # DOJ indictment + OFAC/Treasury sanctions
end_date: 2018-12-31  # year-bracket only; no explicit end/duration stated in sources
incident_type:
  - intrusion  # Treasury states only "gaining unauthorized access"; data-theft from THIS victim not separately stated (removed 2026-07-10)
initial_vector: unknown  # vector for the energy compromise is not stated in either source (was: phishing — unsupported)
outcome_summary: |
  Unnamed Texas-based energy company accessed by APT31 / MSS Hubei
  State Security Department via its Wuhan XRZ front company. Per the
  25 March 2024 OFAC/Treasury release (jy2205): "In 2018, employees
  of Wuhan XRZ conducted an APT 31 malicious cyber operation on a
  Texas-based energy company, gaining unauthorized access." The
  companion DOJ indictment (24-CR-43) corroborates the victim —
  "an energy company based in Texas" in its enumerated APT31 victim
  list (undated, grouped under manufacturing/trade). Both frame it
  as PRC critical-infrastructure / energy-sector targeting; neither
  source states the intrusion vector, tooling, or what (if anything)
  was exfiltrated.
false_flag_risk: none
operators_named: []  # Sources attribute this op to unnamed "employees of Wuhan XRZ" (Treasury jy2205); no individual is named for the energy compromise. OFAC-sanctioned officers Zhao Guangzong & Ni Gaobin appear in the companion action but are not tied to THIS victim — the full 7-defendant roster lives on 2024-03/apt31-wuhan-xrz-indictment.
summary: |
  Disclosed publicly via the coordinated 25 March 2024 DOJ
  indictment and OFAC/Treasury sanctions action against Wuhan XRZ.
  The load-bearing, dated claim is Treasury's: APT31 / Wuhan XRZ
  gained "unauthorized access" to a Texas-based energy company in
  2018. Treasury groups it with a California managed-service
  provider as part of APT31's targeting of "America's most vital
  critical infrastructure sectors, including the Defense Industrial
  Base, information technology, and energy sectors." The DOJ
  indictment corroborates the victim (an unnamed Texas energy
  company in its enumerated victim list) but attaches no date and
  no victim-specific tradecraft.
  CAUTION (audit 2026-07-10): the sources describe only
  "unauthorized access" — no intrusion vector, malware, or
  exfiltration is attributed to this energy compromise in either
  source. Prior prose asserting spear-phishing / tracking-pixel
  reconnaissance / RAWDOOR / Trochilus / 9002 RAT / Cobalt Strike /
  Mimikatz / web shells / lateral movement against this victim was
  UNSUPPORTED and has been stripped: those are general APT31 TTPs
  the indictment ties to *other* victims (RAWDOOR -> a 5G telecom +
  aerospace/DoD-support firms, 2015-17; Trochilus -> the "American
  Steel Company", Mar-May 2018; the "Welcome to Chrome" web shell ->
  a Long Island defense contractor, 2016; the 10,000+ tracking-link
  emails -> US government officials/politicians, Jun-Sep 2018), and
  "9002 RAT", "Hurricane Panda" and "Mimikatz" appear nowhere in
  either source.
attributions:
  - actor_id: cn/mss/apt31
    attributing_org: US Treasury OFAC + US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2024-03-25
    attribution_source_id: treasury/2024-03-25_apt31-wuhan-xrz
    notes: |
      Treasury (jy2205) makes the specific dated claim: "In 2018,
      employees of Wuhan XRZ conducted an APT 31 malicious cyber
      operation on a Texas-based energy company, gaining unauthorized
      access." The DOJ indictment (24-CR-43) corroborates by listing
      "an energy company based in Texas" among APT31's US victims.
      named-unit: both sources name the Hubei State Security
      Department and its Wuhan XRZ front company (MSS-parented).
      Sources are unhedged declarative attributions -> concur / high.
doctrine_links:
  - doctrine_id: cn/mic2025
    pillar_id: cn/mic2025/power-equipment
    program_id: null
    confidence: plausible
    perspective: attacker-rationale
    reasoning: |
      Sector overlap only: the victim is an energy company and the
      MIC2025 power-equipment pillar targets energy/electric-power
      and nuclear. But both sources frame the intrusion as
      critical-infrastructure access/collection, not theft of
      power-equipment industrial IP, and neither names MIC2025 or the
      power-equipment pillar. "Texas energy" more plausibly denotes
      oil & gas than electric-power manufacturing, and no
      exfiltration is described — so an industrial-policy purpose is
      unproven. Downgraded strongly_inferred -> plausible (audit
      2026-07-10) to remove the internal contradiction whereby the
      pillar was asserted while the inference_basis ruled it out.
    attesting_source_id: null
    inference_basis:
      source_id: treasury/2024-03-25_apt31-wuhan-xrz
      signals:
        - "Treasury lists the Texas energy company under APT31's targeting of 'America's most vital critical infrastructure sectors, including ... energy sectors' — victim sector overlaps the power-equipment pillar"
      ruled_out: "MIC2025 / power-equipment industrial-policy purpose — neither source names MIC2025 or the pillar; only 'unauthorized access' is stated (no power-equipment IP theft), and 'Texas energy' more likely denotes oil & gas than electric-power manufacturing. Retained at plausible on sector overlap alone."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/intelligentized-warfare
    pillar_id: cn/intelligentized-warfare/pre-positioning
    program_id: null
    confidence: plausible
    perspective: attacker-rationale
    reasoning: |
      Treasury frames the compromise as PRC critical-infrastructure
      targeting (energy sector), which is the pre-positioning
      pillar's domain. But the pillar specifically means holding
      access for future disruption in a Taiwan/peer-conflict
      contingency, and the sources evidence only espionage-style
      "unauthorized access" (the DOJ places the victim among
      economic-espionage targets). Characterizing a 2018 access as a
      "pre-positioning precursor" also imports the post-2021
      Volt-Typhoon frame, which neither source uses (no "Volt" in
      either) — so this is a hedged inference, not an attested goal.
    attesting_source_id: null
    inference_basis:
      source_id: treasury/2024-03-25_apt31-wuhan-xrz
      signals:
        - "Treasury: APT31 targeted 'America's most vital critical infrastructure sectors, including ... energy sectors'; a Texas energy company was accessed in 2018 — CII-access consistent with the pre-positioning pillar's domain"
      ruled_out: "Disruptive pre-positioning intent (Taiwan/peer-conflict OT hold) — not evidenced; sources show only espionage-style access and the DOJ groups the victim with economic-espionage targets. 'Pre-positioning' is a post-2021 Volt-Typhoon construct absent from both sources; applied to a 2018 espionage access it is retrospective. Retained at plausible."
    counter_explanation: null
    contested: false
    analyst: claude
