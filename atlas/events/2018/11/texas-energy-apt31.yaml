  notes: |
    Full 6-point audit vs RAW snapshots (both cited sources
    snapshotted + sha256-verified before use). This is a REAL event
    (badrabbit-path NOT taken): the core claim is carried by a
    primary source, but the event carried heavy AI-embellishment that
    has been stripped.
    Snapshots verified:
      - doj/2024-03-25_apt31-indictment -> raw/doj__2024-03-25_apt31-indictment.pdf
        sha256 bdc75e3bff39587863f0297b1a08011d80a10197700753a3048947fce2d0c64d (EDNY 24-CR-43, 27pp)
      - treasury/2024-03-25_apt31-wuhan-xrz -> raw/treasury__2024-03-25_apt31-wuhan-xrz.html
        sha256 55a993390c3165c3bd9f4b0bbeb9c29ac4a2f7620824e838cdc0667d7fe38aba (OFAC jy2205)
    [a] FACTS: The load-bearing dated claim IS sourced — Treasury:
    "In 2018, employees of Wuhan XRZ conducted an APT 31 malicious
    cyber operation on a Texas-based energy company, gaining
    unauthorized access." and "APT 31 actors gained unauthorized
    access to a Texas-based energy company, as well as a
    California-based managed service provider." DOJ corroborates the
    victim: "...an engineering company based in California; and an
    energy company based in Texas;" (para 25, undated victim list,
    scope "Between at least 2010 and November 2023"). STRIPPED as
    unsupported for this victim: the entire tradecraft narrative
    (spear-phishing of energy-company employees, tracking-pixel
    "reconnaissance" emails, RAWDOOR, Trochilus, Cobalt Strike, web
    shells, lateral movement) — neither source attaches ANY vector or
    tooling to the energy compromise (both say only "unauthorized
    access"). Those TTPs exist in the indictment but are tied to
    OTHER victims (RAWDOOR 2015-17 -> a 5G telecom + Alabama
    aerospace + Maryland DoD-support firm; Trochilus Mar-May 2018 ->
    the "American Steel Company"; "Welcome to Chrome" web shell 2016
    -> the Long Island defense contractor; 10,000+ tracking-link
    emails Jun-Sep 2018 -> US govt officials/politicians). FABRICATED
    (0 hits in either source): "9002 RAT", "Hurricane Panda" toolset,
    "Mimikatz". initial_vector phishing -> unknown. incident_type
    data-theft removed (only "access" confirmed for this victim).
    "predating the Volt Typhoon era" removed ("Volt" = 0 hits in
    both sources; analyst overlay).
    [b] ATTRIBUTION: cn/mss/apt31 CONCUR/high SUPPORTED. Both sources
    name APT31 = Wuhan XRZ = Hubei SSD (MSS-parented). attribution_
    source_id moved doj -> treasury (Treasury is the source that
    makes the specific, dated attribution of THIS operation; DOJ only
    lists the victim). Sources unhedged -> no downgrade warranted.
    [c] DATES: start 2018 now SOURCED to Treasury "In 2018"
    (year-granular; month unknown — the "/11/" path segment is
    unsourced, flagged, id left unchanged). disclosure 2024-03-25
    correct (indictment + OFAC same day). end 2018-12-31 is a
    year-bracket only (no duration in sources). Both source
    published_on = 2024-03-25 verified against release datelines.
    [d] DOCTRINE_LINKS: cn/mic2025/power-equipment downgraded
    strongly_inferred -> plausible (sector overlap only; industrial-
    policy purpose not evidenced; the pillar had been asserted while
    its own ruled_out negated it). cn/intelligentized-warfare/
    pre-positioning kept plausible but given the required
    inference_basis it lacked, with an explicit anachronism flag
    (pre-positioning is a post-2021 frame). Both perspective:
    attacker-rationale (CN doctrine on a CN op). Neither reaches
    attested — no source states a doctrinal terminal goal.
    [e] ATTRIBUTION_LEVEL: added named-unit (Hubei SSD / Wuhan XRZ
    named as the operating unit/front; MSS named as parent).
    [f] ACTOR_ID: cn/mss/apt31 resolves to atlas/actors/cn/apt31.yaml
    (id: cn/mss/apt31). Not a counter-action -> actor_id retained.
