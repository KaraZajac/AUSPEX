id: 2018-11/sea-turtle-iraqi-kurdistan-targeting
name: Sea Turtle / MARBLED DUST targeting of Iraqi Kurdistan (KRG) ministries and telecom
start_date: 2018-01-01
disclosure_date: 2019-07-09
end_date: 2019-03-01
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos's July 2019 follow-on disclosure documented Sea
  Turtle continuing operations through early 2019 against
  Kurdistan Regional Government (KRG) ministries, KRG-region
  telecom operators, and adjacent intelligence-service targets
  in northern Iraq. The cluster used the same DNS-hijacking
  tradecraft as the Cyprus operations to compromise KRG
  government and telecom infrastructure, supporting credential
  capture and follow-on access for collection on Kurdish
  political-military activity.
false_flag_risk: none
summary: |
  Centerpiece Sea Turtle operation in the counter-Kurdish-
  surveillance doctrinal pillar. The KRG victim set sits at
  the intersection of Turkish state interests on PKK presence,
  Iraqi Kurdistan independence/referendum politics (the 2017
  KRG independence referendum cast a long shadow), and Turkish
  trans-border military operations against PKK positions. The
  KRG-region telecom operator targeting extends collection
  reach into Kurdish civilian communications.
