id: 2018-11/sea-turtle-iraqi-kurdistan-targeting
name: Sea Turtle DNS-hijacking targeting of Iraq (government / foreign-ministry victim set)
start_date: 2018-09-01
disclosure_date: 2019-04-17
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos's April 17, 2019 Sea Turtle disclosure lists Iraq
  among the campaign's "Country of targets." Talos's IP/relay table
  records actor-controlled infrastructure used against Iraqi targets
  in September, October and November 2018 (nodes 212.32.235.160,
  198.211.120.186 and 146.185.143.158 in September 2018; 82.196.8.43
  in October 2018; 199.247.3.191 against Albania and Iraq in
  November 2018). Talos characterizes the campaign's PRIMARY victims
  campaign-wide as "national security organizations, ministries of
  foreign affairs, and prominent energy organizations" (its
  compromised-org list also names military organizations and
  intelligence agencies), compromised through DNS-record manipulation
  at the registrar / ccTLD level to redirect traffic for credential
  capture. Talos does NOT name any individual Iraqi organization,
  does not map its victim set to specific countries, and does not use
  the words "Kurdistan", "KRG" or "Kurdish" anywhere in the report.
false_flag_risk: none
summary: |
  Country-specific Iraq entry in the 2017-2019 Sea Turtle
  DNS-hijacking campaign, parallel to the Cyprus and Armenia country
  events and distinct from the broader-MENA rollup. Iraq is one of the
  ~13 countries-of-targets Talos documents; the campaign's stated
  primary-victim profile (national-security organizations, foreign
  ministries, energy) is government-heavy. Within AUSPEX the actor is
  tracked as a Turkey-aligned espionage cluster (tr/unscoped/sea-turtle);
  that Turkey nexus rests on LATER reporting (Reuters 2020, which named
  an Iraqi-government national security adviser among victims; Hunt &
  Hackett 2024), NOT on the Talos 2019 source, which attributes the
  campaign only to "an advanced, state-sponsored actor" and names no
  nation. Turkey's dominant strategic interest in Iraq is the PKK /
  Kurdish question and cross-border counter-PKK operations in northern
  Iraq, so a counter-Kurdish-collection reading is plausible, but Talos
  states no purpose and names no Iraqi organization, so a general
  Turkey-Iraq bilateral-collection reading survives alongside it.
attributions:
  - actor_id: tr/unscoped/sea-turtle
    attributing_org: Cisco Talos
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2019-04-17
    attribution_source_id: talos/2019-04-17_sea-turtle-dns-hijacking
    notes: |
      Talos (2019-04-17) assesses "with high confidence that this
      activity is being carried out by an advanced, state-sponsored
      actor" and names NO nation as the perpetrator — "Turkey" appears
      in the report only as one entry in the victim "Country of targets"
      IP table (alongside Sweden, Syria, Armenia, US), not as the
      sponsor. Hence attribution_level activity-cluster (Talos's named
      "Sea Turtle" cluster; state-sponsored; nation un-named at this
      source). The Turkey nexus carried by actor_id tr/unscoped/sea-turtle
      rests on later reporting cited in the actor record (Reuters 2020;
      Hunt & Hackett 2024), not on this 2019 Talos source; no cited
      source names a specific Turkish service, so the actor remains
      tr/unscoped.
doctrine_links:
  - doctrine_id: tr/counter-gulen-kurdish-surveillance
    pillar_id: tr/counter-gulen-kurdish-surveillance/kurdish-diaspora
    program_id: null
    confidence: plausible
    reasoning: |
      Sea Turtle is assessed within AUSPEX as a Turkey-aligned espionage
      actor (per the actor record's later sources; Talos 2019 itself
      names only "an advanced, state-sponsored actor" and no nation).
      Turkey's overriding strategic interest in Iraq is the PKK / Kurdish
      question and cross-border counter-PKK operations in northern Iraq,
      so a Turkey-aligned actor collecting on Iraqi government targets
      plausibly serves counter-Kurdish collection — the pillar this link
      encodes. The label is plausible rather than higher because Talos
      states no purpose for the Iraqi targeting, names no nation, names no
      Iraqi organization, and never mentions Kurdistan or the KRG; the one
      later-named Iraqi victim (Reuters 2020) is the FEDERAL government's
      national security adviser, which reads at least as much as general
      Turkey-Iraq bilateral security collection as specifically
      counter-Kurdish. More than one strategic reading therefore survives.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Counter-Kurdish surveillance: Turkey's dominant Iraq-interest is the PKK presence in northern Iraq and cross-border counter-PKK operations, so Turkey-aligned collection on Iraqi government targets plausibly serves counter-Kurdish requirements."
        - "General Turkey-Iraq bilateral collection: Talos names no Iraqi organization and states no purpose; the later-named Iraqi victim is the federal national security adviser, so broad state-to-state security and diplomatic collection (not specifically Kurdish-targeted) survives as a reading."
    counter_explanation: |
      The original event asserted specific KRG (Kurdistan Regional
      Government) ministry and KRG-region telecom victims; no cited source
      supports that specificity for the 2018-2019 campaign — Talos names
      Iraq only at the country level and never says Kurdistan/KRG. The
      Kurdish-diaspora pillar is retained at plausible on the actor's
      Turkey-alignment plus Turkey's PKK-in-Iraq interest, not on any
      sourced Kurdish-victim naming.
targets:
  - target_id: sectors/government
    country: iq
    role: primary
sources:
  - talos/2019-04-17_sea-turtle-dns-hijacking
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-30
  level: full
  notes: |
    Phantom-remediation triage -> WRONG-SOURCE + FABRICATED-SPECIFICITY, corrected in place with
    a source repoint (not retired: the corpus deliberately keeps this as the country-specific Iraq
    sibling of the Cyprus/Armenia events — the 2018-06/sea-turtle-uae-saudi-lebanon-government
    rollup's own summary names "the country-specific Cyprus, Iraqi-Kurdistan, and Armenia events"
    as distinct). NOT a phantom URL: the originally-cited source
    talos/2019-07-09_sea-turtle-state-sponsored-keeps-going resolves to the REAL July 2019 Talos
    article and its on-disk raw is hash re-verified (sha256 b4711f9b...ad28c1d, 121,569 bytes,
    matches the source record) — but it is the WRONG source for this event: the July follow-on
    documents NEW victims (ICS-Forth / the .gr Greek ccTLD registry; three .gr Greek government
    entities via rootdnservers[.]com; an organization in Syria) and contains NO mention of Iraq,
    Kurdistan, the KRG, telecom, or any nation-as-sponsor (raw grep: "iraq"=0, "kurd"=0, "KRG"=0,
    "turk"=0; the July article is already the canonical source of the separate
    2019-07/talos-sea-turtle-keeps-going event, so removing it here does not orphan it).

    SOURCE REPOINT: sources[] and attribution_source_id moved to
    talos/2019-04-17_sea-turtle-dns-hijacking — the foundational Talos report that ACTUALLY
    documents the Iraq targeting. Its raw is on disk and hash re-verified this pass: sha256
    eae3a904...b060af0f, 199,058 bytes (matches the source record; no source-record edit needed).
    Iraq appears in that report only in the "Country of targets" IP/relay table, five times, dated
    Sept 2018 (212.32.235.160, 198.211.120.186, 146.185.143.158), Oct 2018 (82.196.8.43) and Nov
    2018 (199.247.3.191, shared with Albania). "Kurd"/"Kurdistan"/"KRG" = 0 occurrences in the
    April raw as well.

    [a] FACTS — the original outcome_summary/summary were FABRICATED over-specifications: "KRG
    ministries", "KRG-region telecom operators", "adjacent intelligence-service targets in northern
    Iraq", "credential capture and follow-on access for collection on Kurdish political-military
    activity", "extends collection reach into Kurdish civilian communications" — NONE of this is
    carried by any cited source. Talos documents Iraq only as a country-of-targets and characterizes
    the campaign PRIMARY victims campaign-wide as "national security organizations, ministries of
    foreign affairs, and prominent energy organizations" (compromised-org list adds military
    organizations and intelligence agencies), with SECONDARY victims "numerous DNS registrars,
    telecommunication companies, and internet service providers" — but maps NO victim to Iraq
    specifically and names NO Iraqi organization. The one org-level Iraqi victim ever reported is
    Reuters' (Jan 2020) "Iraqi government's national security adviser" — the FEDERAL government, not
    the KRG. Rewrote name/outcome_summary/summary to the Talos-carried minimum (Iraq = country-of-
    targets; government-heavy campaign primary-victim profile; DNS-registrar/ccTLD hijack mechanism;
    no Iraqi org named; no Kurdistan/KRG). Removed the Kurdish-civilian-communications and northern-
    Iraq-intelligence-service embellishments.

    [b] ATTRIBUTION — over-attribution fixed. Repointed to the April 2019 source and set
    attribution_level=activity-cluster (was MISSING). Talos names NO nation ("advanced,
    state-sponsored actor"); "Turkey" appears only in the victim country-of-targets table. Kept
    attributing_org_confidence=high (Talos's confidence in the state-sponsored assessment) and
    auspex_assessment=concur. Added the standard attribution note (Turkey nexus rests on later
    reporting — Reuters 2020, Hunt & Hackett 2024 — cited in the actor record, not on Talos 2019;
    no cited source names a Turkish service; actor correctly tr/unscoped, demoted from tr/mit
    2026-06-25). attribution_date moved 2019-07-09 -> 2019-04-17 to match the repointed source.

    [c] DATES — disclosure_date 2019-07-09 -> 2019-04-17 (the report that actually discloses the
    Iraq targeting; source published_on matches). start_date 2018-01-01 -> 2018-09-01 (earliest
    Iraq-linked relay indicator in the Talos table; the immutable id-slug month "2018-11" matches
    the Nov 2018 Iraq node and is left as-is per stable-slug rule). end_date 2019-03-01 -> null
    (Talos does not bound the Iraq operation's end; Iraq-specific indicators run Sept-Nov 2018, the
    overall campaign "through the first quarter of 2019").

    [d] DOCTRINE_LINKS — downgraded tr/counter-gulen-kurdish-surveillance/kurdish-diaspora from
    strongly_inferred -> plausible. NOT attested (correct: attesting_source_id null; Talos states no
    purpose). strongly_inferred overstated it: Talos states no purpose, names no nation, names no
    Iraqi org, and never mentions Kurdistan/KRG, so a second reading (general Turkey-Iraq bilateral
    security/diplomatic collection — supported by the only later-named victim being the FEDERAL
    national security adviser) survives alongside the counter-Kurdish reading. Rewrote reasoning to
    honest plausible framing; added inference_basis.alternatives (two competing readings, quoted per
    the colon-space rule) and a counter_explanation recording that the KRG-victim specificity was
    fabricated. Pillar/doctrine FKs resolve (actor default-aligned; also used by
    2024-03/microsoft-marbled-dust-iraqi-telecom).

    [e] ATTRIBUTION_LEVEL — set to activity-cluster (see [b]); was absent.

    [f] ACTOR_ID — tr/unscoped/sea-turtle resolves (file atlas/actors/tr/sea-turtle.yaml, internal
    id tr/unscoped/sea-turtle; audited + demoted from tr/mit 2026-06-25). No actor edit made.

    TARGETS — REPLACED the two fabricated + DANGLING org targets (orgs/krg-ministries and
    orgs/krg-region-telecom have NO registry file AND assert KRG victims no source supports) with a
    single honest country-level target: sectors/government, country iq, role primary — reflecting
    Iraq as a confirmed Talos country-of-targets against the campaign's government-heavy primary-
    victim profile. Dropped the telecom target: Talos lists telecom only as a global secondary-victim
    CATEGORY and ties none to Iraq; the Iraqi-telecom Sea Turtle targeting is the separate 2024 event
    2024-03/microsoft-marbled-dust-iraqi-telecom (2023 activity).

    Residual uncertainties / FLAGS for orchestrator:
      (1) Sibling-event consistency: 2019-04/talos-sea-turtle-dns-hijacking's outcome_summary lists
          "Iraq, Iraqi Kurdistan" in its 13-country set and its summary calls the pattern
          "Greek-Cypriot-Iraqi-Kurdish" and claims Talos "named actors aligned with the Turkish
          government" — the "Iraqi Kurdistan" naming and the Turkish-government attribution are
          BOTH unsupported by the Talos April raw (no "Kurd" anywhere; only "advanced, state-
          sponsored actor"). FLAG that event for the same over-attribution/over-specification fix.
      (2) Talos names no Iraqi organization; the sectors/government (iq) target is a country-level
          rollup of the campaign primary-victim profile, not a Talos per-country statement. The one
          org-level Iraqi victim on record (Reuters 2020, federal national security adviser) was not
          added as a source this pass (kept Talos-only, mirroring the Cyprus/Armenia/UAE sibling
          audits); if org-level Iraqi specificity is wanted, a Reuters 2020 source record should be
          created and the target/summary refined to the federal government.
