  - ghorbaniyan-mohammad  # OFAC SDN crypto facilitator, Nov 2018
summary: |
  Companion DOJ / OFAC counter-action of November 28, 2018.
  A federal grand jury in Newark, NJ returned a six-count
  indictment charging Faramarz Shahi Savandi and Mohammad Mehdi
  Shah Mansouri, both of Iran and acting from inside Iran, over
  the SamSam ransomware scheme — a 34-month campaign (first
  SamSam build Dec 2015; most recent alleged attack Sept 25,
  2018) against 200+ US, UK, and Canadian victims. The same
  day, OFAC designated Iran-based bitcoin facilitators Ali
  Khorashadizadeh and Mohammad Ghorbaniyan under EO 13694 for
  converting SamSam ransom proceeds into Iranian rial and — for
  the first time ever — publicly attributed two Bitcoin
  addresses to the designated individuals. Attribution to
  Iran-based individuals is well supported; state direction is
  NOT asserted — DOJ frames the scheme as criminal. Retained as
  a sanctions-evasion-adjacent cybercrime tolerated within
  Iran's revenue ecosystem, not a state-directed operation.
