  notes: |
    Audited vs the two cited primaries, both snapshotted via their
    Wayback archive_url (live justice.gov + home.treasury.gov are
    Akamai/bot-walled) — the justice.gov bypass; the captures carry
    the full verbatim article text. RAW:
    doj__2018-11-28_samsam-indictment.html sha256
    b1d2ac74139af26d0b13b37a13a646fd0edc53d0189c1ced56389fe0d3688de1;
    treasury__2018-11-28_samsam-ofac.html sha256
    7d37c8ef9cc3bdbf3a286c1f0fd1ddbd1f8282d8da12fac6362d3f2163a021ca.

    [a] FACTS — corrected. (1) STRIPPED a fabricated garble from
    outcome_summary: "the Bowman Avenue Dam-adjacent Hollywood
    Presbyterian" — the Bowman Avenue Dam is an unrelated 2013 IRGC
    intrusion (Rye Brook, NY), not a SamSam victim, and the phrase
    also duplicated Hollywood Presbyterian. (2) MONEY was wrong: the
    event carried usd_extorted 30M, but DOJ says "collected over $6
    million USD in ransom payments to date, and caused over $30
    million USD in losses to victims." Fixed usd_extorted 30M->6M;
    renamed the 30M figure usd_victim_remediation->usd_victim_losses
    (DOJ says "losses," not remediation). affected_orgs 200 kept
    ("more than 200 victims"). (3) The named-victim list is REAL and
    now matches DOJ verbatim: "the City of Atlanta, Georgia; the
    City of Newark, New Jersey; the Port of San Diego, California;
    the Colorado Department of Transportation; the University of
    Calgary ...; Hollywood Presbyterian Medical Center ...; Kansas
    Heart Hospital ...; Laboratory Corporation of America (LabCorp)."
    Scope US/UK/Canada per OFAC ("United States, United Kingdom, and
    Canada since 2015"). First SamSam build Dec 2015; most recent
    alleged attack Sept 25, 2018 (a 34-month scheme) — DOJ-verbatim.

    [b] ATTRIBUTION — DOJ names two Iranian individuals "both of
    Iran," "acting from inside Iran"; state direction NOT asserted
    (OFAC calls them "criminal actors"). attributing_org US DOJ,
    confidence high, concur-with-caveat — all correct, kept.

    [c] DATES — start_date 2015-12-01 (campaign onset: "created the
    first version ... in December 2015" / "beginning in December
    2015"); disclosure/end 2018-11-28 = DOJ indictment + OFAC
    designation (counter-action date; last attack was 2018-09-25).
    Both sources' published_on 2018-11-28 confirmed against the
    bylines (DOJ "Wednesday, November 28, 2018"; OFAC "November 28,
    2018"). Both source titles corrected to the exact headlines
    (were truncated paraphrases) — the verbatim DOJ headline carries
    "Causing Over $30 Million in Losses," the OFAC one "for the First
    Time Identifies Associated Digital Currency Addresses."

    [d] DOCTRINE — ir/sanctions-evasion/ransomware-revenue kept at
    plausible (harmonized) — correct, NOT attested. OFAC does show a
    real revenue signal (facilitators "exchange digital currency
    ... into Iranian rial and ... deposited the rial into Iranian
    banks"), but neither primary states a state-revenue terminal
    goal or state tasking, and Savandi/Mansouri are not the
    IRGC-affiliated contractors the pillar names. ADDED the missing
    inference_basis.alternatives (the required shape for a plausible
    link); perspective omitted = attacker-rationale default (Iran's
    own doctrine on an Iran-nexus op).

    [e] ATTRIBUTION_LEVEL — added named-actor (was absent); DOJ
    names the two operators personally.

    [f] ACTOR_ID — null is correct: this is a counter-action (DOJ
    indictment + OFAC sanctions), no tracked/state actor. incident_
    type reframed [ransomware, financial-theft]->[law-enforcement,
    policy] (law-enforcement = indictment, policy = OFAC
    designation) per the counter-action rule; the four subjects stay
    in operators_named + summary (free-string person slugs,
    consistent with corpus convention — not FKs). initial_vector
    valid-creds/"RDP brute-force" was unsourced vendor knowledge ->
    n-day (both primaries: access via exploiting "computer network
    vulnerabilities"). Both target FKs (sectors/government/local,
    sectors/healthcare/hospital) resolve. FIRST-ever OFAC
    crypto-address attribution verified verbatim: "today's action
