outcome_summary: |
  200+ victims across the US, UK, and Canada. DOJ names the
  City of Atlanta, the City of Newark, the Port of San Diego,
  the Colorado Department of Transportation, the University of
  Calgary, and health-care providers Hollywood Presbyterian
  Medical Center, Kansas Heart Hospital, and LabCorp. Per DOJ,
  the defendants collected over USD 6M in ransom and caused
  over USD 30M in losses to victims.
