  notes: |
    PHANTOM-REMEDIATION (re-source path). The sole prior citation
    (cybercom/cnmf-virustotal-cumulative → virustotal.com/gui/user/CYBERCOM_Malware_Alert)
    is the genuine CNMF VirusTotal account, but the URL is a JavaScript SPA returning a
    ~7.9 KB content-free shell (curl HTTP 200, only "<title>VirusTotal</title>") — it
    carries none of the event's facts and states no strategic purpose, so it could be
    neither the sole source nor the attested-doctrine attesting source. The event is real
    and heavily documented, so it was RE-SOURCED to real primaries/tier-1 reporting (7
    new source records added, 6 raw-snapshotted + hashed; the VT account kept only as the
    account-existence anchor with content_sha256 intentionally withheld).

    [a] FACTS — all now source-carried.
    • Launch 2018-11-05, @CYBERCOM_Malware_Alert: The Record [a1a009b6…b24c7599, 108640 B]
      "Launch: November 5, 2018 (one day before Election Day)"; SecurityWeek
      [6c6c3896…3cff6b8f, 159153 B] reports the first upload that week; cybercom.mil
      founding PR (bot-walled, see [c]). • First sample = LoJax (files rpcnetp.exe/.dll)
      linked to Russia/APT28-Fancy Bear: SecurityWeek (verbatim "rpcnetp", "LoJax",
      "Fancy Bear", "APT28", "Sofacy"). • North Korea / RGB-Lazarus, HOPLIGHT trojan
      (Sept-2019 batch of 11): CyberScoop [d2a7a770…9c1a418d, 112616 B]. • Iran /
      MuddyWater: CISA [c0e37e45…cca34e87, 52799 B] "U.S. Cyber Command's Cyber National
      Mission Force (CNMF) has identified multiple open-source tools used by an Iranian
      advanced persistent threat (APT) group known as MuddyWater ... has released malware
      samples attributed to MuddyWater to ... VirusTotal" (CYBERCOM PR it cites is titled
      "Iranian intel cyber suite"; MuddyWater = MOIS subordinate per NCSC-UK/CISA Jan-2022
      joint advisory). • 2022 Ukraine batch + wind-down: CISA [b74a473d…5e222eb6, 52412 B]
      (last documented public batch, 2022-07-21) + The Record (as of 2024-07-08, "two
      years since the CNMF has posted any malware samples").
      CORRECTIONS: dropped the unsupported "MSS (APT41 et al.)" China attribution (no VT
      China batch found in any source — the VT uploads documented are Russia/NK/Iran);
      dropped the unsourced "Hundreds of malware samples" count (sources give individual
      batch sizes — 2, 11, etc. — but no cumulative total) in favour of "recurring
      batches."

    [b] ATTRIBUTION — kept actor us/cybercom/cnmf-actor (house style for US self-disclosed
      posture ops, cf. 2018-10/ira-disruption; actor record audited KEEP 2026-06-25),
      high/concur (definitional self-disclosure). Re-pointed attribution_source_id off the
      phantom to the founding CYBERCOM PR. Added attribution_level: named-unit.

    [c] DATES — start_date 2018-06-01 ("account established June 2018", unsupported by any
      source) → 2018-11-05; disclosure_date 2018-11-01 → 2018-11-05; end_date null →
      2022-07-21 (last documented public batch; The Record confirms posting went quiet
      ~mid-2022); name window updated to 2018–2022. Each new source's published_on = its
      real publication date. NOTE: the founding cybercom.mil PR is bot-walled (HTTP 403 to
      curl + WebFetch; 541-byte Forbidden page; no snapshot), but it is NOT solely
      load-bearing — its claims (launch, purpose, named unit) are all carried by
      snapshotted SecurityWeek/The Record/CISA — so level remains full.

    [d] DOCTRINE_LINK — us/persistent-engagement kept at confidence: attested, now properly
      grounded. Re-pointed attesting_source_id off the content-free phantom to the VICE
      FOIA report [d729f002…a899063a, 369319 B], which reproduces CYBERCOM's own documents
      stating the cost-imposition goal verbatim: "Posting malware to VT ... putting pressure
      on malicious cyber actors, disrupting their efforts" and (Desired Effects) "Impose
      cost [redacted] ... increasing attrition." Added inference_basis {source_id,
      source_quote}. This is the attributing authority (CYBERCOM/govt) stating the goal the
      doctrine encodes → attested bar met.

    [e] ATTRIBUTION_LEVEL — set named-unit (the Cyber National Mission Force is a named
      USCYBERCOM unit).

    [f] ACTOR_ID — us/cybercom/cnmf-actor resolves to atlas/actors/us/cnmf.yaml (id matches;
      prior service-placement audit verdict KEEP). No actor flag. Doctrine us/persistent-
      engagement and its null pillar/program resolve (doctrine has no pillars).

    Residual: cumulative sample total is uncited (left unquantified, not estimated);
    MuddyWater→MOIS service mapping rests on the standard authoritative attribution
    (NCSC/CISA), not on a per-sample CNMF statement.
