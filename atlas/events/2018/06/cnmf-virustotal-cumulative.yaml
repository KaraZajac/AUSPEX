    attribution_source_id: cybercom/2018-11-05_cnmf-virustotal-initiative-launch
    notes: |
      US self-disclosed posture event: the actor (CNMF, a named USCYBERCOM unit) is
      itself the discloser, openly announced via cybercom.mil and Congressional
      testimony — not an attack with an external victim. Attribution is definitional,
      hence high/concur. attribution_source is the founding CYBERCOM press release
