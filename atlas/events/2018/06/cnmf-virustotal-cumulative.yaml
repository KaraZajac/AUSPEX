id: 2018-06/cnmf-virustotal-cumulative
name: CNMF VirusTotal sample releases (cumulative, 2018–2022)
start_date: 2018-11-05  # first CNMF VirusTotal upload, week of the 2018 US midterms
disclosure_date: 2018-11-05  # overt by design; launch = first public batch
end_date: 2022-07-21  # last well-documented public VT batch (CISA Ukraine); public posting went quiet ~mid-2022 (The Record 2024-07-08)
incident_type:
  - attribution-publication  # public attribution of adversary malware to GRU/RGB/MOIS
  - disclosure  # public release of adversary malware samples/IOCs
  - documentary  # overt-attribution posture, not a target-oriented op
initial_vector: unknown
outcome_summary: |
  Launched 5 November 2018 (the week of the US midterms), the CNMF used the
  @CYBERCOM_Malware_Alert VirusTotal account — with a companion Twitter/X alert
  handle — to publicly release recurring batches of unclassified adversary malware
  samples through ~mid-2022. Disclosed samples were attributed to Russia (GRU's
  APT28/Fancy Bear — the inaugural LoJax samples — and, in 2022, malware seen in
  Ukraine), North Korea (RGB's Lazarus Group, e.g. the HOPLIGHT trojan), and Iran
  (MOIS-linked MuddyWater). A major step toward an overt-attribution / cost-imposition
  norm — an unusual public-facing posture for a US offensive-cyber unit historically
  committed to operational silence. Public VirusTotal posting went quiet after
  ~July 2022 as the command shifted toward private-sector collaboration ("Under
  Advisement").
false_flag_risk: none
summary: |
  Cumulative event capturing the Cyber National Mission Force's overt-attribution
  practice via VirusTotal sample uploads (November 2018 – mid-2022). The CNMF publicly
  released adversary malware samples it judged would "have the greatest impact on
  improving global cybersecurity," while CYBERCOM's own (FOIA-released) internal
  documents frame the practice as imposing costs on adversary cyber actors — "putting
  pressure on malicious cyber actors, disrupting their efforts." It thus operationalizes
  the cost-imposition aspect of Persistent Engagement and broke the long-standing US
  convention of operational silence on adversary attribution. This is a US
  documentary/posture event — the CNMF is both the acting body and the documented
  subject — not a target-oriented operation (targets: []).
