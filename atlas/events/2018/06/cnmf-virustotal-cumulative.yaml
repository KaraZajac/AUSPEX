      corroborated by snapshotted SecurityWeek 2018-11-08 and The Record 2024-07-08).
doctrine_links:
  - doctrine_id: us/persistent-engagement
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      Cost imposition through overt attribution — the public-facing operational
      expression of Persistent Engagement's cost-imposition logic. CYBERCOM's own
      internal documents (FOIA-released) state the goal in substance: posting adversary
      malware to VirusTotal "supports this strategy by putting pressure on malicious
      cyber actors, disrupting their efforts" and is intended to "impose cost ... by
      highlighting malware to the cybersecurity community ... increasing attrition."
      Persistent Engagement encodes exactly this (continuous contact + cost imposition),
      so the link is attested at the goal level (the doctrine slug need not appear).
    attesting_source_id: vice/2020-02-25_cybercom-publishes-russian-north-korean-malware
    inference_basis:
      source_id: vice/2020-02-25_cybercom-publishes-russian-north-korean-malware
      source_quote: |
        CYBERCOM internal documents (FOIA-released, quoted by VICE/Motherboard,
        2020-02-25): "Posting malware to VT [VirusTotal] and Tweeting to bring attention
        and awareness supports this strategy by putting pressure on malicious cyber
        actors, disrupting their efforts." Under the heading "Desired Effects": "Impose
        cost [redacted] by highlighting malware to the cybersecurity community for rapid
        integration into antivirus software, increasing attrition to continued [redacted]."
    contested: false
    analyst: claude
