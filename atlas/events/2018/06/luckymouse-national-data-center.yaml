id: 2018-06/luckymouse-national-data-center
name: LuckyMouse / APT27 national data center compromise (Central Asia)
start_date: 2017-09-01
disclosure_date: 2018-06-13
end_date: 2018-03-31
incident_type:
  - intrusion
  - supply-chain
initial_vector: n-day
outcome_summary: |
  Kaspersky discloses LuckyMouse / APT27 / Emissary Panda
  compromise of an unnamed Central Asian country's national
  data center between fall 2017 and March 2018. Operators
  staged a country-level watering-hole campaign by injecting
  malicious code into government websites hosted in the data
  center, redirecting visitors to HyperBro and Sysget payloads.
  Lateral movement leveraged ShadowPad-family tooling.
false_flag_risk: none
summary: |
  Important early case of PRC-aligned operator compromising a
  national-level hosting facility to enable downstream
  country-scale collection — the structural antecedent of
  later supply-chain / vendor-pivot operations. The
  Central-Asian-state target framing fits both the BRI
  political-intelligence collection pillar (Central Asia is a
  core BRI geography) and the MCF-aligned dual-use research
  collection pattern via national-data-center access to
  government and adjacent civilian research traffic. APT27 /
  Emissary Panda is a long-running PLA-aligned cluster that
  has since 2015 been re-tasked toward MSS / MCF-priority
  collection.
