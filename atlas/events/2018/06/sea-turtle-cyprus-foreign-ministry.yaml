    [a] FACTS — two FABRICATED / over-specified claims stripped:
      (1) ".net.cy ccTLD operator" compromise (in old name, outcome_summary, and target
      orgs/net-cy-cctld-operator role:staging): UNSUPPORTED by any source. Talos names the
      compromised registry as Amnic/.am and the compromised registrar/registry victims as NetNod
