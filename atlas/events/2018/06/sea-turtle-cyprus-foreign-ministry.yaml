id: 2018-06/sea-turtle-cyprus-foreign-ministry
name: Sea Turtle DNS-hijacking of Cyprus foreign ministry and .net.cy ccTLD operator
start_date: 2017-01-01
disclosure_date: 2019-04-17
end_date: 2019-02-01
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Sea Turtle / MARBLED DUST compromised the .net.cy ccTLD operator
  and used DNS-record manipulation at the registrar and ccTLD
  level to redirect Cyprus government and ministry-of-foreign-
  affairs traffic to attacker-controlled infrastructure for
  credential capture. The campaign began in 2017 and continued
  into early 2019, when Cisco Talos and ICANN's public statement
  on DNS-hijacking forced operational disclosure. The Cyprus
  case is the most-documented single Sea Turtle ccTLD compromise.
false_flag_risk: none
summary: |
  Marquee Sea Turtle operation in the 2017-2019 pre-disclosure
  campaign. Cyprus' geopolitical position — EU member with
  ongoing Turkish-Cypriot territorial dispute, central
  Mediterranean energy-equity overlap — placed the foreign-
  ministry victim set squarely within Mavi Vatan-aligned
  collection requirements. The DNS-hijacking tradecraft remains
  the operationally distinctive Sea Turtle signature.
