      appears ONLY in the victim IP/country table ("193.37.213.61 December 2018 Cyprus";
      "108.61.123.149 February 2019 Cyprus"; "178.62.218.244 December - January 2018-2019 UAE,
      Cyprus"). Reuters describes Cyprus GOVERNMENT E-MAIL being DNS-hijacked but does not identify
      the compromised intermediary as the .cy/.net.cy registry. Web verification: the .cy registry
      (University of Cyprus / nic.cy) is NOT confirmed compromised in any Sea Turtle reporting.
      (Also ".net.cy" is a second-level domain under the .cy ccTLD, not a ccTLD itself.) REMOVED the
      claim and the orgs/net-cy-cctld-operator staging target.
      (2) "Cyprus ministry of foreign affairs" as a discrete victim: over-specified. Talos names
      "ministries of foreign affairs" only as a generic PRIMARY-victim CATEGORY; Reuters names
      "Cypriot ... government email services" and "government ministries, embassies and security
      services" generically — neither names a Cyprus MFA. RE-POINTED the primary target from the
      file-less, over-specified orgs/cyprus-foreign-ministry to the real orgs/cypriot-ministries
      ("Cypriot government ministries"), which two peer Sea Turtle events already cite.
      Also removed the anachronistic "MARBLED DUST" co-label from the outcome_summary (a Microsoft
      alias assigned post-April-2023, not usable to name a 2019 Talos-sourced op), the false "most-
      documented single Sea Turtle ccTLD compromise" claim (it was not a ccTLD compromise at all),
      and the overstated "ICANN's public statement ... forced operational disclosure" (the ICANN
      statement names no actor/nation/victim — see [context] below). Retained + source-anchored:
      DNS-record manipulation -> attacker-controlled infra / imposter e-mail portals -> credential
      capture (Talos + Reuters); campaign 2017–Q1 2019 (Talos: "likely began as early as January
      2017 and has continued through the first quarter of 2019").

