id: 2018-06/sea-turtle-cyprus-foreign-ministry
name: Sea Turtle DNS-hijacking of Cypriot government e-mail services (2017–2019 campaign)
start_date: 2018-12-01
disclosure_date: 2019-04-17
end_date: 2019-02-01
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  As part of the 2017–Q1-2019 Sea Turtle DNS-hijacking campaign
  documented by Cisco Talos, Cypriot government e-mail services
  were compromised through DNS-record manipulation that redirected
  victim traffic to attacker-controlled infrastructure (including
  imposter e-mail portals) for credential capture. Talos's April
  17, 2019 report lists Cyprus among the campaign's compromised
  victim countries, with Cyprus-linked operational indicators dated
  December 2018 and February 2019; Reuters (January 27, 2020)
  reported that "Cypriot ... government email services" were among
  "at least 30 organizations" targeted, with the Cyprus attacks
  occurring "in late 2018 or early 2019." Talos assessed the
  campaign "with high confidence" to "an advanced, state-sponsored
  actor" (no nation named at that source); three Western officials
  cited by Reuters assessed the activity as bearing "the hallmarks
  of a state-backed cyber espionage operation conducted to advance
  Turkish interests." No cited source states that the Cyprus (.cy /
  .net.cy) ccTLD registry or operator itself was compromised, nor
  names a Cyprus ministry of foreign affairs specifically; the
  registries/registrars Talos names as compromised are Amnic (.am)
  and NetNod (Sweden).
false_flag_risk: none
summary: |
  Cyprus operation within the 2017–2019 Sea Turtle campaign,
  targeting Cypriot government e-mail. Cyprus' position — an EU and
  eurozone member central to the Eastern-Mediterranean energy and
  maritime-boundary dispute with Turkey and to EU diplomacy on the
  Cyprus Question — makes Cypriot government collection a strong
  fit for Turkey-aligned strategic requirements (see doctrine_links;
  inferred from victim geopolitics, not stated by the cited sources,
  which articulate no purpose). The registrar/DNS-level
  hijack-for-credential-capture tradecraft is the operationally
  distinctive Sea Turtle signature.
attributions:
  - actor_id: tr/unscoped/sea-turtle
    attributing_org: Cisco Talos
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2019-04-17
    attribution_source_id: talos/2019-04-17_sea-turtle-dns-hijacking
    notes: |
      Talos (2019-04-17) attributes the campaign "with high confidence" to "an advanced,
      state-sponsored actor" and names NO nation as the perpetrator — "Turkey" appears in the
      report only as one entry in the victim IP/country table (with Cyprus, alongside Sweden,
      Syria, Armenia, US, etc.), not as the sponsor. Hence attribution_level activity-cluster
      (Talos's named "Sea Turtle" cluster; state-sponsored; nation un-named at this source).
      The Turkey nexus carried by actor_id tr/unscoped/sea-turtle rests on later reporting —
      Reuters (2020-01-27): the activity "bears the hallmarks of a state-backed cyber espionage
      operation conducted to advance Turkish interests" per three Western officials (hedged,
      alignment-level, not a firm Turkish-government/service attribution); Hunt & Hackett
      (2024): "Turkey based" — not on this 2019 Talos source. No cited source names a specific
      Turkish service, so the actor remains tr/unscoped (demoted from tr/mit on 2026-06-25).
