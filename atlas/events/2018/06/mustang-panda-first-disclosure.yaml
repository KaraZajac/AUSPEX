id: 2018-06/mustang-panda-first-disclosure
name: Mustang Panda — first Western-vendor public disclosure
start_date: 2017-01-01
disclosure_date: 2018-06-15
end_date: 2018-06-15
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  CrowdStrike publishes its "Adversary of the Month" profile
  for Mustang Panda — the first Western-vendor public naming
  of the cluster. Reporting describes target set of Mongolian
  government, a US-based think tank with China-policy focus,
  and multiple non-profit / NGO organizations.
false_flag_risk: none
summary: |
  Anchors Mustang Panda's public-disclosure timeline. The
  initial profile already identifies the durable target
  pattern that holds across the next eight years: regional
  MFA-equivalent governments (Mongolia first; ASEAN MFAs
  and the Vatican later), Western think tanks tracking PRC
  policy, and NGO / refugee / diaspora organizations.
  Tradecraft was PlugX variants delivered via weaponized
  LNK lures, Cobalt Strike for C2 — the same loader / C2
  family Mustang Panda continued to refine through the
  2022 Vatican campaigns and the 2025 EU / NATO disclosures.
