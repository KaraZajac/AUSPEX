id: 2018-06/mustang-panda-first-disclosure
name: Mustang Panda — first Western-vendor public disclosure
start_date: 2017-04-01
disclosure_date: 2018-06-15
end_date: 2018-06-15
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  CrowdStrike publishes its "Adversary of the Month" profile
  for Mustang Panda — the first public naming of the cluster
  ("There are no known community or industry names associated
  with this actor"). Reporting describes a China-nexus actor
  first observed in April 2017 targeting a US-based think tank,
  with a wider campaign against non-governmental organizations
  (NGOs) using Mongolian-language decoys, indicating a focus on
  gathering intelligence on Mongolia.
false_flag_risk: none
summary: |
  Anchors Mustang Panda's public-disclosure timeline. The
  2018 profile establishes the cluster's early target set —
  a US-based think tank and Mongolia-focused NGOs — and its
  Mongolia intelligence focus. The broader pattern (ASEAN
  MFAs, the Vatican, EU / NATO institutions, diaspora groups)
  is documented in later reporting, not this first profile.
  CrowdStrike highlights rapid tooling assimilation — use of
  CVE-2017-0199 within days of its public disclosure. Per the
  source, tradecraft comprised Poison Ivy / PlugX as shared
  malware plus an infection chain using a weaponized .lnk (PDF
  double-extension, delivered via a goo.gl / Google Drive link)
  that stages a Cobalt Strike beacon for C2 — the PlugX /
  Cobalt Strike signatures recur in later Mustang Panda
  campaigns.
