id: 2018-06/operation-wirewire-bec-takedown
name: Operation WireWire — first major BEC-syndicate takedown
start_date: 2018-01-01
disclosure_date: 2018-06-11
end_date: 2018-06-11
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US DOJ, FBI, DHS HSI, USPIS, Treasury OIG, and DOS DSS
  announced Operation WireWire in June 2018 — the first
  major coordinated US enforcement against business email
  compromise (BEC) syndicates. 74 defendants arrested
  across the US, Nigeria, Canada, Mauritius, and Poland
  over a six-month operation. USD 14M+ in fraudulent
  wire transfers identified.
false_flag_risk: none
summary: |
  Operation WireWire was the template for the September
  2019 Operation reWired (281 arrests) and the FBI's
  ongoing BEC-syndicate enforcement program. AUSPEX
  classifies as criminal-baseline.
