id: 2018-06/operation-wirewire-bec-takedown
name: Operation WireWire — first major BEC-syndicate takedown
start_date: 2018-01-01
disclosure_date: 2018-06-11
end_date: 2018-06-11
incident_type:
  - law-enforcement
  - financial-theft
initial_vector: unknown
outcome_summary: |
  US DOJ (Office of Public Affairs), with the FBI, DHS HSI,
  US Secret Service, USPIS, and Treasury (FinCEN / IRS-CI),
  announced Operation WireWire on 2018-06-11 — the first
  major coordinated US enforcement against business email
  compromise (BEC) syndicates. A six-month sweep, culminating
  in over two weeks of intensified activity, produced 74
  arrests in the US and overseas (42 in the US, 29 in Nigeria,
  and three across Canada, Mauritius, and Poland). The
  operation seized nearly USD 2.4M and disrupted/recovered
  approximately USD 14M in fraudulent wire transfers.
false_flag_risk: none
summary: |
  Operation WireWire was the template for the September
  2019 Operation reWired (281 arrests) and the FBI's
  ongoing BEC-syndicate enforcement program. AUSPEX
  classifies as criminal-baseline.
