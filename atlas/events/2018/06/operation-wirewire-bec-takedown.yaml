    [a] FACTS — all corrected to the FBI primary's verbatim wording:
    "Operation WireWire … involved a six-month sweep that culminated in
    over two weeks of intensified law enforcement activity resulting in 74
    arrests in the U.S. and overseas, including 42 in the U.S., 29 in
    Nigeria, and three in Canada, Mauritius, and Poland. The operation also
    resulted in the seizure of nearly $2.4 million and the disruption and
    recovery of approximately $14 million in fraudulent wire transfers."
    Added the 42/29/3 country breakdown and the $2.4M seizure (both were
    missing); changed "USD 14M+ … identified" → "approximately USD 14M …
    disrupted/recovered" to match source. CORRECTED the agency credit:
    removed "DOS DSS" (Department of State Diplomatic Security) — NOT a
    WireWire participant; it was copied from the sister Operation reWired
    (2019) release. The DOJ release credits "the U.S. Department of Justice,
    U.S. Department of Homeland Security, U.S. Department of the Treasury and
    the U.S. Postal Inspection Service"; the FBI-LA release names the
    investigators as "the FBI, U.S. Secret Service, U.S. Postal Inspection
    Service, U.S. Immigration and Customs Enforcement's Homeland Security
    Investigations, the U.S. Department of the Treasury Financial Crimes
    Enforcement Network (FinCEN) and IRS Criminal Investigation." So
    "Treasury OIG" → "Treasury (FinCEN / IRS-CI)" and added US Secret
    Service; HSI/USPIS retained.
    [b] ATTRIBUTION — null-actor law-enforcement counter-action (no single
    named group; correct per directionality model). attributing_org_confidence
    high (DOJ arrests/charges); auspex_assessment concur. attribution_level
    left null (the source names no actor to grade). attribution_source_id
    kept as the DOJ release (announcing authority).
    [c] DATES — disclosure_date/end_date 2018-06-11 = announcement (FBI page
    published_on 2018-06-11, verbatim). start_date kept 2018-01-01 as a
    within-window estimate: the source states only a "six-month sweep"
    (≈ Dec 2017 start), no precise op-start date is published.
    [d] DOCTRINE_LINKS — [] correct: stateless profit-motivated BEC fraud,
    no state doctrine applies (per NB; not invented).
    [e] ATTRIBUTION_LEVEL — n/a (null actor).
    [f] ACTOR_ID — null (resolves trivially). No actor flag.
