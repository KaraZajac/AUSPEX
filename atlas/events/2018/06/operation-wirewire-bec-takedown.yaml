  notes: |
    Phantom-remediation (RE-SOURCE path) + 6-point audit. The lone cited
    source carried url: null (note claimed the canonical DOJ URL was
    unreachable). Recovered the genuine DOJ OPA release at
    justice.gov/archives/opa/pr/74-arrested-coordinated-international-enforcement-operation-targeting-hundreds-individuals
    — the resource exists but justice.gov serves an Akamai bot-challenge
    interstitial, so the DOJ article body is un-snapshottable here; hence
    qc level: partial. Added the FBI government-primary mirror
    fbi/2018-06-11_operation-wirewire-bec-takedown (raw snapshot
    fbi__2018-06-11_operation-wirewire-bec-takedown.html, sha256
    e0df1f60…f880bb88, 81174 bytes) as the snapshottable corroborating
