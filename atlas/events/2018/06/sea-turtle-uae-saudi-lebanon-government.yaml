      Caucasus, and KRG theaters. UAE / Saudi / Egypt / Lebanon
      targeting is plausibly explained by regional-influence
      collection (notably Libya, where Turkish-UAE proxy
      competition is intense) but is not a precise pillar fit;
      confidence demoted to plausible to flag the doctrinal
      gap.
    contested: false
