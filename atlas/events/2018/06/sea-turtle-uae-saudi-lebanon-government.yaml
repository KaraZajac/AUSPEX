id: 2018-06/sea-turtle-uae-saudi-lebanon-government
name: Sea Turtle DNS-hijacking of UAE / Saudi / Lebanon / Jordan / Libya / Egypt government targets
start_date: 2017-01-01
disclosure_date: 2019-04-17
end_date: 2019-04-01
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos's April 17, 2019 Sea Turtle disclosure reported that
  "at least 40 different organizations across 13 different countries
  were compromised during this campaign." Talos's "Country of targets"
  IP table lists the UAE, Egypt, Libya, Jordan, and Lebanon (alongside
  Cyprus, Albania, Iraq, Armenia, Syria, Sweden, the US, and Turkey) as
  countries whose targets the actor's relay infrastructure was used
  against; Saudi Arabia is named separately in prose, where the actors
  manipulated sa1[.]dnsnode[.]net to "harvest credentials of
  administrators who manage domains with the TLD of Saudi Arabia (.sa)"
  with "likely ... additional Saudi Arabia-based victims." Talos split
  the victimology into PRIMARY victims — "national security
  organizations, ministries of foreign affairs, and prominent energy
  organizations" (its compromised-org list also names military
  organizations and intelligence agencies) — and SECONDARY victims —
  "numerous DNS registrars, telecommunication companies, and internet
  service providers" — but did NOT map individual countries to either
  tier. Talos named specific organizations only at the infrastructure
  level and largely outside the MENA core (NetNod and the consulting
  firm Cafax in Sweden; the NGO Packet Clearing House), characterizing
  the MENA government victims by category and country-of-targets rather
  than individually. Talos stated no copycat rationale for withholding
  victim names; its expressed concern was that the operation's success
  "will lead to actors more broadly attacking the global DNS system."
  This rollup event captures the broader-MENA Sea Turtle victimology
  distinct from the country-specific Cyprus, Iraqi-Kurdistan, and
  Armenia events.
false_flag_risk: none
summary: |
  Captures the broader-MENA Sea Turtle victim set that does not
  cleanly map to a single doctrinal pillar. Within AUSPEX the actor is
  tracked as a Turkey-aligned espionage cluster (tr/unscoped/sea-turtle),
  but that Turkey nexus rests on LATER reporting (Reuters 2020; Hunt &
  Hackett 2024) cited in the actor record, NOT on this Talos 2019 source,
  which attributes the campaign only to "an advanced, state-sponsored
  actor" and names no nation — "Turkey" appears in the report solely as
  one entry in the victim "Country of targets" table. Taking the
  Turkey-aligned reading on later evidence, the UAE / Saudi / Egyptian
  targeting in particular sits awkwardly with a purely counter-Kurdish-
  and-Eastern-Med reading of Turkish state collection priorities — these
  are sometimes Turkish-aligned states, sometimes adversaries on the
  regional-influence file (Libya is the central example of Turkish-vs-UAE
  proxy competition). The broad 13-country / ~40-organization victim set
  suggests Turkish state collection equities (on the later attribution)
  are broader than the two doctrinally-modeled pillars, and that this
  corpus may benefit from a third "regional rivalry" pillar in a future
  doctrine revision.
attributions:
  - actor_id: tr/unscoped/sea-turtle
    attributing_org: Cisco Talos
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2019-04-17
    attribution_source_id: talos/2019-04-17_sea-turtle-dns-hijacking
    notes: |
      Talos (2019-04-17) assesses "with high confidence that this
      activity is being carried out by an advanced, state-sponsored
      actor" and names NO nation as the perpetrator — raw grep of the
      hash-verified snapshot: "turkish"=0, "iran"=0; "turkey"=1,
      occurring only in the "Country of targets" IP table (alongside
      Sweden, Syria, Armenia, US) as a target location, not as the
      sponsor. Hence attribution_level activity-cluster (Talos's named
      "Sea Turtle" cluster; state-sponsored; nation un-named at this
      source) — the schema's Tortoiseshell attribution-latency pattern.
      attributing_org_confidence stays high (Talos's confidence in the
      state-sponsored-actor assessment; orthogonal to specificity). The
      Turkey nexus carried by actor_id tr/unscoped/sea-turtle rests on
      LATER reporting cited in the actor record (Reuters 2020; Hunt &
      Hackett 2024), not on this 2019 Talos source; no cited source
      names a specific Turkish service, so the actor remains tr/unscoped.
doctrine_links:
  - doctrine_id: tr/mavi-vatan
    pillar_id: tr/mavi-vatan/regional-influence
    program_id: null
    confidence: plausible
    reasoning: |
      Sea Turtle is assessed within AUSPEX as a Turkey-aligned espionage
      actor (per the actor record's later sources; Talos 2019 itself
      names only "an advanced, state-sponsored actor" and no nation). The
      regional-influence pillar covers Libya, Syria, the Caucasus, and
      KRG theaters. The broad MENA country-of-targets set (UAE / Saudi /
      Egypt / Lebanon / Jordan / Libya) is plausibly explained by
      regional-influence collection — notably Libya, where Turkish-UAE
      proxy competition is intense — but is not a precise pillar fit. The
      label is plausible rather than higher because Talos states no
      purpose for any of this targeting and names no nation, so a broad
      state-sponsored MENA espionage reading not specific to Mavi Vatan
      survives alongside the regional-influence reading; confidence is
      demoted to plausible to flag the doctrinal gap this rollup exists
      to surface.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Mavi Vatan regional-influence collection: a Turkey-aligned actor (per the actor record's later sources) collecting across MENA states fits the pillar, which covers Libya — where Turkish-UAE proxy competition is intense — Syria, the Caucasus and the KRG."
        - "Broad state-sponsored MENA espionage with no single pillar: Talos states no purpose and names no nation; the headline primary victims are national-security organizations / MFAs / energy across 13 countries-of-targets that include Turkish-aligned states (UAE, Saudi, Egypt) as well as adversaries, so a general regional-collection reading survives — the doctrinal gap this rollup flags."
