id: 2018-06/sea-turtle-uae-saudi-lebanon-government
name: Sea Turtle DNS-hijacking of UAE / Saudi / Lebanon / Jordan / Libya / Egypt government targets
start_date: 2017-01-01
disclosure_date: 2019-04-17
end_date: 2019-04-01
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos's April 2019 Sea Turtle disclosure documented
  victims across 13 countries including the UAE, Saudi Arabia,
  Lebanon, Jordan, Libya, and Egypt — beyond the Cyprus / Greece
  / Iraqi-Kurdistan / Albania / Armenia core that dominates the
  Mavi Vatan and counter-Kurdish doctrinal narratives. Talos
  declined to name individual victim organizations or specific
  registrars, citing risk of copycat operations, but
  characterized the target set as national-security
  organizations, ministries of foreign affairs, energy
  organizations, and intelligence agencies. This rollup event
  captures the broader-MENA Sea Turtle victimology distinct
  from the country-specific Cyprus, Greece, and KRG events.
false_flag_risk: none
summary: |
  Captures the broader-MENA Sea Turtle victim set that does not
  cleanly map to a single doctrinal pillar. The UAE, Saudi, and
  Egyptian targeting in particular sits awkwardly with a purely
  counter-Kurdish-and-Eastern-Med reading of Turkish state
  collection priorities — these are sometimes Turkish-aligned
  states, sometimes adversaries on the regional-influence file
  (Libya is the central example of Turkish-vs-UAE proxy
  competition). Suggests Turkish state collection equities are
  broader than the two doctrinally-modeled pillars and that
  this corpus may benefit from a third "regional rivalry"
  pillar in a future doctrine revision.
