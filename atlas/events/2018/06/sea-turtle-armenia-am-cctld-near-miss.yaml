id: 2018-06/sea-turtle-armenia-am-cctld-near-miss
name: Sea Turtle near-compromise of Armenia .am ccTLD registrar — averted ccTLD-wide hijack
start_date: 2018-01-01
disclosure_date: 2019-04-17
end_date: 2019-04-01
incident_type:
  - intrusion
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos's April 2019 Sea Turtle disclosure documented that
  the cluster came close to compromising the registrar
  managing Armenia's .am country-code TLD — an outcome that
  would have placed every .am domain at risk of attacker-
  controlled DNS resolution. Talos characterized this as a
  near-miss; the precise mechanism that prevented full
  compromise is not detailed publicly. The targeting of the
  .am infrastructure during the active 2018-2020 Nagorno-
  Karabakh tension cycle (which culminated in the September
  2020 war) fits the Mavi Vatan regional-influence and Turkish
  alliance-with-Azerbaijan framing.
false_flag_risk: none
summary: |
  Important doctrinal data point: targeting the .am ccTLD
  during the Nagorno-Karabakh tension cycle directly serves
  Turkish state collection on the Armenian information
  ecosystem and aligns with the Turkish-Azerbaijani strategic
  partnership. The Mavi Vatan regional-influence pillar
  explicitly names Karabakh as a key term.
