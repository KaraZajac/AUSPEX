id: 2018-08/eset-donot-yty-framework-disclosure
name: NETSCOUT ASERT discloses the DoNot Team yty modular malware framework — first public disclosure
start_date: 2018-01-01
disclosure_date: 2018-03-08
end_date: null
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  On 8 March 2018 NETSCOUT's ASERT team (Dennis Schwarz and Jill
  Sopko) published "Donot Team Leverages New Modular Malware
  Framework in South Asia," the first public disclosure of a
  modular Windows malware framework ASERT named "yty" (after
  debugging strings in its components). The framework chains a
  C++ downloader to a .NET plugin-downloader and a low-
  functionality backdoor that pulls further modules for file
  collection, screenshots, keylogging, and system
  reconnaissance; command-and-control IP addresses were staged
  in a Google Docs document and HTTPS beacons used football-
  themed URL paths. ASERT assessed with medium confidence that
  yty is a successor to the EHDevel framework and that the same
  operator — the Donot Team — built both. Decoy documents,
  timestamp analysis, and C2-log analysis showed a focus on
  Pakistan (decoys impersonating official Government of Pakistan
  memos), with infrastructure also impersonating Sri Lankan
  (Sunday Observer) and Bangladeshi (Bangladesh Today) news
  outlets, indicating broader South Asian targeting.
false_flag_risk: none
summary: |
  The first public technical anchor for the DoNot Team's yty
  Windows malware framework, which remained the cluster's
  central Windows family across subsequent Morphisec, Cyfirma,
  ESET, and Amnesty reporting (with refreshes through 2020-2022).
  ASERT named the Donot Team operator and noted "strikingly
  similar" code, infrastructure, and TTP overlaps with the
  EHDevel malware and with Operation Hangover / Patchwork, but
  stated it "did not uncover definitive evidence to link the two
  groups" — i.e. it established Donot Team as a tracked cluster
  without resolving the Patchwork relationship. ASERT named no
  sponsoring state; the India alignment AUSPEX records for this
  actor rests on later and other-vendor reporting, not on this
  source.
attributions:
  - actor_id: in/unscoped/donot-team
    attributing_org: NETSCOUT (ASERT)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-03-08
    attribution_source_id: netscout/2018-03-08_donot-team-yty-modular-malware-framework
    notes: |
      ASERT named the "Donot Team" cluster as the yty operator
      "with medium confidence" (hence attributing_org_confidence:
      moderate) and identified yty as an EHDevel successor. No
      sponsoring nation or intelligence service is named, and
      ASERT explicitly "did not uncover definitive evidence to
      link" Donot Team and Patchwork — so attribution_level is
      named-actor (group, not nation or unit). concur-with-caveat:
      AUSPEX concurs the activity is DoNot Team (firmly
      established by later reporting) while flagging that this
      first-disclosure attribution was medium-confidence with the
      EHDevel / Patchwork lineage unresolved.
