qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-28
  level: full
  notes: |
    PHANTOM-REMEDIATION (badrabbit-model RE-SOURCE). The event rested on a phantom
    citation eset/2018-08-23_donotapt-yty-framework (url: null; a prior 2026-05-29 audit
    already established no ESET WeLiveSecurity article of that title/date exists, and the
    title was a TrendMicro-"Untangling the Patchwork" + yty mashup). Web research confirmed
    the genuine FIRST public disclosure of the yty framework is NETSCOUT/ASERT, "Donot Team
    Leverages New Modular Malware Framework in South Asia," 2018-03-08 (Dennis Schwarz & Jill
    Sopko). Re-sourced the event to that primary; created source record
    netscout/2018-03-08_donot-team-yty-modular-malware-framework with raw snapshot
    netscout__2018-03-08_donot-team-yty-modular-malware-framework.html, sha256
    12aa0f8a…d470e45, 386,427 bytes (page fetched cleanly, NOT bot-walled). Annotated the
    orphaned phantom source record as such (STEP 0c); it remains cited by actor
    in/unscoped/donot-team, which I cannot edit — FLAGGED for the orchestrator.

    [a] FACTS — all now carried verbatim by the NETSCOUT/ASERT raw: "ASERT discovered a new
    modular malware framework, we call yty, that focuses on file collection, screenshots, and
    keylogging"; C++→.NET downloader chain + low-functionality backdoor; "Command and control
    (C2) hosts stored in a document hosted on Google Docs"; football-themed HTTPS paths; "a
    focus on Pakistan" with decoys that "appeared to be official Government of Pakistan memos";
    Sri Lanka (sundayobserver[.]net) and Bangladesh (thebangladeshtoday[.]net) impersonation
    domains. STRIPPED false ESET framing, the "first long-form WESTERN disclosure"/"established
    DoNot Team as distinct from Patchwork" overclaims (ASERT in fact "did not uncover definitive
    evidence to link the two groups"), and the unsourced 2017-01-01 start. start_date set to
    2018-01-01 (conservative; ASERT discovered the framework "In late January 2018" — precise
    op-start not documented). disclosure_date corrected 2018-08-23 → 2018-03-08.

    [b] ATTRIBUTION — ASERT: "We believe the threat actors, Donot Team, who created EHDevel,
    also created the yty framework. With medium confidence, ASERT believes this new malware
    framework will pick up where EHDevel left off." attributing_org ESET (WeLiveSecurity) →
    NETSCOUT (ASERT); attributing_org_confidence high → moderate ("medium confidence");
    auspex_assessment concur → concur-with-caveat (first-disclosure medium confidence,
    EHDevel/Patchwork lineage unresolved); attribution_date 2018-08-23 → 2018-03-08;
    attribution_source_id re-pointed to the NETSCOUT record. ASERT names NO sponsoring state.

    [c] DATES — source published_on 2018-03-08 (verified on the page byline "March 8th, 2018");
    event disclosure_date now matches the source's real publication date (the prior 2018-08-23
    was the phantom's fabricated date).

    [d] DOCTRINE_LINKS — both links kept at strongly_inferred (not attested): ASERT names the
    Pakistani-government focus and the Sri Lanka/Bangladesh impersonation infra but states no
    Indian strategic purpose, so no attesting_source_id (correct — attested would require a
    source stating the goal). Added inference_basis {signals[], ruled_out} to both; tightened
    the pakistan-military reasoning to "Government of Pakistan" (what ASERT actually says, not
    "military" specifically) and added an honesty caveat to the diplomatic-collection link that
    its Sri Lanka/Bangladesh basis is lookalike infrastructure, not confirmed foreign-ministry
    compromise. Consistent with the doctrine's own cyber_relevance ("generally strongly_inferred
    ... not attested; no Indian government statement claims this tasking").

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): ASERT names the "Donot Team" cluster
    but no nation and no unit, and did not definitively resolve the Patchwork overlap.

    [f] ACTOR_ID — in/unscoped/donot-team resolves to atlas/actors/in/donot-team.yaml (id
    in/unscoped/donot-team; demoted from in/ntro on 2026-06-24). Directionality verified: actor
    India-aligned, victims = Pakistan (focus) + Sri Lanka + Bangladesh (South Asia), NOT India.

    TARGETS — dropped orgs/bangladesh-foreign-ministry: ASERT's Bangladesh evidence is a
    newspaper-impersonating domain, not foreign-ministry compromise (and the FK is dangling).
    Kept orgs/pakistani-government (pk, primary) — carried by the "Government of Pakistan" decoy
