id: 2018-08/eset-donot-yty-framework-disclosure
name: ESET dissects the DoNot Team yty malware framework — first long-form Western disclosure
start_date: 2017-01-01
disclosure_date: 2018-08-23
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  ESET's WeLiveSecurity team published a detailed dissection of
  the DoNot Team / Origami Elephant cluster's modular Windows
  malware framework, which the report named "yty." The framework
  bundles separable loaders, droppers, and a backdoor with
  command-and-control over HTTPS. ESET tied operational use of
  the framework to Pakistani, Bangladeshi, and South Asian
  diplomatic targeting consistent with prior vendor reporting
  on the broader Patchwork / Hangover ecosystem.
false_flag_risk: none
summary: |
  The canonical Western-vendor technical anchor for the DoNot
  Team's Windows toolchain. yty has remained the central
  Windows malware family in the cluster's tradecraft across
  subsequent Morphisec, Cyfirma, and Amnesty reporting, with
  refreshes in 2020-2022. The disclosure established DoNot Team
  as a distinct Indian-aligned cluster, separable from
  Patchwork and SideWinder in vendor naming.
