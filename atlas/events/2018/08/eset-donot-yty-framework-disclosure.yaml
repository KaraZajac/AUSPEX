      attested: ASERT names the Pakistani-government focus but
      states no Indian strategic purpose.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "ASERT: decoy documents 'appeared to be official Government of Pakistan memos' and C2-log/timestamp analysis 'showed a focus on Pakistan'."
        - "DoNot Team is assessed India-aligned in subsequent reporting; an India-aligned actor concentrating on Pakistani government targets fits the regional-collection-vs-Pakistan pillar."
      ruled_out: "Financially-motivated or hacktivist activity — ruled out by the espionage-only toolset (file collection, keylogging, screenshots, exfiltration) and government-decoy lures, with no monetization or messaging component."
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/diplomatic-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      ASERT documented yty infrastructure impersonating Sri Lankan
      (Sunday Observer) and Bangladeshi (Bangladesh Today) outlets
      alongside the Pakistani focus — the regional South Asian
      collection (Sri Lanka, Bangladesh) the diplomatic-collection
      pillar encodes. Honesty caveat: this evidence is lookalike
      registration infrastructure, not confirmed foreign-ministry
      compromise, and ASERT does not use the word "diplomatic";
      hence strongly_inferred on the regional target-mix, never
      attested on a stated Indian purpose.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "ASERT domains table: 'sundayobserver[.]net' mimics a Sri Lankan newspaper and 'thebangladeshtoday[.]net' mimics a Bangladeshi national daily — regional South Asian targeting infrastructure beyond Pakistan."
        - "The diplomatic-collection pillar explicitly encodes Afghan, Sri Lankan, Nepalese, and Bangladeshi regional collection for India-aligned clusters."
      ruled_out: "A Pakistan-only reading — ruled out because the Sri Lanka / Bangladesh impersonation infrastructure extends the target set beyond Pakistan into the broader regional-collection lane."
