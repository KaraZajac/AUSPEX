summary: |
  Canonical DOJ attribution of the FIN7 / Carbanak cluster's
  Ukrainian operator base. Important for AUSPEX criminal-baseline
  because the successful extradition and prosecution of named
  Ukrainian operators is the public-record reason FIN7 is
  classified `criminal/` rather than `ru/proxies/` despite
  Russian-speaking forum presence — the indicted core is
  transnational and Ukrainian, not Russian-state-resident.
