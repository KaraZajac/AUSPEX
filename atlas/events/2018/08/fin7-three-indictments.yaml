id: 2018-08/fin7-three-indictments
name: DOJ unsealing of FIN7 Ukrainian-operator indictments
start_date: 2018-08-01
disclosure_date: 2018-08-01
end_date: 2018-08-01
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  US Department of Justice unsealed indictments against three
  Ukrainian nationals — Andrii Kolpakov, Dmytro Fedorov, and
  Fedir Hladyr — for their roles in the FIN7 / Carbanak
  financial-cybercrime cluster. The indictments alleged
  attacks against more than 100 US companies primarily in the
  restaurant, gaming, and hospitality sectors, with theft of
  payment-card data from more than 6,500 individual point-of-
  sale terminals at over 3,600 separate business locations.
  Hladyr was extradited from Poland in 2018, pleaded guilty
  September 2019, and was sentenced April 2021 to 10 years.
  Fedorov and Kolpakov were extradited from Poland and
  Spain respectively in 2019.
quantified_impact:
