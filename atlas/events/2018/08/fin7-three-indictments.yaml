id: 2018-08/fin7-three-indictments
name: DOJ unsealing of FIN7 Ukrainian-operator indictments
start_date: 2018-08-01
disclosure_date: 2018-08-01
end_date: 2018-08-01
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  US Department of Justice unsealed indictments against three
  Ukrainian nationals — Dmytro Fedorov, Fedir Hladyr, and Andrii
  Kolpakov — for their roles in the FIN7 / Carbanak financial-
  cybercrime cluster (Hladyr served as the group's systems
  administrator; Fedorov and Kolpakov supervised other FIN7
  hackers). The indictments alleged that, since at least 2015,
  FIN7 attacked more than 100 US companies — predominantly in the
  restaurant, gaming, and hospitality sectors — breaching networks
  in 47 states and the District of Columbia and stealing more than
  15 million payment-card records from over 6,500 individual
  point-of-sale terminals at more than 3,600 separate business
  locations. The group operated a front company, "Combi Security,"
  posing as a penetration-testing firm to recruit operators. As of
  the unsealing, Hladyr — arrested in Germany in January 2018 — had
  been extradited to the United States and was in federal custody in
  Seattle; Fedorov (arrested in Bielsko-Biala, Poland) and Kolpakov
  (arrested in Lepe, Spain) remained in custody abroad pending
  extradition.
