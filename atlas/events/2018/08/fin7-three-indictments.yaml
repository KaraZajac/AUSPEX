    [a] FACTS — core claims mirror-verified verbatim. FBI: "Ukrainian nationals Dmytro
    Fedorov, Fedir Hladyr, and Andrii Ko[l]pakov, are members of a prolific hacking
    group widely known as FIN7 (also referred to as the Carbanak Group ...)"; "Since at
    least 2015, FIN7 members engaged in a highly sophisticated malware campaign
    targeting more than 100 U.S. companies, predominantly in the restaurant, gaming, and
    hospitality industries"; "FIN7 successfully breached the computer networks of
    companies in 47 states and the District of Columbia, stealing more than 15 million
    customer card records from over 6,500 individual point-of-sale terminals at more
    than 3,600 separate business locations"; "created a fake computer security business
    called Combi Security". Roles: CyberScoop "Hladyr, who allegedly acted as the system
    administrator"; "Fedorov, who allegedly fulfilled hacking and supervisory roles";
    "Another alleged supervisor, Ukrainian Andrii Kolpakov".
    CORRECTIONS: (1) outcome_summary said "Hladyr was extradited from Poland in 2018" —
    WRONG; Hladyr was arrested in GERMANY (Jan 2018) and extradited from there (VOA: "in
    federal custody in Seattle after being arrested in Germany in January and extradited
    to the United States in early May"; CyberScoop: "arrested in January 2018 while on
    vacation in Germany"). POLAND is where FEDOROV was arrested ("Bielsko-Biala, Poland
    ... pending extradition"); Kolpakov in "Lepe, Spain". Rewrote the procedural sentence
    to the source-carried arrest/extradition facts as of the unsealing. (2) STRIPPED the
    post-source procedural tail ("pleaded guilty September 2019 ... sentenced April 2021
    to 10 years ... extradited ... in 2019") — these POSTDATE the only cited 2018-08-01
    source and are not carried by it; this documentary event covers the unsealing, while
    the later pleas/sentencings are separate developments. (3) ADDED source-carried
    detail: operator roles, "since at least 2015", 47 states + DC, 15M+ card records,
    Combi Security; added quantified_impact.payment_cards_stolen: 15000000.
    BOUNDARY (per task NB) CONFIRMED: this indictment is FIN7's RETAIL/POS campaign, NOT
    the 2013–2016 Carbanak bank/SWIFT/ATM heists — the FBI source explicitly separates
    them: "FIN7 incorporated and adapted the notorious Carbanak malware, which was used
    by OTHER cybercriminals in a massive transnational attack on the banking industry."
    No bank-heist/SWIFT/$1B claim appears in this event (those correctly live on the
    2014-02/carbanak-bank-heists sibling, carried by Kaspersky 2015). Softened summary
    "successful extradition and prosecution" -> "indictment and prosecution" (as of
    2018-08-01 only Hladyr had been extradited; Fedorov/Kolpakov were pending).

