end_date: 2023-03-24
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  FBI arrested Conor Brian Fitzpatrick ("Pompompurin"),
  administrator of BreachForums, in Peekskill, NY on
  March 15 2023. BreachForums was the successor to
  RaidForums (seized April 2022) and the primary English-
  language marketplace for resale of stolen credentials and
  breached datasets — including the FBI InfraGard breach
  (Nov 2022) and the DC Health Link breach (Mar 2023).
  Fitzpatrick pleaded guilty (July 2023) and was initially
  sentenced (Jan 2024) to time-served (17 days) plus 20 years
  supervised release. The Fourth Circuit vacated that sentence
  Jan 2025 as substantively unreasonable; on resentencing
  (Sep 2025) Fitzpatrick received 36 months federal prison.
false_flag_risk: none
operators_named:
  - fitzpatrick-conor-brian  # BreachForums "Pompompurin", FBI Mar 2023
summary: |
  The BreachForums prosecution closed the second-generation
  English-language breach marketplace after RaidForums.
  AUSPEX classifies as criminal-baseline: the forum's
  trade was data-broker resale rather than state-tasked
  exfiltration, even when state actors (e.g. IntelBroker
  postings) occasionally used the venue.
