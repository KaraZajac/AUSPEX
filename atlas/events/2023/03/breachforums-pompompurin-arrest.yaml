outcome_summary: |
  FBI agents arrested Conor Brian Fitzpatrick ("Pompompurin"),
  the owner and administrator of BreachForums, at his home in
  Peekskill, NY at around 4:30 p.m. on March 15 2023; on arrest
  he stated his name, that he used the alias "pompompurin", and
  that he was the owner and administrator of BreachForums.
  BreachForums was widely considered the reincarnation of
  RaidForums (whose servers and domains the U.S. DOJ seized in
  April 2022) and a leading English-language marketplace where
  stolen credentials and breached databases were resold —
  including FBI InfraGard membership data sold on the forum
  (Dec 2022) and data from the DC Health Link breach (Mar 2023).
  The criminal complaint charged one count of conspiracy to
  commit access-device fraud; Fitzpatrick pleaded guilty (July
  2023) to three counts — access-device conspiracy, access-
  device solicitation, and possession of child sexual abuse
  material (CSAM). He was initially sentenced (Jan 19 2024, EDVA,
  Judge Brinkema) to time served (17 days) plus 20 years
  supervised release; the Fourth Circuit vacated that sentence as
  substantively unreasonable and remanded (Jan 21 2025), and on
  resentencing (Sep 16 2025) Fitzpatrick received 36 months
  federal prison.
false_flag_risk: none
