summary: |
  The arrest and prosecution of BreachForums' administrator was a
  US law-enforcement counter-action against the operator of the
  second-generation English-language breach marketplace (the
  RaidForums successor). AUSPEX models it as a null-actor
  counter-action (law-enforcement) and classifies it as criminal-
  baseline: the forum's trade was data-broker resale of stolen
  data, not state-tasked exfiltration. The BreachForums brand was
  subsequently revived under different operators (ShinyHunters /
  Baphomet) and seized again by the FBI in May 2024 — modeled as
  a separate event (2024-05/breachforums-fbi-seizure); the two
  are not conflated.
