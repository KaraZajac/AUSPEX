id: 2023-03/winter-vivern-european-government-targeting
name: Winter Vivern (TA473 / UAC-0114) government credential-phish espionage campaign
start_date: 2022-06-01  # SentinelLabs dates the recent linked campaign to "mid 2022" (govt email credential-phish pages); the APT is described targeting governments "since 2021"
disclosure_date: 2023-03-16
end_date: null
incident_type:
  - espionage
  - intrusion
