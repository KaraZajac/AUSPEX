id: 2023-03/winter-vivern-european-government-targeting
name: Winter Vivern (TA473 / UAC-0114) European government credential-phish campaign
start_date: 2022-04-01  # SentinelLabs: campaign observed from early 2022
disclosure_date: 2023-03-16
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  SentinelLabs disclosed a sustained Winter Vivern campaign
  targeting Polish, Italian, Indian, and Ukrainian government and
  defense entities, plus a parallel arm focused on UK and EU
  parliamentary infrastructure. Operators used credential
  phishing, doc-themed lure pages mimicking government login
  portals, and webmail XSS exploitation (Zimbra CVE-2022-27926,
  later Roundcube CVE-2023-5631) for mailbox access. Russia /
  Belarus-aligned with no named-service public link.
false_flag_risk: none
summary: |
  Winter Vivern's targeting matrix tracks the political-military
  priorities of Russia / Belarus through the post-invasion phase —
  Ukrainian foreign and defense ministries, Polish government,
  Italian defense, and UK / EU parliamentary infrastructure. The
  webmail-XSS pivot in 2023 is doctrinally novel: rather than
  endpoint-implant tradecraft typical of GRU/SVR clusters, Winter
  Vivern weaponised browser-side credential capture against
  unpatched government webmail. Continued through 2024 per
  Recorded Future TAG-70 reporting.
