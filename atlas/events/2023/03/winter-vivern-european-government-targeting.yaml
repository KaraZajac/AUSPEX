initial_vector: phishing
outcome_summary: |
  SentinelLabs (Tom Hegel, 16 March 2023), building on technical
  detail released by Poland's CBZC and Ukraine's CERT-UA (which
  tracks the cluster as UAC-0114), documented sustained
  credential-phishing and malicious-document espionage against
  Polish government agencies, the Ukrainian and Italian Ministries
  of Foreign Affairs, and individuals within the Indian government,
  plus earlier (from 2021) government targets in Lithuania, India,
  the Vatican, and Slovakia and, in a rarer instance, a private
  telecommunications company supporting Ukraine in the war. Access
  was pursued via fake government login pages, macro-enabled
  documents, and "fake virus scanner" batch-loader chains delivering
  the APERETIF trojan — not a named endpoint implant. SentinelLabs
  assesses the activity as aligning with Belarusian and Russian
  government interests and names no state intelligence service.
false_flag_risk: none
summary: |
  SentinelLabs disclosed a set of Winter Vivern espionage campaigns
  whose targeting "aligns closely with global objectives that support
  the interests of Belarus and Russia's governments." Confirmed
  targets include Polish government agencies, the Ukrainian Ministry
  of Foreign Affairs, the Italian Ministry of Foreign Affairs, and
  individuals within the Indian government; the report also notes
  government targeting since 2021 in Lithuania, India, the Vatican,
  and Slovakia, and — of particular interest — a private
  telecommunications firm supporting Ukraine. Tradecraft is
  credential-phishing pages that mimic legitimate government portals
  (Poland's CBZC, the Ukrainian MFA and Security Service, and India's
  email.gov.in webmail), macro-enabled documents (including a lure
  themed on Ukraine's "I Want to Live" / Hochu Zhit surrender
  project), batch-script "fake virus scanner" loaders, and the
  APERETIF trojan hosted on compromised WordPress sites. SentinelLabs
  characterises Winter Vivern as a resource-limited but creative APT
  and names no specific intelligence service; the public attribution
  is a Belarus/Russia strategic alignment, not a named-service link.
