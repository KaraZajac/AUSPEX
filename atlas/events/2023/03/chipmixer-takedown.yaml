id: 2023-03/chipmixer-takedown
name: ChipMixer mixer takedown (Europol + DOJ)
start_date: 2023-03-15
disclosure_date: 2023-03-15
end_date: 2023-03-15
incident_type:
  - disruption
  - documentary
initial_vector: n/a
outcome_summary: |
  Coordinated US DOJ / Europol / Eurojust / German BKA
  takedown of ChipMixer, a darknet cryptocurrency mixer
  that processed more than USD 3B in unlawful transactions
  since 2017 — including over USD 700M in DPRK-linked
  proceeds per DOJ. German BKA seized the back-end
  infrastructure (clearnet and Tor); the operator was
  identified and charged in absentia.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  Second-largest mixer disruption of the 2022-2023 cluster
  after Tornado Cash. ChipMixer functioned as a parallel
  channel to Blender / Sinbad for DPRK proceeds; the DOJ
  press release explicitly identifies Lazarus / DPRK actors
  among the principal users. The takedown closed a major
  laundering path for the Ronin and Harmony proceeds that
  had not transited through the OFAC-designated mixers, and
  forced subsequent operations onto Sinbad (sanctioned
  November 2023) and direct OTC channels.
