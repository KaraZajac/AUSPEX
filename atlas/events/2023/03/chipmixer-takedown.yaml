initial_vector: unknown
outcome_summary: |
  Coordinated US DOJ / HSI / German-BKA takedown of ChipMixer,
  a darknet cryptocurrency mixer that laundered more than USD 3B
  since 2017 across ransomware, darknet-market, fraud and
  cryptocurrency-heist proceeds. Of that, over USD 700M sat in
  wallets designated as stolen funds — a bucket that INCLUDED the
  proceeds of North Korean cyber actors' heists from Axie Infinity's
  Ronin Bridge (2022) and Harmony's Horizon Bridge (2020) (i.e. the
  $700M is the whole stolen-funds category, not a DPRK-only total).
  German BKA seized the back-end servers and more than USD 46M in
  cryptocurrency; US authorities seized two domains and a GitHub
  account. The alleged operator, Minh Quoc Nguyen (49, Hanoi,
  Vietnam), was charged in Philadelphia with money laundering,
  operating an unlicensed money transmitting business, and identity
  theft.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  ChipMixer was a multi-user mixer, not a DPRK-specific service:
  the DOJ/HSI statement lists its clientele as ~37 ransomware
  strains (Sodinokibi, Mamba, Suncrypt), darknet markets (Hydra),
  fraud shops, and Russia's GRU (unit 26165 / APT28, buying Drovorub
  infrastructure), alongside "North Korean cyber actors" whose
  Ronin- and Horizon-heist proceeds sat among the >USD 700M of
  stolen-funds bitcoin it processed. The North Korean portion — the
  row AUSPEX records here — belongs to the same crypto-theft
  revenue-aggregation laundering chain as the OFAC-sanctioned Blender
  (2022) and Sinbad (2023) mixers. But unlike those Treasury
  designations, this DOJ law-enforcement release names NO WMD /
  ballistic-missile-financing purpose — the DPRK nexus is stated only
  as a proximate stolen-funds/laundering fact, which is why the
  doctrine link here is strongly_inferred rather than attested.
