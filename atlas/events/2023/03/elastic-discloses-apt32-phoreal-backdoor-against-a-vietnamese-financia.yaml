id: 2023-03/elastic-discloses-apt32-phoreal-backdoor-against-a-vietnamese-financia
name: "Elastic discloses APT32 PHOREAL backdoor against a Vietnamese financial institution"
start_date: 2023-03-02
incident_type:
  - intrusion
  - espionage
false_flag_risk: none
summary: |
  Elastic Security Labs identified an ongoing campaign (tracked as activity group REF4322) deploying the PHOREAL/RIZZO backdoor against a Vietnamese financial-services institution, loading the implant into memory for defense evasion. Elastic assessed "with high confidence" that REF4322 is APT32/OceanLotus — on the basis of PHOREAL being reported as used exclusively by APT32, and the victim matching APT32's geographic and industry-vertical profile. The report names the group (APT32/OceanLotus) but does not assert a Vietnamese-state sponsor or a specific service; the Vietnam-state nexus and the tc2 service placement rest on the wider corpus consensus, not this source. Extends the inventory's APT32 record (which stops at 2021) into 2023 and into the domestic financial sector.
disclosure_date: 2023-03-02
