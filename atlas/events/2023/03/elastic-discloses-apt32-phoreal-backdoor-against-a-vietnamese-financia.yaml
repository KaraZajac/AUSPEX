  notes: |
    Audited vs Elastic Security Labs raw snapshot (sha256 0e70ae67...). FACTS ✓: ongoing campaign vs a Vietnamese financial-services institution; PHOREAL/RIZZO in-memory backdoor; activity group REF4322; publish date 2023-03-02 verified (structured datePublished + byline). VICTIM ✓ unusual-but-confirmed: Elastic's preamble and meta description both state a Vietnamese financial-services institution (page title is the broader "Southeast Asian Financial Sector").
    CORRECTIONS: (1) attributing_org_confidence moderate->high — Elastic explicitly: "We assess with high confidence ... that REF4322 is APT32/OceanLotus" (the prior `moderate` was an erroneous down-map of the doctrine-link scale). (2) Added attribution_level: named-actor — Elastic names the GROUP only. (3) Added disclosure_date 2023-03-02. (4) Doctrine link strongly_inferred->plausible with inference_basis.alternatives — a DOMESTIC financial victim is a weak fit for an industrial-upgrading/foreign-IP-collection doctrine; competing readings (regime-stability/financial-intel, generic espionage) survive, failing the no-serious-competitor test. attesting_source_id stays null (Elastic states no strategic purpose). Pillar null retained (neither automotive nor aerospace).
    ATTRIBUTION LEVEL RATIONALE: named-actor, NOT nation/named-unit. The source contains NO state-sponsorship language ("state-sponsored"/"nation-state"/"aligned"/"nexus"/"on behalf"/MPS/TC2 all absent); its only "Vietnam" mentions describe the victim and APT32's typical targeting ("interests in ... Vietnam"), not a Vietnamese sponsor.
    ACTOR FLAG (DONE shared actor vn/tc2/apt32 — NOT re-placed): this single source supports neither the Vietnam-STATE nexus nor the tc2 SERVICE placement; it only equates REF4322 to the named group APT32. The vn-state + tc2 placement on the actor record must rest on the actor's other corpus sources (FireEye 2017 et al. / vendor consensus), not this disclosure. Flagging that the Vietnam/tc2 attribution is unsupported by THIS event's only citation; left actor file untouched.
