    attributing_org: "Elastic Security Labs"
    attributing_org_confidence: high   # Elastic: "We assess with high confidence ... that REF4322 is APT32/OceanLotus"
    attribution_level: named-actor      # names the GROUP (APT32) only; no nation-state sponsor or service named in this source
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-03-02
    attribution_source_id: elastic/2023-03_elastic-discloses-apt32-phoreal-backdoor
    notes: "Elastic names the group (APT32/OceanLotus) at high confidence but does NOT name Vietnam as the sponsoring state, nor any service (no 'state-sponsored'/'nation-state'/'aligned'/TC2 language in the report). The vn-state nexus and the tc2 placement on the actor record derive from other corpus sources (FireEye 2017 et al.), not this disclosure."
doctrine_links:
