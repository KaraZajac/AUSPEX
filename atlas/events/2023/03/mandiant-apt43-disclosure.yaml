  - mandiant/2023-03-28_apt43-report
qc:
  verified_by: claude-opus-4.8  # normalized 2026-07-02: the verifying SUBAGENT model is opus-4.8 (orchestrator session is fable-5 but does not perform the audit)
  effort: max
  verified_on: 2026-07-02
  level: full
  notes: |
    Audited against BOTH Mandiant APT43 artifacts of the same
    2023-03-28 disclosure: the cloud.google.com blog
    (mandiant/2023-03-28_apt43-cybercrime-espionage; raw captured,
    sha256 8573da08…087c7852, 222867 bytes) and the full PDF report
    (mandiant/2023-03-28_apt43-report; snapshot hash re-verified,
    sha256 9fc16130…4b6d9286, 2058326 bytes, text via pdftotext).
    The full report was ADDED as a co-source (badrabbit model — real
    event, thin cited blog): it carries the confidence figures, RGB
    attribution, Kimsuky/Thallium overlap and credential detail the
    blog omits, so every claim is now directly source-carried.

    [a] FACTS — corrected. (i) "cryptojacking" REMOVED: Mandiant
    describes laundering stolen crypto into clean crypto via
    hash-rental / cloud-mining ("the likely use of hash rental and
    cloud mining services to launder stolen cryptocurrency into
    clean cryptocurrency"); "cryptojack" = 0× in both sources.
    (ii) summary de-fabricated — dropped "USD-100M-plus single
    events" and "RGB Bureau 38 / FTB" (neither in either source;
    Lazarus/TraderTraitor = 0× — retained only as a labelled AUSPEX
    contrast, no invented figures) and the Andariel-2024 forward
    reference (not carried by these sources). (iii) "stolen
    credentials" RETAINED — supported ("credential" ×24 in the
    report; "credential harvesting ... to support espionage");
    blog corroborates with "stolen personally identifiable
    information (PII)". (iv) espionage-primary confirmed ("We
    consider cyber espionage to be the primary mission for APT43").

    [b] ATTRIBUTION — DOWNGRADED high→moderate + fixed.
    HIGH-confidence DPRK nexus ("high confidence that APT43 is a ...
    cyber operator that supports the interests of the North Korean
    regime") but MODERATE on the unit: "Mandiant assesses with
    moderate confidence that APT43 is attributable to the North
    Korean Reconnaissance General Bureau (RGB)." Recorded actor is
    RGB-scoped, so the unit-level (moderate) confidence governs.
    attribution_source_id re-pointed to the full report (states both
    confidence levels; the blog states none). Fixed erroneous
    "Korean MSS" in the prior note (Mandiant names the RGB).

    [c] DATES — verified. start_date 2018 ✓ ("Tracked since 2018").
    disclosure_date / end_date 2023-03-28 ✓ (blog dateline
    "March 28, 2023"; both source published_on = 2023-03-28 ✓).

    [d]+[e] DOCTRINE + attribution_level — RE-POINTED (major; flagged
    below). attribution_level ADDED = named-unit (RGB named). Both
    prior links pointed at kp/8th-congress-defense-plan
    (strategic-tech-collection @strongly_inferred + revenue-
    aggregation/crypto-bridge-theft @plausible); NEITHER is
    supported — WMD / ballistic / missile / "8th" / defense-plan /
    strategic-technology / defense-contractor all = 0× across both
    Mandiant sources, and strategic-tech-collection is Andariel's
    (defense-tech) pillar whereas APT43 collects foreign-policy /
    nuclear-POLICY intelligence. Replaced with the two goals Mandiant
    actually states, both attested with attesting_source_id +
    inference_basis.source_quote:
      • kp/strategic-information/policy-collection (attested) —
        "The group's focus on foreign policy and nuclear security
        issues supports North Korea's strategic and nuclear
        ambitions"; corpus-designated APT43 pillar (key_terms lists
        APT43; cites this report).
      • kp/juche (doctrine-level; no self-reliance pillar exists)
        (attested) — the juche self-reliance / reduce-fiscal-strain
        sentence.

    [f] ACTOR — kp/rgb/kimsuky resolves (atlas/actors/kp/kimsuky.yaml,
    id kp/rgb/kimsuky); APT43 is a Mandiant / equivalent alias there,
    corroborated by the report ("frequently reported as 'Kimsuky' or
    'Thallium'"; boundary not crisp). FLAG: that actor's
    default_doctrine_alignment_ids still lists
    kp/8th-congress-defense-plan/strategic-tech-collection, which
    this audit finds unsupported for APT43 (that pillar is Andariel's)
    — recommend actor-level review.

    TARGETS — refined to source: kept government/foreign-ministry
    ("government offices, diplomatic organizations ... foreign
    policy") and academic ("education, research"); ADDED
    civil-society/think-tank (the signature target — "think
    tank-related entities with a stake in foreign policy", "think
    tanks focused on geopolitical and nuclear policy").

    Residual uncertainties: policy-collection attested rests on a
    mission-level purpose statement ("supports North Korea's
    strategic and nuclear ambitions") — a conservative reader could
    hold it at strongly_inferred. Source tier left at secondary to
    match the prior audit of the companion report and the corpus
    vendor-research convention, though a first-party Mandiant
    graduation report is arguably primary.
