id: 2023-03/mandiant-apt43-disclosure
name: Mandiant APT43 graduation report — DPRK cybercrime-funds-espionage model
start_date: 2018-01-01  # Mandiant dates cluster activity from 2018
disclosure_date: 2023-03-28
end_date: 2023-03-28
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  Mandiant graduated the Kimsuky-overlapping cluster to
  APT-tier with the APT43 designation. Report documents
  the parallel-revenue model: cryptojacking, stolen
  credentials, and small-scale cryptocurrency theft
  funding the cluster's espionage-collection operations
  against US foreign-policy think tanks, academic
  institutions, ROK government, and South Korean
  defense-policy researchers.
false_flag_risk: none
summary: |
  First clean Tier-2-vendor articulation of the
  cybercrime-self-funding model for DPRK espionage
  clusters. APT43 is the smaller-dollar counterpart to
  Lazarus / TraderTraitor: where the latter pursues
  USD-100M-plus single events, APT43 monetizes
  intermediate-scale fraud to underwrite its
  espionage-collection operating budget. Doctrinally
  significant because it documents revenue-aggregation at
  the espionage-cluster level rather than just at the
  centralized RGB Bureau 38 / FTB level. The same
  self-funding model is subsequently attested for
  Andariel in DOJ's July 2024 Rim Jong Hyok indictment.
