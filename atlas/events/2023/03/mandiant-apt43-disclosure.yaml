id: 2023-03/mandiant-apt43-disclosure
name: Mandiant APT43 graduation report — DPRK cybercrime-funds-espionage model
start_date: 2018-01-01  # Mandiant: APT43 "tracked since 2018"
disclosure_date: 2023-03-28
end_date: 2023-03-28
incident_type:
  - documentary
  - attribution-publication
initial_vector: unknown
outcome_summary: |
  Mandiant graduated the Kimsuky / Thallium-overlapping cluster
  to APT tier with the APT43 designation (its first graduation
  since APT42 in September 2022). The report documents the
  cybercrime-self-funding model: credential harvesting and stolen
  PII supporting espionage, and cryptocurrency theft laundered
  into "clean" crypto via hash-rental and cloud-mining services
  to buy operational infrastructure — self-funding framed as
  juche self-reliance to reduce fiscal strain on the central
  government. Espionage is the primary mission: strategic
  intelligence collection against government and diplomatic
  organizations, foreign-policy and nuclear-policy think tanks,
  and academic / research institutions across South Korea, Japan,
  Europe, and the United States (with a shift to health / pharma
  verticals in 2020–2021).
false_flag_risk: none
summary: |
  Mandiant's APT43 graduation report is a clean articulation of
  the cybercrime-self-funding model for a DPRK espionage cluster.
  Mandiant assesses with high confidence that APT43 is a
  state-sponsored operator supporting the North Korean regime's
  geopolitical aims, and with moderate confidence that it is
  attributable to the Reconnaissance General Bureau (RGB), North
  Korea's primary foreign intelligence service. Espionage is
  APT43's primary mission; the group self-funds its own operations
  through small-scale cybercrime — laundering stolen cryptocurrency
  into clean crypto via hash-rental / cloud-mining services — "in
  a manner aligned with North Korea's juche state ideology of
  self-reliance, reducing fiscal strain on the central
  government." Doctrinally significant because it documents
  self-funding at the espionage-cluster level (a "widespread
  mandate to self-fund ... without additional resourcing"),
  decoupling espionage tasking from centrally allocated budget —
  distinct from the large-scale hard-currency heists run by
  Lazarus / TraderTraitor.
attributions:
  - actor_id: kp/rgb/kimsuky
    attributing_org: Mandiant
    attributing_org_confidence: moderate
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-03-28
    attribution_source_id: mandiant/2023-03-28_apt43-report
    notes: |
      Mandiant assesses with HIGH confidence that APT43 is a
      state-sponsored operator supporting the North Korean regime,
      but only MODERATE confidence on the unit: "Mandiant assesses
      with moderate confidence that APT43 is attributable to the
      North Korean Reconnaissance General Bureau (RGB), the
      country's primary foreign intelligence service." The recorded
      actor is RGB-scoped (kp/rgb/kimsuky), so
      attribution_level=named-unit and
      attributing_org_confidence=moderate track the RGB
      (unit-level) attribution; the DPRK / named-actor nexus itself
      is high. Mandiant notes APT43 activity is "frequently
      reported as 'Kimsuky' or 'Thallium'" and that it tracks some
      Kimsuky-reported clusters (KONNI / CABRIDE / PLANEPATCH)
      separately — the APT43 / Kimsuky boundary is explicitly not
      crisp; AUSPEX records the attribution against the established
      kp/rgb/kimsuky slug (concur-with-caveat). Prior note said
      "Korean MSS / RGB" — "MSS" was erroneous; Mandiant names the
      RGB.
doctrine_links:
  - doctrine_id: kp/strategic-information
    pillar_id: kp/strategic-information/policy-collection
    program_id: null
    confidence: attested
    reasoning: |
      APT43's primary mission is strategic-intelligence collection
      on adversary foreign-policy and nuclear-security planning —
      targeting government / diplomatic organizations and
      foreign-policy / nuclear-policy think tanks in the ROK, US,
      Japan and Europe ("Prior to October 2020, APT43 primarily
      targeted government offices, diplomatic organizations, and
      think tank-related entities with a stake in foreign policy
      and security issues affecting the Korean peninsula"). Mandiant
      states the strategic purpose at goal level: the collection
      "supports North Korea's strategic and nuclear ambitions" and
      is "aligned with Pyongyang's geopolitical interests." That is
      exactly the goal the strategic-information policy-collection
      pillar ("adversary policy-planning collection") encodes — the
      pillar even lists APT43 among its key terms and cites this
      report.
    contested: false
    analyst: claude
    attesting_source_id: mandiant/2023-03-28_apt43-report
    inference_basis:
      source_quote: "The group's focus on foreign policy and nuclear security issues supports North Korea's strategic and nuclear ambitions."
      source_id: mandiant/2023-03-28_apt43-report
  - doctrine_id: kp/juche
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      Mandiant explicitly frames APT43's self-funding cybercrime as
      an expression of juche self-reliance: the group steals and
      launders cryptocurrency (via hash-rental / cloud-mining
      services, turning "dirty" into "clean" crypto) to buy its own
      operational infrastructure so as to reduce fiscal strain on
      the central government, reflecting "a widespread mandate to
      self-fund ... without additional resourcing." This is jarip
      (economic self-sufficiency) applied to cyber — the goal the
      juche doctrine encodes. Linked at doctrine level because juche
      has no dedicated self-reliance pillar (its only pillar,
      internal-security, covers surveillance, not self-funding).
    contested: false
    analyst: claude
    attesting_source_id: mandiant/2023-03-28_apt43-report
    inference_basis:
      source_quote: "APT43 steals and launders enough cryptocurrency to buy operational infrastructure in a manner aligned with North Korea's juche state ideology of self-reliance, reducing fiscal strain on the central government."
      source_id: mandiant/2023-03-28_apt43-report
targets:
  - target_id: sectors/government/foreign-ministry
    role: primary
  - target_id: sectors/civil-society/think-tank
    role: primary
  - target_id: sectors/academic
    role: primary
sources:
