id: 2023-03/3cx-supply-chain
name: 3CX supply-chain compromise
start_date: 2022-02-01  # tradingtechnologies.com compromised Feb 2022 (Google TAG, cited by Mandiant); X_TRADER updates distributed after
disclosure_date: 2023-03-29
end_date: 2023-04-30  # editorial remediation-window bound; Mandiant report 2023-04-20
incident_type:
  - supply-chain
  - intrusion
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  The first cascading software-supply-chain compromise Mandiant
  had observed: one software supply chain compromise initiating
  another. Initial-access stage: prior compromise of Trading
  Technologies' X_TRADER installer (Google TAG, cited by Mandiant,
  dated the tradingtechnologies.com compromise to February 2022,
  preceding distribution of compromised X_TRADER updates). Second
  stage: the trojanized 3CX DesktopApp (build 18.12.416 and earlier)
  was distributed from 3CX's website via a complex DLL-side-loading
  chain deploying the VEILEDSIGNAL multi-stage backdoor; a later
  stage retrieved ICONICSTEALER, "a dataminer that steals browser
  information." Mandiant tracked the activity as UNC4736, a suspected
  North Korean nexus cluster it assessed (moderate confidence) as
  related to financially motivated "AppleJeus" activity with a
  sustained focus on cryptocurrency and fintech services.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Critical demonstration of cascading supply-chain tradecraft: one
  supplier (Trading Technologies / X_TRADER) compromised to reach
  another supplier (3CX), whose trojanized DesktopApp was then
  distributed to 3CX's customer base — "the first time" Mandiant had
  seen a software supply chain compromise lead to another. Mandiant
  attributed the activity to UNC4736, a suspected North Korean
  cluster it assessed at moderate confidence as related to
  financially motivated "AppleJeus" operations; the report names no
  DPRK service. AUSPEX resolves UNC4736 to Citrine Sleet — Microsoft
  (MSTIC) lists UNC4736 as a Citrine Sleet alias and attributes
  Citrine Sleet to Bureau 121 of the DPRK Reconnaissance General
  Bureau — rather than to a blanket "Lazarus" label, consistent with
  Mandiant's March 2023 "Not So Lazarus" mapping, which cautions that
  "Lazarus Group" is an umbrella term for numerous DPRK clusters
  tracked separately.
attributions:
  - actor_id: kp/rgb/citrine-sleet
    attributing_org: Mandiant
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-04-20
    attribution_source_id: mandiant/2023-04-20_3cx-supply-chain
    notes: |
      Mandiant reached NATION level only: "Mandiant tracks this
      activity as UNC4736, a suspected North Korean nexus cluster of
      activity" and "assesses with moderate confidence that UNC4736
      is related to financially motivated North Korean 'AppleJeus'
      activity as reported by CISA." Title: "Suspected North Korean
      Actor Responsible." No DPRK service named in the Mandiant
      report (zero RGB/Bureau hits) — hence attributing_org_confidence
      moderate (was over-stated as high) and attribution_level nation.
      AUSPEX resolves UNC4736 to Citrine Sleet (RGB / Bureau 121) via
      Microsoft MSTIC (2024-08-30), which lists UNC4736 as a Citrine
      Sleet alias and attributes Citrine Sleet to "Bureau 121 of North
      Korea's Reconnaissance General Bureau." concur-with-caveat:
      Mandiant's own attribution is "suspected"/moderate, and the
      specific Citrine Sleet / Bureau-121 resolution is AUSPEX
      synthesis via the Microsoft alias mapping (not stated by the
      Mandiant 3CX report).
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Mandiant ties UNC4736 to financially motivated North Korean
      operators (the CISA "AppleJeus" cluster) with a "sustained
      focus on cryptocurrency and fintech-related services." That is
      a proximate revenue purpose, which the 8th-Congress
      revenue-aggregation pillar specializes into regime hard-currency
      generation; Mandiant does not state the WMD / ballistic-missile
      financing end-use, so the strategic goal is inferred, not
      attested. Held at pillar level (program_id null): this operation
      is a supply-chain access vector, not a DeFi-bridge or
      crypto-exchange heist, so the specific crypto-bridge-theft
      program does not fit.
    attesting_source_id: mandiant/2023-04-20_3cx-supply-chain
    inference_basis:
      source_id: mandiant/2023-04-20_3cx-supply-chain
      signals:
        - "Mandiant 'assesses with moderate confidence that UNC4736 is related to financially motivated North Korean AppleJeus activity as reported by CISA'"
        - "Mandiant: UNC4736-overlapping clusters 'have demonstrated a sustained focus on cryptocurrency and fintech-related services over time'"
      ruled_out: "Strategic-tech-collection / espionage reading — Mandiant characterizes UNC4736 as financially motivated (AppleJeus / crypto focus), not an intelligence-collection mission, so the 8th-Congress strategic-tech-collection pillar is rejected in favor of revenue-aggregation"
    contested: false
    analyst: claude
targets:
  - target_id: orgs/3cx
    role: staging
    outcome: 3CX DesktopApp (build 18.12.416 and earlier) trojanized and distributed from 3CX's own website to its customer base.
  - target_id: sectors/ict/software
    country: us
    role: staging
    outcome: |
      Prior supply-chain link — Trading Technologies' X_TRADER
      installer trojanized first (tradingtechnologies.com compromised
      February 2022 per Google TAG, cited by Mandiant); an X_TRADER
      download onto a 3CX engineer's machine seeded the 3CX
      compromise. (No orgs/ registry entry exists for Trading
      Technologies; recorded at sector level — see qc FLAG.)
  - target_id: sectors/finance/crypto-exchange
    role: primary
    outcome: |
      Cryptocurrency / fintech firms are UNC4736's documented
      financially-motivated targeting focus per Mandiant; the cited
      Mandiant report does not enumerate specific crypto-firm victims
      of the 3CX second stage (the selective crypto-company second
      stage was reported separately by Kaspersky, not cited here).
