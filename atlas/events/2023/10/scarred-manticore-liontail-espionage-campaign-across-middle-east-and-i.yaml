  notes: |
    Audited vs the sole cited Check Point Research source (with Sygnia), raw snapshot captured +
    hash re-verified (sha256 81b0ccd…84c). FACTS ✓: LIONTAIL passive framework abusing undocumented
    HTTP.sys driver IOCTLs to run memory-resident shellcode; FOXSHELL/SDD/WINTAPIX/LIONHEAD families;
    long-dwell espionage peaking mid-2023, actor active since ≥2019; victims across Saudi Arabia,
    UAE, Jordan, Kuwait, Oman, Iraq and Israel in government/military/telecom/finance/IT-services
    plus an NGO. ATTRIBUTION: Check Point explicitly names the service in its Key Findings — "an
    actor affiliated with the Ministry of Intelligence and Security (MOIS)" (also "the MOIS-sponsored
    destructive attack against Albanian government infrastructure (DEV-0861)"; "the typical victim
    profile that MOIS-affiliated clusters usually target") — so attribution_level SET to named-unit
    (MOIS named, not merely "Iranian"); attributing_org_confidence high (asserted directly, unhedged
    on the MOIS affiliation). CORRECTIONS: attributing_org normalized "researchcheckpoint"→"Check
    Point Research"; attribution_date 2023-10-01→2023-10-31 (real publish date, JSON-LD datePublished
    2023-10-31; source published_on corrected to match). doctrine_link ir/forward-defense kept at
    plausible — the source ties targeting to "Iranian interests"/"Iranian long-term interests" but
    states no strategic purpose at the doctrine-goal level, so attested is not warranted and
    attesting_source_id stays null. Per-country sector assignments are an editorial allocation (the
    source lists countries and sectors separately) — flagged in the attribution note, not source-stated.
    ACTOR ir/mois/scarred-manticore: consistent — id, MOIS service placement and ttp all match this
    same source; a prior actor-audit verified the MOIS quote and KEPT ir/mois.
