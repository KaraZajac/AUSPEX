summary: |
  Check Point Research (with Sygnia) disclosed Scarred Manticore, an Iranian MOIS-affiliated actor (overlapping OilRig/APT34 and the DEV-0861 cluster behind the 2021 Albania attack), running a stealthy long-dwell espionage campaign against government, military, telecommunications, financial and IT-services targets across Saudi Arabia, UAE, Jordan, Kuwait, Oman, Iraq and Israel. The campaign used the custom LIONTAIL passive-implant framework, which abuses undocumented HTTP.sys driver functionality to extract memory-resident payloads from inbound HTTP traffic. NOT currently in the inventory; this is the upstream espionage half of the Scarred Manticore/Void Manticore handoff pair.
