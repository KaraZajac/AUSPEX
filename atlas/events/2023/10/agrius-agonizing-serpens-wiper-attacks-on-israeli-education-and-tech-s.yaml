id: 2023-10/agrius-agonizing-serpens-wiper-attacks-on-israeli-education-and-tech-s
name: "Agrius / Agonizing Serpens wiper attacks on Israeli education and tech sectors"
start_date: 2023-01-01   # source: campaign "beginning in January 2023 ... as recently as October 2023"
incident_type:
  - wiper
  - destructive
  - data-theft
initial_vector: n-day
false_flag_risk: none
summary: |
  Palo Alto Unit 42 detailed destructive attacks (Jan-Oct 2023) by Agonizing Serpens (aka Agrius, BlackShadow, Pink Sandstorm, DEV-0022) against Israeli higher-education and technology organizations. The group stole PII and IP, then deployed three novel wipers — MultiLayer, PartialWasher and BFG Agonizer (the last with anti-EDR DLL and IAT unhooking) — to cover its tracks and render endpoints unusable. Unit 42 assesses with high confidence that the attacks were carried out by the Iranian-linked Agonizing Serpens APT group, which it characterizes as Iranian-backed but names no specific Iranian service. Agrius is the long-running Iranian wiper-masquerading-as-ransomware actor; Unit 42 ties this campaign's wipers to the group's earlier Apostle, IPsec Helper and Fantasy tooling by code overlap.
