summary: |
  Palo Alto Unit 42 detailed destructive attacks (Jan-Oct 2023) by Agonizing Serpens (aka Agrius, Pink Sandstorm/AMERICIUM, BlackShadow, DEV-0022, SPECTRAL KITTEN) against Israeli higher-education and technology organizations. The group stole PII and IP, then deployed novel wipers MultiLayer, PartialWasher and BFG Agonizer (with anti-EDR DLL/IAT unhooking) to destroy evidence and brick endpoints. Agrius is the long-running Iranian wiper-masquerading-as-ransomware actor (linked to Apostle/DEADWOOD/SharpBoys). The inventory lists Black Shadow as a separate actor but does NOT contain the Agrius/Agonizing Serpens wiper lineage or this 2023 campaign.
