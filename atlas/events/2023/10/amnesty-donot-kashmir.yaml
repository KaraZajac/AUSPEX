id: 2023-10/amnesty-donot-kashmir
name: Amnesty Security Lab links DoNot Team Android tooling to Kashmir-activist targeting
start_date: 2023-04-01
disclosure_date: 2023-10-31
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Amnesty International's Security Lab documented the use of
  Android spyware attributable to the DoNot Team against an
  unnamed Kashmir-area human-rights activist. The implants were
  delivered via WhatsApp social engineering. The report extends
  Amnesty's October 2021 finding that DoNot tooling was sold by
  the Indian commercial vendor Innefu Labs and used in
  Indian-state operations against domestic civil society.
false_flag_risk: none
summary: |
  One of the clearest publicly available evidentiary chains
  from a documented contractor (Innefu Labs) through tooling
  (the yty framework) to operational use (DoNot Team) against
  Indian-state political targets (Kashmir activists). This is
  the strongest "state-contractor handshake" datum for the
  Indian cyber program in open-source as of 2026.
