id: 2023-10/amnesty-donot-kashmir
name: CYFIRMA documents DoNot Team Android spyware on Google Play targeting individuals in Kashmir and Pakistan (2023)
start_date: 2023-06-01
disclosure_date: 2023-06-16
end_date: null
incident_type:
  - intrusion
  - surveillance
  - data-theft
initial_vector: phishing
outcome_summary: |
  CYFIRMA documented a DoNot Team (APT-C-35) Android campaign
  distributed through the official Google Play Store. Three apps
  were hosted under an account named "SecurITY Industry" — Device
  Basic Plus, nSure Chat, and iKHfaa VPN — of which nSure Chat and
  iKHfaa VPN carried malicious functionality. The implants used
  otherwise-clean Android libraries to fetch the victim's contacts
  and location, and the C2 server logged the installing user's
  username and password in plain text. CYFIRMA assessed, "with a
  moderate level of confidence", that the Play Store account was
  linked to DoNot, which it said "recently targeted individuals in
  the Kashmir region" and was also "using Android payload against
  individuals in the Pakistan region" — adding that "it is still
  unknown what drives them to conduct cyber strikes in the South
  Asian region".
false_flag_risk: none
summary: |
  A 2023 datapoint for DoNot Team's Android collection lane: the
  India-aligned cluster's move to abuse the official Google Play
  Store (rather than only sideloaded/lure-delivered APKs) to reach
  individuals in Kashmir and Pakistan. The exfiltration set
  (contacts, location, plaintext credentials) is intelligence-value
  collection against individuals of interest. The disclosing vendor,
  CYFIRMA, is India-headquartered and attributes to DoNot at moderate
  confidence while explicitly declining to state a motive, so the
  campaign reads equally as domestic internal-security surveillance
  (the Kashmir slice) and foreign regional collection (the Pakistan
  slice).
attributions:
  - actor_id: in/unscoped/donot-team
    attributing_org: CYFIRMA
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-06-16
    attribution_source_id: cyfirma/2023-06-16_donot-android-google-play
    notes: |
      CYFIRMA links the "SecurITY Industry" Google Play account to
      "APT DoNot" "with a moderate level of confidence" (named cluster
      + India nexus by cluster identity; no Indian service/unit named
      and no sponsor motive asserted — hence named-actor, not
      named-unit, and the actor stays in/unscoped). CYFIRMA is
      India-headquartered and cluster-consistent with prior ESET /
      Morphisec reporting, not independently service-level — hence
      moderate / concur-with-caveat.
doctrine_links:
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      DoNot is a canonical Indian-aligned South-Asia collection
      cluster, and CYFIRMA observed this campaign targeting
      individuals in the Kashmir region and the Pakistan region —
      foreign/adversary-region collection of the kind this doctrine
      encodes. Plausible, not higher: CYFIRMA explicitly states "it
      is still unknown what drives them to conduct cyber strikes in
      the South Asian region", i.e. names no strategic purpose, and a
      domestic internal-security reading of the Kashmir slice
      competes. Pillar left null: the victims are unspecified
      "individuals", not a diplomatic or military target that pins a
      single pillar.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Foreign regional collection (regional-collection-pakistan-china): the campaign's targeting of individuals in the Pakistan region reads as foreign-adversary collection across South Asia, the doctrine's core."
        - "Domestic internal-security / political surveillance: the Kashmir-region individuals reasonably read as domestic surveillance of civil society inside India-administered territory, which the contractor political-espionage pillar covers instead."
    contested: false
    analyst: claude
  - doctrine_id: in/contractor-hack-for-hire
    pillar_id: in/contractor-hack-for-hire/political-espionage
    program_id: null
    confidence: plausible
    reasoning: |
      The Kashmir-region individual targeting reads as domestic
      political / internal-security surveillance of civil society,
      which the political-espionage pillar (government + civil-society
      targeting) covers; DoNot is the Innefu-linked, contractor-adjacent
      cluster per the actor record and the separate 2021 Amnesty Togo
      report. Plausible, not higher: THIS source (CYFIRMA, June 2023)
      names no contractor and no purpose, and a foreign
      regional-collection reading of the same activity survives equally.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Domestic political / internal-security espionage (contractor political-espionage pillar): targeting individuals in the Kashmir region fits domestic civil-society surveillance; DoNot is the Innefu-linked contractor-adjacent cluster, but that contractor handshake is attested only in the separate 2021 Amnesty Togo source/event, not in this CYFIRMA report."
        - "Foreign regional state collection (regional-collection-pakistan-china): the same campaign also targets individuals in the Pakistan region, i.e. foreign regional collection rather than the privatized hack-for-hire ecosystem; this report names no contractor."
    contested: false
    analyst: claude
targets:
  - target_id: sectors/civil-society
    role: primary
sources:
  - cyfirma/2023-06-16_donot-android-google-play
