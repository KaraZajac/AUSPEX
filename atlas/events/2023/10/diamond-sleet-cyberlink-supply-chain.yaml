id: 2023-10/diamond-sleet-cyberlink-supply-chain
name: Diamond Sleet CyberLink supply-chain compromise
start_date: 2023-10-20  # MSTIC dates trojan distribution to mid-late October
disclosure_date: 2023-11-22
end_date: 2023-11-22
incident_type:
  - supply-chain
  - intrusion
initial_vector: supply-chain
outcome_summary: |
  Diamond Sleet (Microsoft taxonomy for Lazarus / ZINC)
  compromised CyberLink Corp's software supply chain and
  distributed a trojanized CyberLink installer (LambLoad) via
  legitimate update infrastructure starting late October 2023.
  Compromise affected machines across more than 100 countries
  in education, IT, government, and defense sectors.
  Microsoft notified affected customers and revoked the
  weaponized certificate. The campaign represented Diamond
  Sleet's largest software supply-chain reach to date,
  pre-dating the same cluster's role in subsequent 2024-2025
  operations.
false_flag_risk: none
summary: |
  Major Microsoft-attested Lazarus supply-chain compromise
  bridging the financial-theft and strategic-tech-collection
  pillars. CyberLink victims include sectors of strategic
  collection interest (education, defense, IT-managed
  services) but also crypto-developer workstations consistent
  with the 2023-2024 revenue-aggregation tempo. The
  Taiwan-headquartered software-vendor staging is itself
  doctrinally interesting — DPRK leveraging Taiwan-supply-chain
  positioning to reach a global victim pool.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: Microsoft Threat Intelligence
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-11-22
    attribution_source_id: microsoft/2023-11-22_diamond-sleet-cyberlink
    notes: |
      MSTIC attribution by tradecraft, infrastructure
      overlap, and code-signing certificate lineage to
      prior Diamond Sleet operations. "Diamond Sleet" is
      Microsoft's cluster name for the Lazarus /
      Labyrinth Chollima superset.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: plausible
    reasoning: |
      Diamond Sleet's broader operations include crypto-wallet
      drainage, but Microsoft observed no hands-on-keyboard activity
      for this CyberLink campaign and lists media/defense/IT victims;
      the revenue-aggregation link rests on the cluster's general
      pattern, not this campaign's documented outcome.
    inference_basis:
      alternatives:
        - "Microsoft observed no hands-on-keyboard / crypto-drainage for this campaign (lists media/defense/IT victims) — the revenue link rests on Diamond Sleet's general pattern"
      ruled_out: "crypto-wallet drainage documented for THIS CyberLink campaign — not in the source (no hands-on-keyboard observed yet)"
    contested: false
    analyst: claude
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/strategic-tech-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Victim set spans education, government, and defense
