id: 2023-10/hunters-international-bitdefender-disclosure
name: Bitdefender attribution of Hunters International as Hive-code successor
start_date: 2023-10-01
disclosure_date: 2023-10-20
end_date: 2023-10-20
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  Bitdefender Labs published analysis identifying approximately
  60% code overlap between the newly-active Hunters International
  ransomware payload and the previously disrupted Hive
  ransomware operation. Hive infrastructure had been seized in
  January 2023 by an FBI / DOJ / German BKA operation; Hunters
  International first appeared on leak sites in October 2023.
  The Bitdefender disclosure was the basis for industry consensus
  that Hunters International either acquired Hive source code
  or comprised Hive personnel post-takedown, although operator
  continuity remains contested and Hunters operators publicly
  denied direct lineage.
false_flag_risk: none
summary: |
  Foundational documentary event for `criminal/hunters-
  international`. AUSPEX places under `criminal/` rather than
  carrying over the `ru/proxies/hive` classification because
  operator continuity is contested and no specific FSB-tolerance
  attribution has been made about Hunters International. The
  Hive predecessor is tracked separately at `ru/proxies/hive`.
