id: 2023-10/hunters-international-bitdefender-disclosure
name: Bitdefender attribution of Hunters International as Hive-code successor
start_date: 2023-10-01
disclosure_date: 2023-11-09
end_date: 2023-11-09
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Bitdefender Labs (Martin Zugec, 9 November 2023) published analysis
  of the newly-active Hunters International ransomware, corroborating
  that its payload is derived from the previously-disrupted Hive
  ransomware code base. Independent researcher @BushidoToken had
  reported "at least a 60% match between the two sets of code" and
  malware analyst rivitna assessed the sample as "Hive ransomware
  version 6". Hive infrastructure had been seized in January 2023 by
  the FBI with German and Dutch law enforcement; Hunters International
  first appeared on leak sites in October 2023. Crucially, Bitdefender
  did NOT conclude that Hunters is a Hive rebrand: it found "believable"
  the group's own claim to be an independent ransomware group that
  "acquired the source code and infrastructure from Hive", noting
  Hunters places a greater emphasis on data exfiltration than on
  encryption. Hunters operators publicly denied being a rebrand,
  stating the Hive source code was sold and "we are those who purchased
  them". Operator continuity remains contested; the "possible rebrand"
  framing originated with other researchers (BleepingComputer/rivitna),
  not with Bitdefender, whose own reading favours a distinct group that
  acquired the code.
false_flag_risk: none
summary: |
  Foundational documentary event for `criminal/hunters-international`.
  Both Hunters International and its Hive predecessor are tracked under
  the `criminal/` namespace (the predecessor at `criminal/hive`, moved
  there from an earlier `ru/proxies/hive` / `ru/unscoped/hive`
  classification once no source-documented Russian-state nexus was
  found). AUSPEX keeps the two as SEPARATE actor records rather than
  merging Hunters into Hive because operator continuity is contested —
  Bitdefender found credible Hunters' claim to be an independent group
  that acquired Hive's source code, and no state-nexus attribution has
  been made about either group.
attributions:
  - actor_id: criminal/hunters-international
    attributing_org: Bitdefender Labs
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-11-09
    attribution_source_id: bitdefender/2023-10-20_hunters-international-hive-overlap
    notes: "Bitdefender (Zugec, 2023-11-09) identifies Hunters International as a distinct named actor running a Hive-derived payload. It corroborates the code overlap (@BushidoToken's 'at least a 60% match'; rivitna's 'Hive ransomware version 6' sample) but explicitly does NOT call it a Hive rebrand: 'After our analysis, we find the statement from Hunters International believable' — i.e. an 'independent ransomware group that acquired the source code and infrastructure from Hive', with 'greater emphasis on data exfiltration'. High confidence on actor identity + code lineage; the rebrand-vs-acquisition origin question is hedged by the source. attribution_level = named-actor (a specific group is named; no nation or unit — criminal/, no state nexus)."
doctrine_links: []
targets:
