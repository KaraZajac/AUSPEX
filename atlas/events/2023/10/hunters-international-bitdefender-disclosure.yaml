  notes: |
    RE-SOURCE (badrabbit model). The event previously rested on ONE mislabeled
    Bitdefender citation with url:null and a FABRICATED title ("Unpacking Hunters
    International: Hive Ransomware's Code Lineage" — no such article). The real
    Bitdefender article was located, live-fetched, hashed, and its metadata fixed
    in place (id/slug unchanged per the stable-slug rule); a second corroborating
    source (BleepingComputer) was created. Both sources HTTP 200, snapshotted +
    hashed. Sources audited:
      S1 bitdefender/2023-10-20_hunters-international-hive-overlap — "Hive
         Ransomware's Offspring: Hunters International Takes the Stage" (Martin
         Zugec), sha256 7936583a…544b44c9, 117,809 bytes.
      S2 bleepingcomputer/2023-10-29_hunters-international-possible-hive-rebrand —
         "New Hunters International ransomware possible rebrand of Hive" (Ionut
         Ilascu), sha256 5df77fb1…e8522755, 90,965 bytes.

    [a] FACTS — all now source-carried.
      * "~60% / at least a 60% code overlap": S1 verbatim — "@BushidoToken also
        found multiple code overlaps and similarities, reporting at least a 60%
        match between the two sets of code"; S2 — "code overlaps and similarities
        that match more than 60% of the code in Hive ransomware". CORRECTED the
        prose so the 60% figure is attributed to @BushidoToken (cited/corroborated
        by Bitdefender), not originated by Bitdefender. Added rivitna's "Hive
        ransomware version 6" assessment (S2 verbatim).
      * Hive Jan-2023 takedown: S1 verbatim — "In January 2023, the FBI
        collaborated with law enforcement agencies in Germany and the Netherlands
        to successfully dismantle … Hive". CORRECTED "FBI / DOJ / German BKA" ->
        "FBI with German and Dutch law enforcement" (the original omitted the
        Netherlands).
      * Hunters emergence "October 2023": supported by S2 (published 2023-10-29,
        describing the brand as newly emerged). start_date 2023-10-01 kept as an
        October-2023 month-anchor best estimate.
      * Hunters' denial: S2 verbatim — group is "a new service on the ransomware
        scene who purchased the encryptor source code from the Hive developers …
        'All of the Hive source codes were sold … and we are those who purchased
        them'". Carried.
    [b] ATTRIBUTION — KEY NUANCE CORRECTED. The event framed Bitdefender as
        attesting Hunters "either acquired Hive source code OR comprised Hive
        personnel post-takedown". S1 does NOT support the personnel/rebrand limb:
        verbatim — "After our analysis, we find the statement from Hunters
        International believable"; the statement being that "rather than being a
        rebranded iteration of Hive, they are an independent ransomware group that
        acquired the source code and infrastructure from Hive", with "primary focus
        on data exfiltration". Bitdefender's own reading FAVOURS a distinct group
        that bought the code, not a rebrand/personnel continuity. outcome_summary,
        summary and attribution notes rewritten to reflect this; "possible rebrand"
        framing correctly re-attributed to other researchers (S2 headline/rivitna),
        not Bitdefender. attributing_org_confidence kept high (Bitdefender is
        confident on actor identity + Hive code lineage; the origin question is the
        hedged part, now stated).
    [c] DATES — CORRECTED. S1 published_on was 2023-10-20 (wrong) -> 2023-11-09
        (S1 verbatim byline "Martin Zugec November 09, 2023"). Event
        disclosure_date and end_date 2023-10-20 -> 2023-11-09 (the Bitdefender
        publication this event is named for). attribution_date 2023-10-20 ->
        2023-11-09. S2 published_on set to 2023-10-29 (verbatim body byline
        "October 29, 2023"). NOTE: the source id slug keeps 2023-10-20 (stable-slug
        rule) and is now a legacy date artifact — flagged in the source notes.
    [d] DOCTRINE_LINKS — [] retained and correct. Hunters International is a
        financially-motivated criminal actor with no source-documented state nexus
        (placed criminal/); no doctrine genuinely applies. No attested link, so no
        attesting_source_id required. Not invented.
    [e] ATTRIBUTION_LEVEL — added `named-actor` (was absent): Bitdefender/S2 name a
        specific group ("Hunters International"); no nation-state or unit is named,
        consistent with the criminal/ placement.
    [f] ACTOR_ID — criminal/hunters-international resolves to a real file. Hive
        predecessor resolves to criminal/hive (NOT ru/proxies/hive). CORRECTED the
        two stale `ru/proxies/hive` references in the event summary. tier of S1
        upgraded secondary -> primary (first-party tier-1 vendor's own research).

    FLAGS for orchestrator/Kara (no actor edits made here):
      * ACTOR criminal/hunters-international.yaml: (1) its alias note says
        "~60% match per Bitdefender Oct 2023 analysis" — the real Bitdefender
        analysis is 2023-11-09 (November), fix the month; (2) its `notes` still say
        "The Hive predecessor is separately tracked at `ru/proxies/hive`" — stale;
        should read `criminal/hive`. (3) active_until 2025-01-01 with a World Leaks
        rebrand comment is plausible but unverified in these two sources — the
        World-Leaks shift was publicly reported ~2025 (Group-IB/BleepingComputer);
        confirm the exact date if that field is load-bearing.
      * SOURCE metadata fix on bitdefender/2023-10-20_hunters-international-hive-overlap
        also improves two OTHER events that cite it
        (2024-03/hoya-hunters-international, 2024-02/integris-hunters-international-doxing)
