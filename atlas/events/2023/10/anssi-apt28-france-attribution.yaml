id: 2023-10/anssi-apt28-france-attribution
name: ANSSI / CERT-FR attributes 2021-2023 intrusion campaign against French entities to APT28
start_date: 2021-01-01  # activity "depuis la seconde moitié de l'année 2021" per CERTFR-2023-CTI-009
disclosure_date: 2023-10-26
end_date: 2023-10-26  # publication/attribution act; underlying APT28 activity ongoing per the report
incident_type:
  - espionage
  - documentary
initial_vector: phishing
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2023-CTI-009 (26 October 2023)
  characterizing sustained APT28 intrusion campaigns against
  French entities — government bodies, businesses, universities,
  research institutes, and think tanks (activity since the second
  half of 2021), for espionage. CERT-FR walks tradecraft including
  the CVE-2023-23397 Outlook zero-click 0-day (a crafted email /
  Outlook meeting request triggers automatic SMB authentication,
  yielding a Net-NTLMv2 hash the operators relay onward), an
  attack infrastructure built on 11 compromised Ubiquiti routers
  and 12 compromised business mailboxes, brute-force against
  exposed webmail / firewalls, and credential-theft tooling
  (Mimikatz, CredoMap, reGeorg) — including CVE-2020-0688 /
  CVE-2020-17144 against an exposed Microsoft Exchange OWA server.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  AUSPEX records the event as a French defensive-attribution
  action — ANSSI / CERT-FR publicly characterizing the APT28
  "mode opératoire" (intrusion set) affecting French entities.
  ANSSI attributes at the intrusion-set level only: CTI-009 names
  the "APT28" activity cluster but does NOT itself state a nation
  or service (the "Russian GRU" descriptor appears only in the
  bibliography, as an NSA citation) — the GRU / Unit 26165 mapping
  in the actor row is the established MISP-galaxy / analyst
  placement, not ANSSI's claim. Two doctrine linkages are
  recorded: LID (France's defensive doctrine — the CERT-FR
  coordination / public-attribution function, defender-response)
  and the Russian FPC-2023 counter-"unfriendly-states" pillar
  (the GRU's strategic-intelligence rationale, attacker-rationale).
  Editorially significant: ANSSI is one of the few European CERTs
  that publishes adversary tradecraft at this level of detail.
attributions:
  - actor_id: ru/gru/26165/apt28
    attributing_org: ANSSI / CERT-FR
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-10-26
    attribution_source_id: anssi/2023-10-26_apt28-campagnes-attaques
    notes: |
      ANSSI/CERT-FR attributes with high confidence to the "mode
      opératoire APT28" (the APT28 intrusion set / activity cluster)
      but does NOT itself name a nation or service in CTI-009 — the
      only "Russian GRU" reference is a bibliography citation to an
      NSA advisory, not ANSSI's own attribution. Hence
      attribution_level: activity-cluster (named cluster, no
      ANSSI-stated nation), NOT named-actor/named-unit. The actor_id
      ru/gru/26165/apt28 reflects the established MISP-galaxy /
      analyst placement of APT28; auspex_assessment is
      concur-with-caveat because that GRU-Unit-26165 specificity is
      AUSPEX's, beyond what ANSSI stated in this report.
doctrine_links:
  - doctrine_id: fr/lutte-informatique-defensive
    perspective: defender-response
    pillar_id: fr/lutte-informatique-defensive/cert-fr-coordination
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A CERT-FR public report characterizing a foreign adversary's
      intrusion set affecting French entities — and issuing
      defensive recommendations (CTI-009 section 3) — is a canonical
      instance of the LID CERT-FR-coordination / advisory-publication
      pillar. Downgraded from attested to strongly_inferred: the
      report operationalizes the defensive function but does not name
      "lutte informatique défensive (LID)" or state that doctrinal
      purpose, so the doctrine-document linkage is AUSPEX's inference
      (mirrors the 2024-06 ANSSI/Nobelium sibling event).
    attesting_source_id: anssi/2023-10-26_apt28-campagnes-attaques
    inference_basis:
      source_id: anssi/2023-10-26_apt28-campagnes-attaques
      signals:
        - "ANSSI/CERT-FR publicly characterizes the APT28 intrusion set affecting French entities and issues defensive recommendations (the CERT-FR coordination / advisory-publication function)"
        - "The report is an instance of the CERTFR-NNNN-CTI advisory series the pillar names (CERTFR-2023-CTI-009)"
      ruled_out: "the LID doctrine by name — not named in the report"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/fpc-2023
    pillar_id: ru/fpc-2023/anti-anglo-saxon
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      GRU (APT28 / Unit 26165) sustained espionage against a NATO/EU
      state's government bodies, universities, research institutes,
      and think tanks is strategic-intelligence collection against an
      "unfriendly state" — the FPC-2023 anti-unfriendly-states
      pillar's doctrinal license for operations against Western
      government and think-tank ecosystems "perceived as instruments
      of Western policy" (the pillar's own words; its target_sectors
      include government/foreign-ministry and civil-society/think-tank).
    attesting_source_id: null
    inference_basis:
      signals:
        - "ANSSI states the purpose is espionage ('utilisées à des fins d'espionnage') and observed exfiltration 'concentrées uniquement sur la récupération de courriels' — covert intelligence collection, no leak/influence component"
        - "Actor is GRU military intelligence (APT28 / Unit 26165); victims are a NATO/EU state's government, academic, research and think-tank institutions — France is on Russia's 'unfriendly states' list under FPC-2023"
        - "Target profile matches the anti-anglo-saxon pillar's enumerated sectors (government, think-tank), and this pillar is in APT28's default_doctrine_alignment_ids"
      ruled_out: "ru/military-doctrine-2014/destabilization-via-info (information-enabled destabilization / hack-and-leak): ruled out because this campaign is covert email-collection espionage with no leak, influence, or destabilization component"
    counter_explanation: null
    contested: false
    analyst: claude
