id: 2023-10/anssi-apt28-france-attribution
name: ANSSI / CERT-FR attributes 2021-2023 intrusion campaign against French entities to APT28
start_date: 2021-01-01  # sustained activity since 2021 per CERT-FR
disclosure_date: 2023-10-26
end_date: 2023-10-26
incident_type:
  - espionage
  - documentary
initial_vector: phishing
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2023-CTI-009 (26 October 2023)
  attributing a sustained intrusion campaign against French
  government, diplomatic, research, and think-tank entities
  (active since 2021) to the APT28 / Fancy Bear / Forest Blizzard
  intrusion set. CERT-FR walks tradecraft including Outlook NTLM
  relay exploit chains, Ubiquiti EdgeOS router-compromise
  infrastructure, and credential-theft tooling against Microsoft
  Exchange / Outlook endpoints.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  AUSPEX records the event as a French defensive-attribution
  action — ANSSI publicly naming an adversary intrusion set
  affecting French entities. The doctrine linkage is to LID
  (French defensive doctrine, the act of public attribution) and
  to the Russian adversary doctrine (which lives in the ru/
  hierarchy and is referenced via the actor row). Tradecraft
  detail is unusually specific for a CERT-FR public report and is
  editorially significant: ANSSI is one of the few European
  CERTs that names adversary clusters publicly at the intrusion-
  set level.
attributions:
