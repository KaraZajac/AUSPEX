  notes: |
    Audited vs ANSSI/CERT-FR CERTFR-2023-CTI-009 "Campagnes d'attaques du mode opératoire
    APT28 depuis 2021" (26 Oct 2023). RAW captured: landing-page HTML (sha256
    224ba614…f17a2143, 16,272 B) + the linked 23-page PDF report (raw_snapshot; sha256
    08b62bfd…4725efa7, 2,487,153 B) — all facts verified against the PDF.
    [a] FACTS ✓ (corrected). CVE-2023-23397 confirmed 10× and explicitly a "vulnérabilité
    0-day … affectant le produit Outlook pour Windows … de mars 2022 … jusqu'en juin 2023";
    ZERO-CLICK confirmed twice: §2.3 "Certaines vulnérabilités ne nécessitent pas d'action de
    la part de l'utilisateur" (footnote: "Dont la CVE-2023-23397") and the mechanism "Les
    comptes ciblés réalisent automatiquement une tentative d'authentification auprès d'un
    service SMB contrôlé par l'attaquant … récupérer le condensat … Net-NTLMv2 … relayer" =
    Outlook NTLM-relay. Infra "onze routeurs Ubiquiti compromis" + "au moins douze comptes de
    messagerie" (Fig. 2.1). Exchange OWA: CVE-2020-0688 + CVE-2020-17144; tooling Mimikatz,
    reGeorg, CredoMap, Graphite/DriveOcean (OneDrive/Google Drive C2). CORRECTIONS: removed
    "Ubiquiti EdgeOS" — "EdgeOS" appears 0× in the source (only "routeurs Ubiquiti"); removed
    "diplomatic" victim framing — 0 matches for diplomat/affaires-étrangères/ministère/
    ambassade in the report; named CVE-2023-23397 explicitly in outcome_summary.
    [b] ATTRIBUTION (corrected). ANSSI attributes ONLY to "le mode opératoire APT28" (intrusion
    set); it never states a nation or service in its own voice — the sole "Russian GRU" text is
    a bibliography citation to NSA. Set attribution_level: activity-cluster (was missing);
    changed auspex_assessment concur → concur-with-caveat and added attribution notes: the
    ru/gru/26165/apt28 actor_id is the established MISP-galaxy/analyst placement, beyond ANSSI's
    in-report specificity. attributing_org_confidence high retained (a confident intrusion-set
    attribution).
    [c] DATES ✓. published_on/attribution_date/disclosure_date = 2023-10-26 (report date).
    start_date 2021-01-01 carries "depuis 2021"/"seconde moitié de 2021". end_date kept at the
    publication date per the documentary-event convention (cf. 2024-06 ANSSI/Nobelium sibling);
    underlying activity is ongoing ("les attaquants poursuivent leurs campagnes").
    [d] DOCTRINE_LINKS (corrected + added). LID/cert-fr-coordination (defender-response)
    DOWNGRADED attested → strongly_inferred: the report performs but does not name the LID
    doctrine or state its purpose — mirrors the audited 2024-06 ANSSI/Nobelium sibling's
    identical link; added inference_basis (signals + ruled_out), kept attesting_source_id as
    the primary supporting source. ADDED the ru attacker-rationale link ru/fpc-2023/
    anti-anglo-saxon (strongly_inferred, attesting_source_id null): ANSSI states only the
    proximate purpose (espionage), so not attested; GRU vs a NATO/EU state's govt/academic/
    think-tank ecosystem triangulates to strategic collection against an "unfriendly state"
    (the pillar's own target_sectors include government + think-tank, and it is in APT28's
    default alignment). ruled_out: military-doctrine-2014/destabilization-via-info (no
    leak/influence here — exfiltration "concentrées uniquement sur la récupération de courriels").
    [e] ATTRIBUTION_LEVEL set to activity-cluster (see [b]).
    [f] ACTOR_ID ru/gru/26165/apt28 resolves → atlas/actors/ru/apt28.yaml (id matches); actor
    record is well-sourced (DOJ/NCSC/UK-gov), not provisional. No actor edit made.
    TARGETS (corrected): removed sectors/government/foreign-ministry (unsupported — no
    diplomatic/MFA mention); kept sectors/government (entités gouvernementales) + academic/
    research-lab (instituts de recherche); ADDED academic/university (universités) + civil-
    society/think-tank (groupes de réflexion / think tanks); lowercased country FR → fr.
    RESIDUAL: CTI-009 also names "entreprises" (businesses) as victims, but the sector taxonomy
    has no generic private-sector node and the report names no vertical, so it is omitted rather
    than mis-mapped (no sector inflation). Level: full — load-bearing source fully snapshotted
    and every retained claim source-carried.
