id: 2023-10/al-kuwaiti-gitex-50000-daily-attacks
name: UAE CSC Head Al-Kuwaiti articulates 50,000-daily-attack threat posture at GITEX 2023
start_date: 2023-10-16
disclosure_date: 2023-10-18
end_date: 2023-10-20
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  Dr Mohamed Hamad Al-Kuwaiti, UAE Head of Cyber Security
  (Cyber Security Council, CSC), publicly articulates the UAE
  defensive-posture framing at GITEX Global 2023 (Dubai): the
  CSC's claimed average of 50,000 daily cyberattacks against UAE
  government infrastructure, ~70% YoY ransomware reduction in
  2023 vs 2022, and the framing of UAE as the Gulf region's
  cybersecurity-defence leader. Coverage in AGBI consolidates
  Al-Kuwaiti's public statements at GITEX and adjacent venues.
false_flag_risk: none
summary: |
  Doctrine-publication anchor for AUSPEX's digital-economy-
  protection doctrine entry through 2023-2024. Records the
  external-facing CSC narrative (defensive posture, threat-volume
  framing, regional-leadership positioning) that AUSPEX uses
  alongside the procurement-led-capability and regime-protection-
  surveillance doctrines as a documentary counterweight — the
  UAE's defensive-resilience public posture is what the country
  publishes; the offensive-procurement posture is what the
  forensic / journalistic record documents. Both are real;
  AUSPEX records both factually.
