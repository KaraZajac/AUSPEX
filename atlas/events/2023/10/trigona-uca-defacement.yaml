id: 2023-10/trigona-uca-defacement
name: Ukrainian Cyber Alliance defaces Trigona ransomware leak site
start_date: 2023-10-12
disclosure_date: 2023-10-17
end_date: 2023-10-31
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  Ukrainian Cyber Alliance (UCA) — a Ukrainian hacktivist
  collective — claimed Oct 17 2023 to have breached the Trigona
  ransomware leak-site infrastructure, exfiltrated data, released
  decryption keys to victims, and wiped servers. Trigona operations
  largely ceased thereafter. The defacement is the only known
  case of a Russian-aligned criminal ransomware operation
  disrupted by a Ukrainian-state-aligned hacktivist group rather
  than a Western law-enforcement coalition.
false_flag_risk: none
summary: |
  Edge case in the criminal-disruption taxonomy: hacktivist-
  collective action substituting for state law-enforcement
  capacity. The UCA defacement happened in the context of
  Ukraine's broader 2022–24 hacktivist mobilization (the
  Ukrainian IT Army) and the parallel CARR / Killnet /
  NoName057(16) Russian-aligned hacktivist mobilization. AUSPEX
  records the Trigona-UCA case as an asymmetric instance of
  the same hacktivist-proxy pattern operating in reverse.
attributions:
  - actor_id: criminal/trigona
    service_id: null
    attributing_org: UCA (self-claimed)
    attributing_org_confidence: high
    auspex_assessment: partial
    attribution_date: 2023-10-17
    attribution_source_id: uca/2023-10-17_trigona-defacement
    notes: |
      UCA does not yet exist as an actor entry in AUSPEX. Add in
      subsequent pass with the Ukrainian IT Army / pro-Ukraine
      hacktivist taxonomy.
