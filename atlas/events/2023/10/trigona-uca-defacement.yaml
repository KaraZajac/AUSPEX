id: 2023-10/trigona-uca-defacement
name: Ukrainian Cyber Alliance defaces Trigona ransomware leak site
start_date: 2023-10-12
disclosure_date: 2023-10-18
end_date: 2023-10-18
incident_type:
  - disruption
  - intrusion
  - data-theft
  - destructive
initial_vector: n-day
outcome_summary: |
  The Ukrainian Cyber Alliance (UCA), a pro-Ukraine hacktivist
  NGO, breached the Trigona ransomware gang's infrastructure using
  a public exploit for CVE-2023-22515 (an Atlassian Confluence Data
  Center / Server privilege-escalation flaw), held undetected
  access for about a week, then — per BleepingComputer's reporting
  of the activists' own account — exfiltrated data (source code,
  database records, the developer environment, and cryptocurrency
  hot wallets) before deleting, defacing, and taking offline
  Trigona's administration and victim panels, its blog, and its
  data-leak site. UCA said it did NOT know whether the exfiltrated
  data contained victim decryption keys and would release any it
  found; no decryptor release was confirmed at disclosure. As of
  the report, none of Trigona's public websites or services were
  online.
false_flag_risk: none
summary: |
  Counter-op / edge case in the criminal-disruption taxonomy: a
  hacktivist collective, not a state law-enforcement coalition,
  disrupted a criminal ransomware operation. DIRECTIONALITY IS
  INVERTED relative to a normal event — the ACTOR / attacker is the
  Ukrainian Cyber Alliance (UCA) and the VICTIM is the Trigona
  criminal ransomware gang; earlier corpus modeling wrongly listed
  criminal/trigona as the actor here (corrected 2026-07-02).
  BleepingComputer describes UCA as a pro-Ukraine hacktivist group,
  registered as a non-governmental organization with secret
  membership, that breached, looted, wiped, and defaced Trigona's
  infrastructure in October 2023 via a public exploit for the
  Confluence flaw CVE-2023-22515. The cited source supports neither
  a "Russian-aligned" characterization of Trigona (it is a
  Russian-speaking profit-criminal operation with no documented
  state nexus — see criminal/trigona) nor a "state-aligned"
  characterization of UCA (an independent NGO, not a documented
  state organ).
