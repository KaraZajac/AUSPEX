  notes: |
    Audited vs the RAW BleepingComputer article "Ukrainian activists hack Trigona ransomware
    gang, wipe servers" (Bill Toulas), snapshot uca__2023-10-17_trigona-defacement.html,
    sha256 afc0fa52…522d382c, 93804 bytes — already on disk; hash RE-VERIFIED against the
    source record's content_sha256 (match). STEP-0 triage: NOT a phantom — the raw is the
    genuine article and its body carries the event's core claims; normal in-place audit (no
    re-source / retire).

    [a] FACTS. Source-carried: breach "by using a public exploit for CVE-2023-22515" (Confluence
    Data Center/Server) → initial_vector corrected unknown→n-day; "first breached … about six
    days ago, established persistence, and mapped the cybercriminal's infrastructure completely
    unnoticed"; "over the next week, the activists managed to take all the information"; exfil of
    "the developer environment, cryptocurrency hot wallets as well as the source code and
    database records"; "hacked the servers … and wiped them clean", "deleted and defaced their
    sites"; "none of the Trigona ransomware public websites and services are online". CORRECTIONS:
    (1) removed "released decryption keys to victims" — the source says the OPPOSITE: "The
    activists don't know if the information they transferred contains any decryption keys but they
    said they would release them if found" (conditional, no confirmed release). (2) "Russian-
    aligned criminal ransomware operation" softened — the source calls Trigona only "the gang" /
    "the cybercriminals" / "Trigona hackers" running a Monero double-extortion op; no state nexus
    (criminal/trigona actor file already de-nexused ru/proxies→criminal/). (3) "Ukrainian-STATE-
    aligned hacktivist group" softened — the source explicitly: UCA "now registered as a non-
    governmental organization", membership "secret", work "governed by the civic duty" → an
    independent NGO, NOT a state organ. (4) removed unsourced editorial cross-refs (Ukrainian IT
    Army; CARR/Killnet/NoName057(16) "hacktivist-proxy pattern operating in reverse") — this source
    carries none of them.

    [b] ATTRIBUTION. DIRECTIONALITY INVERTED (the load-bearing defect): the prior record listed
    actor_id criminal/trigona with attributing_org "UCA (self-claimed)" — i.e. it modeled UCA
    attributing an op TO Trigona, backwards for a counter-op. Corrected so the ACTOR is UCA (the
    attacker) and Trigona is the VICTIM. actor_id set null (no UCA/ua actor record exists; Ukraine
    is not a modeled nation-state). attributing_org = UCA self-claim relayed by BleepingComputer;
    attributing_org_confidence high (open self-claim + independent corroboration that Trigona's
    sites are down); auspex_assessment concur-with-caveat (exfil specifics self-reported). Shape is
    precedented: cf. 2012-10/nyt-apt12 (actor_id null + attribution_level named-actor + concur-
    with-caveat).

    [c] DATES. Source published_on corrected 2023-10-17→2023-10-18 per the raw JSON-LD
    (datePublished "2023-10-18T19:17:43-04:00", dateModified "2023-10-18T19:23:11-04:00"). This
    re-anchors "about six days ago" to 2023-10-12 → start_date 2023-10-12 KEPT (it is correct only
    against the Oct-18 pub date). disclosure_date & attribution_date 2023-10-17→2023-10-18 to match
    the sole cited source. end_date 2023-10-31→2023-10-18: the "2023-10-31" was UNSUPPORTED (no
    such date anywhere in the source; the wipe/defacement is reported already complete and all
    sites offline as of the Oct-18 report). The event/source SLUGS keep their legacy "2023-10-17"
    stamp (stable-slug policy; slug date ≠ corrected published_on). RESIDUAL: the story broke in
    the wild ~Oct 17 (herm1t's screenshots + other outlets); a second source (e.g. The Record,
    2023-10-17) could pin public disclosure to Oct 17 — flagged as enrichment, not corrected here
    since only this Oct-18 source is cited.

    [d] DOCTRINE_LINKS. [] correct and KEPT — UCA is a non-state hacktivist NGO and Ukraine is not
    a modeled AUSPEX nation-state, so no attacker-rationale doctrine applies; none invented.

    [e] ATTRIBUTION_LEVEL. Set named-actor (was absent) — the source names a specific, registered
    organisation (the Ukrainian Cyber Alliance); no state sponsor or unit is named (or exists), so
    not nation/named-unit, and more specific than activity-cluster.

    [f] ACTOR_ID. null — the counter-op attacker (UCA) has no actor file. targets[] left empty: the
    victim is a criminal actor (criminal/trigona) with no sectors/orgs/infra registry entry, and I
