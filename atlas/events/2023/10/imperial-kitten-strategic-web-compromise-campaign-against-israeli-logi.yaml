false_flag_risk: none
summary: |
  CrowdStrike Counter Adversary Operations attributed an October 2023 wave of strategic web compromise (watering-hole) operations against Israeli transportation, maritime, logistics and technology organizations to IMPERIAL KITTEN (aka Tortoiseshell, TA456, Crimson Sandstorm, Yellow Liderc), an IRGC-suspected Iran-nexus actor active since 2017. Compromised Israeli sites profiled visitors and delivered the IMAPLoader .NET implant (email-based C2 via Yandex accounts); initial access also used job-recruitment social engineering, one-day exploits and stolen VPN credentials. This actor and campaign are NOT in the inventory and add IRGC web-compromise tradecraft to the post-Oct-7 Israel picture.
