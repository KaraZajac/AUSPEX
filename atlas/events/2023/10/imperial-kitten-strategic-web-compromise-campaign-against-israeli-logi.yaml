id: 2023-10/imperial-kitten-strategic-web-compromise-campaign-against-israeli-logi
name: "IMPERIAL KITTEN strategic web-compromise campaign against Israeli logistics and tech"
start_date: 2023-10-01
incident_type:
  - espionage
  - intrusion
  - data-theft
  - reconnaissance
false_flag_risk: none
summary: |
  CrowdStrike Counter Adversary Operations (publishing 9 Nov 2023) attributed, at moderate confidence, an October 2023 wave of strategic web compromise (watering-hole) operations against Israeli transportation, logistics and technology organizations to IMPERIAL KITTEN (aka Tortoiseshell, TA456, Crimson Sandstorm, Yellow Liderc), an Iran-nexus actor active since at least 2017 whose connection to the IRGC is suspected, not established. Compromised (primarily Israeli) sites profiled visitors and delivered the IMAPLoader .NET implant (email-based C2 via Yandex accounts), alongside StandardKeyboard, a Discord-C2 RAT and a Python reverse shell dropped by a macro-enabled Excel lure; CrowdStrike additionally attributes (at low confidence, from uncorroborated single-source reporting) initial access via job-recruitment social engineering, one-day exploits, SQL injection and stolen VPN credentials. CrowdStrike's broader targeting scope for the actor also names the Israeli maritime sector; "defense" appears only in the actor's generic historical industry list, not in the Israeli/Oct-2023 activity. This actor and campaign add Iran-nexus web-compromise tradecraft to the post-Oct-7 Israel picture, though CrowdStrike frames the Oct-2023 wave as a continuation of SWC activity it tracked across 2022-2023 rather than as a Gaza-war-triggered operation.
attributions:
  - actor_id: ir/unscoped/imperial-kitten
    attributing_org: "CrowdStrike"
    attributing_org_confidence: moderate   # CrowdStrike states "moderate confidence" verbatim
    attribution_level: named-actor          # names IMPERIAL KITTEN (Iran-nexus); IRGC only SUSPECTED -> nation-level Iran, ir/unscoped
    auspex_assessment: concur
    attribution_date: 2023-11-09
    attribution_source_id: crowdstrike/2023-10_imperial-kitten-strategic-web-compromise
    notes: "Iran-nexus with a SUSPECTED IRGC connection (not established); no specific service firmly named, hence actor ir/unscoped. CrowdStrike's own confidence on the attribution is moderate."
doctrine_links:
  - doctrine_id: ir/resistance-axis
    pillar_id: ir/resistance-axis/anti-israel-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Iran-nexus (IRGC-suspected) watering-hole operations profiling and implanting Israeli transportation, logistics and technology organizations are sustained intelligence-collection pressure against Israel — CrowdStrike assesses the actor "likely fulfills Iranian strategic intelligence requirements associated with IRGC operations" and notes a "continued focus on targeting Israeli organizations." That standing anti-Israel collection-and-access posture is the operational expression of Iran's Axis-of-Resistance logic against Israel. Note: CrowdStrike frames the October 2023 wave as a continuation of SWC activity it observed across 2022-2023 against the same Israeli sectors, not as an operation it ties to the Gaza war; the doctrine link rests on the standing anti-Israel targeting pattern, not on source-stated Oct-7 reactivity. attesting_source_id is null because the source states an intelligence-requirement purpose, not an anti-Israel-coercion goal in the doctrine's terms.
    attesting_source_id: null
    contested: false
    analyst: claude
targets:
  # Oct-2023 SWC wave firmly named by CrowdStrike: transportation/logistics + technology.
  - target_id: sectors/transport/logistics
    country: il
    role: primary
  - target_id: sectors/ict
    country: il
    role: primary
  # Maritime: not named for the Oct-2023 wave specifically, but CrowdStrike's moderate-confidence
  # assessment basis cites a "continued focus on targeting Israeli organizations in the
  # transportation, maritime and technology sectors" and "previously reported activity targeted...
  # the Israeli maritime, transportation and technology sectors" -> kept as collateral/scope.
  - target_id: sectors/transport/maritime
    country: il
    role: collateral
  # REMOVED 2026-06-24: sectors/defense was sector inflation — "defense" appears only in CrowdStrike's
  # generic historical industry list ("Historically... defense, technology, telecommunications,
  # maritime, energy..."), never tied to Israel or the October 2023 SWC activity.
sources:
