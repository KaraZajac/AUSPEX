id: 2023-09/trickbot-conti-sanctions-tranche-two
name: Second joint US / UK TrickBot / Conti sanctions tranche
start_date: 2023-09-07
disclosure_date: 2023-09-07
end_date: 2023-09-07
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  OFAC and UK FCDO designated 11 additional members of the
  TrickBot / Conti ecosystem in the second sanctions tranche.
  Names include Andrey Zhuykov ("Defender"), Maksim Galochkin
  ("Bentley"), Maksim Rudenskiy ("Buza"), Mikhail Tsarev ("Mango"),
  Dmitry Putilin ("Grad"), Sergey Loguntsov ("Begemot"). Microsoft
  Threat Intelligence Center concurrently published a TrickBot
  / Conti operator-list correlation against ContiLeaks-derived
  Jabber handles.
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
operators_named:
  - zhuykov-andrey  # TrickBot/Conti "Defender", OFAC + UK FCDO Sep 2023
  - galochkin-maksim  # TrickBot/Conti "Bentley", OFAC + UK FCDO Sep 2023
  - rudenskiy-maksim  # TrickBot/Conti "Buza", OFAC + UK FCDO Sep 2023
  - tsarev-mikhail  # TrickBot/Conti "Mango", OFAC + UK FCDO Sep 2023
  - putilin-dmitry  # TrickBot/Conti "Grad", OFAC + UK FCDO Sep 2023
  - loguntsov-sergey  # TrickBot/Conti "Begemot", OFAC + UK FCDO Sep 2023
summary: |
  Second tranche extends US / UK sanctions to the broader operator
  base of TrickBot / Conti and underscores the durability of the
  Khoroshev / Conti-style sanction pattern: identification, OFAC
  SDN listing, US-dollar-payment-rail exclusion, but no resulting
  Russian-territorial enforcement.
