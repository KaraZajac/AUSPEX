  - rudenskiy-maksim  # TrickBot/Conti coder team-lead, OFAC + UK FCDO Sep 2023 (jy1714; no OFAC moniker)
  - tsarev-mikhail  # TrickBot/Conti "Mango", OFAC + UK FCDO Sep 2023
  - putilin-dmitry  # TrickBot/Conti "Grad", OFAC + UK FCDO Sep 2023
  - loguntsov-sergey  # TrickBot/Conti developer, OFAC + UK FCDO Sep 2023 (jy1714; no OFAC moniker)
summary: |
  Second joint US / UK cyber-sanctions tranche against the
  Russia-based Trickbot / Conti ecosystem: OFAC and the UK FCDO
  designated eleven additional group members (administrators,
  managers, developers, coders), extending the first-tranche
  (Feb 2023) pattern to the broader operator base, while the DOJ
  concurrently unsealed nine related indictments. Treasury states
  that "Russia has long been a safe haven for cybercriminals",
  that group members "are associated with Russian intelligence
  services", and that the group's 2020 preparations "aligned them
  to Russian state objectives and actions taken by the Russian
  intelligence services" — the state-nexus finding AUSPEX combines
  with ContiLeaks for the criminal-state-symbiosis pattern behind
  the `ru/sanctions-response-2022/criminal-proxy-mobilization`
  pillar. Consistent with the Conti-style sanction pattern
  (identification + OFAC SDN listing), the action produced no
  resulting Russian-territorial enforcement — the safe-haven
  finding the release itself states.
