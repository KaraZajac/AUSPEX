initial_vector: unknown
outcome_summary: |
  OFAC and the UK FCDO designated eleven additional members of the
  Russia-based Trickbot / Conti ecosystem in the second joint
  sanctions tranche; the US Department of Justice concurrently
  unsealed indictments against nine individuals connected to the
  Trickbot malware and Conti ransomware schemes, including seven of
  those designated. Designees include Andrey Zhuykov ("Defender" /
  "Dif", senior administrator), Maksim Galochkin ("Bentley"), Maksim
  Rudenskiy (team lead for coders), Mikhail Tsarev ("Mango"), Dmitry
  Putilin ("Grad"), and Sergey Loguntsov (developer).
false_flag_risk: none
