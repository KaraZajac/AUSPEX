id: 2023-09/3am-symantec-discovery
name: Symantec discovery of 3AM ransomware as LockBit fallback payload
start_date: 2023-09-01
disclosure_date: 2023-09-14
end_date: 2023-09-14
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Symantec Threat Hunter Team published the first public
  documentation of the 3AM ransomware family. The discovery
  emerged from incident-response on a LockBit affiliate
  intrusion where the LockBit payload was blocked by defenses
  and the operator deployed 3AM (a previously-unknown Rust-
  based ransomware) as a fallback. The Symantec publication
  documented 3AM's encryption format, command-line options,
  and the fact that 3AM's encryptor was previously unattributed
  — establishing it as a distinct operator rather than a
  rebrand.
false_flag_risk: none
summary: |
  Foundational documentary event for the `criminal/3am` cluster.
  Notable for the operator-language interleaving observation
  (3AM deployed by a LockBit affiliate when LockBit was blocked)
  — establishes 3AM as operationally adjacent to the Russian-
  tolerated RaaS ecosystem without being itself state-attributed.
