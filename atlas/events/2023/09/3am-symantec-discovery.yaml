    attribution_source_id: symantec/2023-09-14_3am-ransomware-discovery
    notes: "Symantec documents 3AM as a new, self-named ransomware family seen in a single attack; it names no nation and states it is 'still unclear whether its authors have any links to known cybercrime organizations' — hence activity-cluster (a named malware/activity cluster), not named-actor/nation. moderate confidence tracks Symantec's own hedge ('appears to be a completely new malware family')."
