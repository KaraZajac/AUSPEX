id: 2023-09/3am-symantec-discovery
name: Symantec discovery of 3AM ransomware as LockBit fallback payload
start_date: 2023-09-01
disclosure_date: 2023-09-13
end_date: 2023-09-13
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Symantec's Threat Hunter Team published the first public
  documentation of the 3AM ransomware family. It was observed in
  a single attack in which a ransomware affiliate attempted to
  deploy LockBit and — when LockBit was blocked on the target
  network — switched to 3AM (a 64-bit, Rust-based encryptor) as a
  fallback; 3AM's own deployment was only partially successful,
  reaching three machines and being blocked on two of them.
  Symantec documented 3AM's encryption behaviour (the .threeamtime
  extension, a "0x666" file marker, and -k/-p/-h/-m/-s command-line
  options) and assessed it as "a completely new malware family,"
  while cautioning it was "still unclear whether its authors have
  any links to known cybercrime organizations" and noting that
  3AM's -h/-m ("local"/"net") arguments are "very similar to
  arguments used by Conti."
false_flag_risk: none
summary: |
  Foundational documentary event for the `criminal/3am` cluster:
  Symantec's first public report on 3AM, seen in a single attack
  where a ransomware affiliate deployed it as a fallback after
  LockBit was blocked. Symantec observed that ransomware affiliates
  have become increasingly independent of operators and that this
  was not the first time it had seen an attacker try two different
  ransomware families in a single attack. AUSPEX places 3AM under
  `criminal/` with no published state nexus; the LockBit-affiliate
  use and the Conti-similar command-line arguments Symantec noted
  are the only ties to the Russian-tolerated RaaS ecosystem, and
  are editorial context here rather than a state attribution (the
  source itself names no nation).
