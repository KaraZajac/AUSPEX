id: 2023-09/mstic-reports-peach-sandstorm-apt33-februaryjuly-2023-password-spray-c
name: "MSTIC reports Peach Sandstorm (APT33) February–July 2023 password-spray campaign with Entra ID cloud reconnaissance"
start_date: 2023-09-14
incident_type:
  - intrusion
  - espionage
  - reconnaissance
initial_vector: valid-creds
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (MSTIC) reported that between February and July 2023 Peach Sandstorm — an Iranian nation-state actor whose activity overlaps with APT33, Elfin and Refined Kitten — ran a wave of password-spray attacks against thousands of organizations, and also exploited CVE-2022-47966 (Zoho ManageEngine) and CVE-2022-26134 (Confluence) for initial access. Throughout 2023 the group consistently targeted the satellite, defense and, to a lesser extent, pharmaceutical sectors. Post-compromise the actor used AzureHound and Roadtools for reconnaissance, AnyDesk for remote access, a custom tunneling tool called EagleRelay, and abused Azure Arc for persistence. Microsoft assesses the campaign supports intelligence collection against high-value targets.
