id: 2023-09/anssi-fin12-criminal-attribution
name: ANSSI / CERT-FR publishes FIN12 ransomware-cluster threat report
start_date: 2018-01-01  # ANSSI scopes FIN12 activity since 2018
disclosure_date: 2023-09-18
end_date: 2023-09-18
incident_type:
  - documentary
  - ransomware
initial_vector: phishing
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2023-CTI-007 (18 September
  2023) attributing a sustained ransomware-affiliate operation
  (2018-2023) to the FIN12 intrusion set, which has operated
  successive ransomware brands including Ryuk, Conti, Hive,
  Nokoyawa, Royal, and BlackCat / ALPHV. CERT-FR tracks FIN12
  targeting of French health, retail, manufacturing, and
  local-government victims with technical detail on the
  intrusion-to-encryption tradecraft.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  Editorially significant as a defensive-attribution event
  recording ANSSI's willingness to publicly name an organized
  cybercriminal cluster affecting French entities — the
  criminal-side parallel to the state-side APT28 / APT29 /
  Sandworm attributions. AUSPEX records the actor_id at null
  because FIN12 sits in the cybercriminal cluster space rather
  than as a publicly-state-attributed entity; ANSSI is the
  attributing organization for the doctrinally-relevant LID
  defensive function.
attributions:
  - actor_id: null
    attributing_org: ANSSI / CERT-FR
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-09-18
    attribution_source_id: anssi/2023-09-18_fin12-multiple-ransomware
    notes: |
      FIN12 is a financially-motivated cybercriminal intrusion
      set; CERT-FR did not attribute to a state. actor_id null
      per the AUSPEX criminal-cluster convention; the
      doctrinally-relevant attribution is ANSSI's CERT-FR
      naming itself.
doctrine_links:
  - doctrine_id: fr/lutte-informatique-defensive
    pillar_id: fr/lutte-informatique-defensive/cert-fr-coordination
    program_id: null
    confidence: attested
    reasoning: |
      CERT-FR public threat-cluster attribution is a canonical
      LID coordination-pillar function. The criminal-cluster
      naming extends the practice the 2021 Sandworm and 2023
      APT28 publications established to financially-motivated
      adversary clusters affecting French entities.
    attesting_source_id: anssi/2023-09-18_fin12-multiple-ransomware
    counter_explanation: null
    contested: false
    analyst: claude
targets:
  - target_id: sectors/healthcare
    country: FR
    role: primary
  - target_id: sectors/government/local
    country: FR
    role: primary
  - target_id: sectors/ics/manufacturing
    country: FR
    role: primary
sources:
