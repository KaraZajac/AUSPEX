id: 2023-09/anssi-fin12-criminal-attribution
name: ANSSI / CERT-FR publishes FIN12 ransomware-cluster threat report
start_date: 2019-01-01  # ANSSI: FIN12/PISTACHE TEMPEST "actifs depuis au moins 2019"
disclosure_date: 2023-09-18
end_date: 2023-09-18
incident_type:
  - documentary
  - ransomware
initial_vector: valid-creds  # ANSSI: exposed RDP + valid health-professional credentials (infostealer-sourced); "vecteur d'infection privilégié... authentifiants valides"
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2023-CTI-007 (18 September
  2023) associating a March 2023 intrusion at the CHU de Brest
  university hospital — which the hospital contained before any
  data exfiltration or encryption — with the financially
  motivated cybercriminal intrusion set FIN12, and, by shared
  infrastructure and TTPs, with the encryption of roughly thirty
  French entities between 2020 and 2023. ANSSI tracks the cluster
  as FIN12 (Mandiant, ex-UNC1878) / PISTACHE TEMPEST (Microsoft
  DEV-0237) and records its successive use of the Ryuk, Conti,
  Hive, Nokoyawa, BlackCat / ALPHV, Play, and Royal ransomware
  brands, a pronounced healthcare focus (at least 20% of victims,
  per ANSSI citing Mandiant), and a rapid-encryption operating
  model (Time-To-Ransom ~4 days) that seldom uses double
  extortion.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  Editorially significant as a defensive-attribution event
  recording ANSSI's willingness to publicly name an organized
  cybercriminal cluster affecting French entities — the
  criminal-side parallel to the state-side APT28 / APT29 /
  Sandworm attributions. ANSSI frames FIN12 as financially
  motivated (Big Game Hunting), not state-directed, so no
  attacker-rationale state doctrine is asserted and
  doctrine_links is empty. actor_id is left null pending an
  AUSPEX actor-placement decision: the FIN12 / PISTACHE TEMPEST
  / DEV-0237 designations ANSSI uses are already carried as
  equivalent aliases of the existing ru/proxies/conti (Conti /
  Wizard Spider) actor per the MISP galaxy, yet this ANSSI report
  itself asserts no Russian-state nexus for the cluster.
attributions:
  - actor_id: ru/proxies/conti  # mapped 2026-07-02 (Kara-approved): FIN12 is a MISP-adopted alias of the Conti/Wizard Spider cluster (ru/proxies/conti); NB ANSSI itself asserts no state nexus — the RU-proxy placement follows the corpus's existing MISP mapping, not this source
    attributing_org: ANSSI / CERT-FR
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-09-18
    attribution_source_id: anssi/2023-09-18_fin12-multiple-ransomware
    notes: |
      ANSSI associates the March 2023 CHU de Brest intrusion — and
      ~30 French entity encryptions (2020-2023) — with the
      financially motivated cybercriminal cluster it names FIN12,
      adopting Mandiant's FIN12 / ex-UNC1878 and Microsoft's
      PISTACHE TEMPEST / DEV-0237 designations (a named-actor
      cluster attribution). ANSSI does NOT attribute to a state.
      actor_id left null pending AUSPEX placement: FIN12 is an
      equivalent alias of the existing ru/proxies/conti actor per
      the MISP galaxy, but this source asserts no state nexus, so
      the criminal-vs-ru-proxy placement is an orchestrator/Kara
      call (see FLAG in qc notes).
