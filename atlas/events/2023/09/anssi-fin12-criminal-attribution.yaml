qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-02
  level: full
  notes: |
    Audited vs the RAW ANSSI/CERT-FR report CERTFR-2023-CTI-007
    "FIN12 — UN GROUPE CYBERCRIMINEL AUX MULTIPLES RANÇONGICIELS"
    (18 sept 2023, TLP:CLEAR, 15 pp). Snapshots: PDF report sha256
    5c096d6e…5d6973fc (2,457,887 bytes) = archive_url [audited
    artifact]; HTML landing sha256 a9cca0f1…5bc25d49 (16,125 bytes)
    = url. STEP-0 triage: NOT a phantom — the URL/PDF is the real,
    specific first-party CERT-FR report whose body carries the
    event's claims. Path taken: RE-VERIFY in place (genuine source,
    correct target) — no re-source needed.

    [a] FACTS — corrected three unsupported claims. (1) start_date
    2018-01-01 → 2019-01-01: "2018" appears NOWHERE in the report;
    ANSSI states "les attaquants... seraient donc actifs depuis au
    moins 2019" and titles Fig. 2.1 "...activités connues du MOA
    FIN12 (PISTACHE TEMPEST) depuis 2019". (2) outcome_summary
    "2018-2023" removed; added that the March 2023 CHU de Brest
    intrusion was CONTAINED before exfiltration/encryption ("La
    réactivité de l'établissement de santé a permis d'isoler
    rapidement le SI... empêchant ainsi l'exfiltration de données et
    le chiffrement"), and that ANSSI links ~30 French entity
    encryptions 2020-2023 ("le chiffrement d'une trentaine d'entités
    entre 2020 et 2023"). Ransomware brands verified verbatim (Ryuk,
    Conti, Hive, Nokoyawa, BlackCat, Play, Royal) — added Play,
    which the prior list omitted; all source-carried. Healthcare +
    fast-deployment profile CONFIRMED: "un ciblage important du
    secteur de la santé (au moins 20% des victimes du groupe)";
    "privilégier le chiffrement rapide des réseaux compromis au
    détriment de l'exfiltration"; "Time-To-Ransom des opérateurs de
    FIN12, qui est d'environ 4 jours". initial_vector phishing →
    valid-creds: "phishing" occurs only in a bibliography title
    (ref [20], Royal); the report's actual vector is exposed RDP +
    valid health-professional credentials (infostealer-sourced),
    MITRE T1133 + T1078.002, and "le vecteur d'infection privilégié
    semble être le recours à des authentifiants valides".

    [b] ATTRIBUTION — ANSSI/CERT-FR, high, named-actor (added; was
    missing). ANSSI firmly "associe cette attaque au MOA cybercriminel
    FIN12", adopting Mandiant FIN12/ex-UNC1878 and Microsoft PISTACHE
    TEMPEST/DEV-0237. Explicitly financially motivated ("groupe
    cybercriminel", Big Game Hunting) — NO state attribution. Broader
    history uses the French administrative conditional ("seraient",
    "auraient", "pourraient"); kept confidence high for the naming
    act itself, which is stated as accomplished. auspex_assessment
    concur retained. actor_id kept null (see [f] FLAG).

    [c] DATES — published_on 2023-09-18 correct (PDF header + title).
    disclosure_date/end_date 2023-09-18 correct. start_date fixed to
    2019 (above). No conflation remaining.

    [d] DOCTRINE_LINKS — emptied. The prior link
    (fr/lutte-informatique-defensive/cert-fr-coordination, confidence
    `attested`, no perspective tag → attacker-rationale default) was
    wrong: a criminal actor's ransomware operation cannot have French
    DEFENSIVE doctrine as its attacker rationale, and ANSSI asserts no
    state purpose the pillar encodes. Per the schema ("doctrine_links:
    [] is correct when no doctrine genuinely applies") and the
    orchestrator direction, set to []. FLAG (convention): the closest
    sibling anssi-apt28-france-attribution carries an
    LID/cert-fr-coordination link as perspective: defender-response
    (attested); anssi-panorama-cybermenace-2023 (attested) and
    anssi-health-sector-state-of-threat (strongly_inferred) carry it
    but omit the perspective tag. If Kara wants corpus consistency, a
    single `perspective: defender-response` LID link at
    strongly_inferred (report never names LID) would be the alternative
    to empty — orchestrator/Kara call.

    [e] ATTRIBUTION_LEVEL — set named-actor (FIN12 is a named,
    vendor-recognized threat cluster ANSSI adopts). Not nation
    (criminal), not named-unit (no service).

    [f] ACTOR_ID — kept null. FLAG (actor): the orchestrator's
    "FIN12 = criminal/" has no backing file — atlas/actors/criminal/fin12
    does NOT exist (47 criminal actors, FIN12 absent). Meanwhile the
    EXISTING actor ru/proxies/conti (canonical "Conti / TrickBot /
    Wizard Spider ecosystem") ALREADY lists FIN12 — and PISTACHE
    TEMPEST/Pistachio Tempest, DEV-0237, DEV-0193, Periwinkle Tempest,
    Storm-0230 — as equivalent aliases per the MISP galaxy (WIZARD
    SPIDER). So the corpus already maps FIN12 → ru/proxies/conti, which
    contradicts "criminal/". Decision needed (I did NOT edit actor
    files): (i) create standalone criminal/fin12 and re-point, or (ii)
    point actor_id → ru/proxies/conti (existing, non-dangling, but pulls
    FIN12 into the RU-proxy bucket — NOT what THIS ANSSI source asserts),
    or (iii) keep null. Left null to avoid a dangling FK and to avoid
    silently choosing (ii) against this source's plain criminal framing.
    NB if the event is later pointed at ru/proxies/conti, revisit the
    trimmed targets — that actor profile also lists government/local +
    ics/manufacturing, but THIS source substantiates only healthcare.

    Residual uncertainties: attributing_org_confidence high vs moderate
    is arguable given pervasive conditional phrasing; kept high for the
    definite CHU-Brest→FIN12 association. The ~30-entity and 20%-
    healthcare figures are ANSSI restating Mandiant [11][12] (cited
    within the report), not independently re-derived here.
