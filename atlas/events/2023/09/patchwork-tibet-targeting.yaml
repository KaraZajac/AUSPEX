  notes: |
    PHANTOM-REMEDIATION → UNSUPPORTABLE (retire / delete candidate).
    Full 6-point audit run against the RAW record; the event's core
    claim could not be source-carried by ANY reachable report, so it is
    stripped to a truthful, honestly-flagged minimum and stamped
    partial (a load-bearing "source" that is un-snapshottable AND whose
    claims are un-corroborated). NOT re-sourced: the only real 2023
    Patchwork campaign has a DIFFERENT victim set (Chinese govt /
    universities, not Tibet), so substituting it would be inventing a
    new event under a fabricated Tibet slug — an editorial re-scope
    that is Kara's call, not this audit's. Sources for that option are
    pre-staged below.

    [STEP 0 — PHANTOM TRIAGE] The sole citation
    knownsec/2023-09-21_patchwork-tibet-targeting has url: null (nothing
    to curl / hash) and its own record notes already concede the real
    Knownsec 404 Patchwork material "primarily covers the APT-K-47
    'Mysterious Elephant' cluster and EyeShell-backdoor targeting of
    Chinese research orgs (July 2023), not a standalone Tibet-targeting
    cluster post." Confirmed PHANTOM — no content hash recorded (per
    protocol). Web verification of the genuine Knownsec 404 corpus:
    (i) "APT-K-47 'Mysterious Elephant', a new APT organization in South
    Asia" (Aug 2023) — targets Pakistan; NOT Patchwork-Tibet. (ii)
    "PatchWork's new assault Weapons report — EyeShell Weapons
    Disclosure" (Medium, published 2023-07-26; Medium/Seebug mirrors are
    Cloudflare/JS-walled to curl, read via WebFetch) — Patchwork's real
    2023 report: introduces EyeShell (.NET backdoor) co-appearing with
    BADNEWS; targets "key domestic universities, research institutes …
    in Pakistan, Sri Lanka, Nepal, Bangladesh, Myanmar, Cambodia";
    ZERO mentions of Tibet / Tibetan diaspora / CTA. The phantom
    record's suggested re-scope "to the Kaspersky and Volexity
    Patchwork-Tibet entries" is itself unfounded: no such entries exist
    — Volexity's Tibet reporting is Storm Cloud (a CHINA APT) and
    Volexity's Patchwork reporting is US think-tanks; two unrelated
    strands conflated.

    [STEP 0b — DECISION: UNSUPPORTABLE] The claimed incident (Patchwork
    → Tibetan diaspora + CTA-adjacent NGOs, 2023, Tibetan-political
    lures, BADNEWS) has no real source. Five targeted searches + two
    fetches all converge: (a) no vendor ties Patchwork/Dropping Elephant
    to Tibet in any year; (b) all real Tibetan-diaspora/CTA targeting is
    China-nexus (Storm Cloud/Volexity 2019-20; Poison Carp/Citizen Lab
    2019; Evasive Panda/Monlam 2024; i-Soon/Anxun leak + Turquoise Roof
    2024 naming the CTA) — direction China → Tibetans, the inverse of
    this event. → UNSUPPORTABLE. Stripped to nothing defensible; NOT
    invented back to life.

    [a] FACTS — every distinguishing claim is FABRICATED and was removed
    from the asserted-fact position: "operations against Tibetan
    diaspora organizations and CTA-adjacent NGOs" (no source);
    "Phishing lures themed on Tibetan political content" (no source);
    "delivered the BADNEWS backdoor with refreshed loaders" against a
    Tibet victim (BADNEWS is a real Patchwork tool, but no source pairs
    it with a Tibet campaign); "operationally consistent with prior
    Patchwork China-collection extensions into Tibetan-issue scholarship
    and dissident communities" (editorial fabrication). RAW EVIDENCE of
    the real (non-Tibet) 2023 victimology — AhnLab CTI "Threat Trend
    Report on APT Groups", June 2023 (staged snapshot
    atlas/sources/raw/ahnlab__2023-06_threat-trend-report-apt-groups.pdf,
    sha256 00c5d4c4…3c52d31, 260,168 bytes, 15pp; grep "tibet" = 0
    hits), §13 Patchwork verbatim: "ThreatBook revealed that the
    Patchwork group targeted the Chinese government and universities
    using subjects such as 'National Key Research and Development
    Programs' and 'Advanced Structures and Composite Materials' as
    lures. The Patchwork group primarily targets national defense and
    foreign affairs sectors of China, Pakistan, and Bangladesh. The
    group employed the BADNEWS malware for remote control of their
    targets and were also found to use the commercial malware, Remcos,
    and the open-source penetration framework Havoc." Chinese govt +
    universities, not Tibet.

    [b] ATTRIBUTION — over-attested. Event asserted Knownsec /
    vendor-consensus at moderate confidence for a Patchwork-Tibet op
    that no source attributes (because no source reports it).
    Downgraded attributing_org_confidence moderate → low and
    auspex_assessment concur-with-caveat → contested; attribution note
    rewritten to say the incident is unsupported and Patchwork is kept
    only as the phantom-alleged actor. attribution_source_id left on the
    phantom (the only citation; the record is annotated per STEP 0c) —
    NOT re-pointed, since re-pointing to the real EyeShell/AhnLab
    sources would smuggle in the re-scope.

    [c] DATES — unverifiable / conflated. start_date 2023-03-01 kept
    only as an un-verified placeholder (schema requires it; likely a
    borrow from APT-K-47's "first captured March 2023" ORPCBackdoor,
    a different cluster). disclosure_date 2023-09-21 was the phantom's
    fabricated date — nulled (no real Tibet disclosure exists; the real
    Patchwork-2023 disclosures are AhnLab 2023-06 and Knownsec EyeShell
    2023-07-26). end_date 2023-09-21 → null.

    [d] DOCTRINE_LINKS — removed. The single link
    (in/regional-collection-pakistan-china/china-collection,
    strongly_inferred) reasoned entirely from the fabricated "Tibetan
    equities" premise. With the incident unsupported, no doctrine
    genuinely applies → doctrine_links: [] (protocol: do not invent
    one). NB: the china-collection pillar WOULD legitimately apply to
    the real Chinese-govt/universities campaign if re-scoped.

    [e] ATTRIBUTION_LEVEL — set to named-actor (was already implied):
    the phantom named the "Patchwork" cluster, not an Indian service;
    consistent with actor in/unscoped/patchwork. Retained through the
    downgrade for completeness.

    [f] ACTOR_ID — in/unscoped/patchwork RESOLVES
    (atlas/actors/in/patchwork.yaml). Directionality VERIFIED and the
    event's error corrected: Patchwork is India-nexus (in/unscoped);
    the CTA target had been tagged country: in — the attacker's own
    home — which is the exact directionality error flagged. Removed
    (see TARGETS). ACTOR FLAG for orchestrator: the actor's ttp_summary
    asserts a "Tibetan diaspora" targeting dimension that none of its
    five cited sources (Norman Shark, Kaspersky, Forcepoint, Cymmetria,
    MITRE G0040) support — it appears to be an unsourced addition
    circularly seeded by THIS fabricated event; recommend scrubbing that
    clause from atlas/actors/in/patchwork.yaml (actor edits are not made
    by this audit).

    TARGETS — both removed (targets: []). orgs/tibetan-diaspora-ngos and
    orgs/central-tibetan-administration are DANGLING FKs (no file under
    atlas/targets/orgs/, referenced by no other event) — fabricated for
    this event. The CTA entry additionally carried country: in, the
    directionality error.

    RE-SCOPE OPTION (for Kara, if not deleting): recast as "Patchwork
    2023 China-collection: BADNEWS/EyeShell vs Chinese govt/universities
    & South-Asian research orgs." Real sources, ready to add:
    - AhnLab CTI, "Threat Trend Report on APT Groups" (June 2023) —
      tier secondary, vendor-research; snapshot staged (sha256
      00c5d4c4…3c52d31, 260,168 bytes). Carries Chinese govt/universities
      + CN/PK/BD defense & foreign-affairs, BADNEWS/Remcos/Havoc.
    - Knownsec 404, "PatchWork's new assault Weapons report — EyeShell
      Weapons Disclosure" (Medium, 2023-07-26) — tier
      secondary/primary-technical; Cloudflare/JS-walled to curl (WebFetch
      only, so no committed content hash — would stamp partial).
    Under a re-scope: victims are Chinese (cn) government + universities
    (and S/SE-Asian research orgs), NEVER India (in); china-collection
    doctrine at strongly_inferred; confidence back to moderate.

    RESIDUAL / FLAGS: (1) EVENT = retire/delete candidate (fabricated as
    scoped) OR editorial re-scope per above — Kara's call. (2) SOURCE
