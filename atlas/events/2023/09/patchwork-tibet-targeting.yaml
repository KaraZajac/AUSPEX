outcome_summary: |
  UNSUPPORTED / LIKELY FABRICATED AS SCOPED — see qc block. No cited
  source documents Patchwork (Dropping Elephant) targeting the
  Tibetan diaspora or the Central Tibetan Administration. The sole
  citation (knownsec/2023-09-21_patchwork-tibet-targeting) is a
  confirmed phantom: url is null and no such Knownsec "Patchwork
  Tibet cluster" article exists. Exhaustive search (2026-07-02) finds
  no Patchwork / Dropping-Elephant Tibet reporting from any vendor;
  every documented Tibetan-diaspora / CTA cyber-targeting campaign is
  CHINA-nexus (Storm Cloud / Volexity, Poison Carp / Citizen Lab,
  Evasive Panda, the i-Soon / Anxun leak) — the OPPOSITE direction to
  an India-nexus actor. The genuine 2023 Patchwork campaign (Knownsec
  "EyeShell Weapons Disclosure", 2023-07-26; AhnLab / ThreatBook, June
  2023) targeted the Chinese government and universities plus South- /
  Southeast-Asian research institutes with BADNEWS and the new EyeShell
  backdoor — not Tibetan equities.
false_flag_risk: none
summary: |
  RETIRE / DELETE candidate (fabricated as scoped). The event's
  distinguishing claim — Patchwork extending its China-collection lane
  into Tibetan-diaspora and CTA-adjacent NGO targeting in 2023, with
  Tibetan-political phishing lures delivering the BADNEWS backdoor — is
  carried by NO source. The only citation is a phantom, and both target
  ids it asserted (orgs/tibetan-diaspora-ngos and
  orgs/central-tibetan-administration) are fabricated dangling foreign
  keys with no registry file, referenced by nothing else in the corpus.
  A real 2023 Patchwork China-collection campaign DOES exist (Chinese
  government + universities; South- / Southeast-Asian research orgs;
  BADNEWS + EyeShell) and is fully sourced in the qc notes, should the
  candidate choose to RE-SCOPE this record rather than delete it — but
  that is an editorial decision, and this audit will not fabricate a
  new victim set under a Tibet-named slug to keep the event alive.
