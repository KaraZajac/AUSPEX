id: 2023-09/patchwork-tibet-targeting
name: Patchwork targeting of Tibetan diaspora and CTA-adjacent NGOs
start_date: 2023-03-01
disclosure_date: 2023-09-21
end_date: 2023-09-21
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Knownsec and adjacent vendor reporting in late 2023 documented
  Patchwork / Dropping Elephant operations against Tibetan
  diaspora organizations and Central Tibetan Administration-
  adjacent NGOs in 2023. Phishing lures themed on Tibetan
  political content delivered the BADNEWS backdoor with refreshed
  loaders. The targeting is operationally consistent with prior
  Patchwork China-collection extensions into Tibetan-issue
  scholarship and dissident communities.
false_flag_risk: none
summary: |
  Distinctive PRC-adjacent collection extension for Patchwork
  beyond US-think-tank and Pakistani-military targets. Tibetan
  diaspora and CTA targeting fits the China-collection pillar's
  proxy-collection logic and Indian interest in PRC ethnic-
  policy and Sino-Indian border issues. The cluster's
  operational continuity into 2023 is itself notable.
