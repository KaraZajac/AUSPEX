false_flag_risk: none
summary: |
  ESET Research disclosed the Deadglyph backdoor, a previously undocumented modular implant used for espionage against a governmental entity in the Middle East (a related sample was uploaded from Qatar). Deadglyph has an unusual architecture combining a native x64 Executor component with a .NET Orchestrator, loaded via registry shellcode, and supports modules for process creation, file reading and system-info collection. ESET states the precise initial compromise vector was not determined but suspects an installer component established persistence. Based on targeting and additional evidence, ESET attributed Deadglyph with high confidence to the Stealth Falcon APT group, which MITRE links to the United Arab Emirates.
