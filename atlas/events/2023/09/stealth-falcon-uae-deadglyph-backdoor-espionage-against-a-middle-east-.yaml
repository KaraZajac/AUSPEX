    attributing_org_confidence: high   # ESET's own words: "we attribute Deadglyph with high confidence to the Stealth Falcon APT group"
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-09-22
    attribution_source_id: welivesecurity/2023-09_stealth-falcon-uae-deadglyph-backdoor-es
    notes: |
      ESET attributes DeadGlyph -> Stealth Falcon at HIGH confidence (named-actor) on
      targeting + additional evidence. The Stealth Falcon -> UAE leg is ESET citing MITRE
      ("a threat group linked to the United Arab Emirates according to MITRE"), not an
      independent ESET nation-level assertion — hence concur-with-caveat.
