    [a] FACTS — corrections + re-sourcing:
    • "~USD 15M ... per SEC 8-K" was FALSE ATTRIBUTION. The Caesars
      8-K (grep-confirmed) states NO ransom/"$15 million"/"million"/
      "paid" — it only implies payment ("steps to ensure ... deleted").
      The ~$15M-of-a-$30M-demand figure is press (WSJ / Bloomberg);
      re-sourced to bleepingcomputer/2023-09-14 (verbatim: "a Wall
      Street Journal report says the hotel and casino entertainment
      company paid roughly $15 million, half of the attackers' initial
      $30 million demand"). Prose no longer credits the 8-K.
    • MGM ~$100M now carried by a PRIMARY (was "disclosed ... in SEC
      filing" with no filing in sources[]): MGM 8-K, verbatim "a
      negative impact ... of approximately $100 million to Adjusted
      Property EBITDAR" + "less than $10 million in one-time expenses."
    • "Aug 27 intrusion" REMOVED — no primary carries it and reporting
      splits Aug 23 vs Aug 27; anchored instead on the 8-K's hard date
      ("on September 7, 2023, we determined that the unauthorized actor
      acquired a copy of ... our loyalty program database, which
      includes driver's license numbers and/or social security
      numbers").
    • "identified via LinkedIn" GENERALIZED to "impersonated employee":
      the LinkedIn-recon detail is from ALPHV's own public statement,
      not carried by any snapshot here; Microsoft carries the vector
      (help-desk vishing -> impersonation) but not "LinkedIn." The
      "LinkedIn" footer-link hits in Microsoft/CISA are UI chrome.
    • Property list ("hotel-room digital keys ... MGM Grand, Bellagio,
      Aria, Mandalay Bay ... Atlantic City / Mississippi / Maryland")
      trimmed to the source-carried operational scope (BleepingComputer:
      "slot machines, credit card terminals, and ATMs ... main website,
      online reservations systems"; ">a hundred ESXi hypervisors"). MGM
      customer-data theft (pre-March-2019 PII incl. driver's-license)
      carried by BleepingComputer + TechCrunch.
    • MGM non-payment: carried by TechCrunch (WSJ) — "MGM Resorts
      reportedly did not pay the attackers' ransom demand"; hedged
      in-prose as "(per reporting)". Caesars "customer-facing operations
      not disrupted" = 8-K verbatim.

