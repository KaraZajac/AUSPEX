      foregrounds DragonForce, no longer names ALPHV, and cites MGM only
      in a footnote) — the incident-specific ALPHV brand tie rests on
      Microsoft + WSJ/Bloomberg reporting (BleepingComputer) + the
      original Nov-2023 advisory + ALPHV's own public claim.
