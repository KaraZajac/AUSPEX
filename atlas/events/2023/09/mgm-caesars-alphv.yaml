id: 2023-09/mgm-caesars-alphv
name: ALPHV / Scattered Spider ransomware of MGM and Caesars
start_date: 2023-09-07
disclosure_date: 2023-09-11
end_date: 2023-09-20
incident_type:
  - ransomware
  - disruption
initial_vector: phishing  # IT help-desk social engineering for MFA bypass
outcome_summary: |
  Scattered Spider executed two near-simultaneous intrusions of
  the two largest Las Vegas Strip gaming operators using ALPHV
  ransomware. Tradecraft: short voice call to IT help desk
  impersonating an employee identified via LinkedIn, social-
  engineered MFA-reset, Okta superuser pivot, vSphere encryption.
  Caesars (Aug 27 intrusion, settled with ALPHV ~USD 15M ransom
  payment per SEC 8-K). MGM Resorts (Sept 7 onward) refused
  payment; ten-day outage of slot machines, hotel-room digital
  keys, casino-floor systems across MGM Grand, Bellagio, Aria,
  Mandalay Bay, and other Strip / Atlantic City / Mississippi
  / Maryland properties. MGM disclosed USD 100M of impact in
  SEC filing.
quantified_impact:
  caesars_ransom_paid_usd: 15000000
  mgm_disclosed_impact_usd: 100000000
  mgm_downtime_days: 10
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Canonical Scattered Spider × ALPHV affiliate-relationship case.
  Caesars / MGM is the AUSPEX type-specimen for "Anglophone youth-
  led affiliate × Russian-tolerated RaaS brand × Western
  hospitality target." The SEC 8-K disclosure by Caesars was
  among the first under the then-new SEC cybersecurity-disclosure
  rules (effective Dec 2023).
attributions:
  - actor_id: criminal/scattered-spider
    attributing_org: Microsoft + Mandiant + CISA
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-09-14
    attribution_source_id: msft/2023-10-25_octo-tempest
    notes: |
      Scattered Spider acted as the affiliate; ALPHV provided the
      ransomware payload. Both are jointly attributed in CISA
      AA23-320A (Nov 2023).
  - actor_id: criminal/alphv  # was ru/proxies/alphv; demoted 2026-06-24 (claude-opus-4.8/max) — no source-documented Russia-state nexus, see actor notes
    attributing_org: Microsoft + Mandiant + CISA
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-09-14
    attribution_source_id: cisa/2023-11-16_aa23-320a-scattered-spider-advisory
doctrine_links: []  # Scattered Spider has no defensible doctrine alignment
targets:
  - target_id: orgs/mgm-resorts
    role: primary
    outcome: |
      Ten-day outage; USD 100M disclosed impact; no ransom paid.
  - target_id: orgs/caesars-entertainment
    role: primary
    outcome: |
      USD 15M ransom paid; minimal customer-facing disruption.
sources:
  - msft/2023-10-25_octo-tempest
  - cisa/2023-11-16_aa23-320a-scattered-spider-advisory
  - sec/2023-09-14_caesars-8k
