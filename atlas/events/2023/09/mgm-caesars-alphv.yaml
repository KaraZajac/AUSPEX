id: 2023-09/mgm-caesars-alphv
name: ALPHV / Scattered Spider ransomware of MGM and Caesars
start_date: 2023-09-07
disclosure_date: 2023-09-11
end_date: 2023-09-20
incident_type:
  - ransomware
  - extortion
  - disruption
  - data-theft
initial_vector: phishing  # voice social engineering (vishing) of the IT help desk -> password/MFA reset; enum has no dedicated social-engineering/vishing value
outcome_summary: |
  Scattered Spider (an English-speaking social-engineering crew;
  aka Octo Tempest / UNC3944 / 0ktapus) executed two near-
  simultaneous intrusions of the two largest Las Vegas Strip gaming
  operators as an affiliate of the ALPHV/BlackCat ransomware-as-a-
  service brand. Tradecraft (per Microsoft + CISA): voice-phishing
  (vishing) the IT help desk to socially engineer a password / MFA
  reset for an impersonated employee, then identity-provider
  (Okta / Azure) pivoting and — for MGM — encryption of the VMware
  ESXi estate.
  Caesars Entertainment: a social-engineering compromise of an
  outsourced IT support vendor; Caesars determined on Sept 7 2023
  that its loyalty-program database (driver's-license and/or SSN
  data) had been copied and — per Wall Street Journal / Bloomberg
  reporting — paid roughly USD 15M, about half of the attackers'
  initial USD 30M demand, to suppress the leak. Customer-facing
  operations were not disrupted.
  MGM Resorts: disruption from ~Sept 10-11 (press statement Sept 12)
  of slot machines, casino-floor systems (credit-card terminals,
  ATMs) and its website / online reservations, with more than 100
  ESXi hypervisors encrypted and pre-March-2019 customer PII
  (incl. driver's-license data) stolen; MGM did not pay (per
  contemporaneous reporting) and disclosed an ~USD 100M impact to
  Q3 Adjusted Property EBITDAR (plus <USD 10M one-time costs) in its
  Oct 5 2023 SEC 8-K.
quantified_impact:
  caesars_ransom_paid_usd: 15000000
  mgm_disclosed_impact_usd: 100000000
  mgm_downtime_days: 10
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Canonical Scattered Spider × ALPHV affiliate-relationship case —
  the AUSPEX type-specimen for "Anglophone youth-led affiliate ×
  profit-criminal RaaS brand × Western hospitality target." Both
  actors are stateless criminals: Scattered Spider is Western-
  jurisdictional (US / UK / Canada) and ALPHV/BlackCat carries no
  source-documented state nexus (criminal/alphv; the former
  "Russian-tolerated"/ru-proxy framing was dropped per Kara). Caesars
  and MGM filed their September 2023 8-Ks voluntarily under Items
  8.01 / 7.01 — months BEFORE the SEC's cyber-disclosure rule (Item
  1.05) took effect Dec 18 2023 — an early signal of the disclosure
  regime that followed, not a filing under it.
