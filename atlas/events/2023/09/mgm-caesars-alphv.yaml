    attributing_org: Microsoft Threat Intelligence; WSJ / Bloomberg (via BleepingComputer); ALPHV (self-claimed, MGM)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-10-25
    attribution_source_id: msft/2023-10-25_octo-tempest
    notes: |
      ALPHV/BlackCat supplied the ransomware-as-a-service payload;
      Scattered Spider was its affiliate. Microsoft (verbatim): "In
      mid-2023, Octo Tempest became an affiliate of ALPHV/BlackCat" and
      "started deploying ALPHV/BlackCat ransomware payloads ... primarily
      on VMWare ESXi servers." ALPHV publicly claimed the MGM attack;
      BleepingComputer ties "the BlackCat/ALPHV ransomware gang known as
      Scattered Spider" to MGM. Stateless profit-criminal actor — no
      source-documented Russia-state nexus (see criminal/alphv actor
      notes; ru/proxies -> criminal/ per Kara); NO state link asserted.
