  notes: |
    Audited vs the RAW ESET WeLiveSecurity report "Lazarus luring
    employees with trojanized coding challenges: The case of a
    Spanish aerospace company" (Peter Kálnai, 29 Sep 2023) —
    raw_snapshot eset__2023-09-29_lightlesscan-spain-aerospace.html,
    sha256 7e6576f3…508142c8, 163801 bytes. Not a phantom: page
    title + meta-description + body match the citation exactly;
    real first-party article.

    [a] FACTS — TWO fabrications removed. (1) The prior outcome_summary
    said the coding challenge was a "trojanized coding-challenge LNK
    file"; the raw says the payloads were two executables (Quiz1.exe /
    Quiz2.exe) "delivered via the Quiz1.iso and Quiz2.iso images hosted
    on a third-party cloud storage platform," executed via DLL
    side-loading (four execution chains, three payload types). No "LNK"
    appears in the source (0 hits) — corrected to ISO-delivered .exe +
    DLL side-loading. (2) The prior summary/outcome asserted "Same
    tradecraft as the parallel TraderTraitor crypto-exchange operations
    … (Stake.com, CoinEx, CoinsPaid)" and a "cross-pillar … dual-use
    access primitive" that "ESET's Spain disclosure documents."
    UNSOURCED: the raw contains 0 hits for TraderTraitor, Stake.com,
    CoinEx, CoinsPaid, or cryptocurrency; ESET makes no crypto/dual-use
    claim. The whole TraderTraitor cross-link was stripped from summary
    and outcome_summary. VERIFIED facts retained: unnamed Spanish
    aerospace company ("an aerospace company in Spain"); LinkedIn
    Messaging fake recruiter "masquerading as a recruiter for Meta";
    LightlessCan "publicly undocumented backdoor we named LightlessCan";
    it "mimics the functionalities of a wide range of native Windows
    commands, enabling discreet execution within the RAT itself instead
    of noisy console executions" and is "a significant advancement
    compared to its predecessor, BlindingCan" ("EDR" softened to "real-
    time security monitoring", ESET's phrasing); "The final goal of the
    attack was cyberespionage."

    [b] ATTRIBUTION — verbatim: "We attribute this activity with a high
    level of confidence to Lazarus, particularly to its campaigns
    related to Operation DreamJob." attributing_org_confidence: high ✓
    (unchanged). Refined notes to ESET's actual three-factor basis
    (intrusion set incl. BlindingCan lineage + DreamJob LinkedIn lure +
    shared AES-128/RC6-256; infrastructure; cui bono). ESET calls
    Lazarus "linked to North Korea" and names no unit.

    [c] DATES — published_on 2023-09-29 ✓ (byline "29 Sep 2023").
    disclosure_date / end_date 2023-09-29 ✓. start_date CORRECTED
    2022-09-01 → 2022-01-01: the raw dates initial access only as "last
    year" (=2022) with no month; the prior "# ESET dates initial
    outreach to late 2022" comment was unsupported (the only "September
    2022" strings in the source are a referenced Microsoft blogpost and
    an Amazon-themed case, not this compromise). Set to a year-
    granularity anchor with an honest comment.

    [d] DOCTRINE — kept strongly_inferred (NOT attested). ESET does
    supply the missile/ICBM rationale for North Korean aerospace
    targeting ("North Korea-aligned APT groups attack aerospace
    companies in attempts to access sensitive technology and aerospace
    know-how, as intercontinental ballistic missiles spend their
    midcourse phase in the space … money gained from cyberattacks
    accounts for a portion of North Korea's missile development costs")
    and a cui-bono ("Pilfering the know-how of an aerospace company is
    aligned with long-term goals manifested by Lazarus") — strong
    support for the strategic-tech-collection pillar / missile-
    modernization program. But it stays strongly_inferred because ESET
    states THIS operation's specific goal only as generic
    cyberespionage and frames the missile rationale as general UN-report
    context, and the victim/product line is undisclosed. Program kept
    (missile-modernization) because ESET's own framing is missile/ICBM-
    specific, not satellite or maritime. Added inference_basis
    {signals[], ruled_out} (was absent). attesting_source_id: null
    (correct — not attested). FKs resolve: doctrine kp/8th-congress-
    defense-plan, pillar strategic-tech-collection, program
    missile-modernization all present; pillar target_sectors include
    aerospace/defense. Attacker-rationale (kp actor ↔ kp doctrine), no
    perspective tag / state-mismatch needed.

    [e] ATTRIBUTION_LEVEL — was MISSING; added named-actor (ESET names
    the Lazarus group + North Korea, no service/unit; the actor's
    kp/rgb service placement is carried by other govt sources in the
    actor record, not by this ESET report).

    [f] ACTOR_ID — kp/rgb/lazarus resolves to atlas/actors/kp/lazarus.yaml
    (id kp/rgb/lazarus). No actor-file edit. Actor looks sound (RGB
    placement independently sourced in-file; aerospace/defense already
    in its target_sector_ids). No flag.

    SOURCE RECORD: added raw_snapshot + content_sha256; corrected tier
    secondary → primary (ESET Research's own first-party investigation,
    clearly miscategorized); appended AUDIT note recording that the
    report does not mention TraderTraitor/crypto. Single-source event,
