id: 2023-09/eset-lightlesscan-spain-aerospace
name: ESET disclosure of Lazarus LightlessCan implant on Spain aerospace target
start_date: 2022-01-01  # ESET states only that initial access was obtained 'last year' (2022); no month disclosed — year-granularity anchor (Jan 1), not a source-stated date
disclosure_date: 2023-09-29
end_date: 2023-09-29
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  ESET Research disclosed a Lazarus (Operation DreamJob)
  social-engineering operation against an employee of an
  unnamed Spanish aerospace company. Initial access was
  obtained "last year" (2022) via LinkedIn Messaging, the
  attacker masquerading as a Meta recruiter and sending two
  trojanized C++ coding-challenge executables (Quiz1.exe /
  Quiz2.exe) delivered inside ISO images (Quiz1.iso /
  Quiz2.iso) from a third-party cloud-storage platform. ESET
  identified four execution chains that used DLL side-loading
  to deliver three payload types, most notably the new
  LightlessCan backdoor — a successor to BlindingCan that
  emulates a wide range of native Windows commands in-process
  (rather than spawning noisy console executions) to hinder
  real-time security monitoring and analysis. ESET states the
  final goal of the attack was cyberespionage.
false_flag_risk: none
summary: |
  ESET Research attributes this intrusion with a high level
  of confidence to the Lazarus group (linked to North Korea),
  specifically its Operation DreamJob job-lure campaigns, on
  the basis of shared intrusion-set tradecraft (the LinkedIn
  coding-challenge lure; new variants of the DreamJob "Dutch
  case" loaders and the BlindingCan backdoor; shared AES-128 /
  RC6-256 encryption with the Amazon-themed campaign),
  infrastructure behaviour, and cui bono. ESET frames North
  Korean aerospace targeting explicitly around missile
  technology: per UN Security Council monitoring reports it
  cites, North Korea-aligned APT groups attack aerospace
  companies to access sensitive technology and aerospace
  know-how relevant to intercontinental ballistic missiles,
  and proceeds from such cyberattacks help fund North Korea's
  missile development. AUSPEX places this operation in the
  strategic-tech-collection pillar of the 8th-Congress defense
  plan (defence-technology collection) rather than the
  revenue-aggregation pillar; the missile-program tasking is
  an AUSPEX inference — ESET states the specific operational
  goal only as generic cyberespionage and does not identify
  the unnamed victim's product line — not an ESET attestation.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: ESET Research
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-09-29
    attribution_source_id: eset/2023-09-29_lightlesscan-spain-aerospace
    notes: |
      ESET: "We attribute this activity with a high level of
      confidence to Lazarus, particularly to its campaigns
      related to Operation DreamJob." Basis is three-factor:
      (1) intrusion set — LinkedIn coding-challenge lure (a
      known Lazarus/DreamJob tactic), new variants of the
      DreamJob "Dutch case" intermediate loaders and the
      BlindingCan backdoor, and shared AES-128 / RC6-256
      encryption; (2) infrastructure (compromised third-party
      servers — ESET's own "weak-confidence" signal); (3) cui
      bono. ESET links Lazarus to North Korea but names no
      specific service/unit → attribution_level named-actor
      (the actor's kp/rgb service placement is carried by other
      govt sources in the actor record, not by this report).
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/strategic-tech-collection
    program_id: kp/8th-congress-defense-plan/strategic-tech-collection/missile-modernization
    confidence: strongly_inferred
    reasoning: |
      The victim is a Spanish aerospace company and ESET
      attributes the intrusion with high confidence to Lazarus
      (Operation DreamJob), giving as its own cui-bono factor
      that "pilfering the know-how of an aerospace company is
      aligned with long-term goals manifested by Lazarus." The
      report frames North Korean aerospace targeting as
      collection of sensitive aerospace / ICBM-relevant
      technology and ties cyber proceeds to missile-development
      funding (citing UN Security Council reports) — the goal
      the strategic-tech-collection pillar and its
      missile-modernization program encode. It is
      strongly_inferred, not attested, because ESET states the
      specific goal of THIS operation only as generic
      cyberespionage and frames the missile rationale as general
      context about North Korean aerospace targeting rather than
      a per-operation assessment; the victim is unnamed and its
      product line undisclosed.
    attesting_source_id: null
    inference_basis:
      signals:
        - "ESET frames North Korean aerospace targeting around missiles: North Korea-aligned APT groups attack aerospace companies to access sensitive technology and aerospace know-how relevant to ICBMs, and proceeds help fund missile development (ESET citing UN Security Council reports)."
        - "ESET cui-bono factor, verbatim: 'Pilfering the know-how of an aerospace company is aligned with long-term goals manifested by Lazarus.'"
        - "High-confidence ESET attribution to Lazarus / Operation DreamJob, whose ClearSky-coined scope is defense and aerospace companies with a cyberespionage objective."
        - "The missile framing (rather than satellite/UAV or maritime) is the reading ESET's own report supplies for why North Korea targets aerospace firms."
      ruled_out: "Revenue-aggregation pillar (the financial track, e.g. TraderTraitor crypto theft): ESET states this operation's goal is cyberespionage / technology theft, not financial gain, and does not invoke the crypto-revenue playbook — the report never mentions TraderTraitor or cryptocurrency."
