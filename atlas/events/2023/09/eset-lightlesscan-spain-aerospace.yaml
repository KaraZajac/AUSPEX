id: 2023-09/eset-lightlesscan-spain-aerospace
name: ESET disclosure of Lazarus LightlessCan implant on Spain aerospace target
start_date: 2022-09-01  # ESET dates initial outreach to late 2022
disclosure_date: 2023-09-29
end_date: 2023-09-29
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  ESET disclosed a Lazarus social-engineering operation
  against an employee of an unnamed Spanish aerospace
  company. Vector: LinkedIn fake-recruiter pretext with
  trojanized coding-challenge LNK file dropping the new
  LightlessCan implant — a second-generation BlindingCan
  successor that emulates native Windows commands
  in-process to evade EDR. Same tradecraft as the
  parallel TraderTraitor crypto-exchange operations of the
  same period (Stake.com, CoinEx, CoinsPaid).
false_flag_risk: none
summary: |
  Cross-pillar disclosure. The LinkedIn-fake-recruiter
  pretext that delivers TraderTraitor's crypto-exchange
  payload is the same pretext that delivers Lazarus's
  defense-industrial-base implants — ESET's Spain
  disclosure documents the dual-use of the access
  primitive. Doctrinally, this operation belongs to the
  strategic-tech-collection pillar of the 8th-Congress
  plan rather than revenue-aggregation, but the access
  primitive is the same.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: ESET Research
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-09-29
