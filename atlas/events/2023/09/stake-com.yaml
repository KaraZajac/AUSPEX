campaign_id: apt38-crypto-pivot
summary: |
  Multi-chain hot-wallet drain at a major online crypto casino.
  Investigators (Elliptic, ZachXBT) traced the operation to
  TraderTraitor / Lazarus social-engineering of a Stake.com
  engineer over LinkedIn / Telegram, with delivery of a
  trojanized macOS / Windows developer-tool dropper consistent
  with the AppleJeus / Citrine Sleet supply-chain pattern,
  followed by harvesting of the hot-wallet private keys and
  programmatic drainage across the BNB Smart Chain, Ethereum,
  and Polygon hot-wallet pools. Funds were subsequently
  chain-hopped via cross-chain bridges and the Sinbad mixer —
  the same laundering primitives sanctioned by OFAC in November
  2023 for Atomic Wallet and Harmony Horizon proceeds. FBI's 6
  September 2023 attribution invokes the standard WMD-financing
  attestation pattern.
