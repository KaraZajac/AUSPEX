id: 2023-09/stake-com
name: Stake.com crypto-casino theft
start_date: 2023-09-04
disclosure_date: 2023-09-04
end_date: 2023-09-04
incident_type:
  - financial-theft
initial_vector: unknown
outcome_summary: |
  Approximately $41M in virtual currency was drained from
  Stake.com, an online casino and betting platform, on or about
  4 September 2023. The FBI publicly attributed the theft to the
  Lazarus Group (also known as APT38), comprised of DPRK cyber
  actors, on 6 September 2023, and traced the stolen funds across
  the Ethereum, Binance Smart Chain, and Polygon networks (with
  downstream consolidation into Bitcoin addresses it published
  for defenders). The FBI did not disclose the initial-access
  vector.
quantified_impact:
  usd_stolen: 41000000
  asset_classes:
    - BNB
    - ETH
    - MATIC
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Multi-network drain of approximately $41M in virtual currency
  from Stake.com, an online casino and betting platform, on or
  about 4 September 2023. The FBI attributed the theft to the
  Lazarus Group (also known as APT38), comprised of DPRK cyber
  actors, and stated the stolen funds were associated with the
  Ethereum, Binance Smart Chain (BSC), and Polygon networks,
  tracing them into a set of ETH / BSC / Polygon and downstream
  Bitcoin addresses it published for defenders to block. The FBI
  situated the theft within a broader DPRK campaign — more than
  $200M stolen in 2023, including ~$60M from Alphapo and CoinsPaid
  and ~$100M from Atomic Wallet — and cross-referenced its prior
  Harmony Horizon and Ronin Bridge reporting, the TraderTraitor
  cybersecurity advisory, and OFAC's 2019 Lazarus Group sanctions.
  The FBI did not describe the intrusion vector, and characterized
  the DPRK motive as generating "revenue for the regime" — a
  proximate revenue goal; the PSA does not name a WMD /
  ballistic-missile-financing end.
