  notes: |
    Audited against the sole cited source — FBI National Press Office PSA "FBI Identifies
    Lazarus Group Cyber Actors as Responsible for Theft of $41 Million from Stake.com"
    (6 Sept 2023). Raw snapshot fbi__2023-09-06_stake-attribution.html, sha256
    5bd9a240…fc19a1cc, 81966 bytes (hash re-verified this audit; matches the source record).
    NOT a phantom: the PSA is the real article and carries the core facts — the STRIP path was
    taken for fabricated embellishment (no re-source needed).

    [a] FACTS — heavy de-fabrication of summary + outcome_summary. PSA carries verbatim: "theft
    of approximately $41 million in virtual currency from Stake.com, an online casino and betting
    platform"; "this theft took place on or about September 4, 2023"; "DPRK cyber actors moved
    stolen funds associated with the Ethereum, Binance Smart Chain (BSC), and Polygon networks"
    (+ a published list of ETH/BSC/Polygon/Bitcoin addresses); "more than $200 million" DPRK
    theft in 2023 incl. "~$60 million ... Alphapo and CoinsPaid" and "~$100 million ... Atomic
    Wallet"; cross-refs to Harmony Horizon, Ronin Bridge, "a cybersecurity advisory on
    TraderTraitor", and "OFAC sanctioned the Lazarus Group in 2019". REMOVED as uncited /
    fabricated (present NOWHERE in the PSA): "Elliptic, ZachXBT" tracing; "social-engineering of
    a Stake.com engineer over LinkedIn / Telegram"; "trojanized macOS / Windows developer-tool
    dropper"; "AppleJeus / Citrine Sleet supply-chain pattern"; "harvesting of the hot-wallet
    private keys"; "chain-hopped via cross-chain bridges and the Sinbad mixer"; "laundering
    primitives sanctioned by OFAC in November 2023". The private-key / wallet-compromise VECTOR
    asserted in the old outcome_summary is NOT in the PSA and contradicted initial_vector:
    unknown — stripped (the PSA discloses no vector). CORRECTED the false claim "FBI's
    attribution invokes the standard WMD-financing attestation pattern": the PSA states motive
    ONLY as "the DPRK's use of illicit activities to generate revenue for the regime" — no WMD /
    ballistic-missile language anywhere. quantified_impact.usd_stolen 41000000 ✓ PSA-supported;
    asset_classes [BNB,ETH,MATIC] kept as the native-asset shorthand for the PSA's three NETWORKS
    (Ethereum/BSC/Polygon) — minor framing residual, not a token itemization the PSA carries.

    [b] ATTRIBUTION — PSA: "The FBI has confirmed that this theft took place ... and attributes
    it to the Lazarus Group (also known as APT38) which is comprised of DPRK cyber actors."
    Unhedged + "confirmed" ⇒ attributing_org_confidence: high ✓. actor_id kp/rgb/lazarus,
    attributing_org US FBI, attribution_date 2023-09-06, auspex_assessment concur — all ✓/kept.

    [c] DATES — start/end 2023-09-04 ✓ ("on or about September 4, 2023"); attribution_date
    2023-09-06 ✓ (PSA dated September 6, 2023); source published_on 2023-09-06 ✓ matches. Kept
    disclosure_date 2023-09-04 (the on-chain drain was inherently same-day public; distinct from
    the Sept-6 FBI attribution). Residual: the sole cited source (Sept 6) does not itself pin the
    Sept-4 public disclosure — that rests on the inherently-public on-chain event, not the PSA.

    [d] DOCTRINE_LINKS — kp/8th-congress-defense-plan / revenue-aggregation / crypto-bridge-theft,
    strongly_inferred: CORRECT, label unchanged. Per this doctrine's per-event attestation rule
    (doctrine file lines 39-50) and the SCHEMA attestation boundary, a source naming only the
    PROXIMATE goal ("revenue for the regime") is strongly_inferred, NOT attested (attested needs
    the terminal WMD / ballistic-missile goal in substance, e.g. OFAC's standardized language).
    Refined reasoning + inference_basis.signals to quote the PSA's "revenue for the regime"
    proximate goal and the >$200M-2023 campaign; refined ruled_out to name the competing reading
    (pure criminal enrichment) rejected by the DPRK state attribution. attesting_source_id kept
    (allowed on strongly_inferred as the primary supporting source). FKs verified: pillar
    (doctrine line 52) + program (line 95) resolve; doctrine_id resolves.

    [e] ATTRIBUTION_LEVEL — was MISSING; added named-actor. PSA names the group (Lazarus/APT38)
    and the nation (DPRK) but no service/unit (no RGB / bureau) ⇒ named-actor, not named-unit.

    [f] ACTOR_ID — kp/rgb/lazarus resolves (atlas/actors/kp/lazarus.yaml, id kp/rgb/lazarus; the
    kp/rgb service placement was verified 2026-06-25). FBI equates "Lazarus Group (also known as
    APT38)"; AUSPEX models Lazarus as the umbrella (kp/rgb/lazarus) — the correct choice for the
    PSA's headline actor. No actor-file edits.

