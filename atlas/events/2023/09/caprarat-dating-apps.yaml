id: 2023-09/caprarat-dating-apps
name: SentinelLabs (CapraTube) documents Transparent Tribe / APT36 CapraRAT Android spyware in fake YouTube apps using a "Piya Sharma" romance-persona lure
start_date: 2023-04-01
disclosure_date: 2023-09-18
end_date: null
incident_type:
  - surveillance
  - espionage
  - data-theft
initial_vector: phishing
outcome_summary: |
  In its "CapraTube" report, SentinelLabs (Alex Delamotte) analyzed
  three Android APKs — yt.apk, YouTube_052647.apk and a "Piya Sharma"
  app — that deliver Transparent Tribe / APT36's CapraRAT by mimicking
  the appearance of YouTube (loading YouTube inside a WebView) rather
  than being fully-featured apps. CapraRAT is a highly invasive RAT
  giving the actor microphone/camera recording, SMS and multimedia-
  message and call-log collection, SMS sending/blocking, call
  initiation, screen capture, GPS/network override, and filesystem
  file access. One APK reaches out to a YouTube channel for a "Piya
  Sharma" persona; SentinelLabs assesses this reflects continued
  romance-based social engineering. The report also notes, as
  background, that earlier in 2023 the group distributed CapraRAT
  apps disguised as a dating service.
false_flag_risk: none
summary: |
  Documents Transparent Tribe / APT36's distribution of CapraRAT
  Android spyware through self-run websites and social-engineering
  lures outside the Google Play store. The new element SentinelLabs
  highlights is the YouTube-mimicking app disguise; romance-based
  social engineering (here via the "Piya Sharma" persona) is described
  as a continuation of the group's known behaviour, not a novelty.
  CapraRAT was, per Trend Micro's original naming, possibly "loosely
  based on the AndroRAT source code," though SentinelLabs notes present-
  day similarities to AndroRAT are minimal. Infrastructure overlaps
  (shareboxs[.]net, used by the group since at least 2019; CrimsonRAT-
  style version conventions; the WIN-P9NRMH5G6M8 certificate) tie the
  samples to Transparent Tribe. Targeting Indian military personnel
  via mobile social engineering is consistent with the group's
  long-running India-collection focus.
