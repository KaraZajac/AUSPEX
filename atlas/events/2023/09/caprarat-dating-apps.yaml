id: 2023-09/caprarat-dating-apps
name: SentinelLabs documents CapraRAT Android-implant delivery via fake dating apps
start_date: 2022-06-01
disclosure_date: 2023-09-13
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  SentinelLabs documented Transparent Tribe / APT36 use of fake
  Android dating applications ("MMM Premium," "MMM Plus") to
  deliver CapraRAT to Indian military and political targets.
  The CapraRAT implant gives the actor SMS, call-log, location,
  microphone, and file-access. The delivery vector — romance-
  themed social engineering rather than phishing — is unusual
  for the cluster.
false_flag_risk: none
summary: |
  Notable for documenting a behavioral / social-engineering
  delivery vector outside the cluster's traditional email-phishing
  pattern. CapraRAT itself is a fork of the open-source AndroRAT.
  The targeting of Indian military personnel via dating apps is
  consistent with longstanding ISI honey-trap operational
  practice, recast in mobile / cyber form.
