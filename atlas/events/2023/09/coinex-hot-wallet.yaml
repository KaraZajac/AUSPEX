id: 2023-09/coinex-hot-wallet
name: CoinEx hot-wallet drain
start_date: 2023-09-12
disclosure_date: 2023-09-12
end_date: 2023-09-13
incident_type:
  - financial-theft
initial_vector: unknown
outcome_summary: |
  Approximately USD 54M drained from CoinEx hot wallets
  across nine chains (Ethereum, Tron, BSC, Bitcoin, Ripple,
  Solana, XDAG, Bitcoin Cash, Polygon) after the hot-wallet
  private keys were compromised. SlowMist (13 Sept) and
  Elliptic (15 Sept) attributed the theft to the Lazarus
  Group at a "suspected" level, on wallet-clustering overlap
  with the Stake.com hot-wallet drain one week prior
  (4 September) — some CoinEx proceeds were sent to an address
  Lazarus had used to launder Stake.com funds, then bridged to
  Ethereum. CoinEx suspended withdrawals (12 Sept), pledged
  100% compensation, and resumed services on 21 September.
quantified_impact:
  usd_stolen: 54000000
  asset_classes:
    - ETH
    - BTC
    - TRX
    - MATIC
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Second leg of the September 2023 Lazarus crypto-exchange
  burst (Stake.com on 4 September, CoinEx on 12 September,
  combined ~$95M across two operations in eight days).
  Vendor attribution to Lazarus at a "suspected" level via
  wallet-cluster overlap with the FBI-attested Stake.com
  drain; the FBI did not publish a parallel attribution PSA
  for CoinEx, so AUSPEX records this as Tier-2 vendor-attributed
  (SlowMist, Elliptic) rather than government-attested.
  Doctrinally part of the same revenue-aggregation tempo as
  Stake.com.
