qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-02
  level: full
  notes: |
    Phantom-remediation audit. Path taken: NOT a phantom and NOT
    unsupportable — a REAL, well-documented incident whose sole cited
    source (SlowMist Medium) is Cloudflare/JS BOT-WALLED. Re-sourced by
    ADDING the co-published Elliptic report (hash-verified snapshot) so
    every load-bearing claim is now snapshot-carried; SlowMist kept as
    corroborating. Level=full (all claims source-carried against a hashed
    snapshot; SlowMist's participation independently corroborated).

    SOURCES / SNAPSHOTS:
    - slowmist/2023-09-13_coinex-incident-analysis: BOT-WALLED. curl of the
      Medium permalink returned only a Cloudflare/JS shell (article body
      absent: 0x "Lazarus", 0x "Stake", 0x "private key"; page embeds the
      canonical slug in its app-argument -> URL confirmed real, not a
      phantom homepage/catalogue). No content_sha256 recorded (shell is
      not the article). tier secondary retained.
    - elliptic/2023-06-13_atomic-wallet: REUSED existing record — same URL
      + byte-identical snapshot as the CoinEx-relevant Elliptic post (this
      is a RUNNING/LIVING blog spanning Atomic Wallet Jun -> Stake.com/CoinEx
      Sept). Snapshot hash re-verified sha256 32d5624e...4ca60214, 329,504
      bytes. Did NOT create a new dated record (would trip verify_atlas
      source-dup WARN on the shared URL); documented the CoinEx quotes +
      date caveat in that record's notes instead. tier secondary.

    [a] FACTS — all now source-carried. Elliptic (raw 32d5624e...4ca60214):
    "CoinEx was the victim of a hack, in which $54 million was stolen"
    (=> usd_stolen 54M; NB the precise on-chain forensic sum is ~$52.8M per
    the dn.institute 9-chain breakdown and early CoinEx estimates ranged up
    to ~$70M — kept Elliptic's ~$54M as the cited figure, approximate).
    Chains corrected/expanded to the verified 9 (ETH $18.3M, TRX $11.1M,
    BSC $6.3M, XRP $6.1M, BTC $6.1M, SOL $2.5M, XDAG $1.7M, BCH $0.45M,
    MATIC $0.29M; dn.institute per-chain sums). Root cause = "compromise of
    the private key for CoinEx's hot wallets" (dn.institute; CoinEx statement)
    -> "private-key compromise" confirmed; initial_vector kept `unknown` as
    the mechanism of key theft was never established. Suspension (12 Sept) +
    100% compensation pledge + 21 Sept resumption confirmed (CCN, dn.institute,
    CoinEx). Stake.com $41M on 4 Sept and the ~$95M/8-day framing check out
    ($41M+$54M, 4->12 Sept).

    [b] ATTRIBUTION — the key nuance the task flagged (attribution latency).
    CoinEx->Lazarus is "SUSPECTED"-level, on-chain-only. Elliptic verbatim:
    "in the absence of information suggesting the CoinEx hack was conducted
    by any other threat group, Elliptic agrees that Lazarus Group should be
    suspected for the theft of funds from CoinEx" and "some of the funds
    stolen from CoinEx were sent to an address which was used by the Lazarus
    Group to launder funds stolen from Stake.com, albeit on a different
    blockchain ... bridged to Ethereum, using a bridge previously used by
    Lazarus". Attributing cluster = Elliptic + SlowMist + ZachXBT + CertiK
    (secondary reporting; early reports said ~$31M "suspected" — attribution
    latency confirmed). CORRECTIONS: added attribution_level=named-actor to
    the SlowMist entry (was missing); downgraded auspex_assessment concur ->
    concur-with-caveat on the strength of the "suspected" hedge (mirrors the
    exemplar's moderate/medium-confidence handling); ADDED an Elliptic
    attribution entry (2023-09-15, moderate, named-actor). Named-actor not
    named-unit: "Lazarus Group"/DPRK named, no specific RGB bureau pinned.
    Actor kp/rgb/lazarus resolves (atlas/actors/kp/lazarus.yaml, status
    sanctioned) — correct post the TraderTraitor/Lazarus RGB re-homing.

    [c] DATES — start/disclosure 2023-09-12, end 2023-09-13 OK. SlowMist
    published_on 2023-09-13 OK (attribution_date matches). Elliptic
    attribution_date set 2023-09-15 (its Sept revision); the shared source
    record's published_on stays 2023-06-13 (Atomic Wallet revision) — see
    FLAG below. FBI Stake.com PSA date verified 2023-09-06 (fbi.gov PSA
    title + Elliptic: "The FBI issued a press release on September 6th
    confirming that the Lazarus Group was behind this attack").

    [d] DOCTRINE_LINK — kept strongly_inferred (NOT attested), correct per
    the 8th-Congress/Byungjin per-event rule: NO CoinEx-specific source
    states the terminal WMD/weapons-financing goal (Elliptic/SlowMist trace
    funds + attribute the actor only). Added inference_basis (signals[] +
    ruled_out) and attesting_source_id: null. FK verified: doctrine
    kp/8th-congress-defense-plan, pillar .../revenue-aggregation, program
    .../revenue-aggregation/crypto-bridge-theft all exist. perspective
    absent = attacker-rationale (correct).

    [e] ATTRIBUTION_LEVEL — set named-actor on both entries (was absent).

    [f] ACTOR_ID — kp/rgb/lazarus resolves; no actor-file issues.

    FLAGS for orchestrator/Kara:
    1) SOURCE (running-document): the Elliptic post "How the Lazarus Group is
       stepping up crypto hacks..." is ONE living URL now cited by
       Atomic-Wallet/Harmony (Jun framing) AND CoinEx/Stake.com (Sept
       content), represented by the single record elliptic/2023-06-13_
       atomic-wallet whose published_on (2023-06-13) understates the
       snapshotted >=2023-09-15 revision. Consider a running-document date
       convention or per-revision split. No new source-dup created.
    2) SOURCE: slowmist/2023-09-13_coinex-incident-analysis is bot-walled
       (Medium+Cloudflare) and un-snapshottable by curl; a headless/manual
       capture would let it be hashed.
