id: 2023-09/coinex-hot-wallet
name: CoinEx hot-wallet drain
start_date: 2023-09-12
disclosure_date: 2023-09-12
end_date: 2023-09-13
incident_type:
  - financial-theft
initial_vector: unknown
outcome_summary: |
  Approximately USD 54M drained from CoinEx hot wallets
  across BTC, ETH, TRX, MATIC, and other chains via
  private-key compromise. SlowMist published on-chain
  analysis the following day attributing the theft to
  Lazarus based on wallet-clustering overlap with the
  Stake.com hot-wallet drain from one week prior
  (4 September). CoinEx suspended withdrawals and
  reimbursed affected users.
quantified_impact:
  usd_stolen: 54000000
  asset_classes:
    - ETH
    - BTC
    - TRX
    - MATIC
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Second leg of the September 2023 Lazarus crypto-exchange
  burst (Stake.com on 4 September, CoinEx on 12 September,
  combined ~$95M across two operations in eight days).
  Vendor attribution to Lazarus via wallet-cluster overlap;
  FBI did not publish a parallel attribution PSA for CoinEx,
  so AUSPEX records this as Tier-2-attested (SlowMist,
  Elliptic) rather than government-attested. Doctrinally
  part of the same revenue-aggregation tempo as Stake.com.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: SlowMist
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2023-09-13
    attribution_source_id: slowmist/2023-09-13_coinex-incident-analysis
    notes: |
      Wallet-clustering attribution via overlap with Stake.com
      proceeds (FBI-attested to Lazarus on 6 September 2023).
      No US-government PSA specific to CoinEx published.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      Wallet-cluster overlap with FBI-attested Stake.com
      theft places the proceeds in the same Lazarus
      revenue-aggregation flow. No standalone WMD-financing
      attestation specific to CoinEx, but the operational
      pattern is identical.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/coinex
    role: primary
    outcome: ~$54M drained from hot wallets across multiple chains.
sources:
