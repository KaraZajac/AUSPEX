id: 2023-09/clorox-scattered-spider
name: Scattered Spider intrusion of Clorox Company
start_date: 2023-08-11
disclosure_date: 2023-08-14
end_date: 2023-11-30
incident_type:
  - intrusion
  - disruption
  - data-theft
initial_vector: phishing  # IT help-desk social engineering
outcome_summary: |
  Clorox Company (US consumer-goods manufacturer, ~USD 7B annual
  revenue) disclosed via SEC 8-K filing August 14, 2023 a
  cybersecurity incident that forced shutdown of significant
  portions of its IT environment. Production and shipping
  disruption persisted into October 2023, with Clorox subsequently
  disclosing USD 356M of impact in fiscal-year 2024 financial
  results — the largest disclosed financial impact from any
  Scattered-Spider-attributed intrusion against a consumer-goods
  manufacturer. Tradecraft fit Scattered Spider's IT help-desk
  voice-phishing MFA-bypass profile; no ransomware payload
  publicly confirmed. Subsequent civil litigation (Clorox v.
  Cognizant) alleges the IT help desk was operated by Cognizant
  under contract.
quantified_impact:
  disclosed_impact_usd: 356000000
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Notable Scattered Spider 2023 case predating the September 2023
  Caesars / MGM run. AUSPEX classifies under criminal-baseline
  because Scattered Spider is the canonical Anglophone-youth
  criminal collective with no state nexus (`criminal/scattered-
  spider`). The Clorox case extends the SS victim profile beyond
  the better-documented hospitality and identity-provider targets
  into consumer-goods manufacturing.
attributions:
