    attributing_org_confidence: low
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-10-04
    attribution_source_id: bloomberg/2023-10-04_clorox-scattered-spider
    notes: |
      Attribution is SUSPECTED, not confirmed. It originates with a
      Bloomberg scoop (Oct 4, 2023) citing "four people familiar";
      Clorox's SEC 8-Ks (Aug 14 + Sept 18, 2023) name no operator and
      mention no ransomware. Corroborated by CNBC (Oct 4, 2023,
      "suspected ... Bloomberg reported") and BleepingComputer (Feb
      2024, "believed to have been conducted by ... Scattered
      Spider"); the July 2025 Clorox v. Cognizant complaint is
      "linked to Scattered Spider" and its recorded help-desk calls
      fit SS's voice-phishing MO, but no government or vendor has
      formally attributed the Clorox breach on the record. Confidence
      set low (was moderate); attribution rests on a single
      un-snapshottable origin — hence event qc level: partial. The
      CISA AA23-320A advisory documents SS's general TTP profile but
      does NOT mention Clorox and is not the attribution source.
