id: 2023-09/clorox-scattered-spider
name: Scattered Spider intrusion of Clorox Company
start_date: 2023-08-11
disclosure_date: 2023-08-14
end_date: 2023-11-30
incident_type:
  - intrusion
  - disruption
initial_vector: phishing  # IT help-desk social engineering (voice phishing)
outcome_summary: |
  The Clorox Company (large US consumer-goods manufacturer, ~USD 7.5B
  FY2023 revenue) disclosed via SEC 8-K on August 14, 2023 that it had
  "identified unauthorized activity" on some of its IT systems and had
  taken certain systems offline, causing disruption to parts of its
  business. A September 18, 2023 8-K stated the activity was contained
  but had "damaged portions of the Company's IT infrastructure, which
  caused widescale disruption," with an elevated level of consumer
  product-availability issues and a material impact on Q1 FY2024
  results; production had resumed at the vast majority of manufacturing
  sites by mid/late September and recovery extended into the Oct–Dec
  2023 quarter. Clorox's Q1 FY2024 earnings showed a ~USD 356M (~20%)
  year-over-year net-sales decline, MOST of which the company
  attributed to the attack (a revenue shortfall, not a direct cost);
  separately Clorox disclosed ~USD 49M of direct incremental costs
  (third-party IT recovery, forensics, consulting) through end-2023.
  Tradecraft fit Scattered Spider's IT help-desk voice-phishing /
  MFA-bypass profile; no ransomware payload or data exfiltration was
  publicly confirmed. Subsequent civil litigation — Clorox v.
  Cognizant, filed July 2025 in California Superior Court — alleges
  Cognizant, which operated Clorox's IT help desk, handed over
  credentials / password resets to the attackers without proper
  authentication; Clorox claims ~USD 380M in total damages (≈USD 50M
  remediation, remainder lost sales).
quantified_impact:
  direct_incremental_cost_usd: 49000000       # company-disclosed thru Dec 2023 (Q2 FY24 earnings)
  q1_fy2024_net_sales_decline_usd: 356000000  # ~20% YoY quarterly decline; MOST (not all) attributed to the attack
  litigation_claimed_damages_usd: 380000000   # Clorox v. Cognizant complaint (Jul 2025): ~50M remediation + lost sales
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Notable Scattered Spider 2023 case predating the September 2023
  Caesars / MGM run. AUSPEX classifies under criminal-baseline
  because Scattered Spider is the canonical Anglophone-youth
  criminal collective with no state nexus (`criminal/scattered-
  spider`). The Clorox case extends the SS victim profile beyond
  the better-documented hospitality and identity-provider targets
  into consumer-goods manufacturing. Attribution is journalistic and
  SUSPECTED — Clorox itself never named an operator.
attributions:
