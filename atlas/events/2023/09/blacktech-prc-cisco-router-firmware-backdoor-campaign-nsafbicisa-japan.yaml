qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-24
  level: full
  notes: "Audited vs the primary joint advisory AA23-270A (authoritative TLP:CLEAR PDF read in full, raw captured + sha256; the CISA HTML and media.defense.gov PDF 403 to curl/WebFetch, so the byte-identical FBI/IC3 mirror ic3.gov/CSA/2023/230927.pdf was used) and the cited Cisco Security Response (raw HTML captured; note: it is a JS-rendered shell, body verified via WebFetch). FACTS ✓: modified Cisco IOS firmware/unsigned bootloader implants, SSH backdoor persistence, stolen non-Cisco code-signing certs, pivot from international subsidiaries to U.S./Japan HQs via trusted-domain relationships, active since 2010. CORRECTIONS: (1) added the primary advisory cisa/2023-09-27_aa23-270a-blacktech-router-firmware as a source + the attribution_source_id — the subsidiary->HQ pivot and sector list are in the joint CSA, NOT the cited Cisco response (Cisco carries the credential-vector/no-Cisco-vuln/code-signing points); (2) set attribution_level: named-actor; (3) corrected the Cisco source's publisher (it is a Cisco Security Response, not the advisory itself) + de-provisionalized both source records; (4) added source-faithful targets (gov US+JP, defense, ict, ict/telecom, media). ATTRIBUTION: 'PRC-linked cyber actors known as BlackTech' — named-actor; the advisory does NOT name the MSS or any PRC service (cf. AA24-190A which names 'PRC Ministry of State Security APT40'); attributing_org_confidence high is supported. ACTOR cn/mss/blacktech: the cn/mss placement is NOT supported by this source — FLAGGED for follow-up (shared actor, not re-homed); the cited evidence establishes PRC nexus only, no MSS. doctrine_link cn/mcf/dual-use-research kept plausible (no strategic acquisition purpose stated; espionage/military-collection reading survives equally) — attesting_source_id remains null, correct."
