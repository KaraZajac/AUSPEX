id: 2023-09/blacktech-prc-cisco-router-firmware-backdoor-campaign-nsafbicisa-japan
name: "BlackTech (PRC) Cisco router firmware backdoor campaign — NSA/FBI/CISA + Japan NPA/NISC joint advisory"
start_date: 2023-09-27
incident_type:
  - intrusion
  - espionage
  - pre-positioning
initial_vector: valid-creds
false_flag_risk: none
summary: |
  A Cisco security response references the NSA/FBI/CISA and Japan NPA/NISC joint advisory on the PRC-linked actor BlackTech, which compromised network routers (including branch/subsidiary edge devices) to pivot from subsidiaries into corporate headquarters networks. According to the advisory the most prevalent initial access vector was stolen or weak administrative credentials, with no indication that Cisco vulnerabilities were exploited; attackers used compromised credentials to make administrative configuration and firmware changes and installed modified IOS firmware to maintain persistence. Cisco notes the actors also leveraged stolen (non-Cisco) code-signing certificates. The joint advisory attributes the activity to BlackTech and links it to the People's Republic of China.
attributions:
  - actor_id: cn/mss/blacktech
    attributing_org: "NSA, FBI, CISA, Japan National Police Agency (NPA), Japan NISC (joint advisory AA23-270A)"
    attributing_org_confidence: high
    attribution_level: named-actor   # advisory names the actor "BlackTech" and "PRC-linked"; it does NOT name the MSS or any PRC service
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-09-27
    attribution_source_id: cisa/2023-09-27_aa23-270a-blacktech-router-firmware
    notes: "Joint advisory AA23-270A attributes to 'PRC-linked cyber actors known as BlackTech'; it does NOT name the MSS (cf. AA24-190A, which names 'PRC Ministry of State Security APT40'). The actor's cn/mss placement is therefore not supported by this source — flagged, not re-homed (shared actor)."
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/dual-use-research
    program_id: null
    confidence: plausible
    reasoning: |
      BlackTech's modified-firmware router implants used to pivot from international subsidiaries into corporate headquarters in the U.S. and Japan are sustained collection against corporate/technology targets. The joint advisory names a broad sector list ("government, industrial, technology, media, electronics, and telecommunication ... including entities that support the militaries of the U.S. and Japan"), which is consistent with — but does not state — a Military-Civil Fusion dual-use technology-acquisition purpose; an espionage/military-collection reading survives equally, so the link stays plausible. The advisory states no strategic acquisition goal, so this is an AUSPEX inference, not an attested purpose.
    attesting_source_id: null
    contested: false
    analyst: claude
