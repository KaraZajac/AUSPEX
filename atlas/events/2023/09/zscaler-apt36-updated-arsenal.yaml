id: 2023-09/zscaler-apt36-updated-arsenal
name: "Zscaler documents APT36 (Transparent Tribe) ElizaRAT Windows RAT and new Linux desktop-entry attack vectors"
start_date: 2023-05-01
disclosure_date: 2023-09-12
end_date: null
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Zscaler ThreatLabz (activity discovered July 2023; disclosed
  2023-09-12) documented an updated APT36 / Transparent Tribe
  arsenal targeting the Indian government and defense sectors for
  cyber espionage. The headline finding is a previously
  undocumented Windows RAT that Zscaler dubbed "ElizaRAT" — a .NET
  backdoor packaged as a Control Panel applet (.cpl), delivered in
  password-protected archives via Google Drive links, that uses the
  Telegram API for command-and-control. Zscaler also documented a
  new attack vector against Linux: malicious desktop-entry
  (.desktop) files distributed inside ZIP archives (reached via a
  redirector on an APT36 credential-phishing site) that download
  and execute Linux ELF payloads. The retrieved Linux payloads were
  identified as Mythic "Poseidon" agents (the open-source Mythic C2
  framework), alongside two new PyInstaller-compiled Python
  espionage utilities: GLOBSHELL (file exfiltration) and PYSHELLFOX
  (Firefox session-stealing targeting email.gov.in and WhatsApp
  Web). Related credential phishing impersonated the National
  Informatics Centre (NIC) login portal (email9ov[.]in), and a
  decoy PDF impersonated an Indian Ministry of Defence document.
  Google Drive and Telegram were abused across the attack chain.
false_flag_risk: none
summary: |
  Tradecraft-expansion event. The notable development is APT36's
  move against Linux — the never-before-documented malicious
  desktop-entry-file vector, Mythic Poseidon ELF backdoors, and the
  GLOBSHELL / PYSHELLFOX Python espionage utilities — for a cluster
  historically focused on Windows and Android. Zscaler ties the
  Linux push to the widespread use of the Debian-based BOSS (Bharat
  Operating System Solutions) distribution across Indian state
  ministries and the Indian defense forces, and to the Indian
  government's announced Maya OS (Debian) rollout to replace Windows
  across government and defense — expanding the pool of Linux
  targets. On Windows, the new ElizaRAT backdoor (a Telegram-C2 .NET
  Control Panel applet) is the fresh tooling. Zscaler attributes the
  activity to Pakistan with very high confidence, noting the actor
  took deliberate steps to make the operations appear India-based.
