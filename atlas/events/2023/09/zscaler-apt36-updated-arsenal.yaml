id: 2023-09/zscaler-apt36-updated-arsenal
name: Zscaler documents APT36 Linux and Crimson RAT tooling refresh
start_date: 2023-03-01
disclosure_date: 2023-09-12
end_date: 2023-09-12
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Zscaler ThreatLabz published a technical analysis of Transparent
  Tribe / APT36 tooling refresh observed in mid-2023, documenting
  updated Crimson RAT variants, new Linux desktop-entry-file
  delivery chains targeting Indian government desktops running
  BOSS Linux (the Indian-government-mandated Linux distribution),
  and continued credential-phishing lures themed on Indian Ministry
  of Defence and Indian Army communications. The Linux-implant
  development is the noteworthy tradecraft development; the
  cluster has historically been Windows-and-Android-focused.
false_flag_risk: none
summary: |
  Significant tradecraft-expansion event. BOSS Linux targeting is
  meaningful because Indian government policy has pushed
  migration of sensitive desktops onto BOSS, narrowing the
  Windows-based attack surface; APT36's adaptation is a textbook
  example of cyber-actor cross-platform expansion tracking
  defender-policy moves.
