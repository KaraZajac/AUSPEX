qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-02
  level: full
  notes: |
    Audited against the RAW Zscaler ThreatLabz report "APT36's Updated Arsenal"
    (raw snapshot atlas/sources/raw/zscaler__2023-09-12_apt36-updated-arsenal.html;
    sha256 67b3d370…c897b02f; 454,972 bytes; url live HTTP 200; published_on
    2023-09-12 confirmed via JSON-LD datePublished). This event was a
    Transparent-Tribe fabrication-cluster case — the prose was substantially
    mis-sourced.

    [a] FACTS — MAJOR CORRECTIONS.
    • FABRICATED "Crimson RAT": the old name + outcome_summary claimed "updated
      Crimson RAT variants" / a "Crimson RAT tooling refresh." The string
      "Crimson" appears ZERO times in the source. The actual new Windows RAT is a
      previously-undocumented .NET backdoor Zscaler itself named: "We assigned the
      moniker 'ElizaRAT' to this new Windows-based backdoor" — a Control Panel
      applet (.cpl) that uses "the Telegram API ... for C2 communication,"
      delivered in "password-protected archive files hosted on Google Drive
      links." The old event never mentioned ElizaRAT. Renamed the event and
      rewrote outcome_summary/summary around ElizaRAT + the Linux tooling.
    • Added the real Linux findings: "The utilization of Linux desktop entry files
      by APT36 as an attack vector has never been documented before"; the payloads
      were identified — "A quick technical analysis determined these Linux payloads
      as Mythic Poseidon binaries" — plus two Python utilities, "GLOBSHELL -
      Custom-built File exfiltration Linux utility" and "PYSHELLFOX - Custom-built
      Firefox session stealing Linux utility" (targets email.gov.in / web.whatsapp.com).
    • FABRICATED "Indian Army": the old event claimed "credential-phishing lures
      themed on Indian Ministry of Defence and Indian Army communications." The
      string "army" appears ZERO times. Real phishing impersonated the "National
      Informatics Center (NIC), India ... official login portal" (email9ov[.]in);
      a decoy PDF "appears to be a document from the Indian Ministry of Defence
      describing the visit of ... a delegation from Saudi Arabia." Corrected to
      NIC phishing + MoD-themed decoy PDF; removed the Indian Army claim.
    • BOSS framing corrected: source says "The Debian-based operating system, BOSS
      ... is used across various state ministries and even the Indian defense
      forces," and that the announced "Maya OS, a Debian Linux-based operating
      system ... will replace Microsoft Windows OS across government and defense
      sectors." The old summary's "Indian-government-mandated ... migration onto
      BOSS" over-stated BOSS's status and misattributed the Windows-replacement
      mandate (that is Maya OS in the source). Softened to track the source. (Used
      the canonical expansion "Bharat Operating System Solutions"; the source's own
      gloss reads "Bharat Online Software Solution.")

    [c] DATES — start_date 2023-03-01 was UNSUPPORTED; earliest observed activity is
    May 2023 ("We first observed an occurrence in May 2023 when a credential
    phishing website ..."), discovery July 2023, infra June 2023, decoy PDFs served
    August 2023 → start_date set 2023-05-01. end_date had been set to the disclosure
    date (conflation); source says "The infrastructure continues to be active at the
    time of this blog publication" → end_date set null (ongoing at disclosure).
    disclosure_date 2023-09-12 and source published_on 2023-09-12 confirmed.

    [b]/[e] ATTRIBUTION — "APT36 is an advanced persistent threat (APT) group which
    we attribute to Pakistan with very high confidence." attributing_org_confidence
    kept high (enum tops out at high; "very high" noted). Added
    attribution_level: named-actor (names APT36 cluster + Pakistan nation; NO
    specific service — consistent with pk/unscoped). auspex_assessment concur kept.
    Directionality correct: attacker Pakistan (pk), victims Indian gov/defense (in);
    the publisher/actor-country asymmetry is expected, not a defect.

    [d] DOCTRINE — kept pk/asymmetric-posture-india/military-collection at
    strongly_inferred (NOT attested: the source documents espionage collection
    against Indian gov/defense but states no strategic-goal sentence, so it does not
    clear the attested bar). Rewrote reasoning to remove the fabricated "Indian
    Army" and align to real evidence (NIC phishing, email.gov.in session theft,
    Linux collection implants). Added inference_basis.signals[] + ruled_out (ruled
    out the kashmir-political pillar — no political / hack-and-leak / Kashmir
    component). Set attesting_source_id to the Zscaler source as primary supporting
    source (permitted on strongly_inferred). Link is attacker-rationale (pk doctrine
    on pk op) — no perspective tag, no state mismatch.

    [targets] — CORRECTED. Removed orgs/indian-army (BOTH a dangling FK — no
    atlas/targets file declares orgs/indian-army — AND unsupported by the source)
    and orgs/indian-government (also a dangling FK — no such registry file).
    Replaced with sector-level targets that resolve and are source-carried:
    sectors/government (primary — NIC, email.gov.in, "Indian government
    sector/officials/organizations") and sectors/defense (primary — "government,
    defense ... sectors"; "Indian defense forces" run BOSS; MoD-themed decoy).
    Dropped the general "education" sector (source lists it only in APT36's
    historical profile, not as a victim of THIS campaign — avoided sector
    inflation). The specifically-named victim entity (NIC / National Informatics
    Centre) has no orgs/ registry file, and creating target files is out of scope.

    [f] ACTOR — actor_id pk/unscoped/transparent-tribe resolves to
    atlas/actors/pk/transparent-tribe.yaml (file sits at pk/ but its id is
    pk/unscoped/...; FK resolves by id). Actor already audited 2026-06-24
    (Pakistan / unscoped; no service named by sources) — consistent with this
    source. No actor edit.

    incident_type: added espionage (source framing is "cyber espionage" throughout)
    alongside intrusion + data-theft (RAT/backdoor + GLOBSHELL/PYSHELLFOX
    exfiltration). initial_vector phishing kept (credential-phishing sites + the
    phishing-site redirector distributing the .desktop ZIPs).

    SOURCE RECORD — added raw_snapshot + content_sha256; upgraded tier
    secondary→primary: first-party Zscaler ThreatLabz original research (they
    discovered the activity and coined "ElizaRAT"), matching the corpus convention
    that first-party vendor original-research disclosures are primary.

    RESIDUAL / FLAGS: (1) "very high confidence" compressed to enum high (no higher
    bucket). (2) orgs/indian-government (8 events) and orgs/indian-army (2 events)
    are dangling target-registry FKs corpus-wide — flagged for the orchestrator;
    fixed only within this event. (3) end_date left null as ongoing; last concrete
    observed activity was August 2023.
