id: 2023-02/cert-ua-uac-0050-mass-phishing
name: CERT-UA documents UAC-0050 mass phishing against Ukrainian state institutions
start_date: 2022-04-01
disclosure_date: 2023-02-08
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  CERT-UA published its UAC-0050 designation and documented the
  cluster's mass spear-phishing of Ukrainian state institutions
  delivering the commodity Remcos RAT. The reachable reporting
  quantifies no victim counts or breach outcomes. In CERT-UA's own
  framing (quoted by BushidoToken; catalogued by Malpedia) the
  cluster is linked to a Russian-speaking mercenary organisation
  ("The DaVinci Group") assessed to have ties to Russian law
  enforcement — not to Belarus.
false_flag_risk: none
summary: |
  CERT-UA advisory (article/3804703, dated 2023-02-08) documenting
  the UAC-0050 activity cluster's mass spear-phishing of Ukrainian
  state institutions, delivering the commodity Remcos RAT via
  Ukrainian-language lures (including messages impersonating the
  Security Service of Ukraine). CERT-UA tracks UAC-0050 as a
  numbered activity cluster active against Ukrainian targets since
  the 2022 Russian invasion. In CERT-UA's own framing of the
  cluster — as quoted verbatim by BushidoToken across CERT-UA's
  UAC-0050 reporting, with no contrary national attribution in
  Malpedia's catalogue — UAC-0050 is linked to a Russian-speaking
  mercenary organisation ("The DaVinci Group") assessed to have
  "ties to Russian law enforcement". No cited source names Belarus,
  the Belarusian KGB, or any Belarusian service; state/service
  attribution is unresolved.
attributions:
  - actor_id: ru/unscoped/uac-0050
    attributing_org: CERT-UA
    attributing_org_confidence: moderate
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-02-08
    attribution_source_id: cert-ua/2023-02-08_uac-0050-mass-phishing
    notes: |
      CERT-UA designates UAC-0050 by cluster number (UAC-XXXX),
      hence attribution_level activity-cluster. CERT-UA's own
      framing (quoted verbatim by BushidoToken, 2024-03-06) links
      the cluster to "a Russian-speaking mercenary organization
      called 'The DaVinci Group'" assessed to have "ties to Russian
      law enforcement" — a Russia nexus, NOT Belarus, and NOT any
      named state service. Malpedia's UAC-0050 page (same CERT-UA
      advisories) gives no national attribution and no Belarus/KGB
      mention (motive "likely espionage"). The record's earlier
      claim that a "Belarusian-aligned" attribution "rests on
      BI.ZONE's Sticky Werewolf and Kaspersky's Angry Likho work"
      was incorrect: per the 2026-06-24 actor audit those reports
      treat Belarus as a VICTIM, not the sponsor. ACTOR FLAG: the
      actor is parked at ru/unscoped/uac-0050 pending a human
      re-home; the cited evidence points to criminal/ or
      ru/proxies/, not by/*.
doctrine_links:
  - doctrine_id: by/union-state-integration
    pillar_id: by/union-state-integration/ukraine-theater-support
    program_id: null
    confidence: plausible
    reasoning: |
      Sustained spear-phishing of Ukrainian state institutions
      through the Russian invasion period fits the Union-State
      Ukraine-theater-support pillar IF UAC-0050 is Belarusian-
      aligned — but that premise is not established. CERT-UA's own
      framing points to a Russian-speaking mercenary crew ("The
      DaVinci Group", ties to Russian law enforcement), and no
      cited source names Belarus, so more than one strategic
      reading survives. Graded plausible (was strongly_inferred)
      and flagged contested pending resolution of the actor's
      nation.
    contested: true
    counter_explanation: |
      The doctrine is a Belarus (Union-State) framework, but no
      cited source establishes a Belarus nexus for UAC-0050;
      CERT-UA characterises it as a Russia-linked mercenary crew.
      If the actor re-homes to criminal/ or ru/proxies/ (per the
      actor FLAG), this Belarus doctrine link no longer applies and
      a Russian criminal-proxy reading would replace it.
    analyst: claude
    inference_basis:
      alternatives:
        - "Belarus Union-State Ukraine-theater support: Ukrainian-state targeting through the invasion period fits the pillar, but rests on a Belarus alignment no cited source establishes."
        - "Russia-nexus criminal proxy: CERT-UA links UAC-0050 to a Russian-speaking mercenary crew ('The DaVinci Group') with ties to Russian law enforcement — a ru/proxies-style reading."
        - "Financially-motivated commodity-crimeware crew: the toolset (Remcos, Quasar, Venom, LummaStealer) is off-the-shelf crimeware, consistent with a mercenary group operating for hire rather than any state doctrine."
targets:
  - target_id: orgs/ukrainian-government
    role: primary
    country: ua
sources:
  - cert-ua/2023-02-08_uac-0050-mass-phishing
qc:
  verified_by: claude-opus-4.8  # normalized 2026-07-02: the verifying SUBAGENT model is opus-4.8 (orchestrator session is fable-5 but does not perform the audit)
  effort: max
  verified_on: 2026-07-02
  level: partial
  notes: |
    PATH: bot-walled load-bearing source (AUDIT-PROTOCOL STEP 2), NOT a phantom and NOT
    re-source/retire. Sole cited source is a REAL CERT-UA advisory endpoint
    (cert.gov.ua/article/3804703) that is JS-rendered (Vue SPA) and archive.org-blocked, so
    it is un-snapshottable; claims mirror-corroborated. Fresh curl 2026-07-02 returned only
    a 2,380-byte app shell (<title>CERT-UA</title>; zero article-body terms — no
    uac-0050/remcos/phishing/belarus). No faithful raw_snapshot / content_sha256 recorded for
    the CERT-UA source (consistent with its 2026-06-24 audit note). Corroboration snapshots
    (hashes RE-VERIFIED 2026-07-02):
      - BushidoToken "Tracking Adversaries: UAC-0050, Cracking The DaVinci Code" (2024-03-06):
        _corrob__bushidotoken__uac-0050-davinci.html · sha256 1ec3d51e…b4fdea43 · 205,761 bytes.
      - Malpedia UAC-0050: _corrob__malpedia__uac-0050.html · sha256 8cfac383…babc70b4c6 · 1,097,006 bytes.

    [a] FACTS — CORROBORATED: mass spear-phishing of Ukrainian state institutions + commodity
    Remcos RAT delivery (source title "UAC-0050 — Mass Phishing of Ukrainian State Institutions
    with Remcos RAT"; BushidoToken "sending waves of spam to Ukrainian organisations", malware
    "Remcos RAT, Quasar RAT, Venom RAT, RemoteUtilities RMM, and LummaStealer … all off-the-shelf
    commodity crimeware"; Malpedia "distributing the Remcos RAT malware through phishing campaigns,
    using tactics such as impersonating the Security Service of Ukraine"). REMOVED as unsupported:
    the specific lure triad "military mobilization, judicial documents, and tax authority
    communications" — carried by no reachable source; generalised to Ukrainian-language lures incl.
    impersonating the SSU (which IS corroborated). REMOVED as fabricated / source-contradicted:
    "designated Belarusian-aligned in CERT-UA's framing" and "operational support to Russian
    Ukraine-theater tasking" (old outcome_summary), and "consistent with subsequent Russian-vendor
    and Ukrainian-vendor consensus … some Western vendors prefer 'Russian-aligned' framing" (old
    summary) — no source; directly contradicted by CERT-UA's Russia-nexus-mercenary framing.
    incident_type data-theft -> espionage (Malpedia states motive "likely espionage"; no documented
    exfiltration outcome to carry data-theft; kept intrusion for the phishing).

    [b] ATTRIBUTION — CERT-UA, moderate, kept. Belarus framing removed. CERT-UA's framing =
    Russian-speaking mercenary "DaVinci Group" with "ties to Russian law enforcement" (BushidoToken
    verbatim); Malpedia = no national attribution, no Belarus/KGB. auspex_assessment
    concur-with-caveat (real CERT-UA cluster; nation unresolved). Rewrote attribution notes and
    corrected the false "Belarusian-aligned rests on BI.ZONE/Kaspersky" claim (those treat Belarus
    as VICTIM per the 2026-06-24 actor audit). NB heeded — did NOT over-attest to Russia-state: kept
    activity-cluster, not nation.

    [c] DATES — source published_on 2023-02-08 retained (existing record + prior audit; could NOT
    independently re-confirm the exact advisory date since the page is un-snapshottable and Malpedia's
    catalogue did not surface article/3804703's date in the snapshot — residual uncertainty).
    start_date 2022-04-01 = best-estimate cluster-activity start (BushidoToken: active "since the
    beginning of the Russian invasion of Ukraine in 2022"; actor active_since 2022-04-01).
    disclosure_date 2023-02-08. end_date null (ongoing cluster).

    [d] DOCTRINE_LINKS — by/union-state-integration/ukraine-theater-support DOWNGRADED
    strongly_inferred -> plausible; set contested: true + counter_explanation + inference_basis.
    alternatives. The doctrine is a Belarus framework but no cited source establishes a Belarus nexus
    (CERT-UA points to Russia), so the single-reading bar for strongly_inferred fails. Not attested
    (attesting_source_id null — correct; no source states a Union-State strategic purpose). Flagged
    for revisit when the actor's nation is resolved.

    [e] ATTRIBUTION_LEVEL — was MISSING; set activity-cluster (CERT-UA's UAC-XXXX cluster designation;
    the DaVinci/Russia-nexus is a characterisation, not a named unit or firm nation attribution).

    [f] ACTOR_ID — ru/unscoped/uac-0050 resolves to atlas/actors/by/uac-0050.yaml (id field
    ru/unscoped/uac-0050). Did NOT edit the actor file. FLAG: actor nation contested/unsourced — the
    actor's own 2026-06-24 audit concludes the correct home is likely criminal/uac-0050 or
    ru/proxies/uac-0050, NOT by/*.

    RESIDUAL UNCERTAINTIES: (1) exact CERT-UA advisory date and the specific lure themes could not be
    verified directly (SPA + archive.org block); (2) the entire Belarus/Union-State framing hinges on
    an unresolved actor nation, a human re-home decision.
