id: 2023-02/cert-ua-uac-0050-mass-phishing
name: CERT-UA documents UAC-0050 mass phishing against Ukrainian state institutions
start_date: 2022-04-01
disclosure_date: 2023-02-08
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  CERT-UA published an extended advisory on UAC-0050 spear-
  phishing campaigns against Ukrainian state institutions,
  documenting mass-scale Remcos RAT delivery via Ukrainian-
  language lures themed on military mobilization, judicial
  documents, and tax authority communications. The cluster
  was designated Belarusian-aligned in CERT-UA's framing, with
  operational support to Russian Ukraine-theater tasking.
false_flag_risk: none
summary: |
  Canonical CERT-UA designation of UAC-0050 as a continuous
  Ukrainian-target cluster active throughout the Russian
  invasion period. The "Belarusian-aligned" attribution is
  consistent with subsequent Russian-vendor and Ukrainian-vendor
  consensus, though some Western vendors prefer "Russian-aligned"
  framing.
