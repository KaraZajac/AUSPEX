id: 2023-02/technion-darkbit-muddywater
name: DarkBit ransomware against Technion — MuddyWater / MOIS
start_date: 2023-02-12
disclosure_date: 2023-02-12
end_date: 2023-03-31
incident_type:
  - ransomware
  - destructive
  - data-theft
initial_vector: unknown
outcome_summary: |
  DarkBit Golang ransomware for Windows and ESXi deployed
  against the Technion — Israel Institute of Technology.
  Significant disruption; ransom not paid.
false_flag_risk: none
summary: |
  Attributed by Israel's INCD to MuddyWater / MERCURY in February
  2023. Microsoft Threat Intelligence tracks the destructive sub-
  cluster as DEV-1084. The DarkBit Golang ransomware was deployed
  to both Windows endpoints and ESXi hypervisors at the Technion
  with anti-Israel ideological extortion messaging — a destructive
  operation laundered through a hacktivist persona in the same
  MOIS pattern previously seen with Pay2Key, Moses Staff, and
  Homeland Justice covers. Microsoft observed MERCURY / DEV-1084
  collaboration across on-premises and cloud phases, with the
  cloud-side destruction conducted via abuse of valid credentials
  and mass deletion of Azure AD resources rather than file
  encryption.
