id: 2023-02/technion-darkbit-muddywater
name: DarkBit ransomware against Technion — MuddyWater / MOIS
start_date: 2023-02-12
disclosure_date: 2023-02-12
end_date: null
incident_type:
  - ransomware
  - destructive
  - influence-operation
initial_vector: unknown
outcome_summary: |
  DarkBit Golang ransomware encrypted on-premises Windows systems
  at the Technion — Israel Institute of Technology (".darkbit"
  extension), forcing the university to postpone exams and shut
  down its IT systems. An ideological ransom note demanded 80
  bitcoin (~US$1.75M); there is no public indication the ransom
  was paid.
false_flag_risk: none
summary: |
  On 12 February 2023 a previously unknown "DarkBit" persona
  claimed a ransomware attack on the Technion via a Tor (.onion)
  site and Twitter / Telegram channels, leaving an ideological
  note that railed against an "apartheid regime," "occupation,"
  and tech-industry layoffs and demanded 80 bitcoin. On 7 March
  2023 Israel's National Cyber Directorate (INCD) attributed the
  attack to MuddyWater — an Iranian state actor that US Cyber
  Command had linked to Iran's Ministry of Intelligence and
  Security (MOIS). Microsoft Threat Intelligence (7 April 2023)
  tracked the destructive activity as DEV-1084 working "in
  partnership with MERCURY" (Microsoft's name for the MuddyWater
  cluster, later renamed Mango Sandstorm), and assessed that the
  actor "publicly adopted the DarkBit persona and presented itself
  as a criminal actor interested in extortion, likely as an attempt
  to obfuscate Iran's link to and strategic motivation for the
  attack." Though masqueraded as ransomware, Microsoft found the
  "unrecoverable actions show destruction and disruption were the
  ultimate goals" — pairing on-premises file encryption with
  en-masse deletion of the target's Azure cloud resources (server
  farms, virtual machines, storage accounts, virtual networks).
  Microsoft does not itself name the victim; the Technion
  identification rests on INCD plus the shared DarkBit persona and
  ".darkbit"/DARKBIT extension. This is MOIS destructive coercion
  laundered through a hacktivist persona — the same persona-
  laundering pattern attributed to Iranian services elsewhere (e.g.
  MOIS's attested HomeLand Justice cover). Kept deliberately
  distinct from the separately-attributed Moses Staff / Pay2Key /
  Agrius clusters, which are not MuddyWater.
attributions:
  - actor_id: ir/mois/muddywater
    attributing_org: Israel National Cyber Directorate
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-03-07
    attribution_source_id: incd/2023-02_technion-darkbit
    notes: |
      INCD publicly attributed the Technion/DarkBit attack to
      MuddyWater on 2023-03-07. The gov.il advisory is JS-gated (raw
      snapshot is a 2,554 B Angular shell), so the attribution is
      anchored on the snapshotted The Record mirror, which quotes
      INCD verbatim: "Israel's National Cyber Directorate on Tuesday
      attributed the attack to a threat group tracked as MuddyWater,
      which last year U.S. Cyber Command linked to the Iranian
      Ministry of Intelligence and Security."
  - actor_id: ir/mois/muddywater
    attributing_org: Microsoft Threat Intelligence
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-04-07
    attribution_source_id: microsoft/2023-04_dev-1084-darkbit
    notes: |
      Microsoft attributes the destructive DarkBit operation to
      DEV-1084, which "likely worked in partnership with MERCURY—an
      Iran-based actor that the US Cyber Command has publicly linked
      to Iran's Ministry of Intelligence and Security (MOIS)."
      MERCURY (= Mango Sandstorm) is Microsoft's tracking name for
      the MuddyWater cluster; the MOIS nexus is credited to US Cyber
      Command (secondary), and the DEV-1084<->MERCURY partnership is
      vendor-hedged ("likely"). Microsoft does not name the Technion.
