    analyst: claude
  - doctrine_id: ir/resistance-axis
    pillar_id: ir/resistance-axis/anti-israel-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      An Iranian MOIS-linked actor (MuddyWater) running a destructive
      operation against an Israeli academic institution behind an
      overtly anti-Israel ideological ransom note fits the coordinated
      anti-Israel coercive-cyber pillar. Strongly inferred rather than
      attested because the cited sources establish the anti-Israel
      targeting and the MOIS nexus but do not state the Resistance-Axis
      coordinated-coercion goal in substance for this single-actor
      operation.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Attribution: INCD attributes the attack to MuddyWater, which US Cyber Command linked to Iran's MOIS (The Record, 2023-03-07)."
        - "Target: the Technion — Israel Institute of Technology, an Israeli academic institution (BleepingComputer; The Record)."
        - "Messaging: the ransom note is overtly anti-Israel — an 'apartheid regime,' 'occupation,' 'war crimes,' and a tech-layoffs grievance (The Record; BleepingComputer)."
        - "Intent: Microsoft assesses 'destruction and disruption were the ultimate goals,' i.e. coercion/harm rather than financial extortion."
      ruled_out: "Financially-motivated cybercrime — ruled out by Microsoft's finding that the ransomware guise masked destruction as the objective and that the DarkBit persona existed to obfuscate Iran's strategic motivation, plus the ideological (not payment-mechanics-focused) tenor of the note."
    counter_explanation: null
    contested: false
    analyst: claude
