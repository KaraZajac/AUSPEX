id: 2023-02/cisa-aa23-040a-stopransomware-dprk
name: CISA AA23-040A — #StopRansomware DPRK joint advisory
start_date: 2023-02-09
disclosure_date: 2023-02-09
end_date: 2023-02-09
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Major joint advisory (CISA + NSA + FBI + HHS + ROK NIS + ROK
  DSA) consolidating DPRK ransomware operations targeting
  critical infrastructure — primarily Healthcare and Public
  Health. Names exploited CVEs: Log4Shell (CVE-2021-44228),
  SonicWall SMA100 (CVE-2021-20038), TerraMaster OS
  (CVE-2022-24990). Major doctrinal-attestation document:
  explicitly ties DPRK ransomware revenue to WMD financing.
false_flag_risk: none
summary: |
  AUSPEX captures this as a documentary event because it is the
  canonical multi-government attestation linking DPRK ransomware
  operations to WMD-program financing. First major joint US-ROK
  advisory on DPRK ransomware. AA23-040A catalogues the
  ransomware families used against US and ROK healthcare and
  public-health targets — Maui, H0lyGh0st (HolyGhost / SiennaPurple
  / SiennaBlue), BitLocker abuse for impact, and customized
  Reaper / TFlower variants — alongside intrusion tradecraft:
  exploitation of Log4Shell (CVE-2021-44228), SonicWall SMA100
  (CVE-2021-20038), and TerraMaster OS (CVE-2022-24990); web
  shells on internet-facing servers; PowerShell post-exploitation;
  the BLINDINGCAN and CLASSWELL backdoors; credential dumping and
  lateral movement using valid credentials; and Tor / VPN egress
  to obscure attribution. The advisory frames DPRK ransomware as
  a sustained revenue stream feeding the 8th Party Congress
  defense plan.
