outcome_summary: |
  Joint six-agency advisory (US NSA + FBI + CISA + HHS + ROK NIS +
  ROK DSA) consolidating DPRK state-sponsored ransomware operations
  against critical infrastructure — primarily Healthcare and Public
  Health. Names exploited CVEs: Log4Shell (CVE-2021-44228),
  SonicWall SMA 100 (CVE-2021-20038), and TerraMaster OS
  (CVE-2022-24990). Assesses that revenue from these ransomware /
  cryptocurrency operations "supports DPRK national-level priorities
  and objectives, including cyber operations targeting the United
  States and South Korea governments."
false_flag_risk: none
summary: |
  AUSPEX captures this as a documentary event: the first major joint
  US-ROK government advisory consolidating DPRK state-sponsored
  ransomware operations against critical infrastructure, primarily
  the Healthcare and Public Health (HPH) Sector. Co-authored by NSA,
  FBI, CISA, HHS, ROK NIS, and ROK DSA, AA23-040A supplements the
  July 2022 Maui advisory (AA22-187A) and describes DPRK cyber
  actors' use of two privately developed ransomware families — Maui
  and H0lyGh0st — alongside publicly available encryption tools (the
  advisory lists BitLocker, Deadbolt, LockBit 2.0, Ryuk and others)
  and custom remote-access-trojan / loader implants that enable
  ransomware deployment. Named tradecraft: acquiring infrastructure
  and cryptocurrency services under third-party foreign-affiliate
  identities; VPN/VPS and third-country IP addresses to obscure DPRK
  origin; and exploitation of public-facing applications via
  Log4Shell (CVE-2021-44228), unpatched SonicWall SMA 100 appliances
  (CVE-2021-20038), and TerraMaster OS (CVE-2022-24990), plus
  Trojanized "X-Popup" messenger files targeting small and mid-size
  South Korean hospitals; the advisory also notes DPRK actors have
  impersonated other crews such as REvil. The advisory attributes
  generically to "DPRK state-sponsored" cyber actors (its own
  metadata reads "Nation-State Actor: North Korea") and assesses
  that revenue from these operations "supports DPRK national-level
  priorities and objectives, including cyber operations targeting
  the United States and South Korea governments."
