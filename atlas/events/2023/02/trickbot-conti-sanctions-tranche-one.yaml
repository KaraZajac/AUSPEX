doctrine_links:
  - doctrine_id: us/ncs-2023
    perspective: defender-response
    pillar_id: us/ncs-2023/disrupt-dismantle
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The US/UK sanctions are a disrupt-and-dismantle counter-action:
      jy1256 states the action was taken "to disrupt Russian cybercrime
      and ransomware" and frames ransomware against critical infrastructure
      (hospitals) as the threat — the substance of the NCS-2023 Pillar 2
      goal (disrupt and dismantle threat actors; ransomware reframed as a
      national-security threat). NOT attested to NCS-2023 because this action
      (2023-02-09) PRECEDES the NCS-2023 strategy document (2023-03-02) by
      ~three weeks, so the attesting source cannot invoke that strategy; the
      action expresses the standing US disrupt-dismantle posture the strategy
      later formalizes (cf. the pre-NCS Emotet-Ladybird counter-action, also
      not attested). perspective defender-response: this is the acting
      (sanctioning) states' doctrine on a counter-action, not the actor's
      rationale.
    attesting_source_id: treasury/2023-02-09_trickbot-conti-sanctions
    inference_basis:
      signals:
        - "jy1256 states the purpose verbatim: the action is 'to disrupt Russian cybercrime and ransomware'."
        - "jy1256 frames the harm as ransomware against US/UK critical infrastructure (hospitals, medical facilities) — the exact threat NCS-2023 Pillar 2 reframes as a national-security matter."
        - "Instrument used (OFAC SDN designation + coordinated allied action) is an operational expression NCS-2023 Pillar 2 names for disrupting ransomware actors."
      ruled_out: "us/ncs-2023/forge-international-partnerships (Pillar 5): the joint US-UK framing fits Pillar 5, but the joint action is the delivery mechanism; jy1256 states the GOAL as disrupting cybercrime/ransomware (Pillar 2), so Pillar 2 is the dominant single reading and Pillar 5 the mechanism."
