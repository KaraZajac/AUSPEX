summary: |
  First joint US / UK cyber-sanctions action against ransomware-
  ecosystem operators (Treasury called it "the very first
  sanctions of their kind for the U.K."). Treasury's finding that
  current Trickbot members "are associated with Russian
  Intelligence Services" and that the group's 2020 preparations
  "aligned them to Russian state objectives" is the state-nexus
  basis AUSPEX combines with ContiLeaks for the criminal-state-
  symbiosis pattern behind the
  `ru/sanctions-response-2022/criminal-proxy-mobilization` pillar.
