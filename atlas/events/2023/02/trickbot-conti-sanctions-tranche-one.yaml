initial_vector: unknown
outcome_summary: |
  OFAC and the UK FCDO concurrently designated seven individuals
  who are part of the Russia-based Trickbot cybercrime group:
  Vitaly Kovalev ("Bentley"), Maksim Mikhailov ("Baget"),
  Valentin Karyagin ("Globus"), Mikhail Iskritskiy ("Tropa"),
  Dmitry Pleshevskiy ("Iseldor"), Ivan Vakhromeyev ("Mushroom"),
  and Valery Sedletski ("Strix") — described by Treasury as "the
  very first sanctions of their kind for the U.K." A separate
  indictment of Kovalev was unsealed the same day in the District
  of New Jersey. The designation cited the group's association
  with Russian intelligence services and the targeting of the US
  government and of critical infrastructure — including hospitals
  and medical facilities — in both the US and the UK. Conti /
  Wizard Spider is the AUSPEX ecosystem identification for the
  actor; those names do not appear in the Feb-2023 release, which
  designates the "Trickbot" group only.
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
