id: 2023-02/trickbot-conti-sanctions-tranche-one
name: First joint US / UK TrickBot / Conti sanctions tranche
start_date: 2023-02-09
disclosure_date: 2023-02-09
end_date: 2023-02-09
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  OFAC and UK FCDO concurrently designated seven members of the
  TrickBot / Conti / Wizard Spider ecosystem: Vitaly Kovalev
  ("Bentley"), Maksim Mikhailov ("Baget"), Valentin Karyagin
  ("Globus"), Mikhail Iskritsky ("Tropa"), Dmitry Pleshevskiy
  ("Iseldor"), Ivan Vakhromeyev ("Mushroom"), Valery Sedletski
  ("Strix"). Sanctions explicitly cited the group's FSB liaison
  (ContiLeaks 2022) and the targeting of US / UK government
  and critical infrastructure.
false_flag_risk: none
campaign_id: conti-trickbot-fsb-cluster
operators_named:
  - kovalev-vitaly  # TrickBot/Conti "Bentley", OFAC + UK FCDO Feb 2023
  - mikhailov-maksim  # TrickBot/Conti "Baget", OFAC + UK FCDO Feb 2023
  - karyagin-valentin  # TrickBot/Conti "Globus", OFAC + UK FCDO Feb 2023
  - iskritsky-mikhail  # TrickBot/Conti "Tropa", OFAC + UK FCDO Feb 2023
  - pleshevskiy-dmitry  # TrickBot/Conti "Iseldor", OFAC + UK FCDO Feb 2023
  - vakhromeyev-ivan  # TrickBot/Conti "Mushroom", OFAC + UK FCDO Feb 2023
  - sedletski-valery  # TrickBot/Conti "Strix", OFAC + UK FCDO Feb 2023
summary: |
  First-ever US / UK joint sanctions action against ransomware-
  ecosystem operators. Marks the formal codification of the
  criminal-state-symbiosis attribution pattern that ContiLeaks
  exposed and that AUSPEX uses as the foundation for the
  `ru/sanctions-response-2022/criminal-proxy-mobilization`
  pillar.
