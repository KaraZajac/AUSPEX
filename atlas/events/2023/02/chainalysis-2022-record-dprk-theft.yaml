id: 2023-02/chainalysis-2022-record-dprk-theft
name: Chainalysis 2022 record-year DPRK crypto-theft quantification
start_date: 2022-01-01
disclosure_date: 2023-02-01
end_date: 2022-12-31
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Chainalysis published its 2022 statistical breakdown
  documenting USD 3.8B total cryptocurrency theft for the
  calendar year — of which approximately USD 1.7B was
  attributed to DPRK-affiliated clusters. The most prolific
  year of DPRK crypto theft on record at the time, anchored
  by Ronin (March, USD 625M), Harmony (June, USD 100M),
  and the long-tail BlueNoroff / TraderTraitor portfolio.
  Subsequently cited by the UN Panel of Experts (final
  report April 2024), Treasury press releases, and FBI
  public attribution announcements through 2024.
false_flag_risk: none
summary: |
  Tighter cumulative-quantification companion to the
  2023-01-12 Crypto Crime Report — narrower DPRK-specific
  framing. Establishes the canonical 2022 doctrinal-baseline
  figure (USD 1.7B) against which subsequent years' DPRK
  crypto-theft tempo is measured: 2023 (~USD 1.0B), 2024
  (~USD 1.34B), and the 2025 single-event Bybit ceiling
  (~USD 1.5B in one operation).
