id: 2023-02/chainalysis-2022-record-dprk-theft
name: Chainalysis 2022 record-year DPRK crypto-theft quantification
start_date: 2022-01-01
disclosure_date: 2023-02-01
end_date: 2022-12-31
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Chainalysis published its 2022 statistical breakdown,
  reporting USD 3.8B in total cryptocurrency stolen for the
  calendar year — its "biggest year ever" for crypto
  hacking — primarily from DeFi protocols. It attributed an
  estimated USD 1.7B of that total to North Korea-linked
  hackers, naming the Lazarus Group as "by far the most
  prolific" such syndicate, with USD 1.1B of the DPRK total
  taken in DeFi-protocol hacks. Chainalysis observed that
  the haul dwarfs the DPRK's licit economy (2020 total
  exports of USD 142M) and stated that "most experts agree"
  the stolen funds are used to fund the regime's nuclear
  weapons programs — a record year for DPRK crypto theft.
  The post previews Chainalysis's forthcoming 2023 Crypto
  Crime Report.
false_flag_risk: none
summary: |
  DPRK-focused companion piece to Chainalysis's 2023 Crypto
  Crime Report, published as a standalone blog post
  quantifying calendar-year 2022 crypto hacking. It
  establishes the canonical 2022 baseline figures used
  across AUSPEX's DPRK crypto-theft record: USD 3.8B stolen
  overall, of which an estimated USD 1.7B is attributed to
  North Korea-linked hackers.
