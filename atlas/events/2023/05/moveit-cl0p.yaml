id: 2023-05/moveit-cl0p
name: Cl0p MOVEit Transfer zero-day mass exploitation
start_date: 2023-05-27
disclosure_date: 2023-05-31
end_date: 2023-12-31
incident_type:
  - data-theft
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Cl0p exploited a zero-day SQL injection vulnerability (CVE-2023-
  34362) in Progress Software's MOVEit Transfer managed-file-
  transfer application over the May 27–31 Memorial Day weekend.
  Mass-exploitation against ~2,700 organizations and an estimated
  93+ million individuals' data exfiltrated. Notable victims:
  US Department of Energy, Oregon DMV (~3.5M records), Louisiana
  OMV (~6M records), British Airways, BBC, Boots, Aer Lingus,
  Shell, Ernst & Young, PwC, Sony, the New York City Department
  of Education. Unique extortion model: Cl0p set a June 14 2023
  deadline for victims to contact them; published victim names
  on a leak site rather than encrypting data.
quantified_impact:
  organizations_affected: 2700
  individuals_affected: 93000000
false_flag_risk: none
summary: |
  Largest single mass-exploitation ransomware-extortion campaign
  on public record. Triggered the June 16 2023 State Department
  TOCRP USD 10M reward offer for Cl0p operator identification.
  Catalyzed CISA's "Secure by Design" push against MFT vendors
  and accelerated the EU NIS2 supply-chain provisions.
