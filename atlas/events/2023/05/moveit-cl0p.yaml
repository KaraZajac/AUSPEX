    attribution_source_id: cisa/2023-06-07_aa23-158a-cl0p-moveit-advisory
    notes: "Joint CISA/FBI advisory AA23-158A names 'CL0P Ransomware Gang, also known as TA505' as the exploiter of CVE-2023-34362 -> resolves to criminal/clop (TA505 is a listed alias). Level named-actor: a criminal cluster, not a nation-state unit. The advisory applies ZERO russia/state/proxy tokens to Cl0p; the RfJ 'foreign government' bounty is a solicited hypothesis, not a US finding -> auspex_assessment concur on the criminal attribution, no state nexus asserted."
doctrine_links: []  # ru/sanctions-response-2022/criminal-proxy-mobilization stays DROPPED (re-assessed 2026-07-10): no cited source documents a Russia-state nexus for Cl0p — CISA=criminal-gang framing, RfJ=solicited (unproven) foreign-gov link, Register/Microsoft="Russian [-speaking] crew" not state-sponsored — and the doctrine's roster (Conti/Killnet/NoName/CARR) never names Cl0p/TA505/FIN11. Stateless profit-criminal, like DarkSide/REvil.
