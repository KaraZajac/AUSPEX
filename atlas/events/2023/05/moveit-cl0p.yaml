id: 2023-05/moveit-cl0p
name: Cl0p MOVEit Transfer zero-day mass exploitation
start_date: 2023-05-27
disclosure_date: 2023-05-31
end_date: 2023-12-31
incident_type:
  - intrusion
  - data-theft
  - extortion
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Over the U.S. Memorial Day weekend, beginning 27 May 2023, Cl0p
  (TA505) exploited a previously unknown SQL injection zero-day
  (CVE-2023-34362) in Progress Software's MOVEit Transfer managed-
  file-transfer (MFT) application, planting the LEMURLOOT web shell to
  steal data from the underlying MOVEit databases; Progress disclosed
  the flaw and shipped an emergency patch on 31 May 2023. Because MOVEit
  is embedded in third-party service providers, the single vulnerability
  cascaded to thousands of downstream organizations: the first public
  wave (early June) hit UK payroll provider Zellis and, through it,
  British Airways, Boots, the BBC and Aer Lingus. Emsisoft's running
  tracker recorded 2,773 organizations and 95,788,491 individuals
  affected as of 28 June 2024 — early-campaign tallies were far smaller
  (~383 orgs / ~20M individuals by mid-July 2023) and grew for over a
  year. Other named victims include the US Department of Energy, the
  Oregon DMV/DOT (~3.5M records), the Louisiana OMV (~6M records), Shell
  and Johns Hopkins University. Cl0p's extortion was data-theft rather
  than encryption: victims were told to make contact before a 14 June
  2023 deadline and negotiate a price for deletion, or be named and have
  their data published on Cl0p's leak site.
quantified_impact:
  organizations_affected: 2773
  individuals_affected: 95788491
false_flag_risk: none
summary: |
  One of the largest single-vulnerability mass-exploitation data-theft
  extortion campaigns on record (2,773 organizations by Emsisoft's June
  2024 tally). On 16 June 2023 the US State Department's Rewards for
  Justice program offered up to USD 10M for information linking the Cl0p
  gang — or any actor targeting US critical infrastructure — to a foreign
  government; the offer SOLICITS (rather than asserts) a state nexus,
  consistent with AUSPEX's stateless criminal/clop placement. AUSPEX
  treats MOVEit as the peak of Cl0p's managed-file-transfer zero-day
  campaign line (Accellion 2020 -> GoAnywhere Q1 2023 -> MOVEit Q2 2023
  -> Cleo Q4 2024).
