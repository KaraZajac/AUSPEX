initial_vector: unknown
outcome_summary: |
  Joint CISA / FBI / Australian Cyber Security Centre advisory
  (AA23-136A) on BianLian ransomware. Documents the cluster's
  pivot from encrypt-and-extort to data-extortion-only after the
  Avast decryptor release in January 2023. Highlights US healthcare,
  critical-manufacturing, and professional-services targeting and
  characteristic Go-language tooling, RDP-credential initial
  access, and Ngrok / Rsocks tunneling tradecraft.
false_flag_risk: none
summary: |
  Foundational primary-source documentation of the BianLian
  cluster. AUSPEX includes this advisory as a standalone
  documentary event because it is the canonical multi-government
  attribution of BianLian as a discrete operator outside the
  Russian state-tolerated ecosystem (no FSB-tolerance language
  appears in any AA23-136A revision through 2024).
