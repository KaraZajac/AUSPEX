id: 2023-05/cisa-bianlian-advisory
name: CISA / FBI / ACSC joint advisory on BianLian ransomware
start_date: 2023-05-16
disclosure_date: 2023-05-16
end_date: 2023-05-16
incident_type:
  - documentary
  - law-enforcement
initial_vector: valid-creds
outcome_summary: |
  Joint FBI / CISA / Australian Cyber Security Centre
  #StopRansomware advisory (AA23-136A) on the BianLian ransomware
  and data-extortion group. Documents the cluster's shift from a
  double-extortion model (encrypt plus exfiltrate) to
  exfiltration-based extortion — "primarily" around January 2023
  and "exclusively" around January 2024 (per the November 2024
  revision). Records BianLian affecting multiple U.S.
  critical-infrastructure sectors since June 2022 and, in
  Australia, private enterprise / critical infrastructure plus
  professional services and property development. Characteristic
  tradecraft: valid-RDP-credential initial access (from access
  brokers), a per-victim custom Go backdoor, and Ngrok / Rsocks
  SOCKS5 tunneling.
false_flag_risk: none
summary: |
  Foundational primary-source documentation of the BianLian
  cluster. AUSPEX includes this advisory as a standalone
  documentary event because it is the canonical multi-government
  profile of BianLian as a ransomware / data-extortion criminal
  group (joint FBI + CISA + ASD's ACSC). The advisory's November
  2024 revision assesses the group as "likely based in Russia,
  with multiple Russia-based affiliates," but carries no
  state-sponsorship or FSB-tolerance language. AUSPEX therefore
  places BianLian under `criminal/`: a documented geographic
  origin is not a state nexus, and no safe-harbor / tasking
  attribution has been published. (Verified against the
  snapshotted November 2024 revision; earlier revisions not
  independently held.)
attributions:
  - actor_id: criminal/bianlian
    attributing_org: FBI + CISA + ASD's ACSC
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-05-16
    attribution_source_id: cisa/2023-05-16_aa23-136a-bianlian-advisory
    notes: |
      AA23-136A is a joint #StopRansomware advisory: "The Federal
      Bureau of Investigation (FBI), Cybersecurity and
      Infrastructure Security Agency (CISA), and Australian Signals
      Directorate's Australian Cyber Security Centre (ASD's ACSC)
      are releasing this joint Cybersecurity Advisory to disseminate
      known BianLian ransomware and data extortion group IOCs and
      TTPs". attribution_level = named-actor: a named criminal group
      is identified; no service/unit is named. The Nov-2024 revision
      adds "likely based in Russia, with multiple Russia-based
      affiliates" — a geographic-origin assessment, not a
      state-sponsorship or FSB-tolerance claim; hence criminal/,
      not ru/proxies/.
doctrine_links: []
