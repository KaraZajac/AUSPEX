id: 2023-05/operation-medusa-snake-disruption
name: Operation MEDUSA — court-authorized disruption of the FSB Snake malware network
start_date: 2023-05-09
disclosure_date: 2023-05-09
end_date: 2023-05-09
incident_type:
  - disruption
initial_vector: unknown  # this is the disruption operation, not the original intrusion
outcome_summary: |
  US DOJ + FBI court-authorized remote disable of the FSB Center
  16 "Snake" / Uroburos peer-to-peer C2 network using the bespoke
  PERSEUS tool. DOJ attributed Snake explicitly to "a unit within
  Center 16 of the FSB" — described as the most-sophisticated FSB
  espionage tool — and characterized the network as long-dwell
  collection infrastructure against NATO governments, journalists,
  defense industrial base in 50+ countries. The MEDUSA disruption
  itself is the disclosure event; the underlying Snake collection
  campaign dates back to 2004.
false_flag_risk: none
summary: |
  Operationally significant as a US-government technical hunt-and-
  destroy operation against a peer-state APT tool at scale, mirroring
  the later KV-Botnet (Volt Typhoon) disruption pattern. Companion
  CISA AA23-129A advisory published the same day. Snake was the
  long-running Turla codebase tied to Russian SVR/FSB historical
  collection against MFAs and embassies; the DOJ statement was
  unusually explicit about which FSB sub-unit ran it.
