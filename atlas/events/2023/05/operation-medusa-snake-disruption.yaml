id: 2023-05/operation-medusa-snake-disruption
name: Operation MEDUSA — court-authorized disruption of the FSB Snake malware network
start_date: 2023-05-09
disclosure_date: 2023-05-09
end_date: 2023-05-09
incident_type:
  - law-enforcement  # court-authorized FBI/DOJ counter-action (search warrant, EDNY) — meta type
  - disruption
initial_vector: unknown  # this is the disruption operation, not the original intrusion
outcome_summary: |
  US DOJ + FBI court-authorized remote disable of the FSB Center
  16 "Snake" / Uroburos peer-to-peer C2 network using the bespoke,
  FBI-created PERSEUS tool, which issued commands that caused Snake
  to "overwrite its own vital components" and disable itself without
  affecting the host. DOJ attributed Snake explicitly to "a unit
  within Center 16 of the FSB" (referred to in court documents as
  "Turla") — described as the most-sophisticated FSB espionage tool
  — and characterized the network as long-dwell collection
  infrastructure against NATO member governments, journalists, and
  other targets of interest in at least 50 countries. The MEDUSA
  disruption itself is the disclosure event; the underlying Snake
  collection campaign dates back to 2003-04 (developed as Uroburos).
false_flag_risk: none
summary: |
  Operationally significant as a US-government technical hunt-and-
  destroy operation against a peer-state APT tool at scale, mirroring
  the later KV-Botnet (Volt Typhoon) disruption pattern. Companion
  CISA AA23-129A advisory published the same day. Snake was the
  long-running Turla codebase tied to Russian FSB (Center 16)
  historical collection against foreign ministries and diplomatic
  targets; the DOJ statement was unusually explicit about which FSB
  sub-unit ran it.
