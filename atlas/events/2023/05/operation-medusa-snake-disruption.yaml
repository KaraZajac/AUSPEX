    pillar_id: ru/info-security-2016/information-sphere-as-domain
    program_id: null
    confidence: strongly_inferred  # DOWNGRADED from attested (AUDIT 2026-07-10): sources establish the FSB collection mission but never reference Russian doctrine
    perspective: attacker-rationale  # the DISRUPTED subject's (FSB/Turla) doctrine, not the US actor's rationale
    reasoning: |
      Snake was long-dwell FSB strategic foreign-intelligence
      collection infrastructure — the cited sources establish that
      purpose ("most sophisticated cyber espionage tool ... for
      long-term intelligence collection on sensitive targets";
      "nearly 20 years ... steal sensitive documents ... in at least
      50 countries"). Reading that as an instantiation of the 2016
      doctrine's treatment of the information sphere as a strategic
      domain is an AUSPEX analytical overlay: neither the DOJ release
      nor the CISA advisory references Russian doctrine.
    attesting_source_id: null
    inference_basis:
      source_id: cisa/2023-05-09_aa23-129a-snake-malware
      signals:
        - "CISA: 'the most sophisticated cyber espionage tool designed and used by Center 16 of Russia's Federal Security Service (FSB) for long-term intelligence collection on sensitive targets'"
        - "DOJ: 'For nearly 20 years, this unit ... has used versions of the Snake malware to steal sensitive documents ... in at least 50 countries'"
      ruled_out: "explicit attestation of the info-security-2016 doctrine or its terminal goal — the sources describe the FSB collection mission, never the doctrine"
    counter_explanation: |
      The 'information-sphere-as-domain' pillar is oriented toward
      information-confrontation / info-psychological contestation
      (journalism, NGOs, social platforms); Snake is a technical CNE
      espionage implant for document theft against governments and
      diplomats, so the pillar fit is partial. Could equally be
      framed as undifferentiated FSB strategic collection.
