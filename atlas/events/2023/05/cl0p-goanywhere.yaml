id: 2023-05/cl0p-goanywhere
name: Cl0p GoAnywhere MFT zero-day mass exploitation
start_date: 2023-01-18
disclosure_date: 2023-02-01
end_date: 2023-04-30
incident_type:
  - data-theft
  - extortion
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Cl0p exploited a pre-authentication remote-code-execution zero-day
  (CVE-2023-0669, an insecure-deserialization flaw in the GoAnywhere MFT
  License Response Servlet). Fortra's own investigation dates the
  earliest unauthorized activity to 18 January 2023 and directly
  observed data theft from hosted MFTaaS environments between 28-30
  January 2023; Fortra published its advisory on 1 February and an
  emergency patch (7.1.2) on 7 February 2023, after a public
  proof-of-concept appeared on ~6 February.

  On 10 February 2023 Cl0p claimed on its leak site to have stolen data
  from "over 130 organizations" — a self-claim BleepingComputer "could
  not independently confirm" and Fortra did not corroborate; the number
  of INDEPENDENTLY confirmed victims is far smaller. Confirmed victims
  include Community Health Systems (up to ~1M patients' PHI, per its SEC
  8-K), Hitachi Energy, Rubrik, and Hatch Bank (~140k Social Security
  numbers). Other organizations named on Cl0p's leak site (e.g. City of
  Toronto, Crown Resorts, Procter & Gamble) later acknowledged
  incidents; Saks Fifth Avenue said the exposed data was mock/test data.
  Extortion followed Cl0p's data-theft model (files generally not
  encrypted).
false_flag_risk: none
summary: |
  AUSPEX treats the GoAnywhere campaign as the first managed-file-
  transfer (MFT) zero-day mass-exploitation phase of Cl0p's MFT campaign
  line (2023-Q1 GoAnywhere -> 2023-Q2 MOVEit CVE-2023-34362 -> 2024-Q4
  Cleo) — the proof-of-concept pattern that scaled four months later
  into the far larger MOVEit campaign. Actor attribution to the
  Cl0p/TA505/FIN11 cluster rests on Mandiant's technical analysis
  (UNC4857 merged into FIN11); the campaign's scope beyond the confirmed
  victims rests on Cl0p's own uncorroborated leak-site claims and is
  therefore recorded as a claim, not a count.
