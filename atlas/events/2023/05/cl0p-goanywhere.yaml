  notes: |
    Phantom/link-rot remediation + full 6-point audit. The sole cited
    source (Mandiant blog) is LINK-ROTTED: the cloud.google.com URL
    returns a Google Cloud SPA soft-404 ("...fortra-goanywhere-cl0p was
    not found on this server. That's all we know."; 404-shell sha
    116d1bcd...4c2e2da1) with no article prose — curl + WebFetch both
    confirm. archive.org is blocked for the fetcher. PATH TAKEN:
    RE-SOURCE (badrabbit model) — the incident is real and heavily
    documented; added four reachable sources (all snapshotted + hashed)
    and kept the Mandiant record for attribution (annotated, no content
    hash). Level PARTIAL because the load-bearing ATTRIBUTION source
    (Mandiant) is un-snapshottable and mirror-corroborated only.

    [a] FACTS — corrected the central OVER-ATTESTATION. The record
    presented "~130 organizations affected" as fact carried by Mandiant.
    It is neither: the 130 figure is Cl0p's OWN leak-site claim, and
    Mandiant published no victim list. BleepingComputer (2023-02-10, sha
    dbcea075...4c68013b, 94,473 B): "saying they stole data from over 130
    organizations" and "BleepingComputer could not independently confirm
    Clop's claims, and Fortra has not replied". Reframed outcome_summary
    to record 130 as an uncorroborated self-claim and to separate
    INDEPENDENTLY-confirmed victims from leak-site listings. Confirmed:
    Community Health Systems ~1M PHI via its SEC 8-K — HIPAA Journal
    (2023-03-10, sha 92f8d5ec...37ba8ba, 388,801 B): "protected health
    information of up to 1 million individuals was potentially"
    [compromised]; Rubrik + Hatch Bank (~140k SSNs) + Hitachi Energy —
    The Record (2023-03-17, sha 7d83e5b8...1330a6da, 86,589 B): "Rubrik
    confirmed to The Record ... using the GoAnywhere bug", "Hatch Bank
    also said hackers used the Fortra bug to steal 140,000 customer
    Social Security numbers". Leak-site-listed-then-acknowledged (Toronto,
    Crown Resorts, P&G) kept but labelled as such; Saks flagged as
    disputed (test/mock data). Vuln nature + timeline set from Fortra's
    first-party post-mortem (2023-04-17, sha 9f3c6a2b...d726d42, 91,085
    B): "between January 28, 2023, and January 30, 2023, an unauthorized
    party used a previously unknown, zero-day remote code execution (RCE)
    vulnerability ... assigned CVE-2023-0669" and "this activity pushed
    the unauthorized activity timeline to January 18." Added incident_type
    'extortion' (Cl0p's data-theft-extortion model; files generally not
    encrypted). initial_vector 0-day retained (exploited from ~18 Jan,
    before the 1 Feb disclosure / 7 Feb patch).

    [b] ATTRIBUTION — attributing_org 'Mandiant + Fortra' -> 'Mandiant'
    (Fortra's post-mortem attributes no actor: zero Cl0p/Mandiant
    tokens). attribution_date 2023-02-10 -> 2023-02-23 (the Mandiant
