id: 2023-05/cl0p-goanywhere
name: Cl0p GoAnywhere MFT zero-day mass exploitation
start_date: 2023-01-18
disclosure_date: 2023-02-01
end_date: 2023-04-30
incident_type:
  - data-theft
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Cl0p exploited a zero-day deserialization vulnerability
  (CVE-2023-0669) in Fortra's GoAnywhere MFT product January
  2023. ~130 organizations affected including Community Health
  Systems (~1M patient records), Hitachi Energy, Procter & Gamble,
  Crown Resorts, Saks Fifth Avenue, the City of Toronto.
false_flag_risk: none
summary: |
  Cl0p's GoAnywhere campaign was the proof-of-concept exploit-
  zero-day-in-MFT-product pattern that scaled into the MOVEit
  campaign four months later. AUSPEX treats the two as
  sequential phases of a single Cl0p MFT-exploitation
  campaign (2023-Q1 GoAnywhere → 2023-Q2 MOVEit → 2024-Q4 Cleo).
