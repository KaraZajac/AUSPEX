id: 2023-05/volt-typhoon-public-disclosure
name: Volt Typhoon — Five Eyes joint disclosure of PRC pre-positioning in US critical infrastructure
start_date: 2021-01-01  # CISA-stated intrusion-period begin; actual onset earlier in some sectors
disclosure_date: 2023-05-24
end_date: null  # ongoing campaign at time of writing
incident_type:
  - intrusion
  - pre-positioning
initial_vector: valid-creds
outcome_summary: |
  CISA, NSA, FBI, and Five Eyes counterparts (NCSC-UK, ACSC, CCCS,
  GCSB) jointly disclosed a PRC state-sponsored campaign targeting
  US critical infrastructure — communications, energy, transportation
  systems, water and wastewater systems — characterized as
  pre-positioning to disrupt CII in the event of geopolitical
  crisis. FBI Director Wray's January 2024 House Select Committee
  testimony explicitly named a Taiwan-conflict scenario as the
  motivating contingency. Tradecraft is "living off the land"
  with valid credentials and built-in Windows tooling, deliberately
  evasive of EDR detection.
quantified_impact:
  affected_sectors: 4
  affected_orgs: ~24-plus  # CISA-named at first disclosure; expanded subsequently
false_flag_risk: none
campaign_id: volt-typhoon-cii-prepositioning
summary: |
  The first canonical public attribution of PRC pre-positioning
  in US civilian critical infrastructure with explicit linkage to
  a Taiwan-scenario motivation. The disclosure marks a tonal shift
  in US government public communications about PRC cyber: from
  predominantly economic-espionage framing to military-coercive
  framing. Volt Typhoon as a distinct actor cluster (separate from
  the broader MSS / PLA-attributed APT space) is itself a Microsoft
  MSTIC creation; subsequent reporting (CISA, Mandiant) has refined
  the cluster boundaries.
attributions:
  - actor_id: cn/unscoped/volt-typhoon
    attributing_org: CISA + NSA + FBI (with Five Eyes)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-05-24
    attribution_source_id: cisa/2023-05-24_aa23-144a-volt-typhoon
  - actor_id: cn/unscoped/volt-typhoon
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-05-24
    attribution_source_id: msft/2023-05-24_volt-typhoon-mstic
doctrine_links:
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/coercive-options
    program_id: null
    confidence: attested
    reasoning: |
      FBI Director Wray's testimony to the House Select Committee
      on the CCP (2024-01-31) framed Volt Typhoon as pre-positioning
      "to wreak havoc and cause real-world harm to American citizens
      and communities" "in the event of a conflict" — the hearing's
      subject being a Taiwan contingency. CISA's AA24-038A reiterated
      the framing. (QC pre-pass fetched a partial excerpt lacking the
      literal word 'Taiwan'; verify against the full testimony.)
    attesting_source_id: fbi/2024-01-31_wray-house-select-testimony
    inference_basis:
      source_id: fbi/2024-01-31_wray-house-select-testimony
      source_quote: "pre-positioning ... to wreak havoc and cause real-world harm to American citizens and communities ... in the event of a conflict (House Select Committee on the CCP — Taiwan contingency)"
    counter_explanation: null
    contested: false
    analyst: claude

  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/civil-infrastructure-targeting
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The target mix (energy, water, comms, transport) matches the
      civilian critical-infrastructure focus articulated in PLA
      strategic writing on "informatized" and "intelligentized"
      warfare against a peer adversary's homeland. No primary
      Chinese-source attestation; inferred from doctrinal analysis
      and target selection rather than self-statement.
    attesting_source_id: null
    counter_explanation: |
      The same intrusion footprint is consistent with strategic-
      intelligence collection and persistence; Volt Typhoon's
      living-off-the-land tradecraft cannot distinguish the two
      on technical grounds alone. The pre-positioning framing
      rests on US-government inference about intent, not on
      observed destructive action.
    contested: false
    analyst: claude

anticipated_timeline_markers:
  - marker_id: cn/taiwan/davidson-window-2027
    confidence: strongly_inferred
    reasoning: |
      Then-INDOPACOM commander Adm. Phil Davidson's 2021 SASC
      testimony framed 2027 as the earliest credible PLA window
      for Taiwan action. The intrusion period (2021-onward) and
      target mix are consistent with pre-positioning against that
      window, though no public US-government statement names
      the Davidson Window in connection with Volt Typhoon.

