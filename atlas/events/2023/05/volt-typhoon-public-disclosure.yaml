id: 2023-05/volt-typhoon-public-disclosure
name: Volt Typhoon — Five Eyes joint disclosure of PRC pre-positioning in US critical infrastructure
start_date: 2021-06-01  # Microsoft MSTIC: Volt Typhoon "active since mid-2021"; some ops possibly earlier. (Prior 2021-01-01 + "CISA-stated intrusion-period begin" comment was unsourced — no cited source states a Jan-2021 or CISA-attributed onset.)
disclosure_date: 2023-05-24
end_date: null  # ongoing campaign at time of writing
incident_type:
  - intrusion
  - pre-positioning
initial_vector: valid-creds
outcome_summary: |
  CISA, NSA, FBI, and Five Eyes counterparts (NCSC-UK, ACSC, CCCS,
  NCSC-NZ) jointly disclosed a PRC state-sponsored campaign against
  US critical infrastructure. Microsoft's paired MSTIC report
  (2023-05-24) named affected organizations spanning nine sectors —
  "communications, manufacturing, utility, transportation,
  construction, maritime, government, information technology, and
  education" — and assessed "with moderate confidence" that the
  campaign "is pursuing development of capabilities that could
  disrupt critical communications infrastructure between the United
  States and Asia region during future crises." The 2024-02-07 update
  (AA24-038A) sharpened the intent framing: PRC actors "are seeking
  to pre-position themselves ... for disruptive or destructive
  cyberattacks against U.S. critical infrastructure in the event of a
  major crisis or conflict with the United States." FBI Director
  Wray's 2024-01-31 testimony to the House Select Committee on the
  CCP framed the pre-positioning as preparation to "wreak havoc and
  cause real-world harm to American citizens and communities" "in the
  event of a conflict," tying FBI resourcing to 2027; Wray did NOT
  name Taiwan (verified against the raw testimony — 0 hits). Tradecraft
  is "living off the land" with valid credentials and built-in Windows
  tooling, deliberately evasive of EDR detection.
quantified_impact:
  affected_sectors: 9  # Microsoft MSTIC (2023-05-24) named 9 affected sectors at first disclosure; AA24-038A (2024) later emphasized the 4 core CI sectors (communications, energy, transportation, water/wastewater)
  affected_orgs: null  # STRIPPED 2026-07-11 (claude-opus-4.8/max): prior "~24-plus (CISA-named at first disclosure)" is unsourced — neither AA23-144A nor Microsoft states an org count. AA23-144A says only the activity "affects networks across U.S. critical infrastructure sectors." No "24" figure appears in any cited raw.
false_flag_risk: none
campaign_id: volt-typhoon-cii-prepositioning
summary: |
  The first canonical public attribution of PRC pre-positioning
  in US civilian critical infrastructure. The disclosure marks a
  tonal shift in US government public communications about PRC cyber:
  from predominantly economic-espionage framing to military-coercive
  framing. The Taiwan-contingency motivation is an analyst inference
  from context (the 2027 window; the House Select Committee on the
  CCP setting) — no cited source (Microsoft, AA23-144A, AA24-038A, or
  the Wray testimony) literally names Taiwan; the government's own
  framing is "a major crisis or conflict with the United States."
  Volt Typhoon as a distinct actor cluster (separate from the broader
  MSS / PLA-attributed APT space) is itself a Microsoft MSTIC
  creation; subsequent reporting (notably CISA AA24-038A) has refined
  the cluster boundaries.
attributions:
  - actor_id: cn/unscoped/volt-typhoon
    attributing_org: CISA + NSA + FBI (with Five Eyes)
    attributing_org_confidence: high
    attribution_level: named-actor  # AA23-144A names the GROUP ("a PRC state-sponsored cyber actor, also known as Volt Typhoon") at nation/PRC level; no Chinese service or unit named
    auspex_assessment: concur
    attribution_date: 2023-05-24
    attribution_source_id: cisa/2023-05-24_aa23-144a-volt-typhoon
  - actor_id: cn/unscoped/volt-typhoon
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: moderate  # DOWNGRADED from high 2026-07-11 (claude-opus-4.8/max): Microsoft states "Microsoft assesses with moderate confidence" and calls Volt Typhoon "a state-sponsored actor based in China" — no higher.
    attribution_level: named-actor  # Microsoft named the actor cluster (Volt Typhoon / DEV-0391) at nation level ("based in China"); no service/unit
    auspex_assessment: concur
    attribution_date: 2023-05-24
    attribution_source_id: msft/2023-05-24_volt-typhoon-mstic
doctrine_links:
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/coercive-options
    program_id: null
    confidence: strongly_inferred  # DOWNGRADED from attested 2026-07-11 (claude-opus-4.8/max). Prior source_quote appended a non-verbatim editorial gloss "(... Taiwan contingency)". Verified against raw snapshots: the word "Taiwan" appears 0 times in Wray's testimony, AA24-038A, AA23-144A, AND the Microsoft report. Sources attest coercive pre-positioning for "a major crisis or conflict with the United States"; the Taiwan-reunification nexus is analyst inference (2027 window; committee context), not source-stated.
    reasoning: |
      US-government framing attests coercive/disruptive pre-positioning
      against US critical infrastructure for a future conflict, but NO
      cited source names Taiwan. AA24-038A (2024-02-07): PRC actors
      "are seeking to pre-position themselves on IT networks for
      disruptive or destructive cyberattacks against U.S. critical
      infrastructure in the event of a major crisis or conflict with
      the United States." FBI Director Wray (2024-01-31, House Select
      Committee on the CCP): China's hackers are "positioning on
      American infrastructure in preparation to wreak havoc and cause
      real-world harm to American citizens and communities," with
      "low blows ... in the event of a conflict," and he tied FBI
      resourcing to "2027 — a year that ... the CCP has circled on its
      calendar." The Taiwan-reunification link is inferred from this
      2027 / Davidson-window context, not attested in the source text.
    attesting_source_id: null
    inference_basis:
      signals:
        - "AA24-038A verbatim: PRC actors pre-position 'for disruptive or destructive cyberattacks against U.S. critical infrastructure in the event of a major crisis or conflict with the United States'"
        - "Wray verbatim (2024-01-31): pre-positioning to 'wreak havoc and cause real-world harm to American citizens and communities' '... in the event of a conflict'; FBI resourcing tied to '2027 — a year that ... the CCP has circled on its calendar'"
        - "Hearing venue: US House Select Committee on Strategic Competition Between the United States and the CCP"
      ruled_out: "Literal source attestation of a Taiwan trigger: NONE of the five cited sources (Microsoft, AA23-144A, AA24-038A, Wray) contains the word 'Taiwan' (0 hits each, verified against raw snapshots); the Taiwan-contingency reading is analytic (2027 Davidson window), not source-stated"
    counter_explanation: null
    contested: false
    analyst: claude

  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/civil-infrastructure-targeting
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The target mix (energy, water, comms, transport) matches the
      civilian critical-infrastructure focus articulated in PLA
      strategic writing on "informatized" and "intelligentized"
      warfare against a peer adversary's homeland. No primary
      Chinese-source attestation; inferred from doctrinal analysis
      and target selection rather than self-statement.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target mix attested by Microsoft MSTIC (2023-05-24): affected organizations span 'communications, manufacturing, utility, transportation, construction, maritime, government, information technology, and education sectors' — civilian critical infrastructure matching the cn/mcf/civil-infrastructure-targeting pillar"
        - "AA24-038A: pre-positioning to 'disrupt functions' via 'lateral movement to OT assets' across civilian energy/water/comms/transport CI"
      ruled_out: "No primary Chinese-source attestation of an MCF rationale; the pillar link is inferred from target selection and doctrinal analysis, not self-statement — hence strongly_inferred, not attested"
    counter_explanation: |
      The same intrusion footprint is consistent with strategic-
      intelligence collection and persistence; Volt Typhoon's
      living-off-the-land tradecraft cannot distinguish the two
      on technical grounds alone. The pre-positioning framing
      rests on US-government inference about intent, not on
      observed destructive action.
    contested: false
    analyst: claude

anticipated_timeline_markers:
  - marker_id: cn/taiwan/davidson-window-2027
    confidence: strongly_inferred
    reasoning: |
      Then-INDOPACOM commander Adm. Phil Davidson's 2021 SASC
      testimony framed 2027 as the earliest credible PLA window
      for Taiwan action. The intrusion period (2021-onward) and
      target mix are consistent with pre-positioning against that
      window, though no public US-government statement names
      the Davidson Window in connection with Volt Typhoon.

