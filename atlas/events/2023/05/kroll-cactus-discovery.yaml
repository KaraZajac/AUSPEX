id: 2023-05/kroll-cactus-discovery
name: Kroll discovery of Cactus ransomware via Fortinet VPN exploitation
start_date: 2023-03-01
disclosure_date: 2023-05-09
end_date: 2023-05-09
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  Kroll Cyber Risk published the first public documentation of
  the Cactus ransomware family May 9, 2023. The disclosure
  documented Cactus's distinctive self-encrypting payload
  technique — the binary encrypts itself during deployment to
  evade endpoint detection — and the cluster's initial-access
  pattern of Fortinet VPN credential abuse. Kroll observed
  Cactus intrusions across multiple incident-response
  engagements beginning March 2023.
false_flag_risk: none
summary: |
  Foundational documentary event for the `criminal/cactus`
  cluster. Cactus subsequently became one of the most active
  mid-tier RaaS brands of 2023-24 with Schneider Electric
  Sustainability Business and Coop Sweden among notable
  victims. No public state-nexus attribution exists.
