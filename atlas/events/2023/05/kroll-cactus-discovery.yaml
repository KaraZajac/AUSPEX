id: 2023-05/kroll-cactus-discovery
name: Kroll discovery of Cactus ransomware via VPN-appliance exploitation
start_date: 2023-03-01
disclosure_date: 2023-05-09
end_date: 2023-05-09
incident_type:
  - documentary
initial_vector: n-day
outcome_summary: |
  Kroll Cyber Threat Intelligence published the first public
  documentation of the Cactus ransomware family in May 2023,
  coining the name (from the cAcTuS.readme.txt ransom note). The
  disclosure documented Cactus's distinctive self-encrypting
  encryptor — per Kroll the binary "requires a key to decrypt the
  binary for execution, likely to prevent detection via anti-virus
  software" (the AES key is planted in a ntuser.dat file loaded via
  a scheduled task) — and an initial-access pattern of exploiting
  documented vulnerabilities in VPN appliances. Kroll assessed
  those to be Fortinet VPN appliances in its statement to
  BleepingComputer; the Kroll bulletin itself names only "VPN
  appliances." Kroll observed the activity across several
  incident-response engagements dating to at least March 2023, with
  double-extortion (Rclone data theft prior to encryption).
false_flag_risk: none
summary: |
  Foundational documentary event for the `criminal/cactus`
  cluster: Kroll's May 2023 bulletin is the family's first public
  documentation and the origin of its name. Kroll characterized the
  victims only as "large commercial entities" and named no specific
  victim or industry sector at the time of writing. Cactus is
  financially motivated (data theft + extortion over Tox) with no
  published state nexus — hence `criminal/` placement and no
  doctrine link. (Later high-profile victims and the Qlik Sense /
  Fortinet-CVE tradecraft belong to separate 2023-24 events with
  their own sourcing and are intentionally not asserted here.)
attributions:
  - actor_id: criminal/cactus
    attributing_org: Kroll Cyber Threat Intelligence
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-05-09
    attribution_source_id: kroll/2023-05-09_cactus-ransomware-self-encrypting
    notes: "Kroll coined and named the CACTUS cluster from its own incident-response data ('a new ransomware strain which we're calling CACTUS'). named-actor — a named criminal ransomware group, more than a bare unnamed activity-cluster; no nation/unit applies. Confidence moderate (not upgraded): Kroll is confident it is a distinct new family but makes no actor-identity or state-nexus claim."
doctrine_links: []
sources:
