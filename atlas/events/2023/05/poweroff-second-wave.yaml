id: 2023-05/poweroff-second-wave
name: Operation PowerOFF second-wave — 13 more booter services seized
start_date: 2023-05-08
disclosure_date: 2023-05-08
end_date: 2023-05-08
incident_type:
  - law-enforcement
  - documentary
initial_vector: unknown
outcome_summary: |
  Court-authorized US seizure of 13 internet domains offering
  DDoS-for-hire ("booter" / "stresser") services, announced by the
  US Department of Justice / FBI on May 8 2023. Ten of the 13 seized
  domains were reincarnations of services taken down in the December
  2022 first wave (which had seized 48 domains); this was the third
  action in the US/international series against booters (December 2018
  took 15 sites; December 2022 took 48). FBI seizure notices replaced
  the homepages of the seized services (e.g. cyberstress[.]org,
  exoticbooter[.]com). The 13 seized domains: cyberstress[.]org,
  exoticbooter[.]com, layerstress[.]net, orbitalstress[.]xyz,
  redstresser[.]io, silentstress[.]wtf, sunstresser[.]net, silent[.]to,
  mythicalstress[.]net, dreams-stresser[.]org, stresserbest[.]io,
  stresserus[.]io and quantum-stress[.]org. The seizures were part of
  the coordinated international law-enforcement effort known as
  Operation PowerOFF.
false_flag_risk: none
summary: |
  DDoS-for-hire ("booter" / "stresser") services let non-technical
  customers rent powerful DDoS attacks through low-cost subscriptions
  (paid via PayPal, Google Wallet or cryptocurrency, from a few dollars
  to several hundred per month). AUSPEX models this takedown as a
  null-actor law-enforcement counter-action and classifies it as
  criminal-baseline: no state doctrine applies, hence doctrine_links [].
