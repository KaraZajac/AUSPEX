  notes: |
    RE-SOURCED (badrabbit model). The cited Krebs report is REAL, not a
    phantom: the URL resolves to the genuine article "Feds Take Down 13 More
    DDoS-for-Hire Services" (sha256 a0ce94e8…f4359b81, 51,535 bytes). But two
    load-bearing claims in the event were NOT carried by Krebs, and one was
    false, so re-sourcing was required: the DOJ USAO-CDCA govt-primary of record
    (bot-walled — no snapshot) and a snapshotted BleepingComputer report
    (sha256 0a928055…49f024fd, 91,539 bytes) that carries the Operation PowerOFF
    name verbatim. Every RETAINED claim is now carried by a snapshotted source
    (Krebs + BleepingComputer) → level full; the DOJ primary is corroborating,
    not sole-carrier.

    [a] FACTS — several corrections. Krebs verbatim: "The U.S. Federal Bureau of
    Investigation (FBI) this week seized 13 domain names connected to 'booter'
    services"; "Ten of the domains are reincarnations of DDoS-for-hire services
    the FBI seized in December 2022"; "In December 2022, the feds seized
    four-dozen booter domains … In December 2018, the feds targeted 15 booter
    sites"; "The websites that saw their homepages replaced with seizure notices
    from the FBI this week include booter services like cyberstress[.]org and
    exoticbooter[.]com"; and the explicit 13-domain list ("The booter domains
    seized by the FBI this week include: cyberstress[.]org exoticbooter[.]com
    layerstress[.]net orbitalstress[.]xyz redstresser[.]io silentstress[.]wtf
    sunstresser[.]net silent[.]to mythicalstress[.]net dreams-stresser[.]org
    stresserbest[.]io stresserus[.]io quantum-stress[.]org") — I counted exactly
    13. BleepingComputer corroborates verbatim: "Ten of the 13 domains seized
    today are reincarnations of services that were seized during a prior sweep
    in December, which targeted 48 top booter services" and the December 2018 =
    15 sites / December 2022 = 48 domains series. CORRECTIONS: (1) incident_type
    [disruption] → [law-enforcement, documentary] — this event IS the takedown /
    seizure, not a DDoS attack; per the directionality model a null-actor
    counter-action takes meta types (matches the sibling first-wave event
    2022-12/operation-poweroff-ddos-for-hire). (2) outcome_summary "FBI and
    Dutch National Police seized 13 additional … domains" → "FBI seized 13
    domains" — the "Dutch National Police" was a WRONG-WAVE import (see [b]).
    (3) Added the full 13-domain list, the ten-reincarnations relationship, and
    the third-in-series framing (all verbatim-sourced), and the Operation
    PowerOFF umbrella (carried by BleepingComputer, not by Krebs). (4) Kept
    "seizure banners replaced the homepages" — sourced by Krebs ("homepages
    replaced with seizure notices from the FBI") and BleepingComputer
    ("cyberstress.org seizure banner (DOJ)").

    [b] ATTRIBUTION — null-actor law-enforcement counter-action; actor_id stays
    null. KEY CORRECTION: attributing_org "FBI + Dutch Police" → "US DOJ + FBI
    (Operation PowerOFF)". The Netherlands / Dutch National Police is named by
    NONE of the reachable sources for this May-2023 wave: Krebs names only "the
    FBI" and generically "U.S. and international law enforcement actions";
    BleepingComputer names only the FBI/DOJ + a "coordinated international law
    enforcement effort (known as Operation PowerOFF)"; The Hacker News likewise
    names no foreign partner. The Dutch role is a real fact of the DECEMBER 2022
    first wave (joint FBI + Netherlands deterrent-ad campaign) that was
    erroneously carried forward. attribution_source_id repointed
    krebs → doj/2023-05-08_seize-13-booter-domains (the govt primary of record,
    matching the first-wave sibling). confidence high / concur retained (govt
    action, no ambiguity).

    [c] DATES — event start=disclosure=end 2023-05-08 CORRECT and retained: the
    DOJ/FBI seizure + announcement was May 8 2023 (BleepingComputer byline "May
    8, 2023 04:29 PM" / JSON-LD datePublished 2023-05-08; DOJ release May 8; the
    seizure "took place on May 8, 2023"). SOURCE-DATE CORRECTION: the Krebs
    source record's published_on 2023-05-08 → 2023-05-09 — the raw snapshot's
    own byline reads "Feds Take Down 13 More DDoS-for-Hire Services — May 9,
