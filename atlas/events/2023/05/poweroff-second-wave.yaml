    [d] DOCTRINE_LINKS [] — correct and retained. A criminal-baseline booter
    takedown carries no state strategic doctrine; not invented.

    [e] ATTRIBUTION_LEVEL — intentionally left unset (null-actor counter-action;
    no attributed adversary to grade activity-cluster / nation / named-actor /
    named-unit), consistent with the first-wave sibling and the raidforums /
