id: 2023-05/sidecopy-allakore-india-defense
name: SideCopy AllaKore RAT campaign against Indian defence (DRDO / Ministry of Defence)
start_date: 2023-01-01
disclosure_date: 2023-03-21
end_date: null
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: phishing
outcome_summary: |
  In early 2023 the Pakistan-linked SideCopy APT ran a spear-phishing
  campaign against Indian defence targets, centred on the Defence Research
  and Development Organisation (DRDO) and the Ministry of Defence. Cyble
  (21 Mar 2023) documented DRDO-themed lures — notably a "DRDO – K4 Missile
  Clean room" decoy delivered via a ZIP -> LNK chain — deploying the Action
  RAT backdoor and AuTo Stealer. Team Cymru (19 Apr 2023) then mapped the
  campaign's command-and-control and reported the AllaKore RAT (an
  open-source remote-access trojan modified for SideCopy operations)
  alongside Action RAT: 236 distinct AllaKore-RAT victims and 18 Action-RAT
  victims, all located in India, with management traffic sourced from
  Pakistani mobile-provider IPs and Proton VPN nodes. The two documented
  decoys were a DRDO K-4 missile document and a Ministry-of-Defence "Cyber
  Advisory" document.
false_flag_risk: none
summary: |
  Continuity data point for SideCopy's operational tempo against Indian
  defence between the 2021 Cisco Talos foundational disclosure and the
  Pahalgam-cycle intensification expected in 2025. AllaKore RAT — an
  open-source RAT modified by the group — is the operational staple here,
  alongside Action RAT. SideCopy is Pakistan-linked and widely reported as a
  Transparent Tribe (APT36) sub-cluster; no specific Pakistani intelligence
  service is named in the primary reporting, so the actor is carried as
  pk/unscoped.
attributions:
  - actor_id: pk/unscoped/sidecopy
    attributing_org: Team Cymru
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-04-19
    attribution_source_id: team-cymru/2023-04-19_allakore-sidecopy-train
    notes: |
      Team Cymru (the load-bearing AllaKore report): "attributed to
      SideCopy, a Pakistani-linked threat group"; "SideCopy may be a
      subdivision of Transparent Tribe (APT36)"; "a Pakistani-linked threat
      actor group, involved state-level espionage" — hedged wording, hence
      moderate. Cyble (21 Mar 2023) independently and more directly calls
      SideCopy "a Threat Actor(TA) from Pakistan that has been active since
      2019". Neither primary report names a specific Pakistani service (no
      ISI / Inter-Services Intelligence), so the actor stays pk/unscoped and
      the level is named-actor (group + nation, no unit).
doctrine_links:
  - doctrine_id: pk/asymmetric-posture-india
    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      SideCopy espionage against DRDO and the Indian Ministry of Defence —
      keylogging/screenshotting/exfiltrating from defence-research and
      military targets — is precisely the intelligence-collection activity
      the Pakistani asymmetric-posture military-collection pillar encodes.
      Team Cymru frames it as "state-level espionage", which names the
      proximate purpose (collection) rather than the doctrinal goal in
      words, so the link is strongly_inferred rather than attested (no
      attesting source states the strategic end).
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "Victimology is Indian defence R&D and the MoD (DRDO, Ministry of Defence) — a military-collection target set, not a political or economic one."
        - "Actor is Pakistan-attributed (Team Cymru: Pakistani-linked; Cyble: a Threat Actor from Pakistan) and espionage-missioned (keylogging, screenshots, file exfiltration via AllaKore/Action RAT)."
        - "Timing sits within the sustained Pakistan-India cyber-tension cycle SideCopy has operated in since 2019."
      ruled_out: "kashmir-political pillar — the documented victims are defence-research/military (DRDO, MoD), not Kashmir political/separatist targets; financial-crime motive is also ruled out (no ransomware/theft-for-profit, state-espionage tooling)."
