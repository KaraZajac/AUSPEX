id: 2023-05/sidecopy-allakore-india-defense
name: Cyble documents SideCopy AllaKore RAT targeting Indian defense research
start_date: 2023-01-01
disclosure_date: 2023-05-09
end_date: 2023-05-09
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cyble published a technical analysis of SideCopy operations
  in early 2023 against Indian defense-research entities,
  documenting deployment of the AllaKore RAT (open-source remote
  access trojan repurposed by SideCopy), ReverseRAT, and
  ActionRAT implants. Lures themed on Indian Ministry of Defence
  circulars, DRDO communications, and Indian Army recruitment
  documents. The campaign confirmed SideCopy's continued
  operational tempo against Indian defense targets following the
  2021 Cisco Talos foundational disclosure.
false_flag_risk: none
summary: |
  Continuity case for SideCopy through 2023, a useful tempo data
  point between the 2021 Talos disclosure and the Pahalgam-cycle
  intensification expected in 2025. The AllaKore RAT family — an
  open-source RAT widely available — is the operational staple
  alongside ReverseRAT and ActionRAT.
