id: 2023-05/treasury-jy1498-dprk-cyber-it-worker-pipeline
name: Treasury jy1498 SDN designations of DPRK cyber-training and IT-worker entities
start_date: 2023-05-23
disclosure_date: 2023-05-23
end_date: 2023-05-23
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  US Treasury OFAC SDN-designated four DPRK entities and
  one individual (Kim Sang Man) for facilitating
  cyber-malicious activities and the IT-worker fraud
  program. Designated entities: Pyongyang University of
  Automation (the DPRK's principal training pipeline for
  cyber personnel), the 110th Research Center of the RGB,
  the Technical Reconnaissance Bureau, and Chinyong IT
  Cooperation Company. First Treasury action explicitly
  targeting the cyber-personnel training pipeline rather
  than only the operational units that field the
  personnel.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Doctrinally significant Treasury action extending the
  sanctions reach upstream from operational cyber units
  to the personnel-pipeline level. Pyongyang University
  of Automation is explicitly named as the institution
  that trains DPRK cyber operators — the long-term
  cadre-development side of the 8th-Congress defense
  plan's cyber pillar. The Kim Sang Man designation
  named the Chinyong IT Cooperation Company chief as a
  specific human responsible for the IT-worker
  revenue-aggregation program. Companion event to the
  Sim Hyon Sop action of one month prior (jy1435,
  24 April 2023).
