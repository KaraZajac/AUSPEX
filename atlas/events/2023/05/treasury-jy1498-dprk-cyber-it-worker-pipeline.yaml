id: 2023-05/treasury-jy1498-dprk-cyber-it-worker-pipeline
name: Treasury jy1498 SDN designations of DPRK cyber-training and IT-worker entities
start_date: 2023-05-23
disclosure_date: 2023-05-23
end_date: 2023-05-23
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  US Treasury OFAC SDN-designated four DPRK entities and
  one individual (Kim Sang Man) for involvement in
  obfuscated revenue generation and malicious cyber
  activities supporting the DPRK government. Designated
  entities: Pyongyang University of Automation (one of the
  DPRK's premier cyber-instruction institutions, which
  trains malicious cyber actors who go on to RGB-subordinate
  cyber units), the RGB-controlled Technical Reconnaissance
  Bureau and its subordinate 110th Research Center, and the
  Chinyong Information Technology Cooperation Company. The
  designation notably reaches the cyber-personnel training
  pipeline (Pyongyang University of Automation), not only the
  operational units that field the personnel.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Doctrinally significant Treasury action extending the
  sanctions reach upstream from operational cyber units
  to the personnel-pipeline level. Pyongyang University
  of Automation is named as an institution that trains
  DPRK cyber operators (many of whom go on to
  RGB-subordinate cyber units) — the long-term
  cadre-development side of the 8th-Congress defense
  plan's cyber pillar. Kim Sang Man is designated as a
  Chinyong representative based in Vladivostok, Russia,
  presumed to handle salary payments to overseas DPRK
  worker delegations and reported to have received more
  than $2 million in cryptocurrency transfers from IT
  teams in China and Russia. Companion event to the
  Sim Hyon Sop action of one month prior (jy1435,
  24 April 2023).
