    Pyongyang University of Automation (PUA), Technical Reconnaissance Bureau,
    its subordinate 110th Research Center, Chinyong (a.k.a. Jinyong) IT
    Cooperation Company + Kim Sang Man. THREE overstatements corrected:
    (1) "principal training pipeline" → "one of the DPRK's premier
