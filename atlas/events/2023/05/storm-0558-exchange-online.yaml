id: 2023-05/storm-0558-exchange-online
name: Storm-0558 forged-token Exchange Online intrusion (State / Commerce)
start_date: 2023-05-15
disclosure_date: 2023-07-11  # Microsoft + State Dept public disclosure
end_date: 2023-06-27  # Microsoft blocked the acquired-MSA-key tokens in OWA (forged-token access terminated); actor then pivoted to phishing
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: valid-creds  # forged Azure AD / MSA tokens via a stolen 2016 MSA consumer signing key (key-acquisition method undetermined per CSRB)
outcome_summary: |
  China-based actor "Storm-0558" forged Azure AD / MSA
  authentication tokens using a stolen 2016 Microsoft consumer
  (MSA) signing key — exploiting a token-validation flaw that let
  a consumer key access enterprise Exchange Online — to read
  Exchange Online (OWA) mailboxes of US officials over an
  at-least-six-week dwell. Per the CSRB, the actor accessed
  mailboxes at the US Department of State, Department of Commerce,
  and US House of Representatives, including Commerce Secretary
  Gina Raimondo, US Ambassador to the PRC R. Nicholas Burns,
  Assistant Secretary of State for East Asian & Pacific Affairs
  Daniel Kritenbrink, and Rep. Don Bacon, across 22 enterprise
  organizations plus 503 related personal accounts worldwide
  (Microsoft's initial disclosure estimated ~25 organizations).
  Approximately 60,000 emails were exfiltrated from the State
  Department alone. How Storm-0558 obtained the signing key
  remains undetermined: Microsoft's September 2023 "crash dump"
  explanation was retracted as inaccurate (corrected March 2024),
  and the CSRB found no evidence of a crash dump containing the
  key and that Microsoft "does not know how Storm-0558 obtained
  the 2016 MSA key."
quantified_impact:
  emails_exfiltrated: 60000        # CSRB: ~60,000 "from State Department alone"
  affected_orgs: 22                # CSRB: 22 enterprise organizations (Microsoft's early estimate was ~25)
  personal_accounts: 503           # CSRB: 503 related personal/consumer accounts worldwide
false_flag_risk: none
summary: |
  State Department SOC analysts first detected the intrusion on
  15-16 June 2023 via a custom "Big Yellow Taxi" MailItemsAccessed
  alert (available only under State's premium G5 logging license);
  Microsoft publicly disclosed it on 2023-07-11 and published the
  technical analysis on 2023-07-14. Microsoft blocked the
  acquired-key tokens in OWA on 26-27 June 2023, terminating
  forged-token access (the actor then pivoted to phishing). The
  DHS Cyber Safety Review Board's April 2024 post-mortem sharply
  criticized Microsoft's identity-system security culture and its
  slow, initially inaccurate public root-cause statements.
  Microsoft assessed the operation as "a targeted
  information-collection operation aimed at fulfilling the PRC's
  intelligence needs"; the CSRB tied the timing (just before
  Secretary of State Blinken's June 2023 Beijing trip) and the
  seniority of the China-policy officials hit to diplomatic /
  decision-maker SIGINT on the US-PRC relationship.
attributions:
  - actor_id: cn/unscoped/storm-0558
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: moderate   # corrected high->moderate: Microsoft assesses "with moderate confidence"
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-07-14
    attribution_source_id: microsoft/2023-07-14_storm-0558-analysis
    notes: |
      Microsoft assesses "with moderate confidence that Storm-0558
      is a China-based threat actor with activities and methods
      consistent with espionage objectives" — MODERATE, not high
      (event confidence corrected high->moderate on this audit).
      Level is named-actor: Microsoft tracks a discrete named
      cluster ("Storm-0558", later renamed Antique Typhoon) but
      names no Chinese service/unit, so the nation nexus is
      China-only — hence actor id cn/unscoped/storm-0558.
  - actor_id: cn/unscoped/storm-0558
    attributing_org: US Cyber Safety Review Board
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-04-02
    attribution_source_id: csrb/2024-04_storm-0558-review
    notes: |
      CSRB states the actor is "assessed to be affiliated with the
      People's Republic of China in pursuit of espionage
      objectives" and frames the operation as "aimed at fulfilling
      the PRC's intelligence needs" — a firm, unhedged PRC
      attribution at nation level; no MSS/PLA service or unit named.
doctrine_links:
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/decision-maker-sigint
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The CSRB attests the operation's collection purpose in
      substance: it was "a targeted information-collection
      operation aimed at fulfilling the PRC's intelligence needs";
      the targeted senior officials "have substantial
      responsibilities for many aspects of the U.S. government's
      bilateral relationship with the PRC" (Commerce Sec. Raimondo,
      Ambassador to the PRC R. Nicholas Burns, Assistant Secretary
      for East Asian & Pacific Affairs Daniel Kritenbrink); and the
      timing fell "just before Secretary Blinken's trip to Beijing
      in 2023". That is decision-maker SIGINT on the people who set
      US China-policy — the substance of this pillar. Held at
      strongly_inferred (not attested) because the CSRB frames the
      end as general US-PRC bilateral-relationship intelligence and
      does NOT tie it to the Taiwan-reunification doctrine
      specifically; the Taiwan-contingency framing is AUSPEX
      inference, not a source assertion.
    attesting_source_id: csrb/2024-04_storm-0558-review
    inference_basis:
      signals:
        - 'CSRB: the intrusion was "a targeted information-collection operation aimed at fulfilling the PRC''s intelligence needs"'
        - 'CSRB: the targeted senior officials (Raimondo, Burns, Kritenbrink) "have substantial responsibilities for many aspects of the U.S. government''s bilateral relationship with the PRC"'
        - 'CSRB: timing "just before Secretary Blinken''s trip to Beijing in 2023, combined with the seniority of the officials targeted"'
      ruled_out: |
        Pure economic-IP / dual-use-tech theft does not fit — the
        targets are diplomatic and political principals and their
        email, not R&D or industrial IP. Financially-motivated
        crime is ruled out by the government-official target set and
        the espionage assessment.
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/mcf
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Retained only as a generic strategic-collection umbrella. MCF
      is a weak fit for THIS operation: its substance is fusing
      foreign civilian R&D / dual-use technology and industrial IP
      into military capability, whereas Storm-0558 collected
      diplomatic and political SIGINT (cabinet-level email on US-PRC
      policy). No cited source ties the operation to MCF; a
      bulk-collection instrument such as cn/national-intelligence-law-2017
      fits diplomatic email collection better than MCF does.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - 'cn/national-intelligence-law-2017 (all-source intelligence-collection mandate) — a better-fitting instrument for diplomatic email collection than MCF'
        - Generic PRC political / diplomatic espionage with no specific codifying framework
        - 'cn/mcf (the tag shown here) — only as a broad strategic-collection umbrella; its dual-use / industrial substance does not match a diplomatic SIGINT op'
    counter_explanation: |
      MCF's dual-use-R&D and industrial-IP substance does not match
      a diplomatic / political SIGINT operation; the decision-maker
      SIGINT pillar above is the dominant, better-supported read.
    contested: false
    analyst: claude
