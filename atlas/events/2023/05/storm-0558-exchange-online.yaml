sources:
  - microsoft/2023-07-14_storm-0558-analysis
  - csrb/2024-04_storm-0558-review
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-10
  level: full
  notes: |
    Audited vs the two cited sources, both snapshotted + hashed on
    disk and re-verified this pass:
      - microsoft/2023-07-14_storm-0558-analysis (MSTIC blog, raw
        HTML sha256 be548e62786b8e5903dd46edcdf186bac4ebd15f71a815081b921d69d239f6cd)
      - csrb/2024-04_storm-0558-review (DHS Cyber Safety Review
        Board 34-page report, raw PDF sha256
        c4d3f2160e64016215564dc501f6eeb087e15a3bc199c365cc20eeeac24805db;
        text extracted with pdftotext -layout for verification).
    Every load-bearing claim is carried by a snapshotted source -> level: full.

    [a] FACTS. Verified against raw: forged Azure AD / MSA tokens
    via an acquired Microsoft consumer (MSA) signing key exploiting
    a token-validation flaw, accessed via Outlook Web Access (OWA)
    (Microsoft: "forging Azure AD tokens using an acquired Microsoft
    account (MSA) consumer signing key... made possible by a
    validation error in Microsoft code"; CSRB: "a flaw in the token
    validation logic used by Exchange Online that could allow a
    consumer key to access enterprise Exchange accounts"). Start
    "Beginning May 15, 2023" (Microsoft); detected by State on
    15-16 June 2023; mitigations 26-27 June 2023 (Microsoft blocked
    the acquired-key tokens in OWA on June 27). Victims (CSRB):
    US Dept of State, Dept of Commerce, US House of Representatives;
    named mailboxes Commerce Sec. Gina Raimondo, Ambassador to the
    PRC R. Nicholas Burns, Asst Sec of State for East Asian & Pacific
    Affairs Daniel Kritenbrink, Rep. Don Bacon; "22 enterprise
    organizations, as well as 503 related personal... accounts,
    worldwide"; "approximately 60,000 emails from State Department
    alone" over "at least six weeks". CORRECTIONS made: (1) MAJOR -
    outcome_summary asserted the signing key was "extracted from a
    2021 Windows crash dump" as fact; the CSRB REFUTES this
    ("Microsoft has no evidence or logs showing the stolen key's
    presence in or exfiltration from a crash dump"; the Sept 6 2023
    crash-dump blog was "inaccurate", corrected March 12 2024; "the
    Board assesses that Microsoft does not know how Storm-0558
    obtained the 2016 MSA key") -> rewritten to state the
    key-acquisition method is undetermined. (2) affected_orgs 25 -> 22
    (CSRB's enumerated "22 enterprise organizations"; Microsoft's
    early "~25" noted in prose); added personal_accounts: 503.
    (3) "60,000 ... from the Secretary's office and EAP bureau" -> "from
    the State Department alone" (per CSRB). (4) "Congressional staff"
    -> US House of Representatives incl. Rep. Don Bacon. (5) "European
    foreign ministries" over-specified -> victims linked to Western
    European / APAC / Latin American / Middle Eastern orgs; foreign-
    ministry sector target downgraded primary -> secondary. (6) Dropped
    the unsourced "point to Taiwan" assertion and editorial flourish
    from summary. end_date 2023-06-24 (unsourced) -> 2023-06-27
    (Microsoft blocked the acquired-key tokens in OWA; access cut).

    [b] ATTRIBUTION. Microsoft attribution confidence corrected
    high -> MODERATE: Microsoft "assesses with moderate confidence
    that Storm-0558 is a China-based threat actor with... espionage
    objectives" (over-attestation fix; the source record already
    flagged the mismatch). CSRB kept at high: it states the actor is
    "assessed to be affiliated with the People's Republic of China in
    pursuit of espionage objectives" (unhedged). Both attributions
    are auspex_assessment: concur, China nation nexus only.

    [c] DATES. start 2023-05-15 (op onset, Microsoft) vs disclosure
    2023-07-11 (Microsoft/State public disclosure; the cited MSTIC
    technical blog is 2023-07-14 and itself references "our July 11
    blogs") vs end 2023-06-27 (forged-token access terminated). Not
    conflated. Source published_on dates verified: Microsoft blog
    2023-07-14; CSRB report released 2024-04-02 (cover dated
    2024-03-20). pdfinfo confirms the PDF Title "Review of the Summer
    2023 Microsoft Exchange Online Intrusion", 34 pages.

    [d] DOCTRINE_LINKS. Link 1 (cn/taiwan-reunification /
    decision-maker-sigint): held at strongly_inferred, NOT attested.
    The CSRB attests the collection PURPOSE in substance ("a targeted
    information-collection operation aimed at fulfilling the PRC's
    intelligence needs"; senior officials "with substantial
    responsibilities for... the U.S. government's bilateral
    relationship with the PRC"; timing "just before Secretary
    Blinken's trip to Beijing in 2023") but does NOT tie it to the
    Taiwan-reunification doctrine specifically - the Taiwan framing is
    AUSPEX inference. Added attesting_source_id (CSRB) + inference_basis
    {signals, ruled_out}. Link 2 (cn/mcf): kept plausible but reframed
    honestly as a weak fit (MCF's dual-use/industrial-IP substance
    does not match a diplomatic SIGINT op); added inference_basis
    {alternatives} naming cn/national-intelligence-law-2017 as the
    better-fitting instrument. perspective is attacker-rationale
    (default; PRC doctrine on a PRC operation).

    [e] ATTRIBUTION_LEVEL. Added (was missing): named-actor on both
    attributions. Microsoft tracks a discrete named cluster
    ("Storm-0558", later "Antique Typhoon") and CSRB adopts it; the
    nation nexus is China-only with no service/unit named.

    [f] ACTOR_ID. cn/unscoped/storm-0558 resolves to
    atlas/actors/cn/storm-0558.yaml (id: cn/unscoped/storm-0558),
    correctly demoted from cn/mss on 2026-06-24 - neither source names
    the MSS or any Chinese service. Directionality correct (China
    attacker; US government + allied victims). No counter-action, so
    actor_id is populated (not null).

