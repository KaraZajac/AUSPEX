id: 2023-05/storm-0558-exchange-online
name: Storm-0558 forged-token Exchange Online intrusion (State / Commerce)
start_date: 2023-05-15
disclosure_date: 2023-07-11  # Microsoft + State Dept public disclosure
end_date: 2023-06-24
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds  # forged Azure AD tokens via stolen MSA signing key
outcome_summary: |
  PRC-attributed actor "Storm-0558" used a stolen Microsoft
  consumer MSA signing key (extracted from a 2021 Windows crash
  dump that improperly contained the key) to forge Azure AD
  authentication tokens and access Exchange Online OWA mailboxes
  of US government officials. Approximately 60,000 State
  Department emails exfiltrated from the Secretary's office and
  East Asia / Pacific bureau over a six-week dwell, plus
  Commerce Secretary Raimondo's office, Congressional staff, and
  approximately 25 organizations including European foreign
  ministries.
quantified_impact:
  emails_exfiltrated: 60000
  affected_orgs: 25
false_flag_risk: none
summary: |
  Detected by State Department analysts; Microsoft disclosed
  the technique on 2023-07-11 and the Cyber Safety Review Board
  published a critical post-mortem (2024-04) condemning
  Microsoft's identity-system security culture. Timing
  (immediately before US Secretary of State Blinken's June 2023
  Beijing visit) and the EAP-bureau focus point to Taiwan and
  China-policy decision-maker SIGINT. The CSRB report is itself
  doctrinally consequential — it reframed US public-sector cloud
  identity as a strategic-collection battleground.
