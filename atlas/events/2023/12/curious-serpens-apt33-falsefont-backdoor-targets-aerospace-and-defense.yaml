id: 2023-12/curious-serpens-apt33-falsefont-backdoor-targets-aerospace-and-defense
name: "Curious Serpens (APT33) FalseFont backdoor targets aerospace and defense sector"
start_date: 2023-12-01
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
false_flag_risk: none
summary: |
  Palo Alto Unit 42 analyzed the FalseFont backdoor used by Curious Serpens (aka Peach Sandstorm, APT33, Elfin, Holmium, Refined Kitten), which Unit 42 describes only as a "suspected Iranian-affiliated threat actor", against the aerospace and defense industries (Microsoft Threat Intelligence first noted this actor's use of FalseFont in December 2023; Unit 42 published its analysis 2024-03-21). FalseFont mimics legitimate HR software via a fake job-recruitment process and impersonates a login interface for a U.S.-based aerospace company; it steals credentials from web browsers and from the aerospace job-application platform, establishes persistence (registry Run key) and C2 (with SignalR for real-time commands), and executes processes/commands on the host. Confidence held at the source's own hedge: Unit 42 says only "suspected Iranian-affiliated" and never names the IRGC; the cited page's sole Microsoft reference says only that Microsoft "identified the backdoor as FalseFont" (no service attribution). Distinct from the Tickler operation and not in the inventory.
