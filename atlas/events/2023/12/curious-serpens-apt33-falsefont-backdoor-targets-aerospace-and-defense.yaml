initial_vector: phishing
false_flag_risk: none
summary: |
  Palo Alto Unit 42 analyzed the FalseFont backdoor used by Curious Serpens (aka Peach Sandstorm, APT33, Elfin, Holmium, Refined Kitten), a suspected Iranian-affiliated actor, against the aerospace and defense sectors (first flagged by Microsoft in Nov-Dec 2023). FalseFont impersonates an aerospace-company HR/job-application portal, steals job-platform credentials, provides remote access, launches additional files and exfiltrates to C2. Confidence set to strongly_inferred because the Unit 42 page hedges on attribution ('suspected Iranian-affiliated'); Microsoft's parallel disclosure attributes it to IRGC-linked Peach Sandstorm. Distinct from the Tickler operation and not in the inventory.
