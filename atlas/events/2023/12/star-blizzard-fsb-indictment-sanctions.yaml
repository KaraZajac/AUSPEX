outcome_summary: |
  Coordinated US+UK counter-action on 7 December 2023 against the FSB
  spear-phishing group Star Blizzard (aka Callisto Group / SEABORGIUM /
  COLDRIVER): a DOJ indictment (federal grand jury, San Francisco) of
  Ruslan Aleksandrovich Peretyatko — "an officer in Russia's Federal
  Security Service (FSB) Center 18" — and Andrey Stanislavovich
  Korinets; Treasury OFAC SDN designations of both men (E.O. 13694, as
  amended by E.O. 13757); UK FCDO sanctions of the same two plus a
  summons of the Russian Ambassador; a joint CISA/NCSC advisory
  (AA23-341A) assessing Star Blizzard "almost certainly subordinate to
  ... FSB Centre 18"; and US State Department Rewards for Justice offers
  of up to $10M. Subject actor: ru/fsb/center-18/star-blizzard.
false_flag_risk: none
operators_named:
  - peretyatko-ruslan  # Ruslan Aleksandrovich Peretyatko — "an officer in ... FSB Center 18" (DOJ); OFAC + UK FCDO designated, 7 Dec 2023
  - korinets-andrey    # Andrey Stanislavovich Korinets — "an IT worker in Syktyvkar, Russia" who built the spear-phishing domain infrastructure "at least 39 domains" (Treasury); OFAC + UK FCDO designated. NOT an FSB officer per the sources.
summary: |
  A US+UK law-enforcement + sanctions counter-action against the FSB
  spear-phishing group Star Blizzard — NOT a cyber operation. On 7
  December 2023 the US DOJ unsealed a San Francisco grand-jury
  indictment of two Russians: Ruslan Peretyatko, "an officer in ... FSB
  Center 18," and Andrey Korinets, described by Treasury as "an IT
  worker in Syktyvkar, Russia" who "fraudulently created and registered
  malicious domain infrastructure" (at least 39 domains via 5
  registrars) for the FSB campaigns. Simultaneously Treasury OFAC and
  the UK FCDO sanctioned both men (OFAC under E.O. 13694 as amended),
  the UK summoned the Russian Ambassador, and the State Department
  offered up to $10M in rewards. The cited sources attribute the group
  to FSB Centre 18 (DOJ flatly, for Peretyatko; CISA/NCSC and the FCDO
  "almost certainly subordinate to ... FSB Centre 18"; Treasury only to
  "a unit within the FSB"). Per the indictment the conspiracy targeted
  current and former US Intelligence Community, DoD, State,
  defense-contractor and DoE personnel (Oct 2016 – Oct 2022) plus UK
  military and government officials, think-tank researchers and
  journalists; the FCDO additionally attributes to it the hack of
  "UK-US trade documents that were leaked ahead of the 2019 General
  Election" and the 2018 Institute for Statecraft hack — activity the
  FCDO says was carried out "in line with Russian confrontation goals
  ... to undermine trust in politics in the UK and likeminded states."
  (Star Blizzard's fuller tradecraft — EvilGinx credential/session-cookie
  harvesting, the later SPICA malware — lives on the
  ru/fsb/center-18/star-blizzard actor record, not this counter-action.)
