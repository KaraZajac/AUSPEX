id: 2023-12/star-blizzard-fsb-indictment-sanctions
name: Star Blizzard — DOJ + Treasury + UK FCDO + CISA/NCSC public attribution to FSB Centre 18
start_date: 2015-01-01  # earliest Callisto/Star Blizzard activity per CISA AA23-341A
disclosure_date: 2023-12-07
end_date: null  # campaign continued post-disclosure
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing  # Evilginx-style adversary-in-the-middle credential phishing
outcome_summary: |
  Joint CISA + NCSC-UK advisory AA23-341A, DOJ indictment of
  Ruslan Aleksandrovich Peretyatko and Andrey Stanislavovich
  Korinets, Treasury OFAC SDN designation, and UK FCDO sanctions —
  all on December 7, 2023 — explicitly attributed Star Blizzard /
  Callisto / COLDRIVER / SEABORGIUM to "Centre 18 of the FSB."
  Targets named include UK, US, EU policy elites, exiled Russian
  dissidents, academics, defense intellectuals; the 2019 UK
  election US-UK trade-document leak operation was named.
false_flag_risk: none
campaign_id: apt28-coldriver-credential-phishing
operators_named:
  - peretyatko-ruslan  # FSB Centre 18 / Star Blizzard, DOJ + OFAC + UK FCDO Dec 2023
  - korinets-andrey  # FSB Centre 18 / Star Blizzard, DOJ + OFAC + UK FCDO Dec 2023
summary: |
  A multi-agency coordinated public attribution naming Star
  Blizzard specifically to the FSB's information-warfare-relevant
  Centre 18. Strategic frame is information confrontation:
  credential phishing to harvest correspondence of Western policy
  intellectuals shaping discourse on Russia/Ukraine, plus
  hack-and-leak operations. The 2019 UK trade-document leak —
  used by Jeremy Corbyn during the 2019 UK general election — is
  the canonical influence-op output of this actor.
