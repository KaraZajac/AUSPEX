id: 2023-12/kyivstar-disruption
name: Kyivstar destructive intrusion — Sandworm-front Solntsepyok claim
start_date: 2023-05-01  # ~6+ month dwell per SBU
disclosure_date: 2023-12-12  # outage day; SBU subsequent statement Jan 2024
end_date: 2023-12-14
incident_type:
  - intrusion
  - destructive
  - disruption
initial_vector: valid-creds  # SBU: long-dwell access via employee credentials
outcome_summary: |
  Six-plus-month dwell followed by destructive wipe of Kyivstar's
  IT environment — virtual servers, PCs, internal systems — leaving
  Ukraine's largest mobile operator (~25M subscribers) without
  mobile or broadband service for approximately 48 hours. Air-raid
  alert distribution and banking terminals were disrupted as
  secondary effects. Claimed by "Solntsepyok," a persona SBU and
  Western researchers assess as a Sandworm front.
quantified_impact:
  affected_subscribers: 25000000
  outage_hours: 48
false_flag_risk: none  # Solntsepyok persona is acknowledged front, not false-flag
summary: |
  Among the most consequential single cyber operations of the
  war: a wholesale destruction of a Tier-1 civilian telecom by a
  Russian military front. SBU statements (December 2023 and January
  2024) attributed the operation to Sandworm. Reuters and Kyiv Post
  carried the SBU attribution. Doctrine fit is unusually clean:
  civilian-resilience target during winter, coordinated with
  kinetic strikes on Ukrainian energy infrastructure.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: SBU (Ukrainian Security Service)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-01-04
    attribution_source_id: cert-ua/2024-01_kyivstar-sbu-attribution
    notes: |
      SBU head Vasyl Maliuk publicly attributed the operation to
      Sandworm; access was traced to credentials of a Kyivstar
      employee compromised in earlier campaigns.
