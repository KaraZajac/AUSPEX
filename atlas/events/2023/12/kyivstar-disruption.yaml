id: 2023-12/kyivstar-disruption
name: Kyivstar destructive intrusion — Sandworm-front Solntsepyok claim
start_date: 2023-05-01  # SBU/Vitiuk: attackers in the system "at least since May 2023"; probed "March or earlier"
disclosure_date: 2023-12-12  # destructive outage began 12 Dec 2023
end_date: 2023-12-20  # CEO Komarov: all services "fully restored throughout the country" by 20 Dec 2023
incident_type:
  - destructive
  - disruption
initial_vector: unknown  # SBU did not disclose entry vector; Vitiuk noted only that Kyivstar/Beeline infrastructure similarity may have eased navigation (the prior "employee credentials" claim was unsourced — removed 2026-07-10)
outcome_summary: |
  Multi-month GRU intrusion (SBU: attackers in Kyivstar's systems
  "at least since May 2023") culminating in a 12 December 2023
  destructive attack that wiped "almost everything" — thousands of
  virtual servers and PCs — and destroyed the operator's core,
  knocking out mobile and data service for some 24 million
  subscribers. Services were progressively restored; Kyivstar's CEO
  reported full restoration nationwide by 20 December 2023. Secondary
  effects: ATMs relying on Kyivstar SIM connectivity failed and
  air-raid sirens malfunctioned in some regions. SBU cyber chief
  Vitiuk said the attack "aimed to land a psychological blow and
  gather intelligence" and was "not accompanied by a major missile
  and drone strike." Claimed by "Solntsepyok," a persona the SBU
  assesses as affiliated with Sandworm.
quantified_impact:
  affected_subscribers: 24000000  # Reuters: "some 24 million users"
false_flag_risk: none  # Solntsepyok is a transparent Sandworm-affiliated front, not attribution to a third party
summary: |
  Among the most consequential single cyber operations of the war:
  a GRU (Sandworm) destructive wipe of Ukraine's largest mobile
  operator, Kyivstar (~24M subscribers). SBU cyber chief Illia
  Vitiuk first attributed the operation to Sandworm in a Reuters
  interview (Jan 2024); a formal SSU statement (Apr 2024) identified
  the perpetrator as "a regular unit of the russian military
  intelligence service (GRU)" and announced referral of the case
  file to the ICC in The Hague as a war crime against civilian
  infrastructure. Vitiuk characterized the attack as "a big message,
  a big warning" to Ukraine and the West, aimed at a psychological
  blow and intelligence collection; he stressed it did NOT coincide
  with a kinetic missile/drone strike and had no major impact on the
  Ukrainian military, which does not rely on commercial carriers.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: Security Service of Ukraine (SBU/SSU) — Illia Vitiuk, Head of Cyber Security Dept
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2024-01-04
    attribution_source_id: reuters/2024-01-04_kyivstar-sandworm-sbu
    notes: |
      SBU cyber chief Illia Vitiuk first attributed the operation to
      Sandworm in a Reuters interview published 4 Jan 2024 ("Russian
      military spy unit Sandworm seen behind hack"). A formal SSU
      statement dated 4 Apr 2024 identified the attacker as "the
      SandWorm hacker group, a regular unit of the russian military
      intelligence service" (the GRU) and announced referral of the
      case file to the ICC. named-unit: Sandworm is GRU Unit 74455
      (GTsST). The SBU did not publicly disclose the initial-access
      vector. (Corrected 2026-07-10: prior text mis-named the
      attributing official as "Vasyl Maliuk" — the SBU head, not the
      attributor here — and asserted a compromised-employee-credential
      vector; neither is carried by the cited sources.)
