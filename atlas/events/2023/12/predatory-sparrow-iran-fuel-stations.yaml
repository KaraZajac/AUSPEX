  notes: |
    Audited vs RAW (3 snapshotted sources; sha256 in each source record). REVERSE-DIRECTIONALITY
    event: Iran = victim (fuel-distribution infrastructure), Israel = attacker (Predatory Sparrow /
    Gonjeshke Darande) — directionality correct (actor il/predatory-sparrow; target orgs/iranian-fuel-
    distribution-infrastructure / ir / primary). This is the SECOND fuel-station attack (18 Dec 2023),
    a DISTINCT event from the Oct-2021 sibling (2021-10/predatory-sparrow-iran-fuel-stations); the two
    are not merged.

    SOURCING NOTE: the ToI source carried here (timesofisrael/2023-12-18_iran-gas-stations-70pct,
    URL .../shuts-down-70-of-irans-gas-stations/) is the GENUINE Dec-2023 article (JSON-LD
    datePublished 2023-12-18T10:03:22Z) — it is the very source that was mis-dated onto the Oct-2021
    event and retired off it in that audit; it belongs here. All 3 sources snapshotted 2026-07-10.

    [a] FACTS — corrected + verified. "close to 70% of the country's gas stations were out of service"
    (ToI); "70% of Iran's gas stations were hit by service disruptions, according to Reuters" (CNBC).
    "The country has some 33,000 gas stations" (ToI) — added as quantified_impact (33,000 TOTAL; ~70%
    disrupted). Predatory Sparrow / Gonjeshke Darande self-claim carried by both (ToI/CNBC: "disabled a
    majority of the gas pumps throughout Iran"). CORRECTED the prior "Oil Minister Javad Owji publicly
    acknowledged a cyber origin" — the raw (CNBC, per Reuters) says Owji cited "outside interference"
    as a POSSIBLE cause, and state media initially cited a "software problem"; there is NO explicit
    cyber attribution by Iranian officials in the cited reporting. Payment-system + central-server /
    management-system compromise carried (ToI: "gained access to the payment systems ... as well as
    each station's central server and management system"). Recovery re-sourced onto ToI 2023-12-19:
    "Fuel pumps ... back online Tuesday morning" + "only 40% of the country's gas stations could take
    payment with a fuel card" — supports the degraded-card-payment claim. Controlled-manner + prior
    warnings to emergency services + portion left unharmed carried verbatim by both. STRIPPED an
    unsourced claim ("a parliamentary committee member alleged the operation required insider access")
    — carried by neither cited source.
    [b] ATTRIBUTION — hedged to match raw. Both sources report the group only as "linked to Israel"
    (ToI: "previously been linked to Israel") / "widely reported as being linked to Israel" (CNBC); no
    state has formally attributed or acknowledged the operation. attributing_org reworded off
    "Israeli-aligned consensus" to the sources' own hedged language; attribution_level SET named-actor
    (persona is the named operator; no unit named; Israel only "linked"). Held moderate /
    concur-with-caveat. Dropped the unsourced "CCDCOE analysis / Unit 8200 / Mossad dominant
    hypothesis" from the event summary (no CCDCOE source is carried here; the Unit-8200 reading lives
    at the actor level) and from the false_flag_risk comment.
    [c] DATES — start/disclosure 2023-12-18 ✓ (ToI datePublished 2023-12-18T10:03:22Z; CNBC
    2023-12-18T10:30:47Z; "claimed on Monday" = Mon 18 Dec 2023). end_date 2023-12-22 marked
    APPROXIMATE/soft (comment added): pumps back online offline-mode next day 19 Dec (ToI 2023-12-19,
    datePublished 2023-12-19T09:11:04Z), online card-payment normalization over subsequent days; no
    exact "fully restored" date in the cited raw. Each source published_on verified against JSON-LD.
    [d] DOCTRINE — il/counter-iran-posture/retaliatory-cyber-strike, perspective attacker-rationale
    (ADDED; attacker's own doctrine on an attack it conducted). Held strongly_inferred (NOT upgraded to
    attested) per the 2026-06-19 attested reframe: attested requires an authoritative attributing
    source (govt / tier-1 vendor) to assess the strategic PURPOSE at goal level — here the terminal-
    goal statement ("This cyberattack comes in response to the aggression of the Islamic Republic and
    its proxies in the region", ToI+CNBC verbatim) is the PERSONA'S OWN ADMISSION relayed by tertiary
    journalism, and the Israel attribution is hedged/unattested; that is strongly_inferred, not
    attested. Added inference_basis {signals[], ruled_out}; kept attesting_source_id as a supporting
    pointer to the verbatim self-claim.
    [e] ATTRIBUTION_LEVEL — named-actor (Predatory Sparrow persona is the named operator; no specific
    unit named in the cited sources; assessed IL hand only "linked", not formally attested).
    [f] ACTOR_ID — il/predatory-sparrow resolves to atlas/actors/il/predatory-sparrow.yaml (id field) ✓.
    Target orgs/iranian-fuel-distribution-infrastructure is the Iranian victim.

    CAVEAT: incident_type "destructive" is the weakest of the three tags — the cited raw describes
    DISRUPTION of payment systems + station central/management servers (the group "disabled a majority
