id: 2023-12/predatory-sparrow-iran-fuel-stations
name: Predatory Sparrow shuts down 70% of Iranian gas stations (NOT IRANIAN)
start_date: 2023-12-18
disclosure_date: 2023-12-18
end_date: 2023-12-22  # approximate/soft: pumps reported back online (offline mode) the next day, 19 Dec (ToI 2023-12-19); online card-payment normalization followed over subsequent days — no exact "fully restored" date in the cited raw
incident_type:
  - disruption
  - destructive
  - cyber-physical
initial_vector: unknown
outcome_summary: |
  Predatory Sparrow / Gonjeshke Darande claimed responsibility
  for a cyberattack that put close to 70% of Iran's ~33,000
  petrol stations out of service on 18 December 2023. Iranian
  state media initially cited a "software problem"; Oil Minister
  Javad Owji said "outside interference" was a possible cause
  (per Reuters, via CNBC) — the cited reporting records no
  explicit cyber attribution by Iranian officials. The group
  claimed it had gained access to the affected stations' payment
  systems and to each station's central server and management
  system. Pumps were reported back online (offline mode) the
  next day (19 Dec), but only ~40% of stations could take
  fuel-card payment, so card-payment functionality remained
  degraded after the initial outage. The group's claim asserted
  prior warnings to emergency services and stated that a portion
  of stations was left unharmed as a deliberate scope-limiting
  measure.
quantified_impact:
  gas_stations_total_estimate: 33000  # Iran's total gas-station count (Oil Ministry, via ToI); close to 70% put out of service
  stations_disrupted_pct_estimate: 70
false_flag_risk: suspected  # Predatory Sparrow / Gonjeshke Darande hacktivist persona is the IL deniability layer; the two same-day cited sources report the group only as "linked to Israel" (no state, government, or tier-1-vendor attribution of the operation)
campaign_id: predatory-sparrow-iran-coercion
summary: |
  **NOT IRANIAN.** Counter-Iran operation by the pro-Israel
  Predatory Sparrow / Gonjeshke Darande persona. Sequel to the
  cluster's October 2021 fuel-station attack (same civilian-CII
  template) and a precursor to the June 2025 Bank Sepah /
  Nobitex operations. Predatory Sparrow framed the operation as
  retaliation for "the aggression of the Islamic Republic and
  its proxies in the region"; the cited reporting sets this in
  the post-October-7 context of Israel's war with Hamas, during
  which Iran-backed groups (Hezbollah in Lebanon, the Houthis in
  Yemen) had stepped up attacks against Israel. No state has
  formally attributed or acknowledged the operation; the two
  same-day cited sources report the group only as "linked to
  Israel" (ToI) / "widely reported as being linked to Israel"
  (CNBC). Israeli-media/analyst attribution of the Predatory
  Sparrow cluster to IDF Unit 8200 is recorded at the actor
  level (atlas/actors/il/predatory-sparrow), not carried by the
  sources cited on this event.
