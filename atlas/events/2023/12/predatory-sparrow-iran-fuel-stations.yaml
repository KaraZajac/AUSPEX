id: 2023-12/predatory-sparrow-iran-fuel-stations
name: Predatory Sparrow shuts down 70% of Iranian gas stations (NOT IRANIAN)
start_date: 2023-12-18
disclosure_date: 2023-12-18
end_date: 2023-12-22
incident_type:
  - disruption
  - destructive
initial_vector: unknown
outcome_summary: |
  Predatory Sparrow / Gonjeshke Darande claimed responsibility
  for a cyberattack that disrupted approximately 70% of Iran's
  petrol stations on 18 December 2023. Iranian Oil Minister
  Javad Owji publicly acknowledged a cyber origin for the
  outage. Payment-system and central-server / management-system
  compromise reported across the affected station network;
  card-payment functionality remained degraded for days after
  initial recovery. The group's claim asserted prior warnings
  to emergency services and stated that a portion of stations
  was left unharmed as a deliberate scope-limiting measure.
false_flag_risk: suspected  # Predatory Sparrow hacktivist persona is the IL deniability layer; operator-state assessment is nonetheless IL-linked by Israeli-aligned media and CCDCOE analysis
campaign_id: predatory-sparrow-iran-coercion
summary: |
  **NOT IRANIAN.** Counter-Iran operation by pro-Israel
  Predatory Sparrow / Gonjeshke Darande, modeled here to round
  out the 2023-25 Iran-Israel cyber exchange record. Sequel to
  the cluster's October 2021 fuel-station attack and direct
  precursor to the June 2025 Bank Sepah / Nobitex operations
  during the 12-day war. Predatory Sparrow framed the operation
  as retaliation against "the aggression of the Islamic Republic
  and its proxies in the region" — a reference to the post-
  October-7 IRGC / IRGC-IO tempo elevation against Israel and
  Israel-adjacent targets. No state actor has been formally
  attributed by any government; Israeli media and CCDCOE
  analysis treat IDF Unit 8200 / Mossad as the dominant
  hypothesis.
