      acknowledged the operation. Iran's Oil Minister Javad Owji
      cited "outside interference" as a possible cause (per
      Reuters, via CNBC); Iranian state media initially cited a
      "software problem." The two cited sources report the group
      only as "linked to Israel," without asserting a specific
      state hand. NOTE: an earlier draft's claim that "a
      parliamentary committee member alleged the operation
      required insider access" is NOT carried by either cited
      source — removed in this audit.
