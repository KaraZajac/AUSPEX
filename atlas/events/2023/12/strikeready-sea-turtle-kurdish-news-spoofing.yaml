      confidence (a dedicated Sea Turtle infra-tracking blog). The
      primary-tier corroborating source, PwC (2023-12-05), names the
      same cluster — "a highly capable Türkiye-nexus threat actor, known
      as Teal Kurma (a.k.a. Sea Turtle, Marbled Dust, Cosmic Wolf)" — and
      supplies the firmer NATION nexus (Türkiye-nexus) plus the espionage
      motive and the three-domain characterizations. NO Turkish
      intelligence service (MIT) or military/signals unit is named by
      either source — StrikeReady conveys the Turkey nexus obliquely
      ("of interest to those focused on domestic Turkish issues";
      "Turkish-themed domains"; the xtechsupport[.]org cert registered
      through Turkish registrar IHS). Hence attribution_level: named-actor
      (named cluster + nation), not named-unit, and actor tr/unscoped/
      sea-turtle. MARBLED DUST is an era-appropriate Microsoft alias for
      a 2023 op (post-April-2023 taxonomy) and is carried by PwC as an
      alias, but the contemporaneous vendor labels here are Sea Turtle
      (StrikeReady) / Teal Kurma (PwC).
