id: 2023-12/strikeready-sea-turtle-kurdish-news-spoofing
name: StrikeReady documents Sea Turtle infrastructure spoofing Kurdish news and Arab-world media
start_date: 2022-01-01
disclosure_date: 2023-12-27
end_date: 2023-12-27
incident_type:
  - intrusion
  - information-operation
initial_vector: unknown
outcome_summary: |
  StrikeReady published an infrastructure-pivot analysis
  documenting Sea Turtle / Teal Kurma operator infrastructure
  used to spoof Kurdish-news, NGO, and Arab-world TV-channel
  websites — including alhurra.online, al-marsad.co, and
  anfturkce.news. The spoofed domain set targets a precisely
  Turkish-strategic-interest media corpus: ANF (Firat News
  Agency, PKK-aligned Kurdish news), Al-Marsad (Syrian human-
  rights monitor), and Alhurra (U.S.-government-funded Arabic-
  language broadcaster). The infrastructure pattern complements
  the contemporaneous PwC SnappyTCP disclosure and the January
  2024 Hunt & Hackett Dutch-ISP report in the three-publication
  Sea-Turtle-resurgence picture.
false_flag_risk: none
summary: |
  Narrow but doctrinally precise disclosure. The spoofed-domain
  set is unambiguously Turkish-strategic: ANF / PYD / PKK-aligned
  Kurdish news is the most-targeted information ecosystem in
  Turkish counter-propaganda operations, and Al-Marsad's Syrian
  human-rights-monitoring mission overlaps the cluster's prior
  Syrian-opposition targeting. Mixed intrusion / information-
  operation framing: spoofed-domain infrastructure can serve
  credential capture, disinformation seeding, or both.
