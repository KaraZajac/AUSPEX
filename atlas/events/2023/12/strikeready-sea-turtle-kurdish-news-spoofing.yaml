id: 2023-12/strikeready-sea-turtle-kurdish-news-spoofing
name: StrikeReady and PwC document Sea Turtle / Teal Kurma spoofing of Kurdish-news, Arab-media, and dissident NGO domains
start_date: 2023-01-01   # AUDIT 2026-07-10: was 2022-01-01 (unsourced). PwC dates the spoofed-domain set to "resolving throughout 2023"; StrikeReady's 426-fingerprint first-seen is 2023-09-21. (Underlying SnappyTCP capability spans "2021 and 2023" per PwC.)
disclosure_date: 2023-12-27
end_date: null   # AUDIT 2026-07-10: was 2023-12-27 (= disclosure, conflated). Both sources describe the infrastructure as live at publication — StrikeReady: "infrastructure currently in use", "426 servers currently responding"; no operation end date is stated.
incident_type:
  - intrusion
  - espionage   # AUDIT 2026-07-10: was influence-operation (UNSUPPORTED). Both sources frame this as ESPIONAGE — PwC: "the focus is on conducting espionage" / "espionage for the collection of information that can then be exploited for surveillance purposes"; neither source describes disinformation, content manipulation, or an influence operation.
initial_vector: unknown   # AUDIT 2026-07-10: retained. Both sources analyze the attacker's spoofed-domain INFRASTRUCTURE (lookalike news/NGO domains, DNS pivots, TLS-cert fingerprints), not a specific victim's initial access vector.
outcome_summary: |
  PwC Threat Intelligence (Dec 5, 2023) and StrikeReady (Dec 27,
  2023) documented Sea Turtle / Teal Kurma operator infrastructure
  spoofing news and NGO websites of Turkish strategic interest.
  PwC identified "multiple domains resolving throughout 2023 that
  are spoofing NGOs and Media organizations" and highlighted three,
  characterizing each: alhurra[.]online ("A US government-owned
  Arabic-language TV channel"), al-marsad[.]co ("A NGO in the Golan
  Heights that is focused on Arab human rights"), and anfturkce[.]news
  ("A Kurdish news agency"). StrikeReady, pivoting off the PwC report
  and a Greek Ministry-of-Justice report, expanded the infrastructure
  set — assessing that "many of the spoofed domains ... would be of
  interest to those focused on domestic Turkish issues" and adding
  further lookalike news/dissident domains: Nûçe Ciwan (nuceciwan[.]news,
  "an oft-targeted Turkish news source"), Sol Haber (solhaber[.]info /
  .news, a Turkish leftist newspaper — "'haber' is Turkish for 'news'"),
  Çağlayan Dergisi (caglayandergisi[.]net, "a Turkish blogger"), Al
  Arabiya (alarabiyaa[.]online, "a spoof of Al Arabiya, an Arabic
  language news organization"), plus lure domains referencing Iranian
  dissidents (e.g. Mahsa Amini). StrikeReady linked the cluster via a
  shared HTTP-426 server fingerprint and an xtechsupport[.]org TLS
  certificate registered through the Turkish registrar IHS. The
  disclosure complements the PwC SnappyTCP report and the January 2024
  Hunt & Hackett Dutch-ISP report in the 2023–2024 Sea-Turtle-resurgence
  picture.
false_flag_risk: none
summary: |
  Narrow infrastructure-analysis disclosure. The spoofed-domain
  corpus is a counter-dissident / minority-media collection profile
  aligned with Turkish strategic interest: Kurdish news (anfturkce =
  ANF, characterized by PwC as "a Kurdish news agency"; Nûçe Ciwan),
  Turkish-leftist news (Sol Haber, Çağlayan Dergisi), Arab media and
  human-rights NGOs (Alhurra, Al Arabiya, Al-Marsad), and Iranian-
  dissident lures. PwC frames the intent as espionage "for the
  collection of information that can then be exploited for surveillance
  purposes"; StrikeReady frames the set as "of interest to those
  focused on domestic Turkish issues." Neither source describes an
  influence operation or disinformation — the activity is spoofed-domain
  infrastructure for espionage/surveillance, not content manipulation.
