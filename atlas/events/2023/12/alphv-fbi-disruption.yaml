  notes: |
    Audited against five raw sources; every load-bearing claim is now
    verbatim-carried. RAW EVIDENCE: (1) fbi/2023-12-19_alphv-disruption
    (DOJ OPA release; sha 9c9f9c49...e0bc544c, 106,432 bytes — existing
    snapshot, hash re-verified; live /opa/pr URL 301s to
    /archives/opa/pr, not rotted): "FBI Offers Decryption Tool to Over
    500 Victims Around the World"; "offer over 500 affected victims the
    capability to restore their systems"; "saving multiple victims from
    ransom demands totaling approximately $68 million"; "has seized
    several websites that the group operated"; "search warrant unsealed
    today in the Southern District of Florida"; Monaco: "We will
    continue to prioritize disruptions and place victims at the center
    of our strategy to dismantle the ecosystem fueling cybercrime";
    zero Russia/state tokens. (2) doj/2023-12-19_alphv-seizure-warrant
    (NEW record; unsealed SDFL warrant 23-6595-HUNT signed 2023-12-11,
    fetched LIVE via the justice.gov /media/1329536/dl PDF endpoint —
    the Akamai bypass; sha 60986bd9...90ebf3c0, 6,027,942 bytes): CHS
    answered a Blackcat affiliate-recruitment ad and "provided the CHS
    with access credentials to a Blackcat affiliate panel"; "the FBI
    identified and collected 946 public/private key pairs for Tor
    sites"; decryption tool "offered to over 400 victims" as of the
    Dec 11 signing. (3) bleepingcomputer/2023-12-19_fbi-disrupts-
    blackcat-decryptor (NEW; sha 520e24f9...3e69521f, 95,398 bytes):
    "On December 7th ... websites suddenly stopped working ... related
    to a law enforcement operation"; "Tuesday afternoon, the ransomware
    operation 'unseized' their data leak site"; ALPHV statement
    "removing ALL the rules except one, you can not touch the CIS, you
    can now block hospitals, nuclear power plants, anything and
    anywhere. The rate is now 90%". (4) cisa/2023-12-19_aa23-353a-
    alphv-advisory (existing record, hash re-verified sha
    94e78e8b...0265c823, 87,295 bytes; snapshot is the Feb-27-2024
    revision): "healthcare sector has been the most commonly victimized
    ... likely in response to the ALPHV Blackcat administrator's post
    encouraging its affiliates to target hospitals after operational
    action ... in early December 2023" — government corroboration of
    the retaliation arc. (5) krebs/2024-03-05_blackcat-implodes-change-
    healthcare (NEW; sha cb400c4d...e029f71d, 105,934 bytes): "BlackCat
    responded by re-forming, and increasing affiliate commissions to as
    much as 90 percent ... formally removing any restrictions or
    discouragement against targeting hospitals"; Change Healthcare
    intrusion "in the third week of February"; ~$22M transaction Mar 1;
    exit scam (Wosar) with the FBI banner "cut and pasted from the
    notice the FBI left in its December raid".
    AUDIT WALK: [a] FACTS — corrected the fabricated-mechanism claim
    "FBI obtained ALPHV's TOR-hidden leak-site decryption key from
    approximately Dec 7 2023 onward" (no source; the warrant documents
    CHS panel access + 946 Tor key pairs collected during the
    investigation, and Dec 7 is the outage date, not a key-acquisition
    date); "published a decryptor" -> "offered its decryption tool"
    (DOJ wording); "averting an estimated USD 68M in ransom payments"
    -> "ransom demands totaling approximately USD 68M" (DOJ says
    demands, not payments); "relaunching the leak site within hours" is
    now source-carried ("Tuesday afternoon ... 'unseized'"); REMOVED
    the false claim that the affiliate rule change was a "Feb 2024
    ALPHV affiliate program decision" — the rules-lift retaliation was
    posted Dec 19 2023 (BleepingComputer verbatim), and the Feb-2024
    element is CISA's hedged assessment of the healthcare-targeting
    surge, now quoted with its "likely in response" hedge intact; the
    "catalyzed ... Change Healthcare" causal over-claim was softened to
    the sourced sequence (rules-lift -> healthcare surge per CISA ->
