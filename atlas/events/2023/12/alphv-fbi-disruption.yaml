id: 2023-12/alphv-fbi-disruption
name: FBI ALPHV / BlackCat infrastructure seizure
start_date: 2023-12-07
disclosure_date: 2023-12-19
end_date: 2023-12-19
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  FBI obtained ALPHV's TOR-hidden leak-site decryption key from
  approximately Dec 7 2023 onward; on Dec 19 2023 FBI seized the
  leak-site infrastructure and published a decryptor for ~500
  victims, averting an estimated USD 68M in ransom payments.
  ALPHV operators partially recovered by relaunching the leak
  site within hours. The partial recovery established the
  template for the Operation Cronos / LockBit "takedown that
  doesn't stick" pattern.
false_flag_risk: none
summary: |
  Mid-arc NCS 2023 Pillar 2 disruption that did not durably end
  the targeted group — distinct from Hive (Jan 2023) and from
  LockBit-Cronos (Feb 2024) in the partial-recovery outcome.
  Catalyzed the Feb 2024 ALPHV affiliate program decision to
  attack hospital networks more aggressively; the Change
  Healthcare ransom + exit scam followed within weeks.
