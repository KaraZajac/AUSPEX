id: 2023-12/alphv-fbi-disruption
name: FBI ALPHV / BlackCat infrastructure seizure
start_date: 2023-12-07  # ALPHV Tor negotiation/leak sites went dark Dec 7; BleepingComputer tied the outage to the law-enforcement operation. The SDFL warrant was signed Dec 11; the covert CHS access predates the outage but is undated in sources.
disclosure_date: 2023-12-19
end_date: 2023-12-19  # the seizure/announcement day; ALPHV's same-afternoon "unseizure" and the Feb-Mar 2024 arc are aftermath (see outcome_summary / notes)
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown  # counter-op; the FBI's own access route (CHS-obtained affiliate-panel credentials per the unsealed warrant) is not a victim initial-access vector
outcome_summary: |
  Per the unsealed SDFL search warrant (Case No. 23-6595-HUNT, signed
  Dec 11 2023), an FBI confidential human source answered an ALPHV
  affiliate-recruitment ad and was issued affiliate-panel
  credentials; law enforcement accessed the panel under a separate
  warrant, gained visibility into the group's network, and collected
  946 public/private key pairs for the Tor sites hosting ALPHV's
  victim-communication, leak, and affiliate-panel services. ALPHV's
  Tor sites went dark on Dec 7 2023 (the admin blamed hosting;
  BleepingComputer reported a law-enforcement operation). On Dec 19
  2023 the DOJ announced the disruption, a seizure banner was placed
  on the leak site, and the FBI offered its decryption tool to over
  500 victims, saving victims from ransom demands totaling
  approximately USD 68M (the Dec 11 warrant had said "over 400
  victims"; ALPHV's own statement claimed only ~400 companies could
  get keys). The same afternoon ALPHV "unseized" the leak site —
  both sides held the Tor onion private keys — and retaliated by
  removing all affiliate targeting rules except the CIS prohibition
  ("you can now block hospitals, nuclear power plants, anything and
  anywhere") and raising affiliate commissions to 90%.
false_flag_risk: none
summary: |
  DOJ/FBI-led international law-enforcement disruption of the
  ALPHV/BlackCat ransomware-as-a-service operation (FBI Miami
  leading, with Europol, Germany's Bundeskriminalamt and Zentrale
  Kriminalinspektion Göttingen, and Denmark's Special Crime Unit):
  covert infiltration via a confidential human source, Tor leak-site
  seizure, and a free decryptor offered to 500+ victims, saving them
  from ransom demands totaling ~USD 68M. The disruption did not
  durably end the group: ALPHV regained control of the leak site
  within hours and lifted its ban on attacking critical
  infrastructure. The FBI/CISA/HHS advisory AA23-353A (Feb 27 2024
  update) later assessed the healthcare sector had become ALPHV's
  most-victimized sector "likely in response to the ALPHV Blackcat
  administrator's post encouraging its affiliates to target
  hospitals after operational action against the group and its
  infrastructure in early December 2023"; the ALPHV-affiliate Change
  Healthcare intrusion, an apparent USD 22M ransom payment, and the
  operators' exit scam followed in Feb-Mar 2024 (see
  2024-02/change-healthcare-alphv). Subject crew tracked as
  criminal/alphv — no cited source documents a state nexus.
