id: 2023-12/xerox-inc-ransom
name: INC Ransom data theft from Xerox Business Solutions
start_date: 2023-12-04
disclosure_date: 2023-12-30
end_date: 2024-02-28
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Xerox Business Solutions (the BPO subsidiary of Xerox
  Holdings Corporation) disclosed in late December 2023 a
  ransomware-related intrusion of a US-based subsidiary IT
  environment. INC Ransom claimed responsibility December 29
  2023 and posted sample documents on its leak site. Xerox
  contained the incident to the XBS subsidiary and reported no
  impact to broader Xerox operations.
false_flag_risk: none
summary: |
  Mid-tier INC Ransom case against a US business-process-
  outsourcing subsidiary. Establishes the cluster's continued
  US enterprise victim selection through Q4 2023. Tradecraft
  is standard for the INC Ransom cluster (Citrix NetScaler
  initial-access pattern, valid-credentials lateral movement,
  custom encryptor) with no state-nexus attribution.
attributions:
  - actor_id: criminal/inc-ransom
    attributing_org: Xerox + INC Ransom (self-claimed)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2023-12-29
    attribution_source_id: ncsc-uk/2024-03-27_nhs-dumfries-galloway-statement
    notes: |
      NCSC-UK NHS Dumfries statement documents a different INC
      Ransom victim. No primary advisory specific to this Xerox
      case; attribution_source_id is the nearest contemporaneous
      primary documentation of INC Ransom activity.
doctrine_links: []
targets:
  - target_id: orgs/xerox
    role: primary
sources:
