id: 2023-12/xerox-inc-ransom
name: INC Ransom data theft from Xerox Business Solutions
start_date: 2023-12-29
disclosure_date: 2023-12-30
end_date: null
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: unknown
outcome_summary: |
  Xerox disclosed in a December 30, 2023 newsroom statement that its
  subsidiary Xerox Business Solutions had experienced a security
  incident, detected and contained by Xerox cybersecurity personnel
  and limited to XBS U.S. The INC Ransom gang had added Xerox to its
  dark-web extortion site (December 29 per BleepingComputer;
  December 30 per SecurityWeek), claiming theft of sensitive data and
  posting sample documents — email communications, payment details,
  invoices, filled-out request forms, and purchase orders — as proof.
  Xerox reported no impact to its corporate systems, operations or
  data and no effect on XBS operations, but said a preliminary
  investigation indicated limited personal information in the XBS
  environment may have been affected, with affected individuals to be
  notified. Xerox did not say when the intrusion began ("Recently")
  and named no perpetrator. The Xerox entry was later removed from
  the INC Ransom leak portal, which reporters read as a possible sign
  of negotiations with the attackers.
false_flag_risk: none
summary: |
  INC Ransom data-extortion case against the U.S. division of Xerox
  Business Solutions (XBS), the document technology and services
  subsidiary of Xerox. Attribution rests on INC Ransom's own
  leak-site self-claim — corroborated by the sample documents the
  group posted — not on any government advisory or first-party
  naming: Xerox confirmed the incident and the possible exposure of
  limited personal information but named no group. INC Ransom is a
  financially-motivated criminal cluster with no documented state
  nexus, so no doctrine link applies.
attributions:
