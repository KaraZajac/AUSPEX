    email communications (with content and addresses exposed), payment
    details, invoices, filled-out request forms, and purchase orders");
    entry removal (BleepingComputer: "removed from INC Ransom's leak
    portal ... usually indicative of resumed negotiations"; SecurityWeek:
    "suggesting that Xerox might have engaged in communication with the
    attackers"). CORRECTIONS: (1) start_date 2023-12-04 -> 2023-12-29 —
    NO source carries a December-4 (or any) intrusion start; Xerox says
    only "Recently". 2023-12-29 = the leak-site listing, the first
    documented date of the operation; true intrusion start is earlier but
    undocumented. (2) end_date 2024-02-28 -> null — no source supports any
    end date. (3) STRIPPED the entire unsourced tradecraft sentence
