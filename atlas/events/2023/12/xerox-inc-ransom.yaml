    auspex_assessment: concur-with-caveat
    attribution_date: 2023-12-29
    attribution_source_id: bleepingcomputer/2024-01-02_xerox-says-subsidiary-xbs-us-breached-after-ransomware-gang-leaks-data
    notes: |
      Attribution is an INC Ransom leak-site self-claim, made when the
      group added Xerox to its extortion portal — "on December 29"
      claiming "to have stolen sensitive data and confidential
      documents" (BleepingComputer; SecurityWeek dates the listing
      December 30) — and posted sample documents as proof of
      intrusion. Xerox itself "shared no details on the type of
      cybersecurity incident its subsidiary fell victim to"
      (SecurityWeek) and named no perpetrator, so Xerox is not
      credited as an attributing org. No government advisory or
      independent forensic report ties the intrusion to INC Ransom;
      confidence is moderate and the assessment concur-with-caveat
      (self-claim corroborated by the posted samples; the entry's
      later removal from the leak portal is consistent with a real
      victim-extortionist relationship but confirms nothing).
      attribution_level named-actor: a named criminal cluster; no
      nation or unit is named.
