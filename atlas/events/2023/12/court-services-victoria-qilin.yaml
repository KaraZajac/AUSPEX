id: 2023-12/court-services-victoria-qilin
name: Qilin ransomware against Court Services Victoria (Australia)
start_date: 2023-12-08
disclosure_date: 2023-12-23
end_date: 2024-02-29
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown
outcome_summary: |
  Qilin ransomware intrusion of Court Services Victoria's IT
  environment. Operators exfiltrated audio and video recordings
  of court hearings dating November 1-21 2023, including
  witness testimony from sensitive criminal and family-law
  proceedings. Victorian Attorney-General Jaclyn Symes confirmed
  the incident December 23 2023. The Victorian Government
  commissioned an independent review by Rufus Black AO; no
  ransom was paid and no leak-site posting of the audio
  recordings has been confirmed.
quantified_impact:
  weeks_of_recordings_compromised: 3
false_flag_risk: none
summary: |
  Notable for sensitivity of exfiltrated data (court recordings
  with witness-protection implications) and for being the first
  major Qilin attack against an Australian state-government
  judicial body. AUSPEX includes in criminal-baseline because
  Qilin tradecraft is standard RaaS without state-nexus
  attribution.
attributions:
  - actor_id: criminal/qilin
    attributing_org: Victorian Government + Qilin (self-claimed)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-01-09
    attribution_source_id: ncsc-uk/2024-06-04_synnovis-qilin-statement
    notes: |
      Victorian Government statement attributed the cluster as
      consistent with Qilin tradecraft; Qilin self-claimed via its
      leak site January 2024. attribution_source_id placeholder
      points at the nearest contemporaneous primary documentation
      of Qilin activity (NHS Synnovis statement) — no specific
      Court Services Victoria primary source is currently
      available via verified URL.
doctrine_links: []
