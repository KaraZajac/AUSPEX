  notes: |
    WRONG-SOURCE REMEDIATION (re-source path). The event's sole
    citation was ncsc-uk/2024-06-04_synnovis-qilin-statement — the
    NHS England statement on the JUNE 2024 LONDON Synnovis attack, a
    real source about a DIFFERENT event, unusable for this Dec-2023
    Australian incident (its own record even flags url: null). It was
    removed and the event re-sourced to six real, snapshot-hashed
    sources: three CSV govt-primaries + ABC + BleepingComputer + The
    Register (all published 2024-01-02 except the 18 Jan update). The
    Synnovis record itself remains validly cited by the Synnovis
    event and others, so no orphan annotation was made.
    [a] FACTS — every retained claim is now source-carried.
    Raw evidence: courts-vic statement PDF sha256 52069612…bb3dee3a
    (140,149 bytes; live URL re-curled during audit — byte-identical,
    proving URL-snapshot pairing): alerted 21 Dec 2023; AV in-court
    technology network disrupted; recordings 1 Nov-21 Dec 2023 may
    have been accessed (+possibly pre-Nov); per-court table; "No
    other court systems or records, including employee or financial
    data, were accessed". courts-vic FAQs sha256 9da9d584…c1d2e293
    (39,922 bytes): "the incident occurred on 8 December"; CSV
    refuses actor naming and ransom comment; Victoria Police
    cybercrime squad + Vic DGS; restoration timeline (VC 16 Jan,
    hybrid 22 Jan, recordings late Feb-Apr). Update page sha256
    4384add7…39fc3188 (33,137 bytes): expanded ranges (County 4-6 Apr
    2016 + 28 May 2019-21 Dec 2023; Coroners 5 Aug 2019-; Supreme
    regional to Apr 2016), found from 5 Jan forensics. ABC sha256
    49268937…564a6fd4 (347,513 bytes): "YOU HAVE BEEN PWND" lockout,
    dark-web ransom note, witness testimony from highly sensitive
    cases, two child-sexual-abuse County cases, Acting Premier
    Carroll containment quote. BleepingComputer sha256
    abd6f9ce…8ff1312b (87,990 bytes): breach began 8 Dec; NO CSV
    entry on Qilin leak site. Register sha256 a0a46a05…17aec9a4
    (163,121 bytes): began 8 Dec; "Qilin is yet to claim the attack
    on its leak site". FABRICATIONS REMOVED: (1)
    "Victorian Attorney-General Jaclyn Symes confirmed the incident
    December 23 2023" — no source; disclosure was CSV CEO Louise
    Anderson's 2 Jan 2024 statement; the government voice in sources
    is Acting Premier Ben Carroll (containment, no actor). (2) "The
