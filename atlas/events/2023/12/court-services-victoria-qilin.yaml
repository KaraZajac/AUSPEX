id: 2023-12/court-services-victoria-qilin
name: Qilin ransomware against Court Services Victoria (Australia)
start_date: 2023-12-08
disclosure_date: 2024-01-02
end_date: 2023-12-21
incident_type:
  - ransomware
  - data-theft
  - extortion
initial_vector: unknown
outcome_summary: |
  Ransomware intrusion of Court Services Victoria's audio-visual
  in-court technology network — a single courts-wide system managing
  only hearing recordings. The breach occurred on 8 December 2023
  (CSV FAQ: "While we became aware on 21 December, the incident
  occurred on 8 December") and was discovered on 21 December 2023
  when staff were locked out of computers displaying "YOU HAVE BEEN
  PWND"; a text file threatened publication of stolen files and gave
  a dark-web address for recovery instructions (double extortion).
  CSV isolated and disabled the network the same day. CSV's 2 January
  2024 statement (CEO Louise Anderson) said recordings of some
  hearings between 1 November and 21 December 2023 may have been
  accessed — Supreme Court, all County Court criminal and civil
  hearings recorded on the network, some Magistrates' Court
  committals, all Coroners Court hearings, one October Children's
  Court hearing; VCAT none — including, per ABC, witness testimony
  from highly sensitive cases and at least two County Court cases
  involving historical and child sexual abuse. CSV's 18 January 2024
  update, based on forensic analysis available from 5 January,
  expanded the exposure: most County Court recordings from 1 January
  2023 and some back to 28 May 2019 and 4-6 April 2016, Coroners
  Court hearings back to 5 August 2019, and some regional Supreme
  Court hearings as far back as April 2016. No other court systems or
  records (including employee and financial data) were accessed.
  Victoria Police's cybercrime squad investigated alongside Victorian
  Department of Government Services cyber experts; Acting Premier Ben
  Carroll said the attack had "essentially been confined". CSV
  declined to name the actor or comment on ransom demands; no ransom
  payment was ever confirmed or denied. Video conferencing was
  re-established in most courts on 16 January 2024 (hybrid hearings
  from 22 January), with in-court recording restored progressively
  through late February-April 2024. BleepingComputer found no CSV
  entry on Qilin's leak site and could not independently confirm
  Qilin's responsibility.
quantified_impact:
  weeks_of_recordings_compromised: 7
false_flag_risk: none
summary: |
  Notable for the sensitivity of the exposed material — audio-visual
  recordings of court hearings including witness testimony from
  highly sensitive criminal matters (at least two County Court cases
  involving historical and child sexual abuse, per ABC), with some
  recordings involving identities protected by court orders or
  legislation — in a double-extortion ransomware intrusion against
  the statutory agency administering Victoria's courts and tribunals.
  AUSPEX includes in criminal-baseline because Qilin tradecraft is
  standard RaaS without state-nexus attribution.
attributions:
  - actor_id: criminal/qilin
    attributing_org: Robert Potter (independent cyber-security expert, via ABC News)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-01-02
    attribution_source_id: abc/2024-01-02_victoria-court-system-cyber-attack
    notes: |
      The only public attribution voice is an independent expert
      relayed by ABC News: Robert Potter, "who has seen evidence of
      the attack, said the court system had almost certainly been hit
      by a Russian phishing attack, using commercial ransomware known
      as Qilin". CSV itself refused to name any actor ("We don't
      provide information or details on cyber threat actors" — CSV
      FAQ), and no Australian government body publicly named Qilin.
      A prior version of this record claimed "Qilin (self-claimed)";
      that is REFUTED: BleepingComputer (2024-01-02) reported "there
      is no mention of CSV on their data leak site" and that it "has
      not been able to independently confirm if Qilin is behind the
      attack"; The Register likewise noted "Qilin is yet to claim the
      attack on its leak site". Confidence graded moderate: a single
      independent expert (with claimed evidence access, "almost
      certainly") relayed by ABC as "sources", hedged by The Register
      to "likely", never claimed by the operators, and never
      confirmed by CSV or an investigating agency. Potter's phishing
      characterization is likewise single-voiced, so initial_vector
      stays unknown.
