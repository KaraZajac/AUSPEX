id: 2023-12/cisa-aa23-335a-unitronics-campaign
name: CISA AA23-335A — IRGC-affiliated Unitronics PLC global campaign
start_date: 2023-10-01
disclosure_date: 2023-12-01
end_date: 2023-12-31
incident_type:
  - intrusion
  - disruption
initial_vector: n-day  # exposed Unitronics PLCs; default credentials; port 20256/TCP
outcome_summary: |
  CISA joint advisory documented 75+ compromised Unitronics
  Vision PLC devices globally; at least 34 US water and
  wastewater facilities affected. Minor OT impacts at multiple
  WWS facilities; PLC ladder logic supplanted with CyberAv3ngers
  messaging.
quantified_impact:
  affected_plcs: 75
  us_wws_facilities: 34
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
summary: |
  Multi-government joint advisory (CISA, FBI, NSA, EPA, INCD,
  NCSC-UK, CCCS) — formal attestation of the IRGC affiliation for
  the broader Unitronics campaign of which Aliquippa is the
  canonical individual event. The advisory documents the
  tradecraft: CyberAv3ngers operators identified internet-exposed
  Unitronics Vision-series PLCs (port 20256/TCP) via Shodan-style
  scanning, logged into the integrated HMI using default
  credentials ("1111"), and overwrote the device ladder logic and
  HMI splash screen with an anti-Israel banner naming Unitronics
  as Israeli-made equipment. The operation is OT-defacement
  rather than process manipulation — no IEC 61131 logic was
  redirected to physical damage — but the targeted PLC pool
  spans US water / wastewater, energy, and food-and-beverage
  facilities and is reported across the EU and Ireland.
