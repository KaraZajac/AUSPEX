id: 2023-12/cisa-aa23-335a-unitronics-campaign
name: CISA AA23-335A — IRGC-affiliated Unitronics PLC global campaign
start_date: 2023-10-01  # "In October 2023, CyberAv3ngers claimed credit ... for cyberattacks against Israel-based PLCs" (internet-facing Unitronics, default/no passwords); Telegram claims window Sept 13 - Oct 30, 2023; "In November 2023 ... began actively targeting and compromising" Israeli-made Unitronics PLCs; US WWS access "Beginning on Nov. 22, 2023"
disclosure_date: 2023-12-01
end_date: 2024-01-31  # "Between November 2023 and January 2024 ... likely in four separate waves of cyberattacks" (Dec-18-2024 update)
incident_type:
  - intrusion
  - disruption
initial_vector: valid-creds  # internet-exposed Unitronics Vision PLCs/HMIs on default TCP port 20256 with "default or no passwords" (T1078.001 Default Accounts, T1110 Brute Force); CVE-2023-6448 (default-password weakness, CWE-798) assigned Dec 11, 2023 — no software-vulnerability exploitation described; the widely reported "1111" string appears in neither advisory version
outcome_summary: |
  Per the advisory as updated December 18, 2024: between November
  2023 and January 2024, likely in four separate waves, the actors
  compromised at least 75 Unitronics devices, at least 34 of them
  in the US water and wastewater sector (having "accessed multiple
  U.S.-based WWS facilities" beginning November 22, 2023).
  Compromised devices had their ladder logic erased and supplanted
  with the actors' own file containing "no inputs or outputs"
  (preventing the devices from operating as intended), were
  renamed, version-downgraded, and locked against remote
  remediation (default port changed 20256 to 20257,
  upload/download functions disabled), and displayed an
  anti-Israel defacement splash page on the HMI. No physical
  process damage is reported; the advisory warns that deeper
  access "could render additional, more profound cyber-physical
  effects on processes and equipment."
quantified_impact:
  compromised_devices: 75  # "The actors compromised at least 75 devices" (Nov 2023 - Jan 2024; Dec-18-2024 update)
  us_wws_devices: 34  # "including at least 34 in the WWS Sector in the United States" — a device count, not a facilities count
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
summary: |
  Joint advisory — originally released December 1, 2023 by FBI,
  CISA, NSA, EPA, and Israel's INCD; the December 18, 2024 update
  added Canada's CCCS and the UK's NCSC as co-sealers — formally
  attesting the IRGC affiliation of the broader Unitronics
  campaign of which Aliquippa is the canonical individual event.
  The advisory states that in November 2023 "IRGC-affiliated cyber
  actors using the persona 'CyberAv3ngers' began actively
  targeting and compromising Israeli-made Unitronics Vision Series
  programmable logic controllers (PLCs) and human machine
  interfaces (HMIs)", calls CyberAv3ngers "an Iranian
  IRGC-affiliated cyber persona", and records the persona's
  October 2023 claims of attacks on Israel-based PLCs in the
  water, energy, shipping, and distribution sectors. Tradecraft
  per the advisory: the actors authenticated to internet-connected
  devices with communications on default TCP port 20256 that
  "either had a default password in place or no password",
  supplanted the device ladder logic, and uploaded an HMI splash
  defacement stating "You have been hacked, down with Israel.
  Every equipment 'made in Israel' is CyberAv3ngers legal target."
  The operation is OT defacement and device disruption rather than
  process manipulation — the replacement ladder logic contained no
  inputs or outputs, and no physical damage is reported. Victims
  spanned multiple US states and foreign countries across
  "multiple critical infrastructure industries", and the NCSC
  observed targeting of PLC devices in the United Kingdom, "likely
  as part of a wider cyber campaign against Israel and
  Israeli-made technology." The affected PLC line is commonly used
  in water/wastewater, energy, food and beverage manufacturing,
  transportation, and healthcare.
attributions:
  - actor_id: ir/irgc-io/cyberav3ngers
    attributing_org: CISA + FBI + NSA + EPA + INCD
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2023-12-01
    attribution_source_id: cisa/2023-12-01_aa23-335a-cyberav3ngers
    notes: |
      The original December 1, 2023 advisory was authored by five
      agencies (FBI, CISA, NSA, EPA, INCD — per the Dec-2023 PDF);
      the December 18, 2024 update added CCCS and the UK NCSC,
      making seven authoring agencies on the current version.
      Level named-unit at the IRGC parent only: the advisory ties
      the CyberAv3ngers persona to "the Iranian Government's
      Islamic Revolutionary Guard Corps (IRGC)" but names no IRGC
      sub-organization; IRGC-CEC granularity arrives with OFAC's
      February 2, 2024 designation (companion event
      2024-02/ofac-cyberav3ngers-irgc-io-designations). The actor
      id's IRGC-IO placement is the atlas's structural judgment —
      see the actor-file audit note.
doctrine_links:
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The advisory pierces the persona as fact — "CyberAv3ngers is
      an Iranian IRGC-affiliated cyber persona"; "IRGC-affiliated
      cyber actors using the persona 'CyberAv3ngers'" — a state
      armed force conducting coercive OT attacks behind a
      hacktivist front whose Telegram channel claims attacks
      (several falsely). That attests the persona-laundering
      mechanism, but the advisory states neither a deniability nor
      a retaliation purpose in words, so the doctrine label is
      strongly inferred rather than attested (mechanism attested,
      goal inferred). Grading now matches the companion Aliquippa
      and OFAC-designation events on the same pillar.
    attesting_source_id: cisa/2023-12-01_aa23-335a-cyberav3ngers
    inference_basis:
      source_id: cisa/2023-12-01_aa23-335a-cyberav3ngers
      signals:
        - "Advisory states as fact that the hacktivist persona is a state front: 'CyberAv3ngers is an Iranian IRGC-affiliated cyber persona'; 'IRGC-affiliated cyber actors using the persona CyberAv3ngers'"
        - "Advisory documents the persona's Telegram claim channel including false claims ('several of these claimed compromises of critical infrastructure organizations in Israel are false') — claim-and-leak persona behaviour"
        - "Coercive anti-Israel OT defacement conducted under the persona brand rather than under the IRGC's own name"
      ruled_out: "Genuine independent hacktivism — excluded by the advisory's own IRGC-affiliation finding; a stated deniable-retaliation GOAL is not in the advisory (mechanism only), hence not attested"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/forward-defense
    pillar_id: ir/forward-defense/proxy-projection
    program_id: null
    confidence: attested
    reasoning: |
      The advisory carries the operation's strategic purpose in
      substance: the actors' own displayed rationale — "You have
      been hacked, down with Israel. Every equipment 'made in
      Israel' is CyberAv3ngers legal target" (quoted unhedged in
      both the Dec-2023 and Dec-2024 versions) — and the NCSC's
      assessment that UK PLC targeting was "likely as part of a
      wider cyber campaign against Israel and Israeli-made
      technology" (hedge limited to the UK-linkage sentence).
      Anti-Israel-equipment projection executed against
      third-country infrastructure (US, UK, other countries) by an
      IRGC-affiliated persona is the extraterritorial engagement
      of an adversary the proxy-projection pillar encodes;
      "Forward Defense" is the AUSPEX mapping of that stated goal
      (the slug itself does not appear in the source).
    attesting_source_id: cisa/2023-12-01_aa23-335a-cyberav3ngers
    inference_basis:
      source_id: cisa/2023-12-01_aa23-335a-cyberav3ngers
      source_quote: >-
        The IRGC-affiliated cyber actors left a defacement image
        stating, "You have been hacked, down with Israel. Every
        equipment 'made in Israel' is CyberAv3ngers legal target."
        [...] the NCSC observed the targeting of PLC devices,
        including in the United Kingdom, likely as part of a wider
        cyber campaign against Israel and Israeli-made technology.
    counter_explanation: null
    contested: false
    analyst: claude
