id: 2023-12/handala-persona-launch
name: Handala Hack persona launches on Telegram and X
start_date: 2023-12-18
disclosure_date: 2023-12-18  # persona self-disclosed via its own public Telegram/X launch
end_date: 2023-12-31
incident_type:
  - influence-operation
  - data-theft
initial_vector: phishing  # subsequent operations primarily phishing-led
outcome_summary: |
  On 18 December 2023 — roughly ten weeks after the October 7,
  2023 Hamas attack on Israel — a new hacktivist-styled persona
  named Handala (after the barefoot Palestinian boy cartoon
  created by Naji al-Ali in 1969) launched simultaneously on
  Telegram and X. The persona self-presented as a pro-Palestinian
  "resistance" collective. It would go on to become known for
  hack-and-leak operations and (from 2024) wiper-style destructive
  attacks, claiming dozens of breaches of mostly Israeli targets
  across government, civil-society, and private-sector
  organizations.
false_flag_risk: confirmed  # DOJ (Mar 2026): Palestinian-hacktivist branding is a MOIS "faketivist" cover
campaign_id: handala-iran-israel-campaign
summary: |
  Foundational launch event for one of the most visible
  Iran-aligned hacktivist personas of the post-October-7
  Iran-Israel cyber-exchange cycle. Handala self-presents as a
  pro-Palestinian collective but is a MOIS "faketivist" front: the
  US DOJ's 19 March 2026 court-authorized domain-seizure affidavit
  named the Handala-Hack[.]to and Handala-Redwanted[.]to domains
  as MOIS-operated psychological-operations infrastructure, and
  Microsoft (Storm-0842), Check Point (Void Manticore) and
  CrowdStrike (Banished Kitten) track the operating cluster to
  MOIS. The pattern mirrors the MOIS HomeLand Justice persona
  template. This launch event captures the persona's appearance
  for the downstream operations that draw on the same operational
  backbone.
attributions:
  - actor_id: ir/mois/handala
    attributing_org: US DOJ (2026 domain-seizure affidavit); Microsoft (Storm-0842); Check Point (Void Manticore); SOCRadar
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2026-03-19
    attribution_source_id: doj/2026-03-19_iranian-cyber-psyop-domain-seizure
    notes: |
      No contemporaneous (Dec 2023) attribution existed; the
      persona launched self-presenting as a pro-Palestinian
      "hacktivist" collective (false-flag / "faketivist" cover).
      MOIS operation was established retrospectively and is now
      government-attested: the US DOJ's 19 March 2026 court-
      authorized seizure affidavit named the Handala-Hack[.]to and
      Handala-Redwanted[.]to domains as "used by the MOIS in
      furtherance of attempted psychological operations ... by
      claiming credit for hacking activity, posting sensitive data
      stolen during such hacks." Microsoft places Handala in the
      Storm-0842 MOIS unit; Check Point tracks the operator as Void
      Manticore (MOIS-affiliated); CrowdStrike as Banished Kitten.
      Reporting distinguishes MOIS (Ministry of Intelligence)
      affiliation from IRGC. Per the AUSPEX host-nation / false-flag
      rule the Palestinian branding is cover; the operator host is
      Iran/MOIS. (Supersedes the prior record's unsupported
      "moderate / socradar 2024-06-01" attestation and its erroneous
      listing of INCD as an attributing org — INCD issued no
      service-level attribution.)
