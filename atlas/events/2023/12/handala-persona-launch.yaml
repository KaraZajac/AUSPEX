id: 2023-12/handala-persona-launch
name: Handala Hack persona launches on Telegram and X
start_date: 2023-12-18
disclosure_date: 2023-12-19
end_date: 2023-12-31
incident_type:
  - influence-operation
  - data-theft
initial_vector: phishing  # subsequent operations primarily phishing-led
outcome_summary: |
  On 18 December 2023 — six weeks after the October 7 Hamas
  attack on Israel — a new hacktivist-styled persona named
  Handala (after Naji al-Ali's iconic barefoot Palestinian
  cartoon character) launched simultaneously on Telegram and X.
  The Israel National Cyber Directorate (INCD) issued a public
  warning the following day, 19 December 2023, cautioning
  organizations about the new persona's hack-and-leak and
  wiper-style tradecraft. Within the first months of operation
  the persona claimed dozens of breaches of Israeli targets
  spanning government, healthcare, and civil-society
  organizations.
false_flag_risk: suspected  # persona presents as pro-Palestinian hacktivist
campaign_id: handala-iran-israel-campaign
summary: |
  Foundational launch event for the second-most-active hacktivist
  persona in the post-October-7 Iran-Israel cyber-exchange
  cycle. Handala is widely assessed by Western analysts and the
  US DOJ as a MOIS-operated front for influence and destructive
  operations — the operational cluster CrowdStrike tracks as
  Banished Kitten and Microsoft as Storm-0842. The doctrinal
  pattern matches the attested HomeLand Justice → MOIS (Treasury
  September 2022) template precisely; the launch event captures
  the persona's appearance for downstream events that draw on
  the same operational backbone.
attributions:
  - actor_id: ir/mois/handala
    attributing_org: Western analyst consensus (Check Point, SOCRadar, KELA, INCD)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2024-06-01
    attribution_source_id: socradar/2024_handala-dark-web-profile
    notes: |
      INCD has publicly warned about the persona but has not
      issued a formal service-level attribution. The MOIS
      attribution is reconstructed from vendor analysis,
      operational overlap with the Banished Kitten cluster, and
      the DOJ's August 2024 advisory framing of similar MOIS-
      operated personas.
doctrine_links:
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Hacktivist-persona launch as front for MOIS-directed
      operations fits the attested HomeLand Justice / Black
      Shadow / CyberAv3ngers template precisely. Strongly
      inferred rather than attested because no US/IL government
      designation has yet specifically attested the Handala →
      MOIS linkage; the assessment is consensus across multiple
      vendor analyses.
    attesting_source_id: null
    contested: false
    analyst: claude
  - doctrine_id: ir/resistance-axis
    pillar_id: ir/resistance-axis/information-warfare
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Post-October-7 launch, Palestinian-resistance branding,
      and Telegram-channel-as-claim-vehicle architecture fit the
      Resistance Axis information-warfare pillar.
    attesting_source_id: null
    contested: false
    analyst: claude
targets:
