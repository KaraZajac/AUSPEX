id: 2023-12/pwc-teal-kurma-snappytcp-disclosure
name: PwC discloses Sea Turtle SnappyTCP Linux/Unix implant — bridging the post-2019 quiet window
start_date: 2021-01-01
disclosure_date: 2023-12-01
end_date: 2023-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  PwC Threat Intelligence's December 2023 "The Tortoise and The
  Malwahare" report disclosed the previously-undocumented
  SnappyTCP implant — a Linux/Unix reverse-TCP-shell with basic
  C2 and persistence capabilities — used by Sea Turtle / Teal
  Kurma between 2021 and 2023. The report documented one 2023
  intrusion using a compromised legitimate cPanel account as
  initial access to drop SnappyTCP on the victim, marking a
  significant departure from the cluster's pre-2019 DNS-hijacking
  tradecraft toward host-implant operations. The disclosure
  closed the post-2019 / pre-Hunt-&-Hackett-2024 gap in public
  reporting and confirmed continuity of Turkish state cyber
  tasking through the quiet window.
false_flag_risk: none
summary: |
  Operationally meaningful disclosure that closed the 2020–2023
  Sea Turtle reporting gap and demonstrated tradecraft evolution
  rather than cluster dormancy. SnappyTCP is a deliberately
  minimal implant — its simplicity is the operational design,
  consistent with Sea Turtle's preference for blending into
  hosting-provider noise. Together with the January 2024 Hunt &
  Hackett Dutch-ISP disclosure and the March 2024 Microsoft
  MARBLED DUST telecom disclosure, this report anchored the
  three-pillar 2024 Sea Turtle resurgence picture.
