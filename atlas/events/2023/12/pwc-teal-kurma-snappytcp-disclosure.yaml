    pillar_id: tr/counter-gulen-kurdish-surveillance/kurdish-diaspora
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      PwC states the purpose at the proximate level — motivation
      "almost certainly to collect information that can further
      some type of economic or political interest, but the focus
      is on conducting espionage", with the take "exploited for
      surveillance purposes, or to gather traditional
      intelligence about the activities of specific targets" —
      i.e. the espionage-for-surveillance purpose this pillar
      specializes. Victim selection carries the Kurdish signal:
      2023 actor infrastructure spoofs "a Kurdish news agency"
      (anfturkce[.]news), and the stated sector focus —
      governments, telecommunications (holding customer
      "metadata around connections to websites, or call logs")
      and IT service providers across Europe and the Middle East
      — is the same surveillance-enabling collection pattern the
      pillar's canonical Sea Turtle exemplars encode.
    attesting_source_id: pwc/2023-12_tortoise-and-malwahare-teal-kurma
    inference_basis:
      signals:
        - PwC's motive statement — "almost certainly to collect
          information", espionage-focused, exploitable "for
          surveillance purposes, or to gather traditional
          intelligence about the activities of specific targets".
        - Spoofed-infrastructure victimology includes a Kurdish
          news agency (anfturkce[.]news — ANF, the PKK-aligned
          Firat News Agency), the precise diaspora media
          ecosystem the pillar encodes.
        - Sector focus on telecoms (customer connection metadata
          and call logs), governments and IT service providers —
          surveillance-enabling collection consistent with the
          pillar's KRG/telecom exemplars from the 2017-2019
          DNS-hijacking era.
        - PwC's own strategic framing of the cluster in its prior
          intelligence brief "Furthering Turkish state interests
          through cyber operations" (CTO-SIB-20200323-01-A,
          footnote 8).
      ruled_out: |
        tr/mavi-vatan (Eastern-Mediterranean energy/maritime
        interests) — SnappyTCP activity "highly likely focused on
        European countries, particularly those located in the
        Mediterranean" could gesture at Mavi Vatan, but the
        report names no energy or maritime victims and centers
        NGO/media/ethnic-audience surveillance collection. The
        gulen-diaspora sibling pillar was also considered; the
        one ethnic-audience spoof the report names is Kurdish
        (ANF), not Gülenist. Not "attested" because PwC names
        espionage/surveillance as the purpose but never states
        the counter-Kurdish-diaspora goal itself — that last step
        is AUSPEX's inference from victim selection.
    contested: false
    analyst: claude
