id: 2023-12/pwc-teal-kurma-snappytcp-disclosure
name: PwC discloses Sea Turtle SnappyTCP Linux/Unix implant — bridging the post-2019 quiet window
start_date: 2021-01-01
disclosure_date: 2023-12-05
end_date: null
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: n-day
outcome_summary: |
  PwC Threat Intelligence's 5 December 2023 report "The Tortoise
  and The Malwahare" disclosed SnappyTCP — Linux/Unix malware
  "previously not discussed publicly": "a simple reverse TCP
  shell for Linux/Unix that has basic C2 capabilities and is
  also used for establishing persistence on a system" — used by
  Teal Kurma / Sea Turtle between 2021 and 2023, in at least two
  variants (cleartext HTTP and OpenSSL/TLS). SnappyTCP's code is
  practically identical to a publicly accessible GitHub
  repository that PwC assesses with "realistic probability" is
  currently controlled by the actor. C2 infrastructure (e.g.
  lo0[.]systemctl[.]network, hosting sy.php as early as July
  2021) overlaps indicators in a May 2022 Greek national CERT
  alert, and infrastructure pivots surfaced domains resolving
  throughout 2023 that spoof a US-government-owned
  Arabic-language TV channel, a Golan Heights human-rights NGO,
  and a Kurdish news agency. The disclosure closed the
   2020-2023 gap in public Sea Turtle reporting, documenting a
  tactical shift from the cluster's earlier large-scale
  DNS-hijacking toward host-level implant operations.
false_flag_risk: none
summary: |
  Operationally meaningful disclosure that closed the 2020-2023
  Sea Turtle public-reporting gap and demonstrated tradecraft
  evolution rather than dormancy: the Türkiye-nexus cluster PwC
  tracks as Teal Kurma "altered its tactics" from the
  large-scale DNS hijacking of its 2018-2020 heyday to a simple
  Linux/Unix reverse-shell implant, while continuing to target
  "throughout Europe and the Middle East" — a sector focus on
  "governments, telecommunication, and IT service providers"
  plus the NGO and media sectors. PwC assesses initial access
  has likely continued via exploitation of major CVEs with
  publicly available proof-of-concept code (CVE-2021-44228,
  CVE-2021-21974, CVE-2022-0847), and that the motivation is
  "almost certainly" information collection focused on
  espionage, with collected data exploitable "for surveillance
  purposes, or to gather traditional intelligence about the
  activities of specific targets".
