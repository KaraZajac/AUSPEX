  notes: |
    Audited 2026-07-04 against the RAW PwC report "The Tortoise and The
    Malwahare" (pwc/2023-12_tortoise-and-malwahare-teal-kurma; live URL fetched
    clean, HTTP 200, no redirect; snapshot 261,262 bytes; sha256
    cb7dbe5d…0c696640, full hash in the source record). Canonical-event
    context: the fabricated July-2023 "overview" sibling (phantom source = PwC
    CTI landing page) was deleted 2026-07-03 and merged here; this audit makes
    the survivor solid. Snapshot verified as the REAL article (byline
    "December 05, 2023"; 16x SnappyTCP, 10x Teal Kurma, full IOC appendix).
    [a] FACTS — verbatim-supported: SnappyTCP "previously not discussed
    publicly"; "a simple reverse TCP shell for Linux/Unix that has basic C2
    capabilities and is also used for establishing persistence on a system";
    use window "Between 2021 and 2023"; "at least two main variants" (cleartext
    vs OpenSSL/TLS); GitHub repo code "practically identical" with "realistic
    probability" the account is actor-controlled; lo0[.]systemctl[.]network
    /sy.php observed "as early as July 2021"; indicator overlap with the May
    2022 Greek national CERT alert ("kyvernoasfaleia-IOCs-11052022"); domains
    "resolving throughout 2023" spoofing Alhurra ("A US government-owned
    Arabic-language TV channel"), Al-Marsad ("A NGO in the Golan Heights that
    is focused on Arab human rights") and anfturkce[.]news ("A Kurdish news
    agency"); tactic shift from "large scale and prolonged" DNS hijacking
    ("Teal Kurma has altered its tactics to include additional tools").
    REMOVED as unsupported: (1) "one 2023 intrusion using a compromised
    legitimate cPanel account as initial access" — ZERO occurrences of cPanel
    in the report; that detail is Hunt & Hackett's January-2024 Dutch-campaign
    finding, a separate event (conflation inherited from the deleted sibling);
    (2) "deliberately minimal implant … simplicity is the operational design …
    blending into hosting-provider noise" — fabricated tradecraft embellishment
