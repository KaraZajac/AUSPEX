    over-claim (report says "Türkiye-nexus"; no state-tasking statement);
    (4) the "March 2024 Microsoft MARBLED DUST telecom disclosure … three-pillar
    2024 resurgence" cross-reference — not carried by this source, and the
    msft/2024-03-05 source is unfetchable per the 2026-06-25 actor audit.
