id: 2023-12/appin-litigation-pressure
name: Reuters / Appin court-ordered temporary unpublishing and downstream litigation pressure
start_date: 2023-12-04
disclosure_date: 2023-12-05
end_date: 2024-10-26
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  On Dec. 4, 2023 a district court in New Delhi issued a preliminary
  injunction — obtained by the Association of Appin Training Centers
  (AOATC), which had sued Reuters in November 2022, before
  publication, seeking to prevent the report from running —
  compelling Reuters to remove its Nov. 16, 2023 investigation "How
  an Indian startup hacked the world." Reuters complied on Dec. 5,
  2023, replacing the article with an editor's note saying it stood
  by its reporting and would appeal. Although the order bound only
  Reuters and Google, AOATC takedown demands citing it produced a
  downstream censorship cascade: SentinelOne removed its companion
  research, the Internet Archive deleted its copy of the article,
  Lawfare redacted its Appin references, the Risky Business podcast
  pulled an episode, and WIRED removed a news-roundup summary, while
  Techdirt, MuckRock and Ron Deibert refused — EFF represented
  Techdirt and MuckRock, arguing the interim order was misrepresented
  and unenforceable in US courts under the SPEECH Act. RSF later
  documented at least 15 outlets (in the US, Switzerland, France and
  India) receiving notices from Khare or AOATC, five of them sued.
  On Oct. 3, 2024 the same district court vacated the injunction,
  holding the plaintiff had shown no "prima facie case to make
  interference in the process of journalism," and Reuters restored
  the article (back online by Oct. 26, 2024, with an update in
  paragraph 14); the underlying lawsuit remained pending.
false_flag_risk: none
summary: |
  Meta/documentary event — litigation pressure, not a cyber
  operation. The court-ordered unpublishing of Reuters' Appin
  exposé and the downstream takedown campaign waged by the
  Association of Appin Training Centers and Appin co-founder Rajat
  Khare (via law firms including Clare Locke) became a press-freedom
  story in its own right, documented by EFF, WIRED and an RSF
  investigation. It is operationally significant for the
  contractor-hack-for-hire doctrine: it evidences the ecosystem's
  use of a legal-coercion lane — SLAPP suits and cross-border
  misrepresentation of an interim Indian court order — to suppress
  exposure of hack-for-hire operations, alongside the cyber
  collection business itself.
