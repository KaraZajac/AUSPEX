    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The litigation campaign is the contractor ecosystem's
      reputation-and-deniability defense lane: press-freedom
      investigators state its purpose as suppressing exposure of the
      hack-for-hire business (EFF: a campaign "seeking to wipe out
      stories about the mercenary hacking campaigns" of Appin and
      Khare; RSF: a global strategy to keep Khare and his company's
      tactics "out of the spotlight"). Neither operational pillar
      (commercial-litigation targeting, political-espionage) encodes
      this legal-coercion adjunct, so the link sits at doctrine
      level with pillar null. Strongly inferred rather than attested
      because the sources state the campaign's purpose relative to
      Appin/Khare, not a goal of the (inferred, posture-kind)
      ecosystem doctrine itself.
    attesting_source_id: rsf/2024-11-21_indian-cyber-security-giant-silencing-media
    inference_basis:
      signals:
        - "EFF (2024-02-08) describes 'a campaign of bullying and censorship seeking to wipe out stories about the mercenary hacking campaigns' of Appin Technology and co-founder Rajat Khare — suppression of hack-for-hire exposure, not ordinary defamation defense."
        - "RSF (2024-11-21) documents >=15 outlets noticed and 5 sued by Khare or AOATC since 2022, calling it a SLAPP strategy 'pursued on a global scale to keep both himself and his company's tactics out of the spotlight.'"
        - "The campaign's targets included technical research (SentinelOne), archives (Wayback Machine) and press-freedom commentary — consistent with exposure suppression, not franchisee-reputation repair."
        - "The issuing court itself vacated the injunction on Oct. 3, 2024, finding no prima facie case 'to make interference in the process of journalism.'"
      ruled_out: "Bona fide reputation defense by an independent training-franchisee association unconnected to the hack-for-hire business — undercut by the campaign's breadth and target set (technical reports, archives, 15+ outlets worldwide), by RSF tying the notices to Khare personally, and by the court's own no-prima-facie finding."
