id: 2023-12/appin-litigation-pressure
name: Reuters / Appin court-ordered temporary unpublishing and downstream litigation pressure
start_date: 2023-11-17
disclosure_date: 2023-12-05
end_date: null
incident_type:
  - influence-operation
initial_vector: unknown
outcome_summary: |
  Following Reuters' November 2023 Appin Security investigation,
  a Delhi court issued an order compelling Reuters to temporarily
  unpublish its investigative report; ancillary orders pressured
  Wikipedia, Substack writers, and US-based outlets that had
  republished or cited the Reuters reporting. The dynamic became
  a story of its own as press-freedom organizations and US legal
  observers documented the coordinated downstream litigation
  pressure on Reuters' reporting infrastructure. Reuters resumed
  publication after an Indian appellate decision.
false_flag_risk: none
summary: |
  Not a cyber operation per se but operationally significant for
  the contractor-hack-for-hire pillar: it illustrates the
  ecosystem's reach into legal-coercion lanes alongside cyber
  collection. The episode informed subsequent vendor reporting
  on the Appin clientele network and the broader Indian hack-
  for-hire diasporic reach.
