    notes: |
      The acting parties are the Association of Appin Training
      Centers (AOATC) — the plaintiff that obtained the Dec. 4, 2023
      injunction, on the record in court filings — and Appin
      co-founder Rajat Khare via law firms; RSF attributes the
      global notice/lawsuit campaign to "Khare or the Association of
      Appin Training Centers (AOATC), an obscure entity claiming to
      defend Appin's interests and reputation," and EFF (2024-02-08)
      earlier described the same campaign as seeking to "wipe out
      stories about the mercenary hacking campaigns" of Appin
      Technology and Khare. Caveat: AOATC claims to be an
      independent successor to Appin's training-franchise network,
      not the hack-for-hire firm itself; AUSPEX maps the campaign to
      the in/appin-security anchor as the ecosystem entity whose
      exposure the campaign suppressed. Not a covert attribution
      problem — the plaintiff's identity is public court record.
