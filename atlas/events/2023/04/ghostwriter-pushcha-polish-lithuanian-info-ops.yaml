id: 2023-04/ghostwriter-pushcha-polish-lithuanian-info-ops
name: Ghostwriter / PUSHCHA Polish + Lithuanian influence-operation continuation
start_date: 2023-01-01  # quarterly bulletin coverage window
disclosure_date: 2023-07-27
end_date: 2023-06-30
incident_type:
  - influence-operation
  - intrusion
initial_vector: phishing
outcome_summary: |
  Google TAG documented sustained Ghostwriter (UNC1151) / PUSHCHA
  information-operation activity through Q2 2023, targeting Polish
  and Lithuanian audiences with pro-Lukashenko and pro-invasion
  narratives across hijacked content-management accounts. TAG
  enforced against the underlying infrastructure with domain
  takedowns and Gmail / Safe Browsing actions. Continued the
  pattern attested by the EU's September 2021 statement and the
  Bundesregierung's pre-election 2021 attribution.
false_flag_risk: none
summary: |
  Continued operational expression of the Belarus-aligned (and
  Russia-coordinated) Ghostwriter cluster through the invasion
  phase. The narrative set tracked the political-information
  environment of Poland and Lithuania — the two NATO states with
  the most exposed land borders and the most active Ukraine-aid
  postures. Operational tradecraft (credential phish → CMS
  takeover → fabricated content seeding) is essentially unchanged
  from the 2020-2021 baseline; targeting frequency and tempo are
  the documented changes.
