id: 2023-04/ghostwriter-pushcha-polish-lithuanian-info-ops
name: "Ghostwriter / UNC1151 disinformation campaign against Poland (fake Lithuanian-Polish-Ukrainian brigade recruitment)"
start_date: 2023-04-01  # best estimate; Poland's MoD disclosed the "recent" campaign ~2023-04-19
disclosure_date: 2023-04-19
end_date: null
incident_type:
  - influence-operation
false_flag_risk: none
summary: |
  Poland's Ministry of National Defence issued a public warning on
  ~19 April 2023 about a disinformation campaign it traced to the
  Belarus-linked Ghostwriter cluster (UNC1151). The operators sent
  fabricated messages to Polish citizens — via SMS, Telegram
  channels, and email from the newly-registered look-alike domain
  mon-gov[.]com (impersonating the Polish MoD's mon.gov.pl) — falsely
  claiming recruitment to the Lithuanian-Polish-Ukrainian brigade (a
  real multinational peacekeeping/humanitarian unit) and asserting
  the brigade would take part in military operations in Ukraine. Per
  Poland's MoD, Ghostwriter's goal in Poland is to disrupt the
  country's relations with its allies (Ukraine, the United States and
  NATO) and to foment social unrest among Polish citizens; Polish
  authorities assessed the campaign was likely to continue. The
  Record (Recorded Future News) frames it as the latest in a series
  of Russia- and Belarus-aligned disinformation operations against
  Poland.
outcome_summary: |
  Poland's MoD and cybersecurity services publicly attributed and
  moved to debunk the campaign, warning citizens that the
  recruitment messages were fabricated and that further activity was
  likely. Reach was not quantified ("It is not clear how many people
  received these messages"). No intrusion, data theft, or credential
  compromise was reported for this specific operation — it was
  disinformation disseminated from a spoofed government-look-alike
  domain rather than a network breach.
