  notes: |
    PHANTOM RE-SOURCE (badrabbit model). The event previously rested on a single phantom citation,
    kaspersky/2023-04_sidewinder-pakistan-china-ongoing, whose url was the Securelist HOMEPAGE
    (https://securelist.com/; title "Securelist | Kaspersky's threat research and reports"; 168445 bytes;
    0 "SideWinder"/"Pakistan" mentions). The real report that slug invokes — Kaspersky "APT trends report
    Q1 2023" (https://securelist.com/apt-trends-report-q1-2023/109581/, datePublished 2023-04-27) — does
    NOT cover SideWinder: its only 5 "SideWinder" strings are a related-posts sidebar linking the 2024
    StealerBot article; body "China"=0; body "Pakistan" hits are DTrack/Andariel + the unrelated
    "DreamLand" malware; "academic" is ScarCruft/North-Korea. The event's claims were therefore
    unsupported by any cited source. The underlying incident IS real and documented, so re-sourced to the
    genuine primary.
    RE-SOURCED TO: Group-IB / Bridewell, "The distinctive rattle of APT SideWinder"
    (groupib/2023-05-17_sidewinder-distinctive-rattle; url https://www.group-ib.com/blog/hunting-sidewinder/;
    raw sha256 a526a25e…a792315a, 604310 bytes; HTTP 200) — corroborated by The Hacker News
    (thehackernews/2023-05-17_sidewinder-infrastructure-uncovered; sha256 803ea833…c412cf86, 167043 bytes).
    NOT A DUPLICATE: a corpus-wide grep for distinctive-rattle / hunting-sidewinder / bridewell / PNWC /
    Tsinghua found no other event citing this 2023 report; it is a distinct disclosure from the 2022-05
    Group-IB "Old Snake, New Skin" retrospective (different report, different infrastructure, +1 year).
    [a] FACTS — all now carried by the Group-IB primary (verbatim): "Group-IB and Bridewell detected 55
    previously unknown IP addresses"; "We have attributed them with high confidence to SideWinder";
    "GUIDELINES FOR JOURNAL – 2023 PAKISTAN NAVY WAR COLLEGE (PNWC).docx" with domain pnwc[.]bol-north[.]com;
    "the target of SideWinder's attack may have been Tsinghua University, one of the leading universities in
    China"; spoof domain mailtsinghua[.]sinacn[.]co; the 公管学院 archive "uploaded to VirusTotal for the
    first time on November 24, 2022 … from China (the city of Beijing)"; "domains that mimic government
    organizations in Pakistan, China, and India"; RTF/LNK/HTA (mshta.exe) chain. STRIPPED unsupported
    embellishments from the prior prose: the "SideWinder.SE staging chain" artifact name (not in source) and
    "data-theft" as a confirmed outcome (the report frames much as planned/potential attacks + infrastructure
    + lures, not confirmed exfiltration) → incident_type changed [intrusion,data-theft]→[intrusion,espionage].
    [b] ATTRIBUTION — attributing_org Kaspersky→"Group-IB / Bridewell"; confidence high (source: "high
    confidence to SideWinder"); auspex_assessment concur; attribution_date 2023-04-27→2023-05-17. Set
    attribution_level=named-actor: the source names the SideWinder cluster but NOT an Indian service/state as
