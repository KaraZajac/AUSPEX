id: 2023-04/sidewinder-pakistan-china-ongoing
name: SideWinder attack infrastructure targeting Pakistani military and Chinese academic targets (Group-IB / Bridewell "distinctive rattle")
start_date: 2022-10-01
disclosure_date: 2023-05-17
end_date: 2023-03-31
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  In their joint "distinctive rattle of APT SideWinder" analysis
  (17 May 2023), Group-IB and Bridewell uncovered 55 previously
  undocumented IP addresses / domains attributed "with high
  confidence to SideWinder", together with malicious documents
  collected from VirusTotal across late 2022 into March 2023. The
  phishing domains impersonate news, government, telecommunications
  and financial organizations, and the servers are used as A records
  for domains mimicking government organizations in Pakistan, China
  and India. Named lures include a document spoofing the Pakistan
  Navy War College (PNWC; domain pnwc[.]bol-north[.]com) and a spoof
  of Tsinghua University's email system (mailtsinghua[.]sinacn[.]co),
  whose 公管学院 (School of Public Policy & Management) archive was
  uploaded to VirusTotal from Beijing on 24 November 2022. The
  staging chain used weaponized RTF documents and LNK downloaders
  that launch remote HTA payloads via mshta.exe.
false_flag_risk: none
summary: |
  Joint Group-IB / Bridewell disclosure of SideWinder infrastructure
  and lures active across the late-2022-to-early-2023 window — a
  distinct report from Group-IB's May 2022 "Old Snake, New Skin"
  retrospective and from Kaspersky's October 2024 StealerBot
  analysis. The Pakistani-military strand is anchored by a Pakistan
  Navy War College decoy; the Chinese strand by the spoof of Tsinghua
  University's email system (the malicious archive uploaded from
  Beijing in November 2022), consistent with the post-Galwan
  India-China collection posture. India appears in the report only as
  a *target* country; the report does not name the operating state,
  describing SideWinder as a state-sponsored group widely associated
  with Indian espionage interests.
