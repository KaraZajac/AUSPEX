id: 2023-04/ncf-responsible-cyber-power
name: NCF "Responsible Cyber Power in Practice" doctrinal paper
start_date: 2023-04-04
disclosure_date: 2023-04-04
end_date: 2023-04-04
incident_type:
  - doctrine-publication
initial_vector: unknown
outcome_summary: |
  Publication by the National Cyber Force and HM Government of
  "Responsible Cyber Power in Practice" — the first state-published
  operational doctrine for offensive cyber. Articulated the
  doctrine of cognitive effect plus the four principles
  (accountable, precise, calibrated, lawful).
false_flag_risk: none
summary: |
  Doctrinal landmark. AUSPEX models this as an event for the same
  reasons as the NCF establishment and the NCS 2022 publication:
  publication acts that anchor downstream operational tagging.

  Significance from the editorial perspective: prior to this paper,
  no state had published an operational doctrine for offensive
  cyber. The US has published *strategy* (NCS 2023, DoD Cyber
  Strategy) and *operational concepts* (Defend Forward, Persistent
  Engagement) but not a paper at this granularity of operational
  doctrine. The UK's choice to publish reflects the NCS 2022
  framing of the UK as a "responsible cyber power" requiring
  doctrinal transparency to justify offensive operations.

  Comparison points: Israeli doctrine on Stuxnet-class sabotage
  is essentially unpublished; Russian doctrine on cyber as part
  of information confrontation is published in general terms
  (Gerasimov, Information Security Doctrine 2016) but not at
  operational granularity; Chinese doctrine on integrated
  network-electronic warfare is published in PLA texts but not
  in a single accessible paper.
