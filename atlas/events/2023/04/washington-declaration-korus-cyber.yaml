  notes: |
    DOCUMENTARY/policy meta-event (actor_id null — a bilateral joint
    declaration, no attack). Audited vs 2 raw snapshots, both
    bidenwhitehouse.archives.gov live 200 (Biden-WH archive domain).
    Sources (sha256 first8…last8 · bytes): Washington Declaration
    03be2d34…b8a9a579 · 139,012; 70th-anniversary Leaders' Joint
    Statement 7316e45e…c2ed4a194 · 154,933.

    KEY DISCRIMINATION — the two state-visit statements are DISTINCT
    and only ONE carries cyber. The Washington Declaration snapshot is
    ENTIRELY nuclear (extended deterrence + "the establishment of a new
    Nuclear Consultative Group (NCG) to strengthen extended deterrence")
    and returns ZERO hits for "cyber"/"crypto"/"ransom"/"IT worker"/
    "sanctions". ALL cyber content lives in the companion 70th-
    anniversary joint statement. The event, summaries, and both source
    notes were corrected to stop attributing cyber language to the
    Washington Declaration itself.

    [a] FACTS — verbatim cyber passage (70th-anniversary): "President
    Yoon and President Biden recognized that the Alliance applies to
    cyberspace and committed to establish a U.S.-ROK Strategic
    Cybersecurity Cooperation Framework. The United States and the ROK
    commit to using this framework to expand cooperation on deterring
    cyber adversaries, increase the cybersecurity of critical
    infrastructure, combat cybercrime, and secure cryptocurrency and
    blockchain applications. The Presidents expressed concern regarding
    the DPRK's illicit cyber activities that fund its unlawful WMD and
    ballistic missile programs and committed to expanding information
    sharing and enhancing international awareness to combat DPRK cyber
    threats and block its cyber-enabled revenue generation."
    EMBELLISHMENTS STRIPPED (none of these appear in either raw):
    (1) "committed to joint disruption operations on DPRK revenue
    cyber" — raw commits only to "expanding information sharing ... to
    block its cyber-enabled revenue generation"; no disruption/offensive
    language. (2) "IT-worker sanctions coordination" — zero "IT
    worker"/"sanctions" hits in either raw; this belongs to the later
    Camp David statement. (3) "joint working-group format" — not in raw
    (raw: "committed to establish a ... Framework"). (4) "joint cyber-
    incident response on critical infrastructure" — softened to raw
    "increase the cybersecurity of critical infrastructure". (5)
    "codified" → "committed to establish" (raw verb). "counter-DPRK-
    cryptocurrency-theft" reworded to the raw's "secure cryptocurrency
    and blockchain applications" + "block its cyber-enabled revenue
    generation".
    [b] ATTRIBUTION — null-actor bilateral policy declaration;
    attributing_org (White House + ROK Office of the President),
    concur/high retained. No over-attestation possible (no external
    actor is attributed for an incident). attribution_source_id points
    to the 70th-anniversary statement (the cyber carrier), correct.
    [c] DATES — start/disclosure/end 2023-04-26 all confirmed by both
    raws' JSON-LD datePublished (WD 2023-04-26T19:16:41Z; K70
    2023-04-26T21:25:41Z). Both source published_on 2023-04-26 correct.
    [d] DOCTRINE_LINKS — BOTH kept confidence: attested (the joint
    statement IS the primary doctrinal act; it states each pillar's
    strategic purpose in substance). Added inference_basis.source_quote
    (verbatim) to each and perspective: defender-response to each
