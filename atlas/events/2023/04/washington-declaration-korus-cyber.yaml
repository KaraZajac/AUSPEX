outcome_summary: |
  Biden-Yoon state-visit joint statements: the Washington
  Declaration (extended deterrence and Nuclear Consultative
  Group) and the Leaders' Joint Statement commemorating the
  70th anniversary of the 1953 US-ROK alliance. The cyber
  component of the joint statement codified a Strategic
  Cybersecurity Cooperation Framework, elevated bilateral
  counter-DPRK-cryptocurrency-theft work, and committed to
  joint disruption operations on DPRK revenue cyber.
false_flag_risk: none
summary: |
  Pre-Camp-David anchor publication for the KORUS cyber
  pillar. The Washington Declaration's headline substance
  was nuclear (extended-deterrence, NCG), but the
  parallel 70th-anniversary leaders' joint statement
  carried explicit cyber language committing both
  governments to (a) the Strategic Cybersecurity
  Cooperation Framework joint working-group format,
  (b) counter-DPRK cryptocurrency-theft and IT-worker
  sanctions coordination, and (c) joint cyber-incident
  response on critical infrastructure.

  The four-month gap between this April 2023 publication
  and the August 2023 Camp David trilateral is the
  bilateral-to-trilateral codification window — the
  Washington statements set the bilateral KORUS-cyber
  framework that Camp David then elevated to a
  US-ROK-Japan trilateral structure with Japan added as
  the third party.

  AUSPEX models this as a doctrine-publication event under
  kr/korus-cyber-cooperation with actor null; the cyber
  language in the joint statements is the doctrinal act.
