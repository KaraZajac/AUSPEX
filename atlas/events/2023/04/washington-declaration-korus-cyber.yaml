outcome_summary: |
  Biden-Yoon state-visit joint statements of 26 April 2023.
  The Washington Declaration itself is ENTIRELY nuclear
  (US extended deterrence and the new Nuclear Consultative
  Group) — it carries no cyber content. The visit's cyber
  language sits in the parallel Leaders' Joint Statement
  commemorating the 70th anniversary of the 1953 US-ROK
  alliance, in which the two Presidents "committed to
  establish a U.S.-ROK Strategic Cybersecurity Cooperation
  Framework" for deterring cyber adversaries, critical-
  infrastructure cybersecurity, cybercrime, and securing
  cryptocurrency/blockchain applications, and — expressing
  concern over DPRK illicit cyber activity funding its WMD
  programs — "committed to expanding information sharing ...
  to combat DPRK cyber threats and block its cyber-enabled
  revenue generation."
false_flag_risk: none
summary: |
  Pre-Camp-David anchor publication for the KORUS cyber
  pillar. The Washington Declaration's substance was
  wholly nuclear (extended-deterrence, NCG) and contains
  no cyber language at all; the cyber content of the
  state visit is confined to the parallel 70th-anniversary
  leaders' joint statement. In that statement both
  governments committed to (a) establish a U.S.-ROK
  Strategic Cybersecurity Cooperation Framework and use it
  to deter cyber adversaries and combat cybercrime;
  (b) secure cryptocurrency and blockchain applications
  and, concerned about DPRK illicit cyber activity funding
  its WMD programs, expand information sharing to block
  DPRK cyber-enabled revenue generation; and (c) increase
  the cybersecurity of critical infrastructure.

  Deliberately NOT claimed (the raw does not say it): the
  April 2023 statement contains no "IT worker," no
  "sanctions coordination," no "joint working-group,"
  and no "joint disruption operations" language — those
  are the substance of the later 18 August 2023 Camp
  David trilateral statement (event 2023-08/
  camp-david-trilateral-cyber), not of this bilateral act.

  The four-month gap between this April 2023 publication
  and the August 2023 Camp David trilateral is the
  bilateral-to-trilateral window — the Washington-visit
  statements set the bilateral KORUS-cyber framework that
  Camp David then elevated to a US-ROK-Japan trilateral
  structure with Japan added as the third party.

  AUSPEX models this as a documentary/policy event under
  kr/korus-cyber-cooperation with actor null; the cyber
  language in the 70th-anniversary joint statement is the
  doctrinal act.
