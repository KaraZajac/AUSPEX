outcome_summary: |
  Coordinated same-day US action against a DPRK
  crypto-laundering network. Treasury OFAC press release
  jy1435 SDN-designated THREE individuals: PRC-based
  over-the-counter (OTC) virtual-currency trader Wu Huihui
  and Hong-Kong-based OTC trader Cheng Hung Man (both under
  E.O. 13722 for material support to the Lazarus Group / to
  Wu), and Sim Hyon Sop — a Korea Kwangson Banking Corp
  (KKBC) Deputy Representative recently relocated to Dandong,
  China (under E.O. 13382; KKBC is a subsidiary of the DPRK's
  Foreign Trade Bank, which DOJ frames Sim as representing).
  The DOJ (U.S. Attorney, District of Columbia) unsealed two
  indictments charging Sim in two money-laundering
  conspiracies — one to launder proceeds of virtual-currency
  exchange hacks, one to launder DPRK IT-worker wage fraud —
  plus a third indictment charging Wu with operating an
  unlicensed money-transmitting business (over 1,500 trades,
  over $800,000). The federal indictment was returned Apr 18,
  2023 and unsealed Apr 24. OFAC states the Lazarus Group "is
  controlled by the Reconnaissance General Bureau (RGB)."
