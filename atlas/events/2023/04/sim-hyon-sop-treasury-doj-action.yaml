outcome_summary: |
  Coordinated US Treasury OFAC + DOJ action against DPRK
  Foreign Trade Bank (FTB) representative Sim Hyon Sop and
  three crypto-facilitator co-conspirators (Wu Huihui,
  Cheng Hung Man, Sun Jin) for laundering virtual-currency
  proceeds of DPRK IT-worker fraud and cyber theft.
  Treasury press release jy1435 SDN-designated all four;
  DOJ unsealed indictments out of DC and EDNY charging
  conspiracy to violate IEEPA and to commit money
  laundering. Established the OTC-broker laundering pattern
  as a parallel channel to the mixer chain.
false_flag_risk: none
campaign_id: ronin-laundering-trail
operators_named:
  - sim-hyon-sop  # DPRK FTB representative, OFAC jy1435 Apr 2023
  - wu-huihui  # OTC broker, OFAC jy1435 Apr 2023
  - cheng-hung-man  # OTC broker, OFAC jy1435 Apr 2023
  - sun-jin  # OTC broker, OFAC jy1435 Apr 2023
summary: |
  First major US government action explicitly targeting the
  off-mixer leg of the DPRK crypto-laundering pipeline. Where
  Blender (May 2022), Tornado Cash (Aug 2022), and Sinbad
  (Nov 2023) sanctions targeted the privacy-mixer
  infrastructure, the Sim Hyon Sop action attests to a
  parallel OTC-broker channel: stolen cryptocurrency funneled
  through PRC-based and Hong-Kong-based OTC traders directly
  to FTB representatives, who converted the proceeds to
  fiat-equivalent value supporting WMD program procurement.
  Companion indictments document specific dollar amounts and
  wallet addresses.
