summary: |
  US government action targeting the off-mixer OTC-broker leg
  of the DPRK crypto-laundering pipeline. Per OFAC jy1435 and
  the unsealed District of Columbia indictments, stolen
  virtual currency and DPRK IT-worker wage proceeds were
  funneled through PRC- and Hong-Kong-based over-the-counter
  traders (Wu Huihui, Cheng Hung Man, and an unknown trader
  using the moniker "live:jammychen0150" / "Chen"), who
  converted the funds to fiat and purchased goods through
  Hong-Kong front companies for the DPRK; KKBC Deputy
  Representative Sim Hyon Sop directed and received the
  proceeds (OFAC: "Since September 2021, Sim has received
  tens of millions of dollars in virtual currency"). AUSPEX
  models this as a parallel OTC-broker channel to the
  privacy-mixer chain targeted by the Blender (May 2022),
  Tornado Cash (Aug 2022), and Sinbad (Nov 2023) sanctions —
  a cross-corpus framing, not a claim of jy1435. Treasury
  invokes its standard WMD/ballistic-missile financing
  attestation; the companion DC indictments supply the
  defendant detail and Wu's ~$800k unlicensed-transmitter
  count.
