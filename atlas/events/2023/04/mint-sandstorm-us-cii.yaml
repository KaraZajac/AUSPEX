id: 2023-04/mint-sandstorm-us-cii
name: Mint Sandstorm targets US critical infrastructure
start_date: 2021-11-01  # "late 2021" per MSTIC (best-estimate day-of-month)
disclosure_date: 2023-04-18
end_date: 2022-07-01  # "mid-2022" per MSTIC — end of the US-CII targeting window
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day  # internet-facing application exploitation; rapid N-day/POC weaponization
outcome_summary: |
  Microsoft (MSTIC) observed a mature Mint Sandstorm subgroup move
  from reconnaissance to direct targeting of US critical
  infrastructure (seaports, energy companies, transit systems, and
  a major US utility and gas entity), which Microsoft assessed was
  potentially in support of retaliatory destructive cyberattacks.
  The subgroup rapidly weaponized newly disclosed N-day
  vulnerabilities and deployed custom implants (Drokbk, Soldier,
  CharmPower).
false_flag_risk: none
summary: |
  Microsoft (MSTIC) reported that a mature subgroup of Mint
  Sandstorm — an Iranian nation-state actor previously tracked as
  PHOSPHORUS, whose activity overlaps public reporting on APT35,
  APT42, Charming Kitten, and TA453 — shifted from its historical
  focus on political dissidents, activists, journalists, the
  Defense Industrial Base, and government targets toward US
  critical infrastructure. From late 2021 to mid-2022 the subgroup
  moved from reconnaissance to direct targeting of US CII including
  seaports, energy companies, transit systems, and a major US
  utility and gas entity, which Microsoft assessed was potentially
  in support of retaliatory destructive cyberattacks and likely in
  response to attacks that halted maritime traffic at an Iranian
  seaport (2020), delayed Iranian trains (2021), and crashed
  Iranian gas-station payment systems (late 2021). The subgroup
  rapidly weaponized N-day vulnerabilities in internet-facing
  applications — Log4Shell (CVE-2021-44228 / CVE-2021-45046),
  Microsoft Exchange ProxyShell, IBM Aspera Faspex (CVE-2022-47986),
  and Zoho ManageEngine (CVE-2022-47966, exploited the same day the
  POC became public) — then used a custom PowerShell discovery
  script, Impacket for lateral movement, and SSH-tunnel or
  webhook.site C2 with GitHub-hosted domain rotators. Custom
  post-exploitation tooling included the Drokbk and Soldier .NET
  implants and the CharmPower modular PowerShell backdoor
  (delivered via template-injection phishing). In one attack chain
  the objective was theft of the Active Directory database to
  harvest and reuse valid credentials. Microsoft assesses Mint
  Sandstorm is associated with the Islamic Revolutionary Guard
  Corps (IRGC); the US Treasury sanctioned elements of the group in
  2022 citing IRGC sponsorship.
