qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-02
  level: full
  notes: |
    Audited vs the RAW MSTIC blog "Nation-state threat actor Mint
    Sandstorm refines tradecraft to attack high-value targets"
    (2023-04-18). Raw snapshot on disk re-verified: sha256
    1354cd7f…78b3d0af (317,856 bytes) — matches the source record's
    content_sha256; hash re-verified 2026-07-02. Single-source
    event; source is a first-party tier-1 vendor original
    investigation (own telemetry + full IOC table).

    [a] FACTS — heavy de-fabrication. STRIPPED six claims carried by
    NO cited source (grep of the raw = 0 hits each):
      • "Atlassian Confluence OGNL CVE-2022-26134" — not in source
        (no "Confluence"/"Atlassian"/"OGNL"/"CVE-2022-26134"). The
        real N-days MSTIC names are Log4Shell (CVE-2021-44228 /
        CVE-2021-45046), ProxyShell, IBM Aspera Faspex
        (CVE-2022-47986), Zoho ManageEngine (CVE-2022-47966). Fixed
        the CVE list and ADDED the omitted ManageEngine CVE (MSTIC's
        flagship same-day-exploitation example: "began exploiting
        CVE-2022-47966 in Zoho ManageEngine on January 19, 2023, the
        same day the POC became public").
      • "POWERSTAR" — not in source; MSTIC names only CharmPower.
        Removed the CharmPower/POWERSTAR slash-equation.
      • "custom DLL side-loading via signed binaries" — not in
        source (no "side-load"/"DLL side"/"signed binar").
      • "web shells on internet-facing servers" — not in source
        (no "web shell"/"webshell").
      • "Tor / DNS-tunneled C2" — not in source (no "Tor"/"DNS
        tunnel"). Actual C2 per MSTIC: SSH tunnel (attack chain 1),
        webhook.site (attack chain 2), GitHub-hosted domain rotators
        for Drokbk/Soldier, OneDrive for template-injection payloads.
      • "overlaps ... with the contemporaneous CyberAv3ngers
        Unitronics PLC campaign" — not in source (no "CyberAv3nger"/
        "Unitronics"/"PLC") AND anachronistic: the Unitronics
        campaign was Nov–Dec 2023, ~7 months AFTER this 2023-04-18
        report, and is a different (IRGC-CEC) cluster. Removed.
      KEPT (all verbatim-supported): shift from dissident/policy
      surveillance to US CII; APT35/APT42/Charming Kitten/TA453
      overlap; rapid N-day weaponization; Log4Shell, ProxyShell,
      Aspera Faspex, ManageEngine; custom PowerShell discovery
      script; Impacket lateral movement; SSH-tunnel/webhook.site C2;
      GitHub domain rotators; Drokbk + Soldier .NET implants;
      CharmPower modular PowerShell backdoor via template injection;
      AD-database theft to harvest valid credentials. Rephrased
      "credential dumping" → MSTIC's own "theft of the Active
      Directory database" (the term "credential dumping" is not in
      the source, but the substance is).
    [a-targets] REMOVED sectors/defense/contractor (sector
      inflation): MSTIC's CII-campaign list is "seaports, energy
      companies, transit systems, and a major US utility and gas
      entity" — the Defense Industrial Base appears only once, in the
      general "Who is Mint Sandstorm?" historical-profile paragraph,
      NOT as a target of this late-2021→mid-2022 CII campaign. Kept
      transport/maritime (seaports), energy (energy companies +
      utility/gas), transport (transit systems). Summary keeps DIB
      only as a historical target descriptor, not a campaign target.
    [b] ATTRIBUTION — MSTIC explicitly NAMES THE IRGC (not merely
      "Iranian"): "Microsoft assesses that Mint Sandstorm is
      associated with an intelligence arm of Iran's military, the
      Islamic Revolutionary Guard Corps (IRGC), an assessment ...
      corroborated by ... Mandiant, Proofpoint, and SecureWorks. In
      2022, the US Department of Treasury sanctioned elements of Mint
      Sandstorm ... citing sponsorship from the IRGC." So high
      confidence is correct (firm assessment, multi-source
      corroboration, Treasury sanctions) — NOT over-attestation.
      Actor_id ir/irgc/apt35 resolves (atlas/actors/ir/apt35.yaml).
    [c] DATES — corrected two conflations. start_date 2022-10-01 →
      2021-11-01: 2022-10-01 falls OUTSIDE MSTIC's stated CII window;
      MSTIC says the targeting ran "From late 2021 to mid-2022."
      end_date 2023-04-18 → 2022-07-01: the old value conflated
      op-end with disclosure; MSTIC bounds the CII campaign at
      mid-2022. disclosure_date 2023-04-18 confirmed = blog date
      ("April 18, 2023"). Source published_on 2023-04-18 correct.
    [d] DOCTRINE_LINKS — both kept at strongly_inferred; NOT upgraded
      to attested despite MSTIC stating a retaliatory purpose,
      because the purpose language is hedged ("potentially in support
      of", "likely in response to") — below the attested bar of an
      explicit, unhedged purpose statement. attesting_source_id
      stays null (correct for non-attested). Added inference_basis
      (signals + ruled_out) to both, quoting the raw; enriched both
      reasoning strings to the source's retaliation framing.
    [e] ATTRIBUTION_LEVEL — was MISSING; set named-unit. MSTIC names
      the sponsoring service (IRGC), which is more specific than
      nation and than named-actor (group+nation); mirrors the Agrius
      worked example's rule ("service named → named-unit").
    [f] ACTOR_ID — ir/irgc/apt35 resolves to atlas/actors/ir/apt35.yaml
