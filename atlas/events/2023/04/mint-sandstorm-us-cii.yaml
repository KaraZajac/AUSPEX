initial_vector: n-day  # edge-device exploitation; rapid CVE weaponization
outcome_summary: |
  Persistent access and intelligence collection against US
  seaports, energy, transit, and defense industrial base.
  Microsoft documented rapid weaponization of newly-disclosed
  CVEs by Mint Sandstorm / APT35.
false_flag_risk: none
summary: |
  Notable shift toward US CII targeting by an actor cluster
  historically focused on policy / dissident surveillance.
  Microsoft documents Mint Sandstorm / APT35 / Charming Kitten
  rapidly weaponizing newly disclosed n-days (Log4Shell
  CVE-2021-44228, Atlassian Confluence OGNL CVE-2022-26134,
  Microsoft Exchange ProxyShell, IBM Aspera Faspex) against
  US seaports, energy utilities, transit operators, and the
  defense industrial base. Post-exploitation tooling includes
  the CharmPower / POWERSTAR PowerShell-based backdoor, the
  Drokbk .NET implant, custom DLL side-loading via signed
  binaries, web shells on internet-facing servers, valid
  credentials harvested via credential dumping, and Tor / DNS-
  tunneled C2. The pre-positioning pattern echoes broader IRGC
  asymmetric-warfare investment and overlaps in tradecraft with
  the contemporaneous CyberAv3ngers Unitronics PLC campaign.
