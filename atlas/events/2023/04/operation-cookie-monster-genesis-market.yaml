id: 2023-04/operation-cookie-monster-genesis-market
name: Operation Cookie Monster — Genesis Market criminal-marketplace takedown
start_date: 2023-04-04
disclosure_date: 2023-04-05
end_date: 2023-04-05
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  International law-enforcement operation led by the FBI and Dutch
  National Police, supported by Europol, that seized Genesis
  Market — one of the largest stolen-credential and browser-
  fingerprint criminal marketplaces. At time of seizure Genesis
  was advertising approximately 2 million stolen identities
  ("bots") including session cookies, browser-fingerprint
  packages, and infostealer-log credentials. Operation Cookie
  Monster resulted in 119 arrests across 17 countries and
  208 property searches. The seizure splash page was published
  at genesis.market on April 5, 2023.
quantified_impact:
  stolen_identities_for_sale: 2000000
  arrests: 119
  countries_involved: 17
  searches: 208
false_flag_risk: none
summary: |
  Genesis Market was a foundational infostealer-log market
  upstream of the 2024 Snowflake-customer (UNC5537) intrusion
  pattern — the same infostealer-log economy persists today on
  alternative markets (Russian Market, 2easy) after the Genesis
  takedown. AUSPEX includes the takedown event as criminal-
  baseline documentary: the entire credential-broker ecosystem
  is opportunistic financial-crime infrastructure with no
  doctrinal targeting, distinguishing it cleanly from the
  state-aligned APT ecosystem.
