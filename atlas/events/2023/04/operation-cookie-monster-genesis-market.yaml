initial_vector: unknown
outcome_summary: |
  International law-enforcement takedown of Genesis Market, an
  online criminal marketplace that sold stolen account
  credentials. Europol described it as "one of the most dangerous
  marketplaces selling stolen account credentials to hackers
  worldwide"; Eurojust called it, since its inception in 2018,
  "one of the largest facilitators of cybercrime". The market's
  main commodity was digital identities sold as "bots" — packages
  of data harvested from malware-infected devices (fingerprints,
  cookies, saved logins and autofill form data), obtained through
  malware or account-takeover attacks. The headline figure was the
  identities of over 2 million people; over 1.5 million bots were
  listed at the time of the takedown. The operation — led by the
  U.S. FBI and the Dutch National Police (Politie), with a command
  post at Europol's headquarters and judicial coordination by
  Eurojust — ran an action day on 4-5 April 2023 and produced 119
  arrests, 208 property searches and 97 knock-and-talk measures;
  the operation involved 17 countries. Genesis Market's
  infrastructure and main domains were seized and a law-enforcement
  seizure page replaced the site.
