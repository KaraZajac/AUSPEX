summary: |
  Genesis Market sold "bots" — bundles of stolen credentials,
  cookies, browser fingerprints and session data harvested from
  malware-infected devices — and sat within the credential-broker /
  stealer-log criminal economy that supplies initial access to
  downstream fraud and intrusion actors. AUSPEX includes the
  takedown as criminal-baseline documentary: this ecosystem is
  opportunistic financial-crime infrastructure with no doctrinal
  targeting, which distinguishes it cleanly from the state-aligned
  APT ecosystem — hence doctrine_links []. The broader
  upstream-of-later-intrusions framing (e.g. the 2024 stealer-log
  Snowflake-customer campaign) and named successor markets are
  AUSPEX analytical context, not claims carried by the cited
  law-enforcement primaries.
