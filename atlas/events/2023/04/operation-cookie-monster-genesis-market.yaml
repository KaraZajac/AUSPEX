  notes: |
    Audited vs the Europol primary "Takedown of notorious hacker
    marketplace ... Genesis Market" (raw snapshot 2d199e72…c19ec0d7,
    44,496 bytes) and the Eurojust primary "... Operation Cookie
    Monster" (raw snapshot 9c11abc5…6e061971, 157,484 bytes). NOT a
    phantom: the Europol URL resolves to the genuine article (body
    carried in the page's JSON data island); Eurojust added as a
    second snapshotted primary because it carries the operation name.

    [a] FACTS — corrected to source-carried wording. Europol verbatim:
    "one of the most dangerous marketplaces selling stolen account
    credentials to hackers worldwide"; "action day on 4 April";
    "119 arrests, 208 property searches and 97 knock and talk
    measures ... led by the U.S. Federal Bureau of Investigation (FBI)
    and the Dutch National Police (Politie), with a command post set
    up at Europol's headquarters"; bots gave access to "fingerprints,
    cookies, saved logins and autofill form data" from devices
    infected "through malware or account takeovers attacks"; "over
    1.5 million bots listed"; title "identities of over 2 million
    people". Eurojust verbatim: "Since its inception in 2018, Genesis
    Market was one of the largest facilitators of cybercrime";
    "referred to by law enforcement agencies as Operation Cookie
    Monster, on 4-5 April, more than 100 suspects were arrested and
    200 property searches were conducted in 13 countries"; "As of
    today, visitors to the Genesis Market website see this page"
    (seizure page). CORRECTIONS: (1) "one of the largest
    stolen-credential and browser-fingerprint criminal marketplaces"
    → the sources' own framing ("most dangerous marketplace selling
    stolen account credentials" / "one of the largest facilitators of
    cybercrime"). (2) "session cookies, browser-fingerprint packages,
    and infostealer-log credentials" → the sources' list
    "fingerprints, cookies, saved logins and autofill form data ...
    through malware or account-takeover attacks" ("infostealer-log"
    is not the primaries' word; retained only as analytical framing in
    `summary`, flagged as such). (3) Distinguished the two official
    figures that were conflated: "over 2 million people" (Europol
    title, headline identities) vs "over 1.5 million bots" listed at
    takedown (Europol body); noted cross-source variance (Eurojust:
    "approximately 460,000 computer devices" at takedown). (4)
    "Operation Cookie Monster" name — absent from the Europol release;
    now carried by the added Eurojust primary (title + body) and the
    DOJ primary. (5) Splash-page claim kept but corrected: the seizure
    page is corroborated (Europol hero image Splash_page-4_5_2023.jpg;
    Eurojust "visitors to the Genesis Market website see this page") —
    reworded off the unsupported "published at genesis.market on April
    5" specific. Added Eurojust-carried "97 knock-and-talk measures"
    and the 17-countries operation framing (arrests/searches in 13
    countries per Eurojust/DOJ). quantified_impact: added
    bots_listed 1,500,000 and knock_and_talk_measures 97;
    stolen_identities_for_sale 2,000,000 retained (Europol title).

    [b] ATTRIBUTION — converted `attributions: []` → a single
    null-actor law-enforcement counter-action entry (directionality
    model, per the RaidForums specimen): actor_id null; attributing_org
    "FBI + Dutch National Police (Politie) + Europol + Eurojust"
    (all named across the two primaries); confidence high / concur
    (govt announcement, no attribution ambiguity); no attribution_level
    (no attacker actor). The prior empty list understated this as an
    actorless documentary rather than a counter-action.

    [c] DATES — start_date 2023-04-04 = the "action day on 4 April"
    (Europol); disclosure_date/end_date 2023-04-05 = the 4-5 April
    action window and the release date (both primaries dated 05 April
    2023). Europol published_on 2023-04-05 correct; new Eurojust
    source published_on 2023-04-05 (page: "05 April 2023").

    [d] DOCTRINE_LINKS [] — correct and retained; a criminal-
    marketplace takedown carries no state strategic doctrine (matches
    the RaidForums criminal-baseline specimen). Not invented — no
    us/ncs-2023 disrupt-dismantle link forced, as the cited primaries
    are EU-agency releases that do not frame this in US-doctrine terms.

    [e] ATTRIBUTION_LEVEL — intentionally unset (null-actor counter-
    action; no attacker actor to specify).

    [f] ACTOR_ID null — resolves fine (counter-action); no actor file
    needed, no actor flag.

    TARGETS — removed `sectors/finance/payments (primary)` → `targets:
    []`. Single-sector "primary" was inflation/mis-role: Genesis sold
    general account credentials (email, bank, social); the DOJ
    enumerates finance, critical-infrastructure AND government
    credentials, and the AUSPEX target model records victims of the
    OPERATION (here the law-enforcement counter-action), not of the
    marketplace's underlying crime — so `[]` per the RaidForums/qakbot
    criminal-takedown convention.

    SOURCING — event was single-source on Europol. Added
    eurojust/2023-04-05_genesis-market-cookie-monster as a second
    SNAPSHOTTED primary (carries the operation name + since-2018 +
    the seizure page). Also wired in the pre-existing but orphaned
    doj/2023-04-05_genesis-market-edmi-takedown as a CORROBORATING
    (non-load-bearing) primary; its live URL is Akamai bot-walled
    (JS interstitial, not article) so it carries NO snapshot/hash.
    Every retained claim is carried by a snapshotted primary (Europol
    or Eurojust) → level: full. DOJ-only enrichments (March-2018
    inception, ~80M credentials) were deliberately NOT asserted in the
    outcome_summary to avoid resting a claim on the un-snapshottable
    source. RESIDUAL: official device/identity counts vary across
    sources (2M people / 1.5M bots / 460K devices) — disclosed above,
    not a defect.
