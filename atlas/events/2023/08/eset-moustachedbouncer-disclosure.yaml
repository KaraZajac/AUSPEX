id: 2023-08/eset-moustachedbouncer-disclosure
name: ESET discloses MoustachedBouncer — Belarusian ISP-position diplomatic surveillance
start_date: 2014-01-01
disclosure_date: 2023-08-10
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds  # ISP-position AITM rather than phishing
outcome_summary: |
  ESET researcher Matthieu Faou published a long-form analysis
  of MoustachedBouncer, a Belarusian-aligned cluster that
  intercepts target traffic at the Belarusian ISP layer to
  deliver fake-Windows-Update payloads to foreign embassy staff
  stationed in Belarus. ESET documented operations against
  embassies of at least four countries (including European and
  South Asian missions), use of the NightClub and Disco
  implants, and a tradecraft pattern consistent with state-
  authorized ISP-position adversary-in-the-middle.
false_flag_risk: none
summary: |
  Among the most operationally distinctive Belarusian cyber
  disclosures: ISP-position AITM tradecraft is rare globally
  (the Russian Turla and Iranian Crimson Sandstorm clusters
  are the other public exemplars). The ESET attribution
  characterizes Belarusian state direction as the necessary
  precondition for the ISP-layer position; no public Belarusian
  attestation exists.
attributions:
  - actor_id: by/kgb/moustachedbouncer
    attributing_org: ESET (Matthieu Faou)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-08-10
    attribution_source_id: eset/2023-08-10_moustachedbouncer-isp-position
doctrine_links:
  - doctrine_id: by/concept-info-security-2019
    pillar_id: by/concept-info-security-2019/regime-stability-monitoring
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Surveillance of foreign diplomatic staff inside Belarus
      fits the regime-stability and counterintelligence framing
      the doctrine licenses; the ISP-position position requires
      state authority unique to the Belarusian KGB / SORM-style
      apparatus.
    contested: false
    analyst: claude
targets:
