    DOCUMENTARY/POLICY meta-event (actor_id null — a trilateral
    leaders' joint statement, no intrusion). Audited vs 2 raw
    snapshots. Sources (sha256 first8…last8 · bytes): "The Spirit
    of Camp David" joint statement (bidenwhitehouse.archives.gov,
    primary) 173651ce…acd612b2 · 151,045 (snapshot added this
    audit); Wikipedia "American–Japanese–Korean trilateral pact"
    (tertiary) 5043c4a4…eb32eca2 · 314,297 (snapshot added this
    audit).

    [a] FACTS — four embellishments STRIPPED against the raw
    statement text:
    (1) "cryptocurrency theft" — the words "cryptocurrency"/
    "crypto" appear 0 times in the statement. Its actual language
    is "combat DPRK cyber threats and block its cyber-enabled
    sanctions evasion" and "the DPRK's illicit cyber activities
    that fund its unlawful WMD and ballistic missile programs."
    Reworded to the verbatim source phrasing; cryptocurrency/
    IT-worker revenue kept only as clearly-marked AUSPEX context
    for what the "sanctions evasion" phrase refers to in practice.
    (2) proper-noun "Trilateral Cyber Cooperation Working Group" —
    the statement says only "a new trilateral working group ... to
    combat DPRK cyber threats"; it never coins that title.
    Described functionally instead.
    (3) the three "pillars of the cyber working group"
    (cryptocurrency-theft + IT-worker schemes; supply-chain for
    "semiconductors, AI, cloud") — NOT in the statement ("IT
    worker" 0 hits; "crypto" 0 hits). The statement's supply-chain
    cooperation (semiconductors, batteries) is a SEPARATE
    economic-security track, not a component of the cyber working
    group. Reframed as AUSPEX's own doctrine decomposition.
    (4) AA24-207A paragraph DELETED. As written it was factually
    wrong on multiple points and cited a source not in sources[]:
    the July 2024 AA24-207A advisory is co-signed by US
    (CNMF/CISA/DC3/NSA + FBI), ROK (NIS + National Police Agency),
    and UK NCSC — NOT "US CISA/FBI/NSA and ROK NIS/DCC/KNPA" (per
    the audited cisa/2024-07-25_aa24-207a source: 0 occurrences of
    "counterintelligence"/DCC; ROK police body is NPA, not KNPA).
    Critically, JAPAN IS NOT A SIGNATORY, so "the first joint Five
    Eyes + ROK + Japan public attribution under the trilateral
    banner" is false — the advisory is a US-ROK-UK product and
    cannot be the operational expression of the US-ROK-JAPAN Camp
    David framework. Removed rather than corrected because the
    corrected fact undercuts the claim it was making.
    [b] ATTRIBUTION — null-actor documentary (three governments
    stating their own policy). attributing_org refined from "US
    Department of State" to "Governments of Japan, the Republic of
    Korea, and the United States (trilateral leaders' joint
    statement)" to match the document's own authorship — the
    canonical/archived primary is a White House briefing-room
    release (bidenwhitehouse.archives.gov/.../2023/08/18/...),
    mirrored by State, ROK MoFA, and Japan MoFA. high / concur
    retained. No external actor attributed → no over-attestation
    possible.
    [c] DATES — start/disclosure/end 2023-08-18 all correct: the
    summit and the statement release are both 18 Aug 2023 (verified
    against the archive URL path .../2023/08/18/... and byline).
    Source published_on 2023-08-18 confirmed.
