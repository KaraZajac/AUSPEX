outcome_summary: |
  The 18 August 2023 US-ROK-Japan trilateral summit at Camp
  David produced "The Spirit of Camp David" joint statement.
  Its cyber provision announces "a new trilateral working
  group ... to combat DPRK cyber threats and block its
  cyber-enabled sanctions evasion," framed by concern over
  "the DPRK's illicit cyber activities that fund its unlawful
  WMD and ballistic missile programs." Supply-chain resilience
  (semiconductors, batteries), real-time missile-warning
  data-sharing, and economic security are separate, parallel
  summit tracks — not components of the cyber working group.
false_flag_risk: none
summary: |
  Doctrinal landmark for the ROK alliance-integration leg.
  Pre-2023, US-ROK and US-Japan cyber cooperation ran as
  parallel bilateral channels with limited trilateral
  coordination; the 18 August 2023 Camp David summit
  formalised a trilateral cyber track at head-of-state level.

  The cyber commitment in "The Spirit of Camp David" joint
  statement is a single, narrowly-scoped provision: the
  leaders announce "a new trilateral working group ... to
  combat DPRK cyber threats and block its cyber-enabled
  sanctions evasion," motivated by concern over "the DPRK's
  illicit cyber activities that fund its unlawful WMD and
  ballistic missile programs." The statement does not coin a
  proper-noun "Trilateral Cyber Cooperation Working Group,"
  does not use the word "cryptocurrency," and does not
  enumerate sub-pillars.

  AUSPEX tags the event to the kr/korus-cyber-cooperation
  doctrine; that doctrine's pillars (joint attribution;
  counter-DPRK-revenue; supply-chain security) are AUSPEX's
  own analytic decomposition of the wider alliance channel,
  not a taxonomy present in this summit statement. In
  practice the "cyber-enabled sanctions evasion" the working
  group targets is dominated by DPRK cryptocurrency theft and
  overseas IT-worker revenue — well-documented elsewhere but
  not named in the Camp David text itself.
