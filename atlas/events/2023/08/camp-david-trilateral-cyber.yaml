initial_vector: unknown
outcome_summary: |
  US-ROK-Japan trilateral summit at Camp David produced the
  "Spirit of Camp David" joint statement, codifying a
  Trilateral Cyber Cooperation Working Group on DPRK
  cryptocurrency theft and supply-chain security, alongside
  parallel commitments on missile-defense, technology, and
  economic security.
false_flag_risk: none
summary: |
  Doctrinal landmark for the ROK alliance-integration leg.
  Pre-2023, US-ROK and US-Japan cyber cooperation operated
  as parallel bilateral channels with limited trilateral
  coordination; the August 2023 summit formalised the
  trilateral cyber framework at head-of-state level.

  Pillars of the cyber working group: (a) joint attribution
  and threat-intelligence sharing on DPRK and other state
  clusters; (b) coordinated counter-DPRK-revenue operations
  including cryptocurrency-theft and IT-worker schemes;
  (c) supply-chain security for critical technologies
  (semiconductors, AI, cloud).

  The framework's most visible operational expression as of
  the AUSPEX retrieval date (May 2026) is the July 2024
  AA24-207A Andariel advisory co-signed by US CISA / FBI /
  NSA and ROK NIS / DCC / KNPA — the first joint Five Eyes
  + ROK + Japan public attribution under the trilateral
  banner.
