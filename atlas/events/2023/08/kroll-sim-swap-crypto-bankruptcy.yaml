id: 2023-08/kroll-sim-swap-crypto-bankruptcy
name: SIM-swap of Kroll employee exposes FTX / BlockFi / Genesis creditor data
start_date: 2023-08-19
disclosure_date: 2023-08-25
end_date: 2023-08-25
incident_type:
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Bankruptcy administrator Kroll disclosed that an employee
  was SIM-swapped on August 19 2023, exposing PII (names,
  addresses, claim amounts) of creditors across the FTX,
  BlockFi, and Genesis Global crypto-bankruptcy estates.
  The breached data was subsequently used by attackers to
  conduct targeted phishing of crypto-creditor victims with
  fake "claims-process" lures. Canonical case of SIM-swap
  targeting an enterprise employee to reach downstream
  customer data rather than the victim's personal accounts.
false_flag_risk: none
summary: |
  The Kroll SIM-swap is the canonical case of using telco-
  social-engineering to compromise a third-party service
  provider with privileged access to high-value PII.
  AUSPEX classifies as criminal-baseline.
