id: 2023-08/kroll-sim-swap-crypto-bankruptcy
name: SIM-swap of Kroll employee exposes FTX / BlockFi / Genesis creditor data
start_date: 2023-08-19
disclosure_date: 2023-08-25
end_date: 2023-08-25
incident_type:
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Bankruptcy administrator Kroll disclosed that an employee's
  T-Mobile number was SIM-swapped on August 19 2023; the
  threat actor used the hijacked number to bypass MFA, take
  over the employee's account, and access files in Kroll's
  cloud systems containing personal information of bankruptcy
  claimants across the FTX, BlockFi, and Genesis Global
  crypto-bankruptcy estates — per the Genesis claimant notice,
  full names, physical addresses, email addresses, and debtor
  claim details. Kroll said the impact was limited to those
  three estates with no evidence of lateral movement to other
  systems. The exposed data was subsequently used to phish
  crypto-creditor victims with fake FTX "claims / withdrawal"
  lures aimed at stealing wallet seed phrases. Canonical case
  of SIM-swap targeting an enterprise employee to reach
  downstream customer data rather than the victim's personal
  accounts.
false_flag_risk: none
summary: |
  The Kroll SIM-swap is the canonical case of using telco-
  social-engineering to compromise a third-party service
  provider with privileged access to high-value PII.
  AUSPEX classifies as criminal-baseline.
