initial_vector: n-day
false_flag_risk: none
summary: |
  MSTIC publicly disclosed Flax Typhoon, a China-based actor, conducting living-off-the-land espionage and pre-positioning against Taiwanese organizations, naming government agencies, education, critical manufacturing, and information-technology victims (with a few in Southeast Asia, North America, and Africa). Initial access was achieved by exploiting known vulnerabilities in public-facing VPN, web, Java, and SQL servers and deploying web shells such as China Chopper. Persistence and lateral movement relied on RDP, the SoftEther VPN client, Sticky Keys abuse, Mimikatz credential dumping, WMI, and PowerShell. Microsoft assessed the actor maintained quiet, long-term access consistent with intelligence collection.
