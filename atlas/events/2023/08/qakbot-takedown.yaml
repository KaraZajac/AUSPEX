id: 2023-08/qakbot-takedown
name: Operation Duck Hunt — Qakbot botnet takedown
start_date: 2023-08-25
disclosure_date: 2023-08-29
end_date: 2023-08-29
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  FBI-led international operation (France / Germany / Netherlands /
  Romania / Latvia / UK partners) seized 52 servers across multiple
  jurisdictions and obtained court authorization to push a
  remediation tool to ~700,000 infected machines via Qakbot's own
  C2 channel. The tool uninstalled Qakbot from victim systems and
  reported counts back to FBI. USD 8.6M in cryptocurrency seized.
  Operation conducted under the District of Central California.
false_flag_risk: none
summary: |
  The "self-uninstall pushed through court-authorized access to
  the botnet's own C2" pattern — first used at scale against
  Emotet (Operation Ladybird Jan 2021), refined here against
  Qakbot. Pikabot emerged within months with operationally
  contiguous tradecraft; operator continuity is widely assessed.
