id: 2023-08/qakbot-takedown
name: Operation Duck Hunt — Qakbot botnet takedown
start_date: 2023-08-29  # was 2023-08-25 (unsourced onset); neither cited source dates an earlier operational start — DOJ release is 2023-08-29 and describes the takedown as active/ongoing as of that date
disclosure_date: 2023-08-29
end_date: 2023-08-29
incident_type:
  - law-enforcement  # counter-action meta-type: FBI/DOJ-led court-authorized takedown (Central District of California)
  - disruption
initial_vector: unknown
outcome_summary: |
  FBI-led multinational operation (France / Germany / Netherlands /
  Romania / Latvia / UK partners) to disrupt the Qakbot botnet and
  take down its infrastructure. The FBI gained access to Qakbot
  infrastructure, identified over 700,000 infected computers
  worldwide (more than 200,000 in the United States) and — under
  court authorization — redirected Qakbot traffic through
  FBI-controlled servers that instructed infected machines to
  download a law-enforcement uninstaller via the botnet's own C2,
  untethering them from Qakbot and preventing further
  Qakbot-delivered malware. USD 8.6M in cryptocurrency in illicit
  profits was seized. The U.S. effort was run out of the Central
  District of California; Europol / Eurojust coordinated the
  European partners.
false_flag_risk: none
summary: |
  The "self-uninstall pushed through court-authorized access to
  the botnet's own C2" pattern — first used at scale against
  Emotet (Operation Ladybird Jan 2021), refined here against
  Qakbot. Pikabot emerged within months with overlapping code and
  infrastructure; operator continuity is assessed but not
  vendor-consensus.
