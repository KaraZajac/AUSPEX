    [a] FACTS — corrected 3 unsourced/embellished claims, kept the sourced core:
      • REMOVED "seized 52 servers across multiple jurisdictions": the phrase
        "52 server(s)" is ABSENT from both raws (grep-confirmed). DOJ's only
        server references are "servers controlled by the FBI" (the redirect
        sinkhole, not a seizure count) and an unrelated Related-Content sidebar
        ("39 domains and their associated servers", a different Pakistan case);
        Europol says only that LE "detected servers infected with Qakbot in
        almost 30 countries" (geographic spread of infected hosts, not a seizure
        count). Replaced with the sourced claim "take down its infrastructure"
        (DOJ) / "taken down the infrastructure of the Qakbot malware" (Europol).
      • REMOVED "reported counts back to FBI": no "report"/"count" token in the
        DOJ raw. DOJ's actual uninstaller description: "This uninstaller was
        designed to untether the victim computer from the Qakbot botnet,
        preventing further installation of malware through Qakbot." Rewrote to that.
      • FIXED "District of Central California" -> "Central District of California"
        (DOJ verbatim: "U.S. Attorney Martin Estrada for the Central District of
        California").
      • VERIFIED + retained: ~700,000 infected computers (DOJ "identify over
        700,000 computers worldwide, including more than 200,000 in the United
        States"; Europol "infected over 700 000 computers worldwide") — added the
        sourced "200,000 in the United States"; court-authorized uninstaller
        pushed via the botnet's own C2 (DOJ "redirect Qakbot botnet traffic to and
        through servers controlled by the FBI, which in turn instructed infected
        computers … to download a file created by law enforcement that would
        uninstall the Qakbot malware"); USD 8.6M crypto seized (DOJ "seizure of
        approximately $8.6 million in cryptocurrency"; Europol corroborates "nearly
        EUR 8 million in cryptocurrencies"); 7-nation partnership FR/DE/NL/UK/RO/
        LV/US (both raws, verbatim). No figure embellishment remains.
      • summary Pikabot line softened to match the actor file (criminal/qakbot):
        "overlapping code and infrastructure; operator continuity assessed but not
        vendor-consensus" (actor file: "vendors disagree … whether to treat as the
        same operator cluster"). The Emotet/Operation-Ladybird (Jan 2021) and
        Pikabot lines are cross-event analytical synthesis (corpus event
        2021-01/emotet-operation-ladybird + actor criminal/qakbot), NOT carried by
        the two Qakbot LE sources — flagged, retained as hedged analysis.

    [b] ATTRIBUTION — DOJ+FBI+Europol / high / concur-with-caveat retained (matches
