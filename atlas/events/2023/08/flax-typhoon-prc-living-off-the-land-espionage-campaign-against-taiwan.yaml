id: 2023-08/flax-typhoon-prc-living-off-the-land-espionage-campaign-against-taiwan
name: "Flax Typhoon (PRC) living-off-the-land espionage campaign against Taiwanese organizations"
start_date: 2023-08-24
incident_type:
  - intrusion
  - espionage
initial_vector: n-day
false_flag_risk: none
summary: |
  Microsoft (MSTIC) detailed an intrusion campaign by Flax Typhoon, a PRC-based actor, that primarily targeted Taiwanese government agencies, education, critical manufacturing, and information-technology organizations (with some victims in Southeast Asia, North America, and Africa). The actor gained initial access by exploiting known vulnerabilities in public-facing VPN, web, Java, and SQL servers, dropping web shells such as China Chopper for remote code execution. It then established persistence via RDP, the SoftEther VPN client, and Sticky Keys, using living-off-the-land techniques and tools including Metasploit, Juicy/BadPotato, Mimikatz, WMI, and PowerShell. Microsoft observed access maintained for credential and intelligence collection rather than data theft at time of reporting.
