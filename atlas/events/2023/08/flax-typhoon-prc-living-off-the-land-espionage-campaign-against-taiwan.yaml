    notes: "Microsoft names the campaign actor (Flax Typhoon, overlaps ETHEREAL PANDA) and locates it in China ('a nation-state actor based out of China'), but does NOT name the MSS or any specific Chinese service. Attribution is nation-level (China); the cn/mss actor placement is NOT supported by this source — see qc.notes."
