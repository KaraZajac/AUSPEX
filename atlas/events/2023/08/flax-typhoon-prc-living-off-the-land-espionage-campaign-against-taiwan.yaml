qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-24
  level: full
  notes: |
    Audited vs Microsoft MSTIC blog (raw snapshot captured + sha256). Publish date 2023-08-24
    confirmed (article:published_time 2023-08-24T16:30Z). FACTS ALL VERIFIED against the raw:
    living-off-the-land + LOLBins ✓; near-exclusive Taiwan targeting of government, education,
    critical-manufacturing, IT, with some victims in SE Asia / North America / Africa ✓; initial
    access via known vulns in public-facing VPN/web/Java/SQL servers + China Chopper web shell ✓;
    Metasploit, Juicy/BadPotato, Mimikatz, SoftEther VPN, RDP (NLA-disabled) + Sticky Keys
    (sethc.exe), WMIC/PowerShell ✓; "credential and intelligence collection rather than data
    theft" ✓ ("discovery and credential access activities do not appear to enable further
    data-collection and exfiltration objectives ... Microsoft has not observed [exfiltration]").
    ATTRIBUTION: Microsoft names ONLY "China" — "a nation-state actor based out of China" /
    "based in China"; it does NOT name the MSS, Ministry of State Security, or any service (the
    only "MSS" string in the page is the MSSQLSERVER service account). Set attribution_level:
    nation accordingly. Doctrine link kept strongly_inferred (Microsoft states only the proximate
    "likely intention of performing espionage"; the cn/taiwan-reunification/taiwan-island-collection
    reading triangulates from exclusive Taiwan targeting + actor mission, not a stated purpose —
    so attesting_source_id stays null, NOT attested). No corrections to facts/targets were needed.
    ACTOR CONSISTENCY — FLAGGED: the shared actor cn/mss/flax-typhoon asserts a cn/mss (MSS)
    placement, but THIS source supports only China-nexus, not the MSS. The actor record's own
    sources are Treasury (2025) + FBI (2024), not Microsoft; the cn/mss placement is unsourced from
    this event's evidence. Did NOT re-home the shared actor; routed to a follow-up actor-audit.
    RESOLVED by the follow-up actor-audit (2026-06-24, claude-opus-4.8/max): Treasury (jy2769) and
    FBI (Wray/Aspen) both name only a "Chinese state-sponsored"/"Chinese government-sponsored" nexus
    (FBI's "Chinese government security agencies" is a generic plural), NEITHER names the MSS — so
    the actor was demoted cn/mss/flax-typhoon → cn/unscoped/flax-typhoon and this event's actor_id
    was FK-updated to match.
