    [a] FACTS — all load-bearing claims carried. Verbatim DOJ (archive
    capture): "a Russian national and a Washington man were charged today
    with conspiracy to commit money laundering, conspiracy to commit
    sanctions violations, and conspiracy to operate an unlicensed money
    transmitting business"; "Roman Storm, 34, of Auburn, Washington, and
    Roman Semenov, 49, of Russia, created, operated, and promoted Tornado
    Cash, a cryptocurrency mixer that facilitated more than $1 billion in
    money laundering transactions, and laundered hundreds of millions of
    dollars for the Lazarus Group, the sanctioned North Korean cybercrime
    organization"; "Storm was arrested today in the state of Washington";
    money-laundering + IEEPA counts carry a 20-yr max, the unlicensed
    money-transmitting count a 5-yr max. Verbatim Treasury: Semenov "one
    of three co-founders" designated under E.O. 13694 (as amended by E.O.
    13757); Lazarus "an instrumentality of the DPRK" used Tornado Cash to
    obfuscate ">$455 million" (Ronin), ">$96 million" (Harmony Horizon),
    "at least $7.8 million" (Nomad). CORRECTED: the summary's "prompting
    government appeal" was WRONG — the two serious counts HUNG (partial
    mistrial) at the Aug-2025 trial and the government moved to RETRY them
    (letter filed ~9 Mar 2026), it did not appeal; rewritten to the
    IRS-CI-carried conviction fact ("Storm ... convicted ... on the single
    count of conspiracy to operate an unlicensed money-transmitting
    business; the jury did not return a conviction on the two more serious
    counts"). No fabricated malware/CVEs/victims present. The Aug-2022
    entity-sanction ($7B) figure is NOT imported here (that is jy0916's).

