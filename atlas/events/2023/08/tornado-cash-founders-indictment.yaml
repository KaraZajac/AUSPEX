outcome_summary: |
  Coordinated US action against Tornado Cash co-founders.
  SDNY unsealed indictments charging Roman Storm (arrested
  in Washington State) and Roman Semenov (at-large) with
  conspiracy to commit money laundering, conspiracy to
  violate IEEPA sanctions, and conspiracy to operate an
  unlicensed money-transmitting business. Treasury OFAC
  (jy1702) SDN-designated Semenov the same day. Indictment
  attests over USD 1B in laundered criminal proceeds
  including DPRK-linked Lazarus Group funds.
false_flag_risk: none
campaign_id: ronin-laundering-trail
operators_named:
  - storm-roman  # Tornado Cash co-founder, DOJ SDNY Aug 2023
  - semenov-roman  # Tornado Cash co-founder, OFAC jy1702 + DOJ Aug 2023
summary: |
  Operator-side enforcement action complementing the August
  2022 Tornado Cash entity sanction. Charges expand the
  attestation chain by tying specific individuals (rather
  than just the smart-contract entity) to DPRK
  weapons-program revenue laundering. Storm was
  subsequently convicted (SDNY, 6 August 2025) on the
  single count of conspiracy to operate an unlicensed
  money-transmitting business; the jury did not return a
  conviction on the two more serious counts (conspiracy to
  commit money laundering and conspiracy to violate IEEPA
  sanctions). (Downstream disposition — cited to the
  IRS-CI/SDNY conviction release; the earlier "prompting
  government appeal" wording was incorrect — the two counts
  hung and the government moved to retry them, not appeal —
  and was corrected AUDIT 2026-07-10.)
