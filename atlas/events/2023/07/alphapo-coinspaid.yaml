  level: full
  notes: |
    Audited against RAW cited sources. Snapshots this pass: FBI PSA
    captured (54,054 B, sha256 6120c065…a01b2009); CoinsPaid post-mortem
    created + captured (266,743 B, sha256 4851d9ee…ed0d58bb). REUSED
    (already on disk): elliptic/2023-06-13_atomic-wallet (running Lazarus
    post, sha256 32d5624e…4ca60214, cited by 3 sibling events — carries
    Alphapo/CoinsPaid) and treasury/2023-11-29_sinbad-mixer-sanction
    (sha256 f57acb36…46b3db1a, hash re-verified). All PRESERVE tier.

    [a] FACTS — amounts RETAINED (source-carried, no embellishment):
    Alphapo $60M + CoinsPaid $37M = usd_stolen 97,000,000. FBI: "the $60
    million theft … from Alphapo … the $37 million theft … from
    CoinsPaid." Elliptic: "Alphapo ($60 million)", "CoinsPaid ($37.3
    million)", and "stealing $60 million in cryptoassets" (Alphapo).
    CORRECTED the "Combined ~$100M" claim -> "~$97M" (was a ~3% round-up
    toward the FBI's bundled 3-victim "hundreds of millions" framing;
    Alphapo+CoinsPaid alone = $97M). Added the sourced ZachXBT detail
    ($23M initial -> $60M revised on 23 Jul). CoinsPaid fake-job mechanics
    RETAINED (CoinsPaid raw): "Recruiters … contacted Coinspaid employees
    via LinkedIn"; "responded to a job offer from Crypto.com"; "a test
    assignment that required the installation of an application with
    malicious code." STRIPPED "Sinbad mixer used to launder a portion of
    the proceeds" — the cited Treasury Sinbad release names ONLY Atomic
    Wallet/Axie/Horizon (grep-confirmed: 0 Alphapo/CoinsPaid hits), so it
    does NOT carry Sinbad-laundering for THESE thefts; replaced with the
    CoinsPaid-attested claim that the funds "moved through the same
    addresses used to launder the Atomic Wallet proceeds."
    [b] ATTRIBUTION — two rows, both kp/rgb/lazarus, both concur. Row 1
    FBI high/named-actor (govt-primary; "TraderTraitor-affiliated actors
    (also known as Lazarus Group and APT38)"). Row 2 ADDED CoinsPaid
    victim self-attribution, medium/named-actor — hedged in the raw ("we
    have reasons to suspect … Lazarus may be behind the attack"), so
    medium not high per over-attestation rule. Elliptic firmly corroborates
    ("On July 22nd 2023, Lazarus gained access to hot wallets belonging to
    … CoinsPaid"; "Lazarus conducted another … attack … against Alphapo")
    and is cited in sources[] (running-doc date left off an attribution row
    to avoid a fabricated date). Match Systems' investigation is embedded
    within, and credited by, the CoinsPaid post-mortem ("Match System
    specialists").
    [c] DATES — start 2023-07-22 / end 2023-07-23 RETAINED and now
    source-backed (Elliptic + CoinsPaid: attack "on July 22, 2023"; ZachXBT
    revised Alphapo on 23 Jul). disclosure_date CORRECTED 2023-08-22 ->
    2023-07-26: the old value was the FBI attribution date (conflation);
    CoinsPaid published its first Lazarus report 26 Jul (Elliptic: "On July
    26th, CoinsPaid published a report"). KEY SOURCE-DEFECT logged: the FBI
    PSA misdates BOTH thefts to "June 22, 2023" — an FBI error; every other
    source (CoinsPaid's own report, Elliptic) says 22 July 2023; the event
    follows the correct July date. Source published_on verified: FBI
    2023-08-22, CoinsPaid 2023-08-07 (article:published_time), Elliptic
    2023-06-13 (running doc), OFAC 2023-11-29.
    [d] DOCTRINE_LINK — kp/8th-congress-defense-plan / revenue-aggregation /
    crypto-bridge-theft KEPT strongly_inferred (correct: the program lists
    Ronin/Harmony/Atomic Wallet/DMM/Bybit — NOT Alphapo/CoinsPaid — and no
    cited source names the WMD goal for THESE thefts). FIXED
    attesting_source_id fbi/… -> null (attested-only field; the FBI PSA does
    not attest the goal — cf. the moses-staff/2023-01 convention of null on
    non-attested links). Rewrote inference_basis to point source_id at the
    Treasury Sinbad release (the WMD-framing source) with precise
    signals[]/ruled_out. perspective absent = attacker-rationale (correct;
    DPRK's own doctrine on a DPRK op). Contrast with the sibling
    atomic-wallet (attested) where OFAC names Atomic Wallet by name.
    [e] ATTRIBUTION_LEVEL — named-actor on both rows (ADDED; was absent).
    FBI/CoinsPaid both name the group "Lazarus" (+ APT38), no RGB unit named
    in either cited source, so named-actor not named-unit/named-service.
    [f] ACTOR_ID — kp/rgb/lazarus resolves to atlas/actors/kp/lazarus.yaml
    (id field = kp/rgb/lazarus). Directionality correct: DPRK/Lazarus =
    attacker; Alphapo + CoinsPaid = victims (both targets role primary).
    incident_type set [intrusion, financial-theft] (ADDED intrusion — the
    CoinsPaid compromise was a clear malware intrusion via the fake-job
    lure; matches the sibling atomic-wallet). initial_vector phishing KEPT
    (fits the CoinsPaid social-engineering lure; NB Alphapo's vector differs
