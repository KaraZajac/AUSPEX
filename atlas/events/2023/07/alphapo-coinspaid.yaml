id: 2023-07/alphapo-coinspaid
name: Alphapo and CoinsPaid crypto-payment-processor thefts
start_date: 2023-07-22
disclosure_date: 2023-07-26  # AUDIT 2026-07-10: was 2023-08-22 (FBI attribution date, conflated with disclosure); CoinsPaid's first public Lazarus report was 26 Jul 2023 (Elliptic-attested), ZachXBT flagged Alphapo ~23 Jul
end_date: 2023-07-23
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Two DPRK/Lazarus-linked crypto-payment-processor thefts on
  22 July 2023. Alphapo: approximately $60M drained from hot
  wallets (initial on-chain estimate ~$23M, revised to ~$60M
  by on-chain investigator ZachXBT on 23 July). CoinsPaid:
  approximately $37M drained the same day, after a months-long
  social-engineering campaign that culminated in a fake
  job-interview lure — a malicious "test assignment" application
  installed on a CoinsPaid engineer's machine, from which profiles
  and keys were stolen and the infrastructure accessed. Combined
  ~$97M.
quantified_impact:
  usd_stolen: 97000000
  asset_classes:
    - ETH
    - TRX
    - BTC
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Two crypto-payment-processor thefts on 22 July 2023, disclosed
  within days (ZachXBT flagged the ~$60M Alphapo drain on 23 July;
  CoinsPaid published its first Lazarus-attribution report on
  26 July) and later confirmed by the FBI on 22 August 2023.
  CoinsPaid's post-mortem documents the months-long
  social-engineering ramp-up — recruiter outreach via LinkedIn
  impersonating a Crypto.com job offer, then a malicious
  test-assignment app on an engineer's machine — matching the FBI's
  "TraderTraitor-affiliated" (Lazarus / APT38) tradecraft. CoinsPaid
  observed the stolen funds moving through the same addresses used to
  launder the Atomic Wallet proceeds, reinforcing the Lazarus link.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: US FBI
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-08-22
    attribution_source_id: fbi/2023-08-22_alphapo-coinspaid-psa
    notes: |
      FBI PSA (I-082223-PSA) names the thefts as the work of "DPRK
      TraderTraitor-affiliated actors (also known as Lazarus Group and
      APT38)" and lists six DPRK-controlled BTC addresses holding
      ~1,580 BTC (>$40M) of the traced proceeds. Group-level naming (no
      RGB unit named in this PSA) -> named-actor. NB the PSA misdates
      both thefts to "June 22, 2023" (real date 22 July 2023).
  - actor_id: kp/rgb/lazarus
    attributing_org: CoinsPaid (victim self-attribution)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-08-07
    attribution_source_id: coinspaid/2023-08-07_the-coinspaid-hack-explained
    notes: |
      Victim's own post-mortem, hedged: "we have reasons to suspect that
      the top-tier hacker group Lazarus may be behind the attack" — medium
      (not high) reflects the hedge. CoinsPaid first attributed Lazarus in
      a 26 July 2023 report (per Elliptic); this cited 7 Aug 2023 write-up
      is the detailed version. Independently corroborated by Elliptic
      (firm: "On July 22nd 2023, Lazarus gained access to hot wallets
      belonging to … CoinsPaid") and by the FBI PSA.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      The FBI PSA (22 Aug 2023) and Elliptic attribute the ~$97M
      Alphapo+CoinsPaid thefts to Lazarus — the revenue-generation
      behaviour this pillar encodes — but neither cited source names the
      WMD/ballistic-missile financing goal for these specific thefts.
      Treasury's later (29 Nov 2023) Sinbad designation states that goal
      in substance, but at the network level and for the Atomic Wallet
      heist, not Alphapo/CoinsPaid. The event-specific WMD-financing
      linkage is therefore inferred, not attested.
    attesting_source_id: null
    inference_basis:
      source_id: treasury/2023-11-29_sinbad-mixer-sanction
      signals:
        - "FBI PSA + Elliptic attribute the ~$97M Alphapo ($60M) + CoinsPaid ($37M) thefts to Lazarus/APT38 — revenue-generation behaviour"
        - "Treasury's Nov-2023 Sinbad designation frames DPRK Lazarus heist laundering as funding 'weapons of mass destruction and ballistic missile programs' — but at the network level, naming Atomic Wallet, not these two thefts"
      ruled_out: "Neither cited source names the WMD/ballistic-missile goal for the Alphapo or CoinsPaid thefts specifically; the event-level financing linkage is inferred"
    contested: false
    analyst: claude
targets:
  - target_id: orgs/alphapo
    role: primary
    outcome: ~$60M drained from hot wallets on 22 July 2023.
  - target_id: orgs/coinspaid
    role: primary
    outcome: ~$37M drained on 22 July 2023 after a months-long social-engineering ramp-up.
sources:
