id: 2023-07/alphapo-coinspaid
name: Alphapo and CoinsPaid crypto-payment-processor thefts
start_date: 2023-07-22
disclosure_date: 2023-08-22
end_date: 2023-07-23
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Coordinated hot-wallet compromises of two crypto-payment
  processors. Alphapo: approximately $60M drained on 22 July
  2023. CoinsPaid: approximately $37M drained on 22–23 July
  2023 via a months-long social-engineering campaign that
  culminated in a fake job-interview Trojan dropping malware
  on a CoinsPaid engineer's machine. Combined ~$100M.
quantified_impact:
  usd_stolen: 97000000
  asset_classes:
    - ETH
    - TRX
    - BTC
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Summer 2023 series of payment-processor thefts attributed by
  the FBI on 22 August 2023. CoinsPaid published a detailed
  post-mortem documenting the months-long social-engineering
  ramp-up — fake recruiter outreach via LinkedIn impersonating
  the Crypto.com team — that mirrors TraderTraitor / Lazarus
  tradecraft pattern. Sinbad mixer used to launder a portion
  of the proceeds.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: US FBI
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-08-22
    attribution_source_id: fbi/2023-08-22_alphapo-coinspaid-psa
    notes: |
      FBI PSA names Lazarus and identifies specific receiving
      wallet addresses.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      FBI's August 2023 PSA attributes the thefts to Lazarus but
      does not name the WMD goal; the later Sinbad mixer
      designation (Nov 2023) ties DPRK laundering to weapons
      programs at the network level. The event-specific
      WMD-financing linkage is inferred.
    attesting_source_id: fbi/2023-08-22_alphapo-coinspaid-psa
    inference_basis:
      source_id: fbi/2023-08-22_alphapo-coinspaid-psa
      signals:
        - "FBI PSA attributes the ~$100M thefts to Lazarus (revenue behaviour); Treasury Sinbad designation frames DPRK laundering as funding weapons programs"
      ruled_out: "WMD goal not named in the FBI PSA for these specific thefts"
    contested: false
    analyst: claude
targets:
  - target_id: orgs/alphapo
    role: primary
    outcome: ~$60M drained from hot wallets.
  - target_id: orgs/coinspaid
    role: primary
    outcome: ~$37M drained after a months-long social-engineering ramp-up.
sources:
  - fbi/2023-08-22_alphapo-coinspaid-psa
  - treasury/2023-11-29_sinbad-mixer-sanction
