  notes: |
    PHANTOM RE-SOURCE (badrabbit model). The event is real and well-documented, but
    was mis-cited to a defective Bitdefender record (bitdefender/2023-07-18_fin8-sardonic-alphv,
    url:null). Re-sourced to the genuine primary — Symantec Threat Hunter Team (Broadcom),
    "FIN8 Uses Revamped Sardonic Backdoor to Deliver Noberus Ransomware", 18 Jul 2023
    (raw snapshot captured + hashed: sha256 b30a1b9f…af961544, 350,053 bytes; article body
    present in raw HTML — hash independently re-verifiable). Every claim below is now
    Symantec-carried (verbatim quotes in the source record).

    [a] FACTS — corrected four fabrications/errors: (i) DISCLOSER Bitdefender Labs -> Symantec
    Threat Hunter Team (Broadcom). (ii) TIMING — the ALPHV/Noberus deployment attempt was
    DECEMBER 2022 ("In December 2022, Symantec observed the group attempting to deploy the
    Noberus (aka ALPHV, BlackCat) ransomware in attacks"), disclosed 2023-07-18 — NOT
    "June-July 2023"; fixed start_date 2023-06-01 -> 2022-12-01, stripped the fabricated
    end_date 2023-09-30 -> null and the unsupported "multiple intrusions observed in the wild
    during June-July 2023" (Symantec describes one Dec-2022 intrusion attempt). (iii) SARDONIC
    REVAMP — replaced the unsupported "new initialization, in-memory operation, and updated
    command set to evade endpoint defenses" tradecraft with the source's actual finding: the
    code "no longer uses the C++ standard library and most of the object-oriented features have
    been replaced with a plain C implementation" (a C++ -> plain-C rewrite to avoid similarity
    with the 2021 Bitdefender-documented C++ Sardonic). NB the task framing "C++ revamp" is
    directionally right but the specifics are a rewrite AWAY from C++ (dropped the C++ std
    library / OOP) toward plain C. (iv) PIVOT HISTORY (POS PUNCHTRACK/BADHATCH since 2016;
    Ragnar Locker Jun 2021 vs a US financial-services company; White Rabbit Jan 2022,
    Sardonic-based) — all verbatim-carried.
    [b] ATTRIBUTION — attributing_org Bitdefender Labs -> Symantec Threat Hunter Team (Broadcom);
    Symantec names the actor as its tracked cluster Syssphinx (= FIN8) with no hedge, on
    tool-lineage + TTP continuity -> attributing_org_confidence moderate -> high;
    attribution_source_id repointed to symantec/2023-07-18_syssphinx-fin8-backdoor;
    attribution_date 2023-07-18 retained (= Symantec pub date, in-page "18 Jul 2023").
    [c] DATES — new source published_on 2023-07-18 (verified in-page). Event start_date ->
    2022-12-01 (op = the Dec-2022 intrusion; Symantec gives month precision only),
    disclosure_date 2023-07-18 unchanged, end_date -> null (single attempt; no end stated).
    Old start/end conflated disclosure-adjacent months + a fabricated Sept-2023 tail.
    [d] DOCTRINE_LINKS — [] retained and correct: both actors are stateless criminal/, no
    doctrine genuinely applies (task-confirmed). No attested link -> no attesting_source_id needed.
    [e] ATTRIBUTION_LEVEL — set named-actor (was absent): Symantec names the group
    (Syssphinx/FIN8); no nation-state or named unit (criminal).
    [f] ACTOR_ID — criminal/fin8 resolves to atlas/actors/criminal/fin8.yaml. Corrected the
    summary's stale "ALPHV = ru/proxies/alphv (Russian-state-tolerated)" -> criminal/alphv (that
    actor was demoted ru/proxies -> ru/unscoped -> criminal in Jun-2026 audits; no cited Russia
    nexus). Stripped target sectors/finance/banking (a conflation with the Jun-2021 Ragnar
    victim; Symantec names NO victim/sector/country for the Dec-2022 Noberus intrusion) ->
    targets: []. initial_vector phishing -> unknown (Symantec did not identify the Dec-2022
    intrusion's vector; only the group's general social-engineering/spear-phishing preference is
    noted).

