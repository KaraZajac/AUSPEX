id: 2023-07/fin8-alphv-sardonic
name: FIN8 deployment of ALPHV ransomware via Sardonic backdoor
start_date: 2023-06-01
disclosure_date: 2023-07-18
end_date: 2023-09-30
incident_type:
  - intrusion
  - ransomware
initial_vector: phishing
outcome_summary: |
  Bitdefender Labs disclosed July 18, 2023 a FIN8 campaign that
  deployed the BlackCat / ALPHV ransomware payload via an
  upgraded variant of FIN8's Sardonic backdoor. The campaign
  confirmed FIN8's pivot from point-of-sale malware (its
  original 2016-2020 specialty) into the ransomware-affiliate
  model, joining Ragnar Locker (2021) and White Rabbit (2022)
  in the FIN8 payload portfolio. The Sardonic variant added new
  initialization, in-memory operation, and updated command set
  to evade endpoint defenses. No specific victim was named in
  the Bitdefender disclosure but multiple intrusions were
  observed in the wild during June-July 2023.
false_flag_risk: none
summary: |
  Important AUSPEX criminal-baseline case for documenting
  cross-cluster tooling reuse: FIN8 is a long-standing financial-
  cybercrime cluster (`criminal/fin8`) while ALPHV is tracked as
  Russian-state-tolerated (`ru/proxies/alphv`). FIN8's use of
  ALPHV as a payload is operational rather than doctrinal — the
  AUSPEX engine should treat such mixed-class incidents as
  affiliate-portability noise rather than evidence of FIN8 state
  alignment.
