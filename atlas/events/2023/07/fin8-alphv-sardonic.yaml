id: 2023-07/fin8-alphv-sardonic
name: FIN8 deployment of ALPHV ransomware via Sardonic backdoor
start_date: 2022-12-01
disclosure_date: 2023-07-18
end_date: null
incident_type:
  - intrusion
  - ransomware
initial_vector: unknown
outcome_summary: |
  Symantec's Threat Hunter Team (Broadcom) disclosed on July 18,
  2023 that in December 2022 it had observed FIN8 (which Symantec
  tracks as Syssphinx) attempt to deploy the Noberus / ALPHV /
  BlackCat ransomware via a revamped variant of FIN8's Sardonic
  backdoor. The revamp rewrote most of the backdoor's code so that
  it "no longer uses the C++ standard library and most of the
  object-oriented features have been replaced with a plain C
  implementation" — a rewrite away from the original 2021 C++-based
  Sardonic (documented by Bitdefender), apparently to avoid
  similarities with previously disclosed detail. The activity
  confirmed FIN8's pivot from point-of-sale malware (PUNCHTRACK /
  BADHATCH, its original specialty since 2016) into ransomware,
  following its June 2021 use of Ragnar Locker (against a US
  financial-services company) and the January 2022 White Rabbit
  ransomware (also Sardonic-based). Symantec named no specific
  victim for the December 2022 Noberus intrusion and did not
  identify its initial-access vector.
false_flag_risk: none
summary: |
  AUSPEX criminal-baseline case documenting cross-cluster tooling
  reuse: FIN8 (`criminal/fin8`), a long-standing financial-
  cybercrime cluster, here deploys the Noberus / ALPHV / BlackCat
  ransomware (`criminal/alphv`) as an affiliate payload via its
  revamped Sardonic backdoor. Both are stateless profit-criminal
  actors with no documented state nexus (ALPHV carries no cited
  Russia / state-tolerance evidence — see the criminal/alphv actor
  audit), so the incident carries no doctrinal or state-alignment
  signal; the AUSPEX engine should treat it as affiliate-portability
  / tooling-reuse baseline noise, not evidence of any state
  alignment.
