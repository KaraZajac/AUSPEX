doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred  # not attested: no cited source states, for THIS op, the WMD/ballistic-missile financing goal (audit 2026-07-02; prior downgrade 2026-06-09)
    reasoning: |
      The intrusion is attributed (Mandiant, high confidence) to UNC4899 /
      TraderTraitor — "a cryptocurrency-focused element within the DPRK's
      Reconnaissance General Bureau (RGB)" — whose documented mission is
      cryptocurrency theft for regime revenue (CISA AA22-108A). The JumpCloud
      supply-chain pivot specifically reached cryptocurrency customers and, per
      the UN Panel of Experts, enabled two crypto heists netting ~$147.5M — the
      crypto-exchange/bridge-theft revenue pattern the 8th-Congress
      revenue-aggregation pillar encodes. Held at strongly_inferred (not
      attested): the cited sources state the proximate revenue purpose but none
      states, for this operation, the ultimate goal of financing the WMD /
      ballistic-missile program — so there is no attesting_source_id.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - "Actor mission: Mandiant attributes to UNC4899 / TraderTraitor, assessed high-confidence as a 'cryptocurrency-focused element within the DPRK's RGB'; TraderTraitor's documented remit is crypto theft for regime revenue (CISA AA22-108A)."
        - "Outcome: the UN Panel of Experts (report released 2024-03-07, via The Record 2024-03-22) found the JumpCloud access enabled 'two cryptocurrency heists that netted them about $147.5 million' — direct revenue capture."
        - "Method: a supply-chain pivot through an identity-SaaS provider chosen to reach cryptocurrency customers — the crypto-exchange/bridge theft pattern the crypto-bridge-theft program specializes."
      ruled_out: "Espionage-only or non-DPRK-criminal readings are excluded: funds were stolen (not merely accessed) and the DPRK-state nexus is attested at high confidence by Mandiant/SentinelOne/CrowdStrike. The only surviving competitor — proximate 'revenue generation' vs. the ultimate 'defense/WMD financing' the 8th-Congress plan encodes — is a specialization of the same doctrine, not a rival doctrine."
targets:
  - target_id: sectors/ict/identity
    role: staging
    outcome: JumpCloud (zero-trust identity / IAM SaaS) was the staging victim — spear-phish (2023-06-22) then data injection into the commands framework to reach downstream customer agents.
  - target_id: sectors/finance/crypto-exchange
    role: primary
    outcome: Fewer than five downstream JumpCloud customers in the cryptocurrency vertical were compromised; the access enabled two follow-on crypto heists netting ~$147.5M (UN Panel of Experts).
