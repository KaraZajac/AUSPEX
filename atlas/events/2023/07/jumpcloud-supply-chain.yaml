id: 2023-07/jumpcloud-supply-chain
name: JumpCloud supply-chain compromise
start_date: 2023-06-22
disclosure_date: 2023-07-12
end_date: 2023-07-12
incident_type:
  - supply-chain
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Sophisticated spear-phishing (2023-06-22) into JumpCloud (zero-trust
  identity / IAM SaaS); the actor injected malicious data into JumpCloud's
  commands framework to reach a small set of downstream customers. JumpCloud
  reported the access impacted "fewer than 5 customers" and "fewer than 10
  devices" out of 200,000+ organizations, and the impacted customers were in
  the cryptocurrency vertical. Per the UN Panel of Experts (report released
  2024-03-07), the JumpCloud access enabled two follow-on cryptocurrency
  heists netting ~$147.5M.
quantified_impact:
  usd_stolen_downstream: 147500000  # UN Panel of Experts via The Record (2024-03-22): JumpCloud access enabled two crypto heists netting ~$147.5M
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  DPRK supply-chain pivot operation (a 2023 counterpart to the 3CX
  compromise). Initial access into JumpCloud came via a sophisticated
  spear-phishing campaign on 2023-06-22; JumpCloud detected anomalous activity
  on an internal orchestration system on 2023-06-27 and, on 2023-07-05,
  unusual activity in its commands framework affecting a small set of
  customers. Mandiant — which responded to the intrusion at a downstream
  victim — attributes it to UNC4899, a DPRK-nexus actor it assesses with high
  confidence to be "a cryptocurrency-focused element within the DPRK's
  Reconnaissance General Bureau (RGB)," and which "likely corresponds to
  TraderTraitor." SentinelLabs independently linked the JumpCloud IOCs to a
  North Korean state-sponsored APT, with infrastructure pivots to the
  TraderTraitor and AppleJeus clusters; JumpCloud stated it "identified and
  CrowdStrike confirmed the nation-state actor involved was North Korea." The
  operators pivoted from JumpCloud into downstream customer agents via data
  injection into the commands framework (a malicious Ruby script run through
  the JumpCloud agent); Mandiant documented macOS implants FULLHOUSE.DOORED,
  STRATOFEAR and TIEDYE and observed UNC4899 targeting macOS keychains and
  reconnaissance data on executives and internal security teams at the
  impacted crypto customers. JumpCloud reported fewer than five customers and
  fewer than ten devices affected; the UN Panel of Experts later found the
  JumpCloud access enabled two cryptocurrency heists netting ~$147.5M.
  ATTRIBUTION LATENCY: JumpCloud's 2023-07-12 disclosure named only "a
  sophisticated nation-state sponsored threat actor" — the North Korea /
  UNC4899 / TraderTraitor attribution came from SentinelOne (2023-07-20),
  Mandiant (2023-07-24) and CrowdStrike over the following ~2 weeks.
