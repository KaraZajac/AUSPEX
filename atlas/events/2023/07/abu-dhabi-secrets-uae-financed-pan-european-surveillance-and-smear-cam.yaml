id: 2023-07/abu-dhabi-secrets-uae-financed-pan-european-surveillance-and-smear-cam
name: "Abu Dhabi Secrets — UAE-financed pan-European surveillance and smear campaign via Alp Services"
start_date: 2023-07-07
incident_type:
