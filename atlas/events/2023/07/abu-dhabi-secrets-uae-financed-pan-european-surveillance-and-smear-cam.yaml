id: 2023-07/abu-dhabi-secrets-uae-financed-pan-european-surveillance-and-smear-cam
name: "Abu Dhabi Secrets — UAE-financed pan-European surveillance and smear campaign via Alp Services"
start_date: 2023-07-07
incident_type:
  - surveillance
  - influence-operation
false_flag_risk: none
summary: |
  In July 2023 the European Investigative Collaborations (EIC) consortium, initiated by Mediapart,
  published "Abu Dhabi Secrets": an exposé of how the UAE government contracted the Geneva-based
  private intelligence firm Alp Services to surveil and smear individuals across Europe. Per EIC,
  Alp sent the UAE intelligence services the names of more than 1,000 individuals and 400 organizations
  in 18 European countries, labelling them as part of a "Muslim Brotherhood network in Europe"; targets
  included French public figures (Mediapart reported more than 200 French nationals filed for the UAE
  secret services). The reporting triggered criminal investigations in France and Switzerland. A
  well-documented UAE state-directed transnational surveillance/influence operation run through a
  deniable commercial contractor.
