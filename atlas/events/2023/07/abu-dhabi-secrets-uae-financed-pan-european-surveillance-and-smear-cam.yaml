false_flag_risk: none
summary: |
  Mediapart and the European Investigative Collaborations (EIC), working from ~78,000 documents hacked from Swiss intelligence firm Alp Services, exposed that the UAE government (via front entity Ariaf Studies and Research, ~EUR 5.7M, 2017-2020) contracted Alp to surveil and smear more than 1,000 individuals and 400 organizations across 18 European countries as alleged Muslim Brotherhood affiliates, including French public figures. Triggered French and Swiss criminal investigations. A new, well-documented UAE state-directed transnational influence/surveillance operation absent from the inventory.
