initial_vector: valid-creds
outcome_summary: |
  PwC's threat-intelligence team published a Teal Kurma cluster
  retrospective in mid-2023, consolidating the long-running Sea
  Turtle / MARBLED DUST picture across vendor taxonomies and
  documenting continued Turkish-aligned cyber tasking through
  the post-2019 quiet period. The report described tradecraft
  continuities (DNS-related compromise, registrar-level
  manipulation, telecom-operator targeting) and noted the
  cluster's renewed activity preceding the January 2024
  Hunt & Hackett disclosure.
false_flag_risk: none
summary: |
  Important consolidation paper bridging the 2019 Talos picture
  and the 2024 Hunt & Hackett resurgence. PwC's Teal Kurma label
  is the vendor taxonomy choice that subsequent industry
  reporting often cites alongside Microsoft's MARBLED DUST.
