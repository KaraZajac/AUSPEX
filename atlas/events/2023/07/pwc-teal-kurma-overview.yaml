id: 2023-07/pwc-teal-kurma-overview
name: PwC publishes Teal Kurma (Sea Turtle) cluster retrospective
start_date: 2017-01-01
disclosure_date: 2023-07-01
end_date: 2023-06-30
incident_type:
  - intrusion
