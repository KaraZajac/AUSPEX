id: 2023-07/apt41-taiwan-research-institute
name: APT41 compromise of Taiwanese government-affiliated research institute
start_date: 2023-07-15  # Talos: "earliest infiltration trace from mid July, 2023"
disclosure_date: 2023-08-25  # Cisco Talos (see qc note on the page's 2024 migration re-stamp)
end_date: 2023-08-25
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown  # Talos: "lacked sufficient evidence to conclusively determine the initial attack vector"
outcome_summary: |
  APT41 compromised a Taiwanese government-affiliated research
  institute (name not disclosed by Talos), compromising three hosts,
  deploying ShadowPad and Cobalt Strike, and exfiltrating documents
  from the network. Cisco Talos published the attribution at medium
  confidence; the victim is described only as a government-affiliated
  research-and-development entity whose work makes it a valuable
  target for actors seeking proprietary and sensitive technologies.
false_flag_risk: none
summary: |
  Reinforces APT41's Taiwan-island / Taiwan-S&T collection mission.
  Cisco Talos (medium confidence, on TTP / infrastructure / malware
  overlaps) documents deployment of ShadowPad and Cobalt Strike via
  DLL side-loading using legitimate Bitdefender and Microsoft Office
  IME (imecmnt.exe) binaries; a webshell on the compromised web
  server (plus RDP and a reverse shell) for foothold; a custom loader
  (UnmarshalPwn) that exploits CVE-2018-0824 for local privilege
  escalation; a GoLang anti-AV Cobalt Strike loader built from the
  open-source Chinese "CS-Avoid-Killing" project; and credential
  harvesting via Mimikatz (lsass) and WebBrowserPassView. Talos
  describes ShadowPad as a modular RAT "only seen sold to Chinese
  hacking groups" (a PlugX successor) also used by Mustang Panda and
  Tonto Team, and ties the intrusion to APT41 via TTP and
  infrastructure overlap with prior APT41-attributed reporting,
  including a Symantec-reported April 2022 campaign that shared a C2
  (103.56.114[.]69) and the same ShadowPad Bitdefender loader. APT41
  is alleged by the U.S. government to comprise Chinese nationals
  based out of Chengdu (2020 DOJ case).
attributions:
