id: 2023-07/apt41-taiwan-research-institute
name: APT41 compromise of Taiwanese government-affiliated research institute
start_date: 2023-07-01
disclosure_date: 2023-08-25  # Cisco Talos
end_date: 2023-08-25
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  APT41 compromised a Taiwanese government-affiliated computing
  research institute, deploying ShadowPad and Cobalt Strike, and
  exfiltrated research documents. Cisco Talos published the
  attribution; victim not named publicly but described as a
  technology-research entity within Taiwan's government R&D
  ecosystem.
false_flag_risk: none
summary: |
  Reinforces APT41's continued Taiwan-island and Taiwan-S&T
  collection mission, post the 2020 DOJ indictment. Cisco Talos
  documents deployment of ShadowPad and Cobalt Strike beacons via
  DLL side-loading using legitimately signed binaries, a custom
  China Chopper-style web shell on internet-facing servers, the
  open-source ShadowPad UnmarshalPwn loader, and credential
  dumping for lateral movement on valid credentials. The use of
  ShadowPad ties the operation to the broader MSS-aligned Winnti-
  supply-chain tooling cluster, with the deployment chain and DLL
  side-loading pattern matching APT41's earlier USAHerds and
  Indian-government operations.
