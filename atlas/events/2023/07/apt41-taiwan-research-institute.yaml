  notes: |
    Audited vs the RAW Cisco Talos post "APT41 likely compromised
    Taiwanese government-affiliated research institute with ShadowPad
    and Cobalt Strike" (raw_snapshot talos__2023-08-25_apt41-taiwan-
    research.html; sha256 e931bbdb…39eb4b93; 127,478 bytes — hash
    RE-VERIFIED against the on-disk snapshot, matches the recorded
    content_sha256). NOT a phantom: the URL is the real, correct
    article and its body matches the event. Single source; primary
    (first-party vendor research) — tier PRESERVED.

    [a] FACTS — corrected several unsupported/embellished claims:
      • "computing research institute" → the string "comput" appears
        ZERO times in the post; Talos says only "government-affiliated
        research institute" / "Taiwanese research institute." Removed
        "computing" from outcome_summary and all doctrine reasoning.
      • "custom China Chopper-style web shell on internet-facing
        servers" → "Chopper" appears ZERO times; Talos says only "a
        webshell is installed" on "the machine with the web server."
        Reworded to "a webshell on the compromised web server (plus
        RDP and a reverse shell)."
      • "the open-source ShadowPad UnmarshalPwn loader" → CONFLATION.
        Per Talos, UnmarshalPwn is "a POC for CVE-2018-0824 [that]
        uses a remote code execution vulnerability to get local
        privilege escalation" — a privesc exploit tool, NOT a
        ShadowPad loader, and never called open-source. The
        "open-source" descriptor belongs to the GoLang Cobalt Strike
        loader ("based on an anti-AV loader named CS-Avoid-Killing
        hosted on GitHub … from Chinese Open Source Project").
        Rewrote both correctly.
      • "credential dumping for lateral movement on valid credentials"
        → "lateral" and "valid cred"/"valid account" appear ZERO
        times. Talos: "Mimikatz to harvest the hashes from the lsass
        process" + "WebBrowserPassView." Host discovery is described
        as ShadowPad "lightweight network scanning," not
        valid-credential lateral movement. Reworded to "credential
        harvesting via Mimikatz (lsass) and WebBrowserPassView."
      • "DLL side-loading using legitimately signed binaries" →
        "signed" appears ZERO times; Talos names the specific legit
        binaries (an 11-year-old Bitdefender executable; the
        13-year-old MS Office IME imecmnt.exe). Reworded to name them
        and drop the unstated "signed" claim.
      • "MSS-aligned Winnti-supply-chain tooling cluster" → "MSS",
        "Ministry of State", and "Winnti" all appear ZERO times.
        Talos calls ShadowPad "a modular remote access trojan … only
        seen sold to Chinese hacking groups," a PlugX successor, also
        used by Mustang Panda and Tonto Team. Rewrote to that; dropped
        "MSS-aligned Winnti."
      • "matching APT41's earlier USAHerds and Indian-government
        operations" → "USAHerds"/"India"/"Indian" appear ZERO times
        in THIS source. Replaced with what Talos actually states: TTP
        + infrastructure overlap with prior APT41-attributed reporting
        and a Symantec-reported April 2022 campaign (shared C2
        103.56.114[.]69, same ShadowPad Bitdefender loader).
      • Supported facts KEPT/added (verbatim in source): ShadowPad +
        Cobalt Strike + "other customized tools"; three hosts
        compromised; documents exfiltrated ("exfiltrate some documents
        from the network"); medium-confidence APT41 attribution;
        Chengdu/DOJ framing; CVE-2018-0824; UnmarshalPwn; CS-Avoid-
        Killing GoLang loader. NB: did NOT (re)introduce any
        "CCleaner→APT41" claim (that backdoor is APT17/BLACKCOFFEE) —
        event carries no CCleaner string.
    [b] ATTRIBUTION — Talos "assesses with medium confidence." Kept
      attributing_org_confidence: moderate, auspex_assessment: concur.
      ADDED attribution_level: named-actor (Talos names the group
