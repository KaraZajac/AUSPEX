summary: |
  Symantec reported a Shuckworm (Gamaredon) intrusion campaign running through 2023 against Ukrainian military, security, research, and government organizations. Initial access came from phishing emails carrying malicious attachments in formats such as .docx, .rar, .sfx, .lnk and .hta, after which the group deployed its Pterodo backdoor, the Giddome infostealer, custom PowerShell scripts, and USB-propagating malware. The attackers focused on machines whose file names suggested sensitive military information that could support Russian kinetic operations. Ukrainian officials have publicly stated the group operates on behalf of Russia's FSB.
