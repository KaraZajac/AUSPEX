outcome_summary: |
  CNMF deployed to Zambia for roughly three months in 2023, working
  with the Zambian Information Communication Technology Authority (the
  national cybersecurity-oversight body) to identify network
  vulnerabilities and hunt for malicious activity. The team pinpointed
  a specific vulnerability in the partner's network, which the Zambian
  partner then remediated; CNMF declined to detail the weakness or how
  many U.S. personnel deployed. CYBERCOM's first acknowledged
  hunt-forward mission in Zambia, publicly disclosed 22 May 2024. U.S.
  Ambassador to Zambia Michael Gonzales advised the deployed team.
false_flag_risk: none
summary: |
  Invitation-based, defensive CNMF Hunt Forward deployment: for
  ~3 months in 2023 the Cyber National Mission Force worked alongside
  the Zambian Information Communication Technology Authority to find
  and remediate network vulnerabilities. Publicly announced by CYBERCOM
  on 22 May 2024 (The Record, Matishak) — the command's first
  acknowledged hunt-forward operation in Zambia, framed as African
  partner expansion of Hunt Forward. Part of the 22 hunt-forward
  missions CYBERCOM ran in 2023 that, for the first time, occurred
  simultaneously across all geographic-combatant-command AORs
  (including Africa) per Gen. Haugh's April 2024 posture statement,
  which gives that aggregate tally but names no host country.
