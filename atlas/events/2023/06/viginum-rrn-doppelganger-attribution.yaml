    reasoning: |
      Doppelganger / RRN is an external information-psychological
      operation: fabricated media and typosquatted news/government
      outlets projecting pro-Russia narratives to erode Western
      (especially French) public support for Ukraine, amplified by
      the Russian diplomatic network and entities affiliated with
      the Russian Federation. This is the external influence
      apparatus the 2016 Information Security Doctrine's
      information-psychological pillar underwrites (Moscow frames it
      as countering Western "Russophobia" / information warfare).
      VIGINUM states the operation's goal explicitly; the mapping to
      the specific Russian doctrine is an AUSPEX inference with no
      serious competitor. (attacker-rationale — Russia's own
      doctrine for why it ran the campaign.)
