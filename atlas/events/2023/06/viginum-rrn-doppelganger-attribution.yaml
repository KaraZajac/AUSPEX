id: 2023-06/viginum-rrn-doppelganger-attribution
name: VIGINUM / SGDSN attributes RRN / Doppelganger digital-manipulation campaign
start_date: 2022-03-10  # RRN media rrussianews[.]com ("Reliable Russian News") registered 10 Mar 2022 per VIGINUM technical report; the report dates the campaign to "spring 2022"
disclosure_date: 2023-06-13
end_date: 2023-06-19  # report's final update ([MàJ] 19/06/2023); the campaign itself remained active per VIGINUM ("it remains active")
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM (Service de vigilance et de protection contre les
  ingérences numériques étrangères, SGDSN) report dated 13 June
  2023 (technical report + [MàJ] 19 June 2023) on the "RRN"
  (Reliable Recent News) / Doppelganger information-manipulation
  campaign. VIGINUM detected 355 domain names registered between
  June 2022 and May 2023 typosquatting media outlets across France
  and eight further states (Germany, UAE, United States, Israel,
  Latvia, Lithuania, United Kingdom, Ukraine). Four French dailies
  had their graphic identity cloned — 20 Minutes, Le Monde, Le
  Parisien and Le Figaro — alongside German (Der Spiegel,
  Süddeutsche Zeitung, FAZ, Bild) and UK (The Guardian) outlets,
  to seed pro-Russia narratives discrediting Western support for
  Ukraine. From end-May 2023 the campaign typosquatted the French
  Ministry for Europe and Foreign Affairs (and Germany's Interior
  Ministry) websites to publish forged official documents. A
  companion political statement was issued the same day (13 June
  2023) by the French Minister for Europe and Foreign Affairs,
  Catherine Colonna.
quantified_impact:
  countries_affected: 9  # France + 8 states enumerated in the VIGINUM technical report (fn.32); the English synthesis phrases it "France and nine states of Europe, the Americas and the Middle East"
false_flag_risk: none
operators_named: []
summary: |
  Foundational French government attribution of the Doppelganger /
  RRN influence-operations cluster. Editorially significant as the
  first major VIGINUM technical report (after the service's 2021
  stand-up) to accompany a French government attribution of a
  foreign influence operation, and as a canonical instance of the
  LII strategic-attribution pillar. VIGINUM's own finding is
  measured: its open-source investigation identified "the
  involvement of Russian or Russian-speaking individuals and
  several Russian companies" and observed that entities "affiliated
  with the Russian Federation participated in spreading" content —
  it stops short of a formal single-organ state attribution. The
  report relays Meta's 15 December 2022 attribution of the campaign
  to two Russian companies — Social Design Agency (ASP) and
  Structura National Technologies (Struktura), both run by Ilya
  Gambashidze and extensively contracted to Russian government
  institutions. AUSPEX records the attributing-actor rows under
  France (VIGINUM/SGDSN + the MEAE companion statement) and Meta;
  the originating Russian operator would sit in the ru/ cluster
  (Social Design Agency / Structura) — actor_id is left null
  pending that operator slot.
