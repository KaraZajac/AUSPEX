id: 2023-06/viginum-rrn-doppelganger-attribution
name: VIGINUM / SGDSN attributes RRN / Doppelganger digital-manipulation campaign
start_date: 2022-05-01  # RRN activity earliest detected; sustained from mid-2022
disclosure_date: 2023-06-13
end_date: 2023-06-19  # 19 June 2023 update
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM (Service de vigilance et de protection contre les
  ingérences numériques étrangères, SGDSN) report dated 13 June
  2023 (with 19 June 2023 update) publicly attributing the "RRN"
  / Doppelganger campaign — clone news websites impersonating Le
  Monde, Le Parisien, 20 Minutes, Der Spiegel, Bild, The
  Guardian, and other European outlets to seed pro-Russia
  narratives against Western support for Ukraine — to actors
  acting on behalf of the Russian state. Companion attribution
  statement issued by the French Ministry for Europe and Foreign
  Affairs.
quantified_impact:
  countries_affected: 7
false_flag_risk: none
operators_named: []
summary: |
  Foundational French government attribution of the Doppelganger
  influence-operations cluster. Editorially significant as the
  first major VIGINUM publication after the service's 2021
  stand-up to result in a public attribution to a foreign state,
  and as a canonical instance of the LII strategic-attribution
  pillar. AUSPEX records the attributing-actor row under VIGINUM
  / SGDSN; the originating Russian operator sits in the ru/
  cluster (Social Design Agency / Structura).
