  notes: |
    Audited vs the VIGINUM/SGDSN primary report (fully snapshotted:
    sgdsn__2023-06-13_rrn-doppelganger-mise-a-jour.html, sha256
    def29edd…41276106, 47390 bytes) + its linked technical reports
    (FR 20230619 / EN 20230719) + the MEAE Colonna companion
    statement (link-rotted, corroborated — see level rationale).

    [a] FACTS — corrected against the raw report:
    • Impersonated outlets: added Le Figaro. The report names FOUR
      French dailies graphic-cloned — "20 Minutes, Le Monde, Le
      Parisien and Le Figaro" (EN tech report l.544-548, fn.33:
      leparisien[.]ltd, lemonde[.]ltd, lefigaro[.]me, 20minuts[.]com;
      "at least 49 fake articles in Le Parisien, seven in 20 Minutes,
      one in Le Monde and one in Le Figaro"). The prior summary
      dropped Le Figaro. Der Spiegel/Bild/The Guardian VERIFIED as
      typosquatted foreign outlets (domain annex: spiegel[.]*,
      bild[.]*, theguardian[.]co[.]com) — retained.
    • Typosquat scale VERIFIED: "355 domain names impersonating the
      identity of media outlets in France and in nine states…
      between June 2022 and May 2023" (EN synthesis).
    • countries_affected 7 → 9. The "7" was unsupported (looks like a
      count of listed outlets, not countries). Report fn.32 enumerates
      France + 8 states (Germany, UAE, US, Israel, Latvia, Lithuania,
      UK, Ukraine) = 9; the synthesis's looser "France and nine
      states" phrasing would imply 10 — 9 is the explicitly-enumerated
      figure. Noted on the field.
    • Government target VERIFIED: from 29 May 2023 the campaign
      typosquatted the MEAE website (diplomatie.gouv[.]fm, forged
      "security tax" communiqué) and Germany's Interior Ministry.
    • "acting on behalf of the Russian state" SOFTENED to VIGINUM's
      actual measured language ("involvement of Russian or Russian-
      speaking individuals and several Russian companies" + entities
      "affiliated with the Russian Federation participated in
      spreading"); line 78's "on behalf of the Russian State" in the
      report refers specifically to ANO Dialog, NOT a blanket campaign
      attribution — the flat state-attribution framing over-read it.

    [b] ATTRIBUTION — row1 (France) kept high but re-scoped to
    nation-level with measured wording (see notes). Added row2 for
    Meta's 15 Dec 2022 named-actor attribution to Social Design
    Agency (ASP) + Structura (Gambashidze), documented verbatim in
    the report — this corrects the prior claim that SDA/Structura
    were "developed in subsequent open-source reporting" (they were
    named by Meta BEFORE, and cited IN, this report). attributing_org
    corrected to encode the real French dual (VIGINUM/SGDSN + MEAE
    companion statement).

    [c] DATES — start_date 2022-05-01 → 2022-03-10 (RRN media
    rrussianews[.]com registered 10 Mar 2022, the campaign's namesake;
    report frames campaign as "since spring 2022"). disclosure 2023-06-13
    ✓; end_date 2023-06-19 kept as the report's final-update endpoint
    (campaign itself remained active). Source published_on 2023-06-13 ✓.

    [d] DOCTRINE_LINKS — ADDED ru/info-security-2016/info-psychological-
    defense (strongly_inferred, attacker-rationale): the event was a
    RUSSIAN influence op carrying ZERO Russian linkage (null actor +
    only French doctrine) so it did not register as attacker-ru at all
    — matches the corpus convention for Western-disclosed Russian info
    ops (cf. romanian-presidential-election-interference,
    mandiant-gru-telegram-personas-disclosure, both using this exact
    pillar). Kept both French LII links attested (primary govt source
    + attesting_source_id set; the pillar summaries name this report as
    canonical) and TAGGED them perspective: defender-response (France's
    own attribution doctrine on an event documenting France attributing
    a Russian op — per the audited 2025 Storm-1516 exemplar), resolving
    the cross-state mismatch. Added inference_basis to all three.

    [e] ATTRIBUTION_LEVEL — added: France row = nation; Meta row =
    named-actor (companies named).

    [f] ACTOR_ID — null; both attribution rows are null-actor. FLAG:
    no ru actor exists for the operator cluster (Social Design Agency /
    Structura / Gambashidze). Recommend Kara create ru/proxies/social-
    design-agency (or a ru Doppelganger-operator cluster) so this event
    + viginum-portal-kombat-disclosure can carry a real Russian
    attacker via actor_id rather than only the attacker-rationale
    doctrine link. Do-not-edit-actors respected.

    LEVEL = partial: the VIGINUM/SGDSN primary source is fully
    snapshotted and independently carries every load-bearing fact, but
