false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (14 June 2023) graduated Cadet Blizzard as a novel, distinct threat actor that MSTIC assesses is associated with the Russian GRU but separate from established GRU groups such as Forest Blizzard and Seashell Blizzard. Cadet Blizzard predominantly achieves initial access through exploitation of internet-facing web servers (e.g. Confluence CVE-2021-26084 and Exchange ProxyShell CVE-2022-41040), then deploys web shells (P0wnyshell, reGeorg, PAS), Impacket, and tunneling tools. The group is linked to the WhisperGate destructive MBR-wiper used against Ukraine in January 2022 and to defacement/hack-and-leak operations. Targeting centered on Ukraine (government services, law enforcement, non-profit/NGO, IT service providers, and emergency services), with additional activity in Europe, Central Asia, and Latin America.
