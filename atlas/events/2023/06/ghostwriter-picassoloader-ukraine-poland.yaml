id: 2023-06/ghostwriter-picassoloader-ukraine-poland  # renamed 2026-07-04 (Kara-approved) from 2023-06/ghostwriter-picassoloader-ukraine-poland: the "pivot" framing + Jan-2024 date were phantom artifacts; real campaign = Apr-2022..Jul-2023 PicassoLoader vs UA+PL, disclosed 2023-06-16 (CERT-UA)
name: "Ghostwriter / UAC-0057 PicassoLoader espionage campaigns against Ukrainian and Polish government and military (2022-2023)"
start_date: 2022-04-01
disclosure_date: 2023-06-16
end_date: null
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: phishing
false_flag_risk: none
outcome_summary: |
  Cisco Talos (13 July 2023) consolidated several campaigns against
  government entities, military organizations and civilian users in
  Ukraine and Poland, active "as early as April 2022 and as recently
  as" July 2023, judging them "very likely aimed at stealing
  information and gaining persistent remote access." Macro-laden
  Excel/PowerPoint lures dropped the ConfuserEx-obfuscated .NET
  downloader CERT-UA named PicassoLoader, which retrieved payloads
  hidden in JPEG images; final payloads included the AgentTesla RAT,
  Cobalt Strike beacons and njRAT, which per prior CERT-UA/FortiGuard
  analyses "were used for information theft and remote access to
  infected systems." CERT-UA documented two 2023 waves it attributed
  to UAC-0057 (GhostWriter): a June attack on a Ukrainian state
  organization via a PPT lure bearing the National Defense University
  emblem, delivering Cobalt Strike Beacon (CERT-UA#6852), and an
  early-July XLS wave against government agencies delivering njRAT
  (CERT-UA#6948).
summary: |
  Sustained GhostWriter / UAC-0057 malware operations against wartime
  Ukraine and Poland: socially engineered defense-ministry-themed and
  fiscal-themed document lures (a soldier salary-payment form, a State
  Treasury of Ukraine payment-instruction form, fake VAT returns)
  delivering PicassoLoader and RAT/beacon payloads for information
  theft and persistent remote access against Ukrainian and Polish
  government and military organizations, with generic waves also
  hitting civilian and business users in both countries. CERT-UA
  attributes the activity to UAC-0057, which it equates with UNC1151 /
  GhostWriter — the cluster Mandiant linked to the Belarusian
  government in 2021 — noting "GhostWriter" originated as the name of
  the group's information operation; Talos relays that attribution
  ("allegedly linked to the Belarusian government") without an
  independent assessment of its own. The cluster's documented
  collection-flavored malware operations here sit alongside its older
  credential-theft-and-influence template.
attributions:
  - actor_id: by/unscoped/ghostwriter
    attributing_org: CERT-UA
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-06-16
    attribution_source_id: cert-ua/2023-06-16_uac-0057-picassoloader-cobalt-strike-6852
    notes: >-
      CERT-UA#6852 (2023-06-16) attributes in its title ("Cyber attack
      by group UAC-0057 (GhostWriter)") and body (PicassoLoader is
      "typically used by the UAC-0057 (GhostWriter) group");
      CERT-UA#6948 (2023-07-07) states it flatly — "The activity is
      carried out by the group UAC-0057" — and equates UAC-0057 with
      UNC1151/GhostWriter per Mandiant's 2020 naming. Named-actor: the
      advisories name the cluster only — no nation and no service (the
      Belarus nexus is Mandiant's 2021 assessment; the RU/BY nation
      contest is recorded on the actor record). CERT-UA#6852's note
      that C2 servers "are located in the Russian Federation" is
      infrastructure geography, not a nation attribution.
  - actor_id: by/unscoped/ghostwriter
    attributing_org: Cisco Talos
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-07-13
    attribution_source_id: talos/2023-07-13_picassoloader-ukraine-poland-campaigns
    notes: >-
      Talos documents the campaigns but relays rather than makes the
      attribution: "CERT-UA has attributed the July campaign to the
      threat actor group UNC1151, as a part of the GhostWriter
      operational activities allegedly linked to the Belarusian
      government" — and cautions that commodity njRAT use makes "the
      process of attribution more difficult." Moderate reflects the
      relay and the "allegedly" hedge; Talos states no independent
      attribution or confidence of its own.
doctrine_links:
  - doctrine_id: by/union-state-integration
    pillar_id: by/union-state-integration/ukraine-theater-support
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The Belarus-linked GhostWriter/UAC-0057 cluster ran information-
      stealing and remote-access malware campaigns against Ukrainian
      and Polish government and military organizations continuously
      from April 2022 — weeks after the full-scale invasion — through
      July 2023: wartime intelligence collection against Russia's
      adversary and its neighboring supporter, executed by the
      Belarusian-aligned operator. That is Ukraine-theater cyber
      support under the Union State agenda, the same pillar (at the
      same confidence) carried by the verified sibling events
      2022-02/ghostwriter-ukraine-targeting-invasion-eve and the
      2024-11 PicassoLoader campaign.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target set: Ukrainian and Polish government and military organizations — Ukraine MoD- and Poland MND-themed lures, a soldier salary-payment form, a State Treasury of Ukraine payment form (Talos raw)."
        - "Timing: activity 'as early as April 2022,' weeks after the full-scale invasion, persisting through July 2023 (Talos raw)."
        - "Actor-mission fit: CERT-UA equates the operator with UNC1151/GhostWriter, the cluster Mandiant assessed with high confidence as linked to the Belarusian government (actor record sources)."
        - "Purpose stated at the proximate level: operations 'very likely aimed at stealing information and gaining persistent remote access' (Talos raw)."
      ruled_out: >-
        by/concept-info-security-2019 (domestic information-sphere
        defense / regime-stability monitoring) — no domestic-opposition
        or info-sphere-defense dimension here: the victims are foreign
        (Ukrainian/Polish) government, military and civilian users, so
        the theater-support reading has no serious competitor. No cited
        source states the strategic goal, so attested is unavailable.
    contested: false
    analyst: claude
