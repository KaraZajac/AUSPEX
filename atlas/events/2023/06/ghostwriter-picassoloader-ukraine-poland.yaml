  notes: |
    PHANTOM-REMEDIATION audit — RE-SOURCE path taken (real event, phantom
    source). Known Ghostwriter fabrication-hotspot event; extra scrutiny
    applied per orchestrator instruction.

    PHANTOM (STEP 0): sole original source
    mandiant/2024-01-23_ghostwriter-targets-ukraine
    (cloud.google.com/blog/topics/threat-intelligence/ghostwriter-targets-
    ukraine) returns HTTP 200 but is Google's soft-404 shell — page title
    "Google Cloud Blog", body "404. That's an error. The requ[ested URL was
    not found]", zero PicassoLoader/UNC1151/UAC-0057 strings ("ghostwriter"
    appears only as the echoed request URL in JS). No content hash recorded
    for it per addendum. Existence independently ruled out: two web sweeps +
    a site-scoped sweep find Mandiant's Ghostwriter corpus = 2020-07 naming
    report, 2021-04 Ghostwriter/UNC1151 update, 2021-11 Belarus-link
    assessment — no 2024-01 "Ghostwriter Targets Ukraine" publication
    anywhere in the reporting record, and no Jan-2024 Mandiant Ghostwriter
    disclosure event exists. The record's "AROEX malware family" is likewise
    fabricated: zero occurrences in any indexed reporting (nearest string
    match is DarkHotel's unrelated "Asruex"). Phantom source record
    annotated as orphaned RETIRE candidate (not deleted).

    RE-SOURCE (STEP 0b): underlying activity is REAL and well documented —
    the GhostWriter/UAC-0057 PicassoLoader campaign cluster vs Ukraine and
    Poland, Apr 2022 - Jul 2023. New sources created, snapshotted, hashed:
    (1) talos/2023-07-13_picassoloader-ukraine-poland-campaigns —
        sha256 93e67e40…fe881792, 90,915 bytes (real article verified:
        byline "Vanja Svajcer, Thursday, July 13, 2023"; JSON-LD
        datePublished 2023-07-13; dateModified 2024-12-12 is a Talos
        platform restamp, same pattern as the apt41-taiwan precedent).
    (2) cert-ua/2023-07-07_uac-0057-picassoloader-njrat-6948 —
        cert.gov.ua/article/5098518; canonical page is a Vue-SPA shell
        (2,380 bytes, no text; archive.org blocked), so raw = the OFFICIAL
        SSSCIP CSIRT mirror csirt.csi.cip.gov.ua/en/posts/uac-0057,
        sha256 be3828a7…18e621ff, 57,332 bytes. URL↔advisory pairing
        independently confirmed by the Talos raw hyperlinking article id
        5098518 as CERT-UA's attribution of the July campaign.
        published_on 2023-07-07 per same-day SOC Prime coverage.
    (3) cert-ua/2023-06-16_uac-0057-picassoloader-cobalt-strike-6852 —
        cert.gov.ua/article/4905718, raw = official mirror
        csirt.csi.cip.gov.ua/en/posts/uac-0057-ghostwriter, sha256
        c8656716…28477544, 58,163 bytes; published_on 2023-06-16 per
        same-day SOC Prime coverage.
    Level kept FULL (not partial) because every load-bearing claim is
    carried by the fully-snapshotted Talos raw AND the advisory texts are
    captured via official same-agency government mirrors (hashed), not
    merely third-party quotes.

    [a] FACTS — original record failed: "AROEX malware family" fabricated
    (REMOVED); "Mandiant disclosed" fabricated (REMOVED); "shifted through
    the second half of 2023 from primarily-influence operations toward
    direct espionage" not carried by any source and contradicted by the
    documented Apr-2022 campaign start (REMOVED); "military personnel
    data, troop-rotation information, government correspondence" invented
    collection specifics (REMOVED); "clearest documented espionage-mission
    realignment of the invasion period" editorial hyperbole (REMOVED);
    "AUSPEX reads this as Russian operational tasking flowing through the
    Belarusian KGB executor as Russia's own GRU collection bandwidth
    thinned" unsourced theory naming a service (KGB) that NO source names
    — contradicts the 2026-06-24 actor audit (REMOVED). Rebuilt summary/
    outcome_summary carry only raw-verbatim facts: campaign window ("as
    early as April 2022 and as recently as earlier this month", Talos);
    victims ("government entities, military organizations and civilian
    users in Ukraine and Poland", Talos); purpose ("very likely aimed at
    stealing information and gaining persistent remote access", Talos);
    tooling (PicassoLoader named by CERT-UA; ConfuserEx .NET downloader;
    payloads AgentTesla / Cobalt Strike / njRAT; JPEG-appended encrypted
    payloads; "were used for information theft and remote access", Talos);
    lures (Ukraine MoD + Poland MND PPT thumbnails, soldier salary form,
    State Treasury payment form, VAT returns — Talos; NDU-emblem PPT,
    CERT-UA#6852); waves (June 2023 vs a Ukrainian state organization →
    Cobalt Strike, #6852, "initiated no later than 06/09/2023"; July 2023
    vs government agencies → njRAT, #6948, XLS lures dated 04-05/07/2023).
    NB #6852's NDU emblem is the LURE theme — victim described only as
    "the state organization of Ukraine"; NDU deliberately NOT claimed as
    victim. initial_vector kept phishing (closest true vocab label:
    socially engineered maldoc lures; Talos hedges transport as "possibly
    sent to the targets as email attachments" — noted). incident_type
    reset to intrusion + espionage + data-theft, each quote-carried.
    [b] ATTRIBUTION — original entry ("Mandiant / CERT-UA", high,
