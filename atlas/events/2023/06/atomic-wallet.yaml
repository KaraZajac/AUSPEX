initial_vector: unknown  # AUDIT 2026-07-10: vector never publicly disclosed; was "supply-chain" (unsourced)
outcome_summary: |
  Undisclosed wallet-software compromise enabled mass theft of
  crypto from Atomic Wallet end users. Elliptic on-chain tracing
  put losses at over $100M; OFAC placed the figure at $100M stolen
  on 3 June 2023 from Atomic Wallet customers. A significant
  portion was laundered through the Sinbad.io mixer — the same
  venue OFAC found laundering the Harmony Horizon Bridge proceeds.
quantified_impact:
  usd_stolen: 100000000
false_flag_risk: none
campaign_id: bridge-theft-chain
summary: |
  Mass end-user crypto theft from Atomic Wallet, a non-custodial
  decentralized cryptocurrency wallet. On 3 June 2023 its users
  lost over $100M. Elliptic attributed the theft to the Lazarus
  Group (DPRK) on 6 June 2023 "after identifying multiple factors
  indicating that the North Korean threat group was responsible,"
  and separately observed on-chain overlap between the Atomic
  Wallet and Stake.com (Lazarus) laundering flows. OFAC's
  29 November 2023 designation of the Sinbad.io mixer confirmed the
  DPRK laundering pattern: Sinbad laundered "a significant portion
  of the $100 million" taken from Atomic Wallet customers — the
  same mixer OFAC tied to the Horizon Bridge and Axie Infinity
  heist proceeds. The specific intrusion vector was never publicly
  disclosed.
