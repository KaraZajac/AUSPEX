outcome_summary: |
  Undisclosed wallet-software compromise enabled mass private-key
  exfiltration from Atomic Wallet end users. Initial estimate
  $35M revised to approximately $100M by Elliptic on-chain
  tracing. Funds laundered via Sinbad mixer — the same venue
  used for Harmony Horizon proceeds.
quantified_impact:
  usd_stolen: 100000000
false_flag_risk: none
campaign_id: bridge-theft-chain
summary: |
  Mass end-user crypto theft via wallet-software compromise.
  Elliptic's June 2023 on-chain tracing established the Lazarus
  attribution by linking proceeds to wallet infrastructure
  previously documented in the Ronin Bridge and Harmony Horizon
  laundering chains; subsequent OFAC Sinbad mixer sanction
  (29 Nov 2023) confirmed the laundering pattern as DPRK.
  Operators are assessed to have compromised Atomic Wallet's
  release build chain (TraderTraitor / Citrine Sleet supply-chain
  pattern) and pushed a trojanized wallet update that exfiltrated
  the local key material; subsequent on-chain mixing through
  Sinbad and chain-hopping via THORChain are the same laundering
  primitives used in the Harmony Horizon and Stake.com heists.
