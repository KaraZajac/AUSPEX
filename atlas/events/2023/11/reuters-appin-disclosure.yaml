    program_id: null
    confidence: attested
    reasoning: |
      Reuters and SentinelOne directly characterize Appin as a
      commercial hack-for-hire vendor whose customers commissioned
      intrusions tied to litigation and corporate disputes — the
      substance of the commercial-litigation pillar.
    attesting_source_id: sentinelone/2023-11-16_appin-hack-for-hire-deep-dive
    inference_basis:
      source_quote: "Our analysis and observations corroborate the June 2022 reporting from Reuters noting some of Appin's customers tied to major litigation battles. The group has conducted hacking operations against high value individuals, governmental organizations, and other businesses involved in specific legal disputes."
    contested: false
    analyst: claude
  - doctrine_id: in/contractor-hack-for-hire
    pillar_id: in/contractor-hack-for-hire/political-espionage
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Alongside commercial-litigation clients, Reuters and
      SentinelOne document government-adjacent tasking — data-theft
      against Chinese government/PLA officials and (per Reuters) the
      Qatar operation against FIFA officials reached via a
      subcontractor — placing part of Appin's book in the
      political-espionage pillar. Strongly inferred rather than
      attested because the sources document discrete
      government-adjacent operations, not a stated program-level
      political-collection mandate. ("Lobbying-firm" clients, in the
      prior reasoning, were uncarried and removed; the documented
      commercial intermediaries are law firms and the private
      investigators acting for them.)
    attesting_source_id: sentinelone/2023-11-16_appin-hack-for-hire-deep-dive
    inference_basis:
      signals:
        - "SentinelOne: Appin 'has conducted hacking operations against high value individuals, governmental organizations, and other businesses,' and cases 'starting in 2009 involved data theft operations against Chinese government officials. These include the successful compromise of multiple PLA officers.'"
        - "Reuters (per secondary corroboration) traces the Qatar 'Project Merciless' operation against FIFA officials to Appin, reached through the contractor Global Risk Advisors — a state-client tasking channel."
      ruled_out: "Purely private commercial tasking with no government-adjacent component — undercut by the documented targeting of government officials (Chinese/PLA officers; FIFA officials via the Qatar contract)."
    contested: false
    analyst: claude
