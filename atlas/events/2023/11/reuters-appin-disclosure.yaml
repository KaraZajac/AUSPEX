id: 2023-11/reuters-appin-disclosure
name: Reuters publishes "How an Indian Startup Hacked the World" — Appin Security exposé
start_date: 2009-01-01
disclosure_date: 2023-11-16
end_date: 2014-01-01  # approx. wind-down of the original Appin entity; SentinelOne dates covert ops "since at least 2009," successors continued
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Reuters published a major investigation tying Appin Security
  Group of New Delhi to a multi-year, multi-client hack-for-hire
  operation — an "educational startup [that] evolved into a
  hack-for-hire powerhouse ... stealing secrets from global
  executives, politicians, and wealthy elites." Documented clients
  commissioned intrusions through Appin's customer portals (branded
  GoldenEye / Commando / MyCommando) and, per Reuters, included
  private investigators acting for law firms and litigants,
  corporate clients, and government-adjacent customers; SentinelOne
  corroborated "customers tied to major litigation battles" and
  hacking "against high value individuals, governmental
  organizations, and other businesses." (Documented Russian-oligarch
  and senior-official connections were as TARGETS, not clients.)
  The investigation drew on a large cache of internal Appin files,
  Reuters interviews with hundreds of people, and SentinelOne's
  companion technical report. Appin and co-founder Rajat Khare
  contested the reporting and pursued takedown litigation; Reuters
  and SentinelOne stood by it. A New Delhi district-court order
  forced Reuters to temporarily unpublish the piece in December
  2023 (full litigation arc: 2023-12/appin-litigation-pressure).
false_flag_risk: none
summary: |
  The largest public exposure of an Indian hack-for-hire operation
  to date. Notable for the breadth of clientele and the multi-
  jurisdictional legal pressure deployed against Reuters and
  related publishers in response. SentinelOne's companion technical
  analysis ("Elephant Hunting | Inside an Indian Hack-For-Hire
  Group," Tom Hegel, 16 Nov 2023) provides the malware /
  infrastructure / tradecraft view, assessing "with high confidence"
  that the cache "correlates with previously known Appin intrusions"
  and attributing global intrusions "encompassing instances of
  espionage, surveillance, and disruptive actions" to Appin. This is
  a commercial mercenary (hack-for-hire) operation, not a
  nation-state program: tasking is client-driven, India-based, with
  targets worldwide and clients largely private.
