id: 2023-11/reuters-appin-disclosure
name: Reuters publishes "How an Indian Startup Hacked the World" — Appin Security exposé
start_date: 2009-01-01
disclosure_date: 2023-11-16
end_date: 2014-01-01  # active period of original Appin entity per Reuters
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Reuters published a major investigation tying Appin Security
  Group of New Delhi to a multi-year, multi-client hack-for-hire
  operation. Documented clients included Russian oligarchs, US
  litigation participants, foreign governments, lobbying firms,
  and corporate adversaries. The investigation drew on internal
  Appin files, Reuters interviews, and SentinelOne's companion
  technical report. Appin and founder Rajat Khare denied
  wrongdoing; Reuters and SentinelOne stood by their reporting.
  Aggressive legal pressure on Reuters (Delhi court orders
  forcing temporary unpublishing in late 2023) became part of
  the story.
false_flag_risk: none
summary: |
  The largest public exposure of an Indian hack-for-hire operation
  to date. Notable for the breadth of clientele and the multi-
  jurisdictional legal pressure deployed against Reuters and
  related publishers in response. SentinelOne's companion
  technical analysis ("A Glimpse into the Shadowy Realm of the
  Appin Hack-for-Hire Operation") provides the malware /
  infrastructure / tradecraft view.
