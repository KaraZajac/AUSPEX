id: 2023-11/aliquippa-cyberav3ngers
name: Aliquippa PA Municipal Water Authority — CyberAv3ngers / IRGC-IO
start_date: 2023-11-25
disclosure_date: 2023-11-25
end_date: 2023-11-26
incident_type:
  - intrusion
  - disruption
  - influence-operation
initial_vector: n-day  # exposed Unitronics PLC with default / weak credentials
outcome_summary: |
  Aliquippa, PA water booster station Unitronics Vision PLC
  exploited; pump switched to manual operation; HMI defaced
  with anti-Israel message ("Every equipment made in Israel is
  CyberAv3ngers legal target"). No civilian impact. Catalyzed
  nationwide EPA / CISA response.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
operators_named:
  - lashgarian-hamid-reza  # IRGC-IO CEC commander, OFAC jy2072 Feb 2024
  - lashgarian-mahdi  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - homayunfal-hamid  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - sadeghi-mahdi-mohammad  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - mansuri-milad  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - saberian-reza-mohammad-amin  # IRGC-IO CEC, OFAC jy2072 Feb 2024
summary: |
  Canonical attested event for the Cyber-Deniable-Retaliation
  doctrine. CISA AA23-335A (December 1, 2023) attributed the
  campaign to IRGC-affiliated actors operating the
  CyberAv3ngers persona; OFAC February 2, 2024 designation
  named six IRGC-IO Cyber-Electronic Command officials
  including commander Hamid Reza Lashgarian. Strategic motive
  (Israel-equipment retaliation) was explicitly cited.
