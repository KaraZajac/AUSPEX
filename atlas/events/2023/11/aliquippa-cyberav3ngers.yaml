id: 2023-11/aliquippa-cyberav3ngers
name: Aliquippa PA Municipal Water Authority — CyberAv3ngers / IRGC-CEC
start_date: 2023-11-25
disclosure_date: 2023-11-25
end_date: 2023-11-26
incident_type:
  - intrusion
  - disruption
  - influence-operation
initial_vector: valid-creds  # internet-exposed Unitronics Vision PLC accessed via Unitronics' default password (CISA AA23-335A); CVE-2023-6448 (hard-coded/default-credential weakness, CWE-798) was assigned only 2023-12-11, AFTER the 2023-11-25 incident — not n-day exploitation of a patched vuln
outcome_summary: |
  Aliquippa, PA water-authority booster station (serving Raccoon
  and Potter Townships) running an internet-exposed, Israeli-made
  Unitronics Vision Series PLC was accessed via its default
  password. The station's automated control was disabled and
  operated manually, with no interruption of service and no known
  risk to drinking water. The HMI displayed the defacement "You
  have been hacked, down with Israel. Every equipment 'made in
  Israel' is CyberAv3ngers legal target." Catalyzed the nationwide
  US/partner joint advisory (CISA AA23-335A) response.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
operators_named:  # OFAC jy2072 (2024-02-02) named these six IRGC-CEC officials for the Unitronics PLC campaign; free-string slugs (no registry FK in corpus)
  - lashgarian-hamid-reza  # head of IRGC-CEC + IRGC-Qods Force commander, OFAC jy2072 Feb 2024
  - lashgarian-mahdi  # IRGC-CEC senior official, OFAC jy2072 Feb 2024
  - homayunfal-hamid  # IRGC-CEC senior official, OFAC jy2072 Feb 2024
  - mansuri-milad  # IRGC-CEC senior official, OFAC jy2072 Feb 2024
  - shirinkar-mohammad-bagher  # IRGC-CEC senior official, OFAC jy2072 Feb 2024 (corrects prior slug sadeghi-mahdi-mohammad — Sadeghi = separate later-2024 DOJ matter, NOT this OFAC action)
  - saberian-reza-mohammad-amin  # IRGC-CEC senior official, OFAC jy2072 Feb 2024
summary: |
  Canonical event for the Cyber-Deniable-Retaliation doctrine.
  CISA AA23-335A (December 1, 2023) attributed the Unitronics
  Vision Series PLC campaign — which includes the November 25,
  2023 Aliquippa incident (CBS ref [1] in the advisory) — to
  IRGC-affiliated actors operating the CyberAv3ngers persona;
  OFAC's February 2, 2024 designation named six IRGC Cyber-
  Electronic Command (IRGC-CEC) officials, including its head
  Hamid Reza Lashgarian. The anti-Israel / Israeli-equipment-
  retaliation motive was stated on the defaced HMI ("down with
  Israel … Every equipment 'made in Israel' is CyberAv3ngers
  legal target", per AA23-335A).
