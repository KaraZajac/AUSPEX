id: 2023-11/lelwd-volt-typhoon-discovery
name: Littleton Electric Light & Water (LELWD) Volt Typhoon 300-day-dwell discovery
start_date: 2023-02-01  # initial access ~Feb 2023 per Dragos (via SecurityWeek/ITPro); estimate
disclosure_date: 2025-03-12  # Dragos case-study publication / coordinated public disclosure
end_date: 2023-11-30  # discovered Nov 2023 (Thanksgiving week); eradication followed
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day  # unpatched FortiGate 300D (Fortinet patched Dec 2022) per The Register
outcome_summary: |
  Volt Typhoon — the group Dragos tracks as VOLTZITE, which it says
  "overlaps with the Volt Typhoon collective" — was found inside the
  Littleton Electric Light and Water Departments (LELWD), a small
  Massachusetts municipal public power utility serving Littleton and
  Boxborough. The intrusion was discovered in November 2023 (just
  before Thanksgiving) after the FBI notified LELWD and Dragos OT
  sensors flagged anomalous China-bound traffic; investigation showed
  the actor had been in the network since about February 2023 — more
  than 300 days. Initial access was via an unpatched FortiGate 300D
  firewall (Fortinet had patched the flaw in December 2022; LELWD's
  managed service provider had not applied it). Observed tradecraft
  was living-off-the-land: SMB traversal and RDP lateral movement, no
  malware. Dragos assessed the adversary aimed to exfiltrate OT
  operating-procedure and energy-grid spatial-layout data; the
  compromised information did not include customer-sensitive data, and
  LELWD re-architected its network to remove adversary advantage.
  Significant because LELWD is a small municipal utility — not a
  national CII operator — underscoring the breadth of Volt Typhoon
  pre-positioning against second-tier US energy assets.
false_flag_risk: none
campaign_id: volt-typhoon-cii-prepositioning
summary: |
  Among the first publicly documented post-AA23-144A Volt Typhoon
  victim case studies with operational specificity, and the first
  disclosed VOLTZITE compromise of a US electric utility. The
  small-utility profile makes the case doctrinally salient: a
  300-plus-day dwell at a municipal electric/water utility whose
  attackers collected grid-operations targeting data — which Dragos
  said would let the adversary "know exactly where to attack" for a
  future "Stage 2 capability" — reads as collection in service of
  pre-positioning for grid disruption rather than conventional
  intelligence collection. A competing espionage-only reading
  survives (the LELWD GM described it as "reconnaissance and
  espionage," and Dragos noted Volt Typhoon has not been observed
  causing disruption), which is why the Taiwan-contingency link is
  inferred rather than attested here.
