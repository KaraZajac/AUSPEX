outcome_summary: |
  Volt Typhoon presence inside the Littleton Electric Light &
  Water Department (LELWD), a small Massachusetts municipal
  utility, discovered in November 2023 after approximately 300
  days of dwell (initial access estimated February 2023). Dragos
  case study reported lateral movement and data exfiltration but
  no compromise of customer-sensitive data per the investigation.
  Significant because LELWD is a small municipal utility — not a
  national CII operator — which underscores the breadth of Volt
  Typhoon's pre-positioning targeting against second-tier US
  energy assets.
false_flag_risk: none
campaign_id: volt-typhoon-cii-prepositioning
summary: |
  One of the first publicly documented post-AA23-144a Volt
  Typhoon victim case studies with operational specificity. The
  small-utility profile makes the case doctrinally important: a
  300-day dwell at a municipal electric / water utility with no
  obvious immediate intelligence value is most parsimoniously
  explained by pre-positioning against a Taiwan-contingency-era
  US homeland disruption mission rather than collection.
