  notes: |
    Audited against the RAW Mandiant primary report "Sandworm Disrupts Power in Ukraine Using a Novel Attack Against Operational Technology" (9 Nov 2023). Snapshot mandiant__2023-11-09_sandworm-disrupts-power-ukraine-ot.html, sha256 74337e4c…f3cc66ea, 376629 bytes. NOT a phantom — the URL returns the genuine article (title + datePublished 2023-11-09 + full body all match).
    [a] FACTS — several corrections. (1) Stripped FABRICATED tradecraft: the source contains NO "OPC" (grep count 0) and NO "engineering workstation" (grep count 0); the old "60870-5-104 disconnect-via-OPC command … on the engineering workstation" was rewritten to the sourced mechanism — operators leveraged an ISO ("a.iso") to run scilc.exe, "a native utility that is part of the MicroSCADA software suite" (in \sc\prog\exec of the MicroSCADA install) on the hypervisor-hosted SCADA/MicroSCADA management instance, executing SCIL commands that "would have caused the MicroSCADA server to relay the commands to the substation RTUs via either the IEC-60870-5-104 protocol for TCP/IP connections or the IEC-60870-5-101 protocol for serial connections." (2) De-overstated the disconnect: Mandiant hedges — "we were unable to identify the SCIL commands executed, we believe they were probably commands to open circuit breakers"; "a likely attempt … to switch off substations." Reworded from the flat "issue a substation disconnection command" to the hedged form. The outage itself IS affirmed: "we are aware that the attack resulted in an unscheduled power outage." (3) "energy infrastructure" → "critical infrastructure": Mandiant says the missile strikes hit "critical infrastructure across … several Ukrainian cities, including the city in which the victim was located," never "energy infrastructure" — fixed in summary + outcome_summary. (4) Removed the unsourced/anachronistic "held in disclosure until the APT44 promotion arc (culminated April 2024)": this Nov-2023 report PRECEDED the April-2024 APT44 promotion, so it was not "held until" it; replaced with the sourced UNC3810→Sandworm merge and the ~13-month disclosure lag. (5) VERIFIED and kept: living-off-the-land / "significant shift in techniques" / "novel technique"; the Industroyer/INDUSTROYER.V2 contrast (source names both); CaddyWiper — "a new variant of CADDYWIPER in the victim's IT environment," "two days after the OT event" (added the IT-environment precision); the hypervisor-hosted SCADA management instance; intrusion "began on, or prior to, June 2022." initial_vector unknown ✓ ("unable to identify the initial access vector into the IT environment"). Added incident_type cyber-physical + wiper (Mandiant's own "cyber physical" framing; CADDYWIPER deployment). Added targets country: ua (victim explicitly a "Ukrainian critical infrastructure organization").
    [b] ATTRIBUTION — Mandiant firmly attributes with no hedge on the actor ("the Russia-linked threat actor Sandworm targeted…"; "initially tracked … as UNC3810 before merging the cluster with Sandworm"); attributing_org_confidence high supported. Added attribution notes carrying the verbatim GRU/unit language. auspex_assessment concur retained.
    [c] DATES — all correct, no change. start_date 2022-10-10 = the OT disruptive event ("culminated in two disruptive events on October 10 and 12, 2022"); end_date 2022-10-12 = the CaddyWiper follow-on; disclosure_date 2023-11-09 = the report's datePublished; source published_on 2023-11-09 ✓. Op month (Oct-2022) vs disclosure (Nov-2023) correctly separated, per the task's date-care flag.
    [d] DOCTRINE — energy-weaponization/grid-attack KEPT attested: Mandiant states the grid-disruption outright (title "Sandworm Disrupts Power in Ukraine"; "unplanned power outage" from tripping "substation circuit breakers"); re-anchored the reasoning on that stated power-disruption (not the hedged cyber-kinetic coordination) and added inference_basis.source_quote. military-doctrine-2014/non-contact-warfare KEPT strongly_inferred; corrected the signal fragment to the accurate quote "the timing of the attack overlaps with Russian kinetic operations"; the reasoning's "we lack sufficient evidence to assess a possible link" is verbatim-correct. russkiy-mir/ukraine-theater DOWNGRADED strongly_inferred→plausible: single-source op, Mandiant states no strategic purpose, and a war-fighting-degradation reading (non-contact-warfare) survives alongside the civilizational-subjugation one; fixed the overstated "continuous … campaign" wording and added inference_basis.alternatives.
    [e] ATTRIBUTION_LEVEL — added named-unit: the source names the specific unit — "Government indictments have linked the group to the Main Center for Special Technologies (also known as GTsST and Military Unit 74455)" — consistent with the unit-scoped actor id.
    [f] ACTOR_ID — ru/gru/74455/sandworm resolves to atlas/actors/ru/sandworm.yaml (id matches; GRU Unit 74455/GTsST; status sanctioned). No actor problem; no actor-file edit. (Task NB's "ru/gru/sandworm" slug is slightly off — the event's ru/gru/74455/sandworm is the correct, resolvable id.)
    RESIDUAL: single-source event (one Mandiant primary report); every remaining claim is now carried by that source. The cyber-kinetic-synchronisation reading stays explicitly hedged by Mandiant and is modeled as strongly_inferred/plausible, never attested.
