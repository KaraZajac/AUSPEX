id: 2023-11/sandworm-microscada-power-disruption
name: Sandworm MicroSCADA living-off-the-land power disruption (Oct 2022 op, disclosed Nov 2023)
start_date: 2022-10-10
disclosure_date: 2023-11-09
end_date: 2022-10-12
incident_type:
  - intrusion
  - destructive
  - disruption
  - cyber-physical
  - wiper
initial_vector: unknown
outcome_summary: |
  In October 2022 Sandworm abused a native MicroSCADA utility
  (scilc.exe) on the hypervisor-hosted SCADA/MicroSCADA management
  instance of a Ukrainian critical-infrastructure operator to run
  unauthorised SCIL commands — which Mandiant assesses were probably
  intended to open the victim's substation circuit breakers (the
  exact commands were not recoverable). The attack resulted in an
  unscheduled power outage that coincided with the start of mass
  Russian missile strikes on critical infrastructure across several
  Ukrainian cities, though Mandiant states it lacks sufficient
  evidence to confirm a cyber-kinetic link. Two days later Sandworm
  deployed a new CaddyWiper variant in the victim's IT environment.
  Disclosed by Mandiant on 9 November 2023.
false_flag_risk: none
campaign_id: sandworm-ukraine-grid-wave
summary: |
  Doctrinally significant for two reasons. First, the operation
  marked a significant shift in Sandworm's OT tradecraft: instead
  of deploying purpose-built ICS malware (as in the Industroyer /
  Industroyer2 incidents), operators abused scilc.exe — a native
  binary of the victim's own MicroSCADA control system — to run
  unauthorised SCIL commands that, Mandiant assesses, were probably
  meant to open substation circuit breakers, relayed to the
  substation RTUs over IEC-60870-5-104 (TCP/IP) or -101 (serial).
  Living-off-the-land OT abuse of this kind is lighter-weight and
  harder for defenders to detect than dedicated ICS malware.
  Second, the resulting power outage coincided with the start of
  mass Russian missile strikes on critical infrastructure across
  several Ukrainian cities (including the victim's city), a
  candidate case of cyber-kinetic co-timing — though Mandiant notes
  the overlap while stating it lacks sufficient evidence to assess
  a possible link. Mandiant initially tracked the intrusion as
  UNC3810 before merging it into Sandworm, and disclosed the
  October 2022 operation roughly thirteen months later, on
  9 November 2023.
