id: 2023-11/sandworm-microscada-power-disruption
name: Sandworm MicroSCADA living-off-the-land power disruption (Oct 2022 op, disclosed Nov 2023)
start_date: 2022-10-10
disclosure_date: 2023-11-09
end_date: 2022-10-12
incident_type:
  - intrusion
  - destructive
  - disruption
initial_vector: unknown
outcome_summary: |
  Sandworm used a native ICS binary (MicroSCADA) on a Ukrainian
  critical-infrastructure operator's hypervisor to issue a
  substation disconnection command in October 2022, causing an
  unplanned power outage that coincided with kinetic missile
  strikes against Ukrainian energy infrastructure. Two days later,
  Sandworm deployed a CaddyWiper variant against the same victim.
  Disclosed by Mandiant on 9 November 2023.
false_flag_risk: none
campaign_id: sandworm-ukraine-grid-wave
summary: |
  Doctrinally significant for two reasons. First, the operation
  pioneered Sandworm's living-off-the-land OT tradecraft: instead
  of deploying purpose-built ICS malware (Industroyer / Industroyer2),
  operators abused a native MicroSCADA control binary already on
  the engineering workstation to issue a 60870-5-104
  disconnect-via-OPC command — much harder to detect and signature.
  Second, the cyber substation disconnect was coordinated with
  kinetic missile strikes on Ukrainian energy infrastructure,
  giving a clean attested case of cyber-kinetic synchronisation in
  the post-invasion energy campaign. The 2022 operation was held
  in disclosure until the APT44 promotion arc (which culminated
  April 2024).
