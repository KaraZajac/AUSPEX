id: 2023-11/fred-hutch-hunters-international-patient-extortion
name: Hunters International breach + patient-direct extortion of Fred Hutchinson Cancer Center
start_date: 2023-11-19
disclosure_date: 2023-12-01
end_date: null
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: unknown
false_flag_risk: none
summary: |
  Fred Hutchinson Cancer Center (Seattle) was breached in November
  2023; the Hunters International ransomware group exfiltrated patient
  data and, rather than (or in addition to) extorting the institution,
  emailed individual patients directly demanding small payments (~USD
  50) to avoid their personal/medical data being sold, in some cases
  accompanied by swatting-style threats. This is the debut of the
  patient-direct extortion tactic that was reused weeks later against
  Integris Health (2024-02/integris-hunters-international-doxing) — the
  event this record is the precedent for. ~1 million patients were
  affected; class-action litigation reportedly settled for ~USD 52M.
outcome_summary: |
  Fred Hutch disclosed a cybersecurity incident affecting its clinical
  network in late November 2023; patient-direct extortion emails
  followed in December. Reported affected population ~1 million;
  consolidated class actions were reported to settle for ~USD 52
  million. (Figures pending full census verification — see notes.)
notes: |
  Placeholder record: this event was CREATED 2026-07-04 (Kara-approved)
  as a missing precedent for the Integris patient-direct-extortion
  event. It is UNSTAMPED — it carries only the one already-snapshotted
  cross-cutting source (DataBreaches.net's Fred-Hutch+Integris piece)
  and needs a full census audit to add Fred-Hutch-specific primaries
  (Fred Hutch notice, BleepingComputer 2023-12, HHS OCR portal,
  settlement coverage), snapshot them, verify the ~1M / ~USD 52M
  figures + exact dates, and set the qc stamp.
