    notes: |
      No vendor or government forensic attribution exists, and Fred
      Hutch's own notices (Dec 1 and Dec 22, 2023) name no perpetrator.
      The naming is journalism-level: BleepingComputer (2023-12-15)
      reported "The Hunters International ransomware gang claimed to be
      behind a cyberattack on the Fred Hutchinson Cancer Center," based
      on the gang's own dark-web leak-site listing and the patient
      extortion emails. DataBreaches.net (2023-12-28), in direct contact
      with the operator, was told "we work with them" and later "I'm not
      hunters" — an affiliate-style hedge identical to the Integris case.
      Caveat on concur: attribution is the group's self-claim plus
      journalist tactic-matching, so the hands-on operator may be a
      Hunters International affiliate rather than its core team.
      attribution_level = named-actor (a specific criminal group is
      named; no nation or unit — criminal/, no state nexus).
