id: 2023-11/fred-hutch-hunters-international-patient-extortion
name: Hunters International breach + patient-direct extortion of Fred Hutchinson Cancer Center
start_date: 2023-11-19
disclosure_date: 2023-12-01
end_date: null
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: unknown
false_flag_risk: none
summary: |
  Fred Hutchinson Cancer Center (Seattle) detected unauthorized
  activity on its clinical network on November 19, 2023; an intruder
  accessed the network and obtained patient information between
  November 19 and November 25, 2023, per Fred Hutch's own notices. The
  center publicly disclosed the incident on December 1, 2023 and issued
  a formal patient notification on December 22, 2023 — neither
  first-party notice named a perpetrator. In mid-December the Hunters
  International group listed Fred Hutch on its dark-web extortion portal
  (threatening to leak 533.1 GB) and, rather than only extorting the
  institution, emailed individual patients directly demanding USD 50
  each to keep their data from being sold (BleepingComputer, Dec 15).
  The attackers' emails claimed the data of "over 800,000 patients";
  Fred Hutch later reported the breach to the HHS Office for Civil
  Rights as affecting up to 1,840,927 individuals. In separate contact
  with DataBreaches.net the extortionists claimed to have threatened to
  "swat" (make hoax emergency calls against) patients during the Fred
  Hutch negotiations — a claim DataBreaches could not confirm was ever
  carried out and that no other outlet reported. This is the precedent
  case for the patient-direct extortion tactic reused weeks later
  against Integris Health
  (2024-02/integris-hunters-international-doxing) — the event this
  record is the precedent for; DataBreaches characterized the
  patient-direct approach as a possible emerging "new normal."
  Attribution rests on journalism (Hunters International's own leak-site
  claim as reported by BleepingComputer) rather than vendor or
  government forensics; as with Integris, the hands-on operator told
  DataBreaches "we work with them" while denying being Hunters
  International, so it may be an affiliate rather than the core group.
outcome_summary: |
  All Fred Hutch clinics remained open and its electronic medical
  record system was not accessed; the clinical network was quarantined
  and taken offline during response, and Fred Hutch stated it did not
  pay the ransom. Its initial notice said forensics had "not produced
  evidence that the attackers stole patient data," a position overtaken
  by the subsequent HHS OCR breach report of up to 1,840,927 affected
  individuals — roughly double the attackers' own 800,000 claim.
  Consolidated class-action litigation naming Fred Hutchinson Cancer
  Center and the University of Washington as co-defendants was settled
  in 2025 for an aggregate of almost USD 52.5 million: about USD 25.5M
  for insurance/medical-fraud monitoring, USD 11.5M cash to the class,
  and about USD 13.5M for security-infrastructure improvements.
