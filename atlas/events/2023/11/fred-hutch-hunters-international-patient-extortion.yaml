  notes: |
    FULL CENSUS AUDIT of a Kara-created stub (2026-07-04) that previously
    carried only DataBreaches' cross-cutting Fred-Hutch+Integris piece and
    an unverified "~1 million / ~USD 52M" placeholder. Five real sources
    were created, fetched live (all HTTP 200), snapshotted and hashed; the
    existing DataBreaches source was hash-re-verified and retained.
      S1 fredhutch/2023-12-01_notice-of-information-security-incident
         (first-party, sha 26525070…6ade398a, 121,892 B) — disclosure anchor.
      S2 fredhutch/2023-12-22_notifies-patients-of-data-security-incident
         (first-party, sha ad8adca3…13ddd26d, 122,463 B) — access window + data types.
      S3 bleepingcomputer/2023-12-15_ransomware-gang-behind-threats-fred-hutch-cancer-patients
         (Bill Toulas, sha 1a90721d…81a60141, 89,347 B) — Hunters naming + tactic.
      S4 hipaajournal/2023-12-28_fred-hutch-lawsuits-mount
         (sha a9cf8e13…591d6944, 389,250 B) — HHS OCR figure + UW co-defendant.
      S5 scworld/2025-06-02_fred-hutch-52m-settlement
         (SC Media, sha 1732ef4c…b4039de6, 103,113 B) — ~$52.5M settlement + components.
      S6 databreaches/2023-12-28_fred-hutch-integris-patient-extortion-new-normal
         (existing; hash re-verified 6fbb8b6c…5e13c46b, 162,067 B) — swatting claim + affiliate hedge.
    The HHS OCR portal (ocrportal.hhs.gov) is a non-permalink JS search
    shell (curl returns a 13,503-B frontpage redirect containing neither
    "Fred Hutch" nor the figure), so the official OCR count is carried via
    S4, which quotes it verbatim — not recorded as a phantom hash.

    [a] FACTS — corrections vs the raw sources:
      * "~1 million patients affected" CORRECTED -> 1,840,927 (the count
        Fred Hutch reported to HHS OCR): S4 "the breach was reported to
        the HHS' Office for Civil Rights by Fred Hutchinson Cancer Center
        as involving the data of up to 1,840,927 individuals." The
        attackers' own claim was lower — "over 800,000 patients" (S3; S4;
        S5) — so the ~1M placeholder split the difference and was wrong;
        set quantified_impact.patients_affected 1840927.
      * Access dates source-carried: S2 "on November 19, 2023, Fred
        Hutchinson Cancer Center detected unauthorized activity … accessed
        the clinical network and obtained patient information … between
        November 19 and November 25, 2023"; S3 "a cybersecurity incident
        that occurred on November 19, 2023."
      * Patient-direct extortion + USD 50 CARRIED: S3 "a link to a site
        where they could pay $50 to prevent the data from being sold";
        dark-web listing "533.1GB", portal add-date Dec 15 (S3).
      * SWATTING reframed to its single-source, TA-claimed, UNCONFIRMED
        status: only S6 documents it — the TA "get upset when we threat to
        swat patients"; asked if seriously considering it, "why not?" but
        then "We did not," and DataBreaches "does not know at this point
        whether the swat threat was actually made" (Fred Hutch did not
        reply). No mainstream outlet (S3/S4/S5) mentions swatting; the
        stub's flat "accompanied by swatting-style threats" is now hedged.
      * "~USD 52M settlement" CONFIRMED and made precise: S5 "an almost
        $52.5 million settlement … a Hunters International ransomware
        attack in November 2023" = $25.5M insurance/medical-fraud
        monitoring + $11.5M cash to the class + ~$13.5M security
        infrastructure. (The divergent "$11.5M" headline elsewhere is only
        the cash sub-component — recorded in S5's notes.)
      * Ransom-not-paid + clinics-open + EMR-untouched CARRIED: S5 "Fred
        Hutch emphasized not paying the ransom"; S2 "electronic medical
        record system was not involved or accessed, and all Fred Hutch
        clinics have remained open"; S3 "quarantined the impacted servers,
        took its clinical network offline"; initial no-evidence-of-theft
        statement S3 "has not produced evidence that the attackers stole
        patient data" (later overtaken by the OCR breach report).
      * incident_type kept [intrusion, data-theft, extortion] — NOT
        ransomware: no encryption of Fred Hutch is documented (network
        quarantined, clinics open, EMR untouched); sources call Hunters a
        "ransomware gang"/the case a "ransomware attack" but the Fred Hutch
        monetization was data-theft + patient-direct extortion (mirrors the
        Integris sibling).
      * initial_vector kept UNKNOWN: Citrix Bleed (CVE-2023-4966) is
        floated in some secondary/academic coverage (a UW JSIS analysis;
        aggregated search summaries) but appears in NONE of the six cited
        sources — S1/S2 disclose no vector and S3/S4/S5 do not name Citrix
        — so it is left unknown per "unsure -> null + note."
    [b] ATTRIBUTION — attributing_org normalized to "BleepingComputer /
        DataBreaches.net (journalism)"; attribution_source_id repointed
        S6 -> S3 (BleepingComputer Dec 15 = the earliest confident public
        naming of Hunters International for Fred Hutch). attribution_date
        2023-12-28 -> 2023-12-15. Confidence kept moderate;
        auspex_assessment kept concur-with-caveat (self-claim + journalist
        tactic-matching; S6's "we work with them"/"I'm not hunters"
        affiliate hedge means the hands-on operator may be an affiliate —
        same caveat as Integris). Neither first-party notice (S1/S2) names
        any actor.
    [c] DATES — start_date 2023-11-19 KEPT (now S2/S3-carried);
        disclosure_date 2023-12-01 KEPT and now source-carried by S1
        ("SEATTLE – DECEMBER 1, 2023 – … today announced the detection of
        unauthorized activity"); end_date null KEPT (unbounded). All six
        published_on values verified against page metadata/bylines
        (2023-12-01, 2023-12-22, 2023-12-15, 2023-12-28, 2025-06-02,
        2023-12-28).
    [d] DOCTRINE_LINKS — [] KEPT, correct: financially-motivated criminal
        actor, no source-documented state nexus, no doctrine applies;
        nothing invented, no attesting_source_id needed.
    [e] ATTRIBUTION_LEVEL — named-actor KEPT/confirmed: a specific criminal
        group is named (Hunters International), no nation or unit.
    [f] ACTOR_ID — criminal/hunters-international resolves to
        atlas/actors/criminal/hunters-international.yaml; criminal/
        placement (no state nexus) consistent with all sources.

    RESIDUAL UNCERTAINTIES: (1) affected-count spread — 800,000 (attackers'
    claim) vs 1,840,927 (HHS OCR, used) vs a "~2.1M" class figure cited in
