id: 2023-11/yamaha-motor-philippines-inc-ransom
name: INC Ransom ransomware against Yamaha Motor Philippines
start_date: 2023-10-25
disclosure_date: 2023-11-16
end_date: null
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown
outcome_summary: |
  A ransomware attack on Yamaha Motor Philippines, Inc. (YMPH), the
  motorcycle-manufacturing and sales subsidiary of Yamaha Motor
  Company, was detected on October 25, 2023 and reported to Philippine
  authorities on October 27. Yamaha confirmed in a November 16, 2023
  statement that some employees' personal information stored by YMPH
  had been leaked, and that the intrusion was limited to a single YMPH
  server without affecting Yamaha Motor group headquarters or other
  group companies. The INC Ransom gang added YMPH to its dark-web leak
  site on November 15 and published roughly 37 GB of allegedly stolen
  data (employee ID information, backup files, and corporate/sales
  documents). Yamaha itself did not attribute the attack to any group.
false_flag_risk: none
summary: |
  An early, high-profile victim of the INC Ransom data-extortion
  cluster, which emerged around July-August 2023. Attribution rests on
  INC Ransom's own leak-site self-claim — corroborated by the group's
  publication of ~37 GB of Yamaha data — not on any government advisory
  or first-party naming; Yamaha confirmed the ransomware incident and
  the employee-data leak but declined to name the perpetrator. INC
  Ransom is a financially-motivated criminal cluster with no documented
  state nexus, so no doctrine link applies.
