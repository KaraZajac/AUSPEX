  notes: |
    PHANTOM-REMEDIATION path: RE-SOURCE (badrabbit model). The event's
    sole prior citation (both the only source and the attribution_source_id)
    was ncsc-uk/2024-03-27_nhs-dumfries-galloway-statement — a real primary
    document about a DIFFERENT INC Ransom victim (NHS Dumfries & Galloway,
    Scotland, March 2024). Wrong-source defect, not a fabricated event: the
    Yamaha Motor Philippines incident is real and well documented. Removed
    the NHS source from this event and re-pointed to three genuine sources,
    all curl-snapshotted to atlas/sources/raw/ and content-verified:
      - yamaha/2023-11-16_unauthorized-access-server-philippines-subsidiary
        (first-party press release), sha256 552b5351...0b45ed71, 54,480 bytes.
      - bleepingcomputer/2023-11-17_yamaha-motor-confirms-ransomware-attack-philippines
        (journalism, Sergiu Gatlan), sha256 4eb1bf33...c0ce7b27, 89,979 bytes.
      - securityweek/2023-11-20_yamaha-motor-confirms-data-breach
        (journalism, Ionut Arghire), sha256 cdcd8f06...bf4a1e04, 156,106 bytes.

    [a] FACTS — all now source-carried. start_date 2023-10-25 = detection
    (Yamaha: "October 25 It was confirmed that YMPH was being hit by a
    ransomware attack."; BleepingComputer: "the breach was first detected on
    October 25"). disclosure_date 2023-11-16 = Yamaha's statement (Yamaha:
    "November 16 It was confirmed that some employees' personal information
    stored by YMPH had been leaked."). Data leak scope ~37 GB (BleepingComputer:
    "roughly 37GB of allegedly stolen data containing employee ID info, backup
    files, and corporate and sales information"). Incident contained to one
    YMPH server, no group-HQ impact (Yamaha, verbatim). CORRECTIONS: (1)
    end_date 2023-12-30 -> null — no source supports a Dec-30 end; that date
    is the disclosure_date of the sibling Xerox INC Ransom event and appears
    to be a copy artifact. (2) STRIPPED outcome_summary's "earliest publicly
    attributed major INC Ransom victim outside North America" — an unsourced
    superlative. (3) STRIPPED summary's "Establishes the INC Ransom geographic
    distribution as international from inception" — unsourced analytic claim;
    softened "one of the first publicly attributed campaigns" to "an early,
    high-profile victim." (4) Reordered the leak/statement sequence: the
    leak-site listing (Nov 15) preceded Yamaha's statement (Nov 16); removed
    the unsourced "after no ransom was paid." initial_vector kept `unknown`
    — no source establishes the vector for THIS intrusion (BleepingComputer
    cites only INC Ransom's general TTPs: spearphishing / Citrix NetScaler
    CVE-2023-3519).

    [b] ATTRIBUTION — this is a leak-site SELF-CLAIM, not a confirmed
    attribution. Yamaha "has yet to attribute the attack to a specific
    operation" (BleepingComputer); INC Ransom self-claimed by posting YMPH
    to its leak site. CORRECTIONS: attributing_org "Yamaha Motor Philippines
    + INC Ransom (self-claimed)" -> "INC Ransom (leak-site self-claim),
    reported by BleepingComputer / SecurityWeek" (Yamaha did not name the
    group, so it should not be credited as an attributing org);
    attributing_org_confidence high -> moderate (over-attestation: criminal
    self-claim, no govt/forensic confirmation; matches sibling Xerox event);
    auspex_assessment concur -> concur-with-caveat (caveat = self-claim,
    though corroborated by the 37 GB data dump); attribution_date 2023-11-16
    -> 2023-11-15 (date the claim was made = leak-site listing);
    attribution_source_id re-pointed from the NHS phantom to the
    BleepingComputer record that carries the self-claim.

    [c] DATES — source published_on set to each article's real date (Yamaha
    2023-11-16, BleepingComputer 2023-11-17, SecurityWeek 2023-11-20), all
