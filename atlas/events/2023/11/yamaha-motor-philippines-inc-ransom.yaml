id: 2023-11/yamaha-motor-philippines-inc-ransom
name: INC Ransom ransomware against Yamaha Motor Philippines
start_date: 2023-10-25
disclosure_date: 2023-11-16
end_date: 2023-12-30
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown
outcome_summary: |
  INC Ransom claimed responsibility for a ransomware intrusion
  against Yamaha Motor Philippines, the regional motorcycle-
  manufacturing subsidiary of Yamaha Motor Company. The company
  confirmed in a November 16, 2023 statement that employee data
  had been compromised. INC Ransom subsequently posted the
  exfiltrated dataset on its leak site after no ransom was
  paid. The incident is the earliest publicly attributed major
  INC Ransom victim outside North America.
false_flag_risk: none
summary: |
  Notable as one of the first publicly attributed INC Ransom
  campaigns following the cluster's July 2023 emergence.
  Establishes the INC Ransom geographic distribution as
  international from inception rather than concentrated in any
  single jurisdiction.
attributions:
  - actor_id: criminal/inc-ransom
    attributing_org: Yamaha Motor Philippines + INC Ransom (self-claimed)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2023-11-16
    attribution_source_id: ncsc-uk/2024-03-27_nhs-dumfries-galloway-statement
    notes: |
      Yamaha Motor Philippines confirmed the incident in a public
      statement; INC Ransom self-claimed via its leak site. No
      primary government advisory specific to this case;
      attribution_source_id is the nearest contemporaneous primary
      documentation of INC Ransom activity.
