    reasoning: |
      A pro-Palestinian hacktivist persona that multiple vendors
      assess as Iran-directed, used as a deniable front for
      coordinated destructive operations against Israel — the
      persona-laundering operating mode. The Iran attribution is a
      hedged, persona-disputed assessment, so this is inferred
      rather than attested.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Persona self-brands as 'Palestinian state cyber warriors' (SecurityWeek) / pro-Palestinian resistance and declines to confirm its origins ('Cyber Toufan has not commented about its origins'; it dismisses vendor attribution) — the presentation expected of a deniable front."
        - "Multiple vendors assess an Iran nexus: Check Point 'called Cyber Toufan an Iranian threat actor' and groups it with CyberAv3ngers among actors 'affiliated with Iran'; ~10 Iranian-backed groups are attacking Israel with Cyber Toufan 'the most notorious' (The Record); the ICT and SecurityWeek report indications 'pointing towards Iran as the likely supporter'; SOC Radar: 'potentially state-sponsored'."
        - "State-tied operational discipline atypical of grassroots hacktivism: the group 'changes tactics depending on what's happening on the battlefield' and 'halted the leaks during a recent cease-fire' (Check Point via The Record), atop a rehearsed Shred wiper and a hosting-provider supply-chain pivot affecting ~100 organizations."
      ruled_out: "Genuine independent Palestinian grassroots hacktivism (the persona's own self-claim): assessed less likely given the sophistication, ~100-org scale, Shred wiper tradecraft and ceasefire-synchronized tempo that multiple vendors read as state-directed — but the Iran direction remains a hedged, persona-disputed vendor ASSESSMENT, so the link is held at strongly_inferred, not attested."
    perspective: attacker-rationale
    contested: false
    analyst: claude
