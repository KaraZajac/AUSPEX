id: 2023-11/cyber-toufan-signature-it-wave
name: Cyber Toufan launches Signature-IT pivot destructive wave against Israeli organizations
start_date: 2023-11-16
disclosure_date: 2023-11-18
end_date: 2023-12-31
incident_type:
  - intrusion
  - destructive
  - wiper
  - data-theft
  - leak
  - supply-chain
  - influence-operation
initial_vector: supply-chain  # via Signature-IT hosting provider (Check Point assessment; persona disputed it explained all leaks)
outcome_summary: |
  Beginning in mid-to-late November 2023, the Cyber Toufan persona
  ran a destructive "leak-a-day" campaign against Israeli
  organizations, coupling Telegram data leaks with file-wiping.
  Check Point assessed that the leaks appeared to stem largely from
  a single compromise of the Israeli hosting provider Signature-IT;
  Cyber Toufan publicly disputed that all of the leaks traced to
  that one hack. Security researchers counted roughly 100 affected
  Israeli organizations (Kevin Beaumont: data of ~59 orgs leaked on
  the group's Telegram channel, with ~40 more likely compromised
  via the hosting/MSP pivot; SecurityWeek reported "over 100").
  Named victims include the Israel Innovation Authority, Israel
  National Archive, Ministry of Welfare and Social Security,
  Ministry of Health, Israel Securities Authority, Toyota Israel,
  IKEA, Homecenter Israel, Israel Nature and Parks, Radware, Max
  Security & Intelligence, and academic institutions (e.g. the
  Academic College of Tel Aviv). The persona used the legitimate
  Linux "shred" utility — wrapped in its own shell script — to
  delete files "in an unrecoverable fashion"; Beaumont reported
  several victims remained offline for weeks with backups erased,
  and that about a third had not recovered. The group also emailed
  victims' customers to spread propaganda and urge boycotts of
  Israel-linked vendors.
quantified_impact:
  affected_organizations_est: 100
false_flag_risk: suspected  # presents as pro-Palestinian
summary: |
  A first-magnitude post-October-7 destructive-and-leak operation
  against Israeli civilian-government and commercial targets,
  conducted by a persona that self-brands as "Palestinian state
  cyber warriors" while multiple vendors assess an Iran nexus
  (Check Point calls it "an Iranian threat actor"; the ICT and
  SecurityWeek report indications "pointing towards Iran as the
  likely supporter"; SOC Radar: "potentially state-sponsored"). No
  cited source names a specific Iranian service, so the attribution
  sits at the named-actor / nation level (ir/unscoped), and the
  Iran direction is an assessment the persona itself disputes.
  Doctrinally it is a canonical instance of the Iran-aligned
  hacktivist-persona pattern: a deniable pro-Palestinian front
  (persona-laundering) executing coordinated destructive coercion
  against Israel, whose operational discipline — a hosting-provider
  supply-chain pivot, a rehearsed Shred wiper, a scheduled leak
  cadence, and pausing leaks during a ceasefire — exceeds typical
  grassroots hacktivism.
