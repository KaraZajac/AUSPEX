id: 2023-11/cyber-toufan-signature-it-wave
name: Cyber Toufan launches Signature-IT pivot destructive wave against Israeli organizations
start_date: 2023-11-16
disclosure_date: 2023-11-18
end_date: 2023-12-31
incident_type:
  - destructive
  - wiper
  - data-theft
  - influence-operation
initial_vector: supply-chain  # via Signature-IT hosting provider
outcome_summary: |
  On 16 November 2023 the Cyber Toufan persona launched a
  destructive cyber operation against the Israeli hosting provider
  Signature-IT and pivoted from that single compromise to
  destructive operations against approximately 40-100 downstream
  Israeli organizations. Victim list includes the Israel
  Innovation Authority, Israel National Archive, Ministry of
  Welfare and Social Security, Ministry of Health, Israel
  Securities Authority, Toyota Israel, IKEA Israel, Homecenter
  Israel, Israel Nature and Parks Authority, Radware, Max
  Security, and multiple academic institutions. The persona
  used the legitimate Linux "shred" utility for unrecoverable
  file destruction; several victim organizations remained
  offline for weeks. The Israel National Archive remained
  degraded for approximately seven months.
quantified_impact:
  affected_organizations_est: 100
  national-archive_offline_months: 7
false_flag_risk: suspected  # presents as pro-Palestinian
summary: |
  First-magnitude post-October-7 destructive operation against
  Israeli civilian-government and commercial sectors. Doctrinally
  important as the canonical post-October-7 example of the
  hacktivist-persona-as-MOIS-front pattern (alongside Handala's
  18 December 2023 launch); the Signature-IT supply-chain pivot
  illustrates the operational planning that distinguishes Iranian
  state-aligned operations from genuine hacktivism. Microsoft's
  February 2024 framing of the post-October-7 Iranian cyber
  posture as "reactive and chaotic" notwithstanding, Cyber
  Toufan's specific tradecraft (Shred-based Linux wiper,
  hosting-provider pivot, coordinated leak schedule) indicates
  pre-positioned access and rehearsed playbook.
