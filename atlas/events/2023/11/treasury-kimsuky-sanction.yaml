initial_vector: unknown
outcome_summary: |
  Treasury OFAC sanctioned cyber-espionage group Kimsuky —
  described by OFAC as "gathering intelligence to support the
  DPRK's strategic objectives" and subordinate to the
  Reconnaissance General Bureau (RGB), the DPRK's primary
  foreign intelligence service. The designation was one strand
  of a coordinated multilateral action in which Australia,
  Japan, the Republic of Korea, and the United States sanctioned
  the DPRK in response to its November 21, 2023 claimed military
  reconnaissance-satellite launch. OFAC framed Kimsuky as
  "primarily an intelligence collection entity," distinct from
  the revenue-generation and materiel-procurement agents
  sanctioned the same day. Designated pursuant to E.O. 13687.
false_flag_risk: none
summary: |
  Documentary / counter-action event: the US Treasury OFAC
  designation that consolidates Kimsuky as a sanctioned DPRK
  government cyber-espionage actor and, in OFAC's own words,
  equates the cluster to the industry names APT43, Emerald
  Sleet, Velvet Chollima, TA406, and Black Banshee. OFAC states
  Kimsuky has been active since 2012, is subordinate to the RGB,
  and — though "primarily an intelligence collection entity" —
  runs cyber-espionage campaigns that "directly support the
  DPRK's strategic and nuclear ambitions." Modeled as a
  null-actor counter-action (a US state action against a DPRK
  actor); Kimsuky is the sanctioned subject described here, not
  the event's operating actor.
