id: 2023-11/treasury-kimsuky-sanction
name: Treasury SDN designation of Kimsuky
start_date: 2023-11-30
disclosure_date: 2023-11-30
end_date: 2023-11-30
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Treasury OFAC designated Kimsuky as a DPRK government cyber
  actor responsible for stealing strategic intelligence in
  support of the regime. ROK Ministry of Foreign Affairs
  imposed counterpart sanctions contemporaneously. First US
  Treasury designation of a DPRK cyber-espionage (as distinct
  from financial-theft) cluster.
false_flag_risk: none
summary: |
  Documentary event capturing the consolidation of the
  Kimsuky cluster as a sanctioned DPRK government cyber
  espionage actor. Closes the attestation chain for Kimsuky's
  strategic-intelligence mission previously documented in
  CISA AA20-301A (October 2020) and Mandiant's APT43 report
  (March 2023).
