initial_vector: unknown
outcome_summary: |
  Treasury OFAC designated Sinbad.io as a virtual-currency
  mixer serving as a key money-laundering tool of the
  OFAC-designated Lazarus Group (DPRK). OFAC states the DPRK
  conducts such heists to generate revenue for its unlawful
  weapons of mass destruction and ballistic-missile programs.
  Sinbad was used to launder significant portions of the
  Axie Infinity / Ronin Bridge heist (~$620M, March 2022),
  the Harmony Horizon Bridge heist (~$100M, June 2022), and
  the Atomic Wallet theft (~$100M, June 2023). Industry
  experts assess Sinbad to be a likely successor to the
  previously-sanctioned Blender.io mixer.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  Attestation-chain document. Treasury's Sinbad designation
  maps three major DPRK crypto thefts — the Axie Infinity /
  Ronin Bridge, Harmony Horizon, and Atomic Wallet thefts —
  to a single laundering infrastructure, and states the DPRK
  conducts such heists to generate revenue for its WMD and
  ballistic-missile programs. In AUSPEX's reading this adds
  US-government weight to the Atomic Wallet → Lazarus link,
  which prior to this designation had rested chiefly on
  vendor attribution (Elliptic).
