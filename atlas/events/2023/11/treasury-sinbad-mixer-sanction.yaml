outcome_summary: |
  Treasury OFAC designated Sinbad.io as a virtual-currency
  mixer used by the DPRK to launder stolen virtual currency
  in support of WMD and ballistic-missile programs. Sinbad
  documented as the laundering venue for Ronin Bridge,
  Harmony Horizon, and Atomic Wallet proceeds. Successor to
  the previously-sanctioned Blender.io mixer.
false_flag_risk: none
campaign_id: ronin-laundering-trail
summary: |
  Critical attestation-chain document. Treasury's Sinbad
  designation formally maps three of the four largest DPRK
  crypto thefts (Ronin, Harmony, Atomic Wallet) to a single
  laundering infrastructure used to convert proceeds into
  WMD/ballistic-missile-program revenue. Strengthens the
  attribution for Atomic Wallet specifically, which had only
  been vendor-attributed (Elliptic) prior.
