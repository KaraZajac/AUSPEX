  notes: |
    Audited vs Treasury/OFAC press release jy1933 "Treasury
    Sanctions Mixer Used by the DPRK to Launder Stolen Virtual
    Currency" (2023-11-29). Raw snapshot captured (this audit
    resolves 1 of the 5 known un-snapshotted Treasury attestation
    sources): treasury__2023-11-29_sinbad-mixer-sanction.html,
    sha256 f57acb36…46b3db1a, 122,402 bytes. NOT a phantom — the
    home.treasury.gov URL resolves to the real release (page title
    "Treasury Sanctions Mixer Used by the DPRK to Launder Stolen
    Virtual Currency" + body match).
    [a] FACTS: verbatim-supported — "OFAC sanctioned Sinbad.io
    (Sinbad), a virtual currency mixer that serves as a key
    money-laundering tool of the OFAC-designated Lazarus Group, a
    state-sponsored cyber hacking group of the [DPRK]"; "Sinbad was
    used to launder a significant portion of the $100 million worth
    of virtual currency stolen on June 3, 2023, from customers of
    Atomic Wallet"; "Sinbad was also used to launder a significant
    portion of virtual currency from the Axie Infinity heist of
    approximately $620 million in March 2022, and the Horizon Bridge
    heist of approximately $100 million in June 2022"; "Sinbad is
    believed by some industry experts to be a successor to the
    Blender.io mixer". CORRECTIONS: (1) summary said "three of the
    four largest DPRK crypto thefts" — the source carries NO ranking
    ("largest"/"four largest" grep-absent, 0 hits); removed the
    unsourced superlative, reworded to "three major DPRK crypto
    thefts" naming the three OFAC actually lists. (2) outcome_summary
    "used by the DPRK to launder stolen virtual currency in support
    of WMD" reframed to the source's actual structure — the DPRK
    conducts the HEISTS "to generate revenue for" WMD; the mixer
    launders those proceeds; added the source's own dollar figures
    ($620M/$100M/$100M) and dates. (3) "Successor to the
    previously-sanctioned Blender.io mixer" over-stated a HEDGED
    source claim ("believed by some industry experts to be a
    successor"); softened to "Industry experts assess … likely
    successor". (4) The source literally says "Axie Infinity heist",
    not "Ronin Bridge" ("Ronin" grep-absent, 0 hits); retained the
    accepted corpus-internal identification (campaign_id
    ronin-laundering-trail; sibling 2022-03/ronin-bridge) but
    dual-labelled it "Axie Infinity / Ronin Bridge".
    [b] ATTRIBUTION: actor_id null (US-sanction counter-action) —
    CONFIRMED stays null (was kp/rgb/lazarus; nulled 2026-07-01),
    matching audited siblings treasury-blender (jy0768) and
    tornado-cash (jy0916). jy1933 names "the OFAC-designated Lazarus
    Group, a state-sponsored cyber hacking group of the [DPRK]" at
    high confidence (govt-primary) → concur. ADDED attribution_level:
    named-actor (was MISSING) — group + nation, no service/unit (RGB
    / 3rd Bureau not named). ADDED attribution notes.
    [c] DATES: source published_on 2023-11-29 ✓ (page dateline
    "November 29, 2023") = designation date = event
    start/disclosure/end 2023-11-29 ✓.
    [d] DOCTRINE: kp/8th-congress-defense-plan/revenue-aggregation/
    crypto-bridge-theft, attested — KEPT (justified). Per the
    per-event 8th-Congress rule, jy1933 states the TERMINAL WMD /
    ballistic-missile-financing goal in substance (verbatim, single
    occurrence): "the DPRK has resorted to using illicit tactics,
    such as heists perpetrated by the Lazarus Group, to generate
    revenue for its unlawful weapons of mass destruction and
    ballistic missile programs". FIXED the reasoning, which
    MISQUOTED this as "in support of the DPRK's unlawful weapons of
    mass destruction and ballistic missile programs" — that phrase
    does NOT appear in jy1933 (identical defect to the pre-audit
    Blender event). ADDED inference_basis {source_id, source_quote}
    with the verbatim text (source_quote now matches jy0768's audited
    Blender quote exactly — both OFAC releases use the same phrasing).
    attesting_source_id present ✓ (required for attested).
    [e] ATTRIBUTION_LEVEL: named-actor added (see [b]).
    [f] ACTOR_ID: null — FK n/a. NB: this audit CONFIRMS the null and
    resolves the sibling divergence the Blender + Tornado audits
    flagged (Sinbad previously carried actor_id kp/rgb/lazarus while
    the other two nulled it) — all three Treasury mixer-sanction
    siblings now null the actor.
    incident_type [documentary] → [documentary, policy] per
    orchestrator instruction (an OFAC SDN designation is a policy /
    economic-statecraft counter-action, meta incident-type set).
    RESIDUAL / FLAGS: (i) null-actor event carrying a KP
    (subject-state) attested doctrine link will surface under
    verify_atlas.py doctrine-state-mismatch — a review item, not an
    error, per the SCHEMA directionality convention (a doctrine on a
