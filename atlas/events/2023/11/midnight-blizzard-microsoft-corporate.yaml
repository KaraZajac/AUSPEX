id: 2023-11/midnight-blizzard-microsoft-corporate
name: Midnight Blizzard / SVR intrusion into Microsoft corporate environment
start_date: 2023-11-01  # MSRC: "beginning in late November 2023" (month-granular; day approximate)
disclosure_date: 2024-01-19  # public disclosure; Microsoft detected the intrusion 2024-01-12
end_date: null  # not bounded: detected 2024-01-12, but MSRC 2024-03-08 reports password-spray volume up ~10x in Feb 2024 (activity ongoing); no source states an eviction/end date
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: valid-creds  # password spray against a legacy non-production test tenant lacking MFA (MSRC 2024-01-19 + MSTIC 2024-01-25)
outcome_summary: |
  Midnight Blizzard (APT29 / SVR) used a password-spray attack to
  compromise a legacy, non-production Microsoft test tenant account
  that did not have MFA enabled, then abused a legacy OAuth application
  to grant itself the Office 365 Exchange Online full_access_as_app
  role and pivot into the Microsoft corporate environment, reading and
  exfiltrating email and attachments from a small percentage of
  corporate mailboxes — including members of senior leadership and
  staff in cybersecurity, legal, and other functions. MSRC's 2024-03-08
  update disclosed that the actor then used secrets found in that email
  to access some Microsoft source-code repositories and internal
  systems. Microsoft detected the intrusion on 2024-01-12 and publicly
  disclosed it in a 2024-01-19 MSRC blog.
false_flag_risk: none
campaign_id: apt29-midnight-blizzard
summary: |
  A canonical example of SVR cloud-identity tradecraft: legacy-tenant
  compromise via password spray → abuse of a legacy OAuth application
  granted full_access_as_app on Exchange Online → lateral movement into
  corporate Exchange. Strategic significance is the victim — Microsoft
  corporate, including senior leadership and the identity- and
  security-tooling staff who defend Microsoft's customers — and MSRC's
  assessment that the actor was "initially targeting email accounts for
  information related to Midnight Blizzard itself" (counter-intelligence
  collection). The intrusion began in late November 2023 and was
  detected and disclosed in January 2024; a 2024-03-08 MSRC update
  revealed follow-on access to source-code repositories and internal
  systems.
