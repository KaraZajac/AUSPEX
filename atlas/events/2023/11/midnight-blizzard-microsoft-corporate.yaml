id: 2023-11/midnight-blizzard-microsoft-corporate
name: Midnight Blizzard / SVR intrusion into Microsoft corporate environment
start_date: 2023-11-01  # MSRC: late November 2023
disclosure_date: 2024-01-19
end_date: 2024-01-13  # MSRC stated when access was cut
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds  # password spray against legacy non-production test tenant without MFA
outcome_summary: |
  SVR (APT29 / Midnight Blizzard) compromised a legacy
  non-production Microsoft test tenant lacking MFA via password
  spray, then abused an OAuth application granted full_access_as_app
  on Exchange Online to read corporate email of Microsoft senior
  leadership and cybersecurity, legal, and other functions. HPE
  disclosed a parallel SVR intrusion the same week. Microsoft
  disclosed the breach in a 19 January 2024 MSRC blog and contemporaneous
  SEC 8-K filing under the post-2023 incident disclosure rules.
false_flag_risk: none
campaign_id: apt29-midnight-blizzard
summary: |
  A canonical attested example of SVR cloud-identity-supply-chain
  tradecraft: legacy-tenant compromise → OAuth app abuse → tenant-
  hopping to corporate Exchange. Strategic significance is the
  victim — Microsoft corporate, including the leadership and the
  identity- and security-tooling staff defending Microsoft customers.
  HPE's parallel disclosure (24 January 2024) reinforced the campaign
  shape. The incident drove the post-Microsoft CSRB report (Apr
  2024) on Microsoft cloud security.
attributions:
