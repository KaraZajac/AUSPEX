    notes: "MSRC states 'Microsoft has identified the threat actor as Midnight Blizzard, the Russian state-sponsored actor also known as Nobelium' — a named actor (group + Russian state), NOT a named unit: this source does not name the SVR service. The SVR = APT29 = Nobelium/Midnight Blizzard equivalence rests on the actor's US/UK government sources (White House 2021-04-15, Treasury EO-14024, CISA AA23-347A)."
