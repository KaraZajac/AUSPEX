  notes: |
    Audited against the RAW Unit 42 article "Hacking Employers and Seeking Employment: Two
    Job-Related Campaigns Bear Hallmarks of North Korean Threat Actors"
    (raw_snapshot unit42__2024-06-13_north-korea-job-campaigns.html,
    sha256 0ec26b0d…62d20826, 288,914 bytes). NOT a phantom — the cited URL returns the real
    article; title + body carry BeaverTail (41), InvisibleFerret (37), Contagious Interview (35),
    Wagemole (26), NPM (50). This is the RIGHT source with a WRONG recorded date; audited + corrected
    in place (no re-source needed).

    [c] DATES — MAJOR CORRECTION. The article's actual publication date is 2023-11-21, not
    2024-06-13. Ironclad: JSON-LD "datePublished":"2023-11-21T00:00:00+00:00"; meta
    article:published_time content="2023-11-21T14:00:48+00:00"; byline "Published: November 21,
    2023"; first update log entry "Updated Dec. 1, 2023" (an article updated Dec-2023 cannot post
    Jun-2024). Fixed disclosure_date + end_date 2024-06-13 → 2023-11-21 and both attribution_date
    → 2023-11-21. start_date 2023-11-01 ("onset late 2023") was unsupported → 2022-12-01: Unit 42
    says Contagious Interview infra "established as early as December 2022" (first CI malware
    samples "as early as March 2023"; Wagemole file trove timestamped "as early as August 2022").
    NB the event id (2024-06/…) and source id (unit42/2024-06-13_…) and file paths still embed the
    wrong date — slugs are stable-forever so left in place; FLAGGED for orchestrator re-slug/move.

    [a] FACTS — stripped fabrications. (1) "hundreds of victims" — the source gives NO victim count
    (grep "hundreds" = 0); removed. (2) "targeting cryptocurrency and Web3 developers" — source says
    "software developers" (×9); "Web3" = 0 occurrences; reworded to software developers with the
    crypto-theft objective noted. (3) "Canonical TraderTraitor tradecraft ... for the 2024 cycle" —
    wrong actor label + wrong year; reframed. VERIFIED-TRUE + retained: BeaverTail = JavaScript
    stealer/loader hidden inside NPM packages hosted on/injected into GitHub ("BeaverTail is
    JavaScript-based malware hidden inside Node Package Manager (NPM) packages"); InvisibleFerret =
    cross-platform Python backdoor (fingerprinting, keylogging, browser credential + crypto-wallet
    theft, AnyDesk); chain = BeaverTail first stage → retrieves InvisibleFerret second stage;
    delivery = fake job interview, actor poses as employer, victim installs malicious NPM package;
    objective "likely cryptocurrency theft ... staging environment for additional attacks". npm
    vector VERIFIED. developer-targeting VERIFIED. Directionality: global software-developer victims
    (US + worldwide), Wagemole targets US companies + freelance marketplaces incl. Africa — matches.

    [b]/[e] ATTRIBUTION — corrected over-attestation. Contagious Interview: source = "We attribute
    with moderate confidence that Contagious Interview is run by a North Korea state-sponsored threat
    actor" → downgraded attributing_org_confidence high → moderate; set attribution_level = nation;
    auspex_assessment concur → concur-with-caveat. CRITICAL: the source names NO specific group for
    CL-STA-0240 — TraderTraitor/APT38/BlueNoroff = 0 occurrences; Lazarus (3) appears only as an
    Operation Dream Job comparison. The event's kp/rgb/tradertraitor mapping is an AUSPEX
    cross-cluster identity (BeaverTail/InvisibleFerret later folded into the TraderTraitor/Slow-Pisces
    umbrella), NOT source-stated — documented in notes + FLAGGED. Wagemole: source = "we assess with
    high confidence that Wagemole can be attributed to a North Korea-sponsored APT, which we track as
    CL-STA-0241" (basis: Korean-language passwords on US keyboards, words used only in North Korea,
    Korean keyboard settings) → attributing_org_confidence high retained (correct); added
    attribution_level = nation; attribution_date fixed. Both clusters reach NATION (DPRK), not
    named-actor, in this source.

    [d] DOCTRINE_LINKS — both kept strongly_inferred (per-event 8th-Congress rule: a vendor report
    naming only the proximate crypto-theft/regime-revenue goal is strongly_inferred, NOT attested —
    and the doctrine record's own 2026-07-02 note confirms this). Neither carries an attesting_source_id
    (correct for strongly_inferred). Added inference_basis (signals + ruled_out) to both. crypto-bridge-theft
    link: source states objective = "likely cryptocurrency theft"; BeaverTail enumerates crypto-wallet
