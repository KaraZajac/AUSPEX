    "funnel wages to its weapons programs" (weapons programs ×2) — proximate revenue purpose;
    strongly_inferred holds. Removed "Web3" from reasoning. All doctrine/pillar/program FKs resolve.

    [f] ACTOR_ID — both resolve: kp/rgb/tradertraitor (file atlas/actors/kp/tradertraitor.yaml, id
