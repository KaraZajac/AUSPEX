      signals:
        - "Unit 42 explicitly ties Wagemole to the DOJ/FBI finding that North Korea 'uses remote workers to funnel wages to its weapons programs' — the proximate revenue purpose the revenue-aggregation/it-worker-fraud program encodes."
        - "The DPRK IT-worker fraud program is independently attested as WMD-financing revenue in Treasury sb0416 (May 2024) and the 14-national DOJ indictment (Dec 2024)."
      ruled_out: |
        Ordinary financially-motivated identity fraud with no state
