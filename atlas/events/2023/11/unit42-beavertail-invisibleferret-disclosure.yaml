id: 2023-11/unit42-beavertail-invisibleferret-disclosure
name: Unit 42 disclosure of BeaverTail + InvisibleFerret Contagious Interview campaign
start_date: 2022-12-01  # AUDIT 2026-07-04: Unit 42 — Contagious Interview infra "established as early as December 2022" (first CI malware samples Mar 2023; Wagemole file trove timestamped from Aug 2022). Prior 2023-11-01 ("onset late 2023") was unsupported.
disclosure_date: 2023-11-21  # AUDIT 2026-07-04: article datePublished 2023-11-21 (JSON-LD + meta article:published_time + byline "Published: November 21, 2023"; first update Dec 1 2023). Prior 2024-06-13 was wrong.
end_date: 2023-11-21  # disclosure-event date = publication date
incident_type:
  - intrusion
  - financial-theft
  - espionage  # Wagemole "potential for both financial gain and espionage"; InvisibleFerret keylogging + data exfiltration
initial_vector: phishing
outcome_summary: |
  Palo Alto Unit 42 (21 Nov 2023) disclosed two parallel
  job-themed campaigns it assessed as North Korea (DPRK)
  state-sponsored. Contagious Interview (tracked CL-STA-0240):
  threat actors pose as employers to lure software developers
  into installing malware during a fake job interview —
  BeaverTail, a JavaScript information-stealer/loader hidden
  inside NPM packages (hosted on / injected into GitHub
  projects), which retrieves InvisibleFerret, a cross-platform
  Python backdoor (fingerprinting, keylogging, browser
  credential + crypto-wallet theft, AnyDesk deployment). Unit 42
  assessed the campaign objective as "likely cryptocurrency
  theft" plus staging for follow-on attacks. Wagemole (tracked
  CL-STA-0241): the IT-worker fraud counterpart — fake resumes,
  stolen US identities and GitHub personas used to obtain remote
  employment at US and global companies, which DOJ/FBI reporting
  ties to funneling wages to DPRK weapons programs. Attribution
  confidence differs: Contagious Interview MODERATE, Wagemole
  HIGH. The source gives NO victim count and does NOT name
  TraderTraitor / Lazarus / APT38 for either cluster.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Unit 42's November 2023 disclosure introducing the BeaverTail
  (JavaScript first-stage stealer/loader inside NPM packages) +
  InvisibleFerret (Python second-stage backdoor) chain and the
  Contagious Interview (CL-STA-0240) developer-targeting
  tradecraft. Per Unit 42 the Contagious Interview infrastructure
  was established as early as December 2022 (first malware samples
  March 2023); the Wagemole (CL-STA-0241) file trove is timestamped
  from August 2022. AUSPEX associates the BeaverTail/InvisibleFerret
  developer-compromise chain with the DPRK crypto-theft umbrella
  (kp/rgb/tradertraitor) that monetises via the crypto-exchange and
  supply-chain thefts recorded elsewhere in the atlas (Atomic Wallet
  Jun 2023, Stake.com / CoinEx Sept 2023, DMM Bitcoin May 2024), and
  the same chain was later observed in the 2024-2025 npm supply-chain
  operations. NOTE this Nov-2023 source itself names only CL-STA-0240
  + DPRK (moderate confidence), not TraderTraitor — the TraderTraitor
  identity is an AUSPEX cross-cluster association, not source-stated.
attributions:
  - actor_id: kp/rgb/tradertraitor
    attributing_org: Palo Alto Networks Unit 42
    attributing_org_confidence: moderate  # AUDIT 2026-07-04: source says "moderate confidence" for Contagious Interview (was high)
    attribution_level: nation  # DPRK reached at moderate confidence; NO named group named for CL-STA-0240
    auspex_assessment: concur-with-caveat  # the TraderTraitor actor mapping is AUSPEX's addition, not source-stated
    attribution_date: 2023-11-21
    attribution_source_id: unit42/2024-06-13_north-korea-job-campaigns
    notes: |
      Unit 42 (21 Nov 2023): "We attribute with moderate
      confidence that Contagious Interview is run by a North
      Korea state-sponsored threat actor"; tracked as
      CL-STA-0240. The source names NO specific group for this
      cluster — Lazarus appears only as an Operation Dream Job
      comparison, and TraderTraitor / APT38 / BlueNoroff do NOT
      appear anywhere in the article. Hence attribution_level =
      nation (DPRK at moderate confidence; not named-actor).
      AUSPEX maps CL-STA-0240 to kp/rgb/tradertraitor as a
      cross-cluster association — the BeaverTail/InvisibleFerret
      fake-interview developer-lure tradecraft was later folded
      into the TraderTraitor / Slow-Pisces umbrella by subsequent
      reporting — an AUSPEX analytical identity, NOT stated by
      this source; therefore concur-with-caveat.
  - actor_id: kp/it-worker-fraud
    attributing_org: Palo Alto Networks Unit 42
    attributing_org_confidence: high  # source: "high confidence that Wagemole can be attributed to a North Korea-sponsored APT"
    attribution_level: nation  # DPRK reached at high confidence; tracked as CL-STA-0241, no named group
    auspex_assessment: concur
    attribution_date: 2023-11-21
    attribution_source_id: unit42/2024-06-13_north-korea-job-campaigns
    notes: |
      Unit 42 (21 Nov 2023): "we assess with high confidence
      that Wagemole can be attributed to a North Korea-sponsored
      APT, which we track as CL-STA-0241" — basis: passwords
      created in Korean typed on a US keyboard including words
      used only in North Korea, and Korean keyboard settings on
      actor-controlled machines. Wagemole is the parallel
      fake-resume / stolen-identity / GitHub-persona
      remote-employment fraud; Unit 42 notes DOJ/FBI reporting
      that DPRK "uses remote workers to funnel wages to its
      weapons programs." attribution_level = nation (no specific
      named group asserted by the source).
