id: 2023-01/cyfirma-transparent-tribe-government
name: Uptycs documents Transparent Tribe (APT36) Poseidon Linux backdoor delivered via trojanized Kavach 2FA against Indian government
start_date: 2023-04-17
disclosure_date: 2023-04-17
end_date: 2023-04-17
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  Uptycs documented a Transparent Tribe (APT36) campaign that
  delivered the Poseidon Linux backdoor to Indian government users
  by distributing a backdoored (trojanized) version of Kavach —
  the two-factor-authentication application the Indian government
  mandates for secure access to its email services. The malicious
  Kavach clones were spread through rogue websites impersonating
  legitimate Indian-government portals (e.g. ksboard[.]in,
  rodra[.]in masquerading as "RODRA — Retired Officers Digital
  Records Archive", kavach-app[.]in); on execution the genuine
  Kavach login page was shown as a decoy while the payload was
  fetched in the background. Poseidon is a Golang ELF
  (Mythic-framework agent) general-purpose backdoor providing
  keylogging, screen capture, file upload/download and remote
  administration. Uptycs framed the activity as APT36 expanding
  its collection from its historical Windows and Android targeting
  onto Linux users in Indian government agencies.
false_flag_risk: none
summary: |
  Notable for documenting APT36's tooling adaptation to the
  Indian-government technology stack — specifically the
  trojanizing of Kavach, the government-mandated 2FA client —
  and for marking the cluster's expansion onto Linux (the
  Poseidon ELF backdoor) beyond its long-standing Windows and
  Android tradecraft. Demonstrates the cluster's operational
  knowledge of Indian government IT and its fit with Pakistan's
  asymmetric collection posture against India.
