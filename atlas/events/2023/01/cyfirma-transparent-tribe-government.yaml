id: 2023-01/cyfirma-transparent-tribe-government
name: Cyfirma documents Transparent Tribe targeting of Indian government with Poseidon C2
start_date: 2022-09-01
disclosure_date: 2023-01-18
end_date: 2023-01-18
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cyfirma documented APT36 phishing campaigns against Indian
  government employees using maliciously modified versions of
  legitimate Kavach (Indian government 2FA solution) applications
  and the Poseidon command-and-control framework. The campaign
  targeted users of the @gov.in mail infrastructure with
  Linux-targeting and Windows-targeting variants of the implant.
false_flag_risk: none
summary: |
  Notable for documenting APT36's tooling adaptation to the
  Indian-government technology stack — specifically, the
  Kavach 2FA application that Indian government users are
  mandated to install. Demonstrates the cluster's operational
  knowledge of Indian government IT.
