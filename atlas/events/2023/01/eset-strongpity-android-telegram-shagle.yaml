id: 2023-01/eset-strongpity-android-telegram-shagle
name: ESET discloses StrongPity Android campaign — trojanized Telegram via fake Shagle site
start_date: 2021-11-01
disclosure_date: 2023-01-10
end_date: 2023-01-10
incident_type:
  - intrusion
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  ESET WeLiveSecurity disclosed an active StrongPity / PROMETHIUM
  Android campaign distributing a trojanized build of the
  legitimate Telegram messenger via a website impersonating the
  Shagle random-video-chat service. Active since November 2021,
  the campaign used a website (shaglechat[.]com) presenting a
  non-existent Shagle Android app whose APK was a fully-functional
  Telegram client repackaged with eleven dynamically-loaded
  StrongPity surveillance modules — phone-call recording, SMS
  collection, contact-list and call-log exfiltration, location
  tracking, and message-content exfiltration from 17 apps
  including Viber, Skype, Gmail, Messenger, and Tinder. ESET
  telemetry showed very narrow distribution consistent with
  targeted-victim operations rather than mass deployment.
false_flag_risk: suspected
summary: |
  First well-documented mobile-platform PROMETHIUM tooling and a
  meaningful evolution from the long-running Windows-installer
  watering-hole pattern. The Shagle-impersonation lure is
  consistent with the cluster's pattern of weaponizing user
  trust in commodity software, adapted to a mobile-app context.
  Suspected false-flag-risk reflects the cluster-level Stealth
  Falcon overlap discussion rather than fresh evidence in this
  report. Doctrinal pillar attribution is plausible but not
  strongly-inferred because ESET telemetry did not surface any
  identified victims — narrow targeting consistent with
  diaspora / dissident operations but not specifically
  attested.
