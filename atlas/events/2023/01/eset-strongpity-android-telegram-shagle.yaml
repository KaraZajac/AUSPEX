  notes: |
    Audited vs ESET WeLiveSecurity "StrongPity espionage campaign targeting Android
    users" (Lukas Stefanko, 10 Jan 2023), the ONE cited source. Raw article captured +
    hashed: sha256 b4d496da…06962149, 106,868 bytes — real, complete first-party article
    (title + byline + body + IoCs + ATT&CK table all present); NOT a phantom.
    [a] FACTS — nearly all source-carried; ONE fabrication removed. Verbatim support:
    "an active campaign that we have attributed to the StrongPity APT group"; "Active
    since November 2021"; app "impersonating Shagle – a random-video-chat service";
    "modified version of the open-source Telegram app, repackaged with StrongPity backdoor
    code"; "Telegram version 7.5.0 (22467)"; "its 11 dynamically triggered modules"; the
    module list confirms call recording (libarm.jar), SMS (resources.jar), contacts
    (toolkit.jar), call logs (wearkit.jar), location (services.jar); "exfiltrate
    communication from 17 apps such as Viber, Skype, Gmail, Messenger as well as Tinder"
    (17-app package list present); "ESET telemetry still doesn't identify any victims …
    likely very narrowly targeted". CORRECTION 1 (fabrication): the event claimed the
    distribution domain was "shaglechat[.]com" — the string "shaglechat" appears 0× in
    the source; ESET states only that the backdoor was "delivered from a domain containing
    the word 'dutch'" and impersonated "the legitimate service named Shagle at shagle.com",
    deliberately NOT publishing the copycat domain. Removed the fabricated domain; rewrote
    outcome_summary to ESET's wording (legit shagle.com; copycat domain "contained the word
    'dutch'"; Telegram 7.5.0; C&C-delivered modules; accessibility/notification abuse).
    CORRECTION 2: summary said "first well-documented mobile-platform PROMETHIUM tooling" —
    ESET says "Only one other Android campaign has been previously attributed to StrongPity"
    and "this appears to be the second version of StrongPity's Android malware", but "the
    first time that the described modules … have been documented publicly"; reworded to
    "first PUBLIC documentation of the module set (second Android campaign)". incident_type:
    added surveillance + espionage (ESET titles it an "espionage campaign"; tooling is
    call/SMS/location/message surveillance) alongside existing intrusion + data-theft.
    [b] ATTRIBUTION — attributing_org_confidence moderate → HIGH: ESET states verbatim "we
    believe with high confidence that this operation belongs to the StrongPity group",
    backed by the SAME code-signing certificate as a 2021 Trend-Micro-attributed trojanized
    Syrian e-gov app + shared backdoor code/obfuscated class names (mirrors the audited
    bitdefender-2020 sibling, also high + named-actor). Added attribution_level=named-actor
    (was missing): ESET names ONLY the group — 0 mentions of Turkey/Turkish/MİT/
    "government-sponsored" in the article — so no nation/unit is drawn from this source; the
    Turkish nexus is an actor-level fact from other sources. auspex_assessment kept
    concur-with-caveat.
    [c] DATES ✓ source published_on 2023-01-10 = "10 Jan 2023". start_date 2021-11-01 =
    "Active since November 2021" / copycat HTML copied + malicious domain registered
    "November 1st, 2021". disclosure/end 2023-01-10 = report date (op not definitively
    bounded — sample was inactive at research time via API_ID_PUBLISHED_FLOOD but "might
    change anytime"; end=disclosure kept as the sibling convention). No conflation.
    [d] DOCTRINE_LINKS — pillar_id gulen-diaspora → NULL. The event was the ONLY StrongPity
    sibling asserting the gulen-diaspora pillar; ESET identifies no victims and states no
    purpose, so neither Gülenist nor Kurdish targeting is isolable (the rest of the cluster
    uses kurdish-diaspora or null; the victim-less siblings kaspersky/att/minerva use null).
    Kept confidence=plausible (honest — no purpose stated); added attesting_source_id: null
    and inference_basis.alternatives (diaspora-surveillance continuation vs. broader
    opportunistic espionage). Not attested, so no attesting source required.
    [e] ATTRIBUTION_LEVEL set named-actor (see [b]).
    [f] ACTOR_ID tr/unscoped/promethium resolves → atlas/actors/tr/promethium.yaml (id
    tr/unscoped/promethium), consistent with all 7 sibling StrongPity events; no actor edit.
    KEY CHANGE — false_flag_risk suspected → NONE: this ESET report carries NO false-flag
    signal ("Stealth Falcon" appears 0×; no UAE overlap). The only misattribution mentioned
    is a third party's Twitter claim of Bahamut, which ESET explicitly corrects — evidence
    AGAINST a false flag, not for one. The prior "suspected" was an unsourced cluster-level
    echo from the actor record's PROMETHIUM/Stealth-Falcon ambiguity, which is not present
    in this source.
    RESIDUALS / FLAGS: (1) target orgs/strongpity-android-shagle-victims-unknown is an
    UNREGISTERED placeholder (no atlas/targets file) — matches the sibling victims-unknown
