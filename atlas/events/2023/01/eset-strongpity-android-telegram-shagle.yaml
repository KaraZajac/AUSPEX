id: 2023-01/eset-strongpity-android-telegram-shagle
name: ESET discloses StrongPity Android campaign — trojanized Telegram via fake Shagle site
start_date: 2021-11-01
disclosure_date: 2023-01-10
end_date: 2023-01-10
incident_type:
  - intrusion
  - surveillance
  - data-theft
  - espionage
initial_vector: supply-chain
outcome_summary: |
  ESET WeLiveSecurity disclosed an active StrongPity (PROMETHIUM)
  Android campaign distributing a trojanized build of the
  legitimate Telegram messenger via a copycat website impersonating
  the Shagle random-video-chat service (shagle.com). Active since
  November 2021, the campaign served the malicious APK from a
  copycat site — ESET reported the copycat domain "contained the
  word 'dutch'" but did not publish it in full — presenting a
  non-existent Shagle Android app whose APK was a fully-functional
  Telegram client (Telegram 7.5.0) repackaged with eleven
  dynamically-loaded, C&C-delivered StrongPity backdoor modules:
  phone-call recording, SMS collection, contact-list and call-log
  exfiltration, device location, and — via accessibility /
  notification abuse — message-content exfiltration from 17 apps
  including Viber, Skype, Gmail, Messenger, and Tinder. ESET
  telemetry identified no victims, consistent with a very narrowly
  targeted operation rather than mass deployment.
false_flag_risk: none
summary: |
  First public documentation of PROMETHIUM's Android backdoor
  module set — ESET notes only one prior StrongPity Android
  campaign (a 2021 trojanized Syrian e-gov app) — and a meaningful
  evolution from the cluster's long-running Windows trojanized-
  installer / watering-hole pattern. The Shagle-impersonation lure
  is consistent with the cluster's pattern of weaponizing user
  trust in commodity software, adapted to a mobile-app context.
  false_flag_risk is none: this ESET report carries no false-flag
  signal (it raises no Stealth Falcon / UAE overlap; the single
  third-party misattribution it mentions — a Twitter claim of
  Bahamut, which ESET corrects — is an analyst error, not evidence
  of deliberate false-flagging). Doctrine-link confidence is
  plausible with no pillar isolated: ESET identified no victims and
  states no strategic purpose, so this report cannot distinguish
  Gülenist- from Kurdish-diaspora targeting.
attributions:
  - actor_id: tr/unscoped/promethium
    attributing_org: ESET (Lukas Stefanko)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-01-10
    attribution_source_id: eset/2023-01-10_strongpity-android-telegram
    notes: |
      ESET attributes the campaign to the StrongPity APT group
      "with high confidence" (verbatim) on two concrete grounds in
      this report: the fake Shagle APK is signed with the SAME
      code-signing certificate as a 2021 trojanized Syrian e-gov app
      that Trend Micro also attributed to StrongPity, and its
      backdoor shares code and obfuscated class names with prior
      StrongPity mobile tooling. attribution_level is named-actor:
      ESET names only the group — this report makes NO nation or
      service attribution (no mention of Turkey, the MİT, or
      "government-sponsored"), so no nation/unit claim is drawn from
      it. The Turkish-state nexus is an actor-level inference from
      other sources (Bitdefender 2020 etc.), not this report; hence
      auspex_assessment stays concur-with-caveat and the actor
      remains tr/unscoped.
doctrine_links:
  - doctrine_id: tr/counter-gulen-kurdish-surveillance
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      PROMETHIUM's established mission is population / dissident
      surveillance, and a narrowly-targeted mobile backdoor with
      17-app messaging-exfiltration breadth fits that posture, so
      the doctrine applies at the posture level. No specific pillar
      is isolated (pillar_id null): ESET identified no victims and
      states no strategic purpose, so this report cannot distinguish
      Gülenist- from Kurdish-diaspora targeting. Confidence is
      plausible rather than strongly_inferred precisely because no
      victim was identified.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Counter-Gülen / Kurdish-diaspora surveillance: PROMETHIUM's documented targeting (Kurdish opposition, Syrian dissidents) makes a fresh narrowly-targeted mobile backdoor a natural continuation of the cluster's diaspora-surveillance posture; ESET, however, names no victims here."
        - "Opportunistic / broader espionage: the fake Shagle lure plus a fully-functional Telegram clone could serve a wider targeting set than the diaspora pillars, and with zero identified victims a non-diaspora reading survives."
    contested: false
    analyst: claude
targets:
