id: 2023-01/lockbit-royal-mail
name: LockBit ransomware against Royal Mail UK
start_date: 2023-01-10
disclosure_date: 2023-01-11
end_date: 2023-02-14
incident_type:
  - ransomware
  - disruption
initial_vector: valid-creds
outcome_summary: |
  LockBit affiliate intrusion at Royal Mail International (UK
  state-owned-then-privatized postal operator) disabled international
  outbound mail processing at Heathrow Worldwide Distribution
  Centre. Approximately five weeks of severe international postal
  disruption; small UK exporters disproportionately affected.
  Royal Mail publicly refused the USD 80M ransom demand
  (negotiation transcripts later leaked by LockBit on the leak
  site).
false_flag_risk: none
summary: |
  Highest-profile UK ransomware incident of 2023. Initial access
  used valid credentials against a remote-management endpoint;
  affiliate tradecraft consistent with CISA AA23-075A LockBit
  reporting included Cobalt Strike beacons, Mimikatz credential
  dumping, lateral movement via SMB and RDP, BloodHound /
  SharpHound for Active Directory reconnaissance, abuse of the
  legitimate remote-access tools AnyDesk and Atera, data
  exfiltration via rclone / MEGA, and the LockBit 3.0 (LockBit
  Black) ChaCha20 encryptor deployed across the Heathrow
  Worldwide Distribution Centre estate. The negotiation-
  transcript leak on LockBit's data-leak site exposed the
  cluster's operator slang ("LockBitSupp") and gave rare public
  visibility into affiliate posture.
attributions:
