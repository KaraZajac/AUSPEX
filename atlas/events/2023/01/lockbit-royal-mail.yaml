id: 2023-01/lockbit-royal-mail
name: LockBit ransomware against Royal Mail UK
start_date: 2023-01-10
disclosure_date: 2023-01-11
end_date: 2023-02-23
incident_type:
  - ransomware
  - disruption
initial_vector: unknown
outcome_summary: |
  A LockBit affiliate's ransomware intrusion disabled Royal Mail's
  international export operations, leaving the UK postal operator
  temporarily unable to despatch items to overseas destinations.
  Royal Mail faced roughly six weeks of severe international-shipping
  disruption before it finally restored export services to all
  destinations (full reinstatement reported 23 February 2023). LockBit
  demanded an initial USD 80M (about GBP 66M) ransom; Royal Mail
  refused, its negotiator stating it would "under no circumstances"
  pay "the absurd amount of money" demanded. After the refusal LockBit
  published the negotiation transcript and some of the stolen Royal
  Mail data on its dark-web leak site.
false_flag_risk: none
summary: |
  The highest-profile UK ransomware incident of 2023. Royal Mail first
  detected the attack on 10 January 2023 and hired outside forensic
  experts; the company publicly reported "disruption to our
  international export services" and an inability to despatch items to
  overseas destinations. Printed ransom notes found during the attack
  were the "LockBit Black" (LockBit 3.0) variant and carried links to
  LockBit's Tor negotiation and data-leak sites. LockBit's public
  representative "LockBitSupp" initially denied that the group had
  attacked Royal Mail, blaming other actors using the LockBit 3.0
  builder leaked in September 2022, but later confirmed on a
  Russian-speaking hacking forum that one of LockBit's affiliates had
  deployed the gang's payloads on Royal Mail's systems. LockBit
  subsequently leaked the full negotiation transcript (an initial USD
  80M demand, later lowered to USD 40M) and published some of the
  stolen data after Royal Mail refused to pay. The publicly disclosed
  reporting does not identify the initial-access vector for this
  specific intrusion.
