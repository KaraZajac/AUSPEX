id: 2023-01/moses-staff-cobalt-sapling-secureworks-links-abrahams-ax-persona-to-ir
name: "Moses Staff / Cobalt Sapling — Secureworks links Abraham's Ax persona to Iranian operator; Saudi government targeting"
start_date: 2023-01-26
incident_type:
  - hack-and-leak
  - data-theft
  - destructive
  - influence-operation
false_flag_risk: none
summary: |
  Secureworks (CTU) reported that Abraham's Ax is a hacktivist persona operated by the Iranian COBALT SAPLING threat group, the same actor behind Moses Staff. Abraham's Ax targets government ministries in Saudi Arabia, publishing sample data allegedly stolen from attacks on the Ministry of the Interior, while the Moses Staff persona predominantly leaks data stolen from Israeli companies and personal information on individuals affiliated with Israel's Unit 8200 signals-intelligence service. Associated tooling reported for the cluster includes the PyDCrypt loader, the DCSrv cryptographic wiper, StrifeWater RAT and the DriveGuard auxiliary tool. Secureworks links the Abraham's Ax persona to Moses Staff / COBALT SAPLING; no individual operator is named.
