  notes: |
    RE-SOURCE (PHANTOM-REMEDIATION path). The event is REAL and well-documented
    but rested on a single source (CISA AA23-136A) that does NOT carry its
    central causal claim. The cited CISA advisory is a genuine article (not a
    phantom) and DOES document the pivot, but contains ZERO "Avast" hits and only
    one "decryptor" hit (the FBI asking victims to submit decryptor files) — so
    the "Avast decryptor -> pivot" causation, and the decryptor fact itself, were
    un-sourced. Added the two genuine primaries and audited against all three RAW
    snapshots.

    SOURCES (all snapshotted this session; none bot-walled -> level full):
    - avast/2023-01-16_decrypted-bianlian-ransomware — Avast Threat Research Team,
      "Decrypted: BianLian ransomware", 2023-01-16 (decoded.avast.io 301 ->
      gendigital.com). raw 340,976 bytes, sha256 a91473c3...41b1d090. Carries the
      decryptor release + the Go-language file-encryptor.
    - theregister/2023-03-19_bianlian-crew-goes-100-extortion-after-decryptor —
      The Register, 2023-03-19. raw 162,455 bytes, sha256 fb177f9f...e98ed639.
      Carries the CAUSAL link (Avast decryptor -> extortion pivot) + the 16%->53%
      figures.
    - cisa/2023-05-16_aa23-136a-bianlian-advisory — joint FBI / CISA / ASD's-ACSC
      advisory, original 2023-05-16 (LIVE PAGE = the Nov-20-2024 revision). raw
      137,973 bytes, sha256 1b937b45...2945f594. Carries the pivot ("shifted
      primarily to exfiltration-based extortion around January 2023") + the
      named-actor attribution.

    [a] FACTS — corrected. (i) "Avast released a free decryptor" now sourced to
    Avast (verbatim "The team at Avast has developed a decryptor for the BianLian
    ransomware and released it for public download") + dated 2023-01-16 (Avast
    byline), replacing the vague "mid-January". (ii) OVERSTATEMENT FIXED: the
    event said BianLian removed the encryptor "entirely" / went
    "data-exfiltration-only" at the Jan-2023 pivot; CISA says they "shifted
    PRIMARILY to exfiltration-based extortion around January 2023" and only
    "shifted to EXCLUSIVELY exfiltration-based extortion around January 2024" —
    reworded to "primarily ... over the following weeks" with the 2024 exclusivity
    noted separately. (iii) Removed the uncited "a Redacted analyst report May
    2023" reference (no such source in sources[]; unverifiable) — replaced by the
    Avast + Register cites. (iv) Removed the unsupported genealogy claim that
    BianLian "established the model that later operators (Karakurt, Hunters
    International 'World Leaks') followed" — no cited source carries it and it is
    chronologically wrong for Karakurt (a Conti-linked extortion-only crew active
    from ~2021, before BianLian's 2023 pivot). Replaced with the general,
    Register-supported point that decryptor success can push groups toward
    extortion-only tactics. (v) Kept "network-reconnaissance / data-theft retained
    + leak-site publication threat" (CISA: "extorts money by threatening to
    release data if payment is not made").

    [b] ATTRIBUTION — actor_id criminal/bianlian resolves
    (atlas/actors/criminal/bianlian.yaml). Corrected attributing_org
    "Avast + CISA + FBI" -> "FBI, CISA, ASD's ACSC (joint advisory AA23-136A)" to
    match attribution_source_id; added a note recording Avast's earlier Jan-2023
    identification + the leak-site self-naming. Confidence high / concur unchanged
    (a joint government advisory naming a criminal group = high). No state nexus is
    attributed -> the actor correctly stays criminal/ (not ru/proxies/).

    [c] DATES — source published_on verified: Avast 2023-01-16 (byline), Register
    2023-03-19 (byline), CISA 2023-05-16 (original release; live page is the
    Nov-2024 revision — published_on retained as original). Event: start_date
    2023-01-15 -> 2023-01-16 (the Avast decryptor release = the documented
    trigger); disclosure_date 2023-01-16 kept; end_date 2023-03-31 (unsourced) ->
    2023-03-19, bounding the decryptor-driven shift-to-primarily-exfiltration as
    documented by The Register (the later "exclusively" milestone ~Jan 2024 is a
    separate state captured in outcome_summary, not this event's window).

    [d] DOCTRINE_LINKS — [] correct and kept. A criminal RaaS tradecraft pivot in
    response to a defender countermeasure; no state doctrine applies (criminal/
    actor, no state nexus).

    [e] ATTRIBUTION_LEVEL — was MISSING; set named-actor (BianLian is a named
    criminal group; no nation and no specific service/unit is named).

    [f] ACTOR — criminal/bianlian is sound (criminal/ placement justified: no
    public state-nexus attribution; primary_service_id null per criminal
    convention). MINOR FLAG (not edited — actor files out of scope): the actor's
    ttp_summary says "pivoted to exfiltration-only extortion in January 2023",
    which overstates the same way the event did — CISA dates "exclusively" to
    ~Jan 2024, "primarily" to Jan 2023; worth a one-line actor fold-in.

    RESIDUAL UNCERTAINTY: the precise "end" of a gradual behavioural shift is
    inherently fuzzy; end_date 2023-03-19 is an evidence-anchored bound (Register
    documents majority-extortion by then), not a hard stop. incident_type kept
    [documentary] (a meta event documenting a tradecraft shift, not a discrete
    intrusion); targets kept sectors/critical-infrastructure primary (CISA:
    BianLian targets critical infrastructure organizations).
