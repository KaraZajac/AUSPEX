id: 2023-01/bianlian-pivot-data-extortion
name: BianLian pivots to data-extortion after Avast decryptor release
start_date: 2023-01-16
disclosure_date: 2023-01-16
end_date: 2023-03-19
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  On January 16, 2023 Avast publicly released a free decryptor
  for files encrypted by BianLian's Go-language ransomware,
  undercutting the value of the group's file-encryption
  extortion. Over the following weeks BianLian moved away from
  the encrypt-and-extort (double-extortion) model toward
  exfiltration-based extortion — retaining its network-
  reconnaissance and data-theft tradecraft but threatening
  leak-site publication of stolen data rather than file-level
  encryption. Reporting attributed to Avast (via The Register,
  Mar 2023) found the free decryptor "apparently convinced the
  miscreants that there was no future for them on the ransomware
  side of things"; in the two months after release, 53% of the
  group's leak-site postings were extortion-only (up from 16%).
  The joint FBI / CISA / ASD's-ACSC advisory AA23-136A (May 2023)
  records that BianLian "shifted primarily to exfiltration-based
  extortion around January 2023"; a later revision of that
  advisory notes a further shift to exclusively exfiltration-
  based extortion around January 2024.
false_flag_risk: none
summary: |
  AUSPEX criminal-baseline case documenting how a defender
  countermeasure — Avast's free public decryptor — reshaped a
  major RaaS cluster's tradecraft. The BianLian pivot is a
  well-documented case of a ransomware crew de-emphasizing
  file-encryption extortion in favor of data-exfiltration
  extortion following the public release of a decryptor that
  defeated its encryptor, illustrating how successful decryptor
  development can push groups toward extortion-only tactics.
