    attribution_level: named-actor  # DOJ names the "Hive ransomware group" (a named RaaS group); no individual operators indicted in this Jan-2023 release
    attribution_source_id: doj/2023-01-26_hive-takedown
    notes: |
      Multilateral LE operation led by FBI Tampa Field Office (Orlando
      Resident Agency) with Europol, German (BKA + Reutlingen Police
      HQ-CID Esslingen), and Netherlands (NHTCU) participation. No
