id: 2023-01/hive-takedown
name: FBI / Europol Hive ransomware takedown
start_date: 2022-07-01  # month-anchor; DOJ: "Since late July 2022" FBI covert access began (exact day not stated)
disclosure_date: 2023-01-26
end_date: 2023-01-26
incident_type:
  - law-enforcement  # counter-op meta type (FBI/DOJ takedown) — keys the counter-op detector; actor_id null
  - disruption
initial_vector: unknown
outcome_summary: |
  FBI Tampa Field Office (Orlando Resident Agency) obtained covert
  network access to Hive infrastructure in late July 2022 and ran a
  months-long disruption campaign (~6 months, to the Jan 26 2023
  seizure), providing over 300 decryption keys to victims under
  active attack and over 1,000 additional keys to prior victims —
  averting more than USD 130M in ransom payments per DOJ. Coordinated
  takedown announced Jan 26 2023 with Europol, the German Federal
  Criminal Police (BKA) + Reutlingen Police HQ-CID Esslingen, and the
  Netherlands National High Tech Crime Unit; the FBI seized the
  servers and websites Hive used to communicate with its members.
quantified_impact:
  usd_ransom_averted: 130000000  # DOJ subhead "Thwarting Over $130 Million in Ransom Demands"; DAG Monaco "averting more than $130 million dollars in ransomware payments"; Europol "prevented the payment of more than USD 130 million"
  usd_extorted: 100000000  # DOJ "Since June 2021, the Hive ransomware group has… received over $100 million in ransom payments"; Europol "almost EUR 100 million"
  affected_orgs: 1500  # DOJ/Europol "more than 1,500 victims in over 80 countries"
  decryption_keys_active: 300  # DOJ "over 300 decryption keys to Hive victims who were under attack" (i.e., >300)
  decryption_keys_prior: 1000  # DOJ "over 1,000 additional decryption keys to previous Hive victims" (i.e., >1,000)
false_flag_risk: none
summary: |
  Pioneering "long-running covert server access → coordinated
  seizure" disruption pattern; replicated in Operation Cronos
  (LockBit, Feb 2024). The Hive takedown is the canonical NCS
  2023 Pillar 2 (Disrupt and Dismantle) operation in the
  AUSPEX corpus and is foundational to the FBI's subsequent
  ransomware-disruption doctrine.
attributions:
