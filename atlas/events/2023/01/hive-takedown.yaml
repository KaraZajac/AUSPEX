id: 2023-01/hive-takedown
name: FBI / Europol Hive ransomware takedown
start_date: 2022-07-01  # FBI covert access began
disclosure_date: 2023-01-26
end_date: 2023-01-26
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  FBI Tampa Field Office obtained covert network access to Hive
  infrastructure July 2022 and operated as an undeclared
  participant for approximately seven months, distributing
  decryption keys to ~336 active and ~1,000 prior victims worth
  an estimated USD 130M in averted ransom payments. Coordinated
  takedown announced Jan 26 2023 with Europol, German Federal
  Police (BKA), and Dutch National High Tech Crime Unit
  participation; servers in Los Angeles and the Netherlands
  seized.
false_flag_risk: none
summary: |
  Pioneering "long-running covert server access → coordinated
  seizure" disruption pattern; replicated in Operation Cronos
  (LockBit, Feb 2024). The Hive takedown is the canonical NCS
  2023 Pillar 2 (Disrupt and Dismantle) operation in the
  AUSPEX corpus and is foundational to the FBI's subsequent
  ransomware-disruption doctrine.
attributions:
