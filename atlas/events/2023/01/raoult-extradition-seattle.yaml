summary: |
  Procedural-arc continuation of the May 2022 Morocco arrest
  (Morocco arrest May 2022 → extradition to the US January 2023 →
  guilty plea → sentencing January 2024, each tracked as a separate
  event). Raoult, a French citizen, was extradited via Morocco,
  where he had been arrested in May 2022; the USAO WDWA release
  credited "the significant cooperation and assistance provided by
  Moroccan and French authorities," while Raoult's defense lawyer
  Philip Ohayon characterized the extradition as "France has
  abandoned him" (SecurityAffairs). Modeled as a null-actor
  counter-action (meta event): the acting bodies are US prosecutors
  and the FBI (with Moroccan authorities executing the extradition);
  the criminal subject is Raoult, a member of the ShinyHunters
  cluster (criminal/shinyhunters).
