    [a] FACTS — carried verbatim after CORRECTIONS. Extradition:
    "Sebastien Raoult aka Sezyo Kaizen, was arrested last year in
    Morocco and was extradited to the U.S. this week" (S1); "was
    extradited to the U.S. in January 2023" (S4); "extradited from
    Morocco to the United States" (S3). Court presentation: "A
    21-year-old French citizen from Epinal, France, will appear
    tomorrow January 27, 2023, in U.S. District Court in Seattle on a
    nine-count indictment alleging conspiracy to commit computer
    fraud and abuse, conspiracy to commit wire fraud, four counts of
    wire fraud and three counts of aggravated identity theft"; "Raoult's
    initial appearance will be at 2:00 PM in front of Magistrate Judge
    Michelle L. Peterson" (S1). Indictment date: "Raoult and two
    co-conspirators were indicted by a grand jury sitting in the
    Western District of Washington on June 23, 2021" (S1); "indicted
    … by a grand jury in 2021" (S2). Arrest: "arrested in Morocco at
    Rabat international airport in Morocco on May 31, 2022" (S3).
    Co-conspirators: "23-year-old Gabriel Kimiaie-Asadi Bildstein aka
    'Kuroi' … of Tarbes, France, and 22-year-old Abdel-Hakim El Ahmadi
    aka 'Zac' … of Lyon, France" (S1); "remain uncuffed" (S2).
    ShinyHunters: "A member of the so-called 'ShinyHunters Group'"
    (S1). Sentence: "sentenced today … to three years in prison and
    more than $5 million in restitution for conspiracy to commit wire
    fraud and aggravated identity theft" (S4).
    CORRECTIONS (fabricated / unsourced prose STRIPPED — each a 0-hit
    across all four raws):
    (1) "sealed September 2021 indictment" → "nine-count grand-jury
    indictment returned … on 23 June 2021" — "sealed" and "September
    2021" are carried by NO cited source; every source states the
