id: 2023-01/raoult-extradition-seattle
name: Sebastien Raoult extradited from Morocco to Seattle
start_date: 2023-01-26
disclosure_date: 2023-01-26
end_date: 2023-01-28
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  Following an eight-month detention in Morocco and an
  extradition challenge, French national Sebastien Raoult
  ("Sezyo Kaizen") was extradited to the United States on
  January 26 2023 and presented at the US District Court for
  the Western District of Washington in Seattle on January 27
  2023, where he was arraigned on a sealed September 2021
  indictment for his role in the ShinyHunters data-broker
  conspiracy. Raoult subsequently pleaded guilty (Aug 2023)
  and was sentenced (Jan 2024) to 36 months prison + USD 5M
  restitution.
false_flag_risk: none
operators_named:
  - raoult-sebastien  # ShinyHunters "Sezyo Kaizen", extradited Jan 2023
summary: |
  Procedural-arc continuation of the May 2022 Morocco arrest.
  Notable for the Moroccan-extradition pathway: France did not
  cooperate (Raoult is a French citizen), and the case sets a
  precedent for extra-territorial cybercrime extradition
  through North-African transit jurisdictions.
