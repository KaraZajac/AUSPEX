outcome_summary: |
  French national Sebastien Raoult ("Sezyo Kaizen"), arrested in
  Morocco in May 2022, was extradited from Morocco to the United
  States in January 2023 (the USAO WDWA release of 26 January 2023
  states he "was extradited to the U.S. this week") and made his
  initial appearance in the US District Court for the Western
  District of Washington in Seattle on 27 January 2023, at 2:00 PM
  before Magistrate Judge Michelle L. Peterson, on a nine-count
  grand-jury indictment returned in the Western District of
  Washington on 23 June 2021 — conspiracy to commit computer fraud
  and abuse, conspiracy to commit wire fraud, four counts of wire
  fraud, and three counts of aggravated identity theft — charging
  his role in the ShinyHunters data-theft-and-extortion conspiracy.
  Two co-conspirators (Gabriel Kimiaie-Asadi Bildstein "Kuroi" of
  Tarbes and Abdel-Hakim El Ahmadi "Zac" of Lyon) were charged in
  the same indictment but not extradited. Raoult subsequently
  pleaded guilty and was sentenced in January 2024 to 36 months in
  prison and more than USD 5 million in restitution (see
  2024-01/raoult-shinyhunters-sentencing).
false_flag_risk: none
