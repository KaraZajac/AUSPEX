id: 2023-01/swiftslicer-sandworm-ukraine
name: SwiftSlicer wiper deployment against Ukrainian target (Sandworm)
start_date: 2023-01-25
disclosure_date: 2023-01-27
end_date: 2023-01-25
incident_type:
  - destructive
  - wiper
initial_vector: valid-creds
outcome_summary: |
  Sandworm deployed SwiftSlicer — a previously unknown Go-language
  destructive wiper — against a Ukrainian target on 25 January
  2023. Disclosed by ESET 27 January 2023. Operators used Active
  Directory Group Policy with valid credentials to push the wiper,
  consistent with the tradecraft used for HermeticWiper, IsaacWiper,
  CaddyWiper and Industroyer2 in 2022.
false_flag_risk: none
summary: |
  SwiftSlicer overwrites files in critical system paths
  (Windows\NTDS, Windows\System32\drivers) and on attached
  non-system drives with cryptographically random 4096-byte blocks,
  then reboots the host. ESET attributed it to Sandworm on the
  basis of deployment tradecraft (AD Group Policy with valid
  credentials) and codebase resemblance to earlier Sandworm wiper
  families. SwiftSlicer continues the wiper cadence against
  Ukrainian state and infrastructure organisations that runs from
  WhisperGate / HermeticWiper / IsaacWiper / CaddyWiper /
  Industroyer2 / Prestige.
