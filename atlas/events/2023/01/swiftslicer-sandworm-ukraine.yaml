  notes: |
    Audited against two ESET WeLiveSecurity sources (both raw-snapshotted + hashed).
    S1 = eset/2023-01-27_swiftslicer-sandworm "SwiftSlicer: New destructive wiper malware
    strikes Ukraine" (27 Jan 2023, the disclosure post, "1 min. read"), sha256
    d610c1e1…66a7f5a8, 69981 bytes. S2 = eset/2023-02-24_year-of-wiper-attacks-ukraine
    "A Year of Wiper Attacks in Ukraine" (24 Feb 2023 retrospective), sha256
    30221f95…6579ab57, 90658 bytes (hash re-verified against the sibling HermeticWiper
    audit; S2 source record already snapshotted, left untouched). S2 ADDED as a second
    source to carry the victim-sector claim (S1 does not name the victim); S1 is real and
    on-topic — NOT a phantom (title/body match the event).

    [a] FACTS — corrected to source wording. S1 verbatim: "ESET researchers have uncovered
    a new wiper attack in Ukraine that they attribute to the Sandworm APT group. Dubbed
    SwiftSlicer, the destructive malware was spotted on the network of a targeted
    organization on January 25th. It was deployed through Group Policy, which suggests that
    the attackers had taken control of the victim's Active Directory environment"; "The
    malware was written in Go"; "SwiftSlicer is detected by ESET products as
    WinGo/KillFiles.C"; destruction quote: "Once executed it deletes shadow copies,
    recursively overwrites files located in %CSIDL_SYSTEM%\\drivers,
    %CSIDL_SYSTEM_DRIVE%\\Windows\\NTDS and other non-system drives and then reboots
    computer. For overwriting it uses 4096 bytes length block filled with randomly
    generated byte." CORRECTIONS: (1) "cryptographically random 4096-byte blocks" →
    "4096-byte blocks of randomly generated data" (S1 says "randomly generated byte", not
    "cryptographically"); (2) STRIPPED "codebase resemblance to earlier Sandworm wiper
    families" as an attribution basis — S1 attributes to Sandworm but states NO codebase
    rationale (and SwiftSlicer is Go, unlike the C/C++ 2022 wipers); (3) the wiper-cadence
    list "WhisperGate / HermeticWiper / IsaacWiper / CaddyWiper / Industroyer2 / Prestige"
    trimmed to S1-carried names — S1 names HermeticWiper + CaddyWiper (planted "in the same
    fashion" = Group Policy), the RansomBoggs wave ("also linked to Sandworm"), and
    BlackEnergy/GreyEnergy/Industroyer/Industroyer2 as Sandworm's track record; WhisperGate,
    IsaacWiper and Prestige are NOT in S1 (removed); (4) the GPO-tradecraft comparison
    restricted to HermeticWiper + CaddyWiper (S1's only named "same fashion" examples) —
    IsaacWiper and Industroyer2 were NOT stated by S1 as GPO-deployed. Added S1-carried
    facts: detection name WinGo/KillFiles.C and "deletes shadow copies". VICTIM SECTOR:
    S1 says only "a targeted organization" (unnamed); S2 resolves it verbatim: "On January
    25th, 2023, we detected a new wiper, written in Go and that we named SwiftSlicer, being
    deployed against Ukrainian local government entities." S2 also generalizes the
    deployment: "In almost all the above-mentioned cases, Sandworm used Active Directory
    Group Policy (T1484.001) to deploy its wipers and ransomware, specifically using the
    POWERGAP script", and lists "WinGo/KillFiles.C … SwiftSlicer wiper".

    [b] ATTRIBUTION — S1 attributes directly and without hedge to "the Sandworm APT group"
    (quoted above); no explicit confidence word, but an unqualified tier-1 attribution at
    disclosure → attributing_org_confidence high, auspex_assessment concur. This differs
    from the sibling HermeticWiper/IsaacWiper events (moderate), whose Sandworm attribution
    came only from S2's hedged "varying degrees of confidence" retrospective — SwiftSlicer
    is named same-day. Added a notes field recording this contrast.

    [c] DATES — start_date 2023-01-25 ✓ (S1 "January 25th"; S2 "On January 25th, 2023").
    disclosure_date 2023-01-27 ✓ (S1 dated 27 Jan 2023). end_date 2023-01-25 ✓ (single-day
    detection). attribution_date 2023-01-27 ✓ (attributed at disclosure). S1 published_on
    2023-01-27 ✓; S2 published_on 2023-02-24 ✓.

    [d] DOCTRINE_LINKS — both strongly_inferred; no attested gate triggered. russkiy-mir/
    ukraine-theater: kept strongly_inferred; tightened reasoning + inference_basis (signals
    now cite the S2-named local-government victim and the documented wiper cadence; ruled_out
    records that neither ESET source names the doctrine or its goal). military-doctrine-2014/
    non-contact-warfare: kept strongly_inferred; attesting_source_id null (allowed, not
    attested); ADDED the missing inference_basis {signals, ruled_out} (cyber-kinetic
    integration signal; criminal/hacktivist reading ruled out; competing russkiy-mir link
    noted). Honest that both links are AUSPEX inferences — neither ESET source discusses
    Russian doctrine.

    [e] ATTRIBUTION_LEVEL — was MISSING; set to named-actor. S1 names the group "Sandworm";
    it does not spell out "GRU"/"Unit 74455" in-text, so not named-unit.

    [f] ACTOR_ID — ru/gru/74455/sandworm resolves to atlas/actors/ru/sandworm.yaml
    (internal id matches). No actor-file edit. No flag.

    CORRECTIONS beyond facts/attribution: (i) TARGET orgs/ukraine-government →
    sectors/government/local (country ua). orgs/ukraine-government is the registry's slug
    for CENTRAL Ukrainian government ministries/agencies; S2 states the victim was Ukrainian
    LOCAL government entities — a sector mismatch. Retagged to the source-exact
    sectors/government/local (a valid, widely-used FK; the victims are unnamed local-govt
    entities, so a sector tag is more honest than any single named org). (ii) initial_vector
    valid-creds → unknown. Neither source states the INITIAL access vector; Group Policy /
    AD control is the DEPLOYMENT mechanism (now in summary/outcome), not documented initial
    access — same principled treatment as the audited sibling HermeticWiper (which ESET
    likewise disclosed as GPO-deployed with initial access unknown). (iii) name refined to
    reflect the S2-sourced victim (local government). (iv) ADDED S2 to sources[].

    RESIDUAL UNCERTAINTY: S1 does not name the victim at all; the local-government sector
    rests entirely on S2's one-line retrospective. "Valid credentials" for the GPO push is
    an implicit read of "taken control of the victim's Active Directory environment" (S1) /
    POWERGAP+T1484.001 (S2); left out of initial_vector as it describes deployment, not
    initial access. S2's "varying degrees of confidence" caveat is a wave-level statement,
    not specific to SwiftSlicer, which S1 attributes flatly.
