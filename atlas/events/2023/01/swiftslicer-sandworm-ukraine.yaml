id: 2023-01/swiftslicer-sandworm-ukraine
name: SwiftSlicer wiper deployment against Ukrainian local government (Sandworm)
start_date: 2023-01-25
disclosure_date: 2023-01-27
end_date: 2023-01-25
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  Sandworm deployed SwiftSlicer — a previously unknown Go-language
  destructive wiper — against Ukrainian local government entities on
  25 January 2023. Disclosed by ESET 27 January 2023; ESET's later
  "A Year of Wiper Attacks in Ukraine" retrospective (24 Feb 2023)
  named the victim sector (Ukrainian local government) and confirmed
  the deployment method. The wiper was pushed via Active Directory
  Group Policy — indicating the attackers had taken control of the
  victim's AD environment — the same fashion in which ESET observed
  HermeticWiper and CaddyWiper planted in 2022.
false_flag_risk: none
summary: |
  SwiftSlicer (detected by ESET as WinGo/KillFiles.C) deletes shadow
  copies and recursively overwrites files in Windows\System32\drivers
  (%CSIDL_SYSTEM%\drivers), Windows\NTDS and other non-system drives
  with 4096-byte blocks of randomly generated data, then reboots the
  host. ESET attributed the attack to the Sandworm APT group. It was
  pushed through Group Policy — the same fashion ESET observed for
  HermeticWiper and CaddyWiper — continuing the destructive wiper
  cadence Sandworm has run against Ukraine (HermeticWiper, CaddyWiper
  and the RansomBoggs ransomware wave, alongside the older BlackEnergy
  / GreyEnergy / Industroyer / Industroyer2 operations documented by
  ESET).
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: ESET
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-01-27
    attribution_source_id: eset/2023-01-27_swiftslicer-sandworm
    notes: |
      ESET attributes SwiftSlicer directly, without hedge: "ESET
      researchers have uncovered a new wiper attack in Ukraine that
      they attribute to the Sandworm APT group." Contrast the 2022
      wiper wave, which ESET could only attribute to Sandworm
      retrospectively "with varying degrees of confidence" (hence
      the sibling HermeticWiper/IsaacWiper events are moderate) —
      SwiftSlicer is attributed at disclosure, so high. ESET names
      the group "Sandworm" (= GRU Unit 74455) but does not spell out
      the GRU/unit in-text, so attribution_level is named-actor; the
      GRU/Unit-74455 identity rests on the actor record.
