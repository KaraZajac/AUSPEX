id: 2023-01/chainalysis-2023-crypto-crime-report
name: Chainalysis 2023 Crypto Crime Report — DPRK record-year quantification
start_date: 2022-01-01  # report covers calendar year 2022
disclosure_date: 2023-02-01  # AUDIT: DPRK hacking-chapter pub date; report intro launched 2023-01-12
end_date: 2022-12-31
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  In the hacking chapter of its 2023 Crypto Crime Report
  (published 1 February 2023), Chainalysis estimated that
  North Korea-linked hackers stole roughly USD 1.7B in
  cryptocurrency during 2022 — "shattering their own
  records" for a single year — out of USD 3.8B stolen in
  crypto hacks overall that year. Chainalysis attributed the
  DPRK total to the Lazarus Group cluster and reported that
  USD 1.1B of it came from DeFi-protocol hacks, with
  cross-chain bridge protocols accounting for 64% of the
  USD 3.1B stolen from DeFi in 2022. (Per-incident figures
  such as Ronin and Harmony are documented in their own
  event entries and in the Treasury/FBI primary sources, not
  in this aggregate Chainalysis report.)
false_flag_risk: none
summary: |
  Documentary quantification event: the hacking chapter of
  Chainalysis's 2023 Crypto Crime Report is the year-one
  (calendar-2022) measurement of DPRK cryptocurrency theft,
  and AUSPEX uses it as the baseline anchor for the
  revenue-aggregation pillar of the 8th-Congress defense
  plan. Chainalysis's USD 1.7B DPRK total and the
  cross-chain-bridge concentration it documents establish
  the reference point against which later annual DPRK-theft
  totals are read. This aggregate report carries the
  year-total and cluster-level (Lazarus) attribution only;
  per-incident dollar figures and per-cluster
  (TraderTraitor / BlueNoroff) attributions live in their
  own event entries and in the Treasury / FBI / UN-PoE
  primary sources.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: Chainalysis
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2023-02-01
    attribution_source_id: chainalysis/2023-02-01_2022-biggest-year-crypto-hacking
    notes: |
      Chainalysis attributes the aggregate USD 1.7B 2022
      theft to "North Korea-linked hackers such as those in
      cybercriminal syndicate Lazarus Group" ("hacks we've
      attributed to them") — nation + named-actor. No
      RGB / Bureau-121 unit is named in-source; the RGB
      scoping is the actor record's, not this source's.
      Chainalysis names only Lazarus here, not TraderTraitor
      or BlueNoroff. Per-event attributions are documented in
      the specific event entries (Ronin, Harmony, etc.) and
      in Treasury / FBI primary sources.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      Chainalysis attributes the record USD 1.7B 2022 DPRK
      theft to the Lazarus cluster and states that "most
      experts agree" the proceeds fund the DPRK's nuclear
      weapons programs — the strategic end the 8th-Congress
      defense plan's revenue-aggregation pillar encodes. It
      further reports that cross-chain bridge protocols drove
      64% of 2022 DeFi theft and that USD 1.1B of the DPRK
      total came from DeFi hacks, matching the
      crypto-bridge-theft program specifically. Held at
      strongly_inferred rather than attested: the
      weapons-financing purpose is carried by a secondary
      vendor as a reported expert consensus ("most experts
      agree"), not asserted as the vendor's own finding and
      not in the crisp WMD / ballistic-missile-financing
      terms that govt-primary (OFAC / FBI) sources use for
      attested links on this program.
    contested: false
    analyst: claude
    attesting_source_id: chainalysis/2023-02-01_2022-biggest-year-crypto-hacking
    inference_basis:
      signals:
        - "Chainalysis: North Korea-linked hackers 'shattered their own records ... stealing an estimated $1.7 billion worth of cryptocurrency' in 2022 — a record year."
        - "Chainalysis: 'Most experts agree the North Korean government is using these stolen [funds] to fund its nuclear weapons programs' — names the strategic end the doctrine encodes."
        - "Chainalysis: cross-chain bridge protocols accounted for 64% of the $3.1B stolen from DeFi in 2022 and $1.1B of the DPRK total came from DeFi hacks — matches the crypto-bridge-theft program."
      ruled_out: "Generic financially-motivated cybercrime with no state-programme nexus — ruled out because the same source ties the theft to the DPRK state and to nuclear-weapons financing."
targets: []
sources:
