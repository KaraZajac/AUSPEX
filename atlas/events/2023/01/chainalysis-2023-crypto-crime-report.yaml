outcome_summary: |
  Chainalysis published its 2023 Crypto Crime Report
  documenting USD 1.7B in cryptocurrency stolen by
  DPRK-affiliated actors during 2022 — a record annual total
  at the time of publication and roughly 4x the 2021 figure.
  Three operations dominated the year: Ronin Bridge
  (USD 625M, March), Harmony Horizon (USD 100M, June), and
  the longer-tail collection of crypto-exchange and DeFi
  thefts attributed to the Lazarus / TraderTraitor /
  BlueNoroff cluster.
false_flag_risk: none
summary: |
  Cumulative-quantification document that anchors the
  doctrinal framing of the revenue-aggregation pillar:
  Chainalysis's 2022 total subsequently cited by Treasury
  OFAC's November 2023 Sinbad designation, FBI's January
  2023 Harmony attribution, and the UN Panel of Experts
  reports as the canonical year-one quantification of
  the 8th-Congress defense plan's crypto-theft revenue
  stream. The 2023 total (USD ~1.0B), 2024 total
  (~USD 1.34B), and 2025 single-event Bybit theft
  (USD 1.5B+) each calibrate against this baseline.
