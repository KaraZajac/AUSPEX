id: 2023-01/bitzlato-takedown
name: Bitzlato cryptocurrency exchange shut down; founder Legkodymov arrested
start_date: 2023-01-17
disclosure_date: 2023-01-18
end_date: 2023-01-18
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US DOJ + French + Spanish + Portuguese + Cypriot Operation
  HOTYACHT action against Bitzlato — a Russia-based
  cryptocurrency exchange laundering Conti / Hydra-Market
  ransomware proceeds. Founder Anatoly Legkodymov (Russian
  national) arrested in Miami on January 17 2023. US
  Treasury FinCEN concurrent designation of Bitzlato as a
  "primary money laundering concern" under section 9714
  of the Combating Russian Money Laundering Act — the
  first use of that authority since enactment. French
  authorities seized the Bitzlato infrastructure;
  Legkodymov pleaded guilty December 2023.
false_flag_risk: none
summary: |
  Bitzlato is the canonical case of FinCEN's section-9714
  authority being deployed against Russian-criminal-
  laundering infrastructure, paired with DOJ unlicensed-
  money-transmitter charges against the operator. AUSPEX
  classifies as criminal-baseline.
