      2022"; "$4.58 billion worth of cryptocurrency transactions"; "more than
      15 million dollars' worth of cryptocurrency representing the proceeds of
      ransomware attacks"; "264 million visits from U.S.-based IP addresses".
    - fincen/2023-01-18_bitzlato-primary-money-laundering-concern (ADDED) —
      fincen.gov HTML, sha256 9dbd06b7...312b4074, 35,656 bytes. Carries
