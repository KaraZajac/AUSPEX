initial_vector: unknown
outcome_summary: |
  US DOJ (Eastern District of New York) and the FBI charged
  Bitzlato's founder and majority owner, Anatoly Legkodymov —
  a Russian national residing in Shenzhen, China — with
  operating an unlicensed money transmitting business
  (18 U.S.C. § 1960); he was arrested in Miami on 17 January
  2023 and the action was announced on 18 January 2023.
  Bitzlato, a Hong Kong-registered peer-to-peer cryptocurrency
  exchange, had a reciprocal relationship with the Hydra
  darknet market (shuttered April 2022); the FBI complaint
  details roughly $4.58 billion in total cryptocurrency
  transactions and more than $15 million in ransomware
  proceeds, and DOJ characterised Bitzlato as having processed
  over $700 million of illicit funds. Concurrently, US Treasury
  FinCEN issued the FIRST order under section 9714(a) of the
  Combating Russian Money Laundering Act, designating Bitzlato
  a "primary money laundering concern" in connection with
  Russian illicit finance (FinCEN's order — not the DOJ
  complaint — names the Conti ransomware-as-a-service group and
  the Russia-connected Hydra market). European law enforcement
  shut down Bitzlato's platform infrastructure hosted on
  servers in France, with further arrests of senior staff in
  Spain and Cyprus, in a Europol-coordinated action spanning
  France, Spain, Portugal, Cyprus and the USA.
false_flag_risk: none
summary: |
  Bitzlato is the canonical case of FinCEN's section-9714
  authority being deployed against Russian-criminal-
  laundering infrastructure, paired with DOJ unlicensed-
  money-transmitter charges against the operator. AUSPEX
  classifies as criminal-baseline.
