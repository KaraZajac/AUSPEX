    [a] FACTS — CORRECTIONS: (1) REMOVED "Operation HOTYACHT" — fabricated;
    no such operation name appears in the DOJ complaint, the Europol release,
    or any reporting (dedicated WebSearch returned nothing; Paul Weiss + ACFCS
    state no operation name). (2) "Russia-based cryptocurrency exchange" ->
    "Hong Kong-registered" (complaint, verbatim); the Russia nexus is the
    Russian founder + FinCEN's Russian-illicit-finance framing, not the
    company's domicile. (3) "Conti / Hydra-Market ransomware proceeds"
    attributed only to DOJ — Conti is NOT in the DOJ complaint (the sole
    "conti" string is "continued to administer"); Conti is FinCEN's-order
    language — re-attributed to FinCEN and FinCEN added as a source. (4)
    REMOVED "Legkodymov pleaded guilty December 2023" — a later development
    (DOJ 2023-12-06) not carried by any Jan-2023 source of record; see FLAG.
    [b] ATTRIBUTION — null-actor counter-action, correct (criminal baseline,
    no adversary). attributing_org normalized to "US DOJ (EDNY) + FBI +
    Treasury FinCEN + French authorities + Europol"; confidence high; concur.
    [c] DATES — start_date 2023-01-17 = arrest (Miami; corroborated by
    reporting — the affidavit predates the arrest); disclosure_date /
    end_date 2023-01-18 = the DOJ/FinCEN announcement. DOJ + FinCEN
    published_on 2023-01-18 (FinCEN verbatim "Immediate Release January 18,
    2023"). Europol page published_on set 2023-01-23 (its own JSON-LD
    datePublished; the action itself was 17-18 Jan).
    [d] DOCTRINE_LINKS — [] retained. Criminal baseline (money laundering,
    ransomware/darknet proceeds); no state nexus asserted; no doctrine applies.
    [e] ATTRIBUTION_LEVEL — omitted (null): actor_id is null, so there is no
    attributed adversary to grade (per the hydra-darknet-takedown convention);
