  notes: |
    Null-actor law-enforcement + policy counter-action (DOJ/FBI criminal
    charge + Treasury FinCEN section-9714 designation + Europol-coordinated
    EU takedown) against the Bitzlato exchange and its operator. Modeled on
    the hydra-darknet-takedown precedent. level=partial: the DOJ press
    release of record (the cited url) is Akamai bm-verify walled (curl +
    WebFetch both return the ~2.5KB interstitial / HTTP 403) and could not be
    raw-snapshotted; instead its ATTACHED charging document was snapshotted,
    and two supporting primaries were added + hashed.

    SOURCES / SNAPSHOTS:
    - doj/2023-01-18_bitzlato-takedown — raw_snapshot is the press release's
      attached FBI amended affidavit & complaint (No. 23-M-17, SA Ryan
      Rogers), DOJ file 1562996 via .../press-release/file/1562996/dl (the
      /file/<id>/dl path bypasses the wall). sha256 9d765c5a...d28dd277,
      857,128 bytes. Carries verbatim: "Bitzlato Limited ('Bitzlato') is a
      Hong Kong-registered cryptocurrency" exchange; Legkodymov "a
      40-year-old Russian national who resides in Shenzhen, People's Republic
      of China" (also administered Bitzlato from Miami, Florida); §1960
