id: 2023-01/bitzlato-takedown
name: Bitzlato cryptocurrency exchange shut down; founder Legkodymov arrested
start_date: 2023-01-17
disclosure_date: 2023-01-18
end_date: 2023-01-18
incident_type:
  - law-enforcement
