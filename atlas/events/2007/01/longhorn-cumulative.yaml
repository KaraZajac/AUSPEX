id: 2007-01/longhorn-cumulative
name: Longhorn / Vault 7 operations (cumulative, 2007–2017)
start_date: 2007-01-01  # Symantec earliest activity
disclosure_date: 2017-03-07  # WikiLeaks Vault 7 Year Zero release
end_date: 2017-11-09  # last Vault 7 release
incident_type:
  - intrusion
initial_vector: unknown  # varies across the 40+ targets
outcome_summary: |
  Cumulative CIA CCI / EDG covert-action-support and HUMINT-paired
  cyber collection across 40+ organizations in 16 countries (Europe,
  Asia, Africa, Middle East) — governments, telecoms, financial,
  energy, IT, aerospace. Exposed via the WikiLeaks Vault 7 dump
  (8,761 documents) March 7 – November 9, 2017. CIA EDG developer
  Joshua Schulte convicted in SDNY July 2022.
false_flag_risk: none  # though Vault 7's "Marble" framework included false-flag-capable obfuscation
summary: |
  This is a cumulative event entry covering the operational cluster
  exposed in Vault 7 rather than a single discrete operation. Tools
  documented: HIVE C2, Fluxwire / Corentry, Brutal Kangaroo (air-gap
  jump via USB), Weeping Angel (Samsung TV firmware), Pandemic
  (file-share infection), ELSA (Wi-Fi geolocation), Year Zero
  (initial release), Athena, Marble Framework (string-obfuscation
  with multi-language decoys). Symantec's "Longhorn" cluster and
  Kaspersky's "Lamberts" cluster were merged with Vault 7 attribution
  in April 2017.
