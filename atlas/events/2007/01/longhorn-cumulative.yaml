id: 2007-01/longhorn-cumulative
name: Longhorn / Vault 7 operations (cumulative, 2007–2017)
start_date: 2007-01-01  # Symantec: "some evidence of activity dating back as far as 2007" (confirmed active since at least 2011; first seen by Symantec 2014)
disclosure_date: 2017-03-07  # WikiLeaks Vault 7 Year Zero release
end_date: 2017-11-09  # last Vault 7 release
incident_type:
  - intrusion
initial_vector: unknown  # varies across the 40+ targets
outcome_summary: |
  Cumulative CIA CCI / EDG cyber-espionage collection across 40+
  organizations in at least 16 countries (Europe, Asia, Africa,
  Middle East) — governments, telecoms, financial, energy, IT,
  aerospace. Exposed via the WikiLeaks Vault 7 dump (8,761 documents)
  March 7 – November 9, 2017. CIA EDG developer Joshua Schulte
  convicted in SDNY July 2022.
false_flag_risk: none  # though Vault 7's "Marble" framework included false-flag-capable obfuscation
summary: |
  This is a cumulative event entry covering the operational cluster
  exposed in Vault 7 rather than a single discrete operation. Tools
  documented: HIVE C2, Fluxwire / Corentry, Brutal Kangaroo (air-gap
  jump via USB), Weeping Angel (Samsung TV firmware), Pandemic
  (file-share infection), ELSA (Wi-Fi geolocation), Year Zero
  (initial release), Athena, Marble Framework (string-obfuscation
  with multi-language decoys). Symantec's "Longhorn" cluster and
  Kaspersky's "Lamberts" cluster were merged with Vault 7 attribution
  in April 2017.
attributions:
  - actor_id: us/cia/longhorn-lamberts
    attributing_org: Symantec
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2017-04-10
    attribution_source_id: symantec/2017-04-10_longhorn-vault7-link
    notes: |
      Symantec connected the pre-existing Longhorn cluster to Vault
      7 tools "with high confidence." Kaspersky's parallel Lamberts
      analysis converged on the same attribution. attribution_level
      named-actor: Symantec named the coherent "Longhorn" cluster and
      characterized it as an "English-speaking, North American",
      "state-sponsored" actor, but did NOT itself name the CIA unit —
      the CIA-unit naming comes via the WikiLeaks Vault 7 link.
  - actor_id: us/cia/longhorn-lamberts
    attributing_org: SDNY (US v. Schulte conviction)
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2022-07-13
    attribution_source_id: doj/2022-07-13_schulte-conviction
    notes: |
      The SDNY conviction of Joshua Schulte (CIA EDG developer) for
      the Vault 7 leak provides judicial corroboration of EDG
      authorship of the leaked tools.
doctrine_links:
  - doctrine_id: us/title-10-title-50
    pillar_id: null
    program_id: null
    perspective: attacker-rationale
    confidence: strongly_inferred
    reasoning: |
      Longhorn / Vault 7 tooling originated inside the CIA (a Title 50
      intelligence-community agency), per the WikiLeaks Vault 7 release
      (CIA CCI / EDG) and the SDNY conviction of CIA-CCI/EDG engineer
      Joshua Schulte — so the operations sit on the Title 50 IC
      authority track, not the Title 10 traditional-military-activity
      track that governs USCYBERCOM. The activity/exposure window
      (2007/2011–2017) predates NSPM-13 and Defend Forward (both 2018),
      so no more-specific US operational cyber doctrine existed; the
      Title 10 / Title 50 statutory frame is the applicable linkage.
      strongly_inferred, not attested: no source states the legal-
      authority basis, and the sources do not resolve whether the
      collection ran as §3093 covert action (finding + notification) or
      as Title 50 clandestine intelligence collection — only that the
      actor is a CIA IC unit. Triangulated, not stated.
    attesting_source_id: null
    inference_basis:
      signals:
        - "WikiLeaks Vault 7 attributes the tooling to the CIA's Center for Cyber Intelligence / Engineering Development Group (\"8,761 documents ... inside the CIA's Center for Cyber Intelligence\"; CIA named 100+×) — a Title 50 intelligence-community agency, not a Title 10 military command."
        - "Symantec independently characterized Longhorn as a \"state-sponsored\", \"well-resourced\" actor \"involved in intelligence gathering operations\" from \"an English-speaking, North American country\" — consistent with an IC (Title 50) collection mandate, not overt military action."
        - "The SDNY conviction of Joshua Schulte, a CIA CCI / EDG software engineer, judicially places the tooling's authorship inside the CIA (Title 50), not the DoD (Title 10)."
        - "The 2007/2011–2017 window predates NSPM-13 and Defend Forward (both 2018); the Title 10 / Title 50 framework is the only US doctrinal authority in force for the period, per the actor record's pre-NSPM-13 flag."
      ruled_out: "Title 10 traditional-military-activity (USCYBERCOM) framing: WikiLeaks and the Schulte conviction place authorship inside the CIA IC (Title 50), not a DoD military command."
    counter_explanation: null
    contested: false
    analyst: claude
