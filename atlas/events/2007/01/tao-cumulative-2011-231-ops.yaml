id: 2007-01/tao-cumulative-2011-231-ops
name: NSA TAO 2011 operational tempo — 231 offensive operations
start_date: 2011-01-01
disclosure_date: 2013-08-30  # WaPo Gellman/Nakashima "black budget"
end_date: 2011-12-31
incident_type:
  - intrusion  # cumulative; specific operations not individually disclosed
initial_vector: unknown
outcome_summary: |
  Per the leaked classified intelligence "black budget" (Snowden /
  WaPo Gellman-Nakashima, Aug 30, 2013), U.S. intelligence services
  conducted 231 offensive cyber operations in 2011 — the NSA being
  the dominant actor via its $652M GENIE program (covert implants on
  tens of thousands of machines) and its Tailored Access Operations
  (TAO) unit, both named in the article. WaPo reports ~three-quarters
  of the 231 were against "top-priority targets" which former
  officials told the Post included Iran, Russia, China and North
  Korea (the country naming is WaPo's former-officials sourcing — it
  is NOT in the leaked PPD-20 directive text, which is a general
  OCEO/DCEO policy framework that names no specific country).
false_flag_risk: none
summary: |
  Meta / cumulative-statistic entry (NOT a single operation):
  documents the 2011 operational tempo of U.S. offensive cyber
  operations — 231 in the calendar year — disclosed in the leaked
  classified intelligence budget (Snowden / WaPo Gellman-Nakashima).
  The figure is an intelligence-community aggregate; the NSA is the
  named lead via GENIE and TAO. The *existence and count* are
  documentary-attested via the budget leak; the individual
  operations and their precise targets remain undisclosed.

  Useful as a baseline reference for pre-Defend-Forward / pre-NSPM-13
  U.S. SIGINT-and-CNE tempo.
attributions:
