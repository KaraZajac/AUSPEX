    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      These are U.S. intelligence-community offensive cyber operations
      (NSA-led, via GENIE/TAO) disclosed in the classified intelligence
      budget — i.e. Title 50 IC activity, the statutory framework under
      which NSA SIGINT/CNE is conducted. The Title-10/Title-50 backstop
      applies to any U.S. offensive cyber operation by construction.
    attesting_source_id: wapo/2013-08-30_black-budget-231-offensive-ops
    inference_basis:
      signals:
        - WaPo article documents NSA + TAO conducting offensive
          operations funded under the classified intelligence (Title
          50 IC) budget — GENIE, $652M.
        - Title 10 / Title 50 is the foundational statutory framework
          for every U.S. offensive cyber operation (per the doctrine
          record's own cyber_relevance).
      ruled_out: |
        The more specific operational doctrines (Defend Forward,
        NSPM-13, Hunt Forward, Persistent Engagement) postdate 2011
        and so cannot frame a 2011-tempo event; Title-10/Title-50 is
        the correct era-appropriate authority.
    contested: false
    analyst: claude
