    attributing_org: WaPo (Gellman/Nakashima, Snowden archive)
    attributing_org_confidence: high
    attribution_level: named-unit  # WaPo names the NSA and its TAO unit explicitly
    auspex_assessment: concur-with-caveat
    attribution_date: 2013-08-30
    attribution_source_id: wapo/2013-08-30_black-budget-231-offensive-ops
    notes: |
      Documentary leak (NSA black budget): the WaPo article names the
      NSA and its Tailored Access Operations (TAO) unit by name, hence
      named-unit. CAVEAT: the 231 figure is an intelligence-community
      tempo AGGREGATE that WaPo attributes to "U.S. intelligence
      services" (NSA the dominant actor via the $652M GENIE program) —
      it is not an Equation-Group-specific count. AUSPEX maps the
      Equation-Group actor record to the us/nsa/tao service, so this
      record is the corpus's institutional NSA/TAO handle for the
      tempo statistic, not a claim that the "Equation Group" cluster
      ran 231 named operations. Individual operations remain opaque.
doctrine_links:
