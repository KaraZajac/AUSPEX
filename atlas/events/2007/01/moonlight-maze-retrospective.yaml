id: 2007-01/moonlight-maze-retrospective
name: Moonlight Maze (1996–1999) — retrospective reattribution to Turla lineage
start_date: 1996-10-01
disclosure_date: 1999-03-04  # initial public disclosure
end_date: 1999-05-31  # active phase end (retrospective)
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown  # likely valid-creds / academic-network pivoting
outcome_summary: |
  Moonlight Maze was a multi-year intrusion campaign discovered in
  1998 by US Department of Defense and FBI investigators,
  targeting DoD, Department of Energy national laboratories, NASA,
  and US defense contractors. Stolen material included weapons-
  systems specifications, military hardware designs, and DOE
  research. The intrusions transited Russian academic and ISP
  netblocks; on-record US-government attribution to Russian
  state operators was made by Deputy SecDef John Hamre in 1999
  Senate testimony. Subsequent declassified material and the
  2017 Kaspersky GReAT / Kings College London joint retrospective
  established that Moonlight Maze tooling (LOKI2 backdoor) shares
  code lineage with Turla — the FSB Center 16 actor cluster — via
  a 2011 sample, making Turla the longest-running publicly
  documented state-actor cluster in cyber history.
false_flag_risk: none
summary: |
  Moonlight Maze is the foundational publicly known Russian state
  cyber operation. AUSPEX records it as a 2007/01 retrospective
  event slug because the canonical doctrinal interpretation —
  Turla lineage — was established only in 2016–2017 via the
  Kings College / Kaspersky reattribution work. The campaign
  predates the institutional cyber structures it foreshadowed,
  including the 2008 Buckshot Yankee response and the 2018
  Russian FSB Center 16 sanctions designations. The choice of
  start_date 1996 reflects the earliest assessed compromise per
  Hamre's testimony; the retrospective slug date 2007/01 is a
  marker for analytic-record convenience.
attributions:
