    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Operation predates NSPM-13 and the Defend Forward / Persistent
      Engagement doctrinal vocabulary. Authority pathway was the
      then-PPD-20 framework. Tagged here as the closest extant
      doctrine; the foundational nature is captured in narrative.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: il/begin-doctrine
    perspective: attacker-rationale
    pillar_id: il/begin-doctrine/counter-wmd-cyber-sabotage
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Stuxnet is the type specimen of the Begin Doctrine's cyber
      extension — counter-WMD action by code where kinetic strike
      against Natanz was politically and operationally infeasible.
      Joint US-Israeli authorship is journalistically established
      (Sanger 2012, Zetter 2014, Bamford 2016) but never officially
      attested by Israel; the Begin Doctrine alignment is the
      doctrinal frame under which Israeli participation is best
      understood.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: il/counter-iran-posture
    perspective: attacker-rationale
    pillar_id: il/counter-iran-posture/counter-nuclear-program
    program_id: null
    confidence: strongly_inferred
    reasoning: |
