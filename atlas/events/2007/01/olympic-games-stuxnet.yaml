    attributing_org: David Sanger / NYT (multi-source journalism)
    attributing_org_confidence: high
    attribution_level: named-actor  # added 2026-07-11: Olympic Games team cluster; NSA/TAO + Unit 8200 journalistically named but officially unconfirmed, so not named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2012-06-01
    attribution_source_id: nyt/2012-06-01_sanger-obama-order-cyberattacks-iran
    notes: |
      Attribution is `journalistic + leak-attributed` — never
      officially acknowledged by US or Israeli governments. Israel
      has maintained its standing non-attestation posture on
      offensive cyber operations throughout; multi-source tier-1
      reporting (Sanger 2012, Zetter 2014, Symantec technical
      analysis Feb 2011) and Snowden 2013 IC corroboration
      establish the joint US/IL attribution with high confidence.
doctrine_links:
  - doctrine_id: us/title-10-title-50
    perspective: attacker-rationale
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Olympic Games was run as a US covert action, not an overt
      military operation: Sanger reports a program authorized at
      presidential level and briefed to congressional leadership — the
      Title 50 covert-action track (50 U.S.C. §3093) that the Title 10
      / Title 50 framework encodes. NSPM-13 and the Defend Forward /
      Persistent Engagement vocabulary postdate the 2007-2010
      operation, so the covert-action statutory frame is the
      applicable US doctrinal linkage for this foundational case.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Sanger reports Olympic Games as a covert program authorized at presidential level and briefed to congressional leadership — the hallmark of a Title 50 covert action (finding + notification), not a Title 10 traditional military activity."
        - "The operation predates NSPM-13 (2018) and Defend Forward (2018), so no more-specific US operational cyber doctrine existed at the time."
        - "The underlying covert-action authority (National Security Act §503 / 50 U.S.C. §3093) long predates Stuxnet."
      ruled_out: "Title 10 traditional-military-activity framing: Sanger describes a covert action with presidential authorization and congressional-leadership notification, not an overt USCYBERCOM / Title 10 operation."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: il/begin-doctrine
    perspective: attacker-rationale
    pillar_id: il/begin-doctrine/counter-wmd-cyber-sabotage
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Stuxnet is the type specimen of the Begin Doctrine's cyber
      extension — counter-WMD action by code where kinetic strike
      against Natanz was politically and operationally infeasible.
      Joint US-Israeli authorship is journalistically established
      (Sanger 2012, Zetter 2014) but never officially attested by
      Israel; the Begin Doctrine alignment is the doctrinal frame
      under which Israeli participation is best understood.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target is Iran's IR-1 uranium-enrichment centrifuges at Natanz — a WMD fuel-cycle asset, the core object of the Begin Doctrine's counter-proliferation frame."
        - "Sanger reports the cyber program was pursued partly to forestall or substitute for an Israeli conventional military strike on Iran's nuclear facilities — the doctrine's sabotage-when-kinetic-action-is-constrained logic."
        - "The il/begin-doctrine record explicitly names Stuxnet and Olympic Games as key terms under the counter-wmd-cyber-sabotage pillar."
      ruled_out: "Generic espionage / collection motive: Stuxnet was a destructive sabotage payload physically degrading centrifuges, not an intelligence-collection operation (contrast Flame / Duqu)."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: il/counter-iran-posture
    perspective: attacker-rationale
    pillar_id: il/counter-iran-posture/counter-nuclear-program
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Operation against Iranian uranium enrichment at Natanz sits
      squarely under the counter-nuclear-program pillar — the
      operational debut of Israeli counter-WMD-cyber.
    attesting_source_id: null
    inference_basis:
      signals:
        - "The operation's sole target was Iran's uranium-enrichment centrifuges at Natanz — the counter-nuclear-program pillar's exact object."
        - "Journalistic reporting (Sanger 2012, Zetter 2014) frames Israeli participation as counter-proliferation action against Iran's nuclear programme."
      ruled_out: "Non-Iran-nuclear motive: the sole target was Iran's Natanz enrichment plant, not a broader or unrelated adversary asset."
    counter_explanation: null
    contested: false
    analyst: claude
