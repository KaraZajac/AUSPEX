id: 2007-05/ghostnet
name: GhostNet — PRC surveillance of Tibetan and diplomatic targets
start_date: 2007-05-22  # AUDIT: earliest infection "called home" 2007-05-22 (Tracking GhostNet, Infection timeline p.44)
disclosure_date: 2009-03-28  # public disclosure via NYT; report cover dated 2009-03-29
end_date: null  # AUDIT: report states the network "continues to be operational" (last sampled infection 2009-03-12); no end asserted by source — prior 2009-03-31 was unsupported
incident_type:
  - intrusion
  - data-theft
  - espionage
  - surveillance
initial_vector: phishing
outcome_summary: |
  The Information Warfare Monitor (Citizen Lab / SecDev Group)
  disclosed "GhostNet", a cyber-espionage network of at least
  1,295 infected hosts in 103 countries — active from at least
  May 2007 and still operational at disclosure — of which close
  to 30% (397 hosts) were assessed as high-value. These included
  the Office of His Holiness the Dalai Lama and the Tibetan
  Government-in-Exile (Dharamsala) plus Tibetan missions/NGOs;
  the foreign ministries of Iran, Bangladesh, Latvia, Indonesia,
  the Philippines, Brunei, Barbados and Bhutan; embassies of
  India, Pakistan, South Korea, Germany, Romania, Cyprus, Malta,
  Portugal, Thailand, Taiwan and Indonesia; the ASEAN
  Secretariat, SAARC and the Asian Development Bank; and an
  unclassified computer at NATO (SHAPE HQ). Infected hosts were
  directed to download the gh0st RAT Trojan, giving attackers
  full real-time control — file manager, screen capture,
  keylogging, and covert webcam ("webcam view") and microphone
  ("audio capture"). Control was consistently exercised from
  commercial Internet accounts on Hainan Island, PRC; the report
  noted Hainan is "home of the Lingshui signals intelligence
  facility and the Third Technical Department of the People's
  Liberation Army" but cautioned against "rush[ing] to judgement"
  — it did not affirmatively attribute the network.
false_flag_risk: none  # AUDIT: report floats a false-flag *possibility* ("a state other than China, but operated physically within China ... to deliberately mislead observers") as epistemic humility, but presents NO affirmative deception indicators; kept none
summary: |
  "Tracking GhostNet" (Information Warfare Monitor — a joint
  Citizen Lab / SecDev Group venture; report dated 2009-03-29,
  publicly disclosed 2009-03-28) is the foundational unclassified
  case study of PRC-nexus dissident-and-diplomatic cyber
  espionage at scale. The Information Warfare Monitor did NOT
  formally attribute the network: it stated "we do not know the
  motivation or the identity of the attacker(s)", called the
  Chinese-state reading "the most obvious explanation, and
  certainly the one in which the circumstantial evidence tilts
  the strongest", yet cautioned that alternatives — a for-profit
  criminal venture, "patriotic hackers", or a false flag run by
  "a state other than China, but operated physically within
  China" — were "certainly possible", and its foreword warns that
  attributing all Chinese malware to the Chinese state is "wrong
  and misleading". Subsequent vendor and journalistic reporting
  attribute GhostNet to PRC services; the atlas files the
  Tibetan/diaspora targeting under the (later, 2017) National
  Intelligence Law's diaspora-and-dissident-collection frame as a
  retrospective doctrinal lineage, not an op-follows-publication
  claim.
attributions:
  - actor_id: null
    attributing_org: "Information Warfare Monitor (Citizen Lab / SecDev Group)"
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2009-03-28
    attribution_source_id: citizenlab/2009-03-28_ghostnet
    notes: |
      The Information Warfare Monitor explicitly DECLINED to
      attribute GhostNet: "Who is ultimately in control of the
      GhostNet system? ... we do not know the motivation or the
      identity of the attacker(s)." It assessed the Chinese-state
      reading as "the most obvious explanation, and certainly the
      one in which the circumstantial evidence tilts the strongest"
      (targets "clearly linked to Chinese foreign and defence
      policy"; attacker IPs tracing to Hainan Island, "home of the
      Lingshui signals intelligence facility and the Third
      Technical Department of the People's Liberation Army"), but
      immediately cautioned against "rush[ing] to judgement",
      floated a false-flag alternative (a network "targeted by a
      state other than China, but operated physically within China
      ... to deliberately mislead observers"), and its foreword
      warns that attributing all Chinese malware to the Chinese
      state is "wrong and misleading". Hence actor_id null,
      confidence low, attribution_level activity-cluster (IWM
      firmly established the GhostNet cluster + China-based C2 but
      NOT a nation/actor attribution). Later vendor and
      journalistic reporting attribute to PRC services; no actor
      slug in this atlas resolves to the GhostNet cluster.
      auspex_assessment concur-with-caveat: AUSPEX assesses
      PRC-nexus as the strongest reading (and files it under CN
      doctrine) while honoring the primary's explicit
      non-attribution.
      # AUDIT 2026-07-05: STRIPPED a fabricated quote — the prior
      # notes quoted CitizenLab as "the evidence at our disposal
      # does not allow us to conclusively determine" state
      # sponsorship; that phrase appears NOWHERE in the report.
doctrine_links:
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    program_id: null
    confidence: plausible
    reasoning: |
      The Office of the Dalai Lama, the Tibetan Government-in-Exile,
      Tibetan missions/NGOs (Drewla, Int'l Campaign for Tibet,
      Students for a Free Tibet) and Falun Gong as core targets is
      the paradigm diaspora-and-dissident collection pattern this
      pillar encodes. TEMPORAL CAVEAT: the operation (2007-2009)
      PREDATES the 2017 National Intelligence Law by ~8-10 years,
      so this is a retrospective doctrinal-lineage frame, NOT an
      op-follows-publication claim — the collection behaviour runs
      through earlier PRC state-security practice (State Security
      Law 1993, routine MSS tasking) the 2017 statute later
      codified. Confidence is plausible (not higher) because the
      Information Warfare Monitor expressly declined to attribute
      the network to the PRC state, so the strategic-intent reading
      is AUSPEX inference layered on a hedged attribution.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "PRC diaspora-and-dissident collection: the Tibetan / Dalai-Lama / Falun-Gong core and Hainan-based C2 fit the pillar, and IWM calls a Chinese-state explanation 'the most obvious'."
        - "Non-state or false-flag operation: IWM itself floats a for-profit criminal venture, 'patriotic hackers', or another state operating through PRC-based proxies — under which no PRC doctrine applies."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/taiwan-island-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Taiwan reported the single largest number of GhostNet
      infections (report geographic analysis: "Taiwan reported the
      most infections"), including the Taiwan External Trade
      Development Council (TAITRA, 79 infections), the Taiwan
      Government Service Network, the Institute for Information
      Industry, Net Trade, and the ROC (Taiwan) embassy — on-island
      Taiwanese government, trade and economic targets that fit the
      Taiwan-island-collection pillar. IWM notes many high-profile
      targets reflect "China's most vexing foreign and security
      policy issues, including Tibet and Taiwan". Plausible (not
      higher): IWM declined attribution, and the same nodes are
      equally consistent with the broad 103-country diplomatic
      sweep, so more than one strategic reading survives.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Taiwan-reunification / one-China collection: Taiwan was the most-infected country and on-island ROC government and trade networks were hit, fitting cross-Strait sovereignty collection."
        - "Generic regional espionage: the Taiwan nodes may simply be part of the broad 103-country diplomatic sweep rather than reunification-specific tasking."
    contested: false
    analyst: claude
