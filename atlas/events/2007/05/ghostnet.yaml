id: 2007-05/ghostnet
name: GhostNet — PRC surveillance of Tibetan and diplomatic targets
start_date: 2007-05-01
disclosure_date: 2009-03-28
end_date: 2009-03-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Citizen Lab / SecDev disclosed a two-year intrusion network
  ("GhostNet") of 1,295 compromised hosts across 103 countries
  — concentrated on the Tibetan Government-in-Exile, the Dalai
  Lama's Private Office, embassies (India, Iran, Pakistan, NATO
  member states), and Asian foreign ministries. Malware
  ("gh0st RAT") provided full keyboard, screen, file-system, and
  microphone/webcam capture. C2 servers were geolocated to
  Hainan Island, with overlap to the Lingshui PLA SIGINT station
  noted but not affirmatively attributed.
false_flag_risk: none
summary: |
  The Citizen Lab "Tracking GhostNet" report (2009-03-28) is the
  foundational academic disclosure of PRC-aligned dissident
  surveillance at industrial scale. Attribution was not formally
  asserted by Citizen Lab — the authors carefully described the
  network as "consistent with" Chinese intelligence interests
  without naming a service. Subsequent vendor analysis and the
  2017 Intelligence Law's later codification of compelled-
  cooperation and overseas Chinese surveillance retrospectively
  frame GhostNet as a paradigm case of the diaspora-and-dissident
  collection pattern.
attributions:
  - actor_id: null
    attributing_org: Citizen Lab + SecDev
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2009-03-28
    attribution_source_id: citizenlab/2009-03-28_ghostnet
    notes: |
      Citizen Lab's report explicitly declined to attribute to the
      PRC state, noting that "the evidence at our disposal does not
      allow us to conclusively determine" state sponsorship despite
      C2 infrastructure inside the PRC. Subsequent vendor analysis
      (Trend Micro, FireEye) and journalistic reporting attribute
      to PRC services; no actor slug in this atlas cleanly resolves
      to the GhostNet cluster.
