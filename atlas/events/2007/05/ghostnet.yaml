    role: primary  # Tibetan Government-in-Exile + Offices of Tibet (London/NY/Brussels/Geneva)
  - target_id: sectors/civil-society/dissident
    role: primary  # Drewla, Students for a Free Tibet, Int'l Campaign for Tibet, Falun Gong
  - target_id: sectors/government/foreign-ministry
    role: primary  # ~30% high-value: MFAs (Iran, Bangladesh, Latvia, Indonesia, Philippines, Brunei, Barbados, Bhutan) + embassies + NATO SHAPE HQ
