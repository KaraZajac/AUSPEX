  notes: |
    Audited against the RAW primary — "Tracking GhostNet:
    Investigating a Cyber Espionage Network" (Information Warfare
    Monitor / Citizen Lab + SecDev), raw PDF snapshotted + hashed
    (sha256 26c67c59…c6243702, 6,093,206 bytes, 53 pp; the genuine
    full report, not a homepage/phantom). LEVEL partial: the second
    cited source (nyt/2009-03-28_ghostnet) is bot-walled (HTTP 403,
    774-byte error page) and could NOT be snapshotted — but it is
    non-load-bearing (every fact + the attribution hedge is carried
    by the fully-captured primary), so substantive verification is
    complete; partial reflects only the un-snapshottable NYT cite.

    [a] FACTS — corrected. Verbatim-supported: "at least 1,295
    infected computers in 103 countries"; "close to 30%" high-value
    (397/1,295 = 26.7%); gh0st RAT capabilities "file manager,
    screen capture, keylogger, remote shell, system, webcam view,
    audio capture" (=> keyboard/screen/file-system/webcam/mic);
    Hainan C2 "commercial Internet access accounts located on the
    island of Hainan". Lingshui claim VALIDATED verbatim: IPs
    "trace back ... to Hainan Island, home of the Lingshui signals
    intelligence facility and the Third Technical Department of the
    People's Liberation Army", paired with "cautious to rush to
    judgement" => "noted but not affirmatively attributed" is fair.
    FIXED "embassies (India, Iran, Pakistan…)": Iran was a Ministry
    of Foreign Affairs, NOT an embassy — moved to the MFA list.
    Added espionage + surveillance to incident_type (report title
    "Cyber Espionage Network"; covert webcam/mic + Box-1 dissident
    monitoring where PRC interrogators held "full transcripts of
    her Internet chats").

    [b] ATTRIBUTION — de-over-attributed + fabrication stripped.
    REMOVED a fabricated quote: prior attribution notes quoted
    Citizen Lab as "the evidence at our disposal does not allow us
    to conclusively determine" state sponsorship — this phrase does
    NOT appear in the report ("conclusively" occurs once, unrelated:
    "conclusively compromised by multiple infections"). Also removed
    the summary's fabricated '"consistent with" Chinese intelligence
    interests' (string "consistent with" appears only in "activities
    consistent with our mission"). Replaced with genuine
    non-attribution language: "we do not know the motivation or the
    identity of the attacker(s)". Downgraded attributing_org_
    confidence moderate -> LOW (IWM expressly declined and floated a
    false-flag-by-another-state alternative; foreword calls blanket
    Chinese-state attribution "wrong and misleading"). Set
    attribution_level activity-cluster (was missing): IWM
    established the GhostNet cluster + China-based C2 but committed
    to no nation/actor; strongest lean was "the most obvious
    explanation ... circumstantial evidence tilts the strongest".
    actor_id stays null; org normalized to "Information Warfare
    Monitor (Citizen Lab / SecDev Group)".

    [c] DATES — corrected. start_date 2007-05-01 -> 2007-05-22
    ("The earliest infected computer called home to the control
    server on May 22, 2007"). end_date 2009-03-31 -> null (report:
    network "continues to be operational"; last sampled infection
    2009-03-12; no end asserted — the hard date was unsupported).
    disclosure_date 2009-03-28 kept (public disclosure via NYT);
    report cover dated 2009-03-29 (noted on the source record);
    source published_on unchanged (2009-03-28, matches id slug).

    [d] DOCTRINE_LINKS — both kept at plausible (lowest rung; no
    attesting_source_id needed, no over-attestation). NIL-2017 /
    diaspora-and-dissident-collection: TEMPORAL INVERSION flagged —
    2007-2009 op predates the 2017 statute by ~8-10 yr; retained as
    an explicit retrospective doctrinal-lineage frame (the pillar's
    own summary designates it the frame for Tibetan/Uyghur/Falun
    Gong tasking); reasoning tightened + inference_basis.alternatives
    added. taiwan-reunification: set pillar_id -> taiwan-island-
    collection (source: Taiwan was the single most-infected country
    — TAITRA, Taiwan Govt Service Network, Institute for Information
    Industry, ROC embassy); reasoning + alternatives added. Both are
    AUSPEX inference on a hedged attribution => plausible is honest.

    [e] ATTRIBUTION_LEVEL set (was missing): activity-cluster.

    [f] ACTOR_ID null — correct; no atlas actor resolves to the
    GhostNet cluster and the cited primary establishes no service /
    named actor.

    TARGETS — reworked. Prior target_ids orgs/tibetan-government-in-
    exile and orgs/dalai-lama-private-office are BOTH DANGLING FKs
    (no such files in atlas/targets/orgs — FLAGGED). Re-pointed to
    resolvable sector FKs per the sibling-Tibetan-event convention:
    civil-society/religious (OHHDL), /diaspora (TGIE + Offices of
    Tibet), /dissident (Drewla/SFT/ICT/Falun Gong). ADDED the
    diplomatic core that was entirely absent though it is GhostNet's
    headline finding: government/foreign-ministry (~30% high-value
    MFAs/embassies + NATO SHAPE HQ) and orgs/asean-governments
    (ASEAN Secretariat, explicitly named). All 5 target FKs resolve.
