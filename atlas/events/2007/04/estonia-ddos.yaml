id: 2007-04/estonia-ddos
name: Estonia DDoS campaign ("Bronze Soldier")
start_date: 2007-04-27
disclosure_date: 2007-04-27
end_date: 2007-05-18
incident_type:
  - disruption
  - influence-operation
initial_vector: unknown
outcome_summary: |
  22-day distributed DDoS campaign against Estonian government,
  banking, and media websites following the Estonian government's
  relocation of the Soviet WWII Bronze Soldier monument. First
  state-level cyber crisis to enter Western policy discourse;
  direct catalyst for the establishment of the NATO Cooperative
  Cyber Defence Centre of Excellence (CCDCOE) in Tallinn.
false_flag_risk: none
summary: |
  Pro-Kremlin patriotic hackers (Nashi-affiliated Konstantin
  Goloskokov publicly admitted involvement in 2009) executed the
  bulk of the DDoS. State direction is assessed by Estonian CERT
  and NATO CCDCOE but has never been legally proven. AUSPEX
  preserves the dossier's strongly_inferred call.
attributions:
  - actor_id: null  # Nashi-affiliated patriotic hackers admitted involvement; no specific named cluster modeled
    service_id: null
    attributing_org: Estonian CERT / NATO CCDCOE
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2009-03-12
    attribution_source_id: ccdcoe/2008_estonia-cyber-attacks-analysis
    notes: |
      Goloskokov (Nashi commissar) self-claimed in March 2009.
      State direction inferred, not legally proven. No actor entry
      in atlas — this is a proxy/patriotic operation; the actor
      slug is a placeholder and may be omitted at query time.
doctrine_links:
  - doctrine_id: ru/russkiy-mir
    pillar_id: ru/russkiy-mir/baltic-and-near-abroad
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The operation was triggered by the Bronze Soldier monument
      relocation, a touchstone of Russian-speaker / "Russian world"
      symbolism. Targeting and timing align cleanly with the
      Russkiy Mir frame; no major alternative explanation.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/info-security-2016  # doctrine codified later; the operational pattern predates
    pillar_id: ru/info-security-2016/information-sphere-as-domain
    program_id: null
    confidence: plausible
    reasoning: |
      The operational pattern (information confrontation as
      coercive lever) predates the 2016 doctrinal text. Tagged as
      plausible rather than strongly_inferred because the doctrine
      did not yet exist at the time of the operation.
    attesting_source_id: null
    counter_explanation: |
      A purely "patriotic hacktivism" framing is consistent with
      the public facts; the state-direction claim relies on
      Goloskokov's 2009 admission and circumstantial coordination.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/estonia-government
    role: primary
  - target_id: orgs/estonia-banking-sector
    role: primary
  - target_id: orgs/estonia-media
    role: primary
sources:
  - ccdcoe/2008_estonia-cyber-attacks-analysis
