  notes: "Audited vs CCDCOE/Ottis 2008 (raw PDF captured + hashed) and RFE/RL 2009-03-30 (raw HTML captured + hashed). FACTS confirmed: 22-day campaign 27 Apr-18 May 2007; targets = govt/president/parliament/police/banks/ISPs/online media; DoS/DDoS + some SQLi; only one conviction (Galuškevitš). DE-OVER-ATTESTED: prior record asserted Goloskokov's 2009 admission but cited only the 2008 source (which cannot contain it) and stamped auspex_assessment=concur with no attribution_level. Fixed: (1) split into two dated attribution entries capturing latency — CCDCOE 2008 (nation, contested, low) + RFE/RL 2009 individual self-claims (activity-cluster, contested, low); (2) added RFE/RL source for the Goloskokov/Markov claims (was uncited); (3) corrected attribution_date 2009-03-12->2009-03-30 (actual article date); (4) auspex_assessment concur->contested. Attribution kept nation-level/contested, NOT named-unit, NOT firm state attribution — Ottis explicitly declines to implicate any entity and says the IO reading is only 'plausible' and 'not proven'; Goloskokov/Markov claimed personal, non-state action and Estonian experts dispute them. Doctrine links unchanged in label (russkiy-mir strongly_inferred + info-security-2016 plausible, both correctly NOT attested); tightened reasoning + counter_explanation, added CCDCOE as supporting source on the russkiy-mir link. Removed unsourced 'direct catalyst for CCDCOE' causal claim from outcome_summary (kept as flagged context). NB target FKs orgs/estonia-{government,banking-sector,media} are part of the corpus-wide deferred targets/ registry gap (validator: informational, not an error) — left as-is, not in scope for a single-event audit."
