id: 2025-12/muddywater-muddyviper-israel
name: MuddyWater "MuddyViper" backdoor campaign against Israeli sectors
start_date: 2024-09-30  # vendor-stated campaign onset
disclosure_date: 2025-12-02
end_date: 2025-03-18  # vendor-stated end of observed campaign
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  ESET attributed to MuddyWater (assessed MOIS-affiliated) a
  cyber-espionage campaign running 30 September 2024 to 18 March
  2025 against Israeli entities across academia, engineering,
  local government, manufacturing, technology, transportation
  and utilities (plus one Egyptian technology company).
  Spear-phishing PDFs linked to legitimate remote-desktop tools
  (Atera, Level, PDQ, SimpleHelp) — the cluster's long-favoured
  access approach — while it introduced two previously
  undocumented bespoke components: the Fooder loader (some
  variants impersonating the Snake game, with delayed execution)
  and the C/C++ MuddyViper backdoor, which supports 20 commands
  and exfiltrates Windows login credentials and browser data.
  ESET called this "an evolution in the operational maturity of
  MuddyWater", aimed at enhanced stealth, persistence and
  credential harvesting.
false_flag_risk: none
summary: |
  MOIS-affiliated MuddyWater continues its espionage tempo
  against Israeli government, critical-infrastructure and
  adjacent sectors. Per ESET, the Fooder/MuddyViper toolset
  marks an evolution in the cluster's operational maturity: it
  keeps abusing legitimate remote-desktop utilities for access
  but is now layering bespoke, credential-focused implants over
  that tradecraft. ESET additionally observed operational
  overlaps with the Iran-aligned actor Lyceum (a subgroup of
  OilRig / APT34), with MuddyWater likely acting as an
  initial-access broker in a January–February 2025 intrusion at
  an Israeli manufacturing organisation.
attributions:
  - actor_id: ir/mois/muddywater
    attributing_org: ESET
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2025-12-02
    attribution_source_id: thehackernews/2025-12-02_muddyviper-israel
    notes: |
      The Hacker News (2025-12-02) relays ESET's research: "The activity
      has been attributed by ESET to a hacking group known as MuddyWater
      … a cluster assessed to be affiliated with Iran's Ministry of
      Intelligence and Security (MOIS)." ESET attributes to the named
      cluster without hedging (high); the MOIS tie is stated as an
      assessed affiliation (the established CISA AA22-055A consensus),
      hence attribution_level named-actor. MOIS is explicitly named as
      the affiliated service, so Kara may elect named-unit; kept at the
      conservative named-actor floor to avoid over-attestation.
      attributing_org set to ESET (the actual attributor); THN is the
      secondary relaying outlet and remains the cited source.
