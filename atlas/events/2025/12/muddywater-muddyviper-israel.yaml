  notes: |
    Audited vs The Hacker News "Iran-Linked Hackers Hit Israeli Sectors with
    New MuddyViper Backdoor in Targeted Attacks" (2025-12-02), which relays
    ESET's research. Raw snapshot captured + hashed:
    sha256 29db4003…d5764284, 177,673 bytes. NOT a phantom — the live article's
    title and body match the event (STEP-0 triage: 200, no redirect; MuddyViper
    ×13, Fooder ×4, MuddyWater ×12 in body). Path taken: normal audit (real
    event, real source); no re-source/retire needed. NOT a duplicate of the
    2024-12 MuddyWater DIB event (that is US defense-industrial-base, CISA/
    CrowdStrike, PowGoop/SnailResin) nor the 2024-07 BugSleep event.
    [a] FACTS ✓ carried verbatim: "The campaign took place between September 30,
    2024, and March 18, 2025"; "a loader named Fooder that's designed to decrypt
    and execute the C/C++-based MuddyViper backdoor"; MuddyViper "supports 20
    commands" and "exfiltrate Windows login credentials and browser data";
    delivery via "phishing emails containing PDF attachments that link to
    legitimate remote desktop tools like Atera, Level, PDQ, and SimpleHelp";
    ESET quote "an evolution in the operational maturity of MuddyWater" /
    "enhance stealth, persistence, and credential harvesting capabilities".
    STRIPPED as unsupported AI-embellishment: (1) "ScreenConnect, RemoteUtilities"
    — ZERO occurrences in the raw (the article names Atera/Level/PDQ/SimpleHelp
    as the abused RMM tools); fabricated tool names. (2) "reduced reliance on
    commodity remote-management tools" — CONTRADICTED: the raw says MuddyWater
    keeps deploying "legitimate remote management tools – a long-favored
    approach" and merely ADDED bespoke implants. (3) "continued operational
    tempo through the run-up to the June 2025 Israel-Iran war and beyond" —
    unsupported and misleading: the observed campaign ENDS 2025-03-18, months
    before June 2025, and the article makes no June-2025 claim. Added
    incident_type espionage ("The cyber espionage group…", byline category
    "Cyber Espionage / Malware"). Rewrote summary/outcome_summary to source-
    carried prose; added the Egyptian collateral victim and the ESET-observed
    MuddyWater↔Lyceum (OilRig/APT34) operational overlap (Jan–Feb 2025 Israeli
    manufacturing intrusion, MuddyWater as initial-access broker) — both carried.
    [b] ATTRIBUTION CORRECTED: attributing_org "The Hacker News / vendor
    reporting" → ESET, per "The activity has been attributed by ESET to a
    hacking group known as MuddyWater … a cluster assessed to be affiliated with
    Iran's Ministry of Intelligence and Security (MOIS)." Confidence high (ESET
    attributes to the named cluster with no hedge); auspex concur. THN kept as
    the cited secondary relay (attribution_source_id).
    [c] DATES ✓: source published_on 2025-12-02 = byline "Ravie Lakshmanan
    Dec 02, 2025" = disclosure_date; start_date 2024-09-30 + end_date 2025-03-18
    are the source's verbatim campaign bounds.
    [d] DOCTRINE: neither link attested (source states no strategic goal — no
    attesting quote exists). resistance-axis/anti-israel-coercion DOWNGRADED
    strongly_inferred → plausible: this is intelligence collection, not the
    destructive/coercive action that pillar centres on, so >1 reading survives;
    matches corpus precedent (2024-07 BugSleep and 2024-12 DIB grade this same
    pillar plausible). forward-defense/integrated-asymmetric-portfolio KEPT
    strongly_inferred (matches the 2024-12 DIB sibling), reordered to primary;
    added inference_basis {signals[], ruled_out} + supporting attesting_source_id
    (THN). Removed the off-schema source_id key from the old inference_basis.
    [e] ATTRIBUTION_LEVEL added: named-actor (ESET names the cluster MuddyWater;
    MOIS given as an assessed affiliation, not a fresh unit pin — kept the
    conservative floor to avoid over-attestation; MOIS IS named, so Kara may
    elect named-unit).
    [f] ACTOR_ID ir/mois/muddywater RESOLVES → atlas/actors/ir/muddywater.yaml
    (file path ir/muddywater.yaml, internal id ir/mois/muddywater; MOIS
    placement independently verified 2026-06-24 against CISA AA22-055A). Correct
    corpus id — the orchestrator's "verify corpus id" confirms OK.
    RESIDUAL: THN is a secondary relay of ESET; ESET's own report is not
    separately cited/snapshotted, but every retained claim is carried verbatim
