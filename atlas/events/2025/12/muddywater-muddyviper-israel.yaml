id: 2025-12/muddywater-muddyviper-israel
name: MuddyWater "MuddyViper" backdoor campaign against Israeli sectors
start_date: 2024-09-30  # vendor-stated campaign onset
disclosure_date: 2025-12-02
end_date: 2025-03-18  # vendor-stated end of observed campaign
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Vendor reporting documented a MuddyWater (MOIS-attributed)
  campaign running from late September 2024 through mid-March
  2025 against Israeli targets, introducing two new tools:
  the Fooder loader and the MuddyViper backdoor. Tradecraft
  emphasised stealth, persistence, and credential harvesting
  with reduced reliance on commodity remote-management tools
  that had drawn detection in prior MuddyWater operations.
false_flag_risk: none
summary: |
  Confirms the MOIS-MuddyWater cluster's continued operational
  tempo through the run-up to the June 2025 Israel-Iran war and
  beyond. MuddyViper represents toolset evolution under
  detection pressure — the cluster has burned multiple commodity
  RMM tools (ScreenConnect, RemoteUtilities) across the 2022-25
  period and is investing in bespoke implants.
