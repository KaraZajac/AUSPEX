id: 2025-12/evasive-panda-dns-poisoning-campaign-delivers-mgbot-via-fake-software-
name: "Evasive Panda DNS-poisoning campaign delivers MgBot via fake software updaters across Turkey, China and India"
start_date: 2025-12-01
incident_type:
  - espionage
