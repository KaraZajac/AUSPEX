initial_vector: supply-chain
false_flag_risk: none
summary: |
  Kaspersky (Securelist) detailed an Evasive Panda (Daggerfly / Bronze Highland / StormBamboo) operation running from November 2022 to November 2024 that used DNS poisoning of legitimate domains (including dictionary[.]com) to redirect victims to attacker-controlled infrastructure serving fake application updaters for software such as SohuVA, iQIYI, IObit Smart Defrag and Tencent QQ. The poisoned updaters installed the MgBot implant, with the Macma macOS backdoor also referenced as the OS-specific payload; some systems were compromised for over a year. Detected victims were located in Turkey (Türkiye), China, and India. Kaspersky assessed with high confidence that the Evasive Panda threat actor was responsible based on the TTPs observed.
