    Vika, Tory, and SovaSonya"; "extradited to the United States earlier this
    year" on the CARR indictment; "Today, Dubranova was arraigned on a second
    indictment charging her for her actions supporting NoName057(16)"; "pleaded
    not guilty in both cases"; trials "Feb. 3, 2026" (NoName) / "April 7, 2026"
