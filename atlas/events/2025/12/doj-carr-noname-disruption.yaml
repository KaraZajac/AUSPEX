outcome_summary: |
  On 9 December 2025 the DOJ announced two indictments in the Central
  District of California charging Ukrainian national Victoria Eduardovna
  Dubranova (33; aka "Vika", "Tory", "SovaSonya") for supporting cyberattacks
  by two Russian "hacktivist" groups. Dubranova was extradited to the US
  earlier in 2025 on the CARR indictment and, on the announcement day, was
  arraigned on a second indictment for supporting NoName057(16); she pleaded
  not guilty in both cases (trials set for 3 Feb 2026 on NoName and 7 Apr 2026
  on CARR). Per the indictments, CARR (aka Z-Pentest) "was founded, funded,
  and directed by the Main Directorate of the General Staff of the Armed
  Forces of the Russian Federation (GRU)", with tasking tied to a GRU officer
  using the moniker "Cyber_1ce_Killer"; NoName was "a state-sanctioned project
  administered in part by" the Center for the Study and Network Monitoring of
  the Youth Environment (CISM), an IT body established by order of the
  President of Russia in October 2018, whose employees built the DDoSia
  infrastructure. Concurrent actions: State Department rewards of up to $2M
  (CARR) and $10M (NoName), and a joint FBI/CISA/NSA/DOE/EPA/DC3 advisory
  (AA25-343A). The cases fall under FBI "Operation Red Circus". No server
  seizure is described in this action (the infrastructure takedown was
  Europol's Operation Eastwood, July 2025).
summary: |
  A US law-enforcement counter-action, not a cyber operation: the DOJ moves
  against the CARR and NoName057(16) "hacktivist" fronts via indictment,
  extradition, rewards, and a joint advisory. Its analytic weight is in the
  legal record — the indictments place formal state attribution at the
  charging level: CARR "founded, funded, and directed by the GRU"; NoName
  "state-sanctioned" and administered in part through CISM, a
  presidential-order body established in October 2018 (predating the 2022
  full-scale invasion). The CISM detail ties the criminal-proxy mobilization
  pattern to a pre-2022 state institution rather than a post-invasion ad hoc
  construct. The DOJ documents the groups' behaviour — CARR's damage to US
  public drinking-water controls (hundreds of thousands of gallons spilled), a
  November 2024 Los Angeles meat-plant attack (ammonia leak, spoiled product),
  US election- and nuclear-regulatory-adjacent targeting, and NoName's
  crowdsourced DDoSia attacks on government, financial, rail and port sites —
  high-visibility, low-strategic-effect disruption. NB: the "founded, funded,
  and directed by the GRU" wording is the DOJ INDICTMENT's, not Treasury's;
  the page separately references the prior 19 Jul 2024 OFAC sanctions on two
  CARR members (Pankratova, Degtyarenko).
