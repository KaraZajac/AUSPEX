    critical infrastructure, such as public railways and ports". Concurrent:
    State Dept rewards "up to $2 million" (CARR) / "$10 million" (NoName); joint
    FBI/CISA/NSA/DOE/EPA/DC3 advisory; FBI "Operation Red Circus". CORRECTIONS:
    (1) vague "a foreign national was extradited and indicted" → named Dubranova
    + both indictments + trial dates. (2) STRIPPED "(echoing the Treasury July
    2024 framing)" — the "founded, funded, and directed by the GRU" wording is
