id: 2025-12/doj-carr-noname-disruption
name: DOJ disrupts CARR and NoName057(16) — formal GRU / state-sanctioned attribution
start_date: 2025-12-01  # public announcement date approx.
disclosure_date: 2025-12-01
end_date: 2025-12-01
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  DOJ press release announcing simultaneous disruption actions
  against the Cyber Army of Russia Reborn (CARR) and NoName057(16).
  Most consequential element is the public formalization of state
  attribution: CARR characterized as "founded, funded, and directed
  by the GRU" (echoing the Treasury July 2024 framing); NoName057(16)
  assessed as a state-sanctioned project administered partially
  through the Center for the Study and Network Monitoring of the
  Youth Environment (CISM), established by a 2018 Russian presidential
  order. A foreign national was extradited and indicted for support
  role.
false_flag_risk: none
summary: |
  This event matters less for technical disruption and more for the
  legal record. DOJ's Dec 2025 language collapses the proxy
  ambiguity that has surrounded CARR / NoName since 2022 into
  formal state-attribution at the indictment level. The CISM detail
  — a presidential-order-established youth-monitoring body —
  is a significant doctrinal artifact: it ties the criminal-proxy
  mobilization pattern to a pre-2022 state institution, not a
  post-invasion ad hoc construct.
