doctrine_links:
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/performative-disruption
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Low-impact, high-visibility VNC/OT opportunism against Western
      CII fits the performative-disruption pattern. AA25-343A states
      these groups are "primarily seeking notoriety," "regularly make
      false or exaggerated claims about their attacks ... to garner
      more attention," and portray "minor incursions as significant
      breaches" - performative signaling over strategic effect - with
      the CARR platform "aimed at deterring anti-Russia rhetoric." The
      advisory does not name a 2022 sanctions-response doctrine, so the
      strategic-doctrine label is inferred, not attested.
    attesting_source_id: cisa/2025-12-09_aa25-343a-pro-russia-hacktivists
    inference_basis:
      source_id: cisa/2025-12-09_aa25-343a-pro-russia-hacktivists
      signals:
        - "AA25-343A: groups are 'primarily seeking notoriety' and 'make false or exaggerated claims about their attacks on critical infrastructure to garner more attention' (high-visibility, low-effect performative behaviour)"
        - "AA25-343A: CARR recruited actors to an 'unattributable platform ... aimed at deterring anti-Russia rhetoric' (signaling function)"
        - "AA25-343A: opportunistic targeting on 'superficial criteria, such as victim availability and existing vulnerabilities, rather than ... strategically significant entities'"
      ruled_out: "a codified '2022 sanctions-response' / performative-disruption strategic goal stated at goal level - not named by CISA (behaviour + notoriety motive only)"
    contested: false
    analyst: claude
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/criminal-proxy-mobilization
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      AA25-343A documents the criminal-proxy-mobilization mechanism in
      substance: GRU unit 74455 "supporting the creation of CARR" and
      funding its tooling; CISM (established on behalf of the Kremlin)
      creating NoName057(16) "as a covert project," building its DDoSia
      tool, paying its infrastructure, and selecting its targets; and
      Sector16 possibly receiving "indirect support from the Russian
      government in exchange for conducting specific cyber operations
      that further Russian strategic goals" - which the advisory ties
      to "broader Russian cyber strategies that involve leveraging
      non-state threat actors for certain cyber activities, adding a
      layer of deniability." Kept strongly_inferred (not attested) only
      because the advisory does not name the codified 2022 sanctions-
      response doctrine; the proxy-mobilization mechanism itself is
      stated outright. ATTESTED-UPGRADE CANDIDATE for Kara (same posture
      as operation-eastwood-noname).
    attesting_source_id: cisa/2025-12-09_aa25-343a-pro-russia-hacktivists
    inference_basis:
      source_id: cisa/2025-12-09_aa25-343a-pro-russia-hacktivists
      signals:
        - "AA25-343A: GRU unit 74455 (GTsST) 'is likely responsible for supporting the creation of CARR' and 'likely funded the tools CARR ... used to conduct ... DDoS attacks through at least September 2024'"
        - "AA25-343A: CISM, 'established on behalf of the Kremlin, created NoName057(16) as a covert project'; CISM staff built DDoSia, 'paid for the group's network infrastructure ... and selected DDoS targets'"
        - "AA25-343A: Sector16 'may have received indirect support from the Russian government ... that further Russian strategic goals'; Russia 'leveraging non-state threat actors ... adding a layer of deniability'"
      ruled_out: "the codified 'sanctions-response-2022' doctrine construct - not named by CISA; the deniable-state-proxy mechanism IS stated, so this is an attested-upgrade candidate flagged for Kara"
    contested: false
    analyst: claude
