id: 2025-12/cisa-aa25-343a-pro-russia-hacktivists
name: CISA AA25-343A — pro-Russia hacktivists opportunistic VNC-based attacks on OT in US and global CII
start_date: 2023-10-01  # first OT/ICS intrusion documented in AA25-343A (CARR - European wastewater treatment facility, Oct 2023); ecosystem itself dates to the 2022 Russia-Ukraine escalation (CARR/NoName formed Feb-Mar 2022, both DDoS-first)
disclosure_date: 2025-12-09  # AA25-343A "Initial version" (Version History); last revised 2025-12-18
end_date: null  # ongoing pattern (advisory documents TTPs "as recently as April 2025")
incident_type:
  - documentary  # Dec-2025 joint advisory codifying + attributing a 2022-2025 pro-Russia hacktivist pattern (also an attribution-publication: GRU unit 74455 -> CARR, CISM -> NoName)
  - intrusion    # documents real OT/SCADA/HMI intrusions (CARR Oct/Nov 2023; Z-Pentest OT ops; Sector16 energy)
  - disruption   # HMI manipulation (setpoint/parameter changes, alarm suppression, loss of view, device shutdown) + DDoS
initial_vector: valid-creds  # VNC to HMI via default/weak/no passwords + brute-force (advisory maps Valid Accounts T0859, Default Credentials T0812)
outcome_summary: |
  FBI, CISA, NSA and ~20 international partner agencies (DOE, EPA,
  DC3, Europol EC3, Eurojust, and Five-Eyes + EU national cyber /
  police bodies) issued joint advisory AA25-343A documenting
  pro-Russia hacktivist groups - Cyber Army of Russia Reborn
  (CARR), Z-Pentest, NoName057(16), Sector16, and affiliated
  groups - conducting opportunistic, lower-sophistication attacks
  against US and global critical infrastructure via minimally
  secured, internet-facing Virtual Network Computing (VNC)
  connections to OT/HMI devices with default, weak, or no
  credentials. Named target sectors: Water and Wastewater Systems,
  Food and Agriculture, and Energy; impacts range from temporary
  loss of view to physical damage, though no injuries to date. The
  advisory is published as an addition to CISA's May 6, 2025 OT
  primary-mitigations joint fact sheet and Europol's Operation
  Eastwood.
false_flag_risk: none
summary: |
  Joint advisory codifying the opportunistic VNC-to-OT intrusion
  pattern used by a cluster of pro-Russia hacktivist groups since
  ~late 2023: scanning for internet-exposed VNC (port 5900 / 5901-
  5910), brute-forcing default/weak/no passwords to reach HMI and
  SCADA devices, then manipulating setpoints, suppressing alarms,
  and forcing loss of view - high media amplification, low-to-real
  impact (incl. physical damage). The advisory also carries fresh
  state attribution: it assesses GRU Main Center for Special
  Technologies unit 74455 (GTsST) as likely having supported the
  creation of CARR and funded its DDoS tooling through ~Sept 2024,
  and the Kremlin-established Center for the Study and Network
  Monitoring of the Youth Environment (CISM) as having created
  NoName057(16) as a covert project (building its DDoSia tool,
  paying its infrastructure, and selecting targets). Z-Pentest
  (formed Sept 2024 by CARR + NoName admins) is the OT-intrusion
  specialist; Sector16 (Jan 2025) is a novice offshoot claiming US
  energy-infrastructure compromises. Doctrinally maps to the
  criminal-proxy-mobilization and performative-disruption pillars
  of the 2022 sanctions-response doctrine.
