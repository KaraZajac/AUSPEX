id: 2025-12/cisa-aa25-343a-pro-russia-hacktivists
name: CISA AA25-343A — pro-Russia hacktivists opportunistic VNC-based attacks on OT in US and global CII
start_date: 2024-01-01  # CISA-stated campaign onset
disclosure_date: 2025-12-09
end_date: null
incident_type:
  - intrusion
  - disruption
initial_vector: valid-creds
outcome_summary: |
  CISA, FBI, NSA, and Five Eyes / EU partner agencies issued
  joint advisory AA25-343A documenting pro-Russia hacktivist
  groups (CARR / KillNet / NoName057(16) and successors)
  conducting opportunistic, lower-sophistication attacks against
  US and global critical infrastructure via internet-facing
  Virtual Network Computing (VNC) endpoints with minimal or
  default credentials. Targets included water, wastewater,
  energy, and small municipal-utility OT devices. The advisory
  is published as an addendum to the May 2025 OT primary-
  mitigations joint fact sheet.
false_flag_risk: none
summary: |
  Codifies the operational pattern that CARR / Cyber Army of
  Russia Reborn (already AUSPEX-modeled) and the post-disruption
  NoName057(16) reconstitution have used since 2024: opportunistic
  exploitation of weakly secured VNC, low-impact disruption,
  high media amplification. Doctrinally maps to the criminal-
  proxy-mobilization and performative-disruption pillars of the
  2022 sanctions-response doctrine.
