id: 2025-12/uta0355-russia-spoofs-european-security-conferences-in-oauthdevice-cod
name: "UTA0355 (Russia) spoofs European security conferences in OAuth/device-code phishing of foreign-policy experts and former senior US officials"
start_date: 2025-12-04
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Volexity reported that the Russian threat actor it tracks as UTA0355 — the same actor it first reported in April 2025 abusing Microsoft 365 OAuth workflows — ran targeted phishing campaigns in October-November 2025 that spoofed real European security events (the Belgrade Security Conference, the Brussels Indo-Pacific Dialogue and the World Nuclear Exhibition) to phish credentials via OAuth and device-code authentication workflows. Primary targets were individuals working on foreign policy/European matters and former senior US government officials.
