id: 2025-12/uta0355-russia-spoofs-european-security-conferences-in-oauthdevice-cod
name: "UTA0355 (Russia) spoofs European security conferences in OAuth/device-code phishing of foreign-policy experts and former senior US officials"
start_date: 2025-12-04
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Volexity reported that the Russian threat actor it tracks as UTA0355 — the same actor it first reported in April 2025 abusing Microsoft 365 OAuth/device-code workflows — ran targeted phishing campaigns in October-November 2025 that spoofed real European security events to phish credentials via OAuth and device-code authentication workflows and steal Microsoft 365 access tokens. Confirmed lures were the Belgrade Security Conference (OAuth-code phishing) and the Brussels Indo-Pacific Dialogue (device-code phishing); Volexity additionally found related World Nuclear Exhibition-themed infrastructure it could not confirm was used but assessed may have featured in earlier UTA0355 attacks. Primary targets were individuals working on foreign policy/European matters and former senior US government officials.
