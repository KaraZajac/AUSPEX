id: 2025-12/electrum-december-2025-attack-on-polish-distributed-energy-resources-w
name: "ELECTRUM December 2025 attack on Polish distributed energy resources (wind/solar) — first major coordinated DER-scale OT operation"
start_date: 2025-12-01
incident_type:
  - cyber-physical
  - disruption
  - destructive
false_flag_risk: none
summary: |
  Dragos's 2026 (9th Annual) OT/ICS Year-in-Review reports that in December 2025 ELECTRUM targeted Polish energy infrastructure in what Dragos calls the first major coordinated attack against distributed energy resources (wind farms and solar installations) at scale. The cited Year-in-Review names only the behavioural threat groups KAMACITE and ELECTRUM (describing them as "responsible for Ukraine's 2015 and 2016 power outages") and makes no political/state attribution — it never says Sandworm, GRU or Russia. Separately, Dragos's standalone ELECTRUM threat profile associates ELECTRUM with the SANDWORM activity tied to the 2015 Ukraine power outage and the CRASHOVERRIDE/Industroyer 2016 Kyiv event; AUSPEX resolves this cluster to ru/gru/74455/sandworm (see attribution note).
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: "Dragos (behavioural tracking of the ELECTRUM activity group; Dragos performs no political/state attribution — this Year-in-Review names no nation/service and never says Sandworm/GRU/Russia)"
    attributing_org_confidence: moderate   # mapped from ICD link-confidence: strongly_inferred
    attribution_level: activity-cluster   # this source names only the behavioural group ELECTRUM (no nation/service/Sandworm); the ELECTRUM->Sandworm(GRU 74455) equation is AUSPEX's bridge via Dragos's separate ELECTRUM profile + CSO/govt reporting, not this report
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-12-01
    attribution_source_id: dragos/2025-12_electrum-december-2025-attack-on-polish-
    notes: "The cited Dragos 2026 OT Year-in-Review names ELECTRUM (and KAMACITE) only and makes no political/state attribution — never 'Sandworm', 'GRU' or 'Russia'. AUSPEX resolves ELECTRUM to ru/gru/74455/sandworm because Dragos's own standalone ELECTRUM threat profile associates ELECTRUM with the SANDWORM activity behind the 2015 Ukraine grid outage and CRASHOVERRIDE/Industroyer (2016), and CSO/US-govt reporting equate that cluster with Unit 74455; hence concur-with-caveat at activity-cluster level — the named-actor/nation specificity is carried by that external attribution, not this report."
doctrine_links:
  - doctrine_id: ru/energy-weaponization
    pillar_id: ru/energy-weaponization/grid-attack
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      GRU/Sandworm-linked ELECTRUM executed the first coordinated OT attack on distributed energy resources (wind/solar) on the Polish grid, the direct operational expression of treating electric-grid availability as a coercive political instrument. Lineage to the 2015 Ukraine outage and Industroyer reinforces the grid-disruption doctrine. The cited source describes the operation but states no strategic purpose, so this stays strongly_inferred (attested would require Dragos naming the end the op serves); attesting_source_id null.
    inference_basis:
      signals:
        - "ELECTRUM is the Sandworm-overlapping OT-disruption group Dragos names as 'responsible for Ukraine's 2015 and 2016 power outages' (grid-attack lineage)"
        - "Target is the Polish electric grid (distributed energy resources — wind/solar) and the effect class is cyber-physical/disruptive, i.e. grid availability, not data theft"
        - "Operation timed amid the post-2022 Russia–NATO energy-coercion context against a frontline aid-hub state"
      ruled_out: "Espionage/IP-theft reading does not fit a coordinated OT operation against grid generation assets; the doctrine in play is grid disruption, not collection."
    attesting_source_id: null
    contested: false
    analyst: claude
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/aid-state-targeting
    program_id: null
    confidence: plausible
    reasoning: |
      Poland is a frontline NATO/EU state and the principal logistics hub for Western aid to Ukraine; an OT-scale strike on its energy infrastructure fits the post-2022 targeting of Ukraine-aiding states' critical infrastructure. The source states no purpose and more than one strategic reading survives, so this stays plausible.
    inference_basis:
      alternatives:
        - "Aid-state retaliation: coercion of a frontline NATO/EU Ukraine-logistics hub (this pillar)"
        - "General grid-disruption capability demonstration / pre-positioning rehearsal not specifically tied to the aid-state motive (already captured by the energy-weaponization/grid-attack link)"
    attesting_source_id: null
    contested: false
    analyst: claude
