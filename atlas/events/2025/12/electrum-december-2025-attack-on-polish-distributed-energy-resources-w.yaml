summary: |
  Dragos's 2026 OT/ICS Year-in-Review reports that in December 2025 ELECTRUM targeted Polish energy infrastructure in what Dragos calls the first major coordinated attack against distributed energy resources (wind farms and solar installations) at scale. Dragos's ELECTRUM threat profile separately associates ELECTRUM with the SANDWORM APT responsible for the 2015 Ukraine power outage and the CRASHOVERRIDE/Industroyer 2016 Kyiv event.
