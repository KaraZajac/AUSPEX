id: 2025-12/cisa-nsa-cccs-brickstorm-advisory
name: CISA + NSA + Canadian CCCS BRICKSTORM malware analysis report and joint advisory
start_date: 2024-04-01  # earliest victim implantation date per CISA
disclosure_date: 2025-12-04
end_date: null
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  CISA, NSA, and the Canadian Centre for Cyber Security
  published Malware Analysis Report AR25-338A on the
  BRICKSTORM Go/Rust backdoor used by PRC state-sponsored
  actors (Mandiant clusters UNC3886 and UNC5221) for stealthy
  long-term persistence on VMware vSphere and Linux/Windows
  appliances. At one CISA-engaged victim, BRICKSTORM was
  uploaded to an internal VMware vCenter server in April 2024
  and maintained persistence until at least 3 September 2025.
  A 19 December 2025 update added Rust-based variants and
  expanded IOCs.
false_flag_risk: none
summary: |
  Government formalization of the BRICKSTORM exposure that
  Mandiant disclosed in September 2025, with cross-Atlantic
  coordination (Canadian CCCS) and a malware-analysis-report
  format that publishes IOCs for defender ingestion. The
  joint advisory cements BRICKSTORM as the canonical 2025-26
  PRC supply-chain implant for hypervisor/appliance layers.
