id: 2025-12/cisa-nsa-cccs-brickstorm-advisory
name: CISA + NSA + Canadian CCCS BRICKSTORM malware analysis report and joint advisory
start_date: 2024-04-01  # earliest victim implantation date per CISA
disclosure_date: 2025-12-04
end_date: null
incident_type:
  - intrusion
  - data-theft
# supply-chain REMOVED (audit 2026-07-11): none of the 3 cited sources frames this
# advisory's documented activity as supply-chain — it reports a single-victim IR
# (persistence + credential/ADFS-key theft) and explicitly states initial access was
# undetermined. The supply-chain CAMPAIGN identity belongs to the sibling event
# 2025-09/mandiant-brickstorm-saas-legal (Mandiant's SaaS/downstream framing).
initial_vector: unknown  # CISA advisory: "Incident data does not indicate how they obtained initial access" — no cited source establishes a 0-day for this event's victim
outcome_summary: |
  CISA, NSA, and the Canadian Centre for Cyber Security
  published Malware Analysis Report AR25-338A on the BRICKSTORM
  Go/Rust backdoor, which they assess "PRC state-sponsored cyber
  actors" use for stealthy long-term persistence on VMware
  vSphere (vCenter, ESXi, Aria Automation Orchestrator) and
  Windows environments. Victim organizations are primarily in
  the Government Services and Facilities and Information
  Technology sectors. At the one victim where CISA ran an
  incident response, the actors gained persistent network access
  in April 2024, uploaded BRICKSTORM to an internal VMware
  vCenter server, reached two domain controllers and an ADFS
  server, and exported ADFS cryptographic keys; access ran from
  at least April 2024 through at least 3 September 2025. The
  report analyzes 12 BRICKSTORM samples; a 19 December 2025
  update added Rust-based variants and IOCs, and an 11 February
  2026 update added a further variant. The advisory attributes
  only to "PRC state-sponsored cyber actors" — it names no
  Mandiant cluster in prose (UNC5221 appears solely as a Sigma
  detection-rule tag; UNC3886 is absent) — and references Google
  Mandiant's BRICKSTORM reporting for detection resources.
false_flag_risk: none
summary: |
  Government formalization of the BRICKSTORM exposure that
  Mandiant disclosed in September 2025, with cross-Atlantic
  coordination (Canadian CCCS) and a malware-analysis-report
  format that publishes IOCs for defender ingestion. The
  joint advisory cements BRICKSTORM as the canonical 2025-26
  PRC hypervisor/appliance-layer espionage implant.
attributions:
  - actor_id: cn/unscoped/warp-panda  # consolidated 2026-07-05 (Kara): VerdantBamboo==WARP-PANDA==UNC5221 per Volexity 2026-06
    attributing_org: CISA + NSA + Canadian CCCS
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-12-04
    attribution_source_id: cisa/2025-12-04_brickstorm-mar-ar25-338a
    notes: |
      The joint advisory attributes only to "People's Republic of
      China (PRC) state-sponsored cyber actors" (NSA's press release
      says "China state-sponsored cyber actors") — a NATION, with NO
      Mandiant cluster named in the advisory's prose and no Chinese
      service (MSS/PLA/unit) named; hence attribution_level: nation
      and attributing_org_confidence: high (unhedged CISA/NSA/CCCS
      assessment). CORRECTION (audit 2026-07-11): the prior note
      claimed the advisory "references Mandiant clusters UNC3886 and
      UNC5221" — FALSE against the raw. UNC3886 does not appear at
      all; UNC5221 appears once, only as a Sigma detection-rule tag
      ("attack.unc5221"), not as an attribution; the advisory cites
      Google Mandiant's BRICKSTORM report solely under "Additional
      Detection Resources." actor_id cn/unscoped/warp-panda is
      retained per Kara's 2026-07-05 corpus consolidation (WARP PANDA
      == UNC5221 == VerdantBamboo, Volexity 2026-06) — an AUSPEX
      cluster overlay, NOT this advisory's own claim; concur-with-
      caveat marks that gap (concur PRC-state-sponsored; caveat that
      the cluster resolution is corpus-level, not advisory prose).
doctrine_links:
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: cn/national-intelligence-law-2017/compelled-vendor-cooperation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      BRICKSTORM's signature tradecraft — long-dwell persistence on
      VMware vSphere/appliance layers that lack EDR, at Information-
      Technology-sector victims — is the vendor/downstream-access
      collection pattern AUSPEX maps to this pillar across the
      BRICKSTORM/UNC5221 events. strongly_inferred, NOT attested:
      the malware-analysis report states no strategic purpose and
      names no service (no MSS), so the vendor-leverage reading is
      an AUSPEX cross-corpus inference, not the advisory's claim.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Attribution: CISA/NSA/CCCS assess 'PRC state-sponsored cyber actors' — a state-espionage cluster with no financial motive."
        - "Tradecraft: long-dwell persistence on VMware vCenter/ESXi and appliance layers that do not support EDR, plus cloned-VM-snapshot credential theft and ADFS-key export, is the leveraged-access footprint of this cluster."
        - "Pattern: the same BRICKSTORM/UNC5221 (WARP PANDA / VerdantBamboo) footprint that Mandiant (2025-09) and Volexity (2026-06) document reaching SaaS/MSP downstream customers, all mapped to this pillar in AUSPEX."
      ruled_out: "The advisory itself documents only a single-victim intrusion and does not use supply-chain/vendor-leverage framing; the reading rests on the cross-corpus BRICKSTORM campaign identity, not on this report — hence strongly_inferred, not attested."
    contested: false
    analyst: claude
  - doctrine_id: cn/intelligentized-warfare
    pillar_id: cn/intelligentized-warfare/pre-positioning
    program_id: null
    confidence: plausible
    reasoning: |
      Long-dwell, EDR-blind persistence on hypervisor/appliance
      layers has latent pre-positioning value beyond collection,
      but the advisory documents espionage indicators (credential
      and ADFS-key theft) at Government-Services and IT-sector
      victims, not OT/critical-infrastructure disruption — so this
      stays a plausible dual-use reading, not the primary one.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Tradecraft: persistent, forensics-evading footholds on vCenter/ESXi and appliance layers are the same access primitives a pre-positioning mission would require."
      alternatives:
        - "Espionage-only (the primary reading): every documented action — VM-snapshot/credential theft, ADFS cryptographic-key export, long-term persistence — is collection, with no observed disruptive or OT-facing tooling."
        - "Pre-positioning (this link): those footholds are dual-use, but no cited source asserts disruptive intent, so the label stays plausible."
    contested: false
    analyst: claude
