id: 2025-12/chainalysis-2025-cumulative-crypto-theft
name: Chainalysis 2025 cumulative DPRK crypto-theft assessment
start_date: 2025-01-01
disclosure_date: 2025-12-18
end_date: 2025-12-31
incident_type:
  - documentary  # statistical meta-event (a report, not an attack); directionality none
initial_vector: unknown  # documentary aggregate — no single attack vector
outcome_summary: |
  Chainalysis's 2026 Crypto Crime Report (Hacking & Stolen
  Funds; released 18 December 2025) documented at least
  $2.02 billion in cryptocurrency stolen by North
  Korea–attributed actors during 2025 ($681M more than 2024,
  a 51% year-over-year increase) — "the most severe year on
  record" for DPRK crypto theft, dominated by the February
  2025 Bybit compromise ($1.5B of the $2.02B). DPRK accounted
  for a record 76% of all service-compromise value in a year
  that saw over $3.4 billion stolen industry-wide. The 2025
  total pushed Chainalysis's lower-bound cumulative ("all-time")
  DPRK estimate to $6.75 billion. (No cumulative start-year is
  stated in the report — the prior "since 2017" framing was
  unsourced and has been removed.)
quantified_impact:
  usd_stolen_2025: 2020000000  # "at least $2.02 billion" (Chainalysis; +$681M vs 2024, +51% YoY)
  usd_stolen_cumulative_all_time: 6750000000  # Chainalysis lower-bound "all-time total"; no start-year stated in source
  usd_stolen_all_actors_2025: 3400000000  # "over $3.4 billion" industry-wide theft, Jan–early Dec 2025
  dprk_pct_of_service_compromises_2025: 76  # "a record 76% of all service compromises"
false_flag_risk: none
summary: |
  Aggregate documentary meta-event capturing Chainalysis's
  full-year-2025 DPRK crypto-theft picture — not a single
  operation (actor null; no attack directionality). Per the
  report, DPRK reached a record $2.02B in stolen value
  "despite an assessed dramatic reduction in attack frequency";
  Chainalysis assesses that after a major theft DPRK "reduces
  operational tempo to focus on laundering the proceeds." The
  headline is driven by one outlier — the ~$1.5B February Bybit
  compromise (see 2025-02/bybit-safe-wallet, the per-attack
  anchor) — so the record reflects a single catastrophic heist,
  not a broad-based surge in operation count. The prior claim
  that "smaller DPRK operations … did not slow down / at or near
  2024 levels" was contradicted by the source and has been
  removed. Links the 8th-Congress revenue-aggregation doctrine
  by inference (the aggregate inherits the WMD-revenue framing
  from per-event USG attributions; the recap itself does not
  state it).
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: Chainalysis
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-12-18
    attribution_source_id: chainalysis/2025-12-18_crypto-hacking-2026-report
    notes: |
      Chainalysis attributes the $2.02B / $6.75B aggregate to "North
      Korea" / "DPRK" at the NATION level only — the raw report names
      NO group ("TraderTraitor" / "Lazarus" / "BlueNoroff" all appear
      0 times; "North Korea" 18×, "DPRK" 104×). AUSPEX maps the DPRK
      crypto-theft aggregate to the kp/rgb/lazarus umbrella handle
      (it spans multiple RGB crypto subunits, not just one group),
      hence attribution_level: nation and concur-with-caveat — this is
      NOT a Chainalysis-asserted group-level attribution.
  - actor_id: kp/rgb/tradertraitor
    attributing_org: US FBI (IC3)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2025-02-26
    attribution_source_id: fbi/2025-02-26_bybit-tradertraitor-psa
    notes: |
      The dominant component of the 2025 aggregate is the ~$1.5B Bybit
      theft ($1.5B of the $2.02B), which the FBI IC3 PSA (PSA250226)
      attributes to DPRK and labels "TraderTraitor" ("TraderTraitor"
      4×, "Lazarus" 0×, no service/sub-bureau named → named-actor).
      Group-level anchor for the aggregate's largest single component;
      see 2025-02/bybit-safe-wallet.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      The aggregate Chainalysis figure incorporates
      individually-attributed 2025 events (Bybit + smaller
      operations); the recap itself does not name the WMD goal or
      the defense plan, so the doctrine linkage is inherited by
      inference, not directly attested.
    attesting_source_id: chainalysis/2025-12-18_crypto-hacking-2026-report
    inference_basis:
      source_id: chainalysis/2025-12-18_crypto-hacking-2026-report
      signals:
        - "Aggregate recap of 2025 DPRK theft; the per-event USG attributions carry the WMD framing, the recap does not"
      ruled_out: "direct attestation of the strategic goal in the recap — the linkage is inherited from per-event sources by inference"
    contested: false
    analyst: claude
