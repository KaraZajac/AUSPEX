outcome_summary: |
  Chainalysis 2026 Crypto Hacking report (released 18
  December 2025) documented approximately $2.02 billion in
  crypto stolen by DPRK-attributed actors during calendar
  year 2025 — a record annual figure dominated by the
  February 2025 Bybit theft. Cumulative DPRK on-chain
  theft total since 2017: at least $6.75 billion (lower
  bound).
quantified_impact:
  usd_stolen_2025: 2020000000
  usd_stolen_cumulative_since_2017: 6750000000
false_flag_risk: none
summary: |
  Aggregate documentary event capturing the full 2025
  picture. Even excluding Bybit, the underlying tempo of
  smaller DPRK crypto operations through 2025 was at or
  near 2024 levels — TraderTraitor / Lazarus / BlueNoroff
  did not slow down. Reinforces the tempo-correlation
  pattern with the 8th Congress missile-test schedule.
