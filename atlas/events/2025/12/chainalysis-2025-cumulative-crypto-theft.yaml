qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-10
  level: full
  notes: |
    Opus 4.8 / max, 6-point audit vs RAW snapshots. Statistical
    DOCUMENTARY meta-event (a report, not an attack): actor null at
    the event level, no attack directionality, incident_type reduced
    to [documentary]. Not modeled as a single operation. Cross-links
    the per-attack anchor 2025-02/bybit-safe-wallet (both cite the same
    Chainalysis 2026 report). Snapshots: chainalysis f9f7811d… (277KB
    live blog, PRESERVE — already carried a matching 2026-07-10 audit
    note), fbi f083c2fe… (PRESERVE). Both hashes re-verified on disk.

    [a] FACTS — all headline figures carried VERBATIM by Chainalysis
      (sha f9f7811d…):
      • "In 2025, North Korean hackers stole at least $2.02 billion in
        cryptocurrency ($681 million more than 2024), representing a 51%
        increase year-over-year. This marks the most severe year on
        record for DPRK crypto theft in terms of value stolen, with DPRK
        attacks also accounting for a record 76% of all service
        compromises. Overall, 2025's numbers bring the lower-bound
        cumulative estimate for cryptocurrency funds stolen by the DPRK
        to $6.75 billion." Title: "North Korea Drives Record $2 Billion
        Crypto Theft Year, Pushing All-Time Total to $6.75 Billion."
      • Bybit dominance: "the February compromise of Bybit alone
        accounting for $1.5 billion of that total" ($1.5B of $2.02B).
      • Industry total: "The cryptocurrency industry witnessed over
        $3.4 billion in theft from January through early December 2025"
        — added as usd_stolen_all_actors_2025; 76% added as
        dprk_pct_of_service_compromises_2025.
      STRIPS/CORRECTIONS:
      • "since 2017" — NOT in the source (0 occurrences of "2016"/"2017";
        the report frames the cumulative only as "all-time total" /
        "lower-bound cumulative estimate"). Removed from outcome_summary;
        quantified_impact key renamed usd_stolen_cumulative_since_2017 →
        usd_stolen_cumulative_all_time (key was used by no other event).
      • Summary claim that "smaller DPRK operations … did not slow down /
        at or near 2024 levels" — CONTRADICTED by the source, which says
        the record was reached "despite an assessed dramatic reduction in
        attack frequency" and that "when DPRK successfully executes a
        major theft, it reduces operational tempo to focus on laundering
        the proceeds." Arithmetic confirms: non-Bybit 2025 DPRK theft
        ≈ $0.52B vs 2024's ≈ $1.34B — well below, not "at/near." Rewritten.
      • "approximately $2.02 billion" → "at least $2.02 billion" (source
        frames the figure as a floor, not an approximation).
    [b] ATTRIBUTION — MAJOR over-attestation fixed. The Chainalysis report
      was cited as attribution_source for BOTH a kp/rgb/tradertraitor and a
      kp/rgb/lazarus attribution at high/concur — but the raw names NO group
      ("TraderTraitor"/"Lazarus"/"BlueNoroff" = 0 each; "North Korea" 18×,
      "DPRK" 104×): it attributes the aggregate only at the NATION level.
      Restructured to what each source actually carries:
        • Chainalysis → kp/rgb/lazarus (AUSPEX umbrella handle for the
          whole-nation DPRK crypto aggregate), attribution_level: nation,
          concur-with-caveat (mirrors the tao-cumulative institutional-handle
          convention).
        • FBI IC3 PSA (sha f083c2fe…) → kp/rgb/tradertraitor for the
          dominant ~$1.5B Bybit component; "TraderTraitor" 4×, "Lazarus" 0×,
          no service/sub-bureau named → attribution_level: named-actor,
          concur.
    [c] DATES — start 2025-01-01 / end 2025-12-31 = CY2025 aggregation
      window (OK for a full-year recap); disclosure_date 2025-12-18 matches
      the report's raw datePublished "2025-12-18T12:45:02+00:00". FBI PSA
      published_on 2025-02-26 (used only for the Bybit-component attribution).
    [d] DOCTRINE — kp/8th-congress-defense-plan/revenue-aggregation/
      crypto-bridge-theft kept strongly_inferred (NOT attested): term-scan of
      the raw = 0 for WMD / nuclear / ballistic / missile / weapons-program /
      "8th Congress" / "defense plan" — the recap states no terminal WMD-
      revenue goal, so the linkage is inherited from the per-event USG
      attributions by inference. inference_basis {source_id, signals[],
      ruled_out} present; colon-space list items are quoted; attesting_source_id
      retained (per the Bybit-sibling convention). perspective = attacker-
      rationale (default; DPRK revenue doctrine on DPRK activity — not emitted
      as a field, matching sibling events). IDs resolve (pillar line 52,
      program line 95 of the doctrine file).
    [e] ATTRIBUTION_LEVEL — was MISSING on both entries; added (nation for
      Chainalysis, named-actor for FBI).
    [f] ACTOR_ID — kp/rgb/lazarus (atlas/actors/kp/lazarus.yaml) and
      kp/rgb/tradertraitor (atlas/actors/kp/tradertraitor.yaml) both resolve.
      Event-level actor is null (documentary aggregate); attributions retain
      actor handles per the documentary/cumulative convention
      (cf. tao-cumulative, cnmf-virustotal). Targets sectors/finance/
      {crypto-exchange,defi-bridge,crypto-custody} all resolve to sectors.yaml
      (finance/crypto-exchange l.163, defi-bridge l.166, crypto-custody l.169)
      and match the corpus target_id prefix convention.
