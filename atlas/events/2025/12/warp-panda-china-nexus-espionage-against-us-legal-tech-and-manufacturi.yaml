id: 2025-12/warp-panda-china-nexus-espionage-against-us-legal-tech-and-manufacturi
name: "WARP PANDA — China-nexus espionage against US legal, tech and manufacturing firms using BRICKSTORM and ESXi implants"
start_date: 2023-12-01   # earliest source-documented operational activity ("gaining initial access in late 2023"); group active since at least 2022 (inception, not a specific op). Was 2025-12-04 = the report's publication date, not an op date (cf. Storm-2603/PurpleHaze precedent). See qc.notes.
disclosure_date: 2025-12-04
incident_type:
  - espionage
  - intrusion
  - data-theft
  - reconnaissance
initial_vector: n-day
false_flag_risk: none
summary: |
  CrowdStrike Intelligence details WARP PANDA, a China-nexus intrusion group active since at least 2022 whose operations are assessed as likely aligned with PRC intelligence-collection interests, targeting US legal, technology and manufacturing entities. The group gains initial access by exploiting internet-facing edge devices (such as Ivanti VPN appliances and F5 BIG-IP), then pivots into VMware vCenter environments using valid credentials or vCenter exploitation. It deploys custom malware (BRICKSTORM, Junction, GuestConduit) for persistent covert access, and uses techniques such as VM cloning and Azure session-token exfiltration to reach email and SharePoint data. One instance involved only rudimentary reconnaissance against an Asia-Pacific government entity.
