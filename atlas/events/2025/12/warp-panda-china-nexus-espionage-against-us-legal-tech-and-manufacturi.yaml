    attributing_org_confidence: moderate   # source verbatim: "This assessment is made with moderate confidence based on the adversary's significant technical capabilities and focus on long-term access operations"
    attribution_level: named-actor   # CrowdStrike names the actor (WARP PANDA) + PRC/China nexus, but no Chinese service/unit -> named-actor, not named-unit
    auspex_assessment: concur
