  notes: |
    Audited against the CrowdStrike raw snapshot (HTTP 200, 176,531 bytes; SHA-256 31ef69730ca570d2329c987058b30dcc39b5e2457161054f0047ea1351974a7c, re-verified OK). FACTS all confirmed: U.S.-based legal/technology/manufacturing entities; summer-2025 vCenter intrusions; one intrusion's initial access "in late 2023"; BRICKSTORM + the two Golang ESXi implants Junction (ESXi hosts) and GuestConduit (guest VMs); initial access via Ivanti Connect Secure (CVE-2024-21887/2023-46805) and F5 BIG-IP (CVE-2023-46747), pivot into vCenter (CVE-2024-38812/2023-34048/2021-22005) -> initial_vector n-day correct (all published CVEs; no 0-day claim); domain-controller VM cloning for AD data; stolen Azure session tokens -> M365 OneDrive/SharePoint/Exchange; rudimentary reconnaissance vs an (un-named-country) Asia-Pacific government entity. ATTRIBUTION: source names only a "China-nexus adversary" whose ops are "likely motivated by intelligence-collection requirements aligned with the strategic interests of the PRC" at explicit "moderate confidence"; NO Chinese service/MSS/PLA/unit named -> cn/unscoped/warp-panda correct (actor already demoted from cn/mss on 2026-06-24); added attribution_level: named-actor. CORRECTIONS: (1) start_date 2025-12-04 (= the report's publication date) -> 2023-12-01, the earliest source-documented operational activity ("initial access in late 2023"), with disclosure_date 2025-12-04 added (Storm-2603/PurpleHaze precedent: anchor start_date to documented op, not publication; "since at least 2022" is inception, not a specific op). (2) summary "active since 2022" -> "since at least 2022" (source wording). (3) doctrine reasoning reworded to flag that MIC2025/plausible rests on AUSPEX sector-fit inference, not a source-stated goal. doctrine_links cn/mic2025 plausible/pillar-null HELD (correct, not over-attested): the source states no industrial/IP-advancement purpose and the legal-sector + APAC-government targeting keeps classic political/military espionage as an equally live reading, so neither attested nor strongly_inferred. Fixed the stale inline comment that claimed moderate was "mapped from ICD link-confidence: strongly_inferred" (source states moderate directly). Source raw_snapshot/content_sha256/tier preserved unchanged.
