    reasoning: |
      WARP PANDA's long-dwell BRICKSTORM/ESXi espionage against US technology and manufacturing firms (and their legal counsel) is consistent with PRC interest in acquiring high-tech and industrial IP to advance domestic upgrading (MIC2025); the cross-sector spread fits no single MIC2025 sector pillar, so pillar is null. plausible (not attested/strongly_inferred): CrowdStrike names only generic "intelligence-collection requirements aligned with the strategic interests of the PRC" and states no industrial/IP-advancement goal, and the legal-sector + Asia-Pacific-government targeting leaves classic political/military intelligence collection as an equally live reading.
