false_flag_risk: none
summary: |
  CrowdStrike Intelligence details WARP PANDA, a China-nexus intrusion group active since 2022 whose operations are assessed as likely aligned with PRC intelligence-collection interests, targeting US legal, technology and manufacturing entities. The group gains initial access by exploiting internet-facing edge devices (such as Ivanti VPN appliances and F5 BIG-IP), then pivots into VMware vCenter environments using valid credentials or vCenter exploitation. It deploys custom malware (BRICKSTORM, Junction, GuestConduit) for persistent covert access, and uses techniques such as VM cloning and Azure session-token exfiltration to reach email and SharePoint data. One instance involved only rudimentary reconnaissance against an Asia-Pacific government entity.
