id: 2025-02/bybit-safe-wallet
name: Bybit theft via Safe{Wallet} supply-chain compromise
start_date: 2025-02-04  # initial Safe{Wallet} developer-machine compromise window
disclosure_date: 2025-02-21
end_date: 2025-02-21
incident_type:
  - financial-theft
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Largest cryptocurrency theft in history. Approximately
  $1.5 billion in virtual assets stolen from Bybit via
  supply-chain compromise of Safe{Wallet} (Gnosis Safe)
  developer environment. Vector: compromise of a
  Safe{Wallet} developer's machine; injection of malicious
  JavaScript into the Safe UI loaded specifically for
  Bybit's multisig transactions; manipulation of a
  scheduled cold-to-warm-wallet transfer to redirect funds
  to attacker-controlled addresses. Funds subsequently
  converted to BTC and dispersed across thousands of
  addresses on multiple chains within 48 hours.
quantified_impact:
  usd_stolen: 1500000000
  asset_classes:
    - ETH
    - stETH
    - mETH
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Definitional 2025 event. Establishes the scale ceiling for
  DPRK supply-chain-driven crypto theft (~$1.5B in one
  operation) and the first publicly clean USG mapping of
  TraderTraitor to the 3rd Bureau of the RGB (FBI IC3 PSA
  PSA250226, 26 February 2025). Standard WMD-financing
  attestation language; Chainalysis tagged this single event
  as exceeding the combined annual DPRK crypto-theft totals
  for all years through 2023.
attributions:
  - actor_id: kp/rgb/tradertraitor
    attributing_org: US FBI (IC3)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2025-02-26
    attribution_source_id: fbi/2025-02-26_bybit-tradertraitor-psa
    notes: |
      FBI PSA explicitly maps TraderTraitor to the 3rd Bureau
      of the Reconnaissance General Bureau — first clean
      sub-bureau-level USG attribution.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: attested
    reasoning: |
      FBI's 26 February 2025 PSA applies the standard
      WMD-financing attestation language. Scale and tradecraft
      together attest the doctrinal centrality of crypto theft
      to the 8th Congress defense plan revenue pillar.
    attesting_source_id: fbi/2025-02-26_bybit-tradertraitor-psa
    contested: false
    analyst: claude
targets:
  - target_id: orgs/bybit
    role: primary
    outcome: ~$1.5B in virtual assets drained from cold-to-warm transfer.
  - target_id: orgs/safe-wallet
    role: staging
    outcome: Developer environment compromised; malicious JS injected into Bybit-specific Safe UI.
sources:
  - fbi/2025-02-26_bybit-tradertraitor-psa
  - chainalysis/2025-12-18_crypto-hacking-2026-report
