summary: |
  Cisco Talos attributes, with high confidence, multiple 2025 cyber-espionage campaigns to Lotus Blossom (aka Spring Dragon, Billbug, Thrip), based on TTPs and the deployment of the Sagerunex backdoor. The campaigns target government, manufacturing, telecommunications and media sectors across Southeast Asia, including the Philippines, Vietnam, Hong Kong and Taiwan. Sagerunex variants use third-party services such as Dropbox, Twitter and Zimbra webmail for command-and-control, and operators maintain persistence via registry manipulation and service installation. Talos notes the actor has operated since at least 2012, with recent variants adding obfuscation and legitimate-cloud-service abuse for evasion. The report focuses on post-compromise activity and does not specify the initial access vector.
