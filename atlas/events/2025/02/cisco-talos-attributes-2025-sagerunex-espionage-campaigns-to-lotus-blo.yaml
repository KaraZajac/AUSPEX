  notes: "Audited vs the cited Cisco Talos report (raw snapshot captured 2026-06-24, sha256 re-verified unchanged this audit). FACTS confirmed verbatim: Sagerunex backdoor ('used exclusively by Lotus Blossom'); sectors government/manufacturing/telecommunications/media in the Philippines, Vietnam, Hong Kong and Taiwan; C2 via Dropbox/Twitter/Zimbra webmail; registry+service persistence; active since at least 2012. NATION-SUPPORT FLAG (the cn-nexus issue): Talos attributes 'with high confidence' to 'the Lotus Blossom group' purely on TTPs/backdoor/victimology and names NO nation and NO service — zero 'China/Chinese/MSS/state-sponsored' referring to Lotus Blossom (the page's only China strings are footer 'Related Content' about unrelated clusters UAT-8302 and a BadIIS MaaS group). The `cn` bucket is therefore NOT supported by this source; it is an editorial alias to MSTIC 'Raspberry Typhoon' (which MSTIC does not equate to Lotus Blossom) — flagged on actor cn/unscoped/lotus-blossom. attribution_level set to named-actor (NOT nation); attributing_org_confidence high mirrors Talos's words (removed misleading 'mapped from strongly_inferred' comment). The lone cn/bri doctrine_link is correctly plausible/non-attested (no attesting source; the BRI framing inherits the unsupported cn-nexus and is the conservative ceiling). published_on corrected 2025-02-01 -> 2025-02-27 (page datePublished/byline 'By Joey Chen Thursday, February 27, 2025'; '2025-02-01' appears nowhere); attribution_date aligned to 2025-02-27. start_date 2025-02-01 left as a defensible best-estimate (report gives no precise op-start). Actor FK resolves and is current (not stale). Per-target sector-by-country pairing (gov-ph, mfg-vn, telecom-hk, media-tw) is an editorial 1:1 split — the source lists all four sectors and all four countries together but does not pin sector to country; all eight values are individually attested. id slug retains its 2025-02 path (stable-forever rule)."
