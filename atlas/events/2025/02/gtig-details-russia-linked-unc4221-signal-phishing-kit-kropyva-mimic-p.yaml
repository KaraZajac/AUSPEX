initial_vector: phishing
false_flag_risk: none
summary: |
  Google Threat Intelligence Group (GTIG) details UNC4221 (CERT-UA: UAC-0185), a Russia-linked threat actor that targets Signal accounts used by Ukrainian military personnel. The group operates a tailored Signal phishing kit that mimics components of Kropyva, the artillery-guidance application used by the Armed Forces of Ukraine, presenting malicious device-linking QR codes that link victims' Signal accounts to actor-controlled devices. As a core component, it also deploys a lightweight JavaScript payload tracked as PINPOINT to collect basic user information and geolocation via the browser's GeoLocation API. Earlier 2022 operations used phishing pages crafted as Signal security alerts. The technique grants persistent access to sensitive communications without full device compromise.
