id: 2025-02/gtig-details-russia-linked-unc4221-signal-phishing-kit-kropyva-mimic-p
name: "GTIG details Russia-linked UNC4221 Signal phishing kit (Kropyva-mimic / PINPOINT) targeting Ukrainian military"
start_date: 2025-02-19
incident_type:
