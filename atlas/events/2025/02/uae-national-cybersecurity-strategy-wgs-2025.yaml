    [a] FACTS — MAJOR CORRECTION (embellishment/conflation stripped).
    The prior outcome_summary asserted the WGS announcement "articulated"
    five pillars: "(1) cybersecurity laws, (2) vibrant ecosystem, (3)
    incident response, (4) critical infrastructure protection, (5)
    partnerships." (i) The cited Emirates247 source enumerates NO pillars
    — it says only "built around five key pillars" plus, separately, the
    goals "strengthening and growing the national economy" and
    "protecting critical infrastructure." (ii) Those five named pillars
    are in fact the 2019 UAE NCS pillars, not this 2025 strategy's —
    verified against u.ae/TRA (u.ae National Cybersecurity Strategy 2019:
    "1) cybersecurity laws and regulations; 2) a vibrant cybersecurity
    ecosystem; 3) National Incident Response plan; 4) CIIP program; 5)
    partnerships"). This was a copy of the predecessor doctrine's pillars
    grafted onto the successor announcement — stripped. Rewrote
    outcome_summary to carry only source-verbatim content. RAW evidence
    (verbatim from snapshot): "the recently approved five-year National
    Cybersecurity Strategy, endorsed by the UAE Cabinet, is built around
    five key pillars"; "These pillars are designed to enable the safe and
    rapid adoption of innovations while ensuring a secure, resilient, and
    robust digital environment"; "the strategy includes specific goals and
    initiatives aimed at strengthening and growing the national economy,
    in addition to protecting critical infrastructure"; "further cementing
    the country's position in artificial intelligence and the digital
    economy"; "the UAE has invested over $2 billion in cybersecurity and
    digital transformation"; "global losses from cyberattacks, cyber
    warfare, and cyberterrorism were estimated at around $10 trillion in
    2024"; "the Cybersecurity Council is currently finalising several
    policies, including a cryptography policy, which will be implemented in
    the first quarter of 2025." Other corrections: (a) "~$2 billion in
    associated investment is announced" → the source frames it as ALREADY
    invested "in cybersecurity and digital transformation" (past), not a
    new strategy-associated allocation — reworded, dropped the tilde
    ("over $2 billion"). (b) Title "UAE Head of Cyber Security" → "Head of
    the UAE Cyber Security Council (CSC)" to match the source's wording
    (he also holds the govt-wide "Head of Cyber Security" title per the
    sibling CSC-establishment event; used the source's phrasing here).
    (c) summary "moves federal cyber-policy authority formally to the CSC"
    (unsourced; CSC mandate dates to its 2020 establishment) and the
    unsourced company list "(G42 / CPX / Edge Group ecosystem)" removed.
    (d) summary "April 2019" → "2019" (the 2019 NCS launched 2019-06-23
    per the corpus sibling 2019-04/uae-ncs-publication, not April). Added
    source-carried context (the $10T figure, the Q1-2025 cryptography
    policy).

