id: 2025-02/lee-enterprises-qilin
name: Qilin ransomware against Lee Enterprises (US newspaper publisher)
start_date: 2025-02-03
disclosure_date: 2025-02-12
end_date: 2025-03-06
incident_type:
  - ransomware
