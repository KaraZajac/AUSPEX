    [a] FACTS — every claim now source-carried; corrections made:
     • Attack date 3 Feb 2025 ✓ (SEC 8-K: "On February 3, 2025, Lee Enterprises,
       Inc. ... experienced a systems outage caused by a cybersecurity attack";
       BleepingComputer: access "on February 3, 2025").
     • Mechanism ✓ (SEC 8-K: threat actors "unlawfully accessed the Company's
       network, encrypted critical applications, and exfiltrated certain files").
     • DATA SIZE CORRECTED: old "approximately 120GB" was WRONG — a conflation of
       the document COUNT. Qilin claimed "120,000 documents totaling 350 GB"
       (BleepingComputer) / "350 GB of data ... according to SentinelOne"
       (Cybersecurity Dive) / "theft of 350 GB" (The Record, Press Freedom
       Tracker). quantified_impact now data_claimed_gb: 350, documents_claimed:
       120000. Old event also overstated: it said Qilin "posted approximately
       120GB" — sources show Qilin CLAIMED ~350 GB, posted SAMPLES on 28 Feb and
       THREATENED a full 5 March release (not a confirmed full dump); prose fixed
       to "claimed/threatened," not "posted."
     • SSN / DATA BREACH ADDED (was entirely missing): forensic investigation
       determined PII of 39,779 individuals exposed, "name with a combination of
       ... Social Security Number, Driver's License, Financial Account Number,
       Medical Information, or Health Insurance Policy Number" (BleepingComputer;
       The Record: "39,779 people"). Discovered 28 May 2025, disclosed to Maine
       AG early June. Old "subscriber and employee records / editorial workflow
       materials" replaced with the sourced data types (govt ID scans, financial
       spreadsheets, contracts, NDAs — Qilin samples; SSN+PII — confirmed breach).
     • DISRUPTION SCOPE: publications count corrected 77 → 79 ("At least 79 Lee
       newspapers experienced disruptions" — Press Freedom Tracker; SEC 8-K:
       distribution of print publications "experienced delays," online "partially
       limited"; named titles St. Louis Post-Dispatch/Arizona Daily Star/Buffalo
       News/Sioux City Journal). The old "77" doubled as the disruption count AND
       a business-size figure — de-conflated. Business size stated as "72 markets
       in 25 states, ~350 weekly and specialty publications" (The Record ×2,
       Cybersecurity Dive). NOTE source conflict: BleepingComputer says "77 daily
       newspapers and 350 weekly ... across 26 states"; used the multiply-sourced
       "72 markets / 25 states" framing and flagged the variance.
     • Five-percent-of-operating-revenue (weekly/ancillary) ✓ (SEC 8-K).
     • "did not pay" — reporting "suggests that Lee refused to pay the ransom or
       that negotiations have stalled" (Press Freedom Tracker/SecurityWeek);
       phrased as "reporting indicates Lee did not pay." (The separate $9.5M is a
       class-action data-breach SETTLEMENT, not a ransom — deliberately excluded.)
     • FABRICATION REMOVED: the old summary's "Lee subsidiaries publish
       English-language and Eastern-European outlets, weakening any Russian-state-
       tolerance hypothesis" is FALSE (Lee is a plain US local-newspaper chain,
       no Eastern-European subsidiaries) — the same fabrication was just stripped
