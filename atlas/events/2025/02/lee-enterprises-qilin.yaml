initial_vector: unknown
outcome_summary: |
  On 3 February 2025 Lee Enterprises — a US local-newspaper publisher
  operating daily and weekly titles across 72 markets in 25 states
  (about 350 weekly and specialty publications) — suffered a systems
  outage caused by a ransomware attack. Per its SEC Form 8-K (Item
  1.05 Material Cybersecurity Incident, report date 12 February 2025),
  threat actors "unlawfully accessed the Company's network, encrypted
  critical applications, and exfiltrated certain files." The attack
  disrupted print distribution, billing, collections and vendor
  payments; at least 79 Lee newspapers reported disruptions to their
  online or print publications, many publishing delayed or smaller
  editions and some unable to publish at all. As of 12 February core
  products were being distributed normally while weekly and ancillary
  products (about five percent of operating revenue) remained
  unrestored; a 6 March 8-K/A reported the threat contained and all
  products producing again with residual limitations. Qilin claimed
  responsibility on 27-28 February 2025, listing Lee on its dark-web
  leak site, claiming theft of roughly 350 GB (about 120,000
  documents) and threatening to publish everything on 5 March;
  reporting indicates Lee did not pay. A later forensic investigation
  (concluded around 28 May 2025) determined the breach exposed the
  personal information — including Social Security numbers — of 39,779
  individuals.
quantified_impact:
  publications_disrupted: 79
  individuals_affected: 39779
  data_claimed_gb: 350
  documents_claimed: 120000
false_flag_risk: none
summary: |
  A large US daily-newspaper chain is an atypical entry in the Qilin
  victim run (mostly healthcare, manufacturing and public-sector,
  though the gang had previously hit media with The Big Issue), yet
  consistent with the ransomware-as-a-service cluster's broad,
  affiliate-driven, opportunistic victim selection. The incident is
  notable for its press-freedom-adjacent impact: a single ransomware
  intrusion halted page-building and print/e-edition publishing across
  dozens of US local newspapers (the St. Louis Post-Dispatch, Arizona
  Daily Star, Buffalo News, Sioux City Journal and others), which the
  U.S. Press Freedom Tracker logged as affecting "more than 75" / "at
  least 79" titles. Qilin is a financially-motivated, Russia-based
  ransomware-as-a-service operation with no published state-nexus
  attribution, so AUSPEX places it under criminal/ rather than
  ru/proxies/; nothing in the reporting ties this victim selection to
  any state interest.
