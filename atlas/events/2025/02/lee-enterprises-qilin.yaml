      claimed ~350 GB / ~120,000 documents, threatened a 5 March release)
      corroborated by security-industry analysis (SentinelOne, Darktrace) and
      journalism consensus. named-actor: a named criminal group, but no state
      service or nexus is published — hence criminal/qilin, not ru/proxies.
