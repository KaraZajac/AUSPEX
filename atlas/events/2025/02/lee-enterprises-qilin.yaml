id: 2025-02/lee-enterprises-qilin
name: Qilin ransomware against Lee Enterprises (US newspaper publisher)
start_date: 2025-02-03
disclosure_date: 2025-02-07
end_date: 2025-04-30
incident_type:
  - ransomware
  - disruption
  - data-theft
initial_vector: unknown
outcome_summary: |
  Lee Enterprises (US local-newspaper publisher operating 77 daily
  and 350 weekly publications across 25 states) disclosed via
  SEC 8-K filing February 7, 2025 a cybersecurity incident that
  disrupted print and digital publishing across multiple titles
  for over a week. Qilin ransomware subsequently claimed
  responsibility February 24 2025 and posted approximately
  120GB of exfiltrated data including subscriber and employee
  records, internal financial documents, and editorial
  workflow materials.
quantified_impact:
  publications_affected: 77
  data_exfiltrated_gb: 120
false_flag_risk: none
summary: |
  US-newspaper-publisher targeting is unusual in the Qilin
  victim run but consistent with the cluster's broad mid-market
  affiliate selection. Notable for press-freedom-adjacent impact
  (multiple titles missed print editions for the first time in
  some cases in decades) and for cross-jurisdictional victim mix
  (Lee subsidiaries publish English-language and Eastern-European
  outlets, weakening any Russian-state-tolerance hypothesis).
