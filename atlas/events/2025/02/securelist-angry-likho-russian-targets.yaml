    attributing_org: Kaspersky (Securelist)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-02-21
    attribution_source_id: kaspersky/2025-02-21_angry-likho-lumma-russian-orgs
    notes: |
      Kaspersky "attribute[s] this campaign to the APT group Angry
      Likho with a high degree of confidence" -- an ACTIVITY-CLUSTER
      attribution (Angry Likho = Sticky Werewolf per some vendors),
      noting similarities with BI.ZONE and F6 findings; it infers
      native-Russian-speaking operators from the fluent-Russian lures
      and names NO nation-state or intelligence service. The
      ru/unscoped/uac-0050 mapping is AUSPEX's unified cluster
      (UAC-0050 / Sticky Werewolf / Angry Likho aliased as
      "overlapping" on infrastructure overlap only); Kaspersky does
      not mention UAC-0050 here, and its Russia/Belarus victimology is
      the OPPOSITE of CERT-UA's Ukrainian-victim UAC-0050 profile.
