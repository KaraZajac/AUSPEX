id: 2025-02/securelist-angry-likho-russian-targets
name: Kaspersky documents Angry Likho (UAC-0050) wave against Russian organizations with Lumma Stealer
start_date: 2025-01-01
disclosure_date: 2025-02-21
end_date: 2025-02-21
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist published a follow-on to its January
  2025 Angry Likho overview, documenting a fresh wave of
  operations attributed to the Angry Likho cluster (overlapping
  with CERT-UA's UAC-0050 / BI.ZONE's Sticky Werewolf) against
  Russian-language corporate targets. The wave shifted payload
  to Lumma Stealer delivered via DLL-side-loading and obfuscated
  Python loader chains; tasking, lures, and infrastructure
  patterns remained consistent with prior UAC-0050 tradecraft.
false_flag_risk: low
summary: |
  Notable for the Russian-target reach of a cluster otherwise
  framed as Belarusian-aligned and Ukraine-targeting. Kaspersky's
  documentation supports the AUSPEX position that the Angry Likho
  label overlaps but does not perfectly equal UAC-0050: the
  cluster's operational scope appears broader than CERT-UA's
  Ukrainian-state-institution framing, including commodity-RAT
  delivery to Russian-language corporate targets that fits less
  neatly within the Belarusian KGB / Union State framing.
  Recorded here for cluster-tracking continuity; the
  Belarusian-only attribution is softer than for the pure
  Ukrainian-target operations.
attributions:
  - actor_id: by/kgb/uac-0050
    attributing_org: Kaspersky Securelist
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-02-21
    attribution_source_id: kaspersky/2025-02-21_angry-likho-lumma-russian-orgs
    notes: |
      Kaspersky framing is "Angry Likho." The Russian-target
      component complicates the Belarusian-aligned framing —
      AUSPEX records the attribution but flags the operational
      ambiguity in the dossier-level notes.
doctrine_links:
  - doctrine_id: by/union-state-integration
    pillar_id: by/union-state-integration/ukraine-theater-support
    program_id: null
    confidence: plausible
    reasoning: |
      Russian-target operations sit awkwardly inside a
      Belarusian-Russian Union State framing oriented toward
      Ukrainian-theater support. Confidence reduced to
      `plausible` to reflect that the doctrine-fit is weaker
      than for the Ukrainian-target operations the cluster is
      better known for.
    contested: true
    analyst: claude
