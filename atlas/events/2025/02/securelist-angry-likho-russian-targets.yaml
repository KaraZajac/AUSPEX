id: 2025-02/securelist-angry-likho-russian-targets
name: Kaspersky documents Angry Likho (Sticky Werewolf) APT targeting Russian and Belarusian government organizations with Lumma Stealer
start_date: 2024-06-01
disclosure_date: 2025-02-21
end_date: 2025-02-21
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist ("Angry Likho: Old beasts in a new
  forest") documented the Angry Likho APT -- referred to as Sticky
  Werewolf by some vendors and tracked by Kaspersky within its
  "Likho" activity cluster since 2023. Standardized spear-phishing
  emails delivered a Nullsoft NSIS self-extracting archive (SFX)
  that ran an obfuscated AutoIt loader -- a legitimate AutoIt
  interpreter (Child.pif) executing a compiled AU3 script (i.a3x)
  -- to install the Lumma stealer; the group's FrameworkSurvivor.exe
  implant was first seen in June 2024 and a fresh surge followed in
  January 2025 (flagged from F6 / F.A.C.C.T. indicators). Kaspersky
  identified hundreds of victims in Russia and several in Belarus,
  with fluent-Russian bait documents thematically tied to Russian
  government institutions and their contractors.
false_flag_risk: none
summary: |
  Kaspersky assesses Angry Likho as a targeted APT whose victims
  are "primarily ... organizations in Russia and Belarus," and
  infers the operators are "likely native Russian speakers" from
  the fluent-Russian lures; it names no state sponsor or
  intelligence service, and Belarus appears as a TARGET, not a
  sponsor. Directionality: this operation is directed AGAINST
  Russian and Belarusian government organizations. AUSPEX files
  Angry Likho within its unified UAC-0050 / Sticky Werewolf cluster
  on cross-vendor infrastructure overlap only (the aliases are
  "overlapping", not equivalent) -- Kaspersky itself does not
  mention UAC-0050, Ukraine, or Remcos in this report, and its
  Russia/Belarus victimology runs opposite to CERT-UA's
  Ukrainian-victim UAC-0050 framing.
attributions:
