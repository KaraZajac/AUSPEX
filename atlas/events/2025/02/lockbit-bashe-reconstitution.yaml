        Truth (Infosecurity, 25 Apr 2024): "DragonForce has been observed using a leaked
        ransomware builder from the infamous LockBit ransomware group"; CRIL saw "striking
        similarities in the code structure … [to] LockBit Black." That is LEAKED-BUILDER
