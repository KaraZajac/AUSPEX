outcome_summary: |
  One year after Operation Cronos (19 Feb 2025), the NCA's own
  one-year assessment describes LockBit as diminished but not
  eliminated: NCA cyber-crime head Paul Foster said there had been
  "no known, reported LockBit attack in the UK for over four months",
  with international partners seeing similar trends. Displaced
  affiliates fragmented across RaaS competitors — RansomHub, Play,
  Akira, Qilin and others, several of which "incorporated elements of
  LockBit's playbook". Remaining LockBit operators teased "LockBit 4.0"
  on 19 Dec 2024 with a countdown to a 3 Feb 2025 launch, with limited
  affiliate uptake. Two adjacent 2024 groups are frequently discussed
  alongside LockBit's decline, but at WEAKER evidentiary strength than
  a rebrand: Bashe (aka APT73 / Eraleig) is a SUSPECTED LockBit
  splinter — an inference from data-leak-site structural resemblance,
  reportedly founded by a former LockBit affiliate, not a confirmed
  organizational link; DragonForce is a SEPARATE RaaS that built its
  toolset on LockBit's LEAKED 3.0 builder (code reuse, not a LockBit
  rebrand). AUSPEX reads the one-year mark as the operational
  conclusion of LockBit as a top-tier RaaS.
summary: |
  One-year-after-Cronos assessment. Documents the affiliate-trust-
  decay pattern that follows even partial RaaS takedowns: LockBit's
  operational tempo collapsed and its affiliate base scattered across
  competing programs. Subsequent ransomware-ecosystem leadership
  passed to RansomHub (until its own inexplicable disappearance on
  1 Apr 2025, after which affiliates migrated largely to Qilin) and to
  Akira / Play. The two names historically leak-site-branded as LockBit
  successors resolve on inspection to weaker claims — Bashe a suspected
  splinter (DLS-resemblance inference) and DragonForce a distinct group
  reusing LockBit's leaked builder.
