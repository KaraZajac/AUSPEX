id: 2025-02/lockbit-bashe-reconstitution
name: LockBit residual operations and Bashe / DragonForce rebrand attempts
start_date: 2024-12-01
disclosure_date: 2025-02-19
end_date: 2025-02-19
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  One-year anniversary retrospective by NCA / FBI documenting
  LockBit's diminished but persistent operations through late
  2024 and early 2025. Affiliate share migrated to Akira, Play,
  Qilin, RansomHub, and the Khoroshev-uninvolved "Bashe" and
  "DragonForce" rebrand attempts. LockBit 4.0 beta release
  announced by remaining operators October 2024 with limited
  affiliate uptake. AUSPEX reads this as the operational
  conclusion of LockBit as a top-tier RaaS — twelve months after
  Operation Cronos.
false_flag_risk: none
campaign_id: lockbit-cronos
operators_named:
  - khoroshev-dmitry  # LockBitSupp, DOJ + OFAC May 2024 (NCA Cronos retrospective)
summary: |
  One-year-after-Cronos NCA / FBI assessment. Documents the
  affiliate-trust-decay pattern that follows even partial
  RaaS takedowns. Subsequent ransomware ecosystem leadership
  passed to RansomHub (until its own April 2025 disappearance)
  and Akira / Play / Medusa.
