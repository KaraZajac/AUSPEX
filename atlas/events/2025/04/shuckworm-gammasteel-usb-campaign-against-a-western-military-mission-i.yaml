  notes: "Audited vs the Symantec Threat Hunter Team report (security.com), raw-captured + sha256'd (live HTTP 200, 322 KB; sha256 c0349d06...). FACTS confirmed: Feb-March 2025 campaign vs a Western country's military mission based in Ukraine; initial access via an infected removable drive carrying .lnk files; mshta.exe + wscript.exe + obfuscated PowerShell/VBScript loaders; an updated PowerShell version of the GammaSteel infostealer exfiltrating office docs; certutil MD5; cURL+Tor fallback; C&C hidden behind Cloudflare tunnels / Telegram / teletype.in / write.as; Ukrainian military-document lures + mil.gov.ua targeting confirm the military-espionage focus. CORRECTIONS: (1) published_on / attribution_date 2025-04-01 -> 2025-04-10 (article header + HTML datePublished both read 10 Apr 2025); (2) source re-tiered industry/secondary -> vendor-research/primary (first-party Symantec original research); (3) summary 'removable USB drives' -> 'removable drive' -- the source NEVER uses 'USB'; it says 'infected removable drive'/'external drive' and the malware 'infect[s] any removable drives and network drives' via .lnk (the event slug+name retain 'USB' as a stable id and a defensible-but-unstated specialization); (4) added attribution_level: named-actor; (5) removed a stray '# ICD link-confidence: attested' comment on the attribution line (no attested links exist). ATTRIBUTION: Symantec states 'Russia-linked' as its own assessment and RELAYS the FSB linkage -- 'It is believed that Shuckworm operates on behalf of the...FSB', a clause hyperlinked to the Ukrainian SBU Armageddon technical report; so the named-unit ru/fsb/center-18 placement rests on SBU/CERT-UA (already cited in the actor record via sbu/2021-11-04_gamaredon-fsb-officer-identification), NOT on this Symantec source -> concur-with-caveat is correct. DOCTRINE: ru/russkiy-mir/ukraine-theater kept at strongly_inferred (attesting_source_id null) -- source names the espionage behaviour + 'laser-focused on targeting entities within Ukraine for espionage purposes' but does NOT state a Russkiy Mir strategic goal in substance, so NOT upgraded to attested; conservative and honest. Actor ru/fsb/center-18/gamaredon resolves and is current (not stale). UNCERTAINTY: targets tagged country: ua (operational location of the mission + Ukrainian-language lures); the mission belongs to an unnamed Western country, so the victim nationality is technically the Western state -- left as ua per operational location, flagged here."
