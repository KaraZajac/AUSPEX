summary: |
  Symantec's Threat Hunter Team reported (published 10 Apr 2025) that between February and March 2025 Shuckworm (Gamaredon) targeted the military mission of a Western country based in Ukraine, gaining initial access via an infected removable drive carrying malicious LNK files. The attackers used obfuscated PowerShell and VBScript loaders executed through mshta.exe and wscript.exe, and deployed an upgraded PowerShell version of the GammaSteel infostealer to exfiltrate office documents (.doc/.docx/.xls/.pdf and similar). Command-and-control was hidden behind legitimate web services (Cloudflare tunnels, Telegram, teletype.in, write.as), with cURL-over-Tor as a fallback exfiltration channel, and the operation focused on machines holding apparently sensitive Ukrainian military information (Ukrainian-language military document lures, mil.gov.ua targeting). Symantec describes the activity as Russia-linked and relays the assessment — citing the Ukrainian SBU's Armageddon technical report — that Shuckworm operates on behalf of the Russian FSB.
