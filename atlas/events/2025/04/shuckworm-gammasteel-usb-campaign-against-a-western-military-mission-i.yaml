summary: |
  Symantec's Threat Hunter Team reported that between February and March 2025 Shuckworm (Gamaredon) targeted the military mission of a Western country based in Ukraine, gaining initial access via infected removable USB drives carrying malicious LNK files. The attackers used obfuscated PowerShell and VBScript loaders executed through mshta.exe and wscript.exe, and deployed an upgraded PowerShell version of the GammaSteel infostealer to exfiltrate files. The group hid command-and-control behind legitimate services and focused on machines containing apparently sensitive military information. Symantec attributes the activity to the Russia-linked, FSB-associated Shuckworm group.
