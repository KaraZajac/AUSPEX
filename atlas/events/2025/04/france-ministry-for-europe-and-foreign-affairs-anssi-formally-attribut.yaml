id: 2025-04/france-ministry-for-europe-and-foreign-affairs-anssi-formally-attribut
name: "France (Ministry for Europe and Foreign Affairs + ANSSI) formally attributes 2021-2024 espionage against ~10 French entities to APT28 / GRU Unit 26165"
start_date: 2025-04-29
incident_type:
  - espionage
  - intrusion
  - attribution-publication
initial_vector: phishing
false_flag_risk: none
summary: |
  On 29 April 2025 France made its first public state attribution of APT28 operations against French entities. Two companion publications appeared the same day: ANSSI's CERT-FR released technical CTI report CERTFR-2025-CTI-007 ('Targeting and compromise of French entities using the APT28 intrusion set'), which attributes the APT28 intrusion set to 'the Russian Federation' (citing the EU High Representative); and the Ministry for Europe and Foreign Affairs (MEAE) issued a diplomatic condemnation that explicitly names the perpetrator — 'France condemns in the strongest terms the use by Russia's military intelligence service (GRU) of the APT28 attack group'. Since 2021 the intrusion set targeted around ten French entities (later reporting: 12) — public services, private companies, and a sports organisation involved in Paris 2024 Olympic preparations, plus ministerial/local-government, defence (DTIB), aerospace, research/think-tank and economic/finance sectors — using phishing, exploitation of CVE-2023-23397, brute-force against webmail and compromised edge devices. France's MEAE attributes APT28 to Russia's GRU; it does NOT itself name a specific unit — Unit 26165 is the established analyst / MISP-galaxy placement of APT28 (the actor mapped here). Distinct from the 2023 ANSSI APT28 attribution already in the corpus (CERTFR-2023-CTI-009, covering a 2021-2023 campaign); this 2025 report + foreign-ministry condemnation is a new event. Maps to the existing Fancy Bear / APT28 actor.
attributions:
  - actor_id: ru/gru/26165/apt28
    attributing_org: "Ministry for Europe and Foreign Affairs (France)"
    attributing_org_confidence: high   # formal state attribution
    attribution_level: named-unit   # MEAE names the GRU (military intelligence service); actor sits under ru/gru/26165
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-04-29
    attribution_source_id: diplomatie-gouv-fr/2025-04-29_apt28-attribution-russian-military-gru
    notes: |
      The GRU attribution is the MEAE diplomatic statement's, not ANSSI's: ANSSI/CERT-FR's
      CERTFR-2025-CTI-007 attributes APT28 only to "the Russian Federation" (citing the EU
      High Representative) and names no unit. The MEAE explicitly condemns "the use by
      Russia's military intelligence service (GRU) of the APT28 attack group" — hence
      named-unit (GRU = named service organ). France did NOT name Unit 26165; that is the
      analyst/MISP-galaxy placement of APT28 reflected in the actor_id.
