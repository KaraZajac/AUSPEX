summary: |
  On 29 April 2025 France made its first public state attribution of APT28 operations against French entities. ANSSI's CERT-FR released CTI report CERTFR-2025-CTI-007 ('Targeting and compromise of French entities using the APT28 intrusion set'), and the Ministry for Europe and Foreign Affairs condemned the GRU-attributed activity. Since 2021 the intrusion set targeted roughly ten French entities — public services, private companies, and a sports organisation involved in Paris 2024 Olympic preparations, plus defence, aerospace, finance and NGO sectors — using phishing, exploitation of CVE-2023-23397, brute-force against webmail and compromised edge devices. France's foreign ministry explicitly attributes APT28 to Russia's GRU (Unit 26165). Distinct from the 2021 ANSSI APT28 attribution already in the corpus (which covered a 2021-2023 campaign); this 2025 report + foreign-ministry condemnation is a new event. Maps to the existing Fancy Bear / APT28 actor.
