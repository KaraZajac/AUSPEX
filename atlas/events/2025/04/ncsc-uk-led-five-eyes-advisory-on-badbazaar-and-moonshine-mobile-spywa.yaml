  notes: |
    Audited against the NCSC 51-page technical advisory (raw captured + hashed, sha256 aac5a6cc...83e1c4) plus the news landing page and news-PDF. FACTS OK: date 9 Apr 2025; partner coalition verbatim (NCSC UK lead + ASD/ACSC, CSE/CCCS, German BND + BfV, NZ NCSC/GCSB, US FBI, US NSA); BADBAZAAR (iOS/Android) + MOONSHINE (Android); victims Uyghur/Tibetan/Taiwanese (+ democracy movements/Falun Gong in the awareness scope); Uyghur-language Quran app + tibetone[.]org C2 confirmed.
    CORRECTIONS: (1) summary data-types tightened to NCSC's wording ("location, audio and photo data"; was "microphone, camera, message, photo and location"). (2) ATTRIBUTION: added attribution_level: nation — NCSC attributes ONLY to "the Chinese state" ("almost certainly of value to the Chinese state"); it names NO service and NO named-actor in its own voice. The Poison Carp / TA413 labels appear in the advisory only as citations to Lookout / Recorded Future; APT15 is NOT mentioned anywhere in the 51pp document. Corrected the false "mapped from ICD link-confidence" comment and the over-broad attributing_org. (3) doctrine link kept strongly_inferred (NCSC names beneficiary+effect but not a state-tasking/legal-compulsion mechanism) with NCSC quote added + inference_basis backfilled. (4) source kind corrected industry->govt-primary (NCSC is a GCHQ govt body); tier preserved (secondary) per scope though arguably primary.
    ACTOR ISSUE (flagged, NOT fixed — out of single-event scope): actor_id cn/unscoped/apt15 is an unsupported backfill placeholder. NCSC names no actor; MISP-galaxy maps MOONSHINE->Poison Carp (UUID 7aa99279-4255-4d26-bb95-12e7156555a0) and BADBAZAAR->GREF (not APT15). Recommend a reviewer create cn/unscoped/poison-carp and re-point this attribution; cn/unscoped/apt15 currently resolves so this is not a dangling FK, but it is mis-attributed.
