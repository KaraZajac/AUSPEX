id: 2025-04/ncsc-uk-led-five-eyes-advisory-on-badbazaar-and-moonshine-mobile-spywa
name: "NCSC-UK-led Five Eyes advisory on BADBAZAAR and MOONSHINE mobile spyware targeting Uyghur, Tibetan, Taiwanese, Falun Gong and pro-democracy communities for the Chinese state"
start_date: 2025-04-09
incident_type:
  - surveillance
  - espionage
false_flag_risk: none
summary: |
  On 9 April 2025 the UK NCSC, leading a coalition with the FBI, NSA, Australia's ACSC (ASD), Canada's CCCS (CSE), New Zealand's NCSC (GCSB) and Germany's BfV and BND, published an advisory on two mobile spyware families — BADBAZAAR (iOS/Android) and MOONSHINE (Android) — that capture location, audio and photo data (MOONSHINE also exfiltrates files, screen recordings, contacts, call logs and SMS) from devices, data NCSC assesses 'would almost certainly be of value to the Chinese state.' Targets are transnational-repression communities: Uyghurs, Tibetans and Taiwanese individuals (the advisory's Assessment), with the broader awareness scope naming Taiwan, Tibet, the Xinjiang Uyghur Autonomous Region, democracy movements and Falun Gong; delivery is via trojanised apps of interest to these communities (e.g. a Uyghur-language Quran app; tibetone[.]org is a BADBAZAAR C2) shared on app stores and group chats. AUDIT (2026-06-25): NCSC attributes ONLY to 'the Chinese state' at the nation level — it names NO Chinese intelligence service and asserts NO named-actor in its own voice. The named-actor labels (MOONSHINE→Poison Carp/Evil Eye/Earth Empusa via Lookout; TA413 via Recorded Future) appear in the advisory solely as citations to vendor reporting; APT15/Nickel/Vixen Panda is NOT mentioned anywhere in the 51-page document — the BADBAZAAR↔APT15 link is wider-vendor lineage, not an NCSC claim, and MISP-galaxy maps BADBAZAAR to GREF, not APT15. ACTOR ISSUE: actor_id cn/unscoped/apt15 is a backfill placeholder that the source does not support; the best-supported actor is Poison Carp (the MOONSHINE operator; MISP UUID 7aa99279-4255-4d26-bb95-12e7156555a0), which has no actor file in the corpus yet — a reviewer should create cn/unscoped/poison-carp and re-point this attribution to it.
