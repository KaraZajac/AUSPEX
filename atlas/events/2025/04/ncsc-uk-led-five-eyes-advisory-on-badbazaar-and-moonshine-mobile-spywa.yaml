summary: |
  On 9 April 2025 the UK NCSC, leading a coalition with the FBI, NSA, Australia's ACSC, Canada's CCCS, New Zealand's NCSC and Germany's BfV/BND, published an advisory on two Android/iOS spyware families — BADBAZAAR and MOONSHINE — used to collect microphone, camera, message, photo and location data from mobile devices 'that could be of interest to the Chinese state.' Targets are transnational-repression communities: Uyghurs, Tibetans, Taiwan-independence supporters, Hong Kong/China democracy advocates and Falun Gong, via trojanised apps (e.g. TibetOne, an Uyghur Quran app). Vendor research links MOONSHINE to Poison Carp (Evil Eye/Earth Empusa) and BADBAZAAR to APT15 (Nickel/Vixen Panda). NOT in the corpus; the UK section (17 events) is largely Snowden-era/meta, so this NCSC-led operational disclosure adds a 2025 attested-disclosure data point. NOTE actor_id_existing is a placeholder — the true map is Poison Carp / APT15 (both in the CN inventory but neither has a canonical bracketed actor_id), so a reviewer should re-point this to Poison Carp.
