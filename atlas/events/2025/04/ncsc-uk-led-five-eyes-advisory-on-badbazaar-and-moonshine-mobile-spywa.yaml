    reasoning: |
      BADBAZAAR and MOONSHINE trojanise apps of interest to Uyghur, Tibetan and Taiwanese communities (and, per the advisory's broader scope, Hong Kong/China democracy movements and Falun Gong) to capture location, audio and photo data — textbook transnational-repression collection against diaspora, dissident and ethnic-minority communities, the exact populations the National Intelligence Law 2017 diaspora-and-dissident-collection pillar encodes. NCSC assesses the collected data "would almost certainly be of value to the Chinese state" and that citizens "perceived to be supporting causes that threaten regime stability... are almost certainly under threat." Held at strongly_inferred (not attested): NCSC names the beneficiary (the Chinese state) and the surveillance/harassment effect, but does not tie the operation to a state intelligence-tasking or legal-compulsion mechanism, and names no service — so the link to the 2017-law collection mandate is AUSPEX's inference, not NCSC's stated purpose.
    attesting_source_id: null
    inference_basis:
      signals:
        - "NCSC (govt, Five Eyes + DE): data 'almost certainly of value to the Chinese state'; targets those 'perceived to be supporting causes that threaten regime stability'."
        - "Victim set (Uyghur/Tibetan/Taiwanese/Falun Gong/democracy movements) is the exact population the NatIntLaw-2017 diaspora-and-dissident-collection pillar enumerates."
        - "Trojanised apps tailored to these communities (Uyghur-language Quran app) + mobile audio/photo/location capture = surveillance/harassment tooling, not financial or generic-espionage tradecraft."
      ruled_out: "Financially-motivated or untargeted commercial spyware — ruled out by the community-specific app trojanisation and the state-value framing; no revenue or sanctions-evasion purpose is present."
