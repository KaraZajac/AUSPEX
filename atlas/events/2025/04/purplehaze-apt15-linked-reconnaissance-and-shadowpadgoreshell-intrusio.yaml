id: 2025-04/purplehaze-apt15-linked-reconnaissance-and-shadowpadgoreshell-intrusio
name: "PurpleHaze (APT15-linked) reconnaissance and ShadowPad/GoReShell intrusions against SentinelOne and 70+ global organizations"
start_date: 2024-06-01   # earliest source-documented activity (June 2024 ShadowPad vs the South Asian govt entity); disclosed 2025-04-28
disclosure_date: 2025-04-28
incident_type:
  - reconnaissance
  - intrusion
  - espionage
  - data-theft
initial_vector: n-day
false_flag_risk: none
summary: |
  SentinelOne (SentinelLABS) detailed the PurpleHaze activity cluster, in which a China-nexus actor used the ShadowPad backdoor (ScatterBrain-obfuscated), a Go-based backdoor named GoReShell, and reconnaissance against SentinelOne's own infrastructure. The actor primarily gained initial access by exploiting an n-day vulnerability in Check Point gateway devices, and also compromised an external IT services and logistics provider that managed hardware logistics for SentinelOne employees. Between July 2024 and March 2025 the malware was used in intrusions at over 70 organizations globally across manufacturing, government, finance, telecommunications and research. SentinelOne assessed with high confidence that PurpleHaze is a China-nexus actor, loosely linking it to APT15 (Nylon Typhoon); Google Threat Intelligence Group attributed related ShadowPad samples to APT41.
attributions:
  - actor_id: cn/unscoped/apt15
    attributing_org: "SentinelLABS (SentinelOne)"
    attributing_org_confidence: moderate   # SentinelLABS: "high confidence" China-nexus, but only "loosely linking it to APT15" — moderate fits the named-actor (APT15) claim
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-04-28
    attribution_source_id: sentinelone/2025-04_purplehaze-apt15-linked-reconnaissance-a
    notes: "SentinelLABS attributes at the nation level with high confidence (China-nexus / 'Chinese State-Sponsored Adversaries'); the APT15 (Nylon Typhoon) link is explicitly 'loose'. No Chinese service (MSS) is named — aligns with cn/unscoped/apt15. GTIG separately attributes the ScatterBrain-obfuscated ShadowPad samples to APT41."
doctrine_links:
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      APT15-linked, China-nexus PurpleHaze ran reconnaissance against a cybersecurity vendor (SentinelOne) and its IT/logistics supply chain plus 70+ global organizations using ShadowPad/GoReShell; targeting a security vendor and its supply chain reads as state-sponsored counter-intelligence / capability collection that fits no economic or regional CN doctrine, so the PRC intelligence-collection legal mandate is the most defensible anchor. Plausible (not attested): SentinelLABS names no strategic purpose, and the specific service (MSS) is not named — the actor sits at cn/unscoped.
    attesting_source_id: null
    contested: false
    analyst: claude
