qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: "Audited vs the SentinelLABS 'Top Tier Target' report (28 Apr 2025; raw captured, sha256 b2ef6d85...). FACTS confirmed: PurpleHaze recon against SentinelOne infra + high-value orgs it defends; GoReShell (Go/reverse_ssh) backdoor; ShadowPad (ScatterBrain-obfuscated, evolution of ScatterBee); n-day in Check Point gateway devices; compromise of an IT/logistics provider managing hardware logistics for SentinelOne employees; July 2024-March 2025, 70+ orgs across manufacturing/government/finance/telecom/research; GTIG attributes ScatterBrain ShadowPad to APT41. ATTRIBUTION: source = 'Chinese State-Sponsored Adversaries' / 'China-nexus' at HIGH confidence (nation level), APT15 (Nylon Typhoon) link explicitly LOOSE, NO MSS or any service named -> aligns with cn/unscoped/apt15 (actor freshly demoted 2026-06-24). Set attributing_org_confidence comment straight (was stale 'strongly_inferred' mapping) and added attribution_level: named-actor. CORRECTIONS: start_date 2025-04-28 -> 2024-06-01 (disclosure != op start; earliest source-documented activity is the June 2024 ShadowPad intrusion), original date moved to disclosure_date. doctrine_links: cn/national-intelligence-law-2017 kept at plausible/attesting_source_id:null (source names no strategic purpose; NOT attested) and reasoning de-MSS'd to match the cn/unscoped placement. All FKs (actor, doctrine, 7 sectors, cn/unscoped service) resolve. Source tier (secondary/industry) preserved."
