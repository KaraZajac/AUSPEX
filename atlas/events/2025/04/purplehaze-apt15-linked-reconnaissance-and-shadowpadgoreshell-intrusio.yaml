summary: |
  SentinelOne (SentinelLABS) detailed the PurpleHaze activity cluster, in which a China-nexus actor used the ShadowPad backdoor (ScatterBrain-obfuscated), a Go-based backdoor named GoReShell, and reconnaissance against SentinelOne's own infrastructure. The actor primarily gained initial access by exploiting an n-day vulnerability in Check Point gateway devices, and also compromised an external IT services and logistics provider that managed hardware logistics for SentinelOne employees. Between July 2024 and March 2025 the malware was used in intrusions at over 70 organizations globally across manufacturing, government, finance, telecommunications and research. SentinelOne assessed with high confidence that PurpleHaze is a China-nexus actor, loosely linking it to APT15 (Nylon Typhoon); Google Threat Intelligence Group attributed related ShadowPad samples to APT41.
