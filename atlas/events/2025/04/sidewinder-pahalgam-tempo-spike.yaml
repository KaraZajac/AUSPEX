initial_vector: phishing
outcome_summary: |
  Acronis Threat Research Unit disclosed (reported by The Hacker
  News, 2025-05-20) a 2025 SideWinder spear-phishing campaign
  against high-level South Asian government institutions,
  including Pakistan. The Pakistan-specific named victim was
  Pakistan's Directorate of Indigenous Technical Development (a
  defense technical-development body); the campaign also hit
  government institutions in Sri Lanka and Bangladesh. Infection
  used geofenced spear-phishing to deliver an RTF weaponizing
  CVE-2017-11882 (Office Equation Editor) — with CVE-2017-0199 also
  reported — launching a shellcode loader that runs the StealerBot
  post-exploitation toolkit; the modus operandi was noted as
  consistent with SideWinder activity Kaspersky documented in
  March 2025. Trellix subsequently (reported 2025-10-28)
  documented multi-wave 2025 SideWinder phishing against Pakistani
  and other South Asian diplomats using ModuleInstaller and
  StealerBot.
false_flag_risk: none
summary: |
  A 2025 operation by SideWinder (India-nexus APT, active since
  2012) whose activity window overlaps the acute April-May 2025
  India-Pakistan crisis cycle (the 22 April 2025 Pahalgam attack
  and India's subsequent Operation Sindoor strikes — the most
  acute India-Pakistan military escalation since Balakot 2019).
  AUSPEX tracks a hypothesis that Indian- and Pakistani-aligned
  cluster activity tracks bilateral crisis cycles (companion
  events: 2025-04/sidecopy-pre-pahalgam-tempo,
  2025-05/apt36-pahalgam-operation-sindoor-tempo on the
  Pakistani side). NOTE: no cited source frames this SideWinder
  campaign as a crisis-driven "tempo spike" against Pakistan — the
  disclosed campaign (Acronis/Trellix) is an ongoing multi-country
  espionage operation whose window happens to include the crisis;
  the crisis-cycle linkage is an AUSPEX inference, not a source
  claim. The defensible, source-carried core is SideWinder's
  documented April-May 2025 targeting of a Pakistani defense body
  and South Asian government institutions with StealerBot.
