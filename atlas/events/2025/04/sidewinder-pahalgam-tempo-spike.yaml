  notes: |
    PHANTOM-REMEDIATION → RE-SOURCE (badrabbit model). The sole cited source was a phantom:
    sekoia/2025-05-07_sidewinder-pahalgam-tempo (url:null; its own notes admit "no specific
    Sekoia.io blog permalink covering SideWinder tempo during the Pahalgam / Operation Sindoor
    cycle was recovered"). No Sekoia "tempo-spike" report exists. Web verification confirms the
    UNDERLYING incident is real: SideWinder ran 2025 spear-phishing against Pakistani/South Asian
    government targets — so the event was re-sourced to real reporting rather than retired.
    Level=partial: the vendor primaries (Acronis "From banks to battalions…"; Trellix "SideWinder's
    Shifting Sands: Click Once for Espionage") are bot-walled to my fetcher (Acronis 403; Trellix
    curl HTTP 000 / WebFetch 403), so claims are carried by snapshotted The Hacker News mirrors.

    [a] FACTS — corrected to what the snapshotted sources carry; fabrications stripped.
    THN 2025-05-20 (Acronis, sha256 ecef0b01…fa027948, 170,631 B): "High-level government
    institutions in Sri Lanka, Bangladesh, and Pakistan have emerged as the target of a new
    campaign orchestrated by a threat actor known as SideWinder"; "Pakistan's Directorate of
    Indigenous Technical Development" is the Pakistan-specific named victim; "The malicious payload
    is an RTF file that weaponizes CVE-2017-11882, a memory corruption vulnerability in the Equation
    Editor, to launch a shellcode-based loader that runs the StealerBot malware"; "consistent with
    recent SideWinder attacks documented by Kaspersky in March 2025." THN 2025-10-28 (Trellix,
    sha256 b8c9fbfc…92dc049a, 171,938 B) corroborates 2025 SideWinder targeting of Pakistani + South
    Asian diplomats with "ModuleInstaller and StealerBot." STRIPPED as unsupportable: (1) the
    "sharp uptick in SideWinder operational tempo" / crisis-driven "tempo spike" causal framing —
    no source states it; (2) "Karachi-area defense-research targets" — fabricated geography (the real
    defense target is the Directorate of Indigenous Technical Development, no city named; zero
    "Karachi" hits in either snapshot); (3) "post-Sindoor diplomatic cables" lure theme — fabricated
    (real lures are Pakistani military-welfare/government documents per Trellix, e.g. CSD/JCO items);
    (4) "Sekoia, Kaspersky, and Indian commercial threat-intelligence outlets" multi-vendor-consensus
    claim — Sekoia citation is phantom; the actual reporters are Acronis (May 2025) and Trellix
    (Oct 2025). CVEs verified real and source-carried (CVE-2017-11882 named verbatim; CVE-2017-0199
    also named); StealerBot + weaponized-RTF tradecraft verified.

    [b] ATTRIBUTION — Acronis attributes the campaign to SideWinder (via THN). SideWinder = named
    cluster of Indian origin (MITRE G0121 "suspected Indian threat actor group"; Kaspersky). Set
    attributing_org=Acronis (was "Sekoia / vendor-consensus"), attribution_source_id re-pointed off
    the phantom to thehackernews/2025-05-20_…, attribution_date 2025-05-07→2025-05-20. Kept
    confidence=high (the SideWinder identification is firm/vendor-consensus) and assessment=concur.

    [c] DATES — disclosure_date 2025-05-07 (the phantom/Op-Sindoor strike date) → 2025-05-20 (the
    real Acronis/THN disclosure). start_date kept at 2025-04-22 as a best-estimate crisis-window
    anchor: the campaign is documented active across April–May 2025 (Acronis May; "consistent with
    Kaspersky March 2025"), but NO snapshotted source pins SideWinder's op-start to that exact date —
    it is the crisis anchor, flagged here. end_date null (ongoing).

    [d] DOCTRINE_LINKS — link kept strongly_inferred (NOT attested; attesting_source_id null),
    reasoning rewritten off the (unsourced) "tempo elevation" onto the documented Pakistani-defense
    targeting; added inference_basis{signals[], ruled_out} (ruled out the diplomatic-collection pillar
    since the Pakistan-specific victim is a defense R&D directorate). Honest: no source states purpose,
    no Indian govt claims tasking; doctrine is an inferred posture.

    [e] ATTRIBUTION_LEVEL — set named-actor (was absent): SideWinder group + Indian nation-of-origin,
    no service named (consistent with the actor's in/unscoped placement).

    [f] ACTOR_ID — in/unscoped/sidewinder resolves to atlas/actors/in/sidewinder.yaml (id
