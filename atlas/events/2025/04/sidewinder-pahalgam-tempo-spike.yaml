id: 2025-04/sidewinder-pahalgam-tempo-spike
name: SideWinder operational tempo spike against Pakistani military during Pahalgam / Operation Sindoor cycle
start_date: 2025-04-22
disclosure_date: 2025-05-07
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Following the April 22 2025 Pahalgam attack and India's
  subsequent "Operation Sindoor" strikes against Pakistan, vendor
  reporting (Sekoia, Kaspersky, and Indian commercial threat-
  intelligence outlets) documented a sharp uptick in SideWinder
  operational tempo against Pakistani military and Karachi-area
  defense-research targets. Phishing lures were themed on
  Pakistani military communiqués and post-Sindoor diplomatic
  cables; tradecraft included StealerBot variants and continued
  exploitation of weaponized RTF documents.
false_flag_risk: none
summary: |
  Significant data point for the AUSPEX pattern of Indian-aligned
  cluster tempo elevations during India-Pakistan crisis cycles
  (Pulwama / Balakot 2019, Article 370 2019, Pahalgam / Sindoor
  2025). The Pahalgam cycle was the most acute India-Pakistan
  military escalation since Balakot and SideWinder's response
  tempo elevation is the cyber dimension of that crisis.
