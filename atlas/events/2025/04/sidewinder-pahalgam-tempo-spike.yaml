id: 2025-04/sidewinder-pahalgam-tempo-spike
name: SideWinder StealerBot spear-phishing campaign against Pakistani defense and government targets during the 2025 India-Pakistan crisis window
start_date: 2025-04-22
disclosure_date: 2025-05-20
end_date: null
incident_type:
  - espionage
  - intrusion
