id: 2025-04/sidecopy-pre-pahalgam-tempo
name: SideCopy operational tempo through early 2025 ahead of Pahalgam crisis
start_date: 2025-01-01
disclosure_date: 2025-06-05
end_date: 2025-04-22
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Cyfirma's consolidated 2025-06-05 vendor analysis of the
  India-Pakistan cyber battlefield documented SideCopy operational
  activity through the first four months of 2025 against Indian
  government and defense-research targets, providing the baseline
  against which the post-Pahalgam-attack tempo elevation
  (companion AUSPEX event 2025-05/apt36-pahalgam-operation-sindoor-tempo)
  was measured. Lures themed on Indian Ministry of Defence
  circulars and DRDO research-program communications. The
  early-2025 SideCopy campaign operated in parallel with
  Transparent Tribe Crimson RAT and ElizaRAT operations across
  the Pakistani-aligned cluster.
false_flag_risk: suspected
summary: |
  Pre-crisis baseline event documenting SideCopy's pre-Pahalgam
  operational tempo. Useful for tempo-comparison with the
  post-attack Pahalgam / Sindoor cycle event; together the
  pair documents the Pakistani-aligned cluster's behavior across
  a single bilateral crisis cycle. SideWinder-mimicry tradecraft
  raises false-flag risk per the cluster's canonical pattern.
