        - "Actor mission: SideCopy is the canonical Pakistan-linked Indian-defence-espionage cluster ('suspected to be a sub-cluster within Transparent Tribe (aka APT36)', active since 2019)."
        - "Timing: the campaign runs from late December 2024 through Q1 2025, the pre-crisis run-up to the 22 April 2025 Pahalgam attack — the crisis-linked activity pattern the doctrine encodes."
      ruled_out: "Kashmir-political / dissident-collection pillar — no journalist, dissident, hack-and-leak, or political-influence component; the target set is defence plus civilian critical-infrastructure ministries (railways, oil & gas, external affairs), i.e. intelligence collection rather than political coercion."
