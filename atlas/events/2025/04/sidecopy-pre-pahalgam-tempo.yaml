      campaign also broadened into civilian critical sectors
      (railways, oil & gas, external affairs), which is wider than
      pure military-collection but does not displace the defence core
      that anchors the pillar. Not attested: neither cited source
      states a strategic-goal sentence or names a Pakistani service,
      so the WHY is an AUSPEX inference.
