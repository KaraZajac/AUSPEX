    reasoning: |
      SideCopy's defence-sector core — a 13 January 2025 National
      Defence College ("NDC 65") spear-phish plus a January-2025
      honeytrap, both aimed at the Indian defence establishment (the
      NDC "operates under the Ministry of Defence, India") — is
      canonical Pakistani-asymmetric military-collection pillar
      behaviour, and the campaign establishes the pre-crisis baseline
