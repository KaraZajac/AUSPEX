id: 2025-04/sidecopy-pre-pahalgam-tempo
name: SideCopy pre-Pahalgam target expansion and Indian defense-sector campaign (late 2024 to early 2025)
start_date: 2024-12-01
disclosure_date: 2025-04-08
end_date: 2025-04-22
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Seqrite Labs' 2025-04-08 report "Goodbye HTA, Hello MSI"
  documented that the Pakistan-linked SideCopy APT group had
  "significantly evolved its tactics since late December 2024,
  expanding its targets to include critical sectors such as
  railways, oil & gas, and external affairs ministries" while
  continuing to target the Indian defence establishment. The
  defence strand began with a 13 January 2025 spear-phishing email
  themed "Update schedule for NDC 65 as discussed," carrying a
  National Defence College decoy (the NDC "operates under the
  Ministry of Defence, India"), alongside a January-2025 honeytrap
  lure. The cluster shifted its primary staging from HTA to MSI
  packages and deployed a newly identified custom CurlBack RAT
  together with a Golang SparkRAT variant and a customized XenoRAT.
  The Hacker News (2025-04-14) relayed Seqrite's assessment that
  "SideCopy is suspected to be a sub-cluster within Transparent
  Tribe (aka APT36) that's active since at least 2019." This
  late-2024 / early-2025 activity is the pre-crisis baseline
  against which the post-Pahalgam-attack cluster activity (companion
  AUSPEX event 2025-05/apt36-pahalgam-operation-sindoor-tempo) is
  compared.
false_flag_risk: none
summary: |
  Pre-crisis baseline event documenting SideCopy's Indian
  defence-sector campaign and target expansion in the run-up to the
  22 April 2025 Pahalgam attack. Paired for tempo-comparison with
  the post-attack Pahalgam / Operation Sindoor cycle event
  (2025-05/apt36-pahalgam-operation-sindoor-tempo); together the
  pair tracks the Pakistani-aligned cluster's behaviour across a
  single bilateral crisis cycle. Attribution to SideCopy and the
  Pakistan nexus is vendor-assessed (Seqrite Labs, relayed by The
  Hacker News) via the Transparent Tribe / APT36 association — no
  Pakistani intelligence service (ISI) is named in either cited
  source, consistent with the actor's pk/unscoped placement.
