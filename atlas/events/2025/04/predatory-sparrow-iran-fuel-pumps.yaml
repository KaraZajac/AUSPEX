initial_vector: unknown
outcome_summary: |
  Following Israeli kinetic strikes against Iran in early 2025 and
  Iranian retaliatory missile attacks, Predatory Sparrow claimed
  responsibility for disruption of Iranian fuel-distribution
  infrastructure including refueling-station payment systems.
  The operation echoed the December 2023 fuel-distribution
  disruption claimed by the same persona and reinforced the
  cluster's signature pattern: high-visibility civilian-
  infrastructure disruption with anti-regime messaging.
false_flag_risk: confirmed
campaign_id: predatory-sparrow-iran-coercion
summary: |
  Sequel operation in the Predatory Sparrow signature pattern.
  The cluster's Israel-aligned attribution is widely held but
  the persona itself disclaims state affiliation. Italian and
  Israeli press reporting on the 2025 fuel-pump operation
  confirmed the operational continuity and the Israeli-aligned
  false-flag positioning Iran has consistently asserted.
  No actor in our atlas is publicly named as the operator;
  attribution remains at the persona level only.
