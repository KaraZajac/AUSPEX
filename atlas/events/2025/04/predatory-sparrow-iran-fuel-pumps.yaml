id: 2025-04/predatory-sparrow-iran-fuel-pumps
name: Predatory Sparrow renewed Iranian fuel-pump disruption operations (post-strike retaliatory cycle)
start_date: 2025-03-15
disclosure_date: 2025-04-22
end_date: 2025-04-22
incident_type:
  - disruption
