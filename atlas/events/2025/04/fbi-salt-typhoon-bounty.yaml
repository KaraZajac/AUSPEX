  notes: |
    Audited vs RAW. Counter-action (US law-enforcement bounty on the
    Salt Typhoon cluster); NOT a phantom — the cited FBI/IC3 PSA is the
    real article. Two cited sources, both snapshotted + hashed:
      • FBI/IC3 PSA "FBI Seeking Tips about PRC-Targeting of US
        Telecommunications", Alert I-042425-2-PSA, 2025-04-24 — raw
        fbi__2025-04_rewards-for-justice-salt-typhoon.html, 5,134 bytes,
        sha256 0cda87b6…69052d39 (freshly captured, HTTP 200).
      • Treasury/OFAC jy2792 (2025-01-17) — raw
        treasury__2025-01-17_salt-typhoon-sichuan-juxinhe.html, 124,947
        bytes, sha256 7c2cfe78…93652451 (pre-existing snapshot,
        hash RE-VERIFIED identical). ADDED to sources[] this audit to
        carry the MSS-alignment + telecom/ISP-exploitation claims and the
        "complement to the Jan-2025 sanctions" framing.

    [a] FACTS — carried by the FBI PSA (verbatim): FBI asks the public to
    report info on "PRC-affiliated activity publicly tracked as 'Salt
    Typhoon' and the compromise of multiple US telecommunications
    companies"; "theft of call data logs, a limited number of private
    communications involving identified victims, and the copying of select
    information subject to court-ordered US law enforcement requests" (=
    the CALEA/lawful-intercept access the NB asked me to verify — CONFIRMED
    at nation/PSA level, though the PSA does not use the word CALEA);
    "broad and significant cyber campaign … on a global scale". The reward
    sentence carried verbatim: "the U.S. Department of State's Rewards for
    Justice (RFJ) program is offering a reward of up to $10 million (USD)
    for information about foreign government-linked individuals
    participating in certain malicious cyber activities against US critical
    infrastructure in violation of the … CFAA". CORRECTIONS: (1) the reward
    is the STANDING RFJ critical-infrastructure/CFAA reward invoked in the
    Salt Typhoon context, NOT a dedicated "$10M bounty on Salt Typhoon
    operators" — name + outcome_summary + summary reworded to stop
    over-claiming a bespoke bounty (prior outcome said "for information
    leading to the identification or location of Salt Typhoon cyber
    operators", which the source does not say). (2) STRIPPED the unsourced
    tradecraft catalogue that neither cited source carries — "living off
    the land using built-in Windows and Cisco IOS tooling", "exploitation
    of unpatched network-edge appliances", "valid credentials harvested
    from telecom NOC environments", "custom router implants (including the
    JumbledPath toolkit)", and "selective lawful-intercept-portal abuse to
    surveil US officials and political-campaign targets". These are real
    but live in the actor record + Cisco Talos/CISA reporting; JumbledPath
    is not even in the actor record. (3) STRIPPED the specific carrier list
    "(AT&T, Verizon, T-Mobile, Lumen)" — grep of the FBI raw AND the
    Treasury raw returns ZERO carrier names; generalized to "multiple US
    telecommunications companies" (FBI wording). (4) DROPPED the hard
    "2023-2024" compromise window (not stated by either cited source).
    Directionality verified: US telecoms are VICTIMS of the subject op;
    the bounty is a US counter-action → actor_id null, targets []
    (the telecom-victim events live elsewhere, e.g.
    2024-09/salt-typhoon-us-telecom-compromise).

    [b] ATTRIBUTION — actor_id null retained (counter-action). Single
    entry rewritten: attributing_org "US FBI (IC3) / Department of State
    (Rewards for Justice)" (was "FBI Rewards for Justice", which conflated
    the two bodies — the PSA is an FBI/IC3 notice pointing to State's RFJ);
    high/concur retained (FBI states the PRC affiliation plainly).
    attribution_level SET = named-actor: the FBI PSA names the nation (PRC)
    + the cluster ("Salt Typhoon") but NO service. The MSS (named-unit)
    tie is carried by the corroborating OFAC source (Sichuan Juxinhe →
    "The MSS has maintained strong ties with … Sichuan Juxinhe") rather
    than by a duplicated second attribution entry, to avoid conflating this
    April bounty with the distinct Jan-2025 sanctions event.

    [c] DATES — CORRECTED start_date/disclosure_date/attribution_date
    2025-04-01 (flagged "approximate") → 2025-04-24, the actual PSA date
    (Alert I-042425-2-PSA, <time datetime="2025-04-24">). end_date null
