false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Bounty event. Modeled in the atlas because it operationalizes
  the Disrupt-and-Dismantle posture by attempting to convert
  anonymity cost into financial incentive for informants against
  the Salt Typhoon cluster — the MSS-aligned PRC actor responsible
  for the 2023-2024 compromise of US telecom carriers (AT&T,
  Verizon, T-Mobile, Lumen) and the CALEA lawful-intercept
  infrastructure. Salt Typhoon tradecraft documented across CISA /
  FBI / NSA reporting includes living off the land using built-
  in Windows and Cisco IOS tooling, exploitation of unpatched
  network-edge appliances, valid credentials harvested from
  telecom NOC environments, custom router implants (including the
  JumbledPath toolkit), and selective lawful-intercept-portal
  abuse to surveil US officials and political-campaign targets.
