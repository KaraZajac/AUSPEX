id: 2025-04/fbi-salt-typhoon-bounty
name: "FBI IC3 tip-seeking PSA + State Dept Rewards for Justice $10M critical-infrastructure reward (Salt Typhoon)"
start_date: 2025-04-24  # FBI/IC3 PSA Alert I-042425-2-PSA
disclosure_date: 2025-04-24
end_date: null  # standing RFJ reward / open tip request
incident_type:
  - law-enforcement  # FBI seeking-tips PSA + State Dept RFJ reward (US cost-imposition counter-action)
initial_vector: unknown
outcome_summary: |
  FBI/IC3 public service announcement (Alert I-042425-2-PSA, 2025-04-24)
  asking the public for tips on the individuals behind PRC-affiliated
  "Salt Typhoon" and its compromise of multiple US telecommunications
  companies. The notice points to the US Department of State's Rewards
  for Justice reward of up to USD 10M for information on
  foreign-government-linked actors conducting malicious cyber activity
  against US critical infrastructure in violation of the CFAA — the
  standing RFJ critical-infrastructure reward invoked in the Salt Typhoon
  context, not a dedicated Salt-Typhoon bounty. A cost-imposition
  complement to the January 2025 Treasury/OFAC sanctions on the Salt
  Typhoon operating company (Sichuan Juxinhe).
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Counter-action (US law-enforcement cost imposition), not a cyber
  operation — modeled in the atlas because it operationalizes the
  Disrupt-and-Dismantle posture by converting operator anonymity into a
  financial incentive for informants against the Salt Typhoon cluster.
  Per the FBI/IC3 PSA, Salt Typhoon is PRC-affiliated activity whose
  compromise of multiple US telecommunications companies enabled theft
  of call-data logs, "a limited number of private communications
  involving identified victims", and copying of "select information
  subject to court-ordered US law enforcement requests" (i.e. CALEA
  lawful-intercept material) at global scale. The January 2025
  Treasury/OFAC designation attributes the operating company (Sichuan
  Juxinhe) to the PRC Ministry of State Security, citing "direct
  involvement in the exploitation of these U.S. telecommunication and
  internet service provider companies". (The subject actor's detailed
  tradecraft and the specific carrier victims are documented in the
  cn/mss/salt-typhoon actor record and its sources, not in this
  counter-action's cited documents.)
