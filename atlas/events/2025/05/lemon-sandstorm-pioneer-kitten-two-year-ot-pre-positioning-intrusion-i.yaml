  FortiGuard's incident-response team disclosed (May 2025) a multi-year Iranian state-sponsored intrusion into a Middle Eastern critical-national-infrastructure entity, active May 2023 to February 2025 (traces to 2021). Initial access via stolen SSL-VPN credentials; the actor deployed custom backdoors HanifNet, HXLibrary, NeoExpressRAT and Havoc, performed extensive lateral movement and targeted reconnaissance/credential harvesting against the OT environment with little data exfiltration, consistent with pre-positioning for a future destructive attack. The Fortinet blog itself attributes only to 'an Iranian state-sponsored threat group'; secondary reporting (The Hacker News, Dark Reading) maps this to Lemon Sandstorm = Pioneer Kitten / Fox Kitten / UNC757, hence strongly_inferred and mapped to the existing Pioneer Kitten actor_id. Distinct OT pre-positioning op not in the inventory.
