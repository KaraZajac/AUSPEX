id: 2025-05/lemon-sandstorm-pioneer-kitten-two-year-ot-pre-positioning-intrusion-i
name: "Lemon Sandstorm / Pioneer Kitten two-year OT pre-positioning intrusion into Middle East CNI"
start_date: 2023-05-01
end_date: 2025-02-01
disclosure_date: 2025-05-01
incident_type:
  - pre-positioning
  - espionage
  - intrusion
  - reconnaissance
initial_vector: valid-creds
false_flag_risk: none
summary: |
  FortiGuard's incident-response (FGIR) team disclosed (1 May 2025) a long-term Iranian state-sponsored intrusion into a Middle Eastern critical-national-infrastructure (CNI) entity, which persisted "from at least May 2023 to February 2025, with signs of compromise dating back as far as May 2021." Initial access was via stolen SSL-VPN credentials; the adversary deployed novel backdoors HanifNet, HXLibrary and NeoExpressRAT alongside Havoc/SystemBC, chained open-source proxies (plink, Ngrok, glider, ReverseSocks5) to bypass network segmentation, exfiltrated targeted email data, and conducted targeted reconnaissance and credential harvesting against the victim's restricted Operational-Technology (OT) environment — "no confirmed disruption to OT systems was found" but FGIR assessed "strong adversary interest in these systems," consistent with suspected network pre-positioning "for future strategic advantage." The Fortinet blog itself attributes only to "an Iranian state-sponsored threat group" (a nation-level attribution; it names neither the IRGC nor any specific actor); secondary reporting (The Hacker News, Dark Reading) maps this campaign to Lemon Sandstorm = Pioneer Kitten / Fox Kitten / UNC757, hence strongly_inferred and mapped to the existing Pioneer Kitten actor_id. Distinct OT pre-positioning op not otherwise in the inventory.
