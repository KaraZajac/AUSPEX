    strongly_inferred). (4) summary tightened to the source's exact wording (incl. that email data WAS
    exfiltrated). doctrine_link ir/asymmetric-warfare/civilian-cii-coercion kept at strongly_inferred /
    attesting_source_id: null — Fortinet states "future strategic advantage," not civilian-CII coercion,
    so NOT attested (correct, not over-attested). actor_id ir/unscoped/pioneer-kitten resolves and is
    current (matches the 2026-06-24 IRGC->unscoped demotion); not stale. ACTOR NOTE: the actor's IRGC
