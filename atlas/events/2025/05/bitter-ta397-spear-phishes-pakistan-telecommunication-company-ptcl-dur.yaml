summary: |
  EclecticIQ reported that on 7 May 2025, amid the India-Pakistan military escalation of India's Operation Sindoor, Bitter APT (TA397) very likely targeted Pakistan Telecommunication Company Limited (PTCL) staff in critical roles (5G engineers, DevOps, satcom experts) with a spear-phishing campaign delivering WmRAT via an IQY/Excel-macro chain, using credentials of Pakistan's Counter Terrorism Department compromised since August 2024 via StealC. A clean conflict-timed example of an India-aligned actor striking Pakistani critical infrastructure. EclecticIQ calls Bitter a "South Asian state-sponsored actor" (not explicitly India) but Proofpoint independently ties TA397 to Indian state interests, so India-nexus is strongly_inferred. New actor; not in inventory.
