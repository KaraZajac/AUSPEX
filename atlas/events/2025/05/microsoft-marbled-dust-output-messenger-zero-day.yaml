id: 2025-05/microsoft-marbled-dust-output-messenger-zero-day
name: Microsoft discloses Marbled Dust zero-day exploitation of Output Messenger against Iraqi Kurdish military
start_date: 2024-04-01
disclosure_date: 2025-05-12
end_date: null
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: 0-day
outcome_summary: |
  Microsoft Threat Intelligence disclosed that Marbled Dust
  (which Microsoft says overlaps with the clusters other vendors
  track as Sea Turtle and UNC1326) has, since April 2024, been
  exploiting CVE-2025-27920 — a directory-traversal zero-day in
  the Srimax Output Messenger messaging product — against user
  accounts that had not applied the fix. Microsoft assesses with
  high confidence that the targeted accounts are associated with
  the Kurdish military operating in Iraq, and states the
  exploitation "resulted in collection of related user data from
  targets in Iraq." The cluster dropped GoLang backdoors
  (OMServerService.exe / OMClientService.exe, C2
  api.wordinfos[.]com) onto compromised Output Messenger servers
  and exfiltrated user data. Microsoft frames the zero-day use as
  a notable shift in Marbled Dust's capability and an increase in
  technical sophistication over the cluster's prior pattern of
  exploiting known (n-day) vulnerabilities in internet-facing
  appliances and using DNS hijacking. Microsoft also identified a
  second Output Messenger vulnerability (CVE-2025-27921) but did
  not observe it being exploited.
false_flag_risk: none
summary: |
  Operationally significant Marbled Dust escalation. In
  Microsoft's own framing the zero-day use is a notable shift in
  the cluster's capability and a rise in technical sophistication,
  and it confirms continued operational tasking against
  Kurdish-military targets in Iraq. The April-2024 exploitation
  start substantially predates the May-2025 public disclosure — a
  roughly 13-month window of undisclosed exploitation before
  Microsoft notified Srimax and the patch issued. On attribution,
  Microsoft assesses that Marbled Dust operates as a
  Türkiye-affiliated espionage actor (a nation-level affiliation;
  no specific Turkish service is named — hence the actor is carried
  as tr/unscoped/sea-turtle) and separately assesses with high
  confidence that the compromised accounts belong to the Kurdish
  military operating in Iraq. The explicit "high confidence"
  qualifier in the source attaches to that Kurdish-military target
  association, not to the nation-level Türkiye affiliation, which
  Microsoft states as an established assessment.
attributions:
  - actor_id: tr/unscoped/sea-turtle
    attributing_org: Microsoft Threat Intelligence
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2025-05-12
    attribution_source_id: msft/2025-05-12_marbled-dust-output-messenger-zero-day
    notes: |
      Microsoft: "Marbled Dust operates as a Türkiye-affiliated
      espionage threat actor" and "Marbled Dust overlaps with
      activity tracked by other security vendors as Sea Turtle and
      UNC1326." Nation named (Türkiye); no Turkish service named —
      hence named-actor (not named-unit) and actor tr/unscoped. The
      source's explicit "high confidence" attaches to the target
      association ("the targets of the attack are associated with
      the Kurdish military operating in Iraq"); the Türkiye
      affiliation is stated as an established assessment without an
      explicit confidence adverb. The only "moderate confidence"
      hedge in the report concerns recon / vector-selection
      methodology, not the attribution.
