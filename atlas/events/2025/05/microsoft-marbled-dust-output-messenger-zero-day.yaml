        - "Microsoft frames Marbled Dust as targeting organizations that likely represent counter interests to the Turkish government."
        - "A Türkiye-affiliated espionage actor collecting on the Kurdish military in Iraq is the victim class the counter-Gülen / counter-Kurdish diaspora-surveillance pillar encodes (Kurdish opposition, the KRG in Iraq, PYD-aligned orgs)."
        - "Target and TTP continuity with the earlier Sea Turtle / Marbled Dust targeting of Kurdish-region infrastructure that the doctrine cites as its canonical cyber exemplar."
      ruled_out: "Generic or opportunistic espionage with no specifically counter-Kurdish character, rejected because the victim set is specifically the Kurdish military in Iraq (the pillar's defining victim class) rather than a broad or unrelated set, and Microsoft ties the targeting to counter-interests of the Turkish government."
