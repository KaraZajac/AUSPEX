id: 2025-05/microsoft-marbled-dust-output-messenger-zero-day
name: Microsoft discloses Marbled Dust zero-day exploitation of Output Messenger against Iraqi Kurdish military
start_date: 2024-04-01
disclosure_date: 2025-05-12
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: 0-day
outcome_summary: |
  Microsoft Threat Intelligence disclosed that Marbled Dust
  (Sea Turtle / Teal Kurma / Cosmic Wolf / UNC1326) has been
  exploiting CVE-2025-27920, a directory-traversal zero-day in
  the Srimax Output Messenger LAN messaging product, since
  April 2024. Microsoft assesses with high confidence that the
  targeted accounts are associated with the Kurdish military
  operating in Iraq. The cluster used the vulnerability to
  drop Golang backdoors on compromised Output Messenger servers
  and harvest user data from the messaging product, marking the
  first publicly documented Marbled Dust use of a zero-day —
  a meaningful tradecraft escalation from the cluster's prior
  n-day-and-DNS-hijacking pattern.
false_flag_risk: none
summary: |
  Operationally significant Marbled Dust escalation. The Output
  Messenger zero-day puts the cluster in the same
  zero-day-capable tier as the more frequently noted Iranian
  and Chinese state-aligned actors and confirms continued
  operational tasking against Iraqi-Kurdish military targets.
  The April-2024 exploitation start substantially predates the
  May-2025 public disclosure, consistent with state-protected
  zero-day operational lifecycle. Microsoft attributes with
  high confidence and explicitly names Türkiye as the affiliated
  nation-state — unusual precision for a Microsoft attribution
  and consistent with the well-developed victim-set evidence.
