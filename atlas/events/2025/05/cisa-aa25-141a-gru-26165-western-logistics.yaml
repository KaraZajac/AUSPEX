id: 2025-05/cisa-aa25-141a-gru-26165-western-logistics
name: CISA AA25-141A — GRU Unit 26165 targets Western logistics and tech firms supporting Ukraine
start_date: 2022-02-24  # advisory: "Since 2022" / unit-26165 op uptick "In late February 2022"; anchored to the 2022-02-24 invasion
disclosure_date: 2025-05-21
end_date: null
incident_type:
  - intrusion
  - data-theft
