initial_vector: phishing
outcome_summary: |
  A joint advisory (AA25-141A) by CISA, NSA, FBI and 18 partner
  agencies across 11 NATO/allied states (US, UK, DE, CZ, PL, AU,
  CA, DK, EE, FR, NL) documented a sustained GRU Unit 26165
  (APT28 / Forest Blizzard) campaign — running since 2022 —
  against
  Western logistics entities and technology companies involved
  in coordination, transport, and delivery of foreign assistance
  to Ukraine. Tradecraft includes spearphishing, credential
  harvesting, n-day exploitation, DLL search-order hijacking,
  and IP-camera reconnaissance against logistics nodes in Ukraine
  and bordering NATO states. The advisory frames the campaign as
  ongoing and elevated-risk for any organisation handling
  Ukraine-aid logistics.
false_flag_risk: none
campaign_id: gru-26165-western-logistics
summary: |
  The most consequential GRU 26165 disclosure since the 2018
  WADA / 2016 DNC framings. Pairs operationally with the
  July 2025 NCSC Authentic Antics attribution and the UK FCDO
  sanctions on three GRU units. Doctrinally a clean attestation
  of the Ukraine-support-interdiction pillar — Western firms are
  being targeted *because* they support Ukraine, not as
  collateral.
