outcome_summary: |
  US DOJ-led multinational operation seizing four BlackSuit /
  Royal command-and-control servers and approximately USD 1.5M
  in cryptocurrency. Operation conducted with FBI / Europol / UK
  NCA / German BKA / French Gendarmerie partners. Three Conti-
  lineage operators identified in unsealed indictments. Decryptors
  released for ~250 prior victims.
false_flag_risk: none
summary: |
  Continuation of the post-Cronos / post-Hive / post-Endgame
  pattern of staged ransomware-brand disruptions. The Conti-
  lineage cluster (Conti → Black Basta / Royal / BlackByte /
  Karakurt) has now been targeted in successive 2024–25
  operations.
