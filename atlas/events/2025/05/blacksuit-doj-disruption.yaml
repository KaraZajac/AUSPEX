id: 2025-05/blacksuit-doj-disruption
name: BlackSuit (Royal) ransomware infrastructure seizure (Operation Checkmate)
start_date: 2025-07-24
disclosure_date: 2025-07-24
end_date: 2025-08-11
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown
outcome_summary: |
  International law-enforcement operation (codenamed Operation
  Checkmate) that on 2025-07-24 seized four servers and nine domains
  used by the BlackSuit (Royal) ransomware group to leak stolen data
  and negotiate ransoms. Led by DHS Homeland Security Investigations
  (HSI) with the US Secret Service, IRS-CI and FBI, and international
  partners — UK NCA, Germany's LKA Niedersachsen, Ireland's An Garda
  Siochana, France's Office Anti-Cybercriminalite, Canada's RCMP,
  Ukraine and Lithuania (Europol and Bitdefender assisted). On
  2025-08-11 the DOJ announced the operation and the unsealing of a
  warrant seizing ~USD 1.09M ($1,091,453) in laundered cryptocurrency
  traced from a 2023 victim ransom. No arrests or operator indictments
  were announced.
false_flag_risk: none
summary: |
  BlackSuit is the mid-2023 rebrand of Royal ransomware (the DOJ names
  the group "BlackSuit (Royal)"; per an August 2024 CISA update the
  group had demanded over USD 500M from victims). Operation Checkmate
  disrupted the group's extortion infrastructure — its dark-web
  data-leak blogs and victim-negotiation sites — one of a series of
  2023-25 US-led disruptions of post-Conti ransomware brands (Hive,
  LockBit / Operation Cronos, Operation Endgame). The action was a
  disruption rather than a dismantlement: no operators were arrested or
  charged, and Cisco Talos subsequently assessed with moderate
  confidence that a successor group ("Chaos") was formed by former
  BlackSuit members.
