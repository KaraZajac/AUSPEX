initial_vector: phishing
outcome_summary: |
  Following the April 22 2025 Pahalgam attack and India's
  subsequent May 2025 Operation Sindoor strikes, Cyfirma's
  consolidated India-Pakistan crisis write-up (published
  2025-06-05) recorded that APT36 / Transparent Tribe "was also
  active" during the cycle and assessed that it used Crimson RAT
  to target Indian infrastructure. The same report described
  SideCopy and APT36 jointly running cyber-espionage campaigns
  with weaponized PDF and macro-laden Microsoft Office documents
  that deploy RATs, ELF/Linux implants, and Mythic C2. Associated
  indicators include Pahalgam-themed lure documents ("... Regarding
  Pahalgam Terror Attack.pdf", "Army_Job_Application_Form.pdf")
  and credential-phishing domains spoofing Indian government and
  military services (email.gov.in, indianarmy.nic.in, iaf.nic.in,
  and Ministry-of-Defence / DRDO look-alikes). The cited source
  does NOT quantify an APT36 operational-tempo spike — its surge /
  "100-fold" escalation metrics describe hacktivist DDoS and
  defacement activity, not APT36 — so this event is hedged to the
  espionage activity the source actually attributes to the cluster.
false_flag_risk: none
summary: |
  Pakistani-side companion to the SideWinder Pahalgam event. The
  April-May 2025 India-Pakistan cycle was the most acute bilateral
  military escalation since Balakot 2019, and the canonical
  Pakistani-aligned cluster APT36 / Transparent Tribe was observed
  active against Indian government and defense targets during it —
  a data point consistent with the AUSPEX hypothesis that
  Indian-Pakistani APT activity tracks bilateral crisis cycles.
  NB (2026-07-05 audit): the sole cited source (Cyfirma) documents
  APT36 activity during the crisis but does NOT assert a quantified
  operational-tempo elevation for the cluster; the unsourced "tempo
  spike" framing has been removed.
