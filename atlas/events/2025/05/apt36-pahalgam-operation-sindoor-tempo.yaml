qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: full
  notes: |
    Audited vs Cyfirma "Firewalls and Frontlines: The India-Pakistan
    Cyber Battlefield Crisis" (.../research/firewalls-and-frontlines-
    the-india-pakistan-cyber-battlefield-crisis/); raw snapshot
    captured (sha256 e019bb14…3bfc293e, 130322 bytes). NOT a phantom —
    the URL returns the real article (title + Pahalgam / Sindoor /
    Crimson-RAT / Transparent-Tribe body all present).

    [a] FACTS — heavy over-read STRIPPED. (1) "multiple vendors and
    Indian CERT communications documented …": the event carries ONE
    secondary source (Cyfirma), and CERT-In appears in the article only
    as a *hacktivist DDoS target* ("CERT-In, NCIIPC, C-DAC, IPS
    portals"), never as a documenting source — the "multiple vendors /
    CERT" claim was fabricated and is removed. (2) "operational tempo
    elevation" / "tempo spike": the token "tempo" never occurs in the
    source in an operational sense (only "temporary/temporarily"); the
    surge / "100-fold" / escalation language all describes NON-STATE
    hacktivist DDoS, not APT36 — reframed to the espionage activity
    actually attributed to the cluster, added explicit NB hedges to
    outcome_summary + summary, and softened the name. (3) "CapraRAT
    Android tooling reported in some intrusion sets": "CapraRAT" appears
    ZERO times in the source (only one generic "Live War Updates
    App.apk" IOC) — removed as uncarried. (4) Crimson RAT: RETAINED but
    hedged to source wording — verbatim "Analysts suggest it used more
    sophisticated malware (Crimson RAT) to target Indian infrastructure"
    (generic target, not the fabricated Army/AF/MoD-specific delivery).
    (5) Office-macro / PDF / ELF / Mythic arsenal: RETAINED — "SideCopy
    and APT36 … weaponized PDF documents … Microsoft Office files
    embedded with macro-based malware deploy RATs … ELF binaries
    targeting Linux systems … Mythic … C2" (Malware section). No CVE in
    the event; the source's only CVE (CVE-2024-4577) is a hacktivist
    web-defacement vector, not APT36 — not imported.

    [b] ATTRIBUTION — attributing_org "vendor-consensus" → "Cyfirma"
    (one source, no consensus); confidence high → moderate (single
    secondary OSINT aggregator that hedges APT36's role);
    auspex_assessment concur → concur-with-caveat; added attribution
    notes. Source directly names "Pakistan-linked threat actors SideCopy
    and APT36 (also known as Transparent Tribe)" and "APT36 (aka
    Transparent Tribe) … historically associated with Pakistan" — nation
    + named group, no ISI/service (matches actor pk/unscoped).

    [c] DATES — source published_on 2025-06-05 CONFIRMED verbatim
    ("Published On : 2025-06-05"); disclosure_date + attribution_date
    2025-06-05 match. start_date 2025-04-22 = the Pahalgam attack ("On
    April 22, 2025, a militant attack on tourists in Pahalgam"). Fixed
    the source `title` (was the paraphrase "APT36 tempo elevation…"; now
    the real article title) and bumped its retrieved_on to the 2026-07-05
    snapshot date. The slug's 2025-05-15 is a stable editorial mid-crisis
    date, left as-is.

    [d] DOCTRINE — kept pk/asymmetric-posture-india/military-collection
    at strongly_inferred (NOT attested: no strategic-goal sentence, no
    service named). Rewrote reasoning to drop the unsourced "tempo
    elevation" and ground the WHY in the source's IOC phishing domains
    spoofing indianarmy.nic.in / iaf.nic.in / MoD / DRDO plus military-
    themed lures; added inference_basis.signals[] + ruled_out (ruled out
    the kashmir-political pillar — no dissident / political / hack-and-
    leak component). attacker-rationale (pk doctrine on pk op), state-
    consistent → no perspective tag.

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): source names
    the group (APT36 / Transparent Tribe) + nation (Pakistan), not a unit.

    [f] ACTOR — actor_id pk/unscoped/transparent-tribe RESOLVES to
    atlas/actors/pk/transparent-tribe.yaml (file sits at pk/ but its id
    is pk/unscoped/…; FK resolves by id). Actor audited 2026-06-24
    (Pakistan / unscoped, no service named) — consistent. No actor edit.

    TARGETS — orgs/indian-army and orgs/indian-air-force were BOTH
    dangling FKs (no such registry files — a corpus-wide defect already
    removed once in 2023-09/zscaler-apt36-updated-arsenal) AND, in the
    source prose, "Indian Army, Navy, and Air Force domains" + "The
    Ministry of Defense" are named as *hacktivist DDoS* targets, not
    APT36's. Replaced with the resolving orgs/indian-armed-forces
    (Army+Navy+AF) and kept orgs/indian-mod — both grounded in the
    APT36 / SideCopy IOC phishing-domain block (indianarmy.nic.in,
    iaf.nic.in, ministryofdefenceindia.org / modindia.link look-alikes),
    i.e. the intended victims of the credential phishing (one inferential
    step from infra to org, standard for phishing-spoof targets). Did not
    inflate with extra sectors.

    incident_type — added espionage (source: "sophisticated cyber
    espionage campaigns"); kept intrusion + data-theft (Mythic C2
    "persistent network access", "data exfiltration operations").
    initial_vector phishing kept (credential phishing + macro Office/PDF).

    SOURCE — tier secondary kept (OSINT aggregation, not first-party
    discovery); raw_snapshot + content_sha256 added.

    RESIDUAL / FLAGS: (1) The source co-mingles APT36 with SideCopy in
    the malware / IOC section and does not cleanly separate which IOCs
    are APT36 vs SideCopy — the org-level targeting is a reasonable but
    joint-cluster inference. (2) orgs/indian-army and orgs/indian-air-
    force are dangling target-registry FKs now referenced nowhere else —
    safe to consider retired (flagged for orchestrator). (3) A second,
    more APT36-specific Cyfirma report already exists and is snapshotted
    in the corpus (cyfirma/2025-06_apt36-nickavach-credential-phishing-
    camp) — an available corroborator Kara could add as a second source
    to lift this off a single-source footing; left uncited to keep this
    audit to the one cited source. (4) Level full: snapshot captured, all
    retained claims source-carried.
