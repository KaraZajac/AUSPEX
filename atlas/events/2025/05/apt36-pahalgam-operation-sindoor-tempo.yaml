id: 2025-05/apt36-pahalgam-operation-sindoor-tempo
name: Transparent Tribe operational tempo elevation during Pahalgam / Operation Sindoor cycle
start_date: 2025-04-22
disclosure_date: 2025-06-05
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Following the April 22 2025 Pahalgam attack and the May 2025
  Operation Sindoor Indian strikes, multiple vendors and Indian
  CERT communications documented Transparent Tribe operational
  tempo elevation against Indian Army, Indian Air Force, and
  Indian Ministry of Defence targets. Lures themed on post-
  Pahalgam government communications, defense-ministry crisis
  cables, and Operation Sindoor reporting. Tradecraft remained
  consistent with the cluster's pre-2025 fingerprint — Crimson
  RAT delivery via weaponized Office documents — with adjunct
  CapraRAT Android tooling reported in some intrusion sets.
false_flag_risk: none
summary: |
  Companion event to the SideWinder Pahalgam tempo-spike, on the
  Pakistani-side. The April-May 2025 India-Pakistan cycle is the
  most acute since Balakot 2019; both sides' canonical APT
  clusters showed tempo elevation, consistent with the broader
  AUSPEX hypothesis that Indian-Pakistani APT operational tempo
  tracks bilateral crisis cycles.
