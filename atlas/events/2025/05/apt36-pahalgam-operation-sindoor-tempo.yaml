id: 2025-05/apt36-pahalgam-operation-sindoor-tempo
name: Transparent Tribe / APT36 activity during the Pahalgam / Operation Sindoor crisis cycle
start_date: 2025-04-22
disclosure_date: 2025-06-05
end_date: null
incident_type:
  - intrusion
