id: 2025-05/adidas-shinyhunters-salesforce
name: Adidas customer-contact data theft via Salesforce vishing chain
start_date: 2025-04-01
disclosure_date: 2025-05-27
end_date: 2025-05-31
incident_type:
  - data-theft
initial_vector: phishing  # via UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  On May 27 2025 Adidas disclosed that customer contact data
  had been stolen via an unauthorized intrusion into a
  third-party customer-service provider. Exposed fields
  included names, email addresses, phone numbers, dates of
  birth, and addresses; no payment-card or password data.
  Subsequent Google Threat Intelligence Group reporting and
  October 2025 Krebs on Security coverage attributed the
  intrusion to the UNC6040 / ShinyHunters voice-phishing /
  Salesforce-OAuth campaign. First publicly-disclosed major
  victim of the 2025 campaign.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 Salesforce-cloud
  campaign umbrella. ShinyHunters-brand attribution per GTIG
  cluster identification rather than direct-claim evidence.
