id: 2025-05/adidas-shinyhunters-salesforce
name: Adidas customer-contact data theft via Salesforce vishing chain
start_date: 2025-04-01
disclosure_date: 2025-05-23
end_date: 2025-05-23
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: phishing  # campaign-inferred: UNC6040 vishing → Salesforce OAuth (not confirmed by adidas)
outcome_summary: |
  On 23 May 2025 adidas published a breach notice stating that
  "an unauthorized external party obtained certain consumer data
  through a third-party customer service provider." adidas
  characterized the affected data only as "contact information
  relating to consumers who had contacted our customer service
  help desk in the past" and stated it did "not contain passwords,
  credit card or any other payment-related information";
  contemporaneous reporting characterized the exposed fields as
  customer names, email addresses and phone numbers. adidas named
  neither the third-party provider, the data volume, the intrusion
  date, nor any threat actor. The breach was subsequently placed by
  security-industry reporting within the 2025 UNC6040 / ShinyHunters
  voice-phishing Salesforce-OAuth campaign that Google Threat
  Intelligence Group documented on 4 June 2025 — a linkage made by
  pattern-matching (third-party customer-service provider + contact
  data + timing), not confirmed by adidas and not named by GTIG
  (whose report names no victim). Among the earliest major consumer
  brands publicly linked to the campaign.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 Salesforce-cloud campaign
  umbrella (campaign_id shinyhunters-salesforce-2025). adidas's own
  notice attributes nothing beyond a "third-party customer service
  provider"; the Salesforce / UNC6040 / ShinyHunters placement is
  security-community consensus, not a victim confirmation or a GTIG
  victim-naming. "ShinyHunters" is recorded as the extortion self-
  claim brand (GTIG tracks the clusters as UNC6040 / UNC6240), not a
  confirmed stable group — hence attribution is hedged. No Adidas-
  specific extortion demand is publicly documented (adidas was not on
  the Oct-2025 "Scattered LAPSUS$ Hunters" leak-site list); the
  extortion incident_type is inherited from the campaign chain.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: Google Threat Intelligence Group (campaign) + security-industry consensus (adidas placement)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-06-04
    attribution_source_id: mandiant/2025-06-04_unc6040-voice-phishing-data-extortion
    notes: |
      GTIG's 4 June 2025 report documents the UNC6040 vishing /
      Salesforce-OAuth campaign and the UNC6240 extortion follow-on,
      which "has consistently claimed to be the threat group
      ShinyHunters" — a self-claim GTIG reports "likely as a method
      to increase pressure," not a confidence assertion of identity.
      GTIG names NO victim (no Adidas). Placing adidas in this
      campaign is a security-press inference from adidas's own
      description (third-party customer-service provider + contact
      data), not an adidas or GTIG confirmation.
  - actor_id: criminal/scattered-spider
    attributing_org: journalism consensus
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-07
    attribution_source_id: krebs/2025-10_shinyhunters-corporate-extortion-spree
    notes: |
      Campaign-cluster-level overlap only. Krebs describes "Scattered
      LAPSUS$ Hunters" as "an amalgamation of three hacking groups —
      Scattered Spider, Lapsus$ and ShinyHunters." No Adidas-specific
      Scattered Spider evidence exists; GTIG frames the "Com" overlap
      as "plausible ... rather than indicating a direct operational
      relationship." (attribution_source_id re-pointed this audit from
      mandiant/2025-08-08, which is not among this event's sources, to
      the cited Krebs article that actually carries the amalgamation.)
    attribution_level: activity-cluster
doctrine_links: []
targets:
