  notes: "Audited vs the cited War on the Rocks article (raw captured 2026-06-24, sha256 a8efec64...d9583, re-verified). FACTS confirmed verbatim: 'Its May 2025 assessment of Storm-1516... described the group as operating from Russia, with ties to the Kremlin' and 'France's Ministry of Foreign Affairs condemned Russia's destabilizing activities alongside this disclosure'; article does NOT enumerate Storm-1516 targets (summary already states this; no targets[] added). KEY DISCRIMINATION: France names Storm-1516 (the influence actor, Russia/Kremlin-linked) here — NOT APT28. The same article reports a SEPARATE April-2025 attribution of APT28/'Fancy Bear' to Russian military intelligence (GRU); that is a different operation, correctly not this record. CORRECTIONS: (1) source published_on 2025-05-06 -> 2025-07-03 (article's actual date: JSON-LD datePublished + 'July 3, 2025' byline; the May date was the VIGINUM assessment-event date). (2) added attribution_level: named-actor (France named the specific group + tied to Russia; no GRU unit named -> not named-unit). (3) added perspective: defender-response to the doctrine link (France's own strategic-attribution doctrine on an event documenting France attributing a Russian actor's op — resolves the cross-state doctrine mismatch). Doctrine confidence kept strongly_inferred (attesting_source_id null; deliberately downgraded per audit H6 — source is secondary journalism, not the VIGINUM primary report). Actor ru/unscoped/storm-1516 FK resolves (re-homed fr->ru on 2026-06-24, consistent with MISP-galaxy country=RU); ru/unscoped service exists; no stale fr/unscoped/storm-1516 FKs remain (only historical correction notes). Doctrine fr/lutte-informatique-influence + pillar strategic-attribution FK valid."
