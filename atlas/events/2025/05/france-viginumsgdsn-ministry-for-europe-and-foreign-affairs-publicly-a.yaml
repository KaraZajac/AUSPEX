summary: |
  War on the Rocks describes France's shift toward public attribution, including a May 2025 VIGINUM assessment of the Storm-1516 information-manipulation operation that characterized the group as operating from Russia with ties to the Kremlin. The disclosure was paired with the French Ministry for Europe and Foreign Affairs condemning Russia's 'destabilizing activities.' The article situates this as part of France hardening its stance on naming Russian influence and disinformation activity. It does not enumerate Storm-1516's specific targets.
