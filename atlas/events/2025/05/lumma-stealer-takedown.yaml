id: 2025-05/lumma-stealer-takedown
name: Lumma Stealer infrastructure disrupted (DOJ + Microsoft DCU)
start_date: 2025-05-13
disclosure_date: 2025-05-21
end_date: 2025-05-21
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  Coordinated takedown of Lumma Stealer (LummaC2)
  infrastructure. Microsoft Digital Crimes Unit obtained
  court order in the Eastern District of New York for
  seizure of approximately 2,300 Lumma-associated domains;
  DOJ seized five core command-and-control domains and the
  marketplace login panels. Lumma had emerged as the leading
  post-RedLine infostealer through 2024 with ~400K
  infections in the 60 days preceding the action per
  Microsoft telemetry. Europol, Japan JC3, and CISA
  contributed. Russian-based developer ("Shamel") publicly
  reported as not detained.
false_flag_risk: none
summary: |
  The Lumma takedown is the third major infostealer-platform
  enforcement action of 2024–2025 after Operation Magnus
  (RedLine / META, Oct 2024) and the November 2024
  Snowflake-related indictments. AUSPEX classifies as
  criminal-baseline.
