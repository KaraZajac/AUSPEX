outcome_summary: |
  Coordinated international takedown of the Lumma Stealer
  (LummaC2) infostealer malware-as-a-service. Microsoft's
  Digital Crimes Unit, via a court order granted in the U.S.
  District Court for the Northern District of Georgia (civil
  action filed 13 May 2025), seized, suspended, or blocked
  approximately 2,300 malicious domains that formed the
  backbone of Lumma's infrastructure; more than 1,300 of
  those were seized by or transferred to Microsoft (including
  300 domains actioned by law enforcement with Europol's
  support) and redirected to Microsoft sinkholes.
  Simultaneously the U.S. Department of Justice — the case
  investigated by the FBI's Dallas Field Office — unsealed
  two warrants authorizing seizure of five internet domains
  that hosted the LummaC2 user/admin login panels (the
  marketplace's central command structure): two seized 19 May
  and the operators' three replacement panel domains seized
  21 May. Europol's European Cybercrime Centre (EC3) and
  Japan's Cybercrime Control Center (JC3) suspended locally
  based Lumma infrastructure. Microsoft telemetry identified
  over 394,000 Windows computers infected worldwide between
  16 March and 16 May 2025. Lumma's primary developer is
  based in Russia and uses the alias "Shamel"; the action was
  an infrastructure disruption and neither the DOJ nor
  Microsoft announced an arrest of the developer.
false_flag_risk: none
summary: |
  The Lumma disruption is the major infostealer-platform
  enforcement action of the 2024–2025 wave, following
  Operation Magnus (RedLine / META, Oct 2024) and extending
  the court-ordered domain-seizure template refined since the
  2022 Raccoon Stealer takedown. A public-private
  counter-action — Microsoft DCU civil litigation plus a DOJ
  criminal seizure — against a criminal MaaS with no
  documented state nexus. AUSPEX classifies as
  criminal-baseline.
