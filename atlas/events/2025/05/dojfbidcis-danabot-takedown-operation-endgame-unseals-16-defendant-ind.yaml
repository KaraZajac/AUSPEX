summary: |
  On 22 May 2025 the US Justice Department, with the FBI Anchorage Field Office and the DoD Inspector General's Defense Criminal Investigative Service, announced — under the Operation Endgame umbrella with German, Dutch and Australian partners — the disruption of the Russia-based DanaBot malware-as-a-service botnet (300,000+ infected machines, USD 50M+ damage) and unsealed a grand-jury indictment and criminal complaint charging 16 individuals. Significantly, a second DanaBot variant targeted military, diplomatic and law-enforcement personnel across North America and Europe, exfiltrating to separate servers; CrowdStrike assesses the operators ('Scully Spider') were acting on behalf of Russian government intelligence-collection interests. Proposed as a US disruption/Defend-Forward enforcement action with a clear state-espionage nexus; NOT in the corpus. Source_url is CyberScoop (the justice.gov press release returned HTTP 403 to the fetcher); the espionage-nexus assessment is vendor (CrowdStrike), hence strongly_inferred rather than attested.
