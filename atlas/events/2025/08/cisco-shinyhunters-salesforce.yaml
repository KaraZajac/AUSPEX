id: 2025-08/cisco-shinyhunters-salesforce
name: Cisco third-party CRM data theft (Salesforce vishing chain)
start_date: 2025-07-24  # Cisco "made aware" 24 Jul 2025 (GMT+9); access terminated on discovery — no distinct earlier intrusion-onset date given
disclosure_date: 2025-08-05  # earliest public evidence (Wayback capture + TC/BC coverage); Cisco advisory stamps "First Published Aug 1" but nothing predates Aug 5
end_date: 2025-08-05  # actor access terminated immediately on discovery (~24 Jul); bounded through public disclosure. Prior 2025-08-31 was unsourced.
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # Cisco-confirmed: a Cisco representative was voice-phished (vishing) → access to a third-party cloud CRM
outcome_summary: |
  On 5 August 2025 Cisco publicly disclosed (in a "Cisco Event Response:
  Vishing Attack Impacting Third-Party CRM System" advisory, first
  published 1 August 2025) that on 24 July 2025 (GMT+9) a bad actor had
  voice-phished a Cisco representative and thereby accessed and exported
  "a subset of basic profile information" from one instance of a
  third-party, cloud-based CRM system Cisco uses. The exported data was
  the basic account-profile information of individuals who had registered
  a Cisco.com user account — "name, organization name, address, Cisco
  assigned user ID, email address, phone number, and account-related
  metadata such as creation date." Cisco stated the actor "did not obtain
  any of [its] organizational customers' confidential or proprietary
  information, or any passwords or other types of sensitive information,"
  that the incident did not impact its products or services, and that no
  other Cisco CRM instances were affected. Cisco terminated the actor's
  access, opened an investigation, and notified affected users where
  required by law; it did not disclose the number of individuals affected.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 UNC6040 / ShinyHunters Salesforce-
  cloud campaign (campaign_id shinyhunters-salesforce-2025) — the same
  vishing -> third-party-CRM chain as the Adidas and LVMH-brand siblings.
  Separately notable from the state-sponsored Cisco-DEVICE exploitation
  events in the 2025 corpus (Salt Typhoon, Static Tundra, the CVE-2025
  ASA 0-days): this event sits on the criminal-baseline side and concerns
  Cisco's own CRM account data, not its network products. Attribution is
  hedged: Cisco's own advisory names NEITHER the CRM vendor ("Salesforce")
  NOR any threat actor ("ShinyHunters" / "UNC6040"), and a Cisco
  spokesperson "did not confirm whether the data was stolen from a
  compromised Salesforce instance." The Salesforce + ShinyHunters
  placement is security-press inference (BleepingComputer: "not yet
  confirmed by the company, this is likely part of an ongoing wave of
  Salesforce data theft attacks ... linked to the ShinyHunters extortion
  group"), and "ShinyHunters" is the extortion self-claim brand over
  GTIG's UNC6040 (vishing) / UNC6240 (extortion) clusters, not a confirmed
  stable group. No Cisco-specific extortion demand or leak is documented
  (Cisco is not named in the Oct-2025 "Scattered LAPSUS$ Hunters"
  leak-site reporting), so extortion is NOT recorded as a Cisco
  incident_type. The originally-cited campaign sources (mandiant/2025-08-08,
  krebs/2025-10) name no Cisco and were re-sourced this audit to
  Cisco-specific reporting.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: BleepingComputer (Cisco-brand placement) + security-industry consensus
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-08-05
    attribution_source_id: bleepingcomputer/2025-08-05_cisco-data-breach-ciscocom-user-accounts
    attribution_level: activity-cluster
    notes: |
      Cisco's own advisory names NO threat actor and NO CRM vendor. The
      ShinyHunters / Salesforce placement is BleepingComputer's hedged
      press inference: "Although not yet confirmed by the company, this is
      likely part of an ongoing wave of Salesforce data theft attacks
      using vishing and social engineering techniques that have been
      linked to the ShinyHunters extortion group," and "a Cisco
      spokesperson ... did not confirm whether the data was stolen from a
      compromised Salesforce instance." GTIG's own reports (incl.
      mandiant/2025-08-08) name NO Cisco victim. "ShinyHunters" is an
      extortion self-claim brand over the UNC6040 (vishing) / UNC6240
      (extortion) clusters — hence moderate / concur-with-caveat /
      activity-cluster, NOT high.
  - actor_id: criminal/scattered-spider
    attributing_org: journalism (cluster overlap)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-07
    attribution_source_id: krebs/2025-10_shinyhunters-corporate-extortion-spree
    attribution_level: activity-cluster
    notes: |
      Campaign-cluster overlap only; NO Cisco-specific Scattered Spider
      evidence exists, and neither Cisco's advisory nor the BleepingComputer
      Cisco article names Scattered Spider. Retained for cross-event
      campaign-modeling consistency with the Adidas / LVMH siblings: Krebs
      describes the "Scattered LAPSUS$ Hunters" brand as "an amalgamation
      of three hacking groups — Scattered Spider, Lapsus$ and ShinyHunters"
      (krebs/2025-10 carries the amalgamation framing only; it names no
      Cisco). Prior record pointed this attribution to mandiant/2025-08-08,
      which is not among this event's sources and names no Cisco —
      corrected, confidence moderate -> low.
