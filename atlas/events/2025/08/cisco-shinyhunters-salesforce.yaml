id: 2025-08/cisco-shinyhunters-salesforce
name: Cisco third-party CRM breach (Salesforce vishing chain)
start_date: 2025-07-15
disclosure_date: 2025-08-05
end_date: 2025-08-31
incident_type:
  - data-theft
initial_vector: phishing  # UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  In August 2025 Cisco confirmed that an attacker had accessed
  a Cisco-owned third-party cloud-based CRM containing limited
  customer-contact data via the UNC6040 / ShinyHunters voice-
  phishing campaign. Cisco emphasized that core product and
  customer-deployment data were not affected; exposed records
  were limited to business-contact information.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event. Separately notable from the
  state-sponsored Cisco-device exploitation events recorded
  in the 2025 corpus (Salt Typhoon, Static Tundra,
  CVE-2025 ASA 0-days) — this event sits on the criminal-
  baseline side and concerns Cisco's CRM data rather than
  its network products.
