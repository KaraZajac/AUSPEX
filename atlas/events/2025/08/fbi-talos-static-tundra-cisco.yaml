id: 2025-08/fbi-talos-static-tundra-cisco
name: FBI PSA + Cisco Talos — FSB Center 16 "Static Tundra" Cisco device campaign
start_date: 2018-03-01  # CVE-2018-0171 exploitation lineage
disclosure_date: 2025-08-20
end_date: null
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day
outcome_summary: |
  FBI Internet Crime Complaint Center PSA (IC3 250820) and a
  companion Cisco Talos blog publicly named "Static Tundra"
  as the Cisco-Talos cluster assessed to be FSB Center 16
  (the same unit AUSPEX models as the Berserk Bear lineage),
  documenting more than a decade of sustained exploitation of
  CVE-2018-0171 (Cisco Smart Install) against end-of-life
  carrier-grade equipment in telecommunications, higher
  education, and manufacturing sectors across North America,
  Asia, Africa, and Europe. The FBI reports the actor has
  exfiltrated configuration files from thousands of US-critical-
  infrastructure networking devices over the past year.
false_flag_risk: none
summary: |
  The FBI/Talos pivot from the earlier CISA + Five Eyes joint
  advisory (AA25 series, mid-August 2025) — same operator, same
  CVE, but with Talos's new "Static Tundra" branding and a
  named US-side cluster owner (FBI Cyber Division). Operations
  against Ukraine reportedly escalated at the start of the
  Russia-Ukraine war and have remained elevated. Pairs
  doctrinally with Volt Typhoon as the Russian peer pre-positioning
  pattern.
