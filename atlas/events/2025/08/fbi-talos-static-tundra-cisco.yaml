id: 2025-08/fbi-talos-static-tundra-cisco
name: FBI PSA + Cisco Talos — FSB Center 16 "Static Tundra" Cisco device campaign
start_date: 2015-01-01  # Talos: Static Tundra "first observed in 2015" / unit active "over a decade"; aggressive CVE-2018-0171 exploitation "since at least 2021" (AUDIT 2026-07-11: was 2018-03-01, an unsourced CVE-disclosure date, not an exploitation onset)
disclosure_date: 2025-08-20  # FBI IC3 PSA I-082025-PSA + Cisco Talos "Static Tundra" blog, both 2025-08-20
end_date: null
incident_type:
  - espionage      # Talos: "Russian state-sponsored cyber espionage group"; "primary goal is to steal data"
  - intrusion      # n-day exploitation of Cisco IOS Smart Install + legacy SNMP
  - pre-positioning  # persistent access + config extraction "leveraged as needed"; ICS-protocol reconnaissance interest
initial_vector: n-day  # CVE-2018-0171 Cisco Smart Install + legacy SNMP v1/v2 community strings
outcome_summary: |
  FBI Internet Crime Complaint Center PSA (IC3 alert
  I-082025-PSA) and a companion Cisco Talos blog, both dated
  2025-08-20, publicly named "Static Tundra" as the Talos
  cluster assessed to be FSB Center 16 (the same FSB unit AUSPEX
  models as the Berserk Bear / Energetic Bear / Dragonfly
  lineage). The FBI states the activity is "attributed to the
  Russian FSB's Center 16" and describes actors exploiting legacy
  SNMP (v1/v2 community strings) and the unpatched CVE-2018-0171
  in Cisco IOS / IOS XE Smart Install against end-of-life
  networking devices. Talos documents over a decade of this
  unit's network-device intrusions — the group first observed by
  Talos in 2015 — with aggressive CVE-2018-0171 exploitation
  "since at least 2021" (the flaw itself is seven years old and
  was patched in 2018). Targeting spans the telecommunications,
  higher-education, and manufacturing sectors across North
  America, Asia, Africa, and Europe, with victims "selected based
  on their strategic interest to the Russian government." The FBI
  reports that in the past year the actors were collecting
  configuration files for thousands of networking devices
  associated with US entities across critical-infrastructure
  sectors, modified some device configurations to enable further
  access, and used that access for reconnaissance "revealing
  their interest in protocols and applications commonly
  associated with industrial control systems."
false_flag_risk: none
summary: |
  Coordinated same-day disclosure (2025-08-20): the FBI IC3 PSA
  and a Cisco Talos blog introduced the "Static Tundra" cluster
  name for the long-running FSB Center 16 Cisco-device
  exploitation operator (aka Berserk Bear / Energetic Bear /
  Dragonfly), which Talos has tracked since 2015. Talos states
  Static Tundra's operations against entities in Ukraine
  "escalated at the start of the Russia-Ukraine war, and have
  remained high since then." Talos frames the campaign's purpose
  as compromising and extracting device configuration data en
  masse "which can later be leveraged as needed based on
  then-current strategic goals and interests of the Russian
  government" — a long-term strategic-espionage / persistent-
  access posture whose primary goal both sources describe as data
  theft and persistent access. The mass configuration collection
  gives latent, pre-positioning-adjacent value, but neither cited
  source frames the activity as a destructive attack-staging
  operation. (AUDIT 2026-07-11: removed an unsupported "earlier
  CISA + Five Eyes AA25 joint advisory" pivot framing — a
  conflation with the separate PRC "Salt Typhoon" advisory CISA
  AA25-239A, 2025-08-27 — and a "Volt Typhoon Russian peer
  pre-positioning" claim absent from all cited sources.)
