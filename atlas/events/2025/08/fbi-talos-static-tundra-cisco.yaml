    [a] FACTS — corrected. (1) ANACHRONISM fixed: outcome_summary said
    "more than a decade of sustained exploitation of CVE-2018-0171" —
    impossible (Talos calls it a "seven-year-old vulnerability,"
    patched 2018). The "over a decade" applies to the UNIT's activity;
    Talos: "first observed in 2015" and aggressive CVE-2018-0171
    exploitation "since at least 2021." Rewritten to separate the
    decade-long unit activity from the CVE sub-phase. (2) STRIPPED
    "carrier-grade equipment" — 0 hits in all three raw sources
    (embellishment); replaced with source term "end-of-life networking
    devices." (3) "exfiltrated" → "collecting" (FBI verbatim: "collecting
    configuration files for thousands of networking devices associated
    with US entities across critical infrastructure sectors"). (4) ADDED
    load-bearing SNMP vector the event omitted — FBI PSA leads with
    "exploiting Simple Network Management Protocol (SNMP) and end-of-life
    networking devices running an unpatched vulnerability (CVE-2018-0171)
    in Cisco Smart Install"; Talos details SNMP community-string abuse
    for initial access/execution/exfil. (5) Sectors (telecom / higher-ed
    / manufacturing) and geographies (N.America / Asia / Africa / Europe)
    ✓ verified verbatim (Talos, Record). (6) ICS-protocol reconnaissance
    interest ✓ (FBI, Record).

    [a-STRIP] summary FABRICATIONS removed. (1) "The FBI/Talos pivot from
    the earlier CISA + Five Eyes joint advisory (AA25 series, mid-August
