  notes: |
    Full 6-point audit vs the three cited RAW sources. All three
    snapshots verified present in atlas/sources/raw/ with recorded
    sha256 matching on disk (CISA 5905b390…6ec2fd, FBI 2a3f9a42…6f40a4f,
    CRS 44b337b4…c6c0fb). LEVEL = partial: the load-bearing "200+
    companies / 80 countries" impact figure is carried only by the FBI
    statement, whose page body is JS-injected — neither the preserved
    snapshot nor a fresh 2026-07-11 curl renders the figure in captured
    text — so it is mirror-corroborated, not snapshot-verified. Every
    other load-bearing claim is carried by the CISA snapshot.

    [a] FACTS: 13-government co-sealing list VERIFIED verbatim in the
    CISA raw (US NSA/CISA/FBI/DC3; Australia ASD-ACSC; Canada Cyber
    Centre + CSIS; NZ NCSC; UK NCSC; Czechia NÚKIB; Finland SUPO;
    Germany BND/BfV/BSI; Italy AISE/AISI; Japan NCO/NPA; Netherlands
    MIVD/AIVD; Poland SKW/AW; Spain CNI) = 13 governments. Sector list
    (telecommunications, government, transportation, lodging, military
    infrastructure) VERIFIED in the Executive Summary — but it is the
    ADVISORY's list, not the FBI statement's, so outcome_summary was
    corrected to stop attributing the sector list to the FBI. The "200+
    companies / 80 countries" figure is NOT in the CISA raw (only IOC
    45.61.149.200) and rests on the un-snapshottable FBI body — retained
    with an explicit provenance caveat; level -> partial. NO fabricated
    malware/CVEs/victim tallies (0-hit); advisory even states
    "Exploitation of zero-day vulnerabilities has not been observed."

    [b] ATTRIBUTION: source-faithful. CISA raw attributes to "PRC
    state-sponsored cyber threat actors" and is explicit that it is "not
    adopting a particular commercial naming convention … refer[s] … more
    generically as 'Advanced Persistent Threat (APT) actors'," the
    activity "partially overlaps with … Salt Typhoon, OPERATOR PANDA,
    RedMike, UNC5807, and GhostEmperor." MSS is named only DIFFUSELY —
    companies "provide cyber-related products and services to China's
    intelligence services, including multiple units in the People's
    Liberation Army and Ministry of State Security" — alongside the PLA,
    for the contractor cluster, NOT pinned to Salt Typhoon's operating
    company (the firm MSS tie rests on the OFAC source in the actor
    dossier). concur/high retained (13-govt + FBI, unequivocal PRC state-
    sponsorship). CORRECTIONS: name "Five Eyes joint advisory" -> "13-
    government" (8 of 13 co-sealers are beyond Five Eyes); summary "Five
    Eyes plus EU partners" -> "Five Eyes + 7 European govts + Japan"
    (Japan is neither FVEY nor EU); CISA attributing_org de-editorialized.

    [c] DATES: 2025-08-27 VERIFIED — AA25-239A = day-239 of 2025 = 27 Aug;
    single-day documentary meta-event (start=disclosure=end) is correct;
    CISA and FBI published_on 2025-08-27 both match. CRS source record
    published_on 2024-12-20 was NOT supported by its snapshot (version
    history tops out at "November 15, 2024 (IF12798 - Version 11)", no
    December version) -> corrected to 2024-11-15 in the CRS record
    (secondary, non-load-bearing PRC-nexus corroboration only).

    [d] DOCTRINE_LINKS: link1 cn/intelligentized-warfare/sigint-c4isr-
    collection KEPT attested — advisory states the terminal SIGINT-
