id: 2025-08/cisa-aa25-239a-salt-typhoon-advisory
name: CISA AA25-239a — 13-government joint advisory countering PRC "Salt Typhoon" telecom/backbone espionage
start_date: 2025-08-27
disclosure_date: 2025-08-27
end_date: 2025-08-27
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Thirteen-government joint advisory (AA25-239a) consolidating
  the attribution of PRC state-sponsored APT activity that
  "partially overlaps" with the industry-named Salt Typhoon
  cluster. The advisory's executive summary lists targeting of
  telecommunications, government, transportation, lodging, and
  military infrastructure networks. FBI's accompanying statement
  (Aug 27 2025) put the impact at 200+ companies in 80 countries
  — that figure is carried only by the FBI statement, whose page
  body is JS-injected and did not render in the snapshot, so it
  is mirror-corroborated rather than snapshot-verified. The
  advisory framed the campaign under the "Feed Global Espionage
  System" heading — PRC SIGINT mass collection.
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Companion advisory to the September 2024 WSJ disclosure and
  the January 2025 OFAC designation of Sichuan Juxinhe. The
  doctrinal contribution is the 13-government coalition framing —
  Five Eyes plus seven European governments (Czechia, Finland,
  Germany, Italy, Netherlands, Poland, Spain) and Japan speaking
  with one voice on a single body of PRC state-sponsored APT
  activity — which sets the template for subsequent multi-state
  cost-imposition operations.
