outcome_summary: |
  Thirteen-government joint advisory (AA25-239a) consolidating
  the Salt Typhoon attribution and framing the campaign as a
  global espionage system. FBI's accompanying statement (Aug 27
  2025) reported 200+ companies in 80 countries compromised
  across telecom, government, transportation, lodging, and
  military networks. The advisory formally adopted the "fed
  global espionage system" framing for PRC SIGINT mass
  collection.
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Companion advisory to the September 2024 WSJ disclosure and
  the January 2025 OFAC designation of Sichuan Juxinhe. The
  doctrinal contribution is the 13-government coalition
  framing — peer Five Eyes plus EU partners speaking with one
  voice on a single PRC cluster — which sets the template for
  subsequent multi-state cost-imposition operations.
