id: 2025-08/gtig-discloses-unc6384-mustang-panda-linked-adversary-in-the-middle-ca
name: "GTIG discloses UNC6384 (Mustang Panda-linked) adversary-in-the-middle captive-portal campaign against Southeast Asian diplomats (SOGU.SEC/PlugX)"
start_date: 2025-08-25
incident_type:
  - espionage
  - intrusion
  - surveillance
false_flag_risk: none
summary: |
  Google Threat Intelligence Group (GTIG) disclosed an UNC6384 campaign (linked to Mustang Panda / TEMP.Hex) targeting diplomats in Southeast Asia and other entities globally. Victims' web traffic was hijacked via a captive-portal redirect — an adversary-in-the-middle technique GTIG assessed was facilitated through compromised edge devices on target networks — which steered browsers to a threat-actor landing page posing as a fake Adobe plugin update. The chain delivered a digitally signed first-stage downloader (STATICPLUGIN), a DLL-side-loaded launcher (CANONSTAGER), and the SOGU.SEC backdoor, a PlugX variant. GTIG assessed the targeting of government and diplomatic entities aligns with PRC strategic interests.
