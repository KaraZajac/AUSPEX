  notes: "Audited vs GTIG primary blog (raw captured, sha256 5498813a…). FACTS all confirmed verbatim: captive-portal redirect AitM 'facilitated through compromised edge devices on the target networks'; fake Adobe plugin update; chain STATICPLUGIN (signed downloader) → MSI → DLL-side-loaded CANONSTAGER → SOGU.SEC backdoor, '(also known as PlugX)'; victims 'diplomats in Southeast Asia and other entities globally'. ATTRIBUTION: GTIG attributes to UNC6384, a PRC-nexus group 'believed to be associated with' TEMP.Hex (Mustang Panda); names only PRC/'strategic interests of the PRC' — NO service (no MSS). Actor cn/unscoped/mustang-panda is correct (matches the 2026-06-24 nation-level demotion); added attribution_level: named-actor (was missing). attributing_org_confidence moderate matches GTIG's 'believed to be associated' UNC→Mustang-Panda link. doctrine_link cn/bri/political-intelligence-collection kept strongly_inferred (attesting_source_id null) — GTIG names a general PRC-strategic-interest alignment + diplomatic targeting but not the BRI political-intelligence goal in substance, so not attested. published_on 2025-08-25 confirmed (JSON-LD datePublished + byline). NOTE: GTIG 'identified [the campaign] in March 2025'; start_date 2025-08-25 is the disclosure date, not the operation start — left conservative (no op-start in source) and no disclosure_date asserted."
