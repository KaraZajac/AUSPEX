  notes: |
    Audited vs enwikipedia/2025-08_jaguar-land-rover-cyberattack (raw captured + hashed, sha256 290b24f6…).
    FACTS: attack began 31 Aug 2025, production paused 1 Sep, pause continued "until 1 October", JLR "slowly restarting parts" as of 22 Oct (~5-week halt — slug "five-week" defensible); ~£50M/week and ~£1.9bn UK economic impact; "believed to be the most damaging cyberattack in British history" — all supported by the source.
    ATTRIBUTION: source states a SELF-CLAIM only — "a group calling itself Scattered Lapsus$ Hunters on Telegram claimed responsibility" + "suggested collaboration between Scattered Spider, Lapsus$ and ShinyHunters"; no govt/vendor confirmation (only "a criminal investigation has begun"). attribution_level named-actor.
    CORRECTIONS: (1) confidence high→moderate — a Telegram self-claim relayed by a tertiary source is not high-confidence (claimed-by, not confirmed); attributing_org relabeled to mark it a self-claim; auspex_assessment concur→concur-with-caveat; (2) removed unsupported "initial access was via a vishing campaign harvesting employee credentials" from summary — the source states NO initial-access vector; (3) attribution_date 2025-08-31→2025-09-23 (the claim/article date, not the attack date); (4) summary "ran for over a month" tightened to the source's dated milestones.
    doctrine_links empty — actor is a criminal collective (financial mission); minimal doctrine, no over-attestation. actor_id criminal/scattered-lapsus-hunters resolves and is correctly placed in criminal/ (no documented state nexus). Source published_on corrected 2025-08-31→2025-09-23 in the source record (article datePublished).
