summary: |
  On 31 August 2025 Jaguar Land Rover suffered a cyberattack that forced it to pause production on 1 September; the outage ran into October (pause continued "until 1 October", with JLR "slowly restarting parts of its production processes" as of 22 October), with weekly costs estimated at ~£50M and an assessed total economic impact on the UK of roughly £1.9 billion — described as believed to be the most damaging cyberattack in British history. A group calling itself 'Scattered Lapsus$ Hunters' (a Scattered Spider / Lapsus$ / ShinyHunters confederation, per the source) claimed responsibility on Telegram; the cited source states the attribution as a self-claim only and reports no confirmed attribution (a criminal investigation has begun) and no initial-access vector. A flagship 2025 e-crime disruption event with severe cyber-physical/economic spillover, mapping onto existing Scattered Spider / ShinyHunters actors.
