summary: |
  On 31 August 2025 Jaguar Land Rover suffered a cyberattack that forced it to pause all global production on 1 September; the outage ran for over a month, with weekly costs estimated at ~£50M and an assessed total economic impact on the UK of roughly £1.9 billion — described as possibly the most damaging cyberattack in British history. A group calling itself 'Scattered Lapsus$ Hunters' (a Scattered Spider / Lapsus$ / ShinyHunters confederation) claimed responsibility on Telegram; initial access was via a vishing campaign harvesting employee credentials. Not in the corpus; a flagship 2025 e-crime disruption event with severe cyber-physical/economic spillover. Maps onto existing Scattered Spider / ShinyHunters actors.
