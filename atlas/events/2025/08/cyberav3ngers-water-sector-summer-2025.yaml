campaign_id: cyberav3ngers-water-utility-wave
outcome_summary: |
  On 2025-06-30 CISA, the FBI, the DoD Cyber Crime Center (DC3)
  and the NSA published a joint fact sheet, "Iranian Cyber Actors
  May Target Vulnerable US Networks and Entities of Interest,"
  urging critical-infrastructure owners/operators to increase
  vigilance for POTENTIAL Iranian state-sponsored or affiliated
  cyber activity following the June 2025 Israel-Iran kinetic
  exchange and ceasefire. The fact sheet reiterated the
  IRGC-affiliated CyberAv3ngers threat to internet-exposed OT — the
  2023-2024 Unitronics Vision PLC campaign against US water /
  wastewater systems (default/weak-credential access, ladder-logic
  replacement, anti-Israel HMI defacement) — as the illustrative OT
  threat. It did NOT report any new confirmed summer-2025
  water-utility compromise, named victim, or European targeting: it
  is a heightened-threat WARNING, not an operation.
summary: |
  Defensive/warning publication, not a confirmed operation. This
  record was rebuilt on audit (2026-07-05). It previously claimed
  "renewed CyberAv3ngers operations against US and European
  water-utility Unitronics PLCs through summer 2025," cited solely
  to a WaterISAC "August 14 2025 sectoral advisory" that does not
  exist (phantom source: url null, self-flagged unlocatable, and
  web-unverifiable). No source documents a new summer-2025
  CyberAv3ngers water-utility operation, and no CyberAv3ngers
  European water targeting is documented anywhere (2025 European
  water incidents were pro-Russian, not CyberAv3ngers). The genuine
  re-sourced anchor is the June 30 2025 CISA/FBI/DC3/NSA joint fact
  sheet warning of POTENTIAL Iranian targeting of US critical
  infrastructure (incl. water) in the post-12-day-war window, which
  reiterates the 2023 AA23-335A CyberAv3ngers/Unitronics baseline.
  Sits in the CyberAv3ngers-water advisory continuum (AA23-335A Dec
  2023 -> OFAC Feb 2024 -> this fact sheet Jun 2025). RETIRE/MERGE
  candidate: substantially overlaps the defensive dimension of
  2025-06/iran-israel-12-day-war-cyber-surge (same window, same
  actor set) — the fact sheet could instead be folded in as a
  source there. Retained, reduced to the truthful minimum, pending
  Kara's merge decision.
