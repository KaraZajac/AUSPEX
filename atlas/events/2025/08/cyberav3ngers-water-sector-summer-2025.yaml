id: 2025-08/cyberav3ngers-water-sector-summer-2025
name: CyberAv3ngers renewed US/EU water-utility PLC operations summer 2025
start_date: 2025-06-01
disclosure_date: 2025-08-14
end_date: 2025-08-14
incident_type:
  - intrusion
  - disruption
initial_vector: n-day
outcome_summary: |
  WaterISAC and CISA documented renewed CyberAv3ngers / IRGC-IO
  operations against US and European water-utility Unitronics
  Vision PLC installations through summer 2025. The pattern
  matched the November-December 2023 baseline (Aliquippa water
  authority and the CISA AA23-335A advisory series): scanning
  for internet-exposed Unitronics devices, default-credential
  authentication, ladder-logic replacement, and HMI defacement
  with anti-Israel messaging. Tempo elevated during the early-
  summer 2025 Israeli-Iranian kinetic escalation.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
summary: |
  Routine but operationally-meaningful CyberAv3ngers tempo data
  point. Demonstrates the cluster's continued willingness to
  operate against US-and-EU water-utility infrastructure under
  OFAC pressure (February 2024 designation) and CISA defensive
  advisory pressure. The operations directly preceded the April
  2026 CISA AA26-097A reissue, supporting the doctrinal-pillar
  framing of CyberAv3ngers as a sustained IRGC-IO instrument.
