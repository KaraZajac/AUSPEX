id: 2025-08/murky-panda-china-nexus-trusted-relationship-cloudsaas-compromise-silk
name: "MURKY PANDA — China-nexus trusted-relationship cloud/SaaS compromise (Silk Typhoon-aligned) for downstream email espionage"
start_date: 2025-08-21
incident_type:
  - espionage
  - intrusion
  - data-theft
  - supply-chain
initial_vector: supply-chain
false_flag_risk: none
summary: |
  CrowdStrike detailed MURKY PANDA, a China-nexus actor (aligned with Silk Typhoon activity), conducting trusted-relationship compromises in the cloud to reach downstream victims for email espionage, targeting government, technology, academic, legal, and professional-services entities in North America. The actor compromised SaaS providers and Microsoft cloud solution providers to move laterally into customer tenants, and also exploited internet-facing appliances for initial access, including Citrix NetScaler CVE-2023-3519. Tooling included the Neo-reGeorg web shell and a custom Golang Linux RAT named CloudedHope, with RDP used for lateral movement. The trusted-relationship cloud vector makes detection difficult because access arrives through legitimate provider relationships.
