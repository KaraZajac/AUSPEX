id: 2025-08/apt37-inkysquid-scarcruft-operation-hankook-phantom-rokrat-spear-phish
name: "APT37 / InkySquid (ScarCruft) Operation HanKook Phantom — RokRAT spear-phishing of South Korean government and academics"
start_date: 2025-08-29
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
false_flag_risk: none
summary: |
  Seqrite Labs reported Operation HanKook Phantom, a spear-phishing campaign by APT37 (also known as InkySquid, ScarCruft, Reaper, Group123, TEMP.Reaper and Ricochet Chollima), a North Korean state-backed cyber-espionage group. The actor used a decoy document, the 'National Intelligence Research Society Newsletter – Issue 52', delivered with malicious LNK shortcut files that triggered PowerShell-based loaders and fileless execution. Primary targets were individuals associated with the National Intelligence Research Association, including academic figures, former government officials and researchers, with named institutions including Kwangwoon University, Korea University and the Institute for National Security Strategy. The campaign deployed the ROKRAT backdoor; primary targeting was South Korea, with secondary targets across Japan, Vietnam, Russia, Nepal, China, India, Romania, Kuwait and the Middle East.
