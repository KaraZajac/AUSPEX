id: 2025-08/google-shinyhunters-salesforce
name: Google corporate Salesforce instance breached by UNC6040 / ShinyHunters
start_date: 2025-06-01  # "In June" (GTIG); no exact day — June-month bracket
disclosure_date: 2025-08-05
end_date: 2025-06-30  # access "cut off" after a "small window" in June (GTIG); no exact day
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  On August 5 2025 Google disclosed — in an "Update (August 5)"
  appended to the Google Threat Intelligence Group (GTIG) 4 June
  2025 UNC6040 publication — that "In June, one of Google's
  corporate Salesforce instances was impacted by similar UNC6040
  activity described in this post." Per GTIG's statement the
  instance "was used to store contact information and related
  notes for small and medium businesses," and the data the threat
  actor retrieved "during a small window of time before the access
  was cut off" was "confined to basic and largely publicly
  available business information, such as business names and
  contact details." Because the victim (Google) and the primary
  attributor (GTIG) are the same organization, this is one of the
  few 2025 Salesforce-campaign victims confirmed by GTIG itself.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Notable as the reflexive case in the 2025 campaign: Google
  was a victim of the campaign it had itself attributed and
  documented. AUSPEX records it because (a) it is a publicly
  significant signal about the SaaS-cloud risk surface for
  even the largest defenders, and (b) it provides a single-
  attribution event where the victim and the primary
  attributor are the same organization — a rare configuration
  worth flagging in the corpus.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: Google Threat Intelligence Group + Google statement
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2025-08-05
    attribution_source_id: mandiant/2025-06-04_unc6040-voice-phishing-data-extortion
    attribution_level: activity-cluster
    notes: |
      GTIG's own primary carries Google's self-disclosure as an
      "Update (August 5)" appended to the 4 June 2025 UNC6040 post:
      "In June, one of Google's corporate Salesforce instances was
      impacted by similar UNC6040 activity described in this post."
      Because the victim (Google) and the primary attributor (GTIG)
      are the SAME organization, this per-victim attribution is
      firmer than the press-inference siblings — GTIG naming its own
      breach. GTIG tracks the intrusion cluster as UNC6040 and the
      extortion follow-on as UNC6240, which "has consistently claimed
      to be the threat group ShinyHunters ... likely as a method to
      increase pressure" (a self-claim, not a GTIG identity-confidence
      assertion) — hence activity-cluster and false_flag_risk:
      suspected. (attribution_source_id re-pointed this audit from
      mandiant/2025-08-08_expansion, whose live URL has content-drifted
      to a 30 Jan 2026 rewrite that no longer carries Google's breach.)
  - actor_id: criminal/scattered-spider
    attributing_org: journalism consensus (campaign-level "Scattered LAPSUS$ Hunters" amalgamation)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-07
    attribution_source_id: krebs/2025-10_shinyhunters-corporate-extortion-spree
    attribution_level: activity-cluster
    notes: |
      Campaign-cluster-level overlap only — NOT a Google-specific GTIG
      attribution. GTIG's own-incident statement names ONLY UNC6040 /
      ShinyHunters (no Scattered Spider). Krebs describes "Scattered
      LAPSUS$ Hunters" as "an amalgamation of three hacking groups —
      Scattered Spider, Lapsus$ and ShinyHunters." No Google-specific
      Scattered Spider evidence exists. (attribution_source_id
      re-pointed this audit from mandiant/2025-08-08_expansion —
      content-drifted, not carrying this claim — to the cited Krebs
      article that actually carries the amalgamation framing.)
doctrine_links: []
targets:
  - target_id: orgs/google
    role: primary
sources:
