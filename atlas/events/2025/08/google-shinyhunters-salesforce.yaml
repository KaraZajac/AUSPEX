id: 2025-08/google-shinyhunters-salesforce
name: Google corporate Salesforce instance breached by UNC6040 / ShinyHunters
start_date: 2025-06-01
disclosure_date: 2025-08-05
end_date: 2025-08-31
incident_type:
  - data-theft
initial_vector: phishing  # UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  On August 5 2025 Google disclosed that one of its own
  corporate Salesforce instances — used to manage business-
  contact data for small / medium businesses interacting with
  Google's sales and partnerships organizations — had been
  compromised in June 2025 by the UNC6040 actor cluster.
  Per Google's statement, the exposed data was limited to
  basic business-contact details (names and contact
  information) and did not include consumer Google-account
  data. Investigation by Google's own Threat Intelligence
  Group attributed the intrusion to the UNC6040 voice-
  phishing campaign that GTIG had publicly documented two
  months earlier on June 4 2025.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Notable as the reflexive case in the 2025 campaign: Google
  was a victim of the campaign it had itself attributed and
  documented. AUSPEX records it because (a) it is a publicly
  significant signal about the SaaS-cloud risk surface for
  even the largest defenders, and (b) it provides a single-
  attribution event where the victim and the primary
  attributor are the same organization — a rare configuration
  worth flagging in the corpus.
