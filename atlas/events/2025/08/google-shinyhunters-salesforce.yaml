qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-11
  level: full
  notes: |
    Opus 4.8 / max. 6-point audit vs RAW. This is the reflexive child of
    the 2025 UNC6040 / ShinyHunters Salesforce campaign — Google's OWN
    corporate Salesforce instance, one of the few victims GTIG itself
    confirmed. RE-SOURCE (badrabbit model): the event's attribution +
    a cited source both pointed at mandiant/2025-08-08_expansion, whose
    LIVE URL has content-drifted (see FLAGS); Google's self-disclosure
    actually lives in the ALREADY-snapshotted 4 June 2025 GTIG post as an
    "Update (August 5)". Re-pointed to it. Two new Google-specific sources
    fetched this audit (Infosec HTTP 200; expansion HTTP 200 = drift-
    evidence). Per shared-source caution, June-04 + Krebs were NOT
    re-snapshotted (already stamped 2026-07-10) — verified + cited.

    [a] FACTS — every load-bearing claim now carried verbatim by the
    GTIG June-04 primary (Aug-5 update, sha256 4dce0e4b..f79c1051):
      - "In June, one of Google's corporate Salesforce instances was
        impacted by similar UNC6040 activity described in this post."
      - "The instance was used to store contact information and related
        notes for small and medium businesses."
      - "data was retrieved by the threat actor during a small window of
        time before the access was cut off." (= the "small window")
      - "confined to basic and largely publicly available business
        information, such as business names and contact details."
      Corroborated by Infosec (sha256 d9f75c32..f201a0c702): "Google has
      confirmed that it is among the victims ... largely publicly
      available business information, such as business names and contact
      details ... tracked ... as UNC6040 and UN6240 [sic]."
      STRIPPED (0-hit in BOTH snapshots — "consumer"/"account"/"sales
      and partnership"/"did not" all count 0): (i) "used to manage
      business-contact data ... interacting with Google's sales and
      partnerships organizations" → replaced with GTIG's verbatim "store
      contact information and related notes for small and medium
      businesses"; (ii) "did not include consumer Google-account data"
      → deleted (unsourced; not in any cited/snapshotted source). Scope
      held to what GTIG states about its own incident; not over-stated.
    [b] ATTRIBUTION — ShinyHunters kept high / concur: this is GTIG
      naming its OWN breach (victim == attributor), so firmer than the
      press-inference siblings. attribution_source_id re-pointed
      mandiant/2025-08-08_expansion → mandiant/2025-06-04_unc6040 (the
      post that carries the Aug-5 Google update). Scattered Spider kept
      low / concur-with-caveat but re-pointed 08-08_expansion →
      krebs/2025-10 (carries "an amalgamation of ... Scattered Spider,
      Lapsus$ and ShinyHunters", sha256 9c2d11a8..97619835); flagged as
      campaign-level only — GTIG's own-incident statement names NO
      Scattered Spider. false_flag_risk: suspected retained (UNC6240
      "self-claim" of the ShinyHunters brand "to increase pressure").
    [c] DATES — disclosure_date 2025-08-05 CONFIRMED (GTIG "Update
      (August 5)"). end_date 2025-08-31 was UNSOURCED/fabricated → fixed
      to 2025-06-30 (GTIG: access "cut off" after a "small window" in
      June; op ended in June, no exact day). start_date 2025-06-01 kept
      as June-month bracket (GTIG "In June", no day). Source
      published_on FIXED on the Infosec record 2025-08-06 → 2025-08-07
      (raw article:published_time / datePublished = 2025-08-07T14:10:00
      +01:00; visible byline "News 7 August 2025"); id-slug retains -06
      as a creation artifact (FK stability).
    [d] DOCTRINE_LINKS — none (correct). Financially-motivated criminal
      actor; no strategic-doctrine terminal goal. Kept [].
    [e] ATTRIBUTION_LEVEL — added activity-cluster on both attributions.
      GTIG's own tracking is UNC6040 (intrusion) + UNC6240 (extortion)
      clusters; "ShinyHunters" is a self-applied brand over those
      clusters — activity-cluster is the honest granularity.
    [f] ACTOR_ID — criminal/shinyhunters + criminal/scattered-spider both
      resolve to existing atlas actor ids; target orgs/google resolves.
      Not a counter-action; actor_ids retained.

    incident_type [data-theft] → [intrusion, data-theft]: GTIG describes
    the instance being "impacted" (intrusion) + data "retrieved" (data-
    theft). NO extortion added — Google self-disclosed and is on no
    leak-site list; a Google-specific ransom demand is undocumented.

    SNAPSHOTS this audit: infosec-magazine/2025-08-06 (raw d9f75c32..
    f201a0c702, 103,520 B, HTTP 200) NEW + stamped. June-04 (4dce0e4b..
    f79c1051) + Krebs (9c2d11a8..97619835) already snapshotted — verified,
    NOT re-snapshotted. mandiant/2025-08-08_expansion captured as drift-
    evidence (raw 7f5f8413..d9297981, ~350 KB) but NOT certified / NOT
    cited by this event; the GTIG blog HTML carries ~20 per-request CSP
    nonce= attributes so its hash is fetch-dependent (not a stable
    content hash) — a further reason it is not set as a raw_snapshot
    (see FLAGS).

