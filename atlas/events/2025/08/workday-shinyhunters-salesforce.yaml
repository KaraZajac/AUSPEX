  notes: |
    Opus 4.8 / max. 6-point audit vs RAW. Workday had NO primary source
    cited before this audit; added Workday's own disclosure blog
    (primary) + BleepingComputer (Workday-specific secondary), both
    snapshotted this audit, and re-sourced the campaign context. Every
    load-bearing claim is now carried verbatim by a snapshotted source —
    hence level: full.

    Snapshots (all sha256-pinned):
      - workday/2025-08-15 (primary, blog)   f3f2bd8d..e6f38b2a (82,326 B) [NEW]
      - bleepingcomputer/2025-08-18          d6ef36a6..2122af40 (91,294 B) [NEW]
      - csoonline/2025-08-17_workday         92d9e8dc..bfc56eb (255,602 B) [NEW]
      - mandiant/2025-06-04_unc6040          4dce0e4b..f79c1051 (pre-existing, verified) [campaign origin]
      - krebs/2025-10                        9c2d11a8..97619835 (pre-existing, verified; 0 "Workday")

    [a] FACTS — rewritten; carried verbatim by the Workday primary + BC + CSO:
      - Workday primary (f3f2bd8d..): "threat actors were able to access
        some information from our third-party CRM platform. There is no
        indication of access to customer tenants or the data within them.
        We acted quickly to cut the access and have added extra safeguards
        to protect against similar incidents." Data = "commonly available
        business contact information, like names, email addresses, and
        phone numbers." Method = "threat actors contact employees by text
        or phone pretending to be from human resources or IT."
      - CORRECTED the old outcome_summary's "attackers had accessed a
        Workday-owned Salesforce instance": Workday named NO CRM vendor.
        CSO (92d9e8dc..): "While refraining from naming the CRM software or
        the attackers, the company revealed that attackers used the
        familiar Vishing and phone-based pretexting." Reworded to Workday's
        own words ("third-party CRM platform") + labelled the Salesforce/
        ShinyHunters identification as press inference.
      - "no customer tenants" scoping (task focus) VERIFIED verbatim in
        THREE snapshots — Workday primary, BC ("no customer tenants were
        impacted"), CSO ("There is no indication of access to customer
        tenants or the data within them"). Kept.
      - Discovery date anchor: "the breach was discovered almost two weeks
        ago, on August 6" (BC); "first identified on August 6" (CSO).
      - summary's "~10,000 enterprise customers" figure (unsourced in the
        snapshots) softened to "a large enterprise customer base."
      - ZERO fabricated malware/CVEs/victim-counts/quotes found or added.
    [b] ATTRIBUTION — de-escalated over-attestation. ShinyHunters
        high -> moderate, concur -> concur-with-caveat, +attribution_level
        activity-cluster; attributing_org CORRECTED from "Google Threat
        Intelligence Group + CSO Online + Workday disclosure" (Workday
        named no actor; GTIG named no Workday) to "BleepingComputer
        (Workday-brand placement) + security-industry consensus (GTIG
        UNC6040 campaign)"; attribution_source_id re-pointed csoonline ->
        bleepingcomputer/2025-08-18 (carries the explicit hedged linkage).
        Scattered Spider moderate -> low, re-pointed from csoonline (0
        "Scattered") to krebs/2025-10 (amalgamation framing), +activity-
        cluster. false_flag_risk: suspected retained (deliberate
        ShinyHunters brand-borrowing / self-claim).
    [c] DATES — disclosure_date 2025-08-15 CONFIRMED by the Workday blog's
        own og:published_time meta (2025-08-15T05:00:00; updated
        2025-08-18) — kept. start_date 2025-08-01 (unsourced) -> 2025-08-06
        (the "first identified"/discovery date; no onset disclosed).
        end_date 2025-08-31 (unsourced) -> 2025-08-15 (access cut on
        discovery ~Aug 6; bounded through disclosure). Source published_on
        FIXED: CSO 2025-08-17 -> 2025-08-19 (byline "Aug 19, 2025" +
        datePublished meta 2025-08-19; dateModified 2025-08-21). BC
        published_on 2025-08-18 (byline "August 18, 2025 03:53 AM").
    [d] DOCTRINE_LINKS — none (correct: criminal financially-motivated
        extortion cluster; no strategic-doctrine terminal goal).
    [e] ATTRIBUTION_LEVEL — added activity-cluster on both attributions:
        GTIG tracks UNC6040 (vishing) + UNC6240 (extortion) clusters and
        "ShinyHunters" is a self-applied brand over them; the Workday
        placement is inferential (Workday named no actor) — activity-
        cluster is the honest granularity, not named-actor.
    [f] ACTOR_ID — criminal/shinyhunters and criminal/scattered-spider
        both resolve to existing atlas actor ids. Not a counter-action
        (no LE/policy meta type); actor_id retained.

    incident_type [data-theft] -> [intrusion, data-theft]: intrusion
    (unauthorized access to a third-party CRM via social engineering) +
