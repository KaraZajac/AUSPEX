id: 2025-08/workday-shinyhunters-salesforce
name: Workday third-party CRM breach (Salesforce vishing chain)
start_date: 2025-08-06  # Workday breach "first identified on August 6" (CSO); no distinct intrusion-onset date disclosed. Prior 2025-08-01 was unsourced.
disclosure_date: 2025-08-15  # Workday blog og:published_time 2025-08-15T05:00:00 (updated 2025-08-18); press pickup Aug 18 (BleepingComputer) / Aug 19 (CSO).
end_date: 2025-08-15  # Workday "acted quickly to cut the access" on discovery (~Aug 6); bounded through disclosure. Prior 2025-08-31 was unsourced.
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # Workday-confirmed: social engineering by text/phone posing as HR/IT to trick employees into granting access (vishing/pretexting). Workday named no CRM vendor.
outcome_summary: |
  On 15 August 2025 Workday published a blog post ("Protecting You
  From Social Engineering Campaigns: An Update From Workday") disclosing
  that "threat actors were able to access some information from our
  third-party CRM platform." Workday stated the data obtained was
  "commonly available business contact information, like names, email
  addresses, and phone numbers," and that "there is no indication of
  access to customer tenants or the data within them"; it "acted
  quickly to cut the access and ... added extra safeguards." The
  intrusion was traced to a social-engineering campaign in which
  "threat actors contact employees by text or phone pretending to be
  from human resources or IT." Workday's own statement named NEITHER
  the CRM vendor (Salesforce) NOR any threat actor; the Salesforce /
  UNC6040 / ShinyHunters placement is security-press inference
  (BleepingComputer, CSO Online), consistent with the wider 2025
  Salesforce-cloud voice-phishing campaign.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 UNC6040 / ShinyHunters Salesforce-
  cloud campaign (campaign_id shinyhunters-salesforce-2025) — the same
  vishing -> third-party-CRM chain as the Adidas / LVMH / Cisco / Google
  siblings. Analytically notable because Workday is itself a major
  SaaS-platform vendor with privileged HR-data access across a large
  enterprise customer base — the campaign's pivot into SaaS-vendor
  self-service CRM instances raises the threat model for downstream
  customer-data exposure even though Workday's own production tenants
  were unaffected. Attribution is hedged: Workday's blog named neither
  the CRM vendor ("Salesforce") nor any actor ("ShinyHunters" /
  "UNC6040"); a Workday spokesperson, asked to confirm a Salesforce
  instance, only "referenced the company's Friday blog post"
  (BleepingComputer). "ShinyHunters" is the extortion self-claim brand
  over GTIG's UNC6040 (vishing) / UNC6240 (extortion) clusters, not a
  confirmed stable group. No Workday-specific extortion demand or leak
  is documented (Workday is not named in the Oct-2025 "Scattered
  LAPSUS$ Hunters" leak-site reporting — the Krebs survey names no
  Workday), so extortion is NOT recorded as a Workday incident_type.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: BleepingComputer (Workday-brand placement) + security-industry consensus (GTIG UNC6040 campaign)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-08-18
    attribution_source_id: bleepingcomputer/2025-08-18_workday-data-breach-salesforce
    attribution_level: activity-cluster
    notes: |
      Workday's own disclosure names NO threat actor and NO CRM vendor.
      The ShinyHunters / Salesforce placement is BleepingComputer's
      hedged reporting: "While the company didn't directly confirm it,
      BleepingComputer has learned that the Workday incident is part of
      a wave of security breaches linked to the ShinyHunters extortion
      group, which targets Salesforce CRM instances through social
      engineering and voice phishing attacks." GTIG's own campaign
      reports name no Workday victim. "ShinyHunters" is a self-applied
      extortion brand over the UNC6040 (vishing) / UNC6240 (extortion)
      clusters — hence moderate / concur-with-caveat / activity-cluster,
      NOT high.
  - actor_id: criminal/scattered-spider
    attributing_org: journalism (cluster overlap)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-07
    attribution_source_id: krebs/2025-10_shinyhunters-corporate-extortion-spree
    attribution_level: activity-cluster
    notes: |
      Campaign-cluster overlap only; NO Workday-specific Scattered Spider
      evidence exists, and neither Workday's blog, the BleepingComputer
      article, nor CSO Online names Scattered Spider (0 occurrences in
      each snapshot). Retained for cross-event campaign-modeling
      consistency with the Adidas / Cisco / LVMH siblings: Krebs describes
      the "Scattered LAPSUS$ Hunters" brand as "an amalgamation of three
      hacking groups — Scattered Spider, Lapsus$ and ShinyHunters" (the
      Krebs snapshot carries the amalgamation framing only; it names no
      Workday). Prior record pointed this attribution to CSO Online
      (moderate), which names no Scattered Spider — corrected to Krebs,
      confidence moderate -> low.
doctrine_links: []
targets:
  - target_id: orgs/workday
    role: primary
