id: 2025-08/workday-shinyhunters-salesforce
name: Workday third-party CRM breach (Salesforce vishing chain)
start_date: 2025-08-01
disclosure_date: 2025-08-15
end_date: 2025-08-31
incident_type:
  - data-theft
initial_vector: phishing  # via UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  On August 15 2025 Workday disclosed in a blog post that
  attackers had accessed a Workday-owned Salesforce instance
  containing third-party business-contact data — including
  names, email addresses, and phone numbers — and that the
  intrusion was traced to a social-engineering campaign
  targeting Workday employees. CSO Online and other vendors
  identified the campaign as the UNC6040 / ShinyHunters
  voice-phishing / Salesforce-OAuth chain. Workday emphasized
  that customer Workday-tenant data was not affected.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event. Notable because Workday is itself
  a major SaaS-platform vendor with privileged HR-data access
  for ~10,000 enterprise customers — the campaign's pivot
  into SaaS-vendor self-service Salesforce instances raises
  the threat model for downstream customer-data exposure even
  when the Workday production tenant itself is unaffected.
attributions:
