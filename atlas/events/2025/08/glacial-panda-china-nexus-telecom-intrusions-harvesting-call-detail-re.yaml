false_flag_risk: none
summary: |
  CrowdStrike's 2025 Threat Hunting Report and its Adversary Universe profile describe GLACIAL PANDA, a China-nexus, state-sponsored adversary that since at least 2018 has developed and maintained access to telecommunications-provider networks to obtain call detail records (CDRs) and related communications telemetry from telecom entities. Several identified targets are in the South China Sea region, with likely-attributable breaches also occurring in North and Central America. The group conducts long-term, espionage-driven intrusions, contributing to a 130% rise in nation-state activity in the telecom sector, with its objective assessed to be intelligence gathering. CrowdStrike's full report further reports that GLACIAL PANDA primarily targets telcos' Linux systems and deploys trojanized OpenSSH components collectively codenamed ShieldSlide — a trojanized SSH server binary that grants backdoor access by authenticating any account (including root) when a hardcoded password is supplied, while logging authentication sessions to support lateral movement (these ShieldSlide / OpenSSH tradecraft details are reported only in the gated full report PDF and are not present in the two captured CrowdStrike web sources).
