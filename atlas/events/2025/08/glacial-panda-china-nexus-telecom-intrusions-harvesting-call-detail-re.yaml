summary: |
  CrowdStrike's 2025 Threat Hunting Report describes GLACIAL PANDA, a China-nexus adversary that since at least 2018 has developed and maintained access to telecommunications provider networks to obtain call detail records (CDRs) and related communications telemetry. The group primarily targets telcos' Linux systems and conducts patient, long-term, espionage-driven intrusions, contributing to a 130% rise in nation-state activity in the telecom sector. GLACIAL PANDA deploys trojanized OpenSSH components collectively codenamed ShieldSlide; the trojanized SSH server binary grants backdoor access by authenticating any account, including root, when a hardcoded password is supplied, while harvesting user authentication sessions and credentials. Its objective is assessed to be intelligence collection from telecom infrastructure.
