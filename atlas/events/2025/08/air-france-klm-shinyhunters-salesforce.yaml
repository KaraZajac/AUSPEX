name: Air France-KLM customer-data breach (Salesforce vishing chain)
start_date: 2025-08-07  # AF-KLM detected/disclosed 7 Aug 2025; no distinct intrusion-onset date is public. Prior 2025-08-15 was unsourced.
disclosure_date: 2025-08-07  # The Register (Connor Jones) + BleepingComputer (Sergiu Gatlan) both 2025-08-07. Prior 2025-09-04 was wrong.
end_date: 2025-08-07  # actor access stopped on discovery ("immediate action to stop the unauthorized access"); bounded through disclosure. Prior 2025-09-30 was unsourced.
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # campaign-inferred vishing → third-party customer-service platform; AF-KLM did NOT confirm the vector or name Salesforce
outcome_summary: |
  On 7 August 2025 Air France-KLM disclosed that an attacker had
  gained unauthorized access to an external platform the group
  uses for customer service, exposing data of an undisclosed
  number of customers. Per the airlines' statements (relayed by
  The Register and BleepingComputer), the accessed data comprised
  customers' first and family names, contact details, Flying Blue
  loyalty-programme numbers and tier levels, and the subject lines
  of service-request emails; the airlines said no sensitive data
  such as passwords, travel details, Flying Blue miles, passports,
  or credit-card information was stolen, and that their own
  networks were not affected. Air France-KLM took immediate action
  to stop the unauthorized access, reported the incident to the
  French CNIL and the Dutch Data Protection Authority, and warned
  customers to be alert to phishing emails and calls. Air France-
  KLM named no threat actor and did not confirm the platform
  vendor; security-press reporting placed the breach within the
  2025 UNC6040 / ShinyHunters voice-phishing Salesforce-data-theft
  campaign, with ShinyHunters the "prime suspect" — a press
  inference, not an AF-KLM or GTIG confirmation.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 UNC6040 / ShinyHunters
  Salesforce-cloud campaign (campaign_id shinyhunters-salesforce-
  2025); companion to the Qantas July 2025 airline-loyalty
  intrusion — together the two cases establish the airline-
  loyalty-programme data class as a high-utility target in the
  2025 ShinyHunters-brand campaign. Attribution is hedged: Air
  France-KLM's own statement names NEITHER a threat actor NOR the
  CRM / platform vendor ("Salesforce"); the ShinyHunters /
  Salesforce placement is security-press inference (BleepingComputer,
  The Register), and "ShinyHunters" is an extortion self-claim brand
  over GTIG's UNC6040 (vishing) / UNC6240 (extortion) clusters, not
  a confirmed stable group. No AF-KLM-specific extortion demand or
  public leak is documented (AF-KLM is not named in the Oct-2025
  "Scattered LAPSUS$ Hunters" leak-site reporting), so extortion is
  NOT recorded as an AF-KLM incident_type. The originally-cited
  campaign sources (mandiant/2025-08-08, krebs/2025-10) name no
  AF-KLM; re-sourced this audit to AF-KLM-specific reporting plus
  the canonical campaign primary (mandiant/2025-06-04).
