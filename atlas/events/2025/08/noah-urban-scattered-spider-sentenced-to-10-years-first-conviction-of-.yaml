summary: |
  On 20 August 2025 Senior U.S. District Judge Harvey E. Schlesinger (M.D. Fla.) sentenced Noah Michael Urban, a 20-year-old from Palm Coast, Florida (a/k/a "King Bob," "Sosa," "Elijah," "Gustavo Fring"), to 10 years (120 months) in federal prison plus 3 years' supervised release, ordered him to forfeit ~$4.8M in assets, and ordered $13M in restitution for conspiracy to commit wire fraud, wire fraud, and aggravated identity theft. Per the DOJ release (issued/updated 21 Aug 2025), he had pleaded guilty on 4 April 2025; from Aug 2022–Mar 2023 he stole cryptocurrency from at least 59 victims via SIM-swaps and was part of a group that phished company-employee credentials nationwide (total loss over $13M). The DOJ release itself does not name "Scattered Spider"; press reporting (CyberScoop, Krebs, The Record) identifies Urban as a Scattered Spider / 0ktapus / UNC3944 member and frames this as the first conviction of a group member — the crew that researchers and reporting link to breaches of 130+ major companies (Twilio, LastPass, DoorDash, Mailchimp, Caesars, MGM). The corpus already lists Urban's 2022 SIM-swap charge and the Nov 2024 five-operator indictment; this sentencing is a distinct, milestone law-enforcement outcome. Maps onto the existing Scattered Spider actor.
