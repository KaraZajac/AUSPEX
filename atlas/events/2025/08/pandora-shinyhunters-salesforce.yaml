id: 2025-08/pandora-shinyhunters-salesforce
name: Pandora customer-data breach (Salesforce vishing chain)
start_date: 2025-07-20
disclosure_date: 2025-08-04
end_date: 2025-08-31
incident_type:
  - data-theft
initial_vector: phishing  # UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  In early August 2025 Pandora disclosed a customer-data
  breach via a third-party platform, exposing customer names
  and email addresses. The intrusion was attributed to the
  UNC6040 / ShinyHunters voice-phishing / Salesforce-OAuth
  campaign. Chanel disclosed a comparable breach in the same
  week and is treated as part of the same wave.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event. Companion to the LVMH-brand,
  Adidas, Cisco, Allianz Life cluster across summer 2025.
