id: 2025-08/pandora-shinyhunters-salesforce
name: Pandora customer-data breach (Salesforce vishing chain)
start_date: 2025-07-20  # UNSOURCED campaign-window estimate — Pandora disclosed NO intrusion/discovery date; retained for campaign modeling only
disclosure_date: 2025-08-05  # earliest snapshot-anchored public disclosure (BleepingComputer, Lawrence Abrams, Aug 5 06:16 PM; "As first reported by Forbes"). Prior 2025-08-04 unanchored.
end_date: 2025-08-05  # Pandora "stopped the access" on discovery; bounded through public disclosure. Prior 2025-08-31 was unsourced.
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: phishing  # campaign-inferred: UNC6040 vishing → Salesforce OAuth (Pandora named neither Salesforce nor a vector)
outcome_summary: |
  On 5 August 2025 Danish jewelry brand Pandora disclosed a
  customer-data breach after customer information was stolen "in
  the ongoing Salesforce data theft attacks" (BleepingComputer).
  Pandora's own customer notice stated only that "your contact
  information was accessed by an unauthorized party through a
  third-party platform we use" and that it had "stopped the access
  and have further strengthened our security measures." Per the
  notice, "only customers' names, birthdates, and email addresses
  were stolen"; "Passwords, IDs, and financial information were not
  exposed" (BleepingComputer; Infosecurity: "no financial data or
  passwords stolen"). Pandora named NEITHER the third-party platform
  ("Salesforce") NOR any threat actor; BleepingComputer separately
  "learned that the data was stolen from the company's Salesforce
  database," and the ShinyHunters / UNC6040 attribution is hedged
  security-press inference (Infosecurity: "suspicion is mounting
  that the attacks could be part of an ongoing data extortion
  campaign by the ShinyHunters (UNC6040) group"). No Pandora-specific
  victim/record count was disclosed. Chanel disclosed a comparable
  US-customer breach (discovered 25 July 2025, third-party-hosted
  database) in the same week and is reported as part of the same
  Salesforce-campaign wave.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 UNC6040 / ShinyHunters
  Salesforce-cloud campaign (campaign_id shinyhunters-salesforce-2025)
  — the same vishing → third-party-CRM chain as the Adidas, LVMH-brand
  and Cisco siblings. Attribution is hedged: Pandora's own notice
  attributes nothing beyond "a third-party platform we use" and names
  no actor; the Salesforce placement is BleepingComputer's own reporting
  ("BleepingComputer has learned that the data was stolen from the
  company's Salesforce database") and the ShinyHunters / UNC6040 link is
  press inference ("suspicion is mounting"), not a victim or GTIG
  victim-naming. "ShinyHunters" is recorded as the extortion self-claim
  brand over GTIG's UNC6040 (vishing) / UNC6240 (extortion) clusters,
  not a confirmed stable group. Extortion is inherited from the campaign
  chain (BC frames the theft as "used to extort the company into paying
  a ransom"; "ShinyHunters confirmed to BleepingComputer that they are
  privately extorting companies") — but NO Pandora-specific ransom demand
  or public leak is documented, and Pandora is NOT named in the Oct-2025
  "Scattered LAPSUS$ Hunters" leak-site reporting. The originally-cited
  sources (mandiant/2025-08-08, krebs/2025-10) name NO Pandora and were
  re-sourced this audit to Pandora-specific reporting.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: BleepingComputer (Pandora-brand placement) + Google Threat Intelligence Group (campaign)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-08-05
    attribution_source_id: bleepingcomputer/2025-08-05_pandora-salesforce-data-breach
    attribution_level: activity-cluster
    notes: |
      Pandora named NO actor and NO platform. The Salesforce placement is
      BleepingComputer's own reporting ("BleepingComputer has learned that
      the data was stolen from the company's Salesforce database") and the
      ShinyHunters link is hedged press inference (Infosecurity: "suspicion
      is mounting that the attacks could be part of an ongoing data
      extortion campaign by the ShinyHunters (UNC6040) group"). GTIG's own
      reports (incl. mandiant/2025-06-04) name NO Pandora victim.
      "ShinyHunters" is an extortion self-claim brand over the UNC6040
      (vishing) / UNC6240 (extortion) clusters — hence moderate /
      concur-with-caveat / activity-cluster, NOT high.
  - actor_id: criminal/scattered-spider
    attributing_org: journalism (cluster overlap)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-07
    attribution_source_id: krebs/2025-10_shinyhunters-corporate-extortion-spree
    attribution_level: activity-cluster
    notes: |
      Campaign-cluster overlap only; NO Pandora-specific Scattered Spider
      evidence exists, and neither Pandora's notice nor the Pandora press
      coverage names Scattered Spider. Retained for cross-event campaign-
      modeling consistency with the Adidas / LVMH / Cisco siblings: Krebs
      describes the "Scattered LAPSUS$ Hunters" brand as "an amalgamation
      of three hacking groups — Scattered Spider, Lapsus$ and ShinyHunters"
      (krebs/2025-10 carries the amalgamation framing only; it names no
      Pandora). Prior record pointed this attribution to mandiant/2025-08-08,
      which names no Pandora and is un-snapshottable — corrected.
