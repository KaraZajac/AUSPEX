id: 2025-08/fsb-center-16-cisco-ios-advisory
name: CISA + NSA + FBI + Five Eyes advisory on FSB Center 16 Cisco IOS exploitation
start_date: 2018-03-01  # CVE-2018-0171 first exploited shortly after disclosure
disclosure_date: 2025-08-20  # CISA Aug 2025 joint advisory
end_date: null
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day  # CVE-2018-0171 Cisco Smart Install (decade-old)
outcome_summary: |
  Joint CISA + NSA + FBI advisory plus Five Eyes counterparts
  documented sustained exploitation by FSB Center 16 (Berserk Bear
  lineage) of the seven-year-old Cisco Smart Install bug
  CVE-2018-0171 against telecommunications, energy, and government
  network equipment globally. The campaign is long-running
  SIGINT-style strategic collection and pre-positioning — the FSB
  equivalent of the PRC Volt Typhoon pattern.
false_flag_risk: none
operators_named:
  - akulov-pavel  # FSB Center 16 / Berserk Bear, DOJ Mar 2022 (lineage attribution)
  - gavrilov-mikhail  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
  - tyukov-marat  # FSB Center 16 / Berserk Bear, DOJ Mar 2022
summary: |
  Doctrinally significant as the first public US-government
  attribution of a multi-year FSB Center 16 collection campaign
  against carrier-grade network equipment. Pairs operationally
  with the broader "Salt Typhoon" PRC telecom-collection wave
  (also surfaced in 2024-25), though the FSB campaign is older and
  separately attributed. Tooling exploits a 2018 vulnerability that
  remains widely unpatched on legacy network gear — a recurring
  AUSPEX pattern for "decade-old CVE, peer-state operator,
  multi-year dwell."
