id: 2025-08/fsb-center-16-cisco-ios-advisory
name: FSB Center 16 "Static Tundra" Cisco Smart Install (CVE-2018-0171) & SNMP exploitation — FBI PSA + Cisco Talos, Aug 2025
# AUDIT 2026-07-05 (claude-opus-4.8, max effort): DUPLICATE of 2025-08/fbi-talos-static-tundra-cisco
# (same actor / CVE / disclosure date / underlying primaries). Audited down to truthful minimum;
# the "CISA + NSA + FBI + Five Eyes joint advisory" framing was unsupported — a conflation with the
# SEPARATE PRC "Salt Typhoon" advisory (CISA AA25-239A, 2025-08-27). RETIRE/MERGE candidate. See qc.
start_date: 2018-03-01  # CVE-2018-0171 (Cisco Smart Install) disclosed Mar 2018; exploitation lineage
disclosure_date: 2025-08-20  # FBI IC3 PSA 250820 + Cisco Talos "Static Tundra" blog, both 2025-08-20
end_date: null
incident_type:
  - intrusion
  - pre-positioning
initial_vector: n-day  # CVE-2018-0171 Cisco Smart Install + legacy SNMP v1/v2 community strings
outcome_summary: |
  On 2025-08-20 the FBI (IC3 PSA 250820) and Cisco Talos, same day
  and separately, publicly named "Static Tundra" / FSB Center 16 as
  the operator of a decade-plus campaign exploiting CVE-2018-0171
  (Cisco IOS / IOS XE Smart Install) and legacy SNMP against
  telecommunications, higher-education and manufacturing targets
  across North America, Asia, Africa and Europe — victims primarily
  in Ukraine and allied states. The FBI reported the actor
  exfiltrated configuration files from thousands of US
  critical-infrastructure networking devices in the prior year.
  There was NO CISA / NSA / Five-Eyes joint advisory on this actor:
  the Five-Eyes advisory of the same window (CISA AA25-239A,
  2025-08-27) covered the separate PRC "Salt Typhoon" campaign.
false_flag_risk: none
summary: |
  FSB Center 16 (Berserk Bear / Dragonfly / Energetic Bear lineage;
  Cisco Talos cluster name "Static Tundra") exploited the
  seven-year-old Cisco Smart Install bug CVE-2018-0171 in Cisco IOS
  / IOS XE, together with legacy SNMP (v1/v2 community strings), to
  compromise unpatched and end-of-life network devices for
  long-term strategic collection. Talos assesses with high
  confidence that Static Tundra is a Russian state-sponsored
  espionage cluster and a likely sub-cluster of Energetic Bear —
  the FSB Center 16 unit named in the 2022 DOJ indictment — and
  links a SYNful Knock firmware implant to it with moderate
  confidence. AUSPEX editorial: the pattern mirrors the PRC "Volt
  Typhoon" peer pre-positioning model (an analogy not drawn by the
  cited reporting).
