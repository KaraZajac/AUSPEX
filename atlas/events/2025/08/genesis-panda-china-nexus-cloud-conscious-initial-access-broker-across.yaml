summary: |
  CrowdStrike's 2025 Threat Hunting Report describes GENESIS PANDA, a China-nexus, cloud-conscious adversary active since at least January 2024 and assessed to act as an initial access broker. The group ran high-volume operations against the financial services, media, telecommunications and technology sectors across at least 11 countries. In one early-March-2025 intrusion CrowdStrike observed GENESIS PANDA exploit a public-facing Jenkins server, then query the cloud instance metadata service (IMDS) to obtain cloud-provider credentials, after which it added SSH keys and created a backdoor access key to maintain and regain access. CrowdStrike assesses its likely objective is access development to enable future intelligence collection.
