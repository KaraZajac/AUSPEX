false_flag_risk: none
summary: |
  Sekoia TDR disclosed a June–September 2025 TransparentTribe (APT36) campaign delivering a new Golang RAT, DeskRAT, via .desktop-file phishing lures themed on Indian defence matters and Ladakh/New Delhi protests, specifically targeting India's indigenous BOSS Linux distribution used in military and government networks. DeskRAT uses WebSocket C2 and four persistence mechanisms. Distinct from the inventory's generic 2025-04-22 Pahalgam tempo entry: this is a specific named-tooling Linux campaign with a dedicated staging-server infrastructure (modgovindia[.]com). Maps to PK doctrine pk/asymmetric-posture-india.
