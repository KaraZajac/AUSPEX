  notes: "Audited vs Sekoia TDR (raw captured + hashed). FACTS confirmed: 'Updated on October 23, 2025'; activity 'traced back to June 2025' + YARA matches 'August and September 2025' (June–Sept window OK); 'Golang-based RAT which we dubbed DeskRAT'; BOSS = 'Bharat Operating System Solutions (BOSS) distribution... endorsed by the Government of India' (indigenous OK); 'command and control communications over WebSocket'; 'four persistence methods are specific to the Linux environment'; modgovindia[.]com staging confirmed in decoded payload; .desktop-file phishing + Ladakh-protest (Sept 24-25) & RMC-Mumbai/New-Delhi lures; victims = 'defense and government entities in India' (targets country=in correct). ATTRIBUTION: source names only 'Pakistani-nexus intrusion set... to support Pakistan military and strategic interests' (APT36/Operation C-Major aliases); ZERO whole-word ISI/Inter-Services in raw — actor pk/unscoped/transparent-tribe demotion (no ISI) is correct; attribution_level named-actor ADDED; attributing_org tidied blogsekoia->Sekoia TDR. published_on 2025-10-23 matches. DOCTRINE: strongly_inferred kept (attesting_source_id null) — source's only stated motive is Sekoia's OWN 'medium confidence' opportunistic-leverage read, not an attestation of PK strategic purpose; the 'Pakistan military/strategic interests' line is actor-mission boilerplate, not goal-in-substance for this op, so NOT upgraded to attested. Directionality OK (pk-aligned actor -> Indian victims)."
