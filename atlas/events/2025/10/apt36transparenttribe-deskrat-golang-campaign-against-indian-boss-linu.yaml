id: 2025-10/apt36transparenttribe-deskrat-golang-campaign-against-indian-boss-linu
name: "APT36/TransparentTribe DeskRAT Golang campaign against Indian BOSS Linux military systems"
start_date: 2025-10-23
incident_type:
