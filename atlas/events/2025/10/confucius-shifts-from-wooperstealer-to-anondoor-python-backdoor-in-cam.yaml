  notes: "Audited vs FortiGuard Labs (raw captured, sha256 31646bbe…; page datePublished 2025-10-02 = published_on OK). FACTS OK: WooperStealer→AnonDoor shift, Pakistan targeting, PPSX/LNK + DLL side-loading delivery, screenshots (Screenshoot), file enumeration (fileListing/Directory_listing). CORRECTIONS: (1) summary said 'Chrome password dumping' — article's PasswordDumper helpers are for Firefox and Edge, never Chrome → fixed to browser-credential dumping (Firefox/Edge); (2) timeline 'Dec 2024–August 2025' → 'September 2025' (PasswordDumper observed Sept); (3) added attribution_level: named-actor (Fortinet names 'Confucius', not a nation/unit). ATTRIBUTION correct as caveated: the cited Fortinet source NEVER names India — only 'state-aligned'/'state-sponsored operations in the region'/'South Asia' (zero 'India' occurrences); India nexus rests on external Lookout/Recorded Future reporting, so attributing_org_confidence: moderate and concur-with-caveat hold. doctrine_link confidence: plausible with attesting_source_id: null is correct (source does not name India → cannot be attested). actor_id in/unscoped/confucius resolves (file atlas/actors/in/confucius.yaml; de-provisionalized 2026-06-23, service unsourced)."
