id: 2025-10/confucius-shifts-from-wooperstealer-to-anondoor-python-backdoor-in-cam
name: "Confucius shifts from WooperStealer to AnonDoor Python backdoor in campaigns against Pakistan"
start_date: 2025-10-02
incident_type:
  - espionage
  - data-theft
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  FortiGuard Labs documented the Confucius cyber-espionage group's evolution across December 2024–September 2025 phishing waves against Pakistan, moving from the WooperStealer document/info-stealer (delivered via PPSX and LNK files using DLL side-loading) to AnonDoor, a Python backdoor capable of screenshots (Screenshoot), file enumeration (fileListing/Directory_listing), and browser-credential dumping via PasswordDumper helpers for Firefox and Edge. Confucius is widely assessed as a pro-India / India-aligned actor active since 2013 (per Lookout and Recorded Future reporting), but Fortinet's report itself only characterizes it as a state-sponsored South Asian actor and does not explicitly say pro-India — hence strongly_inferred for the India nexus. Completely new actor: Confucius is not in the inventory. Maps to IN regional-collection-against-Pakistan doctrine.
