# AUDIT 2026-07-11 (claude-opus-4.8/max): 4 cited sources curl-snapshotted + sha256'd (Bloomberg via its Wayback archive, live URL 403). Attribution split into an F5/CISA "nation-state (unnamed)" primary + a Bloomberg China/UNC5221 press refinement; attributing_org "US officials" -> "people familiar with the matter" (source-exact); attribution_level added to both. Added the F5/Unit42 "no supply-chain / source-code modification" scoping fact. Removed over-reaching cn/intelligentized-warfare/pre-positioning doctrine link (folded into alternatives) and downgraded compelled-vendor-cooperation strongly_inferred -> plausible with inference_basis (China predicate is press-level only). Dropped uncited "second F5-class ED" and forward-dated "December CISA-NSA advisory" from summary. See qc.notes; FLAGS for orchestrator in [d]/[f].
id: 2025-10/f5-big-ip-nation-state-breach
name: F5 Networks nation-state breach — BIG-IP source code and undisclosed vulnerabilities stolen
start_date: 2024-08-09  # derived: Bloomberg reports F5 told customers the actor had "at least 12 months" access before the 2025-08-09 detection -> onset floor ~Aug 2024 ("at least", so possibly earlier)
disclosure_date: 2025-10-15
end_date: 2025-08-09  # F5 detection date ("learned of the breach on August 9, 2025" per Form 8-K); containment proxy
incident_type:
  - espionage
  - intrusion
  - data-theft
  - supply-chain
initial_vector: unknown
outcome_summary: |
  F5 disclosed a nation-state intrusion that gave attackers
  long-term, persistent access to its product-development
  environment and engineering knowledge-management platform,
  resulting in theft of a portion of BIG-IP source code and
  internal information on undisclosed vulnerabilities in the
  product. F5 and Unit 42 report NO evidence the actor modified
  F5's source code, build/release pipeline, or wider software
  supply chain, and no evidence NGINX source or the product-dev
  environment was altered — the risk is theft that hands the
  actor material for future exploitation, not a shipped implant.
  Bloomberg (citing people familiar) attributes the intrusion to
  China-linked actors using the BRICKSTORM backdoor — the malware
  Mandiant/GTIG maps to the China-nexus cluster UNC5221, disclosed
  in September 2025. F5 learned of the breach on 2025-08-09 but
  delayed disclosure at U.S. DOJ request. CISA issued Emergency
  Directive ED 26-01 the same day (2025-10-15), requiring federal
  civilian agencies to inventory, management-interface-exposure-
  check, and patch F5 BIG-IP deployments by 22 October 2025.
false_flag_risk: none
summary: |
  A high-consequence supply-chain-risk compromise: theft of
  source code plus internal undisclosed-vulnerability data hands
  the actor a structural advantage in finding and weaponizing
  future BIG-IP flaws (CISA: the theft "could provide that threat
  actor with a technical advantage to exploit F5 devices and
  software"). The BRICKSTORM/UNC5221 tie reported by Bloomberg
  places this in the same China-nexus cluster ecosystem as
  Mandiant/GTIG's September 2025 BRICKSTORM disclosure. CISA
  framed ED 26-01 as a response to a "significant cyber threat,"
  its Acting Director warning of a potential "catastrophic
  compromise of critical information systems." NB: F5's public
  SEC filing named only a "nation-state threat actor" without a
  country; the China linkage is press-level (Bloomberg's
  people-familiar sources) and was denied by China's Foreign
  Ministry.
