qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-11
  level: full
  notes: |
    PATH: REAL — normal audit. All 4 cited sources fetched on-point. CISA ED 26-01 (HTTP 200,
    65,870 B, sha256 4a5d763c..3629567d), Unit42 (HTTP 200, 227,026 B, 0eaca013..6a31fde3) and
    The Hacker News (HTTP 200, 175,459 B, ec0e03df..db3524bf) snapshotted from their live URLs;
    Bloomberg live URL returned HTTP 403 (bot wall) so the record's own Wayback archive was
    snapshotted instead (HTTP 200, 348,392 B, 1b91ac29..8c74c5f3) — the archive carries the full
    article body (incl. paywalled paragraphs) in embedded JSON, so it is fully usable. No
    fabrications found; 0 phantom sources. level=full: every load-bearing claim is carried by a
    snapshotted source.
    [a] FACTS — all corroborated. Source-code + undisclosed-vuln theft: CISA "exfiltrated files,
    which included a portion of its BIG-IP source code and vulnerability information"; THN "stole
    files containing some of BIG-IP's source code and information related to undisclosed
    vulnerabilities." KM platform + product-dev environment: Unit42 "exfiltrated files from the
    knowledge management platform"; THN "bolstered its product development environment." NO-
    MODIFICATION scoping fact (was ABSENT; ADDED per audit NB): Unit42 verbatim "There is no
    evidence of modification to F5's software supply chain, including source code and build and
    release pipelines" and "no evidence that the threat actor accessed or modified the NGINX
    source code or product development environment." Bloomberg attribution + BRICKSTORM/UNC5221:
    Bloomberg "blamed on state-backed hackers from China, according to people familiar" / "a
    threat hunting guide for a type of malware called Brickstorm used by Chinese state-backed
    hackers" / Mandiant tracks "the hackers behind Brickstorm as 'UNC5221,' ... a 'China-nexus
    espionage actor'" (also carried by THN, which credits Bloomberg for the BRICKSTORM/UNC5221
    tie). DOJ delay + Aug-9 detection: THN "learned of the breach on August 9, 2025, per a Form
    8-K ... F5 said it delayed the public disclosure at the request of the U.S. Department of
    Justice (DoJ)." CORRECTIONS: (1) "internal vulnerability-tracking data" -> "internal
    information on undisclosed vulnerabilities" (source-exact). (2) added the no-supply-chain-
    modification caveat so incident_type: supply-chain is not misread as a SolarWinds-style
    implant. (3) summary "Among the most consequential supply-chain compromises of the decade"
    -> "high-consequence supply-chain-risk compromise" (de-hyperbolised). (4) STRIPPED the summary
    clause "the December CISA-NSA joint advisory" — no cited source mentions it and it post-dates
    all four sources (anachronism/forward-ref). (5) STRIPPED "CISA ED 26-01 is the second F5-class
    emergency directive (after 2020's ED 21-01 SolarWinds and 2023's ED 23-02 ...)" — uncited by
    any of the 4 sources and internally confused ("second" then lists two priors); replaced with
    the source-carried CISA "significant cyber threat" / "catastrophic compromise" framing.
    [b] ATTRIBUTION — the core of this audit. F5's PUBLIC Form 8-K + CISA ED 26-01 name only a
    "nation-state"/"nation-state affiliated" actor with NO country (China term absent from both the
    CISA and Unit42 raw). The China + BRICKSTORM/UNC5221 linkage is Bloomberg's, sourced to unnamed
    "people familiar" (and denied by China's Foreign Ministry: "groundless accusations made without
    evidence"). Restructured from a single Bloomberg-China entry into: (1) an F5/CISA nation
    (unnamed) primary entry — high org-confidence, auspex concur, attribution_level nation — that
    foregrounds the firm public fact; and (2) the Bloomberg refinement — moderate org-confidence,
    concur-with-caveat, attribution_level activity-cluster (UNC5221 is an uncategorized China-nexus
    cluster; no proper actor/service/unit named). FIX: attributing_org "Bloomberg (citing US
    officials)" -> "Bloomberg (citing people familiar with the matter)" — the raw says "people
    familiar ... who asked not to be named because they aren't authorized to speak publicly," never
    "US officials." actor_id held null throughout (consistent with sibling UNC5221/BRICKSTORM
    events). Did NOT assert China at the actor/doctrine level beyond what the cited press supports.
    [c] DATES — verified. disclosure_date 2025-10-15 = F5's Wednesday 8-K (THN "on Wednesday
    disclosed"; CISA ED published_on 2025-10-15; both "same day"). start_date 2024-08-09 = onset
    FLOOR from Bloomberg "the hackers were in the company's network for at least 12 months" before
    the 2025-08-09 detection (comment softened to "at least 12 months ... possibly earlier").
    end_date 2025-08-09 = detection (THN "learned of the breach on August 9, 2025"; Unit42
    "identified in early August 2025") used as containment proxy. Source published_on checks:
    Bloomberg JSON datePublished 2025-10-16T02:00Z (record 2025-10-16 OK); Unit42
    article:published_time 2025-10-16 (OK); CISA 2025-10-15 (OK); THN 2025-10-16 content-consistent
    (reports both the Oct-15 disclosure and Bloomberg's Oct-16 follow-up).
    [d] DOCTRINE_LINKS — de-over-attributed. Was TWO China-doctrine links asserted while AUSPEX
    holds China only at concur-with-caveat. REMOVED cn/intelligentized-warfare/pre-positioning:
    that pillar = "gain and hold access to US/allied civilian critical infrastructure ... for
    disruption during a Taiwan/peer-conflict contingency" (Volt/Flax Typhoon CI-implant pattern) —
    a poor fit for source-code/vuln THEFT from a vendor, and the firmly-China-attributed sibling
    (unc5221-verdantbamboo) explicitly rules intelligentized-warfare out as purpose-not-mechanism;
    its residual relevance folded into inference_basis.alternatives. DOWNGRADED
    cn/national-intelligence-law-2017/compelled-vendor-cooperation strongly_inferred -> plausible
    (kept as the house pillar for the UNC5221/F5/Ivanti/VMware cluster, but the China predicate is
    press-level, not the sibling's flat Volexity attribution) and ADDED inference_basis{signals[],
    alternatives[]} with the lead alternative "Nation UNCONFIRMED." attesting_source_id null
    (correct: no cited source states the strategic goal -> not attested). Doctrine state cn matches
    the alleged attacker nexus -> attacker-rationale default, no perspective tag.
    [e] ATTRIBUTION_LEVEL — was MISSING on both entries. F5/CISA entry -> nation (nation-state,
    country unnamed = the firm public claim). Bloomberg entry -> activity-cluster (UNC5221 is a
    Mandiant/GTIG uncategorized China-nexus cluster referenced by a bare UNC number; no proper
    named actor, service, or unit). Deliberately NOT named-actor (contrast the VerdantBamboo
    sibling, where Volexity used a proper cluster name at high confidence).
    [f] ACTOR_ID — null; resolves trivially. targets orgs/f5-networks and sectors/government/civilian
    both resolve to existing registry files. FLAGS for orchestrator: (1) DOCTRINE CONSISTENCY —
    the sibling BRICKSTORM/UNC5221 events map the F5 campaign to compelled-vendor-cooperation at
    strongly_inferred; here it is plausible because F5 named no country and China is press-only.
    Recommend a cluster-wide decision on whether the F5 event should track the siblings (strongly_
    inferred) or the siblings should adopt this hedge — do not want silent divergence. (2)
    ACTOR/ALIAS — if the corpus-wide UNC5221 == VerdantBamboo == WARP PANDA consolidation flagged
    in unc5221-verdantbamboo-brickstorm proceeds, revisit whether this F5 event's Bloomberg entry
    should point actor_id at cn/unscoped/warp-panda; kept null here for now (press-level China +
    F5's own no-country public stance argue for staying null even post-consolidation).
