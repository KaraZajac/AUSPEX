id: 2025-10/f5-big-ip-nation-state-breach
name: F5 Networks nation-state breach — BIG-IP source code and undisclosed vulnerabilities stolen
start_date: 2024-08-09  # F5 stated 12-month-plus pre-detection access; corresponds to mid-2024
disclosure_date: 2025-10-15
end_date: 2025-08-09  # F5 detection date per public statement
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: unknown
outcome_summary: |
  F5 disclosed a nation-state intrusion that gave attackers
  long-term access to its product-development environment and
  engineering knowledge-management platform, resulting in theft
  of BIG-IP source code and internal vulnerability-tracking data
  for undisclosed flaws. Bloomberg attribution: China-linked
  actors using the BRICKSTORM backdoor (the same UNC5221-attributed
  malware Mandiant disclosed three weeks earlier). F5 learned of
  the breach on 2025-08-09 but delayed disclosure at DOJ request.
  CISA issued Emergency Directive ED 26-01 the same day requiring
  federal civilian agencies to inventory, expose-check, and patch
  F5 BIG-IP deployments by 22 October 2025.
false_flag_risk: none
summary: |
  Among the most consequential supply-chain compromises of the
  decade: theft of source code plus internal vulnerability data
  hands the actor a structural advantage in finding and
  weaponizing future BIG-IP flaws. The BRICKSTORM tie places
  this in the same UNC5221 / China-nexus cluster ecosystem as
  the Mandiant September disclosure and the December CISA-NSA
  joint advisory. CISA ED 26-01 is the second F5-class emergency
  directive (after 2020's ED 21-01 SolarWinds and 2023's ED 23-02
  on management interfaces).
