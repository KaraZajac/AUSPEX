      unnamed "people familiar" (NOT "US officials," per the raw).
      China's Foreign Ministry denied the accusation. AUSPEX holds
      actor_id null and concur-with-caveat, consistent with the
      sibling UNC5221/BRICKSTORM events; the caveat is that F5's
      own public attribution stops at "nation-state" and the China
      linkage rests on anonymous sourcing.
