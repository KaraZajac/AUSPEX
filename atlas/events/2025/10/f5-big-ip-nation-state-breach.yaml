      nation-state threat actor" / "nation-state affiliated cyber
      threat actor" WITHOUT naming a country. AUSPEX concurs at
      the nation (unnamed) level. The China/UNC5221 refinement
      below is press-level and is NOT asserted by F5 or CISA.
  - actor_id: null
    attributing_org: Bloomberg (citing people familiar with the matter)
    attributing_org_confidence: moderate
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-16
    attribution_source_id: bloomberg/2025-10-16_f5-china-attribution
    notes: |
      Bloomberg reports the breach was "blamed on state-backed
