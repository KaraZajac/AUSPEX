  notes: "Audited vs BleepingComputer (raw captured + sha256). Core facts confirmed verbatim: coalition self-branded 'Scattered Lapsus$ Hunters' from ShinyHunters/Scattered Spider/Lapsus$; data-leak site launched 3 Oct 2025 listing 39 companies; ~1B-record ransom demanded from Salesforce itself; Oct 10 deadline; voice-phishing + malicious-OAuth (Salesloft Drift) vectors. Corrected a victim-list conflation — Qantas/Allianz Life/Workday are wider-campaign breaches, NOT on the 39-victim leak site (FedEx, Disney/Hulu, Home Depot, Marriott, Google, Cisco, Toyota, McDonald's, Adidas are); reworded. Added attribution_level: named-actor (was missing) and re-noted confidence high as a direct self-claim to the reporter (not 'attested'). doctrine_links correctly empty: pure profit-extortion, no state nexus in source. published_on 2025-10-03 matches. ACTOR FLAG: criminal/scattered-lapsus-hunters is a PROVISIONAL backfill stub (empty aliases/ttp/services) — the corpus DOES carry this coalition as a first-class criminal actor (good), but it needs QC fleshing-out and aliases linking the three constituent crews (criminal/shinyhunters, criminal/scattered-spider, criminal/lapsus all exist separately). Actor not edited (out of scope)."
