summary: |
  A coalition self-branded 'Scattered Lapsus$ Hunters' — drawing members from ShinyHunters, Scattered Spider and Lapsus$ — launched a dedicated data-leak site on 3 October 2025 to extort 39 companies whose Salesforce environments were compromised via voice-phishing and malicious-OAuth abuse (including the Salesloft Drift integration). The group claimed ~1 billion stolen records and demanded a ransom from Salesforce itself, setting an October 10 deadline; named victims include FedEx, Disney/Hulu, Home Depot, Marriott, Google, Cisco, Toyota, McDonald's, Adidas, Qantas, Allianz Life and Workday. This formalizes the UNC6040/ShinyHunters Salesforce campaign already in the corpus into a named, unified e-crime brand and is a distinct leak-site event. Maps onto existing ShinyHunters / Scattered Spider / UNC6040 actors.
