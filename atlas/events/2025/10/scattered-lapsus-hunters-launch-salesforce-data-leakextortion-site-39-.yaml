initial_vector: phishing
campaign_id: shinyhunters-salesforce-2025
false_flag_risk: none
summary: |
  A coalition self-branded 'Scattered Lapsus$ Hunters' — whose members claim to be part of the ShinyHunters, Scattered Spider and Lapsus$ groups — launched a dedicated data-leak site on 3 October 2025 listing 39 companies whose Salesforce environments were compromised via voice-phishing and malicious-OAuth abuse (employees tricked into linking a malicious OAuth app; a parallel strand abused stolen OAuth tokens for the Salesloft Drift integration). In a separate leak-site entry the group demanded a ransom from Salesforce itself to prevent the release of ~1 billion customer records, setting an October 10 deadline. Brands named on the 39-victim site include FedEx, Disney/Hulu, Home Depot, Marriott, Google, Cisco, Toyota, McDonald's and Adidas; the wider Salesforce voice-phishing wave also hit Qantas, Allianz Life and Workday. This formalizes the UNC6040/ShinyHunters Salesforce campaign already in the corpus into a named, unified e-crime brand and is a distinct leak-site event. Maps onto existing ShinyHunters / Scattered Spider / Lapsus$ actors.
