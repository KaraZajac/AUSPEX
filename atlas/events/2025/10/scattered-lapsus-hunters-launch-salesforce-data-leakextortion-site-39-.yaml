id: 2025-10/scattered-lapsus-hunters-launch-salesforce-data-leakextortion-site-39-
name: "Scattered Lapsus$ Hunters launch Salesforce data-leak/extortion site (39 victims, ~1B records)"
start_date: 2025-10-03
incident_type:
