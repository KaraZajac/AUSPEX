id: 2025-10/kaspersky-great-details-2025-mysterious-elephant-apt-k-47-campaign-har
name: "Kaspersky GReAT details 2025 Mysterious Elephant (APT-K-47) campaign harvesting WhatsApp data across South Asia"
start_date: 2025-10-15
incident_type:
  - espionage
  - data-theft
