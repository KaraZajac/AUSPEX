initial_vector: phishing
false_flag_risk: none
summary: |
  Kaspersky GReAT (press release, 15 Oct 2025; campaign identified early 2025) disclosed a new Mysterious Elephant campaign targeting government and foreign-affairs organizations across the Asia-Pacific region with a focus on Pakistan, Bangladesh, Afghanistan, Nepal and Sri Lanka, deploying custom tools (BabShell reverse shell, the MemLoader HidenDesk in-memory module) and PowerShell, with personalized spear-phishing and malicious documents for initial access, to steal sensitive documents, images and archives and — notably — WhatsApp data. The cited Kaspersky press release names only the "Mysterious Elephant" APT and assigns NO sponsoring state. The APT-K-47 designation (Knownsec 404) and the assessed India nexus rest on tool/code-sharing overlaps with the India-aligned clusters Bitter (TA397) and Confucius — documented in the fuller Securelist report and by Knownsec/Proofpoint-Threatray, NOT in this press release — so India-nexus is only plausible here and the actor is filed under IN with that caveat. New actor not previously in the inventory.
