summary: |
  Kaspersky GReAT disclosed a new 2025 Mysterious Elephant (APT-K-47) campaign targeting government and foreign-affairs organizations across Asia-Pacific with a focus on Pakistan, Bangladesh, Afghanistan, Nepal and Sri Lanka, deploying custom tools (BabShell reverse shell, MemLoader HidenDesk) and PowerShell to steal sensitive documents, images, archives and notably WhatsApp data. Mysterious Elephant shares tooling with Bitter (TA397) and Confucius, both India-linked clusters, but Kaspersky does not name a sponsoring state — hence India-nexus is only plausible and filed under IN with that caveat. New actor not in the inventory.
