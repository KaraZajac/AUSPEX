id: 2025-11/upbit-woo-x-dprk-thefts
name: DPRK crypto-exchange theft sequence — WOO X (July), Upbit (November) — 2025-H2
start_date: 2025-07-24  # WOO X incident (WOO X post-mortem "On July 24, 2025"); Upbit theft 2025-11-27
disclosure_date: 2025-11-28  # Upbit public disclosure (Yonhap/CoinDesk); WOO X separately disclosed via post-mortem 2025-08-19
end_date: 2025-11-27  # Upbit hot-wallet breach — last theft in the sequence
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing  # WOO X: social-engineered open-source "debug" request -> backdoor on a dev machine; Upbit: hijack/impersonation of admin credentials
outcome_summary: |
  Two DPRK-attributed cryptocurrency-exchange thefts book-ended
  2025's second half. On 24 July 2025 approximately USD 14M was
  taken from nine WOO X user accounts after a developer was
  social-engineered on an open-source forum into running a
  backdoored "debug" tool; WOO X and security firm Hacken tied the
  intrusion to the RGB-aligned DPRK actor tracked as UNC4899 /
  TraderTraitor (aka Jade Sleet). All affected WOO X users were
  compensated from the exchange treasury, and the stolen funds were
  rapidly converted to BTC through infrastructure previously linked
  to the 2024 BingX exploit. On 27 November 2025 approximately
  USD 36M in Solana-based tokens (SOL, USDC and other SPL tokens
  such as BONK, JTO, SONIC, RAY, RENDER, ORCA, PYTH) was drained
  from a hot wallet at South Korea's largest exchange, Upbit; South
  Korean authorities (via Yonhap) SUSPECT — but have not confirmed —
  the Lazarus Group, citing hijacked/impersonated admin credentials
  that mirror the 2019 Upbit heist, and the funds were moved via
  multichain laundering. Aggregate 2025 DPRK crypto theft reached
  ~USD 2.02B (Chainalysis / The Hacker News); these two mid-tier
  thefts were a small part of that total.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Operationally the consistent middle tier of DPRK exchange
  operations in 2025 — between the ~USD 1.5B Bybit megasteal
  (February) and the smaller continuous IT-worker / OPSEC revenue
  streams. The Upbit breach is notable as repeat targeting: Upbit
  was previously hit in November 2019 for 342,000 ETH (framed by
  CCN as a ~USD 50M "Ethereum heist"), later attributed by South
  Korean police to Lazarus and Andariel — making 27 November 2025
  the second DPRK-attributed compromise of the same exchange,
  almost exactly six years to the day.
