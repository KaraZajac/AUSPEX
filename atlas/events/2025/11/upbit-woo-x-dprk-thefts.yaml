  notes: |
    Full 6-point audit vs snapshotted raw. RE-SOURCE ("badrabbit
    model"): both originally-cited sources (Chainalysis recap + The
    Hacker News) carry only aggregate 2025 DPRK figures + the Upbit
    $36M line — NEITHER mentions WOO X, the $14M figure, July 2025,
    or Solana (0 hits for "Upbit"/"WOO"/"$14M"/"Lazarus" in the
    Chainalysis raw). Both thefts are real; genuine primary/secondary
    sources were added, snapshotted and hashed. Distinct from the
    2019 Upbit heist (verified — the 2019 event is invoked only as
    context / repeat-targeting).

    [a] FACTS. WOO X — woox.io post-mortem (sha fe4595c6…): "On July
    24, 2025, WOO X experienced a sophisticated security incident
    that resulted in $14 million in unauthorized withdrawals from 9
    user accounts" + social-engineering vector + full user
    compensation. Upbit — CoinDesk (sha bdbc6096…) "$36M" / "Solana
    network tokens"; CCN (sha 91f59ccb…) "reported on November 27,
    2025" + token list "USDC, BONK, JTO, and SONIC, Raydium (RAY),
    Render (RENDER), Orca (ORCA), and Pyth Network (PYTH)" +
    "reimbursed all affected users in full, using corporate
    reserves". CORRECTED asset_classes ETH/BTC/stablecoins ->
    ETH (WOO X, per blockchainreporter ETH->BTC trail, sha
    325e87ca…) / SOL / USDC (Upbit). STRIPPED fabrications not in any
    cited source: "TRM Labs, CertiK" attribution and "mixer
    infrastructure consistent with the post-Bybit pattern" (replaced
    with the sourced BingX-2024 laundering-infra + multichain
    laundering). usd_stolen 50M = 14M + 36M, both legs now sourced
    (no amount embellishment).

    [b] ATTRIBUTION. WOO X -> kp/rgb/tradertraitor: WOO X + Hacken,
    "carried out by a DPRK-linked actor tracked in law-enforcement
    circles as 'TraderTraitor'" / UNC4899 aka Lazarus/Jade Sleet,
    RGB-aligned -> high / concur. Upbit -> kp/rgb/lazarus: South
    Korean authorities SUSPECT, not confirmed ("considering the North
    Korea-linked Lazarus group as a possible source"; THN "believed
    to be involved") -> DOWNGRADED medium / concur-with-caveat (was
    high/concur). Fixed attributing_org strings (removed Chainalysis/
    TRM/CertiK, which do not attribute these thefts) and re-pointed
    attribution_source_id to the leg sources.

    [c] DATES. start 2025-07-23 -> 2025-07-24 (post-mortem "On July
    24, 2025"). end 2025-11-30 -> 2025-11-27 (Upbit theft). disclosure
    2025-11-28 (Upbit; WOO X separately disclosed 2025-08-19).
    Source-record fix: chainalysis published_on 2026-01-15 ->
    2025-12-18 (article:published_time 2025-12-18T12:45:02Z); THN
    2025-12-18 confirmed.

    [d] DOCTRINE. Both links stay strongly_inferred (NOT attested):
    no cited source names byungjin / the 8th-Congress defense plan /
    a WMD-financing goal for these thefts. CoinDesk's "foreign
    currency shortages" line is a revenue MOTIVE, not a strategic-goal
    attestation. Set attesting_source_id null on both; tightened
    inference_basis signals (Chainalysis attributes the AGGREGATE, not
    these specific thefts). perspective n/a (attacker-rationale
    default).

    [e] ATTRIBUTION_LEVEL. Added named-actor to both attributions
