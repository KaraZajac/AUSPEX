id: 2025-11/upbit-woo-x-dprk-thefts
name: DPRK crypto-exchange theft sequence — WOO X (July), Upbit (November) — 2025-H2
start_date: 2025-07-23  # WOO X attack onset (vendor-reported)
disclosure_date: 2025-11-30
end_date: 2025-11-30
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Two named DPRK-attributed cryptocurrency-exchange thefts
  capped 2025's second-half: an approximate USD 14M loss to
  WOO X targeting nine individual users via social-engineering
  in late July, and an approximate USD 36M breach of South
  Korea's largest exchange Upbit on 27 November 2025. Both
  attacks were attributed by blockchain-analytics firms
  (Chainalysis, TRM Labs, CertiK) to Lazarus / TraderTraitor
  with subsequent on-chain laundering through mixer
  infrastructure consistent with the post-Bybit pattern.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Operationally important as the consistent middle-tier of
  DPRK exchange operations between the Bybit megasteal and
  smaller continuous OPSEC/IT-worker operations. The Upbit
  breach is particularly notable: Upbit had previously been
  hit by Lazarus in November 2019 for ~USD 49M, making
  2025-11-27 the second Lazarus attack on the same exchange
  six years later — a rare case of repeat targeting.
