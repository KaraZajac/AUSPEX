  - data-theft
initial_vector: n-day
false_flag_risk: none
summary: |
  FBI, CISA, DC3, HHS, Europol and the national cyber authorities of France, Germany and the Netherlands updated their 2024 joint advisory (AA24-109A) on Akira ransomware, warning it now presents an imminent threat to critical infrastructure. Akira, first identified March 2023, has collected more than $244M in ransom proceeds as of late September 2025 and is assessed by the FBI as a top-five ransomware variant. The group is linked to Storm-1567 / Howling Scorpius / Punk Spider / Gold Sahara clusters and has possible Conti lineage; recent intrusions pivoted to exploiting SonicWall SSL-VPN devices (CVE-2024-40766) and encrypting Nutanix AHV in addition to VMware ESXi/Hyper-V. Akira is a major gap in the corpus (no existing events) and is one of the most prolific RaaS operations of 2024–2025.
