id: 2025-11/fbicisa-stopransomware-akira-advisory-244m-imminent-threat-to-critical
name: "FBI/CISA #StopRansomware: Akira advisory — $244M, imminent threat to critical infrastructure"
start_date: 2025-11-13
incident_type:
  - ransomware
