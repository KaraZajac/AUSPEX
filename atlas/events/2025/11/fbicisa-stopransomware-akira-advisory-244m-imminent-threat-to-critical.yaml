summary: |
  On 2025-11-13 the FBI and CISA — supported by Europol and the national cyber authorities of France, Germany and the Netherlands — released an updated joint #StopRansomware advisory (AA24-109A) on the Akira ransomware group, sharing fresh TTPs, tools and exploited vulnerabilities. Officials stressed the update "was not in response to any specific attack" but reflects ransomware adversaries' continuous evolution. CyberScoop reports Akira, a financially motivated group that initially appeared in March 2023, has claimed more than $244M in ransom proceeds as of late September 2025; the FBI assesses it within its top five investigated variants (of 130+ targeting U.S. businesses across "just about any critical infrastructure sector"). The advisory associates Akira with the Storm-1567 / Howling Scorpius / Punk Spider / Gold Sahara clusters and possible connections to the disbanded Conti group, and lists six newly observed vulnerabilities spanning Cisco firewalls/VPNs, Windows, VMware ESXi, Veeam Backup and Replication and SonicWall firewalls (e.g. CVE-2024-40766). Akira uses a double-extortion model and has exfiltrated data in just over two hours from initial access in some incidents. Akira is otherwise a gap in the corpus and is among the most prolific RaaS operations of 2024–2025.
