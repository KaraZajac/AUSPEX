id: 2025-11/treasury-dprk-bankers-laundering
name: Treasury sanctions DPRK bankers and institutions laundering cybercrime and IT-worker proceeds
start_date: 2025-11-04
disclosure_date: 2025-11-04
end_date: 2025-11-04
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  OFAC and State designated eight individuals and two entities
  for laundering proceeds of DPRK cybercrime and IT-worker fraud.
  Jang Kuk Chol and Ho Jong Son, North Korean bankers operating
  from Vladivostok, were sanctioned for managing USD 5.3M in
  cryptocurrency on behalf of OFAC-designated First Credit Bank,
  with funds linkable to a DPRK ransomware actor that has
  targeted US victims and to DPRK IT-worker revenue. Jong Sung
  Hyok, chief representative of the OFAC-designated DPRK
  Foreign Trade Bank in Vladivostok, was also designated.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Extends the post-Bybit, post-Song-Kum-Hyok pressure campaign
  into the financial-network layer. The Vladivostok node is now
  formally a designated DPRK money-laundering hub — meaningful
  because most successful DPRK crypto launder paths surface
  through Russia-China physical-cash off-ramps.
