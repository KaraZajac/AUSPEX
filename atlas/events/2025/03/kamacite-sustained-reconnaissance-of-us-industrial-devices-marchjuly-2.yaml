id: 2025-03/kamacite-sustained-reconnaissance-of-us-industrial-devices-marchjuly-2
name: "KAMACITE sustained reconnaissance of U.S. industrial devices (March–July 2025) — control-loop mapping for ICS pre-positioning"
start_date: 2025-03-01
incident_type:
  - reconnaissance
  - pre-positioning
  - intrusion
false_flag_risk: none
summary: |
  Dragos's 2026 OT/ICS Year-in-Review reports that KAMACITE conducted systematic reconnaissance of U.S. industrial devices between March and July 2025, mapping entire control loops by targeting operator interfaces (HMIs), variable-frequency drives, metering modules and remote/cellular gateways together. The cited Year-in-Review names only the behavioural groups KAMACITE and ELECTRUM and makes no political/state attribution (it never says Sandworm, GRU or Russia). In Dragos's wider tracking (its standalone KAMACITE profile and corroborating trade reporting), KAMACITE is the initial-access-and-reconnaissance arm that hands off to the OT-disruption group ELECTRUM, and it is ELECTRUM — not KAMACITE directly — that exhibits the technical overlap with Russia's GRU Sandworm unit; AUSPEX resolves this cluster to ru/gru/74455/sandworm (see attribution note).
