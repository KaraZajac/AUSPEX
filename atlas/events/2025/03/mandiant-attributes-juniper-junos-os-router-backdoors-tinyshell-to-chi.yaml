id: 2025-03/mandiant-attributes-juniper-junos-os-router-backdoors-tinyshell-to-chi
name: "Mandiant attributes Juniper Junos OS router backdoors (TINYSHELL) to China-nexus UNC3886"
start_date: 2025-03-11
incident_type:
  - espionage
  - intrusion
  - pre-positioning
initial_vector: valid-creds
false_flag_risk: none
summary: |
  Mandiant attributes six variants of customized TINYSHELL backdoors deployed on Juniper Networks Junos OS routers to UNC3886, a China-nexus espionage group. The activity, discovered in mid-2024, targeted defense, technology and telecommunications organizations in the US and Asia. The actor gained privileged initial access by compromising legitimate credentials and abusing network authentication services (TACACS+) and terminal servers with access to the routers, then bypassed Junos Veriexec protection via process injection into a legitimate process (CVE-2025-21590) to run backdoors on end-of-life hardware. The backdoor variants (appid, to, irad, lmpad, jdosd, oemd) provided active and passive C2, with lmpad designed to disable logging and evade forensics during hands-on-keyboard operations.
