initial_vector: phishing
outcome_summary: |
  Joint advisory by CISA, FBI, and MS-ISAC characterizing Medusa
  ransomware as having affected over 300 victims across
  critical-infrastructure sectors since 2021 (as of February
  2025; Medusa first identified June 2021). Identifies medical,
  education, legal, insurance, technology, and manufacturing
  sector targeting. Initial-access tradecraft via phishing and
  exploitation of ScreenConnect (CVE-2024-1709) and Fortinet
  EMS SQL injection (CVE-2023-48788).
false_flag_risk: none
summary: |
  Joint CISA / FBI / MS-ISAC #StopRansomware advisory (AA25-071A,
  released 12 March 2025) characterizing the Medusa
  ransomware-as-a-service (RaaS) operation, first identified in
  June 2021. Per the advisory, Medusa originally operated as a
  closed variant (all development and operations controlled by a
  single group of threat actors) and later moved to an affiliate
  model with ransom negotiation still centrally controlled by the
  "Medusa actors"; it uses double-extortion via a data-leak site.
  The advisory explicitly states this Medusa ransomware variant is
  unrelated to the MedusaLocker variant and to the Medusa
  mobile-malware variant (per the FBI). AUSPEX records this as the
  canonical 2025-era US-government documentation of the Medusa RaaS
  operation. The advisory assigns Medusa no operator nation or
  state nexus — it is characterized purely as a
  financially-motivated cybercriminal RaaS of unstated origin.
