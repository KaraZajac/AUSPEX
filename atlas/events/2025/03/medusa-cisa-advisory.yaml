id: 2025-03/medusa-cisa-advisory
name: CISA AA25-071A — Medusa ransomware advisory
start_date: 2025-03-12
disclosure_date: 2025-03-12
end_date: 2025-03-12
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  Joint advisory by CISA, FBI, and MS-ISAC characterizing Medusa
  ransomware as having affected 300+ critical-infrastructure
  organizations across the US since 2021. Identifies medical,
  education, legal, insurance, technology, and manufacturing
  sector targeting. Initial-access tradecraft via phishing and
  exploitation of ScreenConnect (CVE-2024-1709) and Fortinet
  EMS SQL injection (CVE-2023-48788).
false_flag_risk: none
summary: |
  Medusa is the dominant ransomware brand of 2024–25 following
  the post-ALPHV / post-LockBit reshuffle and the April 2025
  disappearance of RansomHub. AUSPEX records this advisory as
  the canonical 2025-era US-government documentation of the
  Russian-tolerated ransomware ecosystem's continued operation
  despite the 2023–24 disruption arc.
