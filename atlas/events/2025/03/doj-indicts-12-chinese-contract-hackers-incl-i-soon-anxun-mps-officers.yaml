    Audited vs The Record (raw captured + sha256; tier=secondary journalism on the DOJ action).
    FACTS confirmed verbatim: 5 Mar 2025; 12 defendants = eight i-Soon (Anxun) employees + two MPS
    officers (SDNY, $10M reward for the 10) + two APT27 operators Yin Kecheng & Zhou Shuai (DDC,
    $2M each); i-Soon CEO Wu Haibo, COO Chen Cheng; hacker-for-hire ecosystem selling to "at least
    43 bureaus of [the] MPS [and the] MSS in at least 31 provinces" at $10k-$75k/inbox; victims =
    Treasury (2024), dissidents/critics, a large US religious org, foreign ministries of Taiwan/
