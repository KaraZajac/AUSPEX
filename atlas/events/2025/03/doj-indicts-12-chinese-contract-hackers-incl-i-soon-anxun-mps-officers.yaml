summary: |
  On 5 March 2025 the US DOJ unsealed charges against 12 Chinese nationals — eight employees of the ostensibly private PRC firm Anxun Information Technology (i-Soon), two officers of the Ministry of Public Security (MPS), and two members of APT27 (Silk Typhoon; Yin Kecheng and Zhou Shuai). The indictments describe i-Soon as a key node in the PRC hacker-for-hire ecosystem that conducted intrusions at the direction of the MSS/MPS and also sold stolen data to dozens of provincial MSS/MPS bureaus. This is the criminal-indictment counterpart to the February 2024 i-Soon document leak already in the corpus, formally tying the contractor model to PRC intelligence tasking and transnational repression.
