summary: |
  ESET disclosed an Operation DreamJob wave in which North Korea-aligned Lazarus targeted at least three European defense-industry companies in Central and Southeastern Europe — a metal-engineering firm, an aircraft-components manufacturer, and a defense contractor — several heavily involved in the unmanned aerial vehicle (UAV) sector, including a producer of UAV models currently deployed in Ukraine. Victims were lured with fake job offers carrying a trojanized PDF reader that deployed the ScoringMathTea RAT (with BinMergeLoader/MISTPEN-style and QuanPinLoader components). ESET assesses the primary goal was theft of proprietary information and UAV manufacturing know-how, aligning with DPRK efforts to scale domestic drone capability. Distinct from the 2022 Spain-aerospace LightlessCan event already in the corpus.
