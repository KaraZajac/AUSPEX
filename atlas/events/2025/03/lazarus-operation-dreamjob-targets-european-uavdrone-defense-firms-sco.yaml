id: 2025-03/lazarus-operation-dreamjob-targets-european-uavdrone-defense-firms-sco
name: "Lazarus Operation DreamJob targets European UAV/drone defense firms (ScoringMathTea)"
start_date: 2025-03-01
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
false_flag_risk: none
summary: |
  ESET disclosed an Operation DreamJob wave in which North Korea-aligned Lazarus targeted at least three European defense-industry companies in Central and Southeastern Europe — a metal-engineering firm, an aircraft-components manufacturer, and a defense contractor — several heavily involved in the unmanned aerial vehicle (UAV) sector, including a producer of UAV models currently deployed in Ukraine. Victims were lured with fake job offers carrying a trojanized PDF reader that deployed the ScoringMathTea RAT (with BinMergeLoader/MISTPEN-style and QuanPinLoader components). ESET assesses the primary goal was theft of proprietary information and UAV manufacturing know-how, aligning with DPRK efforts to scale domestic drone capability. Distinct from the 2022 Spain-aerospace LightlessCan event already in the corpus.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: "welivesecurity"
    attributing_org_confidence: high   # ESET: "we attribute this activity with a high level of confidence to Lazarus"
    attribution_level: named-actor   # ESET names Lazarus (North Korea-aligned); does NOT name the RGB unit (it only cites US authorities for the intel-service link)
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-23
    attribution_source_id: welivesecurity/2025-03_lazarus-operation-dreamjob-targets-europ
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/strategic-tech-collection
    program_id: kp/8th-congress-defense-plan/strategic-tech-collection/satellite-and-uav
    confidence: strongly_inferred
    reasoning: |
      Operation DreamJob targeting European defense firms heavily involved in the UAV/drone sector (including a producer of UAV models currently deployed in Ukraine) is strategic weapons-technology collection mapping to the satellite-and-UAV program of the 8th Congress 13-system plan. ESET states the suspected goal in substance — theft of UAV manufacturing know-how to "scale up [North Korea's] drone program" — but does not tie the activity to the 8th Congress defense plan or its 13-system list by name, so the doctrine linkage is strongly inferred rather than attested.
    attesting_source_id: welivesecurity/2025-03_lazarus-operation-dreamjob-targets-europ
    inference_basis:
      source_id: welivesecurity/2025-03_lazarus-operation-dreamjob-targets-europ
      signals:
        - "ESET: 'The suspected primary goal of the attackers was likely the theft of proprietary information and manufacturing know-how' (UAV-related)"
        - "ESET: campaign 'may be linked to North Korea's current efforts to scale up its drone program'; targets are aerospace/defense firms, ≥2 in UAV technology, one producing UAV models 'currently employed in Ukraine'"
        - "ESET: 'North Korea has relied heavily on reverse engineering and intellectual property theft to develop its domestic UAV capabilities' (Saetbyol-4 ≈ RQ-4 Global Hawk; Saetbyol-9 ≈ MQ-9 Reaper)"
      ruled_out: "the 8th Congress defense plan / 13-system weapons-development goal by name — ESET frames it as NK's general 'drone program', not the specific 2021 five-year plan; revenue/financial motive ruled out (ESET assesses espionage / know-how theft, not financial gain)"
    counter_explanation: null
    contested: false
    analyst: claude
