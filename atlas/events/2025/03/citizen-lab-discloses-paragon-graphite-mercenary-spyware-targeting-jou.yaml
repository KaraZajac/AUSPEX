initial_vector: 0-day
false_flag_risk: none
summary: |
  Citizen Lab published the first technical look at Paragon Solutions' Graphite spyware, an Israeli firm founded by ex-PM Ehud Barak and former Unit 8200 commander Ehud Schneorson. WhatsApp notified ~90 journalists and civil-society members of a zero-click Graphite campaign (notification 2025-01-31). Three Italian WhatsApp-notified targets came forward: Fanpage.it editor Francesco Cancellato, and migrant-rescue activists Luca Casarini and Giuseppe "Beppe" Caccia (Mediterranea Saving Humans); Citizen Lab forensically confirmed Graphite (BIGPRETZEL) on two of the three Android devices — Caccia's (traces 2024-12-22 to 2025-01-31) and Casarini's (2024-12-23) — while Cancellato was notified/targeted but his device showed no confirmed traces in this report. Italy is an acknowledged Paragon customer (AISE external-intelligence director confirmed agency use of Graphite while denying it spied on the journalists/activists), but Citizen Lab does not attribute this specific targeting to any Italian agency; the attribution here is to the vendor. A new Israeli commercial-spyware actor extending the IL slice beyond Predatory Sparrow / Mossad and the QME / counter-Iran doctrines toward export-led offensive capability.
