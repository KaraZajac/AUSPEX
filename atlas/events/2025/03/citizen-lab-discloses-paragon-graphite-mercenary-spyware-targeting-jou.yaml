    ATTRIBUTION: vendor-cluster attribution to il/paragon is correct and matches the source ("strong circumstantial evidence" + WhatsApp confirms BIGPRETZEL = Paragon). CUSTOMER state correctly NOT over-attested: Italy is an acknowledged Paragon customer, but AISE's director DENIED spying on the journalists/activists and Citizen Lab does not attribute this targeting to any Italian agency. confidence moderate is conservative-defensible; added attribution_level named-actor (vendor named, not customer state).
