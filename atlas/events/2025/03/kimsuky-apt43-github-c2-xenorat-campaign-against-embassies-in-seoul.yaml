id: 2025-03/kimsuky-apt43-github-c2-xenorat-campaign-against-embassies-in-seoul
name: "Kimsuky (APT43) GitHub-C2 XenoRAT campaign against embassies in Seoul"
start_date: 2025-03-01
incident_type:
  - espionage
  - surveillance
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Trellix documented a spear-phishing campaign (March–July 2025, at least 19 attacks in three phases) against foreign embassies in Seoul — generally European facilities — using multilingual lures (Korean, English, Persian, Arabic, French, Russian) with fake meeting invites and official letters timed to real diplomatic events. Password-protected ZIPs (delivered from Dropbox, Google Drive, or Daum) hid LNK files disguised as PDFs that ran obfuscated PowerShell to fetch a XenoRAT variant from GitHub or Dropbox, with GitHub abused as a covert C2 channel, enabling keylogging, screenshots, webcam/mic access, file transfer, and remote shell. ATTRIBUTION CAVEAT: Trellix attributes to Kimsuky/APT43 only at medium confidence (TTP, infrastructure, and IOC overlap with prior Kimsuky campaigns) and hypothesizes possible Chinese sponsorship/involvement (attacker working hours and holiday pauses align with a China-based actor rather than Korean holidays). The source names only "Kimsuky / APT43 / North Korean" — it does NOT name the RGB; the kp/rgb/kimsuky placement follows the actor record (OFAC 2023 / dossier consensus), not this source. The doctrine link is held at strongly_inferred (the source states no collection purpose). (Trellix primary returned 403; verified via Bleeping Computer reporting on the Trellix research.)
