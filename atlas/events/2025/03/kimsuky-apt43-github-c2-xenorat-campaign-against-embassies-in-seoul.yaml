  notes: "Audited vs BleepingComputer reporting on Trellix research (raw captured, HTTP 200; Trellix primary 403). FACTS confirmed: March–July 2025, >=19 spear-phishing attacks in 3 phases, embassies in Seoul (generally European), multilingual lures (KO/EN/FA/AR/FR/RU), password-protected ZIPs from Dropbox/Google Drive/Daum, LNK-as-PDF -> PowerShell -> XenoRAT from GitHub/Dropbox, GitHub-as-C2, keylog/screenshot/webcam/mic/remote-shell. ATTRIBUTION: source names ONLY Kimsuky/APT43/North Korean at 'medium confidence' and raises a competing China-based hypothesis (timezone + Chinese-holiday pauses) — the RGB is NOT named here; kp/rgb/kimsuky retained per the actor record (OFAC 2023 / dossier / MISP-galaxy). CORRECTIONS: published_on 2025-03-01 -> 2025-08-18 (article datePublished; 2025-03-01 was a backfill placeholder = campaign start); attribution_date -> 2025-08-18; attributing_org_confidence low -> moderate (source says 'medium confidence'; the old 'mapped from plausible' comment conflated the ICD confidence scale with the doctrine-link scale); added attribution_level named-actor; attributing_org -> Trellix (via BleepingComputer). doctrine_link held at strongly_inferred (diplomatic embassy collection is the single dominant strategic reading; source states no purpose, so not attested). actor_id resolves, not stale. Fixed summary's stray 'plausible' (it had described the attribution caveat, not the doctrine-link confidence)."
