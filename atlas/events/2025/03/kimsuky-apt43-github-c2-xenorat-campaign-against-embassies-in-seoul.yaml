summary: |
  Trellix documented a spear-phishing campaign (March–July 2025) against foreign embassies in Seoul — generally European facilities — using multilingual lures (Korean, English, Persian, Arabic, French, Russian) with fake meeting invites and official letters. Password-protected ZIPs hid LNK files that deployed a XenoRAT variant, with GitHub abused as a covert C2 channel and Dropbox/Daum for delivery, enabling keylogging, screenshots, webcam/mic access, and remote shell. ATTRIBUTION CAVEAT: Trellix attributes to Kimsuky/APT43 only at medium confidence and hypothesizes possible Chinese sponsorship/involvement (attacker working hours and holiday pauses align with a China-based actor) — hence 'plausible' rather than attested. Not currently in the corpus. (Trellix primary returned 403; verified via Bleeping Computer reporting on the Trellix research.)
