summary: |
  ESET detailed Operation FishMedley, a 2022 global espionage campaign by the FishMonger APT group, which ESET independently assessed is operated by the Chinese contractor I-SOON (corroborated by the US DOJ's March 2025 indictment of I-SOON employees). Across January to October 2022 the operators compromised seven high-profile organizations including governments, NGOs, Catholic/religious organizations and geopolitical think tanks in Taiwan, Hungary, Turkey, Thailand, the United States and France. They deployed modular backdoors such as ShadowPad, SodaMaster, Spyder and RPipeCommander alongside Cobalt Strike and custom credential-stealing and reconnaissance utilities. ESET was unable to identify the initial compromise vectors.
