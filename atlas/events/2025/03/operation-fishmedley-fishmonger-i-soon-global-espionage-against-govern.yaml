id: 2025-03/operation-fishmedley-fishmonger-i-soon-global-espionage-against-govern
name: "Operation FishMedley — FishMonger (I-SOON) global espionage against governments, NGOs and think tanks"
start_date: 2025-03-20
incident_type:
  - espionage
  - intrusion
  - data-theft
false_flag_risk: none
summary: |
  ESET detailed Operation FishMedley, a 2022 global espionage campaign by the FishMonger APT group, which ESET independently assessed is operated by the Chinese contractor I-SOON (corroborated by the US DOJ's March 2025 indictment of I-SOON employees). Across January to October 2022 the operators compromised seven high-profile organizations including governmental organizations, NGOs, Catholic organizations/charities and a geopolitical think tank in Taiwan, Hungary, Turkey, Thailand, the United States and France. They deployed modular backdoors such as ShadowPad, SodaMaster, Spyder and RPipeCommander alongside Cobalt Strike and custom credential-stealing and reconnaissance utilities. ESET was unable to identify the initial compromise vectors.
