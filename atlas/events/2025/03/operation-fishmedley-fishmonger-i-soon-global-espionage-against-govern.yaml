    misleading inline comment that conflated org-confidence with a nonexistent "attested" link.
    published_on 2025-03-20 = byline "20 Mar 2025" (Matthieu Faou). DOCTRINE LINK left at
    confidence: plausible with attesting_source_id: null — correct: ESET states no strategic
    purpose at the NIL compelled-contractor goal level (it only notes victims are "of obvious
