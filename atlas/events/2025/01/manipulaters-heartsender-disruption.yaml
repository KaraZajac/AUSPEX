name: FBI/Dutch seizure + Pakistan NCCIA arrests of 'The Manipulaters' / HeartSender (Saim Raza)
start_date: 2025-01-29   # seizure executed 2025-01-29 (Krebs: "On January 29, the FBI and the Dutch national police seized")
disclosure_date: 2025-01-30   # DOJ OPA press release dated Thursday, January 30, 2025
end_date: 2025-05-16   # Pakistan NCCIA raids/arrests in Lahore + Multan on May 15-16, 2025 (Krebs)
