id: 2025-01/manipulaters-heartsender-disruption
name: FBI + Dutch + Pakistani action against The Manipulaters / HeartSender
start_date: 2025-01-30
disclosure_date: 2025-01-30
end_date: 2025-05-13
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US FBI + Dutch National Police + Pakistani Federal
  Investigation Agency seized approximately 100 domains
  operated by "The Manipulaters" (HeartSender) — a
  Pakistan-based BEC and phishing-malware-as-a-service
  operation active since 2010. The Manipulaters' HeartSender,
  FudPage, FudTools, and adjacent phishing-kit marketplaces
  were the leading English-language phishing-kit vendors of
  the 2018–2024 period. Pakistani FIA followed in May 2025
  with arrests of 21 personnel. Operation rested heavily on
  preceding journalism (Krebs investigations 2021, 2024)
  that exposed the operators' real identities.
false_flag_risk: none
summary: |
  The Manipulaters / HeartSender takedown is the canonical
  case of Pakistani cooperation with Western cybercrime
  enforcement on a major BEC-tooling vendor — distinct from
  the Russia / Ukraine pattern that dominates the corpus.
  AUSPEX classifies as criminal-baseline.
