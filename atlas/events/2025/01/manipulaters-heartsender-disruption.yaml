initial_vector: unknown   # law-enforcement counter-action against adversary infrastructure
outcome_summary: |
  On January 29, 2025 the US DOJ/FBI and the Dutch National Police
  seized 39 domains and their associated servers operated under the
  communal pseudonym "Saim Raza" (aka HeartSender / "The Manipulaters"),
  a Pakistan-based network of online marketplaces selling phishing kits
  and other fraud-enabling tools; DOJ announced the action on January 30.
  Per the DOJ affidavit, Saim Raza had run the seized sites since at
  least 2020, selling tools to transnational organized-crime groups that
  used them for business email compromise (BEC), causing over $3 million
  in US victim losses. HeartSender, FudPage and FudTools advertised
  phishing kits targeting users of Microsoft 365, Yahoo, AOL, Intuit,
  iCloud and ID.me; Dutch authorities said the seized servers held
  millions of victim records worldwide, including at least 100,000
  pertaining to Dutch citizens. KrebsOnSecurity had tracked the group
  since May 2015 and, in 2021 and 2024 investigations, exposed the
  operators behind the Lahore front company WeCodeSolutions. In May 2025
  Pakistan's National Cyber Crime Investigation Agency (NCCIA) arrested
  21 people — including alleged ringleader Rameez Shahzad, who used the
  "Saim Raza" alias — in raids in Lahore's Bahria Town and Multan on
  May 15-16.
false_flag_risk: none
summary: |
  A BEC / phishing-kit-as-a-service takedown: a US/Dutch domain-and-
  server seizure (Jan 2025) followed months later by Pakistani NCCIA
  arrests of the operators (May 2025). Notable as a rare instance of
  Pakistani law-enforcement action against a domestic cybercrime vendor
  following a Western disruption (the January action was FBI + Dutch
  only — no joint Pakistani participation is stated) — distinct from the
  Russia / Ukraine pattern that dominates the corpus. AUSPEX classifies
  as criminal-baseline.
