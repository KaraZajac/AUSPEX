id: 2025-01/treasury-salt-typhoon-sanctions
name: Treasury OFAC sanctions on Salt Typhoon contractor (Sichuan Juxinhe / Yin Kecheng)
start_date: 2025-01-17
disclosure_date: 2025-01-17  # Treasury press release
end_date: 2025-01-17
incident_type:
  - documentary  # policy / sanctions action; not a cyber op
initial_vector: unknown
outcome_summary: |
  OFAC SDN listing of Sichuan Juxinhe Network Technology and
  individual Yin Kecheng — a PRC MSS-linked contractor enabling Salt
  Typhoon operations against US telecoms. Cost imposition under NCS
  2023 Pillar 2 (disrupt and dismantle).
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Administrative event — not a cyber operation — modeled in the
  AUSPEX atlas because it is the canonical exercise of cost-
  imposition policy under NCS 2023 Pillar 2 against a PRC MSS
  contractor. Treasury identifies Sichuan Juxinhe Network
  Technology as the MSS-linked contractor enabling Salt Typhoon's
  2023-2024 intrusions into US telecom carriers (AT&T, Verizon,
  T-Mobile, Lumen, others) and into the CALEA lawful-intercept
  systems used for court-authorized wiretaps. Salt Typhoon
  tradecraft per CISA / FBI / NSA reporting includes living off
  the land on Cisco IOS routers and Windows hosts, exploitation
  of unpatched network-edge devices, valid-credentials abuse and
  credential dumping inside telecom NOC environments, the
  JumbledPath custom router implant, and selective access to the
  lawful-intercept portal to surveil US political-campaign targets
  and senior officials.
