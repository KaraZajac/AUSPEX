id: 2025-01/treasury-salt-typhoon-sanctions
name: Treasury OFAC sanctions on Salt Typhoon contractor (Sichuan Juxinhe / Yin Kecheng)
start_date: 2025-01-17
disclosure_date: 2025-01-17  # Treasury press release
end_date: 2025-01-17
incident_type:
  - documentary  # OFAC sanctions designation (paper counter-action)
  - policy       # a sanction is a US cost-imposition policy action; both meta types (cf. sibling 2025-01/ofac-flax-typhoon-integrity-tech)
initial_vector: unknown  # meta counter-action (OFAC paper designation) — no initial-access vector applies
outcome_summary: |
  OFAC SDN listing (pursuant to E.O. 13694, as further amended) of two
  parties: Sichuan Juxinhe Network Technology Co., Ltd. — a
  Sichuan-based company OFAC states had "direct involvement in the Salt
  Typhoon cyber group" and in "the exploitation of these U.S.
  telecommunication and internet service provider companies," and with
  which "the MSS has maintained strong ties" — and Yin Kecheng, a
  Shanghai-based cyber actor OFAC states "is affiliated with the
  People's Republic of China Ministry of State Security (MSS)" and who
  was associated with the recent compromise of Treasury's Departmental
  Offices network. AUSPEX maps this cost-imposition action to NCS-2023
  Pillar 2 (disrupt-and-dismantle); the release itself cites only E.O.
  13694 authorities, not NCS-2023.
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Administrative counter-action — not a cyber operation — modeled in
  the AUSPEX atlas as a US cost-imposition action against the PRC
  cyber-services ecosystem behind Salt Typhoon. In a single action
  (OFAC press release jy2792), Treasury designated two parties under
  E.O. 13694 (as further amended by the new E.O. on Strengthening and
  Promoting Innovation in the Nation's Cybersecurity): (1) Sichuan
  Juxinhe Network Technology Co., Ltd., a Sichuan-based cybersecurity
  company that OFAC states had "direct involvement in the Salt Typhoon
  cyber group" and in "the exploitation of these U.S. telecommunication
  and internet service provider companies," and with which "the MSS has
  maintained strong ties"; and (2) Yin Kecheng, a Shanghai-based cyber
  actor OFAC states "is affiliated with the People's Republic of China
  Ministry of State Security (MSS)" and who was associated with the
  recent compromise of Treasury's Departmental Offices network. Per
  OFAC, Salt Typhoon has "been active since at least 2019" and recently
  "compromised the network infrastructure of multiple major U.S.
  telecommunication and internet service provider companies." (The
  specific carrier victims and Salt Typhoon's detailed tradecraft are
  documented in the cn/mss/salt-typhoon actor record and its CISA / FBI
  / Cisco sources — NOT in this OFAC release, this event's sole cited
  source.)
