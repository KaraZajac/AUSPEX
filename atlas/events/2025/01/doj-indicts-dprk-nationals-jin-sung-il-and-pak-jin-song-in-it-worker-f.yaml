    Audited vs The Hacker News (raw HTML captured + hashed) and cross-checked against the DOJ OPA primary (justice.gov 403; verified via globalsecurity.org mirror dprk-250123-doj01 + DOJ OPA release). FACTS confirmed: 5 defendants (Jin Sung-Il, Pak Jin-Song; facilitators Alonso De Los Reyes [arrested NL 10 Jan 2025], Ntekereze Prince, Ashtor); April 2018–Aug 2024; >=64 US companies; ten generated >=$866,255 laundered through a Chinese bank account; charges CFAA/wire+mail-fraud/money-laundering/false-ID + IEEPA for Jin & Pak; 20-yr max. CORRECTED a factual error: summary claimed this was "the first indictment to charge actual DPRK nationals" — false; the Dec 2024 DOJ indictment (doj/2024-12-12_14-national-it-worker-indictment, already in corpus) charged 14 DPRK nationals first, and the THN article itself says so. Reframed to "names individually-identified DPRK nationals, follows the Dec 2024 14-national indictment."
    ATTRIBUTION: DOJ names NO specific operating ministry/service — only "the DPRK"/"the regime." DOJ mentions the "North Korean Ministry of Defense" only as an example of "designated entities... involved in the DPRK's WMD programs," i.e. an illustrative beneficiary of the broader phenomenon, not the operator of this charged conspiracy. -> attribution_level set to `nation` (was missing); AUSPEX's mapping to the kp/it-worker-fraud cluster is a modeling choice, noted inline. Fixed attributing_org from bare "thehackernews" to "U.S. DOJ (per The Hacker News reporting)" — DOJ is the attributing authority; THN is the cited reporting. Removed a misleading inline comment ("mapped from ICD link-confidence: attested") that contradicted the strongly_inferred doctrine link. confidence high retained (govt indictment naming individual defendants).
    published_on: corrected the SOURCE from 2025-01-23 to 2025-01-24 (THN byline "Jan 24, 2025"); the indictment/attribution date stays 2025-01-23 (start_date, attribution_date) — DOJ "on Thursday" = 23 Jan 2025 (Thursday).
    DOCTRINE LINK: kp/office-39-sanctions-evasion/laundering-network @ strongly_inferred retained (NOT upgraded). The cited source (THN) names only the proximate purpose — "generate revenue for the DPRK," "circumvent sanctions," wages "funneled back... to serve the regime's priorities," laundered through a Chinese bank — which the laundering-network pillar specializes; per the WHY ladder a source naming only revenue/sanctions-evasion is strongly_inferred, not attested. (The DOJ primary's "including its weapons programs" language edges toward the goal-in-substance, but DOJ is not a cited source on this event and even it caveats the ministry reference; conservatively left at strongly_inferred. To reach `attested` would require citing the DOJ primary AND tagging the WMD-procurement doctrine.) attesting_source_id correctly null.
    ACTOR: kp/it-worker-fraud resolves, status sanctioned, all 4 actor-source FKs resolve; not stale. NB the actor file asserts a Munitions Industry Dept / Min. of External Economic Relations owner per OFAC sb0416 — that bureaucratic-owner claim is sourced in the actor record, not by THIS indictment, so it does not lift this event's attribution_level above `nation`.
