summary: |
  On 23 January 2025 DOJ unsealed an indictment charging two North Korean nationals — Jin Sung-Il and Pak Jin-Song — plus three facilitators (Mexican national Pedro Ernesto Alonso De Los Reyes and U.S. citizens Erick Ntekereze Prince and Emanuel Ashtor) for a multi-year (April 2018–August 2024) fraudulent remote-IT-worker scheme. Using forged/stolen identities, laptop farms, and remote-access software, they obtained work from at least 64 U.S. companies; ten generated at least $866,255 laundered through a Chinese bank account. Charges include CFAA, wire/mail-fraud, money-laundering, false-ID, and (for Jin/Pak) IEEPA sanctions violations. This is the first indictment to charge actual DPRK nationals in the IT-worker scheme — distinct from the facilitator-only entries already in the corpus. (Govt primary justice.gov returned 403; verified via The Hacker News reporting on the DOJ release.)
