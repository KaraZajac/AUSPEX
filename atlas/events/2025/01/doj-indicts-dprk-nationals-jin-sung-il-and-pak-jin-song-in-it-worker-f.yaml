summary: |
  On 23 January 2025 DOJ unsealed an indictment charging two North Korean nationals — Jin Sung-Il and Pak Jin-Song — plus three facilitators (Mexican national Pedro Ernesto Alonso De Los Reyes, who used his own identity for Jin and was arrested in the Netherlands on 10 Jan 2025, and U.S. citizens Erick Ntekereze Prince and Emanuel Ashtor) for a multi-year (April 2018–August 2024) fraudulent remote-IT-worker scheme. Using forged/stolen identities, U.S.-based laptop farms (Ashtor's North Carolina residence), and remote-access software (AnyDesk, TeamViewer) while logging in from China and Russia, they obtained work from at least 64 U.S. companies; payments from ten of those companies generated at least $866,255 in revenue, most of which was laundered through a Chinese bank account. Charges include conspiracy to damage a protected computer (CFAA), wire/mail-fraud, money-laundering, and false-ID; Jin and Pak are additionally charged with conspiracy to violate the IEEPA sanctions regime. DOJ frames the scheme as funding "the North Korean regime's priorities, including its weapons programs," but names no specific operating ministry/service — only "the DPRK"/"the regime." This indictment names individually-identified DPRK nationals (Jin, Pak) in a discrete $866K conspiracy; it follows the Dec 2024 indictment of 14 DPRK nationals, which first charged North Korean nationals in the IT-worker scheme. (Govt primary justice.gov returned 403; verified via The Hacker News reporting and cross-checked against the DOJ OPA release.)
