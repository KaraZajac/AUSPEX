summary: |
  Unit 42 disclosed CL-STA-0048, an espionage campaign against South Asian entities including a telecommunications organization and government employees. The threat actor gained access by exploiting unpatched internet-facing services (IIS, Apache Tomcat and MSSQL servers) and then deployed PlugX backdoors and Cobalt Strike, using a novel 'Hex Staging' technique to deliver payloads. Objectives included stealing personal information of government employees and other sensitive data, with DNS-based exfiltration and database credential theft observed. Unit 42 noted infrastructure and tooling overlaps with the China-nexus DragonRank group and assessed with moderate-high confidence that the activity originates in China.
