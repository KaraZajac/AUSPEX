  notes: |
    Audited vs the Unit 42 report (raw snapshot already on disk; content_sha256
    c259b2bd29f31203f8f95cccc6873e3c4a1a48f22546d71eeaca5b4c3a6e7fde re-verified — matches).
    FACTS confirmed verbatim: South Asian high-value targets incl. a telecommunications org;
    initial access via unpatched public-facing IIS / Apache Tomcat / MSSQL; PlugX backdoors +
    Cobalt Strike; "Hex Staging" payload-chunking; exfiltration over DNS (ping); SQLcmd/database
