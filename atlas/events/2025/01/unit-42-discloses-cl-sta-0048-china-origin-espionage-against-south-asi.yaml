    NOT over-claimed: source says "a cluster of activity that we track as CL-STA-0048" and "we
    assess with moderate-high confidence that this activity originates in China" — nation-level +
    activity-cluster; it NEVER names the MSS/Ministry of State Security (0 hits; every "MSS" in the
    text is "MSSQL"). DragonRank overlap explicitly tentative ("We lack sufficient data on DragonRank
    to definitively link it to CL-STA-0048"). Added attribution_level: nation (was missing); actor
    cn/unscoped/cl-sta-0048 already correctly demoted from cn/mss on 2026-06-24, FK resolves.
    CORRECTIONS: published_on was placeholder 2025-01-01 -> actual 2025-01-29 (byline Lior Rochberger
    & Yoav Zemah, "Published: January 29, 2025"); fixed source.published_on and event.attribution_date
    to 2025-01-29; added disclosure_date 2025-01-29. start_date left at 2025-01-01 best-estimate (op
    start undated in source). doctrine_links: strongly_inferred (NOT attested) is honest — the report
    states the op "bear[s] the hallmarks of a nation-state APT espionage operation" but never names a
    BRI / partner-country-political-intelligence purpose (Belt/Road absent); attesting_source_id null
    is correct, no downgrade needed. pillar cn/bri/political-intelligence-collection FK resolves.
