id: 2025-01/banished-kitten-iran-international-journalists
name: Banished Kitten / Handala targets Iran International journalists with Telegram malware
start_date: 2025-01-01
disclosure_date: 2025-07-30
end_date: 2025-01-31
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Coordinated cyberattacks in summer 2024 and January 2025
  targeted staff at Iran International — the London-based
  Persian-language diaspora-media outlet — using malware-laced
  Telegram messages to infect staff devices. The operation was
  attributed to Banished Kitten / Storm-0842 / Dune / Handala
  by Western intelligence and vendor analysts. In July 2025
  Iran International confirmed that materials published by
  Iranian state outlets originated from these compromises.
  Iran International's August 2025 reporting named Yahya
  Hosseini Panjkhi, a Ministry of Intelligence officer, as the
  head of the responsible cyber unit.
false_flag_risk: suspected  # operating behind Handala persona
summary: |
  Canonical example of the cyber-deniable-retaliation diaspora-
  targeting pillar — a sustained credential-and-device-compromise
  campaign against a major Persian-language diaspora-media outlet,
  with subsequent state-media exploitation of the stolen material
  for influence operations against the outlet's staff and
  audience. The naming of a specific MOIS officer in Iran
  International's August 2025 reporting closes the persona-laundering
  loop on the Handala / Banished Kitten cluster: persona at the
  top, named MOIS officer at the bottom.
