id: 2025-01/banished-kitten-iran-international-journalists
name: Banished Kitten / Handala targets Iran International journalists with Telegram malware
start_date: 2025-01-01  # January 2025 intrusion wave (month-precision; sources say "January 2025"). Summer-2024 precursor wave folded into prose — see qc [c].
disclosure_date: 2025-07-09  # CPJ, earliest cited source (metadata datePublished 2025-07-09T17:37:50Z)
end_date: 2025-01-31  # January 2025 intrusion wave close (month-precision)
incident_type:
  - intrusion
  - data-theft
  - surveillance
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Two coordinated cyberattacks — one in summer 2024 and one in
  January 2025 — targeted current and former staff at Iran
  International, the London-based Persian-language diaspora
  broadcaster, using malware-laced Telegram messages to infect
  staff devices (CPJ, 9 July 2025). Iran International, on its own
  investigation, attributed the operation to Banished Kitten (also
  tracked as Storm-0842 / Dune / Handala) — identifying it as a
  cyber unit of Iran's Ministry of Intelligence (MOIS) Domestic
  Security Directorate; CPJ and DW Persian relayed the attribution.
  In July 2025 Iran International confirmed that materials published
  by Iranian state outlets came from the summer-2024 and
  January-2025 hacks, and that a July 2025 operation published
  personal documents, private images, and editorial-meeting
  screenshots to intimidate journalists. Iran International's
  15 August 2025 reporting named Yahya Hosseini Panjaki (CPJ
  spelling: Panjkhi), the ministry's deputy for domestic security,
  as the official supervising the unit — reporting that he was
  US-sanctioned in 2024 over alleged plots to assassinate Iranian
  dissidents abroad (his identity first exposed by Iran
  International in July 2024) and that he founded a MOIS "Qassem
  Soleimani Headquarters" coordinating with the IRGC on overseas
  operations — and named two alleged operatives (Ali Bermoudeh, a
  former FATA cyber-police contractor, and his MOIS handler Morteza
  Aftabifar). Staff lawyers reported
  45 journalists and 315 of their relatives threatened — some with
  death threats to force resignations — and Iran International filed
  an urgent appeal to UN experts. CPJ framed the campaign as Iran's
  "transnational repression of the press."
false_flag_risk: suspected  # Handala persona presents as Palestinian hacktivist over an MOIS unit — see actor ir/mois/handala
summary: |
  Sole corpus home for the Iran-International-targeting campaign and
  an archetypal cyber-deniable-retaliation diaspora-targeting case —
  a sustained device-and-account-compromise campaign against the
  highest-profile Persian-language diaspora broadcaster, with
  subsequent state-media exploitation of the stolen material for
  influence operations against the outlet's staff and audience. The
  naming of a specific MOIS unit (Domestic Security Directorate /
  Banished Kitten), a supervising MOIS deputy, and two alleged
  operatives in Iran International's August 2025 reporting closes the
  persona-laundering loop on the Handala / Banished Kitten cluster:
  Palestinian-hacktivist persona at the top, named MOIS personnel at
  the bottom.
