      its attribution paragraph names the Ministry of Intelligence — an
      internal IRGC/MOIS wobble; the specific-unit attribution (MOIS) is
      the one both sources carry. CPJ cites DW Persian and Iran
      International, so this attribution shares a single evidentiary root
      with the Iran International record above (not an independent second
      IC assessment).
