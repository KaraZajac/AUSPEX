    program_id: null
    confidence: plausible
    reasoning: |
      The post-Soleimani journalist-targeting pillar explicitly
      enumerates Iran International in its target cohort, and Iran
      International reports that the supervising MOIS deputy (Panjaki)
      "founded a 'Qassem Soleimani Headquarters' within the ministry,
      coordinating with the Islamic Revolutionary Guard Corps on
      overseas operations" — a genuine Soleimani-named, MOIS-IRGC
      overseas-ops nexus at the top of this unit. Kept at plausible (not
      strongly_inferred/attested): that Soleimani nexus is biographical/
      structural — neither source states that the Iran International
      targeting itself was motivated by avenging Soleimani, and the
      post-Soleimani-retaliation doctrine is built on IRGC / IRGC-IO
      activity (APT35 / APT42; the DOJ IRGC-trio indictment) whereas
      this operation's attributed operator is MOIS. The
      cyber-deniable-retaliation/diaspora-targeting pillar above is the
      primary, better-fitting home for this MOIS press-repression
      campaign — see qc FLAG.
    attesting_source_id: null
    inference_basis:
      signals:
        - "The post-Soleimani journalist-targeting pillar names 'Iran International' explicitly in its enumerated target cohort."
        - "The supervising MOIS deputy (Panjaki) founded a MOIS 'Qassem Soleimani Headquarters' coordinating with the IRGC on overseas operations (Iran International, 15 Aug 2025) — a Soleimani-named MOIS-IRGC overseas-ops structure over this unit."
        - "Cohort/method overlap: persistent targeting of Persian-language diaspora journalists who cover the Iranian security state."
      ruled_out: "A post-Soleimani revenge MOTIVE for this specific operation is not stated in either source — the Soleimani reference is the name of an MOIS HQ founded by the supervising deputy, and the sources frame the campaign as general press repression / transnational repression; the operator is MOIS, not the IRGC service the doctrine is built on — so the link is structural, not source-attested to a Soleimani-revenge purpose."
