    Audited vs Proofpoint "Around the World in 90 Days: State-Sponsored Actors Try ClickFix" (raw captured + sha256). FACTS all corroborated: Jan-Feb 2025 first sighting; ClickFix social-engineering (spoofed meeting request -> rapport -> attacker-controlled site -> PowerShell -> multistage PowerShell/VBS/batch chain -> QuasarRAT); "fewer than five organizations in the think tank sector" working on North Korean affairs; Iran TA450/MuddyWater + Russia TA422/APT28 & UNK_RemoteRogue also trialled ClickFix. ATTRIBUTION: this source does NOT name the RGB (zero "Reconnaissance General Bureau"/"RGB" in raw) — Proofpoint says only "state-sponsored", North Korean, "TA427 overlaps... Kimsuky or Emerald Sleet", attributed on infrastructure overlap/TTPs/malware. Corrected attributing_org to stop asserting the RGB to this source; actor_id kp/rgb/kimsuky KEPT (RGB per OFAC 2023 + Mandiant, in the actor dossier) with a clarifying note. Added attribution_level: named-actor. published_on / attribution_date corrected 2025-01-01 -> 2025-04-16 (article:published_time; backfill placeholder fixed); id/slug retain 2025-01 (stable). doctrine_link strongly_inferred to kp/strategic-information/policy-collection with attesting_source_id: null is honest — Proofpoint states the targeting behaviour but not the strategic purpose at goal level, so attested would be wrong; no downgrade needed. Source kind industry->vendor-research, title/publisher de-editorialized.
