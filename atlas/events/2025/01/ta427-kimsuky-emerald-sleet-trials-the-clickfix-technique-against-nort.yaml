summary: |
  Proofpoint reported that in January-February 2025 TA427 — which Proofpoint says overlaps with activity third parties call Kimsuky or Emerald Sleet — first adopted the ClickFix social-engineering technique against fewer than five think-tank organisations working on North Korean affairs. Operators built rapport via spoofed meeting requests, then directed targets to attacker-controlled sites to run a PowerShell command; one multistage chain ultimately delivered QuasarRAT. The same report shows Iranian (TA450/MuddyWater) and Russian (TA422/APT28, UNK_RemoteRogue) actors trialling ClickFix.
