    published_on 2025-01-22; title claimed "...Russian and Belarusian Adjacent
    Organizations"). Web-verified there is NO distinct Jan-2025 Securelist Angry
    Likho article: the only real Kaspersky Angry Likho report is securelist 115663
    "Angry Likho: Old beasts in a new forest" / "New wave of targeted attacks of
    the Angry Likho APT on Russian organizations" (datePublished 2025-02-21,
    dateModified 2025-05-13). Both the phantom Jan record's snapshot AND the real
    Feb record resolve to THIS same 115663 page. Re-pointed sources[] +
    attribution_source_id to the real, already-existing kaspersky/2025-02-21_angry-
    likho-lumma-russian-orgs (snapshot captured: sha256 64de4d17...65c3ca05,
    226956 B; the phantom Jan snapshot kaspersky__2025-01_angry-likho-overview.html
    = c9ea8305...fa4aabcc, 226687 B, is the same article, hash re-verified).
    [a] FACTS -- CORRECTED; both prior distinctive facts were fabricated/inverted:
      * Prior "targeting Ukrainian state institutions" -> raw has ZERO "Ukraine"
        hits. Kaspersky: "We've identified hundreds of victims of this attack in
        Russia, several in Belarus ... the attackers are primarily targeting
        organizations in Russia and Belarus"; "government institutions in Russia
        ... [and] their contractors are the primary targets of this campaign."
        Rewrote to Russia/Belarus government targeting.
      * Prior "continued reliance on Remcos RAT" -> raw has ZERO "Remcos" hits.
        Real payload: Lumma stealer via obfuscated AutoIt (Child.pif / i.a3x) in a
        Nullsoft NSIS self-extracting archive; implant "In June 2024, we discovered
        a very interesting implant ... FrameworkSurvivor.exe"; "in January 2025 ...
        a new surge in activity, as reported by our colleagues from F6 (previously
        ... F.A.C.C.T.)." Rewrote.
      * Prior "reaffirmation of Belarusian / Russian-Belarusian alignment" -> FALSE:
        Belarus is a VICTIM; Kaspersky infers operators are "likely native Russian
        speakers" and names no sponsor. Removed.
    [b] ATTRIBUTION -- Kaspersky "attribute[s] this campaign to the APT group Angry
      Likho with a high degree of confidence" = activity-cluster, high confidence;
      NO nation/service named. Set attribution_level=activity-cluster (was absent),
      attributing_org_confidence high (was moderate); rewrote notes to record that
      the UAC-0050 equation is AUSPEX's overlapping-cluster call (not Kaspersky's)
      and that victimology is OPPOSITE the CERT-UA UAC-0050 Ukrainian profile.
      attribution_date 2025-01-20 -> 2025-02-21 (real publication).
    [c] DATES -- disclosure_date 2025-01-20 -> 2025-02-21 (real datePublished).
      start_date 2024-06-01 kept (June-2024 FrameworkSurvivor implant, source-
      carried). end_date 2024-12-31 -> 2025-01-31 (documented Jan-2025 surge, IoCs
      "in preparation since at least January 16, 2025"; group "continuing" so open-
      ended in substance).
    [d] DOCTRINE_LINKS -- REMOVED the sole link by/union-state-integration/ukraine-
      theater-support (was strongly_inferred). INVERTED + unsupported: that pillar
      encodes Belarus supporting Russia's war ON Ukraine, but this operation attacks
      Russian/Belarusian government orgs. No source states any strategic purpose;
      the actor is an unscoped Russian-speaking mercenary/hack-for-hire cluster.
      Correct value is [] (the actor's own default_doctrine_alignment_ids were
      likewise emptied 2026-07-04 for the same reason).
    [e] ATTRIBUTION_LEVEL -- set activity-cluster (was missing).
    [f] ACTOR_ID -- ru/unscoped/uac-0050 RESOLVES (atlas/actors/ru/uac-0050.yaml,
