    attribution_source_id: kaspersky/2025-01_angry-likho-overview
    notes: |
      Kaspersky's framing is "Angry Likho" rather than CERT-UA's
      UAC-0050. AUSPEX treats the cluster overlap as established
      but the Belarusian-only alignment as somewhat softer than
      a pure CERT-UA attribution.
