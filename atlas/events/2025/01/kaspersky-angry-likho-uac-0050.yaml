id: 2025-01/kaspersky-angry-likho-uac-0050
name: Kaspersky publishes Angry Likho (UAC-0050 overlap) overview
start_date: 2024-06-01
disclosure_date: 2025-01-20
end_date: 2024-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist published an analysis of the "Angry
  Likho" cluster, which it assesses as overlapping with UAC-0050
  / Sticky Werewolf operationally. The report documented
  continued mass-phishing operations targeting Ukrainian state
  institutions and adjacent Russian-language targets in 2024,
  with continued reliance on Remcos RAT and a refreshed loader
  chain. Kaspersky's framing emphasized the operational
  signature: high-volume, Russian-language lures, commodity
  malware, and consistent infrastructure patterns.
false_flag_risk: none
summary: |
  Useful 2024-retrospective on the cluster's continued
  operations and reaffirmation of Belarusian / Russian-Belarusian
  alignment. Kaspersky's "Angry Likho" labeling reflects the
  cluster's Russian-aligned reach beyond CERT-UA's UAC-0050
  framing; AUSPEX treats the two as overlapping clusters in
  the actor file.
