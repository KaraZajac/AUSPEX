id: 2025-01/kaspersky-angry-likho-uac-0050
name: Kaspersky documents Angry Likho (Sticky Werewolf) APT targeting Russian and Belarusian organizations with Lumma Stealer
start_date: 2024-06-01
disclosure_date: 2025-02-21
end_date: 2025-01-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist ("Angry Likho: Old beasts in a new
  forest") analyzed the Angry Likho APT -- referred to as Sticky
  Werewolf by some vendors and classified by Kaspersky within its
  "Likho" activity cluster (monitored since 2023). The documented
  campaign delivered the Lumma stealer through obfuscated AutoIt
  scripts packed in a Nullsoft NSIS self-extracting archive,
  following a FrameworkSurvivor.exe implant first seen in June
  2024 and a fresh surge of activity in January 2025 (flagged from
  F6 / F.A.C.C.T. indicators). Kaspersky identified hundreds of
  victims in Russia and several in Belarus, with the bait
  documents written in fluent Russian and thematically tied to
  Russian government institutions and their contractors.
false_flag_risk: none
summary: |
  Kaspersky assesses Angry Likho as a targeted APT whose victims
  are "primarily ... organizations in Russia and Belarus," and
  infers the operators are "likely native Russian speakers" from
  the fluent-Russian lures; it names no state sponsor or
  intelligence service, and Belarus appears as a TARGET, not a
  sponsor. Directionality: this operation is directed AGAINST
  Russian and Belarusian government organizations. AUSPEX files
  Angry Likho within its unified UAC-0050 / Sticky Werewolf
  cluster on cross-vendor infrastructure overlap only (the aliases
  are "overlapping", not equivalent) -- Kaspersky itself does not
  mention UAC-0050, Ukraine, or Remcos in this report, and its
  Russia/Belarus victimology runs opposite to CERT-UA's
  Ukrainian-victim UAC-0050 framing.
attributions:
  - actor_id: ru/unscoped/uac-0050
    attributing_org: Kaspersky (Securelist)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-02-21
    attribution_source_id: kaspersky/2025-02-21_angry-likho-lumma-russian-orgs
    notes: |
      Kaspersky "attribute[s] this campaign to the APT group Angry
      Likho with a high degree of confidence" -- an ACTIVITY-CLUSTER
      attribution (Angry Likho = Sticky Werewolf per some vendors);
      it infers native-Russian-speaking operators from the
      fluent-Russian lures and names NO nation-state or intelligence
      service (hence activity-cluster, high). The ru/unscoped/uac-0050
      mapping is AUSPEX's unified cluster (UAC-0050 / Sticky Werewolf
      / Angry Likho aliased as "overlapping" on infrastructure overlap
      only); Kaspersky does not mention UAC-0050 here. Victimology
      (Russia/Belarus) is the OPPOSITE of CERT-UA's Ukrainian-victim
      UAC-0050 profile.
doctrine_links: []
targets:
  - target_id: sectors/government
    country: ru
    role: primary
  - target_id: sectors/government
    country: by
    role: collateral
sources:
