    event; the sole source is a first-party US-govt primary and IS snapshotted,
    so level full. Counter-action (US OFAC acts against a PRC actor) → actor_id
    null retained.

    [a] FACTS — corrected against the raw (normalized full-text membership test
    on the snapshot). VERBATIM-CARRIED by Treasury: "sanctioned Integrity
    Technology Group, Incorporated (Integrity Tech), a Beijing-based
    cybersecurity company, for its role in multiple computer intrusion incidents
    against U.S. victims"; "publicly attributed to Flax Typhoon, a Chinese
    malicious state-sponsored cyber group that has been active since at least
    2021 … targeting organizations within U.S. critical infrastructure
    sectors"; "OFAC is designating Integrity Tech pursuant to Executive Order
    (E.O.) 13694, as amended by E.O. 13757"; "Between summer 2022 and fall 2023,
    Flax Typhoon actors used infrastructure tied to Integrity Tech during their
    computer network exploitation activities"; "On September 18, 2024, the
    [FBI], in coordination with the Cyber National Mission Force, [NSA], and
    Five Eye partners, published a joint cybersecurity advisory." STRIPPED as
    NOT carried by the sole Treasury source: "botnet" — ABSENT; "Raptor Train" —
    ABSENT; "260,000"/any device count — ABSENT; "SOHO"/"IoT"/"Mirai" — ABSENT;
    any dollar figure or monetary penalty — ABSENT (no "$"-amount, no "million");
    any named individual officer — ABSENT (company-only SDN). So the prior
    outcome_summary "operating entity behind the Flax Typhoon / Raptor Train
    botnet disrupted by FBI in September 2024" was reworded to Treasury's own
    framing (Integrity Tech = infrastructure/support to Flax Typhoon's CNE), and
    the Raptor-Train/botnet specifics are now explicitly attributed to the
    DISTINCT 2024-09 FBI takedown event, not to Treasury. Removed the
    unsupported superlative "First-of-kind in naming a PRC critical-
    infrastructure cyber-operator company by name in sanctions" (Treasury makes
    no such claim; the OFAC PRC-cyber-company-by-name precedent is Wuhan XRZ /
    APT31, March 2024 — which the event itself calls a "precursor," so the
    superlative was internally inconsistent). Corrected the factual error
    "contractor company plus named officer": THIS designation named the COMPANY
    ONLY — no officer (the named-individual pattern appears in the later Salt
    Typhoon and earlier APT31 actions, not here). incident_type documentary ->
    [documentary, policy] (a sanction is a policy counter-action; both are meta
    types), per task.

    [b] ATTRIBUTION — actor_id null retained (counter-action; the acting body is
    US Treasury OFAC). attributing_org_confidence high + auspex_assessment
    concur — carried (Treasury attributes at high confidence: "publicly
    attributed to Flax Typhoon … state-sponsored"). ADDED the missing
