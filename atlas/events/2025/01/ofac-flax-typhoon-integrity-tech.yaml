id: 2025-01/ofac-flax-typhoon-integrity-tech
name: OFAC sanctions on Integrity Technology Group (Flax Typhoon operator)
start_date: 2025-01-03
disclosure_date: 2025-01-03
end_date: 2025-01-03
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  OFAC SDN listing of Integrity Technology Group Inc.,
  Beijing-based PRC company identified as the operating
  entity behind the Flax Typhoon / Raptor Train botnet
  disrupted by FBI in September 2024. First-of-kind in
  naming a PRC critical-infrastructure cyber-operator
  company by name in sanctions.
false_flag_risk: none
summary: |
  Administrative event — companion to the September 2024
  FBI takedown. Doctrinally significant because it
  established the OFAC pattern subsequently applied to
  Sichuan Juxinhe / Salt Typhoon two weeks later
  (Jan 17 2025) and Wuhan XRZ / APT31 (March 2024
  precursor): contractor company plus named officer.
