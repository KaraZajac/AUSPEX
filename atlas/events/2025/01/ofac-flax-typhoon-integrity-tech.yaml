id: 2025-01/ofac-flax-typhoon-integrity-tech
name: OFAC sanctions on Integrity Technology Group (Flax Typhoon operator)
start_date: 2025-01-03
disclosure_date: 2025-01-03
end_date: 2025-01-03
incident_type:
  - documentary
  - policy
initial_vector: unknown  # meta counter-action (OFAC paper designation) — no initial-access vector applies
outcome_summary: |
  OFAC designated Integrity Technology Group, Incorporated
  (Integrity Tech), a Beijing-based cybersecurity company, pursuant
  to Executive Order 13694 (as amended by E.O. 13757), for its role
  in multiple computer-intrusion incidents against U.S. victims.
  Treasury states those incidents were publicly attributed to Flax
  Typhoon — a Chinese state-sponsored cyber group active since at
  least 2021 that targets U.S. critical-infrastructure sectors — and
  that between summer 2022 and fall 2023 Flax Typhoon actors used
  infrastructure tied to Integrity Tech during their
  computer-network-exploitation activity. The action blocks all
  Integrity Tech property and interests in property within U.S.
  jurisdiction. It is a company-only SDN listing: Treasury names no
  individual officer and imposes no monetary penalty. Treasury cites
  the September 18, 2024 FBI / Cyber National Mission Force / NSA /
  Five-Eyes joint cybersecurity advisory on Flax Typhoon and
  Integrity Tech's supporting role. (Treasury's own release does not
  use the word "botnet," the name "Raptor Train," or any device
  count — that framing belongs to the distinct September 2024 FBI
  takedown event.)
false_flag_risk: none
summary: |
  Administrative counter-action — the sanctions companion to the
  September 2024 FBI/CISA/NSA joint advisory and the Raptor Train
  botnet disruption of Flax Typhoon infrastructure. That takedown is
  the distinct 2024-09 event: the two are cross-linked but NOT merged
  — a sanction and a botnet takedown are different instruments. Here
  OFAC designated the PRC cyber-contractor company Integrity Tech for
  enabling state-sponsored operations against U.S. critical
  infrastructure. The same "name the contractor company" approach
  recurs in the Sichuan Juxinhe / Salt Typhoon designation two weeks
  later (Jan 17 2025) and built on the March 2024 Wuhan XRZ / APT31
  action; unlike those actions — which each also named individual
  officers — this designation named the company only. (The
  cross-event comparanda are editorial doctrinal context; Treasury's
  release, this event's sole source, names none of them.)
