  notes: |
    Audited against the RAW Microsoft MSTIC "Jasper Sleet: North
    Korean remote IT workers' evolving tactics to infiltrate
    organizations" blog (2025-06-30). Raw snapshot captured +
    hashed: sha256 d82f0ff4…0ad0cbf6, 328,538 bytes,
    atlas/sources/raw/msft__2025-06-30_jasper-sleet-it-workers.html.
    Article confirmed as the REAL report (title + 24 "Jasper Sleet"
    mentions) — not a phantom. Single-source event.

    [d] DOCTRINE (the reason this event was pulled — 8th-Congress
    attestation re-check): DOWNGRADED kp/8th-congress-defense-plan
    from attested -> strongly_inferred. The source names ONLY the
    proximate revenue/regime goal and NEVER the terminal WMD/missile
    goal — grep of the extracted text: 0 occurrences of WMD /
    ballistic / missile / nuclear / "weapons program"; the strategic
    framing is exactly "revenue generation scheme for the North Korean
    government", "generate revenue for the North Korean regime, which
    violates international sanctions", and "generate revenue and
    support state interests". Per the SCHEMA attestation boundary and
    the doctrine's own per-event rule (corrected 2026-07-02), a
    proximate-revenue vendor framing = strongly_inferred, not
    attested. attesting_source_id nulled; inference_basis.signals +
    ruled_out added; kept strongly_inferred (not plausible) because
    Treasury/OFAC sb0416 ties this exact revenue stream to WMD
    financing, leaving the WMD-financing reading dominant. ALSO
    downgraded the 2nd link kp/strategic-information strongly_inferred
    -> plausible: Microsoft frames the data theft as extortion/revenue
    leverage, not policy/political-intelligence collection (the
    doctrine's actual scope), so a serious competing reading survives;
    inference_basis.alternatives added. FLAG: link #2 is a weak fit
    (corporate IP/source-code theft for extortion vs. a
    defector/think-tank/policy-collection doctrine) — orchestrator may
    consider removing it entirely.

    [a] FACTS — corrected two overreaches not carried by the source:
    (1) "deepfaked video interviews" REMOVED — the source states the
    OPPOSITE: "While we haven't observed threat actors using combined
    AI voice and video products as a tactic first hand, we do
    recognize that combining these technologies could allow future
    threat actor campaigns…" (deepfake mentions are defensive
    detection guidance, not observed tradecraft). (2) "post-termination
    data exfiltration/staging" framing REMOVED — 0 occurrences of
    terminat*/fired/former-employ*; the source documents theft during
    employment + extortion, without a post-termination frame.
    RETAINED (all source-carried): evolution from wage-fraud toward
    theft of "sensitive intellectual property, source code, or trade
    secrets"; extortion "in exchange for not publicly disclosing the
    company's data"; AI face-swap (Faceswap) onto stolen identity/
    employment documents + AI-enhanced photos reused on resumes;
    voice-changing software; Jasper Sleet (formerly Storm-0287);
    "$866,255 from ten of at least 64 infiltrated US companies"
    context. Added incident_type data-theft + extortion (both
    documented). start_date 2024-01-01 fits "Since 2024, Microsoft…
    has observed"; disclosure_date 2025-06-30 = publication date. OK.

    [b] ATTRIBUTION — actor kp/it-worker-fraud, Microsoft Threat
    Intelligence, high, concur, 2025-06-30. Source explicitly tracks
    this as "Jasper Sleet" = the DPRK IT-worker cluster; high
    confidence is warranted (Microsoft's own MSTIC assessment). Added
    attribution_level: nation (Microsoft names the DPRK as the
    responsible state and its own named activity cluster, but no
    specific DPRK service/unit — RGB/Office-39 come from OTHER sources
    in the actor file, not this blog).

    [c] DATES — source published_on 2025-06-30 verified = article date.
    Event dates consistent (see [a]).

    [e] ATTRIBUTION_LEVEL — set to nation (was missing).

    [f] ACTOR_ID — kp/it-worker-fraud resolves to
    atlas/actors/kp/it-worker-fraud.yaml. Note: that actor file's
    ttp_summary repeats the same "post-termination data exfiltration
    and extortion" phrasing sourced to this blog — mild overstatement
    of the source (no post-termination frame in the blog). FLAGGED for
    orchestrator; not edited (actor files out of scope).

    [targets] Removed sectors/finance/crypto-exchange (primary) — the
    source names no crypto/finance targeting and no TraderTraitor/
    crypto pivot; that was an AUSPEX cross-inference. Kept
    sectors/ict/software (primary) — source: "jobs in software and web
