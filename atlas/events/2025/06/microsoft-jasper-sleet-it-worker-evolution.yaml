id: 2025-06/microsoft-jasper-sleet-it-worker-evolution
name: Microsoft Jasper Sleet IT-worker evolution disclosure
start_date: 2024-01-01  # tradecraft-evolution observation window
disclosure_date: 2025-06-30
end_date: null
incident_type:
  - documentary
  - intrusion
  - data-theft
  - extortion
initial_vector: insider
outcome_summary: |
  Microsoft Threat Intelligence documented the evolution of
  the DPRK remote-IT-worker scheme (Microsoft designation:
  Jasper Sleet, formerly Storm-0287) from a wage-fraud
  revenue channel toward data theft and extortion: workers
  use their insider access to steal sensitive intellectual
  property, source code and trade secrets, and in some cases
  extort the employer into paying in exchange for not
  publicly disclosing the stolen data. Observed AI tradecraft:
  face-swap / AI-enhanced photos placed onto stolen identity
  and employment documents and reused on resumes and profiles,
  plus voice-changing software. Microsoft explicitly states it
  had NOT observed combined AI voice-and-video (real-time
  deepfaked interviews) used firsthand, framing that only as a
  future risk.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Documentary event. Microsoft's Jasper Sleet blog documents
  the DPRK remote-IT-worker scheme evolving from a pure
  wage-revenue channel into an insider data-theft and
  extortion vector: workers leverage their access to steal
  source code, IP and trade secrets and, in some cases,
  extort employers for payment in exchange for not leaking
  the data. This is the source AUSPEX cites for the post-2024
  "IT-worker scheme is dual-mission" (revenue + insider
  data-theft/extortion) claim. NB (audit 2026-07-02):
  Microsoft names only the proximate purpose — "generate
  revenue for the North Korean regime, which violates
  international sanctions" / "support state interests" — and
  does NOT state the terminal WMD / ballistic-missile-
  financing goal, so the 8th-Congress doctrine link is
  strongly_inferred, not attested. Microsoft does not mention
  TraderTraitor or cryptocurrency-firm targeting; any
  crypto-theft convergence is an AUSPEX cross-inference, not a
  Microsoft claim.
attributions:
  - actor_id: kp/it-worker-fraud
    attributing_org: Microsoft Threat Intelligence
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2025-06-30
    attribution_source_id: msft/2025-06-30_jasper-sleet-it-workers
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/it-worker-fraud
    confidence: strongly_inferred
    reasoning: |
      DOWNGRADED attested -> strongly_inferred (audit
      2026-07-02). Microsoft characterizes the IT-worker
      scheme as a revenue-generation operation for the North
      Korean government/regime that "violates international
      sanctions" and supports "state interests" — the
      proximate revenue / regime-funding purpose. It does NOT
      state the terminal WMD / ballistic-missile-financing
      goal that the 8th-Congress revenue-aggregation pillar
      encodes (zero mentions of WMD / missile / ballistic /
      nuclear in the source). Per the per-event attestation
      rule (SCHEMA attestation boundary; the doctrine's own
      cyber_relevance note, corrected 2026-07-02), a source
      naming only the proximate revenue/regime goal is
      strongly_inferred, not attested. It remains
      strongly_inferred rather than plausible because the
      DPRK's use of this exact illicit-revenue stream to fund
      the 13-system defense plan is documented by Treasury/OFAC
      (sb0416, May 2024, standardized WMD language), making the
      WMD-financing reading the dominant strategic reading with
      no serious competitor.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Microsoft: the scheme is a 'revenue generation scheme for the North Korean government' that generates 'revenue for the North Korean regime, which violates international sanctions'."
        - "Microsoft: workers 'generate revenue and support state interests' and 'likely fall under a particular leadership structure in North Korea' — state-directed, not independent crime."
        - "Treasury/OFAC (sb0416, May 2024) attributes this same IT-worker revenue stream to funding the DPRK's WMD and ballistic-missile programs — the terminal goal the 8th-Congress revenue-aggregation pillar encodes."
      ruled_out: "Ordinary financially-motivated cybercrime with no state end-use — ruled out because Microsoft states the revenue accrues to the North Korean government/regime under a state leadership structure, and the scheme is OFAC-sanctioned DPRK state activity."
    contested: false
    analyst: claude
  - doctrine_id: kp/strategic-information
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      DOWNGRADED strongly_inferred -> plausible (audit
      2026-07-02). The evolution to in-employment theft of
      source code, IP and trade secrets could in principle
      feed a state strategic-information collection function.
      But Microsoft frames the data theft as serving EXTORTION
      and revenue (workers "extort their employer ... in
      exchange for not publicly disclosing the company's
      data"), not political/policy intelligence collection; and
      the strategic-information doctrine's own scope is
      defector / think-tank / adversary-policy-planning
      collection, which corporate IP/source-code theft for
      extortion does not squarely fit. No source states a
      strategic-information purpose and a serious competing
      reading (extortion/revenue, Microsoft's own framing)
      survives, so this is plausible, not strongly_inferred.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Strategic-information collection: stolen source code / IP / trade secrets could serve state technical or political intelligence."
        - "Extortion / revenue (Microsoft's stated framing): the theft is leverage to extort the employer and augment the revenue mission, not intelligence collection — the dominant competing reading."
    contested: false
    analyst: claude
