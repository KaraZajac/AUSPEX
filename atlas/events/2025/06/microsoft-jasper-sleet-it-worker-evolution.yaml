outcome_summary: |
  Microsoft documented evolution of the DPRK IT-worker
  cluster (Microsoft designation: Jasper Sleet) from
  passive wage-fraud to active post-termination data
  exfiltration and extortion. Tradecraft additions:
  AI-generated personas; deepfaked video interviews; data
  staging during employment for post-termination
  monetization.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Doctrinal evolution event. The IT-worker scheme is no
  longer purely a revenue channel — it is now an insider-
  espionage and extortion vector. Sharpens the convergence
  with TraderTraitor: IT-worker placement at a crypto firm
  can pivot directly to crypto theft. This is the
  attestation source AUSPEX cites for the "post-2024
  IT-worker scheme is dual-mission" claim.
