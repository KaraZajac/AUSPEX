    was queued for the 8th-Congress per-event attestation re-check.

    [a] FACTS — all outcome_summary / summary claims carried by
    the DOJ primary (sha256 3873baac…e65f3e25, 106,803 B):
    "two indictments, an information and related plea agreement,
    an arrest, searches of 29 known or suspected 'laptop farms'
    across 16 states, and the seizure of 29 financial accounts …
    and 21 fraudulent websites" ✓; arrest of US national Zhenxing
    "Danny" Wang of New Jersey ✓; MA five-count indictment charges
    Wang + six Chinese nationals (Jing Bin Huang, Baoyu Zhou, Tong
    Yuze, Yongzhe Xu, Ziyou Yuan, Zhenbang Zhou) + two Taiwanese
    nationals (Mengting Liu, Enchia Liu) ✓ (CyberScoop
    independently: "Wang and eight alleged co-conspirators, all
    Chinese and Taiwanese nationals" ✓); N.D. Georgia five-count
    indictment charges four DPRK nationals (Kim Kwang Jin, Kang Tae
    Bok, Jong Pong Ju, Chang Nam Il) "to steal virtual currency
    from two companies, valued at over $900,000" ✓; ITAR-controlled
    data from "a California-based defense contractor that develops
    artificial intelligence-powered equipment and technologies" ✓
    (The Record + CyberScoop corroborate the ITAR/defense-
    contractor and $900K facts verbatim). CORRECTION: removed the
    unsupported superlative "The largest single US enforcement
