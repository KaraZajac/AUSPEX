id: 2025-06/doj-dprk-it-worker-nationwide-takedown
name: DOJ coordinated nationwide takedown of DPRK IT-worker laptop farms
start_date: 2021-01-01  # earliest indictment-covered conduct: MA scheme ~2021; Georgia hiring Dec 2020; crypto thefts Feb–Mar 2022
disclosure_date: 2025-06-30
end_date: 2025-06-30
incident_type:
  - documentary
  - law-enforcement   # counter-action: coordinated DOJ indictments/arrest/searches/seizures. Removed [intrusion, data-theft, financial-theft] — those described the DPRK IT-worker operation, not this enforcement action (ITAR/source-code theft + crypto theft + wage fraud stay in prose + doctrine links).
initial_vector: insider
outcome_summary: |
  DOJ announced two indictments, an information and plea
  agreement, the arrest of US-national facilitator Zhenxing
  "Danny" Wang, searches of 29 laptop farms across 16 states,
  seizure of 29 financial accounts, and seizure of 21 fraudulent
  websites — a coordinated nationwide enforcement strike on the
  DPRK remote-IT-worker fraud scheme. The Massachusetts
  indictment charges Wang plus six Chinese nationals (Huang,
  Zhou, Yuze, Xu, Yuan, Zhenbang Zhou) and two Taiwanese
  nationals (Mengting Liu, Enchia Liu); the Northern District
  of Georgia indictment separately charges four North Korean
  nationals (Kim Kwang Jin, Kang Tae Bok, Jong Pong Ju, Chang
  Nam Il) with stealing over USD 900K in cryptocurrency from
  two companies. Among the affected victims: a California
  defense contractor with ITAR-controlled AI-equipment data.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  A coordinated, nationwide US enforcement action against the
  DPRK remote-IT-worker scheme — two indictments, an information
  and plea, an arrest, and same-day searches of 29 laptop farms
  across 16 states with seizures of 29 accounts and 21 websites.
  Doctrinally significant for two reasons: (1) ITAR-controlled
  defense IP exfiltration through IT-worker access is now a
  documented outcome of the scheme, not just revenue generation;
  (2) the China-domiciled co-conspirators establish the cross-
  border laundering and recruitment infrastructure that the Song
  Kum Hyok designation (eight days later, 2025-07-08) addressed
  at the RGB / Andariel side.
