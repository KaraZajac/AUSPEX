    attribution_date: 2025-06-23
    attribution_source_id: reliaquest/2025-06-25_iran-israel-cyber-surge
    notes: |
      APT35 (Charming Kitten) is named as an involved IRGC-affiliated
      APT in the coordinated Iran threat landscape — ReliaQuest lists
      APT35 among the APTs active on the Iran side and CSIS names APT35
      as an IRGC APT — but neither source ties APT35 to a specific
      discrete new June-2025 operation, hence concur-with-caveat at
      named-actor level. The fabricated "secalliance" corroborator and
      the "Trellix telemetry / ~700% spike" basis were REMOVED in the
      2026-07-11 audit: no cited source carries them (the 700% figure
      traces only to the retired AI-generated veritech article).
  - actor_id: ir/irgc-cec/cyberav3ngers
    attributing_org: CSIS (with ReliaQuest); CISA/FBI/NSA/DC3 fact sheet
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-15
    attribution_source_id: csis/2025-07_iran-coordinated-cyber-threat
    notes: |
      CyberAv3ngers appears across all three real sources, but as a
      REITERATED persistent OT threat (CSIS ties it to the 2023-2024
      Unitronics campaign — "at least 75 devices ... including 34 in
      the U.S. wastewater sector"; the 30 June fact sheet reiterates the
      same Unitronics/OT threat as the illustrative case) rather than a
      confirmed new June-2025 operation — hence concur-with-caveat.
