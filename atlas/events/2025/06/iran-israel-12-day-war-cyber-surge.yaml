initial_vector: phishing
outcome_summary: |
  In the twelve days between Israel's 2025-06-13 strikes on
  Iranian nuclear facilities (Operation Rising Lion) and the
  24 June ceasefire, IRGC- and MOIS-aligned APT clusters plus
  an expanding hacktivist ecosystem sharply increased cyber
  operations in coordination with the kinetic campaign. CSIS
  analysis of "over 250,000 Telegram messages from more than
  178 hacktivist and proxy groups" documented rapid mobilization
  as the air strikes began; the groups (CSIS names Fatimion
  Cyber Team, Cyber Fattah, and Cyber Islamic Resistance)
  "conducted reconnaissance, DDoS campaigns, website
  defacements, and data theft operations coordinated with
  military developments on the ground." ReliaQuest separately
  tracked the pro-Palestine group Handala listing Israeli firms
  (including a major oil-and-gas company) on its leak site from
  14 June. IRGC-affiliated APT35 (Charming Kitten) and
  CyberAv3ngers are named within this coordinated landscape.
  Following the 22 June US strikes on Fordow / Natanz / Isfahan,
  Iran-aligned actors broadened targeting toward US interests.
  After the ceasefire, on 30 June 2025 CISA, the FBI, the DoD
  Cyber Crime Center (DC3) and the NSA published a joint fact
  sheet ("Iranian Cyber Actors May Target Vulnerable US Networks
  and Entities of Interest") urging critical-infrastructure
  operators to raise vigilance for POTENTIAL Iranian
  state-sponsored or affiliated targeting, reiterating the
  IRGC-affiliated CyberAv3ngers threat to internet-exposed OT
  (the 2023-2024 Unitronics water/wastewater campaign) as the
  illustrative threat — the official defensive/warning bookend
  of this surge, reporting no confirmed new water-utility
  compromise, not a new operation.
false_flag_risk: suspected
summary: |
  The first full-scale state-on-state cyber surge in direct
  parallel with kinetic strikes on national nuclear infrastructure
  since the post-Soleimani-2020 spike. Doctrinally activates
  every IR pillar simultaneously: asymmetric civilian-CII coercion
  against Israel, post-Soleimani-style retaliation rhetoric
  against US targets, Resistance-Axis information warfare. False-
  flag risk noted because Predatory Sparrow's destructive
  operations during the same window (Bank Sepah, Nobitex) are
  Israel-attributed and could be misread as Iranian self-attack.
