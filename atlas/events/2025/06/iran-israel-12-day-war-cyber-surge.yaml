id: 2025-06/iran-israel-12-day-war-cyber-surge
name: Iran-aligned cyber operations surge during the 12-day Israel-Iran war
start_date: 2025-06-13
disclosure_date: 2025-06-25
end_date: 2025-06-24
incident_type:
  - influence-operation
  - disruption
  - intrusion
initial_vector: phishing
outcome_summary: |
  In the twelve days between Israel's 2025-06-13 strikes on
  Iranian nuclear facilities (Operation Rising Lion) and the
  24 June ceasefire, IRGC- and MOIS-aligned APT clusters plus
  hacktivist proxies coordinated a sharp tempo increase in
  cyber operations. Reliaquest and Trellix telemetry recorded
  roughly a 700% spike in Iran-attributed cyberattack activity
  against Israeli and US targets. Operations included
  reconnaissance, DDoS, defacements, and data-leak operations
  by APT35 / Charming Kitten and IRGC-IO proxies, coordinated
  via Telegram with hacktivist auxiliaries (Cyber Av3ngers,
  Handala, Mr Hamza). Following 22 June US strikes on Fordow /
  Natanz / Isfahan, Iran-affiliated actors broadened targeting
  to US critical infrastructure — water utilities, financial
  services, and energy. After the ceasefire, on 30 June 2025
  CISA, the FBI, the DoD Cyber Crime Center (DC3) and the NSA
  published a joint fact sheet ("Iranian Cyber Actors May
  Target Vulnerable US Networks and Entities of Interest")
  urging critical-infrastructure operators to raise vigilance
  for POTENTIAL Iranian state-sponsored or affiliated
  targeting, reiterating the IRGC-affiliated CyberAv3ngers
  threat to internet-exposed OT (the 2023-2024 Unitronics
  water/wastewater campaign) as the illustrative threat — the
  official defensive/warning bookend of this surge, reporting
  no confirmed new water-utility compromise, not a new
  operation.
false_flag_risk: suspected
summary: |
  The first full-scale state-on-state cyber surge in direct
  parallel with kinetic strikes on national nuclear infrastructure
  since the post-Soleimani-2020 spike. Doctrinally activates
  every IR pillar simultaneously: asymmetric civilian-CII coercion
  against Israel, post-Soleimani-style retaliation rhetoric
  against US targets, Resistance-Axis information warfare. False-
  flag risk noted because Predatory Sparrow's destructive
  operations during the same window (Bank Sepah, Nobitex) are
  Israel-attributed and could be misread as Iranian self-attack.
