id: 2025-06/predatory-sparrow-nobitex-drain
name: Predatory Sparrow — Nobitex Iranian crypto exchange drained (NOT IRANIAN)
start_date: 2025-06-18
disclosure_date: 2025-06-18
end_date: 2025-06-18
incident_type:
  - destructive
  - financial-theft
initial_vector: unknown
outcome_summary: |
  Nobitex (Iran's largest crypto exchange) drained for over
  USD 90M across BTC, ETH, DOGE, XRP, SOL, TRON and TON; the
  funds were not laundered for value but sent to brute-forced
  anti-IRGC "vanity" addresses whose private keys are
  computationally unrecoverable — i.e. effectively burned,
  signaling an ideological / coercive motive rather than revenue.
quantified_impact:
  usd_destroyed: 90000000  # floor: Elliptic & Chainalysis both say "over/more than $90 million"
false_flag_risk: suspected  # Predatory Sparrow hacktivist persona is the IL deniability layer
campaign_id: predatory-sparrow-iran-coercion
summary: |
  **NOT IRANIAN.** Counter-Iran operation by pro-Israel
  Predatory Sparrow / Gonjeshke Darande during the June 2025
  Israel-Iran Twelve-Day War, paired with the group's destructive
  Bank Sepah attack the prior day. Included in the Iran event log
  only because Nobitex is part of Iran's crypto-sanctions-evasion
  infrastructure and the operation directly damaged it. Per the
  cited on-chain vendors, ~$90M+ was drained and then burned to
  vanity addresses bearing anti-IRGC strings — a punitive political
  message, not theft-for-profit. Israel-state attribution is
  ASSESSED, not established: both vendors decline to confirm the
  actor, and no government has attested.
attributions:
  - actor_id: il/predatory-sparrow
    attributing_org: Predatory Sparrow / Gonjeshke Darande self-claim; Elliptic; Chainalysis
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-06-18
    attribution_source_id: elliptic/2025-06_nobitex-drain
    notes: |
      Persona-level self-claim (Gonjeshke Darande / "Predatory Sparrow")
      corroborated by two independent on-chain forensics vendors — but both
      HEDGE the actor tie. Elliptic: "Although there is no confirmation yet
      that the funds were moved by Predatory Sparrow, the hack appears to be
      motivated by the recent escalation of tensions between Israel and Iran."
      Chainalysis attributes only to "a pro-Israel group known as Gonjeshke
      Darande [that] has claimed responsibility." Neither firmly pins Israel.
      attribution_level named-actor: the sources name the Gonjeshke Darande /
      Predatory Sparrow persona, but name NO Israeli service or unit — so not
      named-unit/nation. Israel-state attribution is ASSESSED, not established:
      the hacktivist persona is a known IL deniability layer, and operator-state
      attribution rests on Israeli-aligned media (Times of Israel) and CCDCOE
      analysis treating IDF Unit 8200 / Mossad as the dominant hypothesis — not
      these two vendors. moderate + concur-with-caveat: concur that a pro-Israel
      actor drained-and-burned Nobitex; caveat = the vendors do not confirm the
      specific actor and no government has attested.
doctrine_links:
  - doctrine_id: il/counter-iran-posture
    pillar_id: il/counter-iran-posture/retaliatory-cyber-strike
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A politically-motivated, destructive drain-and-burn of Iran's largest
      crypto exchange — ~$90M+ moved to brute-forced anti-IRGC vanity addresses
      whose private keys are computationally unrecoverable, so the funds are
      effectively destroyed rather than stolen — executed during the June 2025
      Twelve-Day War and paired with the group's Bank Sepah destructive attack
      the prior day. That coercive, message-sending strike against Iranian
      sanctions-evasion infrastructure is the substance of Israel's
      retaliatory-cyber-strike pillar (the doctrine file already enumerates
      "Nobitex crypto-exchange June 2025" and finance/crypto-exchange under it).
      strongly_inferred, not attested: the cited on-chain vendors state the
      political-coercion MOTIVE but explicitly do NOT confirm the actor is
      Predatory Sparrow / Israel ("no confirmation yet that the funds were moved
      by Predatory Sparrow"), and no source states an Israeli STATE strategic
      purpose. Attacker-state (il) doctrine on an il operation -> attacker-
      rationale (the default; no perspective tag), matching the Bank Sepah
      sibling's il links.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Effect: Elliptic finds the funds sent to brute-forced 'F*ckIRGCterrorists' vanity addresses whose private keys are computationally infeasible to hold, so Predatory Sparrow 'effectively burned the funds in order to send Nobitex a political message' — coercion, not profit."
        - "Motive: both cited vendors assess the operation as politically motivated (Chainalysis: 'a politically motivated strike against Iranian digital infrastructure') and tied to 'the recent escalation of tensions between Israel and Iran' (Elliptic) — the retaliatory frame."
        - "Target class: Nobitex is Iran's largest crypto exchange and a central pillar of its sanctions-evasion infrastructure — the finance/crypto-exchange target sector the retaliatory-cyber-strike pillar enumerates."
        - "Pattern: paired with the group's Bank Sepah destructive attack one day earlier and consistent with the 2021/2023 fuel-network and 2022 Khuzestan-steel siblings, all mapped to this pillar; the doctrine file explicitly lists 'Nobitex crypto-exchange June 2025' under it."
      ruled_out: "Financial-theft-for-profit — affirmatively refuted by the burn: brute-forced vanity addresses with no recoverable private keys mean the ~$90M was destroyed, not monetised (Elliptic and Chainalysis both state the funds were burned / irretrievable and 'not financial in nature')."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/nobitex
    country: ir
    role: primary
    outcome: |
      ~USD 90M+ drained and then burned to unspendable vanity
      addresses; significant blow to Iranian crypto-sanctions-
      evasion infrastructure.
