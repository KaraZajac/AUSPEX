  notes: |
    Audited vs the two cited on-chain-forensics vendors, both RE-VERIFIED live
    and snapshotted this pass: Elliptic "Iranian crypto exchange Nobitex hacked
    for over $90 million by pro-Israel group" (elliptic__2025-06_nobitex-drain.html,
    sha256 55e1e161…220c60e1, 331,637 B) and Chainalysis "Nobitex, Sanctions, and
    The $90 Million Exploit" (chainalysis__2025-06_nobitex-drain.html,
    sha256 04e9ce33…42a22ff0, 239,007 B). REVERSE-DIRECTIONALITY event: Israel /
    Predatory Sparrow = ATTACKER, Nobitex / Iran = VICTIM.
    PATH TAKEN: RE-SOURCE (badrabbit model) on Elliptic — the event is REAL but the
    Elliptic source pointed at the elliptic.co homepage shell (WRONG-SOURCE);
    re-pointed to the genuine article (live HTTP 200; Wayback 20250618125011) and
    snapshotted. Chainalysis was NOT a phantom (live, on-point) — snapshotted and
    two record defects fixed (title paraphrase, published_on 06-19 -> 06-18).
    [a] FACTS: ~$90M+ carried by BOTH vendors as a FLOOR — Elliptic "has so far
    identified over $90 million sent from Nobitex wallets to hacker addresses";
    Chainalysis "more than $90 million in assets spanning ... Bitcoin, Ethereum,
