id: 2025-06/unc6040-shinyhunters-salesforce-campaign
name: UNC6040 / ShinyHunters voice-phishing Salesforce-OAuth campaign (umbrella)
start_date: 2025-04-01
disclosure_date: 2025-06-04
end_date: 2025-12-31
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: phishing  # voice phishing (vishing) → OAuth-token grant
outcome_summary: |
  Sustained 2025 campaign in which Google Threat Intelligence
  Group tracked actor UNC6040 (Salesforce-instance access via
  vishing) and UNC6240 (post-intrusion extortion, claiming the
  ShinyHunters name). Operators called targeted-organization
  IT-support staff impersonating IT vendors or internal help
  desks, walking the victim through approval of a malicious
  modified-Data-Loader connected app in the Salesforce
  connected-apps panel, then using the resulting OAuth token
  to query and exfiltrate Salesforce object tables — typically
  CRM customer-contact records. Extortion demands followed,
  ranging from days to months later, denominated in bitcoin
  with 72-hour deadlines, branded as "ShinyHunters".
  GTIG publicly named no victim organization in this campaign
  other than Google's own corporate Salesforce instance (the
  June 4 report's August 5 update); no victim tally figure is
  given in the raw. AUSPEX tracks the individual high-profile
  victims as separate child events, each carrying its own
  victim-specific sourcing (none of these names appear in this
  umbrella's four cited GTIG/Krebs sources except Google):
  Adidas (May), Allianz Life (Jul), Qantas (Jul), LVMH brands
  — Louis Vuitton, Dior, Tiffany (Jul-Aug), Cisco (Aug),
  Pandora (Aug), Workday (Aug), Air France-KLM (Sep), and
  Google itself (Aug). GTIG (June 4) noted only a hedged
  infrastructure/TTP overlap with actors tied to the loose
  "The Com" collective — explicitly declining to assert "a
  direct operational relationship" — and named no "Scattered
  Spider"; the Scattered-Spider-specific framing comes from
  Krebs (Oct 2025), which describes the "Scattered LAPSUS$
  Hunters" leak brand as "an amalgamation of three hacking
  groups — Scattered Spider, Lapsus$ and ShinyHunters."
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Umbrella event for the 2025 ShinyHunters-branded Salesforce-
  cloud campaign. Modeled as a single multi-month event with
  individual high-profile victims tracked as separate child
  events. AUSPEX classifies the campaign as criminal-baseline
  (GTIG clusters UNC6040 vishing + UNC6240 extortion, finan-
  cially motivated) and dual-attributes with Scattered Spider
  only with-caveat: GTIG's cited reports never name Scattered
  Spider and only hedge a "The Com" community/TTP overlap
  ("plausible ... rather than indicating a direct operational
  relationship"); the Scattered-Spider link rests on Krebs's
  Oct-2025 "Scattered LAPSUS$ Hunters" amalgamation framing.
  Cluster-boundary fuzziness is the signature property of the
  campaign: "ShinyHunters" is a self-applied extortion brand
  (GTIG: the actor claimed affiliation "likely as a method to
  increase pressure on their victims"), not a stable cluster.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: Google Threat Intelligence Group (Mandiant)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-06-04
    attribution_source_id: mandiant/2025-06-04_unc6040-voice-phishing-data-extortion
    attribution_level: activity-cluster  # GTIG tracks UNC6040/UNC6240 as activity clusters; "ShinyHunters" is a self-claimed extortion brand
    notes: |
      GTIG asserts its OWN clusters (UNC6040 vishing / UNC6240
      extortion) with high confidence, but the "ShinyHunters"
      identity is a relayed SELF-CLAIM that GTIG hedges: "During
      these communications, UNC6240 has consistently claimed to
      be the threat group ShinyHunters" and "the actor has
      claimed affiliation with the well-known hacking group
      ShinyHunters, likely as a method to increase pressure on
      their victims." Because the AUSPEX actor_id is the brand
      (criminal/shinyhunters), confidence is moderate / concur-
      with-caveat, not high — AUSPEX does not commit to whether
      UNC6240 = the historic ShinyHunters operators.
  - actor_id: criminal/scattered-spider
    attributing_org: Krebs on Security + journalism consensus
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-10-07
    attribution_source_id: krebs/2025-10_shinyhunters-corporate-extortion-spree
    attribution_level: activity-cluster  # campaign-cluster overlap only (Krebs amalgamation framing)
    notes: |
      CORRECTED SOURCING (2026-07-11 audit): the prior record
      attributed this Scattered Spider link to GTIG/Mandiant
      (2025-08-08), but NONE of the three cited GTIG reports
      (Jun 4, Aug 8, Aug 12) name "Scattered Spider" (0 hits);
      GTIG (Jun 4) only hedges an overlap with actors tied to
      "The Com" collective ("plausible that these similarities
      stem from associated actors operating within the same
      communities, rather than indicating a direct operational
      relationship"). The Scattered-Spider-specific framing
      comes from Krebs (Oct 7 2025): the "Scattered LAPSUS$
      Hunters" leak brand is "thought to be an amalgamation of
      three hacking groups — Scattered Spider, Lapsus$ and
      ShinyHunters." Cluster boundary remains fuzzy.
