  notes: |
    Umbrella/parent event for the 2025 UNC6040/ShinyHunters vishing→
    Salesforce-OAuth data-extortion campaign. Audited vs all four cited
    raw sources (two already snapshotted by sibling audits + re-verified,
    two newly snapshotted here).

    [a] FACTS — mechanism/framing fully carried by GTIG June 4 raw
    (mandiant__2025-06-04..., sha256 4dce0e4b5c80d074fa0da61122d0bba044
    60648b1f2719729d220bb6f79c1051, re-verified matches): vishing +
    "UNC6040 uses vishing to impersonate IT support, deceiving victims
    into granting access to their Salesforce instances"; "modified Data
    Loader" / "connected app" / OAuth (all present); extortion "demanding
    payment in bitcoin within 72 hours", "sometimes several months after
    the initial data theft" (= the "days to months later" claim); UNC6240
    "has consistently claimed to be the threat group ShinyHunters." VICTIM
    ROSTER CORRECTED: the raw names NO victim except Google's own corporate
    Salesforce instance ("Update (August 5): In June, one of Google's
    corporate Salesforce instances was impacted"). No numeric victim tally
    ("~20") exists in any cited raw (0 hits). Prior outcome_summary listed
    13 "confirmed" victims as if cited-source-carried; reframed to state
    GTIG named no victim but Google and to defer the roster to AUSPEX child
    events (each separately sourced). STRIPPED four roster names that have
    NEITHER a cited source NOR a child event: Chanel, TransUnion, Coca-Cola,
    Farmers Insurance (unsupported at every level of this event's graph).
    Kept only child-event-backed victims (Adidas/Allianz/Qantas/LVMH/Cisco/
    Pandora/Workday/Air-France-KLM/Google — child events confirmed to exist).

    [b] ATTRIBUTION — two corrections. (1) criminal/shinyhunters downgraded
    high/concur → moderate/concur-with-caveat: GTIG asserts its clusters
    (UNC6040/UNC6240) firmly but the ShinyHunters IDENTITY is a relayed
    self-claim GTIG explicitly hedges ("likely as a method to increase
    pressure on their victims"); actor_id is the brand, so firmer than
    moderate over-attests. attribution_level added: activity-cluster.
    (2) criminal/scattered-spider RE-SOURCED: prior record cited GTIG/
    Mandiant (2025-08-08) for the SS link, but "Scattered Spider" appears
    0 times in ALL THREE cited GTIG raws (Jun 4 / Aug 8 / Aug 12); GTIG
    only hedges a "The Com" overlap ("plausible ... rather than indicating
    a direct operational relationship"). Re-pointed attributing_org →
    "Krebs on Security + journalism consensus", attribution_source_id →
    krebs/2025-10, attribution_date → 2025-10-07, quoting Krebs's "Scattered
    LAPSUS$ Hunters ... an amalgamation of three hacking groups — Scattered
    Spider, Lapsus$ and ShinyHunters" (krebs raw sha256 9c2d11a84fc0740275
    832f520328f70c69d6e78035bcb9e492c8733297619835, re-verified matches).

    [c] DATES — disclosure_date 2025-06-04 = GTIG first publication (byline
    verified). start_date 2025-04-01 is an INFERENCE from GTIG's "Over the
    past several months, UNC6040 has demonstrated..." (as of Jun 4) + Krebs's
    "the May voice phishing campaign"; no cited raw gives an exact onset, so
    2025-04-01 is a best-estimate lower bound (left as-is). end_date
    2025-12-31 is a calendar cap for the umbrella; NOTE the Aug 8 report is
    a rolling-updated page whose current live version references "mid-January
    2026 extortion emails" and UNC6671 — i.e. activity continued into 2026;
    end_date understates but is retained as the 2025-umbrella boundary.

    [d] DOCTRINE_LINKS: [] correct — financially-motivated criminal campaign,
    no state doctrine applies.

    [e] ATTRIBUTION_LEVEL: added activity-cluster (was missing) — GTIG tracks
    UNC6040 (vishing) + UNC6240 (extortion) as activity clusters and treats
    "ShinyHunters" as a self-applied brand, not a formal named-group id.

    [f] ACTOR_ID: criminal/shinyhunters + criminal/scattered-spider both
    resolve to atlas actor ids. No counter-action meta-type needed.

    SNAPSHOTS: mandiant/2025-08-12 (sha256 e6d8c7cf4be1027998b24a24ff13f1228
    ca062d57cab7ab20c653fea667ae8fa) newly curled (HTTP 200) + hashed this
    audit (source cited exclusively by this event). mandiant/2025-08-08 was
    concurrently audited by a sibling who found the live URL now serves a
    REWRITTEN, re-dated (Jan 30 2026 "Vishing for Access") article and
    deliberately declined a canonical raw_snapshot; I deferred (hit file-
    modified-since-read on the shared record) and did not overwrite it.
    mandiant/2025-06-04 (sha256 4dce0e4b..f79c1051) + krebs/2025-10 (sha256
    9c2d11a8..97619835) already snapshotted by sibling audits — re-verified
    matches, not re-curled.

    FLAGS (orchestrator — not this event's files): (1) actor criminal/
    shinyhunters ttp_summary and event child google-shinyhunters-salesforce
