id: 2025-06/lapdogs-china-nexus-operational-relay-box-orb-network-of-compromised-s
name: "LapDogs — China-nexus Operational Relay Box (ORB) network of compromised SOHO/edge devices"
start_date: 2025-06-01
incident_type:
  - intrusion
  - pre-positioning
  - espionage
  - reconnaissance
initial_vector: n-day
false_flag_risk: none
summary: |
  SecurityScorecard's STRIKE team (June 2025 report) disclosed LapDogs, a suspected China-Nexus Operational Relay Box (ORB) network that has compromised over 1,000 Linux-based Small Office/Home Office (SOHO) and edge devices since September 2023, concentrated in the US and Southeast Asia (Japan, South Korea, Hong Kong, Taiwan). It uses a custom backdoor 'ShortLeash' that installs self-signed TLS certificates with spoofed metadata; Mandarin developer notes, TTPs, and victimology support China-nexus APT attribution. LapDogs provides covert relay infrastructure to obscure espionage operations and shares some traits with the PolarEdge ORB. A distinct edge-device botnet/ORB not in the corpus (separate from Raptor Train / Flax Typhoon).
attributions:
  - actor_id: cn/unscoped/lapdogs-orb-operator
    attributing_org: "securityscorecard"
    attributing_org_confidence: moderate   # SecurityScorecard's own words (Attribution, p.23): "We therefore assess with MODERATE confidence that LapDogs is an Operational Relay Box Network that China-Nexus threat actors use." Was 'low' (mis-mapped from the doctrine-link scale); corrected to the source's stated confidence 2026-06-25 audit.
    attribution_level: activity-cluster   # Source names only a loose "China-Nexus" nexus and explicitly cannot determine the operator ("it can be difficult to determine the exact threat actor operating the network... We cannot yet confirm whether UAT-5918 is the operator or just a client"). Nexus + unidentified operator => activity-cluster, NOT a firm nation attribution. No service named anywhere. Set 2026-06-25 audit.
    auspex_assessment: concur
    attribution_date: 2025-06-01
    attribution_source_id: securityscorecard/2025-06_lapdogs-china-nexus-operational-relay-bo
doctrine_links:
