id: 2025-06/apt36-nickavach-credential-phishing-campaign-against-indian-defense-pe
name: "APT36 NIC-themed credential-stealing malware campaign against Indian defense personnel"
start_date: 2025-06-21
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
false_flag_risk: none
summary: |
  CYFIRMA documented an APT36 (Transparent Tribe) credential-stealing phishing campaign against Indian defense personnel. The group sent phishing emails carrying malicious PDFs disguised as official government documents; the PDF shows a blurred background with a button imitating the National Informatics Centre (NIC) login interface, and clicking it redirects to a fraudulent URL that downloads a ZIP/7z archive containing a Windows PE executable ("PO-003443125.pdf.exe", written in C/C++) masquerading as a legitimate app. The malware performs credential harvesting via keylogging, clipboard capture, screen capture and browser-session hijacking, with encrypted HTTP(S) C2 over Cloudflare/AWS-hosted infrastructure (malware first observed 2025-05-07; report published 2025-06-21). CYFIRMA states the campaign serves APT36's "strategic objective of establishing long-term infiltration within Indian defense networks." Distinct, named credential-theft operation — separate from the inventory's generic 2025-04-22 tempo entry and from the DeskRAT Linux campaign. Maps to PK doctrine pk/asymmetric-posture-india.
