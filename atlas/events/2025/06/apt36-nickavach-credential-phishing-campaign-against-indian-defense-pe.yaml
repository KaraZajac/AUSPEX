    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Stealing NIC/email credentials from Indian defense personnel via NIC-themed phishing-and-malware to enable long-term infiltration of defense networks is textbook Indian-military collection under Pakistan's asymmetric cyber posture against India. Held at strongly_inferred (NOT attested): CYFIRMA states the proximate objective ("long-term infiltration within Indian defense networks") but names no Pakistani strategic/doctrinal tasking — and the pk/asymmetric-posture-india doctrine is itself inferred (no published Pakistani text), so the WHY-at-doctrine-level is an AUSPEX inference, not an attested claim.
    attesting_source_id: null
    inference_basis:
      signals:
        - "CYFIRMA: APT36 'has been actively targeting Indian defense personnel'; target technology Windows; impact 'Credential Harvesting, Data Exfiltration' — squarely the military-collection pillar's Indian-defense target set."
        - "CYFIRMA states the campaign's 'strategic objective of establishing long-term infiltration within Indian defense networks' — collection-for-access, the goal the military-collection pillar encodes."
        - "Lure imitates the National Informatics Centre (NIC) login interface (the Indian government's official email/IT backbone), consistent with the pillar's documented Indian-government/defense lure pattern."
      ruled_out: "pk/asymmetric-posture-india/kashmir-political — the victims are Indian defense personnel and the lure is a generic NIC/government-document theme; the source names no Kashmir/journalist/dissident targeting, so the Kashmir-political reading does not fit."
