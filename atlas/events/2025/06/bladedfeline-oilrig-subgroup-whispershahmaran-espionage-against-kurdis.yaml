  notes: "Audited vs ESET 'BladedFeline: Whispering in the dark' (raw captured 2026-06-24, sha256 a4b2ee11…, hash re-verified). FACTS confirmed: KRG diplomatic + Iraqi-govt officials + a regional Uzbek telecom; Whisper/Shahmaran backdoors, PrimeCache IIS module, Flog webshell, Laret/Pinar tunnels; GOI access via suspected internet-facing web-server exploit→Flog webshell, KRG vector unclear; OilRig linkage = shared ME targeting + VideoSRV/RDAT recovered on KRG systems + PrimeCache↔RDAT code similarity. ATTRIBUTION: ESET names only 'Iran-aligned' + 'medium confidence … subgroup of OilRig (APT34)' — 0 mentions of MOIS/Ministry of Intelligence/IRGC/Revolutionary Guard in raw, 8 of 'Iran-aligned'; actor correctly ir/unscoped/bladedfeline (no service), attributing_org_confidence moderate, attribution_level set named-actor. CORRECTIONS: (1) start_date 2025-06-05→2017-09-21 (first timeline op; 2025-06-05 was the publication date → moved to new disclosure_date); (2) doctrine_link ir/forward-defense plausible→strongly_inferred + attesting_source set + inference_basis added — ESET states the collection purpose ('strategic access … to spy on and potentially manipulate'; in Iraq 'counter the influence of Western governments'), one surviving strategic reading, but no doctrine named so not attested; (3) added attribution_level; cleaned a stray confidence comment. published_on 2025-06-05 matches raw byline ('05 Jun 2025'). Targets accurate (KRG→iq is correct: a regional govt within Iraq). FK check: actor + ir/forward-defense doctrine + all three sectors resolve. Source already carried a prior 2026-06-24 LLM audit + raw_snapshot/content_sha256 (preserved, not re-fetched). No actor issues outstanding."
