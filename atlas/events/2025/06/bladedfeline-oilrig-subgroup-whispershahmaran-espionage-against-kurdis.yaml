initial_vector: n-day
false_flag_risk: none
summary: |
  ESET Research details BladedFeline, an Iran-aligned cyberespionage group assessed with medium confidence to be a subgroup of OilRig (APT34), that has maintained persistent access to Kurdistan Regional Government diplomatic officials since at least 2017 and to high-ranking Iraqi government officials, as well as a regional telecommunications provider in Uzbekistan. The group runs a custom toolkit including the Whisper and Shahmaran backdoors, the PrimeCache malicious IIS module, the Flog webshell and Laret/Pinar reverse tunnels. For the Iraqi government victims ESET suspects the operators exploited a vulnerability in an internet-facing web server to deploy the Flog webshell, though the access vector for the earlier KRG compromises remains unclear. The OilRig linkage rests on shared Middle East targeting, recovery of OilRig's VideoSRV and RDAT tools on compromised KRG systems, and code similarities between PrimeCache and OilRig's RDAT backdoor. Activity tracked runs from September 2017 through tool uploads in March 2024.
