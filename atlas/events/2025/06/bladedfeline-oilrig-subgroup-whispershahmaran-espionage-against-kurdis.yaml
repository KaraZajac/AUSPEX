doctrine_links:
  - doctrine_id: ir/forward-defense
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Persistent OilRig-subgroup espionage against Kurdistan Regional Government diplomats, high-ranking Iraqi officials and a regional telecom is political/diplomatic intelligence collection across Iran's immediate periphery — the forward theater where the forward-defense posture concentrates collection. ESET states the strategic purpose at the collection level: BladedFeline seeks "to maintain strategic access to high-ranking officials in both governmental entities … to spy on and potentially manipulate," and in Iraq is "most probably trying to counter the influence of Western governments following the US invasion and occupation." Mapping that stated near-abroad, counter-Western-influence collection onto Iran's forward-defense posture is the AUSPEX inference (the source does not name a doctrine), but it is the single strategic reading that survives — hence strongly_inferred, not attested.
    attesting_source_id: welivesecurity/2025-06_bladedfeline-oilrig-subgroup-whispershah
    inference_basis:
      signals:
        - "ESET names the purpose: targeting KRG + Government of Iraq 'for cyberespionage purposes, with an eye toward maintaining strategic access to high-ranking officials … to spy on and potentially manipulate.'"
        - "ESET names the geopolitical motive in Iraq: 'most probably trying to counter the influence of Western governments following the US invasion and occupation of the country.'"
        - "Iran-aligned OilRig subgroup operating exclusively against Iran's immediate periphery (Iraq/KRG diplomats + a regional telecom), the forward theater the doctrine concerns; persistent multi-year access (2017→2024) consistent with strategic-access maintenance rather than a one-off intrusion."
      ruled_out: "ir/sanctions-evasion — no revenue/financial or sanctions-circumvention element (pure diplomatic/political espionage). ir/resistance-axis — that doctrine concerns anti-Israel/anti-US alliance & proxy-capability transfer (Hezbollah/PMF/Houthis), not unilateral diplomatic espionage against the KRG."
