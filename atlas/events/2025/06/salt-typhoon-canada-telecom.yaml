id: 2025-06/salt-typhoon-canada-telecom
name: CCCS/FBI bulletin — Salt Typhoon compromise of a Canadian telecom via Cisco CVE-2023-20198
start_date: 2025-02-15  # CCCS: devices "compromised by likely Salt Typhoon actors in mid-February 2025"
disclosure_date: 2025-06-19  # joint CCCS/FBI cyber threat bulletin (date_created/modified)
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: n-day  # Cisco IOS XE Web UI CVE-2023-20198 (disclosed Oct 2023)
outcome_summary: |
  On 2025-06-19 the Canadian Centre for Cyber Security (Cyber Centre)
  and the US Federal Bureau of Investigation (FBI) jointly published a
  cyber threat bulletin reporting that three network devices registered
  to an unnamed Canadian telecommunications company were compromised in
  mid-February 2025 by actors it assessed to be "almost certainly PRC
  state-sponsored actors, specifically Salt Typhoon" (the devices were
  "compromised by likely Salt Typhoon actors"). The actors exploited
  Cisco IOS XE Web UI CVE-2023-20198 to retrieve the running
  configuration files from all three devices and modified at least one
  to configure a GRE tunnel, "enabling traffic collection from the
  network." The affected carrier was not named. The Cyber Centre
  assessed that PRC cyber actors "will almost certainly continue to
  target Canadian organizations as part of this espionage campaign,
  including telecommunications service providers and their clients,
  over the next two years."
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Extends the Salt Typhoon telecom-collection campaign into Canada, a
  Five Eyes / SIGINT-cooperative jurisdiction, beyond the original
  cluster of US telecom victims. Combined with the June 2025 Viasat /
  Comcast / Digital Realty disclosures (sibling event), it marks the
  campaign's expansion across the Anglo-Saxon SIGINT-cooperative
  jurisdictions by mid-2025. This Canadian compromise pre-dates and is
  folded into the 13-government AA25-239A Salt Typhoon advisory of
  2025-08-27.
attributions:
  - actor_id: cn/mss/salt-typhoon
    attributing_org: Canadian Centre for Cyber Security (Cyber Centre) + US FBI
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2025-06-19
    attribution_source_id: cccs/2025-06-19_prc-salt-typhoon-telecom-bulletin
    notes: |
      The joint CCCS/FBI bulletin names the actor at nation +
      named-actor level and hedges: "The responsible actors are almost
      certainly PRC state-sponsored actors, specifically Salt Typhoon"
      and the devices were "compromised by likely Salt Typhoon actors."
      It names NO Chinese service (no MSS / Ministry of State Security)
      and NO unit, and does not name the affected carrier — hence
      attribution_level: named-actor. The actor_id cn/mss/salt-typhoon
      carries the MSS service placement, but that MSS naming lives in
      the actor record's own sources (OFAC 2025-01-17 designation of
      the Salt Typhoon operating company Sichuan Juxinhe), NOT in this
      event's CCCS/FBI source. AUSPEX concurs: Salt Typhoon is the
      consensus PRC telecom-espionage cluster and the compromise itself
      is first-party confirmed by Canada's national CERT jointly with
      the FBI.
