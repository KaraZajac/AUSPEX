id: 2025-06/salt-typhoon-canada-telecom
name: Canadian Centre for Cyber Security confirms Salt Typhoon compromise of Canadian telecom
start_date: 2025-02-01  # CCCS-stated mid-February compromise window
disclosure_date: 2025-06-20
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # Cisco CVE-2023-20198
outcome_summary: |
  The Canadian Centre for Cyber Security publicly confirmed
  that Salt Typhoon compromised at least one Canadian
  telecommunications provider in mid-February 2025, exploiting
  Cisco IOS XE Web UI CVE-2023-20198 to extract running
  configuration files and establish a GRE tunnel for traffic
  exfiltration. Rogers, Bell, Telus, and SaskTel publicly
  acknowledged active monitoring; specific victim attribution
  among the four major carriers was not formally disclosed.
  The Canadian compromise pre-dates and feeds into the August
  AA25-239A 13-government Salt Typhoon advisory.
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Confirms the Five Eyes lateral spread of Salt Typhoon beyond
  the original nine US telecom victims; combined with the June
  Viasat / Comcast / Digital Realty disclosures, establishes
  that the campaign's scope had expanded by mid-2025 to all
  major Anglo-Saxon SIGINT-cooperative jurisdictions.
