start_date: 2025-06-04
incident_type:
  - ransomware
  - extortion
  - intrusion
  - data-theft
initial_vector: valid-creds
false_flag_risk: none
summary: |
  CISA, FBI and Australia's ASD's ACSC updated their joint advisory AA23-352A on Play (Playcrypt) ransomware. As of May 2025 the FBI had identified approximately 900 affected entities, up from ~300 in the original December 2023 advisory, making Play among the most prolific ransomware groups of 2024. Active since June 2022, Play gains access via valid accounts bought on criminal markets and exploitation of public-facing apps (FortiOS, Microsoft Exchange ProxyNotShell/OWASSRF). Play is a major gap in the corpus (no existing events). The double/multi-extortion model and the breadth of North/South American and European critical-infrastructure victims make it doctrinally relevant to the e-crime slice.
