outcome_summary: |
  In the days immediately following the 21 June 2025 US strikes on
  Iran's Fordow, Natanz, and Isfahan nuclear facilities, Iran-
  aligned hacktivist personas claimed DDoS attacks against US
  targets. Mr Hamza claimed US Air Force domains and US aerospace
  and defense companies (#Op_Usa), and Keymous+ claimed US
  financial-services providers; both supported their claims with
  check-host.net traces showing website downtime of one to ten
  hours on 22 June. Team 313 claimed to have hit Truth Social but
  offered insufficient proof for the claim to be deemed credible,
  and Cyber Jihad Movement only announced a forthcoming #OpUSA
  campaign. In all, Cyble observed attack claims by Iran-aligned
  hacktivist groups against 15 US organizations and 19 websites.
  On 22 June the DHS National Terrorism Advisory System assessed
  that low-level cyber attacks against US networks by pro-Iranian
  hacktivists were likely.
false_flag_risk: none
summary: |
  Doctrinally significant as the broadening of the Iran-Israel
  12-day-war cyber theater into US-target DDoS once US strikes
  joined the kinetic exchange. Companion event to the existing
  2025/06 iran-israel-12-day-war-cyber-surge entry but focused on
  the hacktivist-DDoS leg specifically. Attribution is nation-
  level Iran-ALIGNED, not state-directed: Cyble frames the personas
  as "Iran-aligned hacktivist groups"; the DHS 2025-06-22 bulletin
  explicitly distinguishes "pro-Iranian hacktivists" from "cyber
  actors affiliated with the Iranian government"; and the
  2025-06-30 CISA/FBI/NSA/DC3 fact sheet states it had "not seen
  indications of a coordinated campaign of malicious cyber activity
  in the U.S. that can be attributed to Iran." The self-branded
  personas (pan-Islamic / pro-Palestine hashtags such as
  #FreePalestine, #OneUmmah, #SupportIran) operate inside the
  Resistance-Axis information-warfare ecosystem without being
  established IRGC or MOIS fronts — which is why the actor is
  modeled null and the doctrine links are non-attested.
