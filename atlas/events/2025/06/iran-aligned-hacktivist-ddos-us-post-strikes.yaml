  notes: |
    Audited against three snapshotted sources. NOT a phantom: the Cyble
    URL is the real article "Hacktivists Launch DDoS Attacks At U.S.
    Following Iran Bombings" (raw 6db01d2a…1f3fc34a, 883,494 B). RE-SOURCE
    path taken: added two govt-primary corroborators — DHS NTAS bulletin
    2025-06-22 (c65c9e56…5725faeb, 310,735 B) and joint CISA/FBI/NSA/DC3
    fact sheet 2025-06-30 (e3fb7fc4…7fbecdcc, 59,246 B); event went from
    single-tertiary-source to tertiary + 2×primary.
    [a] FACTS: personas Mr Hamza / Keymous+ / Team 313 / Cyber Jihad,
    targets (USAF domains, aerospace & defense cos, banks/financial
    services), "15 U.S. organizations and 19 websites", 1–10h downtime,
    Team 313 v. Truth Social "did not offer sufficient proof" — all
    verbatim in Cyble. CORRECTED "Cyble researchers VERIFIED attack claims"
    → "observed" (Cyble's own wording: "Cyble observed attack claims ...
    against 15 U.S. organizations and 19 websites"; only Mr Hamza +
    Keymous+ carried check-host.net proof). CORRECTED: Cyber Jihad did not
    execute a verified DDoS — it "claimed that it will begin cyberattacks"
    (#OpUSA); outcome_summary now says it "announced" a campaign.
    Fordow/Natanz/Isfahan retained as established public record (the
    documented 21 June strike targets; Cyble says only "Iranian nuclear
    sites", the companion 12-day-war event names all three) — flagged as
    context not carried by the three cited DDoS sources.
    [b] ATTRIBUTION: actor_id null retained and reinforced. Cyble:
    "Iran-aligned hacktivist groups". DHS verbatim: "Low-level cyber
    attacks against US networks by pro-Iranian hacktivists are likely, and
    cyber actors affiliated with the Iranian government may conduct attacks
    against US networks" — DISTINGUISHES hacktivists from govt actors.
    CISA/FBI/NSA/DC3 verbatim: "At this time, we have not seen indications
    of a coordinated campaign of malicious cyber activity in the U.S. that
    can be attributed to Iran." → nation-level Iran-ALIGNED, not state-
    directed; concur-with-caveat honest. REMOVED the unsourced "Mr Hamza
    Morocco-origin" claim from the summary and re-grounded the caveat on
    DHS/CISA wording plus the pan-Islamic hashtags Cyble lists.
    [c] DATES: start 2025-06-22 (check-host traces + DHS warning that day)
    ✓; disclosure 2025-06-25 (Cyble pub date) ✓; end_date 2025-06-30 was
    UNSUPPORTED (Cyble published 06-25; concrete claims cluster 06-22..23)
    → set null. Source published_on values correct (Cyble 06-25, DHS
    06-22, CISA 06-30).
    [d] DOCTRINE_LINKS: neither is attested (correct — no source states the
    goal for this US-DDoS leg), so no attesting_source_id required. Added
    inference_basis — signals[]+ruled_out on the strongly_inferred
