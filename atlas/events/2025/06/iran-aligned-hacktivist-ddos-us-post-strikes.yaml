id: 2025-06/iran-aligned-hacktivist-ddos-us-post-strikes
name: Iran-aligned hacktivist DDoS wave against US after 21 June strikes on Fordow/Natanz/Isfahan
start_date: 2025-06-22
disclosure_date: 2025-06-25
end_date: 2025-06-30
incident_type:
  - disruption
  - influence-operation
initial_vector: unknown
outcome_summary: |
  In the 48-hour window following the 21 June 2025 US strikes on
  Iran's Fordow, Natanz, and Isfahan nuclear facilities, Iran-
  aligned hacktivist personas (Mr Hamza, Keymous+, Team 313,
  Cyber Jihad) claimed DDoS attacks against US Air Force domains,
  US aerospace and defense companies, financial-services
  providers, and Truth Social. Cyble researchers verified attack
  claims against 15 US organizations and 19 websites, with
  observable downtime windows ranging from one to ten hours.
  Several claims (Team 313 v. Truth Social) lacked sufficient
  technical proof to be deemed credible.
false_flag_risk: none
summary: |
  Doctrinally significant as the broadening of the Iran-Israel
  12-day-war cyber theater into US-target DDoS once US-strikes
  joined the kinetic exchange. Companion event to the existing
  2025/06 iran-israel-12-day-war-cyber-surge entry but focused on
  the hacktivist-DDoS leg specifically. Mr Hamza's broader
  Morocco-origin / Islamic-defender self-positioning means the
  attribution to "Iranian-state-aligned" is operational rather
  than strict — the personas operate inside the Resistance-Axis
  information-warfare ecosystem without necessarily being IRGC
  or MOIS direct fronts. Doctrine link reflects this nuance.
