id: 2025-06/sandworm-zerolot-ukraine-grain
name: Sandworm ZEROLOT and Sting wipers — Ukraine grain, energy, logistics sectors
start_date: 2025-04-01  # AUDIT: earliest precisely-dated ZEROLOT+Sting deployment — April 2025, Ukrainian university (ESET follow-on report via BleepingComputer). ESET's May report already showed ZEROLOT vs Ukrainian energy within its Oct 2024–Mar 2025 window (onset not precisely dated), so this is the earliest firm date, not necessarily campaign onset
disclosure_date: 2025-05-19  # first public naming of ZEROLOT (ESET APT report, deployed vs Ukrainian energy). The April university + June/Sept grain escalation were disclosed later in ESET's follow-on report (BleepingComputer 2025-11-06)
end_date: null
incident_type:
  - destructive
  - wiper
initial_vector: unknown  # AUDIT: was valid-creds. Sources don't state the initial vector — ESET/BleepingComputer say UAC-0099 brokered initial access for some incidents (method unstated), then Sandworm distributed ZEROLOT via Active Directory Group Policy (a post-access deployment technique, not initial access)
outcome_summary: |
  ESET's May 2025 APT Activity Report first named Sandworm's new
  ZEROLOT wiper, deployed against Ukrainian energy companies and
  distributed by abusing Active Directory Group Policy. ESET's
  follow-on report (disclosed November 2025) documented ZEROLOT
  and a second new wiper, Sting, deployed in April 2025 against a
  Ukrainian university, plus June and September 2025 waves that
  hit Ukrainian entities across the governmental, energy, logistics
  and grain sectors. ESET flagged the grain sector as a
  not-so-frequent target and assessed the targeting "likely
  reflects an attempt to weaken the country's war economy", grain
  export being one of Ukraine's main revenue streams.
false_flag_risk: none
summary: |
  Continues the Sandworm IT-network wiper pattern (HermeticWiper,
  CaddyWiper, SwiftSlicer since 2022), but with a shift toward
  economic-warfare targeting: grain-export infrastructure rather
  than purely military or governmental systems. Vendor reporting
  (ESET) is the primary documentary record; no separate
  US-government joint advisory has been issued specific to ZEROLOT
  as of mid-2026.
