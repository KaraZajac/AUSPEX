id: 2025-06/sandworm-zerolot-ukraine-grain
name: Sandworm ZEROLOT and Sting wipers — Ukraine grain, energy, logistics sectors
start_date: 2025-04-01  # ESET-reported initial ZEROLOT deployment against Ukrainian university
disclosure_date: 2025-05-19  # ESET APT Activity Report H1 2025
end_date: null
incident_type:
  - destructive
  - wiper
initial_vector: valid-creds
outcome_summary: |
  ESET's H1 and H2 2025 APT Activity Reports documented a
  sustained Sandworm destructive campaign against Ukrainian
  governmental, energy, logistics, and grain-export entities
  using new wiper families ZEROLOT and Sting. ZEROLOT abuses
  Active Directory Group Policy to deploy across enterprise
  estates. June and September 2025 waves specifically targeted
  organisations supporting Ukraine's grain exports — one of the
  country's principal hard-currency revenue streams during the
  war economy.
false_flag_risk: none
summary: |
  Continues the Sandworm IT-network wiper pattern observed since
  WhisperGate (2022) and HermeticWiper, but with a deliberate
  shift toward economic-warfare targeting: grain-export
  infrastructure rather than purely military or governmental
  systems. Vendor reporting (ESET) is the primary documentary
  record; no separate US-government joint advisory has been
  issued specific to ZEROLOT as of mid-2026.
