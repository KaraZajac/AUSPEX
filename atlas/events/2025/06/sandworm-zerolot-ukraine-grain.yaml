        - "Targeting is exclusively Ukrainian entities (governmental, energy, logistics, grain) with destructive wiper intent during the active Russo-Ukrainian war — the operational signature of the Ukraine-as-priority-theater pillar."
      ruled_out: "A non-Russkiy-Mir reading (financially-motivated or opportunistic wiping) is rejected: this is a GRU military unit deploying non-monetised destructive wipers against a single adversary state at war with Russia."
    contested: false
    analyst: claude
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/non-contact-warfare
    program_id: null
    confidence: strongly_inferred  # AUDIT: kept strongly_inferred — ESET states the war-economy goal but HEDGES it ("likely reflects an attempt"), below the unhedged-verbatim bar for attested; see qc Kara-flag
    reasoning: |
      Targeting the grain-export sector — a war-economy revenue
      stream — extends the doctrine's non-kinetic / indirect
      attrition logic to civilian economic infrastructure. ESET
      states this economic-warfare purpose but hedges it ("likely
      reflects an attempt"), so it is graded strongly_inferred
      rather than attested.
    attesting_source_id: bleepingcomputer/2025-11-19_sandworm-grain-wipers
    inference_basis:
      signals:
        - "ESET (via BleepingComputer) states the strategic purpose at goal level: 'Considering that grain export remains one of Ukraine's main sources of revenue, such targeting likely reflects an attempt to weaken the country's war economy.' — a hedged goal-statement ('likely reflects an attempt')."
        - "ESET adds the grain sector 'stands out as a not-so-frequent target', underscoring a deliberate economic-attrition choice rather than incidental collateral."
        - "Wiper (destructive, non-monetised) effect against a wartime adversary's economic base is non-kinetic / indirect warfare against war-making capacity."
      ruled_out: "Military/OT sabotage under energy-weaponization/grid-attack is rejected as the primary reading: the headline effect here is IT-network data destruction against grain/logistics/government revenue-and-administration systems, not electric-grid OT disruption (no power outage claimed)."
    contested: false
