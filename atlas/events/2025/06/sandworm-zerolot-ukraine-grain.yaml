  notes: |
    Audited vs both cited RAW sources, curl-captured + hashed today. STEP-0 triage:
    both live, HTTP 200, on-topic (NOT phantoms) — normal audit path.
    S1 ESET press release "Russian cyberattacks in Ukraine intensify; Sandworm
    unleashes new destructive wiper" — raw_snapshot
