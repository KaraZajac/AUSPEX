    pre-audit event mis-credited grain/Sting/four-sector to "H1 and H2" — corrected.
    [a] FACTS — corrected to source-exact:
      • ZEROLOT vs energy + AD Group Policy: S1 verbatim — "The Russia-aligned
        Sandworm group intensified destructive operations against Ukrainian energy
        companies, deploying a new wiper named ZEROLOT" and (Jean-Ian Boutin) "the
        attackers abused Active Directory Group Policy in the affected
        organizations". The flagged AD-GPO detail IS genuine ESET wording (kept);
        stripped the embellishment "to deploy across enterprise estates".
      • Sting + April + university: S2 verbatim — "APT44 also deployed 'ZeroLot'
        and 'Sting' wipers in April 2025, targeting a university in Ukraine" ("Sting
