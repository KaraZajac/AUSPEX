    sha256 566e6765…8e8fabcf, 90,887 bytes (secondary; relays ESET's follow-on
    report covering Apr–Sep 2025).
    KEY SPLIT: the two sources carry DIFFERENT slices. S1 carries ZEROLOT + energy
    + AD-Group-Policy ONLY (grain=0 hits, Sting-as-wiper=0, April=0, university=0,
    logistics=0 in S1). S2 carries Sting, April/university, June/September, grain
