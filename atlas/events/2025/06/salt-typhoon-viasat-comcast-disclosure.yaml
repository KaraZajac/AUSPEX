id: 2025-06/salt-typhoon-viasat-comcast-disclosure
name: Salt Typhoon victim expansion — Viasat confirmed, Comcast / Digital Realty agency-assessed
start_date: 2024-01-01  # ongoing campaign (Salt Typhoon active since 2019 per actor record; Viasat breach discovered "earlier this year" per BleepingComputer 2025)
disclosure_date: 2025-06-09  # Nextgov Comcast/Digital-Realty agency assessment 2025-06-09; Viasat named by Bloomberg 2025-06-17, confirmed by Viasat 2025-06-18 (see outcome_summary)
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: n-day
outcome_summary: |
  A June 2025 cluster of disclosures expanded the named Salt
  Typhoon victim set beyond the core US telecom carriers exposed
  in the original 2024 reporting. Nextgov/FCW (2025-06-09), citing
  three people familiar, reported that the NSA "made the
  determination that Comcast had likely been impacted" and that
  CISA "cataloged Digital Realty as being potentially compromised"
  — both are US-agency assessments, NOT confirmed compromises, and
  neither company had publicly confirmed at the time. Separately,
  Bloomberg (2025-06-17) first reported that satellite operator
  Viasat was a victim; on 2025-06-18 Viasat confirmed
  "unauthorized access through a compromised device" but said its
  investigation found "no evidence ... to suggest any impact to
  customers" and that the incident had been "remediated." While
  inside US telecom networks the operator accessed the US law
  enforcement wiretapping platform and the "private communications"
  of a "limited number" of US government officials. The Canadian
  Centre for Cyber Security separately confirmed a Canadian telecom
  compromise (see sibling event 2025-06/salt-typhoon-canada-telecom;
  Cisco CVE-2023-20198, mid-February 2025) — a cross-jurisdiction
  spread also noted by TechCrunch's 2026 cumulative account.
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Continued exposure of the Salt Typhoon collection footprint
  surfaced repeatedly through 2025. Doctrinally the Viasat naming
  is significant: BleepingComputer notes that Russian hackers had
  breached Viasat's KA-SAT consumer satellite-broadband service in
  February 2022 (AcidRain, invasion-coincident) — so the same
  satellite-comms operator now appears in a PRC SIGINT-collection
  footprint, underscoring strategic-collection convergence at the
  satellite-comms layer. As AUSPEX framing (not asserted by the
  cited sources), this June cluster feeds the later 13-government
  CISA AA25-239A Salt Typhoon consolidation of August 2025. NOTE
  on precision: of the three named entities only Viasat is a
  confirmed victim (Viasat's own statement); Comcast and Digital
  Realty are US-agency "likely" / "potentially compromised"
  assessments, not confirmations.
