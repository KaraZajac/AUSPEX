id: 2025-06/salt-typhoon-viasat-comcast-disclosure
name: Salt Typhoon victim expansion — Viasat, Comcast, Digital Realty named
start_date: 2024-01-01  # ongoing campaign
disclosure_date: 2025-06-10
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  Bloomberg and Nextgov reporting in June 2025 named additional
  Salt Typhoon victims beyond the originally disclosed nine US
  telecoms: satellite operator Viasat, residential cable carrier
  Comcast, and data-center operator Digital Realty. US agencies
  assessed the China-linked operator likely also compromised
  residential ISPs and data-center providers — a substantial
  expansion of the campaign's surface beyond core mobile-carrier
  signalling and lawful-intercept access. The Canadian Centre for
  Cyber Security separately confirmed mid-February 2025
  compromise of at least one Canadian telecom via Cisco
  CVE-2023-20198.
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  Continued exposure of the Salt Typhoon collection footprint
  surfaced repeatedly through 2025, building toward the
  13-government AA25-239A consolidation in August. Doctrinally
  the Viasat naming is significant — Viasat was the target of
  the 2022 Russian opening-of-war KA-SAT operation; that the
  same infrastructure layer is now in the PRC SIGINT collection
  footprint underscores the strategic-collection convergence at
  the satellite-comms layer.
