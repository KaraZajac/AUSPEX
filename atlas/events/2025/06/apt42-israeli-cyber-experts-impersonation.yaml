    pillar_id: ir/resistance-axis/anti-israel-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Wholly Israel-directed IRGC cyber activity cadenced to the
      active June 2025 Iran-Israel war fits the Resistance-Axis
      pattern of cyber operations against Israeli targets sequenced
      to kinetic confrontation -- though here the effect is
      espionage rather than the destructive/coercive ops the pillar
      most often illustrates.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Israel-specific victimology: Check Point -- 'targeting Israeli journalists, high-profile cyber security experts and computer science professors from leading Israeli universities'; the campaign is entirely Israel-directed."
        - "Kinetic-conflict sequencing per source: the academic-impersonation phase began 'Following the outbreak of the Iran-Israel war' (mid-June 2025) -- cyber activity cadenced to the war, the Resistance-Axis anti-Israel signature."
      ruled_out: "attested -- rejected: Check Point frames the activity as Iran-Israel-tensions context plus cyber-espionage, not as coercive signalling, so the coercion terminal goal is inferred. NB the pillar's canonical examples are destructive (Moses Staff, CyberAv3ngers); this link rests on the Israel-directed + war-sequenced signal, not on a destructive effect -- a weaker fit than the regime-preservation link above."
    contested: false
    analyst: claude
