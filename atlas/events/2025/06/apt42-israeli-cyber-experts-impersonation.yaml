name: APT42 impersonates cybersecurity professionals to phish Israeli academics
start_date: 2025-06-15        # AUDIT 2026-07-10: CORRECTED 2024-06-15 -> 2025-06-15. Check Point dates the cybersecurity-firm-impersonation phase to "Starting mid-June" 2025, "Following the outbreak of the Iran-Israel war"; the custom React phishing kit dates to January 2025. NO 2024 date appears in Check Point — the 2024 value was an anachronism (bled from the separate Google TAG Aug-2024 tempo-surge report).
disclosure_date: 2025-06-25   # AUDIT 2026-07-10: CORRECTED 2025-06-15 -> 2025-06-25 (Check Point article:published_time 2025-06-25T12:55:49Z; visible byline "June 25, 2025")
end_date: null                # AUDIT 2026-07-10: was 2025-06-30 (unsourced specific date). Check Point "continues to track the large and evolving cluster" -> ongoing at disclosure; null per corpus convention.
incident_type:
  - intrusion
  - espionage                 # AUDIT 2026-07-10: was data-theft. Check Point frames the credential-harvesting as "in support of Educated Manticore's cyber-espionage activities" ("social-engineering" is not a schema incident_type/initial_vector value; the spear-phishing/rapport tradecraft is described in prose)
initial_vector: phishing      # Check Point: "Initial Vector: Spear-phishing" (rapport-building social engineering via email + WhatsApp)
outcome_summary: |
  Following the outbreak of the June 2025 Iran-Israel war, the
  IRGC-IO actor APT42 -- which Check Point tracks as "Educated
  Manticore" and aligns with the wider community's APT42 /
  Charming Kitten / Mint Sandstorm -- ran a spear-phishing
  phase in which operators posed as fictitious cybersecurity-
  firm employees, approaching top cyber and computer-science
  experts at leading Israeli universities via email and
  WhatsApp. After building rapport, operators steered targets
  to attacker-controlled pages mimicking Google authentication
  and Google Meet to harvest Gmail credentials and 2FA codes
  for account takeover. Check Point assessed the custom React
  phishing kit in use since January 2025. Lure emails appeared
  AI-assisted (formal tone, error-free grammar); some were
  exposed by operator-error name mismatches between the sender
  display-name and the email-account name (email body "Sarah
  Novominski" vs. sender account "Sara Noviminski").
false_flag_risk: none
summary: |
  IRGC-IO (APT42 / "Educated Manticore") credential-collection
  against Israeli cyber and computer-science academics,
  disclosed by Check Point Research on 25 June 2025 during the
  June 2025 Iran-Israel war. Google TAG supplies companion
  context only: an APT42 phishing-tempo surge against Israeli
  and U.S. users between February and late July 2024, with the
  U.S. and Israel together making up roughly 60% of APT42's
  known geographic targeting (TAG, 14 Aug 2024) -- a distinct,
  earlier campaign, not this event's academic-impersonation
  phase. Doctrinally tags the IRGC's standing constitutional-
  role intelligence/credential-theft mandate (the doctrine text
  explicitly aligns APT42 operations to the regime-preservation
  pillar) and the war-sequenced anti-Israel dimension of the
  Resistance-Axis posture -- both strongly-inferred, neither
  stated by the vendor. Notable tradecraft: AI-assisted lures
  plus operator-error persona slips.
attributions:
