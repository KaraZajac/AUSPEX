    attributing_org: Check Point Research
    attributing_org_confidence: high   # Check Point states it as a standing assessment: Educated Manticore "is believed to operate on behalf of the ... IRGC-IO" and is "associated with the Islamic Revolutionary Guard Corps" (tier-1 vendor, multi-year tracking; APT42=IRGC-IO is Mandiant/DOJ-consensus)
    attribution_level: named-unit      # AUDIT 2026-07-10 (added): Check Point names the actor (APT42/Educated Manticore) AND the specific service (IRGC Intelligence Organization / IRGC-IO); schema maps a named service ("e.g. IRGC") to named-unit
    auspex_assessment: concur
    attribution_date: 2025-06-25       # AUDIT 2026-07-10: was 2025-06-15; Check Point published 2025-06-25
    attribution_source_id: checkpoint/2025_educated-manticore-tech-academics
