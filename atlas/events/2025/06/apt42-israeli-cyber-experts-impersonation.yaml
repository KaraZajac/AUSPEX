    confidence: strongly_inferred
    reasoning: |
      IRGC-IO credential-theft against individuals judged hostile
      to the Revolution -- here Israeli cyber/CS academics, and
      (per Check Point) Israeli journalists -- is the standing
      intelligence/credential-theft mission the regime-preservation
      pillar encodes; the pillar text itself lists APT42 operations
      as aligning here.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Actor->service per source: Check Point states Educated Manticore 'is believed to operate on behalf of the Islamic Revolutionary Guard Corps' Intelligence Organization (IRGC-IO)' and is 'associated with the Islamic Revolutionary Guard Corps' -- placing the operation inside the IRGC's institutional intelligence apparatus."
        - "Mechanism match: covert credential/account access ('intercept both passwords and 2FA codes and gain unauthorized access to the victims' accounts') 'in support of Educated Manticore's cyber-espionage activities' -- the surveillance/credential-theft method the regime-preservation pillar authorizes; Check Point also notes compromise of Israeli journalists' accounts, a pillar target sector."
        - "Doctrine text self-links the actor: the regime-preservation pillar summary names 'APT42 operations' (alongside APT35/Charming Kitten, APT39) as aligning here."
      ruled_out: "attested -- rejected: Check Point never states the constitutional/regime-preservation terminal goal (safeguarding the Revolution); it asserts only the IRGC-IO tasking and a cyber-espionage purpose, so the doctrinal terminal goal is inferred, not vendor-stated."
