  notes: |
    REVERSE-DIRECTIONALITY event: Israel / Predatory Sparrow (Gonjeshke
    Darande) = ATTACKER; Bank Sepah / Iran = VICTIM. Audited vs all three
    cited sources, each re-fetched live (HTTP 200) and snapshotted this
    pass: Times of Israel "Israel-linked group claims it hacked Iranian
    bank, destroyed data" (timesofisrael__2025-06-17_bank-sepah-claim.html,
    sha256 3f749277…80f6671b, 368,330 B); The Record "Pro-Israel hackers
    claim breach of Iranian bank amid military escalation"
    (therecord__2025-06-17_predatory-sparrow-bank-sepah.html, sha256
    dda8d954…dc9c190d, 83,018 B); NATO CCDCOE toolkit "Predatory Sparrow's
    operations against Iranian financial cyber infrastructure (2025)"
    (ccdcoe__2025_predatory-sparrow-iran-financial.html, sha256 ca7f8a66…
    d793b4f7, 50,809 B). PATH TAKEN: normal audit — all three REAL and
    on-topic (no phantom / wrong-source).

    [a] FACTS — corroborated + de-embellished. Self-claim + destruction:
    ToI "conducted cyberattacks which destroyed the data of" Bank Sepah;
    CCDCOE "claimed to have destroyed the bank's data". WIPER classification
    carried by CCDCOE: Predatory Sparrow "is said to have deployed wiper
    malware and disabled endpoints by overloading or crashing them"
    (supports incident_type [destructive, wiper, disruption]). Nationwide
    impact carried by CCDCOE: "widespread banking disruptions across the
    country, temporary closures of several Bank Sepah branches, and
    unavailability of customers' accounts"; The Record: "problems with
    account access, withdrawals, and card payments". Gas-station impact
    HEDGED to match The Record's "The disruption may also have affected
    Iran's gas stations, which rely on the bank to process transactions"
    (was stated too firmly). No dollar figure asserted for Bank Sepah —
    correct: the ~$90M drain figure belongs to the Nobitex sibling, not
    this wipe (CCDCOE keeps them distinct). Iranian non-confirmation
    carried: CCDCOE "neither Bank Sepah nor the government publicly
    addressed these allegations". STRIPPED "Operation Rising Lion" (a
