id: 2025-06/predatory-sparrow-bank-sepah
name: Predatory Sparrow destructive attack on Iran's Bank Sepah
start_date: 2025-06-17
disclosure_date: 2025-06-17
end_date: 2025-06-17
incident_type:
  - destructive
  - wiper
  - disruption
initial_vector: unknown
outcome_summary: |
  Hours after Israeli air strikes on Iranian targets in the
  Israel-Iran 12-day war, the suspected Israeli-linked group
  Predatory Sparrow (Gonjeshke Darande) claimed a destructive
  cyber operation against Iran's state-owned Bank Sepah, the
  banking arm of the IRGC and Iranian Armed Forces. Customers
  reported nationwide account access failures, ATM/POS outages,
  and disruptions to gasoline-station card payments processed
  by Sepah. The group asserted it destroyed data and accused
  the bank of funding Iran's military and nuclear programs.
false_flag_risk: suspected  # Predatory Sparrow hacktivist persona is the IL deniability layer
campaign_id: predatory-sparrow-iran-coercion
summary: |
  Companion to the Predatory Sparrow attack on Iranian crypto
  exchange Nobitex the following day. Doctrinally significant as
  the most direct cyber-kinetic pairing yet observed in the
  Israel-Iran shadow war: a wiper/destructive operation against
  a sanctioned military-finance backbone timed to the opening
  hours of Operation Rising Lion. Predatory Sparrow has not been
  formally attributed by any government, but Israeli media and
  CCDCOE analysis treat the IDF/Mossad linkage as the dominant
  hypothesis.
attributions:
  - actor_id: il/predatory-sparrow
    attributing_org: Predatory Sparrow self-claim (Telegram, X); CCDCOE; Israeli press
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-06-17
    attribution_source_id: timesofisrael/2025-06-17_bank-sepah-claim
    notes: |
      Persona-level self-claim. Predatory Sparrow is widely assessed
      (CCDCOE, Israeli-aligned press, US defense officials cited in
      NYT 2022) as Israel-linked, with IDF Unit 8200 / Mossad as the
      dominant hypothesis. Israel has not formally attested.
      false_flag_risk is suspected at the persona level even though
      the operator-state attribution is firm at the journalistic-
      consensus level.
