id: 2025-06/predatory-sparrow-bank-sepah
name: Predatory Sparrow destructive attack on Iran's Bank Sepah
start_date: 2025-06-17
disclosure_date: 2025-06-17
end_date: 2025-06-17
incident_type:
  - destructive
  - wiper
  - disruption
initial_vector: unknown
outcome_summary: |
  During Israel's June 2025 air campaign against Iran (the
  Israel-Iran 12-day war), the suspected Israeli-linked group
  Predatory Sparrow (Gonjeshke Darande) claimed a destructive
  cyber operation against Iran's state-owned Bank Sepah, the
  banking arm of the IRGC and Iranian Armed Forces. Local
  reports described widespread banking disruptions across the
  country — problems with account access, withdrawals, and card
  payments — and the outage may also have affected Iran's gas
  stations, which rely on Sepah to process transactions. The
  group said it destroyed the bank's data and accused it of
  funding Iran's military and nuclear programs; neither Bank
  Sepah nor the Iranian government publicly confirmed data loss.
false_flag_risk: suspected  # Predatory Sparrow hacktivist persona is the IL deniability layer
campaign_id: predatory-sparrow-iran-coercion
summary: |
  Companion to the Predatory Sparrow attack on Iranian crypto
  exchange Nobitex the following day (18 June 2025, per CCDCOE).
  Doctrinally significant as the most direct cyber-kinetic pairing
  yet observed in the Israel-Iran shadow war: a wiper/destructive
  operation against a sanctioned military-finance backbone during
  the opening week of Israel's June 2025 air campaign against Iran.
  CCDCOE states Predatory Sparrow "is said to have deployed wiper
  malware" at Bank Sepah. Predatory Sparrow has not been formally
  attributed by any government — CCDCOE notes "the government of
  Israel has not officially acknowledged any such connection" — but
  media reporting (The Record) and CCDCOE analysis treat the Israeli
  military-intelligence linkage as the dominant hypothesis (IDF Unit
  8200 per the actor dossier).
attributions:
  - actor_id: il/predatory-sparrow
    attributing_org: Predatory Sparrow / Gonjeshke Darande self-claim (X); The Record; CCDCOE; Times of Israel
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-06-17
    attribution_source_id: timesofisrael/2025-06-17_bank-sepah-claim
    notes: |
      Persona-level self-claim (Gonjeshke Darande on X, 17 Jun 2025).
      Both cited journalistic sources tie the group to Israel: The
      Record calls it "believed to be linked to Israel" and "widely
      believed to be linked to Israeli military intelligence"; CCDCOE
      notes "media reports have suggested links to Israeli military
      intelligence" while "the government of Israel has not officially
      acknowledged any such connection." IDF Unit 8200 is the dominant
      unit hypothesis per the actor dossier (il/idf-8200); the three
      cited raws say only "Israeli military intelligence" (no unit,
      no Mossad). attribution_level named-actor: the sources name the
      Predatory Sparrow / Gonjeshke Darande persona but no Israeli
      service or unit. false_flag_risk suspected at the persona level
      (the hacktivist persona is the IL deniability layer) even though
      operator-state (Israel) attribution is firm at the journalistic-
      consensus level. moderate + concur-with-caveat: concur a pro-
      Israel actor wiped Bank Sepah; caveat = no government attestation.
