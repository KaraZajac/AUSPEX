  notes: |
    Audited vs Proofpoint "The Bitter End: Unraveling Eight Years of Espionage Antics—Part One" (raw captured, sha256 7f6910f6…). ATTRIBUTION (the key question): Proofpoint/Threatray say it is "highly likely that TA397 is a state-backed threat actor tasked with intelligence gathering in the interests of the Indian state" and "highly likely operates on behalf of an Indian intelligence organization" — they name the INDIAN STATE / a generic "Indian intelligence organization" but NO specific service (full-text search found no NTRO, RAW, Military Intelligence, IB, DRDO, DIA, Defence Cyber Agency, contractor/mercenary). So bitter CANNOT re-home in/unscoped→in/<service> on this source; in/unscoped/bitter is correct and the actor file's 2026-06-24 demotion note already states this. attribution_level set to named-actor (was missing). FACTS verified: campaign window Oct 2024–Apr 2025; victims = govt/diplomatic entities in China, Pakistan, neighbours (Beijing embassies, Madagascar/Mauritius) + Bangladeshi military & tax-authority docs; IST 9-to-5 working hours; tooling MiyaRAT/wmRAT/BDarkRAT/ArtraDownloader + ORPCBackdoor overlap with Mysterious Elephant (APT-K-47) & Confucius. CORRECTION: summary said "MuuyDownloader" — not named in Part One (it names ArtraDownloader); MuuyDownloader is from the uncited Dec-2024 Turkish report → swapped to ArtraDownloader and added ORPCBackdoor. published_on 2025-06-04 = article modified_time (original published_time 2025-06-03); kept 06-04 (Proofpoint's canonical date). DOCTRINE LINK kept strongly_inferred (NOT upgraded to attested): vendor states Indian-state interests in substance, but source is secondary/industry tier (not govt-primary) and the diplomatic-collection pillar goal is an AUSPEX mapping of the victim set; doctrine cyber_relevance sets these at strongly_inferred absent Indian-govt-direction sourcing — conservative call, reasoning tightened with the verbatim quote, attesting_source_id stays null. Source: added raw_snapshot + content_sha256; tier (secondary) preserved.
