id: 2025-06/proofpointthreatray-attribute-bitter-ta397-to-the-intelligence-interes
name: "Proofpoint/Threatray attribute Bitter (TA397) to the intelligence interests of the Indian state"
start_date: 2025-06-04
incident_type:
  - espionage
  - intrusion
  - attribution-publication
initial_vector: phishing
false_flag_risk: none
summary: |
  A two-part Proofpoint + Threatray report assessed with high confidence that TA397/Bitter is a state-backed actor conducting intelligence gathering in the interests of the Indian state, drawing on campaigns from October 2024 to April 2025 against government and diplomatic entities in China, Pakistan and other neighbors, plus recovered Bangladeshi military/tax documents and Indian Standard Time hands-on-keyboard working-hour patterns. Custom toolset includes MiyaRAT, wmRAT, MuuyDownloader and BDarkRAT, with tool-sharing overlaps to Mysterious Elephant (APT-K-47) and Confucius. New actor not in the inventory; this is the first strong public attribution of Bitter to the Indian state. Maps to IN regional-collection doctrine.
