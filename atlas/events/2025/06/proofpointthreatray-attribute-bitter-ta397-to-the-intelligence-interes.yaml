    attributing_org_confidence: moderate   # Proofpoint says "highly likely" (≈ moderate ICD-203); names the Indian state, not a service
    attribution_level: named-actor   # India nexus + named actor (TA397/Bitter); NO specific Indian service named → not named-unit
    auspex_assessment: concur
    attribution_date: 2025-06-04
