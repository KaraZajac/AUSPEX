    attributing_org: BleepingComputer (LVMH-brand placement) + Google Threat Intelligence Group (campaign)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-30
    attribution_source_id: bleepingcomputer/2025-07-30_shinyhunters-salesforce-qantas-allianz-lvmh
    attribution_level: activity-cluster
    notes: |
      BleepingComputer (2025-07-30) confirmed the LVMH-brand breaches
      were "targeted in the same campaign detailed by Google" (UNC6040
      vishing → Salesforce), extorted privately under the self-applied
      "ShinyHunters" name — but "none of these companies have publicly
      named Salesforce," so the placement is a press confirmation /
      inference, not a brand or GTIG victim-naming. GTIG's own reports
      (incl. mandiant/2025-08-08) name NO LVMH victim. "ShinyHunters" is
      an extortion brand over the UNC6040 / UNC6240 clusters;
      BleepingComputer quotes: "We have not confirmed the nature of the
      relationship between these intrusions and the prior use of this
      handle on underground forums." Hence moderate / concur-with-caveat
      / activity-cluster.
  - actor_id: criminal/scattered-spider
    attributing_org: journalism (cluster overlap)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-30
    attribution_source_id: bleepingcomputer/2025-07-30_shinyhunters-salesforce-qantas-allianz-lvmh
    attribution_level: activity-cluster
    notes: |
      Campaign-cluster overlap only, and expressly contested.
      BleepingComputer (2025-07-30): "The breaches have caused confusion
      ... with the attacks attributed to Scattered Spider (tracked by
      Mandiant as UNC3944) ... However, threat actors associated with
      Scattered Spider tend to perform full-blown ne[twork intrusions]"
      — a similar-sector / similar-TTP overlap, not LVMH-specific
      Scattered Spider evidence.
