id: 2025-07/lvmh-shinyhunters-salesforce
name: LVMH luxury-brands customer data theft (Salesforce vishing chain)
start_date: 2025-01-26  # earliest covered brand intrusion (Dior, per breach notice); Tiffany ~2025-04-08, Louis Vuitton ~Jun 2025
disclosure_date: 2025-05-29  # earliest snapshot-anchored public disclosure of an LVMH-brand breach (Tiffany + Dior, South Korea; ISMG). LV UK disclosed Jul 2025.
end_date: 2025-07-31  # close of the documented notification wave for the covered breaches (Dior US notices began Jul 21; LV UK mid-Jul); private-extortion status open. Aggregate estimate.
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: phishing  # campaign-inferred: UNC6040 vishing → Salesforce OAuth (none of the LVMH brands publicly named Salesforce)
outcome_summary: |
  Between May and July 2025 three LVMH-owned luxury brands separately
  disclosed unauthorized access to customer-information databases held
  on third-party / vendor CRM platforms:
    - Tiffany & Co. (Korea): intrusion 8 Apr 2025, discovered 9 May
      2025; South-Korean customer data stolen from a "vendor platform
      used for managing customer data"; disclosed to customers and
      reported (alongside Dior) by 29 May 2025. No bank/payment-card
      data.
    - Christian Dior: intrusion 26 Jan 2025, discovered 7 May 2025;
      Korea/China disclosures in May and U.S. breach-notification
      letters from ~21 Jul 2025. Exposed: full names, contact details,
      physical address, date of birth and — in some cases — passport /
      government-ID and Social Security numbers; no payment/bank data.
    - Louis Vuitton: LV UK became aware 2 Jul 2025 (LV Korea disclosed
      ~a week earlier); exposed PII included first/second name, gender,
      country, phone, email, postal address, date of birth, purchase
      and preference data; no passwords or payment-card data. Reported
      to the UK ICO; also affected South Korea and Turkey.
  BleepingComputer (30 Jul 2025) reported the three LVMH-brand breaches
  — with Adidas, Qantas and Allianz Life — were "linked to the
  ShinyHunters extortion group," which used voice-phishing to steal
  data from Salesforce CRM instances, and that BleepingComputer had
  "confirmed that all were targeted in the same campaign detailed by
  Google" (UNC6040) — while noting "none of these companies have
  publicly named Salesforce." Extortion was attempted privately by
  email under the self-applied "ShinyHunters" name; no public
  LVMH-brand leak had occurred as of that reporting.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event covering the LVMH-brand subset of the 2025
  UNC6040 / ShinyHunters Salesforce-cloud campaign (campaign_id
  shinyhunters-salesforce-2025). Modeled as a single aggregate across
  three brand disclosures (Louis Vuitton, Christian Dior, Tiffany &
  Co.) because BleepingComputer documents them as one cyberattack
  chain against LVMH via a third-party / vendor CRM platform.
  Attribution is hedged: none of the LVMH brands publicly named
  Salesforce; the ShinyHunters / UNC6040 placement is BleepingComputer's
  campaign confirmation (pattern-matched to the GTIG-documented
  campaign), not a victim or GTIG victim-naming, and "ShinyHunters" is
  recorded as the extortion self-claim brand over the UNC6040 (vishing)
  / UNC6240 (extortion) clusters, not a confirmed stable group. NB
  timing anomaly: Dior's intrusion (26 Jan 2025) predates the main
  vishing-campaign window (spring 2025+), making Dior the most weakly
  campaign-linked of the three. The originally-cited sources
  (mandiant/2025-08-08, krebs/2025-10) name NO LVMH brand and were
  re-sourced this audit to LVMH-specific reporting.
attributions:
