id: 2025-07/lvmh-shinyhunters-salesforce
name: LVMH luxury-brands customer data theft (Salesforce vishing chain)
start_date: 2025-06-15
disclosure_date: 2025-07-15
end_date: 2025-09-30
incident_type:
  - data-theft
initial_vector: phishing  # via UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  Between July and September 2025 multiple LVMH-owned luxury
  brands separately disclosed customer-data intrusions via
  third-party platforms: Louis Vuitton (Jul 2025, ~UK-Korea
  customer database), Christian Dior (May-Jul 2025 disclosures
  in multiple jurisdictions), and Tiffany & Co. (Aug 2025, Korea
  + US customer data). Exposed fields varied by brand but
  generally included names, contact information, purchase
  history, and tier / loyalty data. Google Threat Intelligence
  Group and October 2025 Krebs on Security reporting attributed
  the LVMH-brand intrusions to the UNC6040 / ShinyHunters
  voice-phishing / Salesforce-OAuth campaign.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event covering the LVMH-brand subset of
  the 2025 campaign. Modeled as a single aggregate event
  across the three confirmed brand disclosures because the
  underlying intrusion chain (third-party Salesforce-cloud
  CRM) is documented as a single vector across the
  conglomerate.
