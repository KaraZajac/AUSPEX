id: 2025-07/lazarus-contagious-interview-npm
name: Lazarus / Famous Chollima "Contagious Interview" npm and PyPI supply-chain campaign
start_date: 2024-11-01  # campaign onset per Socket / Sonatype data
disclosure_date: 2025-07-15
end_date: null
incident_type:
  - supply-chain
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Sustained DPRK Lazarus / Famous Chollima supply-chain
  campaign delivering BeaverTail, OtterCookie, InvisibleFerret,
  and Marstech1 implants via malicious npm and PyPI packages
  ("react-ui-notify", "react-tmedia", "react-medias", many
  others) and fake "coding-test" GitLab repositories. Lures
  pose as recruiters on LinkedIn, Telegram, and Calendly,
  targeting tech and cryptocurrency-firm developers. Sonatype
  tallied 234 unique Lazarus-attributed malicious packages in
  the first half of 2025 alone; affected organisations span
  36,000 firms in Europe, India, and Brazil per SecurityScorecard.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Operation 99 / Contagious Interview is the supply-chain leg
  of the DPRK developer-targeting playbook that also feeds the
  Bybit and other crypto-exchange compromises (TraderTraitor
  uses related social-engineering lures). Doctrinally this is
  revenue-aggregation and strategic-tech-collection delivered
  through open-source-ecosystem exploitation rather than direct
  bank theft.
