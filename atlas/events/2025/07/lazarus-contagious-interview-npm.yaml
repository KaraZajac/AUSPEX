id: 2025-07/lazarus-contagious-interview-npm
name: Lazarus / Famous Chollima "Contagious Interview" npm and PyPI supply-chain campaign
start_date: 2024-11-01  # late-2024 onset per Socket ("Since late 2024, we have tracked hundreds of malicious npm packages")
disclosure_date: 2025-02-13  # AUDIT 2026-07-02: was 2025-07-15 (unsourced); corrected to SecurityScorecard STRIKE "Operation Marstech Mayhem" publication (JSON-LD datePublished 2025-02-13) — the event's primary attribution source. Socket's Contagious-Interview blog series began 2025-01-29. Event id keeps legacy "2025-07" token (slugs stable-forever).
end_date: null
incident_type:
  - supply-chain
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Sustained DPRK Lazarus-attributed supply-chain campaign
  delivering the BeaverTail, OtterCookie, and InvisibleFerret
  RATs (Socket) and, in the SecurityScorecard STRIKE-tracked
  "Operation Marstech Mayhem" leg, the Marstech1 implant, via
  malicious npm packages (Socket also tracks the pypi/cargo/
  composer/go ecosystems; one named example is the postcss-optimizer
  npm package delivering BeaverTail). Delivery uses recruiter lures
  and fake coding-test GitHub repositories/templates (Socket);
  SecurityScorecard's leg promoted trojanized GitHub repos on
  developer platforms such as LinkedIn and Discord. Targets are
  Web3 and broader software / cryptocurrency-firm developers,
  exposing wallets, credentials, and CI/CD secrets. Socket has
  tracked hundreds of malicious npm packages with tens of thousands
  of downloads since late 2024 (one Oct-2025 wave: 338 packages /
  ~50,000 downloads); SecurityScorecard's STRIKE team confirmed 233
  victims across the U.S., Europe, and Asia in the Marstech leg.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  The Contagious Interview campaign (Socket) — overlapping the
  SecurityScorecard-named "Operation Marstech Mayhem" leg — is the
  open-source-supply-chain arm of the DPRK developer-targeting
  playbook: North Korean state-sponsored operators (attributed to
  the Lazarus Group) poison the npm registry (and, per Socket, the
  pypi/cargo/composer/go ecosystems) and stand up fake coding-test
  GitHub repos to compromise developers and drain cryptocurrency
  wallets, credentials, and build secrets. Doctrinally AUSPEX reads
  this as hard-currency revenue aggregation through open-source-
  ecosystem exploitation rather than direct bank/SWIFT theft;
  neither cited vendor report states the terminal WMD/ballistic-
  missile-financing end-use, so that doctrine link is graded
  strongly_inferred, not attested (see doctrine_links).
