    notes: |
      Socket's August 2025 reporting is the cleanest singular
      source identifying TraderTraitor sub-cluster involvement.
      TraderTraitor lures (LinkedIn / Telegram fake recruiter)
      overlap operationally with Famous Chollima; vendors split
      on whether the same sub-cluster runs both.
