id: 2025-07/donot-team-loptikmod-espionage-campaign-against-a-southern-european-fo
name: "DoNot Team LoptikMod espionage campaign against a Southern European foreign-affairs ministry"
start_date: 2025-07-09
incident_type:
  - espionage
  - intrusion
  - data-theft
initial_vector: phishing
false_flag_risk: none
summary: |
  Trellix Advanced Research Center attributed a spear-phishing campaign against a Southern European government foreign-affairs entity to the India-suspected DoNot Team (APT-C-35 / Origami Elephant). Phishing emails sent from a Gmail address impersonated a defence official, referencing an Italian Defence Attaché's visit to Dhaka, Bangladesh, and delivered a Google Drive link to a RAR archive carrying the group's signature LoptikMod RAT, which establishes scheduled-task persistence and is designed to exfiltrate system data (the C2 was inactive at analysis, so no exfiltration in this incident was observed). Significant because it is the first documented use of LoptikMod against a major European government entity, marking DoNot's expansion from South Asian regional collection toward European diplomatic intelligence collection. DoNot is already in the IN inventory but this European-diplomatic event is new; doctrine fit is a stretch beyond the named regional-collection doctrine.
