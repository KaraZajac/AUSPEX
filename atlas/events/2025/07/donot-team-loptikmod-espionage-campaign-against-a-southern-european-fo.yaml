summary: |
  Trellix Advanced Research Center attributed a spear-phishing campaign against a Southern European foreign-affairs ministry to the India-suspected DoNot Team (APT-C-35 / Origami Elephant). Emails impersonating a defence attache delivered Google Drive RAR archives carrying the group's signature LoptikMod RAT, which establishes scheduled-task persistence and exfiltrates system data. Significant because it is the first documented use of LoptikMod against a major European government entity, marking DoNot's expansion from South Asian regional collection toward European diplomatic intelligence collection. DoNot is already in the IN inventory but this European-MFA event is new; doctrine fit is a stretch beyond the named regional-collection doctrine.
