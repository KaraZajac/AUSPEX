summary: |
  CISA, FBI, HHS and MS-ISAC issued joint advisory AA25-203A on the Interlock ransomware-as-a-service operation, which was first observed in late September 2024 targeting various business, critical-infrastructure, and other organizations across North America and Europe. The advisory frames Interlock as opportunistic and financially motivated ("FBI maintains these actors target their victims based on opportunity"); the HHS/MS-ISAC co-authorship and HPH-mitigations section reflect a healthcare-sector emphasis, and secondary reporting (HIPAA Journal) notes the group "appears to favor" the healthcare/public-health sector (named victims include DaVita, Kettering Health, and Texas Tech University Health Sciences Center). Interlock uses a double-extortion model with Windows and Linux encryptors (the usual Linux encryptor targets VMware ESXi servers/VMs; a FreeBSD ELF encryptor is a recent departure) and an uncommon initial-access technique — drive-by downloads of fake software installers from compromised legitimate websites, plus the ClickFix social-engineering method. Interlock fills the 2024–2025 healthcare-extortion gap alongside Qilin and RansomHub.
