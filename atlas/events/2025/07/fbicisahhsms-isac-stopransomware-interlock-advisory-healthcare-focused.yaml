summary: |
  CISA, FBI, HHS and MS-ISAC issued joint advisory AA25-203A on the Interlock ransomware-as-a-service operation, which first emerged in late September 2024 and disproportionately targets healthcare and critical-infrastructure organizations across North America and Europe. Interlock uses a double-extortion model with Windows and Linux/ESXi encryptors and an uncommon initial-access technique — drive-by downloads of fake software installers from compromised legitimate websites, plus the ClickFix social-engineering method. Interlock is not currently in the corpus and fills the 2024–2025 healthcare-extortion gap alongside Qilin and RansomHub.
