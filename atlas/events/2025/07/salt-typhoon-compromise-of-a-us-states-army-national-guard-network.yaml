summary: |
  A DHS memo (dated 11 June 2025) summarizing Pentagon findings, reported 16 July 2025, found that Salt Typhoon extensively compromised a US state's Army National Guard network between March and December 2024, exfiltrating administrator credentials, network configuration files, network-traffic diagrams with counterpart units in every other US state and at least four territories, geographic location maps, and service members' PII. Officials assessed the access could enable follow-on intrusions and undermine state-level critical-infrastructure defense (Guard units integrated with fusion centers). Distinct from the tier-1 telecom Salt Typhoon entries and the AA25-239A advisory already in the corpus.
