  notes: "Audited vs nextgov/2025-07 (raw captured, sha256 18f2bde0…). FACTS confirmed verbatim: DHS memo 'extensively compromised a U.S. state's Army National Guard network between March and December 2024' (state not named); exfiltrated network config + data traffic with counterparts in every other US state and ≥4 territories, administrator credentials + network diagrams 'to facilitate follow-on Salt Typhoon hacks', PII of service members, geographic-location map; '14 states' Guard units integrated with state fusion centers; June 11 DHS I&A memo first reported by NBC News via FOIA. ATTRIBUTION: source names only 'Salt Typhoon' / 'a prolific Chinese hacking unit' / 'state-backed groups tied to ... military and intelligence arms of China's central government' / 'Beijing-linked' — it does NOT name the MSS or PLA; corroborates China-nexus + named-actor only. The cn/mss placement is KEPT but rests on the actor's OFAC source (per actor-record audit 2026-06-24), not this report — hence auspex_assessment concur-with-caveat. CORRECTIONS: (1) start_date 2025-07-16→2024-03-01 (operation start per the memo's stated window) + added disclosure_date 2025-07-16 and end_date 2024-12-31 — the record had conflated the reporting date with the op start, missing disclosure/end entirely (the event is a core intrusion/data-theft op, not a meta event); (2) added attribution_level: named-actor (was missing). doctrine_links unchanged: plausible (taiwan-reunification/coercive-options) and strongly_inferred (intelligentized-warfare/pre-positioning) both honest — neither attested, source states no purpose, attesting_source_id null on both. published_on 2025-07-16 CONFIRMED (byline + JSON-LD datePublished)."
