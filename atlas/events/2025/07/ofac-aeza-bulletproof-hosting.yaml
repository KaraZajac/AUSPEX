    outcome: |
      All property and interests in property under U.S.
      jurisdiction blocked (E.O. 13694 SDN listing). The
      designation named one TRON payment wallet
      (TU4tDFRvcKhAZ1jdihojmBWZqvJhQCnJ4F) tied to Aeza's
      hosting-fee infrastructure per Chainalysis, cutting it off
      from compliant exchanges; the UK NCA coordinated the
      parallel designation of the Aeza International Ltd front
      company.
