    pillar_id: us/ncs-2023/disrupt-dismantle
    program_id: null
    confidence: attested
    reasoning: |
      attested = corroboration of the pillar's strategic purpose
      (disrupt + dismantle threat actors by degrading the
      infrastructure they rely on), not doctrine-slug naming.
      Treasury supplies that purpose directly — the action is to
      "degrade the support networks that enable malicious actors,"
      and Acting Under Secretary Smith frames it as exposing "the
      critical nodes, infrastructure, and individuals that underpin
      this criminal ecosystem." Chainalysis corroborates the same
      purpose independently ("attacking the supply chain that makes
      large-scale cybercrime possible, rather than just pursuing
      individual threat actors"). Neither source cites NCS-2023 by
      name; naming is not required under the attested reframe, and
      (unlike the 2023-02 TrickBot/Conti sanctions) this July-2025
      action post-dates the 2023-03 strategy, so no temporal caveat
      applies. perspective defender-response: the acting
      (sanctioning) state's doctrine on a counter-action.
    attesting_source_id: treasury/2025-07-01_aeza-group
    inference_basis:
      source_quote: "Today's action also reflects Treasury's continued work to combat cybercrime and degrade the support networks that enable malicious actors to target U.S. citizens, technology, and critical industries."
