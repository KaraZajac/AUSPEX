id: 2025-07/ofac-aeza-bulletproof-hosting
name: OFAC sanctions Russia-based Aeza Group bulletproof hosting provider
start_date: 2025-07-01
disclosure_date: 2025-07-01
end_date: 2025-07-01
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  Treasury's Office of Foreign Assets Control designated
  Aeza Group LLC, a Russia-based bulletproof hosting provider,
  along with its CEO Arsenii Penzev, general director Yurri
  Bozoyan, CTO Vladimir Gast, and co-owner Igor Knyazev, plus
  affiliated entities. Aeza is named as the hosting backbone
  for the Meduza and Lumma infostealer operations and the
  BianLian / RedLine ecosystems, with crypto-payment flows
  routed through the OFAC-sanctioned Garantex exchange.
  Aeza also hosted the Blacksprut Russian darknet marketplace.
false_flag_risk: none
summary: |
  Continues the post-LockBit Treasury campaign of disrupting
  the Russia-domiciled criminal-services layer that underpins
  cyber operations against the West. Aeza's enabling role for
  infostealer ecosystems — themselves a major upstream feed for
  Salt Typhoon and other state-aligned access markets — fits the
  AUSPEX pattern of state-tolerated criminal infrastructure as
  strategic capability.
