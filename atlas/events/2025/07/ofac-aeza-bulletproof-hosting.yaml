id: 2025-07/ofac-aeza-bulletproof-hosting
name: OFAC sanctions Russia-based Aeza Group bulletproof hosting provider
start_date: 2025-07-01
disclosure_date: 2025-07-01
end_date: 2025-07-01
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  Treasury's Office of Foreign Assets Control designated
  Aeza Group LLC, a St. Petersburg-based bulletproof hosting
  (BPH) provider, pursuant to E.O. 13694 (as amended by E.O.
  14144 / 14306), along with its CEO Arsenii Penzev, general
  director Yurii Bozoyan, technical director Vladimir Gast, and
  co-owner Igor Knyazev. Also designated: Russia-based
  subsidiaries Aeza Logistic LLC and Cloud Solutions LLC, and
  UK front company Aeza International Ltd (designated in
  coordination with the UK's National Crime Agency). Treasury
  names Aeza as the hosting backbone for the Meduza and Lumma
  infostealer operators (which targeted the U.S. defense
  industrial base and technology companies) and states Aeza
  hosted BianLian ransomware, RedLine infostealer panels, and
  the BlackSprut Russian darknet drug marketplace. Chainalysis'
  on-chain analysis traces the single TRON payment wallet named
  in the designation to cash-out flows involving the OFAC-
  sanctioned Garantex exchange. Treasury notes Penzev and
  Bozoyan had been arrested by Russian law enforcement over the
  placement of Blacksprut on Aeza infrastructure.
false_flag_risk: none
summary: |
  Continues Treasury's campaign (building on the February 2025
  ZServers designation) of disrupting the Russia-domiciled
  bulletproof-hosting / criminal-services layer that underpins
  cyber operations against the West. Treasury ties Aeza's hosting
  to infostealer operators (Meduza, Lumma) that targeted the U.S.
  defense industrial base and technology companies — the sourced
  basis for reading Aeza as tolerated criminal infrastructure with
  strategic downstream value. AUSPEX-analytical framing (not
  asserted by the cited sources): such state-tolerated criminal
  hosting is the enabling substrate for the broader credential /
  access-market economy that state-aligned actors draw on; the
  Russian-LE arrest of two principals over the domestic Blacksprut
  drug market shows tolerance is selective, not blanket protection.
