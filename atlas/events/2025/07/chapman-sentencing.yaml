  AUSPEX deterrence-baseline event. DOJ characterizes this
  as one of the largest North Korean IT-worker fraud schemes
  it has charged; the 102-month term is a substantial US
  custodial sentence for a domestic laptop-farm facilitator.
  AUSPEX reads it as precedent likely to shape future
  prosecutions under the 14-national December 2024 indictment
  and downstream actions.
