outcome_summary: |
  Christina Chapman sentenced to 102 months federal prison,
  three years supervised release, forfeiture of $284,555.92,
  and a $176,850 judgment for operating an Arizona-based
  laptop farm that facilitated the DPRK IT-worker fraud
  scheme. Documented harm: 309 US businesses (and two
  international) defrauded, 68 stolen US-citizen identities,
  $17M in illicit revenue. Bookends the prosecutorial arc
  opened by the May 2024 indictment.
