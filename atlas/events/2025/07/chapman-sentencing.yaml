outcome_summary: |
  Christina Chapman sentenced to 102 months federal prison
  with full restitution ordered for operating an
  Arizona-based laptop farm that facilitated the DPRK
  IT-worker fraud scheme. Documented harm: 309 US
  businesses defrauded, 68 stolen US-citizen identities,
  $17M in fraudulent revenue. Closes the prosecutorial loop
  opened by the May 2024 indictment.
