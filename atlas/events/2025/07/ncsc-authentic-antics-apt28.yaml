  notes: |
    [a] FACTS — all load-bearing claims now carried by snapshotted sources.
    The Outlook-embedded credential-harvest + OAuth-2.0 exfiltration tradecraft is
    verified against the NCSC Malware Analysis Report (ADDED as a source): "Authentic
    Antics runs within the Outlook process, displaying malicious login prompts to steal
    credentials and OAuth 2.0 tokens" and "Victim data is exfiltrated by sending emails
    from the victim's account to an actor-controlled email address. The emails will not
    show in the victim's sent folder" (MAR sha256 60b4c5fe…). The "runs inside the
    Outlook process" detail was ABSENT from the two originally-cited sources — the NCSC
    news article never uses the word "Outlook"; Infosecurity only says the malware
    achieves "the appearance of authentic Microsoft Outlook activity" — so the MAR was
    fetched + snapshotted to carry it (fabricated-tradecraft check per task: all
    tradecraft traces to the MAR; nothing beyond it was invented). CORRECTED "Office
    365" → "Microsoft cloud-account" credentials (NCSC news: "Microsoft cloud accounts";
    MAR: "Microsoft Office account credentials", apps = Exchange Online/SharePoint/
    OneDrive — no source says "Office 365"); "OAuth tokens" → "OAuth 2.0 tokens" (MAR);
    "Sent Items" → "sent" folder (raw). STRIPPED the unsourced superlative "the largest
    cyber-themed UK sanctions package to date" (neither raw contains "largest"). Softened
    the logistics/tech claim: the specific 2023-incident victim is not sector-identified;
    NCSC only "previously called out" Unit 26165 for targeting Western logistics/tech.
    Confirmed verbatim: NCC Group + Microsoft joint investigation "in 2023"; three GRU
    units 26165/29155/74455 + 18 officers and agents sanctioned.
    [b] ATTRIBUTION — NCSC formal attribution of APT28 = "Russia's GRU 85th Main Special
    Service Centre, Military Unit 26165"; high / concur retained (firm government
    attribution). The MAR makes NO actor attribution (purely technical), so
    attribution_source_id stays the NCSC news article (ncsc-uk/2025-07-18_authentic-antics
    sha256 382dff38…). No over-attestation.
    [c] DATES — start 2023 anchored to MAR "AUTHENTIC ANTICS was observed in use in 2023";
    disclosure 2025-07-18 (both sources bylined 18 Jul 2025; article says "today (18
    July)"). MAR is internally Version 1 / 06 May 2025, publicly released 18 Jul 2025.
    [d] DOCTRINE — no source names any doctrine, so NONE attested. ADDED
    info-security-2016/information-sphere-as-domain (strongly_inferred; the
    espionage/continuous-information-confrontation doctrine — the per-event doctrine).
    Kept fpc-2023/anti-anglo-saxon (strongly_inferred; NCSC "against Western interests" +
    Lammy "destabilise Europe"; removed its incorrect attesting_source_id since it is not
    attested). DOWNGRADED nato-ultimatum-2021/ukraine-support-interdiction strongly_inferred
    → plausible (2023 victim sector unspecified; linkage via the AA25-141A campaign only)
    and added its missing inference_basis. All three set perspective: attacker-rationale
    (Russia's own doctrine on a Russian operation).
    [e] ATTRIBUTION_LEVEL — ADDED named-unit (was absent); NCSC names GRU Military Unit
    26165 / 85th Main Special Service Centre.
    [f] ACTOR_ID — ru/gru/26165/apt28 resolves to atlas actor. Attack event (not a
    counter-action): actor_id = attacker APT28; the UK sanctions are context. incident_type
    set to [espionage, intrusion, data-theft] — "credential-theft" is not a schema enum, so
    credential/token theft is rendered as intrusion (access mechanism) + data-theft (email
    exfil), with espionage as the strategic frame (both sources headline "espionage").
