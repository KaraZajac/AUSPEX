id: 2025-07/ncsc-authentic-antics-apt28
name: UK NCSC attributes "Authentic Antics" Outlook credential-theft malware to GRU Unit 26165 / APT28
start_date: 2023-01-01  # NCSC-stated original incident investigation
disclosure_date: 2025-07-18
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  The UK NCSC publicly attributed the "Authentic Antics"
  malware to GRU Unit 26165 (APT28 / Fancy Bear / Forest
  Blizzard). The malware runs inside the Outlook process,
  generates fake Microsoft login prompts to harvest Office 365
  credentials and OAuth tokens, then exfiltrates victim data by
  sending email from the victim's mailbox to attacker-controlled
  addresses while suppressing the send from the "Sent Items"
  folder. The campaign targeted Western logistics and
  technology sectors and was investigated jointly by NCC Group
  and Microsoft after a 2023 incident.
false_flag_risk: none
campaign_id: gru-26165-western-logistics
summary: |
  Companion to the May 2025 NCSC + Five Eyes AA25-141A advisory
  on GRU Unit 26165 targeting of Western logistics and tech
  firms supporting Ukraine aid. The Authentic Antics disclosure
  came alongside UK sanctions on three GRU units (26165, 29155,
  74455) and 18 GRU officers — the largest cyber-themed UK
  sanctions package to date. Doctrinally consistent with the
  FPC-2023 anti-Anglo-Saxon / Ukraine-support-interdiction
  pattern.
