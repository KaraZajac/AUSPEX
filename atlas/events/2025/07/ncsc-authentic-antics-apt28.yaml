id: 2025-07/ncsc-authentic-antics-apt28
name: UK NCSC attributes "Authentic Antics" Outlook credential-theft malware to GRU Unit 26165 / APT28
start_date: 2023-01-01  # MAR: "AUTHENTIC ANTICS was observed in use in 2023" (year-only anchor; malware found after a 2023 incident)
disclosure_date: 2025-07-18
end_date: null
incident_type:
  - espionage
  - intrusion   # credential/OAuth-token theft = access mechanism ("credential-theft" is not a schema enum)
  - data-theft
initial_vector: unknown
outcome_summary: |
  The UK NCSC publicly attributed the "Authentic Antics"
  malware to GRU Unit 26165 (APT28 / Fancy Bear / Forest
  Blizzard). Per the NCSC Malware Analysis Report, the malware
  runs within the Outlook process, displays malicious login
  prompts to steal Microsoft cloud-account credentials and
  OAuth 2.0 tokens, then exfiltrates victim data by
  authenticating to the victim's own Outlook web account and
  sending email to an actor-controlled address, with the emails
  not showing in the victim's "sent" folder and no traditional
  command-and-control. The malware was discovered after a 2023
  incident jointly investigated by Microsoft and the
  NCSC-assured responder NCC Group; the NCSC associates Unit
  26165 with targeting of Western logistics entities and
  technology companies (the specific 2023 victim is not
  sector-identified in the sources).
false_flag_risk: none
campaign_id: gru-26165-western-logistics
summary: |
  Companion to the May 2025 NCSC + Five Eyes AA25-141A advisory
  on GRU Unit 26165 targeting of Western logistics and tech
  firms supporting Ukraine aid. The Authentic Antics disclosure
  came alongside UK Foreign Office sanctions on three GRU units
  (26165, 29155, 74455) and 18 GRU officers and agents for
  cyber and information-interference operations across the
  globe. Doctrinally consistent with the FPC-2023
  anti-Anglo-Saxon / Ukraine-support-interdiction pattern and
  Russia's continuous information-confrontation posture (Info
  Security Doctrine 2016).
