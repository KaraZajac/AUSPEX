summary: |
  Proofpoint Threat Research (published 16 July 2025) reported that between March and June 2025 three distinct China-aligned/state-sponsored threat actors — tracked as UNK_FistBump, UNK_DropPitch, and UNK_SparkyCarp — ran targeted phishing campaigns against Taiwan's semiconductor industry: manufacturing, design and testing firms, the wider equipment/services supply chain, and financial analysts covering the sector. UNK_FistBump used employment-themed lures to deliver Cobalt Strike or the custom Voldemort backdoor (Google Sheets C2 via CiscoCollabHost DLL sideloading). Assessed motive is espionage aligned with PRC semiconductor self-sufficiency goals under export controls — directly on the Taiwan / IP-theft focus and not in the corpus.
