id: 2025-07/aeroflot-destructive-cyberattack-silent-crow-belarusian-cyber-partisan
name: "Aeroflot destructive cyberattack — Silent Crow + Belarusian Cyber Partisans wipe ~7,000 servers"
start_date: 2025-07-28
incident_type:
  - destructive
  - wiper
  - data-theft
  - disruption
  - hack-and-leak
initial_vector: valid-creds
false_flag_risk: none
summary: |
  On 28 July 2025 pro-Ukrainian group Silent Crow and the Belarusian Cyber Partisans claimed a destructive intrusion of Russian flag carrier Aeroflot, stating they had disabled around 7,000 internal servers and stolen up to 12-22 TB of data (incl. passenger records from Aeroflot, Pobeda, Rossiya) after roughly a year of access gained via the director's unchanged 2022 password and legacy Windows XP/2003 systems. The attack forced cancellation of dozens-to-100+ flights including domestic and international routes to Belarus, Armenia and Uzbekistan. A major destructive operation by an anti-regime, pro-Ukraine hacktivist coalition against a Russian state-owned target (the actor opposes, and is not sponsored by, any state); co-claimant Silent Crow is a possible new actor whose identity is unknown. Directionality: victim = Russia (Aeroflot); attackers = anti-Russia hacktivists. No attacker-rationale doctrine link applies — the BCP works against the Belarusian regime doctrine (by/concept-info-security-2019), not in service of it, and the Russian sanctions-response posture (ru/sanctions-response-2022) is the adversary frame this op opposes rather than serves.
