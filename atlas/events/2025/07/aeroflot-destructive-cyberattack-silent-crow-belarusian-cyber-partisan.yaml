summary: |
  On 28 July 2025 pro-Ukrainian group Silent Crow and the Belarusian Cyber Partisans claimed a destructive intrusion of Russian flag carrier Aeroflot, stating they had disabled around 7,000 internal servers and stolen up to 12-22 TB of data (incl. passenger records from Aeroflot, Pobeda, Rossiya) after roughly a year of access gained via the director's unchanged 2022 password and legacy Windows XP/2003 systems. The attack forced cancellation of dozens-to-100+ flights including domestic and international routes to Belarus, Armenia and Uzbekistan. A major anti-regime destructive operation by Belarus-linked hacktivists against a Russian state-owned target (actor opposes, and is not sponsored by, the state); co-claimant Silent Crow is a possible NEW actor. Maps to by/concept-info-security-2019 / cross-references ru/sanctions-response-2022 victimology.
