  notes: |
    Audited vs the cited Bitdefender source (raw captured + hashed) plus Meduza and FDD for the specifics Bitdefender omits.
    FACTS confirmed: attack Mon 28 Jul 2025 (~06:30 Moscow), Sheremetyevo + route network; ~7,000 servers wiped (Bitdefender, Meduza, FDD); ~108 flights cancelled (~42%) — Bitdefender "dozens / 100+" so "dozens-to-100+" is accurate; passenger records from Aeroflot/Pobeda/Rossiya; ~1 year of prior access. Data volume "12-22 TB" verified: Bitdefender says "up to 12 TB", FDD/Meduza report the groups' 22 TB claim — range kept. The director's-password-unchanged-since-2022 and legacy Windows XP/2003 detail is NOT in Bitdefender but IS corroborated by Meduza/FDD/RedHotCyber (BCP self-report) — retained. International routes to Belarus/Armenia/Uzbekistan corroborated by Reuters/AP reporting (not in Bitdefender) — retained.
    ATTRIBUTION: joint self-claim by Silent Crow + the Belarusian Cyber Partisans, modeled under by/cyber-partisans (named-actor). confidence high (firm, corroborated, groups released exfiltrated data); auspex_assessment concur-with-caveat (self-claim; Silent Crow identity unknown per FDD/Meduza). Added attribution_level: named-actor. Fixed attributing_org ("bitdefender" -> names the self-claim relayed by Bitdefender) and removed the stray "mapped from ICD link-confidence: attested" comment.
    published_on: source byline is 29 Jul 2025 (article describes the attack as "today"/Monday = 28 Jul); event start_date 28 Jul is correct; source published_on 2025-07-28 left unchanged (within tolerance; the dateline reports the 28 Jul attack).
    DOCTRINE_LINKS kept []: directionality is counter-state against a RUSSIAN target by a BY-aligned hacktivist whose actor record sets default_doctrine_alignment_ids: []. by/concept-info-security-2019 (the TODO's suggested fit) is the Belarusian regime info-control doctrine the BCP works AGAINST, not an attacker-rationale; ru/sanctions-response-2022 is Russia's posture for tasking ITS proxies against Ukraine-aiding states (opposite direction) and does not apply here. Matches the corpus precedent for the 2021 BCP regime-leaks event ([]). Removed the misleading TODO and rewrote the summary's doctrine clause accordingly.
    ACTOR FLAG: no Silent Crow actor exists (identity unknown — correct to omit; not fabricated). NB by/cyber-partisans previously carried a junk misp_galaxy backfill UUID (Gelsemium) — already nulled 2026-06-25; no further actor change needed.
    Source is secondary (industry blog); FK truncated id (...silent-) is the stable on-disk slug, left as-is.
