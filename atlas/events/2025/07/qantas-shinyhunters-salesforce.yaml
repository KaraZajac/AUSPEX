id: 2025-07/qantas-shinyhunters-salesforce
name: Qantas frequent-flyer breach (Salesforce vishing chain)
start_date: 2025-06-30
disclosure_date: 2025-07-02
end_date: 2025-09-30
incident_type:
  - data-theft
  - extortion
initial_vector: phishing  # via vishing → third-party platform
outcome_summary: |
  On July 2 2025 Qantas disclosed a cyber-intrusion into a
  third-party customer-service platform used by one of its
  contact centres, exposing approximately 5.7 million Qantas
  frequent-flyer customer records — including names, email
  addresses, dates of birth, phone numbers, frequent-flyer
  numbers, and tier-status data. Payment-card and credential
  data were not affected. Initial vendor reporting attributed
  the intrusion to Scattered Spider; subsequent Google Threat
  Intelligence Group analysis and October 2025 Krebs reporting
  linked the case to the UNC6040 / ShinyHunters voice-phishing
  / Salesforce-OAuth campaign with a ShinyHunters-branded
  follow-on extortion attempt.
quantified_impact:
  individuals_affected: 5700000
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Notable as the only major-airline-loyalty-program intrusion
  in the 2025 campaign and as a marker of the AUS/NZ scope
  expansion of the ShinyHunters brand. Initial Scattered-
  Spider attribution + later GTIG UNC6040 / ShinyHunters
  attribution is a clean illustration of the AUSPEX cluster-
  fuzziness pattern for the 2025 campaign.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: Google Threat Intelligence Group + Krebs on Security
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2025-08-08
    attribution_source_id: mandiant/2025-08-08_expansion-shinyhunters-saas-data-theft
  - actor_id: criminal/scattered-spider
    attributing_org: vendor reporting + UK NCSC
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-15
    attribution_source_id: ncsc-uk/2025-05-20_scattered-spider-uk-retail
doctrine_links: []
targets:
  - target_id: orgs/qantas
    role: primary
sources:
