id: 2025-07/qantas-shinyhunters-salesforce
name: Qantas frequent-flyer breach (Salesforce vishing chain)
start_date: 2025-06-30  # detection: Qantas "On Monday 30 June 2025, we detected unusual activity"
disclosure_date: 2025-07-02  # Qantas media release "QANTAS CYBER INCIDENT" published 2 July 2025 09:04 AEST (BleepingComputer US-TZ: "July 1st")
end_date: 2025-10-12  # Qantas customer notice "Update: 12 October 2025" (campaign data-release / ongoing NSW injunction); intrusion itself contained 30 June
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: phishing  # campaign-inferred: UNC6040 vishing → Salesforce OAuth (Qantas named neither vishing nor Salesforce; only "a cyber criminal targeted a call centre and gained access to a third party customer servicing platform")
outcome_summary: |
  On 2 July 2025 Qantas publicly disclosed a cyber incident it had
  detected on Monday 30 June 2025: "a cyber criminal targeted a call
  centre and gained access to a third party customer servicing
  platform" used by one of its airline contact centres, which was then
  contained. Qantas initially reported ~6 million customers had service
  records in the platform; after de-duplication its 9 July 2025 update
  confirmed 5.7 million unique customers' data was held in the system.
  Exposed fields varied by customer and included names, email addresses,
  Qantas Frequent Flyer numbers (with tier and, for a subset, points
  balance / status credits), plus — for ~1.7 million customers —
  combinations of residential/business address (~1.3M), date of birth
  (~1.1M), phone number (~900k), gender (~400k) and meal preferences
  (~10k). Qantas stated no credit-card, personal-financial or passport
  details were stored in the system and that Frequent Flyer accounts,
  passwords, PINs and login details were not accessed or compromised.
  The intrusion was first framed (by contemporaneous reporting) as part
  of the aviation-sector wave linked to Scattered Spider; BleepingComputer
  (30 July 2025) subsequently placed Qantas — alongside Allianz Life,
  LVMH brands and Adidas — in the UNC6040 / ShinyHunters voice-phishing
  Salesforce-OAuth campaign that Google Threat Intelligence Group
  documented on 4 June 2025, while noting "none of these companies have
  publicly named Salesforce." The threat actors contacted Qantas to
  extort it, and Qantas was among the companies whose Salesforce-linked
  data the "Scattered LAPSUS$ Hunters" actors folded into their October
  2025 data-leak / extortion site; Qantas obtained an ongoing NSW Supreme
  Court injunction restraining any access to or publication of the stolen
  data and, as of its 12 October 2025 update, maintained there was still
  "no evidence that any personal data stolen from Qantas has been
  released."
quantified_impact:
  individuals_affected: 5700000  # 5.7M unique customers (Qantas 9 Jul 2025, post de-duplication of the ~6M platform service records)
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child of the 2025 UNC6040 / ShinyHunters Salesforce-cloud
  campaign (campaign_id shinyhunters-salesforce-2025) and the only
  major-airline loyalty-program intrusion in it. Qantas's own statements
  attribute the breach to nothing beyond "a cyber criminal" and a "third
  party customer servicing platform"; it named neither Salesforce nor any
  threat actor. The Salesforce / UNC6040 / ShinyHunters placement is
  BleepingComputer's campaign confirmation (pattern-matched to the
  GTIG-documented campaign), and "ShinyHunters" is the extortion self-
  claim brand over GTIG's UNC6040 (vishing) / UNC6240 (extortion)
  clusters, not a confirmed stable group — hence attribution is hedged.
  The case is a clean illustration of the AUSPEX cluster-fuzziness
  pattern: an initial Scattered-Spider (aviation-wave) framing later
  reframed to UNC6040 / ShinyHunters. Unlike the Adidas sibling, Qantas
  WAS actively extorted (the actors contacted it) and WAS carried on the
  October-2025 "Scattered LAPSUS$ Hunters" leak-site campaign, prompting
  an NSW Supreme Court injunction — though Qantas asserts no evidence its
  specific data has been publicly released. The originally-cited sources
  (mandiant/2025-08-08, krebs/2025-10) name NO Qantas fact (Krebs snapshot
  has zero "Qantas" occurrences; the 08-08 expansion names Qantas zero
  times) and were re-sourced this audit to Qantas-specific reporting.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: BleepingComputer (Qantas placement) + Google Threat Intelligence Group (campaign)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-30
    attribution_source_id: bleepingcomputer/2025-07-30_shinyhunters-salesforce-qantas-allianz-lvmh
    attribution_level: activity-cluster
    notes: |
      BleepingComputer (2025-07-30) reported the wave "impacting companies
      like Qantas, Allianz Life, LVMH, and Adidas has been linked to the
      ShinyHunters extortion group, which has been using voice phishing
      attacks to steal data from Salesforce CRM instances" and that it had
      "confirmed that all were targeted in the same campaign detailed by
      Google" (UNC6040) — but "none of these companies have publicly named
      Salesforce," so the placement is a press confirmation / inference,
      not a Qantas or GTIG victim-naming. GTIG's canonical campaign report
      (mandiant/2025-06-04) reports "UNC6240 has consistently claimed to be
      the threat group ShinyHunters ... likely as a method to increase
      pressure," and "We have not confirmed the nature of the relationship
      between these intrusions and the prior use of this handle" — a self-
      claim brand over activity clusters, hence moderate / concur-with-
      caveat / activity-cluster. (attribution_source_id re-pointed this
      audit from mandiant/2025-08-08, which names Qantas zero times, to the
      BleepingComputer article that actually carries the Qantas placement.)
  - actor_id: criminal/scattered-spider
    attributing_org: initial vendor/press reporting (aviation-sector wave framing)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-09
    attribution_source_id: bleepingcomputer/2025-07-09_qantas-confirms-data-breach-57-million
    attribution_level: activity-cluster
    notes: |
      The Qantas breach was first framed within the aviation-sector wave
      attributed to Scattered Spider: BleepingComputer (2025-07-09) noted
      the attack "shared similarities with other attacks on the aviation
      industry linked to threat actors classified as Scattered Spider."
      This framing was subsequently contested / superseded by the UNC6040
      / ShinyHunters campaign attribution — BleepingComputer (2025-07-30):
      "The breaches have caused confusion ... with the attacks attributed
      to Scattered Spider (tracked by Mandiant as UNC3944) ... However,
      threat actors associated with Scattered Spider tend to perform
      full-blown network intrusions." Campaign-cluster overlap (shared
      "Com" milieu / TTPs), not confirmed Qantas-specific Scattered Spider
      evidence — hence concur-with-caveat / activity-cluster.
      (attribution_source_id re-pointed this audit from
      ncsc-uk/2025-05-20, whose url is null/link-rotted, to the snapshotted
      BleepingComputer article that carries the Qantas-specific SS framing.)
