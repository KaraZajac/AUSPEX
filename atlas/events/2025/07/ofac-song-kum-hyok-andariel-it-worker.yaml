id: 2025-07/ofac-song-kum-hyok-andariel-it-worker
name: OFAC sanctions Song Kum Hyok (Andariel) and Russia-based DPRK IT-worker facilitators
start_date: 2025-07-08
disclosure_date: 2025-07-08
end_date: 2025-07-08
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  OFAC designated Song Kum Hyok, whom Treasury states is "a
  malicious cyber actor associated with the sanctioned ... RGB
  hacking group Andariel," for facilitating the DPRK IT-worker
  scheme. Per OFAC, in 2022-2023 Song used U.S. persons'
  information (names, Social Security numbers, and addresses) to
  create aliases for foreign-hired workers who then posed as
  U.S. persons to obtain remote jobs at U.S. companies. Treasury
  also designated Russian national Gayk Asatryan and four
  entities running a parallel Russia-based DPRK IT-worker
  pipeline — two Russia-based firms (Asatryan LLC, Fortuna LLC)
  and two North Korean trading corporations (Korea Songkwang
  Trading, Korea Saenal Trading), which contracted to dispatch
  up to 30 and 50 DPRK IT workers to Russia respectively. In
  some cases, per OFAC, these DPRK IT workers "have been known
  to introduce malware into company networks for additional
  exploitation."
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
operators_named:
  - song-kum-hyok  # Andariel, OFAC sb0190 Jul 2025
  - asatryan-gayk  # Russia-based DPRK IT-worker facilitator, OFAC Jul 2025
summary: |
  Operationally significant because it draws the formal link
  between the IT-worker fraud scheme and Andariel — an
  RGB-attributed APT cluster historically associated with
  Maui ransomware, defense-IP theft, and cryptocurrency
  operations. The designation reinforces the AUSPEX view that
  DPRK "IT worker fraud" is not a separate criminal track but
  an extension of the RGB revenue-and-access portfolio.
