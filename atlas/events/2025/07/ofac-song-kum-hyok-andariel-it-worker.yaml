id: 2025-07/ofac-song-kum-hyok-andariel-it-worker
name: OFAC sanctions Song Kum Hyok (Andariel) and Russia-based DPRK IT-worker facilitators
start_date: 2025-07-08
disclosure_date: 2025-07-08
end_date: 2025-07-08
incident_type:
  - documentary
  - policy-action
initial_vector: n/a
outcome_summary: |
  OFAC designated Song Kum Hyok, a cyber actor associated with
  the RGB-subordinated Andariel group, for facilitating the
  DPRK IT-worker scheme that placed North Korean nationals in
  remote-work positions at US companies in 2022-2023 using
  stolen US identities. Treasury also sanctioned Russian
  national Gayk Asatryan and four Russian companies operating
  a parallel Russia-based DPRK IT-worker pipeline. Some workers
  introduced malware into employer networks for follow-on
  exploitation.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
operators_named:
  - song-kum-hyok  # Andariel, OFAC sb0190 Jul 2025
  - asatryan-gayk  # Russia-based DPRK IT-worker facilitator, OFAC Jul 2025
summary: |
  Operationally significant because it draws the formal link
  between the IT-worker fraud scheme and Andariel — an
  RGB-attributed APT cluster historically associated with
  Maui ransomware, defense-IP theft, and cryptocurrency
  operations. The designation reinforces the AUSPEX view that
  DPRK "IT worker fraud" is not a separate criminal track but
  an extension of the RGB revenue-and-access portfolio.
