    [a] FACTS — CORRECTED one factual error. RAW Treasury SB0190
    verbatim-carries: Song is "a malicious cyber actor associated with
    the sanctioned ... RGB ... hacking group Andariel"; he "facilitated
    an information technology (IT) worker scheme"; "In 2022 and 2023,
    Song used U.S. persons' information, including names, social security
    numbers, and addresses to create aliases for the hired foreign
    workers"; workers "have been known to introduce malware into company
    networks for additional exploitation." CORRECTION: the event said
    Treasury sanctioned "four Russian companies" — WRONG. RAW: Asatryan +
    four entities = TWO Russia-based firms (Asatryan LLC, Fortuna LLC,
    E.O. 13722) + TWO North Korean trading corporations (Korea Songkwang
    Trading, Korea Saenal Trading, E.O. 13810), with 10-yr/30-worker and
    50-worker dispatch contracts. Both secondaries agree ("both North
    Korean companies and Asatryan's Russian companies" — The Record;
    "four entities linked to a Russia-based DPRK IT worker network" —
    TRM). Rewrote outcome_summary to OFAC's own words. No fabricated
    malware/CVE/victim/figure found; summary's Andariel background
    (Maui/defense-IP/crypto) is flagged analytic ("historically") and
    lives in the actor record, not asserted as from this release.

    [b] ATTRIBUTION — over-attestation FIXED. Event asserted two named
    actor_ids (kp/rgb/andariel, kp/it-worker-fraud) directly in
    attributions on a COUNTER-ACTION. Per the dominant US-sanction
