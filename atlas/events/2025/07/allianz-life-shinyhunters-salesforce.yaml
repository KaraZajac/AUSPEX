    (mandiant/2025-06-04, krebs/2025-10) and bleepingcomputer/2025-07-30
    were already snapshotted by siblings and are VERIFIED + CITED here.

    [a] FACTS - every load-bearing claim now carried verbatim by a
    snapshotted source:
