id: 2025-07/allianz-life-shinyhunters-salesforce
name: Allianz Life third-party CRM breach (Salesforce vishing chain)
start_date: 2025-07-16  # Allianz: "On July 16, 2025, a malicious threat actor gained access"; discovered ~Jul 17
disclosure_date: 2025-07-26  # earliest snapshot-anchored public disclosure (BC 2025-07-26 + Maine-AG placeholder filing that weekend)
end_date: 2025-07-26  # single-access intrusion contained "immediately" on discovery; bounded through public disclosure. Prior 2025-08-31 was unsourced.
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing  # campaign-inferred: social engineering (vishing) -> third-party cloud CRM. Allianz said "social engineering technique" but declined to confirm Salesforce / UNC6040.
outcome_summary: |
  On 26 July 2025 Allianz Life Insurance Company of North America
  confirmed that on 16 July 2025 a malicious threat actor had
  gained access to a third-party, cloud-based CRM system and
  obtained personally identifiable data related to "the majority"
  of its approximately 1.4 million US customers, financial
  professionals, and select Allianz Life employees, using — in the
  company's words — "a social engineering technique." Allianz Life
  stated it "took immediate action to contain and mitigate the
  issue and notified the FBI," and that "there is no evidence the
  Allianz Life network or other company systems were accessed,
  including our policy administration system." The company first
  revealed the breach in a mandatory placeholder filing with
  Maine's Attorney General's Office that weekend; no exact number
  of affected individuals was published (the Maine AG filing lists
  the total as "Unknown"). Allianz "declined to answer questions
  about the threat actor and whether they were being extorted" and
  declined to confirm whether the CRM was Salesforce; BleepingComputer
  reported it "has learned that the attack is believed to have been
  conducted by the ShinyHunters extortion group" and linked it to the
  Google-Threat-Intelligence-Group-documented UNC6040 voice-phishing /
  Salesforce-OAuth campaign — a press inference, not a GTIG victim-
  naming or an Allianz confirmation.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event of the 2025 UNC6040 / ShinyHunters
  Salesforce-cloud campaign (campaign_id shinyhunters-salesforce-2025)
  — the same vishing -> third-party-CRM chain as the Adidas, LVMH-brand
  and Cisco siblings. Notable as an early major US-insurance-sector
  intrusion in the campaign and a marker for the sensitive-PII
  trajectory of the ShinyHunters brand. Attribution is hedged:
  GTIG's reports name NO victim (no Allianz); "ShinyHunters" is the
  extortion self-claim brand over GTIG's UNC6040 (vishing) / UNC6240
  (extortion) clusters, not a confirmed stable group; and Allianz's
  own statement attributes nothing beyond "a social engineering
  technique" against a third-party CRM (Allianz declined to name the
  threat actor, confirm Salesforce, or confirm extortion). The
  ShinyHunters placement is BleepingComputer's press inference
  ("BleepingComputer has learned ... is believed"). No Allianz-
  specific public extortion or data leak is documented (Allianz is
  not named in the Oct-2025 "Scattered LAPSUS$ Hunters" leak-site
  reporting), so extortion is NOT recorded as an Allianz incident_type.
  The originally-cited attribution source (mandiant/2025-08-08, which
  names no victim and is un-snapshottable) was re-sourced this audit to
  Allianz-specific reporting.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: BleepingComputer (Allianz-Life placement) + Google Threat Intelligence Group (campaign)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-26
    attribution_source_id: bleepingcomputer/2025-07-26_allianz-life-confirms-majority-14-million
    attribution_level: activity-cluster
    notes: |
      Allianz's own statement names NO threat actor and does not
      confirm Salesforce ("declined to comment"). The ShinyHunters
      placement is BleepingComputer's press inference: "While Allianz
      Life declined to answer questions about the threat actor and
      whether they were being extorted, BleepingComputer has learned
      that the attack is believed to have been conducted by the
      ShinyHunters extortion group" (BC 2025-07-26, sha256 d15dcb45..
      92b99c56), corroborated by BC 2025-07-30 placing Allianz in "the
      same campaign detailed by Google" (UNC6040). GTIG's own reports
      (incl. the un-snapshottable mandiant/2025-08-08) name NO Allianz
      victim, and GTIG reports "UNC6240 has consistently claimed to be
      the threat group ShinyHunters ... likely as a method to increase
      pressure" (mandiant/2025-06-04, sha256 4dce0e4b..f79c1051) — a
      self-claim, not a GTIG identity assertion. Hence moderate /
      concur-with-caveat / activity-cluster, NOT high.
  - actor_id: criminal/scattered-spider
    attributing_org: journalism (cluster overlap)
    attributing_org_confidence: low
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-30
    attribution_source_id: bleepingcomputer/2025-07-30_shinyhunters-salesforce-qantas-allianz-lvmh
    attribution_level: activity-cluster
    notes: |
      Campaign-cluster overlap only, and expressly contested. Neither
      Allianz's statement nor the Allianz-specific BC 2025-07-26 article
      mentions Scattered Spider. BC 2025-07-30 (sha256 d8de5cd4..
      f0636dad) frames it as confusion: "the attacks attributed to
      Scattered Spider (tracked by Mandiant as UNC3944) ... However,
      threat actors associated with Scattered Spider tend to perform
      full-blown ne[twork intrusions]" — a similar-sector / similar-TTP
      overlap, not Allianz-specific evidence. Krebs (2025-10, sha256
      9c2d11a8..97619835) describes "Scattered LAPSUS$ Hunters" as "an
      amalgamation of three hacking groups - Scattered Spider, Lapsus$
      and ShinyHunters" (it names no Allianz). Prior record pointed this
      attribution to mandiant/2025-08-08 (un-snapshottable, names no
      Allianz); corrected, confidence moderate -> low.
doctrine_links: []
targets:
  - target_id: orgs/allianz-life
    role: primary
