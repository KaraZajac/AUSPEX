        suspected retained (deliberate ShinyHunters brand-borrowing /
        self-claim; Allianz declined to confirm the actor).
    [c] DATES - start 2025-07-16 KEPT (Allianz-stated intrusion date,
        source-exact). disclosure 2025-07-26 KEPT (BC datePublished
        2025-07-26T14:00:55-04:00 = earliest snapshot-anchored public
