        Fri-25/Sat-26 filing-date ambiguity in secondary reporting).
        end_date 2025-08-31 (unsourced) -> 2025-07-26: the intrusion was a
        single-access event contained "immediately" on discovery (~Jul 17)
        with "no evidence the ... network or other company systems were
        accessed"; bounded through public disclosure. Source published_on
        verified: BC-Allianz 2025-07-26 (datePublished 14:00:55), BC-0730
        2025-07-30, Mandiant 2025-06-04, Krebs 2025-10-07.
    [d] DOCTRINE_LINKS - none (per scope; criminal financially-motivated
        extortion cluster, no strategic-doctrine terminal goal). Correct.
    [e] ATTRIBUTION_LEVEL - added activity-cluster on both attributions:
        GTIG tracks UNC6040 (vishing) + UNC6240 (extortion) clusters;
        "ShinyHunters" is a self-applied brand over them and the Allianz
