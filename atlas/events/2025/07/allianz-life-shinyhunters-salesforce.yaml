        third-party, cloud-based CRM system used by Allianz Life Insurance
        Company of North America" (Allianz spokesperson, via BC 2025-07-26
        sha256 d15dcb45..92b99c56; corroborated by BC 2025-07-30).
      - "the personal information for the 'majority' of its 1.4 million
        customers was exposed"; "personally identifiable data related to
        the majority of Allianz Life's customers, financial professionals,
        and select Allianz Life employees, using a social engineering
        technique" (BC 2025-07-26).
      - "no evidence the Allianz Life network or other company systems were
        accessed, including our policy administration system"; "notified
        the FBI"; Maine-AG placeholder filing (BC 2025-07-26).
      - STRIPPED the fabricated field enumeration "names, dates of birth,
