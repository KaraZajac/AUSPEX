id: 2025-07/allianz-life-shinyhunters-salesforce
name: Allianz Life third-party CRM breach (Salesforce vishing chain)
start_date: 2025-07-16
disclosure_date: 2025-07-26
end_date: 2025-08-31
incident_type:
  - data-theft
initial_vector: phishing  # via UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  In late July 2025 Allianz Life Insurance Company of North
  America disclosed that on July 16 2025 a malicious actor had
  accessed personal data of the majority of its approximately
  1.4 million US customers, financial professionals, and
  selected employees via a third-party cloud-based CRM
  platform. Exposed fields included names, dates of birth,
  addresses, contact information, and financial-professional
  business data. The intrusion was attributed by Google Threat
  Intelligence Group and journalism consensus to the UNC6040
  / ShinyHunters voice-phishing / Salesforce-OAuth campaign.
quantified_impact:
  individuals_affected: 1100000  # "the majority of" ~1.4M
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event. Notable as the first major US-
  insurance-sector intrusion in the 2025 campaign and a marker
  for the sensitive-PII trajectory of UNC6040 targeting.
attributions:
  - actor_id: criminal/shinyhunters
