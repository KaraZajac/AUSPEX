id: 2025-07/mstic-ties-storm-2603-to-ransomware-warlocklockbit-deployment-via-shar
name: "MSTIC ties Storm-2603 to ransomware (Warlock/LockBit) deployment via SharePoint ToolShell exploitation"
start_date: 2025-07-22
incident_type:
  - intrusion
  - ransomware
  - extortion
initial_vector: n-day
false_flag_risk: none
summary: |
  Microsoft (MSTIC) tied Storm-2603, assessed with moderate confidence to be a China-based actor, to ransomware deployment via exploitation of on-premises SharePoint 'ToolShell' vulnerabilities CVE-2025-49706 and CVE-2025-49704. The attack began with exploitation of an internet-facing on-premises SharePoint server, granting initial access using a spinstall0.aspx web shell that retrieved MachineKey data. From 18 July 2025 Storm-2603 was observed deploying Warlock ransomware, including by modifying Group Policy Objects to distribute it across compromised environments, and used Mimikatz for credential theft and PsExec/Impacket for lateral movement. Microsoft did not name specific victim sectors or countries for Storm-2603 in this report.
