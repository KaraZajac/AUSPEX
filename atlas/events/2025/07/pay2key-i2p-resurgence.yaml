      Morphisec (primary technical disclosure): "an Iranian-backed
      ransomware-as-a-service (RaaS) operation ... Linked to the
      notorious Fox Kitten APT group." A hedged, actor-level
      ("linked to") Iran/Fox Kitten nexus — hence moderate, not
      high. Morphisec names only Fox Kitten; "IRGC"/"Revolutionary
      Guard" and even "Pioneer Kitten" are 0 hits — so no service
      placement and no IRGC, consistent with the ir/unscoped actor.
  - actor_id: ir/unscoped/pioneer-kitten
    attributing_org: Halcyon
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2026-03-24
    attribution_source_id: halcyon/2025-07_pay2key-i2p
    attribution_level: named-actor
    notes: |
      Later corroboration (Halcyon + Beazley, ~March 2026): calls
      Pay2Key "an Iranian government-linked threat actor" tracked as
      "Fox Kitten, Pioneer Kitten, UNC757, Parasite, RUBIDIUM, and
      Lemon Sandstorm," and recaps the July-2025 Morphisec figures.
      "IRGC"/"Revolutionary Guard" = 0 hits. Iran-nexus / named-actor,
      no service.
doctrine_links:
  - doctrine_id: ir/sanctions-evasion
    pillar_id: ir/sanctions-evasion/ransomware-revenue
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The RaaS profit-share and >$4M in ransoms over four months
      give the operation a genuine revenue function that KELA frames
      as "an additional revenue stream through financially motivated
      cyber activity" for Iranian state-linked actors. AUSPEX maps
      that revenue function onto the Resistance-Economy /
      sanctions-evasion pillar (the doctrine record itself enumerates
      Pay2Key / Pay2Key.I2P here), but the sanctions-evasion FRAMING
      is an AUSPEX inference — none of the cited sources describe the
      motive as sanctions evasion — hence strongly_inferred.
    attesting_source_id: null
    inference_basis:
      signals:
        - "KELA: Iran-based actors sharing access / ransomware for a cut of proceeds 'provides Iranian actors with an additional revenue stream through financially motivated cyber activity.'"
        - "Morphisec: a RaaS with an 80% affiliate profit share and 'over $4 million in ransom payments collected in just four months,' with 'individual operators boasting $100,000 in profits' — a real revenue engine."
        - "Doctrine record ir/sanctions-evasion/ransomware-revenue explicitly enumerates 'Pay2Key / Pay2Key.I2P' as revenue generation plus asymmetric harassment under the Resistance-Economy framing."
      ruled_out: "Pure apolitical cybercrime-for-profit: ruled out because all sources tie victim selection to Iran's geopolitical adversaries (US/Israel) plus an ideological affiliate bonus, not profit-maximising target selection."
    contested: false
    analyst: claude
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: null
    program_id: null
    confidence: attested
    reasoning: |
      All sources characterise the resurgence as state-directed
      asymmetric retaliation rather than ordinary profit crime: the
      80%-vs-70% affiliate bonus is explicitly conditioned on attacks
      against "the enemies of Iran" (Morphisec), operations "shifted
      into high gear" after the June-2025 Israel-Iran-US conflict (The
      Register), and KELA states the group acts as "a punitive arm of
      the Iranian state" for "geopolitical retribution." That
      substantively states the asymmetric-warfare terminal goal —
      deniable, low-cost harassment/coercion of a stronger adversary
      that has struck Iran — so attested per the AUSPEX attested-label
      standard (corroboration of strategic purpose by the source, NOT
      a claim the perpetrator confessed a doctrine slug).
    attesting_source_id: kela/2025-07_pay2key-i2p
    inference_basis:
      source_id: kela/2025-07_pay2key-i2p
      source_quote: "expanded its operations to act as a punitive arm of the Iranian state"
    contested: false
    analyst: claude
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The Pay2Key.I2P ransomware persona lets an Iran-linked (Fox
      Kitten) actor run coercive, geopolitically-timed operations
      while presenting as an ordinary Russian-speaking RaaS crew — the
      deniability function of the persona-laundering pillar.
      Deliberate origin-obfuscation and an information-operation
      character are documented, but no cited source states this is a
      directed state persona-laundering programme — hence
      strongly_inferred. (Corrected this audit: the prior reasoning
      asserted an "IRGC-affiliated" link; no cited source names the
      IRGC — Fox Kitten is placed at ir/unscoped.)
    attesting_source_id: null
    inference_basis:
      signals:
        - "Halcyon: affiliation with Russian-speaking actors on criminal forums is 'consistent with the group's longstanding pattern of obscuring their nationality and origin.'"
        - "Halcyon: 'The FBI, CISA, and DoD Cyber Crime Center assessed Pay2Key as an information operation in 2024,' and financial trails 'point toward Iranian state interests rather than traditional cyber criminals.'"
        - "Morphisec / The Register: 'Pay2Key.I2P represents a dangerous convergence of Iranian state-sponsored cyber warfare and global cybercrime' — a state operation wearing a cybercrime persona and hosting on I2P for anonymity."
      ruled_out: "A genuinely independent Russian RaaS: ruled out by the Iran-nexus attribution (Fox Kitten), the anti-US/Israel ideological bonus, and conflict-synchronised operational tempo."
    contested: false
    analyst: claude
