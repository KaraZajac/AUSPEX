      morphisec/2025-07_pay2key-resurgence  6097d828d60e45fa089b93e796d60979e1be69f5c60f7c0f0c2d202810eea93c
      theregister/2025-07_pay2key-i2p       05cb61b4dfc9339bf24c65a1087f19e408d942033b7c67849b9b1068b5cef93e
      kela/2025-07_pay2key-i2p              24498c2168c71a70daaebdf2c06c4c12baabf83e9e2728d13b4aa84ce67f59a1
      halcyon/2025-07_pay2key-i2p           a41487b597050176adc23f1471cd5ce406ef99896cc013e137956923dadc6e05

    [a] FACTS — corrected against raw:
      - I2P leak/victim portal: CONFIRMED. Morphisec: "a platform hosted on the I2P network";
        The Register: "hosts its ransomware website on I2P."
      - 80% affiliate cut: CONFIRMED, and clarified as a BONUS up from 70% for anti-Iran-enemy
        attacks. Morphisec: "an 80% profit share (up from 70%) to affiliates supporting Iran or
        participating in attacks against the enemies of Iran." The Register: "80 percent instead of
        70 percent ... against enemies of Iran. This is primarily Israel and the United States."
      - ~$4M / ~50-51 payouts / four months: CONFIRMED as the group's own claim. Morphisec: "over
        $4 million ... in just four months" / "over 51 successful ransom payouts"; the actor's
        end-June-2025 claim "over 4$ Million and over 50 successfully conducted ransom payouts ...
        during 4 months." usd_extorted 4000000 kept.
      - "Telegram and Tox recruitment of Russian-speaking affiliates" — CORRECTED. "Tox" = 0 hits in
        all four sources (FABRICATION, stripped). Recruitment channels per sources: Russian/Chinese
        darknet/underground forums + X. "Telegram" appears once in Morphisec as a single reused handle
        on one late-March forum post, NOT a recruitment channel. Russian-speaking affiliates confirmed
        (Halcyon "Russian-speaking threat actors"; Morphisec "Russian-speaking darknet forums").
      - "explicit prohibition on encrypting Iranian / Iran-allied victims" — SOFTENED to source wording:
        no cited source states an encryption prohibition; KELA offers "Special advantageous conditions
        for Iran's friends" and the bonus is for attacking Iran's enemies.
      - Edge-appliance list (Citrix NetScaler / Fortinet FortiOS / Palo Alto GlobalProtect / Ivanti /
        Check Point) + "web shells" — STRIPPED as event-specific claims: 0 hits in all four cited
        sources (imported from CISA AA24-241A, which is NOT cited on this event; it is on the actor).
        Halcyon states the initial-access vector of its incident could not be determined. Reframed as
        generic actor-playbook ("edge devices — VPNs and firewalls") attributed to AA24-241A.
      - RMM tools "AnyDesk, Atera, ScreenConnect" — CORRECTED to TeamViewer. AnyDesk/ScreenConnect =
        0 hits; the 3 "atera" hits are substring/JS artifacts (lateral, createRange). Halcyon's only
        documented RMM abuse: "the use of TeamViewer on a compromised host."
      - Encryptor: "new Pay2Key.I2P ChaCha20 encryptor" — ChaCha20+Curve25519 is real but is Halcyon's
        Q1-2026 reverse-engineering ("Pay2Key uses ChaCha20+Curve25519 ... .6zldh_p2k"); the July-2025
        Morphisec sample is "enc-build.exe ... a Mimic ransomware protected with Themida." Added the
        Mimic/ELENOR-Corp lineage (stressed by all three corroborators) and Mimikatz (Halcyon:
        "We observed Mimikatz, LaZagne, and ExtPassword").
      - "Natanz / Fordow strikes" — STRIPPED: 0 hits; sources say "airstrikes against Iranian nuclear
        facilities" / "Israel-Iran-USA conflict" only.
    [b] ATTRIBUTION — "IRGC-aligned" REMOVED from name and doctrine reasoning. "IRGC"/"Revolutionary
        Guard" = 0 hits in Morphisec, The Register, Halcyon; KELA's 3 IRGC mentions are about an
        UNRELATED front company (Mahak Rayan Afraz / IRGC-CEC), never Fox Kitten. Sources name only
        Fox Kitten (Morphisec "Linked to the notorious Fox Kitten APT group"; KELA "Iranian
        state-aligned group Fox Kitten"; The Register "linked ... to Pioneer Kitten"). actor_id
        ir/unscoped/pioneer-kitten confirmed (matches actor id). Both attributions hedged ("linked
        to"/"government-linked") = moderate; auspex_assessment concur. Attributing org set to Morphisec
        (primary, 2025-07-08) + Halcyon (corroboration, 2026-03).
    [c] DATES — start_date 2025-07-01 -> 2025-02-01 (Morphisec: "debut in February 2025"; darknet
        campaign 2025-02-20; X presence from Jan 2025; The Register "reemerging in early 2025").
        disclosure_date 2025-07-15 -> 2025-07-08 (Morphisec JSON-LD datePublished). Source published_on
        all corrected: Morphisec 2025-07-08; The Register 2025-07-15 -> 2025-07-09 (article:published_time
        2025-07-09T06:33Z); KELA 2025-07-15 -> 2026-03-28 (it is a March-2026 survey, "Beyond the
        Regime," not a July-2025 post); Halcyon 2025-07-15 -> 2026-03-24 (a Q1-2026 Beazley incident
        write-up; earliest Wayback 2026-03-24). Source titles for The Register and KELA were AUSPEX
        paraphrases and were corrected to the real headlines.
    [d] DOCTRINE_LINKS — ir/asymmetric-warfare UPGRADED strongly_inferred -> attested (KELA attests the
        strategic purpose: group "expanded its operations to act as a punitive arm of the Iranian state"
        for "geopolitical retribution"; Morphisec "tool of cyber warfare / ideological agenda"). Added
        inference_basis with source_id/source_quote. ir/sanctions-evasion/ransomware-revenue and
        ir/cyber-deniable-retaliation/persona-laundering kept strongly_inferred with signals[]/ruled_out
        (revenue + deniability corroborated; sanctions-evasion + directed-persona-laundering framings
