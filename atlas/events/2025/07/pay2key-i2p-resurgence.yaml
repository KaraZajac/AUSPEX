id: 2025-07/pay2key-i2p-resurgence
name: Pay2Key.I2P resurgence — Iran-linked (Fox Kitten) RaaS with anti-US/Israel affiliate bonus
start_date: 2025-02-01
disclosure_date: 2025-07-08
end_date: null
incident_type:
  - ransomware
  - financial-theft
  - influence-operation
initial_vector: n-day
outcome_summary: |
  The Pay2Key persona returned as Pay2Key.I2P, an Iran-linked
  (Fox Kitten) RaaS platform hosted on the I2P network. It raised
  the affiliate cut to 80% (from 70%) as an ideological bonus for
  affiliates supporting Iran or attacking "the enemies of Iran"
  (primarily the US and Israel). The operators claimed >USD 4M
  from ~50 ransom payouts over the first four months. Western,
  chiefly US and Israeli, organizations targeted.
quantified_impact:
  usd_extorted: 4000000
false_flag_risk: none
summary: |
  Resurgence of the Pay2Key persona, attributed to the Iran-linked
  Fox Kitten APT cluster, as Pay2Key.I2P — a ransomware-as-a-
  service platform that debuted on Russian/Chinese darknet forums
  in February 2025 (X presence from January 2025) and escalated
  after the June 2025 Israel-Iran-US conflict. Disclosed by
  Morphisec (2025-07-08; reported by The Register 2025-07-09) and
  later corroborated by KELA and a Halcyon/Beazley report. The
  affiliate model: an I2P-hosted platform and leak/victim portal,
  recruitment of Russian-speaking affiliates on darknet forums and
  X (no Telegram/Tox recruitment channel is documented — one reused
  Telegram handle was noted on a single forum post), and an 80%
  affiliate cut (up from 70%) offered as a bonus for attacks on
  "enemies of Iran" (US/Israel), with "advantageous conditions for
  Iran's friends" (KELA). Operators claimed >USD 4M from ~50-51
  payouts over four months, and added a Linux build in June 2025.
  The encryptor is a Mimic ransomware variant (Morphisec ties it to
  the ELENOR-Corp / Mimic family; the July-2025 sample "enc-build.exe"
  was Themida-packed); later Halcyon/Beazley reverse-engineering of a
  Q1-2026 variant details ChaCha20 + Curve25519 file encryption, a
  "No Defender"/fake-Avast AV-evasion chain, credential harvesting
  (Mimikatz, LaZagne, ExtPassword), abuse of TeamViewer for hands-on
  access, and I2P-tunneled victim negotiation. Broader Fox Kitten /
  Pioneer Kitten tradecraft (mass exploitation of internet-facing
  edge devices — VPNs and firewalls) is documented for the actor by
  FBI/CISA advisory AA24-241A, but the specific initial-access vector
  of this campaign was not established by the cited reporting.
