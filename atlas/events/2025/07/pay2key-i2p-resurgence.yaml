outcome_summary: |
  Pay2Key persona returned as Pay2Key.I2P with an I2P-hosted
  leak site and an affiliate model offering 80% profit-share.
  Approximately USD 4M extorted in the first four months.
  US and Israeli organizations targeted.
quantified_impact:
  usd_extorted: 4000000
false_flag_risk: none
summary: |
  Re-emergence of the Pay2Key persona under Pioneer Kitten /
  Fox Kitten lineage following the June 2025 Israel-Iran kinetic
  exchanges (Natanz / Fordow strikes). Halcyon, KELA, and The
  Register documented the affiliate model: I2P-hosted leak site,
  Telegram and Tox recruitment of Russian-speaking ransomware
  affiliates, 80% revenue share, and explicit prohibition on
  encrypting Iranian / Iran-allied victims. Underlying intrusion
  tradecraft inherits the Pioneer Kitten / Fox Kitten playbook —
  mass exploitation of unpatched Citrix NetScaler, Fortinet
  FortiOS, Palo Alto GlobalProtect, Ivanti Connect Secure, and
  Check Point edge appliances; web shells on internet-facing
  servers; valid-credentials lateral movement; Mimikatz credential
  dumping; abuse of legitimate remote-management tools (AnyDesk,
  Atera, ScreenConnect) — re-fitted with a new Pay2Key.I2P
  ChaCha20 encryptor and an I2P-tunneled negotiation channel.
