id: 2025-07/pay2key-i2p-resurgence
name: Pay2Key.I2P resurfaces as IRGC-aligned RaaS post Israel-Iran kinetic exchanges
start_date: 2025-07-01
disclosure_date: 2025-07-15
end_date: null
incident_type:
  - ransomware
