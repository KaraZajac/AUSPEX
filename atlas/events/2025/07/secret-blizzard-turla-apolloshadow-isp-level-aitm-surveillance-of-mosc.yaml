id: 2025-07/secret-blizzard-turla-apolloshadow-isp-level-aitm-surveillance-of-mosc
name: "Secret Blizzard (Turla) ApolloShadow ISP-level AitM surveillance of Moscow embassies"
start_date: 2025-07-31
incident_type:
  - surveillance
  - espionage
  - intrusion
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (disclosed late July 2025) reported that Secret Blizzard (Turla), affiliated with FSB Center 16, has since at least 2024 maintained adversary-in-the-middle positions at the Russian ISP/telecom level to surveil foreign diplomats in Moscow, deploying custom ApolloShadow malware via a fake Kaspersky-branded certificate-validation lure that installs rogue root certificates, disables TLS encryption, and grants persistent access to diplomatic devices. A novel domestic ISP-position diplomatic-surveillance operation distinct from anything in the corpus. Maps to ru/info-security-2016 / ru/gerasimov-framework.
