    attributing_org: FBI + CISA + NCSC-UK + ASD/ACSC (joint CSA AA23-320A, 29 Jul 2025)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-07-29
    attribution_source_id: cisa/2025-07-29_aa23-320a-scattered-spider-update
    notes: |
      The 29 Jul 2025 joint advisory (AA23-320A update) attributes the
      recent commercial-facilities-sector activity and DragonForce
      ransomware deployment to Scattered Spider at TTP/sector level; it
      does NOT name M&S / Co-op / Harrods or the airlines individually.
      The named-victim triad + DragonForce framing is corroborated by
      the NCA arrests reporting (thehackernews 2025-07-10). Caveat
      because the authoritative attribution is sector-level, not
      per-victim. NB: the May 2025 UK NCSC involvement was
      incident-response support to the affected retailers
      (computerweekly / theregister 2025-05-02), NOT a formal
      attribution — SS was only speculatively named at that stage.
  - actor_id: criminal/scattered-spider
    attributing_org: Mandiant / Google TIG (reported via SecurityWeek / Axios)
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-06-30
    attribution_source_id: securityweek/2025-06-30_hawaiian-airlines-scattered-spider
    notes: |
      Aviation-wave attributions are explicitly hedged: Mandiant said
      the airline/transport incidents "resemble the operations of
      UNC3944 or Scattered Spider. We are still working on attribution";
      WestJet is "likely the work of the cybercrime group"; and "it's
      unclear whether Scattered Spider is behind the Hawaiian Airlines
      hack." Recorded as activity-cluster / low to preserve that hedge.
