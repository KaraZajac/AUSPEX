id: 2025-07/scattered-spider-airlines-uk-retail
name: Scattered Spider Q2 2025 wave — UK retail and aviation
start_date: 2025-04-22
disclosure_date: 2025-05-02
end_date: 2025-07-15
incident_type:
  - ransomware
  - data-theft
  - extortion
  - disruption
initial_vector: phishing
outcome_summary: |
  Q2 2025 Scattered Spider activity cluster hitting UK retail
  (Marks & Spencer 22 Apr — multi-week e-commerce outage plus
  customer-data theft; Co-op 30 Apr; Harrods 1 May; combined
  estimated impact ~GBP 440M per UK reporting) and, in June, activity
  in the aviation sector (WestJet mid-June internal-systems
  disruption; Hawaiian Airlines disclosed a security incident to the
  SEC in late June). Tradecraft consistent with prior campaigns: IT
  help-desk social engineering to reset passwords / MFA tokens, plus —
  in the retail wave — DragonForce ransomware encrypting VMware ESXi
  servers alongside data theft for extortion. The aviation-sector
  attributions are explicitly hedged (Mandiant: incidents "resemble
  the operations of UNC3944 or Scattered Spider … still working on
  attribution"; WestJet "likely" the group; Hawaiian "unclear whether
  Scattered Spider is behind"). Qantas (disclosed 2 Jul), linked to
  Scattered Spider in early reporting, is tracked separately in AUSPEX
  as a ShinyHunters / UNC6040 Salesforce-vishing breach
  (2025-07/qantas-shinyhunters-salesforce), not folded in here.
quantified_impact:
  combined_impact_estimate_gbp: 440000000  # M&S/Co-op/Harrods combined estimate; UK reporting (thehackernews 2025-07-10; CMC "single combined cyber event")
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Demonstrates Scattered Spider's continued operational viability
  despite the November 2024 five-member US indictment — the cluster
  recruited replacement operators from the same Anglophone Telegram /
  "The Com" subculture and remained Western-jurisdictional. On
  29 July 2025 the FBI and CISA released an updated joint Cybersecurity
  Advisory (AA23-320A, co-sealed with NCSC-UK, ASD/ACSC, RCMP, CCCS,
  AFP) attributing recent commercial-facilities-sector activity — TTPs
  obtained through FBI investigations as recently as June 2025, with
  most-recent deployment of DragonForce ransomware — to Scattered
  Spider, and re-emphasizing the IT-help-desk social-engineering
  vector. That advisory is TTP-/sector-level and does NOT name the
  individual M&S / Co-op / Harrods / airline victims; the named-victim
  set recorded here is corroborated by contemporaneous UK incident
  reporting and the July 2025 UK National Crime Agency arrests. AUSPEX
  records this cluster as the 2025 mid-arc continuation event for
  Scattered Spider.
attributions:
