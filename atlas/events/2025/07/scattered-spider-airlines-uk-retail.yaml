id: 2025-07/scattered-spider-airlines-uk-retail
name: Scattered Spider Q2 2025 wave — UK retail and aviation
start_date: 2025-04-22
disclosure_date: 2025-05-12
end_date: 2025-07-15
incident_type:
  - ransomware
  - data-theft
  - disruption
initial_vector: phishing
outcome_summary: |
  Q2 2025 Scattered Spider activity cluster hitting UK retail
  (Marks & Spencer Apr 22 — major multi-week e-commerce outage
  estimated GBP 300M impact; Co-op Apr 30; Harrods May 1) and
  pivoting to aviation (Hawaiian Airlines Jun 23, WestJet
  earlier in June, Qantas Jul 3). Tradecraft consistent with
  prior campaigns: IT help-desk social engineering, MFA-reset
  abuse, vSphere encryption. Ransom brand association: DragonForce
  (UK retail wave) and Qilin (aviation wave).
false_flag_risk: none
campaign_id: scattered-spider-cluster
summary: |
  Demonstrates Scattered Spider's continued operational viability
  despite the November 2024 five-member indictment — the cluster
  recruited replacement operators from the same Telegram subculture
  and remained Western-jurisdictional. UK NCSC issued a joint
  advisory with FBI / Australian Signals Directorate Aug 2025
  re-emphasizing the help-desk-attack vector. AUSPEX records
  this cluster as the 2025 mid-arc continuation event for
  Scattered Spider.
