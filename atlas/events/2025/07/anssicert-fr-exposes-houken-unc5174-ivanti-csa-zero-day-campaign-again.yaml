summary: |
  On 1 July 2025 ANSSI's CERT-FR published the CTI report 'HOUKEN — Seeking a path by living on the edge with zero-days' (CERTFR-2025-CTI-009), documenting a September 2024 campaign in which an attacker exploited three Ivanti Cloud Service Appliance zero-days (CVE-2024-8190, CVE-2024-8963, CVE-2024-9380) for initial access to French organisations across the governmental, telecommunications, media, finance and transport sectors, with activity continuing to end-November 2024. ANSSI assesses HOUKEN is operated by the same actor MANDIANT tracks as UNC5174 — a Chinese-speaking, UTC+8 initial-access broker that gains footholds (PHP webshells, a kernel rootkit) likely to sell to a state-linked actor seeking intelligence; ANSSI also observed data exfiltration and cryptomining. This is a French-discovered China-nexus access-broker operation NOT in the corpus; UNC5174 is referenced in the CN inventory but has no canonical actor_id, so proposed as a new named cluster. Self-patching of the exploited resources to lock out other actors is a notable TTP.
