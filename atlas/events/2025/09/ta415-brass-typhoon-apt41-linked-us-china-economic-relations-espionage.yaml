id: 2025-09/ta415-brass-typhoon-apt41-linked-us-china-economic-relations-espionage
name: "TA415 (Brass Typhoon / APT41-linked) US-China economic-relations espionage via VS Code Remote Tunnels"
start_date: 2025-09-16
incident_type:
  - intrusion
  - espionage
  - reconnaissance
initial_vector: phishing
false_flag_risk: none
summary: |
  Proofpoint (published 16 September 2025) detailed that throughout July-August 2025 TA415 — a China-aligned actor Proofpoint links publicly to APT41 / Brass Typhoon — ran spearphishing campaigns against US government, think-tank, and academic organizations using US-China economic-relations lures (impersonating US officials and trade bodies). The actor adopted VS Code Remote Tunnels as a primary persistence/remote-access mechanism, enabling hands-on-keyboard access without traditional malware, to collect intelligence on US trade policy and economic negotiations. Maps to the existing APT41 actor but is a distinct 2025 economic-collection campaign not represented in the corpus.
