  notes: |
    Audited vs the single cited Proofpoint blog (raw captured + SHA-256). FACTS all
    confirmed: July-August 2025 spearphishing of US government/think-tank/academic
    targets with US-China economic lures; impersonation of the US-China Business
    Council and Rep. John Moolenaar (Chair, House Select Committee on the CCP);
    WhirlCoil loader establishing VS Code Remote Tunnels for malware-free
    hands-on-keyboard access; legitimate-service C2 (Google Sheets/Calendar + VS
    Code Tunnels); objective "likely the collection of intelligence on the
    trajectory of U.S.-China economic ties." CORRECTIONS: (1) attributing_org_confidence
    moderate→HIGH — source states "Proofpoint attributes the activity… to TA415 with
    high confidence" (the old "moderate" was a mis-mapping from the ICD link-confidence
    field). (2) Added attribution_level: named-actor (names TA415, overlapping APT41 /
    Brass Typhoon / Wicked Panda). (3) start_date 2025-09-16→2025-07-01 (op start,
    "Beginning in July 2025…"); the 2025-09-16 publication date moved to disclosure_date.
    (4) Summary expanded with the impersonation detail + C2 channels + sourced objective
    phrasing. ATTRIBUTION/MSS: this source does NOT independently name the MSS as tasker —
    it only relays the same defendant boast as the DOJ source ("indicted members of the
    group reportedly claimed to have links to … the Ministry of State Security (MSS)").
    Proofpoint's own attribution is to TA415 ≡ APT41/Brass Typhoon, "Chinese
    state-sponsored," indicted 2020. The cn/mss/apt41 placement rests on the actor's DOJ
    sources (verified 2026-06-24) and is only weakly corroborated here; recorded in the
    attribution notes. DOCTRINE LINK kept strongly_inferred (source names only the
    proximate intel-collection purpose, hedged "likely"; pillar specializes it) —
    attesting_source_id null, no over-attestation. actor_id cn/mss/apt41 resolves, not
    stale. All target sector + doctrine/pillar FKs resolve.
