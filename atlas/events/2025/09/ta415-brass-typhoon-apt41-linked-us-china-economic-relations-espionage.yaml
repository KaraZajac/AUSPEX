id: 2025-09/ta415-brass-typhoon-apt41-linked-us-china-economic-relations-espionage
name: "TA415 (Brass Typhoon / APT41-linked) US-China economic-relations espionage via VS Code Remote Tunnels"
start_date: 2025-07-01   # source: "Beginning in July 2025… a series of campaigns"; was publication date 2025-09-16 (now disclosure_date)
disclosure_date: 2025-09-16
incident_type:
  - intrusion
  - espionage
  - reconnaissance
initial_vector: phishing
false_flag_risk: none
summary: |
  Proofpoint (published 16 September 2025) detailed that throughout July-August 2025 TA415 — a Chinese state-sponsored actor (indicted by the US in 2020) that Proofpoint says overlaps with activity tracked elsewhere as APT41 / Brass Typhoon / Wicked Panda — ran spearphishing campaigns against US government, think-tank, and academic organizations using US-China economic-relations lures. The group impersonated the US-China Business Council (July 2025) and Rep. John Moolenaar, Chair of the House Select Committee on Strategic Competition with the CCP (July-August 2025), soliciting input on a purported China-sanctions framework. The infection chain (WhirlCoil Python loader → LNK) adopted Visual Studio Code Remote Tunnels as a primary persistence/remote-access mechanism, giving hands-on-keyboard access without conventional malware; recent TA415 operations have consistently abused legitimate services for C2 (Google Sheets, Google Calendar, and VS Code Remote Tunnels). Proofpoint assesses the primary objective is likely the collection of intelligence on the trajectory of US-China economic ties. Maps to the existing APT41 actor but is a distinct 2025 economic-collection campaign not previously represented in the corpus.
attributions:
  - actor_id: cn/mss/apt41
    attributing_org: "proofpoint"
    attributing_org_confidence: high   # source: "Proofpoint attributes the activity… to TA415 with high confidence"
    attribution_level: named-actor   # names TA415, overlapping APT41 / Brass Typhoon / Wicked Panda
    auspex_assessment: concur-with-caveat   # caveat: TA415≡APT41 via overlap; cn/mss rests on the DOJ defendant-boast, which Proofpoint only relays ("reportedly claimed")
    attribution_date: 2025-09-16
    attribution_source_id: proofpoint/2025-09_ta415-brass-typhoon-apt41-linked-us-chin
    notes: |
      Proofpoint attributes to TA415 with HIGH confidence (multiple independent
      overlaps with known TA415 infrastructure, TTPs, and targeting). TA415 is
      Proofpoint's cluster name; the source states it "overlaps with threat
      activity tracked by third parties as APT41, Brass Typhoon, and Wicked
      Panda" and is "a Chinese state-sponsored threat actor indicted by the U.S.
      government in 2020" — corroborating the cn/apt41 mapping at China-state /
      named-actor level. On the MSS specifically the source only RELAYS the
      same defendant boast as the DOJ source: "indicted members of the group
      reportedly claimed to have links to China's civilian foreign intelligence
      service, the Ministry of State Security (MSS)." It is not an independent
      Proofpoint assertion of MSS tasking, so it corroborates the cn/mss/apt41
      placement only weakly (the placement rests on the actor's DOJ sources,
      verified 2026-06-24).
