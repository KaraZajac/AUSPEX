id: 2025-09/mustang-panda-eu-nato
name: Mustang Panda (TA416) renewed EU / NATO diplomatic espionage campaign
start_date: 2025-06-01
disclosure_date: 2026-04-01
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Proofpoint-disclosed (1 April 2026) TA416 / Mustang Panda
  campaign that, from mid-2025, resumed targeting of diplomatic
  missions and delegations to the EU and NATO across a range of
  European countries — chiefly ministries of foreign affairs and
  ministries of defense, focused on individuals assigned to NATO
  missions and delegations. Web-bug reconnaissance and malware-
  delivery waves (a distinct wave in late September 2025)
  delivered the group's customized PlugX backdoor via DLL-
  sideloading triads. Continuity of the 2022 European campaign
  after ~two years (mid-2023 to mid-2025) of focus on Southeast
  Asia, Taiwan, and Mongolia.
false_flag_risk: none
summary: |
  Marks renewed TA416 (Mustang Panda) targeting of EU- and NATO-
  aligned diplomatic entities. Proofpoint observed multiple waves
  of web-bug profiling and PlugX malware-delivery campaigns using
  freemail lures, fake Cloudflare Turnstile challenge pages, and
  abuse of Microsoft Entra ID (OAuth) third-party app redirects;
  some phishing was sent from a likely-compromised European armed-
  forces account and a compromised Southeast Asian diplomatic
  mailbox. The renewed targeting commenced one day after the 25th
  EU-China summit and coincided with heightened EU-China tensions
  over trade, the Russia-Ukraine war, and rare-earths exports.
  Attribution: Proofpoint attributes the activity to "the China-
  aligned threat actor TA416" (nation-level; no specific Chinese
  service named). Proofpoint explicitly tracks TA416 as distinct
  from a second, overlapping "Mustang Panda" cluster it designates
  UNK_SteadySplit (the user of the TONESHELL / PUBLOAD families).
