  notes: |
    PHANTOM-REMEDIATION → RE-SOURCED (badrabbit model), then full 6-point audit.
    The sole cited source proofpoint/2025-09_mustang-panda-eu-nato had url: null (an
    invented slug flagged by the 2026-05-26 sweep; a 2026-06-24 audit marked it
    UNFETCHABLE and skipped it). The underlying EVENT is REAL and well-documented:
    re-pointed the source to the genuine primary — Proofpoint, "I'd come running back
    to EU again: TA416 resumes European government espionage campaigns" (Mark Kelly /
    Georgi Mladenov, published 1 April 2026),
    https://www.proofpoint.com/us/blog/threat-insight/id-come-running-back-eu-again-ta416-resumes-european-government-espionage
    Raw snapshot captured: proofpoint__2025-09_mustang-panda-eu-nato.html,
    sha256 05783766…08db8cdd (057837660d380fcddb084578ef74d87d97de5c38a50fee67d651011c08db8cdd),
    305,359 bytes. All facts below are quoted from that snapshot.

    [a] FACTS — corrected substantial AI-embellishment / campaign conflation:
      • Victimology VERIFIED: "In late September 2025, Proofpoint observed TA416 conduct
        multiple malware delivery campaigns targeting European ministries of defense and
        ministries of foreign affairs. This targeting predominantly focused on individuals
        assigned to NATO missions and delegations." Also "multiple waves of web bug and
        malware delivery campaigns against diplomatic missions to the European Union and
        NATO across a range of European countries." Added sectors/government/defense-ministry.
      • TOOLING CORRECTED: the old outcome_summary claimed "TONESHELL evolution; SnakeDisk
        USB worm." FALSE for this campaign. The real payload: "maintaining a consistent
        goal of loading the group's customized PlugX backdoor via DLL sideloading triads"
        (PlugX = 28 hits). "SnakeDisk" = 0 hits in the source (it belongs to the separate
        IBM X-Force / Hive0154 Thailand air-gap campaign, mid-2025 — a DIFFERENT operation).
        TONESHELL (3 hits) / PUBLOAD (2 hits) appear ONLY as the tooling of UNK_SteadySplit —
        "Proofpoint tracks what is commonly referred to as Mustang Panda under two primary
        clusters: TA416 (covered within this report) and a second group tracked under the
        temporary designator UNK_SteadySplit… UNK_SteadySplit is a user of the custom
        TONESHELL and PUBLOAD malware families" — NOT the TA416 activity this event models.
        Stripped TONESHELL/SnakeDisk; set PlugX/DLL-sideloading.
      • MONGOLIA CORRECTED: old prose listed "Mongolian … geographies" as targets. The
        source places Mongolia in the PRIOR period, not this campaign: "From mid-2023 until
        mid-2025, Proofpoint observed minimal TA416 targeting within Europe, with the group
        mostly active across Southeast Asia, Taiwan, and Mongolia." Removed Mongolia from
        the victimology (kept only as the prior-focus context).
      • MOTIVE CORRECTED: old summary asserted "secondary-sanctions exposure for PRC firms
        supporting Moscow" — NOT in the source. Source: return "occurred during heightened
        EU-China tensions over trade, the Russia-Ukraine war, and rare earths exports, and
        commenced immediately following the 25th EU-China summit." Rewrote to the source's
        framing. Initial access VERIFIED: fake Cloudflare Turnstile pages → Microsoft Entra
        ID (OAuth) third-party app redirect abuse; some mail from a compromised European
        armed-forces account + a compromised SE-Asian diplomatic mailbox.
      • incident_type: dropped data-theft (exfiltration not confirmed — these are delivery/
        web-bug campaigns) and added espionage; kept intrusion.

    [b] ATTRIBUTION — "the China-aligned threat actor TA416." Nation-level China nexus,
      named-actor cluster, NO service: grep "ministry of state security" = 0. Confirms and
      strengthens actor placement cn/unscoped/mustang-panda (not cn/mss). Set attributing_org
      high (Proofpoint definitively names its own tracked cluster), attribution_level
      named-actor, auspex_assessment concur; added a note capturing Proofpoint's own umbrella-
      opacity caveat and TA416≠UNK_SteadySplit distinction.

    [c] DATES — source published_on FIXED 2025-09-15 → 2026-04-01 (byline "April 01, 2026").
      Event disclosure_date FIXED 2025-09-15 → 2026-04-01; attribution_date likewise. The
      2025-09-15 disclosure was fabricated to match the invented slug — nothing was disclosed
      that day. start_date kept 2025-06-01: defensible (earliest C&C-domain first-sightings
      "Jun-25" in the IOC table; "mid-2025 onwards"); the first observed operational wave was
      the late-July 2025 web-bug run "one day after the 25th EU-China summit," and the anchor
      malware wave was "late September 2025" (matching the 2025-09 event slug). end_date null:
      campaign continued into early 2026 (ongoing).

    [d] DOCTRINE_LINKS — both strongly_inferred (per directive), neither attested, both
      attesting_source_id null (correct; no attested → no gate obligation). Improved reasoning
      and added inference_basis (signals[] + ruled_out) to both; colon-space list items quoted.
      cn/bri/political-intelligence-collection carried by Proofpoint's explicit conclusion
      ("a renewed intelligence-collection focus against EU and NATO-affiliated diplomacy
      entities"); cn/national-intelligence-law-2017 (pillar null) is the structural legal-
