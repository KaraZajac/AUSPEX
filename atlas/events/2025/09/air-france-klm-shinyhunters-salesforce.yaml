id: 2025-09/air-france-klm-shinyhunters-salesforce
name: Air France-KLM customer-data breach (Salesforce vishing chain)
start_date: 2025-08-15
disclosure_date: 2025-09-04
end_date: 2025-09-30
incident_type:
  - data-theft
initial_vector: phishing  # UNC6040 vishing → Salesforce OAuth
outcome_summary: |
  In early September 2025 Air France-KLM disclosed a customer-
  data breach via a third-party customer-service / CRM
  platform, exposing customer contact information and Flying
  Blue loyalty-program details. The intrusion was attributed
  to the UNC6040 / ShinyHunters voice-phishing / Salesforce-
  OAuth campaign by Google Threat Intelligence Group and
  October 2025 Krebs reporting.
false_flag_risk: suspected
campaign_id: shinyhunters-salesforce-2025
summary: |
  Per-victim child event. Companion to the Qantas July 2025
  airline-loyalty intrusion; together the two cases establish
  the airline-loyalty-program data class as a high-utility
  target in the 2025 ShinyHunters-brand campaign.
