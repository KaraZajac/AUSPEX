outcome_summary: |
  On September 12 2025, Conor Brian Fitzpatrick ("Pompompurin"),
  founder of BreachForums, was resentenced in the US District
  Court for the Eastern District of Virginia to 36 months
  federal prison. The resentencing followed a January 21 2025
  Fourth Circuit Court of Appeals ruling that vacated
  Fitzpatrick's original January 2024 sentence — time served
  (17 days) plus 20 years supervised release — as substantively
  unreasonable. Per the DOJ press release, BreachForums hosted
  approximately 14 billion individual records over its one-year
  primary operation (March 2022 - March 2023) and was a primary
  marketplace for ShinyHunters-branded data sales, the FBI
  InfraGard breach, the DC Health Link breach, and other
  high-profile postings.
