outcome_summary: |
  On September 16 2025, Conor Brian Fitzpatrick ("Pompompurin"),
  22, of Peekskill NY, founder of BreachForums, was resentenced
  to three years (36 months) in federal prison for his creation
  and operation of BreachForums and for possession of child
  sexual abuse material (CSAM). The resentencing followed a
  January 21 2025 U.S. Court of Appeals for the Fourth Circuit
  opinion that vacated Fitzpatrick's prior sentence of time
  served (17 days) and remanded the case for resentencing.
  Fitzpatrick had pleaded guilty to access-device conspiracy,
  access-device solicitation, and possession of CSAM, and agreed
  to forfeit over 100 domain names, more than a dozen electronic
  devices, and cryptocurrency proceeds. Per the DOJ, BreachForums
  (launched March 2022, over 330,000 members; a replacement for
  RaidForums, which law enforcement seized February 2022)
  maintained and offered access to at least 888 datasets
  containing over 14 billion individual records of PII —
  including a database of approximately 87,760 FBI InfraGard
  members and one with approximately 200 million users of a
  major U.S. social-networking site.
