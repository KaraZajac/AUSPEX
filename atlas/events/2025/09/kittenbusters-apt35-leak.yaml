    notes: |
      Subject-entity attribution (Shadow Brokers / i-Soon model, cf.
      2024-02/isoon-leak): the attributed entity is the SUBJECT whose
      internal material leaked — APT35 / Charming Kitten
      (ir/irgc/apt35) — NOT the leaker. The "KittenBusters" leaker is
      unattributed; its identity is "unknown" per Nariman Gharib.
      CloudSEK assessed the dataset as "appears to be a credible leak
      of Charming Kitten (APT35) operational materials"
      (High-Confidence Indicators) but did not independently validate
      the leader identity. attribution_level named-actor: independent
      analysis reaches APT35 + IRGC; the more specific "IRGC-IO Unit
      1500 / Department 40, led by Abbas Rahrovi" is the LEAK's
      self-claim (GitHub README + Gharib), not vendor-confirmed.
      Confidence held moderate / concur-with-caveat on unverified leak
      provenance (false_flag_risk suspected).
