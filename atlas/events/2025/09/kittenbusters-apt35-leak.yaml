    snapshotted, and re-pointed. Directionality confirmed: the EXPOSED
    party is APT35/Iran (ir/irgc/apt35); the LEAKER (KittenBusters) is
    unattributed. Modeled on 2024-02/isoon-leak (subject-entity /
    Shadow Brokers pattern) and consistent with 2019-04/lab-dookhtegan.

