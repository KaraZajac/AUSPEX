id: 2025-09/kittenbusters-apt35-leak
name: KittenBusters GitHub leak exposes IRGC-linked APT35 / Charming Kitten internal operations
start_date: 2025-09-30  # GitHub API created_at 2025-09-30T16:22:52Z (repo creation, verified)
disclosure_date: 2025-09-30  # repo public + Nariman Gharib analysis same day
end_date: null  # repo still receiving uploads (pushed_at 2025-10-27); leaker stated more to come
incident_type:
  - leak
  - documentary  # leak OF an actor's internal material; leaker unknown, not an offensive Iranian op (cf. 2024-02/isoon-leak)
initial_vector: unknown  # Gharib: exposure "suggest[s] either insider access or a significant breach" — not resolved (prior `insider` also echoed CloudSEK's "An Insider Look" idiom)
outcome_summary: |
  An anonymous GitHub account "KittenBusters" (repo created
  2025-09-30) published hundreds of files from the IRGC-affiliated
  Charming Kitten / APT35 operation: attack reports, daily
  operational logs, internal communications, malware samples, and
  photographs of personnel (Nariman Gharib). The leak's README
  names an alleged unit leader, "Abbas Rahrovi (a.k.a. Abbas
  Hosseini)," with an Iranian national ID (4270844116), and claims
  he runs the unit — self-labeled "Department 40" of IRGC-IO
  counterintelligence "Unit 1500" — through a network of front
  companies (one named "Zharf Andishan Tafacor Sefid"). CloudSEK
  TRIAD published the first detailed English-language analyst
  breakdown (Oct 7, 2025) and assessed the dataset as "appears to
  be a credible leak" on High-Confidence Indicators (Persian
  internal docs, Jalali dates, Tehran-timezone hours, TTP
  consistency), mapping the internal org structure, tradecraft
  (day-1 CVE-2024-1709 exploitation, EDR evasion), and regional
  victimology (Jordan Ministry of Justice, Saudi Council of
  Ministers, Air Arabia, Jordanian legal firms). The leader-naming,
  front companies, and unit labels are the LEAK's self-attribution
  (GitHub README, relayed by Gharib), independently unverified;
  structurally the dump resembles the 2024 i-Soon contractor leak
  but has not been independently multi-vendor validated to that
  standard.
false_flag_risk: suspected
summary: |
  Counter-regime documentary leak, not an Iranian operation —
  modeled on the subject-entity (Shadow Brokers / i-Soon) pattern:
  the exposed subject is APT35 / Charming Kitten (ir/irgc/apt35),
  while the "KittenBusters" leaker is unattributed. An anonymous
  GitHub repository published hundreds of files of internal Charming
  Kitten material; CloudSEK TRIAD assessed the dataset as "appears
  to be a credible leak" on High-Confidence Indicators. If genuine,
  the most significant exposure of an IRGC cyber operation since the
  2019 Lab Dookhtegan APT34 leak. Leaker identity is expressly
  unknown (Nariman Gharib): the OSINT tracker CyberKnow labeled it a
  "pro-Israel hacktivist" account, but Gharib also floats Israeli
  intelligence, disaffected insiders, and rival Iranian factions —
  false_flag_risk suspected accordingly. The leak's specific
  personnel/front-company identifications are the leaker's own
  claims and remain independently unverified.
