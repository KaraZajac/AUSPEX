id: 2025-09/kittenbusters-apt35-leak
name: KittenBusters GitHub leak exposes IRGC-linked APT35 / Charming Kitten internal operations
start_date: 2025-09-30  # repository creation
disclosure_date: 2025-09-30
end_date: null
incident_type:
  - leak
  - influence-operation
initial_vector: insider
outcome_summary: |
  An anonymous GitHub account "KittenBusters" published hundreds
  of files from the IRGC-affiliated Charming Kitten / APT35
  operation: attack reports, daily operational logs, internal
  communications, malware samples, target lists, and personnel
  photographs. The leak names alleged unit leader Abbas Rahrovi
  (a.k.a. Abbas Hosseini) and details a front-company network
  managing the cluster. CloudSEK TRIAD published the first
  detailed analyst breakdown in October 2025. The leak's
  source, motive, and authenticity remain unattributed; framing
  closely resembles the 2024 i-SOON contractor leak in
  structure but the data set has not been independently
  validated to comparable standards.
false_flag_risk: suspected
summary: |
  If genuine, the most significant exposure of an IRGC cyber
  operation since the 2019 Lab Dookhtegan APT34 leak. The leak
  surfaced two weeks before the September 30 Phantom Taurus
  Unit 42 disclosure and one month before the November 4 OFAC
  DPRK-laundering action, in a period of unusually high
  attribution-volume against IRGC operations. CyberKnow assessed
  the operator as a pro-Israel hacktivist account; false-flag
  risk flagged because the precise framing and operational
  context fit several alternative authorship hypotheses.
