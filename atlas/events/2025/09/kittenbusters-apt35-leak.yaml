    [a] FACTS — RE-SOURCED and corrected. The disputed claims are REAL
    but were carried by Nariman Gharib + the GitHub README, NOT by
    CloudSEK/SecurityWeek (both cited pre-audit):
      • Leaked materials list ("attack reports, daily operational logs,
        internal communications, malware samples, and photographs of
        personnel") = Gharib VERBATIM — re-pointed to Gharib. (CloudSEK's
        only "photo" hit is "Photoshop", a tool; it has NO "photograph".)
      • "Abbas Rahrovi (a.k.a. Abbas Hosseini)", national ID 4270844116,
        front companies, "Department 40 / Unit 1500" = GitHub README
        ("Heading this operation is Abbas Rahrovi (aka Abbas Hosseini,
        National Number: 4270844116), an IRGC official who has established
        several front companies … through which he manages the APT";
        "Charming Kitten network (Department 40)"; cover company "ZHARF
        ANDISHAN TAFACOR SEFID"), relayed by Gharib. CloudSEK contains
        NONE of these strings (grep: 0 for Abbas/Rahrovi/Hosseini/front
        company). Kept as the LEAK's alleged self-attribution.
      • CloudSEK's actual contribution added: it assessed the dataset
        "appears to be a credible leak … High Confidence Indicators"
        (Persian docs, Jalali dates, Tehran timezone, TTP match) — the
        prior "not been independently validated" understated this.
      STRIPPED fabricated/incoherent narrative from the summary: "surfaced
      two weeks before the September 30 Phantom Taurus Unit 42 disclosure
      and one month before the November 4 OFAC DPRK-laundering action, in
      a period of unusually high attribution-volume against IRGC
      operations." Phantom Taurus is a CHINA-nexus actor and the OFAC
      DPRK-laundering action is NORTH KOREA — neither is an IRGC operation;
      the "IRGC attribution-volume" framing was invented and is removed.
      Also internally inconsistent (leak dated 2025-09-30 yet "two weeks
      before" a Sept-30 event). Lab Dookhtegan 2019 comparison retained
      (legitimate anchor). CVE-2024-1709 (ConnectWise) is real (CloudSEK).

