summary: |
  Designation event in the Sanctions-Evasion crypto pillar.
  Chainalysis, Elliptic, and Scorechain published companion
  analyses linking the designated wallets to IRGC-aligned
  procurement chains, Nobitex on-ramp activity, Tornado Cash and
  Sinbad-style mixer usage, and OTC traders in Hong Kong and
  Dubai. The shadow-banking architecture sits alongside the
  Iranian ransomware-revenue and hack-and-leak operations
  (Pay2Key, Black Shadow, Moses Staff, CyberAv3ngers) within the
  broader IRGC sanctions-evasion ecosystem.
