id: 2025-09/ofac-irgc-crypto-shadow-banking
name: OFAC designates IRGC-QF/MODAFL crypto shadow-banking network (Derakhshan-Alivand oil-sale facilitators)
start_date: 2025-09-16
disclosure_date: 2025-09-16
end_date: 2025-09-16
incident_type:
  - documentary  # OFAC press-release designation artifact
  - policy       # SDN sanction = policy counter-action (task NB: [policy]); documentary added to match audited pure-OFAC siblings Blender 2022-05 + CyberAv3ngers 2024-02
initial_vector: unknown
outcome_summary: |
  US Treasury OFAC (press release sb0248, under counterterrorism
  authority E.O. 13224) designated a pair of Iranian financial
  facilitators — Alireza Derakhshan and Arash Estaki Alivand —
  plus more than a dozen Hong Kong- and UAE-based individuals and
  front companies (Alpa, Minato, Powell, Everest, Unique Station,
  Alliance First, Paul AD Sons) for coordinating funds transfers,
  including from the sale of Iranian oil, that benefit the
  IRGC-Qods Force (IRGC-QF) and Iran's Ministry of Defense and
  Armed Forces Logistics (MODAFL). OFAC states the "shadow
  banking" network launders money through overseas front companies
  and cryptocurrency; Derakhshan and Alivand facilitated the
  purchase of over USD 100M in cryptocurrency for oil sales
  (2023-2025), and the front companies collectively handle
  hundreds of millions of dollars in transactions. Second round of
  Iran shadow-banking sanctions under the NSPM-2 maximum-pressure
  campaign.
quantified_impact:
  crypto_for_oil_usd_min: 100000000  # OFAC sb0248: Derakhshan+Alivand facilitated purchase of "over $100 million worth of cryptocurrency" for oil sales (2023-2025); floor figure. NB: NO "$600M" and NO "seven crypto addresses" appear in sb0248 — prior figures were fabricated and were stripped.
false_flag_risk: none
summary: |
  Point-in-time OFAC SDN designation in the Iranian
  sanctions-evasion / crypto-laundering pillar. Under E.O. 13224
  (counterterrorism authority), OFAC designated Iranian financial
  facilitators Alireza Derakhshan and Arash Estaki Alivand and a
  network of UAE- and Hong Kong-based front companies (including
  Alpa Trading - FZCO, Alpa Investment L.L.C, Alpa Hong Kong
  Limited, Powell Raw Materials Trading L.L.C, Powell International
  FZE, Minato Commercial Brokers / Investment / Goods, Everest
  Investment L.L.C, Unique Station Trading, Alliance First Trading
  L.L.C, and Paul AD Sons Trading FZE) used to move Iranian
  oil-sale proceeds on behalf of the IRGC-Qods Force and MODAFL.
  OFAC describes laundering through overseas front companies and
  cryptocurrency; Alivand's ties run through the Syria-based
  Al-Qatirji Company (a primary IRGC-QF oil-sale partner) and a
  Hizballah-associated money changer with access to digital
  wallets. This is a financial / policy counter-action (a US
  sanction against an Iranian sanctions-evasion network), NOT a
  cyber operation. Chainalysis's February 2025 report on Iranian
  crypto sanctions-evasion (which tracked ~USD 7.8B in Iranian
  wallet flows) is retained only as background corroboration of
  the broader crypto sanctions-evasion trend; it predates this
  designation by seven months and does not analyze these specific
  designees.
