      bar); auspex_assessment kept concur-with-caveat (no government attribution, no service).

    [c] DATES — Unit 42 published_on 2025-09-30 (page "September 30, 2025" / "2025-09-30");
      CyberScoop published_on 2025-09-30 (JSON-LD datePublished "2025-09-30T21:40:32+00:00,"
