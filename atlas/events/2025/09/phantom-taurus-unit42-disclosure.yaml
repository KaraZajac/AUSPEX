id: 2025-09/phantom-taurus-unit42-disclosure
name: Unit 42 discloses "Phantom Taurus" PRC cluster + NET-STAR backdoor suite
start_date: 2023-01-01  # ~two and a half years of activity; cluster first documented June 2023 (CL-STA-0043)
disclosure_date: 2025-09-30
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: unknown  # Unit 42 focuses on post-compromise activity; web-shell/IIS/Exchange access implied but not asserted
outcome_summary: |
  Palo Alto Networks Unit 42 elevated its long-tracked cluster
  (originally CL-STA-0043, promoted in May 2024 to the temporary
  group TGR-STA-0043, nicknamed "Operation Diplomatic Specter")
  to a named threat group, "Phantom Taurus" — a China-nexus actor
  whose "espionage operations align with People's Republic of China
  (PRC) state interests." Over roughly two and a half years it has
  conducted intelligence collection against ministries of foreign
  affairs, embassies, diplomats, and telecommunications networks
  across the Middle East, Africa, and Asia. Unit 42 disclosed the
  previously undocumented NET-STAR malware suite — a three-component
  .NET toolkit targeting Internet Information Services (IIS) web
  servers, comprising the fileless IIServerCore backdoor (operating
  in-memory inside the w3wp.exe worker process) plus the
  AssemblyExecuter V1/V2 in-memory .NET payload loaders (V2 adds
  AMSI/ETW bypass) — and described a shift from email-centric
  collection (Exchange) to direct SQL Server database targeting via
  a custom mssq.bat script that runs queries and exports results to CSV.
false_flag_risk: none
summary: |
  A newly named PRC-nexus threat group elevated from a long-running
  Unit 42 cluster, with diplomat / MFA targeting across the Middle
  East, Africa, and Asia. Unit 42 states Phantom Taurus uses shared
  Chinese-APT operational infrastructure "exclusively used by Chinese
  threat actors, including Iron Taurus (aka APT27), Starchy Taurus
  (aka Winnti) and Stately Taurus (aka Mustang Panda)," while its own
  components show "operational compartmentalization" within that
  ecosystem. Doctrinally significant because the shift from email to
  direct database collection represents a maturation in tradecraft:
  reading target tables directly on the underlying SQL Server store is
  harder to detect than mailbox-level (Exchange) access.
