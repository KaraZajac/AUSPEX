id: 2025-09/phantom-taurus-unit42-disclosure
name: Unit 42 discloses "Phantom Taurus" PRC cluster + NET-STAR backdoor suite
start_date: 2023-01-01  # Unit 42 traces activity back two-plus years
disclosure_date: 2025-09-30
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Palo Alto Networks Unit 42 elevated TGR-STA-00043 to a named
  threat group, "Phantom Taurus," a China-nexus actor that has
  conducted long-term intelligence collection against ministries
  of foreign affairs, embassies, diplomats, and telecom networks
  across the Middle East, Africa, and Asia. Unit 42 disclosed
  the previously undocumented NET-STAR malware suite — three
  IIS-targeting .NET web-shells supporting in-memory execution
  of arbitrary commands and .NET payloads — and described a
  shift from email-centric collection (Exchange) to direct
  SQL Server database targeting via a custom mssq.bat script.
false_flag_risk: none
summary: |
  A new PRC cluster designation with diplomat / MFA targeting
  in Belt-and-Road geographies — the operational profile mirrors
  APT15 / Mustang Panda. Doctrinally significant because the
  shift from email to database collection represents a maturation
  in tradecraft: collection by direct table reads on the underlying
  store is harder to detect than mailbox-level access.
