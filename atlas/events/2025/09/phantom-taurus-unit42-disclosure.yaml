    [a] FACTS — verified against the Unit 42 primary; corrected fabrications/imprecisions:
      • DESIGNATION FIXED: event said "TGR-STA-00043" (extra zero); the raw says
        "TGR-STA-0043" (4 hits) nicknamed "Operation Diplomatic Specter," promoted "In May
        2024," and originally tracked as "CL-STA-0043" (first article June 2023). Rewrote the
        cluster-lineage prose (CL-STA-0043 → TGR-STA-0043 → Phantom Taurus).
      • APT15 STRIPPED (fabrication): summary claimed "the operational profile mirrors APT15 /
        Mustang Panda." Fixed-string sweep for APT15 / Ke3chang / Vixen Panda / Nickel = 0
        hits in the raw. Unit 42 instead states Phantom Taurus "uses a shared Chinese APT
        operational infrastructure ... exclusively used by Chinese threat actors, including
        Iron Taurus (aka APT27), Starchy Taurus (aka Winnti) and Stately Taurus (aka Mustang
        Panda)," with "operational compartmentalization." Rewrote summary to the actual
        shared-infrastructure claim (APT27/Winnti/Mustang Panda), removing the APT15 mirror.
      • NET-STAR RE-CHARACTERIZED: event called it "three IIS-targeting .NET web-shells." The
        raw describes "a .NET malware suite designed to target Internet Information Services
        (IIS) web servers" with three components — IIServerCore ("a fileless modular backdoor"
        that "operates entirely in memory within the w3wp.exe IIS worker process"),
        AssemblyExecuter V1 ("loads and executes additional .NET payloads in memory") and
        AssemblyExecuter V2 (adds AMSI/ETW bypass). CyberScoop calls them "three distinct
        web-based backdoors." Rewrote to "three-component .NET toolkit" (IIServerCore backdoor
        + AssemblyExecuter V1/V2), not "web-shells."
      • VERIFIED unchanged: MFA/embassy/diplomat + telecom victimology across the Middle East,
        Africa, and Asia (Unit 42; "diplomats" carried verbatim by CyberScoop: "ministries of
        foreign affairs, embassies, diplomats and telecom networks in the Middle East, Africa
        and Asia"). Email→database shift VERIFIED: "a shift from this email-centric methodology
        to the direct targeting of databases," "a script named mssq.bat to connect to and
        collect data from a targeted database," which "Exports results to a CSV file."
        "primary objective is espionage" VERIFIED verbatim.
      • incident_type: dropped data-theft, added espionage → [intrusion, espionage]. Unit 42's
        own framing is "primary objective is espionage"; exfiltration (mssq.bat CSV export,
        email harvesting) is the collection means, so espionage is the precise type. intrusion
        retained. initial_vector kept "unknown" (raw is post-compromise-focused; web-shell/IIS/
        Exchange access implied via OutlookEN.aspx but never asserted — comment added).

    [b] ATTRIBUTION — Unit 42: "Phantom Taurus is a previously undocumented nation-state actor
      whose espionage operations align with People's Republic of China (PRC) state interests"
      and operations "align consistently with the People's Republic of China (PRC) economic and
      geopolitical interests." China-nexus / PRC-state-aligned. NO service named: fixed-string
      sweep = 0 hits for Ministry of State Security / MSS / People's Liberation Army / PLA /
      contractor. Per task hedge, REMOVED the prior attribution note's "implicit MSS by victim
      profile and tradecraft" as unsupported over-attestation. Confidence high (Unit 42 accrued
