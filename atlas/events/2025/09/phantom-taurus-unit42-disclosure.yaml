      service is named — a fixed-string sweep of the captured page returned
      zero hits for MSS / Ministry of State Security / PLA / People's
      Liberation Army / contractor. Named-actor, nation-level China nexus;
      no named unit; no government-side attribution. concur-with-caveat: no
      government attribution and no specific service named. Cluster not yet
      modeled as an AUSPEX actor — actor_id null pending creation of
      cn/unscoped/phantom-taurus (see qc FLAGS). The prior note's "implicit
      MSS by victim profile and tradecraft" was removed as unsupported
      over-attribution (Unit 42 stops at PRC alignment).
