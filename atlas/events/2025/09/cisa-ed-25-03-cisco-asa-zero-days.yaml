id: 2025-09/cisa-ed-25-03-cisco-asa-zero-days
name: CISA ED 25-03 — Cisco ASA / Firepower zero-days (CVE-2025-20333 / 20362) state-sponsored exploitation
start_date: 2025-09-01  # approximate exploitation observation window
disclosure_date: 2025-09-25
end_date: null
incident_type:
  - intrusion
  - espionage  # ArcaneDoor-connected cluster; Talos frames ArcaneDoor as espionage-focused ("government networks globally"). Dropped pre-positioning: it rested on the (removed) China / Volt-Typhoon inference, and CISA frames the tradecraft as persistence for continued access, not pre-positioning for disruption.
initial_vector: 0-day
outcome_summary: |
  CISA Emergency Directive 25-03 (25 September 2025) ordered
  Federal Civilian Executive Branch agencies to take immediate
  forensic and patching action on Cisco ASA / Firepower devices
  following an ongoing zero-day exploitation campaign by "an
  advanced threat actor" chaining CVE-2025-20333 (unauthenticated
  remote code execution) and CVE-2025-20362 (privilege escalation),
  and manipulating read-only memory (ROM) to persist through reboot
  and system upgrade. Agencies were required to perform core-dump
  collection and submit through CISA's Malware Next Gen portal by
  11:59 PM EDT 26 September 2025. ASA hardware reaching end-of-support
  on or before 30 September 2025 was ordered permanently disconnected
  by that date; hardware with an August 2026 end-of-support date was
  ordered patched by the 26 September deadline. Per the directive,
  "Cisco assesses that this campaign is connected to the ArcaneDoor
  activity identified in early 2024" — the UAT4356 / STORM-1849
  cluster Cisco Talos disclosed that April and assessed, with high
  confidence, to be a state-sponsored actor of no attributed nation.
false_flag_risk: none
summary: |
  ED 25-03 is one of the autumn-2025 wave of CISA emergency
  directives against actively-exploited enterprise edge appliances
  (followed twenty days later by ED 26-01 on the F5 BIG-IP breach),
  fitting the broader pattern of a capable, likely state-sponsored
  actor burning zero-days against perimeter network devices as a
  route into government networks. The directive's own text ties the
  campaign to the 2024 ArcaneDoor cluster (Cisco Talos: UAT4356 /
  STORM-1849), which Talos assessed with high confidence to be
  state-sponsored but attributed to no nation. AUSPEX therefore
  models the operator as an unattributed state-sponsored activity
  cluster (actor_id null), NOT a China / PRC-nexus actor: neither
  CISA, Cisco, nor Talos names a state, and MISP-galaxy records
  country None for both ArcaneDoor and STORM-1849.
attributions:
  - actor_id: null
    attributing_org: CISA (advanced threat actor) / Cisco (ArcaneDoor cluster)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-09-25
    attribution_source_id: cisa/2025-09-25_ed-25-03-cisco-asa
    notes: |
      ED 25-03 characterises the operator only as "an advanced threat
      actor" — the string "state-sponsored" does NOT appear anywhere in
      the directive — and states verbatim: "Cisco assesses that this
      campaign is connected to the ArcaneDoor activity identified in early
      2024." The ArcaneDoor cluster (UAT4356 / STORM-1849) was established
      by Cisco Talos in April 2024, which assessed "with high confidence
      that these actions were performed by a state-sponsored actor" but
      named NO nation. No cited source — CISA, Cisco, or Talos — attributes
      the cluster to the PRC / China or any state, and MISP-galaxy records
      country None for both ArcaneDoor and STORM-1849. Hence actor_id null +
      attribution_level activity-cluster, NOT a cn/ placement. The prior
      record's "PRC-attributed" / "PRC-nexus" claim, and its framing that
      CISA named UAT4356 or called the activity "state-sponsored", were
      unsourced over-attribution and have been removed — the same
      correction the census applied to the 2024 ArcaneDoor event.
doctrine_links: []  # Unattributed state-sponsored cluster — no nation is attested by any cited source (CISA: "advanced threat actor"; Talos: "state-sponsored", NO nation; MISP country None), so no state doctrine has a predicate. Removed the prior cn/intelligentized-warfare/pre-positioning link: it presupposed a China attribution no source makes, and its Volt/Salt-Typhoon "pre-positioning" reading is contradicted by the espionage (data-exfiltration) character of the ArcaneDoor cluster. Mirrors the 2024 ArcaneDoor event (also doctrine_links: []).
targets:
  # ED 25-03 protects US FCEB agencies; the connected ArcaneDoor cluster
  # (Talos) targeted "government networks globally". Removed sectors/ict/
  # networking (role primary): the Cisco ASA/Firepower appliance class is the
  # attack surface/vector, not a victim sector — sector inflation, per the
  # 2024 ArcaneDoor precedent (which likewise kept only sectors/government).
  - target_id: sectors/government/civilian
    country: us
    role: primary
sources:
  - cisa/2025-09-25_ed-25-03-cisco-asa
  - blogtalosintelligence/2024-04_cisco-talos-discloses-arcanedoor-uat4356  # ArcaneDoor cluster primary (UAT4356 / STORM-1849, "state-sponsored", NO nation) — carries the cluster identity CISA connects the 2025 campaign to
