id: 2025-09/cisa-ed-25-03-cisco-asa-zero-days
name: CISA ED 25-03 — Cisco ASA / Firepower zero-days (CVE-2025-20333 / 20362) state-sponsored exploitation
start_date: 2025-09-01  # approximate exploitation observation window
disclosure_date: 2025-09-25
end_date: null
incident_type:
  - intrusion
  - pre-positioning
initial_vector: 0-day
outcome_summary: |
  CISA Emergency Directive 25-03 ordered Federal Civilian
  Executive Branch agencies to take immediate forensic and
  patching action on Cisco ASA / Firepower devices following
  observed state-sponsored zero-day exploitation of
  CVE-2025-20333 (RCE) and CVE-2025-20362 (privilege escalation),
  plus medium-severity CVE-2025-20363. Agencies were required
  to perform core-dump collection and submit through CISA's
  Malware Next Gen portal by 11:59 PM EDT 26 September 2025.
  End-of-support ASA hardware (with an EOL date of 31 August
  2026) was ordered disconnected by the same deadline.
  The campaign was assessed by CISA to be the same UAT4356 /
  ArcaneDoor PRC-attributed cluster previously documented by
  Cisco Talos in April 2024.
false_flag_risk: none
summary: |
  ED 25-03 is the second of three F5-class emergency directives
  issued in autumn 2025 (preceding ED 26-01 on F5 by 20 days)
  and continues the pattern of state-aligned actors burning
  zero-days against enterprise edge appliances as a route into
  federal and CII networks. The ArcaneDoor cluster connection
  ties the campaign back into the broader PRC edge-appliance
  exploitation ecosystem alongside UNC5221 / BRICKSTORM.
attributions:
