name: "Gamaredon–Turla collaboration deploying Kazuar backdoor in Ukraine"
start_date: 2025-02-01   # corrected 2026-06-25 audit: operation onset is the first observed co-compromise (Feb 2025; Gamaredon PteroGraphin file ts 2025-01-20, Turla Kazuar v3 2025-02-11). Was 2025-09-01 (the disclosure month). See disclosure_date.
