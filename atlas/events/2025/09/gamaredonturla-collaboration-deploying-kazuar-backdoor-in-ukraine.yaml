false_flag_risk: none
summary: |
  ESET Research documented the first technical link between Gamaredon and Turla, two FSB-linked groups, in attacks on high-profile Ukrainian government and defense entities. In February 2025 ESET observed Gamaredon's PteroGraphin and PteroOdd tools used to restart Turla's Kazuar v3 backdoor on a compromised machine, and in April and June 2025 Kazuar v2 was deployed using Gamaredon's PteroOdd and PteroPaste. ESET assesses that Gamaredon provided Turla access to a small subset of its many compromised Ukrainian machines so Turla could operate its Kazuar backdoor on the most valuable targets.
