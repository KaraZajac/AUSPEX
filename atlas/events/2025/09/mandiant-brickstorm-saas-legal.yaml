id: 2025-09/mandiant-brickstorm-saas-legal
name: Mandiant BRICKSTORM — UNC5221 espionage into US legal, SaaS, BPO, tech sectors
start_date: 2024-04-01  # derived onset: 393-day mean dwell + Carmakal's "could have been there for a year and a half" (CyberScoop), back-projected from the March-2025 IR window. NOT a Mandiant-stated exact date — this Sept report gives no 2024 date (0 hits); the specific April-2024 implantation figure comes from the later CISA MAR AR25-338A (Dec 2025), not here. See qc.notes.
disclosure_date: 2025-09-24
end_date: null
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Google Threat Intelligence Group / Mandiant publicly disclosed
  a sustained, suspected China-nexus espionage campaign delivering
  the Go-based BRICKSTORM backdoor against US legal-services firms,
  Software-as-a-Service providers, Business Process Outsourcers,
  and technology companies. Mean dwell time across investigated
  intrusions was 393 days; the malware targets edge appliances
  and virtualization infrastructure (VMware vCenter, network
  appliances) lacking traditional EDR coverage. Mandiant assesses
  SaaS-provider compromise is intended to gain access to
  downstream customer environments; legal-sector targeting maps
  to US national-security and international-trade collection.
false_flag_risk: none
summary: |
  BRICKSTORM is among the most consequential suspected-PRC
  espionage backdoor families in the 2025 corpus — GTIG called
  its operators a "next-level threat" and the "most prevalent"
  China-centered threat group. A Golang backdoor (Mandiant states
  Go only; no Rust in this report — Rust variants surface later in
  the Dec-2025 CISA MAR) with SOCKS-proxy capability and deliberate
  targeting of appliance / hypervisor layers where EDR doesn't
  reach. The 393-day average dwell (~400 per CyberScoop) dwarfs the
  industry-typical dwell measured in days or weeks. Attributed by
  Mandiant to UNC5221 and closely related, suspected China-nexus
  clusters; GTIG explicitly does NOT equate UNC5221 with Silk
  Typhoon or Volt Typhoon. The later, distinct December 2025
  CISA/NSA/Canadian CCCS joint advisory (2025-12 event) names both
  UNC5221 and UNC3886.
attributions:
  - actor_id: cn/unscoped/warp-panda  # consolidated 2026-07-05 (Kara): VerdantBamboo==WARP-PANDA==UNC5221 per Volexity 2026-06
    attributing_org: Google Threat Intelligence Group / Mandiant
    attributing_org_confidence: high
    attribution_level: named-actor   # Mandiant names UNC5221 (a named China-nexus cluster) + "suspected China-nexus"; no Chinese service/unit named -> named-actor, not named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-09-24
    attribution_source_id: mandiant/2025-09-24_brickstorm-espionage
    notes: |
      Mandiant attributes to "UNC5221 and closely related,
      suspected China-nexus threat clusters" — consolidated in
      AUSPEX to cn/unscoped/warp-panda (WARP PANDA == UNC5221 ==
      VerdantBamboo, Kara-approved 2026-07-05). Caveat: the nexus
      is SUSPECTED, not confirmed, and NO Chinese service is named
      — CyberScoop: the researchers "declined to comment on
      possible Chinese government agency connections," and GTIG
      explicitly does not consider UNC5221 to be the same as Silk
      Typhoon or Volt Typhoon. Hence cn/unscoped (the actor was
      deliberately demoted from cn/mss on 2026-06-24 for exactly
      this no-service-named reason); no MSS assertion is warranted.
