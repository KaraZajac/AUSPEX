    [a] FACTS — mostly confirmed; one fabrication stripped.
      CONFIRMED (Mandiant primary): "Since March 2025, Mandiant Consulting has responded to
      intrusions ... most notably legal services, Software as a Service (SaaS) providers,
      Business Process Outsourcers (BPOs), and Technology"; "remain undetected ... for 393 days,
      on average" (x2); BRICKSTORM "written in Go" + "includes SOCKS proxy functionality";
      "appliance platforms that do not support traditional EDR"; "consistently targets VMware
      vCenter and ESXi hosts"; SaaS objective "to gain access to downstream customer environments"
      (stated at "high confidence"); legal targeting "primarily to gather information related to
      US national security and international trade"; tech targeting for "theft of valuable IP to
      further the development of zero-day exploits". CyberScoop corroborates ("~400" days dwell vs
      "days or weeks"; "next-level threat"; "most prevalent" China group). The Record corroborates
      ("China-linked", legal/SaaS/tech, PRC economic+espionage interests, Ivanti Connect Secure
      0-day).
      STRIPPED (fabrication / anachronism): "Go/Rust backdoor" + "Golang/Rust polyglot" -> Go ONLY.
      The Mandiant report has ZERO "Rust" (the single grep hit was "T-rust-ed Platform Module") and
      ZERO "polyglot". Rust BRICKSTORM variants are a LATER development first noted in the 19-Dec-2025
      CISA MAR AR25-338A update, not this Sept report -> anachronistic here. Also softened two
      unsourced editorial superlatives: "single most consequential PRC backdoor family" -> measured,
      source-anchored wording; "operational tier above anything except long-tail Volt Typhoon" ->
      the source's own comparison ("dwell times more commonly measured in days or weeks"), since the
      cited sources explicitly say UNC5221 is NOT Volt Typhoon.
    [b] ATTRIBUTION — over-attestation removed. Mandiant: "We attribute this activity to UNC5221 and
      closely related, suspected China-nexus threat clusters" (note SUSPECTED). CyberScoop: the
      researchers "declined to comment on possible Chinese government agency connections". Both
      Mandiant + The Record: GTIG "does not currently consider" UNC5221 to be the same as Silk
      Typhoon / Volt Typhoon. -> Removed the stale/contradictory notes ("null actor_id pending" while
      actor_id was set; "service_id is implicitly MSS by Mandiant's framing" — a firmer service than
      any source states, and directly contra the canonical actor record which was demoted cn/mss ->
      cn/unscoped on 2026-06-24 precisely because no source names a service). attributing_org_confidence
      high (firm UNC5221 attribution) + auspex_assessment concur-with-caveat HELD. Zero "Ministry of
      State Security"/"MSS" in any source.
    [c] DATES — disclosure_date 2025-09-24 confirmed on all three bylines (Mandiant "September 24, 2025";
      The Record "September 24th, 2025"; CyberScoop "September 24, 2025") -> source published_on all
      correct. start_date 2024-04-01 comment corrected: this Sept report states NO 2024 date (0 hits);
      the value is a back-projection from the 393-day mean dwell + Carmakal's "could have been there for
      a year and a half" (CyberScoop), consistent with (but not sourced to) the April-2024 implantation
      the later CISA MAR documents. Kept the date, relabeled the basis.
    [d] DOCTRINE_LINKS — de-attested from 3 links to 1. REMOVED cn/national-intelligence-law-2017/
      compelled-vendor-cooperation (category error: that pillar is legal compulsion of PRC-domiciled
      vendors per NIL Art.7/14; BRICKSTORM is offensive compromise of US/foreign SaaS — and its old
      reasoning invoked an "MSS contractor model" no source states). REMOVED cn/intelligentized-warfare/
      sigint-c4isr-collection (pillar = Salt-Typhoon telecom-carrier SIGINT/CALEA; parent doctrine =
      PLA warfighting — neither matches legal/SaaS/tech espionage; it also carried an unwarranted
      attesting_source_id implying attestation). KEPT cn/mic2025 but moved pillar next-gen-it -> null
      (cross-sector; next-gen-IT is narrowly semiconductors/AI/5G) and reworded to flag AUSPEX sector-fit
      inference, not a source-stated industrial-policy goal; HELD at plausible (Mandiant's "IP ... to
      further development of zero-day exploits" supports it, but political/strategic espionage is an
      equally live reading). No source states any doctrine's terminal goal verbatim -> nothing rises to
      attested.
    [e] ATTRIBUTION_LEVEL — was absent; added named-actor (Mandiant names UNC5221, a named China-nexus
      cluster; nexus suspected; no service/unit named), matching the 2025-12 warp-panda sibling.
    [f] ACTOR_ID — cn/unscoped/warp-panda resolves (atlas/actors/cn/warp-panda.yaml, id: cn/unscoped/
      warp-panda; aliases UNC5221 [equivalent, Mandiant/GTIG] + VerdantBamboo + "BRICKSTORM cluster").
