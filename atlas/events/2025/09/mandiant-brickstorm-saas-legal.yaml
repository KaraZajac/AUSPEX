id: 2025-09/mandiant-brickstorm-saas-legal
name: Mandiant BRICKSTORM — UNC5221 espionage into US legal, SaaS, BPO, tech sectors
start_date: 2024-04-01  # Mandiant-stated earliest persistence at one victim
disclosure_date: 2025-09-24
end_date: null
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Google Threat Intelligence Group / Mandiant publicly disclosed
  a sustained China-nexus espionage campaign delivering the
  BRICKSTORM Go/Rust backdoor against US legal-services firms,
  Software-as-a-Service providers, Business Process Outsourcers,
  and technology companies. Mean dwell time across investigated
  intrusions was 393 days; the malware targets edge appliances
  and virtualization infrastructure (VMware vCenter, network
  appliances) lacking traditional EDR coverage. Mandiant assesses
  SaaS-provider compromise is intended to gain access to
  downstream customer environments; legal-sector targeting maps
  to US national-security and international-trade collection.
false_flag_risk: none
summary: |
  BRICKSTORM is now the single most consequential PRC backdoor
  family in the AUSPEX 2025 corpus: Golang/Rust polyglot, SOCKS
  proxy capability, deliberate targeting of appliance / hypervisor
  layers where EDR doesn't reach. The 393-day average dwell time
  represents an operational tier above anything except long-tail
  Volt Typhoon. Attributed by Mandiant to UNC5221 and closely
  related clusters; the same activity overlaps with UNC3886 in
  the December 2025 CISA/NSA/Canadian CCCS joint advisory.
