initial_vector: n-a
outcome_summary: |
  Establishment of ANSSI (Agence nationale de la sécurité des
  systèmes d'information) by decree 2009-834 of 7 July 2009.
  ANSSI is created as the national authority for the security
  of information systems, reporting to the SGDSN under the Prime
  Minister, with a strictly defensive mandate.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Institutional anchor of French defensive cyber doctrine (LID).
  ANSSI's establishment formalized the structural separation
  between defensive cyber (ANSSI, civilian / SGDSN side) and
  offensive cyber (DGSE / military side) that subsequent
  doctrine documents would codify.
