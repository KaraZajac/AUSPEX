notes: |
  Institutional / policy anchor (not an attack), so no attacker/victim/
  attribution. ANSSI succeeded the DCSSI (Direction centrale de la sécurité
  des systèmes d'information; DCSSI had in 2001 replaced the SCSSI) — verified
  but not load-bearing here. The authoritative establishing text is décret
  n° 2009-834 du 7 juillet 2009 « portant création d'un service à compétence
  nationale dénommé "Agence nationale de la sécurité des systèmes
  d'information" » (Légifrance JORFTEXT000020828212; signed 7 Jul 2009, JORF
  publication 8 Jul 2009). start_date = decree signature date (7 Jul 2009).
