id: 2009-07/operation-troy
name: Operation Troy (Independence Day DDoS)
start_date: 2009-07-04
disclosure_date: 2009-07-04
end_date: 2009-07-09
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  Sustained DDoS attack via the Mydoom/Dozer-based botnet against
  approximately 40 US and South Korean government, financial,
  and news websites over Independence Day weekend — including
  the White House, US Treasury, DHS, and the Korean Presidential
  Blue House. No destructive impact; first publicly attributed
  DPRK cyber operation.
quantified_impact:
  affected_targets: 40
false_flag_risk: none
summary: |
  Foundational DPRK cyber operation in the public record. ROK
  NIS attribution; later corroborated by McAfee's multi-year
  "Operation Troy" research that tied Troy, Ten Days of Rain
  (2011), and DarkSeoul (2013) into a single campaign family
  attributed to Lazarus precursors.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: ROK NIS / McAfee
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2013-07-09
    attribution_source_id: mcafee/2013-07-09_operation-troy
doctrine_links:
  - doctrine_id: kp/songun
    pillar_id: kp/songun/military-intel-cyber
    program_id: null
    confidence: plausible
    reasoning: |
      Sits in the Songun-era institutional buildup window. RGB
      demonstrating asymmetric capability under military-first
      ideology; target mix (US-ROK government and financial
      sites) consistent with regime political-signaling rather
      than financial extraction. Doctrine alignment is plausible
      rather than attested because no DPRK or US attestation
      explicitly invokes Songun for this operation.
    attesting_source_id: null
    counter_explanation: |
      Could also be tagged to Juche asymmetric-independence
      framing; the two are overlapping at this period.
    contested: false
    analyst: claude
  - doctrine_id: kp/juche
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Juche asymmetric-independence framing for cyber capability
      demonstrations against perceived imperialist adversaries.
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government/civilian
    role: primary
  - target_id: sectors/finance/banking
    role: primary
  - target_id: sectors/media/journalism
    role: primary
