    and explicitly "did not go as far to point fingers at any
    country." The hard DPRK attribution is ROK NIS's (2009-10-30),
    which is NOT separately cited here. actor_id kp/rgb/lazarus is
    the later community consensus (CISA/Treasury-2019/MITRE
    G0032/Mandiant fold Troy into the Lazarus/RGB umbrella) and is
    supported in the ACTOR record's own cited sources, not this
