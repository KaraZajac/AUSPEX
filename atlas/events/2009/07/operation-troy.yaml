    -consensus caveat in the attribution notes. attributing_org
    "ROK NIS / McAfee" retained (both made attributions of record);
    confidence high retained (rests on the retrospective consensus,
    not on the cited secondary alone).
    DOCTRINE LINKS ✓ unchanged: kp/songun (plausible) and kp/juche
    (plausible) both correctly NOT attested (no source names Songun
