qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: partial
  notes: |
    FACTS ✓ (all corroborated by contemporaneous + secondary
    reporting; the cited McAfee 2013 PDF is bot-blocked and
    archive.org is off-limits for this audit, so verified
    indirectly). Dates: waves 2009-07-04 (US+ROK), 07-07 (ROK),
    07-09 (ROK) → start_date 2009-07-04 / end_date 2009-07-09 ✓.
    Affected ~40 sites ✓ ("at least 39" per investigation;
    quantified_impact.affected_targets: 40 kept as round estimate).
    Targets ✓: contemporaneous reporting (Washington Technology,
    2009) confirms the US set "the White House; the State,
    Transportation, Defense, Treasury, and Homeland Security
    departments; the National Security Agency; the Secret Service;
    and the Federal Trade Commission" — so the summary's "White
    House, US Treasury, DHS" is accurate (a different/overlapping
    subset from Wikipedia's White House/Pentagon/NYSE/NASDAQ);
    ROK Blue House + defense/public-admin ministries + NIS +
    National Assembly + Shinhan Bank confirmed. Malware ✓:
    Trojan.Dozer / W32.Dozer dropper re-using MyDoom code.
    Sector targets (government/civilian, finance/banking,
    media/journalism) match the govt+financial+news mix; all FKs
    resolve.
    ATTRIBUTION — CORRECTED. Added attribution_level: named-actor
    and a notes field documenting that the SINGLE cited source
    (McAfee) does NOT name a nation or DPRK service: it labels the
    actor the "NewRomanic Cyber Army Team," assesses ~95% likely
