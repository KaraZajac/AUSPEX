  verified_on: 2026-07-05
  level: full
  notes: |
    PHANTOM-REMEDIATION (RE-SOURCE path). The event is real and well
    documented, but BOTH cited sources were unusable: fdd/2009_iran-cyber-army
    was an admitted "composite citation" with url:null whose own notes
    record that "no single 2009-dated FDD brief was recovered" (phantom);
    nyt/2009-12-18_twitter-iran-hijack had url:null (Bits-blog permalink
    404, no Wayback snapshot). Both were cited ONLY by this event — I
    dropped both from sources[] and annotated their records as orphaned.
    Re-sourced to five live, snapshotted contemporary reports (all HTTP 200,
    sha256 captured):
      - theregister/2009-12-18_dns-attack-hijacks-twitter  (d9da30d4...9874a87d, 155165 B)
      - techcrunch/2009-12-17_twitter-hacked-defaced-iranian-cyber-army  (373fda52...81a2bf17, 235120 B)
      - techcrunch/2009-12-18_anatomy-of-the-twitter-attack-part-2  (2c048514...d68cb1e7, 227432 B)
      - forbes/2010-01-13_baidu-hijacked-by-cyber-army  (f438e97c...d5aee132, 1252369 B)
      - domainnamewire/2010-02-24_how-baidu-got-hacked-iranian-cyber-army  (059f87ba...93cb51f1, 173600 B)

    [a] FACTS — all now source-carried. Twitter hijack 2009-12-18, "Iranian
    Cyber Army" self-claim, defacement verbatim ("THIS SITE HAS BEEN HACKED
    BY IRANIAN CYBER ARMY" / "...We Control And Manage Internet By Our Power"
    / embargo taunt / iRANiAN.CYBER.ARMY@GMAIL.COM) and the retaliation-for-
    Green-Movement framing = TechCrunch part I. DNS vector (Dyn account,
    "the account password recovery feature was used to reset the password for
    the Twitter account at Dyn," repoint to a Tor-network IP, ~1 hour) =
    TechCrunch part II. Hacktivism-not-state framing = The Register. Baidu
    2010-01-12 hijack, redirect to a Netherlands server, "unclear whether the
    hackers have any relationship with Iran" = Forbes. Baidu vector (Register.com
    social-engineering, email->antiwahabi2008@gmail.com, forgot-password takeover,
    nameserver change) = Domain Name Wire (from Baidu v. Register.com).
    CORRECTIONS: (1) "compromise of registrar Dyn's authoritative records" ->
    account takeover of Twitter's DNS account at managed-DNS provider Dyn via
    password-recovery (Dyn was the DNS host, not the registrar; the vector was
    account/email-recovery abuse, "not a direct vulnerability with the DNS
    server"). (2) STRUCK the embellishment "pro-IRGC and anti-US/anti-Israel
    messaging" -> the sourced defacement text is anti-US only (no anti-Israel,
    no pro-IRGC wording appears in any snapshot). (3) STRUCK the unsourced
    narrative that the ICA is "the operational predecessor to the Ashiyane
    Digital Security Team and the Mabna Institute contractor ecosystem" and
    "IRGC-tasked via Ashiyane/Mabna" — that rested entirely on the phantom FDD
    composite and is not carried by any recovered source. (4) Added the Baidu
    Register.com vector (distinct from the Twitter Dyn vector; the previous
    "near-identical" conflation is corrected).

    [b] ATTRIBUTION — DOWNGRADED. Was attributing_org "Iran-diaspora press + FDD
    analysis" / confidence moderate / concur-with-caveat, pointing at the phantom
    FDD source. No govt or tier-1 vendor attributed the 2009-2010 ops to Iran or
    the IRGC; the persona is self-labeled. Set attributing_org to the self-claim +
    "no external state attribution," confidence LOW, auspex_assessment CONTESTED,
    attribution_source_id -> theregister (which explicitly frames it as hacktivism).
    Kept actor_id null (task steer + no atlas slug for the early ICA cluster).

    [c] DATES — start/disclosure 2009-12-18 (Twitter; TechCrunch part I dated
    2009-12-17 22:12 PST = 2009-12-18 UTC — consistent), end_date 2010-01-12
    (Baidu, the last op in the two-incident cluster). Each new source's
    published_on set to its real publication date (2009-12-17, 2009-12-18 x2,
    2010-01-13, 2010-02-24) — no campaign/publication conflation.

    [d] DOCTRINE_LINKS — DE-OVER-ATTESTED. (1) ir/cyber-deniable-retaliation/
    persona-laundering DOWNGRADED strongly_inferred -> plausible: the actor's very
    state nexus is unproven and contemporary sources supply a serious competing
    (non-state hacktivist/criminal) reading, so more than one strategic reading
    survives; added inference_basis.alternatives. attesting_source_id stays null
    (plausible needs none). (2) DROPPED the second link ir/asymmetric-warfare/
    cost-deniability-leverage — it rested on the same unproven Iranian-state
    premise and doubled the state framing on a contested-attribution event
    (over-representation). Neither link is attested; no attesting source is
    claimed. [flagged in report for orchestrator/Kara in case reinstatement is wanted.]

    [e] ATTRIBUTION_LEVEL — set to activity-cluster (was absent). Sources name a
    self-labeled persona/cluster only; no authority establishes a nation or unit.

    [f] ACTOR_ID — null; confirmed no atlas actor resolves to the ICA cluster
    (grep of atlas/actors). FLAG: if the corpus later wants to model the ICA,
    given the contested/criminal-botnet evidence the honest placement is a
    persona-level cluster (criminal/ or ir/unscoped/), NOT an IRGC unit. Not
    created here (actor files are out of audit scope).

    RESIDUAL UNCERTAINTY: the Iran/IRGC nexus is genuinely open — retrospective
    think-tank framing exists but was not recoverable as a verifiable primary
    source (the FDD composite is a phantom). false_flag_risk kept "suspected"
    to reflect that the self-chosen Iranian branding may not reflect true origin.
    orgs/twitter + orgs/baidu have no target-registry files, but that is the
    corpus-wide soft convention (223 of 336 referenced orgs lack files; validate.ts
    only counts them) — not a dangling-FK failure and left as-is.
