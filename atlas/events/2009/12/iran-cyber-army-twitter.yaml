id: 2009-12/iran-cyber-army-twitter
name: Iran Cyber Army DNS hijacks of Twitter & Baidu
start_date: 2009-12-18
disclosure_date: 2009-12-18
end_date: 2010-01-12
incident_type:
  - disruption
  - influence-operation
initial_vector: valid-creds  # registrar credential compromise
outcome_summary: |
  An actor self-identified as the "Iranian Cyber Army" (ICA)
  hijacked Twitter's DNS through compromise of registrar Dyn's
  authoritative records on 2009-12-18, redirecting twitter.com
  to a defacement page bearing pro-IRGC and anti-US/anti-Israel
  messaging. A near-identical Baidu DNS hijack followed on
  2010-01-12. Both incidents occurred in the Green Movement
  post-election aftermath, during which Twitter had become a
  significant coordination platform for Iranian opposition
  protests.
false_flag_risk: suspected
summary: |
  The ICA is the canonical first publicly visible IRGC-aligned
  cyber persona — the operational predecessor to the Ashiyane
  Digital Security Team and the Mabna Institute contractor
  ecosystem that the 2018 DOJ Mabna indictment later exposed.
  Subsequent reporting (Iranian-diaspora press, FDD) framed the
  ICA as IRGC-tasked but operating through the deniable-
  contractor model that became the standard Iranian cyber
  operational form. The Twitter hijack inaugurated the
  retaliation-against-information-platform pattern that
  recurred through Operation Ababil (2012) and Sands Casino
  (2014).
attributions:
  - actor_id: null
    attributing_org: Iran-diaspora press + FDD analysis
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2010-01-01
    attribution_source_id: fdd/2009_iran-cyber-army
    notes: |
      No US-government attribution; analyst attribution to IRGC
      tasking via Ashiyane / Mabna contractor structure rests
      on subsequent reporting (Bumgarner, FDD, 2018 Mabna
      indictment). No actor slug in this atlas cleanly resolves
      to the early ICA cluster.
