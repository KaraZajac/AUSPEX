id: 2009-12/iran-cyber-army-twitter
name: Iranian Cyber Army DNS-hijack defacements of Twitter and Baidu
start_date: 2009-12-18
disclosure_date: 2009-12-18
end_date: 2010-01-12
incident_type:
  - disruption
  - influence-operation
initial_vector: valid-creds  # account takeover of the DNS-management account (Twitter: Dyn account via password-recovery; Baidu: Register.com via social engineering)
outcome_summary: |
  A previously unknown group self-identifying as the "Iranian
  Cyber Army" (ICA) hijacked twitter.com's DNS on 2009-12-18 by
  taking over Twitter's account at its managed-DNS provider Dyn
  (through the password-recovery feature) and repointing the
  domain to a defacement page hosted on a Tor-network address. The
  page read "THIS SITE HAS BEEN HACKED BY IRANIAN CYBER ARMY" with
  anti-US messaging ("...We Control And Manage Internet By Our
  Power" and a taunt about the US sanctions/embargo list) and the
  contact iRANiAN.CYBER.ARMY@GMAIL.COM; Twitter's main site was
  redirected for roughly an hour. On 2010-01-12 the same persona
  hijacked China's Baidu with a near-identical DNS-hijack
  defacement, achieved by socially engineering Baidu's US domain
  registrar Register.com into changing the account email and
  resetting the password, redirecting baidu.com to a server in the
  Netherlands. Contemporary reporting tied the two incidents to the
  same "Iranian Cyber Army" group but did not establish any
  Iranian-state or IRGC direction.
false_flag_risk: suspected
summary: |
  The Twitter hijack was the first high-visibility appearance of
  the "Iranian Cyber Army" persona, occurring in the aftermath of
  the 2009 Green Movement post-election protests, during which
  Twitter had become a coordination platform for the Iranian
  opposition and the US State Department had asked Twitter to delay
  maintenance to keep it available. The defacement framed the
  operation as retaliation against a US-linked information platform.
  Attribution beyond the self-chosen Iranian-themed persona is
  contested and unproven: contemporary reporting (The Register)
  read the incident as hacktivism rather than state-sponsored
  activity; Forbes noted it was "unclear whether the hackers have
  any relationship with Iran"; and later research (Seculert, 2010)
  found the same actor running a for-rent botnet distributing Zeus
  and Gozi, pointing at least partly to criminal motivation.
  Retrospective analyst commentary has suggested a possible
  IRGC-proxy relationship, but direct state control has never been
  established for the 2009-2010 operations, and the "Iranian Cyber
  Army" label has since been applied inconsistently to multiple
  unrelated actors.
attributions:
  - actor_id: null
    attributing_org: 'Self-identified persona ("Iranian Cyber Army"); no external state attribution'
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: contested
    attribution_date: 2009-12-18
    attribution_source_id: theregister/2009-12-18_dns-attack-hijacks-twitter
    notes: |
      No government or tier-1 vendor attributed these 2009-2010
      operations to the Iranian state or the IRGC. The group named
      ITSELF the "Iranian Cyber Army" on the defacement pages, so
      the Iranian-themed branding is self-chosen. The Register
      framed it as hacktivism; Forbes reported it "unclear whether
      the hackers have any relationship with Iran"; later reporting
      (Seculert via CSO, 2010-10) found the same operator running a
      criminal for-rent botnet (Zeus/Gozi). Analyst speculation of
      an IRGC-proxy nexus is retrospective and unproven — hence
      actor_id null and attribution_level activity-cluster (a
      self-labeled cluster, no confirmed nation or service). No
      actor slug in this atlas resolves to the early ICA cluster.
doctrine_links:
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: plausible
    reasoning: |
      IF the "Iranian Cyber Army" is an Iran-aligned front (the
      mainstream retrospective reading), a self-labeled deniable
      hacker-collective persona defacing a US information platform
      in retaliation for its Green-Movement role is the archetype of
      the persona-laundering pillar. The label is only plausible —
      not higher — because the actor's state nexus is itself
      unproven: contemporary reporting read the hijack as hacktivism,
      any Iran link was called "unclear," and the same operator was
      later found running a criminal botnet, so an independent
      non-state persona survives as a competing reading.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "State-proxy persona-laundering: if the ICA is IRGC-aligned, the deniable hacker-collective front retaliating against a US information platform is the prototype of the persona-laundering pillar (the reading FDD and later analysts advance retrospectively)."
        - "Independent hacktivism or cybercrime: The Register read the hijack as hacktivism, Forbes called any Iran link unclear, and Seculert later found the same operator running a for-rent Zeus/Gozi botnet, so a non-state persona pursuing notoriety or profit (no state doctrine) survives as a serious competing reading."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/twitter
    country: us
    role: primary
    outcome: |
      twitter.com DNS hijacked on 2009-12-18 via takeover of
      Twitter's account at managed-DNS provider Dyn (password-
      recovery abuse); the domain was repointed to a Tor-hosted
      defacement page for roughly an hour.
  - target_id: orgs/baidu
    country: cn
    role: primary
    outcome: |
      baidu.com DNS hijacked on 2010-01-12 by socially engineering
      US registrar Register.com into changing the account email and
      resetting the password; baidu.com was redirected to a server
      in the Netherlands and defaced with the same ICA message.
