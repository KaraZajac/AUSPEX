qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited vs Symantec "The Elderwood Project" (2012, raw PDF on disk,
    sha256 5e255c16…78c7) and Wikipedia "Operation Aurora" (raw HTML,
    sha256 45155086…2d931). Both sources fully fetchable (snapshots
    captured in the 2026-06-24 actor-demotion pass; hashes re-verified).
    FACTS OK: Google disclosure 12 Jan 2010; attacks began mid-2009
    through Dec 2009; IE zero-day (MS10-002 / CVE-2010-0249, MS knew since
    Sep 2009); Hydraq/Aurora trojan; spear-phishing + watering-hole;
    source-code repos the primary objective (McAfee); Chinese-activist
    Gmail targeting (Google/FT-AiWeiwei); Adobe/Juniper/Akamai/Rackspace
    publicly confirmed victims. ATTRIBUTION: cited sources reach
    named-actor/single-group (Symantec "Elderwood" gang; McAfee named the
    op; Wikipedia records "APT17"/"Beijing Group"); China nexus high-conf
    but NO Chinese SERVICE named and Symantec hedges on statehood — actor
    correctly cn/unscoped/apt17 (demoted 2026-06-24). CORRECTIONS:
    (1) summary over-attributed Symantec — it claimed Elderwood = "shared
    PRC supplier feeding multiple MSS-aligned clusters"; Symantec actually
    says a SINGLE gang re-using an attack PLATFORM (toolset), names no
    service, hedges on statehood — rewritten to source. (2) Removed
    "Mandiant" from attributing_org (unsupported by cited sources for the
    Aurora/Elderwood naming). (3) Added attribution_level: named-actor +
    attribution notes. (4) Created the missing orgs/adobe target registry
    entry (dangling FK — Adobe is a source-confirmed primary victim).
    (5) Tightened outcome_summary victim list / ">20 vs >34 companies" to
    match sources; softened McAfee-naming wording. (6) Added inference_basis
    to both doctrine_links and set the dissident link's attesting_source_id
    to the supporting Wikipedia source; both links honestly held at
    strongly_inferred / plausible (op pre-dates both the 2017 Intel Law and
    MIC2025, so neither can be attested). NOTE: end_date 2010-01-31 retained
    though C2 was deactivated ~4 Jan 2010 (attacks reportedly continued into
    Feb 2010 per Dark Reading) — within the disclosure-month window, not
    contradicted. CVE-2010-0249 kept as the universally-accepted identifier
    for the Aurora IE flaw though the bare CVE string is not verbatim in
    either source (the flaw itself is fully attested).
