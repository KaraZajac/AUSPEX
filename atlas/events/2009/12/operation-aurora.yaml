id: 2009-12/operation-aurora
name: Operation Aurora
start_date: 2009-06-01
disclosure_date: 2010-01-12
end_date: 2010-01-31
incident_type:
  - intrusion
  - data-theft
initial_vector: 0-day
outcome_summary: |
  IE zero-day (CVE-2010-0249) exploited via spear-phishing and
  watering-hole compromises to deliver the Hydraq / Aurora trojan
  against Google, Adobe, Juniper, Rackspace, and ~30 other tech
  and defense firms. Source-code theft confirmed; access to
  Chinese-dissident Gmail accounts established. Google subsequently
  withdrew its mainland search engine.
false_flag_risk: none
summary: |
  Public disclosure by Google on 12 January 2010. McAfee subsequently
  named "Operation Aurora" after a debug-symbol path found in the
  malware. Considered the watershed moment for Western recognition
  of PRC state-sponsored cyber espionage at industrial scale.
  Operators leveraged a then-zero-day in Microsoft Internet Explorer
  (CVE-2010-0249) delivered via spear-phishing and watering-hole
  compromises, dropping the Hydraq / Trojan.Hydraq backdoor (also
  tracked as the Aurora trojan) to establish persistent remote
  access. Symantec's later Elderwood reporting attributed the
  zero-day pipeline to a shared PRC supplier ("Elderwood Platform")
  feeding multiple MSS-aligned clusters; source-code repositories
  at the victim firms were the primary collection objective, with
  Chinese-dissident Gmail accounts accessed as a parallel goal.
