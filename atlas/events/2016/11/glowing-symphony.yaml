id: 2016-11/glowing-symphony
name: Operation Glowing Symphony (counter-ISIS)
start_date: 2016-11-10  # "date of authorization, November 10, 2016" per NSArchive after-action
disclosure_date: 2019-09-26  # NPR Temple-Raston "How The U.S. Hacked ISIS"
end_date: null  # counter-ISIS campaign continued past the assessed window
incident_type:
  - disruption  # US OFFENSIVE cyber op degrading ISIS media/propaganda infrastructure (cf. sibling 2018-10/ira-disruption, typed [disruption] though it too hit an influence op)
initial_vector: valid-creds  # credential/account compromise ("cracking a password", account/email access) per NPR
outcome_summary: |
  Significant degradation of ISIS's online propaganda apparatus.
  Per NPR: Amaq Agency's mobile app "vanished" and ISIS's flagship
  magazine Dabiq "started missing deadlines and eventually folded";
  operators took down "every account, every IP, every domain, every
  financial account, every email account." The FOIA-declassified
  USCYBERCOM after-action calls the operation a "watershed moment
  for USCYBERCOM" that "imposed time and resource costs on Islamic
  State propaganda." NSArchive: "the first time the US Government has
  officially acknowledged offensive cyber operations" — the
  declassified 30-day and 120-day assessments are a key transparency
  document.
false_flag_risk: none
summary: |
  US CYBERCOM / Joint Task Force ARES (JTF-ARES) OFFENSIVE cyber
  operation against ISIS's media and propaganda infrastructure — one
  of "the largest and longest offensive cyber operations in U.S.
  military history" (NPR). Authorized 10 November 2016; the 120-day
  assessment is dated 12 April 2017 and the counter-ISIS mission
  continued (NSArchive after-action). JTF-ARES was stood up in 2016:
  NPR names Gen. Edward Cardon as "the first commander of Task Force
  ARES", and the NSArchive after-action identifies Gen. Paul Nakasone
  (Director NSA / Commander USCYBERCOM) as "original commander of
  JTF-ARES", who led Glowing Symphony. Tradecraft per NPR:
  credential/account compromise ("cracking a password"), then taking
  down ISIS accounts, IPs, domains, email and financial accounts and
  hosting, and dropping back doors / malware on servers. The op
  "specifically targeted ISIS use of social media and internet
  propaganda" (NSArchive). The January 2020 NSArchive release of the
  FOIA-declassified after-action assessments is the primary
  documentary source.
attributions:
  - actor_id: us/cybercom/jtf-ares-actor
    attributing_org: USCYBERCOM / DoD (FOIA-declassified JTF-ARES after-action assessments; NSA/CYBERCOM officials on record in NPR 2019)
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2020-01-21  # cited source's FOIA-declassified release; first put on the record earlier (NPR 2019-09-26)
    attribution_source_id: nsarchive/2020-01-21_glowing-symphony-after-actions
    notes: |
      Officially acknowledged. NSArchive: "These documents represent
      the first time the US Government has officially acknowledged
      offensive cyber operations." Attribution-source kind:
      `officially-acknowledged` + FOIA-declassified. named-unit — the
      after-action names USCYBERCOM and JTF-ARES as the conductors
      throughout, and identifies Nakasone as "Director of the NSA,
      Commander of USCYBERCOM, and original commander of JTF-ARES."
      attribution_date set to the cited source's release (2020-01-21);
      the operation was first put on the record earlier via NPR
      (2019-09-26, Nakasone on record) and referred to by DoD
      leadership (SecDef Carter, Mattis) in 2016-17 — but no
      Carter/Mattis primary source is cited or snapshotted here
      (external reporting only), so the prior attribution_date of
      2016-12-13 (unsourced) was removed.
doctrine_links:
  - doctrine_id: us/persistent-engagement
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale  # US is the conducting/acting party — this is the attacker's doctrine
    reasoning: |
      Glowing Symphony is widely read as an operational antecedent of
      Persistent Engagement — a sustained, continuous-contact campaign
      to keep ISIS media infrastructure suppressed (30-day and 120-day
      assessment cadence; the counter-ISIS mission continued). But the
      operation (2016) pre-dates the 2018 CYBERCOM Command Vision, and
      the FOIA-declassified after-action does NOT contain "Persistent
      Engagement" (or "Defend Forward"); the linkage is a retrospective
      analytic mapping, inferred.
    attesting_source_id: nsarchive/2020-01-21_glowing-symphony-after-actions
    inference_basis:
      source_id: nsarchive/2020-01-21_glowing-symphony-after-actions
      signals:
        - "FOIA-declassified JTF-ARES after-action documents a sustained counter-ISIS cyberspace campaign (30-day + 120-day assessments; mission continued) suppressing ISIS media/propaganda infrastructure — the continuous-contact / cost-imposition pattern Persistent Engagement later names (operational antecedent)"
      ruled_out: "'Persistent Engagement' / 'Defend Forward' by name — neither appears in the after-action; both doctrines post-date the 2016 operation. (Defend Forward is an equally-valid retrospective mapping — the us/defend-forward doctrine file itself lists Glowing Symphony as 'proto-Defend-Forward' — flagged for the orchestrator if both links are wanted.)"
    contested: false
    analyst: claude
targets:
  - target_id: orgs/amaq-agency
    role: primary
    outcome: |
      Amaq Agency's mobile app "vanished" (NPR) — the group's official
      news service taken offline.
  - target_id: orgs/al-hayat-media-center
    role: primary
    outcome: |
      ISIS's central media producer; its flagship magazine Dabiq
      "started missing deadlines and eventually folded" (NPR). NB:
      "al-Hayat" is not named verbatim in the snapshotted sources —
      corroborated via its product Dabiq (in-snapshot) + external
      reporting.
sources:
  - nsarchive/2020-01-21_glowing-symphony-after-actions
  - npr/2019-09_temple-raston-hacked-isis
