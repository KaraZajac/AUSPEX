id: 2016-11/glowing-symphony
name: Operation Glowing Symphony (counter-ISIS)
start_date: 2016-11-10  # ~Nov 10, 2016 per NSArchive after-action
disclosure_date: 2019-09-26  # NPR Temple-Raston multi-part series
end_date: null  # 30-day surge ended; campaign continued
incident_type:
  - disruption
  - influence-operation  # counter-VEO information warfare
initial_vector: valid-creds  # account takeover; password-reset abuse via stored recovery emails
outcome_summary: |
  Significant degradation of ISIS online propaganda apparatus —
  al-Hayat Media Center, Amaq Agency social-media and content-
  hosting, ISIS financial-messaging accounts. Initial 30-day surge
  followed by sustained campaign. First major CYBERCOM operation
  publicly acknowledged in detail; the FOIA-declassified after-action
  assessments are a key transparency document.
false_flag_risk: none
summary: |
  Joint Task Force ARES (under USCYBERCOM) flagship operation. Stood
  up under then-Maj. Gen. Paul Nakasone in April–May 2016; Glowing
  Symphony launched November 2016. Tradecraft per the declassified
  after-actions: account takeover via password-reset abuse against
  stored recovery emails, content-delivery infrastructure disruption,
  engagement with infrastructure providers. Carter and Mattis made
  public reference to the operation 2016–17; the NSArchive January
  2020 release of the 120-day assessment is the primary documentary
  source.
attributions:
  - actor_id: us/cybercom/jtf-ares-actor
    attributing_org: DoD (Carter, Mattis) / FOIA-declassified after-action
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2016-12-13  # Carter remarks
    attribution_source_id: nsarchive/2020-01-21_glowing-symphony-after-actions
    notes: |
      Officially acknowledged. Attribution-source kind:
      `officially-acknowledged` + FOIA-declassified. attribution_date
      reflects when SecDef Carter first publicly named the operation
      (2016-12-13 hill testimony); the cited source is the 2020
      NSArchive release of the JTF-Ares after-action documents that
      retrospectively confirm and detail the attribution. No
      Carter-2016-speech source stub exists yet.
doctrine_links:
