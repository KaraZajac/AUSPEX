id: 2016-11/shamoon-2-saudi
name: Shamoon 2 (Disttrack) wiper waves against Saudi organizations
start_date: 2016-11-17
disclosure_date: 2016-11-30  # AUDIT 2026-07-10: was 2016-12-01; Palo Alto Unit 42 first-disclosure post is dated 2016-11-30 (article:published_time 2016-11-30T15:20:21Z).
end_date: 2017-01-23  # AUDIT 2026-07-10: was 2017-01-31 (unsourced); last source-dated wave is Symantec's "the January 23 attacks" (23 Jan 2017).
incident_type:
  - destructive
  - wiper
initial_vector: phishing  # AUDIT 2026-07-10: was unknown; Symantec documents Timberworm spear-phishing (Word/Excel macro docs + malicious links -> PowerShell); Palo Alto notes "successful phishing attacks prior to the attack."
outcome_summary: |
  A Shamoon-2 variant of the Disttrack disk-wiper struck selected
  organizations in Saudi Arabia across multiple waves (activation
  timestamp 2016/11/17; a further wave on 23 January 2017). Using
  the same commercial EldoS RawDisk driver (and the identical
  temporary license key) as the 2012 Shamoon, the wiper overwrote
  files, partition tables and the Master Boot Record — rendering
  infected machines unbootable — and self-propagated across
  networks with pre-stolen administrator credentials. In the
  samples analysed the wiper overwrote files with a JPEG of the
  drowned Syrian child Alan Kurdi (the 2012 variant had used a
  burning US-flag image). The cited vendor sources characterise
  the victimology only as "selected"/"high value" organisations in
  Saudi Arabia (Greenbug's broader targeting spanned the aviation,
  energy, government, investment and education sectors); NEITHER
  gives a Shamoon-2 endpoint-destruction count — the widely quoted
  ~30,000-workstation figure belongs to the 2012 Saudi Aramco
  attack, not to this 2016/17 campaign.
false_flag_risk: none
campaign_id: apt33-shamoon-iran-oil
summary: |
  Second-generation Shamoon/Disttrack destructive campaign against
  Saudi targets, technically continuous with the 2012 Aramco/RasGas
  wiper (same RawDisk driver + license key). IMPORTANT ATTRIBUTION
  CAVEAT (2026-07-10 audit): the two cited vendor sources do NOT
  attribute this to APT33 or firmly to Iran. Palo Alto Unit 42
  (2016-11-30) attributes only to "threat actors likely associated
  with the Shamoon attack campaign" (i.e. the 2012 lineage) and
  makes a single "completely speculative" pointer to Iran (a builder
  parameter "shinu" that "could be a reference to ... a village name
  in northwestern Iran"). Symantec (2017-02-27) attributes to its
  own actor clusters "Timberworm" and "Greenbug" cooperating
  "possibly at the direction of a single entity," names no nation,
  and warns the attackers' living-off-the-land tooling "may also
  serve to thwart attribution to specific actors." The APT33 /
  Iranian-service assignment used here is a later corpus-consensus /
  campaign-lineage bucket (kept for continuity with the sister
  shamoon-saudi-aramco and rasgas-shamoon events), not a claim
  carried by either cited source. No US indictment is specific to
  Shamoon 2.
attributions:
  - actor_id: ir/irgc/apt33
    attributing_org: Cited sources reach only an activity cluster — Palo Alto "threat actors likely associated with the Shamoon attack campaign"; Symantec "Timberworm" + "Greenbug." Neither names APT33 or Iran (Palo Alto's Iran pointer is "completely speculative"). APT33/Iran is a later corpus-lineage attribution.
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-11-30  # date of the cited Palo Alto activity-cluster attribution; the named-actor APT33 label is retrospective/corpus-level
    attribution_source_id: paloalto/2016-12_shamoon-2
    notes: |
      Actor kept ir/irgc/apt33 for corpus campaign continuity with
      the sister 2012 Shamoon events, but attributing_org_confidence
      is LOW and attribution_level is activity-cluster because NEITHER
      cited source (Palo Alto 2016-11-30, Symantec 2017-02-27) names
      APT33 or asserts Iran. The best the cited raw supports is
      "Shamoon-campaign-linked operators" (Palo Alto) = "Timberworm" +
      "Greenbug" (Symantec), with Iran only "completely speculative"
      (Palo Alto's "shinu"/village-name aside) and NO nation named by
      Symantec. FLAG for orchestrator: raising this to named-actor
      (APT33) / nation (Iran) confidence requires RE-SOURCING with a
      report that actually names APT33 for Shamoon 2 (e.g. FireEye
      2017 or a later Unit42/Symantec APT33-Shamoon linkage); such a
      source is not currently cited by this event.
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A purpose-built destructive disk-wiper deployed against an
      adversary's civilian/government organisations — with no theft,
      ransom or espionage payload — is the canonical expression of
      Iran's asymmetric-warfare doctrine of low-cost, deniable harm
      to an adversary judged guilty of harm to Iran. Technically the
      same Shamoon/Disttrack template (identical RawDisk driver and
      temporary license key) as the 2012 Aramco/RasGas pair the sister
      events map to this doctrine. NOT attested: no cited source states
      any strategic goal, so this is AUSPEX's triangulated inference.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Payload is pure destruction: Palo Alto — the wiper overwrites 'files and storage partitions in an attempt to destroy data and render the system unusable'; no theft/ransom/collection component."
        - "Technical + target continuity with the 2012 Iranian Shamoon campaign: 'the exact same RawDisk device driver ... down to the same, temporary license key,' again striking Saudi organisations."
        - "Deniable delivery with no persona claim and living-off-the-land tooling that Symantec notes 'may also serve to thwart attribution' — the low-cost, hard-to-retaliate calculus the doctrine encodes."
      ruled_out: "Espionage or financial motive — the Disttrack payload is a disk wiper with no exfiltration, encryption-for-ransom, or intelligence-collection objective evidenced by either cited source."
    contested: false
    analyst: claude
  - doctrine_id: ir/forward-defense
    pillar_id: ir/forward-defense/proxy-projection
    program_id: null
    confidence: plausible
    reasoning: |
      Destructive cyber against a US-aligned Gulf rival (Saudi Arabia)
      can be read as projecting Iranian coercive reach into an
      adversary's territory at near-zero physical risk — the forward-
      defense proxy-projection logic. Kept only "plausible": Forward
      Defense is primarily an Israel/US-facing posture, Saudi is a
      secondary proxy target, and — decisively for grading — the two
      cited sources do not establish Iranian authorship at all (Iran
      is "completely speculative" in Palo Alto; unnamed in Symantec),
      so the Iranian-doctrine reading rests on corpus consensus, not
      on this event's raw.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Forward-defense proxy projection: silent destructive cyber into a US-aligned Gulf monarchy projects Iranian reach extraterritorially against the Saudi rival."
        - "The simpler asymmetric-retaliation reading above (civilian-CII coercion) with no distinct power-projection intent — the anti-Saudi target set may be pure asymmetric harassment rather than deliberate proxy projection."
        - "Attribution-contingent: because the cited sources do not establish Iran, any Iranian-doctrine reading is contingent on the corpus-level APT33/Shamoon-lineage assignment rather than event-specific evidence."
    contested: false
    analyst: claude
targets:
  - target_id: sectors/government
    country: sa
    role: primary
    outcome: |
      Selected Saudi government-sector and other "high value"
      organisations had endpoints wiped (files, partition tables and
      MBR overwritten, systems left unbootable). No public
      endpoint-destruction count was given for the Shamoon-2 waves by
      the cited sources.
