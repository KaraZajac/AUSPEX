    [a] FACTS — corrected. KEY FIX (2012 conflation, exactly as flagged):
    the prior "Tens of thousands of endpoints wiped" is UNSOURCED and was
    STRIPPED. It is a conflation with the 2012 Aramco attack — Palo Alto
    verbatim attributes the ~30k to 2012, not 2016: "The attack four years
    ago resulted in 30,000 or more systems being damaged." For the 2016/17
    waves the cited sources give NO count: Palo Alto — "threat actors ...
    used their Disttrack malware to target at least one organization in
    Saudi Arabia"; Symantec — "only selected targets in Saudi Arabia,"
    "high value organizations." Wiper mechanics verified: Palo Alto — RawDisk
    (EldoS) kernel driver "the exact same driver as used in the Shamoon
    attack in 2012," writing to "the master boot record (MBR) and partition
    tables"; config "F" "overwrite files with an image ... a picture of a
    Syrian boy named Alan Kurdi, whose drowning on September 2, 2015 ...
    The previous Shamoon attack in 2012 used an image of a burning American
    flag." Precision fix: the Kurdi image overwrites FILES/partition tables
    (not only "the MBR image," as prior prose implied); source spells it
    "Alan Kurdi" (kept, prior "Aylan" is the alternate transliteration).
    Self-propagation via stolen admin credentials verified (Palo Alto).
    Name softened "wave against Saudi ministries" -> "wiper waves against
    Saudi organizations": neither source says "ministries" (only "government"
    appears as one of Greenbug's broad target sectors, Symantec); plural
    "waves" reflects the documented Nov-2016 + 23-Jan-2017 events.

    [b] ATTRIBUTION — over-attestation FIXED (the central defect). Prior
    block claimed "Multi-vendor attribution to APT33-linked Iranian
    operators (Palo Alto Unit 42, Symantec)" at high/concur — FALSE against
    the raw. NEITHER cited source names APT33 or Iran: Palo Alto attributes
    only to "threat actors likely associated with the Shamoon attack
    campaign" (the 2012 lineage) and its sole Iran pointer is explicitly
    "completely speculative" ("the word 'shinu' ... could be a reference to
    ... a village name in northwestern Iran"); Symantec attributes to its
    own clusters "Timberworm" and "Greenbug" "possibly at the direction of a
    single entity," names no nation, and cautions the tooling "may also
    serve to thwart attribution to specific actors." Corrections:
    attributing_org reworded to state the cited sources reach only an
    activity cluster; attributing_org_confidence high -> LOW;
    auspex_assessment concur -> concur-with-caveat; attribution_level ADDED
    as activity-cluster (per [e]); attribution_date 2016-12-01 -> 2016-11-30
    (corrected Palo Alto date). actor_id ir/irgc/apt33 KEPT for corpus
    campaign continuity (matching the sister Shamoon events), with a note
    that named-actor/nation confidence needs a re-sourced APT33-naming report.

    [c] DATES — start_date 2016-11-17 ✓ (Palo Alto hardcoded wiper-activation
    timestamp "2016/11/17 20:45"). disclosure_date 2016-12-01 -> 2016-11-30
    (Palo Alto actual publish date). end_date 2017-01-31 -> 2017-01-23 (last
    source-dated wave, Symantec "the January 23 attacks"; the prior 01-31 was
