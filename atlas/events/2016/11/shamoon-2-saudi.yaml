    [d] DOCTRINE_LINKS — reworked. REMOVED ir/cyber-deniable-retaliation: it
    is anachronistic and mechanism-mismatched — that doctrine is defined as
    persona-laundering via Telegram/X "claim-and-leak" channels "formalized
    in pattern from 2020 onward" (attestations all 2021-2024), whereas
