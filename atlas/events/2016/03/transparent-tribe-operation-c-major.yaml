id: 2016-03/transparent-tribe-operation-c-major
name: Proofpoint discloses Operation C-Major / Transparent Tribe targeting Indian military
start_date: 2015-09-01
disclosure_date: 2016-03-15
end_date: 2016-02-29
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Proofpoint published "Operation Transparent Tribe," documenting
  a multi-month spear-phishing campaign against Indian military
  diplomats stationed in Riyadh, Astana, and other postings.
  Attackers used weaponized RTF documents and the MSIL/Crimson
  Remote Access Trojan (Crimson RAT) — the staple Pakistani-
  aligned implant family. Lures themed on diplomatic cables,
  visa-application portals, and military pension communications.
  The disclosure named the operation "C-Major" and established
  the canonical Transparent Tribe attribution cluster.
false_flag_risk: none
summary: |
  Foundational public disclosure of Transparent Tribe / APT36
  and the Crimson RAT family. Established the Pakistani-aligned
  attribution that subsequent Secureworks (COPPER FIELDSTONE,
  2017), Cisco Talos (2021, 2022), and Cyfirma (2023) reporting
  refined. The Crimson RAT remains the long-running Windows
  staple a decade later.
