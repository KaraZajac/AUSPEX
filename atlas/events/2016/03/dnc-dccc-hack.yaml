id: 2016-03/dnc-dccc-hack
name: DNC / DCCC hack and 2016 US election interference
start_date: 2016-03-01
disclosure_date: 2016-06-14
end_date: 2016-11-08
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  GRU spearphishing → X-Agent → exfiltration of Democratic
  National Committee, DCCC, and Clinton campaign chair John
  Podesta email and document repositories. Subsequent laundering
  via the "Guccifer 2.0" persona, the DCLeaks website, and
  WikiLeaks. Releases timed with the Democratic National
  Convention (July 2016) and the pre-election period (Podesta
  emails dropped October–November 2016).
false_flag_risk: none
campaign_id: fancy-bear-dnc-hack-and-leak
operators_named:
  - netyksho-viktor  # GRU Unit 26165 commander, Mueller 2018
  - antonov-boris  # GRU Unit 26165, Mueller 2018
  - badin-dmitriy  # GRU Unit 26165, Mueller 2018
  - yermakov-ivan  # GRU Unit 26165, Mueller 2018
  - lukashev-aleksey  # GRU Unit 26165, Mueller 2018
  - morgachev-sergey  # GRU Unit 26165, Mueller 2018
  - kozachek-nikolay  # GRU Unit 26165, Mueller 2018
  - yershov-pavel  # GRU Unit 26165, Mueller 2018
  - malyshev-artem  # GRU Unit 26165, Mueller 2018
  - osadchuk-aleksandr  # GRU Unit 74455 commander, Mueller 2018
  - potemkin-aleksey  # GRU Unit 74455, Mueller 2018
  - kovalev-anatoliy  # GRU Unit 74455, Mueller 2018 (also NotPetya / Sandworm Six 2020)
summary: |
  Mueller's July 2018 indictment named twelve GRU officers across
  Unit 26165 (spear-phishing / exfiltration) and Unit 74455
  (election-infrastructure targeting and laundering). Tradecraft
  per the indictment and CrowdStrike's "Bears in the Midst"
  reporting: spear-phishing of DNC, DCCC, and Clinton-campaign
  staff with credential-harvesting URL-shortener links (the
  "fancybear-securitymail" pretext), follow-on deployment of the
  X-Agent (CHOPSTICK) modular backdoor and the X-Tunnel network
  proxy, lateral movement across the DNC's Active Directory using
  valid credentials, Mimikatz-style credential dumping, and bulk
  staged exfiltration of email and document repositories. Unit
  74455 / Sandworm laundered the stolen material through the
  Guccifer 2.0 persona, the DCLeaks website, and WikiLeaks, timed
  with the Democratic National Convention (July 2016) and the
  pre-election Podesta drop (October–November 2016). The
  Intelligence Community Assessment (ICA 2017-01D) named Vladimir
  Putin as the directing authority.
