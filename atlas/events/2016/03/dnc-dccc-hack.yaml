  notes: |
    Audited vs the two cited primaries, both snapshotted + hashed and
    content-verified from the raw PDFs (pdftotext).

    [a] FACTS — carried by the DOJ indictment (sha b2bc..7696) and ICA
    (sha 5876..2257). Verbatim confirmations: Unit 26165 "had primary
    responsibility for hacking the DCCC and DNC" (para 9); Unit 74455
    "assisted in the release of stolen documents through the DCLeaks and
    Guccifer 2.0 personas" (para 18); "Starting in at least March 2016"
    and "Beginning by at least March 2016, the Conspirators targeted over
    300 [individuals]"; URL-shortening service, the "john356gh" account
    used by LUKASHEV to spearphish the Clinton-campaign chairman; X-Agent
    (x19) keylog/screenshot implant, X-Tunnel (x4) exfil to GRU-leased
    computers in Arizona/Illinois; "a publicly available tool to gather
    and compress"; Organization 1 (WikiLeaks); object of the conspiracy
    "to ... interfere with the 2016 U.S. presidential election" (para 20).
    ICA: "Putin" x28, "WikiLeaks" x12, goal statement on p.ii.
    STRIPPED as uncited embellishment (in neither cited source): the
    X-Agent "(CHOPSTICK)" alias, "Mimikatz-style credential dumping",
    "lateral movement across the DNC's Active Directory", and the
    "fancybear-securitymail" pretext (the indictment's masking account
    was "john356gh", not that string) — all CrowdStrike/FireEye-derived;
    also removed the summary's explicit "CrowdStrike 'Bears in the Midst'
    reporting" attribution since CrowdStrike is not in sources[]. Summary
    rewritten to the indictment+ICA record. Podesta retained as the
    public-record identity of "the chairman of the Clinton Campaign"
    (neither cited source prints the surname).

    [b] ATTRIBUTION — DOJ names the numbered Units 26165 + 74455 and 12
    officers ⇒ both DOJ entries concur/high/named-unit (no over-attest).
    ICA attributes to the GRU service + Putin as directing authority but
    does NOT name 26165; kept as concur/high/named-unit (service-level)
    with an added notes: caveat. NB: APT29/SVR (Cozy Bear) is NOT
    attributed here and correctly so — neither cited source names it; the
    second-bear co-intrusion is a CrowdStrike June-2016 finding outside
    sources[]. See FLAG re: optional CrowdStrike enrichment.

    [c] DATES — start 2016-03-01 ✓ (indictment's "at least March 2016"
    onset). disclosure 2016-06-14 = the WaPo/CrowdStrike public
    disclosure (correct public record, but NOT carried by either cited
    source — minor gap). end 2016-11-08 = US election day, editorial
    op-culmination boundary. Source bylines verified: DOJ "RECEIVED JUL
    13 2018" ⇒ published_on 2018-07-13 ✓; ICA "6 January 2017" ⇒
    2017-01-06 ✓.

    [d] DOCTRINE — attested ru/military-doctrine-2014/
    destabilization-via-info RETAINED: the ICA states the strategic
    purpose at goal level; added inference_basis.source_quote ("...
    Russia's goals were to undermine public faith in the US democratic
    process, denigrate Secretary Clinton ...") + source_id, and
    perspective: attacker-rationale (Russia's own doctrine explaining a
    Russian op). plausible ru/gerasimov-framework/hybrid-toolkit retained
    with inference_basis.alternatives (Galeotti retraction of the label).

    [e] ATTRIBUTION_LEVEL — added named-unit to all three attributions
    (was absent). DOJ = numbered units + named officers; ICA = named GRU
    service.

    [f] ACTOR_ID — ru/gru/26165/apt28 → atlas/actors/ru/apt28.yaml ✓;
    ru/gru/74455/sandworm → atlas/actors/ru/sandworm.yaml ✓. Directionality
    ✓: US victims (targets DNC/DCCC/Clinton/state-election-infra) vs RU
    GRU attacker. incident_type gained "leak" (hack-and-leak release phase).

    SNAPSHOT — DOJ live URL 200; ICA live dni.gov URL now 403 (anti-bot)
    but raw snapshot held + hashed + content-verified, wayback archive_url
