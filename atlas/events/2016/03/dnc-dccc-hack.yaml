id: 2016-03/dnc-dccc-hack
name: DNC / DCCC hack and 2016 US election interference
start_date: 2016-03-01
disclosure_date: 2016-06-14
end_date: 2016-11-08
incident_type:
  - intrusion
  - data-theft
  - leak
  - influence-operation
initial_vector: phishing
outcome_summary: |
  GRU spearphishing → X-Agent → exfiltration of Democratic
  National Committee, DCCC, and Clinton campaign chair John
  Podesta email and document repositories. Subsequent laundering
  via the "Guccifer 2.0" persona, the DCLeaks website, and
  WikiLeaks. Releases timed with the Democratic National
  Convention (July 2016) and the pre-election period (Podesta
  emails dropped October–November 2016).
