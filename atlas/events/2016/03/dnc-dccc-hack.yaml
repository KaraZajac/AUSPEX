summary: |
  Mueller's July 2018 indictment charged twelve GRU officers across
  Unit 26165 — which "had primary responsibility for hacking the DCCC
  and DNC" and the Clinton-campaign email accounts — and Unit 74455,
  which "assisted in the release of stolen documents through the
  DCLeaks and Guccifer 2.0 personas" and the promotion of those
  releases. Per the indictment: starting by at least March 2016 the
  conspirators spearphished DNC, DCCC, and Clinton-campaign staff
  (over 300 individuals), masking credential-harvesting links with a
  URL-shortening service (the "john356gh" account) and phishing the
  Clinton-campaign chairman (John Podesta by public record); they
  deployed the X-Agent implant to log keystrokes and capture
  screenshots, used "a publicly available tool" to compress stolen
  files, and exfiltrated the staged data over X-Tunnel to GRU-leased
  servers (Arizona, Illinois). Unit 74455 laundered the material
  through the Guccifer 2.0 persona, the DCLeaks website, and
  Organization 1 (WikiLeaks, named in the ICA), timed with the
  Democratic National Convention (July 2016) and the pre-election
  Podesta release (October–November 2016). The Intelligence Community
  Assessment (ICA 2017-01D) assessed that Vladimir Putin ordered the
  influence campaign, whose goals were to "undermine public faith in
  the US democratic process" and denigrate Secretary Clinton.
