id: 2016-03/proofpoint-transparent-tribe
name: Proofpoint discloses Operation Transparent Tribe — first canonical Pakistani-aligned APT attribution
start_date: 2013-01-01
disclosure_date: 2016-03-15
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Proofpoint published "Operation Transparent Tribe," documenting
  a sustained phishing campaign against Indian diplomats and
  military personnel using the Crimson RAT and the "C-Major"
  malware family. The report named "Pakistani actors" as the
  assessed sponsor and tied infrastructure to operations targeting
  Indian embassies and military attaches in Saudi Arabia, Kazakhstan,
  and elsewhere.
false_flag_risk: none
summary: |
  Foundational public attribution of the Transparent Tribe / APT36
  cluster. Subsequent vendor work (Secureworks COPPER FIELDSTONE,
  Trend Micro Earth Karkaddan, Cisco Talos's recurring reporting)
  refined the picture without displacing the Proofpoint 2016
  naming.
