id: 2016-03/proofpoint-transparent-tribe
name: Proofpoint discloses Operation Transparent Tribe — foundational public disclosure of the cluster later attributed to Pakistan (APT36)
start_date: 2013-01-01
disclosure_date: 2016-03-15
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Proofpoint published "Operation Transparent Tribe," documenting a
  campaign that began as a "relatively small email campaign sent to
  Indian embassies in Saudi Arabia and Kazakstan" and was found
  "connected to watering hole sites targeting Indian military
  personnel" plus related campaigns dropping a remote-access Trojan
  Proofpoint dubbed "MSIL/Crimson" (the Crimson RAT; "C-Major" is
  Trend Micro's name for the same operation, NOT Proofpoint's). The
  RAT performs data exfiltration including screen capture and
  keylogging. Critically, the cited blog body assigns NO national
  sponsor: Proofpoint states "the exact nature and attribution
  associated with this APT remains under investigation" and that the
  actors may be "nation-states or private parties with interests in
  international conflicts." The Pakistan attribution now attached to
  this cluster (APT36) came from LATER vendor work (Trend Micro /
  Unit 42 "ProjectM", Secureworks, Talos), not from this 2016
  disclosure.
false_flag_risk: none
summary: |
  Foundational public DISCLOSURE of the Transparent Tribe / APT36
  cluster — the first naming of the activity cluster and its Crimson
  RAT, NOT the first attribution to Pakistan (the cited Proofpoint
  blog explicitly defers attribution). Subsequent vendor work
  (Secureworks COPPER FIELDSTONE, Trend Micro Earth Karkaddan /
  C-Major, Cisco Talos's recurring reporting) refined the picture
  and established the Pakistan nexus without displacing the
  Proofpoint 2016 cluster naming.
attributions:
  - actor_id: pk/unscoped/transparent-tribe
    attributing_org: Proofpoint (Darien Huss)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-03-15
    attribution_source_id: proofpoint/2016-03-15_operation-transparent-tribe
    notes: |
      Cited source (Proofpoint blog body, recovered from the Wayback
      raw snapshot — the live URL serves only a marketing shell)
      reaches ACTIVITY-CLUSTER level only: it names the cluster
      "Transparent Tribe" and its "MSIL/Crimson" RAT but EXPLICITLY
      DEFERS attribution — "the exact nature and attribution associated
      with this APT remains under investigation," actors possibly
      "nation-states or private parties." The blog body names NEITHER
      Pakistan NOR the ISI (confirmed: zero occurrences of "Pakistan"
      in the raw HTML). high confidence applies to the existence of the
      activity cluster, not to any nation attribution. auspex_assessment
      set to concur-with-caveat: AUSPEX concurs the actor is APT36
      (per the later vendor consensus carried by the actor record's
      other sources), but the CITED source does not itself make the
      Pakistan attribution. Actor pk/unscoped/transparent-tribe was
      demoted from pk/isi/... on 2026-06-24 for the same reason (no
      cited source names the ISI).
doctrine_links:
  - doctrine_id: pk/asymmetric-posture-india
    pillar_id: pk/asymmetric-posture-india/military-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Indian diplomatic and military targeting is the canonical
      victim mix for the asymmetric-posture doctrine. The cited
      Proofpoint source documents the target set (Indian embassies in
      Saudi Arabia and Kazakstan; watering holes targeting Indian
      military personnel) but states NO strategic purpose and assigns
      NO national sponsor — so the link cannot be attested. It is held
      at strongly_inferred: the unambiguously-Indian-military target
      mix plus the actor's documented APT36 mission triangulate to the
      asymmetric-posture-against-India reading. The pk/asymmetric-
      posture-india doctrine is itself an inferred posture (no
      published Pakistani text), which independently caps links to it
      below attested.
    attesting_source_id: proofpoint/2016-03-15_operation-transparent-tribe
    inference_basis:
      signals:
        - Proofpoint documents Indian embassies (Saudi Arabia, Kazakstan) and watering holes targeting Indian military personnel as the target set
        - Crimson/MSIL RAT exfiltration (screen capture, keylogging) against military personnel is collection, consistent with the military-collection pillar
        - The actor (Transparent Tribe / APT36) has a documented sustained mission of Indian military and diplomatic collection per the later vendor consensus carried in the actor record
      ruled_out: |
        A financial / criminal reading is ruled out — the targets are
        diplomatic and military, with no monetization, and the RAT
        capability is collection-oriented. The Kashmir-political pillar
        is a poorer fit for THIS event because the documented targets
        are military personnel and embassies abroad, not Kashmir-issue
        officials/journalists.
    counter_explanation: null
    contested: false
    analyst: claude
