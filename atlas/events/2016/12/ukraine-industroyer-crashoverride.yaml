id: 2016-12/ukraine-industroyer-crashoverride
name: Ukraine power grid attack (Industroyer / CrashOverride)
start_date: 2016-12-17
disclosure_date: 2017-06-12
end_date: 2016-12-17
incident_type:
  - destructive
  - cyber-physical
initial_vector: unknown  # ESET + Dragos both stated the initial vector into Ukrenergo was unknown (Wired 2017-06-12)
outcome_summary: |
  Industroyer / CrashOverride deployed against Ukrenergo's
  Pivnichna ("North") 330 kV transmission substation outside
  Kyiv, cutting roughly a fifth of the capital's power
  consumption for just over an hour on 17 December 2016. The
  first ICS-purpose-built malware since Stuxnet (the second-ever
  known code purpose-built to disrupt physical grid systems),
  with modular implementation of the IEC 60870-5-101,
  IEC 60870-5-104, IEC 61850, and OPC DA control protocols.
quantified_impact:
  outage_hours: 1
  share_of_capital_power: "~1/5 (a fifth of Kyiv's consumption at that hour)"
false_flag_risk: none
campaign_id: sandworm-ukraine-grid-wave
operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  ESET (WeLiveSecurity, 12 Jun 2017, as "Industroyer") and Dragos
  (12 Jun 2017, as "Crash Override") published the foundational
  technical analyses of the malware. The DOJ Oct 2020 Sandworm
  indictment later attributed the December 2015–December 2016
  Ukraine grid attacks — naming Industroyer among the malware
  families used — to GRU Unit 74455. Industroyer / CrashOverride is
  a modular ICS attack framework built around a main backdoor and
  four protocol-specific payload modules implementing IEC 60870-5-101
  (serial), IEC 60870-5-104 (TCP/IP), IEC 61850 (substation
  automation), and OPC DA, letting the operator gain direct control
  of substation switches and circuit breakers by speaking the grid's
  own protocols rather than through ICS-vendor tooling. Supporting
  modules include a data-wiper that erases Registry keys and
  overwrites files to render the host unbootable, a second backdoor
  masquerading as Notepad, a custom port scanner, and a
  denial-of-service module exploiting CVE-2015-5374 to render Siemens
  SIPROTEC protective relays unresponsive. The 2016 operation was
  fully automated with an activation timestamp set for 17 December
  2016; neither ESET nor Dragos could determine how the malware
  initially infected Ukrenergo (initial vector unknown). ESET found
  no apparent code similarity to the 2015 BlackEnergy toolset beyond
  the shared Ukrainian-grid targeting.
attributions:
  - actor_id: ru/gru/74455/sandworm
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2020-10-15
    attribution_source_id: doj/2020-10-15_sandworm-six-gru-officers-indictment
    notes: |
      Named-unit attribution (GRU Unit 74455 / Sandworm) rests on the US
      DOJ Oct-2020 indictment, which charges the six officers and the
      "December 2015 through December 2016 destructive malware attacks
      against Ukraine's electric power grid … using malware known as
      BlackEnergy, Industroyer, and KillDisk" — naming Industroyer
      explicitly. The 2017 technical-analysis chain was less specific on
      attribution: ESET (Jun 2017) declined to attribute ("it's difficult
      to attribute attacks to malware without performing an onsite
      incident response"); Dragos (Jun 2017), per Wired, "believes with
      'high confidence' that the Crash Override attack was the work of
      Sandworm" — actor-level (its ELECTRUM cluster), not the GRU unit.
      Only the DOJ named the unit, so attributing_org is US DOJ (not
      ESET/Dragos, who did the tradecraft analysis but not the unit
      attribution). attribution_date is the indictment-return date
      (2020-10-15); the DOJ press release itself published 2020-10-19.
