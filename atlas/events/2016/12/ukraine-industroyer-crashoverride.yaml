  notes: |
    [a] FACTS — corrected against RAW. The two originally-cited sources
    (ESET blog + DOJ PR) did NOT carry the victim identity or the outage
    geography, so two snapshotted corroborators were added (badrabbit
    re-source). ESET WeLiveSecurity (sha256 d4e0c621…715b7720, 76,672 B)
    verbatim: "Biggest threat to industrial control systems since Stuxnet";
    "The 2016 attack on Ukraine's power grid that deprived part of its
    capital, Kiev, of power for an hour"; "The recent power outage occurred
    on December 17th, 2016"; "four payload components … IEC 60870-5-101,
    IEC 60870-5-104, IEC 61850, and OLE for Process Control Data Access
    (OPC DA)"; wiper "erase system-crucial Registry keys and overwrite files
    to make the system unbootable"; "an additional backdoor - masquerading
    as the Notepad application"; "a port scanner that maps the network";
    "a Denial-of-Service tool that exploits the CVE-2015-5374 vulnerability
    in Siemens SIPROTEC devices and can render targeted devices
    unresponsive"; "activation timestamp for December 17th, 2016." ESET
    calls it "an electricity distribution substation" and does NOT name
    Ukrenergo/Pivnichna. Wired/Greenberg (sha256 657e6fc3…a2f578f3,
    1,412,749 B) carries what ESET omits: "hackers struck an electric
    transmission station north of the city of Kiev, blacking out a portion
    of the Ukrainian capital equivalent to a fifth of its total power
    capacity"; "the Ukrainian electric utility Ukrenergo"; the malware
    "alternately named 'Industroyer' or 'Crash Override,'" "the second-ever
    known case of malicious code purpose-built to disrupt physical systems";
    "four 'payload' modules"; and — decisively for initial_vector —
    "Neither of the two security companies knows how the malware initially
    infected Ukrenergo." Wikipedia 2016-Kyiv (sha256 105e8627…45b3653f,
    88,933 B) is the sole carrier of the substation NAME: "The attack
    affected the 330 kilowatt [sic; kV] electrical substation 'North' at
    Pivnichna, outside the capital," "just over an hour," "Ukrenergo said …
    the attack had cut one fifth of the city's power consumption."
    STRIPPED as unsourced/AI-embellished (not in any cited raw): the
    "launcher" component (ESET's own enumeration has backdoor + four
    payloads + wiper + Notepad backdoor + port scanner + DoS, no
    "launcher"); "send open-breaker commands directly to substation RTUs"
    (reworded to ESET's "direct control of switches and circuit breakers …
    speaking the grid's own protocols"); "attempted to disable
    protective-relay self-recovery" (→ ESET's "render … unresponsive");
    "destroyed the Windows engineering workstations after the open-breaker
    payloads ran" (→ ESET's "make the system unbootable"); and the entire
    "Initial access and lateral movement used valid credentials … BlackEnergy3
    tradecraft" sentence — AFFIRMATIVELY refuted by Wired (vector unknown)
    and inconsistent with initial_vector: unknown. No fabricated CVEs
    (CVE-2015-5374 is ESET-verbatim); no anachronism.
    [b] ATTRIBUTION — attributing_org corrected "US DOJ / ESET / Dragos" →
    "US DOJ". Only the DOJ named the GRU unit; ESET explicitly declined to
    attribute ("difficult to attribute … without … onsite incident
    response") and Dragos reached actor-level only ("'high confidence' that
    the Crash Override attack was the work of Sandworm," per Wired). Added
    attribution_level: named-unit (74455). auspex_assessment=concur,
    org_confidence high — matches the indictment's firmness; not over-attested.
    Six operators_named = the six charged officers.
    [c] DATES — start_date/end_date 2016-12-17 = ESET "December 17th, 2016,
    the day of the power outage" + Wikipedia "17 December 2016."
    disclosure_date 2017-06-12 = ESET + Wired bylines ("12 Jun 2017").
    attribution_date 2020-10-15 = grand-jury return; DOJ PR published
    2020-10-19 (source published_on already corrected in the DOJ record).
    [d] DOCTRINE_LINKS — both attested, perspective attacker-rationale
    (Russia's own doctrine on Russia's own attack; default). Added the
    protocol-required inference_basis.source_quote (verbatim DOJ) to each,
    which had been missing. ru/energy-weaponization/grid-attack + ru/russkiy-mir/
    ukraine-theater are BOTH carried in substance: DOJ names "Industroyer"
    specifically within "destructive malware attacks against Ukraine's
    electric power grid … intended to … destabilize … Ukraine" — strategic-
    purpose attestation, not slug-naming. Both HOLD.
    [e] ATTRIBUTION_LEVEL — named-unit (74455), source-supported (added).
    [f] ACTOR_ID — ru/gru/74455/sandworm resolves (atlas/actors/ru/sandworm.yaml,
    id line 1); both doctrine pillars (ru/energy-weaponization, ru/russkiy-mir)
    and targets/orgs/ukrenergo resolve. incident_type set to
    [destructive, cyber-physical] per the cyber-physical family (Stuxnet,
    Industroyer2) — the wiper (destructive) + breaker-opening grid effect.
    LEVEL=partial: SOLE reason is the DOJ Akamai bot-wall (unchanged from the
    sibling 2015 audit) — the indictment (named-unit attribution + doctrine
    attestation) could not be snapshotted, only mirror-corroborated via the
    GlobalSecurity full-text mirror intell-201019-doj01. The other three
    sources (ESET, Wired, Wikipedia) are all snapshotted + hashed and carry
    every other load-bearing claim. FLAG (out of event scope, for
    orchestrator): (1) no direct Dragos CRASHOVERRIDE source — the Jun-2017
    Dragos report URLs 404 (moved/gated); its analysis + high-confidence
    Sandworm link are carried via the Wired secondary. (2) atlas/sources/
    wikipedia/2016-kyiv-cyberattack.yaml + atlas/sources/wired/2017-06-12_
    crash-override-malware.yaml are NEW records created this session.
