id: 2016-12/ukraine-industroyer-crashoverride
name: Ukraine power grid attack (Industroyer / CrashOverride)
start_date: 2016-12-17
disclosure_date: 2017-06-12
end_date: 2016-12-17
incident_type:
  - intrusion
  - destructive
  - disruption
initial_vector: unknown
outcome_summary: |
  Industroyer / CrashOverride deployed against Ukrenergo's
  Pivnichna transmission substation north of Kyiv. ~1 hour
  blackout for parts of the city. First ICS-purpose-built malware
  since Stuxnet, with modular implementation of IEC 60870-5-101,
  IEC 60870-5-104, OPC DA, and IEC 61850 substation-automation
  protocols.
quantified_impact:
  outage_hours: 1
false_flag_risk: none
