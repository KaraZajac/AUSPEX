operators_named:
  - andrienko-yuriy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - detistov-sergey  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - frolov-pavel  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - kovalev-anatoliy  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - ochichenko-artem  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
  - pliskin-petr  # GRU Unit 74455 / Sandworm, DOJ Oct 2020
summary: |
  ESET (Jun 2017) and Dragos (Jun 2017) provided foundational
  technical analyses. DOJ Oct 2020 Sandworm indictment formally
  attributes the operation to GRU Unit 74455. Industroyer /
  CrashOverride is a modular ICS attack framework comprising a
  main backdoor, a launcher, a data-wiper component, and four
  protocol-specific payloads implementing IEC 60870-5-101 (serial),
  IEC 60870-5-104 (TCP/IP), IEC 61850 (substation automation), and
  OPC DA — allowing the operator to send open-breaker commands
  directly to substation RTUs without intermediate ICS-vendor
  tooling. A Siemens SIPROTEC denial-of-service module attempted
  to disable protective-relay self-recovery; the wiper component
  destroyed the Windows engineering workstations after the
  open-breaker payloads ran. Initial access and lateral movement
  used valid credentials and standard Windows administrative
  tooling, with persistence on engineering workstations consistent
  with prior Sandworm BlackEnergy3 tradecraft.
