id: 2016-07/kaspersky-dropping-elephant-naming
name: Kaspersky publishes "The Dropping Elephant Actor" — first public naming of the Patchwork cluster
# start_date corrected 2015-02-01 → 2015-11-01 (claude-opus-4.8/max, 2026-06-25): the sole cited
# source (Kaspersky) states the actor "has been able to steal sensitive documents and data from
# victims since at least November 2015." No source supports the earlier Feb-2015 start; aligned to
# the source's own "at least November 2015" floor (the cluster's Hangover antecedent goes back
# further, but that is the actor record's active_since, not this Kaspersky-scoped event).
start_date: 2015-11-01
disclosure_date: 2016-07-08
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky GReAT's Securelist team published "The Dropping
  Elephant Actor" (aka "Chinastrats" / "Patchwork"), the first
  Kaspersky-named writeup of the Patchwork / Hangover cluster.
  The report documented spear-phishing and watering-hole
  collection — active since at least November 2015 — against
  high-profile diplomatic and economic targets all "involved
  with China's foreign relations in some way": diplomatic and
  governmental entities, PRC-focused think tanks, and analysts.
  Tradecraft documented: weaponized MS Office documents exploiting
  older CVEs (CVE-2012-0158, CVE-2014-6352, CVE-2014-1761), a
  UPX-packed AutoIt downloader/backdoor (steals Chrome
  credentials), and PowerShell-staged follow-on malware — no
  0-days. Kaspersky named no nation or service as sponsor.
false_flag_risk: none
summary: |
  One of the foundational 2016 Patchwork-naming triad
  (Kaspersky "Dropping Elephant" July, Cymmetria "Patchwork"
  July, Forcepoint "Monsoon" August). All three pointed at the
  same Indian-aligned operational cluster Norman Shark had
  attributed to India under "Hangover" three years earlier;
  the naming triad consolidated vendor consensus on the
  cluster's existence even where no vendor explicitly named
  the Indian government as sponsor.
attributions:
  - actor_id: in/unscoped/patchwork
    attributing_org: Kaspersky GReAT (Securelist)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2016-07-08
    attribution_source_id: kaspersky/2016-07_dropping-elephant
    notes: |
      Kaspersky reached only ACTIVITY-CLUSTER level: it named and
      profiled the actor ("Dropping Elephant", aka "Chinastrats"
      and "Patchwork") with high confidence in its existence and
      cohesion, but named NO nation, NO Indian service, and NO
      state sponsor. Verified verbatim against the captured raw
      snapshot: the actor is framed entirely by its China-policy
      targeting ("Its victims are all involved with China's foreign
      relations in some way"); the sole India reference is attacker
      infrastructure, not attribution ("sometimes via IPs belonging
      to an ordinary ISP in India"). The Indian-aligned framing in
      this corpus rests on the target mix and continuity with the
      Hangover cluster Norman Shark earlier tied to India — NOT on
      anything Kaspersky asserted (high attributing_org_confidence
      applies to the cluster's existence, not to a sponsor claim).
