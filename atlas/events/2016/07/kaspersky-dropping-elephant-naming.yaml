id: 2016-07/kaspersky-dropping-elephant-naming
name: Kaspersky publishes "The Dropping Elephant Actor" — first public naming of the Patchwork cluster
start_date: 2015-02-01
disclosure_date: 2016-07-08
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky GReAT's Securelist team published "The Dropping
  Elephant Actor," the first Kaspersky-named writeup of the
  Patchwork / Hangover cluster. The report documented sustained
  spear-phishing of Chinese diplomatic personnel, foreign-affairs
  scholars working on PRC, and adjacent regional government
  equities. Tradecraft documented included weaponized Office
  documents exploiting older CVEs, custom downloaders, and the
  AutoIt-based implant family that became central to subsequent
  vendor naming.
false_flag_risk: none
summary: |
  One of the foundational 2016 Patchwork-naming triad
  (Kaspersky "Dropping Elephant" July, Cymmetria "Patchwork"
  July, Forcepoint "Monsoon" August). All three pointed at the
  same Indian-aligned operational cluster Norman Shark had
  attributed to India under "Hangover" three years earlier;
  the naming triad consolidated vendor consensus on the
  cluster's existence even where no vendor explicitly named
  the Indian government as sponsor.
