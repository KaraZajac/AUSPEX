  notes: |
    Kaspersky GReAT "The Dropping Elephant Actor" (Securelist, 08 Jul
    2016), the foundational naming writeup. Audited against the captured
    raw snapshot (kaspersky__2016-07_dropping-elephant.html, sha256
    372c1a3f0d2f76afb83d41f79280edaa76f5f636e9d96453754cc63a50fb9d22 —
    re-hashed this audit, MATCHES the recorded content_sha256; 193 KB,
    genuine Securelist article body, not an error/bot page). The raw +
    hash were already added by the 2026-06-24 actor-demotion audit;
    PRESERVED, not re-fetched.
    FACTS — CONFIRMED verbatim: actor named "Dropping Elephant (also
    known as 'Chinastrats' and 'Patchwork')"; "Its victims are all
    involved with China's foreign relations in some way"; targets are
    "high profile diplomatic and economic" / "diplomatic and governmental
    entities" + PRC-focused think tanks/analysts; vectors = spear-phishing
    (CVE-2012-0158 Word, CVE-2014-6352 / CVE-2014-1761 PowerPoint) +
    watering-hole; UPX-packed AutoIt downloader/backdoor stealing Chrome
    creds; PowerShell-staged follow-on; "no 0 days"; active "since at
    least November 2015." NB South China Sea appears only as a lure-doc
    filename (militarizationofsouthchinasea.pps), NOT as a Kaspersky-
    stated targeting theme — so SCS was deliberately NOT asserted as a
    target claim.
    ATTRIBUTION (key finding): Kaspersky reached only ACTIVITY-CLUSTER
    level. It named/profiled the cluster with high confidence but named
    NO nation, NO Indian service, NO state sponsor. The ONLY India
    reference is attacker infrastructure ("sometimes via IPs belonging to
    an ordinary ISP in India") — not attribution. CORRECTED: added
    attribution_level: activity-cluster and rewrote the attribution notes
    to make explicit that high attributing_org_confidence attaches to the
    cluster's existence, not to any sponsor claim. The India-nexus framing
    in this corpus is AUSPEX's, resting on the China/Pakistan target mix +
    Hangover continuity (Norman Shark), corroborated only at "pro-Indian
    or Indian entity" by MITRE G0040 — consistent with actor placement
    in/unscoped/patchwork (no cited source names a specific Indian service;
    the NTRO placement was demoted 2026-06-24, audit-confirmed here).
    DATE CORRECTION: start_date 2015-02-01 → 2015-11-01 — the sole cited
    source supports only "since at least November 2015"; the earlier date
    was unsourced. published_on/disclosure_date 2016-07-08 = the actual
    Securelist publication date ("08 Jul 2016"), CONFIRMED.
    DOCTRINE LINKS: both honest and KEPT — china-collection +
    diplomatic-collection pillars, both strongly_inferred, no
    attesting_source_id (correct: Kaspersky states the targeting INTEREST
    is China-foreign-relations but assigns NO Indian-intelligence
    strategic purpose, so not attested). attacker-rationale default
    correct; no over-attestation, nothing to downgrade. FKs: doctrine +
    both pillars resolve; actor_id in/unscoped/patchwork resolves and is
    current (not stale). Conformance + verify_atlas: PASS (0 errors).
    FLAG for Kara (NOT changed — out of audit scope, corpus-wide): the two
    target_ids orgs/chinese-government and orgs/regional-foreign-ministries-various
    have NO registry file under atlas/targets/orgs/ yet are shared by
    sibling Patchwork/SideWinder/Monsoon events (4 and 2 events resp.);
    verify_atlas does not flag them as dangling, so they appear to be a
    tolerated registry-less convention — worth a registry backfill or an
    explicit allowlist. Event NOT in the backfill cohort.
    level: full — every core fact + the attribution ceiling independently
    confirmed against the hash-verified primary snapshot.
