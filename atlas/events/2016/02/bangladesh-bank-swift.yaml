    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: strongly_inferred  # downgraded 2026-07-01 from attested, re-verified 2026-07-11: the cited govt-primary sources state only the PROXIMATE goal — "the strategic and financial interests of the DPRK government" (DOJ 2021) / regime revenue under sanctions (Mandiant) — not the pillar's TERMINAL weapons-program-funding purpose; term-scan of all three cited sources: "weapons of mass destruction"=0, "revenue"=0-in-DOJ (SCHEMA attestation boundary)
    perspective: attacker-rationale
    reasoning: |
      APT38's SWIFT-network bank thefts are the operational core of the
      DPRK's cyber-enabled hard-currency generation, which the Byungjin
      sanctions-evasion-revenue pillar encodes (era-correct for 2016).
      The cited sources tie the theft to DPRK regime money needs under
      sanctions pressure (Mandiant: "raise large sums of money for the
      North Korean regime"; DOJ 2021: "the strategic and financial
      interests of the DPRK government and its leader, Kim Jong Un") — a
      strong signal of the terminal weapons-financing goal but short of a
      flat attestation of it. Hence strongly_inferred, not attested
      (harmonized with the 2015-12 Tien Phong and 2017-10 global-SWIFT
      siblings, likewise downgraded).
    attesting_source_id: null
    inference_basis:
      signals:
        - "Mandiant APT38 report: the group's 'primary mission is targeting financial institutions and manipulating inter-bank financial systems to raise large sums of money for the North Korean regime … heavy … sanctions have been levied on North Korea following the regime's continued weapons development' — proximate revenue goal against a weapons-driven-sanctions backdrop."
        - "DOJ 2021 press release: the conspiracy acted to 'further the strategic and financial interests of the DPRK government and its leader, Kim Jong Un' — the proximate regime-revenue function the pillar encodes."
        - "APT38 / Lazarus is a dedicated financial-theft element of the RGB (DOJ 2021; Mandiant), whose raison d'etre is sanctions-evasion revenue generation."
      ruled_out: |
        Attested: no cited source on this event states the terminal
        weapons-program-financing purpose in substance — the cited
        DOJ/Mandiant sources name only the proximate regime-revenue /
        sanctions-evasion goal (0 "weapons of mass destruction" hits).
        The CISA AA20-239A WMD/ballistic-missile linkage that carries
        this inference on the campaign-level sibling is NOT cited here.
        Pure-criminal (non-state) financial crime is ruled out by the
        DPRK-state attribution.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/bangladesh-bank
    role: primary
    outcome: $81M stolen via SWIFT Alliance Access manipulation; remainder of the ~$951M attempted was blocked.
  - target_id: orgs/ny-fed  # FLAG: no registry file atlas/targets/orgs/ny-fed.yaml exists (dangling target_id, referenced only by this event) — orchestrator to create. Substantively correct + sourced: DOJ 2018 names the "Federal Reserve Bank of New York (FRBNY)"; BAE names the "FEDERAL RESERVE BANK".
    role: transit
    outcome: Held Bangladesh Bank's USD account and processed the fraudulent SWIFT transfer instructions before the pattern was detected.
