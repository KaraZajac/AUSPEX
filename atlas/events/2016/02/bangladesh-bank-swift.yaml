id: 2016-02/bangladesh-bank-swift
name: Bangladesh Bank SWIFT heist
start_date: 2015-08-01  # network-dwell pre-positioning; sourced anchors: recon "as early as October 7 and 8, 2014" and Philippine mule accounts "created in the Philippines in May 2015" (DOJ 2018 complaint)
disclosure_date: 2016-02-05
end_date: 2016-02-08
incident_type:
  - financial-theft
  - intrusion
initial_vector: phishing
outcome_summary: |
  Long-dwell network compromise (months of pre-positioning)
  inside Bangladesh Bank with SWIFT Alliance Access message
  manipulation; printer-output suppression to delay detection
  over a weekend. Fraudulent transfer instructions were sent
  via the New York Fed (FRBNY) correspondent account; $81M
  routed to accounts in the Philippines and $20M to Sri Lanka
  (the Sri Lanka leg stopped by the recipient bank) before the
  remainder of the ~$951M attempted was blocked. The majority
  of the $81M was never recovered. Largest publicly-confirmed
  bank cyber-heist of its time and the defining SWIFT heist of
  the APT38 campaign.
quantified_impact:
  usd_stolen: 81000000       # DOJ 2018 complaint: "$81,000,000"; BAE: "$81m is still unaccounted for"
  usd_attempted: 951000000   # BAE Systems: "attempted to steal $951m"; DOJ 2018: attempt "approached $1 billion"
  # usd_recovered omitted: no cited source states a recovery figure — DOJ 2018 says "The
  # majority of the $81,000,000 has not been recovered to date"; BAE (Apr-2016) says the
  # $81M was "still unaccounted for". The widely-reported ~$15M RCBC/Philippine-court
  # recovery is post-dating and carried by none of the cited sources.
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Sep 2018 complaint + Feb 2021 indictment
  - jon-chang-hyok  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
  - kim-il  # DPRK RGB / Lab 110, DOJ Feb 2021 superseding indictment
summary: |
  The defining SWIFT heist of the APT38 campaign — though not
  its first: Mandiant dates APT38 operations to 2014 and lists
  the December-2015 Vietnam TP Bank heist ahead of it. The DOJ
  February 2021 three-hacker indictment attributed the operation
  to RGB personnel (Lab 110 per the 2018 Park Jin Hyok complaint),
  including Park Jin Hyok. Initial access was via spear-phishing
  of bank staff; the intrusion used the Nestegg backdoor (DOJ
  2018: "a backdoor that was used in connection with … intrusions
  at financial institutions, including at Bangladesh Bank"), and
  operators dwelled for months mapping the SWIFT Alliance Access
  environment, harvested valid credentials (Mimikatz-class
  dumping, per Mandiant), and used the DYEPACK toolkit on the
  SWIFT workstation to manipulate outgoing SWIFT payment messages
  while patching the Alliance Access nroff-based print routine and
  Oracle database so confirmation receipts would not print on the
  bank's monitoring printer over the Bangladesh weekend (BAE:
  "submitted for printing by using another executable file called
  nroff.exe"). A cleanup component then deleted the operation's
  own artifacts to frustrate forensic recovery. DOJ 2021 frames
  the theft as furthering "the strategic and financial interests
  of the DPRK government and its leader, Kim Jong Un" under
  sanctions pressure; no cited source states the terminal
  weapons-program-financing goal (see doctrine note).
