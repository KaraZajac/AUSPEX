    late January" 2017). disclosure 2017-02-12 verified against the
    Symantec snapshot published_on and BAE's same-day post.
    [d] DOCTRINE — corrected. kp/byungjin/sanctions-evasion-revenue kept
    (era-correct; matches the Bangladesh/Banco-del-Austro/Tien-Phong
    siblings — the 8th-Congress plan is 2021, anachronistic here), but
