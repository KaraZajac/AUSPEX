    Added the three watering-hole host sites (KNF/knf.gov.pl, CNBV Mexico,
    BROU Uruguay), the Silverlight CVE-2016-0034, and the DOJ "discovered
    before funds stolen" fact.
    [b] ATTRIBUTION — corrected. actor_id kp/rgb/apt38 -> kp/rgb/lazarus:
    Symantec, BAE and the DOJ complaint all name "Lazarus Group"; the APT38
    (Mandiant, Oct 2018) and BlueNoroff (Kaspersky, Apr 2017) sub-labels
    postdate this Feb-2017 disclosure, so attributing to a sub-cluster is
    anachronistic over-attestation. Split the single "Symantec + BAE"
