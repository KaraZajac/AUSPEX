    [e] ATTRIBUTION_LEVEL — added named-actor on all three attributions
    (sources name the Lazarus Group; the DOJ individual/unit detail is
    carried in operators_named).
    [f] ACTOR_ID — kp/rgb/lazarus resolves (atlas/actors/kp/lazarus.yaml,
