id: 2016-10/lazarus-polish-banks
name: Lazarus watering-hole campaign against Polish & global banks
start_date: 2016-10-07  # earliest evidenced KNF (knf.gov.pl) code modification — BAE: "from at least 2016-10-07"
disclosure_date: 2017-02-12  # Symantec + BAE Systems simultaneous disclosure (badcyber.com first flagged the Polish incident 2017-02-03)
end_date: 2017-01-31  # watering-hole code active "to late January" 2017 per BAE, then discovered/removed
incident_type:
  - intrusion
  - pre-positioning  # watering-hole recon/pre-positioning; NO valid "watering-hole" enum value, and "financial-theft" refuted (no funds stolen)
initial_vector: n-day  # KNF watering hole delivered Silverlight (CVE-2016-0034 / MS16-006, patched Jan 2016) + Flash exploits — n-day at time of use, Oct 2016
outcome_summary: |
  DPRK-attributed Lazarus actors compromised the website of the
  Polish Financial Supervision Authority (KNF, knf.gov.pl) — and,
  per BAE, Mexico's CNBV banking regulator and a state-owned
  Uruguayan bank (BROU) — to run watering-hole attacks against
  financial-institution visitors. Custom JavaScript fingerprinted
  visitors to filter targets of interest before delivering
  Silverlight (CVE-2016-0034) and Flash exploits and the
  Downloader.Ratankba / Backdoor.Destover payloads. Symantec
  reported the watering holes attempted to infect more than 100
  organizations across 31 countries; BAE's targeted-bank tally was
  concentrated in Poland, the United States, Mexico, the United
  Kingdom, Chile and Brazil. Per the 2018 DOJ Park Jin Hyok
  complaint, the intrusion was likely discovered before any funds
  were stolen.
false_flag_risk: none
campaign_id: null  # RE-SCOPED (see qc / FLAG): distinct Lazarus watering-hole pre-positioning op — NOT the apt38-swift-bank-heists SWIFT-theft series (no SWIFT fraud, no funds moved, attributed to the Lazarus umbrella, not specifically APT38)
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110 "Lazarus Group" programmer; the DOJ Sep 2018 complaint references the KNF watering-hole campaign (bot-walled primary; mirror-corroborated)
summary: |
  A Lazarus watering-hole operation extending the cluster's
  financial-sector pre-positioning to broad-spectrum targeting via
  compromise of bank-supervisory authorities. Symantec's 12 February
  2017 disclosure named Lazarus on the basis of shared loader code
  (Downloader.Ratankba, Backdoor.Destover) matching the group's known
  toolkit, plus infrastructure overlap with Sony Pictures (2014) and
  Bangladesh Bank (2016). BAE Systems co-reported the same day but
  cautioned that "the technical/forensic evidence to link the Lazarus
  group actors ... to the watering-hole activity is unclear." The
  campaign long predates the APT38 (Mandiant, Oct 2018) and BlueNoroff
  (Kaspersky, Apr 2017) sub-cluster labels, so AUSPEX attributes it to
  the Lazarus umbrella actor as the disclosing sources did.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: Symantec Security Response
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2017-02-12
    attribution_source_id: symantec/2017-02-12_lazarus-banks
    notes: |
      Symantec named Lazarus on shared loader code (Downloader.Ratankba,
      Backdoor.Destover) and infrastructure overlap with prior Lazarus
      operations (Sony 2014, Bangladesh Bank 2016).
  - actor_id: kp/rgb/lazarus
    attributing_org: BAE Systems
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2017-02-12
    attribution_source_id: baesystems/2017-02-12_lazarus-watering-hole-attacks
    notes: |
      BAE tied known Lazarus implants found on victim bank networks to
      the campaign but explicitly hedged the watering-hole link: "the
      technical/forensic evidence to link the Lazarus group actors ...
      to the watering-hole activity is unclear." Hence moderate /
      concur-with-caveat rather than high.
  - actor_id: kp/rgb/lazarus
    attributing_org: US DOJ / FBI
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2018-09-06
    attribution_source_id: doj/2018-09-06_park-jin-hyok-complaint
    notes: |
      The Park Jin Hyok criminal complaint attributed the KNF
      watering-hole campaign to the DPRK "Lazarus Group" and states the
      intrusion was likely discovered before funds were stolen. Primary
      is Akamai bot-walled (un-snapshottable); Polish-campaign coverage
      mirror-corroborated by C4ISRNET / Seattle Times / National
      Security Archive summaries of the complaint.
doctrine_links:
  - doctrine_id: kp/byungjin
    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Byungjin-window (2013–2018) hard-currency pre-positioning: a
      Lazarus watering-hole operation against the global banking sector,
      matching the cluster's sanctions-evasion revenue mission.
      strongly_inferred, NOT attested — no cited source states the
      terminal weapons-program-financing purpose of THIS operation; the
      DOJ complaint records that the intrusion was discovered before any
      funds were taken, and the Symantec/BAE reports speak to tooling and
      targeting, not strategic intent. (The kp/8th-congress-defense-plan
      revenue pillar is era-inapplicable: that doctrine issued
      2021-01-09, ~4 years after this 2016 operation; era siblings —
      Bangladesh Bank, Banco del Austro, Tien Phong — all anchor to the
      Byungjin pillar.)
    attesting_source_id: null
    inference_basis:
      signals:
        - "Lazarus is a financially-motivated DPRK cluster whose mission is hard-currency generation under sanctions (Symantec, BAE; later Treasury/DOJ)."
        - "The operation targets the global banking sector via financial-regulator watering holes inside the Byungjin window — the cluster's signature revenue pre-positioning tradecraft."
      ruled_out: |
        Pure-criminal (non-state) financial crime is ruled out by the
        DPRK-state attribution; an espionage/sabotage-only reading is
        ruled out by the exclusively financial-sector targeting and the
        Downloader.Ratankba financial-reconnaissance payload.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/knf-poland-financial-supervision  # normalized 2026-07-10 from malformed orgs/polish-kn-financial-supervision (typo; referenced nowhere else)
    country: pl
    role: staging
    outcome: |
      KNF website (knf.gov.pl) code modified from ~2016-10-07 to serve
      the watering-hole exploit chain to visiting financial institutions.
  - target_id: orgs/cnbv-mexico
    country: mx
    role: staging
    outcome: |
      Mexico's CNBV banking-regulator site used as a second watering
      hole (per BAE Systems).
  - target_id: sectors/finance/banking
    country: pl
    role: primary
    outcome: |
      Financial-institution visitors profiled/targeted worldwide (most
      concentrated in Poland, then the US, Mexico, UK, Chile, Brazil);
      no confirmed theft.
sources:
  - symantec/2017-02-12_lazarus-banks
  - baesystems/2017-02-12_lazarus-watering-hole-attacks
  - doj/2018-09-06_park-jin-hyok-complaint
qc:
  verified_by: claude-opus-4.8
  effort: max
