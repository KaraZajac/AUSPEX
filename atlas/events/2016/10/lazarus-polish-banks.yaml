  level: partial
  notes: |
    Full 6-point audit vs RAW cited sources. Snapshots (PRESERVE tier):
    Symantec sha b7e61f7cf5964eae4b7e0beffce4b7b5113dd6728c7a99d51d7c0074288abed9
    (Wayback 2020-02-24 capture of symantec.com/connect); BAE Systems sha
    f116d40e017e435efeed2c7f927aa1d801cf9e2ddf42da5c789723fc95ffc949 (live
    baesystemsai.blogspot.com). level=partial: the DOJ Park Jin Hyok
    complaint is Akamai bot-walled (un-snapshottable) and uniquely carries
    the operator naming + "discovered before theft"; those facts are
    mirror-corroborated, but per protocol a bot-walled load-bearing source
    caps this at partial. NB the Symantec snapshot is the Angular-SPA shell:
    the article body is JS-rendered and not in the raw, so Symantec's
    load-bearing claims here rest on the captured page metadata (og:/meta
    description + content_item_tags), with the article-body detail
    corroborated by the full-text BAE snapshot + secondaries.

    [a] FACTS — corrected. FABRICATION stripped: the summary said Lazarus
    loader "RATANKBAPOS" — the raw names "Downloader.Ratankba" (+
    "Backdoor.Destover"), confirmed verbatim in the Symantec snapshot's
    meta content_item_tags ("...Backdoor.Destover, banks,
    Downloader.Ratankba, financial, Lazarus"). FABRICATED country list
    fixed: outcome_summary claimed victims in "Poland, Mexico, Uruguay,
    Costa Rica, the Philippines, and Brazil" — Costa Rica and the
    Philippines appear in NEITHER Symantec nor BAE; Uruguay was a
    watering-hole HOST (BROU), not a victim-bank country. Corrected to the
    snapshotted BAE targeted-bank concentration (Poland, US, Mexico, UK,
    Chile, Brazil) — SecurityWeek's Symantec précis lists Poland, US,
    Mexico, Brazil, Chile, Denmark, Venezuela, Colombia, UK, Peru, India.
    "104 organizations across 31 countries" softened to "more than 100
    organizations across 31 countries" — the only figure in the Symantec
    snapshot is the og:description "more than 100 organizations in 31
