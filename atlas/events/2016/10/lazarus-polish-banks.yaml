id: 2016-10/lazarus-polish-banks
name: Lazarus watering-hole campaign against Polish & global banks
start_date: 2016-10-01
disclosure_date: 2017-02-12
end_date: 2017-02-28
incident_type:
  - intrusion
  - financial-theft
  - supply-chain
initial_vector: supply-chain  # KNF website watering hole
outcome_summary: |
  DPRK-attributed actors compromised the Polish Financial
  Supervision Authority (KNF) website to host a watering-hole
  exploit kit (custom JavaScript fingerprinting + Silverlight
  and Flash exploits) targeting financial-institution visitors.
  Symantec and BAE Systems reported 104 organizations across 31
  countries hit — including banks in Poland, Mexico, Uruguay,
  Costa Rica, the Philippines, and Brazil. The operation was the
  first publicly observed Lazarus shift from direct
  payment-system fraud (Bangladesh Bank, Tien Phong) to
  watering-hole-enabled mass financial-institution targeting.
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
operators_named:
  - park-jin-hyok  # DPRK RGB / Lab 110, DOJ Sep 2018 complaint references this campaign
summary: |
  The Polish-banks campaign extends APT38's SWIFT-era operational
  playbook to broad-spectrum financial-sector pre-positioning
  via supervisory-authority compromise. Symantec's February 2017
  disclosure named Lazarus on the basis of shared loader code
  (RATANKBAPOS, Destover-family) and infrastructure overlap with
  Sony Pictures (2014) and Bangladesh Bank (2016).
attributions:
  - actor_id: kp/rgb/apt38
    attributing_org: Symantec + BAE Systems
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2017-02-12
    attribution_source_id: symantec/2017-02-12_lazarus-banks
    notes: |
      Both Symantec and BAE Systems concurrent reporting tied
      the watering-hole loader code and infrastructure to the
      Lazarus / APT38 cluster.
doctrine_links:
