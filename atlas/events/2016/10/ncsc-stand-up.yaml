id: 2016-10/uk-ncsc-stand-up
name: UK NCSC formally stands up inside GCHQ
start_date: 2016-10-03
disclosure_date: 2016-10-03
end_date: 2016-10-03
incident_type:
  - doctrine-publication
initial_vector: unknown
outcome_summary: |
  Formal stand-up of the National Cyber Security Centre as a
  unified UK national cyber-defence authority inside GCHQ.
  Consolidated CESG (the historic information-assurance arm of
  GCHQ), CERT-UK, CPNI's cyber function, and the Centre for Cyber
  Assessment. Headquartered at Nova South, Victoria, London.
false_flag_risk: none
summary: |
  Founding event of the modern UK defensive cyber posture.
  Anchored to the NCS 2016 publication (one month later) but the
  organisational stand-up itself is the load-bearing
  operational-doctrine event for all subsequent NCSC advisories
  and joint Five-Eyes attribution activity.

  Operational expressions launched at or shortly after stand-up:
  the Active Cyber Defence Programme (Protective DNS, Web Check,
  Mail Check, Takedown Service), the Cyber Assessment Framework,
  CiSP, and the first NCSC Annual Review (2017).
