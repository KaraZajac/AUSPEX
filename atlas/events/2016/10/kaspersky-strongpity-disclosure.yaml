id: 2016-10/kaspersky-strongpity-disclosure
name: Kaspersky discloses StrongPity watering-hole campaign against encryption-tool users
start_date: 2016-05-01
disclosure_date: 2016-10-03
end_date: null
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Kaspersky published the first detailed analysis of the
  StrongPity malware family, documenting trojanized installers
  of legitimate encryption tools (WinRAR, TrueCrypt) delivered
  via compromised download mirrors to users in Italy, Belgium,
  Algeria, and other countries. Subsequent vendor and Citizen
  Lab work tied the cluster (under the name PROMETHIUM) to
  Turkish state interests, with Türk Telekom-mediated ISP-level
  redirection documented in the 2018 Citizen Lab "Bad Traffic"
  report.
false_flag_risk: none
summary: |
  Foundational disclosure of the StrongPity tooling family, the
  long-running staple of what subsequent reporting tied to the
  PROMETHIUM / Turkish-aligned cluster. The 2018 Citizen Lab
  "Bad Traffic" report extended attribution by documenting
  Türk Telekom-network-level injection of StrongPity-aligned
  payloads against users connecting to specific commodity-
  software download sites.
attributions:
  - actor_id: tr/mit/promethium
    attributing_org: Kaspersky (Securelist)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-10-03
    attribution_source_id: kaspersky/2016-10_strongpity-watering-hole
    notes: |
      Kaspersky's 2016 disclosure did not name a sponsor; the
      Turkish-aligned attribution rests on subsequent Citizen
      Lab and Bitdefender work documenting ISP-level injection
      via Türk Telekom infrastructure.
