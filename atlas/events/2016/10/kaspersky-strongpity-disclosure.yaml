id: 2016-10/kaspersky-strongpity-disclosure
name: Kaspersky discloses StrongPity watering-hole campaign against encryption-tool users
start_date: 2016-05-24  # earliest raw-attested watering-hole delivery: winrar[.]it "started serving these executables ... on 5/24" (2016)
disclosure_date: 2016-10-03
end_date: 2016-09-30  # last watering-hole activity Kaspersky documents: deployment "continued mostly within Turkey in July and September 2016"
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Kaspersky published the first detailed analysis of the
  StrongPity malware family, documenting trojanized installers
  of legitimate encryption tools (WinRAR, TrueCrypt) delivered
  through manipulated software-distributor sites and
  attacker-controlled download mirrors to users concentrated in
  Italy, Belgium, and Algeria (with Turkey and France also in the
  top-five infected countries). Subsequent vendor and Citizen
  Lab work tied the cluster (under the name PROMETHIUM) to
  Turkish state interests, with Türk Telekom-mediated ISP-level
  redirection documented in the 2018 Citizen Lab "Bad Traffic"
  report.
false_flag_risk: none
summary: |
  Foundational disclosure of the StrongPity tooling family, the
  long-running staple of what subsequent reporting tied to the
  PROMETHIUM / Turkish-aligned cluster. The 2018 Citizen Lab
  "Bad Traffic" report extended attribution by documenting
  Türk Telekom-network-level injection of StrongPity-aligned
  payloads against users connecting to specific commodity-
  software download sites.
attributions:
  - actor_id: tr/unscoped/promethium
    attributing_org: Kaspersky (Securelist)
    attributing_org_confidence: moderate
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-10-03
    attribution_source_id: kaspersky/2016-10_strongpity-watering-hole
    notes: |
      Kaspersky (Securelist, Kurt Baumgartner) named ONLY the
      "StrongPity" malware/APT cluster and made NO nation, state,
      or sponsor attribution — verified against the raw snapshot:
      "Turkey" appears solely as victim geolocation (top-five
      infected countries "Italy, Turkey, Belgium, Algeria, and
      France"), and the words government / state / Turkish /
      sponsor / PROMETHIUM do not occur anywhere in the report.
      The cluster name PROMETHIUM is Microsoft's designation (Dec
      2016), not Kaspersky's — hence attribution_level:
      activity-cluster and auspex_assessment: concur-with-caveat.
      Corrected a prior note that credited Bitdefender with the
      Türk Telekom ISP-injection finding: that finding is Citizen
      Lab's ("Bitdefender" = 0 occurrences in the Citizen Lab raw),
      and Bitdefender's 2020 report is not cited on this event.
      Held at moderate for consistency with the sibling 2020
      talos-promethium-strongpity3 event.
  - actor_id: tr/unscoped/promethium
    attributing_org: Citizen Lab (University of Toronto)
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2018-03-09
    attribution_source_id: citizenlab/2018-03-09_bad-traffic-strongpity
    notes: |
      The Turkish-state nexus that the tr/unscoped/promethium id
      encodes derives from Citizen Lab's 2018 "Bad Traffic" report,
      NOT from the 2016 Kaspersky disclosure. Citizen Lab documents
      Türk Telekom-network middleboxes redirecting "hundreds of
      users in Turkey and Syria to nation-state spyware" and notes
      the injected spyware was "similar to that used in the
      StrongPity APT attacks" — a NATION-level attribution of the
      injection operation. It is explicitly hedged on the cluster
      itself: "StrongPity was an unattributed APT operation in
      2016." It names the MİT (Milli İstihbarat Teşkilatı) only as
      surveillance-law background (Law No. 6532), never as the
      operator — hence tr/unscoped (no service named) and
      attribution_level: nation. concur-with-caveat: the
      cluster<->injection tie is by tooling similarity, not a hard
      identity.
doctrine_links:
  - doctrine_id: tr/counter-gulen-kurdish-surveillance
    pillar_id: null
    program_id: null
    confidence: plausible
    perspective: attacker-rationale
    reasoning: |
      The 2016 Kaspersky disclosure documents targeting of
      encryption-tool users concentrated in Italy, Belgium, and
      Algeria (with Turkey and France in the top five) — it does
      NOT document Kurdish- or Gülen-specific victimology, so
      neither doctrine pillar is asserted (pillar_id null). The
      Turkish-aligned surveillance reading rests on the later
      cited Citizen Lab "Bad Traffic" report (2018), which
      documents Türk Telekom-mediated, nation-state ISP-level
      injection of StrongPity-similar spyware — a nation-level
      signal, not a diaspora-targeting one. Held at plausible: the
      doctrinal fit is directional (a Turkish-state surveillance
      nexus) rather than victim-specific in this event's own
      cited sources.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Turkish-state diaspora-surveillance posture: the encryption-tool-user victimology plus the later Türk Telekom nation-state injection (Citizen Lab 2018) fit the broader TR surveillance pattern, but neither cited source documents Kurdish / Gülen victim selection for THIS 2016 campaign."
        - "Generic espionage against privacy-conscious users: Kaspersky documents only that victims were users of encryption tools (WinRAR / TrueCrypt) across Europe, North Africa, and Turkey, with no cited evidence tying the target set to a specific TR political-opposition class."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/encryption-tool-users-europe
    role: primary
