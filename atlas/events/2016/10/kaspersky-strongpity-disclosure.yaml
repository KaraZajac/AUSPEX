  - kaspersky/2016-10_strongpity-watering-hole
  - citizenlab/2018-03-09_bad-traffic-strongpity
qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-10
  level: full
  notes: |
    Full 6-point audit against BOTH cited raw snapshots (hashes
    RECOMPUTED, match the source records exactly): kaspersky__2016-
    10_strongpity-watering-hole.html (sha256 2e23998b…e9ef822d,
    197,447 bytes) and citizenlab__2018-03-09_bad-traffic-
    strongpity.html (sha256 f2f803b7…d6b043fe, 321,174 bytes).
    BITDEFENDER-MISLABEL check CLEARED: the cited primary IS the real
    Kaspersky (Securelist) StrongPity article (Kurt Baumgartner, 03
    Oct 2016), not a mislabeled Bitdefender record; and the event's
    prior attribution note wrongly co-credited Bitdefender with the
    Türk Telekom ISP-injection finding — that finding is Citizen
    Lab's alone ("Bitdefender" = 0 occurrences in the Citizen Lab
    raw; Bitdefender is not even a cited source here). Fixed. Neither
    source is a phantom; NO re-sourcing needed.

    [a] FACTS — all load-bearing claims carried by the raw. Kaspersky
    raw confirms: trojanized installers of WinRAR and TrueCrypt
    ("trojanized WinRAR installers hosted from the winrar.it site
    itself"; "poisoned TrueCrypt installer redirects"; "Both WinRAR
    and TrueCrypt help provide strong and reliable encryption");
    watering-hole delivery via manipulated legit distributor sites
    ("placed links on a legitimate 'certified distributor' site in
    Europe to redirect to their poisoned installers") + attacker
    hosts (ralrab[.]com, true-crypt[.]com); victim concentration
    "the country with the overwhelming number of detections was in
    Italy followed by Belgium and Algeria" and overall "top five
    countries include Italy, Turkey, Belgium, Algeria, and France."
    Tightened outcome_summary's loose "compromised download mirrors"
    to "manipulated software-distributor sites and attacker-
    controlled download mirrors" (Kaspersky does not assert the
    distributor sites were compromised), and added the Turkey/France
    top-five detail. No fabricated malware/CVE/victim/figure found.

    [b] ATTRIBUTION — corrected over-reach and split by source
    (mirrors the sibling 2016-10 fruityarmor pattern). Kaspersky
    names ONLY the "StrongPity" activity cluster and makes NO nation/
    state/sponsor attribution (verified 0 occurrences of government /
    state / Turkish / sponsor / PROMETHIUM in the raw; "Turkey" =
    victim geolocation only) → attribution_level: activity-cluster,
    moderate, concur-with-caveat. Added a second, dated Citizen Lab
    entry (2018-03-09) that actually carries the Turkish-state nexus
    the tr/ id encodes: Citizen Lab attributes the Türk Telekom
    injection to "nation-state spyware" (nation level) but calls
    StrongPity "an unattributed APT operation in 2016" and names the
    MİT only as Law-No.-6532 background, never as operator →
    attribution_level: nation, moderate, concur-with-caveat (cluster
    tie is by tooling similarity: "similar to that used in the
    StrongPity APT attacks"). PROMETHIUM is Microsoft's Dec-2016
    name, noted.

    [c] DATES. disclosure_date 2016-10-03 CONFIRMED (raw byline "03
    Oct 2016"). start_date corrected 2016-05-01 (unsourced round) →
    2016-05-24, the earliest raw-attested watering-hole delivery
    (winrar[.]it "started serving these executables ... on 5/24";
    winrar[.]be→ralrab[.]com first redirect "May 28th, 2016").
    end_date corrected null → 2016-09-30, the last activity month
    Kaspersky documents ("deployment of the installers continued
    mostly within Turkey in July and September 2016") — bounding THIS
    watering-hole campaign, whose infrastructure the Oct disclosure
    burned; the StrongPity cluster itself remains active (modeled on
    the actor record, not here). Citizen Lab published_on 2018-03-09
    consistent with the event's "2018 ... 'Bad Traffic' report" prose
    (source tier/hash re-verified 2026-06-28).

    [d] DOCTRINE_LINK. tr/counter-gulen-kurdish-surveillance held at
    plausible (correct: this event's sources support a directional
    Turkish-state surveillance nexus, NOT victim-specific diaspora
    targeting). NOT attested → attesting_source_id null. pillar_id
    kept null — honest: Kaspersky documents encryption-tool users in
    Italy/Belgium/Algeria/Turkey/France, no Kurdish/Gülen victimology
    (unlike the 2020 sibling, which uses the kurdish-diaspora pillar
    off Talos/Bitdefender). Removed the reasoning's lean on the
    uncited "2020 Bitdefender Syrian-Kurd reporting" and regrounded
    it on the two cited sources; added perspective: attacker-rationale
    (Turkey's own doctrine on a Turkish operation) and inference_basis
    {alternatives} (diaspora-surveillance vs generic-privacy-user
    espionage).

    [e] ATTRIBUTION_LEVEL. Added on both entries (was absent):
    activity-cluster (Kaspersky/StrongPity), nation (Citizen Lab/
    Türk Telekom nation-state injection).

    [f] ACTOR_ID. tr/unscoped/promethium resolves (actor file
    atlas/actors/tr/promethium.yaml, id: field tr/unscoped/promethium
    — FK resolves by id, not path). Actor already audited/demoted
    tr/mit→tr/unscoped 2026-06-25 (no cited source names the MİT as
    operator); correct as-is, NOT reverted. Directionality correct:
    the encryption-tool users are the primary TARGETS (victims), role
    primary. Not a counter-action, so actor_id populated (no meta
    incident_type needed).

    NB DATA-INTEGRITY FLAG (out of scope — orchestrator): target FK
    orgs/encryption-tool-users-europe has NO registry file under
    atlas/targets/ (corpus-wide deferred-targets registry gap; the
    sibling's orgs/strongpity3-various-international is likewise
    unregistered). Kept the FK as the most faithful victim
    representation; validator-informational, not fixed here. Minor:
    the target NAME says "europe" but the victim set also spans North
    Africa (Algeria, Morocco, Tunisia, Côte d'Ivoire) and Turkey —
    flagged for the target record if/when created.
    incident_type [intrusion, supply-chain] + initial_vector
