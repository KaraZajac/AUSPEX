id: 2016-08/forcepoint-monsoon-disclosure
name: Forcepoint publishes "Monsoon" — Indian-aligned multi-year cyber-espionage campaign
start_date: 2015-12-01  # Forcepoint dates MONSOON itself to "December 2015"; the "since at least 2010" date in the report is the broader OPERATION HANGOVER adversary lineage (cited to ref [2]), not Monsoon's own window
disclosure_date: 2016-08-08
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Forcepoint Security Labs published "Monsoon — Analysis of an
  APT Campaign" (Rev 1.07, TLP-WHITE), an espionage campaign
  Forcepoint dates to December 2015 and ties — at "highly
  probable" confidence — to the same adversary as Operation
  Hangover, "active since at least 2010." Delivery was via
  weaponised Office documents (CVE-2012-0158, CVE-2014-6352,
  CVE-2015-1641, plus a possible Silverlight stage) emailed to
  chosen targets with topical-news decoys, dropping BADNEWS,
  TINYTYPHON, an AutoIt backdoor, and Unknown Logger; intent
  was data exfiltration ("steal sensitive data"). Forcepoint's
  named "Victims of Interest" are government agencies, armed
  forces, and embassies in the Indian Subcontinent / Far East
  (Sri Lanka, Bangladesh, Pakistan, South Korea), with exfil
  themes spanning defence/naval/submarine, nuclear
  counter-proliferation, and UN material. A majority of raw
  victims (61%) sat in China, but Forcepoint frames these as
  "victims of opportunity" snared by China-military-strategy
  watering-hole lures (chinastrat[.com], cnmilit[.com],
  newsnstat[.com] — South-China-Sea / China-policy themes) and
  expressly hedges that the targeting of Chinese nationals "may
  also be related to this campaign, but equally may be part of
  a separate campaign … or even … selling Surveillance-As-A-
  Service." Forcepoint overlaps Monsoon with the Patchwork /
  Dropping Elephant clusters (Kaspersky, Cymmetria).
false_flag_risk: none
summary: |
  The most operationally detailed of the 2016 Patchwork-naming
  triad. Forcepoint's report ties Monsoon to the Operation
  Hangover lineage ("active since at least 2010") and documents
  a broad victim picture, but is explicit that it does NOT
  attribute: "Reports from Special Investigations do not focus
  on specific attribution." The only India nexus Forcepoint
  asserts is at the individual level — a person identified from
  a domain-registration record who "lives or has lived and
  works in India" — and it declines to name even that person
  ("not deemed in the public interest"). No Indian state organ
  is named; the "Cui Bono?" question is "left as an exercise …
  for reader." The "Monsoon" label has since fallen out of
  common vendor use in favor of "Patchwork," though some
  references retain "Monsoon" for the specific 2016 Forcepoint
  disclosure.
attributions:
  - actor_id: in/unscoped/patchwork
    attributing_org: Forcepoint Security Labs
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-08-08
    attribution_source_id: forcepoint/2016-08_monsoon-apt
    notes: |
      Confidence/assessment softened on 2026-06-25 audit against the full
      Forcepoint PDF. Forcepoint EXPRESSLY DECLINES specific attribution
      ("Reports from Special Investigations do not focus on specific
      attribution"). What Forcepoint asserts at high confidence is (a)
      Monsoon == the Operation Hangover adversary ("highly probable"), and
      (b) an individual↔Monsoon association from a domain-registration record
      ("highly probable level of confidence") — that individual "lives or has
      lived and works in India," which is the ONLY India nexus in the report,
      and at the individual (not state-organ) level. Forcepoint names no
      Indian service. attribution_level held at `nation` (India-nexus asserted
      via the individual) rather than `named-actor`/`named-unit`; org
      confidence dropped high→moderate and assessment concur→concur-with-caveat
      because the India-STATE reading is AUSPEX's cluster inference, not
      Forcepoint's claim. Actor correctly in/unscoped/patchwork (demoted from
      in/ntro/patchwork 2026-06-24: no cited source names the NTRO or any
      Indian service).
doctrine_links:
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/china-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Heavy China-policy collection signal: 61% of victims sit
      in China, snared by China-military-strategy watering-hole
      lures (chinastrat[.com], cnmilit[.com], newsnstat[.com])
      themed on the South China Sea and PRC defence/statecraft
      (e.g. "2016_China_Military_PowerReport"). Held at
      strongly_inferred — NOT attested — because Forcepoint
      itself hedges that the Chinese-national targeting "may
      also be related to this campaign, but equally may be part
      of a separate campaign … or … Surveillance-As-A-Service,"
      and frames these as victims of opportunity, not a confirmed
      PRC-institutional collection set. (Reasoning corrected
      2026-06-25: the prior "diplomatic, military, research" PRC
      institutions claim is not supported by the report — there
      is no "research institutions" victim itemisation.)
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - 61% of all victims located in China; majority "snared" by China-military-strategy lure sites
        - Watering-hole and email lures themed on South-China-Sea / PRC defence policy (chinastrat[.com], cnmilit[.com], newsnstat[.com])
        - 'Actor (Patchwork) has a documented PRC-collection dimension across the cluster (Kaspersky "Dropping Elephant" — victims "all involved with China''s foreign relations")'
      ruled_out: |
        Forcepoint's own alternative — that the Chinese-national
        targeting is a SEPARATE campaign or commercial
        Surveillance-As-A-Service — is the reason this is not
        attested. The China-collection reading is the AUSPEX
        inference (corroborated by the Kaspersky/Cymmetria
        cluster), not a Forcepoint claim; pure-opportunity /
        commercial-SaaS cannot be excluded from this single
        source alone, hence strongly_inferred rather than
        attested.
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/diplomatic-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Forcepoint's named "Victims of Interest" are government
      agencies, armed forces, and embassies across the Indian
      Subcontinent / Far East (Sri Lanka, Bangladesh, Pakistan,
      South Korea), and the exfiltrated-document themes include
      "Defence attaches and consulates," "Foreign high
      commissions," and UN material — the regional diplomatic /
      counterterrorism collection mix this pillar encodes.
      (Reasoning corrected 2026-06-25: the prior "African and
      Middle Eastern diplomatic posts in PRC-equity contexts"
      framing overstated the source, which lists only "Africa
      and the Far East" among victim origins with no
      PRC-equity-diplomatic itemisation.)
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      signals:
        - 'Forcepoint "Victims of Interest": Government Agencies, Armed Forces, Embassies (Sri Lanka, Ceylon, South Korean)'
        - 'Exfil themes: "Defence attaches and consulates", "Foreign high commissions", United Nations material'
        - Victims also originate from "Bangladesh, Sri Lanka and Pakistan" and "further afield, including Africa and the Far East"
      ruled_out: |
        A purely Pakistan-military reading (the sibling pillar)
        does not account for the embassy / foreign-high-commission
        / consulate diplomatic set, which is regional and
        cross-country — diplomatic-collection fits that strand
        specifically. No source states the purpose, so not
        attested.
