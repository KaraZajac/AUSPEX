id: 2016-08/forcepoint-monsoon-disclosure
name: Forcepoint publishes "Monsoon" — Indian-aligned multi-year cyber-espionage campaign
start_date: 2010-12-01
disclosure_date: 2016-08-08
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Forcepoint Security Labs published "Monsoon — Analysis of an
  APT Campaign," documenting a multi-year cyber-espionage
  operation against Chinese and South Asian targets dating to at
  least 2010. Forcepoint tied Monsoon to the broader Patchwork
  / Dropping Elephant / Hangover continuum, with extended
  victim documentation across PRC diplomatic, military, and
  research institutions, plus African and Middle Eastern
  diplomatic targets in PRC-equity contexts.
false_flag_risk: none
summary: |
  The most operationally detailed of the 2016 Patchwork-naming
  triad. Forcepoint's report extended the timeline backward
  (to 2010) and broadened the geographic victim picture beyond
  the South Asian set. The "Monsoon" label has since fallen
  out of common vendor use in favor of "Patchwork," though
  some references retain "Monsoon" for the specific 2016
  Forcepoint disclosure.
