qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited vs the full Forcepoint "Monsoon — Analysis of an APT Campaign"
    PDF (Rev 1.07, TLP-WHITE, 58 pp.; raw on disk, sha256 e2770532…0c8526a
    re-confirmed; archive.org snapshot also present). Source fully fetchable
    → level: full.
    FACTS: confirmed — weaponised Office docs (CVE-2012-0158, CVE-2014-6352,
    CVE-2015-1641; possible Silverlight "something like CVE-2016-0034"),
    BADNEWS/TINYTYPHON/AutoIt-backdoor/Unknown-Logger, intent "Data
    Exfiltration," >172 lures, "Over 110 different victim countries and 6,300
    victim IP addresses." NB the prompt's premise "CVE-2014-4114/Sandworm" is
    a conflation — the report names CVE-2014-6352 (OLE Package Manager RCE),
    NOT CVE-2014-4114; "Sandworm" appears nowhere. Event YAML correctly listed
    no CVEs prior; CVEs now itemised in outcome_summary from the source.
    ATTRIBUTION (key finding): Forcepoint EXPRESSLY DECLINES specific
    attribution — "Reports from Special Investigations do not focus on specific
    attribution." The sole India nexus is an INDIVIDUAL from a domain-reg record
    who "lives or has lived and works in India" (Forcepoint declines to name even
    them); no Indian service / NTRO. "Cui Bono?" is "left as an exercise … for
    reader" → purpose NOT stated by the source. Actor in/unscoped/patchwork is
    correct (demoted from in/ntro/patchwork 2026-06-24).
    CORRECTIONS: (1) start_date 2010-12-01 → 2015-12-01 — Forcepoint dates
    Monsoon to "December 2015"; "since at least 2010" is the OPERATION HANGOVER
    adversary lineage (ref [2]), not Monsoon. (2) outcome_summary rewritten to
    source: dropped the unsupported "PRC diplomatic, military, and research
    institutions" claim (no "research institutions" in the report; China victims
    are "victims of opportunity," 61%, watering-hole-snared, and Forcepoint hedges
    they may be a SEPARATE campaign / SaaS); named the real "Victims of Interest"
    (regional govt/armed-forces/embassies — Sri Lanka, Bangladesh, Pakistan, South
    Korea) + exfil themes (naval/submarine, nuclear counter-proliferation, UN);
    added the CVE/malware detail. (3) summary now states Forcepoint's explicit
    non-attribution + individual-level India nexus. (4) attribution:
    attributing_org_confidence high→moderate, added attribution_level: nation,
    auspex_assessment concur→concur-with-caveat (the India-STATE reading is
    AUSPEX's cluster inference, not Forcepoint's), + clarifying notes. (5)
    doctrine_links: both kept (distinct pillars — china-collection vs
    diplomatic-collection — NOT a true duplicate despite the QC-PREPASS
    "duplicate" flag); reasonings corrected to source and inference_basis added;
    both honestly held at strongly_inferred / attesting null (Forcepoint states
    no purpose; the china-collection link's ruled_out records Forcepoint's own
    "separate campaign / SaaS" alternative). (6) China target role primary →
    collateral (victims of opportunity) with an outcome note.
    FLAGGED (out of scope — corpus-wide, not fixed here): both target_ids
    orgs/chinese-government and orgs/regional-foreign-ministries-various are
    DANGLING FKs (absent from atlas/targets/), shared with 3 other events
    (kaspersky-dropping-elephant-naming, patchwork-post-galwan-china-collection,
    groupib-sidewinder-pakistan-china). Registry entries should be created in a
    dedicated pass. UNCERTAINTY: the India-state attribution rests on the
    Patchwork actor-cluster mapping (Kaspersky/Cymmetria corroborate the cluster),
    not on this single Forcepoint source, which is why org confidence/assessment
    were softened rather than left at high/concur.
