    reasoning: |
      The DOJ Oct 2018 indictment states the strategic purpose at the
      goal level: the conspiracy's aim was to "undermine, retaliate
      against, and otherwise delegitimize" the international anti-doping
      bodies that exposed Russia's state-sponsored doping — i.e.,
      information confrontation in defence of regime prestige, the
      substance of the doctrine's info-psychological pillar. (Attests
      the strategic purpose, not the doctrine slug: the 2016 doctrine
      was formally issued Dec 2016, codifying the pre-existing
      "informatsionnoye protivoborstvo" concept that predates and
      frames this Aug–Oct 2016 operation.)
    attesting_source_id: doj/2018-10-04_morenets-wada-opcw-indictment
    inference_basis:
      source_quote: "Among the goals of the conspiracy was to publicize stolen information as part of an influence and disinformation campaign designed to undermine, retaliate against, and otherwise delegitimize the efforts of international anti-doping organizations and officials who had publicly exposed a Russian state-sponsored athlete doping program"
