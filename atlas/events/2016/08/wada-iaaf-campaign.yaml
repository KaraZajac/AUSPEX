id: 2016-08/wada-iaaf-campaign
name: WADA / IAAF / Olympic athlete medical records campaign
start_date: 2016-08-01
disclosure_date: 2016-09-13
end_date: 2016-10-31
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Spearphishing and Wi-Fi credential theft against the World
  Anti-Doping Agency, USADA, IAAF, and the medical records (TUEs)
  of 25+ Olympic athletes. Leaked via the "Fancy Bear" branded
  website as retaliation for the McLaren Report on Russian
  state-sponsored doping.
false_flag_risk: none
operators_named:
  - morenets-aleksei  # GRU Unit 26165, DOJ Oct 2018 WADA/OPCW indictment
  - serebriakov-evgenii  # GRU Unit 26165, DOJ Oct 2018
  - sotnikov-oleg  # GRU Unit 26165, DOJ Oct 2018
  - minin-alexey  # GRU Unit 26165, DOJ Oct 2018
  - yermakov-ivan  # GRU Unit 26165, DOJ Oct 2018
  - malyshev-artem  # GRU Unit 26165, DOJ Oct 2018
  - badin-dmitriy  # GRU Unit 26165, DOJ Oct 2018
summary: |
  The campaign extended through 2017–18 into a close-access
  operation against the OPCW Hague (Apr 2018) related to the
  Skripal Novichok inquiry. DOJ October 2018 indictment of
  Morenets et al. names retaliation for the McLaren Report
  (Russian doping consequences) as the strategic goal.
  Tradecraft per the indictment and Mandiant / FireEye APT28
  reporting: spear-phishing of WADA, USADA, and IAAF staff with
  weaponized Microsoft Office attachments delivering the X-Agent
  (CHOPSTICK) modular backdoor and the X-Tunnel network proxy,
  credential harvesting via the LOJAX UEFI implant precursor
  tooling and Mimikatz, and a hotel-room "close-access" Wi-Fi
  attack kit against WADA-anti-doping conference attendees in
  Brazil and Switzerland. The exfiltrated TUE medical records of
  25+ Olympic athletes were laundered through a "Fancy Bear"
  hack-and-leak website as retaliatory information confrontation.
