  notes: |
    Full 6-point audit vs RAW cited sources. Both sources snapshotted
    (PRESERVE tier; snapshot keys only). DOJ press release captured via
    Wayback id_ (live justice.gov URL now 301s to /archives/ and serves
    a JS shell): doj__2018-10-04_morenets-wada-opcw-indictment.html,
    sha256 ee28ae6d8da3dacb452e25438cd29c94302f99836a4f88134e13bda7dceb976d
    (52823 B). NCSC article is tombstoned (url:null) and post-2018
    captures are a JS-SPA shell; 2018-10-05 Wayback id_ carries the body:
    ncsc-uk__2018-10_reckless-campaign-of-cyber-attacks.html, sha256
    3b18d75d5c68b1673bee77082d338c94058c0ed3b17500928db4a2f425bb7b80
    (53910 B); archive_url repointed from the /web/2020/ shell.

    [a] FACTS — all load-bearing claims now carried by the DOJ primary.
    TUE leak verified: "stole credentials, medical records, and other
    data, including information regarding therapeutic use exemptions
    (TUEs)". Fancy-Bears persona verified: released "under the false
    auspices of a hacktivist group calling itself the 'Fancy Bears' Hack
    Team'" via "the website fancybears.net". Doping-retaliation motive
    verified (McLaren Report, x3). CORRECTED the athlete count: event
    said "25+ Olympic athletes" — DOJ states "private or medical
    information of approximately 250 athletes from almost 30 countries"
    (a ~10x undercount); fixed in outcome_summary + summary. Added
    DOJ-carried detail: spoofed WADA/TAS-CAS domains, spearphish of
    WADA+USADA employees, Rio de Janeiro hotel-Wi-Fi close-access,
    ~35 sporting/anti-doping bodies (WADA/USADA/CCES/IAAF/FIFA), ~111
    Russian athletes excluded from Rio, doctored releases, ~186-reporter
    outreach. STRIPPED as unsupported embellishment (0 hits in either
    cited source, verified by grep): X-Agent/CHOPSTICK, X-Tunnel, LOJAX
    (also anachronistic — ESET disclosed Sep 2018, a UEFI rootkit not
    "precursor tooling"), Mimikatz, "weaponized Microsoft Office
    attachments", and the uncited "Mandiant / FireEye" attribution.
    STRIPPED the OPCW-Hague conflation from the summary: it is a distinct
    event (atlas/events/2018/04/opcw-hague-interdicted.yaml) with its own
    operators/target/attribution — this event is scoped to the 2016
    anti-doping hack-and-leak.

    [b] ATTRIBUTION — DOJ high / concur retained. NCSC added as a second
    concurring govt-primary attribution ("the Russian Government - the
    Kremlin - was responsible"; "The GRU are associated with the names:
    APT 28 / Fancy Bear / Sofacy..."; "attempted to undermine
    international sporting institution WADA"). NB per DOJ the LEAK
    dissemination used "social media accounts and other infrastructure
    acquired and maintained by GRU Unit 74455" (Sandworm) — noted in
    prose + attribution comment; primary perpetrator of the intrusion/
    close-access is Unit 26165 (=actor_id), so attribution unchanged.

    [c] DATES — start 2016-08-01 (Rio close-access phase; DOJ anchors
    onset to "days after" the 18 Jul 2016 First McLaren Report — a late-
    Jul start is also defensible, kept Aug as the active-ops/Rio-Games
    window). disclosure 2016-09-13 (first fancybears.net leak, public
    record). end 2016-10-31 (2016 leak wave; DOJ notes outreach ran
    "From 2016 through 2018" but this event is bounded to the 2016 wave).
    Source published_on 2018-10-04 verified: DOJ byline "Thursday,
    October 4, 2018"; NCSC "Created: 04 Oct 2018".

    [d] DOCTRINE — confidence=attested retained. DOJ states the terminal
    goal verbatim (added as inference_basis.source_quote): the aim was to
    "undermine, retaliate against, and otherwise delegitimize the efforts
    of international anti-doping organizations ... who had publicly
    exposed a Russian state-sponsored athlete doping program" =
    information confrontation, the substance of the info-psychological
    pillar. Added perspective: attacker-rationale (Russian doctrine on
    Russia's own operation). Noted the doctrine was formally issued Dec
    2016 (post-op), codifying the pre-existing "informatsionnoye
    protivoborstvo" concept — attests the strategic purpose, not the slug
    (per the attested-reframe standard).

    [e] ATTRIBUTION_LEVEL — added named-unit to the DOJ attribution: the
    release names "Military Unit 26165" (and Unit 74455 for leak infra).
    NCSC attribution set to named-actor (names GRU + APT28/Fancy Bear,
    no numbered unit).

    [f] ACTOR_ID — ru/gru/26165/apt28 resolves to atlas/actors/ru/apt28.yaml
    (id field). operators_named are free-form person slugs (the
    convention across 106 events), not actor FKs — none need to resolve;
    refined the Sotnikov/Minin comments to "GRU close-access officer"
    since the release assigns only five defendants (Morenets, Serebriakov,
    Yermakov, Malyshev, Badin) explicitly to Unit 26165.

    Directionality confirmed: Russia/GRU-26165 attacker; WADA/USADA/IAAF
    victims (targets role=primary). incident_type set to [intrusion,
    data-theft, leak, influence-operation] (added leak — the hack-and-leak
    is the defining feature). FLAG (cross-file, not fixed here): target
