id: 2016-08/wada-iaaf-campaign
name: WADA / IAAF / Olympic athlete medical records campaign
start_date: 2016-08-01
disclosure_date: 2016-09-13
end_date: 2016-10-31
incident_type:
  - intrusion
  - data-theft
  - leak
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Spearphishing of WADA and USADA employees (via spoofed WADA and
  TAS/CAS domains) plus a Rio de Janeiro close-access hotel-Wi-Fi
  compromise by GRU Unit 26165, stealing therapeutic-use-exemption
  (TUE) medical records and emails from anti-doping bodies. The
  "Fancy Bears' Hack Team" persona released private/medical data of
  ~250 athletes from almost 30 countries via fancybears.net as
  retaliation for the McLaren Report on Russian state-sponsored
  doping.
false_flag_risk: none
operators_named:
  - morenets-aleksei  # GRU Unit 26165, DOJ Oct 2018 WADA/OPCW indictment
  - serebriakov-evgenii  # GRU Unit 26165, DOJ Oct 2018
  - sotnikov-oleg  # GRU close-access officer, DOJ Oct 2018 (release names unit only as "GRU")
  - minin-alexey  # GRU close-access officer, DOJ Oct 2018 (release names unit only as "GRU")
  - yermakov-ivan  # GRU Unit 26165, DOJ Oct 2018
  - malyshev-artem  # GRU Unit 26165, DOJ Oct 2018
  - badin-dmitriy  # GRU Unit 26165, DOJ Oct 2018
summary: |
  The DOJ October 2018 indictment of Morenets et al. charges seven
  GRU officers — five assigned to Military Unit 26165 — for the
  anti-doping hack-and-leak, which began "days after" the July 2016
  First McLaren Report exposed Russia's state-sponsored Sochi doping
  program and the ensuing exclusion of ~111 Russian athletes from
  the Rio Games. Yermakov and Malyshev procured spoofed domains
  mimicking legitimate WADA and TAS/CAS domains and spearphished
  WADA and USADA employees; where remote credential theft failed, a
  "close access" team travelled to Rio de Janeiro and compromised
  victim networks over hotel Wi-Fi. The conspirators stole
  credentials, medical records and emails — including therapeutic
  use exemptions (TUEs) — from officials at WADA, USADA, CCES, IAAF,
  FIFA and ~35 other sporting/anti-doping bodies. Using social-media
  accounts and infrastructure maintained by GRU Unit 74455, the
  material was published (often doctored) via fancybears.net under
  the "Fancy Bears' Hack Team" hacktivist persona; releases
  ultimately exposed private/medical data of ~250 athletes from
  almost 30 countries, amplified through a proactive 2016–18
  outreach campaign to ~186 reporters. The DOJ frames the operation
  as retaliation against the anti-doping accountability apparatus.
  (The same indictment's OPCW Hague close-access operation is a
  distinct 2018 event; the specific APT28 malware families sometimes
  attached to this campaign — X-Agent, X-Tunnel, LOJAX — are not
  named by either cited source and are omitted here.)
