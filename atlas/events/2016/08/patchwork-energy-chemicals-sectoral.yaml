id: 2016-08/patchwork-energy-chemicals-sectoral
name: Patchwork / Dropping Elephant expands cyberespionage targeting to a wide range of industries (Symantec)
start_date: 2015-11-01  # Symantec: first observation Nov 2015; hedges the campaign "may have already existed in early 2015 or perhaps even earlier"
disclosure_date: 2016-07-25
end_date: null  # ongoing as of Symantec's report; no end stated
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Symantec Security Response reported that the Patchwork group
  (a.k.a. Dropping Elephant) had expanded its cyberespionage
  targeting beyond governments and government-related
  organisations to a broad range of industries. Symantec's
  telemetry-derived list of "more recent attacks" spans
  aviation, broadcasting, energy, financial, non-governmental
  organisations (NGOs), pharmaceutical, public sector,
  publishing, and software, "while most of the interest still
  lies in the public sector." Targeting was geographically
  dispersed: "approximately half of the attacks focus on the
  US," with other victims in China, Japan, Southeast Asia, and
  the United Kingdom. Patchwork used China-themed lure content
  (customised sites mimicking a Chinese public hospital and the
  Chinese military; "2016_China_Military_PowerReport" and South
  China Sea decoy documents; domains "registered under names
  that pose as legitimate sources for Chinese intelligence")
  delivered via a legitimate mailing-list provider, dropping
  back-door Trojans that search for and exfiltrate files.
  Symantec noted its findings were "in line" with the recent
  Cymmetria and Kaspersky reports on the same campaign.
false_flag_risk: none
summary: |
  The Symantec disclosure documenting Patchwork's expansion from
  a government-focused espionage actor into a wide range of
  commercial and civil-society industries — including energy and
  financial-sector victims — across the 2015-2016 window.
  Symantec attributes the activity to the Patchwork / Dropping
  Elephant cluster and describes its characteristic China-themed
  lure ecosystem, but names no nation-state sponsor; the India
  nexus for the cluster is the AUSPEX cluster inference (actor
  in/unscoped/patchwork), not a Symantec claim. Notably, the
  sectoral expansion is geographically dispersed and US-heavy
  ("approximately half of the attacks focus on the US") rather
  than concentrated on PRC entities.
attributions:
  - actor_id: in/unscoped/patchwork
    attributing_org: Symantec Security Response
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-07-25
    attribution_source_id: symantec/2016-07-25_patchwork-expands-industries
    notes: |
      Symantec names the actor cluster only — "Patchwork, also
      known as Dropping Elephant" — and documents (from its own
      telemetry) the group's expansion into a broad range of
      industries. Symantec does NOT attribute the activity to
      India or any nation-state in this report, hence
      attribution_level: named-actor (the cluster), not nation.
      org_confidence moderate / assessment concur-with-caveat:
      AUSPEX concurs with the Patchwork==actor identification and
      the sectoral-expansion finding, with the caveat that the
      India-state nexus (actor in/unscoped/patchwork) is the
      AUSPEX cluster inference, not a Symantec claim.
doctrine_links:
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/china-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Symantec documents a uniformly China-themed lure ecosystem
      — customised bait sites mimicking a Chinese public hospital
      and the Chinese military, decoy documents such as
      "2016_China_Military_PowerReport" and South-China-Sea
      reports, and domains "registered under names that pose as
      legitimate sources for Chinese intelligence" — consistent
      with the Patchwork cluster's documented interest in China's
      foreign relations (Kaspersky "Dropping Elephant"). Held at
      plausible (downgraded from the prior strongly_inferred)
      because this report's own victim data cuts the other way:
      the expansion reaches nine disparate industries and is
      geographically dispersed with "approximately half of the
      attacks focus on the US," which reads at least as readily as
      an opportunistic multi-industry espionage broadening as it
      does as PRC-state collection. Symantec states no strategic
      purpose, so more than one reading survives.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "PRC-relations collection: the lure ecosystem is uniformly China-themed (Chinese hospital / military bait sites, 2016_China_Military_PowerReport and South China Sea decoys, domains posing as sources for 'Chinese intelligence'), consistent with the cluster's Kaspersky-documented China-foreign-relations focus."
        - "General multi-industry espionage broadening: Symantec's 'more recent attacks' span aviation, broadcasting, energy, financial, NGO, pharmaceutical, public sector, publishing and software with roughly half of victims in the US, which reads as opportunistic sectoral / geographic expansion rather than PRC-institutional collection."
