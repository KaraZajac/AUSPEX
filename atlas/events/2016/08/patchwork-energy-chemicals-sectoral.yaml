  notes: |
    RE-SOURCE (phantom-remediation, badrabbit model). The event's
    two original sources were both Forcepoint stubs pointing at the
    SAME Monsoon PDF (forcepoint/2016-08_monsoon-apt, raw sha256
    e2770532…a0c8526a, 3,215,160 bytes, hash re-verified on disk).
    That PDF contains ZERO support for the event's premise: grep of
    the extracted text returns 0 hits for "energy", 0 for
    "chemical", 0 for "sector", 0 for "manufactur", 0 for "research
    institut"; the only "industr" hits are the generic "different
    industries and government agencies in Southern Asia" and the
    lure filename "Nuclear_Industry_Summit". The companion stub
    forcepoint/2016-08_monsoon-energy-chemicals-disclosure is a
    PHANTOM — it re-titles that same Monsoon PDF as a "sectoral
    analysis … against energy and chemicals industry equities,"
    an analysis the PDF does not contain. The underlying incident
    (Patchwork expanding into diverse industries) is nonetheless
    REAL and documented by Symantec on 2016-07-25, so the event was
    re-sourced rather than retired.
    [a] FACTS — rewritten to Symantec "Patchwork cyberespionage
    group expands targets from governments to wide range of
    industries" (raw HTML sha256 504e5235…97783769, 137,383 bytes;
    corroborated by CSO Online, sha256 c6633b42…17a053b3, 258,356
    bytes). Verbatim: expanded "more recent attacks" list =
    "Aviation / Broadcasting / Energy / Financial / Non-governmental
    organizations (NGO) / Pharmaceutical / Public sector /
    Publishing / Software", "while most of the interest still lies
    in the public sector"; "approximately half of the attacks focus
    on the US, other targeted regions include China, Japan,
    Southeast Asia, and the United Kingdom"; China-themed bait +
    mailing-list-provider delivery + back-door Trojans. STRIPPED as
    fabricated / source-unsupported: the "chemicals" sector ("chemical"
    appears in NEITHER Symantec nor Forcepoint); "Chinese
    state-affiliated energy entities", "regional chemicals
    manufacturers", "adjacent research institutions"; and the
    "Indian intelligence interest in PRC energy-security and
    chemicals-industry capabilities" framing — Symantec's sectoral
    data is US-heavy and multi-industry, the opposite of a
    PRC-energy-collection concentration.
    [b] ATTRIBUTION — Symantec names the actor cluster only
    ("Patchwork, also known as Dropping Elephant") and does NOT
    attribute to India or any state. Set attributing_org=Symantec
    Security Response, attribution_source_id=the new Symantec record,
    attribution_date=2016-07-25, attribution_level=named-actor,
    org_confidence moderate, auspex_assessment concur-with-caveat
    (the India-state nexus is the AUSPEX cluster inference, not
    Symantec's). Actor in/unscoped/patchwork RESOLVES (id inside
    atlas/actors/in/patchwork.yaml == in/unscoped/patchwork; the
    NTRO→unscoped demotion of 2026-06-24 stands) — [f] OK, no actor
    edit.
    [c] DATES — disclosure_date 2016-08-08 (inherited from the wrong
    Forcepoint Monsoon date) → 2016-07-25 (Symantec's actual date;
    CSO mirror datePublished 2016-07-26). start_date 2014-01-01
    (unsupported) → 2015-11-01 (Symantec "first observation …
    November 2015", with an "early 2015 or perhaps even earlier"
    hedge). end_date 2016-07-31 → null (ongoing, no end stated).
    NB the event id keeps its stable slug (…/patchwork-energy-
    chemicals-sectoral) and 2016-08 path per the never-rename rule,
