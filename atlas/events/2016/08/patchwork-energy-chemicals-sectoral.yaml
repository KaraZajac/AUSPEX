id: 2016-08/patchwork-energy-chemicals-sectoral
name: Patchwork / Monsoon sectoral targeting of energy and chemicals industry equities
start_date: 2014-01-01
disclosure_date: 2016-08-08
end_date: 2016-07-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Forcepoint's "Monsoon" report and adjacent vendor analysis
  documented a sectoral lane of Patchwork operations against
  energy and chemicals industry equities — including Chinese
  state-affiliated energy entities, regional chemicals
  manufacturers, and adjacent research institutions. The
  energy/chemicals victim set sits alongside the cluster's
  better-known diplomatic and military targeting and reflects
  Indian intelligence interest in PRC energy-security and
  chemicals-industry capabilities.
false_flag_risk: none
summary: |
  Documents the energy and chemicals sectoral dimension of the
  Patchwork operational picture during the 2014-2016 window.
  The sectoral overlap with PRC industrial-policy equities
  (energy, chemicals) is consistent with Indian collection
  priorities around PRC industrial capacity, and supports the
  China-collection pillar's targeting picture beyond purely
  diplomatic and military equities.
