id: 2016-08/shadow-brokers-leak
name: Shadow Brokers leaks (NSA TAO tooling exposed)
start_date: 2016-08-13  # first "Equation Group Cyber Weapons Auction" post
disclosure_date: 2016-08-13
end_date: 2017-05-31  # last major dump (Lost in Translation, April 14, 2017)
incident_type:
  - documentary  # leak of US capability; not an offensive US operation
initial_vector: insider  # presumed; Harold T. Martin III charged for separate retention but not convicted as the source
outcome_summary: |
  Theft and serial public release of a substantial portion of NSA
  TAO's 2007–2013 toolkit: FuzzBunch, DanderSpritz, EternalBlue,
  DoublePulsar, EternalRomance, EternalSynergy, EternalChampion,
  EsteemAudit, ExplodingCan, and dozens of other implants and
  exploits. Weaponized within months by DPRK (WannaCry, May 2017,
  ~USD 4B+ damage) and Russia GRU (NotPetya, June 2017, ~USD 10B+
  damage per Greenberg). Subsequently used by Iranian APT34 and
  multiple criminal actors.
quantified_impact:
  notpetya_damage_estimate_usd: 10000000000
  wannacry_damage_estimate_usd: 4000000000
false_flag_risk: none
summary: |
  This is a *documentary event* — a leak *of* US tooling, not a US
  offensive operation. Filed in the US atlas because it is the
  primary documentary corroboration of NSA TAO attribution to the
  Equation Group cluster (per Kaspersky 2015) and because of its
  doctrinal significance for the Vulnerabilities Equities Process
  (VEP).

  Cited as the counter-example for VEP reforms — the operational and
  strategic cost of stockpiling unpatched zero-days. The leak's
  blowback (WannaCry, NotPetya) cost more in foreign-victim damages
  than the toolkit's marginal collection value to NSA per multiple
  IC retrospective analyses. The source remains uncharged; Harold T.
  Martin III was charged for separate document-retention violations
  but not convicted of being the Shadow Brokers source.

  Incident-type follows the UN PoE mandate-end precedent of
  `[documentary]` for non-operational events that nonetheless are
  load-bearing in the doctrine graph.
attributions:
  - actor_id: us/nsa/equation-group
    attributing_org: NSA (implicit — tool authorship); NYT / Microsoft / multiple analysts
    attributing_org_confidence: high
    auspex_assessment: concur
