    [a] FACTS. Model = leak/documentary meta-event (subject-entity, per the
    orchestrator NB; mirrors 2024-02/isoon-leak & 2013-06/snowden). NYT carries:
    the exposed subject is NSA TAO tooling ("genuine samples of the code...used
    in the production of the N.S.A.'s custom-built malware," "products developed
    inside the N.S.A.'s highly classified Tailored Access Operations unit"); the
    AUCTION ("we give you some Equation Group files free"..."would auction the
    best ones"); the 2016-08-13 first post ("The Shadow Brokers first emerged
    online on Saturday" — the Sat before the Tue 08-16 byline = Aug 13); and the
    Equation Group↔NSA identity ("The Equation Group is a code name that
    Kaspersky Labs...has given to the N.S.A."). MS17-010 carries the SMBv1 RCE
    vulns (CVE-2017-0143/0144/0148) later weaponized as EternalBlue. CORRECTIONS:
    (1) "2007–2013 toolkit" SOFTENED → "code dated to mid-2013 per NYT" ("The
    code that was published on Monday dates to mid-2013"); the 2007 lower bound
    is in NO cited source. (2) Tool NAMES (FuzzBunch/DanderSpritz/EternalBlue/
    DoublePulsar/EternalRomance/EternalSynergy/EternalChampion/EsteemAudit/
    ExplodingCan) KEPT but annotated as carried by Greenberg / the "Lost in
    Translation" dump, NOT by the two snapshotted sources (NYT predates the
    April-2017 dump; MS17-010 names no tool). These are accurate historical
    fact, not fabrication → kept, snapshot-gap flagged (drives partial).
    EternalBlue/DoublePulsar naming verified per orchestrator NB. (3) STRIPPED
    "Subsequently used by Iranian APT34 and multiple criminal actors" — APT34
    appears in NO cited source and is a dubious specific (0-hit fabrication-
    class). (4) summary: removed "per multiple IC retrospective analyses"
    (phantom sourcing) → blowback-cost thesis re-attributed to Greenberg (who
    argues it in Sandworm); VEP framing re-marked as AUSPEX editorial (the NYT
    raw has ZERO "VEP"/"zero-day"/"stockpil"/"equit" hits).
    [b] ATTRIBUTION. actor_id us/nsa/equation-group = the EXPOSED subject (not
