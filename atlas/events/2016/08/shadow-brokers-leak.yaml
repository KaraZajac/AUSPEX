    • msft__2017-03-14_ms17-010-eternalblue.html — 78,120 bytes, sha256
      33b85a5e…a84449e2. Live learn.microsoft.com = HTTP 200; title
      "Microsoft Security Bulletin MS17-010 - Critical"; SMB ×34, SMBv1 ×12,
      CVE-2017-0143/0144/0148 all present, "remote code execution". Real.
    • greenberg/2019_sandworm-book — a BOOK, url:null → UN-SNAPSHOTTABLE. It
      carries load-bearing claims below (tool enumeration, DPRK/GRU downstream
