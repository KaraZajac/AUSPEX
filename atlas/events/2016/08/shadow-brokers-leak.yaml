id: 2016-08/shadow-brokers-leak
name: Shadow Brokers leaks (NSA TAO tooling exposed)
start_date: 2016-08-13  # first "Equation Group Cyber Weapons Auction" post
disclosure_date: 2016-08-13
end_date: 2017-04-14  # last MAJOR dump "Lost in Translation" (contained the EternalBlue exploit; directly preceded WannaCry, 2017-05-12). Prior value 2017-05-31 contradicted its own comment; date carried by Greenberg (un-snapshottable), not by the two snapshotted sources — see qc [c]
incident_type:
  - documentary  # leak OF US capability; not an offensive US operation
  - leak         # all-meta typing (the leaker is unattributed) — mirrors 2024-02/isoon-leak; kept out of the eval label set
initial_vector: unknown  # NYT frames an external server breach ("broke into...the...servers of the N.S.A.") AND floats a Russian-intelligence origin; method undetermined. Harold T. Martin III was charged for separate document retention, never convicted as the source. Prior `insider` was uncarried speculation — see qc [a]
outcome_summary: |
  Theft and serial public release of a substantial portion of NSA
  TAO's offensive toolkit (leaked code dated to mid-2013 per NYT):
  FuzzBunch, DanderSpritz, EternalBlue, DoublePulsar, EternalRomance,
  EternalSynergy, EternalChampion, EsteemAudit, ExplodingCan, and
  dozens of other implants and exploits (the specific tool names are
  carried by Greenberg / the April 2017 "Lost in Translation" dump,
  NOT by the two snapshotted sources — see qc [a]). The SMBv1 exploit
  later named EternalBlue corresponds to the vulnerabilities Microsoft
  patched in MS17-010 (2017-03-14). Weaponized within months by DPRK
  (WannaCry, May 2017, ~USD 4B+ damage) and Russia GRU (NotPetya, June
  2017, ~USD 10B+ damage per Greenberg).
quantified_impact:
  notpetya_damage_estimate_usd: 10000000000
  wannacry_damage_estimate_usd: 4000000000
false_flag_risk: none
summary: |
  This is a *documentary event* — a leak *of* US tooling, not a US
  offensive operation. Filed in the US atlas because it is the
  primary documentary corroboration of NSA TAO attribution to the
  Equation Group cluster (per Kaspersky 2015) and because of its
  doctrinal significance for the Vulnerabilities Equities Process
  (VEP).

  Cited (AUSPEX editorial — NOT carried by this event's cited
  sources) as the counter-example for Vulnerabilities Equities Process
  (VEP) reform: the strategic cost of stockpiling unpatched zero-days.
  The leak's blowback (WannaCry, NotPetya) is argued by Greenberg to
  have cost more in foreign-victim damages than the toolkit's marginal
  collection value to NSA (the prior "per multiple IC retrospective
  analyses" was unsourced hand-waving — removed). The source remains
  uncharged; Harold T. Martin III was charged for separate
  document-retention violations but not convicted of being the Shadow
  Brokers source.

  Incident-type follows the UN PoE mandate-end precedent of
  `[documentary]` for non-operational events that nonetheless are
  load-bearing in the doctrine graph.
attributions:
  - actor_id: us/nsa/equation-group
    attributing_org: Kaspersky (Equation Group = NSA code name) + outside experts, per NYT; NSA declined to confirm
    attributing_org_confidence: high  # for TOOL AUTHORSHIP (the exposed subject); NOT a confidence in who leaked
    attribution_level: named-unit  # NYT names "the N.S.A.'s highly classified Tailored Access Operations unit"
    auspex_assessment: concur
    attribution_date: 2016-08-16  # NYT publication (the cited attribution source); prior 2016-08-13 was the first-post date, not the attribution date
    attribution_source_id: nyt/2016-08-19_shadow-brokers-first-post
    notes: |
      Subject-entity attribution (Shadow Brokers / i-Soon model): the
      attributed entity is the SUBJECT whose tooling was exposed, NOT
      the leaker. Tool authorship to NSA TAO is strongly supported by
      the cited source — NYT: experts found "genuine samples of the
      code...used in the production of the N.S.A.'s custom-built
      malware," resembling "products developed inside the N.S.A.'s
      highly classified Tailored Access Operations unit," and "The
      Equation Group is a code name that Kaspersky Labs...has given to
      the N.S.A."; the 2016–17 dumps carry TAO branding/slang matching
      Kaspersky's 2015 Equation Group clustering (per the audited
      actor record). NSA itself "would say nothing" — the tool
      authorship is corroborated, not confessed.
      The LEAKER is UNATTRIBUTED — Russia was widely suspected but
      never confirmed. NYT carries only hedged suspicion (Snowden:
      "circumstantial evidence and conventional wisdom indicates
      Russian responsibility"; Schneier: "likely the work of Russian
      intelligence"; Lewis: "some Russian mind game") plus an
      impersonation counter-theory, and states "it could take
      considerable time to determine who is behind the release of the
      code." The leak itself is uncharged.
doctrine_links:
  - doctrine_id: us/title-10-title-50
    pillar_id: null
    program_id: null
    confidence: strongly_inferred  # DOWNGRADED from attested — no cited source states the Title 10/50 legal framework OR the VEP; see qc [d]
    perspective: attacker-rationale  # subject's OWN doctrine on the operator whose toolkit is documented (cf. 2014-12/regin-eu-commission-disclosure)
    reasoning: |
      The leaked corpus is the NSA TAO OFFENSIVE toolkit — NYT: "code
      that the National Security Agency has used to break into the
      networks of foreign governments," "designed to break through
      network firewalls and get inside the computer systems of
      competitors like Russia, China and Iran," built inside "the
      N.S.A.'s highly classified Tailored Access Operations unit." That
      is the operational output of the Title 10 / Title 50
      offensive-cyber authorities — the statutory backstop under every
      US offensive cyber operation — parallel to how the Snowden corpus
      elucidates the same framework. NOT attested: no cited source
      states the Title 10/50 legal-authority framework, nor the
      Vulnerabilities Equities Process; the VEP counter-example framing
      is AUSPEX editorial (see summary), not source-carried — so the
      link is inferred, not attested.
    attesting_source_id: nyt/2016-08-19_shadow-brokers-first-post  # primary SUPPORTING source (link is strongly_inferred, not attested)
    inference_basis:
      source_id: nyt/2016-08-19_shadow-brokers-first-post
      signals:
        - "'top-secret computer code that the National Security Agency has used to break into the networks of foreign governments and other espionage targets'"
        - "leaked code resembling 'products developed inside the N.S.A.'s highly classified Tailored Access Operations unit'"
        - "'Most of the code was designed to break through network firewalls and get inside the computer systems of competitors like Russia, China and Iran'"
      ruled_out: "a purely defensive / non-offensive reading — rejected: the NYT describes the leaked tools as the NSA's foreign-network-intrusion toolkit ('break into the networks of foreign governments'), the offensive-cyber activity the Title 10/50 authorities govern. (The legal-authority framework itself, and the VEP, are named by NO cited source — which is why the link stays inferred, not attested.)"
    contested: false
    analyst: claude
