        - "Citizen Lab documents this as the third commercial 'lawful intercept' suite used against Mansoor (FinFisher 2011, Hacking Team RCS 2012, NSO Pegasus 2016) — a successive-procurement pattern."
        - "The likely operator is the UAE government, matching the procurement-led doctrine's UAE-customer-state model."
      ruled_out: "Indigenous offensive-cyber development (the pattern AUSPEX reserves for Russia, China, Iran, DPRK) — the capability is a purchased Israeli commercial product delivered by the vendor's own exploit infrastructure, not home-grown tradecraft."
