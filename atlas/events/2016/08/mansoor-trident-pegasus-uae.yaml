id: 2016-08/mansoor-trident-pegasus-uae
name: Ahmed Mansoor / Trident — first forensic-chain disclosure of UAE-deployed NSO Pegasus
start_date: 2016-08-10  # SMS lure delivery date per Citizen Lab forensic timeline
disclosure_date: 2016-08-25
end_date: 2016-08-25
incident_type:
  - intrusion
  - surveillance
initial_vector: phishing  # SMS link delivery to iOS Safari exploit chain
outcome_summary: |
  Emirati human-rights defender Ahmed Mansoor received SMS
  messages on 10–11 August 2016 with bait links promising
  information about UAE prison detainees. Mansoor forwarded the
  SMS to Citizen Lab; Citizen Lab and Lookout jointly identified
  the link as the "Trident" iOS exploit chain (three zero-days,
  CVE-2016-4655 / 4656 / 4657) delivering NSO Group's Pegasus
  spyware. Apple released iOS 9.3.5 on 25 August 2016 patching
  the chain. Disclosure followed the same day.
false_flag_risk: none  # NSO customer-state attribution chain documented
summary: |
  The canonical UAE-Pegasus disclosure and the foundational
  forensic chain for AUSPEX's regime-protection-surveillance
  doctrine entry. Mansoor was a known UAE-state surveillance
  target before the August 2016 event (previous targeting by
  FinFisher 2011 and Hacking Team RCS 2012 had been documented
  by Citizen Lab). The Pegasus deployment marks the third
  spyware-vendor capability successively procured against the
  same target — a clear illustration of the procurement-led
  pattern.

  Mansoor was detained on 20 March 2017 and sentenced on
  29 May 2018 to ten years' imprisonment on speech-related
  charges — Amnesty International designates him a prisoner of
  conscience. His un-remitted ten-year sentence runs into the
  late 2020s and no release has been reported; he remains
  imprisoned as of 2026.
attributions:
  - actor_id: ae/unscoped/stealth-falcon  # not strictly a Stealth Falcon op; see notes
    service_id: ae/state-security
    attributing_org: The Citizen Lab + Lookout
    attributing_org_confidence: moderate  # AUDIT 2026-07-05: OPERATOR attribution is hedged ("likely operator", "strong circumstantial evidence") — downgraded from high (over-attestation)
    attribution_level: nation  # source names "the UAE government" as likely operator; no specific service/unit named for the 2016 op
    auspex_assessment: concur-with-caveat
    attribution_date: 2016-08-25
    attribution_source_id: citizenlab/2016-08-25_million-dollar-dissident
    notes: |
      Two attributions of differing confidence are bundled here.
      (1) The spyware is NSO Group's Pegasus, delivered via the
      "Trident" three-zero-day iOS chain (CVE-2016-4655 / 4656 /
      4657) — stated with HIGH technical confidence and
      independently confirmed by Lookout's analysis of the live
      captured sample. (2) The OPERATOR (customer state) is the
      UAE government — stated only CIRCUMSTANTIALLY: Citizen Lab
      writes that "the high cost of iPhone zero-days, the apparent
      use of NSO Group's government-exclusive Pegasus product, and
      prior known targeting of Mansoor by the UAE government provide
      indicators that point to the UAE government as the likely
      operator," and that there is "strong circumstantial evidence"
      the operator is "connected to an entity within the UAE
      Government." Hence attributing_org_confidence: moderate and
      attribution_level: nation — the source names the UAE
      government, not a specific service or unit, as the likely
      operator of the 2016 op.

      Directionality: Mansoor / UAE dissident = victim; the UAE
      government = attacker (the Pegasus operator/customer); NSO
      Group = the commercial spyware vendor, modeled as a
      vendor/service and NOT as the attributed actor. Pegasus
      deployments attribute to the *customer state* per AUSPEX's
      NSO-as-commercial-vendor modeling.

      The op was discovered through Citizen Lab's Stealth Falcon
      research: the Mansoor link (sms.webadv.co) mapped into the
      same NSO exploit infrastructure Citizen Lab found while
      tracking Stealth Falcon. Citizen Lab is explicit, however,
      that the Mansoor domains "did not match our Stealth Falcon
      fingerprint" — this is NSO-Pegasus infrastructure reached via
      Stealth Falcon research, not a firm Stealth-Falcon-cluster
      attribution of the Mansoor op. AUSPEX therefore uses the
      ae/unscoped/stealth-falcon placeholder reluctantly; consumers
      should read the UAE-government nexus (nation level) as the
      load-bearing attribution, not the actor placeholder. The
      service_id (ae/state-security) is an AUSPEX modeling overlay —
      the cited source names "the UAE government," not State
      Security specifically. (The earlier 2012 Hacking Team attack
      on Mansoor was tied by Citizen Lab to "a UAE intelligence
      agency, apparently operating under the auspices of the office
      of Sheikh Tahnoon bin Zayed" — but that is the 2012 op, not
      this 2016 Pegasus op.)

      Subsequent Citizen Lab Pegasus operator tracking (Pegasus-1,
      Pegasus-2, Pegasus-3 — 2018 Hide and Seek report) more
      precisely identifies UAE-specific operator infrastructure but
      those granular operator-cluster slugs are not modeled as
      distinct actors in AUSPEX.
