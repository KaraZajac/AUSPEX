id: 2019-02/bank-of-valletta
name: Bank of Valletta (Malta) EUR13M cyber-heist
start_date: 2019-02-13  # fraudulent-transfer execution day; EmpireMonkey phishing pre-positioning ran Oct 2018+ (HSBC Malta warned 2018-11-05)
disclosure_date: 2019-02-13  # BOV / Times of Malta announced same day
end_date: 2019-02-14  # core operational shutdown 13 Feb -> services resumed 14 Feb (SEPA fully restored 15 Feb)
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing  # spear-phishing impersonating the French regulator AMF (Autorite des marches financiers); weaponized .doc -> PowerShell Empire
outcome_summary: |
  On 13 Feb 2019 intruders inside Bank of Valletta's network
  initiated fraudulent international transfers of ~EUR13M (~$14.7M)
  to accounts in the UK, US, Czech Republic and Hong Kong. BOV
  detected the activity within hours and took its ENTIRE operation
  offline — branches, ATMs, card/point-of-sale, website, email and
  messaging — for roughly a day (services resumed 14 Feb; SEPA
  restored 15 Feb). Authorities traced, froze and partially
  reversed the transfers; recovery was PARTIAL (Maltese reporting:
  >EUR3M recovered outright, the bulk of the remainder frozen in
  destination jurisdictions), NOT the full reversal an early
  Prime-Minister statement implied.
quantified_impact:
  usd_attempted: 14700000  # EUR13M ~= $14.7M "intended loss" (manageengine; Abbas admission via theshiftnews)
  # recovery PARTIAL and not precisely disclosed in snapshotted sources; described qualitatively in outcome_summary (no full-reversal figure asserted)
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
summary: |
  Malta's largest bank lost control of its network on 13 Feb 2019
  after a spear-phishing campaign that impersonated the French
  markets regulator AMF (Autorite des marches financiers) using
  lookalike domains (amf-fr[.]org) and weaponized Office documents
  that loaded PowerShell Empire. The intruders pushed ~EUR13M in
  fraudulent transfers to UK / US / Czech / Hong-Kong accounts
  before BOV detected the fraud and took every service offline for
  ~a day.

  ATTRIBUTION IS CONTESTED / EVOLVED. Contemporaneously (2019),
  Deloitte CTI tracked the operation as "EmpireMonkey" and assessed
  it as an independent, financially-motivated CYBERCRIMINAL cluster
  with FIN7 overlap (Cobalt-Gang-adjacent infrastructure in other
  reporting) and NO North Korea link. The DPRK attribution came
  LATER and via the money trail: the US DOJ, prosecuting the
  laundering network, described the BOV heist as a "North
  Korean-perpetrated cyber-enabled heist from a Maltese bank in
  February 2019," whose proceeds Ghaleb Alaumary and Ramon
  "Hushpuppi" Abbas conspired to launder (Alaumary pleaded guilty;
  Abbas admitted an intended loss of ~$14.7M). AUSPEX places the
  event in the APT38 / BeagleBoyz DPRK bank-heist cluster on that
  DOJ primary, but flags the unresolved tension with the
  contemporaneous EmpireMonkey criminal-campaign assessment; the
  two are best reconciled by treating EmpireMonkey as the attack /
  tooling label whose cash-out DOJ traced to DPRK actors. NOTE: the
  prior version of this record asserted specific APT38 SWIFT-
  Alliance-Access tradecraft (DYEPACK / FALLCHILL / NESTEGG /
  Hermes-lineage) for BOV; none of that is carried by any Valletta
  source and it has been removed as unsupported.
attributions:
  - actor_id: kp/rgb/apt38
    attributing_org: US Department of Justice
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2021-02-17  # DOJ three-hackers indictment / Alaumary case (replaces the phantom 2019 Mandiant date)
    attribution_source_id: doj/2021-02-17_lazarus-three-officers-indictment
    notes: |
      DPRK attribution rests on the US DOJ, which — prosecuting the
      laundering network — stated the Feb 2019 Maltese-bank heist was
      "North Korean-perpetrated" and obtained a guilty plea from
      money-launderer Ghaleb Alaumary (co-conspirator R. "Hushpuppi"
      Abbas admitted ~$14.7M intended loss; laundering routed through
      Romania / Bulgaria accounts). NB the BOV-SPECIFIC DOJ language
      is nation-level ("North Korean"); the named-actor (APT38)
      refinement is AUSPEX cluster placement, supported by the same
      DOJ indictment naming "Lazarus Group and Advanced Persistent
      Threat 38 (APT38)" as RGB units and by CISA AA20-239A listing
      Malta among BeagleBoyz-targeted nations (2015-2020). Assessment
      is CONCUR-WITH-CAVEAT because a well-documented COMPETING
      attribution exists: Deloitte CTI (Sep 2019) tracked the attack
      cluster as "EmpireMonkey," an independent financially-motivated
      cybercriminal group (FIN7 overlap per Kaspersky; Cobalt-adjacent
      infra elsewhere), with no DPRK link. The prior record cited
      Mandiant's Oct-2018 APT38 report as the attributor — an
      ANACHRONISM (predates the Feb-2019 event and does not mention
      Valletta); removed. FLAG (not actioned here, cross-entity): no
      criminal/empiremonkey actor exists — an EmpireMonkey actor or
      alias may be warranted to carry the criminal-attribution layer.
doctrine_links:
