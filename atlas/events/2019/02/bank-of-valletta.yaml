    [d] DOCTRINE — kp/byungjin/sanctions-evasion-revenue kept
    strongly_inferred, perspective attacker-rationale, contested:true (was
    false). CONTINGENT on the DPRK attribution; AA20-239A carries the
    WMD-financing goal only at CAMPAIGN level (quoted in inference_basis),
