  notes: |
    Full 6-point re-audit vs RAW (Opus 4.8, max). PATH: RE-SOURCE
    (badrabbit model) — event is REAL, but was cited to an ANACHRONISTIC
    wrong source and carried a fabricated tradecraft narrative. Re-pointed
    to 4 new snapshotted sources plus 2 existing govt primaries.

    [a] FACTS — CORRECTED. EUR13M (~$14.7M) fraudulently transferred to
    UK/US/Czech/HK accounts, 13 Feb 2019; bank-wide shutdown ~1 day.
    Carriers: manageengine (sha d878956...) verbatim "The hackers had
    attempted to transfer EUR13 million to different bank accounts in the
    UK, US, Czech Republic, and Hong Kong" and "EUR13 million ($14.7
    million)"; hackercombat (sha a02e45a...) "moved EUR13 million into
    foreign accounts", "Bank of Valletta shut down all its operations on
    Wednesday morning ... back online on Thursday morning". STRIPPED as
    fabricated (0 hits in any Valletta source): DYEPACK / FALLCHILL /
    NESTEGG / Hermes-lineage / "SWIFT Alliance Access" manipulation —
    generic APT38 tradecraft copy-pasted, not carried for BOV. STRIPPED
    the false "full reversal" and usd_recovered:14600000 — recovery was
    PARTIAL (PM said transfers "being reversed"; manageengine frames it an
    "attempt"; theshiftnews: Abbas admitted "intended loss ... ~$14.7M").
    Real initial vector = AMF-regulator spear-phishing (Deloitte sha
    9dbc9e6...): amf-fr[.]org lookalike + weaponized .doc -> PowerShell
    Empire. Renamed "...SWIFT theft" -> "...EUR13M cyber-heist" (SWIFT-
    terminal-compromise mechanism is unsupported for this event).

    [b] ATTRIBUTION — REBUILT. Was: Mandiant / high / concur, cited to
    mandiant 2018-10-03 (ANACHRONISM: pre-dates the event; 0 Valletta
    hits). Now: US DOJ / high / CONCUR-WITH-CAVEAT / named-actor, cited to
    DOJ 2021-02-17 (sha 4e3209c4...) verbatim "conspired ... to launder
    funds from a North Korean-perpetrated cyber-enabled heist from a
    Maltese bank in February 2019"; corroborated theshiftnews (sha
    9da1738...). CAVEAT = competing CONTEMPORANEOUS criminal attribution:
    Deloitte CTI (Sep 2019, sha 9dbc9e6...) tracked it as "EmpireMonkey
    ... Relatively skilled cybercriminal group, financially motivated ...
    Some overlaps with FIN7 group", with NO DPRK link. BOV-specific DOJ
    language is nation-level; the APT38 named-actor label is cluster
    placement (same indictment names "Lazarus Group and ... APT38"; CISA
    AA20-239A sha 6dfc26c... lists Malta among BeagleBoyz nations).
    Removed Mandiant from sources[] — still cited by sibling SWIFT events,
    so NOT orphaned (no retire flag).

    [c] DATES — start 2019-02-13 (transfer-execution day; EmpireMonkey
    phishing pre-positioning ran Oct 2018+), disclosure 2019-02-13
