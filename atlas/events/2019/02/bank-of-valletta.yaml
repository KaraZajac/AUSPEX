    pillar_id: kp/byungjin/sanctions-evasion-revenue
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale
    reasoning: |
      CONTINGENT on the DPRK attribution (concur-with-caveat above).
      If DPRK-perpetrated, the heist fits the APT38 / BeagleBoyz
      revenue-generation pattern the US government ties to North
      Korea's sanctions-evaded funding of its prohibited weapons
      programs. CISA AA20-239A names that goal at CAMPAIGN level, not
      for the Valletta transfer specifically; and the competing
      EmpireMonkey criminal framing would place proceeds outside any
      state doctrine. Event-specific doctrine linkage is therefore
      inferred, not attested.
    attesting_source_id: cisa/2020-08-26_aa20-239a-beagleboyz
    inference_basis:
      source_id: cisa/2020-08-26_aa20-239a-beagleboyz
      signals:
        - "AA20-239A names the WMD-financing goal at campaign level: 'North Korea can use these funds for its UN-prohibited nuclear weapons and ballistic missile programs'"
        - "AA20-239A lists Malta among the nations targeted by the BeagleBoyz (= APT38) from 2015 through 2020"
      ruled_out: "event-specific attestation (AA20-239A does not name the Bank of Valletta operation); linkage is void entirely if the competing EmpireMonkey criminal attribution is correct rather than DPRK"
    contested: true
    analyst: claude
