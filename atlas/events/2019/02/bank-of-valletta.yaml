id: 2019-02/bank-of-valletta
name: Bank of Valletta (Malta) SWIFT theft
start_date: 2019-02-13
disclosure_date: 2019-02-13
end_date: 2019-02-14
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  SWIFT-style fraudulent transfers totaling €13M routed to
  accounts in the UK, US, Czech Republic, and Hong Kong. Bank
  detected the activity within hours and shut down all systems
  for approximately one day; transfers were reversed.
quantified_impact:
  usd_attempted: 14600000  # €13M ≈ $14.6M
  usd_recovered: 14600000  # transfers reversed
false_flag_risk: none
campaign_id: apt38-swift-bank-heists
summary: |
  Late-era APT38 SWIFT operation. Notable for the speed of bank
  detection and reversal — a tradecraft response curve that
  contributed to APT38's migration to direct crypto-exchange
  theft over the following years. Mandiant's tracking links the
  intrusion to the same APT38 / BeagleBoyz playbook: spear-
  phishing of bank employees with weaponized Office documents,
  valid-credentials lateral movement to the SWIFT Alliance
  Access environment, DYEPACK-style manipulation of SWIFT
  messages to suppress confirmation receipts during the transfer
  window, and FALLCHILL / NESTEGG / Hermes-lineage tooling for
  command-and-control and post-operation cleanup. The transfers
  to UK, US, Czech, and Hong Kong accounts were caught by
  receiver-side fraud screening before money mules could cash
  out.
