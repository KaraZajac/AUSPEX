incident_type:
  - doctrine-publication
initial_vector: unknown
outcome_summary: |
  NCSC published the second annual report on the Active Cyber
  Defence (ACD) programme — the Takedown Service, Mail Check,
  Domain Discovery, Web Check, Protective DNS, the Vulnerability
  Disclosure Platform, and the Suspicious Email Incubator. The
  report documents programme scale and outcomes across the second
  full operational year (CY2018): the Takedown Service removed
  14,124 HMG-related phishing sites and took down 22,133 phishing
  campaigns (142,203 individual attacks) hosted in UK delegated IP
  space, and extended into new takedown types (web shells,
  non-consensual cryptomining); Protective DNS answered 68.7bn
  queries and blocked 57.4m of them (for 118,527 unique reasons),
  protecting ~1.4m public-sector employees; Web Check issued
  111,853 advisories across 30,813 unique URLs scanned.
false_flag_risk: none
summary: |
  AUSPEX models the ACD annual report as an event for the same
  reason as other doctrine-publication events — the report acts
  as the load-bearing primary-source reference anchoring
  downstream operational tagging of the NCS 2016 "defend" pillar.

  The ACD programme is the canonical operational instantiation
  of the 2016 strategy's defensive pillar and the principal
  visible output of the £1.9bn NCSS 2016 programme through 2018-
  2021. The annual-report cadence (first report February 2018,
  Year-2 February 2019, Year-3 March 2020, Year-4 June 2021)
  provides AUSPEX with a continuous primary-source baseline for
  programme metrics. AUSPEX tags the Year-2 report specifically
  because it is the first full operational year (the Year-1
  report covered a partial-year ramp-up).

  (Publication cadence: Year-1 "ACD One Year On" February 2018;
  Year-2 16 July 2019; Year-3 March 2020; Year-4 June 2021. The
  Year-2 report was published late — its foreword is signed
  15 July 2019 and apologises for the delay — but still covers
  only CY2018 to keep the year-on-year comparison clean.)

  Doctrinally also a useful comparator for the post-NCS-2022
  "ACD 2.0" pivot — the original ACD focused on national-scale
  defensive infrastructure within government and the public
  sector; the NCS 2022 vision extends ACD to ecosystem-wide
  defensive infrastructure (private-sector and SME tooling).
