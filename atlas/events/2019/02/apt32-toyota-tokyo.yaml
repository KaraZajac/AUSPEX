id: 2019-02/apt32-toyota-tokyo
name: APT32 intrusion at Toyota Motor Corporation (Tokyo HQ)
start_date: 2019-02-01
disclosure_date: 2019-03-29
end_date: 2019-03-29
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Toyota Motor Corporation disclosed an intrusion at its Tokyo
  headquarters network in late March 2019, following on from a
  February 2019 incident at Toyota Australia and pre-dating the
  June 2019 Toyota Vietnam / Thailand subsidiary intrusions. Up
  to 3.1 million customer records were potentially exposed. The
  Tokyo intrusion was the most significant in the rolling 2019
  Toyota series. Public attribution to APT32 / OceanLotus came
  from subsequent vendor reporting tying the Toyota series to
  the same OceanLotus tradecraft cluster targeting Hyundai,
  BMW, and Daimler during the same period.
false_flag_risk: none
summary: |
  Central pivot of the 2019 OceanLotus automotive campaign — the
  largest single victim by exposure volume in the series. The
  campaign sits at the heart of AUSPEX's case that VinFast-era
  Vietnamese industrial policy is operationalized through APT32
  automotive IP and supplier-relationship collection. APT32
  deployed KerrDown loader chains and Cobalt Strike for
  persistence, with Denis and Roland backdoor variants observed
  in adjacent campaign-cluster intrusions.
attributions:
