id: 2019-02/sea-turtle-netnod-dns-registry-mitm
name: Netnod (Swedish DNS root operator) discloses Sea Turtle man-in-the-middle compromise
start_date: 2018-12-14
disclosure_date: 2019-02-05
end_date: 2019-01-02
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Netnod, the Swedish operator of the i.root-servers.net DNS root
  and a major Nordic Internet-exchange / DNS-services provider,
  publicly acknowledged a man-in-the-middle attack against its
  infrastructure during the December 14 2018 – January 2 2019
  window. Subsequent Cisco Talos attribution in April 2019 tied
  the incident to the Sea Turtle DNS-hijacking campaign. The
  Netnod compromise is the first publicly confirmed case of a
  DNS-registry-operator compromise by a state-aligned actor and
  was used to capture authentication credentials for services in
  jurisdictions outside Sweden — consistent with the broader
  Sea Turtle pattern of using infrastructure-operator access as
  staging for downstream victim-of-interest credential capture.
false_flag_risk: none
summary: |
  Operationally distinctive Sea Turtle staging compromise. The
  Netnod incident demonstrates the cluster's willingness to
  target tier-1 Internet infrastructure operators in non-target
  countries to obtain credential-capture position against the
  ultimate Middle Eastern and Mediterranean victim set. The
  Netnod public statement preceded ICANN's February 22 2019
  DNS-hijacking advisory and the April 2019 Talos attribution.
