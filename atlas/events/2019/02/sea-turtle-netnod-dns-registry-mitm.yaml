    [a] FACTS — corrected against both raws (watched for conflation with
    the other Sea Turtle victims, per task):
      • NAME/PUBLISHER "DNS root operator" softened. Talos DOES tie Netnod
        to a root zone ("the company [Cafax] states that one of their
        consultants actively manages the i[.]root-server[.]net zone. NetNod
        managed this particular DNS server zone") and calls the case "the
        first publicly confirmed case against an organization that manages a
        root server zone" — so the root-zone-management fact is SOURCED and
        retained in outcome_summary. BUT the root zone itself was NOT
        compromised (Talos quotes a joint statement: "There are no signs of
        lost integrity or compromise of the content of the root [server]
        zone"; Netnod: "no customers ... were affected"). "DNS root
        operator" as the headline framing over-implies root compromise, so
        the name now reads "internet-infrastructure operator" (Talos:
        "a non-profit, independent internet infrastructure organization
        based in Sweden"), with the root-zone-management nuance + the
        not-compromised caveat carried in the body.
      • "first publicly confirmed case of a DNS-REGISTRY-OPERATOR compromise"
        MIS-STATED Talos. Talos's actual wording is "the first publicly
        confirmed case against an organization that manages a ROOT SERVER
        ZONE." Corrected to Talos's wording (grep: "first publicly"=1 hit,
        that sentence; "registry-operator"=0).
      • DOWNSTREAM PRODUCT anchored to prevent Eastern-Med conflation. The
        vague "services in jurisdictions outside Sweden" (true per Netnod)
        is now supplemented with Talos's specific documented downstream:
        the NetNod access was used to "manipulate the DNS records for
        sa1[.]dnsnode[.]net" and "harvest credentials of administrators who
        manage domains with the TLD of Saudi Arabia (.sa)" — i.e. the
        concrete product was SAUDI/GULF, not the Eastern-Med victim set of
        the Cyprus/Greece siblings.
      • DATES/WINDOW verbatim-anchored: "occurred in several short windows
        during the period 14 December 2018 - 2 January 2019" (three attacks;
        the third 29 Dec - 2 Jan redirected DNSNODE portal/API traffic to an
        attacker proxy). ADDED Netnod's own no-customer-impact finding ("no
        customers who used the services during this time were affected" via
        DNSSEC) — material for accuracy, previously omitted.
      • ADDED that Netnod named no actor and pointed to FireEye's method
        write-up (Netnod raw), and that the Sea Turtle placement is Talos's
