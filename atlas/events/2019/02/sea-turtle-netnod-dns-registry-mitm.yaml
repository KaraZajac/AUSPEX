id: 2019-02/sea-turtle-netnod-dns-registry-mitm
name: Netnod (Swedish internet-infrastructure operator) discloses Sea Turtle man-in-the-middle compromise
start_date: 2018-12-14
disclosure_date: 2019-02-05
end_date: 2019-01-02
incident_type:
  - intrusion
  - espionage
initial_vector: valid-creds  # Sea Turtle campaign MO (credential capture -> DNS control); Netnod's own initial vector is not stated by the cited sources
outcome_summary: |
  Netnod, a Swedish non-profit internet-infrastructure operator (an
  Internet-exchange and DNS-services provider that Cisco Talos noted
  also managed the i.root-server.net root-server zone), publicly
  acknowledged on 5 February 2019 a man-in-the-middle attack against
  its infrastructure. Per Netnod's statement the incident "occurred
  in several short windows during the period 14 December 2018 - 2
  January 2019" — three distinct attacks, the third (29 December - 2
  January) redirecting some DNSNODE web-portal and API traffic to an
  attacker-controlled proxy. Netnod stated it "was not the ultimate
  goal of the attack. The goal is considered to have been the capture
  of login details for Internet services in countries outside of
  Sweden," and that after forensic work "no customers who used the
  services during this time were affected" (its zones being
  DNSSEC-signed and -validated). Netnod named no threat actor,
  pointing only to FireEye's "Global DNS Hijacking Campaign" write-up
  for the method. Cisco Talos's 17 April 2019 report subsequently
  placed the NetNod compromise within its "Sea Turtle" state-sponsored
  DNS-hijacking campaign, describing NetNod as "a non-profit,
  independent internet infrastructure organization based in Sweden"
  and documenting that the actors used the access to manipulate the
  DNS records for sa1[.]dnsnode[.]net and "harvest credentials of
  administrators who manage domains with the TLD of Saudi Arabia
  (.sa)." Talos characterised the case as "the first publicly
  confirmed case against an organization that manages a root server
  zone," while a joint statement Talos cited found "no signs of ...
  compromise of the content of the root [server] zone."
false_flag_risk: none
summary: |
  Operationally distinctive Sea Turtle staging compromise: the
  cluster's willingness to compromise a tier-1 internet-infrastructure
  operator in a non-target country (Sweden) to obtain credential-capture
  position against victims elsewhere. The NetNod access is the node
  whose Talos-documented downstream product was Saudi Arabia (.sa)
  TLD-administrator credentials (via sa1.dnsnode.net) — a MENA/Gulf
  collection outcome, not an Eastern-Mediterranean one, so the Mavi
  Vatan doctrine link is inherited from the broader campaign's
  geopolitics rather than evidenced by this node's specific downstream
  (see doctrine_links). The Netnod public statement (5 Feb 2019)
  preceded ICANN's 22 Feb 2019 DNSSEC-deployment advisory and the 17
  Apr 2019 Talos attribution. Microsoft later tracked the same actor
  as MARBLED DUST (alias equivalence stated once in the canonical
  parent event 2019-04/talos-sea-turtle-dns-hijacking); the
  contemporaneous vendor label here is Talos's "Sea Turtle."
attributions:
  - actor_id: tr/unscoped/sea-turtle
    attributing_org: Cisco Talos (attribution; Netnod named no actor)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-04-17
    attribution_source_id: talos/2019-04-17_sea-turtle-dns-hijacking
    notes: |
      Netnod's own 5 Feb 2019 statement named NO actor — it pointed to
      FireEye's "Global DNS Hijacking Campaign" report for the method
      only. The Sea Turtle attribution rests on Cisco Talos's 17 April
      2019 report, which NAMES NetNod as a compromised victim ("the
      attackers were able to compromise NetNod ... NetNod acknowledged
      the compromise in a public statement on February 5, 2019") and
      assesses the campaign "with high confidence" to be "an advanced,
      state-sponsored actor." attribution_level: named-actor — Talos
      names the "Sea Turtle" cluster and NetNod specifically; it names
      NO nation (Turkey appears only as one entry in the victim
      IP/country table) and NO service/unit. Harmonized with the
      canonical parent, ICS-Forth, and StrikeReady siblings (all
      named-actor); the 2018-06 Cyprus sibling's activity-cluster off
      this same April source is the flagged outlier. The Turkey nexus
      carried by the tr/unscoped prefix rests on LATER, hedged reporting
      (Reuters 2020-01-27, "acting in the interests of the Turkish
      government," per three Western officials; Hunt & Hackett 2024,
      "Turkey based"), NOT on this Talos source. Actor is
      tr/unscoped/sea-turtle (demoted from tr/mit 2026-06-25; no cited
      source names a Turkish service).
doctrine_links:
  - doctrine_id: tr/mavi-vatan
    perspective: attacker-rationale
    pillar_id: tr/mavi-vatan/eastern-med-energy
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The NetNod compromise is a staging operation within the
      Turkey-aligned Sea Turtle campaign, whose overall collection
      profile (per the canonical parent event) — "ministries of foreign
      affairs" and "prominent energy organizations" across the
      Eastern-Mediterranean / MENA victim set — fits the
      maritime-and-energy framing of the Mavi Vatan eastern-med-energy
      pillar. Not `attested`: no cited source names Mavi Vatan or states
      an energy-competition goal. The link is inherited from the
      campaign's geopolitics and the actor's default Mavi Vatan
      alignment, NOT evidenced by this node itself — Netnod is a Swedish
      infrastructure-staging victim, and its Talos-documented downstream
      product was Saudi Arabia (.sa) admin credentials (a MENA/Gulf
      outcome, not an Eastern-Med one).
    attesting_source_id: null
    inference_basis:
      signals:
        - "The compromised asset is tier-1 internet infrastructure used as staging (Netnod: 'was not the ultimate goal ... The goal is considered to have been the capture of login details for Internet services in countries outside of Sweden'), consistent with a strategic state-sponsored collection campaign, not opportunistic or criminal activity (Talos: 'an advanced, state-sponsored actor')."
        - "The parent Sea Turtle campaign's primary victims are 'national security organizations, ministries of foreign affairs, and prominent energy organizations' (Talos) across an Eastern-Med / MENA victim set — a strategic diplomatic/energy collection profile aligned with Turkish regional requirements."
        - "The actor's documented default doctrine alignment includes tr/mavi-vatan/eastern-med-energy, and the later-sourced Turkey nexus (Reuters 2020, 'acting in the interests of the Turkish government') aligns the campaign with Turkish strategic interests."
      ruled_out: |
        Financially-motivated / non-state crime is inconsistent with the
        credential-capture staging against critical DNS infrastructure
        and Talos's high-confidence "advanced, state-sponsored actor"
        assessment. Honest caveat: the eastern-med-energy pillar is
        INHERITED from the campaign, not evidenced by the NetNod node —
        its specific documented downstream (Saudi .sa admin credentials
        via sa1.dnsnode.net) is a MENA/Gulf target, not an
        Eastern-Mediterranean or energy one, so this link is weaker for
        this sub-event than for the Cyprus/Greece siblings.
    contested: false
    analyst: claude
