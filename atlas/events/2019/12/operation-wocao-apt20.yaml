id: 2019-12/operation-wocao-apt20
name: Operation Wocao — APT20 multi-sector intrusions disclosed
start_date: 2011-01-01
disclosure_date: 2019-12-19
end_date: 2019-12-19
incident_type:
  - intrusion
  - data-theft
initial_vector: exploit-public-facing
outcome_summary: |
  Fox-IT (later NCC Group) publishes multi-year cluster
  reporting on APT20 / "Wocao" operations against 10+
  countries: government, MSPs, defense aerospace, energy,
  finance, healthcare verticals. Distinctive 2FA-bypass
  tradecraft on RSA SecurID software tokens and persistent
  use of Pulse Secure VPN appliances as both initial access
  and staging infrastructure.
false_flag_risk: none
summary: |
  Fills the APT20 gap between earlier vendor-historical
  reporting (TH3Bug, Twivy) and post-2020 cluster work.
  Fox-IT's distinctive contribution: documentation of the
  operator stealing RSA SecurID seed material from
  compromised endpoints and patching the local token check
  to bypass 2FA — early proof that token-based MFA is not a
  hard control against persistent state intruders. Targets
  span MIC2025-relevant industries (aerospace, energy) but
  with a much larger government-civilian and MSP component
  than APT10's Cloud Hopper, suggesting either parallel MSS
  tasking or a separate MSS regional bureau.
