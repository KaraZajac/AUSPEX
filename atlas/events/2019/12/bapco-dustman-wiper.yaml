id: 2019-12/bapco-dustman-wiper
name: Bapco Dustman wiper attack — Bahrain national oil company
start_date: 2019-12-29
disclosure_date: 2020-01-09
end_date: null  # AUDIT 2026-07-10: the wiper detonated 29 Dec 2019 (malware compiled that morning, GMT+3); no source documents a Dec-30 end/recovery. Prior 2019-12-30 was unsourced -> null.
incident_type:
  - destructive
  - wiper
initial_vector: n-day
outcome_summary: |
  The "Dustman" disk-wiper was detonated against Bapco (Bahrain
  Petroleum Company), Bahrain's national oil company, on 29
  December 2019. Only a portion of Bapco's Windows hosts were
  wiped; the Saudi NCA report notes multiple OPSEC failures and
  several "failed wipes," and contemporary reporting confirms the
  company avoided disruption to its core operations and continued
  functioning. No public host-damage count was disclosed.
false_flag_risk: none
summary: |
  Dustman is a disk-wiper that the Saudi National Cybersecurity
  Authority (NCSC/NCA) assessed as a new variant of the ZeroCleare
  wiper (IBM X-Force, December 2019) — distinct from, though
  sharing the third-party "EldoS RawDisk" driver with, the Shamoon
  family. To obtain raw write access on modern Windows, Dustman
  bundles its payload and drivers into a single executable built on
  a modified "Turla Driver Loader (TDL)": a signed-but-vulnerable
  VBoxDrv (Oracle VirtualBox) driver is loaded to map the unsigned
  EldoS RawDisk (ElRawDisk) driver into the kernel, bypassing
  Windows Driver Signature Enforcement, after which the driver
  overwrites the Master Boot Record and the physical drive
  contents. (This single-executable packaging is Dustman's main
  optimization over ZeroCleare, which shipped the loader and wiper
  as two files.)

  Per the NCA report, initial access into Bapco was assessed "with
  moderate confidence" to have come from exploiting a publicly
  disclosed (n-day) remote-code-execution vulnerability in an
  internet-facing VPN appliance, with early signs of compromise a
  few months before the wipe. The actor obtained domain-admin and
  service accounts and used the victim's anti-virus management
  console service account to distribute and execute the wiper
  across the network via PsExec, deleting VPN logs to cover its
  tracks.

  ATTRIBUTION (audited — the prior text over-attributed): the NCA
  primary report leaves attribution "still not determined,"
  assessing only "possibly an act of one nation state actor" — it
  names NEITHER Iran NOR APT34. The Iran / APT34 (OilRig) reading
  is an inference via the ZeroCleare lineage: IBM X-Force attributed
  the parent ZeroCleare wiper to the ITG13 group (APT34/OilRig) plus
  at least one other likely-Iran-based group (reported elsewhere as
  Hive0081/xHunt), "aligning with Iranian objectives in the region,"
  and NCA + multiple vendors class Dustman as a ZeroCleare variant.
  The prior claim of a direct APT34 attribution "by IBM X-Force and
  the Saudi NCA," plus PowerShell/scheduled-task detonation and
  credential-abuse initial access, was unsupported and has been
  corrected against the raw sources.
attributions:
  - actor_id: ir/mois/apt34
    attributing_org: IBM X-Force (ZeroCleare report; parent-malware attribution extended to Dustman by variant lineage)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2019-12-04  # date of the IBM ZeroCleare report where the APT34 attribution originates; no IBM report attributes Dustman-Bapco directly
    attribution_source_id: ibm-xforce/2019-12_zerocleare
    notes: |
      IBM X-Force attributed the PARENT malware ZeroCleare — not the
      Dustman-Bapco incident directly — to "the ITG13 group ... and at
      least one additional group, likely Iran-based," i.e. APT34/OilRig
      plus a second Iranian group (named Hive0081/xHunt in secondary
      reporting: Deep Instinct, The Hacker News). Dustman inherits the
      APT34/OilRig label via the NCA-and-vendor-confirmed "Dustman is a
      new variant of ZeroCleare" lineage. Two caveats hold confidence
      to concur-with-caveat: (1) this is a lineage inference, not an
      independent Dustman attribution; (2) IBM itself flags that
      "ITG13's traditional mission ... has not included executing
      destructive attacks," so a destructive op is atypical for APT34.
      The corpus has no xHunt/Hive0081 actor; APT34 (the group IBM
      places on initial access) is used as the named actor.
  - actor_id: ir/mois/apt34
    attributing_org: Saudi NCA (NCSC)
    attributing_org_confidence: low
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-01-09
    attribution_source_id: saudi-nca/2020-01_dustman-bapco
    notes: |
      CORRECTED over-attribution: the NCA primary report does NOT name
      APT34 or Iran. Verbatim: "The attribution and the threat actor
      behind these attacks is still not determined. However, commitment,
      persistence and TTPs observed indicates that these are possibly an
      act of one nation state actor," following "the typical attack life
      cycle of nation-state threat actor." NCA therefore supports only a
      nation-level, UNNAMED nation-state actor (not even Iran-named). The
      Iran/APT34 specificity is AUSPEX's via the ZeroCleare-lineage row
      above, not NCA's. actor_id kept ir/mois/apt34 for corpus/lineage
      continuity; attribution_level nation reflects what THIS source
      actually carries.
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    perspective: attacker-rationale
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A purpose-built disk-wiper detonated against a Gulf-rival state's
      national oil company reads as the asymmetric coercion of an
      adversary's civilian critical infrastructure that this pillar
      encodes (target_sectors include energy). No cited source states
      the operation's strategic purpose — the NCA primary names no goal
      and no actor — so this is AUSPEX's triangulated inference, not a
      source-stated aim.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target + method: a purpose-built disk wiper (no theft/ransom) against Bahrain's national oil company — destruction of an adversary's civilian energy CII, the pillar's core pattern."
        - "Campaign fit: Dustman is a ZeroCleare variant, and IBM attributes the ZeroCleare Gulf-energy wiper campaign to Iranian APT34/xHunt — the same Shamoon-lineage EldoS-RawDisk destructive toolset Iran has aimed at Gulf energy since 2012 (Aramco/RasGas)."
        - "Timing: detonated 29 Dec 2019 amid the escalating US-Iran maximum-pressure confrontation, the canonical Iranian asymmetric-retaliation window."
      ruled_out: "Espionage or financial motive — the payload is purpose-built destruction (MBR + physical-drive overwrite) with no exfiltration, ransom, or collection rationale evidenced. Note the underpinning Iranian attribution is itself lineage-inferred (see attributions), not stated by the NCA primary."
    contested: false
    analyst: claude
  - doctrine_id: ir/forward-defense
    perspective: attacker-rationale
    pillar_id: ir/forward-defense/proxy-projection
    program_id: null
    confidence: plausible
    reasoning: |
      Destructive cyber against a US-aligned Gulf monarchy's national
      energy company (Bahrain hosts the US Navy Fifth Fleet) can also
      be read as projecting Iranian coercive reach extraterritorially,
      at near-zero physical risk — the forward-defense proxy-projection
      logic. Kept only plausible: no source ties this op to that
      posture, and the civilian-CII-coercion reading above is the
      tighter fit. (This link replaces the prior bare, under-graded
      forward-defense entry.)
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Forward-defense proxy projection: a destructive strike into a US-aligned Gulf monarchy (Bahrain, home of the US Fifth Fleet) projects Iranian reach into adversary-partner territory."
        - "Simple asymmetric civilian-CII coercion (the reading above) with no distinct extraterritorial-projection intent."
    contested: false
    analyst: claude
