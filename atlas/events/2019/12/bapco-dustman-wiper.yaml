id: 2019-12/bapco-dustman-wiper
name: Bapco Dustman wiper attack — Bahrain national oil company
start_date: 2019-12-29
disclosure_date: 2020-01-09
end_date: 2019-12-30
incident_type:
  - destructive
  - wiper
initial_vector: n-day
outcome_summary: |
  Dustman wiper deployed against Bahrain's national oil company
  Bapco. Partial disruption of Bapco IT operations.
false_flag_risk: none
summary: |
  Attributed to APT34 / OilRig by IBM X-Force and the Saudi
  National Cybersecurity Authority (January 2020). Forward-Defense
  Gulf-rival targeting. Dustman is a wiper derived from the
  ZeroCleare lineage that abuses the EldoS RawDisk signed driver
  (loaded via a bring-your-own-vulnerable-driver primitive) to
  obtain raw write access and overwrite the MBR, partition tables,
  and disk contents of victim Windows hosts. Initial access into
  Bapco's environment is reported to have used credential abuse
  against an internet-facing VPN appliance, followed by lateral
  movement on valid credentials, PowerShell-based staging, and
  scheduled-task-triggered detonation of the wiper across Bapco
  IT endpoints.
