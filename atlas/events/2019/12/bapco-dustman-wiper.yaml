    - ibm-xforce/2019-12_zerocleare (SECONDARY, shared w/ 2019/06 DHS event): Wayback capture
      of the Security Intelligence ZeroCleare report. raw 29a0603f…efe08b93, 169,784 bytes
      (content_sha256 realigned from the concurrent DHS-audit's 079c6fad…; Wayback wrapper
      drifts a few bytes/fetch, body identical). Carries the APT34/ITG13 attribution.
    - kaspersky-ics-cert/2020-01-10_bapco-dustman (NEW): raw 871181ff…c737df46, 71,240 bytes.
    - zdnet/2020-01-09_dustman-bapco (NEW, Cimpanu): raw ebfc3f25…5246a962, 1,120,680 bytes.
