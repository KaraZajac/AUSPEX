    [a] FACTS — corrected. Confirmed by NCA primary: Bapco = Bahrain's national oil company;
    "DUSTMAN ... detonated on December 29, 2019"; "can be considered as a new variant of
    'ZeroCleare' malware," distinct from Shamoon though "they all use the same third-party
    driver 'Eldos RawDisk'" (ZeroCleare-lineage kept; NOT conflated with Shamoon). Impact
    softened: "Only some of the computers on the Bapco network were infected and the company was
    able to avoid disruption to its operations" (Kaspersky) — prior "Partial disruption of Bapco
    IT operations" overstated. TWO fabrications STRIPPED from the summary: (1) initial access
    was NOT "credential abuse against a VPN appliance" — NCA: "moderate confidence ... exploiting
    one of the remote execution vulnerabilities in a VPN appliance that was disclosed" (n-day RCE
    exploit, months prior); (2) execution was NOT "PowerShell-based staging, scheduled-task-
    triggered detonation" — NCA: "the anti-virus management console service account ... PSEXEC"
    (domain admin/service accounts + PsExec). Driver mechanism made precise: EldoS RawDisk is the
    UNSIGNED wiper driver; the SIGNED-but-vulnerable driver is VBoxDrv, loaded via a modified
    Turla Driver Loader (TDL) to "bypass Window's Driver Signature Enforcement (DSE)"
    (NCA + swapcontext/hfiref0x). Overwrite target = "MBR (Master Boot Record) and other disks" /
    "overwrites the volume" (swapcontext/Kaspersky) — prior "partition tables" softened to
    "physical-drive contents." Single-executable packaging (vs ZeroCleare's two files) confirmed.

    [b] ATTRIBUTION — DOUBLE over-attestation FIXED. Prior: both rows asserted "APT34/OilRig
    ... by IBM X-Force AND Saudi NCA, moderate, concur." Reality: (1) Saudi NCA row corrected to
    attribution_level=nation, confidence LOW, concur-with-caveat — the NCA primary leaves
    attribution "still not determined," saying only "possibly an act of one nation state actor";
    it names NEITHER Iran NOR APT34. (2) IBM row re-sourced from the phantom Dustman URL to the
    real ZeroCleare report; IBM attributed the PARENT ZeroCleare (not Dustman-Bapco) to "the
    ITG13 group ... and at least one additional group, likely Iran-based" (APT34/OilRig +
    xHunt/Hive0081), "aligning with Iranian objectives" — attribution_level=named-actor,
    moderate, concur-with-caveat (lineage inference; IBM flags destructive ops are atypical for
    ITG13/APT34). No source firmer than "nation-state" (NCA) or "APT34 via ZeroCleare-lineage"
    (IBM) exists; nothing supports a Dustman-specific APT34 attribution by NCA.

    [c] DATES — start_date 2019-12-29 ✓ (NCA detonation; malware Compilation Date "Sun Dec 29
    08:57:19 2019 (GMT+3)"). end_date 2019-12-30 -> null (unsourced; single-day wipe).
    disclosure_date 2020-01-09 ✓ (public disclosure: ZDNet 2020-01-09T04:28 Cimpanu; Rendition
    01-09; Kaspersky 01-10). Source published_on verified: IBM ZeroCleare 2019-12-04 (JSON-LD);
    ZDNet 2020-01-09; Kaspersky 2020-01-10; swapcontext 2020-01-20 (Malpedia); Deep Instinct
    2020-02-03 (JSON-LD — its raw filename/slug corrected from 2020-01). NCA report has no
    explicit internal date; kept 2020-01-09 (public-disclosure alignment).

    [d] DOCTRINE_LINKS — restructured. Prior: a single bare ir/forward-defense link
    (strongly_inferred, reasoning only, no perspective/pillar/inference_basis). Now two graded,
    attacker-rationale links mirroring the audited sister Shamoon events (rasgas/aramco):
    PRIMARY ir/asymmetric-warfare/civilian-cii-coercion (strongly_inferred; destructive wiper on
    civilian energy CII; inference_basis.signals + ruled_out; attesting null); SECONDARY
    ir/forward-defense/proxy-projection (plausible; Bahrain = US-aligned Gulf monarchy hosting
    the US Fifth Fleet; inference_basis.alternatives; attesting null). Neither is attested — no
    source states a strategic goal — correct per protocol. NOT linked: ir/post-soleimani-
    retaliation (anachronistic — Dustman 29 Dec 2019 PRE-dates the 3 Jan 2020 Soleimani strike).

    [e] ATTRIBUTION_LEVEL — added per row: named-actor (IBM/ZeroCleare-lineage APT34) and nation
    (Saudi NCA's unnamed nation-state actor).

    [f] ACTOR_ID — ir/mois/apt34 RESOLVES (atlas/actors/ir/apt34.yaml, id ir/mois/apt34). Kept
    over an "ir/unscoped" alternative because (i) no bare ir/unscoped actor exists in the corpus,
