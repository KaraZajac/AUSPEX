    attribution_source_id: reuters/2019-01-30_project-raven
    notes: |
      Reuters multi-source reporting (five former operatives plus
      program documents) with named ex-NSA operators and
      corroborating documentary material. Subsequent DOJ DPA
      materials (September 2021) confirmed at the
      legal-attribution level.
  - actor_id: ae/darkmatter/project-raven
    attributing_org: US Department of Justice
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2021-09-14
    attribution_level: nation  # DOJ attributes the CNE operations to "the U.A.E government" and names the three individual defendants, but anonymizes the employer/contractor org ("U.A.E. CO" / "U.S. Company One") — no named unit
    attribution_source_id: doj/2021-09-14_baier-adams-gericke-dpa
    notes: |
      DOJ DPAs against Baier, Adams, and Gericke confirm the
