qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-11
  level: partial
  notes: |
    Full 6-point audit of the REAL, well-sourced Reuters Project Raven
    disclosure (contrast the just-deleted beacon-red phantom). level:
    partial because 2 of the (now 6) cited sources are un-snapshottable
    in this environment (the namesake Reuters main investigation =
    DataDome-walled; the mozilla/ blog = link-rotted with no wayback) —
    BUT every load-bearing factual claim IS carried by a snapshotted
    source (the Reuters KARMA companion 367,462 B sha256
    169826b7a10e41877cac156d7f435f9f08316e4ee268383e48d9cdfc82b7b5d5 +
    the DOJ DPA 88,540 B sha256
    d2ef08fc4cf42318d077bac5b38a7ab872eedfde75fb5bea44adebcdefe8106c +
    the bleepingcomputer/theregister Mozilla-CA coverage).

    [a] FACTS — mostly CONFIRMED; one strip. Reuters authors Bing &
    Schectman verified in the captured KARMA raw (Bing 25x, Schectman
    21x). Project Raven / DarkMatter host / ex-US-IC operators / KARMA
    iOS tool / targeting all carried by snapshotted raws. KARMA verified
    both ways: Reuters raw "described Karma as a tool that could remotely
    grant access to iPhones simply by uploading phone numbers or email
    accounts into an automated targeting system ... requiring almost no
    input after an operative set its target" and DOJ raw "'zero-click' ...
    i.e., one that could compromise a device without any action by the
    target" ("KARMA" 9x / "KARMA 2" 5x in the DOJ raw). "UAE government
    purchased Karma from a vendor outside the country" (not NSO) —
    verified. STRIP/soften: outcome_summary said operators were "National
    Security Agency Tailored Access Operations personnel" — "Tailored
    Access" is 0x in BOTH captured raws; the DOJ raw says "former
    employees of the U.S. Intelligence Community (USIC) or the U.S.
    military" and the Reuters raw says "U.S. intelligence community
    veterans" with Lori Stroud "a former Raven operative who also
    previously worked at the U.S. National Security Agency" — so softened
    to "National Security Agency and other US intelligence-community
    personnel" (NSA supported, TAO specificity unverifiable / rests on
    the uncapturable main article). Lori Stroud VERIFIED verbatim (task
    check). CyberPoint->DarkMatter transition: "CyberPoint" is 0x in both
    captured raws (it lives in the uncapturable main article) but is
    corroborated in substance by the snapshotted DOJ raw's anonymized
    pipeline (ITAR-compliant "U.S. Company One" -> unauthorized work for
    "U.A.E. CO") — kept. No fabricated malware/CVE/victim/operator names
    found; 0 fabrications stripped beyond the TAO over-specification.

    [b] ATTRIBUTION — added attribution_level (was missing). Reuters =
    named-unit (names the "Project Raven" unit, host firm DarkMatter, and
    individual operators incl. Stroud); DOJ = nation (attributes CNE ops
    to "the U.A.E government" + names 3 individual defendants but
    anonymizes the org — "DarkMatter"/"Project Raven"/"CyberPoint" 0x in
    the release). confidence high/concur retained for both (Reuters =
    five former operatives + program documents; DOJ = a federal DPA).

    [c] DATES — disclosure_date/end_date 2019-01-30 CONFIRMED (captured
    KARMA raw article:published_time 2019-01-30T11:40:57Z; main-article
    og:description names "Project Raven"). DOJ attribution_date 2021-09-14
    CONFIRMED against the raw ("Tuesday, September 14, 2021", Press
    Release 21-869, "$1,685,000 in penalties", "between 2016 and 2019").
    start_date 2014-01-01 retained as an explicit approximation (comment
    already hedges "CyberPoint era"): the captured raws firmly support the
    2016+ DarkMatter/KARMA offensive phase ("beginning in 2016"); the
    2014 CyberPoint precursor rests on the uncapturable main article +
    the DarkMatter service record.

    [d] DOCTRINE_LINKS — both retained at attested but re-grounded.
    attesting_source_id repointed from the uncapturable main article to
    the SNAPSHOTTED KARMA companion, and inference_basis.source_quote
    added (verbatim from the captured raw): procurement-led/
    contractor-personnel <- "Raven was largely staffed by U.S.
    intelligence community veterans, who were paid through an Emirati
    cyber security firm named DarkMatter"; regime-protection-surveillance/
    domestic-dissidents <- "Raven also hacked Tawakkol Karman, a human
    rights activist known as the Iron Woman of Yemen" (+ captured
    "Americans helped the Emirati government monitor her"). Both are the
    attacker-state's (UAE) own doctrines on its own operation ->
    attacker-rationale (default perspective, left implicit). FLAG in the
    2nd link: captured evidence most directly fits the
    regional-political-targets pillar (Emir of Qatar / Turkish official /
    Yemeni activist); the domestic-dissidents tag leans on the
    uncapturable main article — orchestrator pillar-precision review.

    [e] ATTRIBUTION_LEVEL — added (see [b]): Reuters named-unit, DOJ
    nation.

    [f] ACTOR_ID — ae/darkmatter/project-raven resolves to the actor file
    id (atlas/actors/ae/project-raven.yaml, id: ae/darkmatter/project-raven).
    incident_type retains the "documentary" meta-type (the strategically
    significant moment = the Reuters publication) alongside intrusion/
