outcome_summary: |
  Defence Minister Florence Parly's 18 January 2019 speech
  publicly announcing the Lutte Informatique Offensive (LIO)
  doctrine — France's formal acknowledgment that it conducts
  offensive cyber operations as a legitimate military instrument
  under the authority of the Chief of the Defence Staff. One of
  the few Western public acknowledgments of offensive cyber
  doctrine at the time.
