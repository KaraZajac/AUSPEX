id: 2019-01/karma-toolkit-reuters-disclosure
name: Karma iOS zero-click toolkit — Reuters discloses DarkMatter / Project Raven mobile-collection operations
start_date: 2016-01-01  # earliest documented Karma operational use
disclosure_date: 2019-01-30
end_date: 2017-12-31  # by end-2017 Apple iOS updates made Karma "far less effective" (Reuters); exact end of use unclear
incident_type:
  - surveillance   # task's "targeted-surveillance" -> valid enum: the toolkit's mobile-collection purpose
  - intrusion      # task's "mobile-exploitation" -> valid enum: zero-click iOS device compromise
initial_vector: 0-day  # iMessage-flaw implant; no user interaction (vuln unpatched at time of use)
outcome_summary: |
  Reuters companion piece to the Project Raven main investigation
  detailed "Karma" — a zero-click iOS exploit toolkit used by an
  Abu Dhabi offensive-cyber unit code-named Project Raven, made up
  of Emirati security officials and former US intelligence
  operatives "working as contractors for the UAE's intelligence
  services" and paid through the Emirati firm DarkMatter. Karma
  required no user interaction: uploading a target's phone number
  or email into an automated system, then sending an iMessage
  text, was enough to implant malware and compromise the iPhone
  (Reuters: the flaw worked "even if the phone's owner didn't use
  the iMessage program"). Karma collected photos, emails, text
  messages, location data and saved passwords.

  Reuters named specific 2016–2017 targets: in 2017 the operators
  hacked the iPhone of Qatar's Emir Sheikh Tamim bin Hamad
  al-Thani, Turkey's then-Deputy Prime Minister Mehmet Şimşek, and
  Oman's head of foreign affairs Yusuf bin Alawi bin Abdullah;
  they also hacked Yemeni Nobel-laureate human-rights activist
  Tawakkol Karman. More broadly Reuters described targeting of
  "activists critical of the government," regional rivals
  "including Qatar," and the UAE's ideological opponent the Muslim
  Brotherhood.

  Reuters reported the UAE government purchased Karma "from a
  vendor outside the country" and "could not determine the tool's
  creator." (This article does NOT mention NSO Group or Pegasus —
  the not-Pegasus framing below is AUSPEX analysis, not a Reuters
  statement.) By the end of 2017, Apple iOS security updates had
  made Karma "far less effective."
false_flag_risk: none
summary: |
  Karma is the canonical example of UAE procurement-led-capability
  reaching the most advanced mobile-collection tier of the era
  (iOS zero-click delivery, predating the publicly-disclosed
  FORCEDENTRY Pegasus chain by five years). The Reuters
  attribution places it within Project Raven / DarkMatter
  operational scope; specific target attributions vary by named
  victim but the UAE-customer-state framing is constant.
