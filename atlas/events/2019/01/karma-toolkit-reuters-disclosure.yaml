id: 2019-01/karma-toolkit-reuters-disclosure
name: Karma iOS zero-click toolkit — Reuters discloses DarkMatter / Project Raven mobile-collection operations
start_date: 2016-01-01  # earliest documented Karma operational use
disclosure_date: 2019-01-30
end_date: 2017-12-31  # iOS patching closed the underlying primitives by 2017-18
incident_type:
  - intrusion
  - surveillance
initial_vector: zero-click  # iMessage delivery; no user interaction required
outcome_summary: |
  Reuters companion piece to the Project Raven main investigation
  detailed "Karma" — a zero-click iOS exploit toolkit acquired
  and operationalized by DarkMatter for Project Raven personnel.
  Karma did not require user interaction: a target's phone
  number was sufficient to begin compromise. Reuters reported
  that DarkMatter operators used Karma against Qatari royal-
  family members during the 2017 GCC blockade context, regional
  political figures including Saudi opposition (Mohammed bin
  Nayef referenced indirectly), and Emirati activists.

  Karma was *not* NSO Pegasus; Reuters explicitly distinguished
  the two and reported Karma was acquired by DarkMatter from a
  non-NSO vendor. By 2017–2018, iOS patching had closed the
  underlying primitives and Karma fell out of operational use.
false_flag_risk: low
summary: |
  Karma is the canonical example of UAE procurement-led-capability
  reaching the most advanced mobile-collection tier of the era
  (iOS zero-click delivery, predating the publicly-disclosed
  FORCEDENTRY Pegasus chain by five years). The Reuters
  attribution places it within Project Raven / DarkMatter
  operational scope; specific target attributions vary by named
  victim but the UAE-customer-state framing is constant.
