    reasoning: |
      AUSPEX maps the law to the doctrine's cybersovereignty pillar
      (state assertion of control over cyberspace as a national-
      security domain). Kept strongly_inferred, NOT attested: no cited
      source states that the law operationalizes Resolution 29-NQ/TW's
      terminal goal in substance, and the chronology cuts against a
      strict "law operationalizes the resolution" reading — the law
      was passed 12 June 2018, ~6 weeks BEFORE the resolution (25 July
      2018). Both instead flow from the shared CPV cyber posture. The
      earlier reasoning's claim of attestation "in Party press (Nhân
      Dân, Tạp chí Cộng sản)" is removed — no such source is cited.
    attesting_source_id: iiss/2021-06_cyber-capabilities-national-power-vietnam
    inference_basis:
      signals:
        - "IISS (Vol 1, ch.15): Resolution 29-NQ/TW (25 July 2018) announced a 'Strategy for the Homeland Protection in Cyberspace', and the 2019 defence white paper 'presented cyberspace as the fifth operational domain ... in which to defend Vietnam's national sovereignty' — a state-sovereignty-over-cyberspace frame the law's controls advance."
        - "Law text Art. 1: the law's object is 'protecting national security and ensuring social order and safety in cyberspace' — codifying cyberspace as a national-security domain."
        - "AUSPEX doctrine model vn/resolution-29-nqtw defines the cybersovereignty pillar as 'a national-security domain' (chủ quyền không gian mạng)."
      ruled_out: "A strict 'the law is the legislative operationalization of Resolution 29-NQ/TW' reading is ruled out as the attested claim: the law (12 June 2018) predates the resolution (25 July 2018), and Resolution 29 is a homeland-DEFENCE strategy 'centred on the armed forces' (MND) while the law is an MPS civilian content-control instrument — so the two are parallel expressions of the CPV posture, not a resolution-then-implementing-law sequence. Survives as strongly_inferred thematic alignment."
    perspective: defender-response  # VN's own governance/sovereignty doctrine on VN's own law (null-actor self-codification); chosen over default attacker-rationale, mirroring the ROK Cyber Command precedent, to keep this policy meta-event out of the attacker-rationale set
