    program_id: null
    confidence: strongly_inferred  # audit 2026-07-10: inference_basis added; pillar is an AUSPEX construct, not source-named
    reasoning: |
      Articles 8 and 26 provide the regime-stability / surveillance
      machinery this pillar encodes: Article 8 criminalizes online
      opposition to the State, and Article 26 is the platform-
      cooperation mechanism (user-information handover to, and 24-hour
      takedown on request from, the Cybersecurity Task Force under the
      Ministry of Public Security). Kept strongly_inferred: the
      article-level facts are source-carried, but mapping them to this
      specifically-named AUSPEX pillar is an analytic inference, not a
      claim any source makes in the pillar's terms.
    attesting_source_id: economica/2018-06-12_vietnam-law-on-cybersecurity-24-2018-qh14
    inference_basis:
      signals:
        - "Law text Art. 8(b): strictly prohibited to use cyberspace to '... oppose the State of the Socialist Republic of Vietnam'; Art. 8(c): '... denying revolutionary achievements, destroying the national solidarity block ...'."
        - "Law text Art. 26.2(a): duty 'to provide user information to the Cybersecurity Task Force under the Ministry of Public Security when so requested in writing'; Art. 26.2(b): delete prohibited content 'no later than twenty four (24) hours' on request from the CTF under the MPS or a competent MIC agency."
        - "IISS (Vol 1, ch.15): the 2018 law was 'even more overtly political in its purpose', with 'extensive definitions around content acceptability'; MPS department A05 (Cyber Security and High-tech Crime Prevention) is 'tasked with ... the spreading of false information'."
      ruled_out: "A purely apolitical/technical network-security reading of the law is ruled out by Art. 1 ('social order and safety') plus the Art. 8 content prohibitions and the Art. 26 platform-compliance machinery — but tagging the specific AUSPEX pillar remains an inference, so this stays strongly_inferred rather than attested."
    perspective: defender-response  # VN's own regime-security doctrine on VN's own instrument (null actor); see link 1 note
