id: 2019-01/vietnam-cybersecurity-law-effective
name: Vietnamese Law on Cybersecurity (No. 24/2018/QH14) takes effect — data-localization, content-takedown, platform compliance
start_date: 2019-01-01
disclosure_date: 2019-01-01
end_date: null
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  Vietnam's Law on Cybersecurity (Luật An ninh mạng, Law
  No. 24/2018/QH14) — passed by the National Assembly (Legislature
  XIV, 5th session) on 12 June 2018 — took effect on 1 January 2019
  (Article 43). Article 1 frames the law's object as "protecting
  national security and ensuring social order and safety in
  cyberspace." Its operative controls: (i) data localization —
  domestic and foreign providers that process Vietnamese users'
  personal data, relationship data, or user-generated data must
  store that data in Vietnam, and foreign enterprises must have
  "branches or representative offices in Vietnam" (Article 26.3);
  (ii) content takedown — platforms must delete prohibited content
  no later than 24 hours after a written request from the
  Cybersecurity Task Force under the Ministry of Public Security or a
  competent agency under the Ministry of Information and
  Communications (Article 26.2(b)); and (iii) user-data handover to
  the Cybersecurity Task Force under the MPS on written request
  (Article 26.2(a)). Article 8 enumerates strictly-prohibited
  conduct, including using cyberspace to "oppose the State of the
  Socialist Republic of Vietnam" and to "distort history, deny
  revolutionary achievements, [or] destroy the national solidarity."
  The enforcing "Cybersecurity Task Force under the Ministry of
  Public Security" is the MPS cyber-security department A05 (Cyber
  Security and High-tech Crime Prevention). AUSPEX reads the law as
  part of the same CPV cyber posture expressed by Politburo
  Resolution 29-NQ/TW (25 July 2018, "Strategy for the Homeland
  Protection in Cyberspace"); note the law was passed ~6 weeks BEFORE
  that resolution, so the relationship is shared-lineage/parallel
  rather than strict legislative operationalization of it. Human
  Rights Watch (and other civil-society groups) characterized the law
  as a significant rollback of online speech protections.
false_flag_risk: none
summary: |
  Documentary / policy marker event (no attack; actor null). AUSPEX
  uses this as the legal-effective anchor for Vietnam's internal-
  security cyber posture: the law's 1 January 2019 effective date is
  the statutory hook for MPS A05 domestic-collection and content-
  control activity. The law's practical reach centres on DOMESTIC
  dissident and diaspora content control (an MPS civilian instrument),
  a distinct lane from APT32 / OceanLotus foreign espionage; AUSPEX
  keeps the APT32 linkage loose. AUSPEX notes the law as a discrete
  national codification of state control over cyberspace, parallel to
  the PRC Cybersecurity Law (effective June 2017) and the Russian
  data-localization regime.

  Scope caveat / anachronism guard: this event models the 2018 law's
  2019 effective onset. Law No. 24/2018/QH14 was later replaced by a
  new Law on Cybersecurity (No. 116/2025/QH15, passed 10 December
  2025, effective 1 July 2026) — that supersession is a separate,
  later event and is NOT imported here.
