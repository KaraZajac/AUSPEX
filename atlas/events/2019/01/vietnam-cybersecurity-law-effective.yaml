id: 2019-01/vietnam-cybersecurity-law-effective
name: Vietnamese Cybersecurity Law (24/2018/QH14) takes effect, operationalizing cybersovereignty
start_date: 2019-01-01
disclosure_date: 2019-01-01
end_date: null
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  The Vietnamese Cybersecurity Law (Luật An ninh mạng, Law
  24/2018/QH14, passed by the National Assembly on 12 June 2018)
  took effect on 1 January 2019. The law codifies cybersovereignty
  as a national-security domain, requires foreign internet
  platforms with substantial Vietnamese user bases to store
  Vietnamese user data inside Vietnam and to open Vietnamese
  representative offices, and obligates platforms to remove
  content the Ministry of Public Security identifies as
  threatening "national security" or "social order" within
  prescribed windows. The law is the statutory anchor for MPS
  A05 and TC2 domestic-collection and content-control
  operations and operationalizes Politburo Resolution 29-NQ/TW
  (July 2018) at the legislative level. Civil-society reactions
  (HRW, EFF, Access Now, Amnesty) characterized the law as a
  significant rollback of online speech protections.
false_flag_risk: none
summary: |
  Documentary marker event. AUSPEX uses this as the
  legal-effective anchor for the Vietnamese internal-security
  cyber posture. The law's effective date materially expanded
  the operational hook under which APT32 / OceanLotus diaspora
  and domestic dissident targeting operates, and it parallels
  the contemporaneous PRC Cybersecurity Law (2017) and Russian
  data-localization regime as a discrete national codification
  of cybersovereignty as a legal category.
