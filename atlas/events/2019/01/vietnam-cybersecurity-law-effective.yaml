    [a] FACTS — now primary-carried. Law No. 24/2018/QH14; header
    "Hanoi, June 12, 2018 / LAW / ON CYBERSECURITY"; passed by
    Legislature XIV at the 5th session on 12 June 2018; Art. 43 "This
    Law is of full force and effect as from 1 January 2019." Data
    localization + representative-office requirement verbatim at Art.
    26.3 ("must store such data in Vietnam ..."; "Foreign enterprises
    ... must have branches or representative offices in Vietnam");
    24-hour takedown at Art. 26.2(b); user-info handover at Art.
    26.2(a); Art. 8 content prohibitions. Vietnamese name "Luật An
    ninh mạng" confirmed (IISS footnote "Luật An Ninh Mạng").
    STRIPPED / CORRECTED:
    - "TC2" removed from the enforcement description. TC2 (Tổng cục 2
      / General Department of Military Intelligence) is an MND
      military-intelligence body; IISS places it under the MND, and it
      has NO statutory role in this MPS civilian law (Art. 26 names
      only the Cybersecurity Task Force under the MPS and the MIC).
      This was an embellishment. A05 is KEPT and now sourced: IISS
      names "Cyber Security and High-tech Crime Prevention (A05)" as
      the MPS cyber-security department, and it maps to HRW's/the
      law's "Cybersecurity Task Force under the Ministry of Public
      Security."
    - Takedown authority corrected from "the Ministry of Public
      Security" alone to the CTF-under-MPS OR a competent MIC agency
      (Art. 26.2(b) names both).
    - "cybersovereignty" ret/re-framed as AUSPEX/doctrine-model
      analytic framing, not the law's own term. The law's Art. 1 term
      is "national security ... social order and safety in cyberspace";
      IISS uses "national sovereignty" (2019 defence white paper) and
      "controlling the political content" — neither uses "cyber
      sovereignty." (The doctrine file vn/resolution-29-nqtw does use
      "cybersovereignty"; that is the AUSPEX construct the pillar
      links to.)
    - "operationalizes Resolution 29-NQ/TW ... at the legislative
      level" softened to shared-lineage/parallel: the law (12 Jun
      2018) predates Resolution 29-NQ/TW (25 Jul 2018) by ~6 weeks, so
      a strict operationalization reading is chronologically backward.
    - Civil-society list trimmed to HRW-anchored (the only snapshotted
      civil-society source); HRW carries the "rollback" characterization.
