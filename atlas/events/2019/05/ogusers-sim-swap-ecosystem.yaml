id: 2019-05/ogusers-sim-swap-ecosystem
name: OGusers forum breach exposes SIM-swap and account-takeover trade
start_date: 2019-05-01
disclosure_date: 2019-05-09
end_date: 2019-05-09
incident_type:
  - data-theft
initial_vector: unknown
outcome_summary: |
  The OGusers forum — the central English-language venue for
  SIM-swapping, account-hijacking, and resale of "OG"
  (short / desirable) social-media handles — was itself
  breached and its user database leaked in May 2019.
  Krebs on Security and other journalists used the leak to
  document the structural connection between SIM-swap gangs
  and the broader Anglophone account-hijacking ecosystem,
  including identification of operators later associated
  with Lapsus$ (2022) and Scattered Spider (2022 onward).
false_flag_risk: none
summary: |
  The OGusers leak is the foundational document for the
  English-language criminal underground that produced
  Lapsus$, Scattered Spider, and the broader SIM-swap
  prosecution wave from 2019 forward. AUSPEX classifies as
  criminal-baseline.
