  notes: |
    Audited vs Krebs on Security "Account Hijacking Forum OGusers Hacked"
    (raw snapshot krebs__2019-05-09_ogusers-hacked.html, sha256
    3ae5f45b…2e6ce3820, 46,405 bytes). STEP-0 triage: URL returns the REAL
    article (title "Account Hijacking Forum OGusers Hacked"), not a
    homepage/catalogue — NOT a phantom. Normal 6-point audit applied.

    [a] FACTS — corrected. Source-carried and kept: OGusers "popular among
    people involved in hijacking online accounts and conducting SIM swapping
    attacks"; the forum "itself has been hacked, exposing the email
    addresses, hashed passwords, IP addresses and private messages for
    nearly 113,000 forum users"; breach on "12th of May 2019 … 112,988 users
    were affected"; drives wiped; RaidForums admin "Omnipotent" posted the DB
    for free on 16 May; resale "for hundreds or thousands of dollars";
    Krebs "obtained a copy"; expectation that law enforcement "going after
    SIM swappers … will fuel even more arrests and charges." STRIPPED as
    unsupported by this source: (1) the claim that Krebs/journalists used the
    leak to identify "operators later associated with Lapsus$ (2022) and
    Scattered Spider (2022 onward)" — the 2019 article names neither crew
    (neither existed yet); (2) the summary's framing of the leak as "the
    foundational document … that produced Lapsus$, Scattered Spider." Both
    are hindsight not carried by the sole cited source, removed per no-
    fabrication rule. Softened "resale of 'OG' (short/desirable) social
    handles" (not stated in this article) to Krebs's actual wording
    (reselling stolen account access). Added quantified_impact.records =
    112,988 (Krebs's exact figure).

    [b] ATTRIBUTION — null-actor event (the breacher is unidentified);
    correct. attributing_org Krebs (journalism), confidence high (Krebs
    reports the breach first-hand, having obtained the DB), auspex concur.
    Set attribution_level: null (no actor named). No state nexus — consistent
    with the prompt (criminal/community, primary_service_id n/a).

    [c] DATES — corrected. Source published_on 2019-05-09 -> 2019-05-18
    (article byline "posted on Saturday 18th of May 2019"; body narrates
    12 May breach + 16 May leak, so 9 May is impossible; confirmed by mirrors
    dated /2019/05/18/). Event start_date 2019-05-01 -> 2019-05-12 (breach);
    disclosure_date 2019-05-09 -> 2019-05-18 (Krebs report); end_date
    2019-05-09 -> 2019-05-16 (public leak on RaidForums); attribution_date
    2019-05-09 -> 2019-05-18. Source id/slug left unchanged (stable).

    [d] DOCTRINE_LINKS — [] retained. Criminal-ecosystem event, no
    nation-state nexus, no doctrine applies. Correct not to invent one.

    [e] ATTRIBUTION_LEVEL — set to null (no actor identified; nothing for the
    org to be specific about).

    [f] ACTOR_ID — null; no actor file to resolve. No actor FLAG.

    Residual uncertainty: initial access vector to OGusers itself is not
    stated by Krebs (admin publicly blamed a hard-drive failure) — kept
    initial_vector: unknown. tier upgraded secondary -> primary on the source
    record (first-party investigative reporting; Krebs obtained the DB).
