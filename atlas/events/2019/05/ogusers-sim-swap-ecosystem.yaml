id: 2019-05/ogusers-sim-swap-ecosystem
name: OGusers forum breach exposes SIM-swap and account-takeover trade
start_date: 2019-05-12
disclosure_date: 2019-05-18
end_date: 2019-05-16
incident_type:
  - data-theft
  - leak
initial_vector: unknown
outcome_summary: |
  On 12 May 2019 the OGusers.com forum — an English-language
  venue popular among people conducting SIM-swapping and
  online-account hijacking and reselling stolen account
  access for hundreds or thousands of dollars — was itself
  breached: its user database (email addresses, hashed
  passwords, IP addresses and private messages for roughly
  113,000 accounts) was stolen and the forum's drives wiped.
  On 16 May the administrator of the rival community
  RaidForums posted the stolen database for free download.
  Krebs on Security, which obtained a copy, reported that
  law-enforcement investigators pursuing SIM-swappers were
  likely to use the leaked database to fuel further arrests
  and charges.
false_flag_risk: none
summary: |
  A breach of the OGusers.com account-hijacking forum,
  disclosed by Krebs on Security on 18 May 2019. OGusers was
  the central English-language hub for SIM-swapping and
  account-takeover activity; the theft and public leak of
  its user database exposed roughly 113,000 members' email
  addresses, hashed passwords, IP addresses and private
  messages. AUSPEX models this as a criminal-ecosystem
  baseline event: the party that breached the forum is
  unidentified, there is no state nexus, and no nation-state
  doctrine applies.
