id: 2019-05/teamviewer-breach
name: TeamViewer breach (2016 intrusion, disclosed 2019)
start_date: 2016-09-01  # "autumn 2016" per sources; publicly disclosed May 2019
disclosure_date: 2019-05-17
end_date: 2016-12-31  # intrusion detected and fended off in autumn 2016
incident_type:
  - intrusion
  - espionage
initial_vector: unknown
outcome_summary: |
  TeamViewer GmbH said it detected the intrusion in autumn 2016 before
  major damage occurred and, working with external experts and the
  responsible authorities, found no evidence that customer data was
  stolen, that customer systems were infected, or that the TeamViewer
  source code was manipulated. The company did not publicly disclose the
  breach at the time; it became public only via Der Spiegel's May 2019
  report.
false_flag_risk: none
summary: |
  In May 2019 the German outlet Der Spiegel reported — and TeamViewer
  confirmed — that the maker of the widely used remote-administration
  software had been compromised in autumn 2016. Security reporting
  attributed the intrusion to Chinese-origin actors using the Winnti
  backdoor, with BleepingComputer naming BARIUM (a Winnti Umbrella
  cluster equated with APT41) as the likely actor. TeamViewer said the
  attack was caught before damage was done and that investigators found
  no evidence of data theft, customer-system infection, or source-code
  tampering. Attribution is journalism-level and hedged ("thought to be
  of Chinese origins"); no government or vendor named a specific Chinese
  service.
attributions:
  - actor_id: cn/mss/apt41
    attributing_org: "Der Spiegel / security press (Winnti / BARIUM)"
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2019-05-17
    attribution_source_id: bleepingcomputer/2019-05-17_teamviewer-confirms-undisclosed-breach-2016
    notes: "Sources name the 'Winnti' cluster / 'Chinese origin' and (BleepingComputer) 'BARIUM', both listed as aliases of APT41 in the actor record — hence cn/mss/apt41. The reporting is journalism-level and hedged ('thought to be of Chinese origins'); no source names the MSS or any specific Chinese service, so this is named-actor (cluster + nation), not named-unit."
doctrine_links:
  - doctrine_id: cn/mic2025
    pillar_id: cn/mic2025/next-gen-it
    program_id: null
    confidence: plausible
    reasoning: |
      A Chinese state-nexus actor (Winnti / BARIUM / APT41) compromising
      the vendor of a leading enterprise remote-administration product
      fits the Made-in-China-2025 next-generation-IT pillar's interest in
      acquiring and positioning against advanced information technology.
      The label is plausible rather than higher because no cited source
      states a strategic purpose — the reporting only names the actor and
      the victim — and more than one reading survives (industrial-policy
      IT-sector espionage vs. generic APT41 espionage/opportunistic access
      to a high-value supply-chain platform).
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "MIC2025 next-generation-IT espionage: a China-nexus actor breaching a leading enterprise IT/remote-administration vendor fits the next-gen-IT pillar's tech-acquisition and positioning interest."
        - "Generic APT41 espionage / opportunistic supply-chain positioning: APT41 targets software and gaming firms broadly for both state espionage and financially motivated ends, so the intrusion need not serve a specific industrial-policy goal."
    counter_explanation: null
    contested: false
    analyst: claude
