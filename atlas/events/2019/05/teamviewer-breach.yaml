  notes: |
    PHANTOM/WRONG-SOURCE REMEDIATION (RE-SOURCE path). The sole cited source was
    mandiant/2024-07-18_apt41-dust ("APT41 Has Arisen From the DUST"), a report on a
    2023-24 APT41 campaign that never mentions TeamViewer (grep of the captured raw
    snapshot mandiant__2024-07-18_apt41-dust.html, sha256 011424d4…6dd725f0, 391,507
    bytes: 0 occurrences of "teamviewer"). It was a wrong-source attachment (the event
    file itself flagged the attribution_source_id as a "placeholder"). DUST remains
    validly cited by the actor cn/apt41 and its real home event 2024-07/apt41-dust-global-
    campaign, so it is NOT orphaned — only removed from this event.

    RE-SOURCED to two real 2019-05-17 reports of the Der Spiegel disclosure, both snapshotted
    + hashed:
     - bleepingcomputer/2019-05-17_teamviewer-confirms-undisclosed-breach-2016 (sha256
       a61a8740…204f7fd5, 95,821 bytes) — attribution source.
     - thehackernews/2019-05-17_teamviewer-breached-chinese-hackers-2016 (sha256
       fdbb6e2c…2175955a, 167,144 bytes) — corroboration.

    [a] FACTS: rewrote summary/outcome. Der Spiegel disclosed (May 2019) and TeamViewer
    confirmed a compromise in "autumn 2016" (BC: "In autumn 2016, TeamViewer was target of
    a cyber-attack"). STRIPPED the prior fabricated outcome ("persistent access established
    with downstream targeting capability against the global TeamViewer user base") — no
    source supports realized persistence or downstream compromise; on the contrary TeamViewer
    said it found "no evidence that customer data or other sensitive information had been
    stolen, that customer computer systems had been infected or that the TeamViewer source
    code had been manipulated." Dropped incident_type "supply-chain" (unrealized; Der Spiegel
    framed it as espionage) → now [intrusion, espionage].
    [b] ATTRIBUTION: BC "This attack is thought to be of Chinese origins and utilized the
    Winnti backdoor" and names "BARIUM, another Winnti Umbrella threat group"; THN "hackers
    with Chinese origin who used Winnti trojan malware ... linked to the Chinese state
    intelligence system." Winnti / BARIUM are aliases of APT41 in the actor record, so
    actor_id cn/mss/apt41 holds. Set attributing_org to "Der Spiegel / security press
    (Winnti / BARIUM)", confidence moderate (hedged, journalism), auspex concur-with-caveat.
    [c] DATES: start_date 2016-01-01 → 2016-09-01 (autumn 2016, honest best estimate);
    disclosure_date 2019-05-17 confirmed (article byline "May 17, 2019"); end_date kept
    within 2016 (detected/fended off autumn 2016).
    [d] DOCTRINE: kept cn/mic2025/next-gen-it at plausible (honest) — no source states a
    strategic purpose; added inference_basis.alternatives (MIC2025 IT-sector espionage vs.
    generic APT41 opportunism). attesting_source_id stays null.
    [e] ATTRIBUTION_LEVEL: set named-actor (Winnti/BARIUM cluster + China nation; no service
    named).
    [f] ACTOR_ID: cn/mss/apt41 resolves to atlas/actors/cn/apt41.yaml (id cn/mss/apt41), which
    lists Winnti, Barium, Wicked Panda, Double Dragon as aliases — mapping supported.
    FLAG (actor): these 2019 press sources name only "Winnti"/"BARIUM"/"Chinese origin", NOT the
    MSS; the cn/mss service placement rests on the actor's own separate sourcing (DOJ 2020), not
    on this event.

    DANGLING-FK FIX + FLAG: the prior target orgs/teamviewer has NO registry file (111 orgs
    exist; none for TeamViewer) — a dangling FK. Repointed to sectors/ict/software (country de,
    role primary), which is accurate for the enterprise remote-admin software vendor. FLAG
    (target registry): if a named-org TeamViewer target is desired, a target record
    atlas/targets/orgs/teamviewer.yaml (de, ict/software, commercial) should be created by the
    orchestrator; per remit I did not create a new target entity.

    RESIDUAL UNCERTAINTY: attribution is entirely journalism-level and hedged; the Winnti
    Umbrella is broad and the precise BARIUM=APT41 mapping is inference (captured in the caveat).
    Der Spiegel's own article is paywalled/German and was not snapshotted; its claims are carried
    via the two English secondary reports.
