id: 2019-05/blacktech-plead-asus-router-mitm
name: BlackTech PLEAD router-MitM via ASUS WebStorage updates
start_date: 2019-04-25
disclosure_date: 2019-05-14
end_date: 2019-05-14
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  ESET disclosed activity attributed (via Trend Micro's prior
  PLEAD->BlackTech linkage) to the BlackTech cyberespionage
  cluster in which internet-exposed routers in front of
  Taiwanese victims were used to man-in-the-middle the ASUS
  WebStorage cloud-storage client's HTTP update channel,
  swapping the update XML's download URL to serve the PLEAD
  backdoor (hosted on a compromised gov.tw domain) in place of
  the legitimate binary. ESET assessed a router-level MitM as
  the MOST PROBABLE scenario while explicitly considering and
  downgrading -- but not fully excluding -- a true (server-side)
  ASUS WebStorage supply-chain compromise. Activity was observed
  by ESET telemetry at the end of April 2019 and was "most
  actively deployed" in Taiwan. ESET does not identify the
  ultimate victim organizations' sectors, and this report itself
  makes no China / PRC / state-sponsorship claim.
false_flag_risk: none
summary: |
  Structurally important as an early instance of PRC-nexus
  operator use of compromised edge routers as both initial
  access enabler and update-channel MitM platform — the same
  primitive (compromised SOHO router → last-mile staging /
  injection) that becomes a signature of Volt Typhoon (2023)
  and Salt Typhoon (2024). BlackTech is also a long-running
  cluster against Taiwanese victims, so the operation maps
  cleanly to the Taiwan-island-collection pillar even before
  the post-2022 reunification-rhetoric escalation.
attributions:
  - actor_id: cn/unscoped/blacktech
    attributing_org: ESET
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-05-14
    attribution_source_id: eset/2019-05-14_plead-asus-webstorage
    notes: "ESET names 'the BlackTech group' (a named-actor cluster), linking this activity to it via the shared PLEAD backdoor + code-signing-cert reuse and its concentrated Taiwan deployment, and citing Trend Micro's prior PLEAD->BlackTech attribution ('according to Trend Micro, [PLEAD] is used by the BlackTech group'). ESET makes NO China / PRC / nation-state / state-sponsorship claim anywhere in the article (0 occurrences of China/Chinese/PRC/nation-state in the raw HTML) -- the cn/ placement of the actor rests on the actor record's broader literature (MITRE G0098), not on this source. Named-actor, not named-unit (no service named); high reflects ESET's confident malware-family/cert linkage rather than an independent nation-level attribution."
