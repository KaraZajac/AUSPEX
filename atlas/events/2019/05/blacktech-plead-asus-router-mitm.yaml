      ruled_out: "A financially-motivated or non-Taiwan-directed reading -- PLEAD/BlackTech is an espionage toolset with no revenue motive and its deployment here is concentrated on Taiwanese victims, leaving Taiwan collection the dominant strategic reading."
    counter_explanation: null
