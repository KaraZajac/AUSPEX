id: 2019-03/winnti-game-studios-eset
name: Winnti / APT41 Asian game-publisher supply-chain compromises
start_date: 2018-12-01
disclosure_date: 2019-03-11
end_date: 2019-02-28
incident_type:
  - supply-chain
  - intrusion
initial_vector: supply-chain
outcome_summary: |
  ESET discloses two PRC-nexus supply-chain compromises in
  which legitimately code-signed binaries from an Asian
  game-publisher / e-sports platform and two video-game
  studios were trojanized to deliver an "Auxiliary Manager"
  in-memory backdoor. Targets included a Thai e-sports
  platform and gaming studios in South Korea and Hong Kong.
false_flag_risk: none
summary: |
  Sits inside the timeline that becomes APT41's "private"
  side per the August 2019 DOJ indictment and the
  contemporaneous Mandiant Double Dragon report. ESET
  attributed the cluster to "Winnti Group" using its
  pre-2019 lineage labeling. The compromises matter because
  they document the operator's reliance on stealing
  legitimate code-signing material from upstream
  game-publisher victims and reusing it to push backdoors
  downstream — the exact tradecraft pattern documented in
  the 2017 NetSarang and CCleaner cases and the 2019 ASUS
  ShadowHammer operation. Combined, this is the earliest
  consolidated picture of APT41 supply-chain operations
  against gaming publishers in the year before formal DOJ
  indictment.
