      signals:
        - "K7-documented Crimson RAT spear-phishing operation inside the discrete Feb 2019 Pulwama/Balakot kinetic window"
        - "victimology unambiguously Indian military/government (CLAWS Army think-tank; actor conducts espionage on Indian government, diplomats and military entities)"
        - "the decoy weaponizes the crisis itself (Balakot/Jaish camp theme), tying operational tempo to the bilateral crisis cycle"
