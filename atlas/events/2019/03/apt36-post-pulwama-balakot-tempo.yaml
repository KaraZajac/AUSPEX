id: 2019-03/apt36-post-pulwama-balakot-tempo
name: Pakistani-aligned cyber tempo elevation during Pulwama / Balakot crisis cycle
start_date: 2019-02-14
disclosure_date: 2020-11-26
end_date: 2019-05-01
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Following the February 14 2019 Pulwama suicide attack on Indian
  CRPF personnel and the February 26 2019 Indian Air Force
  Balakot air strikes inside Pakistani territory, vendor reporting
  subsequently documented elevated Pakistani-aligned cyber
  operations against Indian military and government targets
  through spring 2019. The emergence of the SideCopy cluster
  is itself dated by Seqrite (Quick Heal) to 2019 in the
  Pulwama-Balakot aftermath; Transparent Tribe operations
  continued in parallel. Lures themed on Indian military
  circulars and CRPF communications dominated the period.
false_flag_risk: suspected
summary: |
  Foundational crisis-cycle event for the AUSPEX hypothesis that
  Pakistani-aligned APT tempo tracks bilateral India-Pakistan
  crisis cycles. The Pulwama-Balakot exchange — the most acute
  India-Pakistan kinetic exchange since Kargil 1999 — coincides
  with both the SideCopy cluster's first appearance in vendor
  reporting and continued APT36 operations. False-flag risk
  flagged as `suspected` because SideCopy emerged in this period
  with explicit SideWinder (Indian-aligned) tradecraft mimicry —
  the deliberate mimicry is itself a Pakistani-cluster
  attribution-muddying technique.
