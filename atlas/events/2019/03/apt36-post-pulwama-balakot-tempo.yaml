id: 2019-03/apt36-post-pulwama-balakot-tempo
name: Pakistani-aligned cyber tempo elevation during Pulwama / Balakot crisis cycle
start_date: 2019-02-14
disclosure_date: 2019-08-29
end_date: 2019-05-01
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Following the 14 February 2019 Pulwama suicide bombing that killed
  Indian CRPF personnel and the 26 February 2019 Indian Air Force
  Balakot airstrike on a Jaish-e-Mohammed camp inside Pakistan, K7
  Labs documented a Transparent Tribe / APT36 spear-phishing operation
  in the same crisis window: a decoy document titled
  "Exclusive_Pictures__destruction_of_Jaish_Camp_and_dead_bodies_of_terrorists"
  whose embedded macros dropped Crimson RAT, assessed as probably
  targeting the Centre for Land Warfare Studies (CLAWS) and other
  Indian government and military entities. K7 first discovered the
  document on 28 February 2019 and observed further Indian submissions
  through 8 July 2019. In parallel, Seqrite separately dates the
  emergence of the SideCopy cluster (which mimics SideWinder tradecraft)
  to "early 2019"; Seqrite does not itself tie SideCopy to the
  Pulwama / Balakot events. Together they mark elevated Pakistani-aligned
  operations against Indian military and government targets across
  spring 2019.
false_flag_risk: suspected
summary: |
  Crisis-cycle event for the AUSPEX hypothesis that Pakistani-aligned
  APT tempo tracks bilateral India-Pakistan crisis cycles. The
  Pulwama-Balakot exchange — the most acute India-Pakistan kinetic
  exchange since Kargil 1999 — coincides with a K7-documented
  Transparent Tribe Crimson RAT campaign that weaponized the Balakot
  strike itself as lure content, and with the SideCopy cluster's first
  appearance in vendor reporting (Seqrite 2020, describing activity
  from "early 2019"). The Pakistan nexus is hedged at the country level
  (K7: the actor's "interests align with Pakistan"); no cited source
  names a specific Pakistani service (no ISI). False-flag risk is
  flagged `suspected` for the SideCopy component only: SideCopy
  deliberately mimics SideWinder (Indian-aligned) tradecraft, itself an
  attribution-muddying technique — the Transparent Tribe Crimson RAT
  operation carries no false-flag indicator.
attributions:
  - actor_id: pk/unscoped/transparent-tribe
    attributing_org: K7 Labs
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-08-29
    attribution_source_id: k7computing/2019-08-29_transparent-tribe-pulwama-crimson-rat
    notes: |
      K7 attributes the Balakot / Jaish-themed Crimson RAT spear-phishing
      to Transparent Tribe / APT36 and hedges the sponsor at the country
      level ("its interests align with Pakistan"); it names no ISI or
      specific Pakistani service — consistent with the pk/unscoped
      placement. Kaspersky / Securelist corroborates the actor's Crimson
      RAT toolkit and Indian military / government / diplomatic victimology.
  - actor_id: pk/unscoped/sidecopy
    attributing_org: vendor-consensus
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2020-09-23
    attribution_source_id: seqrite/2020-11-26_sidecopy-emergence
    notes: |
      CAVEAT: SideCopy is included as contemporaneous crisis-window
      activity, NOT as a documented Pulwama-response operation. Seqrite
      (2020) dates SideCopy activity to "early 2019" and Talos (2021)
      confirms Indian government / defense targeting with SideWinder-TTP
      mimicry, but NO cited source ties SideCopy specifically to the
      Pulwama / Balakot trigger. The pk/unscoped placement holds (no ISI
      named in any SideCopy source).
