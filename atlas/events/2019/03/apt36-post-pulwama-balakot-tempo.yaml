  notes: |
    Single-event audit vs RAW. PATH: badrabbit RE-SOURCE — the event is
    REAL (APT36 / Transparent Tribe did run a Balakot-themed Crimson RAT
    spear-phishing op in the Feb-Mar 2019 crisis window) but its three
    cited sources did NOT carry the load-bearing claims: NONE of Seqrite
    (SideCopy 2020), Talos (SideCopy 2021), or Proofpoint (Transparent
    Tribe 2016) contains the string "Pulwama" or "Balakot" (0 hits each
    in the snapshotted raws), none names Crimson RAT in a 2019 context,
    and the Seqrite SideCopy report says only "early 2019" — it never ties
    SideCopy to the Pulwama / Balakot events. Found + snapshotted the
    genuine primary (K7 Labs) and a corroborating actor profile
    (Kaspersky / Securelist); re-pointed the core claim to them and fixed
    the over-claims. All 5 sources now snapshotted + hashed.

    NEW SOURCES (created + snapshotted this audit):
    - k7computing/2019-08-29_transparent-tribe-pulwama-crimson-rat
      (HTTP 200, 108,404 B, sha256 1cc83f76…6e0c16b6; JSON-LD
      datePublished 2019-08-29). LOAD-BEARING. Verbatim: "14 th February,
      Pulwama attack, a convoy of vehicles carrying Indian CRPF security
      personnel was attacked by a suicide bomber who belonged to the group
      Jaish-e-Mohammed. 26 th February, Balakot airstrike, Indian Air
      Force crossed LoC and dropped bombs on Jaish-e-Mohammed training
      camps."; "28 th February, K7 Labs discovered a Transparent Tribe
      spear phishing document titled
      'Exclusive_Pictures__destruction_of_Jaish_Camp_and_dead_bodies_of_terrorists'
      dropping Crimson RAT"; "the embedded macros in these documents
      dropped Crimson RAT"; "On July 8, 2019, K7 Labs observed two unique
      documents submitted from within India"; "probably used for targeting
      CLAWS (Centre for Land Warfare Studies)"; "active since 2013 and its
      interests align with Pakistan." No "ISI" in body.
    - securelist/2020-08-20_transparent-tribe-evolution-part1 (HTTP 200,
      214,194 B, sha256 944db1fa…c20130da; datePublished 2020-08-20).
      CORROBORATING. Verbatim: main malware "a custom .NET RAT publicly
      known as Crimson RAT"; targets "typically are Indian military and
      government personnel"; "military and diplomatic targets." No
      "Pulwama"/"Pakistan" in body — carries Crimson RAT + victimology
