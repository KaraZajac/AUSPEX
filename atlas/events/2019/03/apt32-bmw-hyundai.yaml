id: 2019-03/apt32-bmw-hyundai
name: APT32 intrusions into BMW and Hyundai networks
start_date: 2019-03-01
disclosure_date: 2019-12-06
end_date: 2019-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  German broadcaster Bayerischer Rundfunk (BR, with Tagesschau)
  reported in December 2019 that BMW had discovered and been
  monitoring an intrusion active since the spring of 2019. BMW's
  security team spotted the attackers after finding an instance of
  Cobalt Strike on a company computer, then watched them for months
  before cutting off access in late November 2019. The intrusion
  reportedly involved a fake BMW Thailand website; there was no
  evidence the attackers reached BMW's main data center in Munich,
  and it was assessed unlikely they obtained sensitive information.
  South Korean carmaker Hyundai was reported targeted in the same
  campaign, with fewer details. TTPs were linked to OceanLotus /
  APT32.
false_flag_risk: none
summary: |
  The most heavily reported instance of APT32 automotive
  targeting, surfacing during the period when VinFast (Vietnam's
  first domestic auto OEM, founded 2017) was launching its
  initial production vehicles and finalizing a US-market entry
  plan. BR reporting (mirrored by BleepingComputer, ZDNet and
  SecurityWeek in Dec 2019) named the cluster as OceanLotus /
  APT32, "a group believed to operate with orders from the
  Vietnamese government," and tied the automotive targeting to
  Vietnam's VinFast push. Hyundai targeting was reported
  contemporaneously, with less granular detail.
