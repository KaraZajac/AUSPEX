id: 2019-03/apt32-bmw-hyundai
name: APT32 intrusions into BMW and Hyundai networks
start_date: 2019-03-01
disclosure_date: 2019-12-06
end_date: 2019-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  German broadcaster Bayerischer Rundfunk and Norddeutscher Rundfunk
  (BR/NDR) reported in December 2019 that APT32 / OceanLotus had
  established Cobalt Strike beacons inside BMW's network from
  approximately March 2019 and had also intruded Hyundai. BMW
  reportedly monitored the intruders for several months before
  excising them in late November 2019. No production-line
  disruption; the campaign was assessed as IP collection.
false_flag_risk: none
summary: |
  The most heavily reported instance of APT32 automotive
  targeting, surfacing during the period when VinFast (Vietnam's
  first domestic auto OEM, founded 2017) was launching its
  initial production vehicles and finalizing a US-market entry
  plan. German vendor reporting (the same BR/NDR team that broke
  the Daimler intrusion) named the cluster as OceanLotus /
  APT32 with high confidence. Hyundai targeting was reported
  contemporaneously, with less granular detail.
attributions:
  - actor_id: vn/unscoped/apt32
    attributing_org: Bayerischer Rundfunk / Norddeutscher Rundfunk (with vendor sourcing)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2019-12-06
    attribution_source_id: br-ndr/2019-12-06_oceanlotus-bmw-hyundai
    notes: |
      Attribution rests on infrastructure overlap and tradecraft
      consistent with prior APT32 reporting. The German broadcasters
      cited unnamed BSI / vendor sources; no formal government
      attribution followed.
doctrine_links:
