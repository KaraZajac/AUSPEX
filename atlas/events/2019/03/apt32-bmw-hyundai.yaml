    confidence: strongly_inferred
    reasoning: |
      Target selection (BMW, Hyundai) maps directly onto the
      foreign-OEM IP-collection pattern that aligns with
      VinFast's launch timing. The reachable reporting explicitly
      ties the automotive targeting to Vietnam's VinFast push
      (BleepingComputer: OceanLotus moved into automotive targets
      "right after" Vietnam decided to build its own Vinfast cars;
      ZDNet: experts believe Vietnam is propping up "its fledgling
      automotive startup VinFast"). That is a journalistic reading
      of purpose, not an authoritative attributing source stating
      the goal, so the link stays strongly_inferred (no attesting
      source). The victim mix and timing make the industrial-
      upgrading reading the strongest available.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Victim mix is foreign auto OEMs (BMW/Germany, Hyundai/Korea) whose engineering IP is exactly what a late-entrant OEM needs"
        - "Timing coincides with VinFast's first-vehicle launch; multiple outlets tie the auto targeting to VinFast/Vingroup"
        - "APT32 is a Vietnam-state-aligned espionage actor with a documented affinity for auto-industry targets in 2019 (Toyota, Hyundai, BMW)"
      ruled_out: "Generic opportunistic espionage: does not explain the concentrated foreign-auto-OEM victimology or the VinFast-launch timing the reporting itself foregrounds."
