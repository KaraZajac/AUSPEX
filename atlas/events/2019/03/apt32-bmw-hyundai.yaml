      "a group believed to operate with orders from the Vietnamese
      government." Reaches named-actor (OceanLotus / APT32,
      Vietnam-nexus) but NO Vietnamese service is named — consistent
      with the vn/unscoped/apt32 actor record. Reported hedged
      ("allegedly", "report claims") — moderate confidence. No formal
      government attribution followed.
doctrine_links:
