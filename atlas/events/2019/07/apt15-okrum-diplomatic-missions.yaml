qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs ESET/WeLiveSecurity "Okrum: Ke3chang group takes aim at
    diplomatic missions" (Zuzana Hromcová, 2019-07-18), raw snapshot
    captured + hashed (sha256 07beac24…5cf01c00, 86,996 bytes). Real
    first-party article, not a phantom (title/body match; 76x "Okrum",
    48x "Ke3chang", 31x "Ketrican").
    [a] FACTS — corrected several. VICTIMS: source says "diplomatic
    missions in Slovakia, Belgium, Chile, Guatemala and Brazil" — event
    listed "Mexico" too; "Mexico" appears NOWHERE in the source (0 hits)
    → REMOVED. DATES: source says "Okrum was first detected in December
    2016 ... targeted diplomatic missions ... throughout 2017", and the
    broader Ketrican families "from 2015 to 2019"; event's "December
    2015" conflated Okrum's Dec-2016 detection with the 2015 family
    window → outcome_summary fixed and start_date 2015-12-01 → 2015-01-01
    (year-only "from 2015"). TOOLSET NAMES: event claimed "three
    generations ... (Ketrico, Ketrum, Okrum)"; "Ketrico"/"Ketrum" appear
    NOWHERE — actual families named are BS2005 (operation Ke3chang),
    RoyalDNS, and "Win32/Ketrican ... collectively referred to as
    Ketrican", plus the new Okrum → rewritten to the real names.
    STEGANOGRAPHY: source — "The payload of Okrum is hidden in a PNG
    file ... This steganography technique is an attempt ... to evade
    detection" (payload concealment, not C2); "steganographic C2"
    corrected to "steganographic payload concealment". INITIAL VECTOR:
    event had phishing; source explicitly states "How the Okrum malware
    was distributed to the targeted machines is a question that remains
    to be answered" → initial_vector phishing → unknown.
    [b] ATTRIBUTION — source: "our analysis ... lets us claim with high
    confidence that Okrum is operated by the Ke3chang group"; group
    "also known as APT15 ... believed to be operating out of China". No
    Chinese service named. attributing_org_confidence high retained;
    auspex_assessment concur retained.
    [c] DATES — source published_on 2019-07-18 correct (byline date);
    disclosure_date 2019-07-18 correct; start reset to 2015-01-01;
    end_date 2019-05-31 kept as a within-range estimate (activity
    documented "from 2015 to 2019" up to the July-2019 publication).
    [d] DOCTRINE — cn/bri political-intelligence-collection DOWNGRADED
    strongly_inferred → plausible: ESET's report is purely technical and
    states no strategic purpose, and the mixed target set (Latin America
    + small EU members outside the BRI core) leaves >1 strategic reading
    (BRI collection vs. generic China political espionage). attested NOT
    claimed; attesting_source_id null (correct). Added inference_basis.
    alternatives. Removed fabricated "Mexico" from the reasoning.
    [e] ATTRIBUTION_LEVEL — was missing; set named-actor (named group +
    China nexus, no service).
    [f] ACTOR_ID — cn/unscoped/apt15 RESOLVES (atlas/actors/cn/apt15.yaml,
    id cn/unscoped/apt15; already demoted from cn/mss on 2026-06-24 —
    correct, no over-attestation to MSS). Also de-attested "MSS-aligned
    operator" phrasing in the summary to "China-nexus (Ke3chang)".
    Residual: end_date is an estimate (source gives no precise op end).
