id: 2019-07/apt15-okrum-diplomatic-missions
name: APT15 / Ke3chang Okrum backdoor against diplomatic missions
start_date: 2015-12-01
disclosure_date: 2019-07-18
end_date: 2019-05-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  ESET discloses APT15 / Ke3chang's "Okrum" backdoor and its
  use against diplomatic missions in Belgium, Brazil, Chile,
  Guatemala, Mexico, and Slovakia between December 2015 and
  early 2019. Documents three generations of Ke3chang
  custom-backdoor evolution (Ketrico, Ketrum, Okrum) with
  improvements in persistence and steganographic C2.
false_flag_risk: none
summary: |
  Documents APT15's sustained collection effort against
  Latin American and small-EU-member diplomatic missions —
  the kind of regional MFA collection lane that aligns with
  BRI political-intelligence collection (Latin America was a
  BRI-priority expansion theater from 2017 onward). The
  multi-generation backdoor evolution also matters for AUSPEX
  baselining: it confirms that vendor disclosure of one
  generation has not in practice halted MSS-aligned operator
  development of the next, which constrains how much
  predictive value to assign to public IoC disclosure.
