id: 2019-07/apt15-okrum-diplomatic-missions
name: APT15 / Ke3chang Okrum backdoor against diplomatic missions
start_date: 2015-01-01
disclosure_date: 2019-07-18
end_date: 2019-05-31
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  ESET discloses APT15 / Ke3chang's "Okrum" backdoor, first
  detected in December 2016 and used against diplomatic
  missions in Slovakia, Belgium, Chile, Guatemala, and Brazil
  throughout 2017. ESET also documents new 2015-2019 versions
  of known Ke3chang malware families — the BS2005 backdoors
  (operation Ke3chang), collectively tracked by ESET as
  Ketrican, and RoyalDNS — linking them to Okrum and showing
  the group's continued toolset development in persistence and
  steganographic payload concealment (Okrum hides its payload
  inside a PNG image). ESET states the initial infection
  vector remained unknown.
false_flag_risk: none
summary: |
  Documents APT15's sustained collection effort against
  Latin American and small-EU-member diplomatic missions —
  the kind of regional MFA collection lane that aligns with
  BRI political-intelligence collection (Latin America was a
  BRI-priority expansion theater from 2017 onward). The
  multi-generation backdoor evolution also matters for AUSPEX
  baselining: it confirms that vendor disclosure of one
  generation has not in practice halted the China-nexus
  (Ke3chang) operator's development of the next, which
  constrains how much predictive value to assign to public
  IoC disclosure.
attributions:
