    notes: "ESET claims 'with high confidence that Okrum is operated by the Ke3chang group' (the Okrum↔Ke3chang link); the group is 'also known as APT15' and 'believed to be operating out of China'. Named-actor (named group + China nexus); NO Chinese service (MSS/PLA) named — hence actor is cn/unscoped/apt15, not cn/mss."
