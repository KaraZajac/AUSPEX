id: 2019-07/att-alien-labs-strongpity-winbox-tooling-rebuild
name: AT&T Alien Labs documents StrongPity tooling rebuild — WinBox / WinRAR / IDM trojanized installers
start_date: 2018-07-01
disclosure_date: 2019-07-17
end_date: 2019-07-01
incident_type:
  - intrusion
  - supply-chain
  - espionage
initial_vector: supply-chain
outcome_summary: |
  AT&T Alien Labs (Tom Hegel) published "Newly Identified
  StrongPity Operations," documenting a StrongPity / PROMETHIUM
  toolset rebuild. Per the report, the new samples "appear to
  have been created and deployed to targets following a toolset
  rebuild in response to … public reporting during the fourth
  quarter of 2018" (the March 2018 Citizen Lab "Bad Traffic"
  disclosure being the proximate prior report). The refreshed
  malicious installers observed in the wild included WinBox (the
  MikroTik router-administration GUI — chosen because "the
  targets are technically-focused types," i.e. network/IT
  administrators), WinRAR (continuity with the group's hallmark
  delivery vehicle), and Internet Download Manager. The delivered
  StrongPity spyware hunts for documents and retains remote
  access to the compromised machine, communicating with its C2
  over SSL. The campaign was assessed as ongoing and successful
  against at least some targets, with victims located in Turkey.
  AT&T also observed that the samples' compilation timestamps
  fell within a roughly 7 AM – 3 PM UTC window — an eight-hour
  workday consistent with a single-timezone operator (this
  operational-hours detail is carried only by the walled AT&T
  primary; AT&T did NOT tie the window to any specific country).
false_flag_risk: none
summary: |
  A "do the minimum" retooling event: after being publicly
  called out in 2018, the StrongPity/PROMETHIUM operators made
  only incremental changes to their malware and continued their
  hallmark method — trojanized installers of legitimate software
  (now including WinBox and Internet Download Manager alongside
  WinRAR) delivered to targets in Turkey. Two audit-relevant
  points: (1) the WinBox installer signals selection of network/
  IT-administration personnel, an attractive foothold for
  downstream access; (2) AT&T's attribution is deliberately
  UNRESOLVED at the state level — Hegel assessed the operators
  "likely have access to the capability of mass traffic
  manipulation and potential government involvement" and are
  "potentially selling the malware's capability to multiple
  entities for their own white-labeled use" / "could be selling
  its tools to multiple government organizations … in keeping
  with … FinFisher and Pegasus." AT&T attributes the operation to
  the StrongPity cluster with high confidence but names no nation
  or service; the Turkish-state reading (encoded by the actor
  record) is AUSPEX's via the malware family and broader vendor
  consensus, not AT&T's. The compilation-timestamp workday is a
  weak single-timezone signal, not a Türkiye attribution.
attributions:
  - actor_id: tr/unscoped/promethium
    attributing_org: AT&T Alien Labs (Tom Hegel)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2019-07-17
    attribution_source_id: att-alien-labs/2019-07-17_strongpity-newly-identified
    notes: |
      AT&T attributes the OPERATION to the StrongPity / PROMETHIUM
      activity cluster with high confidence (via compilation times,
      infrastructure, and public sample distribution) — hence
      attribution_level: named-actor. It makes NO nation or service
      attribution: Hegel frames the state nexus as unresolved,
      assessing the operators "likely have access to … potential
      government involvement" and "potentially selling the malware's
      capability to multiple entities for their own white-labeled
      use" (Threatpost) / "could be selling its tools to multiple
      government organizations" (CyberScoop). attributing_org_confidence
      is set moderate — not high — deliberately: AT&T's high confidence
      attaches only to the malware-CLUSTER identity, whereas this row's
      actor (tr/unscoped/promethium) encodes a Turkish-state nexus that
      AT&T does not assert (and its multi-government-vendor hedge
      actively softens). The Turkey-nexus placement is AUSPEX's via the
      malware family + vendor consensus recorded on the actor, not
      AT&T's — hence concur-with-caveat. No over-attestation of a
      Türkiye service.
doctrine_links:
  - doctrine_id: tr/counter-gulen-kurdish-surveillance
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      A continuation of the StrongPity/PROMETHIUM surveillance-
      implant pattern (document-hunting spyware, trojanized-installer
      delivery) against targets in Turkey fits the general shape of
      the counter-Gülen/Kurdish surveillance doctrine that the corpus
      attaches to this cluster. But the link is only plausible, not
      higher: this specific AT&T report identifies no Kurdish- or
      Gülen-specific victimology (it says only "users located in
      Turkey" and "technically-focused types"), states no strategic
      purpose, and — decisively — AT&T does not even firmly place the
      operator with the Turkish state, hedging instead toward a
      possible spyware vendor selling to multiple governments. No
      pillar is isolatable from the report, so pillar_id stays null.
      More than one strategic reading survives.
    contested: false
    analyst: claude
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Turkish-state counter-Gülen/Kurdish surveillance: consistent with the cluster's documented history (2018 Türk Telekom injection reaching Kurdish-adjacent targets) and the corpus's default doctrine alignment for PROMETHIUM, but this report carries no Kurdish/Gülen-specific indicators of its own."
        - "Commercial spyware proliferation / white-labeled sale to multiple governments: AT&T's own hedge — the operators may be 'selling the malware's capability to multiple entities for their own white-labeled use' — reads the activity as a PSOA/vendor model rather than a single Turkish-state counter-dissident program, which would decouple it from this doctrine."
