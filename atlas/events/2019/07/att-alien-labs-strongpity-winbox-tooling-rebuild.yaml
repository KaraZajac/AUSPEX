id: 2019-07/att-alien-labs-strongpity-winbox-tooling-rebuild
name: AT&T Alien Labs documents StrongPity tooling rebuild — WinBox / WinRAR / IDM trojanized installers
start_date: 2018-07-01
disclosure_date: 2019-07-17
end_date: 2019-07-01
incident_type:
  - intrusion
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  AT&T Alien Labs (Tom Hegel) published a StrongPity / PROMETHIUM
  analysis documenting an apparent toolset rebuild following
  Q4 2018 public reporting (Citizen Lab "Bad Traffic" in March
  2018 was the proximate cause). New trojanized-installer samples
  observed in the wild included WinBox (the MikroTik router-
  administration GUI — a tool with a network-admin user base
  attractive to a state-aligned operator), WinRAR (continuity
  with the 2016 victim-set), and Internet Download Manager.
  Operational-hours analysis of sample compilation timestamps
  showed activity confined to a 7 AM – 3 PM UTC workday,
  consistent with a single-timezone (UTC+3 / Türkiye) operator
  workforce.
false_flag_risk: suspected
summary: |
  Notable for two reasons: (1) the WinBox targeting expands the
  cluster's victim selection toward network-administration
  personnel — an attractive vector for downstream lateral
  movement; (2) the operational-hours analysis is one of the
  stronger circumstantial Turkey-aligned attribution data
  points in the corpus, since the UTC+3 workday is consistent
  with a Türkiye-based or Türkiye-time-zone operator. Suspected
  false-flag-risk preserved from the longer-running Stealth
  Falcon overlap discussion.
