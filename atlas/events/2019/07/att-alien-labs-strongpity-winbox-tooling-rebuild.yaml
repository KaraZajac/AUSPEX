  notes: |
    RE-SOURCE audit (badrabbit model): real, well-documented event; the sole cited source
    (att-alien-labs/2019-07-17_strongpity-newly-identified) is a HYBRID whose url actually
    points at CyberScoop secondary coverage, and the AT&T Alien Labs primary
    (cybersecurity.att.com/blogs/labs-research/newly-identified-strongpity-operations) is
    403 bot-walled. Added two reachable, snapshotted secondaries so every load-bearing claim
    is source-carried, and re-audited against them. Snapshots:
    • att-alien-labs (CyberScoop page) sha256 54c19791…3366ce3a, 95,456 bytes.
    • bleepingcomputer/2019-07-17_strongpity-winrar-winbox-idm sha256 f47e9ad9…834c0c69f, 89,018 bytes.
    • threatpost/2019-07-17_strongpity-apt-retooled-spyware sha256 64e45515…166d9a4d, 68,559 bytes.
    [a] FACTS — corrected/re-grounded. WinBox + WinRAR + Internet Download Manager (IDM):
    all three carried verbatim (BleepingComputer "Winbox, WinRAR, and Internet Download
    Manager (IDM)"; Threatpost "newer versions of WinRAR and a tool called Internet Download
    Manager (IDM)"). Toolset rebuild: BleepingComputer verbatim — "created and deployed to
    targets following a toolset rebuild in response to the above public reporting during the
    fourth quarter of 2018." WinBox→network-admin selection: Threatpost "the targets are
    technically-focused types … given these choices." Spyware capability / document hunting /
    remote access / SSL C2: Threatpost + CyberScoop. Operational-hours 7AM-3PM UTC workday:
    genuine but carried ONLY by the walled AT&T primary (surfaced verbatim via web index:
    "all samples fit into a standard eight hour workday between 7AM UTC and 3PM UTC"); NO
    reachable mirror reproduces it. Kept as AT&T's observation but STRIPPED the AUSPEX
    embellishment that had recast it as "one of the stronger circumstantial Turkey-aligned
    attribution data points in the corpus" / "consistent with (UTC+3 / Türkiye) operator" —
    AT&T draws no country from the window. STRIPPED the unsupported "Stealth Falcon overlap"
    false-flag rationale: no cited/reachable source in scope mentions Stealth Falcon, and
    AT&T's actual attribution posture is vendor-ambiguity (multi-government white-labeling),
    not deception — so false_flag_risk set none (was suspected). Added incident_type
    espionage (document-hunting spyware).
    [b] ATTRIBUTION — set attribution_level: named-actor (was missing). AT&T attributes the
    operation to the StrongPity cluster with HIGH confidence (BleepingComputer: "attributed
    with high confidence to StrongPity"), but makes NO nation/service claim and hedges toward
    a spyware vendor "selling the malware's capability to multiple entities for their own
    white-labeled use" (Threatpost) / "could be selling its tools to multiple government
    organizations … FinFisher and Pegasus" (CyberScoop). Kept attributing_org_confidence
    moderate (NOT high): the high confidence is only to the malware cluster, while this row's
    actor tr/unscoped/promethium encodes a Turkish-state nexus AT&T does not assert. Added an
    attribution notes block; auspex_assessment concur-with-caveat retained. No over-attestation.
    [c] DATES — published_on 2019-07-17 = disclosure_date (source record verified). start_date
    2018-07-01 anchors the "second half of 2018" activity window; end_date 2019-07-01 ~ ongoing
    to the July 2019 report. No start/disclosure conflation.
    [d] DOCTRINE_LINKS — kept tr/counter-gulen-kurdish-surveillance at plausible (honest),
    pillar_id null (this report isolates no pillar and carries no Kurdish/Gülen victimology).
    Rewrote the reasoning (removed the false "Turkey-time-zone finding strengthens the
    Turkish-state reading" claim) and ADDED inference_basis.alternatives (Turkish-state
    counter-dissident vs commercial spyware-proliferation / white-labeled multi-government
