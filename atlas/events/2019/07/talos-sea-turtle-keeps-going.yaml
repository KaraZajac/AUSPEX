id: 2019-07/talos-sea-turtle-keeps-going
name: Cisco Talos publishes Sea Turtle follow-on — operator unfazed by attribution
start_date: 2019-04-17
disclosure_date: 2019-07-09
end_date: 2019-07-09
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos published a follow-on Sea Turtle analysis three
  months after the April 2019 attribution, documenting continued
  operations and tradecraft refinement. The cluster modified
  infrastructure but did not change operational pattern. Notable
  for documenting an operational "doubling-down" response to
  Western attribution — rare among non-Russian / non-DPRK clusters.
false_flag_risk: none
summary: |
  Notable because most APT clusters reduce operational tempo or
  rotate infrastructure substantially after public attribution.
  Sea Turtle's continuation through mid-2019 signaled that
  Turkish state direction was sufficiently confident in the
  asset that public exposure did not materially alter tasking.
