id: 2019-07/talos-sea-turtle-keeps-going
name: Cisco Talos publishes Sea Turtle follow-on — operator unfazed by attribution
start_date: 2019-04-19
disclosure_date: 2019-07-09
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Cisco Talos published a follow-on Sea Turtle analysis on 9 July
  2019, roughly three months after its April 2019 report. Talos
  states the actors "are not slowing down," "regrouped" after the
  earlier coverage, and are "redoubling their efforts with new
  infrastructure," calling the group "unusually brazen." The report
  documents new victims: the Greek country-code TLD (.gr) registry
  operator ICS-Forth (compromised 19 April 2019, access held through
  at least 24 April), three unnamed Greek government entities on the
  .gr ccTLD, one organization in Syria, and a government organization
  in the Middle East / North Africa region. Talos also describes a
  new DNS-hijacking technique it assesses with moderate confidence is
  linked to the Sea Turtle actors. Talos names no nation-state.
false_flag_risk: none
summary: |
  Notable because most exposed clusters reduce operational tempo or
  rotate infrastructure after public attribution; the Sea Turtle
  operators instead continued and expanded operations through
  mid-2019. This Talos source names no nation-state — it describes
  only "the actors behind the Sea Turtle campaign." The Turkey nexus
  now attached to the Sea Turtle / Teal Kurma cluster rests on LATER
  reporting (Reuters, 2020; Hunt & Hackett, 2024), not on this
  report; the actor is therefore held at tr/unscoped/sea-turtle.
