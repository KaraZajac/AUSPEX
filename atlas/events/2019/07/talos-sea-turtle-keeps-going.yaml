  notes: |
    FLAGGED over-attribution event, audited against the single cited Talos raw
    (talos__2019-07-09_sea-turtle-state-sponsored-keeps-going.html, sha256
    b4711f9b…2ad28c1d, 121,569 bytes — hash re-verified on disk, matches source record).

    [a] FACTS — TWO fabrications confirmed and STRIPPED:
      (1) Prior summary asserted "Turkish state direction was sufficiently confident in the
          asset…". FALSE: over the whole raw, turk=0, turkey=0, turkish=0, "state-sponsored"=0,
          "national intelligence"=0. Talos names only "the actors behind the 'Sea Turtle'
          campaign" / "this group" ("unusually brazen"). Rewrote summary to name no nation and
          to note the Turkey nexus rests on LATER reporting (Reuters 2020, Hunt & Hackett 2024),
          not this source.
      (2) Target set. Event previously listed orgs/cypriot-ministries as primary. FALSE for this
          report: cyprus=0, cypri=0 in the raw (and iraq=0, kurd=0 — the "Iraqi Kurdistan" the
          two sibling audits flagged is likewise absent). The report's actual NEW victims are:
          ICS-Forth = "The Institute of Computer Science of the Foundation for Research and
          Technology - Hellas (ICS-Forth), the ccTLD for Greece", compromised "on April 19, 2019",
          access held "through at least April 24"; "three government entities that all used .gr,
          the Greek ccTLD"; "an organization in Syria"; and "a government organizations in the
          Middle East and North African region." Repointed target to orgs/ics-forth-gr-cctld
          (country: gr) — the concrete named victim, matching the sibling 2019-04/sea-turtle-
          ics-forth-greek-cctld event which cites this same Talos report.
      Rewrote outcome_summary to the source-carried "not slowing down / regrouped / redoubling
      their efforts with new infrastructure / unusually brazen" language and the real victim list;
      removed the unsourced "rare among non-Russian / non-DPRK clusters" editorial.
    [b] ATTRIBUTION — Talos attributes the continued activity to its own Sea Turtle cluster with
      high confidence (the new technique is linked "with moderate confidence"). No nation. Kept
      actor tr/unscoped/sea-turtle, Cisco Talos, confidence high; added attribution_level:
      activity-cluster (was missing).
    [c] DATES — source published_on 2019-07-09 confirmed (matches raw + record). Fixed event
      conflations: start_date 2019-04-17 (that was the April report's pub date) → 2019-04-19 (the
      documented ICS-Forth compromise date in this raw); end_date 2019-07-09 (had duplicated the
      disclosure date) → null (Talos states operations were ongoing — "not slowing down").
    [d]/[e] DOCTRINE — tr/mavi-vatan/eastern-med-energy downgraded strongly_inferred → plausible.
      This source names no nation and states no strategic purpose, and its prior reasoning
      ("same victim-set as the April 2019 disclosure") was wrong — the April report's victim set
      differed. Not attested (no attesting_source_id; correct). Added inference_basis.alternatives
      (two surviving strategic readings). attribution_level set to activity-cluster per [b].
    [f] ACTOR — tr/unscoped/sea-turtle resolves to atlas/actors/tr/unscoped/sea-turtle.yaml
      (referenced by all sibling Sea Turtle events); no change requested, consistent with the
      "Turkey nexus is later-reporting" framing.

    FLAGS for orchestrator:
