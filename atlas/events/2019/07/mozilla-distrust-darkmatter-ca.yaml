    STEP 0 / PHANTOM triage: the canonical primary
    mozilla/2019-07-09_distrust-darkmatter (Mozilla Security Blog
    "Distrusting New DarkMatter Certificates") is REAL but
    link-rotted — the blog URL returns HTTP 404 (confirmed this pass,
    41,963 B soft-404) and Wayback has NO snapshot (CDX + availability
    API both empty; Wayback verified working here via an example.com
    control that returned snapshots, so the "no archive" finding is
    ground truth, not an environment artifact). RE-SOURCE path
    ("badrabbit model"): the blog source is KEPT (canonical, correctly
    url-nulled, still cited by 2 sibling records so not orphaned) and
    FOUR snapshotted corroborators were created to carry the facts:
    two Mozilla primaries (Bugzilla 1427262, 1564544) + two secondaries
    (BleepingComputer, The Register), plus the Mozilla-list appeal
    (mail-archive). No source is a phantom; nothing flagged for RETIRE.

    [a] FACTS — one material correction. The event previously said
    Mozilla "announces active distrust of NEW DarkMatter intermediate
    certificates issued after the decision date." That is wrong:
    Mozilla (i) DENIED the pending ROOT inclusion request — Bugzilla
    1427262 RESOLVED WONTFIX, whiteboard "[ca-denied]" (Comment #96),
    roots DarkMatter Root CA G3/G4 + UAE Global Root CA G3/G4 (raw
    "WONTFIX" 78x, "ca-denied" 3x, "UAE Global Root" 23x); and (ii)
    DISTRUSTED the three ALREADY-ISSUED QuoVadis-chained subordinate
    CAs — Bugzilla 1564544 RESOLVED FIXED, adding "DarkMatter Assured
    CA" / "DarkMatter High Assurance CA" / "DarkMatter Secure CA" to
    OneCRL (raw "OneCRL" 15x, "DarkMatter Assured CA" 4x, opened by
    Wayne Thayer). Added verified facts: the DigitalTrust rebrand of
    the CA business, the QuoVadis cross-sign, Wayne Thayer as Module
    Owner, Kathleen Wilson's 2019-07-16 concurrence, and the verbatim
    reasoning — Thayer "our foremost responsibility is to protect
    individuals who rely on Mozilla products" / "continuing to place
    trust in DarkMatter is a significant risk to our users"
    (bleepingcomputer + theregister raws, both "significant risk" 1x)
    and Deckelmann's "credible evidence from multiple sources that
    DarkMatter participates in spying" (theregister raw). The Reuters
    Project Raven citation was already present and is CONFIRMED
    verbatim ("Due to reporting by Reuters ... a ... hacking group
    called Project Raven", bleepingcomputer raw). No fabricated
    figures/CVEs/victims present.

    [b] ATTRIBUTION — reframed to a defender counter-action per task:
    actor_id null (Mozilla is not an attacker); attributing_org =
    Mozilla CA Certificate Policy module (Thayer, concurred Wilson),
    high, auspex concur; SUBJECT named in prose = ae/darkmatter
    (DarkMatter Group / LLC). Previously the block attributed to
    ae/darkmatter/project-raven with Mozilla as attributing_org — but
    the Mozilla decision is about DarkMatter THE COMPANY (the CA
    applicant), not the Project Raven program per se, and the task +
    protocol [f] require actor_id null for a counter-action. Model:
