id: 2019-07/mozilla-distrust-darkmatter-ca
name: Mozilla denies DarkMatter root-CA inclusion and distrusts its existing intermediate certificates in Firefox
start_date: 2019-07-09   # Module Owner (Wayne Thayer) decision + Mozilla Security Blog announcement
disclosure_date: 2019-07-09   # "Distrusting New DarkMatter Certificates" blog post publication
end_date: 2019-07-16   # Kathleen Wilson's concurrence finalising the Module Owner decision
incident_type:
  - documentary
  - policy
initial_vector: unknown
outcome_summary: |
  Mozilla's CA Certificate Policy module (Module Owner Wayne
  Thayer, concurred by Kathleen Wilson on 2019-07-16) took a
  two-part browser-trust-governance action against the UAE firm
  DarkMatter (DarkMatter LLC; CA business rebranded "DigitalTrust"):
  (1) it DENIED DarkMatter's pending root-store inclusion request
  — Bugzilla 1427262 (roots DarkMatter Root CA G3/G4 and UAE Global
  Root CA G3/G4) was resolved WONTFIX / "[ca-denied]"; and (2) it
  ACTIVELY DISTRUSTED DarkMatter's already-issued intermediate CAs
  — Bugzilla 1564544 added three QuoVadis-chained DarkMatter
  subordinate CAs ("DarkMatter Assured CA", "DarkMatter High
  Assurance CA", "DarkMatter Secure CA") to Mozilla's OneCRL
  revocation list. Mozilla's stated reasoning rested on its
  "foremost responsibility ... to protect individuals who rely on
  Mozilla products" and on "credible evidence from multiple sources
  that DarkMatter participates in spying" — expressly citing the
  Reuters January 2019 Project Raven reporting — concluding that
  "continuing to place trust in DarkMatter is a significant risk to
  our users." The action foreclosed DarkMatter/DigitalTrust's
  public-CA business ambition. (Correction: the earlier framing that
  Mozilla distrusted only "new intermediate certificates issued
  after the decision date" was imprecise — Mozilla revoked trust in
  the three EXISTING subordinate CAs via OneCRL.)
false_flag_risk: none
summary: |
  Browser-trust-governance counter-action, and a third-party
  policy-decision-level corroboration of the Reuters Project Raven
  reporting. This is a DEFENSIVE move by Mozilla (an internet-
  infrastructure governance body) against DarkMatter — it is NOT a
  cyber-attack and has no attacker actor: Mozilla is the acting
  party and DarkMatter (ae/darkmatter, the Abu Dhabi state-aligned
  vendor) is the SUBJECT of the decision. Analytically it documents
  that a web-PKI trust authority treated DarkMatter as offensive-
  cyber-aligned at the trust-decision threshold in July 2019 —
  predating both the September 2021 DOJ deferred-prosecution
  agreements (federal-prosecutorial level) and the August 2022 State
  Department ITAR debarments (export-control level) against the
  ex-NSA DarkMatter operators. Sibling of the DarkMatter / Karma /
  Project-Raven cluster; the underlying Reuters (Jan 2019) and
  Intercept (Jun 2019) reporting DarkMatter's spying is captured in
  adjacent event entries. (NB: no browser-trust / web-PKI-governance
  doctrine exists in the AUSPEX corpus to link Mozilla's own
  defender-side posture to — flagged as a candidate; the only
  linkable doctrine here is the UAE subject-side procurement-led
  frame, below.)
