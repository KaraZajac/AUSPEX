id: 2019-07/mozilla-distrust-darkmatter-ca
name: Mozilla refuses DarkMatter as trusted certificate authority in Firefox
start_date: 2019-07-09
disclosure_date: 2019-07-09
end_date: 2019-07-09
incident_type:
  - documentary
  - policy
initial_vector: n-a
outcome_summary: |
  Mozilla Foundation publishes "Distrusting New DarkMatter
  Certificates" — formally declining to include DarkMatter as
  a trusted root certificate authority in Mozilla's CA program
  for Firefox. The decision explicitly cites the Reuters Project
  Raven reporting (January 2019) and the documented offensive-
  cyber posture of DarkMatter as inconsistent with the trust
  requirements for a public CA. Mozilla simultaneously announces
  active distrust of new DarkMatter intermediate certificates
  issued after the decision date.
false_flag_risk: none
summary: |
  Third-party-policy-decision-level confirmation of the Reuters
  Project Raven reporting. Mozilla's distrust decision is
  significant for the procurement-led-capability framing: it
  documented that an internet-infrastructure governance body
  treated DarkMatter as offensive-cyber-aligned at the
  policy-decision threshold, predating the September 2021 DOJ
  DPA at the federal-prosecutorial level. The decision also
  effectively foreclosed DarkMatter's commercial CA business
  ambition.
