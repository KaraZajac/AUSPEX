  notes: |
    Phantom/bot-wall remediation (RE-SOURCE path) + 6-point audit of the
    sibling of Operation WireWire (2018-06). The lone cited DOJ release
    (justice.gov/usao-edla/...) is Akamai bot-walled: curl returns a 2.5KB
    bm-verify interstitial, not the article -> un-snapshottable, NO content
    hash recorded. Corroborated verbatim via two snapshottable govt-primary
    mirrors of the same-day release, both added to sources[]:
    usss/2019-09-10_operation-rewired-bec (raw usss__2019-09-10_operation-rewired-bec.html,
    sha256 b0bf6ff1…a8325160, 84226 bytes) and
    fbi/2019-09-10_operation-rewired-bec-takedown (raw
    fbi__2019-09-10_operation-rewired-bec-takedown.html, sha256
    b19bd1a9…f636aa7e, 80746 bytes). Hence qc level: partial (load-bearing
    primary un-snapshottable; claims mirror-corroborated).
    [a] FACTS — all confirmed. USSS verbatim: "Operation reWired, a
    coordinated law enforcement effort by the U.S. Department of Justice,
    U.S. Department of Homeland Security, U.S. Department of the Treasury,
    U.S. Postal Inspection Service, and the U.S. Department of State, was
    conducted over a four-month period, resulting in 281 arrests in the
    United States and overseas, including 167 in Nigeria, 18 in Turkey and
    15 in Ghana. Arrests were also made in France, Italy, Japan, Kenya,
    Malaysia, and the United Kingdom (UK)." Added the 18/15 Turkey/Ghana
    numbers. Money: USSS "seizure of nearly $3.7 million"; FBI page carries
    the wire-transfer figure verbatim — "the seizure of nearly $3.7 million
    and the disruption and recovery of approximately $118 million in
    fraudulent wire transfers." Reworded "USD 3.7M recovered / USD 118M
    intercepted" -> "nearly USD 3.7M seized / ~USD 118M disrupted/recovered"
    to match source. The 74-US / 281-total split and four-month duration
    both verbatim.
    CORRECTED the agency credit (the audit's key finding, mirroring the
    WireWire fix): removed "Treasury OIG" — NOT a reWired component; the
    Treasury body named in the AG's remarks is "IRS Criminal Investigation".
    Added "US Secret Service" (named in the same list) and noted DOJ's
    "more than two dozen U.S. Attorney's Offices". DOS Diplomatic Security
    Service is CONFIRMED a genuine reWired participant ("U.S. Department of
    State's Diplomatic Security Service") — this is the release FROM WHICH
    "DOS DSS" had been wrongly copied into the WireWire event, but here it
    belongs. AG-remarks roster verbatim: "the FBI, more than two dozen U.S.
    Attorney's Offices, U.S. Secret Service, U.S. Postal Inspection Service,
    Homeland Security Investigations, IRS Criminal Investigation, U.S.
    Department of State's Diplomatic Security Service".
    [b] ATTRIBUTION — null-actor law-enforcement counter-action (no single
    named group; correct per the directionality model). attributing_org_confidence
    high (DOJ arrests/charges); auspex_assessment concur; attribution_level
    omitted (no actor to grade). attribution_source_id kept as the DOJ
    release (the announcing authority).
    [c] DATES — disclosure_date/end_date 2019-09-10 (USSS "Published Date
    2019-09-10"). start_date 2019-05-01 retained as a within-window estimate
    (source states only a "four-month period" ending at the 2019-09-10
    announcement ≈ May 2019; no precise op-start published).
    [d] DOCTRINE_LINKS — [] correct: stateless profit-motivated BEC fraud,
    no state doctrine applies (per NB; not invented).
    [e] ATTRIBUTION_LEVEL — n/a (null actor).
    [f] ACTOR_ID — null (resolves trivially). No actor flag.
    incident_type [disruption] -> [law-enforcement, financial-theft]:
    meta law-enforcement counter-action (directionality model); BEC is
    "cyber-enabled financial fraud" (USSS release title) = financial-theft.
    "disruption" wrongly read this takedown as an offensive disruptive
    cyberattack on a victim. Now matches the audited WireWire sibling.
