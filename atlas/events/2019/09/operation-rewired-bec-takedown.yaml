id: 2019-09/operation-rewired-bec-takedown
name: Operation reWired — 281 arrests in coordinated BEC enforcement
start_date: 2019-05-01
disclosure_date: 2019-09-10
end_date: 2019-09-10
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US DOJ + FBI + DHS HSI + USPIS + Treasury OIG + DOS DSS
  Operation reWired — a four-month coordinated international
  enforcement action against BEC syndicates. 281 arrests
  across the US (74), Nigeria (167), Turkey, Ghana, France,
  Italy, Japan, Kenya, Malaysia, and the UK. Approximately
  USD 3.7M recovered and USD 118M intercepted in fraudulent
  wire transfers. Larger second-wave action following
  Operation WireWire (June 2018, 74 arrests).
false_flag_risk: none
summary: |
  Operation reWired remains the largest single BEC-syndicate
  prosecution by defendant count and the canonical Nigerian-
  cooperative case in the BEC enforcement record. AUSPEX
  classifies as criminal-baseline.
