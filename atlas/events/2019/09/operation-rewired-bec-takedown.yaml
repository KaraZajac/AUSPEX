id: 2019-09/operation-rewired-bec-takedown
name: Operation reWired — 281 arrests in coordinated BEC enforcement
start_date: 2019-05-01
disclosure_date: 2019-09-10
end_date: 2019-09-10
incident_type:
  - law-enforcement
  - financial-theft
initial_vector: unknown
outcome_summary: |
  US DOJ (25+ US Attorney's Offices) + FBI + US Secret
  Service + USPIS + DHS HSI + Treasury IRS-CI + DOS DSS
  Operation reWired — a four-month coordinated international
  enforcement action against BEC syndicates. 281 arrests
  across the US (74), Nigeria (167), Turkey (18), Ghana (15),
  and France, Italy, Japan, Kenya, Malaysia, and the UK.
  Nearly USD 3.7M seized and approximately USD 118M
  disrupted/recovered in fraudulent wire transfers. Larger
  second-wave action following Operation WireWire (June 2018,
  74 arrests).
false_flag_risk: none
summary: |
  Operation reWired remains the largest single BEC-syndicate
  prosecution by defendant count and the canonical Nigerian-
  cooperative case in the BEC enforcement record. AUSPEX
  classifies as criminal-baseline.
