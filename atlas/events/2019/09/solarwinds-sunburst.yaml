  notes: |
    Audited vs all 4 cited sources. SNAPSHOTS (all 4 hashes match):
    whitehouse__2021-04-15_svr-solarwinds-attribution.html sha256
    61f054ee…3461ea9b (158,596 B; pre-existing, re-verified; captured
    via archive_url — live WH page purged at the 2025 transition);
    treasury__2021-04-15_eo-14024-svr-sanctions.html sha256
    aebcf56e…f6cc2134 (129,731 B; pre-existing, re-verified — this IS
    the correct jy0127 "Sweeping New Sanctions Authority" release; a
    naive tag-strip mis-renders an embedded "latest news" APT31 block,
    but the SolarWinds/SVR body is present and hashed); cisa__2020-12-13
    _ed-21-01-solarwinds.html sha256 3d269cea…597dea73 (100,780 B; NEWLY
    SNAPSHOTTED this pass — live url 200, 301-redirects to "…-closed"
    archived copy, 13-Dec-2020 issuance text intact); ncsc-uk__2021-05
    _further-ttps-svr.pdf sha256 ddb749eb…f9b68f03 (355,021 B, 14pp;
    pre-existing, re-verified).

    [a] FACTS — STRIPPED uncited embellishment / conflated 2021+
    tradecraft the cited set does NOT carry (confirmed 0 hits across all
    4 raw sources): SUNSPOT, the MSBuild-injector framing, RAINDROP,
    SUNSHUTTLE, the "Nobelium" alias, "Domain Generation Algorithm"
    phrasing, the "FBI Director Wray June 2021 confirmed" sentence, and
    "reshaped US executive-branch cyber policy (EO 14028)" (anachronism —
    every cited source predates EO 14028 of 12 May 2021). KEPT because
    source-carried: SUNBURST + TEARDROP (CISA verbatim "malicious
    backdoor AKA TEARDROP or SUNBURST"), the trojanized DLL
    "SolarWinds.Orion.Core.BusinessLayer.dll" (CISA), the avsvmcloud[.]com
    beacon (CISA), SAML/AD FS "golden SAML" abuse (CISA: that config "is
    currently being exploited by the threat actor"), Cobalt Strike +
    GoldMax/GoldFinder/Sibot "after compromising a victim via SolarWinds"
    + the Mimecast cert/Azure-app abuse (NCSC). SCALE reconciled to
    sources: WH "more than 16,000 computer systems worldwide"; Treasury
    "tens of thousands of SolarWinds' customers" / "thousands of U.S.
    government and private sector networks"; NCSC "a much smaller number
    of victims for follow-on compromise activity." quantified_impact
    18,000/100 KEPT (correct per the record — 18,000 = max distribution
    per SolarWinds' SEC 8-K, ~100 = US-govt-assessed hand-selected
    victims) but ANNOTATED inline: those integers are NOT in the 4 cited
    primaries (public-record); NCSC carries only the qualitative
    large-pool→small-set ratio → contributes to level: partial.

    [b] ATTRIBUTION — SVR (APT29) high-confidence, no over-attestation.
    WH verbatim: "formally naming the Russian Foreign Intelligence
    Service (SVR), also known as APT 29, Cozy Bear, and The Dukes, as the
    perpetrator of the broad-scope cyber espionage campaign that exploited
    the SolarWinds Orion platform" + "high confidence in its assessment of
    attribution to the SVR." Treasury verbatim: "the Russian Intelligence
    Services' third arm, the SVR, is responsible for the 2020 exploit of
    the SolarWinds Orion platform." NCSC + CISA (15-Apr-2021 update)
    corroborate. Both attributions kept concur/high.

    [c] DATES — disclosure_date 2020-12-13 CARRIED (CISA: "On December 13,
    2020, CISA issued ED 21-01"). All source published_on verified vs raw
    (WH "April 15, 2021"; Treasury jy0127 15-Apr-2021; CISA 13-Dec-2020;
    NCSC "Version 1.0 / 7 May 2021"). start_date 2019-09-01 (initial
    build-system compromise) and end_date 2020-12-31 are NOT carried by
    any cited source — the Sept-2019 onset is the documented public-record
    intrusion date (SolarWinds/CrowdStrike/GAO timeline; NB-confirmed),
    kept but uncited → level: partial. Dates NOT conflated: onset (Sep
    2019) vs disclosure (Dec 2020) correctly distinct.

    [d] DOCTRINE_LINKS — both are Russian (attacker) doctrine on a Russian
    op → perspective: attacker-rationale ADDED to both. Neither attested
    (correct — the sources state espionage intent, not the doctrine's
    terminal goal). ru/fpc-2023/anti-anglo-saxon kept strongly_inferred
    (WH "broad-scope cyber espionage" = goal-class; FPC-2023 post-dates
    the op; inference_basis already well-formed). ru/info-security-2016/
    information-sphere-as-domain was MISSING inference_basis (a defect for
    a strongly_inferred link) — ADDED signals (WH "broad-scope cyber
    espionage" + NCSC "align with Russian foreign intelligence interests
    … for intelligence gain") + ruled_out. Both pillars equal the actor's
    default_doctrine_alignment_ids — no conflict.

    [e] ATTRIBUTION_LEVEL — was MISSING on both attributions; ADDED
    named-unit to each (sources name the specific state service — the SVR
    — not merely "Russia"; matches sibling 2021-04/svr-cloud-identity-
    campaign "named state service ⇒ named-unit"; petrobras "the NSA ⇒
    named-actor" is the alternative reading, noted inline).

    [f] ACTOR_ID — ru/svr/apt29 resolves (atlas/actors/ru/apt29.yaml,
    internal id ru/svr/apt29). Espionage op by the perpetrator; actor_id
    correct (not a counter-action). incident_type supply-chain / intrusion
