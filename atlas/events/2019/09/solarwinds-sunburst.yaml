id: 2019-09/solarwinds-sunburst
name: SolarWinds Orion supply-chain compromise (SUNBURST)
start_date: 2019-09-01  # initial software-build-system compromise
disclosure_date: 2020-12-13
end_date: 2020-12-31
incident_type:
  - supply-chain
  - intrusion
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  Compromise of the SolarWinds software build system to inject
  SUNBURST/SUNSPOT/TEARDROP backdoors into legitimate signed
  Orion network-monitoring updates. ~18,000 organizations
  downloaded the trojaned update; ~100 were actually targeted,
  including US Treasury, Commerce, State, DHS, DOE/NNSA, Justice;
  Microsoft, FireEye, Mimecast. Most-significant strategic-
  espionage supply-chain compromise on record; reshaped US
  executive-branch cyber policy (EO 14028).
quantified_impact:
  organizations_with_trojaned_update: 18000
  organizations_actually_targeted: 100
false_flag_risk: none
campaign_id: solarwinds-chain
summary: |
  White House April 2021 fact sheet and Treasury OFAC EO 14024
  sanctions formally attributed the operation to the SVR (APT29 /
  Cozy Bear / Nobelium). FBI Director Wray June 2021 confirmed.
  The operation began with SUNSPOT, an injector implanted on
  SolarWinds's MSBuild server that surreptitiously rewrote the
  Orion source tree at build time to insert SUNBURST — a
  signed-binary backdoor in SolarWinds.Orion.Core.BusinessLayer.dll
  with a Domain Generation Algorithm beacon and selective
  second-stage targeting via the TEARDROP and RAINDROP Cobalt
  Strike loaders. Post-access tradecraft at the ~100 hand-
  selected victims included credential dumping and abuse of
  valid credentials, golden-SAML token forgery against on-prem
  ADFS for persistent cloud access, the GoldMax / SUNSHUTTLE
  backdoor, and the GoldFinder / Sibot loaders — establishing
  SVR's cloud-identity tradecraft that the post-2021 campaign
  refined.
