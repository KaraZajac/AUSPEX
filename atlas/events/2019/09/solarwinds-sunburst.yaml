id: 2019-09/solarwinds-sunburst
name: SolarWinds Orion supply-chain compromise (SUNBURST)
start_date: 2019-09-01  # initial software-build-system compromise
disclosure_date: 2020-12-13
end_date: 2020-12-31
incident_type:
  - supply-chain
  - intrusion
  - data-theft
initial_vector: supply-chain
outcome_summary: |
  Trojanization of legitimate signed SolarWinds Orion
  network-monitoring updates to insert the SUNBURST backdoor
  (with the TEARDROP second-stage loader). CISA Emergency
  Directive 21-01 (13 Dec 2020) ordered all federal civilian
  agencies to disconnect Orion. The White House assessed the SVR
  gained the ability "to spy on or potentially disrupt more than
  16,000 computer systems worldwide"; Treasury put malware on the
  machines of "tens of thousands" of SolarWinds customers and
  compromised "thousands of U.S. government and private sector
  networks" — from which, per the NCSC/CISA advisory, the SVR
  selected "a much smaller number of victims for follow-on
  compromise activity" in line with intelligence priorities
  (Mimecast and SolarWinds among the acknowledged compromises).
  Widely regarded as the most significant strategic-espionage
  supply-chain compromise on record.
quantified_impact:
  organizations_with_trojaned_update: 18000  # max distribution count (SolarWinds SEC 8-K "fewer than 18,000"); WH cites ">16,000 computer systems", Treasury "tens of thousands of customers" — public-record integer, not in the 4 cited primaries
  organizations_actually_targeted: 100  # US-govt-assessed hand-selected victims; NCSC carries only the qualitative "much smaller number of victims for follow-on compromise" — integer not in the cited primaries
false_flag_risk: none
campaign_id: solarwinds-chain
summary: |
  White House April 2021 fact sheet and Treasury OFAC EO 14024
  sanctions formally attributed the operation to the SVR — named
  in the sources as Russia's Foreign Intelligence Service, "also
  known as APT 29, Cozy Bear, and The Dukes" — with the US
  Intelligence Community holding "high confidence" in the
  attribution. The SVR trojanized legitimate signed SolarWinds
  Orion updates to insert SUNBURST, a backdoor in
  SolarWinds.Orion.Core.BusinessLayer.dll that beaconed to
  avsvmcloud[.]com, with selective second-stage delivery of
  Cobalt Strike loaders including TEARDROP (CISA ED 21-01). From
  the large pool of Orion customers the SVR selected "a much
  smaller number of victims for follow-on compromise activity"
  (NCSC): tradecraft there included abuse of valid/stolen
  credentials, exploitation of SAML authentication tied to
  on-prem AD FS (the "golden SAML" technique, flagged by CISA as
  actively exploited), and — deployed "after compromising a
  victim via SolarWinds" — the GoldMax backdoor plus the
  GoldFinder and Sibot tools (NCSC/Microsoft). The SVR further
  leveraged its SolarWinds access to compromise a Mimecast
  certificate and abuse the Mimecast Azure application to reach
  downstream customer mailboxes.
