    pillar_id: ru/fpc-2023/anti-anglo-saxon
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale
    reasoning: |
      The White House fact sheet names "broad-scope cyber espionage"
      as the intent but does not name the Foreign Policy Concept 2023
      (which post-dates the operation); the SVR strategic-collection
      priority is continuous with FPC framing, so the doctrine
      linkage is inferred.
    attesting_source_id: whitehouse/2021-04-15_svr-solarwinds-attribution
    inference_basis:
      source_id: whitehouse/2021-04-15_svr-solarwinds-attribution
      signals:
        - "WH fact sheet names 'broad-scope cyber espionage' as the SVR strategic intent (goal-class, not doctrine)"
      ruled_out: "the Foreign Policy Concept 2023 / anti-Anglo-Saxon pillar — not named, and post-dates the operation"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/info-security-2016
    pillar_id: ru/info-security-2016/information-sphere-as-domain
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale
    reasoning: |
      The cited sources characterise the SVR as Russia's civilian
      foreign-intelligence service running "broad-scope cyber
      espionage" (WH) / collection "for intelligence gain" (NCSC) —
      sustained strategic collection in the information domain, which
      the 2016 Information Security Doctrine frames as a domain of
      state competition. The sources state the intelligence-collection
      purpose but not the 2016 doctrine or a doctrine-slug goal, so the
      WHY is inferred, not attested.
    attesting_source_id: ncsc-uk/2021-05_further-ttps-svr
    inference_basis:
      source_id: ncsc-uk/2021-05_further-ttps-svr
      signals:
        - "WH fact sheet: the SVR ran a 'broad-scope cyber espionage campaign' — sustained strategic state collection"
        - "NCSC advisory: the SVR 'targets organisations that align with Russian foreign intelligence interests' … 'for intelligence gain'"
      ruled_out: "the 2016 Information Security Doctrine / information-sphere-as-domain pillar is named in no cited source; the WHY is inferred from the stated intelligence-collection purpose, not attested"
    counter_explanation: null
    contested: false
    analyst: claude
