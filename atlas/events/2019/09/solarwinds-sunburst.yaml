    attributing_org_confidence: high
    attribution_level: named-unit  # WH names the state service "the Russian Foreign Intelligence Service (SVR), also known as APT 29" — matches sibling svr-cloud-identity convention (named state service ⇒ named-unit); the petrobras "the NSA ⇒ named-actor" precedent is the alternative reading
    auspex_assessment: concur
    attribution_date: 2021-04-15
    attribution_source_id: whitehouse/2021-04-15_svr-solarwinds-attribution
  - actor_id: ru/svr/apt29
    attributing_org: US Department of the Treasury (OFAC EO 14024)
    attributing_org_confidence: high
    attribution_level: named-unit  # Treasury names "the Russian Intelligence Services' third arm, the SVR" as responsible for the SolarWinds Orion exploit
    auspex_assessment: concur
    attribution_date: 2021-04-15
    attribution_source_id: treasury/2021-04-15_eo-14024-svr-sanctions
