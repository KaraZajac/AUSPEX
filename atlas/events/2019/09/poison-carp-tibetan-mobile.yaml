id: 2019-09/poison-carp-tibetan-mobile
name: Poison Carp — Tibetan-diaspora 1-click mobile exploitation
start_date: 2018-11-01
disclosure_date: 2019-09-24
end_date: 2019-05-31
incident_type:
  - intrusion
  - data-theft
initial_vector: exploit-public-facing
outcome_summary: |
  Citizen Lab discloses an operation against senior Tibetan
  political and religious figures using WhatsApp and other
  chat-app messages carrying one-click URLs that exploited
  iOS and Android browser-renderer chains to install
  cross-platform mobile spyware. Targets included the Office
  of His Holiness the Dalai Lama, the Central Tibetan
  Administration, and Tibetan parliamentarians.
false_flag_risk: none
summary: |
  Documented PRC-nexus mobile-exploit capability against the
  Tibetan diaspora at a level (one-click renderer exploit
  chains) previously associated mainly with commercial vendor
  capability (NSO, Hacking Team) — important precedent for
  later disclosures of indigenous PRC mobile-exploit
  development. Targeting Dalai-Lama-related offices is the
  canonical diaspora-and-dissident collection lane authorized
  under the 2017 National Intelligence Law and historically
  the highest-priority Tibetan target for MSS-aligned operators.
  Citizen Lab attributes Poison Carp to a PRC-nexus operator
  based on infrastructure overlap with prior Tibetan-diaspora
  targeting reports; no specific cluster name is asserted.
attributions:
