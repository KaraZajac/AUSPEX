id: 2019-09/poison-carp-tibetan-mobile
name: Poison Carp — Tibetan-diaspora 1-click mobile exploitation
start_date: 2018-11-01
disclosure_date: 2019-09-24
end_date: 2019-05-21
incident_type:
  - intrusion
  - data-theft
  - surveillance
initial_vector: n-day
outcome_summary: |
  Citizen Lab discloses an operation against senior Tibetan
  political and religious figures using WhatsApp and other
  chat-app messages carrying one-click URLs that exploited
  iOS and Android browser-renderer chains to install
  cross-platform mobile spyware. Targets included the Office
  of His Holiness the Dalai Lama, the Central Tibetan
  Administration, and Tibetan parliamentarians.
false_flag_risk: none
summary: |
  Documented PRC-nexus mobile-exploit capability against the
  Tibetan community at a level (one-click renderer exploit
  chains on iOS and Android) Citizen Lab compares to the
  commercial spyware vendors that "sell services exclusively
  to governments" — the first documented use of iOS exploits
  and spyware against these communities. The iOS chain was
  n-day ("was not a zero-day exploit when we observed it";
  iOS 11.0–11.4), and the Android exploits included a
  publicly released Exodus Intelligence exploit. Citizen Lab
  coins the operator cluster "POISON CARP" and, on shared iOS
  exploits/implant and server-infrastructure overlap, links
  it to the Google Project Zero watering-hole campaign and
  Volexity's "Evil Eye" campaign as "the same operator or a
  closely coordinated group of operators who share resources,"
  all targeting ethnic-minority groups (Uyghurs, Tibetans)
  "sensitive in the context of China's security interests."
  Citizen Lab names no pre-existing group and no Chinese
  service; AUSPEX does not attribute the cluster to Mustang
  Panda. Targeting the Office of His Holiness the Dalai Lama,
  the Central Tibetan Administration, and the Tibetan
  Parliament is the canonical diaspora-and-dissident collection
  lane the 2017 National Intelligence Law encodes (AUSPEX
  doctrine inference, not a Citizen Lab claim).
