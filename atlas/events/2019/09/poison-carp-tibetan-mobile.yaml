  notes: |
    Audited vs Citizen Lab "Missing Link: Tibetan Groups Targeted with 1-Click
    Mobile Exploits" (Research Report No. 123, 2019-09-24). Raw snapshot captured:
    citizenlab__2019-09-24_poison-carp-tibetan.html, 238,269 bytes, sha256
    55e83331…3a7c5dbb. Real first-party article (not a phantom).
    [a] FACTS ✓ — "Between November 2018 and May 2019, senior members of Tibetan
    groups received malicious links in individually tailored WhatsApp text
    exchanges"; "Between November 11-14, 2018, we observed 15 intrusion attempts
    against individuals from the Private Office of His Holiness the Dalai Lama, the
    Central Tibetan Administration, the Tibetan Parliament, and Tibetan human
    rights groups. On April 22 and May 21 2019, we observed two additional
    attempts"; one-click iOS + Android browser-renderer exploit chains → spyware, all
    verbatim-supported. CORRECTED summary: removed unsupported "(NSO, Hacking Team)"
    — those names appear NOWHERE in the 2019 report body (only a 2026 sidebar news
    widget); replaced with the report's actual comparison to "commercial spyware
    vendors who sell services exclusively to governments." Added the n-day evidence.
    [b] ATTRIBUTION — KEY CORRECTION. Citizen Lab names NO pre-existing group:
    grep of the raw = 0 occurrences of mustang / panda / reddelta / ta416 / redalpha,
    and 0 of MSS / PRC / Ministry / state-security. It coins a NEW single-operator
    cluster "POISON CARP" and links it (shared iOS exploits + server infra) to
    Google Project Zero and Volexity's "Evil Eye" as "the same operator or a closely
    coordinated group of operators who share resources," targeting China-sensitive
    ethnic minorities. The prior record claimed attributing_org: Citizen Lab attributed
    to Mustang Panda at moderate confidence — false / over-attribution (the notes even
    conceded it was a "working assignment" on portfolio overlap). DEMOTED actor_id
    cn/unscoped/mustang-panda -> null; set attribution_level: activity-cluster,
    auspex_assessment: concur. No confidence phrasing ("moderate/high confidence" = 0
    in source); attributing_org_confidence kept moderate as AUSPEX's read of Citizen
    Lab's own certainty in the single-operator cluster.
    [c] DATES ✓ — source published 2019-09-24 (matches). start 2018-11-01 (op window
    opens Nov 2018; first attempts Nov 11-14 2018). end_date TIGHTENED 2019-05-31 ->
    2019-05-21 (the last observed attempt). disclosure 2019-09-24.
    [d] DOCTRINE — kept strongly_inferred (honest): source frames China-security-
    interest targeting of sensitive ethnic minorities incl. the top Tibetan
    leadership, but never names NIL-2017 or states the collection goal, so not
    attested; attesting_source_id null. Added inference_basis {signals[], ruled_out}.
    [e] ATTRIBUTION_LEVEL set activity-cluster (Citizen Lab defines an operator
    cluster; no nation-state or service formally named).
    [f] ACTOR_ID FLAG: cn/unscoped/mustang-panda was the wrong actor for this event.
    POISON CARP has no actor record (MISP 7aa99279-…, previously flagged for creation
    as cn/unscoped/poison-carp). Orchestrator/Kara: create cn/unscoped/poison-carp
    and re-point this event's actor_id to it. Did NOT create the actor file per protocol.
    RESIDUAL: with actor_id null, eventStateId falls back to the attacker-rationale
    cn doctrine (correct — China-nexus). incident_type gained "surveillance" (targeted
    mobile spyware against individuals).
