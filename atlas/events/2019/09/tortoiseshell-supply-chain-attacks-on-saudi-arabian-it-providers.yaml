id: 2019-09/tortoiseshell-supply-chain-attacks-on-saudi-arabian-it-providers
name: "Tortoiseshell supply-chain attacks on Saudi Arabian IT providers"
start_date: 2019-09-01
incident_type:
  - espionage
  - supply-chain
  - intrusion
initial_vector: unknown
false_flag_risk: none
summary: |
  Symantec reported that Tortoiseshell (the actor cluster later equated with Imperial Kitten / TA456 / Crimson Sandstorm) compromised IT providers in Saudi Arabia in what appeared to be supply-chain attacks aimed at reaching the providers' customers. Active since at least July 2018, the group hit a total of 11 organizations, the majority in Saudi Arabia, using a mix of custom and off-the-shelf malware. Its signature tool was a custom backdoor Symantec named Backdoor.Syskit (written in both Delphi and .NET) that could download and execute additional tools and commands. In at least two organizations the attackers achieved domain-admin access, and on two networks several hundred machines were infected. Symantec stated it had no evidence at the time to attribute the activity to any known group or nation-state.
