  notes: |
    Audited against ESET/WeLiveSecurity "No summer vacations for Stealth Falcon —
    Win32/StealthFalcon backdoor using Windows BITS" (Matthieu Faou, 2019-09-09). RAW snapshot
    re-verified: eset__2019-09-09_stealth-falcon-bits.html, sha256 7dc2c994…6bfc33c4, 84,149 bytes
    (hash unchanged from the 2026-06-24 actor-audit capture). Single cited source; no phantom.
    [a] FACTS — BITS/Background Intelligent Transfer Service abused for C&C: CARRIED verbatim
    ("uses the standard Windows component Background Intelligent Transfer Service (BITS)"; "Malware
    uses BITS Jobs for C&C communication"; the COM-interface / host-firewall-evasion framing is the
    source's own). CORRECTED two fabricated facts: (1) start_date was 2018-01-01 "earliest sample
    telemetry per ESET" — the report carries NO 2018 telemetry; it says the backdoor "appears to
    have been created in 2015" — start_date -> 2015-01-01. (2) initial_vector was "phishing
    (assumed)" — ESET explicitly states "How the backdoor was distributed and executed on the target
    systems is beyond the scope of this investigation" -> set to unknown. Rewrote summary: removed
    "Kaspersky FruityArmor" corroboration claim ("kaspersky"/"fruityarmor" = 0 occurrences in raw);
    the source corroborates Citizen Lab (2016) and connects to Project Raven (Reuters/Amnesty) only.
    Dropped author name "Matthieu Faou" from outcome_summary prose (byline not present in the
    captured snapshot; retained in the source record's publisher field). Added the source's real
    victim set (UAE, Saudi Arabia, Thailand, Netherlands diplomatic mission) to outcome_summary.
    [b] ATTRIBUTION — ESET: "strong evidence that Win32/StealthFalcon was created by this group" /
    "drive us to the conclusion that the Win32/StealthFalcon backdoor is also the work of this threat
    group" = high confidence to the named Stealth Falcon group; KEPT attributing_org_confidence high,
    auspex_assessment concur. Added attribution_level: named-actor (ESET names the group, no UAE
    service/unit — consistent with the actor being ae/unscoped). Rewrote the attribution note to the
    source's actual clustering basis (code + infrastructure similarity, not "victimology").
    [c] DATES — published_on 2019-09-09 matches raw ("09 Sep 2019"); disclosure_date 2019-09-09 ✓;
    start_date corrected to 2015 (above); end_date 2019-09-09 retained (disclosure-event convention).
    [d] DOCTRINE — link is strongly_inferred (attesting_source_id null, valid: no attested gate).
    ESET states the target profile (journalists/activists/dissidents in the ME) but NOT a UAE-state
    strategic goal, so attested is correctly withheld. Added inference_basis {signals[], ruled_out}
    documenting the one-dominant-reading triangulation. Pillar journalists-in-exile is the finer
    inference (ESET names journalists among the targets; specific exile status not stated) — doctrine
    fit is solid at the ae/regime-protection-surveillance level. perspective absent = attacker-
    rationale, correct (UAE doctrine on a UAE actor; no state mismatch).
    [e] attribution_level added: named-actor.
    [f] ACTOR_ID ae/unscoped/stealth-falcon RESOLVES (atlas/actors/ae/stealth-falcon.yaml, id
    ae/unscoped/stealth-falcon; demoted from ae/darkmatter on 2026-06-24 — well-formed, no flag).
    Pillar FK ae/regime-protection-surveillance/journalists-in-exile resolves; target sector FKs
    media/journalism + civil-society/dissident resolve.
    RESIDUAL: this backdoor's small victim set (incl. a Netherlands-based ME diplomatic mission) is
    broader than pure dissident/journalist targeting; targets[] models the group-level profile ESET
    restates, not the per-victim breakdown, which is defensible but noted.
