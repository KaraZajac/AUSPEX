id: 2019-09/eset-stealth-falcon-bits-disclosure
name: ESET disclosure — Stealth Falcon Win32 backdoor using Windows BITS for C2
start_date: 2018-01-01  # earliest sample telemetry per ESET
disclosure_date: 2019-09-09
end_date: 2019-09-09
incident_type:
  - intrusion
  - surveillance
initial_vector: phishing  # assumed; consistent with cluster tradecraft
outcome_summary: |
  ESET Research (Matthieu Faou) publishes reverse-engineering of
  a Stealth Falcon Win32 backdoor that abuses the Windows BITS
  (Background Intelligent Transfer Service) for command-and-
  control communications. The technique allows persistence and
  C2 to blend with legitimate Windows update / download traffic,
  bypassing many host-based monitoring approaches.
false_flag_risk: none
summary: |
  Extends documented Stealth Falcon activity timeline through
  2019 and corroborates Citizen Lab + Kaspersky FruityArmor
  attribution. Tradecraft refinement (BITS-based C2) is
  consistent with cluster continuity rather than a new operator.
