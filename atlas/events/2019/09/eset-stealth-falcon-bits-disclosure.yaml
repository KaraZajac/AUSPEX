id: 2019-09/eset-stealth-falcon-bits-disclosure
name: ESET disclosure — Stealth Falcon Win32 backdoor using Windows BITS for C2
start_date: 2015-01-01  # Win32/StealthFalcon backdoor "appears to have been created in 2015" per ESET (group active since 2012)
disclosure_date: 2019-09-09
end_date: 2019-09-09
incident_type:
  - intrusion
  - surveillance
initial_vector: unknown  # ESET: distribution/execution "beyond the scope of this investigation"
outcome_summary: |
  ESET Research publishes reverse-engineering of a Stealth Falcon
  Win32 backdoor (Win32/StealthFalcon) that abuses the Windows
  BITS (Background Intelligent Transfer Service) for command-and-
  control. Exposed via a COM interface and commonly permitted by
  host-based firewalls, BITS lets the backdoor's C&C blend with
  legitimate background traffic and is harder for security
  products to detect. ESET saw a small number of targets in the
  UAE, Saudi Arabia, Thailand and the Netherlands (the last a
  Middle Eastern diplomatic mission); it states the backdoor's
  distribution and execution were beyond the scope of the report.
false_flag_risk: none
summary: |
  ESET reverse-engineered a previously-undocumented Win32 backdoor
  that "appears to have been created in 2015" and attributed it to
  the Stealth Falcon group on the strength of code and
  infrastructure similarities with the PowerShell backdoor Citizen
  Lab documented in 2016. ESET restates Stealth Falcon's known
  target profile — journalists, activists and dissidents in the
  Middle East — and notes Amnesty International's assessment that
  Stealth Falcon and the UAE-linked "Project Raven" are the same
  group. ESET names no UAE service or unit; the tradecraft
  (BITS-based C2) is consistent with cluster continuity.
attributions:
  - actor_id: ae/unscoped/stealth-falcon
    attributing_org: ESET Research
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-09-09
    attribution_source_id: eset/2019-09-09_stealth-falcon-bits
    notes: |
      ESET clusters the Win32/StealthFalcon backdoor to the Stealth
      Falcon group on code and infrastructure similarities with the
      PowerShell backdoor attributed to the group by Citizen Lab
      ("strong evidence that Win32/StealthFalcon was created by this
      group"). Named-actor: ESET names the Stealth Falcon group but
      no UAE service or unit — hence ae/unscoped.
doctrine_links:
  - doctrine_id: ae/regime-protection-surveillance
    pillar_id: ae/regime-protection-surveillance/journalists-in-exile
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      ESET attributes this backdoor to the Stealth Falcon group and
      restates the group's documented mission — targeting
      journalists, activists and dissidents in the Middle East. That
      target profile is the substance of the UAE
      regime-protection-surveillance doctrine (journalists-in-exile
      pillar). ESET does not itself state a UAE-state strategic
      purpose, so the link is strongly_inferred, not attested: the
      actor's entire documented mission plus the named target classes
      triangulate to one dominant strategic reading.
    attesting_source_id: null
    inference_basis:
      signals:
        - "ESET restates the actor's mission: 'targeted spyware attacks against journalists, activists and dissidents in the Middle East'."
        - "Backdoor attributed to Stealth Falcon, whose Citizen Lab-documented purpose is UAE regime-protection surveillance of dissidents/journalists."
        - "Amnesty International equates Stealth Falcon with UAE-linked Project Raven (same targets/attacks), reinforcing the state-nexus surveillance reading."
      ruled_out: "Generic foreign-intelligence espionage — the exclusively dissident/journalist/activist target profile and the actor's single documented mission make broad state-on-state collection the weaker reading."
    contested: false
    analyst: claude
targets:
  - target_id: sectors/civil-society/dissident
    role: primary
  - target_id: sectors/media/journalism
    role: primary
sources:
  - eset/2019-09-09_stealth-falcon-bits
