name: "Tortoiseshell fake 'Hire Military Heroes' website targeting US military veterans"
start_date: 2019-09-01
incident_type:
  - espionage
  - reconnaissance
initial_vector: phishing
false_flag_risk: none
summary: |
  Cisco Talos discovered that Tortoiseshell (the actor previously named by Symantec, now tracked as Imperial Kitten / TA456) stood up a fake website, hiremilitaryheroes[.]com, posing as a job-search resource for US military veterans, with a URL closely imitating the legitimate U.S. Chamber of Commerce service hiringourheroes.org. Visitors were prompted to download a desktop application that was in fact a malware downloader; once run, the fake installer fetched a reconnaissance binary and a remote-access tool that profiled the system and communicated via hard-coded credentials to actor-controlled email accounts. Talos linked the campaign to Tortoiseshell because it reused the same backdoor and TTPs seen in the group's earlier compromise of a Saudi Arabian IT provider.
