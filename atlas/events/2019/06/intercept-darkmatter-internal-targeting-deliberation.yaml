id: 2019-06/intercept-darkmatter-internal-targeting-deliberation
name: The Intercept — DarkMatter Project Raven operators discussed targeting US journalists covering UAE
start_date: 2017-01-01  # approximate intra-DarkMatter discussion window per Stroud testimony
disclosure_date: 2019-06-12
end_date: 2019-06-12
incident_type:
  - documentary
  - intrusion
initial_vector: unknown  # documentary
outcome_summary: |
  The Intercept (Sam Biddle) publishes first-person testimony
  from Lori Stroud (a former NSA contractor and Project Raven
  operator who turned whistleblower) plus corroborating internal
  documents that Project Raven operators inside DarkMatter
  discussed targeting The Intercept and its reporters covering
  UAE affairs, following Reuters' January 2019 Project Raven
  disclosure. The piece extends the Reuters reporting with
  detail on intra-DarkMatter deliberation around US-persons
  targets and on the operator-side awareness that targeting US
  journalists would breach the US-NSA debriefing agreements
  signed by ex-NSA personnel.
false_flag_risk: none
summary: |
  Operationally significant follow-on to the January 2019 Reuters
  Project Raven disclosure. The US-persons-targeting dimension
  is what AUSPEX uses as the bridge between the Reuters reporting
  and the September 2021 DOJ DPA finding — the DPA explicitly
  cited operators continuing capability development after FBI
  notification that targeting US persons violated US law. The
  Intercept piece is the canonical source for the intentionality
  framing of that DPA finding.
