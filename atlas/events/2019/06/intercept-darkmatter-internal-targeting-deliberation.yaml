id: 2019-06/intercept-darkmatter-internal-targeting-deliberation
name: The Intercept — DarkMatter / Project Raven operators discussed hacking The Intercept over its UAE coverage
start_date: 2016-01-01  # approximate; per source the targeting deliberation "would have happened in 2016," triggered by McLaughlin's 2016 Intercept article
disclosure_date: 2019-06-12
end_date: 2019-06-12
incident_type:
  - surveillance   # the deliberation concerned a collection-motivated hacking op by a surveillance program; broader Raven activity is surveillance of journalists/dissidents
  - documentary    # journalistic disclosure (The Intercept)
initial_vector: unknown  # documentary; discussed method (per Cole) was text/social/email spearphishing, but no attack against The Intercept was confirmed executed
outcome_summary: |
  The Intercept (Sam Biddle and Matthew Cole) reports that operatives
  inside DarkMatter's UAE covert-hacking program Project Raven discussed
  targeting The Intercept itself and breaching its employees' computers,
  in retaliation for the outlet's 2016 reporting (by Jenna McLaughlin)
  that first exposed the CyberPoint / DarkMatter–UAE connection. The
  account rests on two sources — an anonymous member of the hacking team
  who says they were present in a Project Raven conference room when the
  attack was discussed, and a second source who said the discussion
  included DarkMatter executive Marc Baier (ex-NSA) — plus on-record
  corroboration from Jonathan Cole, an ex-Raven targeting employee, on
  how such news-triggered target lists were built ("Here's the article,
  find the people responsible … that's your target list — go"). The
  Intercept could not find evidence an attack was ever carried out (it
  "would have happened in 2016"); a third source was unaware of any
  attempt. The piece extends Reuters' January 2019 Project Raven
  disclosure with the US-persons / critical-press dimension: Cole's
  on-record account that American data was collected deliberately despite
  assurances it was incidental, and that Wired, Amnesty International, and
  Human Rights Watch were likely also targeted by Raven for the NESA.
false_flag_risk: none
summary: |
  Operationally significant follow-on to the January 2019 Reuters Project
  Raven disclosure, and the clearest published account of Project Raven's
  retaliatory targeting of the press that covered it. AUSPEX uses the
  US-persons / critical-media dimension as an analytic bridge to the
  September 2021 DOJ deferred-prosecution agreement against ex-NSA
  DarkMatter operators (Baier, Adams, Gericke) — two of whom, Marc Baier
  and Ryan Adams, are named in this article. NB (audit): the DPA's
  specific findings (operators continuing after FBI notification that
  targeting US persons was unlawful) are carried by the separate DOJ DPA
  record, NOT by this 2019 article, which reports only that the FBI was
  investigating DarkMatter's use of US hacking expertise "and the
  possibility that it was wielded against Americans." This article's own
  contribution is the intra-Raven deliberation over hacking The Intercept
  and Cole's on-record account of deliberate US-persons collection.
