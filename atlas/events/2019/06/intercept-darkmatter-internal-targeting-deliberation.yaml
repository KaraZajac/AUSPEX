    auspex_assessment: concur
    attribution_date: 2019-06-12
    attribution_source_id: intercept/2019-06-12_darkmatter-uae-hack-intercept
    notes: |
      Sourcing is two sources on the targeting discussion — an anonymous
      member of the hacking team present at the planning meeting, and a
      second source who named DarkMatter executive Marc Baier as part of
      it — plus on-record corroboration from ex-Raven targeting employee
      Jonathan Cole (distinct from co-author Matthew Cole). NOT Lori
      Stroud, who was a Reuters Project Raven source, not an Intercept
      source here (Stroud/whistleblower/testimony/documents 0x in the raw
      — see qc). Attribution is to Project Raven operationally; the
      customer/tasking service is the NESA (later the UAE Signals
      Intelligence Agency), named in the article as Raven's primary
      "client." concur on the deliberation; the attack itself was
      discussed, not confirmed executed.
