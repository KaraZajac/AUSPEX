id: 2019-06/iran-retaliation-tanker
name: US CYBERCOM cyber-strike on IRGC systems (post-tanker/drone retaliation)
start_date: 2019-06-20  # op conducted "Thursday evening" 2019-06-20 (Yahoo/WaPo/NYT all say "Thursday")
disclosure_date: 2019-06-21  # first reported by Yahoo News on Fri 2019-06-21; WaPo & NYT (2019-06-22) both credit Yahoo as first
end_date: 2019-06-20
incident_type:
  - disruption   # NYT: breach "meant to take the Iranian intelligence group offline for a time"
  - destructive  # WaPo: "disabled Iranian computer systems"; "more disabling... not something they can put back together so easily" (task hint "offensive" is not a valid AUSPEX incident_type; represented here)
initial_vector: unknown  # NYT: "Few details are known"
outcome_summary: |
  US Cyber Command struck two Iranian target sets on the night of
  2019-06-20: (1) an IRGC-tied intelligence / "spy" group that had
  digitally tracked ships in the Strait of Hormuz and helped plan the
  June 2019 limpet-mine attacks on oil tankers (Yahoo/NYT/WaPo), and
  (2) — via an "additional breach" — computer systems that control
  Iranian rocket/missile launches (WaPo/NYT). The operation was
  launched the same day Trump called off a planned kinetic strike on
  Iranian radar/missile targets (recalled on learning ~150 Iranians
  might die), and was "allowed to go forward because it was intended
  to be below the threshold of armed conflict" (NYT). Reported effect
  is mixed: NYT frames the intelligence-group breach as meant to take
  it "offline for a time," while a WaPo source said the operation was
  "more disabling" and "not something they can put back together so
  easily"; effectiveness against the missile-launch systems was called
  unverifiable absent an Iranian launch attempt.
false_flag_risk: none
summary: |
  First reported by Yahoo News (Jenna McLaughlin, Zach Dorfman & Sean
  D. Naylor) on 2019-06-21, then by Ellen Nakashima (WaPo) and Julian
  E. Barnes & Thomas Gibbons-Neff (NYT) on 2019-06-22 (David E. Sanger
  and Eric Schmitt contributed to the NYT report). A US Cyber Command
  offensive operation against IRGC-linked infrastructure, ordered as
  the non-kinetic alternative after Trump recalled a planned airstrike
  responding to Iran's downing of an RQ-4 Global Hawk surveillance
  drone and the Gulf-of-Oman tanker attacks. NOT officially confirmed:
  the White House, US Cyber Command and the Pentagon (spokeswoman
  Elissa Smith: "we do not discuss cyberspace operations, intelligence
  or planning") declined to comment; the reporting rests on anonymous
  US officials familiar with / briefed on the operation.
