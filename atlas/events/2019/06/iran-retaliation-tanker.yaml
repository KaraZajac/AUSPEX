id: 2019-06/iran-retaliation-tanker
name: Iran retaliation strike (post-tanker attacks)
start_date: 2019-06-20  # operation reportedly conducted June 20, 2019
disclosure_date: 2019-06-22  # WaPo / NYT
end_date: 2019-06-20
incident_type:
  - disruption
initial_vector: unknown  # not detailed
outcome_summary: |
  Reported degradation of IRGC intelligence systems used to plan
  tanker attacks plus reported missile-control system targeting.
  Followed Trump's last-minute recall of a planned kinetic strike;
  the cyber operation was framed by senior officials (on background)
  as the proportional response in lieu of the kinetic option.
false_flag_risk: none
summary: |
  Reported by Ellen Nakashima (WaPo) and David Sanger / Julian Barnes
  (NYT) on June 22, 2019. Officially confirmed by senior administration
  officials on background. Marks the first publicly identifiable
  CYBERCOM offensive operation against IRGC infrastructure framed as
  proportional response.
