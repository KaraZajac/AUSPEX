id: 2019-06/apt32-toyota-australia
name: APT32 intrusions of Toyota Australia and Toyota Japan
start_date: 2019-02-01
disclosure_date: 2019-03-21
end_date: 2019-06-30
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Toyota Australia disclosed a cyber attack in February 2019;
  Toyota Tokyo and the Toyota subsidiary in Vietnam (Toyota
  Vietnam) followed with disclosures in March 2019. Subsequent
  vendor reporting (FireEye / Mandiant) attributed the Toyota
  Australia intrusion to APT32. The campaign is part of a broader
  pattern of Vietnamese-aligned automotive-OEM targeting in
  2018–2019, contemporaneous with the BMW / Hyundai / Daimler
  reporting.
false_flag_risk: none
summary: |
  One of the better-evidenced data points for the automotive-IP
  pillar. Toyota's three regional disclosures within the same
  six-week window are consistent with a coordinated campaign
  rather than independent intrusions, and the Vietnamese subsidiary
  appearing in the affected list is unusual — APT32 ordinarily
  avoids on-shore Vietnamese victims and may have lateral-moved
  through Toyota Vietnam infrastructure to other Toyota regional
  networks.
