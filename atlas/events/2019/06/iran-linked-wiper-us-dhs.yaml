id: 2019-06/iran-linked-wiper-us-dhs
name: CISA (Krebs) warning of Iranian destructive-wiper threat to US industry and government
start_date: 2019-06-22  # documentary artifact = the warning itself (statement date), not a breach onset
disclosure_date: 2019-06-22  # CISA Director Krebs statement
end_date: null  # point-in-time warning; no bounded campaign
incident_type:
  - documentary  # CISA public threat-warning statement (not a documented breach)
  - wiper  # subject of the warning: Iranian destructive "wiper" attacks
initial_vector: unknown  # documentary warning — no single intrusion; warned enabling tactics were spear-phishing, password-spraying, credential-stuffing
outcome_summary: |
  On 2019-06-22, amid acute US-Iran tension following the June 20
  RQ-4A drone shootdown and Gulf tanker incidents, CISA Director
  Christopher C. Krebs issued a public statement warning of "a
  recent rise in malicious cyber activity directed at United States
  industries and government agencies by Iranian regime actors and
  proxies," which were "increasingly using destructive 'wiper'
  attacks." This is a general WARNING, not a report of a specific
  confirmed breach: no victim, malware family, or IRGC unit is named.
  No public destructive-wiper incident against a US target was
  attributed to this window; the contemporaneous Iranian wiper
  activity that was technically documented (IBM X-Force's ZeroCleare)
  struck the MIDDLE EAST energy sector, not the United States.
false_flag_risk: none
summary: |
  CISA Director Christopher C. Krebs's 2019-06-22 statement, "CISA
  Statement on Iranian Cybersecurity Threats." Krebs said CISA "is
  aware of a recent rise in malicious cyber activity directed at
  United States industries and government agencies by Iranian regime
  actors and proxies" and warned those actors "are increasingly
  using destructive 'wiper' attacks, looking to do much more than
  just steal data and money." He noted the activity is "often enabled
  through common tactics like spear phishing, password spraying, and
  credential stuffing" and urged multi-factor authentication and
  prompt incident response. The statement was issued during acute
  US-Iran tension (June 20 RQ-4A drone shootdown; Gulf tanker
  incidents) but does not itself cite the drone as its trigger,
  attribute a specific IRGC unit, or name any malware, victim, or
  intrusion — it attributes the threat only to nation-level "Iranian
  regime actors and proxies."

  Context (NOT part of the CISA statement, and NOT a US incident):
  the destructive-wiper threat CISA warned of is exemplified by the
  ZeroCleare wiper that IBM X-Force IRIS documented in December 2019
  targeting the energy sector in the MIDDLE EAST. IBM hedged its
  attribution — "we suspect Iran-based nation-state adversaries" and
  assessed the ITG13 group (aka APT34/OilRig) plus "at least one
  other group, likely based out of Iran" collaborated on the
  destructive portion. ZeroCleare overwrites the master boot record
  and disk partitions on Windows using EldoS RawDisk (a legitimate
  toolkit, not a vulnerable one) and, on 64-bit hosts, abuses a
  separate vulnerable signed driver to bypass the Windows HAL, in the
  Shamoon lineage. Neither cited source documents a ZeroCleare/Dustman
  deployment against a US target; the related Dustman variant (Bahrain
  Bapco, Dec 2019) is a separate Middle East event and is not named
  in the ZeroCleare report.
