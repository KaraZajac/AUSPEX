    perspective: attacker-rationale
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The CISA warning describes Iran escalating to destructive
      "wiper" attacks — explicitly "much more than just steal data and
      money" — against US civilian industry and government during a
      period of acute US-Iran military tension (drone shootdown, tanker
      incidents). Destructive, coercive intent beyond espionage/theft,
      aimed at an adversary's civilian/CII target set and timed to
      conventional pressure, is the signature of Iran's asymmetric-
      warfare doctrine (low-cost, deniable, destructive harassment of a
      militarily superior adversary). No source names or articulates
      the doctrine's strategic rationale, so the link is inferred, not
      attested.
    attesting_source_id: cisa/2019-06-22_krebs-iran-wiper-statement
    inference_basis:
      source_id: cisa/2019-06-22_krebs-iran-wiper-statement
      signals:
        - "CISA: Iranian actors 'increasingly using destructive wiper attacks, looking to do much more than just steal data and money' — destructive-beyond-theft/coercive intent"
        - "Warning issued 2019-06-22 amid acute US-Iran kinetic tension (June 20 RQ-4A drone shootdown; Gulf tanker incidents) — destructive cyber posture aligned with conventional pressure"
        - "Threat directed at 'United States industries and government agencies' — adversary civilian/CII target set matching the doctrine's civilian-CII-coercion pillar"
      ruled_out: "espionage/theft-only reading — CISA explicitly contrasts the activity with data/money theft ('much more than just steal data and money'), foregrounding destructive wiper intent"
