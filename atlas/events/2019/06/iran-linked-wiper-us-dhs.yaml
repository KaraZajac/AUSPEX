  notes: |
    Audited vs the two cited sources. Path taken: RE-SOURCE + REFRAME.
    The primary source was a PHANTOM (url:null, canonical URL never
    located) and the event conflated a general CISA WARNING with a
    confirmed US destructive-wiper campaign. Both sources located,
    snapshotted, and hashed this pass; event reframed to the
    documentary warning it actually is.

    STEP 0 triage: cisa/2019-06-22_krebs-iran-wiper-statement had
    url:null (phantom). Canonical page RESOLVED via search — real CISA
    page cisa.gov/news-events/news/cisa-statement-iranian-cybersecurity-
    threats (HTTP 200; "Archived Content" banner; "Released June 22,
    2019 / Revised February 05, 2021"). GENUINE, not fabricated.
    Snapshot raw/cisa__2019-06-22_krebs-iran-wiper-statement.html,
    55,564 bytes, content_sha256 b5754c41df7872c0184808d54f78319d07f281
    a2ac1b27c939d129465afe47cf. IBM source's url was a generic
    ibm.com/security/xforce landing; real (now link-rotted)
    securityintelligence.com article snapshotted from its Wayback
    capture: raw/ibm-xforce__2019-12_zerocleare.html, 169,789 bytes,
    content_sha256 079c6fad116b4247bc4d57f79ea163e9850c1cfccee8924087d5
    a3439617f850 (datePublished 2019-12-04, Limor Kessem).

    [a] FACTS — major corrections. The CISA statement is a WARNING, not
    a breach report: "In response to reports of an increase in
    cybersecurity threats … Director Christopher C. Krebs issued the
    following statement: 'CISA is aware of a recent rise in malicious
    cyber activity directed at United States industries and government
    agencies by Iranian regime actors and proxies. … Iranian regime
    actors and proxies are increasingly using destructive "wiper"
    attacks, looking to do much more than just steal data and money.
    These efforts are often enabled through common tactics like spear
    phishing, password spraying, and credential stuffing.'" STRIPPED as
    not carried by either cited source (fabrication / cross-event
    conflation / anachronism): (1) "ZeroCleare / Dustman wiper variants
    observed [against the US]" — ZeroCleare struck the MIDDLE EAST energy
    sector per IBM's own headline ("Targets Energy Sector in the Middle
    East"); neither source documents a US victim. (2) "RawDisk.sys …
    bring-your-own-vulnerable-driver loader" — IBM says EldoS RawDisk is
    a LEGITIMATE toolkit ("not due to a flaw or vulnerability in that
    software"); the vulnerable signed driver abused on 64-bit hosts is a
    SEPARATE component — the two were conflated. (3) Dustman/Bapco linkage
    — the Dec-2019 ZeroCleare report does not name Dustman; Bapco is a
    separate Jan-2020 Middle East event. (4) "exploitation of edge
    appliances … lateral movement on Active Directory" — not in either
    source (only spear-phishing/password-spraying/credential-stuffing are,
    as GENERAL warned tactics). (5) "APT34/OilRig and Static Kitten
    tooling" as US attribution — APT34/OilRig is IBM's HEDGED regional
    ZeroCleare attribution; Static Kitten appears in neither source.
    name, summary, and outcome_summary fully rewritten; ZeroCleare kept
    only as explicitly-labeled MIDDLE EAST context for the wiper family.

    [b] ATTRIBUTION — de-attributed. Was service_id ir/irgc / concur.
    The statement pins only nation-level "Iranian regime actors and
    proxies" — no IRGC organ, group, or malware. service_id ir/irgc → null
    (over-attribution removed); attribution_level=nation added;
    attributing_org_confidence moderate and auspex_assessment concur
    retained (authoritative but general nation-level warning). IBM's
    ZeroCleare attribution (separate, regional) is itself hedged — "we
    suspect Iran-based nation-state adversaries," ITG13/APT34/OilRig "and
    at least one other group, likely based out of Iran" — and is NOT used
    to attribute this US warning.

    [c] DATES — start_date 2019-06-20 (drone shootdown) → 2019-06-22 (the
    warning is the documentary artifact; statement date). end_date
    2019-12-31 (fabricated campaign bound) → null (point-in-time warning).
    disclosure_date 2019-06-22 ✓ (source "Released June 22, 2019"). IBM
    source published_on 2019-12-04 confirmed from raw datePublished.

    [d] DOCTRINE_LINKS — ir/asymmetric-warfare kept, upgraded plausible →
    strongly_inferred (per event directive; NOT attested — no source names
    the doctrine's strategic rationale). Added perspective: attacker-
    rationale (Iran's own doctrine on Iranian activity), pillar
    ir/asymmetric-warfare/civilian-cii-coercion (destructive wiper vs US
    civilian industry/government), inference_basis {source_id, signals[],
    ruled_out} grounded in the CISA "destructive wiper … much more than
    steal data and money" quote + kinetic-tension timing + US-CII target
    set. attesting_source_id set to the CISA statement as primary
    SUPPORTING source (schema-permitted on strongly_inferred).

    [e] ATTRIBUTION_LEVEL — set to nation (was missing). Source names
    "Iranian regime actors and proxies" (nation; no unit/group).

    [f] ACTOR_ID — null (correct: documentary warning names no actor).
    incident_type destructive/wiper → documentary + wiper (the artifact is
    a warning; wiper is its subject). targets: kept sectors/government/
    civilian, added sectors/critical-infrastructure ("United States
    industries"), both US, role primary but annotated as the WARNED/at-
    risk target set (directionality: US = warned target, not confirmed
    victim).

