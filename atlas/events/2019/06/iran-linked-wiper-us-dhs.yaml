id: 2019-06/iran-linked-wiper-us-dhs
name: Iran-linked wiper campaigns during US-Iran drone-shootdown tensions
start_date: 2019-06-20
disclosure_date: 2019-06-22  # CISA Director Krebs statement
end_date: 2019-12-31
incident_type:
  - destructive
  - wiper
initial_vector: unknown
outcome_summary: |
  CISA acknowledged Iranian-linked wiper campaigns against US
  government and industry following Iran's downing of a US
  RQ-4A surveillance drone (June 20, 2019). ZeroCleare /
  Dustman wiper variants observed. Limited public outcome.
false_flag_risk: none
summary: |
  CISA Director Chris Krebs public statement; IBM X-Force
  ZeroCleare report. Confidence in attribution and motive
  plausible per dossier. IBM X-Force documents ZeroCleare as an
  Iranian wiper that abuses a vulnerable signed driver
  (RawDisk.sys / EldoS RawDisk) via a bring-your-own-vulnerable-
  driver loader to obtain raw disk access, then overwrites the
  MBR and partition tables on Windows hosts; the related Dustman
  variant (deployed at Bahrain's Bapco in December 2019) shares
  the same driver-abuse primitive. Initial access in these
  campaigns leveraged spear-phishing and exploitation of edge
  appliances, with valid credentials and lateral movement on
  Active Directory before the wiper detonation. The wave is
  associated with APT34 / OilRig and Static Kitten tooling.
