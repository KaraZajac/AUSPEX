id: 2019-06/operation-soft-cell-telecom
name: Operation Soft Cell — telecom call-detail-record theft
start_date: 2012-01-01
disclosure_date: 2019-06-25
end_date: null
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: n-day
outcome_summary: |
  Cybereason Nocturnus (2019-06-25) disclosed a persistent,
  multi-wave campaign against global telecommunications
  providers by a China-affiliated, likely-state-sponsored
  threat actor. Operators mainly sought call-detail-record
  (CDR) data — call logs, cell-tower locations — belonging to
  specific high-value individuals from various countries, a
  targeted cyber-espionage / SIGINT profile rather than
  financially-motivated theft (Cybereason explicitly ruled out
  a payment-data motive). Tradecraft: modified China Chopper
  web shell on internet-facing IIS servers, modified Mimikatz
  credential dumping, PoisonIvy (PIVY) side-loaded into a
  legitimate Samsung tool, modified nbtscan reconnaissance, and
  HTran tunneling. Cybereason dated the activity to "at least
  2012" in the body (its conclusion elsewhere says "at least
  2017").
false_flag_risk: none
summary: |
  Cybereason concluded "with a high level of certainty that the
  threat actor is affiliated with China and is likely state
  sponsored" — a firm nation-level attribution. It did NOT
  firmly attribute the operation to APT10: it stated the tools
  and techniques are "consistent with several Chinese threat
  actors, such as APT10, a threat actor believed to operate on
  behalf of the Chinese Ministry of State Security (MSS)" — a
  hedged, tooling-overlap association — and cautioned that
  "attribution is a fickle and delicate art." AUSPEX places the
  operation under APT10 / MSS as the leading candidate cluster
  while flagging the vendor's own hedge (auspex_assessment:
  concur-with-caveat). Editorially, Soft Cell is a canonical
  pre-2020 PRC telecom-CDR-SIGINT pattern later echoed by the
  2024 Salt Typhoon telecom intrusions.
attributions:
  - actor_id: cn/mss/apt10
    attributing_org: Cybereason
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2019-06-25
    attribution_source_id: cybereason/2019-06-25_operation-soft-cell
    notes: |
      Cybereason's HIGH-certainty attribution is nation-level:
      "affiliated with China and is likely state sponsored."
      The APT10 link is HEDGED — tools/techniques "consistent
      with several Chinese threat actors, such as APT10" — so the
      named-actor confidence is downgraded to moderate (not the
      nation-level high). Cybereason names the MSS only as APT10's
      believed sponsor ("believed to operate on behalf of the
      Chinese Ministry of State Security (MSS)"), not as a
      direct service attribution of this operation. The APT41 /
      GALLIUM overlap sometimes cited elsewhere is NOT in this
      source and is not carried here.
doctrine_links:
  - doctrine_id: cn/mcf
    pillar_id: cn/mcf/bulk-pii-humint-enabling
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targeted CDR theft (call logs, cell-tower locations) tied
      to specific high-value individuals is the SIGINT / comms-
      metadata side of the same HUMINT-enabling collection family
      as OPM / Anthem / Marriott. It is TARGETED rather than bulk,
      so it sits at the selective end of the pillar; the link is
      strongly_inferred (not attested) because Cybereason names
      the proximate purpose — targeted state espionage on named
      individuals, financial motive explicitly excluded — but not
      the pillar's HUMINT-enabling strategic goal.
    attesting_source_id: null
    inference_basis:
      signals:
        - "Cybereason: operators 'mainly sought to obtain CDR data ... belonging to specific individuals from various countries', i.e. selective SIGINT, not bulk exfil."
        - "'This type of targeted cyber espionage is usually the work of nation state threat actors' — state-espionage framing."
        - "China-nexus MSS-adjacent actor (APT10 'believed to operate on behalf of the ... MSS'), whose mission is intelligence collection."
      ruled_out: "Financial motive — Cybereason's 'Understanding the Motive' section explicitly weighs and rejects payment-data theft as the driver, leaving state espionage / intelligence collection as the surviving reading."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Targeted-individual CDR selection is consistent with the
      diaspora / dissident communications monitoring the NIL
      pillar encodes, but Cybereason did not identify who the
      targeted individuals were, so this reading is only plausible.
      (The report's only diaspora/dissident-adjacent detail is a
      historical aside that the same PIVY side-loading technique
      was used in 2016 against Hong Kong pro-democracy activists —
      not a claim about this campaign's victims.)
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Diaspora / dissident monitoring under the NIL: fits China's use of telecom SIGINT against political targets, but unsupported by named victims in this source."
        - "Foreign-leadership / defense-attache / business-executive surveillance: 'high-value individuals from various countries' reads equally as classic foreign-intelligence targeting unrelated to the dissident pillar."
    counter_explanation: |
      Could equally be defense-attache / business-leader /
      foreign-official surveillance unrelated to the dissident pillar.
    contested: false
    analyst: claude
targets:
  - target_id: sectors/ict/telecom/carrier
    role: primary
