qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs Cybereason Nocturnus "Operation Soft Cell: A Worldwide
    Campaign Against Telecommunications Providers" (2019-06-25). First-
    party primary vendor research; raw snapshot captured + hashed:
    sha256 d5be3d76…f7432e35, 137,497 bytes
    (cybereason__2019-06-25_operation-soft-cell.html). URL live (HTTP 200).

    [a] FACTS — corrected. VERBATIM-SUPPORTED: global telecom-provider
    targeting; "The threat actor mainly sought to obtain CDR data (call
    logs, cell tower locations, etc.) belonging to specific individuals
    from various countries"; targeted-espionage (not financial) motive —
    the "Understanding the Motive" section weighs and rejects payment-data
    theft; modified China Chopper web shell on IIS ("Initial Compromise:
    the Modified China Chopper Web Shell"); PoisonIvy/PIVY DLL side-loaded
    into a Samsung tool; "Modified Mimikatz"; "Modified 'nbtscan'"; hTran
    tunneling; "active since at least 2012" (body) vs "active since at
    least 2017" (conclusion). STRIPPED as UNCITED/fabricated: "reGeorg"
    and "Cobalt Strike" (neither string appears in the article — confirmed
    absent); "approximately 10 countries" (article says only "various
    countries"); "HK diaspora communications, dissident communications"
    victimology (the article's only Hong Kong mentions are (1) a 2016
    historical PIVY-vs-HK-activists aside and (2) domain/server
    registration pointing to China/HK/Taiwan — neither is this campaign's
    victim set); "no DOJ indictment followed"/"Volt" framing (uncited
    editorial). Added incident_type: espionage (source: "targeted cyber
    espionage"). Rewrote outcome_summary + summary to source-grounded text.

    [b] ATTRIBUTION — de-over-attested (the load-bearing correction).
    Cybereason's HIGH-certainty attribution is NATION level only: "We've
    concluded with a high level of certainty that the threat actor is
    affiliated with China and is likely state sponsored." The APT10 link
    is explicitly HEDGED: "tools and techniques ... consistent with several
    Chinese threat actors, such as APT10, a threat actor believed to
    operate on behalf of the Chinese Ministry of State Security (MSS)",
    plus the standing caveat "Attribution is a fickle and delicate art."
    Therefore: attributing_org_confidence high -> moderate (the named-actor
    claim, not the nation claim, is what this entry encodes); added
    attribution_level: named-actor. Removed the uncited "later reporting
    attributes overlapping infrastructure to APT41 / GALLIUM" claim from
    the summary + attribution notes (not in this or any cited source).
    auspex_assessment kept concur-with-caveat.

    [c] DATES — source published_on 2019-06-25 ✓ (= disclosure_date).
    start_date 2012-01-01 retained (source: "at least 2012"; noted the
    internal 2017 discrepancy). end_date 2019-06-25 -> null: the source
    describes an "ongoing global attack", so the op was unbounded at
    disclosure; the prior end_date conflated disclosure with op-end.

    [d] DOCTRINE_LINKS — neither link is attested, so no attesting_source
    gate applies. cn/mcf/bulk-pii-humint-enabling kept strongly_inferred:
    Cybereason names the proximate purpose (targeted state espionage,
    financial motive explicitly excluded) but not the HUMINT-enabling
    strategic goal; added inference_basis {signals[], ruled_out=financial}.
    Residual caveat: this campaign is TARGETED, not bulk, so it sits at
    the selective edge of a bulk-PII pillar (noted in reasoning; possible
    future downgrade if a cleaner targeted-SIGINT pillar exists).
    cn/national-intelligence-law-2017/diaspora-and-dissident-collection
    kept plausible: the source gives no victim identities and its sole
    HK/dissident detail is a historical aside; added inference_basis
    .alternatives + tightened counter_explanation.

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing).

    [f] ACTOR_ID — cn/mss/apt10 RESOLVES (file atlas/actors/cn/apt10.yaml
    carries id: cn/mss/apt10; MSS placement independently audited
    2026-06-24 against DOJ/MITRE G0045). No actor-file edit made. NOTE for
    orchestrator: this source does NOT by itself support the MSS service
    placement of THIS operation — it only says APT10 is "believed to
    operate on behalf of the MSS"; the MSS attribution rests on the actor
    record's other sources, not on Soft Cell.

    Residual uncertainties: initial_vector kept n-day (web shell on
    internet-facing IIS implies public-facing-app exploitation) but the
    source names no specific CVE — could equally be unknown.
