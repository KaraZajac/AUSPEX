id: 2019-06/operation-soft-cell-telecom
name: Operation Soft Cell — telecom call-detail-record theft
start_date: 2012-01-01
disclosure_date: 2019-06-25
end_date: 2019-06-25
incident_type:
  - intrusion
  - data-theft
initial_vector: exploit-public-facing
outcome_summary: |
  Cybereason Nocturnus disclosure of a multi-year PRC-nexus
  campaign against telecom providers in approximately 10
  countries. Operators conducted targeted theft of
  call-detail records (CDR) tied to specific high-value
  individuals — a SIGINT collection profile rather than bulk
  data theft. Persistent web-shell access, PoisonIvy,
  modified Mimikatz, NBTScan, reGeorg, and Cobalt Strike beacons.
false_flag_risk: none
summary: |
  Cybereason attributes Soft Cell with high confidence to APT10
  / Stone Panda based on tooling overlap; subsequent vendor
  reporting (Crowdstrike, Mandiant) argues the cluster also
  overlaps with APT41 / GALLIUM. Regardless of cluster-name
  resolution, the operation is the canonical pre-2020 PRC
  telecom-SIGINT-via-CDR pattern that later resurfaces in the
  2024 Salt Typhoon campaign. Targets included telecom carriers
  serving regions of MSS political-collection interest (HK
  diaspora communications, dissident communications); no DOJ
  indictment followed. The campaign demonstrates persistent
  MSS interest in telecom-derived SIGINT predating the Volt /
  Salt Typhoon disclosures by half a decade.
attributions:
  - actor_id: cn/mss/apt10
    attributing_org: Cybereason
    attributing_org_confidence: high
    auspex_assessment: concur-with-caveat
    attribution_date: 2019-06-25
    attribution_source_id: cybereason/2019-06-25_operation-soft-cell
    notes: |
      Cybereason's primary attribution is APT10; later
      reporting attributes overlapping infrastructure to
      APT41 / GALLIUM. Caveat covers ongoing cluster
      ambiguity rather than country-level uncertainty.
