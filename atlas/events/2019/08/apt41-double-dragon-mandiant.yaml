id: 2019-08/apt41-double-dragon-mandiant
name: APT41 "Double Dragon" report (FireEye / Mandiant)
start_date: 2012-01-01
disclosure_date: 2019-08-07
end_date: 2019-08-07
incident_type:
  - documentary
initial_vector: phishing
outcome_summary: |
  FireEye / Mandiant publishes its formalizing report on
  APT41 as a distinct cluster — separating it from earlier
  Winnti / Barium / BRONZE EXPORT aliases. Documents APT41's
  unique dual-mission profile: state-tasked espionage in
  semiconductors, telecom, healthcare and technology IP
  alongside financially motivated video-game-virtual-currency
  theft and cryptocurrency-exchange compromise.
false_flag_risk: none
campaign_id: apt41-double-dragon-indictment-chain
summary: |
  The companion vendor-attribution document to the
  August 2019 DOJ indictment, published one week ahead. The
  report is significant for AUSPEX because it is the moment
  the "MSS dual-use contractor" model becomes vendor-attested
  as a distinct operating pattern rather than an APT-pool
  guess. Tooling catalogue (ShadowPad, PlugX, Winnti,
  Crosswalk, POISONPLUG, code-signing-certificate theft from
  upstream game-publisher victims) defines the toolset that
  later resurfaces across the September 2020 DOJ unsealing,
  the USAHerds (CVE-2021-44207) exploitation, and the 2023–24
  Mandiant DUSTPAN / DUSTTRAP series.
