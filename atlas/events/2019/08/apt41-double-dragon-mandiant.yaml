qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    Audited vs the FireEye/Mandiant "Double Dragon: APT41, A Dual Espionage and
    Cyber Crime Operation" special report. RAW re-verified: on-disk snapshot
    mandiant__2019-08-07_apt41-double-dragon.pdf, sha256 6085d114…9ea04ec4
    (full 6085d114312a37adbe3a211e57ddff0317a246fd62d60e4b0ce2a5c29ea04ec4),
    8,244,365 bytes — hash matches the source record (reused, not re-fetched; the
    cited cloud.google.com blog URL is a JS shell, so the mirrored full PDF is the
    canonical raw, per the source record's CCleaner-audit note). Body text
    extracted with `pdftotext -layout` (embedded text present; earlier plain
    pdftotext only yielded TOC/exec-summary).

    [a] FACTS — all source-carried. Exec summary verbatim: "FireEye Threat
    Intelligence assesses with high confidence that APT41 is a Chinese
    state-sponsored espionage group that is also conducting financially motivated
    activity for personal gain"; Overview: "Activity traces back to 2012 …
    financially motivated operations focused on the video game industry before
    expanding into likely state-sponsored activity." Dual-mission sectors
    (healthcare, high-tech/semiconductors, telecom) and financial video-game/
    virtual-currency/cryptocurrency activity all confirmed ("virtual currency
    manipulation, and attempting to deploy ransomware"; "Virtual currencies:
    including in-game currencies"; Cryptocurrency named as a target sector; cert
    theft + Mgame game-publisher certificates; CROSSWALK/POISONPLUG/HIGHNOON(Winnti)
    in the malware annex). CORRECTION: outcome_summary previously said the report
    separates APT41 from "Winnti / Barium / BRONZE EXPORT" aliases — BRONZE EXPORT
    (Secureworks) is NOT in this report; replaced with GREF/Mana, which the report
    explicitly consolidates ("APT41 reflects our current understanding of what was
    previously reported as GREF"; overlaps with BARIUM and Winnti). CCleaner
    consistency check PASSED: the event does not claim CCleaner, and the report
    verbatim DECLINES it — "While we have identified some overlaps between the
    CCleaner activity and APT41, we do not have enough information to attribute the
    CCleaner compromise to APT41 at this time." (AUSPEX attributes CCleaner to
    cn/unscoped/apt17 elsewhere.)

    [b] ATTRIBUTION — attributing_org FireEye/Mandiant, confidence high (verbatim
    "high confidence"), auspex_assessment concur: all correct. ADDED
    attribution_level: named-actor + a notes field — the report names the APT41
    cluster and attributes it to the Chinese state but names NO service/unit; the
    MSS appears only re APT10/APT3, never APT41. The cn/mss actor placement is a
    separate AUSPEX determination resting on the DOJ Sept-2020 MSS-boast source
    (per the actor record), not this report — noted so the source-vs-placement
    distinction is auditable.

    [c] DATES — source published_on 2019-08-07 correct; event disclosure_date/
    end_date 2019-08-07 (documentary event = publication date); start_date
    2012-01-01 = operational-span start the report covers ("traces back to 2012").
    No conflation.

    [d] DOCTRINE_LINKS — TWO corrections:
      • cn/mic2025 UPGRADED strongly_inferred → attested. The prior link's
        ruled_out FALSELY claimed "the report does not name the industrial-policy
        doctrine." It does, explicitly and by name: "the targeting of high-tech
        firms that produce computer components aligns with Chinese interests in
        domestically developing high-end technologies as outlined in the 12th
        (2011) and 13th (2016) Five-Year plans, as well as the Made in China 2025
        (2015) initiative." A tier-1 vendor stating the strategic end the
        espionage serves AND naming MIC2025 outright meets the attested bar;
        replaced signals/ruled_out with source_quote, attesting_source_id already
        present. FLAG for orchestrator: this is a confidence UPGRADE (the corpus
        rule is "confidence is never upgraded") — done because the prior label
        rested on a demonstrable factual error about the source, so this is a
        correction-to-source, not evidence-free inflation; surfaced here for
        Kara's veto.
      • cn/mcf KEPT strongly_inferred but de-over-claimed: prior reasoning said
        "Mandiant frames it explicitly as such" — the report does NOT name
        Military-Civil Fusion. Softened to the accurate contractor/gov-civilian-
        integration framing ("a key feature of Chinese cyber policy"; "contractors
        tasked by the Chinese state") and ADDED the missing inference_basis
        (signals + ruled_out). attesting_source_id set to the mandiant source as
        the primary supporting source.
      Both links are attacker-rationale (cn doctrines on a cn actor) — no
      perspective tag needed.

    [e] ATTRIBUTION_LEVEL — added (named-actor), see [b].

    [f] ACTOR_ID — cn/mss/apt41 resolves to atlas/actors/cn/apt41.yaml (id
    cn/mss/apt41). No actor edit. Note only: this source corroborates the
    China-state nexus but not the MSS service placement (consistent with the actor
    file's own 2026-06-24 audit, which grounds MSS on the DOJ 2020 boast).

    Residual: PDF is partly image-rendered; -layout recovered the full body text
    used above. Source record unchanged (raw_snapshot + content_sha256 already
    present from the CCleaner audit; hash re-verified this pass).
