id: 2019-08/apt41-gaming-crypto
name: APT41 video-game and cryptocurrency campaigns
start_date: 2014-01-01
disclosure_date: 2019-08-15
end_date: 2020-09-16
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  APT41 / Chengdu 404 operators conducted persistent video-game
  publisher intrusions for in-game currency theft, cryptocurrency
  exchange compromises, and SE Asian gambling operator collection.
  The "private" half of the Double Dragon mission profile.
false_flag_risk: none
campaign_id: apt41-double-dragon-indictment-chain
summary: |
  DOJ August 2019 and September 2020 indictments cover the
  cryptocurrency theft and gaming operations explicitly,
  distinguishing them from the state-tasked espionage side of
  APT41's portfolio. Tradecraft per the indictments and Mandiant /
  FireEye public reporting included spear-phishing of game-
  publisher employees, supply-chain compromise of game-update
  delivery infrastructure used to push ShadowPad and PlugX
  variants, the Crosswalk and POISONPLUG modular backdoors, DLL
  side-loading via legitimately signed binaries, Mimikatz
  credential dumping, lateral movement on valid credentials, and
  in-game-currency-laundering kits run against MMO publishers.
  The same operator pool simultaneously executed the state-tasked
  side of the cluster (Cloud Hopper, healthcare and semiconductor
  IP theft), making APT41 / Double Dragon the textbook case of
  PRC MSS dual-use contractor tasking.
