id: 2019-08/apt41-gaming-crypto
name: APT41 video-game and cryptocurrency campaigns
start_date: 2012-01-01
disclosure_date: 2019-08-15
end_date: 2020-09-16
incident_type:
  - intrusion
  - espionage
  - financial-theft
  - supply-chain
initial_vector: phishing
outcome_summary: |
  APT41 / Chengdu 404 operators conducted persistent video-game
  publisher intrusions for in-game virtual-currency theft,
  cryptocurrency-exchange targeting and crypto-mining
  (crypto-jacking), and Southeast Asian video-game and
  gambling-platform targeting. The "private" half of the Double
  Dragon dual mission — financially motivated activity conducted
  by the same operator pool that ran APT41's state-tasked
  espionage.
false_flag_risk: none
campaign_id: apt41-double-dragon-indictment-chain
summary: |
  FireEye / Mandiant's August 2019 "Double Dragon" report first
  disclosed APT41's financially motivated operations — assessed
  "with high confidence" as a state-sponsored espionage group
  "also conducting financially motivated activity for personal
  gain" — and the DOJ's August 2019 (Zhang Haoran, Tan Dailin)
  and September 2020 (adding Jiang Lizhi, Qian Chuan, Fu Qiang,
  plus two Malaysian Sea Gamer Mall co-conspirators) indictments
  later charged the video-game and cryptocurrency operations,
  distinguishing the for-profit crime (ransomware, crypto-jacking,
  video-game currency fraud) from the state-relevant IP theft.
  Tradecraft per Mandiant / FireEye reporting and the indictments
  included spear-phishing of game-publisher employees; software
  supply-chain compromises (ShadowPad via NetSarang; a Southeast
  Asian game distributor's update channel used to push the
  CROSSWALK backdoor family) leveraging stolen Mgame / Neowiz
  code-signing certificates; the CROSSWALK and POISONPLUG modular
  backdoors and PlugX; DLL side-loading via legitimately signed
  binaries; Mimikatz credential dumping; lateral movement over RDP
  on stolen credentials; and in-game virtual-currency
  manipulation and laundering (crediting a popular game's virtual
  currency to 1,000+ accounts, sold and laundered in underground
  markets) against game publishers. The same operator pool
  simultaneously ran the state-tasked side of the cluster
  (healthcare, telecom and semiconductor IP theft), making APT41 /
  Double Dragon the textbook case of PRC dual-use contractor
  tasking — state espionage and tolerated for-profit crime by one
  pool.
