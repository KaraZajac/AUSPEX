  notes: |
    Audited the financially-motivated ("private") half of APT41's Double
    Dragon dual mission against RAW. STEP 0 triage: all cited URLs are REAL
    (no phantoms) — justice.gov 2020 HTTP 200, fbi.gov 403 (bot-walled),
    cloud.google.com JS-shell; snapshots on disk are the archive/mirror
    captures. RE-SOURCE (badrabbit model): the prior summary attributed its
    tradecraft to "Mandiant / FireEye public reporting" but did NOT cite any
    Mandiant/FireEye source; ADDED mandiant/2019-08-07_apt41-double-dragon
    (the foundational "Double Dragon: APT41, A Dual Espionage and Cyber Crime
    Operation" report), which is present in the repo and carries essentially
    every load-bearing tradecraft claim. RAW re-verified on disk:
      • mandiant__2019-08-07_apt41-double-dragon.pdf sha256
        6085d114312a37adbe3a211e57ddff0317a246fd62d60e4b0ce2a5c29ea04ec4
        (8,244,365 bytes) — matches source record; full body text recovered
        with `pdftotext -raw` (17,585 words; -layout only yields the exec
        summary on this partly image-rendered PDF).
      • doj__2020-09-16_apt41-indictment.html sha256
        4a8fdfa0a9018864d7e5f8cbfd8ca8d15caa64eecd0b4805a383893f038f9d27
        (100,880 bytes) — matches.
      • fbi-wanted__apt41-group.html sha256
        5e8e4c1b4c943733697c8d12173dcc3975aebf1ab0024257b396f40cea0cf974
        (94,734 bytes) — matches.
      • doj/2019-08_apt41-first-indictment: url:null (known slug collision),
        UNFETCHABLE, no snapshot — kept as a corroborative cite only; nothing
        load-bearing rests on it alone (see [a]).

    [a] FACTS — one hard error STRIPPED plus embellishments softened; all
    surviving claims now source-carried.
      • REMOVED "Cloud Hopper" from the state-tasked-side parenthetical:
        Operation Cloud Hopper is APT10, NOT APT41. "Cloud Hopper" appears
        ZERO times in the Double Dragon report (grep-verified) and is
        attributed to APT10 across the literature; this was a cross-cluster
        contamination. The state-tasked half is instead described with the
        sectors the report DOES carry — verbatim: "APT41 espionage operations
        against the healthcare, high-tech, and telecommunications [sectors]"
        and "High-tech: including semiconductors."
      • "MMO publishers" → "game publishers": "MMO"/"massively multiplayer"
        does not appear in the report (the earlier grep hits were substring
        false-positives inside "common"/"commonalities"). The report names
        concrete publishers (Mgame, Neowiz).
      • "in-game-currency-laundering kits" → "in-game virtual-currency
        manipulation and laundering": report carries the substance —
        "manipulated in-game currencies using the targets' databases after
        compromising production environments"; a case crediting "hundreds of
        thousands of dollars of a popular game's virtual currency … to more
        than 1,000 accounts … most likely sold and laundered in underground
        markets" — but "kits" is not a report term.
      • "cryptocurrency exchange compromises" → "cryptocurrency-exchange
        targeting and crypto-mining (crypto-jacking)": Mandiant shows crypto
        targeting incl. a "Phishing email to European bitcoin exchange" and
        XMRig Monero mining ("continued interest in cryptocurrency"); DOJ 2020
        verbatim adds "'crypto-jacking' schemes, the latter of which refers to
        the group's unauthorized use of victim computers to 'mine'
        cryptocurrency." ("Compromise" of an exchange was over-stated for the
        phishing/targeting evidence.)
      • "SE Asian gambling operator collection" → "Southeast Asian video-game
        and gambling-platform targeting": report carries "Southeast Asian
        video game distributor/platform" (multiple) and gambling-site
        targeting (the June-2018 FairWin "decentralized gambling platform"
        lure; "online games and gambling sites").
      • "PRC MSS dual-use contractor tasking" → "PRC dual-use contractor
        tasking": softened the MSS assertion per [b] — this report names no
        service for APT41; the MSS naming rests only on the DOJ-2020 boast.
      RETAINED (all verbatim-confirmed in Double Dragon): dual high-confidence
      framing ("Chinese state-sponsored espionage group that is also
      conducting financially motivated activity for personal gain");
      spear-phishing of the video-game industry (12 hits); ShadowPad ("July
      2017 Netsarang software packages (aka ShadowPad) Confirmed APT41") and
      PlugX; CROSSWALK (37) and POISONPLUG (48); Mimikatz (3); DLL
      side-loading via "legitimate files … signed with legitimate
      code-signing certificates from MGame and Neowiz"; lateral movement "using
      stolen credentials" over RDP; software "supply chain compromises" (26).
      DOJ 2020 corroborates video-game companies among 100+ victims,
      ransomware, crypto-jacking, Sea Gamer Mall, "supply chain attacks,"
      Chengdu 404. FBI Wanted corroborates the five named defendants =
      "APT 41 and BARIUM," employment at "Chengdu 404 Network Technology
      Company," "supply chain attacks," and "ransomware." Nothing load-bearing
      rests solely on the unfetchable DOJ-2019 source, so level=full holds.

    [b] ATTRIBUTION — ADDED a FireEye/Mandiant attribution (named-actor, high,
