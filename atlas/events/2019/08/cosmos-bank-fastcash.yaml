id: 2019-08/cosmos-bank-fastcash
name: Cosmos Bank (India) FASTCash ATM cash-out + SWIFT heist
start_date: 2018-08-10  # incident window 10-13 Aug 2018 (Securonix); ATM modality 10-11 Aug, SWIFT 13 Aug
disclosure_date: 2018-08-27  # Securonix / SecurityWeek technical disclosure
end_date: 2018-08-13
incident_type:
  - financial-theft
initial_vector: unknown
outcome_summary: |
  ~US$13.5M stolen from Cosmos Cooperative Bank: ~US$11.5M via
  fraudulent ATM cash-out across 28 countries using 450 cloned
  non-EMV debit cards, plus ~US$2M via three fraudulent SWIFT
  MT103 wire transfers to Hong Kong.
quantified_impact:
  usd_stolen: 13500000
  usd_atm: 11500000
  usd_swift: 2000000
  countries_atm_cashout: 28
  cloned_cards: 450
false_flag_risk: none
summary: |
  In August 2018, attackers attributed to the DPRK Lazarus Group /
  APT38 (BeagleBoyz) stole ~US$13.5M from Cosmos Cooperative Bank
  (Pune, India) between 10 and 13 August in two modalities
  documented by Securonix. Initial access was unconfirmed (Securonix
  assessed it likely spear-phishing and/or a remote/third-party
  interface). The attackers used malicious ISO 8583 libraries and
  process-code injection to stand up a malicious ATM/POS proxy switch
  ("malicious-Central") running in parallel with the bank's real
  switch; it returned fake ISO 8583 x210 authorization replies so
  withdrawal requests never reached the Core Banking System,
  bypassing card, PIN, and balance checks. On 10-11 August this
  enabled ~US$11.5M across ~2,849 domestic (RuPay) and ~12,000
  international (Visa) ATM withdrawals in 28 countries using 450
  cloned non-EMV debit cards. On 13 August the actor abused the
  bank's SWIFT SAA environment (LSO/RSO compromise) to send three
  MT103 wire transfers to ALM Trading Limited at Hang Seng Bank,
  Hong Kong, totaling ~US$2M. Securonix noted Lazarus tradecraft
  hallmarks (Windows Admin Shares lateral movement, TLS-mimicking
  custom C2, new-service persistence, timestomping, reflective DLL
  injection). US CISA/Treasury/FBI/USCYBERCOM later (AA20-239A,
  2020) attributed the BeagleBoyz FASTCash ATM cash-out pattern —
  for which India is a listed victim country — to the DPRK
  Reconnaissance General Bureau; that advisory does not name Cosmos
  Bank specifically.
attributions:
  - actor_id: kp/rgb/apt38
    attributing_org: Securonix
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2018-08-27
    attribution_source_id: securonix/2018-08-27_cosmos-bank-swift-atm-attack
    notes: |
      Securonix attributed the incident to the "Lazarus Group"
      umbrella ("Currently attributed to a nation-state-sponsored
      malicious threat actor (Lazarus Group) by some sources";
      initial vector "likely"). SecurityWeek corroborates
      ("Believed to be backed by the North Korean government, the
      Lazarus group"). AUSPEX files DPRK FASTCash/SWIFT bank heists
      under the APT38/BeagleBoyz financial cluster (kp/rgb/apt38),
      consistent with CISA AA20-239A equating BeagleBoyz with
      Lazarus/APT38/Bluenoroff. Named-actor (group + nation), not
      named-unit: no specific DPRK service named in 2018.
  - actor_id: kp/rgb/apt38
    attributing_org: US CISA + Treasury + FBI + USCYBERCOM
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2020-08-26
    attribution_source_id: cisa/2020-08-26_aa20-239a-beagleboyz
    notes: |
      AA20-239A attributes the BeagleBoyz (an element of the DPRK
      Reconnaissance General Bureau; overlaps Lazarus/APT38/
      Bluenoroff/Stardust Chollima) FASTCash ATM cash-out pattern to
      the DPRK with high confidence and lists India among victim
      countries (2015-2020). It does NOT name Cosmos Bank; the
      Oct-2018-disclosed FASTCash cash-outs it references were
      triggered by this incident. Govt attribution is at the
      pattern/actor level, not incident-specific.
