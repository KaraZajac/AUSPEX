qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-01
  level: full
  notes: |
    RE-SOURCE (badrabbit model). The event is a real, well-documented
    incident but its sole cited source (CISA AA20-239A) did NOT carry
    its specific facts — a facts-not-carried defect, not a homepage
    phantom. AA20-239A is the real BeagleBoyz/FASTCash advisory
    (raw re-verified sha256 6dfc26c1…6bd36f37, 114,412 bytes) but it
    never names Cosmos Bank, "$13.5M", or "28 countries"; it only
    lists India among BeagleBoyz victim countries and says cash-outs
    "have affected upwards of 30 countries in a single incident"
    (generic). Added two genuine incident sources and re-pointed the
    facts to them.
    [a] FACTS — rewrote summary against Securonix "Cosmos Bank SWIFT/
    ATM US$13.5 Million" report (raw sha256 a4b5c8ee…a278e5f3,
    188,590 bytes) + SecurityWeek corroboration (raw sha256
    ad0fb7e9…624344c1, 168,738 bytes). Verbatim-carried now: "US$13.5
    million stolen ... between August 10-13, 2018"; ATM "on August
    10-11 ... over US$11.5 million in 2849 domestic (Rupay) and
    12,000 international (Visa) transactions using 450 cloned
    (non-EMV) debit cards in 28 countries"; malicious ISO8583 proxy
    switch ("malicious-Central") sending "fake Transaction Reply
    (TRE)/ISO8583 x210 messages" bypassing the CBS; SWIFT "On August
    13, 2018 ... three malicious MT103 to ALM Trading Limited at Hang
    Seng Bank in Hong Kong amounting to around US$2 million"; initial
    access "Unconfirmed ... likely spear phishing"; Lazarus hallmarks
    (Windows Admin Shares, TLS-mimicking C2, timestomping, reflective
    DLL injection). STRIPPED as fabricated (absent from every cited
    source): "Manuscrypt RAT", "FALLCHILL backdoor", "Mimikatz-style
    credential dumping", the asserted "AIX / Linux library" framing,
    and "spear-phishing of bank employees / valid-credential lateral
    movement" stated as fact (Securonix marks the vector unconfirmed).
    [b] ATTRIBUTION — split into two honest entries. Securonix 2018:
    moderate / named-actor ("Lazarus Group ... by some sources").
    CISA 2020: high / named-unit (RGB), but flagged as pattern-level,
    NOT Cosmos-specific. Kept actor kp/rgb/apt38 (Securonix said the
    Lazarus umbrella; corpus files DPRK bank heists under APT38/
    BeagleBoyz, consistent with AA20-239A equating them and siblings
    bangladesh-bank / banco-del-austro / tien-phong).
    [c] DATES — corrected the core defect: the incident is Aug 2018,
    not 2019 (id slug is legacy/immutable, now documented in-file).
    start_date 2018-08-11→2018-08-10 (Securonix window), end_date
    2018-08-13 (SWIFT), disclosure_date 2020-08-26→2018-08-27
    (Securonix/SecurityWeek). source published_on all verified:
    Securonix 2018-08-27, SecurityWeek 2018-08-27, CISA 2020-08-26.
    [d] DOCTRINE — kp/byungjin/sanctions-evasion-revenue kept
    ATTESTED; attesting AA20-239A states the goal in substance
    (source_quote added to inference_basis). Valid: the actor/pattern
    CISA attributes to WMD-revenue is the same BeagleBoyz cluster.
    [e] ATTRIBUTION_LEVEL — added (was missing): Securonix named-actor,
    CISA named-unit.
    [f] ACTOR_ID — kp/rgb/apt38 resolves (file atlas/actors/kp/apt38.
    yaml, internal id kp/rgb/apt38; BeagleBoyz is a listed equivalent
    alias). No actor edit.
    FLAGS: (1) created missing target registry orgs/cosmos-bank
    (dangling FK — the event referenced it but no file existed);
    (2) created 2 source records (securonix, securityweek).
    Residual: exact "simultaneous ~2hr" cash-out framing and $1.76M
    court-conviction figure seen in later reporting were NOT asserted
    (not in the snapshotted sources).
