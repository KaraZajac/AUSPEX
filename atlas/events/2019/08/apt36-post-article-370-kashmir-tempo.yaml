    [d] DOCTRINE_LINKS — downgraded strongly_inferred -> plausible on the
    kashmir-political pillar; added perspective: attacker-rationale and a
    structured inference_basis {signals[], alternatives[], ruled_out}
    that is honest about the ABSENCE of in-window documentation. REMOVED
