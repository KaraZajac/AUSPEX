id: 2019-08/apt36-post-article-370-kashmir-tempo
name: Transparent Tribe tempo elevation following Article 370 abrogation
start_date: 2019-08-05
disclosure_date: 2022-08-04
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Following the Indian government's August 5 2019 abrogation of
  Article 370 — revoking Jammu and Kashmir's special constitutional
  status — Transparent Tribe operations exhibited a documented
  elevation in tempo and a substantive shift in lure-theme mix
  toward Kashmir-political and Indian-security-forces themes.
  The tempo elevation was reconstructed retrospectively in
  vendor reporting through 2020-2023 (Cisco Talos 2021 SideCopy
  disclosure, SentinelLABS 2022 CapraRAT documentation, Cyfirma
  2023 government-targeting analysis), which independently noted
  the Article-370 inflection point in Kashmir-themed targeting
  patterns. Targets included Indian government officials working
  Kashmir portfolios, Indian security forces deployed to the
  region, and Kashmir-area civil society and journalists.
false_flag_risk: none
summary: |
  Doctrinal tempo-elevation event tracking the Pakistani-asymmetric
  doctrine's Kashmir-political pillar against a discrete Indian
  political-administrative trigger. Reconstructed from later
  vendor reporting rather than a single disclosure; this is the
  pattern AUSPEX expects to recur for crisis-cycle events where
  the vendor naming follows the operational tempo by 12-36
  months.
