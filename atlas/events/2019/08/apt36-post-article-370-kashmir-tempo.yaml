    [e] ATTRIBUTION_LEVEL — named-actor (Securelist/CYFIRMA name the
    group + Pakistan nexus; no unit). Set on the attribution.

    [f] ACTOR_ID — resolves: atlas/actors/pk/transparent-tribe.yaml
    carries id pk/unscoped/transparent-tribe. Directionality correct
