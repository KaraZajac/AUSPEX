  notes: |
    Single-event audit vs RAW. PATH: UNSUPPORTABLE (fabricated "sequel")
    -> corrected to truthful minimum + flagged DELETE CANDIDATE (not
    deleted; orchestrator handles FK propagation).

    WHY UNSUPPORTABLE: the event's central load-bearing claim — a
    *documented* Transparent Tribe tempo elevation + Kashmir-lure shift
    *tied to the 5 Aug 2019 Article-370 abrogation*, with three vendors
    "independently noting the Article-370 inflection point" — is
    affirmatively unsupported. Verified against every cited RAW + web
    research (4 targeted searches, 2026-07-11):
      - sentinellabs/2022-08-04_caprarat-android = CONFIRMED PHANTOM
        (cited URL 404s; title is a mangle; SentinelLabs published NO
        Aug-2022 CapraRAT-implant post — its CapraRAT work is 2023-09
        CapraTube + 2024-07 Remix). Was also the attribution_source_id.
        REMOVED. Not orphaned by this edit (still cited by
        2022-08/caprarat-android-kashmir).
      - cisco-talos/2021-07-07_sidecopy-india-defense (sha256
        8eb00169…a8b8967) = 0 hits "Article 370" / "Kashmir" /
        "abrogation" / "Pulwama" in the snapshot; it is about the
        SideCopy cluster (not Transparent Tribe) and never mentions the
        trigger. Contributed only to the fabricated "three vendors"
        framing. REMOVED from this event (still cited by 3 others:
        2019-03, 2021-07, 2023-02 — not orphaned).
      - cyfirma/2023-01-18_transparent-tribe-government-targeting (sha256
        028e0c6e…5f3f5a03) = the evergreen 2025-05-15 general APT36
        profile (slug retains legacy date). 0 "Article 370"; only 2
        generic "Kashmir" mentions; documents NO 2019 tempo. This is
        exactly the evergreen-profile mismatch the census flagged.
      - WEB RESEARCH: no vendor (CYFIRMA, Seqrite/Quick Heal,
        SentinelOne, Kaspersky, Talos, K7) documents an Article-370-
        specific APT36 tempo elevation. The documented 2019 crisis-cycle
        tempo is Pulwama/Balakot (Feb 2019); the documented Kashmir-crisis
        tempo elevations are Pulwama (Feb 2019) + Pahalgam (Apr 2025).

    Per protocol ("Never invent sourcing to keep an unsupportable event
    alive"), I did NOT force a badrabbit re-source onto K7/Securelist:
    K7 (2019-08-29) is Pulwama-themed with activity ending 8 Jul 2019
    (PRE-Article-370) and is the sibling event's load-bearing source;
    Securelist carries the actor's toolkit/victimology but names neither
    Kashmir, Article 370, nor Pakistan. Neither instantiates an in-window
    Article-370 incident.

    [a] FACTS — STRIPPED as fabricated: "documented elevation in tempo",
    "substantive shift in lure-theme mix", the claim that Talos-2021 /
    SentinelLABS-2022 / CYFIRMA "independently noted the Article-370
    inflection point in Kashmir-themed targeting patterns", and the
    specific in-window victimology ("officials working Kashmir
    portfolios", "security forces deployed to the region", "Kashmir-area
    civil society and journalists"). Reframed outcome_summary/summary as
    an explicit AUSPEX hypothesis with NO external documentation.
    Residual defensible facts kept + sourced: APT36 = real
    Pakistani-aligned Crimson-RAT espionage actor vs Indian
    military/government 2017-2019 (Securelist, verbatim "a custom .NET
    RAT publicly known as Crimson RAT"; targets "typically are Indian
    military and government personnel"); Kashmir-lure hallmark (CYFIRMA,
    generic). incident_type data-theft -> espionage (no in-window
    data-theft documented; espionage = actor mission per Securelist).

    [b] ATTRIBUTION — repointed off the phantom. attributing_org
    vendor-consensus -> attribution_source_id securelist (real,
    snapshotted); attribution_date 2022-08-04 -> 2020-08-20 (Securelist
    byline). Labeled ACTOR-IDENTITY-only, not an event attribution.
    Pakistan nexus held at country level (no ISI in any source),
    consistent with pk/unscoped/transparent-tribe. attribution_level
    named-actor added (was absent).

    [c] DATES — start_date 2019-08-05 kept as the hypothesized-trigger
