outcome_summary: |
  AUSPEX-HYPOTHESIZED crisis-cycle event, NOT a vendor-documented
  incident. The proposition is that Transparent Tribe / APT36 tempo
  elevated after the Indian government's 5 August 2019 abrogation of
  Article 370 (revoking Jammu and Kashmir's special constitutional
  status). No cited or located source documents an Article-370-specific
  tempo elevation, Kashmir-lure shift, or victim set: the three original
  citations did NOT carry the claim (SentinelLABS 2022 CapraRAT =
  confirmed phantom; Cisco Talos 2021 SideCopy = zero Article-370 /
  Kashmir mentions and a different cluster; CYFIRMA = an evergreen
  general APT36 profile with no 2019 tempo content). What IS documented
  is the actor itself: Transparent Tribe ran sustained Crimson-RAT
  espionage against Indian military and government personnel across
  2017-2019 (Kaspersky/Securelist) and habitually uses Kashmir-political
  lure themes (CYFIRMA). Neither source ties that activity to the
  Article-370 trigger. The one documented 2019 India-Pakistan
  crisis-cycle tempo event is the Pulwama/Balakot window (Feb 2019),
  captured separately by event 2019-03/apt36-post-pulwama-balakot-tempo.
false_flag_risk: none
summary: |
  DELETE CANDIDATE (see qc). This record began as an AUSPEX synthesis —
  a hypothesized "sequel" projecting the actor's known crisis-cycle
  behavior onto the Article-370 abrogation — whose source-attestation
  was fabricated (three vendors were said to have "independently noted
  the Article-370 inflection point"; none does). Corrected here to the
  truthful minimum: the Article-370 linkage is an AUSPEX inference with
  NO external documentation. The residual defensible facts (APT36 is a
  real, continuously-active Pakistani-aligned espionage actor targeting
  Indian government/military with Kashmir-themed lures) are carried by
  Securelist + CYFIRMA, but those do not instantiate a discrete
  in-window incident. Retained only pending orchestrator disposition;
  the real documented 2019 crisis-cycle event is 2019-03.
