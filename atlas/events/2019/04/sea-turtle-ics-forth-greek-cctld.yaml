        five further days after ICS-Forth's initial remediation
        attempt" — Talos's "five days" IS the April 19→24 span (five
        days after the April 19 public acknowledgment), not five days
        beyond April 24. Rewrote to match.
      • ".gr and .ελ (.el)" ccTLDs and the four named victims
        (@primeminister.gr / @mfa.gr / @nis.gr / @astynomia.gr = PMO,
        MFA, National Intelligence Service/EYP, Greek/Hellenic Police)
        are carried verbatim by threatintel.eu ("ICS-FORTH is the
        institution that manages the .gr and .ελ top-level domains for
        Greece"; "greek news media reported that Greece Prime
        Minister's office, the Ministry of Foreign Affairs, the
        National Intelligence Service and the Greek Police were the
        targets"). Source discrepancy surfaced faithfully: Talos says
        "three ... unnamed" entities; the Feb 23 2020 Greek-media
        disclosure names four.
      • summary: STRIPPED unsourced embellishment "shaped Greek
        national cyber-policy debate and informed the EU-level
        response to DNS-infrastructure abuse" (no source states this);
        replaced with the sourced attribution-hedge note.
      • alias "Teal Kurma" → "MARBLED DUST" in outcome_summary for
        cross-event consistency (both are equivalent Sea Turtle
        aliases per the actor record).

