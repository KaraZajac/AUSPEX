    - Hellas (ICS-Forth), the ccTLD for Greece, acknowledged on its
    public website that its network had been compromised on April 19,
    2019" — and "maintained access in the ICS-Forth network through at
    least April 24, five days after the statement was publicly
    released," and the C2 was "utilized to perform DNS hijacking
    against three government entities that all used .gr, the Greek
    ccTLD." Fixes made:
