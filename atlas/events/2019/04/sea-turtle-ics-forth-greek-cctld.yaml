id: 2019-04/sea-turtle-ics-forth-greek-cctld
name: Sea Turtle compromises ICS-Forth (.gr ccTLD operator), enabling DNS hijack of Greek government
start_date: 2019-04-19
disclosure_date: 2019-07-09
end_date: 2019-05-01
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Sea Turtle / Teal Kurma compromised the Institute of Computer
  Science of the Foundation for Research and Technology – Hellas
  (ICS-Forth), the operator of Greece's .gr and .el country-code
  TLDs. The intrusion ran from April 19 to at least April 24
  2019 with continued network access for at least five further
  days after ICS-Forth's initial remediation attempt. The
  registrar-level access was subsequently used to redirect DNS
  for the Greek Prime Minister's Office, the Ministry of Foreign
  Affairs, the National Intelligence Service (EYP), and the
  Hellenic Police. Cisco Talos's July 9 2019 Sea Turtle follow-on
  report documented the new technique class; Greek-media
  disclosure of the full government victim set followed in
  February 2020.
false_flag_risk: none
summary: |
  Most consequential single Sea Turtle ccTLD compromise after
  the Cyprus operation, hitting an EU member state at the level
  of the head-of-government and intelligence service. The Greek
  victim set is a precise Mavi Vatan fit: contemporaneous with
  the Eastern Mediterranean drilling dispute and the August 2020
  Oruç Reis crisis lead-in. The ICS-Forth case shaped Greek
  national cyber-policy debate and informed the EU-level response
  to DNS-infrastructure abuse.
