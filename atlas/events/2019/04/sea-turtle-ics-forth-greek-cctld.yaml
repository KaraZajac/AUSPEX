id: 2019-04/sea-turtle-ics-forth-greek-cctld
name: Sea Turtle compromises ICS-Forth (.gr ccTLD operator), enabling DNS hijack of Greek government
start_date: 2019-04-19
disclosure_date: 2019-07-09
end_date: 2019-04-24
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Sea Turtle (a.k.a. MARBLED DUST) compromised the Institute of
  Computer Science of the Foundation for Research and Technology –
  Hellas (ICS-Forth), the operator of Greece's .gr and .ελ (.el)
  country-code TLDs. Cisco Talos's July 9, 2019 report named
  ICS-Forth as a compromised ccTLD registry: ICS-Forth publicly
  acknowledged the compromise on April 19, 2019, and Cisco
  telemetry showed the actors retained access through at least
  April 24 — five days after that public acknowledgment. Talos
  reported the registry access was used to DNS-hijack three .gr
  government entities, which Talos left unnamed. Greek media's
  February 23, 2020 disclosure — collated in the threatintel.eu
  timeline — named the victim set as the Prime Minister's Office
  (@primeminister.gr), the Ministry of Foreign Affairs (@mfa.gr),
  the National Intelligence Service / EYP (@nis.gr), and the
  Hellenic (Greek) Police (@astynomia.gr).
false_flag_risk: none
summary: |
  The most consequential single Sea Turtle ccTLD compromise after
  the Cyprus operation, hitting an EU member state at the level of
  the head of government, foreign ministry, and intelligence
  service. The senior-government victim set is a close Mavi Vatan
  fit: it is contemporaneous with the 2019 Eastern-Mediterranean
  hydrocarbon dispute and the Mavi Vatan 2019 naval exercise, and
  precedes the August 2020 Oruç Reis crisis with Greece.
  Attribution to Turkey rests on Reuters' January 2020 "acting in
  the interests of the Turkish government" reporting; the
  contemporaneous threat-intelligence timeline cautioned that early
  Greek-media "Turkey did it" framing was presented without
  evidence.
attributions:
  - actor_id: tr/unscoped/sea-turtle
    attributing_org: Cisco Talos
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-07-09
    attribution_source_id: talos/2019-07-09_sea-turtle-state-sponsored-keeps-going
    notes: |
      Talos's July 9, 2019 report attributes the ICS-Forth
      compromise to "the actors behind the Sea Turtle campaign"
      (Cisco telemetry "confirmed" access) — a named actor cluster,
      with NO nation and NO service/unit named in this report.
      Hence attribution_level: named-actor. Nation-level attribution
      to Turkey appears only via Reuters (27 Jan 2020, "hackers
      acting in the interests of the Turkish government"), relayed
      and explicitly hedged in the threatintel.eu timeline ("no
      evidence... 'Turkey did it' was such a wrong way to present
      it"); it is therefore carried at nation prefix (tr/unscoped)
      but not asserted by the attributing source here.
