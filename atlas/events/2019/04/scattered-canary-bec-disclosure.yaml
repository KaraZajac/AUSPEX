id: 2019-04/scattered-canary-bec-disclosure
name: Agari profiles Scattered Canary Nigerian BEC organization
start_date: 2008-10-01
disclosure_date: 2019-06-05
end_date: 2019-06-05
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Agari's Cyber Intelligence Division (ACID) published a
  threat-actor dossier profiling "Scattered Canary," a
  Nigerian/West-African BEC organization. Agari traced the
  group's activity to October 2008, when its central figure
  (pseudonym "Alpha," based in Ibadan, Nigeria) began as a
  lone Craigslist scammer under a mentor Agari calls "Omega,"
  then expanded into romance scams before the group broke
  into business email compromise against US enterprises in
  November 2015. The report documents the organization's
  internal structure — at least 35 actors tied to it since
  2008 (about ten profiled under Greek-letter pseudonyms) —
  and its diversification into W-2 / tax-return fraud,
  government-benefit fraud, credential phishing, gift-card and
  payroll-diversion BEC, and its use of romance-scam victims
  as US-based money mules. Agari framed it as a
  first-of-its-kind catalog of a Nigerian cybercriminal
  organization's evolution from a one-man shop into a BEC
  enterprise.
false_flag_risk: none
summary: |
  Agari's Scattered Canary dossier is an organizational-
  profile study — threat-actor identity rather than fraud
  type — of a West-African BEC syndicate, part of an Agari
  series that also covered London Blue (Dec 2018) and Scarlet
  Widow. Rather than reporting aggregate BEC statistics, it
  maps one named organization's people, infrastructure and
  eleven-year evolution. AUSPEX classifies it as
  criminal-baseline (financially motivated, no documented
  state nexus; no doctrine link).
