id: 2019-04/scattered-canary-bec-disclosure
name: Agari profiles Scattered Canary Nigerian BEC organization
start_date: 2008-01-01
disclosure_date: 2019-04-09
end_date: 2019-04-09
incident_type:
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Agari Cyber Intelligence Division published a detailed
  organizational profile of "Scattered Canary," a Nigerian-
  organized BEC syndicate that began in 2008 as a romance-
  scam operation and scaled into BEC of US corporations
  by 2015. The Agari report documented internal structure
  (~35 named operators), career progression of leadership
  Alpha out of romance-scam apprenticeship into
  W-2 / tax-fraud and BEC, and the use of US-based money
  mules. Notable as the first vendor-attributed structural
  profile of a Nigerian BEC organization rather than
  aggregate-statistics-only reporting.
false_flag_risk: none
summary: |
  Scattered Canary established the template for vendor
  organizational-profile reporting on West-African BEC
  syndicates that the FBI IC3 BEC team later operationalized.
  AUSPEX classifies as criminal-baseline.
