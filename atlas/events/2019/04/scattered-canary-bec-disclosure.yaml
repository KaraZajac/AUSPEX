  notes: |
    RE-SOURCED phantom (source url was null "pending verified replacement"). Located Agari's own hosted copy of the full 31-page dossier at Fortra (Agari's parent): static.fortra.com/agari/pdfs/guide/ag-scattered-canary-gd.pdf — genuine first-party content ("2019 INTEL" throughout; doc code fta-ag-gd-0922-r1-79d = Sept-2022 reprint of the original). Raw snapshot sha256 f9a70f18…ac26f1ca, 4,158,853 bytes, 31pp. Audited [a]-[f]:
    [a] FACTS — corrected two factual errors the old prose carried: (1) group "began in 2008 as a romance-scam operation" was WRONG — report: "starting with basic Craigslist scams in 2008" / "Alpha started out in the trenches of Craigslist scams with his mentor, Omega"; romance scams came only after ("within a few years, he had honed his craft enough to expand into romance scams"). (2) "romance-scam apprenticeship" was WRONG — the apprenticeship was Craigslist scams under mentor Omega. Verified: "at least 35 different actors have joined" / "35 actors have been tied to Scattered Canary's operations since the group emerged in 2008" (changed "~35 named operators" → "at least 35 actors (~10 profiled under Greek-letter pseudonyms)", since only ~10 are individually profiled). BEC onset: "November 2015, the group... broke into the BEC space" / "late 2015 was the beginning of BEC" ✓. W-2/tax fraud ✓ ("direct deposit and W-2 fraud"; "Tax Return Fraud" 2018; 13 fraudulent tax returns). US money mules via romance victims ✓. Nigeria/Ibadan ✓ ("ALPHA / OMEGA — LIVES IN IBADAN, NIGERIA"). "first" claim ✓ but is Agari's own framing ("In a first, Agari has cataloged the evolution of a Nigerian cybercriminal organization") — kept, attributed to Agari. STRIPPED unsupported claim: old summary said Scattered Canary "established the template for vendor organizational-profile reporting... that the FBI IC3 BEC team later operationalized" — no source carries this, and it is contradicted by the report itself citing the EARLIER London Blue profile (Dec 2018); rewrote summary to source-grounded prose.
    [b] ATTRIBUTION — actor_id null retained (criminal crew, no AUSPEX actor record; no criminal/scattered-canary file exists). attributing_org Agari/ACID ✓; confidence kept moderate (not upgraded); added attribution_level: named-actor (Agari names the crew but no nation-state/service). auspex_assessment concur ✓.
    [c] DATES — MAJOR CORRECTION: actual publication date is 2019-06-05, not 2019-04-09. Agari's PRNewswire release ("FOSTER CITY... June 5, 2019"), Bleeping Computer (2019-06-05) and P.M. News (2019-06-05) all date it June 5 2019; found no April-9 publication. Set disclosure_date, end_date, attribution_date and source published_on → 2019-06-05. Event id + source slug retain "2019-04-09" (slugs are stable-forever per SCHEMA; not renamed). start_date 2008-01-01 → 2008-10-01 ("traced as far back as October 2008").
    [d] DOCTRINE_LINKS — [] correct; financially-motivated criminal BEC with no state nexus, no doctrine applies. Not invented.
    [e] ATTRIBUTION_LEVEL — set named-actor (see [b]).
    [f] ACTOR_ID — null (no actor file); no FLAG needed. Source record: raised tier secondary→primary (first-party vendor research), added url + raw_snapshot + content_sha256, annotated the date/slug discrepancy.
    Residual: the snapshot is Agari's Sept-2022 reprint of the June-2019 report; content is the original dossier ("2019 INTEL", identical narrative), so claim-support is unaffected. No archive_url (archive.org blocked for fetcher).
