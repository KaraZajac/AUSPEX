outcome_summary: |
  Publication by the National Security Office of Cheong Wa
  Dae of the first explicit Republic of Korea National
  Cybersecurity Strategy under the Moon Jae-in administration.
  Three strategic objectives and six strategic tasks.
false_flag_risk: none
summary: |
  Doctrinal landmark for the ROK. Prior to April 2019, ROK
  cyber policy had been administration-by-administration
  ad-hoc — NIS doctrine, MND defense white papers, MSIT
  digital policy, but no over-arching national strategy.
  Whole-of-government cyber coordination had sat with the
  National Security Office since the 2015 creation of the
  Secretary to the President for Cybersecurity; the 2019
  document was prepared inter-agency by nine government
  organisations (including the NIS, MSIT and MND) under NSO
  coordination and signed by the President. It set out a
  vision, three objectives (goals) and six strategic tasks
  (with 18 sub-tasks, later executed as 100 individual tasks
  in the September 2019 National Cybersecurity Base Plan);
  it treated organised, state-supported cyber attacks as a
  grave national-security challenge; and it framed leading
  international cooperation as a Korean strategic task in its
  own right rather than a by-product of the US alliance.

  Successor administrations (Yoon, Lee) have not formally
  replaced the document; the August 2023 Camp David
  trilateral framework expanded the alliance-cooperation
  leg without superseding the 2019 strategy.
