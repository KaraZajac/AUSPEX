outcome_summary: |
  Publication by the National Security Office of Cheong Wa
  Dae of the first explicit Republic of Korea National
  Cybersecurity Strategy under the Moon Jae-in administration.
  Three strategic objectives and six strategic tasks.
false_flag_risk: none
summary: |
  Doctrinal landmark for the ROK. Prior to April 2019, ROK
  cyber policy had been administration-by-administration
  ad-hoc — NIS doctrine, MND defense white papers, MSIT
  digital policy, but no over-arching national strategy.
  The 2019 publication codified the inter-agency National
  Cybersecurity Strategy Council under the NSO with NIS,
  MND, MoFA, MoIS, and MSIT as permanent members; explicitly
  recognised cyberspace as a domain of national security;
  and framed international cooperation as a Korean strategic
  objective in its own right rather than a by-product of
  the US alliance.

  Successor administrations (Yoon, Lee) have not formally
  replaced the document; the August 2023 Camp David
  trilateral framework expanded the alliance-cooperation
  leg without superseding the 2019 strategy.
