  Doctrine-anchor event for AUSPEX's ae/ncs-2019 entry.
  Defensive-resilience-and-digital-economy framing on its face;
  does not codify or acknowledge offensive cyber capability.
  Recorded for doctrine-timeline completeness alongside the
  November 2020 Cyber Security Council establishment.
