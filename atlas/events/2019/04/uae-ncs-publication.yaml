outcome_summary: |
  UAE Telecommunications Regulatory Authority publishes the
  UAE National Cybersecurity Strategy — the country's first
  comprehensive federal cybersecurity-policy document. Five
  pillars: governance, CNI protection, capability development,
  international cooperation, cybercrime / active defence.
