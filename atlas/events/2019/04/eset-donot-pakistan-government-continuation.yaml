id: 2019-04/eset-donot-pakistan-government-continuation
name: ESET documents continued DoNot Team targeting of Pakistani government and South Asian diplomatic entities
start_date: 2018-09-01
disclosure_date: 2019-04-15
end_date: 2019-03-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  ESET continuation reporting through early 2019 documented
  ongoing DoNot Team / Origami Elephant operations against
  Pakistani government and military personnel, alongside South
  Asian diplomatic targets in Bangladesh and Sri Lanka.
  Tradecraft refreshes included yty-framework Windows updates
  and the first vendor-documented appearance of Android tooling
  delivered via WhatsApp social engineering — the Android
  capability that would become the cluster's distinguishing
  characteristic in Amnesty's 2021 and 2023 disclosures.
false_flag_risk: none
summary: |
  Connective tissue between ESET's 2018 yty-framework naming
  and the cluster's later Android-prominent profile. The 2019
  reporting is the earliest open-source documentation of DoNot
  Team's Android delivery via WhatsApp — the social-engineering
  vector that has remained operationally central across
  subsequent reporting on Kashmir-activist targeting.
