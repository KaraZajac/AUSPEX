  notes: |
    PHANTOM-REMEDIATION (badrabbit-model RE-SOURCE + fabrication strip). The event was
    stamped 2019-04 and claimed an ESET April-2019 report on a 2018-09→2019-03 DoNot
    "continuation" against Pakistan, plus first-ever Android-via-WhatsApp tooling feeding
    Amnesty's 2021/2023 Kashmir-activist disclosures. STEP 0 triage: the cited source's
    url (welivesecurity.com/2022/01/18/donot-go-do-not-respawn/) resolves to a REAL ESET
    article, but it is "DoNot Go! Do not respawn!" published 2022-01-18 covering Sep 2020–
    Oct 2021 — NOT a 2019-04 report. The sibling event 2018-08/eset-donot-yty-framework-
    disclosure (audited 2026-06-28) already established that no ESET 2018 or 2019 DoNot
    article exists and that this 2022-01-18 piece is the only genuine ESET DoNot report.
    Path taken: RE-SOURCE/correct — the attached source IS the real ESET report, so I
    re-dated the event to the campaign it actually documents and stripped everything the
    source does not carry. Raw snapshot eset__2019-04_donot-pakistan-government-targeting
    .html, sha256 76021fe8…e452b0fd, 136,095 bytes (fetched cleanly).

    [a] FACTS — rewritten to the raw ESET article. CARRIED: Donot Team = APT-C-35 /
    SectorE02, "operating since at least 2016"; two yty-framework Windows variants
    "DarkMusical and Gedit"; timeline "from September 2020 to October 2021 according to
    ESET telemetry"; Gedit "first attacks … in September 2020, against organizations in
    Pakistan that had already been targeted with … the Jaca framework", then "Bangladesh,
    Nepal and Sri Lanka"; DarkMusical "first wave … June 2021, targeting military
    organizations in Bangladesh"; targets = "Government and military organizations,
    Ministries of Foreign Affairs, Embassies" across "Bangladesh, Sri Lanka, Pakistan and
    Nepal", incl. their embassies abroad; espionage motive / file-screenshot-keylog
    collection; persistent spearphishing "every two to four months", sometimes from
    compromised victim accounts. STRIPPED (fabrication cluster — none in the source):
    "first vendor-documented appearance of Android tooling delivered via WhatsApp"
    (WhatsApp x0; the report is Windows-focused, "Android" appears once as generic
    background); "Amnesty's 2021 and 2023 disclosures" / "Kashmir-activist targeting"
    (Kashmir x0; Amnesty appears once, only as a relayed background note that the malware
    is linked to an Indian company); "ESET's 2018 yty-framework naming" (false — yty was
    named by NETSCOUT/ASERT in 2018-03, not ESET; ESET published no 2018 DoNot piece); the
    invented 2018-09→2019-03 op window and the entire "connective tissue" Android-lineage
    framing.

    [b] ATTRIBUTION — ESET attributes to Donot Team on its own telemetry + yty lineage;
    it names the group and aliases (APT-C-35, SectorE02) but NO sponsoring state or unit,
    and only relays Amnesty's link to "an Indian cybersecurity company". attribution_level
    set named-actor (was missing); attributing_org_confidence kept moderate; auspex_
    assessment kept concur-with-caveat; attribution_date corrected 2019-04-15 → 2022-01-18.

    [c] DATES — source published_on corrected to 2022-01-18 (byline "18 Jan 2022"; tier
    upgraded secondary→primary as first-party ESET research). Event start_date 2018-09-01 →
    2020-09-01 (Gedit's first wave), end_date 2019-03-31 → 2021-10-31 (telemetry end),
    disclosure_date 2019-04-15 → 2022-01-18. The 3-year re-dating means the id/slug/path
    ("2019-04", "continuation") is now historical — kept per the stable-slug rule and
    FLAGGED for the orchestrator (same posture as the sibling 2018-08 event).

    [d] DOCTRINE_LINKS — both kept strongly_inferred (correct, not attested): ESET names
    the Pakistani + regional/diplomatic target set but states no Indian strategic purpose,
    so no attesting_source_id. Refreshed both reasonings to the real ESET evidence and
    added inference_basis {signals[], ruled_out}. Actor state (India) matches the doctrine
    state — no doctrine-state-mismatch.

    [e] ATTRIBUTION_LEVEL — named-actor (group + aliases named; no nation/unit).

    [f] ACTOR_ID — in/unscoped/donot-team resolves to atlas/actors/in/donot-team.yaml.
    Directionality verified: actor India-aligned; victims = Pakistan, Bangladesh, Sri
    Lanka, Nepal (South Asia), NOT India.

    TARGETS — replaced three DANGLING orgs/ registry FKs (orgs/pakistani-government,
    orgs/bangladesh-foreign-ministry, orgs/sri-lanka-government — no files exist, same
    flag as the sibling event) with valid sector FKs reflecting the source: sectors/
    government pk + lk + np (primary) and sectors/defense bd (primary; DarkMusical hit
    Bangladeshi military).

    FLAGS (orchestrator): (1) STALE SLUG/PATH — event id 2019-04/eset-donot-pakistan-
    government-continuation and its source id eset/2019-04_donot-pakistan-government-
    targeting are both stamped 2019-04 but describe a 2020-2021 campaign disclosed
    2022-01-18; kept per stable-slug rule, rename is Kara's call. (2) This is now the
    corpus's representation of the ESET 2022-01-18 "DoNot Go! Do not respawn!" report —
    confirm no separate 2022/01 ESET DoNot event is wanted, else this becomes a re-home
    candidate. (3) Dangling target-registry ids orgs/pakistani-government etc. still
    referenced by sibling DoNot events — need atlas/targets/orgs/ files or migration to
    sector FKs corpus-wide.
