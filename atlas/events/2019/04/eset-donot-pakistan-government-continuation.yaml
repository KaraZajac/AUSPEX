id: 2019-04/eset-donot-pakistan-government-continuation
name: ESET documents continued Donot Team (yty / DarkMusical & Gedit) targeting of South Asian government and military entities
start_date: 2020-09-01
disclosure_date: 2022-01-18
end_date: 2021-10-31
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  ESET Research documented Donot Team (aka APT-C-35, SectorE02)
  Windows campaigns from September 2020 to October 2021 against
  government and military organizations, Ministries of Foreign
  Affairs, and embassies across South Asia — Bangladesh, Sri
  Lanka, Pakistan, and Nepal. ESET analyzed two variants of the
  group's signature yty malware framework: Gedit (first observed
  September 2020 against organizations in Pakistan previously hit
  with the Jaca framework, then Bangladesh, Nepal, and Sri Lanka)
  and DarkMusical (first wave June 2021 against Bangladeshi
  military organizations). The espionage toolset collects and
  exfiltrates files, screenshots, and keystrokes. ESET noted the
  group is remarkably persistent, re-targeting the same entities
  with waves of spearphishing every two to four months, sometimes
  from compromised accounts of the victim organizations themselves.
false_flag_risk: none
summary: |
  ESET's "DoNot Go! Do not respawn!" (18 Jan 2022) is a deep-dive
  on Donot Team's Windows toolchain over 2020-2021, tracing
  DarkMusical and Gedit variants of the yty framework against
  South Asian government/military targets. It corroborates the
  cluster's persistent regional-collection profile — Pakistani
  government targeting continued alongside Bangladesh, Nepal, and
  Sri Lanka — and notes (citing an Amnesty International report)
  that the group's malware has been linked to an Indian
  cybersecurity company selling or operating the spyware for
  regional governments. ESET itself names no sponsoring state.
