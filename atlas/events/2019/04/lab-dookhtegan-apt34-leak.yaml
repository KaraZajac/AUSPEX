qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-30
  level: full
  notes: |
    Audited against the cited ZDNet article "Source code of Iranian cyber-espionage
    tools leaked on Telegram" (Catalin Cimpanu, 2019-04-17). RAW snapshot captured:
    zdnet__2019-04-17_lab-dookhtegan-leak.html, sha256 de595f67…ad34e595, 867,565 bytes.
    Verified it is the real article (title matches; body carries every load-bearing claim).

    [a] FACTS — corrected several malware mislabels the prose carried that the source
    contradicts. Source verbatim tool list: "Glimpse (newer version of a PowerShell-based
    trojan that Palo Alto Networks names BondUpdater); PoisonFrog (older version of
    BondUpdater); HyperShell (web shell that Palo Alto Networks calls TwoFace); HighShell
    (another web shell); Fox Panel (phishing kit); Webmask (DNS tunneling, main tool behind
    DNSpionage)." OLD prose was WRONG on four of six: Glimpse was called a "DNS-tunneling
    backdoor" (it is the PowerShell BondUpdater trojan; Webmask is the DNS tool);
    PoisonFrog called a "PHP web shell" (it is the older BondUpdater); Fox Panel called a
    "C2 controller" (it is a phishing kit); Webmask called a "DNS-hijacking tool" (source
    says DNS tunneling); HyperShell/HighShell had invented "ASP / PHP" qualifiers. All
    corrected to the source's own words. Victim count: source says "according to Chronicle,
    Dookhtegan leaked data from 66 victims, mainly from countries in the Middle East" and
    names "Etihad Airways and Emirates National Oil" — added, hedged as ~66. Doxxing:
    "leaker also doxxed Iranian Ministry of Intelligence officers, posting phone numbers,
    images, and names of officers involved with APT34 operations" — supported. Authenticity:
    "Chronicle, Alphabet's cyber-security division, confirmed this" — added. STRIPPED
    unsupported embellishments the single April-17 source does not carry: "Forced TTP change
    for APT34", "forced a tradecraft shift in subsequent OilRig / APT34 operations", "reshaped
    vendor attribution", "intelligence windfall for defenders", and the assertion the leaker
    was "assessed Iranian insider or dissident" (source explicitly floats a foreign-intel
    persona and says the insider claim is unverified).

    [b] ATTRIBUTION — modeled as a null-actor counter-action per the directionality rule: the
    EVENT is the leak/doxing OF Iran's APT34, perpetrated by the anonymous Lab Dookhtegan
    persona (not in the actor registry, origin unresolved). actor_id stays null; attributing_org
    = ZDNet (reporting body); confidence moderate (ZDNet's own hedge). Added attribution_level:
    null — the source resolves the leaker to no named actor or nation. Exposed subject APT34 =
    actor ir/mois/apt34, noted in attribution.notes and summary rather than as an attribution.

    [c] DATES — source published_on 2019-04-17 correct (= disclosure_date). start_date changed
    2019-03-26 → 2019-03-15: source says leaks began "mid-March"; the 03-26 day had no basis.
    end_date changed 2019-05-31 → null: the April-17 source bounds no end date and none is cited;
    the prior May-31 was fabricated precision.

    [d] DOCTRINE_LINKS — [] retained and correct: an anti-Iran-regime leak serves no Iranian
    doctrine; no attacker-doctrine applies.

    [e] ATTRIBUTION_LEVEL — set to null (leaker unresolved), was missing.

    [f] ACTOR_ID — null (leaker). Exposed subject ir/mois/apt34 resolves to
    atlas/actors/ir/apt34.yaml (id ir/mois/apt34); no actor-file issue observed. No FK to
    validate since actor_id is null.

    OTHER CORRECTIONS: incident_type [data-theft, influence-operation] → [leak,
    influence-operation] (data-theft mischaracterized the act; the mechanism of the leaker's
    access is unknown, so "leak" is the safe umbrella; influence-operation retained for the
    anti-MOIS doxxing + promotion to "tens of other reporters"). initial_vector insider →
    unknown (leaker's insider claim explicitly hedged by source). false_flag_risk none →
    suspected (source raises a foreign-intel false-persona possibility).

    RESIDUAL UNCERTAINTY: leaker origin genuinely unresolved (Iranian insider/dissident vs.
    foreign service) per the source itself; exact leak start day approximated as mid-March.
