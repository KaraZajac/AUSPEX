id: 2019-04/lab-dookhtegan-apt34-leak
name: Lab Dookhtegan Telegram leak of APT34 toolkit and MOIS PII
start_date: 2019-03-26
disclosure_date: 2019-04-17
end_date: 2019-05-31
incident_type:
  - data-theft
  - influence-operation
initial_vector: insider
outcome_summary: |
  Telegram-based dump of APT34 / OilRig source code (Glimpse,
  PoisonFrog, HyperShell, HighShell, Fox Panel, Webmask),
  victim lists, and PII of MOIS officers. Forced TTP change
  for APT34; intelligence windfall for defenders.
false_flag_risk: none
summary: |
  **Counter-regime event, not an Iranian operation.** Included
  in the Iran event log because it materially exposed APT34's
  link to MOIS and reshaped vendor attribution. The dump
  published on a "Lab Dookhtegan" ("sewn lips") Telegram channel
  contained the source and binaries of APT34 / OilRig's
  toolkit — Glimpse (DNS-tunneling backdoor), PoisonFrog (PHP
  web shell), HyperShell and HighShell (ASP / PHP web shells),
  Fox Panel (C2 controller), and Webmask (DNS-hijacking tool) —
  along with victim lists and PII identifying alleged MOIS
  officers. The leak materially exposed OilRig's web-shell
  tradecraft, DNS-tunneled C2, and credential-dumping workflow
  and forced a tradecraft shift in subsequent OilRig / APT34
  operations. Source remained anonymous; assessed Iranian
  insider or dissident.
