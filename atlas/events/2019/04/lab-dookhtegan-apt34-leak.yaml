id: 2019-04/lab-dookhtegan-apt34-leak
name: Lab Dookhtegan Telegram leak of APT34 toolkit and MOIS PII
start_date: 2019-03-15  # ZDNet: leaks began "mid-March" 2019; exact day not stated (best estimate)
disclosure_date: 2019-04-17
end_date: null  # ZDNet (2019-04-17) sets no end; no cited source bounds the leak
incident_type:
  - leak
  - influence-operation
initial_vector: unknown  # leaker claimed insider access to DNSpionage but ZDNet says take "with a grain of salt" (possible foreign-intel persona)
false_flag_risk: suspected  # ZDNet: leaker "could very well be a member of a foreign intelligence agency trying to hide their real identity"
outcome_summary: |
  Telegram dump exposed the source code of six APT34 / OilRig
  hacking tools (Glimpse, PoisonFrog, HyperShell, HighShell,
  Fox Panel, Webmask), data from ~66 of the group's victims,
  and doxxing PDFs of alleged Iranian MOIS officers tied to
  APT34 operations. Chronicle (Alphabet) confirmed the tools'
  authenticity.
summary: |
  **Counter-regime event, not an Iranian operation.** Included in
  the Iran event log because it materially exposed APT34 / OilRig's
  toolkit and its connection to Iran's Ministry of Intelligence
  (MOIS). Since mid-March 2019, an individual using the "Lab
  Dookhtegan" ("sewn lips") pseudonym leaked, on a Telegram
  channel, the source code of six APT34 / OilRig hacking tools —
  Glimpse (newer PowerShell-based trojan that Palo Alto Networks
  calls BondUpdater), PoisonFrog (older version of BondUpdater),
  HyperShell (web shell Palo Alto calls TwoFace), HighShell
  (another web shell), Fox Panel (phishing kit), and Webmask (DNS
  tunneling, the main tool behind DNSpionage) — plus data from the
  group's backend C2 panels (Chronicle counted ~66 victims, mainly
  in the Middle East, and named Etihad Airways and Emirates
  National Oil among them) and doxxing packages (names, images,
  phone numbers) for alleged Iranian MOIS officers involved in
  APT34 operations. Chronicle (Alphabet) confirmed the tools'
  authenticity. The leaker claimed to have worked on APT34's
  DNSpionage campaign, but ZDNet cautioned this should be taken
  "with a grain of salt" — the persona could equally be a foreign
  intelligence officer masking their identity. Origin therefore
  unresolved (Iranian insider/dissident vs. foreign service).
