id: 2019-04/talos-sea-turtle-dns-hijacking
name: Cisco Talos discloses Sea Turtle state-sponsored DNS-hijacking campaign (40 orgs / 13 countries)
start_date: 2017-01-01
disclosure_date: 2019-04-17
end_date: null
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: valid-creds  # DNS-registrar/registry credential compromise -> DNS hijack -> credential capture
outcome_summary: |
  Cisco Talos published the foundational "Sea Turtle" report
  documenting a state-sponsored DNS-hijacking campaign that Talos
  assessed "likely began as early as January 2017 and has continued
  through the first quarter of 2019." Talos wrote that "at least 40
  different organizations across 13 different countries were
  compromised during this campaign." The 13 victim countries in
  Talos's IP/country table are Albania, Armenia, Cyprus, Egypt,
  Iraq, Jordan, Lebanon, Libya, Sweden, Syria, Turkey, the UAE, and
  the United States (Turkey appears here only as a victim country;
  Saudi Arabia is named separately in prose, its .sa-TLD admin
  credentials harvested via the NetNod compromise). Primary victims
  were "national security organizations, ministries of foreign
  affairs, and prominent energy organizations" — Talos deliberately
  did NOT name specific primary-victim organizations. The actors
  reached these targets by compromising third-party DNS
  intermediaries (secondary victims): "numerous DNS registrars,
  telecommunication companies," IT firms, "Registrars" and "One
  registry" — named intermediaries include the .am ccTLD registrar
  Amnic ("listed as the technical contact on IANA for the ccTLD
  .am"), the Sweden-based infrastructure operator NetNod (which
  "acknowledged the compromise in a public statement on February 5,
  2019"), the Swedish consulting firm Cafax, and NGO Packet Clearing
  House. Once holding registrar/registry access the actors
  manipulated DNS records to redirect victim traffic to
  attacker-controlled servers, capturing credentials during ordinary
  user authentication.
false_flag_risk: none
summary: |
  Foundational disclosure event and campaign-overview / parent for
  the Sea Turtle DNS-hijacking cluster (Microsoft later tracked the
  same actor as MARBLED DUST). Talos assessed the campaign "with
  high confidence" to "an advanced, state-sponsored actor" and named
  NO nation as the sponsor — "Turkey" appears in the April 2019
  report only as one entry in the victim IP/country table (alongside
  Sweden, Syria, Armenia, the US). The Turkey nexus carried by
  actor_id tr/unscoped/sea-turtle rests on LATER, hedged reporting:
  Reuters (27 Jan 2020) reported the activity was "believed to be the
  work of hackers acting in the interests of the Turkish government,"
  per "three senior Western security officials"; Hunt & Hackett
  (2024) called Sea Turtle "Turkey based." ICANN issued a related
  public statement (22 Feb 2019) calling for full DNSSEC deployment
  in response to DNS-hijacking abuse — it names no actor, nation, or
  victim. This canonical event is the campaign overview: the
  per-operation sub-events (2018-06 Cyprus, 2018-06 Armenia/.am,
  2018-06 UAE-Saudi-Lebanon, 2018-11 Iraqi-Kurdistan, 2019-02 NetNod,
  and the 2019-07 Talos follow-on including the Greek ICS-Forth ccTLD
  compromise) detail specific victims and should be cross-referenced,
  not merged into this overview. The cluster largely went quiet after
  the 2019 disclosures until a documented 2024 Hunt & Hackett /
  Microsoft resurgence (see the 2024-01 resurgence event and the
  actor record).
