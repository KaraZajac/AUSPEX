    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2019-04-17
    attribution_source_id: talos/2019-04-17_sea-turtle-dns-hijacking
    notes: |
      Talos (2019-04-17) NAMES the actor/campaign "Sea Turtle" and
      assesses it "with high confidence" to be "an advanced,
      state-sponsored actor" — but names NO nation as the perpetrator
      and NO service/unit. "Turkey" appears in the report only as one
      entry in the victim IP/country table ("159.89.101.204 December -
      January 2018-2019 Turkey, Sweden, Syria, Armenia, US"), i.e. a
      target location, not the sponsor. Hence attribution_level:
      named-actor (a named cluster; state-sponsored; nation un-named
      at this source). The Turkey nexus carried by the tr/unscoped
      prefix rests on LATER reporting not cited as the attribution
      source here — Reuters (2020-01-27, "acting in the interests of
      the Turkish government," per three Western officials, hedged;
      Reuters' own tally is "at least 30 organizations") and Hunt &
      Hackett (2024, "Turkey based"). No cited source names a Turkish
      service, so the actor remains tr/unscoped (demoted from tr/mit
      on 2026-06-25).
