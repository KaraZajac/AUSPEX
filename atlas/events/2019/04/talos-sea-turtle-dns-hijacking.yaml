id: 2019-04/talos-sea-turtle-dns-hijacking
name: Cisco Talos discloses Sea Turtle DNS-hijacking campaign — first canonical Turkish-aligned attribution
start_date: 2017-01-01
disclosure_date: 2019-04-17
end_date: null
incident_type:
  - intrusion
  - data-theft
  - supply-chain
initial_vector: valid-creds  # DNS-registrar credential compromise
outcome_summary: |
  Cisco Talos published the foundational Sea Turtle report
  documenting a state-sponsored DNS-hijacking campaign active
  since January 2017. Targets included country-code TLD operators,
  ministries of foreign affairs, telecommunications providers,
  and intelligence agencies across 13 countries — Albania, Egypt,
  Iraq, Iraqi Kurdistan, Cyprus, Saudi Arabia, Syria, Turkey
  itself, the UAE, and others. The campaign compromised DNS
  registrars to redirect target organizations' domain resolution
  to attacker-controlled servers, enabling credential capture
  during ordinary user authentication.
false_flag_risk: none
summary: |
  Foundational attribution event for the Turkish-aligned cyber
  program. Talos's April 2019 report named "actors aligned with
  the Turkish government" as the assessed sponsor — unusual
  precision for a Western vendor and reflective of the strength
  of the victim-set evidence (the Greek-Cypriot-Iraqi-Kurdish
  pattern is recognizably Turkish-strategic). ICANN had issued a
  related public statement in February 2019 about DNS abuse
  without attribution. The 2019 Talos disclosure quieted the
  cluster's operations until the 2024 Hunt & Hackett / Microsoft
  resurgence.
