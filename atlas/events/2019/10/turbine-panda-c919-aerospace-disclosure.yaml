initial_vector: insider
outcome_summary: |
  CrowdStrike's "Huge Fan of Your Work" report consolidates
  the roughly 2010-2015 TURBINE PANDA / APT26 / MSS-Jiangsu
  campaign against turbofan-engine subcontractors supplying
  CFM International (a GE Aviation / Safran joint venture). The
  report assesses "with high confidence that the MSS was
  ultimately tasked with targeting firms that had technologies
  pertaining to the LEAP-X engine" for the COMAC C919, and that
  the indigenous engine AECC ultimately produced (the CJ-1000AX)
  "highly likely ... benefited significantly from the cyber
  espionage efforts of the MSS."
false_flag_risk: none
operators_named:
  - xu-yanjun  # MSS JSSD officer, DOJ convicted Nov 2021 (GE Aviation HUMINT recruitment)
summary: |
  One of the most fully developed open-source attestations of
  a state-industrial-policy-driven cyber program in PRC
  reporting. CrowdStrike documents TURBINE PANDA's cyber
  intrusions (roughly 2010-2015) against makers of the C919's
  turbofan-engine components — Capstone Turbine, Safran/Snecma,
  Honeywell and other aerospace firms — which supplied CFM
  International's LEAP-1C engine, the powerplant COMAC selected
  for the C919. CrowdStrike frames the cyber operations as one
  strand of a multi-modal collection program run by the MSS
  Jiangsu State Security Department (JSSD) that ran in parallel
  with cleared-insider HUMINT recruitment (JSSD officer Yanjun
  Xu recruited a GE turbine-engineer insider and a Safran IT
  insider; Xu was convicted in November 2021) alongside
  joint-venture / forced technology transfer. AUSPEX assesses
  this as a textbook MIC2025 / MCF aerospace-pillar case: the
  indigenization end-state — AECC's CJ-1000AX indigenous
  turbofan for the C919 — matches the collected technology, and
  CrowdStrike explicitly names Made in China 2025's aerospace
  "leap-frog" priority as the industrial-policy driver.
