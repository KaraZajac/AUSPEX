  notes: |
    Audited against the RAW CrowdStrike "Huge Fan of Your Work: How TURBINE PANDA and China's
    Top Spies Enabled Beijing to Cut Corners on the C919 Passenger Jet" report (Oct 2019),
    raw_snapshot crowdstrike__2019_turbine-panda.pdf, sha256 6274987e…d15fd114 (re-verified
    this pass; 9,287,149 bytes; 15 content pages, pdftotext 32,075 chars). NOT a phantom — the
    Passle S3 URL resolves to the genuine full report PDF. Hash matches the source record.

    [a] FACTS — corrected several unsupported claims:
      • CFM International = "a joint venture between U.S.-based GE Aviation and French aerospace
        firm Safran, formerly Snecma"; COMAC chose CFM's LEAP-X (LEAP-1C variant) for the C919
        in Dec 2009 — all verbatim-supported.
      • Cyber victims named: Capstone Turbine ("first preparatory activity in January 2010 …
        targeted Los Angeles-based Capstone Turbine"), Safran/Snecma, Honeywell, "and several
        other firms"; tooling PlugX, Winnti, Sakula; SWC + DNS-hijack + doppelganger site +
        insider-delivered Sakula (TIAN Xi installed Sakula via USB on Safran's networks) — all
        supported.
      • CORRECTION (fabrication removed): summary+outcome_summary claimed CrowdStrike "maps each
        compromise … to a specific subsystem of the LEAP-1A / CJ-1000A turbofan." The report does
        NO subsystem-by-subsystem mapping, and the engine is LEAP-X / LEAP-1C (Airbus's LEAP-1A
        is NOT in the report). Rewrote to the supported claim (component-maker targeting to bridge
        C919 technology gaps).
      • CORRECTION: engine name CJ-1000A → CJ-1000AX (report's spelling), produced by AECC (whose
        main shareholders are COMAC + AVIC), not "delivered by COMAC." Report: "it is highly
        likely that its makers benefited significantly from the cyber espionage efforts of the MSS."
      • CORRECTION: dropped "certified for C919" — report (2019) says CJ-1000AX had only its first
        test in May 2018 and the C919 was still chasing certification (target end-2020); no
        certification claim is supportable from this source.
      • initial_vector phishing → insider: the report describes NO phishing; documented initial
        access is HUMINT-enabled insider malware placement (Sakula via USB, TIAN Xi at Safran)
        plus strategic-web-compromise / DNS-hijacking. "insider" is the best-supported single
        vocab value and the report's defining characteristic (HUMINT-enabled cyber); SWC/DNS-hijack
        are the other documented methods (no single vocab term covers them).

    [b] ATTRIBUTION — CrowdStrike names TURBINE PANDA AND the specific organ: the MSS Jiangsu
    State Security Department (JSSD/江苏省国家安全厅) in Nanjing, incl. its "Sixth Bureau" and named
    officers. Verbatim high-confidence: "It is assessed with high confidence that the MSS was
    ultimately tasked with targeting firms that had technologies pertaining to the LEAP-X engine."
    Set attribution_level = named-unit (was missing); attributing_org_confidence high confirmed;
    auspex_assessment concur kept. REMOVED the residual "PLA /" over-attribution from
    outcome_summary and the "MSS/PLA cyber tasking" phrase from the MCF reasoning — the 15-page
    report names ZERO PLA/SSF/3PLA units (this is why the actor was re-homed cn/pla → cn/mss on
    2026-06-24). Added the DOJ conviction source to sources[] to carry the "Xu convicted Nov 2021"
    detail, which post-dates this Oct-2019 report (report supports only Xu's arrest/indictment).

    [c] DATES — start 2010-01-01 / end 2015-12-31 match "cyber intrusions from a period of roughly
    2010 to 2015" and "first preparatory activity in January 2010." disclosure_date 2019-10-14 and
    source published_on 2019-10-14 consistent with report cover "PUBLISHED OCTOBER 2019."

    [d] DOCTRINE_LINKS —
      • cn/mic2025 (aerospace), attested: JUSTIFIED. The report explicitly names Made in China
        2025 and ties the campaign to it. Rewrote the reasoning (removed the fabricated
        subsystem-mapping) and ADDED inference_basis.source_quote: "From China's 12th and 13th Five
        Year Plan to the increasingly scrutinized Made in China 2025 Plan, numerous state strategic
        plans have named aerospace and aviation equipment as one of ten priority industries to focus
        on 'leap-frog' developments." That states the strategic goal at the goal level → attested bar
        met (attesting_source_id present).
      • cn/mcf (dual-use-research), strongly_inferred: kept (honest). The report DOES mention
        军民融合 (military-civil fusion) but only as a parenthetical dual-use benefit, not as the
        operation's stated purpose — so NOT attested. Fixed reasoning (removed false PLA reference),
        added inference_basis.signals + ruled_out.

    [e] ATTRIBUTION_LEVEL — added named-unit (see [b]).

    [f] ACTOR_ID — cn/mss/apt26 resolves (atlas/actors/cn/apt26.yaml, id cn/mss/apt26). FLAGS below.

    Level = full: every claim is now carried by the fully-snapshotted, hash-verified CrowdStrike PDF
    (the sole load-bearing source). The one non-CrowdStrike detail (Xu's Nov-2021 conviction) rides
    on doj/2021-11_yanjun-xu-mss-conviction, a govt-primary that is Akamai bot-walled (I re-confirmed:
    curl returns a bm-verify interstitial, HTTP 200 / 2,565 bytes, no article body; WebFetch 403;
    archive.org blocked) but has an archive_url, a title matching the claim, and is corroborated by
    the CrowdStrike report's own reporting of Xu's arrest — not load-bearing to the event's thesis.
