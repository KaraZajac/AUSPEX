id: 2019-10/turbine-panda-c919-aerospace-disclosure
name: Turbine Panda C919 turbofan-engine campaign disclosed (CrowdStrike)
start_date: 2010-01-01
disclosure_date: 2019-10-14
end_date: 2015-12-31
incident_type:
  - intrusion
  - data-theft
  - documentary
initial_vector: phishing
outcome_summary: |
  CrowdStrike's "Huge Fan of Your Work" report consolidates
  a decade of TURBINE PANDA / APT26 / MSS-Jiangsu activity
  against turbofan-engine subcontractors supplying CFM
  International (a Safran / GE Aviation joint venture). The
  report links PLA / MSS Jiangsu State Security Department
  (JSSD) tasking to the COMAC C919 program's indigenization
  of the LEAP-class commercial turbofan engine, which COMAC
  ultimately delivered as the CJ-1000A.
false_flag_risk: none
operators_named:
  - xu-yanjun  # MSS JSSD officer, DOJ convicted Nov 2021 (GE Aviation HUMINT recruitment)
summary: |
  The most fully developed open-source attestation of a
  state-industrial-policy-driven cyber program in PRC
  reporting. CrowdStrike maps each compromise of a CFM /
  LEAP component subcontractor (Capstone Turbine, GE
  Aviation, Safran, Honeywell Aerospace, and others) to a
  specific subsystem of the LEAP-1A / CJ-1000A turbofan,
  treating the cyber operations as one component of a
  multi-modal collection program that also included
  cleared-insider recruitment (Yanjun Xu, MSS JSSD,
  convicted November 2021) and joint-venture compelled
  technology transfer. AUSPEX assesses this as the textbook
  MIC2025 / MCF aerospace-pillar case: the indigenization
  end-state (CJ-1000A engine, certified for C919) is
  attested in PRC industrial policy and matches the
  collected technology.
