id: 2019-10/molerats-spark-enigmaspark-backdoor-phishing-campaign-against-governme
name: "Molerats 'Spark' (EnigmaSpark) backdoor phishing campaign against government and telecom organizations"
start_date: 2019-10-01
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  Unit 42 (Palo Alto Networks) observed a Molerats (Gaza Hackers Team / Gaza Cybergang) phishing campaign between October and December 2019 that targeted eight organizations across six countries in the government, telecommunications, insurance, and retail sectors. The actor delivered the Spark backdoor (packed with the Enigma protector) via spear-phishing emails carrying password-protected Word and PDF documents with embedded macros, using VBScript downloaders and multi-stage C2 delivery. The malware applied Arabic keyboard/locale checks to evade sandboxes, used 3DES and AES encryption for C2, and established persistence through scheduled tasks.
