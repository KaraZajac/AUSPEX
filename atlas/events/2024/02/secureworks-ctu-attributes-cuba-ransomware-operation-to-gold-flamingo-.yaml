summary: |
  Secureworks CTU (profile mirrored by Sophos) attributes the Cuba ransomware operation to the financially motivated GOLD FLAMINGO group, with no corroborated state direction. The named victim in the profile is the national parliament of Montenegro (August 2022); the operation otherwise impacts geographies and industries similar to other financially motivated ransomware. Initial access evolved from Chanitor (Hancitor) spam campaigns to, as of early 2022, exploitation of Microsoft Exchange servers as the stated initial-access vector, with RDP used for lateral movement. Associated tooling includes Cobalt Strike Beacon, ROMCOM RAT, Mimikatz, and Meterpreter before Cuba ransomware deployment.
