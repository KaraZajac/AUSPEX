id: 2024-02/moobot-apt28-botnet-disruption
name: DOJ disruption of GRU 26165 Moobot Ubiquiti router botnet (APT28)
start_date: 2024-01-01  # DOJ: "a January 2024 court-authorized operation" (op window, est.)
disclosure_date: 2024-02-15  # DOJ press release
end_date: 2024-02-15  # bounded at disclosure (point-in-time Jan-2024 disruption; cf. 2024-01/kv-botnet)
incident_type:
  - disruption
  - law-enforcement
initial_vector: valid-creds  # routers first compromised via publicly-known default admin passwords (DOJ)
outcome_summary: |
  FBI/DOJ conducted a court-authorised disruption ("Operation Dying
  Ember", led by FBI Boston) of a botnet of compromised Ubiquiti
  EdgeOS routers that GRU Military Unit 26165 (APT28) had repurposed
  as, in DOJ's words, a "global cyber espionage platform." Per DOJ the
  GRU did NOT build the botnet: non-GRU cybercriminals had first
  installed the criminal "Moobot" malware on routers still using
  publicly-known default administrator passwords, after which GRU
  hackers used Moobot to deploy their own bespoke scripts and files.
  The botnet carried APT28 spearphishing and credential-harvesting
  against "targets of intelligence interest to the Russian government"
  — U.S. and foreign government, military, security, and corporate
  organisations. The operation leveraged Moobot itself to copy and
  delete the GRU's stolen data and malicious files, and reversibly
  modified the routers' firewall rules to block GRU remote-management
  access — a temporary measure users can roll back by factory-resetting
  their routers. More than a thousand routers were remediated. FBI
  issued companion guidance to factory-reset, update firmware, and
  change default passwords; DOJ cautioned that a reset WITHOUT a
  password change leaves a router open to reinfection.
false_flag_risk: none
campaign_id: gru-26165-western-logistics
summary: |
  DOJ's own framing situates the operation in a rapid cadence of
  court-authorised botnet disruptions. DAG Lisa Monaco: "for the
  second time in two months, we've disrupted state-sponsored hackers
  from launching cyber-attacks behind the cover of compromised U.S.
  routers" (the prior router-botnet takedown being the late-January
  2024 Volt Typhoon / KV-botnet disruption — see
  2024-01/kv-botnet-volt-typhoon-disruption). AAG Matthew Olsen called
  it "the third time since Russia's unjustified invasion of Ukraine
  that the Department has stripped the Russian intelligence services of
  a key tool," and "a unique, two-for-one operation... a botnet used by
  both criminal and state-sponsored actors" — reflecting the Moobot
  infrastructure's criminal origin and GRU repurposing. Shadowserver
  Foundation and Microsoft Threat Intelligence assisted; DOJ noted a
  companion FBI-led multinational advisory on Russian actors' use of
  compromised routers followed the release.
