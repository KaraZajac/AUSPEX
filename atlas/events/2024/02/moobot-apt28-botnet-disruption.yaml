id: 2024-02/moobot-apt28-botnet-disruption
name: DOJ disruption of GRU 26165 Moobot Ubiquiti router botnet (APT28)
start_date: 2024-01-01  # operation period
disclosure_date: 2024-02-15
end_date: 2024-02-15
incident_type:
  - disruption
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  DOJ and FBI conducted a court-authorised disruption of a Moobot
  botnet of compromised Ubiquiti EdgeRouters operated by GRU Unit
  26165 (APT28 / FANCYBEAR). The botnet relayed APT28 reconnaissance
  and credential-harvest traffic against US government, military,
  and CI organisations and against NATO / EU partners supporting
  Ukraine. The operation deleted GRU-installed malware and
  configuration from the compromised routers and prevented
  reinfection; FBI issued companion technical guidance on Ubiquiti
  factory-reset and firmware-update procedures.
false_flag_risk: none
campaign_id: gru-26165-western-logistics
summary: |
  Doctrinally important as the second US "victim-network-touched"
  cyber-disruption against a Russian state-controlled botnet (the
  first being the May 2018 Cyclops Blink / VPNFilter operation,
  also against Sandworm). The Moobot disruption applies the
  template developed against the PRC Volt Typhoon / KV-botnet (Jan
  2024 — also FBI court-authorised botnet deletion) to GRU
  operations within four weeks. The cadence shows the FBI's
  willingness to use disruptive cyber-action against multiple
  peer-state operators in rapid sequence.
