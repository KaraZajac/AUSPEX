qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-04
  level: full
  notes: |
    Audited vs the DOJ press release "Justice Department Conducts
    Court-Authorized Disruption of Botnet Controlled by the Russian
    Federation's GRU" (2024-02-15). Raw snapshot captured via the
    Akamai bm-verify cookie-jar bypass (justice.gov is Bot-Manager-
    walled): doj__2024-02-15_moobot-apt28-botnet-disruption.html,
    sha256 10be7e58…dc97002e, 87838 bytes. Single tier-1 govt-primary
    source; it carries every retained claim verbatim -> level=full.

    [a] FACTS — corrected. Router-cleanup MECHANISM re-grounded to DOJ:
    the op "leveraged the Moobot malware to copy and delete stolen and
    malicious data and files" and "reversibly modified the routers'
    firewall rules to block remote management access" (temporary, user-
    reversible). Struck the prior "prevented reinfection" claim as an
    overstatement — DOJ warns "a factory reset that is not also
    accompanied by a change of the default administrator password will
    return the router to its default administrator credentials, leaving
    the router open to reinfection." Added DOJ's operation name
    "Operation Dying Ember" (FBI Boston-led; "over a thousand
    compromised routers"). Removed unsupported target embellishments
    ("CI organisations", "NATO/EU partners supporting Ukraine"): DOJ
    scopes victims as "U.S. and foreign governments and military,
    security, and corporate organizations" of "intelligence interest to
    the Russian government." Rewrote summary: struck the "second victim-
    network-touched... first being the May 2018 Cyclops Blink/VPNFilter"
    claim — not carried by this source AND factually muddled (May 2018 =
    VPNFilter; Cyclops Blink was 2022) — replaced with DOJ's own cadence
    quotes (Monaco "second time in two months... compromised U.S.
    routers"; Olsen "third time since Russia's unjustified invasion...
    stripped the Russian intelligence services of a key tool" /
    "unique, two-for-one operation... both criminal and state-sponsored
    actors"). initial_vector unknown->valid-creds: routers "still used
    publicly known default administrator passwords."

    MOOBOT(criminal)-vs-APT28(repurposer) distinction VERIFIED (now in
    summary/outcome), DOJ verbatim: "the GRU did not create it from
    scratch. Instead, the GRU relied on the 'Moobot' malware, which is
    associated with a known criminal group. Non-GRU cybercriminals
    installed the Moobot malware on Ubiquiti Edge OS routers that still
    used publicly known default administrator passwords. GRU hackers
    then used the Moobot malware to install their own bespoke scripts
    and files that repurposed the botnet, turning it into a global
    cyber espionage platform."

    [b] ATTRIBUTION — DOJ names "GRU Military Unit 26165, also known as
    APT 28, Sofacy Group, Forest Blizzard, Pawn Storm, Fancy Bear, and
    Sednit" at high confidence. Set attribution_level=named-unit (a
    specific GRU unit named). auspex_assessment concur retained.

    [c] DATES — source published_on 2024-02-15 correct. Op is "a
    January 2024 court-authorized operation" (start_date 2024-01-01 est.
    window); disclosure 2024-02-15; end_date bounded at disclosure per
    the disruption-counter-action convention (cf. 2024-01/kv-botnet).

    DIRECTIONALITY (biggest correction) — modelled as a COUNTER-ACTION:
    actor_id ru/gru/26165/apt28 -> null. This event documents a U.S.
    law-enforcement action AGAINST the actor (FBI/DOJ court-authorised
    disruption), not an APT28 operation. Per the SCHEMA directionality
    rule and the sibling counter-actions (2024-01/kv-botnet-volt-typhoon
    -disruption, 2023-05/operation-medusa-snake-disruption) the
    perpetrator slot is null, the acting body (US DOJ/FBI) is
    attributing_org, incident_type stays meta [disruption,
    law-enforcement], and the disrupted actor (GRU 26165 / APT28) is the
    SUBJECT in prose. Not a dangling-FK fix — the old actor_id resolved
    (atlas/actors/ru/apt28.yaml, id ru/gru/26165/apt28).

    [d]/[e] DOCTRINE — both links were over-graded strongly_inferred on
    a signal the source does NOT carry ("DOJ names the botnet as
    supporting ops against US/NATO/EU members assisting Ukraine"). DOJ
    states only a generic purpose ("intelligence interest to the Russian
    government"), never a Ukraine-aid or NATO-degradation GOAL — so both
    downgraded to plausible with honest inference_basis.alternatives.
    Link 1 pillar switched ukraine-support-interdiction ->
    nato-degradation: the source's broad govt/military/security/
    corporate espionage fits nato-degradation (govt+defence target set;
    APT28's own default alignment) far better than the aid-logistics
    ukraine-support-interdiction pillar. Link 2 (sanctions-response/
    aid-state-targeting) kept but plausible with the caveat that a
    classic GRU collection platform is a weak fit for a pillar otherwise
    built on proxy/performative ops. Both are Russian attacker-rationale
    doctrines on a null-actor counter-action (perspective absent =
    attacker-rationale, matching the MEDUSA sibling); eventStateId falls
    back to ru. verify_atlas doctrine-state-mismatch will surface this
    as an expected review item, not an error.

    [f] ACTOR — ru/gru/26165/apt28 resolves (atlas/actors/ru/apt28.yaml,
    id ru/gru/26165/apt28); no actor-file edit needed; now nulled
    in-event per directionality.

    RESIDUAL — DOJ's "second time in two months" is not tied by name to
    Volt Typhoon in THIS source; the KV-botnet/Volt Typhoon
    identification in the summary is a corpus cross-reference
    (2024-01/kv-botnet-volt-typhoon-disruption), editorial not
    source-stated. A companion FBI-led multinational router advisory is
    referenced by DOJ as issued after the release; not added — DOJ alone
    carries every retained claim.
