  notes: |
    Audited vs ANSSI/CERT-FR CERTFR-2024-CTI-001 "Panorama de la cybermenace 2023"
    (27 Feb 2024). RAW captured: landing-page HTML (sha256 23c58c4b…d7d9b6a9,
    15,926 B — metadata table confirms Référence CERTFR-2024-CTI-001, titre
    "Panorama de la cybermenace 2023", date de la première version 27 février
    2024) + the linked 48-page PDF /uploads/CERTFR-2024-CTI-001.pdf
    (raw_snapshot; sha256 d56249ca…8b561165, 6,288,478 B) — all facts verified
    against the PDF ("Cette troisième édition du Panorama de la cybermenace
    décrit les principales tendances constatées en 2023 par l'Agence nationale
    de la sécurité des systèmes d'information (ANSSI)").
    [a] FACTS — verified, three corrections. VERIFIED verbatim: top-3 threat
    assessment ("L'ANSSI estime aujourd'hui que les attaquants réputés liés à la
    Chine, à la Russie et à l'écosystème cybercriminel constituent les trois
    principales menaces"); espionage most-mobilizing ("En 2023, l'espionnage
    informatique est la menace qui a, à nouveau, le plus impliqué les équipes de
    l'ANSSI") with "un ciblage croissant de groupes de réflexion (think tanks),
    d'instituts de recherche et d'entreprises de la base industrielle et
    technologique de défense (BITD)" and the overseas-territory compromise "au
    moyen d'un mode opératoire d'attaque (MOA) associé publiquement à la Chine";
    ransomware "regain du nombre d'attaques par rançongiciel contre des
    organisations françaises", santé + collectivités territoriales named as
    "secteurs encore trop vulnérables"; QakBot dismantlement support (26 Aug
    2023, US/DE/NL/FR authorities); pre-positioning "des activités potentielles
    de prépositionnement ont été détectées sur les systèmes d'information et
    opérationnels d'entités du secteur de l'énergie en Europe, en Amérique du
    Nord et en Asie [25, 26] … potentiellement en vue de conduire des opérations
    ultérieures de sabotage"; JOP2024 outlook, ANSSI tasked to pilot the JOP2024
    prevention strategy. CORRECTIONS: (1) REMOVED "Nobelium" — 0 hits in the PDF
    (APT29/SVR/Midnight Blizzard also 0); Russian-reputed content is Sandworm in
    the body (Infamous Chisel "lié publiquement au mode opératoire réputé russe
    Sandworm", Ukrainian army Android devices) plus APT28 tradecraft covered via
    citation of CERT-FR's own CERTFR-2023-CTI-009 [37] — "APT28" itself appears
    only in the bibliography. (2) REPLACED "Iranian retaliatory activity in the
    Gaza war context" — not in the report; the Iranian-nexus content is the
    Charlie Hebdo / Holy Souls hack-and-leak over the Khamenei-caricature
    contest ("Holy Souls serait opéré par une société-écran nommée Emennet
    Pasargad … actions d'influence et d'ingérence au service du Corps des
    Gardiens de la Révolution islamique et du ministère du Renseignement
    iranien", per cited US reporting); the report's ONLY Gaza passage concerns
    pro-Russian hacktivists (Anonymous Sudan) menacing France over Niger, then
    re-targeting Israeli entities. (3) PRECISED the Volt Typhoon claim: the
    string appears only as a bibliography title ([39] Microsoft, beside [38]
    CISA PRC-LOTL), cited from the body's living-off-the-land passage ("Cette
    stratégie aurait notamment été employée par des attaquants réputés russes et
    chinois pour cibler des infrastructures critiques en Ukraine [24] et aux
    États-Unis en 2023 [38, 39]"); the energy-sector pre-positioning findings
    are cited to SektorCERT / Canadian CCCS [25, 26] and are NOT attributed to
    China by name — summary + outcome_summary rewritten accordingly (no "naming
    Volt Typhoon" claim survives).
