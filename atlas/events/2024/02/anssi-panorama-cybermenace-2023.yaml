outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-001 (27 February
  2024) — the third annual edition of the Panorama de la
  cybermenace, ANSSI's public-facing synthesis of the principal
  threat trends it observed in 2023. ANSSI assesses that
  attackers "réputés liés" (reputedly linked) to China, to
  Russia and to the cybercriminal ecosystem constitute the
  three principal threats to the most critical French
  information systems and to the national ecosystem. Strategic
  and industrial espionage again most mobilized ANSSI's teams,
  with a significant increase in the targeting of entities in
  strategic domains — think tanks, research institutes and the
  defense industrial and technological base (BITD) — including
  the compromise of an information system in a French overseas
  territory by an intrusion set publicly associated with China;
  Russian-reputed activity named in the body includes Sandworm
  (Infamous Chisel against Ukrainian army Android devices),
  with APT28 tradecraft (CVE-2023-23397 exploitation,
  mail-redirect exfiltration) covered via CERT-FR's own
  CERTFR-2023-CTI-009 report. The Panorama records a renewed
  rise (regain) in ransomware attacks against French
  organizations — local government (collectivités
  territoriales) and health establishments among the
  still-too-vulnerable sectors under pressure — and ANSSI
  support to the August 2023 international dismantlement of the
  QakBot botnet infrastructure. It flags potential
  pre-positioning activity detected on the IT and operational
  systems of energy-sector entities in Europe, North America
  and Asia, potentially in view of later sabotage operations,
  and cites the US Volt Typhoon advisory cycle (CISA /
  Microsoft) for China-attributed critical-infrastructure
  targeting in the United States via living-off-the-land
  techniques. Destabilization coverage spans pro-Russian
  hacktivist DDoS (Anonymous Sudan threatening France with
  reprisals over the Niger putsch, then re-targeting Israeli
  entities after the Gaza offensive) and the Iranian-nexus Holy
  Souls hack-and-leak against Charlie Hebdo over the
  Khamenei-caricature contest (per cited US reporting, operated
  by the Emennet Pasargad front company in the service of the
  IRGC and Iran's intelligence ministry). The report closes on
  the 2024 outlook, foremost the Paris Olympic and Paralympic
  Games (JOP2024), whose cyberattack-prevention strategy ANSSI
  was tasked to pilot.
