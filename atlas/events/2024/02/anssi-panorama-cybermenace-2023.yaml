id: 2024-02/anssi-panorama-cybermenace-2023
name: ANSSI / CERT-FR publishes Panorama de la cybermenace 2023
start_date: 2023-01-01
disclosure_date: 2024-02-27
end_date: 2023-12-31
incident_type:
  - documentary
initial_vector: n-a
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-001 (27 February
  2024) — the 2023 edition of the annual Panorama de la
  cybermenace, ANSSI's flagship public-facing threat-landscape
  document. The 2023 Panorama covers continuing Russian state-
  aligned activity (APT28 / Nobelium / Sandworm), increased
  Chinese cyber-espionage tasking against French entities,
  Iranian retaliatory activity in the Gaza war context,
  pre-positioning concerns relating to Volt Typhoon-style
  China-attributed clusters, and persistent ransomware-criminal
  pressure on French local government and health entities.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  The annual Panorama is the most authoritative French
  government statement of defensive-side threat posture
  year-to-year and operationalizes the LID public-attribution
  function at a strategic-overview level (versus the
  intrusion-set-specific CTI series). The 2023 edition is
  editorially significant for naming Volt Typhoon-style
  China pre-positioning as a French concern — extending the
  pre-positioning frame from the US 2023-2024 advisory cycle
  into ANSSI's published view.
