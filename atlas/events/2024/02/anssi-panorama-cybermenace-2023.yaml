summary: |
  The annual Panorama is ANSSI's flagship public-facing
  statement of defensive-side threat posture year-to-year and
  operationalizes the LID CERT-FR-coordination /
  advisory-publication function at a strategic-overview level
  (versus the intrusion-set-specific CTI series). Its
  attribution register is deliberately hedged — actors are
  "réputés liés" (reputedly linked) to a state or "associé
  publiquement" (publicly associated) per open-source
  reporting, not attributed in ANSSI's own sovereign voice — so
  AUSPEX records no attribution rows for this landscape
  publication. The 2023 edition is editorially significant for
  extending the critical-infrastructure pre-positioning frame
  of the US 2023-2024 advisory cycle into ANSSI's published
  view: it flags potential pre-positioning on energy-sector IT
  and OT systems in Europe, North America and Asia, potentially
  ahead of later sabotage, and cites the CISA / Microsoft Volt
  Typhoon advisories for China-attributed US
  critical-infrastructure targeting — though "Volt Typhoon"
  itself appears only in the report's bibliography, not its
  body prose.
