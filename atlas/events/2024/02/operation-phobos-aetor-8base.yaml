outcome_summary: |
  On 10 February 2025 an international operation the Royal Thai Police
  codenamed "Operation Phobos Aetor" dismantled the 8Base ransomware
  operation. Thai police raided four locations in Phuket and arrested four
  suspects (two men and two women); Europol stated all four are Russian
  nationals suspected of leading 8Base. The 8Base darknet leak / negotiation
  site was seized by the Bavarian State Criminal Police Office (on behalf of
  the Bamberg Public Prosecutor) and replaced with a multi-agency seizure
  banner, and more than 100 servers underpinning the Phobos / 8Base network
  were disrupted. On 11 February 2025 the US DOJ (District of Maryland)
  unsealed an 11-count indictment against two Russian nationals arrested in
  the same coordinated disruption — Roman Berezhnoy (33) and Egor Nikolaevich
  Glebov (39) — for running a Phobos ransomware-affiliate organization under
  the names "8Base" and "Affiliate 2803". DOJ said the group victimised more
  than 1,000 public and private entities worldwide (including a children's
  hospital, health-care providers and educational institutions) and took in
  over USD 16M in ransoms; most named victims paid under USD 100k. The
  Europol / Eurojust-coordinated action drew law-enforcement agencies from 14
  countries (incl. the FBI, UK NCA, and German, Swiss, Japanese and Thai
  partners).
