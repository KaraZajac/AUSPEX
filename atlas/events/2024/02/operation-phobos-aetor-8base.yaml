id: 2024-02/operation-phobos-aetor-8base
name: Operation Phobos Aetor — Thai / FBI / Europol takedown of 8Base infrastructure
start_date: 2024-02-08
disclosure_date: 2024-02-12
end_date: 2024-02-12
incident_type:
  - documentary
  - disruption
initial_vector: unknown
outcome_summary: |
  Joint operation by the Royal Thai Police, FBI, and Europol
  resulted in arrests in Phuket and the seizure of 8Base
  ransomware infrastructure. Four European nationals (Czech,
  Latvian, Spanish, and German) were arrested on suspicion of
  operating 8Base; the suspects had allegedly extorted
  approximately USD 16M from over 1,000 victims globally. The
  operation followed an Interpol-coordinated investigation
  beginning mid-2023. The 8Base leak site was seized and
  replaced with a multi-agency takedown notice.
quantified_impact:
  arrests: 4
  cumulative_ransom_usd: 16000000
  victims: 1000
false_flag_risk: none
summary: |
  Important criminal-baseline disruption event. The 8Base
  takedown is unusual in that the indicted operators were
  European rather than Russian-resident — supporting the
  AUSPEX classification of `criminal/8base` outside the
  Russian state-tolerated ecosystem. The subsequent November
  2024 Ptitsyn extradition (separately tracked) targeted the
  upstream Phobos-administrator layer.
