summary: |
  Criminal-baseline disruption modeled as a law-enforcement counter-action
  (not an attack): the coordinated international takedown of the 8Base
  ransomware operation, a Phobos ransomware-as-a-service affiliate cluster.
  Per the counter-action convention the actor is nulled, the acting coalition
  sits in attributing_org, and criminal/8base is the subject described here.
  Europol stated the four arrested leaders are Russian nationals, and the two
  DOJ-indicted operators (Berezhnoy, Glebov) are Russian nationals — but they
  were arrested in Thailand and face Western prosecution, which (together with
  the multi-jurisdictional Ptitsyn case and the absence of any public
  FSB-tolerance argument for this lineage) is why AUSPEX keeps 8Base / Phobos
  under criminal/ rather than ru/proxies/: an extradition-reachable, non-safe-
  harboured crew. The earlier extradition of Phobos administrator Evgenii
  Ptitsyn (arrested South Korea Jun 2024, extradited to the US Nov 2024;
  separately tracked as 2024-11/ptitsyn-phobos-extradition) targeted the
  upstream administrator layer — DOJ says these 8Base-affiliate charges follow
  that action.
