summary: |
  RETIRE/MERGE CANDIDATE (audit 2026-07-04): no located source
  documents a CNMF Hunt Forward operation hosted on Canadian networks,
  with CSE or otherwise. The sole cited source — Gen. Haugh's April
  2024 posture statement (SASC and HASC versions, both captured) —
  carries only the bulk tally ("CNMF personnel have deployed 22 times
  to 17 countries in partner-enabled, hunt forward operations") and
  names no host country, no Canada, no CSE, and no Five Eyes first.
  Secondary coverage of the same testimony (The Record and C4ISRNET,
  both 2024-04-10) names no Canada-hosted hunt, and the CCDCOE CyCon
  2024 hunt-forward legal survey (Kosseff) records Canada only as a
  CONDUCTOR of hunt-forward operations abroad. The only documented
  U.S.-Canada hunt-forward activity is the trilateral
  U.S.-Canada-Latvia defensive hunt on LATVIAN networks with CERT.LV
  and the Canadian Armed Forces (CYBERCOM "Shared threats, shared
  understanding", disclosed 2023-05-10) — already modeled as the
  Latvia component of 2022-03/hunt-forward-lithuania-latvia-croatia.
  This record appears to be a garble of that operation: Canada-as-
  partner misread as Canada-as-host, CAF misrendered as CSE, and The
  Record's "first time the two allies simultaneously scoured another
  nation's networks" misrendered as a first hunt on a Five Eyes
  partner's own networks.
