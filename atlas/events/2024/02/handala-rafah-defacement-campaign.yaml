id: 2024-02/handala-rafah-defacement-campaign
name: Handala "We stood by Rafah" defacement campaign against Israeli sites
start_date: 2024-02-13
disclosure_date: 2024-02-13
end_date: 2024-02-27
incident_type:
  - disruption
  - influence-operation
  - hack-and-leak
initial_vector: unknown
outcome_summary: |
  As Israel's government ordered the IDF to begin planning a
  ground operation in Rafah, the Iran-linked Handala Hack persona
  posted "We stood by Rafah" on 13 February 2024 and, on
  27 February 2024, ran a coordinated campaign defacing multiple
  Israeli websites accompanied by alleged data leakage (Cyberint).
  A named example was the Rosh Ha'ayin Municipal Society Community
  Center website, defaced with the message "We stood by Rafah!
  This was just a warning" (Haberfeld & Weimann, Studies in
  Conflict & Terrorism). The operation was psychological/
  influence-driven — ideological slogan messaging timed to the
  Rafah crisis, not data-destruction; no wiper or destructive
  payload is attested for the February campaign.
false_flag_risk: suspected  # persona presents as pro-Palestinian hacktivist
campaign_id: handala-iran-israel-campaign
summary: |
  First major dated Handala persona operation after its
  18 December 2023 launch. A hacktivist-persona-laundered
  influence operation: the "We stood by Rafah" slogan and the
  synchronized website defacements operationalize the
  Resistance-Axis information-warfare pillar, while the Handala
  front itself is the cyber-deniable-retaliation persona-laundering
  pillar in textbook form. Timing-bound to the Rafah
  ground-operation planning cycle, it illustrates the persona's
  role as a near-real-time psychological-warfare instrument.
  Distinct from the sibling Handala operations (June 2024
  Ma'agan Michael SMS-extortion; July 2024 CrowdStrike-outage
  wiper) — this event is defacement-and-slogan only.
attributions:
  - actor_id: ir/mois/handala
    attributing_org: Vendor/academic consensus (Cyberint; Studies in Conflict & Terrorism)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2025-02-20
    attribution_source_id: cyberint/2025-02-20_handala-hack-what-we-know
    attribution_level: named-actor
    notes: |
      Iran nexus is a vendor/academic assessment of the Handala
      persona, not a government attribution of this specific
      operation. Handala presents as a pro-Palestinian hacktivist
      front; Cyberint and Haberfeld & Weimann (Studies in Conflict
      & Terrorism) assess it as an Iran-linked (MOIS) psychological-
      warfare persona whose operational backbone overlaps the Void
      Manticore / Banished Kitten cluster. No US/IL government
      designation has specifically attested Handala -> MOIS, so the
      Iran nexus is held at moderate confidence / named-actor level.
doctrine_links:
  - doctrine_id: ir/resistance-axis
    pillar_id: ir/resistance-axis/information-warfare
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A timing-bound, Palestinian-resistance-themed defacement wave
      carrying the "We stood by Rafah" slogan during the Rafah
      ground-operation planning window is the Resistance-Axis
      information-warfare (multilingual influence) pillar in
      textbook form — psychological messaging, not infrastructure
      coercion.
    inference_basis:
      signals:
        - "'We stood by Rafah' Telegram post dated 13 Feb 2024, synchronized to the IDF Rafah-operation planning order (Cyberint)"
        - "act is website defacement plus ideological slogan messaging rather than data-destruction — influence/psychological intent"
        - "Palestinian-resistance persona branding (Naji al-Ali Handala figure) appropriated across the defacements"
      ruled_out: |
        Financially motivated criminal defacement — no ransom or
        monetization is present; the messaging is ideological and
        timed to a kinetic crisis. Anti-israel-coercion pillar
        considered but ruled the secondary fit: that pillar's
        profile is destructive/infrastructure coercion (water,
        health, finance), whereas this operation is slogan-and-
        defacement influence.
    attesting_source_id: null
    contested: false
    analyst: claude
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: ir/cyber-deniable-retaliation/persona-laundering
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The operation is conducted behind the Handala hacktivist
      persona — vendor/academic-assessed as an Iran/MOIS front — to
      coerce Israel while preserving plausible deniability, matching
      the persona-laundering pillar.
    inference_basis:
      signals:
        - "Handala presents as pro-Palestinian hacktivism but is assessed as an Iran/MOIS fictitious identity by Cyberint, by Haberfeld & Weimann (Studies in Conflict & Terrorism), and by DOJ framing of MOIS-operated personas"
        - "operational backbone overlaps the MOIS-linked Void Manticore / Banished Kitten cluster (actor dossier)"
        - "fits the attested HomeLand Justice -> MOIS persona-laundering template; self-claim via Telegram/X with no state acknowledgement"
      ruled_out: |
        Genuine independent Palestinian hacktivism — the persona
        launched on Telegram/X six weeks after Oct 7 and its
        infrastructure/tradecraft tie back to an Iran-linked
        cluster, so the pro-Palestinian framing is assessed as
        cover rather than the operating party.
    attesting_source_id: null
    contested: false
    analyst: claude
