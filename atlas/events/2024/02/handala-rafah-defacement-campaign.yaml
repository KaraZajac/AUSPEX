outcome_summary: |
  As Israel prepared for the Rafah ground operation in February
  2024, the Handala Hack persona announced and conducted a
  defacement campaign against Israeli websites, accompanying the
  defacements with the slogan "We stood by Rafah." Picus Security
  and Iran-aligned-actor monitoring identified a coordinated
  surge in Handala persona-channel claim volume aligned with the
  kinetic timeline.
false_flag_risk: suspected
campaign_id: handala-iran-israel-campaign
summary: |
  First major Handala persona-attached operation after its
  18 December 2023 launch. Doctrinally operationalizes the
  Resistance-Axis anti-Israel-coercion and information-warfare
  pillars and the cyber-deniable-retaliation claim-and-leak
  pillar; timing-bound to the Rafah ground-operation cycle
  illustrates the persona's role as a near-real-time
  information-warfare instrument.
