  - shirinkar-mohammad-bagher  # IRGC-CEC senior official, OFAC jy2072 Feb 2024 (corrects prior slug sadeghi-mahdi-mohammad — Sadeghi was a separate later-2024 DOJ matter, NOT this OFAC action)
  - saberian-reza-mohammad-amin  # IRGC-CEC senior official, OFAC jy2072 Feb 2024
summary: |
  The OFAC designation that pierces the veil on the late-2023
  Unitronics PLC water-utility campaign and supplies the IRGC
  service attribution AUSPEX carries across the CyberAv3ngers
  cluster. Treasury's press release jy2072 sanctions the IRGC
  Cyber-Electronic Command (IRGC-CEC) and six of its senior
  officials as responsible for the operations in which
  IRGC-affiliated cyber actors compromised internet-facing,
  Israeli-made Unitronics Vision Series PLCs/HMIs — which used
  Unitronics' default passwords or no password — and defaced
  their screens, at US water and wastewater and other critical-
  infrastructure systems (the companion CISA advisory AA23-335A,
  now also cited here, attributes the same campaign to the
  "CyberAv3ngers" IRGC-affiliated persona). Modeled as a
  counter-action (a US state action against the actor): the
  subject is the AUSPEX actor ir/irgc-io/cyberav3ngers. NOTE:
  the OFAC release itself names the IRGC-CEC (Cyber-Electronic
  Command) — the strings "IRGC-IO" / "Intelligence
  Organization", "CyberAv3ngers", and "Telegram" do NOT appear
  in it; the persona identification comes from the CISA advisory,
  and the IO-vs-CEC sub-org framing is an AUSPEX structural
  synthesis, not OFAC's words.
