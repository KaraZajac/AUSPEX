initial_vector: unknown
outcome_summary: |
  US Treasury OFAC (press release jy2072) designated six senior
  officials of the Iranian Islamic Revolutionary Guard Corps
  Cyber-Electronic Command (IRGC-CEC): Hamid Reza Lashgarian
  (head of the IRGC-CEC, also a commander in the IRGC-Qods
  Force), Mahdi Lashgarian, Hamid Homayunfal, Milad Mansuri,
  Mohammad Bagher Shirinkar, and Reza Mohammad Amin Saberian.
  All six were designated under E.O. 13224 as leaders or
  officials of the IRGC-CEC — itself designated under E.O. 13606
  in 2018 and "also known as the IRGC Electronic Warfare and
  Cyber Defense Organization." OFAC took the action in response
  to IRGC-affiliated cyber actors hacking and posting images on
  the screens of Unitronics (Israeli-made) programmable logic
  controllers used in US and other water and critical-
  infrastructure systems; OFAC notes the operation did not
  disrupt any critical services.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
