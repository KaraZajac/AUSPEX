id: 2024-02/ofac-cyberav3ngers-irgc-io-designations
name: OFAC designates six IRGC-IO officials behind CyberAv3ngers
start_date: 2024-02-02
disclosure_date: 2024-02-02
end_date: 2024-02-02
incident_type:
  - influence-operation  # this is a policy / enabling-infrastructure event, modeled as a designation-event
initial_vector: null
outcome_summary: |
  SDN designations of six IRGC-IO Cyber-Electronic Command
  officials: Hamid Reza Lashgarian (commander), Mahdi
  Lashgarian, Hamid Homayunfal, Mahdi Mohammad Sadeghi, Milad
  Mansuri, and Reza Mohammad Amin Saberian. Treasury OFAC
  press release jy2072 explicitly identifies the IRGC-IO
  Cyber-Electronic Command as the unit behind the CyberAv3ngers
  persona.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
operators_named:
  - lashgarian-hamid-reza  # IRGC-IO CEC commander, OFAC jy2072 Feb 2024
  - lashgarian-mahdi  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - homayunfal-hamid  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - sadeghi-mahdi-mohammad  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - mansuri-milad  # IRGC-IO CEC, OFAC jy2072 Feb 2024
  - saberian-reza-mohammad-amin  # IRGC-IO CEC, OFAC jy2072 Feb 2024
summary: |
  Companion event to the Aliquippa / Unitronics campaign — the
  designation that pierces the CyberAv3ngers persona's veil and
  supplies the attested doctrine linkage for all CyberAv3ngers-
  attributed events. Treasury's press release frames the IRGC-IO
  Cyber-Electronic Command operation of the CyberAv3ngers
  Telegram persona, which during late 2023 publicly defaced
  internet-exposed Unitronics Vision-series PLCs at US water and
  wastewater utilities (Aliquippa, Pittsburgh) by exploiting
  default credentials on the PLC's HMI panel and posting an
  anti-Israel banner — a coercive OT-defacement operation
  laundered through hacktivist branding. The designation
  consolidates IRGC-IO responsibility for the operational
  cluster prior CISA AA23-335A and AA26-097A advisories also
  attribute to the same actor set.
