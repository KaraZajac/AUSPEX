id: 2024-02/operation-cronos-lockbit
name: Operation Cronos — LockBit infrastructure seizure
start_date: 2024-02-19
disclosure_date: 2024-02-20
end_date: 2024-02-23
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  Multilateral law-enforcement operation seizing 34 LockBit
  servers across 8 countries, 200 cryptocurrency wallets, 14,000
  rogue accounts, and the leak-site infrastructure. UK NCA
  operationally led; FBI, Europol, French Gendarmerie, German
  BKA, Swiss FedPol, Polish CBSP, Australian AFP, Canadian RCMP
  participated. NCA defaced the leak site and used it for staged
  taunting countdowns of LockBitSupp-identity reveals. Decryptors
  published for ~1,000 victims. Two operators arrested (Poland,
  Ukraine). DOJ filed superseding indictments and unsealed
  charges against three additional operators.
false_flag_risk: none
campaign_id: lockbit-cronos
operators_named:
  - sungatov-artur  # LockBit affiliate, DOJ Feb 2024 (Cronos unsealing)
  - kondratyev-ivan  # LockBit affiliate "Bassterlord", DOJ Feb 2024
summary: |
  Highest-profile ransomware-disruption operation on public
  record. LockBit partially reconstituted within days, but
  affiliate-trust damage was lasting; affiliate share migrated
  to RansomHub / Akira / Play / Qilin through 2024. The reveal
  of LockBitSupp's identity (Khoroshev) was held in reserve and
  disclosed May 7 2024 with corresponding OFAC SDN listing — see
  `2024-05/lockbitsupp-khoroshev-unmasking`.
