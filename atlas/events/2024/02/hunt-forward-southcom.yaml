outcome_summary: |
  CNMF Hunt Forward deployments in the US Southern Command area of
  responsibility (Latin America / Caribbean), conducted at partner-
  government invitation. In his 1 April 2025 SASC advance-policy
  responses, retired Lt. Gen. Dan Caine (nominee for Chairman of the
  Joint Chiefs of Staff) stated that "U.S. CYBERCOM hunt forward
  missions in the SOUTHCOM area of responsibility have discovered CCP
  malware on multiple foreign partner networks." Cybercom neither
  confirmed nor denied the specific assertion. Host-nation identities
  are withheld for operational security — no specific partner country
  is named by any cited source.
false_flag_risk: none
summary: |
  Multi-country cluster of invited CNMF Hunt Forward deployments in the
  SOUTHCOM AOR. CYBERCOM's first Latin-America hunt was disclosed in
  June 2023 (Brig. Gen. Novotny), and by April 2025 Caine's Senate
  advance-policy testimony acknowledged Chinese Communist Party malware
  found on partner networks. Notable for extending the Hunt Forward
  intelligence-harvest rationale to a Chinese (not only Russian-aligned)
  threat on a new continent. US = actor (invited, defensive hunt on
  partner-chosen networks); partner governments = inviting hosts.
