notes: |
  No public operator attribution. Reuters reported Cencora paid
  USD 75M ransom per unnamed sources (https://www.reuters.com/
  technology/cybersecurity/cencora-paid-record-75-million-ransom-
  cyberattack-bloomberg-news-reports-2024-09-18/) — URL not
  verified via curl due to Reuters bot protection; title
  paraphrased. Cumulative impact built from individual state-AG
  breach notifications filed by Cencora customers Feb-May 2024.
