    09-18).
    [d] DOCTRINE_LINKS — [] confirmed correct: purely criminal extortion; no
    source suggests state-doctrinal purpose; nothing invented.
    [e] ATTRIBUTION_LEVEL — n/a (no attribution entries exist to level).
    [f] ACTOR_ID — n/a (no actor referenced). FLAG for orchestrator: no
    criminal/dark-angels actor record exists; if Kara wants the press-level
