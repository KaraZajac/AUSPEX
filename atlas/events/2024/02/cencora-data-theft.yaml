  notes: |
    Audited against 7 raw snapshots; every cited source snapshotted + hashed
    (sha256 first8…last8, bytes): SEC 8-K 49a620ea…61d8b0fb 26,918 B; SEC 8-K/A
    f483d89a…899c7bd8 30,564 B; BleepingComputer daab41c4…c46bae6e 96,649 B;
    DataBreaches.net 7e712764…434454e7 164,567 B; TechCrunch 7cfc882c…bf3b0689
    237,219 B; KrebsOnSecurity 7cb39f20…0b99eae5 69,790 B; The Block
    573c7441…c33b959b 406,657 B.
    SOURCE TRIAGE (phantom check): sole pre-audit source cencora/2024-02-27_sec-8k
    had url: null justified by a false claim that EDGAR URLs are "not stably
    preserved" — the filing is real and stable on EDGAR (CIK 1140859, accession
    0001104659-24-028288). NOT a phantom; re-pointed in place to the canonical
    EDGAR URL and snapshotted. Six real sources ADDED (the event's downstream-
    notification and ransom claims were previously carried by NO cited source).
    [a] FACTS — corrections: (1) "personal and clinical-trial data" — the 8-K
    says only data "some of which may contain personal information"; the 8-K/A
    confirms "PII ... and PHI ... most of which is maintained by a Company
    subsidiary that provides patient support services". No source says
    clinical-trial data was stolen ("clinical trial support" in BleepingComputer
    is a line-of-business descriptor of Cencora, not a stolen-data category) —
    STRIPPED, replaced with the notice-carried data types (name, address, DOB,
    diagnoses, medications, prescriptions). (2) "Between February and May 2024
    eleven ... customers filed" — the CA-AG notices were filed in May 2024
    (BleepingComputer 05-24: submitted "in the past couple of days"); window
    corrected. (3) Company enumeration was wrong: event listed Bristol Myers
    Squibb and "Tris Pharma" among the CA eleven and omitted Incyte and Endo.
    BleepingComputer's actual eleven: Novartis, Bayer, AbbVie, Regeneron,
    Genentech, Incyte, Sumitomo Pharma America, Acadia, GlaxoSmithKline, Endo,
    Dendreon. BMS is real but belongs to DataBreaches.net's multi-state tally
    (256,237 TX + 11,503 NH + 8,388 MT — the largest filer) — re-sited
    accordingly. "Tris Pharma" is carried by NO located source — REMOVED as
    unsupported. (4) "cumulative ... exceeded approximately 540,000" +
    quantified_impact 540000 — stale floor; now precise and source-carried:
    542,062 partial (DataBreaches 05-24), >1.06M/37 entities (same page,
    later update), "at least 1.43 million" notified (TechCrunch 08-02);
    individuals_affected 540000 -> 1430000 (a notified-count floor, noted).
    (5) Ransom sentence had three defects: (i) credited to "Reuters" — the
    originating outlet is Bloomberg (Reuters ran a wrap of Bloomberg's story);
    (ii) "March 2024 wire-transfer payment" — contradicted by sources: "a $75
    million ransom in three bitcoin payments last March" (The Block/Bloomberg);
    (iii) the claim was cited to nothing (unverified Reuters URL pasted in
    notes). Now carried by the snapshotted The Block mirror + independent
    Zscaler-via-Krebs corroboration ("$75 million — higher than any previously
    recorded ransom payment", from "a Fortune 50 company"). incident_type
    extortion ADDED (ransom paid). (6) "one of the three largest in North
    America after the August 2023 AmerisourceBergen rebrand" — no fetched
    source carries the top-three claim or the August date (TechCrunch: "known
    as AmerisourceBergen until 2023") — trimmed to "formerly AmerisourceBergen".
    [b] ATTRIBUTION — attributions: [] kept (established corpus convention for
    unattributed events; 21 peers incl. 2024-02/anydesk-production-intrusion).
    No company/govt/vendor-forensic attribution exists; the Dark Angels naming
    is press-level (Bloomberg per The Block; Zscaler named the payee group but
    not the victim; BleepingComputer posited the victim) and is reported in
    prose with provenance, not as an attribution entry — per tasking and the
    no-invention rule. No over-attestation possible.
    [c] DATES — start_date 2024-02-21 kept but reframed as the date Cencora
    LEARNED of exfiltration (8-K: "On February 21, 2024 ... learned that data
    from its information systems had been exfiltrated"; Date of earliest event
    reported = 2024-02-21); no source states when the intrusion began.
    disclosure_date 2024-02-27 = 8-K filing/signature date, verified.
    end_date 2024-05-31 -> null: no source bounds the operation; the old value
    conflated the notification wave with the op. Each source's published_on
