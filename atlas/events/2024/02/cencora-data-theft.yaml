id: 2024-02/cencora-data-theft
name: Cencora (AmerisourceBergen) data-theft intrusion
start_date: 2024-02-21
disclosure_date: 2024-02-27
end_date: 2024-05-31
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  Cencora (US pharmaceutical distributor, one of the three largest
  in North America after the August 2023 AmerisourceBergen
  rebrand) disclosed via SEC 8-K February 27, 2024 the
  exfiltration of personal and clinical-trial data from its IT
  environment. Between February and May 2024 eleven Cencora
  pharmaceutical-manufacturer customers (including Bayer,
  Bristol Myers Squibb, Novartis, Regeneron, AbbVie, Acadia,
  Dendreon, Genentech, GlaxoSmithKline, Sumitomo, and Tris
  Pharma) filed downstream patient-data breach notifications to
  state attorneys general. Cumulative patient-record count
  exceeded approximately 540,000 across affected
  manufacturer customers. No specific ransomware operator was
  publicly attributed.
quantified_impact:
  individuals_affected: 540000
false_flag_risk: none
summary: |
  The Cencora case is unusual in the AUSPEX criminal-baseline
  corpus because no public operator attribution was made — no
  leak-site post, no extortion claim, no SEC 8-K reference to a
  named gang. Reuters reported Cencora paid USD 75M ransom
  (March 2024 wire-transfer payment) per multiple unnamed
  sources, which would be among the largest reported single
  ransom payments on record. The unattributed pattern with
  large quiet payment fits a "private extortion" tradecraft
  cluster distinct from public leak-site RaaS — included here
  as criminal-baseline with no doctrinal targeting fit.
attributions: []
