false_flag_risk: none
summary: |
  Cencora (formerly AmerisourceBergen; US pharmaceutical
  distributor) learned on February 21, 2024 that data had been
  exfiltrated from its information systems and disclosed the
  incident via SEC Form 8-K (Item 1.05) on February 27, 2024. The
  stolen data — patient names, addresses, dates of birth, health
  diagnoses, medications and prescriptions — was maintained
  largely in connection with the patient-support programs
  Cencora's Lash Group subsidiary runs for pharmaceutical
  manufacturers. The case is an AUSPEX criminal-baseline
  quiet-extortion type specimen: no leak-site posting appeared,
  no group publicly claimed responsibility, and neither SEC
  filing names an actor or acknowledges a ransom. Zscaler
  ThreatLabz reported (July–August 2024) that a then-unnamed
  company had paid a record USD 75M ransom to the Dark Angels
  group, whose tradecraft favors single-target mass data theft
  without operational disruption; Bloomberg (2024-09-18, carried
  here via The Block's same-day mirror) identified the payer as
  Cencora — USD 75M in three Bitcoin payments in March 2024, the
  largest ransom payment publicly known at the time. AUSPEX attributes
  the event to Dark Angels at press/vendor level only (moderate,
  concur-with-caveat): the naming rests on press reporting, with no
  company, government, or vendor-forensic
  attribution on the record, and no doctrinal targeting fit.
outcome_summary: |
  Cencora's 8-K reported immediate containment steps and an
  investigation with law enforcement, cybersecurity experts and
  external counsel, with no material impact on operations. Its
  internal investigation concluded April 10, 2024 (per the
  downstream notification letters). In May 2024
  manufacturer-client breach notifications reached state
  attorneys general: eleven pharmaceutical firms (Novartis,
  Bayer, AbbVie, Regeneron, Genentech, Incyte, Sumitomo Pharma
  America, Acadia, GlaxoSmithKline, Endo, Dendreon) filed
  near-identical notices with the California AG, while
  DataBreaches.net's multi-state tally (Texas, New Hampshire,
  Montana, Massachusetts) counted 542,062 patients notified by
  May 24 across 15+ Lash Group clients (Bristol Myers Squibb
  alone accounting for 256,237 Texas residents), a partial total
  that later passed 1.06M across 37 client entities. The July 31,
  2024 8-K/A confirmed exfiltration of PII and protected health
  information, most of it held by the patient-support-services
  subsidiary; stated the incident was contained, with no evidence
  of public disclosure of the data; and assessed it as not
  material. TechCrunch's August 2, 2024 analysis of state-AG
  filings found at least 1.43 million individuals notified, with
  notifications then still ongoing and the full count expected to
  be higher.
