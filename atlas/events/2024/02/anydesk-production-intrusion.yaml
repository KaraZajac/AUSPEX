id: 2024-02/anydesk-production-intrusion
name: AnyDesk production-systems intrusion and certificate rotation
start_date: 2023-12-01  # AnyDesk forensics (via SecurityWeek 2024-02-09): first breach "late December 2023" — month-granular; day not public
disclosure_date: 2024-02-02
end_date: null  # no source bounds the op end; remediation (cert revocation, forced password resets) still rolling at last report (SecurityWeek 2024-02-09)
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  AnyDesk Software (German remote-desktop vendor, ~170,000
  customers) disclosed in a February 2 2024 public statement that
  a security audit had found evidence of compromised production
  systems. By the company's later account, the intrusion was
  discovered in mid-January 2024 and a forensic investigation
  placed the first breach in late December 2023; two relay servers
  in Europe were among the compromised systems. Remediation with
  CrowdStrike proceeded before public disclosure — including a
  four-day maintenance window from January 29 during which client
  logins were disabled — and the company revoked its
  security-related certificates, began replacing its code-signing
  certificate (the new certificate shipped in version 8.0.8 on
  January 29; the prior "philandro Software GmbH" certificate was
  slated for revocation), revoked all my.anydesk.com web-portal
  passwords, and subsequently forced a password reset for all
  customers. AnyDesk said the incident was not a ransomware attack
  and involved no extortion attempt, that a code review found no
  malicious modifications, and that it had no evidence of malicious
  code being distributed to customers or of end-user devices being
  affected. BleepingComputer reported, citing its own sources, that
  source code and private code-signing keys were stolen; AnyDesk
  did not confirm data theft. On February 3–4 2024 Resecurity
  identified threat actors — one under the handle "Jobaaaaa" —
  selling 18,317 AnyDesk customer-portal credentials on Exploit[.]in
  for $15,000; Resecurity assessed those credentials were likely
  harvested by infostealer malware on customer systems, and AnyDesk
  said the listings were not related to the incident. No public
  attribution was ever made.
false_flag_risk: none
summary: |
  AnyDesk is a widely deployed legitimate remote-access tool that
  is also popular among threat actors, who use it for persistent
  access to breached devices and networks, so the compromise of its
  production infrastructure raised supply-chain-compromise concern
  — Resecurity explicitly warned of escalation into "a more
  devastating supply-chain attack" — but the company's code review
  and subsequent reporting found no evidence that malicious signed
  binaries were distributed. AUSPEX includes the event as
  criminal-baseline: no cited source attributes the intrusion to
  any actor, group, or state, and no state-nexus claim has been
  made publicly.
