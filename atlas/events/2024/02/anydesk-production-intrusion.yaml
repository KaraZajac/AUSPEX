id: 2024-02/anydesk-production-intrusion
name: AnyDesk production-systems intrusion and certificate rotation
start_date: 2023-12-20
disclosure_date: 2024-02-02
end_date: 2024-02-29
incident_type:
  - intrusion
initial_vector: unknown
outcome_summary: |
  AnyDesk Software (Stuttgart-based remote-desktop vendor,
  ~170,000 enterprise customers) disclosed a production-systems
  intrusion in a February 2 2024 public statement after a multi-
  week silent remediation. The company rotated its code-signing
  certificates, forced password resets across its user base,
  and reported no evidence that signed binaries had been
  tampered with. Stolen AnyDesk customer credentials subsequently
  appeared for sale on cybercrime forums under the handle
  "Jobaaaaa." No specific operator was publicly attributed; the
  intrusion's tradecraft profile (code-signing certificate access,
  multi-week dwell) is consistent with high-skill criminal
  intrusion brokers rather than known state services.
false_flag_risk: none
summary: |
  AnyDesk is one of the most-abused legitimate remote-management
  tools in ransomware-affiliate tradecraft (cited in CISA
  AA24-242A RansomHub, AA23-061A Royal/BlackSuit, AA24-131A
  Black Basta advisories). The intrusion of its production
  infrastructure raised concern about supply-chain compromise
  scenarios but no malicious-signed-binary distribution was
  confirmed. AUSPEX includes this event as criminal-baseline
  because no state-nexus attribution exists and the operator
  profile fits commodity criminal credential-broker activity.
attributions: []
doctrine_links: []
targets:
  - target_id: orgs/anydesk
    role: primary
sources:
