id: 2024-02/microsoft-mtac-iran-chaotic-start-retrospective
name: Microsoft MTAC documents post-October-7 Iranian cyber acceleration and Soldiers of Solomon Nevatim hoax
start_date: 2023-10-07
disclosure_date: 2024-02-06
end_date: 2024-01-31
incident_type:
  - influence-operation
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Microsoft Threat Analysis Center (MTAC) published a
  retrospective summarising Iranian-aligned cyber-and-influence
  operations in the first ~3 months of the Israel-Hamas war. The
  report tracks the increase from 9 active Iranian threat groups
  targeting Israel during the first week of the war to 14 within
  three weeks, and a 42% increase in inbound web traffic to
  Iranian state-affiliated news sites in week one (still 28%
  elevated three weeks in). The report's load-bearing operational
  attribution names the Shahid Kaveh Group (Storm-0784) as the
  operator behind the "Soldiers of Solomon" persona's October 18
  2023 claim of having ransomed Nevatim Air Force Base — a claim
  Microsoft assessed as false (the leaked footage was from a
  town with a Nevatim street, not the airbase).
false_flag_risk: confirmed  # several false claims attested by MSFT
summary: |
  The canonical vendor-side framing of the post-October-7
  Iranian cyber posture: "reactive and chaotic" in the first
  weeks, accelerating into a stable multi-group operation by
  early 2024. Doctrinally significant because it attests the
  Shahid Kaveh Group → Soldiers of Solomon persona linkage —
  the same Iranian operational pattern (named state operator,
  hacktivist-persona front, false claim of strategic-target
  compromise) that the existing CyberAv3ngers → IRGC-IO and
  Handala → Banished Kitten / MOIS attributions describe.
  Microsoft's tracking of the group-count surge from 9 to 14 is
  a useful tempo data point for evaluating doctrine-pillar
  activation at war onset.
