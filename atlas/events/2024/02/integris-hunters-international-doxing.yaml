id: 2024-02/integris-hunters-international-doxing
name: Hunters International-linked patient-direct extortion of Integris Health patients
start_date: 2023-11-28
disclosure_date: 2023-12-24
end_date: null
incident_type:
  - data-theft
  - extortion
  - intrusion
initial_vector: unknown
outcome_summary: |
  An unauthorized party accessed the systems of Integris Health —
  Oklahoma's largest not-for-profit health network — on November 28,
  2023 and exfiltrated patient data; no files were encrypted and
  services were not interrupted. Integris posted a website notice of
  the incident on December 24, 2023, the same day patients began
  receiving extortion emails claiming theft of the personal data of
  "over 2 million patients". The emails contained accurate personal
  data and linked to a Tor extortion site — listing approximately
  4,674,000 records, not all unique and (per the threat actor) not
  all from Integris — where individuals could pay USD 50 to have
  their own record deleted or USD 3 to view a record, under threat
  that the database would be sold to data brokers on January 5, 2024.
  Integris reported the breach to HHS OCR (notification reported as
  filed January 26, 2024; the portal entry showing 2,385,646 affected
  patients became visible February 13, 2024); stolen data comprised
  names with dates of birth, contact, demographic and/or Social
  Security data, while employment, driver's-license, credential and
  financial data were not involved. The tactic repeated the
  patient-direct extortion used against Fred Hutchinson Cancer Center
  patients weeks earlier. Twenty-one class actions (ten Oklahoma
  state, eleven federal) were consolidated as Bointy et al. v.
  Integris Health; a USD 30 million settlement fund received
  preliminary court approval in October 2025.
quantified_impact:
  patients_affected: 2385646
  per_patient_demand_usd: 50
false_flag_risk: none
summary: |
  The Integris campaign is the AUSPEX type-specimen for patient-direct
  extortion as a post-RaaS monetization channel — bypassing the
  institution's ransom decision to extract payment from breach victims
  individually — deployed here weeks after the same playbook was used
  against Fred Hutchinson Cancer Center patients. No encryption was
  involved: this was data-theft-only extortion. Attribution rests on
  journalism rather than vendor or government forensics:
  BleepingComputer matched the tradecraft to Hunters International's
  Fred Hutch extortion, and the extortionists themselves told
  DataBreaches.net "we work with them" while denying being Hunters
  International — an affiliate-style hedge. The Hunters International
  cluster has Hive code lineage, but operator continuity to the
  disrupted Hive operation is contested, and the patient-extortion
  tradecraft is novel rather than Hive-derived.
attributions:
  - actor_id: criminal/hunters-international
    attributing_org: BleepingComputer / DataBreaches.net (journalism)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-12-26
    attribution_source_id: bleepingcomputer/2023-12-26_integris-health-patients-extortion-emails
    notes: |
      No vendor or government attribution exists, and Integris Health
      never publicly named a perpetrator. BleepingComputer (2023-12-26)
      hedged: "While it is not known who is behind the attack on
      Integris Health, similar emails were sent to Fred Hutchinson
      Cancer Center (Fred Hutch) patients after the Hunters
      International ransomware gang breached the hospital" — the
      identical USD-50 deletion scheme "making it likely that the same
      ransomware attack is behind the attack on Integris Health".
      DataBreaches.net (2023-12-28), in direct contact with the
      extortionists, asked "So you are Hunters International?" and was
      told "we work with them" — and later "I'm not hunters" — an
      affiliate-style hedge. Retrospective trade coverage (HIPAA
      Journal 2024 roundup) attributes the attack to Hunters
      International flatly. Caveat on concur: the naming is journalist
      tactic-matching plus the operator's own ambiguous affiliation
      statement, so the hands-on-keyboard operator may be an affiliate
      working with the Hunters International program rather than its
      core team. attribution_level = named-actor (a specific criminal
      group is named; no nation or unit — criminal/, no state nexus).
