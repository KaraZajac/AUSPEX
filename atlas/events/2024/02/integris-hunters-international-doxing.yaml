id: 2024-02/integris-hunters-international-doxing
name: Hunters International patient-extortion campaign against Integris Health victims
start_date: 2023-12-24
disclosure_date: 2024-01-04
end_date: 2024-03-30
incident_type:
  - data-theft
  - intrusion
initial_vector: unknown
outcome_summary: |
  Hunters International conducted a novel patient-direct
  extortion campaign against approximately 2 million Oklahoma
  Integris Health patients following a November 2023 ransomware
  intrusion of the regional hospital network. Beginning December
  24 2023 and continuing through early January 2024, Hunters
  International sent direct-mail and email demands for
  individual ransom payments (USD 50 per patient) under threat
  of selling personal health records on its leak site. The
  campaign was the first major US healthcare-sector deployment
  of post-encryption patient-direct extortion as a monetization
  channel.
quantified_impact:
  patients_affected: 2000000
  per_patient_demand_usd: 50
false_flag_risk: none
summary: |
  The Integris patient-direct extortion campaign is the AUSPEX
  type-specimen for emerging post-RaaS monetization tradecraft —
  bypassing institutional ransom decisions to extract payment
  directly from breach victims. Notable because the Hunters
  International cluster has Hive code lineage but operator-
  continuity to the disrupted Hive cluster is contested and
  the campaign tradecraft is novel rather than Hive-derived.
attributions:
  - actor_id: criminal/hunters-international
    attributing_org: Integris Health + Hunters International (self-claimed)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2024-01-04
    attribution_source_id: bitdefender/2023-10-20_hunters-international-hive-overlap
    notes: |
      Bitdefender report documents Hunters International / Hive
      code overlap; it does not name Integris specifically.
      attribution_source_id is the nearest primary documentation of
      Hunters International activity.
doctrine_links: []
targets:
  - target_id: sectors/healthcare/hospital
    role: primary
sources:
