  notes: |
    WRONG-SOURCE REMEDIATION (re-source path, badrabbit model). The event
    rested solely on bitdefender/2023-10-20_hunters-international-hive-overlap
    — the real Bitdefender group-discovery article ("Hive Ransomware's
    Offspring: Hunters International Takes the Stage", 2023-11-09, sha256
    7936583a…544b44c9, 117,809 bytes, hash re-verified on disk this audit) —
    which NEVER mentions Integris (event's own attribution note admitted
    this). Five real sources were created, fetched live (all HTTP 200),
    snapshotted and hashed; the Bitdefender record is retained LAST in
    sources[] strictly as Hunters International group-profile context (Hive
    code lineage / contested continuity sentences in summary). Sources:
      S1 bleepingcomputer/2023-12-26_integris-health-patients-extortion-emails
         (Lawrence Abrams), sha256 9ca8a658…61f4752d, 89,461 bytes.
      S2 bleepingcomputer/2024-02-13_integris-health-breach-2-4-million
         (Bill Toulas), sha256 0f86a179…156d196f, 89,682 bytes.
      S3 databreaches/2023-12-28_fred-hutch-integris-patient-extortion-new-normal,
         sha256 6fbb8b6c…5e13c46b, 162,067 bytes.
      S4 databreaches/2024-02-16_integris-update-incident-response-criticized,
         sha256 3c9a151e…deea50a2, 162,576 bytes.
      S5 hipaajournal/2025-10-14_integris-30m-settlement (running page,
         dated updates back to 2023-12-27), sha256 115f3cf1…e0168958,
         396,746 bytes.
      S6 bitdefender/… (context only, above).
    The Integris Health website notice itself (integrisok.com/landing/
    cyber-event) is LINK-ROTTED — it now serves a generic hospitals page
    (HTTP 200) and the FAQ PDF 404s; archive.org is blocked for this
    fetcher. Not added as a source; its operative text is quoted verbatim
    inside S1 and S5, so every notice-derived claim is carried by
    snapshotted sources (level stays full).

    [a] FACTS — corrections against the raw sources:
      * "ransomware intrusion" / "post-encryption patient-direct extortion"
        REMOVED — no encryption occurred: S2 "The threat actor told
        BleepingComputer that their attack did not involve encryption and
        they only stole the data"; S3 "The incident did not involve
        encryption"; S5 "did not encrypt files". incident_type: dropped
        nothing but ADDED extortion (data-theft, extortion, intrusion);
        deliberately NOT ransomware.
      * "first major US healthcare-sector deployment" REMOVED — contradicted
        by S1 itself: the same USD-50 scheme was used on Fred Hutchinson
        Cancer Center patients weeks earlier ("similar emails were sent to
        Fred Hutchinson Cancer Center (Fred Hutch) patients…"). Reframed as
        repetition of the Fred Hutch playbook.
      * "approximately 2 million … patients [received] demands" CORRECTED —
        the 2M figure is the TA's claim about stolen data ("the personal
        data of over 2 million patients", S1), not a count of email
        recipients; official affected count is 2,385,646 (S2 OCR portal;
        S4 HHS notification). quantified_impact.patients_affected
        2000000 -> 2385646.
      * "direct-mail and email demands" CORRECTED to email only — no source
        documents postal demands from the TA (the Jan-5 letters patients
        received were Integris' own notifications, S4/NonDoc).
      * USD 50 demand CARRIED (S1 "pay $50 to delete the data record or $3
        to view it"; S5 "demanding $50 per patient to delete their stolen
        data"); Jan-5-2024 sale deadline CARRIED (S1 verbatim extortion
        email); Tor-site ~4,674,000 records ADDED with S4's nuance that the
        TA said records were "not just from INTEGRIS".
      * ADDED source-carried aftermath: 21 consolidated class actions
        (Bointy et al.), USD 30M settlement preliminarily approved Oct 2025
        (S5). Tech Mahindra (business-associate blame, later dismissed from
        litigation) left OUT of the record as legal allegation, not
        established fact; initial_vector stays unknown.
    [b] ATTRIBUTION — attributing_org was "Integris Health + Hunters
        International (self-claimed)": WRONG on both limbs. Integris never
        named an actor (S1/S5 quote its notices — no perpetrator named), and
        no clean self-claim exists: the extortionists told S3 "we work with
        them" but "I'm not hunters". Fixed to journalism attribution
        (BleepingComputer tactic-match "likely", 2023-12-26 + DataBreaches
        TA contact). attribution_source_id repointed bitdefender/… -> S1.
        attribution_date 2024-01-04 -> 2023-12-26 (first dated public
        naming). Confidence kept moderate (hedged "likely" + affiliate
        ambiguity). auspex_assessment concur -> concur-with-caveat, caveat
        stated (possible affiliate rather than core group). actor_id kept
        criminal/hunters-international — the corpus models the campaign
        under the program the operator claims to work with; nuance recorded.
    [c] DATES — start_date 2023-12-24 -> 2023-11-28 (op start = unauthorized
        access date: S1 quoting Integris notice "accessed by an unauthorized
        party on November 28, 2023"; S5 "gained access … on November 28,
        2023"; the TA's own "11/11" claim in S3 is unconfirmed and NOT
        used). disclosure_date 2024-01-04 -> 2023-12-24 (S5: "uploaded a
        notice to its website on December 24, 2023"; extortion emails began
        the same day, S1). end_date 2024-03-30 -> null — the March date was
        carried by NO source; no bounded end is documented (S2, Feb 13: the
        Jan-5 deadline "has long passed"). Event id retains the 2024-02/
        month + "doxing" slug per the stable-slug rule (the Feb-2024 OCR
        disclosure milestone matches the id month; "doxing" is a legacy
        misnomer for patient-direct extortion). All five source
        published_on values verified against page metadata (2023-12-26,
        2024-02-13, 2023-12-28, 2024-02-16, 2025-10-14). S5 contains two
        internal year typos (flagged in its record notes) — not inherited.
    [d] DOCTRINE_LINKS — [] retained, correct: financially-motivated
        criminal actor, no source-documented state nexus, no doctrine
        genuinely applies; nothing invented, no attesting_source_id needed.
    [e] ATTRIBUTION_LEVEL — ADDED named-actor (was absent): sources name a
        specific criminal group (Hunters International), no nation or unit.
    [f] ACTOR_ID — criminal/hunters-international resolves to
        atlas/actors/criminal/hunters-international.yaml; placement under
        criminal/ (no state nexus) consistent with all sources. Targets:
        ADDED orgs/integris-health (registry record existed but was cited by
        zero events) alongside sectors/healthcare/hospital, both country: us
        (was missing).

    RESIDUAL UNCERTAINTIES: (1) whether the operator was Hunters
    International core or an affiliate ("we work with them" / "I'm not
    hunters") — recorded as the attribution caveat; (2) HHS-notification
    date Jan 26 (S4) vs OCR-portal visibility Feb 13 (S2) — both stated;
    (3) TA's claimed 11/11 access date unconfirmed (S3).
