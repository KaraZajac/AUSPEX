    attribution_date: 2024-02-21
    attribution_source_id: sentinellabs/2024-02-21_isoon-leak
    notes: |
      i-Soon is the leaked entity (a contractor), not the actor
      cluster per se. AUSPEX maps to APT41 as the closest actor
      entity given the documented operational relationship, but
      i-Soon also serviced MPS and PLA tasking and supported
      multiple downstream APT clusters.
