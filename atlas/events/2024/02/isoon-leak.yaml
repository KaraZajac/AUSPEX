id: 2024-02/isoon-leak
name: i-Soon (Anxun) contractor document leak
start_date: 2024-02-16  # GitHub leak surfaced
disclosure_date: 2024-02-21  # SentinelLabs analysis
end_date: 2024-02-21
incident_type:
  - data-theft  # leak of contractor's own documents
  - influence-operation  # disclosure context — anonymous leaker
initial_vector: insider
outcome_summary: |
  Anonymous GitHub leak of internal documents from Anxun
  Information Technology Co., Ltd. ("i-Soon"), a Chengdu-based
  PRC cyber-contractor servicing MSS, MPS, and PLA tasking.
  Approximately 500+ files comprising customer lists, marketing
  decks, employee chats, contracts, and target lists provided
  the first systematic open-source view into the PRC's
  hacker-for-hire ecosystem. Documents tied i-Soon to APT41 /
  POISON CARP operations, Hong Kong democracy-movement
  targeting, and provincial MSS-bureau contracting.
false_flag_risk: none
summary: |
  Doctrinally inflection-point event for AUSPEX modeling of the
  PRC cyber-services market. i-Soon documents validated the
  contractor-bureau model that subsequent OFAC actions
  (Sichuan Juxinhe / Salt Typhoon, Integrity Tech / Flax
  Typhoon, Wuhan XRZ / APT31) would prosecute through sanctions
  in 2024-2025. Not an offensive cyber operation by the PRC —
  this is a disclosure event, modeled here because the doctrine
  link is to the National Intelligence Law's compelled-vendor-
  cooperation pillar, which i-Soon documents directly evidence.
attributions:
  - actor_id: cn/mss/apt41  # i-Soon was an APT41-adjacent contractor per docs
    attributing_org: SentinelLabs
    attributing_org_confidence: high
