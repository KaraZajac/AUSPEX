id: 2024-02/lockbit-cronos
name: Operation Cronos — LockBit ransomware infrastructure takedown
start_date: 2024-02-19  # takedown onset — NCA: infra "seized ... over the last 12 hours" as of the 20 Feb morning announcement
disclosure_date: 2024-02-20  # DOJ / NCA / Europol coordinated announcement
end_date: 2024-12-31  # campaign bracket for 2024 follow-on actions (not snapshot-pinned; see qc)
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown  # covert infiltration + court-ordered server seizure (LE method, not an attack vector)
outcome_summary: |
  Significant operational disruption to LockBit (the most active
  ransomware-as-a-service operator at the time). Covert infiltration of
  LockBit's network, seizure of its primary administration environment,
  public-facing leak site and 28 affiliate servers, capture of the
  platform source code, and release of 1,000+ decryption keys to
  victims. LockBit later partially reconstituted; follow-on enforcement
  through 2024 (NCA/DOJ Evil Corp / Ryzhenkov actions) continued the
  campaign — that tail is referenced via a cumulative DOJ source and is
  not snapshot-pinned in this record.
false_flag_risk: none
campaign_id: lockbit-cronos
summary: |
  NCA-led multilateral law-enforcement takedown of LockBit, announced
  20 February 2024. Operation Cronos was conducted by the UK National
  Crime Agency working with the FBI and an eleven-country coalition
  (UK, US, France, Germany, Switzerland, Japan, Australia, Sweden,
  Canada, Netherlands, Finland) plus Europol and Eurojust. The canonical
  NCS-2023 Pillar 2 (Disrupt and Dismantle) ransomware-disruption case.
  This is a COUNTER-ACTION: LockBit is the subject/target of the
  operation, not the perpetrator, so actor_id is null. Same-day companion
  actions included a District of New Jersey indictment of two Russian
  nationals and an OFAC designation (tracked separately).
