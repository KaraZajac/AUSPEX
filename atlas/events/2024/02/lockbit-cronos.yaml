id: 2024-02/lockbit-cronos
name: Operation Cronos — LockBit ransomware infrastructure takedown
start_date: 2024-02-19
disclosure_date: 2024-02-20  # DOJ / NCA announcement
end_date: 2024-12-31  # ongoing 2024-2025 follow-up operations
incident_type:
  - disruption
initial_vector: n/a  # undercover infiltration, server seizure, court orders
outcome_summary: |
  Significant operational disruption to LockBit (the most active
  ransomware-as-a-service operator at the time). Server seizure,
  decryption-key release, undercover infiltration. LockBit later
  partially reconstituted; follow-on operations through 2024–25
  (DOJ Oct 8, 2024 press release continued the campaign).
false_flag_risk: none
campaign_id: lockbit-cronos
summary: |
  Joint FBI + Europol + NCA (UK National Crime Agency) operation
  announced February 20, 2024. The canonical Five-Eyes-plus-Europol
  ransomware-disruption case under NCS 2023 Pillar 2. AUSPEX
  attribution: FBI-led (the FBI is not represented as an actor entity
  in v0; CNMF placeholder is closest US-actor mapping but
  understates the multilateral character — operationally a
  Disrupt-and-Dismantle event with FBI / NCA / Europol jointly).
