  notes: |
    Audited vs CSIS "South Korea's 2024 Cyber Strategy: A Primer" (raw captured, sha256
    f776b305...0142f). POLICY FACTS confirmed: ROK National Cybersecurity Strategy released Feb 2024;
    explicit defensive(2019)->offensive shift ("respond offensively to North Korea and other threats");
    North Korea named the biggest threat; CSIS itself frames the shift as mirroring US "defend forward"
    (2018 DoD Cyber Strategy). actor_id null is correct — a doctrine-publication, no operation/perpetrator;
    attributing_org csis at high confidence is reporting-of-a-published-fact, not a threat attribution.
    incident_type [doctrine-publication, policy] fits the meta vocab. doctrine_links [] retained: the
    corpus has no kr/ncss-2024 doctrine and kr/ncss-2019 is not formally superseded (per its own record);
    a self-referential attacker-rationale link would be wrong for a policy-publication event.
    CORRECTIONS: (1) source published_on 2024-02-01 -> 2024-08-02 (Feb-2024 was the strategy's release
    date, not the article's; CSIS primer bylined "Published August 2, 2024", metadata "date_published":
    "Aug 2, 2024"). (2) Summary opener "The Office of the President released..." was NOT supported by the
    cited source (which says "ROK"/"Yoon Suk Yeol administration"); reworded to the administration and
    grounded with a verbatim quote; attribution comment annotated to mark the NSO issuer as a corpus
    inference (from kr/ncss-2019), not a claim of this source. start_date/attribution_date 2024-02-01
    (strategy release) unchanged and correct.
