id: 2024-02/south-korea-publishes-2024-national-cybersecurity-strategy-adopting-an
name: "South Korea publishes 2024 National Cybersecurity Strategy adopting an offensive posture toward North Korea"
start_date: 2024-02-01
incident_type:
  - doctrine-publication
  - policy
false_flag_risk: none
summary: |
  The Republic of Korea (Yoon Suk Yeol administration) released its National Cybersecurity Strategy in February 2024, explicitly shifting from the 2019 defensive posture to an offensive response paradigm — the document states ROK "must change our paradigm to respond offensively to North Korea and other threats" — and naming North Korea as the biggest threat, a shift CSIS describes as mirroring the US 'defend forward' concept (introduced in the 2018 DoD Cyber Strategy). A doctrine-publication milestone for the thinnest state in the corpus (KR, 6 events) and a candidate successor/update to the kr/ncss-2019 doctrine. Meta/announcement (lower priority) but doctrinally load-bearing.
attributions:
  # The cited CSIS primer attributes the strategy to "the Republic of Korea (ROK)" / "the Yoon Suk
  # Yeol administration"; it does NOT name the Office of the President / National Security Office as
  # issuer (that body is the issuer of the 2019 NCSS per the kr/ncss-2019 doctrine record, a corpus
  # inference, not stated by this source). The issuing body is a policy/strategy-publishing body, NOT
  # a threat actor. The mis-modeled actor record (kr/.../national-security-office) was RETIRED
  # 2026-06-24 (Kara's decision; it was a backfill artifact, absent from MISP-galaxy). This is a
  # doctrine-publication, not an attributed operation, so it carries no threat-actor (actor_id: null).
  - actor_id: null
    attributing_org: "csis"
    attributing_org_confidence: high   # CSIS reporting of the published strategy (a fact, not a threat attribution)
    auspex_assessment: concur
    attribution_date: 2024-02-01
    attribution_source_id: csis/2024-02_south-korea-publishes-2024-national-cybe
doctrine_links: [] # TODO(QC): suggested doctrine fit kr/ncss-2019 (no kr/ncss-2024 doctrine exists yet; 2019 not formally superseded)
