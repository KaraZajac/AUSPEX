id: 2024-02/south-korea-publishes-2024-national-cybersecurity-strategy-adopting-an
name: "South Korea publishes 2024 National Cybersecurity Strategy adopting an offensive posture toward North Korea"
start_date: 2024-02-01
incident_type:
  - doctrine-publication
  - policy
false_flag_risk: none
summary: |
  The Office of the President released South Korea's National Cybersecurity Strategy in February 2024, explicitly shifting from the 2019 defensive posture to a 'proactive/offensive' response paradigm and naming North Korea as the primary threat, mirroring the US 'defend forward' concept. A doctrine-publication milestone for the thinnest state in the corpus (KR, 6 events) and a candidate successor/update to the kr/ncss-2019 doctrine. Meta/announcement (lower priority) but doctrinally load-bearing.
