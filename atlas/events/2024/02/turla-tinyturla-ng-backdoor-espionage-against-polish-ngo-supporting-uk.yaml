summary: |
  Cisco Talos (Feb 2024) attributed a new 'last-chance' backdoor TinyTurla-NG and the TurlaPower-NG PowerShell exfiltrators to the Russian cyber-espionage group Turla, used against a Polish NGO working to improve Polish democracy and support Ukraine during the Russian invasion. Earliest compromise 18 Dec 2023, active through 27 Jan 2024; C2 via compromised WordPress sites. Turla is currently a singleton in the corpus (only Moonlight Maze); a second well-sourced event makes it LOO-rankable. Maps to ru/gerasimov-framework / ru/sanctions-response-2022 (monitoring Western aid to Ukraine).
