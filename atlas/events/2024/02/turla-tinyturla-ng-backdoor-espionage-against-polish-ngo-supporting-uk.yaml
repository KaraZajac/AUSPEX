id: 2024-02/turla-tinyturla-ng-backdoor-espionage-against-polish-ngo-supporting-uk
name: "Turla TinyTurla-NG backdoor espionage against Polish NGO supporting Ukraine"
start_date: 2023-12-18
incident_type:
  - espionage
  - intrusion
  - data-theft
false_flag_risk: none
summary: |
  Cisco Talos (Feb 2024) attributed a new "last chance" backdoor TinyTurla-NG and the TurlaPower-NG PowerShell exfiltrators to the Russian cyber-espionage group Turla, used against a Polish NGO working on improving Polish democracy and supporting Ukraine during the Russian invasion. Earliest compromise 18 Dec 2023, active through 27 Jan 2024 (Talos assesses the campaign may have begun as early as Nov 2023 on malware compilation dates); C2 via compromised WordPress sites. NB Talos names only "Turla" / "a Russian cyber espionage threat group" — it does NOT name the FSB; the FSB/Center 16 attribution rests on other sources (US DOJ/CISA, Operation MEDUSA, May 2023) carried in the actor record. Turla was a near-singleton in the corpus (Moonlight Maze); this second well-sourced event makes it LOO-rankable. Maps to ru/sanctions-response-2022 (monitoring Western aid to Ukraine).
