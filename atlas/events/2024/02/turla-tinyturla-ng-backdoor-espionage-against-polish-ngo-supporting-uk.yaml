  notes: "Audited vs Cisco Talos 'TinyTurla Next Generation' (raw captured, sha256 in source). Facts confirmed verbatim: TinyTurla-NG + TurlaPower-NG exfiltrators, 'last chance' backdoor, Polish NGO 'working on improving Polish democracy and supporting Ukraine during the Russian invasion', compromised-WordPress C2, earliest compromise Dec 18 2023, active through Jan 27 2024 (Talos notes possible Nov 2023 start on compilation dates). ATTRIBUTION: Talos names only 'Turla'/'a Russian cyber espionage threat group' with high confidence — it does NOT name the FSB or Center 16 (zero 'FSB' hits in raw); attribution_level set to named-actor (not named-unit). actor_id ru/fsb/center-16/turla is FSB-attributed via DOJ/CISA May-2023 sources carried in the actor record, not this citation — that is fine (the actor truth stands; this source just doesn't reach the unit). CORRECTIONS: start_date 2024-02-21 (publication date, wrong) → 2023-12-18 (earliest compromise = op start per schema); attribution_date/source published_on corrected to actual published_time 2024-02-15 (2024-02-21 was article:modified_time); attributing_org slug 'blogtalosintelligence' → 'Cisco Talos'; doctrine link upgraded strongly_inferred → attested with attesting_source_id + source_quote (Talos states the aid-monitoring strategic purpose in substance: 'monitor such NGOs to keep track of ongoing and potentially new aid packages ... to support Russia's strategic and political goals'); dropped the unsupported ru/gerasimov-framework mention from the summary (no doctrine link to it). Minor wording aligned to source ('last chance' unhyphenated; 'working on improving')."
