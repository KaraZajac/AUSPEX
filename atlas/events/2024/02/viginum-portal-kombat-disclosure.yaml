  notes: |
    Audited vs the VIGINUM / SGDSN primary report (fully snapshotted).
    The cited URL is the genuine SGDSN publication page (NOT a phantom):
    landing page sgdsn__2024-02-12_portal-kombat.html (sha256
    eaee1eb1…8a7a6449, 41797 B), whose body carries the core claim and
    links the report bodies, both captured: English official VIGINUM
    translation sgdsn__2024-02-12_portal-kombat_ENG.pdf (sha256
    ee9077f4…6309d52a, 1,995,896 B, 17 pp — the audit text) and French
    original sgdsn__2024-02-12_portal-kombat_FR.pdf (sha256
    cee8cb58…e0234d24, 1,998,383 B). Re-fetched live 2026-07-04.

    [a] FACTS — corrected against the raw report:
    • "approximately 193" → "at least 193". Report SUMMARY: "a network
      of at least 193 sites"; ARCHITECTURE: "a network of 193
      'information portals' … grouped into three distinct ecosystems".
      Composition verified and now stated: 5 "pravda" sites
      (pravda-fr/de/pl/es/en, "these five websites") + 41 "-news.ru"
      sites ("a total of 41 sites of interest containing the string
      'ZOV'") + 147 "historical" sites ("identified 147 new information
      portals … creation dates ranging from 2013 to 2023") = 193.
    • REMOVED the fabricated "in 11 languages". The Feb-2024 report never
      states an 11-language (or 11-country) figure — grep of both the EN
      and FR PDFs returns ZERO "languages"/"langues"/"11" hits beyond
      footnote markers and 2013-05-11 domain-registration dates. The
      pravda ecosystem targets 5 Western languages (FR/DE/PL/ES/EN); the
      other two ecosystems are Russian/Ukrainian. The "11" was
      unsupported (likely conflated with later Pravda-network reporting).
    • quantified_impact.countries_affected 11 → 8. The report gives no
      aggregate count; 8 = the Western countries VIGINUM explicitly names
      as pravda targets (France; Germany, Austria, Switzerland; Poland;
      Spain; UK, US). Enumerated on the field (mirrors the RRN-sibling
      countries_affected enumeration convention).
    • Targeting, aggregation model, source types (Telegram / TASS-RIA-
      Izvestia / local institutions), SEO + automation, and VIGINUM's
      "constitutes foreign digital interference" conclusion — all
      verbatim-supported (EN report SUMMARY / MAIN OPERATING PROCEDURES /
      TARGETED AUDIENCES / closing ***).

    [c] DATES — start_date 2022-09-01 → 2022-02-01. The prior comment
      ("earliest pravda-network domains tracked by VIGINUM") was FALSE:
      the earliest tracked domain is 2013-03-07 (historical) and the
      earliest pravda domain is pravda-de 2023-02-22; nothing anchors
      2022-09-01. Re-anchored to the operation's inception the report
      itself names — the network is called "Portal Kombat" "in reference
      to the offensive information strategy put in place from February
      2022". disclosure_date 2024-02-12 ✓ (report published 12 Feb 2024);
      end_date 2024-02-12 kept as the disclosure point (network remained
      active). Source published_on 2024-02-12 ✓.

    [b] ATTRIBUTION — added attribution_level: nation (missing). VIGINUM's
      attribution is nation-level and measured — EN: "suggests the
      involvement of a Russian or at least Russian-speaking actor within
      this network"; FR l.328: "d'origine russe ou a minima russophone";
      it names NO operator/company/state organ. attributing_org_confidence
      kept high (pro-Russian FIMI characterisation is definitive: Russian
      hosting 178.21.15[.]85/AS49352 Reg.ru, Russian state-media relay,
      FSB promotion, "constitutes foreign digital interference") but the
      operator-identity hedge is documented. actor_id kept NULL: the
      Portal Kombat report does NOT name Social Design Agency / Structura
      / TigR / Gambashidze (0 hits in EN and FR) — so ru/proxies/social-
      design-agency was deliberately NOT attached (it is the Doppelganger
      operator, a distinct entity). REMOVED the prior notes' unsupported
      claim that the operator was identified as "TigR, Structura" — not
      carried by this source and factually conflated with Doppelganger.

    [d] DOCTRINE_LINKS — ADDED ru/info-security-2016/info-psychological-
      defense (strongly_inferred, attacker-rationale): this was a RUSSIAN
      influence op carrying ZERO Russian doctrinal linkage (null actor +
      only French doctrine), so it did not register as attacker-ru at all.
      Matches the corpus convention for Western-disclosed Russian info ops
      — same pillar + confidence as the sibling viginum-rrn-doppelganger-
      attribution and mandiant-gru-telegram-personas-disclosure /
      romanian-presidential-election-interference. inference_basis.signals
      quote VIGINUM's stated purpose; ruled_out = financial/criminal
      motive (monetization-free) + the doctrine-not-named caveat. The two
      French LII links (strategic-attribution + counter-disinformation)
      kept attested (primary govt source; attesting_source_id set; the
      pillar summary names VIGINUM attributions "through 2024-2025" as
      canonical) and TAGGED perspective: defender-response (France's own
      characterisation doctrine on an event documenting France
      characterising a Russian op) — resolving the cross-state mismatch.
      Added verbatim inference_basis.source_quote to both (EN closing ***
      / ABOUT VIGINUM).

    [e] ATTRIBUTION_LEVEL — added: nation (VIGINUM names Russia/Russian-
      speaking, no group).

    [f] ACTOR_ID — null (nation-level; no operator named). FLAG: the
      later-identified "Pravda network" operator (open-source reporting
      names a Crimea-based web firm / individual, NOT SDA-Structura) has
      no actor record; if Kara wants a real attacker on this event a
      dedicated ru/ operator cluster would be needed. ru/proxies/social-
