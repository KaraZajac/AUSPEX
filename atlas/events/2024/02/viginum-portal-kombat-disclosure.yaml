    pillar_id: ru/info-security-2016/info-psychological-defense
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Portal Kombat is an external information-psychological
      operation: a coordinated portal network laundering pro-Kremlin
      narratives — praising "the special military operation",
      denigrating Ukraine and its leaders, and polarising Western
      (especially Francophone) public debate — into search and
      social-feed surface area across five Western languages. This
      is precisely the external influence apparatus the 2016
      Information Security Doctrine's info-psychological pillar
      underwrites. VIGINUM states the operation's propaganda purpose
      in substance; the mapping to Russia's specific doctrine is an
      AUSPEX inference with no serious competitor. Strongly_inferred
      rather than attested because VIGINUM names the behaviour and
      objective but does not invoke the 2016 doctrine.
      (attacker-rationale — Russia's own doctrine for why it ran the op.)
