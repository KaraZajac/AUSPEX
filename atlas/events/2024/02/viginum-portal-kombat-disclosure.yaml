id: 2024-02/viginum-portal-kombat-disclosure
name: VIGINUM / SGDSN discloses Portal Kombat pro-Russia portal network
start_date: 2022-09-01  # earliest pravda-network domains tracked by VIGINUM
disclosure_date: 2024-02-12
end_date: 2024-02-12
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM report dated 12 February 2024 disclosing the Portal
  Kombat network — a coordinated set of approximately 193
  pro-Russia "portal" sites (pravda-prefixed and analogous
  domains) that aggregate and re-syndicate Russian-state-aligned
  narratives in 11 languages targeting French, German, Polish,
  Spanish, and English-language audiences alongside Russian-
  occupied Ukrainian territories.
quantified_impact:
  countries_affected: 11
false_flag_risk: none
operators_named: []
summary: |
  Editorially the highest-tempo VIGINUM attribution to that date
  and a canonical LII strategic-attribution publication. Where
  the June 2023 RRN / Doppelganger report mapped clone-news-site
  impersonation, Portal Kombat maps the aggregator-layer
  amplification infrastructure: portals that do not impersonate
  legitimate outlets but rather laundered Russian-state framing
  into search and social-feed surface area in target languages.
  Editorially significant as a multi-language counter-FIMI
  exercise rather than a France-only attribution.
