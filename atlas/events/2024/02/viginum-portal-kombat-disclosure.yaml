id: 2024-02/viginum-portal-kombat-disclosure
name: VIGINUM / SGDSN discloses Portal Kombat pro-Russia portal network
start_date: 2022-02-01  # VIGINUM names the network "Portal Kombat" after "the offensive information strategy put in place from February 2022"; the "-news.ru" ecosystem was built in waves from 3 Apr 2022 and the underlying infrastructure dates to 2013 (147-site "historical" ecosystem), but the post-invasion offensive pivot (Feb 2022) is the operation's inception per the report
disclosure_date: 2024-02-12
end_date: 2024-02-12
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM (SGDSN) technical report dated 12 February 2024
  disclosing the "Portal Kombat" network — a coordinated set of
  at least 193 pro-Russia "information portal" websites belonging
  to one digital infrastructure and grouping into three
  ecosystems: the recent "pravda" ecosystem (five sites —
  pravda-fr/de/pl/es/en — targeting France; Germany, Austria and
  Switzerland; Poland; Spain; and the UK and US), the "-news.ru"
  ecosystem (41 sites created in waves from April 2022 targeting
  Russian-speaking audiences in occupied and border Ukraine), and
  a "historical" ecosystem (147 sites dating to 2013 targeting
  Russian and Ukrainian localities). The sites produce no original
  content but massively relay and re-syndicate pro-Kremlin
  material from three source types — Russian / pro-Russian
  social-media accounts (chiefly Telegram), Russian news agencies
  (TASS, RIA Novosti, Izvestia) and official local-institution
  sites — amplified by heavy automation and search-engine
  optimisation. VIGINUM concludes the network "constitutes foreign
  digital interference".
quantified_impact:
  countries_affected: 8  # Western countries VIGINUM explicitly names as pravda-ecosystem targets: France; Germany, Austria, Switzerland; Poland; Spain; UK, US. No aggregate country/language count is stated in the report; the "-news.ru" and "historical" ecosystems additionally target Russian-speaking audiences in Russia and occupied Ukraine (not counted — no figure given). Corrected from the unsupported "11".
false_flag_risk: none
operators_named: []
summary: |
  A canonical VIGINUM / LII strategic-attribution publication.
  Where
  the June 2023 RRN / Doppelganger report mapped clone-news-site
  impersonation, Portal Kombat maps the aggregator-layer
  amplification infrastructure: portals that do not impersonate
  legitimate outlets but rather laundered Russian-state framing
  into search and social-feed surface area in target languages.
  Editorially significant as a multi-language counter-FIMI
  exercise rather than a France-only attribution.
attributions:
  - actor_id: null
    service_id: null
    attributing_org: France — VIGINUM / SGDSN
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2024-02-12
    attribution_source_id: sgdsn/2024-02-12_portal-kombat
    notes: |
      VIGINUM attributes the network at nation level and in
      measured terms: it "suggests the involvement of a Russian or
      at least Russian-speaking actor within this network" (FR:
      "d'origine russe ou a minima russophone") and concludes the
      network "constitutes foreign digital interference", but names
      NO specific operator, company or Russian state organ. Grounds
      for the Russia nexus: Russian hosting (IP 178.21.15[.]85 /
      AS49352, Reg.ru), wholesale relay of Russian state media
      (TASS, RIA Novosti, Izvestia), pro-Kremlin narratives praising
      "the special military operation" and content "regularly
      promoting Russian security services, particularly the FSB".
      actor_id left null — no operator is named in this source; the
      later open-source "Pravda network" operator identification is
      NOT carried by this VIGINUM report (and is a distinct entity
      from the Doppelganger operator SDA / Structura). Corpus
      convention for a nation-level RU influence op with no operator
      named: null actor + ru/info-security-2016 attacker-rationale
      doctrine link (cf. the sibling viginum-rrn-doppelganger-
      attribution, which carried a null actor until Meta's in-report
      naming of Social Design Agency).
