id: 2024-02/change-healthcare-alphv
name: ALPHV ransomware against Change Healthcare / UnitedHealth
start_date: 2024-02-12  # initial Citrix-portal access (op onset); ransomware deployed nine days later on 2024-02-21
disclosure_date: 2024-02-22  # UnitedHealth 8-K identifying a cyber threat actor (status-page outage notice 2024-02-21)
end_date: 2024-04-30  # approximate close of the primary outage/recovery window; not a precisely sourced event date (see qc[c])
incident_type:
  - ransomware
