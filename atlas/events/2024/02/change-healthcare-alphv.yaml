  - data-theft
  - disruption
initial_vector: valid-creds
outcome_summary: |
  ALPHV/BlackCat affiliate intrusion of Change Healthcare (the
  UnitedHealth/Optum claims-clearinghouse that processes health
  insurance and billing claims for around half of all US residents).
  Initial access on Feb 12 2024 via compromised credentials on a
  Change Healthcare Citrix remote-access portal that lacked
  multi-factor authentication; the affiliate moved laterally and
  exfiltrated data, and ALPHV deployed ransomware nine days later, on
  Feb 21, forcing UnitedHealth to sever connectivity and triggering a
  US-wide outage of prescription-claim, medical-claim and payment
  systems. The acute prescription-claim outage ran ~2+ weeks (99% of
  pharmacies processing again by Mar 7 per Witty), with medical-claims
  and payment restoration extending over the following ~2 months;
  small and rural providers went weeks without reimbursement
  ("struggling to make payroll"). UnitedHealth paid an approximately
  USD 22M Bitcoin ransom (a single on-chain transaction on Mar 1). The
  ALPHV operator then exit-scammed the affiliate ("Notchy"), keeping
  the full payment; the affiliate retained ~4TB of stolen data, which
  was re-posted for a second extortion via RansomHub in April 2024
  (tracked separately at 2024-04/change-healthcare-ransomhub-repost).
  CEO Andrew Witty testified before the House E&C Oversight
  subcommittee on May 1 2024 that the stolen files "could cover a
  substantial proportion of people in America"; UnitedHealth
  subsequently confirmed the breach exposed ~100M individuals
  (Oct 2024 — then the largest US healthcare data breach on record)
  and revised the total to ~190M (Jan 2025).
quantified_impact:
  individuals_affected: 190000000  # UnitedHealth final confirmed count (Jan 2025); ~100M first confirmed Oct 2024 (then largest-ever); Witty testimony said only "a substantial proportion of people in America" — see qc[a]
  ransom_paid_usd: 22000000  # single on-chain BTC tx, Mar 1 2024 (Krebs); the decision to pay was Witty's per his testimony
  ransom_recovered_usd: 0  # not recovered; ALPHV operator exit-scammed its own affiliate
  disclosed_impact_usd: 3100000000  # final FY2024 cost per UnitedHealth Q4/FY2024 results (Jan 2025); Q3-2024 full-year estimate was ~$2.87B, ~$2.5B booked through 9 months
false_flag_risk: none
campaign_id: change-healthcare-alphv-ransomhub
summary: |
  Largest US healthcare data breach on record by individuals affected.
  A single stolen Citrix credential on an internet-facing portal
  without MFA cascaded into a national healthcare-payment outage and a
  ~USD 22M ransom. The ALPHV operator's exit scam — pocketing the full
  payment and abandoning the affiliate — ended ALPHV/BlackCat's
  operational viability (the crew ceased operations in March 2024) and
  pushed its affiliates onto successor RaaS brands, notably RansomHub,
  which the abandoned affiliate used to re-extort the same stolen trove
  (2024-04/change-healthcare-ransomhub-repost).
