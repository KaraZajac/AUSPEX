id: 2024-02/change-healthcare-alphv
name: ALPHV ransomware against Change Healthcare / UnitedHealth
start_date: 2024-02-21
disclosure_date: 2024-02-22
end_date: 2024-04-30
incident_type:
  - ransomware
  - data-theft
  - disruption
initial_vector: valid-creds
outcome_summary: |
  ALPHV affiliate intrusion of Change Healthcare (UnitedHealth
  subsidiary processing ~50% of US healthcare claims). Multi-month
  outage of US-wide prescription-claim and clinical-billing systems;
  small / mid-sized US healthcare providers reportedly went weeks
  without revenue. UnitedHealth paid approximately USD 22M ransom
  in Bitcoin (Mar 1, on-chain visible). ALPHV operator exit-scammed
  the affiliate ("Notchy") who kept ~4TB of stolen data; the data
  was subsequently re-posted via RansomHub in April 2024. CEO
  Andrew Witty testified before Congress May 1 2024 confirming
  the breach affected approximately one-third of all Americans
  (~110M individuals).
quantified_impact:
  individuals_affected: 110000000
  ransom_paid_usd: 22000000
  ransom_recovered_usd: 0  # not recovered; exit-scammed by ALPHV operator
  disclosed_impact_usd: 2870000000  # UnitedHealth Q3 2024 SEC disclosure
false_flag_risk: none
campaign_id: change-healthcare-alphv-ransomhub
summary: |
  Largest US healthcare data breach on record by individuals
  affected. The ALPHV operator's exit scam — keeping the full
  USD 22M and dropping the affiliate — marked the end of ALPHV's
  operational viability and triggered an immediate ~3-month
  hiatus of major US healthcare ransomware (until June 2024) as
  affiliates re-aligned with RansomHub and Qilin.
