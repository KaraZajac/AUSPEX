  notes: |
    Audited against the raw of the sole cited source, Krebs on Security
    "Arrests in $400M SIM-Swap Tied to Heist at FTX?" (snapshot
    atlas/sources/raw/krebs__2024-02-15_400m-sim-swap-ftx.html, sha256
    cabc3340...cc4e81fe, 53,658 bytes). Triage: NOT a phantom - the URL
    returns the real article (title and body match the event's claims).

    [a] FACTS - corrected. Carried verbatim by the raw: "Three Americans
    were charged this week with stealing more than $400 million in a
    November 2022 SIM-swapping attack"; Powell a.k.a. "R," "R$" and
    "ElSwapo1," "ringleader of a SIM-swapping group called the 'Powell SIM
    Swapping Crew'"; Rohn a.k.a. "Carti"/"Punslayer" "allegedly assisted in
    compromising devices"; Hernandez "allegedly helped the group gain
    access to victim devices ... between March 2021 and April 2023"; theft
    "over several hours between November 11 and 12, 2022"; "after they
    SIM-swapped an AT&T customer by impersonating them at a retail store
    using a fake ID"; victim named only as "Victim 1"; "The U.S. government
    did not name the victim organization, but there is every indication
    that the money was stolen from ... FTX, which had just filed for
    bankruptcy on that same day"; Elliptic: "We put the value of the
    cryptoassets stolen at $477 million ... administrators have reported
    overall losses due to 'unauthorized third-party transfers' of $413
    million ... certainly over $400 million"; Elliptic Oct 2023 laundering
    trace "points to the involvement of a broker or other intermediary with
    a nexus in Russia." STRIPPED as not carried by the source: "in the
    District of Columbia" (venue never stated in the article), "Chapter 11"
    (article says only "filed for bankruptcy"), "hot-wallet" in the event
    name (article says "FTX wallets"), "social-engineered telephone-carrier
    employees to transfer FTX employee phone numbers to mule-controlled
    SIMs" (raw mechanism is in-person impersonation of ONE AT&T customer
    with a fake ID; "FTX employee" phone numbers, plural victims, and
    "mule-controlled SIMs" are uncarried embellishments), and the
    unqualified claim that DOJ charged a drain "from FTX ... hot wallets"
    (the FTX identification is Krebs/Elliptic inference, now hedged), plus
    "largest single-event SIM-swap loss in the public record" (nearest
    carried claim is Elliptic's scale-and-date-qualified statement, now
    quoted properly). "Conspiracy" in the old name reworded to "crew" per
    the source's own wording. Added quantified_impact.usd_stolen 400000000
    (indictment floor) with the 477M/413M spread in a comment, and
    operators_named for the three defendants (corpus surname-first
    convention, cf. mesri-behzad, urban-noah-michael).

    [b] ATTRIBUTION - corrected. attributing_org was "DOJ + FBI": the FBI
    appears in the article only as declining to comment; the charging
    instrument is a DOJ indictment. Set attributing_org: US DOJ.
    auspex_assessment concur retained; added a scoping note - high
    confidence covers DOJ's charging of named defendants, NOT the
    FTX-victim identification, which the government withheld ("Victim 1")
    and which rests on Krebs/Elliptic inference.

    [c] DATES - corrected. start_date 2022-11-11 OK (drain began evening of
    Nov 11); end_date was 2024-02-15 (matched nothing in any source -
    apparently copied from the source record's erroneous published_on) ->
    2022-11-12, the theft's end per "over several hours between November 11
    and 12, 2022". disclosure_date 2024-02-01 OK (indictment "unsealed this
    week"; article posted Feb 1 2024; Powell detention hearing Feb 2 2024).
    SOURCE DATE FIX: the source record's published_on was 2024-02-15 but
    the raw page states "posted on Thursday 1st of February 2024 01:41 PM"
    (in-body update dated Feb 3) -> corrected published_on to 2024-02-01 on
    the source record; the id slug keeps its erroneous date (slugs are
    stable forever), annotated there.

    [d] DOCTRINE_LINKS - empty [] confirmed correct: criminal financial
    theft with no state doctrine; nothing attested; none invented. The
    Elliptic/Unciphered Russia-laundering-nexus observations concern a
    post-theft laundering intermediary, not state tasking - carried as
    context in prose, deliberately NOT as a doctrine link or ru attribution.

    [e] ATTRIBUTION_LEVEL - added: named-actor. DOJ named three individuals
    and the "Powell SIM Swapping Crew" (mirrors the null-actor + named
