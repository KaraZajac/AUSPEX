id: 2024-02/ftx-400m-sim-swap-arrests
name: DOJ indicts SIM-swap conspiracy for $400M FTX hot-wallet drain
start_date: 2022-11-11
disclosure_date: 2024-02-01
end_date: 2024-02-15
incident_type:
  - financial-theft
initial_vector: valid-creds
outcome_summary: |
  US DOJ unsealed indictments in the District of Columbia in
  early February 2024 against Robert Powell, Carter Rohn, and
  Emily Hernandez for a SIM-swap conspiracy that drained
  approximately USD 400M from FTX cryptocurrency exchange
  hot wallets on November 11–12 2022 — the same day FTX
  filed for Chapter 11 bankruptcy. The defendants social-
  engineered telephone-carrier employees to transfer FTX
  employee phone numbers to mule-controlled SIMs and used
  the captured SMS-based MFA codes to drain exchange
  custodial wallets. One of the most consequential SIM-swap
  prosecutions to date by attributed loss value.
false_flag_risk: none
summary: |
  The FTX SIM-swap is the canonical case of SIM-swap
  attribution against a corporate target rather than a
  retail-investor victim, and the largest single-event
  SIM-swap loss in the public record. AUSPEX classifies as
  criminal-baseline.
