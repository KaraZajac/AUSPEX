initial_vector: valid-creds
outcome_summary: |
  An indictment unsealed in early February 2024 (first reported
  by Ars Technica; Krebs on Security, Feb 1 2024) charged three
  US residents over a November 2022 SIM-swap theft of more than
  USD 400M in cryptocurrency: Robert Powell of Chicago (a.k.a.
  "R," "R$," "ElSwapo1"), alleged ringleader of the "Powell SIM
  Swapping Crew"; Carter Rohn of Indiana (a.k.a. "Carti,"
  "Punslayer"), who allegedly assisted in compromising devices;
  and Emily "Em" Hernandez of Colorado, who allegedly helped the
  group access victim devices in SIM-swapping attacks between
  March 2021 and April 2023. Per the indictment, the crew stole
  the funds over several hours on November 11-12 2022 after
  SIM-swapping an AT&T customer by impersonating them at a
  retail store with a fake ID, enabling interception of the
  victim's SMS messages, including one-time authentication
  passcodes. The indictment identifies the SIM-swapped victim
  only as "Victim 1" and the US government did not name the
  victim organization; Krebs reported "every indication" the
  money was stolen from FTX, which had filed for bankruptcy that
  same day, and Elliptic corroborated that FTX wallets were
  drained from the evening of Nov 11 into Nov 12, valuing the
  stolen cryptoassets at USD 477M (FTX administrators reported
  USD 413M of "unauthorized third-party transfers"; Elliptic
  knew of no other crypto-exchange theft of that scale on that
  date). Elliptic's October 2023 tracing found the stolen funds
  laundered through ChipMixer and commingled with funds of
  Russia-linked criminal groups, indicating "a broker or other
  intermediary with a nexus in Russia."
quantified_impact:
  usd_stolen: 400000000  # indictment: "more than $400 million"; Elliptic valued the stolen cryptoassets at $477M; FTX administrators reported $413M in unauthorized transfers
false_flag_risk: none
operators_named:
  - powell-robert  # "R" / "R$" / "ElSwapo1", alleged ringleader, Powell SIM Swapping Crew; DOJ Feb 2024
  - rohn-carter  # "Carti" / "Punslayer"; DOJ Feb 2024
  - hernandez-emily  # "Em"; DOJ Feb 2024
summary: |
  Two-layer record: the underlying crime is the November 2022
  SIM-swap drain of FTX on the night of its bankruptcy filing —
  the corpus's only record of that theft — and the event is
  anchored on the February 2024 DOJ indictment of the named
  crew (documentary/law-enforcement layer). A SIM-swap of a
  single AT&T customer's number cascaded into a >USD 400M
  exchange drain; Elliptic knew of no other crypto-exchange
  theft of that scale on that date. AUSPEX classifies as
  criminal-baseline; no state doctrine applies, though Elliptic
  and Unciphered assessed the post-theft laundering pointed to
  a Russia-nexus intermediary rather than the US-based
  SIM-swappers alone.
