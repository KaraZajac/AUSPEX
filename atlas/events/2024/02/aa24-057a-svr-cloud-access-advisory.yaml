outcome_summary: |
  On 2024-02-26 the UK NCSC published joint advisory AA24-057A,
  "SVR Cyber Actors Adapt Tactics for Initial Cloud Access,"
  co-sealed by NSA, CISA, CNMF, FBI, ASD's ACSC, CCCS, and GCSB —
  agencies of all five Five Eyes nations. It assesses APT29
  (Midnight Blizzard / the Dukes / Cozy Bear) to be a cyber
  espionage group "almost certainly part of the SVR" and catalogues
  the TTPs, observed over the preceding 12 months, by which SVR
  actors adapt as victims move to cloud infrastructure: brute
  forcing and password spraying against service accounts (T1110);
  takeover of dormant accounts of departed users (T1078.004),
  including logging back into inactive accounts after an enforced
  incident-response password reset to regain evicted access;
  authentication with stolen system-issued access tokens, without
  needing a password (T1528); "MFA bombing" / MFA-fatigue push spam
  (T1621); enrollment of actor-controlled devices on cloud tenants
  lacking device-validation rules (T1098.005); and residential
  proxies that hide the true source of traffic from IP-based
  network defenses (T1090.002). NCSC records SVR targeting
  expanding beyond governmental, think tank, healthcare, and
  energy organizations to aviation, education, law enforcement,
  local and state councils, government financial departments, and
  military organizations. Recommended mitigations: MFA/2SV; strong
  unique passwords plus joiners-movers-leavers reviews disabling
  dormant accounts; least-privilege service accounts; canary
  service accounts; short session lifetimes; device-enrollment
  policies; and application/host-level log detection (e.g.
  user-agent-string changes) over IP-address indicators. The
  advisory notes some of its TTPs (residential proxies,
  exploitation of system accounts) are "similar to those reported
  as recently as January 2024 by Microsoft"; it names no specific
  victim incident.
false_flag_risk: none
campaign_id: apt29-midnight-blizzard
summary: |
  Documentary tradecraft advisory — an advisory about the SVR's
  tradecraft evolution, not one specific intrusion. The Five Eyes'
  consolidated statement of the SVR's cloud-era initial-access
  repertoire: as victims modernize, the actor has "to move beyond
  their traditional means of initial access, such as exploiting
  software vulnerabilities in an on-premises network," and instead
  "target the cloud services themselves," making denial of initial
  authentication the decisive defensive layer ("Denying initial
  access to the cloud environment can prohibit SVR from
  successfully compromising their target"). Issued a month after
  Microsoft's Midnight Blizzard corporate-intrusion reporting,
  which the advisory itself cites as describing similar TTPs.
