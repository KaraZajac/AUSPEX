initial_vector: unknown
outcome_summary: |
  NCSC-UK led a Five Eyes joint advisory (AA24-057A) cataloguing
  observed SVR tradecraft shifts for initial access to cloud
  tenants: password-spray, brute-force, OAuth-token abuse, dormant
  service-account compromise, unauthorised MFA-device registration,
  and residential-proxy infrastructure to defeat geofencing. Pulls
  together the operational evidence from the Microsoft Midnight
  Blizzard (Jan 2024) and HPE (Jan 2024) intrusions into a normative
  defensive baseline for cloud-resident victims.
false_flag_risk: none
campaign_id: apt29-midnight-blizzard
summary: |
  Doctrinally important as the first Five-Eyes-wide tradecraft
  advisory framing the SVR's identity-supply-chain pattern as the
  dominant cloud-era espionage modality. The advisory's recommended
  controls (FIDO2, conditional access, OAuth-app monitoring,
  privileged-identity governance) became the policy template for
  CISA's subsequent cloud-resident hardening directives through 2024.
