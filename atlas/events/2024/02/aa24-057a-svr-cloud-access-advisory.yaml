  notes: |
    Audited against the primary source, the CISA-hosted joint
    advisory AA24-057A "SVR Cyber Actors Adapt Tactics for Initial
    Cloud Access" (url live; raw snapshot
    cisa__2024-02-26_aa24-057a-svr-cloud-access.html, sha256
    4611bcb8...ca88ba87, 74,392 bytes; HTML <title> "SVR Cyber
    Actors Adapt Tactics for Initial Cloud Access | CISA"). Not a
    phantom — the URL resolves to the real advisory. The defect
    pattern was IMPORTED SPECIFICS from the January-2024
    Microsoft/HPE incident reporting (the prior audit's suspicion),
    corrected in place.

    [a] FACTS — corrected. Raw keyword census: OAuth = 0, FIDO2 =
    0, "conditional access" = 0, HPE/Hewlett = 0, geofenc- = 0,
    Ukraine = 0, NATO = 0 (the only two byte-matches for "NATO" are
    the substring of "Coordinator" in CISA logo alt-text). REMOVED
    accordingly: "OAuth-token abuse" (advisory describes stolen
    system-issued access tokens, T1528 — OAuth never appears);
    "residential-proxy infrastructure to defeat geofencing"
    (advisory: proxies hide the true source from defenses using
    IP-address indicators — geofencing never appears); "pulls
    together the operational evidence from the Microsoft Midnight
    Blizzard (Jan 2024) and HPE (Jan 2024) intrusions" (the
    advisory references Microsoft exactly once — some TTPs are
    "similar to those reported as recently as January 2024 by
    Microsoft" — and never mentions HPE); "first Five-Eyes-wide
    tradecraft advisory" (unverifiable superlative, asserted
    nowhere); "identity-supply-chain pattern as the dominant
    cloud-era espionage modality" (appears nowhere); "recommended
    controls (FIDO2, conditional access, OAuth-app monitoring,
    privileged-identity governance) became the policy template for
    CISA's subsequent cloud-resident hardening directives through
    2024" (none of the four named controls appear; the forward
    causal claim is uncited). Fixed the conflation "dormant
    service-account compromise": the advisory treats two distinct
    account classes — brute-forced/password-sprayed SERVICE
    accounts (T1110) and DORMANT accounts of departed users
    (T1078.004, incl. post-eviction regain after enforced password
    resets). Rewrote outcome_summary/summary to the advisory's own
    content: the six-TTP catalogue with ATT&CK ids (T1110,
    T1078.004, T1528, T1621, T1098.005, T1090.002) observed "in
    the last 12 months"; the sector-expansion sentence; the actual
    mitigation list (MFA/2SV, strong unique passwords +
    dormant-account disablement, least privilege, canary service
    accounts, short session lifetimes, device-enrollment policies,
    application/host-level logging over IP indicators).
    incident_type: added documentary (an advisory about tradecraft
    evolution, not a specific intrusion — AA22-131A convention);
    kept disclosure + attribution-publication (unlike AA22-131A,
    this advisory does publish a joint attribution).

    [b] ATTRIBUTION — verified, tightened. Verbatim: "APT29 is a
    cyber espionage group, almost certainly part of the SVR, an
    element of the Russian intelligence services"; NSA, CISA, CNMF,
    FBI, ASD's ACSC, CCCS, GCSB "agree with this attribution and
    the details provided in this advisory." NCSC-UK lead confirmed
    (UK Crown Copyright disclaimer; FOIA contact = NCSC).
    attributing_org corrected "NCSC-UK + CISA + NSA + FBI + Five
    Eyes" -> the full actual sealer list (adds CNMF, ASD's ACSC,
    CCCS, GCSB). Confidence high kept ("almost certainly" = top
    PHIA band); auspex_assessment concur kept; attribution_date =
    release date 2024-02-26 kept.

    [c] DATES — source published_on 2024-02-26 = the advisory's
    "Release Date February 26, 2024" (verified in raw). Single-day
    meta event: start/disclosure/end all 2024-02-26 kept; the TTP
    observation window ("the last 12 months") belongs to the
    underlying operations and stays in prose, not in event dates.

    [d] DOCTRINE_LINKS — two changes. (1)
    ru/info-security-2016/information-sphere-as-domain DOWNGRADED
    attested -> strongly_inferred: the advisory states the
    proximate purpose (espionage "for intelligence gain") but never
    the pillar's goal-level framing (information confrontation /
    info-sphere as national-security domain); per the
    over-attestation boundary, a proximate purpose the doctrine
    specializes = strongly_inferred. This also matches both QC'd
    siblings (svr-cloud-identity-campaign,
    midnight-blizzard-microsoft-corporate), which carry this exact
    pillar at strongly_inferred. Added inference_basis
    signals/ruled_out with verbatim quotes; attesting_source_id
    kept as the supporting source per schema. (2)
    ru/nato-ultimatum-2021/nato-degradation (was strongly_inferred)
    REMOVED: NATO and Ukraine appear zero times in the advisory;
    nothing carries the pillar's goal (fragmenting NATO consensus
    on Ukraine via defense-industrial/logistics/political-
    institution operations); and the link's own reasoning
    ("Five-Eyes-wide hardening posture...") described the
    DEFENDERS' posture, not the Russian actor's rationale — an
    incoherent perspective for a ru doctrine on a ru actor. The
    source-stated espionage reading (link 1) out-competes it; per
    protocol, an invented link is removed rather than kept at a
    lower grade (same call as the AA22-131A audit).

    [e] ATTRIBUTION_LEVEL — added named-unit (was absent): the
    advisory names both the cluster (APT29 / Midnight Blizzard /
    the Dukes / Cozy Bear) and the SERVICE ("almost certainly part
    of the SVR"); consistent with the QC'd
    svr-cloud-identity-campaign convention for NCSC naming the SVR.

    [f] ACTOR_ID — ru/svr/apt29 resolves
    (atlas/actors/ru/apt29.yaml, id ru/svr/apt29,
    primary_service_id ru/svr); the record is well-sourced and its
    aliases cover every name the advisory uses. No actor defect.

    TARGETS — corrected to the advisory's own sector list (the
    prior audit's suspicion of HPE-bundle sector imports is
    CONFIRMED): removed sectors/ict (not in the advisory's
    victim-sector list — an import from the Microsoft/HPE
    tech-sector incidents), replaced with the PREVIOUS ACTOR
    ACTIVITY sentence's sectors — government (governmental; also
    covers "government financial departments"),
    civil-society/think-tank, healthcare, energy — plus the
    expansion list: transport/aviation (aviation), academic
    (education), government/local (local and state councils),
    government/defense-ministry (military organizations). "Law
    enforcement" has no sector id in the registry — folded under
    sectors/government and flagged below. No country set (the
    advisory scopes no victim countries). campaign_id
    apt29-midnight-blizzard kept: editorial cluster shared with the
    QC'd Microsoft-corporate event, grounded in the advisory's own
    citation of Microsoft's January-2024 reporting.

    RESIDUALS/FLAGS: (i) sector-registry gap — no law-enforcement
