id: 2024-02/bizone-sticky-werewolf-ukraine
name: BI.ZONE consolidates Sticky Werewolf attribution and Ukraine targeting picture
start_date: 2023-01-01
disclosure_date: 2024-02-19
end_date: 2024-02-01
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Russian vendor BI.ZONE published an expanded analysis of the
  Sticky Werewolf (UAC-0050) cluster, documenting continued
  spear-phishing against Ukrainian state institutions, Belarusian
  opposition targets, and Russian organizations critical of
  the war. Tooling rotation observed: Remcos RAT remained the
  staple, with Rhadamanthys stealer, NetWire, and DarkCrystal
  RAT rotated through. The "Belarusian-aligned" framing was
  formalized in BI.ZONE's reporting.
false_flag_risk: none
summary: |
  Notable as the most extensive Russian-vendor public reporting
  on a Belarusian-aligned cluster — BI.ZONE's positioning gives
  the analysis weight despite its origin in a state-adjacent
  Russian commercial vendor. The inclusion of Belarusian
  opposition targets and war-critical Russian organizations
  in the same victim set extends UAC-0050's profile beyond
  pure Ukraine-theater support into broader regime-stability
  operations.
