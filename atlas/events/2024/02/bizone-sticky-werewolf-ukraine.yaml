id: 2024-02/bizone-sticky-werewolf-ukraine
name: BI.ZONE details Sticky Werewolf phishing of public organizations in Russia and Belarus
start_date: 2023-04-01
disclosure_date: 2023-10-13
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
false_flag_risk: none
summary: |
  BI.ZONE Threat Intelligence publicly documented Sticky Werewolf, a
  previously unreported cluster phishing public organizations in
  Russia and Belarus, with espionage assessed as the aim: "Public
  organizations in Russia and Belarus remain a popular target for
  espionage." Activity was "traced back to April 2023 with at least
  30 attacks to date" (October 2023). Phishing emails carried
  IP Logger-generated links to .exe/.scr payloads masquerading as
  Word/PDF documents that opened a decoy while installing commodity
  Ozone RAT or Darktrack RAT obfuscated with Themida; decoys included
  an EMERCOM of Russia emergency warning, a court claim application,
  and, against Belarusian organizations, a legal-code-violation
  notice. BI.ZONE names no operator, sponsor, or nation — Russia and
  Belarus appear strictly as victims — making this a Russian vendor
  documenting espionage against Russian and Belarusian state bodies
  by an unidentified operator.
outcome_summary: |
  At least 30 attacks between April and October 2023 per BI.ZONE.
  Compromise chain: phishing link, masqueraded executable, decoy
  document plus the Ozone RAT loader persisted via a Startup-folder
  .lnk under a legitimate-application name (e.g. utorrent.exe); the
  Ozone RAT core module provides keylogging, microphone/screen/webcam
  capture, remote command execution, HVNC covert control, reverse
  proxy, and password extraction from web browsers and email clients
  (Outlook, Thunderbird). IP Logger link telemetry let the operators
  profile victims (IP, country, city, browser/OS) and triage targets,
  "disregarding those related to, for example, sandboxes, research
  activities, and countries outside the group's focus." No victim
  names, data-loss volumes, or operator identity were published.
attributions:
  - actor_id: ru/unscoped/uac-0050
    attributing_org: BI.ZONE
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur-with-caveat
    attribution_date: 2023-10-13
    attribution_source_id: bi-zone/2023-10-13_sticky-werewolf-russia-belarus
    notes: |
      BI.ZONE attributes the campaign only to its own newly named
      "Sticky Werewolf" cluster — no nation, service, or operator is
      named, and the report never references CERT-UA or UAC-0050
      (hence attribution_level activity-cluster). The actor_id here
      follows the corpus alias table, which maps Sticky Werewolf onto
      UAC-0050; that equation is a cross-vendor infrastructure-overlap
      claim BI.ZONE does not make in this source, and it sits in
      tension with directionality (CERT-UA documents UAC-0050 against
      Ukrainian targets; BI.ZONE documents Sticky Werewolf against
      Russian and Belarusian public organizations). Operator origin is
      unresolved — the source notes commodity RATs serve
      "cybercriminals and state-sponsored groups alike" and once calls
      the operators "the criminal group".
doctrine_links: []
targets:
