  level: full
  notes: |
    PHANTOM-REMEDIATION audit, RE-SOURCE path ("badrabbit model"), plus the full
    6-point audit against the raw source.
    RAW EVIDENCE: bi-zone/2023-10-13_sticky-werewolf-russia-belarus — fresh live
    snapshot bi-zone__2023-10-13_sticky-werewolf-russia-belarus.html, sha256
    7a1bbb42…f5a3dc71, 146,449 bytes, fetched 2026-07-04 (HTTP 200 at the canonical
    bi-zone.medium.com URL; JSON-LD datePublished 2023-10-13T07:05:19Z). The same
    article was captured 2026-06-24 during the actor audit as
    bi-zone__2024-02-19_sticky-werewolf-ukraine.html, sha256 de8f53e9…f0c07b30,
    146,017 bytes — hash re-verified this audit; byte deltas are Medium dynamic
    chrome only, article body identical.
    STEP 0 TRIAGE: the event's sole cited source (bi-zone/2024-02-19_sticky-
    werewolf-ukraine, "Sticky Werewolf — Tracking the Cluster Through 2023",
    2024-02-19) is a confirmed PHANTOM — url: null (bi.zone slug 404 since
    2026-05-28), no wayback copy, and no evidence any BI.ZONE report of that title
    or date exists. The campaign itself is real and documented by BI.ZONE's live
    2023-10-13 Medium primary. RE-SOURCED: created source record
    bi-zone/2023-10-13_sticky-werewolf-russia-belarus (tier primary, snapshot +
    sha256), re-pointed sources[] and attribution_source_id, annotated the phantom
    record as a retire candidate (it stays cited by the actor and one doctrine —
    out of event-audit scope).
    [a] FACTS — the prior prose failed nearly every check against the raw. It
    claimed spear-phishing of "Ukrainian state institutions", "Belarusian
    opposition targets", and "Russian organizations critical of the war", tooling
    "Remcos RAT … Rhadamanthys stealer, NetWire, and DarkCrystal RAT", and that a
    "Belarusian-aligned framing was formalized in BI.ZONE's reporting". The raw
    contains ZERO occurrences of Ukraine/Ukrainian, UAC-0050, CERT-UA, Remcos,
    Rhadamanthys, NetWire, DarkCrystal, or "opposition" (keyword-verified over the
    full HTML), and no alignment framing of any kind. All uncarried claims removed.
    Rewritten summary/outcome_summary carry only raw-supported facts: "Public
    organizations in Russia and Belarus remain a popular target for espionage";
    "The group's activity can be traced back to April 2023 with at least 30
    attacks to date"; IP Logger link generation + victim profiling (timestamp, IP,
    country, city, browser/OS) and triage; .exe/.scr masquerading as Word/PDF;
    decoys (EMERCOM of Russia emergency warning, court claim application,
    Belarusian legal-code-violation notice); "installed Ozone RAT or Darktrack
    RAT"; Themida protection; %TEMP% drop as utorrent.exe + Startup .lnk
    persistence; Ozone core-module capabilities (keylogger, mic/screen/webcam,
    remote commands, HVNC, artifact deletion, browser/Outlook/Thunderbird password
    extraction, reverse proxy); IoCs 185.12.14[.]32:666, yandeksdisk[.]org,
    diskonline[.]net.
    [b] ATTRIBUTION — BI.ZONE attributes only to its own new cluster "Sticky
    Werewolf"; NO nation, service, or operator is named; UAC-0050 is never
    mentioned, so the Sticky-Werewolf=UAC-0050 equation is NOT carried by this
    source (it is a cross-vendor alias claim recorded on the actor file). Kept
    actor_id ru/unscoped/uac-0050 (the corpus alias home for Sticky Werewolf) but
    downgraded auspex_assessment concur -> concur-with-caveat and documented the
    contested equation and open operator direction in the attribution notes.
    attributing_org_confidence high is retained for the claim BI.ZONE actually
    makes (its own named cluster, ~30 clustered attacks, published IoCs — no
    in-source hedging on the clustering); attribution_date corrected 2024-02-19 ->
    2023-10-13.
    [c] DATES — real source published_on 2023-10-13 (the phantom carried
    2024-02-19); disclosure_date 2024-02-19 -> 2023-10-13; start_date 2023-01-01
    -> 2023-04-01 ("traced back to April 2023"; day = month-start best estimate);
    end_date 2024-02-01 -> null (activity ongoing "to date" at publication; no
    bounded end stated).
    [d] DOCTRINE_LINKS — REMOVED both strongly_inferred by/* links.
    by/union-state-integration/ukraine-theater-support was premised on
    Ukrainian-state targeting, which appears nowhere in the source;
    by/concept-info-security-2019/regime-stability-monitoring was premised on
    "Belarusian opposition" targeting — also nowhere in the source, and inverted:
    Belarusian PUBLIC/government organizations are the victims, i.e. the
    Belarusian state is targeted, not defended. With the operator's nation and
    direction unresolved (source: commodity RATs serve "cybercriminals and
    state-sponsored groups alike"), no doctrine link is defensible ->
    doctrine_links: [] (none invented).
    [e] ATTRIBUTION_LEVEL — set activity-cluster (previously missing): a vendor
    cluster name with no nation attached.
    [f] ACTOR_ID — ru/unscoped/uac-0050 resolves to atlas/actors/ru/uac-0050.yaml;
    actor file untouched; placement/alias caveats FLAGGED to the orchestrator.
    TARGETS — replaced orgs/ukrainian-government (uncarried; no Ukraine nexus in
    the source) and orgs/belarusian-opposition (uncarried AND a dangling FK — no
    such registry file exists) with sectors/government country ru and country by,
    both primary, per "public organizations in Russia and Belarus" /
    "government organizations". incident_type data-theft -> espionage (exfiltration
    is not documented, only credential-theft capability; espionage is the source's
    stated aim); intrusion retained (>=30 compromises with RAT installs);
    initial_vector phishing confirmed; false_flag_risk none (source raises none).
    RESIDUAL UNCERTAINTY — perpetrator identity and direction are genuinely open
    (criminal vs state-sponsored, origin unstated; wider non-cited coverage
    speculates pro-Ukrainian origin but this source does not say so and no such
    claim is recorded). The event id keeps the legacy "2024-02/…-ukraine" slug
    (ids immutable) despite the corrected 2023-10 disclosure and no-Ukraine
    content — re-homing is Kara's call.
