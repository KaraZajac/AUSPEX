id: 2024-07/handala-crowdstrike-outage-wiper
name: Handala wiper phishing exploits CrowdStrike Falcon-sensor outage narrative
start_date: 2024-07-20
disclosure_date: 2024-07-21  # AUDIT 2026-07-11: real BleepingComputer article published 2024-07-21 (Ionut Ilascu) and Handala claimed on 21 Jul (Picus); prior 2024-07-22 was unsourced.
end_date: 2024-07-21  # AUDIT: Picus dates the op "20-21 July 2024"; prior end_date 2024-07-25 was unsourced (no cited source carries activity past 21 Jul).
incident_type:
  - destructive
  - wiper  # AUDIT: dropped "intrusion" — cited sources confirm wiper distribution + destructive-on-execution design, not any confirmed victim intrusion/breach.
initial_vector: phishing
outcome_summary: |
  Within ~24-48 hours of the 19 July 2024 (Friday) global
  CrowdStrike Falcon content-update outage, the Handala persona
  sent phishing emails to Israeli companies impersonating
  CrowdStrike — using the spoofed sender domain
  "crowdstrike.com.vc" and telling recipients that a tool had
  been created to bring Windows systems back online. The emails
  carried a PDF (seen by BleepingComputer) with instructions to
  run the fake update plus a link to a malicious ZIP; the ZIP
  held an executable ("Crowdstrike.exe") that, once run,
  extracted and launched a data wiper which "decimates the
  system by overwriting files with zero bytes and then reports
  it over Telegram" (AnyRun analysis relayed by BleepingComputer;
  wiper-renders-systems-unbootable mechanism corroborated by
  Picus). Handala claimed responsibility (on X/Twitter and its
  leak site) on 21 July 2024. NOTE: the cited sources confirm
  the wiper's distribution to Israeli companies and its
  destructive design but do NOT quantify confirmed victims or
  successful-deployment counts.
false_flag_risk: suspected  # presents as hacktivist
campaign_id: handala-iran-israel-campaign
summary: |
  Sharp operational-tempo data point illustrating the persona's
  capacity to mobilize a rapid (~1-2 day) phishing wave
  weaponizing an unrelated global IT event. Doctrinally anchored
  in the cyber-deniable-retaliation persona-laundering pillar
  (strongly inferred — a self-styled "pro-Iranian"/"Iranian-
  linked" hacktivist front); the asymmetric-warfare civilian-CII-
  coercion pillar is a weaker (plausible) fit given the cited
  sources name only "Israeli companies" (sector-unspecified) with
  no confirmed critical-infrastructure victim. The speed of
  weaponizing a non-related global outage is a notable tradecraft
  data point for the broader IR-IL cyber-exchange tempo.
