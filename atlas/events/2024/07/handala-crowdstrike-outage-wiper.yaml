id: 2024-07/handala-crowdstrike-outage-wiper
name: Handala wiper phishing exploits CrowdStrike Falcon-sensor outage narrative
start_date: 2024-07-20
disclosure_date: 2024-07-22
end_date: 2024-07-25
incident_type:
  - destructive
  - wiper
  - intrusion
initial_vector: phishing
outcome_summary: |
  On 20 July 2024 — within 24 hours of the global CrowdStrike
  Falcon-sensor outage on 19 July — the Handala persona
  distributed phishing emails to Israeli organizations
  containing a wiper masquerading as a PDF with "instructions
  on how to fix" the CrowdStrike outage. The operation exploited
  the urgency and noise of the outage event to bypass user
  vigilance. Vendor and Israeli-press reporting documented
  successful wiper deployment at multiple Israeli targets.
false_flag_risk: suspected  # presents as hacktivist
campaign_id: handala-iran-israel-campaign
summary: |
  Sharp operational-tempo data point illustrating the persona's
  capacity to mobilize a same-day phishing wave exploiting a
  global IT event. Doctrinally fits the cyber-deniable-
  retaliation persona-laundering pillar and the asymmetric-
  warfare civilian-CII-coercion pillar; the speed of weaponizing
  a non-related global outage is a notable tradecraft data point
  for the broader IR-IL cyber-exchange tempo.
