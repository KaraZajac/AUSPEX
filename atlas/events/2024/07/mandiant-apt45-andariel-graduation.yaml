id: 2024-07/mandiant-apt45-andariel-graduation
name: Mandiant APT45 / Andariel graduation report
start_date: 2024-07-25
disclosure_date: 2024-07-25
end_date: 2024-07-25
incident_type:
  - documentary
  - attribution-publication
initial_vector: unknown
outcome_summary: |
  Mandiant graduated the long-tracked North Korean operator to
  APT-tier with the APT45 designation, published the same day as
  the DOJ Rim Jong Hyok unsealing (Mandiant's acknowledgements
  thank FBI Kansas City). The report documents a dual mission:
  espionage since at least 2009 against government agencies and
  the defense industry (focus observed from 2017), plus
  nuclear-related entities (e.g. the 2019 Kudankulam Nuclear Power
  Plant intrusion in India), healthcare/pharma, crop science, and
  the financial sector; and, distinctively among DPRK operators, a
  suspected move into ransomware that Mandiant "cannot confirm" for
  APT45. Mandiant assesses with high confidence that APT45 supports
  the DPRK state and with moderate confidence that it is
  specifically the RGB, and maps the public names Andariel / Onyx
  Sleet / Stonefly / Silent Chollima (also linked to Lazarus Group)
  to the cluster.
false_flag_risk: none
campaign_id: andariel-rim-jong-hyok-cluster
summary: |
  Co-disclosure event with the DOJ Rim Jong Hyok unsealing and the
  CISA/NIS AA24-207A joint advisory (all dated 25 July 2024).
  Mandiant's APT45 graduation formalizes the cluster AUSPEX records
  as Andariel as a distinct DPRK RGB operator with a genealogy of
  malware families separate from peers (TEMP.Hermit, APT43), and
  describes both an espionage mission and a suspected —
  Mandiant-unconfirmed — financially-motivated / ransomware mission
  "possibly to fund their operations or generate revenue for the
  regime". AUSPEX reads that dual mission against the 8th-Congress
  defense plan (strategic-tech-collection funded by
  revenue-aggregation), but that doctrinal placement is an AUSPEX
  inference: Mandiant does not name the 8th Congress, does not
  confirm APT45 ransomware, and does not state a
  revenue-funds-collection loop (that loop is stated only in the
  separate, cross-linked DOJ Rim Jong Hyok indictment, not in this
  report).
attributions:
  - actor_id: kp/rgb/andariel
    attributing_org: Mandiant
    attributing_org_confidence: moderate
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2024-07-25
    attribution_source_id: mandiant/2024-07-25_apt45-andariel-disclosure
    notes: |
      Two-tier attribution in the source: Mandiant assesses "with
      high confidence that APT45 is a state-sponsored cyber operator
      ... in support of the North Korean regime" (nation-level,
      high) but only "with moderate confidence that APT45 is
      attributable specifically to North Korea's Reconnaissance
      General Bureau (RGB)". Because the recorded actor is
      RGB-specific (kp/rgb/andariel), attributing_org_confidence is
      set to the RGB-level grade (moderate); attribution_level is
      named-unit (Mandiant does name the RGB). The RGB placement is
      independently corroborated at higher confidence by the
      co-disclosed DOJ indictment (named-unit, high), OFAC 2019, and
      CISA AA24-207A (RGB 3rd Bureau) — hence auspex_assessment
      concur. Mandiant maps the names it tracks as APT45 to the
      public reporting names "Andariel", "Onyx Sleet", "Stonefly",
      and "Silent Chollima" (activity also frequently linked to
      "Lazarus Group"). [Corrected the prior note's erroneous
      "Plutonium (CrowdStrike)" — PLUTONIUM is Microsoft's pre-2023
      name; Silent Chollima is CrowdStrike's.]
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/strategic-tech-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Mandiant documents APT45 conducting espionage against
      government agencies and the defense industry (focus from 2017)
      and against nuclear-related entities (2019 Kudankulam Nuclear
      Power Plant, India), assessing the group operates "in support
      of the North Korean regime" and that its activity "mirrors the
      regime's geopolitical priorities" — defense- and
      nuclear-oriented state collection, which is the
      strategic-tech-collection pillar's substance. Kept
      strongly_inferred, NOT attested: this source frames the
      collection as regime-priority-aligned espionage but does not
      state the terminal military-modernization collection goal in
      the crisp form the attested bar requires. The specific tasking
      against warhead / satellite / missile-defense / submarine
      technology and the 13-system list are NOT in this report —
      they are in the separate, cross-linked DOJ Rim Jong Hyok
      indictment (where this pillar's link is attested); program_id
      missile-modernization is therefore dropped here as
      unsupported by the cited source.
    attesting_source_id: mandiant/2024-07-25_apt45-andariel-disclosure
    inference_basis:
      source_id: mandiant/2024-07-25_apt45-andariel-disclosure
      signals:
        - "Mandiant: APT45 espionage against government agencies and the defense industry (focus from 2017) and nuclear-related entities (2019 Kudankulam), operating 'in support of the North Korean regime'."
        - "Mandiant: the group's activity 'mirrors the regime's geopolitical priorities' and reflects DPRK reliance on cyber operations 'as an instrument of national power'."
      ruled_out: "Generic financially-motivated cybercrime as the primary read of the espionage mission — rejected because Mandiant frames the government/defense/nuclear collection as state-priority-aligned; it stays strongly_inferred rather than attested only because Mandiant does not state the military-modernization collection goal in substance (that attested wording is in the cross-linked DOJ indictment)."
    contested: false
    analyst: claude
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null
    confidence: plausible
    reasoning: |
      Mandiant reports that APT45's "suspected development and
      deployment of ransomware sets it apart from other North Korean
      operators" and links suspected APT45 clusters to MAUI (via CISA
      2022) and SHATTEREDGLASS (via Kaspersky 2021) — but "cannot
      confirm this ransomware use by APT45" and offers only that it
      is "possibly to fund their operations or generate revenue for
      the regime". DOWNGRADED strongly_inferred -> plausible: on this
      source the ransomware attribution to APT45 is unconfirmed and
      more than one purpose survives (self-funding of APT45's own
      operations vs. revenue for broader regime priorities vs.
      opportunistic cybercrime), so no single strategic reading
      dominates and no source here states the WMD /
      ballistic-missile-financing goal the revenue-aggregation pillar
      encodes. (The revenue->collection loop is stated only in the
      separate, cross-linked DOJ Rim Jong Hyok indictment, and even
      there it is strongly_inferred for this pillar.) The earlier
      "Maui, H0lyGh0st, Stonefly extortion" list was corrected:
      Mandiant names MAUI and SHATTEREDGLASS (not H0lyGh0st), and
      "Stonefly" appears only as a public-reporting alias, not as
      documented extortion (that is the separate Symantec Aug-2024
      report).
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Revenue for the 8th-Congress defense plan (revenue-aggregation pillar): APT45 is an RGB defense-collection cluster and Mandiant floats that its financial operations may 'generate funds for other North Korean state priorities'."
        - "Self-funding of APT45's own operations: Mandiant's nearest concrete framing is ransomware 'possibly to fund their operations' — a proximate, operations-level purpose, not the terminal WMD/missile-financing goal."
        - "Opportunistic financially-motivated cybercrime: Mandiant 'cannot confirm this ransomware use by APT45' and notes only 'suspected' development, leaving a purely revenue-driven read on the table."
    contested: false
    analyst: claude
