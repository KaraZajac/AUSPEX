notes: |
  Cross-links (the coordinated 25 Jul 2024 Andariel disclosures —
  kept as DISTINCT events, NOT merged): DOJ Rim Jong Hyok indictment
  (2024-07/andariel-rim-jong-hyok-indictment — the operator-level
  unsealing that actually carries the warhead/satellite/submarine/
  missile-defense tasking, the 13-system framing, and the
  revenue->operations loop); CISA/NIS/NCSC AA24-207A joint advisory
  (2024-07/aa24-207a-andariel-joint-advisory — "advance the regime's
  military and nuclear programs"); Microsoft Onyx Sleet tooling
  disclosure (2024-07/microsoft-onyx-sleet-disclosure); and the
  follow-on Symantec Stonefly extortion report
  (2024-08/symantec-stonefly-post-indictment — the source for
  "Stonefly extortion"). Shared campaign_id
  andariel-rim-jong-hyok-cluster. AUSPEX editorial comparison: the
  cybercrime-funds-espionage coupling read here mirrors what Mandiant
  documented for APT43 (Kimsuky) in its March 2023 report (a separate
  source, not cited by this event).
qc:
  verified_by: claude-opus-4.8
