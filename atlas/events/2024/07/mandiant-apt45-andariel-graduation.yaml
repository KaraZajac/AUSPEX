  notes: |
    Audited against the RAW Mandiant (Google Cloud) blog "APT45:
    North Korea's Digital Military Machine", 25 Jul 2024 (raw_snapshot
    mandiant__2024-07-25_apt45-andariel-disclosure.html; sha256
    79e18c41...dff2452e; 278,578 bytes; HTTP 200, real article, title
    verbatim — NOT a phantom). Documentary/attribution-publication
    meta-event ABOUT that report; it cites only the Mandiant source,
    so every claim is graded against Mandiant alone (the co-disclosed
    DOJ indictment + CISA AA24-207A are separate, cross-linked events
    — flagged, not merged).

    [a] FACTS — major corrections. The pre-audit prose imported
    DOJ-indictment content this Mandiant report does NOT contain:
    "warhead, satellite, missile-defense, and submarine technology"
    (0 raw hits for warhead/satellite/submarine/"missile defense") and
    the 13-system framing are from the DOJ Rim indictment, not this
    blog — removed. "H0lyGh0st" (0 raw hits) was fabricated for this
    source: Mandiant names MAUI ("the U.S. Cybersecurity and
    Infrastructure Security Agency reported on North Korean
    state-sponsored actors' use of MAUI ransomware", via CISA 2022)
    and SHATTEREDGLASS ("ransomware tracked by Mandiant as
    SHATTEREDGLASS, which has been used by suspected APT45 clusters",
    via Kaspersky 2021) — corrected to MAUI + SHATTEREDGLASS.
    "Follow-on Stonefly extortion" is NOT in this report (Stonefly
    appears only as a public alias) — that is the separate Symantec
    Aug-2024 report; removed. "Ransomware-driven revenue self-funding"
    was stated as fact, but Mandiant "cannot confirm this ransomware
    use by APT45" and offers only "possibly to fund their operations
    or generate revenue for the regime" — softened to Mandiant's
    hedge. Retained + source-carried: APT45 graduation of a
    long-running DPRK operator (espionage "as early as 2009");
    espionage vs government/defense industry (focus from 2017) +
    nuclear-related entities (2019 Kudankulam Nuclear Power Plant,
    India) + healthcare/pharma + crop science + financial; "suspected
    development and deployment of ransomware sets it apart from other
    North Korean operators"; same day as the DOJ unsealing (Mandiant
    acknowledgements thank "FBI Kansas City"). Added incident_type
    attribution-publication (Mandiant makes the APT45<->RGB
    attribution + alias mapping).

    [b] ATTRIBUTION — DOWNGRADED high -> moderate; added
    attribution_level named-unit. Verbatim two-tier: "Mandiant
    assesses with high confidence that APT45 is a state-sponsored
    cyber operator ... in support of the North Korean regime"
    (nation, high) BUT "We assess with moderate confidence that APT45
    is attributable specifically to North Korea's Reconnaissance
    General Bureau (RGB)". The recorded actor is RGB-specific
    (kp/rgb/andariel), so the honest attributing_org_confidence is the
    RGB-level grade = moderate; named-unit captures that Mandiant did
    name the RGB. auspex_assessment kept concur (RGB corroborated at
    higher confidence by the co-disclosed DOJ indictment
    named-unit/high, OFAC 2019, CISA AA24-207A). Fixed the alias note
    (dropped the erroneous "Plutonium (CrowdStrike)"); Mandiant's
    actual list is "Andariel"/"Onyx Sleet"/"Stonefly"/"Silent
    Chollima", linked to "Lazarus Group".

    [c] DATES — OK. Source published_on 2024-07-25 = blog date "July
    25, 2024" (verbatim). start/disclosure/end 2024-07-25 correct for
    a same-day publication meta-event.

    [d] DOCTRINE_LINKS — both re-graded against Mandiant alone.
      * strategic-tech-collection: KEPT strongly_inferred; DROPPED
        program_id missile-modernization (Mandiant says nothing about
        missiles/warheads — that program is DOJ-indictment content).
        Mandiant frames the government/defense/nuclear collection as
        "in support of the North Korean regime" / activity that
        "mirrors the regime's geopolitical priorities" — pillar
        substance, but NOT the crisp military-modernization-collection
        goal the attested bar needs; the attested version lives on the
        cross-linked DOJ indictment event. Removed the broken pre-pass
        "restore to attested once the indictment text is confirmed"
        placeholder; wrote a proper competing-doctrine ruled_out.
      * revenue-aggregation: DOWNGRADED strongly_inferred -> plausible.
        Mandiant "cannot confirm this ransomware use by APT45" and
        floats multiple purposes ("possibly to fund their operations
        or generate revenue for the regime"; "not only in support of
        its own operations but to generate funds for other North
        Korean state priorities") — the ransomware attribution is
        unconfirmed on this source and >1 strategic reading survives,
        no source here states the WMD/missile-financing goal, so
        plausible with alternatives[] is honest. attesting_source_id
        set null. Removed H0lyGh0st / Stonefly-extortion from the
        family list.

    [e] ATTRIBUTION_LEVEL — set named-unit (Mandiant names the RGB),
    at moderate confidence (orthogonal axes).

    [f] ACTOR_ID — kp/rgb/andariel resolves ->
    atlas/actors/kp/andariel.yaml (id kp/rgb/andariel). Mandiant
    corroborates the RGB placement (moderate) and the APT45 alias (the
    actor record already carries alias APT45 / Mandiant / equivalent).
    No actor-file edit; no flag.

    RESIDUAL: source tier left secondary (unchanged) — arguably
    primary as the flagship report coining the APT45 designation, but
    Mandiant vendor-research tiers are split ~21 primary / 19
    secondary in-corpus (sibling APT43 graduation reports are
