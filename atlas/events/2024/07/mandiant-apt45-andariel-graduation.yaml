outcome_summary: |
  Mandiant graduated Andariel to APT-tier with the APT45
  designation, published the day of the DOJ Rim Jong Hyok
  unsealing. Report documents Andariel's dual mission:
  defense-industrial-base intrusion targeting warhead,
  satellite, missile-defense, and submarine technology;
  and ransomware-driven revenue self-funding (Maui, H0lyGh0st,
  and follow-on Stonefly extortion). Mirrors the
  cybercrime-funds-espionage doctrinal coupling Mandiant
  documented for APT43 in March 2023.
false_flag_risk: none
campaign_id: andariel-rim-jong-hyok-cluster
summary: |
  Co-disclosure event with the DOJ Rim Jong Hyok unsealing
  (also dated 25 July 2024). Mandiant's APT45 graduation
  formalizes Andariel as a distinct DPRK cluster with its
  own doctrinal placement: the strategic-tech-collection
  pillar of the 8th-Congress defense plan paid for by a
  parallel revenue-aggregation pillar (ransomware) operated
  by the same cluster. Doctrinally significant because it
  documents revenue self-funding at the espionage-cluster
  level rather than only at the centralized RGB Bureau 38
  / FTB level — Andariel funds its own collection
  operations rather than drawing from a central pool.
