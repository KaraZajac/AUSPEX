id: 2024-07/apt17-prc-9002-rat-espionage-campaign-against-italian-government-agenc
name: "APT17 (PRC) 9002 RAT espionage campaign against Italian government agencies and companies (fake Skype for Business installer)"
start_date: 2024-07-02
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
false_flag_risk: none
summary: |
  TG Soft (C.R.A.M.) documented two targeted attacks in June-July 2024 against Italian companies and government entities deploying the 9002 RAT (also tracked as 3102 RAT) in a fileless/diskless mode. Victims were lured via a malicious Office document (24 June) or a link (2 July) to a domain impersonating Equitalia Giustizia, prompting download of a customized MSI installer for Skype for Business that side-loaded the RAT. The 9002 RAT provided proxy and traffic-monitoring functions and loaded modules (ScreenSpyS.dll, RemoteShellS.dll, FileManagerS.dll, ProcessS.dll). TG Soft attributed the activity to the Chinese group APT17 (DeputyDog).
