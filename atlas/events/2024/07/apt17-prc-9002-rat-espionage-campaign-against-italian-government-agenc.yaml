  notes: "Audited vs TG Soft/C.R.A.M. (raw captured, sha256 497438b1...): FACTS confirmed — two campaigns 24 Jun & 2 Jul 2024 vs Italian govt+companies, 9002 RAT (aka 3102) diskless, Equitalia-Giustizia-lookalike lure, custom Skype-for-Business MSI side-loading the RAT via vcruntime.jar/.vbs/.bin, proxy/traffic-monitoring, modules ScreenSpyS/RemoteShellS/FileManagerS/ProcessS all named in source. ATTRIBUTION aligns with cn/unscoped/apt17: source calls APT17/DeputyDog only a 'Chinese cyber actor'/'Chinese cyber-criminal group' and ties Aurora to 'the Chinese government' — NO MSS or any PRC service named, so named-actor at the China nexus, not named-unit. CORRECTIONS: (1) added attribution_level: named-actor (was missing); (2) rewrote doctrine_links reasoning to drop the stale 'MSS mandate'/'MSS-attributed' framing (actor demoted to cn/unscoped 2026-06-24; source names no MSS) — kept cn/national-intelligence-law-2017 at plausible/attesting_source_id:null since the source states no strategic purpose; (3) source published_on 2024-07-02 -> 2024-07-09 (article header '09/07/2024 17:37', DD/MM Italian site; prior value was the campaign date). Source de-provisionalized; raw_snapshot + content_sha256 added. Actor record already consistent (demotion note cites this event)."
