    reasoning: |
      China-nexus espionage against the government agencies of a NATO member (Italy) is foreign political-intelligence collection of the kind the 2017 National Intelligence Law mandates and authorizes for PRC intelligence work; no economic or regional CN doctrine fits the generic government-agency target set, so the foundational intelligence-collection authority is the most defensible anchor. Plausible (not stronger): TG Soft names only a Chinese group (APT17/DeputyDog), no PRC service, and states no strategic purpose, so the WHY is AUSPEX's inference and a competing reading (criminal/contractor tasking) is not fully ruled out. (Actor demoted to cn/unscoped 2026-06-24 — no cited source names the MSS; reasoning de-attributed from the prior "MSS mandate" framing on 2026-06-25.)
