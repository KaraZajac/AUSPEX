  publication: DOJ unsealing of the Rim Jong Hyok
  indictment (operator-level), Mandiant APT45 graduation
  (cluster-level), Microsoft Onyx Sleet disclosure
  (tooling-level). Doctrinally significant because the
  coordination demonstrates the maturation of joint
  attribution standards for DPRK cyber clusters that
  AUSPEX records as Andariel: the same RGB sub-cluster
  now has government-attested individuals, vendor-attested
  APT-tier designation, and tooling-level corroboration in
  a single 24-hour publication window.
