outcome_summary: |
  Microsoft Threat Intelligence published a comprehensive
  disclosure of Onyx Sleet (Microsoft cluster name for
  Andariel) tooling and tradecraft. Co-published with
  Mandiant's APT45 graduation report and the DOJ Rim Jong
  Hyok unsealing on the same date — three-way coordinated
  publication of the Andariel cluster picture from
  government and two major vendors.
false_flag_risk: none
