id: 2024-07/microsoft-onyx-sleet-disclosure
name: Microsoft Onyx Sleet (Andariel) tooling disclosure
start_date: 2024-07-25
disclosure_date: 2024-07-25
end_date: 2024-07-25
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Microsoft Threat Intelligence published a comprehensive
  disclosure of Onyx Sleet (Microsoft's cluster name for the
  actor AUSPEX records as Andariel) tooling and tradecraft —
  custom RATs (TigerRAT, SmallTiger, LightHand,
  ValidAlpha/BlackRAT, Dtrack) used for intelligence
  collection against defense, engineering, and energy targets
  in India, South Korea, and the US, via recent N-day
  exploitation (TeamCity CVE-2023-42793, Log4j 2). MSTIC ties
  its disclosure to the same-day DOJ indictment of an
  individual "linked to" Onyx Sleet and to its own FBI
  collaboration. Landed the same date (2024-07-25) as
  Mandiant's APT45 graduation report and the DOJ Rim Jong Hyok
  unsealing (both distinct AUSPEX events); MSTIC itself does
  not claim coordination with Mandiant.
false_flag_risk: none
summary: |
  The tooling-level panel of the 25-July-2024 same-day
  Andariel publication window: DOJ unsealing of the Rim Jong
  Hyok indictment (operator-level), Mandiant APT45 graduation
  (cluster-level), and this Microsoft Onyx Sleet disclosure
  (tooling-level) — three DISTINCT AUSPEX events that AUSPEX
  does NOT merge. Doctrinally significant because, taken
  together, the Andariel cluster (which AUSPEX places under
  the RGB; the RGB is named only in the DOJ indictment, not
  in this Microsoft post) acquires in a single publication
  window government-named individuals, a vendor APT-tier
  designation, and tooling-level corroboration. Microsoft's
  own contribution: Onyx Sleet, first observed by Microsoft
  in 2014, with a "primary goal of intelligence collection"
  against military / defense / technology targets and a more
  recent expansion of "its goals to include financial gain."
