  notes: |
    Audited against the RAW MSTIC post "Onyx Sleet uses array of
    malware to gather intelligence for North Korea" (microsoft.com
    security blog, 2024-07-25). Raw snapshot captured + hashed:
    sha256 8c77d903...5d90081 (first8...last8), 311,894 bytes,
    <title> "Onyx Sleet uses array of malware to gather intelligence
    for North Korea | Microsoft Security Blog" — real article, not a
    phantom (Onyx Sleet x43, Andariel x4).

    [a] FACTS — corrected. (i) Onyx Sleet=Andariel VERIFIED verbatim:
    "Onyx Sleet is tracked by other security companies as APT45,
    SILENT CHOLLIMA, Andariel, DarkSeoul, Stonefly, and TDrop2."
    (ii) Fixed a factual error carried in both the event and the
    source record: "Plutonium (CrowdStrike)" — PLUTONIUM is
    Microsoft's OWN pre-2023 name, NOT CrowdStrike's (CrowdStrike =
    Silent Chollima); this post does not use "Plutonium" at all.
    (iii) Rewrote outcome_summary/summary to fold in MSTIC-carried
    tradecraft (custom RATs TigerRAT/SmallTiger/LightHand/ValidAlpha/
    Dtrack; N-day access via TeamCity CVE-2023-42793 + Log4j 2) and
    the MSTIC target set — "defense, engineering, and energy" in
    India, South Korea, and the US (NB: the post says ENGINEERING,
    NOT "nuclear" — 0 hits for nuclear; the "nuclear/aerospace"
    framing belongs to the sibling aa24-207a advisory + DOJ
    indictment, not to this post). (iv) De-overstated "three-way
    coordinated publication": MSTIC's post references only the
    same-day DOJ indictment ("indicted an individual linked to...
    Onyx Sleet") and its own FBI collaboration; it does NOT claim
    coordination with Mandiant. The same-day Mandiant APT45 report is
    a real co-occurrence (sibling event 2024-07-25) but is AUSPEX
    cross-event synthesis, not an MSTIC claim — reworded accordingly.

    [b] ATTRIBUTION — Microsoft Threat Intelligence / high / concur
    retained. MSTIC asserts its own tracked cluster as fact with no
    hedging (tier-1 vendor, first-party telemetry) → high is correct.

    [c] DATES — source published_on 2024-07-25 matches the post
    header ("July 25, 2024"); event start/disclosure/end all
    2024-07-25, correct for a same-day documentary disclosure.

    [d] DOCTRINE_LINK — strongly_inferred KEPT (correctly NOT
    upgraded to attested). The attested test fails on this source:
    MSTIC states the goal only as intelligence collection/gathering
    ("primary goal of intelligence collection"; title "gather
    intelligence for North Korea"; "targets of interest to North
    Korean intelligence") — the collection BEHAVIOUR + beneficiary,
    never the terminal military-modernization / nuclear / weapons-
    program goal the strategic-tech-collection pillar encodes (raw
    counts: nuclear 0, missile 0, modernization 0, RGB 0, regime 0,
    sanction 0; "military" 1x, only as a target-sector descriptor).
    Per the SCHEMA attestation boundary that is strongly_inferred,
    not attested — mirroring the same-cluster DOJ audit (which earned
    attested only because the indictment says the ops "further the
    North Korean regime's military and nuclear aspirations", language
    ABSENT here). CORRECTED the link's defects: (1) old reasoning
    leaned on "the parallel DOJ Rim Jong Hyok indictment" — a source
    NOT cited by this event — for its attestation; reframed onto
    MSTIC's own words. (2) Added attesting_source_id =
    microsoft/2024-07-25_onyx-sleet-intelligence-collection (the
    primary SUPPORTING source for a strongly_inferred link). (3)
    Added inference_basis {source_id, signals[], ruled_out} per the
    ladder (ruled_out = the competing revenue-aggregation/financial
    reading, which MSTIC subordinates to intelligence collection).
    program_id kept null (MSTIC does not narrow to a specific
    missile/maritime/satellite program).

    [e] ATTRIBUTION_LEVEL — ADDED named-actor (was missing). MSTIC
    names the group (Onyx Sleet) + nation (North Korea) but no unit
    (RGB/Reconnaissance General = 0 hits), so it stops one rung below
    the named-unit reached by the same-day DOJ indictment.

    [f] ACTOR_ID — kp/rgb/andariel resolves to
    atlas/actors/kp/andariel.yaml (id kp/rgb/andariel); actor record
    already carries Onyx Sleet as an equivalent Microsoft alias. No
    actor-file edit; no actor flag.

