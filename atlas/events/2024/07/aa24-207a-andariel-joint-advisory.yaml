outcome_summary: |
  Joint cybersecurity advisory co-signed by US CISA, FBI,
  NSA, Cyber National Mission Force (CNMF), and DoD Cyber
  Crime Center (DC3); the Republic of Korea's National
  Intelligence Service (NIS) and National Police Agency
  (NPA); and UK NCSC. Attributes a sustained global
  espionage campaign targeting defense, aerospace, nuclear,
  and engineering IP — funded in part by healthcare-sector
  ransomware — to the DPRK RGB 3rd Bureau group Andariel
  (also tracked as Onyx Sleet).
false_flag_risk: none
summary: |
  Canonical recent example of the ROK joint-advisory
  tradition under the US-ROK alliance and (post-Camp David)
  the trilateral cyber framework. AUSPEX models this as
  both an attribution-publication event in its own right
  and a doctrinal expression of the KORUS cyber
  cooperation framework's joint-attribution pillar.

  Substantively the advisory attributes to the DPRK
  Reconnaissance General Bureau (RGB) 3rd Bureau group
  Andariel / Onyx Sleet a sustained global espionage
  campaign whose stated purpose is to obtain technical
  information and IP "to advance the regime's military and
  nuclear programs and ambitions." It documents Andariel
  TTPs (initial access via widespread exploitation of
  internet-facing web servers using known vulnerabilities;
  custom malware and RATs including TigerRAT, Dtrack,
  NukeSped, and Valefor, plus commodity/dual-use tooling),
  maps to MITRE ATT&CK techniques, and publishes IOCs. It
  further frames a dual model in which the actors "fund
  their espionage activity through ransomware operations
  against U.S. healthcare entities" (Maui), sometimes
  running ransomware and espionage against the same entity
  on the same day.

  The authoring agencies are US CISA, FBI, NSA, Cyber
  National Mission Force (CNMF) and DoD Cyber Crime Center
  (DC3); the Republic of Korea's National Intelligence
  Service (NIS) and National Police Agency (NPA); and the
  UK NCSC — an unusually broad multi-national roster that
  marks ROK's entry into the upper tier of Western joint-
  attribution practice.
