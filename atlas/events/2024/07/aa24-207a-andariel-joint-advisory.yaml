id: 2024-07/aa24-207a-andariel-joint-advisory
name: AA24-207A joint advisory on DPRK Andariel / Onyx Sleet (NIS + DCC + KNPA + Five Eyes)
start_date: 2024-07-25
disclosure_date: 2024-07-25
end_date: 2024-07-25
incident_type:
  - attribution-publication
initial_vector: unknown
outcome_summary: |
  Joint cybersecurity advisory co-signed by US CISA, FBI,
  and NSA; Republic of Korea National Intelligence Service,
  Defense Counterintelligence Command, and Korea National
  Police Agency; and UK NCSC. Attributes a sustained global
  espionage campaign targeting defense, aerospace, nuclear,
  and engineering IP to the DPRK Andariel cluster (also
  tracked as Onyx Sleet).
false_flag_risk: none
summary: |
  Canonical recent example of the ROK joint-advisory
  tradition under the US-ROK alliance and (post-Camp David)
  the trilateral cyber framework. AUSPEX models this as
  both an attribution-publication event in its own right
  and a doctrinal expression of the KORUS cyber
  cooperation framework's joint-attribution pillar.

  Substantively the advisory names Andariel / Onyx Sleet
  TTPs (initial access via known-CVE exploitation on
  internet-facing infrastructure; custom backdoors
  including TigerRAT and LightHand; ransomware-as-cover
  including Maui), maps to MITRE ATT&CK techniques, and
  publishes IOCs. The ROK signing voice is NIS Cyber
  Security Center, DCC, and KNPA — a tripartite
  representation that reflects the post-2020 NIS Act
  reform separating domestic counter-intel (now KNPA) from
  the historic NIS umbrella.

  Editorial significance: the seven-signatory advisory
  format (US x 3, ROK x 3, UK x 1) is unusually broad and
  marks ROK's entry into the upper tier of Western joint-
  attribution practice.
