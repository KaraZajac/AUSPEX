  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The indictment articulates an explicit revenue→operations loop:
      Maui / Maui-variant ransom proceeds from US healthcare victims
      were laundered via PRC facilitators (Bitcoin → Tether → Chinese
      yuan → Chinese bank; through two Hong Kong residents; cashed out
      at a Dandong ATM by the Sino-Korean Friendship Bridge) and used
      to "purchase internet servers to commit computer intrusions"
      (para 23) / "pay for internet services, such as virtual private
      servers" (para 27). DOWNGRADED attested → strongly_inferred
      (2026-07-02): the indictment states only the PROXIMATE purpose of
      the revenue (self-funding the collection operations' server
      infrastructure); it does NOT state the TERMINAL WMD /
      ballistic-missile-financing goal the revenue-aggregation pillar
      encodes (0 occurrences of "WMD"/"ballistic"/"weapons of mass
      destruction" in the raw indictment). Per this doctrine's
      per-event attestation rule and the SCHEMA attestation boundary, a
      proximate revenue/operations-funding goal is strongly_inferred.
    attesting_source_id: doj/2024-07-25_andariel-rim-jong-hyok-indictment
    inference_basis:
      signals:
        - "Indictment paras 23/27: ransom money buys the VPS/internet servers used to commit the defense-tech intrusions — revenue directly underwrites the collection operations."
        - "Laundering chain runs through PRC facilitators (two Hong Kong residents, a Chinese bank, a Dandong ATM at the Sino-Korean Friendship Bridge), i.e. proceeds routed back toward the DPRK regime."
        - "The same actor's collection mission is separately attested (para 3) as furthering DPRK military and nuclear aspirations, so the revenue funding it is instrumental to the 8th-Congress tech-collection pillar."
      ruled_out: "Pure financially-motivated cybercrime with no state-program nexus — rejected because the indictment ties the funded operations to RGB collection furthering DPRK military/nuclear aims. It stays strongly_inferred (not attested) only because the indictment stops short of stating the ransom proceeds finance the WMD / ballistic-missile PROGRAMS themselves."
    contested: false
    analyst: claude
