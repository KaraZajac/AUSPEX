summary: |
  Single most important US-government Andariel attribution
  document. Establishes the revenue→operations loop
  doctrinally: healthcare ransomware funds defense-network
  intrusions. Cited as a primary attestation source for
  both the revenue-aggregation and strategic-tech-collection
  pillars of the 8th Party Congress defense plan.
