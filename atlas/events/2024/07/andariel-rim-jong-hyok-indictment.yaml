outcome_summary: |
  Kansas grand jury indictment (filed 2024-07-24, announced
  2024-07-25) of Rim Jong Hyok, a DPRK national who worked in
  North Korea's Reconnaissance General Bureau (RGB) in the cyber
  unit known as Andariel / Onyx Sleet / Silent Chollima.
  Retrospective consolidation document covering: Maui and
  Maui-variant ransomware against US healthcare providers (a
  Kansas hospital May 2021; Arkansas and Connecticut healthcare
  companies, a Florida hospital, and a Colorado clinic March 2022)
  and a South Korean manufacturer (March 2023); a NASA Office of
  Inspector General intrusion (>17 GB exfiltrated); 4 US defense
  contractors; 2 US Air Force bases (Randolph, Robins); a Chinese
  energy company in Shenzhen; and ROK and Taiwan
  defense-industrial-base targets. The indictment articulates the
  revenue→operations loop: ransom proceeds laundered via PRC
  facilitators (Hong Kong intermediaries → Chinese bank → Dandong
  ATM) buy the server infrastructure for the defense-network
  intrusions. State Department $10M Rewards for Justice offer
  attached (per the DOJ press release; not in the indictment PDF).
false_flag_risk: none
campaign_id: andariel-rim-jong-hyok-cluster
operators_named:
  - rim-jong-hyok  # Andariel, DOJ Kansas Jul 2024
summary: |
  Single most important US-government Andariel attribution
  document. Establishes the revenue→operations loop: healthcare
  ransomware proceeds, laundered via PRC facilitators, buy the
  server infrastructure for defense-network intrusions. The
  indictment directly attests the strategic-tech-collection goal
  — the collection "furthers the North Korean regime's military
  and nuclear aspirations" (missile, aerospace, uranium-processing
  technology), the goal the 8th-Congress-plan strategic-tech-
  collection pillar encodes. Its revenue language names only the
  proximate purpose (funding the operations' servers), so the
  revenue-aggregation link is strongly_inferred, not attested.
