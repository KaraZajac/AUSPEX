    [a] FACTS ✓ all load-bearing claims carried by the indictment PDF:
    Kansas Hospital ransomware 4 May 2021 (para 30); Arkansas +
    Connecticut healthcare companies, Florida Hospital, Colorado clinic
    March 2022 (paras 5-8, 33-36); South Korean manufacturer March 2023
    (paras 9, 51); NASA OIG Feb 2022, >17 GB (para 42); 4 US defense
    contractors — CA satellites, MI military equipment, OR
    maritime/uranium-processing, MA military-aircraft/satellite
    materials (paras 11-16, 43-48); Randolph + Robins AFBs via Log4Shell
    (paras 13-14, 45-46); Taiwanese + 2 South Korean defense companies,
    250 GB "tanks, fighter jets, rockets, and torpedoes" (paras 18-20,
    52); PRC-facilitated laundering — Hong Kong residents → Chinese bank
    → Dandong ATM at the Sino-Korean Friendship Bridge (paras 31-32).
    CORRECTIONS: refined outcome/summary — victims are healthcare
    providers (hospitals, clinic, healthcare companies) + a SK
    manufacturer, not just "hospitals"; Maui proper (Kansas, Florida)
    vs Maui-variant m.exe/aui.exe elsewhere; added the Shenzhen Chinese
    energy-company victim (paras 17, 49). The $10M State Dept Rewards
    for Justice figure is NOT in the indictment PDF (0 hits for "Rewards
    for Justice"/"$10"/"10 million"); it lives in the DOJ press release
