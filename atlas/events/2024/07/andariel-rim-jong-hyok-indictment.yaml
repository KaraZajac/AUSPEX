outcome_summary: |
  Kansas grand jury indictment of Rim Jong Hyok, a DPRK
  national affiliated with the Andariel cluster.
  Retrospective consolidation document covering: Maui
  ransomware deployment against US hospitals (May 2021–
  2023); NASA Office of Inspector General intrusion; 4 US
  defense contractors; 2 US Air Force bases; and ROK and
  Taiwan defense-industrial-base targets. The indictment
  articulates the canonical Andariel doctrine: ransomware
  proceeds laundered via PRC facilitators are used to
  purchase further attack infrastructure for defense-
  network intrusions. State Department $10M Rewards for
  Justice offer attached.
false_flag_risk: none
