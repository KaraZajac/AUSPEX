    notes: |
      The filed indictment (raw PDF captured this audit) names the
      Reconnaissance General Bureau (RGB) as "North Korea's primary
      military intelligence agency" (para 1) and identifies Andariel /
      Onyx Sleet / Silent Chollima as "a cyber unit within the RGB"
      (para 2), with Rim working in the RGB's Pyongyang and Sinuiju
      offices (para 24) — hence attribution_level named-unit (the
      controlling military-intelligence organ is explicitly named).
      Grand-jury indictment, so attributing_org_confidence high.
