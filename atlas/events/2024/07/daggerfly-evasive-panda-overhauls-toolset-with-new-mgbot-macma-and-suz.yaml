id: 2024-07/daggerfly-evasive-panda-overhauls-toolset-with-new-mgbot-macma-and-suz
name: "Daggerfly (Evasive Panda) overhauls toolset with new MgBot, Macma and Suzafk implants against Taiwan and a US NGO in China"
start_date: 2024-07-01
incident_type:
  - espionage
  - intrusion
initial_vector: n-day
false_flag_risk: none
summary: |
  Symantec's Threat Hunter Team reported that the Daggerfly (Evasive Panda / Bronze Highland) espionage group extensively updated its toolset, introducing new versions of the MgBot modular malware framework, a new variant of the Macma macOS backdoor, and the Trojan.Suzafk (Nightdoor/NetMM) Windows backdoor. The new tooling was deployed against organizations in Taiwan and a US-based NGO based in China, which Symantec said indicates the group also engages in internal espionage. In the attack on the NGO the operators exploited a vulnerability in an Apache HTTP server to deliver MgBot. Symantec assessed the activity was the work of Daggerfly based on shared code (a single shared library across the malware families) and shared command-and-control infrastructure.
