false_flag_risk: none
summary: |
  Symantec's Threat Hunter Team reported that the Daggerfly (Evasive Panda / Bronze Highland) espionage group extensively updated its toolset, introducing new versions of the MgBot modular malware framework, a new variant of the Macma macOS backdoor, and the Trojan.Suzafk (Nightdoor/NetMM) Windows backdoor. The new tooling was deployed against organizations in Taiwan and a US-based NGO operating inside mainland China, indicating internal espionage. In the attack on the NGO the operators exploited a vulnerability in an Apache HTTP server to deliver MgBot. Symantec assessed the activity was the work of Daggerfly based on shared code and infrastructure across the malware families.
