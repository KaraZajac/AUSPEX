summary: |
  Recorded Future's Insikt Group tracks RedNovember (formerly TAG-100; overlaps with Microsoft's Storm-2077), assessed as highly likely a Chinese state-sponsored espionage group, across activity from June 2024 to July 2025. The group weaponizes n-day exploits against internet-facing perimeter appliances (SonicWall, Cisco ASA, F5 BIG-IP, Palo Alto GlobalProtect, Fortinet FortiGate, Ivanti Connect Secure) and uses the Go-based Pantegana backdoor, Cobalt Strike, SparkRAT and the LESLIELOADER loader, with some spearphishing. Targeting spans government, defense, aerospace, technology, law firms and intergovernmental organizations, with notable interest in US defense contractors, Taiwanese tech firms and government bodies in Panama, South Korea and Southeast Asia. Activity timing correlates with geopolitical events of strategic concern to Beijing.
