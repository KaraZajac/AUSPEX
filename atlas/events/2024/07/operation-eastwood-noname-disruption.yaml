    [a] FACTS — corrected against the raw. RAW: "Between 14 and 17
    July, a joint international operation, known as Eastwood and
    coordinated by Europol and Eurojust, targeted the cybercrime
    network NoName057(16)"; "During the action day on 15 July"; "Over
