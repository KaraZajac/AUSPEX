id: 2024-07/operation-eastwood-noname-disruption
name: Europol Operation Eastwood — NoName057(16) DDoSia infrastructure takedown
start_date: 2024-07-15
disclosure_date: 2024-07-17
end_date: 2024-07-17
incident_type:
  - disruption
initial_vector: n-a
outcome_summary: |
  Europol-coordinated takedown of NoName057(16)'s DDoSia
  infrastructure: >100 servers across 13 countries seized or
  rendered inoperable, two arrests (Spain), six EU arrest warrants
  issued (primarily for Russian-national operators), notifications
  to ~1,000 known DDoSia volunteers about their criminal exposure.
  Operation Eastwood is the canonical EU-side enforcement response
  to Russia's post-2022 hacktivist-proxy mobilization.
false_flag_risk: none
summary: |
  Significant as the first multinational law-enforcement disruption
  of a Russian "hacktivist" front at scale. Followed by DOJ
  December 2025 announcement that NoName was a state-sanctioned
  project administered partially through CISM. NoName claimed to
  return to operations within days; the disruption value is more
  signaling and intelligence than long-term reduction in capability.
