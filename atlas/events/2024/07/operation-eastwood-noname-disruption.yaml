    administrators, notified for their legal liability". CORRECTIONS:
    (1) "13 countries" → "worldwide / twelve participating countries"
    (Europol says servers "worldwide" and lists 12 core countries; no
    "13 countries" figure — the 13 is the "13 individuals questioned"
    count, mis-carried). (2) "two arrests (Spain)" → "2 arrests (1
