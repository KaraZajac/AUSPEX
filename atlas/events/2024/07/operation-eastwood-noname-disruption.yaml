id: 2024-07/operation-eastwood-noname-disruption
name: Europol Operation Eastwood — NoName057(16) DDoSia infrastructure takedown
start_date: 2025-07-15  # action day per Europol ("During the action day on 15 July"); op window 14-17 Jul 2025; year corrected 2024→2025
disclosure_date: 2025-07-16  # release published 2025-07-16 (page's own SERVER_DATA "published" timestamp = 12:04 UTC)
end_date: 2025-07-17  # operation window close per "Between 14 and 17 July"
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown
outcome_summary: |
  Europol/Eurojust-coordinated takedown (Operation Eastwood; main
  action day 15 July 2025, operation window 14-17 July): over 100
  servers disrupted worldwide and a major part of NoName057(16)'s
  central server infrastructure taken offline. Two arrests (1
  preliminary arrest in France, 1 in Spain); seven arrest warrants
  issued (6 by Germany, 1 by Spain), directed inter alia against six
  Russian nationals (five profiles added to the EU Most Wanted list);
  24 house searches across six countries; 13 individuals questioned;
  over 1,000 supporters (incl. 15 administrators) notified of their
  criminal liability via a messaging app. Twelve countries took
  simultaneous action against the network.
false_flag_risk: none
notes: |
  Date-corrected 2026-06-20 (2024→2025) and refined 2026-07-04 against the raw Europol
  release: Operation Eastwood ran 14-17 July 2025 (main action day 15 July); the press
  release was published 16 July 2025 (page's own SERVER_DATA publish timestamp). Prior
  figures "13 countries / 6 EU warrants" were corrected to the source's actual numbers
  (twelve participating countries; 7 warrants = 6 Germany + 1 Spain; 2 arrests = 1 France
  + 1 Spain). The id/slug retains "2024-07" per the stable-slug rule; only the date fields
  were corrected. Consider an alias-rename to 2025-07 if slug/date alignment is wanted
  before the v1.0 freeze.
summary: |
  A multinational law-enforcement disruption of the pro-Russian
  DDoS-"hacktivist" network NoName057(16), coordinated by Europol and
  Eurojust. Europol characterises NoName057(16) as a decentralised,
  gamified volunteer network — no formal leadership, crypto-incentivised
  sympathisers using the DDoSia tool — that shifted from targeting
  Ukraine to attacking Ukraine-supporting and NATO states. A subsequent
  US DOJ announcement (December 2025) assessed NoName as a
  state-sanctioned project whose DDoSia infrastructure was built in part
  by employees of an IT organisation established by a 2018 Russian
  presidential order (CISM), with the Russian government providing
  financial support. Given the network's decentralised, volunteer-driven
  structure, the disruption's value is assessed as more signaling and
  intelligence-gathering than a durable degradation of capability.
