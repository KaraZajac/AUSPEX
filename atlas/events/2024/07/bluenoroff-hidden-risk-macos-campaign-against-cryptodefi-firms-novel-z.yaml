summary: |
  SentinelOne (SentinelLABS) disclosed the 'Hidden Risk' campaign — attributed with high confidence to BlueNoroff (suspected DPRK-affiliated, Lazarus subcluster) — targeting cryptocurrency and DeFi businesses on macOS from around July 2024. Email/PDF lures with fake crypto-news headlines delivered a Swift dropper displaying a decoy PDF and a C++ backdoor ('growth'), using a first-in-the-wild persistence technique that abuses the Zshenv configuration file. Aligns with an FBI warning that the DPRK runs tailored social-engineering against DeFi/crypto employees to steal company cryptocurrency. Distinct from the 2022 BlueNoroff VC-impersonation MoTW event already in the corpus (BlueNoroff is currently a singleton there).
