id: 2024-07/bluenoroff-hidden-risk-macos-campaign-against-cryptodefi-firms-novel-z
name: "BlueNoroff 'Hidden Risk' macOS campaign against crypto/DeFi firms (novel Zshenv persistence)"
start_date: 2024-07-01   # campaign onset; SentinelLABS: "likely began as early as July 2024"
disclosure_date: 2024-11-07   # SentinelLABS report publication (datePublished in page metadata)
incident_type:
  - financial-theft
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  SentinelOne (SentinelLABS) disclosed the 'Hidden Risk' campaign — attributed with high confidence to BlueNoroff (suspected DPRK threat actor, Lazarus/BlueNoroff cluster) — targeting cryptocurrency and DeFi businesses on macOS in a campaign SentinelLABS assesses likely began as early as July 2024 (report published 2024-11-07). Email/PDF lures with fake crypto-news headlines delivered a Swift dropper displaying a decoy PDF and a C++ backdoor ('growth', ~5.1 MB, unsigned), using a first-in-the-wild persistence technique that abuses the Zsh configuration file zshenv. In early September 2024 the FBI warned that North Korea runs highly tailored social-engineering against employees of DeFi, cryptocurrency, and similar businesses. Distinct from the 2022 BlueNoroff VC-impersonation MoTW event already in the corpus.
