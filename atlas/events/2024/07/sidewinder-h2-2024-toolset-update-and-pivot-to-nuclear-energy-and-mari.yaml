false_flag_risk: none
summary: |
  Kaspersky GReAT documented a significant SideWinder toolset update and target expansion during H2 2024: alongside its usual government/military targets, the group showed specific interest in nuclear power plants and nuclear-energy agencies in South Asia and a sharp increase in attacks on maritime infrastructure, port authorities and logistics companies, plus geographic expansion (Djibouti, Egypt, and further into Africa, the Middle East and Southeast Asia).
