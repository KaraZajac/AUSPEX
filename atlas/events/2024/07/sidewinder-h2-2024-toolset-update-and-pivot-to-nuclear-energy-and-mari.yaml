id: 2024-07/sidewinder-h2-2024-toolset-update-and-pivot-to-nuclear-energy-and-mari
name: "SideWinder H2 2024 toolset update and pivot to nuclear-energy and maritime/port targets across South Asia, Middle East and Africa"
start_date: 2024-07-01
incident_type:
