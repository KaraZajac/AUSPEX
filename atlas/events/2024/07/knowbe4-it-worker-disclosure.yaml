id: 2024-07/knowbe4-it-worker-disclosure
name: KnowBe4 DPRK IT-worker infiltration self-disclosure
start_date: 2024-07-15  # company-issued Mac first-boot detection
disclosure_date: 2024-07-23
end_date: 2024-07-23
incident_type:
  - intrusion
  - documentary
initial_vector: insider
outcome_summary: |
  KnowBe4 publicly disclosed having unknowingly hired a
  DPRK IT worker for a US-based principal software engineer
  role. Identity verification was passed via stolen
  US-citizen identity, stock-photo headshot enhanced with
  AI, and four rounds of video-call interviews. The hire
  was detected when the company-issued Mac began loading
  malware on first boot from the laptop-farm hosting
  address; the hire was terminated and never had any
  access to KnowBe4 customer systems or data. Canonical
  public case study of the IT-worker-fraud detection
  lifecycle from the victim organization's perspective.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Reference case for the IT-worker fraud program's modern
  identity-validation defeats and the detection signature
  on the malware-loading side. Published two months after
  Treasury sb0416 designations and the Chapman superseding
  indictment, KnowBe4's disclosure documents that the
  scheme defeats AI-augmented identity verification (deepfake
  video interviews) and that the post-hire malware-load
  pattern (laptop-farm address, first-boot beaconing) is
  the most reliable detection signature.
