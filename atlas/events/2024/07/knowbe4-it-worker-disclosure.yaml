id: 2024-07/knowbe4-it-worker-disclosure
name: KnowBe4 DPRK IT-worker infiltration self-disclosure
start_date: 2024-07-15  # 2024-07-15 21:55 EST — malware-load / suspicious activity detected on the company-issued Mac (KnowBe4 SOC timeline)
disclosure_date: 2024-07-23  # blog published_on; HTML datePublished = 2024-07-23T14:14:55Z
end_date: 2024-07-15  # SOC contained the device ~22:20 EST the same day; the worker then went unresponsive
incident_type:
  - insider
  - disclosure
initial_vector: insider
outcome_summary: |
  KnowBe4 publicly disclosed having unknowingly hired a
  DPRK fake IT worker into a US-based Principal Software
  Engineer role on its internal IT AI team. Pre-hire
  identity verification passed via a valid but stolen
  US-citizen identity, an AI-enhanced stock-photo headshot,
  and four video-conference interviews that confirmed the
  applicant matched the photo. The company-issued Mac began
  loading malware the moment it was received at the
  "IT mule laptop farm" address; EDR flagged the activity
  on 2024-07-15 (21:55 EST) and the SOC contained the
  device ~25 minutes later. KnowBe4 states no illegal
  access was gained and no data was lost, compromised, or
  exfiltrated — the new hire had no access to production
  systems. Findings were corroborated with Mandiant and the
  FBI. Canonical first-party case study of the
  IT-worker-fraud detection lifecycle from the victim's
  perspective.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  First-party reference case for the DPRK IT-worker fraud
  scheme, disclosed by the victim organization. KnowBe4's
  account documents the scheme's identity-validation
  defeats — a valid but stolen US-citizen identity, an
  AI-enhanced stock-photo headshot, and a real applicant
  who passed four video-conference interviews — and the
  post-hire detection signature: the company-issued Mac
  began loading malware the moment it reached the
  laptop-farm address (the worker used a Raspberry Pi to
  download malware and manipulated session-history files),
  which EDR flagged and the SOC contained the same day.
  KnowBe4 attributes the ring to North Korea (a
  "well-organized, state-sponsored, large criminal ring")
  whose workers "give a large amount to North Korea to fund
  their illegal programs," and corroborated its findings
  with Mandiant and the FBI.
