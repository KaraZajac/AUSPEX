  notes: |
    Audited vs the FIRST-PARTY KnowBe4 blog "How a North Korean Fake IT Worker Tried to
    Infiltrate Us" (blog.knowbe4.com). Raw snapshot captured:
    knowbe4__2024-07-23_north-korean-fake-it-worker.html, sha256 a5f8e7d2…7caa147b,
    207726 bytes. STEP-0 triage: HTML <title> + article body match the event → NOT a
    phantom; the source is the authoritative first-party account → normal 6-point audit.

    [a] FACTS — over-claims stripped/corrected against the raw:
      • "deepfake video interviews" REMOVED (fabrication). Narrative: HR "conducted four
        video conference based interviews … confirming the individual matched the photo,"
        the still headshot being AI-"enhanced" stock photography; NO deepfake-video claim.
        All 3 "deepfake" hits in the file are the blog's topic-tag sidebar ("Deepfake (55)"
        category count), not incident text.
      • "first-boot beaconing" REMOVED. Raw: "the moment it was received, it immediately
        started to load malware"; "He used a raspberry pi to download the malware";
        "manipulate session history files … execute unauthorized software." 0 hits for
        "beacon" / "first boot"; reworded to source-accurate malware-load/download.
      • "the most reliable detection signature" (AUSPEX generalization) softened — raw says
        only "The EDR software detected it and alerted our InfoSec Security Operations Center."
      • "Published two months after Treasury sb0416 designations and the Chapman superseding
        indictment" REMOVED from summary — not source-carried: 0 hits for sb0416 / Chapman /
        WMD / ballistic / 800M / Office 39; "Treasury"/"OFAC" appear only in link/meta chrome,
        not the prose. (The WMD-financing linkage is retained where it belongs — as an explicit
        AUSPEX inference in the doctrine_link.)
      • "terminated" REMOVED (outcome_summary + target.outcome). 0 hits for terminat/fired/
        dismiss; raw says the SOC "contained XXXX's device" and the worker "became
        unresponsive." Reworded to containment.
      KEPT (verbatim-carried): Principal Software Engineer; "valid but stolen US-based
      identity" + AI-"enhanced" stock photo; four video-conference interviews; company Mac
      loaded malware on receipt; EDR→SOC detection; "IT mule laptop farm" + VPN from "North
      Korea or over the border in China" + night-shift cover; Raspberry Pi malware download;
      corroboration with Mandiant (4 hits) + FBI (2 hits); "No illegal access was gained, and
      no data was lost, compromised, or exfiltrated" + "not a data breach"; "no access to
      production systems"; workers "give a large amount to North Korea to fund their illegal
      programs."

    [b] ATTRIBUTION — actor kp/it-worker-fraud (resolves ✓). KnowBe4 states unequivocally
    "this was a fake IT worker from North Korea," a "state-sponsored, large criminal ring"
    (North Korea = 20 hits), corroborated with Mandiant + FBI → attributing_org_confidence
    high SUPPORTED; auspex_assessment concur KEPT. REWROTE the notes: the prior notes claimed
    KnowBe4 attributed "by tradecraft consistency with the Treasury sb0416 / Chapman /
    14-national indictment pattern" — that is (i) not KnowBe4's stated basis (Mandiant+FBI
    corroboration is) and (ii) anachronistic (the 14-national DOJ indictment is 2024-12-12,
    five months AFTER this 2024-07-23 blog). Also removed the "first-boot malware beaconing"
    phrase.

    [c] DATES — start_date 2024-07-15 KEPT ("On July 15, 2024, a series of suspicious
    activities were detected … beginning at 9:55pm EST"); comment corrected from "first-boot
    detection." disclosure_date 2024-07-23 CONFIRMED vs HTML datePublished 2024-07-23T14:14:55Z.
    end_date CORRECTED 2024-07-23 → 2024-07-15 (was conflated with disclosure_date; device
    contained ~10:20pm EST the same day). Source published_on 2024-07-23 confirmed on the
    source record.

    [d] DOCTRINE_LINKS — kp/8th-congress-defense-plan / revenue-aggregation / it-worker-fraud
    KEPT at strongly_inferred (correct: source names only the proximate "illegal programs"
    goal, not the terminal WMD/ballistic-missile end — per the doctrine file's per-event
    attestation rule and the vendor-blog→strongly_inferred steer). Refined reasoning; ADDED
    inference_basis {signals[], ruled_out} (was missing) and attesting_source_id = the knowbe4
    source (schema: on strongly_inferred, denotes the primary supporting source). perspective
    left default (attacker-rationale — DPRK doctrine on a DPRK op). Correctly NOT attested.

    [e] ATTRIBUTION_LEVEL — was MISSING; SET to nation. KnowBe4 named the country (North
    Korea) + the IT-worker-fraud modus and corroborated with Mandiant/FBI, but named no
    specific vendor-tracked group/unit → nation (not named-actor).

    [f] ACTOR_ID — kp/it-worker-fraud resolves to atlas/actors/kp/it-worker-fraud.yaml
    (well-developed; status: sanctioned). NB two-segment id (no service segment) — unusual
    but functional (primary_service_id kp/office-39 → state kp; the cluster is deliberately
    cross-service). Not a defect.

    incident_type CORRECTED [intrusion, documentary] → [insider, disclosure]: KnowBe4
    explicitly states "No illegal access was gained … This is not a data breach," so
    "intrusion" (successful) over-states — the malware-load was an attempted insider compromise
    contained in ~25 min; the report is titled "Incident Report Summary: Insider Threat" and is
    a first-party self-disclosure → insider (operational) + disclosure (meta). data-theft
    correctly absent (none occurred).

    SOURCE re-tier: knowbe4/2024-07-23 secondary → primary (first-party disclosure of KnowBe4's
    own incident) + raw_snapshot/content_sha256 added. FLAG: source kind:journalism is arguably
    miscategorized (first-party vendor incident report, not third-party journalism) — preserved
    per protocol, flagged for orchestrator.

    Residual uncertainty: none load-bearing. "AI-enhanced" describes the still headshot
    (explicit in-source); the live video calls were passed by a real person using the stolen
    identity — no deepfake-video claim exists in the source.
