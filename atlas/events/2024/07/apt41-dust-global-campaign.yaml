qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-04
  level: full
  notes: |
    Audited vs Mandiant / Google-TAG "APT41 Has Arisen From the DUST" (2024-07-18).
    Raw snapshot mandiant__2024-07-18_apt41-dust.html reused from the 2026-06-24
    audit; sha256 RE-VERIFIED 011424d4...6dd725f0 (full
    011424d433c4eac3f6cc94305e55768df98a510b317a4eb826a2da306dd725f0), 391507 bytes.

    [a] FACTS corrected to the report. Verbatim: "Mandiant has observed a sustained
    campaign by the advanced persistent threat group APT41 targeting and
    successfully compromising multiple organizations operating within the global
    shipping and logistics, media and entertainment, technology, and automotive
    sectors. The majority of organizations were operating in Italy, Spain, Taiwan,
    Thailand, Turkey, and the United Kingdom. APT41 successfully infiltrated and
    maintained prolonged, unauthorized access to numerous victims' networks since
    2023." Tradecraft verbatim: "APT41 used a combination of ANTSWORD and BLUEBEAM
    web shells for the execution of DUSTPAN to execute BEACON backdoor ... Later in
    the intrusion, APT41 leveraged DUSTTRAP, which would lead to hands-on keyboard
    activity. APT41 used publicly available tools SQLULDR2 for copying data from
    databases and PINEGROVE to exfiltrate data to Microsoft OneDrive." DUSTPAN = "an
    in-memory dropper written in C/C++"; DUSTTRAP = "a multi-stage plugin framework".
    CORRECTIONS: (1) removed "government" from victim sectors — the string
    "government" appears ONLY in a reference-link title ("...APT41 Targeting U.S.
    State Governments", the 2022 USAHerds report), never as a DUST victim sector.
    (2) Singapore DEMOTED from victim country to reconnaissance-only: "Mandiant has
    detected reconnaissance activity directed towards similar organizations ... such
    as Singapore. At the time of the publication, neither Mandiant nor Google TAG
    have any indicators of these organizations being compromised." Six confirmed
    victim countries: IT, ES, TW, TH, TR, UK. (3) removed the fabricated Mandiant
    framing "assessed long-dwell strategic-collection posture ... aligned to
    BRI-relevant logistics intelligence" — the strings "strategic", "Belt and Road",
    "BRI", and "maritime" do NOT appear in the report (grep count 0 each); Mandiant
    assesses no motive. (4) added SQLULDR2 / PINEGROVE->OneDrive exfil and the
    DUSTTRAP "multi-stage plugin framework" description. Did NOT re-introduce
    CCleaner (that compromise is APT17 per the actor file).

    [b] ATTRIBUTION — "In collaboration with Google's Threat Analysis Group (TAG),
    Mandiant has observed..." supports attributing_org "Mandiant + Google TAG";
    Mandiant asserts the APT41 attribution without hedging (high). MSS caveat kept:
    the report says only "Chinese state-sponsored espionage activity" / "China-based
    actors" — no "Ministry of State Security" / "MSS" string (grep 0). Added
    attribution notes that the cn/mss placement rests on the DOJ Sept-2020 "boast"
    framing, not this report.

    [c] DATES — published_on / disclosure 2024-07-18 correct. start_date 2023-01-01
    is the best-estimate encoding of "since 2023" (no month given). end_date CHANGED
    2024-07-18 -> null: the prior value duplicated the disclosure date; the report
    describes prolonged/ongoing access ("over an extended period"; DUSTTRAP campaigns
    "in 2024") and declares no operational end — reusing the disclosure date was a
    conflation. initial_vector CHANGED phishing -> unknown: "phishing" does not
    appear in the report (grep 0) and no initial-access vector is stated.

    [d] DOCTRINE — the report states NO strategic purpose (no goal language; no
    BRI / MIC2025 / 15th-FYP / Taiwan-reunification framing), so no link can be
    attested; all four attesting_source_id remain null. Mandiant's own dual-mission
    caveat ("Chinese state-sponsored espionage ... in addition to financially
    motivated activity that may be outside of state control") means a commercial /
    general-espionage reading competes with every state-doctrine reading. DOWNGRADED
    cn/bri, cn/mic2025, and cn/taiwan-reunification from strongly_inferred ->
    plausible (more than one strategic reading survives; the four-doctrine spread is
    itself evidence no single reading dominates); cn/15th-fyp kept plausible. Added
    inference_basis.alternatives to all four.

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): the source names the group
    "APT41" + "Chinese state-sponsored", no service/unit.

    [f] ACTOR_ID — cn/mss/apt41 resolves to atlas/actors/cn/apt41.yaml (id
    cn/mss/apt41); no change.

    TARGETS — replaced sectors/transport/road (road transport / connected-vehicle)
    with sectors/manufacturing/automotive (OEM/parts) — the report's "automotive" =
    manufacturers; and sectors/media -> sectors/media/entertainment to match "media
    and entertainment". Kept transport/maritime (shipping), transport/logistics, ict
    (technology).

    RESIDUAL UNCERTAINTIES / FLAGS: exact start month within 2023 not given; the
    report gives sector->region bands (shipping/logistics = Europe+ME;
    media/entertainment = Asia) but no clean sector x country matrix, so no per-target
    country codes assigned; the Taiwan victim's sector is unstated, weakening the
    Taiwan-reunification link (kept plausible). FLAG for Kara: cn/15th-fyp/
    modernized-industrial-system largely duplicates the cn/mic2025 industrial-policy
    reading and the 15th FYP postdates the ops — a candidate for removal.
