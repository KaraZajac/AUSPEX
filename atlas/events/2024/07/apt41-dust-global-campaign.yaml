id: 2024-07/apt41-dust-global-campaign
name: APT41 "DUST" global campaign (Mandiant / Google TAG)
start_date: 2023-01-01
disclosure_date: 2024-07-18  # Mandiant report
end_date: 2024-07-18
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  APT41 multi-year intrusion campaign against shipping and
  logistics, technology, automotive, media, and government in
  UK, Italy, Spain, Turkey, Taiwan, Thailand, and Singapore.
  Tradecraft: ANTSWORD and BLUEBEAM web shells → DUSTPAN
  in-memory dropper → BEACON; DUSTTRAP for follow-on
  collection. Mandiant assessed long-dwell strategic-collection
  posture across the target set, with a particular focus on
  shipping / logistics aligned to BRI-relevant logistics
  intelligence.
false_flag_risk: none
summary: |
  Reaffirms APT41's continued state-tasked operations after
  the 2020 DOJ indictment of five named cluster members. The
  geographic target spread (UK + EU + Mediterranean + Taiwan +
  ASEAN) tracks Belt and Road logistics corridors plus
  Taiwan-island and EU industrial-system collection.
