id: 2024-07/apt41-dust-global-campaign
name: APT41 "DUST" global campaign (Mandiant / Google TAG)
start_date: 2023-01-01  # Mandiant: access maintained "since 2023" (no month given)
disclosure_date: 2024-07-18  # Mandiant / Google TAG report
end_date: null  # report describes prolonged/ongoing access ("over an extended period"); declares no op end — do NOT conflate with disclosure
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: unknown  # report states no initial-access vector; web shells were only the earliest observed stage
false_flag_risk: none
outcome_summary: |
  Mandiant, with Google's Threat Analysis Group (TAG), disclosed a
  sustained APT41 campaign that compromised organizations in the
  global shipping and logistics, media and entertainment,
  technology, and automotive sectors. Most victims operated in
  Italy, Spain, Taiwan, Thailand, Turkey, and the United Kingdom;
  shipping/logistics victims were concentrated in Europe and the
  Middle East, while media and entertainment victims were in Asia.
  APT41 infiltrated and maintained prolonged, unauthorized access
  since 2023, extracting sensitive data over an extended period.
  Tradecraft: ANTSWORD and BLUEBEAM web shells executed DUSTPAN
  (an in-memory dropper) to load the BEACON backdoor for C2; later
  in the intrusions APT41 deployed DUSTTRAP, a multi-stage plugin
  framework, leading to hands-on-keyboard activity. Data was
  collected with SQLULDR2 (dumping Oracle databases) and
  exfiltrated to Microsoft OneDrive via PINEGROVE. Mandiant also
  detected reconnaissance toward similar organizations in
  Singapore, with no confirmed compromise there.
summary: |
  A China-nexus APT41 espionage campaign against strategic-collection
  targets — shipping and logistics, technology, automotive, and media
  and entertainment — spanning the UK, EU, Mediterranean, Taiwan, and
  ASEAN, disclosed years after the 2020 DOJ indictment of five named
  cluster members yet showing APT41's continued activity. Mandiant
  tracks APT41 as conducting Chinese state-sponsored espionage
  alongside financially motivated activity that "may be outside of
  state control"; the report states no strategic motive for this
  campaign, so the doctrine links below are AUSPEX intent-inferences,
  not Mandiant assessments.
attributions:
  - actor_id: cn/mss/apt41
    attributing_org: Mandiant + Google TAG
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-07-18
    attribution_source_id: mandiant/2024-07-18_apt41-dust
    notes: |
      The report attributes the campaign to APT41 (named actor) and
      characterizes it as "Chinese state-sponsored espionage activity"
      (nation level); it does NOT name the Ministry of State Security or
      any Chinese service — hence attribution_level named-actor, not
      named-unit. The actor's cn/mss placement rests on the DOJ's
      September 2020 indictment (a defendant "Allegedly Boasted of
      Connections to the Chinese Ministry of State Security"), a boast
      framing, not on this report.
doctrine_links:
  - doctrine_id: cn/bri
    pillar_id: cn/bri/maritime-and-port
    program_id: null
    confidence: plausible
    reasoning: |
      Shipping and logistics is the campaign's standout sector, with
      victims concentrated in Europe and the Middle East — a target set
      consistent with BRI maritime-and-port logistics-intelligence
      collection. Plausible, not higher: the report states no strategic
      purpose and never mentions the Belt and Road Initiative or
      maritime/port intelligence, and the same targeting reads equally
      as broad commercial espionage against multinational logistics
      firms.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "BRI maritime-and-port intelligence: shipping/logistics is the campaign's dominant, Europe/Middle-East-concentrated sector, matching PRC interest in global port and logistics-corridor intelligence."
        - "General commercial/economic espionage: APT41 is a dual-mission contractor, so targeting multinational shipping/logistics firms for competitive intelligence is an equally strong reading absent any stated motive."
    contested: false
    analyst: claude
  - doctrine_id: cn/mic2025
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      Technology and automotive targeting in the EU and UK maps to Made
      in China 2025 priority sectors (next-generation IT, new-energy
      vehicles). Plausible rather than higher because the source states
      no purpose, never names MIC2025 or any industrial-policy goal, and
      the same targeting is explicable as generic IP / commercial
      espionage.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "MIC2025 industrial-policy collection: technology + automotive victims align with MIC2025 priority sectors (next-gen IT, NEV)."
        - "Generic IP/commercial espionage: technology and automotive IP theft is a routine espionage objective that needs no MIC2025-specific reading."
    contested: false
    analyst: claude
  - doctrine_id: cn/15th-fyp
    pillar_id: cn/15th-fyp/modernized-industrial-system
    program_id: null
    confidence: plausible
    reasoning: |
      Foreign industrial and technology collection is a precondition for
      the 15th FYP modernized-industrial-system pillar, and the 2023-24
      activity falls in the 14th-to-15th FYP transition window. Plausible
      only: the 15th FYP was not yet published during the operations, the
      source states no purpose, and this reading substantially overlaps
      the MIC2025 industrial-policy reading above.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "15th FYP modernized-industrial-system precondition: industrial/technology collection abroad feeds the industrial-base modernization the pillar encodes."
        - "MIC2025 / general industrial espionage: the same tech/automotive collection is already covered by the MIC2025 reading, with no distinct 15th-FYP purpose evidenced."
    contested: false
    analyst: claude
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/taiwan-island-collection
    program_id: null
    confidence: plausible
    reasoning: |
      Taiwan is one of the six victim geographies. Plausible only: the
      report does not identify the sector or intelligence value of the
      Taiwan victim(s) (its Asia-based victims were in media and
      entertainment), states no cross-strait purpose, and Taiwan's
      presence as one of several commercial-sector victim countries does
      not by itself indicate island-collection tasking.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Taiwan-island collection: Taiwan is a named victim country and a standing PRC intelligence priority."
        - "Incidental commercial targeting: the Taiwan victim(s) may be media/entertainment or technology firms hit within the broader commercial campaign, with no cross-strait political/military intelligence value established."
    contested: false
    analyst: claude
