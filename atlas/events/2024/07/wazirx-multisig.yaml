qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: full
  notes: |
    PHANTOM-REMEDIATION -> RE-SOURCE (+ attribution recalibration + doctrine upgrade). The
    sole prior citation (elliptic/2024-07-19_wazirx-lazarus) was url:null and unverifiable
    (phantom-class); the incident is real and well-documented, so re-sourced to three
    reachable, hashed primaries: Elliptic "$235 million lost by WazirX in North Korea-linked
    breach" (url filled; snapshot c55c6dc9..dbe2079b, 322,862 bytes, pub 2024-07-19);
    US-ROK-Japan State Dept "Joint Statement on Cryptocurrency Thefts by the DPRK..." (NEW
    govt-primary; 57d11694..d74ebdca, 147,040 bytes, pub 2025-01-14); Halborn "Explained: The
    WazirX Hack (July 2024)" (NEW vendor-research; 06350e5c..a7f6e2039, 233,118 bytes, pub
    2024-07-23).

    [a] FACTS. Amount $235M CONFIRMED (Elliptic "$235 million"; State Dept "WazirX for $235
    million"; Halborn "nearly $235 million"; Wikipedia $234.9M). VECTOR CORRECTED — the prior
    outcome_summary claimed "private-key exfiltration upstream of WazirX itself," which is
    WRONG. Halborn: 4-of-6 Gnosis Safe, "Five keys held by WazirX; one key controlled by
    Liminal"; attacker exploited "discrepancies between how a transaction appeared in the
    Liminal interface and the actual transaction data," submitting "a transaction that
    appeared benign - causing the four parties to sign it - while including the malicious
    payload"; malicious contract "deployed by the attacker eight days earlier." So the
    mechanism is signing-interface/blind-signing manipulation (co-signers signed with their
    real keys) — NOT key theft. asset_classes [ETH,USDT,SHIB,MATIC] -> [SHIB,ETH,MATIC]:
    Elliptic itemizes "more than 200 different assets, including around $96.7m of Shiba Inu,
    $52.6m of Ether, $11 million of Matic"; USDT is carried by no hashed source (count 0 in
    the Elliptic snapshot) -> dropped. Added the WazirX<->Liminal blame dispute (Halborn does
    not assign compromise to either party). Removed the unsupported "TRM Labs published
    on-chain attribution to Lazarus" (no TRM source snapshotted; and see [b]).

    [b] ATTRIBUTION — load-bearing recalibration (task: attribution care). Prior: single
    Elliptic entry, kp/rgb/lazarus at HIGH, "Elliptic clustering attribution ... to Lazarus."
    OVERSTATED: the Elliptic snapshot says (verbatim) "On-chain analysis and other information
    reviewed by Elliptic indicates that this hack was perpetrated by hackers affiliated with
    North Korea" and does NOT mention "Lazarus" anywhere (term count 0). Elliptic reached
    NATION-level ("North Korea"), MODERATE confidence ("indicates" + on-chain heuristics) —
    downgraded high->moderate, attribution_level nation, assessment concur->concur-with-caveat.
    BUT firm DPRK attribution IS supported (not "only Elliptic"): added a second dated entry
    for the 14 Jan 2025 US-ROK-Japan joint statement (verbatim) "The United States and
    Republic of Korea additionally attribute to the DPRK, based on detailed industry analysis,
    thefts last year against WazirX for $235 million" — govt, HIGH, attribution_level nation
    (WazirX attributed to "the DPRK"; the statement names "the Lazarus Group" only generally,
    not in the WazirX sentence). actor kp/rgb/lazarus KEPT (corpus DPRK-financial umbrella,
    which the statement names as the responsible DPRK crypto group); incident-specific
    granularity is nation on both entries. The two entries capture the attribution latency
    (on-chain vendor Jul-2024 -> two-government Jan-2025).

    [c] DATES. start/disclosure/end 2024-07-18 CONFIRMED (breach 18 Jul 2024). Source
    published_on set to actual pub dates: Elliptic 2024-07-19 (slug retained; blog dates the
    breach 18 Jul), State Dept 2025-01-14 (datePublished 2025-01-14T13:36:32+00:00), Halborn
    2024-07-23 (earliest page ISO timestamp 2024-07-23T08:20:09). No date-sanity issues.

    [d] DOCTRINE_LINKS — UPGRADED strongly_inferred -> attested. The event's own cited govt
    source states the terminal goal in substance (verbatim): "...to recover stolen funds with
    the ultimate goal of denying the DPRK illicit revenue for its unlawful weapons of mass
    destruction and ballistic missile programs," AND names WazirX among the thefts attributed
    to the DPRK. This is the standardized-WMD-language attested bar the doctrine file spells
    out (Treasury/OFAC pattern) — distinct from DMM/Bybit (held strongly_inferred) whose FBI
    PSAs stated only proximate "generate revenue for the regime." Set attesting_source_id +
    inference_basis {source_quote, source_id} to the joint statement. All three FKs
    (doctrine/pillar/program) resolve; contested false; perspective attacker-rationale (default).

    [e] ATTRIBUTION_LEVEL — set nation on both entries (sources reach "North Korea"/"the DPRK"
    for this specific theft; no source names a group for the WazirX incident itself).

    [f] ACTOR_ID — kp/rgb/lazarus RESOLVES (atlas/actors/kp/lazarus.yaml declares id
    kp/rgb/lazarus; file path is flatter than the id, as with siblings). Actor record carries
    a 2026-06-25 audit confirming the RGB service placement for the Lazarus umbrella. No actor
    edit.

    FLAGS: (1) targets/orgs/wazirx.yaml has sources: [] and a summary asserting "multiple
    Elliptic / TRM blockchain attributions to the DPRK Lazarus Group" — same Lazarus/TRM
    overstatement + unsourced; recommend aligning it to nation-level DPRK and adding the
    joint-statement source (target-registry files out of scope for this audit). (2) The prior
    elliptic source title referenced a "laundering" follow-up post; url filled to the live
    "North Korea-linked breach" attribution post actually snapshotted, title corrected to
    match. RESIDUALS: the ~$7.6M 4th asset in Elliptic's list is not fully legible in the
    snapshot, so asset_classes lists only the three assets Elliptic names with dollar values;
    whether Liminal's or WazirX's environment was breached is genuinely disputed and left
    unresolved in prose; initial_vector kept supply-chain (subverted third-party signing
    workflow + pre-staged contract) with the dispute flagged.
