id: 2024-07/wazirx-multisig
name: WazirX multisig wallet drain (Gnosis Safe signing-interface manipulation)
start_date: 2024-07-18
disclosure_date: 2024-07-18
end_date: 2024-07-18
incident_type:
  - financial-theft
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Approximately USD 235M drained from a WazirX-controlled
  Gnosis Safe multisig wallet (4-of-6; five keys held by
  WazirX, one by custody vendor Liminal). Vector: eight days
  before the drain the attacker deployed a malicious smart
  contract, then exploited a discrepancy between the
  transaction shown in the Liminal signing interface and the
  actual transaction payload, causing the co-signers to
  approve a benign-looking transaction that in fact replaced
  the Safe with the attacker's contract — signing-interface /
  blind-signing manipulation, not private-key theft. Elliptic
  assessed on-chain that the hack was "perpetrated by hackers
  affiliated with North Korea"; the United States and Republic
  of Korea later attributed the $235M theft to the DPRK in a
  14 January 2025 trilateral joint statement (issued with
  Japan). WazirX and Liminal publicly blamed each other for
  the compromise.
quantified_impact:
  usd_stolen: 235000000
  asset_classes:
    - SHIB
    - ETH
    - MATIC
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  One of the defining 2024 DPRK-attributed crypto-exchange
  thefts. ~$235M (more than 200 different assets — Elliptic
  itemizes ~$96.7M Shiba Inu, ~$52.6M Ether, ~$11M Matic) was
  drained from a WazirX Gnosis Safe multisig by manipulating
  the signing workflow: a payload/interface-display
  discrepancy caused the legitimate co-signers to approve a
  malicious contract-upgrade transaction, with the attacker's
  contract staged eight days in advance. Attribution developed
  with latency: on-chain analytics firm Elliptic assessed the
  hack as North Korea-affiliated within a day (moderate;
  on-chain heuristics; it did NOT name Lazarus), and the US
  and ROK governments formally attributed the $235M theft to
  the DPRK in the 14 Jan 2025 trilateral joint statement,
  which also states the DPRK's crypto-theft proceeds fund its
  "unlawful weapons of mass destruction and ballistic missile
  programs" and names the Lazarus Group as a designated DPRK
  threat group. Whether the compromise sat on Liminal's
  custody infrastructure or WazirX's own signing environment
  is disputed — the two publicly blamed each other — so the
  "upstream custody-vendor supply-chain pivot" reading
  (cf. DMM/Ginco) is one interpretation, not an established
  fact. WazirX paused withdrawals and entered a
  Singapore-supervised restructuring; user recovery remains
  ongoing.
