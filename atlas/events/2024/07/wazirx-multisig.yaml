  - actor_id: kp/rgb/lazarus
    attributing_org: US Department of State + Republic of Korea (trilateral joint statement with Japan)
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2025-01-14
    attribution_source_id: state/2025-01-14_dprk-crypto-theft-joint-statement
