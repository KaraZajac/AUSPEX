id: 2024-07/wazirx-multisig
name: WazirX multisig wallet drain (Liminal compromise)
start_date: 2024-07-18
disclosure_date: 2024-07-18
end_date: 2024-07-18
incident_type:
  - financial-theft
  - supply-chain
initial_vector: supply-chain
outcome_summary: |
  Approximately USD 235M drained from a WazirX
  Liminal-managed multisig wallet via compromise of the
  custody-vendor's signing workflow. Vector: attacker
  obtained sufficient multisig signatures to authorize
  fraudulent withdrawals, attributed to private-key
  exfiltration upstream of WazirX itself. Elliptic and TRM
  Labs published on-chain attribution to Lazarus within
  days.
quantified_impact:
  usd_stolen: 235000000
  asset_classes:
    - ETH
    - USDT
    - SHIB
    - MATIC
false_flag_risk: low
campaign_id: apt38-crypto-pivot
summary: |
  Defining 2024 Lazarus operation against the South Asian
  exchange perimeter. Vendor-attributed (Elliptic, TRM)
  rather than US-government-attested, but the
  Liminal-side supply-chain compromise pattern matches
  the same DMM-via-Ginco tradecraft attested by FBI / NPA
  in December 2024 — both 2024 operations leveraged a
  custodial wallet vendor as the upstream pivot rather
  than targeting the exchange directly. WazirX subsequently
  paused withdrawals and entered a multi-month
  restructuring; user fund recovery is partial.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: Elliptic
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-07-19
    attribution_source_id: elliptic/2024-07-19_wazirx-lazarus
    notes: |
      Elliptic clustering attribution by wallet-flow
      overlap with prior DPRK-attributed laundering
      addresses. No US-government PSA published for
      WazirX specifically.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: strongly_inferred
    reasoning: |
      Tradecraft (custody-vendor supply-chain pivot,
      multi-sig key exfiltration) and proceeds-laundering
      cluster overlap with attested 2024 DPRK operations
      (DMM Bitcoin). No standalone WMD-financing
      attestation specific to WazirX, but the doctrinal
      pattern is identical.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/wazirx
    role: primary
    outcome: ~$235M drained from Liminal-managed multisig wallet.
sources:
