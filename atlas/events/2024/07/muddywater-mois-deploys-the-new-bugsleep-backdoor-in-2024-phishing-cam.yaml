summary: |
  Check Point Research disclosed that MuddyWater — which it explicitly attributes to Iran's Ministry of Intelligence and Security (MOIS) — significantly escalated operations after October 2023 and, since May 2024, deployed a new tailor-made backdoor named BugSleep, partially replacing its reliance on legitimate RMM tools. Check Point identified 50+ spear-phishing emails across 10+ sectors targeting Israeli municipalities, airlines, travel agencies and journalists, with regional targeting also of Saudi Arabia, Turkey, Azerbaijan, India and Portugal.
