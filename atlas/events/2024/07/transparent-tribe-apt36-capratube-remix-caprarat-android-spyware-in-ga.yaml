initial_vector: phishing
false_flag_risk: none
summary: |
  SentinelLabs documented 'CapraTube Remix', a continuation of Transparent Tribe's (APT36) CapraRAT Android spyware activity, expanding its lures to appeal to mobile gamers, weapons enthusiasts and TikTok fans while sustaining its focus on individuals in the Indian government or military space. The group relies on social engineering — including spear-phishing and watering-hole attacks — to deliver Windows and Android spyware, distributing CapraRAT as weaponized Android applications (APKs) designed to mimic YouTube. SentinelLabs attributes the activity to the Pakistan-aligned Transparent Tribe (APT36). No individuals are named.
