id: 2024-07/transparent-tribe-apt36-capratube-remix-caprarat-android-spyware-in-ga
name: "Transparent Tribe (APT36) CapraTube Remix — CapraRAT Android spyware in gamer/weapons/TikTok lure apps"
start_date: 2024-07-01
incident_type:
  - surveillance
