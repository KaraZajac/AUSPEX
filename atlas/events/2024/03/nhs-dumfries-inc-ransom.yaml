id: 2024-03/nhs-dumfries-inc-ransom
name: INC Ransom data extortion of NHS Dumfries and Galloway
start_date: 2024-03-15
disclosure_date: 2024-03-27
end_date: 2024-05-30
incident_type:
  - data-theft
  - intrusion
initial_vector: unknown
outcome_summary: |
  INC Ransom group exfiltrated approximately 3TB of clinical and
  administrative records from NHS Dumfries and Galloway, a
  regional Scottish health board serving ~150,000 patients. After
  the board declined to pay, INC Ransom progressively published
  patient files on its leak site over March-May 2024 including
  named clinical records, mental-health correspondence, and child-
  safeguarding documentation. The Scottish Information
  Commissioner opened a statutory investigation. No clinical
  disruption was reported; the incident was data-theft extortion
  rather than encryption-based.
quantified_impact:
  data_exfiltrated_tb: 3
  patients_affected: 150000
false_flag_risk: none
summary: |
  Type-specimen INC Ransom data-extortion case against UK NHS.
  INC Ransom emerged July 2023 with a Citrix NetScaler (CVE-
  2023-3519) and valid-credentials initial-access profile and
  has continued through 2025-26 despite its source-code reportedly
  being sold on Russian-language forums in May 2024 (with the
  Lynx ransomware cluster emerging from the sale). No public
  state-nexus attribution exists.
