id: 2024-03/nhs-dumfries-inc-ransom
name: INC Ransom data extortion of NHS Dumfries and Galloway
start_date: 2024-02-29
disclosure_date: 2024-03-15
end_date: 2024-05-06
incident_type:
  - intrusion
  - data-theft
  - extortion
  - leak
initial_vector: unknown
outcome_summary: |
  NHS Dumfries and Galloway confirmed that, during an intrusion
  that began at the end of February 2024, the attackers had access
  to "a large volume of patient and staff-identifiable data" —
  "millions of very small, separate pieces of data" such as
  consultant-to-patient letters, letters between consultants, test
  results and x-rays. INC Ransom posted a "proof pack" of genuine
  stolen records on its dark-web extortion site (publicly disclosed
  26 March 2024; the board confirmed publication on 27 March); the
  proof pack related to six individual patients, who were each
  contacted. The board entered no interaction with the attackers,
  and on 6 May 2024 INC Ransom carried out its threat, publishing
  over 3 terabytes of data. No patient appointments or operations
  were cancelled and services ran as normal; the board worked with
  the Information Commissioner's Office (ICO) and Central Legal
  Office. The incident was data-theft extortion rather than
  encryption-driven disruption.
quantified_impact:
  data_exfiltrated_tb: 3  # INC Ransom's claim; NHS D&G confirmed the criminals published "over 3 terabytes" on 6 May 2024
false_flag_risk: none
summary: |
  Type-specimen INC Ransom data-extortion case against the UK NHS.
  INC Ransom is a financially-motivated ransomware / data-extortion
  group first detected in July 2023 that gains initial access via
  Citrix NetScaler (CVE-2023-3519) exploitation and purchased valid
  account credentials; its source code was reportedly offered for
  sale in 2024, after which the Lynx ransomware cluster emerged with
  substantial code overlap. NHS Dumfries and Galloway is a regional
  Scottish health board serving south-west Scotland (population just
  under 150,000). No public state-nexus attribution exists; AUSPEX
  files INC Ransom under criminal/. The specific initial-access
  vector for this incident was not publicly disclosed.
