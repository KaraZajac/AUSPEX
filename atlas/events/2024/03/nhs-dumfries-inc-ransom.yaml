    notes: |
      Attribution rests on INC Ransom's own leak-site self-claim
      (the group posted a "proof pack" and claimed three terabytes;
      publicly disclosed 26 March 2024) plus journalism consensus
      naming the group. NHS Dumfries and Galloway's own statement
      confirms the leaked proof-pack data is genuine but names only
      "a recognised ransomware group", not INC Ransom, and no
      independent forensic or government attribution of INC Ransom
      to this incident exists. Named-actor (a named criminal group;
      no nation-state or service). Hence moderate / concur-with-
      caveat — downgraded 2026-07-05 from the prior high / concur,
      which over-stated a leak-site self-claim.
