       does not name the actor) to Computer Weekly (which does).
    [c] DATES — start_date 2024-03-15 → 2024-02-29 (op "began at the end of
       February"; 15 March was the first public ALERT, now disclosure_date).
       end_date 2024-05-30 (unsourced) → 2024-05-06 (the full ~3TB
