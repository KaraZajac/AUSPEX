    [a] FACTS — corrected against RAW:
     * VOLUME: the task's "~3GB proof + ~150GB full" is NOT supported by any
       source. NHS D&G's page: "On Monday 6 May 2024, they carried out that
       threat – publishing over 3 terabytes of data." Computer Weekly: "Inc
       Ransom claimed to be in possession of three terabytes of data." So
       the figure is 3 TERABYTES (kept data_exfiltrated_tb: 3), not 3GB. The
       proof pack itself is described only as "a small number of patients" /
       "six individual patients" — no GB figure. No source gives 150GB.
     * REMOVED quantified_impact.patients_affected: 150000 — fabrication
       conflating the population SERVED with patients affected. The proof
       pack "related to six individual patients"; the full-leak affected
       count was never quantified. Population "just under 150,000" (The
       Record) is the region served, now stated as such in the summary.
     * "Scottish Information Commissioner opened a statutory investigation"
       was WRONG on two counts and removed: the correct body is the UK
       Information Commissioner's Office (ICO) — NHS D&G page: "The
       Information Commissioner's Office (ICO) and Central Legal Office (CLO)
       supported the incident process" / "We continue to work closely with
       the Information Commissioner's Office on this matter" — and no source
       says a "statutory investigation" was "opened".
     * Data types trimmed to snapshot-carried: "individual letters from
       consultants to patients, letters between consultants, test results,
       x-rays" (NHS D&G page). Prior "mental-health correspondence / child-
       safeguarding documentation" was NOT in any snapshotted source, so
       dropped (broader reporting — ITPro, DigitalHealth, ITV — additionally
       described children's mental-health and cancer records spanning
       2015-2024, but those outlets were not snapshotted; not asserted here).
     * No clinical disruption — verbatim: "No patient appointments or
       operations have had to be cancelled or rescheduled" / "services have
       continued to run as normal". "No interaction has been entered into
       with those responsible" (so reframed the prior "declined to pay").
     * Actor-general summary claims carried by Trend Micro "Ransomware
       Spotlight: INC": "first detected in July 2023"; "exploit CVE-2023-3519"
       via "Netscaler ADC (Citrix ADC) and Netscaler Gateway"; "uses
       purchased valid account credentials"; "the Lynx ransomware group …
       allegedly bought source code from the gang behind the INC ransomware,
       but these claims have yet to be proven". Dropped the unsourced
       "continued through 2025-26", the specific "$300K / Russian-language
       forums / May 2024" (not in the cited source; lives in the actor
       record), and an unverifiable "largest Scottish NHS exfiltration"
       superlative.
    [b] ATTRIBUTION — downgraded high/concur → moderate/concur-with-caveat.
       The victim board names only "a recognised ransomware group"; the INC
       Ransom identity is the group's own leak-site self-claim + journalism
       consensus, with no independent forensic/government attribution. Re-
