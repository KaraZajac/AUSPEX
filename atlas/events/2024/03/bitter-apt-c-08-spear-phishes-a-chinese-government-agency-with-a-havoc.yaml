initial_vector: phishing
false_flag_risk: none
summary: |
  NSFOCUS reported that on 1 February 2024 the BITTER (APT-C-08) group conducted a spear-phishing attack against a Chinese government agency, after a core employee received a phishing email on 23 January 2024 disguised as being from a higher-level government department. Opening the malicious attachment (a CHM file) implanted a trojan that created a scheduled task executing every 18 minutes, fetched a Havoc Trojan via attacker domains, and enabled full remote control and data theft; the agency detected anomalous outbound connections and engaged NSFOCUS for incident response. NSFOCUS's emergency-response team identified Bitter as responsible through host forensics, trojan extraction, sample-behavior analysis, and correlation with historical samples.
