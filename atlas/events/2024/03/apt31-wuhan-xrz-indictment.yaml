id: 2024-03/apt31-wuhan-xrz-indictment
name: APT31 / Wuhan XRZ DOJ indictment + OFAC sanctions + UK joint action
start_date: 2024-03-25
disclosure_date: 2024-03-25
end_date: 2024-03-25
incident_type:
  - documentary  # indictment + sanctions; references underlying 14-year campaign
initial_vector: n/a
outcome_summary: |
  Coordinated US-UK action: DOJ indicted seven PRC nationals
  associated with Wuhan Xiaoruizhi Science and Technology
  Company ("Wuhan XRZ"), an MSS-Hubei front company, for a
  14-year APT31 campaign targeting White House and State
  Department officials, US senators and House members, IPAC
  parliamentarians (UK / EU), US defense contractors, energy
  and telecom companies, and dissidents. OFAC simultaneously
  added Wuhan XRZ and two named officers (Zhao Guangzong, Ni
  Gaobin) to the SDN list. UK FCDO and NCSC issued a parallel
  attribution naming UK Electoral Commission breach and IPAC-MP
  targeting.
false_flag_risk: none
operators_named:
  - zhao-guangzong  # APT31 / Wuhan XRZ, DOJ + OFAC Mar 2024
  - ni-gaobin  # APT31 / Wuhan XRZ, DOJ + OFAC Mar 2024
  - weng-ming  # APT31 / Wuhan XRZ, DOJ Mar 2024
  - cheng-feng  # APT31 / Wuhan XRZ, DOJ Mar 2024
  - peng-yaowen  # APT31 / Wuhan XRZ, DOJ Mar 2024
  - sun-xiaohui  # APT31 / Wuhan XRZ, DOJ Mar 2024
  - xiong-wang  # APT31 / Wuhan XRZ, DOJ Mar 2024
summary: |
  Canonical example of coordinated transatlantic attribution
  and cost imposition against a PRC MSS contractor. References
  named-victim events from across the 14-year period including
  a 2018 Texas energy-company compromise — itself a precursor
  signal for the Volt-Typhoon-era critical-infrastructure
  pre-positioning doctrine.
