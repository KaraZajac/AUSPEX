summary: |
  Canonical example of coordinated transatlantic attribution and cost
  imposition against a PRC MSS (Hubei SSD) contractor operation. This
  event models the same-day US paper counter-action (DOJ indictment +
  OFAC sanctions, with the UK FCDO/NCSC joint action noted); the
  underlying UK Electoral Commission / parliamentarian strands are
  modeled separately at 2024-03/ncsc-fcdo-apt31-electoral-commission
  (cross-linked, not merged). The indictment enumerates named-victim
  sectors across a roughly 14-year period (since at least 2010). The
  companion OFAC release — not the indictment — adds that "In 2018,
  employees of Wuhan XRZ conducted an APT 31 malicious cyber operation
  on a Texas-based energy company, gaining unauthorized access"; the
  indictment itself lists that energy company undated in a victim
  enumeration. The only tradecraft stated for that victim is
  "unauthorized access" — no malware, no pre-positioning; neither source
  mentions Volt Typhoon or grid/power-equipment pre-positioning.
