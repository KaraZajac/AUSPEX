outcome_summary: |
  Coordinated US-UK counter-action. DOJ (EDNY, 24-CR-43) unsealed an
  indictment of seven PRC nationals — contractors and associates of
  Wuhan Xiaoruizhi Science & Technology Co. ("Wuhan XRZ"), a front
  company the Hubei State Security Department (HSSD, the MSS's provincial
  foreign-intelligence arm) created in approximately 2010 — charging a
  computer-intrusion and wire-fraud conspiracy (Dec 2014 – Jan 2024)
  carried out on behalf of the HSSD. Named campaign targets include
  White House and State Department officials; U.S. Senators from more
  than ten states and other members of Congress; EU and UK members of
  the Inter-Parliamentary Alliance on China (IPAC, including 43 UK
  parliamentary accounts); cleared defense contractors; and companies
  across IT/telecom (including a 5G-equipment provider), energy (an
  energy company based in Texas), finance, and research. OFAC
  simultaneously designated Wuhan XRZ and two named individuals (Zhao
  Guangzong, Ni Gaobin) to the SDN list, and State offered a Rewards for
  Justice bounty. The UK FCDO/NCSC issued a parallel attribution and
  matching OFSI sanctions: the UK Electoral Commission compromise
  (2021–2022) attributed to "a Chinese state-affiliated entity" ("highly
  likely"; APT31 NOT named for that strand), and "almost certain" APT31
  reconnaissance against UK parliamentarians prominent in criticising
  China; the UK sanctioned Wuhan XRZ and the two individuals and summoned
  the Chinese Ambassador.
false_flag_risk: none
