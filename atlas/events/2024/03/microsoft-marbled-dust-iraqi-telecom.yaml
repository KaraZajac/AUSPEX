id: 2024-03/microsoft-marbled-dust-iraqi-telecom
name: Microsoft documents MARBLED DUST (Sea Turtle) intrusion at Iraqi telecommunications operator
start_date: 2023-04-01
disclosure_date: 2024-03-05
end_date: 2023-12-31
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day
outcome_summary: |
  Microsoft Threat Intelligence published a MARBLED DUST (its
  taxonomy for Sea Turtle) analysis documenting intrusion at an
  Iraqi telecommunications operator during 2023. The cluster
  exploited internet-facing vulnerabilities to gain initial
  access and pivoted to capture subscriber-data and lawful-
  intercept-adjacent equities. Tradecraft showed continuity with
  the pre-2019 Cisco Talos picture but with adapted infrastructure
  and tooling reflecting the post-2019 operational refresh.
false_flag_risk: none
summary: |
  Joint Sea Turtle resurgence picture alongside the January 2024
  Hunt & Hackett Dutch-ISP disclosure. Microsoft's MARBLED DUST
  framing emphasized telecom-operator targeting as the
  cluster's signature post-2023 victimology — collection on
  Kurdish-region and Iraqi diaspora communications. Confirms
  operational continuity of Turkish state cyber tasking against
  Kurdish equities.
