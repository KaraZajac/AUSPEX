    STEP 0 TRIAGE — sole cited source msft/2024-03-05_marbled-dust-tradecraft is
    a PHANTOM. Its record already carries url: null plus a 2026-06-25 audit note
    that the slug is un-locatable. Re-verified 2026-07-04: curl -sL of
    https://www.microsoft.com/en-us/security/blog/2024/03/05/marbled-dust/
    returned HTTP 404, page title "Page not found | Microsoft Security Blog"
