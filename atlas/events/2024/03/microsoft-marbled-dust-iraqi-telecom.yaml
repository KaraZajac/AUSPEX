summary: |
  FLAGGED FOR DELETION / UNSUPPORTABLE (audit 2026-07-04). This event rests
  entirely on a PHANTOM source, msft/2024-03-05_marbled-dust-tradecraft, whose
  cited URL (https://www.microsoft.com/en-us/security/blog/2024/03/05/marbled-dust/)
  returns HTTP 404 ("Page not found | Microsoft Security Blog") and which the
  2026-06-25 source audit already recorded as un-locatable. No Microsoft Threat
  Intelligence blog titled "MARBLED DUST Targets Iraqi Telecom … Through
  DNS-Hijacking" exists, and no other report documents a distinct,
  Microsoft-disclosed March-2024 intrusion at an "Iraqi telecommunications
  operator." Web verification and Microsoft's own genuine 2025-05-12 Marbled
  Dust post — which references no earlier March-2024 post and names no Iraqi
  telecom — confirm the claimed disclosure is fabricated.

  The real, well-sourced Marbled Dust / Sea Turtle picture this record
  confabulates is already fully covered by two sibling events:
  2024-01/hunt-hackett-sea-turtle-resurgence (Hunt & Hackett, Jan 2024 — the
  real 2021–2023 telecom/ISP campaign, whose victims were DUTCH, not Iraqi) and
  2025-05/microsoft-marbled-dust-output-messenger-zero-day (Microsoft, May 2025
  — the real Iraqi targeting: the Kurdish MILITARY via the Output Messenger
  zero-day, from April 2024). The fabricated victim
  orgs/iraqi-telecommunications-operator has no registry entry (dangling FK) and
  has been removed. Retire/delete recommended (Kara's call); nothing here is
  salvageable that the two sibling events do not already carry.
