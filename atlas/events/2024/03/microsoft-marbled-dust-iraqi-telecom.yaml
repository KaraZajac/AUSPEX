    [a] FACTS — every affirmative claim was fabricated or unverifiable and has
    been stripped. (i) "Microsoft published a MARBLED DUST analysis [March 2024]"
    — no such post exists. (ii) "intrusion at an Iraqi telecommunications
    operator during 2023" — no report documents this; the real 2021–2023 Sea
    Turtle telecom campaign (Hunt & Hackett, 2024-01-04) hit DUTCH ISPs/telecoms,
    and the real Iraqi targeting (Microsoft, 2025-05-12) is the Kurdish MILITARY
    via the Output Messenger zero-day from April 2024 — neither is a 2023 Iraqi
    telecom. (iii) "exploited internet-facing vulnerabilities … subscriber-data
    and lawful-intercept-adjacent equities" — fabricated tradecraft/victimology,
    no source. PRIMARY corroboration that the claim is fabricated: Microsoft's
    real 2025-05-12 post references no earlier March-2024 post, does not mention
    an "Iraqi telecommunications operator," places the only Iraqi victims as
    "associated with the Kurdish military operating in Iraq," and dates activity
    to "Since April 2024" — a different victim, vector, and year than this event
    claims. summary rewritten to state the record is unsupported and flagged for
    deletion; outcome_summary, disclosure_date (2024-03-05) and end_date
    (2023-12-31) removed (all asserted a disclosure/op-window that never
    happened); initial_vector n-day → unknown.

