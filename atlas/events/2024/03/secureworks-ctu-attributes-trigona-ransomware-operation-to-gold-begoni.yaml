id: 2024-03/secureworks-ctu-attributes-trigona-ransomware-operation-to-gold-begoni
name: "Secureworks CTU profiles GOLD BEGONIA, the financially motivated group behind Trigona ransomware (2022-2023)"
start_date: 2024-03-01
incident_type:
  - ransomware
  - extortion
  - data-theft
initial_vector: valid-creds
false_flag_risk: none
summary: |
  The Secureworks Counter Threat Unit threat profile GOLD BEGONIA (hosted on Sophos after the Secureworks acquisition) describes "a financially motivated cybercriminal threat group that operated and distributed the Trigona ransomware" (also known as the "Trigona Team"). The group obtained initial access primarily through brute-force attacks against publicly facing RDP and Microsoft SQL Server instances, and also exploited CVE-2021-40539 in Zoho ManageEngine in late 2022. After access they used tools including Mimikatz, NTDS.dit dumping (ntdsutil.exe), SoftPerfect Network Scanner, Cobalt Strike and PsExec, exfiltrated data with utilities such as FileZilla, and deployed Trigona ransomware (a Linux version targeting ESXi hypervisors was added in February 2023). The profile lists motivation as financial gain, carries no country-of-origin / sponsor field (no state nexus), and names no specific victim sectors or countries. (The profile does not itself use the terms "ransomware-as-a-service", "RaaS", or "affiliate" — Trigona's RaaS/affiliate model is documented in other vendor reporting, not this source.)
