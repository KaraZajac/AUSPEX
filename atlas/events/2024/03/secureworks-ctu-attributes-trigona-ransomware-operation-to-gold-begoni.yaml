initial_vector: valid-creds
false_flag_risk: none
summary: |
  Secureworks Counter Threat Unit (Sophos threat profile GOLD BEGONIA) profiles the financially motivated group behind the Trigona ransomware-as-a-service operation. The group obtained initial access primarily through brute-force attacks against publicly facing RDP and Microsoft SQL Server instances, and also exploited CVE-2021-40539 in Zoho ManageEngine in late 2022. After access they used tools including Mimikatz, NTDS.dit dumping, SoftPerfect Network Scanner, Cobalt Strike and PsExec, exfiltrated data with utilities such as FileZilla, and deployed Trigona ransomware (a Linux/ESXi variant was added in February 2023). The profile does not name specific victim sectors or countries.
