  notes: "Audited vs the Secureworks CTU GOLD BEGONIA threat profile (curl blocked HTTP 000/exit 92; WebFetch-captured + sha256 snapshot). FACTS confirmed: financially motivated cybercriminal group operating/distributing Trigona (aka Trigona Team), RDP/MSSQL brute force + CVE-2021-40539 Zoho ManageEngine late 2022, Mimikatz/NTDS.dit/SoftPerfect Network Scanner/Cobalt Strike/PsExec/FileZilla, Linux/ESXi variant Feb 2023, no victim sectors/countries. CORRECTIONS: (1) removed the 'RaaS lifecycle'/'ransomware-as-a-service' framing from name+summary — the cited profile does NOT use RaaS/affiliate language (it says the group 'operated and distributed' Trigona); RaaS is documented elsewhere, not here. (2) doctrine_links emptied to [] — criminal/trigona is profit-criminal with no documented state nexus; the link's own counter_explanation conceded a Russia-nexus PREDICATE GAP and the actor was moved to criminal/ with the alignment dropped. (3) added attribution_level: named-actor. ATTRIBUTION: source explicitly profiles GOLD BEGONIA=Trigona as financially motivated, NO state nexus (no country-of-origin/sponsor field) — confirms the criminal/trigona placement; confidence high (vendor directly names the operator); actor_id resolves, not stale (moved 2026-06-25, FK-propagated). published_on 2024-03-01 is a backfill estimate — the page carries no on-page date, so it is uncorroborated (kept conservatively, noted on the source)."
