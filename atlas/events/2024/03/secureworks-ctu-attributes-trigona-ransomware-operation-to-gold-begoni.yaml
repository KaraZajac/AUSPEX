id: 2024-03/secureworks-ctu-attributes-trigona-ransomware-operation-to-gold-begoni
name: "Secureworks CTU attributes Trigona ransomware operation to GOLD BEGONIA (RaaS lifecycle, 2022-2024)"
start_date: 2024-03-01
incident_type:
