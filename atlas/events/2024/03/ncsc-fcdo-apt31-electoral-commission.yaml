qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-04
  level: full
  notes: |
    Re-sourced + audited vs three reachable UK govt-primary snapshots.
    The sole prior citation (the NCSC news page) is TOMBSTONED — its url
    404s and its only archive is on web.archive.org (blocked for the
    fetcher), so it cannot be hashed; its attribution is carried verbatim
    by the FCDO release below. NEW SOURCES created + hashed:
    gov-uk/2024-03-25_apt31-china-state-affiliated (FCDO release, sha256
    6a9fd3d6…f3fbea76, 97,995 B); electoral-commission/2023-08-08_public-
    notification-cyber-attack (EC first-party notice, 7cee6c2f…efa978b0,
    118,022 B); ico-uk/2024-05-09_electoral-commission-reprimand (ICO,
    099ed1b3…201dda6d, 34,822 B).

    [a] FACTS — corrected. EC strand now source-carried: EC notice —
    "reference copies of the electoral registers ... the name and address
    of anyone in Great Britain who was registered to vote between 2014
    and 2022, the names of those registered as overseas voters ... and
    the names and addresses of anyone registered in Northern Ireland in
    2018"; "The Commission's email system was also accessible". ICO —
    "approximately 40,000,000 individuals". The prior "~40M voter records"
    is retained but re-sourced to the ICO (neither the FCDO release nor
    the EC notice states a headcount — FCDO gives no scope at all; EC
    gives register composition; ICO gives the 40M). Parliamentary strand
    corrected to the source: "reconnaissance activity against UK
    parliamentarians ... No parliamentary accounts were successfully
    compromised" (attempted/unsuccessful — the prior "sustained ...
    targeting" over-stated a completed compromise). "IPAC" softened: the
    FCDO release says "parliamentarians ... prominent in calling out the
    malign activity of China" and never uses "IPAC" (that descriptor is
    from the same-day US DOJ indictment / IPAC's statement) — noted
    in-line on the target and in the summary.

    [b] ATTRIBUTION — set attribution_level: named-actor (was unset). The
    UK reached NATION for the EC breach ("highly likely ... a Chinese
    state-affiliated entity"; APT31 NOT named) and NAMED-ACTOR for the
    parliamentary recon ("almost certain ... APT31"). The sanctions
    designation names the MSS (Wuhan XRZ "operating on behalf of the ...
    MSS") — a named-unit affiliation — but the corpus's named-unit cn/mss
    placement for APT31 rests on the US DOJ/OFAC sources (actor QC
    2026-06-24), so the UK entry is graded named-actor, not named-unit.
    Confidence high tracks "highly likely" / "almost certain" — kept.
    attribution_source repointed ncsc-uk(tombstoned) -> gov-uk(hashed).
    Corrected the summary's claim that the UK avoided "direct MSS
    attribution" — the UK's own designation names the MSS explicitly.

    [c] DATES — start 2021-08-01 -> 2021-08-24 and end 2022-10-01 ->
    2022-10-27 (ICO exact window "Between 24 August 2021 and 27 October
    2022"). disclosure 2024-03-25 kept (the UK attribution date); the
    EC's own breach disclosure 2023-08-08 is noted in the summary. Each
    new source's published_on set to its real pub date (FCDO 2024-03-25;
    EC 2023-08-08; ICO 2024-05-09).

    [d] DOCTRINE_LINKS — uk/ncs-2022/detect-disrupt-deter KEPT attested;
    added inference_basis.source_quote ("This sends a clear message that
    we will not tolerate malicious cyber activity against democratic
    institutions and parliamentarians") and repointed attesting_source_id
    to the hashed FCDO release. Pillar 5 names "joint attribution
    announcements, sanctions coordination (OFSI)" — direct match; the
    source states the deterrent purpose in substance. uk/five-eyes
    DOWNGRADED attested -> strongly_inferred: the FCDO release documents
    "close coordination and cooperation with the US" + allies "globally"
    / "Indo-Pacific and Europe" and the same-day US DOJ/OFAC action on
    the identical targets, but never invokes "Five Eyes" nor a
    signals-cooperation purpose; added inference_basis.signals +
    ruled_out. (FLAG: the "joint Five Eyes attribution" concept also
    lives under uk/ncs-2022/global-leadership (Pillar 4) — Kara may prefer
    to re-route this link there.)

    [e] ATTRIBUTION_LEVEL — named-actor (see [b]).

    [f] ACTOR_ID — cn/mss/apt31 RESOLVES (file atlas/actors/cn/apt31.yaml
    carries id: cn/mss/apt31; file path is <state>/<slug>, id is
