id: 2024-03/ncsc-fcdo-apt31-electoral-commission
name: NCSC + FCDO attribute UK Electoral Commission breach and IPAC targeting to APT31 / MSS contractor
start_date: 2021-08-01  # Electoral Commission compromise period
disclosure_date: 2024-03-25
end_date: 2022-10-01  # Electoral Commission compromise window per ICO record
incident_type:
  - intrusion
  - attribution-publication
initial_vector: n-day
outcome_summary: |
  NCSC and the UK Foreign, Commonwealth and Development Office
  jointly attributed two campaigns to APT31 / Wuhan Xiaoruizhi
  Science and Technology Company (MSS-linked contractor): (a) the
  August 2021 – October 2022 breach of the UK Electoral Commission
  exposing electoral-register data for ~40 million UK voters; and
  (b) sustained reconnaissance targeting against Inter-Parliamentary
  Alliance on China (IPAC) parliamentarians including UK MPs. Same-
  day companion to the US DOJ indictment and OFAC sanctions on
  Wuhan XRZ and seven named officers.
false_flag_risk: none
summary: |
  Major UK attribution event in the post-NCS-2022 cadence. AUSPEX
  models this as a UK-perspective companion to the US DOJ
  indictment (separate event entry under us/) — the UK voice
  attributes to APT31 / Wuhan XRZ as the responsible actor and to
  the PRC state under the standard "state-affiliated" formula
  rather than direct MSS attribution.

  UK government response included sanctions on two named PRC
  individuals and Wuhan XRZ via OFSI, a summoned PRC ambassador,
  and the Foreign Secretary's Commons statement. The Electoral
  Commission acknowledged the breach in August 2023 (separately);
  the March 2024 attribution closed the public attribution loop.
attributions:
  - actor_id: cn/mss/apt31
    attributing_org: UK NCSC + UK FCDO
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-03-25
    attribution_source_id: ncsc-uk/2024-03-25_apt31-electoral-commission
    notes: |
      UK-side attribution to APT31 / Wuhan XRZ for both the
      Electoral Commission breach and IPAC targeting. Companion
      to the same-day US DOJ indictment (US-side event entry
      preserved separately).
