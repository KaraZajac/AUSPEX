id: 2024-03/ncsc-fcdo-apt31-electoral-commission
name: NCSC + FCDO attribute UK Electoral Commission breach and parliamentarian reconnaissance to China (APT31 / Wuhan XRZ)
start_date: 2021-08-24  # EC compromise start (ICO reprimand: "24 August 2021")
disclosure_date: 2024-03-25  # UK attribution date (EC's own breach disclosure was 2023-08-08)
end_date: 2022-10-27  # EC compromise end (ICO reprimand: "27 October 2022")
incident_type:
  - intrusion
  - reconnaissance
  - espionage
  - attribution-publication
initial_vector: n-day  # ICO reprimand: "initial access was gained via several unpatched software vulnerabilities"
outcome_summary: |
  NCSC and the UK FCDO jointly attributed two China state-affiliated
  campaigns: (a) the 24 Aug 2021 – 27 Oct 2022 compromise of the UK
  Electoral Commission ("highly likely ... a Chinese state-affiliated
  entity"), in which the attackers accessed the Commission's email
  system and reference copies of the electoral registers — names and
  addresses of everyone registered to vote in Great Britain 2014–2022,
  overseas voters, and Northern Ireland 2018 registrants — ~40,000,000
  individuals per the ICO; and (b) "almost certain" APT31 reconnaissance
  against UK parliamentarians prominent in calling out China (a separate
  2021 campaign; no parliamentary accounts were successfully
  compromised). The UK imposed OFSI sanctions on Wuhan Xiaoruizhi Science
  and Technology Company and two APT31 members (Zhao Guangzong, Ni
  Gaobin) and summoned the Chinese Ambassador. Same-day companion to the
  US DOJ indictment and OFAC sanctions on Wuhan XRZ and seven named APT31
  defendants (separate event 2024-03/apt31-wuhan-xrz-indictment —
  cross-linked, not merged).
false_flag_risk: none
summary: |
  Major UK attribution event in the post-NCS-2022 cadence, and the
  UK-perspective companion to the same-day US DOJ indictment + OFAC
  sanctions (modeled separately as 2024-03/apt31-wuhan-xrz-indictment).
  On 25 March 2024 the FCDO and NCSC made two attributions using the
  UK's "China state-affiliated" formula: (1) the UK Electoral Commission
  systems were "highly likely compromised by a Chinese state-affiliated
  entity" (2021–2022) — APT31 is NOT named for this strand; and (2) it
  was "almost certain" that the China state-affiliated group APT31
  conducted reconnaissance against UK parliamentarians "prominent in
  calling out the malign activity of China" during a separate 2021
  campaign, in which "no parliamentary accounts were successfully
  compromised".

  UK response: OFSI sanctions on Wuhan Xiaoruizhi Science and Technology
  Company and two APT31 members (Zhao Guangzong and Ni Gaobin), the
  Chinese Ambassador summoned, and statements by Deputy PM Oliver Dowden
  and Foreign Secretary Lord Cameron. Note: the UK's sanctions
  designation names the MSS directly — Wuhan XRZ "operating on behalf of
  the Chinese Ministry of State Security (MSS)" — so the earlier framing
  that the UK avoided "direct MSS attribution" is not accurate; what the
  UK declined to do was pin the Electoral Commission breach specifically
  to APT31/MSS (it left that strand at "state-affiliated entity"). The
  Electoral Commission had separately disclosed the breach itself on
  8 August 2023; the ICO reprimanded it (9 May 2024), recording
  ~40,000,000 individuals affected, a 24 Aug 2021 – 27 Oct 2022 window,
  and initial access "via several unpatched software vulnerabilities".
attributions:
  - actor_id: cn/mss/apt31
    attributing_org: UK NCSC + UK FCDO
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-03-25
    attribution_source_id: gov-uk/2024-03-25_apt31-china-state-affiliated
    notes: |
      UK-side attribution, 25 March 2024. The UK attributes the two
      strands at DIFFERENT specificity levels:
        - Electoral Commission breach: "highly likely compromised by a
          Chinese state-affiliated entity" — NATION level; the UK does
          NOT name APT31 for this strand.
        - Parliamentary reconnaissance (a "separate campaign in 2021"):
          "almost certain that the China state-affiliated Advanced
          Persistent Threat Group 31 (APT31)" — NAMED-ACTOR level.
      The UK sanctions designation additionally characterises Wuhan XRZ
      and the two sanctioned individuals as "operating on behalf of the
      Chinese Ministry of State Security (MSS)" — a named-unit
      affiliation — but that is a designation statement, not an incident
      attribution; the corpus's named-unit (cn/mss) placement for APT31
      rests on the same-day US DOJ/OFAC sources (see the actor record's
      QC and the separate event 2024-03/apt31-wuhan-xrz-indictment).
      attribution_level is therefore set to named-actor for this UK
      entry. attributing_org_confidence = high tracks "highly likely" /
      "almost certain". attribution_source repointed from the tombstoned
      NCSC page to the reachable, hashed FCDO companion release.
doctrine_links:
  - doctrine_id: uk/ncs-2022
    perspective: defender-response
    pillar_id: uk/ncs-2022/detect-disrupt-deter
    program_id: null
    confidence: attested
    reasoning: |
      Pillar 5 (detect-disrupt-deter) names "joint attribution
      announcements, sanctions coordination (OFSI)" as the UK's
      operational instrument. This event IS that instrument: a joint
      NCSC/FCDO attribution, OFSI sanctions on Wuhan XRZ and two APT31
      members, and a summoned ambassador — and the FCDO states the
      deterrent purpose in substance.
    attesting_source_id: gov-uk/2024-03-25_apt31-china-state-affiliated
    inference_basis:
      source_quote: "This sends a clear message that we will not tolerate malicious cyber activity against democratic institutions and parliamentarians."
      source_id: gov-uk/2024-03-25_apt31-china-state-affiliated
    contested: false
    analyst: claude
  - doctrine_id: uk/five-eyes
    perspective: defender-response
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The UK attribution + OFSI sanctions were run in deliberate,
      same-day concert with the US DOJ indictment and OFAC designations
      of the identical entity and individuals, and the FCDO release
      frames it as "close coordination and cooperation with the US"
      backed by allies "globally" and across the "Indo-Pacific and
      Europe" — the coordinated-allied-attribution rhythm this doctrine
      labels. Graded strongly_inferred rather than attested because the
      source documents the US-UK/allied coordination but does not itself
      invoke "Five Eyes" nor state a signals-cooperation purpose.
    attesting_source_id: gov-uk/2024-03-25_apt31-china-state-affiliated
    inference_basis:
      signals:
        - "Same-day, concurrent US action on the identical targets: the DOJ EDNY indictment (24-CR-43) and OFAC/Treasury designations named Wuhan XRZ and the same individuals — modeled separately at 2024-03/apt31-wuhan-xrz-indictment."
        - "The FCDO release states the coordination explicitly: 'We greatly value our close coordination and cooperation with the US in addressing these threats.'"
        - "'The United Kingdom, supported by allies globally ... Partners across the Indo-Pacific and Europe also express solidarity' — Australia and New Zealand (Five Eyes) issued parallel supporting statements the same day (widely reported)."
      ruled_out: "Purely unilateral UK attribution: excluded because the source ties the action to concurrent US designations of the same targets and to global / Indo-Pacific allied solidarity — a coordinated allied rhythm, not a solo UK act."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/uk-electoral-commission
    country: uk
    role: primary
    outcome: |
      "Highly likely" compromised by a Chinese state-affiliated entity
      (24 Aug 2021 – 27 Oct 2022). Attackers accessed the email system
      and reference copies of the electoral registers (GB voters
      2014–2022, overseas voters, NI 2018 registrants); ~40,000,000
      individuals affected (ICO). The UK did not name APT31 for this
      strand.
  - target_id: orgs/uk-parliament
    country: uk
    role: primary
    outcome: |
      "Almost certain" APT31 reconnaissance against UK parliamentarians
      prominent in calling out China (a separate 2021 campaign). No
      parliamentary accounts were successfully compromised. Targets
      widely identified as IPAC members via the same-day US DOJ
      indictment / IPAC's own statement — the UK release itself does not
      use the term "IPAC".
