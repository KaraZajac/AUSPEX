summary: |
  Matveev case is the canonical proof that US sanctions and
  rewards do not produce Russian-territorial enforcement absent
  a separate Russian foreign-policy incentive. Documented in
  AUSPEX as the precedent for the May 2024 Khoroshev / LockBitSupp
  unmasking outcome. (Dated 2023-05 but indexed under 2024-03
  filing tree as part of the LockBit dossier; see actual file
  date.)
