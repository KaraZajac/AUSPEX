outcome_summary: |
  US Treasury OFAC designated Mikhail Pavlovich Matveev
  ("Wazawaka" / "Boriselcin" / "Uhodiransomwar" / "m1x") on
  May 16, 2023 for his role in launching LockBit, Babuk, and Hive
  ransomware attacks against US law enforcement, businesses, and
  critical infrastructure (OFAC: variants "which Matveev helped to
  develop and deploy"). The US District Courts for the District of
  New Jersey and the District of Columbia concurrently unsealed
  indictments against him, and the State Department offered a
  USD 10M Transnational Organized Crime Rewards Program (TOCRP)
  reward. Matveev was publicly vocal about his crimes in media
  interviews and stated his activities would be tolerated by local
  authorities provided he stayed loyal to Russia; he remains at
  large in Russia.
