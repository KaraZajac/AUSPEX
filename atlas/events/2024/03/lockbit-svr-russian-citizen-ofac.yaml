outcome_summary: |
  US Treasury OFAC designated Mikhail Pavlovich Matveev
  ("Wazawaka" / "Boriselcin" / "Uhodiransomwar") May 16 2023 as
  a sanctioned individual for his role as an affiliate of LockBit,
  Babuk, and Hive ransomware. DOJ concurrently unsealed an
  indictment in the District of New Jersey and the District of
  Columbia. State Department TOCRP USD 10M reward offered.
  Matveev publicly trolled US enforcement from Russia, appearing
  on Russian state media; remains at large.
