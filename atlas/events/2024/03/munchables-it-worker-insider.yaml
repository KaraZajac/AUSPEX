    reasoning: |
      ZachXBT attribution to a DPRK IT worker hired into
      the Munchables team matches the canonical IT-worker
      fraud pattern attested in Treasury sb0416 and the
      14-national indictment. The asset-theft variant
      (insider drain) versus the wage-fraud variant (salary
      siphoning) is operationally distinct but doctrinally
      identical — both are revenue streams from the same
      placement cluster.
    inference_basis:
      signals:
        - "ZachXBT attributes the Munchables drain to a North Korean developer hired into the team under a Western-style GitHub persona — the insider-placement variant of the DPRK IT-worker fraud cluster (kp/it-worker-fraud)."
        - "The cluster's proceeds are documented by Treasury sb0416 (May 2024) and the DOJ 14-national indictment (Dec 2024); OFAC standardized language ties DPRK revenue-generation to the WMD and ballistic-missile programs that the 8th-Congress revenue-aggregation pillar encodes."
        - "Actor bureaucratic ownership (Office 39 / Munitions Industry Department per OFAC) routes such proceeds to weapons procurement — the terminal goal of this doctrine."
      ruled_out: "Ordinary non-state criminal insider theft — ruled out by ZachXBT's DPRK-IT-worker attribution and the actor's source-documented state ownership; no serious competing strategic reading survives. Not attested: no Munchables-specific source states the WMD-financing purpose (ZachXBT names only the actor)."
