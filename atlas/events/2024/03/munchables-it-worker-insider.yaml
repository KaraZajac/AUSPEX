id: 2024-03/munchables-it-worker-insider
name: Munchables IT-worker insider drain (subsequently returned)
start_date: 2024-03-26
disclosure_date: 2024-03-26
end_date: 2024-03-27
incident_type:
  - financial-theft
  - insider
initial_vector: insider
outcome_summary: |
  Approximately USD 62M (17,400 ETH) drained from the
  Munchables game-finance protocol on Blast L2 by an insider
  developer with privileged contract-deployment access.
  ZachXBT on-chain investigation within hours identified the
  attacker as a DPRK-origin IT worker who had been hired
  into the Munchables team under a Western pseudonym; the
  attacker subsequently returned the funds voluntarily after
  on-chain identification and public attribution.
quantified_impact:
  usd_stolen: 62000000
  usd_recovered: 62000000
  asset_classes:
    - ETH
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Canonical IT-worker-insider attack pattern. Where
  TraderTraitor / Lazarus crypto-exchange operations
  compromise victims externally via social engineering,
  the IT-worker fraud cluster compromises them internally
  via hired-developer placements. The Munchables case is
  the highest-dollar publicly-confirmed instance of the
  internal-pivot variant in 2024 and illustrates the
  doctrinal link between the IT-worker revenue stream
  (wage fraud) and direct asset theft from the same victim
  organizations. The voluntary fund return is anomalous
  and unexplained; doesn't change the doctrinal
  classification.
attributions:
  - actor_id: kp/it-worker-fraud
    attributing_org: ZachXBT (independent OSINT)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-03-27
    attribution_source_id: zachxbt/2024-03-27_munchables-dprk-developer
    notes: |
      ZachXBT on-chain identification of the attacker
      address as a DPRK-origin IT-worker developer hired
      under a Western pseudonym. Pattern subsequently
      attested by Treasury sb0416 (May 2024) and the
      14-national DOJ indictment (December 2024) for the
      broader DPRK IT-worker ecosystem.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/it-worker-fraud
    confidence: strongly_inferred
    reasoning: |
      ZachXBT attribution to a DPRK IT worker hired into
      the Munchables team matches the canonical IT-worker
      fraud pattern attested in Treasury sb0416 and the
      14-national indictment. The asset-theft variant
      (insider drain) versus the wage-fraud variant (salary
      siphoning) is operationally distinct but doctrinally
      identical — both are revenue streams from the same
      placement cluster.
    contested: false
    analyst: claude
targets:
  - target_id: orgs/munchables
    role: primary
    outcome: ~$62M drained; voluntarily returned ~24 hours later.
sources:
