id: 2024-03/munchables-it-worker-insider
name: Munchables IT-worker insider drain (subsequently returned)
start_date: 2024-03-26
disclosure_date: 2024-03-26
end_date: 2024-03-27
incident_type:
  - financial-theft
  - insider
initial_vector: insider
outcome_summary: |
  Approximately USD 62.5M (17,413 ETH) drained from the
  Munchables game-finance protocol on Blast L2 by an insider
  developer whose smart contracts granted them discretionary
  power to move funds; the attacker manipulated the contract
  and transferred stored user funds before upgrading the
  platform's smart contracts. ZachXBT's contemporaneous
  on-chain investigation attributed the drain to a hired North
  Korean developer (GitHub "Werewolves0493") — the canonical
  DPRK IT-worker insider pattern. After public attribution the
  developer unconditionally relinquished the private keys and
  the funds were recovered in full (Munchables: "all user
  funds are safe").
quantified_impact:
  usd_stolen: 62500000
  usd_recovered: 62500000
  asset_classes:
    - ETH
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Canonical IT-worker-insider attack pattern. Where
  TraderTraitor / Lazarus crypto-exchange operations
  compromise victims externally via social engineering,
  the IT-worker fraud cluster compromises them internally
  via hired-developer placements. The Munchables case is
  among the highest-dollar publicly-reported instances of the
  internal-pivot variant in 2024 and illustrates the
  doctrinal link between the IT-worker revenue stream
  (wage fraud) and direct asset theft from the same victim
  organizations. The voluntary fund return is anomalous
  and unexplained; doesn't change the doctrinal
  classification.
attributions:
