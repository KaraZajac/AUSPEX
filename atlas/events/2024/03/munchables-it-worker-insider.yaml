    notes: |
      ZachXBT's on-chain identification of the attacker as a
      hired North Korean developer (GitHub "Werewolves0493"),
      corroborated by CoinDesk and The Block. Confidence set to
      moderate (was high): the snapshotted contemporaneous
      reporting hedges ZachXBT's March attribution — "likely
      North Korean, based on their GitHub commit activity"
      (CoinDesk) / "might be linked to North Korean hackers, but
      this remains unclear" (The Block). ZachXBT firmed it in a
      2024-07 follow-up naming "four other DPRK IT workers who
      were on the Munchables [team]". attribution_level=nation:
      ZachXBT named the DPRK IT-worker scheme, not a specific
      service/APT. The broader IT-worker pattern is separately
      attested by Treasury sb0416 (May 2024) and the 14-national
      DOJ indictment (Dec 2024), neither of which names Munchables.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/it-worker-fraud
