      - The Block 2024-03-27 "Munchables recovers $62 million taken
        in security breach" — sha256 7796b893…43909c69, 397,089 bytes.

    [a] FACTS — corrected + all now source-carried. Amount tightened
    62M→62.5M (17,400→17,413 ETH): CoinDesk "a loss of $62.5 million
    worth of ether (ETH)"; The Block/BlockSec "A total of 17,412.6
