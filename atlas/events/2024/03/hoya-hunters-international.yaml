id: 2024-03/hoya-hunters-international
name: Hunters International ransomware against Hoya Corporation
start_date: 2024-03-30
disclosure_date: 2024-04-04
end_date: 2024-05-15
incident_type:
  - ransomware
  - disruption
  - data-theft
initial_vector: unknown
outcome_summary: |
  Hunters International ransomware intrusion against Hoya
  Corporation (Tokyo-headquartered optical-products and medical-
  device manufacturer; world's largest producer of EUV
  photomask blanks for semiconductor lithography and a major
  ophthalmic-lens supplier). Hoya disclosed via Japanese-language
  press release April 4, 2024 that production at multiple plants
  had been suspended following a ransomware intrusion. Hunters
  International claimed responsibility April 9 and demanded
  USD 10M ransom for the approximately 1.7 million stolen
  files (~2TB). Hoya restored most production by mid-May.
quantified_impact:
  data_exfiltrated_tb: 2
  files_stolen: 1700000
  ransom_demanded_usd: 10000000
false_flag_risk: none
summary: |
  Hoya's EUV-photomask-blank position makes it a node of
  significant interest to PRC semiconductor-acquisition tasking
  (sectors/ict/semiconductors/equipment) — but Hunters
  International's tradecraft profile is standard Rust-encryptor
  RaaS with no espionage indicators and a clear leak-site
  monetization pattern. The case is included in the AUSPEX
  criminal-baseline corpus as an example where target sensitivity
  to state strategic interests does not imply doctrinal targeting
  when the operator profile is purely financial.
