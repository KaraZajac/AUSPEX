id: 2024-03/hoya-hunters-international
name: Hunters International ransomware against Hoya Corporation
start_date: 2024-03-30
disclosure_date: 2024-04-04
end_date: null
incident_type:
  - ransomware
  - disruption
  - data-theft
initial_vector: unknown
outcome_summary: |
  Hunters International ransomware intrusion against Hoya
  Corporation (Tokyo-headquartered maker of optical instruments,
  medical equipment and electronic components — a leading producer
  of semiconductor mask blanks and photomasks and of products for
  EUV lithography, and a major ophthalmic-lens supplier). On
  2024-03-30 Hoya discovered an "IT system incident" at an overseas
  office, later assessed by external forensic investigators as most
  likely unauthorized access to its servers by a third party; the
  company disclosed on 2024-04-04 that some production plants and
  the ordering system for several products had been affected. Hoya
  characterized it only as an "IT system incident" and did not
  itself confirm ransomware. Days later, French outlet LeMagIT
  reported — from screenshots of Hunters International's victim-
  negotiation panel, independently confirmed by BleepingComputer —
  a USD 10M ransom demand for a decryptor and to withhold the
  ~1.7 million files (~2 TB) allegedly stolen, under a "No
  Negotiation / No Discount Policy." As of mid-April 2024 the
  actors had not posted Hoya to their public leak site and had not
  publicly admitted responsibility.
quantified_impact:
  data_exfiltrated_tb: 2
  files_stolen: 1700000
  ransom_demanded_usd: 10000000
false_flag_risk: none
summary: |
  Hoya's semiconductor position — a leading maker of mask blanks /
  photomasks and a leader in products for EUV lithography, whose
  "trade secrets could be particularly valuable to rivals or
  sanctioned nations" (Tom's Hardware) — makes it a node whose
  sensitivity to state semiconductor-acquisition interest is real
  (sectors/ict/semiconductors/equipment). But Hunters
  International's profile is standard Rust-encryptor RaaS with Hive
  code lineage, no espionage indicators, and a financial ransom-
  and-extortion monetization pattern. The case is included in the
  AUSPEX criminal-baseline corpus as an example where target
  sensitivity to state strategic interests does not imply doctrinal
  targeting when the operator profile is purely financial.
