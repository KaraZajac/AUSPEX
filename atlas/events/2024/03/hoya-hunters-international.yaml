  notes: |
    WRONG-SOURCE remediation + full 6-point audit. The event previously cited
    ONLY bitdefender/2023-10-20_hunters-international-hive-overlap ("Hive
    Ransomware's Offspring: Hunters International Takes the Stage") as BOTH its
    sole source AND attribution_source_id — that is the group-DISCOVERY article;
    it never mentions Hoya and carries none of the Hoya facts. RE-SOURCED
    (badrabbit model) to genuine Apr-2024 Hoya coverage; Bitdefender retained
    only as group-profile context (Hive lineage / RaaS). Three real sources
    snapshotted + hashed:
    - bleepingcomputer/2024-04-11_optics-giant-hoya-hit-with-10-million-ransomware-demand
      (Bill Toulas, 2024-04-11) sha256 f0a7a0f8…8eba6abe, 89,555 bytes — ATTRIBUTION + ransom.
    - therecord/2024-04-04_hoya-japan-cyberattack-affects-production
      (Joe Warminsky, 2024-04-04) sha256 8d7b4a18…87c74c22, 83,959 bytes — DISCLOSURE facts/dates.
    - tomshardware/2024-04-12_hoya-euv-chipmaking-supplier-ransomware
      (Mark Tyson, 2024-04-12) sha256 94d0e632…d03bad9e, 1,831,730 bytes — semiconductor/EUV context + corroboration.
    Bitdefender snapshot bitdefender__2023-10-20_hunters-international-hive-overlap.html
    re-hashed 7936583a…544b44c9 (117,809 bytes) — matches its record (hash re-verified).

    [a] FACTS — $10M / 1.7M files / 2TB all source-carried: BC "demanded a $10
    million ransom for a file decryptor and not to release files stolen"; "an
    alleged 1.7 million stolen files, amounting to 2 TB of data. This ransom
    demand was also confirmed independently by BleepingComputer"; Tom's Hardware
    "a pledge by the ransomware group not to release any of the 1.7 million files
    (2TB of data)". (NB: the tasking figure "1.1M-doc" is NOT what any source
    says — every source, and the Hunters International panel screenshot reported
    by Hackmanac as 1,771,224 files, gives ~1.7M; kept 1700000.) CORRECTIONS:
    (1) removed unsourced "Hoya restored most production by mid-May" and set
    end_date null — no cited April-2024 source establishes a restoration/bounded
    end. (2) Reframed the disclosure: Hoya "did not itself confirm ransomware"
    (The Record: "Recorded Future News has asked Hoya whether ransomware was the
    cause. The company did not immediately respond."); it was disclosed as an
    "IT system incident" / "unauthorized access to our servers by a third party"
    affecting "some production plants and the ordering system for several
    products" (softened from "production at multiple plants had been suspended").
    (3) Moderated the "world's largest producer of EUV photomask blanks"
    superlative — Tom's Hardware supports only "essential player" / "a leader in
    the development of products for EUV lithography" + key products "Mask blanks
    and photomasks for semiconductor manufacturing"; superlative dropped.

    [b] ATTRIBUTION — corrected. Old block said attributing_org "Hoya
    Corporation + Hunters International (self-claimed)" with high confidence and
    attribution_date 2024-04-09 — all three wrong: Hoya never named the actor;
    the group did NOT publicly self-claim (BC: "no files have been released on
    the Hunters International site and the threat actors haven't publicly claimed
    responsibility for the attack on Hoya"); the demand surfaced via the group's
    negotiation panel (LeMagIT screenshots) + BC's independent confirmation. Set
    attributing_org "LeMagIT / BleepingComputer (Hunters International ransom-
    negotiation panel)"; confidence high→moderate; auspex_assessment
    concur→concur-with-caveat; attribution_date 2024-04-09→2024-04-11 (BC pub
    date, the snapshotted confirming source); attribution_source_id repointed
    bitdefender→bleepingcomputer.

    [c] DATES — start_date 2024-03-30 ✓ (The Record: "on March 30 it discovered
    an 'IT system incident'"); disclosure_date 2024-04-04 ✓ (The Record pub date
    / Hoya statement; BC: "no updates on the business status since April 4,
    2024"); end_date 2024-05-15→null (unsourced). Each new source's published_on
    = its actual pub date (2024-04-11 / 2024-04-04 / 2024-04-12), verified from
    datePublished in the snapshots.

    [d] DOCTRINE_LINKS — [] retained and correct. The event's whole purpose is a
    criminal-baseline negative example (financial operator, no doctrinal
    targeting despite a strategically sensitive victim); no doctrine applies; no
    attesting source needed.

    [e] ATTRIBUTION_LEVEL — set named-actor (a specific named criminal group,
    "Hunters International"; no nation/service/unit named — correct, it is a
    criminal/ actor).

    [f] ACTOR_ID — criminal/hunters-international resolves to
    atlas/actors/criminal/hunters-international.yaml (RaaS, Hive code lineage,
    financial mission; lists Hoya Mar-2024 among victims). No actor defect. NB
    for orchestrator: the actor file also still cites the Bitdefender group-
    discovery source (legitimate group-profile citation) — unaffected.

    Residual uncertainties: (i) LeMagIT is the ultimate origin of the ransom
    figures but is French-language and was not snapshotted; BC's explicit
    independent confirmation carries the claim, so no LeMagIT record was created.
    (ii) The affected facilities were an unspecified "overseas office" (The
    Record) — target country deliberately left unset. (iii) Later reporting
    (Hackmanac, Jul-2024; actor file) indicates Hoya was eventually listed on the
    leak site, but the April-2024 cited sources predate any public listing, so
    the attribution is framed to what those sources support.
