id: 2024-03/evasive-panda-monlam-festival-watering-hole-and-tibetan-software-suppl
name: "Evasive Panda Monlam Festival watering-hole and Tibetan-software supply-chain compromise deploys Nightdoor and MgBot"
start_date: 2024-03-01
incident_type:
  - espionage
  - supply-chain
  - intrusion
  - surveillance
initial_vector: supply-chain
false_flag_risk: none
summary: |
  ESET reported that since at least September 2023 Evasive Panda (BRONZE HIGHLAND) ran a cyberespionage campaign against Tibetans, compromising the website of the Kagyu Monlam Festival as a watering hole and breaching the supply chain of an Indian software developer to deliver trojanized Windows and macOS installers of Tibetan-language translation software. The operation deployed malicious downloaders that installed the MgBot modular framework and a previously undocumented backdoor ESET named Nightdoor. Victims were Tibetans in India, Taiwan, Hong Kong, Australia, and the United States. ESET attributed the campaign to Evasive Panda with high confidence based on the MgBot and Nightdoor malware used.
