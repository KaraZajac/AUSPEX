initial_vector: unknown
outcome_summary: |
  Qilin ransomware intrusion of The Big Issue Group, a UK
  social-enterprise magazine publisher supporting people
  experiencing homelessness. The intrusion forced suspension
  of vendor-facing IT systems for several weeks, disrupting
  the magazine's vendor-payment processing and supply
  logistics for approximately 1,000 active street vendors.
  Qilin claimed responsibility April 4, 2024 and posted
  approximately 550GB of exfiltrated data on its leak site
  including financial records and vendor PII.
quantified_impact:
  data_exfiltrated_gb: 550
  vendors_affected: 1000
false_flag_risk: none
summary: |
  Illustrative criminal-baseline case: a Russian-language-
  operated RaaS cluster (no state nexus) targets a UK social
  enterprise with no plausible doctrinal interest. The
  victim selection is opportunistic-affiliate, the impact
  falls on vulnerable street vendors, and no state-aligned
  reading produces a coherent targeting story — exactly the
  signal AUSPEX wants the doctrine engine to abstain on.
