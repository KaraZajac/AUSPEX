id: 2024-03/big-issue-qilin
name: Qilin ransomware against The Big Issue Group
start_date: 2024-03-20
disclosure_date: 2024-03-26
end_date: null
incident_type:
  - ransomware
  - data-theft
  - extortion
initial_vector: unknown
outcome_summary: |
  Qilin ransomware intrusion of The Big Issue Group, a UK
  street-newspaper and social-enterprise publisher supporting
  people experiencing homelessness. The group detected the
  incident in the week before 26 March 2024, restricted access
  to its systems and engaged external IT-security experts; it
  stated that publication and distribution of the magazine were
  not impacted and that it was operating with limited disruption.
  On 24 March 2024 Qilin posted The Big Issue to its darknet
  leak site, claiming to have stolen approximately 550GB of data
  — staff and executive PII (including passport scans, payroll
  records, and CEO Paul Cheal's driving licence and salary
  details), contracts, partner data, and financial/investment
  information. The 550GB figure is Qilin's own leak-site claim
  and was not independently verified.
quantified_impact:
  data_exfiltrated_gb: 550   # Qilin leak-site CLAIM, not independently verified
false_flag_risk: none
summary: |
  Illustrative criminal-baseline case: a RaaS cluster whose
  payload is written by Russian-speaking operators (no
  documented state nexus) hits a UK social enterprise with no
  plausible doctrinal interest. Victim selection is
  opportunistic-affiliate and no state-aligned reading produces
  a coherent targeting story — exactly the signal AUSPEX wants
  the doctrine engine to abstain on.
