    [a] FACTS — corrected against the three RAW sources:
      - 550GB kept but re-scoped as Qilin's LEAK-SITE CLAIM, not independently
        verified (The Record: "darknet extortion site alongside the claim the
        gang stole 550 gigabytes of confidential data"; CW: "550GB").
      - STRIPPED fabricated impact "forced suspension of vendor-facing IT
        systems for several weeks ... vendor-payment processing ... ~1,000
        active street vendors." DIRECTLY CONTRADICTED: all three sources carry
        the victim statement "The publication and distribution of the Big Issue
        magazine is not impacted by this incident" and "operating with limited
        disruption." No source gives any vendor-affected count (Register cites a
        2022 figure of "3,637 vendors" as historical scale, NOT incident
        impact). Removed quantified_impact.vendors_affected: 1000.
      - "vendor PII" corrected to staff/executive PII — leaked data is
        personnel/passport/payroll + CEO Paul Cheal driving licence & salary +
        Big Issue Invest CEO passport/bank (Register), contracts/partner data +
        financial/investment info (CW). Not street-vendor PII.
      - incident_type disruption -> extortion (double-extortion leak-site;
        "disruption" overstated given "not impacted").
    [c] DATES — corrected conflation with the Synnovis timeline:
      - disclosure_date 2024-04-04 -> 2024-03-26 (first reporting: The Record +
        Computer Weekly both 26 Mar; Qilin posted the leak Sunday 24 Mar).
        "Qilin claimed responsibility April 4, 2024" was FALSE — the claim was
        public by 26/27 Mar.
      - end_date 2024-05-15 -> null (UNSUPPORTED; no source gives a resolution
        date — late-March reporting only says systems being restored).
      - start_date 2024-03-27 -> 2024-03-20 (best estimate: Beaumont said the
        org had been dealing with it "for about a week" as of ~26/27 Mar;
        Register "last week"). True intrusion/dwell date is unpublished.
      - Source published_on set to each article's JSON-LD datePublished
        (Register 2024-03-27, Record 2024-03-26, CW 2024-03-26).
    [b]/[e] ATTRIBUTION — set to leak-site self-claim: attributing_org_confidence
      high -> moderate, auspex_assessment concur -> concur-with-caveat, added
      attribution_level: named-actor, attribution_date 2024-04-04 -> 2024-03-26,
      attribution_source_id re-pointed to The Register. Qilin named ITSELF on
      its leak site (+ posted proof-of-theft); Big Issue confirmed an incident
      but did not independently attribute. Moderate / concur-with-caveat honest.
    [d] DOCTRINE — doctrine_links: [] correct and kept (criminal RaaS, no state
