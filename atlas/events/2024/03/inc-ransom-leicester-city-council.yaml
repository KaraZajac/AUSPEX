outcome_summary: |
  INC Ransom conducted a ransomware intrusion against Leicester City
  Council, a UK local-government authority serving the city of
  Leicester (population ~370,000). The council detected the intrusion
  on 7 March 2024 and shut down its IT networks as a precaution,
  disrupting phone lines and customer-facing services for over a week;
  the shutdown also left the council unable to remotely control street
  lighting, so faulty lights defaulted to staying on day and night for
  several weeks. INC Ransom claimed the attack on its dark-web leak
  site; after the council declined to pay, the group first published
  around 25 confidential documents and then the full ~1.3TB of stolen
  data (confirmed by the council). Published material included
  passports, rent statements, and applications to purchase council
  housing. The council confirmed a ransomware attack by "a known
  ransomware group" but did not itself name INC Ransom; it notified the
  Information Commissioner's Office and worked with Leicestershire
  Police and the National Cyber Security Centre. Critical services
  including child protection, adult social care safeguarding, and
  homelessness were among those disrupted.
