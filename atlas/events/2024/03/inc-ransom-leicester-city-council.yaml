id: 2024-03/inc-ransom-leicester-city-council
name: INC Ransom against Leicester City Council (UK local government)
start_date: 2024-03-07
disclosure_date: 2024-03-08
end_date: 2024-05-30
incident_type:
  - ransomware
  - data-theft
  - disruption
initial_vector: unknown
outcome_summary: |
  INC Ransom group conducted a ransomware intrusion against
  Leicester City Council, a UK local-government authority
  serving approximately 370,000 residents. The intrusion
  forced shutdown of council phone lines and major customer-
  facing services for over a week. INC Ransom subsequently
  posted approximately 1.3TB of exfiltrated data including
  birth certificates, passports, and benefit-claim
  documentation, after the council declined to pay. The
  Information Commissioner's Office opened a statutory
  inquiry. The exfiltrated dataset's sensitivity — including
  documents related to children in council care and
  homelessness applications — drew sustained press coverage.
quantified_impact:
  residents_at_risk: 370000
  data_exfiltrated_tb: 1.3
false_flag_risk: none
summary: |
  Illustrative INC Ransom case demonstrating mid-tier criminal
  RaaS impact on UK local-government CII. Notable for clean
  separation from any plausible state-targeting doctrine:
  Leicester has no specific strategic-interest sensitivity to
  any nation-state, and the victim selection is consistent
  with INC Ransom's broad opportunistic mid-market profile.
