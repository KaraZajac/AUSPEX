    [a] FACTS: 7 March 2024 detection + IT shutdown — council verbatim
    "shut down its IT networks on 7 March when its monitoring systems
    detected that an incident had taken place" (The Record: "shut
    everything down on March 7"). 1.3TB published after an initial ~25
    documents — council verbatim "At 1.3 terabytes, this is a much
    larger batch of data than the 25 documents published last week";
    The Register: "the miscreants published the entirety of the files
    it stole, amounting to a sizeable 1.3 TB". Street lights stuck on —
    The Register: lights "shining brightly all day and night", council
    "not able to remotely identify faults in the street lighting system",
    "The default mode for faults is that the lights stay on...".
    Declined to pay — The Register: "Leicester City Council wouldn't pay
    INC's ransom demands". Phone lines/services disrupted, notified ICO,
    worked with Leicestershire Police + NCSC — all council/The Record
    verbatim. CORRECTIONS (fabrications stripped): (1) "birth
    certificates" — NO source; removed (sourced leaked-doc types are
    passports, rent statements, applications to purchase council housing
    — The Record). (2) "benefit-claim documentation" — unsourced;
    removed. (3) "The Information Commissioner's Office opened a
    statutory inquiry" — FALSE; the council only "notified the
    Information Commissioner of our actions"; corrected to notified-ICO.
    (4) "documents related to children in council care and homelessness
    applications" conflated DISRUPTED DEPARTMENTS with leaked content —
    The Record lists "child protection, adult social care safeguarding,
    and homelessness departments" as SERVICES DISRUPTED, not published
    document categories; reframed. (5) 3TB-stolen figure NOT asserted —
    snapshotted sources give 1.3TB as the full stolen+published set (The
    Register: "the entirety of the files it stole ... 1.3 TB"); the
    "~3TB claimed" figure from other outlets is not carried by a
    snapshotted source, so omitted.
    [b] ATTRIBUTION: the COUNCIL never names INC Ransom ("a known
