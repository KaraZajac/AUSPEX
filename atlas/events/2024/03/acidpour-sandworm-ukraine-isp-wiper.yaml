id: 2024-03/acidpour-sandworm-ukraine-isp-wiper
name: AcidPour wiper deployment against Ukrainian ISP / telecom infrastructure (Sandworm)
start_date: 2024-03-01  # approximate; SentinelLabs disclosure window
disclosure_date: 2024-03-21
end_date: null
incident_type:
  - destructive
  - wiper
  - disruption
initial_vector: unknown
outcome_summary: |
  SentinelLabs disclosed AcidPour — an evolved x86-Linux embedded
  wiper variant of the February 2022 AcidRain (Viasat KA-SAT)
  family — appearing in Ukraine. AcidPour targets storage paths
  (/dev/dm-, /dev/loop, RAID arrays, NAS, embedded appliances)
  rather than satellite-modem flash. CERT-UA parallel disclosure
  attributed the activity to Sandworm (UAC-0165). Victimology
  suggested ISP / telecommunications-operator targeting, consistent
  with the late-2023 / early-2024 wave of Ukrainian telecom
  disruption.
false_flag_risk: none
summary: |
  Doctrinally significant as the family evolution of AcidRain into
  a more general Linux-storage wiper. The AcidRain family was the
  signature destructive payload of the Viasat KA-SAT invasion-day
  operation; AcidPour's appearance against Ukrainian ISP / telecom
  infrastructure two years later marks Sandworm's continued
  development of destructive tooling for embedded / Linux-edge
  victim environments — the natural follow-on tool for operations
  against Ukrainian telecom operators (Kyivstar disruption Dec 2023
  established this victimology).
