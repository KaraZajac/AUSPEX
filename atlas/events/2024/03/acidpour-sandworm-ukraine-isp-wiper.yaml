    — URL live, title/body match the citation.
    [a] FACTS: AcidPour = confirmed x86-Linux variant of AcidRain, first
    seen (uploaded from Ukraine) 2024-03-16 — source-carried ("we
    identified a suspicious Linux binary uploaded from Ukraine"; "a
    confirmed variant we refer to as 'AcidPour'"). AcidRain lineage:
    rendered Eutelsat KA-SAT / Surfbeam2 modems inoperable at the onset
    of the Feb 2022 invasion (source explicitly calls "Viasat hack" a
    MISNOMER — corrected the event's "Viasat KA-SAT" to "Eutelsat KA-SAT
