    capability = UBI (/dev/ubi*) + Device Mapper (/dev/dm-*) logic
    putting RAID / SAN / NAS + large-storage / embedded Linux in scope.
    CORRECTED outcome_summary's "targets storage paths (/dev/dm-,
    /dev/loop … ) rather than satellite-modem flash": /dev/loop* is an
    INHERITED AcidRain path (not a distinctive AcidPour addition), and
    AcidPour EXPANDS beyond flash (retains /dev/mtd*, adds /dev/ubi*
