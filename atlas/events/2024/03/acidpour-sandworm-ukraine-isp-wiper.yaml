      AcidPour, effectively connecting it to threat clusters previously
      publicly attributed to Russian military intelligence." CERT-UA
      "confirmed our findings and publicly attributed the activity to
      UAC-0165, considered a subgroup of the outdated Sandworm APT";
      Ukraine's SSSCIP (reported via CyberScoop) likewise designated
      UAC-0165. attribution_level=named-actor: the source names Sandworm
      (named actor), UAC-0165 (Ukrainian activity-cluster) and "Russian
      military intelligence" (GRU service) but does NOT state the
      numbered unit — Sandworm = GRU Unit 74455 rests on prior public
      attributions (2020 US DoJ indictment), not this report. The one
      "medium-confidence" qualifier in the article is the HISTORICAL
      AcidRain<->VPNFilter 'dstr' developmental similarity, not the
      AcidRain<->AcidPour link (SentinelLabs calls it "confirmed") nor
      the actor attribution (government CERT + SSSCIP explicit) — so high
      is not overstated.
