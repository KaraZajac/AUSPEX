id: 2024-03/acidpour-sandworm-ukraine-isp-wiper
name: AcidPour wiper appears in Ukraine amid Sandworm-linked ISP/telecom disruption
start_date: 2024-03-13  # telecom networks reportedly offline since 2024-03-13 (SolntsepekZ claim); AcidPour sample first submitted from Ukraine 2024-03-16; SentinelLabs disclosure 2024-03-21
disclosure_date: 2024-03-21
end_date: null
incident_type:
  - destructive
  - wiper
  - disruption
initial_vector: unknown
outcome_summary: |
  On 16 March 2024 SentinelLabs identified a novel x86-Linux wiper it
  named AcidPour, uploaded from Ukraine, and confirmed it as a variant
  of AcidRain — the wiper that rendered Eutelsat KA-SAT (Surfbeam2)
  modems inoperable in Ukraine at the onset of the February 2022
  Russian invasion (commonly, though per SentinelLabs a misnomer, the
  "Viasat hack"). AcidPour reuses AcidRain's reboot, recursive-wipe and
  IOCTL-based wiping logic and expands it with Unsorted Block Image
  (UBI, /dev/ubi*) and Device Mapper (/dev/dm-*) handling, extending
  its reach beyond flash to RAID arrays, SANs, NAS and other
  large-storage / embedded Linux (x86) devices. SentinelLabs confirmed
  the AcidRain->AcidPour link, connecting AcidPour to clusters
  previously attributed to Russian military intelligence; CERT-UA and
  Ukraine's SSSCIP publicly attributed the activity to UAC-0165, a
  subgroup of Sandworm. Specific AcidPour targets were not conclusively
  verified, but the discovery coincided with an enduring disruption of
  multiple Ukrainian telecom networks (offline since 13 March 2024)
  publicly claimed by the GRU-linked SolntsepekZ persona; SentinelLabs
  stated it could not confirm AcidPour was used against those ISPs.
false_flag_risk: none
summary: |
  Doctrinally significant as the family evolution of AcidRain into a
  more general x86-Linux storage / embedded wiper. AcidRain was the
  signature destructive payload of the invasion-day (24 Feb 2022)
  Eutelsat KA-SAT / Surfbeam2 modem-wiping operation aimed at disabling
  Ukrainian military communications; AcidPour's appearance in Ukraine
  two years later, amid disruption of Ukrainian telecom operators,
  marks continued Sandworm / GRU development of destructive tooling for
  embedded / Linux-edge victim environments. SentinelLabs notes the
  attributed subcluster UAC-0165's targets "are commonly observed in
  Ukrainian critical infrastructure, including telecommunications,
  energy, and government services" — the telecom victimology this tool
  fits — while cautioning that AcidPour's use against the March 2024
  ISP outages was not confirmed at disclosure.
