    6-point audit vs RAW. Snapshots (PRESERVE tier): Eurojust
    (sha256 a22a76cba6c6f534a7af48fc316fcf21fa4bad5d1e11c2e4c9d0faaefe682ebb),
    USAO-WDTX/DOJ via Wayback id_ 20241029113648
    (sha256 da34dd11077802a5656e1d6c9d60a2836eab4b7dd3abbfb28c0d950de93655c5),
