id: 2024-10/operation-magnus-redline
name: Operation Magnus — RedLine and META infostealer takedown
start_date: 2024-10-28
disclosure_date: 2024-10-29
end_date: 2024-10-29
incident_type:
  - disruption
initial_vector: unknown
outcome_summary: |
  Dutch National Police–led international operation against
  RedLine and META infostealer infrastructure. Seizure of three
  servers in the Netherlands, two domains, 1,200 servers in
  related infrastructure. RedLine alleged developer Maxim
  Rudometov (Russian national) indicted in the Western District
  of Texas. Eurojust / FBI / NCA / UK / Belgian / Portuguese /
  Australian partners. Operation included an "Operation Magnus"
  taunting site informing infostealer customers that their
  infrastructure was now in police hands.
false_flag_risk: none
campaign_id: operation-magnus
summary: |
  Major disruption of the infostealer ecosystem that feeds the
  UNC5537 / ShinyHunters / Scattered Spider monetization chain.
  AUSPEX treats this as the most consequential infostealer-
  cluster takedown of the corpus and a structural strike at the
  initial-access supply for ransomware affiliates.
attributions:
  - actor_id: null
    attributing_org: Eurojust + FBI + Dutch + Belgian + 5 partners
    attributing_org_confidence: high
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-10-29
    attribution_source_id: eurojust/2024-10-29_operation-magnus
    notes: |
      Operation Magnus: international law-enforcement takedown of the
      RedLine/META infostealer infrastructure. No AUSPEX-tracked actor
      conducted it; actor_id null (was a us/cybercom/cnmf-actor
      placeholder — corrected per AUDIT-2026-05-29 C1).
doctrine_links:
  - doctrine_id: us/ncs-2023
    perspective: defender-response
    pillar_id: us/ncs-2023/disrupt-dismantle
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Disrupt-and-Dismantle pillar operation against criminal
      tooling infrastructure. Downgraded from attested: the Eurojust
      attesting release is descriptive of the takedown operation and
      carries no official statement of the disrupt-and-dismantle /
      hold-accountable / impose-cost strategic purpose; as an
      EU-agency release it does not articulate the US NCS-2023 pillar.
      The link is inferred from the operation's takedown structure.
    attesting_source_id: eurojust/2024-10-29_operation-magnus
    inference_basis:
      source_id: eurojust/2024-10-29_operation-magnus
      signals:
        - "Coordinated multilateral infrastructure takedown: the coalition 'shut down three servers in the Netherlands, seized two domains, unsealed charges in the United States and took two people into custody in Belgium' — the seize/dismantle behaviour the pillar encodes"
        - "Scale of infrastructure disruption: authorities identified 'over 1 200 servers in dozens of countries' running RedLine/META and took the infrastructure down on 28 October 2024"
        - "Stated forward intent to disrupt and pursue: the coalition message shows it 'will shut down their criminal activities' and 'Investigations will now continue into the criminals using the stolen data'"
      ruled_out: "Attested confidence — the Eurojust release states no disrupt-and-dismantle / hold-accountable / impose-cost strategic purpose in an official's words (no such quote exists in it) and, as an EU body, does not invoke the US NCS-2023 pillar; it only describes the operation and the crime"
    contested: false
    analyst: claude
targets:
  - target_id: orgs/redline-stealer
    role: primary
sources:
  - eurojust/2024-10-29_operation-magnus
  - doj/2024-10-29_rudometov-redline-indictment
