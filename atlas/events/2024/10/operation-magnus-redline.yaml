doctrine_links:
  - doctrine_id: us/ncs-2023
    perspective: defender-response
    pillar_id: us/ncs-2023/disrupt-dismantle
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Disrupt-and-Dismantle pillar operation against criminal tooling
      infrastructure. The US was a full participant, not merely an
      associate of an EU-led coalition: DOJ/FBI unsealed a
      Western-District-of-Texas warrant to seize two RedLine/META C2
      domains and charged Rudometov, joining JCAT Operation Magnus
      "to disrupt the operations of the RedLine and META
      administrators" (USAO-WDTX). On that US component the NCS-2023
      disrupt-and-dismantle link is apt. Confidence held at
      strongly_inferred (not attested): neither cited source — the
      Eurojust release nor the USAO-WDTX release — invokes NCS-2023 by
      name or states the disrupt-and-dismantle / hold-accountable /
      impose-cost strategic purpose in an official's words. The
      2026-07-05 sweep downgrade attested→strongly_inferred is VERIFIED
      to hold (audit 2026-07-10); the sweep's "EU/Dutch-led, not US"
      premise is refined here — the US ran its own disrupt action, so
      the link is apt, but the confidence outcome is unchanged.
    attesting_source_id: eurojust/2024-10-29_operation-magnus
    inference_basis:
      source_id: eurojust/2024-10-29_operation-magnus
      signals:
        - "Coordinated multilateral infrastructure takedown: the coalition 'shut down three servers in the Netherlands, seized two domains, unsealed charges in the United States and took two people into custody in Belgium' — the seize/dismantle behaviour the pillar encodes"
        - "Scale of infrastructure disruption: authorities identified 'over 1 200 servers in dozens of countries' running RedLine/META and took the infrastructure down on 28 October 2024"
        - "Stated forward intent to disrupt and pursue: the coalition message shows it 'will shut down their criminal activities' and 'Investigations will now continue into the criminals using the stolen data'"
        - "US disrupt action inside Magnus (USAO-WDTX release): the coalition moved 'to seize domains, servers, and Telegram accounts used by the RedLine and META administrators to disrupt the operations,' and DOJ unsealed a Western-District-of-Texas warrant to seize two C2 domains plus charges against RedLine's developer/administrator — a US law-enforcement disrupt-and-dismantle action"
      ruled_out: "Attested confidence — neither cited source states a disrupt-and-dismantle / hold-accountable / impose-cost strategic purpose in an official's words (no such quote exists): the Eurojust release only describes the operation and the crime, and the USAO-WDTX release frames the seizures operationally ('to disrupt the operations') without invoking the US NCS-2023 pillar or its strategic aim"
    contested: false
    analyst: claude
