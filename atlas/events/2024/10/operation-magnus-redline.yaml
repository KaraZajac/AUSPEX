id: 2024-10/operation-magnus-redline
name: Operation Magnus — RedLine and META infostealer takedown
start_date: 2024-10-28
disclosure_date: 2024-10-29
end_date: 2024-10-29
incident_type:
  - law-enforcement  # meta type: multinational LE takedown counter-action — added per audit 2026-07-10 (protocol [f]; cf. orchestrator NB)
  - disruption
initial_vector: unknown  # meta counter-action (LE takedown) — no attacker initial-access vector applies
outcome_summary: |
  Dutch National Police–led international operation against
  RedLine and META infostealer infrastructure. Takedown of three
  servers in the Netherlands and seizure of two domains; over
  1,200 servers in dozens of countries were identified running the
  malware (per Eurojust). RedLine's suspected developer/administrator
  Maxim Rudometov (a Russian national) was charged by US criminal
  complaint in the Western District of Texas — access device fraud,
  conspiracy to commit computer intrusion, and money laundering.
  Partners: the Netherlands, FBI/US, UK NCA, Belgian, Portuguese
  (Polícia Judiciária) and Australian (AFP) authorities, coordinated
  by Eurojust. The coalition also pushed a taunting video/message to
  the operators (the public "Operation Magnus" reveal) showing their
  infrastructure was now in police hands.
false_flag_risk: none
campaign_id: operation-magnus
summary: |
  Major disruption of the infostealer ecosystem that feeds the
  UNC5537 / ShinyHunters / Scattered Spider monetization chain.
  AUSPEX treats this as the most consequential infostealer-
  cluster takedown of the corpus and a structural strike at the
  initial-access supply for ransomware affiliates.
