    (sha256 e42342bea588ac91ad9c734a21c034b7d1c113fe20a8a782ed2cae17c19ed485).

    [a] FACTS — all load-bearing claims carried + snapshotted.
    Eurojust (verbatim): "The infostealers, RedLine and META, taken
    down today targeted millions of victims worldwide, making it one of
    the largest malware platforms globally"; "Three servers were taken
    down in the Netherlands, two domains were seized, charges were
    unsealed in the United States and two people were taken into custody
    in Belgium"; "over 1 200 servers in dozens of countries were running
    the malware." CORRECTED: the event previously read "1,200 servers in
    related infrastructure" (implying seizure) — the raw says 1,200 were
    IDENTIFIED running the malware; reworded. Partner list verified
    verbatim (Netherlands National Police / Team Cybercrime Limburg /
    Public Prosecution; US FBI + NCIS + IRS-CI + DoD-CIS + Army CID;
    Belgium Federal Prosecutor + Federal Police; Portugal Polícia
    Judiciária; UK National Crime Agency; Australia AFP). "Taunting site"
    reworded to "taunting video/message" to match Eurojust ("a message
    was sent to the alleged perpetrators, including a video … will shut
    down their criminal activities"); the operation-magnus.net reveal is
    widely reported but the raw carries the video/message.
    Rudometov / charges — USAO-WDTX (verbatim): "the Justice Department
    unsealed charges against Maxim Rudometov, one of the developers and
    administrators of RedLine Infostealer … charged with access device
    fraud, in violation of 18 U.S.C. § 1029, conspiracy to commit
    computer intrusion … and money laundering." CORRECTED: event said
    "indicted" — it was a criminal COMPLAINT ("The complaint is merely
    an allegation"); reworded to "charged by US criminal complaint."
    "(Russian national)" is NOT in either cited primary (WDTX omits
    nationality; Eurojust does not name him) — added BleepingComputer as
    secondary carrier: "announced charges today against Maxim Rudometov,
    a Russian national, for being the suspected developer and
    administrator of the RedLine" (also "over 1,200 servers … which
    communicated with the central" server, ESET-mapped). No fabricated
    malware/CVE/victim/figure found.

    [b] ATTRIBUTION — actor_id null (counter-action); attributing_org /
    high / concur-with-caveat / 2024-10-29 unchanged and correct. ADDED
    attribution_level: named-actor (DOJ named an individual developer;
    RedLine is a criminal MaaS operation, no nation/unit) — cf. sibling
    treasury-salt-typhoon-sanctions convention.

    [c] DATES — start 2024-10-28 verified (Eurojust: takedown "took
    place on 28 October"); disclosure/end 2024-10-29 (Eurojust dated
    "29 October 2024"). Eurojust published_on 2024-10-29 verified. DOJ
    source published_on CORRECTED 2024-10-29→2024-10-28 (real USAO-WDTX
    byline "Monday, October 28, 2024"); source-id slug (…2024-10-29…)
    preserved for citation lineage.

    [d] DOCTRINE — us/ncs-2023 / disrupt-dismantle / defender-response /
    strongly_inferred. VERIFIED the 2026-07-05 sweep downgrade
    attested→strongly_inferred HOLDS: neither cited source invokes
    NCS-2023 or states the disrupt-and-dismantle/hold-accountable/
    impose-cost purpose in an official's words. Refined the sweep's
    "EU/Dutch-led, not US" premise — the US ran its own disrupt action
    (WDTX warrant seizing two C2 domains + Rudometov charges, JCAT
    Magnus "to disrupt the operations"), so the US-doctrine link is APT;
    confidence outcome unchanged. All inference_basis Eurojust quotes
    re-checked verbatim; added a WDTX disrupt signal. perspective
