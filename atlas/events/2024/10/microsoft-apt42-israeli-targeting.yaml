notes: |
  AUDIT 2026-07-05 (claude-opus-4.8 / max) — PHANTOM + DUPLICATE.
  This record rested on a non-existent MSTIC "2024-10-08" report
  and two fabricated implant names (GORBLE, MISCONDUCT). Fabricated
  prose stripped; two dangling target FKs (orgs/israeli-government-
  various, orgs/israeli-academic-institutions — neither in the
  targets registry) replaced with resolvable sector targets.
  Flagged as a RETIRE / MERGE candidate: the canonical real event
  for the summer-2024 APT42-vs-Israel tempo is
  2024-08/google-tag-apt42-tempo-surge. If a Microsoft-anchored
  APT42/Israel event is genuinely wanted, the ONLY real Microsoft
  anchor is the 2024-01-17 MSTIC post ("New TTPs observed in Mint
  Sandstorm campaign targeting high-profile individuals at
  universities and research orgs") — targeting since Nov 2023 of
  Middle-East-affairs individuals at universities/research orgs in
  Belgium, France, Gaza, Israel, UK and US with Israel-Hamas-war
  lures, implants MediaPl + MischiefTut — a DIFFERENT campaign and
  window that would require re-dating this record to 2024-01.
  Deletion / merge / re-anchor is Kara's call.
