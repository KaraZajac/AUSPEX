id: 2024-10/microsoft-apt42-israeli-targeting
name: Microsoft documents APT42 / Mint Sandstorm spear-phishing of Israeli targets during Hezbollah-Israel escalation
start_date: 2024-07-01
disclosure_date: 2024-10-08
end_date: 2024-09-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Microsoft MSTIC published an analysis of APT42 / Mint Sandstorm
  operations against Israeli government, academic, and civil-
  society targets through summer and early autumn 2024 — the
  period of acute Hezbollah-Israel escalation culminating in
  Israeli pager and walkie-talkie attacks (September 2024) and
  the Israeli ground operation in Lebanon. APT42 used custom
  credential-phishing infrastructure mimicking Israeli academic
  institutions and US-Israel-academic exchange portals, with
  payload chains that included the GORBLE and MISCONDUCT
  implants documented in MSTIC's analysis.
false_flag_risk: none
summary: |
  Significant tempo data point: APT42 / Mint Sandstorm operations
  bracketing the most acute Hezbollah-Israel kinetic escalation
  since 2006. The targeting fits the broader Resistance Axis
  anti-Israel-coercion pillar; tempo elevation during a
  Resistance-Axis-partner conflict crisis is consistent with
  the pattern of IRGC-IO and MOIS cyber tasking surging during
  regional crises.
