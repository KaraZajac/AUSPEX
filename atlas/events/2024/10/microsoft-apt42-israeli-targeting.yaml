  notes: |
    PHANTOM-REMEDIATION audit. Path taken: DUPLICATE / RETIRE-MERGE
    (per PHANTOM-REMEDIATION.md STEP 0b) — did NOT re-source; audited
    down to truthful minimum, set level: partial, flagged loudly for
    Kara. The sole cited source msft/2024-10-08_apt42-israeli-targeting
    is a PHANTOM: url:null, no snapshot possible, NO content_sha256
    recorded.

    [a] FACTS — the load-bearing fabrications were stripped:
      • "Microsoft MSTIC published an analysis ... [Oct 8 2024] ...
        bracketing the Israeli pager and walkie-talkie attacks
        (September 2024)": NO such Microsoft publication exists. The
        Microsoft Security Blog "sandstorm" tag enumerates every
        Sandstorm post; the only Mint Sandstorm posts are 2023-04-18
        ("Nation-state threat actor Mint Sandstorm refines
        tradecraft...") and 2024-01-17 ("New TTPs observed in Mint
        Sandstorm campaign..."). Independent searches (The Record, SC
        Media, Certfa Radar) attribute the summer-2024 Israeli-target
        surge to GOOGLE TAG (2024-08-14), not Microsoft. The source
        record's own notes already conceded the post could not be
        found.
      • "GORBLE and MISCONDUCT implants documented in MSTIC's
        analysis": FABRICATED / MISATTRIBUTED. GORBLE is real but is
        Recorded Future / Insikt Group's GreenCharlie toolset (report
        cta-ir-2024-0820, 2024-08-20; family = GORBLE/TAMECAT/POWERSTAR)
        — never a Microsoft-named implant. "MISCONDUCT" does not exist
        as a malware family in any reachable source; it appears to be
        a garbling of the real "MischiefTut" backdoor that Microsoft
        named in its SEPARATE 2024-01-17 post (alongside "MediaPl").
        APT42 is overwhelmingly a credential-phishing / social-
        engineering actor; the custom-implant chain narrative is not
        carried by any locatable source. Sentence removed.
      • "custom credential-phishing infrastructure mimicking Israeli
        academic institutions and US-Israel-academic exchange portals":
        specifics uncarried by any locatable source; removed. Kept only
        the generic, well-supported claim (APT42 credential-phishing
        vs Israeli gov/academic/NGO/diplomatic targets in 2024) which
        Google TAG (2024-08-14) and Check Point (2025) do carry.

    [b] ATTRIBUTION — actor is sound, citation is not. Microsoft does
    track APT42 as "Mint Sandstorm" and attributes it to the IRGC
    (its real 2023-04-18 / 2024-01-17 posts + Security-Insider
    profile: "associated with an intelligence arm of Iran's military,
    the IRGC"). So actor_id ir/irgc-io/apt42 and attributing_org
    Microsoft are defensible. But attribution_source_id points at a
    PHANTOM. Kept attributing_org_confidence: high (reflects
    Microsoft's genuine, corpus-wide high-confidence attribution, not
    the phantom) and added an explicit attribution-note documenting
    the phantom citation + unverifiable attribution_date. Added
    attribution_level: named-unit (Microsoft attributes Mint Sandstorm
    to the IRGC / IRGC-IO), per orchestrator NB.

    [c] DATES — disclosure_date 2024-10-08 is the phantom's own
    fabricated date and is unverifiable; retained (not nulled) because
    the record is retire-flagged and over-editing a retire candidate
    adds no value — flagged in notes instead. start_date 2024-07-01 /
    end_date 2024-09-30 (claimed campaign window) roughly overlap the
    genuine Google-TAG-documented Feb–Jul 2024 surge; left as-is.
    Source published_on could not be corrected to a real date (no real
    source exists).

    [d] DOCTRINE_LINKS — kept the single ir/resistance-axis /
    anti-israel-coercion link at strongly_inferred (per orchestrator NB
    "Iran collection"); attesting_source_id null (correct — no source
    states the goal). Tightened the reasoning to the standard
    strongly_inferred test (Israeli victim set + IRGC-IO mission +
    crisis timing → one strategic reading, no serious competitor).

    [e] ATTRIBUTION_LEVEL — was MISSING; set named-unit (IRGC-IO).

    [f] ACTOR_ID — ir/irgc-io/apt42 RESOLVES (file at
    atlas/actors/ir/apt42.yaml; internal id ir/irgc-io/apt42). FLAG for
    Kara: the actor FILE PATH (ir/apt42.yaml) does not mirror its id
    path (ir/irgc-io/apt42) — cosmetic, FK resolves, but inconsistent
    with the ir/irgc-io/*.yaml convention; not edited (actor files are
    out of scope).

    REFERENTIAL FIX — both original target FKs were DANGLING
    (orgs/israeli-government-various, orgs/israeli-academic-institutions
    are absent from the targets registry). Replaced with resolvable
    sector targets sectors/government (il) + sectors/academic/university
