initial_vector: phishing
outcome_summary: |
  APT42 / Mint Sandstorm (Iran, IRGC-IO) conducted credential
  spear-phishing against Israeli targets during 2024. Microsoft
  tracks this cluster as Mint Sandstorm and attributes it to
  Iran's IRGC. AUDIT NOTE (2026-07-05): the specific "MSTIC
  October 8 2024 analysis" this record was built on could NOT be
  located — no such Microsoft blog post exists. Microsoft's real
  Mint Sandstorm posts are dated 2023-04-18 and 2024-01-17; the
  2024 summer/autumn Israeli-targeting phishing tempo is
  documented by Google TAG (2024-08-14), not by Microsoft. The
  previously-asserted "GORBLE and MISCONDUCT implants documented
  in MSTIC's analysis" were fabricated / misattributed and have
  been removed: GORBLE is Recorded Future's (Insikt) GreenCharlie
  toolset, not a Microsoft-named implant, and "MISCONDUCT" does
  not exist as a malware family (it appears to be a garbling of
  the real "MischiefTut" backdoor from Microsoft's separate
  2024-01-17 campaign). The "custom infrastructure mimicking
  Israeli academic institutions and US-Israel exchange portals"
  specifics were likewise uncarried by any locatable source and
  have been removed.
false_flag_risk: none
summary: |
  RETIRE / MERGE CANDIDATE (audit 2026-07-05). Framed as a
  distinct Microsoft/MSTIC October 2024 disclosure of APT42
  targeting Israel during the Hezbollah-Israel escalation, but no
  such Microsoft disclosure exists (phantom source — see
  outcome_summary + notes). The genuine kernel — APT42 (IRGC-IO)
  credential-phishing surge against Israeli government, academic,
  NGO and diplomatic targets in 2024 — duplicates the well-sourced
  Google TAG sibling event 2024-08/google-tag-apt42-tempo-surge.
  Retained pending Kara's retire/merge decision. Doctrinally the
  activity fits the Resistance-Axis anti-Israel-coercion pillar
  (Iran anti-Israel collection during a Resistance-Axis-partner
  kinetic crisis).
