id: 2024-10/cisa-aa24-290a-iranian-brute-force
name: CISA AA24-290A — Iranian brute-force / credential-access against US CII
start_date: 2023-10-01
disclosure_date: 2024-10-16
end_date: null  # advisory declares no campaign end; last network IOC 2024-02-15
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  AA24-290A documents Iranian brute-force / password-spray and MFA
  'push bombing' (MFA fatigue) intrusions into US critical-
  infrastructure organizations — healthcare and public health,
  government, information technology, engineering, and energy —
  since October 2023. The actors abused valid accounts (reached via
  password spraying and the open-source DomainPasswordSpray.ps1
  tool, plus Microsoft 365 / Azure / Okta / Citrix / ADFS exposure),
  registered their own devices for MFA and modified MFA registrations
  for persistent access, moved laterally over RDP, and exfiltrated
  credential and network-inventory data. The authoring agencies
  assess the actors sell this access and information on cybercriminal
  forums to third parties who may conduct follow-on activity; the
  advisory cautions that some TTPs/IOCs may belong to those buyers
  rather than to the Iranian actors.
false_flag_risk: none
summary: |
  Joint Five-Eyes advisory (FBI, CISA, NSA, CSE Canada, AFP, and
  ASD's ACSC) warning that, since October 2023, Iranian cyber actors
  have used brute force — chiefly password spraying — and MFA 'push
  bombing' / MFA fatigue to compromise accounts at US critical-
  infrastructure organizations across the healthcare and public-
  health, government, information-technology, engineering, and energy
  sectors. After gaining access the actors frequently registered
  their own devices for MFA and modified MFA registrations to
  establish persistent access, then performed discovery to harvest
  further credentials and network information. The authoring agencies
  assess the actors aim to obtain credentials and network-mapping
  data to sell on cybercriminal forums, enabling follow-on access by
  other actors — i.e. Iranian initial-access-broker activity, not a
  coercive or destructive CII operation. AUSPEX situates the campaign
  within the broader IRGC-aligned Iranian access/monetization
  ecosystem, but the advisory itself names neither the IRGC nor any
  specific group and attributes the activity to Iran at the nation
  level.
attributions:
  - service_id: ir/irgc
    actor_id: null
    attributing_org: CISA + FBI + NSA + CSE + AFP + ASD ACSC
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-10-16
    attribution_source_id: cisa/2024-10-16_aa24-290a-irgc-brute-force
    notes: |
      AA24-290A attributes the activity to "Iranian cyber actors"
      and tags the record "Nation-State Actor: Iran"; it names no
      service, unit, or group — the strings "IRGC" / "Revolutionary
      Guard" appear nowhere in the advisory. attribution_level is
      therefore nation, at high confidence (an unhedged Five-Eyes
      attribution). The ir/irgc service_id is an AUSPEX assessment
      placing the activity in the IRGC-aligned initial-access-broker
      ecosystem (Pioneer Kitten / Fox Kitten lineage); it is NOT
      stated by this advisory, hence auspex_assessment is
      concur-with-caveat. REVIEW: keep ir/irgc as an ecosystem
      overlay, or drop to pure nation-level (actor_id + service_id
      both null)?
doctrine_links:
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: ir/asymmetric-warfare/civilian-cii-coercion
    program_id: null
    confidence: plausible
    reasoning: |
      An Iranian (IRGC-ecosystem) actor brute-forcing US critical-
      infrastructure organizations fits the asymmetric-warfare
      civilian-CII-coercion pillar's target set. But AA24-290A states
      the actors' aim is to harvest and sell credentials / network
      data on cybercriminal forums (initial-access brokering) — a
      revenue / access-resale purpose, not CII coercion — and it
      documents no CII disruption or harm. With the source naming a
      resale purpose, more than one strategic reading survives
      (asymmetric CII-coercion vs. sanctions-evasion revenue), so the
      link is plausible, not strongly_inferred.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Asymmetric-warfare civilian-CII-coercion: the exclusively US-CII target set (healthcare, government, energy) matches the pillar and the actor population is assessed IRGC-aligned; but the advisory documents stealthy access-harvesting, not CII disruption or coercion."
        - "Sanctions-evasion / access-resale revenue: the advisory's stated aim — selling harvested credentials and access on cybercriminal forums — reads as revenue-generating initial-access brokering, which competes with (and arguably dominates) the coercion reading."
    contested: false
    analyst: claude
  - doctrine_id: ir/sanctions-evasion
    pillar_id: ir/sanctions-evasion/ransomware-revenue
    program_id: null
    confidence: plausible
    reasoning: |
      The same Iranian initial-access-broker ecosystem (Pioneer
      Kitten / Fox Kitten) is separately documented monetizing this
      kind of access through ransomware-affiliate work (CISA
      AA24-241A, Aug 2024). If the access AA24-290A describes feeds
      that pipeline, it serves the sanctions-evasion ransomware-
      revenue pillar. The link is plausible, not higher, because
      AA24-290A itself never mentions ransomware, Pioneer Kitten, or
      sanctions evasion — it says only that the actors sell access to
      unspecified cybercriminals.
    counter_explanation: |
      AA24-290A does not document ransomware monetization, name
      Pioneer Kitten / Fox Kitten, or tie the resale proceeds to
      Iran's sanctions-evasion economy; the plausible link reflects
      the broader ecosystem pattern, not the specific activity this
      advisory documents.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Sanctions-evasion ransomware-revenue: harvested access sold on for ransomware-affiliate monetization within the IRGC-linked Pioneer Kitten / Fox Kitten model."
        - "Generic criminal access-resale with no state nexus: the advisory frames buyers as ordinary cybercriminals, so the resale need not serve Iran's sanctions-evasion economy at all."
    contested: false
    analyst: claude
