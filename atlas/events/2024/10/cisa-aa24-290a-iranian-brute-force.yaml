id: 2024-10/cisa-aa24-290a-iranian-brute-force
name: CISA AA24-290A — Iranian brute-force / credential-access against US CII
start_date: 2024-01-01
disclosure_date: 2024-10-16
end_date: 2024-10-15
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Five-Eyes joint advisory (CISA / FBI / NSA / CSE / AFP / ASD
  ACSC) documenting Iranian-affiliated cyber-actor brute-force
  and password-spraying operations against US critical-
  infrastructure organizations across healthcare, government,
  IT, engineering, and energy sectors. Operators modified MFA
  registrations to establish persistent access. The operations
  are distinct from but adjacent to the CyberAv3ngers Unitronics
  campaign and overlap operationally with the Pioneer Kitten /
  Fox Kitten initial-access-broker ecosystem.
false_flag_risk: none
summary: |
  Five-Eyes attestation of the broader Iranian-affiliated initial-
  access ecosystem operating against US CII during the 2024
  election window. Doctrinally fits the asymmetric-warfare
  civilian-CII-coercion pillar and supports the sanctions-evasion
  ransomware-revenue pillar where the same access is monetized
  through follow-on affiliate work (Pioneer Kitten). The
  advisory's October 2024 timing also overlaps the FBI / CISA
  Aria Sepehr Ayandehsazan advisory and the broader election-
  cycle tempo elevation.
attributions:
  - service_id: ir/irgc
    actor_id: null
    attributing_org: CISA + FBI + NSA + CSE + AFP + ASD ACSC
    attributing_org_confidence: high
    auspex_assessment: concur
