qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: full
  notes: |
    Audited against the primary source — CISA/FBI/NSA/CSE/AFP/ASD-ACSC joint advisory
    AA24-290A "Iranian Cyber Actors' Brute Force and Credential Access Activity Compromises
    Critical Infrastructure Organizations" (16 Oct 2024). RAW snapshot captured:
    cisa__2024-10-16_aa24-290a-irgc-brute-force.html, sha256 97598a76…54bcb448, 108,304 bytes.
    Real first-party govt article (title + body match), NOT a phantom; tier primary confirmed.
    All 6 points completed -> level full.

    [a] FACTS — corrected. Verbatim: "warn network defenders of Iranian cyber actors' use of
    brute force and other techniques to compromise organizations across multiple critical
    infrastructure sectors, including the healthcare and public health (HPH), government,
    information technology, engineering, and energy sectors. The actors likely aim to obtain
    credentials and information describing the victim's network that can then be sold to enable
    access to cybercriminals." And: "Since October 2023, Iranian actors have used brute force,
    such as password spraying, and multifactor authentication (MFA) 'push bombing' ... The actors
    frequently modified MFA registrations, enabling persistent access ... The authoring agencies
    assess the Iranian actors sell this information on cybercriminal forums." STRIPPED as
    unsupported by the advisory: (1) the "2024 election window" / "election-cycle tempo elevation"
    framing — "election" occurs on the page ONLY in CISA's site-nav topic "Election Security",
    never in the advisory body; AA24-290A is a credential-harvesting / initial-access advisory
    with NO election nexus. (2) "distinct from ... the CyberAv3ngers Unitronics campaign",
    "overlap ... with the Pioneer Kitten / Fox Kitten initial-access-broker ecosystem", and
    "overlaps the FBI / CISA Aria Sepehr Ayandehsazan advisory" — none of CyberAv3ngers /
    Unitronics / Pioneer Kitten / Fox Kitten / Aria Sepehr / ransomware appears anywhere in
    AA24-290A (grep = 0 hits); these were AUSPEX ecosystem cross-links stated as source fact.
    ADDED (prominent in the advisory but previously missing): MFA 'push bombing' / MFA fatigue
    [T1621]; and the actors' stated end — selling harvested credentials/network data on
    cybercriminal forums (initial-access brokering). summary + outcome_summary rewritten to what
    the advisory carries, with the IRGC-ecosystem reading explicitly labelled AUSPEX inference.

    [b] ATTRIBUTION — corrected. The advisory attributes ONLY to "Iranian cyber actors" /
    "Iranian actors" / "Iranian group" and tags "Nation-State Actor: Iran". "IRGC" /
    "Revolutionary Guard" / "Guard Corps" appear NOWHERE (grep = 0). Set attribution_level: nation
    (was absent). Kept attributing_org_confidence: high (unhedged Five-Eyes attribution).
    Downgraded auspex_assessment concur -> concur-with-caveat and rewrote the attribution notes:
    ir/irgc service_id is an AUSPEX ecosystem overlay, NOT a service attribution made by this
    advisory (the prior notes claimed "Service-level attribution", which over-stated the source).

    [c] DATES — corrected. start_date 2024-01-01 -> 2023-10-01 ("Since October 2023"; earliest
    network IOC in Table 14 = 10/06/2023). end_date 2024-10-15 -> null: prior value was a
    fabricated disclosure-minus-one; the advisory declares no campaign end, is written in the
    present tense, and its IOC date-ranges are explicitly "the timeframe the actors likely used
    the IPs" (IP-usage windows; last = 02/15/2024), not a campaign boundary. disclosure_date
    2024-10-16 confirmed (Release Date "October 16, 2024", Alert Code AA24-290A). Source
    published_on 2024-10-16 confirmed.

    [d] DOCTRINE_LINKS — recalibrated. ir/asymmetric-warfare/civilian-cii-coercion DOWNGRADED
    strongly_inferred -> plausible: the advisory states a resale / initial-access-broker purpose
    ("credentials and information ... sold to enable access to cybercriminals"), a serious
    competitor to the coercion reading, and documents no CII disruption/harm — so "one strategic
    reading with no serious competitor" fails; inference_basis converted signals/ruled_out ->
    alternatives[]; attesting_source_id set null. ir/sanctions-evasion/ransomware-revenue kept
    plausible (advisory names neither ransomware nor sanctions evasion nor Pioneer Kitten; honest
    counter_explanation retained; alternatives[] added). Neither link is attested, so no
    attesting_source_id gate obligation.

    [e] ATTRIBUTION_LEVEL — set to nation (see [b]).

    [f] ACTOR_ID — actor_id null is correct (advisory names no group). service_id ir/irgc resolves
    to atlas/services/ir/irgc.yaml (Islamic Revolutionary Guard Corps, nation ir) but is NOT
    supported by this advisory; FLAGGED for orchestrator/Kara (keep as AUSPEX ecosystem overlay
    vs. drop to pure nation-level). No actor/service files edited.

    TARGETS — added sectors/ict (advisory explicitly names "information technology"); kept
    healthcare / government / energy / critical-infrastructure (source-named or CII umbrella).
    "engineering" is named by the advisory but has NO sector slug in atlas/sectors/sectors.yaml —
    recorded here, not added (would dangle the FK).

    RESIDUAL UNCERTAINTY: (1) the ir/irgc overlay (see [f]); (2) end_date left null rather than a
    hard 2024-02-15 (last IOC) — chosen null because the advisory does not bound the campaign;
    (3) sectors/ict added while "engineering" could not be (no slug).
