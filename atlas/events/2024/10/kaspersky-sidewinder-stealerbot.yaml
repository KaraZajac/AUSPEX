id: 2024-10/kaspersky-sidewinder-stealerbot
name: Kaspersky documents SideWinder StealerBot toolset and expanded targeting
start_date: 2024-01-01
disclosure_date: 2024-10-15
end_date: 2024-09-30
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist team (Giampaolo Dedola, Vasily Berdnikov)
  published a long-form analysis of new SideWinder attack waves,
  dissecting the previously-undocumented "StealerBot" — a modular
  .NET post-exploitation implant loaded only in memory (an
  Orchestrator plus keylogger, screenshot grabber, file stealer,
  credential stealer, credential phisher, token grabber, RDP and
  live-console modules) — and a significant geographic expansion.
  Kaspersky lists victims in Bangladesh, Djibouti, Jordan, Malaysia,
  the Maldives, Myanmar, Nepal, Pakistan, Saudi Arabia, Sri Lanka,
  Turkey and the United Arab Emirates, plus diplomatic-entity
  targeting of Afghanistan, France, China, India, Indonesia and
  Morocco; targeted sectors include government and military,
  logistics, infrastructure, telecommunications, finance,
  universities and oil-trading. Kaspersky attributes the activity to
  "the SideWinder APT group with medium/high confidence" and names no
  state operator (India appears in the report only as a victim of
  diplomatic-entity targeting).
false_flag_risk: none
summary: |
  Kaspersky's October 2024 StealerBot report. The headline is
  "StealerBot" — a modular .NET espionage implant that Kaspersky says
  is the group's main post-exploitation tool, providing credential
  theft, file/document theft, keylogging, screen capture, RDP and an
  interactive live console (no email-theft module is described) — and
  a marked geographic broadening: alongside SideWinder's canonical
  Pakistan / Sri Lanka / China / Nepal target set, Kaspersky now
  documents Middle East (Saudi Arabia, UAE, Jordan, Turkey) and
  Africa (Djibouti; Morocco via diplomatic targeting) victims. That
  widens the operational footprint relative to Group-IB's 2022
  picture. Delivery remains spear-phishing with remote-template-
  injection RTF exploiting CVE-2017-11882 and LNK / mshta chains.
attributions:
