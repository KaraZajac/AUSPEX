initial_vector: phishing
outcome_summary: |
  Kaspersky's Securelist team published a new long-form analysis
  of SideWinder activity in 2024, documenting the StealerBot
  modular post-exploitation framework and expanded targeting
  beyond the canonical Pakistan-China set into the Middle East
  (Saudi Arabia, UAE) and Africa. The reported expansion is
  consistent with Indian interests in Indo-Pacific / Gulf
  diplomatic and energy collection.
false_flag_risk: none
summary: |
  The most recent significant SideWinder tradecraft disclosure
  as of 2026. StealerBot is the headline new tooling — a
  modular framework for credential, document, and email theft.
  The Middle East and Africa targeting widens the operational
  footprint relative to Group-IB's 2022 picture.
