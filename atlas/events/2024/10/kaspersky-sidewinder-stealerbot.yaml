    attributing_org: Kaspersky (Securelist)
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-10-15
    attribution_source_id: kaspersky/2024-10-15_sidewinder-stealerbot
    notes: |
      Verbatim: "We attribute these activities to the SideWinder APT
      group with medium/high confidence." Kaspersky names the established
      named group (SideWinder / T-APT-04 / RattleSnake) but no state
      operator or unit — India appears only as a victim country of
      diplomatic-entity targeting, hence actor is in/unscoped/sidewinder
      and attribution_level is named-actor (group named, nation/unit not).
      attributing_org_confidence set moderate (not high) to honestly
      represent the source's hedged "medium/high" (never-upgrade).
doctrine_links:
  - doctrine_id: in/regional-collection-pakistan-china
    pillar_id: in/regional-collection-pakistan-china/diplomatic-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      SideWinder is the India-nexus espionage actor from which AUSPEX
      reconstructed this regional-collection posture, and Kaspersky's
      Oct-2024 victim list still contains the pillar's exact South Asian
      government / diplomatic set — Afghanistan (diplomatic entities),
      Sri Lanka, Nepal, Bangladesh, the Maldives and Pakistan — delivered
      via country-specific government / diplomatic lures (a Nepal Oil
      Corporation document; Hajj and spoofed Saudi Ministry-of-Foreign-
      Affairs consulate themes). That continued targeting of regional
      government and diplomatic bodies is what the diplomatic-collection
      pillar encodes. The label is strongly_inferred, not attested,
      because Kaspersky states no strategic purpose and does not even
      name a state operator (it attributes only to "the SideWinder APT
      group"). It is not downgraded to plausible because the in-region
      South Asian core is unambiguous; note, however, that the report's
      headline expansion into the Gulf (Saudi Arabia, UAE, Jordan,
      Turkey) and Africa (Djibouti, Morocco) sits beyond this regional
      doctrine's stated Pakistan / Afghanistan / China / Sri Lanka scope
      and is not the basis for the link.
    attesting_source_id: kaspersky/2024-10-15_sidewinder-stealerbot
    inference_basis:
      signals:
        - "Continued targeting of the pillar's South Asian set: Kaspersky's Oct-2024 victim list includes Afghanistan (diplomatic entities), Sri Lanka, Nepal, Bangladesh, the Maldives and Pakistan."
        - "Actor-mission fit: SideWinder is the India-nexus espionage group from which this regional-collection posture was reconstructed; its regional government / military / diplomatic collection mission is unchanged."
        - "Tradecraft fit: country-specific government / diplomatic lures (a Nepal Oil Corporation document; Hajj and spoofed Saudi-MOFA consulate themes) indicate diplomatic-collection tasking rather than opportunistic crime."
      ruled_out: "pakistan-military pillar — the Oct-2024 wave's documented victims skew to civilian government and diplomatic entities across the region (and to new Gulf / Africa / Turkey / Europe states) rather than specifically Pakistani military targets, so the diplomatic-collection pillar fits better."
