  notes: |
    Audited against the RAW Kaspersky Securelist report "SideWinder APT's
    post-exploitation framework analysis" (authors Dedola & Berdnikov),
    raw_snapshot kaspersky__2024-10-15_sidewinder-stealerbot.html,
    sha256 2c3a6883…f7af4537, 373,244 bytes — hash RE-VERIFIED, matches
    the source record's content_sha256. Real article confirmed (not a
    phantom): <title> "SideWinder APT's post-exploitation framework
    analysis | Securelist"; meta description "new targets in the Middle
    East and Africa, post-exploitation tools and techniques".
    [a] FACTS — StealerBot: verbatim "StealerBot is a name assigned by
    the attacker to a modular implant developed with .NET to perform
    espionage activities"; modules enumerated in the report = Orchestrator,
    Keylogger, Screenshot Grabber, File Stealer, Live Console, RDP,
    Credential Stealer, Token Grabber, Credential Phisher, UACBypass,
    Downloader, Installers. CORRECTION: summary previously claimed a
    framework "for credential, document, and EMAIL theft" — email theft is
    UNSUPPORTED (the only 'email'/'e-mail' strings in the raw are the
    spear-phishing DELIVERY vector, a C2 domain 'mofa[.]email', and
    Kaspersky newsletter boilerplate; there is no email-stealer module).
    Stripped "email"; rewrote capabilities to the source-carried set
    (credential/file-document theft, keylog, screen capture, RDP, live
    console). CORRECTION: summary claimed "most recent significant
    SideWinder disclosure as of 2026" — FALSE; the raw's own recirculation
    carries later reports ("SideWinder targets the maritime and nuclear
    sectors…" and "SideWinder Beyond the Surface"), and sibling events
    2024-07 and 2025-04 post-date this. Stripped that claim. Infection
    vector verbatim "spear-phishing email with an attachment", RTF via
    remote template injection "forged to exploit CVE-2017-11882", LNK →
    mshta chains — all source-carried (initial_vector: phishing ✓). Added
    incident_type espionage (report frames StealerBot as espionage).
    [b] ATTRIBUTION — verbatim "We attribute these activities to the
    SideWinder APT group with medium/high confidence." CORRECTION:
    attributing_org_confidence high → MODERATE (source hedges "medium/high";
    never-upgrade). Added attribution_level: named-actor (established named
    group named; no nation/unit — India appears ONLY as a victim country:
    "diplomatic entities in … Afghanistan, France, China, India, Indonesia
    and Morocco"). auspex_assessment concur retained. Added attribution
    notes with the verbatim quote.
    [c] DATES — source datePublished "2024-10-15T10:00:54+00:00" (+ byline
    "15 Oct 2024") ⇒ disclosure_date 2024-10-15 ✓ and source published_on
    ✓. start_date 2024-01-01 / end_date 2024-09-30 are best-estimates for
    the 2024 wave: the report states NO precise operation start/end; nearest
    anchor is a Hajj-2024 (June 2024) lure and this being a 2024 follow-on
    to the July-2024 report. Kept as estimates (schema allows), not tightened
    to avoid inventing a specific unsourced date.
    [d] DOCTRINE — link kept strongly_inferred (NOT attested: Kaspersky
    states no purpose and names no state operator). Rewrote reasoning to
    rest on the in-pillar South Asian government/diplomatic targeting the
    report actually documents (Afghanistan/Sri Lanka/Nepal/Bangladesh/
    Maldives/Pakistan) rather than the previous Gulf/Africa "energy
    collection" framing, which over-reached beyond the regional doctrine's
    scope and imputed a motive the source does not state. Added
    inference_basis {signals[], ruled_out} and attesting_source_id (as the
    supporting source; permitted on strongly_inferred). Actor-state (in) =
    doctrine-state (in): attacker-rationale, no perspective tag, no
