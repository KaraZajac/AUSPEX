    [e] ATTRIBUTION_LEVEL — set named-actor (was missing).
    [f] ACTOR_ID — in/unscoped/sidewinder resolves (atlas/actors/in/
    sidewinder.yaml) and placement is CORRECT: no cited source (incl. this
    one) names the NTRO/an Indian service; India-nexus is well-supported at
