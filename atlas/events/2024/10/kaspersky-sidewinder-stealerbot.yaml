id: 2024-10/kaspersky-sidewinder-stealerbot
name: Kaspersky documents SideWinder StealerBot toolset and expanded targeting
start_date: 2024-01-01
disclosure_date: 2024-10-15
end_date: 2024-09-30
incident_type:
  - intrusion
