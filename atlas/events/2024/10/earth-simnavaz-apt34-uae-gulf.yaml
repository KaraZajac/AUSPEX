id: 2024-10/earth-simnavaz-apt34-uae-gulf
name: Earth Simnavaz (APT34 / OilRig) STEALHOOK campaign against UAE and Gulf government targets
start_date: 2024-07-01
disclosure_date: 2024-10-11
end_date: 2024-10-11
incident_type:
  - intrusion
  - data-theft
initial_vector: n-day  # CVE-2024-30088 Windows Kernel EoP
outcome_summary: |
  Trend Micro documented Earth Simnavaz (APT34 / OilRig)
  exploiting CVE-2024-30088, a Windows Kernel elevation-of-
  privilege vulnerability, to deliver the STEALHOOK backdoor
  against UAE government and Gulf-regional organizations. The
  malware exfiltrated stolen data through compromised Microsoft
  Exchange servers as outbound email attachments to attacker-
  controlled addresses. Customized .NET tools, PowerShell scripts,
  IIS-based malware, the ngrok remote-management tool, and a
  password-filter DLL for credential collection rounded out the
  toolkit.
false_flag_risk: none
summary: |
  Continuation of the long-running APT34 collection campaign
  against Gulf-state government and energy sectors. Doctrinally
  fits the Forward Defense / proxy-projection pillar (UAE is a
  Resistance-Axis adversary host state) and the constitutional
  IRGC counter-foreign-threat tasking when applied to the MOIS-
  attributed APT34 cluster. The STEALHOOK toolset and CVE-2024-
  30088 exploitation are notable as APT34's first publicly
  documented use of a recent Windows Kernel zero-day-aged n-day,
  showing operational tempo investment against high-value Gulf
  targets.
