id: 2024-10/earth-simnavaz-apt34-uae-gulf
name: Earth Simnavaz (APT34 / OilRig) STEALHOOK campaign against UAE and Gulf government targets
start_date: 2024-07-01  # best estimate: no source states the intrusion date; bounded below by CVE-2024-30088's June-2024 patch and above by the 2024-10-11 disclosure
disclosure_date: 2024-10-11
end_date: null  # AUDIT 2026-07-05: was 2024-10-11 (conflated with the disclosure date); no source states an op end
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: n-day  # web shell on a vulnerable public-facing web server (specific initial-access CVE unstated). CVE-2024-30088 (Windows Kernel EoP) was used LATER for SYSTEM privilege escalation, not initial access
outcome_summary: |
  Trend Micro documented Earth Simnavaz (APT34 / OilRig)
  exploiting CVE-2024-30088, a Windows Kernel elevation-of-
  privilege vulnerability, to deliver the STEALHOOK backdoor
  against UAE government and Gulf-regional organizations. The
  malware exfiltrated stolen data through compromised Microsoft
  Exchange servers as outbound email attachments to attacker-
  controlled addresses. Customized .NET tools, PowerShell scripts,
  IIS-based malware, the ngrok remote-management tool, and a
  password-filter DLL for credential collection rounded out the
  toolkit.
false_flag_risk: none
summary: |
  Continuation of the long-running APT34 / OilRig cyber-espionage
  campaign against Gulf-state targets, documented by Trend Micro
  (which tracks the group as "Earth Simnavaz") against the United
  Arab Emirates and the broader Gulf region. Initial access was
  via a web shell dropped on a vulnerable public-facing web
  server; the actor then used the ngrok RMM tool for persistence
  and lateral movement toward the domain controller and exploited
  CVE-2024-30088 — a Windows Kernel elevation-of-privilege flaw
  Microsoft patched in June 2024 — for SYSTEM-level privilege
  escalation. A dropped password-filter DLL (psgfilter.dll)
  harvested clear-text domain credentials, and the STEALHOOK
  backdoor exfiltrated stolen data through the victim's on-premises
  Microsoft Exchange servers as outbound email attachments to
  attacker-controlled addresses; the toolkit combined customized
  .NET tools, PowerShell scripts, and IIS-based malware. Trend
  Micro frames the actor as a state-sponsored espionage group;
  APT34 / OilRig is widely attributed to Iran in the broader
  reporting (The Hacker News, SOC Prime), though Trend Micro's own
  report names neither Iran nor a specific service.
