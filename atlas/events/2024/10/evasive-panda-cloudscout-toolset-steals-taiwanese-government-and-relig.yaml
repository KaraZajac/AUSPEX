  notes: |
    Audited vs the single cited ESET newsroom source (raw captured 2026-06-24, sha256
    8dc66bde...; re-hash confirmed). All CloudScout facts verified verbatim: post-compromise .NET
    toolset (3 modules), stolen web-session cookies replayed to access Google Drive/Gmail/Outlook,
    bypasses 2FA/IP-tracking, implemented as an extension to MgBot backdoor plugins, complex HTML
    parsers, full artifact cleanup. Victimology verified: Taiwan religious institution (MgBot+Nightdoor,
    May 2022) and a "what we suspect is a Taiwanese government entity" (CloudScout+Nightdoor, Feb 2023).
    CORRECTIONS: (1) start_date 2024-10-28 -> 2022-05-01 (the publication date was being used as the
    op start; the source pins the earliest compromise to May 2022); added end_date 2023-02-28 and
    disclosure_date 2024-10-28. (2) summary made source-faithful: govt entity flagged "suspected"
    (ESET hedges it), added the May-2022/Feb-2023 timeline and the hardcoded-Outlook-fields Taiwan-
    targeting detail. (3) added attribution_level: named-actor and corrected a misleading inline
    comment that conflated attributing_org_confidence with the (orthogonal) doctrine-link scale.
    ATTRIBUTION: ESET names ONLY "China-aligned Evasive Panda" - no MSS/PLA/PRC service of any kind.
    Actor was already correctly demoted cn/mss -> cn/unscoped/evasive-panda (2026-06-24); FK resolves,
    not stale. attributing_org_confidence: high is defensible (tier-1 vendor, declarative phrasing).
    DOCTRINE: cn/taiwan-reunification/taiwan-island-collection link kept at strongly_inferred,
    attesting_source_id null - correct: pillar covers "cyber tasking against Taiwan government" and
    Taiwan research institutions, but ESET states only the behaviour (espionage vs orgs opposing
    China's interests), never the reunification goal -> below the attested bar. inference_basis absent
    (optional; candidate for later backfill). published_on 2024-10-28 matches the source dateline.
    Source url is the ESET newsroom press release (tier: secondary, preserved); the deeper WeLiveSecurity
    technical writeup it links is not a separate cited source - all event claims are supported by the
    captured newsroom page.
