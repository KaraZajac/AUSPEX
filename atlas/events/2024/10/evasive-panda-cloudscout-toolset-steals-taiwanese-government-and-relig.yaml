id: 2024-10/evasive-panda-cloudscout-toolset-steals-taiwanese-government-and-relig
name: "Evasive Panda CloudScout toolset steals Taiwanese government and religious cloud data via session-cookie theft"
start_date: 2022-05-01   # earliest ESET-observed compromise (Taiwanese religious institution, May 2022)
end_date: 2023-02-28     # latest ESET-observed detection (suspected Taiwanese govt entity, Feb 2023)
disclosure_date: 2024-10-28   # ESET public disclosure of CloudScout
incident_type:
  - espionage
  - intrusion
  - data-theft
  - surveillance
false_flag_risk: none
summary: |
  ESET researchers discovered CloudScout, a post-compromise .NET toolset used by the China-aligned group Evasive Panda to steal data from cloud services including Google Drive, Gmail and Outlook. CloudScout works by harvesting authenticated web session cookies from compromised hosts and replaying them to access cloud-stored data, bypassing two-factor authentication. The toolset operates as an extension to Evasive Panda's MgBot backdoor, with HTML parsers to extract and exfiltrate targeted information. ESET observed CloudScout used in Taiwan against a religious institution (compromised with MgBot and Nightdoor in May 2022) and a suspected government entity (CloudScout and Nightdoor detected February 2023); hardcoded Outlook request fields suggest the samples were crafted to target Taiwanese users.
