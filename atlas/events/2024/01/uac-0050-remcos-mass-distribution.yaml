id: 2024-01/uac-0050-remcos-mass-distribution
name: "CERT-UA documents UAC-0050 mass RemcosRAT / QuasarRAT / Remote Utilities phishing waves (Dec 2023 - Jan 2024)"
start_date: 2023-12-21
disclosure_date: 2023-12-21
end_date: 2024-01-11
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  CERT-UA registered the waves as mass email distribution and
  published infection-chain indicators within the same window.
  Both advisories describe the chains conditionally (a machine
  "може бути уражена" — may be infected — upon execution) and
  state no victim counts, no named victims, and no
  confirmed-compromise outcomes. Recipient categories are not
  specified; the Ukrainian-language lures impersonate Ukrainian
  entities (Kyivstar, the SBU, courts, M.E.Doc), placing the
  victim pool in Ukraine.
false_flag_risk: none
summary: |
  Two CERT-UA advisories document renewed UAC-0050 mass phishing
  in Ukraine across the December 2023 - January 2024 window,
  delivering commodity remote-access tooling. On 2023-12-21
  CERT-UA (advisory #8338) registered mass distribution of emails
  themed "Заборгованість за договором Київстар" (Kyivstar contract
  debt) and "Запит СБУ" (SBU request), both infection chains —
  nested split RAR archives, a macro document fetching an SFX over
  SMB, a Bitbucket-hosted payload — ending in RemcosRAT under a
  single licence ID. On 2024-01-09 (advisories #8453/#8494)
  request-themed waves ("Запит судових документів" — request for
  court documents — and "Запит") delivered RemcosRAT via an AutoIt
  script and QuasarRAT via a PowerShell download from Bitbucket;
  on 2024-01-11 a "Запит від компанії Медок" wave (impersonating
  the Ukrainian M.E.Doc accounting-software vendor, with archives
  attached or linked via Bitbucket / Google Drive) installed the
  Remote Utilities remote-access tool. All three January cases
  shared command-and-control servers in AS215939; the December
  RemcosRAT C2 sat with the Malaysian host Shinjiru — placement
  CERT-UA calls typical for UAC-0050 — and in AS44477 (Stark
  Industries Solutions). CERT-UA tracks the activity under the
  UAC-0050 identifier and names no sponsor; neither advisory
  specifies recipient categories or victim counts.
