id: 2024-01/uac-0050-remcos-mass-distribution
name: CERT-UA documents UAC-0050 mass Remcos RAT distribution to Ukrainian state institutions
start_date: 2023-12-20
disclosure_date: 2024-01-15
end_date: 2024-01-12
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Ukraine's CERT-UA published an advisory documenting renewed
  UAC-0050 / Sticky Werewolf mass-phishing distribution of
  Remcos RAT to Ukrainian state institutions over the
  December 2023 - January 2024 window. Lures themed on
  Ukrainian judicial documents, Defense Forces mobilization
  communications, and tax authority correspondence. The
  campaign was high-volume but operationally crude — a defining
  characteristic of the cluster.
false_flag_risk: none
summary: |
  Routine but operationally important UAC-0050 tempo data point
  in the Ukraine theater. The Remcos RAT remains the long-running
  staple Windows implant for this cluster, with NetWire and
  Rhadamanthys stealer rotated through as adjuncts. The mass-
  phishing template is the cluster's signature: thousands of
  emails, broad target lists, commodity tooling, with the
  operational center of gravity on volume rather than precision.
