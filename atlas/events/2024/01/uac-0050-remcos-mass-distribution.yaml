    notes: |
      CERT-UA designates the activity by cluster identifier only
      ("Активність відстежується за ідентифікатором UAC-0050") and
      names no sponsor, nation, or unit in either advisory — hence
      attribution_level activity-cluster; the #8453/#8494 advisory
      (2024-01-11) re-affirms the designation for the January
      waves. The actor record is homed ru/unscoped/uac-0050
      (re-homed from by/unscoped on 2026-07-02): no source ever
      established the former Belarus placement, and CERT-UA's own
      later characterization (quoted verbatim by BushidoToken,
      2024-03-06; corroboration snapshot hashed in the source
      records) links UAC-0050 to a Russian-speaking mercenary
      organization, "The DaVinci Group", assessed to have ties to
      Russian law enforcement. ACTOR FLAG: per the 2026-06-24
      actor audit the eventual home may be criminal/uac-0050 or
      ru/proxies/uac-0050; Russia-nexus with service unscoped is
      the current canonical parking.
