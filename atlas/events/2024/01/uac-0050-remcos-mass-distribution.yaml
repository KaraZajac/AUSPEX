  notes: |
    PHANTOM-REMEDIATION PATH: RE-SOURCE (badrabbit model). The sole cited source
    (cert-ua/2024-01-15_uac-0050-remcos-mass-distribution, url cert.gov.ua/article/4490832)
    is a CONFIRMED PHANTOM: cert.gov.ua's own JSON API — endpoint /api/articles/byId
    discovered in the site's main-es2015.*.js bundle (prior audits saw only the empty SPA
    shell and believed no API existed) — returns 409 "Article not found with id 4490832",
    while serving real articles in full; CERT-UA's search API lists every UAC-0050 advisory
    and none is dated 2024-01-15 or numbered 4490832; neither BushidoToken's nor Malpedia's
    UAC-0050 pages cite it. The underlying EVENT is REAL: two genuine CERT-UA advisories
    bracket the claimed window and were made the sources —
      - cert-ua/2023-12-21_uac-0050-remcos-kyivstar-debt-sbu-request (article 6276824,
        CERT-UA#8338, published 21.12.2023): raw API capture
        cert-ua__2023-12-21_uac-0050-remcos-kyivstar-debt-sbu-request.json,
        sha256 7b21584e…69be919 (7b21584e36113be74cfc29c3f26cd5843a4e1d23c8d82a2c8d8a67f7569be919),
        3,536,457 bytes.
      - cert-ua/2024-01-11_uac-0050-remcos-quasar-remoteutilities (article 6277063,
        CERT-UA#8453/#8494, published 11.01.2024): raw API capture
        cert-ua__2024-01-11_uac-0050-remcos-quasar-remoteutilities.json,
        sha256 867c78cb…b6d3f1a3 (867c78cb5812faeaf84a6e50488a13ecf8e59e30a5314d07fce3ac10b6d3f1a3),
        5,019,650 bytes.
    Level full: every surviving claim is carried by these two hashed primary captures.

    [a] FACTS — rewritten against the raw advisories. CARRIED: mass distribution ("зафіксовано
    масове розповсюдження електронних листів", both advisories); Remcos RAT as the window's
    staple (Dec: both lure chains end in RemcosRAT, licence 5639D40461DCDD07011A2B87AD3C9EDD;
    Jan-09: RemcosRAT via AutoIt, licence 90A63732CBE64F87F97AC8716B711015); QuasarRAT
    (Jan-09, PowerShell + Bitbucket) and Remote Utilities (Jan-11, "Запит від компанії Медок")
    as the adjunct tooling; lure themes verbatim ("Заборгованості за договором Київстар",
    "Запит СБУ", "Запит судових документів", "Запит", "Запит від компанії Медок"); shared
    January C2 in AS215939; December C2 on Shinjiru ("Окрім типового для UAC-0050 розміщення
    серверів управління RemcosRAT … Shinjiru") and AS44477 (STARK INDUSTRIES SOLUTIONS LTD).
    REMOVED as uncarried/fabricated: "to Ukrainian state institutions" (neither advisory names
    recipient categories — no "державних органів/установ" anywhere in either body; the old
    name/prose/targets asserted it); "Defense Forces mobilization communications" and "tax
    authority correspondence" lures (nowhere in either advisory; the tax theme matches CERT-UA's
    LATER #11776 advisory of 2024-10-30, outside this event); "NetWire and Rhadamanthys stealer
    rotated through as adjuncts" (neither appears in either advisory; NetWire's infrastructure
    was seized in March 2023, predating the window); "Sticky Werewolf" as a CERT-UA co-name
    (CERT-UA uses only the UAC-0050 identifier; the alias is BI.ZONE's, kept on the actor
    record, not in this event's prose); "thousands of emails, broad target lists" (no counts
    in the sources — "масове" carries only "mass"); "high-volume but operationally crude — a
    defining characteristic" (editorial, uncarried). PARTIALLY RESURRECTED: the old "judicial
    documents" lure claim IS carried for the Jan-09 wave ("Запит судових документів") and was
    kept in precise form. TARGETS: the orgs/ukrainian-state-institutions-various entry was
    REMOVED (recipient categories unspecified in both advisories; any sector/org claim would be
    inflation). Directionality (victims ua) remains carried in prose: mass mailings registered
    by Ukraine's governmental CERT, Ukrainian-language lures impersonating Ukrainian entities
    (Kyivstar, SBU, courts, M.E.Doc). incident_type: dropped data-theft (no exfiltration or
    compromise outcome documented; both advisories use conditional "може бути уражена" language);
    kept intrusion for the mass RAT-delivery campaign itself (CERT-UA titles it "атака").

    [b] ATTRIBUTION — CERT-UA, kept moderate (no-upgrade rule), auspex concur-with-caveat.
    Both advisories attribute by cluster identifier only: "Активність відстежується за
    ідентифікатором UAC-0050" — no sponsor, nation, or unit named. attribution_date corrected
    2024-01-15 -> 2023-12-21 (date of the first in-window attribution; source re-pointed from
    the phantom to the #8338 record). Attribution notes REWRITTEN: the old note's "Belarus KGB
    linkage is the dominant Western-vendor reading (Sticky Werewolf overlap)" is
    source-contradicted — per the 2026-06-24/2026-07-02 actor audits the Belarus placement was
    never sourced (BI.ZONE/Kaspersky treat Belarus as a VICTIM), and CERT-UA's own later
    framing (BushidoToken 2024-03-06 quoting CERT-UA; corroboration snapshots re-verified
    2026-07-04: _corrob__bushidotoken__uac-0050-davinci.html sha256 1ec3d51e…b4fdea43, 205,761
    bytes; _corrob__malpedia__uac-0050.html sha256 8cfac383…c70b4c6, 1,097,006 bytes) is a
    "Russian-speaking mercenary organization" ("The DaVinci Group") with "ties to Russian law
    enforcement". New note matches the ru/unscoped re-home and carries the standing ACTOR FLAG
    (eventual home criminal/ vs ru/proxies/ is Kara's call).

    [c] DATES — start_date 2023-12-20 -> 2023-12-21 (first wave registered "21.12.2023");
    end_date 2024-01-12 -> 2024-01-11 (last documented wave "11.01.2024"); disclosure_date
    2024-01-15 -> 2023-12-21 (first public advisory; no 2024-01-15 publication exists). Source
    published_on values are the advisories' own dates (21.12.2023 / 11.01.2024) from the API
    payloads, not campaign months. Residual: article 6277063's teaser says the January waves
    were "10.01.2024 та 11.01.2024" while its body twice says 09.01.2024 and 11.01.2024; the
    body's detailed narrative (09.01) is treated as authoritative and the discrepancy is noted
    in the source record. NOTE: the id's 2024-01 month now postdates disclosure_date (2023-12);
    ids are stable-forever per schema, so the id was not touched.

    [d] DOCTRINE_LINKS — REMOVED the by/union-state-integration/ukraine-theater-support link
    (was strongly_inferred) -> doctrine_links: []. Its reasoning ("canonical Union State
    Ukraine-theater-support behavior") presupposed a Belarusian-aligned operator — a premise
