id: 2024-01/schneider-electric-cactus
name: Cactus ransomware against Schneider Electric Sustainability Business
start_date: 2024-01-17
disclosure_date: 2024-01-29
end_date: 2024-03-31
incident_type:
  - ransomware
  - data-theft
initial_vector: unknown
outcome_summary: |
  Cactus ransomware group intrusion against Schneider Electric's
  Sustainability Business division (an ESG / energy-efficiency
  consulting and software unit isolated from the broader
  Schneider Electric ICS portfolio). Cactus claimed exfiltration
  of approximately 1.5TB of data including ESG advisory
  documents, customer carbon-credit data, and internal client
  correspondence. Schneider confirmed the incident January 29
  2024 in a public statement, scoping the intrusion to the
  Sustainability Business unit. No ICS / OT impact reported.
quantified_impact:
  data_exfiltrated_tb: 1.5
false_flag_risk: none
summary: |
  Notable for victim-selection question: Cactus targeted the ESG
  / sustainability consulting unit of an ICS-vendor parent rather
  than the ICS portfolio itself. Brief speculation about possible
  state-actor interest in carbon-credit / climate-finance data did
  not develop; no state-nexus attribution emerged. The case
  illustrates the AUSPEX baseline pattern that opportunistic
  criminal affiliate selection produces victim sets that the
  doctrine engine should abstain on rather than force-fit.
attributions:
  - actor_id: criminal/cactus
    attributing_org: Schneider Electric + Cactus (self-claimed)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2024-01-29
    attribution_source_id: kroll/2023-05-09_cactus-ransomware-self-encrypting
    notes: |
      Kroll Cactus discovery report documents the ransomware
      family; it does not name Schneider Electric specifically.
      attribution_source_id is the nearest primary documentation of
      Cactus activity.
doctrine_links: []
