id: 2024-01/schneider-electric-cactus
name: Cactus ransomware against Schneider Electric Sustainability Business
start_date: 2024-01-17
disclosure_date: 2024-01-29
end_date: null
incident_type:
  - ransomware
  - data-theft
  - extortion
initial_vector: unknown
summary: |
  Cactus ransomware operators breached Schneider Electric's
  Sustainability Business division — a sustainability / renewable-
  energy and climate-regulatory consulting unit of the French
  industrial-automation group, serving enterprise customers
  including Clorox, DHL, Hilton, PepsiCo and Walmart — on January
  17, 2024, stealing corporate data and disrupting the division's
  Resource Advisor cloud platform. BleepingComputer, citing people
  familiar with the matter, named Cactus on January 29; Schneider
  Electric confirmed the same day that data had been accessed but
  did not itself name the group. On February 19, 2024 Cactus
  confirmed the intrusion by listing Schneider Electric on its
  Tor-based leak site, claiming roughly 1.5TB of stolen data and
  publishing a 25MB proof sample. Schneider stated the division
  "is an autonomous entity operating its isolated network
  infrastructure" and that no other entity in the group was
  affected; no ICS/OT-portfolio impact was reported. No
  state-nexus attribution emerged.
outcome_summary: |
  Resource Advisor and other division systems were disrupted, with
  outages persisting at least through January 29, 2024; Schneider
  Electric's statement said it expected access to resume within two
  business days. The company later updated its incident
  notification to confirm the attackers exfiltrated certain
  Sustainability Business data and that access to impacted systems
  had been restored (reported by SecurityWeek, 2024-02-20). Cactus
  claimed ~1.5TB exfiltrated (attacker-claimed, uncorroborated) and
  leaked 25MB as proof — including scans of passports and
  non-disclosure agreement documents — threatening to publish the
  rest unless a ransom was paid. What specific data was stolen was
  not publicly established, and no ransom-payment outcome was
  reported.
quantified_impact:
  data_exfiltrated_tb: 1.5   # Cactus leak-site claim (2024-02-19); attacker-claimed, uncorroborated
false_flag_risk: none
