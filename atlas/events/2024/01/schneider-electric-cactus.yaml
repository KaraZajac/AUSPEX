notes: |
  AUSPEX baseline case: opportunistic criminal double-extortion
  whose victim set (the sustainability-consulting arm inside an
  ICS-vendor parent, not the ICS portfolio) the doctrine engine
  should abstain on rather than force-fit — doctrine_links: [] is
  deliberate. Press coverage observed the stolen data "could
  contain sensitive information about customers' power utilization,
  industrial control and automation systems, and compliance with
  environmental and energy regulations" (BleepingComputer), but no
  espionage or state-nexus thread emerged.
