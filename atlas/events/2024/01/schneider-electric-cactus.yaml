      First public naming — journalism-sourced: "suffered a Cactus
      ransomware attack ... according to people familiar with the
      matter." Schneider Electric's own statement confirmed the
      intrusion and data access but never named Cactus (WithSecure
      to SecurityWeek, 2024-01-30: "Schneider Electric is yet to
      confirm if the Cactus ransomware brand were responsible ...
      and they have not as yet been listed on the groups leak
      site"). named-actor: a named criminal ransomware group; no
      nation or unit.
  - actor_id: criminal/cactus
    attributing_org: Cactus (leak-site self-claim)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-02-19
    attribution_source_id: bleepingcomputer/2024-02-19_cactus-15tb-schneider-electric
    notes: |
      The gang confirmed the intrusion itself by listing Schneider
      Electric on its Tor-based leak site (2024-02-19), claiming
      ~1.5TB stolen and publishing a 25MB proof sample (passport
      scans, NDA documents); SecurityWeek: "the suspicions have been
      confirmed, after the gang listed the French giant on its
      Tor-based leak website." Self-claim + proof sample + the
      victim's own confirmation that data was exfiltrated.
