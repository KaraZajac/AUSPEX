  notes: |
    Phantom-remediation + full 6-point audit, RE-SOURCE path. The sole
    cited source (dragos/2024-07_frostygoop-ukrainian-heating) had
    url: null since 2026-05-28 (dead dragos.com blog slug). The
    underlying report is real: re-pointed the record to the live
    canonical intel-brief PDF, hub.dragos.com/hubfs/Reports/
    Dragos-FrostyGoop-ICS-Malware-Intel-Brief-0724_.pdf — snapshot
    sha256 fa91b1b2...dbd45e92, 1,487,419 bytes, 13 pp (PDF created
    2024-07-23) — and added two same-day journalism records carrying
    the specifics the PDF omits: techcrunch/2024-07-23_hackers-shut-
    down-heating-ukrainian-city (sha256 4c4202f1...d6eaa0ca, 241,742
    bytes) and bleepingcomputer/2024-07-23_frostygoop-malware-cut-off-
    heat-ukraine (sha256 1145c2b2...3a535fcd, 88,506 bytes).
    [a] FACTS — verified against raw: "the ninth industrial control
    systems (ICS) specific malware ... first ICS-specific malware that
    uses Modbus TCP communications to achieve an impact on OT" (brief
    p.1); Modbus TCP port 502 read/write of holding registers; ENCO
    controllers ("for process control in district heating, hot water,
    and ventilation systems"); firmware downgraded to "a version that
    lacks monitoring capabilities ... resulting in the Loss of View";
    controllers made to "report inaccurate measurements, resulting in
    the incorrect operation of the system and the loss of heating";
    "over 600 apartment buildings"; "Remediation of the incident took
    almost two days ... sub-zero temperatures"; "adversaries did not
    attempt to destroy the controllers" — so REMOVED incident_type
    "destructive" (nothing destroyed) and ADDED "cyber-physical".
    Victim naming: the brief NEVER names Lviv or Lvivteploenergo
    ("municipal district energy company in Ukraine"); Lviv +
    LvivTeploEnergo are carried by the Security Council of Ukraine
    statement in TechCrunch and LB.UA-sourced BleepingComputer
    reporting — event name kept, provenance now explicit in prose.
    Added individuals_affected: 100000 (LB.UA via BleepingComputer).
    "Sandworm-affiliated operators", "extended Sandworm's known OT
    toolkit", "Sandworm's first ... heating provider" — STRIPPED, no
    source carries any Sandworm claim. initial_vector n-day →
    unknown: the vulnerability in the internet-exposed MikroTik
    router is "undetermined"/"unidentified" and access only
    "possibly" gained that way.
    [b] ATTRIBUTION — the brief attributes to NO ONE; TechCrunch
    records Dragos explicitly declining to name "any known particular
    hacking group or government" (no ties to prior activity/tools +
    non-attribution policy). Moscow-based attack-day L2TP IPs are the
    only stated nexus; BleepingComputer's "Russian-linked" lede is
    journalistic framing. CORRECTED: ru/gru/74455/sandworm @ high /
    concur (a fabricated over-attribution — the claimed attributing
    org "Dragos (with CERT-UA / Industrial Cyber reporting)" also
    misnamed the Ukrainian party: SSU CSSC, not CERT-UA) → actor_id
    null, attributing_org Dragos, confidence low, level null,
    auspex_assessment concur (with the non-attribution).
    [c] DATES — start 2024-01-22 now source-carried ("late evening of
    January 22 through January 23", TechCrunch + BleepingComputer
    quoting Dragos; the PDF itself says only "January 2024");
    end 2024-01-24 kept as commented estimate (late 22 Jan + "almost
    48 hours"); disclosure 2024-07-23 = brief publication + press
    coverage, correctly separated from the January operation. All
    three sources' published_on = 2024-07-23, their actual same-day
