id: 2024-01/frostygoop-lviv-heating
name: FrostyGoop Modbus ICS attack on Lvivteploenergo (Lviv heating)
start_date: 2024-01-22
disclosure_date: 2024-07-23  # Dragos public report
end_date: 2024-01-24
incident_type:
  - intrusion
  - destructive
  - disruption
initial_vector: n-day  # exposed Mikrotik router; lateral to Modbus-speaking devices
outcome_summary: |
  Sandworm-affiliated operators deployed FrostyGoop — the ninth
  publicly known ICS-tailored malware — against Lvivteploenergo,
  the municipal heating provider for Lviv, Ukraine. FrostyGoop
  manipulates ENCO heat-controllers over Modbus TCP. Approximately
  600 apartment buildings lost heat for ~48 hours in mid-winter.
  Dragos disclosed and named FrostyGoop in July 2024.
quantified_impact:
  buildings_affected: 600
  outage_hours: 48
false_flag_risk: none
summary: |
  Doctrinally important as Sandworm's first publicly disclosed
  attack on a civilian heating provider during winter — the
  doctrine-of-resilience attack pattern made literal. FrostyGoop
  added a new ICS-malware family to the public catalogue and
  extended Sandworm's known OT toolkit beyond electricity into
  district heating. Disclosure came months after the event.
