id: 2024-01/frostygoop-lviv-heating
name: FrostyGoop Modbus ICS attack on Lvivteploenergo (Lviv heating)
start_date: 2024-01-22  # "during the late evening of January 22 through January 23" (TechCrunch/BleepingComputer, quoting Dragos); network access possibly gained 2023-04-17 (BleepingComputer)
disclosure_date: 2024-07-23  # Dragos intel brief + same-day press coverage
end_date: 2024-01-24  # estimate: "almost 48 hours" of heat loss from late 22 Jan (Graham, via TechCrunch); "remediation ... took almost two days" (Dragos brief)
incident_type:
  - intrusion
  - disruption
  - cyber-physical
initial_vector: unknown  # "possibly gained access ... by exploiting an undetermined vulnerability in an externally facing router" (Dragos brief); TechCrunch/BleepingComputer name an internet-exposed MikroTik router, vulnerability unidentified — 0-day vs n-day undetermined
outcome_summary: |
  Publicly unattributed adversaries used FrostyGoop — per Dragos the
  ninth ICS-specific malware and the first to use Modbus TCP
  communications to achieve an OT impact — against the municipal
  district-heating utility in Lviv, Ukraine (named as Lvivteploenergo
  by a Security Council of Ukraine spokesperson to TechCrunch and by
  LB.UA-sourced reporting; the Dragos brief itself names only "a
  municipal district energy company in Ukraine"). After downgrading
  ENCO heat-controller firmware to a version lacking monitoring
  capabilities (loss of view), the adversaries sent Modbus TCP
  port-502 commands causing inaccurate measurements and system
  malfunction: over 600 apartment buildings (>100,000 people in the
  Sykhiv district) lost central heating for almost 48 hours in
  sub-zero temperatures; remediation took almost two days. The
  controllers were not destroyed. Investigation traced access
  possibly to 17 April 2023 via an undetermined vulnerability in an
  internet-exposed MikroTik router, then a ReGeorg-like webshell
  (accessed predominantly via Tor), SAM-hive credential theft, and —
  on the attack day — L2TP connections from Moscow-based IP
  addresses across an unsegmented network. Dragos disclosed and named
  FrostyGoop on 23 July 2024, crediting the Cyber Security Situation
  Center of the Security Service of Ukraine (SSU).
quantified_impact:
  buildings_affected: 600  # "over 600 apartment buildings" (Dragos brief)
  individuals_affected: 100000  # "over 100,000 people" in Sykhiv (LB.UA, via BleepingComputer)
  outage_hours: 48  # "almost 48 hours" (Graham, via TechCrunch); "remediation ... took almost two days" (Dragos brief)
false_flag_risk: none
summary: |
  Doctrinally important as the first publicly documented ICS-malware
  disruption of a civilian district-heating utility in mid-winter —
  the winter-heating-coercion pattern made literal — and as the
  addition of a new family (the first with Modbus-TCP effects) to
  the public ICS-malware catalogue. The operation is publicly
  UNATTRIBUTED: Dragos explicitly declined to tie FrostyGoop to any
  known group or government (no ties to prior activity or tooling,
  plus a standing non-attribution policy), noting only that
  attack-day L2TP connections came from Moscow-based IP addresses; a
  Dragos researcher assessed the operation was "likely ... an effort
  to undermine the morale of Ukrainians living there ... very much a
  psychological effort ... facilitated through cyber means when
  kinetic perhaps here wasn't the best choice." TechCrunch called it
  the third known cyber-linked outage to hit Ukrainians. AUSPEX
  models the actor as null (unattributed) and carries the
  Russian-doctrine fit as inference, not attribution.
attributions:
  - actor_id: null  # no public attribution by any source; attack-day Moscow-based IPs are the only stated nexus
    attributing_org: Dragos
    attributing_org_confidence: low
    attribution_level: null
    auspex_assessment: concur
    attribution_date: 2024-07-23
    attribution_source_id: dragos/2024-07_frostygoop-ukrainian-heating
    notes: |
      Dragos made NO attribution: the intel brief names no actor,
      group, or state; per TechCrunch, "Despite the Russian IP
      addresses, Dragos didn't point the finger at any known
      particular hacking group or government as responsible for this
      cyber-enabled outage, because the company couldn't find ties to
      previous activities or tools, and because of the company's
      longstanding policy on not attributing cyberattacks." The
      brief's only nexus datum: "adversaries initiated L2TP ...
      connections to Moscow-based IP addresses." Ukraine's Security
      Council confirmed the attack and the LvivTeploEnergo victim to
      TechCrunch without naming a perpetrator. CORRECTION 2026-07-04:
      the prior record asserted ru/gru/74455/sandworm at high
      confidence, credited to "Dragos (with CERT-UA / Industrial
      Cyber reporting)" — no cited source names Sandworm or any
      actor, and the Ukrainian party involved was the SSU's Cyber
      Security Situation Center, not CERT-UA. attribution_level null
      and confidence low reflect that the disclosing org itself
      declined to reach even a nation-level claim.
doctrine_links:
  - doctrine_id: ru/energy-weaponization
    pillar_id: ru/energy-weaponization/grid-attack
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Mid-winter disruption of a Ukrainian civilian district-heating
      utility, concurrent with Russia's kinetic campaign against
      Ukrainian energy infrastructure, is the winter-heating-coercion
      pattern this pillar encodes. Dragos assessed the operation was
      "likely ... an effort to undermine the morale of Ukrainians
      living there" — "very much a psychological effort ...
      facilitated through cyber means" — and attack-day access came
      via L2TP connections from Moscow-based IP addresses. Held at
      strongly_inferred rather than attested because no source
      attributes the operation to Russia (Dragos explicitly
      declined), so the Russian-doctrine premise is itself an
      inference even though the coercive purpose is vendor-stated.
    attesting_source_id: techcrunch/2024-07-23_hackers-shut-down-heating-ukrainian-city
    inference_basis:
      signals:
        - "Target and season: civilian district heating cut for almost 48 hours in sub-zero cold — maximal civilian hardship, matching the pillar's winter-heating-coercion pattern (RU grid operations 2015/2016/2022 precedent)"
        - "Attack-day L2TP connections from Moscow-based IP addresses (Dragos brief)"
        - "Vendor-stated purpose: 'likely as an effort to undermine the morale of Ukrainians living there ... very much a psychological effort' (Graham, via TechCrunch)"
        - "Wartime context: operation against Ukrainian civilian critical infrastructure during Russia's full-scale invasion"
      ruled_out: "Criminal/extortive motive — no ransom demand or monetization reported; controllers were manipulated for disruption (firmware downgrade for loss of view, falsified measurements), not encrypted, ransomed, or destroyed"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/russkiy-mir
    pillar_id: ru/russkiy-mir/ukraine-theater
    program_id: null
    confidence: plausible
    reasoning: |
      If Russian-state directed, a civilian-resilience attack inside
      the Ukraine theater fits the Russkiy-Mir continuous-pressure
      pattern. Held at plausible: the operation is publicly
      unattributed, no source states a civilizational/Russkiy-Mir
      purpose, and a pro-Russian non-state reading — under which this
      doctrine would not apply — survives.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Russian state operation as continuous coercive pressure in the Ukraine theater (fits the pillar)"
        - "Pro-Russian non-state or hacktivist operation exploiting exposed OT — coercive effect without state doctrinal tasking"
    contested: false
    analyst: claude
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/non-contact-warfare
    program_id: null
    confidence: plausible
    reasoning: |
      Remote cyber disruption of civilian critical infrastructure in
      an active war zone matches the non-contact-warfare concept —
      Dragos itself framed the operation as "facilitated through
      cyber means when kinetic perhaps here wasn't the best choice."
      Held at plausible (downgraded from strongly_inferred) because
      the doctrine presumes a Russian military operator and the
      operation is publicly unattributed.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Russian military/state operator: non-contact (cyber) means substituting for a kinetic strike against civilian infrastructure"
        - "Non-military or non-state pro-Russian operator, outside the military-doctrine frame"
    contested: false
    analyst: claude
targets:
  - target_id: sectors/energy  # district heating; no finer heating/utilities sector exists. Victim org: Lvivteploenergo (no orgs/ registry record yet — see qc notes flag)
    country: ua
    role: primary
    outcome: |
      ENCO heat-controllers manipulated via Modbus TCP after a
      firmware downgrade removed monitoring (loss of view); heating
      to over 600 apartment buildings of Lvivteploenergo's
      district-heating service (Sykhiv district, >100,000 people)
      lost for almost 48 hours in sub-zero temperatures. Controllers
      not destroyed; remediation took almost two days.
