id: 2024-01/tietoevry-3am-finland
name: 3AM ransomware against Tietoevry Sweden data-center customer
start_date: 2024-01-20
disclosure_date: 2024-01-21
end_date: 2024-02-15
incident_type:
  - ransomware
  - disruption
  - supply-chain
initial_vector: unknown
outcome_summary: |
  Tietoevry (Finnish-Swedish IT services and outsourcing
  vendor) disclosed January 20-21 2024 a ransomware intrusion
  of one of its Swedish data centers. The intrusion disrupted
  multiple downstream customer systems including the Swedish
  pharmacy chain Apotek Hjartat, the Filmstaden cinema chain
  loyalty platform, several Swedish municipal governments,
  and Granngarden retail-chain payment systems. Tietoevry
  attributed the intrusion to the 3AM ransomware family.
  Approximately 60,000 employees of Filmstaden and Granngarden
  combined had personal data exposed.
quantified_impact:
  individuals_affected: 60000
false_flag_risk: none
summary: |
  Notable for SaaS-supply-chain blast radius: a single Tietoevry
  data-center intrusion produced confirmed downstream impact at
  multiple unrelated Swedish customer organizations. 3AM is a
  smaller-footprint operator than RansomHub or Qilin but the
  Tietoevry case demonstrates that even mid-tier criminal
  clusters can produce regional CII impact via outsourced-IT
  blast radius.
attributions:
  - actor_id: criminal/3am
    attributing_org: Tietoevry + 3AM (self-claimed)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2024-01-21
    attribution_source_id: symantec/2023-09-14_3am-ransomware-discovery
    notes: |
      Symantec 3AM discovery report documents the ransomware
      family; it does not name Tietoevry specifically.
      attribution_source_id is the nearest primary documentation of
      3AM activity.
doctrine_links: []
targets:
