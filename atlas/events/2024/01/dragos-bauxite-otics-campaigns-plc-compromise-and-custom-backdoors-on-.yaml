id: 2024-01/dragos-bauxite-otics-campaigns-plc-compromise-and-custom-backdoors-on-
name: "Dragos BAUXITE OT/ICS campaigns — PLC compromise and custom backdoors on OT devices, overlapping the IRGC-IO CyberAv3ngers persona"
start_date: 2017-01-01
disclosure_date: 2025-02-25
incident_type:
  - cyber-physical
