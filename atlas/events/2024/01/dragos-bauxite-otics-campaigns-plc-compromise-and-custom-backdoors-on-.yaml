campaign_id: cyberav3ngers-water-utility-wave
false_flag_risk: none
summary: |
  Dragos's BAUXITE threat-group profile documents an OT/ICS-focused activity group (active "since 2017") that has reached Stage 2 of the ICS Cyber Kill Chain, demonstrating the ability to compromise PLCs, modify ladder logic, and deploy custom backdoors on OT devices, with victims in the U.S., Australia, the U.K. and Israel. Dragos states BAUXITE "shares substantial technical overlaps with the pro-Iranian hacktivist persona CyberAv3ngers," but explicitly performs no political/state attribution ("Dragos does not corroborate nor conduct political attribution to threat activity"). The IRGC-IO nexus on this event is carried by the separate, govt-primary CyberAv3ngers attribution (CISA AA23-335A / Treasury OFAC), not by Dragos. Dragos first publicly named/designated BAUXITE in its 2025 OT/ICS Cybersecurity Year-in-Review (released 2025-02-25, covering 2024).
