notes: |
  This event documents a Dragos threat-GROUP PROFILE (BAUXITE), not a single dated intrusion.
  start_date set to 2017-01-01 to match the only explicit date in the cited source ("Date: Since
  2017"); the Stage-2 PLC-compromise / custom-OT-backdoor campaigns Dragos reports are the
  late-2023→2024 wave (the same Unitronics/Aliquippa CyberAv3ngers activity captured elsewhere in
  the cyberav3ngers-water-utility-wave campaign). disclosure_date 2025-02-25 = Dragos's first
  public naming of BAUXITE (2025 Year-in-Review). The id slug's "2024-01" date stub is retained
  (slugs are stable forever).

  Actor-FK note (NOT changed here): actor_id ir/irgc-io/cyberav3ngers resolves and was itself
  LLM-audited 2026-06-24 (KEEP verdict). Granularity caveat carried from that actor file: the
  govt-primary sources that name a sub-org name the IRGC Cyber-Electronic Command (IRGC-CEC), not
  the IRGC Intelligence Organization (IRGC-IO); the ir/irgc-io placement is an AUSPEX structural
  synthesis. The event name/attribution text say "IRGC-IO" to mirror that actor id — this inherits
  the same caveat and is not an over-attestation introduced by this event.
