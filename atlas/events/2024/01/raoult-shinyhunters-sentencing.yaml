outcome_summary: |
  US District Court for the Western District of Washington
  (Seattle) sentenced Sebastien Raoult ("Sezyo Kaizen") to 36
  months in federal prison (12 months for conspiracy to commit
  wire fraud + 24 months consecutive for aggravated identity
  theft) and ordered USD 5,005,313 in restitution to victim
  companies. Per the USAO press release, between April 2020
  and July 2021 the ShinyHunters conspiracy posted sales of
  hacked data from more than 60 companies on RaidForums,
  EmpireMarket, and Exploit, causing more than USD 6M in
  victim losses. Raoult subsequently returned to France in
  December 2024 after time-served credit; French authorities
  filed additional domestic charges.
