outcome_summary: |
  US District Judge Robert S. Lasnik (W.D. Washington, Seattle)
  sentenced French national Sebastien Raoult ("Sezyo Kaizen") to
  36 months in federal prison — 12 months on Count 2 (conspiracy
  to commit wire fraud, 18 U.S.C. §§ 1349/3559(g)(1)) plus a
  consecutive 24 months on Count 8 (aggravated identity theft,
  18 U.S.C. § 1028A(a)) — with credit for time served in
  Morocco, plus 36 months of supervised release and USD
  5,058,419.73 in restitution to victim companies (judgment,
  Dkt. 61; the USAO release states "more than $5 million").
  Remaining counts were dismissed as to Raoult; the prosecution
  had sought six years. Per the USAO press release, between
  April 2020 and July 2021 the ShinyHunters conspiracy posted
  sales of hacked data from more than 60 companies on
  RaidForums, EmpireMarket, and Exploit, with losses to victim
  companies estimated to exceed USD 6M.
