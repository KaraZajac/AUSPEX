summary: |
  Closes the Raoult procedural arc. The sentence is notable as
  the only ShinyHunters operator sentencing to date and as a
  baseline marker for US criminal-cybercrime sentencing of
  foreign-national data-broker operators. The 60-company
  scope explicitly stated in the USAO press release is the
  primary authoritative count for the 2020-2021 ShinyHunters
  data-broker wave.
