    pillar_id: tr/counter-gulen-kurdish-surveillance/kurdish-diaspora
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Hunt & Hackett documents Sea Turtle campaigns in the
      Netherlands that specifically target Kurdish (PKK-affiliated)
      websites and organisations holding data on minority groups
      and political dissidents, and states the stolen information
      is "likely to be exploited for surveillance or intelligence
