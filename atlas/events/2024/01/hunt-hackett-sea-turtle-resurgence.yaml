      and H&H frames the activity as espionage "in alignment with
      Turkish interests" rather than a directed counter-Kurdish
      state mandate; victim selection is nonetheless unambiguous
      and admits no serious competing strategic reading.
    attesting_source_id: hunt-hackett/2024-01-04_sea-turtle-resurgence
    inference_basis:
      signals:
        - "Victimology: campaigns target Kurdish (PKK-affiliated) websites plus telecom/ISP/IT-service providers serving Kurdish-diaspora and political-dissident customers in the Netherlands."
        - "Stated purpose: H&H says the collected 'politically motivated information such as personal information on minority groups and potential political dissents' is 'likely to be exploited for surveillance or intelligence gathering on specific groups and or individuals'."
        - "Actor-mission fit: Sea Turtle is a Turkey-based, state-supported espionage cluster whose known target set includes Kurdish/PKK groups; the campaign is assessed as advancing Turkey's interests."
        - "Corroboration: H&H ties the pattern to 2020 US-official reporting of hackers acting in Turkey's interest, focusing on the identities and locations of victims geopolitically significant to Turkey."
      ruled_out: "tr/mavi-vatan (Eastern-Mediterranean maritime/energy geopolitics), the actor's other default doctrine — ruled out because the victims are Kurdish-diaspora internet infrastructure and PKK-affiliated websites, not maritime, hydrocarbon or Eastern-Med energy targets."
