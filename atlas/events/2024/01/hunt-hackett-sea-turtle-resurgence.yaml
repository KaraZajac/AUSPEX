id: 2024-01/hunt-hackett-sea-turtle-resurgence
name: Hunt & Hackett documents Sea Turtle resurgence against Dutch ISPs serving Kurdish diaspora
start_date: 2023-01-01
disclosure_date: 2024-01-04
end_date: 2023-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: valid-creds
outcome_summary: |
  Dutch firm Hunt & Hackett published a detailed analysis of
  Sea Turtle / MARBLED DUST activity through 2023, documenting
  targeting of telecommunications and ICT service providers in
  the Netherlands serving Kurdish-diaspora and Turkish-opposition
  customers. Targets included three ISPs, an IT services company,
  and a media outlet. Tradecraft was consistent with the pre-2019
  Sea Turtle pattern but oriented to diaspora-internet-
  infrastructure rather than government-of-Cyprus-style targets.
false_flag_risk: none
summary: |
  The most operationally significant Sea Turtle resurgence
  disclosure. Hunt & Hackett's report quieted speculation that
  the cluster had been disbanded after the 2019 Talos attribution
  and demonstrated continuity of Turkish state cyber tasking
  against Kurdish diaspora through different infrastructure
  targets. Microsoft followed with a "MARBLED DUST" disclosure
  in March 2024 documenting an Iraqi telecommunications operator
  victim.
