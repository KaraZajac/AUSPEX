id: 2024-01/hunt-hackett-sea-turtle-resurgence
name: Hunt & Hackett documents Sea Turtle resurgence against Dutch ISPs serving Kurdish diaspora
start_date: 2023-01-01
disclosure_date: 2024-01-04
end_date: null   # AUDIT 2026-07-05: was 2023-11-30 (invented precision); H&H gives no op end date — "between 2021 and 2023", "initiated early 2023", C&C live "at the time of writing".
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: valid-creds
outcome_summary: |
  Dutch firm Hunt & Hackett published a detailed analysis of
  Sea Turtle / Marbled Dust activity, documenting campaigns in
  the Netherlands focused on telecommunications, media, ISPs and
  IT-service providers — more specifically Kurdish (PKK-affiliated)
  websites and organisations holding data on minority groups and
  political dissidents. Hunt & Hackett observed multiple victim
  organisations and at least two compromised cPanel accounts, and
  confirmed the copying and likely exfiltration of at least one
  e-mail archive. Tradecraft (compromised cPanel/SSH access, the
  SnappyTCP reverse shell, VPN-fronted logons and anti-forensics)
  reflected altered capabilities versus the DNS-hijacking for
  which Sea Turtle was known in 2017–2019, while targeting
  similar sectors.
false_flag_risk: none
summary: |
  Hunt & Hackett documented a Sea Turtle resurgence after a
  period in which public reporting on the cluster had remained
  limited following the 2019 Talos attribution, and assessed the
  activity as a state-supported cyber-espionage group operating
  in alignment with Turkish interests. The campaigns collected
  politically motivated information — personal data on minority
  groups and political dissidents, and access to Kurdish (PKK-
  affiliated) websites — for surveillance and intelligence
  gathering, demonstrating continuity of Turkish-aligned espionage
  against Kurdish-diaspora targets through different infrastructure.
attributions:
