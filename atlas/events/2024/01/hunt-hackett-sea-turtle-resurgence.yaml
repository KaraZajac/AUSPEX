    attributing_org: Hunt & Hackett
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-01-04
    attribution_source_id: hunt-hackett/2024-01-04_sea-turtle-resurgence
    notes: "Hunt & Hackett tracks the named cluster Sea Turtle (aliases Teal Kurma, Marbled Dust, SILICON, Cosmic Wolf) and attributes it at the NATION level — 'Hunt & Hackett believes that Sea Turtle is a Turkey based Advanced Persistent Threat (APT) actor', 'operating in alignment with Turkish interests', a 'state-supported cyber espionage group' with 'the aim of advancing Turkey's interests'. No Turkish intelligence service (MIT) or unit is named — hence attribution_level named-actor (named group + nation), not named-unit, and actor tr/unscoped/sea-turtle."
doctrine_links:
