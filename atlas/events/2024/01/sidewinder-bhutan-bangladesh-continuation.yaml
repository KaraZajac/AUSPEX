id: 2024-01/sidewinder-bhutan-bangladesh-continuation
name: SideWinder continued Bhutanese, Bangladeshi, and Sri Lankan diplomatic targeting through 2023-2024
start_date: 2023-06-01
disclosure_date: 2024-01-30
end_date: 2024-01-15
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Bitdefender continuation reporting in early 2024 documented
  ongoing SideWinder / BabyElephant operations against
  Bhutanese, Bangladeshi, and Sri Lankan government and
  diplomatic targets through late 2023 and into 2024.
  Tradecraft refreshes included additional Office-exploit
  chaining, expanded HTA-staged droppers, and refreshed C2
  infrastructure consistent with prior Kaspersky and Trend
  Micro reporting on the cluster.
false_flag_risk: none
summary: |
  Continuity event for SideWinder's regional diplomatic
  collection lane. Bhutanese targeting in particular is
  notable because Bhutan does not host independent diplomatic
  infrastructure of substance — the victim profile suggests
  Indian intelligence interest in Bhutanese-Chinese border
  dialogue and Bhutan's intermediary role in India-China
  affairs.
