  notes: "Audited vs ESET/WeLiveSecurity 'Gamaredon in 2024' (raw captured + sha256). FACTS confirmed verbatim: six new tools PteroDespair/PteroTickle/PteroGraphin/PteroStew/PteroQuark/PteroBox (vs 8 in 2022, 9 in 2023); near-total C&C behind Cloudflare tunnels; LNK/XHTML HTML-smuggling delivery; in 2024 refocused EXCLUSIVELY on Ukrainian governmental institutions (abandoned NATO targets). ATTRIBUTION: source explicitly states SSU attributes Gamaredon to the 18th Center of Information Security of Russia's FSB -> set attribution_level: named-unit; attributing_org high retained. published_on corrected 2024-01-01 -> 2025-07-02 (actual ESET pub date, author Zoltan Rusnak; source still a backfill placeholder); attribution_date aligned. doctrine_link ru/russkiy-mir/ukraine-theater left strongly_inferred (NOT attested): ESET names only general 'Russian geopolitical interests' / 'ongoing war', not the Russkiy Mir near-abroad goal in substance; attesting_source_id null is correct for strongly_inferred. actor ru/fsb/center-18/gamaredon resolves (service ru/fsb/center-18 exists), not stale. start_date 2024-01-01 kept as best estimate for the year-long 2024 campaign (PteroDespair found Jan 2024)."
