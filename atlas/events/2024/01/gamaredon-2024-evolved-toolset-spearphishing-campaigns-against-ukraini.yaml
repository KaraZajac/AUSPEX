summary: |
  ESET's July 2025 'Gamaredon in 2024' report documents the FSB-linked Gamaredon group intensifying spearphishing against Ukrainian governmental institutions through 2024, deploying six new PowerShell/VBScript tools (PteroDespair, PteroTickle, PteroGraphin, PteroStew, PteroQuark, PteroBox), hiding nearly all C2 behind Cloudflare tunnels, and using malicious LNK/XHTML HTML-smuggling delivery. Gamaredon is one of the most operationally active FSB cyber actors against Ukraine yet has no events in the current corpus, making this a high-leverage backfill. Attributed by SSU to the 18th Center of Information Security of Russia's FSB. Maps to ru/gerasimov-framework (whole-of-war information confrontation) or ru/russkiy-mir.
