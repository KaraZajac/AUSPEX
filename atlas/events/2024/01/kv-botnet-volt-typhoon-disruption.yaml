id: 2024-01/kv-botnet-volt-typhoon-disruption
name: KV-Botnet / Volt Typhoon FBI disruption
start_date: 2023-12-01  # secret court order issued December 2023
disclosure_date: 2024-01-31  # DOJ press release; Wray HASC testimony
end_date: 2024-01-31
incident_type:
  - disruption
initial_vector: unknown  # court-ordered remote action against adversary infrastructure
outcome_summary: |
  Court-ordered remote eviction of KV-Botnet malware from hundreds of
  compromised Cisco/NetGear small-office/home-office (SOHO) routers
  used by PRC MSS-linked Volt Typhoon actors to obfuscate intrusions
  into US critical infrastructure. FBI used Volt Typhoon's own
  toolset to delete the malware and sever C2 connection. Coordinated
  with the CISA AA24-038A joint advisory publicly exposing Volt
  Typhoon's "living-off-the-land" pre-positioning against US water,
  energy, transport, and communications sectors.
false_flag_risk: none
campaign_id: volt-typhoon-cii-prepositioning
summary: |
  Secret court order issued by a district court in December 2023;
  operation executed and publicly disclosed by DOJ on January 31,
  2024. FBI-led with CYBERCOM / NSA attribution coordination — the
  canonical example of the post-NCS-2023 disrupt-and-dismantle posture
  applied to PRC state-aligned infrastructure.

  Doctrinal significance: first major FBI-led disruption coordinated
  with CYBERCOM attribution against a PRC state-sponsored cluster,
  operationalizing Pillar 2 of NCS 2023.
