    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_level: named-actor  # sources name "Volt Typhoon" as the PRC state-sponsored group; PRC sponsorship asserted at nation level, NO Chinese service/unit named (see cn/unscoped/volt-typhoon)
    attribution_date: 2024-01-31
    attribution_source_id: doj/2024-01-31_kv-botnet-disruption
    notes: |
      Court-ordered, FBI-executed disruption of Volt Typhoon's
      KV-botnet; CYBERCOM/NSA contributed attribution work but did not
      conduct the operation (Wray HASC testimony credits "the NSA,
      Cyber Command, and CISA, as well as ONCD" as partners). No
      AUSPEX-tracked actor perpetrated this law-enforcement action, so
      actor_id is null (previously a us/cybercom/cnmf-actor
      placeholder — corrected per AUDIT-2026-05-29 C1). attributing_org
      records the executing/announcing coalition. The subject named in
      prose is Volt Typhoon (cn/unscoped/volt-typhoon); no cited source
      names the MSS — the prior "PRC MSS-linked" prose was
      over-attribution, corrected 2026-07-11.
