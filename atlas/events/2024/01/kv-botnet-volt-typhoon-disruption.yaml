  notes: |
    Full 6-point audit vs RAW cited sources (Opus 4.8, max effort). The
    DOJ primary press release (doj/2024-01-31_kv-botnet-disruption) is
    Akamai/Imperva bm-verify bot-walled from this environment — curl 200
    returns a 2.5 KB interstitial, WebFetch 403, and the archive.org
    capture itself archived the interstitial; the SDTX mirror
    (/usao-sdtx/pr/) is identically walled. Hence level: partial — every
    load-bearing DOJ-specific claim is instead mirror-corroborated by
    newly snapshotted+hashed secondaries and by the already-hashed
    Lumen/CISA/FBI raws.

    [a] FACTS — all carried by snapshotted sources:
      • "hundreds of Cisco/NetGear SOHO routers" cleaned, C2 severed:
        SecurityWeek (sha 3f9d12a3…) verbatim "a court-authorized
        operation cleared the way for the FBI to remotely seize control
        of hundreds of infected routers and send instructions to delete
        malware and change settings"; AHA reproduces DOJ "hundreds of
        small office and home office routers." "mostly … Cisco and
        NetGear" + EOL: SecurityWeek subtitle "end-of-life Cisco and
        Netgear routers"; The Record (sha 8bdee25b…) "mostly targeted
        routers made by Cisco and NetGear."
      • Corrected the embellishment "FBI used Volt Typhoon's own toolset"
        → "FBI remotely issued commands to delete the malware and sever
        the routers' C2 connection" (mirror-supported; the "own toolset"
        mechanism is not carried by any snapshotted source).
      • Dec-2023 court order: Lumen (repo-hashed) "FBI conducted a
        court-authorized takedown … in early December 2023 … earliest
        warrant … signed, December 6, 2023" → start_date refined
        2023-12-01 → 2023-12-06.
      • "operators rebuilt infrastructure subsequently": Lumen — operators
        stood up "new infrastructure" (null-routed early Jan 2024),
        re-exploited ~2,100 NetGear ProSAFE devices, "rebuilding the JDY
        cluster."
      • CYBERCOM/NSA coordination: FBI Wray raw (sha 6c8724c0…) credits
        "the NSA, Cyber Command, and CISA, as well as ONCD" as partners —
        so the summary's CYBERCOM/NSA framing is sourced, not stripped.
      • disrupt-dismantle = Pillar 2 of NCS 2023: confirmed vs
        atlas/doctrines/us/ncs-2023.yaml (defend-cii=P1, disrupt-dismantle=P2).
    [b] ATTRIBUTION — OVER-ATTRIBUTION FIXED. Prose "PRC MSS-linked Volt
        Typhoon" → "PRC state-sponsored Volt Typhoon." NO cited source
        names the MSS or any Chinese service: DOJ title ("…People's
        Republic of China…"), CISA AA24-038A ("PRC State-Sponsored
        Actors"), FBI Wray ("PRC state-sponsored hacking group known as
        Volt Typhoon"), Lumen ("Chinese state-sponsored actors"), The
        Record ("Chinese government hacking operation known as Volt
        Typhoon"), SecurityWeek/AHA (generic PRC/China). Subject resolves
        to cn/unscoped/volt-typhoon; actor_id null (counter-action);
        attributing_org FBI/DOJ+CISA+NSA, concur, high.
    [c] DATES — start 2023-12-06 (Lumen warrant date, was unsourced
        2023-12-01); disclosure/end 2024-01-31 (DOJ PR + Wray HASC + all
        mirrors). Source published_on verified: The Record datePublished
        2024-01-31T19:31:52Z; SecurityWeek article:published_time
        2024-01-31T20:14:34Z; FBI Wray 2024-01-31; CISA 2024-02-07; DOJ
        2024-01-31 (title-confirmed via wayback shell + 3 mirrors).
    [d] DOCTRINE — disrupt-dismantle KEPT attested/defender-response;
        inference_basis.source_quote verified VERBATIM vs The Record:
        AG Garland "The United States will continue to dismantle
        malicious cyber operations – including those sponsored by foreign
        governments – that undermine the security of the American
        people." (exact, incl. en-dashes). defend-cii DOWNGRADED
        attested → strongly_inferred (+perspective defender-response,
