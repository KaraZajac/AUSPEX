outcome_summary: |
  Noah Michael Urban (19, of Palm Coast, Florida) was arrested by
  US authorities on January 9, 2024; the Justice Department
  unsealed the indictment against him on or around January 11,
  2024. Prosecutors charged Urban with eight counts of wire
  fraud, one count of conspiracy to commit wire fraud, and five
  counts of aggravated identity theft, alleging he stole at
  least USD 800,000 in cryptocurrency from at least five victims
  between August 2022 and March 2023 — in each attack the
  victim's email and financial accounts were compromised after
  an unauthorized SIM-swap transferred the victim's mobile
  number to an attacker-controlled device. Urban went by the
  aliases "Sosa" and "King Bob" (and, per prosecutors,
  "Elijah"). Krebs on Security's sources — not the charging
  documents — identified Sosa/King Bob as a key member of the
  0ktapus / Scattered Spider group behind the 2022 Twilio
  breach, which Group-IB linked to breaches at more than 130
  organizations. Urban pleaded not guilty; bail was denied as a
  flight risk, with trial set for the term starting March 4,
  2024 in Jacksonville (M.D. Fla.).
summary: |
  Counter-action (law-enforcement) record: individual US federal
  charges against a US-based (Florida) SIM-swap operator whose
  case documents the SIM-swap-to-account-takeover monetization
  pipeline (SIM swap → email/financial account compromise →
  cryptocurrency theft). Subject cluster:
  criminal/scattered-spider — contemporaneous press reporting
  (Krebs on Security, citing multiple sources close to the
  investigation) identified Urban as a key member of the
  0ktapus / Scattered Spider cluster; the government's charging
  documents name only Urban, not the group. AUSPEX classifies
  as criminal-baseline.
