outcome_summary: |
  Federal charges unsealed January 2024 against Noah Michael
  Urban (Palm Coast, Florida) for SIM-swap fraud and
  account-takeover totaling approximately USD 800K. Urban,
  online handles "Sosa" / "King Bob," was identified in
  contemporaneous press reporting as a senior operator in
  the 0ktapus / Scattered Spider cluster. Charges predated
  but were structurally folded into the broader November
  2024 Scattered Spider multi-defendant indictment.
