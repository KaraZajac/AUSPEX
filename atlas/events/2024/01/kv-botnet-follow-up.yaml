outcome_summary: |
  Continued public exposure of Volt Typhoon pre-positioning in US
  critical infrastructure after the January 2024 KV-Botnet takedown:
  the follow-on CISA/FBI/NSA joint advisory AA24-038A (7 Feb 2024)
  and the 25 March 2025 ODNI Annual Threat Assessment, which named
  the PRC pre-positioning campaign "tracked publicly as Volt Typhoon"
  as the lead PRC cyber concern. Distinct from the discrete January
  2024 takedown event — this entry captures the post-takedown stream
  of advisory / exposure actions. (An earlier draft also folded in
  "January 2025 OFAC sanctions" and an "April 2025 FBI bounty" as
  Volt-Typhoon cost imposition; both were removed on 2026-07-10 as
  misattributed — the Jan-2025 OFAC actions targeted Flax Typhoon
  and Salt Typhoon, and the Apr-2025 RfJ/FBI reward was Salt-Typhoon /
  telecom-focused.)
false_flag_risk: none
campaign_id: volt-typhoon-cii-prepositioning
summary: |
  Companion cumulative event to the January 2024 KV-Botnet takedown,
  capturing the persistent public exposure campaign that followed.
  Doctrinal frame: NCS-2023 Pillar 1 (defend critical infrastructure)
  + the ODNI 2025 ATA cyber chapter. (Pillar 2 / disrupt-and-dismantle
  is the frame of the discrete takedown event, not this documentary
  companion.)
