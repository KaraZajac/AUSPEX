id: 2024-01/carr-texas-water-utility-intrusions
name: Cyber Army of Russia Reborn — Texas water-utility HMI manipulation (Muleshoe, Abernathy)
start_date: 2024-01-17  # Mandiant APT44: CARR posted HMI-manipulation videos at Polish + US water utilities "Between 17 and 18 January 2024"
disclosure_date: 2024-04-17  # Mandiant APT44 report publicly tied the CyberArmyofRussia_Reborn persona to APT44/Sandworm
end_date: 2024-03-02  # Mandiant APT44: last dated CARR OT-manipulation video ("On 02 March 2024", French hydroelectric)
incident_type:
  - intrusion
  - cyber-physical
  - disruption
initial_vector: unknown  # not named in cited sources; Treasury: "various unsophisticated techniques"; reported mechanism = internet-exposed, weakly-secured small-utility HMIs
outcome_summary: |
  Between 17 January and 2 March 2024 the pro-Russia "Cyber Army
  of Russia Reborn" (CyberArmyofRussia_Reborn / CARR) Telegram
  persona posted videos claiming manipulation of human-machine
  interfaces (HMIs) at small US water utilities in the Texas
  Panhandle. Muleshoe experienced a confirmed water-storage-tank
  overflow; US Treasury (Jul 2024) attributes CARR-claimed
  overflows at both Abernathy and Muleshoe, TX. Observed physical
  impact was low and the Telegram "proof" videos — which Mandiant
  says show an actor "haphazardly interacting" with OT interfaces
  — were the strategic product. Mandiant (Apr 2024 APT44 report)
  assessed the persona as "created and controlled by APT44"
  (Sandworm) but "cannot independently verify the ... claimed
  intrusion activity or its links to APT44," noting affected US
  utility officials later publicly acknowledged incidents.
  Treasury designated CARR members Pankratova and Degtyarenko
  (19 Jul 2024) as a "Russian government-aligned hacktivist
  group"; the DOJ Dec 2025 indictment states CARR (aka Z-Pentest)
  was "founded, funded, and directed by the ... GRU" — the parent
  GRU, not a named unit.
quantified_impact:
  utilities_affected: 2  # Treasury-named TX water utilities (Muleshoe, Abernathy); Mandiant's broader campaign also claimed additional US + Polish water utilities and a French hydro facility, not enumerated here
  tank_overflow_incidents: 1  # Muleshoe (publicly confirmed physical overflow); Treasury also attributes a CARR-claimed overflow at Abernathy
false_flag_risk: none  # CARR openly self-claimed on Telegram; obfuscation is via a "hacktivist front" persona (Mandiant/DOJ), not a false-flag blaming a third party
summary: |
  Post-2022 sanctions-response performative-disruption by a
  Russian state-aligned hacktivist front. SOURCING CORRECTED
  (AUDIT 2026-07-10): the CARR->GRU service link rests on the DOJ
  Dec 2025 indictment ("founded, funded, and directed by the ...
  GRU"), NOT on Treasury — the Jul 2024 OFAC release makes NO
  GRU/Sandworm claim and calls CARR only a "Russian
  government-aligned hacktivist group." The Sandworm tie is
  Mandiant's (Apr 2024 APT44 report), which assesses the persona
  as APT44-controlled yet explicitly "cannot independently
  verify" the water-utility claims or their APT44 link — hence
  hedged (attribution_level named-actor; GRU at parent level, not
  Unit 74455). Distinct from the Nov 2023 Aliquippa, PA incident
  (CyberAv3ngers / IRGC-IO, Iran), frequently conflated with this
  Russian campaign. The former Mandiant citation
  (sandworm-water-utility-attribution) was a WRONG-SOURCE — its
  URL resolves to the Nov 2023 Ukraine power-grid OT blog (0
  mentions of CARR/water/Texas) — and has been repointed here to
  the genuine APT44 report.
attributions:
  - actor_id: ru/gru/carr
    attributing_org: Mandiant (Google Threat Intelligence)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-04-17
    attribution_level: named-actor
    attribution_source_id: mandiant/2024-04-17_apt44-unearthing-sandworm
    notes: |
      Mandiant aligns with Google TAG that "CyberArmyofRussia_Reborn
      is created and controlled by APT44" and links the persona's
      intrusion activity to APT44 "with high confidence," but for
      the water-utility claims specifically states it "cannot
      independently verify the ... claimed intrusion activity or its
      links to APT44 at this time" — hence concur-with-caveat /
      moderate. Named-actor (persona = CARR); the Unit 74455 /
      Sandworm operational tie is not asserted.
  - actor_id: ru/gru/carr
    attributing_org: US Treasury OFAC
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-07-19
    attribution_level: named-actor
    attribution_source_id: treasury/2024-07-19_carr-gru-sanctions
    notes: |
      OFAC designated Yuliya Vladimirovna Pankratova and Denis
      Olegovich Degtyarenko (E.O. 13694) as members of the "Russian
      government-aligned hacktivist group Cyber Army of Russia
      Reborn (CARR)" and stated: "In January 2024, CARR claimed
      responsibility for the overflow of water storage tanks in
      Abernathy and Muleshoe, Texas, posting video of the
      manipulation of human-machine interfaces at each facility on
      a public forum." NB: this release makes NO GRU/Sandworm claim
      (0 mentions) — the earlier attribution to Treasury of
      "founded, funded, and directed by the GRU" was a
      MISATTRIBUTION (that wording is the DOJ Dec 2025 indictment's).
  - actor_id: ru/gru/carr
    attributing_org: US Department of Justice
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2025-12-09
    attribution_level: named-actor
    attribution_source_id: doj/2025-12_carr-noname-actions
    notes: |
      DOJ Dec 9, 2025 indictment: "CARR, also known as Z-Pentest,
      was founded, funded, and directed by the Main Directorate of
      the General Staff of the Armed Forces of the Russian
      Federation (GRU)"; an individual as "Cyber_1ce_Killer," a
      moniker "associated with at least one GRU officer," instructed
      CARR leadership on targeting. GRU named at the PARENT level
      only — 0 mentions of Unit 74455 / GTsST / Sandworm — so the
      service tie is hedged to the parent GRU.
