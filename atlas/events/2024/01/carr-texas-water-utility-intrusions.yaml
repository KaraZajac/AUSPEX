id: 2024-01/carr-texas-water-utility-intrusions
name: Cyber Army of Russia Reborn — Texas water utility intrusions (Muleshoe, Abernathy, Stanton)
start_date: 2024-01-18  # Muleshoe earliest dated incident
disclosure_date: 2024-04-17  # Mandiant attribution to Sandworm
end_date: 2024-03-01
incident_type:
  - intrusion
  - disruption
  - influence-operation
initial_vector: n-day  # exposed HMIs / weak credentials on small-utility ICS
outcome_summary: |
  Compromise and HMI manipulation of small US water utilities in
  Muleshoe, Abernathy, and Stanton, Texas (and an Indiana wastewater
  facility) by the "Cyber Army of Russia Reborn" Telegram persona.
  Muleshoe experienced a physical tank overflow; total observed
  impact was low. Telegram-published proof videos were the strategic
  product. US Treasury OFAC designated CARR operators Pankratova and
  Degtyarenko on 19 July 2024 and characterized CARR as "founded,
  funded, and directed by the GRU."
quantified_impact:
  utilities_affected: 4  # Muleshoe, Abernathy, Stanton, Indiana wastewater
  tank_overflow_incidents: 1  # Muleshoe
false_flag_risk: none
summary: |
  Canonical attested event for the post-2022 sanctions-response
  performative-disruption pillar. Note: this event is distinct from
  the November 2023 Aliquippa, PA water-utility incident, which was
  CyberAv3ngers / IRGC-IO (Iran), not Russian — frequently conflated
  in popular reporting. Mandiant's April 2024 analysis assessed CARR
  as Sandworm-affiliated; Treasury's July 2024 designation made the
  GRU link official. The Texas water-utility set is what CARR
  actually hit; Aliquippa is what Iran's CyberAv3ngers hit.
