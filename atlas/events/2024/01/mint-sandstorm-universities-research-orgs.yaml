id: 2024-01/mint-sandstorm-universities-research-orgs
name: Mint Sandstorm (APT35) spear-phishing of universities and research orgs
start_date: 2023-11-01
disclosure_date: 2024-01-17
end_date: 2024-01-17
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Microsoft MSTIC documented a Mint Sandstorm (APT35 / Charming
  Kitten / Phosphorus) subgroup conducting spear-phishing against
  high-profile Middle East policy experts at universities and
  research organizations in Belgium, France, Gaza, Israel, the
  UK, and the US from November 2023 onward. Novel TTPs included
  delivery of phishing lures from legitimate-but-compromised
  email accounts (rapport-building advantage) and curl-based
  command-and-control traffic. Persona development around
  invitations to legitimate-seeming research and policy events
  was the consistent initial-access pattern.
false_flag_risk: none
summary: |
  Tempo data point for APT35 / Mint Sandstorm's persistent
  collection against Middle-East-focused policy and academic
  experts during the early phase of the post-October-7 Israel-
  Hamas conflict. Operationalizes the post-Soleimani-retaliation
  named-official-targeting pillar (extended to the broader
  policy-expert population around the same political theater)
  and the cyber-deniable-retaliation diaspora-targeting pillar.
attributions:
