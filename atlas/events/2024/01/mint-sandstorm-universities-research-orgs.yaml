  notes: |
    Audited vs the RAW MSTIC blog "New TTPs observed in Mint
    Sandstorm campaign targeting high-profile individuals at
    universities and research orgs" (2024-01-17). Raw snapshot
    captured fresh (none existed): sha256 3359caab…df2a163c
    (301,065 bytes); real article confirmed (title + full body
    match), not a phantom. Single-source event; source is MSTIC
    first-party original investigation (own telemetry, IOC table,
    MediaPl SHA-256, hunting queries). Spot-check for the sibling
    mint-sandstorm-us-cii AI-embellishment pattern: pattern
    CONFIRMED here in one prose claim and both doctrine links.

    [a] FACTS — one fabricated tradecraft claim STRIPPED:
      • "Persona development around invitations to
        legitimate-seeming research and policy events was the
        consistent initial-access pattern" — NOT in source (0 hits
        for invitation/conference/webinar/event-lure; the word
        "event" appears only re: geopolitical events/war). The
        REAL pattern per MSTIC: impersonation of high-profile
        individuals incl. a journalist at a reputable news outlet;
        benign initial emails "requesting their input on an article
        about the Israel-Hamas war"; follow-up link to a RAR
        archive purporting to be the draft document. Looks imported
        from OTHER Charming Kitten reporting (fake
        webinar/conference invites) — same embellishment family as
        the sibling's 6 fabricated claims. Corrected in place.
      • Rephrased "high-profile Middle East policy experts" to the
        source's "high-profile individuals working on Middle
        Eastern affairs" (substance same; wording now carried).
      VERIFIED-CARRIED (verbatim in raw): "Since November 2023";
      countries Belgium, France, Gaza, Israel, UK, US; universities
      and research organizations; bespoke phishing lures;
      legitimate-but-compromised accounts used to send lures;
      rapport/trust-building intent ("likely an attempt to build
      rapport with targets and establish a level of trust");
      curl-based C2 retrieval ("use of the Client for URL (curl)
      command to connect to Mint Sandstorm's command-and-control
      (C2) server and download malicious files").
      ADDED source-carried tradecraft the event omitted (the
      report's headline novel TTPs): MediaPl custom backdoor
      (masquerades as Windows Media Player; AES CBC + Base64 C2;
      Defender name Backdoor:Win64/Eyeglass.A), MischiefTut
      PowerShell backdoor, RAR -> .pdf.lnk double-extension -> curl
      chain via cloud-document-edit[.]onrender[.]com with payloads
      from glitch[.]me / supabase[.]co subdomains, renamed NirCmd,
      Persistence.vbs / a.vbs Run-key + scheduled-task persistence,
      documentLoger.txt activity logging. Scale words preserved
      ("in a handful of cases", "in some cases", "several").
      incident_type: ADDED espionage (MSTIC: "seeking to collect
      intelligence for the states that sponsor their activity");
      kept intrusion + data-theft (subgroup "specializes in gaining
      access to and stealing sensitive information"; collection
      activity + exfil-oriented tooling observed). Name's
      "spear-phishing" kept as fair gloss: source says "bespoke"/
      "highly bespoke phishing lures" and MSTIC's own MDTI report
      title says "tailored phishing campaigns" (the literal word
      "spear" does not appear; substance identical).
    [a-targets] REMOVED sectors/civil-society/think-tank — sector
      inflation: "think tank" appears NOWHERE in the source (0
      hits); MSTIC names only "universities and research
      organizations". Kept academic/university +
      academic/research-lab (research organizations). Six victim
