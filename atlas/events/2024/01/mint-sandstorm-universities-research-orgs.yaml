    [b] ATTRIBUTION — MSTIC attributes firmly ("Microsoft
      attributes the activity detailed in this blog to a
      technically and operationally mature subgroup of Mint
      Sandstorm") and states the IRGC affiliation IN THIS POST
      ("ties to the Islamic Revolutionary Guard Corps (IRGC), an
      intelligence arm of Iran's military") — so
      attributing_org_confidence: high stands (unhedged
