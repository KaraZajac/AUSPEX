    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur
    attribution_date: 2024-01-17
    attribution_source_id: microsoft/2024-01-17_mint-sandstorm-universities
    notes: |
      MSTIC attributes firmly and names the sponsoring service in
      this post: "Microsoft attributes the activity detailed in this
      blog to a technically and operationally mature subgroup of
      Mint Sandstorm"; "Mint Sandstorm (which overlaps with the
      threat actor tracked by other researchers as APT35 and
      Charming Kitten) is a composite name used to describe several
      subgroups of activity with ties to the Islamic Revolutionary
      Guard Corps (IRGC), an intelligence arm of Iran's military."
      Service named (IRGC) -> named-unit, high confidence.
doctrine_links:
  - doctrine_id: ir/constitutional-irgc-role
    pillar_id: null
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      An IRGC-tied Mint Sandstorm subgroup running patient,
      resource-intensive collection against individuals whose
      perspectives on the Israel-Hamas war and on Middle East
      security/policy are "of interest to Tehran" is the IRGC's
      parallel intelligence apparatus executing its constitutional
      (Article 150) mandate — state intelligence collection serving
      regime decision-making during the war. Held at
      strongly_inferred, not attested, because MSTIC's
      campaign-purpose language is hedged ("it's possible this
      campaign is an attempt to gather perspectives on events
      related to the war"), below the attested bar; but the
      collection reading has no serious competitor. Linked at
      doctrine level (pillar null): no Article-150 pillar
      specifically encodes external policy-community collection
      (regime-preservation encodes counter-dissident targeting,
      which this is not).
    attesting_source_id: null
    inference_basis:
      signals:
        - "MSTIC names the service in this post: Mint Sandstorm 'is a composite name used to describe several subgroups of activity with ties to the Islamic Revolutionary Guard Corps (IRGC), an intelligence arm of Iran's military.'"
        - "MSTIC frames the purpose as state intelligence collection: targets 'have the potential to influence the intelligence and policy communities' and are 'attractive targets for adversaries seeking to collect intelligence for the states that sponsor their activity, such as the Islamic Republic of Iran'; 'it's possible this campaign is an attempt to gather perspectives on events related to the war from individuals across the ideological spectrum.'"
        - "The subgroup 'specializes in gaining access to and stealing sensitive information from high-value targets' — a collection mission matching the IRGC intelligence apparatus authorized under Article 150."
      ruled_out: "Retaliatory/coercive readings (ir/post-soleimani-retaliation named-official-targeting; ir/cyber-deniable-retaliation diaspora-targeting; ir/asymmetric-warfare coercion) — the source names no former officials, no diaspora/dissident targets, no hacktivist persona front, and no destructive or coercive element; it frames the campaign as collection. A financially-motivated reading has no support anywhere in the source."
