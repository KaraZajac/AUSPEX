id: 2024-01/mint-sandstorm-universities-research-orgs
name: Mint Sandstorm (APT35) spear-phishing of universities and research orgs
start_date: 2023-11-01  # "Since November 2023" per MSTIC (best-estimate day-of-month)
disclosure_date: 2024-01-17
end_date: null  # campaign ONGOING at disclosure ("the ongoing Mint Sandstorm campaign"); prior end_date=2024-01-17 conflated op-end with disclosure
incident_type:
  - intrusion
  - espionage
  - data-theft
initial_vector: phishing
outcome_summary: |
  Operators masqueraded as high-profile individuals — including as
  a journalist at a reputable news outlet — sending wholly benign
  initial emails requesting the target's input on an article about
  the Israel-Hamas war, tradecraft Microsoft assessed was likely an
  attempt to build rapport and trust before delivering malicious
  content. Lures came from email addresses spoofed to resemble the
  impersonated journalist's personal account or, in a subset of
  cases, from legitimate but compromised accounts belonging to the
  individuals being impersonated. Targets who agreed to review the
  "draft" were sent a link to an attacker domain
  (cloud-document-edit[.]onrender[.]com) hosting a RAR archive that
  decompressed to a same-name double-extension .pdf.lnk file; when
  launched, it ran a curl command to retrieve malicious files —
  several .vbs scripts and, in several instances, a renamed copy of
  the legitimate NirCmd command-line tool — from attacker-controlled
  glitch[.]me and supabase[.]co subdomains. Persistence used a
  Persistence.vbs file adding a script (typically a.vbs) to a
  CurrentVersion Run registry key, or scheduled tasks fetching from
  a supabase[.]co domain; activity from targets' devices was written
  to text files, notably documentLoger.txt. In a handful of cases
  Microsoft observed new post-intrusion tradecraft including custom
  backdoors: MediaPl, which masquerades as Windows Media Player and
  uses AES-CBC-encrypted, Base64-encoded C2 communications, and
  MischiefTut, a PowerShell backdoor with reconnaissance,
  output-logging, and tool-download capabilities.
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence reported that since November 2023 a
  technically and operationally mature subgroup of Mint Sandstorm —
  the IRGC-tied composite cluster overlapping APT35 / Charming
  Kitten (formerly PHOSPHORUS) — targeted high-profile individuals
  working on Middle Eastern affairs at universities and research
  organizations in Belgium, France, Gaza, Israel, the United
  Kingdom, and the United States, using bespoke phishing lures
  built around the Israel-Hamas war. Microsoft describes the
  subgroup as specializing in gaining access to and stealing
  sensitive information from high-value targets — journalists,
  researchers, professors, and other individuals with insights or
  perspective on security and policy issues of interest to Tehran —
  and assessed it is possible the campaign was an attempt to gather
  perspectives on events related to the war from individuals across
  the ideological spectrum. A tempo data point for the cluster's
  persistent collection during the early months of the Israel-Hamas
  conflict.
attributions:
