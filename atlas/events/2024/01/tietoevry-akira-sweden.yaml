notes: |
  SLUG FLAG (for Kara): the frozen id 2024-01/tietoevry-3am-finland is
  wrong on both descriptors — the ransomware was Akira, not 3AM (the 3AM
  framing rode entirely on a wrong-source citation to Symantec's
  Sept-2023 3AM discovery post, which never mentions Tietoevry), and the
  attacked datacenter was in Sweden with Swedish downstream victims
  (Tietoevry is Finnish-headquartered, but no Finnish infrastructure or
  customers are reported as hit). Slugs are stable-forever by corpus
  convention, so the id is left untouched; rename/alias is Kara's call.
