id: 2024-01/tietoevry-akira-sweden  # renamed 2026-07-04 (Kara-approved) from tietoevry-3am-finland: actor was Akira not 3AM, victim datacenter in Sweden not Finland
name: Akira ransomware attack on Tietoevry Swedish datacenter disrupts some 120 Swedish organizations
start_date: 2024-01-19
disclosure_date: 2024-01-21
end_date: 2024-01-20
incident_type:
  - ransomware
  - disruption
  - supply-chain
initial_vector: unknown
false_flag_risk: none
summary: |
  During the night of 19-20 January 2024 ("Friday night into Saturday
  morning") the Akira ransomware operation partially encrypted one
  section of one of Tietoevry's datacenters in Sweden. Tietoevry — the
  Finnish-headquartered IT-services and enterprise-cloud provider —
  detected the activity, stopped the attack and isolated the affected
  platform immediately, but the single-datacenter compromise still
  produced a broad downstream blast radius across unrelated Swedish
  customer organizations: cinema chain Filmstaden (sales system down,
  tickets written out by hand), retailers Rusta and Systembolaget,
  sportswear chain Stadium, building-materials group Moelven, farming
  supplier Granngården (forced to close stores), and Tietoevry's managed
  payroll/HR platform Primula — used by Swedish government agencies,
  municipalities and universities — knocking out services at Statens
  servicecenter, Vellinge municipality, Uppsala County (including the
  region's health-care record system) and six named universities
  (Karolinska Institutet, SLU, University West, Stockholm University,
  Lund, Malmö). Swedish authorities said the attack affected the IT
  systems of some 120 Swedish organizations; civil-defence minister
  Carl-Oskar Bohlin called it a serious incident, with four regions
  placed in a state of readiness. Notable as outsourced-IT / hosting
  supply-chain blast radius: a criminal ransomware crew producing
  regional CII-scale disruption in a neighbouring country through a
  single managed-services datacenter.
outcome_summary: |
  Tietoevry isolated the affected platform immediately ("the attack has
  not impacted other parts of Tietoevry's infrastructure"), filed a
  report with the Swedish police, and warned that restoration "may extend
  over several days, even weeks." Per its 24 April 2024 closing
  statement, all impacted customer services except those of a few
  customers were fully restored by mid-March 2024. Tietoevry's
  investigation identified "the most probable path used by the attacker"
  but the intrusion vector was not publicly disclosed; the cited sources
  document encryption and service disruption, not confirmed data
  exfiltration.
quantified_impact:
  organizations_affected: 120
attributions:
  - actor_id: criminal/akira
    attributing_org: Tietoevry
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-01-22
    attribution_source_id: tietoevry/2024-01-22_akira-ransomware-attack-sweden-statement
    notes: |
      The victim itself names the family without hedging: "The malicious
      attack based on Akira ransomware on one of Tietoevry's datacenters
      in Sweden took place during the night of 19-20 January" (Tietoevry
      press release, 22 Jan 2024); Tietoevry confirmed Akira to Svenska
      Dagbladet the same day, after BleepingComputer first reported Akira
      as the perpetrator on Sunday 21 Jan. Swedish authorities likewise
      suspected the "Russia-linked" Akira group (Yle, 26 Jan 2024).
      Named-actor = the Akira RaaS operation/brand; no specific affiliate
      is identified, and no cited source documents a state nexus — actor
      remains stateless criminal/akira.
