id: 2024-01/ghostwriter-ukraine-military-espionage-pivot
name: Ghostwriter / UAC-0057 pivot to Ukrainian military espionage (PicassoLoader)
start_date: 2023-07-01  # earliest observed in Mandiant disclosure
disclosure_date: 2024-01-23
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Mandiant disclosed that Ghostwriter (UNC1151 / UAC-0057) shifted
  through the second half of 2023 from primarily-influence
  operations toward direct espionage against Ukrainian military
  personnel and government employees, delivering a refreshed
  PicassoLoader / AROEX malware family via phishing. Disclosure
  marked the Belarus-aligned cluster's clearest documented
  espionage-mission realignment of the invasion period.
false_flag_risk: none
summary: |
  Doctrinally important pivot for tracking the Belarus-aligned
  cluster: previous Ghostwriter operations (2020-2023) were
  primarily credential-theft-for-influence — compromise an account,
  seed fabricated content. The 2023-2024 PicassoLoader campaign
  is collection-for-intelligence — military personnel data,
  troop-rotation information, government correspondence — much
  closer in mission to GRU APT28 / Sandworm tasking than to the
  classical Ghostwriter influence template. AUSPEX reads this as
  Russian operational tasking flowing through the Belarusian
  KGB executor as Russia's own GRU collection bandwidth thinned
  against Ukrainian operational targets.
