id: 2024-09/kimsuky-klogexe-fpspy
name: Kimsuky KLogEXE keylogger and FPSpy surveillance tool
start_date: 2024-06-26  # FPSpy first uploaded to VirusTotal 2024-06-26 (earliest hard telemetry; compile timestamps timestomped to 2018 per Unit 42)
