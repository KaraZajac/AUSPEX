initial_vector: phishing
outcome_summary: |
  Palo Alto Unit 42 documented two malware samples used by
  Sparkling Pisces (aka Kimsuky / APT43): an undocumented
  keylogger, KLogEXE, and a previously undocumented variant of a
  backdoor, FPSpy, delivered via spear phishing. Most observed
  targets originated from South Korea and Japan, congruent with
  prior Kimsuky targeting. FPSpy first seen on VirusTotal
  26 June 2024; vendor disclosure 26 September 2024.
  Continuous-compromise pattern consistent with Kimsuky's
  strategic-intelligence mission profile.
false_flag_risk: none
summary: |
  Routine Kimsuky tradecraft-evolution disclosure. Unit 42 found two
  malware samples used by Sparkling Pisces (aka Kimsuky): KLogEXE, an
  undocumented C++ keylogger that reimplements a JPCERT-documented
  PowerShell keylogger and collects running applications, keystrokes
  (via GetAsyncKeyState) and mouse clicks, exfiltrating over HTTP
  POST; and FPSpy, a DLL backdoor (sys.dll) dropped by a custom
  loader that performs a system survey, downloads and executes
  additional encrypted modules, runs arbitrary commands, and
  enumerates drives, folders and files via the PowerShell `tree`
  command. Unit 42 assessed FPSpy as a variant of malware from a
  2022 campaign against a South Korean technology conglomerate that
  closely resembles the 2020 KGHSpy backdoor; the two samples share
  a codebase (HackingTeam-leaked dynamic-API code, an identical HTTP
  packet structure, and a decade-old Chrome/31 User-Agent). Most
  observed victims originated from South Korea and Japan. AUSPEX
  flags this and the broader Kimsuky activity stream as candidates
  for the v0.1 Campaign entity (continuous-compromise grouping)
  rather than a single event.
