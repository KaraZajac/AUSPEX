id: 2024-09/kimsuky-klogexe-fpspy
name: Kimsuky KLogEXE keylogger and FPSpy surveillance tool
start_date: 2024-06-01  # earliest sample dates from Unit 42 telemetry
disclosure_date: 2024-09-26
end_date: null
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  Palo Alto Unit 42 documented two new Kimsuky / APT43
  tools — KLogEXE (keylogger) and FPSpy (surveillance
  utility) — used in spear-phishing campaigns against
  South Korea-related individuals. Sample collection from
  June 2024; vendor disclosure 26 September 2024.
  Continuous-compromise pattern consistent with Kimsuky's
  strategic-intelligence mission profile.
false_flag_risk: none
summary: |
  Routine Kimsuky tradecraft-evolution disclosure. Unit 42's
  reporting describes spear-phishing of South Korea-related
  researchers and dissidents with weaponized Hangul HWP / Microsoft
  Office documents that drop the KLogEXE keylogger (a C++ tool
  capturing keystrokes, window titles, and active processes) and
  the FPSpy surveillance utility (PowerShell-staged downloader
  with system-survey, file-listing, screenshot, and additional-
  module-download capabilities). The KLogEXE / FPSpy pair sits
  alongside Kimsuky's existing AppleSeed, BabyShark, ReconShark,
  and FlowerPower toolset and is delivered via the same LNK / CHM
  / MSC initial-access patterns Kimsuky has used since 2022.
  AUSPEX flags this and the broader Kimsuky activity stream as
  candidates for the v0.1 Campaign entity (continuous-compromise
  grouping) rather than a single event.
