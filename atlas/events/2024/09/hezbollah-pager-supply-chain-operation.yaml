        least three shell companies … Israeli intelligence officers";
        Wikipedia: "Mossad had secretly manufactured and integrated the
        explosive PETN into the devices, and sold them to Hezbollah
        through a shell company"; AR-924 in CNN 09-17/09-27 + Wikipedia).
      • PETN — CARRIED by Wikipedia ONLY ("the explosive PETN"); the two
