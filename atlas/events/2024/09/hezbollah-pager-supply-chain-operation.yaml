    [a] FACTS — all load-bearing claims carried; casualty/device figures
    re-qualified, one unit-specificity moved to inference (see [b]):
      • Name "Operation Grim Beeper" — CARRIED (Wikipedia: "an Israeli
        attack nicknamed Operation Grim Beeper").
      • 17-18 Sep 2024, two sequential waves (pagers 17th, walkie-talkies
