  notes: |
    Audited vs Microsoft MSTIC blog 2024-09-26 (raw captured, sha256 a0ecf309...914) + MISP-galaxy cross-check. FACTS: all confirmed verbatim — hybrid-cloud on-prem→Azure/Entra ID lateral movement, data exfil, persistent backdoor (AADInternals federated-domain), Embargo ransomware deployment; initial access via stolen creds + n-day RCE; CVE-2022-47966 (Zoho ManageEngine), CVE-2023-4966 (Citrix NetScaler), ColdFusion 2016 (source hedges "possibly CVE-2023-29300/CVE-2023-38203"); ransomware families Hive, BlackCat/ALPHV, Hunters International, LockBit, Embargo all named in source. ATTRIBUTION: source states "Storm-0501 is a financially motivated cybercriminal group" — criminal/ placement CORRECT, NOT a state service; "Storm-####" is Microsoft's developing-group naming convention, not a state cluster. MISP-galaxy confirms (origin Microsoft, no nation, since 2021, Sabbath→RaaS→Embargo). CORRECTIONS: (1) added attribution_level: named-actor (was absent) — both MSTIC and MISP individuate Storm-0501 as a discrete actor with its own TTP history, so named-actor (not activity-cluster) is honest while not over-claiming a nation/unit. (2) added disclosure_date 2024-09-26 + noted start_date is the publication-date proxy for an undated "recent campaign" (group active since 2021). (3) doctrine_links left [] (was TODO) — purely-financial criminal actor, no documented state nexus, no applicable AUSPEX doctrine; matches reference-event handling. NOTE: source explicitly names "law enforcement" as a fifth targeted US sector, but no law-enforcement sector FK exists in the corpus (closest is government, already listed primary); captured in summary prose, not fabricated as a target. NOTE: actor record criminal/storm-0501 + source are still PROVISIONAL stubs (service placement/aliases = open QC); flagged, not in scope to fully de-provisionalize here. attributing_org_confidence high retained — MSTIC asserts its own cluster designation with certainty.
