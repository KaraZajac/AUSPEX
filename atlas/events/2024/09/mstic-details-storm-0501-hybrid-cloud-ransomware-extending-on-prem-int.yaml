initial_vector: n-day   # dual vector: stolen/valid creds + n-day RCE on unpatched public-facing servers (named CVEs are all known/patched)
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (MSTIC) detailed a multi-staged campaign in which the financially motivated actor it tracks as Storm-0501 extended on-premises intrusions into victims' Azure and Entra ID (hybrid cloud) environments to steal data, create persistent backdoor access and deploy ransomware. Initial access was gained via stolen/compromised credentials and by exploiting known remote-code-execution vulnerabilities in unpatched public-facing servers, including CVE-2022-47966 (Zoho ManageEngine), CVE-2023-4966 (Citrix NetScaler) and a ColdFusion 2016 flaw. MSTIC says Storm-0501 has targeted multiple U.S. sectors including government, manufacturing, transportation, law enforcement and hospitals. The group has deployed several ransomware families over time (Hive, BlackCat/ALPHV, Hunters International, LockBit and, most recently, Embargo).
