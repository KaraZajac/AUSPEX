id: 2024-09/mstic-details-storm-0501-hybrid-cloud-ransomware-extending-on-prem-int
name: "MSTIC details Storm-0501 hybrid-cloud ransomware extending on-prem intrusions into Azure/Entra ID"
start_date: 2024-09-26   # MSTIC publication date used as proxy: source describes an undated "recent campaign"; group active since 2021
