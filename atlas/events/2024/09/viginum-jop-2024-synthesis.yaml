id: 2024-09/viginum-jop-2024-synthesis
name: VIGINUM / SGDSN publishes Paris 2024 Olympic-Games information-threat synthesis
start_date: 2023-04-01  # VIGINUM "opened an operation in April 2023" to monitor the Games threat; report's "period considered (April 2023 – September 8th 2024)". Corrected from the unsupported 2024-01-01.
disclosure_date: 2024-09-13
end_date: 2024-09-08  # Games/period close: "From July 26th to September 8th 2024, France hosted the 2024 Olympic and Paralympic Games"; period considered ends 8 Sept 2024
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM / SGDSN post-Games synthesis report dated 13 September
  2024 on the information threat that targeted the Paris 2024
  Olympic and Paralympic Games. Over the monitored window (April
  2023 – 8 September 2024) VIGINUM identified 43 information
  operations targeting the Games — mostly opportunistic — plus
  two planned, coordinated manipulation campaigns, one of which
  (summer 2023, named OLIMPIYA) involved pro-Azerbaijan actors.
  The report is a MULTI-ACTOR characterization organised by
  operating method: pro-Russian activity is the dominant named
  through-line (the July-2024 fake-"Hamas"-member video threatening
  the Games — attributed by Microsoft's MTAC to Storm-1516; the
  RRN / Doppelganger campaign; and the Matryoshka campaign spoofing
  media outlets and institutions to push the narrative that France
  could not host the Games), alongside pro-Iranian (doxxing of
  Israeli athletes, Amnesty-International-logo spoofing),
  pro-Chinese (Spamouflage; AI-generated anti-Games videos) and
  pro-Azerbaijan (OLIMPIYA; boycott hashtags) operations. VIGINUM
  frames its work as "characterization" of foreign digital
  interference, explicitly distinguished from "attribution", and
  assesses that most operations failed to penetrate the
  French-speaking public debate or affect the Games.
quantified_impact: {}
false_flag_risk: none
operators_named:
  - Storm-1516
summary: |
  A VIGINUM / SGDSN counter-FIMI publication bracketing the Paris
  2024 Games window — a post-event synthesis / retrospective of the
  information threat rather than a single operator-cluster technical
  report. It consolidates France's counter-FIMI posture after the
  Games, drawing together the operating methods VIGINUM observed and
  referencing its prior RRN / Doppelganger and Matriochka disclosures
  (both linked in the report). The threat picture is multi-actor —
  pro-Russian activity is the most prominent named through-line, but
  the synthesis also documents pro-Iranian, pro-Chinese (Spamouflage)
  and pro-Azerbaijan (OLIMPIYA) operations — and VIGINUM is careful to
  frame it as characterization of foreign interference, not attribution
  of responsible actors (which it states exceeds its mandate).
