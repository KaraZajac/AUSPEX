doctrine_links:
  - doctrine_id: ru/info-security-2016
    pillar_id: ru/info-security-2016/info-psychological-defense
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      The synthesis's dominant named campaigns are Russian external
      information-psychological operations targeting the Games: the
      July-2024 false-flag video of an alleged Hamas member threatening
      the Games (attributed by Microsoft/MTAC to Storm-1516), the
      RRN/Doppelganger campaign (active since spring 2022) pushing the
      #JOpourris2024 hashtag and Munich/Paris graffiti targeting Israeli
      athletes, and the Matryoshka campaign spoofing media outlets and
      institutions to spread the narrative that France could not host the
      Games. This is the external influence apparatus the 2016 Information
      Security Doctrine's info-psychological pillar underwrites (Moscow
      frames anti-Western narrative projection and the discrediting of
      adversary states as countering hostile "information-psychological"
      impact). VIGINUM names the behaviour and objective; the mapping to
      Russia's specific doctrine is an AUSPEX inference with no serious
      competitor for the Russian subset. strongly_inferred rather than
      attested because VIGINUM does not invoke the 2016 doctrine.
      (attacker-rationale — Russia's own doctrine for why it ran the ops;
      carries attacker-state = Russia for this null-actor synthesis.)
    attesting_source_id: sgdsn/2024-09-13_jop-2024-menace-informationnelle
    inference_basis:
      source_id: sgdsn/2024-09-13_jop-2024-menace-informationnelle
      signals:
        - "VIGINUM: the July-2024 fake-'Hamas'-member video threatening the Games 'has been attributed by the Microsoft Threat Analysis Center (MTAC) to the Russia-affiliated influence actor … Storm-1516'."
        - "VIGINUM: 'the pro-Russian Matryoshka campaign … on several occasions targeted the organization of the Paris Games by spoofing legitimate media outlets and institutions' and 'attempted to spread the narrative that France was incapable of successfully hosting the Games'."
        - "VIGINUM: the 'RRN campaign' (footnote: 'Also known as Doppelganger, this campaign has been active since spring 2022') disseminated the '#JOpourris2024' hashtag and photos of Munich/Paris graffiti targeting Israeli athletes."
      ruled_out: "Financial/criminal motive — ruled out: these are monetization-free narrative-projection operations (VIGINUM's analysis is modus-operandi-based, not revenue-driven). The 2016 Information Security Doctrine is not invoked by name (behaviour + objective named, doctrine not). SCOPE caveat: this attacker-rationale link encodes the RUSSIAN operator subset — the report's dominant named campaigns; the synthesis also documents pro-Iranian, pro-Chinese (Spamouflage) and pro-Azerbaijan (OLIMPIYA) operations that this Russian doctrine link does not cover."
