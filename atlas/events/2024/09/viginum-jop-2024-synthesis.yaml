initial_vector: unknown
outcome_summary: |
  VIGINUM post-Games synthesis report dated 13 September 2024
  on the information threat surrounding the Paris 2024 Olympic
  and Paralympic Games. Attributes the bulk of the high-tempo
  pre-Games and Games-period influence activity (Storm-1516,
  Doppelganger, Matriochka-adjacent operators) to Russian-state-
  aligned actors with secondary attribution to Azerbaijani-
  aligned amplification networks.
quantified_impact: {}
false_flag_risk: none
operators_named:
  - Storm-1516
summary: |
  Canonical LII counter-FIMI publication bracketing the Games
  window. The synthesis is editorially significant as VIGINUM's
  first major event-driven retrospective rather than an
  operator-cluster attribution, and as the publication that
  consolidates France's view of the Russia-aligned operator
  ecosystem after two-plus years of Doppelganger / Portal
  Kombat / Matriochka disclosures.
