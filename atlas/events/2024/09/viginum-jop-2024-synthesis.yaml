    [a] FACTS — corrected against the raw report:
    • SCOPE de-Russia-narrowed. Prior outcome_summary said VIGINUM "attributes
      the bulk of the … activity … to Russian-state-aligned actors with
      secondary attribution to Azerbaijani-aligned amplification networks."
      The report is a MULTI-ACTOR characterization organised by operating
      method: pro-Russian (Storm-1516; RRN/Doppelganger; Matryoshka),
      pro-Iranian (doxxing of Israeli athletes; Amnesty-International-logo
      spoofing), pro-Chinese (Spamouflage; AI anti-Games videos) AND
      pro-Azerbaijan (OLIMPIYA). It gives NO volumetric "bulk = Russia"
      ranking. Rewrote outcome_summary + summary to foreground the multi-actor
      picture (Russia dominant as the named through-line, not the sole actor)
      and the source's own quantification.
    • ADDED source-carried figures: "VIGINUM identified 43 information
      operations targeting the Paris 2024 Games" (mostly opportunistic) + "two
      planned and coordinated … campaigns, one of which in summer 2023 was
      called OLIMPIYA, involving pro-Azerbaijan actors."
    • ADDED VIGINUM's characterization/attribution distinction (VERBATIM:
      "Characterizing the involvement of a foreign actor … should not be
      confused with the process of attribution, as identifying the responsible
      actors surpasses VIGINUM's field of competence").
    • ADDED the low-impact finding (VERBATIM: "most operations observed
      remained in specific ecosystems and did not go beyond the first postings
      or first influencers, nor manage to penetrate the French-speaking public
      debate"). quantified_impact kept {} (honest — the report's own finding is
      minimal effect; a 43-ops count is activity, not impact).
    • Dropped the summary's unverifiable "first major event-driven retrospective"
      superlative and the "Portal Kombat" reference (0 hits in EN+FR — the report
      links only its RRN/Doppelganger and Matryoshka publications, not Portal
      Kombat).

    [b] ATTRIBUTION — primary entry kept actor_id null / high / concur; ADDED
    attribution_level: nation (was MISSING). Note rewritten: VIGINUM does
    nation-level CHARACTERIZATION of a multi-actor threat, not single-operator
