id: 2024-09/halliburton-followup-ransomhub
name: RansomHub leak-site posting of Halliburton stolen data
start_date: 2024-09-02
disclosure_date: 2024-09-02
end_date: 2024-09-30
incident_type:
  - data-theft
initial_vector: n/a  # follow-up to 2024-08 intrusion
outcome_summary: |
  RansomHub published exfiltrated data from the August 2024
  Halliburton intrusion on its leak site September 2, 2024
  after Halliburton refused to pay. The leak included engineering
  documents, customer contracts, and HR data. Halliburton's
  Q3 2024 10-Q filing disclosed approximately USD 35M of
  cumulative financial impact. The case is part of RansomHub's
  high-tempo mid-2024 victim run that catalyzed the August
  29 2024 CISA AA24-242A joint advisory.
quantified_impact:
  disclosed_impact_usd: 35000000
false_flag_risk: none
summary: |
  Follow-up to the existing 2024-08/halliburton-ransomhub event;
  documents the leak-site monetization phase. AUSPEX includes
  as a separate event to capture the data-publication phase as
  distinct from the encryption / disruption phase — the two
  are temporally separated by approximately ten days and serve
  different doctrinal-engine purposes (disruption vs. data-
  extortion as separate signal types).
