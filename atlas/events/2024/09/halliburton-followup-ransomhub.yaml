    PHANTOM/WRONG-SOURCE remediation → CORRECT-DOWN + PARTIAL RE-SOURCE + RETIRE/MERGE flag.
    Audited vs raw SEC filings (Halliburton CIK 0000045012) + TechCrunch + the CISA advisory.
    Snapshots (sha256 first8…last8 / bytes): 8-K 2024-09-03 Item 1.05 = 2d2c834a…c4861a6e /
    30,022 B; 10-Q Q3-2024 = c8f12480…8ee6481b / 982,338 B; TechCrunch 2024-09-03 =
    68ed214e…8ce4bf6c / 234,362 B; CISA AA24-242A = cde72d5a…c9099fb7 / 124,716 B (hash
