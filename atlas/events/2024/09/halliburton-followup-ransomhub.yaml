id: 2024-09/halliburton-followup-ransomhub
name: Halliburton RansomHub data-exfiltration confirmation and Q3 2024 impact disclosure (follow-up)
start_date: 2024-08-30
disclosure_date: 2024-09-03
end_date: 2024-09-30
incident_type:
  - data-theft
initial_vector: unknown  # follow-up to 2024-08 intrusion; vector not disclosed
outcome_summary: |
  Follow-up disclosure phase of the August 2024 Halliburton
  intrusion. In an Item 1.05 Form 8-K filed September 3, 2024,
  Halliburton confirmed that "the unauthorized third party
  accessed and exfiltrated information" from its systems, while
  stating it was still "evaluating the nature and scope of the
  information." Its Q3 2024 Form 10-Q (filed November 7, 2024)
  recorded USD 35M of cybersecurity-incident expenses for the
  quarter (external advisors, remediation, system restoration,
  legal and payroll costs), which Halliburton assessed as not
  reasonably likely to be material to its financial condition.
  RansomHub took credit via a private ransom note (seen by
  TechCrunch); as of contemporaneous reporting RansomHub had NOT
  listed Halliburton on its leak site and no exfiltrated data
  had been published.
quantified_impact:
  disclosed_impact_usd: 35000000  # Q3 2024 response EXPENSES per 10-Q, deemed immaterial — not a ransom payment/loss
false_flag_risk: none
summary: |
  Follow-up to 2024-08/halliburton-ransomhub, retained here to
  capture the exfiltration-confirmation and financial-impact
  disclosures that post-dated the initial August 21-23 2024
  breach disclosure. NOTE: this event was originally authored as
  a "leak-site monetization / data-publication phase" (a claimed
  RansomHub leak-site posting of stolen data on 2024-09-02 after
  Halliburton "refused to pay"); the 2026-07-05 audit found that
  premise UNSUPPORTED and contradicted by the sources — RansomHub
  claimed responsibility via a private ransom note, not a leak
  site, and never published or listed Halliburton's data (see qc
  notes). The event has been corrected down to its source-carried
  residue (confirmed exfiltration + USD 35M Q3 expenses), which
  substantially duplicates the parent event; it is flagged as a
  RETIRE/MERGE candidate.
