    Item 8.01 8-K (2024-08-23, report Aug 21) = dd87de01…5f44c518 / 28,006 B (not cited here —
    it is the parent event's disclosure; see FLAG below).

    TRIAGE: the sole prior citation was cisa/2024-08-29_aa24-242a-ransomhub-advisory — a
    GENERAL RansomHub TTP advisory that names no victim (0 Halliburton hits) and, dated
    2024-08-29, pre-dates every claim in this event. It supported NONE of the event's
    Halliburton-specific facts → WRONG/BACKGROUND-ONLY source. Path taken: RE-SOURCE the
    defensible residue to primary SEC filings + TechCrunch, and FLAG for RETIRE/MERGE because
    the event's distinguishing premise is fabricated.

    [a] FACTS — the event's original spine was fabricated:
      • "RansomHub published exfiltrated data on its leak site September 2, 2024 after
        Halliburton refused to pay" → FALSE. TechCrunch (snapshot): "RansomHub's dark web
        leak site, which the gang uses to publish stolen files to extort its victims into
        paying a ransom, has not yet listed Halliburton as one of its victims." RansomHub's
        self-claim was via a PRIVATE RANSOM NOTE, not a leak-site posting. No data was
        published. STRIPPED.
      • "the leak included engineering documents, customer contracts, and HR data" → FABRICATED.
        No source names any data categories; the 8-K says the company was "evaluating the
        nature and scope of the information." STRIPPED.
      • "Halliburton refused to pay" → UNSUPPORTED. Contemporaneous reporting (Cybernews) read
        the ABSENCE of a leak-site listing as a sign Halliburton might be NEGOTIATING/paying —
        the opposite; payment status was never confirmed. STRIPPED.
      • Data EXFILTRATION → SUPPORTED and kept. 8-K 2024-09-03: "The Company believes the
        unauthorized third party accessed and exfiltrated information from the Company's
        systems." 10-Q: "we know the unauthorized third party exfiltrated information from our
        systems."
      • USD ~35M impact → SUPPORTED and kept, but re-characterized honestly. 10-Q: "we incurred
        $35 million in expenses during the three months ended September 30, 2024 related to
        the engagement of external advisors to assess and remediate the effects of the activity,
        and restore our systems, as well as legal fees, payroll related costs, and other
        expenses"; table line "Cybersecurity incident 35 35"; and "not reasonably likely to
        have, a material impact." So it is Q3 RESPONSE EXPENSES Halliburton deems immaterial —
        not a ransom payment/loss. Kept "cumulative" (whole $35M fell in Q3). Rewrote name,
        outcome_summary, and summary to the truthful minimum.

    [b] ATTRIBUTION — re-pointed and re-scoped. Was: attributing_org "Halliburton + RansomHub
      (self-claimed)", conf moderate, source = CISA advisory (which never names Halliburton).
      Halliburton's SEC filings name only an "unauthorized third party" — Halliburton did NOT
      attribute RansomHub. Corrected attributing_org to "RansomHub (ransom-note self-claim),
      reported by TechCrunch / BleepingComputer"; attribution_source_id → techcrunch/
      2024-09-03_halliburton-confirms-data-stolen (documents the ransom-note self-claim);
      confidence kept moderate; auspex_assessment concur-with-caveat (self-claim + media, no
      victim/govt confirmation). No over-attestation.

    [c] DATES — de-conflated. Removed the fabricated 2024-09-02 leak date. start_date →
      2024-08-30 (Item 1.05 8-K "date of earliest event reported"); disclosure_date →
      2024-09-03 (8-K filed / exfiltration publicly confirmed / TechCrunch+BleepingComputer
      same day); end_date 2024-09-30 kept (Q3 close, the window the $35M covers). Each cited
      source's published_on set to its true filing/publication date (8-K 2024-09-03; 10-Q
      2024-11-07; TechCrunch 2024-09-03).

    [d] DOCTRINE_LINKS — []; correct. No doctrine genuinely applies to a data-exfiltration
      follow-up; none invented; no attested link so no attesting_source_id needed.

    [e] ATTRIBUTION_LEVEL — added named-actor (RansomHub named as the group; no nation-state,
      service, or unit named anywhere).

    [f] ACTOR_ID — criminal/ransomhub resolves (atlas/actors/criminal/ransomhub.yaml). No actor
      edit made. (Actor record already had its "including Scattered Spider" fabrication removed
