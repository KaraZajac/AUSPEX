  notes: "Audited vs Computer Weekly article on AA24-249A (raw captured, sha256 7bff700a…). FACTS confirmed: 5 Sep 2024; GRU Unit 29155 = 'the 161st Specialist Training Centre' (verbatim); part of GRU/Main Directorate; WhisperGate MBR-wiper deployed across Ukraine ahead of the Feb-2022 invasion; weaponizes publicly-disclosed CVEs from public GitHub repos in MS Windows Server, Atlassian Confluence, Dahua IP cameras and Sophos (source adds Red Hat); espionage + website defacement + hack-and-leak + sabotage of day-to-day ops; thousands of domain scans across NATO/EU states focused on CNI, government, financial services, transport, energy, healthcare. Meterpreter/Rclone/GOST/ProxyChains not in this article snippet (they are in AA24-249A itself) — left in summary as advisory-sourced tooling. ATTRIBUTION: source explicitly names the GRU unit → added attribution_level: named-unit (was missing); attributing_org_confidence high retained (joint Five-Eyes+allies advisory). published_on 2024-09-05 matches byline. CORRECTIONS: (1) added attribution_level: named-unit; (2) target country ua→null on all six sectors — source says targeting spans 'multiple Nato and European Union member states', not Ukraine-specific (WhisperGate was the Ukraine-specific tool); (3) source-record publisher/title were backfill artifacts (held the advisory's agency list + the event name) — corrected to Computer Weekly / the real headline, kind journalism, tier secondary preserved, added raw_snapshot+content_sha256. doctrine_link ru/nato-ultimatum-2021/ukraine-support-interdiction kept strongly_inferred (attesting_source_id null correct) — source names the sabotage/espionage behaviour + Ukraine context but NOT the aid-interdiction goal in substance, so attested is not warranted. actor ru/gru/cadet-blizzard resolves (status active, KEPT 2026-06-24). FK check: doctrine, pillar, all six sectors resolve."
