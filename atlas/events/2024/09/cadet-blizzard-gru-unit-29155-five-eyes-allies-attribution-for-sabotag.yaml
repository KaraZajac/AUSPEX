summary: |
  On 5 September 2024 the UK NCSC, US CISA and FBI, and partner agencies from Czechia, Estonia, Germany, Latvia and Ukraine (advisory AA24-249A) jointly attributed sabotage and espionage against critical infrastructure to GRU Unit 29155 (the 161st Specialist Training Centre), tracked as Cadet Blizzard/Ember Bear. The advisory states the unit exploits weaknesses in internet-facing systems, frequently weaponizing publicly disclosed CVEs (in Microsoft Windows Server, Atlassian Confluence, Dahua IP cameras and Sophos products) with exploit scripts pulled from public GitHub repositories. Reported tooling includes the WhisperGate MBR-wiper used against Ukraine, Meterpreter, Rclone for exfiltration, and GOST/ProxyChains tunneling. Targeting focused on NATO/EU member states and Ukraine, with particular emphasis on critical national infrastructure, government, financial services, transport, energy and healthcare.
