    confidence: plausible
    reasoning: |
      The Raptor Train botnet is a large PRC state-sponsored network of
      compromised SOHO/IoT devices. CISA frames it as "positioned for
      malicious activity" and used "as a proxy to conceal their
      identities while ... compromising targeted U.S. networks", and
      Lumen assessed the infrastructure was built up "for future use" —
      consistent with the pre-positioning pillar, which itself enumerates
      the "Flax Typhoon pattern." Graded plausible (not higher) because
      the cited sources' dominant framing is obfuscation / proxy
      infrastructure for concealment, not access held inside civilian
      critical infrastructure for wartime disruption, so more than one
      strategic reading survives and no source states a
      pre-positioning-for-contingency purpose. (Downgraded from
      strongly_inferred in the 2026-07-05 audit; prior signal wording
      claiming "CII pre-positioning ... downstream LOTL" was not carried
      by any cited source and was removed.)
    attesting_source_id: cisa/2024-09-18_prc-linked-actors-botnet
    inference_basis:
      alternatives:
        - "Pre-positioning / staging infrastructure held for future use (Lumen: botnet built up 'for future use'; CISA: 'positioned for malicious activity'; the pillar names the Flax Typhoon pattern)."
        - "Proxy / obfuscation infrastructure for routine espionage (CISA: 'proxy to conceal their identities while ... compromising targeted U.S. networks'; ~260k globally distributed consumer devices, not adversary critical infrastructure)."
