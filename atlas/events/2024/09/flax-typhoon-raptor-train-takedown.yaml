id: 2024-09/flax-typhoon-raptor-train-takedown
name: FBI Flax Typhoon "Raptor Train" botnet takedown
start_date: 2024-09-18  # FBI press conference
disclosure_date: 2024-09-18
end_date: 2024-09-18
incident_type:
  - disruption
initial_vector: n/a  # court-ordered remote action
outcome_summary: |
  Court-authorized FBI operation disrupted the "Raptor Train"
  botnet (~260,000+ compromised IP cameras, NVRs, and SOHO
  routers globally) operated by Flax Typhoon, identified as
  the cyber arm of Beijing-based Integrity Technology Group
  Inc. FBI Director Wray named the operating company publicly
  at the press conference; Treasury subsequently issued OFAC
  sanctions on January 3, 2025 (separate event).
false_flag_risk: none
summary: |
  Second major US disruption of a PRC pre-positioning botnet
  after the January 2024 KV-Botnet / Volt Typhoon operation.
  Distinguishes itself by being the first PRC
  critical-infrastructure cyber operator whose front company
  was named publicly at takedown.
