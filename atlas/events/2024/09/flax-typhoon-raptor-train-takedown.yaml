      the military, government, higher education, telecommunications,
      defense industrial base (DIB) and information technology (IT)
      sectors" — Taiwanese military / government / DIB collection is
      consistent with intelligence preparation for a Taiwan contingency,
      and the operator (Flax Typhoon / RedJuliett) is historically
