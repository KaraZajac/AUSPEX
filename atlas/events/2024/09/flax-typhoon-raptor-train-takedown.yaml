id: 2024-09/flax-typhoon-raptor-train-takedown
name: FBI Flax Typhoon "Raptor Train" botnet takedown
start_date: 2024-09-18  # court-authorized operation announced 2024-09-18
disclosure_date: 2024-09-18
end_date: 2024-09-18
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown  # court-ordered remote action against adversary infrastructure
outcome_summary: |
  Court-authorized FBI operation (announced 2024-09-18) disrupted a
  botnet of 260,000+ compromised Internet-connected devices — SOHO
  routers, IP cameras, NVR/DVR devices, and network-attached storage
  (NAS) — distributed globally (North America, South America, Europe,
  Africa, Southeast Asia, Australia). The FBI took control of the
  botnet's command-and-control infrastructure and sent disabling
  commands to the Mirai-variant malware on infected devices; an
  attempted DDoS against the FBI's remediation infrastructure failed.
  FBI Director Wray publicly identified the operator as Beijing-based
  Integrity Technology Group Inc. ("Integrity Tech"), the company behind
  the Flax Typhoon activity. Treasury subsequently sanctioned Integrity
  Tech via OFAC on 2025-01-03 (separate event). The botnet name "Raptor
  Train" is Lumen Black Lotus Labs' coinage; FBI/DOJ/CISA documents do
  not use it.
false_flag_risk: none
summary: |
  Second major US court-authorized disruption of a PRC state-sponsored
  botnet after the January 2024 KV-Botnet / Volt Typhoon operation.
  Distinguished by being the first PRC state-cyber operation whose
  operating company was named publicly at takedown: FBI Director Wray
  identified Beijing-based Integrity Technology Group Inc. as the entity
  behind Flax Typhoon (also tracked as RedJuliett / Ethereal Panda). The
  ~260,000-device Mirai-variant botnet ("Raptor Train", per Lumen Black
  Lotus Labs) served as global proxy / obfuscation infrastructure; Lumen
  observed it targeting U.S. and Taiwanese military, government,
  higher-education, telecommunications, defense-industrial-base and IT
  entities.
