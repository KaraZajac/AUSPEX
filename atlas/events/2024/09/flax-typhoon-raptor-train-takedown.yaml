  notes: |
    Re-source + 6-point audit of the FBI Raptor Train takedown against the
    RAW primaries. Path taken: RE-SOURCE (real, well-documented counter-action
    that was single-sourced to an FBI news story which does NOT carry its
    load-bearing specifics). Snapshots (raw_snapshot / content_sha256, PRESERVE
    tier): fbi b811bc9f…3e505bfa (87,155 B, hash RE-VERIFIED unchanged); cisa
    4bac572c…c675c7dd (542,831 B, NEW — IC3 first-party copy of joint CSA
    JCSA-20240918-001); lumen b6b685c1…1f8ed5fa (55,289 B, NEW); treasury
    e89e13dc…0438d00c (120,711 B, hash re-verified, added to event); doj —
    NO snapshot (justice.gov Akamai bm-verify-walled to curl AND WebFetch;
    content cross-verified, corroborating not sole-source).

    [a] FACTS — corrected. The sole prior source (FBI/Wray story) says
    "thousands of infected devices" and "storage devices, cameras, and video
    recorders"; it does NOT carry the 260,000 figure, "SOHO routers", the
    "Raptor Train" name, "Beijing", or Taiwan. Re-sourced: "over 260,000
    devices … as of June 2024" + device types "SOHO routers, firewalls,
    network-attached storage (NAS) and Internet of Things (IoT) devices" +
    global geography + Mirai + China-Unicom-Beijing management + proxy framing
    all VERBATIM in the CISA joint advisory; DOJ adds "more than 200,000
    consumer devices … SOHO routers, IP cameras, DVRs, and NAS", "Integrity
    Technology Group, a company based in Beijing", the C2 takeover + disabling
    commands, and the failed DDoS; "Raptor Train" name + "U.S. and Taiwanese
    … military, government, higher education, telecommunications, DIB and IT"
    targeting are VERBATIM in Lumen; Beijing-based "Integrity Technology Group,
    Incorporated" + 2025-01-03 OFAC designation are VERBATIM in Treasury.
    Removed the embellishment "~260,000+ … devices cleaned" (the op took over
    C2 + disabled malware; it did not clean all 260k). Softened summary
    "pre-positioning botnet"/"critical-infrastructure operator" to the
    source-carried "proxy / obfuscation infrastructure" + Lumen victim-sector
    list. incident_type disruption -> [law-enforcement, disruption] (court-
    authorized LE takedown; matches the meta-set convention, cf. moobot).

    [b] ATTRIBUTION — actor_id null retained (counter-action; FBI/DOJ/CISA/NSA
    the acting bodies). attributing_org broadened FBI -> "FBI / DOJ + CISA +
    NSA" to match the joint nature (cf. KV sister event). auspex_assessment
    concur, high confidence — carried (FBI/DOJ/CISA/Treasury all name Flax
    Typhoon + Integrity Tech at high confidence).

    [c] DATES — all sources published 2024-09-18 (FBI story, DOJ OPA release,
    CISA JCSA-20240918-001, Lumen); Treasury 2025-01-03. Event start/disclosure/
    end 2024-09-18 = the takedown announcement date; correct. No conflation.

    [d]/[e] DOCTRINE + LEVELS. attribution_level ADDED = named-actor (group +
    company named; no PRC service named — the reason the actor is cn/unscoped).
    Link cn/intelligentized-warfare/pre-positioning: strongly_inferred ->
    PLAUSIBLE — sources frame Raptor Train as obfuscation/proxy infrastructure,
    not CII pre-positioning for disruption; prior signals invented a
    "CII … downstream LOTL" framing no source carries (removed); rebuilt as
