  notes: |
    Counter-action audit (OFAC/FinCEN + US Secret Service/Dutch seizures +
    DOJ EDVA indictment vs Russian crypto-laundering infrastructure).
    RE-SOURCED (badrabbit model): the event previously rested on a single
    Krebs (secondary) citation; added the Treasury OFAC/FinCEN primary
    release (jy2616) as the load-bearing govt-primary and the DOJ EDVA
    indictment release. Level=partial ONLY because the DOJ justice.gov page
    is Akamai-bot-walled (curl returns a 2,534-byte interstitial shell;
    WebFetch times out; the globalsecurity.org mirror 403s) and could not be
    raw-snapshotted; its charge-count specifics are mirror-corroborated (The
    Record, CNN, Flashpoint, and the DOJ page's own title "operating
    billion-dollar money laundering services"). Treasury + Krebs are both
    fully snapshotted + hashed and together carry every load-bearing FACT.

    [a] FACTS — Treasury raw jy2616 (sha256 08d2cc57…9e805504, 129,588 bytes)
    carries verbatim: "OFAC is sanctioning Ivanov and Cryptex—a virtual
    currency exchange registered in St. Vincent and the Grenadines and
    operating in Russia"; FinCEN "identifies PM2BTC … as being of 'primary
    money laundering concern' … pursuant to section 9714(a)"; "FinCEN found
    that nearly half of PM2BTC's exchange activity had links to illicit
    activity"; "The U.S. Secret Service's Cyber Investigative Section, the
    Netherlands Police, and the Dutch Fiscal Intelligence and Investigation
    Service (FIOD) have seized web domains and/or infrastructure associated
    with PM2BTC, UAPS, and Cryptex"; "the U.S. Secret Service and the U.S.
    Attorney's Office for the Eastern District of Virginia are unsealing an
    indictment of Ivanov and another Russian national, Timur Shakhmametov";
    State reward "up to $10 million"; "Cryptex … has received over $51.2
    million in funds derived from ransomware attacks … associated with over
    $720 million in transactions to services frequently used by Russia-based
    ransomware actors … including … Garantex"; Ivanov "has laundered hundreds
    of millions of dollars' worth of virtual currency for ransomware actors,
    initial access brokers, darknet marketplace vendors … for approximately
    the last 20 years"; Ivanov "payment processor for various fraud shops,
    including OFAC-designated Genesis Market"; "Operation Endgame". Krebs raw
    (sha256 df66d712…584c10b6, 93,614 bytes) carries: Ivanov = Taleon, 44, of
    Saint Petersburg; "cryptocurrency exchange called Cryptex[.]net"; PM2BTC =
    a "money transfer business" that lets customers "convert funds from the
    virtual currency Perfect Money (PM) into bitcoin"; Shakhmametov = alleged
    Joker's Stash operator, aka "Vega" / "v1pee"; "In January 2021, Joker's
    Stash announced it was closing up shop, after European authorities seized
    a number of servers"; prosecutors' Joker's Stash revenue "at least $280
    million, but possibly more than $1 billion"; State reward "$10 million
    each"; carding banner "Rescator".

