id: 2024-09/cryptex-pm2btc-sanctions
name: Treasury sanctions Cryptex / PM2BTC; DOJ indicts Ivanov and Shakhmametov
start_date: 2024-09-26
disclosure_date: 2024-09-26
end_date: 2024-09-26
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  Coordinated US Treasury OFAC + DOJ + UK NCA + Dutch action
  against Russian-operated cryptocurrency-laundering
  infrastructure. OFAC SDN actions against the Cryptex
  exchange (operating as cryptex.net) and the PM2BTC peer-
  to-peer transfer service. DOJ unsealed indictments against
  Sergey Ivanov ("Taleon") for unlicensed money transmitting
  and against Timur Shakhmametov ("JokerStash" /
  "vega") as operator of the Joker's Stash carding shop
  (shut down January 2021). Cryptex / PM2BTC had laundered
  proceeds for ransomware affiliates including Conti,
  LockBit, and DarkSide.
false_flag_risk: none
operators_named:
  - ivanov-sergey  # Cryptex "Taleon", DOJ + OFAC Sep 2024
  - shakhmametov-timur  # JokerStash, DOJ + OFAC Sep 2024
summary: |
  The Cryptex / PM2BTC action closed a major ransomware-
  laundering pipe and produced the long-delayed indictment
  of the alleged Joker's Stash operator three years after
  the marketplace's voluntary shutdown. AUSPEX classifies
  as criminal-baseline.
