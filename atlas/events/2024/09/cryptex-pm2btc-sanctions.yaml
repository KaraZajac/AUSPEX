outcome_summary: |
  Coordinated US–Dutch action against Russian-operated
  cryptocurrency-laundering infrastructure. Treasury OFAC
  designated Sergey Ivanov and the Cryptex virtual-currency
  exchange (operating as cryptex.net) under E.O. 13694 (as
  amended) and E.O. 14024; Treasury's FinCEN issued a Section
  9714 order identifying the PM2BTC exchanger as a "primary money
  laundering concern" (FinCEN found nearly half of PM2BTC's
  activity linked to illicit finance). The US Secret Service's
  Cyber Investigative Section, the Netherlands Police, and the
  Dutch FIOD seized web domains / infrastructure for PM2BTC,
  UAPS, and Cryptex. Concurrently the US Secret Service and the
  US Attorney's Office (EDVA) unsealed an indictment charging
  Ivanov ("Taleon") and Timur Shakhmametov ("Vega" / alleged
  Joker's Stash operator) with money-laundering and bank-fraud
  conspiracies (Shakhmametov also access-device fraud); the State
  Department offered rewards of up to $10 million each. Treasury
  cited Cryptex as having received over $51.2M in ransomware
  proceeds and ~$720M in transactions to cybercrime services
  (including OFAC-designated Garantex and Genesis Market), and
  Ivanov as having laundered hundreds of millions for ransomware
  actors, initial-access brokers, and darknet/carding vendors
  over roughly 20 years. Part of the multinational Operation
  Endgame.
false_flag_risk: none
operators_named:
  - ivanov-sergey  # Cryptex/PM2BTC/UAPS "Taleon"; DOJ indictment + OFAC SDN, Sep 2024
  - shakhmametov-timur  # "Vega", alleged Joker's Stash operator; DOJ indictment (EDVA) only, Sep 2024 (NOT OFAC-designated)
summary: |
  A coordinated OFAC/FinCEN sanction + US Secret Service/Dutch
  infrastructure seizure + DOJ indictment against Russian
  cryptocurrency-laundering services (Cryptex, PM2BTC, UAPS) and
  their operators. The action closed a major ransomware-laundering
  pipe and produced the long-delayed indictment of the alleged
  Joker's Stash operator more than three years after that carding
  shop announced its closure (January 2021, following European
  server seizures). AUSPEX classifies as criminal-baseline: the
  cited sources frame Ivanov and Shakhmametov as independent
  Russian criminal money launderers, not state-tasked proxies.
