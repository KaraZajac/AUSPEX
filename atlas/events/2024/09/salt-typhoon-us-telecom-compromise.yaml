id: 2024-09/salt-typhoon-us-telecom-compromise
name: Salt Typhoon US tier-1 telecom mass compromise (CALEA gateways)
start_date: 2022-01-01  # earliest assessed initial access per FBI / CRS
disclosure_date: 2024-09-25  # WSJ initial public reporting
end_date: null  # ongoing exposure / eviction across carriers
incident_type:
  - intrusion
  - data-theft
  - pre-positioning
initial_vector: n-day  # edge-router / appliance N-day exploitation
outcome_summary: |
  Salt Typhoon / MSS-aligned operators compromised every major
  US tier-1 wireless and wireline carrier — AT&T, Verizon,
  T-Mobile, Lumen, Spectrum / Charter, Consolidated, Windstream
  — including CALEA lawful-intercept gateways. Bulk metadata
  access at >1M-user scale; targeted content interception
  against political figures including campaign staff for both
  2024 US presidential candidates and senior congressional
  members. FBI (August 2025) subsequently reported 200+
  companies in 80 countries compromised in the broader campaign.
quantified_impact:
  affected_carriers: 8
  affected_users: ">1,000,000 metadata"
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  The most consequential single PRC intelligence collection
  operation against the US telecom sector on the public record.
  CALEA-gateway compromise was the doctrinally significant
  detail — it gave the operator visibility into US
  law-enforcement and intelligence wire-tap selectors. Treasury
  OFAC designated the operating company (Sichuan Juxinhe
  Network Technology) on January 17, 2025 (separate event).
