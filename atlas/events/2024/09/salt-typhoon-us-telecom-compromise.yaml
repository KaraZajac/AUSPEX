  notes: |
    Full 6-point audit of the Sept-Oct-2024 Salt Typhoon telecom
    OPERATION event (distinct from 2025-08/cisa-aa25-239a-salt-typhoon
    advisory and 2025-01/treasury-salt-typhoon-sanctions) vs its five
    cited RAW sources. All five snapshots present in atlas/sources/raw/
    with recorded sha256 matching on disk: WSJ 4f65b5b4…ba9ab (767 B),
    Treasury 7c2cfe78…652451, CISA 5905b390…6ec2fd, FBI 2a3f9a42…6f40a4f,
    CRS 44b337b4…c6c0fb.

    LEVEL = partial: two of five sources are un-capturable — WSJ is a
    767-byte paywall/JS-captcha interstitial (fresh 2026-07-11 curl =
    HTTP 401, same 767 B) and the FBI statement URL is a hard 404 "Page
    not found" (fresh 2026-07-11 curl = HTTP 404; web.archive.org 503 —
    link-rot). Several load-bearing facts rest on those un-captured
    sources (mirror-corroborated, not snapshot-verified): the specific
    carrier roster, the "CALEA"/lawful-intercept specifics, the
    campaign-staff detail, and the 200+/80 figure.

    [a] FACTS — corrections/strips:
    • FABRICATED PRECISION STRIPPED → both quantified_impact fields
      nulled: affected_users ">1,000,000 metadata" (no cited source
      gives any user/metadata figure — 0 hits across all five) and
      affected_carriers 8 (no source gives a US-carrier count; was also
      internally inconsistent with the 7-name prose).
    • CARRIER ROSTER (AT&T/Verizon/Lumen/T-Mobile + Charter-Spectrum/
      Consolidated/Windstream) is NOT in any captured snapshot — the
      only source that would carry it (WSJ) is a paywall interstitial;
      Treasury says only "multiple major U.S. telecommunication and
      internet service provider companies"; CISA/CRS name no US carrier.
      Retained as mirror-corroborated (press) with an explicit
      provenance caveat, not asserted as snapshot-carried.
    • CALEA/lawful-intercept softened from flat fact to CRS's hedge:
      "public reporting suggests that the hackers may have targeted the
      systems used to provide court-approved access to communication
      systems used for investigations by law enforcement and
      intelligence agencies" (CRS; no cited source uses the word
      "CALEA").
    • Presidential/political targeting softened to CRS wording — Salt
      Typhoon "being investigated for … targeting political figures"
      and PRC actors "may have sought access … to gain access to
      presidential candidate communications" (hedged). The "both 2024
      candidates / senior congressional members" specificity is press-
      only (WSJ uncaptured) and was generalised.
    • 200+/80 figure retained with caveat — it is NOT in the CISA raw
      (0 hits for "200"/"two hundred" companies or "80 countries") and
      the FBI page is a 404; mirror-corroborated only. This also
      corrects the FBI source record's prior claim that CISA
      corroborates the figure (it does not).
    • No fabricated malware/CVEs asserted by this event (TTP detail
      lives in the actor dossier).

    [b] ATTRIBUTION: source-faithful, no over-attribution. MSS placement
