id: 2024-09/salt-typhoon-us-telecom-compromise
name: Salt Typhoon US tier-1 telecom mass compromise (CALEA gateways)
start_date: 2021-01-01  # CISA AA25-239a: APT ops "since at least 2021" (IOCs Aug 2021-Jun 2025); Treasury: actor "active since at least 2019". No source supports the prior 2022 / "per FBI/CRS" (CRS gives no onset; FBI page is a 404).
disclosure_date: 2024-09-25  # WSJ published_on (body paywalled/uncaptured); consistent with CRS "In early October 2024, media outlets reported".
end_date: null  # ongoing exposure / eviction across carriers
incident_type:
  - intrusion
  - data-theft
  - pre-positioning
initial_vector: n-day  # edge-router / appliance N-day exploitation
outcome_summary: |
  Salt Typhoon (PRC state-sponsored; MSS operating-company tie
  per OFAC) compromised the network infrastructure of "multiple
  major U.S. telecommunication and internet service provider
  companies" (Treasury/OFAC wording — no captured source gives a
  count). Public reporting named the carriers as AT&T, Verizon,
  Lumen and T-Mobile, with Charter/Spectrum, Consolidated and
  Windstream reported later; that roster is carried by press
  (WSJ et al.), NOT by any captured snapshot (the WSJ page is a
  paywall interstitial). CRS states the hackers "may have targeted
  the systems used to provide court-approved access to
  communication systems" for law-enforcement/intelligence (the
  lawful-intercept / "CALEA" angle — hedged) and "may have sought
  access ... to presidential candidate communications", and that
  Salt Typhoon is "being investigated for ... targeting political
  figures". A separate FBI statement (Aug 2025) put the broader
  campaign at 200+ companies in 80 countries — mirror-corroborated
  only (the FBI page is a dead 404; the figure is absent from the
  CISA advisory snapshot).
quantified_impact:
  affected_carriers: null  # no captured source gives a US-carrier count; press named 4 core (AT&T/Verizon/Lumen/T-Mobile) + 3 later and cited "at least nine" telecoms — mirror-corroborated, not snapshot-carried
  affected_users: null  # prior ">1,000,000 metadata" was fabricated precision — no cited source quantifies users/metadata (0 hits); press described bulk metadata access
false_flag_risk: none
campaign_id: salt-typhoon-telecoms
summary: |
  The most consequential single PRC intelligence-collection
  operation against the US telecom sector on the public record.
  The doctrinally significant detail is the reported targeting of
  lawful-intercept ("CALEA") systems — court-authorized
  law-enforcement/intelligence wiretap infrastructure — though CRS
  frames this as what the hackers "may have targeted" per public
  reporting, not a confirmed finding (no cited source uses the word
  "CALEA"). Treasury/OFAC designated the operating company (Sichuan
  Juxinhe Network Technology Co.) on January 17, 2025 (separate
  event: 2025-01/treasury-salt-typhoon-sanctions).
