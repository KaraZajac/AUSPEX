  SentinelLABS (25 Feb 2025) documented a Ghostwriter (UNC1151 / UAC-0057) campaign — in preparation since July-August 2024, active phase November-December 2024 and continuing into early 2025 — deploying a simplified PicassoDownloader / PicassoLoader variant via malicious Excel macros against Belarusian opposition activists and Ukrainian military and government organizations, using lures on 'political prisoners,' an 'Anti-Corruption Initiative,' and 'Supplies for Ukraine Armed Forces.' SentinelLABS assesses Ghostwriter is closely tied to Belarusian government interests. Distinct from the 2023-07 Ghostwriter PicassoLoader corpus entry. Maps to by/concept-info-security-2019 / by/union-state-integration.
