qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-06-25
  level: full
  notes: |
    Audited vs the sole cited source, SentinelLABS "Ghostwriter | New Campaign Targets
    Ukrainian Government and Belarusian Opposition" (Tom Hegel) — raw captured + SHA-256
    hashed. FACTS confirmed: prep Jul-Aug 2024, active Nov-Dec 2024, continuing; simplified
    PicassoDownloader/PicassoLoader variant via malicious Excel VBA macros (ConfuserEx +
    Macropack, regsvr32/rundll32, .shop C2); all three named lures verbatim ("Political
    prisoners (across courts of Minsk)", Ukraine Gov "Anti-Corruption Initiative", "Supplies
    for Ukraine Armed Forces"); victims = Belarusian opposition activists + Ukrainian military
    and government. ATTRIBUTION: source attributes to Ghostwriter / UNC1151 (Mandiant) /
    UAC-0057 (CERT-UA), "closely linked"/"closely tied" with Belarusian-government espionage
    interests — named-actor level, Belarus-nexus, NOT named-unit. Source names NO KGB / no
    specific Belarusian service, consistent with the by/unscoped/ghostwriter demotion
    (2026-06-24). NB this SentinelOne source does NOT attribute to Russia/GRU (the RU/BY nation
    contest in the actor record stems from the German FFO + EU Council govt sources, not this
    one); "Russia" appears here only as Belarus's "closest ally." The single "medium confidence"
    in the source is the malware-cluster link to PicassoLoader, not the Belarus attribution.
    CORRECTIONS: (1) added attribution_level: named-actor (was absent); (2) attribution_date
    2024-11-01 -> 2025-02-25 (the attribution was made in the Feb-2025 publication, not at
    campaign start); (3) cleaned a stale "mapped from ICD link-confidence: attested" comment
    that contradicted the strongly_inferred doctrine links. (Source-record published_on also
    corrected 2024-11-01 -> 2025-02-25 in the same audit.) DOCTRINE LINKS unchanged: both
    correctly strongly_inferred with attesting_source_id null — the source describes targeting
    (opposition lures; Ukraine-AF lures) but does NOT explicitly state the strategic purpose at
    the doctrine-goal level (regime-stability / Union-State), so neither earns attested.
    actor_id resolves (atlas/actors/by/ghostwriter.yaml, id by/unscoped/ghostwriter), not stale.
