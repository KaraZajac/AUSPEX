id: 2024-11/storm-2372-teams-device-code-phishing
name: Storm-2372 Russia-aligned device-code phishing via Microsoft Teams (Aug 2024 onward)
start_date: 2024-08-01  # earliest observed per Microsoft
disclosure_date: 2025-02-13
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Microsoft disclosed an ongoing Russian-aligned device-code phishing
  campaign by the actor it tracks as Storm-2372, active since at
  least August 2024 against government, NGO, IT-services, defense,
  telecoms, healthcare, higher-education, and energy organisations
  across Europe, North America, Africa, and the Middle East.
  Operators used Microsoft Teams "chat" lures impersonating
  prominent individuals to socially engineer victims into
  authorising attacker-controlled OAuth device-code flows, granting
  persistent token-based access without harvesting passwords.
false_flag_risk: none
campaign_id: apt29-midnight-blizzard
summary: |
  Doctrinally novel as the first widely disclosed Russia-aligned
  campaign built around OAuth device-code social engineering at
  scale. The tradecraft bypasses password-based MFA entirely:
  the victim provides the attacker-controlled code in an
  authorised legitimate Microsoft flow, generating refresh tokens
  the attacker can use for sustained access. Pairs with the
  February 2024 Five Eyes SVR cloud-access advisory (AA24-057A)
  as the operational evolution: SVR moved from password-spray /
  service-account compromise toward consent-phishing and OAuth
  trust abuse.
attributions:
