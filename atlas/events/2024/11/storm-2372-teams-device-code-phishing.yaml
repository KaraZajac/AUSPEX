    attributing_org: Microsoft MSTIC
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-02-13
    attribution_source_id: microsoft/2025-02-13_storm-2372-device-code-phishing
    notes: |
      Microsoft attributes to "Russian-aligned" Storm-2372 without
      a confirmed SVR linkage in the public report; AUSPEX uses
      ru/svr/apt29 as the closest cluster on tradecraft and
      victimology grounds, with concur-with-caveat to flag the
      uncertain attribution.
