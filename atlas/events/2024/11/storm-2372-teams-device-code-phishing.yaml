id: 2024-11/storm-2372-teams-device-code-phishing
name: Storm-2372 Russia-aligned device-code phishing via Microsoft Teams (Aug 2024 onward)
start_date: 2024-08-01  # earliest observed per Microsoft
disclosure_date: 2025-02-13
end_date: null
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  Microsoft (MSTIC) disclosed an ongoing device-code phishing
  campaign by an emerging cluster it tracks as Storm-2372, assessed
  with moderate confidence to align with Russian interests,
  victimology, and tradecraft. Active since at least August 2024, it
  targeted government, NGO, IT-services/technology, defense,
  telecommunications, health, higher-education, and energy/oil-and-gas
  organisations across Europe, North America, Africa, and the Middle
  East. Operators built rapport by impersonating prominent
  individuals over third-party messaging services (WhatsApp, Signal,
  Microsoft Teams), then delivered Microsoft Teams meeting-invitation
  lures that tricked victims into entering an attacker-generated
  device code in the legitimate Microsoft sign-in flow — yielding
  access and refresh tokens for persistent, password-less access to
  mailboxes and cloud resources.
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence documented Storm-2372's abuse of the
  device code authentication flow (the OAuth 2.0 device-authorization
  grant) for social-engineering-driven account takeover. The victim
  is induced to enter an attacker-generated device code into a
  genuine Microsoft sign-in page; the actor captures the resulting
  access and refresh tokens and uses them for sustained, password-
  less access, evading password-based MFA because the sign-in itself
  is legitimate. Post-compromise, the actor moved laterally by
  sending device-code links from the victim's own account and used
  Microsoft Graph keyword search (for terms such as username,
  password, admin, teamviewer, anydesk, credentials, secret,
  ministry, and gov) to locate and exfiltrate email. A 14 Feb 2025
  update reported a shift to the Microsoft Authentication Broker
  client ID to register an actor-controlled device in Entra ID and
  obtain a Primary Refresh Token, using regionally-appropriate
  proxies to blend sign-in activity. Microsoft did not attribute
  Storm-2372 to a named Russian service — "Storm" is its temporary
  designation for an emerging cluster — and notes other actors (e.g.
  activity documented by Volexity) use the same device-code
  technique.
attributions:
  - actor_id: ru/svr/apt29
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: moderate
    attribution_level: nation
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-02-13
    attribution_source_id: microsoft/2025-02-13_storm-2372-device-code-phishing
    notes: |
      Nation-level attribution only. Microsoft assesses "with
      moderate confidence that Storm-2372 aligns with Russian
      interests, victimology, and tradecraft" and calls it "a
      suspected nation-state actor working toward Russian state
      interests"; "Storm" is Microsoft's temporary designation for
      an unknown / emerging cluster, held "until we reach high
      confidence about the origin or identity of the threat actor."
      The report never names APT29 / Midnight Blizzard / Cozy Bear,
      the SVR, or any Russian service (0 mentions). AUSPEX therefore
      records attribution_level: nation, moderate confidence,
      concur-with-caveat. actor_id ru/svr/apt29 is retained ONLY as a
      nearest-existing-cluster placeholder to keep the FK valid — it
      OVER-SCOPES the source. Correct fix (flagged for orchestrator):
      create a nation-level ru/unscoped/storm-2372 actor and re-point
      actor_id + attribution_source_id to it.
