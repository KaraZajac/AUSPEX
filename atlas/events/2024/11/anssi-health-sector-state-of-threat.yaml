id: 2024-11/anssi-health-sector-state-of-threat
name: ANSSI / CERT-FR publishes Health Sector state-of-the-threat report
start_date: 2019-01-01  # CHU de Rouen 2019 anchor for sustained pressure window
disclosure_date: 2024-11-07
end_date: 2024-11-07
incident_type:
  - documentary
  - ransomware
initial_vector: unknown
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-010 (7 November
  2024) on the state of the cyber threat against the French
  healthcare sector. Catalogs sustained ransomware pressure on
  French hospitals 2019-2024 (CHU de Rouen 2019, CH Dax 2021,
  CHSF Corbeil-Essonnes 2022, CHU Brest 2023, Hôpital Simone
  Veil Cannes 2024), enumerates adversary clusters affecting
  the sector (LockBit, BlackCat / ALPHV, FIN12-aligned brands),
  and frames ANSSI's defensive-coordination posture under LID
  for the French healthcare regulated-operator regime.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Sector-specific state-of-threat publication operationalizing
  the LID sovereign cyber-defense pillar's regulated-operator
  function (OIV / OSE healthcare scope) and the cert-fr-
  coordination function (threat-cluster naming). The CHU de
  Rouen 2019, CHSF 2022, and CHU Brest 2023 incidents the
  report references are the canonical French healthcare
  ransomware reference cases.
