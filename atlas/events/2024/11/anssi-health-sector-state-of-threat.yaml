  notes: |
    Audited vs ANSSI/CERT-FR CERTFR-2024-CTI-010 "Secteur de la santé — État
    de la menace informatique" (7 Nov 2024). RAW captured: landing HTML
    (sha256 66c24dde…c4c10c71, 16,472 B — metadata confirms Référence
    CERTFR-2024-CTI-010, titre "Secteur de la santé - État de la menace
    informatique", Date de la première/dernière version 7 novembre 2024) +
    the linked 45-page PDF /uploads/CERTFR-2024-CTI-010.pdf (raw_snapshot;
    sha256 b0296081…e46fff27, 733,570 B) — all facts verified against the PDF.
    [a] FACTS — FOUR FABRICATED HOSPITAL INCIDENTS STRIPPED (the load-bearing
    defect). The prior summary/outcome_summary claimed the report catalogs
    "CHU de Rouen 2019, CH Dax 2021, CHSF Corbeil-Essonnes 2022, CHU Brest
    2023, Hôpital Simone Veil Cannes 2024". Against the RAW: "Rouen" = 0,
    "Dax" = 0, "Brest" = 0, "Cannes"/"Simone Veil" = 0 occurrences in the
    45-page PDF — all four FABRICATED, removed. The report's SOLE named French
    establishment is the Centre Hospitalier Sud-Francilien (Corbeil-Essonnes;
    "Corbeil"/"CHSF" = 6/1 hits): "Dans la nuit du 20 au 21 août 2022, le
    CENTRE HOSPITALIER SUD FRANCILIEN … a été compromis au moyen du
    rançongiciel Lockbit 3.0, opéré par le groupe cybercriminel Lockbit … Les
    attaquants ont exigé une rançon de dix millions de dollars"; 11 GB
    exfiltrated and leaked 23 Sep 2022; total cost "7 millions d'euros" [23].
    outcome_summary rewritten to what the report is: a state-of-threat report
    STRUCTURED BY FINALITY — §4 lucrative (the "principal" threat, ransomware +
    extortion), §5 espionnage ("dans une moindre mesure"), §6 déstabilisation
    (hacktivist). Body-named ransomware strains (verbatim): "Lockbit (dont
    Lockbit 3.0), NoEscape, Bitlocker, Bianlian, Phobos, Blackcat, Blackhunt,
    Wannacry, Scarab et ViceSociety … Les établissements de santé ne semblent
    ainsi pas ciblés par les opérateurs d'un rançongiciel en particulier."
    "FIN12" precised: 1 hit, bibliography only ([14] ANSSI FIN12 report 18 Sep
    2023) — cited from a body sentence about detection tools, NOT named as a
    health cluster (mirrors the panorama's bibliography-only APT28/Volt
    Typhoon). "Conti" = 0 true hits (the 11 raw substring hits are all
    "continuité/continu…"). Foreign illustrative cases (Fred Hutchinson Dec
    2023 / Hunters International; Ascension Health May 2024 / BlackBasta) noted
    as non-French context, not asserted as French. Espionage MOAs are real and
    hedged: Andariel, APT45, Diamond/Ruby Sleet (réputés nord-coréens), APT42
    (réputé iranien), APT29 (réputé SVR per NCSC-UK), China-associated 2020 —
    all "réputé"/"auraient".
    [b] ATTRIBUTION — attributions: [] KEPT (correct). Landscape/sector
    publication making no sovereign attribution act; every state-nexus
    reference is hedged ("MOA réputés associés à des États comme la Russie, la
    Chine, l'Iran ou la Corée du Nord", "auraient"). Mirrors the audited
    anssi-panorama / anssi-jop siblings.
    [c] DATES — corrected. start_date 2019-01-01 (comment "CHU de Rouen 2019
    anchor") was unfounded (Rouen 2019 not in the report) → set 2020-01-01,
    the report's own sustained-ransomware-pressure framing "Depuis 2020, le
    secteur de la santé a continué à être la cible d'attaques par
    rançongiciel". Core incident-statistics window is "entre janvier 2022 et
    décembre 2023" (Fig. 1). disclosure_date/end_date 2024-11-07 KEPT (landing
    metadata "Date de la première version 7 novembre 2024"; coverage extends
    to 2024 examples); id month 2024-11 matches.
    [d] DOCTRINE_LINKS — the known convention defect + one factual error,
    corrected. BOTH LID links: ADDED perspective: defender-response (French
    defensive doctrine on an ANSSI publication — the corpus convention, per the
    audited anssi-panorama / anssi-jop). Both already strongly_inferred
    (correct — 0 hits for "lutte informatique" / "lutte informatique
    défensive"; the 5 "LID" substring hits are false positives: Solidarité,
    consolider, solidifier, valider, validité). cert-fr-coordination:
    supported — CERTFR-CTI series, CERT-FR / CERT-SANTÉ incident signalling
    ("signalée au CERT-FR directement ou par l'intermédiaire du CERT-SANTÉ").
    sovereign-cyber-defense: FIXED a factual error — the prior reasoning /
    ruled_out claimed "the report does not name … OIV/OSE"; in fact OIV = 24,
    OSE = 16, SAIV = 1, NIS 2 = 2 hits, and §2.2 sets out the OIV/OSE/SAIV/NIS2
    regulatory framework — the pillar's substance IS named; what is absent is
    only the "LID" label / AUSPEX slug. Reasoning + inference_basis rewritten
    accordingly; held at strongly_inferred (defender-response links do not feed
    engine training). attesting_source_id retained as the primary supporting
    source per the strongly_inferred convention.
    [e] ATTRIBUTION_LEVEL — n/a (no attribution rows).
    [f] ACTOR_ID — n/a (no actor; documentary sector publication). No actor
    flags.
    Residual: targets [sectors/healthcare (fr, primary) + sectors/healthcare/
    hospital (fr, primary)] KEPT (both sector ids resolve) — unlike the
    broad-landscape panorama / zero-attack JOP forecast (targets []), this is a
    sector-specific retrospective whose sole subject is the French health
    sector and which documents a realized named victim (CHSF), so the
    healthcare sector rows are the report's actual scope, not sector inflation.
    incident_type [documentary, ransomware] KEPT (ransomware is the report's
    explicitly "principal" health-sector finality). Source record: added
