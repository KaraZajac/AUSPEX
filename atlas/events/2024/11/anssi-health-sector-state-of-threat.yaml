id: 2024-11/anssi-health-sector-state-of-threat
name: ANSSI / CERT-FR publishes Health Sector state-of-the-threat report
start_date: 2020-01-01  # report's own framing "Depuis 2020, le secteur de la santé a continué à être la cible d'attaques par rançongiciel" (§4); fabricated CHU-Rouen-2019 anchor removed (0 hits in the report)
disclosure_date: 2024-11-07
end_date: 2024-11-07
incident_type:
  - documentary
  - ransomware
initial_vector: unknown
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-010 (7 November
  2024), "Secteur de la santé — État de la menace informatique"
  — a 45-page TLP:CLEAR state-of-the-threat report on the French
  healthcare sector, structured by attacker finality. (§4)
  Lucrative is the principal threat: ransomware and
  data-extortion against health entities since 2020, illustrated
  by the report's single named French case, the Centre
  Hospitalier Sud-Francilien (Corbeil-Essonnes) — compromised
  the night of 20-21 August 2022 via LockBit 3.0 (RaaS), $10M
  ransom demand, 11 GB of health/personal data exfiltrated and
  leaked 23 September 2022, ~EUR 7M total cost. Ransomware
  strains observed against the sector (body) include LockBit
  (incl. 3.0), NoEscape, BitLocker, BianLian, Phobos, BlackCat,
  BlackHunt, WannaCry, Scarab and ViceSociety, ANSSI noting no
  single operator dominates. (§5) Espionage — "dans une moindre
  mesure" — via state-associated modes opératoires (MOA) réputés
  linked to Russia, China, Iran and North Korea (e.g. Andariel,
  APT45, APT42, APT29, Diamond/Ruby Sleet), notably COVID-19
  research targeting, all in a hedged register. (§6)
  Destabilization — hacktivist DDoS, defacement and hack-and-leak
  reacting to current events. The report's core incident
  statistics cover ANSSI signals "entre janvier 2022 et décembre
  2023"; it details CERT-FR / CERT-SANTÉ incident coordination
  and closes on ANSSI defensive recommendations. (ANSSI's own
  Sept-2023 FIN12 report is cited in the bibliography [14], not
  named as a health-sector cluster in the body; foreign cases —
  Fred Hutchinson 2023, Ascension Health 2024 — appear only as
  non-French illustrations.)
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Sector-specific state-of-threat publication operationalizing
  the LID sovereign-cyber-defense pillar's regulated-operator
  function — the report sets out the OIV / OSE / SAIV and NIS2
  regulatory framework for French health entities (§2.2) — and
  the CERT-FR-coordination function (CERT-FR / CERT-SANTÉ incident
  handling and ransomware-cluster naming). The single named
  French case is the Centre Hospitalier Sud-Francilien
  (Corbeil-Essonnes) LockBit 3.0 compromise of August 2022; other
  establishments are described in aggregate ("depuis 2020"), and
  the report's register for state-nexus espionage activity is
  deliberately hedged ("MOA réputés"), so AUSPEX records no
  attribution rows.
