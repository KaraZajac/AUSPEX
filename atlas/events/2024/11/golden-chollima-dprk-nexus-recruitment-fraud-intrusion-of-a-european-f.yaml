id: 2024-11/golden-chollima-dprk-nexus-recruitment-fraud-intrusion-of-a-european-f
name: "GOLDEN CHOLLIMA — DPRK-nexus recruitment-fraud intrusion of a European fintech, cloud pivot and cryptocurrency theft (late 2024)"
start_date: 2024-11-01
incident_type:
  - financial-theft
  - intrusion
  - data-theft
  - supply-chain
initial_vector: phishing
false_flag_risk: none
summary: |
  CrowdStrike Intelligence describes GOLDEN CHOLLIMA as a DPRK-nexus adversary, one of three distinct subgroups that evolved from LABYRINTH CHOLLIMA since 2018 and that focuses on consistent cryptocurrency theft to generate revenue for the regime. In late 2024 the group delivered malicious Python packages via recruitment fraud to a European fintech company, then pivoted into the victim's cloud environment to access IAM configurations and cloud resources, ultimately diverting the victim's cryptocurrency to adversary-controlled wallets. CrowdStrike notes GOLDEN CHOLLIMA targets economically developed regions with significant fintech presence, including the U.S., Canada, South Korea, India and Western Europe. The subgroup wields a specialized malware toolkit and shares certain tools (e.g., FudModule) and infrastructure with other CHOLLIMA units, indicating centralized DPRK coordination. The report does not name individual operators or a specific victim-country for the European fintech intrusion.
