outcome_summary: |
  US DOJ (USAO Western District of Washington) case 2:24CR-00180 LK
  charges Connor Riley Moucka (aka "judische", "catist", "waifu",
  "ellye18", "Alexander Antonin Moucka") and John Erin Binns (aka
  "irdev", "j_irdev1337") with "wire fraud, computer fraud,
  aggravated identity theft, and related conspiracies in connection
  with alleged schemes to hack into at least 10 victim organizations'
  protected computer networks, steal sensitive information, threaten
  to leak the stolen data unless the victim organizations paid
  ransoms, and sell the stolen data online." The defendants allegedly
  gained unlawful access to "billions of sensitive customer records"
  (call and text history, banking and other financial information,
  payroll, passport and Social Security numbers), "extorted millions
  of dollars from victim organizations", and advertised stolen data
  for sale on cybercrime forums. Per the WDWA case page: the
  indictment was filed and bench warrants issued Oct 10 2024; Moucka
  consented to surrender for extradition from Canada on Mar 21 2025
  and was arraigned in the Western District of Washington on Jul 3
  2025, pleading not guilty and stipulating to detention; the trial
  was continued to Oct 19 2026 (Judge Lauren King). Binns "is not
  presently in U.S. custody."
