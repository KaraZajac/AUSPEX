outcome_summary: |
  Connor Riley Moucka (Canadian national, online handle "Judische"
  / "Waifu") arrested in Kitchener, Ontario, Oct 30 2024 on a US
  warrant. 20-count US indictment unsealed Nov 4 2024 in the
  Western District of Washington charging conspiracy to commit
  computer fraud, wire fraud, and aggravated identity theft for
  the Snowflake-tenant data-theft campaign. Extradition
  proceedings pending. Co-conspirator John Erin Binns previously
  detained in Turkey pending US extradition.
