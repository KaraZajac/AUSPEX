summary: |
  Resolves the principal-operator attribution for the 2024 Snowflake
  customer-tenant mass-credential data-theft and extortion campaign.
  AUSPEX marks this as a canonical case of Anglophone-jurisdictional
  cybercrime enforcement — analogous to the Scattered Spider US
  indictments and Lapsus$ UK convictions in being addressable by
  conventional law enforcement and extradition, unlike Russia-tolerated
  ransomware actors. Modeled as a null-actor counter-action (meta /
  directionality model): the acting body is the US DOJ (USAO W.D.
  Washington); the criminal subjects are Connor Riley Moucka
  ("judische"/"waifu") and John Erin Binns ("irdev"), operators of the
  UNC5537 Snowflake-intrusion cluster (criminal/unc5537), with the
  ShinyHunters resale/extortion brand (criminal/shinyhunters)
  overlapping the same campaign. The cited WDWA case page carries the
  charges (hacking "at least 10 victim organizations", "billions of
  sensitive customer records", extortion of "millions of dollars") but
  does NOT itself name Snowflake or any victim org; the Snowflake
  identification and the wider ~165-organization campaign scope are
  carried by Mandiant and the sibling events (campaign_id
  shinyhunters-snowflake-cluster: 2024-06/snowflake-unc5537,
  2024-04/att-snowflake-shinyhunters, 2024-05/ticketmaster-shinyhunters-leak),
  not by this case page.
