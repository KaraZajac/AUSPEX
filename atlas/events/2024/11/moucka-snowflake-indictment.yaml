summary: |
  Resolves the principal-operator attribution for the 2024
  Snowflake-customer mass-credential campaign. AUSPEX flags as
  the canonical case of Anglophone-jurisdictional cybercrime
  enforcement closure on a major 2024 incident — analogous to
  Lapsus$ UK and Scattered Spider US in being addressable by
  conventional law enforcement, unlike Russian-tolerated
  ransomware actors.
