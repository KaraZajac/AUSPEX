id: 2024-11/ptitsyn-phobos-extradition
name: DOJ extradition and indictment of Phobos administrator Evgenii Ptitsyn
start_date: 2024-11-12
disclosure_date: 2024-11-12
end_date: 2024-11-12
incident_type:
  - documentary
initial_vector: n/a
outcome_summary: |
  US Department of Justice (Eastern District of Maryland)
  announced the extradition from South Korea of Russian
  national Evgenii Ptitsyn for alleged administration of the
  Phobos ransomware variant. The indictment charged Ptitsyn
  with wire fraud, computer-fraud conspiracy, and conspiracy
  to commit computer fraud and wire fraud. Phobos variants —
  including the 8Base, Eking, Eight, Elbie, Devos, and Faust
  brand-affiliate clusters — extorted more than 1,000 public
  and private entities globally with cumulative ransom receipts
  exceeding USD 16M. This is the first publicly announced
  extradition of a non-trivial Russian ransomware-administrator
  defendant to the US during the post-2022 sanctions period.
quantified_impact:
  victims: 1000
  cumulative_ransom_usd: 16000000
false_flag_risk: none
operators_named:
  - ptitsyn-evgenii  # Phobos administrator, DOJ Nov 2024 (extradited from S. Korea)
summary: |
  Important for AUSPEX criminal-baseline classification because
  Ptitsyn's extradition reinforces the AUSPEX practice of
  placing Phobos and 8Base under `criminal/` rather than
  `ru/proxies/` — Russian-state-tolerated operators are
  empirically not extradited to the US, and the successful
  Korean extradition is evidentiary against an FSB-tolerance
  hypothesis for the Phobos lineage.
