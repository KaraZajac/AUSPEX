incident_type:
  - law-enforcement
initial_vector: unknown
outcome_summary: |
  The US Department of Justice (District of Maryland) secured the
  extradition from South Korea of Russian national Evgenii Ptitsyn
  (42) and on 18 Nov 2024 unsealed a 13-count indictment charging
  wire fraud, wire-fraud conspiracy, conspiracy to commit computer
  fraud and abuse, and multiple counts of extortion and intentional
  damage to protected computers for his alleged administration of the
  Phobos ransomware. Ptitsyn made his initial US appearance in the
  District of Maryland on 4 Nov 2024. DOJ said Phobos and its
  affiliates — including the 8Base cluster — victimised more than
  1,000 public and private entities worldwide (schools, hospitals,
  government agencies, nonprofits, a federally recognized tribe, and
  large corporations) and extorted more than USD 16M in ransom
  payments.
