notes: |
  AUSPEX models this as a law-enforcement counter-action, not an attack
  (actor_id null; subject = the Phobos operation, conceptually
  criminal/phobos). Ptitsyn's successful extradition reinforces AUSPEX's
  placement of Phobos / 8Base under `criminal/` rather than `ru/proxies/`:
  Russian-state-tolerated operators are empirically not extradited to
  Western jurisdictions, so a Korea-then-US extradition is evidence
  against an FSB-tolerance hypothesis for the Phobos lineage. Notable as
  one of the few successful extraditions of a Russian ransomware
  administrator to the US in the post-2022 period (AUSPEX editorial
  observation; DOJ makes no "first" claim).
