summary: |
  Modeled as a law-enforcement counter-action, not an attack: the US
  DOJ's announcement of the extradition and indictment of Evgenii
  Ptitsyn, a Russian national alleged to have administered the Phobos
  ransomware. Per the counter-action convention the actor is nulled,
  the acting body (US DOJ) sits in attributing_org, and the subject
  described here is the Phobos ransomware operation (conceptually
  criminal/phobos — the administrator / RaaS layer above the 8Base and
  other affiliate clusters). Ptitsyn was arrested in and extradited
  from South Korea and made his initial appearance in the US District
  Court for the District of Maryland on 4 Nov 2024; DOJ unsealed a
  13-count indictment on 18 Nov 2024. DOJ assessed that Phobos and its
  affiliates victimised more than 1,000 public and private entities
  worldwide and extorted more than USD 16M in ransom payments.
