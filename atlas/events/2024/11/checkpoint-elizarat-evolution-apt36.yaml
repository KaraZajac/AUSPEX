    [a] FACTS. FABRICATED MALWARE NAME CORRECTED: "ApolloIOU" ->
    "ApoloStealer". The report names the stealer "ApoloStealer" (one
    'L'; 12 occurrences in body+IOC table): "introducing a new stealer
    payload called 'ApoloStealer'" / "an additional payload, which we
    named ApoloStealer." The name derives from the actor's "Apolo
    Jones" persona (Attribution: "all the samples presented here used
    the name Apolo Jones"; password "ApoloJones2024"; a function named
    "ApoloJones"). "ApolloIOU" appears NOWHERE in the source. (The
    report's Conclusion once writes "ApolloStealer" with two L's, but
    body + IOC table use the canonical "ApoloStealer.") name +
    outcome_summary corrected. Three ElizaRAT variants VERIFIED:
    "three distinct campaigns … a different variant of ElizaRAT"
    (Slack / Circle / Google Drive campaigns). Cloud-C2 VERIFIED:
    "systematic abuse of cloud-based services, including Telegram,
    Google Drive, and Slack, to facilitate command and control." SUMMARY
    CORRECTED: the prior claim "ElizaRAT is Check Point's OWN discovery"
    is FALSE — the report states ElizaRAT was "First publicly disclosed
    in September 2023"; Check Point's OWN new discovery/naming is
    ApoloStealer. "Oct/Nov-2024" -> "November 2024" (pub 2024-11-04).
    Dropped the unsourced "Russian/Chinese/North Korean SaaS-C2"
    cross-cluster comparison (AI-embellishment, not in source).

    [b] ATTRIBUTION. Check Point -> Transparent Tribe / APT36, high,
    concur: PRESERVED. Report attributes firmly — "ElizaRAT is a custom
    tool known to be employed exclusively by 'Transparent Tribe'" +
    "Apolo Jones" persona + overlapping email with a Linux-targeting
    cluster. PAKISTAN NEXUS HEDGE HELD: report says only "Pakistan-based
    threat actor" (vendor assessment); NO ISI / Inter-Services
    Intelligence / any Pakistani service named (word-boundary grep: 0
    hits) — actor correctly placed at pk/unscoped/transparent-tribe.

    [c] DATES. start_date 2024-04-01 (unsourced — nothing in the report
    points to April) -> 2024-01-01: report frames these as "campaigns of
    Transparent Tribe in India in 2024" occurring "at the end of 2023 and
    the beginning of 2024," Circle variant "Compiled in January 2024."
    end_date 2024-11-04 conflated activity-end with the disclosure date
    -> 2024-08-10: last source-dated activity is the Google Drive
    campaign lure referencing a note "dated 10 Aug 2024" (exercise
    Tarang Shakti-2024); campaign described as ongoing/"persistent" as of
    the Nov-4 disclosure. disclosure_date 2024-11-04 VERIFIED.

    [d] DOCTRINE_LINKS. pk/asymmetric-posture-india / military-collection
