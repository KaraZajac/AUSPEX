initial_vector: phishing
outcome_summary: |
  Check Point Research published a technical deep-dive on APT36 /
  Transparent Tribe's ElizaRAT implant family observed in 2024,
  documenting three ElizaRAT variants and the companion ApolloIOU
  stealer. The piece documented the cluster's adoption of
  legitimate cloud services (Google Drive, Telegram, Slack) as
  command-and-control and exfiltration channels — a meaningful
  tradecraft modernization for a cluster historically reliant on
  direct C2 infrastructure. Targets remained Indian government
  and defense entities; the cloud-C2 pivot complicates Indian
  enterprise-defender detection by hiding implant traffic inside
  trusted SaaS flows.
false_flag_risk: none
summary: |
  Most operationally significant Transparent Tribe tradecraft
  development of 2024: cloud-C2 adoption. The pattern mirrors a
  broader cluster-wide shift in espionage operators (Russian,
  Chinese, North Korean) toward SaaS-hidden C2 and is a
  meaningful Pakistani-cluster modernization data point.
  ElizaRAT is Check Point's OWN discovery in this Oct/Nov-2024
  report — NOT, as an earlier version of this record wrongly
  stated, a "BlackBerry June-2024 finding." The BlackBerry report
  (actually May-2024) documented Transparent Tribe's GLOBSHELL /
  PYSHELLFOX / Poseidon toolset and never mentions ElizaRAT.
