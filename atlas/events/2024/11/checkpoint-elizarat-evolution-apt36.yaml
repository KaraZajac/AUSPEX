id: 2024-11/checkpoint-elizarat-evolution-apt36
name: Check Point publishes ElizaRAT and ApoloStealer deep-dive for APT36
start_date: 2024-01-01
disclosure_date: 2024-11-04
end_date: 2024-08-10
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  Check Point Research published a technical deep-dive on APT36 /
  Transparent Tribe's ElizaRAT implant family observed in 2024,
  documenting three ElizaRAT variants (across the Slack, Circle,
  and Google Drive campaigns) and the companion ApoloStealer
  file-stealer. The piece documented the cluster's adoption of
  legitimate cloud services (Google Drive, Telegram, Slack) as
  command-and-control and exfiltration channels — a meaningful
  tradecraft modernization for a cluster historically reliant on
  direct C2 infrastructure. Targets remained Indian government
  and defense entities; the cloud-C2 pivot complicates Indian
  enterprise-defender detection by hiding implant traffic inside
  trusted SaaS flows.
false_flag_risk: none
summary: |
  Most operationally significant Transparent Tribe tradecraft
  development documented in 2024: systematic abuse of legitimate
  cloud services (Google Drive, Telegram, Slack) for C2 — a
  meaningful modernization for the Pakistani-aligned cluster.
  ElizaRAT itself is NOT a Check Point discovery: it was "first
  publicly disclosed in September 2023." This November-2024 Check
  Point report documents ElizaRAT's EVOLUTION across three 2024
  campaigns (Slack, Circle, Google Drive) and introduces the
  newly-named ApoloStealer file-stealer (Check Point's own
  naming, after the "Apolo Jones" operator persona reused in the
  samples). This record is NOT, as an earlier version wrongly
  stated, a "BlackBerry June-2024 finding": the BlackBerry report
  (May 2024) documented Transparent Tribe's GLOBSHELL /
  PYSHELLFOX / Poseidon toolset and never mentions ElizaRAT.
