id: 2024-11/liminal-panda-multi-year-china-nexus-espionage-against-global-telecom-
name: "LIMINAL PANDA — multi-year China-nexus espionage against global telecom networks (custom GSM/SIGTRAN tooling)"
start_date: 2024-11-19
incident_type:
  - espionage
