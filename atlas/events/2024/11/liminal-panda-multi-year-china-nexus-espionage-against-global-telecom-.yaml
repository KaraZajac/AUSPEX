summary: |
  CrowdStrike Intelligence details LIMINAL PANDA, a suspected China-nexus actor that has targeted telecommunications providers since at least 2020 using custom tooling (CordScan, PingPong, SIGTRANslator) plus public tools (TinyShell, Fast Reverse Proxy). The actor abuses interoperational trust between telecoms and weak/default SSH credentials on externally accessible infrastructure to compromise telecom servers and pivot into other providers. Observed targets are telecom networks in Southern Asia and Africa, with tooling oriented toward GSM/SIGTRAN protocols and retrieval of subscriber data, call metadata and SMS — consistent with SIGINT objectives. CrowdStrike assesses the China-nexus alignment with low confidence based on non-exclusive indicators including Pinyin strings (e.g., wuxianpinggu507) and targeting of Belt-and-Road-aligned nations.
