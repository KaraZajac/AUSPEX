id: 2024-11/mstic-cyberwarcon-2024-details-ruby-sleet-north-korea-aerospacesatelli
name: "MSTIC (CYBERWARCON 2024) details Ruby Sleet — North Korea aerospace/satellite espionage and VeraPort supply-chain compromise of a Korean construction firm"
start_date: 2024-11-22
incident_type:
  - espionage
  - supply-chain
  - intrusion
  - data-theft
initial_vector: supply-chain
false_flag_risk: none
summary: |
  At CYBERWARCON 2024, Microsoft (MSTIC) detailed Ruby Sleet, a North Korea-nexus threat actor it has tracked since 2020 that targets and has successfully compromised aerospace and defense-related organizations, including satellite and weapons-systems-related targets, primarily through increasingly sophisticated phishing. Microsoft observed Ruby Sleet conduct a supply-chain compromise in December 2023 by breaching a Korean construction company and replacing a legitimate version of the VeraPort software-management client with a backdoored version that communicated with Ruby Sleet infrastructure. The group also leveraged compromised legitimate code-signing certificates, backdoored VPN clients and modified software installers to deliver its implants. Microsoft presented Ruby Sleet as a distinct tracked actor within the North Korean threat landscape, separate from Sapphire Sleet; per Microsoft's own threat-actor naming schema it is also distinct from Kimsuky (Microsoft's Emerald Sleet) — Ruby Sleet's previous Microsoft name is CERIUM. The Ruby Sleet section names no specific malware families or individual operators, and Microsoft does not name a specific DPRK service (RGB/MSS) for the cluster.
