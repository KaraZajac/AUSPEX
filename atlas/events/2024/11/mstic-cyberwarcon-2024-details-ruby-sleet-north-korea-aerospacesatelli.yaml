  - intrusion
  - data-theft
initial_vector: supply-chain
false_flag_risk: none
summary: |
  At CYBERWARCON 2024, Microsoft (MSTIC) detailed Ruby Sleet, a North Korea-nexus threat actor it has tracked since 2020 that targets and has successfully compromised aerospace and defense-related organizations, including satellite and weapons-systems-related targets, primarily through increasingly sophisticated phishing. Microsoft observed Ruby Sleet conduct a supply-chain compromise in December 2023 by breaching a Korean construction company and replacing a legitimate version of the VeraPort software-management client with a backdoored version that communicated with Ruby Sleet infrastructure. The group also leveraged compromised legitimate code-signing certificates, backdoored VPN clients and modified software installers to deliver its implants. Microsoft presented Ruby Sleet as a distinct tracked actor within the North Korean threat landscape, separate from Sapphire Sleet. The Ruby Sleet section names no specific malware families or individual operators.
