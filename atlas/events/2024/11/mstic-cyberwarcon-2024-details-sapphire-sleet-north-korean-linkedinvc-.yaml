    ("North Korean threat actor that Microsoft tracks as Sapphire Sleet") — it never names the RGB
    (0 occurrences of "Reconnaissance"/"RGB") and never equates Sapphire Sleet with APT38/BlueNoroff;
    the kp/rgb/apt38 mapping is the actor record's alias table (Microsoft post-2023 taxonomy,
    equivalent — actor service-verified 2026-06-24), so ADDED attribution_level: nation and kept
    auspex_assessment: concur-with-caveat. CORRECTIONS: (1) re-pointed the doctrine link from
    kp/office-39-sanctions-evasion/laundering-network -> kp/8th-congress-defense-plan/revenue-aggregation
    — this op is crypto theft (upstream revenue generation, the actor's primary default alignment +
    corpus precedent for DPRK social-engineering crypto theft), NOT the laundering pipework Office 39's
    pillar encodes; (2) added attesting_source_id + inference_basis. Confidence kept strongly_inferred
    (not attested): the WMD-financing goal appears only as a generic class-level DPRK "focus area"
    ("fund the North Korea weapons programs"), not pinned to this activity, whose own section names no
    purpose. CAVEAT: targets[]=sectors/finance(primary) — Microsoft explicitly does NOT name an
    industry vertical ("multiple companies"/individual users); kept as the financial asset class
