    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Sapphire Sleet's VC- and recruiter-impersonation to deliver crypto-stealing malware is
      hard-currency revenue *generation* (>$10M stolen over six months from multiple companies),
      which fits the revenue-aggregation pillar's maximum-tempo crypto-theft channel — the actor's
      own primary default alignment. The Microsoft post states the strategic purpose only as a
      generic class-level focus area for DPRK actors ("Stealing money or cryptocurrency to help
      fund the North Korea weapons programs"), not pinned to this specific activity (whose own
      section names no purpose), so the WMD-financing goal is one strong reading rather than an
      op-specific attestation. Re-pointed 2026-06-25 from office-39/laundering-network: this op is
      theft (upstream revenue), not the laundering pipework (mixers/OTC off-ramps) that pillar encodes.
    attesting_source_id: microsoft/2024-11_mstic-cyberwarcon-2024-details-sapphire-
    inference_basis:
