summary: |
  At CYBERWARCON 2024 (22 November 2024), Microsoft Threat Intelligence detailed Sapphire Sleet, a North Korean threat actor that has conducted cryptocurrency-theft campaigns netting more than $10M over six months. Its primary social-engineering schemes are masquerading as a venture capitalist feigning interest in the target's company, and posing as a recruiter on LinkedIn who directs victims to download malware disguised as a skills assessment from attacker-controlled sites. The lures lead victims to run downloaders (.scpt files on Mac, .vbs files on Windows) that pull subsequent payloads. Microsoft did not specify particular industry verticals, naming individual users across organizations as the targets.
