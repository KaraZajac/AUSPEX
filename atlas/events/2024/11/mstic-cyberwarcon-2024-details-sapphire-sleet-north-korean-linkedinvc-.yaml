        - "Microsoft lists DPRK threat actors' focus areas as 'Stealing money or cryptocurrency to help fund the North Korea weapons programs' — the goal the revenue-aggregation pillar encodes, stated at the class level."
        - "Actor kp/rgb/apt38 is a financially-missioned DPRK crew whose primary default doctrine alignment is kp/8th-congress-defense-plan/revenue-aggregation."
      ruled_out: "kp/office-39-sanctions-evasion/laundering-network — that pillar covers converting stolen proceeds into procurement-usable currency (mixers, PRC OTC desks); this source documents the theft itself, with no laundering infrastructure named."
    contested: false
