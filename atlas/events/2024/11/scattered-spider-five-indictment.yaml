summary: |
  First major US criminal action against the Anglophone Scattered
  Spider cluster — distinct from the Russian-aligned ransomware
  ecosystem prosecutions in that all defendants are Western
  jurisdictional and extradition pathways are operative. AUSPEX
  marks this as the structural counterpart to Lapsus$ UK
  convictions: youth-led Western cybercrime addressable by
  conventional law-enforcement cooperation.
