outcome_summary: |
  US DOJ — the US Attorney's Office for the Central District of
  California (US Attorney Martin Estrada) with the FBI Los Angeles
  Field Office — unsealed charges against five defendants tied to
  the Scattered Spider / 0ktapus cluster. Ahmed Hossam Eldin
  Elbadawy (US, "AD"), Noah Michael Urban (US, "Sosa"/"Elijah"),
  Evans Onyeaka Osiebo (US) and Joel Martin Evans (US, "joeleoli")
  were charged by federal grand jury indictment with conspiracy to
  commit wire fraud, conspiracy, and aggravated identity theft;
  Tyler Robert Buchanan (UK, "Tylerb") was charged by a parallel
  criminal complaint carrying an additional wire fraud count. Per
  the DOJ, from September 2021 to April 2023 the group ran SMS-
  phishing campaigns — texts posing as the victim company or its
  IT/services supplier, linking to look-alike credential-harvesting
  sites — then used the stolen employee credentials to breach
  corporate systems and to pivot into individuals' cryptocurrency
  accounts and wallets. The DOJ national (OPA) announcement put the
  crypto theft at roughly USD 11M stolen from ~29 victims. Buchanan
  had been arrested in Spain in June 2024 and remained in custody
  there at the time of these charges.
