id: 2024-11/scattered-spider-five-indictment
name: DOJ unseals charges against five Scattered Spider operators
start_date: 2024-11-20
disclosure_date: 2024-11-20
end_date: 2024-11-20
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US DOJ unsealed indictments in the Eastern District of California
  charging Ahmed Hossam Eldin Elbadawy (US), Noah Michael Urban
  (US), Evans Onyeaka Osiebo (US), Joel Martin Evans (US), and
  Tyler Robert Buchanan (UK, in custody in Spain) for the
  Scattered Spider / 0ktapus campaign. Charges include wire fraud,
  aggravated identity theft, and conspiracy. Approximately
  USD 11M in cryptocurrency identified across operator wallets.
  Buchanan ("Tylerb") had been arrested in Spain June 2024 on a
  US warrant.
false_flag_risk: none
