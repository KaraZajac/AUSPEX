  notes: |
    Audited as a null-actor law-enforcement counter-action (DOJ charges
    five Scattered Spider / 0ktapus operators). The cited DOJ OPA
    national release was PURGED from live justice.gov (its /archives/opa/pr/
    URL now 404s, og:title "Page not found") and archive.org is blocked
    for the fetcher, so the authoritative primary was re-secured from the
    prosecuting office's live parallel release — USAO, Central District of
    California — which was snapshotted via the justice.gov Akamai
    Bot-Manager two-step bypass and added as source
    doj/2024-11-20_scattered-spider-five-indictment-cdca
    (raw sha256 97a3f201…2a5521a8, 104937 bytes, published 2024-11-20).
    Every retained claim is source-carried.

    [a] FACTS: Corrected against the live CDCA primary (verbatim). "Law
    enforcement today unsealed criminal charges against five defendants
    who allegedly targeted employees of companies nationwide with phishing
    text messages ... to hack into virtual currency accounts to steal
    millions of dollars in cryptocurrency." Five defendants + ages +
    locations + aliases confirmed (Elbadawy 23 "AD" TX; Urban 20
    "Sosa"/"Elijah" FL; Osiebo 20 TX; Evans 25 "joeleoli" NC; Buchanan
    22 UK). THREE corrections: (1) DISTRICT — event said "Eastern District
    of California"; the primary says the US Attorney for the "Central
    District of California" (Martin Estrada, FBI Los Angeles Field Office).
    Fixed. (2) CHARGING INSTRUMENT — the four US defendants were charged
    "by a federal grand jury indictment"; Buchanan was charged "by criminal
    complaint" (a parallel instrument, + an extra wire-fraud count), not
    "indictments charging [all five]." Fixed. (3) $11M FRAMING — event said
    "USD 11M in cryptocurrency identified across operator wallets"; the
    money was cryptocurrency STOLEN FROM victims, not wallet contents. The
    live CDCA release says only "millions of dollars"; the "$11 million ...
    from ~29 victims" specificity is from the OPA national version (now
    purged) and is quoted verbatim by The Record, The Hacker News,
    crypto.news and Help Net Security (Nov 2024). Re-worded to
    "~USD 11M stolen from ~29 victims," explicitly attributed to the OPA
    announcement. TTP: primary carries SMS-phishing → credential theft
    (incl. 2FA) → corporate breach → crypto-account/wallet theft over
    "September 2021 to April 2023"; note the charging release does NOT use
    "SIM-swap" (that TTP is on the actor record via CISA AA23-320A / Krebs)
    nor the name "Scattered Spider" (vendor/press). Editorial summary
    (Lapsus$ counterpart / youth-led Western cybercrime) left intact as
    AUSPEX framing.

    [b] ATTRIBUTION: Null-actor counter-action (actor was
    criminal/scattered-spider, correctly nulled per prior AUDIT-2026-05-29).
    attributing_org "DOJ + FBI" and attributing_org_confidence high match
    a formal charging action; auspex_assessment concur-with-caveat is
    honest (indictment/complaint = allegations, "presumed innocent" per the
    release). No over-attestation at the actor layer.

    [c] DATES: source published_on 2024-11-20 confirmed on the CDCA page
    (content="2024-11-20"; "Updated November 25, 2024"). Event
    start/disclosure/end all 2024-11-20 = the unsealing date (the sealed
    indictment was returned earlier, 2024-10-08, per press; the public
    disclosure is the modeled date). No conflation.

    [d] DOCTRINE_LINK: us/ncs-2023 / disrupt-dismantle DOWNGRADED
    attested → strongly_inferred. The attested test (quote a source
    sentence naming the strategic end) FAILS: the verified primary contains
    no "disrupt"/"dismantle"/"hold accountable" language; both official
    quotes (US Attorney Estrada: "We allege that this group of
    cybercriminals perpetrated a sophisticated scheme to steal intellectual
    property and proprietary information ..."; FBI AD Davis: "The defendants
    allegedly preyed on unsuspecting victims in this phishing scheme ...")
    describe the alleged CRIME, not the US enforcement goal. Added
    perspective: defender-response (this is the prosecutor's doctrine on a
    criminal actor's ops — the schema's exact example; without it a US
    doctrine on a null/criminal-actor event would wrongly feed engine
    training and trip doctrine-state-mismatch). inference_basis.signals +
    ruled_out added; attesting_source_id repointed to the live CDCA source
    as the primary supporting source.

    [e] ATTRIBUTION_LEVEL: added named-actor — DOJ/FBI reached named
    individuals (the most specific non-state rung); the "Scattered Spider"
    group label is vendor/press, not the charging release.

    [f] ACTOR_ID: null (counter-action). Former actor criminal/scattered-
    spider resolves (atlas/actors/criminal/scattered-spider.yaml) and is
    well-sourced (CISA AA23-320A, this DOJ action, FBI Tylerb-Spain-arrest);
    no actor-file issues. operators_named slugs are free strings (not FKs);
    Urban's alias comment corrected "King Bob"/"Sosa" → the DOJ's actual
    "Sosa"/"Elijah" (King Bob retained as the Krebs-reported handle).

    RESIDUAL: the "$11M / ~29 victims" figure and the "Scattered Spider"
    identification rest on the purged OPA release + tier-1 press + the
    actor record rather than on the snapshotted CDCA primary; both are
    robustly multi-source corroborated and provenance-tagged above.
