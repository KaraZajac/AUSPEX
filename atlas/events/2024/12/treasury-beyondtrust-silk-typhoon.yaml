id: 2024-12/treasury-beyondtrust-silk-typhoon
name: US Treasury BeyondTrust compromise (Silk Typhoon / APT27 cluster)
start_date: 2024-12-08  # Treasury notified by BeyondTrust; actual initial access earlier (BeyondTrust root-caused the API-key compromise on Dec 5 2024)
disclosure_date: 2024-12-30  # Treasury letter to Congress
end_date: 2024-12-30
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: valid-creds  # stolen BeyondTrust Remote Support SaaS API key; underlying flaws CVE-2024-12356 / CVE-2024-12686 were zero-days when exploited (third-party SaaS/supply-chain compromise)
outcome_summary: |
  A China state-sponsored actor abused a stolen BeyondTrust Remote
  Support SaaS API key (BeyondTrust root-caused the key compromise
  on Dec 5 2024; the underlying flaws CVE-2024-12356 /
  CVE-2024-12686 were zero-days when exploited) to override the
  service's security, remotely access Treasury Departmental Offices
  workstations, and take unclassified documents. Bloomberg reported
  the actor broke into no less than 400 Treasury workstations and
  stole over 3,000 files (policy/travel documents, org charts,
  sanctions and foreign-investment material, "Law Enforcement
  Sensitive" data), including at OFAC and the Office of the Treasury
  Secretary. Treasury's Dec 30 2024 letter attributed the intrusion
  to an unnamed China state-sponsored APT; Bloomberg/Microsoft
  subsequently identified "Silk Typhoon" (= Hafnium), and OFAC
  sanctioned Shanghai-based MSS-affiliated Yin Kecheng (Jan 17 2025)
  as a perpetrator.
quantified_impact:
  files_accessed: 3000        # Bloomberg: "over 3,000 files"
  workstations_accessed: 400  # Bloomberg: "no less than 400 computers" (corrects earlier ~100)
false_flag_risk: none
summary: |
  Espionage-only targeting of OFAC (which administers US sanctions)
  and the Office of the Treasury Secretary reads as counterintelligence
  on US sanctions decision-making — reporting states the hackers were
  "likely aiming to collect intelligence on what Chinese individuals
  and organizations the U.S. might consider sanctioning," weeks before
  Treasury's own Flax Typhoon (Integrity Tech, Jan 3 2025) and Salt
  Typhoon (Sichuan Juxinhe, Jan 17 2025) designations. The Silk Typhoon
  vs Hafnium vs APT27 cluster question is contested: Microsoft
  consolidated the actor as "Silk Typhoon (HAFNIUM)"; Mandiant said its
  UNC5221 cluster "likely overlaps with APT27 and Silk Typhoon" while
  cautioning it lacked independent evidence. AUSPEX records the
  attributions with their differing confidence and flags the cluster
  reconciliation as unresolved.
attributions:
  - actor_id: cn/mss/hafnium  # AUSPEX resolution of "China state-sponsored APT"; = Silk Typhoon / Hafnium
    attributing_org: US Treasury (2024-12-30 letter to Congress)
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2024-12-30
    attribution_source_id: thehackernews/2024-12-31_chinese-apt-beyondtrust-api-treasury
    notes: |
      Treasury's Dec 30 2024 letter attributed the intrusion at the
      NATION level only: "an unnamed state-sponsored Advanced Persistent
      Threat (APT) actor from China." The named-actor identity (Silk
      Typhoon) came later (Bloomberg, Jan 9 2025). actor_id is AUSPEX's
      resolution of that China-APT attribution to the later-named cluster.
  - actor_id: cn/mss/hafnium
    attributing_org: Bloomberg (via BleepingComputer)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2025-01-09
    attribution_source_id: bleepingcomputer/2025-01-09_treasury-hack-silk-typhoon
    notes: |
      "a Bloomberg report ... attributed the attack to the Silk Typhoon
      hacking group"; "Silk Typhoon (also known as Hafnium)." Microsoft
      (microsoft/2025-03-05) independently confirms the Silk Typhoon =
      HAFNIUM identity and the stolen-API-key / PAM tradecraft.
  - actor_id: cn/mss/hafnium
    attributing_org: US Treasury OFAC (2025-01-17 Yin Kecheng designation)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2025-01-17
    attribution_source_id: treasury/2025-01-17_salt-typhoon-sichuan-juxinhe
    notes: |
      OFAC designated Yin Kecheng — "affiliated with the People's Republic
      of China Ministry of State Security (MSS)" — as a perpetrator of the
      BeyondTrust / Treasury compromise (associated with Silk Typhoon).
      This is the MSS nexus for the individual; the release's own text
      names neither "APT27" nor "Silk Typhoon" (see the cn/mss/hafnium and
      cn/unscoped/apt27 actor-file audits).
  - actor_id: cn/unscoped/apt27
    attributing_org: Mandiant (via The Hacker News)
    attributing_org_confidence: low
    attribution_level: activity-cluster
    auspex_assessment: contested
    attribution_date: 2025-01-18
    attribution_source_id: thehackernews/2025-01-18_us-sanctions-sichuan-juxinhe-silk-typhoon
    notes: |
      CONTESTED cluster-overlap only: "Mandiant told The Hacker News that
      the cluster it tracks as UNC5221 likely overlaps with APT27 and Silk
      Typhoon, although it ... doesn't have 'independent evidence' on its
      own to confirm these connections." Whether Silk Typhoon = Hafnium =
      the APT27 cluster, or distinct MSS-ecosystem teams, is unresolved.
      Confidence low + contested to reflect Mandiant's explicit hedge. (The
      prior version cited the Jan-2025 OFAC release for this APT27 mapping,
      but that release contains zero occurrences of "APT27" — corrected.)
doctrine_links:
  - doctrine_id: cn/national-intelligence-law-2017
    pillar_id: null
    program_id: null
    confidence: strongly_inferred  # 'attested' requires attesting_source_id + a source stating the goal; sources name only the proximate (sanctions-intel) purpose
    reasoning: |
      Espionage-only targeting of OFAC (which administers US sanctions)
      and the Office of the Treasury Secretary is political/policy-
      intelligence collection on US sanctions decision-making — the
      collection-for-the-state mandate the 2017 National Intelligence Law
      codifies. No cited source names that statute, but reporting states
      the proximate purpose (sanctions-policy intelligence) and Microsoft
      frames Silk Typhoon collection as targeting US government policy.
    attesting_source_id: null
    inference_basis:
      signals:
        - "OFAC + Office of the Treasury Secretary targeted; espionage-only (no ransomware, no theft-for-profit)."
        - "BleepingComputer: the hackers were 'likely aiming to collect intelligence on what Chinese individuals and organizations the U.S. might consider sanctioning.'"
        - "Microsoft (2025-03-05): Silk Typhoon 'Data of interest overlaps with China-based interests, US government policy and administration.'"
      ruled_out: "Financially-motivated crime: no encryption, extortion, or monetization; access was used to exfiltrate policy / sanctions documents."
    contested: false
    analyst: claude
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/decision-maker-sigint
    program_id: null
    confidence: plausible  # downgraded 2026-07-05 from strongly_inferred: sources frame this as sanctions counterintelligence; nothing ties the op to Taiwan; >1 reading survives
    reasoning: |
      OFAC and the Treasury Secretary's office are US decision-maker
      targets on China policy, which the decision-maker-SIGINT pillar
      encodes. The link is only plausible: every cited source frames the
      operation as sanctions / economic-policy counterintelligence, none
      ties it to Taiwan-contingency preparation, so more than one strategic
      reading survives.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Sanctions / economic-policy counterintelligence: the reading the sources support, encoded by cn/national-intelligence-law-2017."
        - "Taiwan-contingency decision-maker SIGINT: knowing the US sanctions / coercion playbook aids Taiwan-scenario planning, but no cited source states this."
    contested: false
    analyst: claude
targets:
  - target_id: orgs/us-treasury
    role: primary
    country: us
    outcome: |
      Actor overrode the Remote Support service's security and remotely
      accessed Treasury Departmental Offices workstations, taking
      unclassified documents — reportedly 3,000+ files across no less than
      400 workstations (Bloomberg), including at OFAC (sanctions
      administration) and the Office of the Treasury Secretary. The
      compromised key was BeyondTrust's Remote Support SaaS API key, not
      Treasury's own credentials.
