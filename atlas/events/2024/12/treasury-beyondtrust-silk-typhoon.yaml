    attesting_source_id: null
    contested: false
    analyst: claude
  - doctrine_id: cn/taiwan-reunification
    pillar_id: cn/taiwan-reunification/decision-maker-sigint
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      OFAC and Treasury Secretary office are decision-maker
      targets on China-policy, which subsumes Taiwan-policy
