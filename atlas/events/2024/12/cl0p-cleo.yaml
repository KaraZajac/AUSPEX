  notes: |
    Phantom-triage + RE-SOURCE (badrabbit model) + full 6-point audit.
    The event cited only ONE source (Huntress). Huntress is REAL (not a
    phantom): curl HTTP 200, title "Cleo Software Actively Being Exploited
    in the Wild," snapshot sha 38b5f8a5…773a0e42 (396,334 B). But Huntress
    alone did NOT carry the "66 organizations" figure, the named victims,
    or the October-2024 start — so the event was re-sourced with five
    reachable primaries/secondaries (all snapshotted + hashed). No
    load-bearing source is un-snapshottable -> level FULL.

    [a] FACTS — all now source-carried. CVEs: CVE-2024-50623 (unrestricted
    file upload -> unauth RCE, Cleo advisory Oct 2024, 5.8.0.21 patch
    bypassable) + CVE-2024-55956 (assigned 13 Dec 2024, fix 5.8.0.24,
    Autorun-directory abuse) — Huntress (38b5f8a5…773a0e42; "Although Cleo
    published an update and advisory for CVE-2024-50623 —which allows
    unauthenticated remote code execution—Huntress security researchers
    have recreated the proof of concept and learned the patch does not
    mitigate the software flaw") + Rapid7 (93729071…1efb6ec0, 335,811 B;
    "CVE-2024-50623, a vulnerability disclosed in Cleo VLTrader, Cleo
    Harmony, and Cleo LexiCom in October 2024 … fixed in version 5.8.0.21 …
    but according to Huntress, 5.8.0.21 remained vulnerable" and "As of
    December 13, CVE-2024-55956 has been assigned to this issue"). Products
    Harmony/VLTrader/LexiCom ✓ (Huntress spells it "VLTransfer" once — the
    product is VLTrader). "Malichus" Java implant ✓ Huntress. The "66
    companies / 48 hours" leak-site extortion ✓ BleepingComputer
    (310ca670…924599b1, 88,550 B; "announced on its dark web portal that 66
    companies have 48 hours to respond to the demands"). ~59 named +
    disputes ✓ TechCrunch (ca7956f7…ba178e44, 239,890 B; "the Russia-linked
    Clop gang listed 59 organizations …," Hertz/Western Alliance/Arrow
