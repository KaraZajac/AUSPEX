outcome_summary: |
  Cl0p exploited two zero-days (CVE-2024-50623 unrestricted-file-
  upload bug, then bypass CVE-2024-55956) in Cleo Harmony,
  VLTrader, and LexiCom managed-file-transfer products. Mass-
  exploitation through Q4 2024 affected at least 66 organizations
  per Cl0p's leak-site postings. Notable victims: Hertz, Western
  Alliance Bank, Blue Yonder (supply-chain software whose own
  separate ransomware incident Nov 2024 hit Starbucks).
false_flag_risk: none
summary: |
  Third in Cl0p's MFT-zero-day mass-exploitation arc (GoAnywhere
  Q1 2023, MOVEit Q2 2023, Cleo Q4 2024). The pattern is the
  defining tradecraft signature of Cl0p / TA505 / FIN11 since
  2021 and persisted through OFAC sanctions / TOCRP rewards
  through the 2024 cycle.
