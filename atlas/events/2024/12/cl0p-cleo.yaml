id: 2024-12/cl0p-cleo
name: Cl0p Cleo Harmony / VLTrader / LexiCom zero-day mass exploitation
start_date: 2024-10-01
disclosure_date: 2024-12-09
end_date: 2025-01-31
incident_type:
  - data-theft
  - extortion
  - supply-chain
initial_vector: 0-day
outcome_summary: |
  Cl0p exploited two zero-days in Cleo's Harmony, VLTrader, and LexiCom
  managed-file-transfer products: CVE-2024-50623 (an unrestricted
  file-upload/download flaw enabling unauthenticated RCE, disclosed by
  Cleo in October 2024; the 5.8.0.21 patch proved bypassable) and
  CVE-2024-55956 (assigned 13 December 2024, patched in 5.8.0.24; abused
  the Autorun directory to run commands). Post-exploitation used the
  "Malichus" Java backdoor. Huntress publicly disclosed active
  mass-exploitation on 9 December 2024 (evidence of exploitation from at
  least 3 December), though the CVE-2024-50623 exploitation window ran
  earlier — Western Alliance Bank's data was exfiltrated 12–24 October
  2024. On 24 December 2024 Cl0p's leak site gave 66 companies a 48-hour
  ultimatum; by mid-January 2025 it had named ~59 organizations. Notable
  named organizations: Hertz, Western Alliance Bank, and Blue Yonder.
  Several initially disputed Cl0p's claims (Hertz, Western Alliance Bank,
  and Arrow Electronics reported "no evidence" in January 2025), but
  Western Alliance Bank later confirmed ~21,899 people's data stolen via
  the Cleo flaw and Hertz confirmed a Cleo-linked breach; Blue Yonder,
  which Cl0p also listed, had separately confirmed a November 2024
  ransomware attack.
false_flag_risk: none
summary: |
  Third in Cl0p's managed-file-transfer zero-day mass-exploitation arc
  (GoAnywhere Q1 2023 -> MOVEit Q2 2023 -> Cleo Q4 2024), the defining
  tradecraft of the Cl0p / TA505 / FIN11 cluster. Huntress identified the
  Cleo intruders as "the same group behind the MOVEit mass exploitation
  campaign in 2023, which hit hundreds of organizations globally," and
  Cl0p confirmed to BleepingComputer that it was responsible for
  exploiting CVE-2024-50623. Directionality is global — hundreds of
  organizations named on Cl0p's leak site, disproportionately North
  American. Cl0p is a Russian-speaking profit-criminal extortion crew
  (TechCrunch calls it "Russia-linked"), but AUSPEX keeps it in the
  stateless criminal/ namespace: no cited source documents a
  Russian-state nexus for the crew or this campaign (see criminal/clop).
