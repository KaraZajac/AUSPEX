      Iran known as the CyberAv3ngers" and assesses the platform "a
      cyberweapon used by a nation-state to attack civilian critical
      infrastructure." Confidence set moderate (not high): Claroty's own
      wording is hedged ("allegedly", "believed to be responsible").
      AUSPEX still concurs because the CyberAv3ngers persona publicly
      claimed the Orpak fuel-system attacks on its own Telegram channel
      (documented by Claroty) and OFAC (Feb 2024) sanctioned the IRGC
      officials behind the persona. attribution_level = named-actor:
