id: 2024-12/cyberav3ngers-iocontrol-disclosure
name: Claroty Team82 discloses CyberAv3ngers IOCONTROL custom OT/IoT malware
start_date: 2023-10-15  # AUDIT 2026-07-05: was 2024-06-01 (unsupported); Claroty dates the Orpak/Gasboy attack reports "mid-October 2023 to late January 2024"
disclosure_date: 2024-12-13
end_date: 2024-01-31  # AUDIT 2026-07-05: was 2024-12-13 (conflated w/ disclosure); source-bounded reported-wave end "late January 2024" (VirusTotal sample surfaced Sept 2024)
incident_type:
  - intrusion
  - cyber-physical  # AUDIT 2026-07-05: was "destructive" — source shows no wiping/destruction (0 hits destroy/wipe/sabotage); IOCONTROL is an OT/IoT device-manipulation cyberweapon (fuel pumps, PLCs, HMIs)
initial_vector: n-day  # default / weak credentials on internet-exposed devices
outcome_summary: |
  Claroty Team82 disclosed analysis of a custom Linux-based
  modular malware platform — IOCONTROL — recovered from an Orpak
  / Gasboy fuel-management-system compromise attributed to
  CyberAv3ngers (IRGC-CEC). The malware runs across a wide range
  of OT and IoT devices including IP cameras, routers, PLCs,
  HMIs, firewalls, and fuel pumps from D-Link, Hikvision, Red
  Lion, Orpak, Phoenix Contact, Teltonika, and Unitronics. The
  toolset uses MQTT as the C2 transport, disguising attacker
  traffic in legitimate-looking IoT telemetry. Affected scope
  spans several hundred Orpak (Israel) and Gasboy (US) fuel-
  management systems.
false_flag_risk: none
campaign_id: cyberav3ngers-water-utility-wave
summary: |
  Major escalation point in the CyberAv3ngers operational
  arc: from exploiting default / weak credentials on internet-
  exposed Unitronics PLCs (Aliquippa, 2023) to operating a
  bespoke, modular, cross-device OT/IoT malware platform
  (IOCONTROL) with dedicated MQTT command-and-control. Claroty
  assesses IOCONTROL as "a cyberweapon used by a nation-state to
  attack civilian critical infrastructure." Doctrinally
  continuous with the persona-laundering / civilian-CII-coercion
  pattern behind the cluster's earlier Unitronics operations,
  whose IRGC operators — the IRGC Cyber-Electronic Command
  (IRGC-CEC) — the US Treasury designated in February 2024; the
  custom cross-vendor tooling marks a substantial capability step
  up from the 2023 default-credential operations.
