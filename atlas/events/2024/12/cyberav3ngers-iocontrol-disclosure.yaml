    → 2024-01-31 (was conflated with the disclosure date; source-bounded
    reported-wave end "late January 2024"; the VirusTotal sample surfaced
    Sept 2024, C2 domain registered Nov 23 2023).

    [d] DOCTRINE_LINKS — persona-laundering DOWNGRADED attested →
