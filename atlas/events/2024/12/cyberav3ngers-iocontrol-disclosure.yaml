  notes: |
    Audited against the two cited sources, both snapshotted + hashed.
    Claroty (Team82) "Inside a New OT/IoT Cyberweapon: IOCONTROL"
    847f0554…d5df5e7e (148,882 bytes) — freshly captured, REAL article
    (not a phantom). Treasury OFAC jy2072 (attesting source of the ex-
    attested link) 579b0021…7b167554 (119,852 bytes) — hash re-verified.

    [a] FACTS — all event claims source-carried by Claroty (verbatim):
    "custom-built" "modular" "Linux-based" platform ("IOCONTROL malware is
    based on a generic OT/IoT malware framework for embedded Linux-based
    devices"); sample "extracted from a Gasboy fuel control system which
    has close ties with Orpak Systems"; device types "IP cameras, routers,
    PLCs, HMIs, firewalls, and … fuel pumps"; vendors "Baicells, D-Link,
    Hikvision, Red Lion, Orpak, Phoenix Contact, Teltonika, Unitronics"
    (event lists a subset — no fabrication); "IOCONTROL leverages the MQTT
    protocol … disguise traffic over MQTT to and from the attackers'
    command-and-control" (port 8883); scope "several hundred Israel-made
    Orpak Systems and U.S.-made Gasboy fuel management systems in Israel
    and the United States." CORRECTION: struck the summary clause "closes
    the gap … bespoke ICS malware historically seen only from Sandworm /
    Industroyer" — AI-embellishment; Claroty says NOTHING of Sandworm or
    Industroyer (0 hits each; also 0 for destroy/wipe/sabotage/escalation).
    incident_type "destructive" → "cyber-physical" (no destruction shown;
    OT/IoT device-manipulation weapon; siblings use disruption — Kara may
    normalize).

    [b] ATTRIBUTION — Claroty attributes to "a threat actor group linked
    to Iran known as the CyberAv3ngers" and assesses IOCONTROL "a cyber-
    weapon used by a nation-state to attack civilian critical infra-
    structure." Confidence high → MODERATE: Claroty's wording is hedged
    ("allegedly compromised", "believed to be responsible"). auspex_
    assessment kept concur (persona self-claimed the Orpak attacks on
    Telegram per Claroty; OFAC sanctioned the IRGC operators). Added
    attribution_level: named-actor (CyberAv3ngers group + Iran named;
    IRGC sub-org only relayed from Treasury).

    [c] DATES — Claroty published_on 2024-12-13 confirmed (= disclosure_
    date, kept). start_date 2024-06-01 → 2023-10-15 (unsupported; source:
    "reports about these attacks by CyberAv3ngers against Orpak devices
