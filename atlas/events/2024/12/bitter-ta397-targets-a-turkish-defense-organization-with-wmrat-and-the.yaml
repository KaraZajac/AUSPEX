summary: |
  Proofpoint's Threat Research team detailed a 18 November 2024 spearphishing campaign in which TA397 (Bitter) targeted a defense-sector organization in Turkey. The attack delivered a RAR archive containing a decoy PDF about World Bank public-infrastructure projects in Madagascar, a benign-looking LNK file, and a hidden NTFS alternate data stream; the LNK executed PowerShell from the ADS to create a scheduled task ('DsSvcCleanup') for command-and-control. TA397 operators then manually delivered the WmRAT and the newly discovered MiyaRAT C++ espionage RATs. Proofpoint noted RAR-based delivery and scheduled-task creation as staple TA397 tradecraft.
