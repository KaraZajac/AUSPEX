id: 2024-12/muddywater-defense-industrial-base-targeting
name: CISA and CrowdStrike document MuddyWater spear-phishing of US defense industrial base
start_date: 2024-08-01
disclosure_date: 2024-12-10
end_date: 2024-11-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  CISA and CrowdStrike (independently) published analyses of
  MuddyWater operations against US defense-industrial-base
  contractors and adjacent aerospace-supplier targets through
  autumn 2024. MuddyWater used the long-running PowGoop loader,
  the SnailResin backdoor, and legitimate remote-monitoring
  software (Atera RMM and N-able Take Control) for persistence
  — a tradecraft staple of the cluster. Lures themed on US
  defense-conference invitations and contractor-procurement
  communications.
false_flag_risk: none
summary: |
  Continuity case for MOIS cyber tasking against US defense
  industrial base. PowGoop and SnailResin remain the long-running
  MuddyWater Windows malware families. Tempo elevation in
  autumn 2024 aligns with the broader IRGC / MOIS cyber-tasking
  surge during the post-October-7 Israel-Hezbollah-Iran
  escalation cycle.
