  DELETE candidate. This event appears to be a synthetic conflation:
  it grafts SnailResin plus aerospace-supplier victimology from the
  UNC1549 / TA455 "Dream Job" campaign (IRGC — a different actor) onto
  MuddyWater (MOIS), attaches an invented pair of CISA + CrowdStrike
  December-2024 US-DIB products (neither locatable), and points at two
  target ids that do not exist in the registry. No genuine MuddyWater
  US-defense-industrial-base event in autumn 2024 could be
  substantiated; the truthful residue (MuddyWater active in H2-2024)
  is already covered by the BugSleep and MuddyViper events. Retained
  (not deleted) per protocol pending Kara's FK-propagation call.
