  notes: |
    DISPOSITION: UNSUPPORTABLE / fabricated-synthetic -> DELETE candidate
    (retained, not deleted; FK propagation is Kara's call). STEP-0 phantom
    triage: both cited sources carry url:null and self-admitted verification
    failures, so nothing was snapshottable -> level PARTIAL. This is NOT a
    RE-SOURCE case: no genuine "MuddyWater US-DIB, autumn 2024" event exists to
    re-point to, and inventing sourcing to keep it alive is disallowed.

    [a] FACTS — load-bearing claims are REFUTED, not merely unsourced:
      - "CISA and CrowdStrike (independently) published analyses ... against US
        DIB ... autumn 2024": neither product is locatable. The most recent
        canonical CISA MuddyWater advisory is AA22-055A (2022-02-24); no 2024-12
        AA-series MuddyWater DIB advisory exists in CISA's log (the cisa/
        2024-12-10 source record already self-admits this). CrowdStrike's Static
        Kitten adversary profile names targets only in "the Middle East,
        Eurasia, and Central Asia" (crowdstrike.com/en-us/adversaries/static-
        kitten/, fetched 2026-07-10) — no US-DIB, no 2024-12 report.
      - SnailResin backdoor: MISATTRIBUTED. SnailResin (loader for the
        SlugResin / BassBreaker backdoor) is a tool of UNC1549 / TA455 /
        "Screening Serpens", an IRGC-linked APT35 sub-cluster — NOT MOIS /
        MuddyWater. ClearSky (2024-11-13, via The Hacker News, fetched
        2026-07-10) verbatim: "TA455, also tracked by Google-owned Mandiant as
        UNC1549 and by PwC as Yellow Dev 13, is assessed to be a sub-cluster
        within APT35"; "Affiliated with Iran's Islamic Revolutionary Guard Corps
        (IRGC)"; the campaign is "targeting the aerospace industry" via fake
        "Dream Job" recruiter lures — neither MuddyWater nor MOIS is mentioned.
        Already captured by event 2026-05/screening-serpens-unc1549-iran-
        aerospace-defense-espionage (actor ir/unscoped/screening-serpens).
        STRIPPED from prose.
      - Aerospace-supplier victimology + "US defense-conference invitation" /
        "contractor-procurement" lures: borrowed from that same UNC1549
        aerospace "Dream Job" campaign; fabricated for MuddyWater. STRIPPED.
      - PowGoop loader: a genuine MuddyWater tool but a 2020-2022-era loader
        (Palo Alto Unit 42 2020-12; CISA AA22-055A 2022-02), anachronistic as
        "current" autumn-2024 tooling — by H2-2024 MuddyWater had moved to
        BugSleep (Check Point 2024) and MuddyViper (ESET). STRIPPED the
        "long-running MuddyWater Windows malware families" framing that paired
        it with SnailResin.
      - Atera RMM / N-able Take Control: Atera is genuine MuddyWater tradecraft
        (H1-2024 BugSleep-era campaigns vs Israel), but attaching it to a US-DIB
        campaign is unsupported. STRIPPED.
      GROUND TRUTH: genuine MuddyWater (MOIS) H2-2024 activity (BugSleep,
      MuddyViper) targeted Israel / Middle East / Europe — already captured by
      events 2024-07/muddywater-mois-deploys-the-new-bugsleep-backdoor-in-2024-
      phishing-cam and 2025-12/muddywater-muddyviper-israel. The only MuddyWater
      US-defense-adjacent activity on record is from 2026 (Dindoor backdoor),
      and even that hit the Israel operation of a defense/aerospace software
      supplier, not the US DIB. name / outcome_summary / summary rewritten to
      the truthful minimum.

    [b] ATTRIBUTION — both attributor claims are PHANTOM. MuddyWater==MOIS is
      genuinely established (CISA AA22-055A: MuddyWater "is conducting cyber
      espionage and other malicious cyber operations as part of Iran's Ministry
      of Intelligence and Security (MOIS)"), but neither CISA nor CrowdStrike is
      on record attributing THIS purported US-DIB event. Both attribution
      entries set to auspex_assessment: contested, attribution_level: null, with
      per-entry notes.

    [c] DATES — start_date 2024-08-01 / disclosure_date 2024-12-10 / end_date
      2024-11-30 are all unsourced (they date a non-existent CISA+CrowdStrike
      product). Left in place only to preserve the 2024/12 file bucket per the
      never-rename rule; annotated inline as unsourced. They carry no
      evidentiary weight and would be voided on deletion.

    [d] DOCTRINE_LINKS — both DISCOUNTED and marked contested: true; they were
      predicated on a US-DIB collection operation that is unsubstantiated.
      forward-defense held at plausible (not strongly_inferred) with
      inference_basis.signals (MuddyWater is a genuine MOIS espionage actor) +
      ruled_out (no established event for the doctrine to attach to);
      resistance-axis kept at plausible / contested, noting MuddyWater's real
      anti-Israel ops live on their own events. Perspective is attacker-
      rationale (Iran's own doctrine on its own operation) — unchanged.

    [e] ATTRIBUTION_LEVEL — added, set to null on both attributions: the phantom
      sources support no attribution linkage for this specific event (the
      named-actor MuddyWater identity is real, but the event it is being
      attached to is not).

    [f] ACTOR_ID — ir/mois/muddywater RESOLVES (id inside atlas/actors/ir/
      muddywater.yaml == ir/mois/muddywater); no actor edit needed. The actor
      file is CORRECT and unaffected — the defect is entirely at the event
