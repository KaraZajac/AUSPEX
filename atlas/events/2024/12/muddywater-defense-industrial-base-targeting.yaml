outcome_summary: |
  UNSUBSTANTIATED / DELETE candidate (see qc). No locatable source
  documents a MuddyWater campaign against the US defense industrial
  base in autumn 2024. The two originally-cited December-2024 "CISA"
  and "CrowdStrike Falcon OverWatch" products do not exist as
  recoverable publications — both source records carry url:null and
  self-admitted verification failures. The most recent canonical CISA
  MuddyWater advisory is AA22-055A (2022-02-24), and CrowdStrike's
  Static Kitten adversary profile names targets only in "the Middle
  East, Eurasia, and Central Asia," not the US DIB.

  The distinctive tradecraft/victimology previously asserted here is
  misattributed: the SnailResin backdoor and the aerospace-supplier
  victimology belong to a DIFFERENT Iranian actor — UNC1549 / TA455 /
  "Screening Serpens" (actor ir/unscoped/screening-serpens, an
  IRGC-linked APT35 sub-cluster), per ClearSky's November-2024
  "Iranian Dream Job" aerospace campaign, and are already captured by
  event 2026-05/screening-serpens-unc1549-iran-aerospace-defense-
  espionage. Genuine MuddyWater (MOIS) activity in H2-2024 (BugSleep,
  MuddyViper) targeted Israel / Middle East / Europe and is already
  captured by events 2024-07/muddywater-mois-deploys-the-new-bugsleep-
  backdoor-in-2024-phishing-cam and 2025-12/muddywater-muddyviper-
  israel. PowGoop is a genuine but 2020-2022-era MuddyWater loader,
  anachronistic as "current" autumn-2024 tooling.
false_flag_risk: none
