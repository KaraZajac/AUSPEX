      rule (generic-boilerplate WMD language does not clear the
      bar) and the sibling Jan-2025 two-national indictment audit
      (same boilerplate, kept strongly_inferred), this stays
      strongly_inferred, not attested. The it-worker revenue
      stream is doctrinally the plan's channel, so the
      revenue-aggregation reading has no serious competitor.
