initial_vector: insider
outcome_summary: |
  A federal grand jury in the Eastern District of Missouri
  (St. Louis) indicted 14 DPRK nationals (indictment returned
  11 Dec 2024, announced 12 Dec 2024) on long-running
  conspiracies to violate US sanctions and to commit wire
  fraud, money laundering, and identity theft in a fraudulent
  remote-IT-worker scheme. Using false, stolen, and borrowed
  identities to pose as US-based IT workers, they obtained
  jobs at numerous US companies and nonprofit organizations
  and generated at least $88 million over an approximately
  six-year conspiracy; some conspirators also stole
  proprietary source code and extorted employers. The two
  DPRK-controlled front companies the conspirators worked for
  — Yanbian Silverstar (in the PRC) and Volasys Silverstar
  (in Russia) — collectively employed at least 130 DPRK IT
  workers ("IT Warriors").
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Largest single batch of DPRK IT-worker defendants charged to
  date (14 nationals). Critical for AUSPEX because it names the
  DPRK-controlled front companies the scheme runs through —
  Yanbian Silverstar in the PRC and Volasys Silverstar in
  Russia (NOT both in the PRC) — the bureaucratic apparatus
  that makes the scheme operationally viable, and establishes
  the predicate for future front-company / facilitator
  sanctions.
