initial_vector: insider
outcome_summary: |
  DOJ unsealed indictments of 14 DPRK nationals for a
  multi-year fraudulent IT-worker scheme targeting US
  Fortune 500 companies and small/mid-sized US businesses.
  Names the Yanbian Silverstar Network and Volasys Silver
  Star front companies in the PRC as bureaucratic
  infrastructure routing wages and identities into the
  scheme.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  Largest single batch of DPRK IT-worker defendants charged
  to date. Critical for AUSPEX because it formally names the
  PRC-based front companies (Yanbian Silverstar, Volasys
  Silver Star) — the bureaucratic apparatus that makes the
  scheme operationally viable. Establishes the predicate for
  any future PRC-facilitator sanctions.
