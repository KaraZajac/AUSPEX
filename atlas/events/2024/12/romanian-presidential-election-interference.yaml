    since the challenge page is not the article). level=partial: the load-bearing
    primary is un-snapshottable and its exact declassified wording reaches us only
    via mirrors quoting it.

    Snapshots (raw in atlas/sources/raw/, gitignored):
    - rferl/2024-12-04_romania-aggressive-hybrid-russian-action — sha256 ff6df8ca…bab2ea19, 90,132 B.
    - bleepingcomputer/2024-12-05_romania-election-systems-85000-cyberattacks — sha256 210410ad…6e515f49, 103,386 B.
    - aljazeera/2024-12-06_romania-court-annuls-first-round — sha256 90ebd25c…419b3b32, 198,503 B.
    - ec-europa/2024-12-17_formal-proceedings-tiktok-election-dsa — sha256 c211e605…9205e7d5, 50,643 B (DG-CONNECT server-rendered mirror; the ec.europa.eu/presscorner copy is a JS shell curl cannot capture).

    [a] FACTS — all now source-carried. First round 24 Nov 2024 (EC press release
    "24 November"; Al Jazeera). >85,000 cyberattacks, 19–25 Nov, SQLi/XSS from
    devices in 33+ countries, election-website credentials (bec.ro/roaep.ro/
    registrulelectoral.ro) leaked on a cybercrime forum — BleepingComputer verbatim;
    RFE/RL corroborates "more than 85,000 cyberattacks". 100+ TikTok influencers /
    8M+ followers — BleepingComputer. TikTok + Telegram, "thousands of social media
    accounts" promoting Georgescu — Al Jazeera. Annulment 6 Dec 2024, final, rerun
    ordered — Al Jazeera. EU DSA proceedings 17 Dec 2024, recommender systems /
    "coordinated inauthentic manipulation", "foreign interference" — EC. STRIPPED
    unsourced embellishment: "most consequential Russia-assessed influence op in
    Europe since the 2016 US cycle" (editorial), and the claim that the EU DSA
    action "points Russia-ward" (FALSE — the EC names no state, only "foreign
    interference"). Softened "first annulment in EU history" → "unprecedented step"
    (no clean source for the superlative). Title "DDoS" → "election-system
    cyberattacks" (the 85k were SQLi/XSS + credential theft, not DDoS).

    [b] ATTRIBUTION — DE-ESCALATED to honest hedge. The disclosing government
    characterised the activity as "aggressive hybrid Russian action" (RFE/RL,
    Al Jazeera) = a NATION-level Russia assessment → attribution_level: nation
    (was unset). But the technical service withheld attribution: BleepingComputer
    verbatim "SRI does not attribute these attacks to a specific threat actor" /
    tradecraft "point[s] to a state actor"; SIE "stops short of definitive
    attribution to the Russian state." No named Russian service/unit/operator is
    evidenced; annulment/intel publicly contested (skeptical commentary exists).
    Kept actor_id: null (correct). Kept attributing_org_confidence: moderate.
    CHANGED auspex_assessment concur → concur-with-caveat (technical attribution
    withheld + contested). attribution_source_id kept = csat-ro (the attributor).

    [c] DATES — start_date 2024-09-01 kept (prep phase) with clarified comment;
    disclosure_date 2024-12-04 (declassification) ✓; end_date 2024-12-06
    (annulment) ✓. New source published_on set to each article's real date
    (2024-12-04 RFE/RL, -12-05 BleepingComputer, -12-06 Al Jazeera, -12-17 EC).

    [d] DOCTRINE_LINKS — DE-ESCALATED (anti-over-attribution). Two links
    strongly_inferred → plausible (info-security-2016/info-psychological-defense;
    nato-ultimatum-2021/nato-degradation): with the perpetrator unproven and SRI
    declining specific attribution, "one strategic reading with no serious
    competitor" fails, so plausible is the honest grade; added inference_basis.
    alternatives[] to both (were absent). DROPPED the third link
    fpc-2023/multipolar-near-abroad: it was self-described as "the weakest fit"
    and is a genuine MIS-FIT (the "near abroad" pillar denotes post-Soviet states;
    Romania is not one). Three stacked RU doctrine frames on a null-actor, hedged
    event read as embellishment. None attested → attesting_source_id null on both
    (correct; no attesting source needed). NB: null actor + RU doctrine will
    surface on verify_atlas.py doctrine-state-mismatch — expected review item,
    perspective is attacker-rationale (Russia = the assessed attacker).

    [e] ATTRIBUTION_LEVEL — added: nation (see [b]).

    [f] ACTOR_ID — null; nothing to resolve. No actor file touched.

    FK / conformance fixes: REMOVED dangling target orgs/romania-election-
    infrastructure (no registry file exists anywhere in atlas/targets/ — it was a
    hard dangling FK). Folded its annulment outcome onto the valid sector target
