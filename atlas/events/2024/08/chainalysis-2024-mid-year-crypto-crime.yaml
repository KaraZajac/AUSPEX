outcome_summary: |
  Chainalysis published its 2024 Mid-Year Crypto Crime
  Update documenting approximately USD 1.58B in
  cryptocurrency theft during H1 2024 — an 84.4%
  year-on-year increase. Half of the H1 total
  (approximately USD 800M) was attributed to DPRK clusters,
  led by the DMM Bitcoin (USD 305M, May) and WazirX
  (USD 235M, July) operations. The report frames 2024
  as on-track to match or exceed 2022's USD 1.7B annual
  record.
false_flag_risk: none
summary: |
  Mid-year 2024 quantification document. Establishes the
  H1 2024 tempo (USD ~800M from DPRK in six months)
  subsequently cited by FBI / DC3 / NPA in the December
  2024 DMM Bitcoin attribution and by the Treasury sb0416
  IT-worker designation. The H2 2024 tempo continued
  through smaller-scale operations (BtcTurk in June,
  Munchables in March), with the year-end Chainalysis
  total reaching approximately USD 1.34B in DPRK theft
  for 2024.
