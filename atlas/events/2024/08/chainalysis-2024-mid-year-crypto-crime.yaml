    not a phantom — HTTP 200 at the exact /blog/ article path; <title> "2024 Crypto Crime
    Mid-Year Update Part 1: Cybercrime Climbs"; JSON-LD datePublished 2024-08-15T13:00:02Z.
    This is a DOCUMENTARY/statistics meta-event; the numbers are the payload, so every figure
    was grep-verified against the raw HTML.
    [a] FACTS — CARRIED, verbatim: stolen funds "nearly doubling from $857M to $1.58B through
    the end of July"; "$1.58B … around 84.4% greater than the value stolen over the same
    period last year"; incidents "rising at just 2.76% YoY"; avg per event "increased by
    79.46%, rising from $5.9M … Jan–Jul 2023 to $10.6M … 2024"; "DMM, which lost $305M … which
    accounts for roughly 19% of hacked value in 2024, some 4500 BTC"; ransomware "$449.1M
    [Jun-2023] … $459.8M [Jun-2024]", "approximately 2%"; "largest single payment ever recorded
    at approximately $75M to … Dark Angels". MAJOR CORRECTIONS — claims NOT carried by this
    source, STRIPPED (all 0 raw-HTML hits): (1) "USD 800M attributed to DPRK / half of the
    total" — the source gives NO DPRK dollar total (no "$800"/"800 million"); (2) "WazirX (USD
    235M, July)" — WazirX/$235M appear NOWHERE (WazirX was 18 Jul 2024 but the report does not
    cite it); (3) "2022's USD 1.7B annual record" / "on track to match or exceed 2022" — no
    "1.7 billion" and no 2022 absolute figure in-source; (4) "year-end … ~USD 1.34B in DPRK
    theft for 2024" — anachronistic, that figure is from the Feb-2025 report, not this Aug-2024
