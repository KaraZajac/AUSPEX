outcome_summary: |
  Part 1 of Chainalysis's 2024 Crypto Crime Mid-Year
  Update (published 15 August 2024) reported that crypto
  stolen-funds inflows nearly doubled year-on-year, from
  USD 857M to USD 1.58B through the end of July 2024 —
  around 84.4% greater than the value stolen over the same
  period in 2023. The average value compromised per heist
  rose 79.46% (USD 5.9M to USD 10.6M) while the number of
  hacking incidents grew only 2.76% YoY, reflecting a shift
  back toward high-value centralized-exchange targets: the
  DMM exchange lost USD 305M (~4,500 BTC), roughly 19% of
  all value stolen in 2024. Ransomware inflows rose ~2%
  (USD 449.1M to USD 459.8M through June), including the
  largest single ransom payment ever recorded (~USD 75M, to
  the Dark Angels group). Chainalysis noted qualitatively
  that North Korea-linked hacking groups are "notoriously
  behind some of the largest heists" and that North
  Korea-linked IT workers are infiltrating crypto-related
  services via social engineering, citing a UN report that
  Western tech firms hired more than 4,000 North Koreans.
  The report gives no DPRK-specific dollar total and names
  no specific DPRK group.
false_flag_risk: none
summary: |
  Documentary / statistics meta-event: Part 1 of the
  Chainalysis 2024 Crypto Crime Mid-Year Update, a
  half-year quantification of on-chain crypto crime. It
  establishes the source-carried through-July-2024
  stolen-funds figure (USD 1.58B, +84.4% YoY) and the
  centralized-exchange-targeting shift (DMM, USD 305M). The
  DPRK relevance is qualitative only: Chainalysis states
  that North Korea-linked groups are behind some of the
  largest heists and that North Korea-linked IT workers are
  infiltrating crypto services. The headline aggregate is
  all-crypto, not DPRK-specific; per-incident and
  DPRK-attributed figures (e.g. the DMM Bitcoin heist) live
  in their own event entries with their own US-government /
  vendor sources.
