    forward-reference this source cannot carry. DATE: end_date 2024-06-30 → 2024-07-31 (source
    repeatedly says "through the end of July"); the "H1 2024 / DPRK tempo escalation" framing
    was dropped from name/prose as editorial. outcome_summary + summary rewritten to
