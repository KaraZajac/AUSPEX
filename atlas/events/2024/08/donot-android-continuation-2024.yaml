    attributing_org: CYFIRMA
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2025-01-17
    attribution_source_id: cyfirma/2025-01-17_donot-tanzeem-android
    notes: |
      CYFIRMA names "the notorious DONOT APT" as the operator and
      ties the mission to assisting India with strategic
      intelligence collection (named-actor + nation, no service/
      unit named). CYFIRMA is India-headquartered; the assessment
      is cluster-consistent with prior ESET / Morphisec / Amnesty
      reporting and does not develop independent service-level
      attribution — hence moderate / concur-with-caveat and the
      actor remains in/unscoped (no Indian service named).
