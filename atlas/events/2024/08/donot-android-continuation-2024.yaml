id: 2024-08/donot-android-continuation-2024
name: DoNot Team continued Android-tooling operations against South Asian civil society and diplomatic targets in 2024
start_date: 2024-01-01
disclosure_date: 2024-08-15
end_date: 2024-07-31
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  CYFIRMA and adjacent vendor reporting through mid-2024
  documented continued DoNot Team Android operations against
  South Asian civil society, journalist, and diplomatic targets,
  with continued WhatsApp social engineering as the canonical
  delivery vector and continued use of malware families
  consistent with the Innefu Labs-tied tooling Amnesty
  documented in 2021. Victim disclosures during 2024 included
  Kashmir-area activists, Pakistani diplomatic personnel, and
  Bangladeshi government targets.
false_flag_risk: none
summary: |
  Continuity event for DoNot Team's Android collection lane
  through 2024. The Kashmir-activist targeting slice is
  continuous with the AUSPEX-attested contractor-political-
  espionage pillar; the Pakistani and Bangladeshi diplomatic
  slices are continuous with the regional diplomatic-collection
  pillar. The persistence of the cluster's Innefu-tied Android
  capability through 2024 supports the editorial framing of
  the contractor-state handshake as durable rather than
  episodic.
