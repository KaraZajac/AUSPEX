id: 2024-08/donot-android-continuation-2024
name: DoNot Team "Tanzeem" Android spyware for Indian strategic intelligence collection (Oct-Dec 2024)
start_date: 2024-10-01
disclosure_date: 2025-01-17
end_date: 2024-12-31
incident_type:
  - intrusion
  - surveillance
  - data-theft
initial_vector: phishing
outcome_summary: |
  CYFIRMA documented continued DoNot Team (APT-C-35 / Origami
  Elephant) Android operations via a malicious app it calls
  "Tanzeem" / "Tanzeem Update" (Urdu for "organization"). Two
  near-identical samples were collected in October and December
  2024. The app masquerades as a chat application but ceases to
  function after the user grants permissions; it abuses Android
  accessibility services and requests dangerous permissions
  (READ_CALL_LOG, READ_CONTACTS, and others) to harvest call
  logs, contacts, SMS, location, files, and credentials and
  exfiltrate them over its C2 channel. CYFIRMA flagged a new
  tactic: misuse of the OneSignal push-notification library to
  deliver phishing links. CYFIRMA assessed the activity targets
  "specific individuals or groups both inside and outside the
  country" and "organizations and individuals across the South
  Asia region."
false_flag_risk: none
summary: |
  A 2024 datapoint for DoNot Team's Android collection lane.
  CYFIRMA frames the campaign as state-aligned intelligence
  gathering: the actor's efforts "extend beyond gathering
  intelligence on internal threats; they have also targeted
  various organizations in South Asia to assist India with
  strategic intelligence collection." The "Tanzeem" lure name is
  one Indian agencies and militant groups (e.g. Jaish-e-Mohammad,
  Lashkar) use, consistent with internal-security / counterterror
  intelligence targeting of individuals of interest. The campaign
  shows the cluster's continued investment in mobile spyware and
  an evolving delivery toolkit (OneSignal abuse) rather than any
  new attribution development.
attributions:
