summary: |
  Volexity disclosed that in mid-2023 StormBamboo (which Volexity equates with Evasive Panda, previously tracked as StormCloud) compromised an ISP and altered DNS responses for domains tied to insecure automatic software-update mechanisms, causing victim applications to install the MACMA (macOS) and POCOSTICK/MGBot implants; poisoned records resolved to an attacker-controlled host in Hong Kong.
