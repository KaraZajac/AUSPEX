id: 2024-08/stormbamboo-evasive-panda-daggerfly-compromises-an-isp-to-poison-softw
name: "StormBamboo (Evasive Panda / Daggerfly) compromises an ISP to poison software-update DNS and deploy MACMA / MGBot"
start_date: 2023-06-01   # AUDIT 2026-06-25: corrected disclosure->op-start. Volexity: "In mid-2023, Volexity detected and responded to multiple incidents"; 2024-08-02 was the publication date (now disclosure_date). Mid-year convention YYYY-06-01.
disclosure_date: 2024-08-02
incident_type:
  - supply-chain
  - intrusion
  - espionage
initial_vector: supply-chain
false_flag_risk: none
summary: |
  Volexity disclosed that in mid-2023 StormBamboo (which Volexity equates with Evasive Panda, previously tracked as StormCloud) compromised an ISP and altered DNS responses for domains tied to insecure automatic software-update mechanisms, causing victim applications to install the MACMA (macOS) and POCOSTICK/MGBot implants; poisoned records resolved to an attacker-controlled host in Hong Kong.
