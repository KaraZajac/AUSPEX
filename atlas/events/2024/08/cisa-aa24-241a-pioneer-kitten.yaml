id: 2024-08/cisa-aa24-241a-pioneer-kitten
name: CISA AA24-241A — Pioneer Kitten / Fox Kitten ransomware-affiliate broker
start_date: 2017-01-01  # underlying campaign onset
disclosure_date: 2024-08-28
end_date: 2024-08-28
incident_type:
  - intrusion
  - ransomware
initial_vector: n-day  # Citrix, Palo Alto, F5, Fortinet, Check Point edge-device exploitation
outcome_summary: |
  Joint CISA advisory attributed Pioneer Kitten / Fox Kitten to
  Iran-based actors operating as an initial-access broker
  selling or sharing access with ransomware affiliates
  (NoEscape, RansomHouse, ALPHV / BlackCat). Targets across
  US schools, healthcare, finance, local government, defense;
  also Israel, UAE, and Azerbaijan.
false_flag_risk: none
summary: |
  Formal attestation of the IAB / ransomware-affiliate broker
  function for Pioneer Kitten / Fox Kitten. AA24-241A documents
  the cluster's mass-exploitation toolkit: Citrix NetScaler
  (CVE-2019-19781, CVE-2023-3519, CVE-2023-4966), Palo Alto
  Networks PAN-OS GlobalProtect (CVE-2024-3400), Ivanti Pulse
  Secure (CVE-2024-21887 / CVE-2024-46805), F5 BIG-IP, Fortinet
  FortiOS (CVE-2018-13379), and Check Point Quantum (CVE-2024-
  24919) against internet-facing appliances; web shell deployment
  for persistence; abuse of valid credentials harvested from
  compromised appliances; the open-source Ligolo / Plink / Ngrok
  tunneling tools; Mimikatz credential dumping; lateral movement
  via RDP and PSExec; and bulk handoff of compromised access to
  the NoEscape, RansomHouse, and ALPHV / BlackCat affiliate
  programs for downstream encryption-and-extortion against US
  schools, healthcare, finance, local government, and defense
  contractors plus Israeli and Gulf victims.
