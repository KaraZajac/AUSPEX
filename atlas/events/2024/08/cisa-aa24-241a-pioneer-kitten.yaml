id: 2024-08/cisa-aa24-241a-pioneer-kitten
name: CISA AA24-241A — Pioneer Kitten / Fox Kitten ransomware-affiliate broker
start_date: 2017-01-01  # underlying campaign onset
disclosure_date: 2024-08-28
end_date: null  # ongoing per advisory — "since 2017 and as recently as August 2024"
incident_type:
  - intrusion
  - ransomware
  - espionage   # separate GOI-directed CNE strand (theft of sensitive technical data)
  - data-theft
initial_vector: n-day  # Citrix NetScaler, F5 BIG-IP, Ivanti/Pulse Secure, PAN-OS, Check Point edge-device exploitation
outcome_summary: |
  Joint FBI/CISA/DC3 advisory (AA24-241A) attributed the Pioneer
  Kitten / Fox Kitten cluster (self-monikers Br0k3r / xplfinder)
  to Iran-based actors the FBI assesses are "associated with the
  Government of Iran (GOI)." Since 2017 and as recently as August
  2024 they operated as an initial-access broker — selling or
  handing off access and collaborating with ransomware affiliates
  (NoEscape, RansomHouse, ALPHV / BlackCat) for a percentage of
  ransoms against US education, finance, healthcare, local-
  government, and defense-sector victims. The FBI assessed the
  group's ransomware activity is "likely not sanctioned by the
  GOI." Separately, the advisory describes GOI-directed computer
  network exploitation — theft of sensitive technical data from
  organizations consistent with Iranian state interests, including
  in Israel, Azerbaijan, and the UAE.
false_flag_risk: none
summary: |
  Joint FBI/CISA/DC3 advisory AA24-241A documenting the Pioneer
  Kitten / Fox Kitten (UNC757 / Parisite / RUBIDIUM / Lemon
  Sandstorm) initial-access-broker and ransomware-affiliate
  function. The advisory maps the cluster's edge-appliance
  exploitation toolkit: Citrix NetScaler (CVE-2019-19781,
  CVE-2023-3519), F5 BIG-IP (CVE-2022-1388), Ivanti / Pulse
  Secure VPNs (CVE-2024-21887), Palo Alto Networks PAN-OS
  GlobalProtect (CVE-2024-3400), and Check Point Security
  Gateways / Quantum (CVE-2024-24919) — targets enumerated via
  Shodan; web-shell persistence; capture and reuse of valid
  credentials from compromised appliances; and the open-source
  Ligolo, Plink, and Ngrok tunnelers. Access is then monetized:
  the actors collaborate directly with the NoEscape, RansomHouse,
  and ALPHV / BlackCat affiliate programs to enable encryption in
  exchange for a share of ransom payments against US schools,
  municipal governments, financial institutions, healthcare, and
  defense-sector networks. The FBI assesses the actors are
  associated with the Government of Iran (GOI) and — separately
  from the ransomware — conduct GOI-directed network exploitation
  to steal sensitive technical data from organizations in Israel,
  Azerbaijan, and the UAE, while judging the ransomware activity
  itself "likely not sanctioned by the GOI." The actors use the
  Iranian company name Danesh Novin Sahand (ID 14007585836)
  likely as a cover IT entity, and operate under the Br0k3r and
  xplfinder monikers.
attributions:
  - actor_id: ir/unscoped/pioneer-kitten
    attributing_org: US CISA + FBI + DC3
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-08-28
    attribution_source_id: cisa/2024-08-28_aa24-241a-pioneer-kitten
    notes: |
      AA24-241A names the group (Pioneer Kitten / Fox Kitten /
      UNC757 / Parisite / RUBIDIUM / Lemon Sandstorm; self-monikers
      Br0k3r, xplfinder) and attributes at STATE level: "The FBI
      further assesses these Iran-based cyber actors are associated
      with the Government of Iran (GOI)" and their activity "is
      consistent with a cyber actor with Iranian state-sponsorship."
      Named-actor + nation, NOT named-unit: the advisory never names
      the IRGC or any service ("IRGC"/"Revolutionary Guard" = 0 hits
      in the raw). The cover company Danesh Novin Sahand (ID
      14007585836) is tied to the group/GOI, not to a named service —
      so the actor stays ir/unscoped/pioneer-kitten.
doctrine_links:
  - doctrine_id: ir/sanctions-evasion
    pillar_id: ir/sanctions-evasion/ransomware-revenue
    program_id: null
    confidence: plausible
    reasoning: |
      The IAB-to-ransomware revenue model of an Iran-based,
      GOI-associated group fits the sanctions-evasion doctrine's
      ransomware-for-revenue pillar descriptively. But the label is
      only plausible, not attested: the cited advisory does not
      state a state sanctions-evasion purpose — it states the
      opposite for the revenue strand, assessing "the group's
      ransomware activities are likely not sanctioned by the GOI."
      More than one strategic reading survives (state-tolerated
      revenue for the resistance economy vs. private criminal profit
      the state does not direct).
    attesting_source_id: null
    counter_explanation: |
      AA24-241A: "the group's ransomware activities are likely not
      sanctioned by the GOI, as the actors have expressed concern
      for government monitoring of cryptocurrency movement" — the
      cited source de-links the ransomware revenue from state
      sanctions-evasion policy, so this cannot be attested.
    contested: false
    analyst: claude
    inference_basis:
      alternatives:
        - "State-tolerated revenue: Iran's Resistance-Economy doctrine tolerates/blurs contractor cybercrime for revenue (the ransomware-revenue pillar itself lists Pioneer Kitten), so the ransomware could serve broad sanctions-resilience even if not directly tasked."
        - "Private criminal profit: AA24-241A assesses the ransomware is 'likely not sanctioned by the GOI' and the actors fear government monitoring of their crypto — i.e. personal revenue the state neither directs nor evidently sanctions."
  - doctrine_id: ir/asymmetric-warfare
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      An Iranian state-sponsored group compromising adversary
      civilian and defense targets fits the shape of asymmetric,
      deniable cyber coercion. But the label is only plausible: the
      advisory frames the state-directed strand as espionage (theft
      of sensitive technical data), not CII harassment, and the
      civilian-sector hits (schools, healthcare, local government)
      come via financially-motivated ransomware the FBI judges
      "likely not sanctioned by the GOI" — so more than one reading
      survives and no source states an asymmetric-coercion goal.
    attesting_source_id: null
    counter_explanation: null
    contested: false
    analyst: claude
    inference_basis:
      alternatives:
        - "Asymmetric coercion: an Iranian state-sponsored actor hitting adversary civilian and defense networks fits the low-cost, deniable coercion pattern the doctrine encodes."
        - "State espionage / intelligence collection: AA24-241A frames the GOI-directed strand as 'theft of sensitive technical data' against Israel, Azerbaijan and the UAE — collection, not civilian-CII harassment."
        - "Financial crime: the US civilian-sector impact is a by-product of ransomware monetization the FBI assesses is 'likely not sanctioned by the GOI', not doctrinally-driven coercion."
