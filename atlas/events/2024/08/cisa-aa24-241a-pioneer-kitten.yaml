  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-05
  level: full
  notes: |
    Audited vs the sole cited source, FBI/CISA/DC3 joint advisory AA24-241A
    "Iran-Based Cyber Actors Enabling Ransomware Attacks on US Organizations"
    (cisa/2024-08-28_aa24-241a-pioneer-kitten; raw snapshot
    cisa__2024-08-28_aa24-241a-pioneer-kitten.html, sha256 66be1b47…5c3b90f9,
    104608 bytes — hash RE-VERIFIED against the committed value; a same-size
    live re-fetch 2026-07-05 differs only by a per-request dynamic token and
    carries identical substantive text).
    [a] FACTS — corrected. The advisory names EXACTLY six exploited-CVE strings:
    CVE-2019-19781 + CVE-2023-3519 (Citrix NetScaler), CVE-2022-1388 (F5 BIG-IP),
    CVE-2024-21887 (Ivanti/Pulse Secure), CVE-2024-3400 (PAN-OS GlobalProtect),
    CVE-2024-24919 (Check Point). STRIPPED as unsupported (0 hits in raw):
    CVE-2023-4966, CVE-2024-46805, CVE-2018-13379, "Fortinet FortiOS" (the only
    Forti string is an IOC domain fortigate.forticloud[.]online — actor infra, not
    an exploited appliance), "Mimikatz", and "RDP/PSExec lateral movement". ADDED
    the real F5 CVE-2022-1388, Shodan enumeration, Danesh Novin Sahand (ID
    14007585836) cover company, and the Br0k3r/xplfinder monikers. Ligolo/Plink/
    Ngrok, web-shells and valid-account reuse all verbatim-present; affiliates
    NoEscape/RansomHouse/ALPHV(aka BlackCat) present — "collaborating directly with
    ransomware affiliates ... in exchange for a percentage of the ransom payments."
    [b] ATTRIBUTION — added attribution_level: named-actor. STATE-level attribution:
    "The FBI further assesses these Iran-based cyber actors are associated with the
    Government of Iran (GOI)"; "consistent with a cyber actor with Iranian state-
    sponsorship." NOT named-unit: "IRGC"/"Revolutionary Guard" = 0 hits (confirmed
    in the committed snapshot AND the 2026-07-05 live page). Kept confidence high /
    auspex_assessment concur.
    [c] DATES — published_on 2024-08-28 ✓; start_date 2017-01-01 ✓ ("since 2017 and
    as recently as August 2024"). CHANGED end_date 2024-08-28 → null: activity is
    ongoing (scanning "As of July 2024"; intrusions "as recently as August 2024"),
    so the prior end_date conflated disclosure with op-end.
    [d] DOCTRINE — both links DOWNGRADED. ir/sanctions-evasion/ransomware-revenue
    attested → plausible: the source does NOT state a state sanctions-evasion
    purpose; it states the opposite — "the group's ransomware activities are likely
    not sanctioned by the GOI, as the actors have expressed concern for government
    monitoring of cryptocurrency movement." Removed attesting_source_id; added
    counter_explanation + inference_basis.alternatives. ir/asymmetric-warfare
    strongly_inferred → plausible: the GOI-directed strand is espionage ("theft of
    sensitive technical data"), not CII harassment, and the civilian hits ride
    financially-motivated, un-sanctioned ransomware — a serious competing reading
    survives. No attested link remains (advisory states only a generic "in support
    of the GOI", not a doctrinal goal at the attested bar).
    [e] ATTRIBUTION_LEVEL — set named-actor (see [b]).
    [f] ACTOR — actor_id ir/unscoped/pioneer-kitten resolves to
    atlas/actors/ir/pioneer-kitten.yaml (id ir/unscoped/pioneer-kitten). Placement
    CONFIRMED correct against the task's IRGC hypothesis: the cited advisory ties
    the group and the Danesh Novin Sahand cover company to the GOI (state), NOT the
    IRGC/a named service — keep ir/unscoped until a cited source names a service.
    TARGETS/DIRECTIONALITY — attacker Iran → victims: US education/finance/healthcare/
    local-government/defense (ransomware-IAB strand) + Israel, Azerbaijan, UAE
    defense/technical-data (GOI-directed espionage strand). Demoted academic/
    university→academic and defense/contractor→defense to match the advisory's
