initial_vector: unknown  # n/a — US attribution/indictment record, not a US intrusion
outcome_summary: |
  On 2024-08-19 ODNI, the FBI, and CISA issued a joint statement
  publicly attributing to Iran the influence operations and cyber
  operations targeting the 2024 US presidential campaigns, including
  the compromise of former President Trump's campaign — "which the IC
  attributes to Iran." The FBI, "as the lead for threat response,"
  committed to "investigate and gather information in order to pursue
  and disrupt the threat actors responsible." On 2024-09-27 DOJ
  unsealed an indictment charging three IRGC employees — Masoud
  Jalili, Seyyed Ali Aghamiri, and Yaser Balaghi — with the
  hack-and-leak conspiracy targeting the campaign. No US
  offensive/disruption cyber operation is described in either cited
  source; the sourced US response is public attribution + indictment
  (cost imposition). Same-day Treasury/State sanctions against the
  same actors are modeled separately in the policy-action
  us/2024-09-27_irgc-election-interference-sanctions.
false_flag_risk: none
summary: |
  US defensive election-security response to Iranian interference in
  the 2024 US election. Two SOURCED US cost-imposition actions: (1) the
  ODNI / FBI / CISA joint public attribution (2024-08-19) naming Iran
  for influence and cyber operations against the presidential
  campaigns, including the Trump-campaign compromise; and (2) the DOJ
  indictment (2024-09-27) of three IRGC employees (Jalili, Aghamiri,
  Balaghi) for the "hack-and-leak." The Iranian operation itself
  (Iran = actor) is modeled in the paired event
  2024-05/irgc-trio-trump-campaign-hack-leak, which shares these two
  source documents. Third consecutive US election-defense cycle in
  AUSPEX — sibling of the 2018 IRA disruption (ira-disruption) and the
  2022 midterm CYBERCOM operations (cybercom-2022-midterm-ops) — BUT,
  unlike those two, neither cited source here discloses a US
  CYBERCOM / CNMF operation: the sourced US response is public
  attribution + indictment, not a disruption op. Modeled documentary +
  law-enforcement (not the prior fabricated [disruption]).
