id: 2024-08/google-tag-apt42-tempo-surge
name: Google TAG documents APT42 phishing tempo surge against Israel and US
start_date: 2024-02-01
disclosure_date: 2024-08-14
end_date: 2024-07-31
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  Google Threat Analysis Group (TAG) published a summary of
  APT42 credential-phishing activity between February and late
  July 2024 (Google describes APT42 as an Iranian
  government-backed actor "associated with" the IRGC). Over the
  prior six months, the U.S. and Israel together accounted for
  roughly 60% of APT42's known geographic targeting. Targeting of
  Israeli users intensified in April 2024 against people
  connected to the Israeli military and defense sector, diplomats,
  academics, and NGOs; social-engineering personas included a
  journalist requesting comment on recent air strikes (used
  against former senior Israeli military officials and an
  aerospace executive) and — in multiple campaigns since April
  2024 — an impersonation of the Washington Institute for Near
  East Policy. In May–June 2024 APT42 also targeted the personal
  email accounts of roughly a dozen individuals affiliated with
  both the Biden and Trump presidential campaigns, including
  current and former U.S. government officials, and successfully
  accessed the Gmail account of a high-profile political
  consultant.
quantified_impact:
  us_election_affiliated_individuals_targeted: 12  # "roughly a dozen" Biden- and Trump-affiliated personal accounts (Google TAG)
  accounts_successfully_compromised: 1  # personal Gmail of "a high-profile political consultant" (Google TAG)
false_flag_risk: none
summary: |
  Vendor telemetry on APT42 (IRGC-associated) credential-phishing
  for the period that runs into the IRGC trio Trump-campaign
  hack-and-leak operation (separately attested). Google TAG
  characterizes the activity as a spike in Israeli targeting and a
  ~60% U.S.+Israel share of APT42's known targeting over the prior
  six months (it does not publish a numeric per-day campaign
  tempo). The Resistance-Axis anti-Israel-coercion pillar is
  evidenced by the Israeli-target concentration during the
  Israel-Iran / Israel-Hezbollah escalation; the
  post-Soleimani-retaliation electoral-discord pillar is evidenced
  by the bipartisan U.S. campaign-adjacent targeting (the parallel
  hack-and-leak is separately attested in the September 2024 DOJ
  indictment).
