id: 2024-08/google-tag-apt42-tempo-surge
name: Google TAG documents APT42 phishing tempo surge against Israel and US
start_date: 2024-02-01
disclosure_date: 2024-08-14
end_date: 2024-07-31
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Google Threat Analysis Group (TAG) published an APT42 (IRGC)
  campaign telemetry summary covering February through late July
  2024. APT42 phishing campaigns against Israeli users surged
  sharply during the period — peaking at approximately 45
  distinct phishing campaigns per day against Israeli targets in
  April 2024 — with social-engineering personas masquerading as
  journalists, conference organizers, and (after the April 2024
  Israeli strikes on Iran) as the Washington Institute for Near
  East Policy. Targets included Israeli diplomats, military
  officials, an aerospace executive, NGOs, and academics, plus
  US political-campaign-adjacent staff in both parties.
quantified_impact:
  peak_phishing_campaigns_per_day_il: 45
false_flag_risk: none
summary: |
  Quantified tempo data for the period that runs into the IRGC
  trio Trump-campaign hack-and-leak operation (separately
  attested). Google TAG's telemetry is one of the few vendor
  publications that releases numerical phishing-campaign tempo
  for an Iranian APT cluster, making it a load-bearing data
  point for evaluating doctrine-pillar activation tempo. The
  Resistance-Axis anti-Israel-coercion pillar lights up via
  Israeli-target volume; the post-Soleimani-retaliation
  electoral-discord pillar lights up via campaign-adjacent
  targeting (separately attested in the September 2024 DOJ
  indictment).
