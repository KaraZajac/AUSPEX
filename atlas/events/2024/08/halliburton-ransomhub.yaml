initial_vector: unknown
outcome_summary: |
  RansomHub-linked intrusion of Halliburton Co. — one of the
  largest US oilfield-services providers. Halliburton became aware
  on Aug 21 2024 that "an unauthorized third party gained access to
  certain of its systems," disclosing the incident in an initial
  Item 8.01 Form 8-K filed Aug 23 2024 (it proactively took certain
  systems offline and notified law enforcement). A Sep 3 2024 Item
  1.05 8-K confirmed the third party "accessed and exfiltrated
  information," causing "disruptions and limitation of access to
  portions of the Company's business applications supporting aspects
  of the Company's operations and corporate functions." The
  RansomHub attribution rests on a private ransom note seen by
  TechCrunch (Sep 3) claiming credit; as of that report RansomHub
  had NOT listed Halliburton on its dark-web leak site and no stolen
  data had been published. Halliburton's Q3 2024 10-Q (filed Nov 7)
  disclosed USD 35M of Q3 cyber-incident response/remediation
  expenses and stated the incident "has not had, and is not
  reasonably likely to have, a material impact."
quantified_impact:
  disclosed_impact_usd: 35000000
false_flag_risk: none
summary: |
  Notable for hitting energy-services critical infrastructure
  directly. RansomHub is a ransomware-as-a-service operation CISA
  AA24-242A describes as "formerly known as Cyclops and Knight,"
  which by 2024 had drawn "high-profile affiliates from other
  prominent variants such as LockBit and ALPHV" after the Feb 2024
  ALPHV exit-scam. That advisory does NOT name Halliburton (0
  mentions) and is retained here only as background for the
  cluster's typical affiliate tradecraft: initial access via
  phishing emails and n-day exploitation of internet-facing systems
  (CVEs in Citrix NetScaler, Fortinet FortiOS/FortiClientEMS, Apache
  ActiveMQ, Atlassian Confluence, and F5 BIG-IP); Cobalt Strike;
  account creation/re-enablement plus Mimikatz credential dumping
  for lateral movement; abuse of legitimate remote-management tools
  (AnyDesk, Atera); and data exfiltration via rclone and MEGA. The
  RansomHub encryptor derives from the Knight/Cyclops code lineage —
  NOT ALPHV/BlackCat; the ALPHV tie is affiliate migration, not
  shared code (corroborated by the AUSPEX actor record).
