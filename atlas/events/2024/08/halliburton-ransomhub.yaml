    [a] FACTS — 3 fabrications/embellishments STRIPPED. (1) "RansomHub claimed responsibility
    on its leak site Sep 2 with stolen data posted" — FALSE. TechCrunch verbatim: "TechCrunch
    has seen a copy of a ransom note ... The note says a ransomware gang known as RansomHub is
    taking credit," and "RansomHub's dark web leak site ... has not yet listed Halliburton as
    one of its victims." Self-claim was a PRIVATE ransom note, not a leak-site posting; NO data
    published; "refused to pay" unsupported ("refus" 0 hits — TechCrunch instead notes gangs
    publish "when negotiations fall through"). (2) "customer-billing operations" — unsupported;
    "billing" 0 hits across every cited source (the 10-Q's 2 "invoice" hits are generic
    receivables boilerplate). Replaced with the sourced language "business applications
    supporting aspects of the Company's operations and corporate functions" (Sept-3 8-K + 10-Q
    verbatim). (3) Summary TTPs: STRIPPED "Curve25519 / ChaCha20-based encryptor descended from
    the ALPHV / BlackCat code lineage" — CISA has 0 hits for Curve25519/ChaCha20/BlackCat and
    states RansomHub is "formerly known as Cyclops and Knight"; the lineage is Knight/Cyclops,
    ALPHV is affiliate migration only ("attracting high-profile affiliates from other prominent
    variants such as LockBit and ALPHV"). Corrected accordingly (aligns with the AUSPEX actor
    record: "Code-base overlap with Knight ransomware (formerly Cyclops)"). Also stripped "web
