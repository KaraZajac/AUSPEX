initial_vector: unknown
outcome_summary: |
  RansomHub affiliate intrusion of Halliburton Co. — one of the
  largest US oilfield-services providers. Halliburton disclosed
  the incident in an 8-K filing Aug 22 2024, reporting limitations
  to internal systems and customer-billing operations. RansomHub
  claimed responsibility on its leak site Sep 2 with stolen data
  posted. Halliburton disclosed USD ~35M of impact in subsequent
  Q3 2024 10-Q filing.
quantified_impact:
  disclosed_impact_usd: 35000000
false_flag_risk: none
summary: |
  Notable for hitting energy-services CII directly. RansomHub
  emerged in early 2024 as a Russian-tolerated successor to ALPHV;
  the Halliburton incident is the canonical RansomHub US-CII case
  before the brand's own abrupt disappearance in April 2025. CISA
  AA24-242A documents the affiliate tradecraft typical of the
  cluster: initial access via phishing or n-day exploitation of
  Citrix NetScaler, Fortinet FortiOS, FortiClient, F5 BIG-IP, and
  Confluence vulnerabilities; web shells on internet-facing
  servers; Cobalt Strike beacons; valid-credentials lateral
  movement; Mimikatz credential dumping; abuse of legitimate
  remote-management tools (AnyDesk, Atera, Splashtop); data
  exfiltration via rclone and MEGA; and a Curve25519 / ChaCha20-
  based encryptor descended from the ALPHV / BlackCat code lineage.
