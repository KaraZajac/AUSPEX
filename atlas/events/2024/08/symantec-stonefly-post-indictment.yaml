    on internet-facing servers" (0× "web shell"), "PowerShell-based
    reconnaissance" (0× "PowerShell"), and the "Maui ransomware
    deployment (healthcare/energy) vs. strategic-tech collection
    (defense/aerospace)" dichotomy (0× "Maui"; Symantec states ransomware
    was NOT successfully deployed and victims were "private companies …
    with no obvious intelligence value"). This is the same fabricated
