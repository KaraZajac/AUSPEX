    source record (matches); confirmed the real article (headline +
    "2 Oct 2024" byline + IOC table present), not a bot-wall. The second
    cited source, the DOJ Rim Jong Hyok indictment PR, is BOT-WALLED
    (justice.gov/archives returns a 2,588-byte Akamai "bm-verify" stub,
    HTTP 200, no article body) → NOT snapshotted; its content was
    mirror-corroborated (CyberScoop, The Record, AHA, and Symantec's own
    "Background" summary) → qc level: partial.

    [a] FACTS — STRIPPED fabricated tradecraft not carried by Symantec
    (0 raw occurrences of each, checked in cleaned text + raw HTML):
    "YamaBot Go-based backdoor" (0× "YamaBot"; the source's newly-seen
    backdoor is Nukebot, 4×), "3PROXY tunneling tool" (0×; the source's
