summary: |
  Important AUSPEX deterrence-baseline data point. Indictment-and-
  rewards-for-justice has not, to date, affected Andariel
  operational tempo. Symantec documents continued Andariel /
  Stonefly tradecraft in the post-indictment window: the
  Preft / Dtrack remote-access trojans, the YamaBot Go-based
  backdoor, the 3PROXY tunneling tool, web shells on internet-
  facing servers, credential dumping with Mimikatz, lateral
  movement on valid credentials, PowerShell-based reconnaissance,
  and either Maui ransomware deployment (against healthcare /
  energy) or longer-dwell strategic-tech collection (against
  defense / aerospace). The cluster's revenue→operations loop
  remains structurally resilient to US legal action so long as
  the laundering venues in PRC remain available.
