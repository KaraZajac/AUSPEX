    continued Andariel/Stonefly intrusions against three US organizations
    in August 2024 "a month after the indictment"; "financially
    motivated" (4×); ransomware not deployed; Backdoor.Preft "exclusively
    associated with the group"; Nukebot (leaked source); WDigest
