id: 2024-08/symantec-stonefly-post-indictment
name: Symantec documents Stonefly extortion post-indictment
start_date: 2024-08-01  # August 2024 attack window per Symantec ("intrusions ... in August")
disclosure_date: 2024-10-02  # Symantec / security.com blog publication date (byline "2 Oct 2024")
end_date: 2024-08-31  # August-2024 window per Symantec; exact dates not stated
incident_type:
  - intrusion
  - extortion
initial_vector: unknown  # Symantec does not state the initial-access vector for the August intrusions
outcome_summary: |
  Symantec / Broadcom Threat Hunter Team found evidence that the
  Andariel / Stonefly group mounted financially-motivated
  intrusions against three US organizations in August 2024 —
  roughly one month after the 25 July 2024 Rim Jong Hyok DOJ
  indictment. The attackers did not succeed in deploying
  ransomware on any of the affected networks; Symantec assessed
  the activity was likely financially motivated (all victims were
  private companies "with no obvious intelligence value").
  Deterrence-baseline data point: the indictment and $10M
  Rewards-for-Justice offer had not, as of this reporting, led to
  a cessation of Andariel / Stonefly activity.
false_flag_risk: none
campaign_id: andariel-rim-jong-hyok-cluster
operators_named:
  - rim-jong-hyok  # Andariel, DOJ Kansas Jul 2024 (Symantec's "Background" references the indictment)
summary: |
  Symantec / Broadcom documented continued Andariel / Stonefly
  operations in the weeks following the July 2024 Rim Jong Hyok
  DOJ indictment, characterising a recent shift by this normally
  espionage-focused RGB cluster into financially-motivated
  extortion. Symantec found intrusions against three US private
  companies in August 2024; ransomware was not successfully
  deployed. Named tradecraft (per Symantec): the custom
  Backdoor.Preft (aka Dtrack / Valefor) implant, "exclusively
  associated with the group"; the leaked-source Nukebot backdoor
  (not previously tied to Stonefly); a malicious batch file
  enabling WDigest plaintext-credential caching followed by
  credential dumping with a custom Mimikatz variant; two custom
  keyloggers; and a set of dual-use / open-source tooling —
  Sliver, Chisel, PuTTY / Plink, Megatools (Mega.nz exfiltration),
  Snap2HTML, and FastReverseProxy (FRP). AUSPEX retains this as a
  deterrence-baseline data point: US legal action (indictment +
  Rewards-for-Justice) had not, to date, halted Andariel tempo.
attributions:
  - actor_id: kp/rgb/andariel
    attributing_org: Symantec / Broadcom
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-10-02
    attribution_source_id: symantec/2024-08-30_stonefly-post-indictment
    notes: |
      Symantec attributes to the "Stonefly group (aka Andariel,
      APT45, Silent Chollima, Onyx Sleet)" with high confidence,
      resting on the custom Backdoor.Preft ("exclusively associated
      with the group") plus Microsoft-documented Stonefly IOCs
      (incl. a fake Tableau certificate). Named-actor: Symantec
      names the specific group and (in its "Background", relaying
      the DOJ indictment) states Stonefly is "linked to the North
      Korean military intelligence agency, the Reconnaissance
      General Bureau (RGB)", but its own cluster attribution is
      group-level.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      An OFAC-sanctioned, DOJ-indicted DPRK RGB cluster mounting
      financially-motivated extortion against US targets is the
      hard-currency-generation behaviour the 8th-Congress
      revenue-aggregation pillar specializes. The label is
      strongly_inferred, NOT attested: neither cited source states
      the TERMINAL WMD / ballistic-missile-financing goal. Symantec
      frames the August 2024 activity only as "financially
      motivated" against private companies "with no obvious
      intelligence value" (a proximate revenue purpose), and the
      July 2024 DOJ indictment it references states that the ransom
      proceeds were used "to fund additional computer intrusions
      into defense, technology, and government entities" — i.e.
      revenue funding further espionage (proximate), not the WMD /
      missile end-use. Per the doctrine's per-event attestation
      rule (corrected 2026-07-02) and the AUSPEX WHY-ladder, a
      proximate-goal source earns strongly_inferred. The terminal
      military / nuclear framing for Andariel lives in the companion
      CISA/FBI advisory AA24-207A, which this event does not cite.
    attesting_source_id: doj/2024-07-25_andariel-rim-jong-hyok-indictment
    inference_basis:
      signals:
        - "Actor identity: kp/rgb/andariel is an RGB military-intelligence cluster (OFAC-sanctioned 2019; DOJ-indicted Jul 2024), not a criminal-for-profit crew — its revenue operations serve the regime."
        - "Symantec verbatim: the August 2024 intrusions were 'financially motivated' against private US companies 'with no obvious intelligence value' — hard-currency generation, the core behaviour of the revenue-aggregation pillar."
        - "Timing: activity in August 2024, squarely within the 8th-Congress plan window (2021-2025)."
        - "DOJ indictment (referenced by Symantec): ransom proceeds were 'used to fund additional computer intrusions into defense, technology, and government entities' — a state-directed revenue-for-operations loop, not private enrichment."
      ruled_out: "Purely-criminal / self-enrichment extortion with no state-strategic purpose is ruled out: the operator is an RGB state cluster and the DOJ indictment frames the proceeds as funding further DPRK state cyber operations, not private gain. The competing terminal reading (revenue directly financing WMD / missiles) is not source-stated here, so the link is capped at strongly_inferred rather than attested."
