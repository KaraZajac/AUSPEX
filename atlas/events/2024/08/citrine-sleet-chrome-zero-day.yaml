outcome_summary: |
  Microsoft MSTIC disclosed Citrine Sleet exploitation of
  CVE-2024-7971, a V8 type-confusion zero-day in
  Chromium-based browsers, against cryptocurrency-sector
  employees. Exploit-chain: voyagorclub[.]space drive-by →
  V8 type-confusion RCE → Windows sandbox escape via
  CVE-2024-38106 → FudModule rootkit (admin-to-kernel,
  previously documented on Diamond Sleet, evidencing
  tooling-sharing across DPRK clusters). Pre-positioning
  for follow-on crypto theft.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Notable for the FudModule rootkit's cross-cluster reuse
  (Citrine Sleet + Diamond Sleet), suggesting either shared
  parent tooling within RGB or personnel migration. The
  Chromium-zero-day-plus-Windows-sandbox-escape chain is
  among the highest-tradecraft DPRK operations publicly
  documented to date.
