id: 2024-08/citrine-sleet-chrome-zero-day
name: Citrine Sleet Chromium V8 zero-day (CVE-2024-7971)
start_date: 2024-08-19  # earliest observed exploitation per MSTIC
disclosure_date: 2024-08-30
end_date: 2024-08-30
incident_type:
  - intrusion
initial_vector: 0-day
outcome_summary: |
  Microsoft MSTIC disclosed Citrine Sleet exploitation of
  CVE-2024-7971, a V8 type-confusion zero-day in
  Chromium-based browsers, against the cryptocurrency sector
  for financial gain. Exploit chain: voyagorclub[.]space
  browser-exploit domain → V8 type-confusion RCE in the
  sandboxed renderer → Windows kernel sandbox escape via
  CVE-2024-38106 → FudModule rootkit (admin-to-kernel,
  data-only/DKOM; also attributed to Diamond Sleet,
  evidencing shared FudModule tooling between the two DPRK
  actors). MSTIC observed no additional malware on target
  devices; AUSPEX reads the RCE-plus-rootkit as
  pre-positioning for follow-on cryptocurrency theft.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Microsoft MSTIC attributed exploitation of the Chromium V8
  type-confusion zero-day CVE-2024-7971 to a North Korean
  threat actor with high confidence, and to Citrine Sleet
  specifically with medium confidence. Notable for the
  FudModule rootkit's cross-actor reuse: the rootkit was also
  attributed to Diamond Sleet, and Microsoft — having
  previously identified shared infrastructure and tools
  between the two DPRK actors — assesses this as likely shared
  use of the FudModule malware between them. CVE-2024-7971 was
  the third V8 type-confusion vulnerability exploited and
  patched in 2024 (after CVE-2024-4947 and CVE-2024-5274).
attributions:
  - actor_id: kp/rgb/citrine-sleet
    attributing_org: Microsoft MSTIC
    attributing_org_confidence: moderate
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-08-30
    attribution_source_id: msft/2024-08-30_citrine-sleet-chrome-zero-day
    notes: |
      MSTIC splits its confidence: "high confidence that the
      observed exploitation of CVE-2024-7971 can be attributed to
      a North Korean threat actor" (nation), but attributes the
      activity "with medium confidence to Citrine Sleet" (the
      named actor). Because this row names the specific actor
      (kp/rgb/citrine-sleet), attributing_org_confidence tracks
      the medium/moderate Citrine-Sleet assessment, not the high
      nation-level one. attribution_level is named-unit: MSTIC
      names the unit — "Citrine Sleet ... has been attributed to
      Bureau 121 of North Korea's Reconnaissance General Bureau"
      (specificity is orthogonal to confidence per SCHEMA).
