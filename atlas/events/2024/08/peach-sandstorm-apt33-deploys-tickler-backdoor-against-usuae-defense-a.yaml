summary: |
  Microsoft MSTIC reported that between April and July 2024 the IRGC-attributed actor Peach Sandstorm (APT33 / Refined Kitten / Holmium) deployed a new custom multi-stage backdoor named Tickler against satellite, communications-equipment, oil-and-gas, and federal/state government organizations in the US and UAE. The actor abused fraudulent attacker-controlled Azure subscriptions for C2 and used password-spray plus LinkedIn social engineering and malicious Teams ZIP delivery for initial access. The inventory's APT33 entries are all 2012-2016 Shamoon/Operation-Cleaver era; this is a NEW 2024 APT33 intelligence-gathering operation.
