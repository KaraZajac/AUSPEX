  verified_on: 2026-06-25
  level: full
  notes: "Audited vs the MSTIC Tickler blog (raw HTML captured + SHA-256). FACTS all verbatim-confirmed: April-July 2024 op; Tickler 'custom multi-stage backdoor'; 'fraudulent, attacker-controlled Azure subscriptions' (Azure-for-Students tenants) for C2; victims satellite/communications-equipment/oil-and-gas/federal+state government in US and UAE; initial access password-spray + LinkedIn social engineering + malicious Teams ZIP ('Network Security.zip'). ATTRIBUTION (key finding, OPPOSITE of the audit hypothesis): this 2024 source DOES explicitly name the IRGC — 'Microsoft assesses that Peach Sandstorm operates on behalf of the Iranian Islamic Revolutionary Guard Corps (IRGC)' + 'Iranian state-sponsored threat actor' — so set attribution_level: named-unit at the source level. NOTE the actor record stays ir/irgc/apt33: its three cited sources (2017 FireEye 'Iranian government', 2023 MSTIC 'Iranian nation-state', CrowdStrike) name no unit, and this Tickler blog is not in that set; the unscoped slug is therefore still correct, but the actor file's demotion rationale ('NONE names the IRGC') should be qualified to 'none of the ACTOR'S CITED sources names the IRGC' since this corpus source does. Removed the misleading 'IRGC-attributed' framing in favor of quoting MSTIC; doctrine_link kept plausible (source names only generic 'Iranian state interests', not the forward-defense goal). published_on corrected 2024-08-01 -> 2024-08-28 on the source; attribution_date aligned to 2024-08-28. FK ir/irgc/apt33 + ir/forward-defense resolve."
