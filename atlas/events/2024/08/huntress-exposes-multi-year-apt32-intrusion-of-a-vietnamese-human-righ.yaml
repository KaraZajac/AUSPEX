  notes: "Audited vs the Huntress blog (raw captured, sha256 5a1e360c...). FACTS verified verbatim: 'an intrusion against a non-profit supporting Vietnamese human rights which has likely spanned the course of at least four years'; persistence first set up 'June of 2020' (Task File Creation Date 2020-06-04); TTPs — scheduled tasks masquerading as Adobe/Windows/Dropbox updaters, DLL side-loading (T1574.002), PNG steganography (logo.png/adobe.png loaders), Cobalt Strike (beacon, team server, malleable profiles, getsystem); COM-handler abuse present within the scheduled-task persistence. published_on 2024-08-28 confirmed (JSON-LD datePublished). ATTRIBUTION verified + correctly hedged: Huntress attributes ONLY via 'a number of overlaps with known techniques used by the threat actor APT32/OceanLotus, and a known target demographic which aligns with APT32/OceanLotus targets' and 'suspected' — it names NO Vietnamese service (no TC2 / Tổng cục II / Ministry of Public Security / A05 / military intelligence; no 'Vietnamese government' / nation-state language). attributing_org_confidence: moderate matches the overlap-based hedge; auspex_assessment concur-with-caveat retained. actor_id vn/unscoped/apt32 correct + current (de-provisionalized 2026-06-24; no service named in-source so unscoped, not vn/tc2). CORRECTIONS: (1) added attribution_level: named-actor (was absent) — Huntress names the group, no service (mirrors the sibling Elastic-APT32 event); (2) doctrine link kept at strongly_inferred (Huntress states no purpose; target + APT32 mission + doctrine-fit triangulate, industrial-collection ruled out) and added inference_basis{signals, ruled_out}; softened the reasoning's 'domestic' claim since the source does not pin the victim's location (inside-VN vs diaspora); (3) attributing_org 'huntress'->'Huntress'; (4) on the cited source, corrected the title from the copied event name to the real blog title 'APT Targeting Vietnamese Human Rights Defenders', refreshed the PROVISIONAL backfill header, and added raw_snapshot + content_sha256 (tier: secondary preserved). Note: domestic-targeting angle is plausible but the source neither confirms nor denies the victim's geography."
