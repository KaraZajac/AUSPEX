summary: |
  Huntress detailed an APT32/OceanLotus intrusion of a non-profit supporting Vietnamese human rights that persisted for at least four years (initial persistence to June 2020), using scheduled tasks masquerading as Adobe/Windows updaters, COM-object hijacking, DLL side-loading, PNG steganography and Cobalt Strike. Extends the inventory's documented APT32 transnational-repression / dissident-surveillance pattern into 2024.
