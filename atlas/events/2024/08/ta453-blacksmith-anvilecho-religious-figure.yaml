id: 2024-08/ta453-blacksmith-anvilecho-religious-figure
name: TA453 / Charming Kitten delivers BlackSmith / AnvilEcho via fake-podcast lure
start_date: 2024-07-22
disclosure_date: 2024-08-20  # AUDIT: was 2024-08-13; real byline/JSON-LD = 2024-08-20
end_date: null  # AUDIT: was 2024-08-13 (= disclosure, a conflation); source does not bound the op's end
incident_type:
  - intrusion
  - espionage  # AUDIT: was data-theft; Proofpoint frames as intelligence collection, delivery only "attempted", no confirmed exfiltration
initial_vector: phishing
outcome_summary: |
  Proofpoint disclosed (2024-08-20) a TA453 spear-phishing
  operation that began 22 July 2024 targeting a prominent Jewish
  religious figure. TA453 impersonated the Research Director of
  the Institute for the Study of War (ISW), invited the target
  onto a fake ISW podcast, and — after a benign trust-building
  exchange and a password-protected DocSend note linking the real
  ISW podcast — sent a Google-Drive ZIP ("Podcast Plan-2024.zip")
  containing a Windows shortcut (LNK). The chain attempted to
  deliver the C++ BlackSmith toolset, which loads the AnvilEcho
  PowerShell trojan (~2,200 lines, v3.2.3) — a single-script
  consolidation of TA453's previously modular backdoors
  (GorjolEcho/PowerStar, TAMECURL, MischiefTut, CharmPower).
  AnvilEcho performs WMI system reconnaissance, screenshots, audio
  capture, browser-info and keystroke collection, and file
  up/download, with AMSI/ETW and SSL-validation bypasses; its code
  indicates prior use of FTP and Dropbox for exfiltration.
  Proofpoint frames the toolkit as focused on intelligence
  collection and exfiltration.
false_flag_risk: none
summary: |
  Proofpoint attributes this campaign to TA453 operating "in
  support of the IRGC, specifically the IRGC Intelligence
  Organization (IRGC-IO)," and assesses TA453 "roughly equivalent
  to Mandiant's APT42 ... all of which can generally be considered
  Charming Kitten." Proofpoint states the effort "likely support[s]
  intelligence collection in support of Iranian government
  interests" — i.e. the source frames it as espionage, not an
  overt coercive or destructive operation. AUSPEX reads the
  persona-driven collection against a prominent Jewish religious/
  civil-society figure as fitting the cyber-deniable-retaliation
  diaspora/civil-society-targeting pillar (which explicitly brackets
  "APT35 / APT42 / APT39 operations"), with weaker, contested
  Resistance-Axis anti-Israel-coercion value during the Israel-Hamas
  conflict; both are AUSPEX inferences the source does not state.
  Tradecraft-side, AnvilEcho consolidates TA453's previously modular
  PowerShell scripts into a single ~2,200-line full-service trojan
  (v3.2.3); Proofpoint's stated significance is the streamlining,
  not a claim that it becomes the cluster's default backdoor.
