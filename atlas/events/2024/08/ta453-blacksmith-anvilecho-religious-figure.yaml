    attacker-rationale (default) — perspective correct. FLAG: the
    diaspora-targeting pillar is an imperfect fit — its summary is
    specifically about *Iranian diaspora* dissidents/journalists/
    activists, whereas this target is a Jewish religious figure lured
    via a US think-tank (ISW) persona; the op reads as think-tank/
    policy-community intelligence collection. Proofpoint explicitly
    describes IRGC-IO's standing intelligence mandate ("collects
    intelligence … in support of a variety of assigned
    responsibilities"), so ir/constitutional-irgc-role may be a
    cleaner PRIMARY doctrine — left for orchestrator/Kara (did not
