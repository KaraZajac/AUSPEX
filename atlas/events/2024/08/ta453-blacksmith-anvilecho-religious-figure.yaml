  notes: |
    Audited vs the RAW Proofpoint "Best Laid Plans: TA453 Targets
    Religious Figure with Fake Podcast Invite Delivering New
    BlackSmith Malware Toolset" (raw snapshot captured + hashed:
    proofpoint__2024-08_ta453-blacksmith-anvilecho.html, sha256
    7e516f4f…bb0809b, 140,439 bytes). Single-source event; source is
    reachable and is the real article (not a phantom).

    [a] FACTS — corrected to match the RAW. Op began "Starting 22
    July 2024" (start_date ✓). Lure = TA453 impersonating "the
    Research Director for the Institute for the Study of War (ISW)"
    with a fake ISW-podcast invite; trust-built via a benign email
    then a password-protected DocSend note linking the REAL ISW
    podcast; malware staged via a Google Drive ZIP "Podcast
    Plan-2024.zip" containing "Podcast Plan 2024.lnk" — ADDED the ISW
    impersonation + multi-stage flow (were absent). Chain "attempted
    to deliver" BlackSmith (C++ toolset; PDB E:\FinalStealer\
    blacksmith\) → AnvilEcho PowerShell trojan (~2200 lines, v3.2.3)
    — softened "delivered" → "attempted to deliver" (Proofpoint's
    own hedge; target's replies were "outside of Proofpoint
    visibility"). CORRECTED the predecessor list: RAW says AnvilEcho
    is "the successor of GorjolEcho/PowerStar, TAMECURL, MischiefTut,
    and CharmPower" — event had "(CharmPower, GorjolEcho, POWERSTAR,
    PowerLess)", i.e. it dropped TAMECURL+MischiefTut and mis-added
    PowerLess (RAW ties the *name* "BlackSmith" and a browser-stealer
    to the older POWERLESS module per Volexity, NOT the AnvilEcho
    lineage). Capabilities all source-carried (WMI recon, screenshot,
    Get-Sound audio, Get-WebInfo browser, klg, file up/download,
    AMSI+ETW bypass, TrustAllCerts SSL bypass; "Possible support for
    FTP and Dropbox" + "code suggesting … FTP and Dropbox … in the
    past" → softened to "code indicates prior use"). No fabricated
    capabilities found; the malware section is if anything richer
    than the event claimed. STRIPPED two AI-embellishments from the
    summary: "most significant TA453 implant evolution in several
    years" and "Proofpoint's framing suggests this becomes the
    cluster's default backdoor going forward" — the RAW makes neither
    claim (it says only that TA453 "streamlined its malware functions
    … into a full-service PowerShell trojan").

    [b] ATTRIBUTION — KEY CORRECTION. RAW Attribution section:
    "Proofpoint does continue to assess that TA453 operates in
    support of the IRGC, specifically the IRGC Intelligence
    Organization (IRGC-IO)" and "Proofpoint currently views TA453 as
    overlapping with Microsoft's Mint Sandstorm … and roughly
    equivalent to Mandiant's APT42 and PWC's Yellow Garuda, all of
    which can generally be considered Charming Kitten." The event had
    actor_id ir/irgc/apt35 (APT35 = IRGC). The corpus models the
    split as APT42 = IRGC-IO / APT35 = IRGC (see apt42.yaml alias
    note), and TA453 is an "overlapping" alias on BOTH actors — so
    the source's OWN words (IRGC-IO + "roughly equivalent to …
    APT42") select ir/irgc-io/apt42. RE-POINTED actor_id
    ir/irgc/apt35 → ir/irgc-io/apt42 (FK verified: ir/apt42.yaml id
    ir/irgc-io/apt42, service ir/irgc-io exists). Set
    attribution_level=named-unit (IRGC-IO named); kept
    attributing_org_confidence high (firm standing assessment) and
    auspex_assessment concur. Fixed attribution_date 2024-08-13 →
    2024-08-20.

    [c] DATES — the event/source were pinned to a WRONG 2024-08-13.
    RAW byline "August 20, 2024" and JSON-LD "datePublished":
    "2024-08-20T12:00:25Z". Fixed source published_on and event
    disclosure_date + attribution_date 08-13 → 08-20. end_date was
    08-13 (= disclosure, a conflation) → null (source gives no
    operation end). start_date 2024-07-22 confirmed by RAW.

    [d] DOCTRINE_LINKS — neither link is attested (correct): the RAW
    states an INTELLIGENCE-COLLECTION purpose, not the specific
    anti-Israel-coercion or diaspora-retaliation goal, so both stay
    below attested with attesting_source_id null. Kept link-1
    (cyber-deniable-retaliation/diaspora-targeting) strongly_inferred
    per task guidance and grounded it on the source-stated IRGC-IO
    collection purpose + persona tradecraft; ADDED inference_basis
    {signals[], ruled_out}. Rewrote link-2 (resistance-axis/
    anti-israel-coercion) reasoning (the RAW never mentions Israel/
    conflict/coercion) and kept it plausible with a counter_
