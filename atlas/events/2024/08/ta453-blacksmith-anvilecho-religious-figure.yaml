    [e] ATTRIBUTION_LEVEL — was missing; set named-unit (IRGC-IO is a
    named unit within the IRGC that Proofpoint names as sponsor).

    [f] ACTOR_ID — now ir/irgc-io/apt42 (resolves: atlas/actors/ir/
