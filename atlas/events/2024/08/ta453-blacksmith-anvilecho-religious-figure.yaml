id: 2024-08/ta453-blacksmith-anvilecho-religious-figure
name: TA453 / Charming Kitten delivers BlackSmith / AnvilEcho via fake-podcast lure
start_date: 2024-07-22
disclosure_date: 2024-08-13
end_date: 2024-08-13
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Proofpoint disclosed a TA453 (APT35 / Charming Kitten) spear-
  phishing operation from late July 2024 targeting a prominent
  Jewish religious figure with a fake podcast-invitation lure.
  The attack chain delivered the BlackSmith toolkit, which
  installs the AnvilEcho PowerShell trojan — a monolithic
  consolidation of TA453's previous modular implants
  (CharmPower, GorjolEcho, POWERSTAR, PowerLess) into a single
  script. Initial vector: Google-Drive-hosted ZIP containing a
  Windows shortcut (LNK) file. Capabilities include
  reconnaissance, screenshots, file download/upload via FTP and
  Dropbox.
false_flag_risk: none
summary: |
  Doctrinally important: targeting a prominent Jewish religious
  figure fits both the Resistance-Axis anti-Israel-coercion
  pillar (broadly defined to include diaspora civil-society
  leaders) and the cyber-deniable-retaliation diaspora-targeting
  pillar. Tradecraft-side, AnvilEcho's monolithic consolidation
  of multiple prior toolsets is the most significant TA453
  implant evolution in several years; Proofpoint's framing
  suggests this becomes the cluster's default backdoor going
  forward.
