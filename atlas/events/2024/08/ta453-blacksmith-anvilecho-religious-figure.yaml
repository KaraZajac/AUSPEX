      intelligence-collection purpose (not a coercive, destructive,
      or influence goal), which triangulates to persona-laundered
      IRGC-IO collection as the dominant reading. Caveat: the target
      is a prominent Jewish religious figure, not an Iranian diaspora
      dissident, so the fit is via the pillar's persona-based
      civil-society-collection scope rather than its diaspora-
      dissident core.
