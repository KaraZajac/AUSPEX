id: 2024-08/cisa-ransomhub-advisory
name: CISA AA24-242A — RansomHub joint advisory
start_date: 2024-08-29
disclosure_date: 2024-08-29
end_date: 2024-08-29
incident_type:
  - intrusion
initial_vector: phishing
outcome_summary: |
  CISA / FBI / MS-ISAC / HHS joint advisory characterizing
  RansomHub ransomware-as-a-service activity since February
  2024. Documents ~210 victims across 18 critical-infrastructure
  sectors. Identifies absorption of ALPHV affiliates including
  Scattered Spider. Initial-access tradecraft via phishing,
  password-spray, and exploitation of Citrix NetScaler ADC
  (CVE-2023-3519), Fortinet FortiOS (CVE-2023-27997), Apache
  ActiveMQ (CVE-2023-46604), Atlassian Confluence (CVE-2023-22515),
  ConnectWise ScreenConnect (CVE-2024-1709).
false_flag_risk: none
summary: |
  AUSPEX records this as the canonical US-government documentation
  of the post-ALPHV ransomware-ecosystem reshuffle. RansomHub
  subsequently disappeared abruptly in April 2025; affiliates
  migrated to DragonForce, Akira, Qilin.
