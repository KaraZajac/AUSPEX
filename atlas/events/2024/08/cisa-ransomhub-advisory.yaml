id: 2024-08/cisa-ransomhub-advisory
name: CISA AA24-242A — RansomHub joint advisory
start_date: 2024-08-29
disclosure_date: 2024-08-29
end_date: 2024-08-29
incident_type:
  - documentary
initial_vector: phishing
outcome_summary: |
  CISA / FBI / MS-ISAC / HHS joint advisory (AA24-242A,
  #StopRansomware) characterizing RansomHub ransomware-as-a-service
  activity. RansomHub — described by the advisory as formerly known as
  Cyclops and Knight — has, since its inception in February 2024,
  "encrypted and exfiltrated data from at least 210 victims"
  representing 11 critical-infrastructure sectors (water and
  wastewater; information technology; government services and
  facilities; healthcare and public health; emergency services; food
  and agriculture; financial services; commercial facilities; critical
  manufacturing; transportation; communications). The advisory states
  the model has recently attracted high-profile affiliates from other
  prominent variants "such as LockBit and ALPHV." Affiliates gain
  initial access via phishing, password spraying, and exploitation of
  known vulnerabilities — CVE-2023-3519 (Citrix ADC/NetScaler),
  CVE-2023-27997 (Fortinet FortiOS), CVE-2023-46604 (Apache ActiveMQ),
  CVE-2023-22515 (Atlassian Confluence), CVE-2023-46747 (F5 BIG-IP),
  and CVE-2023-48788 (Fortinet FortiClientEMS).
false_flag_risk: none
summary: |
  AUSPEX records this as the canonical US-government documentation of
  the post-ALPHV ransomware-ecosystem reshuffle: a joint
  #StopRansomware advisory profiling RansomHub, the RaaS (which the
  advisory describes as formerly Cyclops/Knight) that emerged in
  February 2024 and attracted affiliates displaced from ALPHV and
  LockBit. It names no specific victim — it is the general RansomHub
  TTP/IOC profile — and is cited elsewhere in the corpus (change-
  healthcare, frontier, christies, halliburton) only as background for
  that "ALPHV-successor RaaS" framing, never as an incident/attribution
  source for a named victim.
