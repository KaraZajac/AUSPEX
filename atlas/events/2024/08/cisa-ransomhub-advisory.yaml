notes: |
  Post-advisory context (NOT carried by AA24-242A, which is dated
  2024-08-29 and cannot speak to it): RansomHub's leak infrastructure
  went dark abruptly around April 2025, with affiliates reported
  migrating to DragonForce, Qilin, and Akira. Held here as editorial
  context only — it would need its own 2025 source before it could
  re-enter the summary. Removed from the summary during the 2026-07-05
  audit because the sole cited source (Aug-2024) does not support it.
