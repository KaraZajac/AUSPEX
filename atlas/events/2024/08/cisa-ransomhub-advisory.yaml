  notes: |
    Audited vs the CISA/FBI/MS-ISAC/HHS joint advisory AA24-242A
    "#StopRansomware: RansomHub Ransomware" (cisa.gov/.../aa24-242a).
    Raw snapshot already on disk from the 2026-07-04 pass; sha256
    RE-VERIFIED this pass: cde72d5a…c9099fb7 (full
    cde72d5a224a614d442ae239ad3dd799589ec5eca9c5b367e8dbd6bdc9099fb7),
    124,716 bytes. NOT a phantom — URL is the real advisory page and
    its body carries the claims below. Text extracted to plain (42,342
    chars) for verification.

    [a] FACTS — corrected three fabrications + one wrong count:
    • Publisher/authors ✓ verbatim: "The Federal Bureau of
      Investigation (FBI), the Cybersecurity and Infrastructure
      Security Agency (CISA), the Multi-State Information Sharing and
      Analysis Center (MS-ISAC), and the Department of Health and Human
      Services (HHS)".
    • Inception Feb 2024 ✓ and victim count ✓ verbatim: "Since its
      inception in February 2024, RansomHub has encrypted and
      exfiltrated data from at least 210 victims".
    • SECTOR COUNT CORRECTED 18 → 11. The string "18" appears NOWHERE
      in the advisory; the source enumerates exactly 11 sectors ("the
      water and wastewater, information technology, government services
      and facilities, healthcare and public health, emergency services,
      food and agriculture, financial services, commercial facilities,
      critical manufacturing, transportation, and communications
      critical infrastructure sectors"). Replaced "18" with the
      enumerated 11.
    • AFFILIATE ABSORPTION CORRECTED. Event said "absorption of ALPHV
      affiliates including Scattered Spider." "Scattered Spider" count
      = 0 in the advisory — FABRICATION, removed. The advisory's actual
      words: "recently attracting high-profile affiliates from other
      prominent variants such as LockBit and ALPHV" — so LockBit
      (which the event OMITTED) is added, ALPHV kept. Also added the
      advisory's lineage claim ("formerly known as Cyclops and Knight").
    • CVE LIST CORRECTED. Event listed 5 CVEs; the advisory's
      "Exploits based on the following CVEs have been observed" block
      names 6: CVE-2023-3519 (Citrix ADC/NetScaler), CVE-2023-27997
      (FortiOS), CVE-2023-46604 (Apache ActiveMQ OpenWire), CVE-2023-
      22515 (Atlassian Confluence Data Center/Server), CVE-2023-46747
      (F5 BIG-IP), CVE-2023-48788 (Fortinet FortiClientEMS) — all six
      verified verbatim. The event's 5th CVE, "ConnectWise
      ScreenConnect (CVE-2024-1709)", is FABRICATED: "CVE-2024-1709",
      "1709", and "ScreenConnect" all count = 0 in the advisory. The
      lone "Connectwise" token is a remote-access/RMM tool cited for
      lateral movement ("…PsExec, Anydesk, Connectwise, N-Able, Cobalt
      Strike…"), NOT an exploited initial-access CVE — a clear
      conflation with the unrelated ScreenConnect CVE. Removed 1709;
      added the two real CVEs (46747, 48788) the event had dropped.
    • Initial-access methods ✓ verbatim: "compromise internet facing
      systems and user endpoints by using methods such as phishing
      emails [T1566], exploitation of known vulnerabilities [T1190],
      and password spraying [T1110.003]." initial_vector: phishing
      kept (phishing is named first; matches documentary-advisory
      convention, e.g. aa20-099a).
    • SUMMARY forward-claim STRIPPED. Original summary asserted
      "RansomHub subsequently disappeared abruptly in April 2025;
      affiliates migrated to DragonForce, Akira, Qilin." The only cited
      source is dated 2024-08-29 and cannot carry a 2025 fact:
      "DragonForce", "Akira", "Qilin", "April 2025" all count = 0.
      Removed from summary; relocated to a clearly-labelled editorial
      notes: block flagged "NOT carried by AA24-242A" (candidate for a
      2025 re-source — see FLAG).

    [b] ATTRIBUTION — unchanged, correct. A govt-primary four-agency
    joint advisory names RansomHub definitively; attributing_org
    "CISA + FBI + MS-ISAC + HHS", confidence high, auspex_assessment
    concur all hold. attribution_source_id resolves.

    [c] DATES — correct. AA24-242A = the 242nd day of 2024 = 2024-08-29;
    source published_on 2024-08-29; advisory says info current "as
    recently as August 2024". For a single-day documentary event,
    start_date = disclosure_date = end_date = 2024-08-29 is right.

    [d] DOCTRINE_LINKS: [] — correct and preserved. RansomHub is
    criminal/financial (criminal/ransomhub, no state nexus, empty
    default_doctrine_alignment_ids); no state doctrine applies and no
    source states a strategic purpose. Not inventing one.

    [e] ATTRIBUTION_LEVEL — was MISSING; ADDED named-actor. The
    advisory names RansomHub as a defined RaaS variant/group with IOCs
    and TTPs but no nation/unit (criminal), so named-actor is the
    correct specificity.

    [f] ACTOR_ID — criminal/ransomhub resolves to
    atlas/actors/criminal/ransomhub.yaml; criminal placement is
    justified (mixed affiliate nationality, no public state nexus). See
    FLAG: the actor record's ttp_summary repeats "Absorbed displaced
    ALPHV affiliates including Scattered Spider" citing only this same
    advisory, which does not name Scattered Spider — orchestrator/Kara
