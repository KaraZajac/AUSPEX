initial_vector: phishing
outcome_summary: |
  FBI / CISA joint advisory named Aria Sepehr Ayandehsazan as
  the IRGC contractor operating influence and intrusion
  campaigns against the 2024 US election and Israeli
  organizations. Spoofed personas, hack-and-leak, mass-email
  coercion — the Emennet Pasargad operational playbook
  rebranded.
false_flag_risk: suspected  # persona spoofing of US groups
summary: |
  Companion event to the IRGC trio Trump-campaign hack-and-leak
  — the FBI advisory establishes that the broader 2024-election
  influence ecosystem ran through the rebranded contractor. The
  advisory documents Aria Sepehr Ayandehsazan / Emennet Pasargad
  / Mint Sandstorm tradecraft: spear-phishing with credential-
  harvesting links, targeted social-engineering against political-
  campaign and Israeli-civil-society staff (LinkedIn / WhatsApp
  pretexting), abuse of cloud-mail providers for mass-email
  coercion campaigns, hack-and-leak via spoofed US grassroots
  personas (e.g., "Enemies of the People", "Hometown Hero"), and
  follow-on PowerShell-based implants in the broader Mint
  Sandstorm / CharmPower / POWERSTAR toolset. Operators staged
  exfiltrated data through hosting infrastructure designed to
  give the persona a "civic" appearance while laundering IRGC
  direction.
