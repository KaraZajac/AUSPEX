outcome_summary: |
  Joint FBI / U.S. Treasury / Israel National Cyber Directorate
  advisory (AA24-233A, 30 Oct 2024) warning of new tradecraft by
  the Iranian cyber group Emennet Pasargad, operating under the
  cover company Aria Sepehr Ayandehsazan (ASA) and tracked by the
  private sector as Cotton Sandstorm / Marnanbridge / Haywire
  Kitten. It documents cyber-enabled information operations run
  through a myriad of cover personas — concentrated on the
  Israel-Hamas conflict after 7 Oct 2023 (threat-SMS to hostage
  families as "Contact-HSTG"; "Cyber Flood"; "Cyber Court"
  hacktivist fronts), a July 2024 compromise of a French dynamic-
  display provider to denounce Israeli Olympic athletes under a
  spoofed "Regiment GUD" persona, and a Dec 2023 hijack of a US
  IPTV service ("For-Humanity") using an AI-generated news anchor.
  Microsoft reporting cited in the advisory notes ASA scouting US
  election-related websites and media, suggesting preparation for
  future influence operations.
false_flag_risk: suspected  # cover personas + impersonation of the real French far-right group GUD ("Regiment GUD") and ASA-run hacktivist fronts (advisory); attribution to ASA itself is firm
summary: |
  Joint FBI / U.S. Treasury / Israel INCD Cybersecurity Advisory
  (Product ID JCSA-20241030-001 / AA24-233A, 30 October 2024)
  documenting new tradecraft of the Iranian cyber group Emennet
  Pasargad, which the FBI states has since mid-2024 operated under
  the cover company Aria Sepehr Ayandehsazan (ASA, Iranian
  Registration No. 504415) and is tracked by vendors as Cotton
  Sandstorm / Marnanbridge / Haywire Kitten (formerly Eleyanet
  Gostar). The advisory catalogs cyber-enabled information
  operations run through cover personas, concentrated on the
  Israel-Hamas conflict following 7 October 2023: "Contact-HSTG"
  threat-SMS to families of Israeli hostages; "Cyber Flood"; a
  "Cyber Court" persona promoting purported hacktivist groups
  (Makhlab al-Nasr, NET Hunter, Emirate Students Movement, Zeus is
  Talking) actually run by ASA; a "Sample" campaign to
  crowdsource-identify Israeli individuals including law
  enforcement; and OSINT doxxing of Israeli fighter pilots and UAV
  operators via Pastebin, LinkedIn, Instagram and OpenStreetMap.
  In July 2024 the actors compromised a French commercial dynamic-
  display provider to push montages denouncing Israeli
  participation in the 2024 Olympic and Paralympic Games, paired
  with a fake French-media news article and threat messages under a
  spoofed "Regiment GUD" persona impersonating the real French
  far-right group GUD. A December 2023 operation ("For-Humanity")
  hijacked a US-based IPTV streaming service to broadcast Israel-
  Hamas-conflict messaging using a generative-AI news anchor. ASA
  also harvested content from internet-exposed IP cameras (RTSP,
  TCP 554) in Israel, Gaza and Iran, and used fictitious cover
  hosting resellers ("Server-Speed", "VPS-Agent") to provision
  operational infrastructure — including for a Lebanon-based actor
  hosting Hamas-themed sites — to provide plausible deniability.
  For initial access ASA relies on public-facing-application
  exploitation (SQLMap / SQL injection, Acunetix, Burp Suite,
  Masscan), weaponization of CVE-2023-38831, automated password-
  guessing and hash-cracking, and a malicious "Google Chrome
  Installer.msi" that drops a heavily obfuscated RAT ("bd.exe").
  The FBI assesses the group's recent campaigns mix genuine
  computer-intrusion activity with exaggerated or fictitious claims
  of access to amplify psychological effect. Microsoft reporting
  cited by the advisory adds that ASA has been scouting US
  election-related websites and media, suggesting preparation for
  more direct influence operations. NOTE: this advisory does not
  name the IRGC anywhere in its 16 pages; the ir/irgc placement
  rests on the actor's separate Treasury 2021-11-18 (jy0494)
  designation. Editorial cross-reference only: the September 2024
  DOJ indictment of three IRGC cyber actors for the Trump-campaign
  hack-and-leak (doj/2024-09-27) is a distinct operation and is not
  a source for this advisory.
