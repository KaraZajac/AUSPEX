  notes: |
    Audited against the RAW cited artifact — the FBI/Treasury/INCD Joint
    Cybersecurity Advisory "New Tradecraft of Iranian Cyber Group Aria Sepehr
    Ayandehsazan aka Emennet Pasargad" (Product ID JCSA-20241030-001 / AA24-233A,
    30 Oct 2024), read directly from the on-disk snapshot
    fbi__2024-08_aria-sepehr-ayandehsazan.pdf. sha256 RE-VERIFIED (matches source
    record) 63c82855…364b844c, 1,153,344 bytes, 16 pages, PDF 1.7. This is the
    GENUINE advisory (not a phantom / not a wrong-source) — normal 6-point audit;
    heavy de-fabrication required.

    [a] FACTS — the prior summary carried multiple UNSUPPORTED / cross-actor
    claims, all stripped:
      • "Mint Sandstorm / CharmPower / POWERSTAR toolset" + "follow-on
        PowerShell-based implants" — FABRICATED cross-actor conflation. Mint
        Sandstorm / CharmPower / POWERSTAR are Charming Kitten / APT35 artifacts,
        a DIFFERENT Iranian actor. The advisory's private-sector names for THIS
        group are "Cotton Sandstorm, Marnanbridge, and Haywire Kitten" (p1); its
        only named malware is 'bd.exe' RAT delivered via a malicious 'Google
        Chrome Installer.msi', plus First.exe (pp9-10,13). No PowerShell implant.
        Removed entirely.
      • "spear-phishing with credential-harvesting links" + initial_vector:
        phishing — UNSUPPORTED. Advisory initial access = SQLMap/SQL injection
        (T1190, p11), Masscan/Acunetix/Burp (p9), CVE-2023-38831 weaponization
        (Table 2, p11), automated password-guessing (T1110.001) and hash-cracking
        (T1110.002). No phishing anywhere. Fixed initial_vector phishing→n-day.
      • "abuse of cloud-mail providers for mass-email coercion campaigns" —
        UNSUPPORTED here; a carry-over from the group's 2020 "Proud Boys" op. This
        advisory documents SMS/messaging coercion (Contact-HSTG to hostage
        families, p5) and IPTV hijack, not mass-email. Removed.
      • Personas "Enemies of the People" / "Hometown Hero" — NOT in this advisory
        ("Enemies of the People" is the 2020-op persona; "Hometown Hero" appears
        nowhere). Replaced with the advisory's REAL personas: Contact-HSTG, Cyber
        Flood, Cyber Court (+ ASA-run fronts Makhlab al-Nasr / NET Hunter /
        Emirate Students Movement / Zeus is Talking), For-Humanity, Regiment GUD,
        Sample (pp5-6).
      • "LinkedIn / WhatsApp pretexting" against campaign staff — WhatsApp is
        FABRICATED (absent from advisory); LinkedIn appears only as OSINT/recon to
        identify Israeli pilots (p8, Table 1 T1589.003), not social-engineering of
        campaign staff. Recast as OSINT doxxing.
      • "IRGC direction" / "civic appearance" laundering embellishments — advisory
        says the cover resellers provide "plausible deniability that malicious
        infrastructure was being assigned by a legitimate hosting provider" (p3);
        it never says IRGC. Recast to advisory wording.
      Rewrote summary + outcome_summary to advisory-carried facts only (ASA=Emennet
      cover, Reg No 504415; post-Oct-7 anti-Israel IO; July-2024 French Olympics
      op / Regiment GUD; Dec-2023 US IPTV For-Humanity w/ AI anchor; IP-camera
      harvesting RTSP/554 IL/Gaza/Iran; Server-Speed/VPS-Agent cover resellers +
      Lebanon/Hamas hosting; SQLi/CVE-2023-38831/password-guessing + Chrome-MSI
      RAT; Microsoft-reported US-election scouting; "mix of computer intrusion
      activity and exaggerated or fictitious claims of access" p2). Fixed name
      ("FBI / CISA"→"FBI / Treasury / INCD"). Kept incident_type intrusion — the
      advisory documents genuine computer-intrusion (French-provider compromise,
      IPTV unauthorized access, IP-camera access, RAT, SQLi), so influence-
      operation + intrusion are both source-carried.

    [b] ATTRIBUTION — advisory names "the Iranian cyber group Emennet Pasargad …
    operating under the company name Aria Sepehr Ayandehsazan (ASA) … known by the
    private sector terms Cotton Sandstorm, Marnanbridge, and Haywire Kitten" (p1),
    and "FBI obtained reliable information in mid-2024 indicating Emennet Pasargad
    has more recently been using the Iranian company name Aria Sepehr Ayandehsazan
    (ASA, Iranian Registration Number 504415) as a nominal cover" (p2). NO
    service/unit named — advisory never says "IRGC." Corrections: attributing_org
    "US FBI / CISA"→"US FBI / US Treasury / Israel INCD" (CISA is NOT an author);
    added attribution_level: named-actor (group+nation, not named-unit);
    attribution_date 2024-08-14→2024-10-30; kept high/concur; added notes. ir/irgc
    placement is carried by the actor's Treasury-2021 source, not this advisory.

    [c] DATES — the artifact's Version History reads "October 30, 2024: Initial
    version" (p16); Product ID JCSA-20241030-001 / AA24-233A; URL
    ic3.gov/CSA/2024/241030.pdf. The prior published_on / disclosure_date /
    attribution_date of 2024-08-14 were WRONG for this artifact — corrected all to
    2024-10-30 (and the source record's published_on, below). start_date
