id: 2024-08/aria-sepehr-ayandehsazan-fbi-advisory
name: FBI / CISA advisory on Aria Sepehr Ayandehsazan (Emennet Pasargad re-brand)
start_date: 2024-01-01
disclosure_date: 2024-08-14
end_date: 2024-11-30
incident_type:
  - influence-operation
