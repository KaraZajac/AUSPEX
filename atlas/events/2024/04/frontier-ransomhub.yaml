      leak site"; SecurityWeek: "On June 1, the RansomHub ransomware gang added
      Frontier Communications to its Tor-based leak site"), corroborated by
      security-journalism consensus and RansomHub's posted data sample; the
      underlying breach is independently confirmed real by the SEC 8-K.
      named-actor (RansomHub group named; no unit/state). high confidence on the
      claimant's identity (RansomHub's own leak-site claim of a confirmed-real
      breach, reported as fact by three outlets). auspex_assessment
