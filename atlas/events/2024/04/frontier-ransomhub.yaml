id: 2024-04/frontier-ransomhub
name: RansomHub data theft and partial disruption of Frontier Communications
start_date: 2024-04-14
disclosure_date: 2024-04-18
end_date: 2024-06-15
incident_type:
  - intrusion
  - data-theft
  - disruption
initial_vector: unknown
outcome_summary: |
  Frontier Communications, a US fiber and residential-broadband
  carrier serving approximately 3 million subscribers across 25
  states, disclosed via SEC 8-K April 18, 2024 a cyber incident
  that forced shutdown of several internal IT systems and
  temporarily disrupted customer-portal services. RansomHub
  claimed responsibility April 26 and began publishing
  exfiltrated data including customer PII and corporate
  documents in June after Frontier declined to pay.
quantified_impact:
  subscribers_at_risk: 3000000
false_flag_risk: none
summary: |
  Mid-tier US carrier ransomware case in RansomHub's high-tempo
  2024 victim run. Notable for the publicly-traded SEC 8-K
  disclosure under the rules effective December 2023, which
  forced Frontier to acknowledge the intrusion within four
  business days. No clinical or safety-of-life impact; the
  incident sits in the AUSPEX criminal-baseline class with no
  doctrinal targeting fit.
attributions:
  - actor_id: criminal/ransomhub
    attributing_org: Frontier Communications + RansomHub (self-claimed)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2024-04-26
    attribution_source_id: cisa/2024-08-29_aa24-242a-ransomhub-advisory
    notes: |
      CISA AA24-242A is the joint RansomHub advisory; it does not
      name Frontier specifically. No primary government advisory
      specific to this case; attribution_source_id is the nearest
      contemporaneous primary documentation of RansomHub activity.
doctrine_links: []
