initial_vector: unknown
outcome_summary: |
  Frontier Communications Parent, Inc. (NASDAQ: FYBR), a US fiber and
  residential-broadband carrier, detected that a third party had gained
  unauthorized access to portions of its IT environment on April 14, 2024
  and disclosed the incident via SEC Form 8-K (Item 1.05) on April 18, 2024.
  Containment measures — which included shutting down certain systems — caused
  an operational disruption Frontier described as potentially material;
  customers reported internet outages and degraded support-line and portal
  service. Frontier's 8-K attributed the intrusion only to a party "likely" to
  be "a cybercrime group" that accessed personally identifiable information; it
  named no group. On June 1, 2024 the RansomHub ransomware-as-a-service
  operation listed Frontier on its Tor leak site, claiming ~5GB of data on more
  than 2 million people (names, addresses, dates of birth, SSNs, phone numbers,
  credit scores) and stating it had spent more than two months trying to extort
  the company without response. Frontier subsequently notified 751,895
  individuals that their names, other PII, and Social Security numbers were
  taken (it does not believe financial information was affected) and offered 12
  months of credit monitoring and identity-theft services.
quantified_impact:
  individuals_affected: 751895          # Frontier breach notification (SecurityWeek): "751,895 individuals were affected"
  records_claimed_by_actor: 2000000     # RansomHub leak-site claim (">2 million people"); unverified, contradicted by the 751,895 official count
  data_exfiltrated_gb_claimed: 5        # RansomHub leak-site claim ("5GB of data")
false_flag_risk: none
summary: |
  US telecom-carrier data-theft-and-extortion case involving the RansomHub
  ransomware-as-a-service operation, part of RansomHub's high-tempo 2024 victim
  run. Notable as a publicly-traded SEC 8-K (Item 1.05) cyber-disclosure under
  the rules effective December 18, 2023, which require disclosure of a material
  cybersecurity incident within four business days of the materiality
  determination (detected April 14, disclosed April 18). The incident sits in
  the AUSPEX criminal-baseline class with no doctrinal targeting fit: RansomHub
  carries no source-documented state nexus (AUSPEX places it under `criminal/`),
  so no state doctrine genuinely applies. No documented safety-of-life impact.
