id: 2024-04/mandiant-apt44-sandworm-promotion
name: Mandiant promotes Sandworm cluster to named APT44
start_date: 2024-04-17
disclosure_date: 2024-04-17
end_date: 2024-04-17
incident_type:
  - disclosure
  - attribution-publication
initial_vector: unknown
outcome_summary: |
  Mandiant published "APT44: Unearthing Sandworm" — promoting the
  long-tracked Sandworm cluster (GRU Unit 74455 / Main Centre for
  Special Technologies, GTsST) to a numbered APT. The report
  consolidated a decade of tooling lineage — BlackEnergy,
  Industroyer / Industroyer2 (INDUSTROYER.V2), NotPetya, Olympic
  Destroyer, the 2022 Ukraine wiper wave (CaddyWiper and related
  families), and the MicroSCADA living-off-the-land OT operation —
  alongside emerging influence-operation tradecraft.
false_flag_risk: none
summary: |
  Doctrinally important as the consolidation of a decade of
  Sandworm tracking into a single named-APT framework. Mandiant
  positioned APT44 as the most operationally consequential GRU
  cyber unit ("no other Russian government-backed cyber group has
  played a more central role in shaping and supporting Russia's
  military campaign"), engaged in "the full spectrum of espionage,
  attack, and influence operations," and called out the growing
  involvement of nominally hacktivist Telegram-fronted personas
  (XakNet, CyberArmyofRussia_Reborn) that Mandiant assessed APT44
  cultivates as fronts for its information operations. The report
  itself surfaced CyberArmyofRussia_Reborn's claimed manipulation
  of US and Polish water-utility OT — a widely cited tie between a
  Sandworm-controlled persona and US-based critical-infrastructure
  activity — though Mandiant noted it "cannot independently verify"
  the persona's link to those specific intrusions.
