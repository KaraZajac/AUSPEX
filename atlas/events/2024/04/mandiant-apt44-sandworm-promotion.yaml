  notes: |
    Audited vs the FIRST-PARTY FULL REPORT PDF "APT44: Unearthing
    Sandworm" (Mandiant/Google Cloud). The cited source url is the
    Google Cloud blog, whose static HTML is a JS-rendered shell (sha256
    c320f2fa…5afa0647, 248,135 bytes) that carries the title/meta but
    NONE of the body claims (74455/GTsST/XakNet/Industroyer/Olympic/
    BlackEnergy all 0 hits). Fetched the canonical PDF the blog links
    (services.google.com/fh/files/misc/apt44-unearthing-sandworm.pdf;
    sha256 efa07dc1…66166863, 1,639,506 bytes, 40 pp, 3,374 text lines)
    and promoted it to the source record's raw_snapshot (ANSSI dual-
    snapshot convention); HTML shell hash preserved in the source notes.
    All quotes below are from the PDF.

    [a] FACTS — verified verbatim: promotion/graduation ("Mandiant has
    decided to graduate the group into APT44"); identity ("attributed by
    multiple governments to Unit 74455, the Main Centre for Special
    Technologies (GTsST) within the … GRU"; Fig 1 "GRU VIO Structure
    including Unit 74455"); scope ("no other Russian government-backed
    cyber group has played a more central role in shaping and supporting
    Russia's military campaign"; "full spectrum of espionage, attack, and
    influence operations"); personas ("APT44 continues to cultivate
    hacktivist identities … XakNet Team, CyberArmyofRussia_Reborn1, and
    Solntsepek"; "created and controlled by APT44"); CARR US/Polish
    water-utility OT claims ("at Polish and U.S. water utilities", US
    official's "system malfunction … tank overflowing"), with Mandiant's
    own hedge "cannot independently verify … its links to APT44". CORRECTION
    to outcome_summary: STRIPPED four community malware names the report
    does NOT carry — HermeticWiper, IsaacWiper, AcidRain, SwiftSlicer
    (0 occurrences each; the only "Isaac" is an "ISAAC PRNG" YARA string).
    Mandiant uses its own family names (CADDYWIPER, NIKOWIPER, NEARMISS,
    PARTYTICKET, SOLOSHRED, AWFULSHRED, JUNKMAIL, NEARTWIST); kept the tool
    names actually present — BlackEnergy, INDUSTROYER/INDUSTROYER.V2,
    NotPetya, OlympicDestroyer (one word in the report), CaddyWiper,
    MicroSCADA. CORRECTION to summary: "parallel Mandiant reporting" →
    "the report itself" (the APT44 report body carries the CARR water-
    utility material directly, pp. on CyberArmyofRussia_Reborn), and added
    Mandiant's "cannot independently verify" hedge; kept espionage+sabotage
    as the report's own "full spectrum of espionage, attack, and influence".
    [b] ATTRIBUTION — Mandiant graduates the cluster and affirms the
    government attribution to GRU Unit 74455/GTsST; attributing_org_confidence
    high is correct (Key Judgment: "sponsored by Russian military
    intelligence"; "We assess with high confidence"). auspex_assessment
    concur retained.
    [c] DATES — source published_on 2024-04-17 matches report date; event
    is a publication/meta event so start=disclosure=end=2024-04-17 (correct,
    unchanged).
    [d] DOCTRINE_LINKS — none are `attested`, all strongly_inferred (no
    attesting quote required). #1 military-doctrine-2014/non-contact-warfare:
    CORRECTED — removed "information confrontation" (0 hits in report) from
    reasoning + signal; regrounded on the report's actual language ("better
    integrated with … Russia's conventional forces than in any other previous
    phase"; "flexible instrument of power"); ruled_out = the 2014 doctrine by
    name ("military doctrine" 0 hits). #2 russkiy-mir/ukraine-theater:
    Ukraine-centric focus supported; "russkiy"/"russian world" 0 hits (goal
    correctly not named) — kept strongly_inferred, unchanged. #3
    sanctions-response-2022/criminal-proxy-mobilization: report explicitly
    documents APT44 cultivating hacktivist Telegram fronts as "assets for its
    follow-on information operations" and "created and controlled by APT44" —
    supports strongly_inferred; Mandiant documents the behaviour but does not
    frame it as sanctions-response criminal-proxy mobilization, so NOT
    upgraded to attested. Line 213 ("relies on a diverse set of Russian
    companies and criminal marketplaces") is corroborating.
    [e] ATTRIBUTION_LEVEL — was MISSING; ADDED `named-unit` (report names
    GRU Unit 74455 / GTsST, the most specific level).
    [f] ACTOR_ID — ru/gru/74455/sandworm resolves (atlas/actors/ru/sandworm.yaml,
    id matches; primary_service_id ru/gru/74455 → atlas/services/ru/gru/74455.yaml
    resolves). Actor record is well-sourced; FrostyGoop=Sandworm correctly absent
    (removed 2026-07-04, Dragos declined) — NOT re-added. No actor edits.
    RESIDUAL: the water-utility→APT44 link is Mandiant-hedged (CARR's own
    claims, partially corroborated by US officials); summary now reflects that.
    Doctrine-fit nuance (FLAG, non-blocking): #3's personas are, per Mandiant,
    APT44-CONTROLLED fronts (state sock-puppets) rather than independently
    mobilized criminal proxies — the criminal-proxy-mobilization pillar is a
    defensible-but-loose fit; left as strongly_inferred for human review.
