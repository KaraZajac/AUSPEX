id: 2024-04/mandiant-apt44-sandworm-promotion
name: Mandiant promotes Sandworm cluster to named APT44
start_date: 2024-04-17
disclosure_date: 2024-04-17
end_date: 2024-04-17
incident_type:
  - disclosure
  - attribution-publication
initial_vector: unknown
outcome_summary: |
  Mandiant published "APT44: Unearthing Sandworm" — promoting the
  long-tracked Sandworm cluster (GRU Unit 74455 / Main Centre for
  Special Technologies, GTsST) to a numbered APT. The report
  consolidated tooling lineage from BlackEnergy through
  Industroyer/Industroyer2, NotPetya, Olympic Destroyer, the 2022
  Hermetic/Caddy/Isaac wiper wave, AcidRain, SwiftSlicer, the
  MicroSCADA living-off-the-land OT operation, and emerging
  influence-operation tradecraft.
false_flag_risk: none
summary: |
  Doctrinally important as the consolidation of a decade of
  Sandworm tracking into a single named-APT framework. Mandiant
  positioned APT44 as the most operationally consequential GRU
  cyber unit, with both espionage and sabotage in its mission set,
  and called out the growing involvement of nominally hacktivist
  Telegram-fronted personas (XakNet, CyberArmyofRussia_Reborn) in
  Sandworm operations. The promotion paired with parallel Mandiant
  reporting attributing US water-utility intrusions to a
  Sandworm-linked persona — the first widely cited link tying
  Sandworm to US-based CARR activity.
