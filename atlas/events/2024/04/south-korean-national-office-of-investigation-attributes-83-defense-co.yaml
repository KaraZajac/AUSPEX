  - data-theft
false_flag_risk: none
summary: |
  On 23 April 2024 South Korea's National Office of Investigation (National Police Agency) attributed breaches of 83 South Korean defense companies or their contractors to the North Korean groups Lazarus, Kimsuky and Andariel, with confidential information stolen from about 10 of them. The reported initial-access methods varied by group: Lazarus hacked an unnamed defense firm's server in November 2022 and exfiltrated internal-network data to an overseas cloud server; Andariel leaked defense-company data by hijacking an employee account around October 2022; and Kimsuky stole technical data (April–July 2023) by exploiting a vulnerability that allowed downloading large files via email. No malware names or named individuals were disclosed.
