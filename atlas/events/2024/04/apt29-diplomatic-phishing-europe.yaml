id: 2024-04/apt29-diplomatic-phishing-europe
name: APT29 sustained diplomatic phishing of European foreign ministries (WINELOADER)
start_date: 2023-01-01  # earliest observed in disclosure
disclosure_date: 2024-04-24
end_date: null
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Mandiant disclosed an ongoing APT29 / SVR phishing campaign
  targeting diplomatic and government entities across NATO Europe,
  particularly ministries of foreign affairs and embassies, using
  lure documents themed around inter-state diplomatic
  correspondence. Tradecraft evolved from earlier ROOTSAW staging
  toward WINELOADER and successor loaders that abuse legitimate
  binaries via DLL search-order hijacking. Sustained collection
  continued through the active invasion phase.
false_flag_risk: none
summary: |
  Continues the SVR's canonical European foreign-ministry mission
  through the post-invasion period, but with material tradecraft
  evolution: APT29 moved from lure-and-document staging toward
  legitimate-binary abuse, ZIP-shipped payloads, and rapid
  domain-rotation infrastructure to reduce signature exposure as
  Western telemetry on prior tooling matured. Pairs with the
  parallel APT29 Microsoft Midnight Blizzard intrusion (Jan 2024
  disclosure) and the January 2024 NCSC + Five Eyes SVR cloud-
  access advisory.
