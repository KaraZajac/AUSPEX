doctrine_links:
  - doctrine_id: ru/info-security-2016
    pillar_id: ru/info-security-2016/information-sphere-as-domain
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      APT29/SVR spearphishing of German political parties and European
      foreign ministries is strategic foreign-political-intelligence
      collection — the SVR treating the information sphere as an operating
      domain, the same doctrinal home the corpus assigns the SVR's other
      strategic-collection campaigns (SolarWinds, TeamCity, cloud-identity,
      the Midnight Blizzard corporate intrusion, the AA24-057A cloud-access
      advisory). Strongly inferred, not attested: Mandiant states the
      proximate purpose — the "SVR's responsibility to collect political
      intelligence" and Moscow's interest in "changing Western political
      dynamics related to Ukraine" — but never the information-confrontation
      / info-sphere-as-national-security-domain goal the pillar itself
      encodes. Matches the same-pillar strongly_inferred calibration on the
      SVR-advisory siblings (aa24-057a, svr-teamcity, svr-cloud-identity,
      midnight-blizzard-microsoft-corporate).
    attesting_source_id: mandiant/2024-03-22_apt29-wineloader-german-political-parties
    inference_basis:
      signals:
        - "Mandiant WINELOADER report (verbatim): APT29 is 'a Russian Federation backed threat group linked by multiple governments to Russia's Foreign Intelligence Service (SVR)'; 'Based on the SVR's responsibility to collect political intelligence ... we judge this activity to present a broad threat to European and other Western political parties'"
        - "Stated collection motive (verbatim): 'Moscow's vital interest in understanding changing Western political dynamics related to Ukraine and other flashpoint foreign policy issues'"
        - "Backchannel Diplomacy (verbatim): APT29 'continues to prioritise European Ministries of Foreign Affairs and embassies' and diplomatic entities 'associated with' NATO/EU member states, 'pointing to the SVR's central role in collecting intelligence concerning the current pivotal phase of the war'"
      ruled_out: "Destructive, disruptive, financial, or overt influence-operation motive — both reports frame the activity strictly as espionage/intelligence collection by Russia's foreign-intelligence service (backdoor delivery for follow-on collection); no wiper, leak, monetization, or public influence component is described. The stated-collection reading also out-competes an info-psychological/election-interference reading (info-security-2016/info-psychological-defense), which Mandiant does not support — it frames the party targeting as intelligence collection, not active measures."
    contested: false
    analyst: claude
