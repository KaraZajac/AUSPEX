  notes: |
    PHANTOM-REMEDIATION path = RE-SOURCE (wrong/incomplete source). The
    sole cited source was mandiant/2024-04-24_apt29-evolving-diplomatic-
    phishing ("Backchannel Diplomacy", raw
    mandiant__2024-04-24_apt29-evolving-diplomatic-phishing.html, sha256
    38026252...d2e6cc99, 385,353 bytes, HTML <title> "Backchannel
    Diplomacy: APT29's Rapidly Evolving Diplomatic Phishing Operations").
    That article is REAL but is Mandiant's SEPTEMBER-2023 ROOTSAW-era
    report — raw keyword census: WINELOADER = 0, CDU = 0, "political
    parties" = 0 (ROOTSAW = 94). It does not carry this event's headline
    WINELOADER / CDU-lure / German-political-party claims. Web-searched and
    identified the genuine primary report — Mandiant "APT29 Uses WINELOADER
    to Target German Political Parties" (2024-03-22, Luke Jenkins & Dan
    Black) — created its source record
    (mandiant/2024-03-22_apt29-wineloader-german-political-parties), curled
    + snapshotted it (raw
    mandiant__2024-03-22_apt29-wineloader-german-political-parties.html,
    sha256 e55b770a...882ab9f0, 293,646 bytes, HTML <title> "APT29 Uses
    WINELOADER to Target German Political Parties | Google Cloud Blog",
    WINELOADER = 124, CDU = 10), re-pointed the event's primary source +
    attribution to it, and KEPT Backchannel Diplomacy as a genuine
    corroborating source for the 2023 European-MFA / ROOTSAW context (its
    published_on fixed 2024-04-24 -> 2023-09-21, snapshot hash added).

    [a] FACTS — rewritten strictly to the two raws. VERIFIED verbatim in
    the WINELOADER raw: invite "to a dinner reception on 01 March bearing a
    logo from the Christian Democratic Union (CDU), a major political party
    in Germany"; "German-language lure document contains a phishing link
    directing victims to a malicious ZIP file containing a ROOTSAW
    dropper"; "ROOTSAW delivered a second-stage CDU-themed lure document
    and a next stage WINELOADER payload"; "WINELOADER is invoked via a DLL
    side loading technique into a legitimate Windows executable"
    (sqldumper.exe); "WINELOADER was first observed in operational use in
    late January 2024 ... targeting likely diplomatic entities in Czechia,
    Germany, India, Italy, Latvia, and Peru"; "departure from this APT29
    initial access cluster's typical remit of targeting governments,
    foreign embassies, and other diplomatic missions ... first time
    Mandiant has seen an operational interest in political parties."
    VERIFIED in the Backchannel raw: APT29 "continues to prioritise
    European Ministries of Foreign Affairs and embassies"; targeting
    "diplomatic entities associated with" NATO/EU member states; ROOTSAW +
    follow-on ZIP to actor-controlled/compromised sites. STRUCK unsourced
    embellishments from the prior prose: "successor loaders" (only
    WINELOADER is named), "rapid domain-rotation infrastructure to reduce
    signature exposure as Western telemetry ... matured" (not carried),
    "DLL search-order hijacking" (raw term is DLL SIDE-LOADING). incident_type
    corrected [intrusion, data-theft] -> [intrusion, espionage]: no
    confirmed bulk exfiltration is documented — the reports document
    spearphishing -> backdoor delivery for foreign-intelligence collection.
    initial_vector phishing kept (spearphishing lures). Fixed the summary's
    "January 2024 NCSC ... cloud-access advisory" -> February-2024 AA24-057A
    (its real release date).

    [b] ATTRIBUTION — named-unit / high / concur, source = the WINELOADER
    report (verbatim quote in attribution notes). SVR is explicitly named
    ("linked by multiple governments to Russia's Foreign Intelligence
    Service (SVR)"), so named-unit (not merely the APT29 cluster). Backchannel
