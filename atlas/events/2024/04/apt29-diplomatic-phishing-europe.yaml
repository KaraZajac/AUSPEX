id: 2024-04/apt29-diplomatic-phishing-europe
name: "APT29 (SVR) WINELOADER spearphishing — German political parties and European diplomatic entities"
start_date: 2024-01-01  # month anchor: WINELOADER "first observed in operational use in late January 2024" (Mandiant); the CDU-themed German political-party campaign ran late February 2024
disclosure_date: 2024-03-22  # Mandiant WINELOADER / German-political-parties report. The event id's legacy "2024-04" prefix derives from a since-corrected 2024-04-24 date and is retained per the stable-id rule.
end_date: null
incident_type:
  - intrusion
  - espionage
initial_vector: phishing
outcome_summary: |
  In late February 2024 Mandiant identified APT29 (SVR) running a
  spearphishing campaign against German political parties, using emails
  posing as an invite to a 01 March dinner reception bearing the logo of
  the Christian Democratic Union (CDU). The German-language lure linked to
  a malicious ZIP holding a ROOTSAW (EnvyScout) dropper that delivered a
  second-stage CDU-themed decoy and the WINELOADER backdoor, invoked by
  DLL side-loading into a legitimate Microsoft binary (sqldumper.exe).
  WINELOADER had first been seen in operational use in late January 2024
  against likely diplomatic entities in Czechia, Germany, India, Italy,
  Latvia, and Peru. Mandiant called the political-party targeting a
  departure from — and the first observed instance beyond — this cluster's
  usual remit of governments, foreign embassies, and diplomatic missions,
  judging it a broad threat to European and other Western political
  parties given Moscow's interest in changing Western political dynamics
  related to Ukraine.
false_flag_risk: none
summary: |
  APT29's diplomatic-themed spearphishing kept evolving through the
  post-invasion period. Mandiant's September-2023 "Backchannel Diplomacy"
  reporting shows the cluster prioritising European Ministries of Foreign
  Affairs, embassies, and NATO/EU-associated diplomatic entities,
  delivering its mainstay ROOTSAW first stage from actor-controlled and
  compromised websites with follow-on ZIP payloads. By early 2024 the same
  ROOTSAW delivery chain was carrying a new backdoor, WINELOADER, and the
  actor extended its collection from diplomatic missions to political
  parties (the CDU-themed German campaign of late February 2024). Sits, as
  corpus context, alongside the January-2024 APT29 Microsoft "Midnight
  Blizzard" corporate intrusion and the February-2024 Five Eyes SVR
  cloud-access advisory (AA24-057A).
