outcome_summary: |
  After roughly 15 years of independent UN sanctions
  monitoring on the DPRK (the Panel was established pursuant
  to resolution 1874 (2009)), the 1718 Panel of Experts
  mandate expired on 30 April 2024, the UN Security Council
  having failed to renew it on 28 March 2024 when the Russian
  Federation cast a veto (vote 13 in favour, 1 against, 1
  abstention — China). The Panel's final report (S/2024/215,
  released 7 March 2024) was investigating 58 suspected DPRK
  cyberattacks worth approximately $3B in cryptocurrency theft
  over 2017–2023, attributed to actors subordinate to the
  Reconnaissance General Bureau (Kimsuky, the Lazarus Group,
  Andariel, BlueNoroff). The Multilateral Sanctions Monitoring
  Team (MSMT) — an 11-member-state coalition including the US,
  UK, ROK and Japan, launched in 2024 with its first report in
  2025 — functionally substitutes for the Panel but lacks its
  UN Security Council legal mandate.
false_flag_risk: none
summary: |
  Not a cyber event. Captured as a `documentary`/`policy`
