id: 2024-04/anssi-jop-2024-threat-evaluation
name: ANSSI / CERT-FR publishes Paris 2024 Olympic-Games threat evaluation
start_date: 2024-04-17  # publication act — forward-looking JOP 2024 threat forecast; no prior operation
disclosure_date: 2024-04-17
end_date: 2024-04-17
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-003 (17 April 2024),
  "Grands évènements sportifs en France – Évaluation de la menace
  2024" — a 28-page threat evaluation for the Paris 2024 Olympic and
  Paralympic Games (JOP 2024). The report is structured by attacker
  GOAL rather than by named cluster: (2) lucrative attacks — the
  principal identified threat — against organizers, athletes and
  spectators (spectator scams, ransomware, DDoS/data-disclosure
  extortion, resale of stolen data); (3) destabilization (sabotage,
  DDoS, defacement, hack-and-leak); and (4) espionage (targeted +
  supply-chain). ANSSI states that at the time of writing it had
  observed no cyberattack directly linked to JOP 2024 — only "appels
  à mener des actions hacktivistes" (calls to conduct hacktivist
  actions) had been recorded. Each goal is illustrated with historical
  precedents in a deliberately hedged register: the Olympic Destroyer
  wiper at PyeongChang 2018 (attributed publicly by NCSC-UK to the
  Russian military-intelligence GRU); the 2020-2021 GRU reconnaissance
  against the Tokyo Games, which "aurait employé le mode opératoire
  réputé russe SANDWORM" but which ANSSI can neither confirm nor deny;
  PLAY ransomware against the French rugby federation (June 2023); a
  REVIL-impersonation DDoS extortion against VoIP.ms; the 2016
  WADA/AMA hack-and-leak by "attaquants réputés russes"; and the
  Fujitsu/ProjectWEB supply-chain compromise affecting Tokyo 2020
  (reported by Japanese media as CIRCUIT PANDA, "réputé chinois",
  again unconfirmed by ANSSI). The threat surface named spans the host
  country, organizers, their providers/subcontractors (supply-chain),
  sponsors, athletes, spectators/broadcast viewers, official
  delegations and certain State services.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  ANSSI's pre-Games defensive-posture publication and editorial
  companion to the VIGINUM post-Games information-threat
  synthesis. Editorially significant as evidence of the
  French institutional split between cyber-incident defense
  (ANSSI / CERT-FR / CTI-003 pre-Games) and information-threat
  defense (VIGINUM post-Games synthesis), each publishing on
  their own mandate-relevant timeline.
