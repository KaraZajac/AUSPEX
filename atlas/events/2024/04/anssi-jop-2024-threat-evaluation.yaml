  notes: |
    Audited vs ANSSI/CERT-FR CERTFR-2024-CTI-003 "Grands évènements sportifs en
    France – Évaluation de la menace 2024" (17 April 2024). RAW captured: landing
    HTML (sha256 ed9741ab…1dc34d90, 16,692 B — metadata table confirms Référence
    CERTFR-2024-CTI-003, titre "Grands évènements sportifs en France – Évaluation de
    la menace 2024", Date de la première/dernière version 17 avril 2024) + the linked
    28-page PDF /uploads/CERTFR-2024-CTI-003.pdf (raw_snapshot; sha256
    3e5616ea…bd49ad70, 2,798,930 B) — all facts verified against the PDF.
    [a] FACTS — FABRICATED ACTOR NAMES STRIPPED (the load-bearing defect). The prior
    outcome_summary claimed the report "catalogs adversary clusters including
    Russia-aligned APT activity (APT28, Sandworm), criminal ransomware-affiliate
    clusters, and hacktivist disruption groups (NoName057(16) and aligned actors)."
    Against the RAW: "APT28" = 0 occurrences and "NoName057(16)"/"NoName" = 0
    occurrences in the 28-page PDF — both FABRICATED, removed. "Sandworm" = 1
    occurrence, hedged and historical (NOT a Paris-2024 forecast cluster): re the
    Tokyo 2020-2021 GRU reconnaissance, "Cette unité aurait employé le mode
    opératoire réputé russe SANDWORM mais les informations à la disposition de
    l'ANSSI ne lui permettent pas de le confirmer ou de l'infirmer." outcome_summary
    rewritten to what the report actually is: a threat evaluation STRUCTURED BY GOAL
    — §2 lucrative (named the "principale menace"), §3 destabilization, §4 espionage
    — illustrated with hedged historical precedents (Olympic Destroyer/PyeongChang
    2018, NCSC-UK→GRU; PLAY ransomware vs the FFR June 2023; REVIL-impersonation
    DDoS extortion vs VoIP.ms; 2016 WADA/AMA hack-and-leak by "attaquants réputés
    russes"; Fujitsu/ProjectWEB supply-chain vs Tokyo 2020, "CIRCUIT PANDA, réputé
    chinois" per Japanese media, unconfirmed by ANSSI). Key posture claim added
    verbatim-grounded: "Au moment de la rédaction de ce document, l'ANSSI n'a pas
    constaté d'attaque informatique ayant un lien direct avec les JOP 2024. Seuls des
    appels à mener des actions hacktivistes ont été recensés." Threat surface named
    (organizers / providers-subcontractors / sponsors / athletes / spectators-
    téléspectateurs / delegations / "certains services de l'État") is source-carried.
    operators_named [NoName057(16)] → [] (not in report; also a hacktivist group, not
    an indicted individual — the field is for named individuals).
    [b] ATTRIBUTION — attributions: [] KEPT (correct). This is a forward threat
    forecast making no sovereign attribution act; every actor reference in the report
    is generic or hedged ("des groupes d'attaquants affiliés à l'un des États", "des
    attaquants liés au renseignement militaire russe (GRU)", "réputé russe/chinois",
    "aurait employé", "aurait été conduite … mais cette information n'a pas pu être
    confirmée par l'ANSSI"). Mirrors the audited anssi-panorama sibling.
    [c] DATES — corrected. start_date 2023-01-01 (comment "pre-Games threat-window
    assessed by ANSSI") was unfounded — the report is a forecast published 2024-04-17
    for the summer-2024 Games, not an assessment of a window opening Jan 2023; set
    start_date = disclosure_date = end_date = 2024-04-17 (the publication act; no
    prior operation). Landing metadata confirms "Date de la première version 17 avril
    2024"; source published_on 2024-04-17 correct; id month 2024-04 matches.
    [d] DOCTRINE_LINKS — the known convention defect, corrected. LID/cert-fr-
    coordination: ADDED perspective: defender-response (French defensive doctrine on
    an ANSSI publication) and DOWNGRADED attested → strongly_inferred: 0 hits for
    "lutte informatique défensive" in the PDF (the sole "lutte informatique offensive"
    mention is a THREAT scenario — attackers using the Games as a pretext for
    offensive ops against the French State — not the LID defensive doctrine). The
    report performs the defensive public-reporting/forecasting function (CERTFR-CTI
    series, pre-Games evaluation) but never names the doctrine or states its purpose,
    mirroring the audited 2024-02 anssi-panorama and 2023-10 anssi-apt28 siblings.
    Added inference_basis (source_id + signals + ruled_out); attesting_source_id
    retained as the primary supporting source per the strongly_inferred convention.
    [e] ATTRIBUTION_LEVEL — n/a (no attribution rows).
    [f] ACTOR_ID — n/a (no actor; documentary forecast meta-event). No actor flags.
    Residual: targets [] retained (mirrors the anssi-panorama sibling — a forecast
    publication with, per ANSSI's own statement, no observed JOP-2024-linked attack
    and therefore no realized victim; the report's named target ecosystem is recorded
    in outcome_summary rather than asserted as target rows, to avoid sector inflation
    on a zero-attack forecast). quantified_impact {} retained (no realized impact);
    incident_type [documentary] + initial_vector unknown retained (forecast
    publication, no single vector). summary KEPT (accurate editorial framing of the
    ANSSI-pre-Games / VIGINUM-post-Games institutional split; carries no fabricated
    actor names). Level: full — the load-bearing first-party PDF is fully snapshotted
    and every retained claim is source-carried.
