summary: |
  Trend Micro (tracking the actor as Earth Hundun, aka BlackTech) detailed a 2024 cyberespionage campaign against technology, research and government organisations in the Asia-Pacific region, centred on its continuously refined Waterbear malware and its newer Deuterbear variant. The Hacker News write-up of the Trend Micro research states that a Japan-US joint cybersecurity advisory previously attributed BlackTech to China.
