false_flag_risk: none
summary: |
  Cisco Talos disclosed ArcaneDoor, an espionage campaign against perimeter network devices that compromised Cisco ASA firewalls at a small set of customers including government networks. The actors, tracked as UAT4356 (Talos) and STORM-1849 (Microsoft), deployed two custom implants: Line Dancer, an in-memory backdoor for command execution and traffic capture, and Line Runner, a persistence mechanism surviving reboots and upgrades. Two ASA vulnerabilities (CVE-2024-20353 and CVE-2024-20359) were used post-compromise; Talos stated it had not determined the initial access vector. Infrastructure was active from late 2023 with peak activity December 2023 to early January 2024. Talos assessed with high confidence that a state-sponsored actor was responsible but did not attribute the campaign to a specific nation.
