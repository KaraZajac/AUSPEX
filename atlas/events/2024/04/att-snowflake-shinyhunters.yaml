id: 2024-04/att-snowflake-shinyhunters
name: AT&T Snowflake-tenant customer call-records exfiltration
start_date: 2024-04-14
disclosure_date: 2024-07-12
end_date: 2024-04-25
incident_type:
  - data-theft
  - intrusion
  - extortion
initial_vector: valid-creds  # stolen infostealer creds -> AT&T Snowflake tenant lacking MFA
outcome_summary: |
  On April 19, 2024 AT&T learned a threat actor had copied its call
  logs; it disclosed the breach via an SEC Form 8-K (Item 1.05) on
  July 12, 2024, after the U.S. Department of Justice twice (May 9 and
  June 5, 2024) determined that a national-security disclosure delay
  was warranted. Between April 14 and April 25, 2024 the actor
  exfiltrated, from an AT&T workspace on a third-party cloud platform
  (Snowflake, per Mandiant and Krebs), records of the calls and texts
  of "nearly all" of AT&T's wireless and MVNO customers — roughly 110
  million people — covering approximately May 1 to October 31, 2022
  plus January 2, 2023. The metadata comprises the phone numbers each
  subscriber interacted with, interaction counts, and aggregate call
  duration, and for a subset the cell-site identification numbers that
  approximate device location; it excludes call/text content and
  names/SSNs. AT&T then paid approximately USD 370,000 (~5.72 BTC, on
  May 17, 2024) to a ShinyHunters-affiliated member of the intrusion
  crew to delete the dataset and supply video proof; the payment was
  verified on-chain (WIRED / TRM Labs). Cellular call-detail metadata
  at this scale is uniquely sensitive for traffic-analysis
  applications.
quantified_impact:
  individuals_affected: 110000000
  ransom_paid_usd: 370000
  months_of_cdrs_compromised: 6
false_flag_risk: none
campaign_id: shinyhunters-snowflake-cluster
operators_named:
  - moucka-connor-riley  # UNC5537 "Judische"/"Waifu"; DOJ names him the hacker responsible for the Snowflake instances incl. AT&T (indictment filed Oct 10 2024, arrested Canada Oct 30 2024)
  - binns-john-erin      # "irdev"; 404 Media/WIRED tie him to organizing the stolen AT&T data and the ransom; detained in Turkey
summary: |
  Notable cellular call-detail-metadata exfiltration sitting in the
  AUSPEX criminal-baseline corpus because the operator profile is
  cleanly financial (UNC5537 + ShinyHunters), but the dataset itself
  is exactly the kind of metadata that state SIGINT services prize for
  traffic-analysis targeting of US persons. The case is a useful
  boundary instance for the AUSPEX engine: a high state-interest
  target with no state operator.
attributions:
  - actor_id: criminal/unc5537
    attributing_org: Mandiant (with Snowflake)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2024-06-10
    attribution_source_id: mandiant/2024-06-10_unc5537-snowflake
    notes: |
      Mandiant tracks the Snowflake mass-tenant intrusion wave as
      UNC5537 — an uncategorized, financially motivated activity
      cluster (no nation). Its public report names the campaign and
      TTPs (stolen infostealer credentials, no MFA, ~165 customer
      orgs) but does not publicly name AT&T; the AT&T-as-victim link
      is carried by AT&T's 8-K, Krebs, WIRED and 404 Media. DOJ later
      attributed the intrusions to Connor Riley Moucka ("Judische")
      and John Erin Binns (indictment filed Oct 10, 2024).
  - actor_id: criminal/shinyhunters
    attributing_org: WIRED (Kim Zetter) / Bloomberg / 404 Media
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-07-14
    attribution_source_id: wired/2024-07-14_att-paid-hacker-370k-delete-records
    notes: |
      The actor who exfiltrated the AT&T dataset and received the
      ~$370K deletion ransom was identified by WIRED/Bloomberg only as
      "a member of the ShinyHunters hacking group" who stole data via
      unsecured Snowflake accounts and worked with John Erin Binns
      (404 Media tied Binns to the AT&T breach). ShinyHunters is the
      resale/extortion brand overlapping the UNC5537 intrusion
      cluster; no source names Moucka as the specific ransom recipient
      — hence concur-with-caveat.
