  notes: |
    RE-SOURCE (badrabbit model). Event previously cited ONLY
    doj/2024-01-09_raoult-shinyhunters-sentencing — the WRONG source (a
    2020–21 ShinyHunters data-broker case: Sebastien Raoult's Seattle
    sentencing), which carries none of this event's facts. Re-pointed
    to six real primaries and audited against their raw snapshots. The
    Raoult source is NOT orphaned (9 other legitimate Raoult/ShinyHunters
    events still cite it) so it was left intact.

    [a] FACTS — all now source-carried:
    • Disclosure via SEC 8-K Item 1.05 on 2024-07-12, after DOJ delay
      determinations 2024-05-09 and 2024-06-05 — AT&T 8-K
      (8ebb2dc7…0ec84148, 77,856 B): "Item 1.05 Material Cybersecurity
      Incidents. On April 19, 2024, AT&T ... learned that a threat
      actor claimed to have unlawfully accessed and copied AT&T call
      logs"; "the U.S. Department of Justice determined that, under
      Item 1.05(c) ... a delay ... was warranted."
    • Exfil window April 14–25, 2024; records span ~May 1–Oct 31, 2022
      + Jan 2, 2023 — 8-K: "between April 14 and April 25, 2024,
      exfiltrated files containing AT&T records of customer call and
      text interactions that occurred between approximately May 1 and
      October 31, 2022, as well as on January 2, 2023." → end_date
      CORRECTED 2024-07-31 → 2024-04-25 (July 31 was unsupported by any
      source).
    • "nearly all" wireless+MVNO customers ≈110M; metadata = numbers
      interacted with + interaction counts + aggregate duration +
      (subset) cell-site IDs approximating location; excludes
      content/SSNs — 8-K verbatim + Krebs (7dff0e18…b94804c8,
      91,453 B): "records for roughly 110 million people — nearly all
      of its customers"; "a subset of stolen records included
      information about the location of cellular communications towers
      ... to determine the approximate location." NOTE the 8-K itself
      says "third-party cloud platform" and gives NO count; the "110M"
      and "Snowflake" naming are carried by Krebs + Mandiant.
      outcome_summary rewritten to attribute each fact to what carries
      it; added the cell-site/location detail (load-bearing for the
      SIGINT-value framing) and the Jan 2 2023 sliver.
    • Intrusion = stolen infostealer creds into a no-MFA Snowflake
      tenant — Mandiant (548dd3cc…a721e10, 301,145 B): "UNC5537 is
      systematically compromising Snowflake customer instances using
      stolen customer credentials"; "credentials previously stolen via
      infostealer malware"; "the account did not have multi-factor
      authentication (MFA) enabled"; "~165 potentially exposed
      organizations." Krebs: "protected only by a username and password
      (no multi-factor authentication needed)." → initial_vector
      valid-creds confirmed; incident_type gained `extortion`
      (ransom-to-delete; DOJ charges include extortion).
    • Ransom ~USD 370,000 (~5.72 BTC) paid 2024-05-17, on-chain, for
      deletion + video — WIRED (a11080e9…3ad6f56e, 1,348,585 B): "paid
      a member of the hacking team more than $300,000 to delete the
      data and provide a video demonstrating proof of deletion ... AT&T
      paid the ransom in May"; "a payment transaction occurred on May
      17 in the amount of 5.7 bitcoin ... TRM Labs ... about 5.72
      bitcoin (the equivalent of $373,646)."
    • CORRECTION (over-specification stripped): prior text said AT&T
      paid "UNC5537 actor Moucka ('Judische')." NO cited source names
      Moucka as the ransom recipient — WIRED names only "a member of
      the ShinyHunters hacking group" who "worked with John Erin
      Binns"; 404 Media (28d0bccd…ef3be2e1, 52,674 B) ties Binns (not
      Moucka) to the AT&T data: "John Binns ... is linked to the
      massive data breach of metadata belonging to nearly all of AT&T's
      customers." Recipient now described as "a ShinyHunters-affiliated
      member of the crew"; Moucka/Binns retained in operators_named as
      indicted principals; the `moucka` comment "paid the AT&T ransom"
      was corrected (he did not pay; recipient not firmly him) and
      `binns-john-erin` added.

    [b] ATTRIBUTION:
    • criminal/unc5537 — re-pointed from the Raoult source to
      mandiant/2024-06-10_unc5537-snowflake; attributing_org "Mandiant
      (with Snowflake)"; date 2024-07-12 → 2024-06-10 (Mandiant's
      report date, when UNC5537 was named); confidence high; auspex
      concur. Honest scope note added: Mandiant does not publicly name
      AT&T.
    • criminal/shinyhunters — re-pointed to
      wired/2024-07-14_att-paid-hacker-370k-delete-records;
      attributing_org "WIRED (Kim Zetter)/Bloomberg/404 Media"; date
      2024-07-14; confidence moderate; auspex concur-with-caveat. Prior
      note claimed ShinyHunters was "the original BreachForums seller
      persona offering the AT&T dataset" — that conflates the
      separately sold 2021 73M AT&T dataset; the 2024 Snowflake CDRs
      were ransomed, not publicly sold. Note corrected.

    [c] DATES: source published_on set to actual pub dates — 8-K
      2024-07-12, Mandiant 2024-06-10, Krebs 2024-07-12, WIRED
      2024-07-14 (JSON datePublished 2024-07-14T13:57-04:00), 404 Media
      2024-07-12, DOJ case page 2024-11-04 (page shows indictment filed
      2024-10-10; public-unsealing window kept for the stable id).
      Event start_date 2024-04-14 ✓, disclosure_date 2024-07-12 ✓,
      end_date corrected to 2024-04-25.

    [d] DOCTRINE_LINKS: [] — correct and preserved. Financially
      motivated criminal actor; no state doctrine applies. The
      summary's "high state-interest target, no state operator" is the
      deliberate AUSPEX rationale for keeping a criminal event as a
      boundary case (editorial, not a doctrine claim).

    [e] ATTRIBUTION_LEVEL added — UNC5537 = activity-cluster (Mandiant
      "UNC" = uncategorized, financially motivated, no nation);
      ShinyHunters = named-actor (self-claimed named group/brand, no
      nation).

    [f] ACTOR_ID: both resolve — criminal/unc5537 and
      criminal/shinyhunters exist under atlas/actors/. No actor-file
      edits made; no mis-scoping observed (both correctly criminal/*).

    SNAPSHOT DISCIPLINE: sec 8-K, Mandiant, Krebs, WIRED, 404 Media and
    DOJ all curl-captured to atlas/sources/raw/ + sha256'd (hashes
    above). WIRED (metered paywall) and 404 Media (subscriber-gated)
    nonetheless captured their load-bearing sentences (WIRED full body;
    404 Media the ungated lede); justice.gov returned the real WDWA
    case page (not the Akamai wall) at the verified URL. All six
    sources reachable + hashed → level: full.

    RESIDUAL UNCERTAINTY: the specific human who received the AT&T
    ransom is not definitively named in any cited source (WIRED: an
    unidentified ShinyHunters member linked to Binns); the event no
    longer asserts it was Moucka. "110M" vs the 8-K's "nearly all"
    (~109M elsewhere) is a rounding choice carried by Krebs.
