  notes: |
    RE-SOURCE + DELETE-candidate (badrabbit-triage outcome). Batch-40
    flagged the "8 BTC (~USD 569,000)" figure as fabricated because the
    archived Picus source has zero BTC hits. Full triage confirms the
    fabrication was a MIS-ATTRIBUTION, not an invention: the figure is
    real reporting but from a different (single, weak) source.
    [STEP-0 triage]
    - picussecurity/handala-threat-group-tactics: live URL 404s. Wayback
      20260610042622 (sha256 64b99018...; 131,876 bytes) contains ZERO
      "BTC"/"bitcoin" and NO healthcare-extortion wave. Its Feb–Jun 2024
      timeline is verbatim: "3 March 2024 – Handala claimed to have
      successfully hacked and defaced DRS RADA, an Israeli multi-purpose
      tactical radar company, threatening to leak 2 terabytes of internal
      data" and "15 June 2024 – the group claimed responsibility for a
      ransomware attack on the Ma'agan Michael Kibbutz in Israel,
      exfiltrating 22GB of data and sending over 5,000 warning SMS
      messages to residents." Healthcare appears only as a generic
      target-sector and a "February 2026" entry. -> WRONG-SOURCE for this
      event's claim; kept in sources[] as the authoritative contradicting
      timeline (and still cited by 2024-07 wiper), NOT retired.
    - socradar/2024_handala-dark-web-profile: archive/live are a 2026
      evergreen rewrite (Operation Epic Fury / Stryker, Feb–Mar 2026);
      carries no Feb–Jun 2024 healthcare-extortion claim. -> dropped from
      this event (remains cited in actor dossier + persona-launch event;
      shared record not edited).
    - TRUE SOURCE located: constella/2024-10-16_israeli-breaches (sha256
      2088... ; 140,966 bytes), Constella Intelligence blog by Jason
      Wagner, published 2024-10-16, verbatim: "Healthcare Sector
      (February – June 2024): Handala targeted hospitals and healthcare
      organizations, demanding 8 BTC (~$569,252 USD) in ransom. This
      campaign involved the theft of patient records and financial data,
      crippling healthcare operations." Snapshotted + hashed + created.
    [a] FACTS: the 8-BTC/~$569,252 figure and the patient-record/
      financial-data theft are carried ONLY by Constella (a low-tier
      aggregator naming no victim/incident) and are contradicted-by-
      omission by Picus, Cyberint, SOCRadar and Haberfeld & Weimann. The
      real Handala healthcare intrusion (Clalit Health Services) is Feb
      2026 hack-and-leak of 10,000+ patient files (Times of Israel /
      JPost / Haaretz / Ynet / Iran International, 25 Feb 2026), NOT a
      2024 bitcoin-ransom campaign. Rewrote name/outcome_summary/summary
