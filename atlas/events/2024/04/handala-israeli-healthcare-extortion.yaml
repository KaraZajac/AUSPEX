      initial_vector phishing -> unknown (no source states a vector).
    [b] ATTRIBUTION: attributing_org Picus -> Constella (single low-tier
      vendor); confidence moderate -> low; concur -> concur-with-caveat;
      attribution_source_id -> constella/2024-10-16_israeli-breaches;
      attribution_date 2024-09-01 -> 2024-10-16 (Constella publication).
      Iran nexus hedged (persona; no government attestation of Handala ->
