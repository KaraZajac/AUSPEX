id: 2024-04/handala-israeli-healthcare-extortion
name: Handala claimed Israeli-healthcare extortion campaign (Feb–Jun 2024, single-source / uncorroborated)
start_date: 2024-02-01
disclosure_date: 2024-10-16
end_date: 2024-06-30
incident_type:
  - intrusion
  - data-theft
  - leak
  - extortion
initial_vector: unknown
outcome_summary: |
  A single low-tier vendor aggregator — Constella Intelligence
  ("A Deep Dive into Recent Israeli Breaches," 16 Oct 2024) — is
  the only source reporting a Handala healthcare-extortion
  campaign in this window, stating verbatim: "Healthcare Sector
  (February – June 2024): Handala targeted hospitals and
  healthcare organizations, demanding 8 BTC (~$569,252 USD) in
  ransom. This campaign involved the theft of patient records and
  financial data, crippling healthcare operations." No victim is
  named and no other reporting corroborates it. Every detailed
  Handala timeline covering the same window (Picus, Cyberint,
  SOCRadar, Haberfeld & Weimann) instead documents the 3 Mar 2024
  DRS RADA defacement (a defense/radar company) and the 15 Jun
  2024 Ma'agan Michael Kibbutz ransomware / warning-SMS operation
  — neither is healthcare, and none mentions a bitcoin ransom. The
  8-BTC / ~$569,252 figure originates solely from Constella and is
  unverified; the earlier attribution of it to Picus Security was a
  mis-attribution (the archived Picus page has zero bitcoin
  references).
false_flag_risk: suspected  # persona presents as pro-Palestinian hacktivist
campaign_id: handala-iran-israel-campaign
summary: |
  DELETE / RE-SCOPE candidate. The event's entire premise — a
  Feb–Jun 2024 Handala extortion wave against Israeli hospitals,
  with an 8 BTC (~$569,252) ransom demand and patient-record theft
  — rests on one low-tier aggregator (Constella Intelligence,
  Oct 2024) that names no victim and no specific incident, and is
  contradicted-by-omission by every detailed Handala timeline.
  Handala's actual, well-attested 2024 modus operandi is faketivist
  hack-and-leak / defacement / SMS-extortion (DRS RADA defense
  defacement Mar 2024; Ma'agan Michael Kibbutz ransomware + 5,000
  warning SMS Jun 2024), not bitcoin-ransom hospital extortion. The
  only genuine Handala healthcare intrusion on record — Clalit
  Health Services — is a February 2026 hack-and-leak (10,000+
  patient files), a distinct later event, not a 2024 bitcoin-ransom
  campaign. Kara: recommend DELETE, or RE-SCOPE explicitly as a
  Constella-only uncorroborated claim; separately consider genuine
  events for Ma'agan Michael Kibbutz (Jun 2024) and Clalit (Feb
  2026), neither of which currently has its own event file.
