id: 2024-04/handala-israeli-healthcare-extortion
name: Handala extortion wave against Israeli healthcare organizations (Feb–Jun 2024)
start_date: 2024-02-01
disclosure_date: 2024-04-15
end_date: 2024-06-30
incident_type:
  - ransomware
  - data-theft
  - intrusion
initial_vector: phishing
outcome_summary: |
  Between February and June 2024 the Handala persona ran an
  extortion campaign against Israeli hospitals and healthcare
  organizations. Picus Security tracked ransom demands of
  ~8 BTC (approximately USD 569,000 at the time) and theft of
  patient records and financial data. Operations claimed
  disruption to hospital operations alongside the data-leak
  threat.
quantified_impact:
  btc_ransom_demand: 8
false_flag_risk: suspected  # presents as hacktivist
campaign_id: handala-iran-israel-campaign
summary: |
  Doctrinally significant: deliberate targeting of Israeli
  hospitals during the same period as the Rafah-ground-operation
  cycle. Maps to the asymmetric-warfare civilian-CII-coercion
  pillar (healthcare is explicitly named in the pillar target-
  sector list — extending the doctrine pattern that Iran applied
  to its own targets in 2021's Boston Children's Hospital
  operation back into the Israel theater under a different
  persona). The ransom-demand layer fits the sanctions-evasion
  ransomware-for-revenue doctrine, which the regime treats as
  simultaneous with coercion rather than as separate criminal
  activity.
