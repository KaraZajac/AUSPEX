  notes: |
    Audited vs the RAW SGDSN/VIGINUM page "Portal Kombat : extension du
    réseau de propagande russe" (sha256 cc791cf1…0d778621, 38874 bytes,
    curl 200 OK, no redirect). PHANTOM TRIAGE: NOT a phantom — the URL
    returns the genuine article (H1 + <title> "Portal Kombat : extension
    du réseau de propagande russe", dated "29 avril 2024"), not a
    homepage/catalogue. DUP CHECK: this is a DISTINCT extension, NOT a
    duplicate of 2024-02/viginum-portal-kombat-disclosure. The source
    self-describes as "ce troisième rapport technique … démontre
    l'extension de ce réseau" / "Réseau Portal Kombat (troisième partie)
    - 29/04/2024" — a separate later publication documenting network
    GROWTH (224 portals vs the Feb dossier's ~193) with new EU-election-
    timed and extra-European targeting. Keep both events.
    [a] FACTS — CORRECTED. Original outcome_summary claimed "African
    Francophone and Latin-American information spaces" + "expanded
    language targeting" + "pravda-prefixed cloned-news domains". RAW says
    the new geographic scoping is EU-wide ("ciblant l'audience de presque
    tous les États membres de l'Union européenne … à quelques semaines
    des élections européennes de juin 2024") plus "plusieurs pays
    d'Afrique et d'Asie" — i.e. AFRICA and ASIA, NOT Latin America
    (fabricated), and not specifically "Francophone" (unsupported). New
    domains break down verbatim as "19 visent des États membres de l'UE ;
    6 … pays européens non membres ; 3 … pays africains ; 3 … l'Asie".
    "Cloned-news" mischaracterises Portal Kombat (aggregator/re-syndication
    "portails d'information", explicitly distinct from RRN/Doppelganger
    clone-news impersonation) and "language targeting" is not on the page,
    so both were removed. Rewrote outcome_summary to the source-carried
    facts (224 portals, "quadrillage informationnel", almost-all-EU +
    June-2024-election timing, 19/6/3/3 domain split, first scoping beyond
    Europe). Added quantified_impact.portals_identified: 224 ("désormais
    224 portails d'information").
    [b] ATTRIBUTION — VIGINUM attributes the network as Russian /
    "prorusse" propaganda = NATION-level attribution to Russia; added the
    missing attribution_level: nation. No operator org is named in this
    report (grep of raw HTML for Structura/Social Design/SDA/TigR hit only
    French-govt nav boilerplate — ANSSI "Agence…", "opérateur des systèmes
    d'information"), so actor_id stays null per orchestrator's conditional
    (SDA/Structura not named). attributing_org_confidence high, concur —
    unchanged, matches a first-party govt-primary VIGINUM report.
    [c] DATES — source published_on 2024-04-29 = the page's "29 avril
    2024" ✓; event disclosure_date/end_date 2024-04-29 ✓. start_date
    2024-02-13 is an editorial "expansion-window" anchor (the day after
    the 12 Feb disclosure), not a source-stated date — left as-is and so
    commented; the report gives no precise expansion-window start.
    [d] DOCTRINE_LINKS — ADDED the attacker-rationale WHY: ru/info-
    security-2016 / info-psychological-defense (external influence
    apparatus; media/journalism), confidence strongly_inferred (source
    names Russia/pro-Russian but states no Russian doctrinal goal → not
    attested; one dominant strategic reading, ruled_out a domestic/CII
    reading). RETAGGED the pre-existing fr/lutte-informatique-influence /
    strategic-attribution link as perspective: defender-response — it is
    the French disclosing service's doctrine on a Russian operation
    (cross-state, previously untagged → would trip doctrine-state-
    mismatch); kept strongly_inferred (report does not name "LII"). No
    link is attested, so the attested-gate is satisfied.
    [e] ATTRIBUTION_LEVEL — set to nation (was missing).
    [f] ACTOR_ID — null (unattributed at operator level); resolves
    trivially. FLAG: ru/proxies/social-design-agency exists (file
    atlas/actors/ru/social-design-agency.yaml, id ru/proxies/social-
    design-agency) but is the Doppelganger/RRN operator — NOT cited for
    Portal Kombat; correctly not used here.
    RESIDUAL: the full 655 KB technical PDF (parts FR/EN) was not fetched;
    all RETAINED claims are carried by the snapshotted summary page, so
    level: full. If Kara wants the per-domain / per-language detail
    verified, the PDF would need capture (would not change any retained
    claim).
