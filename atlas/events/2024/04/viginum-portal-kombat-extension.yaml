id: 2024-04/viginum-portal-kombat-extension
name: VIGINUM / SGDSN publishes Portal Kombat extension report
start_date: 2024-02-13  # post-initial-disclosure expansion window
disclosure_date: 2024-04-29
end_date: 2024-04-29
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM's third technical report on the Portal Kombat network,
  dated 29 April 2024, documenting its expansion beyond the
  February 2024 initial disclosure: 224 pro-Russia "information
  portals" now identified (up from the ~193 in the February
  dossier), forming a meticulous "information gridding"
  (quadrillage informationnel) that targets the audiences of
  almost all EU member states weeks before the June 2024
  European elections. Of the newly identified domains, 19 target
  EU member states, 6 target non-EU European countries, 3 target
  African countries, and 3 target Asia — the first documented
  scoping of the network beyond Europe.
quantified_impact:
  portals_identified: 224
false_flag_risk: none
operators_named: []
summary: |
  Demonstrates the VIGINUM editorial practice of follow-up
  attribution after initial disclosure: rather than treating
  the February 2024 Portal Kombat report as a one-shot
  publication, the service tracks operator adaptation and
  publishes update dossiers as the network expands. The
  pattern parallels US CISA / Treasury sanctions-style
  rolling attribution.
