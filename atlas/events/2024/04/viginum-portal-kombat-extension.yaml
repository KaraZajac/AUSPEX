    pillar_id: ru/info-security-2016/info-psychological-defense
    program_id: null
    confidence: strongly_inferred
    perspective: attacker-rationale
    reasoning: |
      The WHY of the operation this report documents. Portal Kombat is
      a pro-Russian propaganda portal network laundering Russian-state-
      aligned narratives into foreign information spaces; VIGINUM's
      third technical report shows it grown to 224 portals blanketing
      almost all EU member states weeks before the June 2024 European
      elections, plus new African and Asian targeting. That external
      information-influence apparatus is precisely what Russia's 2016
      Information Security Doctrine underwrites (continuous "information
      confrontation" / informatsionnoye protivoborstvo and neutralising
      adverse information-psychological impact). VIGINUM attributes the
      network as Russian / pro-Russian propaganda but does not articulate
      a Russian doctrinal goal, so the link is strongly_inferred, not
      attested.
    attesting_source_id: sgdsn/2024-04-29_portal-kombat-extension
    inference_basis:
