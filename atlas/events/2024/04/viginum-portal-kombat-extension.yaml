        - "the network launders Russian-state-aligned narratives to foreign audiences, now extending to African and Asian countries — the external influence apparatus the 2016 Information Security Doctrine authorises"
      ruled_out: "a domestic information-control / CII reading — the network exclusively targets foreign audiences, so the external information-psychological pillar applies, not critical-information-infrastructure"
