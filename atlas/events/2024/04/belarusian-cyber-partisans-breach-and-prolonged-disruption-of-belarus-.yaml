id: 2024-04/belarusian-cyber-partisans-breach-and-prolonged-disruption-of-belarus-
name: "Belarusian Cyber Partisans breach and prolonged disruption of Belarus KGB network"
start_date: 2024-04-27
incident_type:
  - intrusion
