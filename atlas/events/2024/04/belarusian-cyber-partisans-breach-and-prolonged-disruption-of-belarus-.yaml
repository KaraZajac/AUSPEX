false_flag_risk: none
summary: |
  On 27 Apr 2024 the anti-Lukashenko hacktivist group Belarusian Cyber Partisans announced they had penetrated the Belarus KGB network in fall 2023, exfiltrating personnel files for more than 8,600 KGB employees and suppressing/taking the KGB's official website offline for over two months. They published administrator lists, the underlying database, and server logs as proof. This is an anti-regime operation against the Belarusian state (the actor opposes, and is not sponsored by, the state). Distinct from the corpus's 2021 Lukashenko-database leak and 2022 BZhD railway events. Maps to by/concept-info-security-2019 as a counter-doctrine challenge to regime information control.
