  notes: "Audited vs securityaffairs (raw captured, sha256 ca139a61...). FACTS confirmed: Belarus KGB network penetrated fall 2023; >8,600 KGB personnel files exfiltrated; KGB website down >2 months (group claim 'we had to close the site'); admin lists/database/server logs published as proof; announced 27 Apr 2024. Anti-regime framing confirmed ('target of its attacks are not Belarusians but the county government'; coordinator Y. Shametavets on-record to AP). ATTRIBUTION: self-claimed hacktivist op corroborated by journalism source; confidence high retained (published proof + on-record confirmation); auspex concur-with-caveat retained (self-claim). published_on 2024-04-27 matches article. ACTOR PLACEMENT: by/cyber-partisans correctly modeled as anti-Lukashenko counter-state collective (primary_service_id null) — unusual non-state-actor-vs-its-own-state case, verified the source frames it as such; not stale. CORRECTIONS: attributing_org 'securityaffairs' -> 'Belarusian Cyber Partisans (self-claim)' to match sibling cyber-partisans events (2021-07, 2022-01); added attribution_level named-actor; added source raw_snapshot+content_sha256. DOCTRINE: doctrine_links left [] (conservative) — op runs AGAINST by/concept-info-security-2019 (regime doctrine; actor record states alignment is inverted), so an untagged attacker-rationale link would be semantically wrong. NB sibling 2022-01 carries an untagged 'plausible' link to this same doctrine (escapes verifier only because actor+doctrine are both 'by'); if a link is desired here it should be perspective: victim-response, not the default — flagged for human review rather than originated in this audit."
