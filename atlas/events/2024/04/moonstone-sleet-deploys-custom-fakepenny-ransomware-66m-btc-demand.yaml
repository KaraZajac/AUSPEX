id: 2024-04/moonstone-sleet-deploys-custom-fakepenny-ransomware-66m-btc-demand
name: "Moonstone Sleet deploys custom FakePenny ransomware ($6.6M BTC demand)"
start_date: 2024-04-01
incident_type:
  - ransomware
  - financial-theft
  - extortion
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence (MSTIC) reported that the North Korean state-aligned actor Moonstone Sleet (formerly Storm-1789) delivered a new custom ransomware variant, FakePenny, in April 2024 against a company it had previously compromised in February, demanding a $6.6M USD ransom in BTC — the actor's first observed ransomware deployment. The same month MSTIC observed Moonstone Sleet compromise a drone-technology company, and in May 2024 an aircraft-parts maker. Moonstone Sleet also ran fake companies (StarGlow Ventures, C.C. Waterfall), a trojanized tank game (DeTankWar), and IT-worker schemes, blending cyberespionage with revenue generation. This event isolates the FakePenny ransomware operation; the companion corpus event 2024-05/moonstone-sleet-microsoft-disclosure covers MSTIC's 28 May 2024 cluster disclosure as a whole.
attributions:
