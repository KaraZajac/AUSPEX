        - "DPRK hard-currency procurement is run outside the legitimate financial order and aggregated via Office 39 (doctrine summary; Treasury/UN-PoE corroboration)"
      ruled_out: "Office 39 / WMD-financing as a stated goal — MSTIC names only 'financial gain'/'revenue generation', never the sanctions-evasion mechanism or weapons-procurement end"
    contested: false
