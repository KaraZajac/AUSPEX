id: 2024-04/moonstone-sleet-deploys-custom-fakepenny-ransomware-66m-btc-demand
name: "Moonstone Sleet deploys custom FakePenny ransomware ($6.6M BTC demand)"
start_date: 2024-04-01
incident_type:
  - ransomware
  - financial-theft
