  notes: "Audited vs Microsoft MSTIC (raw captured, HTTP 200, 321,294 bytes, sha256 8aecf4f... verified intact). FACTS confirmed verbatim: FakePenny (first observed DPRK ransomware-by-this-actor); '$6.6M USD in BTC' demand; April 2024 against a company 'previously compromised in February'; drone-tech + aircraft-parts (defense/aerospace) victims; StarGlow Ventures/C.C. Waterfall/DeTankWar; Storm-1789 former name. ATTRIBUTION: MSTIC attributes ONLY at nation level ('North Korean state-aligned'/'North Korean state-sponsored threat actor'); RGB/Reconnaissance General Bureau/Bureau 121/Unit 121/Lab 110 appear ZERO times — actor kp/unscoped/moonstone-sleet (named-actor, NOT named-unit RGB) is correct. Added attribution_level: named-actor (was missing). doctrine_link kept strongly_inferred: MSTIC names proximate purpose 'financial gain'/'revenue generation' but never Office 39 / WMD-financing / 8th-Congress plan — not attested; added inference_basis + supporting source. CORRECTIONS: published_on of cited source was 2024-04-01 (wrong) → the article published 2024-05-28 (April = activity date); re-pointed event from the PROVISIONAL backfill duplicate source microsoft/2024-04_moonstone-sleet-deploys-custom-fakepenny to the canonical, already-audited msft/2024-05-28_moonstone-sleet (same article, verified raw snapshot, also used by the actor + sibling event 2024-05/moonstone-sleet-microsoft-disclosure). Fixed false summary claim of an 'August 2023 MSTIC outing' — no such event; the only sibling is the 2024-05-28 disclosure (its start_date 2023-08-01 = earliest tracked activity, not an outing). FLAG: microsoft/2024-04_moonstone-sleet-deploys-custom-fakepenny is now an unreferenced duplicate orphan (date-corrected + snapshot-tagged in place) for a future source-dedup pass."
