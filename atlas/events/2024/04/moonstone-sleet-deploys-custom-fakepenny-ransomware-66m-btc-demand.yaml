    attributing_org: "Microsoft MSTIC"
    attributing_org_confidence: high   # MSTIC states the attribution without hedging
    attribution_level: named-actor   # MSTIC attributes at the nation level ("North Korean state-aligned"); never names the RGB/Bureau 121/Unit 121 — so named-actor, NOT named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-05-28
    attribution_source_id: msft/2024-05-28_moonstone-sleet
doctrine_links:
