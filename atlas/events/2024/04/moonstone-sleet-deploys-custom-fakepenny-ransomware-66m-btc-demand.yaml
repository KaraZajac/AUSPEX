    pillar_id: kp/office-39-sanctions-evasion/laundering-network
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      FakePenny ransomware demanding $6.6M in BTC, alongside fake companies and IT-worker schemes blending espionage with revenue generation, is hard-currency aggregation outside the legitimate financial order — the Office 39 sanctions-evasion principle. MSTIC states the proximate purpose ("Microsoft assesses that Moonstone Sleet's objective in deploying the ransomware is financial gain", "revenue generation") but does not name Office 39, WMD-financing, or the 8th-Congress plan, so the link to the laundering/sanctions-evasion doctrine is inferred, not attested.
