false_flag_risk: none
summary: |
  Microsoft Threat Intelligence disclosed that the North Korean actor Moonstone Sleet (formerly Storm-1789) delivered a new custom ransomware variant, FakePenny, in April 2024 against a company it had previously compromised in February, demanding a $6.6M USD ransom in BTC — the group's first observed ransomware deployment. Moonstone Sleet also ran fake companies (StarGlow Ventures, C.C. Waterfall), a trojanized tank game (DeTankWar), and IT-worker schemes, blending espionage with revenue generation. This is a distinct operational event from the August 2023 MSTIC outing of Moonstone Sleet already in the corpus (which is the only existing Moonstone Sleet entry).
