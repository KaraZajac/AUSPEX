initial_vector: unknown  # no new intrusion — data already exfiltrated in the Feb 2024 ALPHV event
outcome_summary: |
  RansomHub, a ransomware-as-a-service brand that emerged in February
  2024, posted to its dark-web leak site on April 8, 2024 that it held
  ~4TB (claimed) of Change Healthcare patient and claims data and
  threatened to sell it to the "highest bidder" unless UnitedHealth
  paid a fresh ransom; it published a sample subset that WIRED and
  BleepingComputer assessed as appearing legitimate. The dataset was
  the same trove retained by the ALPHV affiliate "Notchy" after the
  February 2024 intrusion. The repost followed ALPHV's late-February–
  early-March 2024 exit scam, in which the ALPHV operator pocketed
  UnitedHealth's ~USD 22M ransom payment (paid March 1) and left the
  affiliate holding the stolen data. The affiliate re-monetized the
  trove under the RansomHub brand — RansomHub itself told WIRED it
  "is not affiliated with AlphV," i.e. the affiliate, not the ALPHV
  operator, carried the data across brands. The episode is a canonical
  case of RaaS affiliate-portability defeating ransom-payment-based
  incident closure: the $22M payment did not prevent re-extortion.
quantified_impact:
  data_exfiltrated_tb: 4  # RansomHub's claimed volume; WIRED notes it is unclear they hold the full 4TB
false_flag_risk: none
campaign_id: change-healthcare-alphv-ransomhub
summary: |
  AUSPEX criminal-baseline case documenting how ransomware-as-a-
  service affiliate portability destabilizes operator-level doctrinal
  classification across an incident lifecycle. The original February
  2024 intrusion is tracked at `criminal/alphv` and this RansomHub
  re-extortion at `criminal/ransomhub`; both sit in the criminal
  baseline — neither carries a source-documented state nexus (ALPHV
  was re-homed from `ru/proxies/alphv` to `criminal/alphv` for lack of
  documented Russia-state tasking). The same stolen dataset moves from
  one branded RaaS operator to another via a portable affiliate
  ("Notchy"), so the perpetrating brand changes mid-incident while the
  underlying operator (the affiliate) does not — which is why AUSPEX
  models the two stages as separate events under one `campaign_id`.
