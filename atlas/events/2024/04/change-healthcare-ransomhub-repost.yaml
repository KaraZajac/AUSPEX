id: 2024-04/change-healthcare-ransomhub-repost
name: RansomHub re-extortion of Change Healthcare data
start_date: 2024-04-08
disclosure_date: 2024-04-08
end_date: 2024-05-31
incident_type:
  - data-theft
initial_vector: unknown  # data already exfiltrated by ALPHV affiliate
outcome_summary: |
  RansomHub posted ~4TB of Change Healthcare patient and claims
  data — the same dataset previously held by the ALPHV affiliate
  "Notchy" after the February 2024 intrusion — on its leak site
  April 8, 2024. The repost followed ALPHV's late-February exit
  scam, in which the ALPHV operator pocketed UnitedHealth's
  approximately USD 22M ransom payment and left the affiliate
  with the stolen data. The affiliate migrated to RansomHub and
  re-monetized the dataset under the RansomHub brand. The
  episode is the canonical case of RaaS affiliate-portability
  defeating ransom-payment-based incident closure.
quantified_impact:
  data_exfiltrated_tb: 4
false_flag_risk: none
campaign_id: change-healthcare-alphv-ransomhub
summary: |
  Important AUSPEX criminal-baseline case for an unusual reason:
  the ALPHV cluster carrying the original intrusion is tracked
  at `ru/proxies/alphv` as Russian-state-tolerated, but the
  same affiliate's RansomHub-branded re-extortion lives in the
  criminal-baseline corpus. The asymmetry illustrates how
  affiliate portability between state-tolerated and non-
  attributed brand operators makes operator-level doctrinal
  classification unstable across an incident lifecycle.
