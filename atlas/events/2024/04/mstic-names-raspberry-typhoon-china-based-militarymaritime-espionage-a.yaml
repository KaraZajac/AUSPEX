    FACTS: confirmed verbatim — "In June 2023, Raspberry Typhoon, a nation-state activity group
    based out of China, successfully targeted military and executive entities in Indonesia and a
    Malaysian maritime system in the weeks prior to a rare multilateral naval exercise involving
