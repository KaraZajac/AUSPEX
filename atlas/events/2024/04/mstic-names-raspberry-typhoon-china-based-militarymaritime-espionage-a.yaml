id: 2024-04/mstic-names-raspberry-typhoon-china-based-militarymaritime-espionage-a
name: "MSTIC names Raspberry Typhoon — China-based military/maritime espionage around the South China Sea"
start_date: 2024-04-04
incident_type:
  - intrusion
  - espionage
  - reconnaissance
false_flag_risk: none
summary: |
  Microsoft's "Same targets, new playbooks" East Asia report (Microsoft Threat Analysis Center / MTAC, drawing on Microsoft Threat Intelligence taxonomy) names Raspberry Typhoon, a nation-state activity group based out of China that targets entities tied to China's South China Sea interests. The report states that in June 2023 Raspberry Typhoon successfully targeted military and executive entities in Indonesia and a Malaysian maritime system in the weeks before a rare multilateral naval exercise involving Indonesia, China, and the United States. The report attributes the group at nation level only (China) and names no Chinese intelligence service or unit; it does not specify the initial access vector. Microsoft does not in this report equate Raspberry Typhoon with Lotus Blossom / Billbug / Thrip.
attributions:
  - actor_id: cn/unscoped/lotus-blossom
    attributing_org: "Microsoft Threat Intelligence (MSTIC)"
    attributing_org_confidence: high   # MSTIC states the targeting as established fact ("successfully targeted"), no hedge
    attribution_level: nation          # report names China only — no service/unit (no MSS/PLA) for Raspberry Typhoon
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-04-04
    attribution_source_id: microsoft/2024-04_mstic-names-raspberry-typhoon-china-base
    notes: "MSTIC names 'Raspberry Typhoon', NOT Lotus Blossom, and does not equate the two; the link to the Lotus Blossom actor record rests on an AUSPEX editorial alias (confidence: disputed) — see auspex_assessment: concur-with-caveat."
doctrine_links:
  - doctrine_id: cn/intelligentized-warfare
    pillar_id: cn/intelligentized-warfare/sigint-c4isr-collection
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      Targeting of military and executive entities tied to China's South China Sea interests (Indonesian military, a Malaysian maritime system) timed to a US-China-Indonesia naval exercise is military/maritime intelligence collection against regional C4ISR, advancing PRC strategic situational awareness in the SCS.
    attesting_source_id: null   # MSTIC names the behaviour/target/timing but NOT the strategic purpose → not attested
    inference_basis:
      signals:
        - "Victims are military and executive entities (Indonesia) plus a Malaysian maritime system — defense/maritime C4ISR-adjacent, not commercial."
        - "Timing keyed to a rare Indonesia-China-US multilateral naval exercise (June 2023), per the source 'in the weeks prior' — exercise-collection pattern."
        - "Espionage/reconnaissance intrusion (no destructive effect reported) tied explicitly to China's South China Sea interests."
      ruled_out: "cn/intelligentized-warfare/pre-positioning (Volt/Flax-style CII pre-positioning for wartime disruption) — the reported activity is espionage/recon against military-decision and maritime targets around an exercise, i.e. collection, with no foothold-for-disruption in civilian CII described in the source."
    contested: false
    analyst: claude
