id: 2024-04/mstic-names-raspberry-typhoon-china-based-militarymaritime-espionage-a
name: "MSTIC names Raspberry Typhoon — China-based military/maritime espionage around the South China Sea"
start_date: 2024-04-04
incident_type:
  - intrusion
  - espionage
  - reconnaissance
false_flag_risk: none
summary: |
  Microsoft's MSTIC (East Asia threat-landscape report) names Raspberry Typhoon, a nation-state activity group based out of China that targets entities tied to China's South China Sea interests. Microsoft reports Raspberry Typhoon successfully targeted military and executive entities in Indonesia and a Malaysian maritime system, with activity coinciding with June 2023 US-China-Indonesia naval exercises. The report does not specify the initial access vector. Microsoft does not in this report equate Raspberry Typhoon with Lotus Blossom / Billbug / Thrip.
