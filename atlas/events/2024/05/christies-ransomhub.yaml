outcome_summary: |
  RansomHub-claimed intrusion of Christie's systems on 8-9 May 2024,
  days before the auction house's ~USD 840M spring sales (headlined by
  a $35M Vincent van Gogh). Christie's took its website offline on 9 May
  citing a "technology security incident," knocking out online viewing
  and bidding; the marquee auctions proceeded via phone and in-person
  bidding, and a rare-watches sale (incl. Michael Schumacher's) was
  delayed. On 27 May RansomHub listed Christie's on its darknet extortion
  site with sample data, claiming ~2GB covering "at least 500,000"
  private clients worldwide. Christie's CEO Guillaume Cerutti confirmed
  unauthorized third-party access and theft of some client identity data
  but said there was "no evidence of any financial or transactional data"
  taken; Christie's refused to negotiate — RansomHub said the house
  "ceased communication midway through" — and did not pay within the
  seven-day deadline. Christie's notified privacy regulators and affected
  clients. Breach-notification reporting later put the confirmed total at
  45,798 individuals — far below RansomHub's 500,000 claim.
quantified_impact:
  individuals_affected: 45798
  individuals_claimed_by_actor: 500000
false_flag_risk: none
summary: |
  High-profile RansomHub data-extortion case against a global art-market
  institution, timed to Christie's May spring auction season. The
  exfiltrated dataset was client identity PII — full names, addresses,
  and the machine-readable zones of government identity documents
  (passports) that Christie's collects for anti-money-laundering
  compliance — covering private art buyers across many jurisdictions.
  It was NOT financial or transactional data: Christie's CEO stated
  there was "no evidence of any financial or transactional data … taken
  or copied." RansomHub's 2024 victim set spans healthcare, telecom,
  energy services and the luxury / art market with no discernible
  doctrinal targeting pattern — consistent with affiliate-driven,
  opportunistic ransomware-as-a-service selection rather than any
  strategic direction.
