id: 2024-05/christies-ransomhub
name: RansomHub data extortion of Christie's auction house
start_date: 2024-05-09
disclosure_date: 2024-05-30
end_date: 2024-06-30
incident_type:
  - intrusion
  - data-theft
initial_vector: unknown
outcome_summary: |
  RansomHub-claimed intrusion of Christie's IT environment days
  before its May spring auction season (combined USD 840M asset
  catalog including Andy Warhol and Vincent van Gogh works).
  Christie's website went offline for several days; bidding was
  forced to phone and in-person channels. RansomHub claimed
  exfiltration of approximately 500,000 client KYC and identity
  records covering high-net-worth art buyers. Christie's
  acknowledged the incident May 30, 2024 but declined to pay
  ransom; sample data was subsequently published on the
  RansomHub leak site.
quantified_impact:
  individuals_affected: 500000
false_flag_risk: none
summary: |
  High-profile RansomHub case against a global art-market
  institution. Notable for the wealth-sensitivity of the
  exfiltrated dataset (KYC / source-of-funds records covering
  ultra-high-net-worth individuals across multiple jurisdictions).
  RansomHub's mid-2024 victim distribution spans healthcare,
  energy services, and luxury / hospitality with no discernible
  doctrinal targeting pattern, consistent with affiliate-driven
  opportunistic selection.
attributions:
  - actor_id: criminal/ransomhub
    attributing_org: Christie's + RansomHub (self-claimed)
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-05-30
    attribution_source_id: ncsc-uk/2024-06-04_synnovis-qilin-statement
    notes: |
      Christie's confirmed the incident in press statements May 30
      2024; RansomHub self-claimed via its leak site. No primary
      CISA / NCSC advisory specific to the Christie's case;
      attribution_source_id is a placeholder pointing at the
      nearest contemporaneous primary source documenting RansomHub
      activity.
doctrine_links: []
