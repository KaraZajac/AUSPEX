    notes: |
      ShinyHunters (the BreachForums administrator brand) publicly
      claimed the sale of the Ticketmaster data; BleepingComputer names
      the actor directly ("ShinyHunters has been attempting to sell the
      Ticketmaster data on a hacking forum for $500,000"). Named-actor
      (self-claimed named group/brand, no nation). ShinyHunters is the
      resale/leak persona overlapping the UNC5537 intrusion cluster —
      hence the fuzzy boundary noted in the summary.
  - actor_id: criminal/unc5537
    attributing_org: Mandiant (with Snowflake)
    attributing_org_confidence: high
    attribution_level: activity-cluster
    auspex_assessment: concur
    attribution_date: 2024-06-10
    attribution_source_id: mandiant/2024-06-10_unc5537-snowflake
    notes: |
      Mandiant tracks the Snowflake mass-tenant intrusion wave as
      UNC5537, an uncategorized financially-motivated activity cluster
      (no nation), using infostealer-stolen credentials against
      MFA-less tenants across ~165 organizations. Mandiant's public
      blog does NOT name Ticketmaster; the Ticketmaster-as-Snowflake-
      victim link is carried by Ticketmaster's own confirmation to
      TechCrunch that the stolen database was hosted on Snowflake. DOJ
      later indicted Connor Riley Moucka and John Erin Binns for the
      campaign (case unsealed Nov 2024).
