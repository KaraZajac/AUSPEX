id: 2024-05/ticketmaster-shinyhunters-leak
name: ShinyHunters leak-site posting of Ticketmaster customer data
start_date: 2024-05-20
disclosure_date: 2024-05-31
end_date: 2024-06-30
incident_type:
  - data-theft
initial_vector: valid-creds  # via UNC5537 Snowflake-tenant access
outcome_summary: |
  ShinyHunters posted approximately 1.3TB of stolen Ticketmaster
  / Live Nation customer data on BreachForums May 20, 2024 —
  ~560 million customer records including names, addresses,
  partial payment-card data, and order history. Live Nation
  confirmed the incident via SEC 8-K filing May 31 2024 and
  attributed it to "an unauthorized activity within a third-
  party cloud database environment" — subsequently identified
  as the Snowflake customer-tenant intrusion by UNC5537. The
  Ticketmaster dataset is the single largest publicly-known
  exfiltration from the Snowflake campaign.
quantified_impact:
  individuals_affected: 560000000
  data_exfiltrated_tb: 1.3
  asking_price_usd: 500000
false_flag_risk: none
campaign_id: shinyhunters-snowflake-cluster
summary: |
  Notable for the ShinyHunters / UNC5537 cluster-overlap pattern:
  UNC5537 was the intrusion operator using infostealer-log
  credentials against MFA-less Snowflake tenants; ShinyHunters
  was the leak-site / monetization persona. Both are tracked
  separately at `criminal/shinyhunters` and `criminal/unc5537`
  with fuzzy cluster boundary. The case is a key node in the
  AUSPEX criminal-baseline corpus as the largest individuals-
  affected single posting.
attributions:
  - actor_id: criminal/shinyhunters
    attributing_org: Live Nation + Mandiant + journalism consensus
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-05-31
    attribution_source_id: doj/2024-01-09_raoult-shinyhunters-sentencing
  - actor_id: criminal/unc5537
    attributing_org: Mandiant + Snowflake
    attributing_org_confidence: high
    auspex_assessment: concur
    attribution_date: 2024-06-10
    attribution_source_id: doj/2024-01-09_raoult-shinyhunters-sentencing
    notes: |
      UNC5537 cluster boundary established by Mandiant's June 10
      2024 publication.
doctrine_links: []
targets:
  - target_id: orgs/ticketmaster
    role: primary
sources:
  - doj/2024-01-09_raoult-shinyhunters-sentencing
