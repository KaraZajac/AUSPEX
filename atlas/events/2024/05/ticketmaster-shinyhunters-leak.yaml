id: 2024-05/ticketmaster-shinyhunters-leak
name: ShinyHunters leak-site posting of Ticketmaster customer data
start_date: 2024-05-20
disclosure_date: 2024-05-31
end_date: null
incident_type:
  - data-theft
  - leak
initial_vector: valid-creds  # infostealer creds -> MFA-less Snowflake tenant (UNC5537 cluster)
outcome_summary: |
  On May 20, 2024 Live Nation Entertainment identified "unauthorized
  activity within a third-party cloud database environment containing
  Company data (primarily from its Ticketmaster L.L.C. subsidiary)";
  on May 27, 2024 "a criminal threat actor offered what it alleged to
  be Company user data for sale via the dark web" (Live Nation SEC
  Form 8-K, filed May 31, 2024, Item 8.01 — the company deemed the
  incident immaterial). The BreachForums administrator operating under
  the ShinyHunters brand advertised approximately 1.3TB of stolen
  Ticketmaster / Live Nation data — claimed to cover ~560 million
  customers (names, addresses, phone numbers, order history, and
  partial payment-card data) — for USD 500,000 (BleepingComputer,
  TechCrunch). A Ticketmaster spokesperson confirmed to TechCrunch that
  the stolen database was hosted on Snowflake; the intrusion is part of
  the Snowflake customer-tenant credential-abuse wave that Mandiant
  tracks as UNC5537. The ~560M figure is the threat actor's own resale
  claim, not an independently confirmed count.
quantified_impact:
  individuals_affected: 560000000  # threat-actor's claimed figure (BreachForums post), per TechCrunch/BleepingComputer
  data_exfiltrated_tb: 1.3
  asking_price_usd: 500000
false_flag_risk: none
campaign_id: shinyhunters-snowflake-cluster
operators_named:
  - moucka-connor-riley  # UNC5537 "Judische"/"Waifu"; DOJ-indicted operator of the Snowflake campaign (incl. Ticketmaster tenant); not confirmed as the ShinyHunters BreachForums poster
  - binns-john-erin      # "irdev"; co-conspirator in the Snowflake indictment; detained in Turkey
summary: |
  The single largest publicly-known exfiltration from the 2024
  Snowflake customer-tenant campaign, and a clean example of the
  ShinyHunters / UNC5537 cluster-overlap pattern: UNC5537 was the
  intrusion operator using infostealer-log credentials against MFA-less
  Snowflake tenants; ShinyHunters was the leak-site / monetization
  persona that posted and priced the data on BreachForums. Both are
  tracked separately at `criminal/shinyhunters` and `criminal/unc5537`
  with a deliberately fuzzy cluster boundary. The case is a key node in
  the AUSPEX criminal-baseline corpus as the largest individuals-claimed
  single leak-site posting.
attributions:
