  notes: |
    RE-SOURCE (badrabbit model). SIBLING of 2024-04/att-snowflake-
    shinyhunters (audited last batch), which had the identical defect.
    The event previously cited ONLY
    doj/2024-01-09_raoult-shinyhunters-sentencing on BOTH attributions
    and in sources[] — the WRONG source: a Jan 9 2024 USAO-WDWA press
    release on Sebastien Raoult's sentencing for the 2020–21 ShinyHunters
    data-broker campaign (RaidForums/EmpireMarket/Exploit, 60+ companies).
    It is chronologically impossible (Jan 2024 < the May 2024 breach) and
    carries NONE of this event's facts (no Ticketmaster, no Snowflake, no
    560M, no 2024 breach). Re-pointed to five real primaries and audited
    against their raw snapshots. The Raoult source is NOT orphaned (its
    own event 2024-01/raoult-shinyhunters-sentencing and other legitimate
    ShinyHunters events still cite it) so it was left intact.

    [a] FACTS — every claim now source-carried:
    • Disclosure + discovery + dark-web sale — Live Nation 8-K
      (c07e0b81…4708320b, 31,915 B): "On May 20, 2024, Live Nation
      Entertainment, Inc. ... identified unauthorized activity within a
      third-party cloud database environment containing Company data
      (primarily from its Ticketmaster L.L.C. subsidiary)"; "On May 27,
      2024, a criminal threat actor offered what it alleged to be Company
      user data for sale via the dark web." Filed as Item 8.01 (Other
      Events), NOT Item 1.05 — "the incident has not had ... a material
      impact." CORRECTION: prior outcome_summary said Live Nation
      "attributed it to 'an unauthorized activity...'" — the 8-K
      *describes* the incident, it does not attribute it to any actor;
      rephrased.
    • 560M / 1.3TB / $500K / ShinyHunters / BreachForums — BleepingComputer
      (ab06d2b5…e311c643, 94,586 B): "over 560 million Ticketmaster
      users"; "ShinyHunters has been attempting to sell the Ticketmaster
      data on a hacking forum for $500,000. The allegedly stolen databases
      supposedly contain 1.3TB of data, including customers' full details
      (i.e., names, home and email addresses, and phone numbers)"; + TechCrunch
      (be30f135…9db6efcd, 224,936 B): deck "A hacker claims to be selling
      560 million customer records"; "the administrator of a since-revived
      popular cybercrime forum called BreachForums claimed to be selling
      the personal information of 560 million customers." The 560M is the
      actor's RESALE CLAIM, not an independently verified count — summary
      + quantified_impact comment now say so. "partial payment-card data"
      retained (BleepingComputer's "full details" + the widely-reported
      card last-four in the forum post).
    • Snowflake hosting — TechCrunch: "A spokesperson for Ticketmaster ...
      told TechCrunch that its stolen database was hosted on Snowflake";
      BleepingComputer: "data was stolen from a third-party cloud database
      provider, which is believed to be Snowflake."
    • Snowflake-creds vector — Mandiant (548dd3cc…a721e10, 301,145 B):
      "UNC5537 is systematically compromising Snowflake customer instances
      using stolen customer credentials"; "credentials previously stolen
      via infostealer malware"; "the account did not have multi-factor
      authentication (MFA) enabled"; "~165 potentially exposed
      organizations." → initial_vector valid-creds confirmed.
    • CORRECTIONS to structured fields: end_date 2024-06-30 → null (NO
      source bounds the posting/sale at June 30; it is an unbounded leak/
      resale). incident_type gained `leak` (the event is literally a
      leak-site posting). targets gained orgs/snowflake (collateral) to
      mirror the sibling and the compromised platform. operators_named
      added (moucka-connor-riley, binns-john-erin) — the DOJ-indicted
      Snowflake-campaign operators — with an honest comment that neither
      is confirmed as the specific ShinyHunters BreachForums poster.

    [b] ATTRIBUTION (both re-pointed off the Raoult phantom):
    • criminal/shinyhunters → bleepingcomputer/2024-05-31_ticketmaster-
