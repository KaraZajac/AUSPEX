qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-04
  level: full
  notes: |
    Audited against the sole cited source, Europol "Largest Ever Operation
    Against Botnets Hits Dropper Malware Ecosystem (Operation Endgame)",
    2024-05-30 (govt-primary, tier primary). Raw snapshot on disk
    (europol__2024-05-30_operation-endgame.html), sha256 b7c58c11…2e6f8e02,
    48152 bytes — hash RE-VERIFIED this audit (matched the committed
    content_sha256). Page is a JS-rendered React SPA; substantive article
    extracted from the embedded JSON "body" field + <meta name=description>.

    STEP 0 triage: NOT a phantom (re-source path NOT taken). The URL resolves to
    the genuine Operation Endgame press release matching the event; normal
    6-point audit performed against the raw source.

    [a] FACTS — VERBATIM-CARRIED and kept: the six-family list "targeted droppers
    including, IcedID, SystemBC, Pikabot, Smokeloader, Bumblebee and Trickbot"
    (all six confirmed, incl. Trickbot, via <meta description> + body); the
    "largest ever operation against botnets" framing (headline + body: "This is
    the largest ever operation against botnets"); "4 arrests (1 in Armenia and 3
    in Ukraine)"; "Over 100 servers taken down or disrupted in Bulgaria, Canada,
    Germany, Lithuania, the Netherlands, Romania, Switzerland, the United
    Kingdom, the United States and Ukraine" (10-country list matches exactly);
    "Over 2 000 domains under the control of law enforcement"; "16 location
    searches (1 in Armenia, 1 in the Netherlands, 3 in Portugal and 11 in
    Ukraine)"; "one of the main suspects has earned at least EUR 69 million in
    cryptocurrency by renting out criminal infrastructure". CORRECTED wording
    that over/understated the source: "Approximately 100 servers seized" ->
    "Over 100 servers taken down or disrupted" (source: "Over 100 ... taken down
    or disrupted"); "enterprise-loader malware ecosystem" -> "dropper malware
    ecosystem" (source's own term); "2,000+ malicious domains seized" ->
    "over 2,000 domains brought under law-enforcement control". Added the
    FR/DE/NL lead, the 16 searches, and the EUR 69M suspect figure (all
    source-carried). STRIPPED as UNSOURCED: the summary's "Pikabot (the
    post-Qakbot successor) closed the loop on the Qakbot operator-continuity
    question" — the Europol release mentions neither Qakbot nor a Pikabot
    successor relationship (that material lives only in the separate 2023-08 Duck
    Hunt event, hedged "widely assessed"); removed here to keep every claim
    source-carried. FLAG: if the Pikabot=post-Qakbot framing is wanted on this
    event it needs a threat-intel source (Zscaler/Trend Micro), not Europol.

    [b] ATTRIBUTION — counter-action: actor_id null (correct — the state/LE
    action is BY the coalition, not an attack). attributing_org "Europol +
    Eurojust + 10 partners" CORRECTED -> "+ 13 partners": the source names 13
    participating states (FR, DE, NL led; DK, UK, US involved; AM, BG, LT, PT,
    RO, CH, UA supporting). "10" appears to have been miscounted from the
    10-country server-takedown list (which omits FR/DK/PT and adds Canada as a
    server location only). attributing_org_confidence high (Europol reporting its
    own operation). auspex_assessment concur-with-caveat kept (house convention
    for these null-actor takedowns). attribution_date 2024-05-30 = publication
    date. Fixed the actor comment: it erroneously carried "was ru/proxies/qakbot"
    history copied from the Duck Hunt event — Qakbot is NOT one of Endgame's six
    families.

    [c] DATES — start_date 2024-05-27 confirmed ("Between 27 and 29 May 2024").
    end_date CORRECTED 2024-05-31 -> 2024-05-29 ("31 May" appears zero times in
    the raw; the coordinated action days are "27 and 29 May 2024"). disclosure_
    date 2024-05-30 confirmed (schema.org datePublished "2024-05-30T04:00:01Z";
    Most-Wanted additions "on 30 May 2024"; participating- and private-partner
    lists "updated on 30 May 2024"). Source published_on 2024-05-30 verified,
    unchanged.

    [d] DOCTRINE_LINKS — the load-bearing correction. The single link us/ncs-2023
    / disrupt-dismantle was confidence: attested with attesting_source_id = the
    Europol release. OVER-ATTESTED: the attested bar requires the attesting source
    to state the strategic purpose at the goal level, and the Europol release
    states NO US strategic purpose — the strings "national cybersecurity" and
    "disrupt and dismantle" appear zero times in the raw, and the action is framed
    as EU/Europol criminal disruption. DOWNGRADED attested -> plausible (not
    strongly_inferred): the op is EU-LED (FR/DE/NL) with the US only 1 of ~13
    participants, so more than one strategic reading survives (US NCS-2023 vs. EU
    EMPACT posture) — mirroring the closest sibling audit, 2021-01/emotet-
    operation-ladybird (Europol-only, null-actor, plausible + defender-response).
    Set attesting_source_id: null; added inference_basis.alternatives (the two
    surviving readings); added perspective: defender-response (US defender
    doctrine on a null-actor multinational LE counter-action — also resolves the
    potential doctrine-state-mismatch: US doctrine, no actor state). Calibration:
    US-LED siblings with US DOJ sources (Qakbot Duck Hunt, LockBit Cronos) sit at
    strongly_inferred and Hive at attested (Monaco remarks); Endgame is weaker
    than all three (EU-led, Europol-only source), hence plausible.

    [e] ATTRIBUTION_LEVEL — set named-actor (was missing): the six loader/dropper
    families are named as the specific disrupted entities; no nation/service is
    attributed (consistent with the null actor_id) — mirrors Emotet/Ladybird.

    [f] ACTOR_ID — null (counter-action), no FK to resolve. Both doctrine FKs
    (us/ncs-2023, us/ncs-2023/disrupt-dismantle) confirmed present on disk.

    incident_type: added law-enforcement -> [law-enforcement, disruption]: this is
    a meta counter-action (per the directionality convention and the Emotet/
    Ladybird precedent, which carries disruption + law-enforcement).

    Residual: single-source event, but the sole source is a tier-1 govt-primary
    Europol release directly documenting the operation, so level full. Canada
    appears only as a server-takedown location, not among the 13 participating
    authorities — noted, not an error. No US DOJ/FBI primary is cited (the US was
    a participant); adding one would strengthen the disrupt-dismantle inference
    but is an enrichment left for Kara.
