id: 2024-05/operation-endgame
name: Operation Endgame — multi-loader botnet takedown
start_date: 2024-05-27  # Europol: operation ran "Between 27 and 29 May 2024"
disclosure_date: 2024-05-30  # Europol press release / Most-Wanted additions on 30 May 2024
end_date: 2024-05-29  # AUDIT 2026-07-04: was 2024-05-31 (unsupported — "31 May" appears nowhere in the raw). Source frames the coordinated action days as "27 and 29 May 2024"; end = 29 May.
incident_type:
  - law-enforcement
  - disruption
initial_vector: unknown
outcome_summary: |
  Europol- and Eurojust-coordinated multinational law-enforcement
  action — initiated and led by France, Germany and the
  Netherlands — against the dropper malware ecosystem, targeting
  IcedID, SystemBC, Pikabot, SmokeLoader, Bumblebee and Trickbot.
  Over 100 servers taken down or disrupted across Bulgaria,
  Canada, Germany, Lithuania, the Netherlands, Romania,
  Switzerland, the UK, the US and Ukraine; over 2,000 domains
  brought under law-enforcement control; four arrests (1 in
  Armenia, 3 in Ukraine) and 16 location searches (Armenia,
  Netherlands, Portugal, Ukraine). One main suspect was assessed
  to have earned at least EUR 69 million in cryptocurrency by
  renting out criminal infrastructure to deploy ransomware.
  Europol described it as the "largest ever operation against
  botnets."
false_flag_risk: none
campaign_id: operation-endgame
summary: |
  Operation Endgame was a Europol- and Eurojust-coordinated
  international law-enforcement takedown — initiated and led by
  France, Germany and the Netherlands — against the
  dropper/loader malware ecosystem: IcedID, SystemBC, Pikabot,
  SmokeLoader, Bumblebee and Trickbot, families that seed
  ransomware and other payloads. Europol described it as the
  largest-ever operation against botnets. As a multi-family
  loader takedown it is the structural counterpart to the
  single-brand takedowns in the corpus (Hive, Jan 2023; LockBit
  Operation Cronos, Feb 2024).
