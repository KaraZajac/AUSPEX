id: 2024-05/operation-endgame
name: Operation Endgame — multi-loader botnet takedown
start_date: 2024-05-27
disclosure_date: 2024-05-30
end_date: 2024-05-31
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  Europol-coordinated multinational operation against the
  enterprise-loader malware ecosystem. Targeted IcedID,
  SystemBC, Pikabot, SmokeLoader, Bumblebee, and Trickbot.
  Approximately 100 servers seized across Bulgaria, Canada,
  Germany, Lithuania, Netherlands, Romania, Switzerland, UK,
  Ukraine, US. 2,000+ malicious domains seized. Four arrests
  (Armenia, Ukraine). Self-described as the "largest ever
  operation against botnets" by Europol.
false_flag_risk: none
campaign_id: operation-endgame
summary: |
  Operation Endgame is the canonical multi-loader-family
  takedown — the structural counterpart to single-brand
  takedowns (Hive Jan 2023, LockBit Feb 2024). Pikabot's
  inclusion (the post-Qakbot successor) closed the loop on
  the Qakbot operator-continuity question.
