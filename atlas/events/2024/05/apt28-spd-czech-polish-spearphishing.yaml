    [d] DOCTRINE_LINKS — two over-attestations corrected. (1)
    sanctions-response-2022/aid-state-targeting attested -> strongly_inferred: the
    prior reasoning claimed the govt "framed the campaign in those terms"; the
    reachable govt wording states no such goal (closest is BMI's "targets related
