    definition-faithful named-actor. If Kara retrieves the German primary and it
    names "Einheit 26165 / 85. Hauptzentrum," upgrade to named-unit is warranted;
    the unit identity is otherwise established by the actor record's 2018 DOJ +
    2020 UK/EU sanctions sources.

    [c] DATES. source published_on 2024-05-03 = Al Jazeera "Published On 3 May
    2024" ✓. start_date 2022-03-01 ✓; disclosure 2024-05-03 ✓; end_date -> null
    (above). New secondaries dated 2024-05-03 (Al Jazeera) and 2024-05-04 (THN
