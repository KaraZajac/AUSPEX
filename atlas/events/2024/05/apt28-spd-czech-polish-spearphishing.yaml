id: 2024-05/apt28-spd-czech-polish-spearphishing
name: APT28 spearphishing of German SPD and Czech/Polish entities (CVE-2023-23397)
start_date: 2022-03-01  # Bundesregierung statement: campaign began March 2022
disclosure_date: 2024-05-03
end_date: 2023-12-01  # approx. campaign duration per German MFA
incident_type:
  - intrusion
  - data-theft
initial_vector: 0-day  # CVE-2023-23397 Outlook NTLM relay was 0-day at time of exploitation
outcome_summary: |
  German federal government publicly attributed a sustained APT28
  campaign exploiting CVE-2023-23397 (Outlook NTLM relay) against
  the German SPD (Chancellor Scholz's party), Czech state and
  military entities, Polish government targets, and additional
  defense, aerospace, and logistics organizations. Germany summoned
  the Russian charge d'affaires and characterized the campaign as
  an "intolerable" cyberattack; EU and NATO issued solidarity
  statements. Czech MFA published parallel attribution.
false_flag_risk: none
summary: |
  Doctrinally significant as a member-state public attribution of
  GRU targeting of a governing-party political infrastructure
  during an EU-election year. Pairs with subsequent NATO and EU
  statements. The exploited vulnerability (CVE-2023-23397) is the
  Outlook elevation-of-privilege bug that Microsoft patched in
  March 2023 — APT28 had operationalized it from at least March
  2022 per the German Federal Office statement.
attributions:
