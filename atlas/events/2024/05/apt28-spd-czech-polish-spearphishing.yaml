id: 2024-05/apt28-spd-czech-polish-spearphishing
name: APT28 spearphishing of the German SPD and Czech institutions (CVE-2023-23397)
start_date: 2022-03-01  # German statement: campaign began at least as early as March 2022
disclosure_date: 2024-05-03
end_date: null  # no source states an operation end; SPD email access observed from Dec 2022, campaign undated at 2024-05 disclosure
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: 0-day  # CVE-2023-23397 Outlook NTLM relay was a 0-day when operationalized from March 2022 (Microsoft patched it March 2023)
outcome_summary: |
  On 2024-05-03 the German Federal Government (Foreign Minister Baerbock /
  Interior Minister Faeser, following a formal attribution procedure led by the
  Auswaertiges Amt) publicly attributed to APT28 — "steered by the military
  intelligence service of Russia" (GRU) — a sustained campaign that exploited the
  Microsoft Outlook vulnerability CVE-2023-23397 (NTLM relay). Named German
  victims: the SPD Executive Committee (Chancellor Scholz's party), whose email
  accounts were accessed from December 2022, plus German companies in the
  armament, aerospace/space, logistics and IT-service sectors and various
  foundations and associations. Germany summoned the acting Russian charge
  d'affaires and called the attack "intolerable." The same day, Czechia's MFA
  announced in parallel that Czech institutions had also been targeted by APT28
  via the Outlook flaw (without detailing the targets), and the EU High
  Representative and NATO issued solidarity statements condemning the campaign
  against Germany and Czechia.
false_flag_risk: none
summary: |
  Doctrinally significant as a coordinated member-state public attribution of GRU
  targeting of a governing party's political infrastructure and of
  defence-industrial targets. The exploited vulnerability, CVE-2023-23397, is the
  Outlook elevation-of-privilege / NTLM-relay bug Microsoft patched in March 2023;
  APT28 had operationalized it as a 0-day from at least March 2022 — the month
  after Russia's full-scale invasion of Ukraine — per the German statement. This
  event models the German (SPD + German industry) and the parallel Czech
  (unspecified institutions) attributions announced on 2024-05-03; Poland,
  Lithuania, Slovakia and Sweden were named by NATO the same day as OTHER/prior
  alliance targets of the same actor, NOT as victims of this specific attribution
  (see notes).
attributions:
  - actor_id: ru/gru/26165/apt28
    attributing_org: German Federal Government (Auswaertiges Amt / BMI)
    attributing_org_confidence: high
    attribution_level: named-actor
    auspex_assessment: concur
    attribution_date: 2024-05-03
    attribution_source_id: bundesregierung/2024-05-03_apt28-spd-attribution
    notes: |
      Baerbock (2024-05-03): "we can attribute this cyberattack to a group called
      APT28, which is steered by the military intelligence service of Russia";
      Interior Minister Faeser named the GRU. Level set to named-actor: the German
      government named the group (APT28) and its parent service (the GRU), but its
      reachable wording does not name the specific GRU unit 26165 / 85th GTsSS —
      that identity is an assessed identification (carried here by the two
      secondaries) and is established by prior sources already in the actor record
      (2018 DOJ indictments; 2020 UK/EU Bundestag-hack sanctions). Confidence high
      ("unambiguously").
doctrine_links:
  - doctrine_id: ru/sanctions-response-2022
    pillar_id: ru/sanctions-response-2022/aid-state-targeting
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A GRU campaign that compromised the governing party of Germany — the largest
      European supplier of military aid to Ukraine at the time — together with
      German armament, aerospace and logistics firms, beginning in March 2022 (the
      month after the full-scale invasion), fits the post-2022 sanctions-response
      posture's aid-state-targeting pillar. No cited source states that strategic
      goal in so many words, so the label is strongly_inferred rather than
      attested; the German Interior Ministry (per Al Jazeera) did describe the
      victims as including "targets related to Russia's war in Ukraine."
    attesting_source_id: null
    inference_basis:
      signals:
        - "Target set: the governing party of Germany (largest EU supplier of Ukraine military aid) plus German armament/aerospace/logistics/IT firms — war-materiel-relevant."
        - "Timing: campaign began at least as early as March 2022, the month after Russia's full-scale invasion."
        - "BMI framing (per Al Jazeera): victims included 'targets related to Russia's war in Ukraine.'"
        - "Actor: GRU unit 26165 (APT28), a strategic military-intelligence collection arm."
      ruled_out: "Routine pre-war political espionage — the post-invasion onset and the war-materiel industrial target set fit the sanctions-response/aid-targeting posture more specifically than undifferentiated collection."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/nato-ultimatum-2021
    pillar_id: ru/nato-ultimatum-2021/nato-degradation
    program_id: null
    confidence: plausible
    reasoning: |
      The victims (German and Czech government/party/defence entities) are NATO
      members and NATO condemned the campaign as "a threat to Allied security," but
      no cited source frames the operation as a NATO-degradation effort, and the
      same target set reads at least as well as aid-state coercion or routine
      strategic collection — so more than one strategic reading survives. (Corrects
      a prior over-attestation: the earlier reasoning claimed the NATO/EU statements
      "explicitly framed the campaign as a NATO-degradation operation"; they did
      not.)
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "NATO-degradation: DE/CZ government, party and defence targets are NATO-member entities and NATO called the activity 'a threat to Allied security.'"
        - "Sanctions-response / aid-state coercion: the same target set reads more directly as pressure on Ukraine-aid suppliers (see the aid-state-targeting link)."
        - "Routine foreign-intelligence collection: the documented effect is email-account compromise (collection), the core mission of GRU 26165, with no alliance-degradation effect shown."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/military-doctrine-2014
    pillar_id: ru/military-doctrine-2014/destabilization-via-info
    program_id: null
    confidence: plausible
    reasoning: |
      Compromise of a governing party's executive committee is consistent with the
      2014 Military Doctrine's information-confrontation framing, and the Czech MFA
      and EU described the campaign as targeting "democratic processes /
      institutions." But the documented activity is email-account collection with
      no leak or information effect tied to it, so a routine-espionage reading
      competes with the destabilization reading — hence plausible rather than
      strongly_inferred.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Destabilization via information means: targeting a governing party's executive fits information-confrontation against an adversary's political leadership; the Czech MFA/EU framed it as targeting democratic processes."
        - "Foreign-intelligence collection: the observed effect is email-account compromise (espionage), with no leak or influence operation tied to this campaign."
    counter_explanation: null
    contested: false
    analyst: claude
