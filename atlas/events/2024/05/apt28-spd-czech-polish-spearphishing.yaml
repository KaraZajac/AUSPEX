  notes: |
    Phantom-remediation audit. The cited govt primary
    (bundesregierung/2024-05-03_apt28-spd-attribution ->
    auswaertiges-amt.de/en/newsroom/news/-/2660484) has LINK-ROTTED: the live URL
    returns HTTP 400/404 and the recorded wayback archive_url is on archive.org
    (blocked for this fetcher), so it could not be snapshotted. The BMI press
    release and the EU Council (consilium) page were also un-capturable (servlet
    400 / Cloudflare 403). The incident is real and well-documented, so per the
    re-source protocol two reachable secondaries were CREATED, snapshotted and
    hashed, and every claim is now carried by them:
      - aljazeera/2024-05-03_germany-russia-intolerable-cyberattack
        sha256 bfe732e8…b2e0703c (202,485 bytes)
      - thehackernews/2024-05-04_apt28-outlook-czech-german-attribution
        sha256 690b3c3f…c1e633c4 (179,963 bytes)
    Level = partial because the load-bearing govt primary is un-snapshottable and
    claims rest on mirror corroboration.

    [a] FACTS. Verified & kept: CVE-2023-23397 Outlook NTLM/Net-NTLMv2 relay
    (THN); 0-day operationalized from at least March 2022 (Al Jazeera "began at
    least as early as March 2022"); SPD Executive Committee email accounts
    "accessed from December that year" [2022] (Al Jazeera); German armament /
    aerospace-space / logistics / IT-service companies + foundations/associations
    (THN "logistics, armaments, the air and space industry, IT services,
    foundations, and associations located in Germany"); charge d'affaires summoned
    + "intolerable" (Al Jazeera). CORRECTED: (1) "Czech state and military
    entities" -> "Czech institutions (unspecified)" — Czech MFA "the country's
    institutions had also been targeted … It didn't provide details about the
    targets" (Al Jazeera); no source says Czech *military*. (2) "Polish government
    targets" REMOVED from the German-attribution framing — NATO named "Lithuania,
    Poland, Slovakia and Sweden" as OTHER alliance targets of APT28, not victims of
    this German/Czech attribution (conflation with the Dec-2023 Polish-CERT
    CVE-2023-23397 event); recorded in event notes. (3) end_date 2023-12-01 ("per
    German MFA") -> null: unsupported; Dec-2022 is when SPD access *began*, not an
    op end. (4) "subsequent NATO and EU statements" -> same-day (2024-05-03). (5)
    Added incident_type espionage (email-account collection).

    [b] ATTRIBUTION. German Federal Government, high confidence, concur — kept.
    attribution_level ADDED = named-actor. Evidence: Baerbock "a group called
    APT28, which is steered by the military intelligence service of Russia"; Faeser
    named the GRU. The govt named the group + parent SERVICE (GRU), not the
    specific unit; THN states "APT28, assessed to be linked to Military Unit 26165
