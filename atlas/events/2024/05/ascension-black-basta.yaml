id: 2024-05/ascension-black-basta
name: Black Basta ransomware against Ascension Health
start_date: 2024-05-08
disclosure_date: 2024-05-09
end_date: 2024-06-14
incident_type:
  - ransomware
  - extortion
  - disruption
  - data-theft
initial_vector: phishing
outcome_summary: |
  Ransomware attributed to Black Basta disrupted clinical IT
  systems across Ascension's network of ~140 hospitals in 19 US
  states and the District of Columbia for roughly five weeks
  (detected 8 May 2024; EHR access restored hospital-wide 14 June
  2024). Facilities reverted to manual paper records and several
  diverted ambulances, with reported strain on patient care. A
  December 2024 breach notification put the number of affected
  individuals at 5,599,699 (~5.6M). The federal #StopRansomware
  advisory AA24-131A (CISA/FBI/HHS/MS-ISAC) and an AHA / Health-ISAC
  sector alert on Black Basta were both issued 10 May 2024 in the
  incident's immediate wake.
quantified_impact:
  hospitals_affected: 140
  individuals_affected: 5599699
  downtime_weeks: 5
false_flag_risk: none
summary: |
  One of the two defining US-healthcare ransomware disruptions of
  2024, alongside Change Healthcare (Feb 2024). Ascension's own
  post-incident statement (12 June 2024) traced initial access to
  "an individual working in one of our facilities [who] accidentally
  downloaded a malicious file that they thought was legitimate"; no
  loader was publicly named and reporting treated a phishing-style
  delivery as the likely-but-unconfirmed vector. Ascension did not
  name the perpetrator — the Black Basta attribution rests on press
  reporting (CNN, citing four sources) and the AHA / Health-ISAC
  sector warning, with the federal AA24-131A advisory issued
  alongside. AA24-131A does not itself detail the Ascension
  intrusion; it documents Black Basta's general tradecraft under a
  double-extortion model — spearphishing and Qakbot for initial
  access, Cobalt Strike, Mimikatz credential theft, PsExec/RDP
  lateral movement, rclone exfiltration, and a ChaCha20 / RSA-4096
  encryptor. Together with Change Healthcare the incident sharpened
  federal and sector scrutiny of healthcare cybersecurity resilience.
