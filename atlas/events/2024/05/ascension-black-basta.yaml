  notes: |
    Full 6-point audit vs RAW snapshots. RE-SOURCE path taken (badrabbit model):
    event is REAL but the pre-audit sourcing was thin/mis-applied — the sole
    attribution source (AA24-131A) never names Ascension, and the HHS HC3 companion
    carried url:null (unfetchable). Added five snapshotted sources carrying the
    Ascension-specific claims; removed the unfetchable HHS bulletin from this event
    (it remains cited on actor criminal/black-basta, so not orphaned).

    [a] FACTS — STRIPPED three fabrications/embellishments the raw does not carry:
      * "phishing email opened by a CONTRACTOR that delivered the Qakbot-successor
        loader DARKGATE" — Ascension's own 12 Jun 2024 statement says "an individual
        working in one of our facilities accidentally downloaded a malicious file
        that they thought was legitimate" (infosecurity 89c6605e…: 0 "contractor",
        0 "DarkGate"). DarkGate is a documented Black Basta tool in the Feb-2025 chat
        leaks but NO source ties it to the Ascension intrusion. Reworded to the
        sourced "employee downloaded a malicious file; phishing-style delivery
        likely but unconfirmed" ("it seems likely to be a phishing-related attack").
      * "BlackByte / WMI-based defense evasion" — BlackByte is a separate crew; not
        in AA24-131A (b5d6e1ff…: 0 "BlackByte"). The advisory's EDR-disable tool is
        "Backstab". Removed.
      * The generic AA24-131A kill chain was presented "per CISA AA24-131A" as the
        OBSERVED Ascension chain; AA24-131A contains 0 "ascension" tokens. Reframed
        explicitly as Black Basta's GENERAL tradecraft (verbatim-carried: spearphishing
        [T1566] + "Qakbot during initial access"; "ChaCha20 algorithm with an RSA-4096
        public key fully encrypts files"; Cobalt Strike/Mimikatz/PsExec/RDP/rclone;
        "double-extortion model, both encrypting systems and exfiltrating data").
      * Dropped the unsourced causal claim that the breach "catalyzed HHS OCR … HIPAA
        NPRM (Dec 2024)" (over-reach; no snapshot). Softened "most disruptive since
        Change Healthcare" to "one of the two defining 2024 healthcare disruptions."
      Corroborated & KEPT: 140 hospitals / 19 states + DC (healthcareitnews d299e58e…:
      "140 hospitals in 19 states and the District of Columbia"); 5,599,699 affected
