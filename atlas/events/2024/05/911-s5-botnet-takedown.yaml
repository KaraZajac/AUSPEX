    genuine body was captured via Wayback id_ (raw, un-rewritten,
    matches the source archive_url ts 20250203220901):
    doj__2024-05-29_911s5-yunhe-wang.html, sha256
    643b01e3d1b917e3c365988bb145c2e401e36653389b6bc712a33cf2d6809f8a
    (106987 B). Krebs live HTTP 200 full text:
    krebs__2024-05-30_treasury-sanctions-911s5.html, sha256
    ff18fe4388a30b54da4120753e81aab9817f4fb12b4070f81bf44fd983bb6164
    (44262 B). STEP-0 triage: both REAL + on-topic — normal audit.

    [a] FACTS — verified against raw; several figure/framing
    corrections. VERIFIED VERBATIM (DOJ): Wray "dismantle the 911
    S5 Botnet—likely the world's largest botnet ever"; "more than
    19 million unique IP addresses, including 613,841 IP addresses
    located in the United States"; "infected computers in nearly
    200 countries"; "YunHe Wang, 35, a People's Republic of China
    national and St. Kitts and Nevis citizen-by-investment, was
    arrested on May 24"; "indictment unsealed on May 24, from 2014
    through July 2022"; VPN "such as MaskVPN and DewVPN (torrent
    distribution models) ... and pay-per-install services that
    bundled his malware with ... pirated versions of licensed
    software"; "560,000 fraudulent unemployment insurance claims
    ... confirmed fraudulent loss exceeding $5.9 billion"; "Wang
    received approximately $99 million from his sales of the
    hijacked proxied IP addresses ... from 2018 until July 2022";
    "On May 28, the Treasury Department's OFAC issued financial
    sanctions against Wang, Jingping Liu, and Yanni Zheng ... and
    three entities". Krebs corroborates: three Chinese nationals
    sanctioned; VPNs "specific to the botnet operation (MaskVPN and
    DewVPN)"; EIDL fraud ("more than 47,000 EIDL applications");
    Liu laundered proceeds into "luxury real estate", Zheng the
    attorney for Wang's firm "Spicy Code Company Limited".
    CORRECTED FIGURES/FRAMING: (1) "~190 countries" -> "nearly 200
    countries" (DOJ says nearly 200; ~190 was an understatement).
    (2) "approximately 19 million" -> "more than 19 million" +
    added the DOJ 613,841-US figure. (3) STRIPPED "CARES Act /
    Pandemic Unemployment Assistance" — neither cited source uses
    those names; DOJ says "pandemic relief programs" / "unemployment
    insurance claims" / EIDL. Rewrote to sourced language.
    (4) STRIPPED VPN apps ShieldVPN, ShineVPN, ProxyGate — NOT in
    either cited source (grep: 0 hits; DOJ + Krebs name ONLY MaskVPN
    and DewVPN). Kept MaskVPN + DewVPN. (5) "arrested in Singapore
    ... on a US warrant" softened -> "arrested on 24 May 2024, same
    day the indictment was unsealed" — neither cited source states
    the arrest LOCATION as Singapore (DOJ only lists SPF as a partner
    agency + Singapore among operation-leading jurisdictions); dropped
    the unsourced location/"US warrant" phrasing. (6) STRIPPED
    "credential-stuffing" from summary (0 hits in either 2024 source;
    it was a 2022-deep-dive claim) -> "fraud, identity theft and
    other cybercrime" (DOJ: "financial frauds, identity theft, and
    child exploitation"). ADDED the DOJ $99M proceeds figure, framed
    as sale proceeds Wang RECEIVED (NOT "laundered" — the laundering
    is the separate Liu/Zheng real-estate element). NOTE: "CloudRouter"
    (6x in the Krebs raw) is only in the successor "Cloud Router" /
    a reader COMMENT, not this 911 S5 takedown — correctly absent.

