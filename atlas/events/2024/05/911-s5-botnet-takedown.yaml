initial_vector: unknown
outcome_summary: |
  US DOJ + FBI announced the dismantling of the 911 S5
  residential-proxy botnet — described by FBI Director
  Christopher Wray as "likely the world's largest botnet
  ever" — comprising more than 19 million unique compromised
  (residential Windows) IP addresses, including 613,841 in
  the United States, spread across nearly 200 countries.
  YunHe Wang, 35 — a PRC national and St. Kitts and Nevis
  citizen-by-investment named as the botnet's primary
  administrator — was arrested on 24 May 2024, the same day a
  US indictment was unsealed; the Singapore Police Force was
  among the partner agencies (the operation was led by law
  enforcement in the US, Singapore, Thailand and Germany).
  Wang allegedly propagated the malware through "free" VPN
  apps (MaskVPN and DewVPN) and pay-per-install services that
  bundled it with pirated software, turning victims' PCs into
  rentable proxy exit nodes. 911 S5 was sold as a residential-
  proxy service used for financial fraud, identity theft and
  other computer-enabled crime; the US estimates ~560,000
  fraudulent pandemic unemployment-insurance claims traced to
  911 S5-compromised IPs caused confirmed losses exceeding USD
  5.9 billion (with additional Economic Injury Disaster Loan
  fraud). Wang allegedly received ~USD 99 million in proceeds
  from selling access to the hijacked IPs (2018–Jul 2022). On
  28 May 2024 Treasury OFAC issued SDN designations against
  Wang, Jingping Liu and Yanni Zheng (plus three Wang-
  controlled entities incl. Spicy Code Company Limited); Liu
  and Zheng are alleged to have laundered proceeds into luxury
  real estate.
false_flag_risk: none
summary: |
  The 911 S5 takedown closed a residential-proxy supply used
  heavily for fraud, identity theft and other cybercrime.
  AUSPEX classifies as criminal-baseline: the proxy service
  monetized fraud at consumer scale and was not state-tasked,
  though state actors are known opportunistic consumers of
  similar services. Directionality: this is a defender /
  law-enforcement counter-action — 911 S5's infrastructure and
  its administrator YunHe Wang are the TARGETS of the DOJ/FBI
  takedown and OFAC sanctions, not the perpetrators of a
  cyberattack. No atlas actor exists for the 911 S5 / Yunhe
  Wang operator, so actor_id is null and the subject is named
  in prose. Distinct from the sibling 2022-07/911-proxy-collapse
  (the July-2022 self-disclosed breach/self-collapse of the SAME
  continuous Wang-run operation) — this record is the May-2024
  US law-enforcement takedown, arrest and sanctions.
