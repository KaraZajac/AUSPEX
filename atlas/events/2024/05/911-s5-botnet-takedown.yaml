id: 2024-05/911-s5-botnet-takedown
name: 911 S5 residential-proxy botnet dismantled; YunHe Wang arrested
start_date: 2024-05-24
disclosure_date: 2024-05-29
end_date: 2024-05-29
incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  US DOJ + FBI announced the takedown of the 911 S5
  residential-proxy botnet — described by FBI Director Wray
  as "likely the world's largest botnet ever" — comprising
  approximately 19 million compromised residential IPs
  across ~190 countries. Chinese national YunHe Wang
  arrested in Singapore on May 24 2024 on a US warrant.
  The botnet was distributed via trojanized free-VPN
  applications (MaskVPN, DewVPN, ShieldVPN, ShineVPN,
  ProxyGate) and rented out as a residential-proxy service
  for cybercrime including USD ~5.9B in pandemic-era CARES
  Act / Pandemic Unemployment Assistance fraud. Treasury
  OFAC SDN designations followed for Wang, Jingping Liu,
  and Yanni Zheng.
false_flag_risk: none
summary: |
  The 911 S5 takedown closed a residential-proxy supply
  used heavily for fraud and credential-stuffing. AUSPEX
  classifies as criminal-baseline: the proxy service
  monetized fraud at consumer scale and was not state-
  tasked, though state actors are known opportunistic
  consumers of similar services.
