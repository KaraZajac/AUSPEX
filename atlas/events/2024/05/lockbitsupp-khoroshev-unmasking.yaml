id: 2024-05/lockbitsupp-khoroshev-unmasking
name: LockBitSupp / Dmitry Khoroshev unmasking and OFAC sanctions
start_date: 2024-05-07
disclosure_date: 2024-05-07
end_date: 2024-05-07
incident_type:
  - law-enforcement
  - policy
initial_vector: unknown
outcome_summary: |
  Joint US DOJ / UK FCDO / Australia DFAT announcement unsealing
  a 26-count superseding indictment against Dmitry Yuryevich
  Khoroshev (Russian national, b. 1993, Voronezh resident) as
  the "LockBitSupp" administrator of LockBit. OFAC concurrently
  added Khoroshev to the SDN list. UK FCDO and Australia DFAT
  joined the sanctions. State Department TOCRP USD 10M reward
  offered for information leading to arrest. Indictment alleges
  ~USD 100M extortion revenue collected by Khoroshev personally
  from LockBit affiliates (20% admin share).
false_flag_risk: none
campaign_id: lockbit-cronos
operators_named:
  - khoroshev-dmitry  # LockBitSupp, DOJ + OFAC May 2024
summary: |
  Canonical "unmask the criminal-state-proxy operator with full
  PII, sanction him to make him radioactive on US-dollar
  payment rails, document the entire financial flow" operation.
  Mirror to the prior TrickBot / Conti sanctions tranches (Feb /
  Sep 2023). The Kremlin has not detained Khoroshev as of the
  AUSPEX corpus date — contrast with the Jan 2022 REvil raid
  pre-invasion. The Khoroshev operation is the canonical case
  for AUSPEX's reading that post-2022 Russian state-tolerance
  of criminal-cyber is impervious to US sanctions absent a
  separate foreign-policy bargaining moment.
