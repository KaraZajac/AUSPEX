    at least $100 million in disbursements"; Garland "targeted over 2,000
    victims and stolen more than $100 million"; State "reward of up to $10
    million for information that leads to the apprehension." OFAC raw
    confirms the SDN designation (E.O. 13694/13757) and the $10M TOCRP
    reward "for … arrest and/or conviction … transnational organized crime."
    CORRECTIONS (over-claims not carried by EITHER raw, stripped):
    (1) "26-count SUPERSEDING indictment" → "26-count indictment"
    ("superseding" = 0 hits in both raws); (2) "b. 1993" → "age 31" (raw
