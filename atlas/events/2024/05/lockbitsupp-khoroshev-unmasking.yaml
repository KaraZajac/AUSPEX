  notes: |
    Full attested re-audit vs both cited govt-primaries; PATH = normal
    audit (both sources REAL, hashes re-verified on-disk this pass).
    DOJ release doj__2024-05-07_lockbit-khoroshev-indictment.html
    (sha256 cab40efc…fc35e5be, 115,363 B; live justice.gov is bot-walled,
    raw is the committed wayback capture). Treasury OFAC release
    treasury__2024-05-07_khoroshev-sdn.html (sha256 2f4d265a…56e67db2,
    125,686 B, curl 200). Both published_on 2024-05-07 — verified.

    [a] FACTS — carried verbatim by DOJ raw: "26-count indictment returned
    by a grand jury in the District of New Jersey"; "Dimitry Yuryevich
    Khoroshev … also known as LockBitSupp, LockBit, and putinkrab, 31, of
