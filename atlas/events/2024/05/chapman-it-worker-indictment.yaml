summary: |
  Highest-profile US prosecution of a DPRK IT-worker
  facilitator to date. Establishes the laptop-farm
  operational model as a US-prosecutable pattern, lays the
  groundwork for the December 2024 14-national indictment,
  and provides the most detailed public picture of the
  IT-worker scheme's domestic-US footprint.
