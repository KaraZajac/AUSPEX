initial_vector: insider
outcome_summary: |
  DOJ (USAO-DC) unsealed the Christina Chapman indictment
  on 16 May 2024. Chapman operated an Arizona-based "laptop
  farm" hosting company-issued hardware on behalf of remote
  DPRK IT workers, enabling them to appear US-based and pass
  identity verification.
  The indictment charged a scheme running Oct 2020–Oct 2023
  that defrauded more than 300 US companies using ~60 stolen
  US identities for ~$6.8M in indictment-era revenue; by
  sentencing the documented scope had grown to 309 US
  businesses, 68 stolen US-citizen identities, and
  approximately $17M in fraudulent revenue. Chapman pleaded
  guilty 11 February 2025 and was sentenced 24 July 2025 to
  102 months federal prison, with a $284,555.92 forfeiture
  and a $176,850 judgment.
