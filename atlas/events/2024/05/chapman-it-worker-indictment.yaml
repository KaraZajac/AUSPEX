initial_vector: insider
outcome_summary: |
  DOJ unsealed the Christina Chapman superseding indictment
  on 16 May 2024 (paired with Treasury sb0416 the same day).
  Chapman operated an Arizona-based "laptop farm" hosting
  company-issued hardware on behalf of remote DPRK IT
  workers, enabling them to appear US-based and pass
  identity verification. Scheme touched 309 US businesses,
  68 stolen US-citizen identities, and approximately $17M
  in documented fraudulent revenue. Chapman pleaded guilty
  February 2025 and was sentenced 24 July 2025 to 102
  months federal prison with full restitution.
