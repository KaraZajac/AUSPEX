id: 2024-05/chapman-it-worker-indictment
name: Christina Chapman laptop-farm indictment (DPRK IT-worker facilitation)
start_date: 2020-10-01  # scheme operational window from DOJ filings
disclosure_date: 2024-05-16
end_date: 2024-05-16
incident_type:
  - documentary
