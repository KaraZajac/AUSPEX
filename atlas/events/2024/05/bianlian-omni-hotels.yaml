id: 2024-05/bianlian-omni-hotels
name: Daixin Team ransomware and data extortion of Omni Hotels and Resorts
start_date: 2024-03-29
disclosure_date: 2024-04-03
end_date: null
incident_type:
  - intrusion
  - ransomware
  - data-theft
  - extortion
  - disruption
initial_vector: unknown
outcome_summary: |
  Multi-day nationwide outage of Omni Hotels & Resorts'
  reservation, hotel room door-lock, point-of-sale, phone and
  Wi-Fi systems after the company shut its systems down Friday
  March 29 2024 to contain the intrusion. Omni publicly
  confirmed the cyberattack April 3 2024 and restored most
  systems from backups over the following days; BleepingComputer's
  sources described a ransomware attack with encrypted servers
  being rebuilt from backup. On April 15 2024 the Daixin Team
  ransomware / data-extortion group claimed responsibility on its
  data-leak site, threatening to publish 3,539,089 guest records
  spanning 2017 to the present unless a ransom was paid. The
  records Daixin listed comprised guest contact data (names,
  email addresses, and mailing addresses), not payment-card data.
false_flag_risk: none
summary: |
  Data-extortion and operational-disruption incident against a
  US mid-market hospitality chain (Omni Hotels & Resorts — 50
  hotels and resorts across the United States, Canada, and
  Mexico), claimed by the Daixin Team ransomware group. A
  cyberattack beginning Friday March 29 2024 forced Omni to shut
  down core systems (reservations, room-key/door locks,
  point-of-sale, phones, Wi-Fi) for several days; sources
  characterised it as a ransomware attack, with encrypted
  servers restored from backups. On April 15 2024 Daixin Team
  claimed the breach on its leak site, asserting theft of
  3,539,089 guest contact records (names, emails, mailing
  addresses) dating to 2017 and threatening publication absent
  payment. Financially-motivated criminal activity with no
  documented state nexus; no doctrine link applies.
