id: 2024-05/bianlian-omni-hotels
name: BianLian data extortion of Omni Hotels and Resorts
start_date: 2024-03-29
disclosure_date: 2024-04-04
end_date: 2024-06-15
incident_type:
  - intrusion
  - data-theft
  - disruption
initial_vector: unknown
outcome_summary: |
  Omni Hotels and Resorts (US hospitality chain operating 50
  hotels and resorts across North America) disclosed April 4
  2024 a cyber incident that forced shutdown of phone, Wi-Fi,
  point-of-sale, and reservation systems for several days
  across the company's properties. BianLian claimed
  responsibility April 30 2024 and began posting exfiltrated
  data on its leak site including approximately three years
  of guest data — confirming the data-extortion-only operating
  model the cluster adopted in January 2023.
false_flag_risk: none
summary: |
  Notable BianLian US-hospitality victim demonstrating the
  cluster's continued mid-market post-encrypt-pivot
  operations. Multi-day operational disruption (phones, PoS,
  reservations) even without ransomware encryption — the
  intrusion alone forced operational shutdown to contain
  lateral movement. Criminal-baseline classification holds
  per CISA AA23-136A characterization of BianLian as a
  financially-motivated cluster with no state nexus.
attributions:
  - actor_id: criminal/bianlian
    attributing_org: Omni Hotels + BianLian (self-claimed)
    attributing_org_confidence: moderate
    auspex_assessment: concur
    attribution_date: 2024-04-30
    attribution_source_id: cisa/2023-05-16_aa23-136a-bianlian-advisory
    notes: |
      CISA AA23-136A is the joint BianLian advisory; it does not
      name Omni Hotels specifically. No primary government advisory
      specific to this case; attribution_source_id is the nearest
      contemporaneous primary documentation of BianLian activity.
