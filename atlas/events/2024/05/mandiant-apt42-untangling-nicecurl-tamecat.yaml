id: 2024-05/mandiant-apt42-untangling-nicecurl-tamecat
name: Mandiant publishes APT42 infrastructure mapping with NICECURL and TAMECAT backdoors
start_date: 2024-01-01
disclosure_date: 2024-05-01
end_date: 2024-04-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Mandiant published "Uncharmed — Untangling Iran's APT42
  Operations", mapping three distinct credential-phishing
  infrastructure clusters that APT42 (IRGC-IO) operated against
  Western and Middle Eastern NGOs, media organizations, academia,
  legal services, and activists. The report introduces two
  custom backdoors — NICECURL (VBScript) and TAMECAT (PowerShell)
  — delivered with decoy content and providing arbitrary command
  execution and data-mining capability. APT42 personas
  impersonated journalists and event organizers to build rapport
  with victims and harvest cloud credentials.
false_flag_risk: none
summary: |
  Reference report for the operational period leading into the
  September 2024 DOJ indictment of three IRGC officers behind
  the Trump-campaign hack-and-leak. Mandiant's three-cluster
  mapping is the primary vendor-side scaffold for understanding
  APT42's 2024 credential-phishing tempo; downstream events
  (Trump-campaign hack-and-leak, ARIA SEPEHR AYANDEHSAZAN FBI
  advisory, October 2024 Israeli academic targeting) operate
  on top of the toolset Mandiant documents here.
