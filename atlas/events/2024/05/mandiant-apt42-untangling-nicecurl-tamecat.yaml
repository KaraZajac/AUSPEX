  notes: |
    Audited vs Mandiant/Google Cloud "Uncharmed: Untangling Iran's APT42
    Operations" (2024-05-01). Raw snapshot RE-VERIFIED on disk
    (mandiant__2024-05-01_apt42-untangling.html, sha256 0ba9f779…92a1b383,
    631576 bytes — matches recorded content_sha256; hash re-verified, not
    re-fetched). NOT a phantom: URL is the real article; every load-bearing
    claim carried verbatim.
    [a] FACTS ✓ all source-carried. Three clusters: "Mandiant identified at
    least three clusters of infrastructure used by APT42 to harvest credentials
    from targets in the policy and government sectors, media organizations and
    journalists, and NGOs and activists." Victimology verbatim: "The actor is
    targeting Western and Middle Eastern NGOs, media organizations, academia,
    legal services and activists." Backdoors verbatim: "NICECURL A backdoor
    written in VBScript … including data mining and arbitrary command execution /
    TAMECAT A PowerShell toehold that can execute arbitrary PowerShell or C#
    content"; "Both … were delivered with decoy content (likely via spear
    phishing)." Personas + cloud creds: "APT42 was observed posing as
    journalists and event organizers … enabled APT42 to harvest credentials and
    use them to gain initial access to cloud environments"; "covertly
    exfiltrated data of strategic interest to Iran." (Cosmetic: outcome_summary
    renders the title with an em-dash for the RAW colon, and attributes
    "data-mining" to both backdoors collectively where RAW scopes it to NICECURL
    — substantively accurate, not corrected.) Summary's forward-references
    (Sept-2024 DOJ IRGC-trio indictment; ARIA SEPEHR AYANDEHSAZAN FBI advisory;
    Oct-2024 Israeli academic targeting) are EDITORIAL corpus-navigation, not
    claims of the Mandiant source; all three resolve to real corpus events
    (2024-05/irgc-trio-trump-campaign-hack-leak,
    2024-08/aria-sepehr-ayandehsazan-fbi-advisory,
    2024-10/microsoft-apt42-israeli-targeting) — kept.
    [b] ATTRIBUTION ✓. Mandiant (Google Cloud) / high / concur — RAW states
    flatly "Mandiant assesses APT42 operates on behalf of the Islamic
    Revolutionary Guard Corps Intelligence Organization (IRGC-IO)"; no confidence
    hedge on the actor or the IRGC-IO tie; tier-1 vendor naming its own tracked
    cluster → high upheld.
    [c] DATES ✓. Source published_on 2024-05-01 = RAW metadata
    "datePublished":"2024-05-01" (byline "May 1, 2024"); disclosure_date matches.
    start_date 2024-01-01 / end_date 2024-04-30 = editorial "recent operational
    window" for this reference/disclosure event; NOTE the report documents
    activity 2019–2024 (clusters "Active: 2019/2021/2022 – today"), newest
    concrete op date in-source is March 2024 (shortlinkview[.]live). Defensible
    recent-window bound; not fabricated, left as-is.
    [d] DOCTRINE — two corrections. (1) constitutional-irgc-role/
    regime-preservation: KEPT strongly_inferred (attesting null) + ADDED
    inference_basis.signals+ruled_out. Mandiant DOES state the goal at the
    service-remit level (IRGC-IO "responsible for monitoring and preventing
    foreign threats to the Islamic Republic and domestic unrest"; "APT42
    targeting and missions are consistent with its assessed affiliation") — a
    credible attested argument — BUT corpus convention reserves `attested` on
    this pillar for GOVERNMENT purpose-statements (sands-casino→ODNI,
    apt39-rana→Treasury, irgc-trio→DOJ) and labels vendor-only Iran-collection
    ops strongly_inferred (siblings apt42-israeli-cyber-experts, earth-simnavaz/
    apt34, apt35-treasury). Held to convention; the remit quote is captured in
    signals[] so an upgrade is a one-edit Kara call. (2) cyber-deniable-
    retaliation/diaspora-targeting: DOWNGRADED strongly_inferred → plausible +
    added inference_basis.alternatives. Parent doctrine encodes DENIABLE
    retaliation laundered through hacktivist claim-and-leak personas
    (HomeLand Justice, CyberAv3ngers); this op is clandestine espionage with no
    hacktivist front, and the espionage/regime-preservation reading (link 1) is a
    serious, dominant competitor, so strongly_inferred's "no serious competitor"
    test fails. Kept (pillar name-drops APT42) but FLAGGED as removal/merge
    candidate — mechanism-mismatched and largely redundant with link 1.
    [e] ATTRIBUTION_LEVEL — ADDED `named-unit` (was missing). Mandiant names both
    the actor (APT42) and the specific service (IRGC Intelligence Organization),
    a named intelligence unit.
    [f] ACTOR ✓ resolves — ir/irgc-io/apt42 (atlas/actors/ir/apt42.yaml, id
    ir/irgc-io/apt42, primary_service_id ir/irgc-io, +ir/irgc). Placement
    service-verified 2026-06-24 off this same source's IRGC-IO quote; NO change
    (orchestrator's "ir/irgc/apt42" note superseded by the more-specific verified
    IRGC-IO placement). Malware families NICECURL (VBScript) + TAMECAT
    (PowerShell) and the IRGC-IO named-unit affiliation both independently
    confirmed in RAW. Source tier kept `secondary` (Mandiant actor-mapping/
    profile genre is tiered secondary in-corpus — apt34/apt39/charming-kitten
    profiles, APT43 report — and the prior audit kept it); FLAGGED
    defensible-either-way (a case exists for primary given net-new NICECURL/
    TAMECAT discovery).
