summary: |
  Check Point disclosed Void Manticore (aka Storm-842), an Iranian MOIS-affiliated destructive actor operating the 'Karma' hacktivist persona against Israel and 'Homeland Justice' against Albania. It deploys the custom BiBi wiper (named after PM Netanyahu) in Windows and Linux variants plus partition wipers (JustMBR, LowEraser, Pinky), claiming 40+ Israeli victims via data theft, wiping and leaks. Notably, Check Point documents a systematic target handoff: Scarred Manticore exfiltrates over long dwell, then transfers access to Void Manticore for the destructive phase. Distinct from the inventory's existing HomeLand Justice and Handala entries; ties to the Albania/HomeLand Justice lineage but is a separately-tracked MOIS destructive unit.
