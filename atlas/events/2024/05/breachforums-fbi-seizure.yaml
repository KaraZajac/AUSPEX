incident_type:
  - disruption
initial_vector: n/a
outcome_summary: |
  On May 15 2024 the FBI seized the BreachForums clearnet
  domain, onion site, and associated Telegram channels — the
  forum's third-generation incarnation after the March 2023
  arrest of "Pompompurin" (Conor Brian Fitzpatrick) and its
  June-2023 reopening under co-administrator "Baphomet". The
  international operation included partner authorities from
  Australia, Iceland, New Zealand, Switzerland, UK, US, and
  Ukraine. Site was used in the interim by ShinyHunters,
  IntelBroker, and others for resale of stolen data and
  extortion operations. The forum was operationally restored
  under ShinyHunters-cluster operators within approximately
  24 hours; no operator arrests were announced contemporaneously
  with the seizure.
false_flag_risk: none
summary: |
  Second BreachForums takedown in the English-language
  breach-forum lifecycle. AUSPEX classifies as criminal-
  baseline: the forum was a marketplace for data-broker
  resale rather than a state-tasked exfiltration site, but is
  significant as one of the primary venues used by
  ShinyHunters to monetize the Snowflake-era 2024 leaks
  (AT&T, Ticketmaster, Santander). The rapid recovery and
  the absence of contemporaneous arrests illustrate the
  limited disruptive efficacy of domain-only seizures
  against the post-2023 generation of breach forums.
