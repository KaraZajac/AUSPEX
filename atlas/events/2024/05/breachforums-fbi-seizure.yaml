outcome_summary: |
  On May 15 2024 the FBI — with the DOJ and international
  partners (Australia, Iceland, New Zealand, Switzerland, UK,
  US, Ukraine) — seized the BreachForums clearnet domain
  (breachforums.st), its dark-web (onion) site, and forum
  administrator "Baphomet"'s Telegram channel, replacing them
  with a seizure banner and standing up an FBI/IC3 victim-
  reporting page (breachforums.ic3.gov). The seized site was
  the ShinyHunters/Baphomet "v2" incarnation that ran June 2023
  to May 2024 — successor to "Pompompurin" (Conor Brian
  Fitzpatrick)'s BreachForums v1 (March 2022–March 2023;
  Fitzpatrick arrested March 2023) and to RaidForums (seized
  2022), the third forum in that lineage. The FBI and DOJ issued
  no press release (both declined press comment); the seizure
  banner and the IC3 page were the primary artifacts. No
  operator arrests were announced by law enforcement
  contemporaneously with the seizure — the banner depicted the
  ShinyHunters and Baphomet avatars "behind bars," but the FBI
  said only that it was reviewing the site's backend data.
  Within roughly 24 hours (May 16 2024) ShinyHunters reported
  reclaiming the clearnet and dark-web domains from the FBI
  through the domain registrar — the seizure notice was replaced
  with a "Site Temporarily Unavailable" page — with full
  operational restoration following later that month.
  ShinyHunters subsequently claimed co-administrator Baphomet
  had been apprehended, but authorities did not confirm it.
false_flag_risk: none
summary: |
  Second seizure of a BreachForums-branded site in the English-
  language breach-forum lineage (RaidForums → BreachForums v1 →
  v2). AUSPEX classifies as criminal-baseline: per the FBI the
  forum was a clearnet marketplace for resale and trade of
  stolen data and other contraband, not a state-tasked
  exfiltration site — though it is significant as one of the
  primary venues ShinyHunters used to monetize the Snowflake-era
  2024 leaks (AT&T, Ticketmaster, Santander; see the sibling
  ShinyHunters / Snowflake events). The rapid domain-reclamation
  and the absence of contemporaneous arrests illustrate the
  limited disruptive efficacy of domain-only seizures against
  the post-2023 generation of breach forums.
