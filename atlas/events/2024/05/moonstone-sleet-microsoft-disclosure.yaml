initial_vector: phishing
outcome_summary: |
  Microsoft MSTIC publicly disclosed the Moonstone Sleet
  cluster (formerly Storm-1789) on 28 May 2024. Documented
  tradecraft: trojanized PuTTY binaries delivered via
  LinkedIn/Telegram/freelancing platforms; fake-company
  social engineering ("StarGlow Ventures," "C.C. Waterfall");
  a malicious DeTankWar game; malicious npm packages;
  FakePenny custom ransomware carrying a $6.6M USD (BTC)
  demand, first deployed in April 2024. Per MSTIC the
  targeted sectors are software / information technology,
  education, and the defense industrial base (named victims
  include defense-technology, drone, and aircraft-parts
  makers).
false_flag_risk: none
summary: |
  Cluster-disclosure event marking the formalization of
  Moonstone Sleet as a distinct DPRK cluster (begun as a
  Diamond Sleet code-reuser before diverging). Notable for
  unusually creative cover — fake-company social
  engineering, a malicious computer game, npm-package
  distribution — and for the hybrid mission MSTIC frames as
  "financial and cyberespionage": revenue (FakePenny
  ransomware) alongside defense-aerospace IP theft.
