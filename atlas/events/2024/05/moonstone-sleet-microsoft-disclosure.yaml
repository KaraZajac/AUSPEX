id: 2024-05/moonstone-sleet-microsoft-disclosure
name: Microsoft MSTIC outs Moonstone Sleet (Storm-1789)
start_date: 2023-08-01  # earliest tracked Moonstone Sleet activity
disclosure_date: 2024-05-28
end_date: null
incident_type:
  - documentary
  - intrusion
  - ransomware
initial_vector: phishing
outcome_summary: |
  Microsoft MSTIC publicly disclosed the Moonstone Sleet
  cluster (Storm-1789 predecessor) on 28 May 2024.
  Documented tradecraft: trojanized PuTTY and SumatraPDF
  binaries; fake-company social engineering ("StarGlow
  Ventures," "C.C. Waterfall"); malicious DeTankWar game;
  npm-package distribution; FakePenny custom ransomware
  with a $6.6M demand documented in April 2024. Targets
  span software vendors, defense aerospace, education, IT,
  and financial services.
false_flag_risk: none
summary: |
  Cluster-disclosure event marking the formalization of
  Moonstone Sleet as a distinct DPRK cluster (begun as a
  Diamond Sleet code-reuser before diverging). Notable for
  unusually creative cover — fake-company social
  engineering, a malicious computer game, npm-package
  distribution — and for being one of the first DPRK
  clusters with a hybrid revenue (ransomware) +
  espionage (defense / aerospace) mission stack.
