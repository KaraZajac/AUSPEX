id: 2024-05/moonstone-sleet-microsoft-disclosure
name: Microsoft MSTIC outs Moonstone Sleet (Storm-1789)
start_date: 2023-08-01  # earliest tracked Moonstone Sleet activity
disclosure_date: 2024-05-28
end_date: null
incident_type:
  - documentary
  - intrusion
