  notes: |
    Audited vs Microsoft MSTIC "Moonstone Sleet emerges as new North Korean
    threat actor with new bag of tricks" (2024-05-28). Raw snapshot reused +
    sha256 RE-VERIFIED 8aecf4fe…60ac397e (321,294 bytes), unchanged from the
    2026-06-24 capture. Real HTTP-200 article, NOT a phantom (in-body hits:
    StarGlow 13, C.C. Waterfall 9, DeTankWar 11, FakePenny 7, PuTTY 15).

    [a] FACTS — mostly source-carried; three embellishments stripped.
    • "formerly Storm-1789": VERBATIM "a new North Korean threat actor, now
      tracked as Moonstone Sleet (formerly Storm-1789)". Fixed the ambiguous
      "(Storm-1789 predecessor)" -> "(formerly Storm-1789)"; Storm-1789 is the
      prior DESIGNATION, not a predecessor actor.
    • Trojanized PuTTY: VERBATIM "In early August 2023, Microsoft observed
      Moonstone Sleet delivering a trojanized version of PuTTY … via apps like
      LinkedIn and Telegram as well as developer freelancing platforms."
      CORRECTION: removed "SumatraPDF" from Moonstone Sleet's tradecraft — the
      source assigns trojanized SumatraPDF to DIAMOND Sleet ("before Moonstone
      Sleet used this initial access vector, Microsoft observed Diamond Sleet
      using a similar method – trojanized PuTTY and SumatraPDF … as we reported
      in 2022"), NOT to Moonstone Sleet. Prior prose conflated the two clusters.
    • StarGlow Ventures / C.C. Waterfall: CONFIRMED ("Moonstone Sleet's fake
      company StarGlow Ventures posed as a legitimate software development
      company"; "Moonstone Sleet used a fake company called C.C. Waterfall to
      contact targets").
    • DeTankWar: CONFIRMED "a malicious tank game it developed called DeTankWar
      (also called DeFiTankWar, DeTankZone, or TankWarsZone)."
    • Malicious npm packages: CONFIRMED "Microsoft has observed Moonstone Sleet
      targeting potential victims with projects that used malicious npm
      packages." (npm IS in the May-28 source, defeating any 'npm = Aug-2024
      only' concern.)
    • FakePenny $6.6M: CONFIRMED "In April 2024, Microsoft observed Moonstone
      Sleet delivering a new custom ransomware variant we have named FakePenny
      … The ransom demand was $6.6M USD in BTC"; "this is the first time we
      have observed this threat actor deploying ransomware."
    • TARGET SECTORS — CORRECTION: stripped "financial services". The
      authoritative targeting sentence is "Targeted sectors to date include …
      the software and information technology, education, and defense industrial
      base sectors." "Financial services" occurs ONLY in the page's site-nav
      industry menu (Microsoft boilerplate), never as a Moonstone Sleet victim
      sector — a nav-scrape embellishment. Rewrote to MSTIC's three sectors.
      Named victims (confirmed) were a "defense technology company", "a company
      that makes drone technology", and "a company that makes aircraft parts"
      -> aerospace/defense holds.
    • Diamond Sleet lineage: CONFIRMED "the actor demonstrated strong overlaps
      with Diamond Sleet, extensively reusing code from known Diamond Sleet
      malware like Comebacker … However, Moonstone Sleet quickly shifted to its
      own bespoke infrastructure" + "establishing itself as a distinct,
      well-resourced North Korean threat actor." CORRECTION: removed the
      unverifiable superlative "one of the first DPRK clusters with a hybrid …
      mission stack"; re-anchored to MSTIC's own "financial and cyberespionage"
      dual-objective wording.

    [b] ATTRIBUTION — Microsoft MSTIC, high org-confidence: the source declares
    (does not hedge) the cluster "is North Korean state-aligned" / "a new North
    Korean threat actor"; a fully named, dedicated-report cluster = high.
    auspex_assessment concur kept. attribution_source_id resolves.

    [c] DATES — source published_on 2024-05-28 = article date. start_date
    2023-08-01 = "In early August 2023, Microsoft observed Moonstone Sleet
    delivering a trojanized version of PuTTY" (earliest tracked activity).
    disclosure_date 2024-05-28. end_date null (active actor). All consistent.

    [d] DOCTRINE_LINKS — both kp/8th-congress-defense-plan, both
    strongly_inferred, NEITHER attested — correct per this doctrine's own
    per-event rule (a vendor report naming only the PROXIMATE revenue goal is
    strongly_inferred, not attested). Link 1 (revenue-aggregation): proximate
    goal stated VERBATIM — "Microsoft assesses that Moonstone Sleet's objective
    in deploying the ransomware is financial gain, suggesting the actor conducts
    cyber operations for both intelligence collection and revenue generation";
    terminal WMD/8th-Congress goal NOT stated -> strongly_inferred holds,
    inference_basis intact. Link 2 (strategic-tech-collection): ADDED the
    missing attesting_source_id + inference_basis (signals = defense-tech / drone
    / aircraft-parts intrusions to "steal credentials and intellectual
    property", plus the "financial and cyberespionage" objective; ruled_out =
    generic espionage / the un-stated terminal missile-modernization goal).
    No source names the terminal purpose, so attested correctly avoided.

    [e] ATTRIBUTION_LEVEL — was MISSING; SET named-actor. MSTIC names a nation
    (North Korea) + a coined cluster (Moonstone Sleet) but NO DPRK service/unit
    (no RGB, Bureau 121, Unit 121) — consistent with the kp/unscoped placement.

    [f] ACTOR_ID — kp/unscoped/moonstone-sleet resolves to
    atlas/actors/kp/moonstone-sleet.yaml (id kp/unscoped/moonstone-sleet),
    already audited + demoted from kp/rgb on 2026-06-24. No actor edit made.

    FLAGS (orchestrator): (1) actor kp/unscoped/moonstone-sleet lists
    target_sector_ids finance/banking and ict/telecom that the sole cited source
    does NOT support (source names only software/IT, education, defense
    industrial base) — trim candidate. (2) actor ttp_summary repeats the
    trojanized "PuTTY and SumatraPDF" conflation (SumatraPDF was Diamond Sleet's)
    and calls npm an "August 2024 follow-on" though npm is documented in this
    May-28 source — fix candidate. Actor files not edited per protocol.

    RESIDUAL: the source carries an internal Feb-vs-Dec-2023 discrepancy for when
    the ransomed defense-tech company was first compromised ("previously
    compromised in February" vs "In early December 2023 … compromising a defense
    technology company"); left unspecified in the event prose to avoid importing
    the source's own ambiguity.
