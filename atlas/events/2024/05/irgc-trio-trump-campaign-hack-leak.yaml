id: 2024-05/irgc-trio-trump-campaign-hack-leak
name: IRGC trio hack-and-leak against Trump campaign — APT42 / Mint Sandstorm overlap
start_date: 2024-05-01
disclosure_date: 2024-08-19  # ODNI joint statement
end_date: 2024-09-27
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Spear-phishing and social engineering against Trump-campaign
  staff, current and former US officials, journalists, and
  NGOs. Mailbox compromise; "hack-and-leak" attempted via
  media and supposed Biden-campaign-associate intermediaries.
  Campaign documents obtained; major US media outlets declined
  to publish; some material leaked to alternative outlets.
false_flag_risk: none
operators_named:
  - jalili-masoud  # IRGC, DOJ Sep 2024
  - aghamiri-seyyed-ali  # IRGC, DOJ Sep 2024
  - balaghi-yaser  # IRGC, DOJ Sep 2024
summary: |
  Foundational attested-confidence event for the Post-Soleimani
  Retaliation doctrine — the DOJ September 27, 2024 indictment
  of Masoud Jalili, Seyyed Ali Aghamiri, and Yaser Balaghi
  explicitly states the activity "advance[s] the malign
  activities of the IRGC, including ongoing efforts to avenge
  the death of Qasem Soleimani." This is one of the few cyber
  doctrines codified by a US criminal indictment.
