    EVENT MODELS THE OPERATION (not the indictment): actor ir/irgc-io/apt42, Trump campaign = victim, Iran = attacker; the Sept-27 DOJ indictment + the same-day Treasury sanctions are the counter-actions, captured here as an attribution/attesting source, not as the event shape (correct per the dual-event convention; the counter-action is separately modelled — see policy-actions/us/2024-09-27_irgc-election-interference-sanctions).
    [a] FACTS — all load-bearing claims source-carried. DOJ (verbatim): trio = "Islamic Revolutionary Guard Corps (IRGC) employees, Masoud Jalili … Seyyed Ali Aghamiri … Yaser Balaghi"; "in or around May … the conspirators … begin targeting … an identified U.S. [Presidential Campaign 1]"; "The activity broadened in late June, when the conspirators engaged in a 'hack-and-leak' operation"; leak "to members of the media and individuals associated with … [Presidential Campaign 2]"; VP-vetting material sent "to multiple members of the news media, in an attempt to induce the news media to publish"; distribution "between on or about July 22 and on or about Aug. 31". Google TAG (verbatim): "In May and June, APT42 targets included the personal email accounts of roughly a dozen individuals affiliated with President Biden and with former President Trump … individuals associated with the respective campaigns." CORRECTION: outcome_summary trimmed — "major US media outlets declined to publish; some material leaked to alternative outlets" is NOT in any cited source (true public record — Politico/NYT/WaPo sat on it, later published by alternative outlets — but uncited), replaced with the DOJ-carried "attempt to induce publication; direct recipients did not reply". operators_named (Jalili/Aghamiri/Balaghi) = free-text prose (no person registry), all DOJ-named ✓.
    [b] ATTRIBUTION — no over-attestation after fix. Added a Google TAG row (named-actor: "APT42", "Associated with … IRGC"; confirms the US-campaign targeting) — this is the vendor source that actually attributes the OPERATION to the APT42 actor + carries the "APT42" label in the event NAME (DOJ/ODNI use neither "APT42" nor "Mint Sandstorm"). "Mint Sandstorm" in the name is the actor's Microsoft alias (per actor file, confidence: overlapping) resolved via actor_id — no cited source uses it (acceptable actor-alias framing; not stripped). auspex concur kept on all three.
    [c] DATES — start_date 2024-05-01 VERIFIED (DOJ "in or around May"; Google TAG "In May and June") — NOT a Mandiant-report-date artifact despite the coincidental 2024-05-01 match. disclosure_date 2024-08-19 kept = ODNI joint statement (note Google TAG Aug 14 + Trump-campaign Aug 10 public surfacing predate it; defensible govt-attribution anchor). end_date CORRECTED 2024-09-27 → 2024-08-31: the old value conflated the op end with the indictment (a counter-action); DOJ's last dated hack-and-leak distribution is "on or about Aug. 31". Source published_on: DOJ 2024-09-27 ✓, ODNI 2024-08-19 ✓ (capture title dated "August 19, 2024"), Google TAG 2024-08-14 ✓, Mandiant 2024-05-01 ✓.
    [d] DOCTRINE_LINKS — one attested KEPT, two DOWNGRADED. (1) ir/post-soleimani-retaliation/electoral-discord KEPT attested: DOJ states the terminal goal in substance ("avenge the death of Qasem Soleimani") — added inference_basis.source_quote (verbatim) + source_id; perspective attacker-rationale (default). (2) ir/cyber-deniable-retaliation attested→PLAUSIBLE: no source states its goal and the op lacks the doctrine's defining hacktivist-persona / Telegram-X laundering mechanism (direct-to-media/Biden emailing, no persona); prior "DOJ attribution makes the doctrine linkage attested" was a non-sequitur; added inference_basis.alternatives. (3) ir/constitutional-irgc-role/regime-preservation attested→STRONGLY_INFERRED: DOJ never states the Article-150 / "safeguard the Revolution" goal; kept as the inherited foundational statute with inference_basis.signals (Mandiant IRGC-IO "monitoring and preventing foreign threats" + DOJ IRGC-targeting-of-adversaries) + ruled_out(attested). attesting_source_id set null on both downgrades. colon-space list items quoted per YAML rule.
