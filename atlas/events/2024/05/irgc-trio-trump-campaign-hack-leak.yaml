id: 2024-05/irgc-trio-trump-campaign-hack-leak
name: IRGC trio hack-and-leak against Trump campaign — APT42 / Mint Sandstorm overlap
start_date: 2024-05-01  # DOJ: "in or around May" the trio began targeting the Trump campaign; Google TAG: APT42 campaign targeting "In May and June"
disclosure_date: 2024-08-19  # ODNI/FBI/CISA joint statement (first US-govt attribution; Google TAG vendor confirmation Aug 14)
end_date: 2024-08-31  # DOJ: last dated hack-and-leak distribution "on or about Aug. 31" — the Sept 27 indictment is a counter-action, captured as an attribution_date, not the op end
incident_type:
  - intrusion
  - data-theft
  - influence-operation
initial_vector: phishing
outcome_summary: |
  Spear-phishing and social engineering against Trump-campaign
  staff, current and former US officials, journalists, and
  NGOs; personal-account/mailbox compromise via credential
  harvesting and MFA-code social engineering. In a late-June
  "hack-and-leak" phase (distribution running ~June 27–Aug 31),
  stolen campaign material — including vice-presidential vetting
  documents — was emailed to news-media organizations and to
  individuals believed associated with the Biden campaign in an
  attempt to induce publication; direct recipients did not reply.
false_flag_risk: none
operators_named:
  - jalili-masoud  # IRGC, DOJ Sep 2024
  - aghamiri-seyyed-ali  # IRGC, DOJ Sep 2024
  - balaghi-yaser  # IRGC, DOJ Sep 2024
summary: |
  Foundational attested-confidence event for the Post-Soleimani
  Retaliation doctrine — the DOJ September 27, 2024 indictment
  of Masoud Jalili, Seyyed Ali Aghamiri, and Yaser Balaghi
  explicitly states the activity "advance[s] the malign
  activities of the IRGC, including ongoing efforts to avenge
  the death of Qasem Soleimani." This is one of the few cyber
  doctrines codified by a US criminal indictment.
attributions:
  - actor_id: ir/irgc-io/apt42
    attributing_org: Google Threat Analysis Group (TAG)
    attributing_org_confidence: high
    attribution_level: named-actor  # names "APT42", "Associated with Iran's Islamic Revolutionary Guard Corps (IRGC)"; confirms APT42 targeting of accounts associated with the 2024 US presidential campaigns
    auspex_assessment: concur
    attribution_date: 2024-08-14
    attribution_source_id: google-tag/2024-08-14_apt42-israel-us-phishing
  - actor_id: ir/irgc-io/apt42
    attributing_org: US ODNI / FBI / CISA
    attributing_org_confidence: high
    attribution_level: nation  # Aug 19 joint statement attributes only at NATION level — "which the IC attributes to Iran" (no IRGC/IRGC-IO in the text)
    auspex_assessment: concur
    attribution_date: 2024-08-19
    attribution_source_id: odni/2024-08-19_election-joint-statement
  - actor_id: ir/irgc-io/apt42
    attributing_org: US DOJ
    attributing_org_confidence: high
    attribution_level: named-unit  # indicts 3 named "IRGC employees" (Jalili, Aghamiri, Balaghi); DOJ resolves to the IRGC parent service — the IRGC-IO / APT42 refinement is Mandiant's (in sources[])
    auspex_assessment: concur
    attribution_date: 2024-09-27
    attribution_source_id: doj/2024-09-27_irgc-trio-trump-campaign
doctrine_links:
  - doctrine_id: ir/post-soleimani-retaliation
    pillar_id: ir/post-soleimani-retaliation/electoral-discord
    program_id: null
    confidence: attested
    reasoning: |
      The DOJ indictment states the doctrine's terminal goal in
      substance — the activity advances IRGC efforts "to avenge
      the death of Qasem Soleimani" — one of the few cyber
      doctrines attested by a US criminal indictment. Attacker's
      own doctrine on the attacker's operation (perspective:
      attacker-rationale, default).
    attesting_source_id: doj/2024-09-27_irgc-trio-trump-campaign
    inference_basis:
      source_quote: "The activity was part of Iran's continuing efforts to stoke discord, erode confidence in the U.S. electoral process, and unlawfully acquire information relating to current and former U.S. officials that could be used to advance the malign activities of the IRGC, including ongoing efforts to avenge the death of Qasem Soleimani, the former commander of the IRGC – Qods Force (IRGC-QF)."
      source_id: doj/2024-09-27_irgc-trio-trump-campaign
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/cyber-deniable-retaliation
    pillar_id: null
    program_id: null
    confidence: plausible
    reasoning: |
      DOWNGRADED attested → plausible (2026-07-10 audit). No cited
      source states this doctrine's terminal goal, and the operation
      lacks the doctrine's DEFINING mechanism — laundering through a
      named hacktivist persona running Telegram/X claim-and-leak
      channels. Here the stolen material was emailed directly to news
      media and Biden-campaign associates under no persona (the trio
      merely obscured location with VPNs/VPSs). DOJ attribution of the
      ACTOR does not make the DOCTRINE linkage attested — the prior
      reasoning was a non-sequitur.
    attesting_source_id: null
    inference_basis:
      alternatives:
        - "Cyber-deniable-retaliation (persona-laundering): a covert, deniable hack-and-leak is loosely consistent with the posture, but the corpus doctrine specializes in hacktivist-persona / Telegram-X claim-and-leak laundering (Emennet Pasargad, CyberAv3ngers) which this operation did not use."
        - "Post-Soleimani electoral-discord (better-sourced competitor): the DOJ verbatim ties the same activity to Soleimani-revenge electoral discord — the reading that survives at attested, making the deniable-retaliation reading redundant/weaker here."
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ir/constitutional-irgc-role
    pillar_id: ir/constitutional-irgc-role/regime-preservation
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      DOWNGRADED attested → strongly_inferred (2026-07-10 audit). The
      DOJ does not cite Article 150 / the constitutional role as the
      goal, so it is not attested; but the IRGC-IO's constitutional
      counter-foreign-threat function is the foundational statute the
      Post-Soleimani posture inherits from, and the tasking (IRGC
      intelligence-gathering against US adversary officials, media and
      NGOs) fits the regime-preservation pillar.
    attesting_source_id: null
    inference_basis:
      source_id: mandiant/2024-05-01_apt42-untangling
      signals:
        - "Mandiant (captured raw): APT42 operates for the IRGC-IO, 'a part of the Iranian intelligence apparatus that is responsible for monitoring and preventing foreign threats to the Islamic Republic and domestic unrest' — the constitutional counter-foreign-threat function."
        - "DOJ (captured raw): frames the trio as intelligence-gathering by 'a state-sponsored terrorist organization' against current/former US officials, media and NGOs — targets of the regime-preservation pillar."
      ruled_out: "Attested — the DOJ never states the constitutional / regime-preservation goal (Article 150 / 'safeguard the Revolution') in substance; only the Soleimani-revenge goal is attested, so this inherited-statute link is inferred, not attested."
    counter_explanation: null
    contested: false
    analyst: claude
