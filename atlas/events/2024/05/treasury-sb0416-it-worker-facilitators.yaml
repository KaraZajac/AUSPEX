id: 2024-05/treasury-sb0416-it-worker-facilitators
name: Treasury sb0416 SDN designation of DPRK IT-worker fraud facilitators
start_date: 2024-05-16
disclosure_date: 2024-05-16
end_date: 2024-05-16
incident_type:
  - documentary
initial_vector: unknown
outcome_summary: |
  Treasury OFAC SDN-designated one DPRK entity (Bureau 313)
  and three individuals (Jong Pong Ju, Pak Hwa Song, and a
  third co-conspirator) for facilitating DPRK IT-worker
  fraud targeting US businesses. Press release sb0416
  explicitly states the scheme generated approximately
  USD 800M in 2024 to fund the DPRK's WMD programs.
  Companion to the same-day DOJ Christina Chapman
  superseding indictment.
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
operators_named:
  - jong-pong-ju  # DPRK IT-worker facilitator, OFAC sb0416 May 2024
  - pak-hwa-song  # DPRK IT-worker facilitator, OFAC sb0416 May 2024
summary: |
  Canonical WMD-financing attestation for the IT-worker
  fraud revenue stream. Treasury's sb0416 figure (USD 800M
  in 2024) is the most-cited single-source quantification
  of the IT-worker stream's annual throughput, distinct
  from the larger Lazarus / TraderTraitor crypto-theft
  revenue. Subsequent UN Panel of Experts (April 2024
  final report) and DOJ 14-national indictment (December
  2024) cite this figure as the doctrinal-baseline for
  the parallel-revenue pillar.
