outcome_summary: |
  US Treasury OFAC (press release sb0416) sanctioned two
  entities and six individuals for their roles in DPRK
  government-orchestrated IT-worker schemes that defraud US
  businesses and fund the DPRK's WMD programs — "including
  nearly $800 million in 2024." Designated entities: Amnokgang
  Technology Development Company (a DPRK IT company managing
  overseas IT-worker delegations and procuring military and
  commercial technology; E.O. 13810) and Quangvietdnbg
  International Services Company Limited (a Vietnam company).
  Designated facilitators, based in the DPRK, Vietnam, Laos,
  and Spain: Nguyen Quang Viet (Quangvietdnbg CEO, who
  converted approximately $2.5M into cryptocurrency for North
  Koreans between mid-2023 and mid-2025); Do Phi Khanh and
  Hoang Van Nguyen (associates of U.S.-sanctioned DPRK
  nuclear-procurement facilitator Kim Se Un; E.O. 13382); Yun
  Song Guk (led a group of DPRK IT workers out of Boten,
  Laos); Hoang Minh Quang; and York Louis Celestino Herrera
  (E.O. 13810).
false_flag_risk: none
campaign_id: dprk-it-worker-enforcement-arc
summary: |
  OFAC's sb0416 designation carries the canonical single-source
  quantification of the DPRK IT-worker fraud revenue stream:
  Treasury states the schemes generated "nearly $800 million in
  2024" to fund the regime's WMD and ballistic-missile programs
  — a figure distinct from the larger Lazarus / TraderTraitor
  crypto-theft revenue. The action targets the overseas
  facilitation layer (currency-conversion and bank-account
  proxies in Vietnam, and an IT-worker delegation manager and
  freelance-contract coordinators tied to Laos) rather than the
  workers themselves, extending the enforcement arc into the
  money-movement and procurement networks that monetize the
  scheme.
