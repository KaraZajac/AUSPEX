summary: |
  Microsoft Threat Intelligence (15 May 2024) attributed a social-engineering campaign abusing the Quick Assist remote-assistance tool to the financially motivated group Storm-1811, which deploys Black Basta ransomware. Operators use voice phishing (vishing) - often after email-bombing a target - to impersonate Microsoft technical support or IT staff and gain remote access via Quick Assist. They then deliver tooling including Qakbot, Cobalt Strike, ScreenConnect, NetSupport Manager and SystemBC, and use PsExec to deploy Black Basta ransomware across the network. Microsoft links the activity to Storm-1811 as the initial-access vector leading to Black Basta deployment.
