id: 2024-05/mstic-attributes-quick-assist-teams-vishing-social-engineering-to-blac
name: "MSTIC attributes Quick Assist / Teams vishing social-engineering-to-Black-Basta intrusions to Storm-1811"
start_date: 2024-04-15  # source: Quick Assist abuse observed "Since mid-April 2024"; 2024-05-15 is the disclosure date
disclosure_date: 2024-05-15
incident_type:
  - intrusion
  - ransomware
  - extortion
initial_vector: phishing
false_flag_risk: none
summary: |
  Microsoft Threat Intelligence reported (blog published 15 May 2024) a social-engineering campaign - observed since mid-April 2024 - that abuses the Quick Assist remote-assistance tool, attributed to the financially motivated cybercriminal group Storm-1811, which deploys Black Basta ransomware. Operators use voice phishing (vishing) - often after email-bombing a target - to impersonate Microsoft technical support or IT staff and gain remote access via Quick Assist; a late-May 2024 update added Microsoft Teams (attacker-created tenants posing as "Help Desk") as a further contact vector. They then deliver tooling including Qakbot, Cobalt Strike, ScreenConnect, NetSupport Manager and SystemBC, and use PsExec to deploy Black Basta ransomware across the network. Microsoft frames Storm-1811 strictly as a financially motivated cybercriminal group (no state nexus) and links the activity to it as the initial-access vector leading to Black Basta deployment.
