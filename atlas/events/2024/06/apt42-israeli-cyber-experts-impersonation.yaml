id: 2024-06/apt42-israeli-cyber-experts-impersonation
name: APT42 impersonates cybersecurity professionals to phish Israeli academics
start_date: 2024-06-15
disclosure_date: 2025-06-15
end_date: 2025-06-30
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  Beginning mid-June 2024 and continuing through the 2025 Israel-
  Iran war period, APT42 (Educated Manticore / Charming Kitten /
  Mint Sandstorm) operators impersonated fictitious cybersecurity-
  firm employees via email and WhatsApp to phish top cyber and
  computer-science researchers at leading Israeli universities.
  Operators lured targets to fake Gmail and Google Meet pages
  to harvest credentials and 2FA codes. Lure text appears AI-
  generated; some lures detected via operator-error name
  mismatches between sender display-name and email-account name.
false_flag_risk: none
summary: |
  Sustained Israeli-academic credential-collection campaign
  paralleling the broader APT42 anti-Israel tempo surge that
  Google TAG documented in August 2024 (the 45-campaigns-per-
  day peak). Doctrinally tags the constitutional-IRGC-role
  pillar (counter-foreign-threat tasking against Israeli
  defense-and-research community) and the Resistance-Axis
  anti-Israel-coercion pillar. Notable as a tradecraft data
  point for the cluster's AI-generated lure adoption.
