id: 2024-06/apt36-blackberry-defense-poseidon
name: BlackBerry documents Transparent Tribe Poseidon and ElizaRAT campaigns against Indian defense
start_date: 2024-02-01
disclosure_date: 2024-06-18
end_date: 2024-06-18
incident_type:
  - intrusion
  - data-theft
initial_vector: phishing
outcome_summary: |
  BlackBerry's threat-research team published an analysis of
  Transparent Tribe operations in 2024 documenting the Poseidon
  loader and the newer ElizaRAT Windows implant family, deployed
  alongside the continuing Crimson RAT staple. Targets included
  Indian Ministry of Defence personnel and defense-research
  organizations. ElizaRAT's emergence was a notable tradecraft
  development: the cluster has historically reused Crimson RAT
  rather than developing new core implants.
false_flag_risk: none
summary: |
  Notable for the introduction of ElizaRAT into Transparent Tribe's
  tooling repertoire — the most significant tradecraft refresh
  for the cluster in years. Continued targeting of Indian MoD
  and defense-research equities maintains the canonical
  Pakistani-asymmetric military-collection pattern. The Crimson
  RAT remains the historical signature but the modernized chain
  is operationally meaningful.
