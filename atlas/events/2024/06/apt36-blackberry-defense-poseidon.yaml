  notes: |
    PHANTOM-REMEDIATION -> RE-SOURCE (badrabbit model). The event is REAL
    but its cited source URL was a phantom and its headline malware were
    misattributed. Audited against BlackBerry Threat Research "Transparent
    Tribe Targets Indian Government, Defense, and Aerospace Sectors
    Leveraging Cross-Platform Programming Languages" (publ. 2024-05-22).
    Raw snapshot captured from the live Arctic Wolf mirror (Arctic Wolf
    acquired BlackBerry's Cylance unit and hosts the identical report;
    blogs.blackberry.com now redirects to its blog homepage and
    archive.org is fetch-blocked). A curl of the recorded url is
    byte-identical to the snapshot: sha256 12b84de2...778f70db, 394,365 B.

    PHANTOM: prior source url was .../en/2024/06/transparent-tribe-targets-
    indian-government-defense-and-aerospace (no "-sectors") — it 200s but
    redirects to the BlackBerry blog HOMEPAGE ("Secure Communications
    Blog"), carrying none of the article body (grep for poseidon/elizarat/
    crimson/aerospace on the homepage = 0). Real article is the
    .../2024/05/...-aerospace-sectors post (matches the existing archive_url).

    [a] FACTS -- REWRITTEN. STRIPPED as uncarried: "ElizaRAT" (0 occurrences
    in the source; ElizaRAT is a Check Point Oct/Nov-2024 discovery -- see
    event 2024-11/checkpoint-elizarat-evolution-apt36) and the "Crimson RAT
    staple" (<=1 incidental token; WebFetch of the article confirms Crimson
    RAT "not mentioned" as a payload). The prior event's thesis ("introduction
    of ElizaRAT ... most significant tradecraft refresh") was fabricated/
    misattributed. ADDED the actual documented payloads GLOBSHELL (Python/ELF
    file-exfil; variants bashd/basho/bashu + Windows win_service.exe/
    win_hta.exe; harvests /media documents) and PYSHELLFOX (Firefox-session
    exfil, as bashm), plus the cross-platform-language (Python/Golang/Rust)
    and web-service abuse (Telegram/Discord/Slack/Google Drive) framing --
    all verbatim in the source. POSEIDON corrected, NOT stripped: source says
    "Transparent Tribe has employed desktop entry files to deliver Poseidon
    payloads in ELF format. Poseidon is a Golang agent that compiles into
    Linux and macOS x64 executables" and it "currently remains part of the
    group's toolkit; however, we haven't confirmed the specific attack vector"
    -- a real toolkit mention (Golang ELF Linux/macOS agent, vector
    unconfirmed), NOT the "Poseidon loader" headline the event implied.
    initial_vector phishing CONFIRMED ("spear-phishing emails" delivering
    "malicious ZIP archives or links"; also ISO images / WinRAR).

    [b] ATTRIBUTION -- source: "Pakistani-based advanced persistent threat
    group Transparent Tribe (APT36)"; "we assess with moderate to high
    confidence ... conducted by Transparent Tribe"; "multiple artifacts that
    substantiate our attribution". DOWNGRADED attributing_org_confidence
    high -> moderate (floor of the stated "moderate to high" range;
    over-attestation guard). auspex_assessment concur retained.

    [c] DATES -- FIXED. attribution_date/disclosure_date 2024-06-18 ->
    2024-05-22 (JSON-LD datePublished 2024-05-22T19:11:03Z). Campaign window
    per source "late 2023 to April 2024": start_date 2024-02-01 -> 2023-11-01
    (best-estimate "late 2023"); added end_date 2024-04-30. NB the immutable
    event id/path (2024-06) predates the true 2024-05-22 disclosure by a
    month -- slug left unchanged per the stable-slug rule (cosmetic only).

    [d] DOCTRINE -- pk/asymmetric-posture-india/military-collection kept at
    strongly_inferred (NOT upgraded to attested: the source states the purpose
    only as a hedged "surmise"). Added inference_basis.signals (incl. the
    verbatim "surmise ... monitoring the efforts of the Indian defense forces
    ... aerospace defense capabilities" quote) + ruled_out (kashmir-political
    pillar). attesting_source_id null (correct for strongly_inferred).
    perspective attacker-rationale (default; PK doctrine on a PK-attributed op
    vs IN targets -- no cross-state mismatch).

    [e] ATTRIBUTION_LEVEL -- set named-actor (was absent). Group + nation
    Pakistan; no service unit named.

    [f] ACTOR_ID -- pk/unscoped/transparent-tribe RESOLVES to
    atlas/actors/pk/transparent-tribe.yaml (id: pk/unscoped/transparent-tribe;
    the file path omits the "unscoped" segment but the id itself is correct --
    demoted to unscoped 2026-06-24). No actor-file edit made.

    TARGETS -- REMOVED orgs/indian-defense-research-various (DANGLING FK: no
    such target file) and orgs/indian-mod (the source names no specific MoD
    org -- only the government/defense/aerospace SECTORS + unnamed Bangalore
