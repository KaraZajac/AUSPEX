id: 2024-06/apt36-blackberry-defense-poseidon
name: BlackBerry documents Transparent Tribe cross-platform (GLOBSHELL/PYSHELLFOX) espionage against Indian government, defense, and aerospace
start_date: 2023-11-01
disclosure_date: 2024-05-22
end_date: 2024-04-30
incident_type:
  - intrusion
  - data-theft
  - espionage
initial_vector: phishing
outcome_summary: |
  BlackBerry Threat Research published an analysis of Transparent
  Tribe / APT36 activity spanning late 2023 to April 2024 targeting
  the Indian government, defense (defense forces and defense
  contractors), and aerospace sectors — including unnamed Bangalore
  firms in aerospace, missile development, and earth-moving equipment
  supply. The cluster leaned on cross-platform programming languages
  (Python, Golang, Rust) and abused legitimate web services (Telegram,
  Discord, Slack, Google Drive) for command-and-control and
  exfiltration. The documented payloads were GLOBSHELL — a Python/ELF
  file-exfiltration utility (variants bashd/basho/bashu plus Windows
  win_service.exe / win_hta.exe) that harvests documents from the
  /media directory — and PYSHELLFOX (implemented as bashm), which
  exfiltrates the victim's Firefox browser session. BlackBerry notes
  that Poseidon (a Golang agent compiling to Linux and macOS ELF
  binaries, delivered via desktop-entry files) remains part of the
  group's toolkit, though it did not confirm the attack vector in this
  cluster. The focus on ELF binaries reflects the Indian government's
  reliance on Linux systems.
false_flag_risk: none
summary: |
  A tradecraft-modernization data point for the Pakistani-aligned
  Transparent Tribe cluster: a pivot to cross-platform languages
  (Python/Golang/Rust) and web-service-hosted C2 (Telegram, Discord,
  Slack, Google Drive), with an emphasis on ELF/Linux payloads suited
  to Indian government systems. The newly documented tooling —
  GLOBSHELL (document exfiltration) and PYSHELLFOX (Firefox-session
  theft) — extends the canonical APT36 arsenal rather than replacing
  it. Continued targeting of Indian government, defense, and aerospace
  equities (including missile-development suppliers) maintains the
  cluster's Pakistani-asymmetric military-collection pattern.
