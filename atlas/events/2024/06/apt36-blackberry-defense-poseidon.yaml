    RESIDUALS / FLAGS: (1) source id + raw-snapshot filename retain the
    misleading "2024-06-18...elizarat" slug (immutable -- not renamed). (2)
    The co-citing event 2024-11/checkpoint-elizarat-evolution-apt36 asserts in
