summary: |
  On 3 June 2024 the Qilin ransomware operation encrypted systems
  at Synnovis — the NHS pathology-services joint venture serving
  Guy's and St Thomas' and King's College Hospital NHS Foundation
  Trusts and primary care across south-east London. Pathology
  services, and blood transfusion in particular, were suspended
  across the affected hospitals, forcing critical-incident
  declarations. Former NCSC chief executive Ciaran Martin publicly
  attributed the attack to Qilin — "a Russian group of cyber
  criminals who call themselves Qilin" — and the gang self-claimed
  by publishing stolen data on its dark-web leak site. Qilin
  demanded a US$50 million ransom (per its own statement to
  Bloomberg); when Synnovis did not pay, on 20 June 2024 the gang
  published roughly 400 GB of stolen pathology data, later found
  to affect more than 900,000 people. NHS England confirmed the
  incident delayed over 11,000 outpatient and elective-procedure
  appointments, and in June 2025 King's College Hospital NHS
  Foundation Trust confirmed the attack contributed to a patient's
  death (a long wait for a blood-test result being a contributing
  factor). No state-nexus attribution has been published for Qilin
  — a financially-motivated ransomware-as-a-service operation — so
  AUSPEX places it under criminal/ rather than ru/proxies/.
