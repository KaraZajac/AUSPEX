initial_vector: unknown
outcome_summary: |
  Qilin ransomware intrusion against Synnovis, the pathology-
  services joint venture supplying Guy's and St Thomas' and King's
  College Hospital NHS Foundation Trusts and primary care across
  south-east London. Pathology services — blood transfusion in
  particular — were suspended across the affected hospitals,
  forcing a critical-incident declaration; blood testing in the
  capital fell to around 10% of normal levels and the NHS launched
  a nationwide appeal for O-type blood donors. In the first 13
  days the two worst-hit trusts cancelled 1,134 planned operations
  and 2,194 outpatient appointments, and NHS England ultimately
  confirmed delays to over 11,000 outpatient and elective-procedure
  appointments. After Synnovis did not pay a US$50 million ransom,
  Qilin published roughly 400 GB of stolen data on 20 June 2024;
  the breach was later found to affect more than 900,000 people.
  In June 2025 King's College Hospital NHS Foundation Trust
  confirmed the attack contributed to a patient's death. NHS
  England reported services were fully restored by December 2024.
