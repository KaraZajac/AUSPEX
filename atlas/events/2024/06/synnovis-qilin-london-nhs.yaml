id: 2024-06/synnovis-qilin-london-nhs
name: Qilin ransomware against Synnovis (London NHS pathology)
start_date: 2024-06-03
disclosure_date: 2024-06-04
end_date: 2024-09-30
incident_type:
  - ransomware
  - disruption
  - data-theft
initial_vector: unknown
outcome_summary: |
  Qilin ransomware intrusion against Synnovis, the pathology-
  services joint venture supplying Guy's and St Thomas' NHS
  Foundation Trust, King's College Hospital NHS Foundation Trust,
  and primary care across south-east London. Blood transfusion,
  microbiology, and pathology services were suspended across
  multiple London hospitals for over a week, forcing a critical-
  incident declaration. NHS England subsequently confirmed
  approximately 1,700 elective procedures and 10,000 outpatient
  appointments were cancelled. Patient blood-test data
  (~400GB) was published on Qilin's leak site after Synnovis
  refused payment.
quantified_impact:
  procedures_cancelled: 1700
  appointments_cancelled: 10000
  data_exfiltrated_gb: 400
false_flag_risk: none
summary: |
  The Synnovis incident is the most clinically disruptive single
  ransomware event in UK NHS history. Qilin's affiliate base
  operates a Rust-language encryptor (originally Go, ported in
  early 2023) on an 80/20 affiliate-favorable economic model.
  No public state-nexus attribution exists for Qilin; the
  operator's victim selection in 2024-25 includes targets that
  Russian-state-tolerated RaaS programs typically avoid (Russian-
  language media via Lee Enterprises Eastern Europe subsidiaries),
  weakening any FSB-tolerance hypothesis.
