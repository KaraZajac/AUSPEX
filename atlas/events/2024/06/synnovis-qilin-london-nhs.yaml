  notes: |
    Full 6-point audit vs RAW snapshots of five sources (the legacy single
    NHS England citation had url:null and did not itself name the actor; the
    event was re-sourced — "badrabbit model" — against reachable primaries).
    Snapshots (sha first8…last8 / bytes):
      - ncsc-uk/2024-06-04_synnovis-qilin-statement (NHS England, PRIMARY)
        fa511db5…9b79f57a / 35,726
      - bleepingcomputer/2024-06-05_qilin-london-hospitals  d2fef310…6a5698cc / 89,416
      - therecord/2025-06-25_ransomware-contributed-patient-death  63eac40b…d8f859fa / 85,659
      - scworld/2024-06-19_synnovis-50m-ransom  961c94ab…1196c4cc / 98,584
      - hipaajournal/2025-11-12_synnovis-care-disrupted  fd0a9d19…88bd3061 / 454,691

    [a] FACTS — corrected & now source-carried:
     • Attack date 3 Jun 2024 ✓ NHS England: "On 3 June 2024, Synnovis was the
       victim of a ransomware cyber-attack".
     • end_date 2024-09-30 → 2024-12-31. NHS England: "services were fully
       restored by December 2024" (month-precision; set to end of Dec).
     • Scale re-anchored. DROPPED the un-snapshotted "~1,700 elective / ~10,000
       outpatient" split. Now: NHS England "delays to over 11,000 outpatient and
       elective procedure appointments" (floor 11,000) + first-13-days 1,134
       operations + 2,194 outpatient (HIPAA/BleepingComputer). Blood testing "at
       around 10% of normal levels"; "nationwide appeal … for O blood-type
       donors" / "shortage of O-negative blood" (HIPAA). "critical incident …
       declared" (BleepingComputer, HIPAA).
     • ADDED, each carried: US$50M demand (SC Media: "demanded by the Qilin
       ransomware gang to provide $50 million in ransom"; HIPAA: "$50 million …
       within 120 hours", from Qilin→Bloomberg). Leak 20 Jun 2024 of ~400 GB
       (NHS England leak date; HIPAA "Qilin uploaded 400 GB … to its dark web
       data leak site"). >900,000 people affected (The Record). Patient death
       (The Record / King's College Hospital: "a number of contributing factors
       that led to the patient's death … a long wait for a blood test result
       due to the cyber-attack").
     • STRIPPED unsupported/embellished claims from the old summary: (1) the
       "80/20 affiliate-favorable economic model"; (2) actor tradecraft "Rust
       encryptor (originally Go, ported early 2023)" — neither is carried by any
       event source (they live in the actor record); (3) the "Russian-language
       media via Lee Enterprises Eastern Europe subsidiaries, weakening any
       FSB-tolerance hypothesis" clause — Lee Enterprises is a US local-newspaper
       publisher; the "Eastern Europe subsidiaries / Russian-language media"
       description is unsupported and appears fabricated. (4) "the most
       clinically disruptive single ransomware event in UK NHS history" — no
       snapshot carries a "first"/"most" claim, so the superlative was removed;
       the death + scale carry severity without it.
     • initial_vector kept "unknown". Qilin claimed to Bloomberg it used a
       zero-day but "did not state what vulnerability" and no vendor confirmed —
       an unverified attacker self-claim, so 0-day is NOT asserted.
     • incident_type: added "extortion" (US$50M demand + double-extortion leak);
       ransomware/data-theft/disruption retained.

    [b] ATTRIBUTION — corrected. The old attribution_source_id was the NHS
    England statement, which NEVER names Qilin (grep of the snapshot finds no
    "Qilin"). Re-pointed to bleepingcomputer/2024-06-05_qilin-london-hospitals,
    which carries the actual naming — NCSC's Ciaran Martin: "We believe it is a
    Russian group of cyber criminals who call themselves Qilin" — plus the
    gang's leak-site self-claim (publishing the data). Rewrote attributing_org
    to "Qilin (leak-site self-claim) + UK NCSC (Ciaran Martin) and journalism
    consensus"; attribution_date 2024-06-04 → 2024-06-05. Confidence HIGH and
    auspex_assessment concur RETAINED (authoritative govt naming + gang
    self-claim = high; not over-attested).

    [c] DATES — start 2024-06-03 ✓, disclosure 2024-06-04 ✓ (kept), end
    corrected to 2024-12-31 (above). Each source's published_on set to its true
    date: BleepingComputer datePublished 2024-06-05; The Record 2025-06-25; SC
    Media 2024-06-19; HIPAA datePublished 2025-11-12 (a running write-up — NOT a
    June-2024 piece; the initial draft slug was corrected before writing).

    [d] DOCTRINE_LINKS — [] retained and correct. Qilin is apolitical,
    financially-motivated crime; no doctrine genuinely applies and no source
    states a strategic purpose, so no link is invented (no attested claim).

    [e] ATTRIBUTION_LEVEL — added named-actor (a named criminal group; no state
    service/unit named — consistent with criminal/ placement).

    [f] ACTOR_ID — criminal/qilin resolves to atlas/actors/criminal/qilin.yaml
    ✓. Placement under criminal/ (not ru/proxies/) is consistent with the
    evidence: Ciaran Martin calls Qilin "a Russian group of cyber criminals"
    (geography, not tasking) and no FSB-tolerance attribution is published.
    Directionality verified: perpetrator criminal/qilin (no state) → victim
    orgs/synnovis (nation_state_id uk); added country: uk to the target.

    Residual uncertainties: (i) end_date is month-precise only ("by December
