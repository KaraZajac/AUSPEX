initial_vector: unknown
outcome_summary: |
  CDK Global (US auto-dealer management SaaS, ~15,000 dealership
  customers) suffered a BlackSuit / Royal ransomware intrusion
  forcing a multi-week outage of dealership operations across
  North America. CDK reportedly paid ~USD 25M in Bitcoin ransom.
  Affected dealerships reverted to paper records; estimated
  industry-wide impact ~USD 1B (Anderson Economic Group
  estimate). Q2 2024 US auto sales sharply impacted.
quantified_impact:
  dealerships_affected: 15000
  reported_ransom_paid_usd: 25000000
  downtime_weeks: 2
  industry_impact_usd: 1000000000
false_flag_risk: none
summary: |
  Most economically consequential single SaaS-supply-chain
  ransomware on US public record after Change Healthcare. Royal /
  BlackSuit is a direct Conti splinter that re-uses Conti-era
  tradecraft per the CISA AA23-061A Royal advisory: phishing
  with weaponized PDF / callback-themed lures, Cobalt Strike
  beacons, the Qakbot / IcedID / Truebot loader ecosystem,
  credential dumping with Mimikatz, lateral movement on valid
  credentials, PsExec and RDP, abuse of legitimate remote-
  management tools (AnyDesk, ConnectWise ScreenConnect), data
  exfiltration with rclone to MEGA, and a partial-encryption
  ChaCha20-based encryptor with .royal and .blacksuit extensions.
  The CDK intrusion forced a multi-week outage of dealership
  operations across North America and reinforced the AUSPEX
  criminal-state-symbiosis pattern at scale.
