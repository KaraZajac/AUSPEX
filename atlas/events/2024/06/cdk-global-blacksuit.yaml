id: 2024-06/cdk-global-blacksuit
name: BlackSuit ransomware against CDK Global (US auto-dealer SaaS)
start_date: 2024-06-19
disclosure_date: 2024-06-19
end_date: 2024-07-04
incident_type:
  - ransomware
  - supply-chain
  - disruption
initial_vector: unknown
outcome_summary: |
  CDK Global (US auto-dealer management SaaS, ~15,000 dealership
  customers across North America) suffered a BlackSuit / Royal
  ransomware intrusion in mid-June 2024 that forced a multi-week
  outage of dealership operations; affected dealerships reverted to
  pen-and-paper records. CDK reportedly paid ~USD 25M in Bitcoin
  (387 BTC traced to a BlackSuit-controlled wallet on 2024-06-21;
  CDK did not confirm payment). Anderson Economic Group estimated
  ~USD 1.02B in direct dealer losses and ~56,200 lost new-vehicle
  sales over the June 19 – July 5 disruption window; CDK restored
  substantially all dealers by ~2024-07-04.
quantified_impact:
  dealerships_affected: 15000
  reported_ransom_paid_usd: 25000000
  downtime_weeks: 2
  industry_impact_usd: 1020000000
false_flag_risk: none
summary: |
  With an estimated ~USD 1.02B in industry-wide dealer losses
  (Anderson Economic Group), the CDK Global outage was among the
  most economically consequential single SaaS / supply-chain
  ransomware incidents on US public record (comparable in scale to
  the 2024 Change Healthcare attack). Royal / BlackSuit is a
  post-Conti splinter whose general tradecraft the CISA
  #StopRansomware Royal / BlackSuit advisory (AA23-061A) documents:
  phishing for initial access, Cobalt Strike, credential dumping
  with Mimikatz, lateral movement via PsExec and RDP, abuse of
  legitimate remote-management tools (AnyDesk, ScreenConnect), data
  exfiltration with rclone, and a partial-encryption encryptor
  appending .royal and .blacksuit extensions. CDK never disclosed
  the specific initial-access vector used against it
  (initial_vector: unknown); the BlackSuit attribution rests on
  crypto-tracing of the ~USD 25M ransom (TRM Labs, reported by CNN /
  CyberScoop), not a self-claim or a government / vendor named-actor
  attribution.
attributions:
  - actor_id: criminal/royal
    attributing_org: TRM Labs (crypto-tracing) via CNN / CyberScoop journalism
    attributing_org_confidence: moderate
    attribution_level: named-actor
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-07-11
    attribution_source_id: cnn/2024-07-11_cdk-blacksuit-25m-ransom
    notes: |
      Press / crypto-tracing-level attribution, not a self-claim or a
      govt / vendor named-actor call. TRM Labs traced ~387 BTC (~USD 25M)
      sent 2024-06-21 to a wallet "controlled by hackers affiliated with
      ... BlackSuit" (CNN 2024-07-11), corroborated independently by
      CyberScoop 2024-07-12 ("wallet likely controlled by BlackSuit"). The
      receiving address shared history with "known BlackSuit and Wizard
      Spider victim payments" (Wizard Spider = Conti parent crew). BlackSuit
      named as the group (named-actor); no specific unit / operator. Moderate
      confidence, concur-with-caveat — TRM's "findings do not conclusively
      prove that the payment came from CDK," and CDK never confirmed a payment.
doctrine_links: []
