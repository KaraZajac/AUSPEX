id: 2024-06/anssi-nobelium-france-attribution
name: ANSSI / CERT-FR publishes Nobelium / APT29 intrusion-set report (diplomatic targeting)
start_date: 2020-01-01
disclosure_date: 2024-06-19
end_date: 2024-06-19
incident_type:
  - espionage
  - documentary
initial_vector: phishing
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-006 (19 June 2024,
  English-language) consolidating ANSSI's view of Nobelium /
  APT29 / Midnight Blizzard intrusion-set activity affecting
  French diplomatic entities (Ministry of Foreign Affairs,
  embassies, diplomatic communications infrastructure). Report
  covers the Diplomatic Orbiter campaign and overlapping APT29
  subclusters.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  Companion to the October 2023 APT28 attribution: France's CERT
  publicly attributing sustained Russian foreign-intelligence
  (SVR) operations against French diplomacy. Editorially
  significant as one of the most detailed European national-CERT
  reports on APT29 to date and as evidence of ANSSI's continued
  willingness to publish adversary attribution.
