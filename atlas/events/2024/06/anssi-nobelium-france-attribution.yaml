id: 2024-06/anssi-nobelium-france-attribution
name: ANSSI / CERT-FR publishes Nobelium / APT29 intrusion-set report (diplomatic targeting)
start_date: 2020-10-01  # ANSSI: Nobelium "active since at least October 2020"; French strand from Feb 2021
disclosure_date: 2024-06-19
end_date: 2024-06-19  # publication/disclosure act; underlying Nobelium activity ongoing per the report
incident_type:
  - espionage
  - documentary
initial_vector: phishing
outcome_summary: |
  ANSSI / CERT-FR publication CERTFR-2024-CTI-006 (19 June 2024,
  English-language, TLP:CLEAR, 3 pp) consolidating ANSSI's view of
  the Nobelium / Midnight Blizzard intrusion set, which ANSSI dates
  to at least October 2020 and treats as one of three distinct
  SVR-related intrusion sets (alongside APT29 / The Dukes and Dark
  Halo). The report documents Nobelium activity against French
  diplomatic and government entities: the Ministry for Europe and
  Foreign Affairs (an unsuccessful Cobalt Strike attempt plus
  Apr–May 2022 phishing against dozens of MFA email addresses), the
  Ministry of Culture and the National Agency for Territorial
  Cohesion (ANCT) (compromised via a "Strategic Review" lure,
  Feb–May 2021, no lateral movement), and the French embassies in
  Kyiv and Romania (May 2023). The activity is publicly described as
  the "Diplomatic Orbiter" campaign.
quantified_impact:
  countries_affected: 1
false_flag_risk: none
operators_named: []
summary: |
  Companion to the October 2023 APT28 attribution: France's CERT
  publishing its view of sustained Russian foreign-intelligence
  (SVR)-linked operations against French diplomacy. ANSSI reports
  that Nobelium activity "has been publicly linked to the Russian
  foreign intelligence service SVR" and, in its own prose,
  characterizes APT29 / The Dukes, Dark Halo and Nobelium as three
  distinct "SVR-related intrusion sets"; its own high-confidence
  assessment states only that Nobelium is "almost certainly operated
  on behalf of a state actor." Editorially significant as evidence
  of ANSSI's continued willingness to publish adversary attribution,
  mirroring the CERT-FR APT28 report eight months earlier.
attributions:
  - actor_id: ru/svr/apt29
    attributing_org: ANSSI / CERT-FR
    attributing_org_confidence: high
    attribution_level: named-unit
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-06-19
    attribution_source_id: anssi/2024-06-19_nobelium-malicious-activities
    notes: |
      ANSSI names the SVR — a specific foreign-intelligence service —
      in its own prose ("three different and full-fledged SVR-related
      intrusion sets"), hence attribution_level: named-unit (not
      nation / activity-cluster). Two caveats drive concur-with-caveat:
      (1) ANSSI frames the SVR link as adopted public/community
      attribution ("have been publicly linked to the Russian foreign
      intelligence service SVR"), and its own fresh high-confidence
      sentence names only "a state actor" ("Nobelium is almost
      certainly operated on behalf of a state actor"); (2) ANSSI splits
      APT29 / The Dukes, Dark Halo and Nobelium into three distinct SVR
      intrusion sets, whereas AUSPEX maps Nobelium / Midnight Blizzard
      to the APT29 actor record (both are equivalent aliases there).
doctrine_links:
  - doctrine_id: fr/lutte-informatique-defensive
    perspective: defender-response
    pillar_id: fr/lutte-informatique-defensive/cert-fr-coordination
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      A CERT-FR public report characterizing a foreign adversary's
      intrusion set affecting French diplomatic and government
      entities is a canonical instance of the LID CERT-FR-coordination
      / advisory-publication pillar. strongly_inferred, not attested:
      the report performs the defensive-coordination function but does
      not name 'lutte informatique défensive (LID)' or state that
      doctrinal purpose, so the doctrine-document linkage is AUSPEX's
      inference (mirrors the 2023-10 ANSSI / APT28 sibling event).
    attesting_source_id: anssi/2024-06-19_nobelium-malicious-activities
    inference_basis:
      source_id: anssi/2024-06-19_nobelium-malicious-activities
      signals:
        - "ANSSI/CERT-FR publicly characterizes the Nobelium intrusion set affecting French diplomatic entities (the CERT-FR coordination / advisory-publication function)"
        - "The report is an instance of the CERTFR-NNNN-CTI advisory series the pillar names (CERTFR-2024-CTI-006)"
      ruled_out: "the LID doctrine by name — not named in the report"
    counter_explanation: null
    contested: false
    analyst: claude
  - doctrine_id: ru/fpc-2023
    pillar_id: ru/fpc-2023/anti-anglo-saxon
    program_id: null
    confidence: strongly_inferred
    reasoning: |
      SVR (Nobelium / APT29 / Midnight Blizzard) sustained espionage
      against a leading NATO/EU state's foreign ministry, government
      bodies and embassies — to "exfiltrate strategic intelligence"
      per ANSSI — is strategic foreign-policy collection against an
      "unfriendly state," the license the FPC-2023 anti-Anglo-Saxon
      pillar encodes (operations "against Western foreign-ministries
      ... perceived as instruments of Western policy"). The pillar's
      target_sectors include government/foreign-ministry, the
      doctrine's own cyber-relevance names "SVR-led intelligence
      collection against MFAs ... (Midnight Blizzard mailbox theft)",
      and the pillar is in APT29's default_doctrine_alignment_ids.
    attesting_source_id: null
    inference_basis:
      signals:
        - "ANSSI states the purpose is espionage / to 'exfiltrate strategic intelligence' and 'exfiltrate valuable intelligence' — covert intelligence collection, no leak/influence/destabilization component"
        - "Actor is SVR foreign intelligence (Nobelium / APT29); victims are a NATO/EU state's foreign ministry, government agencies and embassies, amid 'geopolitical tensions ... in relation to Russia's aggression against Ukraine' (ANSSI) — France is an 'unfriendly state' under FPC-2023"
        - "Target profile matches the anti-anglo-saxon pillar's enumerated sectors (government/foreign-ministry)"
      ruled_out: "ru/info-security-2016/information-sphere-as-domain (information confrontation / influence in the media / social-platform / NGO space): ruled out because this campaign is covert diplomatic email-collection espionage with no influence, leak or information-psychological component"
    counter_explanation: null
    contested: false
    analyst: claude
