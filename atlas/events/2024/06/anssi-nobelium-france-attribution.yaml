qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-04
  level: full
  notes: |
    Audited vs ANSSI/CERT-FR CERTFR-2024-CTI-006 "Malicious activities linked to the
    Nobelium intrusion set" (19 Jun 2024, English, TLP:CLEAR, 3 pp). RAW captured: the cited
    CERT-FR landing-page HTML (sha256 0e954d26…5767904b, 16,288 B) and the report PDF it
    links, /uploads/CERTFR-2024-CTI-006.pdf (raw_snapshot; sha256 2ecb16bb…bd3782cf,
    930,774 B) — all facts verified against the PDF. attesting_source is the real ANSSI
    first-party advisory, NOT a phantom: the landing page resolves and links the substantive
    PDF. The PDF is byte-identical (same sha256) to the copy already captured under the
    duplicate source certssigouv/2024-06_anssicert-fr-diplomatic-orbiter-report-n.
    [a] FACTS (corrected). Verified verbatim: Nobelium "active since at least October 2020";
    "most likely for espionage purposes"; "publicly described as a campaign called
    'Diplomatic Orbiter'"; French MFA — unsuccessful Cobalt Strike attempt + Apr–May 2022
    phishing on "dozens of email addresses"; Ministry of Culture + ANCT via "Strategic
    Review" lure Feb–May 2021, attackers "did not manage to move laterally"; French embassies
    in Kyiv ("Diplomatic car for sale", May 2023) + Romania (May 2023, unsuccessful); a
    European embassy in South Africa emailed by an account impersonating a French embassy
    (Mar 2022). CORRECTIONS: removed "diplomatic communications infrastructure" from
    outcome_summary (not in the report — ANSSI names compromised email accounts of diplomatic
    staff, MFA, Ministry of Culture, ANCT); replaced "overlapping APT29 subclusters" with
    ANSSI's explicit "three different and full-fledged SVR-related intrusion sets"
    (APT29/The Dukes · Dark Halo · Nobelium); removed the summary claim "one of the most
    detailed European national-CERT reports on APT29 to date" (unsupported — this is a concise
    3-page TLP:CLEAR summary, not a detailed technical report); named the Ministry of
    Culture/ANCT victims.
    [b] ATTRIBUTION (corrected). Added attribution_level: named-unit — ANSSI names the SVR in
    its OWN prose ("three ... SVR-related intrusion sets"), a specific foreign-intelligence
    service. Changed auspex_assessment concur → concur-with-caveat + added an attribution
    notes block: (i) ANSSI frames the SVR link as adopted public attribution ("have been
    publicly linked to ... SVR") and its own fresh high-confidence sentence names only "a
    state actor"; (ii) ANSSI splits APT29/Dark Halo/Nobelium into three intrusion sets while
    AUSPEX maps Nobelium to the APT29 actor. attributing_org_confidence high retained. This
    matches the audited duplicate event's identical named-unit + concur-with-caveat reading.
    [c] DATES (corrected). start_date 2020-01-01 → 2020-10-01 (ANSSI: "active since at least
    October 2020"; no January-2020 date in the source). disclosure_date/attribution_date/
    end_date = 2024-06-19 (report date); end_date kept at the publication date per the
    documentary-event convention (cf. the 2023-10 APT28 sibling); activity ongoing ("Nobelium
    remains an active threat"). Source published_on 2024-06-19 matches the PDF header.
    [d] DOCTRINE_LINKS (kept + added). LID/cert-fr-coordination (defender-response,
    strongly_inferred) KEPT — correct per the known ANSSI convention (report performs the LID
    coordination function but does not name the doctrine); attesting_source_id = the primary
    supporting ANSSI source, inference_basis present. ADDED the attacker-rationale link
    ru/fpc-2023/anti-anglo-saxon (strongly_inferred, attesting_source_id null), mirroring the
    APT28 sibling's Russian-doctrine link: ANSSI states only the proximate purpose (espionage
    / "exfiltrate strategic intelligence"), so NOT attested; SVR vs a NATO/EU state's foreign
    ministry + embassies amid the Ukraine-war backdrop triangulates to strategic foreign-policy
    collection against an "unfriendly state" — pillar target_sectors include
    government/foreign-ministry, its doctrine cyber-relevance literally names "SVR-led
    intelligence collection against MFAs ... (Midnight Blizzard mailbox theft)", and the pillar
    is in APT29's default alignment. NB on the task's "info-sphere pillar": I RULED OUT
    ru/info-security-2016/information-sphere-as-domain (its domain is information confrontation
    / influence across media / social-platform / NGO sectors) because this campaign is covert
    diplomatic email-collection espionage with no influence/leak/info-psychological component;
    fpc-2023/anti-anglo-saxon is the correct fit. Both links strongly_inferred, not attested
    (the "strongly_inferred not attested" ceiling is honored).
    [e] ATTRIBUTION_LEVEL set to named-unit (see [b]).
    [f] ACTOR_ID ru/svr/apt29 resolves → atlas/actors/ru/apt29.yaml (id: ru/svr/apt29); actor
    well-sourced (WhiteHouse/Treasury/NCSC-UK/MSRC/CISA), status sanctioned, not provisional;
    its default_doctrine_alignment_ids include ru/fpc-2023/anti-anglo-saxon. No actor edit.
    TARGETS (corrected): lowercased country FR → fr on both; kept sectors/government/
    foreign-ministry (MFA heavily targeted — supported here, unlike the APT28 sibling) +
    sectors/government (Ministry of Culture, ANCT). No sector inflation.
    Level: full — load-bearing source fully snapshotted (HTML + PDF) and every retained claim
    source-carried.
    FLAG (DUPLICATE / MERGE candidate): this event and
    2024-06/anssicert-fr-diplomatic-orbiter-report-nobeliummidnight-blizzard-svr-e both rest
    on the SAME report CERTFR-2024-CTI-006 (byte-identical PDF, sha256 2ecb16bb…bd3782cf) via
    two source records — anssi/2024-06-19_nobelium-malicious-activities (tier primary, kind
    cert-advisory) vs certssigouv/2024-06_anssicert-fr-diplomatic-orbiter-report-n (tier
    secondary, kind industry, understated). Kara to merge/retire.
