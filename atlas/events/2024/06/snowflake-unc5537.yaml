id: 2024-06/snowflake-unc5537
name: UNC5537 / Snowflake customer-tenant mass-credential intrusion
start_date: 2024-04-14  # earliest documented campaign exfil (AT&T, per 8-K "between April 14 and April 25, 2024"); Mandiant "In April 2024"
disclosure_date: 2024-05-31  # first public framing as a Snowflake-customer campaign (Live Nation/Ticketmaster 8-K + BleepingComputer roundup)
end_date: null  # not cleanly bounded by any cited source (prior 2024-09-30 was unsourced); operator arrests late Oct 2024 effectively ended it (see 2024-11/moucka-snowflake-indictment)
incident_type:
  - intrusion
  - data-theft
  - extortion
initial_vector: valid-creds
outcome_summary: |
  UNC5537 — a financially motivated actor (Mandiant) — used credentials
  "previously stolen via infostealer malware" (Mandiant names VIDAR,
  RISEPRO, REDLINE, RACOON STEALER, LUMMA and METASTEALER) to log into
  Snowflake CUSTOMER instances whose accounts "did not have multi-factor
  authentication (MFA) enabled," exfiltrate data, advertise it on
  cybercrime forums, and "attempt to extort many of the victims."
  Mandiant and Snowflake "notified approximately 165 potentially exposed
  organizations." Snowflake's own platform was not breached: Mandiant
  found the campaign "is not the result of any particularly novel or
  sophisticated tool, technique, or procedure" but "the consequence of
  the growing infostealer marketplace and missed opportunities to further
  secure credentials" — a customer-tenant identity-hygiene failure (the
  early theory of a breached Snowflake employee account was retracted;
  Snowflake's CISO said "customer accounts were compromised on May 23").
  Independently disclosed victims: AT&T (~110M call/text-metadata records;
  AT&T paid ~USD 370K / 5.72 BTC on 2024-05-17 for deletion + proof —
  8-K / Krebs / WIRED) and Ticketmaster / Live Nation (Live Nation 8-K;
  ShinyHunters advertised ~1.3TB / ~560M-customer data for USD 500K on
  BreachForums — the 560M is the actor's RESALE CLAIM, not an independent
  count — BleepingComputer / TechCrunch). Additional organizations were
  NAMED BY THE THREAT ACTOR as targets/victims — Santander, Advance Auto
  Parts, Neiman Marcus, Anheuser-Busch and others — several of which
  denied impact (BleepingComputer). DOJ later charged Connor Riley Moucka
  ("Judische") and John Erin Binns (indictment filed 2024-10-10) with
  "wire fraud, computer fraud, aggravated identity theft, and related
  conspiracies ... to hack into at least 10 victim organizations," access
  "billions of sensitive customer records," and "extort[] millions of
  dollars"; Moucka consented to extradition from Canada (2025-03-21),
  Binns "not presently in U.S. custody."
quantified_impact:
  organizations_affected: 165  # Mandiant/Snowflake "notified approximately 165 potentially exposed organizations" (NOTIFIED as potentially exposed — not all confirmed-accessed)
  at_t_ransom_paid_usd: 370000  # AT&T-specific: ~USD 373,646 / 5.72 BTC paid 2024-05-17 for deletion (WIRED / TRM Labs)
  # individuals_affected REMOVED (was 700000000, an unsourced cumulative sum): no source carries a campaign-wide
  # count; the two flagship per-victim figures are AT&T ~110M (confirmed) + Ticketmaster ~560M (ACTOR RESALE CLAIM,
  # not independently verified) — not summable into a defensible headline number.
false_flag_risk: none
campaign_id: shinyhunters-snowflake-cluster  # corpus grouping key shared with the AT&T, Ticketmaster and Moucka-indictment siblings (no campaigns/ registry file)
operators_named:
  - moucka-connor-riley  # UNC5537 "Judische"; DOJ indictment filed 2024-10-10; consented to extradition from Canada 2025-03-21
  - binns-john-erin      # co-defendant "irdev"; "not presently in U.S. custody" per DOJ (the "detained in Turkey" specific is press-only, removed)
summary: |
  The AUSPEX type-specimen for "infostealer-logs-to-enterprise-SaaS-tenant
  access at scale": a low-sophistication, high-impact criminal campaign
  whose blast radius came entirely from the customer-side MFA gap, not from
  any Snowflake product vulnerability. Among the largest cumulative-records
  data-theft events on public record (depends on counting method — and the
  single largest figure, Ticketmaster's ~560M, is an unverified actor
  resale claim). Catalyzed an industry-wide push toward mandatory MFA on
  cloud-data-warehouse tenants. A useful AUSPEX boundary case: high
  state-interest datasets (bulk CDR metadata) exfiltrated by a purely
  financial operator with no state nexus.
