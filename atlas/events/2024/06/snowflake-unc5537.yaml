    DOJ, NEITHER of which names any victim or carries any count. Re-pointed
    to the genuine per-victim primaries (all already snapshotted from the
    sibling audits) + one new snapshotted roundup, and stripped the
    unsupportable specifics. Sibling events (all Kara-audited):
    2024-04/att-snowflake-shinyhunters, 2024-05/ticketmaster-shinyhunters-
    leak, 2024-11/moucka-snowflake-indictment.

    [a] FACTS — every load-bearing claim now carried by a snapshotted
    source; embellishment stripped:
    • CAMPAIGN core — Mandiant (548dd3cc…a721e10, 301,145 B): "Mandiant
      tracks this cluster of activity as UNC5537, a financially motivated
      threat actor"; "systematically compromising Snowflake customer
      instances using stolen customer credentials, advertising victim data
