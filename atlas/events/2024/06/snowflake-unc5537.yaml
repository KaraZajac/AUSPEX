      victims"; "credentials previously stolen via infostealer malware …
      VIDAR, RISEPRO, REDLINE, RACOON STEALER, LUMMA and METASTEALER"; "the
      account did not have multi-factor authentication (MFA) enabled";
      "Mandiant and Snowflake have notified approximately 165 potentially
      exposed organizations."
    • 165 = NOTIFIED / "potentially exposed", NOT "165 accessed tenants" —
      prior wording "used … to access ~165 Snowflake customer tenants" was
