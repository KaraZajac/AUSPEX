id: 2024-06/unit42-beavertail-invisibleferret-disclosure
name: Unit 42 disclosure of BeaverTail + InvisibleFerret Contagious Interview campaign
start_date: 2023-11-01  # Unit 42 dates campaign onset to late 2023
disclosure_date: 2024-06-13
end_date: 2024-06-13
incident_type:
  - intrusion
  - financial-theft
initial_vector: phishing
outcome_summary: |
  Palo Alto Unit 42 disclosed two parallel DPRK job-themed
  campaigns. Contagious Interview: BeaverTail JavaScript
  downloader and InvisibleFerret Python backdoor delivered
  via fake job-interview Trojan targeting cryptocurrency
  and Web3 developers — TraderTraitor cluster. Wagemole:
  the IT-worker fraud counterpart, fake resumes / GitHub
  profiles to obtain remote employment for revenue. Both
  campaigns identified across hundreds of victims, multiple
  cryptocurrency-related repositories, and active npm-package
  trojanization activity.
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Canonical TraderTraitor tradecraft documentation for the
  2024 cycle. The BeaverTail (JS first stage) +
  InvisibleFerret (Python second stage) combination
  documented here is the same chain subsequently observed
  in the 2024-2025 npm supply-chain operations and in the
  multiple individual crypto-developer thefts of the
  period. Operation dates back to late 2023 per Unit 42
  reconstruction; concurrent with the Stake.com / CoinEx
  exchange-side operations of September 2023 and the DMM
  Bitcoin supply-chain operation of early 2024.
