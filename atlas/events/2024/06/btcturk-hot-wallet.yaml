qc:
  verified_by: claude-opus-4.8
  effort: max
  verified_on: 2026-07-04
  level: full
  notes: |
    PHANTOM-REMEDIATION -> RE-SOURCE. The event was real and
    well-documented but rested on a single url-null source
    (zachxbt/2024-06-22_btcturk-attribution) that mis-stated ZachXBT
    as attributing the drain to Lazarus/DPRK. Re-sourced to two
    reachable, hashed primaries and stripped the unsupported DPRK
    attribution + doctrine link. Anchor snapshots:
    Halborn "Explained: The BtcTurk Hack (June 2024)" sha256
    8957f84e..2d968122 (242,470 bytes, published 2024-06-25); CCN
    "Binance Freezes $5.3M..." sha256 8c5b9c94..84098b11 (172,811
    bytes, published 2024-06-24).

    [a] FACTS - all carried. Halborn (verbatim): "The attacker stole
    an estimated $55 million worth of cryptocurrency from the
    project's hot wallets"; "attacks against ten hot wallets... The
    majority of the exchange's assets were held in cold wallets,
    which were unaffected"; cause "compromised private keys";
    "significant impacts on the price of some cryptocurrencies - such
    as Luna Classic - after the attacker dumped large volumes";
    "Binance froze over $5.3 million - roughly 10% of the stolen
    tokens." CCN (verbatim, BtcTurk statement): "detected a cyber
    attack on June 22, 2024... Only portions of the balances of 10
    cryptocurrencies in hot wallets were affected, while most assets
    stored in cold wallets remain secure"; ZachXBT's address "has
    transferred 1.96 million AVAX, valued at approximately $54.2
    million, to Coinbase and THORChain." CORRECTIONS: usd_stolen
    54,000,000 -> 55,000,000 (Halborn's headline figure; $54.2M is
    specifically ZachXBT's AVAX-tracked subset; other reporting
    $48-55M - range noted in prose). asset_classes [ETH,BTC,TRX,SOL]
    -> [AVAX,BTC,ETH,LUNC]: the prior list omitted AVAX (the headline
    asset) and listed TRX/SOL, which no reachable source carries;
    replaced with the assets actually named in the hashed Halborn
    snapshot (AVAX, BTC, Ethereum, Luna Classic). Removed
    campaign_id: apt38-crypto-pivot (presupposed DPRK/APT38).

    [b] ATTRIBUTION - the load-bearing correction. The cited source
    claimed a "ZachXBT on-chain attribution to Lazarus by
    wallet-cluster overlap with prior DPRK operations including the
    Sinbad laundering chain." This is UNSUPPORTED and contradicts
    what ZachXBT actually published: he named a culprit ADDRESS
    cashing 1.96M AVAX out to Coinbase/THORChain and (Halborn) found
    it "highly likely that the BtcTurk attackers targeted Sportsbet,
    an online casino... Sportsbet suffered a $3.5 million theft" -
    an ordinary criminal cash-out, not a DPRK signature. NEITHER
    hashed source mentions Lazarus, North Korea, or DPRK anywhere.
    No government or first-tier vendor attribution exists. The FBI's
    Dec-2024 DPRK/TraderTraitor attribution names the SEPARATE DMM
    Bitcoin ($308M) theft and never mentions BtcTurk. ACTION:
    actor_id kp/rgb/lazarus -> null (unattributed criminal theft);
    attributing_org_confidence moderate -> low; attribution_level ->
    null (ZachXBT reached only address-level, below activity-
    cluster); auspex_assessment concur-with-caveat -> partial;
    attribution_source_id re-pointed to the CCN snapshot.

    [c] DATES - start/disclosure/end 2024-06-22 all confirmed by
    BtcTurk's own statement (CCN: "June 22, 2024"). Single-day drain;
    end_date 2024-06-22 retained. New source published_on set to
    actual pub dates (Halborn 2024-06-25 from page JSON; CCN
    2024-06-24 from datePublished), not the incident date.

    [d] DOCTRINE_LINKS - kp/8th-congress-defense-plan/
    revenue-aggregation/crypto-bridge-theft (plausible, contested)
    REMOVED -> doctrine_links: []. With no DPRK actor, the DPRK
    revenue-generation doctrine no longer applies; per protocol an
    empty list is the honest state (do not invent one).

    [e] ATTRIBUTION_LEVEL - set to null on the null-actor entry
    (no actor/nation named; ZachXBT identified only an on-chain
    address).

    [f] ACTOR_ID - now null, so no FK. FLAG: kp/rgb/lazarus resolves
    to atlas/actors/kp/lazarus.yaml (file path kp/lazarus.yaml vs id
    kp/rgb/lazarus - pre-existing, unrelated to this event).

    RESIDUALS: exact total loss is "approximately" and varies by
    source ($48-55M); used Halborn's $55M as the best-sourced single
    figure. asset_classes lists the four assets explicitly named in
    the hashed Halborn snapshot; the full ten-chain breakdown is not
    enumerated in reachable reporting. The url-null phantom source
    zachxbt/2024-06-22_btcturk-attribution was de-cited and annotated
    as a RETIRE candidate (nothing else references it).
