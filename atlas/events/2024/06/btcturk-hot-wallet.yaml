id: 2024-06/btcturk-hot-wallet
name: BtcTurk hot-wallet drain
start_date: 2024-06-22
disclosure_date: 2024-06-22
end_date: 2024-06-22
incident_type:
  - financial-theft
initial_vector: unknown
outcome_summary: |
  Approximately USD 54M drained from BtcTurk hot wallets
  across ten chains via private-key compromise. ZachXBT
  on-chain attribution to Lazarus by wallet-cluster
  overlap with prior DPRK operations within hours of the
  drain.
quantified_impact:
  usd_stolen: 54000000
  asset_classes:
    - ETH
    - BTC
    - TRX
    - SOL
false_flag_risk: none
campaign_id: apt38-crypto-pivot
summary: |
  Tertiary-attributed addition to the 2024 Lazarus
  exchange-side portfolio. No US-government PSA was
  published; no vendor (Chainalysis, Elliptic, TRM)
  published independent attribution against the operation
  in the immediate window. ZachXBT's on-chain clustering
  is the canonical attribution source. The operation
  fits the same hot-wallet-key-compromise pattern as
  Stake.com (Sep 2023), CoinEx (Sep 2023), and the
  smaller-scale 2024 drains.
attributions:
  - actor_id: kp/rgb/lazarus
    attributing_org: ZachXBT (independent OSINT)
    attributing_org_confidence: moderate
    auspex_assessment: concur-with-caveat
    attribution_date: 2024-06-22
    attribution_source_id: zachxbt/2024-06-22_btcturk-attribution
    notes: |
      Single-source tertiary-tier attribution.
      Wallet-cluster overlap with prior DPRK
      operations; no government or vendor (Chainalysis,
      Elliptic, TRM) parallel attribution published.
doctrine_links:
  - doctrine_id: kp/8th-congress-defense-plan
    pillar_id: kp/8th-congress-defense-plan/revenue-aggregation
    program_id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
    confidence: plausible
    reasoning: |
      Operational pattern (hot-wallet private-key
      compromise, immediate multi-chain dispersal) and
      proceeds-laundering cluster overlap with attested
      Lazarus operations. Counter-explanation: no
      government or first-tier vendor attribution
      published; criminal-actor alternatives exist for
      hot-wallet drains of this scale.
    counter_explanation: |
      Hot-wallet drains in this dollar range are also
      commonly attributable to ordinary criminal actors;
      the wallet-cluster overlap is the only specific
      DPRK signal published.
    contested: true
    analyst: claude
targets:
  - target_id: orgs/btcturk
    role: primary
    outcome: ~$54M drained from hot wallets across ten chains.
