    attribution_source_id: ccn/2024-06-24_binance-freezes-btcturk-funds
    notes: |
      NO threat-actor attribution. ZachXBT (on-chain) identified
      only a culprit ADDRESS moving 1.96M AVAX (~$54.2M) to
      Coinbase/THORChain and tied the same attacker to a ~$3-3.5M
      Sportsbet casino theft hours later - a criminal cash-out
      pattern, not a DPRK laundering signature. He did NOT name
      Lazarus/DPRK; no government or vendor (Chainalysis, Elliptic,
      TRM) published a North Korea attribution. Prior AUSPEX
      kp/rgb/lazarus attribution - cited to an url-null,
      unverifiable "ZachXBT Lazarus attribution" source - retracted
      as unsupported 2026-07-04. Actor left null: unattributed
      criminal hot-wallet theft.
