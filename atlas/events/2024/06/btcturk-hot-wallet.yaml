id: 2024-06/btcturk-hot-wallet
name: BtcTurk hot-wallet drain
start_date: 2024-06-22
disclosure_date: 2024-06-22
end_date: 2024-06-22
incident_type:
  - financial-theft
initial_vector: unknown
outcome_summary: |
  An estimated USD 55M (reports range ~$48-55M) drained from
  ten BtcTurk hot wallets on 22 June 2024 via compromised
  private keys. Only exchange-owned funds were affected;
  customer balances, held mostly in cold wallets, were not
  impacted. Binance froze over USD 5.3M (~10% of the stolen
  tokens). On-chain investigator ZachXBT identified the
  culprit address moving 1.96M AVAX (~$54.2M) to
  Coinbase/THORChain and assessed the same attacker "highly
  likely" also hit the Sportsbet online casino for ~$3-3.5M
  hours later. No threat actor was attributed.
quantified_impact:
  usd_stolen: 55000000
  asset_classes:
    - AVAX
    - BTC
    - ETH
    - LUNC
false_flag_risk: none
summary: |
  On 22 June 2024 BtcTurk - a large Turkish centralized
  cryptocurrency exchange - detected unauthorized withdrawals
  from ten of its hot wallets, losing an estimated $55M
  (Halborn; other reporting $48-55M) across roughly ten
  cryptocurrencies (AVAX the largest single asset, plus BTC,
  ETH, Luna Classic and others) to compromised private keys.
  Cold-wallet assets were unaffected and BtcTurk stated
  customer balances were not impacted; the exchange suspended
  deposits and withdrawals and worked with Binance, whose CEO
  Richard Teng said it froze over $5.3M of the stolen funds.
  UNATTRIBUTED: on-chain investigator ZachXBT identified the
  culprit address (moving 1.96M AVAX / ~$54.2M to Coinbase and
  THORChain) and judged it "highly likely" the same attacker
  also stole ~$3-3.5M from the Sportsbet online casino hours
  later - an ordinary criminal cash-out/casino pattern. ZachXBT
  did NOT attribute the drain to Lazarus or North Korea, and no
  government or first-tier vendor (Chainalysis, Elliptic, TRM)
  published any DPRK attribution. A prior AUSPEX record
  asserting a "ZachXBT on-chain attribution to Lazarus" rested
  on an unverifiable, url-null source and has been retracted;
  the FBI's Dec-2024 DPRK/TraderTraitor attribution concerns
  the separate DMM Bitcoin theft, not BtcTurk.
attributions:
