  notes: |
    Audited against the ANSSI/CERT-FR primary PDF (CERTFR-2024-CTI-006, raw captured + sha256). ATTRIBUTION: ANSSI names the SVR explicitly — "publicly linked to the Russian foreign intelligence service SVR" and "SVR-related intrusion sets" — and assesses Nobelium "almost certainly operated on behalf of a state actor"; added attribution_level: named-unit (was missing). Note ANSSI phrases the SVR link as a *public/community* attribution it adopts (not a fresh ANSSI finding), and its own confidence sentence names only "a state actor"; high + concur-with-caveat retained, caveat = ANSSI splits APT29/Dark Halo/Nobelium into three distinct SVR intrusion sets while AUSPEX maps to the APT29 actor. FACTS confirmed vs source: Min. of Culture + ANCT via "Strategic Review" lure (Feb–May 2021, no lateral movement); unsuccessful Cobalt Strike vs French MFA + MFA phishing Apr–May 2022; March 2022 South Africa = a *European* embassy emailed by an account impersonating a French embassy (corrected summary — was loosely "targeting of French embassies … South Africa"); French embassies Kyiv ("Diplomatic car for sale", May 2023) + Romania (May 2023, failed). Rewrote summary for precision (dates, the SA impersonation, MFA-attempt failure) and added the ANSSI 3-intrusion-set caveat. published_on 2024-06-19 matches the report header. doctrine_links: strongly_inferred (NATO-as-principal-threat) left as-is and NOT upgraded — ANSSI states espionage/strategic-intelligence purpose and the Ukraine-war backdrop but does not name a NATO-threat strategic goal; attesting_source_id: null correct. attributing_org normalized "certssigouv" → "ANSSI / CERT-FR". actor_id ru/svr/apt29 resolves (service ru/svr verified 2026-06-25). SOURCE: tier 'secondary' PRESERVED per protocol, though this is ANSSI's own first-party publication (arguably govt-primary/primary) — flagged, not changed. raw_snapshot + content_sha256 added to source.
