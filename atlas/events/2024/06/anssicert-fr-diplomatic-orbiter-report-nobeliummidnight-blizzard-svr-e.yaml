id: 2024-06/anssicert-fr-diplomatic-orbiter-report-nobeliummidnight-blizzard-svr-e
name: "ANSSI/CERT-FR 'Diplomatic Orbiter' report — Nobelium/Midnight Blizzard (SVR) espionage against French Ministry of Foreign Affairs, Ministry of Culture, ANCT and French embassies"
start_date: 2024-06-19
incident_type:
  - espionage
  - intrusion
initial_vector: phishing
false_flag_risk: none
summary: |
  On 19 June 2024 ANSSI's CERT-FR published 'Malicious activities linked to the Nobelium intrusion set' (CERTFR-2024-CTI-006, TLP:CLEAR), detailing a sustained SVR-linked campaign (which ANSSI treats as 'Nobelium' — a distinct intrusion set publicly described as the 'Diplomatic Orbiter' campaign) against French and Western diplomatic targets. ANSSI dates Nobelium to at least October 2020 and documents the French strand from Feb 2021 onward: the Ministry of Culture and the National Agency for Territorial Cohesion (ANCT) were compromised via a 'Strategic Review' lure (Feb–May 2021, no lateral movement); those accounts were then used in an unsuccessful Cobalt Strike attempt against the French Ministry for Europe and Foreign Affairs (MFA), with further MFA phishing in Apr–May 2022; in March 2022 a French diplomat's compromised account was used to impersonate a French embassy in an email to a European embassy in South Africa; and in May 2023 the French embassies in Kyiv (a 'Diplomatic car for sale' lure) and Romania were targeted (the Romania attempt failed). ANSSI states the activity is publicly linked to Russia's SVR foreign-intelligence service and assesses Nobelium is 'almost certainly operated on behalf of a state actor'. Distinct from the 2020 ANSSI Nobelium/APT29 report already in the corpus; this is a new, France-discovered diplomatic-espionage disclosure. AUSPEX maps it to the existing APT29/Cozy Bear/Midnight Blizzard actor (note: ANSSI itself splits APT29, Dark Halo and Nobelium into three SVR-related intrusion sets).
