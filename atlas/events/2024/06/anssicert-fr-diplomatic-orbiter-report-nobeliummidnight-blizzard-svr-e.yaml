summary: |
  On 19 June 2024 ANSSI's CERT-FR published 'Malicious activities linked to the Nobelium intrusion set' (CERTFR-2024-CTI-006), detailing a sustained SVR campaign (which ANSSI distinguishes as 'Nobelium', publicly described as 'Diplomatic Orbiter') against French and European diplomatic targets since 2021. Named French victims include the Ministry of Culture and the National Agency for Territorial Cohesion (ANCT) — compromised via a 'Strategic Review' lure — plus attempted Cobalt Strike deployment against the Ministry for Europe and Foreign Affairs, and targeting of French embassies in Kyiv, Romania and (impersonation) South Africa. ANSSI publicly links the intrusion set to Russia's SVR foreign-intelligence service. Distinct from the 2020 ANSSI Nobelium/APT29 report already in the corpus; this is a new, France-discovered diplomatic-espionage disclosure. Maps to the existing APT29/Cozy Bear/Midnight Blizzard actor.
