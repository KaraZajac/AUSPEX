outcome_summary: |
  VIGINUM report dated 10 June 2024 disclosing "Matriochka", a
  pro-Russia influence campaign targeting European media outlets
  and fact-checker communities by seeding apparently inauthentic
  inquiries designed to draw fact-checking attention to forged
  content — a recursive amplification technique. The operation
  exploits the legitimacy-conferral function of the fact-check
  response itself.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  Editorially significant as a VIGINUM second-order attribution:
  the operation does not seed false content directly but
  weaponizes the fact-checking response surface against the
  defensive ecosystem itself. The disclosure adds Matriochka to
  the Doppelganger / Portal Kombat constellation of related
  pro-Russia operator clusters VIGINUM has named through 2023-
  2024, deepening the LII counter-FIMI editorial pattern.
