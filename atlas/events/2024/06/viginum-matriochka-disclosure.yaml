id: 2024-06/viginum-matriochka-disclosure
name: VIGINUM / SGDSN discloses Matriochka pro-Russia campaign targeting media and fact-checkers
start_date: 2023-09-01  # Matryoshka "active since at least September 2023" per VIGINUM
disclosure_date: 2024-06-10
end_date: null  # VIGINUM states the campaign is "still ongoing" ("toujours en cours") at disclosure — not a bounded op
incident_type:
  - documentary
  - influence-operation
initial_vector: unknown
outcome_summary: |
  VIGINUM (SGDSN) technical report dated 10 June 2024 disclosing
  "Matryoshka" / "Matriochka" (also tracked in open sources as
  "Operation Overload"), a pro-Russia information-manipulation
  campaign active since at least September 2023 and, per VIGINUM,
  still ongoing. The operation runs in two stages: "seeder"
  accounts post fake content (forged reports, graffiti and memes
  impersonating North American and European — including French —
  media and public figures), then "quoter" accounts reply in the
  response space of posts by media outlets, public figures and
  fact-checking organizations across more than 60 countries,
  directly soliciting those targets (on X and by email) to
  investigate the fabricated content. VIGINUM logged at least 90
  successive operations. Narratives are predominantly anti-Ukrainian
  and also target France's Ukraine-support policy, French
  politicians and the Paris 2024 Olympic / Paralympic Games.
quantified_impact: {}
false_flag_risk: none
operators_named: []
summary: |
  VIGINUM assesses the campaign's primary aim as discrediting the
  Western media, public figures and fact-checking organizations it
  baits — including by getting them to react publicly, which exposes
  them to large-scale targeting "aimed at saturating their
  investigative abilities" — while promoting content that serves
  Russian interests; audience-reach is, in VIGINUM's assessment,
  only a secondary goal (campaign posts show low views and weak
  engagement). VIGINUM established that most disseminated content was
  first published on Russian-language Telegram channels already
  identified in prior information operations, and notes content
  similarity with the RRN / Doppelganger campaign (a "same actors"
  assumption), but states there is no technical evidence linking
  Matryoshka's operators to any third party — attribution stays
  nation-level (pro-Russia / "involvement of a foreign actor"), no
  operator named. Editorially this sits alongside VIGINUM's
  Doppelganger (2023) and Portal Kombat (2024) disclosures as a
  French counter-FIMI strategic attribution; the novel element is
  the target class — the fact-checking response surface itself.
attributions:
