    attributing_org: VIGINUM / SGDSN
    attributing_org_confidence: high
    attribution_level: nation
    auspex_assessment: concur
    attribution_date: 2024-06-10
    attribution_source_id: sgdsn/2024-06-10_matriochka
    notes: |
      VIGINUM attributes at NATION level: a "pro-Russian campaign"
      whose content was systematically first-released on Russian-
      language Telegram channels (@sheyhtamir1974, @belshkarvka,
      @thehandofkremlin) serving Russian interests — "the systematic
      use of Russian channels ... form a body of corroborating
      evidence to suggest the involvement of a foreign actor."
      VIGINUM explicitly does NOT name an operator: "For now, there
      is no technical evidence linking Matryoshka's operating methods
      to third parties." ASP (Social Design Agency) and Struktura
      appear only as a Washington-Post-relayed suspicion about the
      RRN campaign, coupled with VIGINUM's assumption that Matryoshka
      may be "the same actors" — not a VIGINUM attribution of
      Matryoshka to those firms. actor_id therefore left null
      (nation-level, no operator slot); attacker-state = Russia is
      carried by the ru/info-security-2016 attacker-rationale link.
