    (title "Matriochka : une campagne prorusse…", body carries the campaign) —
    not a homepage/catalogue; no re-sourcing needed.

    [a] FACTS — corrected/enriched against the raw report:
    • Mechanic re-grounded to VIGINUM's own two-stage model: "seeder" accounts
      post fake content (reports, graffiti, memes); "quoter" accounts reply in
      the response space of media/public-figure/fact-checker X posts across 60+
      countries and directly solicit them (on X + email) to investigate the
      content; ≥90 successive operations since Sept 2023. VERBATIM: "Matryoshka
      operators contact their targets directly on X and via email to ask them to
      investigate the fake content."
    • OBJECTIVE corrected: the prior summary's "recursive amplification" /
      "exploits the legitimacy-conferral function of the fact-check response" /
      "weaponizes the fact-checking response surface" over-read the op as an
      amplification play. VIGINUM's stated PRIMARY aim is to DISCREDIT the
      targeted media/public-figures/fact-checkers (VERBATIM: "the main goal of
      the Matryoshka campaign is to discredit Western personalities and media
      outlets involved in fact-checking") and to saturate their investigative
      capacity, while promoting pro-Russia content; VIGINUM states audience-
      seeking is "only a secondary goal" (low views, weak engagement). Rewrote
      summary/outcome_summary to foreground VIGINUM's actual objective and demote
      the amplification / "legitimacy-conferral" editorial gloss (unsupported and
      arguably contradicted by the "audience secondary" finding) — stripped as
      fabrication-risk.
    • ADDED source-carried facts: two-stage seeder/quoter structure; ≥90
      operations; content first-released on Russian-language Telegram channels
      (@sheyhtamir1974, @belshkarvka, @thehandofkremlin); impersonation of
      NA/European incl. French media + public figures; narratives anti-Ukrainian
      + France's Ukraine policy + French politicians + Paris 2024 Olympics;
      open-source alias "Operation Overload" (CheckFirst/Reset.Tech).

    [b] ATTRIBUTION — kept actor_id null, confidence high, auspex concur; ADDED
    attribution_level: nation (was MISSING). VIGINUM attributes at NATION level
    ("pro-Russian campaign"; "the systematic use of Russian channels … form a
    body of corroborating evidence to suggest the involvement of a foreign
    actor"). Did NOT add an SDA / Storm-1516 named-actor row (unlike the sibling
