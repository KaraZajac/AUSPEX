      a pro-Russia campaign that discredits Western media, public
      figures and fact-checkers and promotes content serving Russian
      interests, seeded from Russian-language Telegram channels and
      pushing anti-Ukrainian narratives. This is the external
      influence apparatus the 2016 Information Security Doctrine's
      information-psychological pillar underwrites (Moscow frames the
      discrediting of Western journalism and fact-checking as
      countering hostile "information-psychological" impact). VIGINUM
