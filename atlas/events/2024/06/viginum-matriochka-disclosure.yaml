        - "Most disseminated content was first published on Russian-language Telegram channels already identified in prior information operations; narratives are predominantly anti-Ukrainian."
      ruled_out: "Financial/criminal motive — ruled out: VIGINUM finds audience-seeking is only a secondary goal (low views, weak engagement) and the operation is monetization-free narrative projection, not revenue-driven."
