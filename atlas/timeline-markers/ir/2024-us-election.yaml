id: ir/2024-us-election
doctrine_id: ir/post-soleimani-retaliation
date: 2024-11-05
description: |
  US 2024 presidential election. Both the 2020 Emennet Pasargad
  voter-intimidation campaign and the 2024 IRGC trio hack-and-
  leak against the Trump campaign were timed to US presidential
  elections. The post-Soleimani electoral-discord pillar
  anticipates ongoing IRGC operations against US election
  infrastructure across future cycles.
