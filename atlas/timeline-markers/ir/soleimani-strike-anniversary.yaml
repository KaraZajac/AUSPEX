id: ir/soleimani-strike-anniversary
doctrine_id: ir/post-soleimani-retaliation
date: 2020-01-03  # recurring anniversary
description: |
  Anniversary of the January 3, 2020 US strike that killed
  IRGC-Quds Force commander Qasem Soleimani at Baghdad
  International Airport. Khamenei and IRGC commanders use the
  anniversary period (late December through early January) for
  rhetorical re-commitment to revenge; operational tempo of
  IRGC / IRGC-IO retaliation-themed operations surges in this
  window. The 2024 DOJ indictment of the IRGC trio explicitly
  cites Soleimani revenge as motivating the 2024 Trump-campaign
  hack-and-leak.
cited_by:
  - doj/2024-09-27_irgc-trio-trump-campaign
  - khamenei/post-soleimani-statements
