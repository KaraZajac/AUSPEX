date: 2024-07-05  # Pezeshkian election (snap election after Raisi death)
description: |
  Iranian presidential election cycle — the July 2024 snap
  election of Masoud Pezeshkian after the May 19, 2024
  helicopter crash that killed President Ebrahim Raisi.
  Pezeshkian and Foreign Minister Araghchi reaffirmed
  Axis-of-Resistance doctrine in 2024-25 statements.
  Cyber-relevance is indirect: regime political transitions
  do not change tasking but reshape the rhetorical envelope.
