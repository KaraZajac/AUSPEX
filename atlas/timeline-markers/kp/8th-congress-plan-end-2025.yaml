id: kp/8th-congress-plan-end-2025
doctrine_id: kp/8th-congress-defense-plan
date: 2025-12-31
description: |
  Nominal end of the 8th Party Congress Five-Year Defense Plan
  window (2021–2025). 38 North's January 2026 assessment finds
  roughly half the 13 enumerated weapon systems demonstrated by
  deadline; the remainder are expected to be extended into a
  successor program formalized at the 9th Party Congress. Cyber-
  funding tempo through this window is the canonical measure of
  the doctrine's operational pull on the RGB cyber portfolio.
