id: kp/un-poe-mandate-end-2024
doctrine_id: kp/office-39-sanctions-evasion
date: 2024-04-30
description: |
  End of the UN 1718 Panel of Experts mandate after 15 years of
  independent UN sanctions monitoring on the DPRK. Russia vetoed
  the mandate-renewal resolution on 28 March 2024; mandate
  expired April 2024. Not a cyber event but operationally
  significant for AUSPEX's source-availability assessment: the
  final March 2024 PoE report documented approximately $3B DPRK
  crypto theft 2017–2023 and 58 incidents under investigation.

  Post-April-2024 the primary-source baseline for DPRK sanctions
  evasion is materially degraded. The Multilateral Sanctions
  Monitoring Team (MSMT), stood up by US/UK/ROK/JP and partners
  in 2024–2025, functionally substitutes but lacks UN
  legal authority. State Department's January 2026 consolidated
  release is the first major US-government attempt to fill the
  gap.
