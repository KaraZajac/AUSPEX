id: kp/byungjin-completion-2018
doctrine_id: kp/byungjin
date: 2018-04-20  # 3rd Plenum of the 7th Central Committee, April 2018
description: |
  Kim Jong Un's declaration at the 3rd Plenary Meeting of the
  7th WPK Central Committee (April 2018) that the Byungjin line
  was complete: the nuclear deterrent had been achieved (per the
  Hwasong-15 ICBM test assessment), and the regime would pivot
  to "socialist economic construction." Doctrinal supersession
  point for Byungjin; subsequent operational continuity ran
  through the 2021 8th Party Congress plan.
