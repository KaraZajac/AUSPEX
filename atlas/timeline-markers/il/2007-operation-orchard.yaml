id: il/2007-operation-orchard
doctrine_id: il/begin-doctrine
date: 2007-09-06
description: |
  Operation Orchard / Operation Outside the Box: Israeli Air Force
  airstrike on the suspected Syrian nuclear reactor at Al-Kibar
  in Deir ez-Zor governorate, just after midnight 6 September
  2007. Eight Israeli aircraft dropped roughly 17 tons of
  munitions on a gas-cooled, graphite-moderated reactor under
  construction with North Korean technical assistance (a
  Yongbyon analog). Israel maintained operational silence for
  over a decade; formally acknowledged the strike in March 2018.

  Significance for AUSPEX: (1) second kinetic instantiation of
  the Begin Doctrine, twenty-six years after Osirak; (2)
  publicly-discussed cyber-kinetic-coupling precedent — Israeli
  Suter-type electronic-warfare / network-attack capability has
  been credited (open-source, never officially confirmed) with
  suppressing Syrian air defenses for the strike window, making
  Orchard the type specimen for cyber-enabled kinetic
  counter-proliferation. IAEA 2009 reporting documented uranium
  particles and graphite consistent with reactor construction.
