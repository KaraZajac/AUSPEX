id: il/2018-us-jcpoa-withdrawal
doctrine_id: il/counter-iran-posture
date: 2018-05-08
description: |
  US withdrawal from the JCPOA, announced by President Trump
  8 May 2018. The withdrawal returned snap-back sanctions
  authority to the US and re-imposed pre-JCPOA Iran sanctions
  in two August / November 2018 tranches. Israeli Prime Minister
  Netanyahu publicly supported the withdrawal and had advocated
  for it through 2017-2018 including via the April 2018 Mossad-
  exfiltrated "Iranian nuclear archive" presentation.

  Significance for AUSPEX: end of the JCPOA-era Israeli counter-
  Iran cyber-tempo de-escalation. The post-2018 period sees a
  steady rise in Israel-attributed counter-Iran cyber operations
  including the Stuxnet-on-Natanz-anniversary-style disruption
  campaigns, the April 2020 Israel-Iran water-and-port exchange,
  and the eventual emergence of the Predatory Sparrow operator
  persona in 2021.
