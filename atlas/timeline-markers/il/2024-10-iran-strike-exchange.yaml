  end: 2024-10-26
description: |
  Second direct IR-IL kinetic exchange, October 2024.
    - 1 October 2024: Iran launched approximately 180 ballistic
      missiles at Israel following the killings in late
      September 2024 of Hezbollah Secretary-General Hassan
      Nasrallah and senior IRGC-Quds Force commander Abbas
      Nilforoushan in Beirut southern-suburb strikes.
    - 26 October 2024: Israeli reply strike (Israeli operational
      name "Days of Repentance") on Iranian air-defense radars,
      ballistic-missile production facilities, and SAM
      batteries. CSIS / IISS / INSS assess the strike as
      significantly degrading Iranian air defenses and setting
      conditions for the broader June 2025 operation.

  Significance for AUSPEX: the second IR-IL direct exchange in
  six months normalizes a tit-for-tat tempo. The 26 October
  Israeli strike's targeting choices — air-defense radars and
  missile production rather than nuclear infrastructure —
  suggest cyber-enabled targeting work against the Iranian
  air-defense kill chain and missile-production supply chain
  was load-bearing for the operation. Sets conditions for
  June 2025 nuclear-target strikes.
