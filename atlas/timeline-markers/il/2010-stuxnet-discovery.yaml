id: il/2010-stuxnet-discovery
doctrine_id: il/begin-doctrine
date: 2010-06-17
description: |
  Public discovery of Stuxnet, 17 June 2010, by VirusBlokAda
  (Minsk, Belarus) after Iranian customer reports of cascading
  Windows crashes and reboots traced to an unknown worm
  exploiting four Windows zero-days and Siemens S7-300 / S7-417
  PLC interfaces. Symantec, ESET, and Kaspersky reverse-
  engineered the worm over the following months; the
  ICS-targeting and centrifuge-rotor-frequency manipulation
  payload established that the operation targeted Iranian
  IR-1 cascades at Natanz.

  Significance for AUSPEX: marks the public-knowledge debut of
  cyber-as-counter-WMD-strike — the cyber extension of the
  Begin Doctrine in the line that runs through Flame, Duqu,
  Gauss, and (with a different operator profile but the same
  doctrinal logic) Predatory Sparrow. Sanger (NYT, June 2012)
  reported the operation under the codename "Olympic Games"
  as a joint US-Israeli program. Israeli government has never
  officially acknowledged participation.
