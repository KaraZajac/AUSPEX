id: il/2015-jcpoa-signing
doctrine_id: il/counter-iran-posture
date: 2015-07-14
description: |
  Joint Comprehensive Plan of Action signed in Vienna, 14 July
  2015, between Iran and the P5+1 (US, UK, France, Russia, China,
  Germany) plus the EU. UN Security Council Resolution 2231
  endorsed the agreement on 20 July 2015; Implementation Day
  followed on 16 January 2016. The agreement limited Iranian
  enrichment, capped enriched-uranium stockpiles, and provided
  for IAEA inspections in exchange for relief from nuclear-
  related sanctions.

  Significance for AUSPEX: the JCPOA signing is the doctrinal
  inflection point that produced the 2015-2018 de-escalation
  interregnum in Israeli counter-Iran cyber posture. Operations
  did not stop in this window but vendor-public tempo
  attributable to Israel decreased noticeably. The marker anchors
  the "before-JCPOA" / "during-JCPOA" / "after-JCPOA" temporal
  framing for counter-Iran-aligned cyber events. Prime Minister
  Netanyahu publicly opposed the agreement throughout.
