id: il/2024-04-iran-strike-exchange
doctrine_id: il/counter-iran-posture
date:
  start: 2024-04-01
  end: 2024-04-19
description: |
  First direct IR-IL kinetic exchange, April 2024.
    - 1 April 2024: Israeli airstrike on the Iranian diplomatic
      complex in Damascus killed seven IRGC officers including
      Brigadier General Mohammad Reza Zahedi (Quds Force Syria-
      Lebanon coordinator), the most senior IRGC officer killed
      since Soleimani.
    - 13-14 April 2024: Iran's "Operation True Promise" — first
      direct Iranian strike on Israeli soil from Iranian
      territory — comprising roughly 170 drones, 120 ballistic
      missiles, 30 cruise missiles. Largely intercepted by
      Israel, US, UK, France, Jordan.
    - 18-19 April 2024: Israeli reply strike on air-defense
      radars near Isfahan, calibrated to signal reach to the
      Natanz vicinity without escalating.

  Significance for AUSPEX: doctrinal threshold-breaking event.
  Direct IR-IL exchange establishes a new normal that frames
  the counter-Iran cyber tempo through 2024-2025. Cyber
  collection on Iranian air-defense systems and missile
  production becomes a publicly-discussed component of the
  Israeli operational portfolio.
