description: |
  The Twelve-Day War: Israeli Operation Rising Lion against
  Iranian nuclear, missile, and senior-military targets,
  13-24 June 2025. Israel struck Natanz, Fordow, and Isfahan
  enrichment / weaponization sites and killed multiple
  senior IRGC commanders and at least ten leading nuclear
  scientists in the opening 24 hours. Iran retaliated with
  over 550 ballistic missiles and over 1,000 one-way attack
  drones across the war, hitting civilian, energy, military,
  and government sites in Israel. On 22 June 2025 the United
  States joined the campaign and struck Fordow, Natanz, and
  Isfahan with B-2 bombers and Tomahawk land-attack missiles.
  Ceasefire 24 June 2025.

  Significance for AUSPEX: the most consequential operational
  reaffirmation of the Begin Doctrine since 2007 and the
  largest direct state-on-state nuclear-target strike since
  the 1981 Osirak operation. Cyber operations in the
  pre-strike preparation window (collection on air-defense
  command, missile-production C2, IRGC officer locations,
  scientist locations) were the load-bearing intelligence
  product behind the campaign. Post-strike cyber tempo
  against Iran (Pay2Key.I2P July 2025 from the Iranian
  Forward-Defense side; continued Predatory Sparrow tempo
  including Sepah Bank and Nobitex June 2025 from the
  IL-aligned side) frames the immediate post-war environment.

  IAEA assessment: serious damage to Natanz and Fordow
  centrifuge cascades; experts cited by NYT and AC concur
  that working centrifuges at the sites were likely
  destroyed.
