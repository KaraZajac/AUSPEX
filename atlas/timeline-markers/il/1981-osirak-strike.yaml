id: il/1981-osirak-strike
doctrine_id: il/begin-doctrine
date: 1981-06-07
description: |
  Operation Opera: Israeli Air Force airstrike on Iraq's Osirak
  (Tammuz-1) nuclear reactor near Baghdad, 7 June 1981. Eight
  F-16As (with F-15A escort) flown from Etzion airbase destroyed
  the reactor before it became operational. The strike was
  conducted without prior US notification or approval. Prime
  Minister Menachem Begin's post-strike statement of policy
  ("there will not be another Holocaust in history; never again")
  is the constitutive moment of the Begin Doctrine: Israel will
  not permit a hostile regional state to acquire weapons of
  mass destruction. Doctrinal anchor for the entire
  counter-WMD-by-cyber-sabotage line that follows (Stuxnet,
  Flame, Duqu, Gauss, Predatory Sparrow's counter-Iran-program
  targeting).
