id: il/2023-10-07-hamas-attack
doctrine_id: il/counter-resistance-axis
date: 2023-10-07
description: |
  Hamas-led multi-axis attack on southern Israel from Gaza,
  7 October 2023. Approximately 1,200 Israelis and foreign
  nationals killed; 251 hostages taken. The largest single
  loss-of-life event for the Israeli state since 1948; the
  third-deadliest terrorist attack worldwide since 1970.

  Significance for AUSPEX: operational war-footing trigger for
  the Counter-Resistance-Axis posture. Israeli cyber operations
  shift from a sustained-tempo baseline to overt wartime
  acceleration across Hamas (Gaza), Hezbollah (Lebanon),
  Houthi (Yemen), and Iranian command-and-control vectors.
  Initial intelligence-failure period October 2023 – March 2024
  is succeeded by demonstrably-high-tempo Israeli cyber and
  SIGINT operations: the September 2024 pager / walkie-talkie
  supply-chain operations against Hezbollah, the Nasrallah
  killing, the Beirut airstrike campaign, and the direct
  IL-IR exchanges of April 2024, October 2024, and June 2025.
