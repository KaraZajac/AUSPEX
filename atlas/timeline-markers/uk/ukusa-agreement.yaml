id: uk/ukusa-agreement
doctrine_id: uk/five-eyes
date: 1946-03-05
description: |
  Signature of the UKUSA Agreement establishing the post-war SIGINT
  partnership between the UK (GCHQ) and the US (NSA's predecessors).
  Canada (1948), Australia and New Zealand (1956) acceded later.
  Founding document of the Five Eyes framework.
