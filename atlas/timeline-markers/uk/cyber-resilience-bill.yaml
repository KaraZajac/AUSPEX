id: uk/cyber-resilience-bill
doctrine_id: uk/ncs-2022
date: 2024-07-17
description: |
  Announcement of the Cyber Security and Resilience Bill in the
  King's Speech (Starmer government, first legislative session).
  Expands the NIS Regulations to cover managed-service providers,
  data-centre operators, and additional critical-supply-chain
  entities; updates NCSC and ICO incident-reporting requirements.
