date: 2010-10-19
description: |
  Strategic Defence and Security Review 2010 (Cameron / Clegg
  coalition government) — first SDSR to treat cyber as a Tier 1
  national security risk and to commit a National Cyber Security
  Programme (£650m, 2011-2015). The doctrinal precursor to the
  2011 Cyber Security Strategy and the 2016 NCSC stand-up.
