id: uk/ncsc-stand-up
doctrine_id: uk/ncs-2016
date: 2016-10-03
description: |
  Formal stand-up of the National Cyber Security Centre as a unified
  cyber-defence authority inside GCHQ. Consolidated CESG, CERT-UK,
  CPNI's cyber function, and the Centre for Cyber Assessment. Anchor
  date for the modern UK defensive cyber posture.
