description: |
  Coordinated publication of the Snowden archive begins with The
  Guardian and The Washington Post. The June-2013 wave including
  the TEMPORA disclosure (2013-06-21) is the principal public
  reckoning with UK GCHQ bulk SIGINT collection and the Five Eyes
  UKUSA framework.
