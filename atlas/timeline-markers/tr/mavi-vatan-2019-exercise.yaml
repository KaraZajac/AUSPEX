id: tr/mavi-vatan/2019-exercise
doctrine_id: tr/mavi-vatan
date: 2019-03-04  # Mavi Vatan 2019 exercise start
description: |
  Mavi Vatan 2019 — the largest Turkish naval exercise to that
  point — formalized "Mavi Vatan" as public-facing Turkish
  strategic framing. The exercise simulated simultaneous combat
  operations across the Aegean, Eastern Mediterranean, and
  Black Sea. Adm. (ret.) Cem Gürdeniz's doctrinal articulation
  was politically endorsed in the run-up. The exercise is the
  canonical anchor date for the doctrine's formal political
  adoption.
