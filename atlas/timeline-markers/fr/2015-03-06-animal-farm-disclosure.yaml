id: fr/2015-03-06-animal-farm-disclosure
doctrine_id: fr/lutte-informatique-offensive
date: 2015-03-06
description: |
  Kaspersky GReAT publication of "Animals in the APT Farm",
  joining the Babar, Casper, Bunny / EvilBunny, NBot, Dino, and
  Tafacalou implants into a single operator cluster — Animal
  Farm. The post follows the February 18 2015 Babar disclosures
  by G Data and Cyphort (Marion Marschalek) and the March 5 2015
  ESET Casper disclosure. The cluster is the canonical vendor
  reference for French DGSE-Technical-Directorate-attributed
  tooling.

  Significance for AUSPEX: vendor consensus on the Animal Farm
  cluster boundary as of March 2015. Subsequent ESET / Kaspersky
  updates extend the cluster; the original Kaspersky post is the
  AUSPEX baseline for cluster-membership decisions.
