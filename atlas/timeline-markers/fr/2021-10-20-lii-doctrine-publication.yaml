id: fr/2021-10-20-lii-doctrine-publication
doctrine_id: fr/lutte-informatique-influence
date: 2021-10-20
description: |
  Public announcement by Defence Minister Florence Parly of the
  Lutte Informatique d'Influence (LII) doctrine on 20 October
  2021 — France's public commitment to information-warfare
  operations as a military instrument, including active
  counter-disinformation. VIGINUM had stood up under the SGDSN
  in July 2021 as the defensive counter-foreign-interference
  service.

  Significance for AUSPEX: doctrinal-acknowledgment threshold for
  French information-warfare. Subsequent VIGINUM Doppelganger /
  RRN attributions and COMCYBER-declared information operations
  link here.
