id: fr/2014-03-21-snowglobe-attribution
doctrine_id: fr/lutte-informatique-offensive
date: 2014-03-21
description: |
  Publication by Le Monde of the "La piste française" report
  drawing on leaked CSEC Snowden slides that traced the
  Snowglobe cyber-espionage cluster to French intelligence.
  First public attribution of any French offensive cyber
  operation to a French government source — albeit via Canadian
  intelligence reporting and Snowden documents, not French
  acknowledgment.

  Significance for AUSPEX: Le Monde + CSEC slides constitute the
  primary attributing source for Animal Farm / Snowglobe-class
  events. France has not corroborated; the attribution is
  effectively foreign-intelligence + investigative-journalism in
  origin.
cited_by:
  - lemonde/2014-03-21_snowglobe-piste-francaise
