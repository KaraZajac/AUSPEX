id: fr/2018-02-12-revue-strategique-publication
doctrine_id: fr/revue-strategique-cyberdefense-2018
date: 2018-02-12
description: |
  Publication of the Revue stratégique de cyberdéfense by the
  SGDSN on 12 February 2018, under Prime Minister Édouard
  Philippe. The Revue is the foundational Macron-era French
  cyber-doctrine document, setting out the integrated four-chain
  posture (protection, military action, intelligence, judicial)
  and the strict offensive / defensive institutional separation.

  Significance for AUSPEX: the doctrinal-codification anchor for
  France in the atlas. Events occurring after this date align
  with the Revue's pillars at higher confidence than pre-2018
  events.
