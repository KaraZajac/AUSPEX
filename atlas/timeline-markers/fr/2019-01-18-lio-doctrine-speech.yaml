id: fr/2019-01-18-lio-doctrine-speech
doctrine_id: fr/lutte-informatique-offensive
date: 2019-01-18
description: |
  Defence Minister Florence Parly's 18 January 2019 speech
  announcing the Lutte Informatique Offensive (LIO) doctrine —
  France's public acknowledgment of military offensive cyber as
  a legitimate instrument under the authority of the Chief of
  the Defence Staff and the Minister of the Armed Forces.

  Significance for AUSPEX: doctrinal-acknowledgment threshold for
  French offensive cyber. Pre-2019 attributed activity (Animal
  Farm family) is doctrinally retroactive and tagged with that
  caveat; post-2019 attributed activity links to LIO directly.
