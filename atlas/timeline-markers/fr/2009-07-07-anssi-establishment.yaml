id: fr/2009-07-07-anssi-establishment
doctrine_id: fr/lutte-informatique-defensive
date: 2009-07-07
description: |
  Establishment of ANSSI by decree 2009-834 of 7 July 2009. ANSSI
  succeeds and consolidates the DCSSI (Direction centrale de la
  sécurité des systèmes d'information) function under the SGDSN,
  with an enlarged mandate covering national defensive cyber
  posture, regulatory authority over Opérateurs d'Importance
  Vitale (OIV, formalized in the 2013 LPM), and operation of
  CERT-FR.

  Significance for AUSPEX: institutional anchor of the French
  defensive (LID) doctrine and the structural basis of the strict
  offensive / defensive separation codified later in the 2018
  Revue stratégique.
