id: fr/2017-05-04-comcyber-establishment
doctrine_id: fr/revue-strategique-cyberdefense-2018
date: 2017-05-04
description: |
  Stand-up of the Commandement de la Cyberdéfense (COMCYBER) on
  4 May 2017 by Defence Minister Jean-Yves Le Drian, consolidating
  French military cyber capabilities under a joint command
  reporting to the Chief of the Defence Staff. COMCYBER is the
  institutional anchor of the later LIO (2019) and LII (2021)
  doctrines and operates the CALID military CERT.

  Significance for AUSPEX: marks the formal organizational
  separation of military cyber operations from intelligence
  (DGSE) and defensive (ANSSI) functions, completing the
  three-pole French cyber posture.
