id: fr/2024-lpm-2024-2030
doctrine_id: fr/revue-strategique-cyberdefense-2018
date: 2024-01-01
description: |
  Entry into force of the Loi de Programmation Militaire
  2024-2030 (LPM 2024-2030, Loi 2023-703 of 1 August 2023),
  which sets the multi-year defense-budget envelope including
  cyber provisions. The LPM extends COMCYBER's force structure,
  expands cyber-effects funding for joint operations, and
  reinforces ANSSI regulatory authority over critical operators.
  Cyber Land Forces stand-up under COMCYBER followed in 2024.

  Significance for AUSPEX: the budget-execution anchor for
  French cyber posture through 2030. Resource-anchored events
  (capability investments, new advisory regimes, expanded
  operations) align with the LPM cycle.
