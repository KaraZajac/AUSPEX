id: us/biden-trump-2025-transition
doctrine_id: us/ncs-2026
date: 2025-01-20
description: |
  Presidential transition from Biden to Trump (second term),
  January 20, 2025. Inflection point for US cyber doctrine: NCS 2023
  framework continues operationally but is reframed by EO 14306
  (June 6, 2025) and the March 2026 "Cyber Strategy for America"
  fact sheet. Other transition-period events: April 2025 firing of
  Gen. Tim Haugh; May 2025 shelving of NSA / CYBERCOM dual-hat
  separation.
