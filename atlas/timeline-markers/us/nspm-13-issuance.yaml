id: us/nspm-13-issuance
doctrine_id: us/nspm-13
date: 2018-08-01
description: |
  Signing of NSPM-13 in August 2018. Inflection point for US
  offensive-cyber operational tempo. The IRA disruption (October–
  November 2018) was the first major exercise; Hunt Forward 2018-
  onward, Iran retaliation 2019, Trickbot 2020, and KV-Botnet 2023–24
  all sit downstream of this authority chain.
