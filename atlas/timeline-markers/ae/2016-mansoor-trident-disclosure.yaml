id: ae/mansoor-trident-disclosure
doctrine_id: ae/regime-protection-surveillance
date: 2016-08-25
description: |
  Citizen Lab and Lookout joint disclosure of the targeting of
  Emirati human-rights defender Ahmed Mansoor with NSO Group's
  Pegasus spyware via the "Trident" iOS exploit chain (three
  zero-days, CVE-2016-4655 / 4656 / 4657). The first major
  forensic-chain disclosure tying UAE-state operators to
  NSO Pegasus deployment and the canonical anchor of the
  UAE regime-protection-surveillance doctrine entry.
cited_by:
  - citizenlab/2016-08-25_million-dollar-dissident
  - lookout/2016-08-25_pegasus-technical-analysis
