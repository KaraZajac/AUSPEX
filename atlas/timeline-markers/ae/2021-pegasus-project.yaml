id: ae/pegasus-project
doctrine_id: ae/procurement-led-capability
date: 2021-07-18
description: |
  Publication of the Pegasus Project — a 17-media-organization
  consortium investigation coordinated by Forbidden Stories with
  technical support from Amnesty International's Security Lab —
  documenting Pegasus deployments by NSO customer states against
  journalists, activists, lawyers, and political opponents.
  UAE was identified in the leaked target-list of ~50,000 phone
  numbers as one of the most prolific operator states. The
  publication is the most comprehensive single anchor for UAE
  Pegasus customer-state attribution.
cited_by:
