id: ae/project-raven-disclosure
doctrine_id: ae/procurement-led-capability
date: 2019-01-30
description: |
  Reuters publication of "Inside the UAE's secret hacking team
  of American mercenaries" (Schectman and Bing) — the foundational
  disclosure of Project Raven and DarkMatter's role as the
  operational host for ex-NSA personnel running offensive
  operations against UAE-state-defined targets. Paired with
  Reuters' same-day Karma toolkit disclosure. The disclosure is
  the canonical anchor of the procurement-led-capability
  doctrine entry.
