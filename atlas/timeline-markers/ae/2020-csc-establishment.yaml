id: ae/csc-establishment
doctrine_id: ae/digital-economy-protection
date: 2020-11-04
description: |
  Federal-decree establishment of the UAE Cyber Security Council
  with Dr. Mohamed Hamad Al-Kuwaiti appointed as Head of Cyber
  Security for the UAE Government. The CSC consolidated federal
  cybersecurity-policy authority and inherited aeCERT coordination
  from the TRA. Co-incident-window with the SIA rebrand of NESA.
cited_by:
  - u-ae/csc-mandate
