description: |
  UAE Cabinet-approved establishment of the UAE Cyber Security
  Council, chaired by Dr. Mohamed Hamad Al-Kuwaiti (already Head
  of Cyber Security for the UAE Government since July 2020). The
  CSC consolidated federal cybersecurity-policy authority; first
  meeting January 2021. Co-incident-window with the SIA rebrand of
  NESA. (Corrected 2026-07-01: date 2020-11-04->2020-11-29 per the
  WAM/Cabinet release; "federal decree"->Cabinet approval; the
  aeCERT/TRA-absorption claim was unsourced and removed.)
