id: ae/abraham-accords
doctrine_id: ae/regional-influence-realigned
date: 2020-09-15
description: |
  Signing of the Abraham Accords (UAE–Israel normalization
  declaration, signed at the White House by UAE Foreign Minister
  Abdullah bin Zayed Al Nahyan, Israeli Prime Minister Netanyahu,
  and US President Trump). Not itself a cyber event, but the
  doctrinal pivot point at which UAE moved from procurement-only
  cybersecurity-cooperation with Israeli vendors (NSO Pegasus
  customer state from 2013+) to open state-to-state
  cybersecurity cooperation. AUSPEX records the Accords as the
  marker separating "pre-accords UAE regional posture" from
  "post-accords UAE regional posture" for doctrine-link
  attribution priors.
