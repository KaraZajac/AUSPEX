id: ae/nesa-standup
doctrine_id: ae/ncs-2019
date: 2014-08-01
description: |
  Federal-decree establishment of the National Electronic
  Security Authority (NESA), later rebranded the Signals
  Intelligence Agency (SIA). NESA published the National
  Information Assurance Standards (NESA IAS) and served as
  the federal cybersecurity-authority predecessor to the
  Cyber Security Council (2020).
