id: by/union-state/2021-programs-approval
doctrine_id: by/union-state-integration
date: 2021-11-04
description: |
  Putin and Lukashenko approve 28 Union State integration
  programs at the Supreme State Council meeting, formalizing
  the deepest Russian-Belarusian integration step since the
  Union State framework's nominal 1997 founding. The defense
  and security tracks of the 28 programs are the doctrinal
  anchor for subsequent Belarusian-aligned Ukraine-theater cyber
  operations.
