doctrine_id: cn/taiwan-reunification
date: 2027-01-01  # window endpoint; range 2021-01-01 to 2027-12-31
date_range:
  start: 2021-03-01
  end: 2027-12-31
description: |
  US analytic construct from then-INDOPACOM commander Adm. Phil
  Davidson's March 2021 SASC testimony estimating 2021–2027 as
  the period of highest credible risk for PLA action against
  Taiwan. Aligns with the PLA's own 2027 modernization milestone
  announced by Xi Jinping in 2017 ("comprehensively improve
  strategic capabilities ... by 2027"). The March 2026 ODNI
  assessment finds Beijing has not committed to a fixed
  invasion date.
