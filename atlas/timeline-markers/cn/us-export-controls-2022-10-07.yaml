id: cn/us-export-controls/2022-10-07
doctrine_id: cn/14th-fyp
date: 2022-10-07
description: |
  US Bureau of Industry and Security (BIS) imposed sweeping
  export controls on advanced semiconductor manufacturing
  equipment, advanced AI accelerators, and US-person services
  to PRC fabs on 7 October 2022. Created an acute pressure
  window on the 14th Five-Year Plan's chokepoint-technology
  closure pillar and aligns temporally with observed tempo
  increases in Salt Typhoon, Volt Typhoon, and APT41 activity
  against semiconductor-equipment and AI-accelerator targets.
cited_by:
  - crs/if11684_14th-fyp-first-look
