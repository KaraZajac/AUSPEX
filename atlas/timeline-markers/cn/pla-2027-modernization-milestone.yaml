id: cn/pla/2027-modernization-milestone
doctrine_id: cn/taiwan-reunification
date: 2027-08-01  # PLA centenary
description: |
  PLA "centenary modernization goal" announced by Xi Jinping at
  the 19th Party Congress in 2017: "comprehensively improve
  strategic capabilities ... by 2027." Coincides with the PLA's
  100-year anniversary (1 August 2027). The PRC-side anchor for
  the US "Davidson Window" framing; widely cited by US, allied,
  and Taiwanese defense officials as the implied force-readiness
  target for credible Taiwan-option capability.
