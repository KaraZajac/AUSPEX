id: cn/mic2025/2025-milestone
doctrine_id: cn/mic2025
date: 2025-12-31
description: |
  The 2025 milestone year — ten years from MIC2025's May 2015
  issuance — for 70% "core component" localization in the ten
  strategic sectors. Subsequent milestones: 2035 for global
  leadership in those sectors, 2049 (PRC centenary) for "world-
  leading" status. Although Chinese state media stopped citing
  MIC2025 by name after 2018 U.S. tariff pressure, the underlying
  targets and Big Fund I/II/III funding continued through the
  14th Five-Year Plan.
