id: cn/15th-fyp/start-2026
doctrine_id: cn/15th-fyp
date: 2026-03-12  # NPC approval; plan period begins 2026-01-01 nominally
description: |
  Start of the 15th Five-Year Plan period (2026–2030), approved
  by the NPC on 12 March 2026. Introduces the "AI+" action plan
  (released August 2025; 90% AI penetration target by 2030),
  the "modernized industrial system" framing, 109 major
  engineering projects, and an explicit 6G priority. Cyber
  tasking demand shifts toward industrial process knowledge,
  AI training pipelines / model weights, and commercial-space
  hardware.
