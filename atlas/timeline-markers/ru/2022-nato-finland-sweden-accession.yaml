id: ru/2022-nato-finland-sweden-accession
doctrine_id: ru/nato-ultimatum-2021
date:
  start: 2022-05-18
  end: 2024-03-07
description: |
  Finland and Sweden's NATO accession window — applications May
  2022, Finland accession 4 April 2023, Sweden accession 7 March
  2024. Directly violates the December 2021 Russian ultimatum
  demanding post-1997 rollback. Anchored as a timeline marker
  for cyber operations targeting Finnish and Swedish defense
  industrial base, government, and critical infrastructure
  expected to intensify across this accession window.
cited_by:
