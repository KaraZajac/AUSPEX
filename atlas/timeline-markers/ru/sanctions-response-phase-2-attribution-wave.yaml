description: |
  Phase 2 of the post-2022 sanctions-response posture: the
  Western attribution wave. US Treasury and DOJ formally attributed
  Conti / TrickBot (Feb 2023, Sep 2023), Star Blizzard / FSB Center
  18 (Dec 2023), CARR / GRU Unit 74455 (Jul 2024), and supplementary
  designations. Europol "Operation Eastwood" disrupted NoName057(16)
  servers (Jul 2024). Concurrent Russian operational tempo: CARR
  US water-utility incidents (Jan 2024), FrostyGoop Lviv heating
  attack (Jan 2024), German SPD intrusion (May 2024), Romanian
  election interference (Dec 2024).
