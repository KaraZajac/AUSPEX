id: ru/sanctions-response-phase-1-invasion
doctrine_id: ru/sanctions-response-2022
date:
  start: 2022-02-24
  end: 2022-12-31
description: |
  Phase 1 of the post-2022 sanctions-response posture: the
  invasion-onset window. Characterized by densest concentration
  of destructive nation-state operations on record (WhisperGate,
  HermeticWiper, IsaacWiper, CaddyWiper, AcidRain/Viasat,
  Industroyer2). Marked the operational pivot from primarily
  strategic intelligence collection to broader retaliatory and
  performative disruption. Conti pledged loyalty to the Russian
  state (Feb 2022); ContiLeaks dump (Feb–Mar 2022) exposed FSB
  Center 18 liaison. Killnet, NoName057(16), CARR emerged as
  hacktivist front layer.
