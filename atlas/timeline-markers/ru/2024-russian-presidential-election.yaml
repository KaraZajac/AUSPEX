id: ru/2024-russian-presidential-election
doctrine_id: ru/nss-2021
date:
  start: 2024-03-15
  end: 2024-03-17
description: |
  Russian presidential election (15–17 March 2024). Anchored as a
  timeline marker because the surrounding window historically
  correlates with intensified Russian cyber and influence
  operations: pre-election shaping of narrative abroad, post-
  election demonstrations of state cyber capability, and
  retaliation against Western actors perceived as interfering.
  The 2024 election was the first under the post-2020
  constitutional reset and the first wartime presidential vote.
cited_by:
