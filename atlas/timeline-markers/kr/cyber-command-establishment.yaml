id: kr/cyber-command-establishment
doctrine_id: kr/defense-cyber-policy-mnd
date: 2010-01-11
description: |
  Formal establishment of ROK Cyber Command (사이버사령부)
  inside the Ministry of National Defense, following the
  July 2009 DDoS campaign against ROK and US government
  and financial websites. Anchor date for the modern ROK
  military cyber posture; renamed Cyber Operations Command
  in January 2019.
