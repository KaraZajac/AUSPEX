id: kr/won-sei-hoon-indictment
doctrine_id: null
date: 2013-04-30
description: |
  Indictment of former NIS Director Won Sei-hoon by the
  Seoul Central District Prosecutors' Office on charges
  arising from the NIS Psychological Warfare Bureau's
  online political activity during the 2012 ROK
  presidential election. Doctrinally anchored as the
  publicly-codified case of ROK intelligence-service
  cyber misuse for domestic-political ends — distinct
  from the foreign-attribution events in the SK atlas.
