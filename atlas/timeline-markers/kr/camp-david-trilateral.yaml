id: kr/camp-david-trilateral
doctrine_id: kr/korus-cyber-cooperation
date: 2023-08-18
description: |
  Camp David trilateral summit between US President Biden,
  ROK President Yoon Suk Yeol, and Japan Prime Minister
  Kishida Fumio. The "Spirit of Camp David" joint
  statement codified the US-ROK-Japan trilateral cyber
  cooperation framework at head-of-state level, including
  the Trilateral Cyber Cooperation Working Group focused
  on DPRK cryptocurrency theft and supply-chain security.
