id: kr/khnp-attribution
doctrine_id: kr/nis-counter-dprk
date: 2015-03-16  # corrected 2026-06-25 (was 2015-03-17): the Seoul prosecutors' interim result was 16 Mar 2015
description: |
  Public ROK government attribution to North Korea of the
  December 2014 intrusion at Korea Hydro & Nuclear Power
  (KHNP). Announced 16 Mar 2015 by the Seoul Central District
  Prosecutors' Office as the interim result of the joint
  government investigation (in which the NIS participated):
  the malware was "the same in composition and working
  methods as the so-called 'kimsuky'" used by North Korean
  hackers — a DPRK attribution at the nation level (no
  specific service named). Anchor event in the ROK
  counter-DPRK attribution tradition.
  [Corrected 2026-06-25, claude-opus-4.8/max: the attributing
  body was the prosecutors' joint investigation, NOT the NIS
  acting alone — the NIS->RGB attribution conflated here
  belongs to a separate 2015 National Assembly intrusion.]
