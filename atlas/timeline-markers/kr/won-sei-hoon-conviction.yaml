doctrine_id: null
date: 2017-08-30
description: |
  Final conviction of Won Sei-hoon by the Korean Supreme
  Court for violations of the National Intelligence
  Service Act and the Public Official Election Act
  arising from the 2012 election interference campaign.
  Closes the judicial sequence on the canonical case
  of ROK intelligence-service cyber misuse for domestic
  politics.
