id: kr/yoon-cyber-posture-pivot
doctrine_id: kr/korus-cyber-cooperation
date: 2022-05-10
description: |
  Inauguration of President Yoon Suk Yeol. AUSPEX flags
  this date as the institutional pivot point for ROK
  cyber posture into deeper US-alliance integration:
  the Yoon administration's first year saw the
  Inflation Reduction Act / semiconductor coordination,
  the May 2022 Biden-Yoon summit cyber commitments,
  and the August 2023 Camp David trilateral framework.
  Distinct from the Moon administration's 2019 NCSS
  publication anchor.
