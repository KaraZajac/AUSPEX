id: vn/cybersecurity-law/2019-effective
doctrine_id: vn/resolution-29-nqtw
date: 2019-01-01
description: |
  Effective date of the Vietnamese Cybersecurity Law (Law
  24/2018/QH14, passed 12 June 2018). The law operationalizes
  the cybersovereignty and content-control framing of Resolution
  29-NQ/TW, requiring foreign platforms to localize Vietnamese
  user data and to remove government-flagged content.
