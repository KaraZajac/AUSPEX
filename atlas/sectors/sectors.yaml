# AUSPEX sector taxonomy
# Hierarchical: a sector's `parent_id` is its immediate ancestor.
# Slugs are paths: `ict/semiconductors/foundry` etc., but the
# `id` and `parent_id` are the source of truth — paths are
# convention.

sectors:
  # Information & communications technology
  - id: ict
    name: Information & Communications Technology
    parent_id: null
  - id: ict/semiconductors
    name: Semiconductors
    parent_id: ict
    summary: |
      Industry-wide aggregate for fab, design, equipment,
      materials, and EDA targeting. Drill into children for
      MIC2025 / export-control-aligned analysis.
  - id: ict/semiconductors/foundry
    name: Foundry / fabrication
    parent_id: ict/semiconductors
  - id: ict/semiconductors/design
    name: Fabless design / IP
    parent_id: ict/semiconductors
  - id: ict/semiconductors/eda
    name: Electronic design automation
    parent_id: ict/semiconductors
  - id: ict/semiconductors/equipment
    name: Semiconductor manufacturing equipment (incl. EUV)
    parent_id: ict/semiconductors
  - id: ict/semiconductors/materials
    name: Specialty chemicals, gases, wafers
    parent_id: ict/semiconductors
  - id: ict/semiconductors/packaging
    name: Advanced packaging / OSAT
    parent_id: ict/semiconductors
  - id: ict/telecom
    name: Telecommunications
    parent_id: ict
  - id: ict/telecom/carrier
    name: Carrier networks (4G/5G core, ISP backbone)
    parent_id: ict/telecom
  - id: ict/telecom/lawful-intercept
    name: Lawful-intercept / wiretap systems
    parent_id: ict/telecom
  - id: ict/telecom/mobile-handset
    name: Mobile handset / OS
    parent_id: ict/telecom
  - id: ict/cloud
    name: Cloud & SaaS infrastructure
    parent_id: ict
  - id: ict/networking
    name: Network equipment (routers, switches, VPN)
    parent_id: ict
  - id: ict/managed-services
    name: Managed service providers / IT outsourcing
    parent_id: ict
  - id: ict/software
    name: Enterprise software
    parent_id: ict
  - id: ict/identity
    name: Identity providers / SSO
    parent_id: ict
  - id: ict/security
    name: Cybersecurity vendors
    parent_id: ict

