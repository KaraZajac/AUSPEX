  # Cross-cutting / meta
  - id: critical-infrastructure
    name: Critical infrastructure (cross-cutting)
    parent_id: null
    summary: |
      Used when an event hits the formally designated CII of a
      target state (US CISA's 16 CI sectors, EU NIS2 essential
      entities, etc.) — apply IN ADDITION to the specific sector.
  - id: supply-chain
    name: Supply-chain / upstream-dependency targeting
    parent_id: null
    summary: |
      Used when targeting a supplier to reach the supplier's
      customers (SolarWinds, 3CX, Kaseya pattern).
