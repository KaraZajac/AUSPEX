id: kr/mnd-cyber
nation_state_id: kr
name: Ministry of National Defense (cyber policy and oversight)
short_name: MND (cyber)
aliases:
  - 국방부 사이버정책
  - MND
  - Ministry of National Defense
parent_service_id: null
active_since: 1948-08-15  # MND establishment with ROK government
active_until: null
mission: |
  Ministerial-level policy authority over ROK military cyber
  operations. Authoring publisher of the Defense White Paper
  cyber chapters; chain-of-command authority over Cyber
  Operations Command and Defense Counterintelligence Command;
  policy interface to US Department of Defense under the
  Mutual Defense Treaty.
summary: |
  MND is the policy-level service entry for ROK military cyber
  in the AUSPEX atlas. Operational cyber is conducted under
  kr/coc; counter-intelligence under kr/dcc; this service is
  reserved for events at the policy and doctrinal layer: the
  Defense White Paper cyber chapters (issued biennially), the
  ROK-US Cyber Cooperation Working Group co-chairmanship, the
  ROK contribution to the US-ROK-Japan trilateral cyber
  framework codified at Camp David in August 2023, and ROK
  participation in CCDCOE (NATO Cooperative Cyber Defence
  Centre of Excellence) as an Indo-Pacific partner since 2019.

  AUSPEX uses kr/mnd-cyber for events at the policy / doctrine
  layer rather than at the operational layer. Routine
  defensive activity on military networks should route to
  kr/coc; counter-intelligence to kr/dcc.
sources:
  - wikipedia/mnd-south-korea
  - state-gov/2023-08-18_camp-david-trilateral
