mission: |
  Republic of Korea's principal civilian intelligence service.
  Combined foreign-intelligence, counter-intelligence, and (until
  legislative reforms enacted 2020 effective 2024) domestic-security
  mandate. Houses the NIS Cyber Security Center (CSC) that
  coordinates state cyber defense and produces the bulk of public
  ROK counter-DPRK threat-intelligence attributions.
summary: |
  Renamed from the Agency for National Security Planning (ANSP) on
  22 January 1999 under the Kim Dae-jung administration; the
  ANSP itself was the 1981 reorganisation of the Korean Central
  Intelligence Agency (KCIA, 1961–1981). Headquartered at Naegok-
  dong, Seoul. Reports to the President.

  Cyber-relevant directorates: the NIS Cyber Security Center
  (CSC), which coordinates national-level cyber defense across
  government, critical infrastructure operators, and the
  intelligence community; the Counter-Terrorism and Counter-
  Espionage Bureaus, which historically have covered DPRK and
  PRC cyber attribution; and the now-formally-disbanded
  Psychological Warfare Bureau (Cyber Director), which was
  publicly named in the April 2013 prosecutor's indictment of
  Director Won Sei-hoon for online manipulation during the 2012
  presidential election campaign.

  Public attribution voice: the NIS is the standard ROK
  government attributor for DPRK-cluster operations (KHNP 2014
  attribution March 2015; KAERI 2021; Lazarus / Andariel
  advisories joint with FBI/CISA/NCSC in 2024). The agency
  rarely publicly attests its own offensive operations; AUSPEX
  treats the public record as overwhelmingly defensive and
  counter-intelligence focused.

  Legislative reform: the National Intelligence Service Act
  revision (December 2020, effective 1 January 2024) transferred
  domestic counter-espionage investigative authority to the
  Korea National Police Agency, leaving NIS with foreign-
  intelligence and cyber-counter-intelligence as its primary
  remaining post-2024 mandates.
