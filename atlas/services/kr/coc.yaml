name: Cyber Operations Command (ROK Armed Forces)
short_name: COC
aliases:
  - 사이버작전사령부
  - Cyber Command (predecessor name, 2010–2019)
  - 사이버사령부
  - ROK Cyber Command
parent_service_id: null
active_since: 2010-01-11  # Cyber Command establishment
active_until: null
mission: |
  ROK joint military cyber capability. Subordinate to the Joint
  Chiefs of Staff and ultimately the Ministry of National
  Defense. Defensive operations protecting military networks,
  offensive cyber against external adversaries (mandate not
  publicly detailed), and contribution to combined exercises
  with US Forces Korea / USFK and US Cyber Command.
summary: |
  Established 11 January 2010 as Cyber Command (사이버사령부)
  inside the Ministry of National Defense following the
  July 2009 DDoS campaign against ROK government, financial,
  and US-government websites that South Korea publicly
  attributed to DPRK actors. Renamed and re-missioned as
  Cyber Operations Command (사이버작전사령부) on 2 January 2019
  under the Moon administration to clarify its operational
  role within the JCS chain of command (the original 2010
  command had been embedded politically inside MND and was
  the subject of a 2013–2017 domestic-politics scandal — see
  Won Sei-hoon entries — over its alleged role in online
  political messaging during the 2012 election).

  Public operational footprint: very thin. The command's
  offensive mandate is publicly acknowledged in MND policy
  documents (Defense White Paper) but specific operations are
  not attributed in public. Participates in the annual Ulchi
  Freedom Shield combined exercise with USFK and US Cyber
  Command; contributes to NATO Cyber Coalition as an Indo-
  Pacific partner.

  AUSPEX uses kr/coc as the primary military-cyber service
  attribution. The thin public operational record is treated
  as accurate to the available evidence rather than masked.
