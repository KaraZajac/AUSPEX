id: kr/dcc
nation_state_id: kr
name: Defense Counterintelligence Command
short_name: DCC
aliases:
  - 국군방첩사령부
  - Gukgun Bangcheop Saryeongbu
  - Defense Security Command (DSC, 1977–2018; predecessor)
  - Defense Security Support Command (DSSC, 2018–2022; predecessor)
  - 기무사 (Kimusa, colloquial)
parent_service_id: null
active_since: 2022-11-01  # Yoon administration rename to DCC
active_until: null
mission: |
  Military counter-intelligence, counter-espionage, and
  insider-threat agency for the ROK Armed Forces. Reports to
  the Minister of National Defense. Cyber-relevant role:
  counter-intelligence against foreign-service penetration of
  military networks and personnel, and contribution to joint
  attribution work on DPRK access operations affecting defense
  industry and military facilities.
summary: |
  Direct successor to Defense Security Command (DSC, 1977–2018)
  and its interim Defense Security Support Command (DSSC,
  2018–2022) name. The 2018 reorganisation under the Moon
  administration followed a substantial domestic-politics
  scandal in which DSC was found to have produced contingency
  plans for martial-law deployment during the 2017 candlelight
  protests. The Yoon administration restored the
  "counterintelligence" naming in November 2022.

  Cyber-relevant role: DCC is the canonical military counter-
  intelligence service for ROK and is named in the July 2024
  CISA-NIS-NSA-FBI joint advisory AA24-207A on DPRK Andariel
  / Onyx Sleet activity targeting defense and aerospace
  intellectual property as a co-author alongside NIS. AUSPEX
  uses kr/dcc as the service-level attribution for ROK
  military counter-intelligence cyber contributions, distinct
  from the offensive / defensive operations mandate at kr/coc.
sources:
  - wikipedia/defense-counterintelligence-command
  - cisa/2024-07-25_aa24-207a
