mission: |
  ROK Army special-operations and counter-terrorism unit with
  a documented secondary cyber / technical-operations role.
  Subordinate to the Army Special Warfare Command under JCS;
  AUSPEX maps to kr/coc for cyber-relevant operations rather
  than for the kinetic special-operations mission.
summary: |
  Established 17 April 1981 under the Special Warfare Command;
  primary mission is national-level counter-terrorism response
  and special reconnaissance. AUSPEX includes the 707th in the
  service tree because of its publicly-acknowledged secondary
  technical-operations role: the unit operates a small organic
  cyber and signals-intelligence cell supporting its kinetic
  operations, and historically has been one of the institutional
  recruitment channels for COC technical personnel.

  Public cyber footprint is extremely limited. AUSPEX models
  this service primarily as a structural placeholder for future
  attribution events where the 707th's cyber cell is publicly
  named; no events are currently tagged here. Operational events
  involving general ROK military cyber should anchor to kr/coc
  unless the 707th is specifically named.
sources:
