mission: |
  Public-facing ROK national cyber-defense coordinator. Runs
  KrCERT/CC (the Korean Computer Emergency Response Team /
  Coordination Center), issues threat advisories, operates
  the .kr ccTLD policy interface, and coordinates incident
  response for the private sector and citizens.
summary: |
  Established 23 July 2009 by merger of the Korea Information
  Security Agency (KIIA), the National Internet Development
  Agency of Korea (NIDA), and the Korea IT International
  Cooperation Agency (KISC), under what is now the Ministry of
  Science and ICT (MSIT). Headquartered in Naju, South Jeolla.

  KrCERT/CC, KISA's operating CSIRT, is the public-facing
  Korean counterpart to US-CERT / CISA and JPCERT/CC. Functions:
  (a) 24/7 incident-response coordination for the private sector
  and citizens; (b) malware and phishing takedown coordination;
  (c) issuing threat advisories on DPRK clusters (Kimsuky,
  Lazarus, Andariel) often jointly with the Korea National
  Police Agency and international partners; (d) operating the
  ROK national bug-bounty programme; (e) ccTLD policy for .kr;
  (f) KISA-PIMS information-security management-system
  certification under the Personal Information Protection Act.

  Public attribution voice: KISA / KrCERT publishes under MSIT
  authority and tends to defer to NIS on state-attribution
  language; AUSPEX treats KISA as a defensive coordination
  service rather than an attributor of last resort.
