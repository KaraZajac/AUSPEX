mission: |
  National-level coordinator of state cyber defense across ROK
  government, critical-infrastructure operators, and the
  intelligence community. Counterpart of CISA / NCSC-UK at
  state-coordination level, while public-sector incident
  response and citizen-facing functions sit with KISA / KrCERT.
summary: |
  Established 20 February 2004 inside the NIS by Presidential
  Directive No. 141 (the "Regulations on National Cyber Security
  Management") as the central coordination body for state cyber
  defense. Operates in parallel to KISA (which handles
  private-sector and internet-infrastructure defense under the
  Ministry of Science and ICT) and the MND Cyber Operations
  Command (military networks).

  Functions: (a) issuing security baselines for government
  systems; (b) running the inter-agency National Cyber Security
  Strategy Council secretariat; (c) producing classified
  attribution assessments for cyber events against ROK
  government and critical infrastructure; (d) joint-publication
  authority for NIS contributions to international advisories
  (the July 2024 AA24-207A Andariel advisory is the canonical
  recent example, co-signed by NIS alongside FBI, CISA, NSA,
  Korea National Police, NCSC-UK, and Defense Counter-
  intelligence Command).

  AUSPEX uses kr/nis/cyber-security-center as the service-level
  attribution for ROK-government cyber defense and attribution
  events; routine public-sector advisories that originate from
  KrCERT route through kr/kisa instead.
sources:
