id: il/shin-bet
nation_state_id: il
name: Israel Security Agency (Shin Bet / Shabak)
short_name: Shin Bet
aliases:
  - שירות הביטחון הכללי
  - Sherut ha-Bitachon ha-Klali
  - Shabak
  - ISA (Israel Security Agency)
parent_service_id: null  # Shin Bet reports directly to the Prime Minister
active_since: 1949-02-08  # founded shortly after Israeli independence; modernized 1957
active_until: null
mission: |
  Israel's internal security and counter-intelligence service.
  Mandate covers domestic counter-terrorism (Palestinian-territory
  and Israeli-Arab focused), protection of state secrets and
  senior officials, counter-intelligence against foreign
  services, and increasingly domestic cyber defense and
  cyber-enabled counter-terror collection. Director reports
  directly to the Prime Minister. Distinct from Mossad (foreign
  HUMINT) and Aman (military intelligence).
summary: |
  Shin Bet is Israel's MI5 / FBI-counter-intel analog. Its
  significance for AUSPEX is two-fold: (1) it is the principal
  Israeli defender against foreign-state cyber intrusions into
  Israeli government and critical-infrastructure networks
  (alongside the National Cyber Directorate); (2) its expanding
  cyber unit has been credited (Israeli press, Greydynamics
  open-source profile) with counter-Hamas, counter-Hezbollah,
  and counter-Palestinian-Authority surveillance and collection
  during peacetime and wartime operations. AUSPEX uses
  il/shin-bet as service-level attribution for events where
  public reporting names ISA / Shabak specifically; in practice
  this is rare in offensive-cyber attribution and more common
  in defensive context.
sources:
  - idf/military-intelligence-directorate  # context only; idf source list also references Shin Bet structurally
