id: il/mossad
nation_state_id: il
name: Institute for Intelligence and Special Operations
short_name: Mossad
aliases:
  - המוסד למודיעין ולתפקידים מיוחדים
  - HaMossad le-Modiʿin u-le-Tafkidim Meyuhadim
  - HaMossad
  - ISIS (older English rendering, deprecated)
parent_service_id: null  # Mossad reports directly to the Prime Minister
active_since: 1949-12-13  # founded as Central Institute for Coordination, Ben-Gurion / Reuven Shiloah
active_until: null
mission: |
  Israel's foreign intelligence service. Mandate covers HUMINT
  collection abroad, covert action, counter-terrorism, counter-
  proliferation (a core Mossad portfolio since at least the 1960s),
  and increasingly cyber operations. Director reports directly
  and only to the Prime Minister. Distinct from Aman (military
  intelligence) and Shin Bet (domestic security).
summary: |
  Mossad is the operational backbone of the long-running Israeli
  counter-proliferation program and the publicly-credited Israeli
  hand in joint US-Israeli cyber operations against the Iranian
  nuclear program (Stuxnet / Olympic Games per Sanger 2012,
  Zetter 2014; Flame per WaPo 2012). Internal cyber units have
  expanded substantially since the 2017 stand-up of a Mossad
  venture-capital arm (Libertad) explicitly aimed at sourcing
  cyber capability from the Israeli commercial sector. Specific
  Mossad cyber unit nomenclature is not publicly enumerated;
  Western attribution typically names "Mossad" generically rather
  than a specific internal unit.

  AUSPEX uses il/mossad as the parent service for Israeli
  externally-directed cyber operations where the attributing
  source names Mossad (or the operation is journalistically
  understood as Mossad-led, e.g. the September 2024 Hezbollah
  pager / walkie-talkie operation) and does not name a specific
  IDF unit.
sources:
  - wapo/2012-06-19_flame-us-israel
  - ieee-spectrum/2013-02_real-story-stuxnet
