id: il/idf-unit-81
nation_state_id: il
name: IDF Unit 81 (Matzov / Technological Unit of the Intelligence Directorate)
short_name: Unit 81
aliases:
  - יחידה 81
  - Yehida Shmonim ve-Achat
  - Special Operations Division technological unit
parent_service_id: il/aman
active_since: 1980-01-01  # exact founding date is classified; widely cited as around 1980 with reorganizations since
active_until: null
mission: |
  Classified technological-R&D unit within Aman. Mandate:
  bespoke hardware and software tooling for IDF special-
  operations forces and intelligence operators — implants,
  covert communications, surveillance hardware, signals
  interception devices, and (per public reporting) supply-
  chain-tampered hardware. Sister organization to Unit 8200;
  the two together represent the technical-elite tier of
  Israeli military intelligence.
summary: |
  Unit 81 is the hardware and bespoke-tooling counterpart to
  Unit 8200's signals and software focus. Highly classified;
  no formal IDF acknowledgment beyond general references to
  the Special Operations Division of the Intelligence
  Directorate. The unit's alumni network is disproportionately
  represented among Israeli cyber-startup founders (Calcalist
  2021 reporting). For cyber-event attribution, Unit 81 sits
  upstream of operator units rather than executing CNE / CNA
  directly; its product is the kit other units use. AUSPEX
  uses il/idf-unit-81 only where public reporting specifically
  names the unit (rare); operational events typically attribute
  to il/idf-8200 or il/aman with 81 referenced as tooling
  provenance in notes.
sources:
  - idf/military-intelligence-directorate
