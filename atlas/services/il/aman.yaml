id: il/aman
nation_state_id: il
name: Military Intelligence Directorate (Aman)
short_name: Aman
aliases:
  - אגף המודיעין
  - Agaf HaModiʿin
  - IDF Military Intelligence Directorate
  - Directorate of Military Intelligence (DMI)
parent_service_id: null  # Aman is an IDF general-staff directorate, not a sub-service
active_since: 1953-01-01  # post-1948-war reorganization of military intelligence (Sherut Modi'in lineage)
active_until: null
mission: |
  Central military intelligence directorate of the Israel Defense
  Forces. Reports to the IDF Chief of Staff. Houses Unit 8200
  (SIGINT and cyber), Unit 81 (technological R&D for special
  operations), Unit 504 (HUMINT against neighboring states),
  Unit 9900 (geospatial / IMINT), the National Assessment
  Division, and the Information Security Department. Produces
  the National Intelligence Estimate jointly with Mossad and
  Shin Bet.
summary: |
  Aman is the parent organization for the IDF's offensive cyber
  capability via Unit 8200 (SIGINT, cyber espionage, EW) and
  Unit 81 (hardware / tooling). When public reporting attributes
  an operation generically to "IDF Military Intelligence" or
  "Israeli military intelligence" without specifying Unit 8200
  or Unit 81, AUSPEX uses il/aman as the service-level
  attribution.

  Aman's structure means that some Israeli cyber operations
  fall across both the SIGINT-collection mandate of 8200 and
  the tooling-and-bespoke-device mandate of 81; attribution to
  Aman as a directorate is editorially safer than premature
  unit attribution in such cases.
sources:
  - idf/military-intelligence-directorate
