id: il/idf-8200
nation_state_id: il
name: IDF Unit 8200 (Israeli Intelligence Corps Unit 8200)
short_name: Unit 8200
aliases:
  - יחידה 8200
  - Yehida Shmoneh Matayim
  - Central Collection Unit of the Intelligence Corps
  - ISNU (Israeli SIGINT National Unit, NSA designation per Snowden documents)
parent_service_id: il/aman
active_since: 1952-01-01  # Unit 515 / 848 lineage; renamed 8200 in 1976
active_until: null
mission: |
  Israel's national SIGINT collection unit and primary offensive
  cyber organization. Mandate: signals intelligence, cryptanalysis,
  cyber CNE / CNA, electronic warfare, counter-intelligence
  signals support. Israel's NSA equivalent, with the additional
  characteristic of operating as a conscript organization that
  recycles cleared and trained personnel into the commercial
  Israeli cyber sector after service.
summary: |
  Unit 8200 is the largest single unit in the IDF and the
  technical-collection center of gravity for Israeli national
  cyber capability. Headquartered at Camp Glilot north of Tel
  Aviv with a major collection facility in the Negev (Urim base).
  Subordinate to Aman. Journalistic and Snowden-document
  attribution links Unit 8200 to: the Olympic Games / Stuxnet
  operation (joint with NSA TAO and Mossad, per Sanger 2012,
  Zetter 2014); the Flame platform (WaPo 2012); the Duqu /
  Tilded toolset lineage (Symantec, Kaspersky 2011-2012);
  and (per multi-source journalism) the Predatory Sparrow /
  Gonjeshke Darande operations against Iranian critical
  infrastructure.

  Israel does not officially acknowledge Unit 8200 operations.
  AUSPEX uses il/idf-8200 as the primary-service slug for
  Israeli cyber operations where multi-source vendor or
  journalistic attribution names 8200 specifically; otherwise
  attribution defers to il/aman.
sources:
  - wapo/2012-06-19_flame-us-israel
  - ieee-spectrum/2013-02_real-story-stuxnet
  - idf/military-intelligence-directorate
