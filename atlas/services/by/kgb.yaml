parent_service_id: null  # reports to President
active_since: 1991-09-21  # Belarusian successor to the Soviet KGB
active_until: null
mission: |
  Internal security, foreign intelligence, and counterintelligence
  service of the Republic of Belarus. The only post-Soviet
  successor service that retained the "KGB" designation.
  Cyber tasking under KGB covers domestic surveillance, opposition
  monitoring, diaspora targeting, and counterintelligence; the
  ISP-position diplomatic-surveillance tradecraft documented by
  ESET in the MoustachedBouncer cluster is most plausibly placed
  here.
summary: |
  The Belarusian KGB has retained extensive surveillance
  authorities through the Lukashenko era and has been the
  principal service responsible for repression of the post-
  August 2020 opposition. Cyber components are not as
  organizationally visible as in the Russian FSB / GRU or the
  Chinese MSS — open-source reporting on Belarusian cyber
  attributes operations to KGB and to military cyber without
  consistently distinguishing the lanes.
sources:
