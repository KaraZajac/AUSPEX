mission: |
  External military and political intelligence collection for the
  People's Army of Vietnam. Hosts signals-intelligence and cyber
  collection units alongside human-source and technical-intelligence
  arms. Cyber tasking emphasizes regional (ASEAN, China, Cambodia,
  Laos) political-military collection and selected commercial-IP
  collection in service of Vietnamese industrial upgrading.
summary: |
  Vietnam's central military-intelligence body, reporting directly
  to the Ministry of National Defense (MND) and the Central
  Military Commission. Vendor reporting on APT32 / OceanLotus
  attributes the cluster to "the Vietnamese government" without
  consistently distinguishing TC2 from the Ministry of Public
  Security; the operational pattern of military-adjacent regional
  targeting (Cambodian government, Laotian foreign ministry, ASEAN
  summit attendees) is consistent with TC2 tasking, while the
  diaspora-dissident pattern fits MPS / A05 tasking more
  comfortably. Treating both services as plausible parents and the
  exact lane unattested is the safer editorial posture.
