mission: |
  Internal security, counterintelligence, and cybercrime
  enforcement. A05 (formerly A68, before the 2018 MPS
  restructuring) hosts the offensive and defensive cyber units
  of the Ministry of Public Security. Tasking emphasizes
  domestic and diaspora dissident surveillance, regime-stability
  monitoring, and enforcement of the 2018 Cybersecurity Law's
  data-localization and content-takedown provisions.
summary: |
  Vietnam's principal civilian internal-security service. A05's
  cyber elements run domestic surveillance on activists,
  journalists, and labor organizers; diaspora monitoring of
  Vietnamese populations in the US, Germany, France, and
  Australia; and lawful-access tooling against social-media
  accounts. Amnesty International's 2021 "Click and Bait"
  investigation tied the Ocean Lotus diaspora-targeting cluster
  to actors operating in alignment with MPS interests. Vietnamese
  authorities have publicly arrested domestic activists on the
  basis of digital evidence collected through similar tooling,
  consistent with the MPS lane.
