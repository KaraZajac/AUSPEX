id: in/ntro
nation_state_id: in
name: National Technical Research Organisation
short_name: NTRO
aliases:
  - राष्ट्रीय तकनीकी अनुसंधान संगठन
parent_service_id: null  # reports to the NSA / Cabinet Secretariat
active_since: 2004-01-01  # Kargil Review Committee recommendation; stood up early 2000s
active_until: null
mission: |
  India's technical-intelligence agency under the National
  Security Advisor / Cabinet Secretariat. Mandate covers SIGINT,
  cyber, geospatial, and aviation intelligence; hosts the
  National Critical Information Infrastructure Protection Centre
  (NCIIPC) created under the IT Act 2000 § 70A.
summary: |
  Established on the recommendation of the Kargil Review
  Committee and the subsequent Group of Ministers report (2001),
  NTRO is the closest Indian analog to NSA — a technical-collection
  agency outside the police / military intelligence structure.
  Reports through the National Security Advisor. NCIIPC, the
  designated nodal agency for CII protection, sits under NTRO.
  Cyber offensive tasking is opaque in open source; the bulk of
  publicly attributed Indian-aligned cyber operations is more
  commonly placed with the contractor / mercenary ecosystem and
  with the Defence Cyber Agency than with NTRO directly, though
  NTRO is widely understood to be the technical-collection lead
  of record.
sources:
  - mha/2014_ntro-overview
  - takshashila/2020-09_indian-intelligence-architecture
