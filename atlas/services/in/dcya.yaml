id: in/dcya
nation_state_id: in
name: Defence Cyber Agency
short_name: DCyA
aliases:
  - Indian Armed Forces Defence Cyber Agency
parent_service_id: null  # reports to HQ Integrated Defence Staff / Chief of Defence Staff
active_since: 2018-09-28  # cabinet approval; stood up operationally May 2019
active_until: null
mission: |
  Tri-service Indian Armed Forces cyber command. Responsible for
  joint cyber operations across Army, Navy, and Air Force,
  including offensive and defensive operations and military
  network protection.
summary: |
  Stood up under the Modi government's restructuring of the
  Indian military's joint-services architecture, alongside the
  Defence Space Agency and the Special Operations Division.
  Headed by a two-star officer (Rear Admiral / Major General /
  Air Vice Marshal rotation). Reports to the Chief of Defence
  Staff via the HQ Integrated Defence Staff. The DCyA is the
  intended Indian analog to US CYBERCOM at a smaller scale;
  public reporting on its operational tempo is limited.
sources:
