id: tr/mit
nation_state_id: tr
name: Millî İstihbarat Teşkilatı (National Intelligence Organization)
short_name: MIT
aliases:
  - MİT
  - National Intelligence Organization of the Republic of Türkiye
parent_service_id: null  # reports to President of the Republic since 2017 constitutional changes
active_since: 1965-07-22
active_until: null
mission: |
  Türkiye's principal civilian intelligence service. Foreign and
  domestic intelligence, counterintelligence, and counterterrorism.
  Cyber operations are not separately attributed at sub-organizational
  level in open source; vendor reporting on Turkish-aligned clusters
  attributes to "Turkish state-aligned" actors without naming MIT
  versus military / signals lanes.
summary: |
  MIT was substantially reorganized under Hakan Fidan (Undersecretary
  / Director 2010–2023, subsequently Foreign Minister and now
  Foreign Minister of Türkiye) with the 2014 Law No. 6532
  amendments expanding foreign-operations authority. The 2016 coup
  attempt led to further institutional changes, including the
  post-coup counter-Gülenist tasking that has driven much of MIT's
  documented diaspora-targeting activity (extradition pressure,
  diplomatic intervention, and — in cases documented by Western
  vendors — cyber operations against exiled Gülenist figures and
  Kurdish opposition).
