mission: |
  Offensive-cyber and intelligence-services successor entity to
  the operational core of DarkMatter / Project Raven. Continued
  delivery of offensive-cyber capability to UAE-state and allied-
  state customers under a separated corporate identity following
  the 2019 Project Raven disclosures.
summary: |
  Beacon Red emerged as a separate corporate identity carrying
  the offensive-operations book of work that had previously sat
  inside DarkMatter / Project Raven. The corporate restructuring
  is partly documented in EDGE Group conglomerate disclosures
  (Beacon Red is listed among EDGE's "cyber defence" portfolio
  alongside DigitalX and Sirar) and in subsequent reporting by
  Reuters and MIT Technology Review on the trajectory of
  ex-NSA personnel after Project Raven's exposure.

  AUSPEX treats Beacon Red as a state-aligned private service
  with the same flagging caveat as DarkMatter: it is not a
  formal UAE IC body, but operationally functions as one for
  attribution purposes when public reporting names it.
sources:
