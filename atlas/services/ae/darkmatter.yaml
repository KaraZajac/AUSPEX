mission: |
  Abu Dhabi-headquartered cybersecurity company, founded as a
  spinoff of the UAE government's signals-intelligence ecosystem.
  Founded by Faisal Al Bannai (also founder of EDGE Group, the
  UAE state defense conglomerate). Functioned as the operational
  host for "Project Raven" — a covert offensive-cyber program
  staffed substantially by former US NSA personnel under contract
  to the UAE government — per Reuters' January 2019 investigation.
summary: |
  AUSPEX classifies DarkMatter as a *state-aligned private service*
  rather than a formal state IC body, because its operational
  output throughout 2014–2019 was directly tasked to UAE-state
  customers (per Reuters reporting) and several of its executives
  came from or moved into UAE state institutions. The Reuters
  Project Raven series (Schectman and Bing, January 30 2019)
  documented the program's recruitment of ex-NSA personnel
  (sourced via the contractor CyberPoint before they migrated to
  DarkMatter directly when CyberPoint declined the offensive
  tasking), and described targeting of dissidents, journalists,
  rival governments, and US persons.

  Mozilla in 2019 refused to include DarkMatter as a trusted CA
  in Firefox, citing the Reuters disclosures. Post-2019,
  DarkMatter restructured — public-facing posture shifted to
  defensive-cybersecurity messaging, and offensive operations
  appear to have moved to the Beacon Red spinoff (modeled as a
  child service: ae/darkmatter/beacon-red).

  Operators publicly named or characterized in the Reuters series
  include former NSA tailored-access personnel; the "Karma" iOS
  zero-click toolkit attributed to DarkMatter / Project Raven was
  separately disclosed in Reuters' January 2019 Karma story.
sources:
