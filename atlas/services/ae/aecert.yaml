id: ae/csc/aecert
nation_state_id: ae
name: UAE Computer Emergency Response Team
short_name: aeCERT
aliases:
  - aeCERT
  - UAE-CERT
parent_service_id: ae/csc
active_since: 2008-01-01  # founded under TRA; later consolidated under CSC umbrella
active_until: null
mission: |
  National CERT for the United Arab Emirates. Incident response,
  vulnerability advisory publication, and federal-government
  cyber-defence coordination. Defensive scope; no offensive
  attribution authority.
summary: |
  aeCERT was originally established under the Telecommunications
  Regulatory Authority (TRA, now TDRA) in 2008 and became the
  federal-government national CERT for the UAE. Following the
  November 2020 establishment of the Cyber Security Council,
  aeCERT's coordination function was consolidated under the CSC
  umbrella, with the CSC providing the strategic and policy
  layer above day-to-day CERT operations.

  aeCERT publishes vulnerability advisories, runs the federal
  incident-coordination cycle, and is the UAE's representative
  in FIRST and OIC-CERT. AUSPEX treats aeCERT as the defensive-
  operational sub-service of CSC; no offensive operations attributed.
sources:
