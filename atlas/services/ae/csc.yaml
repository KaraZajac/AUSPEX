name: Cyber Security Council of the United Arab Emirates
short_name: CSC
aliases:
  - UAE Cyber Security Council
  - CSC-UAE
parent_service_id: null
active_since: 2020-11-04  # established by federal decree per Al-Kuwaiti appointment cycle
active_until: null
mission: |
  National-level cyber-defence and cybersecurity-policy coordination
  body. Public-facing strategy publication, federal-government
  cyber-incident response coordination, and international
  cybersecurity diplomacy. Not a SIGINT or offensive-cyber
  authority in published mandate.
summary: |
  The Cyber Security Council was established by federal decree in
  November 2020 and is chaired by Dr. Mohamed Hamad Al-Kuwaiti
  (Head of Cyber Security for the UAE Government), who has been
  the most public UAE-government voice on cyber matters since.
  The CSC publishes the National Cybersecurity Strategy and
  coordinates federal-level CERT activity through aeCERT (the
  UAE Computer Emergency Response Team) which is housed under
  the CSC umbrella after consolidation.

  In AUSPEX taxonomy: CSC is the defensive / public-policy
  authority; the SIGINT-collection and offensive-coordination
  functions sit on the SIA side (and historically with the
  contractor layer at DarkMatter / Beacon Red). The CSC's
  international cyber diplomacy is anchored to the UAE's
  AI / digital-economy posture and the post-Abraham-Accords
  cybersecurity cooperation track with Israel.
sources:
  - u-ae/csc-mandate
  - u-ae/national-cybersecurity-strategy-2019
