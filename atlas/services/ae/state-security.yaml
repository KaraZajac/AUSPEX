mission: |
  Domestic security, counter-intelligence, and political-security
  authority. Customer-side of UAE cyber-surveillance operations
  against domestic dissidents, regime-critical journalists, and
  human-rights defenders. Not separately attributed as a cyber
  service in vendor reporting; operational equivalent of MOIS or
  Shin Bet in functional role rather than in scale.
summary: |
  The UAE State Security Apparatus is the federal-level domestic
  security service. In English-language reporting it has been
  variously referred to as the State Security Service, the General
  Intelligence Presidency, or by reference to the senior officials
  identified in disclosures (e.g., Tahnoun bin Zayed as National
  Security Adviser overseeing the broader IC).

  AUSPEX treats this entity as the *customer* for UAE-procured
  cyber-surveillance capability (Pegasus deployments against
  domestic dissidents, Stealth Falcon targeting of Emirati
  journalists in exile) rather than as an operator-cluster of its
  own. The operational delivery typically routed through
  DarkMatter / Beacon Red, contracted ex-NSA personnel under
  Project Raven, and Pegasus / Karma deployments.

  Open-source attribution to UAE State Security as a *named
  operator* is rare; AUSPEX flags this entry as primarily a
  doctrine-link anchor for regime-protection-surveillance
  taggings.
sources:
  - reuters/2019-01-30_project-raven
  - citizenlab/2016-08-25_million-dollar-dissident
