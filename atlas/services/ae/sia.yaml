mission: |
  UAE national signals-intelligence and information-security
  authority. Defensive standards-setting for federal information
  systems and critical national infrastructure; SIGINT-collection
  function inferred from organizational lineage but not separately
  attested in English-language open source.
summary: |
  The Signals Intelligence Agency is the rebrand and successor of
  the National Electronic Security Authority (NESA), established by
  federal decree in 2014 to set the UAE's national-information-
  assurance standards (the NESA IAS) and to coordinate critical-
  national-infrastructure cyber defence. The rebrand to SIA followed
  the 2020 establishment of the Cyber Security Council (which
  absorbed the public-facing cyber-defence coordination role),
  leaving SIA as the closer-to-classified IC body.

  In Reuters and academic UAE-cyber coverage, the SIA / NESA
  lineage is the formal state IC home for signals collection and
  the receiving-end customer for DarkMatter and contractor
  capability under Project Raven (2014–2019 per Reuters). The
  public-source attribution chain for SIA-direct cyber operations
  is thin: vendor and journalistic reporting typically attributes
  to "UAE government," "UAE intelligence," or "DarkMatter operators
  working for the UAE government" without naming SIA / NESA at the
  organizational level.

  AUSPEX models SIA as the de jure state cyber service while
  recognizing that the de facto operational record runs through
  the DarkMatter / Beacon Red contractor layer.
