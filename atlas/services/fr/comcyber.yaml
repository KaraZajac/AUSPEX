mission: |
  Joint military cyber command, integrating Army, Navy, Air and
  Space, and joint cyber forces under a single operational
  command reporting to the Chief of the Defence Staff (Chef
  d'état-major des armées, CEMA). Mandate covers Lutte
  Informatique Défensive (LID) of military networks, Lutte
  Informatique Offensive (LIO) on military missions, and from
  October 2021 also Lutte Informatique d'Influence (LII) — the
  information-warfare doctrine.
summary: |
  COMCYBER was stood up on 4 May 2017 by then-Defence Minister
  Jean-Yves Le Drian, consolidating military cyber capabilities
  that had previously been distributed across services. Its
  posture was extended in January 2019 when Defence Minister
  Florence Parly publicly announced the Lutte Informatique
  Offensive (LIO) doctrine — a rare Western acknowledgment of
  offensive military cyber capability. The 2021 LII publication
  added the information-warfare mandate.

  Subordinate components include the Centre d'analyse en lutte
  informatique défensive (CALID, military CERT), the Centre des
  réserves et de la préparation opérationnelle de cyberdéfense,
  and a 2024 stand-up of dedicated Army cyber forces
  (Commandement des actions dans la profondeur et du
  renseignement / cyber-land elements per the LPM 2024-2030).
  Public attribution of specific COMCYBER operations is thin;
  AUSPEX uses fr/comcyber where reporting names a military cyber
  unit specifically.
