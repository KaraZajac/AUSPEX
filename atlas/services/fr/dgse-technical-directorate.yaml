id: fr/dgse/technical-directorate
nation_state_id: fr
name: DGSE Technical Directorate
short_name: DGSE/DT
aliases:
  - Direction Technique
  - DT
  - DGSE Technical Division
  - DGSE SIGINT directorate
parent_service_id: fr/dgse
active_since: 1989-01-01  # DT created in late 1980s as DGSE SIGINT/cyber arm; precise public date contested
active_until: null
mission: |
  SIGINT, COMINT, and computer network operations (CNE / CNO) arm
  of DGSE. Operates the satellite-intercept stations (Domme, Alluets,
  Kourou, Mayotte, Djibouti et al.) and the cable-tap / interconnect
  collection program documented by Le Monde (2015). Develops and
  operates the offensive tooling cluster vendor-named Animal Farm.
summary: |
  Public knowledge of the DGSE Technical Directorate's mandate comes
  primarily from Snowden-derived disclosures (Le Monde 2014-2015,
  L'Obs 2015), vendor reverse-engineering of the Animal Farm tooling
  family (ESET, G Data, Cyphort, Kaspersky 2014-2015), and the 2018
  Revue stratégique de cyberdéfense which acknowledged the existence
  of offensive cyber capability without naming the operating
  directorate.

  AUSPEX uses fr/dgse/technical-directorate as the service-level
  attribution where vendor reporting names "DGSE technical branch"
  or "French SIGINT" specifically; fr/dgse where reporting names the
  parent service generically.
sources:
  - lemonde/2014-03-21_snowglobe-piste-francaise
