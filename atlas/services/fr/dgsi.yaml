name: Direction Générale de la Sécurité Intérieure
short_name: DGSI
aliases:
  - DGSI
  - General Directorate for Internal Security
  - French domestic intelligence service
parent_service_id: null  # DGSI reports to the Minister of the Interior
active_since: 2014-05-12  # DGSI created from DCRI, 12 May 2014
active_until: null
mission: |
  France's domestic intelligence service. Counter-espionage,
  counter-terrorism, counter-proliferation, protection of
  national economic and scientific patrimony, surveillance of
  domestic extremist movements. Reports to the Minister of the
  Interior.
summary: |
  DGSI was created in May 2014 by elevating the DCRI (Direction
  Centrale du Renseignement Intérieur, 2008-2014) to a general
  directorate. Its cyber mandate is principally counter-espionage
  — investigating foreign state intrusions against French
  government, defense industrial base, and strategic enterprises
  — and counter-terror investigation of jihadist online activity.
  DGSI is not the principal French offensive-cyber operator;
  AUSPEX includes the service entry for completeness and because
  CERT-FR / ANSSI investigations of foreign intrusions in France
  routinely pass through DGSI counter-espionage cooperation.
