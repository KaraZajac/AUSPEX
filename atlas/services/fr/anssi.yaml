id: fr/anssi
nation_state_id: fr
name: Agence nationale de la sécurité des systèmes d'information
short_name: ANSSI
aliases:
  - ANSSI
  - French National Cybersecurity Agency
  - National Agency for the Security of Information Systems
parent_service_id: null  # ANSSI reports to the SGDSN under the Prime Minister
active_since: 2009-07-07  # ANSSI established by decree 2009-834, 7 July 2009
active_until: null
mission: |
  National authority for the security of information systems.
  Defensive mandate only — the Revue stratégique de cyberdéfense
  (2018) formalized the strict separation between defensive
  (ANSSI) and offensive (DGSE / COMCYBER) cyber missions as a
  French doctrinal choice. Operates CERT-FR, manages the OIV /
  OSE / OES critical-operators security regime, publishes
  technical advisories, and represents France in EU NIS / NIS2
  coordination and in the EU CSIRTs Network.
summary: |
  ANSSI was established by decree 2009-834 of 7 July 2009,
  reporting to the SGDSN (Secrétariat général de la défense
  et de la sécurité nationale) under the Prime Minister. Its
  first director-general was Patrick Pailloux (2009-2014),
  followed by Guillaume Poupard (2014-2023) and Vincent
  Strubel (2023-).

  Operating components:
    - CERT-FR (Centre gouvernemental de veille, d'alerte et de
      réponse aux attaques informatiques) — the national CERT,
      issues CERTFR-NNNN-XXX advisories and incident reports.
    - Centre Opérationnel de la Sécurité des Systèmes
      d'Information (COSSI) — incident response.
    - Sub-directorate for regulation and accreditation,
      managing the visa de sécurité ANSSI labeling for
      security products and the OIV / OSE security regime.

  ANSSI is regarded by AUSPEX and the broader allied-state
  ecosystem as a tier-2 authoritative source for defensive
  attribution and incident reporting, comparable to NCSC-UK,
  BSI Germany, and CCCS Canada.
sources:
