id: fr/dgse
nation_state_id: fr
name: Direction Générale de la Sécurité Extérieure
short_name: DGSE
aliases:
  - DGSE
  - General Directorate for External Security
  - French External Intelligence Service
parent_service_id: null  # DGSE reports to the Minister of the Armed Forces
active_since: 1982-04-02  # DGSE created 2 April 1982, replacing SDECE
active_until: null
mission: |
  France's principal foreign intelligence service. Reports to the
  Minister of the Armed Forces. Mandate covers HUMINT, SIGINT
  (via the Technical Directorate), action service (Service Action,
  paramilitary / clandestine action), and offensive cyber
  capability that operates in coordination with COMCYBER on
  military missions and independently on intelligence-collection
  missions.
summary: |
  DGSE is the operational home of the Animal Farm tooling family
  (Babar, Casper, Bunny, Dino, NBot, EvilBunny, Snowglobe /
  SNOWBALL family) as reconstructed by vendor research (ESET,
  G Data, Cyphort, Kaspersky) and the 2014 Le Monde report
  citing CSE Canada slides leaked by Snowden. France has not
  formally acknowledged the Animal Farm tooling as DGSE-developed.

  DGSE is headquartered in the Boulevard Mortier ("la piscine")
  in the 20th arrondissement of Paris. The Technical Directorate
  (Direction Technique, DT) houses the SIGINT and cyber-operations
  function and is the directorate publicly associated with the
  Animal Farm cluster by vendor and Le Monde reporting.
sources:
  - lemonde/2014-03-21_snowglobe-piste-francaise
