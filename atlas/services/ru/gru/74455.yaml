mission: |
  Destructive and disruptive cyber operations supporting GRU
  military objectives; OT/ICS sabotage; influence operations
  integrated with kinetic action. Houses the Sandworm cluster
  (APT44) and assessed to direct the Cyber Army of Russia Reborn
  proxy.
summary: |
  Located at 22 Kirova Street, Khimki, Moscow region. Six officers
  (Andrienko, Detistov, Frolov, Kovalev, Ochichenko, Pliskin)
  indicted by DOJ in October 2020 for NotPetya, Olympic Destroyer,
  the 2015 and 2016 Ukraine power-grid attacks, French election
  interference, and the OPCW Novichok inquiry targeting. The unit
  is under US Treasury OFAC sanctions (2020), EU and UK sanctions.
  Mandiant promoted the cluster to a named APT (APT44) in April
  2024. Tooling lineage includes BlackEnergy3, Industroyer/
  Industroyer2, NotPetya, Olympic Destroyer, KillDisk, HermeticWiper,
  CaddyWiper, IsaacWiper, AcidRain, SwiftSlicer, and FrostyGoop.
