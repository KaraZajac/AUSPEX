mission: |
  Cryptography / SIGINT-oriented GRU unit. Hosts Fancy Bear / APT28,
  conducting strategic political and military espionage, election
  interference, hack-and-leak influence operations, and defense-
  industrial-base targeting.
summary: |
  Based at Komsomolsky Prospekt 20, Moscow. Mueller's July 2018
  indictment named twelve Unit 26165 and Unit 74455 officers
  (Netyksho et al.) for the DNC/DCCC hack and 2016 election
  interference. The October 2018 Morenets indictment named seven
  additional officers for WADA, USADA, OPCW (Hague close-access),
  Westinghouse, and MH17 investigation targeting. UK FCDO sanctions
  on Unit 26165 and officer Dmitry Badin (Oct 2020) cited the 2015
  German Bundestag intrusion. The unit's tooling lineage includes
  X-Agent (Chopstick), X-Tunnel, Sofacy, Zebrocy, and the Lojax
  UEFI rootkit. Operational tradecraft spans webmail credential
  phishing (Bitly), spearphishing with weaponized documents,
  Outlook NTLM relay (CVE-2023-23397), and on-site close-access
  operations.
