mission: |
  Psychological and information-influence operations directorate.
  Produces and amplifies GRU-aligned narratives through cutout
  media and coordinated inauthentic behavior on social platforms.
summary: |
  The GRU's "information confrontation" troops. Tied to InfoRos,
  Strategic Culture Foundation, NewsFront and similar front media
  per US Treasury OFAC and State Department GEC reporting. Multiple
  sanctions tranches 2020–2024. Tradecraft includes cutout media
  outlets, ghost-writer networks, AI-generated content, and
  coordinated amplification on Telegram, X and Facebook. Operates
  alongside SVR influence cutouts and the post-2014 Internet
  Research Agency successor ecosystem.
