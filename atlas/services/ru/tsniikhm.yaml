mission: |
  Russian state research institute holding the only publicly
  attributed nation-state safety-instrumented-system (SIS)-targeting
  malware capability (Triton/Trisis, demonstrated against Saudi
  Petro Rabigh, 2017).
summary: |
  Organizational placement is contested in open source. The US
  Treasury OFAC October 2020 designation describes TsNIIKhM as a
  Russian government-controlled research institute (Russian Ministry
  of Defense affiliation per Treasury). Several vendors (Mandiant,
  Dragos, FireEye) have associated the underlying Xenotime/TEMP.Veles
  operator with FSB-adjacent direction. AUSPEX flags this as a
  contested attribution and captures both placements; the doctrine-
  linkage remains consistent (energy weaponization, coercive
  pre-positioning) regardless of which service ultimately tasks
  the activity. Treasury sanctions Oct 2020. DOJ indictment of
  TsNIIKhM employee Evgeny Gladkikh unsealed March 2022.
contested: true
contested_notes: |
  Treasury OFAC (2020) places TsNIIKhM as a Russian MoD-controlled
  research institute. Vendor reporting (Mandiant, Dragos) has
  variously associated the Triton/Xenotime operator with FSB or
  FSB-adjacent direction. AUSPEX preserves both without forcing a
  single parent assignment.
