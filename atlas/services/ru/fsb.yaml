active_since: 1995-04-03  # Successor to FSK (1995)
active_until: null
mission: |
  Domestic security service with strong external cyber mandate.
  Conducts strategic espionage at scale (Center 16 — SIGINT;
  Center 18 — information security). Operates the FSB liaison
  with criminal cyber groups (per ContiLeaks 2022).
summary: |
  Successor to the KGB's Second Chief Directorate (counter-
  intelligence) and Third Chief Directorate, reconstituted as the
  FSK and then FSB. The FSB's cyber portfolio is split between
  Center 16 (16th Center / TsRRSS — Snake/Turla, Berserk Bear) and
  Center 18 (Center for Information Security / TsIB — Gamaredon,
  Star Blizzard, and assessed direction of cybercriminal groups
  per the ContiLeaks 2022 dump). Operation MEDUSA (May 2023)
  dismantled the FSB's flagship Snake malware infrastructure.
  Multiple FSB officers have been indicted by US DOJ (2017 Yahoo,
  2022 Berserk Bear, 2023 Star Blizzard) and Treasury OFAC has
  sanctioned Center 16 and named officers.
