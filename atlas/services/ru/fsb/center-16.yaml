parent_service_id: ru/fsb
active_since: 2003-01-01  # Snake/Uroburos codebase development
active_until: null
mission: |
  FSB SIGINT and foreign cyber-espionage element. Hosts Turla
  (long-dwell strategic espionage) and Berserk Bear (energy-sector
  pre-positioning).
summary: |
  Identified explicitly in the May 2023 DOJ Operation MEDUSA
  announcement as the FSB element responsible for the Snake malware
  network. Indicted in March 2022 (Pavel Akulov, Mikhail Gavrilov,
  Marat Tyukov) for the 2012–17 Berserk Bear energy-sector
  campaign. US Treasury OFAC sanctioned Center 16 in March 2022.
  Tool lineage includes Snake/Uroburos (kernel rootkit with custom
  P2P C2), ComRAT, Kazuar, Havex, and (per CISA Aug 2025) ongoing
  exploitation of Cisco IOS Smart Install (CVE-2018-0171).
