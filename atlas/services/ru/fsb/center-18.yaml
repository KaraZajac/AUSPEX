mission: |
  FSB information-security center. Operationally houses Gamaredon
  (Ukraine-focused continuous targeting), Star Blizzard / Callisto
  (credential phishing of Western policy elites), and is the
  assessed liaison element for FSB-direction of cybercriminal
  groups (Conti / TrickBot per ContiLeaks 2022).
summary: |
  Ukrainian SBU named five FSB Center 18 officers in November 2021
  as responsible for the Gamaredon Sevastopol cell. CISA/NCSC joint
  advisory AA23-341A (Dec 2023) attributed Star Blizzard
  specifically to "Centre 18 of the FSB," and DOJ indicted Andrey
  Korinets and Ruslan Peretyatko the same month. Center 18 was
  also the FSB element historically responsible for the Yahoo case
  (Dokuchaev, Sushchin — DOJ March 2017). The ContiLeaks dump (Feb
  2022) exposed FSB Center 18 contacts and tasking against US, UK,
  and Ukrainian targets.
