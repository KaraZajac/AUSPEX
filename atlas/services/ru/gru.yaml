name: Main Directorate of the General Staff of the Armed Forces of the Russian Federation
short_name: GRU
aliases:
  - ГРУ
  - GU (Glavnoye Upravlenie, post-2010 nominal rename)
  - Glavnoye Razvedyvatelnoye Upravlenie
parent_service_id: null
active_since: 1918-11-05  # Registration Directorate predecessor; modern form 1942
active_until: null
mission: |
  Military intelligence service of the Russian General Staff.
  Operationally dominant Russian cyber service: houses Sandworm
  (Unit 74455 / GTsST — destructive/disruptive operations), Fancy
  Bear (Unit 26165 / GTsSS — political and military espionage,
  election interference), Unit 54777 (psychological operations),
  and directs the Cyber Army of Russia Reborn (CARR) proxy per the
  DOJ Dec-2025 CARR indictment ("founded, funded, and directed by
  the GRU"). [Corrected 2026-06-25, claude-opus-4.8/max: the prior
  "per Treasury Jul 2024" overstated OFAC, which named CARR only a
  "Russian government-aligned hacktivist group"; the GRU attribution
  is the DOJ indictment's, not Treasury's.]
summary: |
  GRU is the operationally most-productive Russian cyber service
  and the source of essentially all destructive Russian state
  cyber operations. Six Unit 74455 officers were indicted by DOJ
  in October 2020 for NotPetya, Olympic Destroyer, the 2015–16
  Ukraine power grid attacks, French election interference, and
  the Novichok inquiry targeting. Twelve Unit 26165/74455 officers
  were indicted by Mueller (July 2018) and a further seven (Oct
  2018) for WADA/OPCW operations. Treasury OFAC sanctioned the
  GRU's GTsST (Main Center for Special Technologies) in 2020.
