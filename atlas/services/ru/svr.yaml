mission: |
  Strategic foreign intelligence collection — political, military,
  scientific, and technological. Cyber operations element runs the
  APT29 / Cozy Bear / Midnight Blizzard cluster. Long-dwell,
  technically sophisticated, rarely destructive.
summary: |
  Successor to the KGB First Chief Directorate. SVR's cyber arm
  was attributed by the US/UK in April 2021 as responsible for
  the SolarWinds Orion supply-chain compromise (SUNBURST), with
  Treasury OFAC sanctions issued under EO 14024 the same day.
  Subsequent operations include the Microsoft corporate breach
  (Nov 2023–Jan 2024) and parallel HPE breach; continuous
  cloud-tenant collection against US/UK/EU foreign-policy targets;
  and SVR exploitation of JetBrains TeamCity (CVE-2023-42793) as
  apparent pre-positioning for follow-on supply-chain operations
  (CISA AA23-347A).
