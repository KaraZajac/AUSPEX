mission: |
  Civilian foreign and domestic intelligence service of the
  Islamic Republic. Conducts cyber-espionage, dissident
  surveillance, and destructive / coercive operations behind
  hacktivist personas (notably HomeLand Justice against Albania).
  Parent of MuddyWater, APT34 / OilRig, APT39 / Chafer (via the
  Rana Intelligence Computing contractor front).
summary: |
  MOIS (VAJA / VEVAK) is the civilian counterpart to the IRGC's
  intelligence apparatus, formally established under the Islamic
  Republic's intelligence ministry law. Per US Treasury OFAC
  attestation (September 9, 2022 sanctions over the Albania attack),
  the entire ministry has been designated for malign cyber
  activities. MOIS uses both in-house operators and contractor
  fronts (Rana Intelligence Computing, sanctioned September 17,
  2020) to conduct cyber operations. Cyber tasking emphasizes
  regional government and telecom collection (APT34, MuddyWater),
  dissident surveillance worldwide (APT39 / Rana), and destructive
  retaliation against states harboring the MEK (HomeLand Justice
  vs. Albania).
