id: ir/irgc-io
nation_state_id: ir
name: IRGC Intelligence Organization
short_name: IRGC-IO
aliases:
  - سازمان اطلاعات سپاه
  - Sazman-e Ettela'at-e Sepah
  - IRGC Intelligence Organisation
  - IRGC-IO Cyber-Electronic Command
parent_service_id: ir/irgc
active_since: 2009-01-01  # consolidated as a separate organization c. 2009
active_until: null
mission: |
  Counter-intelligence, counter-dissident, and offensive cyber
  arm of the IRGC, organizationally separate from MOIS. Operates
  the CyberAv3ngers OT/ICS sabotage persona and is the IRGC parent
  identified by US Treasury and CISA in the December 2023 / February
  2024 designations relating to Unitronics PLC exploitation.
summary: |
  IRGC-IO is the IRGC's domestic and foreign-intelligence service,
  established to provide the IRGC with intelligence capability
  independent of the civilian MOIS. The Constitutional dual-service
  structure has produced parallel actor clusters: IRGC-IO operates
  the CyberAv3ngers persona (Treasury Feb 2024 designation names
  the IRGC-IO Cyber-Electronic Command and its commander Hamid
  Reza Lashgarian); MOIS operates HomeLand Justice. APT42 is
  attributed to IRGC-IO by Mandiant.
