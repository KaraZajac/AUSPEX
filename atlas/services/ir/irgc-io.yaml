parent_service_id: ir/irgc
active_since: 2009-01-01  # consolidated as a separate organization c. 2009
active_until: null
mission: |
  Counter-intelligence, counter-dissident, and offensive cyber
  arm of the IRGC, organizationally separate from MOIS. Mandiant
  attributes APT42 to the IRGC-IO. [2026-07-05: CyberAv3ngers was
  re-homed from here to the sibling command ir/irgc-cec (IRGC
  Cyber-Electronic Command) — the entity every cited government
  source actually names for the Unitronics/OT operations.]
summary: |
  IRGC-IO is the IRGC's domestic and foreign-intelligence service,
  established to provide the IRGC with intelligence capability
  independent of the civilian MOIS. Mandiant attributes APT42 to
  IRGC-IO; MOIS operates HomeLand Justice. The IRGC Cyber-Electronic
  Command (ir/irgc-cec) — designated by Treasury in Feb 2024 (naming
  its commander Hamid Reza Lashgarian) — operates the CyberAv3ngers
  OT-sabotage persona and is now modeled as a distinct sibling
  command, not as part of the IRGC-IO.
