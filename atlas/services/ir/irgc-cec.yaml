parent_service_id: ir/irgc
active_since: 2018-01-01  # approximate; the CEC is named in the Feb-2024 OFAC designation, prior standup date not public
active_until: null
mission: |
  Offensive cyber and OT/ICS-sabotage command of the IRGC. Operates
  the CyberAv3ngers persona used against Unitronics PLCs, Israeli/US
  water and fuel-management OT, and the IOCONTROL malware framework.
summary: |
  Created 2026-07-05 (Kara-approved) to correct a persistent
  mis-placement: AUSPEX had modeled CyberAv3ngers under the IRGC
  Intelligence Organization (ir/irgc-io), but every cited government
  source — OFAC jy2072 (2 Feb 2024, which names the "IRGC-CEC" and
  its commander Hamid Reza Lashgarian ×7), CISA AA23-335A, CISA
  AA26-097A — names the IRGC **Cyber-Electronic Command (IRGC-CEC)**,
  not the IRGC-IO (IRGC-IO occurrences: 0). Modeled here as a distinct
  IRGC command (parent ir/irgc). NB some reporting frames the CEC as
  nested under the IRGC-IO; the parent is set to the IRGC directly per
  the literal "IRGC Cyber-Electronic Command" designation, pending any
  source that pins a finer sub-org. The four batch-33..35 cyberav3ngers
  audits (ofac-cyberav3ngers, iocontrol, water-sector, aa26-097a) all
  flagged this discrepancy.
sources:
  - cisa/2023-12-01_aa23-335a-cyberav3ngers
  - treasury/2024-02-02_cyberav3ngers-irgc-io
