id: ir/quds-force
nation_state_id: ir
name: IRGC Quds Force
short_name: Quds Force
aliases:
  - نیروی قدس
  - Niru-ye Qods
  - Qods Force
  - IRGC-QF
parent_service_id: ir/irgc
active_since: 1990-01-01  # consolidated as Quds Force during late Iran-Iraq war / early 1990s
active_until: null
mission: |
  IRGC component responsible for extraterritorial operations,
  proxy management, and capability transfer to Axis-of-Resistance
  partners (Hezbollah, Iraqi PMF, Houthis, Hamas/PIJ, Syrian
  remnants). Cyber relevance is primarily as the conduit for
  IRGC capability-building of Hezbollah's cyber arm (Lebanese
  Cedar / Volatile Cedar lineage).
summary: |
  Quds Force is the IRGC's external operations command. Under
  Qasem Soleimani (1998-2020) it became the principal vehicle for
  Iran's regional projection through partners and proxies. Cyber
  tasking under Quds Force is less granularly attested than under
  IRGC-Cyber or IRGC-IO; the principal documented role is
  capability-transfer to Hezbollah's cyber unit. The January 3,
  2020 US strike that killed Soleimani is the precipitating event
  for the Post-Soleimani Retaliation doctrine (attested in DOJ
  Sept 2024 indictment of APT42 operators).
