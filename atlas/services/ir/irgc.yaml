mission: |
  Ideological-military force established by the 1979 Constitution
  (Article 150) to "safeguard the Revolution and its achievements."
  Operates a parallel intelligence service (IRGC-IO), a regional /
  extraterritorial special operations command (Quds Force), and an
  Electronic Warfare and Cyber Defense Organization that fields
  offensive cyber units. Distinct from the regular military
  (Artesh) and the civilian intelligence ministry (MOIS / VAJA).
summary: |
  The IRGC is the doctrinal source and operational backbone of
  Iran's offensive cyber program. Its constitutional mandate is
  interpreted broadly to authorize extraterritorial cyber action
  against any actor judged hostile to the Islamic Revolution. The
  IRGC fields multiple cyber-capable components: IRGC-Cyber /
  IRGC Electronic Warfare and Cyber Defense Organization
  (offensive operations against Israel, Gulf, US), IRGC-Intelligence
  Organization (IRGC-IO, counter-dissident and CyberAv3ngers
  persona), and Quds Force (regional capability transfer to
  Hezbollah and other Axis-of-Resistance partners).

  **Structural-attribution limit**: unlike the PLA (Unit 61398,
  Unit 61486) or GRU (Unit 26165, Unit 74455), IRGC internal cyber
  unit numbering is not publicly documented. Western government
  attribution names IRGC officers and contractor firms (Najee
  Technology, Afkar System, Emennet Pasargad, Mehrsam Andisheh
  Saz Nik) and IRGC commands ("IRGC-IO Cyber-Electronic Command"
  in the Feb 2024 Lashgarian designation), but no public mapping
  of Iranian cyber units to vendor APT clusters exists at the
  granularity available for PRC/RU services.
