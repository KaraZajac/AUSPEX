mission: |
  CIA Title 50 covert-action cyber capability. Develops and operates
  remote-access, close-access, supply-chain, and embedded-device
  exploitation tools in support of HUMINT operations and named covert
  action programs.
summary: |
  The Center for Cyber Intelligence sits within the CIA Directorate
  of Digital Innovation (DDI, established 2015). Its Engineering
  Development Group (EDG) was extensively exposed in the WikiLeaks
  Vault 7 release (March – November 2017), which documented EDG's
  sub-branches: Embedded Development Branch (EDB), Operational Support
  Branch (OSB), Remote Devices Branch (RDB), Mobile Development Branch
  (MDB), and Network Devices Branch (NDB).

  Tools documented in Vault 7 include the HIVE C2 framework, Fluxwire
  (tracked by Symantec as Corentry), Brutal Kangaroo (air-gap jump via
  USB), Weeping Angel (Samsung TV firmware implant), Pandemic
  (file-share), and ELSA (Wi-Fi geolocation). Former EDG developer
  Joshua Schulte was convicted in SDNY July 2022 for the leak.

  Operationally distinct from NSA TAO: CIA cyber operations are
  conducted under Title 50 §3093 covert-action authority with
  presidential finding and intelligence-committee notification,
  whereas NSA TAO operates under Title 50 SIGINT collection authorities
  without finding. The current post-Vault-7 organizational structure
  is not fully public.
