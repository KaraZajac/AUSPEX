name: Joint Task Force ARES
short_name: JTF-ARES
aliases:
  - JTF ARES
  - Counter-ISIL Cyber Task Force
parent_service_id: us/cybercom/cnmf
active_since: 2016-04-01
active_until: null
mission: |
  Deny adversary VEO (originally ISIL, now broader counter-terror)
  use of cyberspace — disrupt media, propaganda, financial-messaging,
  and C2 infrastructure.
summary: |
  Established April–May 2016 under then-Maj. Gen. Paul Nakasone (then
  commander of Army Cyber Command, subsequently CG USCYBERCOM and
  DIRNSA). Flagship operation Glowing Symphony launched November 2016
  against ISIS media infrastructure (al-Hayat Media Center, Amaq
  Agency, content-distribution servers). Operations continued after
  the initial 30-day surge; the task force remains active as a
  counter-VEO cyber unit aligned under CNMF.

  Notable for being one of the first US offensive cyber units to be
  openly acknowledged by the Department of Defense (Carter, then
  Mattis, public remarks 2016–17) and the subject of FOIA-declassified
  after-action assessments (National Security Archive, January 2020).
