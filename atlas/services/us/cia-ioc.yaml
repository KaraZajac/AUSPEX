mission: |
  HUMINT-paired cyber operations supporting CIA covert action
  programs. Operationally distinct from but coordinating with the
  Center for Cyber Intelligence (CCI / EDG).
summary: |
  Founded 1996 as the Critical Defense Technologies Division;
  reorganized into the Information Operations Center. Historically
  sat under the CIA Directorate of Operations; since the 2015 reorg
  cooperates closely with the Directorate of Digital Innovation and
  CCI. Less publicly visible than CCI — the bulk of public knowledge
  comes from Bob Woodward's covert-action reporting rather than
  technical attribution.

  Tagged in this atlas with `medium` confidence: existence and
  general mission are well-attested, but no canonical operations are
  publicly attributed to IOC specifically (as distinct from CCI / EDG).
sources:
  - woodward/2010_obamas-wars
