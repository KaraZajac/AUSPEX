mission: |
  US signals intelligence (Title 50) and information assurance.
  Dual-hatted with USCYBERCOM since CYBERCOM stand-up in 2010
  (separation review shelved May 2025).
summary: |
  Established by Truman in 1952 as a unified national cryptologic
  organization. Responsibilities span foreign SIGINT collection,
  computer network exploitation (via TAO / CNO Directorate), defensive
  cybersecurity guidance (via the 2019 Cybersecurity Directorate), and
  national-mission cryptography. Headquartered at Fort Meade, Maryland,
  with global SIGINT collection points (DSDs / RSOCs at Hawaii,
  Georgia, Texas, Colorado) and Special Source Operations partnerships
  with US telecom carriers (PRISM, FAIRVIEW, BLARNEY, STORMBREW per
  Snowden documents).

  The dual-hat arrangement at Fort Meade lets a single 4-star command
  both NSA (Title 50 SIGINT) and USCYBERCOM (Title 10 military cyber).
  Currently acting under Lt. Gen. Wilfred "Will" Hardy following the
  April 2025 firing of Gen. Tim Haugh. The Trump administration shelved
  the prospective separation in May 2025 with bipartisan congressional
  support.
