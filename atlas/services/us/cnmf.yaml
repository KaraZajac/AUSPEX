id: us/cybercom/cnmf
nation_state_id: us
name: Cyber National Mission Force
short_name: CNMF
aliases:
  - National Mission Force - Cyber (legacy)
  - CYBERCOM Sub-Unified
parent_service_id: us/cybercom
active_since: 2014-01-01
active_until: null
mission: |
  Defend the nation in cyberspace. Runs the Hunt Forward program,
  election-defense disruption operations (IRA 2018, Trickbot 2020), and
  CYBERCOM's overt named operations against adversary criminal and
  state infrastructure.
summary: |
  Initial operating capability 2014; full operating capability 2018;
  elevated to a sub-unified command under USCYBERCOM December 19, 2022.
  Currently commanded by Maj. Gen. Lorna Mahlock (USMC) — the first
  Marine and first Black female 2-star to command a sub-unified
  command.

  Composed of the 13 National Mission Teams (NMTs) of the Cyber Mission
  Force plus support elements. Operates with NSPM-13-derived authority
  for time-sensitive offensive operations and the standing Section
  1642 authority for active defense against Russia, China, Iran, and
  North Korea.

  Operational signature is unusually overt for a US offensive cyber
  unit: the CNMF has uploaded hundreds of malware samples to
  VirusTotal under the @CYBERCOM_Malware_Alert handle since 2018,
  attributing samples to GRU (Sandworm), MSS (APT41 et al.), MOIS, and
  RGB. This breaks a long-standing US convention of attribution silence
  and operationalizes "cost imposition through attribution" under
  Persistent Engagement.
