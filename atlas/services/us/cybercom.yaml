mission: |
  Unified combatant command for military cyberspace operations (Title
  10). Commands the Cyber Mission Force; executes Defend Forward,
  Persistent Engagement, and Hunt Forward operations. Dual-hatted with
  NSA at Fort Meade.
summary: |
  Established as a sub-unified command under USSTRATCOM May 21, 2010;
  elevated to a unified combatant command August 18, 2018 under
  Section 1633 of NDAA FY2017 (10 U.S.C. §394). Commands the Cyber
  Mission Force (133 teams at FOC May 2018, growing to ~147 per FY24
  budget). Service-component cyber forces (ARCYBER, FLTCYBER /
  10th Fleet, AFCYBER / 16th Air Force, MARFORCYBER, SPACECYBER,
  CGCYBER) provide forces under OPCON.

  Sub-unified commands: Cyber National Mission Force (CNMF, elevated
  December 19, 2022) and Joint Force Headquarters - DoD Information
  Network (JFHQ-DODIN). Joint Task Force ARES sits within the CNMF
  posture as the counter-VEO arm.

  CYBERCOM is the operational expression of the Defend Forward /
  Persistent Engagement doctrine articulated in the 2018 Command
  Vision and codified in successive DoD Cyber Strategies (2018, 2023).
  NSPM-13 (2018) delegated time-sensitive offensive-cyber authority
  from POTUS to SecDef and onward to CYBERCOM, enabling the
  operational tempo behind the IRA disruption (2018), Trickbot
  disruption (2020), Hunt Forward program (2018–), and KV-Botnet
  disruption (2023–24, FBI-led with CYBERCOM coordination).
