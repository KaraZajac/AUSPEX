mission: |
  Command and control for defense of the DoD Information Network
  (DoDIN). Synchronizes the work of the 68 Cyber Protection Teams and
  service-component defensive cyber forces.
summary: |
  Sub-unified command under USCYBERCOM, established January 2015.
  Responsible for the defensive mission against intrusions into DoD
  networks and systems. Operates the Cyber Protection Teams (CPTs)
  of the Cyber Mission Force and coordinates with DISA and the service
  cyber components.

  Operationally distinct from the CNMF: CNMF defends the nation in
  cyberspace (homeland CI, election infrastructure, partner networks
  via Hunt Forward); JFHQ-DODIN defends DoD networks themselves.
  Events tagged to JFHQ-DODIN in this atlas are predominantly
  defensive-mission events and are sparse in the public record.
