mission: |
  NSA's offensive computer network exploitation arm. Title 50 SIGINT
  collection via remote and close-access exploitation of foreign
  networks, endpoints, and devices.
summary: |
  Founded in 1997 inside NSA's Signals Intelligence Directorate as the
  Office of Tailored Access Operations, designator S32. Headquartered
  at Fort Meade with regional Cryptologic Centers in Hawaii, Georgia,
  Texas, and Colorado. Sub-components publicly documented via Snowden /
  Der Spiegel (2013) include the Remote Operations Center (ROC, S321,
  ~600 staff), Access Technologies Operations (ATO, physical
  interdiction), Data Network Technologies Branch (DNT, tool
  development), Telecommunications Network Technologies (TNT), Mission
  Infrastructure Technologies (MIT, C2), and the Advanced/Access
  Network Technology (ANT) Division — the latter producing the leaked
  50-page ANT catalog of hardware/firmware implants (COTTONMOUTH,
  JETPLOW, FEEDTROUGH, HALLUXWATER, etc.).

  Post-2013 NSA reorganizations folded TAO into the Computer Network
  Operations Directorate / Directorate of Operations and the
  parallel Cybersecurity Directorate stood up in 2019. The
  post-reorganization organizational chart is not fully public; this
  service entry should be treated as the canonical reference for the
  *function* (offensive CNE in service of SIGINT) regardless of which
  three-letter rebrand currently houses it.

  The 2016–17 Shadow Brokers leak dumped a substantial portion of
  TAO's 2007–2013 toolkit (FuzzBunch, DanderSpritz, EternalBlue,
  DoublePulsar, EternalRomance), corroborating Kaspersky's 2015
  Equation Group attribution. The toolkit exposed there is presumed
  retired and rotated; current tradecraft is opaque.
