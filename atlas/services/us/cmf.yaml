active_since: 2012-01-01
active_until: null
mission: |
  Logical force-presentation structure under USCYBERCOM. Combat
  Mission Teams (CMTs), Cyber Protection Teams (CPTs), National
  Mission Teams (NMTs), Combat Support Teams (CSTs), and National
  Support Teams (NSTs).
summary: |
  Force-presentation model rather than a discrete service. Established
  in 2012; full operating capability declared May 17, 2018 at 133
  teams. Approved expansion to ~147 teams in FY24 budget.

  Team type composition:
    - **Cyber Combat Mission Teams (CMTs)** — 27 teams aligned to
      geographic combatant commands; execute offensive operations in
      support of CCDR campaigns.
    - **Cyber Protection Teams (CPTs)** — 68 teams; defend the DoD
      Information Network (DoDIN) under JFHQ-DODIN.
    - **Cyber National Mission Teams (NMTs)** — 13 teams under the
      CNMF; defend the homeland in cyberspace; execute Hunt Forward
      and named overt operations.
    - **Cyber Support Teams (CSTs, NSTs)** — analytic and planning
      support to CMTs and NMTs.

  Service contributions (under OPCON to CYBERCOM):
    - ARCYBER / 780th MI Brigade (Army, Fort Meade and Fort Gordon)
    - FLTCYBER / 10th Fleet (Navy, Fort Meade)
    - AFCYBER / 16th Air Force (Air Force, Lackland)
    - MARFORCYBER (Marines, Fort Meade)
    - SPACECYBER (Space Force, newer component)
    - CGCYBER (Coast Guard, supporting homeland mission)

  The CMF is the unit-of-record for most events tagged to USCYBERCOM
  in this atlas; specific team composition for named operations is
  rarely public.
