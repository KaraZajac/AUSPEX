mission: |
  Close-access SIGINT — covert insertion of collection equipment in
  diplomatic premises and difficult-access targets. Joint CIA + NSA
  program with rotating leadership.
summary: |
  Joint CIA/NSA black-budget program headquartered in Beltsville,
  Maryland, with leadership rotating between the two parent agencies.
  STATEROOM is the cover name for embassy-rooftop collection
  facilities; SCS operates in dozens of US diplomatic posts worldwide.

  Operations publicly attributed in the Snowden 2013 documents include
  Chancellor Angela Merkel's mobile communications (2002–2013, via US
  embassy Berlin), monitoring of EU institutions in Brussels, the
  Brazilian presidency under Dilma Rousseff, and UN HQ New York. James
  Bamford's *Body of Secrets* and the Intercept's SIDtoday releases
  ("SCS and Executive Protection," "State of Covert Collection")
  provide additional documentary corroboration.

  Never officially acknowledged. Distinct from NSA TAO (remote
  exploitation) and from CIA CCI (covert-action cyber); SCS is a
  HUMINT-adjacent close-access SIGINT program.
sources:
