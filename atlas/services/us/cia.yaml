mission: |
  US foreign intelligence and covert action (Title 50). Cyber
  capabilities concentrated in the Center for Cyber Intelligence
  (CCI / EDG) under the Directorate of Digital Innovation, and in the
  joint CIA/NSA Special Collection Service (SCS / F6) close-access
  program.
summary: |
  Established by the National Security Act of 1947. Cyber-relevant
  components include the Center for Cyber Intelligence (CCI / EDG)
  under DDI, the Information Operations Center (IOC, founded 1996),
  and the joint CIA/NSA Special Collection Service (SCS / F6).

  CIA cyber operations are conducted under Title 50 covert-action
  authority (50 U.S.C. §3093) with presidential finding and Gang-of-
  Eight or full intelligence-committee notification — a distinct legal
  posture from NSA's Title 50 SIGINT or CYBERCOM's Title 10 military
  cyber. This is the operational basis for CIA cyber tooling supporting
  named covert-action programs.
