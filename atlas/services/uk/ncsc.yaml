mission: |
  Public-facing UK national cyber-defence authority. Threat
  intelligence, incident response, sectoral guidance, vulnerability
  disclosure, and co-publication of Five Eyes joint advisories.
summary: |
  Established 3 October 2016 as a unified national cyber-defence
  authority inside GCHQ, consolidating CESG (the historic information-
  assurance arm of GCHQ), CERT-UK, the Centre for the Protection of
  National Infrastructure's cyber function, and the Centre for Cyber
  Assessment. Headquartered at Nova South, Victoria, London; led by a
  Chief Executive who is a senior GCHQ officer.

  Programmatic focus: the Active Cyber Defence (ACD) programme
  (Protective DNS, Web Check, Mail Check, Takedown Service), the
  Cyber Assessment Framework (NIS Regulations implementation), the
  Cyber Security Information Sharing Partnership (CiSP), and an
  annual review of incident response volumes and posture. NCSC is
  the standard UK co-signer of Five Eyes joint advisories — APT28,
  APT29, Volt Typhoon (May 2023), Snake / Turla (May 2023),
  AA25-* series.

  Note on attribution voice: NCSC publishes attribution under the
  UK government's name (often jointly with the FCDO when calling
  out a state); GCHQ-the-collector and NCSC-the-attributor are the
  same legal entity but distinct public faces.
