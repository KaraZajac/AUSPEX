mission: |
  UK foreign human intelligence (HUMINT) and covert action. Cyber
  role is limited and largely supporting the National Cyber Force
  joint posture; operates under the Intelligence Services Act 1994
  and reports to the Foreign Secretary.
summary: |
  Founded as the Foreign Section of the Secret Service Bureau in
  October 1909 (under Mansfield Cumming, the original "C"); formally
  separated and named SIS during the inter-war period. Headquartered
  at Vauxhall Cross, London since 1994. Acknowledged publicly only
  in 1994 with the Intelligence Services Act.

  SIS is included in the AUSPEX atlas for completeness; its public
  cyber footprint is much smaller than GCHQ's. Known contributions
  are to the joint posture under the NCF (technical-officer secondments
  and target-development) and to HUMINT support of cyber operations
  (recruitment of access agents at target organisations). The 2021
  public speech by Chief Richard Moore ("C's speech at IISS") openly
  named digital adversaries — China, Russia, Iran, terrorism — and
  acknowledged SIS's adaptation to the digital environment without
  detailing operational programmes.
