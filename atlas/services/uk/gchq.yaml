mission: |
  UK signals intelligence, communications security, and (since 2016)
  national-level cyber defence via the NCSC. Co-parent of the National
  Cyber Force (offensive cyber) with MoD since 2020. Senior Five Eyes
  / UKUSA partner.
summary: |
  Founded in 1919 as the Government Code and Cypher School (GC&CS),
  renamed GCHQ in 1946 and headquartered at Cheltenham (the "Doughnut"
  since 2003). GCHQ is a non-ministerial department reporting to the
  Foreign Secretary and operating under the Intelligence Services Act
  1994 and the Investigatory Powers Act 2016.

  Three principal directorates: signals intelligence (the historic
  core, with collection programmes TEMPORA, MUSCULAR and others
  disclosed in the 2013 Snowden archive); cyber, anchored by the
  National Cyber Security Centre (NCSC) stood up October 2016 as the
  public-facing defensive arm; and the National Cyber Force (NCF),
  the joint MoD-GCHQ offensive-cyber organisation announced November
  2020. The CNE (Computer Network Exploitation) and JTRIG (Joint
  Threat Research Intelligence Group) capabilities documented in the
  Snowden archive sit on the offensive side.

  Operationally, GCHQ is the most public Five Eyes partner outside
  NSA: it is the sole non-US member of UKUSA at sovereign equity, the
  publishing voice of the joint Five Eyes advisory series (with CISA,
  FBI, NSA, ACSC, CCCS, GCSB-NZ), and the principal UK-government
  interlocutor with vendor threat intelligence.
