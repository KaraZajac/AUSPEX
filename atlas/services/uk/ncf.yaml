mission: |
  UK joint offensive cyber capability. Stood up to "disrupt, deny,
  degrade and contest" adversary capabilities below the threshold of
  armed conflict. Joint command relationship between GCHQ and the
  Ministry of Defence; permanent headquarters at Samlesbury,
  Lancashire (announced 2021).
summary: |
  Announced publicly by Prime Minister Boris Johnson on 19 November
  2020 alongside the Integrated Review preparation; reaches FOC over
  multi-year build. Joint command between GCHQ and MoD: personnel
  drawn from GCHQ, the UK armed forces (including the former Joint
  Forces Cyber Group), the Secret Intelligence Service (limited),
  and Dstl (Defence Science and Technology Laboratory). The MoD's
  6th Division provides much of the military element; GCHQ provides
  the technical and infrastructure backbone.

  Doctrine published in the April 2023 paper "Responsible Cyber
  Power in Practice" — the first published operational doctrine for
  offensive cyber by any state. Articulates: (1) cognitive-effect
  framing (operations targeting decision-making, not infrastructure
  destruction); (2) accountability under UK law; (3) precision and
  calibration; (4) operations below the armed-conflict threshold.
  Named focus areas: counter-terrorism, counter-state, counter-
  serious-crime (including ransomware), and protection of military
  operations.

  Public operational footprint is limited: the NCF acknowledges
  having "conducted hundreds of operations" since stand-up without
  naming specific targets; some involvement in Daesh / ISIS online
  presence disruption (continuing from prior MoD Op GLOWING SYMPHONY
  partner activity) is publicly hinted but not detailed.
