mission: |
  UK Ministry of Defence joint command responsible for cyber,
  intelligence, information, space, and special operations as
  cross-domain enablers for the armed forces. Houses the military
  contribution to the National Cyber Force and the Defence Cyber
  Organisation.
summary: |
  Established 5 December 2019 as the renaming and re-mission of
  Joint Forces Command (JFC, 2012–2019). Commanded by a four-star
  officer (Director General Strategic Command from 2024). Comprises
  Defence Intelligence, Defence Digital, the Defence Cyber
  Organisation (DCO), the UK Space Command (until separation), and
  contributions to the National Cyber Force.

  The Joint Forces Cyber Group (JFCyG, stood up 2013 under JFC)
  provided much of the military offensive-cyber capability that
  was folded into the NCF in 2020. The Defence Cyber Operations
  Group provides defensive and force-protection cyber for MoD
  networks. The 13th Signal Regiment (Army), the Maritime Cyber
  Centre (Navy), and 591 Signal Unit (RAF) supply service-level
  cyber forces under OPCON.

  AUSPEX uses this service entry for MoD military-cyber events that
  pre-date the 2020 NCF stand-up and for force-protection / defensive
  posture; offensive cyber from 2020 onwards is tagged to uk/ncf.
