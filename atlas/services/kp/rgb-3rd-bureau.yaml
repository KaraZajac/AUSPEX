mission: |
  RGB sub-bureau identified by the FBI's February 2025 Bybit IC3
  PSA (PSA250226) as the parent organization of the TraderTraitor
  cryptocurrency-theft cluster. Distinct from Lab 110 (which
  houses Lazarus core, APT38, and Andariel) per the Mandiant
  March 2024 mapping.
summary: |
  The 3rd Bureau is the home of the post-2018 crypto-theft
  specialization that has driven DPRK cyber revenue to record
  levels. FBI explicitly maps TraderTraitor — responsible for
  Ronin (2022), Harmony (2022), Atomic Wallet (2023), DMM Bitcoin
  (2024), and Bybit (2025) — to this bureau. The 3rd Bureau is
  the operational center of the Web3-supply-chain attack pattern
  (Safe{Wallet}/Bybit, Ginco/DMM, 3CX/X_TRADER, JumpCloud) that
  is now the canonical DPRK targeting model for crypto firms.
