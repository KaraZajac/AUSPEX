active_until: null
mission: |
  DPRK domestic counterintelligence, internal political security,
  and external counterintelligence service. Cyber portfolio is
  smaller and more focused than the RGB's: per multiple vendor
  attributions (FireEye/Mandiant 2018, Kaspersky), the
  APT37 / ScarCruft cluster reports to MSS, distinguishing it
  from the RGB-attributed Lazarus / APT38 / Andariel / Kimsuky
  lines.

  NOT to be confused with the PRC Ministry of State Security
  (`cn/mss`).
summary: |
  The DPRK MSS handles regime political security and
  counterintelligence; its cyber tasking is correspondingly
  weighted toward surveillance of defectors, dissidents,
  journalists, and ROK/JP policy entities that bear on the
  regime's narrative-security objectives. The APT37 (ScarCruft /
  Reaper / Group123) cluster is the canonical example. Unlike
  RGB clusters, APT37 has minimal financial-theft activity in
  open-source reporting.

  Open-source reporting on Kimsuky's parent placement has shifted
  over time between MSS and RGB; AUSPEX places Kimsuky under RGB
  per the dossier consensus and 2022+ US/ROK attribution. APT37
  is the clean MSS case.
sources:
  - mandiant/2018-02-20_apt37-reaper-report
  - kaspersky/2016-06-01_scarcruft-research
  - state/2020-04-15_dprk-cyber-threat-advisory
