mission: |
  Contemporary umbrella RGB cyber unit succeeding / expanding
  Bureau 121. Per Mandiant March 2024 mapping, Lab 110 is the
  parent organization for TEMP.Hermit (Lazarus core), APT38
  (financial / SWIFT), and Andariel (militarized targeting +
  ransomware revenue). Distinct from the RGB 3rd Bureau which
  houses TraderTraitor per FBI Bybit PSA.
summary: |
  Lab 110 is the operational designation used in current
  RGB-attributed cyber tasking. The DOJ February 2021
  three-hacker indictment explicitly names "Lab 110" as the
  affiliation of Jon Chang Hyok, Kim Il, and Park Jin Hyok. The
  Mandiant "Not So Lazarus" disaggregation (March 2024) places
  the Lazarus core, APT38, and Andariel under this umbrella.

  Lab 110 is the highest-volume revenue-generating unit in the
  DPRK cyber portfolio in absolute dollar terms, given that
  APT38's SWIFT and crypto-exchange operations sit here.
