id: kp/rgb
nation_state_id: kp
name: Reconnaissance General Bureau
short_name: RGB
aliases:
  - 정찰총국
  - General Bureau of Reconnaissance
parent_service_id: null  # reports directly to the State Affairs Commission / Workers' Party
active_since: 2009-02-01  # reorganization that consolidated cyber under RGB
active_until: null
mission: |
  External clandestine collection, special operations, and
  state-directed cyber operations (Bureau 121 / Lab 110).
  Distinct from MSS (internal) and Office 39 (regime hard-currency).
summary: |
  Consolidated from the General Reconnaissance Bureau, Operations
  Department, and Office 35 in the 2009 reorganization. The cyber
  units (Bureau 121, Lab 110, and their successors) sit within
  RGB. The bureau directs Lazarus and its operational sub-clusters
  (APT38, BlueNoroff, TraderTraitor, Andariel) plus the
  APT37/ScarCruft surveillance line. Kimsuky's parent placement
  has shifted in open-source reporting between RGB and MSS; the
  preponderance of US/ROK attribution since ~2022 places it
  under RGB.

  Treasury and DOJ explicitly name RGB in DPRK cyber-related
  designations, making this entity an `attested` parent for most
  of the DPRK actor inventory.
sources:
  - treasury/2019-09-13_dprk-lazarus-bluenoroff-andariel
  - state/2020-04-15_dprk-cyber-threat-advisory
