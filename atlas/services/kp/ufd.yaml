id: kp/ufd
nation_state_id: kp
name: United Front Department
short_name: UFD
aliases:
  - 통일전선부
  - WPK United Front Department
parent_service_id: null  # WPK Central Committee organ
active_since: 1977-01-01
active_until: null
mission: |
  WPK Central Committee organ responsible for inter-Korean
  relations, diaspora outreach, and ROK political influence
  operations. Open-source reporting attributes a subset of
  Kimsuky tasking — particularly against the Korean diaspora,
  defectors, and ROK political/policy entities — to UFD
  requirements via the RGB.
summary: |
  The UFD is the doctrinal home of DPRK political-influence and
  diaspora operations against South Korea. Its cyber relevance is
  indirect — UFD does not itself run cyber units, but is widely
  reported as the requirements-owner for portions of the
  Kimsuky / APT43 target set (defectors, ROK foreign-policy
  community, Korean diaspora). The Mandiant March 2023 APT43
  report alludes to this tasking pattern, though without naming
  UFD directly.

  AUSPEX retains UFD as a service entity for future
  doctrine-linkage clarity on diaspora-targeting events. Primary
  cyber tasking attribution remains with the RGB.
sources:
  - mandiant/2023-03-28_apt43-report
