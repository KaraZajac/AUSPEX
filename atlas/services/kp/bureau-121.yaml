active_since: 1998-01-01  # earliest publicly cited establishment estimate
active_until: null  # superseded in practice by Lab 110 reorganization; name still appears in older attributions
mission: |
  Historical name for the RGB's principal offensive cyber unit.
  In contemporary reporting, the Bureau 121 designation has been
  largely subsumed by Lab 110 (the expanded successor
  reorganization) per Mandiant's March 2024 "Not So Lazarus"
  mapping. The name persists in older USG attributions and ROK
  reporting.
summary: |
  Long-running RGB cyber unit historically identified as the
  parent of the Lazarus operational core. Operated through PRC
  front companies including Chosun Expo Joint Venture (Dalian)
  and Chosun Baeksul Trading Company (Shenyang). Park Jin Hyok,
  named in the September 2018 DOJ complaint covering Sony,
  WannaCry, and the Bangladesh Bank heist, was identified as a
  Chosun Expo programmer working on behalf of the DPRK
  Reconnaissance General Bureau via Bureau 121 / Lab 110.

  AUSPEX retains Bureau 121 as a distinct entity rather than
  collapsing it into Lab 110 because pre-2018 attributions and
  the Park Jin Hyok complaint use the Bureau 121 designation
  directly; modern attributions should generally route through
  Lab 110.
sources:
