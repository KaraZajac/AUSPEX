mission: |
  WPK Central Committee organ that aggregates regime hard-currency
  revenue from licit and illicit sources and disburses it to
  procurement and elite-loyalty channels. Not a cyber actor per
  se, but the financial back-of-house for proceeds generated by
  RGB cyber-theft and the IT-worker fraud ecosystem.
summary: |
  Office 39 (also Room 39) was established by Kim Jong Il in the
  late 1970s to consolidate the regime's hard-currency revenue
  streams. Historical revenue sources included counterfeiting
  ("supernotes"), narcotics, arms sales, restaurants, and coal
  exports; over the 2010s–2020s cyber-theft and IT-worker fraud
  have progressively become dominant. Treasury sb0302 (March
  2023) sanctioned multiple Office 39-affiliated bankers in the
  UAE, China, and Russia explicitly for laundering DPRK
  cybercrime and IT-worker proceeds.

  AUSPEX models Office 39 as the doctrinal "purpose" downstream
  of every financial-theft event — its existence is what makes
  the strategic-goal attribution "support DPRK WMD program"
  mechanically true. The receiver-of-record for crypto-theft
  proceeds before they reach procurement.
sources:
