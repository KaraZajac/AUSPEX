mission: |
  Principal Pakistani military intelligence service. Cyber tasking
  attributed publicly to ISI through Western and Indian vendor
  reporting on Transparent Tribe / APT36 and the related SideCopy
  cluster runs primarily against Indian military, government, and
  Kashmir-related targets. ISI's Directorate S is widely cited as
  the lead for Afghan operations, with the cyber dimension less
  precisely placed.
summary: |
  Pakistan's military intelligence directorate, headed by a serving
  three-star Army officer reporting to the Chief of Army Staff
  with civilian-government coordination. ISI cyber operations are
  attributed in open source primarily through the Transparent
  Tribe / APT36 cluster and its sibling SideCopy. The precise
  ISI sub-directorate hosting these operations is not publicly
  established; vendor reporting typically attributes to "Pakistani
  state-aligned actors" without sub-organizational granularity.
