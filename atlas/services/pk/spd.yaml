id: pk/spd
nation_state_id: pk
name: Strategic Plans Division
short_name: SPD
aliases:
  - National Command Authority Secretariat
parent_service_id: null  # reports to National Command Authority (Prime Minister chair)
active_since: 2000-02-01
active_until: null
mission: |
  Secretariat of Pakistan's National Command Authority and
  custodian of the strategic-deterrence ("full-spectrum
  deterrence") posture. SPD's Security Division is responsible
  for nuclear-program physical and information security; the
  cyber dimension is opaque in open source but the doctrinal
  framing the SPD has articulated since the early 2000s — full-
  spectrum-deterrence, asymmetric posture vs. India — is the
  bureaucratic anchor for Pakistan's asymmetric-cyber posture.
summary: |
  Established in 2000 to manage the strategic-weapons enterprise.
  Headed by a serving three-star military officer. Cyber tasking
  under SPD has not been publicly documented in a manner
  analogous to ISI / Transparent Tribe; SPD is cited in this
  dossier primarily for the doctrinal framing that licenses
  asymmetric-cyber operations across the broader Pakistani
  national-security enterprise.
sources:
  - kidwai/2015_full-spectrum-deterrence-articulation
  - belfer-center/2019_pakistan-nuclear-command-control
