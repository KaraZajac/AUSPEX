id: cn/mps
nation_state_id: cn
name: Ministry of Public Security
short_name: MPS
aliases:
  - 公安部
  - Gonganbu
parent_service_id: null
active_since: 1949-11-01
active_until: null
mission: |
  Domestic policing and internal-security service. Cyber tasking
  is primarily directed against domestic dissidents, Tibetan and
  Uyghur communities, Hong Kong democracy figures, religious
  organizations (Falun Gong), and overseas diaspora networks
  monitored on behalf of internal security.
summary: |
  Distinct from the MSS (civilian foreign intelligence) and the
  PLA cyber services. The MPS contracts the same private-vendor
  ecosystem (i-SOON, Boyusec, etc.) that the MSS uses; the
  February 2024 i-SOON leak documented MPS clientele alongside
  MSS and PLA tasking. Public Western attribution of MPS-specific
  cyber operations is rare relative to MSS / PLA — most published
  indictments target the latter — and Hong Kong democracy
  targeting in the i-SOON leak mixes MPS and MSS tasking signals
  in ways open-source reporting has not cleanly disentangled.
sources:
  - sentinellabs/2024-02-21_isoon-leak
  - unit42/2024-02-22_isoon-data-leaks
