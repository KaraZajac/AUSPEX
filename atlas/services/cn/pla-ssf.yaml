id: cn/pla-ssf
nation_state_id: cn
name: People's Liberation Army Strategic Support Force
short_name: PLA SSF
aliases:
  - 中国人民解放军战略支援部队
  - Strategic Support Force
parent_service_id: null
active_since: 2015-12-31
active_until: 2024-04-19  # dissolved into Aerospace / Cyberspace / Information Support Forces
mission: |
  Integrated information, cyber, space, electronic warfare, and
  psychological operations command. Consolidated the cyber-relevant
  elements of the PLA General Staff Department's 3rd and 4th
  departments (3PLA, 4PLA) in the 2015 PLA structural reforms.
summary: |
  Established 31 December 2015 as part of Xi Jinping's PLA
  structural reform. Absorbed the technical reconnaissance bureaus
  of the 3PLA (incl. Unit 61398 / APT1; Unit 78020 / APT30) and
  the electronic-warfare elements of the 4PLA. The Network Systems
  Department oversaw cyber operations; the 54th Research Institute
  (Equifax operators, indicted 2020) sat within this department.

  Dissolved on 19 April 2024 with cyber, space, and information-
  support functions broken out into three new service-level "arms"
  (Aerospace Force, Cyberspace Force, Information Support Force)
  reporting directly to the Central Military Commission. Most
  pre-2024 PLA cyber attributions are organizationally rooted in
  the SSF Network Systems Department.
