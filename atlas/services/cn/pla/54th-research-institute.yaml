mission: |
  Signals and cyber R&D plus bulk PII collection for HUMINT-vetting
  and counterintelligence purposes.
summary: |
  Sat within the PLA Strategic Support Force Network Systems
  Department. The DOJ Northern District of Georgia indictment of
  February 2020 charged four named 54th RI officers (Wu Zhiyong,
  Wang Qian, Xu Ke, Liu Lei) for the Equifax intrusion, providing
  primary-source attestation that the 54th RI was the operating
  unit. The pairing of bulk-PII theft with OPM-style records
  collection makes the 54th RI a load-bearing component of the
  MCF-aligned HUMINT-enabling collection pipeline.
