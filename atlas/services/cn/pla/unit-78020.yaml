  Second Technical Reconnaissance Bureau under the former Chengdu
  Military Region of the PLA. Attributed by ThreatConnect in 2015
  (naming PLA officer Ge Xing) as the operator of APT30 / Naikon.
  Absorbed into the PLA Strategic Support Force in the 2015 reform
  and subsequently into the Cyberspace Force in April 2024.
