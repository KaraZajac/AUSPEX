name: PLA Unit 61398
short_name: Unit 61398
aliases:
  - 61398部队
  - 2nd Bureau, 3rd Department, PLA General Staff Department
  - 3PLA 2nd Bureau
parent_service_id: cn/pla-ssf  # absorbed into SSF in 2015; CSF after 2024
active_since: 2006-01-01  # earliest Mandiant-documented activity
active_until: null  # personnel reassigned, not disbanded
mission: |
  Industrial and commercial cyber espionage in service of PRC
  economic and military-modernization objectives. The original
  Mandiant-exposed PLA cyber unit; operated APT1 / Comment Crew.
summary: |
  The 2nd Bureau of the 3rd Department of the PLA General Staff
  Department, headquartered in a purpose-built facility in
  Pudong, Shanghai. Exposed by Mandiant's APT1 report
  (February 2013) as the operator of the Comment Crew cluster
  responsible for at least 141 victims across 20 industries from
  2006 onward. Five named PLA officers (Wang Dong, Sun Kailiang,
  Wen Xinyu, Huang Zhenyu, Gu Chunhui) were indicted by the DOJ
  in May 2014 — the first US criminal charges against
  uniformed foreign military officers for cyber espionage.

  Reorganized into the PLA Strategic Support Force in 2015 and,
  in April 2024, into the Cyberspace Force. The APT1 brand became
  effectively dormant after the 2013 exposure, but personnel
  continuity is assessed to have carried into successor SSF / CSF
  clusters.
sources:
  - mandiant/2013-02-19_apt1-report
  - doj/2014-05-19_pla-five-officers-indictment
