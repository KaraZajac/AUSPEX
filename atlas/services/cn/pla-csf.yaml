mission: |
  Military cyber operations, network warfare, and computer network
  defense. One of three new "arms" (Aerospace Force, Cyberspace
  Force, Information Support Force) created when the PLA Strategic
  Support Force was dissolved in April 2024, reporting directly to
  the Central Military Commission.
summary: |
  Successor to the cyber-warfare elements of the PLA Strategic
  Support Force (SSF, 2015–2024), which itself succeeded the
  3rd Department of the General Staff Department (3PLA) and its
  technical-reconnaissance bureaus (e.g., Unit 61398, Unit 78020).
  The April 2024 reorganization elevated cyber to a co-equal
  service-level command and is widely interpreted as the
  operational instantiation of "intelligentized warfare" doctrine:
  cyber, space, electronic warfare, and psychological operations
  as integrated strategic domains.

  The Information Support Force, broken out alongside CSF in the
  same reorganization, handles network-information systems and
  C4ISR; CSF retains offensive and defensive cyber operations.
  Volt Typhoon's pre-positioning posture is consistent with
  PLA tasking under the system-destruction-warfare doctrine
  (体系破击战) executed by CSF.
