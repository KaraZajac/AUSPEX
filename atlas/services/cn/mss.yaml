parent_service_id: null
active_since: 1983-07-01
active_until: null
mission: |
  Civilian foreign intelligence and counterintelligence service.
  Operates a province-level cyber-contractor ecosystem (exposed
  in the 2024 i-SOON leak) that executes operations on tasking
  from MSS provincial bureaus. Distinct from PLA SSF / PLA
  Cyberspace Force (military cyber) and MPS (internal policing).
summary: |
  Replaced the Central Investigation Department in 1983. Operates
  through provincial State Security Departments / Bureaus (e.g.,
  Hainan SSD, Tianjin SSB, Shanghai SSB, Guangdong SSD, Hubei SSD,
  Jiangsu SSD, Sichuan-based bureaus) that task contractor firms —
  Wuhan Xiaoruizhi (APT31), Shanghai Anxun (i-SOON), Chengdu 404
  (APT41), Hainan Xiandun (APT40), Huaying Haitai (APT10), Boyusec
  / Guangzhou Bo Yu (APT3), Sichuan Juxinhe (Salt Typhoon), Beijing
  Integrity Technology (Flax Typhoon), Beijing Huanyu Tianqiong,
  Sichuan Zhixin Ruijie — to conduct cyber operations. The DOJ has
  indicted named MSS officers and contractor employees in the APT3
  (Boyusec, 2017), APT10 (2018), APT40 (2021), and APT31 (2024)
  cases, providing primary-source attestation of MSS direction.

  Cyber tasking aligns predominantly with economic-strategic
  collection (MIC2025-sector IP, foreign trade-secret theft);
  political/counterintelligence collection (diaspora dissidents,
  Tibetan/Uyghur/Hong Kong activists, foreign think tanks); and
  post-2021, telecom and critical-infrastructure pre-positioning
  (Salt Typhoon, Hafnium / Silk Typhoon, Flax Typhoon).

  The February 2024 leak of internal documents from Anxun
  Information Technology Co. Ltd. (i-SOON), a Chengdu-based MSS /
  MPS / PLA contractor, provided the first systematic public view
  of the PRC hacker-for-hire ecosystem and corroborated the
  pattern of MSS provincial-bureau tasking via private front
  companies. SentinelLabs, Unit 42, and BBC/NHK independently
  authenticated the documents.
