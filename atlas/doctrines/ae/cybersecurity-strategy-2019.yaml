official_text_url: null
summary: |
  Published in April 2019, the UAE National Cybersecurity Strategy
  was the first comprehensive federal-level published cybersecurity
  strategy document. Authored under the Telecommunications
  Regulatory Authority (TRA, now TDRA) before the November 2020
  establishment of the Cyber Security Council, which subsequently
  inherited the strategy's stewardship.

  Five pillars per published summaries (the full English text is
  not stably hosted; AUSPEX flags the official_text_url as null
  and uses the published government summaries):
    - Cybersecurity governance and federal coordination.
    - Critical-national-infrastructure protection.
    - National cybersecurity capability development (workforce,
      research, ecosystem).
    - International cybersecurity cooperation.
    - Cybercrime and active-defence response.

  The strategy is defensive-resilience-and-digital-economy framing
  on its face; it does not codify or acknowledge offensive cyber
  capability. AUSPEX uses it as the canonical UAE-published cyber
  doctrine document but treats the operational record (Stealth
  Falcon, Project Raven, Karma, Pegasus customer-state activity)
  as outside its stated scope.
cyber_relevance: |
  Doctrine label for UAE-state-attributed defensive operations and
  CSC-coordinated activity from April 2019 onward. Not the
  appropriate label for offensive-cyber events (use
  procurement-led-capability and regime-protection-surveillance
  doctrine entries for those).
pillars:
  - id: ae/ncs-2019/governance
    name: Cybersecurity governance and federal coordination
    summary: |
      Establishment of federal cybersecurity governance
      mechanisms; precursor to the November 2020 CSC stand-up.
  - id: ae/ncs-2019/cni-protection
    name: Critical national infrastructure protection
    summary: |
      Defensive posture for UAE CNI sectors (energy, finance,
      government services, transport, water).
  - id: ae/ncs-2019/capability-development
    name: National cybersecurity capability development
    summary: |
      Workforce pipeline, academic-sector research investment,
      domestic cybersecurity industry development (alongside
      the DarkMatter / EDGE Group commercial layer).
  - id: ae/ncs-2019/international-cooperation
    name: International cybersecurity cooperation
    summary: |
      Bilateral and multilateral cybersecurity cooperation;
      from 2020 onward, an Israel-cooperation track under the
      Abraham Accords.
  - id: ae/ncs-2019/cybercrime-active-defence
    name: Cybercrime and active defence
    summary: |
      Federal-level cybercrime response and "active defence"
      framing; AUSPEX flags the active-defence language as
      open to interpretation given the broader UAE operational
      record but the published doctrine remains defensive on
      its face.
sources:
