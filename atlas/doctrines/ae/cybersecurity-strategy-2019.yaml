id: ae/ncs-2019
kind: strategy
nation_state_id: ae
name: UAE National Cybersecurity Strategy 2019
short_name: NCS 2019
issued_by: Telecommunications Regulatory Authority (TRA) / UAE Government
issued_on: 2019-06-23  # corrected 2026-06-30 from a 2019-04-01 placeholder: the TRA/TDRA launched the NCS on 23 June 2019 (verified vs the on-disk PDF + source record)
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: "https://tdra.gov.ae/userfiles/assets/Lw3seRUaIMd.pdf"  # backfilled 2026-06-30 (TDRA-hosted PDF; snapshotted as source u-ae/national-cybersecurity-strategy-2019)
summary: |
  Launched on 23 June 2019 by the Telecommunications Regulatory
  Authority (TRA, now TDRA), the UAE National Cybersecurity Strategy
  was the first comprehensive federal-level published cybersecurity
  strategy document. Stewardship subsequently passed to the Cyber
  Security Council established in November 2020.

  The strategy mobilizes the ecosystem to deliver ~60 initiatives
  across five pillars (verbatim from the official PDF; corrected
  2026-06-30 against an earlier fabricated pillar list):
    - Cybersecurity laws & regulations.
    - Vibrant cybersecurity ecosystem.
    - National Cyber Incident Response plan.
    - Critical Information Infrastructure Protection (CIIP).
    - Partnerships (public sector, private sector, academia,
      international consortiums).

  The strategy is defensive-resilience-and-digital-economy framing
  on its face; it does not codify or acknowledge offensive cyber
  capability. AUSPEX uses it as the canonical UAE-published cyber
  doctrine document but treats the operational record (Stealth
  Falcon, Project Raven, Karma, Pegasus customer-state activity)
  as outside its stated scope.
cyber_relevance: |
  Doctrine label for UAE-state-attributed defensive operations and
  CSC-coordinated activity from April 2019 onward. Not the
  appropriate label for offensive-cyber events (use
  procurement-led-capability and regime-protection-surveillance
  doctrine entries for those).
pillars:
  - id: ae/ncs-2019/laws-regulations
    name: Cybersecurity laws & regulations
    summary: |
      Designing a comprehensive cybersecurity legal and regulatory
      framework — addressing all types of cybercrime and securing
      existing and emerging technologies.
  - id: ae/ncs-2019/vibrant-ecosystem
    name: Vibrant cybersecurity ecosystem
    summary: |
      Foster a vibrant ecosystem: protect and support SMEs, back
      startups and cybersecurity R&D, develop national cybersecurity
      capabilities and a world-class workforce, and drive citizen
      cybersecurity awareness.
  - id: ae/ncs-2019/incident-response
    name: National Cyber Incident Response plan
    summary: |
      Establish a robust National Cyber Incident Response plan: a
      single point of contact for victims of cyber incidents, a
      standardized severity-assessment and agency-mobilization plan,
      and cross-agency information sharing.
  - id: ae/ncs-2019/ciip
    name: Critical Information Infrastructure Protection (CIIP)
    summary: |
      Identify the UAE's critical information-infrastructure assets,
      establish world-class risk-management standards, and create
      robust processes for reporting, compliance, and response.
  - id: ae/ncs-2019/partnerships
    name: Partnerships
    summary: |
      Partnerships as a core enabler — across the public sector,
      private sector, academia, and international consortiums — to
      jointly achieve national cybersecurity goals.
sources:
  - u-ae/national-cybersecurity-strategy-2019
