summary: |
  Inferred operational doctrine reconstructed from the consistent
  UAE operational record 2012 onward of acquiring offensive cyber
  capability through external channels rather than building it
  indigenously inside SIA / NESA. The pattern is structurally
  distinctive in the AUSPEX corpus and is what justifies a
  separate doctrine entry rather than a generic "espionage"
  framing.

  Documented procurement channels:
    - **Israeli commercial-spyware vendors.** UAE is one of the
      longest-running NSO Group Pegasus customer states (Citizen
      Lab tracked UAE Pegasus operator infrastructure as Pegasus-1
      / Pegasus-2 / Pegasus-3 from 2016 onward, with continuing
      attribution through the 2021 Pegasus Project). Citizen Lab
      has separately documented Cytrox / Intellexa Predator
      indicators consistent with UAE operator presence.
    - **US contractor personnel (Project Raven).** Reuters'
      January 30 2019 investigation documented the recruitment of
      ex-NSA Tailored Access Operations personnel through
      CyberPoint and then directly into DarkMatter to staff
      offensive operations against UAE state-defined targets.
    - **Domestic absorptive layer.** DarkMatter (2014–) and Beacon
      Red (2018–) function as the UAE-domestic vendor stack
      hosting the imported capability; EDGE Group as the wider
      state-defense conglomerate; Sirar / DigitalX as adjacent
      affiliates.

  The procurement-led pattern is what AUSPEX uses to distinguish
  UAE doctrine from indigenous-tradecraft states (Russia, China,
  Iran, DPRK) and from publicly-doctrined offensive-cyber states
  (UK NCF, US). It is the load-bearing analytical frame for
  almost all UAE-attributed cyber events.
cyber_relevance: |
  Primary doctrine label for UAE-attributed offensive operations.
  Tag at `attested` only where a primary government or vendor
  source explicitly named UAE procurement of the specific
  capability (Reuters Project Raven, NSO transparency-report
  customer-state listings); otherwise `strongly_inferred` on the
  procurement framing.
pillars:
  - id: ae/procurement-led-capability/commercial-spyware
    name: Commercial-spyware procurement (NSO, Cytrox, others)
    target_sectors:
      - civil-society/dissident
      - civil-society/ngo
      - media/journalism
      - government/foreign-ministry
    summary: |
      Procurement of mobile-implant capability (Pegasus, Predator)
      and deployment against UAE-government-defined targets:
      domestic dissidents, journalists in exile, regional
      political figures.
  - id: ae/procurement-led-capability/contractor-personnel
    name: Contractor / ex-IC personnel procurement
    target_sectors:
      - government
      - government/foreign-ministry
      - civil-society/dissident
      - media/journalism
    summary: |
      Procurement of operator-talent from Five Eyes IC alumni
      (Project Raven), routed through CyberPoint and DarkMatter.
      Continuing under Beacon Red post-2019 per Reuters and MIT
      Tech Review reporting.
  - id: ae/procurement-led-capability/domestic-vendor-stack
    name: Domestic state-aligned vendor stack
    target_sectors:
      - civil-society/dissident
      - media/journalism
      - government/foreign-ministry
    summary: |
      Domestic absorptive layer: DarkMatter, Beacon Red, and
      EDGE Group affiliates. Functions as the corporate vehicle
      for contractor-personnel-led offensive operations and as
      the recipient for capability transfer from commercial-
      spyware vendors.

