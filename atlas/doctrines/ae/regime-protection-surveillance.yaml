id: ae/regime-protection-surveillance
nation_state_id: ae
name: Regime-Protection Surveillance Doctrine
short_name: AE Regime-Protection
issued_by: inferred from operational pattern; not codified in published UAE doctrine
issued_on: null
status: inferred
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  Inferred operational doctrine reconstructed from the consistent
  UAE-attributed targeting of regime-critical individuals:
  domestic Emirati dissidents, human-rights defenders, journalists
  in exile, lawyers representing political detainees, and family
  members of dissidents abroad. The pattern is documented by
  Citizen Lab in successive disclosures (Stealth Falcon 2016,
  Million Dollar Dissident / Ahmed Mansoor 2016, Pegasus Project
  consortium reporting 2021, and continuing infrastructure
  tracking through 2024) and corroborated by Amnesty International
  Security Lab forensic analyses.

  The UAE 2012 anti-state cybercrime law (Federal Law No. 5 of
  2012, revised 2021) and the broader UAE counter-dissent legal
  architecture provide the domestic legal framing under which
  these operations operate; the international-legal framing for
  the extraterritorial dimension (Mansoor was targeted from UAE
  state-aligned infrastructure while inside the UAE; other
  targets were UAE-origin journalists in exile) is contested.

  AUSPEX records this doctrine factually. State surveillance of
  journalists, dissidents, and human-rights defenders is what it
  is.
cyber_relevance: |
  Primary doctrine label for UAE-attributed targeting of
  individuals (rather than organizations or infrastructure).
  Typically co-occurs with `ae/procurement-led-capability` on
  events involving Pegasus, Predator, or Project Raven /
  Karma operator deployments. Confidence on individual events
  is generally `strongly_inferred` (victim selection is
  unambiguous and consistent with UAE state interest) and
  `attested` where Citizen Lab + Amnesty forensic chain + NSO
  customer-state inference establish UAE operator identity.
pillars:
  - id: ae/regime-protection-surveillance/domestic-dissidents
    name: Domestic Emirati dissidents and human-rights defenders
    target_sectors:
      - civil-society/dissident
      - civil-society/ngo
    summary: |
      Targeting of Emirati activists, lawyers, academics, and
      human-rights defenders inside and outside the UAE. Ahmed
      Mansoor is the canonical case: targeted with Pegasus in
      August 2016 (Citizen Lab + Lookout) and imprisoned in 2017
      on speech-related charges.

  - id: ae/regime-protection-surveillance/journalists-in-exile
    name: Journalists in exile and diaspora media
    target_sectors:
      - media/journalism
      - civil-society/diaspora
    summary: |
      Targeting of journalists who left the UAE or report on UAE
      politics from abroad; includes Stealth Falcon's documented
      targeting of Rori Donaghy (a UK-based journalist covering
      UAE) and subsequent Pegasus deployments against journalists
      identified in the Pegasus Project.

  - id: ae/regime-protection-surveillance/regional-political-targets
    name: Regional political and royal-family targets
    target_sectors:
      - government
      - government
      - civil-society/dissident
    summary: |
      Targeting of regional political figures (Qatari royal family
      during the 2017-2021 blockade, Saudi opposition figures,
      Yemeni political leaders) using procured capability.
      Substantial overlap with Saudi targeting given the
      operational closeness of the two states' IC services in
      this period.

