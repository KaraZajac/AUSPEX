id: ae/digital-economy-protection
kind: strategy
nation_state_id: ae
name: Digital-Economy Resilience and CNI Protection
short_name: AE Digital-Economy
issued_by: Cyber Security Council / UAE Government
issued_on: 2020-11-04
status: active
superseded_by_id: null
inherits_from_ids:
  - ae/ncs-2019
official_text_url: null
summary: |
  Defensive-doctrine label corresponding to the Cyber Security
  Council's published mandate from November 2020 onward: protect
  the UAE's digital-economy infrastructure (financial services,
  AI / data-center sector, smart-city deployments, energy / CNI
  systems) and serve as the federal coordinator for cyber-incident
  response.

  This is the doctrine entry under which to tag UAE defensive
  operations, CSC public statements, advisory publications by
  aeCERT, and the international cybersecurity-cooperation track
  on the defensive side. It does not cover offensive operations
  (those tag to procurement-led-capability and regime-protection-
  surveillance) and is not the appropriate label for events with
  victim-state-UAE framings where the attacker is foreign (those
  events tag to the attacking-state doctrine).

  AUSPEX uses this label to surface CSC's public posture
  separately from the operational record so that downstream
  consumers can see the published-defensive frame next to the
  inferred-offensive frame.
cyber_relevance: |
  Doctrine label for UAE defensive cybersecurity activity and
  public-policy statements from late 2020 onward. Inherits from
  NCS 2019. Not appropriate for offensive operations.
pillars:
  - id: ae/digital-economy-protection/financial-services
    name: Financial-services CNI defence
    target_sectors:
      - finance/banking
    summary: |
      Defensive posture for UAE banking and payments infrastructure.
  - id: ae/digital-economy-protection/ai-data-center
    name: AI and data-center sector resilience
    target_sectors:
      - ict/cloud
    summary: |
      Defensive posture for the UAE's AI strategy and the G42 /
      data-center investment programme.
  - id: ae/digital-economy-protection/cni
    name: Energy, transport, water CNI
    target_sectors:
      - energy
      - transport
      - ics/water
    summary: |
      Defensive posture for traditional CNI sectors.

sources:
  - u-ae/csc-mandate
  - u-ae/national-cybersecurity-strategy-2019
