official_text_url: null
summary: |
  Inferred operational doctrine reconstructed from the UAE's
  pattern of cyber operations against regional adversaries and
  the realignment that followed the 15 September 2020 Abraham
  Accords. Pre-2020 operations concentrated against Iran (UAE
  joining Saudi-led GCC pressure on the Iranian nuclear file),
  Qatar (during the 2017–2021 Saudi-UAE-Bahrain-Egypt blockade
  triggered by the 2017 disinformation operation against Qatar
  News Agency that itself was UAE-attributed by US IC sources to
  the Washington Post), and Yemen (Houthi conflict).

  Post-Abraham-Accords (September 2020) UAE doctrine pivoted to
  open cybersecurity cooperation with Israel — public visits,
  joint training exercises, IDF-affiliated investment in UAE
  cybersecurity firms — without abandoning the pre-existing
  procurement-led offensive posture against the remaining
  regional adversary set (Iran above all).

  AUSPEX uses this doctrine label sparingly: it is most
  appropriate for events where the regional-geopolitical framing
  is the dominant editorial lens (e.g., the 2017 Qatar QNA
  hack-and-leak operation, the 2017–2021 Qatari royal-family
  targeting). For dissident / journalist targeting use
  ae/regime-protection-surveillance instead, even when the
  targets are foreign nationals.
cyber_relevance: |
  Doctrine label for UAE-attributed operations against regional
  adversary states and their political infrastructure. Confidence
  typically `strongly_inferred` because the regional-political
  framing is well-established but rarely the subject of
  attributing-source explicit goal articulation.
pillars:
  - id: ae/regional-influence-realigned/qatar-pre-2021
    name: Qatar political targeting (pre-2021 GCC blockade era)
    target_sectors:
      - government
      - government/foreign-ministry
      - media/journalism
    summary: |
      UAE operations against Qatari state and royal-family
      targets during the 2017–2021 blockade. Canonical anchor
      is the 27 May 2017 Qatar News Agency hack-and-leak
      operation (Washington Post attribution to UAE via US IC).

  - id: ae/regional-influence-realigned/iran-counter
    name: Counter-Iran operations
    target_sectors:
      - government
      - defense
      - energy
    summary: |
      UAE cyber posture against Iranian state, IRGC, and
      Iranian-aligned regional actors. Open-source attribution
      is sparse; most regional anti-Iran cyber activity is
      attributed to Israel-aligned operators (Stuxnet, Predatory
      Sparrow). UAE role is more often inferred from procurement
      / intelligence-sharing than from direct operator
      attribution.

  - id: ae/regional-influence-realigned/post-accords-cooperation
    name: Post-Abraham-Accords cooperation track (defensive)
    target_sectors:
      - government
      - defense
    summary: |
      Open cybersecurity cooperation with Israel post-September
      2020. Defensive-cooperation framing publicly; intelligence-
      sharing track inferred. Not a target-set so much as a
      cooperation framing affecting attribution priors on
      regional operations.

