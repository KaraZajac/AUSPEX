official_text_url: https://www.gov.uk/government/publications/national-cyber-strategy-2022
summary: |
  The current UK overarching cyber strategy. Published 15 December
  2021 (the document carries "2022" in title and operational framing).
  Replaced the 2016 National Cyber Security Strategy and shifted the
  framing from "cyber security" to "cyber power" — a deliberate
  rhetorical move treating cyber as a whole-of-nation strategic
  instrument rather than a narrow defensive function.

  Five pillars: (1) the UK cyber ecosystem (skills, industry,
  research); (2) cyber resilience (Active Cyber Defence at scale,
  the NIS Regulations, sector regulators); (3) technology advantage
  (semiconductors, post-quantum, AI safety); (4) global leadership
  (Tallinn Manual support, norms diplomacy, capacity-building); (5)
  detect, disrupt, deter — the offensive and counter-adversary pillar
  housing the NCF, the NCSC takedown service, and active disruption
  of hostile actor infrastructure.

  Cross-references to the Integrated Review (March 2021) and its
  refresh (March 2023), which frame cyber as one of four "tilts"
  (Indo-Pacific, science and technology, climate, cyber).
cyber_relevance: |
  Principal doctrine label for UK cyber events 2022-onward. Event
  tagging guidance: NCSC defensive actions tag to Pillar 2; NCF
  offensive operations tag to Pillar 5; joint Five Eyes attribution
  events tag to Pillar 4 (global leadership) plus the appropriate
  Five Eyes cross-doctrine.
pillars:
  - id: uk/ncs-2022/ecosystem
    name: Pillar 1 — Strengthening the UK cyber ecosystem
    summary: |
      Skills, workforce, research, and industrial base. Cyber First
      programme, CyberASAP, sectoral skills bootcamps.
  - id: uk/ncs-2022/resilience
    name: Pillar 2 — Building a resilient and prosperous digital UK
    summary: |
      Active Cyber Defence (Protective DNS, Web Check, Mail Check,
      Takedown), NIS Regulations enforcement, sectoral regulator
      coordination, the planned Cyber Security and Resilience Bill.
    target_sectors:
      - critical-infrastructure
      - ict/telecom
      - energy
      - healthcare
      - finance
  - id: uk/ncs-2022/technology
    name: Pillar 3 — Taking the lead in the technologies vital to cyber power
    summary: |
      Semiconductors, AI, post-quantum cryptography, telecoms
      diversification (post-Huawei). Links to the National AI
      Strategy and the £1bn semiconductor strategy (2023).
  - id: uk/ncs-2022/global-leadership
    name: Pillar 4 — Advancing UK global leadership and influence
    summary: |
      Norms diplomacy, capacity-building in partner states, support
      for the UN OEWG cyber process, joint Five Eyes attribution.
  - id: uk/ncs-2022/detect-disrupt-deter
    name: Pillar 5 — Detecting, disrupting and deterring our adversaries
    summary: |
      NCF offensive operations, NCSC takedown service, joint attribution
      announcements, sanctions coordination (OFSI). The offensive
      pillar of the strategy.
    key_terms:
      - cyber power
      - detect disrupt deter
      - National Cyber Force
sources:
