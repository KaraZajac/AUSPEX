summary: |
  The April 2023 paper "Responsible Cyber Power in Practice" —
  published by the NCF and HM Government — is the first formal
  published operational doctrine for offensive cyber by any state.
  Companion to the November 2020 NCF stand-up announcement and the
  March 2021 Integrated Review.

  Four organising principles:
    - **Accountable.** Operations conducted under UK law (Intelligence
      Services Act 1994 §7 authorisations, Investigatory Powers Act
      2016 equipment-interference warrants) with ministerial sign-off.
    - **Precise.** Targeting confined to specific adversary individuals
      / systems / decision processes, not generalised population
      effects.
    - **Calibrated.** Effects scaled to political context; preference
      for cognitive-effect operations (undermining adversary confidence,
      decision-making, capability to act) over destructive operations.
    - **Lawful.** Under international law including the law of armed
      conflict where applicable; under UK domestic law in all cases.

  Doctrine of cognitive effect: NCF explicitly distinguishes its
  posture from cyber operations framed around infrastructure
  destruction or maximalist effects. Named focus areas: counter-
  terrorism (Daesh / ISIS online presence disruption), counter-state
  (Russia, China, Iran, DPRK), counter-serious-crime (ransomware,
  CSAM), and force-protection for military operations.

  Cross-references the NCS 2022 Pillar 5 (detect, disrupt, deter)
  and the Integrated Review's framing of the UK as a "responsible
  cyber power."
cyber_relevance: |
  Doctrine label for NCF operations 2020 onward. Public operational
  footprint is sparse: NCF has acknowledged "hundreds of operations"
  in aggregate without per-operation attribution. Tag events to this
  doctrine where the NCF is publicly named as the operator (rare).
