official_text_url: https://www.gov.uk/government/publications/national-cyber-security-strategy-2016-to-2021
summary: |
  The 2016–2021 strategy that stood up the NCSC inside GCHQ
  (3 October 2016, two weeks before strategy publication) and
  committed £1.9bn to the UK cyber programme. Built around three
  outcomes: "defend, deter, develop." Predecessor doctrinal
  framing was the 2011 Cyber Security Strategy (£650m programme),
  which AUSPEX does not track as a separate entry; the 2016 strategy
  is the load-bearing modern reference.

  Programmatic legacy:
    - Active Cyber Defence Programme (Protective DNS, Web Check,
      Mail Check, the Takedown Service) — operationalised 2017
      onward under NCSC.
    - CyberFirst skills programme.
    - The NIS Regulations 2018 implementing the EU NIS Directive.
    - The annual NCSC Annual Review (first published 2017).

  Formally superseded December 2021 by the National Cyber Strategy
  2022 (which re-framed defensive-only "cyber security" as offensive-
  inclusive "cyber power"). Most operational programmes continue
  under NCS 2022 Pillar 2.
cyber_relevance: |
  Principal doctrine label for UK cyber events 2016 – December 2021.
  Operation Socialist / Belgacom and Regin / WARRIORPRIDE pre-date
  this strategy by years; tag the 2016-2021 NCSC operational era to
  this doctrine.
pillars:
  - id: uk/ncs-2016/defend
    name: Defend
    summary: |
      Build national-scale defensive capability via NCSC and the
      Active Cyber Defence Programme.
  - id: uk/ncs-2016/deter
    name: Deter
    summary: |
      Hostile-actor disruption, sanctions coordination, attribution
      announcements (NCSC's October 2018 GRU calling-out is the
      canonical case).
  - id: uk/ncs-2016/develop
    name: Develop
    summary: |
      Skills, industry, research base.
