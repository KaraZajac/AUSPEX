summary: |
  The UK leg of the UKUSA Agreement (5 March 1946) and the SIGINT
  cooperation framework it created with the US, joined progressively
  by Canada (1948), Australia and New Zealand (1956). The framework
  divides global SIGINT collection responsibilities geographically
  and shares processing and reporting under common dissemination
  rules.

  For the UK specifically: GCHQ is the sovereign-equity non-US
  partner — the only Five Eyes partner with capability and access
  comparable in scope to NSA's. Operational expressions include
  the TEMPORA bulk cable-tap programme (disclosed 2013), the Cable
  & Wireless / Vodafone Cable partnerships disclosed in the
  Snowden archive, the joint Regin / WARRIORPRIDE platform with
  NSA, Operation Socialist (GCHQ-led, NSA-benefiting), and the
  long-running joint advisory series with CISA, FBI, NSA, ACSC,
  CCCS, GCSB-NZ.

  The UK Investigatory Powers Tribunal ruled in February 2015 that
  GCHQ's prior receipt of bulk Five Eyes intelligence had been
  unlawful for years (pre-disclosure); IPT then ruled the
  arrangements lawful from disclosure forward. This is the most
  significant domestic UK legal reckoning with Five Eyes.

  This is the UK-side companion to us/five-eyes; the two doctrines
  co-attest the same partnership from each member's perspective.
cyber_relevance: |
  Principal doctrine label for joint UK-US (and broader Five Eyes)
  cyber events. Event tagging guidance: Operation Socialist, Regin
  / WARRIORPRIDE, TEMPORA, the joint AA-series advisories, and
  major Snowden disclosures all tag here.
