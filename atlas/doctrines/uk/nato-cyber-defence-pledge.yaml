summary: |
  The Cyber Defence Pledge signed at the NATO Warsaw Summit
  (8–9 July 2016) committed Allies to strengthen national cyber
  defences as a matter of priority. The UK contribution is
  significant because (a) the UK is one of the few Allies that
  declared sovereign offensive cyber capability available to NATO
  (announced at the December 2018 NATO defence ministerial); and
  (b) the NCSC and NCF are recurring UK contributions to NATO
  cyber exercises (Locked Shields, Cyber Coalition) and to the
  NATO Cooperative Cyber Defence Centre of Excellence (CCDCOE,
  Tallinn).

  Reaffirmed at the Vilnius Summit (July 2023) which adopted the
  new Concept for Cyber Defence and a Virtual Cyber Incident
  Response Capability (VCISC). NATO's recognition of cyberspace as
  an operational domain (Warsaw 2016) underpins the entire pledge
  framework.

  This doctrine entry exists in the UK atlas for tagging joint NATO
  cyber-defence events where UK contribution is publicly named.
cyber_relevance: |
  Cross-doctrine tag for UK participation in NATO cyber exercises
  (Locked Shields, Cyber Coalition), UK personnel and capability
  contributions to NATO operations, and joint attribution
  statements with NATO Allies (e.g., the October 2018 OPCW /
  GRU disruption).
