id: kp/byungjin
nation_state_id: kp
name: Byungjin
short_name: Byungjin
issued_by: Workers' Party of Korea / Kim Jong Un
issued_on: 2013-03-31
status: superseded
superseded_by_id: kp/8th-congress-defense-plan
inherits_from_ids:
  - kp/songun
official_text_url: null  # KCNA / Rodong Sinmun coverage only; no single canonical text
summary: |
  Adopted at the March 2013 plenary as the "byungjin line" —
  parallel development of nuclear weapons and the economy. Replaced
  the Songun (military-first) line as the regime's organizing
  framework. Kim Jong Un declared byungjin formally complete at the
  April 2018 3rd Plenum of the 7th Central Committee on the grounds
  that the nuclear deterrent had been achieved, pivoting nominal
  priority to the economy.

  Operationally, byungjin remains the framework through which
  ongoing weapons-program funding requirements are justified.
  Treasury and FBI press releases attributing cyber-enabled crypto
  theft to DPRK actors routinely cite "support for the DPRK's
  weapons of mass destruction and ballistic missile programs" —
  language that points squarely at the byungjin / successor
  defense-plan revenue logic.
cyber_relevance: |
  Byungjin is the principal "why" for the DPRK's distinctive cyber
  pillar: hard-currency revenue generation in service of the
  weapons program. The Bangladesh Bank, Sony, WannaCry, and the
  long crypto-theft series (Ronin, Harmony, Atomic Wallet, DMM,
  Bybit) all serve this pillar.
pillars:
  - id: kp/byungjin/nuclear-modernization
    name: Nuclear & strategic-deterrent modernization
    target_sectors:
      - defense/munitions
      - aerospace/space
    summary: |
      The "nuclear" half of byungjin. Cyber tasking under this
      pillar is collection-oriented: defense contractors, missile
      research, aerospace.
  - id: kp/byungjin/sanctions-evasion-revenue
    name: Sanctions-evasion revenue
    target_sectors:
      - finance/banking
      - finance/swift
      - finance/crypto-exchange
      - finance/defi-bridge
      - finance/crypto-custody
    summary: |
      The "economic" half — operationalized as hard-currency
      generation under sanctions. The most strategically distinctive
      DPRK pillar: nowhere else does cyber theft fund the missile
      program at scale. Treasury actions explicitly attribute the
      Lazarus / APT38 / BlueNoroff / TraderTraitor crypto theft
      campaigns to this revenue function.
    programs:
      - id: kp/byungjin/sanctions-evasion-revenue/it-worker-fraud
        name: DPRK IT worker fraud
        active_period:
          start: 2018-01-01
          end: null
        summary: |
          The fake-remote-worker ecosystem. DPRK IT workers placed
          in Western firms generate salaries (revenue) and create
          insider access (post-termination extortion has become a
          secondary outcome). Treasury sb0416 (May 2024) sanctioned
          the scheme; DOJ unsealed a Tennessee laptop-farm
          indictment (October 2024).

