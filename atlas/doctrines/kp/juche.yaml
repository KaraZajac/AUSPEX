summary: |
  Bedrock political theology of the DPRK regime, first
  articulated by Kim Il Sung in December 1955, codified in the
  1972 Constitution (Article 3) and successive amendments, and
  declared the sole guiding ideology of the WPK in 1980. The
  three operative principles are *jaju* (political-ideological
  independence), *jarip* (economic self-sufficiency), and *jawi*
  (military independence).

  Juche is the ideological permission slip for the entire DPRK
  cyber program. Because it frames the DPRK as the unique
  sovereign master of its own fate, externally imposed sanctions
  are treated not as legitimate constraints to be evaded
  surreptitiously but as imperialist hostility to be defeated by
  any effective means. This frees the regime to industrialize
  cyber theft as a normal organ of state finance.
cyber_relevance: |
  Juche underwrites three operational priors: (1) sanctions
  evasion as legitimate national self-defense (jarip), (2)
  indigenous offensive cyber as a non-imported asymmetric
  capability (jawi), and (3) high tolerance for public attribution
  cost — the DPRK rarely uses false-flag tradecraft because the
  regime treats public attribution of cyber operations as
  politically neutral or even positive.

  AUSPEX uses Juche as the *default* doctrine alignment for
  surveillance operations against defectors, dissidents, and
  diaspora — where the political-security objective is regime
  narrative-defense rather than revenue or strategic-tech
  collection. APT37 operations are the canonical case.
