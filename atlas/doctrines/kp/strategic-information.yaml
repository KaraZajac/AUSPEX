summary: |
  Inferred operational doctrine governing the subset of DPRK
  cyber tasking that serves classic political-intelligence and
  internal-security objectives: surveillance of defectors and
  dissident journalists, collection on inter-Korean and US-DPRK
  diplomatic planning, infiltration of ROK and US Korea-watcher
  think tanks, and pre-emption of dissent. Distinguishes from
  pure regime-narrative-defense (Juche internal security) by its
  focus on adversary policy planning rather than diaspora
  surveillance per se — though target sets overlap heavily.

  APT37 (MSS) is the cleanest internal-security case; Kimsuky
  (RGB, partially UFD-tasked) is the principal expression of the
  strategic-information line. Mandiant's March 2023 APT43 report
  uniquely documented that Kimsuky self-funds through small-scale
  cybercrime to purchase operational infrastructure — a doctrinal
  innovation that decouples espionage tasking from centrally
  allocated budget.
cyber_relevance: |
  This is the lowest-visibility DPRK cyber doctrine in terms of
  discrete event production. Surveillance operations rarely
  manifest as single high-yield incidents; instead they appear
  as continuous low-grade compromise of policy ecosystems. The
  dossier explicitly flags that AUSPEX's event timeline likely
  under-counts these operations.
