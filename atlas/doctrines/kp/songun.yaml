official_text_url: null
summary: |
  First publicly named in Rodong Sinmun on 7 April 1997 under
  Kim Jong Il, Songun elevated the Korean People's Army and the
  intelligence services above the Party in resource priority
  through the late 1990s and 2000s. In late 2021 Kim Jong Un
  publicly replaced Songun with "inmin daejung jeil juui"
  ("people-first politics") as the operative slogan.

  The institutional residue is permanent. The 2009 consolidation
  of cyber units under the RGB occurred under explicit Songun
  logic; the RGB, Bureau 121 / Lab 110, and the rest of the
  military-intel cyber apparatus remain fully intact and
  well-resourced. AUSPEX treats Songun as historically
  explanatory (why the RGB owns DPRK cyber) rather than currently
  operative (it does not generate new tasking).
cyber_relevance: |
  Songun built the institutional pipes that contemporary DPRK
  cyber flows through. Pre-2018 events (Operation Troy 2009, Ten
  Days of Rain 2011, DarkSeoul 2013, Sony 2014) sit doctrinally
  inside Songun's window even where later events sit inside
  Byungjin or the 8th Party Congress plan. Current tasking
  flowing through the same RGB units is best tagged to its
  contemporary doctrine (8th Party Congress plan), not Songun
  itself.
