id: kp/8th-congress-defense-plan
nation_state_id: kp
name: 8th Party Congress Five-Year Defense Plan (2021–2025)
short_name: 8th Congress Plan
issued_by: Workers' Party of Korea / Kim Jong Un
issued_on: 2021-01-09  # date of Kim's report to the 8th Congress
status: active
superseded_by_id: null
inherits_from_ids:
  - kp/byungjin
official_text_url: null  # KCNA English transcript distributed via 38 North / NK News translations
summary: |
  Kim Jong Un's report to the 8th Congress of the Workers' Party
  of Korea (5–12 January 2021, Pyongyang) enumerated 13 strategic
  weapon systems to be developed over a five-year window
  (2021–2025). This is the doctrinal driver of nearly all
  2021–2026 DPRK cyber tasking: every cryptocurrency heist and
  every IT-worker placement directly subsidizes line items on
  this plan, per Treasury's standardized OFAC language about
  "support for the DPRK's WMD and ballistic-missile programs."

  As of January 2026, 38 North and US-IC assessments find
  roughly half of the 13 systems demonstrated by deadline; the
  remainder are extended into a successor program expected to be
  formalized at the 9th Party Congress.
cyber_relevance: |
  This is the single most operationally relevant doctrine for
  AUSPEX's DPRK targeting model. The 13-system list IS the
  procurement requirement that the RGB cyber portfolio is tasked
  to underwrite. Crypto-theft tempo correlates tightly with
  missile-test tempo: 2022, 2023, 2024 and 2025 each saw record
  or near-record annual theft totals in lockstep with accelerating
  test schedules. Defense-contractor intrusions by Andariel
  (warhead miniaturization, submarine quieting, satellite
  payloads, missile-defense penetration) target the *technical*
  dimension of the same list.

  AUSPEX uses this as the default attested doctrine for all
  post-2020 DPRK financial-theft events under OFAC/FBI/CISA
  attribution.
pillars:
  - id: kp/8th-congress-defense-plan/revenue-aggregation
    name: Hard-currency revenue aggregation for the 13-system plan
    target_sectors:
      - finance/crypto-exchange
      - finance/defi-bridge
      - finance/crypto-custody
      - finance/banking
      - finance/swift
      - ict/managed-services
      - ict/software
      - supply-chain
    summary: |
      The financial side of the plan: maximum-tempo aggregation
      of hard currency through crypto-exchange theft, DeFi-bridge
      theft, supply-chain compromise of Web3 vendors, IT-worker
      wage fraud, and (declining since 2020) SWIFT-network bank
      theft. Treasury and FBI consistently attribute the proceeds
      to the WMD / ballistic-missile programs enumerated in this
      doctrine.
    key_terms:
      - TraderTraitor
      - APT38
      - BlueNoroff
      - Lazarus
      - crypto-bridge exploitation
      - Web3 supply chain
    programs:
      - id: kp/8th-congress-defense-plan/revenue-aggregation/it-worker-fraud
        name: DPRK IT worker fraud (8th-Congress revenue stream)
        active_period:
          start: 2018-01-01
          end: null
        summary: |
          The fake-remote-worker ecosystem as a primary revenue
          channel for the 13-system defense plan. Treasury sb0416
          (May 2024) explicitly states the scheme generated ~$800M
          in 2024 to "fund the DPRK's WMD programs." Distinct
          parallel program to the equivalent entry under Byungjin
          (`kp/byungjin/sanctions-evasion-revenue/it-worker-fraud`)
          — same operational activity, doctrinally re-anchored
          under the active post-2021 plan rather than the
          superseded Byungjin frame. AUSPEX tags events to the
          active doctrine.
      - id: kp/8th-congress-defense-plan/revenue-aggregation/crypto-bridge-theft
        name: DeFi bridge and crypto-exchange theft
        active_period:
          start: 2022-01-01  # Ronin Bridge initiates the bridge-theft era
          end: null
        summary: |
          The dominant single revenue channel by absolute dollars.
          Ronin (2022, $625M), Harmony (2022, $100M), Atomic Wallet
          (2023, ~$100M), DMM Bitcoin (2024, $308M), Bybit (2025,
          $1.5B). Treasury and FBI attribution consistently cites
          WMD / ballistic-missile financing. Run primarily by the
          TraderTraitor cluster (RGB 3rd Bureau) with APT38 /
          BlueNoroff in supporting roles.

  - id: kp/8th-congress-defense-plan/strategic-tech-collection
    name: Strategic technology collection for the 13-system plan
    target_sectors:
      - defense/contractor
      - defense/maritime
      - defense/munitions
      - aerospace/defense
      - aerospace/space
      - aerospace/uav
      - government/defense-ministry
      - academic/research-lab
    summary: |
      The technical-intelligence side of the plan: collection
      against ROK / US / JP / Taiwan defense contractors and
      aerospace primes, NASA OIG, US Air Force, submarine-quieting
      and SLBM-relevant naval shipbuilding, satellite payload /
      ground-segment vendors, and hypersonic / missile-defense
      research. The 2024 Rim Jong Hyok (Andariel) indictment is
      the canonical attribution document for this pillar.
    key_terms:
      - Andariel
      - Stonefly
      - Onyx Sleet
      - missile defense
      - SSBN
      - hypersonic
      - reconnaissance satellite
    programs:
      - id: kp/8th-congress-defense-plan/strategic-tech-collection/missile-modernization
        name: Tactical / strategic missile modernization collection
        active_period:
          start: 2021-01-09
          end: null
        summary: |
          Collection requirements tied to the missile-related
          line items in the 13-system list: tactical nuclear
          warheads, super-large hydrogen warheads, solid-fuel
          ICBMs (Hwasong-18/19), MIRV capability, 15,000 km
          range ICBMs, hypersonic glide vehicles (Hwasong-8/16B),
          SLBMs, advanced re-entry / warhead guidance, and
          tactical battlefield nuclear delivery (Hwasan-31).
      - id: kp/8th-congress-defense-plan/strategic-tech-collection/maritime-modernization
        name: Submarine and underwater-system collection
        active_period:
          start: 2021-01-09
          end: null
        summary: |
          Collection tied to the nuclear-powered SSBN program and
          the Haeil underwater nuclear-armed drone — submarine
          quieting, propulsion, and undersea-warfare technology.
          Andariel intrusions into US Naval-adjacent defense
          contractors are the principal observed expression.
      - id: kp/8th-congress-defense-plan/strategic-tech-collection/satellite-and-uav
        name: Reconnaissance satellite and UAV collection
        active_period:
          start: 2021-01-09
          end: null
        summary: |
          Collection tied to military reconnaissance satellites
          (Malligyong-1 orbited Nov 2023) and 5,000 km-radius
          unmanned aerial reconnaissance assets. Targets include
          satellite payload vendors, ground-segment software,
          and aerospace primes; NASA OIG intrusions per the 2024
          Rim Jong Hyok indictment fit this pillar.

