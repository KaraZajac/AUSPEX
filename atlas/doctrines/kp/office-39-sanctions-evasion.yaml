summary: |
  The operative principle that the DPRK's hard-currency
  procurement budget is generated outside the legitimate
  international financial order and aggregated through Office 39
  for disbursement to weapons procurement and elite-loyalty
  channels. Not a published doctrine — reconstructed from
  defector testimony (Ri Jong Ho being canonical), Treasury
  sanctions language, and UN Panel of Experts reporting.

  Historical Office 39 revenue streams (counterfeiting, narcotics,
  arms sales, restaurants, coal exports) have progressively been
  displaced by cyber-theft and IT-worker fraud through the
  2010s–2020s. Treasury sb0302 (March 2023) sanctioned Office
  39-affiliated bankers in the UAE, China, and Russia explicitly
  for laundering DPRK cybercrime and IT-worker proceeds.
cyber_relevance: |
  Office 39 is not a cyber actor but is the doctrinal "purpose"
  downstream of every financial-theft event. Its existence is what
  makes the strategic-goal attribution "support DPRK WMD program"
  mechanically true. AUSPEX uses this doctrine as a secondary tag
  alongside the active 8th Party Congress plan: the former
  describes the aggregation mechanism, the latter describes the
  procurement requirement.

  Sinbad mixer (sanctioned Nov 2023), the PRC-OTC desk laundering
  network, and the Yanbian Silverstar / Volasys Silver Star front
  companies are all observable surface expressions of this
  doctrine.
pillars:
  - id: kp/office-39-sanctions-evasion/laundering-network
    name: Global laundering and front-company network
    target_sectors:
      - finance/crypto-custody
      - finance/banking
    summary: |
      The operational pipework that converts cyber-theft and
      IT-worker proceeds into procurement-usable hard currency.
      Concentrated in PRC border regions (Dandong, Yanbian) and
      Southeast Asia. Mixers (Sinbad, prior to that
      Blender.io / Tornado Cash usage) are a key node;
      PRC-affiliated OTC crypto desks the principal off-ramp.
    key_terms:
      - Sinbad mixer
      - Tornado Cash
      - PRC OTC desks
      - Yanbian Silverstar
      - Volasys Silver Star

