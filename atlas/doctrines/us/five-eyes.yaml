summary: |
  Not a US-only doctrine, but the most important multilateral cyber-
  intelligence partnership the US participates in. AUS/CAN/NZ/UK/US
  share SIGINT, cyber threat intelligence, and (per Snowden documents)
  collection burdens including operations like Belgacom / Operation
  Socialist (GCHQ-led, US-benefiting).

  Joint advisories (CISA + NCSC + ACSC + CCCS + NCSC-NZ) are the
  standard format for major attribution announcements (Volt Typhoon
  May 2023, Salt Typhoon 2024–25). This doctrine entry exists in the
  US atlas for tagging convenience; standalone GCHQ / ASD / CSE / GCSB
  operations may move into separate national subtrees in v0.1.
cyber_relevance: |
  Doctrinal frame for joint-attribution events and partner-led
  operations the US benefits from. Tag-relevant for: Operation
  Socialist (GCHQ, listed under us/ for v0), Regin / WARRIORPRIDE
  (Five Eyes), Volt Typhoon joint disclosure (May 2023).
