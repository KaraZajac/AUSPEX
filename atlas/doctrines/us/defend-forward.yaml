summary: |
  Operational concept articulated in the 2018 DoD Cyber Strategy and
  the parallel CYBERCOM 2018 Command Vision. Defend Forward asserts
  that the United States must "disrupt or halt malicious cyber
  activity at its source, including activity that falls below the
  level of armed conflict." Reaffirmed in the 2023 DoD Cyber Strategy
  as a component of "campaigning."

  The doctrine rejects the prior posture of responding to incidents
  within US networks; instead it pushes US presence into "red space"
  (adversary infrastructure) and "gray space" (third-country
  infrastructure adversaries use) to impose costs and gather
  intelligence. Hunt Forward is the most visible operational
  expression on partner-network territory.
cyber_relevance: |
  Primary doctrinal label for CYBERCOM offensive operations
  2018-onward. Notable events linked: IRA disruption (2018), Trickbot
  pre-2020-election disruption, Hunt Forward deployments (2018–),
  KV-Botnet/Volt Typhoon disruption (2023–24), Iran retaliation 2019,
  Glowing Symphony (proto-Defend-Forward, 2016–).
