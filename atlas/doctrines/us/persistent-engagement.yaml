summary: |
  CYBERCOM's organizing operational concept articulated in the 2018
  Command Vision "Achieve and Maintain Cyberspace Superiority."
  Persistent Engagement asserts that cyberspace is a domain of
  *constant interaction* — that adversaries operate continuously
  below the threshold of armed conflict, and that ceding the
  initiative in this constant contact cedes the terrain.

  Operationally: CYBERCOM must maintain continuous presence and
  contact with adversary cyber forces, integrate intelligence and
  operations seamlessly, and impose costs through that presence.
  Pairs with Defend Forward as the where (forward, in red/gray space)
  to its how (constant, integrated).
cyber_relevance: |
  Doctrinal label for the continuous-contact, cost-imposition framing
  of CYBERCOM operations. The CNMF's VirusTotal overt-attribution
  practice (2018–) operationalizes the cost-imposition aspect; the
  Hunt Forward cadence operationalizes the continuous-contact aspect.
