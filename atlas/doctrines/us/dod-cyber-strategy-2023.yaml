summary: |
  Classified version issued May 2023; unclassified summary published
  September 12, 2023. Supersedes the 2018 DoD Cyber Strategy. Folds
  Defend Forward and Persistent Engagement into the broader DoD
  construct of "campaigning."

  The 2023 strategy is grounded explicitly in real-world experience
  since 2018 — 90+ Hunt Forward-style operations — and acknowledges
  cyber's limited standalone strategic effect outside combined
  campaigns. Healey's "cyber realism" framing (War on the Rocks, Sept
  2023) characterizes this as deterrence by *denial and disruption*
  rather than deterrence by *punishment*.
cyber_relevance: |
  The operational charter for CYBERCOM and the CMF. Pillars 1
  (defend the nation) and 2 (prepare to fight and win) cover the
  Defend Forward / Hunt Forward / Persistent Engagement triad; Pillar
  4 (build enduring advantages) covers force generation, training,
  authorities. Events tagged to this doctrine should be CYBERCOM-
  attributed operations against state-adversary or criminal-services
  infrastructure post-2018.
pillars:
  - id: us/dod-cyber-strategy-2023/defend-the-nation
    name: Pillar 1 — Defend the nation
    summary: |
      Disrupt and degrade adversary capability and intent before it
      reaches the homeland; counter malicious cyber ecosystems
      (cybercrime services, bulletproof hosters, malware developers).
  - id: us/dod-cyber-strategy-2023/prepare-to-fight-and-win
    name: Pillar 2 — Prepare to fight and win the nation's wars
    summary: |
      Integrate cyber into joint warfighting; campaign in cyberspace
      below the threshold of armed conflict.
    target_sectors:
      - government/defense-ministry
      - defense
  - id: us/dod-cyber-strategy-2023/protect-with-allies
    name: Pillar 3 — Protect the cyber domain with allies and partners
    summary: |
      Hunt Forward at partner invitation; build allied capacity;
      Five Eyes joint advisories; sample sharing.
  - id: us/dod-cyber-strategy-2023/build-enduring-advantages
    name: Pillar 4 — Build enduring advantages in cyberspace
    summary: |
      Force generation, CMF growth (133 → 147 teams), authorities,
      training, technology investment.
