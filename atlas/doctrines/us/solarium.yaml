summary: |
  March 2020 final report of the statutory Cyberspace Solarium
  Commission, plus the successor CSC 2.0 advisory body housed at the
  McCrary Institute (Auburn). The single most influential modern US
  cyber-policy blueprint: layered cyber deterrence — shape behavior,
  deny benefits, impose costs — plus structural reforms (ONCD
  creation, CISA empowerment, systemically important entities,
  Bureau of Cyber Statistics, Continuity of the Economy).

  Approximately 79% of 82 recommendations were implemented or in-flight
  by 2024 per CSC 2.0 tracking. The 2025 CSC 2.0 annual report flags
  "unprecedented setbacks" under Trump 2.0 staffing cuts to CISA and
  ONCD — approximately 24% of previously-implemented recommendations
  have lost implemented status.
cyber_relevance: |
  Doctrinal precursor to the NCS 2023 framework. The 2021 NDAA's
  creation of ONCD on Solarium recommendation, CIRCIA, the National
  Cyber Director, and the Joint Cyber Planning Office at CISA are all
  Solarium-traceable. Tag-relevant for structural / governance events
  rather than discrete cyber incidents.
