summary: |
  Annual unclassified IC consensus assessment of the cyber threat
  landscape; modeled as a recurring doctrine document because its
  framing shapes (and reflects) tasking priorities across the IC and
  CYBERCOM. Published annually since 2006; current 2025 edition
  released March 25, 2025.

  The 2025 ATA elevated Salt Typhoon explicitly and reframed PRC
  pre-positioning (Volt Typhoon, Salt Typhoon) as the headline state-
  cyber concern. Threat hierarchy: PRC ("most active and persistent");
  Russia (war-integration capability); Iran (opportunistic destructive
  ops); DPRK (revenue and WMD-support theft).
cyber_relevance: |
  Doctrinal frame for IC consensus on threats. Tag-relevant when an
  event is named or elevated in an ATA — e.g., Salt Typhoon's
  prominence in the 2025 ATA is a doctrinal anchor for related
  events.
