summary: |
  Force-presentation doctrine for USCYBERCOM. Established 2012; FOC
  declared May 17, 2018 at 133 teams; CMF growth from 133 to ~147
  teams approved in FY24 budget; CNMF elevated to sub-unified command
  December 19, 2022.

  Team-type taxonomy:
    - **CMTs** (27 Cyber Combat Mission Teams) — combatant-command
      support, offensive.
    - **CPTs** (68 Cyber Protection Teams) — DoDIN defense under
      JFHQ-DODIN.
    - **NMTs** (13 Cyber National Mission Teams) — under CNMF;
      defend the homeland in cyberspace; run Hunt Forward and named
      operations like the IRA disruption.
    - **CSTs / NSTs** — combat/national support teams (planning,
      analysis).

  Service-component contributions under OPCON to CYBERCOM:
  ARCYBER (Army), FLTCYBER (Navy), AFCYBER (Air Force), MARFORCYBER
  (Marines), SPACECYBER (Space Force), CGCYBER (Coast Guard).
cyber_relevance: |
  Organizational reference; event-tag use is rare (events typically
  tag to the more specific operational doctrines — Defend Forward,
  Hunt Forward — and to the operating actor, the CNMF or JTF-ARES).
  Use this doctrine entry for events where the *force-structure*
  question is load-bearing (CMF growth, FOC declaration).
