summary: |
  A single 4-star wears both hats: Director NSA (Title 50 SIGINT) and
  Commander USCYBERCOM (Title 10 military cyber). The structural
  rationale is speed of intelligence-to-operation. The structural
  critique is concentration of power and mission conflicts between
  SIGINT stealth and operational effect.

  Currently acting under Lt. Gen. Wilfred "Will" Hardy following the
  April 2025 firing of Gen. Tim Haugh. The Trump administration's May
  2025 decision to shelve the prospective separation has bipartisan
  congressional support per the SASC/HASC chairs.

  Reaffirmed in the 2024 Biden review; separation review shelved by
  Trump 2.0 in May 2025.
cyber_relevance: |
  Structural backdrop to virtually every modern US-actor event. Tag-
  relevant when intelligence-to-operation handoff is load-bearing
  (e.g., Hunt Forward sample collection feeding CISA advisories).
