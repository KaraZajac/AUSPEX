official_text_url: https://bidenwhitehouse.archives.gov/wp-content/uploads/2024/01/Securing-the-Open-Source-Software-Ecosystem-OS3I-End-of-Year-Report-MASTERCOPY.pdf
summary: |
  Cross-agency (CISA, DARPA, DHS, NSF, NSA, GSA, OMB) effort to
  address the systemic-risk problem exposed by Log4j (2021) and
  XZ-Utils (2024). Initiated 2022; 2023 RFI; January 2024 end-of-year
  report; August 2024 RFI summary.

  Cyber-relevant pillars: (1) secure federal use of OSS; (2) sustain
  OSS community investment; (3) harmonize SBOM and memory-safe-
  language adoption; (4) align with the CISA OSS Security Roadmap
  (Feb 2024). Twelve activities planned for 2024–25.
cyber_relevance: |
  Defensive industrial-policy doctrine. Tag-relevant for events
  involving systemic OSS-supply-chain risk: Log4Shell (2021),
  XZ-Utils backdoor (2024), and any future supply-chain-via-OSS
  attack patterns.
