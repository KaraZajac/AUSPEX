summary: |
  CYBERCOM's flagship overt operation: the Cyber National Mission
  Force (CNMF) deploys teams (typically 24–40 personnel) at the
  invitation of a partner government to hunt for malicious activity on
  partner networks. By April 2024, Gen. Haugh confirmed 22 missions in
  17 countries in 2023 alone, planning 25 in 2025; cumulatively 60+
  deployments across 28 countries.

  Institutionalized in the CNMF following its December 2022 elevation
  to a sub-unified command. The model: alliance-based persistent
  engagement; intelligence harvest at the source (collect adversary
  tooling on partner networks *before* it reaches US targets);
  deterrence-by-denial signaling.

  Publicly named deployments include Ukraine (2018, December 2021 –
  February 2022 pre-invasion), Estonia (2020), Lithuania (2022, 2023),  # corrected 2026-07-05: real hunts are 2022 (first) + Sep-2023 (second), NOT 2020/2024
  Montenegro (2018, 2019), North Macedonia, Albania (2022, post-Iran
  attack), Latvia (2022, incl. the 2023 US+Canada joint hunt on Latvian
  networks — Canada was the partner, not a host), Croatia (2022),
  Zambia (2024),  # 'Canada (2024)' removed 2026-07-04: no source documents a Canada-HOSTED hunt; it was a garble of the 2023 US+Canada->Latvia op the SOUTHCOM AOR (2024–25, where Chinese malware was found
  on partner networks). [Kenya removed 2026-07-05: the hunt-forward-kenya
  event was DELETED as unsupportable — Kenya appears only in the countryless
  "22 deployments/17 countries" tally, no dedicated press release exists, and
  CYBERCOM's only named African hunt is Zambia.]
cyber_relevance: |
  The dominant doctrinal label for CYBERCOM operations on partner-
  state networks. Hunt Forward deployments typically uncover GRU,
  FSB, MSS, MOIS, or RGB tooling and feed CISA/Five Eyes joint
  advisories. The intelligence harvest underwrites subsequent
  defensive guidance (e.g., HermeticWiper precursors found on
  Ukrainian networks pre-Feb-2022).
