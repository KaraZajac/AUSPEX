summary: |
  The legal scaffolding under every US offensive cyber operation:

    - **Title 10** = DoD military operations (USCYBERCOM, CMF). NDAA
      FY2018 §1633 codified at 10 U.S.C. §394 affirms that military
      cyber operations are "traditional military activities" (TMA) —
      *not* covert action — and thus do not require presidential
      finding or Gang-of-Eight notification.
    - **Title 50** = intelligence community, including (a) covert
      action under 50 U.S.C. §3093 (CIA), which *does* require
      presidential finding and intelligence-committee notification,
      and (b) SIGINT collection (NSA), which is Title 50 but not
      covert action.

  The dual-hat arrangement at Fort Meade lets a single 4-star wear
  both hats; this is the central reason for the long-running "split
  CYBERCOM and NSA" debate (revived 2025, shelved). The framework
  also shapes congressional oversight: CYBERCOM ops go to armed-
  services committees; CIA cyber ops go to intelligence committees;
  NSA SIGINT goes to intelligence committees but without finding.
cyber_relevance: |
  Foundational legal context for every US-actor event in this atlas.
  Events should be tagged to the more specific operational doctrine
  (Defend Forward, NSPM-13, Hunt Forward, etc.) where applicable;
  this doctrine entry exists as the constitutional/statutory backstop
  reference.
