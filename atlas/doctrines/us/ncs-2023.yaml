id: us/ncs-2023
nation_state_id: us
name: National Cybersecurity Strategy (2023)
short_name: NCS 2023
issued_by: The White House (Biden administration, drafted by ONCD)
issued_on: 2023-03-02
status: superseded
superseded_by_id: us/ncs-2026
inherits_from_ids: []
official_text_url: https://bidenwhitehouse.archives.gov/wp-content/uploads/2023/03/National-Cybersecurity-Strategy-2023.pdf
summary: |
  The defining strategic document of the Biden cyber era. Implementation
  Plan v1 (July 13, 2023) listed 65 initiatives; v2 (May 7, 2024)
  expanded to 100 initiatives across 18 agencies. Two structural shifts
  drive the strategy: (1) burden shift onto large capable actors —
  vendors, large infrastructure operators — and (2) longer time-horizon
  investment (post-quantum, zero-trust, OSS sustainment).

  Formally superseded in framing by the Trump March 2026 "Cyber
  Strategy for America" / EO 14306 (June 2025), but most implementation
  initiatives continue. Per AUSPEX editorial rule: events tagged to
  NCS 2023 do NOT automatically roll forward to NCS 2026 — continuity
  of strategic intent across administrations is an analytical judgment,
  not a default.
cyber_relevance: |
  The strategy is the principal "why" for the post-2023 US
  disrupt-and-dismantle tempo (Pillar 2): KV-Botnet takedown
  (2023–24), Treasury sanctions on PRC MSS contractors (Salt Typhoon
  Jan 2025), DOJ-led ransomware infrastructure takedowns (LockBit
  Operation Cronos Feb 2024). Underpins Secure-by-Design (Pillar 3),
  OS3I, the CIRCIA rule, and harmonization efforts.
pillars:
  - id: us/ncs-2023/defend-cii
    name: Pillar 1 — Defend critical infrastructure
    summary: |
      Sector regulators set minimum requirements; CISA coordinates
      sector risk-management agencies; CIRCIA implementation.
    target_sectors:
      - critical-infrastructure
      - ics/water
      - healthcare
      - energy/electric-power/grid-ot
      - finance
  - id: us/ncs-2023/disrupt-dismantle
    name: Pillar 2 — Disrupt and dismantle threat actors
    summary: |
      Sustained offensive tempo; ransomware reframed as a national
      security threat. Operational expression: KV-Botnet takedown,
      LockBit Cronos, OFAC sanctions on PRC contractors, FBI Rewards
      for Justice bounties (Salt Typhoon).
    key_terms:
      - disrupt and dismantle
      - ransomware as national security threat
      - sustained tempo
  - id: us/ncs-2023/shape-market
    name: Pillar 3 — Shape market forces to drive security and resilience
    summary: |
      Liability shift to software producers; safe harbors for those
      meeting Secure-by-Design baselines; SBOM and software-supply-
      chain requirements; the operational expression is Secure-by-
      Design and OS3I.
    key_terms:
      - liability shift
      - secure by design
      - SBOM
  - id: us/ncs-2023/invest-resilient-future
    name: Pillar 4 — Invest in a resilient future
    summary: |
      Post-quantum cryptography migration; zero-trust federal
      architecture; cyber workforce.
  - id: us/ncs-2023/forge-international-partnerships
    name: Pillar 5 — Forge international partnerships
    summary: |
      Counter-Ransomware Initiative; allied capacity-building; joint
      Five Eyes attribution advisories.
sources:
