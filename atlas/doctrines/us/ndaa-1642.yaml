summary: |
  Congressional preauthorization. The National Command Authority
  (POTUS + SecDef) may determine that a state is engaged in a
  systematic campaign of cyberspace operations against the United
  States, and that determination unlocks USCYBERCOM's authority to
  "disrupt, defeat, and deter" such activity "in foreign cyberspace
  short of armed conflict."

  Names Russia, China, North Korea, and Iran as the covered states.
  Pairs with NSPM-13 to form the operational/legal stack behind
  CYBERCOM's disruption tempo against the "big four."
cyber_relevance: |
  Authority backbone for CYBERCOM disruption operations against the
  big-four state actors. Events tagged here should be CYBERCOM
  disruption operations against RU/CN/KP/IR state-adjacent
  infrastructure: IRA disruption (2018, RU), Iran retaliation (2019,
  IR), Trickbot disruption (2020, RU-criminal), KV-Botnet
  disruption (2023–24, CN).
