summary: |
  Initial guidance "Shifting the Balance of Cybersecurity Risk:
  Principles and Approaches for Secure by Design Software" published
  April 2023. Secure-by-Design Pledge launched at RSA Conference May
  2024 with 68+ major vendor signatories by mid-2024.

  Voluntary in name but coupled with procurement leverage (federal-
  contract requirements via EO 14028 and successor EOs) and a public
  scorecard. Co-sealed with international partners (UK NCSC, Canada
  CCCS, Australia ACSC, Germany BSI, Netherlands NCSC, others).

  Seven measurable pledge goals: MFA adoption, default-password
  elimination, reducing entire vulnerability classes, security patches,
  Vulnerability Disclosure Policy (VDP), CVE accuracy, evidence of
  intrusion. The 2025 EO 14306 weakened some enforcement levers but
  did not retract the Pledge itself.
cyber_relevance: |
  The operational expression of NCS 2023 Pillar 3 (shape market
  forces). Events related to Secure-by-Design are predominantly
  policy / governance events rather than cyber incidents — but
  AUSPEX should tag relevant defensive disclosures (e.g., CVE
  accuracy improvements at signatory vendors) to this doctrine.
