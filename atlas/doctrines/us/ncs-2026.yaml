official_text_url: https://www.whitehouse.gov/presidential-actions/2025/06/sustaining-select-efforts-to-strengthen-the-nations-cybersecurity-and-amending-executive-order-13694-and-executive-order-14144/
summary: |
  Seven-page framework released as a fact sheet March 6, 2026,
  operationally underpinned by EO 14306 "Sustaining Select Efforts to
  Strengthen the Nation's Cybersecurity..." (June 6, 2025) which
  amended EO 13694 (Obama-era cyber sanctions) and EO 14144 (Biden
  late-term cyber EO).

  Reorients the strategy toward (1) private-sector-led offensive
  partnership — Lawfare characterizes it as "centers private sector
  in offensive cyber operations"; (2) cybercrime / consumer-fraud
  emphasis; (3) software supply chain via a NIST consortium rather
  than CISA / ONCD attestation deep-scrutiny; (4) cyber sanctions
  narrowed to "foreign persons" only.

  Removed from the Biden framework: CISA / ONCD deeper-scrutiny
  mandate on software self-attestations; the phishing-resistant
  authentication directive for federal agencies.

  The 2025 CSC 2.0 annual report flagged this as an "unprecedented
  setback" — approximately 24% of previously-implemented Solarium
  Commission recommendations have lost implemented status.
cyber_relevance: |
  The active doctrine for events from June 2025 onward (EO 14306
  effective date) where US strategic framing is the operative variable.
  Events tagged here should reflect the strategy's offensive-
  partnership and cybercrime emphasis. The Disrupt-and-Dismantle
  posture inherited from NCS 2023 continues, but the regulatory /
  supply-chain levers are weaker.
pillars:
  - id: us/ncs-2026/private-sector-offensive-partnership
    name: Private-sector-led offensive partnership
    summary: |
      Reframes the relationship with private cyber firms toward an
      active partnership in offensive operations; specifics remain
      thin in public reporting.
  - id: us/ncs-2026/cybercrime-fraud
    name: Cybercrime and consumer-fraud focus
    summary: |
      Reorients federal cyber priority toward consumer-facing fraud,
      crypto-investment scams, and ransomware in non-CI sectors.
  - id: us/ncs-2026/supply-chain-via-nist
    name: Software supply chain via NIST consortium
    summary: |
      Replaces the Biden-era CISA / ONCD self-attestation scrutiny
      with a NIST-led consortium model.
  - id: us/ncs-2026/foreign-persons-sanctions
    name: Cyber sanctions narrowed to foreign persons
    summary: |
      EO 14306 narrows the Obama-era EO 13694 cyber-sanctions tool to
      foreign persons only.
