summary: |
  Classified National Security Presidential Memorandum signed August
  2018 that delegated "well-defined" time-sensitive offensive
  cyber-operations authority from POTUS to SecDef and onward to
  USCYBERCOM. Replaced the Obama-era PPD-20 / NSPD-20 framework which
  per John Bolton's account had centralized cyber-op approval in the
  White House to the point of being "frozen solid."

  **Status marked `inferred` in the AUSPEX atlas** because the full
  text remains classified. Existence and operational effects are
  well-attested in DoD IG reports, congressional testimony, and tier-1
  reporting (CyberScoop, Lawfare). Congress received briefing
  documents in 2019 after a 17-month delay; the underlying NSPM remains
  unreleased.

  The Biden 2022 review modestly increased interagency consultation
  requirements but did not roll back the core delegation. Trump 2.0
  preserved.
cyber_relevance: |
  The single most consequential US offensive-cyber policy of the past
  decade. NSPM-13 unlocked operational tempo for: the 2018 IRA
  disruption (first major exercise), Hunt Forward 2018-onward,
  Trickbot 2020, Glowing Symphony's late phases, Iran retaliation
  2019, KV-Botnet 2023–24 (court-ordered, FBI-led but enabled by the
  authority climate). Events labeled with this doctrine should be
  CYBERCOM offensive operations 2018-onward whose authority pathway
  is the NSPM-13 delegation chain.
