id: by/concept-info-security-2019
nation_state_id: by
name: Concept of Information Security of the Republic of Belarus (2019)
short_name: BY Info Security Concept 2019
issued_by: Security Council of the Republic of Belarus (Resolution No. 1)
issued_on: 2019-03-18
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.sb.by/articles/kontseptsiya-informatsionnoy-bezopasnosti-respubliki-belarus-.html
summary: |
  Approved by the Belarusian Security Council in March 2019;
  the country's principal published information-security
  doctrinal text. Tracks closely with the Russian 2016
  Information Security Doctrine in framing — defines an
  "information sphere" as a national-security domain, prioritizes
  defense of national values and historical memory from foreign
  information influence, and authorizes the security services to
  monitor the information environment. The document predates
  but presages the August 2020 election crisis and the subsequent
  internet shutdowns / opposition repression.
cyber_relevance: |
  The doctrine is the bureaucratic frame within which Belarusian
  domestic-surveillance and opposition-targeting operations
  operate. Like the Russian 2016 doctrine, it is nominally
  defensive and provides license for both information control
  (the November 2021 mass-media law amendments, the 2022
  constitutional referendum) and active monitoring of "destructive
  information impact."
pillars:
  - id: by/concept-info-security-2019/information-sphere-defense
    name: Information sphere as national-security domain
    summary: |
      Defines the information sphere as a national-security
      domain on par with physical national security; authorizes
      countermeasures against "destructive information impact."
    target_sectors:
      - media/journalism
      - media/social-platform
      - civil-society/dissident
      - civil-society/diaspora
    key_terms:
      - information sphere
      - destructive information impact
      - historical memory protection

  - id: by/concept-info-security-2019/regime-stability-monitoring
    name: Regime stability and opposition monitoring
    summary: |
      Implicitly licenses surveillance of opposition political
      activity online. Operationalized through KGB and GUBOPiK
      monitoring of post-2020 opposition channels (NEXTA,
      Telegram opposition channels) and the corresponding
      criminal prosecutions under Article 342 of the Criminal
      Code.
    target_sectors:
      - civil-society/dissident
      - civil-society/diaspora
      - media/journalism

