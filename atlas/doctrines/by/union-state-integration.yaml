name: Union State Cyber Integration with Russia
short_name: BY Union State Cyber
issued_by: Union State of Russia and Belarus (multiple programmatic documents)
issued_on: 2021-11-04  # 28 Union programs approved by Putin and Lukashenko
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  Union State framework programmatic documents — most prominently
  the 28 Union programs approved by Putin and Lukashenko on
  4 November 2021 — deepen Russian-Belarusian integration across
  defense, intelligence, and security domains. The cyber
  dimension is not separately published but is inferred from
  the operational pattern after February 2022: Belarusian-aligned
  clusters (notably UAC-0050 / Sticky Werewolf) have been
  documented targeting Ukraine in a posture consistent with
  Russian theater requirements; Belarusian infrastructure has
  been used for Russian cyber operations and for staging of
  Russian military activity against Ukraine.
cyber_relevance: |
  The framework provides the doctrinal lens under which Belarusian
  cyber activity in the Ukraine theater is tagged. Confidence on
  links to this doctrine is generally `strongly_inferred` —
  Belarusian state attestation of Ukrainian-target cyber tasking
  does not exist publicly, but Russian-aligned theater context
  is unambiguous.
