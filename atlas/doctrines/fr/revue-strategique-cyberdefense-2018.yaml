id: fr/revue-strategique-cyberdefense-2018
kind: strategy
nation_state_id: fr
name: Revue stratégique de cyberdéfense 2018
short_name: Revue stratégique 2018
issued_by: SGDSN (Secrétariat général de la défense et de la sécurité nationale), under Prime Minister Édouard Philippe
issued_on: 2018-02-12
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.sgdsn.gouv.fr/files/files/Publications/20180206-np-revue-cyber-public-v3.3-publication.pdf  # backfilled 2026-06-28: URL recovered + verified live during the 2026-06 census (sgdsn source snapshot byte-identical)
summary: |
  The Revue stratégique de cyberdéfense is the foundational
  Macron-era French cyber-defence doctrine document, published by
  the SGDSN on 12 February 2018 under Prime Minister Édouard
  Philippe. It is the first public French government document to
  set out an integrated cyber doctrine: defensive resilience
  organized around ANSSI, military / offensive capability
  organized around the Ministry of the Armed Forces (DGSE and the
  then-recently stood-up COMCYBER), strict separation between
  defensive and offensive missions, sovereign technological
  capability as a strategic objective, and alliance integration
  through NATO and the EU.

  The Revue formally institutionalizes the four-chain model of
  French cyber posture: protection (defensive), military action
  (offensive), intelligence (DGSE collection), and judicial
  investigation (DGSI / ministerial). The strict offensive /
  defensive separation — ANSSI does not conduct offensive
  operations and is structurally insulated from those who do — is
  a distinctive French doctrinal choice and contrasts with the
  US dual-hat NSA/CYBERCOM model and the UK GCHQ-NCSC-NCF
  integration.
cyber_relevance: |
  The Revue is the institutional frame for all subsequent French
  cyber doctrine documents (LIO 2019, LII 2021) and for the
  LPM 2024-2030 cyber provisions. Events occurring after February
  2018 that align with the Revue's pillars (especially defensive
  resilience and offensive military cyber) are doctrine-linked
  here. Pre-2018 events that align with the *capabilities* the
  Revue codifies (e.g., Animal Farm operations 2009-2015) are
  linked with a note that the doctrinal codification post-dates
  the operation.
pillars:
  - id: fr/revue-strategique-cyberdefense-2018/defensive-resilience
    name: Defensive resilience and critical-infrastructure protection
    summary: |
      ANSSI-led defensive mission: OIV / OSE / OES regime,
      CERT-FR advisory and incident-response capability,
      cybersecurity of critical infrastructure (energy, telecoms,
      finance, health, transport), and the visa de sécurité
      product-labeling regime.
    target_sectors:
      - critical-infrastructure
      - government
      - ict/telecom
      - energy
      - finance
    key_terms:
      - défense en profondeur
      - OIV
      - OSE
      - CERT-FR
      - critical-infrastructure protection

  - id: fr/revue-strategique-cyberdefense-2018/offensive-capability
    name: Offensive military cyber capability
    summary: |
      COMCYBER-led military offensive cyber capability, integrated
      with the broader joint-force posture. Codifies the existence
      of offensive cyber as a legitimate French military instrument
      and the strict separation from the defensive (ANSSI) mission.
      Operationalized publicly in January 2019 by the Parly LIO
      doctrine speech.
    target_sectors:
      - defense
      - government
      - government/defense-ministry
    key_terms:
      - cyber offensif
      - LIO
      - military cyber operations

  - id: fr/revue-strategique-cyberdefense-2018/alliance-integration
    name: Alliance integration (NATO, EU)
    summary: |
      French cyber posture as integrated with NATO (the 2016 Cyber
      Defence Pledge, NATO CCDCOE participation) and EU cyber
      coordination (the NIS Directive, the CSIRTs Network, the
      EU Cyber Diplomacy Toolbox). France contributes to allied
      defensive cooperation including the NATO sovereign-cyber-
      effects framework articulated at Vilnius 2023.
    target_sectors:
      - defense
      - government/foreign-ministry
    key_terms:
      - NATO Cyber Defence Pledge
      - EU Cyber Diplomacy Toolbox
      - NIS Directive
      - sovereign cyber effects

  - id: fr/revue-strategique-cyberdefense-2018/sovereign-technology
    name: Sovereign technological capability
    summary: |
      Strategic-autonomy framing: French and European sovereign
      capability in cryptography, secure cloud, semiconductor and
      networking equipment, and trusted ICT supply chains. The
      pillar undergirds policies on 5G equipment selection (the
      2019 Loi 5G), cloud-de-confiance and SecNumCloud
      qualification, and the EU Chips Act implementation in
      France.
    target_sectors:
      - ict
      - ict/networking
      - ict/cloud
      - ict/semiconductors
    key_terms:
      - souveraineté numérique
      - cloud de confiance
      - SecNumCloud
      - sovereign cryptography

  - id: fr/revue-strategique-cyberdefense-2018/information-warfare
    name: Information-warfare prelude
    summary: |
      The Revue sketches but does not yet operationalize an
      information-warfare mandate. The 2021 LII doctrine
      publication makes this pillar concrete; events linking to
      counter-disinformation or active information operations
      should generally link to the LII doctrine rather than to
      this pillar, which is included here as the institutional
      precursor.
    target_sectors:
      - government/foreign-ministry
      - government
    key_terms:
      - lutte informationnelle
      - counter-disinformation
sources:
