summary: |
  France's contribution to the NATO Cyber Defence Pledge made at
  the Warsaw Summit on 8 July 2016. France committed alongside
  Allies to strengthen the cyber defenses of national networks
  and infrastructures as a matter of priority. The pledge was
  reaffirmed at successive summits (Brussels 2018, London 2019,
  Madrid 2022, Vilnius 2023) and France contributes to
  NATO-attributed cyber-defense activity through the NATO CCDCOE
  in Tallinn and through bilateral cooperation with allied CERTs.

  AUSPEX records this as a French *contribution* doctrine
  (analogous to the UK NATO contribution entry); the principal
  NATO doctrine entries remain at the NATO-level taxonomy. The
  pillar set focuses on what France-specific activity links to
  the pledge.
cyber_relevance: |
  Events linking here include: NATO CCDCOE Locked Shields
  participation, NATO Cyber Coalition exercise participation,
  ANSSI / CERT-FR partner-CERT cooperation with NATO Allies on
  Russian / PRC-attributed campaigns, the Vilnius 2023 sovereign-
  cyber-effects framework that France co-shaped.
