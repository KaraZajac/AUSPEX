  - id: fr/nato-cyber-defence-pledge/sovereign-cyber-effects
    name: Sovereign cyber effects in NATO operations
    summary: |
      The Vilnius 2023 sovereign-cyber-effects framework allows
      Allies to contribute voluntary national cyber effects to
      NATO operations under national authority. France
      co-shaped the framework with the UK; the doctrinal frame is
      compatible with both LIO (offensive) and LID (defensive)
      contributions.
    target_sectors:
      - defense
      - government/defense-ministry
    key_terms:
      - sovereign cyber effects
      - Vilnius 2023
      - voluntary national contribution
