id: fr/lutte-informatique-defensive
kind: strategy
nation_state_id: fr
name: Lutte Informatique Défensive (LID)
short_name: LID
issued_by: ANSSI / SGDSN (institutional posture predating the 2018 Revue and formally codified within it)
issued_on: 2009-07-07  # ANSSI establishment as the institutional anchor of LID
status: active
superseded_by_id: null
inherits_from_ids:
  - fr/revue-strategique-cyberdefense-2018
official_text_url: null
summary: |
  Lutte Informatique Défensive (LID) is France's defensive cyber
  doctrine. Institutionally anchored at ANSSI (defensive of
  civilian and government information systems, OIV / OSE / OES
  operators) and the CALID at COMCYBER (defensive of military
  networks). LID predates its formal codification — ANSSI was
  established by decree in July 2009 and the CALID's predecessor
  organizations date to the early 2000s — and is integrated into
  the 2018 Revue stratégique de cyberdéfense as the defensive
  pillar opposite LIO.

  The strict offensive / defensive separation between ANSSI (LID)
  and DGSE / COMCYBER (LIO) is a deliberate French doctrinal
  choice: ANSSI is structurally insulated from the offensive
  services, reports through the SGDSN to the Prime Minister rather
  than to the Ministry of the Armed Forces, and does not share
  offensive equities with the defensive mission. The choice
  contrasts with the US dual-hat NSA/CYBERCOM model and the UK
  GCHQ-NCSC-NCF integration.
cyber_relevance: |
  Events involving ANSSI advisory publication, CERT-FR incident
  attribution, the OIV / OSE security regime, defensive technical
  cooperation with allied CERTs, and EU NIS / NIS2 coordination
  link here. ANSSI advisories that attribute foreign-state
  intrusions (e.g., APT28 / APT29 / Sandworm targeting French
  entities) typically link both to LID (as the defensive response)
  and to the originating adversary doctrine (Russian FPC 2023 et
  al.).
pillars:
  - id: fr/lutte-informatique-defensive/cert-fr-coordination
    name: CERT-FR incident response and advisory publication
    summary: |
      CERTFR-NNNN-XXX advisory series, incident coordination with
      OIV / OSE / OES operators, EU CSIRTs Network and Five Eyes
      partner-CERT liaison, public technical reporting of foreign-
      state intrusion campaigns affecting French entities.
    target_sectors:
      - government
      - critical-infrastructure
      - ict/telecom
    key_terms:
      - CERT-FR
      - CERTFR advisory
      - OIV
      - incident response

  - id: fr/lutte-informatique-defensive/sovereign-cyber-defense
    name: Sovereign cyber-defense regime
    summary: |
      OIV (Opérateurs d'Importance Vitale), OSE (Opérateurs de
      Services Essentiels under the NIS Directive), OES regime;
      visa de sécurité ANSSI product labeling; SecNumCloud
      qualification; the LPM 2013 (Loi de Programmation Militaire
      2014-2019) and successors that establish ANSSI's regulatory
      authority over critical-operator cybersecurity.
    target_sectors:
      - critical-infrastructure
      - energy
      - finance
      - ict/telecom
      - government
    key_terms:
      - OIV
      - OSE
      - SecNumCloud
      - visa de sécurité
      - LPM cyber provisions

  - id: fr/lutte-informatique-defensive/military-network-defense
    name: Military network defense (CALID)
    summary: |
      COMCYBER's CALID component defends Ministry of the Armed
      Forces networks. Operates in coordination with ANSSI / CERT-FR
      where intrusions span civilian and military networks.
    target_sectors:
      - defense
      - government/defense-ministry
    key_terms:
      - CALID
      - military CERT
      - défense des SIC militaires
sources:
  - anssi/about-anssi
