official_text_url: null  # full doctrine remains classified; public elements articulated by Parly speech and subsequent Min. Armées comms
summary: |
  Lutte Informatique Offensive (LIO) is the French military
  offensive-cyber doctrine, publicly announced by Defence
  Minister Florence Parly on 18 January 2019. The doctrine
  acknowledges that France conducts offensive cyber operations
  as a legitimate military instrument under the authority of the
  Chief of the Defence Staff and the Minister of the Armed
  Forces, integrated into joint operations alongside kinetic and
  influence effects. Operational responsibility sits with
  COMCYBER; intelligence collection in support of LIO sits with
  DGSE.

  The 2019 public announcement made France one of the few NATO
  members to explicitly acknowledge offensive cyber as doctrine.
  The classified full doctrine document has not been released;
  the public elements come from the Parly speech, subsequent
  Ministry of the Armed Forces communications, and the COMCYBER
  posture statements at Forum International de la Cybersécurité
  (FIC) events 2019-2025.
cyber_relevance: |
  LIO is the doctrinal label for any acknowledged or
  vendor-attributed French military offensive cyber operation.
  Pre-2019 operations (Animal Farm tooling family disclosed
  2014-2015, Snowglobe activity 2009-2014) sit primarily under
  DGSE intelligence-collection authorities rather than military
  LIO; AUSPEX still links such events to LIO at *plausible*
  confidence with an explicit note that the doctrine was
  codified later than the operations. Post-2019 COMCYBER-attributed
  activity links at *strongly inferred* or *attested* depending on
  the source.
pillars:
  - id: fr/lutte-informatique-offensive/military-cyber-effects
    name: Military cyber effects in joint operations
    summary: |
      Use of offensive cyber capability to produce battlefield
      effects integrated with kinetic operations: degradation of
      adversary C4ISR, disruption of adversary command networks,
      effects on weapons systems. Posture statements name
      counter-terrorism operations (Sahel, Levant) as principal
      historical theaters of effect.
    target_sectors:
      - defense
      - government/defense-ministry
      - ict/telecom
    key_terms:
      - effets cyber
      - integrated cyber effects
      - joint cyber operations

  - id: fr/lutte-informatique-offensive/strategic-signaling
    name: Strategic signaling and deterrence
    summary: |
      Public acknowledgment of offensive cyber as doctrine is
      itself the signaling function: declaring capability without
      naming specific operations. The Parly 2019 speech is the
      canonical example.
    target_sectors:
      - government
      - government/defense-ministry
    key_terms:
      - cyber deterrence
      - declared capability
      - strategic signaling

  - id: fr/lutte-informatique-offensive/intelligence-preparation
    name: Intelligence preparation of the operational environment
    summary: |
      Pre-positioning and intelligence collection in support of
      potential future LIO effects. Operationally this overlaps
      with DGSE Technical Directorate SIGINT / CNE; institutionally
      LIO doctrine sits with COMCYBER. The Animal Farm tooling
      family fits this pillar retroactively at plausible
      confidence.
    target_sectors:
      - government
      - defense
      - ict/telecom
    key_terms:
      - intelligence preparation
      - CNE
      - operational preparation
