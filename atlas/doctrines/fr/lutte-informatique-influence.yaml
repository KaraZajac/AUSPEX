    name: Military information operations
    summary: |
      COMCYBER information-operations mandate: active operations
      to "degrade adversary narratives" in declared theaters.
      Sahel and Levant counter-jihadist information operations
      are publicly framed examples.
    target_sectors:
      - defense
      - media
    key_terms:
      - influence operations
      - military info ops
      - narrative degradation

  - id: fr/lutte-informatique-influence/strategic-attribution
    name: Strategic attribution of influence operations
    summary: |
      Public attribution of foreign-state influence operations
      as a strategic instrument. VIGINUM's June 2023 attribution
      of the Doppelganger / RRN campaign to Russian actors and
      subsequent expansions through 2024-2025 are the canonical
      pattern.
    target_sectors:
      - government
      - media
    key_terms:
      - public attribution
      - strategic naming
      - Doppelganger attribution
