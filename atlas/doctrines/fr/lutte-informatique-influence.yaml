official_text_url: null
summary: |
  Lutte Informatique d'Influence (LII) is the French
  information-warfare doctrine, publicly announced by Defence
  Minister Florence Parly on 20 October 2021. LII publicly
  commits France to conducting information operations in
  cyberspace as a military instrument — including counter-
  disinformation, attribution of foreign influence operations,
  and active operations to "degrade adversary narratives". LII
  sits institutionally with COMCYBER (military information
  operations) and operationally engages VIGINUM (Service de
  vigilance et de protection contre les ingérences numériques
  étrangères, stood up July 2021 under the SGDSN) for the
  defensive counter-interference mission.

  LII makes France one of the few NATO members to have publicly
  declared an offensive information-warfare capability separate
  from the defensive counter-disinformation posture. The 2021
  announcement was framed against Russian / Wagner-aligned
  African influence operations and against Iranian-aligned
  Levant influence activity.
cyber_relevance: |
  Events linking to LII include: VIGINUM attribution of foreign
  influence operations (the Doppelganger / RRN campaign
  attributions 2022-2024 are the canonical examples);
  counter-disinformation activity acknowledged by COMCYBER /
  Ministry of the Armed Forces; declared operations in the
  Sahel theater against jihadist propaganda. Russian / FSB-
  attributed Doppelganger operations sit with the *adversary*
  doctrine (Russian FPC 2023 / Gerasimov framing) and link to
  LII only via the *French defensive response* (VIGINUM
  attribution).
