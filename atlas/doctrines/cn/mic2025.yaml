id: cn/mic2025
kind: strategy
nation_state_id: cn
name: Made in China 2025
short_name: MIC2025
issued_by: State Council of the People's Republic of China
issued_on: 2015-05-19
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: http://www.gov.cn/zhengce/content/2015-05/19/content_9784.htm
summary: |
  State Council Document Guofa [2015] No. 28. A ten-year industrial
  policy targeting global competitiveness in ten strategic sectors
  by 2025, escalating to global leadership by 2035 and "world-leading"
  status by 2049 (the centenary of the PRC). After the
  Trump-administration trade war (2018), Chinese state media stopped
  citing the program by name, but the underlying planning, targets,
  and funding (Big Fund I/II, Big Fund III in 2024) continue under
  successor framings ("new productive forces," "high-quality
  development") within the 14th and 15th Five-Year Plans.
cyber_relevance: |
  MIC2025 implicitly authorizes a state effort to close
  technology gaps in each of the ten target sectors. The
  Department of Justice indictments of APT10 (2018), APT40 (2021),
  APT31 (2024), and others repeatedly cite stolen trade secrets in
  sectors that map 1:1 onto MIC2025 pillars: semiconductors,
  aviation, maritime, rail, NEVs, biopharma. The doctrine is
  therefore the dominant lens for tagging PRC economic-collection
  cyber events.
pillars:
  - id: cn/mic2025/next-gen-it
    name: Next-generation information technology
    summary: |
      Semiconductors (design, manufacture, equipment, materials),
      AI, 5G/6G, quantum, advanced computing, integrated circuits.
      The highest-priority pillar by funding (Big Fund I/II/III).
    target_sectors:
      - ict/semiconductors
      - ict/semiconductors/foundry
      - ict/semiconductors/design
      - ict/semiconductors/eda
      - ict/semiconductors/equipment
      - ict/semiconductors/materials
      - ict/telecom
    key_terms:
      - 集成电路 (integrated circuits)
      - SMIC self-sufficiency
      - Big Fund
      - EUV indigenization
    programs:
      - id: cn/mic2025/next-gen-it/big-fund
        name: China Integrated Circuit Industry Investment Fund (Big Fund)
        active_period:
          start: 2014-09-01
          end: null
        summary: |
          State-backed semiconductor investment vehicle. Big Fund
          I (2014) raised ~RMB 138.7B; II (2019) ~RMB 204B; III
          (May 2024) ~RMB 344B. Cyber-relevant: the fund identifies
          target technology gaps that align with subsequent
          collection priorities. SMIC's 7nm and equipment-vendor
          IP have been recurrent intrusion targets in indictments.

  - id: cn/mic2025/cnc-robotics
    name: High-end CNC tools and robotics
    target_sectors:
      - ics/manufacturing
    key_terms:
      - Industry 4.0
      - precision machining

  - id: cn/mic2025/aerospace
    name: Aerospace and aeronautical equipment
    summary: |
      C919 / COMAC commercial aviation, military rotorcraft,
      avionics, propulsion. The APT26 / Turbine Panda Operation
      Soft Cell-adjacent campaigns and the GE / CFM-International
      engine-IP cases are canonical examples of cyber tasking
      aligned to this pillar.
    target_sectors:
      - aerospace/civil
      - aerospace/defense
      - defense/contractor

  - id: cn/mic2025/maritime
    name: Maritime engineering and high-tech ships
    target_sectors:
      - defense/maritime
      - transport/maritime
    key_terms:
      - LNG carrier
      - Type 055 destroyer
      - dual-use shipbuilding

  - id: cn/mic2025/rail
    name: Advanced rail equipment
    target_sectors:
      - transport/rail
    summary: |
      High-speed rail, signaling systems, rolling-stock IP.
      Targets include CRRC competitors and signaling vendors.

  - id: cn/mic2025/nev
    name: New-energy vehicles and equipment
    target_sectors:
      - energy/electric-power
      - transport/road
    key_terms:
      - lithium-ion battery
      - solid-state battery
      - electric powertrain

  - id: cn/mic2025/power-equipment
    name: Power equipment
    target_sectors:
      - energy/electric-power/generation
      - energy/electric-power/transmission
      - energy/nuclear

  - id: cn/mic2025/agriculture
    name: Agricultural equipment
    target_sectors:
      - agriculture
      - agriculture/seed-genetics
    summary: |
      Smart agriculture, precision farming, ag genetics. The
      ChemChina / Syngenta acquisition, the DBN / Monsanto seed
      cases, and the Mo Hailong indictment (theft of inbred
      corn seed, 2013) align with this pillar.

  - id: cn/mic2025/new-materials
    name: New materials
    target_sectors:
      - chemicals
      - mining
    key_terms:
      - rare earths
      - composites
      - graphene

  - id: cn/mic2025/biopharma
    name: Biopharmaceuticals and medical devices
    target_sectors:
      - healthcare/pharma
      - healthcare/biotech
      - healthcare/research
    summary: |
      mRNA, cell and gene therapy, vaccines, medical imaging.
      COVID-19 vaccine and therapeutic IP became a major collection
      priority 2020–2022 (US DOJ Moderna-targeting indictments;
      UK NCSC joint advisory).

