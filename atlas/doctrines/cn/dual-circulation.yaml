id: cn/dual-circulation
kind: strategy
nation_state_id: cn
name: Dual Circulation Strategy
short_name: Dual Circulation
issued_by: Xi Jinping (May 2020 speech); codified in the 14th Five-Year Plan
issued_on: 2020-05-14
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  Articulated in Xi Jinping's May 2020 speech and codified in the
  14th Five-Year Plan. Reduces PRC dependence on foreign supply
  chains (the "internal circulation": domestic demand + domestic
  supply) while retaining external leverage where China is
  indispensable (the "external circulation"). Functions as the
  macro-strategic frame that gives MIC2025 / 14th FYP / MCF their
  urgency, particularly after the October 2022 U.S. semiconductor
  export controls.
cyber_relevance: |
  Cyber operations against U.S. and allied chokepoint-technology
  providers — semiconductors, EDA software, aerospace engines,
  advanced agriculture, biotech reagents — can be linked here
  when the strategic-goal framing is broader than a single sector.
  Bulk theft of EDA / IP-block libraries serves "internal
  circulation" in semiconductors generally, not any one device.
  The doctrine surfaces most clearly when an event's victim list
  spans several chokepoint sectors at once.
pillars:
