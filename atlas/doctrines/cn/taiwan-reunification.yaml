name: Taiwan Reunification ("One China")
short_name: Taiwan Reunification
issued_by: CCP / State Council (continuous; codified 2005 Anti-Secession Law); PLA 2027 milestone announced 2017
issued_on: 2005-03-14  # Anti-Secession Law adoption
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  "Reunification" with Taiwan is a continuous PRC strategic
  objective since 1949, codified legislatively in the 2005
  Anti-Secession Law. Xi Jinping announced a PLA 2027 modernization
  milestone in 2017 ("comprehensively improve strategic capabilities
  ... by 2027"). The "Davidson Window" framing — the period
  2021–2027 as the highest-risk credible PLA action window — is
  a U.S. analytic construct from Adm. Phil Davidson's March 2021
  INDOPACOM SASC testimony, not a PRC doctrine. The March 2026
  ODNI assessment finds the PRC has not committed to a fixed
  invasion date but is materially preparing the option.
cyber_relevance: |
  The single most-cited rationale by U.S. and allied attributing
  authorities for the post-2021 surge in PRC pre-positioning
  operations. Pre-conflict tasking divides into (a) collection
  on Taiwan government, defense, semiconductors (TSMC), telecom,
  electricity, and undersea cables, plus cognitive-domain
  operations on Taiwan; and (b) pre-positioning and decision-
  maker SIGINT collection on the U.S. and Indo-Pacific allies
  (Japan, Philippines, Korea, Australia) whose participation in
  a Taiwan contingency would be the PLA's primary operational
  problem. CISA AA24-038a is the cleanest attested doctrine link
  in the public record: pre-positioning is "to enable lateral
  movement to OT assets to disrupt functions ... in the event
  of a major crisis or conflict with the United States."
pillars:
  - id: cn/taiwan-reunification/coercive-options
    name: Coercive-options pre-positioning vs. US and allies
    target_sectors:
      - critical-infrastructure
      - energy/electric-power
      - ics/water
      - ict/telecom
      - transport
      - aerospace/defense
    summary: |
      The pre-positioning posture against US INDOPACOM logistics,
      Guam infrastructure, US West Coast utilities, and Indo-
      Pacific allied basing-relevant infrastructure that would
      support US force projection across the Pacific in a Taiwan
      contingency. Volt Typhoon, Flax Typhoon, and Salt Typhoon
      sit primarily here.
  - id: cn/taiwan-reunification/taiwan-island-collection
    name: Taiwan-island collection and cognitive operations
    target_sectors:
      - government
      - government/defense-ministry
      - ict/semiconductors
      - ict/telecom
      - energy/electric-power
    summary: |
      Cyber tasking against Taiwan government, TSMC and the
      Taiwan semiconductor ecosystem, Taiwan telecom and
      electricity infrastructure, and Taiwan-based research
      institutions. APT41, Flax Typhoon, and Mustang Panda
      have all carried persistent Taiwan-island campaigns.
  - id: cn/taiwan-reunification/decision-maker-sigint
    name: US / allied decision-maker SIGINT
    target_sectors:
      - government
      - government/foreign-ministry
      - ict/telecom/carrier
      - ict/telecom/lawful-intercept
    summary: |
      Storm-0558 (US State/Commerce/Congressional email
      collection), Salt Typhoon (campaign-staff telecom
      interception during 2024 US election cycle), Hafnium /
      Silk Typhoon (Treasury / OFAC counterintelligence). Targets
      the people who would set US China-policy and sanctions
      posture in a Taiwan scenario.
