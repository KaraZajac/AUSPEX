id: cn/14th-fyp
kind: strategy
nation_state_id: cn
name: 14th Five-Year Plan (2021–2025)
short_name: 14th FYP
issued_by: National People's Congress (master Outline); CAC + State Council (Informatization sub-plan)
issued_on: 2021-03-11  # NPC adoption of master Outline
status: active
superseded_by_id: cn/15th-fyp
inherits_from_ids:
  - cn/mic2025
official_text_url: https://cset.georgetown.edu/wp-content/uploads/t0284_14th_Five_Year_Plan_EN.pdf
summary: |
  Master economic-and-social plan adopted by the National
  People's Congress in March 2021; cyber-relevant sub-plans
  followed — the "14th Five-Year Plan for National
  Informatization" (CAC + State Council, December 2021) and the
  "Digital Economy Plan" (State Council, January 2022). The
  master Outline elevates "strategic and forward-looking" S&T
  priorities — quantum information, integrated circuits, key
  software, AI, brain-inspired chips, big data, blockchain,
  biotech, deep-space / deep-sea / polar — and frames closing
  gaps in seven "chokepoint" technologies that the U.S. and
  allies could deny. Terminal year 2025.
cyber_relevance: |
  The 14th FYP operationalizes MIC2025 with explicit indicators
  and budgets. Its "chokepoint" framing is the doctrinal language
  that most directly drives cyber tasking against semiconductor-
  equipment makers, EDA vendors, AI-chip designers, and the
  academic / national-lab base behind them. The October 2022
  U.S. export controls on advanced semiconductors and the
  subsequent ASML / SME restrictions intensified pressure inside
  the chokepoint-closure portion of the plan, aligning with
  observed Salt Typhoon, Volt Typhoon, and APT41 tempo
  increases. The Informatization sub-plan also establishes the
  CII-protection regime under the Cybersecurity Law and Data
  Security Law.
pillars:
  - id: cn/14th-fyp/chokepoint-technologies
    name: Chokepoint-technology closure
    target_sectors:
      - ict/semiconductors
      - ict/semiconductors/equipment
      - ict/semiconductors/eda
      - ict/semiconductors/design
      - ict/software
      - ict
    key_terms:
      - chokepoint (卡脖子)
      - EUV
      - ASML
      - EDA
      - AI accelerator
      - GPU
    summary: |
      The post-2022-export-control acute pressure window:
      semiconductor toolchain, advanced packaging, EDA software,
      GPU/AI accelerator IP, plus the academic / national-lab
      base behind them.
  - id: cn/14th-fyp/forward-looking-st
    name: Strategic and forward-looking S&T priorities
    target_sectors:
      - ict
      - healthcare/biotech
      - aerospace/space
    key_terms:
      - quantum information
      - brain-inspired computing
      - deep-space / deep-sea
      - biotech
  - id: cn/14th-fyp/cii-protection
    name: CII protection regime
    target_sectors:
      - critical-infrastructure
    summary: |
      Defensive pillar: critical-information-infrastructure
      operator (CIIO) designations and security-review obligations
      under the Cybersecurity Law / Data Security Law / PIPL
      framework.
