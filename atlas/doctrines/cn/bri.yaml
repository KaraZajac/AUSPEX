id: cn/bri
nation_state_id: cn
name: Belt and Road Initiative / Digital Silk Road
short_name: BRI / DSR
issued_by: Xi Jinping (2013 Astana / Jakarta speeches); NDRC + MOFA + MOFCOM (2015 Vision and Actions)
issued_on: 2013-09-07
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.cfr.org/china-digital-silk-road/
summary: |
  BRI announced by Xi Jinping in 2013 (Astana and Jakarta
  speeches). The Digital Silk Road component was formalized in
  the March 2015 "Vision and Actions on Jointly Building the
  Silk Road Economic Belt and 21st-Century Maritime Silk Road"
  white paper from NDRC, MOFA, and MOFCOM. CAC reported 17
  DSR-specific MOUs by 2021. Exports Chinese telecom, fiber,
  undersea cable, data-center, satellite, and surveillance
  infrastructure to partner countries, with Chinese standards
  embedded into partner-country regulation (linkage to Standards
  2035).
cyber_relevance: |
  DSR is both a market-expansion doctrine and a
  counterintelligence-relevant footprint expansion: it places
  Chinese-vendor infrastructure in partner-country networks,
  while the 2017 National Intelligence Law obligates those
  vendors to cooperate with MSS / MPS / PLA on compelled
  collection. APT40's explicit Hainan MSS tasking against
  "industries included in China's Belt and Road Initiative"
  (CISA AA21-200a) is the cleanest attested doctrine link.
  Mustang Panda's operations against ASEAN governments,
  Mongolia, the Vatican, and EU institutions consistently align
  with BRI partner-country political reporting requirements.
pillars:
  - id: cn/bri/digital-silk-road
    name: Digital Silk Road infrastructure export
    target_sectors:
      - ict/telecom
      - ict/telecom/carrier
      - ict/cloud
      - ict/networking
    key_terms:
      - 数字丝绸之路
      - Huawei
      - ZTE
      - undersea cable
      - data center
  - id: cn/bri/political-intelligence-collection
    name: BRI partner-country political intelligence
    target_sectors:
      - government/foreign-ministry
      - government/civilian
      - civil-society/ngo
    summary: |
      Diplomatic and political reporting on BRI partner-country
      governments. Mustang Panda is the workhorse actor here;
      APT15 has carried Latin America and Africa collection;
      APT30 covers South and Southeast Asia.
  - id: cn/bri/maritime-and-port
    name: Maritime engineering, ports, undersea infrastructure
    target_sectors:
      - transport/maritime
      - defense/maritime
      - aerospace
    summary: |
      Anchors the APT40 (Hainan MSS) tasking attested in CISA
      AA21-200a. Maritime R&D, port operators, and undersea-cable
      operators are the core target set.
