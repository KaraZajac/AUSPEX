official_text_url: https://cset.georgetown.edu/wp-content/uploads/t0406_standardization_outline_EN.pdf
summary: |
  Drafted from 2018 by the Chinese Academy of Engineering and
  MIIT; operationalized via the State Council and CCP Central
  Committee "National Standardization Development Outline"
  (《国家标准化发展纲要》) issued October 2021. Action plans
  followed in July 2022 and July 2024. The doctrine's strategic
  thrust is to convert PRC technical and industrial position into
  rule-making leverage in global standards bodies (ITU, IEC, ISO,
  3GPP), so that Chinese vendors are favored or interoperable by
  default in next-generation technologies — 5G/6G, IoT, AI,
  quantum, electric vehicles, autonomous driving, cloud.
cyber_relevance: |
  Standards 2035 is the natural follow-on to MIC2025: where
  MIC2025 commands making the technology, Standards 2035 commands
  writing the rules under which everyone else uses it. Cyber
  tasking under this doctrine targets standards-body internal
  deliberations, competitor R&D, and patent portfolios — and
  overlaps with Digital Silk Road exports (Huawei, ZTE,
  Hikvision) that bake Chinese standards into BRI partner
  countries. Telecom-sector cyber targeting (APT31, APT41) and
  carrier compromise (Salt Typhoon) feed both collection-on-
  competitors and operational signals-intelligence requirements
  consistent with this doctrine.
