id: cn/dsl-pipl
kind: statute
nation_state_id: cn
name: Data Security Law and Personal Information Protection Law
short_name: DSL / PIPL
issued_by: National People's Congress
issued_on: 2021-06-10  # DSL adoption; PIPL adopted 2021-08-20
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  Data Security Law adopted June 2021 (effective 1 September
  2021); Personal Information Protection Law adopted August 2021
  (effective 1 November 2021). Together with the 2017
  Cybersecurity Law they form the "three pillars" of the PRC's
  data-governance regime. Mandate data localization for critical
  information infrastructure operators and large processors, a
  security review for outbound transfer of "important data" or
  large volumes of personal data, and assert sovereign control
  over data classified as relevant to national security.
  Tightened by Cyberspace Administration of China rules in 2024.
cyber_relevance: |
  Not an offensive doctrine but the defensive counterpart that
  matters for cyber-strategic analysis. (a) Shapes what foreign
  firms must store inside China, creating MSS access opportunities
  via the 2017 Intelligence Law. (b) Establishes the "data
  sovereignty" frame that justifies CAC oversight of cross-border
  data flows and provides the legal basis for MSS access to data
  held inside China by foreign businesses. (c) Cements the
  regulatory leverage applied to PRC-domiciled foreign firms.
pillars:
  - id: cn/dsl-pipl/data-localization
