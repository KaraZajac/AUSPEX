id: cn/intelligentized-warfare
nation_state_id: cn
name: Informatized and Intelligentized Warfare
short_name: Intelligentized Warfare
issued_by: PLA (Science of Military Strategy 2004 / 2020; 2019 National Defense White Paper)
issued_on: 2019-07-24  # 2019 White Paper articulating intelligentized warfare
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: http://english.www.gov.cn/archive/whitepaper/201907/24/content_WS5d3941ddc6d08408f502283d.html
summary: |
  "Informatized warfare" entered PLA doctrine via the 2004
  "Science of Military Strategy." "Intelligentized warfare" was
  articulated in the 2019 PLA white paper "China's National
  Defense in the New Era" and elaborated in the 2020 "Science
  of Military Strategy." Defeat the enemy by paralyzing C4ISR
  nodes ("system destruction warfare," 体系破击战) rather than
  attriting forces; treat cyber, space, electronic warfare, and
  psychological operations as integrated strategic domains; use
  AI-enabled command and control and algorithmic decision
  support. The April 2024 PLA reorganization — dissolution of
  the Strategic Support Force into Aerospace Force, Cyberspace
  Force, and Information Support Force — is widely read as the
  operational instantiation of this doctrine.
cyber_relevance: |
  The doctrine behind Volt Typhoon and Salt Typhoon. "System
  destruction warfare" tells PLA planners that the highest-
  leverage cyber effects in a Taiwan contingency are against
  the U.S. ability to project force across the Pacific — not
  against Taiwan directly. Pre-positioning in Guam telecom,
  U.S. West Coast water/electric utilities, and pipeline
  operators is the operational expression of this doctrine.
  Salt Typhoon's CALEA-gateway and tier-1 carrier targeting
  serves the C4ISR-node-compromise side; Volt Typhoon's
  living-off-the-land critical-infrastructure footprint serves
  the disruption-ready posture.
pillars:
  - id: cn/intelligentized-warfare/system-destruction
    name: System destruction warfare (C4ISR paralysis)
    target_sectors:
      - government/defense-ministry
      - ict/telecom
      - ict/telecom/carrier
      - aerospace/space
      - aerospace/defense
    key_terms:
      - 体系破击战
      - C4ISR
      - kill chain disruption
  - id: cn/intelligentized-warfare/pre-positioning
    name: Pre-positioning in adversary critical infrastructure
    target_sectors:
      - critical-infrastructure
      - energy/electric-power
      - energy/electric-power/grid-ot
      - ics/water
      - transport
      - ict/telecom
    summary: |
      The Volt Typhoon / Flax Typhoon / KV-botnet pattern: gain
      and hold access to U.S. and allied civilian critical
      infrastructure (water, electric power, pipelines, ports,
      telecom) so the access can be leveraged for disruption
      during a future Taiwan or peer-conflict contingency.
  - id: cn/intelligentized-warfare/sigint-c4isr-collection
    name: Strategic SIGINT collection on adversary C4ISR
    target_sectors:
      - ict/telecom
      - ict/telecom/carrier
      - ict/telecom/lawful-intercept
      - government
    summary: |
      Salt Typhoon's bulk-metadata and content-interception
      compromise of U.S. tier-1 carriers and CALEA gateways sits
      here. Feeds into both the system-destruction targeting
      pipeline (what to take down first) and the wartime
      decision-maker tracking requirement.
