summary: |
  Adopted by the NPC Standing Committee on 27 June 2017 and
  amended 27 April 2018. Article 7 obligates "all organizations
  and citizens" to "support, assist, and cooperate with national
  intelligence efforts in accordance with law" and to protect
  intelligence work secrets. Article 14 empowers intelligence
  organs to compel cooperation from individuals and entities.
  Operates in conjunction with the 2014 Counter-Espionage Law,
  the 2015 National Security Law, and the 2017 Cybersecurity
  Law to form a comprehensive legal regime under which any
  PRC-domiciled firm can be compelled to provide data or access.
cyber_relevance: |
  Not a tasking doctrine — the legal supply-side enabler that
  converts every PRC tech firm (Huawei, Tencent, Alibaba,
  ByteDance/TikTok, DJI, Hikvision, Integrity Tech, Sichuan
  Juxinhe) into a potential intelligence collection node, and
  every PRC-domiciled subsidiary of a foreign firm into a
  compelled-access point. It is the doctrinal counterpart to the
  Digital Silk Road export footprint: DSR places the gear; the
  Intelligence Law obligates the vendor to cooperate with MSS /
  MPS / PLA when compelled. Cited heavily in U.S. and allied
  export-restriction and procurement-ban rationales.
