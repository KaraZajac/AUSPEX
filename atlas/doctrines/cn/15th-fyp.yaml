official_text_url: null  # forthcoming via gov.cn; CCP CC plenum communiqué October 2025
summary: |
  Approved by the NPC on 12 March 2026 following the CCP CC
  plenum communiqué of October 2025. The plan's headline theme
  shifts from "innovate the technology" (14th FYP) to "produce
  the technology at scale" — a "modernized industrial system"
  framing supported by 109 major engineering projects across
  semiconductors, embodied AI, commercial spaceflight, controlled
  nuclear fusion, new-type batteries, and green hydrogen.
  Companion documents include the "AI+" action plan (August 2025)
  targeting 90% AI penetration of PRC industry by 2030 and an
  explicit elevation of 6G mobile communications. Terminal year
  2030; aligns with the PLA 2027 "centenary modernization goal"
  and the 2035 long-range objectives.
cyber_relevance: |
  Shifts collection demand from upstream R&D theft to industrial
  process knowledge — fab process recipes, fusion-engineering
  test data, AI training pipelines, foundation-model weights and
  training corpora — and to manufacturing-scale-up know-how.
  Expands the priority list to include commercial space hardware
  (launch, satellite buses, optical comms), large-language-model
  research, and 6G standards processes. The plan provides the
  next half-decade's tasking-justification framework after the
  14th FYP terminates at end-2025.
