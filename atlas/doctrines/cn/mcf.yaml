id: cn/mcf
nation_state_id: cn
name: Military-Civil Fusion
short_name: MCF
issued_by: Xi Jinping / CCP Central Committee (Central Commission for Integrated Military and Civilian Development est. Jan 2017)
issued_on: 2017-01-22  # Central Commission formally established; doctrine elevated 2014–2015
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://2017-2021.state.gov/military-civil-fusion/
summary: |
  Elevated to national-level strategy by Xi Jinping in 2014–2015
  and operationalized via the Central Commission for Integrated
  Military and Civilian Development (established January 2017,
  chaired personally by Xi). MCF erases the wall between PLA and
  civilian industry: civilian R&D feeds military requirements,
  and military capability feeds civilian production. Internally
  rebranded as "integrated national strategic system and
  capabilities" but the substance continues. No single public
  master text; the doctrine lives in CCP CC documents and is
  summarized in the U.S. State Department archive page above.
cyber_relevance: |
  MCF is the meta-doctrine that licenses MSS and PLA cyber units
  to treat the entire foreign civilian R&D base as a military
  intelligence target. It explains why apparently commercial
  cyber theft (APT10 against pharma, APT41 against gaming +
  semis) sits alongside obvious military espionage (Su Bin
  against C-17/F-22/F-35; APT40 against naval research) inside
  the same campaigns — both feed the same fused requirements
  pipeline. Explicitly authorizes "all available means" including
  cyber, traditional industrial espionage, talent programs, FDI,
  joint ventures, and academic collaboration.
pillars:
  - id: cn/mcf/dual-use-research
    name: Dual-use R&D collection
    target_sectors:
      - academic/university
      - academic/research-lab
      - aerospace/defense
      - defense/contractor
      - ict
      - healthcare/biotech
    key_terms:
      - dual-use
      - talent programs
      - Thousand Talents
  - id: cn/mcf/civil-infrastructure-targeting
    name: Civilian critical-infrastructure targeting as coercive lever
    target_sectors:
      - critical-infrastructure
      - energy/electric-power
      - ics/water
      - ict/telecom
      - transport
    summary: |
      The civilian-CII targeting pillar — distinct from the
      intelligentized-warfare doctrine's military-CII focus but
      doctrinally adjacent. Volt Typhoon's living-off-the-land
      footprint in US energy, water, comms, and transport sits
      here when the framing emphasizes coercive leverage over
      homeland infrastructure rather than C4ISR paralysis.
  - id: cn/mcf/bulk-pii-humint-enabling
    name: Bulk-PII collection for HUMINT vetting
    target_sectors:
      - government
      - healthcare
      - finance
      - hospitality
    summary: |
      OPM (22.1M SF-86), Equifax (145M), Anthem (78.8M), Marriott
      (~500M). Combined with the 2017 National Intelligence Law's
      data-localization regime, gives the MSS near-comprehensive
      coverage of cleared US persons for recruitment and
      counterintelligence targeting.
sources:
