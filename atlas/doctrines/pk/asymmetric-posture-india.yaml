summary: |
  Inferred operational doctrine reconstructed from the targeting
  pattern of Transparent Tribe / APT36 and SideCopy against
  Indian military, government, and Kashmir-related targets,
  active since 2013 (Transparent Tribe) and 2019 (SideCopy
  emergence post-Pulwama / Balakot crisis). The doctrine
  occupies the cyber dimension of Pakistan's broader asymmetric
  posture against India, articulated since the early 2000s
  through the Strategic Plans Division's "full-spectrum
  deterrence" framing — a posture designed to extract strategic
  effect from a smaller economy and conventional force.
cyber_relevance: |
  The principal lens under which AUSPEX tags Pakistani-aligned
  cyber events. Confidence on links is generally `strongly_inferred`
  (target mix is unambiguously Indian-military-focused) but rarely
  `attested` (no Pakistani government text claims this tasking).
  Surges in operational tempo align with India-Pakistan
  diplomatic-military events — Pulwama / Balakot (February 2019),
  Article 370 abrogation (August 2019), and the 2025 Pahalgam /
  Operation Sindoor cycle.
pillars:
  - id: pk/asymmetric-posture-india/military-collection
    name: Indian military and defense collection
    target_sectors:
      - government/defense-ministry
      - defense
      - defense/contractor
    summary: |
      Sustained APT36 / Transparent Tribe and SideCopy targeting
      of Indian military personnel, defense ministry, and defense
      research (DRDO). Phishing lures themed on military
      circulars, pension portals, and OFB / DRDO communications.

  - id: pk/asymmetric-posture-india/kashmir-political
    name: Kashmir-related political and dissident collection
    target_sectors:
      - government
      - civil-society
      - civil-society/dissident
    summary: |
      Targeting of Indian government officials and journalists
      working Kashmir issues, with tempo elevation after the
      Article 370 abrogation (August 2019).

  - id: pk/asymmetric-posture-india/afghan-collection
    name: Afghan government and Western-diplomat collection
    target_sectors:
      - government/foreign-ministry
      - government
    summary: |
      Secondary collection set targeting Afghan government and
      Western diplomatic posts in South Asia, consistent with
      ISI Directorate S's documented Afghan-focused tasking.

