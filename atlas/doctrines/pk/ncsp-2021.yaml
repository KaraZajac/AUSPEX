id: pk/ncsp-2021
kind: strategy
nation_state_id: pk
name: National Cyber Security Policy 2021
short_name: NCSP 2021 (PK)
issued_by: Ministry of Information Technology and Telecommunication
issued_on: 2021-07-27
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://moitt.gov.pk/SiteImage/Misc/files/National%20Cyber%20Security%20Policy%202021%20Final.pdf
summary: |
  Pakistan's first formally promulgated national cybersecurity
  policy, approved by the Cabinet in July 2021 under the Imran
  Khan government. Establishes the National CERT (PKCERT), a
  national cybersecurity governance structure under MoITT, and
  a critical-information-infrastructure protection regime. The
  policy is defensive-postured on its face — like India's NCSP
  2013 — and does not publicly authorize offensive cyber
  operations.
cyber_relevance: |
  The published doctrine is the bureaucratic frame within which
  Pakistan's offensive cyber tasking (run through ISI and the
  military's intelligence community) sits without explicit
  authorization in the public text. AUSPEX tags Pakistani-aligned
  offensive events to the inferred asymmetric-posture doctrine
  rather than to NCSP 2021 by default.
pillars:
  - id: pk/ncsp-2021/cii-protection
    name: Critical Information Infrastructure protection
    target_sectors:
      - critical-infrastructure
      - finance/banking
      - ict/telecom
      - government
    summary: |
      Defines CII categories and establishes a CII protection
      regime under MoITT. Operationalized partially via the
      Prevention of Electronic Crimes Act (PECA) 2016 (amended
      2022).
    key_terms:
      - CII
      - PKCERT
      - PECA

