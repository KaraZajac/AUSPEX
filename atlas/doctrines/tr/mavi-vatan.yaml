id: tr/mavi-vatan
kind: strategy
nation_state_id: tr
name: Mavi Vatan (Blue Homeland)
short_name: Mavi Vatan
issued_by: Turkish Naval Forces / Office of the President (informal adoption)
issued_on: 2019-03-04  # Mavi Vatan 2019 naval exercise; formal political adoption
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  Maritime / geopolitical doctrine articulated by Adm. (ret.)
  Cem Gürdeniz in writings dating to 2006, formally adopted as
  Turkish strategic framing in the context of the Mavi Vatan 2019
  naval exercise (the largest in Turkish history at that point)
  and the contemporaneous Eastern Mediterranean hydrocarbon
  disputes with Greece, Cyprus, and the EastMed Gas Forum. The
  doctrine claims an expansive Turkish maritime jurisdiction
  covering roughly 462,000 km² across the Aegean, Eastern
  Mediterranean, and Black Sea, contested at almost every
  boundary by neighbors.
cyber_relevance: |
  Mavi Vatan provides the strategic frame within which Turkish-
  aligned cyber operations targeting Greek, Cypriot, and adjacent
  governments and energy entities are tagged. The Sea Turtle /
  MARBLED DUST DNS-hijacking campaign's 2017–2019 targeting of
  Cypriot, Greek, Iraqi-Kurdistan, and Armenian government and
  telecom infrastructure aligns with the maritime-and-energy
  contest that Mavi Vatan describes.
pillars:
  - id: tr/mavi-vatan/eastern-med-energy
    name: Eastern Mediterranean energy competition
    target_sectors:
      - energy/oil-gas
      - government
      - government/foreign-ministry
    summary: |
      The Eastern Mediterranean hydrocarbon dispute (Cyprus EEZ
      claims, the EastMed Gas Forum 2019, the 2020 Turkey-Libya
      maritime agreement, the August 2020 Oruç Reis crisis with
      Greece). Cyber tasking implied: collection against Greek
      and Cypriot energy regulators, foreign ministries, and
      EU-aligned counterparts.
    key_terms:
      - Eastern Mediterranean
      - EEZ
      - EastMed Gas Forum
      - Oruç Reis

  - id: tr/mavi-vatan/regional-influence
    name: Regional influence and proxy environments
    target_sectors:
      - government
      - government/foreign-ministry
    summary: |
      Broader regional influence in Libya, Syria, the Caucasus
      (notably during the 2020 Nagorno-Karabakh war), and the
      Iraqi Kurdish theater. Cyber collection against governments
      and adjacent NGOs in these theaters fits the framework.
    key_terms:
      - Libya
      - Karabakh
      - KRG
      - regional influence

