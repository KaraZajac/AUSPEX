summary: |
  Inferred operational doctrine reconstructed from the post-2016
  pattern of Turkish state-aligned operations against Gülenist
  (FETÖ in Turkish official framing) movement figures abroad
  and against Kurdish (PKK / PYD-aligned) diaspora networks. The
  pattern is well-documented in non-cyber form (extradition
  pressure, MIT abduction operations, diplomatic extraordinary
  rendition cases documented by Freedom House and Stockholm
  Center for Freedom). The cyber dimension is documented through
  the Sea Turtle DNS-hijacking targeting of Kurdish-region
  infrastructure (Iraqi Kurdistan in particular), the 2024
  Hunt & Hackett resurgence of Sea Turtle against Dutch ISPs
  serving Kurdish diaspora, and a steady drumbeat of credential-
  phishing operations against Turkish journalists in exile and
  Gülenist-aligned media abroad.
cyber_relevance: |
  Provides the editorial lens under which Turkish-aligned
  diaspora-surveillance operations are tagged. Confidence on
  individual links is generally `strongly_inferred` (victim
  selection is unambiguous) but not `attested` (no Turkish
  government text describes a directed cyber-surveillance
  mandate against these targets).
pillars:
  - id: tr/counter-gulen-kurdish-surveillance/gulen-diaspora
    name: Gülenist diaspora targeting
    target_sectors:
      - civil-society/diaspora
      - civil-society/dissident
      - media/journalism
    summary: |
      Post-2016 targeting of Gülen-movement-aligned individuals
      and organizations abroad. The Stockholm Center for Freedom
      and Freedom House have documented the non-cyber dimension
      extensively; cyber operations against this victim set are
      attested less granularly but consistent with the broader
      pattern.

  - id: tr/counter-gulen-kurdish-surveillance/kurdish-diaspora
    name: Kurdish diaspora and KRG targeting
    target_sectors:
      - government
      - civil-society/diaspora
      - civil-society/dissident
      - ict/telecom
    summary: |
      Targeting of Kurdish opposition, the Kurdistan Regional
      Government (KRG) in Iraq, and PYD-aligned political and
      media organizations in Europe. The Sea Turtle / MARBLED
      DUST DNS-hijacking campaign's KRG targeting is the
      canonical exemplar; the 2024 Hunt & Hackett Dutch ISP
      disclosure extended the picture into diaspora-internet-
      infrastructure operations.

