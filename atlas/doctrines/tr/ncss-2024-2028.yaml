id: tr/ncss-2024-2028
kind: strategy
nation_state_id: tr
name: National Cyber Security Strategy and Action Plan 2024–2028
short_name: TR NCSS 2024–2028
issued_by: Ministry of Transport and Infrastructure (Directorate of National Cyber Incident Response Center)
issued_on: 2024-07-15
status: active
superseded_by_id: null
inherits_from_ids: []  # successive 2013-14, 2016-19, 2020-23 strategies not separately modeled in v0
official_text_url: https://hgm.uab.gov.tr/uploads/pages/siber-guvenlik/ulusal-siber-guvenlik-stratejisi-2024-2028.pdf
summary: |
  Fourth iteration of Türkiye's national cyber-security strategy
  (predecessors: 2013–2014, 2016–2019, 2020–2023). Published by
  the Ministry of Transport and Infrastructure under whose
  Directorate of National Cyber Incident Response Center
  (USOM) the national cyber-incident-response apparatus sits.
  Defensive-postured on its face; emphasizes indigenous
  cybersecurity industry development, CII protection, and
  workforce. Notable for explicit references to "developing
  national capabilities" that some analysts read as implicit
  offensive-capability authorization, though no offensive
  framing appears in the public text.
cyber_relevance: |
  The published doctrine is the bureaucratic frame within which
  Turkish offensive cyber tasking operates. Like the Pakistani
  and Indian analogues, it does not publicly authorize offensive
  operations; the operational tasking sits with MIT and military
  intelligence under non-public authorities.
pillars:
  - id: tr/ncss-2024-2028/national-capability
    name: Indigenous cyber capability development
    target_sectors:
      - ict
      - defense
    summary: |
      Emphasis on indigenous capability ("yerli ve milli") in
      cyber-security products, consistent with the broader
      Turkish defense-industry indigenization push (Aselsan,
      Havelsan, STM as flagship vendors).
    key_terms:
      - yerli ve milli
      - STM
      - Havelsan
      - Aselsan

  - id: tr/ncss-2024-2028/cii-protection
    name: Critical Information Infrastructure protection
    target_sectors:
      - critical-infrastructure
      - finance/banking
      - ict/telecom
      - government
    summary: |
      CII protection regime under USOM coordination.
    key_terms:
      - USOM
      - CII protection

sources:
  - hgm-uab/2024-07-15_ncss-2024-2028-text
  - tr-presidency/2024-07_ncss-announcement
