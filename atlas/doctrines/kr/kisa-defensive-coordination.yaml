summary: |
  Defensive cyber-coordination doctrine of KISA / KrCERT/CC.
  Operates in parallel to NIS Cyber Security Center (state /
  classified) and MND Cyber Operations Command (military);
  KISA covers private-sector, citizen, and internet-
  infrastructure defense.

  Three principal lines of effort:

    (1) National CSIRT coordination — KrCERT/CC operates
        24/7 incident-response coordination for the ROK
        private sector and citizens; counterpart to US
        CISA, UK NCSC, JPCERT/CC.
    (2) Advisory publication — KISA publishes threat
        advisories on DPRK clusters (Kimsuky, Lazarus,
        Andariel) and on commodity cybercrime targeting
        Korean users. Joint advisories with Korean National
        Police Agency on crypto-theft sanctions evasion are
        a recurring channel.
    (3) Standards and certification — KISA-PIMS information-
        security management-system certification under PIPA,
        the .kr ccTLD policy interface, and the ROK
        national bug-bounty programme.

  AUSPEX uses this doctrine label for KISA / KrCERT defensive
  advisory and incident-coordination events. Joint advisories
  co-signed with US / UK / Japan partners may double-tag to
  kr/korus-cyber-cooperation.
cyber_relevance: |
  Principal doctrine label for KISA / KrCERT advisory and
  coordination events. Domestic-criminal cyber events
  coordinated by KISA tag here without DPRK doctrine
  cross-linkage; joint advisories with international partners
  tag here plus kr/korus-cyber-cooperation.
