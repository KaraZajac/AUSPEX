id: kr/korus-cyber-cooperation
kind: treaty
nation_state_id: kr
name: KORUS Combined Cyber Cooperation Framework
short_name: KORUS Cyber
issued_by: Republic of Korea and United States (recurring bilateral statements; upgraded August 2023)
issued_on: 2023-08-18  # Camp David trilateral upgrade with Japan
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.state.gov/the-spirit-of-camp-david-joint-statement-of-japan-the-republic-of-korea-and-the-united-states/
summary: |
  Long-running ROK-US bilateral cyber cooperation framework
  rooted in the 1953 Mutual Defense Treaty and operationalised
  through (a) USFK / ROK JCS combined defense planning, which
  has included cyber as a domain since the 2010s; (b) the
  annual ROK-US Cyber Cooperation Working Group at MoFA /
  State Department level; (c) the joint advisory tradition
  between NIS / KISA / KNPA and CISA / FBI / NSA on DPRK
  clusters.

  AUSPEX uses the 18 August 2023 Camp David trilateral as
  the anchor publication date because that summit was the
  formal upgrade of bilateral KORUS cyber cooperation into a
  trilateral US-ROK-Japan framework with explicit cyber
  pillars — including the Trilateral Cyber Cooperation
  Working Group on DPRK cryptocurrency theft and supply-
  chain security. The summit's "Spirit of Camp David" joint
  statement codified the framework at head-of-state level.

  Pre-2023 anchor activity (informational, not separately
  doctrinalised in AUSPEX): the 2015 ROK-US Cyber Cooperation
  Working Group establishment under the Obama administration;
  the 2021 ROK-US summit cyber commitments under Biden /
  Moon; combined Ulchi Freedom Shield exercise cyber
  components from the 2010s onward.
cyber_relevance: |
  Doctrine label for joint ROK-US (and from August 2023
  ROK-US-Japan trilateral) cyber events. Joint advisories
  co-signed by NIS and CISA tag here in addition to
  kr/nis-counter-dprk. Camp David trilateral cyber
  declarations tag here as primary doctrine.
pillars:
  - id: kr/korus-cyber-cooperation/joint-attribution
    name: Joint attribution and threat-intelligence sharing
    summary: |
      Joint advisory co-publication on DPRK and other state
      cyber clusters; sustained NIS / KISA / KNPA – CISA / FBI
      / NSA channel.
  - id: kr/korus-cyber-cooperation/dprk-revenue
    name: Counter-DPRK revenue cyber operations
    summary: |
      Joint counter-cryptocurrency-theft and DPRK IT-worker
      sanctions work codified at the 2023 Camp David summit.
  - id: kr/korus-cyber-cooperation/supply-chain
    name: Supply-chain and critical-technology security
    summary: |
      Bilateral / trilateral coordination on semiconductor,
      AI, and critical-technology supply-chain cyber risk.
