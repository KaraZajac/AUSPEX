summary: |
  Standing counter-DPRK cyber posture of the National Intelligence
  Service. Not a single dated publication: the doctrine has been
  codified incrementally across successive administrations
  (Roh, Lee, Park, Moon, Yoon, Lee) and is the load-bearing
  Korean institutional response to four overlapping DPRK
  cyber threat streams:

    (1) Lazarus / Andariel / APT38 — financially motivated and
        defense-IP targeting (KAERI 2021, defense contractors,
        cryptocurrency exchanges including the November 2017
        Bithumb incident and others).
    (2) Kimsuky — espionage targeting ROK foreign-policy,
        academic, and unification-ministry communities.
    (3) DarkSeoul / Lazarus destructive operations against
        ROK broadcasters and banks (March 2013); KHNP intrusion
        (December 2014).
    (4) Disinformation, leaflet-distribution disruption, and
        influence operations targeting the inter-Korean
        political environment.

  Public attribution voice: NIS is the standard ROK
  government attributor for DPRK clusters, often in joint
  publication with FBI, CISA, NSA, NCSC-UK, and (since 2023)
  Japan's NPA and NISC. The July 2024 AA24-207A Andariel /
  Onyx Sleet advisory is the canonical recent example, co-
  signed by NIS, Defense Counterintelligence Command, and
  Korea National Police Agency.

  AUSPEX anchor date is 11 January 2010 — the ROK Cyber
  Command establishment following the July 2009 DDoS
  campaign — because that date marks the codification of
  the posture into a standing institutional response. The
  posture itself pre-dates 2010 in ANSP / NIS internal
  practice but is not publicly attested earlier.
cyber_relevance: |
  Principal doctrine label for ROK counter-DPRK attribution
  events. Joint advisories co-signed by NIS tag here; ROK
  NIS-led domestic counter-intelligence on DPRK access
  operations also tags here. Distinct from kr/kisa-defensive-
  coordination, which covers KISA / KrCERT's wider defensive
  remit (criminal, ROK-domestic, and non-state-actor).
pillars:
  - id: kr/nis-counter-dprk/attribution
    name: Attribution and public naming
    summary: |
      Public attribution of DPRK cyber clusters via NIS
      statements and joint advisories with US, UK, and Japan.
  - id: kr/nis-counter-dprk/counter-intel
    name: Domestic counter-intelligence against DPRK access ops
    summary: |
      Counter-espionage against DPRK recruitment, IT-worker
      schemes, and human-network-enabled access to ROK targets.
  - id: kr/nis-counter-dprk/critical-infrastructure
    name: Critical-infrastructure protection coordination
    summary: |
      Protection of ROK CNI (KHNP, KEPCO, defense industrial
      base, financial sector) from DPRK destructive and
      espionage operations.
    target_sectors:
      - energy/nuclear
      - energy/electric-power
      - defense
      - finance
      - government
