summary: |
  ROK Ministry of National Defense cyber-operations policy.
  Codified incrementally through the biennial Defense White
  Paper (cyber chapters from the 2010 edition onward) and the
  January 2010 establishment of Cyber Command (renamed Cyber
  Operations Command in January 2019). The doctrine is
  defensive-active in posture: protection of military networks,
  active defense including hunt-forward on defense industrial
  base partners, and combined operations with US Cyber
  Command under USFK.

  Three principal lines of effort:

    (1) Military network defense — DOD-equivalent NIPRNet /
        SIPRNet protection via COC and the Defense Cyber
        Operations Group.
    (2) Defense Counter-Intelligence — counter-espionage
        against DPRK and other state access operations
        targeting ROK military personnel and the defense
        industrial base, conducted by Defense Counter-
        intelligence Command (kr/dcc).
    (3) Combined cyber operations with US Cyber Command
        and USFK — Ulchi Freedom Shield exercise cyber
        component, combined defense planning, and (since
        2023) trilateral cyber coordination with Japan.

  Offensive cyber mandate: publicly acknowledged in MND
  policy documents but specific operations are not
  publicly attributed. AUSPEX records this candidly rather
  than inferring offensive operations from absence of public
  attribution.
cyber_relevance: |
  Doctrine label for ROK military cyber events. COC
  operational events tag here in addition to (typically)
  kr/nis-counter-dprk where DPRK targeting is involved.
  DCC counter-intelligence events tag here.
