name: National Cybersecurity Strategy 2019 (Republic of Korea)
short_name: NCSS 2019 (ROK)
issued_by: National Security Office, Cheong Wa Dae (Moon Jae-in administration)
issued_on: 2019-04-03
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.itu.int/en/ITU-D/Cybersecurity/Documents/National_Strategies_Repository/National%20Cybersecurity%20Strategy_South%20Korea.pdf  # repointed 2026-06-30 off a redirecting Wikipedia URL to the audited ITU primary (official ROK NCS English text)
summary: |
  First explicit national-level cybersecurity strategy of the
  Republic of Korea. Published 3 April 2019 by the National
  Security Office of Cheong Wa Dae (the presidential office)
  under the Moon Jae-in administration. The audited primary text
  is the official ROK National Cybersecurity Strategy (English)
  held in the ITU National Strategies Repository (repointed
  2026-06-30 off a redirecting Wikipedia URL that carried no
  dedicated article).

  Three strategic objectives and six strategic tasks:

    Objective 1 — Safeguarding national-critical functions
    Objective 2 — Enhancing cybersecurity capability
    Objective 3 — Building a global trust-based cybersecurity
                  cooperation framework

    Task 1 — Increase safety of national core infrastructure
    Task 2 — Enhance cyberattack response capability
    Task 3 — Build governance based on trust and cooperation
    Task 4 — Build a foundation for cybersecurity industry growth
    Task 5 — Foster a cybersecurity culture
    Task 6 — Lead international cooperation on cybersecurity

  Substantive shifts from prior administration-by-administration
  ad-hoc posture: (a) explicit recognition of cyberspace as a
  domain of national security; (b) codification of inter-agency
  governance via the National Cybersecurity Strategy Council
  chaired by the NSO with NIS, MND, MoFA, MoIS, and MSIT as
  permanent members; (c) explicit framing of international
  cooperation as a Korean strategic objective rather than a
  by-product of the US alliance.

  Successor administrations (Yoon, Lee) have not formally
  replaced the 2019 document despite policy adjustments in
  the Defense White Paper cyber chapters and the 2023 Camp
  David trilateral expansion.
cyber_relevance: |
  Principal doctrine label for ROK national-level cyber events
  2019-onward at the strategic / governance layer. Operational
  events should typically also link to a more specific doctrine
  (kr/nis-counter-dprk for NIS attribution events; kr/korus-
  cyber-cooperation for alliance events; kr/kisa-defensive-
  coordination for KISA / KrCERT advisory events).
pillars:
  - id: kr/ncss-2019/critical-infrastructure
    name: Objective 1 — Safeguarding national-critical functions
    summary: |
      Protection of national-critical information infrastructure
      across government, energy (KHNP, KEPCO), finance,
      telecommunications, and transport.
    target_sectors:
      - government
      - energy/nuclear
      - energy/electric-power
      - finance
      - ict/telecom
  - id: kr/ncss-2019/response-capability
    name: Objective 2 — Enhancing cyberattack response capability
    summary: |
      Coordinated incident response across NIS CSC, KISA /
      KrCERT, and MND cyber. Underpins the joint advisory
      tradition with US and UK partners.
  - id: kr/ncss-2019/international-cooperation
    name: Objective 3 — International trust-based cooperation
    summary: |
      Bilateral and multilateral cooperation including KORUS
      cyber framework, US-ROK-Japan trilateral, NATO CCDCOE
      (Indo-Pacific partner since 2019), and norms diplomacy
      at the UN.
sources:
