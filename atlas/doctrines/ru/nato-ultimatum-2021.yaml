id: ru/nato-ultimatum-2021
nation_state_id: ru
name: NATO Non-Enlargement Ultimatum (December 2021 Draft Security Treaties)
short_name: NATO Ultimatum 2021
issued_by: Ministry of Foreign Affairs of the Russian Federation
issued_on: 2021-12-17
status: active  # remains stated Russian war aim despite NATO/US rejection (Jan 2022)
superseded_by_id: null
inherits_from_ids:
  - ru/military-doctrine-2014
official_text_url: https://www.mid.ru/en/foreign_policy/news/1790809/
summary: |
  Two draft treaties published by MID on 17 December 2021: "Treaty
  between the USA and Russia on Security Guarantees" and "Agreement
  on Measures to Ensure the Security of Russia and Member States
  of NATO." Demands withdrawal of US forces and infrastructure
  from post-1997 NATO members and codifies NATO non-enlargement
  as a casus belli. Formally rejected by NATO/US in January 2022;
  the February 2022 invasion followed. Remains a stated Russian
  war aim.
cyber_relevance: |
  Doctrinal source for tagging Russian operations against NATO
  defense supply chains, Ukrainian C2 and grid infrastructure,
  Finnish/Swedish post-accession targets, and US/UK defense
  contractors as serving the strategic goal of degrading NATO
  cohesion and Ukraine support. Viasat KA-SAT, the post-2022
  wiper campaigns, German SPD targeting (May 2024), and CARR
  performative ICS operations all map here.
pillars:
  - id: ru/nato-ultimatum-2021/nato-degradation
    name: NATO cohesion and aid-pipeline degradation
    summary: |
      Operations against NATO defense industrial base, logistics,
      member-state political institutions, and aid-providing
      states' public discourse with the goal of fragmenting NATO
      consensus on Ukraine.
    target_sectors:
      - defense
      - defense/contractor
      - aerospace/defense
      - transport/logistics
      - government
      - government/election-systems
    key_terms:
      - NATO degradation
      - Ukraine aid pipeline
      - allied cohesion

  - id: ru/nato-ultimatum-2021/post-1997-rollback
    name: Post-1997 NATO rollback
    summary: |
      Demands withdrawal of US forces and infrastructure from
      post-1997 NATO members. Direct cyber-targeting rationale for
      any aspirant or new member (Finland/Sweden post-2023/24
      accession).
    target_sectors:
      - government/defense-ministry
      - critical-infrastructure
    key_terms:
      - post-1997 boundaries
      - rollback
      - Finland Sweden accession

  - id: ru/nato-ultimatum-2021/ukraine-support-interdiction
    name: Ukraine support-infrastructure targeting
    summary: |
      Cyber operations against the logistics, communications, and
      industrial base sustaining Western aid to Ukraine. The
      operational analogue to kinetic strikes on Ukrainian rail
      and grid.
    target_sectors:
      - transport/logistics
      - transport/rail
      - defense/contractor
      - ict/telecom
    key_terms:
      - aid interdiction
      - Ramstein
      - supplemental

sources:
  - mid-ru/2021-12-17_draft-security-treaties
