id: ru/fpc-2023
kind: strategy
nation_state_id: ru
name: Foreign Policy Concept of the Russian Federation (2023)
short_name: FPC 2023
issued_by: President of the Russian Federation (Presidential Decree No. 229)
issued_on: 2023-03-31
status: active
superseded_by_id: null
inherits_from_ids:
  - ru/fpc-2016  # not modeled separately; reference for inheritance
official_text_url: https://mid.ru/en/foreign_policy/fundamental_documents/1860586/
summary: |
  Signed by Vladimir Putin and presented by Foreign Minister
  Sergey Lavrov, the 2023 Foreign Policy Concept formalizes
  Russia's self-positioning as a "civilization-state" leading a
  multipolar bloc against an "Anglo-Saxon"-led West. Section IV.55
  lists ensuring "international information security" as a foreign-
  policy priority: shaping international law to legitimize sovereign
  segments of the Internet, opposing Western "weaponization" of
  cyberspace, and treating offensive Western cyber and influence
  operations as the principal external threat. Codifies the
  post-February-2022 break with the West and treats the sanctions
  regime as permanent.
cyber_relevance: |
  Justifies pre-emptive and retaliatory Russian cyber operations
  as defensive sovereignty enforcement. Operationally underwrites
  SVR-led intelligence collection against MFAs and Western policy
  elites (Midnight Blizzard mailbox theft), GRU disruptive
  operations against NATO members supporting Ukraine, and FSB/GRU
  influence operations to fragment NATO consensus. Push for UN-led
  cyber norms regimes (Open-Ended Working Group, draft Convention
  on Information Crime) as alternative to Budapest Convention.
pillars:
  - id: ru/fpc-2023/information-sovereignty
    name: Information sovereignty / Runet
    summary: |
      Control of the Runet, rejection of multistakeholder Internet
      governance, push for UN-led cyber norms regimes. Defensive
      framing that legitimizes offensive operations against the
      "weaponized" foreign information space.
    target_sectors:
      - ict
      - ict/cloud
      - media/social-platform
    key_terms:
      - sovereign Runet
      - international information security
      - UN OEWG
      - Convention on Information Crime

  - id: ru/fpc-2023/anti-anglo-saxon
    name: Counter "unfriendly states" / anti-Anglo-Saxon framing
    summary: |
      Civilizational framing explicitly anti-US/NATO. Doctrinal
      license for operations against Western foreign-ministries,
      election infrastructure, defense industrial base, and Western
      media/think-tank ecosystems perceived as instruments of
      Western policy.
    target_sectors:
      - government/foreign-ministry
      - government/election-systems
      - media/journalism
      - civil-society/think-tank
      - defense/contractor
    key_terms:
      - unfriendly states
      - Anglo-Saxon West
      - collective West

  - id: ru/fpc-2023/multipolar-near-abroad
    name: Multipolar order and the near abroad
    summary: |
      Legitimizes operations in the "near abroad" (post-Soviet
      states still in Western orbit — Moldova, Georgia, Baltics).
      Overlaps with Russkiy Mir doctrine.
    target_sectors:
      - government
      - government/election-systems
      - civil-society/ngo
    key_terms:
      - near abroad
      - post-Soviet space
      - multipolarity

sources:
  - mid-ru/2023-03-31_foreign-policy-concept
  - russiamatters/strategic-documents-archive
