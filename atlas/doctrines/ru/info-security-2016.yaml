id: ru/info-security-2016
nation_state_id: ru
name: Doctrine of Information Security of the Russian Federation (2016)
short_name: Info Security Doctrine 2016
issued_by: President of the Russian Federation (Presidential Decree No. 646)
issued_on: 2016-12-05
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: http://en.kremlin.ru/acts/news/53418
summary: |
  Signed by Putin; supersedes the 2000 Information Security
  Doctrine. The canonical statement that Russia views information
  confrontation as continuous and existential. Elevates "information-
  psychological" threats — Western journalism, opposition civil
  society, foreign-funded NGOs — alongside technical cyber threats.
  Ratchets after the 2014 Maidan; preceded the Yarovaya laws and
  the 2019 "Sovereign Runet" law (FZ-90).
cyber_relevance: |
  Although nominally defensive, the doctrine is the bureaucratic
  hook for justifying offensive information operations as
  proportionate response: if the West conducts information warfare
  through CNN and Twitter, then GRU psyops units and SVR influence
  cutouts are framed as merely defensive. Gave bureaucratic
  authority to FSB Center 18 (TsIB) and Roskomnadzor for domestic
  enforcement, and to GRU information units for external
  operations. Operationalized via Federal Law 187-FZ on Critical
  Information Infrastructure (2017).
pillars:
  - id: ru/info-security-2016/information-sphere-as-domain
    name: Information sphere as national-security domain
    summary: |
      Defends the "information sphere" as a national-security
      domain on par with land/sea/air/space. Implicit license for
      kinetic-equivalent response to foreign info-ops.
    target_sectors:
      - media/journalism
      - media/social-platform
      - civil-society/ngo
    key_terms:
      - information sphere
      - information confrontation
      - informatsionnoye protivoborstvo

  - id: ru/info-security-2016/critical-information-infrastructure
    name: Critical information infrastructure protection
    summary: |
      Calls for state control over CII; codified in Federal Law
      187-FZ (2017). Provides the legal scaffold under which
      Russian targeting of foreign CII can be framed as proportionate
      retaliation.
    target_sectors:
      - critical-infrastructure
      - ict
    key_terms:
      - CII protection
      - 187-FZ
      - GosSOPKA

  - id: ru/info-security-2016/info-psychological-defense
    name: Counter information-psychological impact
    summary: |
      Mandates "neutralization of information-psychological impact
      aimed at undermining historical foundations and patriotic
      traditions." Underwrites domestic and external influence
      apparatus.
    target_sectors:
      - media/journalism
      - civil-society
      - civil-society/ngo
    key_terms:
      - information-psychological
      - patriotic traditions
      - color revolution defense

sources:
