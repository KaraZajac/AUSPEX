id: ru/military-doctrine-2014
nation_state_id: ru
name: Military Doctrine of the Russian Federation (2014)
short_name: Military Doctrine 2014
issued_by: President of the Russian Federation (Decree No. Pr-2976)
issued_on: 2014-12-25
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.files.ethz.ch/isn/192873/rp_117.pdf
summary: |
  Supersedes the 2010 Military Doctrine, updated through subsequent
  National Defense Plan implementing acts. First Russian doctrine
  to elevate "information confrontation" as a distinct form of
  warfare across peace and wartime, codified after the 2014 Crimea
  annexation. Identifies NATO enlargement as the principal external
  military danger and "destabilization of internal political and
  social situation" via information means as a military threat.
  Authorizes pre-emptive use of forces, including in "non-contact"
  warfare.
cyber_relevance: |
  Puts cyber/information operations under General Staff purview
  alongside conventional forces. Frames Sandworm, Fancy Bear, and
  Unit 54777 as legitimate military instruments. The emphasis on
  "non-contact" and "indirect" warfare is the bureaucratic source
  for what Western analysts later mislabeled the "Gerasimov
  doctrine." Doctrinal hook for tagging GRU election interference,
  destructive Ukraine operations, and DIB targeting.
pillars:
  - id: ru/military-doctrine-2014/non-contact-warfare
    name: Non-contact / indirect warfare
    summary: |
      Authorizes continuous gray-zone operations below the threshold
      of armed conflict. Cyber operations are doctrinally fit under
      this rubric.
    target_sectors:
      - government
      - government/defense-ministry
      - critical-infrastructure
    key_terms:
      - non-contact warfare
      - indirect action
      - gray zone

  - id: ru/military-doctrine-2014/nato-as-principal-threat
    name: NATO enlargement as principal external military danger
    summary: |
      The doctrinal source for tagging cyber operations against
      NATO C4ISR, allied-state political stability, electoral
      infrastructure, military logistics, and defense industrial
      base.
    target_sectors:
      - government/defense-ministry
      - defense
      - defense/contractor
      - aerospace/defense
      - transport/logistics
    key_terms:
      - NATO enlargement
      - principal external danger

  - id: ru/military-doctrine-2014/destabilization-via-info
    name: Information-enabled destabilization as military threat
    summary: |
      Identifies "destabilization of internal political and social
      situation" via information means as a military threat —
      i.e. cyber-enabled influence operations are now part of the
      military's mandate. Symmetrical license: Russia can do the
      same.
    target_sectors:
      - government/election-systems
      - media/journalism
      - civil-society
    key_terms:
      - destabilization
      - internal political situation
      - color revolution

sources:
