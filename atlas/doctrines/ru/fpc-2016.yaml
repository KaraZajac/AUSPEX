summary: |
  The 2016 Foreign Policy Concept, signed by Vladimir Putin in
  November 2016, restructured Russia's strategic-policy posture
  around the deterioration of relations with the United States and
  the broader Western order following the 2014 Crimea annexation
  and Donbas conflict. It introduced the formal framing of
  "polycentric world order" and elevated information-security
  considerations as a top-tier strategic concern — language
  carried forward and intensified in the 2023 successor.

  Operationally, the 2016 FPC was the doctrinal anchor under which
  the 2016–2022 period of Russian cyber operations was conducted:
  DNC interference, NotPetya, Ukrainian grid attacks 2015/2016
  (which preceded but were consonant with the 2016 framing), the
  2018 Olympic Destroyer, Triton/Trisis, and the 2020 SolarWinds
  campaign. Superseded by FPC 2023 (Presidential Decree No. 229)
  following the February 2022 full-scale invasion of Ukraine.
cyber_relevance: |
  Foundational doctrine for understanding Russian cyber posture
  during 2016–2022. Events attributed to Russian services in that
  window can be linked to this doctrine at appropriate confidence;
  the 2023 successor is the active reference for post-invasion
  operations.
