id: ru/nss-2021
nation_state_id: ru
name: National Security Strategy of the Russian Federation (2021)
short_name: NSS 2021
issued_by: President of the Russian Federation (Presidential Decree No. 400)
issued_on: 2021-07-02
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://rusmilsec.blog/wp-content/uploads/2021/08/nss_rf_2021_eng_.pdf
summary: |
  Supersedes the 2015 NSS. Elevates information confrontation to a
  top-tier national-security priority. First Russian strategy
  document to give "information security" its own dedicated section
  (it was a subsection in 2015). Pre-positions doctrine for the
  February 2022 confrontation; provides retroactive legal cover
  for offensive operations.
cyber_relevance: |
  Explicitly authorizes building offensive cyber/info capability.
  Section on "Information Security" calls for "forces and means
  of information confrontation" — a euphemism covering GRU
  disruptive units, SVR cyber-espionage, FSB collection, and the
  influence apparatus (IRA successors, RT, Sputnik). Endorses
  "sovereign segment of the Internet" (Runet) and import
  substitution in IT/software. Identifies foreign ICT use to
  "interfere in internal affairs, undermine sovereignty, violate
  territorial integrity" as a principal threat.
pillars:
  - id: ru/nss-2021/forces-of-information-confrontation
    name: Forces and means of information confrontation
    summary: |
      The euphemism by which the NSS authorizes offensive
      cyber/info capability. Covers GRU disruptive units, SVR
      cyber-espionage, FSB collection, and the state influence
      apparatus.
    target_sectors:
      - government
      - government/foreign-ministry
      - government/election-systems
      - media/journalism
      - civil-society/think-tank
    key_terms:
      - forces of information confrontation
      - means of information confrontation
      - silyi i sredstva informatsionnogo protivoborstva

  - id: ru/nss-2021/digital-sovereignty
    name: Digital sovereignty / Runet / import substitution
    summary: |
      Domestic defensive pillar — sovereign Runet, import
      substitution in IT/software. Implies a parallel offensive
      stance against foreign ICT supply chains used to "interfere
      in internal affairs."
    target_sectors:
      - ict
      - ict/software
      - ict/cloud
    key_terms:
      - sovereign Runet
      - import substitution
      - tsifrovoy suverenitet

sources:
