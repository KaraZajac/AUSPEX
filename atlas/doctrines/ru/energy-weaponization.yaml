summary: |
  The "energy weapon" is the operational expression of Russia's
  understanding that hydrocarbon supply and electric-grid
  availability are political instruments. Doctrinally implicit;
  observable from 1990 Baltic oil cutoffs, 2006 and 2009 Ukraine
  gas wars, the 2014-onward escalation, and peaking with Nord
  Stream curtailments and 2022 supply cuts. Not codified in a
  single text — reconstructed from operational tempo and observed
  pairing of kinetic, market, and cyber levers.
cyber_relevance: |
  Sandworm's repeated power-grid strikes in Ukraine (2015, 2016,
  2022 Industroyer2, 2024 FrostyGoop Lviv heating) are timed with
  military operations and missile strikes on the same grid.
  Berserk Bear's (FSB Center 16) pre-positioning in US/UK/EU
  energy-sector ICS environments (CISA Mar 2018, DOJ Mar 2022
  indictment) is the cyber analogue to Nord Stream coercion. The
  TsNIIKhM Triton operation against Saudi Petro Rabigh (2017)
  extended the pattern to the safety-instrumented-system layer.
  AUSPEX should tag any Russian intrusion in an energy-sector
  target against this strand even absent immediate disruptive
  intent — the strategic goal is coercive leverage.
pillars:
  - id: ru/energy-weaponization/grid-attack
    name: Electric-grid disruption
    summary: |
      Direct cyber operations to disrupt electric power generation,
      transmission and distribution, typically paired with kinetic
      strikes or seasonal political pressure (winter heating).
      Ukrainian grid 2015/2016/2022/2024 are canonical events.
    target_sectors:
      - energy/electric-power
      - energy/electric-power/generation
      - energy/electric-power/transmission
      - energy/electric-power/grid-ot
    key_terms:
      - grid attack
      - Industroyer
      - FrostyGoop
      - winter heating coercion

  - id: ru/energy-weaponization/oil-gas-pre-positioning
    name: Oil/gas/nuclear ICS pre-positioning
    summary: |
      Long-running Berserk Bear / FSB Center 16 access campaigns
      against US/UK/EU energy ICS (electric, oil & gas, nuclear).
      No observed disruptive action — pre-positioning for coercive
      leverage.
    target_sectors:
      - energy/oil-gas
      - energy/oil-gas/upstream
      - energy/oil-gas/midstream
      - energy/oil-gas/downstream
      - energy/nuclear
    key_terms:
      - pre-positioning
      - Wolf Creek
      - watering-hole
      - Havex

  - id: ru/energy-weaponization/sis-targeting
    name: Safety-instrumented-system targeting (Triton)
    summary: |
      The most aggressive ICS class observed from any nation-state.
      TsNIIKhM's Triton/Trisis malware demonstrated against
      Schneider Triconex SIS controllers at Saudi Petro Rabigh
      (2017). Capable of catastrophic physical effects.
    target_sectors:
      - energy/oil-gas/downstream
      - ics/chemical
    key_terms:
      - Triton
      - Trisis
      - SIS
      - Triconex

