id: ru/russkiy-mir
nation_state_id: ru
name: Russkiy Mir / Near Abroad
short_name: Russkiy Mir
issued_by: President of the Russian Federation (Decree No. 796, Russkiy Mir Foundation)
issued_on: 2007-06-21
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://russkiymir.ru/en/fund/index.php
summary: |
  Russkiy Mir ("Russian World") is the civilizational frame that
  makes the post-Soviet near abroad the priority Russian cyber
  theater. Institutionalized via the Russkiy Mir Foundation
  (2007), reinforced in 2014 Crimea-annexation speeches and
  September 2022 annexation address. Justifies operations to
  "protect compatriots" and Russian-speakers in post-Soviet
  states; underwrites continuous influence and intelligence
  operations in Ukraine, Belarus, Moldova, Baltics, Kazakhstan,
  Georgia, Armenia. Legitimizes the Russian Orthodox Church as a
  soft-power and intelligence-collection vector.
cyber_relevance: |
  Gamaredon's seven-plus-year campaign against Ukrainian government
  networks, the long FSB cultivation of Moldovan and Georgian
  political assets, and Sandworm's pre-positioning in Baltic
  critical infrastructure are coherent only through this lens.
  AUSPEX should treat any cyber operation against Ukraine, Belarus,
  Moldova, Georgia, Armenia, Kazakhstan, or the Baltics as
  presumptively Russkiy-Mir-aligned unless evidence indicates
  otherwise.
pillars:
  - id: ru/russkiy-mir/ukraine-theater
    name: Ukraine as continuous priority theater
    summary: |
      Ukraine is the operational center of Russkiy Mir cyber
      tasking. Gamaredon continuous targeting, Sandworm destructive
      operations, and influence campaigns against Ukrainian
      government, military, and civilian morale all tag here.
    target_sectors:
      - government
      - government/defense-ministry
      - critical-infrastructure
      - energy/electric-power
      - ict/telecom
      - media/journalism
    key_terms:
      - Ukraine
      - protect compatriots
      - Russian-speakers

  - id: ru/russkiy-mir/baltic-and-near-abroad
    name: Baltic states, Moldova, Georgia, Armenia
    summary: |
      Post-Soviet states that remain in or have moved toward the
      Western orbit. Cyber operations include influence campaigns,
      election interference, government intelligence collection,
      and pre-positioning in critical infrastructure.
    target_sectors:
      - government
      - government/election-systems
      - critical-infrastructure
      - civil-society/ngo
    key_terms:
      - near abroad
      - post-Soviet space
      - compatriots

