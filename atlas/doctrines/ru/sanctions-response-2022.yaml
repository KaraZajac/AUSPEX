id: ru/sanctions-response-2022
kind: posture
nation_state_id: ru
name: Post-2022 Sanctions-Response Posture
short_name: Sanctions-Response Posture
issued_by: null  # not formally published; reconstructed from speeches and operational tempo
issued_on: 2022-02-24  # de-facto start with the full-scale Ukraine invasion
status: inferred  # active operational posture; not codified
superseded_by_id: null
inherits_from_ids:
  - ru/nato-ultimatum-2021
  - ru/military-doctrine-2014
official_text_url: null
summary: |
  After February 2022, Russia's cyber program shifted from
  primarily strategic intelligence collection and limited
  disruption toward a broader retaliatory posture incorporating
  criminal and "hacktivist" proxies. Not formally published; the
  posture is reconstructed from Putin speeches, MID statements,
  and observed operational tempo since the full-scale invasion.
  Treasury and DOJ public attributions (CARR Jul 2024, Conti/
  TrickBot Feb/Sep 2023, NoName057(16) Dec 2025) are explicit
  enough to treat the pattern as a working strategic frame.
cyber_relevance: |
  Treats Western sanctions as economic warfare warranting cyber
  response; mobilizes criminal proxies (Conti, Killnet, NoName,
  CARR) as deniable retaliatory force; prioritizes operations
  against states providing Ukraine military aid; disrupts
  sanctions-evasion-relevant chokepoints and aims to erode
  Western public support for Ukraine. Tracks Ukraine aid bills
  (US supplementals, Ramstein meetings) and election cycles in
  NATO states.
pillars:
  - id: ru/sanctions-response-2022/criminal-proxy-mobilization
    name: Criminal-proxy mobilization
    summary: |
      State direction of nominally criminal/hacktivist groups —
      Conti/TrickBot/Wizard Spider (with FSB Center 18 liaison per
      ContiLeaks 2022), Killnet, NoName057(16) (state-sanctioned
      via CISM), CARR (GRU-directed per Treasury Jul 2024) —
      providing deniable retaliatory force.
    target_sectors:
      - government
      - critical-infrastructure
      - finance/banking
      - healthcare/hospital
      - transport/aviation
    key_terms:
      - criminal proxy
      - deniable retaliation
      - Conti
      - Killnet
      - CARR
      - NoName057(16)

  - id: ru/sanctions-response-2022/performative-disruption
    name: Performative disruption of Western CII
    summary: |
      Low-sophistication, high-visibility ICS/HMI manipulation
      and DDoS operations designed for signaling rather than
      strategic effect. CARR US water utility incidents (Muleshoe,
      Abernathy, Stanton TX, 2024) and NoName057(16)'s 1,500+
      DDoS attacks are canonical examples.
    target_sectors:
      - ics/water
      - government
      - critical-infrastructure
    key_terms:
      - performative deterrence
      - HMI manipulation
      - DDoS-for-volunteers
      - DDoSia

  - id: ru/sanctions-response-2022/aid-state-targeting
    name: Targeting of Ukraine-aiding states
    summary: |
      Prioritizes operations against states providing Ukraine
      military aid (Poland, Baltic states, Germany, UK, US).
      German SPD intrusion (May 2024), Czech/Polish targeting,
      Polish railway emergency-radio disruption (Aug 2023) all
      align here.
    target_sectors:
      - government
      - government/defense-ministry
      - government/election-systems
      - transport/rail
      - transport/logistics
    key_terms:
      - aid-state retaliation
      - Polish rail
      - SPD
      - Bundestag

sources:
