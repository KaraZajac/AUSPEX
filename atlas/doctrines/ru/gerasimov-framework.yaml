id: ru/gerasimov-framework
kind: posture
nation_state_id: ru
name: Gerasimov Framework
short_name: Gerasimov Framework
issued_by: Gen. Valery Gerasimov, Chief of the Russian General Staff (informal article)
issued_on: 2013-02-27
status: inferred  # explicitly NOT formal doctrine — see summary
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.vpk-news.ru/articles/14632
summary: |
  Gerasimov's February 2013 article in Voyenno-Promyshlennyy Kurier
  ("The Value of Science in Foresight") is informal — NOT a
  published Kremlin doctrine. Mark Galeotti, who coined the label
  "Gerasimov doctrine," explicitly retracted the term in 2018
  (Foreign Policy, "I'm Sorry for Creating the 'Gerasimov
  Doctrine'"). AUSPEX preserves the framework only as descriptive
  shorthand for integrated hybrid warfare; cite the 2014 Military
  Doctrine for formal authority and the 2021 NSS for current
  emphasis. The article asserts that "the rules of war have
  changed" — non-military means achieve political-strategic goals
  at a 4:1 ratio over conventional force — and treats color
  revolutions as Western-initiated warfare which Russia must mirror.
cyber_relevance: |
  Useful as the proximate articulation of hybrid-warfare doctrine.
  Captures the operational pattern: GRU cyber units, GRU/SVR
  influence operations, FSB active measures, PMC Wagner-style
  proxies, energy coercion, and conventional escalation operating
  as a unified gray-zone toolkit. For AUSPEX tagging, prefer
  ru/military-doctrine-2014 and ru/nss-2021 for formal authority;
  use this entity only for events where reporting explicitly cites
  the Gerasimov framing.
pillars:
  - id: ru/gerasimov-framework/non-military-means
    name: Non-military means at 4:1 ratio
    summary: |
      Gerasimov's central claim that non-military means achieve
      political-strategic goals more effectively than conventional
      force.
    key_terms:
      - non-military means
      - 4:1 ratio
      - rules of war have changed

  - id: ru/gerasimov-framework/hybrid-toolkit
    name: Integrated hybrid-warfare toolkit
    summary: |
      Identifies information confrontation, cyber, special
      operations, and proxy forces as the modern operational mix.
    key_terms:
      - hybrid warfare
      - information confrontation
      - proxy forces

