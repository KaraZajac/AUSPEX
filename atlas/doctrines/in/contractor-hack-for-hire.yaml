summary: |
  Inferred doctrine documenting India's privatized cyber-for-hire
  ecosystem as a parallel lane to state services. Disclosed
  ecosystem participants include BellTroX InfoTech Services (Delhi;
  exposed by Citizen Lab's "Dark Basin" report June 2020; principal
  Sumit Gupta charged in the US in connection with related ops);
  Appin Security Group (Delhi; exposed in Reuters' November 2023
  investigation as a long-running hack-for-hire vendor with global
  client list); CyberRoot Risk Advisory; Inquerest. Customers
  documented across these disclosures include US litigation
  finance firms, Russian oligarchs, multinational corporations,
  and journalists' adversaries — not exclusively or even primarily
  the Indian state.
cyber_relevance: |
  The contractor ecosystem occupies a distinctive editorial
  position: it is Indian-based, draws on Indian talent and
  infrastructure, and exists in the same operational space as
  state services, but its tasking is heavily commercial. AUSPEX
  treats hack-for-hire ops as a separate doctrinal pillar from
  state-aligned regional collection; events attributed to BellTroX
  or Appin clients do not roll up to NCSP 2013 or the regional
  collection doctrine by default.
pillars:
  - id: in/contractor-hack-for-hire/commercial-litigation
    name: Commercial litigation and corporate intelligence
    target_sectors:
      - finance
      - civil-society
      - media/journalism
    summary: |
      Targeting of litigants, journalists, advocacy NGOs, and
      corporate adversaries on behalf of commercial clients.
      The Dark Basin / BellTroX disclosure documents 28,000+
      such targets globally across roughly seven years.

  - id: in/contractor-hack-for-hire/political-espionage
    name: Political and government-adjacent targeting
    target_sectors:
      - government
      - civil-society
    summary: |
      Targeting of government officials and political figures
      where the contractor relationship blurs into state
      tasking. Appin's reported client list per Reuters includes
      both private and government-adjacent customers.

