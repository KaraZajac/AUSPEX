id: in/ncsp-2013
nation_state_id: in
name: National Cyber Security Policy 2013
short_name: NCSP 2013
issued_by: Ministry of Electronics and Information Technology (MeitY)
issued_on: 2013-07-02
status: active  # never formally superseded; successor draft circulated but not promulgated as of 2026
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://www.meity.gov.in/writereaddata/files/downloads/National_cyber_security_policy-2013%281%29.pdf
summary: |
  India's first and (as of 2026) only formally promulgated
  national cyber security policy. Released by the Department of
  Electronics and IT in July 2013 following the 2008 Mumbai
  attacks and the 2011 Aaron Burr-era US Comprehensive National
  Cybersecurity Initiative attention to the same problem set.
  Establishes the NCIIPC (created in statute by the IT Act 2000
  § 70A, operationalized 2014), CERT-In as the nodal CERT, and
  a 500,000-cyber-workforce headline goal. A successor National
  Cybersecurity Strategy was drafted in 2020–2021 by the
  National Security Council Secretariat but as of 2026 has not
  been publicly promulgated.
cyber_relevance: |
  The policy is defensive-postured on its face — workforce,
  CII protection, CERT coordination — and contains no public
  authorization of offensive cyber operations. AUSPEX uses it as
  an editorial anchor for the formal Indian cyber posture while
  treating Indian-aligned offensive activity (SideWinder,
  Patchwork, DoNot, the contractor ecosystem) as governed by
  unpublished tasking authorities rather than this document.
pillars:
  - id: in/ncsp-2013/cii-protection
    name: Critical Information Infrastructure protection
    target_sectors:
      - critical-infrastructure
      - finance/banking
      - ict/telecom
      - government
    summary: |
      Establishes NCIIPC as nodal agency for CII protection
      under IT Act § 70A. Defensive-only on its face; the
      offensive complement is not articulated in the public
      text.
    key_terms:
      - NCIIPC
      - section 70A
      - protected system

  - id: in/ncsp-2013/cyber-workforce
    name: Cyber workforce and skills development
    target_sectors: []
    summary: |
      Headline 500,000-cyber-professional workforce target by
      2018, never met. Mentioned because the contractor ecosystem
      (Appin, BellTroX, others) draws from the same talent pool
      the policy aimed to build.
    key_terms:
      - cyber workforce
      - skill development

sources:
