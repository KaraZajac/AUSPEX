summary: |
  Inferred operational doctrine reconstructed from the sustained
  targeting pattern of SideWinder / Rattlesnake, Patchwork /
  Dropping Elephant, and DoNot Team against Pakistani military
  and government targets, Chinese state and academic targets,
  Afghan government, Sri Lankan government, and Nepalese
  government. Active since at least 2012 (Patchwork) and 2012
  (SideWinder), with substantial volume and continuity. Strategic
  motivation aligns with the Pakistan-China-Afghanistan threat
  picture documented across successive Indian Ministry of External
  Affairs annual reports, Joint Doctrine Indian Armed Forces
  (JDIAF) 2017, and the post-2020 Galwan-incident escalation in
  India-China cyber posture.
cyber_relevance: |
  The principal lens under which AUSPEX tags Indian-aligned
  cyber events. Confidence on individual links is generally
  `strongly_inferred` (target mix is unambiguous) but not
  `attested` (no Indian government statement claims this
  tasking). Where US-government or vendor reporting specifically
  cites Indian government direction, links upgrade accordingly.
pillars:
  - id: in/regional-collection-pakistan-china/pakistan-military
    name: Pakistani military and intelligence collection
    target_sectors:
      - government/defense-ministry
      - government/foreign-ministry
      - defense
    summary: |
      Sustained targeting of Pakistani military, ISI-adjacent,
      and foreign-ministry personnel. SideWinder, Patchwork, and
      DoNot Team all converge on this victim set.

  - id: in/regional-collection-pakistan-china/china-collection
    name: PRC state and academic collection
    target_sectors:
      - government
      - academic/research-lab
      - defense
    summary: |
      Patchwork's PRC-adjacent collection, the SideWinder
      targeting of Chinese academics and research institutes
      (Group-IB 2022), and broader regional cyber activity tied
      to the post-Galwan India-China standoff.

  - id: in/regional-collection-pakistan-china/diplomatic-collection
    name: Regional diplomatic and counterterrorism collection
    target_sectors:
      - government/foreign-ministry
      - civil-society
    summary: |
      Afghan, Sri Lankan, Nepalese, and Bangladeshi government
      targeting documented across Patchwork and SideWinder
      reporting; consistent with Indian regional diplomatic-
      collection priorities.

