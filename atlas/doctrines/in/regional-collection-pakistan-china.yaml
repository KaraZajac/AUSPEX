name: Regional Cyber Collection — Pakistan, Afghanistan, China, Sri Lanka
short_name: IN Regional Cyber Collection
issued_by: inferred from operational pattern; no published Indian text
issued_on: null
status: inferred
superseded_by_id: null
inherits_from_ids: []
