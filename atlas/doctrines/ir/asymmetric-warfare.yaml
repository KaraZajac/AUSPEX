id: ir/asymmetric-warfare
kind: posture
nation_state_id: ir
name: Asymmetric Warfare Doctrine
short_name: Asymmetric Warfare
issued_by: IRGC strategic command; formalized in IRGC writings (2000s)
issued_on: null  # doctrinal foundation since 1980s
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null  # not centralized; IRGC Navy doctrine, Hajizadeh / Salami speeches
summary: |
  Iran's recognition that direct military confrontation with the
  US or Israel is unwinnable has driven a forty-year investment
  in asymmetric capabilities. Cyber sits at the apex of this
  portfolio because of its cost structure, deniability, and
  global reach. Senior IRGC commanders (Hajizadeh, Salami) have
  publicly framed cyber as a domain where Iran can punch above
  its weight; this is the doctrinal logic behind targeting
  Israeli water utilities (April 2020), US dams (Bowman 2013),
  and US financial DDoS (Operation Ababil 2012-13).
cyber_relevance: |
  Asymmetric warfare doctrine authorizes the use of low-cost,
  deniable, scalable cyber tools to harass adversary civilian
  and CII targets, accepting collateral damage to civilians as
  part of an asymmetric calculus against adversaries judged
  guilty of harm to Iran (sanctions, kinetic strikes, support
  for Israel). Aligned with periods of conventional pressure
  (Soleimani killing, Israeli campaigns, 2025 US strikes).
pillars:
  - id: ir/asymmetric-warfare/civilian-cii-coercion
    name: Civilian critical-infrastructure coercion
    target_sectors:
      - critical-infrastructure
      - ics/water
      - healthcare/hospital
      - finance/banking
      - energy
    summary: |
      Tolerance for collateral damage to civilian infrastructure
      (water, finance, healthcare) when targeted asymmetrically
      against adversary civilians. Operationalized in 2012-13
      bank DDoS, 2013 Bowman Dam, 2020 Israeli water OT, 2021
      Boston Children's Hospital, 2023-24 Aliquippa / Unitronics.

  - id: ir/asymmetric-warfare/cost-deniability-leverage
    name: Cost and deniability leverage
    target_sectors:
      - critical-infrastructure
    summary: |
      Cyber chosen specifically because it is low-cost,
      attributable but not provably state-directed (until
      Treasury / DOJ choose to attribute publicly), and difficult
      to retaliate against in kind.

sources:
  - uani/iranian-cyber-threat-structure
  - csis/2024_beyond-hacktivism-iran
