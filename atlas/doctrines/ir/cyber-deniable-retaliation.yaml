id: ir/cyber-deniable-retaliation
kind: posture
nation_state_id: ir
name: Cyber as Deniable Retaliation via Hacktivist / Proxy Fronts
short_name: Cyber-Deniable-Retaliation
issued_by: inferred from operational pattern; no published Iranian text
issued_on: null  # operational doctrine formalized in pattern from 2020 onward
status: inferred  # no published Iranian doctrine; reconstructed from Western attribution
superseded_by_id: null
inherits_from_ids:
  - ir/forward-defense
  - ir/asymmetric-warfare
official_text_url: null
summary: |
  The operational doctrine that makes Iran's other cyber doctrines
  work: laundering IRGC-IO or MOIS operations through a named
  hacktivist persona that posts on Telegram and X, so the regime
  can attack civilian infrastructure (water, hospitals, government
  services) while denying state direction. The doctrine is
  "inferred" — there is no published Iranian text — but the
  pattern is heavily attested through US government piercing of
  the veil: HomeLand Justice → MOIS (September 2022); CyberAv3ngers
  → IRGC-IO (December 2023 / February 2024); Emennet Pasargad's
  "Enemies of the People" → IRGC contractor (November 2021);
  DEV-0270 / Nemesis Kitten → Phosphorus subgroup (Microsoft
  2022).
cyber_relevance: |
  Authorizes the persona stack used to launder destructive,
  coercive, and influence operations. Each persona is matched to
  an adversary: HomeLand Justice for MEK / Albania; CyberAv3ngers
  for Israel-equipment retaliation; Moses Staff for direct anti-
  Israel coercion; Black Shadow for Israeli data-leak extortion;
  Emennet Pasargad for US election interference. Telegram and X
  channels serve as claim-and-leak infrastructure. Synchronized
  to political and military events (Iran-Israel exchanges, MEK
  conferences, US elections, anniversaries).
pillars:
  - id: ir/cyber-deniable-retaliation/persona-laundering
    name: Hacktivist persona laundering
    target_sectors:
      - critical-infrastructure
      - government
      - ics/water
    summary: |
      Conduct destructive or coercive operations behind a
      hacktivist persona to preserve plausible deniability.
      Persona-to-service mapping (attested where indicated):
      HomeLand Justice → MOIS (attested); CyberAv3ngers → IRGC-IO
      (attested); Emennet Pasargad / Enemies of the People → IRGC
      contractor (attested); Moses Staff → Iran-aligned (inferred);
      Black Shadow / DEV-0270 → Phosphorus subgroup (Microsoft).

  - id: ir/cyber-deniable-retaliation/claim-and-leak
    name: Telegram / X claim-and-leak channels
    target_sectors:
      - media
      - media/social-platform
    summary: |
      Use of Telegram and X channels for claim, leak, and
      ideological messaging. Persona Telegram channels function
      as the "ransom note" of state-direction-laundered ops.

  - id: ir/cyber-deniable-retaliation/diaspora-targeting
    name: Diaspora and dissident targeting
    target_sectors:
      - civil-society/diaspora
      - civil-society/dissident
      - media/journalism
    summary: |
      Use of personas and credential-theft campaigns to harass
      Iranian diaspora journalists, dissidents, and human-rights
      activists — adjacent to APT35 / APT42 / APT39 operations
      but executed behind anonymous personas where state
      attribution would be politically costly.

sources:
