id: ir/sanctions-evasion
kind: strategy
nation_state_id: ir
name: Sanctions Evasion as State Policy (Resistance Economy)
short_name: Sanctions Evasion
issued_by: Supreme Leader Khamenei; articulated as "Resistance Economy" from 2014
issued_on: 2014-02-19  # Khamenei "Resistance Economy" general policies issuance
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://english.khamenei.ir/
summary: |
  Khamenei's "Resistance Economy" framework and every annual
  Nowruz "Year of …" designation since 2018 establish economic
  self-sufficiency, production growth, and sanctions resilience
  as doctrinal priorities. Cyber operations that look financial
  (Pay2Key, Pioneer Kitten ransomware affiliate work, Najee
  Technology / Afkar System ransomware, IRGC-linked crypto
  shadow-banking) are simultaneously sanctions-evasion revenue
  and asymmetric harassment — the regime accepts no clean
  separation. Maximum-pressure sanctions reinstated February
  2025 (NSPM-2) and JCPOA snapback in 2025 increase the doctrinal
  weight of this pillar.
cyber_relevance: |
  Authorizes cyber-enabled revenue generation (ransomware, crypto
  laundering), IP theft from Western industries with import-
  substitution potential (aerospace, petrochemicals,
  semiconductors), and cyber support for sanctions-evasion
  infrastructure (Zedcex / Zedxion crypto exchanges, shadow-
  banking networks designated by OFAC).
pillars:
  - id: ir/sanctions-evasion/crypto-laundering
    name: Crypto laundering and shadow-banking
    target_sectors:
      - finance/crypto-exchange
      - finance/crypto-custody
      - finance/banking
    summary: |
      Cyber-enabled crypto sanctions-evasion infrastructure:
      IRGC-linked exchanges (Zedcex / Zedxion, designated Jan 2026),
      mixers, and shadow-banking front companies in HK/UAE
      (Sept 2025 OFAC $600M designation). Chainalysis tracked
      Iranian wallet flows at $7.8B in 2025.
    key_terms:
      - resistance economy
      - shadow banking
      - crypto laundering
      - SDN evasion

  - id: ir/sanctions-evasion/ransomware-revenue
    name: Ransomware-for-revenue
    target_sectors:
      - healthcare/hospital
      - government/local
      - ict/managed-services
      - finance/banking
    summary: |
      Ransomware operations conducted by IRGC-affiliated
      contractors (Najee Technology, Afkar System, Pioneer Kitten /
      Fox Kitten, Pay2Key / Pay2Key.I2P) treated as both revenue
      generation and asymmetric harassment of adversary CII.
      Boundary between state-direction and tolerated cybercrime
      is deliberately blurred.

  - id: ir/sanctions-evasion/ip-import-substitution
    name: IP theft for import substitution
    target_sectors:
      - aerospace
      - aerospace/civil
      - chemicals
      - ict/semiconductors
    summary: |
      APT33 aerospace and petrochemical collection (2014-15
      Saudi/South Korean firms) and broader Iranian IP collection
      against sanctioned-technology sectors fall under this pillar.

  - id: ir/sanctions-evasion/year-of-designation
    name: Annual Khamenei "Year of …" priority alignment
    target_sectors: []
    summary: |
      Khamenei's Nowruz "Year of …" designations align IRGC,
      MOIS, and contractor tasking with stated annual economic
      priorities. Sample designations: 1402 (March 2023-March 2024)
      "Inflation Control, Growth in Production"; 1403 (March 2024-
      March 2025) "Surge in Production Through People's
      Participation."

sources:
