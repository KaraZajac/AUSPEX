id: ir/forward-defense
kind: posture
nation_state_id: ir
name: Forward Defense / Mosaic Defense
short_name: Forward Defense
issued_by: IRGC senior command (Qasem Soleimani, Mohammad Bagheri); reaffirmed by Khamenei
issued_on: null  # evolutionary; "forward" layer elaborated c. 2012
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null  # no single doctrinal document
summary: |
  Defa-e Pishdastane ("Forward Defense") holds that Iran's
  geographic and conventional inferiority versus Israel and the
  United States requires fighting at maximum range, through
  partners and proxies, so that conflict never reaches Iranian
  soil. The "mosaic" element — drawn from Iran-Iraq war doctrine
  — adds that capability must be distributed so that no single
  decapitation strike can disable it. Cyber operations fit this
  doctrine cleanly: they project Iranian power into adversary
  networks at near-zero physical risk, exploit deniability via
  hacktivist personas and contractor fronts, and survive when
  individual operators are exposed.
cyber_relevance: |
  Every IRGC and MOIS cyber operation against Israeli or US
  critical infrastructure can be read as the cyber expression of
  forward defense. Decentralized, deniable capabilities (the
  contractor ecosystem and hacktivist personas) are the
  "mosaic" of the doctrine in cyber form. Intensifies during
  nuclear-file confrontations and after kinetic Israeli strikes.
pillars:
  - id: ir/forward-defense/proxy-projection
    name: Proxy and partner projection
    target_sectors:
      - critical-infrastructure
      - government
      - government/defense-ministry
      - defense/contractor
    summary: |
      Engage adversaries through proxies and partner organizations
      so conflict does not reach Iranian soil. Cyber tasking against
      Israeli and US allies in the region falls under this pillar.
    key_terms:
      - long arm strategy
      - proxy network
      - extraterritorial action

  - id: ir/forward-defense/mosaic-resilience
    name: Mosaic decentralized capability
    target_sectors:
      - critical-infrastructure
    summary: |
      Maintain decentralized, deniable capabilities resilient to
      leadership decapitation. The contractor ecosystem and
      hacktivist persona stack (CyberAv3ngers, HomeLand Justice,
      Moses Staff, Black Shadow) is the cyber-domain instantiation
      of mosaic doctrine.
    key_terms:
      - decentralized cells
      - deniable capability
      - contractor ecosystem

  - id: ir/forward-defense/integrated-asymmetric-portfolio
    name: Integrated cyber / drone / missile / maritime portfolio
    target_sectors:
      - critical-infrastructure
      - energy
      - ics/water
      - finance
    summary: |
      Treat cyber, drones, ballistic missiles, and maritime
      swarming as one integrated asymmetric portfolio. Cyber
      operations are sequenced with kinetic options against the
      same adversary set.

sources:
  - iramcenter/forward-defense-doctrine
  - jiss/2024_mosaic-defense-real-test
  - cfr/irgc-backgrounder
