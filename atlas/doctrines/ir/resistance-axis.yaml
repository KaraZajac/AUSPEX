id: ir/resistance-axis
kind: posture
nation_state_id: ir
name: Axis of Resistance
short_name: Resistance Axis
issued_by: Supreme Leader's office; institutionalized under Quds Force / Soleimani
issued_on: null  # in continuous regime usage since late 1990s
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null  # regime framing on khamenei.ir; no consolidated charter
summary: |
  Mehvar-e Moghavemat — Iran's regional alliance structure built
  around shared anti-Israel, anti-US, and anti-Saudi posture.
  Component organizations include Hezbollah (Lebanon), Iraqi
  Popular Mobilization Forces, the Houthis (Ansar Allah, Yemen),
  Hamas and Palestinian Islamic Jihad, Syrian regime remnants
  post-Assad fall, and assorted aligned militias. After the
  kinetic degradation of Hezbollah and Hamas in 2023-25 and the
  fall of the Assad regime, cyber capability transfer and joint
  cyber tasking against Israel and US interests have plausibly
  grown in relative importance.
cyber_relevance: |
  The Axis-of-Resistance doctrine drives (1) IRGC-Quds Force
  capacity building of Hezbollah's cyber unit (Lebanese Cedar /
  Volatile Cedar), (2) coordinated information operations across
  Persian/Arabic/English Telegram and X channels, and (3) joint
  tasking against Israel from multiple Axis-aligned hacktivist
  personas. Severely stressed by 2023-25 events; cyber may be
  the rebuilding axis.
pillars:
  - id: ir/resistance-axis/proxy-cyber-transfer
    name: Cyber capability transfer to partners
    target_sectors:
      - ict/telecom
      - government
    summary: |
      Transfer of cyber tooling, training, and infrastructure to
      Hezbollah's cyber unit and aligned actors. Documented in
      Check Point's Lebanese Cedar / Volatile Cedar reporting and
      Iran International's April 2022 investigation.
    key_terms:
      - Hezbollah cyber
      - Volatile Cedar
      - Lebanese Cedar

  - id: ir/resistance-axis/information-warfare
    name: Multilingual information warfare
    target_sectors:
      - media
      - media/social-platform
      - civil-society
    summary: |
      Pro-Resistance influence operations across Arabic, English,
      Persian, Spanish, French media; coordination of Telegram
      amplification with Axis-aligned channels during Israel-Iran
      and Israel-Hezbollah exchanges.

  - id: ir/resistance-axis/anti-israel-coercion
    name: Coordinated anti-Israel coercive cyber
    target_sectors:
      - critical-infrastructure
      - ics/water
      - healthcare/hospital
      - finance/banking
    summary: |
      Joint or sequenced cyber operations against Israeli targets
      across IRGC, MOIS, and Hezbollah-linked actors. Includes
      hacktivist-persona-laundered destructive ops (Moses Staff,
      Black Shadow, CyberAv3ngers).

sources:
