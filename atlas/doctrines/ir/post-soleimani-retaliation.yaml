id: ir/post-soleimani-retaliation
kind: event-anchor
nation_state_id: ir
name: Post-Soleimani Retaliation Posture
short_name: Post-Soleimani Retaliation
issued_by: Supreme Leader Khamenei; IRGC commanders; DOJ-codified Sept 2024
issued_on: 2020-01-03  # date of US strike that killed Qasem Soleimani
status: active
superseded_by_id: null
inherits_from_ids:
  - ir/constitutional-irgc-role
official_text_url: null  # Khamenei statements via khamenei.ir; no single text
summary: |
  The January 3, 2020 US strike that killed IRGC-Quds Force
  commander Qasem Soleimani created an enduring, openly-stated
  revenge obligation. Khamenei and successive IRGC commanders
  have publicly maintained this posture; the September 27, 2024
  DOJ indictment of three IRGC cyber actors (Masoud Jalili,
  Seyyed Ali Aghamiri, Yaser Balaghi) explicitly states the
  activity "advance[s] the malign activities of the IRGC,
  including ongoing efforts to avenge the death of Qasem
  Soleimani" — making this one of the few cyber-relevant
  doctrines where a US government attestation has codified the
  strategic motive in a criminal indictment.
cyber_relevance: |
  Authorizes IRGC and IRGC-IO cyber targeting of (a) former
  Trump-administration officials, military officers, and IRGC
  adversaries (Pompeo, Brian Hook, John Bolton, Esper);
  (b) US political figures and campaign infrastructure under
  a "discord and revenge" framework; (c) persistent credential-
  phishing against journalists who reported on Soleimani.
  Anniversary periods (early January) see surges in operational
  tempo.
pillars:
  - id: ir/post-soleimani-retaliation/named-official-targeting
    name: Named former-official and adversary targeting
    target_sectors:
      - government
      - government/civilian
      - civil-society/think-tank
      - media/journalism
    summary: |
      APT35 / APT42 persistent credential-phishing against named
      former Trump-administration officials and military officers
      identified with the Soleimani strike decision.

  - id: ir/post-soleimani-retaliation/electoral-discord
    name: Electoral discord and hack-and-leak
    target_sectors:
      - government/election-systems
      - civil-society
      - media/journalism
    summary: |
      The 2020 Emennet Pasargad voter-intimidation operation
      and the 2024 IRGC trio hack-and-leak against the Trump
      campaign — both attested in DOJ indictments — operationalize
      this pillar.

  - id: ir/post-soleimani-retaliation/journalist-targeting
    name: Soleimani-coverage journalist targeting
    target_sectors:
      - media/journalism
      - civil-society/diaspora
    summary: |
      Persistent credential-phishing and surveillance of
      journalists who reported on Soleimani or who cover IRGC /
      Quds Force activity (BBC Persian, Iran International, VOA
      Persian).

sources:
