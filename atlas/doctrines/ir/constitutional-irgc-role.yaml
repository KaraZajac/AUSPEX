id: ir/constitutional-irgc-role
nation_state_id: ir
name: Constitutional Role of the IRGC (Article 150)
short_name: Article 150
issued_by: Constituent Assembly (1979 Constitution); expanded by 1992 IRGC Law
issued_on: 1979-12-03  # adoption of the 1979 Constitution
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://irandataportal.syr.edu/wp-content/uploads/2013/11/Constitution.pdf
summary: |
  Article 150 of the 1979 Constitution mandates the IRGC to
  "safeguard the Revolution and its achievements." This clause —
  combined with the 1992 IRGC Law and successive interpretations
  — is the legal source code for extraterritorial IRGC action,
  the establishment of a parallel intelligence service (IRGC-IO)
  separate from MOIS, and the IRGC's commercial entities (Khatam
  al-Anbiya) and contractor fronts that perform cyber tasking.
cyber_relevance: |
  The constitutional role is the doctrinal source for everything
  from extraterritorial assassination to credential-phishing
  journalists who criticize the Supreme Leader. The dual-
  intelligence structure (IRGC-IO alongside MOIS) deliberately
  creates competing services, which is why parallel actor
  clusters exist (CyberAv3ngers under IRGC-IO; HomeLand Justice
  under MOIS) running similar destructive-leak operations.
pillars:
  - id: ir/constitutional-irgc-role/regime-preservation
    name: Regime preservation and counter-dissident
    target_sectors:
      - civil-society/dissident
      - civil-society/diaspora
      - media/journalism
      - civil-society/ngo
    summary: |
      Authorizes surveillance, intimidation, and credential theft
      against dissidents, diaspora, journalists, and any actor
      judged hostile to the Revolution. APT39 / Rana Intelligence
      Computing, APT35 / Charming Kitten, and APT42 operations
      align here.

  - id: ir/constitutional-irgc-role/parallel-intelligence
    name: Parallel intelligence apparatus
    target_sectors:
      - government
      - government/intelligence
    summary: |
      Authorizes IRGC-IO as a parallel intelligence service to
      MOIS. The dual structure produces competing actor clusters
      and the persona pattern (CyberAv3ngers vs. HomeLand Justice).

  - id: ir/constitutional-irgc-role/commercial-cover
    name: Commercial and contractor cover
    target_sectors:
      - ict
      - ict/security
    summary: |
      Provides legal cover for IRGC commercial entities (Khatam
      al-Anbiya) and contractor fronts (Najee Technology, Afkar
      System, Emennet Pasargad, Mehrsam Andisheh Saz Nik) that
      perform cyber tasking on behalf of state services.

sources:
