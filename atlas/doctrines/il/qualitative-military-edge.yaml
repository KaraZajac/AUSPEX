id: il/qualitative-military-edge
nation_state_id: il
name: Qualitative Military Edge (QME)
short_name: QME
issued_by: Israeli national-security doctrine (operative since 1960s); codified bilaterally by US Naval Vessel Transfer Act of 2008 and the US-Israel Strategic Partnership Act of 2014
issued_on: 2008-10-15  # US Naval Vessel Transfer Act of 2008 signed into law (P.L. 110-429); QME definition written into statute
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: https://sgp.fas.org/crs/mideast/R46580.pdf
summary: |
  The Qualitative Military Edge doctrine holds that Israel must
  maintain a decisive capability advantage over any plausible
  combination of regional adversaries, sufficient to defeat any
  conventional military threat while sustaining minimal damage
  and casualties. Operative as Israeli policy since the 1960s;
  codified in US law via Section 201 of the Naval Vessel Transfer
  Act of 2008 (P.L. 110-429) and reinforced by the US-Israel
  Strategic Partnership Act of 2014, which require quadrennial
  QME assessments and prohibit US arms sales to other Middle
  Eastern states that would adversely affect Israel's QME. Drives
  the high baseline of Israeli investment in technological
  collection, electronic warfare, cyber, and precision strike.
cyber_relevance: |
  QME is the doctrinal frame under which Israel sustains its
  outsized cyber-capability investment: Unit 8200 as a peer-of-NSA
  SIGINT organization; Unit 81 as a hardware/tooling R&D arm
  whose alumni seed the commercial cyber sector; the Mossad
  cyber units. QME explains why a state of 9.7 million people
  fields a cyber program comparable to those of states an order
  of magnitude larger. Operationally, QME is the implicit frame
  for cyber operations against regional military programs
  (Iranian missile and drone manufacturing, Hezbollah C2,
  Hamas command networks) where the doctrinal logic is
  "preserve the conventional gap by any technical means."
pillars:
  - id: il/qualitative-military-edge/technological-collection
    name: Technological-collection supremacy
    summary: |
      Maintain best-in-region (and competitive with US/UK/AU/CA/NZ)
      SIGINT, ELINT, MASINT, and cyber-CNE collection capability.
      Unit 8200 and Unit 81 are the institutional embodiments.
    target_sectors:
      - government
      - government/foreign-ministry
      - government/defense-ministry
      - defense
      - defense/contractor
      - ict/telecom
      - ict/telecom/carrier
    key_terms:
      - SIGINT
      - technological collection
      - cyber espionage

  - id: il/qualitative-military-edge/counter-proliferation
    name: Counter-proliferation collection and action
    summary: |
      Collection and (where authorized) action against regional WMD
      and missile-program development. Tightly coupled to the Begin
      Doctrine but framed under QME for force-posture and budget
      decisions.
    target_sectors:
      - energy/nuclear
      - defense
      - ics/manufacturing
      - government/defense-ministry
    key_terms:
      - counter-proliferation
      - WMD interdiction
      - missile-program collection

  - id: il/qualitative-military-edge/counter-iran-program
    name: Counter-Iran (as principal regional military challenge)
    summary: |
      Sustained collection and disruption posture against Iran's
      nuclear, missile, drone, and proxy-supply programs. The
      operational center of gravity for Israeli cyber action
      since at least the early 2000s.
    target_sectors:
      - energy/nuclear
      - defense
      - government
      - finance
      - finance/banking
      - finance/crypto-exchange
      - ics/manufacturing
      - ics/water
      - transport/maritime
    key_terms:
      - counter-Iran
      - Forward Defense disruption
      - sanctions-evasion targeting

