id: il/begin-doctrine
kind: posture
nation_state_id: il
name: Begin Doctrine (counter-WMD preemption)
short_name: Begin Doctrine
issued_by: Prime Minister Menachem Begin (post-Osirak speech, 8 June 1981); reaffirmed by every successor Prime Minister
issued_on: 1981-06-08  # post-Osirak Begin statement of the doctrine
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null  # no single doctrinal document; doctrine is established by Begin's 1981 statement and successor reaffirmations
summary: |
  The Begin Doctrine holds that Israel will not permit any hostile
  state in its region to acquire weapons of mass destruction —
  particularly nuclear weapons — and reserves the right to act
  preemptively, including without prior coordination with allies,
  to prevent such acquisition. Established by Begin's post-strike
  statement after the 7 June 1981 Operation Opera airstrike on
  Iraq's Osirak reactor; reaffirmed kinetically by Operation
  Orchard (6 September 2007 strike on Syria's Al-Kibar reactor)
  and by the June 2025 Twelve-Day War strikes on Iran's Natanz,
  Fordow, and Isfahan facilities. The doctrine functions as
  Israel's master frame for counter-proliferation action: military
  strike when feasible, sabotage when not, accept strategic risk
  rather than tolerate a regional nuclear adversary.
cyber_relevance: |
  Stuxnet (2009-2010, joint US-Israeli, journalistically attributed
  to NSA TAO + Unit 8200 / Mossad), Flame (2012, WaPo attribution
  to a joint US-Israeli SIGINT-collection program), Duqu (2011,
  Tilded Platform reconnaissance), and Gauss (2012, Lebanese
  banking) collectively constitute the cyber extension of the
  Begin Doctrine: counter-WMD action by code where kinetic options
  are politically or geographically constrained. The doctrine is
  the load-bearing frame for attributing Israeli (and Israel-
  aligned) destructive cyber operations against Iranian nuclear
  infrastructure, IRGC missile programs, and supporting industry.
  AUSPEX treats Israeli destructive cyber operations against
  Iranian WMD-related programs as Begin-Doctrine-aligned with
  high confidence even where formal Israeli attestation is absent.
pillars:
  - id: il/begin-doctrine/preemptive-strike
    name: Preemptive kinetic strike on WMD facilities
    summary: |
      The kinetic-strike pillar: Osirak 1981, Al-Kibar 2007,
      Natanz/Fordow/Isfahan June 2025. Cyber operations sequence
      with and prepare the operating environment for these strikes
      (air-defense degradation, command-and-control disruption,
      C4ISR collection on target).
    target_sectors:
      - energy/nuclear
      - government/defense-ministry
      - defense
    key_terms:
      - preemptive strike
      - counter-proliferation
      - Osirak
      - Al-Kibar

  - id: il/begin-doctrine/counter-wmd-cyber-sabotage
    name: Counter-WMD cyber sabotage
    summary: |
      The cyber-sabotage pillar: code-as-strike when kinetic
      action is politically or operationally infeasible.
      Stuxnet (Iranian IR-1 centrifuges at Natanz), Flame
      (long-haul SIGINT collection across Iranian nuclear-program
      personnel and infrastructure), and the Predatory Sparrow
      operations against Iranian steel, fuel, and financial
      infrastructure all sit under this pillar at varying
      doctrine-link confidence.
    target_sectors:
      - energy/nuclear
      - ics/manufacturing
      - government
      - government/defense-ministry
    key_terms:
      - cyber sabotage
      - counter-WMD
      - code-as-strike
      - Stuxnet
      - Olympic Games

  - id: il/begin-doctrine/no-tolerance-regional-nuclear
    name: No-tolerance posture for regional nuclear acquisition
    summary: |
      The strategic-frame pillar: Israel will not coexist with a
      regional adversary that has acquired or is about to acquire
      a nuclear weapon. Operational implication for cyber: persistent
      collection against any state in the region pursuing a fuel
      cycle or weapons design, plus persistent sabotage pressure
      where pursuit is judged advanced.
    target_sectors:
      - government
      - government/foreign-ministry
      - energy/nuclear
      - defense
    key_terms:
      - regional nuclear monopoly
      - existential threat
      - non-tolerance

