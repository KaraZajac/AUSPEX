id: il/counter-resistance-axis
nation_state_id: il
name: Counter-Resistance-Axis posture (Hezbollah / Hamas / Houthi targeting)
short_name: Counter-Resistance-Axis
issued_by: Israeli national-security establishment; operative war-footing posture post-7-October-2023
issued_on: 2023-10-07  # operationally activated by the Hamas attack
status: active
superseded_by_id: null
inherits_from_ids:
  - il/counter-iran-posture
official_text_url: null
summary: |
  Operational posture treating the Iran-supplied Resistance Axis
  — Hamas and Palestinian Islamic Jihad in Gaza, Hezbollah in
  Lebanon, the Houthi (Ansar Allah) movement in Yemen, the Popular
  Mobilization Forces and Kataib Hezbollah in Iraq, Syrian regime
  residues and Iran-aligned Syrian militias — as a single multi-
  theater adversary set requiring continuous cyber-and-SIGINT
  collection plus active disruption coordinated with kinetic
  operations. Operative in some form since the 2006 Lebanon War;
  on full war footing since 7 October 2023, when Hamas's attack
  on Israel triggered a multi-front war that as of 2026 has
  produced direct IL-Hezbollah exchanges (the September 2024
  pager / walkie-talkie operations, the Beirut southern-suburbs
  strikes, the Nasrallah killing), direct IL-Houthi exchanges,
  and direct IL-IR strikes (April 2024, October 2024, June 2025).
cyber_relevance: |
  Cyber and SIGINT collection on Resistance-Axis command,
  logistics, and finance is the load-bearing capability behind
  Israeli high-tempo kinetic operations post-Oct-7. The
  September 2024 pager / walkie-talkie supply-chain operation
  against Hezbollah, attributed by multi-source journalism to
  Israel, sits at the cyber-supply-chain end of this posture
  even though its kinetic payload was conventional. Counter-
  Hamas cyber activity includes long-running collection on
  Hamas military-wing command, financial flows, and external-
  operations infrastructure; counter-Hezbollah includes long-
  running collection on the Iran-Lebanon supply corridor;
  counter-Houthi has emerged as a distinct strand post-2024
  given Houthi maritime-attack escalation.
pillars:
  - id: il/counter-resistance-axis/hezbollah-targeting
    name: Counter-Hezbollah cyber and SIGINT operations
    summary: |
      Long-running collection on Hezbollah military command,
      Hezbollah-IRGC liaison, the Iran-Lebanon supply corridor,
      and Hezbollah-affiliated finance. Sharply escalated in
      tempo September-October 2024 around the
      pager/walkie-talkie operations and Nasrallah killing.
    target_sectors:
      - government
      - defense
      - ict/telecom
      - ict/telecom/carrier
      - finance
      - finance/banking
    key_terms:
      - Hezbollah collection
      - Iran-Lebanon corridor
      - C2 disruption

  - id: il/counter-resistance-axis/hamas-targeting
    name: Counter-Hamas cyber and SIGINT operations
    summary: |
      Collection and disruption against Hamas military wing
      (Izz ad-Din al-Qassam Brigades), Hamas external operations,
      and Hamas financial flows including crypto. Failed to
      anticipate the 7 October 2023 attack; intensified post-
      Oct-7.
    target_sectors:
      - government
      - defense
      - finance/crypto-exchange
      - finance/banking
      - ict/telecom
    key_terms:
      - Hamas C2 targeting
      - hostage tracking
      - finance interdiction

  - id: il/counter-resistance-axis/houthi-targeting
    name: Counter-Houthi cyber operations
    summary: |
      Newer strand post-2024 driven by Houthi maritime-attack
      escalation (Red Sea shipping interdiction, Israeli-port
      missile attacks). Cyber posture includes collection on
      Houthi C2, the Iran-Yemen weapons-supply chain, and
      finance.
    target_sectors:
      - transport/maritime
      - defense
      - ict/telecom
      - government
    key_terms:
      - Ansar Allah collection
      - Red Sea
      - Iran-Yemen supply chain

  - id: il/counter-resistance-axis/lebanon-syria-collection
    name: Lebanon-Syria collection environment
    summary: |
      Sustained collection on the Lebanon-Syria operating
      environment as the geographic corridor between Iran and
      Israel's northern border. Includes Syrian regime and
      post-regime residues, Iran-aligned Syrian militias, and
      civilian telecom infrastructure used by Iran for command
      relay.
    target_sectors:
      - government
      - ict/telecom
      - ict/telecom/carrier
      - defense
    key_terms:
      - Lebanon-Syria collection
      - corridor surveillance
      - Iran command relay

sources:
  - state/2023_country-reports-terrorism-israel
  - inss/lions-roar-conclusions
  - atlanticcouncil/2024-04-13_iran-attack-israel-true-promise
