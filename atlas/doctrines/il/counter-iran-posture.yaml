id: il/counter-iran-posture
nation_state_id: il
name: Counter-Iran cyber posture
short_name: Counter-Iran posture
issued_by: Israeli national-security establishment (inferred from successive Prime Minister, Mossad, and IDF statements); not codified in a single public doctrine document
issued_on: null  # operative since c. 2002 (Iran-nuclear-file salience); intensified 2010, 2018, 2023
status: active
superseded_by_id: null
inherits_from_ids:
  - il/begin-doctrine
  - il/qualitative-military-edge
official_text_url: null
summary: |
  Operational Israeli posture treating the Islamic Republic of Iran
  — its nuclear program, ballistic missile and drone production,
  IRGC and Quds Force, and the Iran-supplied Resistance Axis
  partners — as the principal long-term cyber adversary. Operative
  in some form since the early 2000s when the Iranian nuclear file
  became salient; intensified in three steps:
    (1) 2009-2010 Stuxnet operation against IR-1 centrifuges at
        Natanz, marking the operational debut of counter-WMD-cyber;
    (2) May 2018 US withdrawal from the JCPOA, ending the
        de-escalation interregnum and returning Israeli cyber
        posture to overt counter-program tempo;
    (3) 7 October 2023 onward, with Iran-supported Hamas attack
        followed by April 2024 and October 2024 IR-IL direct
        kinetic exchanges and the 13-24 June 2025 Twelve-Day War.
  Not formally published; reconstructed from successive
  Prime Minister speeches, INSS / RUSI / CSIS strategic-studies
  analysis, and post-event Israeli media disclosure.
cyber_relevance: |
  Almost every publicly attributed Israeli offensive cyber operation
  since 2009 fits under this posture: the Olympic Games team
  (Stuxnet 2009-10, Duqu 2011, Flame 2012, Gauss 2012); Predatory
  Sparrow / Gonjeshke Darande (Iranian fuel network 2021/2023,
  Khuzestan Steel 2022, Nobitex 2025, Bank Sepah 2025); the
  October 2024 strikes' cyber-kinetic coupling; collection
  against IRGC officers and contractor firms (Najee, Afkar,
  Emennet Pasargad). Counter-program targeting includes the
  Iranian missile / drone supply chain, the IRGC financial-and-
  logistics network, and Iranian-supported proxy command-and-
  control infrastructure in Lebanon, Syria, and Yemen.
pillars:
  - id: il/counter-iran-posture/counter-nuclear-program
    name: Counter-nuclear-program disruption
    summary: |
      Cyber action against Iran's enrichment, weapons design, and
      supporting industrial infrastructure. Stuxnet is the type
      specimen; subsequent operations against centrifuge-supply
      industries and metallurgy (Khuzestan Steel 2022, framed by
      vendor analysts as resource-denial against missile / nuclear
      programs) are continuations.
    target_sectors:
      - energy/nuclear
      - ics/manufacturing
      - defense
      - government/defense-ministry
    key_terms:
      - centrifuge sabotage
      - Natanz
      - Fordow
      - counter-enrichment

  - id: il/counter-iran-posture/counter-resistance-axis-proxies
    name: Counter-Resistance-Axis proxy disruption
    summary: |
      Cyber action against Iran-supplied proxies — Hezbollah,
      Hamas, the Houthis, Kataib Hezbollah and other Iraqi
      militias, Iranian-aligned Syrian assets. Includes collection,
      pre-positioning, and selective disruption coordinated with
      kinetic operations.
    target_sectors:
      - government
      - defense
      - ict/telecom
      - ict/telecom/carrier
      - finance
      - finance/banking
    key_terms:
      - Hezbollah disruption
      - Hamas C2 targeting
      - proxy interdiction

  - id: il/counter-iran-posture/counter-irgc-operations
    name: Counter-IRGC (and IRGC-IO) operations
    summary: |
      Targeting the IRGC and its Intelligence Organization as
      institutions: officer collection, contractor-firm
      identification (Najee Technology, Afkar System, Emennet
      Pasargad), and disruption of IRGC-affiliated financial
      and logistics networks. The cyber complement to Mossad
      HUMINT operations against IRGC officers.
    target_sectors:
      - government
      - government/defense-ministry
      - defense
      - finance
      - finance/banking
    key_terms:
      - IRGC counter-targeting
      - contractor identification
      - Quds Force collection

  - id: il/counter-iran-posture/retaliatory-cyber-strike
    name: Retaliatory and tit-for-tat cyber strike
    summary: |
      Public-facing destructive operations against Iranian
      civilian and dual-use infrastructure (fuel-station network
      October 2021 and December 2023, Khuzestan steel mill
      June 2022, Sepah Bank and Nobitex crypto-exchange June
      2025) framed by the operator persona as retaliation for
      Iranian provocations. Operates at the edge of the QME and
      Begin Doctrine frames; explicitly above the line in tempo
      after major Iranian / Iran-proxy actions.
    target_sectors:
      - energy/oil-gas
      - transport/rail
      - ics/manufacturing
      - finance/banking
      - finance/crypto-exchange
    key_terms:
      - tit-for-tat
      - Predatory Sparrow
      - Gonjeshke Darande
      - retaliatory cyber

