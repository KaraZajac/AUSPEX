id: vn/resolution-29-nqtw
nation_state_id: vn
name: Politburo Resolution 29-NQ/TW on Cybersecurity Tasks (2018)
short_name: Resolution 29-NQ/TW
issued_by: Politburo of the Communist Party of Vietnam (12th Central Committee)
issued_on: 2018-07-25
status: active
superseded_by_id: null
inherits_from_ids: []
official_text_url: null  # not published in full; Vietnamese-language summaries via Nhân Dân / Tạp chí Cộng sản
summary: |
  Politburo resolution issued in 2018 setting out cybersecurity
  tasks to 2025 with a vision to 2030. Issued in tandem with the
  National Assembly's Cybersecurity Law (Law 24/2018/QH14, passed
  12 June 2018, effective 1 January 2019). The resolution is the
  Party-level political-line statement under which the Cybersecurity
  Law and subsequent Ministry of Information and Communications
  decrees take their authority. Full text is not publicly
  available — content is summarized in Party press (Nhân Dân, Tạp
  chí Cộng sản) and the Government Portal.
cyber_relevance: |
  Establishes "cybersovereignty" (chủ quyền không gian mạng) as a
  national-security category, authorizing the security services
  (MPS A05, TC2) to conduct domestic monitoring of "information
  used to incite, divide, or oppose the Party and State." This is
  the bureaucratic hook that licenses A05's domestic and diaspora
  dissident-targeting operations and frames external cyber
  collection as protection of "cybersovereignty." External
  commercial-IP collection — APT32's automotive and aerospace
  targeting — is not directly authorized by the resolution but
  fits comfortably under the broader "Industry 4.0 catch-up"
  framing the Party has used since 2017.
pillars:
  - id: vn/resolution-29-nqtw/cybersovereignty
    name: Cybersovereignty and content control
    summary: |
      Defines cybersovereignty as a national-security domain;
      requires foreign platforms to store Vietnamese user data
      domestically and to remove "anti-state" content on
      government request. Operationalized via the Cybersecurity
      Law 2018 (Articles 8, 26).
    target_sectors:
      - media/social-platform
      - civil-society/dissident
      - civil-society/diaspora
    key_terms:
      - chủ quyền không gian mạng
      - cybersovereignty
      - data localization

  - id: vn/resolution-29-nqtw/regime-stability-surveillance
    name: Regime-stability surveillance
    summary: |
      Tasks security services with monitoring "hostile forces"
      online — a category that explicitly includes overseas
      Vietnamese opposition groups (Viet Tan being the canonical
      target) and domestic labor / land-rights activists. The
      pillar lines up with the operational profile of A05 and
      with APT32 targeting of Vietnamese-language civil-society
      organizations abroad.
    target_sectors:
      - civil-society/diaspora
      - civil-society/dissident
      - media/journalism
    key_terms:
      - hostile forces
      - thế lực thù địch
      - Viet Tan

