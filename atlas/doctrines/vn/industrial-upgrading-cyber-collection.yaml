id: vn/industrial-upgrading-cyber-collection
kind: posture
nation_state_id: vn
name: Cyber Collection in Service of Industrial Upgrading
short_name: VN Industrial Cyber Collection
issued_by: inferred from operational pattern; no published Vietnamese text
issued_on: null
status: inferred
superseded_by_id: null
inherits_from_ids: []
official_text_url: null
summary: |
  Inferred operational doctrine reconstructed from the targeting
  pattern of APT32 / OceanLotus and adjacent Vietnamese-aligned
  clusters between 2014 and the present. The pattern: sustained
  intrusion campaigns against foreign automotive and aerospace
  manufacturers (Volkswagen, Toyota, Hyundai, Honda, BMW, Daimler),
  Vietnam-adjacent ASEAN governments, and select multinationals
  with Vietnamese factory operations. Aligns to the Communist
  Party of Vietnam's stated "Industry 4.0" / industrial-upgrading
  priorities articulated through Resolution 52-NQ/TW (2019) and
  the 13th Congress documents (2021), though no Vietnamese
  primary source attests to a directed cyber-collection function.
cyber_relevance: |
  Provides the editorial lens under which APT32's automotive and
  aerospace targeting is tagged. Confidence on individual event
  links to this doctrine should generally be `strongly_inferred`
  or `plausible` — there is no Vietnamese-source attestation
  analogous to MIC2025 for PRC events. Western vendor reporting
  (Mandiant 2017, Cybereason 2017, ESET 2018, Bitdefender 2020)
  has identified the targeting cluster with high confidence;
  the strategic motivation is inferred from victimology.
pillars:
  - id: vn/industrial-upgrading-cyber-collection/automotive
    name: Automotive sector collection
    target_sectors:
      - transport/road
      - manufacturing/automotive
    summary: |
      Sustained APT32 / OceanLotus targeting of foreign auto OEMs
      (Toyota Australia, Toyota Tokyo, Toyota Vietnam, Hyundai,
      VW, BMW, Daimler) and tier-1 suppliers documented between
      2018 and 2020. Hanoi's industrial policy under Resolution
      23-NQ/TW (2018) targets the automotive sector for
      indigenization, with VinFast (founded 2017) as the
      flagship domestic player.
    key_terms:
      - VinFast
      - automotive IP
      - tier-1 supplier

  - id: vn/industrial-upgrading-cyber-collection/aerospace
    name: Aerospace and adjacent high-tech collection
    target_sectors:
      - aerospace/civil
      - manufacturing
    summary: |
      Aerospace and high-tech manufacturing collection, less
      voluminous than the auto cluster but documented in the
      2017 Cybereason Cobalt Kitty disclosure (Asian conglomerate)
      and subsequent ASEAN-region intrusions.
    key_terms:
      - Cobalt Kitty
      - aerospace IP

sources:
  - fireeye/2017-05-14_apt32-cyber-espionage
  - cybereason/2017-05-25_cobalt-kitty-report
