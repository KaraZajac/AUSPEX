  AUDIT (2026-06-25, claude-opus-4.8/max): full article body captured to
  raw_snapshot + content_sha256 (132 KB; the embedded JSON-LD datePublished is
  2018-06-08T18:17:08Z, confirming published_on). The snapshot carries the
  complete WaPo text, not a paywall stub. Load-bearing verbatim quotes used in
  this event's audit:
  - "Taken were 614 gigabytes of material relating to a closely held project
    known as Sea Dragon, as well as signals and sensor data, submarine radio
    room information relating to cryptographic systems, and the Navy submarine
    development unit's electronic warfare library." (confirms 614 GB + the
    stolen-data inventory)
  - "The breaches occurred in January and February ... The hackers targeted a
    contractor who works for the Naval Undersea Warfare Center, a military
    organization headquartered in Newport, R.I." (dates = Jan–Feb 2018, NOT
    2015 or 2017; victim = a NUWC contractor, unnamed)
  - "Investigators say the hack was carried out by the Chinese Ministry of State
    Security ... The hackers operated out of an MSS division in the province of
    Guangdong." (ATTRIBUTION: MSS, Guangdong division — NOT the PLA; WaPo even
    contrasts the two: "Although the Chinese People's Liberation Army is far
    better-known than the MSS when it comes to hacking ...". WaPo names NO APT
    cluster.)
  - "The breach is part of China's long-running effort to blunt the U.S.
    advantage in military technology and become the preeminent power in east
    Asia." / "China has made closing the gap in undersea warfare one of its
    three top military priorities." (the strategic-purpose language the
    doctrine links lean on; framed as military-tech advantage)
  - Sea Dragon described as "a supersonic anti-ship missile for use on U.S.
    submarines by 2020" — WaPo does NOT call it a Tomahawk variant (string
    "tomahawk" appears 0× in the snapshot).
