notes: |
  Kaspersky Lab / Securelist's GReAT analysis of the BadRabbit outbreak (24 Oct 2017,
  datePublished 2017-10-24T18:16Z; updated 26 Oct). Kaspersky names NotPetya "ExPetr".

  Supporting quotes (verbatim):
  - "The ransomware dropper was distributed with the help of drive-by attacks ... No exploits were
    used, so the victim would have to manually execute the malware dropper, which pretends to be an
    Adobe Flash installer. However, our analysis confirmed that Bad Rabbit uses the EternalRomance
    exploit as an infection vector to spread within corporate networks. The same exploit was used
    in the ExPetr."
  - "Our observations suggest that this been a targeted attack against corporate networks, using
    methods similar to those used during the ExPetr attack. What's more, the code analysis showed a
    notable similarity between the code of ExPetr and Bad Rabbit binaries."
  - "We've detected a number of compromised websites, all of which were news or media websites."
  - "Unlike ExPetr, the evidence suggests that Bad Rabbit is not intended as a wiper ... the malware
    algorithm suggests that the threat actors have the technical means to decrypt." (i.e. genuine,
    recoverable ransomware, not a wiper)
  Kaspersky links BadRabbit to ExPetr/NotPetya by code + shared EternalRomance vector but names NO
  threat actor / nation (no Sandworm, TeleBots, BlackEnergy, GRU).

  AUDIT (2026-06-27, claude-opus-4.8/max): created during the BadRabbit event audit. Fetched live
