notes: |
  Kaspersky Lab / GReAT's canonical false-flag teardown of Olympic Destroyer
  (published 2018-03-08T17:00:28Z). The article whose original slug/section
  header reads "OlympicDestroyer is here to trick the security community"; the
  live canonical URL now redirects to .../trick-the-industry/84295/ (current
  page <title> is "OlympicDestroyer is here to trick the industry"). This is
  THE source establishing the planted-fingerprint deception.

  Supporting quotes (verbatim from snapshot):
  - "In case of Olympic Destroyer wiper sample analyzed by Kaspersky Lab this
    'fingerprint' [the Rich header] gave a 100% match with previously known
    Lazarus malware components and zero overlap with any other clean or malicious
    file known to date to Kaspersky Lab."
  - "At that moment it became clear that the set of features was simply forged to
    perfectly match the fingerprint used by Lazarus." (i.e. the Lazarus/DPRK
    fingerprint was deliberately PLANTED, not authentic)
  - "similar to the filenames (evtdiag.exe, evtsys.exe and evtchk.bat) used by
    BlueNoroff/Lazarus in the Bangladesh SWIFT cyberheist in 2016."
  - "we continued to discover more and more false flags and controversies in the
    malware."
  - "The main malware module is a network worm that consists of multiple
    components, including a legitimate PsExec tool from SysInternals' suite, a
    few credential stealer modules and a wiper."
  - "The attackers deliberately chose to start the spread of the destructive worm
    from this dedicated ski resort automation server. That server was the
    so-called patient-zero in the network. The timing was also chosen to precede
    the official opening ceremony by a couple of hours."

  Kaspersky (2018) named NO nation/actor — the article's thesis is precisely that
  attribution artifacts were forged; the GRU/Sandworm attribution came later
  (UK FCDO + US DOJ, Oct 2020). This source carries the DECEPTION mechanics, not
  the perpetrator attribution.

