notes: |
  Kaspersky Lab / Securelist (GReAT) analysis (28 Jun 2017,
  datePublished 2017-06-28T18:51Z). Canonical technical primary for the
  event's "wiper masquerading as ransomware / no recovery possible"
  claim — Kaspersky reverse-engineered the disk-encryption routine and
  showed the installation ID is randomly generated, so the operator
  cannot derive a decryption key even if a ransom is paid.

  Supporting quotes (verbatim):
  - "This supports the theory that this malware campaign was not designed
    as a ransomware attack for financial gain. Instead, it appears it was
    designed as a wiper pretending to be ransomware."
  - "we have thought that the threat actor cannot decrypt victims' disk,
    even if a payment was made."
  - "in order to decrypt victim's disk the attackers need the installation
    ID: In previous versions of 'similar' ransomware like Petya/Mischa/
    GoldenEye, this installation ID contains crucial information for the
    key recovery. After sending this information to the attacker they can
    extract the decryption key … [in ExPetr] we see that [it] is generated
    using … random data" (i.e. no recoverable key).
  Kaspersky names the malware "ExPetr"; makes no nation-state attribution.

  AUDIT (2026-07-10, claude-opus-4.8/max): created during the NotPetya
  event audit to source-carry the wiper-not-ransomware / irrecoverable
  nature (not carried by the WH or DOJ sources). Fetched live (HTTP 200);
