notes: |
  Kaspersky technical analysis of the Shamoon/Disttrack wiper used against Saudi Aramco.
  AUDIT (2026-07-11, claude-opus-4.8/max): live URL HTTP 200; raw snapshotted (191,003 bytes;
  sha256 c446f0a3…853023). published_on 2012-09-11 taken from the page JSON-LD
  ("datePublished":"2012-09-11T01:08:36+00:00").
  Verbatim support carried for the event: burning-flag malware internal — the overwrite garbage
  "poses a fragment (1024/0x400 first bytes) of a JPEG picture of a burning U.S. flag"; wipe
  mechanics — "A culmination of that roistering is the overwriting of a hard drive with the
  mentioned JPEG pattern. This is why the MBR section of the [disk]" is destroyed; Aramco link +
  attacker-claim corroboration — "The Shamoon wiper malware we previously covered is linked to
  attacks against Saudi Aramco. The hardcoded date in the body of destructor matches exactly the
  declaration by a hacke[r]" (i.e. the malware's hardcoded trigger date matches the Cutting Sword
  of Justice claim); RasGas follow-on — "just about two weeks later, another energy company in the
  Middle East (RasGas) fell victim to another malware attack."
