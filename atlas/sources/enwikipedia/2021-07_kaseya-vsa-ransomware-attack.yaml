  AUDIT (2026-07-10, claude-opus-4.8/max): raw curl-verified HTTP 200
  (205,709 B); article created 2021-07-07 (datePublished), snapshot
  captures the 2026-06-29 revision (dateModified). Verbatim carried:
  - "On 2 July 2021, about 60 managed service providers (MSPs) and their
    customers became victims of a ransomware attack perpetrated by the
    REvil group".
  - "An authentication bypass vulnerability in the software allowed
    attackers to compromise VSA on 2 July and distribute a malicious..."
  - "REvil demanded about 70 million USD in Bitcoin as a ransom."
  - "on 5 July, Kaseya said that between 800 and 1,500 downstream
    businesses were impacted in the attack."
  - Coop mechanism + impact: "Norwegian financial software developer
    Visma, who manages some systems for Swedish supermarket chain Coop...
    The supermarket chain had to close down its 800 stores for almost a
    week... They did not pay ransom, but rebuilt their systems".
  - "On 23 July 2021, Kaseya announced that it had received a universal
    decryptor tool from a 'trusted third party'... Kaseya said it did not
    pay the ransom."
  - FBI key: "In September 2021, the Washington Post reported that the
    master key came from the FBI, which had secretly obtained the key
    earlier."
