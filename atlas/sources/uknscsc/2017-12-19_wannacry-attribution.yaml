notes: |
  UK NCSC joint attribution (with US, AU, CA, NZ, JP) of the
  May 2017 WannaCry global ransomware worm to DPRK actors.
  Accompanied by White House Bossert statement. Original NCSC
  URL (ncsc.gov.uk/news/wannacry-attributed-north-korea)
  returns 404 as of 2026-05; no Wayback Machine snapshot
  indexed via the availability API. Co-released as a UK
  Foreign Office statement still live at
  https://www.gov.uk/government/news/foreign-office-minister-condemns-north-korean-actor-for-wannacry-attacks
  (Lord Ahmad, 2017-12-19) — see
  gov-uk/2017-12-19_fco-wannacry-attribution for the live
  alternate primary citation.
  AUDIT (2026-07-11, claude-opus-4.8/max, for event 2017-05/wannacry):
  link-rot re-confirmed (url:null; NCSC release dead, no Wayback) — UNSNAPSHOTTABLE.
  Corrected the broken cross-ref above ("ukfco/..." -> the actual id
  gov-uk/2017-12-19_fco-wannacry-attribution). Kept in the event's sources[] for
  provenance, but the event's UK/Five-Eyes attribution_source_id was re-pointed to the
  live, now-snapshotted FCO twin (sha256 cd03fbdc...ab0055564), which carries the NCSC
  "highly likely ... Lazarus Group" assessment verbatim.
