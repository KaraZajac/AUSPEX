notes: |
  ReliaQuest Threat Research Team "Threat Research Update: June 23,
  2025" on cyber threats linked to the June 2025 Iran-Israel conflict.
  Names Handala (pro-Palestine; 2TB+ from Israeli firms incl. a major
  oil-and-gas company, from 14 June), Predatory Sparrow (pro-Israel;
  Bank Sepah ~17 June, Nobitex ~18 June), and Team 313 (pro-Iranian;
  unverified Truth Social DDoS); references the DHS pro-Iranian-
  hacktivist advisory and lists APT34/APT35/CyberAv3ngers (Iran) and
  Predatory Sparrow (Israel) as involved APTs.
