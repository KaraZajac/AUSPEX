notes: |
  Deloitte CTI conference deck (CRESTCon Asia, 20 Sep 2019) on the
  "EmpireMonkey" bank-heist campaign, which Deloitte assessed as the
  attack cluster behind the Feb 2019 Bank of Valletta (Malta) heist.
  Snapshotted 2026-07-10 (curl, HTTP 200, application/pdf, 2,159,124 B,
  © 2019 Deloitte LLP; pdftotext-verified). This is the CONTEMPORANEOUS
  CRIMINAL-ATTRIBUTION source that competes with the later US-DOJ DPRK
  attribution. Verbatim (slide "The threat actor / Who is EmpireMonkey?"):
  "New activity cluster", "Relatively skilled cybercriminal group,
  financially motivated", "Use a[n] open source tool called Empire +
  references to 'monkey' in code", "Active since at least Oct 2018",
  "Target banks in Europe", "Some overlaps with FIN7 group (including
  decoy document - source:Kaspersky)". Lists "Bank of Valletta (Malta)
  $15m" under 2019 in the bank-heist series. TTPs: spear-phishing
  impersonating financial regulators — spoofed the French Autorite des
  marches financiers via lookalike domains "amf-fr[.]org" /
  "Amf-France.org" with weaponized .doc lures (communique-1610.doc etc.,
  Oct 2018+); PowerShell Empire C2 (/admin/get.php, /news.php), AMSI
  bypass. Deck makes NO mention of North Korea / Lazarus / APT38 — it
  frames EmpireMonkey strictly as an independent financially-motivated
  cybercriminal group with FIN7 overlap. (0 hits for korea/lazarus/apt38
  in extracted text.)
