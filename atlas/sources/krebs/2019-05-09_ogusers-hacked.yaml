notes: |
  Krebs on Security coverage of the OGusers forum breach —
  the central English-language venue for SIM-swapping and
  account-takeover trades, including the resale of stolen
  short / "OG" social handles. Foundational reporting on
  the cultural and operational connection between SIM-swap
  gangs and the broader account-hijacking ecosystem that
  later produced Scattered Spider / Lapsus$.
