notes: |
  Krebs on Security coverage of the April 2022 takedown of
  RaidForums and arrest of administrator Diogo Santos Coelho
  ("Omnipotent"), a Portuguese national. RaidForums was the
  predecessor English-language breach-and-stolen-data
  marketplace; its closure preceded the rise of BreachForums
  (also closed in 2023 with the arrest of Fitzpatrick).
