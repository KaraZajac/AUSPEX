notes: |
  Brian Krebs' analysis of the ContiLeaks (Feb 2022) and TrickLeaks
  dumps exposing FSB Center 18 contacts and tasking of the
  TrickBot / Conti ecosystem. The leaks were the source material
  for the Feb 2023 and Sep 2023 Treasury/UK sanctions.
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw captured from the cited URL
  (Conti Ransomware Group Diaries, Part I: Evasion). PARTIAL state-nexus
  support for the ru/proxies/conti placement — this Part I article documents
  (a) DECLARED political alignment: "In response to Russia's invasion of
  Ukraine, Conti published a statement announcing its 'full support.' 'If
  anybody will decide to organize a cyberattack or any war activities against
  Russia, we are going to use all our possible resources to strike back at the
  critical infrastructures of an enemy,' the Conti blog post read."; and (b)
  STATE PROTECTION / tipping-off: "Conti's top generals began receiving tips
  from their Russian law enforcement sources that the investigation was being
  rekindled." It does NOT, however, substantiate the specific "FSB Center 18
  contacts and tasking" claim asserted in this source's title/notes and in the
  actor's primary_service_id (ru/fsb/center-18): the string "Center 18" does
  not appear, and the article's lone "FSB" mention is the FSB ARRESTING the
  competitor REvil (Jan 2022), framed as a "cynical ploy" — not FSB tasking of
  Conti. The Center-18/tasking specifics ride on the TrickLeaks dump / a later
  Diaries installment not captured at this URL. FIDELITY FLAG: title/notes here
  overstate what THIS cited page proves; the broader nexus is corroborated by
  the OFAC source (Russian-intelligence-service ties + safe haven).
