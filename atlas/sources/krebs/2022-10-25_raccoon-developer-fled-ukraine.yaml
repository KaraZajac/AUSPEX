notes: |
  Krebs on Security reporting (Oct 31, 2022) on the Raccoon Stealer
  March-2022 takedown and Mark Sokolovsky's indictment while AWAITING
  extradition from the Netherlands (he was not actually extradited until
  Feb 2024). Corroborates: "Working with investigators in Italy and The
  Netherlands, U.S. authorities seized a copy of the server used by
  Raccoon" (FBI + Italy + Netherlands infrastructure seizure); the DOJ's
  "more than 50 million unique credentials" figure; arrest on Mar. 20,
  2022 concurrent with the infrastructure seizure; the operator-
  circumstance reporting that Sokolovsky fled Ukraine for the Netherlands
  after the Russian invasion (Porsche Cayenne, Polish border image); and
  that stolen data "were often resold to groups engaged in deploying
  ransomware." Does NOT mention "200,000 devices" or "Genesis Market."
