notes: |
  Brian Krebs, 2024-08-05. "A ransomware group called Dark Angels
  made headlines this past week when it was revealed the crime
  group recently received a record $75 million data ransom
  payment from a Fortune 50 company." Zscaler ThreatLabz ranked
  Dark Angels the top ransomware threat for 2024, "noting that in
  early 2024 a victim paid the ransomware group $75 million —
  higher than any previously recorded ransom payment". Dark
  Angels tradecraft (per ThreatLabz's Brett Stone-Gross): no
  affiliate model, one target at a time, low profile, "favoring
  mass data theft over disrupting the victim's operations".
  Victim identity hedged at publication: BleepingComputer had
  posited (07-30) the victim was Cencora; "Cencora did not
  respond to questions about whether it had made a ransom
  payment." Independent, pre-Bloomberg corroboration of the
  record USD 75M payment later tied to Cencora by Bloomberg
  2024-09-18.
