notes: |
  Contemporaneous reporting on the Premera Blue Cross breach,
  published the same day Premera disclosed (2015-03-17). The
  primary corpus source for the Premera-specific facts (the cited
  Symantec Black Vine report covers Anthem and never names Premera).

  AUDIT (2026-06-25, claude-opus-4.8/max): raw captured (curl, HTTP
  200, 101,993 bytes, text/html; archive.org blocked). Supports
  verbatim: "11 million" customers affected; data exposed = "member
  name, date of birth, email address, address, telephone number,
  Social Security number, member identification numbers, bank
  account information, and claims information, including clinical
  information"; breach discovered 2015-01-29; initial attack
  "May 5, 2014" (= the event's start_date 2014-05-05). Establishes
  the Premera↔Anthem tie via the typosquat domain "prennera.com"
  ("replacing the 'm' with two 'n' characters") that ThreatConnect
  identified on 2015-02-27 as impersonating Premera — the same
  character-swap MO as we11point.com in the Anthem campaign.
  ATTRIBUTION at NATION level only: "indicators that this intrusion
  is once again the work of state-sponsored espionage groups based
  in China", possibly "Deep Panda", a "Chinese state-sponsored
  hacking group" — NO specific Chinese intelligence service named.
