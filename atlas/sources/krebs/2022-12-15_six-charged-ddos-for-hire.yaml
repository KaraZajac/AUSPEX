notes: |
  Coverage of the December 14 2022 DOJ / FBI action seizing 48
  DDoS-for-hire (booter / stresser) domains and charging six US
  defendants — four in the Central District of California (Los
  Angeles) and two in the District of Alaska — the US portion of
  the international Operation PowerOFF effort.
