notes: |
  Krebs on Security reporting on the December 2022 breach
  of FBI InfraGard via a forged-CFO application —
  attributed to BreachForums actor "USDoD" — with the
  resulting ~87K-record member dataset offered for sale on
  BreachForums. Foundational incident in the BreachForums
  resale-economy narrative leading to the March 2023 arrest
  of Fitzpatrick.

  AUDIT (2026-07-02, claude-opus-4.8/max): Raw captured + hashed
  (sha256 515d65da…406a0c3c, 100,195 bytes); URL resolves and the
  article body matches the citation — NOT a phantom. CORRECTIONS to
  the pre-audit notes above, which the raw article does NOT support:
  (1) the impersonated identity was a "chief executive officer" / CEO
  (13× "CEO" + 1× "chief executive officer"), NOT a "CFO" (0×);
  (2) the dataset is "more than 80,000 members" (verbatim, ×2), NOT
  ~87K — the figure 87,000 appears nowhere; (3) this article is dated
  2022-12-13 and makes NO mention of Conor Fitzpatrick or a March-2023
  arrest (the admin/escrow guarantor is named only as "Pompompurin") —
  that forward-looking claim is uncited here. Verbatim support that IS
  carried: "more than 80,000 members go up for sale"; access "using a
  new account under the assumed identity of a financial industry CEO
  that was vetted by the FBI itself"; "$50,000 asking price"; "asked a
  friend to code a script in Python to query that API and retrieve all
  available InfraGard user data"; "only about half of the user accounts
  contain an email address, and most of the other database fields —
  like Social Security Number and Date of Birth — are completely empty";
  Breached "widely considered to be the second incarnation of RaidForums
  … shuttered by the U.S. Department of Justice in April". Krebs refers
  to the forum as "Breached" (= BreachForums).
