notes: |
  Krebs on Security reporting on the December 2022 breach
  of FBI InfraGard via a forged-CFO application —
  attributed to BreachForums actor "USDoD" — with the
  resulting ~87K-record member dataset offered for sale on
  BreachForums. Foundational incident in the BreachForums
  resale-economy narrative leading to the March 2023 arrest
  of Fitzpatrick.
