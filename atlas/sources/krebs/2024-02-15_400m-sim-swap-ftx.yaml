notes: |
  Krebs on Security reporting on the February 2024 DOJ
  indictments of Robert Powell, Carter Rohn, and Emily Hernandez
  in the District of Columbia for a SIM-swap conspiracy that
  drained USD ~400M from FTX cryptocurrency exchange hot wallets
  in November 2022 — the day of FTX's Chapter 11 filing. Among
  the most consequential SIM-swap prosecutions to date by
  per-defendant attributed loss.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured, sha256
  cabc3340a6ad8cf453c5bd9e17c4cd84afa109db7e5a6b3376a6a067cc4e81fe (53,658
  bytes); real article, not a phantom. Caution on the note above (kept for
  provenance): the ARTICLE itself never states "District of Columbia",
  "hot wallets", or "Chapter 11", and the government did not name the
  victim organization — the indictment says only "Victim 1"; the FTX
  identification is Krebs/Elliptic inference: "The U.S. government did not
  name the victim organization, but there is every indication that the
  money was stolen from the now-defunct cryptocurrency exchange FTX, which
  had just filed for bankruptcy on that same day." Key carried quotes:
  Powell a.k.a. "R," "R$" and "ElSwapo1," "ringleader of a SIM-swapping
  group called the 'Powell SIM Swapping Crew'"; theft "over several hours
  between November 11 and 12, 2022" "after they SIM-swapped an AT&T
  customer by impersonating them at a retail store using a fake ID";
  Elliptic: "We put the value of the cryptoassets stolen at $477 million
  ... 'unauthorized third-party transfers' of $413 million ... certainly
  over $400 million."
