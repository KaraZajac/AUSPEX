notes: |
  Krebs on Security coverage of the FBI + Dutch National Police
  seizure (executed January 29 2025, announced by DOJ January 30
  2025) of the Pakistan-based "Manipulaters" / HeartSender
  BEC-tooling service. Per the article (citing Dutch authorities),
  39 servers and domains abroad were seized; HeartSender, FudPage,
  FudTools and related phishing-kit marketplaces taken offline.
  Carries the DOJ disrupt-purpose quote verbatim. Reproduces the
  DOJ reference to the group as "Saim Raza."
