notes: |
  Krebs on Security coverage of the January 30 2025 FBI +
  Dutch + UK NCA action against the Pakistan-based
  "Manipulaters" / HeartSender BEC-malware service.
  Approximately 100 domains seized; HeartSender, FudPage,
  FudTools, and related phishing-kit marketplaces taken
  offline. The Manipulaters' service was the leading
  English-language BEC phishing-kit vendor of the
  2018–2024 period.
