notes: |
  Krebs coverage of the May 28 2024 Treasury OFAC SDN
  designations of YunHe Wang, Jingping Liu, and Yanni Zheng
  for their administration of the 911 S5 residential proxy
  service. Krebs's prior reporting from 2022 documented the
  service's link to large-scale Cares Act / PUA fraud and to
  brute-force credential-stuffing operations.
