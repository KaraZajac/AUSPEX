notes: |
  Krebs coverage of the May 28 2024 Treasury OFAC SDN
  designations of YunHe Wang, Jingping Liu, and Yanni Zheng
  (plus Wang's Spicy Code Company Limited) for the 911 S5
  residential-proxy service, published the same day; a May 29
  inline update adds the DOJ arrest of Wang. NB (corrected
  2026-07-10): a prior note here claimed Krebs's 2022 reporting
  "documented ... Cares Act / PUA fraud and ... brute-force
  credential-stuffing" — that is unsupported (0 grep hits for
  CARES / PUA / unemployment / credential-stuffing / brute-force
  in the 2022 deep-dive raw); those are 2024 DOJ/Treasury facts,
  not 2022 Krebs findings. Removed (resolves the FLAG from the
  2022-07/911-proxy-collapse audit).
