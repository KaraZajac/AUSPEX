  (content_sha256 above; 93,614 bytes). Corrected this record's own
  prior notes, which had repeated three unsourced claims now removed
  from event 2024-09/cryptex-pm2btc-sanctions: "UK NCA" (the article
  never names the NCA), a "Conti/LockBit/DarkSide" client list
  ("conti" in the article is "Sanders continued"; it names no such
  strains), and an OFAC/SDN action "against ... Shakhmametov" (OFAC
  designated only Ivanov + Cryptex; Shakhmametov is DOJ-indicted).
