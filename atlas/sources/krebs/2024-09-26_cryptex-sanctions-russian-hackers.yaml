notes: |
  Krebs on Security coverage of the September 26 2024 coordinated
  US-Dutch action against the Cryptex cryptocurrency exchange
  (cryptex.net), the PM2BTC exchanger, and the UAPS payment
  processor — Russian-operated laundering pipes serving ransomware
  actors, initial-access brokers, and darknet/carding vendors.
  Covers the OFAC SDN designation of Sergey Ivanov ("Taleon") and
  Cryptex, the FinCEN Section 9714 order on PM2BTC, the US Secret
  Service / Netherlands Police / Dutch FIOD domain seizures, and
  the DOJ EDVA indictment of Ivanov and Timur Shakhmametov ("Vega"
  / alleged Joker's Stash operator).

