notes: |
  Krebs on Security coverage of the September 2024 Treasury
  OFAC + DOJ + UK NCA + Netherlands action against the
  Cryptex cryptocurrency exchange and PM2BTC service —
  Russian-operated laundering pipes serving ransomware
  affiliates including Conti, LockBit, and DarkSide.
  Includes Treasury SDN action against Sergey Ivanov
  ("Taleon") and Timur Shakhmametov ("JokerStash" /
  carding-shop operator).
