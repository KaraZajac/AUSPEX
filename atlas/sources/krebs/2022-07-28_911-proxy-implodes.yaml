notes: |
  Krebs on Security reporting on the abrupt shutdown of the 911
  residential-proxy service on 28 July 2022, ten days after the
  Krebs deep-dive exposed its covert (pay-per-install / "free
  VPN" / pirated-software) distribution channel. Per 911, an
  early-July intrusion abused its account top-up API and then
  overwrote its servers, data and backups, rendering the
  service "unrecoverable"; some observers suspected a
  convenient exit. No law-enforcement action was involved. The
  operation resurfaced under the DOJ/OFAC "911 S5" label and
  was dismantled in May 2024 (2024-05/911-s5-botnet-takedown) —
  the SAME Yunhe Wang–run operation, not a different operator's
  reincarnation (note corrected 2026-07-10).
