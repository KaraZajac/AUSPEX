notes: |
  Krebs on Security reporting on the abrupt voluntary shutdown
  of the 911 residential-proxy network in July 2022, ten days
  after the publication of the Krebs investigation that
  exposed the trojanized-VPN distribution channel. The 911
  shutdown was the precursor to the 911 S5 reincarnation
  taken down by DOJ in May 2024.
