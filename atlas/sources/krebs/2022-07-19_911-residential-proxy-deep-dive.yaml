notes: |
  Krebs on Security's foundational investigation into the 911
  residential-proxy service. Documents distribution via "free
  VPN" apps plus pay-per-install affiliate schemes that
  covertly bundled 911's SOCKS5 proxy with pirated/"free"
  software and trojanized torrents; independent counts of
  ~120,000 PCs (Univ. of Sherbrooke) to nearly 200,000 nodes
  with 42,000+ in the US (Spur.us); and abuse of the proxy pool
  for payment-card fraud, account-takeover, "scam" wire
  transfers, CEO-impersonation and China-based wire laundering.
  Ties the operation via WHOIS + UK Companies House to Yunhe
  Wang of Beijing (Gold Click Ltd) — the SAME operator DOJ/OFAC
  later charged over "911 S5" (2024-05/911-s5-botnet-takedown),
  i.e. a continuous operation, not a distinct successor.
  Note corrected 2026-07-10: the raw does NOT mention
  "credential-stuffing" or "pandemic-era unemployment fraud"
  (those are 2024-source framings); prior note overstated.
