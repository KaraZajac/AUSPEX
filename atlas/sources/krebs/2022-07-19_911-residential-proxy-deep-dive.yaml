notes: |
  Krebs on Security's foundational investigation into the 911
  residential-proxy network — the predecessor service that
  evolved into 911 S5. Documents distribution via trojanized
  free-VPN apps and the use of the proxy pool for credential-
  stuffing, account-takeover, and pandemic-era unemployment
  fraud.
