notes: |
  Krebs reporting on the ParkMobile (paid-parking app) breach.
  ~21M (precisely 21,887,299 per the later leak) user records
  including license plates, mobile/phone numbers, email
  addresses, vehicle nicknames, mailing addresses and bcrypt-
  hashed passwords. ParkMobile attributed the breach to "a
  vulnerability in a third-party software that we use."
  AUDIT (2026-07-10, claude-opus-4.8/max): live-fetched + snapshotted
  (sha256 9f15f449…f0f17296b, 90,613 bytes). CORRECTIONS to prior
  record: (1) this article does NOT name ShinyHunters (grep: 0 hits)
  — the seller is unnamed ("Someone is selling account information
  for 21 million customers of ParkMobile"), surfaced by threat-intel
  firm Gemini Advisory; the prior "later attributed to ShinyHunters"
  note was unsupported. (2) NO "Apache Struts" (grep: 0 hits) — the
  prior note's "(the Apache Struts framework)" is fabricated; ParkMobile
  said only "a vulnerability in a third-party software that we use."
  Verbatim support: "Someone is selling account information for 21
  million customers of ParkMobile"; "a cybersecurity incident linked
  to a vulnerability in a third-party software that we use"; "bcrypt
  hashed and salted passwords were obtained"; "whoever is selling this
  data is doing so for an insanely high starting price ($125,000)".
