notes: |
  Krebs reporting on the ParkMobile (paid-parking app) breach,
  later attributed to ShinyHunters / data-broker posting. ~21M
  user records including license plates, mobile numbers, email
  addresses, and hashed passwords. ParkMobile attributed the
  breach to a vulnerability in third-party software (the Apache
  Struts framework) used by the company.
