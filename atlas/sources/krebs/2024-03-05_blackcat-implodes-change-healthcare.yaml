notes: |
  Retrospective of the ALPHV/BlackCat arc from the December 2023 FBI
  disruption through the Change Healthcare intrusion and the March
  2024 exit scam. Supporting quotes (raw snapshot, sha
  cb400c4d...e029f71d, 105,934 bytes): "the BlackCat ransomware
  group, which was infiltrated by the FBI and foreign law enforcement
  partners in late December 2023. As part of that action, the
  government seized the BlackCat website and released a decryption
  tool to help victims recover their systems. BlackCat responded by
  re-forming, and increasing affiliate commissions to as much as 90
  percent. The ransomware group also declared it was formally
  removing any restrictions or discouragement against targeting
  hospitals and healthcare providers."; "In the third week of
  February, a cyber intrusion at Change Healthcare began shutting
  down important healthcare services"; "On March 1, a cryptocurrency
  address that security researchers had already mapped to BlackCat
  received a single transaction worth approximately $22 million. On
  March 3, a BlackCat affiliate posted a complaint to the exclusive
  Russian-language ransomware forum Ramp" (affiliate "Notchy");
  Wosar: "ALPHV/BlackCat did not get seized ... They are exit
  scamming their affiliates."; and the fake seizure banner "cut and
  pasted from the notice the FBI left in its December raid".
  (NB "Russian-language forum" describes the Ramp forum's language,
  not a state nexus for the crew.)
