notes: |
  Krebs on Security coverage of the May 2025 arrests of 21 personnel
  of "The Manipulaters" — the operators behind the HeartSender BEC /
  phishing malware service. Per the raw, the arrests were made by
  Pakistan's National Cyber Crime Investigation Agency (NCCIA) —
  NOT the Federal Investigation Agency — in raids in Lahore's Bahria
  Town and Multan on May 15 and 16 2025. Those arrested include
  alleged ringleader Rameez Shahzad, who used the "Saim Raza" alias.
  The arrests followed the January 2025 FBI + Dutch National Police
  seizure of the HeartSender domains and the April 3 2024 Krebs
  investigation.
