notes: |
  Krebs on Security coverage of the May 2025 Pakistani Federal
  Investigation Agency arrests of 21 personnel of "The
  Manipulaters" — the operators behind the HeartSender BEC /
  phishing malware service. The arrests followed the January
  2025 FBI + Dutch + Pakistani disruption of the HeartSender
  domains and the April 2024 Krebs investigation that
  documented the operation.
