  Netherlands / Dutch Police (it names only "the FBI" + generic "U.S. and
  international law enforcement actions") — the "by FBI and Netherlands Police"
  line was a wrong-wave conflation with the December 2022 first wave and has
  been removed. Verbatim support: "The U.S. Federal Bureau of Investigation
  (FBI) this week seized 13 domain names connected to 'booter' services";
