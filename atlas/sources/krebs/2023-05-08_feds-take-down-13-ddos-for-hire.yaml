notes: |
  Krebs on Security write-up (published the day after the DOJ action) of the
  FBI's May 8 2023 seizure of 13 DDoS-for-hire ("booter"/"stresser") domains —
  the second wave of the Operation PowerOFF domain takedowns, building on the
  December 2022 seizure of 48 domains (ten of the 13 are reincarnations of
  Dec-2022 services). Load-bearing snapshotted source for the 13-domain list
  and the December-2022 relationship.
  AUDIT 2026-07-02 (claude-opus-4.8/max): raw snapshot captured + sha256
