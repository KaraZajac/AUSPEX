notes: |
  Krebs on Security reporting on the January 2024 federal
  charges against Noah Michael Urban (Florida) for SIM-swap
  fraud and account-takeover totaling USD ~800K, with Urban
  identified as "King Bob" — a senior operator in 0ktapus /
  Scattered Spider. Predates the November 2024 multi-
  defendant Scattered Spider indictment.
