notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): raw captured (curl, HTTP 200, 88,617 bytes; archive.org blocked
  for this domain). Supports: "Telvent Canada Ltd. said that on Sept. 10, 2012 it learned of a breach of its
  internal firewall and security systems. Telvent said the attacker(s) installed malicious software and stole
  project files related to one of its core offerings — OASyS SCADA". Attribution: "Joe Stewart, director of
  malware research at Dell SecureWorks ... said the Web site and malware names cited in the Telvent report map
  back to a Chinese hacking team known as the 'Comment Group.'" The article does NOT name APT1 / Comment Crew /
  Unit 61398. "OASyS DNA" and "oil/gas pipeline SCADA ... majority market share ... N. America" appear in a
  reader comment (Dale Peterson, 26 Sep 2012), not in the body. No mention of AutoCAD/drawings or stolen
  authentication material; Telvent stated it had no reason to believe customer-system access was acquired.
