notes: |
  Brian Krebs' report on AT&T's July 12, 2024 disclosure; carries the
  ~110M figure, the Snowflake naming (the 8-K itself says only
  "third-party cloud platform"), the no-MFA root cause, and the
  cell-tower location detail. Verbatim: "AT&T Corp. disclosed today
  that a new data breach has exposed phone call and text message
  records for roughly 110 million people — nearly all of its
  customers"; "downloading files containing customer call and text
  interactions between May 1 and October 31, 2022, as well as on
  January 2, 2023"; "a subset of stolen records included information
  about the location of cellular communications towers closest to the
  subscriber, data that could be used to determine the approximate
  location of the customer device"; "the customer records were exposed
  in a cloud database that was protected only by a username and
  password (no multi-factor authentication needed)."
