notes: |
  Coverage of the FBI arrest of Conor Brian Fitzpatrick
  ("Pompompurin"), administrator of BreachForums, in Peekskill
  NY on March 15 2023. BreachForums was the successor to
  RaidForums (seized April 2022) and a leading marketplace for
  the resale of stolen credentials and breached datasets.
