notes: |
  Krebs survey article (Brian Krebs, byline "October 7, 2025",
  "posted on Tuesday 7th of October 2025 06:45 PM", one "Update,
  Oct. 8") on the 2025 ShinyHunters-branded corporate extortion
  campaign and the "Scattered LAPSUS$ Hunters" leak site. Frames
  ShinyHunters (UNC6040) as the vishing-chain Salesforce data thief;
  describes "Scattered Lapsus$ Hunters" as "an amalgamation of three
  hacking groups — Scattered Spider, Lapsus$ and ShinyHunters" whose
  members "hail from many of the same chat channels on the Com".
  Distinguishes the Salesloft/Drift token-theft chain (tracked by
  GTIG as UNC6395) and the extortion cluster UNC6240.

  AUDIT (2026-07-10, claude-opus-4.8/max): live URL HTTP 200, raw
  snapshot captured (sha256 9c2d11a8..97619835, 92,341 bytes). The
  PRIOR notes on this record were INACCURATE and have been rewritten:
  they claimed the article names "Adidas, LVMH brands (Louis Vuitton,
  Dior, Tiffany), Chanel, Allianz Life, Workday, Pandora, Cisco,
  Qantas, Air France-KLM, Coca-Cola, TransUnion, and Google." Verbatim
  check of the snapshot shows the article names NONE of those except
  Google. The victims actually named are those on the leak-site list —
  "Toyota, FedEx, Disney/Hulu, and UPS" ("more than three dozen
  entries") — plus Red Hat (GitLab/CER theft), Discord (Sep 20
  third-party support-provider breach), Google, Salesloft, and
  Scattered-Spider arrestees (Thalha Jubair, Noah Urban, Tyler
  Buchanan) tied to M&S/Harrods/Co-op/MGM/Caesars. "Adidas" appears
  ZERO times in this article; it does NOT carry any Adidas-specific
  fact and must not be cited for Adidas victim-scope.
