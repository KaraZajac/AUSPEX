notes: |
  Krebs on Security reporting on the August 2023 SIM-swap of
  a Kroll bankruptcy-administration employee that exposed
  PII of creditors in the FTX, BlockFi, and Genesis crypto
  bankruptcy cases. Canonical case of SIM-swap targeting
  enterprise-employee accounts to reach downstream
  customer / investor data rather than directly emptying
  the victim employee's accounts.
