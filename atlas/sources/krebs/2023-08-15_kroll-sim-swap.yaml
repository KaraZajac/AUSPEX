notes: |
  Krebs on Security reporting on the August 2023 SIM-swap of
  a Kroll bankruptcy-administration employee that exposed
  PII of creditors in the FTX, BlockFi, and Genesis crypto
  bankruptcy cases. Canonical case of SIM-swap targeting
  enterprise-employee accounts to reach downstream
  customer / investor data rather than directly emptying
  the victim employee's accounts.
  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (71,146 bytes). DATE CORRECTION: published_on was 2023-08-15 —
  wrong (that date precedes the Aug 19 incident). The article byline and body
  read "August 25, 2023" ("Kroll disclosed today"); page metadata timestamps
  are 2023-08-25T14:56:01. Corrected published_on -> 2023-08-25. The id slug
  keeps its (erroneous) 2023-08-15 date because slugs are stable/never renamed;
  the slug date is NOT the publication date. Verbatim support for the event:
   - "Kroll said it was informed that on Aug. 19, 2023, someone targeted a
     T-Mobile phone number belonging to a Kroll employee 'in a highly
     sophisticated "SIM swapping" attack.'"
   - "T-Mobile, without any authority from or contact with Kroll or its
     employees, transferred that employee's phone number to the threat actor's
     phone at their request ... it appears the threat actor gained access to
     certain files containing personal information of bankruptcy claimants in
     the matters of BlockFi, FTX and Genesis."
   - Downstream phishing: "phishing emails they received this morning that
     spoofed FTX and claimed, 'You have been identified as an eligible client
     to begin withdrawing digital assets from your FTX account.'"
   Names only generic "SIM-swapping groups/gangs" — no threat actor, cluster,
   or nation attributed (supports actor_id: null).
