  Krebs on Security coverage of the brief Russian enforcement
  push (January–February 2022) against Russian-speaking carding
  marketplaces preceding the Russian invasion of Ukraine.
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured
  (75,255 bytes, sha256 b7196526…ba890394); article body matches
  the citation (real article, not a phantom). NB the seizures of
  Trump's Dumps, Ferum Shop, Sky-Fraud and UAS (Feb 7–8 2022) and
  UniCC (January) are attributed by Krebs to **Department K of the
  Russian Ministry of Internal Affairs (MVD)** — NOT the FSB; the
  FSB is named in this piece only for the March 2020 carding raid.
  The 14 REvil-affiliate arrests are referenced ("Russia's arrest
  of 14 alleged affiliates of the REvil ransomware gang") but not
  dated here and not attributed to a named service in this article.
