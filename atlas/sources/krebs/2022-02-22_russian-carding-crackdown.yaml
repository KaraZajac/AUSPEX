notes: |
  Krebs on Security coverage of the brief Russian FSB
  enforcement push (January–February 2022) against Russian-
  speaking carding marketplaces (UniCC, Trump's Dumps, Ferum
  Shop) preceding the Russian invasion of Ukraine. The
  crackdown — including the arrest of 14 alleged REvil
  affiliates in mid-January 2022 — ended abruptly when the
  invasion began on February 24 2022.
