notes: |
  Krebs on Security analysis of the Magecart JS-skimming
  cluster following the British Airways, Newegg, and
  Ticketmaster compromises. Covers the seven-cluster
  RiskIQ taxonomy (Groups 1–7) and the third-party-script
  supply-chain pattern that distinguishes web-skimming
  from earlier point-of-sale card-skimming malware.
