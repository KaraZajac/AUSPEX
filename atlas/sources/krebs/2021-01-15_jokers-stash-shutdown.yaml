notes: |
  Krebs on Security coverage of Joker's Stash's announced
  voluntary shutdown in January–February 2021. Joker's Stash
  was the largest English-Russian-speaking carding marketplace
  of the late 2010s, selling stolen payment-card data from
  the Wawa, Hy-Vee, Dickey's BBQ, and many other US-retail
  POS breaches. The shutdown followed FBI / Interpol seizures
  of several of the operator's blockchain-DNS resolver
  domains in December 2020.
