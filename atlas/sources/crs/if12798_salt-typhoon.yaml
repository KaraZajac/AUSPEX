notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): reviewed in the cn/mss/salt-typhoon service verification
  (verdict KEEP). This CRS In Focus does NOT name the MSS for Salt Typhoon. It frames the actor as
  "People's Republic of China (PRC) state-sponsored hackers" and notes that "the U.S. government
  sanctioned a PRC-based individual and cybersecurity company for their alleged role in enabling the Salt
  Typhoon hacks" (i.e. it references the OFAC action without itself naming the MSS). The only "take
  directions from the PRC government"/intelligence-service language in the piece pertains to FLAX Typhoon,
  not Salt Typhoon. The captured text contains zero occurrences of "MSS"/"Ministry of State Security" or
  "Juxinhe". This source supports the China/PRC nexus only; the MSS placement rests on the OFAC source.
