notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): reviewed in the cn/mss/salt-typhoon service verification
  (verdict KEEP). This CRS In Focus does NOT name the MSS for Salt Typhoon. It frames the actor as
  "People's Republic of China (PRC) state-sponsored hackers" and notes that "the U.S. government
  sanctioned a PRC-based individual and cybersecurity company for their alleged role in enabling the Salt
  Typhoon hacks" (i.e. it references the OFAC action without itself naming the MSS). The only "take
  directions from the PRC government"/intelligence-service language in the piece pertains to FLAX Typhoon,
  not Salt Typhoon. The captured text contains zero occurrences of "MSS"/"Ministry of State Security" or
  "Juxinhe". This source supports the China/PRC nexus only; the MSS placement rests on the OFAC source.
  Raw snapshot captured 2026-06-24 (full article text rendered, ~59 KB extracted).
  AUDIT (2026-07-11, claude-opus-4.8/max): published_on corrected 2024-12-20 -> 2024-11-15 —
  the snapshot's version history tops out at "November 15, 2024 (IF12798 - Version 11)" with no
  December version present; secondary, non-load-bearing PRC-nexus corroboration for the AA25-239a event.
  AUDIT (2026-07-11b, claude-opus-4.8/max): the note directly above is WITHDRAWN as a misread
  (salt-typhoon-us-telecom-compromise event audit). published_on corrected 2024-11-15 -> 2025-01-23.
  The captured snapshot's PDF version history actually tops out at "January 23, 2025 (IF12798 - Version:
  15)" (Version 14 same date) ABOVE the November-2024 rows, the article header reads "Updated January 23,
  2025", and the body states "In January 2025, the U.S. government sanctioned a PRC-based individual and
  cybersecurity company for their alleged role in enabling the Salt Typhoon hacks." So the snapshot is the
  Jan-23-2025 version, not a November one (sha256 44b337b4… unchanged — the earlier pass simply missed the
  Version 14/15 rows). Still secondary, non-load-bearing PRC-nexus corroboration; carries the hedged
  lawful-intercept ("court-approved access") and "presidential candidate communications" language and the
  "targeting political figures" investigation statement used by the event.
