  AUDIT (2026-06-25, claude-opus-4.8/max): raw PDF captured + hashed.
  This is the Ottis (2008) CCDCOE paper "Analysis of the 2007 Cyber
  Attacks Against Estonia from the Information Warfare Perspective."
  KEY: it is meticulously hedged on attribution — "The objective of
  this paper is not to implicate a specific organization or entity";
  "no organization or group has claimed responsibility"; the Russian
  government "consistently denied any direct involvement ... To the
  author's knowledge this claim is true." It concludes only that a
  Russian *information operation* is the most "plausible" of three
  hypotheses, with state involvement characterized as "silent
  consent ... interpreted as implicit state support," and explicitly:
  "this analysis does not prove that there was an information
  operation due to lack of evidence." Supports a contested,
  nation-level, NOT named-unit, NOT firmly-state-attributed reading.
  Predates (and so cannot source) the March 2009 Goloskokov/Nashi
  self-claim — that is cited separately to the RFE/RL 2009-03-30
  report.
