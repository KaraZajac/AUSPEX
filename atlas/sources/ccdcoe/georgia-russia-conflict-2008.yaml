notes: |
  CCDCOE Cyber Law Toolkit entry on the August 2008 Georgia cyber
  campaign, synchronized with Russian military operations against
  South Ossetia. State direction assessed but not legally proven;
  AUSPEX preserves the dossier's strongly_inferred call.

  AUDIT (2026-06-25, claude-opus-4.8/max): live URL fetched + raw
  snapshot captured (sha256 above). Verbatim support for the event:
  Suspected actor — "several cyber security experts claimed that the
  attacks had been launched by a group known as the 'Russian Business
  Network', which had allegedly had close ties to the Russian
  government" (Georgia accused Russia; Russia denied but conceded
  "individuals in Russia or elsewhere had taken it upon themselves").
  Target — President's site "taken down and later defaced," plus
  Parliament, Foreign Affairs Ministry, Ministry of Defence, "several
  Georgian news agencies and commercial entities." Method — "DDos
  attacks," defacements "comparing the Georgian president to Adolf
  Hitler." Purpose — "seen as part of Russia's warfare in the armed
  conflict," which "created the time and space for Russia to shape the
  international narrative." Result — traffic "re-routed through German
  servers run by Deutsche Telekom," "communication in the country was
  severely disrupted." Aftermath — "one of the first examples of
  offensive cyber attacks forming part of synchronized kinetic
  military operations." NOTE: this source does NOT mention BGP-route
  manipulation specifically (it names DDoS + defacement); the BGP/
  rerouting claim in the event rests on the US-CCU/Bumgarner report
  and is independently corroborated by the Aug-9-2008 Russian/Turkish-
  server traffic-redirection record. Page last edited 2021-09-17;
  published_on kept approximate per the toolkit's undated-wiki nature.
