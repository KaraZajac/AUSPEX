notes: |
  CCDCOE country report by Sungbaek Cho (NATO CCDCOE Strategy
  Researcher), Tallinn 2022 series; states "Information in this
  document has been checked for accuracy as of June 2022" (posted
  under the /uploads/2022/12/ path). AUDIT (2026-06-30,
  claude-opus-4.8/max): 27-page PDF captured + hashed. Corroborates
  the April 2019 National Cybersecurity Strategy event: "The ROK
  government published the 'National Cybersecurity Strategy' under
  the coordination of the NSO in April 2019 ... It was prepared by
  nine government organisations including the NIS, MSIT and the
  Ministry of National Defence (MND) and signed by the President."
  Its footnote 40 dates the primary as "National Cyber Security
  Strategy, National Security Office, 03.04.2019" — confirming the
  2019-04-03 date. Also carries: the NSO has been "the highest
  national authority in planning and coordinating cybersecurity
  issues at a whole-government level" since the 2015 creation of the
  Secretary to the President for Cybersecurity; the strategy "has
  three objectives ... six key strategic assignments and 18 major
  sub-assignments," later carried out as 100 individual tasks in the
  September 2019 National Cybersecurity Base Plan; and it enumerates
  all six strategic assignments matching the primary text.

  AUDIT (2026-07-05, claude-opus-4.8/max, hash re-verified): also the
  attesting source for the 2010-01 ROK Cyber Command establishment
  event. p.19: "The ROK established the Cyber Operations Command (since
  renamed from the ROK Cyber Command) in 2010 to carry out operations in
  cyberspace. Under the Cyber Operations Command Decree, the Command
  plans and conducts cyber operations ..." and "The ROK Cyber Command was
  changed to Cyber Operations Command in 2019 and was designated as a
  joint unit to carry out the orders of the Chairman of the JCS." Its
  footnote 80 dates the Cyber Operations Command Decree "Enacted in
  26.02.2019" — corroborating the 26 Feb 2019 rename. Establishment given
  as year "2010" only (day-precision comes from Korean-language refs).
