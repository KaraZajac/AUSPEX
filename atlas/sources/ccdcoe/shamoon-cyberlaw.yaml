notes: |
  Secondary synthesis of the 2012 Shamoon/Saudi Aramco incident (with case-law framing).
  AUDIT (2026-07-11, claude-opus-4.8/max): PHANTOM REPAIR. The prior record pointed at the bare
  wiki root (https://cyberlaw.ccdcoe.org/wiki/ -> redirects to Main_Page) — a shell URL carrying
  no Shamoon content. Re-pointed to the real incident page /wiki/Shamoon_(2012) (HTTP 200) and
  snapshotted (30,071 bytes; sha256 a5b0cc46…e295536). published_on set to the page's own
  "last edited 17 September 2021" / dateModified (the prior 2018-01-01 was unsourced; a living
  wiki entry has no fixed publication date).
  Verbatim support carried for the event: onset + insider vector — "The virus — called Shamoon
  after a word embedded in its code — was unleashed on 15 August 2012 by a … company insider
  with privileged access to Aramco's network"; damage — "The virus erased data on three-quarters
  of Aramco's corporate PCs … rendered useless and had to be replaced"; malware behaviour — it
  "erased the data on the hard drives and replaced them with an image of a burning American flag";
  end/recovery — "By the end of August 2012, Aramco published a statement saying that it managed
  to restore all the main internal network services"; persona — "A group called 'Cutting Sword of
  Justice' claimed responsibility"; attribution HEDGE — "U.S. intelligence officials considered
  that the attack's real perpetrator was Iran, although they offered no specific evidence to
  support that claim."
