notes: |
  CCDCOE Cyber Law Toolkit case page on the 2015 Bundestag hack.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw HTML captured + hashed
  (30,549 bytes; curl 200 — note WebFetch is 403-walled, curl works).
  VERBATIM support: Suspected actor — "The investigations of the
  German Authorities indicate that the Russian hacking group 'APT 28'
  is responsible for the attack ... The British Cyber defense agency
  has alleged that this group is linked to the Russian military
  secret service 'GRU'". Method — "At the beginning of 2015, MPs
  received an email from the address 'UN.org' which was designed like
  a UN News Bulletin. Clicking on the link contained in the email led
  to the installation of the malware on the computer. The malware was
  then able to spread and eventually infiltrated the networks of the
  Parliament." Result — "maintain unauthorized access for several
  months until the attack was detected in May 2015 and even managed
  to access a computer in the parliamentary office of the chancellor.
  Approximately over 16 GB of data was stolen." Aftermath — "The
  German parliament's computer system was shut down for four days for
  maintenance works and additional safety mechanisms were installed."
