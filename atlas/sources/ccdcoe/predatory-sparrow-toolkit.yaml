notes: |
  NATO CCDCOE Cyberlaw Toolkit entry on the June-2022 Predatory Sparrow
  operation against Iranian steel makers. AUDIT 2026-07-10: the prior
  record pointed url at the wiki homepage (https://cyberlaw.ccdcoe.org/
  wiki/, whose archive_url was a pre-event 2022-06-14 Main_Page
  snapshot) under a generic title — a real-defect WRONG-URL. Corrected
  url + archive_url + title to the actual toolkit entry (pageid 518,
  "Predatory Sparrow operation against Iranian steel maker (2022)");
  tier preserved (secondary). The entry carries essentially every
  load-bearing event claim: date "27 June 2022 ... between midnight and
  6 am IRST"; targets "Khouzestan Steel Company (KSC), Mobarakeh Steel
  Company (MSC), and Hormozgan Steel Company (HOSCO) ... All three ...
  are state-owned"; effect "As regards MSC and HOSCO, no significant
  damage ... As regards KSC, an industrial machine was caused to
  seriously malfunction, vomiting fire and molten steel across the
  factory floor"; "The hacking group also published a video of the
  incident"; "warned Iran's emergency services in advance"; the
  Gantz / Israeli Defense Ministry probe; and the alternative suspects
  (US / Saudi Arabia / UAE per Check Point). Snapshot captured live +
  sha256.
