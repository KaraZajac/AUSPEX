notes: |
  CERT-FR threat-intelligence report on FIN12, a financially
  motivated cybercriminal intrusion set responsible for multiple
  ransomware campaigns (Ryuk, Conti, Hive, Nokoyawa, BlackCat /
  ALPHV, Play, Royal). ANSSI dates the cluster to "au moins 2019"
  and links ~30 French entity encryptions (2020-2023) plus the
  March 2023 CHU de Brest hospital intrusion to it. Edited as a
  defensive-attribution event recording ANSSI's threat-actor
  naming of an organized criminal cluster affecting French
  entities, doctrinally paralleling the APT28 / APT29
  state-attribution publications. URL verified by curl 2026-05-28;
  H1 matches.

  AUDIT 2026-07-02 (claude-opus-4.8/max): raw snapshot captured.
  Audited artifact = the 15-page PDF report
  anssi__2023-09-18_fin12-multiple-ransomware.pdf, sha256
  5c096d6e…5d6973fc (2,457,887 bytes) = archive_url; HTML landing
  page anssi__2023-09-18_fin12-multiple-ransomware.html sha256
  a9cca0f1…5bc25d49 (16,125 bytes) = url. Confirmed a real
  first-party ANSSI/CERT-FR CTI report (title "FIN12 — UN GROUPE
  CYBERCRIMINEL AUX MULTIPLES RANÇONGICIELS", 18 sept 2023,
  TLP:CLEAR) — NOT a phantom; tier=primary CONFIRMED (govt-primary,
  ANSSI). Report frames FIN12 as a financially motivated
  cybercriminal MOA with no asserted state nexus. Prior notes
  "since 2018" and "retail, manufacturing, local-government" were
  NOT source-carried and were corrected (report: "actifs depuis au
  moins 2019"; only the health sector is substantiated).
  Verbatim: "un ciblage important du secteur de la santé (au moins
  20% des victimes du groupe)"; "privilégier le chiffrement rapide
  des réseaux compromis au détriment de l'exfiltration"; "Time-To-
  Ransom des opérateurs de FIN12, qui est d'environ 4 jours".
