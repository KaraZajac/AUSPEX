notes: |
  CERT-FR threat-intelligence report on FIN12, a financially
  motivated intrusion set responsible for multiple ransomware
  campaigns (Ryuk, Conti, Hive, Nokoyawa, Royal, BlackCat /
  ALPHV) since 2018. Report tracks FIN12 targeting of French
  health, retail, manufacturing, and local-government victims
  through 2021-2023. Edited as a defensive-attribution event
  recording ANSSI's threat-actor naming of an organized
  criminal cluster affecting French entities, doctrinally
  paralleling the APT28 / APT29 state-attribution publications.
  URL verified by curl 2026-05-28; H1 matches.
