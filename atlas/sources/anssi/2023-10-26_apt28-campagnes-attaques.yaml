notes: |
  CERT-FR threat-intelligence report attributing a sustained
  campaign of intrusion attempts against French government,
  diplomatic, research, and think-tank entities to the APT28 /
  Fancy Bear / Forest Blizzard intrusion set, active since 2021.
  Published 26 October 2023. The report walks tradecraft (exploit
  chains for Outlook NTLM relay, router-compromise infrastructure
  via Ubiquiti EdgeOS) and names French targets in aggregate
  terms. Url verified by curl 2026-05-28; h1 matches.
