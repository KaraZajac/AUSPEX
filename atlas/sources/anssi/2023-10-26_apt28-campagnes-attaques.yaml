notes: |
  CERT-FR threat-intelligence report attributing a sustained
  campaign of intrusion attempts against French government,
  diplomatic, research, and think-tank entities to the APT28 /
  Fancy Bear / Forest Blizzard intrusion set, active since 2021.
  Published 26 October 2023. The report walks tradecraft (exploit
  chains for Outlook NTLM relay, router-compromise infrastructure
  via Ubiquiti EdgeOS) and names French targets in aggregate
  terms. Url verified by curl 2026-05-28; h1 matches.
  AUDIT (2026-07-02, claude-opus-4.8/max): snapshotted the substantive
  report. The cited url is the CERT-FR landing page (HTML, sha256
  224ba614…f17a2143, 16,272 B); its "Télécharger le rapport" links the
  full 23-page report at /uploads/CERTFR-2023-CTI-009.pdf, captured as
  raw_snapshot (sha256 08b62bfd…4725efa7, 2,487,153 B). Claims verified
  vs the PDF: CVE-2023-23397 0-day (Outlook, zero-click, Net-NTLMv2
  relay), 11 compromised Ubiquiti routers + 12 compromised business
  mailboxes, espionage. CORRECTIONS to the descriptive prose above:
  the report says only "routeurs Ubiquiti" (no "EdgeOS" string anywhere)
  and names victims as gouvernement/entreprises/universités/instituts de
  recherche/think tanks (no "diplomatic"/foreign-ministry). ANSSI
  attributes only to the "mode opératoire APT28" — no in-report
  nation/service ("Russian GRU" appears solely as an NSA bibliography
  citation). tier: primary / kind: cert-advisory correct.
