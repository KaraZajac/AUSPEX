notes: |
  CERT-FR threat-intelligence report (published in English) on
  Nobelium / APT29 / Midnight Blizzard intrusion-set activity
  affecting French diplomatic entities. Published 19 June 2024
  (Paris). The report consolidates ANSSI's view of Nobelium
  tradecraft including the Diplomatic Orbiter campaign against
  ministries of foreign affairs, embassies, and diplomatic
  communications infrastructure. Url verified by curl 2026-05-28.

  AUDIT (2026-07-04, claude-opus-4-8/max): Raw captured — landing-page
  HTML at the cited url (sha256 0e954d26…5767904b, 16,288 B), which
  links the substantive report PDF /uploads/CERTFR-2024-CTI-006.pdf,
  saved as raw_snapshot (sha256 2ecb16bb…bd3782cf, 930,774 B; 3 pp,
  TLP:CLEAR). Verbatim attribution quotes: "Activities linked to this
  intrusion set have been publicly linked to the Russian foreign
  intelligence service SVR." · "ANSSI prefers to differentiate three
  different and full-fledged SVR-related intrusion sets: APT29 … Dark
  Halo … and Nobelium." · "Nobelium is almost certainly operated on
  behalf of a state actor." · "publicly described as a campaign called
  'Diplomatic Orbiter'." tier: primary / kind: cert-advisory correct
  (national-CERT first-party advisory). NB: the descriptive line above
  says "diplomatic communications infrastructure" — that phrase is not
  in the report (ANSSI names compromised email accounts of diplomatic
  staff, the MFA, Ministry of Culture and ANCT); corrected in the
  citing event's prose. This PDF is byte-identical (same sha256) to
  atlas/sources/raw/certssigouv__2024-06_anssicert-fr-diplomatic-orbiter-report-n.pdf:
  the two source records point at the same report (landing page vs
  /uploads PDF), and the certssigouv record (tier secondary, kind
  industry) understates it. Cited by 2024-06/anssi-nobelium-france-attribution.
