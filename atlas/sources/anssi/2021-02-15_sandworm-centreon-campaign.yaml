title: 'CERTFR-2021-CTI-005 — Sandworm intrusion set campaign targeting Centreon systems'
url: https://www.cert.ssi.gouv.fr/cti/CERTFR-2021-CTI-005/
archive_url: https://www.cert.ssi.gouv.fr/uploads/CERTFR-2021-CTI-005.pdf
published_on: 2021-02-15
retrieved_on: 2026-05-28
tier: primary
notes: |
  CERT-FR threat-intelligence report published in English on
  15 February 2021 attributing a multi-year intrusion campaign
  (2017-2020) exploiting Centreon IT-monitoring software to the
  Sandworm intrusion set (Russian GRU Unit 74455). ANSSI
  identified compromises at French entities including IT-services
  providers and web-hosting operators, with the P.A.S. webshell
  and Exaramel Linux backdoor used as post-exploitation tooling.
  This was the first French national-CERT public attribution
  naming Sandworm. URL verified by curl 2026-05-28; H1 matches
  "Sandworm intrusion set campaign targeting Centreon systems".
