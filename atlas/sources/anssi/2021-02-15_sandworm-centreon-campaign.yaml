notes: |
  AUDIT (2026-07-01, claude-opus-4.8/max): raw report PDF snapshotted
  (sha256 ab7bf76d…f847299, 1,705,394 bytes, 38 pp; also captured the
  HTML landing page sha256 8af1ba6b…687f007a, 16,635 bytes). Content
  matches the citation (H1 "Sandworm intrusion set campaign targeting
  Centreon systems"). IMPORTANT attribution wording: ANSSI names ONLY the
  "Sandworm" INTRUSION SET and links the campaign via "several
  similarities with previous campaigns attributed to the intrusion set
  named Sandworm" plus C2 infrastructure "known by ANSSI to be controlled
  by the intrusion set". The report NEVER names the GRU, Russia, or Unit
  74455 (0 occurrences), and deliberately states an intrusion set "should
  not be confused with a threat actor which consists in peoples or
  organisations." It also states "The initial compromise method is not
  known." tier: primary retained (govt CERT advisory).
  CERT-FR threat-intelligence report published in English on
  15 February 2021 linking a multi-year intrusion campaign
  (late-2017 to 2020) against internet-exposed Centreon
  IT-monitoring servers to the Sandworm intrusion set (ANSSI's own
  attribution stops at the intrusion set; the GRU / Unit 74455
  identity rests on separate DOJ/Treasury attribution). ANSSI
  identified compromises at French entities including IT-services
  providers and web-hosting operators, with the P.A.S. webshell
  and Exaramel Linux backdoor used as post-exploitation tooling.
  This was the first French national-CERT public attribution
  naming Sandworm. URL verified by curl 2026-05-28; H1 matches
  "Sandworm intrusion set campaign targeting Centreon systems".
