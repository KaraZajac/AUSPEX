notes: |
  Canonical ANSSI institutional page. ANSSI was established by
  decree 2009-834 of 7 July 2009, reports to the SGDSN under the
  Prime Minister, has a strictly defensive mandate, and operates
  CERT-FR. Used as the institutional reference for the service
  entry and timeline marker.

  AUDIT (2026-06-25, claude-opus-4.8 / max): Live page captured
  (HTTP 200, cyber.gouv.fr/en, sha256 above). The page has been
  redesigned to a general landing page and confirms ANSSI as
  "France's national authority on cybersecurity and cyber defence"
  with a defensive coordination mission, but it NO LONGER states
  the specific establishment particulars (decree 2009-834, 7 Jul
  2009, SGDSN, DCSSI predecessor) asserted in the notes above —
  those facts are corroborated against the décret's authoritative
  text on Légifrance (JORFTEXT000020828212, décret n° 2009-834 du
  7 juillet 2009, signed 7 Jul 2009 / JORF 8 Jul 2009). Tier kept
  primary (govt-primary institutional source).
