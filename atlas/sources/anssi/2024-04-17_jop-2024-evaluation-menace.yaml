notes: |
  CERT-FR pre-Games threat-evaluation publication covering the
  cyber threat against the Paris 2024 Olympic and Paralympic
  Games and against organizers, sponsors, venues, and
  partner supply-chains. Cataloged adversary clusters include
  Russia-aligned APT activity (APT28, Sandworm), criminal
  ransomware-affiliate clusters, and hacktivist disruption
  groups (NoName057(16)). Editorially the companion ANSSI
  publication to the post-Games VIGINUM information-threat
  synthesis. URL verified by curl 2026-05-28; H1 matches.
