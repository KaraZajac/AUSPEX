notes: |
  CERT-FR pre-Games threat-evaluation publication (CERTFR-2024-CTI-003)
  on the cyber threat against the Paris 2024 Olympic and Paralympic
  Games (JOP 2024) — the host country, organizers, their providers /
  subcontractors, sponsors, athletes and spectators. The report is
  structured by attacker GOAL (lucrative / destabilization /
  espionage), NOT by named clusters; it illustrates each goal with
  historical precedents (Olympic Destroyer at PyeongChang 2018,
  attributed by NCSC-UK to the Russian GRU; PLAY ransomware vs the
  French rugby federation; a REVIL-impersonation DDoS extortion; the
  2016 WADA/AMA hack-and-leak by "attaquants réputés russes"; the
  Fujitsu / ProjectWEB supply-chain compromise affecting Tokyo 2020).
  Editorially the companion ANSSI publication to the post-Games
  VIGINUM information-threat synthesis. URL verified by curl
  2026-05-28; H1 matches.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw captured — landing HTML
  sha256 ed9741ab…1dc34d90 (16,692 B) + the linked 28-page PDF
  /uploads/CERTFR-2024-CTI-003.pdf (raw_snapshot; sha256
  3e5616ea…bd49ad70, 2,798,930 B). CORRECTION: this note previously
  claimed the report "cataloged … Russia-aligned APT activity (APT28,
  Sandworm) … and hacktivist disruption groups (NoName057(16))" — that
  is unsupported. "APT28" appears 0× and "NoName057(16)" appears 0× in
  the PDF; both were removed here and from the citing event. "Sandworm"
  appears once, hedged, as a Tokyo-2020 historical reference: "Cette
  unité aurait employé le mode opératoire réputé russe SANDWORM mais
  les informations à la disposition de l'ANSSI ne lui permettent pas
  de le confirmer ou de l'infirmer." Posture quote: "Au moment de la
  rédaction de ce document, l'ANSSI n'a pas constaté d'attaque
  informatique ayant un lien direct avec les JOP 2024. Seuls des
  appels à mener des actions hacktivistes ont été recensés."
