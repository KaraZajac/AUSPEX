notes: |
  CERT-FR annual threat panorama publication for 2023, covering
  ANSSI's editorial view of the threat landscape against French
  entities: continuing Russian state-aligned APT activity (APT28
  / Nobelium), increased Chinese cyber-espionage tasking,
  Iranian retaliatory activity in the Gaza war context,
  pre-positioning concerns relating to Volt Typhoon and analogous
  China-attributed clusters, and persistent ransomware-criminal
  pressure on French local government and health entities. The
  Panorama is ANSSI's flagship annual public-facing publication
  and the most authoritative French government statement of
  defensive-side threat posture year-to-year. URL verified by
  curl 2026-05-28; H1 matches.
  AUDIT (2026-07-04, claude-opus-4.8/max): snapshotted the substantive
  report. The cited url is the CERT-FR landing page (HTML, sha256
  23c58c4b…d7d9b6a9, 15,926 B; metadata table confirms Référence
  CERTFR-2024-CTI-001, titre "Panorama de la cybermenace 2023", date de
  la première version 27 février 2024); its download link
  /uploads/CERTFR-2024-CTI-001.pdf is the full 48-page report, captured
  as raw_snapshot (sha256 d56249ca…8b561165, 6,288,478 B). CORRECTIONS
  to the descriptive prose above, verified vs the PDF: "Nobelium"
  appears NOWHERE in the report (APT29/SVR/Midnight Blizzard also 0
  hits) — Russian-reputed content is Sandworm in the body (Infamous
  Chisel vs Ukrainian army Android devices) plus APT28 tradecraft via
  citation of CERT-FR's own CERTFR-2023-CTI-009 ("APT28" only in the
  bibliography). The Iranian-nexus content is NOT Gaza-war retaliation:
  it is the Charlie Hebdo / Holy Souls hack-and-leak over the
  Khamenei-caricature contest (Emennet Pasargad front company, in the
  service of the IRGC and the Iranian intelligence ministry, per cited
  US reporting); the report's only Gaza passage concerns the
  pro-Russian hacktivist group Anonymous Sudan re-targeting Israeli
  entities after threatening France over Niger. "Volt Typhoon" appears
  only as a bibliography title ([39] Microsoft, beside [38] CISA
  PRC-LOTL), cited for China-attributed living-off-the-land targeting
  of US critical infrastructure; the body's pre-positioning findings
  (energy-sector IT/OT in Europe, North America, Asia; potential later
  sabotage) are cited to SektorCERT/Canadian-CCCS reporting and not
  attributed to China by name. tier primary / kind cert-advisory
  correct (first-party government publication).
