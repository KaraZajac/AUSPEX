notes: |
  CERT-FR annual threat panorama publication for 2023, covering
  ANSSI's editorial view of the threat landscape against French
  entities: continuing Russian state-aligned APT activity (APT28
  / Nobelium), increased Chinese cyber-espionage tasking,
  Iranian retaliatory activity in the Gaza war context,
  pre-positioning concerns relating to Volt Typhoon and analogous
  China-attributed clusters, and persistent ransomware-criminal
  pressure on French local government and health entities. The
  Panorama is ANSSI's flagship annual public-facing publication
  and the most authoritative French government statement of
  defensive-side threat posture year-to-year. URL verified by
  curl 2026-05-28; H1 matches.
