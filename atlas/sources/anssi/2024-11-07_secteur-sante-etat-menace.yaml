notes: |
  CERT-FR sector-state-of-the-threat report on French healthcare
  cyber risk, published 7 November 2024. Tracks the sustained
  ransomware pressure on French hospitals and health
  organizations 2019-2024 (CHU de Rouen 2019, CH Dax 2021,
  CHSF Corbeil-Essonnes 2022, CHU Brest 2023, Hôpital Simone
  Veil Cannes 2024), enumerates adversary clusters affecting the
  sector (LockBit, BlackCat, FIN12-aligned), and frames ANSSI's
  defensive-coordination posture under LID for the French
  healthcare regulated-operator regime. URL verified by curl
  2026-05-28; H1 matches.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshotted the substantive
  report. The cited url is the CERT-FR landing page (HTML, sha256
  66c24dde…c4c10c71, 16,472 B; metadata confirms Référence
  CERTFR-2024-CTI-010, titre "Secteur de la santé - État de la menace
  informatique", Date de la première version 7 novembre 2024); its download
  link /uploads/CERTFR-2024-CTI-010.pdf is the full 45-page report, captured
  as raw_snapshot (sha256 b0296081…e46fff27, 733,570 B). CORRECTION to the
  descriptive prose above, verified vs the PDF: the ONLY named French
  establishment is the Centre Hospitalier Sud-Francilien (Corbeil-Essonnes;
  LockBit 3.0, night of 20-21 Aug 2022, $10M demand, ~EUR 7M cost, 11 GB
  leaked 23 Sep 2022). "CHU de Rouen 2019", "CH Dax 2021", "CHU Brest 2023"
  and "Hôpital Simone Veil Cannes 2024" appear NOWHERE in the report
  (Rouen / Dax / Brest / Cannes / Simone-Veil = 0 hits each) — fabricated,
  do not cite. The report's core incident-statistics window is "janvier 2022
  – décembre 2023"; it is structured by finality (lucrative / espionnage /
  déstabilisation); "lutte informatique" / "LID" = 0 substantive hits (no
  in-substance doctrine naming), but OIV = 24 / OSE = 16 / SAIV / NIS2 name
  the regulated-operator regime. tier primary / kind cert-advisory correct
  (first-party government publication).
