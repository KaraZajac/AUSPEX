notes: |
  BAE Systems' companion disclosure to Symantec's 12 Feb 2017 report on the
  Polish/global banks watering-hole campaign. Canonical mirror also at
  https://www.baesystems.com/en/cybersecurity/blog/lazarus---watering-hole-attacks
  (live baesystemsai.blogspot.com captured for raw_snapshot, HTTP 200).
  Created 2026-07-10 (claude-opus-4.8/max) for the 2016-10/lazarus-polish-banks
  audit — the event named "BAE Systems" as a co-attributor but had no BAE
  source record (the only pwc-bae/* record is Operation Cloud Hopper, an
  unrelated APT10 report). Raw-verified load-bearing content:
   - Watering-hole hosts: the Polish Financial Supervision Authority
     (knf.gov[.]pl); Mexico's Comisión Nacional Bancaria y de Valores (CNBV,
     cnbv.gob[.]mx); a state-owned bank in Uruguay (~2016-10-26, brou.com[.]uy).
   - "From at least 2016-10-07 to late January the website code had been
     modified" (dates the KNF compromise window).
   - Exploits: "These leverage Silverlight and Flash exploits to deliver
     malware" — incl. "CVE-2016-0034 (MS16-006) – a Silverlight Memory
     Corruption vulnerability."
   - Targeted-bank concentration table: Poland (19), United States (15),
     Mexico (9), United Kingdom (7), Chile (6), Brazil (5), Peru (3),
     Colombia (3), Denmark (3), India (3).
   - ATTRIBUTION HEDGE (load-bearing): "The technical/forensic evidence to
     link the Lazarus group actors ... to the watering-hole activity is
     unclear." -> AUSPEX records BAE at moderate / concur-with-caveat.
