notes: |
  Foundational technical disclosure of the Bangladesh Bank SWIFT-heist
  malware (evtdiag.exe + the nroff-based print-suppression toolkit).
  This is the primary-research source the DOJ 2018 Park Jin Hyok
  complaint itself cites by URL in a footnote (baesystemsai.blogspot.com/
  ...951m.html). BAE does NOT make the DPRK/Lazarus attribution in this
  post (technical analysis only) — it is cited for the mechanics and the
  $951M figure, not for actor attribution.
  Created 2026-07-11 (claude-opus-4.8/max) for the 2016-02/bangladesh-bank-
  swift audit: the event's canonical $951M-attempted figure, Federal
  Reserve routing, and nroff/print-suppression tradecraft were carried by
  no cited source (the DOJ complaint says only "approached $1 billion";
  Mandiant says "hundreds of millions"). Raw captured direct from the live
  blog (HTTP 200, 86,124 B), sha256 above. Publish date 2016-04-25 read
  from the page's datePublished itemprop (2016-04-25T08:00:00).
  Raw-verified load-bearing content:
   - Scale + loss (verbatim): "In February 2016 one of the largest cyber
     heists was committed and subsequently disclosed. An unknown attacker
     gained access to the Bangladesh Bank's (BB) SWIFT payment system and
     reportedly instructed an American bank to transfer money from BB's
     account to accounts in The Philippines. The attackers attempted to
     steal $951m, of which $81m is still unaccounted for." (Sources the
     usd_attempted=951000000 and usd_stolen=81000000; "still unaccounted
     for" as of Apr-2016 corroborates the DOJ "majority ... not recovered".)
   - Correspondent routing: page names the "FEDERAL RESERVE BANK" as the
     instructed institution (an "American bank").
   - Print-suppression mechanism (verbatim): "the malware also intercepts
     the confirmation SWIFT messages and then sends for printing the
     'doctored' (manipulated) copies ... These temporary PRT files are then
     submitted for printing by using another executable file called
     nroff.exe, a legitimate tool from the SWIFT software suite." Confirms
     the Alliance Access nroff-based print routine and the fraudulent-
     confirmation suppression ("FIN 900 Confirmation of Debit").
   - Malware named: evtdiag.exe, nroff_b.exe (SWIFT Alliance Access
     database/message manipulation). Does NOT mention "Manuscrypt",
     "Hermes", "MT-103", "RCBC", "Manila", or a "35"-transaction count
     (0 hits each) — those event claims are NOT carried here either.
