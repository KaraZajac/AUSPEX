notes: |
  Created 2026-07-04 during LLM audit of event 2024-02/anydesk-production-intrusion —
  the primary carrier of the "Jobaaaaa" credential-sale claim.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256 (144,635
  bytes). Page dated "4 Feb 2024". Verbatim support:
   - "On February 3, 2024, Resecurity identified multiple threat actors selling
     access to compromised AnyDesk credentials on cybercriminal forums."
   - "going by the alias 'Jobaaaaa,' and who had initially registered their forum
     account in 2021, listed over 18,000 AnyDesk customer credentials for sale on
     Exploit[.]in"; "The threat actor offered 18,317 accounts for $15,000 to be
     paid in cryptocurrency."
   - actor's own pitch: "this data is ideal for technical support scams and
     mailing (phishing)"
   - CRITICAL CAVEAT the event must carry: "These compromised account credentials
     are believed to have been obtained via infostealer infections" / "this
     credential leak is widely believed to be the result of infostealer
     infections" — i.e. NOT shown to be exfiltrated in the AnyDesk production
     breach (AnyDesk later said the listings were "not related to the incident",
     per securityweek/2024-02-09_anydesk-shares-more-information).
   - also raises the hypothetical escalation path: "the potential to evolve into a
     more devastating supply-chain attack, impacting AnyDesk's enterprise
     customers."
