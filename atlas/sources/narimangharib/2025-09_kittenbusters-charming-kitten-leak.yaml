  AUDIT (2026-07-11, claude-opus-4.8/max): raw HTML captured + hashed
  (sha256 03a01142…42db34d7, 77,262 bytes). This is the carrier for the
  leak-specific claims the two prior sources do NOT hold:
  - LEAKED MATERIALS: "The leak, posted to GitHub under the name
    'KittenBusters,' includes hundreds of files spanning attack reports,
    daily operational logs, internal communications, malware samples,
    and photographs of personnel allegedly working for the group."
  - NAMED LEADER + NATIONAL ID + FRONT COMPANIES: "The disclosure
    identifies Abbas Rahrovi, also known as Abbas Hosseini, as the
    operation's leader, providing his Iranian national identification
    number [4270844116] and alleging he manages the hacking unit through
    a network of front companies."
  - UNIT: "tied the group to Iran's Intelligence Organization of the
    Islamic Revolutionary Guard Corps, specifically its
    counterintelligence division known as Unit 1500" (also "Department
    40").
  - LEAKER UNATTRIBUTED: "The identity and motivation of whoever is
    behind 'KittenBusters' remains unknown"; "Israeli intelligence has
    been suspected of role in exposing Iranian operations"; the decision
    to expose "suggest[s] either insider access or a significant breach
    of the group's operational security." No definitive attribution.
