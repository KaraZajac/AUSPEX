notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): re-captured live (HTTP 200, 302930 bytes) and hashed
  while re-homing Lebanese Cedar to Lebanon. Confirms BOTH the Hezbollah/Lebanon host-nexus and the
  Iran/Quds-Force backing. Verbatim:
  - "Iran has provided cyber technology to Lebanese Hezbollah and helped group build its own
    counterintelligence cyber unit, according to The National Interest."
  - "The unit is said to work under the direction of the elite Quds Force of Iran's Islamic
    Revolution Guard Corps (IRGC), and is primarily tasked with gathering intelligence on Lebanese
    state institutions as well as conducting cyberattacks on strategic targets in the Persian Gulf
    states such as gas and oil companies."
  - "According [to] Western cyber security experts, a Hezbollah-affiliated cyber unit, known as
    Lebanese Cedar APT, launched attacks in January 2021 that lasted for more than a year on
    telecommunications companies and internet providers in the United States and many other countries."
