notes: |
  Primary technical writeup of the August 2018 Cosmos Bank
  (Pune, India) SWIFT/ATM heist. Documents the two modalities
  (ATM cash-out and SWIFT wire transfer), the malicious ISO8583
  proxy-switch mechanism, the US$13.5M loss, and the Lazarus
  attribution.
  AUDIT (2026-07-01, claude-opus-4.8/max): raw captured (curl,
  HTTP 200, 188,590 bytes). Verbatim support confirmed:
  "US$13.5 million stolen from Cosmos Bank between August 10-13,
  2018"; ATM modality "on August 10-11, 2018 ... for over US$11.5
  million in 2849 domestic (Rupay) and 12,000 international (Visa)
  transactions using 450 cloned (non-EMV) debit cards in 28
  countries"; malicious-switch mechanism "leveraging a set of
  malicious ISO8583 libraries and process code injections to
  stand up a malicious ATM/POS switch (malicious-Central or MC)"
  sending "fake Transaction Reply (TRE)/ISO8583 x210 messages";
  SWIFT modality "On August 13, 2018 ... abused the Cosmos bank's
  SWIFT SAA environment LSO/RSO compromise/authentication to send
  three malicious MT103 to ALM Trading Limited at Hang Seng Bank
  in Hong Kong amounting to around US$2 million"; attribution
  "Currently attributed to a nation-state-sponsored malicious
  threat actor (Lazarus Group) by some sources"; initial vector
  "Unconfirmed. Based on the attribution, likely spear phishing";
  Lazarus hallmarks "use of Windows Admin Shares for Lateral
  Movement, using custom Command and Control (C2) that mimics
  TLS, adding new services on targets for Persistence, Windows
  Firewall changes, Timestomping, Reflective DLL Injection".
