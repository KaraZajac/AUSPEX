notes: |
  Cisco's first-party incident disclosure ("Cisco Event Response:
  Vishing Attack Impacting Third-Party CRM System"). The advisory
  carries its own dates: "First Published: Friday, August 1, 2025" and
  "Latest Update: Friday, October 3, 2025." No public Wayback capture or
  press coverage exists before 5 Aug 2025 (earliest CDX capture
  20250805122430), so the effective PUBLIC disclosure was 5 Aug 2025
  even though Cisco stamps the advisory first-published 1 Aug 2025.

  SNAPSHOT CAVEAT: the sec.cloudapps.cisco.com resource page is
  JavaScript-rendered — a raw curl returns only the CSS/HTML shell
  (21,642 bytes; content_sha256 e46658210142..de5f78129), with NONE of
  the advisory body text. The shell is preserved for provenance; every
  load-bearing FACT below was read from the rendered page (WebFetch) and
  is INDEPENDENTLY mirror-corroborated verbatim by two fully-snapshotted
  secondaries in the same event (bleepingcomputer/2025-08-05, sha256
  3b98be9e..6511b392; techcrunch/2025-08-05, sha256 a6b64144..8d0f78571).

  Verbatim facts (rendered advisory):
   - "On July 24, 2025 (GMT+9), Cisco was made aware of an incident
     involving a bad actor targeting a Cisco representative through a
     voice phishing attack."
   - The actor accessed and exported "a subset of basic profile
     information from one instance of a third-party, cloud-based
     Customer Relationship Management (CRM) system."
   - Exposed fields: "name, organization name, address, Cisco assigned
     user ID, email address, phone number, and account-related metadata
     such as creation date" (of individuals who registered a Cisco.com
     user account).
   - "The actor did not obtain any of our organizational customers'
     confidential or proprietary information, or any passwords or other
     types of sensitive information."
   - Response: "the actor's access to that CRM system instance was
     immediately terminated and Cisco commenced an investigation"; Cisco
     notified "affected users where required by law."

  CRITICAL LIMITS carried by this primary: Cisco's advisory does NOT use
  the word "Salesforce" and does NOT name any threat actor (no
  "ShinyHunters" / "UNC6040"). The Salesforce + ShinyHunters placement is
  external press inference, not a Cisco confirmation.

  AUDIT (2026-07-11, claude-opus-4.8/max): created this audit as the
  Cisco-specific PRIMARY. The event previously carried only campaign-level
  sources (mandiant/2025-08-08, krebs/2025-10) that name no Cisco.
