notes: |
  Investigative secondary source (VSquare / FRONTSTORY.PL) reconstructing the
  Dworczyk hack-and-leak. Created 2026-07-11 (claude-opus-4.8/max) during the
  QC audit of event 2020-09/ghostwriter-poland-government-leaks — carries the
  compromise-window (2020-21) that supports the event's 2020 start_date and
  the mailbox-scale figure.

  Captured live 2026-07-11 (HTTP 200, 134,306 B). datePublished
  2022-03-19T13:14:54+00:00 (bylines Anna Gielewska, Julia Dauksza).

  KEY WORDING (verbatim from the snapshot):
  - COMPROMISE WINDOW (supports the 2020 onset): "Dworczyk's email address
    and address of his wife (both created in wp.pl domain) were targets of
    phishing attacks carried out between 2020-21." (No source pins an exact
    onset day/month; this is the tightest window available.)
  - SCALE: "There were over 60,000 emails in Michał Dworczyk's hacked
    mailbox."
  - TECHNICAL ATTRIBUTION (Belarus nexus): "UNC1151, a group related to the
    Belarusian government and serving a 'Ghostwriter' operation in Russia's
    interest, is behind the attack."
  - LEAK MECHANICS / SOCIAL-ACCOUNT VECTOR: "Attackers hacked [the] Facebook
    account belonging to Dworczyk's wife and posted a fabricated message
    with a link to the Telegram channel"; "From June 2021, the contents of
    Dworczyk's mailbox were distributed through a Telegram channel. But it
    was blocked for Polish viewers in July. Few days later, on 27 July, after
    experimenting with other platforms ..." — the leak distribution ran on
    past the June 2021 disclosure (still "daily" as of this March 2022
    report), so the event end_date is left open.
