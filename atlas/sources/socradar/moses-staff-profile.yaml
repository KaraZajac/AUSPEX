notes: |
  URL/title fix (2026-06-24): the cited url was the bare https://socradar.io/ homepage stub (archive_url
  likewise the homepage); corrected to the canonical "Dark Web Profile: Moses Staff" article and exact
  title. (Page header shows an original 2022 publication with a "Nov 01, 2024" update line.)

  AUDIT (2026-06-24, claude-opus-4.8/max): IRGC/service finding — Iran nexus YES, named service NO. Captured
  live (curl, HTTP 200, 387,755 bytes) and hashed. SOCRadar describes "the Iranian hacker group known as
  Moses Staff" and (closely echoing Cybereason) states verbatim: "State-Sponsored Ransomware: Moses Staff
  employs ransomware post-exfiltration, not for financial gain but to disrupt operations, obfuscate espionage
  activity, and inflict damage to systems to advance Iran's geopolitical goals"; and "Moses Staff leverages
  cyber espionage and sabotage to advance Iran's geopolitical goals." No IRGC, MOIS, Quds Force, Revolutionary
  Guard, or any named Iranian intelligence service anywhere in the document. Tertiary source largely derivative
  of Cybereason. Supports an Iran nexus but NOT an IRGC/MOIS placement; used as a basis for demoting the actor
  to ir/unscoped/moses-staff.
