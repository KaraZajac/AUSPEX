notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw page captured (sha256 above) and cross-checked
  against the cited Wayback snapshot — both identical on attribution. Talos attributes the
  Sagerunex campaigns to "the Lotus Blossom group" purely on TTPs/backdoor/victimology and names
  NEITHER an intelligence service NOR a nation for the group: zero occurrences of "MSS",
  "Ministry of State Security", "state-sponsored", or "Chinese government", and zero of
  "China"/"Chinese" referring to Lotus Blossom (the page's only "China-nexus"/"Chinese-speaking"
  strings are in unrelated Recommended/Related footer items about UAT-8302 and a BadIIS MaaS
  cluster). Verbatim attribution wording:
    - "Talos attributes these attacks to the threat actor known as Lotus Blossom. Lotus Blossom
      has actively conducted cyber espionage operations since at least 2012 and continues to
      operate today."
    - "...we attribute these campaigns to the Lotus Blossom group with high confidence."
    - "Talos assesses with high confidence that Lotus Blossom (also referred to as Spring Dragon,
      Billbug, Thrip) threat actors are responsible for these campaigns... Our assessment is based
      on the TTPs, backdoors, and victim profiles associated with each activity."
    - "Talos has identified strong evidence to attribute these campaigns to the Lotus Blossom
      group, primarily due to the presence of the Sagerunex backdoor within these operations."
  Finding: source supports the named-actor attribution (Lotus Blossom, high confidence) but does
  NOT support the cn/mss service placement or even the `cn` nation for this actor → drove the
  actor's demotion from cn/mss/lotus-blossom to cn/unscoped/lotus-blossom (nation-support FLAG
  recorded on the actor).
