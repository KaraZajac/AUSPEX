notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): supports a CHINA NEXUS only — does NOT name a
  service. Talos attributes UAT-8302 to "China-nexus" (15x) / "Chinese-speaking" (3x) and
  never to the MSS, the PLA, or any specific Chinese intelligence/military service ("MSS",
  "Ministry of State Security", "state security", "PLA", "intelligence service" do not appear;
  the lone "state-sponsored" string is in an unrelated Related-Content teaser). Drove the
  demotion of the cited actor from cn/mss/uat-8302 to cn/unscoped/uat-8302. "UAT" is Talos's
  uncategorized-cluster prefix.
  Verbatim attribution quote: "Talos assesses with high confidence that UAT-8302 is a
  China-nexus advanced persistent threat (APT) group tasked primarily with obtaining and
  maintaining long-term access to government and related entities around the world."
