notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): raw HTML captured + hashed. Title corrected to the
  live page title ("Arid Viper APT targets Palestine with new wave of politically themed phishing
  attacks, malware"). PUBLISH DATE CORRECTED 2021-10-01 -> 2022-02-02: the article's own byline and
  metadata read "Wednesday, February 2, 2022 08:00" (datePublished 2022-02-02T13:00:00Z, by Asheer
  Malhotra & Vitor Ventura); the 2021-10 in the legacy record/slug is the CAMPAIGN start month, not
  the publication date. Source id left unchanged (slugs are stable). Attribution verbatim: "Talos
  believes with high confidence that this is the work of the Arid Viper threat actor. This is a group
  believed to be based out of Gaza." On timing: "The actor uses the Micropsia implant in the most
  recent wave that started around October 2021." On motivation, Talos names only espionage, no
  service/sponsor: Arid Viper's "main motivation is espionage and information theft, and has been
  attributed to malicious operators politically motivated towards the liberation of Palestine."
  Targets verbatim: "the victims being Palestinian individuals and organizations"; decoys reference
  "a Palestinian activist", "the State of Palestine's Ministry of Health", and the MA'AN Palestinian
  development center. Original supporting quote retained below.
  Supporting quote: This actor uses their Delphi-based Micropsia implant to target Palestinian individuals and organizations, using politically themed file names and decoy documents.
