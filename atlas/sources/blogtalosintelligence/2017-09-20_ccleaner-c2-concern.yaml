  Supporting quotes (verbatim from the snapshot):
  - "Below is a list of domains the attackers were attempting to target. Not all
    companies identified in the targets .php file were seen communicating [with the
    secondary C2]." (the stage-2 target list is rendered as an in-post table IMAGE,
    so the individual firm names are NOT in the page text; see caveat below).
  - "Interestingly the array specified contains Cisco's domain (cisco.com) along with
    other high-profile technology companies. This would suggest a very focused actor
    after valuable intellectual property."
  - "Using the logs which only covers four days in September, we can confirm that at
    least 20 victim machines were served specialized secondary payloads" /
    "more than 20 machines have received the second-stage payload."
  - "elements of our research point towards a possible unknown, sophisticated actor."
  - On China: "configuration specifies 'PRC' as the time zone, which corresponds with
    People's Republic of China (PRC). It's important to note that this cannot be
    relied on for attribution." (Talos explicitly does NOT use this for attribution.)
  - ACTOR FIGURE: the post embeds a side-by-side code comparison captioned
    "0375b4216334c85a4b29441a3d37e61d7797c2e1cb94b14cf6292449fb25c7b2 (Missl backdoor
    - APT17/Group 72)" against the CCBkdr.dll — i.e. Talos corroborates the APT17 /
    Group 72 code overlap (the Intezer / Kaspersky finding) inside a tier-1 primary.
  CAVEAT: the specific stage-2 firm list (widely reported as Cisco, Intel, Samsung,
  Sony, VMware, Microsoft, MSI, Linksys, Epson, Akamai, Singtel, O2, Vodafone,
  Gauselmann, D-Link, HTC, etc.) is shown in the targeting-table SCREENSHOT, not the
  HTML text; only "Cisco (cisco.com)" and the "high-profile technology companies"
  framing are text-extractable. No occurrence of APT41 / Barium / Axiom in the text.
