notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw HTML captured from the live URL (HTTP 200, the
  Talos article "UAT-7290 targets high value telecommunications infrastructure in South Asia",
  bylined Asheer Malhotra / Vitor Ventura / Brandon White, dated Thursday, January 8, 2026).
  Source NAMES NO Chinese service — "Ministry of State Security" / "MSS" appear zero times.
  Talos attributes the actor only at the nation-nexus level, verbatim: "Talos assesses with high
  confidence that UAT-7290 is a sophisticated threat actor falling under the China-nexus of
  advanced persistent threat actors (APTs)." The sole unit reference is to the PLA, via a hedged
  third-party overlap, verbatim: "UAT-7290 shares a significant amount of overlap in victimology,
  infrastructure, and tooling with a group publicly reported by Recorded Future as Red Foxtrot.
  In a 2021 report, Recorded Future linked Red Foxtrot to Chinese People's Liberation Army (PLA)
  Unit 69010."

  AUDIT (2026-06-24, claude-opus-4.8/max) — PLA chain / re-promotion: this Talos source names no
  service, but MISP galaxy (AUSPEX's canonical actor reference) cluster "DAGGER PANDA" (uuid
  32c534b9-abec-4823-b223-a810f897b47b, country CN) lists UAT-7290, Red Foxtrot, RedFoxtrot and PLA
  Unit 69010 as synonyms of one cluster, and Recorded Future's 2021 Insikt report attributes Red
  Foxtrot to PLA Unit 69010 (a Technical Reconnaissance Bureau, Ürümqi, Xinjiang). On that
  equivalence chain — UAT-7290 ≈ Red Foxtrot (Talos overlap; MISP synonym) and Red Foxtrot -> PLA
  Unit 69010 (RF, hedged) — the referencing actor was RE-PROMOTED cn/unscoped/uat-7290 ->
  cn/pla/uat-7290 (primary_service_id cn/pla-ssf), at MODERATE confidence (overlap-based: Talos says
  "overlap" not "is"; RF uses "suspected"/"likely the MUCD"). PLA = military, definitively not MSS.
  Verbatim from this source: "Talos assesses with high confidence that UAT-7290 is a sophisticated
  threat actor falling under the China-nexus of advanced persistent threat actors (APTs)." and
  "UAT-7290 shares a significant amount of overlap in victimology, infrastructure, and tooling with a
  group publicly reported by Recorded Future as Red Foxtrot. In a 2021 report, Recorded Future linked
  Red Foxtrot to Chinese People's Liberation Army (PLA) Unit 69010."
