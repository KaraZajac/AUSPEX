notes: |
  Cisco Talos' first-hand technical analysis of the BadRabbit ransomware outbreak (Nick Biasini,
  24 Oct 2017; updated 25-26 Oct 2017).

  Supporting quotes (verbatim):
  - "On October 24, 2017, Cisco Talos was alerted to a widescale ransomware campaign affecting
    organizations across eastern Europe and Russia."
  - "Talos assesses with high confidence that a fake Flash Player update is being delivered via a
    drive-by-download" / "The dropper ... requires a user to facilitate the infection and does not
    use any exploit to compromise the system directly."
  - "Despite initial reports, we currently have no evidence that the EternalBlue exploit is being
    leveraged. However, we identified the usage of the EternalRomance exploit to propagate in the
    network. This exploit takes advantage of a vulnerability described in the Microsoft MS17-010
    security bulletin. The vulnerability was also exploited during the Nyetya campaign."
  - "We assess with high confidence: that BadRabbit is built on the same core codebase as Nyetya."
  - "While these links are not absolute proof, based on these findings Talos assesses with low
    confidence that the authors of Nyetya and BadRabbit are the same."
  - "the initial vector wasn't a sophisticated supply chain attack. Instead it was a basic
    drive-by-download leveraging compromised websites." / "Email has not been identified as an
    attack vector at this time."
  Talos names NO threat actor / nation (no Sandworm, TeleBots, BlackEnergy, GRU): the only
  attribution is the code-level link to the Nyetya (NotPetya) developer cluster, at LOW confidence
  for same-authorship.

