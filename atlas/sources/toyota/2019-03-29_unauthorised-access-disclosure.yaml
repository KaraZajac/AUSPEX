notes: |
  Toyota Australia first-party disclosure of a cyber-attack
  affecting IT systems; the company declined to attribute.
  AUDIT (2026-07-10, claude-opus-4.8/max): UN-SNAPSHOTTABLE / link-rotted.
  Live url https://www.toyota.com.au/news/update-attempted-cyberattack
  now 301-redirects to /discover/news/... and returns HTTP 404; the only
  Wayback captures are 2026-06 (301 then 403), i.e. no usable historical
  capture exists. The first-party statement content is nonetheless
  mirror-corroborated verbatim inside the snapshotted ZDNet record
  (zdnet/2019-03-29_toyota-australia-apt32, sha256 79de5984…822135c2):
  "we believe no private employee or customer data has been accessed" and
  "we have no further details about the origin of the attack." Retained
  as primary lineage; does not force the event to partial (facts carried
  by the ZDNet snapshot).
