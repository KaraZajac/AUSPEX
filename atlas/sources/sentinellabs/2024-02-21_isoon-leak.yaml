notes: |
  Initial public analysis of the i-Soon / Anxun document leak, by Dakota
  Cary & Aleksandar Milenkoski (2024-02-21). Names i-Soon (上海安洵) as a
  company that "contracts for many PRC agencies–including the Ministry of
  Public Security, Ministry of State Security, and People's Liberation
  Army"; the leaker and motives are "not known"; document authenticity
  "still undecided" at publication while contents "do confirm public
  threat intelligence." Cornerstone source for the contractor-ecosystem
  model: "government targeting requirements drive a competitive
  marketplace of independent contractor hackers-for-hire"; "third-party
  contractors play a significant role in facilitating and executing many
  of China's offensive operations in the cyber domain."

  AUDIT (2026-07-04, claude-opus-4.8/max): raw live HTML captured
  (HTTP 200, 324,211 bytes; sha256 2f9f3417…5e5d6255; fetched 2026-07-04).
  CORRECTION to the pre-audit note, which claimed the article "ties tools
  and infrastructure to APT41 / POISON CARP / Jackpot Panda": it does NOT —
  none of those names (nor Chengdu 404 / Winnti / Earth Lusca) appears
  anywhere in the article. It states only that leaked indicators "relate
  to suspected Chinese cyberespionage activities previously observed by
  the threat intelligence community" and "align with previous threat
  intel on several named threat groups," naming none. Named-cluster ties
  to i-Soon belong to OTHER sources (e.g. ESET Operation FishMedley 2025:
  FishMonger/Earth Lusca "operated by I-SOON"). The pre-audit phrase
  "independent authentication" was also wrong — the article explicitly
  leaves authenticity "still undecided." tier=primary preserved
  (first-party vendor research page, resolves to the genuine article).
