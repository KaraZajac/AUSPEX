notes: |
  SentinelLabs analysis of Transparent Tribe's CapraRAT Android
  surveillance malware delivered via fake-YouTube (video-platform)
  lures with a "Piya Sharma" romance persona; the report also notes,
  as background, an earlier-2023 dating-service distribution. A
  foundational reference for APT36's mobile-targeting tradecraft.

  URL slug fix (2026-05-28): canonical SentinelLabs slug ends in
  "android-phones" not "android-devices".

  AUDIT (2026-06-24, claude-opus-4.8/max): live URL captured cleanly (HTTP 200,
  full article body). Finding: attributes to the COUNTRY, not the ISI — "Transparent
  Tribe is a suspected Pakistani actor known for targeting military and diplomatic
  personnel in both India and Pakistan." The words "ISI" / "Inter-Services
  Intelligence" do NOT appear. Supports a Pakistan nexus but NOT the ISI service
  placement.

