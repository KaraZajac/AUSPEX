notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): raw HTML captured (HTTP 200,
  330,198 B); byline confirms August 19, 2021. Supports the NetSarang→APT41
  attribution at named-actor level — verbatim: "BARIUM (Rose and Zhang
  Haoran) were one of the earliest threat groups with access to ShadowPad.
  Some of their victims included NetSarang, ASUS, and allegedly, CCleaner,"
  with "APT41 ... the accepted naming convention" for BARIUM + LEAD. Carries
  its own attribution-caution caveat: ShadowPad is privately sold across ≥5
  clusters, so "any claim made publicly on the attribution of ShadowPad
  users requires careful validation and strong evidentiary support."
