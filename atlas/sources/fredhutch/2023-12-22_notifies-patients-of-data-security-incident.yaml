notes: |
  Fred Hutch's FIRST-PARTY formal patient-notification notice — carries
  the access window and the data-type inventory. Key quotes (raw
  snapshot sha ad8adca3…13ddd26d, 122,463 bytes): "SEATTLE – DECEMBER
  22, 2023 – As previously reported, on November 19, 2023, Fred
  Hutchinson Cancer Center detected unauthorized activity"; the actor
  "accessed the clinical network and obtained patient information from
  Fred Hutch systems between November 19 and November 25, 2023"; data
  involved "may include: name, address, phone number, email address,
  date of birth, Social Security number, health insurance information,
  medical record number, patient account number, date(s) of service
  and/or certain clinical information such as treatment/diagnosis
  information, lab results, or provider name"; "Fred Hutch's electronic
  medical record system was not involved or accessed, and all Fred Hutch
  clinics have remained open." Still names NO perpetrator and NO
  affected count (Fred Hutch reported the count separately to HHS OCR —
  see hipaajournal/2023-12-28_fred-hutch-lawsuits-mount).

