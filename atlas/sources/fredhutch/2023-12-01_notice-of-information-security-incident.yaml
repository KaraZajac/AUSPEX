notes: |
  Fred Hutch's FIRST-PARTY initial disclosure of the incident — the
  disclosure_date anchor. Key quotes (raw snapshot sha 26525070…6ade398a,
  121,892 bytes): "SEATTLE – DECEMBER 1, 2023 – Fred Hutchinson Cancer
  Center today announced the detection of unauthorized activity on
  limited parts of the Center's clinical network"; "Upon learning of the
  situation, Fred Hutch took immediate action to quarantine the servers
  and contain the impact of the incident, including proactively taking
  their clinical network offline"; all clinics remained open. This
  notice names NO threat actor, NO ransom/extortion, NO count, and NO
  vulnerability — it is the bare first acknowledgment; the actor
  (Hunters International) and the patient-direct extortion were reported
  by third parties (BleepingComputer, DataBreaches) over the following
  weeks.

