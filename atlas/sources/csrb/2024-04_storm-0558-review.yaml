notes: |
  URL corrected 2026-05-29 (Agent2): CISA migrated the CSRB report
  PDF location. The original /sites/default/files/2024-04/CSRB_Review_of_the_Summer_2023_MEO_Intrusion_Final_Report_508c.pdf
  is dead; canonical landing page is now /resources-tools/resources/
  CSRB-Review-Summer-2023-MEO-Intrusion. The direct PDF is at
  https://www.cisa.gov/sites/default/files/2025-03/CSRBReviewOfTheSummer2023MEOIntrusion508.pdf
  (also 200). Either is acceptable; the landing page is more stable
  long-term.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports actor cn/unscoped/storm-0558
  (demoted from cn/mss this date). The 34-page CSRB report attributes Storm-0558 to China/the PRC only,
  never to the MSS or any specific Chinese service. Exec summary: the actor is "assessed to be affiliated
  with the People's Republic of China in pursuit of espionage objectives"; threat-actor profile quotes
  Microsoft's "a China-based threat actor" and adds "Microsoft assesses that the Microsoft Exchange Online
  intrusion was a targeted information-collection operation aimed at fulfilling the PRC's intelligence
  needs"; elsewhere "the PRC-affiliated threat actor" and "the culpability of a PRC-affiliated threat
  actor". The report's only "intelligence service" reference is to Russia's SVR (a comparison), and it
  engages the "PRC government" generically — no MSS / Ministry of State Security. Raw snapshot = the direct
  2025-03 PDF (sha256 above), captured + hashed; text extracted with pdftotext for verification.
