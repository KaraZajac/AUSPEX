notes: |
  The victim's own press release (22 January 2024, 8:00 p.m. EET) — the
  primary attribution statement for the January 2024 Tietoevry incident.
  Verbatim: "The malicious attack based on Akira ransomware on one of
  Tietoevry's datacenters in Sweden took place during the night of 19-20
  January." Also carries: "On 20 January, one of Tietoevry's several
  datacenters in Sweden was partially subject to ransomware attack. The
  attack has impacted Tietoevry's services to a limited number of
  customers in Sweden. The affected platform was isolated immediately,
  and the attack has not impacted other parts of Tietoevry's
  infrastructure"; "the restoration process may extend over several days,
  even weeks"; "Tietoevry is collaborating with relevant authorities and
  has filed a report to the Swedish police."
