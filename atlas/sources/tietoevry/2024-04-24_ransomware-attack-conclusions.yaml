notes: |
  Tietoevry's closing statement on the January 2024 attack (24 April
  2024, 2:00 p.m. EEST). Verbatim: "one of Tietoevry's datacenters in
  Sweden was subject to a ransomware attack during the night of January
  19-20. 2024. Tietoevry's monitoring detected the suspicious and unusual
  activity and Tietoevry was able to stop the attack, limiting its
  impact"; "With the exception of efforts continuing with few customers,
  all other impacted customer services were fully restored by mid-March";
  the investigation "concluded the most probable path used by the
  attacker to gain unauthorized access to the datacenter" but Tietoevry
  declined to disclose the vector publicly (so the event's initial_vector
  stays unknown). Does not name Akira and does not confirm data
  exfiltration.
