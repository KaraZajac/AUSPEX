notes: |
  Maltese investigative outlet reporting on the US sentencing of Ramon
  "Hushpuppi" Abbas over the 2019 Bank of Valletta heist. Snapshotted
  2026-07-10 (curl, HTTP 200, 191,582 B, datePublished 2022-11-08).
  Secondary corroborator of the DPRK attribution and the money-laundering
  chain. Verbatim: "the spectacular 2019 EUR13 million Bank of Valletta
  cyberheist"; DOJ connected "Abbas to the North Korean hackers through
  Alaumary, who they allege 'conspired' with him to 'launder funds from
  [a] North Korean-perpetrated cyber-enabled heist from a Maltese bank in
  February 2019'"; "Abbas conspired with [fellow defendant] Ghaleb
  Alaumary to launder funds stolen from a bank in Malta by providing
  account information for banks in Romania and Bulgaria"; "Abbas has
  admitted that the intended loss with respect to the Maltese bank was
  approximately [$14.7 million]." Ties the criminal money-mule layer
  (Abbas/Alaumary) to the DPRK-perpetrated heist.
