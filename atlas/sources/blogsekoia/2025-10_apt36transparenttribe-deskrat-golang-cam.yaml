  AUDIT (2026-06-25, claude-opus-4.8/max): raw captured (HTTP 200, 178,786 bytes) + SHA-256 above; page header "Updated on October 23, 2025" confirms published_on. Attribution quotes (verbatim): "In July 2025, CYFIRMA reported a phishing campaign attributed to TransparentTribe (also known as APT36 or Operation C-Major) targeting Linux-based operating systems of Indian governement entities with activity traced back to June 2025."; "designed to target BOSS operating systems. This OS was endorsed by the Government of India... Bharat Operating System Solutions (BOSS) distribution"; "establishes command and control communications over WebSocket"; "Those four persistence methods are specific to the Linux environment"; "Sekoia assess with medium confidence that this event was leveraged opportunistically by Transparent Tribe to compromise defense and government entities in India". NO whole-word "ISI"/"Inter-Services" anywhere in the raw — source attributes to the Pakistan nexus only, not the ISI.
