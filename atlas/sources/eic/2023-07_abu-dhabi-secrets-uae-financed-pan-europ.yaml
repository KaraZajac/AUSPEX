notes: |
  Supporting quote (EIC project landing page): "Abu Dhabi Secrets reveals how the Swiss private
  intelligence company Alp Services has been contracted by the UAE government to spy on citizens of
  18 countries in Europe and beyond. Alp Services has sent to the UAE intelligence services the names
  of more than 1000 individuals and 400 organizations in 18 European countries, labelling them as
  part of the Muslim Brotherhood network in Europe." Subhead: "How a Swiss company spied across Europe
  on behalf of the UAE state." Member-outlet headlines on the same page confirm French targets ("Plus
  de 200 Français ont été fichés pour le compte des services secrets des Émirats arabes unis") and the
  opened criminal probes ("Les barbouzes des Émirats visés par les justices française et suisse";
  "Francia y Suiza investigan a la agencia de detectives").
  AUDIT (2026-06-24, claude-opus-4.8/max): URL resolves to the EIC "Abu Dhabi Secrets" project page
  (raw captured, sha256 above). The page supports, at HIGH confidence and naming the UAE state directly:
  UAE government contracted Alp Services; >1,000 individuals + 400 organizations; 18 European countries;
  Muslim Brotherhood labelling; French targets; French + Swiss criminal investigations. NAMES NO SPECIFIC
  UAE SERVICE — only "the UAE government" and generically "the UAE intelligence services" (services, plural,
  unnamed). The page does NOT contain the "Ariaf Studies and Research" front entity, the "~EUR 5.7M /
  2017-2020" figures, or the "~78,000 hacked documents" count; those derive from the underlying
  Mediapart/EIC member reporting, not this landing page, so they were removed from the event summary
