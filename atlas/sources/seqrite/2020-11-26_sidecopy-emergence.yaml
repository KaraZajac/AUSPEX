  Seqrite's foundational disclosure of "Operation SideCopy" — first
  vendor attribution of the Pakistani-aligned APT cluster mimicking
  SideWinder TTPs to target Indian defense and government entities.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw + verified wording.
  The article attributes SideCopy to TRANSPARENT TRIBE, not to a named
  Pakistani service: subtitle "An insight into Transparent Tribe's
  sub-division which has been incorrectly attributed for years" and "We
  suspect this threat actor has links with Transparent Tribe APT group."
  The captured page contains NO occurrence of "ISI", "Inter-Services
  Intelligence", or even "Pakistan"/"Pakistani" in the body. (Page byline
  dates the post 2020-09-23; the curated id/published_on carry 2020-11-26 —
  minor date discrepancy, content is the same Operation SideCopy disclosure.)
  Supports the pk/unscoped/sidecopy demotion (no ISI named).
