  First-party Seqrite Labs research (author Sathwik Ram Prakki) on the
  Pakistan-linked SideCopy APT cluster's late-2024/early-2025 target
  expansion and tooling evolution against India. PRIMARY tier: original
  discovery/analysis, not aggregation.
  AUDIT (2026-07-10, claude-opus-4.8/max): fetched HTTP 200, raw snapshot
  captured (sha256 da7a116d…393ea35d, 235,147 bytes). article:published_time
  = 2025-04-08T12:53:12+00:00 (datePublished "April 8", dateModified
  "April 16"). Load-bearing verbatim carried by the raw:
  - Attribution / onset / expansion: "Pakistan-linked SideCopy APT group has
    significantly evolved its tactics since late December 2024, expanding its
    targets to include critical sectors such as railways, oil & gas, and
    external affairs ministries." "The parent group of SideCopy, APT36 …".
  - Defence-sector core: "The campaign targeting the Defence sector begins
    with a phishing email dated 13 January 2025, with the subject 'Update
    schedule for NDC 65 as discussed'." "National Defence College (NDC) is a
    defence service training institute … operates under the Ministry of
    Defence, India." A "second phishing email sent on 15 January 2025";
    "Honey-trap themed campaigns were observed in January 2025 and June 2024,
    coinciding with the arrest of a government employee accused of leaking
    sensitive data to a Pakistani handler."
  - Expansion decoys: Railways ("Holiday List Decoy"), Oil & Gas (HPCL
    "Cybersecurity Guidelines"), Ministry of External Affairs (MEA), a
    university-student education portal ("active again in February 2025"),
    and prior maritime-sector C2 overlap.
  - Tooling: HTA→MSI staging shift; custom XenoRAT, Golang SparkRAT (Linux),
    and the new CurlBack RAT; "DLL side-loading, reflective loading, and AES
    decryption via PowerShell."
  Attribution granularity: NO Pakistani intelligence service named — standalone
  "ISI" and "Inter-Services Intelligence" are ABSENT from the raw (the only
  "isi" substrings are "visibility"/"visible"). Nexus is stated as
  "Pakistan-linked" with SideCopy tied to Transparent Tribe/APT36 — consistent
  with the actor's pk/unscoped/sidecopy placement. "DRDO" occurs 0 times.
