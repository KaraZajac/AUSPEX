notes: |
  Europol announcement of the international operation against Hive
  ransomware infrastructure, paired with parallel DOJ/FBI release.

  AUDIT (2026-06-24, claude-opus-4.8/max): Used to support ru/proxies/hive's (now ru/unscoped/hive)
  state-tolerated-proxy placement. The announcement documents NO Russia/state nexus and NO
  state/sponsor/harbor/tolerance framing of any kind; the only "Russian" token on the page is a UI
  language-selector item ({"id":516,"title":"Russian"}). Framing throughout is RaaS / criminal / affiliate
  / double-extortion. Does NOT document state tasking/tolerance → supports DEMOTE out of ru/proxies.
  (raw_snapshot captured live, HTTP 200.)

  VERIFIED 2026-07-10 (claude-opus-4.8/max, hive-takedown event audit): snapshot on-disk sha256 matches
  content_sha256 (c177ce1d…). The page is a JS-app shell; the article text lives in the embedded
  window.SERVER_DATA JSON, which carries the load-bearing figures verbatim: "Since June 2021, over 1 500
  companies from over 80 countries worldwide have fallen victim to HIVE associates and lost almost EUR 100
  million in ransom"; "prevented the payment of more than USD 130 million or the equivalent of about EUR 120
  million"; German + Dutch + US authorities shutting down the servers and providing decryption keys. (The
  "336" token on the page is a CMS crime-area id {"id":336,"title":"Cyber-attacks"}, NOT a victim count.)
