notes: |
  Europol announcement of the coordinated international takedown of the
  8Base ransomware group (a Phobos RaaS affiliate cluster), 11 Feb 2025.
  Created 2026-07-04 to RE-SOURCE event 2025-02/operation-phobos-aetor-8base,
  which had been wrongly citing the Nov-2024 Ptitsyn-extradition release for
  a Feb-2025 operation it does not describe.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (c3ffbf39…b985cfe5, 42,429 bytes). Page is a JS-rendered SPA;
  the substantive article body is embedded as JSON in the HTML (as on other
  europol records) and was extracted (~5,906 chars). Verbatim support:
   - "A coordinated international law enforcement action has led to the arrest
     of four individuals leading the 8Base ransomware group."
   - "These individuals, all Russian nationals, are suspected of deploying a
     variant of Phobos ransomware to extort high-value payments from victims
     across Europe and beyond." (authoritative for nationality = RUSSIAN, not
     the 'European (Czech/Latvian/Spanish/German)' the event previously claimed)
   - "This complex international operation, supported by Europol and Eurojust,
     involved law enforcement agencies from 14 countries." (Europol/Eurojust —
     NOT 'Interpol'-coordinated as the event previously stated)
   - "As a result of this operation, law enforcement was also able to warn more
     than 400 companies worldwide of ongoing or imminent ransomware attacks."
   - "Supporting the investigation since February 2019, Europol's European
     Cybercrime Centre (EC3) has…" (investigation runs from Feb 2019 — not the
     'mid-2023' the event previously claimed)
   - "An administrator of Phobos was arrested in South Korea in June 2024 and
     extradited to the United States in November of the same year." (the Ptitsyn
     thread — PRIOR to this Feb-2025 8Base action, separately tracked)
