  servers taken down or disrupted" across the 10-country list; "Over 2 000 domains"; "4 arrests (1 in Armenia
  and 3 in Ukraine)"; "16 location searches"; EUR 69M main-suspect figure; action window "Between 27 and 29 May
  2024"; datePublished 2024-05-30. NO US National-Cybersecurity-Strategy / "disrupt and dismantle" language
  present (0 hits) — the event's attested us/ncs-2023 link was downgraded to plausible on this basis.
