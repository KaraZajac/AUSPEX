notes: |
  Europol-led international action against dropper-malware
  infrastructure including IcedID, SystemBC, Pikabot, SmokeLoader,
  Bumblebee, TrickBot. Largest-ever botnet takedown operation.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited by the IcedID actor as its sole proof of a Russian
  state-tolerated-PROXY nexus. The page documents NO such nexus — it is a purely criminal / LE framing.
  IcedID is "(also known as BokBot), initially categorised as a banking trojan, [that] had been further
  developed to serve other cybercrimes in addition to the theft of financial data"; the operation
  "focused on disrupting criminal services through arresting High Value Targets, taking down the
  criminal infrastructures and freezing illegal proceeds"; arrests were "1 in Armenia and 3 in Ukraine".
  ZERO Russia/state/proxy/FSB/GRU/sanction terms apply to IcedID; the only "Russian" token on the page
  is a UI language-selector item ({"id":516,"title":"Russian"}). On this finding the actor was demoted
  ru/proxies/icedid -> ru/unscoped/icedid (criminal/icedid flagged for human review; Emotet precedent).
  AUDIT (2026-07-04, claude-opus-4.8/max): re-verified for event 2024-05/operation-endgame — content_sha256
  b7c58c11…2e6f8e02 (48152 bytes) RE-VERIFIED unchanged. Page fully carries: the six-family list "IcedID,
