  Europol/Eurojust-led Operation Eastwood: over 100 NoName057(16)
  servers disrupted worldwide, major part of central infrastructure
  taken offline, 7 arrest warrants (6 Germany, 1 Spain) and 2 arrests
  (1 France, 1 Spain). Subsequent operator arrests Spain/Poland (2024-25).
