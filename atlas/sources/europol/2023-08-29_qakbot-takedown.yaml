  AUDIT (2026-06-24, claude-opus-4.8/max): Captured + sha256 (page is a
  JS-rendered SPA; substantive article body extracted from the embedded JSON).
  State-nexus finding for the Qakbot actor audit: this source is a PURELY
  CRIMINAL / law-enforcement-takedown framing establishing NO Russia-state nor
  tolerated-proxy nexus for Qakbot at any confidence. The body names ZERO of
  {Russia, Russian state, FSB, GRU, SVR, Kremlin, state-sponsor, proxy,
  safe-harbour}; the only "Russian" string in the whole HTML is a UI
  language-selector menu item (id 516, listed beside Macedonian/Norwegian/
  Spanish), not a substantive reference. The only states named are the LE
  partners (FR, DE, LV, NL, RO, UK, US) — Russia is absent. Verbatim: "Qakbot,
  operated by a group of organised cybercriminals, targeted critical
  infrastructure and businesses across multiple countries, stealing financial
  data and login credentials. Cybercriminals used this persistent malware to
  commit ransomware, fraud, and other cyber-enabled crimes." / "Qakbot's primary
  focus was on stealing financial data and login credentials from web browsers."
  / "the infected computer became part of a botnet ... controlled simultaneously
  by the cybercriminals". Consequence: this cited actor source does NOT support
  the ru/proxies/ (state-tolerated-proxy) placement -> actor demoted
  ru/proxies/qakbot -> ru/unscoped/qakbot on 2026-06-24, flagged as a criminal/
  candidate (direct Emotet analogue).
