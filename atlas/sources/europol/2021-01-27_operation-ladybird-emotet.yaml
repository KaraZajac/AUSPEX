notes: |
  Europol announcement of the Operation Ladybird takedown of the
  Emotet botnet infrastructure in coordination with law enforcement
  in NL, DE, FR, LT, CA, US, UK, UA.

  AUDIT (2026-06-24, claude-opus-4.8/max): Captured + sha256 (page is a
  JS-rendered SPA; substantive article body extracted from the embedded
  JSON). State-nexus finding for the Emotet actor audit: this source is a
  PURELY CRIMINAL / law-enforcement-takedown framing — it establishes NO
  Russia-state nor tolerated-proxy nexus for Emotet at any confidence. The
  body names ZERO of {Russia, Russian, FSB, GRU, Kremlin, state-sponsor,
  proxy, safe-harbour}; the only "Russian" string in the whole HTML is a UI
  language-selector menu item (id 516, listed beside Macedonian/Norwegian/
  Spanish), not a substantive reference. The only states named are the LE
  partners (NL, DE, US, UK, FR, LT, CA, UA) — Russia is absent. Verbatim:
  "EMOTET has been one of the most professional and long lasting cybercrime
  services out there." / "these were sold to other top-level criminal groups
  to deploy further illicit activities such [as] data theft and extortion
  through ransomware." / "What made EMOTET so dangerous is that the malware
  was offered for hire to other cybercriminals... This type of attack is
  called a 'loader' operation". Consequence: this sole cited actor source
  does NOT support the ru/proxies/ (state-tolerated-proxy) placement → actor
  demoted ru/proxies/emotet → ru/unscoped/emotet on 2026-06-24.

  AUDIT (2026-07-01, claude-opus-4.8/max): hash re-verified (c405fab1…ab20ce40,
  38993 bytes) during the event-census audit of 2021-01/emotet-operation-ladybird.
  Confirmed the release carries the 8-partner coalition + "took it down from the
  inside" but does NOT carry the April-2021 self-uninstall, a "three-tier"
  infrastructure characterization, or any arrest — those were stripped from the
  event as unsourced.
