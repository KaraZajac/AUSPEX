  AUDIT 2026-07-02 (claude-opus-4.8/max): raw snapshot captured +
  hashed (article body is present in the page's JSON data island).
  Verbatim: "An unprecedented law enforcement operation involving 17
  countries has resulted in the takedown of Genesis Market, one of
  the most dangerous marketplaces selling stolen account credentials
  to hackers worldwide. As a result of an action day on 4 April, this
  illegal service was shut down and its infrastructure seized";
  "119 arrests, 208 property searches and 97 knock and talk measures.
  This international sweep was led by the U.S. Federal Bureau of
  Investigation (FBI) and the Dutch National Police (Politie), with a
  command post set up at Europol's headquarters"; bots bundled
  "fingerprints, cookies, saved logins and autofill form data" from
  devices infected "through malware or account takeovers attacks";
  "over 1.5 million bots listed on Genesis Market"; title "the
  identities of over 2 million people". NB: the Europol release does
  NOT use the name "Operation Cookie Monster" (that is carried by the
  Eurojust/DOJ primaries).
