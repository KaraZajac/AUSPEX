notes: |
  AUDIT (2026-07-01, claude-opus-4.8/max): Group-IB's original investigation that
  named and scoped the "0ktapus" campaign. Carries the load-bearing facts:
  "Over 130 organizations have been compromised"; "9931" compromised user
  credentials and "5441" compromised MFA codes; "169 unique domains" in the
  campaign; campaigns "launched since March 2022"; the phishing kit impersonated
  Okta SSO login pages of the victims' orgs. Names downstream supply-chain
  victims Mailchimp and Klaviyo (crypto-mailing-list breaches) and references the
  "public reports made by Twilio and Cloudflare". This is the genuine primary for
  the 2022-08 0ktapus campaign (added during the badrabbit-model re-source of
  event 2022-08/twilio-cloudflare-0ktapus, which had been mis-cited to CISA
  AA23-320A — a Nov-2023 Scattered Spider advisory that does not document this
  campaign).
