  Verbatim support captured: "identify a total of 691 websites
  as well as 13 third-party service providers"; campaigns
  "attributed by cybersecurity researchers to three different
  groups, namely Group 2, Group 5 and Group 12 ... turned out
  to be three campaigns conducted by ... UltraRank"; "The
  earliest of them, Campaign 2, dates back to 2015, while
  Campaign 12 continues to this very day"; "designed its own
  model to monetize the stolen text data of bank cards through
  the card shop ValidCC, whose revenue exceeded $5,000 per
  day"; on the ValidCC admin SPR — "This might indicate that
  ValidCC is probably managed by a Russian speaker." No
  mention of Volusion anywhere in the report. TIER primary
  (first-party Group-IB research/press release).
