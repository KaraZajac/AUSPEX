notes: |
  Group-IB's foundational UltraRank consolidation report /
  press release ("UltraRank: the unexpected twist of a
  JS-sniffer triple threat"), the analysis that merged three
  campaigns previously attributed to separate Magecart groups
  (Group 2, Group 5, Group 12) into a single operator entity
  Group-IB named UltraRank.
  AUDIT (2026-07-01, claude-opus-4.8/max): CREATED to
  re-source event 2020-11/ultrarank-disclosure, whose core
  consolidation claims (691 sites, Groups 2/5/12, ValidCC,
  since-2015) are carried by THIS Aug-2020 report, not by the
  Dec-2020 "New attacks" follow-up blog originally cited.
