notes: |
  Group-IB's report "Cobalt: Evolution and Joint Operations"
  (published 2018-05-29) profiling the Cobalt financial-crime
  group: active since 2016; ~€1 billion stolen from over 100
  banks in 40 countries; began with attacks on ATMs in 2016 and
  expanded to SWIFT, card processing and payment gateways;
  ~3 weeks average dwell time; technical proof of joint
  operations with Anunak (Carbanak), including SWIFT thefts in
  Hong Kong and Ukraine. Assessed still active at publication.

