notes: |
  Group-IB analysis of the Cobalt Group — a Russian-speaking
  financial-cybercrime cluster active since 2016 with
  ATM-jackpotting (Cobalt Strike-delivered ATMSpitter) and
  SWIFT-fraud operations across more than 250 banks in
  Eastern Europe, Russia, the CIS, Southeast Asia, and the
  Americas. Operationally overlapping with Carbanak / FIN7.
  Lead defendant Denis K. arrested in Spain March 2018.
