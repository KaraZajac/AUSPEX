notes: |
  Group-IB analysis of the UltraRank cluster — a Russian-
  speaking JS-skimming actor responsible for compromises
  across ~700 e-commerce sites since 2015, including the
  Volusion platform attack (Oct 2019) and the
  E-skimming-as-a-service ValidCC carding marketplace.
  Group-IB attributes UltraRank as a single operator group
  often miscategorized as multiple Magecart "groups."
