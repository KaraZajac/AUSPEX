notes: |
  Group-IB "New attacks by UltraRank group" blog — a FOLLOW-UP
  to the Aug-2020 UltraRank consolidation report, describing a
  new (Nov-2020-discovered) wave of ~12 infected e-commerce
  sites using the SnifLite sniffer (Radix obfuscation, a
  googletagsmanager[.]co gate, Media Land LLC bulletproof
  hosting). It references the Aug-2020 report's headline
  figures (691 stores + 13 website service providers over five
  years) but does NOT itself carry the consolidation detail.
