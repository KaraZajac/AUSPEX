notes: |
  Corroborating infosec-trade reporting (Mathew J. Schwartz, ISMG /
  BankInfoSecurity) of the Federal Depository Library Program
  defacement.
  AUDIT (2026-06-27, claude-opus-4.8/max): created during phantom
  remediation of event 2020-03/iran-soleimani-retaliation. Raw
  snapshot captured (405,165 bytes, sha256 5c7ad554…4271a570). Frames
  the perpetrators as hacktivists; notes the site is run by the U.S.
  Government Publishing Office (Federal Depository Library Program);
  theorizes a CMS vulnerability as the vector. Carries the DHS
  non-attribution verbatim: "At this time, there is no confirmation
  that this was the action of Iranian state-sponsored actors." and the
  doctored image of "President Donald Trump being punched in the face
  with an Iranian flag in the background."
