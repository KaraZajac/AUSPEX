notes: |
  Jayant Chakravarti (@JayJay_Tech), May 29, 2025 (deck: "Luxury
  Retailers Report a Spurt in Breaches"). Tiffany-specific source (also
  corroborates the Dior Korea breach) for the LVMH event.

  Verbatim facts:
    - "Jewelry retailer Tiffany & Co. said hackers stole South Korean
      customers' data from a third-party vendor's platform, a disclosure
      that came shortly after sister brand Dior announced a similar
      breach."
    - "The Tiffany's breach occurred on April 8 but the company
      discovered on May 9 that hackers stole the personal information of
      South Korean shoppers, it disclosed in emails sent to customers
      reported the Chosun Daily."
    - "Tiffany's disclosure followed a similar notification by cosmetics
      giant Dior, also owned by French multinational luxury goods
      conglomerate Louis Vuitton Moet Hennessy... LVMH said the breach
      did not compromise customers' bank account or payment card
      information."

  This source anchors the earliest LVMH-brand disclosures in the
  aggregate (Tiffany + Dior, South Korea, reported by ISMG 2025-05-29) —
  months before the July Louis Vuitton UK / Dior US notification wave.
  It does NOT name Salesforce or ShinyHunters (a third-party-vendor
  framing only); the ShinyHunters/Salesforce placement is carried by the
  BleepingComputer 2025-07-30 source.

