notes: |
  Freedom House Turkey origin-country case study. Documents the
  post-2016 rendition campaign against Gülen-movement and
  PKK/Kurdish-linked targets: 58 renditions catalogued since 2014
  ("No other perpetrator state ... such a large number of
  renditions"); MİT-run "kidnapping offensive against the Gülen
  movement"; pursuit across at least 31 host countries. The
  aggregate "132 incidents since 2014 / 15% / second-most-prolific"
  figure is NOT on this page — it is from the April-2023 update
  "Still Not Safe: Transnational Repression in 2022," corroborated
  via scf/2023_132-incidents-turkey-transnational-repression-freedom-house.
  NOTE: id slug is a legacy defect ("Out of Life" should read "Out
  of Reach"; "2022" vs the Feb-2021 flagship) — kept for FK
  stability. Also cited by doctrine tr/counter-gulen-kurdish-surveillance.
