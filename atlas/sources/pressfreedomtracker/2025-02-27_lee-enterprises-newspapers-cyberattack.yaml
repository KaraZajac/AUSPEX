notes: |
  Press-freedom incident record documenting the scope of the print/online
  disruption across Lee's newspaper chain. The task originally suggested "Press
  Gazette"; no Press Gazette article on this incident was reachable, so the
  U.S. Press Freedom Tracker (Freedom of the Press Foundation) is used as the
  equivalent press-freedom primary. Living incident page, first published Feb
  2025, "Updated on February 27, 2025" (incident date Feb 3, 2025).

  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot 48,700 bytes,
  sha a1b170db…0920e550. Verbatim support:
   - "The St. Louis Post-Dispatch and 75 other Lee Enterprises newspapers were
     affected by a cyberattack on the Iowa-based news media company on Feb. 3".
   - "At least 79 Lee newspapers experienced disruptions to their online or print
     publications as a result of the Feb. 3 cyberattack." / "At least 79
     newspapers reported disruptions to their operations."
   - "the Feb. 3 cyberattack involved unauthorized access to critical applications
     and the withdrawal of files, disrupting the outlets' ability to publish
     online or print publications, as well as subscribers' access to their
     accounts."
   - "A ransomware gang took credit on Feb. 27, 2025, for a cyberattack that has
     for the last month disrupted operations at nearly 80 newspapers".
   - "More than three weeks after the attack, Russia-linked ransomware group Qilin
     claimed responsibility for the attack and the theft of 350 GB of data in a
     post on its website." / "'All data will be published on March 5, 2025,' the
     post said."
   - "According to SecurityWeek, the announcement suggests that Lee refused to pay
     the ransom or that negotiations have stalled."
   - Quotes the SEC filing "dated Feb. 12": "As of February 12, 2025, all core
     products are being distributed in the normal cadence, however weekly and
     ancillary products have not been restored."
   - "the targeting of the company's computers prevented many newspapers from
     building pages and publishing print editions" (some published delayed or
     smaller editions; others could not publish at all).
