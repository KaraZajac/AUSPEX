notes: |
  AUDIT (2026-07-11, claude-opus-4.8/max): live URL fetched + raw
  captured (sha256 a90d9062…62351ea8). Elliptic's OWN stance is
  hedged nation-level: "multiple indicators suggesting that the
  exploit of Drift Protocol is linked to the [DPRK]" / "consistent
  with techniques observed in previous DPRK-attributed operations";
  calculated stolen value $286M; largest transfer ~41.7M JLP (~$155M);
  TVL $550M → <$250M; "eighteenth DPRK-linked act Elliptic has
  tracked this year". The named-actor signal is RELAYED, not
  Elliptic's own: quotes Drift's 05-Apr X post ("with medium-high
  confidence and supported by ... the SEAL 911 team") that the actor
  is "the same threat actors responsible for the October 2024 Radiant
  Capital hack attributed by Mandiant to UNC4736, a North Korean
  state-affiliated group also tracked as AppleJeus or Citrine Sleet."
  No Lazarus, no TraderTraitor, no TRM, no "Gleaming Pisces" mention.
  This record is the corrected attribution_source_id for the event's
  citrine-sleet tag (was chainalysis). tier primary retained.
