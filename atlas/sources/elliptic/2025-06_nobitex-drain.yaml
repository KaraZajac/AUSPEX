notes: |
  Elliptic on-chain forensics of the 18 June 2025 Nobitex drain (Iran's largest
  crypto exchange). Primary on-chain source for the ~$90M figure and the
  vanity-burn-address detail.
  AUDIT (2026-07-10, claude-opus-4.8/max): RE-SOURCED (badrabbit model). The
  prior record pointed at the Elliptic homepage shell (url https://www.elliptic.co,
  a homepage-only archive_url, and a paraphrased title) — a WRONG-SOURCE, not the
  article. Re-pointed to the genuine post "Iranian crypto exchange Nobitex hacked
  for over $90 million by pro-Israel group" (live HTTP 200; earliest Wayback
  capture 20250618125011; byline "18 June, 2025"). Snapshotted + hashed this pass:
  sha256 55e1e161…220c60e1, 331,637 bytes. Verbatim support carried into the event:
  "Elliptic has so far identified over $90 million sent from Nobitex wallets to
  hacker addresses"; "Most of the addresses where the hacked funds are currently
  held are vanity addresses, containing some variation of the term
  'F*ckIRGCterrorists' within their public key"; "This means that Predatory Sparrow
  would not have the private keys for the crypto addresses they sent the Nobitex
  funds to, and have effectively burned the funds in order to send Nobitex a
  political message"; ATTRIBUTION HEDGE: "Although there is no confirmation yet
  that the funds were moved by Predatory Sparrow, the hack appears to be motivated
  by the recent escalation of tensions between Israel and Iran"; SIBLING: "The
  Israel-linked group also claimed responsibility for a hack targeting Bank Sepah,
  a state-owned Iranian bank, one day earlier"; "over 7 million users". tier
  secondary PRESERVED (vendor blog; functions as the primary on-chain source, but
  tier left unchanged per PRESERVE rule).
