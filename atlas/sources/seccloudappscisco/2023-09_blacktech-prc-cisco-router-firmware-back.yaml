notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): this is a Cisco *Security Response*, NOT itself the joint
  advisory (publisher corrected from "NSA, FBI, CISA, ..." to Cisco; this secondary record references
  AA23-270A — the primary CSA is now cited separately as cisa/2023-09-27_aa23-270a-blacktech-router-firmware).
  The captured raw HTML (sha256 above) is the literal page bytes but is a JavaScript-rendered shell with
  NO substantive body in the static markup (curl returns only the Angular/feedback scaffold); the
  response text below was read via WebFetch's rendered view and corroborated against the primary CSA PDF.

  ATTRIBUTION — names PRC only, NOT the MSS. Cisco's response refers to "People's Republic of China-
  Linked Cyber Actors" and the joint advisory titled "People's Republic of China-Linked Cyber Actors
  Hide in Router Firmware"; no mention of MSS / Ministry of State Security.

  FACTS Cisco's response actually carries (verbatim): "The most prevalent initial access vector in
  these attacks involves stolen or weak administrative credentials." "There is no indication that any
  Cisco vulnerabilities were exploited." "The stolen code-signing certificates mentioned in the report
  are not from Cisco." It also notes modern Cisco devices' secure-boot mitigations. NOTE: the
  subsidiary->headquarters pivot and the targeted-sector list are NOT in this Cisco response (it refers
  readers to the joint CSA for those); those claims rest on cisa/2023-09-27_aa23-270a-blacktech-router-firmware.
  Issuing agencies named by Cisco: "U.S. National Security Agency (NSA), the U.S. Federal Bureau of
  Investigation (FBI), the U.S. Cybersecurity and Infrastructure Security Agency (CISA), the Japan
  National Police Agency (NPA), and the Japan National Center of Incident Readiness and Strategy for
  Cybersecurity (NISC)." First published 2023 September 27.
