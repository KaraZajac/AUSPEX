notes: |
  Norman Shark's foundational report attributing multi-year
  cyber-espionage operations to actors in India targeting Pakistan,
  China, and Telenor.
  URL corrected 2026-05-29 (Agent2): the original wayback snapshot
  of normanshark.com/blog/operation-hangover-... has been
  re-tombstoned (now 404 at web.archive.org). The most stable
  preservation of the report appendices is the Internet Archive
  upload "Operation Hangover - Unveiling An Indian Cyberattack
  Infrastructure Appendixes" (200). Norman Shark itself ceased
  operations after the Symantec acquisition.
  Companion BusinessWire press release of 2013-05-20 (Norman Shark
  research-uncovered-first-large-cyber-espionage-emanating-from-india)
  remains live at businesswire.com/news/home/20130520005400/ if a
  press-release tier-2 citation is preferred.
  AUDIT (2026-06-24, claude-opus-4.8/max): used in the in/ntro/patchwork → in/unscoped/patchwork
  service demotion. Norman Shark frames Operation Hangover as "an Indian Cyberattack
  Infrastructure" (report title) of Indian origin; it does NOT name India's NTRO or any specific
  Indian service. raw_snapshot is the archive.org *details* landing page at the cited URL (the
  only stable preservation); the report's narrative volume is NOT preserved at archive.org — only
  the IOC "Appendixes" volume is, whose OCR (IA djvu.txt) is pure indicator data (sample hashes,
  domains, IPs) with no attribution prose. Its apparent "NTRO"/"India" string hits are the
  repeated running-header "...Unveiling an Indian Cyberattack Infrastructure Appendixes" and
  IOC filenames — no NTRO. (Cross-event corroboration: this event's own attribution note records
  that Norman Shark "attributed the operation to 'Indian hackers' without naming a government
  service.")
  AUDIT (2026-06-25, claude-opus-4.8/max): re-verified for the 2013-05/operation-hangover-disclosure
  event audit. Live URL re-confirmed HTTP 200; existing raw_snapshot sha256 re-checked and MATCHES
  (d831e937...). The archive.org *details* page abstract confirms the Appendixes structure ("A: Telenor
  samples; B: ...installers; C: Malware string indicators; ...") but carries no narrative attribution
  prose. The report's substantive attribution language was corroborated against the primary record
  (Norman's own published findings as quoted by The Register 2013-05-21, Infosecurity-Magazine, and
  the Norman/BusinessWire press release): "attackers probably hailing from India" / "of Indian origin";
  "there is no direct evidence to link it to state-sponsored players"; "no visibility into whether the
  attacks were done on behalf of others"; predominant Pakistani national-security targeting; Telenor as
  the trigger (filed a Norwegian police complaint); "Appin"/"Appin Security Group" strings in malware
  flagged by Norman as possibly circumstantial / a deliberate attempt to implicate Appin, which Appin
  denied. No Indian government service named anywhere.
