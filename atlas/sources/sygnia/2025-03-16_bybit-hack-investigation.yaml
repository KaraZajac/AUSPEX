notes: |
  Forensic incident-response report by Sygnia (engaged on the Bybit /
  Safe{Wallet} intrusion). Primary technical account of the supply-chain
  vector + timeline for the 2025-02/bybit-safe-wallet event. Verbatim
  (raw sha 1e25327b…):
  - "a macOS workstation belonging to a Safe{Wallet} developer, referred to as
    Developer1, was compromised on February 4, 2025."
  - "The earliest identified malicious activity occurred when a Docker project
    named 'MC-Based-Stock-Invest-Simulator-main' initiated network traffic to
    the domain…" (social-engineering / malicious-project initial access).
  - "the attackers were present in Safe{Wallet}'s AWS account between February
    5th and February 21st."
  - "an ETH multisig transaction was facilitated through Safe{Wallet} from a
    cold wallet to a warm wallet, during which the attackers intervened and
    ma[nipulated]…"; Safe{Wallet}'s "web interface … were modified and injected
    with malicious code manipulating transactions. The malicious code included
    an activation condition, set…" (targeted to Bybit's contract only).
  Sygnia relays Safe{Wallet}'s own preliminary report + its own DFIR findings;
  treated as secondary/vendor-forensic (not a govt-primary). tier=secondary.
