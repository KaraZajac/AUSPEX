notes: |
  McAfee analysis tying the 2009 Independence Day DDoS, Ten Days
  of Rain (2011), and the 2013 DarkSeoul wiper attacks into a
  single multi-year campaign by one sophisticated group. McAfee
  labels that group the "NewRomanic Cyber Army Team" and stops
  short of national attribution ("did not go as far to point
  fingers at any country"). Foundational for the Lazarus-precursor
  clustering; the DPRK-nation attribution is ROK NIS's (2009-10-30),
  not McAfee's.
  AUDIT (2026-06-25, claude-opus-4.8/max): UNFETCHED — no raw
  snapshot obtainable. Primary URL (mcafee.com PDF) returns HTTP
  403 (Akamai bot block); the indianstrategicknowledgeonline.com
  mirror also 403s; archive.org is blocked for this audit, so the
  archive_url could not be captured either. Content verified
  indirectly against contemporaneous/secondary coverage of the
  same report (SecurityWeek, Help Net Security, Phys.org/McAfee
  2011 "test run" briefing): confirms (a) single-group clustering
  of 2009 DDoS + 2011 Ten Days of Rain ("~95% likely" same actor)
  + 2013 DarkSeoul via shared compiler / directory structure /
  crypto key, and (b) McAfee's explicit refusal to name a country
  and absence of any DPRK service/unit. No raw_snapshot /
  content_sha256 added (nothing captured). Tier unchanged
  (secondary). published_on 2013-07-09 retained (report released
  ~8-9 July 2013; Help Net coverage dated 2013-07-08 — within a
  day, no change).
