notes: |
  White paper documenting a coordinated intrusion campaign
  ("at least two years, and likely as many as four") against
  global oil, gas, and petrochemical companies. The report names
  no victim company.
  AUDIT (2026-06-25, claude-opus-4.8/max): live URL 403s; captured
  the archive.org snapshot (HTTP 200, 19-page PDF v1.4) as the raw
  snapshot above. Key verbatim support — Appendix B: "McAfee has no
  direct evidence to name the originators of these attacks but rather
  has provided circumstantial evidence"; "We have strong evidence
  suggesting that the attackers were based in China"; one individual
  in "Heze City, Shandong Province, China" ran a US-server reseller
  used to host zwShell C&C, but "we don't believe this individual is
  the mastermind." "all of the identified data exfiltration activity
  occurred from Beijing-based IP addresses... weekdays from 9:00 a.m.
  to 5:00 p.m. Beijing time." C&C: "purchased hosted services in the
  United States and compromised servers in the Netherlands." RAT:
  zwShell (Delphi; password "zw.china"). No PLA/MSS unit named.
