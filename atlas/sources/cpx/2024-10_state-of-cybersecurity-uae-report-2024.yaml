notes: |
  Joint UAE Cyber Security Council / CPX "State of the UAE
  Cybersecurity Report 2024" — a national threat-landscape
  publication. Per the report's own key highlights the Government,
  energy, and IT sectors were the most-targeted by cyber threat
  actors, Business Email Compromise and phishing persisted, and
  threat vectors were expected to grow more sophisticated with AI.
  CPX is "a G42 company" (Group 42, the UAE state-aligned AI/data
  conglomerate); AUSPEX additionally associates CPX with the
  post-DarkMatter cyber ecosystem (widely-reported context, not
  stated on this landing page). Doctrine-context record for the
  digital-economy-protection entry.

