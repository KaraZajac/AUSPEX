notes: |
  Foundational vendor disclosure of the three-year LinkedIn /
  social-engineering campaign attributed to Iran-based actors.
  Cluster later consolidated into APT35 / Charming Kitten.
  Second-attempt URL verification failed: original iSIGHT Partners
  report PDF is no longer hosted following FireEye/Mandiant
  acquisition (2016) and subsequent Google Cloud migration.
  Coverage preserved in The Washington Post (2014-05-28),
  SecurityWeek, and the Operation Newscaster Wikipedia article.

  AUDIT (2026-06-25, claude-opus-4.8/max): original iSIGHT PDF still
  link-rotted (url: null retained — no fabricated URL; no raw_snapshot
  possible). Content + attribution independently CONFIRMED against
  three corroborating sources (SecurityWeek 2014-05-29; the seebug/
  paper.seebug.org mirror of the report was 521-down at audit time;
  the Operation Newscaster reference record). Verbatim attribution
  (SecurityWeek quoting iSIGHT): "there is no direct information
  showing that the Iranian government is the ultimate sponsor of the
  campaign, but iSIGH[T] researchers do believe the threat actors are
  located in Iran." Facts confirmed: 14 elaborated fake personas
  (iSIGHT: "more than a dozen"); >2,000 targets across US, Israel,
  UK, Saudi Arabia, Iraq, Syria, Afghanistan — "senior U.S. military
  and diplomatic personnel, congressional personnel, Washington D.C.
  area journalists, U.S. think tanks, defense contractors in the U.S.
  and Israel"; active since at least 2011; fake journalism site
  NewsOnAir.org; platforms LinkedIn/Facebook/Twitter/Google+/YouTube/
  Blogger; spear-phishing for email-credential theft. iSIGHT named NO
  Iranian service (no IRGC) — nation-level only.
