notes: |
  Matt Burgess / WIRED on the second (RansomHub) extortion of Change
  Healthcare, seven weeks after the February 2024 ALPHV intrusion.
  Load-bearing for the 2024-04/change-healthcare-ransomhub-repost
  event (the RansomHub re-extortion, distinct from the primary
  2024-02/change-healthcare-alphv intrusion). Supporting quotes (raw
  snapshot, sha 7a127aa9…63b0ad95, 1,350,370 bytes): "Since Monday,
  RansomHub, a relatively new ransomware group, has posted to its
  dark-web site that it has 4 terabytes of Change Healthcare's stolen
  data, which it threatened to sell to the 'highest bidder' if Change
  Healthcare didn't pay an unspecified ransom." (article dated Fri
  2024-04-12; "Monday" = 2024-04-08); "Change Healthcare ransomware
  hackers already received a $22 million payment. Now a second group
  is demanding money, and it has sent WIRED samples of what they
  claim is the company's stolen data"; "'…AlphV stole our share of
  the payment and performed an exit scam,' a RansomHub representative
  wrote to WIRED"; "RansomHub tells WIRED it is not affiliated with
  AlphV" (i.e. the ALPHV affiliate, not the ALPHV operator, carried
  the trove to a separate RaaS brand). Headline assessment: the fresh
  threat "Looks Credible" — WIRED received sample records.
