notes: |
  Definitive investigative account of the March 2011 RSA SecurID breach,
  based on firsthand interviews with the RSA incident-response principals
  (Todd Leetham, Bill Duane, Sam Curry, Dave Castignola, CEO Art Coviello)
  a decade after the NDAs lapsed.
  AUDIT (2026-06-25, claude-opus-4.8/max): Raw HTML captured + hashed (WIRED blocks
  WebFetch/archive.org; verified directly against the local snapshot). Corroborates every
  technical fact of 2011-03/rsa-securid-lockheed VERBATIM: initial access — "A staffer in
  Australia had received an email with the subject line '2011 Recruitment plan' and an Excel
  spreadsheet attached to it. He'd opened it. Inside the file was a script that exploited a
  zero-day vulnerability ... in Adobe Flash, planting a common piece of malicious software
  called Poison Ivy on the victim's machine." Objective — the seed theft: the intruders'
  "final targets: the secret keys known as 'seeds'." Follow-on — "Two days later, Reuters
  revealed the name of the hacked military contractor: Lockheed Martin ... In the days that
  followed, defense contractors Northrop Grumman and L-3 were also named in news reports.
  Hackers with SecurID's seed values had targeted them too." ATTRIBUTION (the load-bearing
  point): China-nexus is FIRM but post-hoc and characterized at NATION level by the governmental
  source — NSA Director Gen. Keith Alexander, in a 2012 Senate Armed Services Committee briefing,
  said the RSA hack "led to at least one US defense contractor being victimized by actors
  wielding counterfeit credentials" and "went on to pin those attacks, vaguely, on an
  increasingly common culprit: China." The article links RSA to the Mandiant/NYT APT1 exposé
  ("a Chinese state hacker group that Mandiant had named APT1 ... believed to be People's
  Liberation Army Unit 61398 ... Among its dozens of targets over the previous five years: ...
  and RSA") and summarizes the perpetrators as "State cyberspies — who were later revealed to
  be working in the service of China's People's Liberation Army." So: China/PLA nexus = firm;
  the specific APT1/Unit-61398 identity for RSA = later journalistic/Mandiant consensus, not a
  firsthand technical pin. NB: the article does NOT mention APT12, and does NOT print the CVE
  number (CVE-2011-0609 comes from the contemporaneous Adobe/RSA disclosures).
