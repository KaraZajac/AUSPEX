notes: |
  Kim Zetter's report (with Andy Greenberg / Bloomberg parallel) on
  AT&T's ransom payment. The load-bearing source for the ~$370K
  deletion ransom and its on-chain verification. Verbatim: "[AT&T]
  paid a member of the hacking team more than $300,000 to delete the
  data and provide a video demonstrating proof of deletion. The
  hacker, who is part of the notorious ShinyHunters hacking group that
  has stolen data from a number of victims through unsecured Snowflake
  cloud storage accounts, tells WIRED that AT&T paid the ransom in
  May"; "WIRED confirmed, through an online blockchain tracking tool,
  that a payment transaction occurred on May 17 in the amount of 5.7
  bitcoin. Chris Janczewski, head of global investigations for
  crypto-tracing firm TRM Labs, also confirmed ... a transaction
  occurred in the amount of about 5.72 bitcoin (the equivalent of
  $373,646 at the time of the transaction)."
  NOTE: WIRED identifies the ransom recipient only as "a member of the
  ShinyHunters hacking group" who worked with John Erin Binns — it
  does NOT name Connor Moucka as the recipient.
