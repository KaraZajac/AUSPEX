notes: |
  Master narrative source for the Conti/Costa Rica incident and the
  follow-on Hive/CCSS attack. Created 2026-07-10 during phantom-source
  remediation of 2022-04/conti-costa-rica (the prior citation was a
  MICITT homepage-shell). Snapshot captured (HTTP 200, 1389981 bytes)
  + sha256; article body fully present in raw_snapshot.

  Load-bearing verbatim (confirmed in raw_snapshot):
  - "has declared a 'national emergency' in response to the
    ransomware—marking the first time a country has done so in
    response to a cyberattack."
  - "Twenty-seven government bodies were targeted in the first
    attacks, which ran from mid-April until the start of May,
    according to new president Rodrigo Chaves."
  - "The first ransomware attack against Costa Rica's government
    started during the week of April 10." / "By the early hours of
    April 18, files within the finance ministry had been encrypted
    and two key systems had been crippled: the digital tax service
    and the IT system for customs control."
  - "Local reports say ... estimated losses range from $38 million
    per day up to $125 million over 48 hours."
  - "The attacker demanded $10 million as a ransom payment, later
    upping the figure to $20 million. When no payment was made, they
    started uploading 672 GB of files to Conti's website."
  - "On May 8, Chaves started his four-year term as president and
    immediately declared a 'national emergency' ... calling the
    attackers 'cyberterrorists.'" / "Nine of the 27 targeted bodies
    were 'very affected,' Chaves said on May 16."
  - "On May 31, the second attack started. The systems of the Costa
    Rican Social Security Fund (CCSS) ... were taken offline ... This
    time the HIVE ransomware, which has some links to Conti, was
    blamed." / "By June 3, CCSS had declared an 'institutional
    emergency,' with local reports claiming that 759 of the 1,500
    servers and 10,400 computers have been impacted."
  - "On May 19, US-based cybersecurity firm AdvIntel declared Conti's
    operations dead, saying the group had started dismantling its
    brand—but not its overall organizational structure—in early May."
  - Self-claim: "A person or group dubbing themselves unc1756 ... used
    the blog to claim responsibility for the attack."
  - Exit-scam thesis: "researchers suggest that Conti's brazen actions
    may just be callous showboating ... The Costa Rica attack, at
    least in the eyes of AdVIntel, was meant to give Conti cover while
    it continued to rebrand itself." Emsisoft's Brett Callow: "This is
    possibly the most significant ransomware incident to date ... it's
    a first; it's quite unprecedented."
  ATTRIBUTION FINDING: source frames Conti as "the notorious
  Russia-linked ransomware gang" and cites its Feb 2022 pro-Russia
  stance, but attributes the operation to criminal self-interest /
  brand-cover, NOT to state tasking. The Conti<->Hive link for the
  CCSS attack is stated as "believed"/"some links," and the article
  explicitly notes "There are questions about whether the two separate
  ransomware attacks against Costa Rica are linked."
