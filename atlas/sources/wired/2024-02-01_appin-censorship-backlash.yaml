notes: |
  The fullest single account of the downstream censorship cascade.
  Carries the takedown execution date: "a little more than two
  weeks after publishing its investigation into Appin Technology,
  on December 5, Reuters complied with the Indian court's
  injunction, removing its story." Documents the domino effect:
  "SentinelOne, the cybersecurity firm that had helped Reuters in
  its investigation, removed its research... The Internet Archive
  deleted its copy of the Reuters article. The legal news site
  Lawfare and cybersecurity news podcast Risky Biz both published
  analyses based on the article; Risky Biz took its podcast episode
  down, and Lawfare overwrote every part of its piece that referred
  to Appin Technology with Xs. WIRED, too, removed a summary of
  Reuters' article in a news roundup after receiving Appin Training
  Centers' threat." Also: The New Yorker was sued by Appin Training
  Centers over a June 2023 hack-for-hire feature but kept it
  online; Ron Deibert (Citizen Lab) received and publicly refused a
  takedown demand in December 2023; EFF, Techdirt, MuckRock and
  DDoSecrets pushed back. No mention of Wikipedia or of Substack
  writers among the pressured parties.
