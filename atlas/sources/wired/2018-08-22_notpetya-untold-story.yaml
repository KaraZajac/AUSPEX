notes: |
  Andy Greenberg's long-form WIRED feature (dated Aug 22, 2018; page
  metadata straddles 2018-08-21/-22). Source-carries the event's
  ~$10 billion global-damage figure and the full multinational victim
  list with per-company loss estimates — none of which the WH press
  statement or the DOJ press release contain (WH said only "billions of
  dollars"; DOJ named only three victims at "nearly $1 billion").

  Supporting quotes (verbatim):
  - "The result was more than $10 billion in total damages, according to
    a White House assessment confirmed to WIRED by former Homeland
    Security adviser Tom Bossert." (i.e. the $10B is a White House
    ASSESSMENT relayed via Bossert, not the Feb-2018 press statement.)
  - "It crippled multinational companies including Maersk, pharmaceutical
    giant Merck, FedEx's European subsidiary TNT Express, French
    construction company Saint-Gobain, food producer Mondelēz, and
    manufacturer Reckitt Benckiser. In each case, it inflicted nine-figure
    costs."
  - Per-victim: "NotPetya cost Maersk between $250 million and $300
    million"; Merck "lost a staggering $870 million"; FedEx/TNT "took a
    $400 million blow"; "Saint-Gobain lost around the same amount"; Reckitt
    Benckiser "lost $129 million, and Mondelēz … took a $188 million hit."

