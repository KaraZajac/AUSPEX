notes: |
  M&S chairman Archie Norman's evidence to UK Parliament — the M&S
  DragonForce belief and the ~GBP 300M impact figure.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed.
  Verbatim: "M&S said the attack would cost it about £300m in lost
  operating profit." Norman: "We believe in this case there was the
  instigator of the attack and then, believed to be DragonForce, who
  were a ransomware operation based we believe in Asia." On the
  Scattered Spider label (attribution caution): "A hacking collective
  known as Scattered Spider that deploys ransomware from DragonForce,
  has previously been blamed in the media for the attack" and "they
  never send you a letter signed Scattered Spider, that doesn't
  happen." (Article does not state the initial-access vector or date.)
