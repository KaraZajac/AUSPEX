notes: |
  Mandiant disclosure documenting Ghostwriter (UNC1151 / UAC-0057)
  shift from European political-influence operations toward
  direct espionage targeting of Ukrainian military personnel and
  government employees. Operators used a refreshed PicassoLoader /
  AROEX malware family delivered through phishing of Ukrainian
  defense and government inboxes. Notable for marking the Belarus-
  aligned cluster's pivot from primarily-influence to
  primarily-espionage operations in the post-invasion phase.

