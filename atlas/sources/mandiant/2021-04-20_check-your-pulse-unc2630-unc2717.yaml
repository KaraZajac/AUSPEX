notes: |
  ADDED 2026-07-01 (claude-opus-4.8/max) as the badrabbit re-source for
  2021-05/pulse-connect-secure-exploitation: the event's only prior source was the
  CISA advisory AA21-110A, which is actor-agnostic ("a cyber threat actor—or actors")
  and carries NO China/PRC/APT attribution. This Mandiant/FireEye report is the primary
  that carries the (suspected) China-nexus attribution. Key verbatim: "We suspect UNC2630
  operates on behalf of the Chinese government and may have ties to APT5"; "Although we
  are not able to definitively connect UNC2630 to APT5, or any other existing APT group,
  a trusted third party has uncovered evidence connecting this activity to historic
  campaigns which Mandiant tracks as Chinese espionage actor APT5 ... the third party
  assessment is consistent with our understanding of APT5"; "We do not have enough
  evidence about UNC2717 to determine government sponsorship or suspected affiliation
  with any known APT group." Targets: "Early this year, Mandiant investigated multiple
  intrusions at defense, government, and financial organizations around the world";
  focus on "U.S. Defense Industrial base (DIB) networks" at "U.S. and European victim
  organizations." Vector: "Several Pulse Secure VPN vulnerabilities and a previously
  unknown vulnerability discovered in April 2021, CVE-2021-22893, are responsible for the
  initial infection vector." No APT41 anywhere in the report.
