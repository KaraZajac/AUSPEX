notes: |
  GTIG's first-public publication on UNC6040, a financially-
  motivated threat cluster running voice-phishing (vishing)
  campaigns against Salesforce-customer organizations to obtain
  OAuth-tokenized access to corporate Salesforce instances via
  malicious modified-Data-Loader connected apps. Follow-on
  extortion tracked separately as UNC6240, which has consistently
  claimed to be "ShinyHunters" in extortion communications. This
  is the canonical primary source for the 2025 ShinyHunters-
  branded Salesforce-cloud campaign.

  AUDIT (2026-07-10, claude-opus-4.8/max): live URL HTTP 200, raw
  snapshot captured (sha256 4dce0e4b..f79c1051, 287,906 bytes).
  Verbatim load-bearing text present: "Google Threat Intelligence
  Group (GTIG) is tracking UNC6040, a financially motivated threat
  cluster that specializes in voice phishing (vishing) campaigns
  specifically designed to compromise organizations' Salesforce
  instances"; "During these communications, UNC6240 has consistently
  claimed to be the threat group ShinyHunters"; "the actor has
  claimed affiliation with the well-known hacking group ShinyHunters,
  likely as a method to increase pressure on their victims." IMPORTANT
  scope limit: this source NAMES NO VICTIM except Google's own
  corporate Salesforce instance (Aug 5 update) — it does NOT name
  Adidas, and the "ShinyHunters" identity is reported as the extortion
  actor's self-claim, not a GTIG confidence assertion. "Com" overlap is
  hedged ("plausible that these similarities stem from associated
  actors operating within the same communities, rather than indicating
  a direct operational relationship"). No mention of "Scattered Spider".
