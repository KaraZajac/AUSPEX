notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): RAW-VERIFIED — the cited
  URL does NOT resolve to a CARR/water-utility attribution. It
  resolves to Mandiant's "Sandworm Disrupts Power in Ukraine Using
  a Novel Attack Against Operational Technology" blog, dated
  November 9, 2023 (the SAME URL as
  mandiant/2023-11-09_sandworm-disrupts-power-ukraine-ot). The page
  contains 0 mentions of CARR / "Cyber Army" / Reborn / water /
  Texas / Muleshoe / Abernathy / HMI / proxy. It DOES attest
  Sandworm's GRU lineage — verbatim: "Sandworm is a full-spectrum
  threat actor that has carried out espionage, influence and attack
  operations in support of Russia's Main Intelligence Directorate
  (GRU) since at least 2009" and "Government indictments have linked
  the group to the Main Center for Special Technologies (also known
  as GTsST and Military Unit 74455)" — but it does NOT mention CARR
  and therefore does NOT link CARR to Sandworm or Unit 74455. The
  curated title ("...US Texas Water Utility CARR Analysis") and the
  published_on 2024-04-17 describe content that is not present at
  this URL; this source does not substantiate a CARR↔74455
  placement. (Title/date left intact pending a curator decision on
  whether to repoint or retire this record — out of scope here.)
