notes: |
  Mandiant disclosure of an ongoing APT29 / SVR phishing campaign
  targeting diplomatic and government entities across Europe — NATO
  ministries of foreign affairs and embassies — using lure documents
  themed around inter-state diplomatic correspondence. Tradecraft
  evolution from earlier ROOTSAW / WINELOADER tooling toward
  ZIP-shipped legitimate-binary loaders abusing DLL search-order
  hijacking. Provides public corroboration of the SVR's continued
  prioritisation of European foreign-ministry intelligence
  collection through the active phase of the invasion.
