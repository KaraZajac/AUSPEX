  Mandiant "Backchannel Diplomacy: APT29's Rapidly Evolving Diplomatic
  Phishing Operations" (Luke Jenkins, Josh Atkins, Dan Black). Documents
  APT29/SVR diplomatic-themed phishing that, through H1 2023 (as Kyiv's
  counteroffensive began), "continues to prioritise European Ministries
  of Foreign Affairs and embassies" and diplomatic entities associated
  with NATO/EU member states, delivering the ROOTSAW first stage via
  actor-controlled and compromised websites with follow-on ZIP payloads
  and a succession of loaders (BURNTBATTER, MUSKYBEAT, QUARTERRIG) — the
  actor's tooling evolution one stage before WINELOADER. Corroborates the
  SVR's central role in strategic foreign-intelligence collection during
  the war.
