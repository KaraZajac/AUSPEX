notes: |
  Mandiant's foundational attribution of UNC1151 / Ghostwriter to
  the Belarusian government, with high-confidence linkage between
  the cluster's operations and Belarusian state interests.

  AUDIT (2026-06-24, claude-opus-4.8/max): captured live (HTTP 200, 257KB).
  NB the original 2021-04-28 Mandiant URL now 301-redirects to the
  consolidated cloud.google.com page that renders the 2021-11-16 follow-on
  ("UNC1151 Assessed with High Confidence to have Links to Belarus..."),
  so the snapshot's dateline reads November 16, 2021 — it carries the full
  attribution text and the April assessment it restates. KEY WORDING for the
  Ghostwriter actor audit: this source attributes the cluster to "the
  Belarusian government" (HIGH confidence) and "the Belarusian military"
  (MODERATE confidence) — "Mandiant assesses with high confidence that UNC1151
  is linked to the Belarusian government and with moderate confidence is linked
  to the Belarusian military"; "Sensitive technical information locates the
  operation in Minsk, Belarus and links it to the Belarusian Military." It does
  NOT name the Belarusian KGB / Committee for State Security (0 occurrences).
  On Russia it is hedged: "We cannot rule out Russian contributions to either
  UNC1151 or Ghostwriter. However, at this time, we have not uncovered direct
  evidence of such contributions." Supports a Belarus nexus but no KGB
  placement → actor demoted by/kgb → by/unscoped.

  RESOLVED (2026-07-01, claude-opus-4.8/max): published_on corrected 2021-04-28
