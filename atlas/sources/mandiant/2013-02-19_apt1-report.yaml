notes: |
  Public attribution of PLA Unit 61398 (Pudong, Shanghai) as APT1 /
  Comment Crew. 141 documented victims across 20 industries from 2006.
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw 33-page PDF captured + hashed. This report names
  the PLA (military), NOT the MSS — Key Findings: "APT1 is believed to be the 2nd Bureau of the
  People's Liberation Army (PLA) General Staff Department's (GSD) 3rd Department (总参三部二局),
  which is most commonly known by its Military Unit Cover Designator (MUCD) as Unit 61398
  (61398部队)." The report profiles ONLY APT1/Unit 61398 and never mentions APT19. It was cited
  on the cn/mss/apt19 actor record purely as "generic Chinese-APT context" — an off-topic /
  placeholder citation that supports neither an APT19 attribution nor any MSS placement. Used in
  the 2026-06-24 audit that demoted cn/mss/apt19 → cn/unscoped/apt19. (This source legitimately
  documents APT1 itself; the flag is specific to its mis-use on the APT19 record.)
  AUDIT (2026-06-24, claude-opus-4.8/max): same finding applies to the cn/mss/apt22 record, which
  also cited this report as its SOLE source ("generic Chinese-APT context"). Re-verified against
  the captured PDF: the report names the PLA (Unit 61398), not the MSS, and never mentions APT22
  (0 occurrences of "APT22", 0 of "MSS"/"Ministry of State Security"). It supports no APT22
  attribution and no MSS placement; used in the 2026-06-24 audit that demoted cn/mss/apt22 →
  cn/unscoped/apt22.
  AUDIT (2026-06-24, claude-opus-4.8/max): POSITIVE case — on the cn/pla/apt1 actor record (the
  group this report actually documents) this source DIRECTLY supports the service placement
  (primary_service_id cn/pla/unit-61398) at the named-unit level. Re-verified firsthand against
  pages 1-6 of the captured PDF. Key Findings (p.3): "APT1 is believed to be the 2nd Bureau of the
  People's Liberation Army (PLA) General Staff Department's (GSD) 3rd Department (总参三部二局),
  which is most commonly known by its Military Unit Cover Designator (MUCD) as Unit 61398
  (61398部队)." Conclusion (p.6): "We believe the totality of the evidence we provide in this
  document bolsters the claim that APT1 is Unit 61398." The TOC carries a dedicated section
  "China's Computer Network Operations Tasking to PLA Unit 61398 (61398部队)" (p.7). PLA (military),
  not MSS. cn/pla/apt1 KEEP confirmed.
