notes: |
  Mandiant attribution of the early-2023 Fortra GoAnywhere MFT
  zero-day (CVE-2023-0669) mass-exploitation campaign to Cl0p —
  precursor to the MOVEit campaign later that year.
  AUDIT (2026-07-02, claude-opus-4.8/max): LINK-ROT — NOT SNAPSHOTTABLE.
  The article URL now returns a Google Cloud SPA soft-404: HTTP 200 but
  the rendered body reads ".../fortra-goanywhere-cl0p was not found on
  this server. That's all we know." (curl and WebFetch both confirm; the
  15 CL0P/GoAnywhere hits in the shell are the URL slug echoed in the 404
  scaffold, not article prose — zero body text: no CVE, no victims, no
  TA505/FIN11). The saved shell sha 116d1bcd...4c2e2da1 is the 404 page,
  NOT the article, so no content_sha256 is recorded. archive.org is
  blocked for the fetcher. Attribution content mirror-corroborated:
  Mandiant "initially attributed this activity to UNC4857, which has now
  been merged into FIN11 based on targeting, infrastructure, certificate,
  and data leak site (DLS) overlaps" and scoped observed impact to
  "organizations ... based in Canada, India, and the U.S. ... almost
  certainly broader than Mandiant has directly observed" (report text
  surfaced in search; echoed by BankInfoSecurity/The Record). This is
  the load-bearing ATTRIBUTION source that could not be snapshotted, so
  2023-05/cl0p-goanywhere is stamped qc level: partial. tier left
  secondary (content unverifiable firsthand; a first-party-Mandiant ->
  primary bump is deferred to human review). Event re-sourced with
  reachable primaries: Fortra post-mortem (2023-04-17), BleepingComputer
  (130 self-claim, 2023-02-10), HIPAA Journal (CHS ~1M, 2023-03-10),
  The Record (victim confirmations, 2023-03-17).
