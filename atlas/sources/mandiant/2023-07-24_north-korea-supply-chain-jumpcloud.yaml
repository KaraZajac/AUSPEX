notes: |
  AUDIT (2026-07-02, claude-opus-4.8/max): Mandiant's report on the JumpCloud
  2023 supply-chain compromise (Austin Larsen et al.), based on Mandiant's own
  IR at one impacted downstream customer. Snapshot sha256 5ae7cc74…1ef4611a
  (403,910 B). Authoritative attribution + tradecraft source. Verbatim:
  - "Mandiant attributed these intrusions to UNC4899, a Democratic People's
    Republic of Korea (DPRK)-nexus actor, with a history of targeting companies
    within the cryptocurrency vertical."
  - "Mandiant assesses with high confidence that UNC4899 is a
    cryptocurrency-focused element within the DPRK's Reconnaissance General
    Bureau (RGB)."
  - "Based on reporting from trusted partners, UNC4899 likely corresponds to
    TraderTraitor, a financially motivated DPRK threat group that primarily
    targets blockchain-related companies."
  - "We believe the compromise ultimately began as a result of a sophisticated
    spear phishing campaign aimed at JumpCloud… JumpCloud reported this
    unauthorized access impacted fewer than five customers and less than 10
    devices."
  - "JumpCloud confirmed the commands framework was used for malicious data
    injections"; a malicious Ruby script ran "via the JumpCloud agent at a
    downstream customer."
  - macOS implants named: FULLHOUSE.DOORED, STRATOFEAR, TIEDYE. "Mandiant
    identified UNC4899 targeting MacOS keychains and reconnaissance data
    associated with executives and internal security teams."
  ACTOR-SCOPING FLAG: this source explicitly names the RGB (high confidence) for
  UNC4899/TraderTraitor — a citable RGB-naming primary that the actor record
  kp/unscoped/tradertraitor (demoted to unscoped 2026-06-24 for lack of any
  RGB-naming cited source) does NOT currently cite. Flagged for actor re-review.
