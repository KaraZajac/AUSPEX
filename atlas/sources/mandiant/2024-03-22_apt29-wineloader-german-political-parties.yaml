  # AUDIT 2026-07-04 (claude-opus-4-8/max) — created during the QC
  # re-sourcing of event 2024-04/apt29-diplomatic-phishing-europe, whose
  # WINELOADER / CDU / German-political-party claims were NOT carried by
  # the previously-cited Sept-2023 "Backchannel Diplomacy" report.
  Mandiant blog by Luke Jenkins & Dan Black, published 2024-03-22
  (JSON-LD datePublished "2024-03-22"). In late February 2024 Mandiant
  identified APT29 — "a Russian Federation backed threat group linked by
  multiple governments to Russia's Foreign Intelligence Service (SVR)" —
  spearphishing German political parties with a 01 March dinner-reception
  invite bearing a Christian Democratic Union (CDU) logo. The
  German-language lure linked to a malicious ZIP holding APT29's mainstay
  ROOTSAW (EnvyScout) dropper, which delivered a second CDU-themed decoy
  and the WINELOADER backdoor (invoked via DLL side-loading into the
  legitimate Microsoft binary sqldumper.exe). WINELOADER was first seen in
  operational use in late January 2024 against likely diplomatic entities
  in Czechia, Germany, India, Italy, Latvia, and Peru. Mandiant frames the
  political-party targeting as a departure from — and first observed
  instance beyond — this cluster's usual diplomatic-mission remit.
