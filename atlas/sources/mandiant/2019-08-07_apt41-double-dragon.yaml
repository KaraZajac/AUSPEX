notes: |
  FireEye / Mandiant's foundational Double Dragon report
  formalizing APT41 as a distinct cluster — published shortly
  before the August 2019 DOJ indictment. Documents APT41
  combining state-tasked espionage (semiconductors, telecom,
  healthcare, technology IP) with financially motivated
  video-game-virtual-currency theft and cryptocurrency
  exchange targeting. Tooling: ShadowPad, PlugX, Winnti,
  Crosswalk, POISONPLUG.

  AUDIT (2026-06-27, claude-opus-4.8/max): added during the CCleaner supply-chain
  RE-SOURCE. The official cited URL (cloud.google.com blog) is CLIENT-SIDE RENDERED
  — its static HTML is a JS shell whose article body does not contain the report
  text (curl yields only nav chrome + meta). The raw_snapshot is therefore the
  publicly-mirrored FULL FireEye PDF report ("Double Dragon: APT41, a dual espionage
  and cyber crime operation", 8,244,365 bytes, sha256 6085d114…9ea04ec4), whose text
  was cross-checked against the threatrack/cti_report_collection text mirror
  (identical wording). KEY FINDING for the CCleaner event: the full report EXPLICITLY
  DECLINES to attribute CCleaner to APT41 — verbatim: "In March 2017, suspected
  Chinese espionage operators targeted CCleaner ... downloaded by 2.27 million
  customers. While we have identified some overlaps between the CCleaner activity and
  APT41, we do not have enough information to attribute the CCleaner compromise to
  APT41 at this time." FireEye notes only overlaps (shared TeamViewer initial access;
  the trojanized update it calls DIRTCLEANER; the backdoor it identifies as
  BLACKCOFFEE — historically an APT17 tool), and corroborates the 2.27M figure.
  So this source supports a NATION-level "suspected Chinese espionage operators"
  reading and is decisive evidence AGAINST an APT41 attribution of CCleaner; it does
  NOT name Barium/APT41 as the CCleaner actor.
