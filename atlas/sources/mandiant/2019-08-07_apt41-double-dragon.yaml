notes: |
  FireEye / Mandiant's foundational Double Dragon report
  formalizing APT41 as a distinct cluster — published shortly
  before the August 2019 DOJ indictment. Documents APT41
  combining state-tasked espionage (semiconductors, telecom,
  healthcare, technology IP) with financially motivated
  video-game-virtual-currency theft and cryptocurrency
  exchange targeting. Tooling: ShadowPad, PlugX, Winnti,
  Crosswalk, POISONPLUG.
