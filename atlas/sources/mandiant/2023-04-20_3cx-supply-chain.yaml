notes: |
  Mandiant attribution of the 3CX DesktopApp compromise to
  UNC4736 (DPRK-aligned) via prior supply-chain compromise of
  Trading Technologies X_TRADER. First publicly documented
  cascading supply-chain attack.

  AUDIT (2026-06-24, claude-opus-4.8/max): NATION-LEVEL attribution only — no DPRK service named.
  "Mandiant tracks this activity as UNC4736, a suspected North Korean nexus cluster of activity";
  "Mandiant assesses with moderate confidence that UNC4736 is related to financially motivated North
  Korean 'AppleJeus' activity as reported by CISA." No mention of the Reconnaissance General Bureau,
  Bureau 121, 3rd Bureau, or any specific DPRK service (zero RGB/Bureau hits). Supports the DPRK +
  AppleJeus-cluster linkage but does not carry the service placement.
