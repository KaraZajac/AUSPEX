notes: |
  GTIG/Mandiant disclosure of UNC5221 BRICKSTORM activity since
  March 2025 against US legal-services, SaaS, BPO, and tech
  firms. 393-day mean dwell time. Go-based backdoor with SOCKS
  proxy targeting appliance / virtualization layers lacking EDR.
  AUDIT (2026-07-11, claude-opus-4.8/max): Raw re-fetched (HTTP 200, 420,906 B) + hashed
  (SHA-256 above). Verbatim anchors: "We attribute this activity to UNC5221 and closely related,
  suspected China-nexus threat clusters"; "While UNC5221 has been used synonymously with the actor
  publicly reported as Silk Typhoon, GTIG does not currently consider the two clusters to be the
  same"; BRICKSTORM "is written in Go" (ZERO "Rust"/"polyglot" — the lone grep hit was "Trusted
  Platform Module"); "remain undetected ... for 393 days, on average"; SaaS objective downstream
  access "with high confidence"; legal targeting "primarily to gather information related to US
  national security and international trade". NO "MSS"/"Ministry of State Security", NO "2024" date,
  NO "UNC3886" in the report. Drove the mandiant-brickstorm-saas-legal event's Rust-strip + MSS
  de-attestation.
