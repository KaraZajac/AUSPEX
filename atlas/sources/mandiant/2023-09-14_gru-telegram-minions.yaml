notes: |
  Mandiant analysis documenting structured coordination between
  GRU-sponsored Sandworm / APT44 operators and self-presenting
  hacktivist Telegram personas — XakNet Team, Solntsepek, and
  CyberArmyofRussia_Reborn — where Sandworm operators conducted
  intrusive operations and the hacktivist personas amplified the
  results for psychological / influence effect. The combination
  pattern was first observed at scale during the 2022 Ukrainian
  campaign and matured through 2023 with claimed operations
  against Polish, Lithuanian, and US water-utility targets.

  AUDIT (2026-06-24, claude-opus-4.8/max): This source NAMES the GRU
  in connection with XakNet and is the basis for re-promoting
  ru/proxies/xaknet → ru/gru/xaknet. Raw HTML captured and hashed;
  60 verbatim "XakNet" mentions confirmed in snapshot. Mandiant's
  attribution confidence is MODERATE (their term). Quotes:
  - "We assess with moderate confidence that moderators of the
    purported hacktivist Telegram channels 'XakNet Team,'
    'Infoccentr,' and 'CyberArmyofRussia_Reborn' are coordinating
    their operations with Russian Main Intelligence Directorate
    (GRU)-sponsored cyber threat actors."
  - "We assess with moderate confidence that the moderators of the
    XakNet Team channel are directly supported by APT44, based on
    XakNet's leak of a technical artifact APT44 employed during the
    compromise of a Ukrainian network."
  - "Given the unique nature of this technical artifact, we assess
    with moderate confidence that the moderators of XakNet Team
    either are GRU intelligence officers or work directly with the
    GRU APT44 operators conducting on-net operations."
