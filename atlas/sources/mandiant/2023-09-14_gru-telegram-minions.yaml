title: |
  Hacktivists Collaborate with GRU-sponsored Threat Actors
url: https://cloud.google.com/blog/topics/threat-intelligence/gru-rise-telegram-minions
archive_url: "https://web.archive.org/web/20260417032015/https://cloud.google.com/blog/topics/threat-intelligence/gru-rise-telegram-minions/"
