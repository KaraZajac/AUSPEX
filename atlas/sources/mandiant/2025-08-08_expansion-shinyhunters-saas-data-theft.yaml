notes: |
  GTIG follow-up to the June 2025 UNC6040 publication. Tracks the
  expansion of ShinyHunters-branded extortion (UNC6240) beyond
  Salesforce-tenant intrusions to a broader SaaS-data-theft
  pattern affecting Workday, Drift / Salesloft chains, and other
  identity-federation entrypoints. Explicitly identifies Google
  itself as having been affected via a corporate Salesforce
  instance compromise.

