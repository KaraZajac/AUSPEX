notes: |
  LINK-ROT: the cited url (https://www.mandiant.com) is only the Mandiant homepage, and the
  underlying FireEye/Mandiant APT34 resource URLs (e.g.
  https://www.mandiant.com/resources/targeted-attack-in-middle-east-by-apt34) now 301-redirect
  cross-host to cloud.google.com/security/mandiant — a generic landing page with no APT34/Iran
  content. raw_snapshot captures that redirected endpoint to document the rot; the original report
  text is no longer retrievable at the cited domain.
  AUDIT (2026-06-24, claude-opus-4.8/max): re. ir/mois/apt34 service placement. Mandiant/FireEye's
  foundational APT34 reporting attributes ONLY to a "suspected Iranian threat group" working "on
  behalf of the Iranian government" — it does NOT name the MOIS. (Text preserved via MITRE ATT&CK
  G0049, which cites this FireEye report verbatim: "The group works on behalf of the Iranian
  government based on infrastructure details that contain references to Iran, use of Iranian
  infrastructure, and targeting that aligns with nation-state interests.") Supports the Iran nexus,
  not the specific MOIS placement.
