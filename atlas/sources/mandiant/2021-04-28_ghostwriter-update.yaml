notes: |
  Mandiant/FireEye's April 28, 2021 "Ghostwriter Update" — the report that
  first linked the Ghostwriter influence campaign to the UNC1151 cyber-espionage
  cluster. Created 2026-07-01 (claude-opus-4.8/max) during the QC census of
  event 2021-04/ghostwriter-unc1151-disclosure, which had been mis-sourced to
  the sibling record mandiant/2021-04-28_ghostwriter-unc1151 (whose URL/title/
  snapshot are actually Mandiant's NOVEMBER 16, 2021 Belarus-attribution report,
  not the April update — see FLAG in that record).

  Raw snapshot is the official Mandiant report PDF hosted by Google
  (https://services.google.com/fh/files/misc/ghostwriter_update_report.pdf),
  captured 2026-07-01 (PDF, 4,619,327 bytes, sha256 9301446d…4d6c42c4). The
  canonical blog landing (url above) renders the same report.

  KEY WORDING (verbatim from the PDF):
  - Attribution of the campaign to the cluster (HIGH conf, PARTIAL scope):
    "Recently obtained technical evidence now allows us to assess with high
    confidence that UNC1151, a suspected state-sponsored cyber espionage actor
    that engages in credential harvesting and malware campaigns, conducts at
    least some components of Ghostwriter influence activity; current
    intelligence gaps, including gaps pertaining to website compromises and the
    operation of false personas, do not allow us to conclusively attribute all
    aspects of the Ghostwriter campaign to UNC1151 at this time. We do not
    associate UNC1151 with any other previously tracked threat groups."
  - NO nation attribution: UNC1151 is only "a suspected state-sponsored cyber
    espionage actor/group." The words "Belarus"/"Belarusian" appear ONLY inside
    the described narrative content (a Belarusian blogger; "peacekeeping forces
    in Belarus"), NEVER as an attribution. The Belarus attribution came in
    Mandiant's Nov-16-2021 follow-on, not here.
  - Russia framing: the Ghostwriter narratives are described (per the July-2020
    FireEye report it updates) as pushing content "aligned with Russian security
    interests"; Russia appears as narrative-ALIGNMENT, not as perpetrator
    attribution.
  - Campaign nature/targets: "a cyber-enabled influence campaign which primarily
    targets audiences in Lithuania, Latvia and Poland and promotes narratives
    critical of the North Atlantic Treaty Organization's (NATO) presence in
    Eastern Europe"; "Since the start of 2021, UNC1151 has expanded its
    credential theft activity to target German politicians" (reported in the
    German Tagesschau); recent ops "leveraged the compromised social media
    accounts of Polish officials." Appendix 2 case study: a fabricated Polish
    military prostitution scandal alleging U.S. Military involvement and
    implicating Polish and Lithuanian officials. "UNC1151 intrusion activity has
    been active since at least 2017."
