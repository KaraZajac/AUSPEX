notes: |
  Mandiant graduation of the Kimsuky-overlapping cluster to
  APT-tier with the APT43 designation. Documents the
  parallel-revenue model: cryptojacking and stolen-credential
  monetization funding the cluster's espionage-collection
  operations against US-policy and South-Korea-policy
  targets. First clean public articulation of the
  collection-self-funding model attested in subsequent
  Andariel / Rim Jong Hyok (DOJ July 2024) indictment.
