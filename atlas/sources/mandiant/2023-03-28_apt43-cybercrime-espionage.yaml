notes: |
  Mandiant graduation of the Kimsuky-overlapping cluster to
  APT-tier with the APT43 designation. Documents the
  parallel-revenue model: cryptojacking and stolen-credential
  monetization funding the cluster's espionage-collection
  operations against US-policy and South-Korea-policy
  targets. First clean public articulation of the
  collection-self-funding model attested in subsequent
  Andariel / Rim Jong Hyok (DOJ July 2024) indictment.
  AUDIT (2026-07-02, claude-fable-5/max): raw snapshot captured (HTTP 200;
  real article — <title>/canonical match, full analysis body — NOT a phantom).
  sha256 8573da08…087c7852, 222867 bytes. Corrections vs the summary above:
  Mandiant describes laundering stolen crypto into "clean" crypto via
  HASH-RENTAL / CLOUD-MINING services, NOT "cryptojacking" (the word appears
  0× in this blog and 0× in the companion full report). This blog names
  neither "Kimsuky" nor any confidence figure — both are in the companion
  full report (mandiant/2023-03-28_apt43-report), now co-cited by the event.
  Self-funding is framed as juche self-reliance ("reducing fiscal strain on
  the central government"), not the 8th-Congress / WMD plan.
