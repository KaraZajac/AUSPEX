title: |
  Sandworm Disrupts Power in Ukraine Using a Novel Attack Against
  Operational Technology
url: https://cloud.google.com/blog/topics/threat-intelligence/sandworm-disrupts-power-ukraine-operational-technology/
archive_url: null
published_on: 2023-11-09
retrieved_on: 2026-05-27
tier: primary
notes: |
  Mandiant disclosure of an October 2022 Sandworm operation against
  a Ukrainian critical infrastructure organisation. Sandworm used a
  living-off-the-land MicroSCADA technique to issue a substation
  disconnection command, causing an unplanned power outage that
  coincided with kinetic missile strikes on Ukrainian energy
  infrastructure. The operation introduced a new Sandworm OT
  tradecraft pattern (native ICS-binary abuse instead of dedicated
  ICS malware), and was followed two days later by deployment of a
  CaddyWiper variant. Disclosed late as part of the broader APT44
  promotion arc.
