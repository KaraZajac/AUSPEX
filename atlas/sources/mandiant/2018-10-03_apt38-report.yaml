notes: |
  Foundational APT38 cluster-definition report. Separated APT38
  from the Lazarus core on tradecraft distinctness for
  financial-theft operations against SWIFT-network banks. The
  full 41-page "Un-usual Suspects" PDF (originally hosted at
  content.fireeye.com/apt/rpt-apt38 and later at
  services.google.com/fh/files/misc/apt38-report.pdf) is no
  longer live; canonical Mandiant blog summary remains at the
  url above. PDF preserved via Wayback Machine 2023-05-19 snap.
  AUDIT (2026-06-24, claude-opus-4.8/max): UNFETCHABLE for raw
  capture — the url 301-redirects to a Google Cloud marketing page
  (cloud.google.com/security/consulting/mandiant-services) and the
  live page returns only a JS app shell with no article text;
  WebFetch follows the same cross-host redirect; the Wayback PDF is
  archive.org-blocked per protocol. No raw_snapshot recorded (would
  be an empty SPA shell). Role on kp/rgb/apt38: tier=secondary
  cluster-DEFINITION source (separates APT38 from Lazarus core on
  financial tradecraft) — it does NOT carry the RGB service claim
  and is not relied on for it. The RGB -> APT38 placement is
  independently sourced and raw-verified on this actor's three
  govt-primary citations (OFAC 2019-09-13 via Bluenoroff; DOJ
  2021-02-17; CISA AA20-239A via BeagleBoyz). KEEP verdict does not
  depend on this source.
