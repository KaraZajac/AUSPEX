notes: |
  Foundational APT37 / Reaper cluster definition.

  AUDIT (2026-06-24, claude-opus-4.8/max): Re-fetched for the kp/mss/apt37 service-placement audit.
  The LIVE url now 301-redirects to https://cloud.google.com/security/consulting/mandiant-services
  (a Google Cloud marketing shell — the 2018 article is gone from mandiant.com; a fresh curl of the
  live url returns 0 occurrences of "APT37"). raw_snapshot/content_sha256 are therefore the WAYBACK
  capture (archive_url, 2024-04-05), which carries the real article body (34 "APT37" occurrences).
  This report attributes APT37 only at the NATION level — it does NOT name the MSS (Ministry of State
  Security) or the RGB (Reconnaissance General Bureau); the strings "MSS"/"Ministry of State
  Security"/"RGB"/"Reconnaissance General Bureau" are absent. Verbatim: "We assess with high
  confidence that this activity is carried out on behalf of the North Korean government given malware
  development artifacts and targeting that aligns with North Korean state interests." And: "...our
  assessment that this threat actor is working on behalf of the North Korean government...". (The
  prior note here claiming an "MSS-attributed espionage line distinct from the RGB Lazarus umbrella"
  was NOT supported by this source and has been corrected — Mandiant says "North Korean government",
  full stop.) Drove the actor demotion kp/mss/apt37 -> kp/unscoped/apt37.
