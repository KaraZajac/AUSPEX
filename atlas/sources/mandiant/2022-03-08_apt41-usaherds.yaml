notes: |
  APT41 targeting at least six US state governments via USAHerds
  0-day (CVE-2021-44207) and Log4Shell.
  AUDIT (2026-06-24, claude-opus-4.8/max): does NOT name the MSS or any
  Chinese service. Characterizes the actor only as "a prolific Chinese
  state-sponsored espionage group known to target organizations in both the
  public and private sectors and also conducts financially motivated activity
  for personal gain." No "Ministry of State Security" / "MSS" string in the
  post. Corroborates the China-state nexus but is silent on the specific
  service; the cn/mss placement rests on the Sept 2020 DOJ release.
