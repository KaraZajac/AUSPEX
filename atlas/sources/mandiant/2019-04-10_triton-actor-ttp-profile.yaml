notes: |
  FireEye/Mandiant deep technical analysis of the Triton/Trisis
  malware family and TEMP.Veles actor cluster. Pre-dates the 2020
  Treasury TsNIIKhM designation; technical foundation for the
  subsequent attribution.
  AUDIT (2026-06-25, claude-opus-4.8/max): does NOT name TsNIIKhM. This
  article attributes Triton only to an unnamed institute — verbatim: "In
  our most recent analysis, we attributed the intrusion activity that
  led to the deployment of TRITON to a Russian government-owned
  technical research institute in Moscow." Supports the Russia-nexus
  but not, on its own, the specific ru/tsniikhm service slug (that rests
  on the Treasury and DOJ primaries, which name TsNIIKhM). The live
  mandiant.com URL now 301-redirects to a generic Google Cloud services
  page (link-rot); raw HTML captured from the Wayback snapshot
  (web.archive.org/web/20240117134651/, HTTP 200) recorded in url's
  archive_url field.
