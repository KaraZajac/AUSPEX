  AUDIT (2026-06-24, claude-opus-4.8/max): no raw snapshot captured — the
  cited url is the bare Mandiant homepage (https://www.mandiant.com), which
  yields no APT39-profile content (the original FireEye 2019 blog URL is
  preserved only in the actor's misp_refs). Not load-bearing for the
  ir/mois/apt39 service audit: the Mandiant/FireEye January 2019 profile
  predates the September 2020 OFAC/FBI designation and attributes APT39 to
  Iran at the nation level, not to a named service. The ir/mois placement is
  VERIFIED instead on the two cited government primaries
  (treasury/2020-09-17_apt39-rana-mois, fbi/2020-09-17_rana-malware), which
  name the MOIS specifically and tie APT39 directly to it.
