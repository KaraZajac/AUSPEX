  AUDIT (2026-06-25, claude-opus-4.8/max): corroborates the RGB
  placement of kp/rgb/lazarus. Mandiant's DPRK-to-government mapping
  places the Lazarus umbrella under the RGB's 3rd Bureau / Lab 110:
  "Reconnaissance General Bureau: 3rd Bureau — Lab 110 … the focal point
  for the Lazarus Group Umbrella. TEMP.Hermit, APT38, and Andariel are
  likely subordinate to Lab 110." and, on the RGB more broadly, DPRK
  cyber "operations, and financial crimes, are primarily conducted by
  elements within the Reconnaissance General Bureau." Secondary tier →
  corroborative; the govt-primary OFAC 2019 + 2021 DOJ sources carry the
  KEEP. (Note: Mandiant assigns Lazarus to a sub-bureau of the RGB,
  Lab 110; AUSPEX places this actor at the RGB parent kp/rgb, which is
  consistent with — and broader than — Mandiant's finer placement.)
