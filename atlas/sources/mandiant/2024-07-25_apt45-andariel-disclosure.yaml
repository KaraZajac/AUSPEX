notes: |
  Mandiant graduation of Andariel to APT-tier with the
  APT45 designation, published the day of the DOJ Rim Jong
  Hyok unsealing. Documents Andariel's dual mission:
  defense-industrial-base intrusion (warhead, satellite,
  missile-defense penetration, submarine quieting) and
  ransomware-driven revenue self-funding. Same dual-pillar
  doctrinal coupling attested for APT43 (Kimsuky) in the
  March 2023 Mandiant report — at the cluster level
  rather than the centralized FTB level.

  AUDIT (2026-07-04, claude-opus-4.8/max): real article captured +
  hashed (raw_snapshot above; HTTP 200, 278,578 bytes; title verbatim
  "APT45: North Korea's Digital Military Machine"). NOT a phantom.
  Verbatim attribution: "Mandiant assesses with high confidence that
  APT45 is a state-sponsored cyber operator conducting threat activity
  in support of the North Korean regime. We assess with moderate
  confidence that APT45 is attributable specifically to North Korea's
  Reconnaissance General Bureau (RGB)." Public names: "Andariel",
  "Onyx Sleet", "Stonefly", "Silent Chollima" (linked to "Lazarus
  Group"). Ransomware: "cannot confirm this ransomware use by APT45",
  naming only MAUI (via CISA 2022) and SHATTEREDGLASS (via Kaspersky
  2021) for suspected APT45 clusters, "possibly to fund their
  operations or generate revenue for the regime". CORRECTION to the
  pre-audit note above: the "warhead / satellite / missile-defense /
  submarine" tasking and "revenue self-funding" framing are NOT in
  this Mandiant report (0 raw hits for warhead/satellite/submarine) —
  they are DOJ-Rim-indictment content; H0lyGh0st does not appear here.
  Tier reviewed and left secondary (Mandiant vendor-research is split
  ~21 primary / 19 secondary in-corpus; not clearly miscategorized) —
  flagged for orchestrator.
