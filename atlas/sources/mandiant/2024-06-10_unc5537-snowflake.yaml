notes: |
  Mandiant's analysis of the UNC5537 campaign targeting 165+ Snowflake
  customer instances with stolen credentials (AT&T, Ticketmaster,
  Santander, etc.). Foundational vendor attribution for the 2024
  Snowflake-customer breach wave.
  AUDIT (2026-07-04, claude-opus-4.8/max): snapshot captured + hashed
  (548dd3cc…a721e10, 301,145 bytes) during audit of event
  2024-04/att-snowflake-shinyhunters. Verbatim support: "Mandiant
  tracks this cluster of activity as UNC5537, a financially motivated
  threat actor"; "UNC5537 is systematically compromising Snowflake
  customer instances using stolen customer credentials ... and
  attempting to extort many of the victims"; "credentials previously
  stolen via infostealer malware"; "the account did not have
  multi-factor authentication (MFA) enabled"; "Mandiant and Snowflake
  have notified approximately 165 potentially exposed organizations."
  NOTE: the public blog does NOT name AT&T as a victim.
  AUDIT (2026-07-10, claude-opus-4.8/max): hash RE-VERIFIED unchanged
  (548dd3cc…a721e10, 301,145 B) during the audit of the campaign event
  2024-06/snowflake-unc5537. Confirmed against raw: the blog names NO
  victim org at all (AT&T/Ticketmaster/Santander/Advance Auto/Neiman/
  Anheuser/LendingTree all ABSENT) and carries NO record counts — those
  are sibling-source-carried. Full infostealer list verbatim: "VIDAR,
  RISEPRO, REDLINE, RACOON STEALER, LUMMA and METASTEALER". Root-cause
  quote: "UNC5537's campaign against Snowflake customer instances is not
  the result of any particularly novel or sophisticated tool, technique,
  or procedure. This campaign's broad impact is the consequence of the
  growing infostealer marketplace and missed opportunities to further
  secure credentials". Count is "approximately 165 potentially exposed
  organizations" NOTIFIED (not "165 accessed tenants"). tier secondary +
  all fields preserved.
