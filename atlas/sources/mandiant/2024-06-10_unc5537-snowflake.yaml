notes: |
  Mandiant's analysis of the UNC5537 campaign targeting 165+ Snowflake
  customer instances with stolen credentials (AT&T, Ticketmaster,
  Santander, etc.). Foundational vendor attribution for the 2024
  Snowflake-customer breach wave.
  AUDIT (2026-07-04, claude-opus-4.8/max): snapshot captured + hashed
  (548dd3cc…a721e10, 301,145 bytes) during audit of event
  2024-04/att-snowflake-shinyhunters. Verbatim support: "Mandiant
  tracks this cluster of activity as UNC5537, a financially motivated
  threat actor"; "UNC5537 is systematically compromising Snowflake
  customer instances using stolen customer credentials ... and
  attempting to extort many of the victims"; "credentials previously
  stolen via infostealer malware"; "the account did not have
  multi-factor authentication (MFA) enabled"; "Mandiant and Snowflake
  have notified approximately 165 potentially exposed organizations."
  NOTE: the public blog does NOT name AT&T as a victim.
