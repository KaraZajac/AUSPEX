notes: |
  APT41 global DUST campaign in UK, Italy, Spain, Turkey, Taiwan,
  Thailand, Singapore covering shipping/logistics, technology,
  automotive, media. DUSTPAN/DUSTTRAP tooling.
  AUDIT (2026-06-24, claude-opus-4.8/max): does NOT name the MSS or any
  Chinese service. Describes the actor as one "that carries out Chinese
  state-sponsored espionage activity in addition to financially motivated
  activity that may be outside of state control," and as "unique among tracked
  China-based actors." No "Ministry of State Security" / "MSS" string in the
  post. Corroborates the China-state nexus only; the cn/mss placement rests on
  the Sept 2020 DOJ release. content_sha256 over the captured raw snapshot.
  AUDIT (2026-07-04, claude-opus-4-8/max): sha256 re-verified against the on-disk
  snapshot (unchanged, 391507 bytes). Note the summary line above is imprecise:
  the report's SIX confirmed victim countries are Italy, Spain, Taiwan, Thailand,
  Turkey, and the United Kingdom; Singapore was reconnaissance-only ("neither
  Mandiant nor Google TAG have any indicators of these organizations being
  compromised"), and "government" is NOT a victim sector (it appears only in a
  reference-link title to the 2022 USAHerds report). Victim sectors: shipping and
  logistics, media and entertainment, technology, automotive. Report states no
  strategic motive (no "Belt and Road"/"BRI"/"maritime"/"strategic" string).
