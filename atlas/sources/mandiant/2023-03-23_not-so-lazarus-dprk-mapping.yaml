  Mandiant's organizational mapping of DPRK cyber units to the
  Reconnaissance General Bureau (RGB), Ministry of State Security,
  and United Front Department, cautioning that "Lazarus Group" is an
  umbrella term for numerous clusters Mandiant tracks separately.

