  Mandiant's April 2024 promotion of the Sandworm cluster to a
  named APT (APT44). Comprehensive reporting on tooling lineage,
  operational scope, and the GRU Unit 74455 relationship.

  AUDIT (2026-07-04, claude-opus-4-8/max): Captured the first-party
  full report PDF (services.google.com/fh/files/misc/apt44-unearthing-
  sandworm.pdf; sha256 efa07dc1…66166863, 1,639,506 bytes, 40 pp,
  3,374 extracted text lines) and promoted it to raw_snapshot per the
  ANSSI dual-snapshot convention — the PDF carries the full article
  body the JS-rendered Google Cloud blog HTML lacks. The prior HTML
  shell snapshot (sha256 c320f2fa…5afa0647, 248,135 bytes) remains on
  disk and its hash is preserved here. This full-PDF capture SUPERSEDES
  the HTML-shell limitation noted below: the report body DOES carry the
  XakNet / CyberArmyofRussia_Reborn → APT44 linkage. PDF verifies the
  load-bearing claims verbatim: "attributed by multiple governments to
  Unit 74455, the Main Centre for Special Technologies (GTsST) within
  the … GRU" (named-unit); "Mandiant has decided to graduate the group
  into APT44"; "full spectrum of espionage, attack, and influence
  operations"; hacktivist fronts XakNet Team / CyberArmyofRussia_Reborn
  / Solntsepek "created and controlled by APT44"; CARR's claimed US +
  Polish water-utility OT manipulation, with Mandiant noting it "cannot
  independently verify … its links to APT44"; tooling BlackEnergy,
  INDUSTROYER / INDUSTROYER.V2, NotPetya, OlympicDestroyer, CADDYWIPER,
  native MicroSCADA binary. Community wiper names HermeticWiper,
  IsaacWiper, AcidRain, SwiftSlicer do NOT appear in this report (0
  occurrences each — Mandiant uses its own family names). tier: primary
  retained (first-party tier-1 vendor report).

  AUDIT (2026-06-24, claude-opus-4.8/max): Raw HTML captured and
