notes: |
  Romanian CSAT declassified intelligence material attributing
  foreign (Russia-aligned) interference in the November 2024
  presidential election first round (pro-Călin Georgescu TikTok
  amplification, DDoS against state systems). Material was the
  basis for the Romanian Constitutional Court's December 2024
  annulment. AUSPEX treats the perpetrator attribution as a
  hedged nation-level assessment (see AUDIT below), not attested.

  URL verification 2026-05-28: presidency.ro returns Cloudflare
  503 ("Verifying your browser") to unauthenticated curl —
  consistent with the site's anti-bot posture, not a broken URL.
  URL retained as canonical.

  AUDIT (2026-07-05, claude-opus-4.8/max): presidency.ro STILL returns the
  Cloudflare 503 anti-bot challenge (8,904-byte JS "Verifying your browser"
  page) to curl — the load-bearing primary dossier remains un-snapshottable,
  so NO content_sha256 is recorded for it (the challenge page is not the
  article). The event was re-sourced (badrabbit model) onto four reachable,
  snapshotted mirrors that independently carry every claim: rferl 2024-12-04
  ("aggressive hybrid Russian action" + 85k cyberattacks), bleepingcomputer
  2024-12-05 (85k cyberattacks; SRI "does not attribute these attacks to a
  specific threat actor" / "point to a state actor"), aljazeera 2024-12-06
  (Constitutional Court annulment), ec-europa 2024-12-17 (EU DSA proceedings
  vs TikTok, "foreign interference", Russia unnamed). Attribution is HEDGED:
  the government package characterised the interference as Russian at the
  nation level, but the technical service (SRI) withheld specific attribution
  and no named Russian service/unit/operator is evidenced.
