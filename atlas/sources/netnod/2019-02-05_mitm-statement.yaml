notes: |
  Netnod public acknowledgment of a man-in-the-middle attack
  affecting its infrastructure during the December 14 2018 –
  January 2 2019 window. Subsequently attributed by Cisco Talos
  to the Sea Turtle campaign as the first publicly confirmed
  DNS-registry-operator compromise. The targeted goal was
  capture of authentication credentials for services in
  jurisdictions outside Sweden.
