notes: |
  Netnod's public acknowledgment of a man-in-the-middle attack
  affecting its infrastructure "in several short windows during
  the period 14 December 2018 - 2 January 2019." Netnod states it
  "was not the ultimate goal of the attack," that the goal "is
  considered to have been the capture of login details for Internet
  services in countries outside of Sweden," and that forensic work
  concluded "no customers who used the services during this time
  were affected" (zones DNSSEC-signed/-validated). Netnod names NO
  actor, pointing only to FireEye's "Global DNS Hijacking Campaign"
  report for the method; the Sea Turtle attribution comes later from
  Cisco Talos (2019-04-17).
