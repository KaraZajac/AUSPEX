  (raw_snapshot/content_sha256 written). Corrections to this record:
  (1) kind govt-primary -> press-release — Netnod is NOT a government
  body but "a non-profit, independent internet infrastructure
  organization based in Sweden" (Talos 2019-04-17; company reg.
  556534-0014); its statement is a victim-org public/press statement.
  (2) publisher "Swedish DNS root operator" -> "Swedish internet-
  infrastructure operator" — Netnod is an IX + DNS-services operator
  (Talos notes it also managed the i.root-server.net root-server
  zone), but the root zone itself was not compromised (see event QC).
  (3) notes previously said "first publicly confirmed DNS-registry-
  operator compromise" — this MIS-STATES Talos, which wrote "the first
  publicly confirmed case against an organization that manages a root
  server zone." Corrected. The static HTML shows no visible byline
  date; published_on 2019-02-05 is corroborated by Talos ("acknowledged
  the compromise in a public statement on February 5, 2019").
