notes: |
  Primary claim of responsibility (the attacker's own public statement).
  AUDIT (2026-07-11, claude-opus-4.8/max): original pastebin snapshotted via web.archive
  (2013-01-02 id_ capture; 15,257 bytes; sha256 9fcbb343…722333); page byline "By: a guest on
  Aug 15th, 2012" fixes the post date.
  Verbatim (load-bearing) — the "thirty thousand" figure ORIGINATES here as an ATTACKER CLAIM:
  "we penetrated a system of Aramco company by using the hacked systems in several countries and
  then sended a malicious virus to destroy thirty thousand computers networked in this company";
  exact onset — "The destruction operations began on Wednesday, Aug 15, 2012 at 11:08 AM (Local
  time in Saudi Arabia) and will be completed within a few hours"; motive framing (hacktivist
  persona) — an "anti-oppression hacker group" acting against the "Al-Saud corrupt regime … as the
  largest financial source for Al-Saud," citing grievances over Syria, Bahrain, Yemen, Lebanon,
  Egypt; signed "Cutting Sword of Justice." NB: this is the persona's self-report, NOT independent
  confirmation of state sponsorship — it carries the CLAIM and the 30,000 figure, not attribution.
