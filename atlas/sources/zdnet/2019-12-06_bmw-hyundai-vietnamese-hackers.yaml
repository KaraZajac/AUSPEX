notes: |
  ZDNet's report on the BR (Bayerischer Rundfunk) / Tagesschau investigation
  that hackers breached a BMW branch "sometime this spring," installed
  Cobalt Strike as a backdoor, and were monitored by BMW before access was
  cut off "over the last weekend -- end of November." Hyundai also breached
  in the same campaign (fewer details). Activity linked to Ocean Lotus
  (APT32), "a group believed to operate with orders from the Vietnamese
  government," and tied to Vietnam's VinFast automotive ambitions.
  Created 2026-06-30 to re-source event 2019-03/apt32-bmw-hyundai off the
  phantom br-ndr/2019-12-06 record.
  AUDIT (2026-06-30, claude-opus-4.8/max): raw snapshot captured + sha256
  verified. Verbatim: "hackers breached the network of a BMW branch
  sometime this spring. The attackers allegedly installed a penetration
  testing toolkit named Cobalt Strike"; "BMW had supposedly allowed the
  hackers to persist on its network, and followed their every move, cutting
  off their access over the last weekend -- end of November"; "Hacks linked
  to Ocean Lotus (APT32), a group believed to operate with orders from the
  Vietnamese government."
