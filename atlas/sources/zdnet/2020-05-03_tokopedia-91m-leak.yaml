notes: |
  Catalin Cimpanu's ZDNET report on the Tokopedia breach. The
  article attributes the leak to "a hacker" -- it does NOT name
  ShinyHunters (that handle was attached a week later, in the 9
  May 73M-records survey). A 15M-record sample was leaked for
  free ("in the hopes someone could help crack the user
  passwords"); an "Updated on Sunday, May 3" note adds that the
  hacker was then selling "Tokopedia's entire user database on
  the Empire dark web marketplace" and "claims they're in
  possession of 91 million user accounts." ZDNET obtained the
  sample via breach-monitor Under the Breach and "verified the
  authenticity of the leaked data against the official Tokopedia
  website." The PostgreSQL dump held full names, emails, phone
  numbers, hashed passwords, dates of birth, and profile details;
  passwords were "secured with the SHA2-384 hashing algorithm"
  and unsalted. The article carries NO "RaidForums", NO "bcrypt",
  NO "gender", and NO "$5,000" (the $5,000 price is carried by
  the 9 May 73M-records article).
