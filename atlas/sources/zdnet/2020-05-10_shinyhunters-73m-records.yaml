  Survey article on the ShinyHunters May 2020 data-broker wave:
  Tokopedia, Homechef, Chatbooks, Mathway, Wishbone, Promo.com,
  Star Tribune, ProctorU, BHINNEKA (Indonesia), Bhinneka, and
  others — aggregate >73M user records offered for sale on
  newly-launched marketplace EmpireMarket and dark-web forums.
  This is the canonical secondary source for the 2020 ShinyHunters
  data-broker wave.
