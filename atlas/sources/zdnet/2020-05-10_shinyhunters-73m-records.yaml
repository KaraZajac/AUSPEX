notes: |
  Survey article (Catalin Cimpanu) on the ShinyHunters May 2020
  data-broker wave. The article body lists EXACTLY ten companies
  whose databases ShinyHunters claimed and put up for sale on "a
  dark web marketplace" (unnamed in the article): Zoosk (30M),
  Chatbooks (15M), Home Chef (8M), SocialShare (6M), Minted (5M),
  Chronicle of Higher Education (3M), GGuMim (2M), Mindful (2M),
  Bhinneka (1.2M), StarTribune (1M) -- 73.2M records total, ~$18,000,
  each sold separately -- plus context on the prior Tokopedia sale
  (91M for $5,000). It does NOT name Mathway, Wishbone, Promo.com,
  ProctorU, or EmpireMarket (those belong to the broader wave / other
  sources; DoJ 2024 names RaidForums, EmpireMarket, and Exploit).
  Canonical secondary source for the ten-company 73.2M cluster of the
  2020 ShinyHunters wave.
