notes: |
  ZDNet reporting on the 29 March 2019 Toyota Japan breach
  (Tokyo-area sales subsidiaries; up to 3.1M customer records
  accessed) — Toyota's second disclosure in five weeks after the
  late-February 2019 Toyota Australia intrusion. ZDNet connected
  the cluster to OceanLotus / APT32 on tradecraft overlap.
  AUDIT (2026-07-10, claude-opus-4.8/max): raw snapshot captured +
  sha256 verified (live URL 200, archive 200; PRESERVE tier).
  Verbatim load-bearing quotes:
    • "the servers that hackers accessed stored sales information on
      up to 3.1 million customers ... an ongoing investigation to
      find out if hackers exfiltrated any of the data they had
      access to. Customer financial details were not stored on the
      hacked servers"
    • breached entities: "Toyota Tokyo Sales Holdings, Tokyo Tokyo
      Motor, Tokyo Toyopet, Toyota Tokyo Corolla, Nets Toyota Tokyo,
      Lexus Koishikawa Sales, Jamil Shoji (Lexus Nerima), and Toyota
      West Tokyo Corolla"
    • "attributed by some industry experts to APT32 (OceanLotus), a
      Vietnamese cyber-espionage unit ... might have targeted
      Toyota's Australia branch as a way to get into Toyota's more
      secure central network in Japan"
    • "On the same day that Toyota Japan announced its data breach,
      Toyota Vietnam and Toyota Thailand also announced
      cyber-security incidents" (fixes the event's prior "June 2019"
      dating of the VN/TH nodes).
