notes: |
  Nakasone's 14 February 2019 SASC posture statement — the earliest
  ON-THE-RECORD official acknowledgement of the 2018 midterm
  election-defense effort. NAMES the responsible task element and
  frames it doctrinally as persistent engagement. Verbatim (p.4,
  raw PDF sha256 2d40c0e6…): "Last fall we supported US European
  Command (USEUCOM), US Northern Command (USNORTHCOM), the Department
  of Homeland Security (DHS), the Federal Bureau of Investigation
  (FBI), and others to defend the integrity of America's 2018
  mid-term elections. Working together under my command, USCYBERCOM
  and the National Security Agency (NSA) undertook an initiative known
  as the Russia Small Group to protect the elections from foreign
  interference and influence. By enabling our fellow combatant
  commands and other partners, USCYBERCOM assisted the collective
  intelligence and defense effort that demonstrated persistent
  engagement in practice."

  AUDIT (2026-07-10, claude-opus-4.8/max): created during the
  2018-10/ira-disruption event audit as the genuine primary
  acknowledgement source (re-source of the mis-cited
  nakasone/2019_ssci-testimony-ira, which is the Jan-29-2019 SSCI
  Worldwide Threats transcript and does NOT mention the operation —
  see that record). PDF captured cleanly via curl (HTTP 200, 15pp,
  407 KB); sha256 recorded above; text extracted with pdftotext and
  the RSG / "persistent engagement in practice" passage verified
  verbatim on p.4. NB: this statement names the "Russia Small Group"
  and the 2018 election-defense mission and states "persistent
  engagement in practice" by name — but it does NOT name the Internet
  Research Agency, nor describe "taking the IRA offline"/disrupting
  its internet access; that specific operational detail comes only
  from the WaPo (Nakashima) 2019-02-26/27 reporting. It likewise does
  NOT use "Defend Forward", "NSPM-13", or "Section 1642".
