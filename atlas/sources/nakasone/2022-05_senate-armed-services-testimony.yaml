  CONTENT CLARIFICATION for the 2026-06-25 note above: this posture
  statement discloses the Ukraine hunt team at the COMMAND level only —
  "Coordinating with the Ukrainians in an effort to help them harden
  their networks, we deployed a hunt team who sat side-by-side with our
  partners to gain critical insights that have increased homeland
  defense for both the United States and Ukraine." It does NOT itself
  name the CNMF, the Navy/Marine composition, "December 2021", or the
  "70-day journey"; those specifics come from Nakasone's Vanderbilt
  speech (~3-4 May 2022, reported CyberScoop 2022-05-04) and the
  28 Nov 2022 CNMF Public Affairs release
  (nsarchive/2022-11-28_hunt-forward-ukraine-cnmf). The named-unit
  placement therefore rests on those two, not on this posture statement
  alone — recommend the actor record (us/cnmf.yaml) note be refreshed
  accordingly.
