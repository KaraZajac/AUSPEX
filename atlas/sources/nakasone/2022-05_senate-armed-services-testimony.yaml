notes: |
  Nakasone's May 2022 SASC posture testimony in which he confirmed on
  the record the December 2021 CYBERCOM CNMF hunt-forward deployment
  to Ukraine ahead of the Russian invasion. Exact transcript URL
  needs verification.

  AUDIT (2026-06-25, claude-opus-4.8/max): service-placement audit of the
  us/cybercom/cnmf-actor record. cybercom.mil hard-blocks all automated agents
  (curl and WebFetch both return HTTP 403; a 544-byte Forbidden error page was
  served, so NO content snapshot was captured — raw_snapshot intentionally
  omitted) and archive.org is blocked in this environment. The substance is
  independently corroborated by tier-1 reporting of this testimony cycle:
  CYBERCOM's Dec-2021 hunt-forward deployment to Ukraine is attributed
  specifically to the CNMF — "A Cyber National Mission Force hunt-forward team
  traveled to Ukraine in December to help build resilience against cyberattacks"
  — and Nakasone characterized it on the record as "a 70-day journey for us to
  ensure that Ukraine was at a much higher state of cyber readiness," within
  "nine different hunt forward operations in 2021" (CyberScoop/DefenseScoop/
  Nextgov). NAMES the Cyber National Mission Force for a specific disclosed
  operation; supports the named-unit service placement (us/cybercom/cnmf).

  AUDIT (2026-07-10, claude-opus-4.8/max): auditing
