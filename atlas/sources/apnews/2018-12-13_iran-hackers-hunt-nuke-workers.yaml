notes: |
  AP wire investigation, byline "By Associated Press Cybersecurity
  Writer Raphael Satter." AP analysed a list of 77 Gmail/Yahoo
  addresses that Certfa recovered from an exposed Charming Kitten
  server, and it — not CertFA's own report — is the source that
  names the specific targets (US Treasury/FinCEN/OFAC officials,
  nuclear-deal figures, foreign nuclear officials in Pakistan/
  Jordan/Syria, US defense contractors, D.C. think-tank staff,
  Iranian civil-society figures) and the Secureworks corroboration.

  SNAPSHOT (2026-07-10, claude-opus-4.8/max): captured from the WHYY
  (NPR/PBS-affiliate) reprint, which serves the full AP wire text
  (byline + every target specific). The AP original (apnews.com) and
  the Washington Times / Times of Israel / Radio Farda reprints are
  bot-walled to curl and WebFetch (HTTP 403); WHYY returned HTTP 200
  with the complete article. Text corroborated verbatim by the CBS
  News reprint (header "December 13, 2018 / 9:01 AM EST / AP"). The
  WHYY page header shows a Dec-14 post/update time; the AP wire and
  the Certfa report both date to 2018-12-13 (a Thursday — AP: "In a
  report published Thursday, Certfa tied the hackers to the Iranian
  government").

  Created 2026-07-10 to re-source event 2018-12/apt35-treasury-
  nuclear-scientists off a phantom/wrong-source ClearSky citation
  (see clearsky/2018-12_charming-kitten RETIRE note).
