notes: |
  Downstream disposition of the Aug-2023 SDNY Tornado Cash founders
  indictment (event 2023-08/tornado-cash-founders-indictment). The
  conviction announcement issued by US Attorney (SDNY) Jay Clayton and
  mirrored on the co-investigating agency's (IRS-CI) newsroom — reachable
  by direct fetch, unlike the Akamai-walled /usao-sdny/pr/ page.
  AUDIT 2026-07-10 (claude-opus-4.8/max): snapshotted + hash-verified
  (direct curl 200, 100,184 B). Carries verbatim: "United States Attorney
  for the Southern District of New York, Jay Clayton, announced today the
  conviction of Roman Storm ... Tornado Cash ... facilitated more than
  $1 billion"; "Storm, of Auburn, Washington, was convicted of one count
  of conspiracy to operate an unlicensed money transmitting business,
  which carries a maximum sentence of five years in prison"; Lazarus
  Group nexus reaffirmed ("Storm continued to transmit these hacked funds
  even after the public attribution of the hack to the Lazarus Group").
  Date: August 6, 2025. The govt-primary announces conviction on ONLY the
  money-transmitting count of the three charged; the hung-jury / partial
  mistrial on the money-laundering + IEEPA counts and the government's
  Mar-2026 retrial motion are corroborated by contemporaneous trial
  reporting but are NOT stated in this release.
