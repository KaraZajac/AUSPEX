notes: |
  Canonical running aggregate tracker for the Cl0p MOVEit (CVE-2023-34362)
  mass-exploitation, compiled by Emsisoft from state breach notifications,
  SEC filings, other public disclosures and Cl0p's own leak site. The
  post is continuously UPDATED; the snapshotted figures are the tracker's
  own stated as-of date, which is load-bearing for the count-embellishment
  guard (the totals grew for over a year). Supporting quotes (raw snapshot,
  sha f9fc2289...67ef0e60, 128,411 bytes): "The data below is drawn from
  … as well as Cl0p's website, and is current as of June 28th, 2024.
  Organizations: 2,773 Individuals: 95,788,491". Top individual-impact
  victims listed: "Maximus 11.3 million … Louisiana Office of Motor
  Vehicles 6 million … Oregon Department of Transportation 3.5 million".
  Geography: "U.S.-based organizations account for 78.9 percent of known
  victims, Canada-based 13.5 percent, Germany-based 1.3 percent, and
  U.K.-based 0.7 percent." Sectors: "The most heavily impacted sectors are
  education (39.1 percent), health (20.1 percent), and finance and
  professional services (13.3 percent)." Used on 2023-05/moveit-cl0p as
  the dated source for the ~2,773-org / ~95.79M-individual scale (as of
  2024-06-28) and the Oregon (3.5M) / Louisiana (6M) figures. Note: this
  is an aggregator's tally (tier secondary), not a first-party count.
  AUDIT (2026-07-10, claude-opus-4.8/max): curl HTTP 200, snapshot +
  sha256 captured.
