notes: |
  Full text of the Obama administration's October 2012 Presidential
  Policy Directive 20 ("U.S. Cyber Operations Policy"), leaked to The
  Guardian via Edward Snowden. The most detailed open-source
  description of the pre-NSPM-13 offensive-cyber approval framework.
  AUDIT (2026-06-25, claude-opus-4.8/max, re: 2007-01/tao-cumulative-2011-231-ops):
  captured the canonical Guardian permalink (HTTP 200, 20,929 bytes; page <title>
  "Obama tells intelligence chiefs to draw up cyber target list – full document
  text"). CAVEAT on the snapshot: the directive body loads dynamically (the static
  HTML is the page chrome only — 3 <p> blocks, all cookie/autoplay UI), so the
  raw_snapshot proves the permalink's identity/integrity but does NOT contain the
  PPD-20 text itself. PPD-20's substance was verified out-of-band (Wikipedia): it
  defines OCEO/DCEO and directs officials to "identify potential targets of
  national importance" / prepare a target-systems plan — a GENERAL policy framework
  that names NO specific adversary country. This corrects an event claim that the
  big-four (China/Russia/Iran/NK) targets were named "per leaked PPD-20 text" — they
  were not; that naming is WaPo's former-officials sourcing. Signed Oct 2012; leaked
  2013-06-07. Tier primary preserved.
