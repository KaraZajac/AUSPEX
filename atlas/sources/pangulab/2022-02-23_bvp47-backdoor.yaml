notes: |
  Chinese-side technical attribution of the "Bvp47" Linux backdoor to
  NSA Equation Group, leveraging Shadow Brokers leak metadata. The
  highest-profile PRC-sourced US-attribution research to date.
  AUDIT (2026-06-25, claude-opus-4.8/max): explicitly names the NSA and ties Equation Group tools
  to it — supports the us/nsa placement for us/nsa/equation-group. The live URL fails with an
  expired TLS certificate (curl exit 60 / "certificate has expired"); raw_snapshot captured from
  the Wayback copy (archive_url) instead, which served the Chinese-language original. Title:
  "Bvp47-美国NSA方程式组织的顶级后门" = "Bvp47 — Top-tier Backdoor of US NSA Equation Group"
  (美国NSA = US NSA; 方程式组织 = Equation Group), tagged 影子经纪人 (Shadow Brokers) / NSA /
  棱镜门 (Snowden). Body ties the tooling to the NSA via the leak: "2016年，知名黑客组织'影子经纪人'
  （The Shadow Brokers）宣称成功黑进了'方程式组织'，并于2016年和2017年先后公布了大量'方程式组织'的黑客
  工具和数据" ("In 2016 'The Shadow Brokers' claimed to have hacked the 'Equation Group' and in
  2016 and 2017 released large quantities of 'Equation Group' hacking tools and data"), with
  Bvp47's activation private key recovered from those Shadow Brokers files.
