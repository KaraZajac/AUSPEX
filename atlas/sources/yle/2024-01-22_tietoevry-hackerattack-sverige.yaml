notes: |
  Finnish public broadcaster's Swedish-language coverage, 22.1.2024
  16:21. Verbatim: "Hackergruppen Akira ligger bakom attacken mot
  Tietoevry i helgen. Det bekräftar bolaget för Svenska Dagbladet." (The
  Akira hacker group is behind the weekend attack on Tietoevry — the
  company confirms this to Svenska Dagbladet.) Affected companies named:
  "Rusta, Systembolaget och Filmstaden"; Stadium's web pages were down
  Monday afternoon; "På Filmstadens biografer skriver man för tillfället
  ut biljetter för hand" (Filmstaden cinemas writing out tickets by
  hand). On the Russia framing in the headline: experts see "tydliga
  kopplingar till Ryssland", while Truesec's Mattias Wåhlen notes such
  groups "behöver inte nödvändigtvis ha kopplingar till ryska staten"
  (not necessarily state-linked) but often operate out of Russia —
  consistent with the stateless criminal/akira actor placement.
