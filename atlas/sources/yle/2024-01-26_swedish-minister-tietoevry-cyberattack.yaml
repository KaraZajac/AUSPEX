  Yle news brief, 26.1.2024 13:35, relaying SVT's coverage of Swedish
  civil-defence minister Carl-Oskar Bohlin's Friday press conference.
  Verbatim: "Ruotsin viranomaiset epäilevät, että Venäjään kytkeytyvä
  hakkeriryhmä Akira teki kyberhyökkäyksen suomalaista ohjelmistoyhtiö
  Tietoevrya vastaan. Isku vaikutti 120 ruotsalaistahon
  tietojärjestelmiin." (Swedish authorities suspect the Russia-linked
  Akira hacker group carried out the cyberattack on Tietoevry; the strike
  affected the IT systems of 120 Swedish organizations.) Four Swedish
  regions in a state of readiness; Bohlin called the attack serious, said
  repairs began Thursday and recovery may take weeks. Carries the event's
  quantified_impact organizations_affected: 120 figure.
