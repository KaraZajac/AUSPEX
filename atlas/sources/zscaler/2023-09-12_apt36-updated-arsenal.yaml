notes: |
  Zscaler ThreatLabz technical analysis of Transparent Tribe /
  APT36 tooling refresh observed in mid-2023, documenting updated
  variants of Crimson RAT, the deployment of new Linux desktop-
  entry-file delivery chains targeting Indian government desktops
  running BOSS Linux (the Indian-government-mandated Linux
  distribution), and continued use of credential-phishing lures
  themed on Indian Ministry of Defence and Indian Army
  communications. Notable for documenting Linux-implant
  development by the cluster, an under-reported tradecraft
  expansion vector.
