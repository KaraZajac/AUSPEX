notes: |
  Zscaler ThreatLabz original-research disclosure of an updated
  APT36 / Transparent Tribe arsenal (activity discovered July 2023;
  observed May–August 2023). Documents ElizaRAT, a previously
  undocumented .NET Windows backdoor (Control Panel applet, Telegram
  C2, Google Drive delivery); a never-before-documented Linux
  desktop-entry (.desktop) file attack vector; Mythic "Poseidon"
  Linux ELF payloads; and two Python (PyInstaller) Linux espionage
  utilities, GLOBSHELL (file exfiltration) and PYSHELLFOX (Firefox /
  email.gov.in session stealing). Credential phishing impersonated
  the National Informatics Centre (NIC) login portal; a decoy PDF
  impersonated an Indian Ministry of Defence document. Attributes
  the activity to Pakistan with very high confidence.
  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured +
  sha256 (see raw_snapshot / content_sha256); tier secondary→primary
  (first-party vendor original research). CORRECTED the prior notes,
  which had repeated the referencing event's fabricated framing
  ("updated variants of Crimson RAT" and lures "themed on ... Indian
  Army") — neither is in the source: the strings "Crimson" and
  "army" appear ZERO times. Verbatim support:
    - "In July 2023, Zscaler ThreatLabz discovered new malicious
      activity perpetuated by the Pakistan-based advanced persistent
      threat group (APT36)."
    - "We assigned the moniker 'ElizaRAT' to this new Windows-based
      backdoor ... The Telegram API was used for C2 communication."
    - "The utilization of Linux desktop entry files by APT36 as an
      attack vector has never been documented before."
    - "A quick technical analysis determined these Linux payloads as
      Mythic Poseidon binaries."
    - "APT36 is an advanced persistent threat (APT) group which we
      attribute to Pakistan with very high confidence. This group
      has been active since 2013 and primarily targets the Indian
      government, defense, and education sectors."
