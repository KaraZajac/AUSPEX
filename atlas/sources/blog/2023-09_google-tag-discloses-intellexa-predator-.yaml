notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): resolves (HTTP 200) and matches the citation
  (Maddie Stone, TAG, "0-days exploited by commercial surveillance vendor in Egypt",
  Sep 22 2023). Confirms the iOS zero-day chain and per-CVE roles — "CVE-2023-41993:
  Initial remote code execution (RCE) in Safari / CVE-2023-41991: Certificate validation
  issue / CVE-2023-41992: Local privilege escalation (LPE) in the XNU Kernel" — and the
  MITM/HTTP network-injection delivery: "if the target went to any 'http' site, the
  attackers injected traffic to silently redirect them to an Intellexa site, c.betly[.]me
  ... the exploit server, sec-flare[.]com"; Android via MITM + one-time links (CVE-2023-4762).
  VENDOR attribution is explicit and stated as fact: "Developed by the commercial
  surveillance vendor, Intellexa, this exploit chain is used to install its Predator spyware
  surreptitiously onto a device." CUSTOMER-vs-VENDOR finding: this post does NOT name Ahmed
  Eltantawy and does NOT name the Egyptian government as the operator — it only locates the
  campaign "in Egypt" and HYPERLINKS to the Citizen Lab report for the victim/operator detail.
  The Egyptian-government (customer) attribution and the named victim live in the Citizen Lab
  companion report (citizenlab/2023-09-22_predator-in-the-wires-eltantawy), now co-cited.
