notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw snapshot captured from the live URL and hashed.
  Source fully supports the event facts: the CVE-2022-41128 IE/JScript (jscript9.dll) 0-day, the
  Itaewon-lure docx "221031 Seoul Yongsan Itaewon accident response situation (06:00).docx", the
  RTF-remote-template -> IE-rendered-HTML exploit chain, and the ROKRAT/BLUELIGHT/DOLPHIN implants.
  ATTRIBUTION: names APT37 and North Korea but NOT the MSS or any specific DPRK service — verbatim:
  "We attribute this activity to a group of North Korean government-backed actors known as APT37."
  (title: "Internet Explorer 0-day exploited by North Korean actor APT37"). The terms MSS / Ministry
  of State Security / RGB / Reconnaissance General do not appear anywhere in the article. Confidence
  is high (unhedged attribution). Supports named-actor (APT37 + DPRK), not named-unit (no MSS).
