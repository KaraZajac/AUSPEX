notes: |
  Constella Intelligence breach-monitoring vendor blog (author Jason
  Wagner, published 2024-10-16) — a listicle-style aggregation of
  "recent Israeli breaches." SOLE carrier of the Feb-Jun 2024 Handala
  healthcare-extortion claim relied on by
  2024-04/handala-israeli-healthcare-extortion; verbatim: "Healthcare
  Sector (February - June 2024): Handala targeted hospitals and
  healthcare organizations, demanding 8 BTC (~$569,252 USD) in ransom.
  This campaign involved the theft of patient records and financial
  data, crippling healthcare operations."
  AUDIT (2026-07-11, claude-opus-4.8/max): snapshotted + hashed. Low-
  tier aggregator: names no victim and no specific incident, and the
  healthcare-extortion / 8-BTC claim is uncorroborated by (and
  contradicted-by-omission from) every detailed Handala timeline —
  Picus (DRS RADA 3 Mar 2024; Ma'agan Michael Kibbutz 15 Jun 2024;
  zero bitcoin references), Cyberint, SOCRadar, and Haberfeld & Weimann.
  Treat as a single-source basis; see the citing event's qc block.
