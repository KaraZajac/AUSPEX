notes: |
  Fourth Circuit published opinion (Niemeyer, J.; Rushing and
  Heytens, JJ., joining) vacating Conor Fitzpatrick's sentence as
  substantively unreasonable and remanding for resentencing.
  Created 2026-07-10 (claude-opus-4.8/max) to source the post-plea
  sentencing-arc claims of event 2023-03/breachforums-pompompurin-
  arrest that the Krebs (Mar 2023) + DOJ-plea (Jul 2023) sources
  cannot temporally carry. Raw snapshot (fetched live from
  ca4.uscourts.gov, browser UA, HTTP 200; pdftotext-verified), sha256
  356062c9…d0fcb5, 153,982 B / 14 pp. Verbatim support: "From the
  district court's judgment dated January 19, 2024, the government
  filed this appeal"; the district court imposed "a sentence of time
  served [17 days], followed by a period of 20 years of supervised
  release"; "the government contends that the district court abused
  its discretion by imposing a substantively unreasonable sentence.
  We agree. Accordingly, we vacate the sentence and remand for
  resentencing." Provenance: EDVA (Alexandria), Judge Leonie M.
  Brinkema, docket 1:23-cr-00119-LMB-1; Argued Oct 29 2024, Decided
  Jan 21 2025; advisory Guidelines range 188–235 months; downward
  variance grounded in Fitzpatrick's autism-spectrum diagnosis and
  youth (21 at sentencing). Also confirms the plea count ("Conor
  Fitzpatrick pleaded guilty to conspiracy to traffic in stolen
  personally identifying information with intent to defraud") and the
  RaidForums-successor framing ("He created the site after law
  enforcement had shut down a similar site called 'RaidForums'").
