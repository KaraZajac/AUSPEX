notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Full article captured (HTTP 200, 115,526 bytes) and read.
  This is a POLICY PRIMER on the *content* of ROK's 2024 National Cybersecurity Strategy, not a report
  of any cyber operation. It attributes the strategy to "The Republic of Korea (ROK)" / "the Yoon Suk
  Yeol administration" and never uses the phrase "National Security Office" or "Office of the President".
  It describes NO offensive operation by any ROK service; the "offensive" theme is a declared strategy
  posture. The only ROK service named conducting cyber activity is the NIS, and only defensively.
  Used to demote actor kr/nso/... -> kr/unscoped/republic-of-korea-national-security-office and to flag
  that record as a likely mis-modeled policy/publishing body rather than a threat actor.

  Verbatim quotes:
  - "The Republic of Korea (ROK)'s National Cybersecurity Strategy released in February 2024 is an
    effort to transition from a defensive posture, as outlined in the previous 2019 National
    Cybersecurity Strategy, to an offensive posture."
  - "The document states that 'reinforcing our defense capabilities has its limits. Therefore, we must
    change our paradigm to respond offensively to North Korea and other threats, and thus upgrade the
    level of our cybersecurity.'"
  - "ROK's National Intelligence Service (NIS) put out a press release shortly after the attempted
    attacks naming North Korea as the perpetrator but gave limited information on what the government
    considered to be a proportional response."

  AUDIT (2026-06-25, claude-opus-4.8/max): Re-verified vs the same raw snapshot (sha256 unchanged,
