  The CSIS primer is bylined "Blog Post by Natasha Wood / Published August 2, 2024" (visible header)
  and its embedded metadata reads "date_published":"Aug 2, 2024","month_published":"August",
  "year_published":"2024". The event's start_date/attribution_date (2024-02-01) correctly track the
  strategy release and are unchanged; only the source's own publication date is corrected here.
