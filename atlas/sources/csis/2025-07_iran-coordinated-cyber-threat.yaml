notes: |
  CSIS Strategic Technologies Blog analysis of Iran's coordinated cyber
  threat: IRGC APTs (APT33, APT35) + MOIS APTs (APT34/OilRig, MuddyWater)
  combined with an expanding hacktivist ecosystem. On the June 2025
  twelve-day war it reports analysis of "over 250,000 Telegram messages
  from more than 178 hacktivist and proxy groups", names Fatimion Cyber
  Team / Cyber Fattah / Cyber Islamic Resistance as the coordinated
  Iranian-backed hacktivists (Handala and Laneh Dark = "yet to be
  officially affiliated"), and assesses the campaigns "a coordinated
  influence operation with institutional backing rather than opportunistic
  volunteers." Snapshot added 2026-07-11 (claude-opus-4.8/max).
  NB the article states NO "700% spike" (the citing event's fabricated
  figure); its only "Trellix" occurrences are citation hyperlinks.
