notes: |
  Kaseya's own July 5 2021 statement — the authoritative PRIMARY for the
  victim counts and the attack timeline (added by the 2026-07-10 audit of
  event 2021-07/kaseya-vsa to carry counts the CISA alert and DOJ
  indictment do not).
  AUDIT (2026-07-10, claude-opus-4.8/max): raw curl-verified HTTP 200
  (90,352 B). Verbatim carried:
  - Timeline: "On July 2, at approximately 2 p.m. EST, Kaseya was alerted
    to a potential attack... Within an hour... Kaseya immediately shut
    down access to the software."
  - MSP/customer count (NOTE the vendor's own, lower, figure): "The attack
    had limited impact, with only approximately 50 of the more than 35,000
    Kaseya customers being breached."
  - Downstream businesses (RANGE, not a firm ceiling): "Of the
    approximately 800,000 to 1,000,000 local and small businesses that are
    managed by Kaseya's customers, only about 800 to 1,500 have been
    compromised."
  - FBI + CISA engagement confirmed.
  This is a self-interested vendor statement (downplaying framing); the
  counts are the low end and are cross-checked against CISA/press (~60
  MSPs) and enwikipedia in the event QC.
