notes: |
  Consortium investigation coordinated by Forbidden Stories with
  Amnesty International's Security Lab providing forensic support.
  Reporting partners included Le Monde, the Guardian, Washington
  Post, Süddeutsche Zeitung, Die Zeit, OCCRP, and others.
  Documented Pegasus deployments by NSO customer states.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshotted + hashed. This is
  the "About the Pegasus Project" narrative page; it CARRIES the corpus-
  level claims (verbatim): "more than 50,000 phone numbers selected for
  surveillance by the customers of the israeli company NSO Group";
  "records of phone numbers selected by NSO clients in more than 50
  countries since 2016"; the forensic subset "confirm an infection or
  attempted infection … in 85% of cases, or 37 in total"; consortium
  scale "more than 80 reporters from 17 media organizations in 10
  countries"; and UAE named as an NSO customer — NSO "decided to sell its
  product to authoritarian regimes such as Azerbaijan, the United Arab
  Emirates and Saudi Arabia." It does NOT carry any "most prolific/largest
  UAE operator" ranking (0× "most prolific"/"largest"; the one enumerated
  high-volume operator is Morocco, "more than 10,000 phone numbers"), nor
  the Latifa/Haya/Khashoggi victim-specifics (0× each) — hence the prior
  "largest customer-state operators" note wording was an over-read and the
  referencing event was corrected to "named among NSO customer states."
  Also records NSO's rebuttal ("wrong assumptions", "uncorroborated
  theories"; HLR-lookup data "have no bearing on the list of the
  customers targets").
