  ---- original note (retained for provenance) ----
  Pegasus Project consortium reporting (Le Monde and partner
  outlets, 20-21 July 2021) identifying Emmanuel Macron's
  personal phone number, the personal numbers of approximately
  15 members of the French government, and the number of a French
  ambassador on the leaked list of approximately 50,000 numbers
  attributed to NSO Group's Pegasus customer states. The Macron
  number was associated with selection by the Moroccan customer
  state per consortium reporting; Morocco denied involvement.
  Forensic confirmation of compromise of Macron's specific
  device was not established in the Pegasus Project corpus
  (the leaked numbers being selection candidates, not
  confirmed infections). The case is recorded as France as a
  *target* of an external Pegasus customer-state operator. URL
  verified by curl 2026-05-28.
