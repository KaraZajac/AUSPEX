notes: |
  Contemporaneous tech-news write-up (dated October 24, 2014). Carries
  the quantitative and confirmation facts the primary press summarized:
  "the Warsaw Stock Exchange website was hacked on Thursday 23rd Oct.
  The Website was officially unavailable for the brokers and investors
  between 2 pm and 4 pm Warsaw time." The poster JAN_URBANOWICZ "claims
  to have some 30,000 login and password records of the Warsaw investors
  and brokers"; "The hackers have stolen approximately 30 MB of investor
  details as well as the IP addresses of servers and network
  infrastructure maps [of] WSE." Notes Polish security site
  niebezpiecznik.pl reported the exchange confirmed the hack by email,
  and quotes the GPW notice that "unauthorized entities" may have
  accessed archived data used for its trade-simulation features. Lower-
  tier aggregator, used only for the record-count / stolen-data /
  GPW-confirmation detail that mirrors higher-tier reporting.
