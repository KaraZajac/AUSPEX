notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Captured the 27-page STRIKE PDF and read it in full to
  verify the service placement of the actor cn/mss/lapdogs-orb-operator. The report names NO specific
  Chinese intelligence service (no MSS, MPS, PLA/SSF, or named unit) anywhere; attribution is uniformly
  "suspected China-Nexus" at the nation-nexus level. Demoted that actor to cn/unscoped/lapdogs-orb-operator
  on this basis.

  Verbatim, the dedicated Attribution section (p.23) bottom-lines: "We therefore assess with moderate
  confidence that LapDogs is an Operational Relay Box Network that China-Nexus threat actors use. Based
  on Cisco Talos' previous assessment regarding UAT-5918, we also assess UAT-5918 used the LapDogs ORB
  Network at least once in its operations in Taiwan. We cannot yet confirm whether UAT-5918 is the
  operator or just a client of the network. We also cannot yet confirm whether other threat actors have
  or will have access to leverage LapDogs as well." The same section opens: "As with other ORB Networks,
  it can be difficult to determine the exact threat actor operating the network, as ORB Networks can
  be — and historically have been — shared by more than one threat actor for separate campaigns and
  intrusion sets."

  Executive Summary (p.2): "SecurityScorecard's STRIKE research team has identified a new suspected
  China-Nexus network of Operational Relay Boxes (ORB) called 'LapDogs'..."; "Forensic evidence,
  including Mandarin developer notes within the startup script, tools, techniques, and procedures
  (TTPs), and victimology supports attribution to China-Nexus Advanced Persistent Threats (APTs) and
  similar ORBs." Conclusion (p.24): "LapDogs is a gradually growing Operational Relay Box (ORB) Network,
  which we assess China-Nexus threat actors are using to conduct a targeted operation around the globe."
  The only named threat actor in the report, Cisco Talos' UAT-5918, is itself only "a China-Nexus
  espionage threat actor" (p.23) and is assessed as a possible client rather than the confirmed
  operator. Conclusion = nation nexus (cn) supported at moderate confidence; service placement (mss)
  unsupported by this source.
