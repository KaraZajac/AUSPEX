  DragonForce–Scattered Spider affiliate relationship and the key
  attribution hedge for the UK retail wave.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed.
  Verbatim (load-bearing hedge): Google Threat Intelligence Group
  researchers "have not independently confirmed the involvement of
  Scattered Spider or the DragonForce ransomware group in those hacks."
  DragonForce claim: individuals claiming DragonForce membership
  "contacted several media outlets, including the BBC and Bloomberg,
  with evidence that they had infiltrated the three UK retailers' IT
  networks and stolen large amounts of customer and employee data" and
  told the BBC "the Co-op breach was more extensive than Co-op had
  previously admitted." Affiliate model: "one or several members of the
  Scattered Spider group worked as DragonForce affiliates in the UK
  retail hack wave" (DragonForce = RaaS cartel; claimed RansomHub
  toolset takeover).
