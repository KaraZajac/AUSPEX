notes: |
  Tertiary reference corroborator for event 2017-05/comcyber-stand-up.
  Snapshot-carries the exact stand-up date (the primary Légifrance
  arrêté being bot-walled and un-archived) plus the command-succession
  and personnel-figure context.

  AUDIT (2026-07-11, claude-opus-4.8 / max): live article captured
  (HTTP 200, 129,978 B, sha256 bc35136d…12d55b5c). Infobox verbatim:
  "Commandement de la cyberdéfense … Création Par décret le 4 mai 2017
  … Sous l'autorité directe du Chef d'État-Major des Armées … Type
  Commandement opérationnel interarmées". Command succession verbatim:
  "Vice-amiral Arnaud Coustilliere (2011 - 2017), OG CYBER de la
  structure pré-figuratrice" then "Général de corps d'armée Olivier
  Bonnet de Pailleret ( septembre 2017 - août 2019 )" — i.e. Bonnet de
  Paillerets took command in September 2017, four months AFTER the
  4 May 2017 stand-up, so he is NOT the founding commander. Personnel
  context verbatim: "Sur la période de la loi de programmation militaire
  2014-2019, les effectifs du cyber ont doublé (atteignant 3 200
  personnes au total)" — confirming 3,200 is an LPM-period cumulative
  total, not a 2017 stand-up-day figure.
