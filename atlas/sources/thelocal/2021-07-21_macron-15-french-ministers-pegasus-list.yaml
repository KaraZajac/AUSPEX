notes: |
  The Local France (article:published_time 2021-07-21T12:31:20+02:00).
  BADRABBIT RE-SOURCE (2026-07-11, claude-opus-4.8/max): added as the
  clean carrier of the French-government scope (Macron + ~15 government
  members incl. former PM Philippe) and a second, independent Morocco
  denial. Carries verbatim:
    • "President Emmanuel Macron and 15 other members of the French
      government including former Prime Minister Edouard Philippe were
      among the targets of malware sold to authoritarian governments by
      an Israeli surveillance firm, according to reports." (anchors the
      event's "approximately 15 members of the French government" claim)
    • "The client seeking to target Macron was an unidentified Moroccan
      security service, Le Monde reported." (operator = an UNIDENTIFIED
      Moroccan security service — nation-level, no named unit)
    • MOROCCO DENIAL (second, distinct quote): "Morocco said it 'never
      acquired computer software to infiltrate communication devices'."
    • Hedge: "the mobile phone numbers for Macron and other government
      members were identified among 50,000 allegedly selected by NSO
      Group clients for potential surveillance using the Pegasus
      spyware." (selection list, not confirmed infection)
  Does NOT carry any "French ambassador" specific — consistent with the
  strip of that over-specification from the event (Washington Post's
  broader "numerous French diplomats" framing was un-snapshottable:
  washingtonpost.com bot-walled HTTP 000 at audit time).
