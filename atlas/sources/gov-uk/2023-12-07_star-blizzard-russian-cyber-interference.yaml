notes: |
  UK-side primary for the joint US+UK 7 Dec 2023 Star Blizzard
  counter-action. Added 2026-07-10 (claude-opus-4.8/max) to carry the
  UK FCDO sanctions + the "2019 UK-US trade-document leak" + the
  info-confrontation strategic-purpose statement (all asserted in the
  event but previously uncited on the UK side).
  RAW facts (verbatim): "Centre 18, a unit within Russia's Intelligence
  Services, the FSB, has been identified as being accountable for a
  range of cyber espionage operations targeting the UK"; Star Blizzard
  "a group that the UK's National Cyber Security Centre (NCSC) ...
  assesses is almost certainly subordinate to FSB Centre 18 ... is
  operated by FSB officers"; "the Foreign, Commonwealth and Development
  Office has sanctioned individuals involved in the group's activity
  and summoned the Russian Ambassador"; "These sanctions have been
  delivered jointly with the US ... The US Department of Justice have
  concurrently unsealed indictments". Operations attributed to the FSB
  via Star Blizzard: "targeting ... of parliamentarians from multiple
  political parties, from at least 2015 through to this year"; "the
  hack of UK-US trade documents that were leaked ahead of the 2019
  General Election – previously attributed to the Russian state via
  Written Ministerial Statement in 2020"; "the 2018 hack of the
  Institute for Statecraft ... and ... its founder Christopher
  Donnelly"; "targeting of universities, journalists, public sector,
  non-g[overnmental organisations]". DOCTRINE-BEARING quote: "The group
  has also selectively leaked and amplified the release of information
  in line with Russian confrontation goals, including to undermine
  trust in politics in the UK and likeminded states." (Peretyatko /
  Korinets are named in the companion Financial Sanctions Notice PDF,
  not this news release; both are named in the cited DOJ + Treasury
  primaries.) Snapshot clean from live gov.uk (86,160 B).
