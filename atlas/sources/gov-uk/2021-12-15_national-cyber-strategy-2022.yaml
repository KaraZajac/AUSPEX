notes: |
  Foundational current UK cyber doctrine document. Published
  15 December 2021 with the "2022" framing. Five-pillar structure
  (ecosystem, resilience, technology, global leadership, detect-
  disrupt-deter). Cabinet Office lead with FCDO and NCSC input.

  AUDIT (2026-07-02, claude-opus-4.8 / max): snapshotted for event
  2023-04/ncf-responsible-cyber-power (attesting source for the
  uk/ncs-2022 Pillar-5 doctrine link). raw_snapshot above = the gov.uk
  landing page (sha256 4c2983f6…01f74215, 107,590 B). The load-bearing
  Pillar-5 wording lives in the FULL-TEXT document, captured at
  raw/gov-uk__2021-12-15_national-cyber-strategy-2022-fulltext.html
  (sha256 d61acbd1…3adf05ab, 610,677 B), which states verbatim
  "Pillar 5: Detecting, disrupting and deterring our adversaries to
  enhance UK security in and through cyberspace" and names the National
  Cyber Force as "a significant step-up in our offensive cyber
  capability" — confirming the pillar name/goal. NB: the doctrine file
  uk/ncs-2022 records issued_on 2022-12-15, but the correct publication
  date is 2021-12-15 (this record + the raw doc).
