notes: |
  FCDO lead press notice (issued from FCDO, NCSC, Cabinet Office and
  Home Office; Lord Cameron / James Cleverly / Oliver Dowden), 25 March
  2024, "Last updated 2 April 2024". The reachable govt-primary
  companion to the tombstoned NCSC news article
  (ncsc-uk/2024-03-25_apt31-electoral-commission, whose url now 404s and
  whose only archive is on web.archive.org, blocked for the fetcher);
  this release carries the identical NCSC attribution verbatim.

  AUDIT (2026-07-04, claude-opus-4.8 / max): created + snapshotted for
  event 2024-03/ncsc-fcdo-apt31-electoral-commission. sha256
  6a9fd3d6…f3fbea76, 97,995 B. Load-bearing verbatim text:
  - (Electoral Commission strand — NATION level, APT31 NOT named)
    "the National Cyber Security Centre (NCSC) ... assesses that the UK
    Electoral Commission systems were highly likely compromised by a
    Chinese state-affiliated entity between 2021 and 2022."
  - (Parliamentary strand — NAMED-ACTOR level) "NCSC assesses it is
    almost certain that the China state-affiliated Advanced Persistent
    Threat Group 31 (APT31) conducted reconnaissance activity against UK
    parliamentarians during a separate campaign in 2021. The majority of
    those targeted were prominent in calling out the malign activity of
    China. No parliamentary accounts were successfully compromised."
  - (Sanctions / NAMED-UNIT MSS) "Wuhan Xiaoruizhi Science and
    Technology Company Limited, which is associated with APT31, operating
    on behalf of the Chinese Ministry of State Security (MSS) as part of
    China's state-sponsored apparatus"; individuals "Zhao Guangzong" and
    "Ni Gaobin" each "a member of APT31, operating on behalf of the
    Chinese Ministry of State Security (MSS)".
  - (Strategic purpose / detect-disrupt-deter) "This sends a clear
    message that we will not tolerate malicious cyber activity against
    democratic institutions and parliamentarians." FCDO "summoned the
    Chinese Ambassador" and "sanctioned a front company and 2
    individuals who are members of APT31".
  - (Allied coordination) "Concurrently, the United States is designating
    the same persons and entity for malicious cyber activity. We greatly
    value our close coordination and cooperation with the US"; "The
    United Kingdom, supported by allies globally ... Partners across the
    Indo-Pacific and Europe also express solidarity".
  Absences that matter: this release does NOT quantify the breach (no
  voter count, no "electoral register" scope — those live in the
  Electoral Commission's own 2023-08-08 notice + the ICO's 2024-05
  reprimand) and does NOT use the terms "IPAC" or "Five Eyes".

