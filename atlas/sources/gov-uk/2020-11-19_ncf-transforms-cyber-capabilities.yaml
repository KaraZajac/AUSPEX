notes: |
  Official gov.uk news release accompanying the PM's 19 November 2020
  Commons avowal of the National Cyber Force. Created + snapshotted
  2026-07-10 (claude-opus-4.8 / max) as the genuine establishment-fact
  primary during the audit of 2020-11/ncf-public-establishment (it
  replaces reliance on the previously url:null PM-statement stub for the
  agency composition and the "responsible cyber power" framing).

  Load-bearing verbatim (sha256 a0ad79c9…b1e82a75, 82,781 B):
    - Avowal of a pre-existing capability: "In a speech on defence
      spending, the PM avowed the GCHQ and Ministry of Defence (MOD)
      partnership which is conducting cyber operations to disrupt hostile
      state activities, terrorists and criminals threatening the UK's
      national security".
    - Four-agency composition: "The NCF draws together personnel from
      intelligence, cyber and security agency GCHQ, the MOD, the Secret
      Intelligence Service (MI6) and the Defence Science and Technology
      Laboratory (DSTL) under one unified command for the first time."
    - Offensive lineage: "The NCF builds on the success of the current
      National Offensive Cyber Programme, including collaboration between
      GCHQ and Strategic Command".
    - Doctrine terminal-goal phrase: "the NCF plays a vital role in
      enhancing the UK's world-leading and responsible cyber power."
    - Date: "Published 19 November 2020".
