notes: |
  UK Foreign Office statement by Minister of State Lord Ahmad
  attributing the May 2017 WannaCry global ransomware worm to
  the DPRK. Released the same day as the US White House Bossert
  attribution and the (now-dead) NCSC press release; canonical
  live UK primary source for the joint Five Eyes WannaCry
  attribution.
  AUDIT (2026-07-11, claude-opus-4.8/max, for event 2017-05/wannacry):
  captured live (HTTP 200, 73,035 B) as raw_snapshot above. Verbatim load-bearing
  text: "The Foreign Office Minister Lord Ahmad of Wimbledon has attributed the
  WannaCry ransomware incident to North Korean actors the Lazarus Group"; "The UK's
  National Cyber Security Centre assesses it is highly likely that North Korean actors
  known as the Lazarus Group were behind the WannaCry ransomware campaign"; "The
  WannaCry ransomware incident impacted 300,000 computers in 150 countries including
  48 NHS trusts"; and — the doctrine-relevant line — "The indiscriminate use of the
  WannaCry ransomware demonstrates North Korean actors using their cyber programme to
  circumvent sanctions." This is the live snapshot proxy for the dead NCSC release.
