notes: |
  Boris Johnson's 19 November 2020 statement to the House of Commons
  on the Integrated Review and defence spending — the Commons text in
  which the NCF was avowed. This is an ESTABLISHMENT / avowal document;
  it does NOT name the NCF as the operator of any specific cyber
  operation.

  AUDIT (2026-07-10, claude-opus-4.8 / max): URL RE-SOURCED. The prior
  stub carried url: null with a note that the canonical gov.uk URL was
  "never verified" and treated the source as UNFETCHABLE. That was a
  PHANTOM stub: the page is live at gov.uk/government/speeches/
  pm-statement-to-the-house-on-the-integrated-review-19-november-2020
  (HTTP 200, 87,433 B). url set + snapshotted this audit
  (sha256 f4c991b0…1261f0fa). Load-bearing verbatim confirmed:
  "I can announce that we have established a National Cyber Force,
  combining our intelligence agencies and service personnel, which is
  already operating in cyberspace against terrorism, organised crime and
  hostile state activity." Defence-spending line verbatim: "I am
  increasing defence spending by £24.1 billion over the next four years"
  / "That's £16.5 billion more than our manifesto commitment". NB: the
  page's only "Cold War" reference is to the security environment ("more
  perilous and intensely competitive than at any time since the Cold
  War"), NOT to the defence-spending settlement — so a "largest defence
  uplift in 30 years" framing is NOT carried by this text.
