notes: |
  Nakashima reporting on CYBERCOM's Cyber National Mission Force (CNMF)
  election-protection operations around the November 2022 US midterms —
  continuity of the 2018 IRA-disruption / 2020 IRGC-targeting pattern.
  Subhead: "U.S. conducted offensive cyber operations to counter
  state-sponsored cyberattacks, including new 'Hunt Forward' missions."

