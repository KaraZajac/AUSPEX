notes: |
  WaPo reporting on the June 2019 US cyber strikes against IRGC
  intelligence and missile-control systems in retaliation for the
  RQ-4 Global Hawk shootdown. WaPo bot-blocks unauthenticated
  curl as of 2026-05; Wayback archive_url added.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot captured from the
  Wayback archive_url (live WaPo returns HTTP 000 to curl). The captured
  copy is the ORIGINAL 2019-06-22 version headlined "Trump approved
  cyber-strikes against Iran's missile systems"; verbatim lede: "President
  Trump approved an offensive cyberstrike that disabled Iranian computer
  systems used to control rocket and missile launches, even as he backed
  away from a conventional military attack in response to its downing
  Thursday of an unmanned U.S. surveillance drone." Attributes the op to
  "personnel with U.S. Cyber Command" and "The strike against the Islamic
  Revolutionary Guard Corps was coordinated with U.S. Central Command."
  Explicitly credits Yahoo News as first to report, and records that "The
  White House declined to comment, as did officials at U.S. Cyber Command"
  (Pentagon spokeswoman Elissa Smith: "we do not discuss cyberspace
  operations, intelligence or planning") — i.e. NOT officially confirmed.
  WaPo later updated the live headline to "...against Iranian computer
  database used to plan attacks on oil tankers"; the archived snapshot
  preserves the original missile-systems framing.
