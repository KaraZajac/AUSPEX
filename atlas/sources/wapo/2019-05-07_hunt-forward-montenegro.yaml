notes: |
  Ellen Nakashima / The Washington Post. The definitive public
  articulation of CYBERCOM's "hunt forward" campaign: teams "hunting
  inside other countries' networks for threats and to gain insights to
  thwart foreign interference in the 2020 campaign," described as part
  of "the command's new strategy of 'persistent engagement.'" Names the
  2018 campaign's code word "Synthetic Theology."

  AUDIT (2026-07-10, claude-opus-4.8/max) — TWO defects corrected:
  (1) TITLE was wrong. The prior title ("U.S. Cybercom contemplates
  information warfare to counter Russian interference in 2020 election")
  is a DIFFERENT, later Nakashima article; the real 2019-05-07 piece is
  "At nations' request, U.S. Cyber Command probes foreign networks to
  hunt election security threats" (byline confirmed "By Ellen Nakashima
  ... May 7, 2019 at 10:00 PM EDT"). Corrected.
  (2) URL was null / "permalink not recoverable." The permalink IS
  recoverable — story id 376a16c8-70f6-11e9-8be0-ca575670e91c, dated
  2019/05/07 — and a live Wayback capture (20200804092343, HTTP 200)
  exists. url + archive_url populated; snapshotted FROM WAYBACK (curl
  200, 250,435 bytes, 1,192-word article body — not a paywall stub);
  content_sha256 recorded. washingtonpost.com still hard bot-blocks
  direct curl (HTTP/2 stream reset), but the Wayback copy carries the
  load-bearing "persistent engagement" doctrine framing verbatim.
  NB: the captured Wayback body does not itself spell out "Montenegro"
  in the visible text (the country-naming paragraph is not in the
  captured span); Montenegro-by-name is carried by the two snapshotted
  CyberScoop reports (cyberscoop/2019-03-14_hunt-forward-montenegro-midterms,
  cyberscoop/2019-11-01_hunt-forward-montenegro-2020). This record's role
  is the disclosure + doctrine-framing anchor.
