notes: |
  Washington Post reporting citing US IC sources attributing the
  24 May 2017 Qatar News Agency (QNA) compromise and false-quote
  injection — which triggered the GCC blockade of Qatar — to the
  United Arab Emirates. Foundational source for AUSPEX's UAE
  regional-influence-realigned doctrine entry's Qatar pillar.
  WaPo paywall blocks curl verification; URL is the canonical
  WaPo investigative URL widely cited in academic literature.

  AUDIT (2026-06-25, claude-opus-4.8/max): UNFETCHABLE for raw
  capture — curl HTTP 000 (connection refused at WaPo edge),
  WebFetch HTTP 403, archive.org blocked by protocol; no
  raw_snapshot/content_sha256 captured. Corrected the QNA-compromise
  date 27 May → 24 May (the fabricated story posted ~00:13 on 24 May
  2017; Qatar's GCO confirmed the hack that day). The article's text
  was verified verbatim against four independent renderings (Al
  Jazeera, Daily Sabah, US News/Reuters, Middle East Monitor, all
  17 Jul 2017). Supporting quotes from the WaPo article:
  "The United Arab Emirates orchestrated the hacking of Qatari
  government news and social media sites in order to post incendiary
  false quotes attributed to Qatar's emir ... according to U.S.
  intelligence officials"; "senior members of the UAE government
  discussed the plan and its implementation" on 23 May; "it remains
  unclear whether the UAE carried out the hacks itself or contracted
  to have them done." UAE denied on the record.
