notes: |
  First publication of the MUSCULAR programme — joint NSA / GCHQ
  collection at the Google and Yahoo private inter-data-center
  fibre links overseas, outside the FISA / RIPA regimes. Snowden
  archive Top-Secret slide "Google Cloud Exploitation" with the
  smiley-face annotation where SSL is added and removed is the
  iconic Snowden image of UKUSA partner collection at scale.
