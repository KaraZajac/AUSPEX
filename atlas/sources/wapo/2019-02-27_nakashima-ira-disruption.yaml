notes: |
  Nakashima's canonical reporting on the CYBERCOM CNMF Internet
  Research Agency disruption operation during the 2018 US midterm
  election. The first concrete public example of "defend forward"
  applied against an influence operation. WaPo bot-blocks
  unauthenticated curl as of 2026-05; Wayback archive_url added.

  AUDIT (2026-06-25, claude-opus-4.8/max): service-placement audit of the
  us/cybercom/cnmf-actor record. washingtonpost.com bot-blocks unauthenticated
  curl (connection failed, HTTP 000) and the Wayback archive_url is unreachable
  from this environment (archive.org blocked), so NO content snapshot was
  captured — raw_snapshot intentionally omitted. The substance was verified
  against Lawfare's contemporaneous analysis quoting the WaPo reporting, which
  confirms the operation is attributed to U.S. Cyber Command ("U.S. Cyber Command
  undertook an offensive cyber campaign to protect the 2018 midterm elections";
  "Cyber Command shut down internet access at the Internet Research Agency").
  PLACEMENT CAVEAT: this source attributes the op to "U.S. Cyber Command" at the
  COMMAND level and does NOT name the "Cyber National Mission Force," "National
  Mission Team(s)," or a "Russia Small Group" (confirmed: those terms do not
  appear in the WaPo piece per the Lawfare quoting). The finer CNMF/RSG
  sub-element attribution for this 2018 op rests on later reporting; the actor
  record correctly carries "Russia Small Group" only as an OVERLAPPING (not
  equivalent) alias. This source therefore corroborates the CYBERCOM placement
  but not, by itself, the cnmf sub-unit level for this particular event.
