  Nakashima reporting first attributing the September-October 2020
  TrickBot disruption to U.S. Cyber Command acting alongside Microsoft's
  parallel court-ordered civil action — election-protection rationale.

  SNAPSHOT (2026-07-10, claude-opus-4.8/max): the live washingtonpost.com
  URL bot-blocks unauthenticated curl (HTTP/2 INTERNAL_ERROR), so the
  article was retrieved + snapshotted via the Wayback Machine capture
  20240726003619 → raw/wapo__2020-10-09_nakashima-trickbot.html
  (sha256 cda2d875…0468f611, 466,621 bytes); archive_url set. Byline
  verified "By Ellen Nakashima / October 9, 2020 at 8:16 p.m. EDT";
  headline CORRECTED to the true title ("…reduce its potential impact on
  the election"; the record previously read "…reduce its threat to the
  election"). Carries verbatim: "an army of at least 1 million hijacked
  computers run by Russian-speaking criminals"; the effort is "part of
  what Gen. Paul Nakasone… calls 'persistent engagement'"; the Sept 22 +
  Oct 1 C2 disruptions that "effectively severed the communication
  between the victimized computers and the servers"; "Cyber Command's
  role was previously unreported. The command declined to comment." Does
  NOT carry "malformed"/"configuration"/"bogus", nor any "first CYBERCOM
  op against a criminal actor" superlative — both stripped from the event
  as unsourced.
