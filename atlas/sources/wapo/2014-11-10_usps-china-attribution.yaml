notes: |
  Initial public disclosure (WaPo, Nakashima) with official-sourced
  suspicion of "Chinese government hackers" at the nation level — no
  service or actor named; officials declined to confirm responsibility.
  URL corrected 2026-05-29 (Agent2): canonical WaPo path is
  /news/federal-eye/wp/2014/11/10/ (Federal Eye column), not
  /business/economy/. The /business/economy/ slug was never the
  canonical location. Live URL is currently bot-blocked under
  Cloudflare/paywall (returns 000 on automated fetch) but is the
  publisher's stable canonical URL.
  AUDIT (2026-06-25, claude-opus-4.8/max): UNFETCHABLE for raw_snapshot —
  curl HTTP 000, WebFetch HTTP 403, archive.org blocked per policy; no
  raw_snapshot/content_sha256 captured (→ event qc.level: partial). All
  citation facts corroborated verbatim via authoritative mirrors: WaPo
  lede "Chinese government hackers are suspected of breaching the computer
  networks of the United States Postal Service, compromising the data of
  more than 800,000 employees"; intrusion "discovered in mid-September",
  officials "declined to comment on who was thought to be responsible"
  (WaPo via web search/Tampa Bay Times reprint). Employee data incl. SSNs,
  DOB, addresses, employment dates (NPR, CNN, BankInfoSecurity). ~2.9M
  customers via Customer Care Center contacts Jan 1–Aug 16 2014: names,
  addresses, phone, email (CNN/BankInfoSecurity). USPS called it a
  "very sophisticated" actor uninterested in card fraud/identity theft
  (NBC News). Attribution is NATION-level (China / "Chinese government"),
  NOT a named service or actor.
