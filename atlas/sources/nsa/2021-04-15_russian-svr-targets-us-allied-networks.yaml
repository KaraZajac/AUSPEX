notes: |
  Joint NSA/CISA/FBI cybersecurity advisory (U/OO/132340-21,
  April 2021 Ver. 1.0), released 15 April 2021 as the technical
  companion to the same-day White House SolarWinds-to-SVR
  attribution and OFAC E.O. 14024 sanctions, and cross-referenced by
  AA21-116A (26 Apr 2021) for vulnerability detail. Names the actor
  verbatim "Russian Foreign Intelligence Service (SVR) actors (also
  known as APT29, Cozy Bear, and The Dukes)". Its headline content is
  the SVR's exploitation of five public-facing products, listed
  verbatim in a table: CVE-2018-13379 (Fortinet), CVE-2019-9670
  (Synacor Zimbra Collaboration Suite), CVE-2019-11510 (Pulse Secure),
  CVE-2019-19781 (Citrix), CVE-2020-4006 (VMware Workspace ONE Access).
  AUDIT (2026-07-10, claude-opus-4.8/max): created during the audit of
  2021-04/aa21-116a-svr-cyber-operations, which had mis-attributed this
  advisory's 5-CVE list to AA21-116A (and corrupted it — inventing
  Microsoft Exchange CVE-2020-0688, dropping Zimbra/VMware). The
  media.defense.gov PDF is bot-walled (HTTP 403); recovered the
  identical bytes via the Wayback "id_" raw capture and snapshotted
  (raw_snapshot + content_sha256 above; 305,438 bytes, 3pp). CVE table
  and title verified via pdftotext.
