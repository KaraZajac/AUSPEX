notes: |
  AUDIT 2026-07-04 (claude-opus-4.8 / max): added to event
  2024-03/hoya-hunters-international as the source carrying Hoya's
  semiconductor / EUV-mask-blank position (which BleepingComputer and The Record
  do not state) and independently corroborating the Hunters International $10M /
  1.7M-file / 2TB demand. Verbatim from the snapshot (sha256 94d0e632…d03bad9e,
  1,831,730 bytes):
  "Hoya is an essential player in the semiconductor industry as a leader in the
  development of products for EUV lithography. As a result, its trade secrets
  could be particularly valuable to rivals or sanctioned nations.";
  key-products list: "Mask blanks and photomasks for semiconductor
  manufacturing / Photomasks for flat panel displays / Glass disks for hard
  [drives]";
  "the incident would be better described as a ransomware attack, with Hoya
  facing demands for $10 million to unlock encrypted files and for the hackers
  to keep secret the data stolen";
  "part of the deal would be a pledge by the ransomware group not to release any
  of the 1.7 million files (2TB of data) that it stole during the hack(s) on
  Hoya computers.";
  "Hunters International claims to be applying a non-negotiation, no-discount
  policy to its Hoya data haul. This news morsel again needs a pinch of salt, as
  neither any ransomware group nor Hoya has released communications to confirm
  the true nature of the 'incident'". Grounds the sectors/ict/semiconductors/
  equipment target and the summary's strategic-sensitivity clause; the
  "essential player" / "a leader" wording does NOT support a "world's largest"
  superlative (moderated in the event accordingly).
