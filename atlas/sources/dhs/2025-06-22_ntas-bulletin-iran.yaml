notes: |
  DHS NTAS Bulletin issued by Secretary Kristi Noem on 2025-06-22 over a
  "heightened threat environment" following direct US involvement in the
  Israel-Iran conflict (the 21 June US strikes on Iranian nuclear sites).
  Govt-primary corroboration for the Iran-aligned hacktivist DDoS threat
  to US networks.
  AUDIT (2026-07-05, claude-opus-4.8/max): created during the QC audit of
  event 2025-06/iran-aligned-hacktivist-ddos-us-post-strikes. Raw snapshot
  captured (310,735 bytes, sha256 c65c9e56…5725faeb). Verbatim cyber
  passage: "Low-level cyber attacks against US networks by pro-Iranian
  hacktivists are likely, and cyber actors affiliated with the Iranian
  government may conduct attacks against US networks." The bulletin
  DISTINGUISHES pro-Iranian hacktivists from Iranian-government-affiliated
  actors — the attribution-care basis for modeling this event nation-level
  (Iran-aligned) rather than state-directed. Same DHS sentence is quoted
  inside the Cyble report cited by the event. Bulletin expires 2025-09-22.
