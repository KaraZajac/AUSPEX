notes: |
  Source for the Cl0p leak-site extortion mechanics and the June 14 2023
  contact deadline — the "unusual" data-theft (non-encryption) model.
  Supporting quotes (raw snapshot, sha 7eedaf5f...de6c9928, 130,437 bytes):
  title "Cl0p gang tells MOVEit hack victims to contact it before June 14,
  or else…"; "In a message posted on its dark web leak site … the Cl0p
  gang tells companies that use Progress's MOVEit Transfer product that it
  exploited a vulnerability in the software to access data"; "Unusually
  for an extortion demand … the message asks that affected companies make
  contact with the extortionists. Once contact has been made, negotiations
  will begin to determine a price for the deletion of the stolen data …
  However, if contact is not made before June 14 … [Cl0p will publish the
  data]." Establishes the victim-initiated-contact extortion model and the
  June 14 deadline, with no reference to file encryption (data-theft
  extortion). Used on 2023-05/moveit-cl0p. AUDIT (2026-07-10,
  claude-opus-4.8/max): curl HTTP 200, snapshot + sha256 captured.
