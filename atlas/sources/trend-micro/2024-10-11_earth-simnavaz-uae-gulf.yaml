title: |
  Earth Simnavaz (aka APT34) Levies Advanced Cyberattacks
  Against UAE and Gulf Regions
url: https://www.trendmicro.com/en_us/research/24/j/earth-simnavaz-cyberattacks-uae-gulf-regions.html
archive_url: null
published_on: 2024-10-11
retrieved_on: 2026-05-27
