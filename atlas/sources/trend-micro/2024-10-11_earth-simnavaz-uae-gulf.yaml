notes: |
  Trend Micro analysis of an Earth Simnavaz / APT34 / OilRig
  campaign against UAE government and Gulf-regional
  organizations. Exploits CVE-2024-30088 (Windows Kernel EoP)
  to deliver the STEALHOOK backdoor, which exfiltrates data
  through compromised Microsoft Exchange servers as outbound
  email attachments. Customized .NET tools, PowerShell scripts,
  and IIS-based malware are documented.
