  page now titles "…Against Middle East" and its body genericizes
  the victim to "Middle East / Gulf Regions / energy (oil & gas)";
  the strings "UAE", "government" and "Iran"/"Iranian" no longer
  appear in the captured raw (the sole "iran" is inside an outbound
  hyperlink to a DarkReading Fox-Kitten piece, not an attribution).
  The ORIGINAL Oct-2024 report named UAE + government — preserved
  in this record's title, the original URL slug
  (…-uae-gulf-regions.html), Trend Micro's own syndicated press
