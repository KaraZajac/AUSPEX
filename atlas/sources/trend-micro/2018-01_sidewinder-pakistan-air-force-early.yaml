notes: |
  Trend Micro tracked SideWinder activity ahead of Kaspersky's
  March 2018 public naming. The cluster's earliest documented
  targets in vendor reporting include Pakistani Air Force and
  Pakistani military networks, exploited via spear-phishing
  with weaponized RTF (CVE-2017-11882) and HTA droppers. Exact
  URL needs verification; this stub references the broader Trend
  Micro research catalogue.
