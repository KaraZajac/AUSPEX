notes: |
  Trend Micro Research's technical profile of APT36 (Trend's
  internal designation: Earth Karkaddan), tracing the cluster's
  attack chain from spear-phishing through Crimson RAT and
  Capra-family implant deployment. Provides Trend Micro's
  independent naming and corroboration of the Pakistani-aligned
  cluster's targeting of Indian military, diplomatic, and defense
  research entities through 2021.
