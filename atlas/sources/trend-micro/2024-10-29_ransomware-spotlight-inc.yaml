notes: |
  Trend Micro vendor threat profile of the INC ransomware / data-
  extortion group. Actor-general context source for the summary of
  event 2024-03/nhs-dumfries-inc-ransom (does not itself cover the
  NHS D&G incident). Created + snapshotted 2026-07-05.

  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured +
  sha256 verified (499,395 bytes). Verbatim support:
   - "INC ransomware has been observed to exploit CVE-2023-3519".
   - "In November 2023, threat actors behind the group leveraged
     Netscaler ADC (Citrix ADC) and Netscaler Gateway (Citrix Gateway)
     and exploited CVE-2023-3519 to gain [access]".
   - "INC ransomware uses purchased valid account credentials typically
     acquired through Initial Access Brokers".
   - "first detected in July 2023, where Trend Micro tracked the
     intrusion set as Water Anito".
   - "In July, the Lynx ransomware group, with an intrusion set tracked
     by Trend Micro as Water Lalawag, allegedly bought source code from
     the gang behind the INC ransomware, but these claims have yet to
     be proven".
