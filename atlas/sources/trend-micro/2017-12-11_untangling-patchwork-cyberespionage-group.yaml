notes: |
  Trend Micro (authors Daniel Lunghi, Jaromir Horejsi, Cedric Pernet) profile of the
  Patchwork / Dropping Elephant cyberespionage group. CREATED 2026-06-27 (claude-opus-4.8/
  max) to RE-SOURCE event 2017-11/patchwork-badnews-continuation off the phantom citation
  cisco-talos/2017-11_patchwork-badnews-continuation (no Cisco Talos Patchwork report
  exists). Snapshot via curl 2026-06-27, HTTP 200, 88,434 bytes,
  sha256 ca087dcf...63b28e89; the page's article:published_time meta = 2017-12-11.
  Verbatim supporting quotes (from the raw snapshot):
  - Cluster naming / attribution (named-actor): "Patchwork (also known as Dropping
    Elephant) is a cyberespionage group known for targeting diplomatic and government
    agencies that has since added businesses to their list of targets."
  - Targets + initial vector: "Patchwork targeted multiple sectors in China and South
    Asia. We also saw spear-phishing emails sent to organizations in the U.K., Turkey,
    and Israel." (spear-phishing with weaponized documents is the staple vector)
  - BADNEWS implant: "it drops a dynamic-link library (DLL) that contains the Badnews
    backdoor, which is loaded and executed using DLL side-loading technique"; also names
    NDiskMonitor ("a custom backdoor we believe to be Patchwork's own") and xRAT.
  - Exploit chain named: "RTF files exploiting CVE-2015-1641"; PPSX files exploiting
    Sandworm (CVE-2014-4114); CVE-2012-1856; CVE-2017-0199; plus DDE and SCT abuse. Does
    NOT name CVE-2012-0158, and does NOT name CVE-2015-2545 / CVE-2017-0261 (those are
    Unit 42's 2018 chain).
  Does NOT name Pakistan specifically (frames targeting as "China and South Asia"), and
  does NOT attribute the group to India or any Indian state service (consistent with the
  actor in/unscoped/patchwork).
