notes: |
  Dutch MIVD public disclosure (4 Oct 2018) of the 13 April 2018
  interdiction of four GRU officers attempting an on-site Wi-Fi
  compromise of the OPCW in The Hague. Officers entered on
  diplomatic passports via Schiphol, parked a hire car in the
  Marriott Hotel lot adjacent to the OPCW with Wi-Fi attack
  equipment (antenna hidden under a jacket) operational in the boot;
  they were escorted out of the country and the Russian ambassador
  summoned. MIVD further disclosed that one of the officers had also
  been active in Malaysia targeting the MH17 crash investigation.
  Companion to the DOJ Oct 2018 Morenets indictment and the UK
  NCSC/FCO calling-out (same day).

