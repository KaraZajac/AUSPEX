  Verbatim BtcTurk statement: "detected a cyber attack on June 22, 2024,
  causing unauthorized withdrawals from our platform. Only portions of
  the balances of 10 cryptocurrencies in hot wallets were affected,
  while most assets stored in cold wallets remain secure." Binance CEO
  Richard Teng "has successfully frozen more than $5.3 million in stolen
  funds so far." On ZachXBT: "ZachXBT, a prominent Bitcoin analyst,
  suggested in a post... According to him, this address has transferred
  1.96 million AVAX, valued at approximately $54.2 million, to Coinbase
  and THORChain. He also shared the cryptocurrency address in his post."
  ZachXBT identifies an on-chain ADDRESS and its Coinbase/THORChain
  cash-out - he does NOT name Lazarus, North Korea, or DPRK. No
  nation-state attribution appears anywhere in the article.
