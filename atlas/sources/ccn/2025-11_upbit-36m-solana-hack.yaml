  Verbatim (date/precedent): "The latest Upbit hot-wallet breach,
  reported on November 27, 2025, landed exactly six years to the
  day after the exchange's 2019 Ethereum heist, where 342,000 ETH
  were stolen from its hot wallet." Verbatim (asset list): "...the
  stolen funds included a mix of Solana-based tokens, notably USDC,
  BONK, JTO, and SONIC, Raydium (RAY), Render (RENDER), Orca (ORCA),
  and Pyth Network (PYTH)." Verbatim (2019 attribution): South
  Korean police "attributed the theft to North Korean state-linked
  hacker groups, including Lazarus and Andariel." The 2019 heist is
  framed as a "$50 Million Ethereum Heist" (342,000 ETH).
