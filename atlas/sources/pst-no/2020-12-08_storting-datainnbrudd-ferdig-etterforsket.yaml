notes: |
  PST press release closing the investigation into the August 2020
  Storting (Norwegian parliament) email-system intrusion. Named-unit
  attribution to APT28/Fancy Bear = GRU 85th GTsSS (Unit 26165), and
  the definitive technical account of the intrusion.
  Added by 2026-07-01 LLM audit of event
  2020-10/norwegian-storting-email-compromise (re-source: the event
  previously carried ONLY the Oct-2020 MFA nation-level statement,
  which does not name APT28; this PST primary is the source that
  actually carries the named-unit / GRU-26165 attribution).
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured,
  sha256 f3d03c89…361a85739, 74688 bytes. Verbatim (Norwegian):
  "Analysene viser at det er sannsynlig at operasjonen er utført av
  cyberaktøren som i åpne kilder omtales som APT28 og Fancy Bear.
  Denne aktøren knyttes til Russlands militære etterretningstjeneste
  GRU, mer spesifikt deres 85. hovedsenter for spesielle tjenester
  (GTsSS)." | Method: "aktøren har benyttet en fremgangsmåte som
  kalles passord-«bruteforcing» for å skaffe gyldige brukernavn og
  passord … mot et høyt antall brukerkontoer … logge seg inn på et
  mindre antall kontoer." | Impact: "hentet ut sensitivt innhold fra
  en del av de berørte e-postkonti"; attempted lateral movement into
  Storting systems. | Timeline: "I august 2020 ble Politiets
  sikkerhetstjeneste kjent med … Stortinget politianmeldte forholdet
  1. september." Investigated as possible breach of Penal Code §121;
  no indictment for lack of sufficient evidence.
