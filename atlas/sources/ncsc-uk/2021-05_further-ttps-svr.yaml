notes: |
  Joint NCSC/CISA/NSA/FBI advisory "Further TTPs associated with SVR
  cyber actors" (v1.0, 7 May 2021) documenting the SVR's post-exposure
  tradecraft shift: the open-source Sliver C2 framework, exploitation of
  a specific public-facing CVE list, and stolen-credential/mailbox
  persistence for intelligence collection.
  AUDIT (2026-06-25, claude-opus-4.8/max): the HTML article was
  tombstoned (url: null) with no Wayback snapshots; skipped as unfetchable.
  AUDIT (2026-07-01, claude-opus-4.8/max): SUPERSEDES the 2026-06-25
  finding — the advisory PDF is still live on ncsc.gov.uk; recovered,
  snapshotted (raw_snapshot + content_sha256 above; 355,021 bytes, 14pp),
  and title verified via pdftotext ("Advisory. Further TTPs associated
  with SVR cyber actors / Version 1.0 / 7 May 2021"). The advisory names
  the SVR directly ("Russia's civilian foreign intelligence service …
  tracked in open source as APT29, Cozy Bear, and the Dukes"). NOTE for
  the orchestrator: the prior "password spray, OAuth abuse, golden SAML"
  gloss in this note was INACCURATE for THIS advisory — that tradecraft
  belongs to the Feb-2024 AA24-057A SVR cloud-access advisory, not the
  May-2021 "Further TTPs" (which covers Sliver + public-facing CVEs +
  stolen-credential persistence). Corrected here.
