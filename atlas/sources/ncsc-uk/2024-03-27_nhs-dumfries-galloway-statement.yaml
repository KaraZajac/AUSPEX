  AUDIT (2026-07-05, claude-opus-4.8/max): the prior url:null was
  RE-SOURCED to the real Health Board URL (https://www.nhsdg.co.uk/
  cyberattack/) and snapshotted; sha256 4e26870d…79a00dc46 (228,353
  bytes). Verbatim support: "the attack which began at the end of
  February"; "The alert below was published on 15 March 2024"; "The
  content of the proof pack related to six individual patients.
  These patients have all been contacted"; "clinical data relating
  to a small number of patients has been published by a recognised
  ransomware group" (NB: names only 'a recognised ransomware group',
  NOT INC Ransom); "On Monday 6 May 2024, they carried out that
  threat – publishing over 3 terabytes of data"; "No interaction has
  been entered into with those responsible"; "No patient appointments
  or operations have had to be cancelled or rescheduled"; "The
  Information Commissioner's Office (ICO) and Central Legal Office
  (CLO) supported the incident process".

