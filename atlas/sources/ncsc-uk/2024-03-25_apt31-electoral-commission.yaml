notes: |
  UK FCDO + NCSC joint attribution naming APT31 / Wuhan
  Xiaoruizhi Science and Technology Company for the UK Electoral
  Commission breach (2021–2022, ~40M voter records) and targeting
  of IPAC parliamentarians. Companion to US DOJ indictment and
  OFAC sanctions issued the same day.

