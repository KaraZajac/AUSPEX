  AUDIT (2026-07-10, claude-opus-4.8/max): live ncsc.gov.uk URL returned HTTP 200; article body
  is server-rendered; snapshot captured + hashed (134,972 bytes; "Publish date 23 February
  2022"). CORRECTED a prior MISQUOTE: the note previously quoted "the Sandworm actor, which the
  UK Government previously linked to the GRU" — that wording is in NEITHER source. The NCSC
  statement's actual text is: "Sandworm, also known as Voodoo Bear, has previously been
  attributed to Russia's GRU"; "The malware dubbed Cyclops Blink appears to be a replacement for
  the VPNFilter malware exposed in 2018." Critically, the statement adds: "N.B This is a routine
  advisory and not directly linked to the situation in Ukraine" — which refutes the earlier
  "pre-invasion window" / elevated-posture gloss (removed).
