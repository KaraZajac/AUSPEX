  captured (35,726 bytes, sha fa511db5…9b79f57a). NOTE this is a LIVING
  update page (first published 2024-06-04, last updated 2025); the
  captured copy therefore carries later facts. Verbatim support:
  "On 3 June 2024, Synnovis was the victim of a ransomware cyber-attack";
  "causing delays to over 11,000 outpatient and elective procedure
  appointments"; "On 20 June 2024, the criminals responsible for the
  cyber-attack published data files they had stolen"; "services were
  fully restored by December 2024". CAVEAT: this NHS England page does
