notes: |
  NCSC's second annual report on the Active Cyber Defence (ACD)
  programme — Takedown Service, Mail Check, Domain Discovery,
  Web Check, Protective DNS, Vulnerability Disclosure Platform,
  and the Suspicious Email Incubator. Documents programme scale
  and outcomes across the second operational year (CY2018).
  Doctrinally one of the canonical primary-source references for
  the operational instantiation of the NCS 2016 "defend" pillar.

  AUDIT (2026-06-30, claude-opus-4.8/max): PUBLICATION DATE
  CORRECTED 2019-02-19 -> 2019-07-16. The report was published
  16 July 2019 (NCSC landing-page datePublished "16 July 2019";
  CISA advisory 2019/07/16; report foreword signed "Dr. Ian Levy,
  15th July 2019", which explicitly apologises for the "late
  publication date"). The prior 2019-02-19 date was an unsourced
  conflation (likely mirroring the Year-1 "ACD One Year On" report,
  Feb 2018). The id slug still encodes the wrong date (2019-02-19)
