notes: |
  NCSC technical Malware Analysis Report for AUTHENTIC ANTICS
  (internally Version 1, dated 06 May 2025; publicly released
  18 July 2025 alongside the attribution news article and the
  UK GRU sanctions package). Purely technical — makes NO actor
  attribution. Primary source for: the malware "runs within the
  Outlook process"; malicious login prompts stealing Microsoft
  Office / cloud-account credentials + OAuth 2.0 tokens;
  exfiltration via the victim's own Outlook web account to an
  actor-controlled address with no "sent" trace and no
  Command-and-Control; COM-hijacking persistence; AES-256
  environmentally-keyed loader masquerading as Microsoft's MSAL;
  and "AUTHENTIC ANTICS was observed in use in 2023."
