notes: |
  Leicester City Council's own news release (Richard Sword, strategic
  director of city development and neighbourhoods) confirming that a
  second, larger batch of stolen data had been published following the
  March 2024 cyber-attack.

  AUDIT (2026-07-04, claude-opus-4.8/max): Raw captured + hashed
  (92,178 bytes). Verbatim: "The council shut down its IT networks on
  7 March when its monitoring systems detected that an incident had
  taken place"; "a known ransomware group who have hit a number of
  government, education and health organisations around the world"
  (the council does NOT name INC Ransom); "At 1.3 terabytes, this is a
  much larger batch of data than the 25 documents published last week";
  "have notified the Information Commissioner of our actions"; "We
  continue to work with Leicestershire Police and the National Cyber
  Security Centre". First-party anchor for the 1.3TB figure, the
  7 March start, and the ICO-notified (NOT ICO-inquiry) fact.
