notes: |
  Corroborating WSE-specific attribution source. On the October 2014
  breach: "Hackers who rifled the exchange last October ... proclaimed
  they were Muslim militants angry over Poland's support for a bombing
  campaign against the Islamic State ... Except the infiltrators
  weren't Islamic militants at all. Behind the smokescreen was a group
  of hackers with ties to the Russian government, according to three
  people familiar with the Polish investigation." Directionality/motive:
  "The incident was viewed by Polish investigators as a stark warning
  to the country, a member of the North Atlantic Treaty Organization
  intent on driving a strong alliance response to Russia's moves in
  eastern Ukraine." Cluster naming: "Trend Micro says the group that
  attacked the Warsaw exchange -- nicknamed variously by cybersecurity
  companies as APT 28, Fancy Bear or Pawn Storm -- is most likely
  staffed by a loose confederation of the country's best criminal
  hackers." Snapshot captured from the Internet Archive.
