  AUDIT 2026-07-10: snapshot captured via archive.org (395KB HTML;
  full article body present as embedded JSON). Byline Ben Elgin &
  Michael Riley, Bloomberg Businessweek. Article display H1 is "Now
  at the Sands Casino: An Iranian Hacker in Every Server" (the <title>
  / URL-slug form is retained above). This is the primary investigative
  disclosure (Dec 2014) that pre-dated DNI Clapper's Feb 2015 public
  attribution. Load-bearing quotes verified verbatim: wiper mechanics
  ("the script writes over the erased hard drives with a random pattern
  of ones and zeros"), scope ("wiped out about three-quarters of the
  company's Las Vegas computer servers"), cost ("recovering data and
  building new systems could cost the company $40 million or more" —
  Sands president Michael Leven), date ("released their malware early
  in the morning on Monday, Feb. 10"), initial access (brute-force of
  the "Sands Bethlehem virtual private network, or VPN" then stolen
  "login credentials of a senior computer systems engineer"), motive
  (Dell SecureWorks incident brief: "attack was in response to CEO
  comments regarding Iran"; Adelson's Oct 2013 Yeshiva University
  remark about detonating a US warhead in the Iranian desert; Khamenei
  responded two weeks later via Fars News), attribution ("hacktivists
  based in Iran … The security team couldn't determine if Iran's
  government played a role"), and the attacker persona ("Anti WMD
  Team").
