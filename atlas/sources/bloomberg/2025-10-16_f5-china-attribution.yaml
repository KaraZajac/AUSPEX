notes: |
  Bloomberg attributes the F5 breach to "state-backed hackers from
  China," citing unnamed people familiar with the matter, and links
  it to the BRICKSTORM malware (Mandiant/GTIG cluster UNC5221).
  Reports the actor had "at least 12 months" of access before
  detection; includes China's Foreign Ministry denial. F5's own
  public 8-K names only a "nation-state" actor without a country.
