notes: |
  First public reporting on the United Airlines intrusion with
  US-official attribution to the same actor cluster behind OPM
  and Anthem. Records-count not specified.

  AUDIT (2026-06-25, claude-opus-4.8/max): the Bloomberg primary
  URL is bot-walled — curl and WebFetch both return HTTP 403
  ("Bloomberg - Are you a robot?"), and archive.org is blocked for
  this audit. The captured raw_snapshot is therefore the
  corroborating contemporaneous report that recounts the Bloomberg
  story verbatim: The Register, John Leyden, "Chinese hackers behind
  OPM megabreach also pwned United Airlines," 30 Jul 2015
  (https://www.theregister.com/2015/07/30/chinese_hackers_opm_united_airlines_linkage/).
  It confirms: "United Airlines was hacked by [the] same Chinese
  group that also breached health insurer Anthem and the US
  government's Office of Personnel Management (OPM). Hackers stole
  flight manifests from United Airlines in May or early June,
  exposing the names of people on many different flights ...
  Bloomberg broke news of the possible link on Wednesday [29 Jul
  2015] in a story citing unnamed officials and individuals familiar
  with the investigation." Attribution is China-nexus / same-as-OPM
  cluster ("Black Vine," Symantec) only — NO Chinese service named.
