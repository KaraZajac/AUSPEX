notes: |
  VulnCheck (Jacob Baines) original internet-scan research corroborating the scale of the
  Sept-Oct 2023 IOS XE mass-implantation, and publisher of a public implant scanner.
  Supporting source for the ~40k-implant figure and the unattributed nature of the wave.
  AUDIT (2026-07-02, claude-opus-4.8/max): snapshot is the real blog (text len ~8.7k).
  Carries verbatim: scale — "VulnCheck performed an internet scan and found thousands of
  implanted hosts. VulnCheck released a scanner to detect the implant on affected devices";
  and reproduces contemporaneous press counts on-page — "Security Week - Number of Cisco
  Devices Hacked via Unpatched Vulnerability Increases to 40,000", "The Washington Post -
  More than 40,000 Cisco switches and routers could be infected", plus a SecurityWeek
  "More Than 34,000 Cisco Devices Compromised" headline. UNATTRIBUTED: reproduces
  "CyberScoop - Unidentified attackers breach tens of thousands of Cisco devices". (The one
  "China" string on the page is an unrelated sidebar headline about a Canadian-telecom Salt
  Typhoon story, NOT an attribution of the IOS XE campaign.)
