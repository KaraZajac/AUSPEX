notes: |
  Qantas's own initial media release, "Published on 2nd July 2025 at
  9:04" (AEST). This is the victim's first-disclosure statement.

  AUDIT (2026-07-11, claude-opus-4.8/max): the live qantasnewsroom.com.au
  URL is WAF/bot-walled (curl hangs → HTTP/2 INTERNAL_ERROR / timeout),
  so the snapshot is the Internet Archive capture 20250913040127 (HTTP
  200, 28,325 bytes, sha256 4661ba4d..2cbe4635); the release body is
  preserved intact in that capture. Verbatim load-bearing text:
    "On Monday 30 June 2025 ... The incident occurred when a cyber
    criminal targeted a call centre and gained access to a third party
    customer servicing platform."
    "On Monday, we detected unusual activity on a third party platform
    used by a Qantas airline contact centre. We then took immediate
    steps and contained the system."
    "There are 6 million customers that have service records in this
    platform. We are continuing to investigate the proportion of the
    data that has been stolen, though we expect it will be significant."
    "An initial review has confirmed the data includes some customers'
    names, email addresses, phone numbers, birth dates and frequent
    flyer numbers. Importantly, credit card details, personal financial
    information and pas[sport details] ... [were not] stored in this
    system."
  Qantas NAMES NO threat actor and does NOT name Salesforce or ShinyHunters
  in this release. The "6 million" here is the count of service records in
  the platform (later de-duplicated to 5.7 million unique customers in the
  9 July update).
