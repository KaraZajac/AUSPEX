  Qantas's own 9 July 2025 update — the load-bearing victim statement
  for the confirmed scope and data-field breakdown.

  AUDIT (2026-07-11, claude-opus-4.8/max): live qantasnewsroom URL is
  WAF/bot-walled; snapshot is the Internet Archive capture 20250808010146
  (HTTP 200, 30,200 bytes, sha256 d12a1102..4be06633). Verbatim
  load-bearing text:
    "After removing duplicate records, our investigation has found that
    there were 5.7 million unique customers' data held in the system."
    "4 million customer records are limited to name, email address and
    Qantas Frequent Flyer details. Of this: 1.2 million customer records
    contained name and email address. 2.8 million customer records
    contained name, email address and Qantas Frequent Flyer number. The
    majority of these also had tier included. A smaller subset of these
    had points balance and status credits included."
    "Of the remaining 1.7 million customers ... Address – 1.3 million ...
    Date of birth – 1.1 million[;] Phone number (mobile, landline and/or
    business) – 900,000[;] Gender – 400,000 ... Meal preferences – 10,000."
    "[N]o credit card details, personal financial information or passport
    details were stored in this system and therefore have not been
    accessed. There continues to be no impact to Qantas Frequent Flyer
    accounts. Passwords, PINs and login details were not accessed or
    compromised."
  Still names NO threat actor and does not name Salesforce / ShinyHunters.
