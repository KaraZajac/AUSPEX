notes: |
  Qantas's rolling customer-facing cyber-incident notice, captured in
  the Internet Archive state carrying "Update: 12 October 2025" — the
  load-bearing victim statement for the October data-release / leak-site
  phase and the NSW Supreme Court injunction.

  AUDIT (2026-07-11, claude-opus-4.8/max): live qantas.com URL is a
  JS/CDN page; snapshot is the Internet Archive capture 20251016012600
  (HTTP 200, 97,678 bytes, sha256 a6b93ad0..9e5a5e27). Verbatim
  load-bearing text:
    "Update: 12 October 2025 Qantas is one of a number of companies
    globally that has had data released by cyber criminals following a
    cyber incident in early July, where customer data was stolen via a
    third party platform."
    "Through the NSW Supreme Court, we have an ongoing injunction in
    place to prevent the stolen data being accessed, viewed, released,
    used, transmitted or published by anyone, including third parties."
    "There is still no evidence that any personal data stolen from
    Qantas has been released, but ... we continue to actively monitor."
    "On Monday 30 June 2025, we detected unusual activity on a
    third-party platform used by a Qantas airline contact centre."
  NB the careful Qantas distinction: the campaign actors "released" data
  globally and listed Qantas, but Qantas asserts "no evidence that any
  personal data stolen from Qantas has been released" — recorded as a
  hedged claim in the event, not a confirmed public dump of Qantas data.
