notes: |
  Primary source for the 2023-12/predatory-sparrow-iran-fuel-stations
  event. JSON-LD datePublished 2023-12-18T10:03:22Z (this is the
  GENUINE Dec-2023 article; the same URL was mis-dated onto the
  Oct-2021 event and retired off it). Carries verbatim: "close to 70%
  of the country's gas stations were out of service, citing a
  'software problem' as the cause"; "The country has some 33,000 gas
  stations"; the Gonjeshke Darande / "predatory sparrow" self-claim
  ("disabled 'a majority of the gas pumps throughout Iran'"); the
  retaliation statement "This cyberattack comes in response to the
  aggression of the Islamic Republic and its proxies in the region";
  "gained access to the payment systems ... as well as each station's
  central server and management system"; the controlled-manner /
  prior-warnings-to-emergency-services claim; the "Khamenei, playing
  with fire has a price" threat; and the post-October-7 context
  (Israel's war with Hamas; Hezbollah + Houthis stepping up attacks).
  Reports the group as having "previously been linked to Israel" (no
  state attribution). Snapshotted 2026-07-10.
