title: |
  Israel-linked group claims cyberattack that shut down 70% of
  Iran's gas stations
url: https://www.timesofisrael.com/israel-linked-group-claims-cyberattack-that-shuts-down-70-of-irans-gas-stations/
archive_url: null
published_on: 2023-12-18
retrieved_on: 2026-05-27
tier: tertiary
notes: |
  Reporting on the December 18, 2023 Predatory Sparrow /
  Gonjeshke Darande claim of responsibility for a cyberattack
  that disrupted approximately 70% of Iran's petrol stations.
  Iranian Oil Minister Javad Owji acknowledged a cyber origin
  for the outage. The operation was a sequel to the same
  cluster's October 2021 fuel-station attack and is a canonical
  data point for the Israel-aligned counter-Iran asymmetric
  campaign.
