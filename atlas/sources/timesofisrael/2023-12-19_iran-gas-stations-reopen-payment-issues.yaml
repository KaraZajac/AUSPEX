notes: |
  Recovery/next-day follow-up for the 2023-12/predatory-sparrow-iran-
  fuel-stations event (JSON-LD datePublished 2023-12-19T09:11:04Z),
  relaying official Iranian statements via ISNA. Carries verbatim:
  "Fuel pumps in Iran were reportedly back online Tuesday morning,
  after a hacking group previously linked to Israel claimed on Monday
  to have paralyzed gas stations across the Islamic Republic"; National
  Iranian Oil Products Distribution Company CEO Jafar Salari Nesab
  told ISNA "that pumps were fully operational almost immediately
  after the cyberattack, though only 40% of the country's gas stations
  could take payment with a fuel card"; stations "'disconnected the
  online system' and fuel was being supplied offline"; reconfirms
  "close to 70% of the country's gas stations were out of service" and
  the Gonjeshke Darande / predatory sparrow self-claim with the "response
  to the aggression of the Islamic Republic and its proxies in the
  region" framing. Anchors the degraded-card-payment claim and the
  soft/approximate end_date. Snapshotted 2026-07-10.
