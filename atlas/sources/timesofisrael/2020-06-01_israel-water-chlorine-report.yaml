notes: |
  ToI Staff/agencies relay of the Financial Times report (published
  Monday 2020-06-01). Primary carrier of the CHLORINE intent for the
  2020-04/israel-water-ot-poisoning event. Raw HTML captured + hashed
  (sha256 7c7809c6…, 395,913 bytes; direct curl 200; datePublished
  2020-06-01T05:26:18Z). The chlorine claim is framed strictly as an
  ATTEMPTED / POTENTIAL outcome, never achieved:
  - "Iran tried to increase chlorine levels in the water flowing to
    residential areas during April's cyberattack against Israel's water
    systems, a Western intelligence official has told the Financial
    Times."
  - "The official told the British newspaper in a report published
    Monday that hundreds of people would have been at risk of getting
    sick and that the attack was close to being successful."
  - "Had Israel's National Cyber Directorate not detected the attack in
    real time, he said chlorine or other chemicals could have been mixed
    into the water source in the wrong proportions and resulted in a
    'harmful and disastrous' outcome."
  - "Additionally there was a chance that the attack would have
    triggered a fail-safe, shutting down the pumps and leaving thousands
    without water during … the recent deadly heatwave in Israel."
  Attribution is nation-level ("Iran," per a "Western intelligence
  official," via the FT); no IRGC unit named.
