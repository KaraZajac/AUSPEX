  million to halt their leak of user info from Israeli LGBT site."
  published_on 2021-10-31 verified against datePublished
  2021-10-31T12:04:04. Carries: Black Shadow "believed to be linked
  to Iran" demanded "$1 million in digital currency" within 48
  hours; Atraf "contained information on some one million people";
  "the Israeli internet hosting company they breached on Friday…
  including Atraf" (Cyberserve); leaked "names of some Atraf users
  and their locations… as well as the HIV status"; "the information
  leaked online so far represented just 1 percent"; additional
  victims "public transportation companies Dan and Kavim, a
  children's museum and public radio online blog… the tourism
  company Pegasus, and Doctor Ticket"; "Israeli media said Black
  Shadow is a group of Iran-linked hackers"; the Dec-2020 Shirbit
  tie; and the late-Oct 2021 Iran fuel-network attack context. Makes
  NO MuddyWater/MOIS, Pulse Secure, Fortinet, Moses Staff or Pay2Key
  claim (0 occurrences of each) — refuting the event's prior
