notes: |
  Breaking primary on the 26 October 2021 Iranian fuel-network
  cyberattack (datePublished 2021-10-26T12:10:29Z). Carries: "Iranian
  authorities on Tuesday blamed a mysterious cyber attack for
  unprecedented disruption to the country's fuel distribution
  network"; the attack "rendered useless the government-issued
  electronic cards that many Iranians use to buy subsidized fuel at
  the pump" (the subsidized-fuel-card mechanism); "The Supreme
  National Security Council confirmed that there has been a cyber
  attack against the petrol distribution computer system"; "No group
  immediately claimed responsibility"; similarity to the earlier
  July 2021 attack "that seemed to directly challenge Iran's Supreme
  Leader Ayatollah Ali Khamenei." Created 2026-07-10 to re-source the
  Oct-2021 event off a phantom (mis-dated Dec-2023) ToI record.
