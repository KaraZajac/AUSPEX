  datePublished 2020-05-19T10:55:59Z). Verbatim:
  - "Six facilities were hit in an Iranian cyberattack last month on the
    country's water infrastructure that succeeded in impacting some
    systems but did not cause any disruption in the water supply or
    waste management, the Ynet news site reported on Tuesday."
  - "The Water Authority and Israel National Cyber Directorate
    identified the series of cyber incidents on April 24-25." The
    cybersecurity chief "told Ynet that none of the incidents caused
    damage or affected water supplies or wastewater management."
  - "At one of the Israel Water Authority facilities, an 'irregularity
    due to an unplanned change in data' was recorded … At another
    station, a pump went into continuous operation, prompting operators
    to shut off its automatic mode."
  - Password-change remediation "with a focus on operating systems and
    'in particular for systems that add chlorine to wells.'"
  - "Quoting unnamed senior officials, Channel 13 news said on May 9
    that the attack in late April was viewed as a significant escalation
    by Iran and a crossing of a red line because it targeted civilian
    infrastructure." Attribution nation-level ("Iran"); no unit named.
