notes: |
  Iranian-state attribution source (datePublished 2021-10-31T03:02:01Z).
  CORRECTS the "Khamenei blamed Israel and the US" error in the event:
  the official who blamed Israel/US was Iran's civil-defense chief,
  NOT the Supreme Leader. Carries: "Iran's head of civil defense on
  Saturday blamed Israel and the United States for a cyberattack ...
  'analytically I believe it was carried out by the Zionist regime,
  the Americans and their agents,' Gholamreza Jalali told state TV";
  "Iran's president said Wednesday the cyberattack was designed to get
  'people angry by creating disorder and disruption' ... Ebrahim
  Raisi's remarks stopped short of assigning blame"; SNSC secretary
  Ali Shamkhani tweeted (in Hebrew) about thwarting "the enemy's goal
  of rioting in Iran." Added 2026-07-10.
