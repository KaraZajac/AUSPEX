  confirms published_on. Same-day disclosure carrying the operational facts,
  relayed from Iranian semi-official reporting: "Iran's railroad system came
  under cyberattack on Friday, a semi-official news agency reported, with
  hackers posting fake messages about alleged train delays or cancellations
  on display boards at stations across the country"; the hackers "urged
  passengers to call for information, listing the phone number of the office
  of the country's supreme leader, Ayatollah Ali Khamenei"; "A phone
  number–64411–was displayed on boards of train stations ... It matched the
  number to #Iran's Supreme Leader's Office that is displayed on his website."
  No perpetrator attribution in this same-day article (Israeli-media framing
  of the target facts only).
