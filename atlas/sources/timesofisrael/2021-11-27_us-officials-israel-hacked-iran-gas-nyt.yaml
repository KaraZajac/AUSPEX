notes: |
  Strongest attribution anchor for the Oct-2021 fuel operation
  (datePublished 2021-11-27T15:04:30Z), relaying a New York Times
  report. Carries: "Israel carried out a cyber attack against Iran's
  nationwide fuel system last month, two United States defense
  officials told the New York Times"; "The hack of Iran's gas
  distribution system began on October 26, shutting down civilian gas
  pumps and broadcasting digital messages blaming Iran's supreme
  leader, Ayatollah Ali Khamenei"; "The cyber attack brought all of
  the country's 4,300 fuel distribution stations to a halt"; frames
  the operation within "the shadow war between Israel and Iran" and a
  tit-for-tat exchange targeting civilians (the retaliatory-cyber-
  strike doctrine reading). Confirms the ~4,300 "all stations" scope,
  the Oct-26 onset, the Khamenei-directed billboards, and the Israel
  (nation) attribution via two US defense officials. Added 2026-07-10.
