notes: |
  Prime Minister Netanyahu's office's 10-11 November 2024 confirmation
  that Israel carried out the September 2024 pager attacks on Hezbollah —
  a rare instance of formal Israeli attestation for an offensive
  cyber-physical operation. Netanyahu attributed the operational
  authorization to himself over the objections of senior defense and
  political-echelon officials.
