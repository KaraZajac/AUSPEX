  verbatim: "A spokesperson for Prime Minster Benjamin Netanyahu's office
  confirmed to media outlets on Monday for the first time that Israel was
  behind a string of devastating attacks on Hezbollah communications
  devices in September"; "the pager attack, and a second on the following
  day that activated weaponized walkie-talkies, killed 39 people and
  wounded more than 3,400"; "senior defense officials and political
  figures were opposed to the detonation of the pagers but … he went ahead
  with the operation." Does NOT name Mossad/Unit 8200/PETN (this source is
  the attestation, not the tradecraft).
