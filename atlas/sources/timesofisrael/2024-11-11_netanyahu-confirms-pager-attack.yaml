title: |
  Netanyahu's office confirms Israel was behind devastating pager attacks on Hezbollah
url: https://www.timesofisrael.com/netanyahus-office-confirms-israel-was-behind-devastating-pager-attacks-on-hezbollah/
archive_url: "https://web.archive.org/web/20260420104144/https://www.timesofisrael.com/netanyahus-office-confirms-israel-was-behind-devastating-pager-attacks-on-hezbollah/"
