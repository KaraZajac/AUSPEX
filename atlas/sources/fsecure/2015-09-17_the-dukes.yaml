notes: |
  Seven-year retrospective tracing the "Dukes" / APT29 toolset
  (MiniDuke, CosmicDuke, OnionDuke, CozyDuke, CloudDuke, …) and
  attributing it to the Russian Federation. Foundational technical
  reference for the actor cluster.

  SNAPSHOT (2026-07-10, claude-opus-4.8/max, re:
  2014-10/white-house-state-apt29): live blog-assets.f-secure.com URL
  CloudFront-403s to curl, so captured the 37-page whitepaper via the
  archive_url Wayback snapshot → raw/fsecure__2015-09-17_the-dukes.pdf
  (sha256 dfd8829c…791ce7, 1,789,176 B). Page footers read "F-Secure
  Whitepaper, September 2015" (no precise day). CORRECTION to the prior
  note: the report attributes the Dukes to "the Russian Federation" /
  "the Russian government" and contains ZERO occurrences of "SVR" — the
  earlier "SVR-aligned" phrasing overstated it. It also does NOT itself
  document the White House / State Department intrusion (the single
  "White House" mention is a footnote citation to an Obama speech); it
  dates the first large CozyDuke spear-phishing campaign to "the early
  days of July 2014" and cites Kaspersky's "high-profile victims from …
  the United States." Verbatim attribution: "a dedicated and organized
  cyberespionage group that we believe has been working for the Russian
  Federation since at least 2008"; "in our opinion suggest that the
  group operates on behalf of the Russian Federation." Load-bearing for
  the named-actor cluster + spear-phishing TTP, not the event specifics.
