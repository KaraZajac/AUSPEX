notes: |
  Uber's official first-party statement on the September 2022 intrusion
  attributed to Lapsus$. States the attacker likely bought an EXT
  contractor's corporate password on the dark web, defeated 2FA by
  MFA-fatigue ("the contractor received a two-factor login approval
  request... Eventually, however, the contractor accepted one"), then
  reached "a number of tools, including G-Suite and Slack", posted to a
  company-wide Slack channel, reconfigured OpenDNS, downloaded internal
  Slack messages + finance/invoice-tool data, and accessed the HackerOne
  bug-bounty dashboard — while finding NO access to production systems,
  user accounts, sensitive-user databases, or codebase changes.

  Snapshot 2026-07-10: live uber.com URL bot-walls automated fetches
  (HTTP 406); raw captured via the archive.org 20260304 snapshot (body
  verified intact). content_sha256 is of that captured HTML.
