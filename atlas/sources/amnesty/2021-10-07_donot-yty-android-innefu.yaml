notes: |
  Amnesty Security Lab analysis linking the Donot Team (APT-C-35)
  Android malware infrastructure to Innefu Labs, a Delhi-based
  surveillance vendor. Foundational open-source attestation of
  contractor-built capabilities in the Indian SIGINT ecosystem.
  URL corrected 2026-05-29 (Agent2): the previously stored
  /latest/research/2021/10/india-made-spyware/ is dead; primary
  Security Lab post moved to securitylab.amnesty.org. The
  companion main-site document (full report PDF + analysis) is at
  https://www.amnesty.org/en/documents/afr57/4756/2021/en/ if a
  formal-document tier-1 citation is preferred.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the DoNot Team SERVICE
  placement. This source does NOT name the NTRO or any Indian intelligence service.
  It links the activity to the commercial vendor Innefu Labs and to "the Indian
  government" generically: "Amnesty International's investigation uncovered a trail of
  technical evidence left by the attackers which identified links between the attack
  infrastructure and an Indian-based, Innefu Labs. The company which advertises digital
  security, data analytics, and predictive policing services to law enforcement and armed
  forces and claims to work with the Indian government." It explicitly frames the actors as
  "cyber-mercenaries"/"hacker-for-hire," not a state organ, and recommends that "[t]he
  Indian government … investigate cyberattacks linked to Innefu Labs." The strings "NTRO"
  and "National Technical Research" do not appear (apparent matches are substrings of
  "control"/"aria-controls"). Supports an India nexus at the nation level only — contributed
  to demoting in/ntro/donot-team → in/unscoped/donot-team.
