notes: |
  Amnesty Tech press release (article:published_time
  2021-07-20T00:34:09Z). BADRABBIT RE-SOURCE (2026-07-11,
  claude-opus-4.8/max): added for the precise world-leader hedge
  language, matching the sibling event's Latifa/Haya press-release
  phrasing ("selected as people of interest by clients of NSO Group").
  Carries verbatim:
    • "New evidence uncovered by the Pegasus Project has revealed that
      the phone numbers for 14 heads of state, including French President
      Emmanuel Macron, Pakistan's Imran Khan and South Africa's Cyril
      Ramaphosa, as well as hundreds of government officials, were
      selected as people of interest by clients of spyware company NSO
      Group."
    • "The unprecedented revelation that the phones of at least fourteen
      heads of state may have been hacked using NSO Group's Pegasus
      spyware should send a chill down the spine of world leaders."
  The hedge is explicit: "selected as people of interest" / "may have
  been hacked" — a selection/interest list, not confirmed compromise.
  Does not name Morocco as the France operator (that mapping is carried
  by the Guardian + Al Jazeera/Le Monde + The Local records).
