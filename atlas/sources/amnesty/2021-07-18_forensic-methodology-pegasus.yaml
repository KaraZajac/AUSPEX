notes: |
  Amnesty Security Lab forensic methodology for detecting Pegasus
  on iOS / Android devices; technical companion to the Pegasus
  Project journalism consortium reporting.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshotted + hashed. Technical
  forensics report (methodology, indicators, MVT tool; forensic cases
  are Morocco/Maati Monjib + Omar Radi, Saudi/Yahya Assiri, an Indian
  journalist, Hungary). Its ONLY UAE nexus is the Ahmed Mansoor forensic
  anchor (verbatim): "forensic records linking recent Pegasus infections
  back to the 2016 Pegasus payload used to target the HRD Ahmed Mansoor"
  and "we find references to 'bh' in the Pegasus iOS sample recovered
  from the 2016 attacks against UAE human rights defender Ahmed Mansoor,
  discovered by Citizen Lab and analysed in depth by … Lookout." Confirms
  the consortium scale ("more than 80 journalists from 17 media
  organizations in 10 countries coordinated by Forbidden Stories") and
  the 37-device forensic-confirmation figure. Does NOT carry the 2021
  Latifa/Haya/Khashoggi UAE-target specifics (0× each).
