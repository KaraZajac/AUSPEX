notes: |
  Amnesty Security Lab attribution of an October 2023 Donot Team
  Android-spyware campaign against Kashmiri journalists and civil
  society. Exact URL needs verification.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the DoNot Team SERVICE
  placement. This citation appears MISATTRIBUTED and could not be substantiated: the stored
  URL resolves to the generic Amnesty "Research Archives" page, and a Security Lab site search
  for "Donot" (snapshot captured here, https://securitylab.amnesty.org/search/Donot/) returns
  exactly ONE result — the 2021 Togo report — with no 2023-10-31 DoNot/Kashmir article and no
  "kashmir" string on the results page. Amnesty's October/December-2023 India reporting concerns
  Pegasus/NSO Group spyware (Siddharth Varadarajan, Anand Mangnale), a DIFFERENT actor from the
  DoNot Team. Flagged for source-integrity follow-up (likely retire or repoint to the 2021 Togo
  source / the Pegasus reporting as appropriate). Regardless, no Amnesty DoNot reporting names
  the NTRO or any Indian intelligence service (strings "NTRO"/"National Technical Research" absent).
  Contributed to demoting in/ntro/donot-team → in/unscoped/donot-team.
