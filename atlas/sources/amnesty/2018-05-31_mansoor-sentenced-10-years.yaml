notes: |
  Amnesty International news release documenting the post-disclosure
  coda to the 2016 Trident/Pegasus targeting: UAE human-rights
  defender Ahmed Mansoor was detained on 20 March 2017 and sentenced
  on 29 May 2018 to ten years' imprisonment (plus a 1,000,000-AED
  fine and three years' post-release surveillance) on speech-related
  charges — "publishing false information … to damage the UAE's
  reputation" via Facebook/Twitter posts. Amnesty designates him "a
  prisoner of conscience." Added 2026-07-05 to carry the arrest /
  sentence claims in the event summary, which postdate the two 2016
  disclosure sources (Citizen Lab, Lookout). Sourced snapshot
  captured; sha256 committed.
