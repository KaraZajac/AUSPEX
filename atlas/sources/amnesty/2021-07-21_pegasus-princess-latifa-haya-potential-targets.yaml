notes: |
  Amnesty International press release accompanying the Pegasus Project
  royal-family reporting. CREATED 2026-07-10 (claude-opus-4.8/max) as a
  badrabbit re-source for the UAE royal-family angle in event
  2021-07/pegasus-project-uae — the two previously-cited sources
  (Forbidden Stories "About" page + Amnesty forensic-methodology report)
  do NOT carry the Latifa/Haya/Khashoggi-family specifics (Latifa 0×,
  Haya 0×, Khashoggi 0× in both). This press release does, with the
  precise "potential targets"/"people of interest" hedge in its own words.

  Load-bearing verbatim quotes (from the captured raw):
    • "the phone numbers of Emirati princesses Latifa bint Mohammed Al
      Maktoum and Haya bint Hussein were listed as potential targets by
      clients of spyware company NSO Group in the 50,000 numbers leaked
      in the Pegasus Project investigation."
    • "the leak of 50,000 phone numbers of potential surveillance
      targets. These include heads of state, activists and journalists,
      including Jamal Khashoggi's family."
    • "Sheikha Latifa bint Mohammed Al Maktoum and her closest friends,
      as well as Princess Haya bint Hussein and her associates, were
      selected as people of interest by clients of NSO Group."
  Precision: the press release describes the selecting party generically
  as "clients of NSO Group" — it does NOT itself name the UAE/Dubai as
  the operator. The UAE nexus for the Latifa/Haya selections is a strong
  inference (Emirati princesses, daughter/ex-wife of the Ruler of Dubai)
  and is court-attested separately in event
  2021-05/ewhc-princess-haya-pegasus-fact-finding. Byline "21 July 2021".
