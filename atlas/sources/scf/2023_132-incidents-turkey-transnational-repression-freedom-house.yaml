notes: |
  SCF write-up of Freedom House's April-2023 report "Still Not Safe:
  Transnational Repression in 2022." Carries the verbatim aggregate
  figures used by the event: "Turkish authorities have committed 132
  incidents, or 15 percent of the total, of direct, physical
  transnational repression since 2014"; Turkey "the world's second
  most prolific perpetrator"; leading group "China, Turkey, Russia,
  Egypt and Tajikistan"; database of "854 direct, physical incidents."
  Entirely physical/legal repression — no cyber/digital/spyware
  content.
