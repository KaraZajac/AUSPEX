notes: |
  Primary Mozilla-governance-forum artifact: the DigitalTrust /
  DarkMatter appeal message (Benjamin Gabriel, 16 Jul 2019) on the
  mozilla.dev.security.policy list, which references and contests
  the Module Owner's decision — (1) rejection of the applicant's
  root inclusions, (2) prohibition of new root-inclusion requests
  from DigitalTrust, and (3) a bug for the additional distrust of
  existing intermediate CA certificates within the UAE national
  PKI — and confirms Kathleen Wilson's concurrence dated 2019-07-16.
  Used here to corroborate the decision structure and the
  concurrence date. Snapshotted live 2026-07-10 (curl HTTP 200,
  19,294 B; "DarkMatter" 30x, "Thayer" 3x, "inclusion" 8x).
