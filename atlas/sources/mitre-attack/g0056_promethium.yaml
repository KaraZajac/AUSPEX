notes: |
  MITRE ATT&CK group page for PROMETHIUM / StrongPity.
  AUDIT (2026-06-25, claude-opus-4.8/max): cited by tr/unscoped/promethium (formerly tr/mit/
  promethium). The G0056 page names NO attributing nation, sponsor, or confidence level. Full group
  description: "PROMETHIUM is an activity group focused on espionage that has been active since at
  least 2012. The group has conducted operations globally with a heavy emphasis on Turkish targets.
  PROMETHIUM has demonstrated similarity to another activity group called NEODYMIUM due to
  overlapping victim and campaign characteristics." "Turkish" qualifies the TARGETS only; the page
  carries no Türkiye attribution and no MİT mention. (This source does NOT support the prior actor
  claim that "MITRE attributes PROMETHIUM to Türkiye with moderate confidence", which was corrected
  in the actor record.) Contributed to the MİT-placement demotion.
