  MITRE ATT&CK group profile for Lazarus. Aggregates aliases and
  references vendor research. Used as a canonical alias-table
  reference.
  AUDIT (2026-06-25, claude-opus-4.8/max): corroborates the RGB
  placement of kp/rgb/lazarus by the actor's exact canonical name. The
  G0032 profile's opening line reads: "Lazarus Group is a North Korean
  state-sponsored cyber threat group attributed to the Reconnaissance
  General Bureau (RGB)." (named-actor → named-service.) Tertiary tier,
  so corroborative rather than load-bearing (the govt-primary OFAC 2019
  designation + 2021 DOJ indictment carry the KEEP). Captured raw on
  2026-06-25 (curl http 200, 410,125 bytes); raw term-scan "Reconnaissance
  General Bureau"=1, "RGB"=1, "Lazarus"=184. Tier preserved (tertiary).
