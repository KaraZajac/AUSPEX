  AUDIT (2026-06-24, claude-opus-4.8/max): live URL captured cleanly (HTTP 200,
  full group profile). Finding: attributes to the COUNTRY, not the ISI — "Transparent
  Tribe is a suspected Pakistan-based threat group that has been active since at least
  2013, primarily targeting diplomatic, defense, and research organizations in India
  and Afghanistan." The words "ISI" / "Inter-Services Intelligence" do NOT appear.
  Supports a Pakistan nexus but NOT the ISI service placement.
