  MITRE ATT&CK group page for SideWinder / Rattlesnake / RAZOR
  TIGER.
  AUDIT (2026-06-24, claude-opus-4.8/max): SideWinder service-placement audit. This source does NOT
  name the NTRO. Its group description reads, verbatim: "Sidewinder is a suspected Indian threat actor
  group that has been active since at least 2012." — "suspected Indian" at the state level, with no
  specific Indian service named. A standalone-word search for "NTRO" returns zero hits in the snapshot
  (every "ntro" substring is "Account Control"/"aria-controls"/"attacker controlled server"). Secondary
  source. Contributed to demoting the actor in/ntro/sidewinder → in/unscoped/sidewinder.
