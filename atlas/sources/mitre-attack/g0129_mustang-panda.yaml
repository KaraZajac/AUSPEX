notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cited by actor cn/unscoped/mustang-panda (formerly
  cn/mss/...). MITRE's own group description attributes Mustang Panda only at the NATION level:
  "Mustang Panda is a China-based cyber espionage threat actor that has been conducting operations
  since at least 2012." The captured page contains ZERO occurrences of "MSS" or "Ministry" — no
  service-level attribution. The "state-sponsored" / "PRC-Nexus" strings present on the page are
  titles of cited third-party references (e.g. Insikt Group "Chinese State-Sponsored Group
  'RedDelta'"; GTIG "PRC-Nexus Espionage Campaign"), not MITRE's attribution, and none names the
  MSS. Supports the MSS demotion to cn/unscoped.
