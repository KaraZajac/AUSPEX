  AUDIT (2026-06-24, claude-opus-4.8/max): used in the cn/mss/apt27 -> cn/unscoped/apt27 service
  demotion. MITRE attributes the group only at the NATION level: "Threat Group-3390 is a Chinese
  threat group that has extensively used strategic Web compromises to target victims... active since
  at least 2010" (the G0027 page now canonicalises the name as "Threat Group-3390"; APT27 / Emissary
  Panda / Linen Typhoon are listed as Associated Groups). No occurrence of "Ministry of State
  Security", "MSS", "PRC", or "state-sponsored" anywhere on the page — only "Chinese". Does NOT name
  the MSS as APT27's service.
