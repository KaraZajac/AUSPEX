notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): the genuine ClearSky report that ATTRIBUTES Pay2Key to Fox
  Kitten. Created during the 2020-08/pay2key-israeli-companies event audit to replace that event's
  mis-cited ClearSky source (clearsky/2020-02_fox-kitten, the Feb-2020 "Fox Kitten Campaign" espionage
  report, which predates Pay2Key by 9 months — Pay2Key first appeared Oct-Nov 2020 — and contains zero
  "Pay2Key" hits, so it cannot carry a Pay2Key attribution).

  Provenance: the clearskysec.com/pay2kitten/ landing page is Incapsula/bot-walled (returns a ~955-byte
  stub to curl/WebFetch), but the report PDF is served directly and un-walled at
  https://www.clearskysec.com/wp-content/uploads/2020/12/Pay2Kitten.pdf (HTTP 200, application/pdf,
  1,500,786 bytes, 28 pages) — that genuine PDF is the hashed raw_snapshot. PDF metadata: Title
  "Pay2Kitten report", Author "Ohad Zaidenberg" (ClearSky), CreationDate/ModDate 2020-12-17 06:35 EST —
  hence published_on 2020-12-17. Report series banner "Fox Kitten 2". archive_url null (archive.org is
  unfetchable from this environment; no verified Wayback capture).

  Attribution wording (state/APT-cluster level; does NOT name the IRGC — 0 hits for "IRGC"/"Revolutionary
  Guard"): "We estimate with medium to high confidence that Pay2Key is a new operation conducted by Fox
  Kitten, an Iranian APT group" (p.1); "we attribute the campaign to Fox Kitten (corresponding report
  published in February) with a medium-high level of confidence" (p.4). Fox Kitten is characterized as a
  collaboration of the Iranian offensive groups APT33 and APT34 (per its Feb-2020 Fox Kitten report) —
  named-actor granularity, no Iranian service named.
  Strategic-purpose (ideological/deniability) assessment: "We assess - with a medium level of confidence
  - that the Pay2Key campaign is aimed to create panic in Israel ... this operation is only a propaganda
  campaign to cause fear and to divert attention from Fox Kitten. That would explain the decision to leak
  the data instead of just demanding ransom" (p.4); "this campaign is part of the ongoing cyber
  confrontation between Israel and Iran" (p.4).
  Sectors / victims: "During October and November, we observed a wave of cyber-attacks on industrial and
  insurance companies. In November we observed a new wave of attacks on logistics companies" (p.3); "this
  actor conducts 'supply chain attacks' by compromising companies using ... information that was obtained
  in breached companies" (p.3; the Amital logistics-software compromise cascaded to further logistics
  firms); "dozens of Israeli companies" (p.1). Timeline (p.3): KeyBase leak account created June 2020;
  ransomware compiled + first confirmed victim + Swascan report Oct 2020; first Israel wave + Check Point
  report + Amital compromise Nov 2020; second (supply-chain) wave + this report Dec 2020. TTP overlap with
  Fox Kitten: VPN-vuln entry vector ("well-known vulnerabilities covered in our Fox Kitten reports"),
  reverse-proxy backdoors (FRPC / Go Proxy), lateral movement, C++ ransomware deployed after exfiltration.
