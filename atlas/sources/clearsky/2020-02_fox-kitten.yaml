notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cited to support Pioneer Kitten / Fox Kitten's service
  placement. Does NOT name the IRGC ("IRGC"/"Revolutionary Guard" = 0 hits in the full 38-page
  report). Its attribution section is titled "Attribution to Iranian APT Groups" and attributes the
  campaign to "state-sponsored Iranian APT groups" — specifically the "Iranian offensive groups
  (APT34 and APT33)" (plus APT39/Chafer), assessed "with medium probability ... working together
  since 2017." APT-cluster level, no Iranian service named — contributed to demoting the actor to
  ir/unscoped/pioneer-kitten. Raw capture: the live clearskysec.com page and its PDF are
  Incapsula-protected (returned a 212-byte bot-block stub to curl and to WebFetch), and archive.org
  is unfetchable from this environment; the hashed raw_snapshot is the genuine 38-page primary PDF
  (ClearSky-Fox-Kitten-Campaign-v1.pdf) retrieved from the blackorbird/APT_REPORT GitHub mirror.
