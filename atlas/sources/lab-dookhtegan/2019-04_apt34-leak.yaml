notes: |
  Anonymous Telegram leak; tertiary tier per analyst caveat,
  but materially exposed APT34 / MOIS link.
  The cited url (https://t.me/lab_dookhtegan) now resolves only to a generic Telegram "Contact"
  stub — the 2019 leak posts themselves are not retrievable there. raw_snapshot therefore captures
  the contemporaneous BleepingComputer report
  (https://www.bleepingcomputer.com/news/security/hacker-group-exposes-iranian-apt-operations-and-members/,
  2019-04-18), which preserves the leakers' verbatim message and the MOIS data exposure.
  AUDIT (2026-06-24, claude-opus-4.8/max): re. ir/mois/apt34 service placement. This is the ONE cited
  source that names the MOIS specifically as APT34/OilRig's operating service. Leakers' own message
  (quoted by BleepingComputer): "We are exposing here the cyber tools (APT34 / OILRIG) that the
  ruthless Iranian Ministry of Intelligence has been using against Iran's neighboring countries,
  including names of the cruel managers". The dump also "leaked the names and phone numbers of some
  individuals working for the Iranian Ministry of Intelligence (data on its employees is classified)".
  This source carries the ir/mois placement. CAVEAT: it is tertiary (anonymous self-attributing leak),
  not an independent attributing authority; the tier-1 vendors (Mandiant, Symantec) and the MISP
  "OilRig" galaxy describe the group only as "Iranian", not MOIS.
