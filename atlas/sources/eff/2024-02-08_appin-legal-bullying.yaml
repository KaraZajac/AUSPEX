notes: |
  First-party account of EFF's representation of Techdirt and
  MuckRock Foundation against the Association of Appin Training
  Centers (AOATC) takedown demands. Key language: "a campaign of
  bullying and censorship seeking to wipe out stories about the
  mercenary hacking campaigns of a less well-known company, Appin
  Technology, in general, and the company's cofounder, Rajat Khare,
  in particular. These efforts follow a familiar pattern: obtain a
  court order in a friendly international jurisdiction and then
  misrepresent the force and substance of that order to bully
  publishers around the world to remove their stories." States the
  Indian order "is only interim and not a final judgment that
  Reuters' reporting was false, and that it only requires Reuters
  and Google to do anything," and that it would be "inconsistent
  with the First Amendment and would be unenforceable in US courts
  pursuant to the SPEECH Act." Refers to the injunction as "the
  Pandey order" (issuing judge); reproduces AOATC's demand emails
  citing the Contempt of Courts Act, 1971; notes Ron Deibert
  received a similar demand. Tier primary: EFF is a first-party
  actor here (its own client letters are the document).
