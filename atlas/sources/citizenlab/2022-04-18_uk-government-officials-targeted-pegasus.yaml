notes: |
  Citizen Lab discloses that between 2020 and 2021 they observed
  and notified the UK government of multiple suspected Pegasus
  spyware infections within official UK networks. The 10 Downing
  Street suspected infection (Prime Minister's Office, 2020) was
  attributed by Citizen Lab to a Pegasus operator they assessed
  as the United Arab Emirates. Suspected infections at the UK
  Foreign and Commonwealth Office were attributed to operators
  assessed as UAE, India, Cyprus, and Jordan. Disclosure is
  contemporaneous with Citizen Lab's CatalanGate publication
  (same week). Attribution rests on Citizen Lab's longstanding
  Pegasus operator-infrastructure tracking methodology.
