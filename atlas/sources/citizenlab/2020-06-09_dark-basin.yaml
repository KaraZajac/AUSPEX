notes: |
  Citizen Lab's foundational attribution of the "Dark Basin"
  hack-for-hire campaign (targeting NGOs, journalists, financial
  short-sellers, public officials) to BellTroX InfoTech Services in
  Delhi, India.
  SNAPSHOT (2026-07-10, claude-opus-4.8/max): live curl 200, full
  report captured (223,206 bytes, sha256 86d192a0…). The record's
  /2020/06/ URL 301-redirects to the canonical /research/dark-basin…
  path (same article) — url left unchanged (working redirect, not a
  defect). Verbatim key claims verified: "With high confidence, we
  link Dark Basin to BellTroX InfoTech Services"; "Dark Basin likely
  conducted commercial espionage on behalf of their clients";
  "targeted thousands of individuals and hundreds of institutions on
  six continents"; enumeration "uncovered 27,591 different long URLs,
  each of which led to a Dark Basin credential phishing website";
  "Sumit Gupta, was indicted in California in 2015 for his role in a
  similar hack-for-hire scheme." Report does NOT contain the strings
  "10,000", "seven years", or "Azari" (those are Reuters' / a later
  matter).
