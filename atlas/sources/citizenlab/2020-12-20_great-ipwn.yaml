notes: |
  Citizen Lab forensic disclosure of Pegasus iMessage zero-click
  targeting of 36 personal phones belonging to Al Jazeera
  journalists and one Al Araby TV journalist. Citizen Lab
  attributed the operations to two clusters with high confidence:
  one consistent with Saudi Arabian operations, one consistent
  with UAE operations. Foundational source for UAE-attributed
  targeting of Qatari-affiliated journalism.
