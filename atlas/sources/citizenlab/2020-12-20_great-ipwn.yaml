notes: |
  Citizen Lab forensic disclosure of Pegasus iMessage zero-click
  targeting of 36 personal phones belonging to Al Jazeera
  journalists and one Al Araby TV journalist. Citizen Lab
  attributed the four operator clusters and concluded with MEDIUM
  confidence that SNEAKY KESTREL acts on behalf of the UAE
  Government and MONARCHY on behalf of the Saudi Government.
  Foundational source for UAE-attributed targeting of Qatari-
  affiliated journalism.
