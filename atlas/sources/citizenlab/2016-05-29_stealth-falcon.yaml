notes: |
  Citizen Lab disclosure of the Stealth Falcon operator cluster
  targeting Emirati journalists, activists, and dissidents from
  2012 onward via fake-Twitter spear-phishing personae and
  custom Windows malware. Documents the targeting of UK-based
  journalist Rori Donaghy.
  AUDIT (2026-06-24, claude-opus-4.8/max): read in full from the captured raw snapshot to
  verify the Stealth Falcon SERVICE placement. Citizen Lab attributes only to the UAE
  government, at a circumstantial level — verbatim: "Circumstantial evidence suggests a link
  between Stealth Falcon and the UAE government." The report frames Stealth Falcon as "a
  sophisticated operator, which we call Stealth Falcon." It does NOT name DarkMatter, CyberPoint,
  or any UAE intelligence service: "DarkMatter"/"Dark Matter" = 0 occurrences, "CyberPoint" = 0,
  "Project Raven" = 0 (vs UAE mentioned 152×). On the strength of this (the actor's primary
  attribution source), ae/darkmatter/stealth-falcon was demoted to ae/unscoped/stealth-falcon.
