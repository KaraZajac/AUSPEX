notes: |
  Citizen Lab documentation of Türk Telekom-mediated ISP-level
  injection delivering StrongPity / PROMETHIUM payloads in Türkiye
  and Syria.
  AUDIT (2026-06-25, claude-opus-4.8/max): cited by tr/unscoped/promethium (formerly tr/mit/
  promethium). This report attributes the operation only at the nation-state level and explicitly
  calls the malware unattributed: "StrongPity was an unattributed APT operation in 2016 that
  primarily targeted individuals in Italy and Turkey"; the injection redirects users "to
  nation-state spyware", using FinFisher "lawful intercept" spyware that FinFisher "asserts is
  sold only to government entities." It DOES name the MİT, but only as surveillance-LAW background,
  not as operational attribution: "The law authorizes the Turkish intelligence agency, Milli
  İstihbarat Teşkilatı (MIT), to 'collect data relating to external intelligence, national defense,
  terrorism, international crimes and cyber security passing via telecommunication channels.'"; and
  "MIT's practical implementation of the 2014 national security laws requires the cooperation of
  the Turkish telecommunications sector, which is centralized around Türk Telekom." Citizen Lab's
  own "attribution" section concerns attributing the injection MIDDLEBOX to Sandvine PacketLogic —
  not the operation to MİT. This source therefore does NOT name the MİT as the operator; it is the
  basis for retaining a Turkish-state nexus while demoting the MİT-specific placement.
  AUDIT (2026-06-28, claude-opus-4.8/max): hash re-verified (f2f803b7…d6b043fe, 321174 bytes) during
  the event 2018-03/citizenlab-bad-traffic-strongpity audit; tier primary confirmed (first-party
  Citizen Lab primary research). Operator attribution is NATION-level and hedged ("may have been used
  by government-linked entities"; "likely by nation-states or ISPs"); StrongPity is called "an
  unattributed APT operation in 2016" — so the event attribution was set moderate / nation and the
  doctrine link downgraded to plausible.
