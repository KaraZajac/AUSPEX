  # AUDIT 2026-07-01 (claude-opus-4.8/max): raw snapshot captured (238,269 bytes,
  # sha256 55e83331…3a7c5dbb). Confirmed real first-party Citizen Lab report
  # "Missing Link" (Research Report No. 123). Report coins operator cluster
  # "POISON CARP"; names NO pre-existing group (0 of Mustang Panda/RedDelta/TA416/
  # RedAlpha) and NO Chinese service (0 of MSS/PRC/Ministry). iOS chain "was not a
  # zero-day exploit when we observed it" (n-day). tier: primary retained.
  Citizen Lab disclosure of "Poison Carp" — a campaign using
  WhatsApp and chat-app messages with one-click URLs that
  exploited iOS and Android browser-renderer chains to install
  custom mobile spyware on devices belonging to senior figures
  in Tibetan groups, the Office of His Holiness the Dalai Lama,
  the Central Tibetan Administration, and Tibetan parliamentarians.
  Operator infrastructure overlaps with prior Citizen Lab
  reporting on PRC-nexus Tibetan-diaspora targeting.
