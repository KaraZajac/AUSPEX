notes: |
  Citizen Lab internet-scanning / DNS-cache-probing methodology
  grouping Pegasus C&C fingerprints into 36 suspected operators
  and linking their suspected infections to 45 countries. UAE
  identified among the operator-state set; Citizen Lab names "at
  least two [operators] that appear to predominantly focus on the
  UAE" — the operators FALCON, BABYFALCON, and MAYBEFALCON.
  AUDIT 2026-06-28 (claude-opus-4.8/max): snapshot captured + hashed
  (sha256 2066d892…6719beba, 219401 B); real article confirmed (NOT a
  phantom). Corrected fabricated operator names "Pegasus-1/2/3"
  (these appear nowhere in the report) to the actual Citizen Lab
  codenames FALCON / BABYFALCON / MAYBEFALCON. tier secondary→primary
  (first-party original research). Citizen Lab caveats that the
  45-country list "necessarily includes countries that are not NSO
  Group customers" (VPN/satellite geolocation error) and names no
  government agency.
