notes: |
  Citizen Lab disclosure of a long-running credential-phishing
  operation against Tibetan civil-society organizations. Lure
  emails impersonated trusted community organizations,
  individuals, and Google account-warning messages, directing
  victims to Gmail-clone phishing pages. Operator infrastructure
  was inexpensive (commodity VPS, Google services). Citizen
  Lab does not assert state attribution but the target set
  (Tibetan diaspora civil society) is canonical for PRC-aligned
  operators.
