notes: |
  Citizen Lab analysis demonstrating that images and documents
  sent in chats between non-Chinese WeChat accounts are
  subjected to political-content classification by Tencent
  servers and added to keyword surveillance lists that are
  then enforced against China-registered accounts. Establishes
  that non-China-resident users of WeChat are effectively
  generating training data for the PRC's domestic-censorship
  apparatus.
