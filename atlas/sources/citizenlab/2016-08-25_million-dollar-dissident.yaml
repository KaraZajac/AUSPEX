notes: |
  First major forensic-chain disclosure of NSO Group Pegasus
  deployment by a customer state (the UAE) against an identified
  individual (Ahmed Mansoor). Cited the "Trident" exploit chain
  (CVE-2016-4655 / 4656 / 4657, three iOS zero-days). Foundational
  document for the UAE-as-Pegasus-customer-state evidentiary chain.
