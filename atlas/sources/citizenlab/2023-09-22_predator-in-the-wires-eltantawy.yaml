notes: |
  Citizen Lab Report No. 171 (Marczak, Scott-Railton, Roethlisberger, Abdul Razzak,
  Anstis, Deibert), the companion to Google TAG's same-day disclosure. Added 2026-06-24
  as the second source for the Eltantawy + Egyptian-government claims, which the cited
  Google TAG blog post does NOT state in its prose (TAG only links to this report and
  locates the campaign "in Egypt"). archive_url null: archive.org fetch blocked during
  audit; live URL captured to raw + hashed instead.
  AUDIT (2026-06-24, claude-opus-4.8/max): resolves (HTTP 200; live URL redirects to the
  /research/ path) and matches the citation. Establishes (a) the target — "former Egyptian
  MP Ahmed Eltantawy ... chairman of Egypt's al-Karama political party ... announced his
  intention to run in the upcoming Egyptian presidential election"; (b) the VENDOR — "We
  attribute the spyware to Cytrox's Predator spyware with high confidence" (Cytrox = the
  Intellexa-alliance company behind Predator); (c) the CUSTOMER-STATE at HIGH confidence:
  "As Egypt is a known customer of Cytrox's Predator spyware, and the spyware was delivered
  via network injection from a device located physically inside Egypt, we attribute the
  attack to the Egyptian government with high confidence." Same iOS chain
  (CVE-2023-41991/41992/41993) and same MITM/network-injection delivery (c.betly[.]me) as TAG.
