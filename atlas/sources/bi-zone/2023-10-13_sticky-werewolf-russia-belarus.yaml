notes: |
  BI.ZONE Threat Intelligence's primary public report naming the
  Sticky Werewolf cluster: phishing of public organizations in
  Russia and Belarus for espionage; activity "traced back to April
  2023 with at least 30 attacks to date"; commodity Ozone RAT /
  Darktrack RAT delivered via IP Logger-generated phishing links
  (.exe/.scr masquerading as Word/PDF), Themida obfuscation; decoy
  documents include an EMERCOM of Russia emergency warning, a court
  claim application, and (for Belarusian orgs) a legal-code-violation
  notice. The report names NO operator, sponsor, or nation and does
  not reference CERT-UA or UAC-0050; Russia and Belarus appear as
  VICTIMS ("Public organizations in Russia and Belarus remain a
  popular target for espionage").

