notes: |
  Public US-government attribution of the February 2014 Las
  Vegas Sands Corp destructive attack to Iran.

  AUDIT 2026-07-10: snapshot captured via archive.org (29-page
  scanned PDF, 1.5MB, ScanSnap-scanned original Statement for the
  Record, created 2015-02-24 for the 2015-02-26 SASC hearing; image-
  only, verified by rendering pages to image and reading). The Iran /
  Sands attribution is in the Cyber section, Threat Actors → Iran
  (document p.3): "Iran. Iran very likely values its cyber program as
  one of many tools for carrying out asymmetric but proportional
  retaliation against political foes, as well as a sophisticated means
  of collecting intelligence. Iranian actors have been implicated in
  the 2012-13 DDOS attacks against US financial institutions and in
  the February 2014 cyber attack on the Las Vegas Sands casino
  company." NB the attribution verb is the hedged "have been implicated
  in" and names "Iranian actors" (nation-level) — NOT the IRGC or any
  named service; contrast the same passage's North Korea/Sony line
  ("The North Korean Government was responsible for …"). The written
  statement calls it a "cyber attack" (not "destructive"); the
  "destructive"/Sony-parallel framing appears in the oral testimony /
  press coverage.

