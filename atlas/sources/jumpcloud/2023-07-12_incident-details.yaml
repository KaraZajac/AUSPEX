notes: |
  AUDIT (2026-07-02, claude-opus-4.8/max): first-party JumpCloud incident
  narrative (Bob Phan), written 2023-07-12, "Updated on September 20, 2023."
  Created during the jumpcloud-supply-chain event audit because the sibling
  record jumpcloud/2023-07-12_post-incident (title "Customer Update — Security
  Incident") actually resolves to the IOC list page, which carries none of the
  narrative/attribution claims. Snapshot sha256 97e5b226…f1effa31 (219,988 B).
  Supporting quotes (verbatim):
  - "today we are publishing details of activity by a sophisticated nation-state
    sponsored threat actor that gained unauthorized access to our systems to
    target a small and specific set of our customers."
  - "On June 27 at 15:13 UTC we discovered anomalous activity on an internal
    orchestration system which we traced back to a sophisticated spear-phishing
    campaign perpetrated by the threat actor on June 22."
  - "On July 5 at 03:35 UTC, we discovered unusual activity in the commands
    framework for a small set of customers."
  - "we identified and CrowdStrike confirmed the nation-state actor involved was
    North Korea. Importantly, fewer than 5 JumpCloud customers were impacted and
    fewer than 10 devices total were impacted, out of more than 200,000
    organizations…"
  ATTRIBUTION-LATENCY NB: the July 12 disclosure named only "a sophisticated
  nation-state sponsored threat actor" (no nation); the "North Korea" naming +
  CrowdStrike credit appear in the September 20, 2023 update.
