  Uptycs Threat Research (Tejaswini Sandapolla) first-party original disclosure of the
  Transparent Tribe / APT-36 campaign that delivered the Poseidon Linux backdoor via a
  trojanized clone of the Indian-government Kavach 2FA application.

  AUDIT (2026-06-27, claude-opus-4.8/max): raw captured + hashed (above; 169,570 bytes,
  page meta "datePublished": "2023-04-17 21:30:00"). First-party vendor original research
  -> tier primary (consistent with corpus tiering of vendor original-research disclosures).
  Created to RE-SOURCE event 2023-01/cyfirma-transparent-tribe-government, whose prior
  citation (cyfirma/2023-01-18_transparent-tribe-government-targeting) is a phantom
  (URL = cyfirma.com/research/ catalogue, no article). Supporting quotes (verbatim):
   - Attribution: "This Pakistan-based advanced persistent threat group is notorious for
     targeting Indian government organizations, military personnel, and defense contractors."
     / "APT-36, aka Transparent Tribe, primarily targets Indian government organizations,
     military personnel, and defense contractors." (named-actor + nation; no Pakistani
     service/ISI named).
   - Kavach: "Transparent Tribe created a backdoored version of Kavach to target Linux
     users working for Indian government agencies." / "Kavach is a two-factor
     authentication (2FA) solution provided by the Indian government for secure access to
     their email services."
   - Poseidon: "Poseidon is a second-stage payload malware associated with Transparent
     Tribe." / "It is a general-purpose backdoor that provides attackers with a wide range
     of capabilities to hijack an infected host." Payload is "a Golang ELF binary; GO
     version 1.17.8 ... an unsigned Poseidon payload in MythicAgents" (Mythic-framework
     agent).
   - Scope is the LINUX expansion, not a Windows variant of this implant: "APT-36 is known
     to have exploited various platforms, including Windows and Android." + "Now APT 36 has
     started targeting Linux users, too."
