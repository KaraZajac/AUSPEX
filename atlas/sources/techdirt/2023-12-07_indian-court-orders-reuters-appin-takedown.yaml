notes: |
  First substantial press-freedom coverage of the Reuters/Appin
  takedown. Quotes the Reuters editor's note verbatim: "Reuters has
  temporarily removed the article 'How an Indian startup hacked the
  world' to comply with a preliminary court order issued on Dec. 4,
  2023, in a district court in New Delhi, India. Reuters stands by
  its reporting and plans to appeal the decision. The article,
  published Nov. 16, 2023, was based on interviews with hundreds of
  people, thousands of documents, and research from several
  cybersecurity firms. The order was issued amid a pending lawsuit
  brought against Reuters in November 2022." Also notes that, as of
  Dec 7, 2023, "the SentinelOne report appears to still be online."
