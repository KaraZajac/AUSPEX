notes: |
  Covers the vacatur and republication. Quotes Reuters' new
  editor's note: "This article, originally published on Nov. 16,
  2023, was removed from Reuters.com in response to a temporary
  injunction issued by a New Delhi district court on Dec. 4,
  2023... On Oct. 3, 2024, the district court vacated its
  injunction. The article has now been reposted here, with an
  update in paragraph 14 to note that there's no suggestion that
  bona fide students of the training centers were involved in
  hacking." Quotes the court's Oct 3, 2024 order: "the plaintiff
  has not been able to show any prima facie case to make
  interference in the process of journalism. The interim injunction
  application of the plaintiff is dismissed." Notes the article
  "was unavailable for nearly a year" and that Appin-side interests
  "had gone around using various law firms (including... US law
  firm Clare Locke) to demand publications remove articles." Links
  the restored article at
  https://www.reuters.com/investigates/special-report/usa-hackers-appin/
  (the canonical URL of the restored investigation).
