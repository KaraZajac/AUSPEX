  It corroborates the resurgence: Pay2Key "attributed to the Iranian state-aligned group Fox Kitten"
  ("IRGC" appears only re an unrelated front company, Mahak Rayan Afraz / IRGC-CEC — never Fox Kitten);
  "In 2025, the group resurfaced as Pay2Key.I2P, operating a highly professionalized Ransomware-as-a-
  Service (RaaS) platform heavily reliant on the anonymous I2P network. Utilizing a variant of the
  potent Mimic ransomware ... aiming to tap into the Russian cybercrime underworld"; the RaaS offers
  "Special advantageous conditions for Iran's friends" and "increasing the affiliate's cut from 70% to
  80% - if they successfully execute attacks against designated 'enemies' of Iran, primarily the United
  States and Israel"; the group has "expanded its operations to act as a punitive arm of the Iranian
  state" for "geopolitical retribution," and "specifically targeted US healthcare organizations."
