notes: |
  KELA analysis of the December 2025 Handala leak claimed against
  former Israeli PM Naftali Bennett. KELA's forensic analysis
  concluded the leaked data originated from Bennett's Telegram
  account, not from compromise of his iPhone as the persona
  claimed. The blog also documents Handala's December 2023
  launch and operational history.
