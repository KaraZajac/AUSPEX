notes: |
  Full un-paywalled syndication of the Bloomberg News scoop (Turton & Mehrotra, 2021-06-04,
  "Hackers Breached Colonial Pipeline Using Compromised Password"), which first reported the
  Mandiant/Charles Carmakal finding on the initial-access vector. Added 2026-07-10
  (claude-opus-4.8/max) as the clean carrier for the compromised-VPN-credential / no-MFA vector —
  a load-bearing event claim that NONE of the three cited US-govt sources documents (the Bloomberg
  original is paywalled and its archive.org capture renders only a partial). URL resolved HTTP
  200; raw hashed (299,119 bytes, f2e0dadd…9eb44422). Verbatim support: "Hackers gained entry
  into the networks of Colonial Pipeline Co. on April 29 through a virtual private network
  account, which allowed employees to remotely access the company's computer network, said
  Charles Carmakal, senior vice president at cybersecurity company Mandiant, part of FireEye Inc."
  ; "The account was no longer in use at the time of the attack but could still be used to access
  Colonial's network"; "The VPN account, which has since been deactivated, didn't use multifactor
  authentication, a basic cybersecurity tool, allowing the hackers to breach Colonial's network
  using just a compromised … [password]"; "The account's password has since been discovered inside
  a batch of leaked passwords on the dark web." (Establishes the April 29 initial VPN access,
  distinct from the May 7 ransomware execution/shutdown.)
