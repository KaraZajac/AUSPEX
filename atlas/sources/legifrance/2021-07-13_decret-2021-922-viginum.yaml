notes: |
  Authoritative establishing text of VIGINUM. Décret n° 2021-922
  du 13 juillet 2021 (signature "Fait le 13 juillet 2021" —
  Emmanuel Macron / Premier ministre Jean Castex / ministre de la
  transformation et de la fonction publiques Amélie de Montchalin;
  JORF n°0161 publication 14 juillet 2021). Creates, auprès du
  secrétaire général de la défense et de la sécurité nationale, a
  "service à compétence nationale dénommé « service de vigilance et
  de protection contre les ingérences numériques étrangères »"
  (VIGINUM is the operational/common name; the acronym is not in
  the décret itself). Article 3 charges the service to "1° Détecter
  et caractériser, en analysant les contenus accessibles
  publiquement sur les plateformes en ligne … les opérations …
  notamment lorsque celles-ci sont de nature à altérer
  l'information des citoyens pendant les périodes électorales …;
  2° Assister le secrétaire général de la défense et de la sécurité
  nationale" in interministerial protection. Chapitre Ier gives the
  SGDSN "de nouvelles attributions lui permettant d'identifier les
  opérations d'ingérence numérique étrangères de nature à porter
  atteinte aux intérêts fondamentaux de la Nation, d'analyser leurs
  effets ainsi que d'animer et de coordonner au niveau
  interministériel la protection de l'État". Articles 5-7 institute
  a comité éthique et scientifique. NB: the mandate is DÉTECTER ET
  CARACTÉRISER — the décret contains no public-attribution /
  "attribuer" mandate ("Attributions" appears only as the SGDSN's
  competences, Chapitre Ier title).

