notes: |
  Authoritative establishing text situating COMCYBER inside the
  état-major des armées. Arrêté du 4 mai 2017 modifiant
  l'organisation de l'état-major des armées, signed by Jean-Yves
  Le Drian (Ministre de la Défense); JORF n°0106 du 5 mai 2017.
  Adds the "officier général commandant de la cyberdéfense" to the
  EMA organisation, whose attributions are fixed by article
  D. 3121-24-2 du code de la défense, and institutes the
  état-major de la cyberdéfense (pôles opérations / innovation-
  ressources / développement-stratégie). This is the load-bearing
  primary for the exact stand-up date (4 mai 2017) and the signing
  minister (Le Drian).

  AUDIT (2026-07-11, claude-opus-4.8 / max): the live Légifrance URL
  returns HTTP 403 (DataDome bot wall) to curl, and NO Internet
  Archive capture of JORFTEXT000034581382 exists in any URL form
  (Wayback "available" API + CDX search both empty; a fresh Save
