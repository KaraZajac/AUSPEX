notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): created + snapshotted (HTTP 200,
  187,899 bytes) to carry Flame's Windows-Update man-in-the-middle propagation
  and its fraudulently Microsoft-signed WU payloads — facts the Flame event
  asserted but which the May-28 Q&A source (kaspersky/2012-05-28_flame-skywiper)
  does NOT carry. Verbatim (Alexander Gostev): "The Flame malware uses several
  methods to replicate itself. The most interesting one is the use of the
  Microsoft Windows Update service. This is implemented in Flame's 'SNACK',
  'MUNCH' and 'GADGET' modules"; and "The archives that contain malicious code
  are signed by 'MS' in Dec 2010 and Nov 2011". Cited by: 2012-05/flame.
