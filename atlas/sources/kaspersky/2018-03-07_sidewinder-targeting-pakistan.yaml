notes: |
  Kaspersky's Q1 2018 APT trends report includes the first
  Western-vendor naming of SideWinder and dissection of the
  cluster's Pakistani-military targeting.
  AUDIT (2026-06-24, claude-opus-4.8/max): SideWinder service-placement audit. This source does NOT
  name the NTRO. Its only state/origin claim is, verbatim: "Sidewinder – An actor mainly targeting
  Pakistan military targets, active since at least 2012. We have low confidence that this malware
  might be authored by an Indian company." — i.e. an unnamed Indian *company* at LOW confidence, not
  the National Technical Research Organisation and not the Indian state directly. Contributed to
  demoting the actor in/ntro/sidewinder → in/unscoped/sidewinder.
