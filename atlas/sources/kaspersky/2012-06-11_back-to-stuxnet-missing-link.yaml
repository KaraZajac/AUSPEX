notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): created + snapshotted (HTTP 200,
  188,099 bytes) to carry the Flame<->Stuxnet code link and to CORRECT the
  Flame event's prior FALSE "Tilded Platform authorship" claim. Verbatim
  (Alexander Gostev): "this is how we discovered the incredible link between
  Flame and Stuxnet. Resource 207 ... Resource '207' is 520,192 bytes in size
  and can be found in the 2009 version of Stuxnet"; and decisively "Two weeks
  ago, when we announced the discovery of the Flame malware we said that we saw
  no strong similarity between its code and programming style with that of the
  Tilded platform which Stuxnet and Duqu are based on. Flame and Tilded are
  completely different projects based on different architectures". I.e. the two
  development teams cooperated / shared an early module, but Flame itself is NOT
  on the Tilded (Stuxnet/Duqu) platform. Cited by: 2012-05/flame.
