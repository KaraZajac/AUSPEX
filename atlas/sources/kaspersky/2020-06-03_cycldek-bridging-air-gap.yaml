notes: |
  Kaspersky disclosure of an updated Cycldek / Goblin Panda
  toolset including a USB-bridge component ("USBCulprit") for
  exfiltration from air-gapped Vietnamese government networks.
  Targets concentrated in Vietnam, Laos, and Thailand. Reinforces
  Cycldek's standing assignment as a PRC-nexus regional operator
  focused on SE Asian governments.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the cn/mss service placement of
  cn/mss/cycldek. This source names NO Chinese service — 0 occurrences of "Ministry of State
  Security"/"MSS" in the captured raw article — and makes only a language-level attribution:
  "Cycldek is a long-known Chinese-speaking threat actor" (Background), reinforced by "commodity
  malware like PlugX, that was typically leveraged by Chinese-speaking actors." The word "China"
  as a nation does not appear; other China references are tool provenance ("Chinese hacker forums").
  On this evidence the actor was DEMOTED cn/mss/cycldek → cn/unscoped/cycldek, and the thinness of
  the nation-level attribution (language inference only) was flagged. Raw HTML snapshot captured +
  hashed for reproducibility.
