notes: |
  Kaspersky disclosure of an updated Cycldek / Goblin Panda
  toolset including a USB-bridge component ("USBCulprit") for
  exfiltration from air-gapped Vietnamese government networks.
  Targets concentrated in Vietnam, Laos, and Thailand. Reinforces
  Cycldek's standing assignment as a PRC-nexus regional operator
  focused on SE Asian governments.
