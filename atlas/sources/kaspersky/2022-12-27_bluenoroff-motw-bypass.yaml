notes: |
  Kaspersky disclosure of new BlueNoroff (DPRK Lazarus
  financially-motivated subcluster, RGB) techniques for
  bypassing Mark-of-the-Web protections on Windows.
  ~70 fake domains impersonating venture-capital firms
  documented; victim set is cryptocurrency-startup
  executives and developers globally. Documents the
  BlueNoroff tradecraft that underwrites the long-tail
  cryptocurrency-firm thefts of 2023-2024.
