  Kaspersky's foundational analysis of the StrongPity malware
  family.
  AUDIT (2026-06-25, claude-opus-4.8/max): cited by tr/unscoped/promethium (formerly tr/mit/
  promethium). This report makes NO nation/state/service attribution — it is a pure malware/TTP
  analysis. "Turkey" appears only as victim geolocation ("almost all of the focus on systems in
  Turkey"; the top-five infected countries are "Italy, Turkey, Belgium, Algeria, and France").
  It does not name the MİT, the Turkish government, or any sponsoring entity. Supports nothing
  above the activity-cluster level; contributed to the MİT-placement demotion.
