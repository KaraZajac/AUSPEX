notes: |
  Kaspersky's 2024 SideWinder update including the StealerBot
  framework dissection and Gulf / Africa expansion.
  URL corrected 2026-05-29 (Agent2): Securelist canonical slug is
  /sidewinder-apt/114089/ (post-exploitation framework analysis),
  not /sidewinder-apt-attacks-stealerbot/. Fetched title:
  "SideWinder APT's post-exploitation framework analysis | Securelist".
  AUDIT (2026-06-24, claude-opus-4.8/max): SideWinder service-placement audit. This source does NOT
  name the NTRO. Its Attribution section reads, verbatim: "We attribute these activities to the
  SideWinder APT group with medium/high confidence." — attribution is to the activity cluster, with no
  state operator named. The only occurrence of "India" in the report is as a *victim* country: the
  attacker "targeted diplomatic entities in the following countries: Afghanistan, France, China, India,
  Indonesia and Morocco." A standalone-word search for "NTRO" returns zero hits in the snapshot (every
  "ntro" substring is "controlled"/"Control Flow"/a "intro_toddycat" URL slug). Contributed to demoting
  the actor in/ntro/sidewinder → in/unscoped/sidewinder.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot hash re-verified (sha256 2c3a6883…f7af4537,
  373,244 bytes — matches content_sha256). Now also cited by event
  2024-01/sidewinder-bhutan-bangladesh-continuation as the re-grounding source replacing the phantom
  bitdefender/2024-01_sidewinder-bhutan-bangladesh-continuation. Quotes relied on there, verbatim from
  this snapshot: victim countries "Bangladesh, … Sri Lanka …"; sectors "government and military
  entities, logistics, infrastructure and telecommunications companies, financial institutions,
  universities and oil trading companies"; spoof subdomains navy-lk[.]direct888[.]net,
  srilanka-navy[.]lforvk[.]com, mod-gov-bd[.]direct888[.]net; "We attribute these activities to the
  SideWinder APT group with medium/high confidence"; RTF forged to exploit CVE-2017-11882.
