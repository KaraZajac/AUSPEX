notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): re-verified as a cited source of the full
  6-point audit of event 2015-03/casper-syria-eset-disclosure. content_sha256
  25c24574…066e5 (180845 bytes) RE-VERIFIED unchanged. NOT a phantom / NOT the securelist
  homepage — genuine article (<title> "Animals in the APT Farm | Securelist"). Corroborates
  cluster membership: "some of the Trojans used by the Animal Farm group … the group
  deployed the Casper Trojan via a watering-hole attack in Syria." Does NOT attribute to
  France (sole "French" occurrence = the Occitan-etymology aside), names no DGSE / service.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw + hashed for the
  fr/dgse/animal-farm service-placement audit. This post does NOT attribute the
  Animal Farm cluster to France at all — its only "France"/"French" occurrences are
  an Occitan-language etymology aside about the string "Ta Fa Calou" ("the French
  interpretation of the Occitane 'Fa Calor'"). It names no intelligence service,
  no DGSE. Supports cluster membership only, not the DGSE placement; contributed to
  demoting the actor fr/dgse/animal-farm → fr/unscoped/animal-farm.
  AUDIT (2026-06-24, claude-opus-4.8/max): re-checked as a cited source of the
  fr/dgse/casper-actor service-placement audit (same finding). Does NOT attribute to
  France at all; literal "DGSE" does not occur. Its only "France"/"French" occurrence is
  an Occitan-etymology aside on the attacker's internal tool name "Ta Fa Calou" — "'Fa
  Calou' is the French interpretation of the Occitane 'Fa Calor' which means 'it's getting
  hot'"; Occitan "is a Romance language spoken in southern France." Supports cluster
  membership (Tafacalou as the validator/1st-stage Trojan fronting Babar/Dino) only, names
  no intelligence service. Contributed to demoting fr/dgse/casper-actor →
  fr/unscoped/casper-actor. raw_snapshot/content_sha256 unchanged (verified OK).
  AUDIT (2026-06-24, claude-opus-4.8/max): re-checked as the 2nd cited source of the
  fr/dgse/snowglobe-actor service-placement audit (same finding). raw_snapshot re-hashed
  OK (content_sha256 25c24574…066e5 unchanged). A grep of the 180 KB snapshot finds no
  "DGSE", no "Technical Directorate", no "French intelligence" / "intelligence agency" — its
  sole "France"/"French" occurrence remains the Occitan-etymology aside ("a Romance language
  spoken in southern France"). Names no service; supports cluster membership only. Contributed
  to demoting fr/dgse/snowglobe-actor → fr/unscoped/snowglobe-actor.
  Kaspersky GReAT's omnibus analysis that names the Animal Farm
  tooling family — Babar, Casper, Bunny / EvilBunny, NBot, Dino,
  Tafacalou — as members of a single operator's toolkit. The post
  is the canonical AUSPEX reference for cluster-membership decisions:
  any tool not listed in this post and subsequent Kaspersky /
  ESET updates is treated as adjacent rather than confirmed
  Animal Farm. Kaspersky does not formally attribute to France
  but its framing aligns with the Le Monde / CSEC Snowglobe
  reading. URL verified by curl 2026-05-28; HTML title matches.
