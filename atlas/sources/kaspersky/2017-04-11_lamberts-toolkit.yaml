notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): establishes the Longhorn = "The Lamberts"
  identity that anchors this actor's canonical name, but Kaspersky's own analysis does NOT
  name the CIA (0 "CIA" mentions in the article body). Verbatim: "Yesterday, our colleagues
  from Symantec published their analysis of Longhorn ... Longhorn, which we internally refer
  to as 'The Lamberts' ..." (277 "Lambert" mentions; 6 "Longhorn"; 2 "Vault 7"). The only
  text tying this cluster to a CIA/Vault 7 attribution is a reader COMMENT (Feb 2019), not
  GReAT's analysis. So this source corroborates the cluster identity, not the CIA naming —
  the CIA naming for KEEP comes from the cited WikiLeaks Vault7 source.
