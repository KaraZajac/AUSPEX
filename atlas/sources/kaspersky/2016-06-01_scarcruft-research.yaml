notes: |
  Kaspersky's foundational ScarCruft research ("Operation Daybreak"). Coined the ScarCruft alias.

  AUDIT (2026-06-24, claude-opus-4.8/max): Re-fetched for the kp/mss/apt37 service-placement audit.
  SNAPSHOT CAVEAT — the Securelist article body is JS-rendered, so the static curl raw_snapshot
  (sha256 above) captured only the site navigation chrome, NOT the article text; the attribution
  finding below is from a live WebFetch render of the same url (2026-06-24). This report makes NO
  nation-state attribution and names NO service: it does not say "North Korea"/"DPRK", "MSS"/
  "Ministry of State Security", or "RGB". It attributes the activity to "the ScarCruft APT group" /
  "unknown attackers", with victims spread across "Russia, Nepal, South Korea, China, India, Kuwait
  and Romania". (The prior note here calling the cluster "DPRK-attributed" overstates this source —
  Operation Daybreak does not attribute ScarCruft to any nation; corrected.) Supports the actor
  demotion kp/mss/apt37 -> kp/unscoped/apt37 (this source supplies no service, and indeed no nation).
