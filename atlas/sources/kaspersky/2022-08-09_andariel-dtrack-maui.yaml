notes: |
  Kaspersky GReAT corroborates the CISA AA22-187A advisory
  (July 2022) on Maui ransomware deployment by Andariel.
  Documents the technical IoCs and adds DTrack
  data-exfiltration tradecraft to the picture. Confirms
  Maui-as-Andariel attribution via reuse of bespoke
  infrastructure and tooling lineage from prior published
  Andariel operations.
