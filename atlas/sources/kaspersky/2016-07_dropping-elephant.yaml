notes: |
  Kaspersky's foundational Securelist writeup of "Dropping Elephant"
  (Patchwork), one of the earliest vendor writeups of the APT cluster.
  AUDIT (2026-06-24, claude-opus-4.8/max): used in the in/ntro/patchwork → in/unscoped/patchwork
  service demotion. Kaspersky does NOT name India's NTRO, any Indian service, OR the Indian state
  as sponsor; it frames the actor by its targeting of China's foreign relations — verbatim: "Its
  victims are all involved with China's foreign relations in some way." The only reference to India
  is attacker infrastructure, not attribution: "the attackers often logged in via a VPN, but
  sometimes via IPs belonging to an ordinary ISP in India." (Prior summary line calling this an
  attribution to "Indian state interests" overstated the source and was softened.) No NTRO.
