notes: |
  First public technical clustering of Equation Group activity.
  Presented at Kaspersky SAS 2015 in Cancún.
  AUDIT (2026-06-25, claude-opus-4.8/max): confirms the well-known nuance — this report does NOT
  name the NSA. The article body (pre-comments, ~19.5k chars in the captured snapshot) contains
  ZERO occurrences of "NSA" or "TAO"/"Tailored Access"; attribution is stated only at the
  capability level: "The #EquationAPT group is probably one of the most sophisticated cyber attack
  groups in the world." (All "NSA" strings on the live page are in the reader comment thread, not
  Kaspersky's analysis.) Cited in us/nsa/equation-group as the technical clustering source; the
  NSA identity is supplied by the actor's other sources (Reuters, Pangu Lab), not this one.
