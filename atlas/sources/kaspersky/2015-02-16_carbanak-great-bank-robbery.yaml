notes: |
  Kaspersky GReAT's February 2015 disclosure of the Carbanak
  (also Anunak) banking-cybercrime cluster. Approximately 100
  banks across 30 countries — primarily in Russia, Ukraine,
  US, Germany, China — targeted from late 2013, with
  cumulative losses estimated at up to USD 1B. Tradecraft:
  spear-phishing of bank employees, internal lateral movement
  to SWIFT terminals, ATM jackpotting, and direct interbank
  transfer fraud. Foundational disclosure for what later
  vendors split into Carbanak (financial-bank intrusion) and
  FIN7 (retail / hospitality POS-malware) operator clusters.
