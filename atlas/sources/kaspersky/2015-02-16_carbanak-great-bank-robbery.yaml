notes: |
  Kaspersky GReAT's February 2015 disclosure of the Carbanak
  (also Anunak) banking-cybercrime cluster. Approximately 100
  banks across 30 countries — primarily in Russia, Ukraine,
  US, Germany, China — targeted from late 2013, with
  cumulative losses estimated at up to USD 1B. Tradecraft:
  spear-phishing of bank employees, internal lateral movement
  to SWIFT terminals, ATM jackpotting, and direct interbank
  transfer fraud. Foundational disclosure for what later
  vendors split into Carbanak (financial-bank intrusion) and
  FIN7 (retail / hospitality POS-malware) operator clusters.

  AUDIT (2026-06-27, claude-opus-4.8/max): raw snapshot captured + hashed
  (sha256 aafe5680…5dabf8b9, 206,455 bytes). Verbatim support confirmed for
  "Up to 100 financial institutions have been hit", losses "could be as a high
  as $1 billion", "first infections were detected in December, 2013", "between
  two and four months" of manual reconnaissance, spear-phishing delivery, and
  the SWIFT/ATM-jackpotting/database-balance cash-out triad. NB: the captured
  raw states NO total country count and names only Russia, the US, Germany and
  China as most-affected (by IP-trace count) — the legacy "30 countries" /
  "Ukraine" phrasing above is not carried by the captured raw.
