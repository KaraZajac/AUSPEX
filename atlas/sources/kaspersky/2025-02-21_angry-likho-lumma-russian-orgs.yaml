notes: |
  Kaspersky follow-on to the January 2025 Angry Likho overview,
  documenting a fresh wave of Angry Likho (UAC-0050 / Sticky
  Werewolf overlap) operations delivering Lumma Stealer to
  Russian-language corporate targets via DLL-side-loading and
  obfuscated Python loaders. Notable for showing the cluster's
  Russian-target reach in addition to its Ukrainian-target
  baseline — softens (without overturning) the pure Belarusian-
  aligned framing that CERT-UA's UAC-0050 designation supports.

  AUDIT (2026-07-05, claude-opus-4.8/max): snapshotted live -- sha256
  64de4d17...65c3ca05, 226956 B; datePublished 2025-02-21, dateModified
  2025-05-13. This is the SINGLE canonical Kaspersky Angry Likho article
  (securelist 115663, "Angry Likho: Old beasts in a new forest"); NO distinct
  "January 2025 overview" exists -- kaspersky/2025-01_angry-likho-overview is a
  phantom/duplicate source whose own snapshot is THIS same 115663 page. The
  article's real chain is spear-phishing -> Nullsoft NSIS self-extracting
  archive -> obfuscated AutoIt (Child.pif / i.a3x) -> Lumma stealer; victims
  "hundreds ... in Russia, several in Belarus" (the pre-audit note above's
  "DLL-side-loading / obfuscated Python loaders" and "Ukrainian-target
  baseline" are NOT carried by the article). Now cited by event
  2025-01/kaspersky-angry-likho-uac-0050 (re-pointed off the phantom).
