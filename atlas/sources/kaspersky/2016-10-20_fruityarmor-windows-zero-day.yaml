notes: |
  Kaspersky GReAT (Anton Ivanov, Andrey Pankov) disclosure of the
  FruityArmor cluster's in-the-wild use of CVE-2016-3393, a Windows
  font-parsing (Win32k) zero-day used as a privilege-escalation
  primitive following browser-based initial access. CVE-2016-3393 is
  the Windows GDI / Graphics-Component vulnerability (NVD) patched in
  MS16-120 (2016-10-11). AUSPEX maps the FruityArmor cluster to
  Citizen Lab's Stealth Falcon via the MISP-galaxy / MITRE ATT&CK
  G0038 equivalence and shared PowerShell-centric Windows tradecraft.
  AUDIT (2026-06-24, claude-opus-4.8/max): read from the captured raw snapshot for the Stealth
  Falcon service-placement audit. This is a pure CVE-2016-3393 / FruityArmor technical writeup —
  it names NO operator service and does not name DarkMatter, CyberPoint, the UAE, or even
  "Stealth Falcon" (all 0 occurrences). It supports only the FruityArmor↔Stealth-Falcon cluster
  overlap (asserted by Citizen Lab/AUSPEX), not any DarkMatter service attribution. Consistent
  with demoting the actor to ae/unscoped/stealth-falcon.
  AUDIT (2026-07-05, claude-opus-4.8/max): hash re-verified (sha256 d6eed303…7d50efc1, 186,837
  bytes) — matches. CORRECTED the header note: the prior "(UAE-aligned targeting: Iran-MEK, Yemen,
  Saudi opposition, Sweden-based activists)" victimology was FABRICATED — this writeup carries NO
  victim geography at all (Iran / Yemen / Saudi / Sweden / MEK / UAE / dissident / activist = 0
  occurrences), as this record's own 2026-06-24 note already observed. The same fabrication was
  stripped from the citing event 2016-10/fruityarmor-stealth-falcon-cve-2016-3393.
