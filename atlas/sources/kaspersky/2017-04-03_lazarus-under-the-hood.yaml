notes: |
  Kaspersky deep-dive on Lazarus tooling and infrastructure;
  coined the BlueNoroff designation for the financial-theft
  sub-cluster.
  AUDIT (2026-06-25, claude-opus-4.8/max): fetched + raw-captured
  during the kp/rgb/bluenoroff service audit (raw_snapshot/
  content_sha256 added, sha ae38daa9…). This cluster-definition
  source does NOT name the RGB / Reconnaissance General Bureau /
  Lab 110 / Bureau 121 — raw term-scan: "Reconnaissance General
  Bureau"=0, "RGB"=0, "Bureau"=0; "Bluenoroff"=15. Its only DPRK
  nexus is a tentative infrastructure observation ("one short
  connection was made from a very unusual IP range, which originates
  in North Korea"), not a service attribution. So it does NOT carry
  the service claim for kp/rgb/bluenoroff — the RGB placement rests
  on the co-cited OFAC 2019-09-13 primary, which names Bluenoroff by
  canonical name. (Role here mirrors Mandiant-2018 in the apt38
  case: cluster-naming source, not service-naming source.) Actor
  KEPT at kp/rgb on the strength of the OFAC source.
