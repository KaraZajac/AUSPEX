notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshotted (HTTP 200, 196,604
  bytes) — the genuine Kaspersky GReAT Flame Q&A (author Alexander Gostev,
  28 May 2012), NOT a phantom. Carries: ~20MB modular toolkit; audio-via-
  microphone / screenshot / Bluetooth-proximity collection modules; ITU-
  requested "Wiper" investigation led to Flame's discovery; and that Wiper
  and Flame are NOT tied ("there is no information currently that ties Flame
  to the Wiper attacks"). Update-1 confirms parity with CrySyS Lab "SkyWiper"
  and Iran Maher CERT "Flamer". IMPORTANT for the citing event: this source
  (a) does NOT attribute Flame to any nation ("There is no information in the
  code or otherwise that can tie Flame to any specific nation state ... its
  authors remain unknown"); (b) as of 28 May assessed Flame as a PARALLEL,
  SEPARATE project NOT on the Tilded platform (the Resource-207 code link
  came later — see kaspersky/2012-06-11_back-to-stuxnet-missing-link); and
  (c) does NOT name the Iranian Oil Ministry / NIOC as Flame victims and
  explicitly saw "no specific signs indicating a particular target such as
  the energy industry". Tier preserved (secondary) per audit directive.
