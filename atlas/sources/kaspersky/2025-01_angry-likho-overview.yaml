  Kaspersky: "Angry Likho (referred to as Sticky Werewolf by some
  vendors) is an APT group we've been monitoring since 2023";
  "bait files are written in fluent Russian, we infer that the
  attackers are likely native Russian speakers. We've identified
  hundreds of victims … in Russia, several in Belarus … primarily
  targeting organizations in Russia and Belarus." FINDING: does
  NOT name the Belarusian KGB; attackers are assessed as
  native-Russian-speaking and Belarus is a TARGET, not the
  sponsor — does not support a Belarus-state attribution. Used in
  the by/kgb/uac-0050 -> by/unscoped/uac-0050 demotion.
