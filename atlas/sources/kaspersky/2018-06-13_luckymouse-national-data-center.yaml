notes: |
  Kaspersky disclosure of LuckyMouse / APT27 / Emissary Panda
  compromise of an unnamed Central Asian country's national
  data center, detected March 2018 and assessed active since
  autumn 2017. The intrusion abused data-center access to inject
  malicious scripts into the country's official government
  websites, turning them into watering holes that redirected
  visitors to ScanBox and BeEF instances; HyperBro was the
  last-stage in-memory RAT on data-center hosts.
  AUDIT (2026-06-28, claude-opus-4.8/max): first-party Securelist
  article re-fetched + snapshotted (sha256 above, 183450 bytes);
  confirmed REAL (not a phantom — title/body match the citation).
  CORRECTED the prior note's tradecraft: the report names NO
  "Sysget" and NO "ShadowPad" (zero occurrences of either) — those
  were unsupported 2026-05-30 bulk-import additions, removed here and
  in the citing event. Source's own words: "The operators used the
  HyperBro Trojan as their last-stage in-memory remote administration
  tool (RAT)" and "The websites were compromised to redirect visitors
  to instances of both ScanBox and BEeF."
