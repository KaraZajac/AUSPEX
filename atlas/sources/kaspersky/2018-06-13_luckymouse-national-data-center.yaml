notes: |
  Kaspersky disclosure of LuckyMouse / APT27 / Emissary Panda
  compromise of an unnamed Central Asian country's national
  data center between fall 2017 and March 2018. The intrusion
  staged a country-level watering-hole campaign by injecting
  malicious code into government websites hosted in the data
  center, redirecting visitors to a HyperBro / Sysget payload
  set. Lateral movement leveraged ShadowPad-family tooling and
  custom HyperBro RAT.
