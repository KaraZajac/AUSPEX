notes: |
  URL corrected 2026-05-29 (Agent2): the kaspersky.com /about/press-releases/2017_shadowpad
  slug now resolves to the Press Releases index. The canonical Kaspersky
  technical analysis is the Securelist post (id 81432), still live with the
  original title.
  AUDIT (2026-06-25, claude-opus-4.8/max): raw HTML captured (HTTP 200, 193,998 B);
  datePublished metadata confirms 2017-08-15. Verbatim attribution stance:
  "Who is behind this attack? Attribution is hard ... certain techniques were
  known to be used in another malware like PlugX and Winnti, which were
  allegedly developed by Chinese-speaking actors." Names NO actor/nation —
  cannot support an APT41/Barium/Microsoft attribution. Facts confirmed:
  nssock2.dll backdoor (compiled Thu Jul 13 2017), Xmanager Enterprise 5 /
  Xshell 5 etc. builds dated Jul 17 2017, DNS-TXT activation C2 with monthly
  DGA, modular/tiered platform, build-server compromise, NetSarang pulled the
  software after Kaspersky notification.
