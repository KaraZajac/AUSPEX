notes: |
  # AUDIT 2026-07-01 (claude-opus-4.8, max): snapshot captured; real article confirmed
  # (title "Holy water: ongoing targeted water-holing attack in Asia"). Kaspersky
  # EXPLICITLY DECLINES attribution: "we couldn't identify any overlap with known
  # intrusion sets." No China/PRC/MSS/Mustang-Panda/Tibet named anywhere (grep 0).
  # Source says targets "an Asian religious and ethnic group" (NOT Tibetan). tier primary
  # correct (first-party vendor research).
  Kaspersky disclosure of a watering-hole campaign active since
  May 2019 against Asian religious and charity websites,
  redirecting visitors to a fake Adobe Flash Player update that
  delivered the "Godlike12" backdoor along with a Tibetan-themed
  payload set. Targeting overlaps with prior Tibetan-diaspora
  campaigns but Kaspersky tracks the cluster as distinct
  ("Holy Water") and does not assert direct PRC-state
  attribution.
