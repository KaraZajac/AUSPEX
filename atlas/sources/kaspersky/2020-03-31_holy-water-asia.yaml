notes: |
  Kaspersky disclosure of a watering-hole campaign active since
  May 2019 against Asian religious and charity websites,
  redirecting visitors to a fake Adobe Flash Player update that
  delivered the "Godlike12" backdoor along with a Tibetan-themed
  payload set. Targeting overlaps with prior Tibetan-diaspora
  campaigns but Kaspersky tracks the cluster as distinct
  ("Holy Water") and does not assert direct PRC-state
  attribution.
