notes: |
  US Attorney (District of Columbia) release. Two indictments,
  unsealed in DC, charge Sim Hyon Sop (39, DPRK national; a
  Foreign Trade Bank / KKBC representative) in two money-
  laundering conspiracies — (1) with three OTC traders (Wu
  Huihui; Cheng Hung Man; and an UNKNOWN trader using the
  moniker "live:jammychen0150" / "Chen") to launder
  virtual-currency-exchange-hack proceeds and buy goods via
  Hong-Kong front companies, and (2) with DPRK IT workers to
  launder IT-development wage fraud. A third indictment charges
  Wu with unlicensed money transmitting (>1,500 trades,
  >$800,000). RE-SOURCED (AUDIT 2026-07-10): url was null → set
  to the verified USAO-DC permalink; live justice.gov is Akamai
  bot-walled, so raw_snapshot is the Wayback raw capture. NB:
  the earlier "DC and EDNY" note was wrong — all indictments are
  in the District of Columbia. Companion to Treasury jy1435; an
  equivalent DOJ OPA (Office of Public Affairs) release exists at
  justice.gov/archives/opa/pr/north-korean-foreign-trade-bank-representative-charged-crypto-laundering-conspiracies.
