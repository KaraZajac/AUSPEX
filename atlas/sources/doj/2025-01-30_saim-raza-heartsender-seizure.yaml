notes: |
  DOJ Office of Public Affairs press release (dated Thursday, January 30,
  2025) announcing the "coordinated seizure of 39 domains and their
  associated servers in an international disruption of a Pakistan-based
  network of online marketplaces ... operated by a group known as Saim
  Raza (also known as HeartSender)," "conducted in coordination with the
  Dutch National Police." Per the supporting affidavit, Saim Raza used
  the sites "since at least 2020" to sell phishing toolkits to
  transnational organized crime groups running business email compromise
  schemes, "resulting in over $3 million in victim losses" in the US.
  Carries the disrupt-and-dismantle terminal-goal statement verbatim:
  "The seizure of these domains is intended to disrupt the ongoing
  activity of these groups and stop the proliferation of these tools
  within the cybercriminal community." FBI Houston Field Office
  investigating; Criminal Division CCIPS + SDTX prosecuting.
