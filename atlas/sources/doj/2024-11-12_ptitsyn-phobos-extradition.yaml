notes: |
  DOJ press release on extradition of Evgenii Ptitsyn from South
  Korea to the US District of Maryland for alleged administration of
  the Phobos ransomware variant used by 8Base and other affiliate
  clusters. DOJ pages render via JS and curl returns blank-title
  responses, but the URL path is the official USAO-MD press-release
  pattern and matches multiple secondary republications.
  AUDIT 2026-07-05 (claude-opus-4.8/max): BOT-WALLED — re-fetch via curl
  (multiple UA/slug variants) returns only a ~2.5 KB JS shell (<title>&nbsp;
  </title>, no article body); WebFetch returns HTTP 403. No content_sha256 is
  recorded because no article content is retrievable (recording the empty-shell
  hash would misrepresent it). published_on CORRECTED 2024-11-12 -> 2024-11-18:
  the DOJ announcement/unsealing was 18 Nov 2024 (CyberScoop same-day
  datePublished 2024-11-18T22:23:03Z; SecurityWeek/Infosecurity next-day
  2024-11-19); the initial US appearance (D. Md.) was 4 Nov 2024. The id's
  date-prefix "2024-11-12" is ~6 days early and is unsupported by any located
  source, but the slug/id is FROZEN per the never-rename-slugs rule. The
  WebSearch-confirmed canonical DOJ release is titled "Phobos Ransomware
  Administrator Extradited from South Korea to Face Cybercrime Charges"
  (justice.gov OPA + USAO-MD, archived at /archives/opa/pr/phobos-ransomware-
  administrator-extradited-south-korea-face-cybercrime-charges). Claims are
  corroborated by a hashed primary (sibling doj/2025-02-11_phobos-8base-
  affiliates-arrested, on-disk) + hashed tier-1 mirror (cyberscoop/2024-11-18_
  ptitsyn-phobos-extradited).
