  AUDIT (2026-06-25, claude-opus-4.8/max) — verbatim from the captured release:
  "Senior U.S. District Judge Harvey E. Schlesinger has sentenced Noah Michael Urban (20, Palm Coast),
  a/k/a 'King Bob,' 'Sosa,' 'Elijah,' and 'Gustavo Fring,' to 10 years in federal prison for conspiracy
  to commit wire fraud, wire fraud, and aggravated identity theft. The court also ordered Urban to
  forfeit approximately $4.8 million in assets, which includes cryptocurrency and other property. Urban
  was also ordered to pay $13 million in restitution. Urban entered a guilty plea on April 4, 2025.
  According to court documents, from August 2022 through March of 2023, Urban was involved in stealing
  cryptocurrency from at least 59 victims across the United States. Urban and others conducted targeted
  attacks called 'SIM swaps' ... During this same timeframe, Urban was also part of a group that targeted
  employees of companies nationwide with phishing text messages. ... The total loss to the victims was
  over $13 million. ... prosecuted by Assistant United States Attorney John Cannizzaro of the Middle
  District of Florida and Assistant United States Attorney Lauren Restrepo of the Central District of
  California." (Page dated/Updated August 21, 2025; Topic: Cybercrime.)
  NOTE: the release does NOT contain the string "Scattered Spider" (0 occurrences) — the group
  attribution in the corpus rests on press reporting, not this primary source. The sentencing hearing
  itself was Wednesday 2025-08-20 (same-day local reporting, e.g. WJXT/news4jax: "sentenced ... on
  Wednesday morning"); this release was issued the following day, 2025-08-21.
