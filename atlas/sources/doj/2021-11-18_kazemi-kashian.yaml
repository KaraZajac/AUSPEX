notes: |
  Indicts Seyyed Mohammad Hosein Musa Kazemi and Sajjad Kashian
  (Emennet Pasargad employees) for the 2020 "Proud Boys" voter-
  intimidation campaign and voter-data theft.
  AUDIT (2026-07-11, claude-opus-4.8/max): NOW SNAPSHOTTED via archive.org. The
  live justice.gov/usao-sdny URL is still Akamai-bot-walled (HTTP 200 but a ~2.5 KB
  JS/iframe "verify" page), so the faithful capture is the Wayback id_ raw of the
  same URL (curl, HTTP 200, 58,869 chars, real article "FOR IMMEDIATE RELEASE
  Thursday, November 18, 2021"). Load-bearing facts VERIFIED verbatim: "Starting in
  approximately August 2020 … until November 2020"; recon on "approximately eleven
  state voter websites"; "successful exploitation of a misconfigured computer system
  of a particular U.S. state ('State-1'), and the resulting unauthorized downloading
  of more than 100,000 State-1 voters' information"; "voter intimidation campaign
  involving the dissemination of a threatening message … purporting to be from the
  Proud Boys, to tens of thousands of registered voters … sent to registered
  Democrats"; the "False Election Video" purporting "to depict an individual
  affiliated with the Proud Boys hacking into state voter websites and using stolen
  voter information to create fraudulent absentee ballots through the Federal Voting
  Assistance Program ('FVAP')"; and the Nov 4 2020 attempt to leverage access to "a
  U.S. media company's computer network." NOTE: the DOJ release names Emennet Pasargad
  (formerly "Eeleyanet Gostar") as an Iran-based company but does NOT name the IRGC —
  the IRGC-EWCD sponsor linkage rests solely on the Treasury 2021-11-18 source.
