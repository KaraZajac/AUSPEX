notes: |
  Kansas grand jury indictment of Rim Jong Hyok, a DPRK national
  affiliated with the Andariel cluster. Names US hospitals (Maui
  ransomware victims), NASA Office of Inspector General, 4 US
  defense contractors, 2 US Air Force bases, and ROK and Taiwan
  defense industrial base as target sets. Critical attestation
  for the doctrinal proposition that DPRK ransomware proceeds
  fund defense-network intrusions. State Department $10M
  Rewards-for-Justice offer attached.
