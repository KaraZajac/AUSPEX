notes: |
  Kansas grand jury indictment of Rim Jong Hyok, a DPRK national
  affiliated with the Andariel cluster. Names US hospitals (Maui
  ransomware victims), NASA Office of Inspector General, 4 US
  defense contractors, 2 US Air Force bases, and ROK and Taiwan
  defense industrial base as target sets. Critical attestation
  for the doctrinal proposition that DPRK ransomware proceeds
  fund defense-network intrusions. State Department $10M
  Rewards-for-Justice offer attached.
  AUDIT (2026-06-24, claude-opus-4.8/max): re kp/rgb/andariel
  service audit (KEEP verdict). Raw capture UNFETCHABLE on this pass
  — the live justice.gov/archives URL returns HTTP 400/403 to curl
  and 403 to WebFetch (DOJ bot wall), and the archive.org copy
  returns only the Wayback playback stub (blocked), so no
  raw_snapshot/content_sha256 was recorded (per protocol: note +
  skip; never fabricate). The RGB placement does NOT rely on this
  source: it is independently attested by OFAC 2019 (treasury, which
  states Andariel is "controlled by the ... RGB") and corroborated by
  Symantec 2024. This indictment is publicly reported to describe Rim
  Jong Hyok as affiliated with North Korea's military intelligence
  agency, the Reconnaissance General Bureau (RGB) / its 3rd Bureau
  (cf. the parallel CISA AA24-207A joint advisory), consistent with
  the KEEP, but that wording is recorded here as un-captured pending
  a future successful raw fetch.
  AUDIT (2026-07-02, claude-opus-4.8/max): RAW NOW CAPTURED — the prior
  pass's open item is resolved. The press-release HTML at `url` remains
  Akamai-walled (curl → 2588-byte stub; WebFetch → 403), but the actual
  FILED INDICTMENT PDF (the charging document the press release
  announces) was fetched from the un-walled Drupal file path
  https://www.justice.gov/d9/2024-07/hyok_filed_indictment.pdf
  (US v. Rim Jong Hyok, 2:24-cr-20061-HLT-ADM, Doc 1, filed 07/24/24,
  17 pp; HTTP 200, application/pdf, 326,354 bytes). raw_snapshot +
  content_sha256 (b10b92a8…f6d4589d) recorded above. The indictment
  DOES name the RGB — para 1 "North Korea's primary military
  intelligence agency is the Reconnaissance General Bureau (RGB)"; para
  2 "a cyber unit within the RGB … known … as Andariel, Onyx Sleet, and
  Silent Chollima" (RGB ×11, Andariel ×2) — confirming the RGB placement
  first-hand. Attestation re-check for the referencing event: the
  indictment states the strategic-tech-collection goal in substance
  ("furthers the North Korean regime's military and nuclear
  aspirations", para 3) → that link stays attested; but its revenue
  language names only the proximate goal (ransom money buys VPS/servers
  to run the intrusions, paras 23/27) and never the WMD/ballistic-
  missile PROGRAMS (0 hits "WMD"/"ballistic"/"weapons of mass
  destruction") → the event's revenue-aggregation link downgraded
  attested → strongly_inferred. NB the $10M Rewards-for-Justice figure
  is NOT in this PDF (press-release-only; mirror-corroborated).
