notes: |
  DOJ Office of Public Affairs press release, same-day companion to
  the Treasury/OFAC action (jy0701), announcing the German BKA
  (Bundeskriminalamt) seizure of Hydra Market servers and
  cryptocurrency wallets holding ~$25M in bitcoin, and criminal
  charges against Russian national Dmitry Olegovich Pavlov (30) for
  conspiracy to distribute narcotics and conspiracy to commit money
  laundering in connection with operating/administering Hydra's
  servers (via Promservice Ltd. / "All Wheel Drive" / 4x4host.ru).
  Carries the figures NOT in the Treasury release: Hydra received
  ~$5.2B in cryptocurrency since 2015 and accounted for ~80% of all
  darknet-market-related cryptocurrency transactions in 2021.
  AUDIT (2026-07-01, claude-opus-4.8/max): live URL is bot-walled by
  an Akamai/DOJ interstitial challenge (JS-refresh page, HTTP 403 to
  WebFetch) so no clean raw snapshot / content_sha256 could be
  captured. Claims corroborated verbatim against justice.gov search
  index and independent mirrors (The Record/Recorded Future, CNBC,
  TheHackerNews, moneylaunderingnews.com), all reporting identical
  $5.2B-since-2015, 80%-of-2021, and Pavlov-charge figures.
