notes: |
  DOJ press release announcing the international takedown of
  Genesis Market (Operation Cookie Monster) and charging of
  administrator. Genesis Market sold "bot logs" packaging
  stolen credentials, browser fingerprints, and session
  cookies for sale to enable account-takeover at scale.
  Approximately 80M sets of credentials sold across 1.5M
  compromised computers; ~120 arrests across 17 countries.

