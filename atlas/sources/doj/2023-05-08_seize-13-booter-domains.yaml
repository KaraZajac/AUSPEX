notes: |
  Authoritative DOJ (U.S. Attorney's Office for the Central District of
  California) announcement of the May 8 2023 court-authorized seizure of 13
  internet domains offering DDoS-for-hire ("booter"/"stresser") services — the
  second-wave domain takedown, ten of the 13 being reincarnations of services
  seized in the December 2022 first wave (48 domains). Part of the international
  Operation PowerOFF effort. Added 2026-07-02 as the govt-primary of record for
  event 2023-05/poweroff-second-wave (previously single-secondary-source on
  Krebs). AUDIT 2026-07-02 (claude-opus-4.8/max): live URL is bot-walled
  (Akamai/BullMachine interstitial challenge; HTTP-200 2.5 KB JS challenge to
  curl, HTTP 403 to WebFetch) so NO raw snapshot / content_sha256 could be
  captured; its facts (13 domains seized May 8 2023; ten reincarnations of the
  Dec-2022 48-domain wave; the third U.S./international action after Dec 2018 =
  15 sites and Dec 2022 = 48 domains; Operation PowerOFF) are corroborated by
  the snapshotted Krebs and BleepingComputer reports and by reachable mirrors
  (The Hacker News, TechCrunch, Infosecurity Magazine). Krebs + BleepingComputer
  remain the load-bearing snapshotted sources for this event.
