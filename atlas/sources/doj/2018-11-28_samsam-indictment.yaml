notes: |
  Indicts Faramarz Shahi Savandi (34) and Mohammad Mehdi Shah
  Mansouri (27), both of Iran, acting from inside Iran, for the
  SamSam ransomware scheme (a 34-month scheme; first SamSam
  version created Dec 2015, most recent alleged attack Sept 25,
  2018) that hit 200+ US, UK, and Canadian victims — named:
  City of Atlanta, City of Newark, Port of San Diego, Colorado
  Department of Transportation, University of Calgary, Hollywood
  Presbyterian Medical Center, Kansas Heart Hospital, LabCorp.
  DOJ: defendants collected over $6M USD in ransom and caused
  over $30M USD in losses to victims. Six-count indictment
  (conspiracy to commit wire fraud; conspiracy re CFAA; two
  counts intentional damage to a protected computer; two counts
  transmitting a demand) returned in Newark, NJ; FBI Newark
  Field Office. Iran-based individuals; state direction NOT
  asserted (framed as a criminal scheme). Snapshot captured via
  the Wayback archive_url (live justice.gov is Akamai bot-walled);
  content_sha256 is of that capture.
