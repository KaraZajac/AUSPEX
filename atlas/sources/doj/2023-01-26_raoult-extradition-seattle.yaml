notes: |
  USAO WDWA press release on the January 2023 extradition of
  Sebastien Raoult ("Sezyo Kaizen") from Morocco to Seattle to
  face charges related to the ShinyHunters data-theft conspiracy.
  AUDIT (2026-07-10, claude-opus-4.8/max): justice.gov is Akamai
  bm-verify walled for plain curl (2.5KB interstitial); the real
  102,336-byte article was captured by following the interstitial's
  bm-verify token URL with a cookie jar (raw snapshot sha256
  c5e388d6...31055d92). Verbatim support: "A 21-year-old French
  citizen from Epinal, France, will appear tomorrow January 27, 2023,
  in U.S. District Court in Seattle on a nine-count indictment
  alleging conspiracy to commit computer fraud and abuse, conspiracy
  to commit wire fraud, four counts of wire fraud and three counts of
  aggravated identity theft"; "Sebastien Raoult aka Sezyo Kaizen, was
  arrested last year in Morocco and was extradited to the U.S. this
  week"; "Raoult and two co-conspirators were indicted by a grand
  jury sitting in the Western District of Washington on June 23,
  2021"; "In addition to Raoult, the indictment charges 23-year-old
  Gabriel Kimiaie-Asadi Bildstein aka 'Kuroi' and 'Gnostic Players,'
  of Tarbes, France, and 22-year-old Abdel-Hakim El Ahmadi aka 'Zac'
  and 'Jordan Keso' of Lyon, France"; "Since early 2020, ShinyHunters
  Group has marketed and promoted data stolen from more than 60
  companies"; "The case is being investigated by the FBI Seattle
  Cyber Task Force"; "The Department of Justice also appreciates the
  significant cooperation and assistance provided by Moroccan and
  French authorities"; dateline "Thursday, January 26, 2023".
  NB: this PR states only "arrested last year in Morocco" — it does
  NOT carry the Rabat-airport / May-31 / Brussels-flight specifics
  (those are in securityaffairs/2023-01-29 and hackread/2022-07-01);
  the earlier version of this note over-attributed those details to
  this release and has been corrected.
