notes: |
  USAO WDWA press release on the January 2023 extradition of
  Sebastien Raoult ("Sezyo Kaizen") from Morocco to Seattle to
  face charges related to the ShinyHunters data-broker
  conspiracy. Raoult had been arrested at Rabat international
  airport on May 31 2022 while attempting to board a flight to
  Brussels.
