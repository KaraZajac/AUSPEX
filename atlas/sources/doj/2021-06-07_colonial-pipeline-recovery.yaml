notes: |
  DOJ announcement of the recovery of 63.7 BTC of the Colonial
  Pipeline ransom paid to DarkSide — first major DOJ ransomware
  cryptocurrency seizure operation.

  AUDIT (2026-07-10, claude-opus-4.8/max): raw capture NOW SUCCEEDED via the archive.org
  snapshot (archive_url timestamp 20250205225039), which was blocked in the 2026-06-24 pass
  (see below) but resolved HTTP 200 this run — 102,574 bytes, sha256 a22d5ca5…bbef12ac,
  raw_snapshot recorded. justice.gov itself is still Akamai bot-walled (curl -> the "bm-verify"
  JS-refresh stub at both the live and /archives/ paths). Verbatim facts now captured and
  carried: "the Department of Justice today announced that it has seized 63.7 bitcoins currently
  valued at approximately $2.3 million"; the funds are "the proceeds of a May 8, [2021] ransom
  payment"; Colonial "had received and paid a ransom demand for approximately 75 bitcoins"; the
  63.7 BTC "had been transferred to a specific address, for which the FBI has the 'private key'";
  DarkSide "had targeted Colonial Pipeline, resulting in critical infrastructure being taken out
  of operation." Title characterizes the group as "Ransomware Extortionists" (supports the
  event's extortion incident_type). NB: DOJ gives the paid ransom only in BTC (75) — it does NOT
  state the ~$4.4M USD figure (that is Colonial CEO Joseph Blount's confirmation; carried by the
  added PBS/AP + TechTarget sources).

  AUDIT (2026-06-24, claude-opus-4.8/max): cited in support of ru/proxies/darkside, audited
  during the demotion to ru/unscoped/darkside. RAW CAPTURE FAILED (unfetchable): justice.gov is
  behind Akamai Bot Manager — a "bm-verify" JavaScript challenge returns HTTP 400 / a JS-refresh
  redirect to curl, WebFetch returned HTTP 403, and the archive.org snapshot is blocked in this
  environment. No raw_snapshot/content_sha256 added; noted + skipped per protocol. By its own
  stored title — "Department of Justice Seizes $2.3 Million in Cryptocurrency Paid to the
  Ransomware Extortionists DarkSide" — this is a US law-enforcement asset-SEIZURE (a counter-
  action against DarkSide), characterizing the group as "ransomware extortionists", NOT a
  statement of any Russian-state nexus (no FSB/GRU/SVR tasking/tolerance/harbor). The skip does
  not change the demotion verdict: the two fully-captured govt sources (FBI, CISA AA21-131A)
  already document zero state nexus.
