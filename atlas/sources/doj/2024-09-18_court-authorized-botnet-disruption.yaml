notes: |
  DOJ Office of Public Affairs press release announcing the court-authorized
  FBI operation against the Raptor Train botnet.
  AUDIT (2026-07-05, claude-opus-4.8/max): NOT snapshotted — justice.gov is
  Akamai bm-verify bot-walled to both curl and WebFetch (returns a ~2.5 KB
  "bm-verify" challenge stub / HTTP 403, no article body). Content
  cross-verified against (a) the co-released CISA/FBI joint advisory's explicit
  "For additional information, see U.S. Department of Justice (DOJ) press
  release" cross-reference and (b) concurring reporting. Carries: a botnet of
  "more than 200,000 consumer devices in the United States and worldwide";
  device types "small-office/home-office (SOHO) routers, internet protocol (IP)
  cameras, digital video recorders (DVRs), and network-attached storage (NAS)
  devices"; operator "Integrity Technology Group, a company based in Beijing,
  China, and known to the private sector as 'Flax Typhoon'"; the operation
  "took control of the hackers' computer infrastructure" and "sent disabling
  commands ... to the malware on the infected devices"; an unsuccessful DDoS
  attempt against the FBI's operational infrastructure; and victims "multiple
  U.S. and foreign corporations, universities, government agencies,
  telecommunications providers, and media organizations." Every DOJ-carried
  claim above is independently carried by a snapshotted source on this event
  (CISA / Lumen / Treasury / FBI), so this record is corroborating, not
  sole-source. archive_url left null (no verified Wayback capture; web.archive.org
  is fetcher-blocked).
