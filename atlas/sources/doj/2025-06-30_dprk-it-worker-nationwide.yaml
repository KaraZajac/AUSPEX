notes: |
  Coordinated DOJ enforcement action: two indictments
  (Massachusetts and Northern District of Georgia), arrest of
  US-national facilitator Zhenxing "Danny" Wang, searches of
  29 laptop farms across 16 states, seizure of 29 financial
  accounts and 21 domains. Co-conspirators across US, China,
  UAE, Taiwan. ITAR data theft from California defense
  contractor.
