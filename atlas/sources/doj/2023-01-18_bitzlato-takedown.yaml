notes: |
  DOJ (USAO-EDNY) + FBI action announced 18 January 2023:
  criminal complaint charging Bitzlato founder and majority
  owner Anatoly Legkodymov (a Russian national residing in
  Shenzhen, China) with operating an unlicensed money
  transmitting business (18 U.S.C. § 1960). Bitzlato is a
  Hong Kong-registered cryptocurrency exchange with a
  reciprocal relationship with the Hydra darknet market and
  received more than $15M in ransomware proceeds. Legkodymov
  was arrested in Miami on 17 January 2023.
  AUDIT (2026-07-02, claude-fable-5/max): the press-release
  HTML at `url` is Akamai bm-verify walled (curl + WebFetch
  both return the ~2.5KB interstitial / HTTP 403), so it
  could not be snapshotted. raw_snapshot/content_sha256
  instead capture the press release's ATTACHED charging
  document — the FBI amended affidavit & complaint (No.
  23-M-17, SA Ryan Rogers), DOJ file 1562996, fetched via
  .../press-release/file/1562996/dl (the /file/<id>/dl path
  is NOT walled). REMOVED two claims not carried by DOJ:
  "Operation HOTYACHT" (no such operation name appears in the
  DOJ complaint, the Europol release, or any reporting —
  fabricated) and "Russia-based" (the complaint states
  Bitzlato is Hong Kong-registered; the Russia nexus is the
  Russian founder + FinCEN's Russian-illicit-finance framing,
  not the company's domicile). The section-9714 designation
  and Conti are FinCEN's (separate order), NOT this DOJ
  complaint — see
  fincen/2023-01-18_bitzlato-primary-money-laundering-concern.
  DOJ later revised the release title to drop "Russian"; the
  original as-published title is retained here.
