notes: |
  DOJ + French + Spanish + Portuguese + Cypriot Operation
  HOTYACHT action against Bitzlato, a Russia-based
  cryptocurrency exchange laundering ransomware proceeds.
  Founder Anatoly Legkodymov (Russian national) arrested
  in Miami on January 17 2023. FinCEN concurrent designation
  of Bitzlato as a "primary money laundering concern"
  under section 9714 of the Combating Russian Money
  Laundering Act — the first use of that authority.
