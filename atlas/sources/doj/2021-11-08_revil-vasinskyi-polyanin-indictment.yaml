notes: |
  DOJ unsealing of indictments against Yaroslav Vasinskyi (Ukraine,
  arrested in Poland) and Yevgeniy Polyanin (Russia, at large) for
  REvil ransomware operations including the Kaseya VSA mass-attack.
  AUDIT (2026-06-24, claude-opus-4.8/max): used for the ru/proxies/revil
  placement audit -> contributed to DEMOTION to ru/unscoped/revil. NO
  Russian-state nexus (tasking/tolerance/harbor/handoff) in this source:
  it is a pure criminal-prosecution framing. Characterizes the group as a
  "ransomware group" of "two foreign nationals" / "ransomware criminals"
  (DAG Monaco: "The Sodinokibi/REvil ransomware group attacks companies and
  critical infrastructures around the world, and today's announcements
  showed how we will fight back"). The SOLE Russia reference is defendant
  nationality: "Yevgeniy Polyanin, 28, a Russian national, who is also
  charged with conducting Sodinokibi/REvil ransomware attacks against
  multiple victims". Zero FSB/GRU/SVR/Kremlin/state-sponsor/tolerance/
  safe-harbor/on-behalf-of-the-state language.
