notes: |
  DOJ + FBI press release announcing the dismantling of the
  911 S5 residential-proxy botnet — described by FBI Director
  Wray as "likely the world's largest botnet ever" — and the
  arrest of Chinese national YunHe Wang. The botnet enrolled
  approximately 19 million compromised residential IPs across
  ~190 countries and was used to facilitate billions of dollars
  in cybercrime, including pandemic-era CARES Act fraud.
