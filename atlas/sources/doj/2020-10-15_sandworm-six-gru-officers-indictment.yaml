notes: |
  Indictment of Yuriy Andrienko, Sergey Detistov, Pavel Frolov,
  Anatoliy Kovalev, Artem Ochichenko, and Petr Pliskin — all GRU
  Unit 74455 (GTsST) officers — for NotPetya, Olympic Destroyer,
  the December 2015–December 2016 Ukraine power grid attacks, French
  election interference (Macron campaign 2017), and the OPCW Novichok
  inquiry targeting. Gold-standard attestation for Sandworm
  attributions.

  AUDIT (2026-07-05, claude-opus-4.8/max): DATE CORRECTED
  published_on 2020-10-15 -> 2020-10-19. The press release states
  "On Oct. 15, 2020, a federal grand jury in Pittsburgh returned an
  indictment"; the DOJ press release itself (this source) was PUBLISHED
  19 Oct 2020 (corroborated by NPR, Al Jazeera, GlobalSecurity mirror
  intell-201019). The id slug retains 2020-10-15 (indictment-return
  date; slugs are stable) and the event's attribution_date stays
  2020-10-15 (the date the grand jury acted). BOT-WALLED: the
  justice.gov URL is served behind an Akamai interstitial challenge
  (proof-of-work; curl + WebFetch both blocked), so NO content_sha256
  could be captured for the primary. Claims corroborated verbatim via
  the GlobalSecurity full-text mirror
  (globalsecurity.org/intell/library/news/2020/intell-201019-doj01.htm)
  and the Lawfare/NPR summaries. Key verbatim text: "Unit 74455 of the
  Russian Main Intelligence Directorate (GRU)"; "Ukrainian Government &
  Critical Infrastructure: December 2015 through December 2016
  destructive malware attacks against Ukraine's electric power grid,
  Ministry of Finance, and State Treasury Service, using malware known
  as BlackEnergy, Industroyer, and KillDisk"; and the attestation
  sentence — intrusions "intended to support Russian government efforts
  to undermine, retaliate against, or otherwise destabilize: (1)
  Ukraine; (2) Georgia; (3) elections in France; (4) [Novichok
  accountability efforts]…". PR does not name the individual oblenergos.

  AUDIT (2026-07-10, claude-opus-4.8/max): SNAPSHOT CAPTURED via Wayback.
  The live justice.gov URL remains Akamai-bot-walled (curl returns a
  2,575-byte proof-of-work interstitial, no case content), but a faithful
  Internet Archive capture (2022-01-15) of the original /opa/pr/ press
  release was snapshotted (raw_snapshot doj__2020-10-15_…-indictment.html,
  sha256 89d5d4f9…620f02eb, 50,433 bytes; archive_url set to the concrete
  capture). Verbatim quotes re-confirmed from the snapshot: "officers in
  Unit 74455 of the Russian Main Intelligence Directorate (GRU)"; the
  attestation "intended to support Russian government efforts to undermine,
  retaliate against, or otherwise destabilize: (1) Ukraine; (2) Georgia;
  (3) elections in France; (4) efforts to hold Russia accountable for its
  use of a weapons-grade nerve agent, Novichok…"; "NotPetya, which caused
  nearly $1 billion in losses to the three victims identified in the
  indictment alone"; victims "hospitals and other medical facilities in the
  Heritage Valley Health System …; a FedEx Corporation subsidiary, TNT
  Express B.V.; and a large U.S. pharmaceutical manufacturer." All six
  officers (Andrienko, Detistov, Frolov, Kovalev, Ochichenko, Pliskin)
  present. DOJ names ONLY those three NotPetya victims (Maersk, Mondelez,
  Reckitt, Saint-Gobain are NOT in the PR — those come from WIRED).
