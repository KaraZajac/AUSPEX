notes: |
  AUDIT 2026-07-02 (claude-opus-4.8, max): CREATED to re-source the
  event 2024-05/chapman-it-worker-indictment, which previously cited
  ONLY the 2025-07-24 sentencing release — a temporal mismatch (a
  May-2024 indictment event whose attribution_date 2024-05-16 pointed
  at a document that did not exist until 2025-07-24, and which does not
  carry the indictment date, the charges, or the Oct 2020–Oct 2023
  operational window). This is the contemporaneous DOJ (USAO-DC)
  announcement of the Christina Chapman indictment and the laptop-farm
  search/seizures, unsealed 16 May 2024 (Chapman arrested 15 May 2024).

  BOT-WALLED on 2026-07-02: justice.gov returned a JS/anti-bot
  challenge to curl (2.5 KB stub, not the article body) and HTTP 403
  to WebFetch — NO clean raw snapshot was captured, hence no
  content_sha256. The URL is live (HTTP 200) but un-scrapable by this
  fetcher. Claims are mirror-corroborated and mutually consistent
  across reachable secondary reporting: scheme ran Oct 2020–Oct 2023;
  more than 300 US companies; ~60 stolen US-citizen identities;
  ~$6.8M ("nearly $7M") indictment-era revenue; Chapman ran a "laptop
  farm" hosting company-issued devices; co-conspirator DPRK nationals
  tied to North Korea's weapons / ballistic-missile production.
  Reachable mirrors used: jurist.org/news/2024/05 ("57 page
  indictment"), abcnews.go.com story id=110304278 (announced
  2024-05-16), bitdefender.com hotforsecurity ("potentially to fund
  its weapons programme"), NPR/Fortune/Cybernews (Oct 2020–Oct 2023
  window, >90 laptops seized Oct 2023). [2026-07-05 CORRECTION: an
  earlier note here claimed a "companion same-day Treasury OFAC
  sb0416 (16 May 2024)" action — that is FALSE. sb0416 is a separate
  12-March-2026 OFAC designation (re-homed to
  2026-03/treasury-sb0416-it-worker-facilitators); there was no OFAC
  IT-worker designation on 16 May 2024. The real same-day companion
  to the Chapman indictment was the State Dept Rewards-for-Justice
  announcement.]
