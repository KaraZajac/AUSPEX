notes: |
  The actual 34-page grand-jury indictment underlying DOJ press
  release 24-1559, filed 11 Dec 2024 (Doc #2, PageID 62) in the
  U.S. District Court for the Eastern District of Missouri
  (Eastern Division, St. Louis), No. 4:24-cr-00648-MTS-JSD.
  Charges 14 named DPRK nationals (Jong Song Hwa, Ri Kyong Sik,
  Kim Ryu Song, Rim Un Chol, Kim Mu Rim, Cho Chung Pom, Hyon
  Chol Song, Son Un Chol, Sok Kwang Hyok, Choe Jong Yong, Ko
  Chung Sok, Kim Ye Won, Jong Kyong Chol, Jang Chol Myong).

  Carries the precise facts the press release only summarizes:
  conspiracy window "From in or around April 2017 to in or
  around March 2023" (para 4; counts 85/89/92/94/97); "approximately
  six-year conspiracy ... at least $88 million in illicit revenue
  for the DPRK" (para 7); the two sanctioned DPRK front companies
  "Yanbian Silverstar Network Technology Co., Ltd. ('Yanbian
  Silverstar'), based in the People's Republic of China" and
  "Volasys Silverstar, based in the Russian Federation" (para 4),
  jointly employing "at least 130 DPRK IT workers, known among
  the conspirators as 'IT Warriors'"; the stolen/borrowed/purchased
  US identities, laptop-farm and remote-access tradecraft, and
  source-code-theft extortion (paras 5-6); the $10,000/month
  per-worker quota. The WMD/nuclear/ballistic-missile-program
  framing (paras 2-3) is expressly attributed to "a May 2022
  advisory" and stated about "all DPRK IT workers" / "the vast
  majority of them" (the general category), not as this scheme's
  own charged terminal purpose (which is "revenue for the DPRK").
