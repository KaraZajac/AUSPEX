notes: |
  DOJ EDVA press release (Sep 26 2024), investigated by the US Secret
  Service, unsealing indictments of Sergey Sergeevich Ivanov ("Taleon")
  and Timur Shakhmametov ("Vega" / alleged Joker's Stash operator) for
  money-laundering and bank-fraud conspiracies (Shakhmametov also access-
  device-fraud conspiracy) tied to Cryptex, PM2BTC, UAPS, Joker's Stash
  and the Rescator carding shops; the Justice Department seized associated
  web domains. Companion to Treasury jy2616.

