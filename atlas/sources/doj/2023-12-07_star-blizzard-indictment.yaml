notes: |
  Indictment of Ruslan Aleksandrovich Peretyatko and Andrey
  Stanislavovich Korinets for the Star Blizzard / Callisto credential
  phishing campaign targeting UK/US/EU policy elites, defense
  intellectuals, exiled dissidents, and the 2019 UK trade-document
  leak operation. Coordinated with UK FCDO sanctions and CISA/NCSC
  AA23-341A.
