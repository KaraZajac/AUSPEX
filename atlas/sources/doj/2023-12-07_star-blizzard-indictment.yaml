notes: |
  DOJ press release on the San Francisco grand-jury indictment of
  Ruslan Aleksandrovich Peretyatko — "an officer in Russia's Federal
  Security Service (FSB) Center 18" — and Andrey Stanislavovich
  Korinets ("Callisto Group" spear-phishing campaign). Coordinated
  with Treasury OFAC + UK sanctions + State Dept $10M rewards.
  AUDIT (2026-07-10, claude-opus-4.8/max): raw snapshot captured from
  the live justice.gov page (86,008 B, sha256 63fb8b45…d19a4736).
  BYPASS: justice.gov/opa/pr 301-redirects to /archives/opa/pr and
  sits behind an Akamai Bot-Manager "bm-verify" interstitial; bypassed
  by POSTing the challenge token+pow to /_sec/verify then re-GETting
  with the clearance cookie (full clean article, headline + body). url
  + tier PRESERVED. RAW facts (verbatim): target set "current and
  former employees of the U.S. Intelligence Community, Department of
  Defense, Department of State, defense contractors, and Department of
  Energy facilities between at least October 2016 and October 2022"
  plus "military and government officials, think tank researchers and
  staff, and journalists in the United Kingdom and elsewhere"; info
  "leaked to the press in Russia and the United Kingdom in advance of
  U.K. elections in 2019". STRIPPED from prior note as NOT in the raw:
  "EU policy elites", "defense intellectuals", "exiled dissidents",
  "trade-document" (DOJ names none of these; DOJ names Center 18 only
  for Peretyatko, and does NOT call Korinets an FSB officer). Used on
  2023-12/star-blizzard-fsb-indictment-sanctions.
