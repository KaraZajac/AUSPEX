notes: |
  US Department of Justice national (OPA) press release on
  Operation WireWire, 2018-06-11, the first major BEC-syndicate
  takedown — 74 arrests (42 US, 29 Nigeria, 3 across Canada,
  Mauritius, and Poland) over a six-month sweep.
  AUDIT (2026-06-28, claude-opus-4.8/max): live URL RECOVERED on
  the migrated /archives/opa/pr/ path (the record previously
  carried url: null, claiming the canonical URL was unreachable;
  it is reachable, the resource exists). However justice.gov serves
  an Akamai bot-challenge interstitial to the fetcher, so the
  article body is NOT snapshottable here — raw_snapshot/content_sha256
  intentionally left null. Facts corroborated against the FBI
  government-primary mirror fbi/2018-06-11_operation-wirewire-bec-takedown
  (snapshotted + hashed) and the FBI Los Angeles field-office release,
  both of which reproduce the DOJ figures verbatim. Earlier publisher
  attribution to USAO-EDLA was incorrect for this lead release (it is
  the DOJ OPA national press release); USAO-EDLA published the sister
  Operation reWired release in 2019.
