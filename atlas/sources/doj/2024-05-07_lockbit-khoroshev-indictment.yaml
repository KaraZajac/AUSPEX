notes: |
  DOJ unsealing of indictment against Dmitry Yuryevich Khoroshev
  ("LockBitSupp"), unmasking the LockBit ransomware-operation
  administrator. Paired with parallel UK NCA and OFAC actions.

  AUDIT (2026-06-24, claude-opus-4.8/max): state-nexus = NO. Describes Khoroshev as a
  "Russian national ... 31, of Voronezh, Russia" (also handle "putinkrab" — a self-chosen
  alias, not a state tie) charged as "creator, developer, and administrator of the LockBit
  ransomware group." Motive framing is purely financial-criminal: LockBit "targeted over
  2,000 victims and stolen more than $100 million in ransomware payments"; victims include
  "critical infrastructure, and government and law-enforcement agencies" (as TARGETS, not
  sponsors). ZERO FSB/GRU/SVR/Kremlin/state-sponsor/intelligence-service/tasking tokens —
  nationality only. The state nexus that justifies ru/proxies/ comes from the OFAC
  companion (safe harbor), not this indictment. raw_snapshot: live justice.gov URL serves
  an anti-bot JS interstitial (HTTP 400 to curl, 403 to WebFetch); captured via the
  committed archive_url wayback copy (2026-06-24, full article body) instead.
