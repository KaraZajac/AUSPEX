notes: |
  The 2015 SDNY indictment of Sumit Gupta, BellTroX principal,
  for his role in a hack-for-hire matter involving US-litigation
  clients. Gupta did not appear in US court and operations
  continued; the indictment is the earliest US-government
  enforcement action touching the BellTroX organization. Exact
  case-number URL needs verification — publisher landing URL
  used. Cited extensively in Citizen Lab's 2020 Dark Basin
  report.
