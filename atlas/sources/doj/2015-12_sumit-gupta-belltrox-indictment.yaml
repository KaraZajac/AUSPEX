notes: |
  The 2015 N.D. California indictment of Sumit Gupta (aka Sumit
  Vishnoi), BellTroX principal, plus US co-conspirators Moser,
  Siragusa, Pacileo and Williams, for hack-for-hire in connection
  with civil litigation. Gupta did not appear in US court and
  operations continued; the indictment is the earliest US-government
  enforcement action touching the BellTroX organization. Cited
  extensively in Citizen Lab's 2020 Dark Basin report.
  Source corrected 2026-05-29 (Agent2): district was N.D. Cal,
  not SDNY (publisher previously misstated). Indictment date
  was 2015-01-15 (grand jury). Previously stored URL
  https://www.justice.gov/usao-sdny was a generic SDNY landing page.
  AUDIT (2026-06-25, claude-opus-4.8/max): published_on corrected
  2015-09-01 -> 2015-02-11 (the prior date was unsupported; Wikipedia's
  Dark Basin article and databreaches.net date the DOJ release to
  2015-02-11, immediately after the 2015-02-10 unsealing in San Jose).
  raw_snapshot/content_sha256 added but the captured file is the
  Akamai bot-wall INTERSTITIAL, not the article — justice.gov blocks
  curl and WebFetch (HTTP 403). Article text verified via the
  search-engine crawl of this same release and corroborated by
  Reuters/The Record, databreaches.net, Courthouse News and
  thompsonburton: defendants Moser, Siragusa (aka Bobby Russo),
  Pacileo (ViSalus security director), Williams and Gupta (of
  Jabalpur, India); grand jury 2015-01-15; charges = conspiracy
  18 U.S.C. 1030(b), accessing a protected computer 1030(a)(2)(C),
  interception of electronic communications 2511(1)(a); keylogger
  used; object was ViSalus's civil suit against Ocean Avenue; Gupta
  warranted, never arrested, declared fugitive 2017. (NB this is the
  N.D. Cal / ViSalus matter — distinct from the SDNY 2022 Aviram
  Azari case, which carried the wire-fraud / identity-theft charges.)
