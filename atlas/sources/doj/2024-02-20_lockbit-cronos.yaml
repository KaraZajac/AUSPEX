  Joint FBI / NCA / Europol announcement of LockBit infrastructure
  takedown. Canonical Pillar 2 (Disrupt and Dismantle) operation.

  URL identified 2026-05-28 verification sweep: DOJ press release
  "US and UK Disrupt LockBit Ransomware Variant" now lives under
  /archives/opa/pr/ tree.

  AUDIT (2026-06-24, claude-opus-4.8/max): state-nexus = NO. Pure law-enforcement /
  profit-criminal framing — "extort victims by threatening to publish stolen data",
  "criminal operation", "one of the most active and destructive variants in the world",
  "over $120 million in ransom payments". Names Khoroshev's co-conspirators only as
  "Russian nationals" (Sungatov, Kondratyev/Bassterlord, Matveev, Astamirov; Vasiliev =
  dual Russian-Canadian) — NATIONALITY descriptors, NOT state tasking/tolerance. ZERO
  FSB/GRU/SVR/Kremlin/state-sponsor/intelligence-service tokens. The Treasury (OFAC)
  companion release — not this DOJ release — carries the safe-harbor nexus that keeps
  LockBit in ru/proxies/. raw_snapshot: the live justice.gov URL returns an anti-bot JS
  interstitial to curl/WebFetch (HTTP 400/403 "request is being processed"); captured
  instead via the committed archive_url wayback copy (2026-06-24, the real article body,
  39+ "LockBit" tokens) so the snapshot is the substantive content, not the challenge page.
