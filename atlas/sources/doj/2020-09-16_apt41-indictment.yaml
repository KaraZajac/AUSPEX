notes: |
  APT41 / Chengdu 404 indictment unsealing — Zhang Haoran, Tan Dailin,
  Jiang Lizhi, Qian Chuan, Fu Qiang plus two Malaysian co-conspirators.
  Companion to the August 2019 indictment of Zhang/Tan.
  AUDIT (2026-06-24, claude-opus-4.8/max): the load-bearing source for the
  cn/mss/apt41 service placement. This DOJ press release is the ONLY cited
  APT41 source that names the Ministry of State Security; it does so in its
  subtitle, in direct connection with the APT41 defendants: "Two Defendants
  Arrested in Malaysia; Remaining Five Defendants, One of Whom Allegedly
  Boasted of Connections to the Chinese Ministry of State Security, are
  Fugitives in China." (The "one" is Jiang Lizhi per the underlying August
  2020 indictment.) Note the DOJ frames this as a defendant's own *boast* of
  MSS connections, not an independent DOJ assertion of MSS tasking — but it is
  an explicit, on-the-record naming of the MSS by a govt-primary source tied to
  this actor, which clears the AUSPEX bar for KEEPING the MSS service placement.
  All other cited sources (FBI, Mandiant ×2, Talos) say only "Chinese
  state-sponsored" / "Chinese nationals" / "Chengdu 404" and do NOT name a
  service. raw_snapshot is the archive.org capture (live justice.gov serves a
  JS rate-limit interstitial to curl and 403s WebFetch); archive_url already on
  record. content_sha256 over that snapshot.
