notes: |
  DOJ OPA press release (No. 24-1559). Indictment returned
  11 Dec 2024 in USDC Eastern District of Missouri (St. Louis);
  release dated 12 Dec 2024. 14 DPRK nationals charged with
  conspiracies to violate US sanctions (IEEPA) and to commit
  wire fraud, money laundering, and identity theft in the
  remote-IT-worker fraud scheme. Names two sanctioned
  DPRK-controlled front companies: Yanbian Silverstar (in the
  PRC) and Volasys Silverstar (in the Russian Federation).
  ~$88M over an approximately six-year conspiracy; victims are
  "numerous U.S.-based companies and nonprofit organizations."
  Related source-code-theft extortion.
