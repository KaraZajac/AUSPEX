notes: |
  SDNY unsealing of indictments against Roman Storm (arrested
  Washington State) and Roman Semenov (at-large) for conspiracy
  to commit money laundering, conspiracy to violate IEEPA
  sanctions (including the Tornado Cash entity designation of
  August 2022), and conspiracy to operate an unlicensed
  money-transmitting business. Indictment quantifies over
  USD 1B in criminal proceeds laundered including funds tied
  to the Lazarus Group / DPRK.
  AUDIT 2026-07-10 (claude-opus-4.8/max): the live /usao-sdny/pr/
  page is Akamai bot-walled (bm-verify interstitial; a PoW /_sec/verify
  solve returned {"reload":true} but did not upgrade the cookie to a
  clean article). raw_snapshot is instead the reachable static charging
  document — the 37-page indictment PDF at
  justice.gov/usao-sdny/file/1311391 (sha256 f75d8bd3…f01b5dc0,
  8,532,833 B) — but it is a SCANNED image (no text layer; no OCR
  in-env). Verbatim press-release quotes were therefore verified against
  archive_url = a clean same-day (2023-08-23 18:32 UTC) web.archive.org
  capture of the IDENTICAL cross-posted Main-Justice OPA release (text
  sha256 478d9f1a…7a18a6eb): headline charges (money laundering /
  sanctions / unlicensed money transmitting); "Roman Storm, 34, of
  Auburn, Washington, and Roman Semenov, 49, of Russia ... facilitated
  more than $1 billion in money laundering transactions, and laundered
  hundreds of millions of dollars for the Lazarus Group, the sanctioned
  North Korean cybercrime organization"; "Storm was arrested today in
  the state of Washington"; 20-yr max (ML + IEEPA), 5-yr max (unlicensed
  MTB). NB the DOJ release names Lazarus/DPRK but does NOT state the
  terminal WMD goal — that attestation comes from the companion Treasury
  jy1702 release (see the event's doctrine link).
