notes: |
  USAO press release from the prosecuting office — US Attorney's
  Office, Central District of California (US Attorney Martin
  Estrada), with the FBI Los Angeles Field Office. This is the
  reachable, live counterpart to the DOJ OPA national announcement
  (doj/2024-11-20_scattered-spider-five-indictment), whose
  /archives/opa/pr/ URL was purged from live justice.gov and is now
  reachable only via its archive_url (Wayback 2026-05-26).

  AUDIT (2026-07-05, claude-opus-4.8/max): Snapshotted live via the
  justice.gov Akamai Bot-Manager two-step (cookie + bm-verify
  redirect) — the meta-refresh challenge page is NOT the article;
  the passed request returns the 104,937-byte release. Verbatim
  support captured: "Law enforcement today unsealed criminal charges
  against five defendants who allegedly targeted employees of
  companies nationwide with phishing text messages ... to hack into
  virtual currency accounts to steal millions of dollars in
  cryptocurrency." Four US defendants (Elbadawy a.k.a. "AD"; Urban
  a.k.a. "Sosa"/"Elijah"; Osiebo; Evans a.k.a. "joeleoli") charged
  "by a federal grand jury indictment with one count of conspiracy
  to commit wire fraud, one count of conspiracy, and one count of
  aggravated identity theft"; Buchanan (UK) charged separately "by
  criminal complaint ... with conspiracy to commit wire fraud,
  conspiracy, wire fraud, and aggravated identity theft." US
  Attorney: "the Central District of California." Timeframe: "from
  at least September 2021 to April 2023." NOTE: this CDCA release
  does NOT contain the strings "Scattered Spider," "SIM-swap," or
  the "$11 million / ~29 victims" figure — those come from the OPA
  national version and vendor/press reporting. Content SHA-256
  above; bytes 104937.
