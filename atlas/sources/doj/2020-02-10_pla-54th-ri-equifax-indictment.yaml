notes: |
  Indictment of four PLA 54th Research Institute officers (Wu Zhiyong,
  Wang Qian, Xu Ke, Liu Lei) for the 2017 Equifax intrusion.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the cn/pla/54th-research-institute
  service placement of actor cn/pla/54th-ri-equifax at the named-unit level. justice.gov
  serves an Akamai bot-verification interstitial to curl (and 403s WebFetch), so the raw
  snapshot is the cited Wayback capture of the same press release (no interstitial markers;
  111 KB; full article text). The release names the PLA's 54th Research Institute as the
  operating unit, verbatim: "A federal grand jury has returned an indictment charging four
  members of the Chinese People's Liberation Army (PLA) with hacking into the computer systems
  of the credit reporting agency Equifax..."; "The nine-count indictment alleges that Wu
  Zhiyong (吴志勇), Wang Qian (王乾), Xu Ke (许可) and Liu Lei (刘磊) were members of the PLA's 54th
  Research Institute, a component of the Chinese military."; "The defendants exploited a
  vulnerability in the Apache Struts Web Framework software used by Equifax's online dispute
  portal."
