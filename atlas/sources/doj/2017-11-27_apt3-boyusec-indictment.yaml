notes: |
  Wu Yingzhuo, Dong Hao, Xia Lei — Guangzhou Bo Yu Information
  Technology Co. ("Boyusec"). Targets included Moody's Analytics,
  Siemens AG, Trimble Inc. Recorded Future and Intrusion Truth
  (May 2017) linked Boyusec to MSS Guangdong State Security
  Department.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured for the cn/mss/apt3
  service-placement audit. The live justice.gov URL now 400s to a generic
  homepage; raw_snapshot is the archive.org copy (Wayback 2025-02-02), which
  carries the genuine press release. IMPORTANT: this DOJ release does NOT
  itself name the Ministry of State Security or any intelligence service — it
  charges the three Boyusec employees for commercial espionage / trade-secret
  theft and calls Boyusec only "the purported China-based Internet security
  firm Guangzhou Bo Yu Information Technology Company Limited (a/k/a
  'Boyusec')." It establishes the Boyusec identity, the three indicted
  individuals ("founding member and equity shareholder of Boyusec" — Wu, Dong;
  Xia "an employee of Boyusec"), and the named victims (Moody's Analytics,
  Siemens AG, Trimble Inc.), but the MSS nexus rests on Recorded Future /
  Intrusion Truth, not on this document. Quote: "An indictment was unsealed
  today against Wu Yingzhuo, Dong Hao and Xia Lei … for computer hacking,
  theft of trade secrets, conspiracy and identity theft … The three Chinese
  hackers work for the purported China-based Internet security firm Guangzhou
  Bo Yu Information Technology Company Limited (a/k/a 'Boyusec')."
