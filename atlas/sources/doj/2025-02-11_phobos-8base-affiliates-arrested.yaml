notes: |
  DOJ Office of Public Affairs release on the unsealing of an 11-count
  indictment against two Russian nationals for running the 8Base / Phobos
  ransomware-affiliate operation, coincident with the international takedown.
  Created 2026-07-04 to RE-SOURCE event 2025-02/operation-phobos-aetor-8base.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (d04534e0…f1cc1e0a, 95,525 bytes). NB the OPA /opa/pr/ URL rendered
  full article body via curl this run (unlike the JS-blank USAO-MD Ptitsyn page
  noted on doj/2024-11-12_ptitsyn-phobos-extradition) — body captured directly.
  Verbatim support:
   - "According to court documents, Berezhnoy, Glebov, and others operated a
     ransomware affiliate organization, including under the names '8Base' and
     'Affiliate 2803,' among others, that victimized public and private entities
     through the deployment of Phobos ransomware."
   - "Berezhnoy and Glebov were arrested this week as part of a coordinated
     international disruption of their organization, which includes additional
     arrests and the technical disruption of the group's computer infrastructure."
   - "From May 2019, through at least October 2024, Berezhnoy, Glebov, and others
     allegedly caused victims to suffer losses…"
   - "The victims included a children's hospital, health care providers, and
     educational institutions."
   - "In parallel with this week's arrests, Europol and German authorities have
     announced an international operation involving the FBI and other international
     law enforcement partners to disrupt over 100 servers associated with this
     criminal network."
   - "The charges unsealed today against Berezhnoy and Glebov follow the recent
     arrest and extradition of Evgenii Ptitsyn, a Russian national, on charges
     relating to his alleged administration of the Phobos ransomware variant."
   - Charged defendants: "Roman Berezhnoy, 33, and Egor Nikolaevich Glebov, 39";
     11-count indictment; DOJ thanks partners in UK, Germany, Japan, Spain,
     Belgium, Poland, Czech Republic, France, Thailand, Finland, Switzerland,
     Romania + Europol. "An indictment is merely an allegation."
