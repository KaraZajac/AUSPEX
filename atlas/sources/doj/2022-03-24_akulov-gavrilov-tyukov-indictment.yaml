notes: |
  The actual Kansas charging document for the "Berserk Bear / Dragonfly"
  FSB Center 16 energy-sector conspiracy (the reachable, snapshottable
  primary behind the bot-walled DOJ press release
  doj/2022-03-24_berserk-bear-triton-indictment). Hosted as a static
  justice.gov /d9/ file attachment — NOT Akamai-walled, unlike the
  /opa/pr/ press-release page. Raw PDF captured + hashed (4,850,994
  bytes, sha256 9f3e12e0…9853c115).
  AUDIT (2026-07-10, claude-opus-4.8/max): CREATED during the
  berserk-bear-us-energy-campaign event audit. Verbatim, load-bearing:
  attribution — "the Federal Security Service ('FSB') … comprised of
  multiple units … including Military Unit 71330, which was also known
  within the FSB as 'Center 16'"; defendants "PAVEL ALEKSANDROVICH
  AKULOV, MIKHAIL MIKHAILOVICH GAVRILOV, and MARAT VALERYEVICH TYUKOV
  … were FSB officers working for Center 16." Terminal goal (OBJECT OF
  THE CONSPIRACY, ¶17) — "The object of the conspiracy was to establish
  and maintain surreptitious, unauthorized access to networks, computers,
  and devices of companies and other entities in the energy sector,
  including power generation facilities, in the United States and
  elsewhere, thereby enabling the Russian government to disrupt and
  damage such systems, if it wished." Named victim — the "Wolf Creek
  Nuclear Operating Corporation" (Burlington, Kansas): "unauthorized
  access to, Wolf Creek's computer network (part of Dragonfly 2.0)";
  "The Conspirators sent the May 5, 2017 spearphishing emails to Wolf
  Creek." Period 2012–2017; methods include spearphishing, watering-hole
  attacks, and supply-chain compromise (the latter = the earlier Havex
  phase, modeled in event 2014-06/dragonfly-energetic-bear). This PDF is
  strictly better than the bot-walled press release for every claim; the
  press-release record is retained separately as the announcement that
  also covers the parallel TsNIIKhM/Triton (Gladkikh) indictment.
