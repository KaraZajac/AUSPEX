  AUDIT (2026-07-05, claude-opus-4.8/max): PHANTOM — url is null and never
  resolved; the 2026-05-15 date, the "four C2 servers", the "~USD 1.5M", the
  "three Conti-lineage operators / unsealed indictments" and the "decryptors for
  ~250 victims" above are UNSUPPORTED and partly FABRICATED. The real event is
  Operation Checkmate: the BlackSuit/Royal takedown of four servers + NINE
  DOMAINS on 2025-07-24, formally announced by DOJ on 2025-08-11, with a seizure
  of $1,091,453 (~USD 1.09M, not $1.5M — the ~$1.45M figure is a single 2023
  victim ransom, misread), by HSI/Secret Service/IRS-CI/FBI + UK NCA, Germany's
  LKA Niedersachsen (not BKA), Ireland, France's Office Anti-Cybercriminalite
  (not Gendarmerie), Canada RCMP, Ukraine, Lithuania (Europol/Bitdefender
  assisted); NO operator indictment and NO decryptor release were announced.
