notes: |
  DOJ USAO-WDTX press release (Thursday, Feb 15, 2024) announcing that
  Mark Sokolovsky, alleged operator of the Raccoon Infostealer MaaS,
  "was extradited to the United States from the Netherlands." Verbatim:
  "He made his initial court appearance Feb. 9, and is being held in
  custody pending trial." Re-states the March-2022 FBI + Italy +
  Netherlands infrastructure dismantling and the 50M+ unique credentials
  figure. This is the record that pins the ACTUAL extradition to
  February 2024 (initial appearance Feb 9, 2024) — correcting the false
  "extradited October 2022" claim carried by the retired phantom source.
  Does NOT mention "200,000 devices" or "Genesis Market."

