notes: |
  Indicts Ahmad Fathi, Hamid Firoozi, Amin Shokohi, Sadegh
  Ahmadzadegan, Omid Ghaffarinia, Sina Keissar, and Nader Saedi
  for the 2012-13 Operation Ababil DDoS against US banks and
  the 2013 Bowman Avenue Dam intrusion. Establishes IRGC
  affiliation of ITSecTeam and Mersad Co.
