notes: |
  Indicts Ahmad Fathi, Hamid Firoozi, Amin Shokohi, Sadegh
  Ahmadzadegan, Omid Ghaffarinia, Sina Keissar, and Nader Saedi
  for the 2012-13 Operation Ababil DDoS against US banks and
  the 2013 Bowman Avenue Dam intrusion. Establishes IRGC
  affiliation of ITSecTeam and Mersad Co.
  AUDIT (2026-06-25, claude-opus-4.8/max): live URL returns HTTP 403
  (Akamai bot-wall) and archive.org is blocked to tooling, so no clean raw
  snapshot was retained (the only capture was the bot interstitial). Content
  corroborated against the DOJ domain and the SDNY companion release
  (justice.gov/usao-sdny "Manhattan U.S. Attorney Announces Charges Against
  Seven Iranians…"). Verbatim quotes confirmed: "46 victims, primarily in
  the U.S. financial sector," "late 2011 through mid-2013," and AG Lynch's
  "designed specifically to harm America and its people." Attribution firmness:
  IRGC-affiliated/sponsored entities — named-unit.
