notes: |
  DOJ press release on the August 1 2018 indictment of three
  Ukrainian nationals — Dmytro Fedorov, Fedir Hladyr, and
  Andrii Kolpakov — for FIN7's point-of-sale malware
  campaigns against US restaurant and retail chains
  including Chipotle, Arby's, Sonic, and Whole Foods.
  Approximately 15M+ payment cards exfiltrated across 6,500
  US POS terminals at 3,600+ business locations.
