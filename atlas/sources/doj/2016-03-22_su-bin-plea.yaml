notes: |
  Su Bin / Stephen Su / Stephen Subin plea agreement. Co-conspirators in
  China; C-17, F-22, F-35 IP theft from Boeing and Lockheed Martin
  subcontractor networks 2008-2014. DOJ characterizes exfiltrated material
  as equivalent to "5 Libraries of Congress."
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the cn/su-bin-ring
  service placement. This release / plea agreement does NOT name the PLA: it
  states "Su Bin admitted to conspiring with TWO OTHER PERSONS IN CHINA from
  October 2008 to March 2014 to gain unauthorized access to protected computer
  networks in the United States ... to obtain sensitive military information"
  (verbatim). The phrase "People's Liberation Army" does not appear in this
  document, and contemporaneous reporting confirms "Court documents did not
  indicate to whom Su was sending the plans" (SCMP, 2016-03-23). The explicit
  "People's Liberation Army Air Force" attribution comes from a SEPARATE DOJ
  *sentencing* statement (AAG John P. Carlin, July 2016) and from journalists'
  inference — not from this March 2016 plea source. On that basis the actor was
  demoted cn/pla/su-bin-ring -> cn/unscoped/su-bin-ring (prior note's "two
  unnamed PLA officers" was an over-statement of this document and is corrected
  above). justice.gov 403s/serves a JS shell to research clients and the hosted
  plea-agreement PDF (justice.gov/opa/file/834936) now 404s; raw_snapshot is the
  Wiggin and Dana legal summary (wiggin.com), captured 2026-06-24, which quotes
  the plea agreement's "two other persons in China" language verbatim.
