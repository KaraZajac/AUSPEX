  Indictment of Zhu Hua and Zhang Shilong (APT10 / MSS Tianjin via
  Huaying Haitai). Operation Cloud Hopper MSP supply-chain
  campaign; victims span all MIC2025 sectors.
  AUDIT (2026-06-24, claude-opus-4.8/max): the decisive source for the cn/mss/apt10 service
  placement — its own DOJ press-release title is "Two Chinese Hackers Associated With the
  Ministry of State Security Charged With Global Computer Intrusion Campaigns…", and MITRE
  ATT&CK G0045 relays this indictment as the basis for "the Chinese Ministry of State Security's
  (MSS) Tianjin State Security Bureau … Huaying Haitai Science and Technology Development
  Company." NO raw snapshot captured (note+skip per protocol): justice.gov returned HTTP 400 to
  curl and 403 to WebFetch, the FBI mirror (fbi.gov/news/stories/chinese-hackers-indicted-122018)
  returned 403, and archive.org is blocked in this environment. The MSS-Tianjin/Huaying-Haitai
  wording is captured + hashed via the MITRE G0045 raw snapshot, which footnotes this indictment.
  AUDIT (2026-06-30, claude-opus-4.8/max): bot-wall re-confirmed — curl of the justice.gov URL
  now returns HTTP 200 but only a 2,575-byte Akamai "bm-verify" JS challenge page (no article
  body); WebFetch → 403. No content hash recorded (challenge page not a valid snapshot). Facts
  mirror-corroborated for event 2018-12/apt10-cloud-hopper-indictment via CyberScoop / FBI Wanted
  / Nextgov / Defense One (2018-12-20): "≥45 tech companies in ≥ a dozen states", MSPs + clients
  in ≥12 countries, and "more than 100,000 Navy personnel" records off 40+ computers.
