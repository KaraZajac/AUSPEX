notes: |
  APT31 / Hubei State Security Department via front company Wuhan
  Xiaoruizhi Science & Technology Co. Seven defendants. Companion
  to OFAC SDN designations of Wuhan XRZ, Zhao Guangzong, Ni Gaobin
  on the same date. Indictment LISTS "an energy company based in
  Texas" among APT31's US victims (para 25 enumeration, undated,
  scope "Between at least 2010 and November 2023"); the "2018" date
  and the "malicious cyber operation ... gaining unauthorized
  access" wording come from the companion Treasury release, not the
  indictment. The indictment attaches no vector or tooling to this
  victim (verified 2026-07-10, claude-opus-4.8/max).
  AUDIT (2026-06-24, claude-opus-4.8/max): MSS placement of cn/mss/apt31
  VERIFIED against this source. The PR HTML page 403s automated fetchers;
  the actual EDNY indictment (Cr. No. 24-CR-43, 27pp) was captured via the
  DOJ media endpoint (/opa/media/1345141/dl) and read directly. It names the
  MSS and the chain to APT31 explicitly: "The People's Republic of China
  ('PRC') conducted intelligence activities ... including through the Ministry
  of State Security ('MSS'). ... The MSS consisted of a central ministry,
  provincial state security departments ... and municipal state security
  bureaus." (Para 1); "The Hubei State Security Department ('HSSD') was the
  provincial foreign intelligence arm of the MSS in Hubei Province, PRC."
  (Para 4); "In approximately 2010, the HSSD created a front company, Wuhan
  Xiaoruizhi Science & Technology Co., Ltd. ... to carry out its computer
  intrusion activities." (Para 5); the seven defendants "together with dozens
  of identified MSS intelligence officers, contractor hackers and support
  personnel, were part of a group of malicious cyber actors operating on
  behalf of the HSSD. The group was known by cybersecurity researchers as
  'Advanced Persistent Threat 31' or 'APT 31,' 'Zirconium,' 'Violet Typhoon,'
  'Judgment Panda' and 'Altaire.'" (Para 14). The MSS is named by name as the
  parent service of the HSSD, which directs APT31 — named-unit attribution.
