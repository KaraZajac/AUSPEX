title: |
  US Charges Five Chinese Military Hackers for Cyber Espionage Against
  US Corporations and a Labor Organization for Commercial Advantage
url: https://www.justice.gov/opa/pr/us-charges-five-chinese-military-hackers-cyber-espionage-against-us-corporations-and-labor
archive_url: "https://web.archive.org/web/20250205154347/https://www.justice.gov/opa/pr/us-charges-five-chinese-military-hackers-cyber-espionage-against-us-corporations-and-labor"
published_on: 2014-05-19
retrieved_on: 2026-05-25
tier: primary
notes: |
  First-ever US criminal charges against uniformed foreign military
  officers for cyber espionage. Wang Dong, Sun Kailiang, Wen Xinyu,
  Huang Zhenyu, Gu Chunhui — PLA Unit 61398 (APT1). Named victims
  include Westinghouse, US Steel, Alcoa, Allegheny Technologies,
  SolarWorld, USW.
