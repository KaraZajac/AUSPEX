notes: |
  First-ever US criminal charges against uniformed foreign military
  officers for cyber espionage. Wang Dong, Sun Kailiang, Wen Xinyu,
  Huang Zhenyu, Gu Chunhui — PLA Unit 61398 (APT1). Named victims
  include Westinghouse, US Steel, Alcoa, Allegheny Technologies,
  SolarWorld, USW.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the cn/pla/apt1 service placement
  (primary_service_id cn/pla/unit-61398 — PLA Unit 61398) at the named-unit level. The live
  justice.gov press-release URL now 404s; captured the Wayback snapshot instead (sha256 above).
  The press release names the exact PLA unit: "Wang Dong, Sun Kailiang, Wen Xinyu, Huang Zhenyu,
  and Gu Chunhui, who were officers in Unit 61398 of the Third Department of the Chinese People's
  Liberation Army (PLA)" and charges "five Chinese military hackers ... economic espionage ...
  directed at six American victims in the U.S. nuclear power, metals and solar products
  industries." Military (PLA), not MSS. KEEP confirmed.
