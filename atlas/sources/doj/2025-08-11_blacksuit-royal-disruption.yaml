notes: |
  DOJ Office of Public Affairs press release (dateline Monday, August 11, 2025).
  The canonical primary for the Operation Checkmate BlackSuit/Royal seizure —
  RE-SOURCED in on 2026-07-05 to replace the phantom
  doj/2025-05-15_blacksuit-disruption (url: null, invented slug).

  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured live (curl HTTP 200,
  95,695 bytes; sha256 28a90051...b37fc474). Verbatim support:
  * "The Justice Department announced today coordinated actions against the
    BlackSuit (Royal) Ransomware group which included the takedown of four
    servers and nine domains on July 24, 2025."
  * "The takedown was conducted by the Department of Homeland Security's Homeland
    Security Investigations (HSI), the U.S. Secret Service, IRS Criminal
    Investigation (IRS-CI), the FBI, and international law enforcement from the
    United Kingdom, Germany, Ireland, France, Canada, Ukraine, and Lithuania."
  * Named foreign agencies: "the United Kingdom's National Crime Agency and
    Northwest Regional Organized Crime Unit, Germany's Landeskriminalamt
    Niedersachsen, Ireland's An Garda Siochana - Garda National Cyber Crime
    Bureau, France's Office Anti-Cybercriminalite, Canada's Royal Canadian
    Mounted Police" (NOT BKA / Gendarmerie / Europol — Europol is named only in
    secondary reporting).
  * "These actions include the unsealing of a warrant for the seizure of virtual
    currency valued at $1,091,453 at the time of the seizure." (NOT ~$1.5M.)
  * Provenance of the seized crypto: "On or about April 4, 2023, a victim paid a
    ransom of 49.3120227 Bitcoin to decrypt their data. This ransom was worth
    $1,445,454.86 at the time of the transaction. A portion of those proceeds
    ($1,091,453) was ... laundered ..." (the $1.45M is a single 2023 victim
    ransom, not a total; the "decrypt" is the victim decrypting after paying —
    NOT a law-enforcement decryptor release).
  * Disrupt-Dismantle strategic purpose (attested-tier quote): "This action
    exemplifies the forward-leaning, disruption-first approach we are taking to
    address this threat," said U.S. Attorney Erik S. Siebert (EDVA).
  * Contains NO operator indictment/arrest ("indict"/"arrest"/"charge" of a
    BlackSuit operator absent) and NO "~250 victim decryptor release" — both of
    which the retired phantom source asserted.
