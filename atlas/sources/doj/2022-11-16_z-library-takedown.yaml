notes: |
  DOJ press release on the November 2022 arrest of Russian
  nationals Anton Napolsky and Valeriia Ermakova in Cordoba,
  Argentina (Nov 3 2022, at US request) and the unsealing of a
  copyright / wire-fraud / money-laundering indictment for the
  operation of Z-Library — a large-scale e-book and
  academic-paper piracy site DOJ described as hosting ~11M
  e-books and millions of research articles. Approximately 249
  associated domains seized by the US government. Edgecase event
  for AUSPEX: the underlying conduct is intellectual-property
  infringement at scale rather than cyber-intrusion, but the
  enforcement template (domain seizure plus extradition warrant)
  is identical to the cybercrime-marketplace pattern.
  AUDIT (2026-07-02, claude-opus-4.8/max): the live /usao-edny/pr/
  HTML is Akamai-bot-walled — curl returns a ~2.5 KB bm-verify
  challenge (HTTP 200) and WebFetch returns 403 — so NO
  content_sha256 was captured (archive.org is blocked for the
  fetcher). Claims mirror-corroborated: The Record,
  Infosecurity-Magazine, RFE/RL and VOA all confirm "approximately
  249" domains, "11 million e-books", the Nov 3 2022 Cordoba arrest,
  the FBI role (AD-in-Charge Michael Driscoll quoted) and the three
  charge families. CORRECTED in this note vs the prior text: "~250
  domains" -> ~249 (DOJ's enumerated figure), and the unsupported
  "84M articles" removed (no DOJ source states an 84-million article
  count — DOJ says "millions of research articles"; 84M is
  Z-Library's own self-claim). The snapshottable primary charging
  document is the sibling source doj/2022-11-16_z-library-indictment
  (sha256 a1fc6cd3...cb998ff).
