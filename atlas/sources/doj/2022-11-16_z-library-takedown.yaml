notes: |
  DOJ press release on the November 2022 arrest of Russian
  nationals Anton Napolsky and Valeriia Ermakova in
  Argentina on US warrants for the operation of Z-Library —
  a large-scale e-book and academic-paper piracy site
  hosting approximately 11M books and 84M articles. ~250
  domains seized. Edgecase event for AUSPEX: the underlying
  conduct is intellectual-property infringement at scale
  rather than cyber-intrusion, but the enforcement template
  (multilateral domain seizure plus extradition warrant) is
  identical to the cybercrime-marketplace pattern.
