notes: |
  Two unsealed indictments. (1) FSB Center 16 officers Pavel
  Akulov, Mikhail Gavrilov, Marat Tyukov for the 2012–17
  Berserk Bear / Dragonfly energy-sector campaign. (2) TsNIIKhM
  programmer Evgeny Gladkikh for the 2017 Triton/Trisis attack
  on Saudi Petro Rabigh. Canonical attestation for energy-
  weaponization pillar.
  AUDIT (2026-06-25, claude-opus-4.8/max): NAMES TsNIIKhM as Gladkikh's
  employer — corroborates the ru/tsniikhm service placement of actor
  ru/tsniikhm/triton. The DOJ release describes Gladkikh as "a computer
  programmer employed by an institute affiliated with the Russian
  Ministry of Defense"; the underlying indictment names the institute as
  "the State Research Center of the Russian Federation FGUP Central
  Scientific Research Institute of Chemistry and Mechanics (TsNIIKhM)"
  (its Applied Developments Center), which "described itself as the
  Russian Ministry of Defense's leading research organization," for the
  2017 Triton/Trisis attack on the foreign refinery. UNFETCHABLE for raw
  capture: live justice.gov URL returns HTTP 400 to curl and 403 to
  WebFetch, and the Wayback snapshot of this URL is an empty stub (no raw
  snapshot recorded). Wording above re-confirmed 2026-06-25 against the
  live justice.gov text (search-served) and the parallel CISA advisory
  AA22-083A, which reproduces the indictment.
  AUDIT (2026-07-05, claude-opus-4.8/max): re-verified bot-walled during
  the dragonfly-energetic-bear event audit — live justice.gov returns an
  Akamai bm-verify interstitial stub (2,561-byte challenge page, no
  article body), so no content hash is recorded. The co-published CISA/
  FBI/DOE advisory AA22-083A was captured + hashed and added as a
  first-class source (cisa/2022-03-24_aa22-083a-energy-sector); it
  reproduces the state-sponsored-Russian / FSB attribution of the
  2011-2018 Energy Sector campaign. The "Center 16" sub-unit label +
  officer names remain sourced to this (bot-walled) indictment,
  corroborated by Treasury OFAC + TA18-074A.
