notes: |
  Grand-jury indictment (EDNY, Case No. 22-cr-525, filed Nov 16 2022,
  Judge Nina Morrison) charging Russian nationals ANTON NAPOLSKY (a.k.a.
  "Anton Napolskiy") and VALERIIA ERMAKOVA with Count 1 criminal copyright
  infringement (17 U.S.C. 506(a)(1)(A), 2319(b)(1)); Count 2 conspiracy to
  commit wire fraud + Counts 3-4 wire fraud (18 U.S.C. 1349, 1343); and
  Count 5 money-laundering conspiracy (18 U.S.C. 1956(h)); plus
  criminal-forfeiture allegations. Operation window charged "in or about
  and between January 2018 and November 2022". This is the charging
  instrument attached to the DOJ press release; the
  /d9/press-releases/attachments/ route is reachable by curl (NOT
  Akamai-walled, unlike the /usao-edny/pr/ HTML which returns a bm-verify
  challenge to curl and 403 to WebFetch).
  AUDIT (2026-07-02, claude-opus-4.8/max): captured for event
  2022-11/z-library-takedown. PDF 411,503 bytes, sha256
  a1fc6cd3...cb998ff; a fresh download from the DOJ URL hash-matched the
  on-disk snapshot. Note: the indictment names the defendants and the five
  counts only — the "~249 domains seized", "11M e-books", FBI, and
  Argentina-arrest narrative facts live in the (Akamai-walled) press
  release and are mirror-corroborated.
