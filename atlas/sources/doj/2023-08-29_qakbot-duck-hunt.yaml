notes: |
  DOJ / FBI announcement of Operation Duck Hunt — disruption of the
  Qakbot botnet (~700K infected computers) in coordination with
  France, Germany, Latvia, Netherlands, Romania, UK.

  AUDIT (2026-06-24, claude-opus-4.8/max): Live justice.gov blocks automated
  fetch (direct curl -> HTTP 400 homepage; WebFetch -> HTTP 403); the full
  article was captured from the page's own archive_url (Wayback 2025-02-02
  snapshot) instead — raw_snapshot is that archived copy. State-nexus finding
  for the Qakbot actor audit: this source is a PURELY CRIMINAL / law-enforcement
  framing establishing NO Russia-state nor tolerated-proxy nexus for Qakbot at
  any confidence. The body names ZERO of {Russian state, FSB, GRU, SVR, Kremlin,
  Moscow, state-sponsor, proxy, safe-harbour, intelligence service} for Qakbot;
  the ONLY "Russia" token on the entire page is in an unrelated "Related Content"
  sidebar link ("three Russian nationals ... operating the cryptocurrency mixing
  services Blender.io") — a different case, not a Qakbot attribution. Qakbot is
  characterized solely as crime-for-profit. Verbatim: "Qakbot ... is controlled
  by a cybercriminal organization and used to target critical industries
  worldwide." / "The action represents the largest U.S.-led financial and
  technical disruption of a botnet infrastructure leveraged by cybercriminals to
  commit ransomware, financial fraud, and other cyber-enabled criminal activity."
  / "seizing $8.6 million in ill-gotten profits to return to the many entities
  victimized by Qakbot's criminal actions" / "the Qakbot cybercriminal
  organization". Consequence: this cited actor source does NOT support the
  ru/proxies/ (state-tolerated-proxy) placement -> actor demoted ru/proxies/qakbot
  -> ru/unscoped/qakbot on 2026-06-24, flagged as a criminal/ candidate (direct
  Emotet analogue).
