title: |
  Lumma Stealer infrastructure disrupted in coordinated
  international action
url: https://www.justice.gov/usao-ndtx/pr/lumma-stealer-disrupted
archive_url: null
published_on: 2025-05-21
retrieved_on: 2026-05-27
tier: primary
notes: |
  DOJ + Microsoft DCU coordinated takedown of Lumma Stealer
  (LummaC2) infrastructure. Microsoft Digital Crimes Unit
  obtained court order in EDNY for seizure of ~2,300 Lumma-
  associated domains; DOJ seized command-and-control
  infrastructure including the marketplace login panels and
  five core domains. Lumma had emerged as the leading post-
  RedLine infostealer through 2024 with ~400K infections in
  the 60 days preceding the action per Microsoft telemetry.
