notes: |
  Authoritative DOJ Office of Public Affairs announcement of the RaidForums
  seizure and the six-count indictment of administrator Diogo Santos Coelho
  ("Omnipotent"), 21, of Portugal, arrested in the UK on 31 January 2022 and
  held pending extradition. Added 2026-07-01 as a govt-primary corroboration
  for the previously single-secondary-source event 2022-04/raidforums-takedown.
  AUDIT 2026-07-01 (claude-opus-4.8/max): live URL is bot-walled (Akamai
  interstitial challenge) so NO raw snapshot / content_sha256 could be captured;
  its facts (seizure 12 Apr 2022; six counts — conspiracy, access-device fraud,
  aggravated identity theft, EDVA; arrest 31 Jan 2022 UK) are corroborated by
  the snapshotted Krebs report and by reachable DOJ text mirrors. Krebs remains
  the load-bearing snapshotted source for this event.
