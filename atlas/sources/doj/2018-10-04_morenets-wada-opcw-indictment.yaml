notes: |
  Indictment of seven GRU Unit 26165 officers (Morenets et al.)
  for WADA, USADA, IAAF targeting (retaliation for the McLaren
  Report on Russian doping), OPCW Hague close-access operation
  (Skripal Novichok inquiry), Westinghouse Electric (nuclear),
  and the MH17 investigation. Coordinated with Dutch MIVD
  same-day public disclosure of the OPCW interdiction.
