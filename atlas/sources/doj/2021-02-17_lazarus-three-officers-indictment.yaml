notes: |
  Superseding indictment of Jon Chang Hyok, Kim Il, and Park Jin
  Hyok. Names "Reconnaissance General Bureau" and "Lab 110" as
  the affiliation. Retrospective consolidation of attribution
  covering Sony (2014), Bangladesh Bank (2016), WannaCry (2017),
  multiple SWIFT thefts, AppleJeus, ATM cash-outs, Marine Chain
  ICO fraud, and a $1.3B attempted theft total. Canonical
  primary source for actor-mapping under Lab 110.
  AUDIT (2026-06-24, claude-opus-4.8/max): RGB placement of
  kp/rgb/apt38 VERIFIED against this source's own words. The DOJ
  press release names the Reconnaissance General Bureau as the
  defendants' organization and equates the group with APT38:
  "Jon Chang Hyok ..., Kim Il ..., and Park Jin Hyok ..., were
  members of units of the Reconnaissance General Bureau (RGB), a
  military intelligence agency of the Democratic People's Republic
  of Korea (DPRK), which engaged in criminal hacking. These North
  Korean military hacking units are known by multiple names in the
  cybersecurity community, including Lazarus Group and Advanced
  Persistent Threat 38 (APT38)." Provenance: justice.gov serves a
  bm-verify bot-wall (and WebFetch 403s); raw_snapshot is the
  verbatim globalsecurity.org press-release mirror
  (sec-210217-doj02.htm), term-confirmed RGB=1, "Advanced Persistent
  Threat 38 (APT38)"=1. NB the "Lab 110" affiliation lives in the
  charging document, not in this press-release text ("Lab 110" does
  NOT appear in the release).
  AUDIT (2026-06-25, claude-opus-4.8/max): this source also corroborates
  the RGB placement of kp/rgb/lazarus — the SAME sentence names "Lazarus
  Group" by its exact canonical name alongside APT38: the defendants
  "were members of units of the Reconnaissance General Bureau (RGB), a
  military intelligence agency of the Democratic People's Republic of
  Korea (DPRK) … These North Korean military hacking units are known by
  multiple names in the cybersecurity community, including Lazarus Group
  and Advanced Persistent Threat 38 (APT38)." Lazarus is KEPT at kp/rgb
  (named-actor → named-service, govt-primary; secondary corroborant to
  the Sept-2019 OFAC designation). raw_snapshot/content_sha256 unchanged;
  sha re-confirmed matching on 2026-06-25 (4e3209c4…), raw term-scan
  "Reconnaissance General Bureau"=1, "Lazarus Group"=2.
