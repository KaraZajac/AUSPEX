notes: |
  Coordinated September 2020 action. This DOJ press release bundles
  FOUR distinct actions: (1) the OFAC + FBI APT39 / Rana / MOIS
  designation (the subject of event 2020-09/apt39-rana-mois-sanctions
  — no individual DOJ defendants tied to it); and three SEPARATE,
  unrelated Iranian indictments — (2) D. Mass. website defacements
  (Behzad Mohammadzadeh / Marwan Abusrour), (3) D.N.J. data theft
  (Hooman Heidarian / Mehdi Farhadi, aka "Sejeal"), (4) E.D. Va. IRGC
  aerospace/satellite espionage (Said Pourkarim Arabi / Mohammad Reza
  Espargham / Mohammad Bayati). Heidarian/Farhadi and Mohammadzadeh
  are NOT APT39/Rana operators.
  AUDIT (2026-07-10, claude-opus-4.8/max): the live justice.gov URL
  is Akamai bot-walled (interstitial challenge, HTTP-200 shell only).
  raw_snapshot is therefore the archive.org rendition (= this record's
  archive_url), captured HTTP 200, 105,143 B; content verified —
  correct title "Department of Justice … Coordinated Actions to Disrupt
  and Deter Iranian Malicious Cyber Activities" and full Iran body.
  Verbatim: "OFAC imposed sanctions against 45 individuals and one
  front company associated with the MOIS who comprised the cyber threat
  group known publicly as 'Advanced Persistent Threat 39' (APT39) …
  masked behind its front company, Rana Intelligence Computing Company
  (Rana), the MOIS employed a years-long malware campaign …".
