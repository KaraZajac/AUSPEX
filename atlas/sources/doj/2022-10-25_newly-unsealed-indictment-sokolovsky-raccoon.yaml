notes: |
  DOJ USAO-WDTX press release (Oct 25, 2022) announcing the newly
  unsealed federal grand-jury indictment of Mark Sokolovsky, 26, a
  Ukrainian national, as alleged operator of the Raccoon Infostealer
  malware-as-a-service ("MaaS", leased ~$200/month in cryptocurrency),
  and the launch of the raccoon.ic3.gov victim-identification site.
  Verbatim load-bearing text: "In March 2022, concurrent with
  Sokolovsky's arrest by Dutch authorities, the FBI and law enforcement
  partners in Italy and the Netherlands dismantled the digital
  infrastructure supporting the Raccoon Infostealer, taking its then
  existing version offline." / "While an exact number has yet to be
  verified, FBI agents have identified more than 50 million unique
  credentials and forms of identification (email addresses, bank
  accounts, cryptocurrency addresses, credit card numbers, etc.) in the
  stolen data from what appears to be millions of potential victims
  around the world. The credentials appear to include over four million
  email addresses." / Sokolovsky "is currently being held in the
  Netherlands pursuant to an extradition request by the United States";
  the Amsterdam District Court granted extradition on Sept 13, 2022,
  which Sokolovsky appealed (he was NOT yet extradited as of this
  release). Charges: fraud in connection with computers; conspiracy to
  commit wire fraud; conspiracy to commit money laundering; aggravated
  identity theft (max 20 years). Does NOT mention "200,000 devices" or
  "Genesis Market."

