notes: |
  DOJ (USAO Western District of Washington) case page for the
  indictment of Connor Riley Moucka ("Judische"/"Waifu"/"j_irdev") and
  John Erin Binns ("irdev") tied to the UNC5537 cluster responsible
  for the 2024 Snowflake-customer data-theft and extortion campaign
  (AT&T, Ticketmaster, Santander, etc.). Verbatim from the page:
  "Indictment filed and bench warrants issued : October 10, 2024";
  defendants "alleged to have gained unlawful access to billions of
  sensitive customer records, including call and text history records,
  banking and other financial information ... to have extorted
  millions of dollars from victim organizations; and to have
  advertised for sale stolen victim data on a variety of online
  cybercrime forums." Links indictment.pdf. Moucka arrested in Canada
  Oct 30, 2024; Binns detained in Turkey; indictment made public early
  Nov 2024 (published_on retained as 2024-11-04 = public-unsealing
  window and the stable source id date).
  AUDIT (2026-07-04, claude-opus-4.8/max): filled the previously-null
  url with the verified WDWA case page and captured a raw snapshot
  (9c5d3561…570ddba3, 95,629 bytes) — justice.gov returned the real
  page (not the Akamai wall) for this URL. Note the live case page has
  since accrued 2025/2026 trial-scheduling entries.
  AUDIT (2026-07-05, claude-opus-4.8/max): hash re-verified UNCHANGED
  (9c5d3561…570ddba3, 95,629 B) during the counter-action remodel of
  event 2024-11/moucka-snowflake-indictment; tier primary + all fields
  preserved. Case page carries "at least 10 victim organizations" (NOT
  the ~165 campaign figure, which is Mandiant's) and does not use the
  word "Snowflake" or name any victim org.
  AUDIT (2026-07-10, claude-opus-4.8/max): hash RE-VERIFIED unchanged
  (9c5d3561…570ddba3, 95,629 B) during the audit of the campaign event
  2024-06/snowflake-unc5537. Verbatim re-confirmed: "charged with wire
  fraud, computer fraud, aggravated identity theft, and related
  conspiracies in connection with alleged schemes to hack into at least
  10 victim organizations' protected computer networks"; "gained unlawful
  access to billions of sensitive customer records, including call and
  text history records, banking and other financial information"; "to
  have extorted millions of dollars from victim organizations"; "his
  surrender for purposes of extradition from Canada to the United States"
  (consented 2025-03-21); "Co-defendant John Binns is not presently in
  U.S. custody." Carries NO Oct-30-2024 arrest date and NO "Turkey"
  detention (press-only). tier primary + all fields preserved.
