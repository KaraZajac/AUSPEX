notes: |
  SDNY guilty-plea press release for Aviram Azari, an Israeli private
  investigator who acted as the paid intermediary in a hack-for-hire
  spearphishing scheme (2014-2019), sub-contracting hackers "including a
  group located in India" against #ExxonKnew climate-litigation activists
  and Wirecard-linked short-sellers. Azari pleaded guilty to wire fraud,
  conspiracy to commit computer hacking, and aggravated identity theft;
  sentenced Nov 2023 to 80 months + 3 yrs supervised release + ~$4.84M
  forfeiture.
