notes: |
  Christina Chapman sentencing: 102 months federal prison, full
  restitution order. 309 US businesses defrauded, 68 identities
  stolen, $17M documented revenue. Laptop-farm operational model
  established as a US-prosecutable pattern for IT-worker
  facilitation.

