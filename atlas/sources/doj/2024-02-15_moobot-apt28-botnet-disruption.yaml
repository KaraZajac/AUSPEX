publisher: US Department of Justice
title: |
  Justice Department Conducts Court-Authorized Disruption of
  Botnet Controlled by the Russian Federation's Main Intelligence
  Directorate of the General Staff (GRU)
url: https://www.justice.gov/archives/opa/pr/justice-department-conducts-court-authorized-disruption-botnet-controlled-russian
archive_url: null
published_on: 2024-02-15
retrieved_on: 2026-05-27
tier: primary
notes: |
  DOJ-FBI court-authorised disruption of a Moobot botnet of
  compromised Ubiquiti EdgeRouters operated by GRU Unit 26165
  (APT28 / FANCYBEAR). The botnet was used to relay APT28
  reconnaissance and credential-harvest traffic against US
  governments, military, and infrastructure organisations, plus
  EU and NATO members supporting Ukraine. Disruption deleted GRU-
  installed Moobot malware and configuration on the compromised
  routers; FBI issued companion advisories urging Ubiquiti users
  to perform factory resets and apply firmware updates.
