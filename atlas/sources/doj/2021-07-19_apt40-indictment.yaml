  APT40 / Hainan State Security Department via front company Hainan
  Xiandun Technology Development Co. Indicted Ding Xiaoyang, Cheng
  Qingmin, Zhu Yunmin (HSSD officers) plus Wu Shurong (HXT employee).
  Underlies CISA AA21-200a.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the cn/mss/apt40 SERVICE placement at the named-unit
  level — names the MSS Hainan State Security Department specifically (headline: "Four Chinese Nationals
  Working with the Ministry of State Security..."). Defendants Ding Xiaoyang, Cheng Qingmin and Zhu
  Yunmin "were HSSD officers responsible for coordinating, facilitating and managing computer hackers
  and linguists at Hainan Xiandun and other MSS front companies to conduct hacking for the benefit of
  China"; "The defendants and their Hainan State Security Department (HSSD) conspirators sought to
  obfuscate the Chinese government's role in such theft by establishing a front company, Hainan Xiandun
  Technology Development Co., Ltd." Quotes confirmed via WebFetch + WebSearch and cross-checked against
  the companion CISA/FBI AA21-200A. CAPTURE NOTE: the DOJ primary URL sits behind an Akamai bot
  interstitial (curl/WebFetch return only the JS challenge, HTTP 403/200-shell; archive.org blocked from
  this environment), so raw_snapshot/content_sha256 are of a verbatim press mirror
  (securityaffairs.com/120316/apt/doj-members-apt40.html) that reproduces the DOJ release text — not the
  justice.gov HTML itself.
