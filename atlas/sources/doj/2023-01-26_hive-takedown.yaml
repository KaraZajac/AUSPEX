notes: |
  DOJ / FBI announcement of the seven-month infiltration of the Hive
  ransomware infrastructure, recovery of decryption keys for 300+
  victims, and seizure of darknet servers in coordination with
  German BKA and Dutch police.

  AUDIT (2026-06-24, claude-opus-4.8/max): Used to support ru/proxies/hive's (now ru/unscoped/hive)
  state-tolerated-proxy placement. The release documents NO Russia/state nexus: ZERO tokens for
  Russia/Russian/FSB/GRU/SVR/Kremlin/state-sponsor/safe-haven/harbor/tolerate, and it names no operator
  geography. Framing is purely criminal-financial — AG Garland: "the Justice Department dismantled an
  international ransomware network responsible for extorting and attempting to extort hundreds of millions
  of dollars from victims in the United States and around the world"; "Hive actors employed a
  double-extortion model of attack." Does NOT document state tasking/tolerance → supports DEMOTE out of
  ru/proxies. (raw_snapshot captured from the archive_url Wayback copy; the direct justice.gov URL returns
  HTTP 400/403 to curl + WebFetch.)
