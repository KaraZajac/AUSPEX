notes: |
  Indicts Mansour Ahmadi (Najee Technology), Ahmad Khatibi
  Aghda (Afkar System), and Amir Hossein Nikaeen Ravari for
  the IRGC-affiliated ransomware campaign exploiting Fortinet,
  Microsoft Exchange, and Log4j vulnerabilities.
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw capture not obtained —
  justice.gov returned HTTP 400 to curl and HTTP 403 to WebFetch on
  2026-06-24; archive.org blocked. No raw_snapshot/content_sha256
  recorded. Not load-bearing for the audit: the ir/irgc placement of
  ir/irgc/afkar-system is already established by the two captured
  government primaries (Treasury OFAC jy0948 and CISA AA22-257A), both
  of which name the IRGC and tie Afkar System to it by name.
  AUDIT (2026-06-24, claude-opus-4.8/max): Same finding for ir/irgc/najee-technology — Najee
  Technology (this indictment names Mansour Ahmadi as its principal) is established as IRGC-
  affiliated by those two captured primaries (Treasury names Najee as a designated, IRGC-
  affiliated entity; CISA names it as the front for the IRGC-affiliated actors). DOJ raw capture
  again not obtained on 2026-06-24 (justice.gov HTTP 400 to curl / HTTP 403 to WebFetch;
  archive.org blocked); no raw_snapshot/content_sha256 recorded. Not load-bearing for the audit.
  AUDIT (2026-07-10, claude-opus-4.8/max): re-attempted for the event-audit of
  2022-09/najee-afkar-irgc-ransomware. justice.gov now returns HTTP 200 but only a 2,583-byte
  Akamai "bm-verify" bot-challenge shell (not the article); archive.org /web/2022id_/ returns
  the same 2,586-byte challenge. Still un-snapshottable. Confirmed NON-load-bearing: the
  captured Treasury primary (jy0948) states this indictment verbatim — "the U.S. Attorney's
  Office for the District of New Jersey unsealed an indictment charging Mansour, Khatibi, and
  Nikaeen with violating the Computer Fraud and Abuse Act (CFAA) and conspiring to violate the
  CFAA" — so every DOJ fact used by the event rides a snapshotted source.
