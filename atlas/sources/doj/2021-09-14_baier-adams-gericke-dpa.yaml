  itself name "DarkMatter", "CyberPoint", "Project Raven" or "Karma" — per the public record it
  refers to the defendants' employer/customer only generically (a U.A.E.-based company / the UAE
  government); the DarkMatter operator naming for the KEEP comes from the cited Reuters Karma
  article, not from this release. Raw capture not snapshotted: the live justice.gov/archives URL
