title: |
  Three Former U.S. Intelligence Community and Military Personnel
  Agree to Pay More Than $1.68 Million to Resolve Criminal Charges
  Arising from Their Provision of Hacking-Related Services to a
  Foreign Government
url: https://www.justice.gov/archives/opa/pr/three-former-us-intelligence-community-and-military-personnel-agree-pay-more-168-million
archive_url: null
published_on: 2021-09-14
retrieved_on: 2026-05-28
tier: primary
notes: |
  DOJ press release announcing deferred-prosecution agreements
  with Marc Baier, Ryan Adams, and Daniel Gericke for providing
  hacking-as-a-service to the UAE between 2016 and 2019 in
  violation of US export control and computer fraud laws. The
  press release confirms the Reuters Project Raven investigation
  at the legal-attribution level: ex-NSA personnel, UAE customer,
  offensive operations including sale of advanced exploits to the
  UAE government.
