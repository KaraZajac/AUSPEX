notes: |
  Canonical DOJ primary for the LummaC2 takedown. On-page headline:
  "Coordinated Microsoft Actions and Court-Authorized Domain Seizures
  Disrupt LummaC2 Malware Infrastructure Used to Target Millions
  Worldwide." Announces the unsealing of TWO warrants authorizing the
  seizure of FIVE internet domains used to operate the LummaC2
  information-stealing malware service (the user/admin login panels).
  Seizure timeline in the release: two domains seized May 19, 2025; the
  administrators stood up three replacement panel domains May 20; the
  government seized those three May 21. FBI Dallas Field Office is
  investigating (hence the USAO Northern District of Texas nexus).
  Quotes NSD head Sue J. Bai. Companion to Microsoft's DCU civil action
  (Northern District of Georgia, ~2,300 domains) — see
  microsoft/2025-05-21_lumma-global-action.
