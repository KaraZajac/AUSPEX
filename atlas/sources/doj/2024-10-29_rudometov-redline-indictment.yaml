  DOJ (U.S. Attorney's Office, WDTX) release on the US component of
  Operation Magnus: "the Justice Department unsealed charges against
  Maxim Rudometov, one of the developers and administrators of RedLine
  Infostealer … charged with access device fraud … conspiracy to
  commit computer intrusion … and money laundering," alongside a
  Western-District-of-Texas warrant to seize two RedLine/META C2
  domains. Byline dated Monday, 28 October 2024.

