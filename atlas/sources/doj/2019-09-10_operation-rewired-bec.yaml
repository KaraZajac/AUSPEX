title: |
  Operation reWired — 281 arrested worldwide in coordinated
  international BEC enforcement
url: https://www.justice.gov/usao-edla/pr/281-arrested-worldwide-coordinated-international-enforcement-operation-targeting-hundreds
archive_url: null
published_on: 2019-09-10
retrieved_on: 2026-05-27
tier: primary
notes: |
  DOJ announcement of Operation reWired, a four-month
  international enforcement action by FBI, DHS HSI, DOS DSS,
  USPIS, and Treasury OIG against business email compromise
  (BEC) syndicates. 281 arrests across the US (74), Nigeria
  (167), Turkey, Ghana, France, Italy, Japan, Kenya, Malaysia,
  UK. USD 3.7M recovered; USD 118M intercepted in fraudulent
  wire transfers. Predecessor: Operation WireWire (Jun 2018,
  74 arrests).
