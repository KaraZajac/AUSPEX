notes: |
  DOJ announcement of Operation reWired, a four-month
  international enforcement action against business email
  compromise (BEC) syndicates. 281 arrests across the US (74),
  Nigeria (167), Turkey (18), Ghana (15), France, Italy, Japan,
  Kenya, Malaysia, UK. Nearly USD 3.7M seized; ~USD 118M
  disrupted/recovered in fraudulent wire transfers. Predecessor:
  Operation WireWire (Jun 2018, 74 arrests).
  AUDIT (2026-07-01, claude-opus-4.8/max): justice.gov serves an
  Akamai bot-challenge interstitial (2.5KB bm-verify page, not the
  article) -> un-snapshottable here, so NO content hash recorded.
  Claims corroborated verbatim via two snapshottable govt-primary
  mirrors of the same-day release: usss/2019-09-10_operation-rewired-bec
  (full agency roster + $3.7M) and fbi/2019-09-10_operation-rewired-bec-takedown
  ($118M wire-transfer figure). Corrected this note's agency list:
  the Treasury component is IRS Criminal Investigation (IRS-CI), NOT
  "Treasury OIG"; DOS Diplomatic Security Service IS a genuine reWired
  participant (unlike Operation WireWire, into which "DOS DSS" had been
  wrongly copied from this release). US Secret Service also named.
