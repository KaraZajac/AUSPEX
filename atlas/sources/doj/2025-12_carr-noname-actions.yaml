notes: |
  Assesses NoName057(16) as a state-sanctioned project administered
  partially through an IT organization established by a 2018 Russian
  presidential order. Ukrainian national (Dubranova) extradited and
  indicted for support roles in both CARR and NoName cases.
  AUDIT (2026-06-24, claude-opus-4.8/max): RAW-VERIFIED — page dated
  Tuesday, December 9, 2025 (curated published_on 2025-12-01 is the
  dossier's approximation; real day is Dec 9). This is the
  DECISIVE source naming CARR's service. Verbatim: "According to
  the indictment, CARR, also known as Z-Pentest, was founded,
  funded, and directed by the Main Directorate of the General Staff
  of the Armed Forces of the Russian Federation (GRU)." Also: "An
  individual operating as 'Cyber_1ce_Killer,' a moniker associated
  with at least one GRU officer[,] instructed CARR leadership on
  what kinds of victims CARR should target..."; FBI: "reckless
  criminal groups supported by the GRU"; and CARR framed as a
  "state-sponsored" "politically motivated hacktivist group[]." The
  GRU is named at the PARENT level — the page contains 0 mentions
  of Unit 74455, GTsST, or Sandworm. This source supports the
  actor's KEEP in ru/gru but NOT the specific Unit 74455 sub-unit.
  AUDIT (2026-06-25, claude-opus-4.8/max): re-verified for the
  ru/proxies/noname05716 placement (prior audit captured only the
  CARR/GRU language). Re-confirmed sha256 matches content_sha256
  (261fa44…). For NoName specifically the page DOCUMENTS a state
  nexus — verbatim: "NoName was a state-sanctioned project
  administered in part by an information technology organization
  established by order of the President of Russia in October 2018
  that developed, along with other co-conspirators, NoName's
  proprietary distributed denial of service (DDoS) program."; "the
  Russian government backed CARR and NoName by providing, among
  other things, financial support."; "NoName was covert project
  whose membership included multiple employees of The Center for
  the Study and Network Monitoring of the Youth Environment (CISM),
  among other cyber actors."; the DDoSia "network infrastructure
  around the world created by employees of CISM."; and "Politically
  motivated hacktivist groups, whether state-sponsored like CARR or
  state-sanctioned like NoName, pose a serious threat … particularly
  when foreign intelligence services use civilians to obfuscate
  their malicious cyber activity …" This clears the ru/proxies bar
  (formal state-aligned designation + state backing) — materially
  beyond a self-declared pledge. IMPORTANT scope limit: all 3 GRU
  mentions on the page attach to CARR (or generic FBI framing),
  NEVER to NoName; NoName's named controller is CISM (a 2018
  presidential-order body), not the GRU. So this source supports
  KEEP at ru/proxies but does NOT source the actor's specific
  ru/gru service — that remains a hedged default (see actor notes).
