notes: |
  Court-authorized PERSEUS operation remotely disabled the global
  Snake P2P malware network. Explicitly attributes Snake to "a
  unit within Center 16 of the FSB" (Turla). First major US-led
  offensive disruption of an FSB tool.
  AUDIT (2026-07-10, claude-opus-4.8/max): justice.gov is Akamai
  bot-walled on direct curl + WebFetch (interstitial / 403).
  Snapshotted the primary via Wayback id_ capture (20250206023532,
  100 KB, no interstitial); sha256 above. Verified verbatim: PERSEUS
  "overwrite its own vital components" / "disable itself without
  affecting the host"; "a unit within Center 16 of the Federal
  Security Service of the Russian Federation (FSB)"; unit "referred
  to in court documents as 'Turla'"; "nearly 20 years"; "at least
  50 countries"; targets = "NATO member governments, journalists,
  and other targets of interest to the Russian Federation" (NO
  "defense industrial base"); "Operation MEDUSA"; warrant by U.S.
  Magistrate Judge Cheryl L. Pollak (EDNY). URL corrected: the prior
  slug was truncated (…snake-malware-network); canonical live OPA
  slug is …-controlled (live HTTP 200 + Google canonical + only
  form with Wayback captures).
