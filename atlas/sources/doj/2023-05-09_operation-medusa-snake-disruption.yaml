title: |
  Justice Department Announces Court-Authorized Disruption of the
  Snake Malware Network Controlled by Russia's Federal Security
  Service
url: https://www.justice.gov/archives/opa/pr/justice-department-announces-court-authorized-disruption-snake-malware-network
archive_url: https://web.archive.org/web/2023*/https://www.justice.gov/archives/opa/pr/justice-department-announces-court-authorized-disruption-snake-malware-network
