notes: |
  DOJ press release (19 March 2026) announcing a court-authorized
  seizure of four domains "Facilitating the Islamic Republic of Iran's
  Ministry of Intelligence and Security's Hacking Efforts Tied to
  Psychological Operations and Transnational Repression."
  GOVERNMENT ATTESTATION of the Handala persona -> MOIS. Verbatim: "The
  seized domains – Justicehomeland[.]org, Handala-Hack[.]to,
  Karmabelow80[.]org, and Handala-Redwanted[.]to – were used by the
  MOIS in furtherance of attempted psychological operations targeting
  adversaries of the regime by claiming credit for hacking activity,
  posting sensitive data stolen during such hacks, and calling for the
  killing of journalists, regime dissidents, and Israeli persons." The
  shared "playbook" is described as "destructive and disruptive
  cyber-attacks; and 'faketivist' psychological operations using data
  stolen via hacking." Ties the Handala + HomeLand Justice (Justicehomeland)
  + Karma (Karmabelow80) domains together as one MOIS operation.
  AUDIT (2026-07-11, claude-opus-4.8/max): created + snapshotted + hashed
  during audit of 2023-12/handala-persona-launch. Serves as the
  government primary attesting actor ir/mois/handala and the
  ir/cyber-deniable-retaliation/persona-laundering doctrine link
  (terminal goal stated: MOIS faketivist persona laundering
  hack-and-leak psyops). article:published_time 2026-03-19T17:51:22-04:00.
