notes: |
  DOJ press release on the extradition of Ukrainian national
  Mark Sokolovsky from the Netherlands to face US charges as
  alleged developer of the Raccoon infostealer malware-as-a-
  service. Raccoon Stealer infrastructure was previously
  taken offline in March 2022 by Italian and Dutch police
  coordinated with FBI. The malware harvested 50M+ credentials
  from approximately 200K devices and was a major supply for
  the Genesis Market and credential-resale ecosystem.
