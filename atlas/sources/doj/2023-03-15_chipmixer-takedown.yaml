notes: |
  Joint US DOJ / Europol / Eurojust / German BKA takedown
  of ChipMixer, a multi-user darknet cryptocurrency mixer.
  AUDIT (2026-07-02, claude-opus-4.8/max): the justice.gov URL is
  BOT-WALLED behind an Akamai bot-manager interstitial (curl and
  WebFetch both return only the ~2.5KB "bm-verify" challenge page,
  not the article), so NO content_sha256 could be captured for this
  primary — do NOT hash the interstitial. Content verified instead
  against the reachable HSI/ICE companion release
  (ice/2023-03-15_chipmixer-takedown, snapshotted + hashed; faithful
  verbatim reproduction) and journalism mirrors (The Record, The
  Hacker News). Canonical live slugs (all same interstitial):
  .../archives/opa/pr/...processed-over-3 and
  /usao-edpa/pr/...processed .
  CORRECTION to the prior note: the release does NOT name the
  "Lazarus Group" (0 occurrences in the verifiable text) — it
  attributes the laundered Ronin/Horizon heist proceeds to "North
  Korean cyber actors" (nation-level). DPRK is ONE of several user
  categories, NOT "the principal users": ~37 ransomware strains
  ($17M; Sodinokibi/Mamba/Suncrypt), stolen-funds wallets (>$700M,
  which INCLUDE the North Korean Ronin/Horizon heists — the $700M is
  the whole stolen-funds bucket, not a DPRK-only total), darknet
  markets (>$200M; Hydra >$60M), fraud shops (>$35M), and Russia's
  GRU unit 26165 / APT28 (Drovorub infrastructure). There is NO WMD /
  ballistic-missile / nuclear language anywhere in the release — the
  DPRK nexus is a proximate laundering fact only.
