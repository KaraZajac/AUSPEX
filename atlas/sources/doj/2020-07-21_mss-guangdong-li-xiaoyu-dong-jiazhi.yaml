title: |
  Two Chinese Hackers Working with the Ministry of State Security
  Charged with Global Computer Intrusion Campaign Targeting
  Intellectual Property and Confidential Business Information,
  Including COVID-19 Research
url: https://www.justice.gov/opa/pr/two-chinese-hackers-working-ministry-state-security-charged-global-computer-intrusion
archive_url: null
