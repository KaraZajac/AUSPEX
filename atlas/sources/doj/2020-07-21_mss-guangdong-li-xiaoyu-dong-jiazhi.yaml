notes: |
  DOJ indictment of Li Xiaoyu and Dong Jiazhi, freelance
  hackers tasked by MSS Guangdong State Security Department.
  Charges cover an 11-year computer intrusion campaign
  spanning Hong Kong, Australia, Belgium, Germany, Japan,
  Lithuania, the Netherlands, Spain, South Korea, Sweden,
  the UK and the US. Victim sectors: defense, energy,
  semiconductors, pharmaceuticals (including direct
  targeting of US COVID-19 vaccine research), and human-
  rights / Hong-Kong-democracy dissident communications.
  Documents the MSS contractor-tasking model in granular
  detail.

  AUDIT (2026-07-01, claude-opus-4.8/max): primary URL is
  Akamai-bot-walled — curl of justice.gov (and the
  /archives/ mirror) returns the JS interstitial (~2.5 KB) or
  HTTP 403; archive.org blocked for the auditor. NO raw
  snapshot / content_sha256 captured. Claims corroborated via
  mirrors quoting the indictment (NPR, SCMP, BleepingComputer,
  CyberDefenseMagazine). Note vs the country list above: the
  DOJ press release enumerates 11 jurisdictions (US, AU, BE,
  DE, JP, LT, NL, ES, KR, SE, UK); Hong Kong appears as the
  location of a dissident TARGET (a HK community organizer),
  not as a 12th victim country. Tier=primary retained
  (govt-primary). Event stamped level=partial accordingly.
