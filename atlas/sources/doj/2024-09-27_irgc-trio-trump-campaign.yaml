notes: |
  Indicts Masoud Jalili, Seyyed Ali Aghamiri, and Yaser Balaghi
  (IRGC cyber actors) for the 2024 Trump-campaign hack-and-leak
  operation. **Indictment explicitly states the activity
  "advance[s] the malign activities of the IRGC, including
  ongoing efforts to avenge the death of Qasem Soleimani"** —
  the canonical attested-confidence source for the Post-
  Soleimani Retaliation doctrine.
  AUDIT (2026-06-24, claude-opus-4.8/max): corroborating source for the
  ir/irgc-io/apt42 SERVICE-PLACEMENT KEEP — the DOJ titles the release "Three
  IRGC Cyber Actors Indicted..." and identifies the trio as IRGC cyber actors,
  i.e. it names the IRGC at the parent level (it does not separately resolve
  IRGC-IO vs IRGC; that named-unit distinction comes from the Mandiant source).
  AUDIT (2026-07-10, claude-opus-4.8/max): raw capture NOW STORED. The live +
  /archives/ justice.gov URLs still hard-403 scripted fetches (return an Akamai
  "bm-verify" JS interstitial shell, ~2.5 KB, not the release), BUT web.archive.org
  is reachable in this environment (the prior "blocked" note is superseded): the
  recorded archive_url Wayback capture retrieved HTTP 200 / 99,450 bytes and
  content-matches the press release. Verified verbatim in the captured raw:
  "the conspirators used some of the same hacking infrastructure from earlier in
  the conspiracy to begin targeting … an identified U.S. [Presidential Campaign 1]"
  (in/around May); "advance the malign activities of the IRGC, including ongoing
  efforts to avenge the death of Qasem Soleimani"; trio = "Islamic Revolutionary
  Guard Corps (IRGC) employees, Masoud Jalili … Seyyed Ali Aghamiri … Yaser Balaghi";
  leak "to members of the media and individuals associated with … [Presidential
  Campaign 2]". sha256 da850ed1…4763a9b, 99,450 bytes.
