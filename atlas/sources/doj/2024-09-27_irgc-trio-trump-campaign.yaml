notes: |
  Indicts Masoud Jalili, Seyyed Ali Aghamiri, and Yaser Balaghi
  (IRGC cyber actors) for the 2024 Trump-campaign hack-and-leak
  operation. **Indictment explicitly states the activity
  "advance[s] the malign activities of the IRGC, including
  ongoing efforts to avenge the death of Qasem Soleimani"** —
  the canonical attested-confidence source for the Post-
  Soleimani Retaliation doctrine.
  AUDIT (2026-06-24, claude-opus-4.8/max): corroborating source for the
  ir/irgc-io/apt42 SERVICE-PLACEMENT KEEP — the DOJ titles the release "Three
  IRGC Cyber Actors Indicted..." and identifies the trio as IRGC cyber actors,
  i.e. it names the IRGC at the parent level (it does not separately resolve
  IRGC-IO vs IRGC; that named-unit distinction comes from the Mandiant source).
  Raw capture not stored: justice.gov hard-403s scripted/WebFetch requests on
  both the live and /archives/ URLs (one attempt returned the DOJ homepage, not
  the press release) and web.archive.org is blocked here — unfetchable, noted +
  skipped per audit protocol. The KEEP does not depend on this source.
