notes: |
  Indictment of FSB officers Dmitry Dokuchaev and Igor Sushchin
  alongside criminal hackers Alexsey Belan and Karim Baratov for
  the 2014–16 Yahoo intrusion (500M+ accounts). First US criminal
  cyber charges against Russian government officials. Baratov
  pleaded guilty and was sentenced.
  AUDIT (2026-06-25, claude-opus-4.8/max): justice.gov is BOT-WALLED
  (Akamai BotManager interstitial; HTTP 403 to curl + WebFetch on both
  the live /opa/pr/ and the /archives/opa/pr/ paths). The captured
  raw_snapshot (sha256 b2a23e9c…8566) is therefore the interstitial
  challenge page, NOT the press-release body — recorded for
  reproducibility, not as substantive content. Facts corroborated
  against the FBI primary ("Charges Announced in Massive Cyber
  Intrusion Case", fbi.gov/news/stories) + tier-1 coverage quoting the
  release verbatim (NPR, WaPo, Krebs, Foreign Policy, CNN). Key DOJ
  quotes confirmed: "Dokuchaev worked for the FSB's Center for
  Information Security, also known as Center 18"; FSB officers
  Dokuchaev + Sushchin "paid, directed, and protected" hackers Belan +
  Baratov; theft from "at least 500 million accounts"; minted cookies
  gave access to "at least 6,500" targeted accounts; targets included
  "Russian journalists, U.S. and Russian government officials."
