title: |
  U.S. Charges Russian FSB Officers and Their Criminal Conspirators
  for Hacking Yahoo and Millions of Email Accounts
url: https://www.justice.gov/opa/pr/us-charges-russian-fsb-officers-and-their-criminal-conspirators-hacking-yahoo-and-millions
archive_url: https://web.archive.org/web/2017*/https://www.justice.gov/opa/pr/us-charges-russian-fsb-officers-and-their-criminal-conspirators-hacking-yahoo-and-millions
published_on: 2017-03-15
retrieved_on: 2026-05-25
tier: primary
notes: |
  Indictment of FSB officers Dmitry Dokuchaev and Igor Sushchin
  alongside criminal hackers Alexsey Belan and Karim Baratov for
  the 2014–16 Yahoo intrusion (500M+ accounts). First US criminal
  cyber charges against Russian government officials. Baratov
  pleaded guilty and was sentenced; canonical FSB strategic-
  collection attestation.
