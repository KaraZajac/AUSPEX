notes: |
  The unsealed SDFL search warrant referenced in the 2023-12-19 DOJ
  press release ("As detailed in a search warrant unsealed today in
  the Southern District of Florida"). AO 106A application signed
  2023-12-11 (published_on = the 2023-12-19 unsealing); 20-page PDF.
  Primary documentation of the covert-access mechanics behind the
  ALPHV/BlackCat disruption: "law enforcement engaged a Confidential
  Human Source ('CHS') who routinely provides reliable information
  related to ongoing cybercrime investigations"; "The CHS responded
  to an advertisement posted to a publicly-accessible online forum
  soliciting applicants for Blackcat affiliate positions ... The
  Blackcat actor then provided the CHS with access credentials to a
  Blackcat affiliate panel, available at a unique Tor address.";
  heading "Law Enforcement Obtained the Public/Private Key Pairs to
  946 Blackcat-Linked Tor Sites"; "the FBI identified and collected
  946 public/private key pairs for Tor sites that the Blackcat
  Ransomware Group used to host victim communication sites, leak
  sites, and affiliate panels"; and "a decryption operation using a
  tool the FBI developed, which the FBI has offered to over 400
  victims around the world" (the Dec 19 press release later says
  "over 500" — outreach grew between the Dec 11 signing and the
  Dec 19 announcement). Purely criminal framing; no Russia/state
  nexus anywhere in the warrant.
