notes: |
  Indicts Behzad Mesri (Iranian national, online handle "Skote
  Vahshat") for the 2017 HBO theft and ~$6M Bitcoin extortion.
  DOJ states Mesri "had previously hacked computer systems for
  the Iranian military" and worked on attacks against Israel, but
  frames that as PRIOR conduct; state-direction of the HBO op is
  NOT asserted, and DOJ names the "Iranian military," not the
  IRGC. (The prior actor `note` describing him as an "IRGC
  contractor" overstated the source.)
  AUDIT (2026-06-25, claude-opus-4.8/max): justice.gov bot-walled
  (Akamai bm-verify challenge) and archive.org blocked to the
  fetcher → raw_snapshot is the captured challenge page, NOT the
  article body (sha256 ae9afc4a…cebcc); the press-release content
  was corroborated via the DOJ page's search-engine summary and
  tier-1 mirrors (NBC News, TIME, BleepingComputer, Courthouse
  News). Verbatim, the indictment/DOJ release: defendant Behzad
  Mesri, "an Iranian national who had previously hacked computer
  systems for the Iranian military"; member of the "Turk Black
  Hat Security" team; handle "Skote Vahshat"; ~1.5 TB stolen
  ("1.5 terabytes of data"); Game of Thrones scripts/plot +
  unaired Ballers/Barry/Room 104/Curb/The Deuce episodes;
  extortion demand framed by DOJ as "$6 Million" (indictment-body
  figure reported as $5.5M in Bitcoin); HBO refused to pay.
