notes: |
  Criminal complaint against Park Jin Hyok, a DPRK national
  employed by Chosun Expo Joint Venture (a Bureau 121 front in
  Dalian, PRC). Charges cover Sony Pictures (2014), WannaCry
  (2017), and the Bangladesh Bank theft (2016). First major
  DOJ criminal action attributing DPRK cyber operations to
  named individuals; primary source for Bureau 121 / Lab 110
  organizational placement.
