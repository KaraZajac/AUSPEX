notes: |
  Criminal complaint against Park Jin Hyok, a DPRK national
  employed by Chosun Expo Joint Venture (a Bureau 121 front in
  Dalian, PRC). Charges cover Sony Pictures (2014), WannaCry
  (2017), and the Bangladesh Bank theft (2016). First major
  DOJ criminal action attributing DPRK cyber operations to
  named individuals; primary source for Bureau 121 / Lab 110
  organizational placement.
  AUDIT (2026-07-05, claude-opus-4.8/max): justice.gov serves an
  Akamai bm-verify bot-wall interstitial (2586-byte challenge
  page, NOT the article), so this source could not be snapshotted;
  no content_sha256 recorded. Its Sony content is corroborated by
  the 2021 superseding indictment (doj/2021-02-17_lazarus-three-
  officers-indictment, on disk sha 4e3209c4...f98b8f21), which
  states it "Expands 2018 Case that Detailed Attack on Sony
  Pictures" and "Park was previously charged in a criminal
  complaint unsealed in September 2018." Cited by event
  2014-11/sony-pictures, which set qc level: partial for this
  bot-wall.
