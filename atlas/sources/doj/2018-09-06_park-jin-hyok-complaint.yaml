notes: |
  Criminal complaint against Park Jin Hyok, a DPRK national
  employed by Chosun Expo Joint Venture (a Bureau 121 front in
  Dalian, PRC). Charges cover Sony Pictures (2014), WannaCry
  (2017), and the Bangladesh Bank theft (2016). First major
  DOJ criminal action attributing DPRK cyber operations to
  named individuals; primary source for Bureau 121 / Lab 110
  organizational placement.
  AUDIT (2026-07-05, claude-opus-4.8/max): justice.gov serves an
  Akamai bm-verify bot-wall interstitial (2586-byte challenge
  page, NOT the article), so this source could not be snapshotted;
  no content_sha256 recorded. Its Sony content is corroborated by
  the 2021 superseding indictment (doj/2021-02-17_lazarus-three-
  officers-indictment, on disk sha 4e3209c4...f98b8f21), which
  states it "Expands 2018 Case that Detailed Attack on Sony
  Pictures" and "Park was previously charged in a criminal
  complaint unsealed in September 2018." Cited by event
  2014-11/sony-pictures, which set qc level: partial for this
  bot-wall.
  AUDIT (2026-07-10, claude-opus-4.8/max, for event 2015-12/tien-phong-bank-swift):
  raw capture now RECORDED — superseding the 2026-07-05 "no content_sha256" note.
  The press-release HTML at `url` still serves the ~2.6 KB Akamai bot-wall, BUT
  the underlying 179-page criminal complaint that the release announces is live
  and un-walled at https://www.justice.gov/opa/press-release/file/1092091/download
  (HTTP 200, application/pdf, 1,861,500 B) — captured as raw_snapshot
  doj__2018-09-06_park-jin-hyok-complaint.pdf (sha256 above). Relevant to the
  Tien Phong event: the complaint names the "Lazarus Group" (24 hits) — "the
  subjects comprise members of the 'Lazarus Group,' the name that private
  security researchers (including Symantec, Novetta, and BAE) have given to the
  set of hackers who perpetrated the attacks on SPE, Bangladesh Bank, and other
  entities" — and NOT "APT38" (0 hits; the label postdates this complaint by a
  month). It covers the unnamed "Vietnamese Bank" (=TPBank; Vietnam 20 hits,
  Bangladesh 112): "forensic artifacts on the computers left behind" from "late
  2015," "malware (FoxItReader.exe) recovered from a computer at the Vietnamese
  Bank… designed to conceal evidence of specific SWIFT messages." Term-scan for
  the byungjin TERMINAL goal: "weapons of mass destruction" 0, "ballistic
  missile" 0, "nuclear" 1 (a fictional TV-series plot, not financing) — so this
  source states only the PROXIMATE state-directed-theft goal and is NOT an
  attestation basis for the WMD-financing doctrine pillar. This PDF also carries
  the Sony content referenced in the prior note, so the sony-pictures qc partial
  can be revisited.
