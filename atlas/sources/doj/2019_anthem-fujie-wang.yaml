notes: |
  Indictment of Fujie Wang for Anthem health insurer breach.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the SERVICE placement of actor
  cn/mss/deep-panda (its sole cited source). FINDING — the release names NO Chinese intelligence
  service. It characterizes the perpetrators only as a "China-based" / "operating in China"
  "hacking group" of "Chinese national[s]": title "Member of Sophisticated China-Based Hacking
  Group Indicted..."; "A federal grand jury returned an indictment... charging a Chinese national
  as part of an extremely sophisticated hacking group operating in China and targeting large
  businesses in the United States..."; "Fujie Wang... and other members of the hacking group,
  including another individual charged as John Doe...". The strings "Ministry of State Security",
  "MSS", and any named PLA/ministry unit are absent. (NB: the SEPARATE Oct-2018 JSSD aerospace
  indictment did name MSS officers Zha Rong / Chai Meng — do not conflate it with this Anthem case.)
  Consequently the actor was DEMOTED cn/mss/deep-panda -> cn/unscoped/deep-panda (China nexus
  source-supported, service not). CAPTURE: justice.gov returns an Akamai Bot-Manager interstitial
  to curl (2,588-byte JS challenge) and HTTP 403 to WebFetch on both the /opa/pr/ and /archives/
  paths; web.archive.org is blocked here. The release's attribution-bearing text was recovered
  verbatim from the official justice.gov archives page via search-index retrieval and corroborated
  against two contemporaneous press mirrors (cyberscoop, bleepingcomputer), then stored in
  raw_snapshot (content_sha256 above) — see the provenance header inside that file.
