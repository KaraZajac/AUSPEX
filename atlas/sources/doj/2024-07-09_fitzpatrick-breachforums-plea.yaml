notes: |
  DOJ (USAO-EDVA) press release on the July 2023 guilty plea by
  Conor Brian Fitzpatrick ("Pompompurin") to three counts:
  access-device conspiracy, access-device solicitation, and
  possession of child sexual abuse material (CSAM).
  AUDIT (2026-07-10, claude-opus-4.8/max): REAL source (URL slug + title
  match the EDVA plea PR) but UN-SNAPSHOTTABLE — the live justice.gov page
  returns an Akamai bot interstitial (bm-verify challenge) under both curl
  and WebFetch, and the Wayback Machine holds only a 2026 bot-wall shell.
  NO raw_snapshot/content_sha256. The plea + three counts are mirror-
  corroborated VERBATIM by the snapshotted DOJ resentencing PR
  (doj/2025-09_fitzpatrick-resentenced): "pleaded guilty to one count of
  access device conspiracy, one count of access device solicitation, and
  one count of possession of child sexual abuse material." PUBLISHED_ON
  2023-07-12 -> 2023-07-11 (best evidence: DataBreaches' same-day
  republication slug 2023/07/11 + the July-11-2023 plea hearing; the PR is
  unverifiable directly — secondary reporting varies July 11–13). FLAG
  (orchestrator): the id/slug encodes 2024-07-09, a WRONG YEAR (the plea was
  2023, not 2024) — an id/file rename to doj/2023-07-11_… is an FK op (cited
  only by event 2023-03/breachforums-pompompurin-arrest). CORRECTED the prior
  note's false tail "re-sentenced January 2025 to 17 years": the Fourth
  Circuit VACATED the sentence Jan 21 2025 (it did not resentence), and the
  Sept 16 2025 resentencing was 36 months (three years) — "17 years"
  conflated the "17 DAYS" time-served term.
