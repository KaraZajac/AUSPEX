notes: |
  DOJ press release on the July 2023 guilty plea by Conor
  Fitzpatrick to three counts including conspiracy to commit
  device fraud, solicitation for purposes of offering access
  devices, and possession of child sexual abuse material.
  Subsequent sentencing in January 2024 to supervised release
  was overturned and re-sentenced January 2025 to 17 years.
