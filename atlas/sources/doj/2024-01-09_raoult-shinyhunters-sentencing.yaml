notes: |
  USAO Western District of Washington (Seattle) press release on
  the sentencing of Sebastien Raoult ("Sezyo Kaizen"), a member of
  the ShinyHunters financially-motivated data-theft and extortion
  group. Sentence: 36 months prison + USD 5M+ restitution.
  Between April 2020 and July 2021, ShinyHunters posted sales of
  hacked data from more than 60 companies on RaidForums,
  EmpireMarket, and Exploit.
  AUDIT (2026-07-04, claude-opus-4.8/max): justice.gov is Akamai
  bm-verify walled for plain curl; the real page was captured by
  following the interstitial's bm-verify token URL with a cookie
  jar (raw snapshot sha256 eb577ef4…757c3cb9, 101,375 bytes — the
  full article, not the ~2.5KB interstitial). Verbatim support:
  "sentenced today in U.S. District Court in Seattle to three
  years in prison and more than $5 million in restitution for
  conspiracy to commit wire fraud and aggravated identity theft";
  "Sebastien Raoult, aka 'Sezyo Kaizen,' was arrested in 2022 in
  Morocco and was extradited to the U.S. in January 2023";
  subhead "Millions of victims had their personal information
  stolen and sold by 'ShinyHunters' group on the dark web"; "a
  user going by the name ShinyHunters posted hacked data from
  many of those companies for sale on dark web forums, including
  RaidForums, EmpireMarket, and Exploit. Between April 2020 and
  July 2021, ShinyHunters posted sales of hacked data from more
  than 60 companies"; "loss to victim companies that is estimated
  to exceed $6 million"; "In asking for a six-year prison term,
  Assistant United States Attorney Miriam Hinman"; "U.S. District
  Judge Robert S. Lasnik"; "investigated by the FBI Seattle Cyber
  Task Force"; dateline "Tuesday, January 9, 2024".
