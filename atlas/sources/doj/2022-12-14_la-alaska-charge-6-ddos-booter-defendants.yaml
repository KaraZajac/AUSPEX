notes: |
  Authoritative DOJ (U.S. Attorney's Offices for the Central District of
  California and the District of Alaska) announcement of the 14 Dec 2022
  seizure of 48 internet domains offering DDoS-for-hire ("booter"/"stresser")
  services and the charging of six U.S. defendants — four charged in Los
  Angeles (Jeremiah Sam Evans Miller / royalstresser + supremesecurityteam;
  Angel Manuel Colon Jr. / securityteam.io; Corey Anthony Palmer / booter.sx;
  Shamar Shattock / astrostress) and two charged in Alaska (John M. Dobbs /
  ipstresser; Joshua Laing / truesecurityservices). The U.S. action was
  conducted as part of the international "Operation PowerOFF" effort. Added
  2026-07-02 as the govt-primary of record for event
  2022-12/operation-poweroff-ddos-for-hire (previously single-secondary-source
  on Krebs). AUDIT 2026-07-02 (claude-opus-4.8/max): live URL is bot-walled
  (Akamai/BullMachine interstitial challenge; HTTP-200 2.5 KB JS challenge, and
  HTTP 403 to WebFetch) so NO raw snapshot / content_sha256 could be captured;
  its facts (48 domains; six defendants across the Central District of
  California and the District of Alaska; Operation PowerOFF) are corroborated by
  the snapshotted Krebs and The Hacker News reports and by reachable DOJ text
  mirrors (BleepingComputer, TechCrunch, The Register). Krebs + The Hacker News
  remain the load-bearing snapshotted sources for this event.
