notes: |
  DOJ press release announcing the September 2025 resentencing
  of Conor Brian Fitzpatrick ("Pompompurin"), founder of
  BreachForums, to 36 months federal prison. The resentencing
  followed a Fourth Circuit January 2025 ruling that vacated
  the original January 2024 time-served + 20-years supervised-
  release sentence as substantively unreasonable. BreachForums
  hosted approximately 14B individual records over its one-
  year primary operation.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshotted live from justice.gov
  (browser UA; no bot-wall), sha256 a51091d9…cb35c534, 93,790 B. Real DOJ article,
  NOT a phantom. Publication/resentencing date is 2025-09-16 (three raw signals; see
  published_on). Verbatim support for the event's core claims: "resentenced to three
  years in prison"; "the U.S. Court of Appeals for the Fourth Circuit issued an opinion
  on Jan. 21, 2025, vacating Fitzpatrick's prior sentence of time served (17 days) and
  remanded the case for resentencing"; "at least 888 datasets … over 14 billion
  individual records of PII"; "approximately 87,760 members of InfraGard". CAVEAT — this
  note's editorial phrasing over-reaches the PR: "substantively unreasonable", "20-years
  supervised release" and "January 2024" (original-sentence date) are NOT in the PR (the
  PR says only "time served (17 days)" and "vacating … and remanded"); those specifics
  are corroborated in the sibling 2023-03/breachforums-pompompurin-arrest event, not by
  this source.
