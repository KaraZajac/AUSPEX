notes: |
  The actual charging document (33 pp.) attached to the 2021-02-17
  DOJ press release, filed Dec. 8 2020 in the C.D. Cal. Charges the
  three RGB defendants with a single conspiracy spanning the Sony
  Pictures (2014) attack, SWIFT-network bank heists (Vietnam,
  Bangladesh, Taiwan, Mexico, Malta, Africa, 2015-2019), FASTCash
  ATM cash-outs, WannaCry 2.0 (2017), and the Marine Chain ICO.
  AUDIT (2026-07-01, claude-opus-4.8/max): fetched directly from
  justice.gov (HTTP 200, 334,671 bytes, sha256 87b280f1…b79b83e5b2;
  the /file/…/download endpoint is NOT bot-walled, unlike the HTML
  press-release page). Term-scan of extracted text: "Reconnaissance
  General Bureau"=1, "Lazarus"=1, "APT38"=1, Sony Pictures=5,
  Bangladesh=5, Marine Chain=9, WannaCry=1, SWIFT=2. The indictment
  names the defendants as "members of units of the RGB … come to be
  known within the cyber-security community as both Lazarus Group and
  Advanced Persistent Threat 38 (APT38)"; Marine Chain purpose stated
  as "to evade United States sanctions on North [Korea]" and to
  "further the strategic and financial interests of the DPRK
  government." NB: "Lab 110" does NOT appear anywhere in this charging
  document (term-count 0) — the Lab 110 unit designation is not carried
  by either DOJ 2021 source.
