notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): created during phantom re-source of event
  2024-12/romanian-presidential-election-interference. Server-rendered DG-CONNECT mirror
  of Commission press release IP/24/6487 (the ec.europa.eu/commission/presscorner copy is a
  JS SPA shell that curl cannot capture; this mirror carries the full text). Raw snapshot
  captured + sha256 verified (50,643 bytes). Verbatim support in snapshot:
   - "Commission opens formal proceedings against TikTok on election risks under the
     Digital Services Act" — investigating "systemic risks linked to election integrity,
     notably in the context of the recent Romanian presidential elections on 24 November."
   - focus on "TikTok's recommender systems, notably the risks linked to the coordinated
     inauthentic manipulation or automated exploitation of the service."
   - von der Leyen: "We must protect our democracies from any kind of foreign interference.
     Whenever we suspect such interference, especially during elections, we have to act
     swiftly and firmly."
  IMPORTANT for attribution discipline: the Commission uses "foreign interference" and names
  NO state — it does NOT attribute the operation to Russia. This DSA action must not be cited
  as a Russia attribution; it is a regulatory response to TikTok's risk management.
