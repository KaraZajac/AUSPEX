notes: |
  BlackBerry Threat Research analysis of Transparent Tribe / APT36
  activity (late 2023–April 2024) targeting Indian government, defense,
  and aerospace sectors via cross-platform (Python/Golang/Rust) tooling
  and web-service C2/exfil (Telegram/Discord/Slack/Google Drive).
  Documented payloads: GLOBSHELL (Python/ELF document-exfiltration
  utility) and PYSHELLFOX (Firefox-session exfil). Poseidon (a Golang
  ELF Linux/macOS agent) noted as remaining in the group's toolkit,
  attack vector unconfirmed.

