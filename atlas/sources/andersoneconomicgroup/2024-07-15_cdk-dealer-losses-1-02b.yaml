notes: |
  First-party origin of the industry-wide dealer-loss estimate cited by
  AUSPEX event 2024-06/cdk-global-blacksuit. Anderson Economic Group (AEG),
  East Lansing, MI, is the analyst that produced the estimate, so this press
  release is primary for that figure. Published 2024-07-15 (page also shows a
  2024-07-23 update stamp).

  AUDIT (2026-07-04, claude-opus-4.8/max): captured live (HTTP 200, 101KB).
  Verbatim support: "AEG estimates that total direct losses to franchised auto
  dealers in the three calendar weeks that included June 19 and ran through
  July 5 reached $1,020 million. This amount includes lost earnings from the
  approximately 56,200 new unit sales that AEG estimated were lost during the
  three-week period ..."; subhead "AEG Estimates Affected Dealers Lost 56,200
  New Vehicle Sales, Incurred Substantial Costs During 3-week Disruption";
  "the hacking and ransomware attack on CDK software and systems that began in
  mid-June". The $1.02B (=$1,020M) figure is the source of the event's
  industry_impact_usd.
