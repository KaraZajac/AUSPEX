notes: |
  Sky Mavis "Community Alert: Ronin Validators Compromised" post
  for the March 2022 Ronin Bridge theft. Live substack URL now 404;
  snapshot from Wayback Machine 2023-04-01 capture (the post was
  updated in place through Jun-2022 — captures the "Original article
  - posted 3/29/2022 8:29am PST" plus later updates).
  AUDIT (2026-07-11, claude-opus-4.8/max): CORRECTION — the prior
  note claimed this "Confirms phishing of a Sky Mavis engineer via
  fake job offer." It does NOT. The snapshot says "All evidence
  points to this attack being socially engineered" and contains 0
  hits for "phishing", "job offer", "LinkedIn", "spear", or
  "employee". What it DOES confirm: "173,600 Ethereum and 25.5M
  USDC" drained "on March 23rd ... in two transactions"; "hacked
  private keys ... to forge fake withdrawals"; "9 validator nodes",
  "five out of the nine validator si[gnatures]" required; Axie DAO
  validator reached "using the gas-free RPC"; threshold raised
  "from five to eight"; discovery "after a report from a user being
  unable to withdraw 5k ETH"; "working with Chainalysis to monitor
  the stolen funds". The fake-job-offer/LinkedIn lure detail is from
  later third-party reporting (The Block, Jul 2022), not this post.
