notes: |
  Foundational vendor disclosure (86-page report, ~2-year
  investigation) of an Iran-based campaign against critical
  infrastructure across 16 countries (>50 entities). Cylance
  named a Tehran-based team it called "Tarh Andishan" (after the
  front company used for domain registration), the proprietary
  "TinyZbot" backdoor/botnet, Persian-language artifacts, and
  individual operators inside Iran. NB: Cylance attributed only
  "Iran-based"/"state-sponsored" and was explicitly cautious NOT
  to conclude the campaign was sanctioned by the Iranian
  government; it names NO Iranian service. The "ties to the IRGC"
  line is CEO Stuart McClure's separately-stated belief, not a
  report attribution — the prior "IRGC-attributed" wording here
  was an overclaim, corrected 2026-06-25.
  AUDIT (2026-06-25, claude-opus-4.8/max): url is LINK-ROTTED —
