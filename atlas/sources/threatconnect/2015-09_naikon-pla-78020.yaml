notes: |
  Attributes APT30 / Naikon to PLA Chengdu Military Region Second
  Technical Reconnaissance Bureau (Unit 78020), naming PLA officer
  Ge Xing.
  AUDIT (2026-06-24, claude-opus-4.8/max): SUPPORTS the cn/pla/unit-78020 placement of
  cn/pla/apt30 — this is the unit-naming source. Captured raw is the CIRA/exovera summary of
  the CAMERASHY report (the original threatconnect.com PDF path now redirects away; archive.org
  copy of that PDF was not retrievable). The summary states verbatim: "The PROJECT CAMERASHY
  report, a joint project of CIRA and the cybersecurity firm ThreatConnect, definitively
  attributes cyber espionage activity associated with the Naikon Advanced Persistent Threat (APT)
  group to a specific unit (Unit 78020) within the Chinese People's Liberation Army (PLA). For
  nearly five years, Unit 78020 has employed malicious email attachments and spear phishing
  campaigns to exploit its targets in the Southeast Asian military, diplomatic, and economic
  sectors." This names the exact PLA unit, but attributes it to "Naikon"; the PLA placement of the
  AUSPEX "APT30" actor therefore rests on the Naikon=APT30 equivalence (Kaspersky alias, recorded
  as `equivalent` on the actor). NB MISP treats Naikon (synonyms include "PLA Unit 78020",
  "Camerashy") and APT30 as overlapping-but-separate clusters ("the two groups do not appear to be
  exact matches") — see the actor note. The full CAMERASHY PDF (not captured) is the source for the
  "Ge Xing" / Chengdu 2TRB detail; only the unit-level statement is verifiable in the captured raw.
