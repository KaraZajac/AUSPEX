  RETIRE CANDIDATE (orphaned as of 2026-07-10 audit — do NOT delete;
  orchestrator handles FK propagation). PHANTOM: url null, archive
  null; the purported standalone FireEye TV5Monde blog post is not
  recoverable, because the FireEye June-2015 TV5Monde attribution
  was delivered via press statements (Richard Turner, Greg Day) and
  a Trend Micro blog, NOT a dedicated FireEye post. The prior
  "later partially superseded by Sandworm reassignment" claim was
  FALSE — TV5Monde is attributed throughout to APT28 (GRU 26165 /
  Fancy Bear / Sofacy / Pawn Storm), never to Sandworm (74455).
  During the 2026-07-10 audit of 2015-04/tv5monde this record was
  removed from that event and REPLACED by a live, snapshotted
  secondary that quotes the FireEye attribution directly:
  theregister/2015-06-10_tv5monde-apt28-russia-not-isis (Turner:
  "ISIS was a decoy and APT28 was actually responsible for the
  attack on TV5Monde"), corroborated by
  bbc/2016-10-10_tv5monde-almost-destroyed-russian-hackers. This
  record is now cited by no event/actor/marker.
