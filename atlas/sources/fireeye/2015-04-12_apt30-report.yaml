notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): does NOT name a PLA unit — corroborating context only,
  not the unit-naming source. The live Mandiant URL (and its archive.org copy) now serve only the
  Google Cloud / Mandiant page chrome under the title "APT30: The Mechanics of a Long-Running Cyber
  Espionage Operation"; the report body is no longer rendered there and is not present in the
  captured raw (sha above is of that page-shell snapshot). FireEye's APT30 report (2015), as
  publicly established and per the brief, assesses APT30 as a long-running, likely China
  state-sponsored cyber-espionage operation against South-East Asian / ASEAN government, military
  and journalist targets, inferring state sponsorship from the regional political-military focus
  and a disciplined ~decade-long development effort — it stops at "China / state-sponsored" and does
  NOT name a specific PLA unit. The unit-level attribution (Unit 78020) comes solely from the
  companion source threatconnect/2015-09_naikon-pla-78020 (CAMERASHY), via the Naikon=APT30 equation.
