notes: |
  FireEye's foundational public attribution of APT32 / OceanLotus
  as a Vietnamese-aligned cluster targeting global corporations,
  ASEAN governments, and Vietnamese dissidents. Establishes the
  APT32 naming convention adopted across Western vendors.
  AUDIT (2026-06-24, claude-opus-4.8/max): Foundational APT32 attribution stops at the
  NATION level — names NO specific Vietnamese service (no TC2 / Tổng cục II / General
  Department II / Ministry of Public Security / military intelligence). Verbatim:
  "FireEye assesses that APT32 leverages a unique suite of fully-featured malware ... to
  conduct targeted operations that are aligned with Vietnamese state interests." and
  "FireEye assesses that APT32 is a cyber espionage group aligned with Vietnamese
  government interests." Supports the demotion of the actor vn/tc2/apt32 -> vn/unscoped/apt32.
