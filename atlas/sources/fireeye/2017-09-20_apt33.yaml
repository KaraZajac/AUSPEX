notes: |
  FireEye foundational disclosure naming APT33 / Refined Kitten,
  linking the cluster to Shamoon-family destructive malware and
  Saudi/Gulf-state energy and aerospace targeting.
  AUDIT (2026-07-05, claude-opus-4.8/max): DUPLICATE of fireeye/2017-09-20_apt33-report —
  same article (URL differs only by a trailing slash), same publisher/title/date. The
  '-report' twin is the audited, snapshot-hashed record (sha256 ec8fe72…e595b27) that the
  APT33 actor file and the sister shamoon-saudi-aramco event cite; rasgas-shamoon has been
  re-pointed to it. CONSOLIDATION/RETIRE candidate for the orchestrator (still cited by
  apt33-saudi-korea-aerospace and the orgs/rasgas target). Content caveat carried by the
  twin's audit: the report attributes APT33 only to "the Iranian government" (IRGC: 0 hits)
  and EXPLICITLY SEPARATES APT33 from the 2012 Shamoon operator ("the suspected Iranian
  group that previously used SHAMOON … However … a separate, less widely known suspected
  Iranian group … whom we call APT33"; "we have not directly observed APT33 … carry out
  destructive operations") — so it does NOT support APT33 as the 2012 RasGas/Aramco
  attacker; that label is a later lineage-clustering, not this source's finding. tier left
  as-is (primary) to avoid touching other events; flagged rather than changed.
