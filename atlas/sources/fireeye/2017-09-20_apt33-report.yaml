notes: |
  Foundational vendor attribution of APT33 to the Iranian government; links the cluster to
  Shamoon-lineage destructive operations.
  AUDIT (2026-06-24, claude-opus-4.8/max): used for the ir/irgc/apt33 service-placement audit.
  The report does NOT name the IRGC (0 occurrences of "IRGC" or "Revolutionary Guard"); it
  attributes APT33 only to the "Iranian government." Verbatim: "We assess APT33 works at the
  behest of the Iranian government"; the targeting of aerospace/energy orgs "most closely aligns
  with nation-state interests, implying that the threat actor is most likely government
  sponsored"; "[additional evidence] bolsters our assessment that APT33 may have operated on
  behalf of the Iranian government." The "Nasr Institute" / "cyber army" passage likewise says
  only "controlled by the Iranian government." The earlier note's claim that this is the
  "foundational vendor attribution of APT33 to IRGC" was inaccurate and is corrected here:
  FireEye attributes to the Iranian government generically, not to a named service. This source
  therefore does not support an IRGC placement -> actor demoted to ir/unscoped/apt33.
