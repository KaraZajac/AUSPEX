notes: |
  EU High Representative declaration referencing the Ghostwriter campaign.

  AUDIT (2026-06-24, claude-opus-4.8/max): live consilium.europa.eu fetch was
  Cloudflare-blocked (HTTP 403); snapshot captured from the archive_url
  (Wayback 2025-10-15, HTTP 200) and hashed. CORRECTION — this declaration
  attributes Ghostwriter to RUSSIA, not Belarus (the prior note "attributing...
  to Belarus-linked threat actors" was wrong; "Belarus" and "KGB" appear 0
  times in the text). Verbatim: "Some EU Member States have observed malicious
  cyber activities, collectively designated as Ghostwriter, and associated
  these with the Russian state. ... We urge the Russian Federation to adhere to
  the norms of responsible state behaviour in cyberspace." This is one of the
  two cited govt sources that put the Ghostwriter NATION in contest (Russia vs
  Mandiant's Belarus) — flagged on the actor record, nation not re-homed.
