notes: |
  EU/UK/US Five Eyes joint attribution of the 24 February 2022
  Viasat KA-SAT / AcidRain disruption to Russia, naming the
  operation as invasion-support objective. Gold-standard
  attestation for invasion-supporting non-contact-warfare doctrine
  link.

  AUDIT (2026-07-10, claude-opus-4.8/max): live consilium.europa.eu
  fetch was Cloudflare-blocked (HTTP 403); snapshot captured from the
  archive_url (Wayback 2022-05-21, HTTP 200) and hashed; archive_url
  pinned to the concrete capture timestamp. Body carries the
  load-bearing quotes verbatim. Attribution (nation-level): "The
  European Union and its Member States, together with its
  international partners, strongly condemn the malicious cyber
  activity conducted by the Russian Federation against Ukraine, which
  targeted the satellite KA-SAT network, owned by Viasat." Invasion
  objective (doctrine-attesting): "The cyberattack took place one hour
  before Russia's unprovoked and unjustified invasion of Ukraine on 24
  February 2022 thus facilitating the military aggression." Spillover:
  "affecting several EU Member States"; such attacks "could spill over
  into other countries and cause systemic effects." No unit/service
  named; no modem count; no wind-turbine figure (those are carried by
  Viasat + SentinelLabs).
