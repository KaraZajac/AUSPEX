notes: |
  First EU cyber sanctions designations under Council Decision
  2019/797 — targeted six individuals and three entities including
  Chinese (Wuhan Xiaoruizhi associates), Russian (GRU 26165 officers
  for OPCW close-access op), and DPRK (Chosun Expo).
