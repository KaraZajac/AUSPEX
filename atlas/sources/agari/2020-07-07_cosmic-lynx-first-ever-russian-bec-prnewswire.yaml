  Agari's own launch announcement for the Cosmic Lynx ACID
  report (companion to the report PDF). Carries the mule-
  account geography verbatim — "moves the stolen funds through
  money mule accounts in Hong Kong, with secondary accounts
  located in Hungary, Portugal, and Romania" — plus "$2.7M
  request in a recent Cosmic Lynx scheme" vs. "$55,000" average
  for traditional executive-impersonation BEC, "more than 200
  BEC campaigns" since July 2019 in "46 countries across six
  continents", and the "first-ever reported Russian" BEC ring
  framing.
