notes: |
  Agari ACID's "Threat Actor Dossier: Cosmic Lynx — The Rise
  of Russian BEC", identified as the first significant
  Russian-speaking BEC operator (BEC having been
  overwhelmingly West-African/Nigerian through the 2010s).
  Cosmic Lynx ran 200+ campaigns since July 2019 against
  professionals in 46 countries, many at Fortune 500 / Global
  2000 companies, via a dual-impersonation M&A-acquisition
  pretext.
  AUDIT (2026-07-01, claude-opus-4.8/max): re-sourced from a
  NULL-url phantom. The original agari.com blog URL
  link-rotted after Fortra's acquisition of Agari; the report
  PDF (copyright 2020 Agari Data, Inc.) is preserved live at
  a HANDD Business Solutions partner mirror — set as `url` and
  snapshotted. First-party vendor research → tier corrected
  secondary→primary. The report does NOT state a "~$1.27M
  average per campaign" nor a "~5x Nigerian" ratio (the prior
  note's figures); it states only that most executive-
  impersonation BEC averages $55,000 while Cosmic Lynx "asks
  for hundreds of thousands, sometimes millions of dollars"
  and names Hong Kong (not Eastern Europe) as its primary
  mule geography — those fabricated figures were stripped
  from the event.
