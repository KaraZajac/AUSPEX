notes: |
  Agari ACID's report on Cosmic Lynx, identified as the first
  significant Russian-speaking BEC operator (BEC having been
  overwhelmingly West-African through the 2010s). Cosmic
  Lynx ran ~200 campaigns against Fortune 500 / Global 2000
  victims from mid-2019, with average attempted-fraud values
  ~5x higher than Nigerian-organized BEC. Agari corporate
  URLs no longer serve the historic blog index; URL marked
  null pending verified replacement.
