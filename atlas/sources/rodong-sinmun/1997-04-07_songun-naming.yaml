notes: |
  First public naming of Songun (military-first politics) as a
  WPK ideological line under Kim Jong Il. Reference point for
  Songun status / supersession analysis. Second-attempt URL
  verification failed: no canonical archived URL of the April
  1997 Rodong Sinmun editorial exists in indexed open sources.
  The 1997 editorial is referenced in the Songun Wikipedia
  article, in the Korea Institute for National Unification's
  scholarly literature ("Military-First Politics and Building
  a Powerful and Prosperous Nation"), and GlobalSecurity.org's
  Songun Chongch'i entry. Songun received its more prominent
  joint-editorial naming in the January 1999 New Year editorial.
