  Composite Wikipedia entry consolidating the Mossad January 31 2018
  raid on the AMAD Project nuclear-archive warehouse in the Kahrizak
  District of southern Tehran. Aggregates Haaretz, NYT, Times of Israel,
  Modern War Institute, and ex-Mossad-director Yossi Cohen interview
  material. Operation officially attested by Israel when Netanyahu
  presented the seized documents on 30 April 2018 — one of the rare
  IL offensive operations Israel has acknowledged on the record.
