notes: |
  Composite Wikipedia entry consolidating the Mossad January 31 2018
  raid on the AMAD Project nuclear-archive warehouse in the Kahrizak
  District of southern Tehran. Aggregates Haaretz, NYT, Times of Israel,
  Modern War Institute, and ex-Mossad-director Yossi Cohen interview
  material. Operation officially attested by Israel when Netanyahu
  presented the seized documents on 30 April 2018 — one of the rare
  IL offensive operations Israel has acknowledged on the record.

  AUDIT (2026-06-27, claude-opus-4.8/max): sole cited source for event
  2018-01/mossad-iran-nuclear-archive-raid. Raw HTML re-verified on disk
  (161,473 bytes; oldid=1360619729; refs retrieved as late as 10 July 2025,
  so the page postdates the old 2024-01-01 placeholder) and SHA-256'd
  (content_sha256 above; hash re-verified, existing snapshot reused).
  archive.org is blocked here, so the local snapshot is the reproducible copy.
  published_on set to null (living wiki article; placeholder predated the
  2018-04-30 attribution_date) — same fix as the OPM type specimen.
  VERBATIM FACTS the source DOES carry: "On 31 January 2018, fewer than two
  dozen Mossad agents infiltrated a secret warehouse in the Kahrizak District
  of southern Tehran ... and pilfered 100,000 documents"; Time "00:01-06:30
  IRST"; "the agents only cut open six of the 32 safes"; "Within six and a
  half hours, the agents had seized approximately 50,000 paper documents and
  another 55,000 pages of information and plans stored on 183 CD-ROM's";
  "documenting the nuclear weapons work of Iran's AMAD Project between 1999 and
  2015"; Perpetrator "Mossad"; Motive "Espionage"; purpose "to gather evidence
  that would convince the new Trump administration to withdraw from the JCPOA
  deal"; "human intelligence ... and signals intelligence from intercepted
  Iranian communications"; ex-Mossad head Yossi Cohen "implied that the
  documents and data CDs were smuggled out of Iran (allegedly to Azerbaijan)
  via a lorry"; "Israeli Prime Minister Benjamin Netanyahu publicly announced
  the operation in a televised presentation in English in Tel Aviv on 30
  April"; "Days after Netanyahu's presentation ... Trump withdrew the US from
  the JCPOA, which was the ultimate objective of the operation".
  The source does NOT carry: a "defense ministry" venue (says "in Tel Aviv";
  its only "Ministry of Defen[cs]e" mentions are the Iranian MoD and the nav
  template); Netanyahu "displaying binders and CDs on stage"; the specific
  withdrawal date "8 May 2018" or "eight days" (says "Days after"); the word
  "OSINT"; a count of 32 safes CUT (only 6 of 32 were cut). "Begin Doctrine"
  appears 3x but only in the "Israel and nuclear weapons" nav template, never
  in body prose about this operation's purpose. Event prose corrected in the
  same audit to match.
