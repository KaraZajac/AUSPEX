  Research Institute). KAERI is the ROK national nuclear-
  research lab; AUSPEX cites it as the target of the
  publicly disclosed June 2021 intrusion attributed to a
  DPRK cluster (Kimsuky).

  AUDIT (2026-07-01, claude-opus-4.8/max): this URL is a
  general reference page on the KAERI institute and does
  NOT mention the 2021 intrusion, Kimsuky, North Korea, or
  any VPN (78,404-byte snapshot; no content hash recorded).
  It was a PHANTOM citation for event
  2021-06/kaeri-kimsuky-intrusion and was de-cited from it
  (re-sourced to BleepingComputer + The Record, 19 Jun 2021).
  Still legitimately cited by atlas/targets/orgs/kaeri.yaml
