  Tertiary corroborating reference for the 17 December 2016 Industroyer /
  CrashOverride attack on Ukrenergo. Cited on
  2016-12/ukraine-industroyer-crashoverride for the ONE fact neither the
  ESET blog, the Wired secondary, nor the DOJ PR names: the specific
  substation, "Pivnichna."

  AUDIT (2026-07-10, claude-opus-4.8/max): URL live (HTTP 200); raw_snapshot
  captured + hashed (content_sha256 105e8627…45b3653f, 88,933 bytes).
  Verbatim support: "The attack affected the 330 kilowatt electrical
  substation 'North' at Pivnichna, outside the capital"; the outage hit
  "the Ukrainian capital Kiev just before midnight on 17 December 2016, and
  lasted for just over an hour"; "The national electricity transmission
  operator Ukrenergo said that the attack had cut one fifth of the city's
  power consumption at that time of night"; "Dragos Security concluded that
  the attack was" the work of the Sandworm-linked cluster. (Wikipedia's
  "330 kilowatt" is a typo for 330 kilovolt / 330 kV; used only for the
  substation identity, the one-fifth share, and the just-over-an-hour
  duration.)
