  Composite Wikipedia entry aggregating reporting on Operation Grim
  Beeper (17-18 September 2024 pager and walkie-talkie explosions).
  Sources include Reuters, NYT, AP, BBC, CNN, Times of Israel, AlJazeera.
  Netanyahu's office confirmed Israeli responsibility on 10-11 November
  2024 — one of the rare cases of formal Israeli attestation for an
  offensive operation.
