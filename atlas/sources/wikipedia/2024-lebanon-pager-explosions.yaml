notes: |
  Composite Wikipedia entry aggregating reporting on Operation Grim
  Beeper (17-18 September 2024 pager and walkie-talkie explosions).
  Sources include Reuters, NYT, AP, BBC, CNN, Times of Israel, AlJazeera.
  Netanyahu's office confirmed Israeli responsibility on 10-11 November
  2024 — one of the rare cases of formal Israeli attestation for an
  offensive operation.

  SNAPSHOT (2026-07-11, claude-opus-4.8/max, re:
  2024-09/hezbollah-pager-supply-chain-operation): live en.wikipedia.org
  HTTP 200 -> raw/wikipedia__2024-lebanon-pager-explosions.html (sha256
  7ab97eeb…09ca436, 1,202,124 B). Living article — the snapshot is a later
  revision (now includes April-2025 / 60-Minutes material). This is the
  ONLY cited source that carries the event's PETN, "42 (incl 12
  civilians)", "4,000 civilians injured" and "1,500 fighters" figures.
  Verbatim: "an Israeli attack nicknamed Operation Grim Beeper"; "thousands
  of handheld pagers and hundreds of walkie-talkies"; "Mossad had secretly
  manufactured and integrated the explosive PETN into the devices, and
  sold them to Hezbollah through a shell company"; "a joint operation
  between the Israel Defense Forces and Mossad"; infobox "42 (including 12
  civilians) killed / 3,500-4,000 injured"; "the attack killed 42 people,
  … including 12 civilians, … and injured 4,000 civilians (according to
  Mustafa Bairam … Minister of Labour and a member of Hezbollah)"; "an
  unnamed Hezbollah official … 1,500 Hezbollah fighters were taken out of
  action"; the "4,000" ILO figure noted as "much higher than initial
  reports." Sole "Unit 8200" string is a bare navbox link (not a claim
  about this operation).
