  AUSPEX tertiary citation for NIS history, 1961 KCIA lineage,
  1981 ANSP rename, 1999 NIS rename, and the 2012 election-
  interference scandal under the Psychological Warfare Bureau.
  Anchor entry for kr/nis service.

  AUDIT (2026-06-24, claude-opus-4.8/max): supports the kr/nis
  service placement of kr/nis/election-interference-cluster — the
  source repeatedly and explicitly names the National Intelligence
  Service (NIS) as the perpetrating service of the 2012 election
  operation, not merely "South Korea" / "an intelligence agency".
  Verbatim: "In 2012, Park Geun-hye's presidential election was
  revealed to have been manipulated by members of the National
  Intelligence Service (NIS) in order to ensure that a conservative
  candidate came into power. Agents were accused of manipulating
  public opinions surrounding the election through means such as
  social media, as ordered by the NIS. This led to former spy chief
  Won Sei-hoon's three-year imprisonment in 2015 in connection to the
  case." Also: "In the presidential election held in December 2012,
  NIS committed a serious crime by secretly helping Park Geun-hye's
  campaign ... Won was convicted on charges of instructing NIS
  officials to manipulate internet comments." The Psychological
  Warfare Bureau framing is source-backed too ("An agent surnamed
  Park who was on the NIS's psychological warfare team"). Raw snapshot
  captured + hashed; tertiary tier unchanged.
