notes: |
  Korean-language Wikipedia article on the ROK military Cyber Operations
  Command (사이버작전사령부, formerly 국군사이버사령부 / Cyber Command).
  AUDIT (2026-07-05, claude-opus-4.8/max): living reference, live snapshot
  captured + hashed on the retrieval date. Uniquely carries the exact
  founding date and the rename date used by the event:
  - Establishment: "국방개혁 2020 계획과 7·7 DDoS 공격을 계기로 군 차원에서
    사이버 안전의 필요성이 대두되어 2010년 1월 11일 국방정보본부 예하
    사령부로서 창설되었다" — established 11 January 2010 as a command under the
    Defense Intelligence Headquarters (국방정보본부), prompted by the Defense
    Reform 2020 plan AND the 7.7 DDoS attack; initial strength 400-500.
  - Infobox activity period: "2010년 1월 11일 ~ 현재", affiliation 대한민국 국방부.
  - Transfer: "2011년 9월 국방개혁 307계획에 따라 대한민국 국방부 직속
    사령부로 배속전환" — placed directly under the MND in Sept 2011.
  - Rename: "2019년 2월 26일, 부대명칭이 기존의 '국군사이버사령부'에서
    '사이버작전사령부'로 변경되었다" — renamed 26 February 2019.
  - "대선 개입 논란" (election-intervention controversy) section documents the
    Cyber Command psychological-warfare unit's alleged 2012 presidential-
    election online-comment operations (raised 14 Oct 2013 in the NDC audit).
