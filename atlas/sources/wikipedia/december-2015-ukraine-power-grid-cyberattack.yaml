notes: |
  Tertiary corroborating reference for the 23 December 2015 attack on
  three Ukrainian oblenergos. Cited on
  2015-12/ukraine-power-grid-blackenergy for the ONE fact the primary
  sources leave uncovered: the name of the third distribution company,
  Chernivtsioblenergo. The E-ISAC/SANS DUC (primary) names Kyivoblenergo
  and Prykarpattyaoblenergo but not the third; the ICS-CERT advisory and
  DOJ indictment name none of the individual oblenergos.

  AUDIT (2026-07-05, claude-opus-4.8/max): URL live (HTTP 200);
  raw_snapshot captured + hashed (content_sha256 7ca4c5f9…3de5649a,
  224,563 bytes). Verbatim-supports: "consumers of two other energy
  distribution companies, Chernivtsioblenergo (Ukrainian:
  Чернівціобленерго … ) and [Prykarpattyaoblenergo]" and "about 230,000
  people were without electricity for a period from 1 to 6 hours."
  (NOTE: Wikipedia gives ~230,000; the event keeps the primary DUC/ICS-CERT
  figure of ~225,000. This source is used only for the third-company
  identity and the 1–6 hour outage range, not the headline count.)
