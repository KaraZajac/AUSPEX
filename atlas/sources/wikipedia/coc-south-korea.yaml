notes: |
  AUSPEX tertiary citation for ROK Cyber Command's January 2010
  establishment and January 2019 rename to Cyber Operations
  Command. Anchor entry for kr/coc service. Expected English
  Wikipedia article (en.wikipedia.org/wiki/Cyber_Operations_
  Command_(South_Korea)) returns the noarticletext
  placeholder as of 2026-05 — page does not exist; closely
  related en.wikipedia titles (Cyber_Command_(South_Korea),
  Cyberwarfare_Command, Defense_Cyber_Command_(South_Korea))
  also do not exist. No Wayback Machine snapshot indexed via
  the availability API. Institutional details are corroborated
  by ROK MND public announcements and South Korean news
  coverage.

  AUDIT (2026-06-24, claude-opus-4.8 / high): re-fetched the expected EN
  Wikipedia title to verify the "page does not exist" claim — confirmed
  HTTP 404 with the "noarticletext" / "Wikipedia does not have an article
  with this exact name" placeholder (raw_snapshot is that 404 page;
  content_sha256 hashes it, so the not-exists finding is reproducible).
  This source supports only COC's institutional establishment/rename; it
  names NO specific cyber operation and does NOT attribute any operation to
  COC. Used in the kr/coc/joint-actor service audit: that actor's sole
  source carries zero operational attribution, so the 'coc' service claim
  was unsupported -> actor demoted to kr/unscoped/joint-actor + flagged
  retire-candidate (the actor record's own ttp_summary already conceded no
  operation has been publicly attributed to COC).
