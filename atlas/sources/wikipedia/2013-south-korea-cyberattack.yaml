notes: |
  Tertiary reference for the March 20, 2013 DarkSeoul wiper
  campaign targeting Korean broadcasters and banks. Used here
  for institutional context on ROK defensive posture and the
  2010 Cyber Command rationale.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshotted + hashed during
  the 2013-03/darkseoul event audit (curl 200, 197211 bytes). Confirmed
  in raw as the corroborating carrier for the six named victims — KBS,
  MBC, YTN (broadcasters) and Shinhan, NongHyup/NACF, Jeju (banks) —
  plus Trojan.Jokra and the Ministry of Science, ICT and Future Planning
  attribution. Tertiary corroboration only; nation attribution rests on
  the BBC primary-coverage record.
