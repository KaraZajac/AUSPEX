  AUDIT (2026-07-10, claude-opus-4.8/max): tertiary corroboration for
  the 26 October 2021 Iranian fuel-network attack. Live URL snapshotted.
  Carries: "The attack took place on 26 October 2021"; "Iran's 4300 gas
  stations were unable to process payments"; the "cyberattack 64411"
  pump display "associated with a hotline to the Ayatollah's office";
  billboards "displaying messages such as 'Khamenei! Where is our
  fuel?'"; "A group called Predatory Sparrow claimed credit ... along
  with a previous cyberattack against Iranian rail assets earlier in
  2021, although Iranian officials simply attributed it to an unnamed
  state actor"; "Gholamreza Jalali, the head of Iranian civil defense,
  accused the United States and Israel"; "According to the Supreme
  Council of Cyberspace, the attacks were similar to the attack on the
  Iranian rail road transit system in July"; Nov-5 compensatory-quota
  announcement (restoration profile).
