  the Cyber Command, and does not state that the 2010 command was
  created in response to this campaign — the earlier notes line
  asserting it was "the publicly cited rationale for the January 2010
  ROK Cyber Command establishment" overclaimed what THIS source carries.
  That causal tie is carried instead by arxiv/2017-11-13_2016-korean-
  cyber-command-compromise and wikipedia/cyber-operations-command-
