notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): sole cited source for event 2014-06/opm-breach and
  for targets orgs/us-opm. Raw HTML captured via curl (177,044 bytes; page "last edited 26 May
  2026"; oldid=1356238118) and SHA-256'd (content_sha256 above); archive.org is blocked here so
  the local snapshot is the reproducible copy. published_on set to null: a Wikipedia article has
  no single publication date, and the previous 2024-01-01 placeholder was arbitrary and produced a
  spurious source-orphan (attribution_date 2015 vs published_on 2024) flag.
  VERBATIM ATTRIBUTION TEXT (tertiary, hedged): "the attack was carried out by an advanced
  persistent threat based in China, widely believed to be the Jiangsu State Security Department, a
  subsidiary of the Government of China's Ministry of State Security spy agency"; "The overwhelming
  consensus is that the cyberattack was carried out by state-sponsored attackers for the Chinese
  government, specifically the Jiangsu State Security Department"; "China denied responsibility."
  No US-government FORMAL/indictment attribution to a named service appears (DNI Clapper is quoted
  only colloquially; NBC ref calls China the "leading suspect"); the JSSD/MSS naming is the
  article's editorial "widely believed"/"consensus" framing, not a cited primary attribution.
  FACTS the source DOES support: SF-86 (127-page Questionnaire for National Security Positions);
  ~22.1M people affected; 5.6M sets of fingerprints; two separate-but-linked intrusions (DHS "X1"
  discovered 20 Mar 2014, "X2" via an attacker posing as a KeyPoint Government Solutions employee,
  X2 act 7 May 2014, discovered 15 Apr 2015); valid user credentials gained "likely through social
  engineering"; PlugX backdoor; "Sakula" malware (per the 2017 Yu Pingan arrest). The source does
  NOT mention: the Hikit rootkit; a "Deep Panda / Hurricane Panda toolset"; Symantec/CrowdStrike
  documentation; a "flat internal network"; the e-QIP system by name; a November-2013 start ("It
  is unclear when the first attack occurred"); or any OPM↔Anthem↔Equifax cross-referencing claim
  (Anthem/Equifax appear only in the article's navigation timeline box). Those event statements
  were corrected/hedged in the same audit to match this cited source.
