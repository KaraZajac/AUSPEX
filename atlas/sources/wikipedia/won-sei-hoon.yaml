  AUDIT (2026-06-24, claude-opus-4.8/max): supports the kr/nis
  service placement of kr/nis/election-interference-cluster — the
  source explicitly names the National Intelligence Service as the
  service Won directed and ties it to the 2012 election-interference
  operation. Verbatim: "In 2009, he was appointed the 10th Director
  of the National Intelligence Service. ... He was indicted in June
  2013 for attempted interference in the 2012 South Korean
  presidential election by allegedly ordering an online
  misinformation campaign against opposition candidates." Judicial
  outcome corroborated: "On August 30, 2017, he was sentenced to four
  years in prison by the Seoul High Court." Raw snapshot captured +
