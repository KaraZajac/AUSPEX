  AUSPEX tertiary citation for KISA's 2009 establishment and
  KrCERT/CC operating role. Anchor entry for kr/kisa service.

  AUDIT (2026-06-24, claude-opus-4.8/max): captured + hashed
  (raw_snapshot above). Confirms KISA is a DEFENSIVE coordinator
  only — verbatim: it "runs the Korea Computer Emergency Response
  Team Coordination Center, a.k.a. KrCERT/CC, for the private sector
  of the country," created July 2009 by merger of KISA, NIDA, and the
  Korean IT International Cooperation Agency. No offensive / attack /
  espionage / threat-actor / perpetrator framing is present in the
  article. Supports DEMOTION of kr/kisa/krcert-actor -> kr/unscoped:
  a defensive national CERT is not an offensive threat actor.
