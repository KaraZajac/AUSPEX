notes: |
  Cybersecurity for the Operational Technology Environment (CyOTE)
  case study, "prepared by Idaho National Laboratory (INL) under an
  agreement with and funded by the U.S. Department of Energy" (DOE
  CESER). The most detailed govt-published account of the Petro Rabigh
  intrusion.
  AUDIT (2026-07-10, claude-opus-4.8/max): captured + hashed during the
  triton-petro-rabigh event audit; the ONLY cited source that names the
  victim, the full timeline, and the impact (Treasury says only
  "petrochemical facility in the Middle East"; DOJ "a foreign refinery";
  Mandiant "a critical infrastructure facility"). Verbatim highlights:
  victim = "the cyber attack on Saudi Arabia-based Rabigh Refining &
  Petrochemical Company (Petro Rabigh)"; onset = adversaries gained
  access "to the Information Technology (IT) network of Petro Rabigh by
  May 2017, at least 90 days before initiating the Triton malware
  attack"; first trip = "On 2 June, the implanted Triton malware
  accidently shut down one Safety Instrumented System (SIS) controller";
  second/main trip = "At 7:43 PM on 4 August (D-0), the adversaries
  activated" the malware, "causing six of Petro Rabigh's Triconex SIS
  controllers to initiate a safety shutdown"; impact = "Petro Rabigh was
  inoperable for another 10 days and lost approximately $938,000 in
  revenue"; mechanics = "trilog.exe to encode two payload files
  (inject.bin and imain.bin)", and "the Triton malware script connects
  to a Tricon Communication Module (TCM)" via the "Tristation Engineering
  Workstation"; capability = "Dragos believes the way the adversaries
  targeted the six controllers potentially could have caused major
  physical damage and loss of human life." Cites the FireEye original
  disclosure "14 December 2017". Note: this source states initial access
  was via "a poorly configured firewall directly exposed to the Internet"
  — which conflicts with Treasury's "phishing" characterization. Live
  cyote.inl.gov returned the real PDF (HTTP 200, 3.8 MB, PDF v1.7).
