notes: |
  Marion Marschalek (then at Cyphort, later Intel / G Data) published
  the seminal Babar technical paper on 18 February 2015, coordinated
  with G Data's same-day post. Marschalek's analysis was the first
  detailed reverse of the Babar implant referenced in the Le Monde /
  CSEC Snowglobe slides. Cyphort was acquired by Juniper Networks in
  2017 and the original blog URL no longer resolves; the paper PDF
  has circulated via Marschalek's personal pages and conference
  archives. URL marked null per AUSPEX policy against fabricated
  citations; tier remains primary based on canonical authorship.
