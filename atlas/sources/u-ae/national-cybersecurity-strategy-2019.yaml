  Publication of the UAE National Cybersecurity Strategy.
  Canonical full-text English-language hosting is not stable;
  the u.ae portal page summarizing the strategy has been the
  primary citation in academic literature. URL marked null
  rather than fabricate; consumers should expect the strategy
  document text to be cited via secondary characterizations
  (CSC publications, TRA / TDRA summaries) rather than a single
  stable government-portal URL.

  AUDIT (2026-06-27, claude-opus-4.8/max): Located a stable TRA-hosted
  full-text PDF (tdra.gov.ae/userfiles/assets/Lw3seRUaIMd.pdf, HTTP 200)
  and set url accordingly; raw_snapshot captured (sha256 f8c46e22…5b930ad0,
  2,825,224 B). The u.ae portal summary page was unreachable from the
  fetcher (HTTP 000); the TRA full-text PDF is the stronger primary.
  Document = the 2019 NCS proper: TRA-issued, vision + 5 pillars
  (cybersecurity laws & regulations; vibrant ecosystem; national cyber
  incident response plan; CIIP program; partnerships) + ~60 initiatives.
  It does NOT mention NESA / the National Electronic Security Authority,
  any 2012/2014 establishment, a federal decree, the Signals Intelligence
  Agency, or the 2020 Cyber Security Council — i.e. it does NOT support
  the claims in event 2014-08/uae-nesa-standup. Companion TRA NCSP / IA-
  framework overview PDF (tdra.gov.ae/userfiles/assets/vzjmlB3CM34.pdf)
  also snapshotted (u-ae__national-cybersecurity-strategy-2019-companion-iaf.pdf,
  sha256 dd9767dc…c11fbbf7, 1,798,812 B); it describes the UAE Information
  Assurance Standards (188 controls) but attributes them to TRA / "NCSA",
  names no establishment date, and likewise never mentions NESA.
  published_on corrected 2019-04-01 → 2019-06-23 (TRA press release; some
  reporting says 24 Jun). FLAG: doctrine ae/ncs-2019 (issued_on
