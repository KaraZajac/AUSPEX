notes: |
  Official English-language text of the Republic of Korea's first
  National Cybersecurity Strategy, issued by the National Security
  Office of Cheong Wa Dae (Blue House) under President Moon Jae-in.
  Preface signed "President Moon Jae-in, Republic of Korea";
  colophon states "Published date: April 2019" (Publication
  Registration Number 12-1025000-000003-01). Hosted in the ITU
  National Strategies Repository; the original Korean-government
  posting is https://www.msit.go.kr/bbs/view.do?sCode=user&bbsSeqNo=68&nttSeqNo=1735913
  (dated 03.04.2019). AUDIT (2026-06-30, claude-opus-4.8/max):
  27-page PDF captured + hashed. Carries verbatim the strategy's
  Vision ("Create a free and safe cyberspace to support national
  security, promote economic prosperity, and contribute to
  international peace"), its THREE Goals (stable operation of the
  state; respond to cyber attacks; build a strong cybersecurity
  foundation) and its SIX Strategic Tasks (1 national core
  infrastructure; 2 cyber attack response capabilities; 3 governance
  based on trust and cooperation; 4 cybersecurity industry growth;
  5 cybersecurity culture; 6 lead international cooperation). Task 6
  frames leading international cooperation as a strategic objective
  in its own right. Primary source that re-sources the event off the
  prior phantom Wikipedia citation.
