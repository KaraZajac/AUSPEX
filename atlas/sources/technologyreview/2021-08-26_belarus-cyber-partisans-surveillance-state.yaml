  Patrick Howell O'Neill (MIT Technology Review) long-form on the Belarusian
  Cyber Partisans. Corroborates the July 2021 self-claimed breach: the group
  says its attacks gave it access to "drone footage from protest crackdowns,
  the Ministry of Interior Affairs's mobile-phone surveillance database, and
  databases for passports, motor vehicles, and more," plus emergency-services
  audio and camera feeds — with insider ("help from the inside" / BYPOL
  defector) cooperation. Added as genuine tier-1 corroboration during the
