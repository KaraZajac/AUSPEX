  ransomware attack. Created 2026-07-10 to RE-SOURCE event
  2024-05/ascension-black-basta (the task's "health-ISAC" attestation element).
  AUDIT (2026-07-10, claude-opus-4.8/max): raw PDF snapshot captured + sha256
  verified (118,891 bytes). Like AA24-131A this advisory is GENERIC to Black
  Basta in the health sector and does NOT itself name Ascension (0 "ascension"
  tokens) — it is the AHA/H-ISAC sector response issued alongside the incident.
  Verbatim: "Federal Government Issues Joint Advisory as Black Basta Ransomware
  Group Accelerates Attacks on the Health Care Sector"; references "actionable
  cyber threat intelligence provided by our partners in the Health-ISAC and
  government agencies" indicating "a significant acceleration in cyberattacks by
  the Black Basta ransomware group." Documents NO Russian-state nexus (RaaS /
  Russian-speaking-crew framing only). Carries the H-ISAC/AHA sector-advisory
  dimension; the Ascension-specific attribution is carried by the
