notes: |
  MSTIC attribution naming Cadet Blizzard as a distinct GRU unit
  from Sandworm, responsible for WhisperGate (Jan 2022) and the
  "Free Civilian" hack-and-leak persona.

  AUDIT (2026-06-24, claude-opus-4.8/max): Raw HTML captured and
  hashed. This source attributes the GRU to *Cadet Blizzard* (5 "GRU"
  / 84 "Cadet Blizzard" mentions in snapshot), NOT to XakNet — the
  full rendered article contains ZERO mentions of XakNet. It does NOT
  substantiate the XakNet→GRU link; the re-promotion of XakNet rests
  on the separate Mandiant 2023-09-14 GRU-telegram-minions report.
  Retained as a secondary actor source for MSTIC's cluster context
  ("MSTIC associates XakNet with the Cadet Blizzard cluster") but the
  GRU naming here is for Cadet Blizzard, a different actor.

  AUDIT (2026-06-24, claude-opus-4.8/max): ru/gru placement for the
  Cadet Blizzard actor VERIFIED against this source (snapshot sha256
  re-confirmed unchanged). MSTIC names the GRU specifically as Cadet
  Blizzard's affiliating service — not merely "Russian" — and at the
  named-unit level: "Microsoft assesses that Cadet Blizzard operations
  are associated with the Russian General Staff Main Intelligence
  Directorate (GRU) but are separate from other known and more
  established GRU-affiliated groups such as Forest Blizzard (STRONTIUM)
  and Seashell Blizzard (IRIDIUM)"; "Cadet Blizzard is a Russian
  GRU-sponsored threat group"; and it flags "the emergence of a novel
  GRU affiliated actor … which has conducted destructive cyber
  operations likely supporting broader military objectives in Ukraine."
  ru/gru is therefore source-supported at named-actor/named-unit level
  (5 "GRU" / 70 "Cadet Blizzard" mentions in the rendered text).
  Independently corroborated by the 2024-09-05 Five-Eyes advisory
  AA24-249A (already in-corpus), which ties Cadet Blizzard to GRU Unit
  29155 / the 161st Specialist Training Centre.
