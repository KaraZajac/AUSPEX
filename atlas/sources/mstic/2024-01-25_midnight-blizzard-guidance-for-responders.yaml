notes: |
  Microsoft Threat Intelligence (MSTIC) responder-guidance companion to the
  2024-01-19 MSRC disclosure of the Midnight Blizzard (SVR / APT29) intrusion
  into Microsoft corporate email. This is the first-party source that carries
  the tradecraft the terse Jan-19 MSRC blog omits (no-MFA legacy test tenant,
  OAuth full_access_as_app lateral path).
  AUDIT (2026-07-02, claude-opus-4.8/max): fetched live from the URL
  (HTTP 200, 301701 bytes, sha256 1d98b340…4c79ecc4). Verbatim support:
  "Midnight Blizzard utilized password spray attacks that successfully
  compromised a legacy, non-production test tenant account that did not have
  multifactor authentication (MFA) enabled"; attacks launched "from a
  distributed residential proxy infrastructure"; "The threat actor then used
  the legacy test OAuth application to grant them the Office 365 Exchange
  Online full_access_as_app role, which allows access to mailboxes"; "The
  actor created additional malicious OAuth applications. They created a new
  user account to grant consent in the Microsoft corporate environment."
  Names the actor as "Midnight Blizzard … also known as … Cozy Bear" (Russian
  state-sponsored); does NOT name the SVR service by that name.
