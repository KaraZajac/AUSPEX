  MGM Resorts' Item 2.02 / 7.01 8-K quantifying the September 2023
  cyberattack's financial impact (accession 0001193125-23-251667,
  primary doc d461062d8k.htm). Verbatim: "On September 12, 2023, MGM
  Resorts International ... issued a statement that it had recently
  identified a cybersecurity issue affecting certain of the Company's
  U.S. systems ... which resulted in disruptions at some of the
  Company's properties"; "operations at the Company's domestic
  properties have returned to normal and virtually all of the
  Company's guest-facing systems have been restored"; "the Company
  estimates a negative impact from the cyber security issue in
  September of approximately $100 million to Adjusted Property EBITDAR
  for the Las Vegas Strip Resorts and Regional Operations,
  collectively"; "The Company has also incurred less than $10 million
  in one-time expenses in the third quarter related to the
  cybersecurity issue."
  AUDIT (2026-07-10, claude-opus-4.8/max): created during the audit of
  event 2023-09/mgm-caesars-alphv to carry the MGM ~$100M figure with a
  primary source (the event previously cited only "MGM disclosed USD
  100M ... in SEC filing" without the filing in sources[]). This filing
  names NO threat actor and does NOT mention "ransom" (0 hits) — it
  quantifies the operational EBITDAR impact only; the "no ransom paid"
  characterization is contemporaneous reporting, not this 8-K. Filed
  under Items 2.02/7.01, before the SEC cyber-disclosure rule (Item
  1.05) took effect Dec 18 2023.
