notes: |
  Halliburton Company (NYSE: HAL, CIK 0000045012) Form 8-K, accession
  0000045012-24-000049, primary document hal-20240821.htm. Date of earliest event
  reported August 21, 2024; signature block dated August 22, 2024 (Charles E. Geer, Jr.,
  SVP & Chief Accounting Officer); EDGAR filing/acceptance date August 23, 2024 (confirmed
  by Halliburton's own Q3 10-Q, which refers to "our Form 8-Ks filed ... on August 23, 2024
  and September 3, 2024"). This is the INITIAL disclosure and it was filed under Item 8.01
  (Other Events), NOT Item 1.05 (Material Cybersecurity Incident); the Item 1.05 filing came
  later (Sept 3, 2024 8-K, sec/2024-09-03_halliburton-8k-material-cyber-incident).
  PRIMARY disclosure source for the awareness/initial-disclosure phase of event
  2024-08/halliburton-ransomhub.
  Created 2026-07-11 (badrabbit re-source) to replace the phantom catalogue-shell citation
  sec/2024-08-22_halliburton-8k, whose url was an EDGAR browse-edgar getcompany query
  (a company-search results page, not the filing).
  AUDIT (2026-07-11, claude-opus-4.8/max): curl HTTP 200 (SEC-compliant UA) of the direct
  filing URL; snapshot byte-identical to the on-disk copy; sha256 dd87de01…35f44c518,
  28,006 bytes. Verbatim from the snapshot:
   - "On August 21, 2024, Halliburton Company (the 'Company') became aware that an
     unauthorized third party gained access to certain of its systems."
   - "The Company's response efforts included proactively taking certain systems offline to
     help protect them and notifying law enforcement."
   - "The Company's ongoing investigation and response include restoration of its systems
     and assessment of materiality."
  NB: this initial 8-K does NOT name RansomHub (only "unauthorized third party"), does NOT
  mention data exfiltration (that was confirmed only in the Sept 3 8-K), and contains NO
  leak-site posting, ransom demand, or refusal-to-pay.
