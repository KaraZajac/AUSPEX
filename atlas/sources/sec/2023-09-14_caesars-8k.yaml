notes: |
  Caesars Entertainment's Item 8.01 (Other Events) 8-K on the
  September 2023 intrusion (accession 0001193125-23-235015, primary
  doc d537840d8k.htm). Verbatim: "recently identified suspicious
  activity in its information technology network resulting from a
  social engineering attack on an outsourced IT support vendor";
  "Our customer-facing operations ... have not been impacted by this
  incident and continue without disruption"; "on September 7, 2023,
  we determined that the unauthorized actor acquired a copy of, among
  other data, our loyalty program database, which includes driver's
  license numbers and/or social security numbers for a significant
  number of members"; "We have taken steps to ensure that the stolen
  data is deleted by the unauthorized actor, although we cannot
  guarantee this result."
  AUDIT (2026-07-10, claude-opus-4.8/max): URL CORRECTED — as cited it
  was a browse-edgar company-search catalogue shell (getcompany&CIK=
  ...&type=8-K) that 403s to curl and does not contain the filing;
  re-pointed to the actual Item 8.01 document + snapshotted + hashed.
  IMPORTANT: this 8-K names NO threat actor (only "the unauthorized
  actor") and does NOT state any ransom, dollar figure, "$15 million,"
  "million," or "paid" (grep-confirmed 0 hits) — it only *implies*
  payment via the "steps to ensure ... deleted" line. The ~USD 15M / of
  a $30M demand figure is press reporting (WSJ / Bloomberg), NOT this
  filing; the event's former "~USD 15M ... per SEC 8-K" attribution was
  corrected and re-sourced to bleepingcomputer/2023-09-14_caesars-
  confirms-ransom-payment. Filed under Item 8.01, months BEFORE the
  SEC cyber-disclosure rule (Item 1.05) took effect Dec 18 2023.
