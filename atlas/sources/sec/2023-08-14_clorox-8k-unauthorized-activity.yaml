notes: |
  Clorox's initial 8-K (Date of Report Aug 14, 2023). Verbatim
  (Item 8.01): "The Clorox Company ... has identified unauthorized
  activity on some of its Information Technology (IT) systems. After
  becoming aware of the activity, the Company began taking steps to
  stop and remediate the activity, including taking certain systems
  offline ... the incident has caused, and is expected to continue
  to cause, disruption to parts of the Company's business
  operations." Names NO attacker/threat actor; no ransomware or data
  theft mentioned — the attribution-latency baseline.
