notes: |
  Live Nation Entertainment's public disclosure of the Ticketmaster
  breach. Filed as Item 8.01 (Other Events), NOT Item 1.05 (Material
  Cybersecurity Incidents) — the company deemed the incident immaterial.
  Date of Earliest Event Reported: May 20, 2024. Verbatim:
  "On May 20, 2024, Live Nation Entertainment, Inc. (the 'Company' or
  'we') identified unauthorized activity within a third-party cloud
  database environment containing Company data (primarily from its
  Ticketmaster L.L.C. subsidiary) and launched an investigation with
  industry-leading forensic investigators to understand what happened";
  "On May 27, 2024, a criminal threat actor offered what it alleged to
  be Company user data for sale via the dark web"; "We are working to
  mitigate risk to our users and the Company, and have notified and are
  cooperating with law enforcement. As appropriate, we are also
  notifying regulatory authorities and users with respect to
  unauthorized access to personal information"; "As of the date of this
  filing, the incident has not had, and we do not believe it is
  reasonably likely to have, a material impact on our overall business
  operations or on our financial condition or results of operations."
  NOTE: the 8-K itself does NOT name Snowflake ("third-party cloud
  database environment"), gives NO record count, and does NOT name
  ShinyHunters — the 560M / 1.3TB / $500K / Snowflake / ShinyHunters
  facts are carried by journalism (TechCrunch, BleepingComputer) and
  Mandiant.
