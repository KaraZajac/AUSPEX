notes: |
  Frontier Communications Parent, Inc. (NASDAQ: FYBR, CIK 0000020520) Form 8-K,
  Item 1.05 Material Cybersecurity Incident. Date of earliest event reported
  April 15, 2024; signed April 18, 2024 by Mark Nielsen, EVP, Chief Legal &
  Regulatory Officer. PRIMARY disclosure source for event
  2024-04/frontier-ransomhub.
  Created 2026-07-05 to RE-SOURCE that event off its phantom citation
  cisa/2024-08-29_aa24-242a-ransomhub-advisory (a general RansomHub TTP
  advisory naming no victim).
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200 (SEC-compliant UA),
  snapshot + sha256 captured (sha 13e1fe11…65d1fb69, 26,563 bytes). Verbatim
  from the snapshot:
   - "On April 14, 2024, Frontier Communications Parent, Inc. (the 'Company')
     detected that a third party had gained unauthorized access to portions of
     its information technology environment."
   - "the containment measures, which included shutting down certain of the
     Company's systems, resulted in an operational disruption that could be
     considered material."
   - "the third party was likely a cybercrime group, which gained access to,
     among other information, personally identifiable information."
   - "The Company does not believe the incident is reasonably likely to
     materially impact the Company's financial condition or results of
     operations."
  NB: the 8-K does NOT name RansomHub (only "likely a cybercrime group"); the
  RansomHub attribution rests on the group's June 2024 leak-site self-claim
  (see therecord / securityweek records).
