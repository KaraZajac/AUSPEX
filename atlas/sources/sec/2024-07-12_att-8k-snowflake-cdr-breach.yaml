notes: |
  AT&T's Item 1.05 8-K disclosing the third-party-cloud call/text
  records breach. Verbatim: "On April 19, 2024, AT&T Inc. ('AT&T')
  learned that a threat actor claimed to have unlawfully accessed and
  copied AT&T call logs"; "AT&T believes that threat actors unlawfully
  accessed an AT&T workspace on a third-party cloud platform and,
  between April 14 and April 25, 2024, exfiltrated files containing
  AT&T records of customer call and text interactions that occurred
  between approximately May 1 and October 31, 2022, as well as on
  January 2, 2023"; "records of calls and texts of nearly all of
  AT&T's wireless customers and customers of mobile virtual network
  operators ('MVNO') using AT&T's wireless network"; "These records
  identify the telephone numbers with which an AT&T or MVNO wireless
  number interacted during these periods ... counts of those
  interactions, and aggregate call duration for a day or month. For a
  subset of records, one or more cell site identification number(s)
  are also included"; "The data does not contain the content of calls
  or texts, personal information such as Social Security numbers,
  dates of birth"; "On May 9, 2024, and again on June 5, 2024, the
  U.S. Department of Justice determined that, under Item 1.05(c) of
  Form 8-K, a delay in providing public disclosure was warranted."
  NOTE: the 8-K itself does NOT name Snowflake ("third-party cloud
  platform") and gives no customer count ("nearly all"); the ~110M
  figure and the Snowflake naming are carried by Krebs / Mandiant.
