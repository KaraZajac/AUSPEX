notes: |
  Halliburton Company (NYSE: HAL, CIK 0000045012) Form 8-K, Item 1.05 Material
  Cybersecurity Incident. Date of earliest event reported August 30, 2024; signed
  September 3, 2024 by Charles E. Geer, Jr., SVP & Chief Accounting Officer.
  This is the follow-up 8-K that CONFIRMED data exfiltration (the initial disclosure
  was the Item 8.01 8-K filed August 23, 2024). PRIMARY disclosure source for the
  data-exfiltration confirmation phase of event 2024-08/halliburton-ransomhub.
  Created 2026-07-05 to RE-SOURCE that event off its wrong/background-only citation
  cisa/2024-08-29_aa24-242a-ransomhub-advisory (a general RansomHub TTP advisory that
  does NOT name Halliburton — 0 mentions).
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200 (SEC-compliant UA), snapshot
  + sha256 captured (sha 2d2c834a…c4861a6e, 30,022 bytes). Verbatim from the snapshot:
   - "on August 21, 2024, Halliburton Company (the 'Company') became aware that an
     unauthorized third party gained access to certain of its systems."
   - "The incident has caused disruptions and limitation of access to portions of the
     Company's business applications supporting aspects of the Company's operations and
     corporate functions."
   - "The Company believes the unauthorized third party accessed and exfiltrated
     information from the Company's systems. The Company is evaluating the nature and
     scope of the information, and what notifications are required."
   - "As of the date of this Current Report on Form 8-K, the Company believes that the
     incident has not had, and is not reasonably likely to have, a material impact on
     the Company's financial condition or results of operations."
  NB: the 8-K does NOT name RansomHub (only "unauthorized third party"), does NOT
  enumerate data categories, and contains NO mention of a leak-site posting, a ransom
  demand, or a refusal to pay.
