notes: |
  Clorox's follow-up 8-K (Date of Report Sept 18, 2023). Verbatim
  (Item 8.01): "the Company believes the unauthorized activity is
  contained due to the steps the Company has taken to address the
  incident. The cybersecurity attack damaged portions of the
  Company's IT infrastructure, which caused widescale disruption of
  Clorox's operations ... Clorox has already resumed production at
  the vast majority of its manufacturing sites ... the Company now
  believes the impact will be material on Q1 financial results." Also
  confirms "elevated level of consumer product availability issues"
  and transition back to normal automated order processing the week
  of Sept 25. Still names NO attacker; no ransomware/data theft.
