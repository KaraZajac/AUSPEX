notes: |
  Halliburton Company (NYSE: HAL, CIK 0000045012) Form 10-Q for the quarterly period
  ended September 30, 2024; filed November 7, 2024. PRIMARY source for the USD ~35M
  cybersecurity-incident expense figure carried by events 2024-08/halliburton-ransomhub
  and 2024-08/halliburton-ransomhub.
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200 (SEC-compliant UA), snapshot +
  sha256 captured (sha c8f12480…8ee6481b, 982,338 bytes). Verbatim from the snapshot:
   - "we incurred $ 35 million in expenses during the three months ended September 30,
     2024 related to the engagement of external advisors to assess and remediate the
     effects of the activity, and restore our systems, as well as legal fees, payroll
     related costs, and other expenses."
   - impairments/charges table line: "Cybersecurity incident 35 35" (three and nine
     months ended September 30, 2024 — i.e. the full $35M fell in Q3).
   - "As we previously disclosed, we know the unauthorized third party exfiltrated
     information from our systems."
   - "We believe the incident has not had, and is not reasonably likely to have, a
     material impact on the Company's financial condition or results of operations."
  NB: the $35M is characterized by Halliburton as Q3 response/remediation/legal/payroll
  EXPENSES, and the filing states the incident is not reasonably likely to be material —
  it is not a ransom payment and not a loss estimate. The 10-Q does NOT name RansomHub
  and does NOT describe any leak-site publication of the exfiltrated data.
