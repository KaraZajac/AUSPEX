notes: |
  Lee Enterprises, Incorporated Form 8-K/A (amendment to the Item 1.05 8-K),
  filed March 6, 2025 (accession 0001628280-25-010944). Supplies the updated
  recovery / containment status for event 2025-02/lee-enterprises-qilin.

  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200 (SEC-compliant UA),
  snapshot 29,929 bytes, sha 59a63ad4…c46fbff2. Verbatim from the snapshot:
   - "the Company experienced a system outage on February 3, 2025, caused by a
     cybersecurity attack by threat actors who unlawfully accessed the Company's
     network, encrypted critical applications, and exfiltrated certain files (the
     'Incident')."
   - "As of the date of this filing and because of the Company's remediation and
     other activities, the threat has been contained and the Company is working
     closely with third-party security vendors to restore automation of its
     business processes impacted by the Incident. Currently all products are being
     produced and distributed, although some limitations remain including limited
     depth of products due to tightened schedules."
   - "certain back-office functions remain delayed including billing our clients,
     collections, and payments to vendors. We anticipate the business processes to
     be fully restored in the coming weeks."
   - "Our investigation and forensic analysis to determine whether personally
     identifiable information was taken by the threat actors remains ongoing. We
     expect a definitive answer in the next several weeks."
   - Liquidity: BH Finance LLC (sole lender) agreed to waive Lee's March-2025
     interest + lease payments — "In total, the Covenant Waiver will provide $3.7M
     of additional capital" to "fund the cybersecurity incident's remediation
     efforts and other operations."
  NB: no precise full-restoration date is stated ("fully restored in the coming
  weeks"); the PII determination was still pending as of this filing (later
  concluded ~May 28, 2025 → 39,779 individuals; see the June-2025 journalism).
