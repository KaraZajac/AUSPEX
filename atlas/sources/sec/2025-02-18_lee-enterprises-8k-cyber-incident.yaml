notes: |
  Lee Enterprises, Incorporated (NASDAQ: LEE, CIK 0000058361, Davenport, Iowa)
  Form 8-K, Item 1.05 Material Cybersecurity Incident. Date of earliest event
  reported February 12, 2025; filed February 18, 2025 (accession
  0001628280-25-005855). This is the PRIMARY formal disclosure source for event
  2025-02/lee-enterprises-qilin.

  Created 2026-07-05 to RE-SOURCE that event off its wrong-source citation
  ncsc-uk/2024-06-04_synnovis-qilin-statement (an NHS/Synnovis statement about a
  DIFFERENT Qilin victim, mis-attached by a fallback donor).

  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200 (SEC-compliant UA),
  snapshot 27,329 bytes, sha b15431f0…d8888b60. Verbatim from the snapshot:
   - "On February 3, 2025, Lee Enterprises, Inc. ('Lee' or the 'Company')
     experienced a systems outage caused by a cybersecurity attack."
   - "Preliminary investigations indicate that threat actors unlawfully accessed
     the Company's network, encrypted critical applications, and exfiltrated
     certain files."
   - "The incident impacted the Company's operations, including distribution of
     products, billing, collections, and vendor payments. Distribution of print
     publications across our portfolio of products experienced delays, and online
     operations were partially limited."
   - "As of February 12, 2025, all core products are being distributed in the
     normal cadence, however weekly and ancillary products have not been restored.
     These products represent five-percent of the Company's total operating
     revenue."
   - "The Company anticipates a phased recovery over the next several weeks."
   - "the incident is reasonably likely to have a material impact on the Company's
     financial condition or results of operations."
  NB: the 8-K does NOT name Qilin (attribution rests on Qilin's own late-Feb
  leak-site self-claim + security-industry/journalism consensus). NB2: the
  SEPARATE 8-K filed 2025-02-07 (accession 004403) is Lee's Q1 earnings release
  (Item 2.02) and contains NO disclosure of this incident (only generic
  cyber-risk boilerplate) — so the event's prior "disclosed via 8-K February 7"
  framing was incorrect; this Feb-12/filed-Feb-18 Item 1.05 8-K is the real one.
