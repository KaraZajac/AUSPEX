notes: |
  Hacktivist defacement and data-wipe operation by the Ukrainian
  Cyber Alliance against Trigona ransomware infrastructure. Bleeping
  Computer is the canonical English-language reporting venue.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the Trigona ru/proxies -> ru/unscoped DEMOTE — this
  source documents NO Russia-state nexus for Trigona. Every "Russia/Russian" mention is about the UCA
  HACKTIVISTS, not Trigona: the UCA united "to defend the country's cyberspace against Russian aggression",
  "began to target various organizations and individuals supporting Russia's activity against Ukraine", and
  claims hacking "the Russian Ministry of Defense twice in 2016" and Surkov's "Russian propaganda". Trigona
  itself is described only as a profit-criminal operation — "the gang", "the cybercriminals", "Trigona
  hackers" — that "launched a Tor site to negotiate ransom payments in Monero cryptocurrency". No FSB/GRU/SVR
  tasking, tolerance, safe-harbor or formal state-alignment is documented for the Trigona crew.
