notes: |
  AUDIT (2026-06-23, claude-opus-4.8/max): Raw captured live (initial curl + WebFetch both
  hit a CloudFront 403; a full Firefox-header curl succeeded, HTTP 200, sha256 above). Source
  fully supports the event's facts: the two families and their roles, exfiltration sets, decoy
  app names, the named victims, and the Dec-2020 still-active date. KEY ATTRIBUTION POINT: this
  source attributes the tooling to Confucius "with high confidence" but names the nation only as
  "pro-India" (a hedge) — it does NOT name an Indian government service as operator. It places
  the *developers* in India (Chandigarh, Punjab) and notes one developer's unverified LinkedIn
  claim of working at India's DRDO, but explicitly frames Confucius's roots as evolved commercial
  stalkerware (MobileSpy/BuzzOut) possibly "sold to an actor". So India = nation-level locus, not
  a named-unit attribution; in/unscoped is correct. Source also flags one Chinese-default C2
  server (23.82.19[.]250) as a possible false flag, without retracting the Confucius attribution.
  Supporting quotes (verbatim):
  - "We believe with high confidence that these surveillance tools are used by the advanced
    persistent threat group (APT) Confucius, which first appeared in 2013 as a state-sponsored,
    pro-India actor primarily pursuing Pakistani and other South Asian targets."
  - "Targets of these tools include personnel linked to Pakistan's military, nuclear authorities,
    and Indian election officials in Kashmir."
  - "Some notable targets included an individual who applied for a position at the Pakistan Atomic
    Energy Commission, individuals with numerous contacts in the Pakistan Air Force (PAF), as well
    as officers responsible for electoral rolls (Booth Level Officers) located in the Pulwama
    district of Kashmir."
  - "While SunBird features remote access trojan (RAT) functionality ... Hornbill is a discreet
    surveillance tool used to extract a selected set of data of interest to its operator."
  - "The newest Hornbill sample was identified by Lookout's app analysis engine as recently as
    December 2020, suggesting the malware may still be active today."
  - "SunBird looks to have been created by Indian developers ... This data suggests that SunBird
    could have been sold to an actor that selectively deployed it to gather intelligence on
    targeted individuals."
  - "The default language of this server was set up as Chinese when discovered by Lookout
    researchers. This may be a false flag or may have been altered by a third party."