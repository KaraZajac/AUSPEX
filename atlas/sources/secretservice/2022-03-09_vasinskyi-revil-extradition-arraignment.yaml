notes: |
  US Secret Service verbatim repost of the DOJ Office of Public
  Affairs release announcing Yaroslav Vasinskyi's extradition and
  arraignment (the live justice.gov copy is Akamai-bot-walled;
  see doj/2022-03-03_vasinskyi-extradition). Snapshottable primary.
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot 72,074 bytes,
  Published Date 2022-03-09. Carries verbatim: "Yaroslav Vasinskyi,
  22, accessed the internal computer networks of several victim
  companies and deployed Sodinokibi/REvil ransomware"; "Vasinskyi, a
  Ukrainian national with ties to a ransomware group linked to
  Russia-based actors, was taken into custody in Poland ... pending
  proceedings in connection with his requested extradition ...
  pursuant to the extradition treaty between the United States and
  the Republic of Poland"; "Vasinskyi was transported to Dallas by
  U.S. law enforcement authorities where he arrived on March 3. He
  made his initial court appearance and was arraigned today in the
  Northern District of Texas"; "responsible for the July 2, 2021,
  ransomware attack against Kaseya". Does NOT use the "first RaaS-
  operator extradition" characterization.
