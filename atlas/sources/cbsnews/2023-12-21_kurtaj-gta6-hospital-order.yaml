notes: |
  CBS News / MoneyWatch report (consolidating BBC + AP reporting) on the
  Dec 21 2023 sentencing of Lapsus$ operator Arion Kurtaj. Carries the
  load-bearing conviction/extortion facts re-sourced from the now-dead
  BBC article: "Arion Kurtaj, leaked 90 clips from Rockstar Games'
  forthcoming Grand Theft Auto VI and also launched cyberattacks on Uber,
  Nvidia and other corporations. A British jury in August convicted
  Kurtaj and another teen, who were members of the international hacking
  group Lapsus$, for hacking, fraud and extortion." Sentencing: "indefinite
  detention in a secure hospital"; "Doctors had deemed Kurtaj, who is
  severely autistic, unfit to stand trial." Extortion demand (verbatim):
  while on bail and with his laptop confiscated, Kurtaj ran the GTA hack
  from a hotel using an Amazon Fire TV Stick, the hotel TV and his phone,
  and "wrote, 'if Rockstar does not contact me on Telegram within 24 hours
  I will start releasing the source code.' He publicly posted the code and
  clips." Created 2026-07-10 as the snapshot-able replacement for the
  link-rotted bbc/2023-08-24_kurtaj-conviction (url:null, 404).
