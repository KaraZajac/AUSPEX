notes: |
  ICANN public statement on observed DNS-hijacking abuse,
  preceding the Cisco Talos Sea Turtle attribution by two months.
  AUDIT (2026-06-25, claude-opus-4.8/max): re-read the captured raw snapshot for the Sea Turtle
  service audit. The statement is a generic call for full DNSSEC deployment in response to DNS
  hijacking; it names NO threat actor, NO nation-state, and (necessarily) NO MIT — zero mentions
  of "Sea Turtle", "Turkey/Turkish", or "MIT". It establishes only that DNS-hijacking abuse was
  occurring, not attribution. Contributes nothing to the MIT-placement question; consistent with
  demoting tr/mit/sea-turtle → tr/unscoped/sea-turtle.
