  Contemporary reporting on the Aramco attack and the (hedged) U.S. attribution to Iran.
  AUDIT (2026-07-11, claude-opus-4.8/max): live nytimes.com is BOT-WALLED (HTTP 403, 771-byte
  stub); snapshot taken from the archived copy (web.archive 2013-12-13 id_ capture; 62,670 bytes;
  sha256 077735fd…fec2e). published_on 2012-10-23 per byline ("By NICOLE PERLROTH Published:
  October 23, 2012"; NYT print date 24 Oct).
  Verbatim support carried for the event: damage scope — "A cyberattack wiped out data on
  three-quarters of Aramco's PCs"; burning-flag — attackers wiped "documents, spreadsheets,
  e-mails, files replacing all of it with an image of a burning American flag"; ATTRIBUTION HEDGE
  (load-bearing) — "United States intelligence officials say the attack's real perpetrator was
  Iran, although they offered no specific evidence to support that claim"; persona — "hackers who
  called themselves the Cutting Sword of Justice and claimed to be activists upset about Saudi
  policies"; "Wiper" naming — "Shamoon's creators even gave the erasing mechanism a name: Wiper";
  Panetta framing — the Secretary of Defense "called the attack a 'significant escalation.'"
