  numeric/technical facts the March-2024 attribution release does not
  state.

  AUDIT (2026-07-04, claude-opus-4.8 / max): created + snapshotted for
  event 2024-03/ncsc-fcdo-apt31-electoral-commission. sha256
  099ed1b3…201dda6d, 34,822 B. Verbatim: "Reprimand issued to the
  Electoral Commission in respect of Articles 5(1)(f) and 32(1)(b).
  Between 24 August 2021 and 27 October 2022, a threat actor had access
  to the Electoral Commission's systems and was able to access personal
  data held as part of the Electoral Register. This incident impacted
  approximately 40,000,000 individuals, and the initial access was
  gained via several unpatched software vulnerabilities. The
  investigation highlighted that appropriate technical and organisational
  measures were not in place at the time of the breach." This record
  carries: start_date 2021-08-24 / end_date 2022-10-27 (exact window),
  the ~40,000,000 figure, and initial_vector n-day ("several unpatched
  software vulnerabilities"). Reprimand issued 9 May 2024 (URL path
  /2024/05/); page also enforcement-listed against the "9 May 2024" date.
