notes: |
  The Electoral Commission's own first-party breach notification,
  publicly announced 8 August 2023 (~10 months after the intrusion was
  identified and ~19 months before the March-2024 APT31 attribution).
  Snapshotted to carry the breach-scope facts that the March-2024 govt
  attribution release does not itself state.

  AUDIT (2026-07-04, claude-opus-4.8 / max): created + snapshotted for
  event 2024-03/ncsc-fcdo-apt31-electoral-commission. sha256
  7cee6c2f…efa978b0, 118,022 B. Verbatim: "The incident was identified
  in October 2022 after suspicious activity was detected on our systems.
  It became clear that hostile actors had first accessed the systems in
  August 2021." "the perpetrators had access to the Commission's servers
  which held our email, our control systems, and copies of the electoral
  registers." "They were able to access reference copies of the electoral
  registers ... The registers held at the time of the cyber-attack
  include the name and address of anyone in Great Britain who was
  registered to vote between 2014 and 2022, the names of those registered
  as overseas voters during the same period, and the names and addresses
  of anyone registered in Northern Ireland in 2018. The registers did not
  include the details of those registered anonymously. The Commission's
  email system was also accessible during the attack." NB: the EC notice
  does NOT state a "40 million" figure (that count is stated by the ICO's
  2024-05 reprimand — "approximately 40,000,000 individuals"). WebFetch
  of this URL 403s (bot-walled); the curl snapshot succeeded (hash above).
