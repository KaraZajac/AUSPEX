notes: |
  Biden press conference following the Geneva summit with Putin —
  the readout where Biden disclosed the 16-sector critical
  infrastructure "off limits" list shown to Putin, against the
  backdrop of Colonial Pipeline and JBS ransomware attacks.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot verified via
  Wayback. Verbatim: "I gave them a list ... 16 specific entities;
  16 defined as critical infrastructure under U.S. policy, from the
  energy sector to our water systems" and "Responsible countries
  need to take action against criminals who conduct ransomware
  activities on their territory." Does NOT name JBS or carry any
  JBS-specific figure — supports only the summit / 16-sector /
  ransomware-harboring material in the event summary.
