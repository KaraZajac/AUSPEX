notes: |
  Primary source for the 26 April 2023 Washington
  Declaration issued at the Biden-Yoon state visit. The
  declaration's principal substance was the US extended-
  deterrence commitment and the establishment of the
  Nuclear Consultative Group, with parallel cyber-domain
  language affirming bilateral counter-DPRK cyber
  cooperation. AUSPEX cites it as a KORUS framework
  pre-Camp-David anchor.
