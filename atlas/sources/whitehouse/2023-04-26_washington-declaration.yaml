  Primary source for the 26 April 2023 Washington
  Declaration issued at the Biden-Yoon state visit. The
  declaration's substance is ENTIRELY nuclear: the US
  extended-deterrence commitment and the establishment of
  the Nuclear Consultative Group. AUDIT 2026-07-10
  (claude-opus-4.8/max): the snapshot carries NO cyber,
  cryptocurrency, ransomware, or IT-worker content
  whatsoever (zero "cyber" hits) — the cyber language of
  the state visit is in the COMPANION Leaders' Joint
  Statement (whitehouse/2023-04-26_korus-70th-anniversary),
  not in this declaration. AUSPEX cites this record only for
  the nuclear-headline framing of the event; it is NOT a
  carrier for any KORUS cyber claim.
