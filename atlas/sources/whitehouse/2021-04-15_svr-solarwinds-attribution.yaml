notes: |
  Formal US Government attribution of the SolarWinds Orion
  supply-chain compromise to the Russian Foreign Intelligence
  Service (SVR), specifically the cyber actors known as APT29 /
  Cozy Bear / Nobelium. Names "broad-scope cyber espionage" as
  the strategic intent — gold-standard attestation for the SVR
  strategic-collection doctrine link.
