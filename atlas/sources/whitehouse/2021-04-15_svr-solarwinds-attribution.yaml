notes: |
  Formal US Government attribution of the SolarWinds Orion
  supply-chain compromise to the Russian Foreign Intelligence
  Service (SVR), specifically the cyber actors known as APT29 /
  Cozy Bear / Nobelium. Names "broad-scope cyber espionage" as
  the strategic intent — gold-standard attestation for the SVR
  strategic-collection doctrine link.
  AUDIT (2026-06-25, claude-opus-4.8/max): SVR service placement of
  ru/svr/apt29 VERIFIED — names the Russian Foreign Intelligence
  Service (SVR) explicitly and equates it to APT29. Captured via the
  archive_url (live WH page purged at the 2025 transition). Verbatim:
  "Today the United States is formally naming the Russian Foreign
  Intelligence Service (SVR), also known as APT 29, Cozy Bear, and The
  Dukes, as the perpetrator of the broad-scope cyber espionage campaign
  that exploited the SolarWinds Orion platform and other information
  technology infrastructures." Also: "The Intelligence Community has
  high confidence in its assessment of attribution to the SVR."
