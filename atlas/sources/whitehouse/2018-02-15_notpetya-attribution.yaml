notes: |
  White House Press Secretary statement (15 Feb 2018), coordinated with
  the UK FCO/NCSC same-day attribution, naming the Russian military as
  responsible for NotPetya and framing it as part of the Kremlin's effort
  to destabilize Ukraine — gold-standard doctrine-attestation source.

  AUDIT (2026-07-10, claude-opus-4.8/max): URL CORRECTED. The url field
  previously pointed to the UK FCO page
  (gov.uk/government/news/foreign-office-minister-condemns-russia-for-notpetya-attacks)
  — a WRONG-SOURCE defect (that is the UK statement, not the White House
  one). Re-pointed to the actual White House Press Secretary statement on
  the Trump WH National Archives host; the parallel UK FCO/NCSC statement
  is now carried by its own record ukgov/2018-02-15_notpetya-fco-ncsc-attribution.
  raw_snapshot captured (sha256 d7ea2711…969aecb9, 64,409 bytes).
  Verbatim load-bearing text: "In June 2017, the Russian military launched
  the most destructive and costly cyber-attack in history. The attack,
  dubbed 'NotPetya,' quickly spread worldwide, causing billions of dollars
  in damage across Europe, Asia, and the Americas. It was part of the
  Kremlin's ongoing effort to destabilize Ukraine … This was also a
  reckless and indiscriminate cyber-attack that will be met with
  international consequences." NB: this statement says "billions of
  dollars," NOT the specific "$10 billion" figure — that figure is a later
  White House assessment reported by WIRED/Bossert (see
  wired/2018-08-22_notpetya-untold-story), not this press release.
