notes: |
  Companion to the Washington Declaration. Joint leaders'
  statement issued at the Biden-Yoon state visit
  commemorating the 70th anniversary of the 1953 US-ROK
  alliance. Cyber-domain language codifies the Strategic
  Cybersecurity Cooperation Framework signed at the same
  visit and bilateral commitment to counter-DPRK
  cryptocurrency-theft cooperation. Pre-Camp-David anchor
  for the KORUS cyber pillar.
