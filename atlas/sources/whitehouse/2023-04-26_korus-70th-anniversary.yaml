notes: |
  Companion to the Washington Declaration and the SOLE
  cyber carrier of the two state-visit joint statements.
  Joint leaders' statement issued at the Biden-Yoon state
  visit commemorating the 70th anniversary of the 1953
  US-ROK alliance. AUDIT 2026-07-10 (claude-opus-4.8/max):
  verbatim cyber passage — the two leaders "committed to
  establish a U.S.-ROK Strategic Cybersecurity Cooperation
  Framework" (committed to establish, not signed/codified)
  covering "deterring cyber adversaries, increase the
  cybersecurity of critical infrastructure, combat
  cybercrime, and secure cryptocurrency and blockchain
  applications," and, expressing "concern regarding the
  DPRK's illicit cyber activities that fund its unlawful
  WMD and ballistic missile programs," "committed to
  expanding information sharing ... to combat DPRK cyber
  threats and block its cyber-enabled revenue generation."
  NO "IT worker," "sanctions," or "joint disruption
  operations" language appears. Pre-Camp-David anchor for
  the KORUS cyber pillar.
