  First published operational doctrine for state offensive cyber.
  NCF publication via gov.uk. Articulates accountability /
  precision / calibration / lawfulness principles and the
  "doctrine of cognitive effect."

  AUDIT (2026-06-25, claude-opus-4.8 / max): supports the
  uk/ncf/joint-actor service-placement demotion. This is the NCF's
  published DOCTRINE paper, NOT a specific-operation attribution. The
  gov.uk publication-page meta/og description states verbatim: "This
  publication provides for the first time more detail on the NCF and how
  it delivers cyber operations daily, to protect the UK and its allies
  from harm." That is general capability and principles (accountability,
  precision, calibration, lawfulness, cognitive effect) plus aggregate
  activity — it names ZERO specific operations. Raw HTML re-fetched
  2026-06-25 (raw_snapshot + content_sha256 above; page text contains no
  "ISIS"/"Daesh"/"ransomware"/"hundreds of operations"/named target).
  Used as basis to DEMOTE uk/ncf/joint-actor -> uk/unscoped/joint-actor
  (no source here names the NCF as the operator of any specific op).
