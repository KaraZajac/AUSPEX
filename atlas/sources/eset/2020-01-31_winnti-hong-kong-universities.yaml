notes: |
  ESET disclosure of Winnti / APT41-lineage intrusions into at
  least two Hong Kong universities in November 2019, in the
  middle of the Hong Kong pro-democracy protest period. New
  ShadowPad and Winnti malware variants used, delivered via
  spear-phishing of university employees. ESET does not name
  the universities but documents the connection to broader
  Winnti supply-chain operations.
