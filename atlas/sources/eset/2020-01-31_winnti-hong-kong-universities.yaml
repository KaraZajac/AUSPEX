notes: |
  ESET disclosure of a Winnti Group campaign against at least two
  Hong Kong universities (with C&C-URL indicators suggesting up to
  three more) discovered November 2019, in the middle of the Hong
  Kong pro-democracy protest period. New ShadowPad and Winnti
  malware variants used. ESET does not name the universities and
  documents the connection to broader Winnti supply-chain
  operations.

  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured +
  hashed (95,057 bytes, sha256 960d596a…9507c39). CORRECTION: the
  prior "delivered via spear-phishing of university employees" claim
  is NOT in the report and was removed — ESET explicitly states "we
  do not have the component that dropped and executed this launcher"
  and only INFERS that "the initial execution of this launcher is
  done through DLL side-loading" (hpqhvsei.dll side-loaded by a
  legitimate HP hpqhvind.exe). No initial-access vector (phishing or
  otherwise) is established in the source. Attribution: ESET names
  only "the Winnti Group" — no nation (no China), no service (no
  MSS), no APT41 label, no confidence wording.
