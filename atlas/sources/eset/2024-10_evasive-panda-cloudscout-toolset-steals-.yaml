notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw newsroom page captured and hashed. This source
  attributes Evasive Panda only as "China-aligned" — it names NO Chinese service (no MSS / Ministry
  of State Security / PLA / PRC service of any kind). Verbatim:
  "ESET researchers discovered a previously undocumented toolset used by the China-aligned group,
  Evasive Panda, to access and retrieve data from cloud services..."
  "Evasive Panda (also known as BRONZE HIGHLAND, Daggerfly, or StormBamboo) is a China-aligned APT
  group, operating since at least 2012. Evasive Panda's objective is cyberespionage against countries
  and organizations opposing China's interests through independence movements such as those in the
  Tibetan diaspora, religious and academic institutions in Taiwan and in Hong Kong, and supporters of
  democracy in China."
  Basis for demoting the cited actor from cn/mss/evasive-panda to cn/unscoped/evasive-panda (no
  source-named service).
