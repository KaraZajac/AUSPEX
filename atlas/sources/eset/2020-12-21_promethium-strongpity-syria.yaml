  ESET analysis of PROMETHIUM / StrongPity operations against
  Syrian opposition and Syrian Kurdish civil-society targets
  through 2020. Second-attempt URL verification failed and
  surfaced a likely publisher error: the canonical 2020
  StrongPity/PROMETHIUM Kurdish-targeting reporting was
  published by Cisco Talos (blog.talosintelligence.com/
  promethium-extends-with-strongpity3/, 2020-06-29) and
  Bitdefender (June 2020), not ESET. ESET WeLiveSecurity's
  StrongPity coverage focuses on Android (Jan 2023). Recommend
  re-scoping this source to the Talos or Bitdefender report.
