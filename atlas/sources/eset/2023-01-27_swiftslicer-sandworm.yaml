notes: |
  ESET disclosure of SwiftSlicer, a Go-language destructive wiper
  attributed to Sandworm. Deployed via Active Directory Group
  Policy against a Ukrainian target on 25 January 2023, SwiftSlicer
  overwrites files in critical system paths and on non-system
  drives with cryptographically random data, then reboots the
  system. ESET's APT activity reports (H1 2023) frame SwiftSlicer
  as part of the ongoing Sandworm wiper cadence against Ukrainian
  organisations.
