notes: |
  ESET (WeLiveSecurity) original research documenting a Transparent
  Tribe / APT36 campaign distributing the CapraRAT Android backdoor via
  two trojanized "secure" messaging/calling apps (MeetsApp, MeetUp) served
  from attacker-run websites, most likely active since July 2022. Names
  Transparent Tribe / APT36 (does NOT name Pakistan or any Pakistani service).
  Created 2026-07-01 to replace the phantom source
  sentinellabs/2022-08-04_caprarat-android (a nonexistent SentinelLabs post;
  404 URL) on event 2022-08/caprarat-android-kashmir.
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured + hashed
  (sha256 9571dd2b…127b5d19, 88,041 bytes). Verbatim support quotes:
  "Transparent Tribe, also known as APT36, is a cyberespionage group known
  to use CapraRAT"; "In 2021, the group started to target the Android
  platform, using a modified version of an open-source RAT named AndroRAT";
  "trojanized secure messaging and calling apps branded as MeetsApp and
  MeetUp"; "Victims were probably targeted through a honey-trap romance scam";
  "we were able to geolocate over 150 victims in India, Pakistan, Russia,
  Oman, and Egypt"; targets "presumably with a military or political
  orientation"; "Most likely active since July 2022" (domains registered
  July 9th and July 25th, 2022). Zero occurrences of "Kashmir".
