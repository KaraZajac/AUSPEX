  ESET disclosure of the Belarusian MoustachedBouncer cluster
  using ISP-position adversary-in-the-middle to deliver
  NightClub and Disco implants to foreign embassy staff.

  URL updated 2026-05-28: welivesecurity.com migrated post-2023
  to /en/eset-research/<slug>/ pathing. Original
  /2023/08/10/<slug>/ URL now 404s.

  AUDIT (2026-06-24, claude-opus-4.8/max): service-placement check for the
  MoustachedBouncer actor. ESET attributes the cluster to the STATE only, not
  to a service: "We assess with medium confidence that they are aligned with
  Belarus's interests" (Key points). The article never names the KGB / Belarusian
  State Security Committee / KDB or any specific Belarusian service (verbatim scan
  of the captured snapshot: 0 occurrences of "KGB", "state security", "intelligence
  service/agency"; the two "security service" hits are generic lawful-intercept
  framing and the Russian FSB, not a Belarusian-service attribution of this actor).
  On tradecraft ESET assesses only "We believe that MoustachedBouncer uses a lawful
  interception system (such as SORM)..." and "We assess with low confidence that
  MoustachedBouncer uses this SORM system" — state-authorized infrastructure, not a
  named operator. MISP galaxy (UUID 01ac8b25...) corroborates the level, not the
  service: cfr-suspected-state-sponsor "Belarus", country "BY", attribution-confidence
  50 — no KGB/KDB. Conclusion: Belarus nexus is source-supported; the by/kgb service
  placement is NOT. Actor demoted by/kgb/moustachedbouncer -> by/unscoped/moustachedbouncer.
