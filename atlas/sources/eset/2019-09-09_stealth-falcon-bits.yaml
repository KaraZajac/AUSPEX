notes: |
  ESET reverse-engineering of a Stealth Falcon Win32 backdoor
  abusing the Windows BITS (Background Intelligent Transfer
  Service) for C2. Extends the documented Stealth Falcon cluster
  activity timeline to 2019 and corroborates Citizen Lab + Kaspersky
  attribution.
  AUDIT (2026-06-24, claude-opus-4.8/max): read from the captured raw snapshot for the Stealth
  Falcon service-placement audit. This is the only cited source that goes beyond "UAE" — it links
  Stealth Falcon to "Project Raven" via Reuters/Amnesty, verbatim: "In January of 2019, Reuters
  published an investigative report into Project Raven, an initiative allegedly employing former
  NSA operatives and aiming at the same types of targets as Stealth Falcon … Amnesty
  International's Senior Technologist, Claudio Guarnieri, has concluded that Stealth Falcon and
  Project Raven actually are the same group." It does NOT name DarkMatter or CyberPoint as the
  operator ("DarkMatter"/"CyberPoint" = 0 occurrences; "Project Raven" = 3). The DarkMatter↔Project
  Raven equation lives only in Reuters' reporting (not cited on the actor), so this source does not
  source a DarkMatter service placement — actor demoted to ae/unscoped/stealth-falcon.
