notes: |
  ESET Research (Facundo Muñoz & Matías Porolli), "DoNot Go! Do not
  respawn!", 18 Jan 2022 — deep-dive on Donot Team (aka APT-C-35,
  SectorE02) Windows campaigns from September 2020 to October 2021
  targeting government and military entities in South Asia
  (Bangladesh, Sri Lanka, Pakistan, Nepal), documenting two yty-
  framework variants, DarkMusical and Gedit.
  URL corrected 2026-05-29 (Agent2): the previously stored
  welivesecurity.com root was a landing page, not the article.
  AUDIT (2026-06-30, claude-opus-4.8/max): raw snapshot captured +
  hashed (sha256 76021fe8…e452b0fd, 136,095 bytes; page fetched
  cleanly, not bot-walled). tier secondary → primary: this is a
  first-party ESET vendor-research report on ESET's own telemetry.
  title corrected — the stored title ("Origami Elephant — continued
  targeting…") was a fabrication; the real article title is "DoNot
  Go! Do not respawn!". SLUG/DATE MISMATCH FLAG: the source id/slug
  is stamped 2019-04 but the article is 2022-01-18; kept per the
  stable-slug rule. No genuine ESET April-2019 DoNot article exists
  (the only ESET DoNot report is this 2022 piece); the event that
  cites this was mis-dated to 2019-04 and has been re-dated to the
  real 2020-2021/2022-disclosed campaign this article documents.
