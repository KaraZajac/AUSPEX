notes: |
  ESET disclosure of two Asian game-publisher / e-sports
  platform supply-chain compromises in which legitimately
  signed game executables were trojanized to deliver an
  in-memory backdoor. Attributed to a Winnti-lineage operator
  (later resolved into APT41 / Barium). Targets included a
  Thai e-sports platform and two video-game studios; the
  campaign deployed an "Auxiliary Manager" backdoor with
  signed-binary persistence.
