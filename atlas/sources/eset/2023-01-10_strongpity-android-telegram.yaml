notes: |
  ESET disclosure of an active StrongPity / PROMETHIUM Android
  campaign distributing a trojanized Telegram build via a website
  impersonating the Shagle video-chat service. Active since
  November 2021; eleven dynamically loaded modules with broad
  device-surveillance capability (calls, SMS, contacts, location,
  exfiltration from 17 messaging apps including Viber, Skype,
  Gmail, Messenger). First well-documented mobile-platform
  PROMETHIUM tooling.
  AUDIT (2026-07-02, claude-fable-5/max): real, complete first-party
  article (NOT a phantom) — raw_snapshot captured + hashed
  (sha256 b4d496da…06962149, 106,868 bytes). Title verbatim
  "StrongPity espionage campaign targeting Android users"; byline
  "Lukas Stefanko, 10 Jan 2023". Verbatim attribution: "we believe
  with high confidence that this operation belongs to the StrongPity
  group." NB: ESET describes the copycat distribution domain only as
  "a domain containing the word 'dutch'" and does NOT publish it;
  the string "shaglechat" does not appear anywhere in the source
  (the event's prior "shaglechat[.]com" was fabricated and removed).
