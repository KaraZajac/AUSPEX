notes: |
  Joint ESET / CERT-UA disclosure of the April 2022 Sandworm
  Industroyer2 + CaddyWiper combo attempt against a Ukrainian
  high-voltage substation. Attempted blackout for ~2M customers
  thwarted by ESET / Microsoft / CERT-UA collaboration.

  AUDIT (2026-07-01, claude-opus-4.8/max): raw HTML captured + hashed
  (title "Industroyer2: Industroyer reloaded"; 94,167 bytes). Verbatim:
  "We assess with high confidence that the APT group Sandworm is
  responsible for this new attack"; "The destructive actions were
  scheduled for 2022-04-08"; "Scheduled execution of Industroyer2 to
  cut power in an Ukrainian region"; Industroyer2 "only implements the
  IEC-104 (aka IEC 60870-5-104) protocol"; CaddyWiper/ORCSHRED/
  SOLOSHRED/AWFULSHRED named; ARGUEPATCH = "a patched version of a
  legitimate component of Hex-Rays IDA Pro software ... win32_remote".
  NOTE the blog anonymizes the victim as "an energy provider in
  Ukraine" (does NOT name Ukrenergo), does NOT state the "2 million"
  scale, and does NOT mention Microsoft — those are carried by the
  co-cited CyberScoop 2022-04-12 report.
