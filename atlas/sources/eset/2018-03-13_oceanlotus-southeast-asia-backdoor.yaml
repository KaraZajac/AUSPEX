notes: |
  ESET WeLiveSecurity disclosure of an updated OceanLotus / APT32
  backdoor used in 2017-2018 against high-profile Southeast Asian
  targets. Two-stage dropper -> backdoor architecture with several
  evasion improvements relative to earlier OceanLotus implants.
  Published headline reads "OceanLotus sets sights on high-profile
  targets in Southeast Asia"; canonical URL slug uses the earlier
  "ships new backdoor using old tricks" framing also used as the
  page h1.

  AUDIT (2026-06-28, claude-opus-4.8/max): raw snapshot hash re-verified
  — eset__2018-03-13_oceanlotus-southeast-asia-backdoor.html, sha256
  5fc543e7…2fb10515, 74709 bytes (HTTP 200, real article body, no bot
  wall; <title> "OceanLotus sets sights on high-profile targets in
  Southeast Asia", og:title/h1 "OceanLotus ships new backdoor using old
  tricks"). publisher corrected "ESET (Romain Dumont)" -> "ESET": the
  blog is bylined **Tomáš Foltýn (13 Mar 2018)**; "Romain Dumont"
  appears nowhere in this blog nor in the linked white paper (no author
  in the PDF or its metadata), so attributing this source to Dumont was
  unsupported. This blog is a 4-min summary; the deep-dive C2/tradecraft
  detail lives in the companion white paper, now added as a sibling
  source eset/2018-03_oceanlotus-old-techniques-new-backdoor. Verbatim
  support carried by THIS blog: "OceanLotus, also dubbed APT32 and
  APT-C-00"; "high-profile corporate and government targets in Southeast
  Asia, particularly in Vietnam, the Philippines, Laos, and Cambodia";
  goals "include cyberespionage, reconnaissance and intellectual
  property theft"; two-stage dropper->backdoor; spearphishing delivery
  ("most probably via a spearphishing email"); "No software exploits are
  needed"; DLL side-loading of signed Symantec rastlsc.exe / McAfee
  mcoemcpy.exe; "All communication with the C&C servers is encrypted".
  NOT in this blog (sourced instead to the white paper): the specific
  HTTP/HTTPS/TCP-25123 C2 protocols, the Sep-2017→Feb-2018 window, and
  any FireEye reference (the blog never mentions FireEye; the white
  paper does, as prior reporting).
