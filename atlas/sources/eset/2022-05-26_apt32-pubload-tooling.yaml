notes: |
  ESET retrospective on APT32 tooling modernization in the
  2021-2022 window. Second-attempt URL verification failed and
  surfaced a likely attribution error: PUBLOAD (MITRE S1228)
  was first documented by Cisco Talos in 2022 and is associated
  with Mustang Panda (Bronze President) clusters, not APT32 /
  OceanLotus. ESET WeLiveSecurity's APT32-specific corpus is
  concentrated in 2018-2019 (March 2018 backdoor PDF, Nov 2018
  watering hole, March 2019 decoys, April 2019 macOS update);
  no 2022 ESET OceanLotus tooling post was recovered. Recommend
  re-scoping to one of the 2018-2019 ESET posts or to the
  Talos PUBLOAD documentation as appropriate to the cited event.
