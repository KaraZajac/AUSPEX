notes: |
  ESET disclosure of the Okrum backdoor used by Ke3chang /
  APT15 against diplomatic missions in Belgium, Brazil,
  Chile, Guatemala, Mexico, and Slovakia between 2015 and
  early 2019. Documents the toolset evolution from RoyalDNS
  / RoyalCli through Ketrico / Ketrum into Okrum, with each
  generation iterating on persistence and steganographic C2.
