notes: |
  ESET disclosure of the Okrum backdoor used by Ke3chang /
  APT15 against diplomatic missions in Belgium, Brazil,
  Chile, Guatemala, Mexico, and Slovakia between 2015 and
  early 2019. Documents the toolset evolution from RoyalDNS
  / RoyalCli through Ketrico / Ketrum into Okrum, with each
  generation iterating on persistence and steganographic C2.
  # AUDIT 2026-07-01 (claude-opus-4.8/max): raw snapshot captured + hashed
  # (86,996 bytes). The description above contains inaccuracies vs the raw
  # article: (1) "Mexico" is NOT a named victim — source lists only Slovakia,
  # Belgium, Chile, Guatemala, Brazil; (2) "Ketrico / Ketrum" are not in the
  # source — the ESET-tracked family is "Ketrican" (Win32/Ketrican), alongside
  # BS2005 (operation Ke3chang) and RoyalDNS; (3) steganography is used for
  # payload concealment (Okrum hides its payload in a PNG), not C2. Corrected
  # facts carried in the citing event 2019-07/apt15-okrum-diplomatic-missions.
