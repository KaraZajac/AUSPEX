notes: |
  ESET's 21-page technical white paper (the deep-dive linked from the
  2018-03-13 WeLiveSecurity blog post). Documents a new OceanLotus /
  APT32 second-stage backdoor and its two-stage dropper -> DLL-side-
  loading delivery. Added 2026-06-28 during the LLM audit of event
  2018-03/eset-oceanlotus-southeast-asia-backdoor as the primary that
  actually carries the backdoor's C2 / tradecraft detail (the blog only
  summarizes it).

  AUDIT (2026-06-28, claude-opus-4.8/max): snapshot
  eset__2018-03_oceanlotus-old-techniques-new-backdoor.pdf, sha256
  f6a3d64a…459af9be, 1900054 bytes, 21 pp (PDF CreationDate
  2018-03-13 EDT; cover "ESET / March 2018"; no author named in the
  PDF or its metadata). Verbatim support captured:
  - Targeting: "The OceanLotus group, also known as APT32 and APT-C-00
    … targeting the eastern part of Asia"; "OceanLotus continues its
    activity particularly targeting company and government networks in
    East-Asian countries"; "Our telemetry reveals that East-Asian
    countries such as Vietnam, the Philippines, Laos and Cambodia, are
    the most targeted."
  - Prior reporting situated: "papers such as those from CyberReason, a
    lengthy global view from FireEye and the watering-hole explanation
    from Volexity."
  - Delivery: "The droppers are probably attached to an email message";
    decoy doc filenames (e.g. "Updated AF MOD contract - Jan 2018.exe",
    "Sorchornor_with_PM_-_Sep_2017.exe", "20170905-Evaluation
    Table.xls.exe", "Chi tiet don khieu nai gui saigontel.exe");
    "A decoy document is launched, but is password-protected"; fake
    installers / RobototFontUpdate.exe via watering holes.
  - Side-loading: signed "rastlsc.exe from Symantec and mcoemcpy.exe
    from McAfee" load malicious "rastls.dll (Win32/Salgorea.BD)" and
    "McUtil.dll (Win32/Korplug.MK)".
  - C2: "The backdoor uses a classic TCP communication protocol over
    port 25123"; DNS-derived C&C; "All communication is encrypted using
    RC4 and compressed with LZMA"; backup "HTTPprov" library "sends a
    POST request over the HTTP protocol … also supports HTTPS and the
    usage of a SOCKS5, SOCKS4a or SOCKS4 proxy."
  - Window: "A few months ago, we discovered and analyzed one of their
    latest backdoors" (rel. to Mar 2018); earliest dated artifact
    2017-09-05; "Last IoC update: 2018-02-22".
