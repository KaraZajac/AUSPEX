  ESET's foundational technical analysis of Industroyer / CrashOverride
  — the ICS-purpose-built malware used against Kyiv's Pivnichna
  substation in December 2016. First public characterization of
  the IEC 60870-5-101/104, OPC DA, and IEC 61850 protocol modules.

  AUDIT (2026-06-27, claude-opus-4.8/max): URL live (HTTP 200), title/date confirmed. raw_snapshot
