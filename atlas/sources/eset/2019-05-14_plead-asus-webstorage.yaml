title: |
  PLEAD malware distributed via MitM attacks at router level,
  misusing ASUS WebStorage
url: https://www.welivesecurity.com/2019/05/14/plead-malware-mitm-asus-webstorage/
archive_url: null
published_on: 2019-05-14
retrieved_on: 2026-05-27
tier: primary
notes: |
  ESET disclosure of BlackTech-cluster (PRC-nexus, Taiwan-focused)
  operators using router-level man-in-the-middle to inject the
  PLEAD backdoor into legitimate ASUS WebStorage update traffic.
  Targets concentrated in Taiwan. The MitM-at-the-router primitive
  matters because it is structurally similar to the SOHO-router-
  relay infrastructure tradecraft that becomes a central PRC
  pattern by 2023–2024 (Volt Typhoon, Salt Typhoon).
