notes: |
  ESET disclosure of BlackTech-cluster (PRC-nexus, Taiwan-focused)
  operators using router-level man-in-the-middle to inject the
  PLEAD backdoor into legitimate ASUS WebStorage update traffic.
  Targets concentrated in Taiwan. The MitM-at-the-router primitive
  matters because it is structurally similar to the SOHO-router-
  relay infrastructure tradecraft that becomes a central PRC
  pattern by 2023–2024 (Volt Typhoon, Salt Typhoon).
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the SERVICE placement of the actor
  BlackTech, which carried an unsourced cn/mss (Ministry of State Security) placement. This
  article — the actor's sole cited source — names NO Chinese intelligence service, and does not
  even mention China, the PRC, "Chinese," "state-sponsored," or "nation-state" anywhere (verified
  over the full captured raw HTML; the meta-description calls the operators "cybercriminals").
  ESET attributes the activity only to "the BlackTech group," which (citing Trend Micro) "is
  primarily focused on cyberespionage in Asia," with the PLEAD malware "most actively deployed"
  in Taiwan. The cn/mss placement was therefore unsupported; the actor was DEMOTED to
  cn/unscoped/blacktech (FK-propagated to its 3 events). Raw snapshot + sha256 recorded above
  (curl HTTP 200, 82,470 bytes).
