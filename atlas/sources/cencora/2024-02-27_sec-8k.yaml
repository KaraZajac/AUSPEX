notes: |
  Cencora's Form 8-K disclosure of a cybersecurity incident
  involving exfiltration of data from its information systems.
  Multiple downstream pharmaceutical-manufacturer customers
  (Bayer, Bristol Myers Squibb, Novartis, Regeneron, AbbVie,
  Acadia, Dendreon, Genentech, GlaxoSmithKline, Sumitomo, Tris
  Pharma) filed individual state-AG breach notifications
  February–May 2024 referencing the incident.
