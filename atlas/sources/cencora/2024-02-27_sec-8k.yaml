notes: |
  Cencora's Form 8-K disclosure (filed 2024-02-27; date of
  earliest event reported 2024-02-21): "On February 21, 2024,
  Cencora, Inc. (the 'Company'), learned that data from its
  information systems had been exfiltrated, some of which may
  contain personal information." Reports immediate containment
  steps and an investigation with law enforcement, cybersecurity
  experts and external counsel; no material impact on operations;
  materiality not yet determined. Names no threat actor, no
  ransom, and no data categories beyond "personal information".
