notes: |
  Amendment No. 1 to the 2024-02-27 8-K. Key statements: through
  the investigation "the Company learned that additional data,
  beyond what was initially identified, had been exfiltrated";
  completed review of most exfiltrated data "confirmed that the
  Data included personally identifiable information ('PII') and
  protected health information ('PHI') of individuals, most of
  which is maintained by a Company subsidiary that provides
  patient support services"; required notifications provided to
  affected parties and regulators; "The Company has no evidence
  that any of the Data has been or will be publicly disclosed";
  "The Company believes it has contained the incident"; incident
  assessed as not material to operations or financial condition.
  Names no threat actor and no ransom.
