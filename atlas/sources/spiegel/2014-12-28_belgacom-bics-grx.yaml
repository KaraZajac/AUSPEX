  AUDIT (2026-06-25, claude-opus-4.8/max): Re-fetched (HTTP 200; actual
  headline "New Snowden Docs Indicate Scope of NSA Preparations for Cyber
  Battle") and hashed (sha256 2ecf80d9…) while auditing the
  2014-11/cable-wireless-gchq-partnership event, where this source had been
  mis-used as the attribution + attesting source for the Cable & Wireless /
  GERONTIC facts. The snapshot does NOT contain those facts: term counts are
  "Five Eyes" x7, GRX x2, Belgacom x1, but Cable & Wireless / Vodafone /
  GERONTIC / NIGELLA / GCHQ / Tempora / fibre / undersea cable all x0. This
  source supports only the general Five Eyes / UKUSA framing and the
  Belgacom/BICS/GRX targeting; it is NOT a source for the GERONTIC
  carrier-partnership. The cable-partnership citations were re-pointed to
  intercept/2014-11-20_vodafone-gchq-gerontic and
  channel4/2014-11-20_spy-cable-gchq.
