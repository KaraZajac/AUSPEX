notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): live URL fetched in full and snapshotted
  (612,500 bytes; sha256 934e0aa8…ee4b1d8f). Captured PRIMARY source for Operation
  SHOTGIANT; carries the core facts verbatim: "At the beginning of 2009, the NSA began
  an extensive operation, referred to internally as 'Shotgiant,' against the company
  [Huawei]"; NSA "infiltrated the network" at Huawei's "central office in Shenzhen" and
  read email "beginning in January 2009, including messages from company CEO Ren Zhengfei
  and Chairwoman Sun Yafang"; also accessed "the secret source code of individual Huawei
  products" and "copied a list of 1,400 customers." NSA's own stated rationale (counter-PRC
  SIGINT): "many of our targets communicate over Huawei produced products, we want to make
  sure that we know how to exploit these products," with concern that "Huawei's widespread
  infrastructure will provide the PRC ... with SIGINT capabilities." NSA on-record denial
  of economic-espionage motive (spokeswoman Caitlin Hayden): "We do not give intelligence
  we collect to US companies to enhance their international competitiveness or increase
  their bottom line." Confirms the joint SPIEGEL + New York Times Snowden disclosure. Does
  NOT name "TAO" (only "a special unit with the US intelligence agency") nor the PLA
  specifically — those details are carried by the co-disclosing NYT (see that source).
