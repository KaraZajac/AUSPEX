  Der Spiegel publication of the NSA ANT Division catalog (Snowden
  archive). 50-page document detailing hardware/firmware implants
  ($0–$250,000 per item).
  AUDIT (2026-06-25, claude-opus-4.8/max): captured; corroborates the *service* (us/nsa/tao) for
  us/nsa/equation-group directly from Snowden docs — names the NSA ×66 and TAO ×40 in the captured
  text: "the Office of Tailored Access Operations, or TAO. This is the NSA's top operative unit";
  NSA's own statement to Spiegel quoted: "Tailored Access Operations is a unique national asset that
  is on the front lines of enabling NSA to defend the nation and its allies." Note: this 2013 piece
  predates and does NOT use the "Equation Group" label (Equation ×0), so it documents the NSA/TAO
  unit and ANT implants rather than the Equation cluster by name — it underpins the TAO placement,
  not the Equation↔NSA identity (which rests on Reuters + Pangu Lab).
  AUDIT (2026-06-25, claude-opus-4.8/max, re: us/nsa/tao-sub-units): same captured snapshot (sha256
  unchanged, re-verified) is the LOAD-BEARING source for the us/nsa/tao-sub-units actor — KEEP. It
  names the unit verbatim: "the Office of Tailored Access Operations, or TAO. This is the NSA's top
  operative unit," plus NSA's statement "Tailored Access Operations is a unique national asset…"; and
  the article's ANT-catalog implants are this actor's enumerated TAO/ANT tooling. NSA ×66, TAO ×40.
