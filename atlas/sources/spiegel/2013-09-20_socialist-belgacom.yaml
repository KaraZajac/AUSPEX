notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): supports the uk/gchq placement of
  uk/gchq/regin-operators by naming GCHQ as the operator of the Belgacom intrusion
  (the most prominent attributable Regin/Operation-Socialist deployment). "Documents
  from the archive of whistleblower Edward Snowden indicate that Britain's GCHQ
  intelligence service was behind a cyber attack against Belgacom, a partly
  state-owned Belgian telecoms company." and: "A 'top secret' Government
  Communications Headquarters (GCHQ) presentation seen by SPIEGEL indicate that the
  goal of project, conducted under the codename 'Operation Socialist,' was 'to enable
  better exploitation of Belgacom'." This article does not use the word "Regin"
  itself (GCHQ x12 / Belgacom x15 / Socialist x6, Regin x0 in visible text) — it
  establishes GCHQ as the Op-Socialist actor; the Regin<->GCHQ tie is made by the
  companion 2015-01-27 Der Spiegel/Intercept source. content_sha256 recorded.
