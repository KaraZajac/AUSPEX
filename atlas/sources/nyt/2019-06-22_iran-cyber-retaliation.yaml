notes: |
  NYT reporting on US CYBERCOM cyber operations against Iranian IRGC
  intelligence systems and missile-control infrastructure following
  the June 2019 RQ-4 Global Hawk shootdown — the canonical
  "Iran retaliation tanker" event.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot captured from the
  Wayback archive_url. BYLINE is "Julian E. Barnes and Thomas
  Gibbons-Neff, June 22, 2019" (David E. Sanger and Eric Schmitt only
  "contributed reporting") — correcting an earlier event-file
  mis-citation of "David Sanger / Julian Barnes." Verbatim: "United
  States Cyber Command on Thursday conducted online attacks against an
  Iranian intelligence group that American officials believe helped plan
  the attacks against oil tankers in recent weeks... An additional
  breach... targeted other computer systems that control Iranian missile
  launches." Below-threshold framing: "the online operation was allowed
  to go forward because it was intended to be below the threshold of
  armed conflict." Credits Yahoo News as first to report ("first reported
  Friday by Yahoo News") and notes the breach "was meant to take the
  Iranian intelligence group offline for a time." Sourced to "people
  briefed on the operations" (anonymous).
