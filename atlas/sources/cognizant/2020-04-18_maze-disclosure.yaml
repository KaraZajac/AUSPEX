notes: |
  Cognizant's first-party "Security Incident Update" press release,
  dated April 18, 2020: confirms the incident "is the result of a
  Maze ransomware attack," causing "service disruptions for some of
  our clients," with IOCs provided to clients and law enforcement
  engaged. First-party victim disclosure (kind is tagged
  vendor-research but this is a corporate/victim disclosure, not
  vendor research — candidate for kind normalization).
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured +
  sha256 recorded; the live page renders the full press-release body
  under a generic "Cognizant Press Releases" <title>, so it is the
  real article, NOT a phantom. CORRECTION: prior note claimed the
  10-Q filings disclosed "USD 50–70M impact and three-week service
  disruption" — the Q1-2020 10-Q (2020-05-08) does NOT state either
  figure (it says only that lost-revenue/remediation costs "will be
  significant"); the $50–70M Q2 revenue/margin estimate came from
  Cognizant's May 2020 earnings call, and the "3 weeks" is press
  characterization. Those uncited figures were removed from the
  event. Verbatim from this page: "Cognizant can confirm that a
  security incident involving our internal systems, and causing
  service disruptions for some of our clients, is the result of a
  Maze ransomware attack."
