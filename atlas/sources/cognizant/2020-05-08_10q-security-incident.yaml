notes: |
  Cognizant's Q1-2020 Form 10-Q (period ended 2020-03-31, signed by
  CEO Brian Humphries and CFO Karen McLoughlin, dated May 8, 2020),
  filed on SEC EDGAR. First-party regulatory disclosure of the Maze
  ransomware incident. Added 2026-07-01 (claude-opus-4.8/max) to
  carry the data-access and qualitative-impact claims the terse
  April-18 press release does not.
  Verbatim: "On April 20, 2020, we announced a security incident
  involving a Maze ransomware attack ... The attack resulted in
  unauthorized access to certain data and caused significant
  disruption to our business. This included the disabling of some of
  our systems and networks and disruption caused by our taking
  certain other internal systems and networks offline as a
  precautionary measure ... we experienced service disruptions ...
  some clients opted to suspend our access to their networks as a
  security precaution ... We engaged leading outside forensics and
  cybersecurity experts ... We also notified and are coordinating
  with law enforcement. The lost revenue and containment,
  remediation, investigation, legal and other costs will be
  significant..."
  NOTE: this filing does NOT state the widely-cited $50–70M figure
  (that came from the May 2020 earnings call) — the only "$70
  million" in the document is an unrelated India tax-dispute deposit.
