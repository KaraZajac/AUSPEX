notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): captured the 22-page ANSSI/CERT-FR PDF report direct from
  cert.ssi.gouv.fr (HTTP 200, 423,607 bytes, PDF 1.5; sha256 above). Read in full. FINDING: the report
  does NOT attribute Houken to the MSS. ANSSI's own assessment is that Houken is a China-nexus, for-profit
  initial-access broker that sells TO state-linked actors, not a state service. The only "MSS" mention is
  ANSSI relaying GTIG's hedged characterization of the related UNC5174 cluster as a "potential access
  broker FOR the MSS" — second-hand (attributed to Google), hedged ("potential"), and framing the actor as
  a vendor for the MSS rather than the MSS itself. Consequently the actor was demoted cn/mss/houken →
  cn/unscoped/houken (China nexus supported; specific service not named). Also normalized this record:
  kind industry→cert-advisory, publisher certssigouv→"ANSSI / CERT-FR", tier secondary→primary
  (govt-CERT primary report), and dropped the 2026-05-30 PROVISIONAL backfill header.

  Supporting quotes (verbatim from the PDF):
  - "Houken is an intrusion set plausibly operated by an initial access broker. The main motivation of
    its operators is to gain initial accesses through the harvesting of credentials and the deployment
    of persistence mechanisms." (sec. 4.1)
  - "The operators behind the UNC5174 and Houken intrusion sets are likely primarily looking for valuable
    initial accesses to sell to a state-linked actor seeking insightful intelligence. However, ANSSI also
    observed one case of data exfiltration as well as an interest in the deployment of cryptominers,
    indicating straight-forward profit-driven objectives." (Key Points)
  - "Comment: the threat actor behind the Houken and UNC5174 intrusion sets might correspond to a private
    entity, selling accesses and worthwhile data to several state-linked bodies while seeking its own
    interests leading lucrative oriented operations." (sec. 4.2)
  - The sole MSS reference (relaying GTIG, not ANSSI's own claim): "Links between Houken and UNC5174, an
    intrusion set described in open-source publications as a potential access broker for the MSS (Ministry
    of State Security of the People's Republic of China) by GOOGLE THREAT INTELLIGENCE GROUP (GTIG), were
    observed." (sec. 4.2)
  - Original supporting quote (campaign scope): "In September 2024, ANSSI observed an attack campaign
    seeking initial access to French entities' networks through the exploitation of several zero-day
    vulnerabilities on Ivanti Cloud Service Appliance (CSA) devices. French organizations from
    governmental, telecommunications, media, finance, and transport sectors were impacted."
