notes: |
  The "October 7" controls — the watershed US action restricting
  advanced semiconductors, semiconductor-manufacturing equipment,
  and supercomputing technology to China. Includes a novel "US-person"
  restriction prohibiting US nationals from supporting Chinese
  advanced-IC development without a license. Single most consequential
  US tech-controls action of the post-Cold-War era. Triggered the
  Made-in-China-2025-aligned PRC intelligence push that AUSPEX
  documents.
