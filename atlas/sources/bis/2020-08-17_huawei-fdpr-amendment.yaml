  August 17, 2020 BIS rule extending the Foreign-Produced Direct
  Product Rule (FDPR) to Huawei, blocking any foreign-fabricated
  semiconductor that used US technology in design or manufacture
  from being sold to Huawei. The tooling for the October 7, 2022
  China-wide semis controls was prototyped here.
