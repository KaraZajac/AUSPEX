notes: |
  Federal Register notice memorializing the May 15, 2019 BIS action
  adding Huawei and 68 non-US affiliates to the Entity List, citing
  national security and foreign policy interests. The watershed
  US-China technology decoupling action; triggered the subsequent
  FDPR amendments and the broader 2020-2022 China-tech-controls
  build-out.
