  December 2, 2024 BIS expansion of the October-7 controls regime —
  added 140 Chinese entities including major SME firms (Naura,
  AMEC, ACM Research subsidiaries) and broadened HBM (high-bandwidth
  memory) controls explicitly to deny AI-accelerator memory stacks
  to PRC firms.
