id: bis/2025-05-13_huawei-ascend-enforcement
kind: govt-primary
publisher: US Department of Commerce, Bureau of Industry and Security
title: |
  BIS Guidance: Use of Huawei Ascend Chips Anywhere in the World
  Violates US Export Controls
url: https://www.bis.gov/media/documents/general-prohibition-10-guidance-may-13-2025.pdf
archive_url: null
published_on: 2025-05-13
retrieved_on: 2026-05-26
tier: primary
notes: |
  Trump-era BIS guidance asserting that use of Huawei Ascend AI
  accelerators (910B, 910C, 910D) anywhere in the world violates US
  export controls because the chips were fabricated using
  FDPR-implicated tools. Marks a sharp escalation of US extraterritorial
  technology controls; PRC issued an MOFCOM countermeasure
  statement same week.
