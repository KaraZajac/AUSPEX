notes: |
  Final Biden-era rule structuring global access to US AI compute
  (the "AI Diffusion Rule") — a tiered framework dividing the world
  into Tier 1 (allies, unrestricted), Tier 2 (most countries, capped),
  and Tier 3 (PRC and embargoed states, denial). Rescinded by Trump
  administration May 2025 but established the framework whose
  successor controls AUSPEX must track.
