title: |
  Framework for Artificial Intelligence Diffusion (Final Rule)
url: https://www.federalregister.gov/documents/2025/01/15/
archive_url: "https://web.archive.org/web/20251018002729/https://www.federalregister.gov/documents/2025/01/15/"
