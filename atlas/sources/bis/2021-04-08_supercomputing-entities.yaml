notes: |
  April 8, 2021 BIS action adding seven Chinese supercomputing
  entities to the Entity List including Tianjin Phytium, Tianjin
  Sunway, Shanghai High-Performance IC Design Center, Sunway
  Microelectronics, and the National Supercomputing Centers at
  Jinan, Shenzhen, and Wuxi. First explicit
  supercomputing/HPC-focused entity-list action.
