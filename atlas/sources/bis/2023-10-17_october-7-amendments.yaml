notes: |
  October 17, 2023 BIS rule package closing loopholes in the October
  7, 2022 controls, particularly around the "performance density"
  parameter that NVIDIA had used to redesign H800 / A800 / L40S
  chips to comply with the letter of the original rule. Also added
  ~13 Chinese GPU-design firms to the Entity List.
