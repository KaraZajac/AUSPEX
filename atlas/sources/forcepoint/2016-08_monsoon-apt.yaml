notes: |
  Forcepoint's analysis of the "Monsoon" APT campaign, overlapping
  with Patchwork / Dropping Elephant clusters and targeting Chinese
  and Pakistani diplomatic and military entities.
  URL corrected 2026-05-29 (Agent2): the original /security-labs/
  landing redirects to a Forcepoint front-page now. The canonical
  full 57-page PDF report remains live at the /sites/default/files/
  resources path. The companion blog summary at
  /blog/security-labs/monsoon-analysis-apt-campaign is dead.
  AUDIT (2026-06-24, claude-opus-4.8/max): used in the in/ntro/patchwork → in/unscoped/patchwork
  service demotion. Forcepoint does NOT name India's NTRO (or any specific Indian service). The
  report's ATTRIBUTION section (p.47, rev. 1.07) opens "Reports from Special Investigations do not
  focus on specific attribution"; under "Adversaries" it states only that the individual tied to a
  Monsoon domain registration "lives or has lived and works in India" and expressly declines to
  name them ("it is not deemed in the public interest to publish specific details on this
  individual. Relevant authorities are informed as and when appropriate"); the "Cui Bono?"
  subsection poses "who profits?" but leaves it "as an exercise to for reader." India is named at
  the individual level; no Indian state organ / NTRO is attributed.
