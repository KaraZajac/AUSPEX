notes: |
  Forcepoint's analysis of the "Monsoon" APT campaign, overlapping
  with Patchwork / Dropping Elephant clusters and targeting Chinese
  and Pakistani diplomatic and military entities.
  URL corrected 2026-05-29 (Agent2): the original /security-labs/
  landing redirects to a Forcepoint front-page now. The canonical
  full 57-page PDF report remains live at the /sites/default/files/
  resources path. The companion blog summary at
  /blog/security-labs/monsoon-analysis-apt-campaign is dead.
  AUDIT (2026-06-24, claude-opus-4.8/max): used in the in/ntro/patchwork → in/unscoped/patchwork
  service demotion. Forcepoint does NOT name India's NTRO (or any specific Indian service). The
  report's ATTRIBUTION section (p.47, rev. 1.07) opens "Reports from Special Investigations do not
  focus on specific attribution"; under "Adversaries" it states only that the individual tied to a
  Monsoon domain registration "lives or has lived and works in India" and expressly declines to
  name them ("it is not deemed in the public interest to publish specific details on this
  individual. Relevant authorities are informed as and when appropriate"); the "Cui Bono?"
  subsection poses "who profits?" but leaves it "as an exercise to for reader." India is named at
  the individual level; no Indian state organ / NTRO is attributed.
  AUDIT (2026-06-25, claude-opus-4.8/max): re-verified for the 2016-08/forcepoint-monsoon-disclosure
  event audit against the full raw PDF (58 pp.; footer numbering is 0-indexed "x/57"; sha256
  e2770532…0c8526a re-confirmed on disk). Additional facts verified verbatim:
  - DATING: Exec Summary — MONSOON "appears to have started in December 2015 and is still ongoing
    as of July 2016." The "active since at least 2010" date (p.5) refers to the OPERATION HANGOVER
    group (ref [2]) — the adversary Monsoon is tied to at "highly probable" — NOT Monsoon's own
    window. (The event start_date was corrected 2010-12-01 → 2015-12-01.)
  - CVEs (Fig. 14, p.16): CVE-2012-0158, CVE-2014-6352, CVE-2015-1641 are the exploited document
    vulns; a possible Silverlight stage is speculated as "something like CVE-2016-0034." The report
    does NOT mention CVE-2014-4114 (the "Sandworm" OLE flaw); CVE-2014-6352 is the OLE Package
    Manager RCE present here (a different CVE than Sandworm's 2014-4114).
  - VICTIMOLOGY: "Victims of Interest" = "Government Agencies, Armed Forces, Embassies: Sri Lanka,
    Ceylon, South Korean"; victims also from "Bangladesh, Sri Lanka and Pakistan … and further
    afield, including Africa and the Far East." China = 61% of raw victims but explicitly "Victim
    of Opportunity … snared by the lure web site"; Forcepoint hedges the Chinese-national targeting
    "may also be related … but equally may be part of a separate campaign … or … selling
    Surveillance-As-A-Service." Exfil themes (p.47): defence/naval/submarine, "Nuclear security and
    counter proliferation," "Foreign high commissions," "Defence attaches and consulates," UN.
  - MALWARE: BADNEWS, TINYTYPHON, AutoIt backdoor, Unknown Logger; stated Intent "Data Exfiltration."
