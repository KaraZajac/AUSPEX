notes: |
  IISS net assessment of Vietnam's cyber capabilities (Volume 1
  chapter 15; day = the IISS study's public release, 28 June 2021;
  PDF CreationDate 24 June 2021). pp. 161-169.
  AUDIT (2026-07-10, claude-opus-4.8/max): secondary/analytic anchor
  added to event 2019-01/vietnam-cybersecurity-law-effective.
  Verbatim load-bearing quotes:
  - Resolution 29-NQ/TW: "The same year saw a Politburo resolution
    announcing a new 'Strategy for the Homeland Protection in
    Cyberspace', designed to develop a whole-of-society response,
    though centred on the armed forces, and to combine cyber defence
    with counter-attack." Footnote 9: "Politburo Resolution 29NQ/TW
    dated 25 July 2018."
  - 2018 law: "The Cyber Security Law passed in June 2018 was even
    more overtly political in its purpose, aiming to protect national
    security and ensure 'social order and safety in cyberspace'
    (Article 1). ... For example, in Article 8, it described as
    'strictly prohibited' any attempt to 'oppose the State' or to
    distort history by 'denying revolutionary achievements'. One of
    the most controversial elements of the 2018 law was enforced data
    localisation for all domestic and foreign companies operating in
    Vietnam ...".
  - A05: "The MPS has two cyber-security departments -- Cyber Security
    and High-tech Crime Prevention (A05), and Information Security and
    Communications (A87). A05 is tasked with preventing cyber crime,
    including online gambling and the spreading of false information
    ...".
  - Sovereignty framing (2019 defence white paper): "A defence white
    paper published in 2019 presented cyberspace as the fifth
    operational domain -- alongside land, air, sea and space -- in
    which to defend Vietnam's national sovereignty."
  Note: IISS does NOT use the exact term "cyber sovereignty"/
  "cybersovereignty" (that is AUSPEX analytic framing); it frames the
  posture as defending "national sovereignty" in cyberspace and as
  "controlling the political content". Resolution 29-NQ/TW here is a
  homeland-defence strategy "centred on the armed forces" (MND), not
  a data-localization/content-control mandate -- relevant to the
  strongly_inferred doctrine link. sha256 is of the captured PDF
  (HTTP 200, full chapter present).
