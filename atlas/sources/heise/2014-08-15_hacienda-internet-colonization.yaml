notes: |
  Snowden-archive disclosure of the GCHQ-led HACIENDA programme:
  agency-wide port-scanning of entire countries to enumerate
  exploitable services and identify "Operational Relay Boxes"
  for follow-on CNE staging. The article enumerates targeted
  services HTTP, FTP, SSH and SNMP. Identified as a joint Five
  Eyes programme; the resulting scan database is shared across
  GCHQ, NSA, CSE, ASD and GCSB via the MAILORDER transport
  protocol. The article also publishes a proof-of-concept "TCP
  Stealth" countermeasure to deflect HACIENDA-style port
  enumeration.

  AUDIT (2026-06-25, claude-opus-4.8/max): Re-fetched live (HTTP
  200, 246 KB) and hashed for the 2014-08/hacienda-programme-
  disclosure event audit. English text present in the captured
  page. Supporting quotes:
   - "in 2009, the British spy agency GCHQ made port scans a
     'standard tool' to be applied against entire nations".
   - "Twenty-seven countries are listed as targets of the
     HACIENDA program in the presentation".
   - "The list of targeted services includes ubiquitous public
     services such as HTTP and FTP, as well as common
     administrative protocols such as SSH ... and SNMP".
   - "The database resulting from the scans is then shared with
     other spy agencies of the Five Eyes spying club ... MAILORDER
     is described in the documents as a secure transport protocol
     used between the Five Eyes spy agencies to exchange collected
     data."
   - "Operational Relay Boxes (ORBs) ... are used to hide the
     location of the attacker when the Five Eyes launch exploits
     against targets or steal data".
  CORRECTIONS: (a) byline fixed — was the Der Spiegel "Inside TAO"
  team (Gibson/Goetz/Müller-Maguhn/Schneider/Sontheimer); the
  Heise <meta name="author"> reads "Julian Kirsch, Christian
  Grothoff, Monika Ermert, Jacob Appelbaum, Laura Poitras, Henrik
  Moltke". (b) port list corrected to HTTP/FTP/SSH/SNMP (article
  names no Telnet/SMTP/HTTPS/NetBIOS). (c) MAILORDER is the
  cross-Five-Eyes transport; OLYMPIA is specifically CSEC's
  ORB-automation tool and GCHQ's equivalent is MUGSHOT (the
  source did not support "Five Eyes consume via OLYMPIA").
