notes: |
  Snowden-archive disclosure of the GCHQ-led HACIENDA programme:
  agency-wide port-scanning of entire countries to enumerate
  exploitable services and identify "Operational Relay Boxes"
  for follow-on CNE staging. Identified ports include FTP, SSH,
  Telnet, SMTP, HTTP/S, and NetBIOS. Identified as a joint
  Five Eyes programme with documented use by GCHQ, NSA, CSE,
  ASD, and GCSB. The article also publishes proof-of-concept
  TCP-stealth code to deflect HACIENDA-style port enumeration.
