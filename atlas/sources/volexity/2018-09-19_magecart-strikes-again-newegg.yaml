notes: |
  Volexity's first-party disclosure of the Magecart compromise of
  Newegg, published 2018-09-19 in collaboration with RiskIQ (the two
  vendors reported the same incident from their respective sensor /
  crawler perspectives on the same day).

  AUDIT (2026-07-01, claude-opus-4.8/max): Real article captured +
  hashed (51,269 bytes). Carries the incident specifics used by the
  event: "Volexity has conducted the following research in
  collaboration with RiskIQ"; skimmer on the checkout billing page
  "https://secure.newegg.com/GlobalShopping/CheckoutStep2.aspx,
  would collect form data, siphoning it back to the attackers over
  SSL/TLS via the domain neweggstats.com"; domain "registered on
  August 13, 2018 at approximately 16:36 UTC via Namecheap" with a
  Comodo SSL cert issued Aug 13; "Volexity was able to confirm
  attacks via Newegg three days later on August 16, 2018 ... the
  code may have been added somewhere between 15:45 and 20:20 UTC ...
  the attackers started earlier"; "the malicious code was removed
  from the Newegg website on September 18, 2018"; "Volexity believes
  that the Newegg website may have been compromised and actively
  facilitating financial theft for over a month"; explicit BA
  linkage: "a nearly identical data theft campaign was being carried
  out against Newegg at the same time" (referencing RiskIQ's BA
  breach of "upwards of 380,000 victims").
