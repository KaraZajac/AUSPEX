notes: |
  Volexity attribution of the August 2021 watering-hole campaign against Daily NK (ROK newspaper).
  IE/Edge zero-day chains delivering BLUELIGHT and RokRAT. APT37 / ScarCruft sub-cluster.

  AUDIT (2026-06-24, claude-opus-4.8/max): Re-fetched (HTTP 200, full article body present in the
  snapshot) for the kp/mss/apt37 service-placement audit. Attributes at the NATION level only and
  names NO service — "MSS"/"Ministry of State Security"/"RGB"/"Reconnaissance General Bureau" are
  absent. Headline/body call the actor a "North Korean APT" and equate it to APT37/ScarCruft,
  verbatim: "Volexity attributes the activity described in this post to a threat actor Volexity
  refers to as InkySquid, which broadly corresponds to activity known publicly under the monikers
  ScarCruft and APT37." Volexity explicitly DEFERS the attribution method: "How is this activity
  attributed to InkySquid (aka ScarCruft, APT37)? This will be explained further in a follow-up
  post, so stay tuned!" No service named; supports the actor demotion kp/mss/apt37 -> kp/unscoped/apt37.

  AUDIT (2026-06-24, claude-opus-4.8/max): Re-used as the sole cited source for the
  kp/mss/inkysquid service-placement audit (InkySquid is Volexity's 2021 browser-exploit sub-cluster
  of APT37/ScarCruft). Same finding: nation-level attribution only ("North Korean APT InkySquid"),
  NO DPRK service named — MSS / Ministry of State Security / RGB / Reconnaissance General Bureau are
  all absent from the body (re-verified against the sha256-pinned snapshot; the "rgb" matches are CSS
  color codes). Supports the actor demotion kp/mss/inkysquid -> kp/unscoped/inkysquid.
