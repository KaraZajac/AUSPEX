notes: |
  Cisco Talos technical disclosure of the ObliqueRAT implant family,
  published 2020-02-20 (byline "Thursday, February 20, 2020"). The post
  describes the campaign as targeting "organizations in Southeast Asia"
  (Talos's label at the time) and makes NO operator attribution; it
  links ObliqueRAT to a December 2019 CrimsonRAT campaign via shared
  maldocs and macros, noting CrimsonRAT "has been known to target
  diplomatic and government organizations." Talos's follow-on (2 March
  2021) reframed the region as "South Asia" and stated ObliqueRAT "has
  been linked to the Transparent Tribe APT group in the past," making
  this 2020 post the foundational vendor reference for the ObliqueRAT
  tool family within the Pakistani-aligned operator ecosystem.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshotted (Wayback capture;
  live URL 403). Corrected the prior "South Asia" note to the article's
  actual "Southeast Asia" wording, and the follow-on date Feb->March 2021.
  The 2020 post itself names no country, no operator, and no Transparent
  Tribe / APT36 link.
