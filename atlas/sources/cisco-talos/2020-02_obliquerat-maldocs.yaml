notes: |
  Cisco Talos technical disclosure of the ObliqueRAT implant family
  observed in February 2020 against targets in South Asia.
  Subsequent Talos research (February 2021) tied ObliqueRAT
  infrastructure and TTPs into the Transparent Tribe / APT36
  cluster, making the 2020-02 disclosure the foundational
  vendor reference for the ObliqueRAT tool family within the
  Pakistani-aligned operator ecosystem.
