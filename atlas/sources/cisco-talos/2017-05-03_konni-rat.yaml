notes: |
  Cisco Talos disclosure of the Konni RAT family, attributed
  with low confidence to DPRK-aligned activity. Attribution
  remains debated across vendors.

  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the kp/rgb/konni service placement.
  This article makes NO attribution to any DPRK service — and no state-sponsorship claim at all.
  The terms "Reconnaissance General Bureau"/"RGB", "MSS"/"Ministry of State Security", "DPRK",
  "state-sponsored", "Lazarus" and "Kimsuky" do not appear anywhere in the body (the only
  "attribut*" strings in the captured HTML are class="preview-attributes" / setAttribute in the
  related-posts boilerplate). Talos's strongest statement is a lure/targeting observation in the
  Conclusion: "Clearly the author has a real interest in North Korea, with 3 of the 4 campaigns
  are linked to North Korea" — and it is explicitly hedged ("We don't know if the document is a
  legitimate compromised document or a fake that the attacker has created in an effort to be
  credible"). That speaks to the decoy documents / victims (UN, UNICEF, embassies linked to North
  Korea; a "Pyongyang Directory Group" lure), not the operator's sponsor. Because the source names
  no service, kp/rgb/konni was demoted to kp/unscoped/konni on this date. Raw HTML captured to
  atlas/sources/raw/ (sha256 above) since archive_url is null.
