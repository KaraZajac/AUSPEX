notes: |
  Cisco Talos follow-on analysis (published 2 March 2021) of ObliqueRAT
  operations through late 2020 and early 2021, documenting payloads
  hidden in benign BMP image files hosted on compromised / "hijacked"
  websites. The post states the campaign "targets organizations in South
  Asia" and that "ObliqueRAT has been linked to the Transparent Tribe APT
  group in the past," resting that link on maldoc/macro delivery
  mechanisms "identical to the CrimsonRAT delivery maldocs." The only new
  infrastructure overlap the post reports is with a RevengeRAT campaign,
  assessed at low confidence. The article body names no country and no
  victim sector.
