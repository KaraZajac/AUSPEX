title: |
  ObliqueRAT returns with new campaign using hijacked websites
url: https://blog.talosintelligence.com/obliquerat-new-campaign
archive_url: "https://web.archive.org/web/20260417033331/https://blog.talosintelligence.com/obliquerat-new-campaign/"
published_on: 2021-02-09
retrieved_on: 2026-05-28
tier: secondary
notes: |
  Cisco Talos follow-on analysis of ObliqueRAT operations in late
  2020 and early 2021 documenting compromised legitimate Indian
  and South Asian websites used as staging infrastructure for the
  implant. Talos linked the ObliqueRAT operator set to the same
  cluster as Transparent Tribe based on lure-document overlap,
  victim sector overlap (Indian government, defense, diplomatic),
  and infrastructure-reuse with Crimson RAT delivery chains.
