notes: |
  Cisco Talos technical analysis of SideCopy, a Pakistani-aligned APT
  cluster targeting Indian government and defense entities. Mimics
  SideWinder TTPs to confuse attribution — hence "SideCopy."
  Foundational vendor reference for Pakistani-state-aligned cyber
  capability and the pk/isi service entry.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw (static HTML is a
  JS-rendered shell, ~6.3k visible chars; rendered article re-fetched for
  wording). The report names NO specific Pakistani intelligence service —
  "ISI" and "Inter-Services Intelligence" do not appear anywhere. Strongest
  framing is SideWinder-TTP mimicry and India-targeting activity ("SideCopy
  is an APT group that mimics the Sidewinder APT's infection chains"; "the
  group's current infrastructure setup indicates a special interest in
  victims in Pakistan and India"); Transparent Tribe/APT36 is mentioned but
  not equated. Supports the pk/unscoped/sidecopy demotion (no ISI named).
