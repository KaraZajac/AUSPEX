  Cisco Talos analysis of "Group123" (= APT37 / ScarCruft). Covers the 2017–2018 campaign waves
  including Flash zero-day CVE-2018-4878.

  AUDIT (2026-06-24, claude-opus-4.8/max): Re-fetched (HTTP 200, full article body present in the
  snapshot) for the kp/mss/apt37 service-placement audit. This report DECLINES nation-state
  attribution and names NO service: the strings "MSS"/"Ministry of State Security"/"RGB"/
  "Reconnaissance General Bureau"/"North Korean government" do not appear as a sponsor attribution.
  The strongest origin statement is a language/tradecraft inference, verbatim: "...written in perfect
  Korean text and dialect again suggesting the origin of this group is from the Korean peninsula."
  (Its many "North Korea(n)" mentions are decoy-lure themes — e.g. the "North Korean Human Rights"
  campaign — and the South-Korean victim set, not attribution.) Supplies neither a service nor even a
  DPRK-government attribution; supports the actor demotion kp/mss/apt37 -> kp/unscoped/apt37.
