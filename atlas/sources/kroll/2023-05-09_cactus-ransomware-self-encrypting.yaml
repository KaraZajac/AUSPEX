notes: |
  Kroll Cyber Threat Intelligence bulletin — the first public
  documentation of the CACTUS ransomware family: Kroll coined the
  name and detailed the self-encrypting encryptor and the VPN-
  appliance initial-access pattern.
  AUDIT (2026-07-02, claude-opus-4.8/max): url RESTORED (was null)
  + raw snapshot captured + sha256 verified (352,077 bytes,
  31b196a5…e83b43a6). The page now fetches HTTP 200 with a standard
  browser User-Agent — the prior "Cloudflare-blocked, url:null"
  state did not reproduce. Two verbatim-checked caveats:
   (1) the live page header displays "May 10, 2023" (not the 05-09
       in this slug); first press coverage was 2023-05-07
       (BleepingComputer), so the true publication day is uncertain
       within 05-07..05-10. published_on kept 2023-05-09 to match
       the stable slug + the event's attribution_date.
   (2) the bulletin does NOT contain the word "Fortinet" (grep=0);
       it says only "documented vulnerabilities in VPN appliances."
       The Fortinet specificity comes from Kroll's statement to
       BleepingComputer (2023-05-07), now cited alongside on the
       event.
  Verbatim support:
   - "Kroll has identified a new ransomware strain which we're
     calling CACTUS, active since at least March 2023."
   - "CACTUS has been observed leveraging documented vulnerabilities
     in VPN appliances in order to gain initial access."
   - "Kroll Cyber Threat Intelligence analysts have identified a new
     strain of ransomware, named CACTUS, targeting large commercial
     entities since March 2023."
   - "The ransomware encryptor is novel in that it requires a key to
     decrypt the binary for execution, likely to prevent detection
     via anti-virus software."
   - "In all cases observed, the threat actor's access was obtained
     from a VPN server with a VPN service account."
  TIER FLAG: this is first-party vendor ORIGINAL research (Kroll's
  own incident-response data; they discovered + named the family) —
  arguably tier: primary, but PRESERVED as secondary per the audit
  instruction; orchestrator to adjudicate.
