notes: |
  Retrospective academic case-study (arXiv:2409.19194 v1) of the 20 March 2013
  DarkSeoul cyberattack, added 2026-07-05 as a reachable, snapshot-able corroborating
  anchor for event 2013-03/darkseoul (whose two primary vendor sources — Symantec
  "Four Years of DarkSeoul" and McAfee "Operation Troy" — are both un-snapshottable:
  Broadcom 404 link-rot / Akamai 403 bot-wall, archive.org blocked for this audit).
  Corroborates verbatim: victims ("Approximately 48,000 systems were affected across
  key institutions, including Shinhan Bank, Nonghyup Bank, and major media outlets such
  as YTN, KBS, and MBC"); MBR wiper ("a Master Boot Record (MBR) wiper ... erased the
  data on infected PCs"); AhnLab patch-management distribution vector ("the RAT was
  deployed on a server running patch management software developed by AhnLab. It is
  suspected that the attackers used this server to distribute their malware"); AhnLab
  AND Hauri as antivirus products the malware disabled ("sought out antivirus programs
  commonly used in South Korea, such as AhnLab and Hauri, attempting to disable them");
  the ROK/DPRK attribution and its basis ("South Korean investigators ultimately
  attributed the attack to North Korea"; KISA: "22 of the IP addresses used in the
  DarkSeoul attack had been involved in previous attacks attributed to North Korean
  hackers since 2009"); and the DarkSeoul->Lazarus mapping ("the Lazarus Group was
  identified as the likely perpetrator"). Note: this paper cites ~48,000 affected
  systems; Symantec/press and Wikipedia cite ~32,000 — the event retains 32,000
  (the Symantec figure) and flags the ~32,000-48,000 range in its qc notes.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured (89,358 bytes),
  content_sha256 b7e86340...569d0a71; genuine DarkSeoul case study (DarkSeoul x76,
  AhnLab x4, North Korea x23, MBR x12, all six victims present).
