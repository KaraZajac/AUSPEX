notes: |
  Academic case study by Kyong Jae Park, Sung Mi Park and Joshua I.
  James (arXiv:1711.04500, 13 Nov 2017). AUDIT (2026-07-05,
  claude-opus-4.8/max): PDF captured + hashed. Load-bearing for the
  ROK Cyber Command establishment event's causal tie to the July 2009
  (7.7) DDoS: verbatim "The Cyber Command was created under the Korean
  Defense Intelligence Agency (DIA) on January 1, 2010 in response to
  the 7.7DDOS (July 1, 2009) attack allegedly committed by North Korea.
  In September 2011, the Cyber Command came under the control of the
  Korean Ministry of National Defense which is in charge of the command
  and control of the Korean Armed Forces." (Day is rounded to Jan 1;
  Korean-language references give the exact founding date as 11 Jan 2010,
  used in the event.) Also enumerates the command's four public units
  including "Psychological warfare (Corps 530)" — the unit at the centre
  of the 2012 presidential-election online-messaging scandal.
