notes: |
  Meta first-party newsroom post on its security work during the invasion.
  Two distinct items: (1) removal of a coordinated-inauthentic-behavior
  network "run by people in Russia and Ukraine targeting Ukraine" (fake
  news personas — a SEPARATE actor, not Ghostwriter); and (2) the
  Ghostwriter account-targeting item load-bearing for the citing event.

  AUDIT (2026-07-10, claude-opus-4.8/max): raw snapshot captured (sha256
  745eb1ad…20456641, 481,398 B).
  Load-bearing verbatim quote (from the captured raw):
    • "In the past few days, we've seen increased targeting of people in
      Ukraine, including Ukrainian military and public figures by
      Ghostwriter, a threat actor that has been tracked for some time by
      the security community."
  IMPORTANT precision: Meta names ONLY "Ghostwriter" — it does NOT name
  Belarus (0×), UNC1151 (0×), Poland/Polish (0×), or "credential" (0×) in
  the body. So Meta is NOT one of the vendors that "explicitly named
  Belarusian-aligned operations" (Google TAG and CERT-UA/BleepingComputer
  do; Meta does not). Byline/date: "February 27, 2022" (visible byline),
  updated "March 2, 2022"; the OpenGraph article:published_time is
  2022-02-28T05:00:21Z (28 Feb UTC = evening of 27 Feb US-Pacific).
