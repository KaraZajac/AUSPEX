notes: |
  Facebook public attribution of APT32 to a Vietnamese IT firm
  named CyberOne Group, with disruption of associated accounts,
  pages, and malware-laden Android applications.
  AUDIT (2026-06-24, claude-opus-4.8/max): Attributes the activity to a PRIVATE IT
  contractor / front company, NOT a state intelligence service. Verbatim: "Our investigation
  linked this activity to CyberOne Group, an IT company in Vietnam (also known as CyberOne
  Security, CyberOne Technologies, Hành Tinh Company Limited, Planet and Diacauso)." Names no
  TC2 / Tổng cục II / Ministry of Public Security / military intelligence and asserts no
  state-service tasking. Supports the demotion vn/tc2/apt32 -> vn/unscoped/apt32 (a named
  private company is not a basis for the TC2 service id). sha256 is of the captured snapshot.
