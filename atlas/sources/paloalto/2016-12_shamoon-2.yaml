  endpoint-count audit: the "30,000 or more systems" figure is attributed
  to the 2012 attack ("The attack four years ago resulted in 30,000 or more
  systems being damaged"), NOT to Shamoon 2. ATTRIBUTION: this post does
  NOT name APT33 or attribute to Iran — it says only "threat actors likely
  associated with the Shamoon attack campaign," and its one Iran pointer is
  "completely speculative" ("shinu ... a village name in northwestern Iran").
