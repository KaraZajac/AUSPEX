notes: |
  CERT-UA follow-on advisory documenting ongoing UAC-0050
  operations through 2023–2024.

  AUDIT (2026-06-24, claude-opus-4.8/max): cert.gov.ua is a
  JS-rendered Vue SPA — curl/WebFetch return only the empty app
  shell (backend JSON-API endpoint guesses all 404) and
  archive.org is blocked, so the advisory text could not be
  captured directly (no faithful raw_snapshot possible). CERT-UA's
  attribution is corroborated via trackers that quote it: per
  CERT-UA (quoted by BushidoToken, 2024-03-06) UAC-0050 ("The
  DaVinci Group") is a "Russian-speaking mercenary organization"
  with "ties to Russian law enforcement"; Malpedia (same CERT-UA
  advisories) gives no national attribution and no Belarus/KGB
  mention. FINDING: does NOT name the Belarusian KGB; CERT-UA's
  framing is Russia-nexus mercenary, not Belarus. Corroboration
  snapshots: _corrob__bushidotoken__uac-0050-davinci.html
