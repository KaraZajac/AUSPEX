notes: |
  CERT-UA follow-on advisory documenting ongoing UAC-0050
  operations through 2023–2024.

  AUDIT (2026-06-24, claude-opus-4.8/max): cert.gov.ua is a
  JS-rendered Vue SPA — curl/WebFetch return only the empty app
  shell (backend JSON-API endpoint guesses all 404) and
  archive.org is blocked, so the advisory text could not be
  captured directly (no faithful raw_snapshot possible). CERT-UA's
  attribution is corroborated via trackers that quote it: per
  CERT-UA (quoted by BushidoToken, 2024-03-06) UAC-0050 ("The
  DaVinci Group") is a "Russian-speaking mercenary organization"
  with "ties to Russian law enforcement"; Malpedia (same CERT-UA
  advisories) gives no national attribution and no Belarus/KGB
  mention. FINDING: does NOT name the Belarusian KGB; CERT-UA's
  framing is Russia-nexus mercenary, not Belarus. Corroboration
  snapshots: _corrob__bushidotoken__uac-0050-davinci.html
  (sha256 1ec3d51e5020ce6c483f29653af253c7828d290d3befff03db2c7ef7b4fdea43),
  _corrob__malpedia__uac-0050.html
  (sha256 8cfac383d73871b0dbf2e5521a2d68c8d0105b2da6600d0b3bf314babc70b4c6).
  Used in the by/kgb/uac-0050 -> by/unscoped/uac-0050 demotion.

  AUDIT (2026-07-04, claude-opus-4.8/max): PHANTOM CONFIRMED — this
  article does not exist. The 2026-06-24 audit could not see past
  the SPA shell, but the site's own JSON API (endpoint discovered
  in main-es2015.*.js) is dispositive:
  https://cert.gov.ua/api/articles/byId?id=4490832 returns status
  409 "Article not found with id 4490832", while the same endpoint
  serves real articles (6276824, 6277063) in full. CERT-UA's
  article-search API lists every UAC-0050 advisory: none is dated
  2024-01-15 and none has id 4490832; neither BushidoToken's nor
  Malpedia's UAC-0050 pages (snapshots above) cite 4490832. The
  title/date of this record appear to be fabricated around two real
  advisories that bracket the claimed window: article 6276824
  (CERT-UA#8338, 2023-12-21, Remcos via "Заборгованість Київстар" /
  "Запит СБУ" lures) and article 6277063 (CERT-UA#8453/#8494,
  2024-01-11, Remcos/Quasar/RemoteUtilities "Запит" waves). Event
  2024-01/uac-0050-remcos-mass-distribution re-pointed to the new
  records cert-ua/2023-12-21_uac-0050-remcos-kyivstar-debt-sbu-request
  and cert-ua/2024-01-11_uac-0050-remcos-quasar-remoteutilities
  (both with faithful raw snapshots + sha256). ORPHANING: after the
  event re-point the only remaining referencer is
  atlas/actors/ru/uac-0050.yaml (actor edits are outside event-audit
  scope) — orchestrator should re-point the actor's sources and
  retire this record. The archive_url above is a wayback capture of
  the SPA shell for a nonexistent article, not article content.
