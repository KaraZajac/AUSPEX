notes: |
  CERT-UA advisory #8453/#8494 (article 6277063, dated 11.01.2024):
  mass distribution of "Запитів"-themed (request-themed) emails on
  09.01.2024 and 11.01.2024. 09.01: themes "Запит судових
  документів" (request for judicial/court documents) and "Запит" —
  one chain installs RemcosRAT via an AutoIt script (licence ID
  90A63732CBE64F87F97AC8716B711015), the other fetches QuasarRAT
  from Bitbucket via PowerShell. 11.01: theme "Запит від компанії
  Медок" (request from the Medoc company — the Ukrainian M.E.Doc
  accounting software) installing Remote Utilities. "У всіх трьох
  випадках було використано одні і ті ж сервери управління,
  розміщені в межах автономної системи AS215939." — all three
  cases shared C2 in AS215939. "Активність відстежується за
  ідентифікатором UAC-0050." Names no recipient categories and no
  sponsor/nation.

  AUDIT (2026-07-04, claude-opus-4.8/max): source record CREATED
  during phantom remediation of event
  2024-01/uac-0050-remcos-mass-distribution (the previously cited
  cert.gov.ua/article/4490832 does not exist — CERT-UA's own API
  returns 409 "Article not found with id 4490832"). raw_snapshot is
  the faithful capture of the site's own JSON API,
  https://cert.gov.ua/api/articles/byId?id=6277063 (JSON incl.
  title, date "11.01.2024", full text, IOCs; 5,019,650 bytes).
  Internal discrepancy noted: the article's teaser ("description"
  field) says the waves were on "10.01.2024 та 11.01.2024" while
  the body text ("Загальна інформація") twice dates them 09.01.2024
  and 11.01.2024; the body's detailed narrative (09.01 + 11.01) is
  treated as authoritative.
