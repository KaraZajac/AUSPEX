notes: |
  CERT-UA advisory #8338 (article 6276824, dated 21.12.2023): mass
  distribution of emails themed "Заборгованості за договором
  Київстар" (Kyivstar contract debt) and "Запит СБУ" (SBU request),
  both chains delivering RemcosRAT (licence ID
  5639D40461DCDD07011A2B87AD3C9EDD). C2 hosted on the Malaysian
  provider Shinjiru ("типового для UAC-0050" — typical for
  UAC-0050) and within AS44477 (STARK INDUSTRIES SOLUTIONS LTD).
  Names no recipient categories, no sponsor/nation, and no other
  actor names — the activity is tracked by the UAC-0050 identifier.

  AUDIT (2026-07-04, claude-opus-4.8/max): source record CREATED
  during phantom remediation of event
  2024-01/uac-0050-remcos-mass-distribution (the previously cited
  cert.gov.ua/article/4490832 does not exist — CERT-UA's own API
  returns 409 "Article not found with id 4490832"). cert.gov.ua is
  a JS-rendered SPA whose HTML is an empty app shell, but the
  site's own JSON API (discovered in main-es2015.*.js) serves the
  full article: raw_snapshot is the faithful capture of
  https://cert.gov.ua/api/articles/byId?id=6276824 (JSON incl.
  title, date "21.12.2023", full text, IOCs; 3,536,457 bytes).
  Key wording verbatim: "Урядовою командою реагування на
  комп'ютерні надзвичайні події України CERT-UA 21.12.2023
  зафіксовано масове розповсюдження електронних листів з тематикою
  \"Заборгованості за договором Київстар\""; "Окрім того,
  зафіксовано розповсюдженян [sic] листів з темою \"Запит СБУ\"";
  both "може бути уражена програмою RemcosRAT".
