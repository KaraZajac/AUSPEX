notes: |
  AUDIT (2026-07-04, claude-opus-4.8/max): created during phantom
  remediation of the event 2024-01/ghostwriter-ukraine-military-
  espionage-pivot. cert.gov.ua is a JS-rendered Vue SPA — curl of the
  canonical URL returns only the empty app shell (2,380 bytes, no
  article text) and archive.org is blocked, so the raw_snapshot is the
  OFFICIAL government mirror of the advisory instead:
  https://csirt.csi.cip.gov.ua/en/posts/uac-0057 (CSIRT of the State
  Scientific and Research Institute of Cybersecurity Technologies and
  Information Protection, "Property of the State Service of Special
  Communications and Information Protection of Ukraine" — the same
  agency family as CERT-UA; the mirror's "source" link points back to
  cert.gov.ua/article/5098518). Hash be3828a7…18e621ff, 57,332 bytes.
  Cisco Talos's 2023-07-13 post hyperlinks this exact article id as
  CERT-UA's attribution of the July campaign, independently confirming
  URL↔advisory pairing. published_on 2023-07-07 per same-day SOC Prime
  coverage (the mirror's own 31.07.2023 timestamp is a repost date; the
  advisory predates Talos's 2023-07-13 citation of it).

  Key verbatim claims (mirror text): XLS lures "PerekazF173_04072023.xls"
  and "Rahunok_05072023.xls" carrying a legitimate macro plus a macro
  that decodes, persists and launches PicassoLoader; AV check skips
  infection when Avast/FireEye/Fortinet are present; "PicassoLoader
  provided download, decryption (AES) and execution of the njRAT
  malware"; "The activity is carried out by the group UAC-0057";
  "'GhostWriter' is the name of the information operation carried out by
  the group UNC1151 (UAC-0057), which was publicly reported by the
  Mandiant company in 2020... the name 'GhostWriter' may be identified
  with the threat name/identifier UAC-0057." NB CERT-UA names the
  cluster only — no nation and no service are named in this advisory.
