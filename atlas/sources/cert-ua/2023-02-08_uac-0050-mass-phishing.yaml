id: cert-ua/2023-02-08_uac-0050-mass-phishing
kind: cert-advisory
publisher: CERT-UA (State Service of Special Communications, Ukraine)
title: UAC-0050 — Mass Phishing of Ukrainian State Institutions with Remcos RAT
url: https://cert.gov.ua/article/3804703
archive_url: "https://web.archive.org/web/20260221030810/https://cert.gov.ua/article/3804703"
published_on: 2023-02-08
retrieved_on: 2026-05-26
tier: primary
notes: |
  CERT-UA designation of the UAC-0050 cluster (later named Sticky
  Werewolf by BI.ZONE) and documentation of mass spear-phishing
  against Ukrainian state institutions.

  AUDIT (2026-06-24, claude-opus-4.8/max): cert.gov.ua serves a
  JavaScript-rendered Vue single-page app — curl and WebFetch
  return only the empty app shell (article body is loaded
  client-side; backend JSON-API endpoint guesses all return 404),
  and archive.org is blocked, so this advisory's text could not be
  captured directly (no faithful raw_snapshot possible). CERT-UA's
  own attribution wording is corroborated via authoritative
  secondary trackers that quote it: per CERT-UA (quoted by
  BushidoToken, 2024-03-06), "UAC-0050 is linked to a
  Russian-speaking mercenary organization called 'The DaVinci
  Group' … CERT-UA assessed that UAC-0050 (The DaVinci Group) has
  ties to Russian law enforcement"; Malpedia's UAC-0050 page (same
  CERT-UA advisories) gives NO national attribution and NO
  Belarus/KGB mention. FINDING: this source does NOT name the
  Belarusian KGB; CERT-UA's framing is Russia-nexus mercenary, not
  Belarus. Corroboration snapshots captured locally:
  _corrob__bushidotoken__uac-0050-davinci.html
  (sha256 1ec3d51e5020ce6c483f29653af253c7828d290d3befff03db2c7ef7b4fdea43)
  and _corrob__malpedia__uac-0050.html
  (sha256 8cfac383d73871b0dbf2e5521a2d68c8d0105b2da6600d0b3bf314babc70b4c6).
  Used in the by/kgb/uac-0050 -> by/unscoped/uac-0050 demotion.

  AUDIT (2026-07-02, claude-fable-5/max): re-verified during the
  event-census audit of 2023-02/cert-ua-uac-0050-mass-phishing.
  Fresh curl still returns only the ~2.4 KB Vue app shell (no
  article body) — still un-snapshottable; no faithful content_sha256
  recorded. Both corroboration snapshots' sha256 re-verified
  unchanged (bushidotoken 1ec3d51e…b4fdea43; malpedia 8cfac383…
  b0b4c6). Event stamped qc level: partial on this basis.
