title: |
  Cyber attack by group UAC-0057 (GhostWriter) against a state
  organization of Ukraine using PicassoLoader and Cobalt Strike Beacon
  (CERT-UA#6852)
url: https://cert.gov.ua/article/4905718
archive_url: null
published_on: 2023-06-16
retrieved_on: 2026-07-04
tier: primary
