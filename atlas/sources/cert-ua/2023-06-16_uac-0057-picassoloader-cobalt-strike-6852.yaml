notes: |
  AUDIT (2026-07-04, claude-opus-4.8/max): created during phantom
  remediation of the event 2024-01/ghostwriter-ukraine-military-
  espionage-pivot. cert.gov.ua is a JS-rendered Vue SPA — the canonical
  URL curls to an empty app shell and archive.org is blocked, so the
  raw_snapshot is the OFFICIAL government mirror of the advisory:
  https://csirt.csi.cip.gov.ua/en/posts/uac-0057-ghostwriter (CSIRT of
  the State Scientific and Research Institute of Cybersecurity
  Technologies and Information Protection, SSSCIP property; its "source"
  link points back to cert.gov.ua/article/4905718). Hash
  c8656716…28477544, 58,163 bytes. published_on 2023-06-16 per same-day
  SOC Prime coverage ("On June 16, 2023, CERT-UA researchers issued a
  new alert"); the mirror's 02.08.2023 timestamp is a repost date.

  Key verbatim claims (mirror text): PPT document "daewdfq342r.ppt" with
  a macro and "a thumbnail image with the emblem of the National Defense
  University of Ukraine named after Ivan Chernyakhivskyi" (the emblem is
  the LURE theme; the victim is described only as "the state
  organization of Ukraine"); macro drops
  "glkgh90kjykjkl650kj0.dll" = PicassoLoader, "typically used by the
  UAC-0057 (GhostWriter) group"; PicassoLoader pulls a .NET dropper that
  decrypts (AES) and launches Cobalt Strike Beacon; persistence via
  scheduled task "MicrosoftEdgeUpdateTaskMachineUA%GUID%" or a Startup
  LNK; "the attack was initiated no later than 06/09/2023"; "The malware
  management servers are located in the Russian Federation, however, the
  domain names are 'hidden' by Cloudflare" (infrastructure location, not
  a nation attribution). No nation and no service are named as the
  perpetrator.
