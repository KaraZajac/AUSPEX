notes: |
  Official SSU statement (Illia Vitiuk, Head of the SSU Cyber Security
  Department, interview with Ukrinform), dated 4 April 2024, on the
  December 2023 Kyivstar destruction. Formalizes the SBU attribution:
  "the attack on Kyivstar was carried out by the SandWorm hacker
  group, a regular unit of the russian military intelligence service"
  ("the main directorate of the general staff of the russian armed
  forces ('the GRU')"), and announces that the case file will be
  referred to the ICC in The Hague, with Vitiuk stressing "cyberattacks
  on civilian infrastructure should be recognized as war crimes." The
  first public SBU attribution to Sandworm (Jan 2024) and the
  operational scope figures (24M subscribers, wiped virtual servers/PCs,
  Solntsepyok front-claim) are carried by the companion Reuters source.
  SNAPSHOT (2026-07-10, claude-opus-4.8/max): live ssu.gov.ua curl
  returns HTTP 403 (bot-walled, 565-byte wall); snapshot is the Wayback
  capture (archive_url, 930,946 bytes, sha256 9163442f…).
