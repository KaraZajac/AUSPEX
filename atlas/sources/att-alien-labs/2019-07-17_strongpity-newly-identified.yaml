notes: |
  AT&T Alien Labs (now LevelBlue) disclosure of StrongPity
  operations active in the second half of 2018 through July 2019,
  with malicious installers of WinBox (MikroTik router admin
  GUI), WinRAR, and Internet Download Manager. Notable for
  documenting an apparent toolset rebuild following Q4 2018
  public reporting and for operational-hours analysis
  consistent with a single-timezone 7 AM – 3 PM UTC workday.
  Original AT&T URL (cybersecurity.att.com) returns errors as
  of retrieval date; CyberScoop coverage is the most stable
  secondary citation.
  AUDIT (2026-07-01, claude-opus-4.8/max): HYBRID RECORD — publisher/title name the AT&T
  Alien Labs (Tom Hegel) primary, but `url` points at the CyberScoop secondary coverage
  ("'StrongPity' hacking group does just enough to get around defenses", Sean Lyngaas).
  raw_snapshot + content_sha256 (95,456 bytes, sha 54c19791…3366ce3a) are of THAT
  CyberScoop page. The AT&T primary (cybersecurity.att.com/blogs/labs-research/
  newly-identified-strongpity-operations) is 403 bot-walled (Access Denied) and could not
  be snapshotted. What the CyberScoop page actually carries: WinBox (MikroTik router-admin
  GUI) trojanized installer, WinRAR delivery, months-long ongoing campaign vs users in
  Turkey, 2016 Belgium/Italy watering-holes, the 2018 Turkish-telecom (Citizen Lab)
  campaign, Microsoft's "Promethium" name + active-since-2012, and the KEY ATTRIBUTION
  HEDGE — Hegel: "based on the location of the victims and use of the spyware, the adversary
  could be selling its tools to multiple government organizations… in keeping with the
  proliferation of other spyware kits like FinFisher and Pegasus." It does NOT carry
  Internet Download Manager, the Q4-2018 toolset-rebuild wording, or the 7AM-3PM UTC
  operational-hours figure — those are corroborated from other mirrors (BleepingComputer,
  Threatpost) or unique to the walled AT&T primary. Left tier=secondary (url is CyberScoop).
