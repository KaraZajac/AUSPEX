notes: |
  Dragos intelligence brief (Graham / Ahlers / O'Meara, July 2024)
  disclosing FrostyGoop — "the ninth industrial control systems (ICS)
  specific malware" and "the first ICS-specific malware that uses
  Modbus TCP communications to achieve an impact on Operational
  Technology (OT)" (Golang, Windows, Modbus TCP port 502, read/write
  holding registers). Used in a January 2024 disruption attack on "a
  municipal district energy company in Ukraine": adversaries sent
  Modbus commands to ENCO district-heating controllers after
  downgrading controller firmware to "a version that lacks monitoring
  capabilities ... resulting in the Loss of View"; the controllers
  "report[ed] inaccurate measurements, resulting in the incorrect
  operation of the system and the loss of heating to customers";
  heating disrupted "to over 600 apartment buildings"; "Remediation of
  the incident took almost two days, during which time the civilian
  population had to endure sub-zero temperatures." Intrusion detail:
  access "possibly gained ... months earlier by exploiting an
  undetermined vulnerability in an externally facing router"; a
  ReGeorg-like webshell accessed predominantly via Tor; SAM registry
  hive credential theft; and in January 2024 "adversaries initiated
  L2TP (Layer Two Tunnelling Protocol) connections to Moscow-based IP
  addresses." Details were shared with Dragos by the Cyber Security
  Situation Center (CSSC) of the Security Service of Ukraine (SSU).
  NOTE: the brief names NO threat actor, group, or state (the
  Moscow-based IPs are its only nexus datum), and does NOT name Lviv,
  Lvivteploenergo, or a specific January day — victim naming and the
  22-23 Jan window are carried by the TechCrunch / BleepingComputer
  records on this event.

