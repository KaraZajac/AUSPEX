   - "a hacking attack that Chief Financial Officer Jeffrey Campbell
     described in a court filing as a 'state-sponsored data intrusion.'
     The vetting jobs had brought in $304 million in the latest 12
     months, or 22 percent of revenue" — the "state-sponsored" framing
     is USIS's OWN (its CFO, in a bankruptcy court filing), NOT a
     US-government attribution.
