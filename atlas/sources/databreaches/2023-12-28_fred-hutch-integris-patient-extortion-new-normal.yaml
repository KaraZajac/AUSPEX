  DataBreaches.net (Dissent Doe) in direct contact with the Integris
  extortionists — the attribution-critical exchange. Key quotes (raw
  snapshot sha 6fbb8b6c…5e13c46b, 162,067 bytes): "The incident did not
  involve encryption"; the strategy "seemed identical to what Hunters
  International recently used with Fred Hutchinson Cancer Center
  patients (i.e., direct contact with patients and offering to remove
  data for a relatively small fee)"; asked "So you are Hunters
  International?" the contact answered "we work with them", "with the
  contact later being more direct in saying, 'I'm not hunters.'" The TA
  claimed they "taked DA for integris" on 11/11 and that Integris
  refused to negotiate — unconfirmed: DataBreaches notes "none of their
  claims about what Integris knew and when have been confirmed or
  refuted at this point". Also documents the TA's claimed swatting
  threats against Fred Hutch patients.

