notes: |
  Dissent, 2024-05-24 (updated through 2024-06-21). Multi-state
  tally of Cencora/Lash Group client notifications to state
  attorneys general (Texas, New Hampshire, Montana,
  Massachusetts): 15 clients identified as of 05-24 with partial
  numbers totalling "already 542,062 patients affected"; largest
  single filer Bristol Myers Squibb and/or its Patient Assistance
  Foundation (256,237 Texans + 11,503 New Hampshire + 8,388
  Montanans). Later update on the same page: "The partial total
  is now 1,066,071 for 37 entities. We will no longer be updating
  this page with totals." Lash Group substitute notice: affected
  data "including potentially first name, last name, date of
  birth, health diagnosis, and/or medications and prescriptions";
  "There is no evidence that any of this information has been or
  will be publicly disclosed". Also: "no group has as yet
  publicly claimed responsibility for the attack"; per Reuters,
  AmerisourceBergen Specialty Group said stolen information was
  connected to a prescription supply program of its now-defunct
  subsidiary Medical Initiatives Inc.
