notes: |
  Contemporaneous news report carrying the ROK-side attribution of
  the 2017 South Korean cryptocurrency-exchange hacks to North
  Korea. Load-bearing source for event 2017-12/sk-crypto-exchange-
  thefts: the KISA -> North Korea attribution, the named victim set
  (Bithumb, Yapizon, Coinis), and the BlueNoroff/Lazarus subgroup
  naming. Verbatim (raw sha256 d9860595…, 428,705 bytes):
  - "Korea Internet and Security Agency (KISA) attributed the first
    attack on Youbit, which resulted in the loss of 4,000 bitcoins,
    to hackers based in North Korea." (nation-level ROK govt
    attribution)
  - "Cryptocurrency exchanges from neighboring South Korea … appear
    to be the main target of the hackers, with the country's
    largest exchange platform, Bithumb, hacked in July."
  - "Other Seoul-based bitcoin exchanges, including Yapizon and
    Coinis, have also been the target of cyber thieves suspected of
    being from North Korea this year."
  - "Cybersecurity researchers tell Newsweek that the activity is
    part of a worrying trend relating to hackers from Bluenoroff, a
    subgroup of the North Korean hacking group Lazarus, famous for
    the Sony Pictures hack in November 2014."
  NB the article ALSO says "Around $72 million worth of bitcoins
  were stolen from … Youbit in April" — this is a Dec-2017
  mark-to-market of the ~4,000 BTC April loss (the article's own
  next sentence gives "the loss of 4,000 bitcoins"); the
  contemporaneous value was ~$5M (cf. Security Affairs). AUSPEX uses
  the ~$5M contemporaneous figure, not the $72M retrospective mark.
