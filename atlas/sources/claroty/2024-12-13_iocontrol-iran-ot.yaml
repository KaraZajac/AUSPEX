notes: |
  Team82 deep-dive on IOCONTROL, a custom-built Linux-based
  malware platform attributed to CyberAv3ngers (IRGC-CEC). The
  sample was obtained from a fuel-management-system compromise
  affecting Israeli- (Orpak) and US- (Gasboy) made systems. The
  malware is modular, targets IoT and OT devices including IP
  cameras, routers, PLCs, HMIs, firewalls, and fuel pumps from
  D-Link, Hikvision, Red Lion, Orpak, Phoenix Contact, Teltonika,
  and Unitronics, and uses MQTT for C2 communications.

  URL fix (2026-05-28): canonical slug is "cyberweapon" (one word)
  not "cyber-weapon".
  AUDIT (2026-07-05, claude-opus-4.8/max): raw HTML snapshot captured
  (847f0554…d5df5e7e, 148,882 bytes). REAL article (not a phantom) —
  carries every event claim: custom Linux-based modular platform;
  sample extracted from a Gasboy fuel-control system tied to Orpak;
  device/vendor list (IP cameras, routers, PLCs, HMIs, firewalls;
  Baicells, D-Link, Hikvision, Red Lion, Orpak, Phoenix Contact,
  Teltonika, Unitronics); MQTT C2 (port 8883) disguising attacker
  traffic; "several hundred Israel-made Orpak … and U.S.-made Gasboy
  fuel management systems in Israel and the United States." Claroty
  attributes to "a threat actor group linked to Iran known as the
  CyberAv3ngers" (hedged: "allegedly"/"believed to be") and names
  IRGC-CEC only by relaying the Feb-2024 Treasury sanctions — it does
  NOT name IRGC-IO, and makes NO Sandworm/Industroyer comparison.
  tier/url/keys preserved.
