notes: |
  Team82 deep-dive on IOCONTROL, a custom-built Linux-based
  malware platform attributed to CyberAv3ngers (IRGC-CEC). The
  sample was obtained from a fuel-management-system compromise
  affecting Israeli- (Orpak) and US- (Gasboy) made systems. The
  malware is modular, targets IoT and OT devices including IP
  cameras, routers, PLCs, HMIs, firewalls, and fuel pumps from
  D-Link, Hikvision, Red Lion, Orpak, Phoenix Contact, Teltonika,
  and Unitronics, and uses MQTT for C2 communications.

  URL fix (2026-05-28): canonical slug is "cyberweapon" (one word)
  not "cyber-weapon".
