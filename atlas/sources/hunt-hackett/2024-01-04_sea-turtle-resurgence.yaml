notes: |
  Hunt & Hackett's documentation of the 2023 Sea Turtle resurgence
  against Dutch ISPs serving Kurdish-diaspora customers.
  AUDIT (2026-06-25, claude-opus-4.8/max): re-read the captured raw snapshot for the Sea Turtle
  service audit. Hunt & Hackett attributes Sea Turtle at the nation level only — "Turkey based" /
  "aligned with Turkish interests" — and NEVER names the MIT or any specific Turkish intelligence
  service/agency: "Hunt & Hackett believes that Sea Turtle is a Turkey based Advanced Persistent
  Threat (APT) actor that is motivated by espionage"; the campaigns are "believed to have been
  orchestrated by a cyber threat actor operating in alignment with Turkish interests"; the actor
  pursues "intelligence gathering aligned with strategic Turkish interests … with the aim of
  advancing Turkey's interests." No occurrence of "MIT", "İstihbarat", "Teşkilat", or "National
  Intelligence Organization". This is the canonical "Turkey-nexus / aligned-with-Turkish-interests"
  framing, not an MIT naming — used to support demoting tr/mit/sea-turtle → tr/unscoped/sea-turtle.
