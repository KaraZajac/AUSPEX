notes: |
  AUDIT (2026-06-30, claude-opus-4.8/max): primary source (Marriott's own statement,
  filed with the SEC) for the breach-scale revision. Snapshot captured + hashed.
  Verbatim: the Nov-2018 disclosure "believed the incident involved information about
  up to approximately 500 million guests who made a reservation at a Starwood property
  on or before September 10, 2018"; the January update: "Marriott has identified
  approximately 383 million records as the upper limit for the total number of guest
  records that were involved in the incident" (Marriott adds that far fewer unique
  guests were involved, due to duplicate records). Establishes the ~383M revised
  upper-limit figure and the September 10, 2018 reservation boundary. Does not name a
  perpetrator (company incident notice, not an attribution).
