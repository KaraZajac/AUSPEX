notes: |
  Colin Demarest / C4ISRNET. Reports a three-month CNMF Hunt Forward
  deployment to Latvia, "the second such endeavor in the former
  Soviet state," which "wrapped up 'recently,' U.S. Cyber Command
  announced May 10" (2023); CNMF worked alongside CERT.LV and the
  Canadian military. NB: this is the DOCUMENTED Latvia hunt and it
  is a 2023 event (announced 2023-05-10); the article explicitly
  calls it the second Latvia hunt, so a first Latvia hunt is
  referenced but is NOT dated in reachable reporting. Used to
  source the Latvia component of
  2022-03/hunt-forward-lithuania-latvia-croatia — see the event's
  qc notes and the DATE/GROUPING flag (Latvia's documented hunt is
  2023, not 2022).
