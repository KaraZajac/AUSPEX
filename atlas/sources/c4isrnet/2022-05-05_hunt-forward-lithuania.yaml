  Colin Demarest / C4ISRNET (Sightline Media). Reports USCYBERCOM's
  first-ever Hunt Forward Operation in Lithuania, conducted by the
  Cyber National Mission Force with Lithuania's National Cyber
  Security Center and defense IT service; a three-month hunt that
  began before Russia's late-February 2022 invasion and concluded
  in early May 2022 (CNMF commander Maj. Gen. Joe Hartman statement
  dated May 4, 2022). Used to re-source the Lithuania component of
  2022-03/hunt-forward-lithuania-latvia-croatia (phantom cumulative
  cybercom.mil news-index citation replaced).
