notes: |
  France's first public state attribution of APT28 operations against
  French entities — the diplomatic condemnation companion to ANSSI/CERT-FR's
  technical report CERTFR-2025-CTI-007 (published the same day). This is the
  source that names the GRU; the ANSSI report attributes APT28 only to "the
  Russian Federation" (citing the EU High Representative).

  AUDIT (2026-06-25, claude-opus-4.8/max): Article body is JS-rendered — the
  live diplomatie.gouv URL returns HTTP 200 but serves a portal shell with no
  attribution text (raw curl captured 0 attribution-term hits; FR + EN both),
  so no raw_snapshot/content_sha256 captured (unfetchable body; archive.org
  fetch blocked per protocol). The official wording is corroborated verbatim
  across Industrial Cyber, The Record (Recorded Future News), Infosecurity
  Magazine, and The Defense Post:
  Verbatim attribution quote (MEAE, 29 Apr 2025): "France condemns in the
  strongest terms the use by Russia's military intelligence service (GRU) of
  the APT28 attack group, at the origin of several cyberattacks on French
  interests." Foreign Minister Jean-Noël Barrot: "The GRU has been carrying
  out cyberattacks against France for several years using a method known as
  APT28." NB: France's own statement names the GRU but does NOT name "Unit
  26165" — Unit 26165 is the established analyst/MISP-galaxy placement of
  APT28, not France's wording. France named ~10 French entities targeted since
  2021 (public services, private companies, a sports organisation involved in
  Paris-2024 Olympic preparations); later reporting refined the count to 12.
