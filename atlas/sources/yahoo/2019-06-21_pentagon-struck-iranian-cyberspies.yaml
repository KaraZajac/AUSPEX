notes: |
  Yahoo News scoop that FIRST reported the June 2019 US Cyber Command
  strike on Iran (both WaPo and NYT explicitly credit Yahoo News as the
  first to report). Added to the atlas 2026-07-10 during the
  iran-retaliation-tanker event audit; the live news.yahoo.com URL 308-
  redirects to a JS shell, so the raw was captured from the 2019-06-22
  Wayback raw (id_) capture. Byline: Jenna McLaughlin, Zach Dorfman and
  Sean D. Naylor, Yahoo News, June 21, 2019. Verbatim lede: "On Thursday
  evening, U.S. Cyber Command launched a retaliatory digital strike
  against an Iranian spy group that supported last week's limpet mine
  attacks on commercial ships, according to two former intelligence
  officials. The group, which has ties to the Iranian Revolutionary Guard
  Corps, has over the past several years digitally tracked and targeted
  military and civilian ships passing through the economically important
  Strait of Hormuz." Records that Trump "pulled back before any missiles
  were launched when he learned 150 Iranians might die," and that "The
  National Security Council declined to comment on the Iranian cyber
  group or the U.S. Cyber Command response" (NSA/CENTCOM/Navy deferred to
  CYBERCOM; CYBERCOM did not respond) — i.e. the operation was never
  officially confirmed.
