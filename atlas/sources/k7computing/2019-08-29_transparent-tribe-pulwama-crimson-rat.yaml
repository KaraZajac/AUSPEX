notes: |
  K7 Labs (K7 Computing, Indian AV vendor) analysis of a Transparent
  Tribe / APT36 spear-phishing operation in the immediate Pulwama /
  Balakot crisis window (Feb-Mar 2019). This is the load-bearing
  primary/secondary source for the 2019-03 post-Pulwama tempo event.
  AUDIT (2026-07-11, claude-opus-4.8/max): snapshotted HTTP 200,
  108,404 B, sha256 1cc83f76…6e0c16b6; on-page byline + JSON-LD
  datePublished "2019-08-29T03:52:51+00:00". Verbatim load-bearing
  quotes recovered from the raw:
    - Crisis timeline: "14 th February , Pulwama attack, a convoy of
      vehicles carrying Indian CRPF security personnel was attacked by a
      suicide bomber who belonged to the group Jaish-e-Mohammed. 26 th
      February , Balakot airstrike, Indian Air Force crossed LoC and
      dropped bombs on Jaish-e-Mohammed training camps."
    - The operation: "28 th February , K7 Labs discovered a Transparent
      Tribe spear phishing document titled
      'Exclusive_Pictures__destruction_of_Jaish_Camp_and_dead_bodies_of_terrorists'
      dropping Crimson RAT." Framed as "during the period surrounding
      India's airstrike on Balakot, a retaliation to the Pulwama attack."
    - Payload/tradecraft: "the embedded macros in these documents dropped
      Crimson RAT, a Remote Access Trojan which provides an adversary
      unauthorised access to a victim's device over a network."
    - Later same-year activity: "On July 8, 2019, K7 Labs observed two
      unique documents submitted from within India."
    - Victimology: "These documents were probably used for targeting CLAWS
      (Centre for Land Warfare Studies)" (Indian Army think-tank); actor
      "conducts cyber espionage activities on the Indian government,
      diplomats and military entities."
    - Attribution (HEDGED, no service named): "This APT group has been
      active since 2013 and its interests align with Pakistan." The page
      contains NO occurrence of "ISI" or "Inter-Services Intelligence" —
      supports the pk/unscoped/transparent-tribe placement (country-level
      Pakistan nexus, no organ named).
