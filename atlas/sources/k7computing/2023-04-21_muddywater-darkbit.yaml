notes: |
  Technical analysis of the DarkBit sample. Verbatim: "This DarkBit
  ransomware sample is written in GoLang" (carries the Golang claim) and
  "An Iranian APT group, named MuddyWater, is reportedly behind the DarkBit
  ransomware" (independent, hedged MuddyWater attribution; "reportedly").
  Shows Windows-only tooling (PrintBrm.exe DLL side-load, vssadmin.exe
  shadow-copy deletion) and an HR-themed lure (HR-Update.zip); NO ESXi /
  Linux variant in the analyzed sample — corroborating that the Technion
  deployment was Windows-focused and that the "esxi.darkbit" encryptor was
  a later capability. Snapshot HTTP 200, 104,983 B.
