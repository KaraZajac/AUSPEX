notes: |
  Fox-IT (later NCC Group) report on a PRC-nexus operator
  matching the cluster Trend Micro / FireEye track as APT20.
  Documents multi-year access to government entities, MSPs,
  defense, aviation, energy, finance, healthcare and other
  verticals across 10+ countries. Notable for the operator's
  routine bypass of two-factor authentication on Pulse Secure
  VPN appliances, theft of RSA SecurID software tokens, and
  use of legitimate VPN appliances and Citrix gateways as
  staging infrastructure.
  URL corrected 2026-05-29 (Agent2): research.nccgroup.com migrated
  to nccgroup.com/research; the original /wp-content/uploads/2020/05/
  path is dead. Canonical PDF mirrored at fox-it.com/media/kadlze5c/.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify cn/mss/apt20's
  service placement. Read the full 41-page PDF (raw_snapshot captured +
  content_sha256). The report attributes APT20 at the NATION level only —
  it never names the MSS, the Ministry of State Security, the PLA, the
  Guoanbu, or any specific Chinese service or unit (confirmed by full-text
  search of the extracted PDF: no service-name hit). Executive summary:
  "Fox-IT assesses with high confidence that the actor is a Chinese group
  and that they are likely working to support the interests of the Chinese
  government and are tasked with obtaining information for espionage
  purposes. With medium confidence, Fox-IT assesses that the tools,
  techniques and procedures are those of the actor referred to within the
  industry as APT20." Introduction: "...attribute some of the previously
  unpublished techniques and tools in this report, with medium confidence,
  to a Chinese threat actor known within the industry as APT20. Based on
  the observed victims of this actor we also assess that this threat actor
  is likely working in the interest of the Chinese government." The whole
  Attribution chapter (sec. 3) grounds only Chinese ORIGIN (Chinese
  Accept-Language header; "wocao" Mandarin slang; an untranslated
  simplified-Chinese 路易斯安那州 State/Region field in fake server
  registration; code overlap with a Chinese dev blog; UTC+8/CST working
  hours — "the actor likely operates out of China"). No service named ⇒
  cn/mss/apt20 DEMOTED to cn/unscoped/apt20 on this audit.
