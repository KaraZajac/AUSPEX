notes: |
  Fox-IT (later NCC Group) report on a PRC-nexus operator
  matching the cluster Trend Micro / FireEye track as APT20.
  Documents multi-year access to government entities, MSPs,
  defense, aviation, energy, finance, healthcare and other
  verticals across 10+ countries. Notable for the operator's
  routine bypass of two-factor authentication on Pulse Secure
  VPN appliances, theft of RSA SecurID software tokens, and
  use of legitimate VPN appliances and Citrix gateways as
  staging infrastructure.
  URL corrected 2026-05-29 (Agent2): research.nccgroup.com migrated
  to nccgroup.com/research; the original /wp-content/uploads/2020/05/
  path is dead. Canonical PDF mirrored at fox-it.com/media/kadlze5c/.
