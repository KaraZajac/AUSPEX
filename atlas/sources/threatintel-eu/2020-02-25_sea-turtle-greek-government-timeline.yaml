notes: |
  Independent threat-intelligence-analyst timeline of the Sea
  Turtle campaign's compromise of ICS-Forth (the .gr ccTLD
  operator) in April 2019 and subsequent DNS-hijacking of the
  Greek Prime Minister's Office, Ministry of Foreign Affairs,
  National Intelligence Service (EYP) and Hellenic Police.
  Built on Greek-media reporting of the February 2020 official
  disclosure.
