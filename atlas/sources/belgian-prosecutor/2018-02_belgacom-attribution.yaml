notes: |
  Belgian Federal Prosecutor's 2018 finding attributing the 2010-2013
  intrusion into Belgacom (now Proximus) to UK GCHQ, codenamed
  "Operation Socialist," based on Snowden-archive material and
  Belgian forensic investigation, with the case effectively closed
  in Feb 2018. Second-attempt URL verification failed: no canonical
  Belgian Federal Prosecutor press release was located. Coverage
  preserved in The Intercept (2018-02-17), Knack, Le Soir, and
  The Register (Oct 2018 follow-up). The CCDCOE Cyberlaw Toolkit
  Operation Socialist wiki entry is a useful consolidated
  secondary reference.
