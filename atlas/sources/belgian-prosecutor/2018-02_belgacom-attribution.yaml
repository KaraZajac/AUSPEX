notes: |
  Belgian federal criminal investigation (code-named "Trinity") into the
  2010-2013 intrusion into Belgacom (now Proximus), attributed to UK GCHQ
  under the codename "Operation Socialist," based on Snowden-archive
  material and Belgian forensic work. TIMELINE CORRECTION (see AUDIT
  2026-07-11): there was no formal Belgian government attribution in
  February 2018 — as of Feb 2018 the forensic evidence "pointed toward
  the U.K., but it was not conclusive" and the case had not been
  prosecuted (The Intercept, 2018-02-17). The substantive prosecutorial
  finding surfaced in OCTOBER 2018: a confidential federal-prosecutor
  report, discussed by Belgium's National Security Council, linked three
  of the malware's command IP addresses to a British company. The slug
  retains "2018-02" (stable-slug) but the record documents the Feb->Oct
  2018 arc. No canonical Belgian prosecutor press release exists (url
  null / unsnapshottable); coverage preserved in The Intercept
  (2018-02-17) and The Register / De Standaard (Oct 2018) — both now
  captured as snapshotted secondaries on the event.
  AUDIT (2026-06-25, claude-opus-4.8/max): KEEP for the uk/gchq placement of
  uk/gchq/op-socialist-operators. UNFETCHABLE — url is null (no canonical
  Belgian Federal Prosecutor press release exists/was locatable; archive.org
  blocked for this audit), so no raw_snapshot/content_sha256 could be
  captured. The record itself documents the Feb 2018 Belgian prosecutorial
  finding attributing the 2010-2013 Belgacom (Proximus) intrusion to UK GCHQ
  under the codename "Operation Socialist." This is govt-primary corroboration
  of the GCHQ attribution; it is not the decisive evidence for this audit —
  the two fetchable primaries (intercept/2014-12-13_operation-socialist and
  spiegel/2013-09-20_socialist-belgacom, both with verified raw snapshots)
  independently name GCHQ at the named-op level. GCHQ placement stands — KEEP.
