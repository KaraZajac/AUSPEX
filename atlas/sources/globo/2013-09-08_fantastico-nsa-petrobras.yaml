  Spied Brazilian Oil Giant." Snapshot captured + hashed. Verbatim support for the cited
  event: "The internal computer network of Petrobras ... has been under surveillance by the
  NSA"; a "top secret presentation dated May 2012 ... used by the NSA to train new agents"
  naming Petrobras under "MANY TARGETS USE PRIVATE NETWORKS" alongside Google, SWIFT and the
  French foreign ministry; interception "through an attack known as 'Man in the Middle'";
  and the explicit hedge "There is no information on the extent of the spying, nor if it
  managed to access the data contained in the company's computers." Load-bearing source for
