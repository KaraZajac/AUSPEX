notes: |
  Insikt Group technical report on the late-2017 DPRK spear-phishing
  campaign against South Korean cryptocurrency users and exchanges.
  Load-bearing source for event 2017-12/sk-crypto-exchange-thefts:
  the Bithumb theft + figure, the spear-phishing / HWP tradecraft,
  and the Lazarus (Destover) code-overlap attribution. Verbatim
  (raw sha256 f7dcbdb5…, 27,174 bytes; term-scan Destover=4,
  CVE-2017-8291=5, Ghostscript=5, Hangul=5, Lazarus=19):
  - "North Korea continued to target South Korea through late 2017
    with a spear phishing campaign against both cryptocurrency users
    and exchanges …"
  - "The first known North Korean cryptocurrency operation occurred
    in February 2017, with the theft of $7 million (at the time) in
    cryptocurrency from South Korean exchange Bithumb."
  - "The first cryptocurrency-focused lure appears designed to
    obtain the emails and passwords of users of Coinlink, a South
    Korean cryptocurrency exchange."
  - "The malware in this campaign utilizes a known Ghostscript
    exploit (CVE-2017-8291) and is tailored to target only users of
    a Korean language word processor, Hancom's Hangul Word
    Processor."
  - "Upon deobfuscating the payloads, we found 32-bit DLLs built in
    part on the Destover malware code."
  - "Destover has been used in a number of North Korea-attributed
    operations: most infamously against Sony Pictures Entertainment
    in 2014, the Polish banking attacks in January 2017, and the
    first WannaCry victim in February 2017."
  - "All were created in the span of a month from mid-October to
    late November." (campaign timing)
