notes: |
  GCHQ's own announcement of the NCSC stand-up. States verbatim: the NCSC
  "became operational on 3 October 2016", "is part of GCHQ", brings together
  "CESG – the Information Security arm of GCHQ – the Centre for the Protection
  of National Infrastructure, CERT-UK, and the Centre for Cyber Assessment",
  is led by "Chief Executive Ciaran Martin", and "will be the UK's authority
  on cyber security." Page datePublished is 4 October 2016 (the day after the
  3 Oct operational date). Primary corroborating source for the
  2016-10/uk-ncsc-stand-up institutional anchor.
  AUDIT (2026-06-25, claude-opus-4.8/max): added during event audit to give
  the previously single-source establishment event a govt-primary corroborator
  that independently confirms the 3 Oct 2016 operational date and the GCHQ
  parentage/consolidation facts. Raw snapshot captured + hashed.
