notes: |
  adidas's official first-party breach notice ("Data Security
  Information", marked "published on 23 May 2025"). This is the
  primary source for the Adidas-specific scope of the May 2025
  breach. Full verbatim statement in the snapshot:
  "adidas recently became aware that an unauthorized external party
  obtained certain consumer data through a third-party customer
  service provider. We immediately took steps to contain the incident
  and launched a comprehensive investigation, collaborating with
  leading information security experts. The affected data does not
  contain passwords, credit card or any other payment-related
  information. It mainly consists of contact information relating to
  consumers who had contacted our customer service help desk in the
  past. adidas is in the process of informing potentially affected
  consumers as well as appropriate data protection and law enforcement
  authorities consistent with applicable law. ... (published on 23 May
  2025)."
  Scope limits carried by this primary source: adidas does NOT name
  the third-party provider, does NOT name Salesforce, does NOT name a
  threat actor (ShinyHunters/UNC6040), does NOT enumerate data fields
  beyond "contact information", and does NOT state the intrusion
  date or victim count.

  AUDIT (2026-07-10, claude-opus-4.8/max): live URL now HTTP 404 (the
  adidas-group.com data-security page has since rotated to cover a
  later, Feb-2026 breach); the 23-May-2025 statement is preserved via
  the Wayback snapshot (20250527084327), captured here (sha256
  f6e80296..d5f19d00, 86,020 bytes). Created this audit as the primary
  Adidas-specific source; the event previously carried only
  campaign-level sources (Mandiant, Krebs) that name no victim.
