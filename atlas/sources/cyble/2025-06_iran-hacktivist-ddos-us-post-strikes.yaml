notes: |
  Cyble vendor research aggregating Iran-aligned hacktivist DDoS
  claims against US targets in the days after the 21 June 2025 US
  strikes on Iranian nuclear facilities. Cyble observed attack
  claims against 15 US organizations and 19 websites by Mr Hamza,
  Keymous+, Team 313, Cyber Jihad, and others; Mr Hamza's claims
  (US Air Force domains, aerospace and defense companies) supported
  by check-host.net traces (10-hour downtime, 22 June), Keymous+'s
  financial-sector claims by check-host.net (one-hour downtime,
  22 June).
  AUDIT (2026-07-05, claude-opus-4.8/max): live URL is the real
  article (title "Hacktivists Launch DDoS Attacks At U.S. Following
  Iran Bombings"), NOT a phantom. Raw snapshot captured (883,494
  bytes, sha256 6db01d2a…1f3fc34a). Cyble's own wording is that it
  "observed attack claims" (not "verified") against 15 orgs / 19
  sites; only Mr Hamza and Keymous+ carried check-host.net proof;
  Team 313's Truth Social claim lacked sufficient proof; Cyber
  Jihad Movement only ANNOUNCED a #OpUSA campaign. The article also
  quotes the DHS 2025-06-22 NTAS bulletin verbatim.
