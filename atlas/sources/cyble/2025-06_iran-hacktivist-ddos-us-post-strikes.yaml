notes: |
  Cyble vendor research aggregating Iran-aligned hacktivist DDoS
  claims against US targets in the 48-hour window after the
  21 June 2025 US strikes on Iranian nuclear facilities. Cyble
  identifies attack claims against 15 US organizations and 19
  websites by Mr Hamza, Keymous+, Team 313, Cyber Jihad, and
  others; Mr Hamza's claims (US Air Force domains, aerospace and
  defense companies) supported by check-host.net traces.
