notes: |
  Belarusian opposition Cyber Partisans collective's initial public
  disclosure of operations against Belarusian government databases
  (population registry, security service personnel files, vehicle
  registry). Operational counterweight to state cyber activity in
  the Belarusian theater.
  AUDIT (2026-07-01, claude-opus-4.8/max): url `https://t.me/cpartisans`
  is the group's Telegram CHANNEL HOMEPAGE, not a deep-link to the July
  2021 disclosure post — curl returns `<title>Telegram: View
  @cpartisans</title>` with no article body, so NO content_sha256 is
  recorded (a specific post cannot be snapshotted this way). Retained as
  the genuine self-claim primary channel (also cited by the actor record
  by/cyber-partisans, so NOT orphaned) but downgraded in evidentiary role:
  the event's factual claims are now carried by added tier-1 journalism
  (MIT Technology Review 2021-08-26, RFE/RL Current Time 2021-08-03,
  CyberScoop 2022-08-31). kind stays `journalism`/self-disclosure; tier
  stays secondary (self-claim).
