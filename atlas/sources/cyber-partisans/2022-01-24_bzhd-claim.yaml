  Cyber Partisans self-disclosure of encrypting BZhD servers and
  databases on the eve of the Russian invasion of Ukraine, citing
  use of Belarusian rail infrastructure to move Russian military
  equipment.

  SNAPSHOT CAVEAT (2026-07-10): the url is the channel root; a live
  fetch returns only Telegram's public preview shell (12 KB, "КП
  архів" channel card + join prompt) and does NOT preserve the
  specific 24-Jan-2022 post. raw_snapshot captures that preview
  (sha256 50ae5352…02aa) — PARTIAL. The verbatim substance of the
  self-claim ("We encrypted some of BR's servers, databases and
  workstations to disrupt its operations"; the 50-prisoners /
  no-Russian-troops demand) is mirror-corroborated by the two
  snapshotted secondaries added to this event
  (cyberscoop/2022-01-24…, globalvoices/2022-01-25…), which quote
  the Cyber Partisans post directly.
