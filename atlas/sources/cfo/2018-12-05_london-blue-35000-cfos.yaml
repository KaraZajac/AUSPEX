  # report's specific figures verbatim: "The London Blue list included a total
  # of more than 50,000 finance executives, of whom 71% were chief financial
  # officers" (i.e. ~35,000 CFOs); majority in the US, others UK/Spain/Finland/
  # Netherlands/Mexico; "Agari estimated in its report that the scam has already
  # caused hundreds of thousands of dollars in damage"; a single bank loss-
  # prevention transaction "for more than $20,000" cited. Corroborates the
  # re-sourced event; no USD 25M+ figure appears anywhere in the source.
