notes: |
  Reports US-government assessment that Salt Typhoon's targeting
  expanded to data-center providers (Digital Realty, CISA-cataloged
  "potentially compromised") and residential ISPs (Comcast, NSA
  "likely impacted"). NB (2026-07-10 audit): this source does NOT
  mention Viasat (zero tokens) and does NOT name the MSS — it
  attributes to "different military and intelligence arms of China's
  central government". Both named companies are HEDGED agency
  assessments, not confirmed compromises.
