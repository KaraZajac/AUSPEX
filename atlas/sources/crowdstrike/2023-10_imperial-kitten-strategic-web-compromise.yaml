notes: |
  Supporting quote (attribution): "IMPERIAL KITTEN is an Iran-nexus adversary with a suspected
  connection to the Islamic Revolutionary Guard Corps (IRGC). The adversary, active since at least
  2017, likely fulfills Iranian strategic intelligence requirements associated with IRGC operations."
  Supporting quote (confidence): "CrowdStrike Intelligence attributes this activity to the IMPERIAL
  KITTEN adversary... This assessment, made with moderate confidence, is based on: The continued use
  of previously reported SWC infrastructure... Continued focus on targeting Israeli organizations in
  the transportation, maritime and technology sectors..."
  Supporting quote (Oct-2023 scope): "CrowdStrike Counter Adversary Operations has been investigating
  a series of cyberattacks and strategic web compromise (SWC) operations targeting organizations in
  the transportation, logistics and technology sectors that occurred in October 2023."
  AUDIT (2026-06-24, claude-opus-4.8/max): Verified against the captured raw snapshot (sha256 above;
  189 KB, full article body present, no JS challenge). Findings: (1) PUBLISH DATE CORRECTED
  2023-10-01 -> 2023-11-09 (byline "November 09, 2023 / Counter Adversary Operations"); Oct 2023 is
  when the OPERATIONS occurred, not the publication. Event start_date 2023-10-01 stays correct.
  (2) Attribution = "Iran-nexus" with IRGC connection only SUSPECTED, at MODERATE confidence (the
  source states "moderate confidence" verbatim). No service firmly named -> actor ir/unscoped is
  correct; attribution_level = named-actor (nation: Iran). (3) Oct-2023 SWC wave = transportation/
  logistics + technology; "maritime" is named for the broader Israeli targeting scope ("previously
  reported activity targeted organizations in the Israeli maritime, transportation and technology
  sectors" + "continued focus on... transportation, maritime and technology"); "defense" appears
  ONLY in the generic historical industry list, never tied to Israel or the Oct-2023 activity.
  (4) IMAPLoader .NET implant w/ email-based C2 over imap.yandex.com, StandardKeyboard, Discord-C2
  RAT, and a Python reverse shell via macro-enabled Excel all confirmed. Initial-access/post-exploit
  methods (one-day exploits, stolen VPN creds, SQLi, job-recruitment lures) are present but CrowdStrike
  rates them at LOW confidence ("single-source reporting that has not been corroborated").
  Prior 2026-06-23 audit note retained in substance: firm Iran-nexus, IRGC only suspected -> ir/unscoped.
