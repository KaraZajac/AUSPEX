notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Verified the actor cn/mss/liminal-panda's service placement
  against this, its only cited source. The report names NO Chinese service (no MSS, no Ministry of State
  Security, no PLA). It frames the actor purely as "a China-nexus state-sponsored actor that CrowdStrike
  Counter Adversary Operations tracks as LIMINAL PANDA," and crucially assesses even the China-nexus
  alignment at LOW confidence: "CrowdStrike Intelligence assesses LIMINAL PANDA's activity aligns with
  China-nexus cyber operations. This assessment is made with low confidence based on the following
  factors, which do not strongly indicate attribution on their own due to their non-exclusive nature."
  The listed factors are BRI-aligned targeting, Pinyin/Mandarin strings (e.g. "wuxianpinggu507"), tooling
  shared with other Chinese adversaries (SUNRISE PANDA, HORDE PANDA), and commonly-China-used VPS
  infrastructure. The only HIGH-confidence judgment concerns the SIGINT mission, not the state:
  "LIMINAL PANDA highly likely engages in targeted intrusion activity to support intelligence collection.
  This assessment is made with high confidence based on the adversary's identified target profile, likely
  mission objectives and observed tactics, techniques and procedures (TTPs)." CrowdStrike's "-PANDA"
  cryptonym = China-nexus, NOT a specific service. The report is the publication tied to Adam Meyers'
  testimony before the US Senate Judiciary Subcommittee on Privacy, Technology, and the Law on Chinese
  cyber threats; the testimony framing likewise says only "China-nexus state-sponsored actor." FINDING:
  service NOT named -> demoted actor cn/mss/liminal-panda -> cn/unscoped/liminal-panda (China nexus
  suspected at low confidence; service unsupported). Raw HTML snapshot captured + hashed (sha256 above);
  HTTP 200, full article body present.
