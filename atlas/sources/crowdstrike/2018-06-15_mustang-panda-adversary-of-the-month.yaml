notes: |
  # AUDIT 2026-06-28 (claude-opus-4.8/max): URL re-fetched live and snapshotted (162086
  # bytes, sha256 ad590b43…dd73439b). Genuine complete article (H1 "Meet CrowdStrike's
  # Adversary of the Month for June: MUSTANG PANDA", Adam Meyers, 2018-06-15) — NOT a
  # phantom. tier primary confirmed (first-party tier-1 vendor research; CrowdStrike
  # coins the name). Key verbatim support: "There are no known community or industry
  # names associated with this actor" (first public naming); "In April 2017 … targeting
  # a U.S.-based think tank"; "non-governmental organizations (NGOs) in general … uses
  # Mongolian language decoys … focus on gathering intelligence on Mongolia"; "shared
  # malware like Poison Ivy or PlugX"; ".lnk file obfuscated as a .pdf" -> "Cobalt Strike
  # beacon". NB: source names NO government/MFA victim and does NOT call the think tank
  # "China-policy" — the event's prose was corrected accordingly.
  CrowdStrike's first Western-vendor public profile of
  Mustang Panda — described as a PRC-nexus operator targeting
  the Mongolian government, a US-headquartered think tank, and
  multiple non-profit / NGO organizations. TTPs include
  weaponized LNKs, PlugX variants, and Cobalt Strike. The
  blog frames Mustang Panda as previously-tracked-internally,
  newly-publicly-named.
