notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): CrowdStrike Adversary Universe profile page for GLACIAL
  PANDA (live + curl-captured; the page itself carries no publication/last-updated date, hence
  published_on: null and archive_url: null — no Wayback copy located at capture time). Added as the
  corroborating primary-vendor source for the call-detail-records and "since at least 2018" facts that
  the originally-cited 2025 Threat-Hunting-Report *blog summary* page does NOT contain. Verbatim:
  "Since at least 2018, GLACIAL PANDA has been developing and maintaining access to telecommunications
  provider networks to obtain call detail records (CDRs) and related communications telemetry from
  telecom entities. Several identified targets are based in countries in the South China Sea (SCS)
  region, but breaches likely attributable to the adversary have occurred in North and Central
  America." Origin/motivation panel: "China, East Asia, Asia" · Objective "Intelligence Gathering" ·
  Motivation "State-Sponsored". Names NO specific Chinese service (no MSS / Ministry of State Security /
  PLA / unit) — consistent with cn/unscoped placement. Does NOT itself contain the ShieldSlide /
  trojanized-OpenSSH / hardcoded-password-backdoor / root / Linux-targeting details (those appear only
  in the gated full 2025 Threat Hunting Report PDF, not captured here).
