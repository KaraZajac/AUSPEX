notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): captured the full 41-page report PDF from the Passle URL
  (sha256 above). Read for the APT26 service-placement audit. This report attributes TURBINE PANDA /
  APT26 EXCLUSIVELY to the MSS Jiangsu State Security Department (JSSD) — a civilian service — and
  names NO PLA unit anywhere. Verbatim: "These operations are ultimately traceable back to the MSS
  Jiangsu Bureau"; "the MSS was ultimately tasked with targeting firms that had technologies
  pertaining to the LEAP-X engine"; "our culprits: the Jiangsu Bureau of the MSS (JSSD/江苏省国家安全厅)
  located in Nanjing"; "Sakula...was provided to JSSD lead operator LIU Chunliang"; closing: "how the
  MSS and its cyber operators enhance China's leapfrog development." Figure 4 is titled "MSS JSSD
  Actors"; Figure 5 "MSS Intelligence Officer and Deputy Division Director XU Yanjun." On this basis
  the actor was demoted cn/pla/apt26 → cn/unscoped/apt26 (former primary_service_id cn/pla-ssf was
  unsupported; MSS retained as additional_service_id).
