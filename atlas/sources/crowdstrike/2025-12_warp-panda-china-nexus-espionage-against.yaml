  AUDIT (2026-06-24, claude-opus-4.8/max): Captured raw (HTTP 200, 176,531 bytes; SHA-256 above).
  Supports a PRC/China nexus for WARP PANDA but names NO Chinese service — drove the demotion of the
  actor from cn/mss/warp-panda to cn/unscoped/warp-panda. The report's page title is "Unveiling WARP
  PANDA: A New Sophisticated China-Nexus Adversary"; verbatim attribution language:
  "newly identified China-nexus adversary WARP PANDA deployed BRICKSTORM malware";
  "Their operations are likely motivated by intelligence-collection requirements aligned with the
  strategic interests of the People's Republic of China (PRC)";
  "likely to support intelligence-collection efforts aligned with PRC strategic interests";
  "This assessment is made with moderate confidence based on the adversary's significant technical
  capabilities and focus on long-term access operations, which suggest they are associated with a
  well-resourced organization that has heavily invested in cyberespionage capabilities."
  The raw snapshot contains zero occurrences of "MSS", "Ministry of State Security", the Guoanbu, the
  PLA, or any named unit. ("PANDA" is CrowdStrike's China-nexus suffix, not an MSS attribution.)
