notes: |
  Halborn post-mortem of the July-2024 WazirX multisig drain.
  Added 2026-07-05 during the re-source of 2024-07/wazirx-multisig
  to carry the corrected attack vector (the prior sole citation,
  Elliptic, described no technical vector).

  AUDIT (2026-07-05, claude-opus-4.8/max): live URL fetched, raw
  captured + hashed (233,118 bytes; earliest page ISO timestamp
  2024-07-23T08:20:09). VECTOR (verbatim / close paraphrase):
  the compromised wallet was "a Gnosis Safe multisig wallet using
  a 4 of 6 signature scheme," with five keys held by WazirX and
  one by Liminal; the attacker exploited "discrepancies between
  how a transaction appeared in the Liminal interface and the
  actual transaction data," submitting "a transaction that
  appeared benign - causing the four parties to sign it - while
  including the malicious payload"; the malicious smart contract
  used to replace the multisig was "deployed by the attacker
  eight days earlier." I.e. signing-interface / blind-signing
  manipulation of legitimate co-signers, NOT private-key theft.
  Amount "nearly $235 million." The article does NOT definitively
  assign the compromise to Liminal vs WazirX, and makes NO
  threat-actor attribution (no mention of Lazarus, North Korea,
  or DPRK anywhere).
