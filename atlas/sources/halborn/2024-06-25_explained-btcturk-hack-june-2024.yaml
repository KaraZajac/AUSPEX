  AUDIT (2026-07-04, claude-opus-4-8/max): Live URL fetched + raw
  captured + hashed (242,470 bytes; publishedAt 2024-06-25T10:18:05Z in
  the page's Strapi JSON). Verbatim: "In June 2024, BtcTurk, a Turkish
  cryptocurrency exchange, was the victim of a hack. The attacker stole
  an estimated $55 million worth of cryptocurrency from the project's
  hot wallets"; "The BtcTurk incident included attacks against ten hot
  wallets associated with the exchange. The majority of the exchange's
  assets were held in cold wallets, which were unaffected by the hack";
  root cause "compromised private keys"; "the incident also had
  significant impacts on the price of some cryptocurrencies - such as
  Luna Classic - after the attacker dumped large volumes of those
  tokens"; "Binance froze over $5.3 million - roughly 10% of the stolen
  tokens - on its exchange"; "An investigation by ZachXBT also found
  that it was highly likely that the BtcTurk attackers targeted
  Sportsbet, an online casino. A few hours after the BtcTurk incident,
  Sportsbet suffered a $3.5 million theft." NO mention of Lazarus, North
  Korea, DPRK, or any nation-state actor anywhere in the article.
