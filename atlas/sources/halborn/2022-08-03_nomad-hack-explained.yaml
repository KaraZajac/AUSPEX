notes: |
  Technical post-mortem of the Nomad Replica.sol contract bug:
  an upgrade initialized trusted roots to 0x00, which also
  matches the untrusted-root default, so "all messages are
  automatically viewed as proven." Documents the chaotic
  pile-on ("many different users piled on") and the
  approximately $190M drain. Snapshot 2026-07-11: live URL
  https://halborn.com/explained-the-nomad-hack-august-2022/
  302-redirects to www.halborn.com/blog/post/... (site
  restructure, same article — url PRESERVED). Page is a
  Next.js app; the full article body is carried in the
  embedded flight-data JSON of the captured HTML (recovered
  and quoted in the event qc), not the static prose shell.
  Load-bearing claims ($190M, chaotic pile-on mechanism,
  0x00 trusted-root root cause) verified verbatim from this
  snapshot. Makes NO actor attribution (no Lazarus/DPRK).
