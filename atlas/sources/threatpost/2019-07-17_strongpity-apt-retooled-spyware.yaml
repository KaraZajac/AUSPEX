notes: |
  Secondary coverage of the AT&T Alien Labs (Tom Hegel) report "Newly Identified
  StrongPity Operations"; reachable (HTTP 200) mirror carrying the fullest quotation of
  Hegel's attribution HEDGE, used because the AT&T primary is 403 bot-walled.
  AUDIT (2026-07-01, claude-opus-4.8/max): quotes Tom Hegel verbatim — "Based on our
  findings and the findings of past reports, we can assess they likely have access to the
  capability of mass traffic manipulation and potential government involvement" and "He
  added that StrongPity is also potentially selling the malware's capability to multiple
  entities for their own white-labeled use." Also carries: initial vector = "malicious
  versions of the WinBox router management software, the WinRAR free encryption and
  file-compression utility... and other trusted"; "newer versions of WinRAR and a tool
  called Internet Download Manager (IDM) to hide the malware"; targets are "technically-
  focused types" (network/IT admins) "given these choices"; "now targeting users located
  in Turkey"; C2 over SSL. Frames the state nexus as UNRESOLVED (possible spyware vendor
  selling to multiple governments) — NOT a firm Turkish-service attribution. Does NOT
  carry the 7AM-3PM UTC operational-hours figure (unique to the AT&T primary).
