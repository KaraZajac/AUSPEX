notes: |
  Contemporaneous (1 April 2011) reporting of RSA's OWN technical disclosure of the breach,
  relaying the blog post by Uri Rivner (head of new technologies, RSA identity-protection
  division).
  AUDIT (2026-06-25, claude-opus-4.8/max): Raw HTML captured + hashed. Primary-adjacent
  confirmation of the initial-access chain from RSA itself, within weeks of disclosure:
  "The email subject line read '2011 Recruitment Plan,'" the attack "used an Adobe Flash exploit
  in an Excel file," and "the [malware] that the attacker installed was a variant of the
  well-known Poison Ivy remote administration tool, which then connected to a remote machine."
  Establishes the phishing + Flash-0-day + Poison Ivy facts at the time of disclosure (no
  attribution claim is made in this piece).
