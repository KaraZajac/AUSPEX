  Independent journalism corroborating the WOO X leg: the DPRK/
  TraderTraitor attribution (sourced to security firm Hacken, not
  just the victim), the $14M/nine-account figures, and the ETH->BTC
  laundering trail linked to shared DPRK infrastructure.
  AUDIT (2026-07-10, claude-opus-4.8/max): live URL fetched + raw
  captured + hashed (238,401 bytes; article:published_time
  2025-10-01T22:22:02Z). Verbatim: "On July 24, 2025, Taiwan-based
  trading platform WOO X became the latest victim in a bruising
  summer of crypto breaches when attackers made off with roughly
  $14 million in unauthorized withdrawals from nine user accounts".
  Verbatim (attribution): "...was carried out by a DPRK-linked actor
  tracked in law-enforcement circles as 'TraderTraitor.' Hacken says
  it is actively monitoring the on-chain movements..." Verbatim
  (laundering): "...Ethereum were sent to a wallet previously tied
  to the BingX hot-wallet exploit in 2024, itself attributed by
  investigators to North Korean-linked groups, suggesting either
  reuse of laundering infrastructure or coordination..." Confirms
  WOO X is Taiwan-based (not South Korean).
