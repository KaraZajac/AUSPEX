notes: |
  ICE/HSI companion release for the joint DOJ / HSI / German-BKA
  ChipMixer takedown (HSI Arizona was the investigating agency;
  DOJ EDPA prosecuted). Faithfully reproduces the DOJ statement's
  load-bearing facts verbatim (>$3B laundered; Vietnamese operator
  Minh Quoc Nguyen charged in Philadelphia; German BKA seized the
  back-end servers + >$46M crypto; the Aug-2017–Mar-2023 processing
  breakdown). ADDED 2026-07-02 (AUDIT) as the reachable, snapshotted
  government corroboration for the DOJ OPA primary
  (doj/2023-03-15_chipmixer-takedown), whose justice.gov URL is
  bot-walled behind an Akamai interstitial and cannot be snapshotted.
  KEY: the release attributes the Ronin/Horizon heists whose proceeds
  ChipMixer laundered to "North Korean cyber actors" (nation-level; does
  NOT name Lazarus) and lists the DPRK as ONE of several user categories
  (~37 ransomware strains, darknet markets incl. Hydra, fraud shops, and
  Russia's GRU unit 26165 / APT28). It contains NO "weapons of mass
  destruction" / "ballistic missile" / "nuclear" language — the DPRK
  nexus is stated only as a proximate stolen-funds/laundering fact.
