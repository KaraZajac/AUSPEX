notes: |
  Coverage of Google's August 5 2025 disclosure that one of
  its own corporate Salesforce instances had been compromised
  in June 2025 by UNC6040 / ShinyHunters via the voice-phishing
  campaign that Google Threat Intelligence Group had itself
  documented two months earlier. Notable for the irony /
  reflexivity: Google was a victim of the campaign it had
  publicly attributed.

