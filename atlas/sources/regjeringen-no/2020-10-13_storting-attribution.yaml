notes: |
  Norwegian Foreign Minister Ine Eriksen Soreide's formal
  attribution statement assessing the August-September 2020
  email intrusion at the Storting to Russia. Canonical
  Norwegian-government public attribution. Added by 2026-05-28
  RU/BY verification sweep (event previously had zero sources).
  AUDIT (2026-07-01, claude-opus-4.8/max): url is BOT-WALLED
  (regjeringen.no returns a Cloudflare "Just a moment…" JS
  challenge / HTTP 403 to both curl and WebFetch) — NOT
  snapshottable, no content_sha256 recorded. Claims mirror-
  corroborated: the Oct-13-2020 statement attributes the attack
  to "Russia" at the NATION level only — Søreide: "it is our
  assessment that Russia is behind the data attack against
  Stortinget" (corroborated by The Moscow Times, Al Jazeera,
  High North News, 2020-10-13). This source does NOT name
  APT28/Fancy Bear or the GRU; the named-unit attribution comes
  from the separate PST press release of 2020-12-08
  (pst-no/2020-12-08_storting-datainnbrudd-ferdig-etterforsket).
  Attribution_level for this source = nation.
