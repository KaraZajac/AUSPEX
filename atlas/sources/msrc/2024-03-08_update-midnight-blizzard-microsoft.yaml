notes: |
  MSRC follow-on update to the 2024-01-19 disclosure, reporting that the
  Midnight Blizzard (SVR / APT29) intrusion extended beyond corporate email.
  AUDIT (2026-07-02, claude-opus-4.8/max): fetched live from the URL
  (HTTP 200, 88186 bytes, sha256 715661cf…b684790e). Verbatim support:
  "Midnight Blizzard is using information initially exfiltrated from our
  corporate email systems to gain, or attempt to gain, unauthorized access.
  This has included access to some of the company's source code repositories
  and internal systems"; "Midnight Blizzard has increased the volume of some
  aspects of the attack, such as password sprays, by as much as 10-fold in
  February, compared to … January 2024." Names the actor as "Midnight
  Blizzard … also known as NOBELIUM" (Russian state-sponsored); does NOT name
  the SVR service by that name.
