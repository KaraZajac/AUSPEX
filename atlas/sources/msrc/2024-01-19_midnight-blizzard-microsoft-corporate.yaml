notes: |
  MSRC disclosure of the November 2023 Midnight Blizzard (SVR)
  compromise of Microsoft corporate email and source-code
  repositories. Initial access via password spray on a legacy
  non-production test tenant without MFA → OAuth app abuse →
  Exchange Online full_access_as_app. Companion to SEC 8-K filing.
  AUDIT (2026-06-25, claude-opus-4.8/max): captured from the live URL
  (HTTP 200). This MSRC blog does NOT name the SVR / Foreign
  Intelligence Service — it identifies the actor only as "Midnight
  Blizzard, the Russian state-sponsored actor also known as Nobelium."
  Verbatim: "Microsoft has identified the threat actor as Midnight
  Blizzard, the Russian state-sponsored actor also known as Nobelium."
  The SVR service linkage for ru/svr/apt29 is NOT carried by this source;
  it rests on the actor's three US/UK government sources that name the
  SVR explicitly (White House 2021-04-15, Treasury EO-14024,
  CISA AA23-347A — the last of which equates SVR = APT29 =
  NOBELIUM/Midnight Blizzard). This source stands as the Midnight
  Blizzard = Nobelium corporate-breach record within that established
  equivalence chain.
  AUDIT (2026-07-02, claude-opus-4.8/max): hash re-verified — on-disk
  snapshot (88014 bytes) still sha256 0dbc132b…fdf3ec8b, matches this
  record. Confirmed this Jan-19 blog carries the password-spray + legacy
  non-production test-tenant foothold + senior-leadership/cyber/legal email
  exfiltration + "information related to Midnight Blizzard itself", but does
  NOT carry the no-MFA detail, the OAuth full_access_as_app lateral path, or
  source-code access (those are in the mstic 2024-01-25 and msrc 2024-03-08
  follow-ups, now cited by the event).
