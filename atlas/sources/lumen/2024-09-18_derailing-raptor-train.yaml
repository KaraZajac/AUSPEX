notes: |
  Black Lotus Labs research that coined the botnet name "Raptor Train",
  disclosed concurrently with the FBI/DOJ takedown (2024-09-18). This is the
  source of the AUSPEX event's name.
  AUDIT (2026-07-05, claude-opus-4.8/max): HTML captured + hashed (redirected
  from blog.lumen.com/derailing-the-raptor-train/ -> www.lumen.com). Carries
  verbatim: "We call this botnet 'Raptor Train'" and it "we assess is likely
  operated by the nation-state Chinese threat actors known as Flax Typhoon";
  "At its peak in June 2023, the Raptor Train botnet consisted of over 60,000
  actively compromised devices. Since that time, there have been more than
  200,000 SOHO routers, NVR/DVR devices, network attached storage (NAS)
  servers, and IP cameras"; and "targeting U.S. and Taiwanese entities in the
  military, government, higher education, telecommunications, defense
  industrial base (DIB) and information technology (IT) sectors." Does NOT
  name Integrity Tech or a specific Chinese city/service (that attribution
  came from FBI/Treasury).
