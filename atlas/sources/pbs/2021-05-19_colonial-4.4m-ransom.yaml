notes: |
  AP wire report (via PBS NewsHour) of CEO Joseph Blount's confirmation that Colonial paid
  the ransom. Added 2026-07-10 (claude-opus-4.8/max) as the clean, snapshot-able carrier for
  the ~$4.4M paid figure and the East-Coast/impact facts that the three cited US-govt sources
  do NOT carry (FBI = one-sentence attribution; CISA AA21-131A = RaaS mitigations; DOJ = the
  BTC recovery only). URL resolved HTTP 200; raw hashed (256,033 bytes, d62fdf9b…4a8228b3).
  Verbatim support: "Colonial Pipeline confirms it paid $4.4 million to hackers"; "A ransom
  payment of 75 Bitcoin was paid the day after the criminals locked up Colonial's corporate
  network"; the attack was "discovered around 5:30 a.m. on May 7"; "It took Colonial about an
  hour to shut down the pipeline, which has 260 delivery points across 13 states and Washington,
  D.C."; "The pipeline system delivers about 45% of the gasoline consumed on the East Coast, and
  Colonial … halted fuel supplies for nearly a week. That led to panic-buying and shortages at
  gas stations from Washington, D.C. to Florida." (The 75-BTC value is dated to the day after the
  May 7 attack = May 8, consistent with DOJ's "May 8 ransom payment.")
