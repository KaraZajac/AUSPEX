notes: |
  First-party WOO X (Taiwan-based exchange) post-mortem of the
  24 July 2025 incident; published ~19 Aug 2025 ("Over the
  following three weeks..."). Primary source for the WOO X leg of
  the composite event: date, amount, account count, intrusion
  vector, DPRK attribution, and full user compensation.
  AUDIT (2026-07-10, claude-opus-4.8/max): live URL fetched + raw
  captured + hashed (171,450 bytes). Verbatim: "On July 24, 2025,
  WOO X experienced a sophisticated security incident that resulted
  in $14 million in unauthorized withdrawals from 9 user accounts.
  There is evidence that this attack was perpetrated by UNC4899, a
  North Korean state-sponsored cyber espionage group aligned with
  the Reconnaissance General Bureau and known publicly as Lazarus
  Group, TraderTraitor, and Jade Sleet. The attack began with
  social engineering targeting our development team through what
  appeared to be a legitimate open-source collaboration request."
  Verbatim (containment/compensation): "The unauthorized withdrawals
  were detected 2 hours later, immediately halted, and all affected
  users were fully compensated from WOO's treasury."
