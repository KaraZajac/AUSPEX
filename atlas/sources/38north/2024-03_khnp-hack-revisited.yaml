notes: |
  Definitive English-language case study of the December 2014
  KHNP hack by Seungmin (Helen) Lee (Stimson Center / 38 North).
  Substantive carrier of the event's facts and attribution.

  AUDIT (2026-06-25, claude-opus-4.8/max): raw HTML captured + hashed
  (sha256 f9c4a83d…73cd4). Verbatim support for the 2015-03/khnp-dprk-
  attribution event:
  - ACTOR (Kimsuky, not Lazarus): "In December 2014, the … North
    Korea cyber group Kimsuky conducted an attack on the … Korea Hydro
    and Nuclear Power (KHNP), leaking personal information of 10,000
    employees, reactor blueprints, manuals, electricity charts,
    radiation methods and more."
  - ATTRIBUTING BODY + statement (Seoul prosecutors, joint govt
    investigation; names DPRK, not an RGB service): "The Seoul Central
    District Prosecutors' Office led a joint government investigation
    and released an official statement: 'The malicious codes used for
    the nuclear operator hacking were the same in composition and
    working methods as the so-called "kimsuky" that North Korean
    hackers use,' attributing the attack to the DPRK."
  - INFRASTRUCTURE: "The emails used 20 IP addresses provided by three
    VPN companies based in Shenyang, the capital of Liaoning Province
    in China and a long-time hub for DPRK hackers. The same IP
    addresses were later used to post the stolen documents on social
    media."
  - LEAK / THREAT / TWITTER PERSONA: "Kimsuky used a Twitter account
    named 'president of anti-nuclear reactor group' to post sensitive
    documents and blueprints from KHNP and threatened to leak more
    information unless specific reactors in Gori and Wolseong were shut
    down by Christmas."
  - DATA STOLEN: "Kimsuky stole electricity charts, radiation
    estimates, reactor designs, nuclear plant blueprints, and a
    confidential thermal-hydraulic system analysis known as the Safety
    and Performance Analysis Code (SPACE)."
  - NO OT COMPROMISE: "While the attack did not directly affect power
    plant control systems, the case was the first time North Korea had
    targeted a civilian-controlled nuclear element of its critical
    infrastructure." KHNP "claimed that the intrusion did not
    compromise the safety of its reactors."
  NB the article also records a SEPARATE 2015 event — NIS attributing
  a National Assembly intrusion to the DPRK RGB — which is NOT the KHNP
  attribution and must not be conflated with it. The KHNP public
  attribution naming an organ was the prosecutors' "kimsuky"-malware
  statement (DPRK, no service named).
