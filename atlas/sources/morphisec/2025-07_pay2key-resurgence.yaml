notes: |
  ADDED (2026-07-11, claude-opus-4.8/max): the primary technical disclosure of the Pay2Key.I2P
  resurgence, by Ilia Kulmin / Morphisec Labs; JSON-LD datePublished 2025-07-08 (byline "08 Jul
  2025"). The Register (2025-07-09) and the later Halcyon/Beazley report both cite this analysis.
  Load-bearing quotes carried by this snapshot:
    - Attribution: "an Iranian-backed ransomware-as-a-service (RaaS) operation, now operating as
      Pay2Key.I2P. Linked to the notorious Fox Kitten APT group" / "Pay2Key.I2P represents a
      dangerous convergence of Iranian state-sponsored cyber warfare and global cybercrime."
      Names Fox Kitten only; "IRGC"/"Revolutionary Guard" = 0 hits; "Pioneer Kitten" not used.
    - Affiliate model: "the group offers an 80% profit share (up from 70%) to affiliates supporting
      Iran or participating in attacks against the enemies of Iran, signaling their ideological
      commitment."
    - Figures (group's own claim): "over $4 million in ransom payments collected in just four months"
      / "over 51 successful ransom payouts in four months" / "By the end of June 2025 ... the claim
      that 'Pay2Key.I2P' has made over 4$ Million and over 50 successfully conducted ransom payouts
      ... during 4 months"; "individual operators boasting $100,000 in profits."
    - Onset: "Since its debut in February 2025"; darknet "coordinated campaign on February 20, 2025";
      "presence on X (formerly Twitter) dates back to January 2025"; Linux build added June 2025.
    - Channels: "Strategic marketing on Russian and Chinese darknet forums, combined with a presence
      on X." (One reused Telegram handle noted on a single late-March forum post; "Tox" = 0 hits.)
    - Locker: "closely tied to the well-known Mimic ransomware ... ELENOR-Corp variant"; the July-2025
      sample encryptor is "enc-build.exe ... a Mimic ransomware protected with Themida." (No ChaCha20/
      Curve25519 in this report; that crypto detail is from the later Halcyon/Beazley Q1-2026 analysis.)
    - Timing/motive: "In the volatile aftermath of the Israel-Iran-USA conflict"; affiliates can
      "carry out cyber-attacks without breaking the ceasefire"; "ideological agenda is clear ... a
      tool of cyber warfare." No "Natanz"/"Fordow" mention.
