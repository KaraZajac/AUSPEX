notes: |
  Neutral (non-Israeli-aligned) AP wire primary, via NPR
  (datePublished 2021-10-27T05:31:00-04:00). Carries: "a cyberattack
  which paralyzed every gas station in the Islamic Republic was
  designed to get 'people angry by creating disorder and
  disruption'" (President Ebrahim Raisi); "Raisi's remarks stopped
  short of assigning blame for the attack, which rendered useless the
  government-issued electronic cards that many Iranians use to buy
  subsidized fuel at the pump." AP photos (Vahid Salemi) show pumps
  "turned off ... stopping sales." Added 2026-07-10 as neutral-wire
  corroboration of scope + the subsidized-card mechanism.
