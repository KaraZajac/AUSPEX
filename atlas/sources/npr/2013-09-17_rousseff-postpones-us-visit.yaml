notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): added to source the state-visit
  postponement outcome of the 2013-09/petrobras-brazil-targeting event — neither the
  Globo/Fantastico nor the WaPo Petrobras source covers the postponement, which was
  announced 2013-09-17, after the 2013-09-08 broadcast. Live curl HTTP 200, snapshot
  captured + hashed (76,501 bytes). Verbatim: "Brazilian President Dilma Rousseff
  announced she is postponing her state visit to Washington. It was scheduled for
  Oct. 23 and would have been the first state visit of President Obama's second term.
  The postponement follows revelations that the National Security Agency spied on
  Rousseff, her top aides and Brazil's state-run oil company [Petrobras]." NPR notes
  the two governments framed the trip as "postponed, not cancelled," and traces the
  underlying reporting to Glenn Greenwald's Global/Fantastico stories.
