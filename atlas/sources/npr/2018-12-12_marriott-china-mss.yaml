notes: |
  AUDIT (2026-06-30, claude-opus-4.8/max): added as a snapshot-able corroborating
  source for the Marriott/Starwood China/MSS attribution because the cited Reuters
  article is bot-walled (DataDome captcha). Snapshot captured + hashed. Verbatim:
  "Chinese state hackers most likely attacked the reservation system at Marriott's
  Starwood chain, revealing details of 500 million guests, according to people
  familiar with the U.S. investigation"; "preliminary indications show the breach was
  executed by hackers affiliated with the Chinese Ministry of State Security ... The
  MSS, an intelligence and security agency, has been behind many Chinese government
  intrusions into sensitive U.S. networks in recent years"; and the strategic-purpose
  framing "Chinese efforts dating to at least 2014 to build a database containing names
  of executives and American government officials with security clearances." Names NO
  specific hacking group (no APT10) and NO malware for the Marriott breach.
