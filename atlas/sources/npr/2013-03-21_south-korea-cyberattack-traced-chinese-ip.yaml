notes: |
  Same-week (2013-03-21) disclosure of the 20 March wiper. Documents
  the initial ROK suspicion of North Korea and the early Chinese-IP
  lead (raw carries "North Korea" and "Chinese" repeatedly). NB: the
  Chinese-IP attribution reported here was a preliminary regulator
  (KCC) finding that ROK later revised (traced to a NongHyup internal
  IP); DPRK is understood to route through Chinese addresses to
  obscure origin — this is obfuscation, not a false flag. Retained
  as context for the attribution timeline. Snapshotted + hashed
  2026-07-05 (curl 200, 75091 bytes); archive.org unreachable this
  session — raw_snapshot is the archive.
