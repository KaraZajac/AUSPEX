notes: |
  Contemporaneous disclosure of the CENTCOM Twitter/YouTube
  takeover (2015-01-12), carrying the operational facts:
  "The Twitter feed and the YouTube channel of U.S. Central
  Command were compromised on Monday"; hackers "put up Islamic
  State propaganda and switched the avatar from the CentCom logo
  to a photo of a masked fighter"; CENTCOM "viewing this purely
  as a case of cybervandalism," "operational military networks
  were not compromised," "no classified information was posted
  and ... none of the information posted came from CENTCOM's
  server or social media sites"; the hackers "released what they
  purported was a phone list of retired U.S. generals, as well
  as what appear to be presentation slides from the
  government-funded Lincoln Laboratory at MIT"; Reuters (per
  defense officials): the images "do not appear to pose a
  security threat or include classified information"; "Twitter
  and YouTube have suspended the accounts." Snapshotted mirror
  for the paywalled NYT primary disclosure.
