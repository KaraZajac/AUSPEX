notes: |
  RAND analytical commentary establishing the incident's low
  operational severity and its information/narrative effect —
  the substance behind the event's "tactically minor / propaganda
  coup" framing. Verbatim: "ISIS hackers briefly took over the
  Twitter account of U.S. Central Command (CENTCOM) on Jan. 12";
  "To hijack a Twitter account merely requires that hackers guess
  the correct password" (supports initial_vector: valid-creds —
  only the social-account credentials, not any CENTCOM system,
  were compromised); the unclassified NIPRNet and classified
  SIPRNet military networks were not breached — "no harm, no foul
  ... Not quite ... damaging to the counterinsurgency against
  ISIS"; "What ISIS did was a propaganda coup." NB: as of Feb 2015
  RAND still frames the perpetrator as ISIS — the iSight Russian
  false-flag reassessment came later (Jul 2015), which is why the
  CENTCOM->APT28 link is a later, contested overlay.
