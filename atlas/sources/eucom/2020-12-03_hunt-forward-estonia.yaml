notes: |
  AUDIT (2026-07-01, claude-opus-4.8/max): DoD/EUCOM verbatim republication of
  the U.S. Cyber Command "Hunt Forward Estonia" press release (identical title,
  Dec 03 2020 byline, photo ID 201203-F-LA132-0000, and quotes) — added as a
  reachable, hashable primary corroborant because the canonical cybercom.mil URL
  (cybercom/2020-12-03_hunt-forward-estonia) hard-blocks automated capture (HTTP
  403 Akamai). Snapshot carries verbatim: operation ran "from September 23 to
  November 6"; conducted by US "Hunt Forward" teams + "Estonian cyber personnel
  from Defense Forces Cyber Command"; "the first of its kind between the U.S. and
  Estonia"; CNMF Commander Brig. Gen. Joe Hartman quoted; strategic purpose stated
  ("Hunt Forward teams play a crucial role in U.S. Cyber Command's 'persistent
  engagement' ... The U.S. military's Defend Forward strategy leverages key
  partnerships").
