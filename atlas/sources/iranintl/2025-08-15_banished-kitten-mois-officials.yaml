notes: |
  Iran International names Yahya Hosseini Panjaki (this article's
  spelling; CPJ writes "Panjkhi") — "the ministry's deputy for
  domestic security" — as the official SUPERVISING the cyber unit,
  and ties "Handala" to "the Iranian Ministry of Intelligence's
  Domestic Security Directorate ... part of a broader cyber unit
  known as 'Banished Kitten' — also referred to as Storm-0842 or
  Dune." Also names two alleged operatives (Ali Bermoudeh, ex-FATA
  cyber police; Morteza Aftabifar, his MOIS handler). Attribution
  is "according to information obtained by the channel" — Iran
  International's own investigation, not Western IC. Audit 2026-07-10
  corrected the prior note's spelling and the "officer leading" role
  (he supervises as deputy, not leads).
