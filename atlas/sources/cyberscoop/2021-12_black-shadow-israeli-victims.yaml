notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): NEW source added on the
  RE-SOURCE of 2020-12/shirbit-leak — the HEDGED-Iran-attribution
  anchor. By AJ Vicens. Carries: Black Shadow "previously breached
  Shirbit, an Israeli insurance firm, in December 2020, demanding a
  series of escalating ransom payments that analysts suggested
  weren't motivated by money at all"; "appears to be aligned with
  Iranian government interests"; "thought to be operated in
  conjunction with the government of Iran"; "Cyber attribution is
  hard, but in this case it does look like [Iran]" (Profero's Moyal);
  SentinelOne's Amitai Ben Shushan Ehrlich: Black Shadow is "one of
  several" extortion aliases used by the group the firm calls
  "Agrius"; framing as a hack-and-leak / information operation; and
  low technical sophistication ("super weak", scanning known
  Fortinet / Microsoft vulns). Also confirms Moses Staff and Pay2Key
  are SEPARATE-but-similar groups (Check Point), not the same actor —
  refuting the event's prior fabricated equivalence. Live URL
  snapshotted (full text).

  ALSO anchors event 2021-10/cyberserve-atraf-leak (added on that
  sibling's RE-SOURCE, 2026-07-10) — this article opens on the Oct
  2021 CyberServe/Atraf breach ("data it appeared to have stolen
  from an Israeli LGBTQ app"; "a larger incident at Cyberserve…
  Machon Mor Medical Institute… roughly 290,000 patients"; Atraf
  leak "included sexual orientation and HIV status… betrays the
  intent").
