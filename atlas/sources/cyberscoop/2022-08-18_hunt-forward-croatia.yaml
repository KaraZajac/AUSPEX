notes: |
  Reports the CNMF's first Hunt Forward deployment to Croatia (team
  returned the prior month, ~July 2022), working with the Croatian
  Security and Intelligence Agency (SOA) Cyber Security Centre.
  Frames hunt-forward under CYBERCOM's "persistent engagement"
  strategy and states the teams "do not mitigate threats on partner
  networks, they enable their counterparts to pursue and address the
  threats found." Cites 35 hunt-forward missions across 18 countries
  and 50+ foreign networks as of Aug 2022. Used to re-source the
  Croatia component of 2022-03/hunt-forward-lithuania-latvia-croatia.
