notes: |
  CyberScoop (AJ Vicens) report corroborating the BlackSuit attribution and
  ~$25M ransom for AUSPEX event 2024-06/cdk-global-blacksuit — an independent
  second source that breaks the prior single-source (dead Bloomberg) citation.

  AUDIT (2026-07-04, claude-opus-4.8/max): captured live (HTTP 200, 107KB).
  Verbatim support: "A cryptocurrency wallet likely controlled by BlackSuit —
  the ransomware group believed to be responsible for the attack — received
  approximately 387 bitcoin on June 21, worth roughly $25 million"; "the
  ransomware group linked to a June cyberattack against auto industry software
  provider CDK Global received a payment of more than $25 million two days
  after the attack that hobbled software used by roughly 15,000 car
  dealerships in the U.S."; the receiving address "had previously received
  funds from 'several known BlackSuit and Wizard Spider victim payments'"
  (Wizard Spider = Conti parent crew — corroborates the post-Conti lineage).
  Based on TRM Labs' crypto-tracing; TRM "findings do not conclusively prove
  that the payment came from CDK."
