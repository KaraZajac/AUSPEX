notes: |
  Shannon Vavra / CyberScoop. Documents the SECOND (2019) Montenegro
  deployment and confirms it was overtly announced. Verbatim: "The
  Pentagon once again is sending cyber personnel overseas to gather
  intelligence to help protect the 2020 presidential elections against
  foreign interference, the U.S. Embassy in Montenegro announced this
  week. U.S. European Command and U.S. Cyber Command are deploying an
  undisclosed number of defensive cyber-operators to Montenegro in order
  to gain insights into cyberthreats from adversaries before both the
  U.S. and Montenegrin elections next year." Explicitly labels the
  program: "These operations, known as 'Hunt Forward' operations, are
  relatively new for Cyber Command. Last year, along with Montenegro,
  Cyber Command also deployed personnel to Ukraine and North Macedonia
  to collect insights into adversarial cyberthreats in preparation for
  the 2018 midterm elections." Ties the threat to Russia: Montenegro and
  the U.S. "both have been targeted by the Russian government-linked
  hacking outfit APT28, or Fancy Bear." Confirms two deployments ("the
  second time in as many years"). Created 2026-07-10 to re-source
  2018-06/hunt-forward-montenegro off the phantom
  cybercom/hunt-forward-press-cumulative.
