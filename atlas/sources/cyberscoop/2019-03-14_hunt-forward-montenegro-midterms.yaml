notes: |
  Sean Lyngaas / CyberScoop. First tier-1 public confirmation, by name,
  of the 2018 CYBERCOM deployment to Montenegro. Verbatim: "As part of
  its work to protect the 2018 U.S. midterm elections from foreign
  hackers and trolls, Cyber Command personnel visited Montenegro, North
  Macedonia, and Ukraine to collaborate on network defense with those
  allies and study cyberthreats, U.S. officials confirmed to CyberScoop."
  The disclosure trail: Gen. Paul Nakasone told a House Armed Services
  subcommittee "We sent defensive teams... to three different European
  countries" (did not name them); a CYBERCOM spokesperson and Kenneth
  Rapuano (asst. sec. def. for cyber policy) supplied the names —
  Rapuano to Signal Magazine (Jan 2019): "It's the first time we've
  actually had teams on networks in Macedonia, Montenegro and Ukraine,
  for starters." Names the NATO-accession context (Montenegro a NATO
  member; Putin views NATO as encroachment). Created 2026-07-10 to
  re-source 2018-06/hunt-forward-montenegro off the phantom
  cybercom/hunt-forward-press-cumulative.
