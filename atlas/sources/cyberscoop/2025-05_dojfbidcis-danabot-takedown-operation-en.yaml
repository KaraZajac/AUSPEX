notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw HTML re-fetched (HTTP 200, Mozilla UA) and hashed;
  exact wording CONFIRMS a Russian state-tasking / proxy nexus for the DanaBot operators (CrowdStrike's
  "Scully Spider"), supporting the actor's ru/proxies placement (KEPT). The state-tasking claim is
  CrowdStrike's (named tier-1 vendor), corroborated by DOJ-disclosed evidence of a dedicated espionage
  variant. Verbatim:
  - "The DOJ said a second version of the botnet targeted computers in military, government and
    diplomatic operations. This variant targeted military officials, diplomats and law enforcement
    personnel in North America and Europe, sending stolen data to a different server than the
    fraud-oriented version of DanaBot, officials said."
  - "This mix of espionage and cybercrime distinguishes DanaBot, which CrowdStrike tracks as Scully
    Spider, from typical financially motivated operations..."
  - CrowdStrike: "Though it is unclear how the collected data was used, we think this direct use of
    criminal infrastructure for intelligence-gathering activities provides evidence that Scully Spider
    operators were acting on behalf of Russian government interests."
  - Adam Meyers (CrowdStrike SVP, Counter Adversary Operations): "It seems like the Russian government
    had access and was tasking this botnet and using it for espionage purposes... That is like a new
    level of cooperation and interconnection that I think hasn't really been publicly disclosed before."
  - "...evidence officials shared about DanaBot strongly underscores the extent to which the Russian
    government was directly involved."
  Operators named: "Aleksandr Stepanov, 39, and Artem Aleksandrovich Kalinkin, 34, both residents of
  Novosibirsk, Russia... believed to be in Russia." Scale: "more than 300,000 computers globally...
  causing at least $50 million in damage." This is the takedown article (Matt Kapko, 2025-05-22, updated
  same day with Meyers comments); the underlying CrowdStrike "Scully Spider" blog and the justice.gov
  press release are the upstream primaries it reports.
