notes: |
  CyberScoop (Greg Otto) retrospective on the REvil prosecution.
  Cited in event 2022-02/russian-carding-crackdown as the
  corroborating source for the post-invasion collapse of US–Russia
  cybercrime cooperation. Carries verbatim: "The criminal
  proceedings against REvil stretch back to January 2022, when
  Russian authorities, acting on information from the United States,
  arrested 14 people... a rare example of Russian–U.S. joint action
  against cybercrime... However, cooperation between Washington and
  Moscow later stalled amid heightened tensions over Russia's war
  with Ukraine. As a result, charges relating to computer intrusions
  and attacks on foreign companies did not progress further in
  Russian courts, with prosecutions in Russia largely focused on
  illegal use of bank card data." Added in 2026-07-01 audit.
