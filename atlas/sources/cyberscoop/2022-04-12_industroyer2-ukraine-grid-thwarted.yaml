notes: |
  Corroborating journalism for the April 2022 Industroyer2 attempt.
  Carries the two facts the ESET WeLiveSecurity blog does NOT state:
  the scale ("a grid serving 2 million people") and Microsoft's
  involvement in the response ("Analysts with Slovak cybersecurity
  firm ESET and Microsoft helped the Ukrainian government respond to
  the attack"). Attribution to Sandworm reported via Ukrainian deputy
  cyber chief Victor Zhora + ESET. Does NOT name the specific victim
  utility ("an unidentified electrical facility").

