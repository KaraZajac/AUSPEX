notes: |
  CyberScoop reports the US Department of State / Bureau of
  Political-Military Affairs administrative-debarment decision
  (dated 29 August 2022) under the International Traffic in Arms
  Regulations (ITAR) against Marc Baier, Ryan Adams, and Daniel
  Gericke — the same three individuals who entered DOJ deferred-
  prosecution agreements in September 2021. The State Department
  debar is the export-control-side enforcement complement to the
  DOJ DPA and confirms the procurement-led-capability framing at
  the US-government-export-control level. Federal Register notice
  published 29 August 2022 as document 2022-18504.

