  Supporting quote: A 20-year-old Florida man received a 10-year federal prison sentence Wednesday for his role in the notorious Scattered Spider cybercrime organization, marking the first conviction of a member from the group responsible for breaching more than 130 major companies.

  AUDIT (2026-06-25, claude-opus-4.8/max): Raw captured (sha256 above). Real headline is "Florida man
  gets 10 years in prison in first Scattered Spider sentencing" (the prior title field had reused the
  event name) — corrected. The article is dated 21 Aug 2025 (a Thursday) but says the sentence was
  handed down "Wednesday" = 20 Aug 2025; this is the SENTENCING date, distinct from the publication
  date. CyberScoop confidently names Urban a Scattered Spider (a/k/a 0ktapus, UNC3944) member but
  attributes the SS framing to security researchers / reporting, not a DOJ statement — the underlying
  DOJ M.D. Fla. release (doj/2025-08-21_palm-coast-hacker-sentenced-to-10-years) does not use the name.
  Corroborated facts: 120 months + 3yr supervised release, $13M restitution, plea to conspiracy/wire
  fraud/aggravated identity theft across Florida + California cases, ~$9.5M–$25M investigator loss range.
