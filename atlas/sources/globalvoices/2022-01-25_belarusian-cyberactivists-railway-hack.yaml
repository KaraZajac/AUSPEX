  Global Voices / Advox reporting, created 2026-07-10 to re-source the
  event off the phantom Bloomberg slug. Independently confirms the
  victim-side disruption (raw captured, sha256 962f5e6e…407a):
  - Self-claim quote: "At the command of the terrorist Lukashenka,
    #Belarusian Railway allows the occupying troops to enter our land.
    We encrypted some of BR's servers, databases and workstations to
    disrupt its operations."
  - Demands: encryption keys offered "on the condition that 50
    Belarusian political prisoners whose health was precarious were
    released and the presence of Russian troops in the country"
    prevented.
  - Victim confirmation of disruption: "the Belarusian Railway service
    reported on January 24 that electronic tickets were unavailable,
    citing undisclosed 'technical reasons.'"
