notes: |
  VIGINUM report dated 10 June 2024 disclosing "Matriochka", a
  pro-Russia influence campaign that targeted European media
  outlets and fact-checker communities by seeding apparently
  inauthentic inquiries designed to draw fact-checking
  attention to forged content (a recursive amplification
  technique). Editorially significant as a VIGINUM second-order
  attribution: not the primary fake-content cluster but the
  meta-campaign exploiting the fact-checking response surface.
  H1 verified by curl 2026-05-28.
