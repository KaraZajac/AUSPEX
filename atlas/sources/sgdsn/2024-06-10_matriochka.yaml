notes: |
  VIGINUM report dated 10 June 2024 disclosing "Matriochka", a
  pro-Russia influence campaign that targeted European media
  outlets and fact-checker communities by seeding apparently
  inauthentic inquiries designed to draw fact-checking
  attention to forged content (a recursive amplification
  technique). Editorially significant as a VIGINUM second-order
  attribution: not the primary fake-content cluster but the
  meta-campaign exploiting the fact-checking response surface.
  H1 verified by curl 2026-05-28.
  AUDIT (2026-07-04, claude-opus-4.8/max): landing page re-verified live and
  snapshotted (raw_snapshot sgdsn__2024-06-10_matriochka.html, sha256
  b3cc5d4f…b054ed1, 41603 bytes) — the REAL VIGINUM article, not a phantom or
  homepage/catalogue. EN technical report PDF also captured for fact
  verification (sgdsn__2024-06-10_matriochka_EN.pdf, sha256 9d54a761…526f8ee3,
  1454758 bytes). VIGINUM attributes at NATION level (pro-Russia; content
  first-released on Russian-language Telegram channels; "involvement of a
  foreign actor") and states "there is no technical evidence linking
  Matryoshka's operating methods to third parties" — no operator named; ASP
  (Social Design Agency) / Struktura appear only as a Washington-Post-relayed
  suspicion about the RRN campaign plus a "same actors" assumption. tier
  primary / kind govt-primary retained (VIGINUM/SGDSN first-party).
