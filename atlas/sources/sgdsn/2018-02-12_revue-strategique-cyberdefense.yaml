  Foundational Macron-era French cyber-doctrine document, published
  by SGDSN under Prime Minister Édouard Philippe on 12 February 2018.
  Establishes the four-chain French posture (protection, military
  action, intelligence, judicial) and the strict offensive /
  defensive separation. URL marked null per AUSPEX policy against
