notes: |
  VIGINUM (SGDSN) technical report dated 12 February 2024
  disclosing the "Portal Kombat" network — a coordinated set of
  at least 193 pro-Russia "information portal" websites belonging
  to one digital infrastructure, grouped into three ecosystems
  (5-site "pravda" targeting France / Germany / Poland / Spain /
  UK-US; 41-site "-news.ru" targeting Russian-speaking audiences
  in occupied and border Ukraine; 147-site "historical" dating to
  2013). The sites relay and re-syndicate pro-Kremlin content from
  Russian / pro-Russian social-media accounts, Russian news
  agencies and local institutions; VIGINUM concludes the network
  "constitutes foreign digital interference". A canonical LII /
  counter-FIMI publication. Page H1 verified by curl 2026-05-28.

