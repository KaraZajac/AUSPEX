notes: |
  VIGINUM report dated 12 February 2024 disclosing the Portal
  Kombat network — a coordinated set of approximately 193
  pro-Russia "portal" websites (pravda-prefixed and analogous
  domains) seeding aggregated Russian-state-aligned narratives
  in 11 languages targeting French, German, Polish, Spanish,
  and English-language audiences alongside Russian-occupied
  Ukrainian territories. Editorially the highest-tempo VIGINUM
  attribution to date and a canonical LII / counter-FIMI
  publication. Page H1 verified by curl 2026-05-28.
