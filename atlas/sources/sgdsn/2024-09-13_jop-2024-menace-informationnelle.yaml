notes: |
  VIGINUM post-Games synthesis report (13 September 2024) on the
  information threat surrounding the Paris 2024 Olympic and
  Paralympic Games. Attributes the bulk of the high-tempo
  pre-Games and Games-period influence activity (Storm-1516,
  Doppelganger, Matriochka-adjacent operators) to Russian-state-
  aligned actors with secondary attribution to Azerbaijani-aligned
  amplification networks. Canonical LII counter-FIMI publication
  bracketing the Games window. H1 verified by curl 2026-05-28.
