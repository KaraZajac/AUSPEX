notes: |
  Evergreen SGDSN institutional page presenting VIGINUM. Confirms
  "VIGINUM a été créé le 13 juillet 2021", "Rattaché au Secrétariat
  général de la défense et de la sécurité nationale (SGDSN)", and
  the mission "détecter et caractériser les opérations d'ingérences
  numériques étrangères qui ciblent la France" to "protéger le
  débat public numérique". The page uses no attribution/imputation
  language (corroborates that VIGINUM's mandate is detect +
  characterize, not public attribution). Used as the govt-secondary
  corroboration for the 2021-07/viginum-establishment event
  alongside the establishing décret (legifrance/2021-07-13_decret-
  2021-922-viginum).

  AUDIT (2026-07-11, claude-opus-4.8 / max): live page captured
  (HTTP 200, redirect https://www.sgdsn.gouv.fr/viginum, 49,154 B,
  sha256 d53c9c53…c072c41e). Being an evergreen page it also carries
  later state (e.g. it notes décret n° 2026-70 du 11 février 2026
  reinforcing the missions, and current staffing "65 agents") — used
  here only for the establishment-invariant facts. published_on: null
  (undated institutional page); retrieved 2026-07-11.
