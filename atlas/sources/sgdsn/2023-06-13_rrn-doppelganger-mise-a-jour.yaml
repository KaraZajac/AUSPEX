notes: |
  VIGINUM (Service de vigilance et de protection contre les
  ingérences numériques étrangères, SGDSN) public report on
  the "RRN" / Doppelganger digital-manipulation campaign,
  published 13 June 2023 (with 19 June 2023 update). The
  publication is France's foundational official attribution
  of the Doppelganger network — clone news sites impersonating
  Le Monde, Le Parisien, 20 Minutes, Der Spiegel, Bild, The
  Guardian, and other European outlets to seed pro-Russia
  narratives against Western Ukraine support. Page H1
  verified by curl 2026-05-28.

  AUDIT (2026-07-02, claude-opus-4.8/max): live URL re-fetched
  (HTTP 200, 47390 bytes, content_sha256 def29edd…41276106) and
  snapshotted. The landing page is a substantive govt-primary
  summary and links the full VIGINUM technical reports (FR/EN
  PDFs). Verified verbatim against it + the linked technical
  report: 355 typosquatted domains (registered Jun 2022–May 2023)
  across France + 8 states (Germany, UAE, US, Israel, Latvia,
  Lithuania, UK, Ukraine); four French dailies graphic-cloned
  (20 Minutes, Le Monde, Le Parisien, Le Figaro); German
  (Der Spiegel/Süddeutsche/FAZ/Bild) + UK (The Guardian) outlets
  in the domain annex; RRN media (rrussianews[.]com) registered
  10 Mar 2022; Meta's 15 Dec 2022 attribution to Social Design
  Agency (ASP) + Structura (Gambashidze) relayed in-report;
  VIGINUM's own finding = "involvement of Russian or Russian-
  speaking individuals and several Russian companies" (not a
  formal single-organ state attribution).
