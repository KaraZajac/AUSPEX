notes: |
  Cumulative reference for DoD public references to Joint Task Force
  ARES and Operation Glowing Symphony — SecDef Carter remarks Dec
  2016 and follow-on Mattis remarks 2017. Primary statements are
  scattered across DoD press transcripts; the National Security
  Archive Cyber Vault briefing book (Martelle, 13 Aug 2018,
  Briefing Book #637) is the consolidated declassified-FOIA
  collection of source documents.

  AUDIT (2026-06-25, claude-opus-4.8/max): SERVICE-PLACEMENT verified for
  us/cybercom/jtf-ares-actor — KEEP. The url resolves to the NS Archive
  consolidation (the cited Martelle Briefing Book #637, "Joint Task Force
  ARES and Operation GLOWING SYMPHONY: Cyber Command's Internet War Against
  ISIL"), the documentary home of the declassified Carter/Mattis-era orders;
  it names JTF-ARES and USCYBERCOM/Cyber Command as the conductors directly
  from the FOIA'd TASKORD/OPORDs: "ordered the establishment of a task force
  to counter ISIL in cyberspace"; "Command and control of JTF-Ares is given
  to the commander of USCYBERCOM instead of Central Command or even Operation
  Inherent Resolve"; "Operation GLOWING SYMPHONY, a USCYBERCOM activity
  authorized in late 2016 to deny the Islamic State use of the internet";
  "USCYBERCOM OPORD 16-0188 OPERATION GLOWING SYMPHONY." Confirms the cybercom
  service placement at the named-unit level. (The page does not render the
  verbatim Carter/Mattis press-transcript text — those are scattered DoD
  transcripts the briefing book consolidates — but it unambiguously attributes
  the operation to JTF-ARES/USCYBERCOM.) Raw snapshot captured + hashed.
