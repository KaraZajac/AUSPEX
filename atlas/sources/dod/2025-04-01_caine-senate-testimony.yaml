  DefenseScoop (Mark Pomerleau) coverage of retired Lt. Gen. Dan Caine's
  1 April 2025 SASC advance-policy-question responses, reporting that
  Cybercom hunt-forward missions in the SOUTHCOM AOR discovered CCP
  malware on multiple foreign partner networks. Secondary corroboration
  of the govt-primary source now on record
