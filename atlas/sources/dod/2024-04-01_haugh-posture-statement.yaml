notes: |
  CG USCYBERCOM annual posture statement to the 118th Congress,
  delivered 10 April 2024 to the Senate Armed Services Committee and,
  in near-identical form the same day, to the HASC Subcommittee on
  Cyber, Information Technologies, and Innovation
  (HHRG-118-AS35-Wstate-HaughT-20240410.pdf via congress.gov; both
  versions retrieved and compared 2026-07-04). Durable SASC permalink
  located 2026-07-04 and curl-captured (PDF, 13 pp., 324,232 bytes) —
  fills the URL nulled by the 2026-05-28 verification. Mirrors:
  nsarchive.gwu.edu and the cybercom.mil republication (article
  3739700, bot-walled to curl).

  AUDIT (2026-07-04, claude-opus-4.8/max): CORRECTION — this statement
  contains the cumulative Hunt Forward tally ONLY and names NO
  hunt-forward host country. Verbatim: "CNMF personnel have deployed
  22 times to 17 countries in partner-enabled, hunt forward operations
  that constrained adversary freedom of maneuver ... And for the first
  time in the history of the Command there were active hunt forward
  operations occurring simultaneously in all Geographic Command AORs.
  These missions led to public releases of more than 90 malware
  samples". Full-text grep of BOTH the SASC and HASC versions finds
  zero occurrences of Canada / Zambia / Kenya / Latvia / Lithuania /
  Albania (or any other host country), and no "Five Eyes" or CSE
  mention. The prior note's description of a "cumulative Hunt Forward
  tally and 2024 country list (Zambia, Canada, Lithuania-second,
  etc.)" was WRONG (no country list exists in the document) and is
  retired; any event citing this source for a country-specific hunt is
  unsupported by it. published_on corrected 2024-04-01 -> 2024-04-10.
