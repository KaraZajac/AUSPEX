notes: |
  UK sanctions on GRU Unit 26165 (85th Main Special Service Center)
  and officer Dmitry Badin for the May 2015 Bundestag intrusion.
  Coordinated with German arrest warrant for Badin.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw HTML captured + hashed
  (79,623 bytes). Real gov.uk press release (og:title "UK enforces
  new sanctions against Russia for cyber attack on German
  Parliament"). VERBATIM: "asset freezes and travel bans against two
  Russian GRU officers and the GRU's military intelligence unit 26165
  – codenamed APT28 and Fancy Bear – which were responsible for the
  2015 cyber attacks on Germany's Parliament"; "In April and May 2015
  the German federal parliament (Deutscher Bundestag) was attacked,
  during the attack a significant amount of data was stolen and the
  email accounts of several MPs as well as Chancellor Angela Merkel
  were affected. NCSC assess with high confidence that the GRU was
  almost certainly responsible." NOTE: the page names UNIT 26165 and
  "two Russian GRU officers" but does NOT print the officers' names
  (no "Badin" on the page) and says "significant amount of data" NOT
  "16 GB" — those specifics are carried by the bellingcat / ccdcoe /
  netzpolitik sources instead.
