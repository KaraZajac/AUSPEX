notes: |
  UK Foreign & Commonwealth Office statement (Minister Lord Ahmad), 15 Feb
  2018 — the co-ordinated same-day UK half of the Five-Eyes NotPetya
  attribution (the White House statement is the US half:
  whitehouse/2018-02-15_notpetya-attribution). Carries the UK NCSC
  "almost certainly" assessment and the "Russian military" attribution
  cited in the event's first attribution entry (attributing_org
  "White House / UK NCSC").

  Supporting quotes (verbatim):
  - "The UK Government judges that the Russian Government, specifically the
    Russian military, was responsible for the destructive NotPetya
    cyber-attack of June 2017. The attack showed a continued disregard for
    Ukrainian sovereignty. Its reckless release disrupted organisations
    across Europe costing hundreds of millions of pounds."
  - "The UK's National Cyber Security Centre assesses that the Russian
    military was almost certainly responsible for the destructive NotPetya
    cyber-attack of June 2017."
  NB the UK figure is "hundreds of millions of pounds" (not the $10B total;
  see wired/2018-08-22_notpetya-untold-story). Attribution is to the
  "Russian military" (nation-level), no GRU unit named — the Unit 74455
  naming comes later from the DOJ Oct-2020 indictment.

