notes: |
  UK FCDO press release attributing Olympic Destroyer (Feb 2018
  PyeongChang Games disruption) to the GRU's Main Centre for Special
  Technologies / GTsST / Unit 74455 (Sandworm). Coordinated with the
  DOJ Oct 2020 indictment.

  Supporting quotes (verbatim from snapshot):
  - "These cyber attacks were committed by the GRU's Main Centre for
    Special Technologies, GTsST also known by its field post number 74455
    and known in open source as: Sandworm ..." (named-unit attribution)
  - "The GRU's cyber unit attempted to disguise itself as North Korean and
    Chinese hackers when it targeted the opening ceremony of the 2018 Winter
    Games." (direct government confirmation of the DPRK + China false flag)
  - "The National Cyber Security Centre (NCSC) assesses that the incident
    was intended to sabotage the running of the Winter Olympic and Paralympic
    Games, as the malware was designed to wipe data from and disable computers
    and networks." (wiper + sabotage motive)
  - Foreign Secretary Dominic Raab: "The GRU's actions against the Olympic
    and Paralympic Games are cynical and reckless."

  AUDIT (2026-07-10, claude-opus-4.8/max): SNAPSHOT CAPTURED (live HTTP 200,
  87,389 bytes; content_sha256 71ed3fb6…2b3229bb) and NOTES CORRECTED. The
  prior notes claimed this release "explicitly cites retaliation for Russia's
  IOC flag ban (doping-program consequences)" — that is FALSE: the full FCDO
  page contains no "flag", "doping", "ban", or "retaliation" language (it frames
  the op as "cynical and reckless" sabotage). The retaliation-for-doping-ban
  attestation lives in the DOJ Oct-2020 indictment PR, not here. This source's
  gold-standard value is the false-flag confirmation (DPRK/Chinese disguise) and
  the named-unit attribution.
