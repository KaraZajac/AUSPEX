  UK FCDO press release attributing Olympic Destroyer (Feb 2018
  PyeongChang Games disruption) to GRU Unit 74455. Explicitly
  cites retaliation for Russia's IOC flag ban (doping-program
  consequences) — gold-standard regime-prestige attestation.
  Coordinated with DOJ Oct 2020 indictment.
