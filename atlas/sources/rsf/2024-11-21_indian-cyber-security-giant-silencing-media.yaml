notes: |
  RSF's own investigation (page marked "Published on 21.11.2024")
  into the Appin/Khare global censorship campaign. Key findings:
  "at least 15 media outlets worldwide received these notices, and
  five have been subjected to legal proceedings"; "Since 2022,
  articles, newsletters and podcasts from at least 15 different
  media outlets have been modified or withdrawn as a result of the
  notices and legal charges brought forth by Khare or the
  Association of Appin Training Centers (AOATC), an obscure entity
  claiming to defend Appin's interests and reputation"; describes
  "a strategy pursued on a global scale to keep both himself and
  his company's tactics out of the spotlight"; characterizes the
  suits as SLAPPs ("strategic lawsuits against public
  participation") of unprecedented magnitude; names pressured
  outlets across "the US, Switzerland, France or India," including
  "the US magazine The New Yorker and the British news agency
  Reuters." Tier primary: first-party investigation by the
  press-freedom organization itself.
