  the REAL article (unlike the retired 2023-07 "Teal Kurma Overview" phantom,
  which resolved to PwC's CTI landing page). Byline "December 05, 2023" —
  published_on corrected 2023-12-01 -> 2023-12-05. Verbatim anchors: "PwC has
  continued to track a highly capable Türkiye-nexus threat actor ... known as
  Teal Kurma (a.k.a. Sea Turtle, Marbled Dust, Cosmic Wolf)"; "Between 2021 and
  2023, the threat actor has used SnappyTCP, a simple reverse TCP shell for
  Linux/Unix that has basic C2 capabilities and is also used for establishing
  persistence on a system"; "The threat actor focuses on targeting governments,
  telecommunication, and IT service providers"; targeting "throughout Europe
  and the Middle East". Tier primary preserved (first-party vendor research).
