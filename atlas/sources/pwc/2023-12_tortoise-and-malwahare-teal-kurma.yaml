notes: |
  PwC Threat Intelligence's December 2023 deep-dive on the Teal
  Kurma cluster (Sea Turtle / Marbled Dust) detailing the
  previously-undocumented SnappyTCP reverse-TCP-shell Linux/Unix
  implant used between 2021 and 2023, and providing
  infrastructure / TTP picture bridging the post-2019 quiet
  window into the 2023-2024 resurgence. The "Malwahare" pun in
  the title references the implant family.
