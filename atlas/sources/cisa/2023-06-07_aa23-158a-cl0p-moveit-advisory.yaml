notes: |
  Joint CISA / FBI advisory on Cl0p's mass exploitation of the MOVEit
  Transfer zero-day (CVE-2023-34362), one of the largest data
  exfiltration campaigns of 2023.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited as a state-nexus source for ru/proxies/clop; it
  documents NONE. The advisory frames Cl0p purely as a criminal gang — "The Federal Bureau of
  Investigation (FBI) and the Cybersecurity and Infrastructure Security Agency (CISA) are releasing this
  joint CSA to disseminate known CL0P ransomware IOCs and TTPs identified through FBI investigations…
  CL0P Ransomware Gang, also known as TA505, began exploiting a previously unknown SQL injection
  vulnerability (CVE-2023-34362) in … MOVEit Transfer." ZERO russia/russian/kremlin/fsb/gru/svr/
  state-sponsor/state-tolerate/nation-state/safe-harbor/sanction token is applied to Cl0p (the page is not
  even calling the crew Russian-speaking; its only "foreign" string is reporting guidance re "foreign IP
  addresses"). Supports DEMOTE ru/proxies/clop -> ru/unscoped/clop (no source-documented state nexus;
  profit-criminal -> criminal/ candidate per emotet).
