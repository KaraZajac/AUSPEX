notes: |
  Joint advisory on China-nexus "covert networks" (compromised
  SOHO/IoT/smart-device botnets) used as low-attribution relays to
  route cyber activity. LED BY NCSC-UK ("jointly released by the
  National Cyber Security Centre (NCSC-UK) and international
  partners", with UK Cyber League support); US co-sealers are CISA,
  FBI, NSA and DC3; further partners: ASD/ACSC (AU), CSE/Cyber
  Centre (CA), BfV/BND/BSI (DE), NCO (JP), AIVD/MIVD (NL), NCSC-NZ,
  CCN (ES), NCSC-SE. Names Volt Typhoon (covert networks used "to
  pre-position offensive cyber capabilities on critical national
  infrastructure") and Flax Typhoon ("used a different covert
  network ... to conduct cyber espionage"). Raptor Train "in 2024
  infected more than 200,000 devices worldwide", controlled by
  Integrity Technology Group (FBI-assessed responsible for Flax
  Typhoon); KV Botnet (Volt Typhoon) mainly EOL Cisco/NetGear
  routers.
