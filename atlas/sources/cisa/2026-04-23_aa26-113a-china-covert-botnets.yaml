notes: |
  Joint advisory documenting PRC operator reliance on covert
  SOHO/IoT botnets. Names Volt Typhoon and Flax Typhoon as the
  archetypal clusters. Flax Typhoon botnet exploits 66 CVEs;
  47.9% of bots are US-located.
