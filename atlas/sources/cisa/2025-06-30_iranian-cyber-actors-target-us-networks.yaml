notes: |
  Joint CISA/FBI/NSA/DC3 fact sheet (2025-06-30) urging vigilance for
  potential cyber activity against US critical infrastructure by Iranian
  state-sponsored or affiliated threat actors following the June 2025
  US strikes on Iranian nuclear sites.
  AUDIT (2026-07-05, claude-opus-4.8/max): created during the QC audit of
  event 2025-06/iran-aligned-hacktivist-ddos-us-post-strikes. Raw snapshot
  captured (59,246 bytes, sha256 e3fb7fc4…7fbecdcc). Key ATTRIBUTION-CARE
  passage, verbatim: "At this time, we have not seen indications of a
  coordinated campaign of malicious cyber activity in the U.S. that can be
  attributed to Iran." Also verbatim: "Defense Industrial Base companies,
  particularly those possessing holdings or relationships with Israeli
  research and defense firms, are at increased risk." Corroborates the
  directionality (US targets, defense/aerospace at risk) and anchors the
  event's nation-level, not-state-directed attribution. NB: the fact
  sheet's own text does not itself name DDoS/hacktivist personas — those
  specifics remain carried by the Cyble and DHS sources.
