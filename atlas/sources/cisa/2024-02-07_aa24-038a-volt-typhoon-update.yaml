notes: |
  Expanded Volt Typhoon advisory. Explicit assessment: pre-positioning
  is "to enable lateral movement to OT assets to disrupt functions
  ... in the event of a major crisis or conflict with the United
  States." Canonical attested doctrine link for the
  pre-positioning / Taiwan-contingency framing.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited in the cn/mss/volt-typhoon service audit. This
  advisory attributes Volt Typhoon only at the nation level ("PRC State-Sponsored Actors" /
  "PRC state-sponsored cyber actors" / "People's Republic of China"; 6+ instances of "PRC State")
  and names NO Chinese service — no MSS, no PLA, no unit (the only "Bureau" is the US FBI co-author).
  Contributes to the DEMOTE to cn/unscoped/volt-typhoon.
