notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): authoritative primary source for the BlackTech router-firmware
  campaign — the joint Cybersecurity Advisory the cited Cisco security response references. The CISA HTML
  page 403s to curl/WebFetch; the TLP:CLEAR PDF (doc U//OO/205179-23 | PP-23-3215 | SEP 2023 Ver. 1.0,
  12pp) was captured from the FBI/IC3 mirror (https://www.ic3.gov/CSA/2023/230927.pdf) and read in full —
  byte-identical to the media.defense.gov copy (2003309107). Added 2026-06-24 to ground the event's
  pivoting/sector/firmware claims in the primary advisory rather than only the secondary Cisco response.

  ATTRIBUTION — names PRC only, NOT the MSS. The advisory's title and body use "People's Republic of
  China (PRC)-linked cyber actors known as BlackTech" / "The PRC-linked BlackTech actors"; it never
  names the Ministry of State Security (MSS) or any specific PRC service. (Contrast AA24-190A, whose
  title explicitly says "PRC Ministry of State Security APT40" — the authoring agencies name the MSS
  when they mean it.) Verbatim: "...are releasing this joint cybersecurity advisory (CSA) to detail
  activity of the People's Republic of China (PRC)-linked cyber actors known as BlackTech."

  FACTS (verbatim): "BlackTech (a.k.a. Palmerworm, Temp.Overboard, Circuit Panda, and Radio Panda)
  actors have targeted government, industrial, technology, media, electronics, and telecommunication
  sectors, including entities that support the militaries of the U.S. and Japan." "BlackTech has
  demonstrated capabilities in modifying router firmware without detection and exploiting routers'
  domain-trust relationships for pivoting from international subsidiaries to headquarters in Japan and
  the U.S. — the primary targets." "Active since 2010..." Firmware: "...replace the firmware for
  certain Cisco IOS-based routers with malicious firmware. ...the malicious firmware is used to
  establish persistent backdoor access and obfuscate future malicious activity. The modified firmware
  uses a built-in SSH backdoor... BlackTech actors bypass the router's built-in security features by
  first installing older legitimate firmware [T1601.002] that they then modify in memory to allow the
  installation of a modified, unsigned bootloader and modified, unsigned firmware [T1601.001]." Code-
  signing: "The actors also use stolen code-signing certificates [T1588.003] to sign the malicious
  payloads..." Branch-router pivot: "...target branch routers... and then abuse the trusted relationship
  [T1199] of the branch routers within the corporate network being targeted." Initial-access vector is
  not characterized as credential-theft in this advisory's narrative (it describes living-off-the-land
  + edge-device compromise); the "stolen or weak administrative credentials" framing is the cited
  Cisco response's gloss, not this CSA's.
