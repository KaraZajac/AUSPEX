notes: |
  Multi-agency joint advisory defining the TraderTraitor cluster
  and providing IoCs. Names the cryptocurrency / blockchain
  industry as the target sector.
  AUDIT (2026-07-02, claude-opus-4.8/max): hash re-verified on disk (sha256 8c1bfad1…756afcfd,
  83,739 bytes). Re-confirmed for the applejeus-campaign 8th-Congress attestation re-check: the
  advisory's only goal statement is proximate — "generate and launder funds to support the North
  Korean regime" — with 0 hits for WMD / ballistic / missile-program; drove the downgrade of that
  event's kp/8th-congress-defense-plan link attested -> strongly_inferred.
  AUDIT (2026-06-24, claude-opus-4.8/max): service-attribution check for the TraderTraitor
  actor. The advisory attributes only to the nation-state, titled "TraderTraitor: North Korean
  State-Sponsored APT Targets Blockchain Companies" and stating "This group is commonly tracked
  by the cybersecurity industry as Lazarus Group, APT38, BlueNoroff, and Stardust Chollima." No
  "Reconnaissance General Bureau" / "RGB" / "3rd Bureau" / "Bureau 121" / "Lab 110" string
  appears. (Also note: the captured advisory body contains no "WMD"/"ballistic" wording — the
  prior note's "WMD-financing strategic goal" is not in this source text.) Supports the demotion
  of the actor to kp/unscoped (DPRK named-actor nexus only; no service named).
