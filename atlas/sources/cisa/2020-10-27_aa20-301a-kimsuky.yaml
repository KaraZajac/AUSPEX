notes: |
  Joint advisory defining the Kimsuky cluster, tradecraft, and
  target set (think tanks, government, nuclear-policy researchers).
  AUDIT (2026-06-24, claude-opus-4.8/max): captured for the kp/rgb/kimsuky
  service-placement audit (raw via curl, HTTP 200). This advisory attributes at
  the NATION/regime level only and names NO DPRK service — "RGB"/"Reconnaissance
  General Bureau" are both absent from the body. It uses the older "HIDDEN COBRA"
  umbrella for DPRK activity and states: "Kimsuky is most likely tasked by the
  North Korean regime with a global intelligence gathering mission" (a "North
  Korean advanced persistent threat (APT) group ... to gain intelligence on ...
  the North Korean government"). Does not itself support the RGB placement; the
  named-unit evidence comes from the Treasury (2023) and Mandiant APT43 (2023)
  sources. Corroborates the DPRK nation nexus.
