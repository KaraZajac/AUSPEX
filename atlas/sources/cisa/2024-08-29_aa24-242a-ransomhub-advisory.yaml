notes: |
  Joint advisory on the RansomHub ransomware-as-a-service operation,
  successor program absorbing former ALPHV/BlackCat affiliates after
  the March 2024 exit scam.
  AUDIT (2026-07-04, claude-opus-4.8/max): curl HTTP 200, snapshot +
  sha256 captured (sha cde72d5a…c9099fb7, 124,716 bytes). NB this is a
  GENERAL RansomHub TTP advisory — it does NOT name Change Healthcare
  (0 mentions) or the April-2024 repost. On the 2024-04/change-
  healthcare-ransomhub-repost event it is retained only as background
  for the "RansomHub = ALPHV-successor RaaS absorbing displaced
  affiliates" framing, NOT as the incident/attribution source (that
  role was re-sourced to WIRED / BleepingComputer / KrebsOnSecurity,
  which name the victim and the repost).
  AUDIT (2026-07-05, claude-opus-4.8/max): hash re-verified against the
  on-disk snapshot (sha cde72d5a…c9099fb7, 124,716 bytes — unchanged)
  during the 2024-08/cisa-ransomhub-advisory event audit. Confirmed the
  advisory names LockBit + ALPHV (not Scattered Spider) as affiliate
  sources, enumerates 11 CI sectors (not 18), and lists 6 initial-access
  CVEs (3519/27997/46604/22515/46747/48788 — no CVE-2024-1709).
  AUDIT (2026-07-05, claude-opus-4.8/max): hash re-verified again (sha
  cde72d5a…c9099fb7, 124,716 bytes — unchanged) during the 2024-09/
  halliburton-followup-ransomhub audit. Confirmed 0 Halliburton mentions;
  on that event it is retained as BACKGROUND only (general RansomHub-RaaS
  framing), NOT as the incident or attribution source (re-sourced to the
  Sept-3 8-K, the Q3 10-Q, and TechCrunch, which carry the Halliburton facts).
