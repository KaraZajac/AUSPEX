notes: |
  Joint advisory attributing widespread exploitation of JetBrains
  TeamCity (CVE-2023-42793) to the SVR. Assessed as pre-positioning
  for future supply-chain operations — echo of SolarWinds
  methodology.
  AUDIT (2026-06-25, claude-opus-4.8/max): SVR service placement of
  ru/svr/apt29 VERIFIED — names the Russian Foreign Intelligence
  Service (SVR) explicitly and equates it to APT29. Captured from the
  live URL (HTTP 200; no 403). Verbatim: the authoring agencies
  "...and the UK's National Cyber Security Centre (NCSC) assess Russian
  Foreign Intelligence Service (SVR) cyber actors—also known as Advanced
  Persistent Threat 29 (APT 29), the Dukes, CozyBear, and
  NOBELIUM/Midnight Blizzard—are exploiting CVE-2023-42793 at a large
  scale, targeting servers hosting JetBrains TeamCity software since
  September 2023." (Note also the SolarWinds echo: "Although the SVR
  used such access to compromise SolarWinds and its customers in 2020...")
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot hash
  re-verified — sha256
  07c9154746020cfbdaeb6956b27d1623dea3aee76bd8c51fbce06756f83a1bf5,
  143,262 bytes; title + full article body confirm the genuine
  AA23-347A advisory (phantom triage: not a phantom). Publisher
  partner list CORRECTED (was "FBI, NSA, NCSC-PL, CCCS"): the raw's
  coauthors are the FBI, CISA, NSA, Polish Military
  Counterintelligence Service (SKW), CERT Polska (CERT.PL), and the
  UK's National Cyber Security Centre (NCSC) — CCCS/Canada is not an
  author (Canada appears only in the reference to the July 2020
  WellMess advisory). Victim scope verbatim: "a few dozen compromised
  companies in the United States, Europe, Asia, and Australia, and
  are aware of over a hundred compromised devices though we assess
  this list does not represent the full set"; "SVR's exploitation of
  these victims' networks was opportunistic in nature and not
  necessarily a targeted attack." Supply-chain use explicitly not yet
  observed: "the SVR has not used the access afforded by the TeamCity
  CVE in a similar manner" / "has not yet used its accesses to
  software developers to access customer networks and is likely still
  in the preparatory phase of its operation." Purpose language for
  doctrine calibration: "a long-term targeting pattern aimed at
  collecting, and enabling the collection of, foreign intelligence";
  "cyber operations targeting technology companies that enable future
  cyber operations."
