notes: |
  13-government joint Salt Typhoon advisory. Names MSS-supporting
  contractors Sichuan Juxinhe, Beijing Huanyu Tianqiong, Sichuan
  Zhixin Ruijie. Advisory states the campaign "feeds a global
  espionage system." FBI Aug 27 2025 statement: 200+ companies in
  80 countries compromised.
  AUDIT (2026-06-24, claude-opus-4.8/max): reviewed in the cn/mss/salt-typhoon service verification
  (verdict KEEP); used as SUPPORTING corroboration to the OFAC designation. The advisory links the
  activity (overlapping "Salt Typhoon, OPERATOR PANDA, RedMike, UNC5807, and GhostEmperor") to
  "multiple China-based entities, including at least Sichuan Juxinhe Network Technology Co. Ltd. ...,
  Beijing Huanyu Tianqiong Information Technology Co., Ltd. ..., and Sichuan Zhixin Ruijie Network
  Technology Co., Ltd.", and states these "companies provide cyber-related products and services to
  China's intelligence services, including multiple units in the People's Liberation Army and Ministry
  of State Security." The MSS is named, but DIFFUSELY — alongside the PLA, for the contractor cluster as
  a whole rather than for Salt Typhoon's operating company specifically. The unambiguous MSS-to-Salt-
  Typhoon-operating-company tie comes from the OFAC source; this advisory corroborates it. Raw snapshot
  captured 2026-06-24 (text-rendered; includes the named entities and YARA rules).
