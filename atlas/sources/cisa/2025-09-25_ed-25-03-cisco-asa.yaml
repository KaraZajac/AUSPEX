notes: |
  CISA emergency directive on Cisco ASA / Firepower
  CVE-2025-20333 / 20362 zero-day exploitation by "an advanced
  threat actor" Cisco assesses is connected to the 2024 ArcaneDoor
  activity. Mandates core-dump collection via Malware Next Gen and
  permanent disconnection of end-of-support ASA hardware (EOL on or
  before 2025-09-30).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + hashed
  (HTTP 200, 80,695 B). The live page snapshotted is the V1 revision
  "Updated April 23, 2026" (which supersedes the original required actions
  and adds a Firepower/FTD core-dump strand); the ORIGINAL 2025-09-25 ED
  25-03 text is preserved lower in the same page — published_on 2025-09-25
  retained. Verbatim quotes carried for the event audit: "CISA is aware of
  an ongoing exploitation campaign by an advanced threat actor targeting
  Cisco Adaptive Security Appliances (ASA)"; "exploiting zero-day
  vulnerabilities to gain unauthenticated remote code execution on ASAs,
  as well as manipulating read-only memory (ROM) to persist through reboot
  and system upgrade"; "Cisco assesses that this campaign is connected to
  the ArcaneDoor activity identified in early 2024"; "CVE-2025-20333 –
  allows for remote code execution"; "CVE-2025-20362 – allows for privilege
  escalation". The strings "state-sponsored", "UAT4356", "China" and "PRC"
  do NOT appear anywhere in the directive (0 hits each); "ArcaneDoor" = 3
  hits, all crediting Cisco's assessment, none naming a nation.
