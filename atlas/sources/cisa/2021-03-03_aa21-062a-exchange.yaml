notes: |
  CISA's national advisory on the Exchange zero-days (first issued
  2021-03-03, updated repeatedly through March 2021). Government
  corroboration of the four-CVE chain and the web-shell mass-compromise,
  and the source that carries the criminal-ransomware follow-on.

  AUDIT (2026-07-10, claude-opus-4.8/max): added as a corroborating FACTS
  source for event 2021-03/exchange-proxylogon-hafnium. Snapshot HTTP 200,
  sha256 above. Carries all four CVEs (CVE-2021-26855/-26857/-26858/-27065),
  "web shell" (17x), "China Chopper" (11x), a "HAFNIUM" reference, and the
  post-disclosure widening: "additional threat actors" language plus the
  DearCry ransomware follow-on — "DearCry ransomware being used to exploit
  compromised on-premises Exchange Servers." Supports the event's
  initial-Hafnium-then-widespread (including criminal ransomware) structure.
