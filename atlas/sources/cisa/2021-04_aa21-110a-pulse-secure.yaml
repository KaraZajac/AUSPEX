notes: |
  AUDIT 2026-07-01 (claude-opus-4.8/max): snapshot captured + hashed. This advisory
  is ACTOR-AGNOSTIC — it names "a cyber threat actor—or actors" and makes NO China/PRC/
  APT/named-group attribution. It lists CVEs (CVE-2019-11510, CVE-2020-8260, CVE-2020-8243,
  CVE-2021-22893, and later CVE-2021-22894/22899/22900), webshell behaviours, and
  mitigations only. The China-nexus (UNC2630/UNC2717, possible APT5 tie) attribution
  comes from the PARALLEL Mandiant report, not this source. Victims per this advisory:
  "U.S. government agencies, critical infrastructure entities, and other private sector
  organizations." Do NOT cite this source for any actor attribution.
