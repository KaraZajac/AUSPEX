notes: |
  Joint advisory attributing the Unitronics Vision PLC
  exploitation campaign (including the November 25, 2023
  Aliquippa, PA water-authority incident) to IRGC-affiliated
  actors operating the CyberAv3ngers persona. Canonical
  technical source for the Cyber-Deniable-Retaliation doctrine
  at attested confidence.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the actor's IRGC
  (parent-service) placement. Names the IRGC explicitly — "malicious
  cyber activities conducted by advanced persistent threat (APT)
  cyber actors affiliated with the Iranian Government's Islamic
  Revolutionary Guard Corps (IRGC)" — and ties the persona directly:
  "In November 2023, IRGC-affiliated cyber actors using the persona
  'CyberAv3ngers' began actively targeting and compromising
  Israeli-made Unitronics Vision Series programmable logic
  controllers (PLCs)"; "CyberAv3ngers is an Iranian IRGC-affiliated
  cyber persona." Granularity note: this advisory names only the
  IRGC parent, not any IRGC sub-organization (no IRGC-IO, no
  IRGC-CEC). It corroborates IRGC affiliation, not the specific
  sub-org placement.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw HTML hash re-verified
  (bf4b5dd8...60d11b4c, 105,312 bytes; the live page is the
  Dec-18-2024 revision of the advisory). Supplementary capture of the
  original Dec-2023 PDF linked from the same page:
  raw/cisa__2023-12-01_aa23-335a-cyberav3ngers__original-dec2023.pdf,
  sha256 85dd5fe13b4c6563b0942b3eef2fa3263c3df92b60e6aed0073f1425f7aeeafb
  (608,288 bytes). Version facts established: the original Dec-1-2023
  advisory was authored by FIVE agencies (FBI, CISA, NSA, EPA, INCD);
  CCCS and the UK NCSC were added as co-sealers only in the
  Dec-18-2024 update (zero hits for CCCS/NCSC in the Dec-2023 PDF) —
  the publisher field reflects the current seven-agency roster. The
  string "1111" appears in NEITHER version; the carried vector
  language is "default or no passwords" / "compromise default
  credentials" (T1078.001 Default Accounts, T1110 Brute Force), with
  CVE-2023-6448 (default-password weakness, CWE-798) assigned
  Dec 11, 2023 per the Dec-2023 PDF. The at-least-75-devices /
  at-least-34-US-WWS-devices figures and the Nov-2023-Jan-2024
  four-wave window are Dec-18-2024-update content, absent from the
  original version.
