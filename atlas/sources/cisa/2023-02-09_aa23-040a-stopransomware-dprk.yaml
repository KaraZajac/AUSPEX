notes: |
  Major doctrinal-attestation document. Explicitly links DPRK
  ransomware operations (Maui, H0lyGh0st) against critical
  infrastructure to financing of WMD programs. Joint US-ROK
  attribution. Names exploited CVEs: Log4Shell (CVE-2021-44228),
  SonicWall SMA100 (CVE-2021-20038), TerraMaster OS
  (CVE-2022-24990).
  AUDIT (2026-06-24, claude-opus-4.8/max): re kp/rgb/andariel
  service audit — this advisory does NOT name the RGB. It attributes
  to "DPRK state-sponsored" actors generically; raw snapshot has 0
  occurrences of "Reconnaissance General Bureau", "RGB", or
  "Andariel" in its prose. It is a strong doctrinal-financing
  attestation (ransomware funds DPRK malicious cyber / WMD activity)
  but not a service-tasking source; RGB placement rests on OFAC 2019
  and Symantec 2024. Captured for completeness.
  AUDIT (2026-06-24, claude-opus-4.8/max): re kp/rgb/h0lygh0st service
  audit — same finding applies to H0lyGh0st. This advisory names H0lyGh0st
  (9 occurrences in the raw snapshot, sha256 e56423c3...) only as a "DPRK
  state-sponsored" ransomware family and does NOT name the RGB / Bureau 121 /
  Unit 121 / Lab 110 (0 occurrences; the lone "Reconnaissance" hit is
  "reconnaissance activities"). It supports the DPRK nexus + WMD-financing
  doctrine but not an RGB service placement. Result: actor DEMOTED
  kp/rgb/h0lygh0st -> kp/unscoped/h0lygh0st.
