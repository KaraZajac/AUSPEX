notes: |
  Joint advisory on Black Basta ransomware following the Ascension
  Health breach. Black Basta is a Conti-lineage operation with
  significant healthcare-sector targeting.
  AUDIT (2026-06-24, claude-opus-4.8/max): primary source for the ru/proxies/black-basta placement audit.
  Documents NO Russian-state nexus — pure RaaS/criminal framing: "Black Basta is considered a
  ransomware-as-a-service (RaaS) variant and was first identified in April 2022. Black Basta affiliates
  have impacted a wide range of businesses and critical infrastructure in North America, Europe, and
  Australia" and "employ a double-extortion model, both encrypting systems and exfiltrating data." The
  stripped advisory body contains ZERO russian/FSB/GRU/SVR/Kremlin/Moscow/proxy/tolerate/harbor/sanction/
  nation-state tokens; the only "russia"/"state-sponsored" string hits are Related-Advisories sidebar links
  to the unrelated AA25-343A (Pro-Russia Hacktivists) and AA25-239A (Chinese State-Sponsored) advisories,
  not about Black Basta. Supports DEMOTE ru/proxies -> ru/unscoped/black-basta.
