notes: |
  Companion advisory to the same-day White House SolarWinds
  attribution to SVR and UK FCDO joint statement. CISA + FBI +
  NSA + NCSC-UK joint document detailing SVR / APT29 / Cozy
  Bear tradecraft post-SolarWinds: WellMess, SoreFang,
  WellMail, password spray, n-day exploitation of Fortinet /
  Pulse Secure / Citrix edge infrastructure. Doctrinally
  significant as the first multi-agency, multi-government
  attribution to SVR by codename rather than to "Russia" in
  the abstract.
