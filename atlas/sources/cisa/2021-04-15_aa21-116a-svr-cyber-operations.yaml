notes: |
  AA21-116A "SVR Cyber Operations: Trends and Best Practices for
  Network Defenders" — the detailed network-defender node of the
  US April-2021 SolarWinds response. Authored by the FBI, DHS and
  CISA (opening line: "The Federal Bureau of Investigation (FBI),
  Department of Homeland Security (DHS), and Cybersecurity and
  Infrastructure Security Agency (CISA) assess Russian Foreign
  Intelligence Service (SVR) cyber actors…"); it references the
  15 Apr 2021 White House attribution and cross-references the
  same-day companion advisory "Russian SVR Targets U.S. and Allied
  Networks" for the CVE detail.
  AUDIT (2026-07-10, claude-opus-4.8/max): corrected multiple
  defects. publisher was "CISA / FBI / NSA / NCSC-UK (joint)" —
  WRONG; AA21-116A is FBI/DHS/CISA (NSA authored only the
  cross-referenced companion; NCSC did not co-sign — its sole
  mention is a Resources link to the July-2020 WellMess advisory).
  published_on 2021-04-15 → 2021-04-26 (advisory "April 26, 2021:
  Initial Version"; day 116 of 2021 = 26 Apr). The prior notes'
  content gloss ("WellMess, SoreFang, WellMail, … Fortinet / Pulse
  Secure / Citrix edge infrastructure") and "first multi-agency,
  multi-government attribution to SVR by codename" were INACCURATE
  for THIS advisory: its RAW carries only WELLMESS (not SoreFang /
  WellMail), only CVE-2019-19781 (Citrix, "a zero-day exploit at
  the time"), password spraying (not brute force), and the
  SolarWinds M365/cloud pivot — the multi-CVE edge list belongs to
  the companion advisory; the WellMess codename attribution was
  already made multi-government in July 2020. Snapshotted (HTTP 200,
  67,579 bytes; raw_snapshot + content_sha256 above; topic verified).
  NB for orchestrator: the id slug still embeds "2021-04-15" — a
  rename to …2021-04-26… is a FK-propagation job, flagged not done.
