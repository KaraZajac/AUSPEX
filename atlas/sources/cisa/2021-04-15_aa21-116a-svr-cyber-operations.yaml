title: |
  AA21-116a — Russian Foreign Intelligence Service (SVR) Cyber
  Operations: Trends and Best Practices for Network Defenders
url: https://www.cisa.gov/news-events/cybersecurity-advisories/aa21-116a
archive_url: "https://web.archive.org/web/20260315212107/https://www.cisa.gov/news-events/cybersecurity-advisories/aa21-116a"
