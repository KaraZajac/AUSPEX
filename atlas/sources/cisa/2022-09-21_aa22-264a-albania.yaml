notes: |
  Technical advisory documenting the HomeLand Justice attack
  on Albania (wiper plus encryptor).
  AUDIT (2026-06-24, claude-opus-4.8/max): this advisory does NOT name the
  MOIS — zero occurrences of "MOIS" or "Ministry of Intelligence." It
  attributes only at the nation level: title "Iranian State Actors Conduct
  Cyber Operations Against the Government of Albania"; "In July 2022, Iranian
  state cyber actors—identifying as 'HomeLand Justice'—launched a destructive
  cyber attack against the Government of Albania"; "A FBI investigation
  indicates Iranian state cyber actors acquired initial access..."; cross-refs
  "Iranian government-sponsored malicious cyber activity." So the MOIS service
  placement does NOT rest on this source — it rests on the co-cited Treasury
  OFAC release (jy0941), which names MOIS explicitly. Re-fetched live (HTTP
  200; hash identical to prior snapshot); rich technical body confirmed
  (GoXml.exe x7, CVE-2019-0604, "14 months").
