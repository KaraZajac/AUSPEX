notes: |
  Joint multi-government advisory characterising pro-Russia
  hacktivist groups (CARR, NoName057(16) successors) as
  opportunistic VNC-credential attackers against OT in water,
  wastewater, energy sectors. Published as addendum to May
  2025 OT primary-mitigations fact sheet.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured +
  hashed (sha256 22c0b8ee...9683f51d, 120060 B; HTTP 200; title
  matches). The advisory in fact names FOUR groups - CARR, Z-Pentest,
  NoName057(16), Sector16 (+ affiliated) - and attributes GRU unit
  74455 (GTsST) as supporting CARR's creation/funding and CISM
  (Kremlin) as creating/funding/tasking NoName057(16); "KillNet" is
  NOT named. Alert Code AA25-343A; initial version 2025-12-09, last
  revised 2025-12-18. tier: primary confirmed.
