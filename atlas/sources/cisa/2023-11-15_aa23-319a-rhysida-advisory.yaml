notes: |
  Joint CISA / FBI / MS-ISAC advisory on Rhysida ransomware,
  responsible for the British Library and Insomniac Games breaches.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured the live CISA HTML (123,468 bytes; sha256
  5553f1f7…459f). The advisory frames Rhysida as a purely criminal, financially motivated
  ransomware-as-a-service operation — NO Russia/state-nexus claim, and NO statement of operator
  nationality. Own words: "Threat actors leveraging Rhysida ransomware are known to impact 'targets
  of opportunity,' including victims in the education, healthcare, manufacturing, information
  technology, and government sectors"; "open source reporting has confirmed observed instances of
  Rhysida actors operating in a ransomware-as-a-service (RaaS) capacity, where ransomware tools and
  infrastructure are leased out in a profit-sharing model. Any ransoms paid are then split between the
  group and the associates"; links Rhysida to Microsoft DEV-0832 / Vice Society (an opportunistic
  ransomware cluster). Greps over the snapshot for Russia/Russian/Kremlin/Moscow/FSB/GRU/SVR/state-
  sponsored/proxy/safe-harbor/sanctions return zero substantive hits (the single "FSB" string is a
  fragment of a base64 asset hash). Used to DEMOTE ru/proxies/rhysida -> ru/unscoped/rhysida and to
  FLAG the ru-nation attribution itself as unsourced.
