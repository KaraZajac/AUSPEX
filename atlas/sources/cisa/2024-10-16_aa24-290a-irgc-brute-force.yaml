notes: |
  Five-Eyes joint advisory documenting Iranian-affiliated cyber-
  actor brute-force and password-spraying against US critical-
  infrastructure organizations across the healthcare, government,
  IT, engineering, and energy sectors. Includes MFA-registration
  modification for persistent access; the operations are
  consistent with the broader Iran-affiliated initial-access /
  ransomware-affiliate ecosystem (Pioneer Kitten / Fox Kitten
  and Aria Sepehr Ayandehsazan adjacent). Distinct from the
  CyberAv3ngers Unitronics campaign though sharing the same
  IRGC-aligned actor population.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured (sha256
  97598a76…54bcb448, 108,304 B). The advisory attributes to "Iranian cyber
  actors" / tag "Nation-State Actor: Iran" at the NATION level and names no unit
  or group — "IRGC" / "Revolutionary Guard", Pioneer Kitten / Fox Kitten / Aria
  Sepehr / CyberAv3ngers / Unitronics / ransomware appear NOWHERE in it (grep = 0).
  The ecosystem framing above is AUSPEX context, not stated by AA24-290A. Verbatim
  purpose: "The actors likely aim to obtain credentials and information describing
  the victim's network that can then be sold to enable access to cybercriminals."
