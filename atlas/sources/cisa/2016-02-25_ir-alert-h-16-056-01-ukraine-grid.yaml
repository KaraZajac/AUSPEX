notes: |
  ICS-CERT (IR-ALERT-H-16-056-01) public analysis of the December
  2015 Ukrainian power grid attack against three regional oblenergos.
  First publicly acknowledged cyber-induced grid outage.

  AUDIT (2026-07-05, claude-opus-4.8/max): URL live (HTTP 200);
  raw_snapshot captured + hashed (content_sha256 90c9bc82…2de319d4,
  63,485 bytes). The live page is the original 2016-02-25 advisory
  with a "Updated July 20, 2021" note. Verbatim-supports the tradecraft
  (KillDisk, Serial-to-Ethernet firmware corruption, UPS disconnects,
  breaker operation over VPN, acquired credentials, spear-phishing
  Office attachments, ~225,000 customers, "three regional electric
  power distribution companies (Oblenergos)"). NOTE: this advisory
  does NOT name the three companies, does NOT reach unit-level
  attribution (the 2021 update says only "Russian nation-state cyber
  actors"), and hedges on BlackEnergy's role ("we do not know whether
  the malware played a role"). Company names + named-unit attribution
  come from the E-ISAC/SANS DUC and the DOJ indictment respectively.
