notes: |
  AUDIT (2026-07-01, claude-opus-4.8/max): raw captured + hashed; page resolves
  live (CISA alert reproducing the FBI/USSS joint advisory notice). Corroborates
  the FBI FLASH CU-000159-MW (2022-02-11, url: null) whose original ic3.gov PDF
  is not curl-verifiable. The advisory is a GENERAL BlackByte RaaS advisory —
  it names infections across "at least three US critical infrastructure sectors"
  (government facilities, financial, food and agriculture) plus foreign
  businesses; it does NOT name the San Francisco 49ers. Publisher-country (US)
  vs actor (criminal) mismatch is expected.
