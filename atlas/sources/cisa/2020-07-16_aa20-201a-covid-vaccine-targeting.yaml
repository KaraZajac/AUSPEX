notes: |
  Joint Five Eyes advisory attributing COVID-19 vaccine research
  targeting to APT29 (SVR). Names WellMess, WellMail custom
  malware and Citrix CVE-2019-19781 exploitation.
  AUDIT (2026-07-01, claude-opus-4.8/max): NCSC news landing page
  snapshotted (HTML sha256 29780e60…01213389, 137533 B). The page
  carries the attribution + intent wording; the full technical
  advisory PDF it links (Advisory-APT29-targets-COVID-19-vaccine-
  development-V1-1.pdf) was also captured to raw/ as
  cisa__2020-07-16_aa20-201a-covid-vaccine-targeting.pdf
  (sha256 82a8d7ee…3430fe5f, 414373 B) and carries the CVE list,
  SoreFang, spear-phishing, and WellMess/WellMail detail. Source
  wording is "almost certainly part of the Russian intelligence
  services" (SVR not named in-text). tier: primary retained
  (first-party joint govt advisory).
