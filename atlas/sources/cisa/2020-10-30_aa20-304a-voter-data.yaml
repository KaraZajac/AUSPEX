notes: |
  CISA / FBI joint advisory documenting Iranian voter-data
  scraping and "Proud Boys" intimidation emails — companion
  to subsequent November 2021 Treasury / DOJ Emennet Pasargad
  attribution.
  AUDIT (2026-06-24, claude-opus-4.8/max): this 2020 advisory predates the
  Emennet Pasargad attribution and refers to the perpetrator ONLY as an
  "Iranian Advanced Persistent Threat Actor" / "Iran-based actor" / "this
  Iranian APT actor" — it names neither Emennet Pasargad nor the IRGC. It does
  NOT support the service placement; the IRGC linkage rests on the Treasury
  2021-11-18 source. Retained as supporting context for the 2020 voter-data /
  "Proud Boys" operation. Raw snapshot captured (curl, HTTP 200, text/html,
  76,105 bytes, no bot-interstitial) and read directly.
