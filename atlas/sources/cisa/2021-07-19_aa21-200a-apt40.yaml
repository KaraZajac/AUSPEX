notes: |
  Companion to the July 2021 DOJ indictment. Explicitly states APT40
  targets "industries included in China's Belt and Road Initiative"
  — canonical attested doctrine link for BRI / DSR.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured live from cisa.gov (HTTP 200). Supports the
  cn/mss/apt40 SERVICE placement at the named-unit level — names the MSS Hainan State Security
  Department, not merely "China". Title: "Tactics, Techniques, and Procedures of Indicted APT40 Actors
  Associated with China's MSS Hainan State Security Department". Body: "Hainan Xiandun employee Wu
  Shurong cooperated with and carried out orders from PRC Ministry of State Security (MSS) Hainan State
  Security Department (HSSD) intelligence officers Ding Xiaoyang, Zhu Yunmin, and Cheng Qingmin to
  conduct CNE." Also (for the BRI link): APT40 targeted "industries included in China's Belt and Road
  Initiative."
  AUDIT (2026-07-10, claude-opus-4.8/max): hash RE-VERIFIED unchanged (sha256 4937dca4…e8448580,
  93,781 B); tier/url PRESERVED. Snapshot confirmed COMPLETE (not truncated) — a fresh live fetch of
  cisa.gov returns byte-identical text (31,942 chars). CAVEAT: CISA's CMS migration dropped the ORIGINAL
  AA21-200a vulnerability/CVE-exploitation table — the current page (and thus this snapshot) contains the
  BRI/sector language, the Wu Shurong/HSSD attribution and the malware-TTP table (BADFLICK/Greencrash,
  China Chopper, Cobalt Strike, Derusbi/PHOTO, Murkytop, NanHaiShu) but ZERO CVEs and no "Microsoft
  Exchange"/"Citrix"/"F5"/"Pulse Secure"/"Mimikatz" (all 0 in the snapshot). Full BRI+sector sentence
  carried verbatim: "APT40 has targeted governmental organizations, companies, and universities in a wide
  range of industries—including biomedical, robotics, and maritime research—across the United States,
  Canada, Europe, the Middle East, and the South China Sea area, as well as industries included in
  China's Belt and Road Initiative." Consumers needing the original CVE table should use the archive_url
  (web.archive.org 2026-05-25 capture).
