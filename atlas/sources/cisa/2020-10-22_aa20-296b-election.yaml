notes: |
  AUDIT (2026-07-11, claude-opus-4.8/max): Raw snapshot captured (curl, HTTP 200,
  text/html, 72,121 bytes, real article — title "Iranian Advanced Persistent Threat
  Actors Threaten Election-Related Systems," Last Revised October 22, 2020; no
  bot-interstitial). Names the perpetrator ONLY as "Iranian Advanced Persistent
  Threat Actors" (nation-level) — it does NOT name Emennet Pasargad or the IRGC.
  Describes the APT actors "creating fictitious media sites and spoofing legitimate
  media sites to spread obtained U.S. voter-registration data, anti-American
  propaganda, and misinformation about voter suppression." Companion to the Oct 21
  2020 Ratcliffe/Wray public attribution and the Nov 2021 Emennet designation.
  Corroborates the operation + the Iran nexus at nation level only.
