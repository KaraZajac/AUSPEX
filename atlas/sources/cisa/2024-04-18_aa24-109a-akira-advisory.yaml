notes: |
  International joint advisory on the Akira ransomware operation
  (Conti / Ryuk lineage), with USD 42M+ in confirmed ransom payments.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured live via curl (HTTP 200, title
  "#StopRansomware: Akira Ransomware | CISA"). NOTE the live page is the Nov 13 2025 update
  ("Originally published April 18, 2024, this advisory was updated Nov. 13, 2025"; IOCs/TTPs
  "as recently as November 2025") — newer than the 2024-04-18 publish date; ransom figure has
  since grown past the USD 42M in the note. STATE-NEXUS FINDING (cited as Akira's sole actor
  source): documents ONLY a criminal ransomware operation, ZERO Russia/state/proxy nexus. No
  russian/kremlin/fsb/gru/svr/state-sponsor/nation-state/tasking/tolerate/safe-harbor token is
  applied to Akira; the page explicitly disclaims even tool attribution ("should not be
  attributed as malicious without analytical evidence to support threat actor use"). The lone
  lineage signal is a hedged CRIMINAL coupling: "Akira ransomware threat actors are associated
  with other groups known as Storm-1567, Howling Scorpius, Punk Spider, and Gold Sahara, and
  may have connections to the defunct Conti ransomware group." (The single "russia" string on
  the page is an unrelated sidebar item, "AA25-343A Pro-Russia Hacktivists…".) This finding
  drove the demotion ru/proxies/akira -> ru/unscoped/akira.
