notes: |
  Eight-signatory joint Log4Shell mitigation advisory scoped (per
  the advisory itself) to exactly three CVEs: CVE-2021-44228
  (Log4Shell), CVE-2021-45046, and CVE-2021-45105. Authoring
  agencies as listed in the advisory: CISA, FBI, NSA, ACSC, CCCS,
  CERT NZ, NZ NCSC, and NCSC-UK — the Five Eyes cyber authorities,
  with two New Zealand agencies (CERT NZ + NZ NCSC). Original
  release 2021-12-22; page "Last Revised December 23, 2021". Does
  NOT cover CVE-2021-44832 (disclosed 28 Dec 2021, after this
  advisory). (Audit 2026-07-10: corrected "seven-signatory" -> eight
  and removed an unsourced "highest-severity since Heartbleed"
  superlative not present in the snapshotted page.)
