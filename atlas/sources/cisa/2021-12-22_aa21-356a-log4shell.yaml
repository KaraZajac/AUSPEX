notes: |
  Seven-signatory Five Eyes joint mitigation advisory on
  CVE-2021-44228 (Log4Shell). NCSC-UK lead author on the
  detection-and-response section. Operationally one of the
  highest-volume advisories of the modern AA cadence — the
  underlying vulnerability rated as the highest-severity
  vulnerability since Heartbleed by NCSC.
