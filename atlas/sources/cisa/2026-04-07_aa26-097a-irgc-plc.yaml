notes: |
  Reissue of the AA23-335A PLC-exploitation warning during
  continued post-strike tensions following the June 2025
  Israel-Iran kinetic exchanges.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the actor's IRGC
  placement and, like the OFAC release, names the IRGC Cyber
  Electronic Command sub-org (not IRGC-IO): "CyberAv3ngers (aka
  Shahid Kaveh Group)—a cyber threat actor affiliated with Iran's
  Islamic Revolutionary Guard Corps (IRGC) Cyber Electronic Command
  (CEC)"; "the IRGC CEC-affiliated cyber threat actors known as
  'CyberAv3ngers'." The strings "IRGC-IO" and "Intelligence
  Organization" do not appear. Corroborates IRGC (and IRGC-CEC)
  affiliation; does not name the IRGC-IO sub-org.
