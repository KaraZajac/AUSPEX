notes: |
  First US Government attribution of the Russian energy-sector
  intrusion campaign (Berserk Bear / Dragonfly 2.0). Names objective
  as "staging targets" — pre-positioning in ICS environments.
  AUDIT (2026-07-10, claude-opus-4.8/max): raw captured + hashed during
  the berserk-bear-us-energy-campaign event audit. Cited us-cert.cisa.gov
  URL 302-redirects to the live www.cisa.gov advisory
  (/news-events/alerts/2018/03/15/russian-government-cyber-activity-…);
  that render was snapshotted (HTML, 109,839 bytes, sha256 8c1ec056…
  d7b2f66a — full advisory, all IOCs + Snort rules present, no JS stub).
  Verbatim support: "Since at least March 2016, Russian government cyber
  actors … targeted government entities and multiple U.S. critical
  infrastructure sectors, including the energy, nuclear, commercial
  facilities, water, aviation, and critical manufacturing sectors"; the
  two-tier "staging targets"→"intended target" model; spear-phishing
  Word/.docx retrieving a remote file "file://<IP>/Normal.dotm" over SMB
  to harvest credential hashes; watering holes ("Approximately half of
  the known watering holes are trade publications and informational
  websites related to process control, ICS"); PowerShell, "Scheduled
  Task", web shells on "publicly accessible email and web servers", and
  open-source cred tools "Hydra, SecretsDump, and CrackMapExec" (NOT
  Mimikatz). Explicitly references Symantec's 6 Sep 2017 "Dragonfly:
  Western energy sector" (Dragonfly 2.0) report. This 2016-2017 phase
  is spear-phishing + watering-hole — NO trojanized-installer / Cisco-SMI
  material here (those are the 2014 Havex phase / TA18-106A respectively).
