notes: |
  Joint CISA / Treasury / FBI / USCYBERCOM advisory on DPRK BeagleBoyz
  (Lazarus subgroup) financial-sector targeting and ATM cashout
  scheme. Note: an existing file under aa20-239a-beagleboyz.yaml
  covers the same advisory under a different slug; this is the slug
  referenced by the kp/rgb/lazarus actor file.
  AUDIT (2026-06-25, claude-opus-4.8/max): supports the RGB placement of
  kp/rgb/lazarus. This advisory names the Reconnaissance General Bureau
  for the BeagleBoyz (a Lazarus subgroup): "The BeagleBoyz, an element
  of the North Korean government's Reconnaissance General Bureau, have
  likely been active since at least 2014." It names the RGB at the
  subgroup level (BeagleBoyz) rather than naming "Lazarus Group →
  RGB" in one sentence, so it is a supporting corroborant — the
  load-bearing named-actor→named-service quote comes from the Sept-2019
  OFAC designation + the 2021 DOJ indictment. Captured raw on 2026-06-25
  (curl http 200, 114,412 bytes); raw term-scan "Reconnaissance General
  Bureau"=1, "Lazarus"=2, "North Korea"=20. Tier preserved (primary).
