notes: |
  Joint advisory documenting IRGC-affiliated ransomware
  exploitation of Fortinet, Microsoft Exchange, and VMware
  Horizon (Log4j); companion to OFAC jy0948 designation of
  Najee Technology / Afkar System.
  AUDIT (2026-06-24, claude-opus-4.8/max): Corroborates the ir/irgc
  placement of ir/irgc/afkar-system — names "IRGC-affiliated actors"
  throughout and ties them to Afkar System by name. Verbatim: "These
  actors often operate under the auspices of Najee Technology Hooshmand
  Fater LLC, based in Karaj, Iran, and Afkar System Yazd Company, based
  in Yazd, Iran." — "... the authoring agencies have continued to
  observe these IRGC-affiliated actors exploiting known vulnerabilities
  for initial access." — "The NCSC judges that Yazd, Iran-based company
  Afkar System Yazd Company is actively targeting UK organizations."
  AUDIT (2026-06-24, claude-opus-4.8/max): Also corroborates the ir/irgc placement of
  ir/irgc/najee-technology — names Najee Technology by name as the front under which these
  IRGC-affiliated actors operate. Verbatim: "These actors often operate under the auspices of
  Najee Technology Hooshmand Fater LLC, based in Karaj, Iran, and Afkar System Yazd Company,
  based in Yazd, Iran" (advisory titled "Iranian IRGC-Affiliated Cyber Actors..."). raw_snapshot
  + content_sha256 re-verified (sha256 matches).
  AUDIT (2026-07-10, claude-opus-4.8/max): re-verified for the event-audit of
  2022-09/najee-afkar-irgc-ransomware — sha256 b0439344…ca6c6329 UNCHANGED. Confirmed carried:
  all five event CVEs (CVE-2018-13379 / CVE-2020-12812 / CVE-2019-5591 / CVE-2021-34473 /
  CVE-2021-44228, plus the ProxyShell trio and Log4j family), FortiOS/Exchange/VMware Horizon,
  BitLocker, Plink, Fast Reverse Proxy/FRP, PowerShell, Scheduled Tasks, LSASS credential
  harvesting, "an APT group affiliated with the IRGC", and victim geography "multiple U.S.
  critical infrastructure sectors as well as Australian, Canadian, and United Kingdom
  organizations". NOT present (stripped from the event): "Ngrok" and "Israel" (0 occurrences).
