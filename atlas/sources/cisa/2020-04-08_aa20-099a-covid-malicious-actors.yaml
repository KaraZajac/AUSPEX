notes: |
  First joint CISA + NCSC pandemic-era technical advisory; the
  template for the subsequent multi-month AA cadence on COVID
  threats (AA20-126A healthcare targeting, AA20-201A vaccine-
  research targeting). Notable for its operational framing:
  the advisory is technical-mitigation-led but explicitly names
  "Advanced Persistent Threat (APT) groups and cyber criminals"
  as exploiters of pandemic-themed phishing infrastructure.
