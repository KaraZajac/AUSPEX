notes: |
  Joint advisory consolidating attribution for the APT38 /
  BeagleBoyz pattern of bank-network intrusions and FASTCash
  ATM cash-out operations. Names banks across 38+ countries
  targeted.
  AUDIT (2026-06-24, claude-opus-4.8/max): RGB placement of
  kp/rgb/apt38 VERIFIED against this source's own words. This
  joint CISA/Treasury/FBI/USCYBERCOM advisory names the
  Reconnaissance General Bureau as the actor's service and
  explicitly equates the BeagleBoyz cluster with APT38/Bluenoroff:
  "The BeagleBoyz, an element of the North Korean government's
  Reconnaissance General Bureau, have likely been active since at
  least 2014." and "The BeagleBoyz overlap to varying degrees with
  groups tracked by the cybersecurity industry as Lazarus, Advanced
  Persistent Threat 38 (APT38), Bluenoroff, and Stardust Chollima
  ...". BeagleBoyz is a kp/rgb/apt38 alias (US CISA/FBI, confidence:
  equivalent), so this is a named-actor → named-service link.
  Raw captured 2026-06-24 (curl); term-confirmed
  "Reconnaissance General Bureau"=1, APT38=2.
  AUDIT (2026-07-11, claude-opus-4.8/max, for event 2016-10/global-swift-campaign):
  sha256 re-verified MATCHING (6dfc26c1…f86bd36f37). This event relies on this
  advisory for (a) the Byungjin doctrine signal — verbatim, MODALLY HEDGED: "North
  Korea can use these funds for its UN-prohibited nuclear weapons and ballistic missile
  programs" (drove the event's attested -> strongly_inferred downgrade); (b) the campaign
  scale "The BeagleBoyz have attempted to steal nearly $2 billion since at least 2015";
  (c) the 2018 Banco de Chile wiper diversion "in 2018, they deployed wiper malware
  against a bank in Chile that crashed thousands of computers and servers to distract
  from efforts to send fraudulent messages from the bank's compromised SWIFT terminal";
  and (d) FASTCash (x29) + HOPLIGHT (x8) tradecraft. NB CISA states "$81 million from the
  Bank of Bangladesh in 2016" — that figure belongs to the SEPARATE 2016-02 event.
