notes: |
  Joint advisory attributing Pioneer Kitten / Fox Kitten
  (UNC757 / Parisite / Lemon Sandstorm) to Iran-based actors
  operating as ransomware-affiliate initial-access brokers.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited to support Pioneer Kitten's service placement.
  Does NOT name the IRGC ("IRGC"/"Revolutionary Guard" = 0 hits in the raw advisory). Strongest
  attribution is state-level, not service-level: "The FBI further assesses these Iran-based cyber
  actors are associated with the Government of Iran (GOI) and—separate from the ransomware
  activity—conduct computer network exploitation activity in support of the GOI." Elsewhere
  "Iran-based cyber actors" / "Iranian cyber actors" / "consistent with Iranian state interests";
  the actors "also refer to themselves by the moniker Br0k3r." Supports an Iran/GOI nexus, not an
  IRGC placement — contributed to demoting the actor to ir/unscoped/pioneer-kitten.
