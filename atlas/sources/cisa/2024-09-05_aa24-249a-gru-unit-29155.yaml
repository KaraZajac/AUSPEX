notes: |
  Joint FBI/CISA/NSA + Five-Eyes (NCSC-UK, CCCS, ACSC, NCSC-NZ) +
  Czechia, Estonia, Germany, Latvia, Netherlands, Ukraine advisory
  AA24-249A naming GRU Unit 29155 / the 161st Specialist Training
  Center for global sabotage/espionage, including WhisperGate.

  AUDIT (2026-07-10, claude-opus-4.8/max): created during the audit
  of event 2022-01/whispergate to carry the named-unit (Unit 29155)
  attribution and the primary-source WhisperGate mechanics. Raw
  captured + hashed (165,527 B, sha256 88543e82…efabec0; live page
  "Release Date September 05, 2024 Alert Code AA24-249A"; title
  "Russian Military Cyber Actors Target US and Global Critical
  Infrastructure"). Load-bearing verbatim:
  (1) named-unit — "cyber actors affiliated with the Russian General
  Staff Main Intelligence Directorate (GRU) 161st Specialist Training
  Center (Unit 29155) are responsible for computer network operations
  against global targets for the purposes of espionage, sabotage, and
  reputational harm since at least 2020" (76 "29155" mentions);
  (2) WhisperGate tie + onset — "GRU Unit 29155 cyber actors began
  deploying the destructive WhisperGate malware against multiple
  Ukrainian victim organizations as early as January 13, 2022. These
  cyber actors are separate from other known and more established
  GRU-affiliated cyber [actors]" (→ start_date 2022-01-13; distinct
  from Sandworm/Seashell Blizzard);
  (3) mechanics — "The actors' use of WhisperGate involved the
  deployment of the malware files, stage1.exe and stage2.exe.
  WhisperGate has two stages that corrupts a system's master boot
  record, displays a fake ransomware note, and encrypts files based
  on certain file extensions (see AA22-057A). The actors used multiple
  Discord accounts to store malware files" (→ MBR overwrite + fake
  ransom note + two-stage + Discord + file-extension corrupter);
  (4) actor-id chain — "Cadet Blizzard (formerly known as DEV-0586 by
  Microsoft) … Ember Bear … Frozenvista UNC2589";
  (5) other activity — "The activity includes cyber campaigns such as
  website defacements, infrastructure scanning, data exfiltration, and
  data leak operations" (no numeric defacement count given). NB the
  advisory does NOT name OctoberCMS / Orion-Soft (those specifics are
  in the un-snapshottable June-2024 DOJ Stigal indictment, which is
  Akamai bot-walled). Initial access is described generically as
  exploitation of internet-facing systems / publicly-disclosed CVEs
  (Dahua, Confluence CVE-2022-26134, Exchange) + valid/default
  accounts.
