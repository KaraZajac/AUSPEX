notes: |
  Joint CISA / FBI / NSA advisory on BlackMatter ransomware (DarkSide
  rebrand) targeting US critical infrastructure including food and
  agriculture sectors.
  AUDIT (2026-06-24, claude-opus-4.8/max): raw page captured via curl (CISA 403s WebFetch; live curl
  with a research UA succeeded — 73,279 bytes, genuine "BlackMatter Ransomware | CISA" advisory, not a
  block page). Read in support of the ru/proxies/blackmatter placement audit. FINDING: purely criminal /
  RaaS framing, NO Russia/state nexus — the full 16,149-char body has ZERO occurrences of russia/russian/
  kremlin/moscow/fsb/gru/svr/soviet/proxy/state-sponsored/tolerate/safe-harbor/sanction and makes no
  country attribution at all. Verbatim: "BlackMatter is ransomware-as-a-service (Raas) tool that allows
  the ransomware's developers to profit from cybercriminal affiliates (i.e., BlackMatter actors) who
  deploy it against victims. BlackMatter is a possible rebrand of DarkSide, a RaaS which was active from
  September 2020 through May 2021." Developed "by the Cybersecurity and Infrastructure Security Agency
  (CISA), the Federal Bureau of Investigation (FBI), and the National Security Agency (NSA) to provide
  information on BlackMatter ransomware" after it "targeted multiple U.S. critical infrastructure
  entities, including two U.S. Food and Agriculture Sector organizations." On this basis the actor was
  demoted ru/proxies/blackmatter -> ru/unscoped/blackmatter (criminal/blackmatter flagged for human review).
