notes: |
  Cited as the standing reference for the pattern of joint Five Eyes
  CSAs (CISA + NSA + FBI + UK NCSC + ASD ACSC + CCCS + NZ NCSC) — the
  operational expression of the us/five-eyes doctrine entry. No single
