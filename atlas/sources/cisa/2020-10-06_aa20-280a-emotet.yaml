notes: |
  CISA joint advisory (CISA + MS-ISAC) characterizing Emotet as "one of the most
  prevalent ongoing threats" to US state, local, tribal, and
  territorial governments in 2020.

  AUDIT (2026-07-01, claude-opus-4.8/max): Live URL fetched + snapshotted +
  sha256 (75,072 bytes, f744c541…ce7be247a). Real AA20-280A advisory (title
  "Emotet Malware | CISA"), NOT a phantom. Carries verbatim: Emotet "resurged
  in July 2020, after a dormant period that began in February"; "This increase
  has rendered Emotet one of the most prevalent ongoing threats"; phishing /
  spearphishing attachment+link; Aug: Qbot(Qakbot) primary payload + password-
  protected Zip lure (Microsoft); Sep: "dropping Trickbot to deliver ransomware
  payloads ... and Qakbot Trojans to steal banking credentials"; Palo Alto
  thread-hijacking (reply-chain); Mimikatz/LSASS credential dumping; lateral
  movement via brute-forced local admin + Admin$ SMB share; ~16,000 EINSTEIN
  alerts. Audience = "federal, state, local, tribal, territorial governments".
  Does NOT name: Ryuk, Conti, Cobalt Strike, a specific state, or a July day
  (says only "July 2020"). tier: primary retained (first-party govt advisory).
