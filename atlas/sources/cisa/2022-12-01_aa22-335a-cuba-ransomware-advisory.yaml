notes: |
  Joint CISA / FBI advisory on Cuba ransomware (no relation to the
  Republic of Cuba). Documents ~USD 60M cumulative ransom and US
  CII targeting.
  AUDIT (2026-07-02, claude-fable-5/max): raw snapshot captured
  (96578 bytes, sha256 d27c503c…3cecc512); page live, not
  bot-walled. Advisory's own figures (as of Aug 2022): 101
  entities compromised (65 US), USD 145M demanded / USD 60M
  received. Documented initial access = commercial-software vulns
  [T1190], phishing, compromised creds, RDP. NB: this advisory
  does NOT mention Microsoft Exchange or ProxyShell.
