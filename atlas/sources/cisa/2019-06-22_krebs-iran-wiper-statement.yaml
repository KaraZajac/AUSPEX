notes: |
  CISA Director Christopher C. Krebs statement during US-Iran
  tensions (June 2019). Released 2019-06-22, revised 2021-02-05.

  Canonical URL RESOLVED 2026-07-10 (previously url:null; earlier
  cite was cisa.gov/news-events/news generic index). Live page now
  at cisa.gov/news-events/news/cisa-statement-iranian-cybersecurity-
  threats (HTTP 200; "Archived Content" banner). Snapshotted.

  Substance: a general WARNING, not a report of a specific breach —
  "In response to reports of an increase in cybersecurity threats."
  Names only "Iranian regime actors and proxies" (nation level; NO
  IRGC unit, NO named malware, NO ZeroCleare/Dustman, NO specific
  victim). Warns Iran is "increasingly using destructive 'wiper'
  attacks" against "United States industries and government agencies,"
  enabled by "spear phishing, password spraying, and credential
  stuffing." Title corrected from the earlier paraphrase ("Director
  Krebs Statement on Iranian-Linked Wiper Cyber Activity") to the
  real page title.
