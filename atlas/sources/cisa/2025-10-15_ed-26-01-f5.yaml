notes: |
  CISA emergency directive issued same day as F5's nation-state
  breach disclosure. Requires FCEB agencies to inventory F5
  BIG-IP deployments, evaluate management-interface exposure,
  and patch by 22 October 2025; complete inventory due 29
  October 2025.
