notes: |
  CISA emergency directive issued same day as F5's nation-state
  breach disclosure. Attributes the compromise to a "nation-state
  affiliated cyber threat actor" (no country named). Requires FCEB
  agencies to inventory F5 BIG-IP deployments, evaluate management-
  interface exposure, and apply updates by 22 October 2025; report
  in-scope products to CISA by 29 October 2025; submit a detailed
  inventory of all instances by 3 December 2025.
