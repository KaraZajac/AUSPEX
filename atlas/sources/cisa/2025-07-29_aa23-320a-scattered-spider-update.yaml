notes: |
  Authoritative joint Cybersecurity Advisory on Scattered Spider
  (UNC3944 / Octo Tempest / Muddled Libra), the July 29, 2025 update
  to AA23-320A (originally published 2023-11-16). Co-sealed by FBI,
  CISA, RCMP, ASD/ACSC, AFP, CCCS, and NCSC-UK. This is the dated,
  immutable IC3 PDF snapshot of the revised advisory (the live CISA
  HTML at cisa.gov/.../aa23-320a is a living document — the existing
  cisa/2023-11-16 source record points at the same URL for the 2023
  version).
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed.
  Verbatim support for event 2025-07/scattered-spider-airlines-uk-retail:
  "…releasing this joint Cybersecurity Advisory in response to recent
  activity by Scattered Spider threat actors against the commercial
  facilities sectors, subsectors, and other sectors. This advisory
  provides tactics, techniques, and procedures (TTPs) obtained through
  FBI investigations as recently as June 2025." · "…several ransomware
  variants, most recently deploying DragonForce ransomware alongside
  their usual [tactics]." · Help-desk social engineering: "convince IT
  help desk personnel to reset passwords and/or MFA tokens." ·
  "encrypting VMware Elastic Sky X integrated (ESXi) servers [T1486]" /
  "VMware ESXi servers." · "data theft for extortion." NOTE: the
  advisory is TTP-/sector-level and does NOT name the individual
  M&S / Co-op / Harrods / airline victims.
