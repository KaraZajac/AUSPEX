notes: |
  Joint CISA / FBI advisory on the Snatch ransomware group, using forum
  aliases including "Truniger" (lineage from "Team Truniger," a key
  member who previously operated as a GandCrab affiliate).
  AUDIT (2026-06-24, claude-opus-4.8/max): read in full against the actor
  ru/proxies/snatch -> demoted to ru/unscoped/snatch. This advisory
  documents NO Russian-state nexus. It frames Snatch purely as criminal
  ransomware-as-a-service: "Snatch operates a ransomware-as-a-service
  (RaaS) model and claimed their first U.S.-based victim in 2019",
  "identified through FBI investigations as recently as June 1, 2023".
  The ONLY "Russia/Russian" references are to criminal infrastructure —
  verbatim: "a command and control (C2) server located on a Russian
  bulletproof hosting service [T1583.003]" and "Snatch threat actors
  initiated RDP connections from a Russian bulletproof hosting service"
  — a where-they-rent-servers criminal trait, not state tasking /
  tolerance / safe-harbor. ZERO occurrences of FSB/GRU/SVR/intelligence
  service/state-sponsor/nation-state/tasking/tolerate/safe-harbor/
  sanction/proxy in the captured snapshot. (The earlier YAML note's
  "Russian-speaking" claim is NOT in the advisory body and was dropped
  from the actor record.) Earlier `retrieved_on` 2026-05-26; live re-
  fetch on 2026-06-24 returned HTTP 403 (cisa.gov bot-block) and
  WebFetch likewise 403'd, so verification rests on the previously
  captured raw_snapshot (sha256 above; 111,270-byte HTML, 32,162 chars
  visible text, real advisory content — not a block page).
