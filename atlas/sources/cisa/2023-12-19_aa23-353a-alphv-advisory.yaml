  at the wrong AA23-061A page) was dropped to null rather than fabricated.
  Fetched live (curl, HTTP 200, 87,295 bytes; raw_snapshot above). Page confirmed: <title>
  "#StopRansomware: ALPHV Blackcat | CISA"; ALPHV x51, Blackcat x40, royal x0; "December 19, 2023:
  Initial version." Representative content: "Since mid-December 2023, of the nearly 70 leaked victims,
