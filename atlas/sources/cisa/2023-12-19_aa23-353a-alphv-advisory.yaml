  asset URL, not the agency); its lone "proxy" reference is "Suspected Proxy Tool socks32.exe" — a
  network tool, not a state proxy. Confirms ALPHV/BlackCat as purely criminal RaaS, consistent with
  the criminal/alphv placement.
