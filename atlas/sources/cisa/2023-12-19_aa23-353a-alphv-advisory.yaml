notes: |
  Joint FBI / CISA #StopRansomware advisory on the ALPHV/BlackCat
  ransomware-as-a-service operation and its affiliates, issued
  alongside the December 2023 FBI leak-site disruption. Purely
  criminal affiliate-based RaaS framing; no Russian-state nexus.

