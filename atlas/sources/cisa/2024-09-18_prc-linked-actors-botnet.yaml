notes: |
  Joint Cybersecurity Advisory co-authored by FBI, Cyber National Mission
  Force (CNMF), NSA and international partners; Product ID JCSA-20240918-001,
  released concurrently with the DOJ/FBI Raptor Train takedown. Snapshot
  captured from the first-party FBI IC3 copy (ic3.gov); the cisa.gov and
  media.defense.gov (CSA-PRC-LINKED-ACTORS-BOTNET.PDF) copies are bot-walled
  (HTTP 403) to the fetcher.
  AUDIT (2026-07-05, claude-opus-4.8/max): 18-page PDF captured + hashed.
  Carries verbatim: "As of June 2024, the botnet consisted of over 260,000
  devices"; device types "small office/home office (SOHO) routers, firewalls,
  network-attached storage (NAS) and Internet of Things (IoT) devices" and
  Mirai-hijacked "webcams, DVRs, IP cameras, and routers"; "Integrity
  Technology Group (Integrity Tech), a PRC-based company, has controlled and
  managed a botnet active since mid-2021"; "China Unicom Beijing Province
  Network IP addresses" used to manage it and the associated intrusions;
  victim geography "North America, South America, Europe, Africa, Southeast
  Asia and Australia"; the group tracked "publicly as Flax Typhoon,
  RedJuliett, and Ethereal Panda"; the botnet used "as a proxy to conceal
  their identities while deploying DDoS attacks or compromising targeted U.S.
  networks" and "positioned for malicious activity." Does NOT use the name
  "Raptor Train" and does NOT name Taiwan or the MSS.
