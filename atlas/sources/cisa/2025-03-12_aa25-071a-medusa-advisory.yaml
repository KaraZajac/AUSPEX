notes: |
  Joint advisory on the Medusa ransomware operation targeting critical
  infrastructure, education, healthcare and manufacturing.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured live (HTTP 200, 113,892 bytes; sha256 above). Used to
  verify the ru/proxies/medusa actor placement and FOUND NO Russia-state nexus — nor even the Russia nation.
  The advisory frames Medusa purely as a financially-motivated cybercriminal RaaS of unstated operator origin:
  "Medusa is a ransomware-as-a-service (RaaS) variant first identified in June 2021"; "Medusa originally
  operated as a closed ransomware variant, meaning all development and associated operations were controlled by
  the same group of cyber threat actors"; "Medusa developers typically recruit initial access brokers (IABs) in
  cybercriminal forums and marketplaces to obtain initial access." Operators are named only "Medusa actors."
  Full-text scan of the raw snapshot: ZERO Russian / FSB / GRU / SVR / Kremlin / Moscow / state-sponsored /
  nation-state / safe-harbor / tolerated. The lone "Russia" token is an unrelated sidebar link ("Pro-Russia
  Hacktivists…"); the lone "proxy" token is "3128 (HTTP web proxy)" in an IOC table. Consequence: actor demoted
  ru/proxies/medusa -> ru/unscoped/medusa with the ru/ nation itself flagged unsourced (likely stateless
  criminal/) — see atlas/actors/ru/medusa.yaml notes.
