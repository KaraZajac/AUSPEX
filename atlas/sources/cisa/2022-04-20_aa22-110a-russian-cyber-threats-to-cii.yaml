notes: |
  Five Eyes joint advisory on Russian state and criminal cyber
  threats to critical infrastructure following the February 2022
  invasion. Explicitly names Killnet, CoomingProject, Conti and
  other Russia-aligned cybercrime / hacktivist fronts.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify ru/proxies/killnet — finding: the advisory
  does NOT frame Killnet as a state-tolerated/tasked proxy. It lists Killnet under "Russian-Aligned
  Cybercrime Groups" (defined as "typically financially motivated cyber actors that seek to exploit
  human or security vulnerabilities to enable direct theft of money"), describes the alignment as
  INDEPENDENT and self-declared ("some cybercrime groups have independently publicly pledged support for
  the Russian government"; Killnet entry: "according to open-source reporting, Killnet released a video
  pledging support to Russia. ... Killnet claimed credit for carrying out a DDoS attack against a U.S.
  airport in March 2022 in response to U.S. materiel support for Ukraine"), and carries the explicit
  disclaimer "Note: although some cybercrime groups may conduct cyber operations in support of the
  Russian government, U.S., Australian, Canadian, New Zealand, and UK cyber authorities assess that
  cyber criminals will most likely continue to operate primarily based on financial motivations".
  The advisory names a Russian SERVICE only for the state APTs (GRU/FSB/SVR → Sandworm/APT28/APT29/
  Berserk Bear), NOT for Killnet, and gives no safe-harbor or formal state-aligned designation. Result:
  Killnet demoted ru/proxies/killnet → ru/unscoped/killnet (state assessed, no source-documented service/
  proxy nexus); 2 referencing events FK-propagated.
