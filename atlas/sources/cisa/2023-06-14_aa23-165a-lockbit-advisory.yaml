notes: |
  Largest international joint advisory on LockBit to date, signed by
  agencies from US, UK, Australia, Canada, NZ, France, Germany —
  prefiguring the February 2024 Operation Cronos disruption.

  AUDIT (2026-06-24, claude-opus-4.8/max): state-nexus = NO. Characterizes LockBit as a
  profit-driven RaaS: "LockBit ransomware operation functions as a Ransomware-as-a-Service
  (RaaS) model where affiliates are recruited to conduct ransomware attacks", affiliates
  paid via "upfront payment, subscription fees, a cut of profits". "Russian-language based
  cybercrime forums" is a forum/language descriptor only. The single "State-Sponsored"
  token on the captured page belongs to an UNRELATED China advisory (AA25-239A) in the
  site's nav/related-advisory list — NOT a claim about LockBit. ZERO FSB/GRU/SVR/safe-harbor
  attribution to a Russian service. raw_snapshot = curl 2026-06-24 (HTTP 200 — did not 403).
