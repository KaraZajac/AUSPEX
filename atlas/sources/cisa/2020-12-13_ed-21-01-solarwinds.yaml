notes: |
  CISA Emergency Directive issued immediately on disclosure of the
  SolarWinds Orion supply-chain compromise. Required federal
  agencies to disconnect Orion products. Attribution to SVR
  followed in April 2021.
  AUDIT (2026-07-11, claude-opus-4.8/max): snapshotted from the live
  url (HTTP 200; now 301-redirects to the "…-code-compromise-closed"
  archived/sunset copy, sunset 8 Jan 2026 — original 13 Dec 2020
  issuance text intact). raw_snapshot + content_sha256 added above
  (100,780 bytes). The web-friendly ED 21-01 (+ Supplemental Guidance
  v3 / Direction v4) carries, verbatim: original issuance "On December
  13, 2020, CISA issued ED 21-01"; the SVR attribution update "Updated
  April 15, 2021: The U.S. Government attributes this activity to the
  Russian Foreign Intelligence Service (SVR)"; the trojanized DLL
  "SolarWinds.Orion.Core.BusinessLayer.dll with a file hash of
  b91ce2fa41029f6955bff20079468448"; the backdoor names "malicious
  backdoor AKA TEARDROP or SUNBURST"; the beacon domain "binary
  beaconing to avsvmcloud[.]com"; and the SAML/AD FS abuse (agencies
  "shall not configure the SolarWinds software to implement SAML-based
  authentication that relies on Microsoft's Active Directory Federated
  Services. This configuration is currently being exploited"). Affected
  versions 2019.4–2020.2.1 HF1. Does NOT enumerate specific agency
  victims (generic "U.S. government agencies, critical infrastructure
  entities, and private organizations").
