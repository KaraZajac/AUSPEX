notes: |
  Joint advisory on the Karakurt data-extortion group, tied via
  Chainalysis tracing to Conti / TrickBot infrastructure.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured the live advisory (HTTP 200, last
  revised 2023-12-12; version history: "June 01, 2022: Initial version" + Dec 2023 Cisco-VPN
  addendum). The advisory is a purely CRIMINAL data-extortion framing and names ZERO
  Russia/state/proxy/FSB/GRU/SVR/Kremlin/sanction nexus — and, notably, does NOT itself mention
  Conti, TrickBot, Wizard Spider, or Chainalysis (the Conti/TrickBot tie in this note rides on
  AdvIntel + Chainalysis tracing, NOT on the advisory body). Key wording: SUMMARY — "the Karakurt
  data extortion group, also known as the Karakurt Team and Karakurt Lair... Karakurt actors have
  claimed to steal data and threatened to auction it off or release it to the public unless they
  receive payment of the demanded ransom"; Initial Intrusion — access obtained "Via cooperating
  partners in the cybercrime community" and through "third-party intrusion broker networks". The
  lone "espionage" token is generic intrusion-broker boilerplate ("...such as those engaged in
  ransomware, business email compromise, corporate and government espionage, etc."), not a Karakurt
  attribution. Used to demote ru/proxies/karakurt -> ru/unscoped/karakurt (state-tolerated-proxy
  claim unsourced; criminal/karakurt flagged for human review, Emotet precedent).
