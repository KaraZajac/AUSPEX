notes: |
  CISA Activity Alert AA20-006A, the U.S. government warning of the
  potential for Iranian cyber response to the January 3, 2020 U.S.
  military strike in Baghdad (the strike that killed IRGC-Quds Force
  commander Qasem Soleimani). A warning/posture milestone, NOT an
  attribution of any specific attack.
  AUDIT (2026-06-27, claude-opus-4.8/max): created during phantom
  remediation of event 2020-03/iran-soleimani-retaliation. Raw
  snapshot captured (75,138 bytes, sha256 decb4862…d9f0fd4d). Verbatim
  purpose: "The Cybersecurity and Infrastructure Security Agency
  (CISA) is sharing the following information with the cybersecurity
  community as a primer for assisting in the protection of our
  Nation's critical infrastructure in light of the current tensions
  between the Islamic Republic of Iran and the United States and
  Iran's historic use of cyber offensive activities to retaliate
  against perceived harm." The title names the "U.S. Military Strike
  in Baghdad" (the Soleimani strike); the advisory text does not name
  Soleimani. The live page now shows "Last Revised October 24, 2020";
  the cited published_on is the original AA20-006A release date
  (January 6, 2020).
