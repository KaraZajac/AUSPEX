notes: |
  CISA's official two-year retrospective on the Colonial Pipeline attack. Added 2026-07-10
  (claude-opus-4.8/max) as the authoritative govt carrier for the event's policy-aftermath and
  impact claims (the contemporary May-2021 govt sources predate those outcomes). URL resolved
  HTTP 200 (note: WebFetch returns 403, but curl with a browser UA succeeds); raw hashed (61,307
  bytes, 3e76dbc1…b2cacefc). Verbatim support: the harmful impact — "snaking lines of cars at gas
  stations across the eastern seaboard and panicked Americans filling bags with fuel"; the
  regulatory response — "the Security Directives TSA issued in the aftermath of the attack on
  Colonial Pipeline"; and the federal-coordination response — "we launched the Joint Ransomware
  Task Force with our FBI partners to orchestrate the federal government's response to the epidemic
  of ransomware." This confirms the event's "CISA / FBI joint Ransomware Task Force" phrasing is
  accurate (the JRTF, CISA-and-FBI co-chaired), not a fabrication. The page does NOT mention EO
  14028.
