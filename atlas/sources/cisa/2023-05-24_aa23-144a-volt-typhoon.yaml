notes: |
  Initial Five Eyes joint disclosure of Volt Typhoon targeting US
  critical infrastructure including Guam telecom.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited in the cn/mss/volt-typhoon service audit. This
  joint US-government + Five Eyes advisory attributes Volt Typhoon only at the nation level and
  names NO Chinese service: it highlights "a recently discovered cluster of activity of interest
  associated with a People's Republic of China (PRC) state-sponsored cyber actor, also known as
  Volt Typhoon." The only "Bureau" in the text is the (US) Federal Bureau of Investigation, a
  co-author. No mention of the MSS, the PLA, or any unit. Contributes to the DEMOTE to
  cn/unscoped/volt-typhoon.
