notes: |
  Joint advisory co-signed by US CISA, FBI, NSA; Republic of
  Korea National Intelligence Service, Defense Counterintelligence
  Command, and Korea National Police Agency; and UK NCSC. Anchor
  primary source for ROK NIS-CSC and DCC joint attribution voice
  on DPRK Andariel targeting of defense and aerospace IP.

  AUDIT (2026-06-24, claude-opus-4.8/max): captured + hashed
  (raw_snapshot above). This advisory attributes the offensive
  espionage operation to NORTH KOREA — the DPRK Reconnaissance
  General Bureau (RGB) 3rd Bureau group Andariel / Onyx Sleet — not
  to any ROK body. Verbatim: "The RGB 3rd Bureau includes a DPRK (aka
  North Korean) state-sponsored cyber group known publicly as
  Andariel, Onyx Sleet ... The group primarily targets defense,
  aerospace, nuclear, and engineering entities ... to advance the
  regime's military and nuclear programs and ambitions." The ROK
  authoring/attribution bodies named are NIS, the Defense
  Counterintelligence Command, and the Korea National Police Agency;
  KISA / KrCERT does NOT appear anywhere in the advisory text. Used
  here to support DEMOTION of kr/kisa/krcert-actor -> kr/unscoped:
  this primary source attributes the op to DPRK and does not name
  KISA, so it cannot place KISA/KrCERT as an operator of any offensive
  cyber operation.

  AUDIT (2026-07-04, claude-opus-4-8/max): raw_snapshot hash
  RE-VERIFIED exactly (9816eb79…762e41e6, 174,635 bytes on disk).
  CORRECTION to the 2026-06-24 note above: the advisory's authoring
  agencies, quoted verbatim from the raw, are — US "Cyber National
  Mission Force (CNMF) U.S. Cybersecurity and Infrastructure Security
  Agency (CISA) U.S. Department of Defense Cyber Crime Center (DC3)
  U.S. National Security Agency (NSA)" and "The U.S. Federal Bureau of
  Investigation (FBI)"; "Republic of Korea's National Intelligence
  Service (NIS)" and "Republic of Korea's National Police Agency
  (NPA)"; and "United Kingdom's National Cyber Security Centre (NCSC)".
  There is NO "Defense Counterintelligence Command / DCC" anywhere in
  the advisory (0 occurrences of "counterintelligence"); the ROK police
  body is the National Police Agency (NPA), not "Korea National Police
  Agency / KNPA"; CNMF and DC3 are additional US co-authors the prior
  note omitted. Verbatim GOAL (for the attested strategic-tech-
  collection link on the aa24-207a-andariel-joint-advisory event): "The
  group primarily targets defense, aerospace, nuclear, and engineering
  entities to obtain sensitive and classified technical information and
  intellectual property to advance the regime's military and nuclear
  programs and ambitions." Verbatim DUAL espionage+ransomware framing:
  "Andariel actors fund their espionage activity through ransomware
  operations against U.S. healthcare entities" and "the authoring
  agencies have observed the actors launching ransomware attacks and
  conducting cyber espionage operations on the same day and/or
  leveraging ransomware and cyber espionage against the same entity."
  Named-unit anchor: "state-sponsored cyber group, under the RGB 3rd
  Bureau, based in Pyongyang and Sinuiju." tier/primary PRESERVED.
