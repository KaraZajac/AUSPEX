notes: |
  Joint advisory on the Andariel-deployed Maui ransomware
  campaign against US healthcare since May 2021. Custom,
  manually-deployed ransomware with AES + operator-supplied keys.
  AUDIT (2026-06-24, claude-opus-4.8/max): re kp/rgb/andariel
  service audit — this advisory does NOT name the RGB. It attributes
  the activity generically to "North Korean State-Sponsored Cyber
  Actors" (title) and "DPRK state-sponsored cyber actors"; raw
  snapshot has 0 occurrences of "Reconnaissance General Bureau",
  "RGB", or "Andariel". It corroborates DPRK state sponsorship and
  the healthcare-targeting Maui campaign, but the RGB tasking is
  attested by other cited sources (OFAC 2019; Symantec 2024), not
  this one. Captured for completeness.
