notes: |
  Joint advisory on the Vice Society ransomware group, focused on
  education sector targeting in the US, UK, Australia and New Zealand.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured live (cisa.gov HTTP 200, 77,747 bytes) to verify the
  ru/proxies/vice-society placement. Source is a PURELY CRIMINAL / law-enforcement framing with NO Russia or
  state nexus. Verbatim: "Vice Society is an intrusion, exfiltration, and extortion hacking group that first
  appeared in summer 2021"; "Vice Society actors do not use a ransomware variant of unique origin. Instead,
  the actors have deployed versions of Hello Kitty/Five Hands and Zeppelin ransomware"; "the opportunistic
  targeting often seen with cyber criminals". The raw page contains ZERO occurrences of Russia/Russian/
  state-sponsored/proxy/FSB/GRU/SVR/Kremlin/nation-state/intelligence-service (every "nation"/"state" hit is
  CISA site boilerplate). On this finding the actor was demoted ru/proxies/vice-society -> ru/unscoped/
  vice-society and the unsourced ru/ doctrine alignment dropped; whether the ru nation holds at all (the
  advisory does not even say "Russian-speaking") and whether it should re-home to criminal/ are flagged for
  human review.
