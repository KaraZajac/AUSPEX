notes: |
  Joint CISA / FBI advisory issued following the Colonial Pipeline
  attack — first authoritative US government advisory on the DarkSide
  ransomware affiliate program.

  AUDIT (2026-06-24, claude-opus-4.8/max): supports the ru/proxies/darkside ->
  ru/unscoped/darkside demotion. Pure criminal ransomware-as-a-service framing, NO Russian-
  state nexus. Verbatim: "DarkSide is ransomware-as-a-service (RaaS)—the developers of the
  ransomware receive a share of the proceeds from the cybercriminal actors who deploy it, known
  as 'affiliates.'"; "Note: CISA and the FBI do not encourage paying a ransom to criminal
  actors." ZERO Russia / Russian / FSB / GRU / SVR / Kremlin / harbor / tolerance / state-
  sponsorship token. (No standalone CIS-avoidance language either — a first-pass "CIS x38"
  token count was a false positive: all instances were "CISA", the agency name.)
