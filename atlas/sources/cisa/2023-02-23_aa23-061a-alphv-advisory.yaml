  AA23-061A is the Royal Ransomware advisory; the ALPHV (BlackCat)
  joint advisory was released the same period. URL needs verification
  — note the actor-file FK may have crossed the slug between Royal
  and ALPHV. Flag for slug-cleanup review.
  AUDIT (2026-06-24, claude-opus-4.8/max): SLUG CROSSING CONFIRMED — this is the WRONG advisory for ALPHV.
  The captured live page (raw_snapshot above; cisa.gov served curl directly) is titled "#StopRansomware:
  Blacksuit (Royal) Ransomware" and mentions "ALPHV"/"BlackCat"/"BlackCat" ZERO times ("royal" x32). Its
  4 "proxy" hits are SOCKS/network proxy tooling, not a state proxy; 0 Russia/FSB/GRU/state-sponsored
  tokens. So as cited it corroborates NEITHER ALPHV NOR any Russia-state nexus. The genuine CISA ALPHV
  advisory is AA23-353A ("#StopRansomware: ALPHV Blackcat", https://www.cisa.gov/news-events/cybersecurity-
  advisories/aa23-353a), which is also purely criminal affiliate-based RaaS with 0 Russia/state language
  (its lone "proxy" hit = "Suspected Proxy Tool socks32.exe"). FLAGGED for slug repair: this FK should
  point at the AA23-353A advisory (or be replaced), independent of the actor demotion. Contributed to the
  ru/proxies/alphv -> ru/unscoped/alphv demotion (no cited source documents a Russia-state nexus).
