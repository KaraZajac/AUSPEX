  Joint CISA / NCSC advisory on Star Blizzard (aka SEABORGIUM /
  Callisto Group / COLDRIVER). Companion to the DOJ indictment,
  Treasury OFAC + UK FCDO sanctions same day (7 Dec 2023).
  AUDIT (2026-07-10, claude-opus-4.8/max): raw snapshot captured from
  the live cisa.gov advisory (77,493 B, sha256 a0b13c6d…77c3c9ff);
  published_on corrected 2026-05-25 → 2026-07-10 retrieved_on. RAW
  attribution wording is HEDGED: "Star Blizzard is almost certainly
  subordinate to the Russian Federal Security Service (FSB) Centre
  18" — the prior note's flat 'specifically to "Centre 18 of the FSB"'
  over-stated the source; corrected. RAW target set (verbatim):
  "Since 2019, Star Blizzard has targeted sectors including academia,
  defense, governmental organizations, NGOs, think tanks and
  politicians" (no "dissidents"; no "2015" onset — CISA says "since
  2019"). EvilGinx credential + session-cookie harvesting confirmed.
  Used on 2023-12/star-blizzard-fsb-indictment-sanctions.
