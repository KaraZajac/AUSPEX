notes: |
  Joint US / Australia advisory on BianLian ransomware. Documents
  pivot from encrypt-and-extort to data-extortion-only after the
  Avast decryptor release in January 2023.

  AUDIT (2026-07-02, claude-fable-5/max): raw_snapshot + content_sha256 added
  during the RE-SOURCE of 2023-01/bianlian-pivot-data-extortion. CORRECTION to
  the note above: this advisory documents the pivot but does NOT mention Avast
  or the decryptor (0 "Avast" hits; the lone "decryptor" hit is the FBI asking
  victims to submit decryptor files) -- the "after the Avast decryptor release"
  causation is NOT carried here; it is carried by the added Avast (2023-01-16)
  and The Register (2023-03-19) sources. NB the LIVE page is the Nov-20-2024
  REVISION (published_on 2023-05-16 retained = original release), which is why
  it now dates the shift to "exclusively exfiltration-based extortion around
  January 2024". Snapshot HTTP 200, 137,973 bytes, sha256 1b937b45...2945f594.
  Verbatim pivot sentence: "BianLian group originally employed a double-extortion
  model in which they encrypted victims' systems after exfiltrating the data;
  however, they shifted primarily to exfiltration-based extortion around January
  2023 and shifted to exclusively exfiltration-based extortion around January
  2024." Attribution (named-actor, joint govt, high): "The Federal Bureau of
  Investigation (FBI), Cybersecurity and Infrastructure Security Agency (CISA),
  and Australian Signals Directorate's Australian Cyber Security Centre (ASD's
  ACSC) are releasing this joint Cybersecurity Advisory to disseminate known
  BianLian ransomware and data extortion group IOCs and TTPs".
