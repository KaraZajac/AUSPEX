notes: |
  NCSC-led Five Eyes advisory on SVR (APT29 / Cozy Bear / Midnight
  Blizzard) tradecraft shifts as victim infrastructure migrates
  from on-premise to cloud. Documents SVR's increased use of
  password-spray and token-theft against cloud identity tenants,
  abuse of dormant service accounts, registration of unauthorised
  MFA devices, and OAuth-app misuse — the same tradecraft attested
  in the Microsoft (Jan 2024) and HPE (Jan 2024) intrusions.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured,
  sha256 above (74,392 bytes; HTML title "SVR Cyber Actors Adapt
  Tactics for Initial Cloud Access | CISA"). Precision on the note
  above: the advisory itself never names HPE and never mentions
  OAuth (its token TTP is stolen system-issued access tokens,
  T1528); its only incident cross-reference is that some TTPs
  (residential proxies, exploitation of system accounts) are
  "similar to those reported as recently as January 2024 by
  Microsoft". The Microsoft/HPE pairing is external context, not
  this advisory's content. Actual sealer list (verbatim in raw):
  NCSC-UK assesses; NSA, CISA, CNMF, FBI, ASD's ACSC, CCCS, GCSB
  "agree with this attribution and the details provided in this
  advisory". Attribution wording: APT29 "almost certainly part of
  the SVR". UK Crown Copyright.
