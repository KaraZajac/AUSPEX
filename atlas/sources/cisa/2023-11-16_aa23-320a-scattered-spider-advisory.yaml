notes: |
  Joint CISA / FBI advisory on Scattered Spider (UNC3944) — an
  English-speaking social-engineering crew responsible for the
  September 2023 MGM and Caesars Entertainment intrusions.
  AUDIT (2026-07-01, claude-opus-4.8/max): snapshot captured + hashed. Scope
  note for the re-source of event 2022-08/twilio-cloudflare-0ktapus: this
  advisory explicitly lists "Oktapus" as a Scattered Spider alias ("also known
  as, UNC3944, Scatter Swine, Oktapus, Octo Tempest, Storm-0875, and Muddled
  Libra") — so it DOES support the 0ktapus->Scattered-Spider identity mapping —
  but it does NOT document the Aug-2022 Twilio/Cloudflare campaign facts at all
  (no "Twilio", "Cloudflare", "Group-IB", "130", "163/209", "DoorDash", no
  Aug-2022 dates). It was wrongly cited as the campaign-fact + attribution
  source on that event; those roles moved to the Group-IB/Cloudflare/Twilio
  primaries. Legitimately still cited by the Scattered Spider actor record and
  the 2023 MGM/Caesars + Clorox events.
