notes: |
  Joint fact sheet by CISA, the FBI, the DoD Cyber Crime Center
  (DC3) and the NSA, published June 30, 2025 in the wake of the
  June 2025 Israel-Iran ("12-day war") kinetic exchange and
  ceasefire. FRAMING is POTENTIAL targeting / heightened vigilance,
  NOT a confirmed new operation: the CISA landing page (snapshotted)
  states the fact sheet "details the need for increased vigilance
  for potential cyber activity against U.S. critical infrastructure
  by Iranian state-sponsored or affiliated threat actors"; the
  companion CISA news alert (snapshotted) says the agencies
  "released a Fact Sheet urging organizations to remain vigilant
  against potential targeted cyber operations by Iranian
  state-sponsored or affiliated threat actors" and that "over the
  past several months, there has been increasing activity from
  hacktivists and Iranian government-affiliated actors, which is
  expected to escalate."
  CREATED 2026-07-05 (claude-opus-4.8/max) as the RE-SOURCE for
  event 2025-08/cyberav3ngers-water-sector-summer-2025, replacing
  the phantom source waterisac/2025-08-14_cyberav3ngers-summer-2025
  (an August-2025 WaterISAC "sectoral advisory" that does not exist;
  url was null, self-flagged unlocatable, and web-unverifiable).
  SNAPSHOT SCOPE / qc partial: the actual fact-sheet PDF
  (media.defense.gov/2025/Jun/30/2003745375/-1/-1/0/JOINT-FACT-SHEET-
  IRANIAN-CYBER-ACTORS-MAY-TARGET-VULNERABLE-US-NETWORKS-AND-
  ENTITIES-OF-INTEREST-508C.PDF) is bot-walled (HTTP 403 Access
  Denied) and could NOT be snapshotted. The raw_snapshot is the
  CISA resource landing page (title, June-30-2025 date, four
  authoring agencies, the "potential cyber activity / increased
  vigilance" framing). A companion snapshot of the CISA news alert
  is also on disk: cisa__2025-06-30_iranian-cyber-actors-may-target
  __news-alert.html, sha256
  171e6782e66cac74f77a9bf26f456a5eb39585432cebb2458c3bcbc7b1b01701,
  61,432 bytes. The fact sheet's body content — that it reiterates
  the IRGC-affiliated CyberAv3ngers threat to internet-exposed OT
  (the 2023-2024 Unitronics Vision PLC campaign against US water /
  wastewater) as the illustrative OT threat — is corroborated via
  reporting (Cybersecurity Dive; CISA's own Iran-advisories index)
  and is consistent with the corpus's snapshotted AA23-335A baseline
  (cisa/2023-12-01_aa23-335a-cyberav3ngers), but is NOT itself
  captured in the landing-page snapshot.
