notes: |
  Joint CISA / FBI guidance issued July 4 2021 after REvil's July 4
  weekend exploitation of Kaseya VSA.

  AUDIT (2026-07-10, claude-opus-4.8/max): url:null defect CORRECTED and
  snapshotted. The prior record carried url:null with a title claiming
  "Alert (AA21-209A)"; AA21-209A is CISA's unrelated "Top Routinely
  Exploited Vulnerabilities" annual advisory, NOT the Kaseya guidance.
  The genuine CISA guidance is a plain web-page alert (no AA number),
  located and curl-verified (HTTP 200, 55,987 B, body ~5.9 KB). The FK
  slug retains the legacy "aa21-209a" token to avoid FK churn across the
  event + orgs/kaseya target that cite it; the title has been corrected
  to the real page title. published_on corrected 2021-07-28 -> 2021-07-04.
  Verbatim carried: "CISA and the Federal Bureau of Investigation (FBI)
  continue to respond to the recent supply-chain ransomware attack
  leveraging a vulnerability in Kaseya VSA software against multiple
  managed service providers (MSPs) and their customers"; IOC pointer to
  "Peter Lowe's GitHub page REvil Kaseya CnC Domains" with the explicit
  hedge "Note: due to the urgency to share this information, CISA and FBI
  have not yet validated this content." -> the July 4 REvil attribution
  here is SOFT/unvalidated (source of the concur-with-caveat on the
  same-day attribution entry). This alert does NOT carry the 60-MSP /
  800-1,500-business counts, the $70M demand, Coop, or the CVE IDs; those
  are carried by the Kaseya PR, BleepingComputer, and enwikipedia records.
