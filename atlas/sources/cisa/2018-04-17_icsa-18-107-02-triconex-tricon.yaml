notes: |
  Official ICS-CERT/CISA advisory for the Schneider Electric Triconex
  Tricon safety-instrumented-system vulnerabilities exploited by the
  TRITON / HatMan malware.
  AUDIT (2026-07-10, claude-opus-4.8/max): captured + hashed during the
  triton-petro-rabigh event audit to source the specific SIS product +
  protocol (which the Treasury/DOJ/Mandiant primaries do not name).
  Verbatim: "The following versions of Triconex Tricon, a Safety
  Instrumented System, are affected: MP Model 3008 firmware versions
  10.0-10.4" (source-carries the "Triconex Tricon Model 3008" SIS);
  "Exploitable remotely/HatMan malware specifically targets these
  vulnerabilities" (Vendor: Schneider Electric); references the
  "TriStation 1131 Developers Guide" (source-carries the TriStation
  protocol/toolchain); the vulnerabilities "could misinform or control
  the safety instrumented system which could result in arbitrary code
  execution, system shutdown, or the compromise of safety systems."
  Live www.cisa.gov page returned HTTP 200 server-rendered content (not
  a JS shell); captured HTML is the "Update B" revision (Last Revised
  December 18, 2018) of the advisory originally released 2018-04-17.
