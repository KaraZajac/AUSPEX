notes: |
  First joint US-CERT (now CISA) and UK NCSC technical advisory
  attributing a sustained campaign to "Russian state-sponsored
  cyber actors" targeting enterprise routers, switches, and
  firewalls (Cisco Smart Install, SNMP, Telnet) at ISPs,
  critical infrastructure operators, and government targets.
  The advisory is a doctrinal milestone for the joint UK-US
  technical-attribution cadence — the operating template for
  the post-2018 NCSC + CISA + FBI joint AA pattern.
