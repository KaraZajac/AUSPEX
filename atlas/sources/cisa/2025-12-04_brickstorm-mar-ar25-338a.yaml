notes: |
  Joint CISA/NSA/CCCS Malware Analysis Report (AR25-338A) on the
  BRICKSTORM Go/Rust backdoor. Attributes to "PRC state-sponsored
  cyber actors"; victims primarily in the Government Services and
  Facilities and Information Technology sectors; documents
  persistence on VMware vSphere (vCenter/ESXi/Aria Automation
  Orchestrator) and Windows environments, with cloned-VM-snapshot
  credential theft and ADFS cryptographic-key export at one IR
  victim (April 2024 through at least 3 Sep 2025). CORRECTION
  (audit 2026-07-11, sha256 78397d36..3ae514): the report does
  NOT name Mandiant clusters in prose — UNC3886 is absent, and
  UNC5221 appears once only as a Sigma detection-rule tag
  ("attack.unc5221"); it references Google Mandiant's BRICKSTORM
  report solely under "Additional Detection Resources." Updated
  19 Dec 2025 (Rust variants) and 11 Feb 2026 (new variant); 12
  samples analyzed.
