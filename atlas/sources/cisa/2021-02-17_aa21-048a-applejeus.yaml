notes: |
  CISA analysis of the long-running AppleJeus cluster (trojanized
  cryptocurrency trading applications since 2018). Names DPRK
  cyber actors and ties proceeds to sanctions circumvention (see
  audit notes — the advisory carries NO WMD/ballistic wording).

  AUDIT (2026-07-02, claude-opus-4.8/max): hash re-verified on disk
  (sha256 1e3dde69…5afefc54, 133,262 bytes). Corrected the summary line
  above: it previously read "ties proceeds to WMD financing", which is
  false — the raw advisory has 0 hits for WMD / ballistic / missile
  program and states only "a means to circumvent international sanctions
  on North Korea" (1 hit); this contradicted the 2026-06-24 audit note
  below and could re-inflate a downstream attested link.

  AUDIT (2026-06-24, claude-opus-4.8/max): NATION-LEVEL attribution only — no DPRK service named.
  Attributes AppleJeus to "Lazarus Group—which these agencies attribute to North Korean
  state-sponsored advanced persistent threat (APT) actors", and refers to the activity as
  "HIDDEN COBRA" / "the North Korean government". Ties proceeds to sanctions circumvention ("a
  means to circumvent international sanctions on North Korea"). The Reconnaissance General Bureau,
  Bureau 121, 3rd Bureau, Lab 110, and Unit 121 do NOT appear; the only "Bureau" in the document is
  "Federal Bureau of Investigation". Does not by itself carry the kp/rgb/* service placement (the RGB
  nexus for Citrine Sleet rests on the Microsoft source).
