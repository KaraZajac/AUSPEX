notes: |
  Joint CISA/FBI/DOE advisory co-published with the 24 Mar 2022 DOJ
  indictments; the reachable, snapshottable companion to the bot-walled
  DOJ press release (doj/2022-03-24_berserk-bear-triton-indictment).
  Reproduces the state-sponsored-Russian / FSB attribution of the
  2011-2018 Energy Sector intrusion campaign (Dragonfly / Berserk Bear /
  Energetic Bear / Havex / Crouching Yeti) and the Havex ICS/OPC
  tradecraft.
  AUDIT (2026-07-05, claude-opus-4.8/max): source record CREATED during
  the dragonfly-energetic-bear event audit. Raw HTML captured + hashed
  (122,852 bytes, sha256 d9ba7a0c…cda81c25). Verbatim support quotes:
  "provides information on multiple intrusion campaigns conducted by
  state-sponsored Russian cyber actors from 2011 to 2018 and targeted
  U.S. and international Energy Sector organizations"; "the U.S.
  Department of Justice unsealed indictments of three Russian Federal
  Security Service (FSB) officers"; "From at least 2011 through 2018,
  the FSB (also known as Berserk Bear, Energetic Bear, TeamSpy,
  Dragonfly, Havex, Crouching Yeti, and Koala) conducted an intrusion
  campaign against international and U.S. Energy Sector organizations";
  "Beginning in 2013 and continuing through 2014, the threat actor
  leveraged Havex malware … via spearphishing emails, redirects to
  compromised websites, and malicious versions of legitimate software
  updates on multiple ICS vendor websites"; Havex "uses the Open
  Platform Communications (OPC) standard to gather information about
  connected control systems devices"; and, on intent, "To date, CISA,
  the FBI, and DOE have no information to indicate these actors have
  intentionally disrupted any U.S. Energy Sector infrastructure."
  NB: names "three Russian FSB officers" but does NOT print the officer
  names or the "Center 16" sub-unit label — those are in the (bot-walled)
  DOJ indictment + Treasury OFAC / TA18-074A.
