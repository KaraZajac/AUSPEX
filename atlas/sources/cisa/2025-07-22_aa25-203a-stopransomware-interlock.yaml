notes: |
  Joint #StopRansomware advisory by CISA, FBI, HHS, and MS-ISAC on the
  Interlock ransomware variant; Cisco Talos contributed. Version History:
  "July 22, 2025: Initial version."
  AUDIT (2026-06-25, claude-opus-4.8/max): primary source added during the
  audit of event 2025-07/fbicisahhsms-isac-stopransomware-interlock-advisory-
  healthcare-focused (which previously cited only the secondary hipaajournal
  write-up). Live CISA HTML was 403 to WebFetch but fetched HTTP 200 via curl
  with a full browser UA (124,510-byte HTML, 41,884 chars visible text, real
  advisory with IOCs + MITRE T-codes — not a block page); raw captured + hashed
  above. Verbatim support for the event's claims:
  - emergence/scope: "The Interlock ransomware variant was first observed in
    late September 2024, targeting various business, critical infrastructure,
    and other organizations in North America and Europe."
  - attribution/motivation (no state nexus): "FBI maintains these actors target
    their victims based on opportunity, and their activity is financially
    motivated." Frames Interlock purely as opportunistic financial crime; ZERO
    nation-state / intelligence-service / tasking / safe-harbor references.
  - encryptors: "FBI is aware of Interlock ransomware encryptors designed for
    both Windows and [Linux]"; "Interlock ransomware samples using a FreeBSD ELF
    encryptor [T1486], a departure from usual Linux encryptors designed for
    VMware ESXi servers and VMs."
  - initial access: "FBI observed actors obtaining initial access via drive-by
    download from compromised legitimate websites, which is an uncommon method
    among ransomware groups. Actors were also observed using the ClickFix social
    engineering technique for initial access..."
  - double extortion: "Interlock actors employ a double extortion model in which
    actors encrypt systems after exfiltrating data..."
  Note on healthcare-focus: the primary advisory does NOT state Interlock
  "disproportionately favors" healthcare — it frames targeting as opportunistic
  across business/critical-infrastructure/other and carries a standard HPH
  mitigations section by virtue of the HHS/MS-ISAC co-authorship. The "favor
  healthcare/HPH" characterization is the secondary hipaajournal source's.
