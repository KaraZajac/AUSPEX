notes: |
  Joint US-UK technical attribution of the Cyclops Blink botnet
  (targeting WatchGuard Firebox and ASUS routers) to Sandworm /
  GRU Unit 74455. Published one day before the Russian invasion
  of Ukraine; framed by NCSC's parallel statement as part of
  the elevated-threat posture for the invasion window.
