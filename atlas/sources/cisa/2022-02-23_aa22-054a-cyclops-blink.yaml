notes: |
  Joint US-UK technical advisory on the Cyclops Blink botnet, which
  the advisory reaffirms is operated by the Sandworm actor —
  attributed by the NCSC/CISA/FBI to the GRU's Main Centre for Special
  Technologies (GTsST, i.e. Unit 74455). Cyclops Blink is framed as the
  replacement framework for VPNFilter (exposed 2018).

  AUDIT (2026-07-10, claude-opus-4.8/max): live cisa.gov URL returned HTTP 200; snapshot
  captured + hashed (69,530 bytes). Title "New Sandworm Malware Cyclops Blink Replaces
  VPNFilter | CISA." Load-bearing verbatim support: "The NCSC, CISA, and the FBI have
  previously attributed the Sandworm actor to the ... GRU's Main Centre for Special
  Technologies (GTsST)"; "CISA, FBI, and NSA agree with this attribution"; Cyclops Blink
  "deployed since at least June 2019"; "The actor has so far primarily deployed Cyclops Blink
  to WatchGuard devices"; "a replacement framework for the VPNFilter malware exposed in 2018."
  CORRECTIONS from prior note: (1) this Initial Version is WatchGuard-ONLY — it does NOT mention
  ASUS (that is a later Trend Micro finding, 17 Mar 2022) and never names "Firebox"; (2) removed
  the "elevated-threat posture for the invasion window" gloss — the parallel NCSC statement
  expressly says the advisory is "routine ... and not directly linked to the situation in
  Ukraine." Revisions section lists only "February 23, 2022: Initial Version."
