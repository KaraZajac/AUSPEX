notes: |
  Joint CISA / FBI / Australian ACSC advisory on Play (Playcrypt)
  ransomware, exploiting FortiOS and Microsoft Exchange.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited as the SOLE source for actor ru/proxies/play;
  audit found it documents ZERO Russia-state nexus — only a criminal ransomware operation — so the
  actor was demoted ru/proxies -> ru/unscoped/play (state-tolerated-proxy claim unsourced; Emotet/Akira
  precedent). The full advisory body applies no russian/moscow/kremlin/fsb/gru/svr/state-sponsor/
  nation-state/tasking/tolerate/safe-harbor/sanction token to Play, and makes no nationality attribution
  at all. The single "Russia" string is an unrelated sidebar item ("Pro-Russia Hacktivists Conduct
  Opportunistic Attacks Against US and Global Critical Infrastructure"); the single "proxy" string is the
  CVE name "ProxyNotShell". Criminal framing verbatim: "Play ransomware actors employ a double extortion
  model, encrypting systems after exfiltrating data" (data published "on the group's data leak website");
  payment may "encourage other criminal actors to engage in the distribution of ransomware." Raw snapshot
  captured + hashed below (genuine CISA page, 116629 bytes; not a 403).
