notes: |
  CISA alert documenting a CNMF VirusTotal disclosure of Iranian malware: "U.S. Cyber
  Command's Cyber National Mission Force (CNMF) has identified multiple open-source
  tools used by an Iranian advanced persistent threat (APT) group known as MuddyWater
  ... U.S. Cyber Command has released malware samples attributed to MuddyWater to the
  malware aggregation tool and repository, VirusTotal." Points readers to CYBERCOM's
  press release "Iranian intel cyber suite of malware uses open source tools" — i.e.
  CYBERCOM itself frames MuddyWater as Iranian-intelligence-service tooling. Documents
  the third disclosed adversary (Iran). MuddyWater is authoritatively a subordinate
  element of Iran's Ministry of Intelligence and Security (MOIS) per the Jan-2022
  NCSC-UK / CISA / CYBERCOM joint advisory.

