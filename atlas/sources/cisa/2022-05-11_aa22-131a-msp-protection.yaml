notes: |
  Joint Five Eyes advisory (NCSC-UK, ACSC, CCCS, NCSC-NZ, CISA, NSA,
  FBI) providing generic MSP-supply-chain hardening guidance. Frames
  MSPs as an extended attack surface enabling follow-on "ransomware
  and cyber espionage" but names no specific threat actor.
  AUDIT (2026-07-01, claude-opus-4.8/max): corrected prior overclaim.
  Raw source contains ZERO mentions of SVR, APT29, SolarWinds, REvil,
  or "nation-state"; Kaseya appears only as a reference-list link
  title, and Russia only in reference-list titles + one generic
  MFA-hardening Note. This is an actor-agnostic defensive advisory,
  NOT an SVR attribution. Snapshot sha256 above (89,329 bytes).
