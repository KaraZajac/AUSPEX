kind: cert-advisory
publisher: CISA + NSA + FBI + NCSC-UK + ACSC + CCCS + NCSC-NZ (Five Eyes)
title: |
  Protecting Against Cyber Threats to Managed Service Providers
  and their Customers (AA22-131A)
url: https://www.cisa.gov/news-events/cybersecurity-advisories/aa22-131a
archive_url: https://web.archive.org/web/2022/https://www.cisa.gov/news-events/cybersecurity-advisories/aa22-131a
published_on: 2022-05-11
retrieved_on: 2026-05-27
tier: primary
notes: |
  Joint Five Eyes advisory issued in the wake of expanded SVR /
  APT29 supply-chain and managed-service-provider intrusion
  patterns following the SolarWinds (2020) disclosure and through
  the early invasion phase. Frames MSPs as an extended attack
  surface for both espionage and disruption, and explicitly
  references the SolarWinds and Kaseya / REvil patterns. Used by
  AUSPEX as the policy companion to the SVR cloud-hopping advisory
  arc that ran through 2022-2024.
