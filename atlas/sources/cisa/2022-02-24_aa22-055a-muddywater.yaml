notes: |
  Multi-government joint advisory formally attributing
  MuddyWater to MOIS.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw (HTTP 200, the
  alert landing page; not the usual CISA 403). The advisory explicitly
  names the MOIS as the affiliating service — not merely "Iran": "MuddyWater
  is conducting cyber espionage and other malicious cyber operations as part
  of Iran's Ministry of Intelligence and Security (MOIS), targeting a range
  of government and private-sector organizations across sectors—including
  telecommunications, defense, local government, and oil and natural gas".
  It also styles the actor "Iranian government-sponsored advanced persistent
  threat (APT) actors known as MuddyWater." (The full joint CSA PDF's exact
  "a subordinate element within the Iranian Ministry of Intelligence and
  Security (MOIS)" phrasing is the body of the linked advisory; the captured
  alert page carries the equivalent, dispositive "as part of … MOIS"
  attribution.) This is the dispositive basis for the actor's ir/mois
  placement (KEEP).
  AUDIT (2026-07-01, claude-opus-4.8/max): the full joint CSA body (same
  advisory, url .../cybersecurity-advisories/aa22-055a) is now reachable
  (HTTP 200) and was fetched + hashed for TTP corroboration -- raw
  cisa__2022-02-24_aa22-055a-muddywater-full-csa.html, sha256
  73fb3e96...e79d3b4c, 104218 bytes. It carries verbatim the exact
  "MuddyWater is a subordinate element within the Iranian Ministry of
  Intelligence and Security (MOIS)" phrasing plus the tradecraft
  (spearphishing to ZIP with malicious-macro Excel or PDF dropper;
  CVE-2020-1472 / CVE-2020-0688; PowGoop, Small Sieve, Canopy/Starwhale,
  Mori, POWERSTATS; Mori DNS-tunneling C2; ScreenConnect lateral movement;
  scheduled-task persistence). The committed content_sha256 above remains
  the alert-page snapshot (the source's own url); the full-CSA hash is
  corroboration only.
