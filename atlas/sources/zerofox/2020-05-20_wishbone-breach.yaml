notes: |
  ZeroFox Alpha Team research blog on the May 2020 Wishbone
  breach -- the originating researcher writeup. Discovery source
  for the standalone event 2020-05/wishbone-shinyhunters.
  JSON-LD datePublished 2020-05-20T18:29:45+00:00 (dateModified
  2024-02-06). Verbatim support:
  - "For data on 40,000,000 Wishbone user profiles, the actor is
    asking for $8,000 USD."
  - data "includes email addresses, names, usernames, phone
    numbers, geographic locations, genders, social media profiles
    and SHA1 hashed passwords" (NB: ZeroFox says SHA1; the
    journalism consensus -- Infosecurity Magazine, Forbes, ZDNET --
    reports MD5. Discrepancy noted; MD5 carried by 3 sources).
  - May 21 update: "ZeroFox Alpha Team observed that ShinyHunters
    made a post on the same forum leaking the WishBone.io trove for
    free to users." / "ShinyHunters also claimed that they were
    responsible for the breach. Wishbone has not confir[med]..."
  - "the data was obtained this year" (2020; no month pinned).
  AUDIT (2026-07-10, claude-opus-4.8/max, via event 2020-05/
  wishbone-shinyhunters): record CREATED. Live URL curled HTTP 200
  (122,201 bytes), raw snapshot sha256 32689e6b..d1d4fbd8. Carries
  the ShinyHunters self-claim (attribution basis) + the $8,000 ask
  and free-leak. Re-sources the Wishbone event off the mis-attached
  zdnet/2020-05-10_shinyhunters-73m-records (73M/10-company survey
  article that never names Wishbone).
