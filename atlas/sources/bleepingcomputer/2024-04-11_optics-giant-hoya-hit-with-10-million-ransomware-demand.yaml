notes: |
  AUDIT 2026-07-04 (claude-opus-4.8 / max): re-sourced as the attribution
  source for event 2024-03/hoya-hunters-international, replacing the
  wrong-source Bitdefender group-discovery article (which never mentions Hoya).
  Carries the Hunters International attribution + the $10M / 1.7M-file / 2TB
  demand. Verbatim from the snapshot (sha256 f0a7a0f8…8eba6abe, 89,555 bytes):
  "A recent cyberattack on Hoya Corporation was conducted by the 'Hunters
  International' ransomware operation, which demanded a $10 million ransom for a
  file decryptor and not to release files stolen during the attack.";
  "Hoya is a Japanese company specializing in optical instruments, medical
  equipment, and electronic components. It operates 160 offices and
  subsidiaries in more than 30 countries and a network of 43 laboratories
  worldwide.";
  "As first reported by LeMagIT, Hunters International demanded a $10 million
  ransom not to release an alleged 1.7 million stolen files, amounting to 2 TB
  of data. This ransom demand was also confirmed independently by
  BleepingComputer.";
  "Currently, no files have been released on the Hunters International site and
  the threat actors haven't publicly claimed responsibility for the attack on
  Hoya.";
  "the threat actors have applied a 'No Negotiation / No Discount Policy' on
  Hoya";
  "the company has not provided any updates on the business status since April
  4, 2024, so it is assumed that production remains impacted".
  Establishes NO initial vector. NB: the attribution rests on the ransomware
  group's victim-negotiation panel (LeMagIT screenshots) + BleepingComputer's
  independent confirmation — NOT a public leak-site self-claim (the group had
  not, as of this article, posted Hoya publicly or admitted responsibility).
