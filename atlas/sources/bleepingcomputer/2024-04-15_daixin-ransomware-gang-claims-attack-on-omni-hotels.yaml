  AUDIT (2026-07-04, claude-opus-4.8/max): record created + snapshot captured during the
  RE-SOURCE. curl HTTP 200, 88,083 bytes, sha256 b4b5b0c3…991b7d22e. Verbatim support:
  - "The Daixin Team ransomware gang claimed a recent cyberattack on Omni Hotels & Resorts
    and is now threatening to publish customers' sensitive information if a ransom is not
    paid." (ATTRIBUTION: named-actor, leak-site SELF-CLAIM, reported by journalism — moderate.)
  - "3,539,089 records of Omni Hotels visitors with sensitive information, including names,
    email addresses, and mailing addresses." (data-theft scope + data types.)
  - the gang says it will "soon" leak "all records of all visitors from 2017 to the present."
  - "Omni Hotels operates 50 hotels and resorts across the United States, Canada, and Mexico,
    with over 23,550 rooms and 28 golf courses."
  IMPORTANT CONTEXT NOT TO MISREAD: the article's sentence "The attackers used the PoS
  malware to steal payment card information, including the cardholder's name, credit/debit
  card number, security code, and expiration date" describes Omni's SEPARATE 2016 POS-malware
  breach (historical background), NOT the 2024 Daixin theft — the 2024 stolen data is the
  contact info above, no payment-card data. No specific ransom amount is stated in the body
  ("2 million" strings are sidebar/related-article noise).
