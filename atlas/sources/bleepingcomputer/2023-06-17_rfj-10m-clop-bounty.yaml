notes: |
  Cl0p-SPECIFIC corroboration of the US State Department Rewards for
  Justice (RfJ) $10M reward — the Cl0p-naming detail that the generic RfJ
  landing page (state/2023-06-16_rfj-clop-reward) does not carry.
  Supporting quotes (raw snapshot, sha 74692406...e3bbbe46, 94,083 bytes):
  "The U.S. State Department's Rewards for Justice program announced up to
  a $10 million bounty yesterday for information linking the Clop
  ransomware attacks to a foreign government" (byline 2023-06-17;
  "yesterday" = the 2023-06-16 RfJ announcement). Quotes the actual RfJ
  tweet: "Do you have info linking CL0P Ransomware Gang or any other
  malicious cyber actors targeting U.S. critical infrastructure to a
  foreign government? Send us a tip. You could be eligible for a reward,"
  tweeted the Rewards for Justice program. Also independently confirms the
  onset date/holiday framing: "The attacks started on May 27th, over the
  long U.S. Memorial Day holiday." NB the tweet frames a foreign-government
  nexus as an OPEN QUESTION the US is soliciting information about — it is
  NOT a US finding that Cl0p is state-directed (supports the stateless
  criminal/clop assessment). Used on 2023-05/moveit-cl0p for the RfJ
  reward and the Memorial Day onset. AUDIT (2026-07-10, claude-opus-4.8/
  max): curl HTTP 200, snapshot + sha256 captured.
