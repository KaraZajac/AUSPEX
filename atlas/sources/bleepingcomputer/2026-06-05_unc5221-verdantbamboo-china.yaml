notes: |
  BleepingComputer report on Volexity's disclosure (corroborated by
  Google and CISA) of China-nexus UNC5221 (VerdantBamboo) accessing
  Microsoft 365 environments via the BRICKSTORM backdoor (Go and Rust
  variants) plus newly documented Plenet ("Grimbolt") and AgentPSD
  malware; at least 18 months of dwell, with simultaneous compromise of
  the victim and its managed service provider. Targets: US legal
  services, SaaS providers, business-process outsourcers and tech firms.
  Primary disclosure: Volexity. URL curl-verified 2026-06-08.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured (sha256
  c500a3a4..fd34770f, 90,637 bytes; VerdantBamboo/UNC5221/BRICKSTORM/Plenet/
  AgentPSD/Volexity/Microsoft 365 + 18-month dwell all present verbatim).
  Secondary corroborator; the Volexity primary
  (volexity/2026-06-04_verdantbamboo-brickstorm-firewall) was added as the
  primary source this audit. NB the "legal/SaaS/BPO/tech" victimology this
  article carries is Google's Sept-2025 characterization of the broader
  UNC5221 campaign, not Volexity's single (sector-unnamed) named victim.
