notes: |
  Bill Toulas, 2024-05-24 (post updated 05-25 to add three more
  firms). Eleven pharmaceutical firms filed "almost identical"
  breach notifications with the California Attorney General's
  office attributing their data exposure to the February Cencora
  incident: Novartis Pharmaceuticals, Bayer, AbbVie, Regeneron,
  Genentech, Incyte, Sumitomo Pharma America, Acadia
  Pharmaceuticals, GlaxoSmithKline Group, Endo Pharmaceuticals,
  Dendreon Pharmaceuticals. Cencora's internal investigation
  "concluded on April 10, 2024"; exposed data per the notices:
  "full name, address, health diagnosis, medications, and
  prescriptions" (held in connection with Lash Group
  patient-support programs). Also: "no ransomware groups ever
  assumed responsibility for the attack"; "Cencora, formerly
  AmerisourceBergen", 2023 revenue $262 billion.
