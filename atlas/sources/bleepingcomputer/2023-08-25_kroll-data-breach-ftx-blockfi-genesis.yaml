notes: |
  BleepingComputer's report on the August 2023 Kroll SIM-swap that exposed
  personal data of BlockFi, FTX, and Genesis bankruptcy claimants. Created
  2026-07-02 as an independent second source for event
  2023-08/kroll-sim-swap-crypto-bankruptcy (which was single-sourced to Krebs).
  Unlike Krebs, it enumerates the exposed data types (quoting the Genesis
  claimant notice) and states the access mechanism (MFA bypass -> account
  takeover -> cloud files).
  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (91,042 bytes). datePublished 2023-08-25T10:10:04-04:00. Verbatim
  support:
   - "In a statement today, Kroll says that a threat actor on August 19
     targeted a T-Mobile account belonging to a Kroll employee and managed to
     steal the phone number of a Kroll employee."
   - Access mechanism + data types (quoting the Genesis notice): "The attackers
     bypassed MFA to take over the employer's account and access files stored
     in Kroll's cloud-based systems, including full names, physical addresses,
     email addresses, and debtor claim details."
   - Scope: "There is no evidence that the threat actor moved laterally or
     gained access to any other Kroll user accounts or systems."
   - Downstream phishing: "the messages sent to those people impersonate FTX
     and claim that the recipient is eligible to begin withdrawing digital
     assets from their accounts ... These messages aim to phish people's seeds
     that protect their cryptocurrency wallets, and to empty them."
   Names no threat actor / cluster / nation (supports actor_id: null).
