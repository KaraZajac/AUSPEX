  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured live (curl HTTP 200,
  90,013 bytes; sha256 f3f2f0b1...69d34a9b). Verbatim support:
  * Codename: title + "a joint international action codenamed Operation
    Checkmate."
  * Seized infrastructure = leak + negotiation sites: "BleepingComputer has
    confirmed that the seized sites include dark web data leak blogs and
    negotiation sites used to extort victims into paying ransom demands."
  * HSI-led: seizure banners announced the sites "were taken down by the U.S.
    Homeland Security Investigations federal law enforcement agency."
  * Broader partner list incl. Europol: "the Frankfurt General Prosecutor's
    Office, the Justice Department, the Ukrainian Cyber Police, Europol, and
    others"; Bitdefender's cybercrime unit assisted.
  * BlackSuit = Royal rebrand + scale: "Royal ransomware had rebranded as
    BlackSuit and had demanded over $500 million from victims since surfacing
    more than two years prior" (attributing an August 2024 CISA advisory update).
  * Successor: Cisco Talos "moderate confidence that the new Chaos ransomware
    group is either a rebranding of the BlackSuit (Royal) ransomware or operated
    by some of its former members."
