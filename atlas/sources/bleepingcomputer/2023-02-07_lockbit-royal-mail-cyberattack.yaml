notes: |
  Load-bearing technical source for the January 2023 Royal Mail / LockBit
  ransomware incident. Page's own datePublished + dateModified + visible
  byline all read 7 Feb 2023 (aligns with LockBit formally listing Royal
  Mail on its leak site); the article covers the incident from the 10 Jan
  attack onward. Created + snapshotted 2026-07-02 to RE-SOURCE event
  2023-01/lockbit-royal-mail off the phantom ncsc-uk/2023-01-12_royal-mail-
  lockbit (url:null — cited URL was the NCSC homepage, no such statement).

  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (90,418 bytes). Verbatim support:
   - "Royal Mail first detected the attack on January 10 and hired outside
     forensic experts to help with the investigation."
   - "'We're experiencing disruption to our international export services and
     are temporarily unable to despatch items to overseas destinations,' the
     company tweeted."
   - "LockBitSupport, the ransomware gang public-facing representative,
     previously told BleepingComputer that the LockBit cybercrime group did
     not attack Royal Mail." (initial DENIAL)
   - "However, LockBitSupp confirmed that LockBit was indeed behind the attack
     in a post on a Russian-speaking hacking forum after determining that one
     of their affiliates deployed the gang's ransomware payloads on Royal
     Mail's systems." (CONFIRMATION; affiliate)
   - "Instead, they blamed the attack on other threat actors using the LockBit
     3.0 ransomware builder that was leaked on Twitter in September 2022."
   - "LockBitSupp failed to explain why printed Royal Mail ransom notes seen by
     BleepingComputer included links to LockBit's Tor negotiation and data leak
     sites"; the note image is labelled a "Lockbit Black ransom note" printed
     during the attack.
