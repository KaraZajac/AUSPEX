  Created 2026-07-05 to RE-SOURCE the NNSA / US-government-victim claim in event
  2025-07/toolshell-sharepoint-mass-exploitation. The event's sole prior citation
  (Microsoft MSTIC, 2025-07-22) names NO victim organization and contains ZERO
  occurrences of "NNSA", "nuclear", "National Nuclear", "Department of Energy", or
  "Energy" (verified against the raw snapshot) — so the NNSA-targeting claim (and
  the dangling orgs/us-nnsa target) rested on uncited "separate public reporting".
  This article carries that claim.
