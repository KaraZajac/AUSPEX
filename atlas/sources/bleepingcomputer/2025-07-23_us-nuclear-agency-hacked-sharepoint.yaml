  (9014167b…7e9d653f, 99,391 bytes). Byline "By Sergiu Gatlan July 23, 2025 11:14 AM".
  Verbatim support present in the snapshot:
   - "Unknown threat actors have breached the National Nuclear Security
     Administration's network in attacks exploiting a recently patched Microsoft
     SharePoint zero-day vulnerability chain."
   - "NNSA is a semi-autonomous U.S. government agency part of the Department of
     Energy that maintains the country's nuclear weapons stockpile..."
   - "As first reported by Bloomberg, sources within the agency also noted that
     there's no evidence of sensitive or classified information compromised in the
     breach."
   - "CISA also added the CVE-2025-53770 remote code execution flaw, part of the
     ToolShell exploit chain, to its catalog of exploited vulnerabilities" and the
     campaign "breached 148 organizations worldwide."
   - Quotes MSTIC verbatim naming Linen Typhoon, Violet Typhoon, and Storm-2603.
