notes: |
  By Lawrence Abrams (BleepingComputer), citing the Cryptolaemus research group, GData, and
  Advanced Intel (Vitali Kremez). Reports Emotet's Nov 2021 return rebuilding via TrickBot
  ('Operation Reacharound' per Cryptolaemus). Earlier `publisher` field incorrectly named the
  cited researchers rather than BleepingComputer — corrected 2026-06-24.
  AUDIT (2026-06-24, claude-opus-4.8/max): raw snapshot captured + sha256. Resolves (HTTP 200) and
  matches the citation; title/byline are BleepingComputer/Lawrence Abrams. Facts confirmed: compile
  timestamp, 7-vs-3-4 commands, 246 C2 devices, abuse.ch C2 lists, the TrickBot->Emotet reversal.
  ATTRIBUTION FINDING — the source asserts NO state/Russia nexus; it is purely a criminal botnet
  rebuild. Verbatim: "While in the past Emotet installed TrickBot, the threat actors are now using a
  method that the Cryptolaemus group calls 'Operation Reacharound,' which rebuilds the botnet using
  TrickBot's existing infrastructure." And: "the current Emotet loader DLL has a compilation timestamp
  of '6191769A (Sun Nov 14 20:50:34 2021).'" And: "over 246 infected devices already acting as command
  and control servers." No mention of Russia, a Russian service, sanctions, or state tasking anywhere
  in the article body (the only 'Russia' on the page is an unrelated Related-Articles link).
