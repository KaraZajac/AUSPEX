notes: |
  Fullest contemporaneous account of the downstream blast radius. Byline
  "By Lawrence Abrams January 21, 2024 03:13 PM"; "The story was updated
  on 1/22/24 with Tietoevery's [sic] confirmation that they suffered an
  Akira ransomware attack." Verbatim: "Tietoevry confirmed today that the
  ransomware attack occurred Friday night into Saturday morning" (Fri 19
  Jan -> Sat 20 Jan); "On Sunday, BleepingComputer first reported that
  the Akira ransomware gang was behind the attack on Tietoevry"; victims:
  Filmstaden, "discount retail chain Rusta, raw building materials
  provider Moelven, and farming supplier Grangnården [sic — Granngården],
  which was forced to close its stores"; "Tietoevry's managed Payroll and
  HR system, Primula, which is used by the government, universities, and
  colleges in Sweden" — Karolinska Institutet, SLU, University West,
  Stockholm University, Lunds Universitet, and Malmö University — and
  "numerous government agencies and municipalities in Sweden, including
  the Statens servicecenter, the Vellinge municipality, and Uppsala
  County. For Uppsala the outage is more significant as it also impacts
  the region's health care record system."
