    "Australian airline Qantas has confirmed that 5.7 million people
    have been impacted by a recent data breach ..."
    "On July 1st, Qantas disclosed that it had detected a cyberattack
    the previous day on a third-party platform used by a Qantas airline
    contact centre." (US-timezone framing of the Qantas 2 July AEST
    release; detection "the previous day" = Mon 30 June.)
    "BleepingComputer learned that the attack shared similar[ities] ...
    similarities with other attacks on the aviation industry linked to
    threat actors classified as Scattered Spider."
    "On Monday, Qantas warned that the threat actors had contacted them,
    likely to begin extorting the company to prevent the release of the
    stolen data. In a new update today, Qantas has confirmed that the
    threat actors stole data for approximately 5.7 million customers."
    "[N]o Qantas Frequent Flyer accounts, passwords, PINs and login
    details, financial information, or passport details were stolen."
  Reproduces the same 4M / 1.2M / 2.8M / 1.7M breakdown as the Qantas
  primary. This is the initial-Scattered-Spider-attribution carrier for
  Qantas (later reframed to UNC6040 / ShinyHunters by BC 2025-07-30).
