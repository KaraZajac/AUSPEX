notes: |
  Lawrence Abrams' contemporaneous report on the Integris Health
  patient-direct extortion emails — the earliest public naming of a
  Hunters International link. Key quotes (raw snapshot sha
  9ca8a658…61f4752d, 89,461 bytes): extortion emails "sent to patients
  on December 24th" claim "the personal data of over 2 million
  patients"; Integris notice quoted — "certain files may have been
  accessed by an unauthorized party on November 28, 2023"; emails link
  to a Tor site listing "approximately 4,674,000" records where
  visitors can "pay $50 to delete the data record or $3 to view it";
  extortion email verbatim — "We give you the opportunity to remove
  your personal data from our databases before we sell the entire
  database to data brokers on Jan 5 2024"; attribution hedged —
  "While it is not known who is behind the attack on Integris Health,
  similar emails were sent to Fred Hutchinson Cancer Center (Fred
  Hutch) patients after the Hunters International ransomware gang
  breached the hospital … making it likely that the same ransomware
  attack is behind the attack on Integris Health."

  AUDIT (2026-07-04, claude-opus-4.8/max): created during wrong-source
  remediation of 2024-02/integris-hunters-international-doxing (the
  event previously cited only the Bitdefender Hunters/Hive group
  profile, which never names Integris). curl HTTP 200, snapshot +
