notes: |
  Contemporaneous reporting (Sergiu Gatlan, 2025-05-27 04:29 AM;
  "Update May 27, 11:18 EDT: Added Adidas statement") on the adidas
  breach notice. Quotes the adidas statement verbatim and confirms:
  data "did not include the affected customers' payment-related
  information or passwords, as the threat actors behind the breach
  only gained access to contact [information]"; adidas "has yet to
  reveal further details ... including the name of the impacted service
  provider, when the incident was detected, how many individuals were
  affected, and if its own network was compromised."
  IMPORTANT distinction carried by this source: the "names, email
  addresses, phone numbers, birthdates, and addresses" enumeration
  belongs to the SEPARATE Adidas Turkey and South Korea breaches
  ("Earlier this month, Adidas disclosed data breaches impacting
  customers in Turkey and South Korea ... The stolen information in
  these breaches includes names, email addresses, phone numbers,
  birthdates, and addresses") and the 2018 US breach — NOT the main
  May-2025 global breach, whose scope adidas gave only as "contact
  information". This article does NOT attribute the breach to
  Salesforce / UNC6040 / ShinyHunters (published before GTIG's June 4
  writeup; the single "ShinyHunters" token in the snapshot is an
  unrelated sidebar link to a Medtronic story).

