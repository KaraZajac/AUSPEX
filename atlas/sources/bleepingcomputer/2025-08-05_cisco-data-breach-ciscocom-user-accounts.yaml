notes: |
  BleepingComputer coverage of Cisco's 5 Aug 2025 disclosure. This is the
  load-bearing, fully-snapshotted SECONDARY that carries every Cisco fact
  (Cisco's own advisory page is JS-rendered and not curl-snapshottable).
  Raw snapshot 92,398 bytes; content_sha256 3b98be9e..6511b392.

  Verbatim Cisco-specific facts:
   - "Cisco has disclosed that cybercriminals stole the basic profile
     information of users registered on Cisco.com following a voice
     phishing (vishing) attack that targeted a company representative."
   - "After becoming aware of the incident on July 24th, the networking
     equipment giant discovered that the attacker tricked an employee and
     gained access to a third-party cloud-based Customer Relationship
     Management (CRM) system used by Cisco."
   - Field list: "...names, organization names, addresses, Cisco-assigned
     user IDs, email addresses, phone numbers, and account metadata such
     as creation dates."
   - "However, the company said that the attacker didn't obtain
     'organizational customers' confidential or proprietary information,
     or any passwords or other types of sensitive information.' Cisco
     added that the incident didn't impact its products or services, and
     no other Cisco CRM system instances were affected."

  Verbatim campaign linkage + the CRITICAL Salesforce caveat (this is the
  event's attribution basis for ShinyHunters):
   - "Although not yet confirmed by the company, this is likely part of
     an ongoing wave of Salesforce data theft attacks using vishing and
     social engineering techniques that have been linked to the
     ShinyHunters extortion group."
   - "When contacted by BleepingComputer, a Cisco spokesperson referred
     us to the public statement and did not confirm whether the data was
     stolen from a compromised Salesforce instance, nor did they disclose
     the number of individuals affected."
   - Context list (other campaign victims, NOT Cisco-specific facts):
     "...including Adidas, Qantas, Allianz Life, LVMH brands Louis
     Vuitton, Dior, and Tiffany & Co., as well as fashion giant Chanel."

  Does NOT name Scattered Spider, UNC6040, or UNC6240.

