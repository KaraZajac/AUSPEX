notes: |
  Carrier for the $49M direct-cost figure and the Aug 11 start date.
  Verbatim: Clorox "disclosed it incurred $49 million in expenses
  related to the cyberattack by the end of 2023. The costs incurred
  relate primarily to third-party consulting services, including IT
  recovery and forensic experts and other professional services
  incurred to investigate and remediate the attack, as well as
  incremental operating costs"; "On August 11th, Clorox suffered a
  cyberattack"; Clorox is a "manufacturer of consumer and
  professional cleaning products with 8,700 employees and almost $7.5
  billion in revenue for 2023"; "Bloomberg reported that it is
  believed to have been conducted by ... Scattered Spider." IMPORTANT
  scope note: the "leading to a data breach after hackers stole
  corporate data" line in this article describes JOHNSON CONTROLS
  (a separate Sept-2023 ransomware incident), NOT Clorox — Clorox
  data theft is NOT claimed here.
