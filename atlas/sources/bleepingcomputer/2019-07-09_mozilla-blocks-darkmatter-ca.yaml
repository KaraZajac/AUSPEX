notes: |
  Secondary carrier of Mozilla's decision + reasoning + mechanism.
  Quotes Wayne Thayer verbatim ("...continuing to place trust in
  DarkMatter is a significant risk to our users. I will be opening
  a bug requesting the distrust of DarkMatter's subordinate CAs
  pending Kathleen's concurrence. I will also recommend denial of
  the pending inclusion request, and any new requests from
  DigitalTrust." / "our foremost responsibility is to protect
  individuals who rely on Mozilla products"). Documents the
  QuoVadis cross-sign ("the intermediary certificates used by
  DarkMatter from Quovadis be revoked as well"), the DigitalTrust
  rebrand, and the Reuters Project Raven trigger. Snapshotted live
  2026-07-10 (curl HTTP 200, 91,444 B; "significant risk" 1x,
  "QuoVadis" 5x, "DigitalTrust" 3x, "Project Raven" 1x).
