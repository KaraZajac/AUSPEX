notes: |
  AUDIT 2026-07-04 (claude-fable-5 / max): journalism carrying the INC
  Ransom self-claim for event 2023-12/xerox-inc-ransom; this is the
  attribution_source_id. Verbatim from the snapshot: "The U.S. division
  of Xerox Business Solutions (XBS) has been compromised by hackers with
  a limited amount of personal information possibly exposed"; "INC Ransom
  ransomware gang added the corporation to its extortion portal on
  December 29, claiming to have stolen sensitive data and confidential
  documents from its systems."; "The data samples shared on the INC
  Ransom data leak site include email communications (with content and
  addresses exposed), payment details, invoices, filled-out request
  forms, and purchase orders."; "The threat actors may hold data on
  multiple XBS clients, partners, and employees, but the extent of the
  breach remains unknown at this time."; "BleepingComputer has noticed
  that the Xerox entry has been removed from INC Ransom's leak portal for
  unknown reasons, usually indicative of resumed negotiations between a
  victim and the threat actors." Also describes XBS ("specializes in
  document technology and services") and notes the unrelated 2020 Maze
  incident at Xerox. The article establishes NO initial vector and NO
  intrusion start date for this incident. NB: SecurityWeek dates the
  leak-site listing December 30; BleepingComputer says December 29.
