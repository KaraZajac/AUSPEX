notes: |
  Bill Toulas' follow-up carrying the official scale and the
  no-encryption detail. Key quotes (raw snapshot sha 0f86a179…156d196f,
  89,682 bytes): "the U.S. Department of HHS Office for Civil Rights
  (OCR) portal shows that the number of impacted Integris Health
  patients is 2,385,646" ("In a new entry today", i.e. the portal entry
  became visible 2024-02-13); "The threat actor told BleepingComputer
  that their attack did not involve encryption and they only stole the
  data"; "This did not cause any network interruption"; stolen data
  included "Full name, Date of birth, Contact information, Demographic
  information, Social Security Number (SSN)" while "the leaked data did
  not involve employment information, driver's licenses, account
  credentials (usernames and passwords), or financial information";
  the threat actor said "they are selling on a dark web marketplace
  data for 2.3 million Integris patients". NOTE: this article does NOT
  name Hunters International — the naming is carried by the 2023-12-26
  BleepingComputer article and DataBreaches.net's TA contact.

