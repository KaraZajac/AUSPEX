notes: |
  BleepingComputer (Lawrence Abrams) breaking the Schneider Electric
  Sustainability Business Cactus-ransomware intrusion — the first
  public naming of Cactus for this victim, and the carrier of
  Schneider Electric's full confirmation statement.
  Created 2026-07-04 during phantom-remediation of event
  2024-01/schneider-electric-cactus, whose victim claims were
  previously (wrongly) cited to the May-2023 Kroll discovery
  bulletin, which names no victims.
