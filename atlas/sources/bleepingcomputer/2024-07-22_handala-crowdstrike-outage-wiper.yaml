notes: |
  AUDIT (2026-07-11, claude-opus-4.8/max): PHANTOM-FIX. This record previously had
  url:null / archive_url:null ("canonical URL unverified — coverage scattered across
  BleepingComputer, The Record, and Israeli press"), a paraphrased title, and
  published_on 2024-07-22. RE-SOURCED to the genuine article — Ionut Ilascu, "Fake
  CrowdStrike fixes target companies with malware, data wipers", BleepingComputer,
  2024-07-21 (live HTTP 200; snapshotted + hashed). The article's relevant passage:
  "This campaign was claimed by the pro-Iranian hacktivist group Handala, who stated
  on Twitter that they impersonated CrowdStrike in emails to Israeli companies to
  distribute the data wiper. The threat actors impersonated CrowdStrike by sending
  emails from the domain 'crowdstrike.com.vc,' ... The emails include a PDF seen by
  BleepingComputer that contains further instructions on running the fake update, as
  well as a link to download a malicious ZIP archive ... This zip file contains an
  executable named 'Crowdstrike.exe.' Once the fake CrowdStrike update is executed, the
  data wiper is extracted to a folder under %Temp% and launched to destroy data." Wiper
  behaviour (AnyRun, quoted): "It decimates the system by overwriting files with zero
  bytes and then reports it over #Telegram." CORRECTIONS to prior notes: the article
  does NOT mention "The Record" (absent) and does NOT confirm/quantify victims (no
  "successful deployment at multiple targets"); it describes distribution + wiper
  design only, and attributes to a "pro-Iranian hacktivist group" (hedged — NOT a MOIS
  attestation). Cited only by 2024-07 handala-crowdstrike-outage-wiper. ID retains the
  "2024-07-22" date-stem for FK stability (real byline is 2024-07-21).
