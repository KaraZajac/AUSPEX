  Reporting on the 20 July 2024 Handala phishing wave that
  exploited the public CrowdStrike Falcon-sensor outage narrative
  to deliver a wiper masquerading as a PDF "instructions to fix
  the outage" attachment against Israeli organizations. Canonical
  URL unverified — initial coverage scattered across
  BleepingComputer, The Record, and Israeli press; the
  operational fact pattern is corroborated across multiple
  sources but no single permalink anchors it.
