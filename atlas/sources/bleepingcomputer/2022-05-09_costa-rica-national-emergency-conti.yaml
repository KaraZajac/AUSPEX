  Load-bearing verbatim (confirmed in raw_snapshot):
  - "The Costa Rican President Rodrigo Chaves has declared a national
    emergency following cyber attacks from Conti ransomware group on
    numerous Costa Rican government agencies."
  - "The declaration was signed into law by Chaves on Sunday, May 8th,
    same day as the economist and former Minister of Finance
    effectively became the country['s president]."
  - "Conti earlier demanded a $10 million ransom from the Ministry
    which the government declined to pay, according to Swissinfo.ch."
  - "Since April 18th, the Treasury's digital services have been
    unavailable which is affecting [tax/payments/customs]."
  - Impacted-agency list (verbatim): "The Costa Rican Finance Ministry,
    Ministerio de Hacienda; The Ministry of Labor and Social Security,
    MTSS; The Social Development and Family Allowances [Fund]; ... the
    Ministry of Science, Innovation, Technology and Telecommunications
    (Micitt); ... National Meteorological Institute (IMN); Costa Rican
    Radiographic (RACSA); Administrative Board of the Electrical
    Service of the province of Cartago (Jasec)."
  Corroborates the impacted-ministries roster and the initial $10M
  demand; establishes the emergency-declaration date as 8 May 2022.
