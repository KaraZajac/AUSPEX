  Sergiu Gatlan, 2024-04-03 (JSON-LD datePublished 2024-04-03T18:17:33-04:00).
  AUDIT (2026-07-04, claude-opus-4.8/max): record created + snapshot captured during
  RE-SOURCE of event 2024-05/bianlian-omni-hotels. curl HTTP 200, 88,353 bytes,
  sha256 01e11f08…7a48fb22. Verbatim support (carries the Omni confirmation, the
  ransomware/encryption character, and the company profile):
  - "Since Friday, March 29, Omni Hotels & Resorts has been responding to a cyberattack
    on its systems." (Omni's own confirmation — DISCLOSURE.)
  - "the wide range of impacted services … reservation, hotel room door lock, and
    point-of-sale (POS) systems."
  - "sources … told BleepingComputer that the hotel chain was the victim of a ransomware
    attack and is currently in the process of restoring encrypted servers from backups."
    (RANSOMWARE + ENCRYPTION character — distinguishes this from a data-extortion-only op.)
  - "if Omni Hotels does not pay a ransom demand, the gang will claim the attack and start
    leaking stolen data." (foreshadows the Daixin leak-site claim of 04-15.)
  - "Omni Hotels owns 50 hotels and resorts across the United States, Canada, and Mexico,
    with roughly 23,550 rooms and 28 golf courses." (company scale — source-carried.)
  As of 04-03 no group had yet publicly claimed responsibility. No Omni-specific ransom
  figure in the article body ("2 million" hits are sidebar/related-links noise).
