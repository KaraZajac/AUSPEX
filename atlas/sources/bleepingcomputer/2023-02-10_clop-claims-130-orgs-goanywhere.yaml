  Source for Cl0p's OWN leak-site claim of breaching "over 130
  organizations" via CVE-2023-0669. Supporting quotes (raw snapshot,
  sha dbcea075...4c68013b, 94,473 bytes): "saying they stole data from
  over 130 organizations"; and decisively "BleepingComputer could not
  independently confirm Clop's claims, and Fortra has not replied to
  emails asking for more info regarding CVE-2023-0669 exploitation".
