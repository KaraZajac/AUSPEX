notes: |
  Trade-press reporting on a malicious Notepad++ installer
  identified by researcher "blackorbird" (November 30 2021) and
  analyzed by Minerva Labs. The installer drops a keylogger
  (ntuis32.exe) into C:\\ProgramData\\Microsoft\\WindowsData and
  is named as StrongPity / APT-C-41 / PROMETHIUM based on
  operational-pattern continuity with the group's well-
  established 2016-2018 trojanized-installer campaigns.
  AUDIT (2026-07-01, claude-opus-4.8/max): real, complete article
  captured + hashed (sha256 d01db5b0…163d154b, 88,950 bytes); title
  "Malicious Notepad++ installers push StrongPity malware", by Bill
  Toulas, dated December 9, 2021 — NOT a phantom. This is a
  secondary/trade-press retelling of the Minerva Labs primary. That
  primary is now link-rotted: the original blog.minerva-labs.com
  post is unreachable (TLS handshake fails, HTTP 000) and
  minerva-labs.com/blog/… 301-redirects to the Rapid7 homepage
  (Minerva was acquired by Rapid7). archive.org is blocked for the
  auditor, so the primary could not be snapshotted; the
  BleepingComputer coverage carries every factual claim in the
  event and is the most stable snapshottable record.
