notes: |
  Trade-press reporting on a malicious Notepad++ installer
  identified by researcher "blackorbird" (November 30 2021) and
  analyzed by Minerva Labs. The installer drops a keylogger
  (ntuis32.exe) into C:\\ProgramData\\Microsoft\\Windows Data and
  is attributed to StrongPity / PROMETHIUM based on payload
  family and operational-pattern overlap with the well-
  established trojanized-installer pattern. The original
  Minerva Labs blog post URL no longer resolves; BleepingComputer
  coverage is the most stable secondary citation.
