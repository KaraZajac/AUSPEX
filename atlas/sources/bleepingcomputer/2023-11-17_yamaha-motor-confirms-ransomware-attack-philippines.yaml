notes: |
  AUDIT 2026-07-02 (claude-opus-4.8 / max): journalism carrying the INC
  Ransom self-claim and the leak scope for event
  2023-11/yamaha-motor-philippines-inc-ransom. Verbatim from the snapshot:
  "the breach was first detected on October 25"; "While the company has yet
  to attribute the attack to a specific operation, the INC Ransom gang has
  claimed the attack and leaked what they claim is data stolen from Yamaha
  Motor Philippines' network."; "The threat actors added the company to its
  dark web leak site on Wednesday, November 15, and has since published
  multiple file archives with roughly 37GB of allegedly stolen data
  containing employee ID info, backup files, and corporate and sales
  information, among others." Initial vector for THIS intrusion is not
  established; the article describes only INC Ransom's general TTPs
  (spearphishing, Citrix NetScaler CVE-2023-3519).
