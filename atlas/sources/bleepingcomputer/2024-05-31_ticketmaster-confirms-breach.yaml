notes: |
  BleepingComputer coverage of Live Nation / Ticketmaster's
  May 31 2024 SEC 8-K confirmation of the Snowflake-tenant
  intrusion that led to the ShinyHunters-branded BreachForums
  posting of approximately 560M customer records.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed
  (ab06d2b5…e311c643, 94,586 bytes) during the re-source of event
  2024-05/ticketmaster-shinyhunters-leak. Verbatim support: "Ticketmaster
  ... confirmed that Ticketmaster suffered a data breach after its data
  was stolen from a third-party cloud database provider, which is believed
  to be Snowflake"; "over 560 million Ticketmaster users"; "ShinyHunters
  has been attempting to sell the Ticketmaster data on a hacking forum for
  $500,000. The allegedly stolen databases supposedly contain 1.3TB of
  data, including customers' full details (i.e., names, home and email
  addresses, and phone numbers)." This is the source that carries the
  ShinyHunters naming + the 1.3TB / $500K figures (the 8-K names none of
  them).
