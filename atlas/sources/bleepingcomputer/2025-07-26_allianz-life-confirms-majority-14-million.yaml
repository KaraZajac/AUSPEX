notes: |
  Lawrence Abrams, published 2025-07-26 02:00 PM (datePublished
  2025-07-26T14:00:55-04:00; dateModified 2025-07-26T14:12:13-04:00).
  This is the load-bearing Allianz-Life-specific source: it carries
  the 1.4M / "majority" figure, the intrusion date, the third-party
  CRM characterization, the FBI + Maine-AG notification, and the
  ShinyHunters placement — all quoting an Allianz Life spokesperson.

  Verbatim scope + figure:
    "Insurance company Allianz Life has confirmed that the personal
    information for the 'majority' of its 1.4 million customers was
    exposed in a data breach that occurred earlier this month." ...
    "This incident is related only to Allianz Life, which currently
    has 1.4 million customers." (No exact affected count is given; the
    Maine AG filing lists the total affected as "Unknown.")

  Verbatim Allianz spokesperson statement (= Allianz's own notice):
    "On July 16, 2025, a malicious threat actor gained access to a
    third-party, cloud-based CRM system used by Allianz Life Insurance
    Company of North America (Allianz Life)," ... "The threat actor was
    able to obtain personally identifiable data related to the majority
    of Allianz Life's customers, financial professionals, and select
    Allianz Life employees, using a social engineering technique." ...
    "We took immediate action to contain and mitigate the issue and
    notified the FBI. Based on our investigation to-date, there is no
    evidence the Allianz Life network or other company systems were
    accessed, including our policy administration system."

  Verbatim disclosure mechanism:
    "The company first revealed the breach in a mandatory filing with
    Maine's Attorney General's Office on Saturday, issuing a placeholder
    notification ... 'The consumer notice will be provided once Allianz
    has identified the affected individuals.'"

  Verbatim attribution caveat (press inference, NOT Allianz/GTIG
  victim-naming, extortion NOT confirmed by Allianz):
    "While Allianz Life declined to answer questions about the threat
    actor and whether they were being extorted, BleepingComputer has
    learned that the attack is believed to have been conducted by the
    ShinyHunters extortion group." ... "BleepingComputer asked Allianz
    Life if the CRM is Salesforce, but the spokesperson declined to
    comment."

  IMPORTANT scope limits: the article NAMES NO SPECIFIC DATA FIELDS
  (no "names / dates of birth / addresses" enumeration — it says only
  "personally identifiable data"); gives NO exact affected count
  ("majority" of 1.4M only); does NOT confirm Salesforce; does NOT
  confirm extortion of Allianz; and the ShinyHunters link is
  BleepingComputer's own reporting ("BleepingComputer has learned ...
  is believed"), not a GTIG or Allianz attribution. No mention of
  "Scattered Spider".

