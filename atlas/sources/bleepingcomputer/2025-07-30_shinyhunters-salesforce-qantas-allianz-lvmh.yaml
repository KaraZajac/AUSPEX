notes: |
  Lawrence Abrams, published 2025-07-30 03:52 PM (datePublished
  2025-07-30T15:52:39-04:00; dateModified 2025-08-01). This is the
  load-bearing LVMH-attribution source for the LVMH event: it names the
  LVMH brands AND places them in the GTIG-documented campaign.

  Verbatim LVMH scope:
    "LVMH subsidiaries Louis Vuitton, Dior, and Tiffany & Co. each
    disclosed unauthorized access to a customer information database,
    with Tiffany Korea notifying customers the attackers breached a
    'vendor platform used for managing customer data.' Adidas, Qantas,
    and Allianz Life also reported breaches involving third-party
    systems..."

  Verbatim campaign linkage + the critical Salesforce caveat:
    "A wave of data breaches impacting companies like Qantas, Allianz
    Life, LVMH, and Adidas has been linked to the ShinyHunters extortion
    group, which has been using voice phishing attacks to steal data
    from Salesforce CRM instances." ... "While none of these companies
    have publicly named Salesforce, BleepingComputer has since confirmed
    that all were targeted in the same campaign detailed by Google."

  Verbatim extortion (private, not public leaks as of publication):
    "The attacks have not led to public extortion or data leaks yet,
    with BleepingComputer learning that the threat actors are attempting
    to privately extort companies over email, where they name themselves
    as ShinyHunters."

  Verbatim ShinyHunters self-claim uncertainty (quoting a GTIG-linked
  statement): "We have not confirmed the nature of the relationship
  between these intrusions and the prior use of this handle on
  underground forums."

  Verbatim Scattered Spider caveat: "The breaches have caused confusion
  among the cybersecurity community and the media, including
  BleepingComputer, with the attacks attributed to Scattered Spider
  (tracked by Mandiant as UNC3944), as those threat actors were also
  targeting the aviation, retail, and insurance sectors around the same
  time and demonstrated similar tactics. However, threat actors
  associated with Scattered Spider tend to perform full-blown ne[twork
  intrusions]..." — i.e. the SS attribution is contested / cluster
  overlap, not confirmed.

