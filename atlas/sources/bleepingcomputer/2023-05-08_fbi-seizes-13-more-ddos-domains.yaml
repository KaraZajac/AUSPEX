notes: |
  BleepingComputer (Sergiu Gatlan) same-day write-up of the DOJ/FBI May 8 2023
  seizure of 13 DDoS-for-hire domains. Load-bearing snapshotted corroborator for
  the Operation PowerOFF name that the cited Krebs article does not carry:
  verbatim "This week's seizures are part of a coordinated international law
  enforcement effort (known as Operation PowerOFF) to disrupt online platforms
  allowing anyone to launch massive distributed denial-of-service (DDoS)
  attacks against any target for the right amount of money." Also carries the
  December relationship verbatim: "Ten of the 13 domains seized today are
  reincarnations of services that were seized during a prior sweep in December,
  which targeted 48 top booter services," and the series framing (December 2018
  = 15 sites, December 2022 = 48 domains). Names NO foreign / Netherlands
  partner for this May-2023 wave. AUDIT 2026-07-02 (claude-opus-4.8/max): raw
  captured + hashed (0a928055…49f024fd, 91,539 bytes; JSON-LD datePublished
  2023-05-08T16:29:24-04:00). Secondary corroborator added for the re-sourced
  event 2023-05/poweroff-second-wave.
