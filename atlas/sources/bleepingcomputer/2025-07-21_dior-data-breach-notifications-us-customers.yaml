notes: |
  Bill Toulas, published 2025-07-21 10:31 AM (datePublished
  2025-07-21T10:31:28-04:00). Christian-Dior-specific source for the
  LVMH event.

  Verbatim facts:
    - "The security incident occurred on January 26, 2025, but the
      company only became aware of it on May 7, 2025."
    - Notice quote: "Our investigation determined that an unauthorized
      party was able to gain access to a Dior database that contained
      information about Dior clients on January 26, 2025."
    - Data exposed: "Full names, Contact details, Physical address, Date
      of birth, Passport or government ID number (in some cases), Social
      Security Number (in some cases)." "no payment details, such as
      bank account or payment card information, were contained in the
      compromised database."
    - Campaign linkage (via a Louis Vuitton reference): "BleepingComputer
      learned that the incidents at Louis Vuitton and Dior were part of
      the same cyberattack. The attack is believed to be linked to the
      ShinyHunters extortion group, which gained access to LVMH customer
      information by breaching a third-party vendor's database."

  NB — timing anomaly: Dior's intrusion date (January 26, 2025) predates
  the main UNC6040 vishing-campaign window (spring 2025+). The linkage of
  Dior to the ShinyHunters / Salesforce campaign is BleepingComputer's
  ("believed to be linked"), by pattern, not a Dior or GTIG confirmation
  — flagged in the event summary/QC.

