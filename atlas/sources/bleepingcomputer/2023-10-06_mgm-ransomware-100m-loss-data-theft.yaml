notes: |
  Reporting on MGM's Oct 5 2023 8-K and the incident's operational
  scope. Verbatim: "The hospitality and entertainment giant disclosed
  a cybersecurity issue on September 11, 2023, which impacted its main
  website, online reservations systems, and in-casino services like
  slot machines, credit card terminals, and ATMs"; "the threat actor
  responsible for the disruption was an affiliate of the BlackCat/ALPHV
  ransomware gang known as Scattered Spider. These hackers breached
  MGM's network using social engineering, stole sensitive data, and
  encrypted over a hundred ESXi hypervisors." Carries the MGM $100M
  impact, the >100-ESXi-encryption detail, the ALPHV-RaaS /
  Scattered-Spider-affiliate split, and the customer-data theft
  (driver's-license data for customers pre-March 2019). Cited by event
  2023-09/mgm-caesars-alphv.
