notes: |
  CREATED 2026-07-10 (claude-opus-4.8/max) as the snapshottable secondary
  carrying CERT-UA's 25 Feb 2022 primary warning (issued as a CERT-UA /
  SSSCIP Facebook post — the primary itself is behind a Facebook login wall
  and un-snapshottable). BleepingComputer quotes the CERT-UA alert verbatim;
  it is the disclosure anchor for the citing event's 2022-02-25 disclosure_date.
  Load-bearing verbatim quotes (from the captured raw):
    • "The Computer Emergency Response Team of Ukraine (CERT-UA) warned today
      of a spearphishing campaign targeting private email accounts belonging
      to Ukrainian armed forces personnel."
    • CERT-UA: "Mass phishing emails have recently been observed targeting
      private 'i.ua' and 'meta.ua' accounts of Ukrainian military personnel
      and related individuals."
    • CERT-UA: "After the account is compromised, the attackers, by the IMAP
      protocol, get access to all the messages" (then reuse the address book
      to phish further contacts).
    • CERT-UA: "The Minsk-based group 'UNC1151' is behind these activities.
      Its members are officers of the Ministry of Defence of the Republic of
      Belarus."
  BleepingComputer adds that Mandiant linked UNC1151 "with high confidence in
  November 2021 to the Belarusian government and a hacking operation the
  company tracked as Ghostwriter." NB CERT-UA here names a specific Belarusian
  service (the Ministry of Defence) — see the citing event's ACTOR-HOMING flag.
