notes: |
  Secondary carrier for the $70M universal-decryptor demand (added by the
  2026-07-10 audit of event 2021-07/kaseya-vsa).
  AUDIT (2026-07-10, claude-opus-4.8/max): raw curl-verified HTTP 200
  (90,084 B), datePublished 2021-07-05T04:59:25-04:00. Verbatim carried:
  "In a post on their leak site, the threat actor says that they locked
  more than a million systems and are willing to negotiate for a universal
  decryptor, starting from $70 million. This is the highest ransom demand
  to date, the previous record also belonging to REvil, asking $50 million
  after attacking Taiwanese electronic and computer maker Acer." Documents
  the demand as REvil's own leak-site post (self-claim), i.e. the actor's
  self-attribution of the Kaseya campaign.
