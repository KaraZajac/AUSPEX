notes: |
  Sergiu Gatlan, BleepingComputer, datePublished 2025-08-07T04:41:32-04:00
  (title "Air France and KLM disclose data breaches impacting customers").
  Load-bearing victim-specific secondary for the Air France-KLM child of the
  2025 UNC6040 / ShinyHunters Salesforce-cloud campaign.

  Verbatim (raw snapshot, sha256 5938b550..261e141b, 91,756 bytes):
    - Vector/platform (AF-KLM's own words, no vendor named): the airlines
      detected activity on "an external platform we use for customer service".
    - Exposed scope (BC paraphrase of the joint statement): "attackers gained
      access to customer data, such as names, email addre[s]es, phone numbers,
      rewards program information, and latest transactions"; "Air France and
      KLM said that the customers' financial and personal information was not
      affected".
    - Response: "took immediate action to stop the unauthorized access";
      "networks were not affected by the attack"; customers advised to watch
      for "suspicious emails or phone calls".
    - Regulators: KLM reported to the "Dutch Data Protection Authority; Air
      France has done so in France with the CNIL".
    - Campaign linkage (press inference, hedged): the incident is "part of a
      wave of data breaches linked to the ShinyHunters extortion group", which
      "targets Salesforce instances in vishing and social engineering attacks".

  IMPORTANT scope limit: AF-KLM's own statement names NO threat actor and NO
  CRM vendor ("Salesforce"). The ShinyHunters / Salesforce placement is BC's
  campaign inference, not an AF-KLM confirmation. No customer-count figure is
  given (BC: an undisclosed number of customers).

