notes: |
  BleepingComputer's write-up of the BR/NDR (Bayerischer Rundfunk)
  investigation that BMW discovered and monitored an intrusion active
  since "at least the spring of 2019," spotted after BMW's security team
  found an instance of Cobalt Strike on a company computer; the hackers
  were watched for months before being cut off. TTPs attributed to the
  OceanLotus / APT32 (aka Cobalt Kitty) group; Hyundai (South Korea) also
  targeted in the same campaign. Ties the automotive targeting to Vietnam's
  VinFast (Vingroup) domestic-car push. Created 2026-06-30 to re-source the
  event 2019-03/apt32-bmw-hyundai off the phantom br-ndr/2019-12-06 record
  (null URL, br.de short-ID 404, no wayback).
  AUDIT (2026-06-30, claude-opus-4.8/max): raw snapshot captured + sha256
  verified. Verbatim: "The German automotive giant BMW discovered and
  monitored a group of hackers who infiltrated the company's networks and
  stayed active since at least the spring of 2019. BMW's security team
  spotted the hackers after discovering an instance of the legitimate
  penetration testing tool Cobalt Strike on a company computer"; "The
  networks of South Korean car manufacturer Hyundai were also under attack
  as part of the same campaign, BR reports"; "The tools and TTPs ... lead to
  the OceanLotus advanced persistent threat (APT) group (aka as APT32 or
  Cobalt Kitty)".
