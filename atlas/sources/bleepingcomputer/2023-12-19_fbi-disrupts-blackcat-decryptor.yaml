notes: |
  Same-day coverage of the DOJ/FBI ALPHV disruption, updated the same
  afternoon with the "unseizure" and ALPHV's retaliation statement —
  the load-bearing source for the December 7 outage date and the
  post-seizure retaliation arc. Supporting quotes (raw snapshot, sha
  520e24f9...3e69521f, 95,398 bytes): "On December 7th,
  BleepingComputer first reported that the ALPHV, aka BlackCat,
  websites suddenly stopped working ... While the ALPHV admin claimed
  it was a hosting issue, BleepingComputer learned it was related to
  a law enforcement operation."; "These decryption keys allowed the
  FBI to help 500 victims recover their files for free, saving
  approximately $68 million in ransom demands."; warrant quote "the
  FBI identified and collected 946 public/private key pairs for Tor
  sites"; "Tuesday afternoon, the ransomware operation 'unseized'
  their data leak site to regain control of the URL ... As both the
  ALPHV operators and the FBI now control the private keys used to
  register the data leak site's onion URL in Tor, they can go back
  and forth"; ALPHV's machine-translated statement: "it's about 400
  companies, but now more than 3,000 companies will never receive
  their keys because of them. Because of their actions, we are
  introducing new rules, or rather removing ALL the rules except one,
  you can not touch the CIS, you can now block hospitals, nuclear
  power plants, anything and anywhere. The rate is now 90% for all
  adverts."; and BleepingComputer's framing that ALPHV is "removing
  all restrictions from their affiliates ... including critical
  infrastructure" with the CIS carve-out. Also carries the
  DarkSide (Aug 2020) -> BlackMatter -> ALPHV lineage ("A third
  breach by law enforcement").
