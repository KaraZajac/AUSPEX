notes: |
  Lawrence Abrams, "August 5, 2025 06:16 PM". Load-bearing Pandora-
  specific source: carries Pandora's own notice, the exact data scope,
  and the (press-inferred, Pandora-unconfirmed) Salesforce / ShinyHunters
  placement. Created this audit as the primary Pandora-brand source.

  Verbatim lead: "Danish jewelry giant Pandora has disclosed a data
  breach after its customer information was stolen in the ongoing
  Salesforce data theft attacks."

  Verbatim Pandora notice: "We are writing to inform you that your
  contact information was accessed by an unauthorized party through a
  third-party platform we use," reads a Pandora data breach notification
  sent to customers. "We stopped the access and have further strengthened
  our security measures."

  Verbatim scope: "As first reported by Forbes, only customers' names,
  birthdates, and email addresses were stolen in the attack. Passwords,
  IDs, and financial information were not exposed."

  Verbatim placement caveat (Pandora named NO platform/actor): "While
  Pandora has not shared the name of the third-party platform,
  BleepingComputer has learned that the data was stolen from the
  company's Salesforce database."

  Verbatim campaign / extortion model (described generically for the
  campaign, NOT a Pandora-specific ransom demand): "Using this access,
  the threat actors download and steal the company's Salesforce database,
  which is then used to extort the company into paying a ransom to prevent
  the data from being leaked. ShinyHunters confirmed to BleepingComputer
  that they are privately extorting companies and will perform a mass sale
  or leak of companies that do not pay a ransom in the future."

  No Pandora-specific record/victim count is given.

