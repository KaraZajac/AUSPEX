notes: |
  Carries both the data-breach scale and the Qilin leak-site self-claim details
  for event 2025-02/lee-enterprises-qilin. Created + snapshotted 2026-07-05
  during the RE-SOURCE off the wrong-source Synnovis NHS statement.

  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot 89,097 bytes,
  sha 49c8c4f0…b403e953. Verbatim support:
   - "Publishing giant Lee Enterprises is notifying nearly 40,000 people whose
     personal information was stolen in a February 2025 ransomware attack."
   - "attackers behind a ransomware attack in February stole documents containing
     personally identifiable information of 39,779 individuals."
   - "'The investigation determined that information may have been accessed or
     acquired without authorization on February 3, 2025'".
   - "'The incident may have included a person's name with a combination of one or
     more of the following: Social Security Number, Driver's License, Financial
     Account Number, Medical Information, or Health Insurance Policy Number'".
   - "As one of the largest newspaper groups in the United States, Lee Enterprises
     publishes 77 daily newspapers and 350 weekly and specialty publications
     across 26 states." (NB: The Record + Cybersecurity Dive give "72 markets in
     25 states"; sources vary on the daily-title count and state count.)
   - "While the company has yet to attribute the attack to a specific operation,
     the Qilin ransomware gang claimed responsibility in late February." (Lee
     itself did NOT name Qilin.)
   - "The ransomware gang claimed to have stolen 120,000 documents totaling 350 GB
     in size and threatened to release them all on March 5."
   - "Qilin added Lee Enterprises to its dark web leak site on February 28,
     sharing samples of data allegedly stolen from the company's compromised
     systems, including government ID scans, financial spreadsheets,
     contracts/agreements, non-disclosure agreements, and other confidential
     files."
