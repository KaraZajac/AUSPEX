notes: |
  BleepingComputer's first-hand report of the ShinyHunters ("Shiny Hunters")
  claim to have hacked Microsoft's GitHub account and stolen its private
  repositories. The hacker contacted BleepingComputer directly; a directory
  listing and 1GB sample were sent to BleepingComputer. datePublished
  2020-05-06T20:04-04:00 ("This evening..."); dateModified 2020-05-08 to add
  the Microsoft statement and MS-employee legitimacy confirmation. Created
  2026-07-01 to re-source the event 2020-05/microsoft-github-shinyhunters off
  the wrong-source zdnet/2020-05-10_shinyhunters-73m-records record (that ZDNet
  article is about the parallel 73M-records sale wave and carries NO
  Microsoft/GitHub content).
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (25abf9a7…92bd6e33, 93,787 bytes). Verbatim: "A hacker claims to
  have stolen over 500GB of data from Microsoft's private GitHub repositories";
  "a hacker going by the name Shiny Hunters contacted BleepingComputer to tell
  us they had hacked into the Microsoft GitHub account, gaining full access to
  the software giant's 'Private' repositories"; "downloaded 500GB of private
  projects and initially planned on selling it, but has now decided to leak it
  for free"; "Based on the file stamps in full directory listing of the leaked
  files, the breach may have occurred on March 28th, 2020"; "the hacker offered
  1GB of files on a hacker forum for registered members to use site 'credits'";
  "the stolen files appear to be mostly code samples, test projects, an eBook,
  and other generic items"; "there does not appear to be anything significant
  for Microsoft to worry about, as it did not contain more sensitive code for
  software like Windows or Office"; "a Microsoft employee who wished to remain
  anonymous has told BleepingComputer that the stolen data is legitimate";
  "Microsoft has told BleepingComputer that they are 'aware of these claims and
  are investigating.'"
