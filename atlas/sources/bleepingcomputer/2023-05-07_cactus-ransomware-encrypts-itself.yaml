  BleepingComputer's write-up of Kroll's discovery of the CACTUS
  ransomware family (2023-05-07). Created 2026-07-02 as a
  corroborating secondary source for event
  2023-05/kroll-cactus-discovery, which was previously single-
  sourced to the Kroll bulletin. This report carries the
  Fortinet-VPN specificity (absent from the Kroll bulletin itself)
  and the direct Kroll-spokesperson quote on self-encryption.
  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured +
  sha256 verified (93,397 bytes, d9d7e409…cc4f365f); fetched HTTP
  200 with a browser User-Agent, no Cloudflare challenge. Verbatim
  support:
   - "Researchers at Kroll ... believe that Cactus obtains initial
     access into the victim network by exploiting known
     vulnerabilities in Fortinet VPN appliances."
   - Laurie Iacono (Kroll): "CACTUS essentially encrypts itself,
     making it harder to detect and helping it evade antivirus and
     network monitoring tools."
   - "Like most ransomware operations, Cactus also steals data from
     the victim. For this process, the threat actor uses the Rclone
     tool to transfer files straight to cloud storage."
   - "The Cactus ransomware operation has been active since at least
     March and is looking for big payouts from its victims."
