notes: |
  First firm public attribution of the 3 June 2024 Synnovis intrusion to
  Qilin. Created + snapshotted 2026-07-05 during the full census audit of
  2024-06/synnovis-qilin-london-nhs (the NHS England statement the event
  previously leaned on for attribution does not itself name the actor).

  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200; snapshot 89,416
  bytes, sha d2fef310…6a5698cc. Verbatim support:
   - "A ransomware attack that hit pathology services provider Synnovis on
     Monday and impacted several major NHS hospitals in London has now been
     linked to the Qilin ransomware operation."
   - "Ciaran Martin, the inaugural CEO of the UK's National Cyber Security
     Centre (NCSC), said today that the Qilin gang is likely responsible for
     the incident".
   - "'We believe it is a Russian group of cyber criminals who call
     themselves Qilin,' Martin told BBC Radio 4 on Wednesday."
   - Affected: Guy's and St Thomas' NHS Foundation Trust, King's College
     Hospital NHS Foundation Trust and primary care across south-east London;
     a "critical incident" was declared. This article predates the 20 June
     leak, so it carries no 400 GB / $50M figure.
