notes: |
  Lawrence Abrams / BleepingComputer, 2024-04-15, on RansomHub
  beginning to leak the Change Healthcare data and the affiliate-
  dispute lineage. Load-bearing for the 2024-04/change-healthcare-
  ransomhub-repost event. Supporting quotes (raw snapshot, sha
  236239d6…c35de324, 88,469 bytes): "The RansomHub extortion gang has
  begun leaking what they claim is corporate and patient data stolen
  from United Health subsidiary Change Healthcare"; "This occurred
  amid claims they were pulling an exit scam by stealing a $22 million
  Change Healthcare ransom payment from the affiliate who conducted
  the attack … the affiliate known as 'Notchy'"; "The threat actors
  now say that Change Healthcare has five days to pay an extortion
  demand, or the threat actors will sell the data to the highest
  bidder"; "While BleepingComputer cannot verify whether the leaked
  data was stolen from Change Healthcare, it does appear to belong to
  the company."
