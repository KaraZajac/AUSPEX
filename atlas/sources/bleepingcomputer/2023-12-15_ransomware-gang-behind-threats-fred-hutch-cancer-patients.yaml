notes: |
  Bill Toulas' contemporaneous report — the earliest confident public
  naming of Hunters International for the Fred Hutch breach and the
  patient-direct extortion tactic (the attribution_source_id for the
  event). Key quotes (raw snapshot sha 1a90721d…81a60141, 89,347 bytes;
  byline "By Bill Toulas December 15, 2023 11:50 AM"): "The Hunters
  International ransomware gang claimed to be behind a cyberattack on the
  Fred Hutchinson Cancer Center"; "the hospital disclosed a
  cybersecurity incident that occurred on November 19, 2023, involving
  unauthorized access to its networks"; the gang "added Fred Hutch to
  their extortion portal on the dark web, threatening the healthcare
  organization with leaking 533.1GB of data allegedly stolen from its
  networks" (portal listing dated December 15, 2023); the extortion
  emails claim "names, Social Security numbers, phone numbers, medical
  history, lab results, and insurance history of over 800,000 patients"
  and contain "a link to a site where they could pay $50 to prevent the
  data from being sold." Attribution is the gang's own leak-site claim
  as reported by BleepingComputer (journalism-level, moderate). No
  swatting and no initial-access vector (Citrix Bleed) stated here.

