notes: |
  BleepingComputer (Lawrence Abrams) on the free re-release of the
  ParkMobile database ~29-30 April 2021, after the initial paid
  sale (Krebs, 12 Apr 2021) failed to attract buyers. Live-fetched
  + snapshotted 2026-07-10 (sha256 8e62b2e8…caffa0bb, 93,017 bytes).
  Does NOT name ShinyHunters or any specific actor (grep: 0
  "ShinyHunters" hits) and does NOT name the forum. Verbatim support:
  "the personal information for almost 22 million ParkMobile customers
  is now in the hands of hackers and scammers after the data was
  released for free on a hacking forum"; "threat actors published
  links to the full database yesterday on a popular hacking forum
  that allows anyone to download all of the data"; "This data has
  been released as a 4.5 GB CSV text file containing the account
  information for 21,887,299 ParkMobile customers. The data includes
  customers' first and last names, initials, mobile numbers, email
  addresses, user names, bcrypt hashed passwords, mailing address,
  license plate numbers, and vehicle information"; "common for the
  stolen data to be released on hacker forums for free as a way to
  increase reputation in the hacking community." Sources the `leak`
  incident_type + the ~21.9M precise count for
  events/2021/04/parkmobile-shinyhunters.
