notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): created during phantom re-source of event
  2024-12/romanian-presidential-election-interference. Raw snapshot captured + sha256
  verified (103,386 bytes). Write-up of the declassified SRI report on the cyberattack
  component. LOAD-BEARING for the attribution hedge. Verbatim support in snapshot:
   - "more than 85,000 cyberattacks" targeting Romania's election infrastructure, running
     "until November 25th, the night after the first presidential election round".
   - attackers "tried to breach the systems by exploiting SQL injection and cross-site
     scripting (XSS) vulnerabilities from devices in more than 33 countries."
   - credentials for election-related websites (bec.ro, roaep.ro, registrulelectoral.ro)
     were leaked "on a Russian cybercrime forum" less than a week before the first round.
   - KEY HEDGE: "SRI does not attribute these attacks to a specific threat actor" but
     assesses "the modus operandi and resources required ... point to a state actor";
     the SIE points to Russia's historical election-interference patterns but "stops
     short of definitive attribution to the Russian state."
   - influence side: "more than 100 TikTok Romanian influencers with over 8 million active
     followers" manipulated to distribute pro-Georgescu content.
  This source is the corpus's clearest evidence that the Romanian TECHNICAL attribution was
  explicitly withheld — the "state actor" framing, not a firm named-Russian attribution.
