notes: |
  Contemporaneous account of the DarkBit persona and its messaging (byline
  Ax Sharma, 2023-02-13 — predates the MuddyWater attribution). Carries the
  Technion victim, the 80-bitcoin (~US$1,745,200) demand, the anti-Israel /
  tech-layoffs ideological note (DarkBit's stance against "racism, fascism
  and apartheid"), and the persona's Twitter, Telegram, and Tor (.onion)
  channels. Does not itself name Iran/MuddyWater (that attribution came
  later). Snapshot HTTP 200, 97,713 B.
