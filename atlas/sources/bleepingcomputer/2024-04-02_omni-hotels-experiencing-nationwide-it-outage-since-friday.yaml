  during RE-SOURCE of event 2024-05/bianlian-omni-hotels (mis-cited to the CISA
  BianLian advisory; the real actor is Daixin Team). curl HTTP 200, 89,885 bytes,
  sha256 649266a5…5619b919. Verbatim support:
  - "Omni Hotels & Resorts is currently facing a nationwide IT outage since Friday,
    impacting its systems, including reservation, hotel room door lock, and point-of-sale
    (POS) systems."
  - "the IT team is now manually restoring affected servers from scratch, with staff being
    informed that systems will be available again on Thursday." (i.e. restoration in
    progress; no precise all-clear date carried here.)
  - As of this 04-02 report no threat group had been named. No specific ransom figure in
    the article body (the "2 million" string on the page is BleepingComputer sidebar/related-
    links noise from other stories, NOT the Omni ransom).
