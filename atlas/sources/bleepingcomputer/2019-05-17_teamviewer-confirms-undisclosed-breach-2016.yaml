notes: |
  BleepingComputer's write-up of the Der Spiegel disclosure that TeamViewer
  GmbH was compromised in autumn 2016. Attributes the attack to Chinese-origin
  actors using the Winnti backdoor, and names BARIUM (a Winnti Umbrella cluster
  = APT41) as a likely candidate. Carries TeamViewer's confirmation that the
  attack was detected before major damage and that no data theft / customer-
  system infection / source-code manipulation was found. Created 2026-07-01 to
  RE-SOURCE event 2019-05/teamviewer-breach off the phantom/wrong-source
  citation mandiant/2024-07-18_apt41-dust (a 2023-24 DUST campaign report that
  never mentions TeamViewer).
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (95,821 bytes). Verbatim support:
   - "In autumn 2016, TeamViewer was target of a cyber-attack. ... This attack
     is thought to be of Chinese origins and utilized the Winnti backdoor."
   - "The company behind the highly popular TeamViewer remote desktop software
     told German publisher Der Spiegel that the attack was discovered before the
     threat group was capable of doing any damage, with experts and investigators
     failing to find any evidence of data being stolen during the security
     incident."
   - "BARIUM, another Winnti Umbrella threat group, which mainly targets software
     and gaming companies" (named as the likely actor behind the intrusion).
