  company Viasat is the latest victim of China's Salt Typhoon cyber-espionage
  group"; Viasat statement "no evidence was found to suggest any impact to
  customers" / "the incident has been remediated"; "as Bloomberg first
  reported" (Bloomberg 2025-06-17); "NSA and CISA officials also tagged
  Comcast and Digital Realty as potentially compromised"; attackers
  "accessed the U.S. law enforcement's wiretapping platform and gained access
  to the 'private communications' of a 'limited number' of U.S. government
  officials"; and the 2022 Russia/AcidRain KA-SAT parallel ("Russian hackers
  also breached Viasat's KA-SAT ... in February 2022"). Attributes to
  "China's Salt Typhoon" (no MSS/PLA unit named). URL curl-verified live
