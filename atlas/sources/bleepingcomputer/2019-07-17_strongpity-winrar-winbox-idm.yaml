notes: |
  Secondary coverage of the AT&T Alien Labs (Tom Hegel) report "Newly Identified
  StrongPity Operations". Reachable (HTTP 200) mirror used to corroborate the
  load-bearing facts because the AT&T primary (cybersecurity.att.com) is 403 bot-walled.
  AUDIT (2026-07-01, claude-opus-4.8/max): carries verbatim, from AT&T Alien Labs —
  the three trojanized installers "Winbox, WinRAR, and Internet Download Manager (IDM)";
  the toolset-rebuild finding: "The new malware samples have been unreported and generally
  appear to have been created and deployed to targets following a toolset rebuild in
  response to the above public reporting during the fourth quarter of 2018"; the
  compilation-timestamp clustering "stretching back into the previous reports of early
  2018"; and the cluster attribution "attributed with high confidence to StrongPity, an
  APT-level adversary that specializes in watering hole attacks for cyber-espionage
  purposes." Does NOT carry the 7AM-3PM UTC operational-hours figure (that is unique to
  the AT&T primary).
