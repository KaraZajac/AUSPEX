notes: |
  BleepingComputer (Sergiu Gatlan, May 31 2024 01:31 PM, "Update 6/1/24")
  roundup that first publicly framed the Ticketmaster + Santander breaches
  as a common Snowflake-customer-account campaign. Load-bearing for the
  broader (actor-claimed) victim ROSTER — the article does NOT carry
  per-victim record counts. Verbatim support (raw b032555b…3693eadc,
  95,360 bytes, captured 2026-07-10 during the audit of event
  2024-06/snowflake-unc5537):
  • Roster is the threat actor's OWN claim: the actor "claims to have
    breached the systems of some of the largest companies worldwide" and
    "using Snowflake's cloud storage services, including Anheuser-Busch,
    State Farm, Mitsubishi, Progressive, Neiman Marcus, Allstate, and
    Advance Auto Parts. To do that, they say they bypassed Okta's secure
    authentication process ... Next, they claim they could generate session
    tokens to exfiltrate data belonging to Snowflake customers." → the
    names are ALLEGED / actor-claimed, several later denied.
  • Customer-side (NOT a Snowflake-platform breach): "Update 6/1/24: Hudson
    Rock has taken down their report that a hacker breached Snowflake to
    steal the data, shedding doubt on the hacker[']s [claim]"; Snowflake
    CISO Brad Jones "adding that some customer accounts were compromised on
    May 23." Corroborates Mandiant's customer-tenant root cause.
  • Extortion of the platform: the actor tried "to blackmail Snowflake into
    buying back the stolen data for $20 million, but the company didn't
    reply to their extortion attempts."
  • Infostealer vector: "a Snowflake employee was infected by a Lumma-type
    Infostealer in October. The malware stole their corporate credentials."
