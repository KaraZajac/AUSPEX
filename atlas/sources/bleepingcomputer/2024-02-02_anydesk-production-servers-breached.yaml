notes: |
  Created 2026-07-04 during LLM audit of event 2024-02/anydesk-production-intrusion —
  the event previously cited ONLY the AnyDesk Feb-2 statement, whose live URL has
  link-rotted; this article mirrors the statement's operative text verbatim.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256 (120,165
  bytes). JSON-LD datePublished 2024-02-02T17:16:03-05:00. Verbatim support:
   - "AnyDesk confirmed today that it suffered a recent cyberattack that allowed
     hackers to gain access to the company's production systems."
   - "BleepingComputer has learned that source code and private code signing keys
     were stolen during the attack." (BC's own sourcing; "AnyDesk did not share
     details on whether data was stolen during the attack" — theft reported, not
     company-confirmed)
   - "activated a response plan with the help of cybersecurity firm CrowdStrike"
   - statement mirror: "We can confirm that the situation is under control and it
     is safe to use AnyDesk. Please ensure that you are using the latest version,
     with the new code signing certificate."
   - "AnyDesk is revoking all passwords to their web portal and suggests changing
     the password if it's used on other sites"
   - new certificate shipped in "AnyDesk version 8.0.8, released on January 29th";
     older executables "signed under the name 'philandro Software GmbH'"; "the old
     code signing certificate will soon be revoked"
   - "AnyDesk suffered a four-day outage starting on January 29th, during which
     the company disabled the ability to log in to the AnyDesk client" ...
     "AnyDesk has confirmed to BleepingComputer that this maintenance is related
     to the cybersecurity incident"
   - "The company reports having 170,000 customers"; "The software is also popular
     among threat actors who use it for persistent access to breached devices and
     networks"
   - "the company also confirmed ransomware was not involved"
   - "While AnyDesk had not shared when the breach occurred" — no breach dates in
     Feb-2 coverage; the timeline landed in securityweek/2024-02-09_anydesk-shares-
     more-information. No actor or state named anywhere.
