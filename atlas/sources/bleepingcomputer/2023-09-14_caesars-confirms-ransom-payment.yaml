notes: |
  Contemporaneous reporting on Caesars' Sept 14 2023 8-K, carrying the
  ransom-figure detail the filing itself omits. Verbatim: "a Wall
  Street Journal report says the hotel and casino entertainment
  company paid roughly $15 million, half of the attackers' initial $30
  million demand"; attributes the intrusion to "a group known as
  Scattered Spider ... Also tracked as UNC3944 and 0ktapus" (Bloomberg
  report). Corroborates the loyalty-database theft (driver's-license /
  social-security data). Cited by event 2023-09/mgm-caesars-alphv as
  the carrier for the ~$15M-of-$30M Caesars ransom (re-sourced off the
  SEC 8-K, which states no figure).
