notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw + hashed for the
  fr/dgse/animal-farm service-placement audit. The closest any cited source comes
  to a service — and still GENERIC, not the DGSE. G Data quotes the CSEC slide
  verbatim: "CSEC assesses, with moderate certainty, SNOWGLOBE to be a
  state-sponsored CNO [Cyber Network Operation] effort, put forth by a French
  intelligence agency," and adds "The assertion of a 'French intelligence
  community' being responsible remains unchanged." Names "a French intelligence
  agency" / "French intelligence community" — never the DGSE or any specific
  service. Decisive in demoting the actor fr/dgse/animal-farm → fr/unscoped/animal-farm.
  G Data's first technical disclosure of the Babar implant referenced
  in the leaked CSEC slides published by Le Monde in March 2014;
  published same day (18 Feb 2015) as Marion Marschalek / Cyphort's
  Babar paper (the raws do not state coordination). Frames Babar as
  "a second component identified to be related to Operation SNOWGLOBE"
  (after EvilBunny).
  CORRECTION (AUDIT 2026-07-10, claude-opus-4.8/max): a prior version of
  this note claimed G Data "names 'MEDIA-MOTHER' PDB path and other
  French-language code artifacts" and framed Babar as '"linked to the
  previously disclosed French intelligence operation"' — BOTH FABRICATED.
  "MEDIA-MOTHER"=0 in the raw; the real internal path is
  "…\Babar64\Babar64\obj\DllWrapper Release\Release.pdb" (the "Babar64"
  project names the malware). And the Babar strings G Data found are
  ENGLISH ("the choice of words is not typical for a native English
  speaker. We found English mistakes in EvilBunny and Babar samples") —
  the French indicators are the CSEC slide's fr_FR locale + an EvilBunny
  "fr" Accept-Language header, not Babar code artifacts. "linked to the
  previously disclosed French intelligence operation" is not in the raw.
  URL redirects from gdatasoftware.com to blog.gdatasoftware.com;
