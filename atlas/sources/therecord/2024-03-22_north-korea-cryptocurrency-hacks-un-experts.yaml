notes: |
  AUDIT (2026-07-02, claude-opus-4.8/max): Jonathan Greig / The Record reporting
  on the UN 1718 Committee Panel of Experts report "released March 7" (2024).
  Cited by the jumpcloud-supply-chain event as the carrier of the ~$147.5M
  figure. Snapshot sha256 f985a1db…a09e8b5 (94,233 B). Verbatim:
  - "the JumpCloud attacks allowed North Korean hackers to launch two
    cryptocurrency heists that netted them about $147.5 million."
  - "Supply chain attacks involving software makers like JumpCloud, JetBrains
    and CyberLink were also spotlighted in the report."
  - the panel tracked "cyberthreat actors subordinate to the Reconnaissance
    General Bureau (RGB), including Kimsuky, the Lazarus Group, Andariel and
    BlueNoroff, between 2017 and 2023."
  NB (doctrine-link bound): this article does NOT state that the crypto proceeds
  fund the DPRK WMD/ballistic-missile program (the "nuclear/weaponry" mentions
  concern IP-theft TARGETING, not crypto-revenue purpose) — so it supports the
  proximate revenue purpose only, not an `attested` WMD-financing goal.
