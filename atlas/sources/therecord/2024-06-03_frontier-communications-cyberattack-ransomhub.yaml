notes: |
  Journalism carrying RansomHub's leak-site SELF-CLAIM of the Frontier breach
  for event 2024-04/frontier-ransomhub; this is the event's attribution_source_id.
  Created 2026-07-05 in the RE-SOURCE of that event off its phantom CISA citation.
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot + sha256
  captured (sha be81edf8…e3c1ea1c, 84,020 bytes). Byline Jonathan Greig,
  June 3, 2024. Verbatim from the snapshot:
   - "On Saturday, the RansomHub operation posted Frontier Communications to
     its leak site" (published Mon June 3 → the Saturday = June 1, 2024)
   - "claiming to have the sensitive information of more than 2 million people"
   - "The group claimed it spent more than two months attempting to extort the
     company but never got a response"
   - the gang "claimed it had access to names, addresses, Social Security
     numbers, credit scores and more."
  Establishes attribution = RansomHub leak-site self-claim (June 1, 2024), NOT
  Frontier's own attribution (Frontier's 8-K said only "cybercrime group").
