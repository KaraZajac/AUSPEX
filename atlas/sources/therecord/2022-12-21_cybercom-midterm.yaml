notes: |
  Martin Matishak reporting (dateline Fort Meade, Md.) on CYBERCOM's
  full-spectrum operations around the 2022 US midterms — companion to
  the WaPo Nakashima coverage. Names the Cyber National Mission Force
  (CNMF), "which serves as CYBERCOM's lead organization on election
  security," and quotes CNMF chief Maj. Gen. William Hartman. Carries
  Nakasone's on-record "persistent engagement" quote verbatim and names
  NSPM-13 + the FY-NDAA "traditional military activity" authority stack.

