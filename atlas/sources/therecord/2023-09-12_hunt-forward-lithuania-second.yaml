notes: |
  Martin Matishak / The Record (Recorded Future News). Reports
  USCYBERCOM's announcement (Tue 12 Sep 2023) that the Cyber National
  Mission Force (CNMF) "completed its second 'hunt forward' mission to
  uncover vulnerabilities in Lithuania's networks," working "for months
  alongside experts from Lithuania's Information Technology and
  Communications Department, which is part of the country's Ministry of
  the Interior." States the strategic purpose in substance: the op is
  "part of a larger push to help the U.S. government understand
  weaknesses or malicious activity in foreign systems and how they could
  impact networks back home"; CNMF chief Maj. Gen. Joe Hartman: "what
  impacts one nation or network can impact us all ... work side by side
  with trusted partners in Lithuania." NB "Cyber Command did not specify
  when the Lithuania mission occurred" — operation start/end are
  therefore approximate (worked "for months", wrapped shortly before the
  12 Sep 2023 announcement). Created 2026-07-05 to re-source
  2023-09/hunt-forward-lithuania-second off the phantom cybercom.mil
  news-index citation.
