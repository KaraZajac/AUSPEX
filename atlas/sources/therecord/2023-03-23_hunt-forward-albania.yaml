notes: |
  Martin Matishak / The Record (Recorded Future News). Reports
  USCYBERCOM's 23 Mar 2023 disclosure of the CNMF Hunt Forward
  deployment to Albania. Load-bearing for the deployment window and
  personnel count that the CYBERCOM press release omits: the CNMF
  "deployed a team of two dozen personnel on a 'hunt forward' operation
  following the second hack, which took place in September, and returned
  before the end of 2022"; "The three-month mission." Confirms the
  response context (Iran's July + September 2022 attacks on Albania) and
  names Maj. Gen. William J. Hartman.
