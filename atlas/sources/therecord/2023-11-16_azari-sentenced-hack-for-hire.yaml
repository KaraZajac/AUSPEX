notes: |
  # AUDIT 2026-07-01 — added as reachable, snapshottable corroboration
  # for the DOJ Azari matter (justice.gov is Akamai/bot-walled and the
  # 2022 guilty-plea PR URL now 404s).
  Recorded Future News report on Aviram Azari's November 2023 sentencing.
  Carries verbatim: Azari "pleaded guilty in April [2022] to wire fraud,
  conspiracy to commit hacking and aggravated identity theft"; scheme ran
  "from 2014 until 2019"; "paid $4.8 million over five years"; "Azari hired
  hackers, including a group from India"; victims included climate activists
  from the Union of Concerned Scientists and Rockefeller Family Foundation
  plus (via the Wirecard exception) short-sellers. LOAD-BEARING CORRECTION
  it carries: "Although prosecutors did not name the Indian hacking group
  Azari worked with, Reuters reported last year that he had hired BellTroX"
  — i.e. the DOJ did NOT name BellTroX; the BellTroX identity is Reuters'.
