  Verbatim from the snapshot (sha256 8d7b4a18…87c74c22, 83,959 bytes):
  "Hoya Corporation, one of the world's largest manufacturers of lenses and
  other optical gear, said on Thursday that a possible breach of its systems has
  affected some production plants and the ordering system for some products.";
  "The Tokyo-based company said that on March 30 it discovered an 'IT system
  incident' in an overseas office and 'engaged external forensic investigators
  who reported that this incident was most likely caused by unauthorized access
  to our servers by a third party.'";
  "Recorded Future News has asked Hoya whether ransomware was the cause. The
  company did not immediately respond.";
  "the systems for some production plants and the ordering system for several
  products have been affected";
  "Hoya said it hasn't yet determined if any confidential or personal
  information has been compromised.";
  "Hoya is known for eyeglass and contact lenses, medical endoscopes and the
  replacement lenses used during cataract surgery." Establishes start (March 30
  discovery), disclosure (April 4), and initial vector only as "unauthorized
  access ... by a third party" (unspecified → unknown).
