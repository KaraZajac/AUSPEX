  2025-03-18). Real article. Verified verbatim: "Western Alliance Bank told
  regulators in Maine that 21,899 people were impacted"; the bank "was one
  of hundreds of companies and organizations named by the Clop ransomware
  gang … after the group claimed it was behind the exploitation of a
  vulnerability impacting the Cleo file [transfer tool]"; "In October 2024,
  an unauthorized actor began exploiting this unknown vulnerability in the
  third-party software"; data exfiltration window "October 12, 2024, to
  October 24, 2024"; stolen data "names, Social Security numbers and in
  some cases, dates of birth, financial account numbers, driver's license
  numbers, tax identification [numbers] and passports." Confirms the
  October-2024 exploitation window and the "hundreds of … organizations"
  global directionality.
