notes: |
  The Record (Martin Matishak) reporting CYBERCOM's own public
  announcement of a CNMF hunt-forward deployment to Zambia — the
  command's FIRST hunt-forward mission in Zambia. CNMF worked with the
  Zambian Information Communication Technology Authority (the country's
  cybersecurity-oversight body) for "roughly three months in 2023" to
  identify vulnerabilities and hunt for malicious activity; a specific
  vulnerability was found and the partner remediated it. Quotes the
  (unnamed) mission commander and U.S. Ambassador to Zambia Michael
  Gonzales.

