notes: |
  Reporting on the September 2024 — March 2025 MuddyWater
  (MOIS) campaign delivering the MuddyViper backdoor and a
  Snake-game-themed spyware decoy via spear-phishing against
  Israeli technology, engineering, local government, education,
  and manufacturing sectors plus Egyptian critical
  infrastructure. PDF lures linked to OneHub and Mega-hosted
  installers. Companion to existing 2025/12 muddywater-
  muddyviper-israel event.
