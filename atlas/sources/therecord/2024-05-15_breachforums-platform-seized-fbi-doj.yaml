  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured;
  content_sha256 recorded (85,603 bytes). Verbatim: "The website and
  Telegram page for the notorious BreachForums platform ... appears
  to have been seized."; "This website has been taken down by the
  FBI and DOJ with assistance from international partners"; partners
  "the U.K.'s National Crime Agency (NCA) and others in Australia,
  New Zealand and Switzerland"; "On that page, the FBI said
  BreachForums has been run by a threat actor known as ShinyHunters
  since June 2023 and has been a 'clear-net marketplace ...'"; "The
  FBI did not respond to requests for comment and the DOJ declined
  to comment."; "The agencies also created a website where people
  involved in BreachForums can come forward to share evidence"
  (= breachforums.ic3.gov); on the predecessor: "a new person going
  by 'Baphomet' took over the platform ... Baphomet's Telegram
  channel was also taken over."
