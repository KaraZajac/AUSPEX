notes: |
  Recorded Future News (The Record) reporting Leicester City Council's
  confirmation of the ransomware attack and INC Ransom's leak-site claim.

  AUDIT (2026-07-04, claude-opus-4.8/max): Raw captured + hashed
  (83,729 bytes). Verbatim: systems/phone lines "operating normally
  following the decision to shut everything down on March 7 when the
  attack was detected"; disrupted "critical services ... included its
  child protection, adult social care safeguarding, and homelessness
  departments" (these were DISRUPTED DEPARTMENTS, not leaked-document
  categories); leaked documents were "rent statements, applications to
  purchase council housing and identification documents such as passport
  information". INC Ransom self-claimed via its dark-web extortion site
  (~25 documents in the first tranche). Also: "INC Ransom has also
  claimed to be behind an attack on NHS Dumfries and Galloway" — a
  DIFFERENT victim, confirming the two are distinct events (relevant
  because the NHS Dumfries source was previously mis-cited on this event).
