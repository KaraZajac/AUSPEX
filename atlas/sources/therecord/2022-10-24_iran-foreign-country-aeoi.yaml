notes: |
  AUDIT (2026-06-27, claude-opus-4.8/max): created during phantom re-source of event
  2022-10/black-reward-aeoi-leak (whose sole prior citation, socradar/2022-10_black-reward-aeoi,
  pointed at the socradar.io homepage, not an article). Byline "Alexander Martin, October 24th,
  2022" (used for published_on; the page's JSON-LD datePublished 2023-01-04 is a platform-migration
  artifact). Verbatim support captured in the snapshot:
  - AEOI's own framing: "Iran's Atomic Energy Organization (AEOI) said on Sunday that 'a specific
    foreign country' which it did not name was behind the hacking of an email server a hacktivist
    group claimed responsibility for." (the regime's foreign-state deflection of a hacktivist claim)
  - Actor self-claim: "The group, Black Reward, claimed to have accessed the organization's documents
    in statements posted on Twitter and Telegram that included the hashtags #OpIran and #MahsaAmini".
  - Motive/ultimatum: "Black Reward threatened to release stolen information unless the Iranian
    government released people who had been arrested during the ongoing protests following Amini's
    death on September 16"; closing line "in the name of Mahsa Amini and for women, life, freedom."
  - Leak content: "Iran's public and private conversations with the International Atomic Energy
    Agency"; Bushehr power plant "management and operational schedules", tasks of "Iranian and
    Russian specialists who were working there, alongside the passports and visas for these individuals."
