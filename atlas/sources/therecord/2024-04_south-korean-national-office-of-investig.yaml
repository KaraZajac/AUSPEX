  AUDIT (2026-06-25, claude-opus-4.8/max): raw captured (curl HTTP 200, 83,672 B;
  sha256 2142f2c7…). Corrected the backfill metadata: publisher was wrongly set to the
  South Korean NOI/KNPA (that is the *attributing org*, not the publisher) and the title
  was the AUSPEX event title; the actual article is The Record / Recorded Future News,
  headline "Familiar North Korean groups cited in cyberattacks against South Korean defense
  firms" (JSON-LD datePublished 2024-04-23T19:03Z — published_on confirmed). tier secondary
  retained (The Record reports "according to local media reports citing the National Office
  of Investigation"; it is a journalism account of the police statement, not the primary
  KNPA release). Verbatim support:
  - "South Korean security services identified three Pyongyang-backed groups responsible for
    these attacks — operations known to global law enforcement and cybersecurity researchers
    as Lazarus, Kimsuky and Andariel." (ATTRIBUTION: nation-level — "Pyongyang-backed", three
    NAMED groups; the RGB / any bureau is NOT named anywhere — "Reconnaissance"/"RGB"/"bureau"
    appear zero times in the raw.)
  - "They purportedly infiltrated the networks of 83 South Korean defense companies or their
    contractors and stole confidential information from about 10 of them from October 2022 to
    July 2023, according to local media reports citing the National Office of Investigation."
  - "In November 2022 … Lazarus hacked the server of an unnamed defense industry company and
    transferred some of the 'important data from the internal network …' to an overseas cloud
    server. Sometime around October 2022, the Andariel group leaked defense company data by
    hijacking an employee account. From April to July 2023, Kimsuky stole technical data from
    a company by exploiting a vulnerability that allowed downloading large files via email."
  - "The police did not name the companies that have been hacked or what data was leaked."
    (no malware names / no named individuals disclosed — confirmed.)
