notes: |
  Contemporaneous reporting of the Lee Enterprises outage / print-disruption
  phase. Created + snapshotted 2026-07-05 during the RE-SOURCE of event
  2025-02/lee-enterprises-qilin (previously mis-cited to the Synnovis NHS
  statement).

  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot 86,367 bytes,
  sha fe48a4f1…83e7b345. Verbatim support:
   - "Lee Enterprises controls almost 350 digital platforms and print
     publications serving 72 markets in 25 states — including the St. Louis
     Post-Dispatch".
   - "the St. Louis Post-Dispatch said the company was initially attacked on
     Monday, February 3, and many of the news outlets were not able to access
     software used to build pages and publish stories."
   - The company told Recorded Future News it is "working through technology
     issues that caused some disruption" and "has been working with third-party
     specialists to fully restore our systems and investigate the nature of these
     disruptions."
   - "Many of the Lee Enterprises newspapers released identical statements on
     their websites and in newspapers, but printing and publishing schedules
     differed among the local news outlets."
  NB: this article also states "The company also discussed the incident in a
  February 7 filing with the Securities and Exchange Commission (SEC), explaining
  that the cyberattack affected 'certain business applications resulting in an
  operational disruption.'" — This Feb-7 attribution is NOT borne out by the
  primary: the only 8-K filed 2025-02-07 (accession 004403) is Lee's Q1 earnings
  release (Item 2.02) with no incident disclosure; the formal Item 1.05 cyber 8-K
  is report-date Feb 12 / filed Feb 18. Treated as a reporting imprecision; the
  event dates the SEC disclosure to Feb 12 per the primary.
