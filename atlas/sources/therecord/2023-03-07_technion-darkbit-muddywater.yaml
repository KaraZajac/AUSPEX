notes: |
  Anchors the INCD attribution that the JS-gated gov.il advisory could not
  carry. Byline Alexander Martin, 2023-03-07. Verbatim: "Israel's National
  Cyber Directorate on Tuesday attributed the attack to a threat group
  tracked as MuddyWater, which last year U.S. Cyber Command linked to the
  Iranian Ministry of Intelligence and Security." Also carries the Technion
  victim ("the Israel Institute of Technology, also known as Technion"), the
  February attack impact ("postpone exams and shut down its IT systems"),
  the 80-bitcoin ($1.7M) demand, and the ideological note ("an apartheid
  regime"). Snapshot HTTP 200, 80,105 B.
