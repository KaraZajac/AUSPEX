notes: |
  Documents which organizations INDEPENDENTLY confirmed GoAnywhere
  (CVE-2023-0669) breaches versus those merely listed on Cl0p's leak
  site. Supporting quotes (raw snapshot, sha 7d83e5b8...1330a6da,
  86,589 bytes): "data management giant Rubrik confirmed to The Record
  ... that hackers had attacked the company using the GoAnywhere bug";
  "Hatch Bank also said hackers used the Fortra bug to steal 140,000
  customer Social Security numbers"; Hitachi Energy confirmed. Used on
  2023-05/cl0p-goanywhere to separate confirmed victims from Cl0p's
  leak-site claims. AUDIT (2026-07-02, claude-opus-4.8/max): curl HTTP
  200, snapshot + sha256 captured.
