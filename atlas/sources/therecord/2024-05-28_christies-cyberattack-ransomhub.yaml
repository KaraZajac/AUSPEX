  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot + sha256
  captured (sha 8e78355a…e07a99dc, 83,916 bytes). Byline Alexander Martin,
  May 28th, 2024. Verbatim from the snapshot:
   - "RansomHub claimed on Monday to have been behind a cyberattack targeting
     the British auction house Christie's."
   - "A listing on RansomHub's darknet extortion site includes what the
     criminals say are samples of data stolen from Christie's, the world's
     largest [auction house]".
   - CEO "Guillaume Cerutti, announced the company had taken its website
     offline due to what it described as a 'technology security incident.'"
   - "the auction house CEO said there was 'no evidence of any financial or
     transactional data related to our clients or to Christie's being taken or
     copied.'"
   - "The threat to publish the stolen data follows the company refusing to
     negotiate an extortion payment".
