notes: |
  Proofpoint disclosure of a TA453 (APT35 / Charming Kitten)
  campaign targeting a prominent Jewish religious figure from
  late July 2024. The attack chain delivers the BlackSmith
  toolkit which provides the AnvilEcho PowerShell trojan — a
  monolithic consolidation of TA453's previous modular implants
  (CharmPower, GorjolEcho, POWERSTAR, PowerLess) into a single
  script. Initial delivery via a fake-podcast lure ZIP from
  Google Drive containing a Windows LNK file.
