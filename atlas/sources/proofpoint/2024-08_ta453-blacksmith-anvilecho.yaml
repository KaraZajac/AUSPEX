notes: |
  Proofpoint disclosure (published 2024-08-20) of a TA453 campaign
  that began 22 July 2024 targeting a prominent Jewish religious
  figure. TA453 impersonated the Research Director of the Institute
  for the Study of War (ISW) and lured the target with a fake ISW
  podcast invitation; the payload was staged via a password-
  protected DocSend note (linking the real ISW podcast to build
  trust) and then a Google Drive ZIP ("Podcast Plan-2024.zip")
  containing an LNK. The LNK loaded the C++ BlackSmith toolset,
  which delivered the AnvilEcho PowerShell trojan (~2200 lines,
  v3.2.3) — a single-script consolidation of TA453's previously
  modular backdoors (GorjolEcho/PowerStar, TAMECURL, MischiefTut,
  CharmPower). Proofpoint attributes TA453 to the IRGC Intelligence
  Organization (IRGC-IO) and assesses it "roughly equivalent to
  Mandiant's APT42 ... all of which can generally be considered
  Charming Kitten."
