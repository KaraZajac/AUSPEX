notes: |
  Proofpoint's foundational disclosure of "Transparent Tribe"
  (APT36, ProjectM, Mythic Leopard), the Pakistani-state-aligned APT
  targeting Indian diplomatic and military entities. URL needs
  verification.

  AUDIT (2026-06-24, claude-opus-4.8/max): captured for the Transparent Tribe
  service-placement audit. The live URL serves only a JavaScript/marketing shell
  with no article body; the rendered blog text was recovered from the Wayback
  id_ raw snapshot (raw_snapshot above; the cited archive_url). Finding: this 2016
  disclosure names NEITHER the ISI NOR Pakistan in the article body — it states
  "the exact nature and attribution associated with this APT remains under
  investigation" and that the actors may be "nation-states or private parties with
  interests in international conflicts." Does NOT support the ISI placement (the
  later Pakistan link came via Unit 42's companion "ProjectM" report, which is in
  the actor's misp_refs but is not one of its six cited sources).
