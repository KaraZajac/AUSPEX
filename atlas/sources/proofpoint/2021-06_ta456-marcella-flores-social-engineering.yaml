notes: |
  AUDIT (2026-06-23, claude-opus-4.8/max): live URL HTTP 200, raw snapshot captured + hashed. Facts verified
  against the raw. Two corrections to the cited metadata: (1) published_on was a 2021-06-01 backfill placeholder
  anchored to the campaign month; the article's own schema.org datePublished is 2021-07-28T11:00:04Z (it discusses
  Facebook's "July 15, 2021" disruption), so corrected to 2021-07-28. (2) ATTRIBUTION nuance the event summary
  flattened: Proofpoint attributes the campaign to "the Iranian-state aligned threat actor TA456" (nation level,
  Iran). The IRGC link is FACEBOOK's, which Proofpoint relays and endorses — NOT Proofpoint's own independent
  finding. Verbatim:
    - "Proofpoint researchers have identified a years-long social engineering and targeted malware campaign by the
      Iranian-state aligned threat actor TA456."
    - "This actor is believed to be loosely aligned with the Islamic Revolutionary Guard Corps (IRGC) via
      association with the Iranian company Mahak Rayan Afraz (MRA), according to Facebook's analysis."
    - "On July 15, 2021, Facebook attributed a portion of Tortoiseshell's activity to Mahak Rayan Afraz (MRA),
      an Iranian IT company with ties to the IRGC. Based on previous malware analysis and historical open-source
      research, Proofpoint concurs with this attribution."
    - "Once the malware, which is an updated version of Liderc that Proofpoint has dubbed LEMPO, establishes
      persistence, it can perform reconnaissance on the infected machine ... exfiltrate sensitive information to
      an actor-controlled email account via SMTPS, and then cover its tracks by deleting that day's host artifacts."
    - "TA456 overlaps with activity tracked as Tortoiseshell, and Imperial Kitten."