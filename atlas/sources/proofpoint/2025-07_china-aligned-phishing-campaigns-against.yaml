notes: |
  Supporting quote: Between March and June 2025, Proofpoint Threat Research observed three Chinese state-sponsored threat actors conduct targeted phishing campaigns against the Taiwanese semiconductor industry.

  AUDIT (2026-06-24, claude-opus-4.8/max): Raw snapshot captured from the live URL (HTTP 200) and
  hashed (content_sha256). Attribution is NATION/state-sponsored level with NO Chinese service named:
  the report contains ZERO occurrences of "MSS", "Ministry of State Security", or the PLA. Verbatim
  framings: "Between March and June 2025, Proofpoint Threat Research observed three Chinese
  state-sponsored threat actors conduct targeted phishing campaigns against the Taiwanese
  semiconductor industry. In all cases, the motive was most likely espionage"; the three sub-clusters
  are each "a China-aligned threat actor Proofpoint tracks as UNK_FistBump / UNK_DropPitch /
  UNK_SparkyCarp". Decisive taxonomy note: "Proofpoint uses the UNK_ designator to define clusters of
  activity that are still developing and have not been observed for long enough to receive a numerical
  TA designation" — i.e. UNK_ = UNCATEGORIZED. The TA415/APT41 (Brass Typhoon) resemblance is an
  overlap, NOT an attribution: "Proofpoint is tracking UNK_FistBump activity as distinct to TA415 at
  this time." Also supports the event/TTP detail: UNK_FistBump employment-themed phishing delivering
  Cobalt Strike or the custom Voldemort backdoor (Google Sheets C2 via CiscoCollabHost.exe DLL
  sideloading); UNK_DropPitch targeting Taiwanese-semiconductor investment analysts with SoftEther VPN
  for admin/exfiltration tunnelling; UNK_SparkyCarp custom AITM credential phishing against a Taiwanese
  semiconductor firm (also targeted Nov 2024). This finding drove the actor demote
  cn/mss/china-aligned-taiwan-semiconductor-espionage-cluster -> cn/unscoped/...
