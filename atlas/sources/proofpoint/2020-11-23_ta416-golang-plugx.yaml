notes: |
  Proofpoint disclosure of TA416 / RedDelta / Mustang Panda
  return after Recorded Future's earlier RedDelta reporting on
  Vatican and Hong Kong Catholic diocese targeting (July /
  September 2020). The November activity reuses the Catholic
  Church target set but rewrites the PlugX loader in Go,
  changing detection surface while preserving infrastructure
  links to RedDelta.
