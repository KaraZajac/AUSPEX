notes: |
  Chainalysis mid-year 2024 statistical update. Documents
  ~USD 1.58B in cryptocurrency theft in H1 2024 (84.4%
  year-on-year increase), of which the largest single
  attributable cluster is DPRK (~USD 1.34B in 2024 by
  year-end per the December 2024 report). Establishes
  the canonical H1 2024 tempo quantification cited by
  subsequent US-government attestation documents.
