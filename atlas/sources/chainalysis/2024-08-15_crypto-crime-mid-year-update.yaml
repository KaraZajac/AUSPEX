notes: |
  Chainalysis mid-year 2024 statistical update. Documents
  ~USD 1.58B in cryptocurrency theft in H1 2024 (84.4%
  year-on-year increase), of which the largest single
  attributable cluster is DPRK (~USD 1.34B in 2024 by
  year-end per the December 2024 report). Establishes
  the canonical H1 2024 tempo quantification cited by
  subsequent US-government attestation documents.

  AUDIT (2026-07-05, claude-opus-4.8 / max): raw snapshot
  captured + hashed (sha256 8e2fc63b…2e3eee7f, 257,715 B).
  CORRECTIONS to the description above — this source does
  NOT carry a DPRK-specific total and the ~USD 1.34B figure
  is NOT in it (that is the Feb-2025 report; literal "1.34"
  = 0 hits here). The USD 1.58B is ALL-crypto stolen funds
  "through the end of July" (not "H1"), and its DPRK content
  is nation-level qualitative only: "North Korean-linked
  hacking groups are notoriously behind some of the largest
  heists" + North Korea-linked IT workers infiltrating
  crypto services. Names no group ("Lazarus" = 0 hits). Do
  not re-import a DPRK dollar total or a named actor from
  this source. Carried verbatim: $857M→$1.58B, 84.4% YoY,
  DMM $305M (~19% / ~4500 BTC), ransomware $449.1M→$459.8M,
  $75M Dark Angels.
