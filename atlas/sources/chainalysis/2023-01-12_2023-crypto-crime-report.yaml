notes: |
  Introduction / overview post of Chainalysis's 2023 Crypto
  Crime Report (report-level framing). Documents 2022 total
  illicit on-chain volume of USD 20.1B (all-time high), 44%
  of it tied to sanctioned entities (chiefly Garantex), and
  an illicit share of all crypto activity rising 0.12% -> 0.24%
  year-over-year.

  AUDIT (2026-07-02, claude-fable-5/max): raw HTML snapshot
