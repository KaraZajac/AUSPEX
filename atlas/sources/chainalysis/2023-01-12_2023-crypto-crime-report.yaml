  by DPRK-affiliated actors in 2022" — it does NOT. This
  introduction page contains no DPRK / $1.7B / Ronin / Harmony
  / Lazarus content; the $1.7B DPRK figure lives in the
  report's separate hacking chapter
  (chainalysis/2023-02-01_2022-biggest-year-crypto-hacking,
  published 2023-02-01), now the primary source for the
  DPRK-quantification event. Verbatim support for what THIS
  page carries: "illicit transaction volume rose ... hitting
