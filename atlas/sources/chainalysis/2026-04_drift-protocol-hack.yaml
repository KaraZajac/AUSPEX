  Chainalysis analysis of the Drift Protocol DPRK theft (01 Apr
  2026): six-month->"months" social-engineering operation against
  Security Council signers, abuse of Solana durable nonces to obtain
  pre-signed admin transactions, fake CVT (CarbonVote Token)
  collateral, and a drain of 18+ token types (largest JLP ~$159.3M;
  USDC $71.4M; etc.) totalling ~$285M.
