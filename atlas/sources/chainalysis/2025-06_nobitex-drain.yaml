notes: |
  Chainalysis on-chain analysis of the 18 June 2025 Nobitex exploit — corroborates
  the ~$90M loss and the burn (funds sent to burner addresses lacking private-key
  access), assessing the operation as politically rather than financially motivated.
  AUDIT (2026-07-10, claude-opus-4.8/max): NOT a phantom — live HTTP 200, real
  on-point article. Snapshotted + hashed: sha256 04e9ce33…42a22ff0, 239,007 bytes.
  CORRECTIONS: (1) title "Nobitex Exchange Drain — Tracing the Predatory Sparrow
  Operation" was a paraphrase (and Chainalysis actually names "Gonjeshke Darande",
  not "Predatory Sparrow") -> set to the real title "Nobitex, Sanctions, and The
  $90 Million Exploit: A Window into Iran's Largest Crypto Exchange". (2) published_on
  2025-06-19 -> 2025-06-18 (byline "June 18, 2025 | Chainalysis Team"; Wayback
  capture 20250618205532 same-day). Verbatim support: "On June 18, 2025, Iranian
  cryptocurrency platform, Nobitex, was exploited, resulting in [the loss of] more
  than $90 million in assets spanning a range of cryptocurrencies, including
  Bitcoin, Ethereum, Dogecoin, Ripple, Solana, Tron, and Ton"; "A pro-Israel group
  known as Gonjeshke Darande has claimed responsibility, framing the attack as a
  politically motivated strike against Iranian digital infrastructure"; "the
  attacker-controlled wallets were burner addresses lacking private key access,
  suggesting that the theft of more than $90 million was likely politically
  motivated, rather than financial in nature"; "on-chain analysis confirms that
  the attacker burned the stolen funds, making them irretrievable".
