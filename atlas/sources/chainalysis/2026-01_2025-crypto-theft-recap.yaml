  Chainalysis annual crypto-theft recap. AGGREGATE figures only:
  over USD 3.4B stolen industry-wide in 2025; DPRK ~USD 2.02B for
  2025 (51% YoY), cumulative DPRK theft ~USD 6.75B; Bybit alone
  ~USD 1.5B of the total.
