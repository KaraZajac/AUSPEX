notes: |
  Chainalysis's dedicated 24-Feb-2025 blog on the Bybit hack. Load-bearing
  for the 2025-02/bybit-safe-wallet event's mechanism + scale + DPRK-nexus
  claims. Verbatim (raw sha 8b5191a8…):
  - "On February 21, 2025, Bybit … experienced a significant security breach
    resulting in the loss of nearly $1.5 billion worth of ether (ETH). This
    incident stands as the largest digital heist in the history of
    cryptocurrency."
  - VECTOR: "The compromise: The hackers gained access to a Safe developer's
    computer to control the Safe UI that was specifically used for Bybit
    transactions. They then added the malicious JavaScript snipped [sic] to
    the frontend code, to make it appear that Bybit was signing a legitimate
    transaction, when in fact it was a malicious one."
  - "During what appeared to be a routine transfer from Bybit's Ethereum cold
    wallet to a hot wallet, Bybit unknowingly signed the malicious transaction,
    enabling the attackers to move approximately 401,000 ETH — valued at nearly
    $1.5 billion at the time of the exploit — to addresses under their control."
  - LAUNDERING: "The hackers swapped significant portions of the stolen ETH for
    tokens including BTC and DAI. They also utilized decentralized exchanges
    (DEXs), cross-chain bridges, and a no-KYC instant swap…"
  - DPRK-nexus: "Funds from the Bybit exploit have also consolidated in
    addresses holding funds from other known DPRK-linked attacks, providing
    further evidence that the nation state actors are behind this latest
    incident." Comparative: DPRK stole ~$660.5M across 20 incidents in 2023 and
    $1.34B across 47 incidents in 2024; "The Bybit hack alone led to almost
    $160 million more stolen than all funds stolen by North Korea throughout
    2024." (NB: does NOT claim it exceeds combined multi-year totals.)
