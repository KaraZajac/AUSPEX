notes: |
  On-chain analysis of the single TRON payment wallet named in
  Aeza's designation (TU4tDFRvcKhAZ1jdihojmBWZqvJhQCnJ4F; >$350k
  received, cashed out via exchanges through a payment processor
  that obscured customer deposits). Traces deposit flows involving
  the OFAC-sanctioned Garantex exchange and an infostealer-vendor
  wallet, and notes the designation used both CAATSA (Russia-
  related) and cyber-related authorities. Frames the action as
  "attacking the supply chain" of cybercrime infrastructure.
  NB: this blog does NOT name Meduza, Lumma, BianLian, RedLine, or
  BlackSprut — those specific families come only from Treasury
  sb0185; corrected 2026-07-10 (prior note over-stated Chainalysis'
  content). Snapshotted + hashed.
