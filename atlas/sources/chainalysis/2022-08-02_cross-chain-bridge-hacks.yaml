notes: |
  Chainalysis sector overview of 2022 bridge attacks (Ronin,
  Harmony, Nomad) published the same week as the Nomad
  exploit. Frames Nomad as a permissionless pile-on triggered
  by an initial bug-exploit transaction — large fraction of
  the proceeds drained by opportunistic addresses rather than
  a single coordinated theft, complicating attribution.
