  Chainalysis sector overview of 2022 bridge attacks published
  the same week as the Nomad exploit. CORROBORATING-ONLY after
  the 2026-07-11 audit: the page is a client-side-rendered
  React/Gatsby app and the article BODY is NOT present in the
  static HTML — both the live fetch and the Wayback capture
  (archive_url) return only nav/menu boilerplate + meta
  (~8.6KB visible), so the "permissionless pile-on / Ronin-
  Harmony-Nomad cluster" framing cannot be verified from this
  snapshot (level: partial — bot/JS-walled). The captured
  shell's only "North Korea" strings are GENERIC sector framing
  (bridges are a top target for DPRK-linked hackers; ~$1B
  stolen in 2022) — NOT a Nomad-specific attribution. The
  event's load-bearing pile-on + $190M claims are carried
  instead by the fully-verified Halborn post-mortem; this
  source is retained as secondary corroboration only.
