notes: |
  Reports the ROK National Intelligence Service (NIS) 2021-02-16 closed-door
  briefing to South Korea's parliamentary intelligence committee that North
  Korea "tried to obtain technology involving the COVID vaccine and treatment
  by using cyberwarfare to hack into Pfizer" (per lawmaker Ha Tae-keung).
  Provides national-government (ROK) corroboration of DPRK COVID-vaccine
  targeting and the Pfizer named-victim claim. NIS is cited at the nation
  level ("North Korea"); no specific DPRK service or named group is attributed
  by NIS in this account.
