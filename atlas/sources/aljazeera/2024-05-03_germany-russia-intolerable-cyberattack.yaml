  AUDIT (2026-07-04, claude-opus-4-8/max): raw snapshot captured + sha256 verified
  (202,485 bytes). Verbatim support:
   - Baerbock: "Today we can say unambiguously [that] we can attribute this
     cyberattack to a group called APT28, which is steered by the military
     intelligence service of Russia." / "it was a state-sponsored Russian
     cyberattack on Germany, and this is absolutely intolerable and unacceptable
     and will have consequences."
   - "Germany's Federal Ministry of the Interior said German companies, including
     in the defence, aerospace and information technology sectors, as well as
     targets related to Russia's war in Ukraine were also a focus of the attacks."
   - "The hacking campaign began at least as early as March 2022, a month after
     Russia launched its invasion of Ukraine, with emails at the SPD's
     headquarters accessed from December that year."
   - "German Interior Minister Nancy Faeser said the campaign was orchestrated by
     Russia's military intelligence service GRU."
   - "the acting charge d'affaires of the Russian embassy in Berlin has been
     summoned."
   - Czech MFA: "the country's institutions had also been targeted by APT28 by
     exploiting a vulnerability in Microsoft Outlook from 2023. ... It didn't
     provide details about the targets."
   - EU condemned "the malicious cyber campaign conducted by the Russia-controlled
     Advanced Persistent Threat Actor 28 (APT28) against Germany and Czechia";
     NATO said APT28 targeted entities "including in Lithuania, Poland, Slovakia
     and Sweden" (named as OTHER alliance targets, not part of this attribution).
