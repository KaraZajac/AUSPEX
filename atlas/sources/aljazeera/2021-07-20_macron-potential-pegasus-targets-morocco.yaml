notes: |
  Al Jazeera wire report (By News Agencies / Reuters; datePublished
  2021-07-20T19:32:58Z, modified 2021-07-21T05:37:43Z), relaying Le
  Monde's France reporting. BADRABBIT RE-SOURCE (2026-07-11,
  claude-opus-4.8/max): added as the carrier of the Moroccan-operator
  attribution AND Morocco's denial. Carries verbatim:
    • "The phone of French President Emmanuel Macron was targeted for
      potential surveillance on behalf of Morocco in the Pegasus spyware
      case, French newspaper Le Monde reported on Tuesday."
    • "Le Monde said that, according to sources, one of Macron's phone
      numbers, which he had used regularly since 2017, is on the list of
      numbers selected by Morocco's intelligence service for potential
      cyber-spying." (operator = an unnamed Moroccan intelligence
      service — nation-level, no named unit)
    • MOROCCO DENIAL: "Morocco had issued a statement on Monday denying
      any involvement in using Pegasus and rejecting what it called
      'unfounded and false allegations'."
    • Corpus hedge: "Macron's phone number was among about 50,000
      believed to have been identified as people of interest since 2016
      by clients of the Israeli firm NSO" (selection/interest list, not
      confirmed infection).
