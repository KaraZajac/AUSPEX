notes: |
  Al Jazeera / News Agencies (Reuters, AFP) report on the FSB's
  January 14 2022 REvil takedown. Carries the load-bearing facts
  the Krebs carding piece does not: Russia's Federal Security
  Service (FSB) "dismantled ransomware crime group REvil at the
  request of the United States", raiding 25 addresses and sweeping
  up 14 people; assets seized (426m roubles, $600k, €500k, 20 cars);
  two named as Roman Muromsky and Andrei Bessonov; framed as "a rare
  apparent demonstration of US-Russian collaboration at a time of
  high tensions between the two over Ukraine." Added in 2026-07-01
  audit of event 2022-02/russian-carding-crackdown.
