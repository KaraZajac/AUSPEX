notes: |
  Al Jazeera/Bloomberg reporting on the plant reopenings, added
  2026-07-10 (claude-opus-4.8/max audit) to carry the beef-capacity
  and geographic-spread figures. Verbatim: "Sunday's cyberattack
  forced JBS to shut down all of its beef plants in the U.S. —
  accounting for almost a quarter of American supplies — and slow
  pork and poultry production. Slaughtering operations across
  Australia were halted and at least one Canadian plant was idled."
  Documents the ~2-3 day recovery ("By Thursday, an Omaha plant will
  resume work ...") consistent with the event's end_date 2021-06-03.
