notes: |
  Cyberint (Check Point) threat-intelligence profile of the Handala
  Hack persona, authors Idan Dror and Hadar Eichler (published
  2025-02-20; last modified 2026-03-17). First-hand analysis of the
  persona's own Telegram/X posts and screenshots. This is the source
  Wikipedia's "Handala Hack Team" article cites for the February 2024
  "We stood by Rafah" defacement campaign.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshotted + hashed;
  carries the load-bearing claim for 2024-02/handala-rafah-defacement-
  campaign verbatim: "the group is affiliating itself to the ongoing
  war between Israel and Hamas by posting 'We stood by Rafah' on
  February 13, around the time the Israeli government ordered the IDF
  to start planning a military operation in Rafah, and alongside a
  malicious campaign of multiple Israeli websites defacement and
  alleged data leakage that took place on February 27th." Also
  documents the INCD warning and the Iran/MOIS persona-front reading.
