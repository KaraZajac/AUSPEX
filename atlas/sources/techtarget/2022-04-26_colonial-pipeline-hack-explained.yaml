notes: |
  Edited trade-press explainer/timeline of the Colonial Pipeline attack. Added 2026-07-10
  (claude-opus-4.8/max) as the snapshot-able carrier for the physical-scope + emergency +
  timeline facts that the govt sources omit — chiefly the ~5,500-mile figure and the emergency
  declaration. URL resolved HTTP 200; raw hashed (411,505 bytes, dd1615c5…c172f22ec; page carries
  datePublished 2022-04-26 and is periodically updated). Verbatim support: "The Colonial Pipeline
  comprises more than 5,500 miles of pipeline. It starts in Texas and moves all the way up through
  New Jersey, supplying nearly half of the fuel for the East Coast"; timeline entries "Colonial
  Pipeline pays ransom of 75 bitcoin ($4.4 million)", "May 9, 2021 Emergency declaration by
  President Joe Biden", "May 12, 2021 Pipeline restarted as normal operations resumed", "June 7,
  2021 Department of Justice recovers 63.7 bitcoin -- approximately $2.3 million", "June 8, 2021
  Congressional hearing"; the vector — hackers accessed "the Colonial Pipeline network through an
  exposed password for a VPN account, said Charles Carmakal … Mandiant"; and aviation/impact —
  "limited disruption at other airports, including Atlanta and Nashville. Fear of a gas shortage
  caused panic-buying and long lines at gas stations in many states, including Florida, Georgia,
  Alabama, Virginia and the Carolinas." (Independently corroborates the $4.4M / $2.3M / 63.7-BTC
  figures.)
