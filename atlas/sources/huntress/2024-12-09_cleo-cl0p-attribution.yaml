notes: |
  Initial vendor disclosure of CVE-2024-50623 / CVE-2024-55956
  Cleo MFT exploitation. Cl0p subsequently claimed responsibility
  on the leak site, naming victims through Q4 2024.
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot +
  sha256 captured (38b5f8a5…773a0e42, 396,334 bytes). Real article
  (title "Cleo Software Actively Being Exploited in the Wild"), NOT a
  phantom. Load-bearing quotes verified verbatim: "On December 3,
  Huntress identified an emerging threat involving Cleo's LexiCom,
  VLTransfer, and Harmony software" (Huntress spells it "VLTransfer";
  the product is VLTrader); "Although Cleo published an update and
  advisory for CVE-2024-50623 —which allows unauthenticated remote code
  execution—Huntress security researchers have recreated the proof of
  concept and learned the patch does not mitigate the software flaw";
  "Huntress communicated with Cleo on December 9 after creating our
  proof of concept"; "Huntress identified at least 10 confirmed
  compromised Cleo servers from its own telemetry … Victimized
  industries: consumer products, food, trucking, and shipping"; and the
  ATTRIBUTION line "CL0P ransomware group claimed responsibility for
  CVE-2024-55956 activity. This is the same group behind the MOVEit mass
  exploitation campaign in 2023, which hit hundreds of organizations
  globally." Also carries the "Malichus" Java implant analysis
  (post-exploitation payload). The CL0P/MOVEit sentences post-date the
  original 9 Dec advisory (Cl0p had not yet claimed on 9 Dec) — the
  captured page is the updated advisory. Tier secondary preserved
  (vendor advisory, but a threat-intel blog rather than a govt/CVE
  authority).
