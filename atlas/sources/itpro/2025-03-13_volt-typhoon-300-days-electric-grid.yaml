  Raw snapshot captured + hashed (200 OK, 975,998 bytes). Verbatim: "identified by Dragos as
  VOLTZITE, a group it says overlaps with the Volt Typhoon collective. An investigation into the
  intrusion revealed the group had likely had access to LELWD's network since February 2023,
  totalling more than 300 days of access to its IT environment." Discovery: "first discovered in
  November 2023 while LELWD was implementing a number of OT security solutions." Impact: "the
  compromised information did not impact any customer data." Pre-positioning: "This group is known
  for pre-positioning within US CI—not necessarily for immediate sabotage, but for future
  disruption scenarios. By embedding themselves in water and power utilities, they gain persistent
  access to industrial control systems ... which could be leveraged in a geopolitical crisis." LOTL:
  "A CISA advisory on the Volt Typhoon published in the summer of 2023 warned that the group
  frequently employs living off the land (LOTL) techniques, using pre-installed tools to maintain
  persistence."
