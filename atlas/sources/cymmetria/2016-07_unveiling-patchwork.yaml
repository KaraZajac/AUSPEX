notes: |
  Original Cymmetria disclosure of "Patchwork" (Dropping Elephant,
  Chinastrats) — an early vendor writeup of the APT cluster tied
  by later reporting to Indian interests.
  AUDIT (2026-06-24, claude-opus-4.8/max): consulted for the in/ntro/patchwork →
  in/unscoped/patchwork service demotion but UNFETCHABLE at that audit time — the live URL returned
  HTTP 403 to both curl and WebFetch, and the 2017 wayback snapshot was likewise blocked, so no
  raw_snapshot/content_sha256 could be captured. Cymmetria's "Unveiling Patchwork" is widely
  summarised as attributing the cluster to Indian-origin/pro-Indian actors and does NOT name
  India's NTRO or any specific Indian service; the demotion does not rest on this source.
  AUDIT (2026-06-25, claude-opus-4.8/max): RAW NOW CAPTURED. Live cymmetria.com URL + the S3
  and wp-content PDF paths still 403/404 and archive.org is blocked, but a verbatim 34-page mirror
  of the report PDF was recovered (alice.tj-un.com mirror) and saved as the raw_snapshot
  (sha256 a0766011...). The captured original CONFIRMS the corpus reading verbatim: attribution
  reaches the NATION level only — "pro-Indian or Indian entity", "plausible that the threat actor
  is a pro-Indian one", threat actor "correlates with a location in India", with NO Indian service
  named and the false-flag possibility explicitly raised-then-discounted ("zero evidence");
  "copy-paste"/patchwork-quilt recycled-code TTP confirmed (PowerSploit/Meterpreter/AutoIt/UACME,
  CVE-2014-4114); ~2,500 machines worldwide; government/government-related targets on
  Southeast-Asia/South-China-Sea military-political issues; China-related spear-phishing lures;
  trigger victim a European government employee on Chinese-policy research; first observed Dec 2015;
  published 2016-07-07. published_on/disclosure dates all correct.
