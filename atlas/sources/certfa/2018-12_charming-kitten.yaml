notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): NAMES THE IRGC specifically (corroborates
  the ir/irgc/apt35 placement, with a hedge). CertFA ties the accounts-support[.]services
  infrastructure to "a group of hackers who are supported by the Iranian government, and
  that we believe have close ties with the Islamic Revolutionary Guard Corps (IRGC)."
  The IRGC is named (not merely "Iranian"), though the link is hedged ("we believe have
  close ties with") rather than a flat statement of IRGC subordination. Secondary
  corroboration to Microsoft's direct IRGC attribution.
  NB (2026-07-10): CertFA's own text does NOT name "US Treasury officials" or "nuclear
  scientists" — it describes sanctions-focused targeting, Iranian activists/journalists,
  and "more focus on Israeli and American citizens." The specific target roster (13
  Treasury/FinCEN/OFAC officials, foreign nuclear officials in Pakistan/Jordan/Syria, US
  defense contractors, D.C. think tanks) is carried by the AP investigation
  (apnews/2018-12-13_iran-hackers-hunt-nuke-workers), which analysed Certfa's leaked
  77-address list. Do not re-derive those specifics from this CertFA record.
