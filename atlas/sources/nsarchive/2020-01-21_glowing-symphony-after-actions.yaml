notes: |
  FOIA-declassified 120-day assessment of Operation Glowing Symphony.
  Canonical documentary source for the counter-ISIS task.

  AUDIT (2026-06-25, claude-opus-4.8/max): SERVICE-PLACEMENT verified for
  us/cybercom/jtf-ares-actor — KEEP. This FOIA-declassified primary source
  names USCYBERCOM (US Cyber Command) and JTF-ARES as the conductors of the
  operation throughout, in the actor's own words: "Operation GLOWING SYMPHONY
  was a watershed moment for USCYBERCOM"; the 30-Day Assessment is titled
  "The Most Complex Offensive Cyberspace Operation USCYBERCOM Has Conducted
  to Date"; and "The mission assigned to JTF-ARES was to counter ISIS actions
  in cyberspace while Operation GLOWING SYMPHONY specifically targeted ISIS
  use of social media and internet propaganda." Gen. Paul Nakasone is
  identified as "Director of the NSA, Commander of USCYBERCOM, and original
  commander of JTF-ARES." The cybercom service placement is therefore
  source-supported at the named-unit level. Raw snapshot captured + hashed.
