notes: |
  Bitdefender analysis of a new OceanLotus / APT32 macOS backdoor
  variant targeting Vietnamese-language users with Vietnamese-themed
  decoy documents.
  URL nulled 2026-05-29 (Agent2): Bitdefender migrated their blog
  domain (labs.bitdefender.com -> bitdefender.com/blog/labs ->
  bitdefender.com/en-us/blog/labs). The original November 2020 post
  on the OceanLotus macOS backdoor does not appear to have survived
  the migration. Wayback CDX shows no archived snapshot of either
  domain variant. The companion Trend Micro coverage at
  trendmicro.com/en_us/research/20/k/new-macos-backdoor-connected-to-oceanlotus-surfaces.html
  is live and covers the same technical content if a tier-2
  substitute is acceptable; the Bitdefender Labs OceanLotus tag at
  labs.bitdefender.com/tag/oceanlotus/ still references the analysis.
