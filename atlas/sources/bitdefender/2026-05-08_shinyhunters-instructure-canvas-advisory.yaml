notes: |
  Bitdefender Business Insights technical advisory (Sean Nikkel) on the
  May 2026 Instructure Canvas breach. Added 2026-07-05 as the key source
  for the confirmed-vs-claimed distinction and the second-breach framing.
  Verbatim: "The attacker exploited an issue related to Free-For-Teacher
  accounts" and "Instructure has not disclosed the technical mechanism";
  "Free-For-Teacher accounts were production Canvas tenants with
  lower-friction onboarding"; "The exposure window ran from 30 April to
  7 May 2026"; "Confirmed exposed data includes names, email addresses,
  student ID numbers, and some private messages between Canvas users.
  Instructure states no evidence of exposure for passwords, dates of
  birth, government identifiers, or financial information"; "ShinyHunters
  claims 3.6 TB of data covering approximately 275 million users across
  9,000 schools; however, Instructure has not confirmed these figures";
  "This is ShinyHunters' second breach of Instructure infrastructure in
  roughly eight months. The September 2025 incident targeted Salesforce
  environments through social engineering." JSON-LD datePublished
  2026-05-08T20:01:21Z. URL curl-verified + snapshot captured; sha256
  committed.
