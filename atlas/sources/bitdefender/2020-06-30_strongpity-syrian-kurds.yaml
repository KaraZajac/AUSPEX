notes: |
  Bitdefender's extended StrongPity analysis with Syrian Kurdish
  targeting and Operation Peace Spring temporal alignment.
  AUDIT (2026-06-25, claude-opus-4.8/max): cited by tr/unscoped/promethium (formerly tr/mit/
  promethium). 16-page PDF; strongest operational attribution among the cited sources, but only to
  "government": "It is believed that the attacks attributed to StrongPity are government-sponsored
  and are used for population surveillance and intelligence exfiltration." It situates the threat
  "in the geo-political context of the constant conflicts between Turkey and the Kurdish community"
  and notes targets "concentrated in the area of Turkey and Syria" / "near the border between
  Turkey and Syria, as well as in Istanbul", with the attackers "compromising Turkish
  telecommunication companies." It does NOT name the MİT or any specific Turkish service — it does
  not even say "the Turkish government", only "government-sponsored." Supports a Turkish-state
  nexus at the nation level; contributed to the MİT-placement demotion.
