notes: |
  ~8,761 documents exposing CIA CCI / EDG cyber tooling. Series of
  24 partial releases March 7 – November 9, 2017.
  AUDIT (2026-06-25, claude-opus-4.8/max): supports KEEP of us/cia/longhorn-lamberts
  at the CIA level. The captured Vault 7 "Projects" page names the CIA throughout (76
  occurrences) and explicitly ties the Longhorn cluster to the CIA: "[researchers] were
  unable to attribute the back-end ... to operations run by the CIA. In a recent blog post
  by Symantec, that was able to attribute the 'Longhorn' activities to the CIA based on the
  Vault 7 ..." The page also documents the exact tools the actor record cites (HIVE,
  Brutal Kangaroo, Weeping Angel, Pandemic, ELSA, Athena). This is the cited source that
  bridges Vault7 -> CIA; Symantec/Kaspersky supply the Longhorn/Lamberts <-> Vault7 link.
