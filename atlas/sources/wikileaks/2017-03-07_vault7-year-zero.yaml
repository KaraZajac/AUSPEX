notes: |
  ~8,761 documents exposing CIA CCI / EDG cyber tooling. Series of
  24 partial releases March 7 – November 9, 2017.
  AUDIT (2026-06-25, claude-opus-4.8/max): supports KEEP of us/cia/longhorn-lamberts
  at the CIA level. The captured Vault 7 "Projects" page names the CIA throughout (76
  occurrences) and explicitly ties the Longhorn cluster to the CIA: "[researchers] were
  unable to attribute the back-end ... to operations run by the CIA. In a recent blog post
  by Symantec, that was able to attribute the 'Longhorn' activities to the CIA based on the
  Vault 7 ..." The page also documents the exact tools the actor record cites (HIVE,
  Brutal Kangaroo, Weeping Angel, Pandemic, ELSA, Athena) and the Marble Framework anti-
  forensic multi-language-decoy description ("test examples not just in English but also in
  Chinese, Russian, Korean, Arabic and Farsi ... a forensic attribution double game"). This
  is the cited source that bridges Vault7 -> CIA; Symantec/Kaspersky supply the
  Longhorn/Lamberts <-> Vault7 link.
  COMPANION CAPTURE (2026-07-11, claude-opus-4.8/max, event-audit of 2007-01/longhorn-cumulative):
  the "8,761 documents" figure in the event outcome_summary lives on the Year Zero release
  page, NOT the Projects page kept as raw_snapshot. That page (https://wikileaks.org/ciav7p1/)
  was captured to raw/ as wikileaks__2017-03-07_ciav7p1-year-zero.html (71,229 B, sha256
  a817d8f73fbdc88eeb129455cddfd8aa572821a63810503d831c94d254c59f1d); it carries verbatim: "The
  first full part of the series, 'Year Zero', comprises 8,761 documents and files from an
  isolated, high-security network situated inside the CIA's Center for Cyber Intelligence"
  (CIA 102×, EDG/Center-for-Cyber-Intelligence present). raw_snapshot kept on the Projects
  page because that is the one page carrying the explicit Symantec-Longhorn->CIA bridge.
