notes: |
  Contemporaneous (2023-06-16) confirmation of named US government and
  corporate MOVEit victims. Supporting quotes (raw snapshot, sha
  5f57f5d1...7afe8a2adf, 1,317,394 bytes): Oregon — the state Dept. of
  "Transportation said attackers accessed personal information of about
  3.5 million in that state"; US federal — "entities from airlines to
  universities to the Department of Energy confirm their information was
  among a series of recent data breaches"; corporate roster — "a string of
  attacks that have also hit the Shell oil company, the BBC, British
  Airways, John Hopkins University and other institutions"; Louisiana —
  the OMV breach exposed "names, addresses and social security numbers"
  with residents advised to freeze credit (article gives no LA figure —
  the ~6M figure is carried by Emsisoft). Used on 2023-05/moveit-cl0p for
  the US Department of Energy, Oregon DMV/DOT (~3.5M), Shell, BBC, British
  Airways victims. AUDIT (2026-07-10, claude-opus-4.8/max): curl HTTP 200,
  snapshot + sha256 captured.
