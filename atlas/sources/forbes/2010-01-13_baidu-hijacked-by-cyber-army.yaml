notes: |
  Forbes (2010-01-13) on the 2010-01-12 Baidu DNS hijack by the
  "Iranian Cyber Army" persona — baidu.com was redirected to a
  server in the Netherlands and defaced with "This site has been
  hacked by Iranian Cyber Army," and Forbes notes the same group had
  previously targeted Twitter in December 2009. Explicitly hedges
  attribution: "It remains unclear whether the hackers have any
  relationship with Iran."
