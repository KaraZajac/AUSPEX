notes: |
  Contemporaneous (2019-03-30) Forbes coverage of the Toyota Japan/Tokyo
  dealership breach that also carries the public-linking of the earlier
  Toyota Australia (Feb 2019) attack to APT32/OceanLotus and the
  stepping-stone theory. Created 2026-07-10 to re-source the attribution
  for event 2019-06/apt32-toyota-australia off the mis-slugged ZDNet
  record (which carries no attribution).
  AUDIT (2026-07-10, claude-opus-4.8/max): live URL HTTP 200; raw snapshot
  captured + sha256 verified. Verbatim carriers:
  • "ZDNet has reported that the Australian attack has been attributed, by
    some security analysts at least, to the Vietnamese cyber-espionage unit
    known as APT32 (OceanLotus)."
  • "The Risky Business podcast has suggested that the Australian attack
    might have been used by APT32 as a stepping stone to access the central
    network in Japan that is thou[ght to be more secure]."
  • "Toyota has confirmed that as many as 3.1 million items of Toyota and
    Lexus customer data may have [been exposed]" and "'unauthorized access
    on the network' of a number of dealerships in the Tokyo area of Japan on
    March 21" (the JAPAN/Tokyo breach — this "March 21" date was previously
    mis-carried into the Toyota Australia event's disclosure_date).
