notes: |
  FBI's first public attribution of the Colonial Pipeline attack to
  DarkSide ransomware.

  AUDIT (2026-06-24, claude-opus-4.8/max): supports the ru/proxies/darkside ->
  ru/unscoped/darkside demotion. The entire substantive text is a single sentence —
  "The FBI confirms that the Darkside ransomware is responsible for the compromise of
  the Colonial Pipeline networks. We continue to work with the company and our government
  partners on the investigation." Documents NO Russian-state nexus: zero Russia / Russian /
  FSB / GRU / SVR / Kremlin / harbor / tolerance / state-sponsorship token. Attribution is
  to the "Darkside ransomware" as the responsible malware/crew only.
