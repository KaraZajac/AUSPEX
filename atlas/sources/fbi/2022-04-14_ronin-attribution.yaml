notes: |
  FBI public attribution of the March 2022 Ronin Network theft
  to Lazarus / APT38, issued concurrently with the OFAC SDN
  designation of the receiving Ethereum address.
  AUDIT (2026-07-11, claude-opus-4.8/max): snapshot from LIVE
  fbi.gov (HTTP 200). Full statement body, verbatim: "Through our
  investigation we were able to confirm Lazarus Group and APT38,
  cyber actors associated with the DPRK, are responsible for the
  theft of $620 million in Ethereum reported on March 29. The FBI,
  in coordination with Treasury and other U.S. government partners,
  will continue to expose and combat the DPRK's use of illicit
  activities – including cybercrime and cryptocurrency theft – to
  generate revenue for the regime." Note: figure is "$620 million"
  (not $625M); attribution is "Lazarus Group and APT38", NOT RGB;
  purpose is "revenue for the regime" — the statement does NOT
  mention WMD, ballistic missiles, or the Reconnaissance General
  Bureau (the 3 page hits for "WMD" are FBI site-navigation).
