notes: |
  FBI public attribution of the November 2014 Sony Pictures
  destructive attack to the DPRK government. First US-government
  public attribution of a major nation-state destructive attack
  on a US private company.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured
  (sha256 aa13b731...4d7221f1, 71117 B), verified to be the
  genuine press release. CORRECTION: the prior note "Framed as
  retaliation for The Interview" is NOT supported by this source —
  the statement names no film and no retaliation motive (0 hits
  for "Interview" / "retaliat" / "Kim Jong"). It attributes to
  "the North Korean government" (NATION level) and frames the
  purpose as coercive: "intended to inflict significant harm on a
  U.S. business and suppress the right of American citizens to
  express themselves." The retaliation-for-The-Interview framing
  belongs to the DOJ (2018 complaint / 2021 indictment), not the
  FBI. Cited by event 2014-11/sony-pictures.
