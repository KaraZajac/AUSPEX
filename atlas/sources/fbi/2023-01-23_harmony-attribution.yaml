notes: |
  FBI public attribution of the June 2022 Harmony Horizon Bridge
  theft ($100M) to the Lazarus Group / APT38.
  AUDIT (2026-06-24, claude-opus-4.8/max): service-attribution check for the TraderTraitor
  actor. Verbatim attribution: "the FBI confirmed that the North Korean malicious cyber actor
  group Lazarus (also known as APT38) was responsible for the theft"; "the Lazarus Group (also
  known as APT38), cyber actors associated with the DPRK, are responsible …". Names the group
  (Lazarus/APT38) and the nation (North Korea/DPRK) but NO service — no "Reconnaissance General
  Bureau"/"RGB"/"3rd Bureau"/"Bureau 121"/"Lab 110". Supports the actor's demotion to
  kp/unscoped. (No "WMD"/"ballistic" wording present in this release either.)
