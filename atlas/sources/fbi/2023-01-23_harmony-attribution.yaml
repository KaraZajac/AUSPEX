notes: |
  FBI public attribution of the June 2022 Harmony Horizon Bridge
  theft ($100M) to the Lazarus Group / APT38.
  AUDIT (2026-06-24, claude-opus-4.8/max): service-attribution check for the TraderTraitor
  actor. Verbatim attribution: "the FBI confirmed that the North Korean malicious cyber actor
  group Lazarus (also known as APT38) was responsible for the theft"; "the Lazarus Group (also
  known as APT38), cyber actors associated with the DPRK, are responsible …". Names the group
  (Lazarus/APT38) and the nation (North Korea/DPRK) but NO service — no "Reconnaissance General
  Bureau"/"RGB"/"3rd Bureau"/"Bureau 121"/"Lab 110". Supports the actor's demotion to
  kp/unscoped.
  CORRECTION (2026-07-02, claude-opus-4.8/max): the prior line's parenthetical claim that
  "No WMD/ballistic wording is present in this release" is ERRONEOUS. The raw release BODY
  carries the terminal WMD-financing goal verbatim: "…continue to identify and disrupt North
  Korea's theft and laundering of virtual currency, which is used to support North Korea's
  ballistic missile and Weapons of Mass Destruction programs." That is the goal-level
  attestation that supports the 2022-06/harmony-horizon-bridge doctrine_link at `attested`
  (the "WMD" token in the page nav menu is separate boilerplate; this sentence is article
  body). Also verbatim: the theft of "$100 million of virtual currency from Harmony's Horizon
  bridge reported on June 24, 2022", and RAILGUN laundering of "over $60 million worth of
  ethereum (ETH)". Snapshot hash re-verified: matches on-disk 272df202…5c4b4412 (89,377 bytes).
