notes: |
  FBI Director Wray public identification of Beijing-based
  Integrity Technology Group Inc. as the Flax Typhoon operating
  company; 260,000+ IoT/SOHO Raptor Train botnet disrupted by
  court-authorized FBI operation.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw (sha256 above).
  On the SERVICE question for actor cn/flax-typhoon — Wray names the
  Chinese government but NOT the MSS specifically. Verbatim: "a Chinese
  government-sponsored hacker group known as Flax Typhoon"; the chairman
  "has publicly admitted that for years his company has collected
  intelligence and performed reconnaissance for Chinese government security
  agencies" (generic plural — not the MSS); "The Chinese government is going
  to continue to target your organizations ... either by their own hand or
  concealed through their proxies." No occurrence of "Ministry of State
  Security"/"MSS"/"state security". Used to demote cn/mss/flax-typhoon →
  cn/unscoped/flax-typhoon (no MSS sourced).
