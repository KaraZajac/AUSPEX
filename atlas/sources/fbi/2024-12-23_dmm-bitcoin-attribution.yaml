notes: |
  Joint US-Japan attribution: FBI + DOD Cyber Crime Center (DC3)
  + Japan National Police Agency (NPA). Attributes the May 2024
  DMM Bitcoin theft ($308M, 4,502.9 BTC) to TraderTraitor via
  supply-chain compromise of Ginco (Japan-based enterprise wallet
  software vendor).
  AUDIT (2026-06-24, claude-opus-4.8/max): service-attribution check for the TraderTraitor
  actor. Verbatim title/lede: "FBI, DC3, and NPA Identification of North Korean Cyber Actors,
  Tracked as TraderTraitor, Responsible for Theft of $308 Million USD from Bitcoin.DMM.com" /
  "The Federal Bureau of Investigation, Department of Defense Cyber Crime Center, and National
  Police Agency of Japan are alerting the public to the theft …". Names the nation (North
  Korea) and the activity name (TraderTraitor) but NO service: no "Reconnaissance General
  Bureau"/"RGB"/"3rd Bureau"/"Bureau 121"/"Lab 110" (the only "Bureau" strings are "Federal
  Bureau of Investigation"; the only "WMD" string is an unrelated FBI nav-menu item). Supports
  the actor's demotion to kp/unscoped.
