notes: |
  Identifies Aria Sepehr Ayandehsazan as the IRGC-contractor
  re-brand of Emennet Pasargad responsible for 2024 US election
  influence operations and Israeli targeting.
  AUDIT (2026-06-24, claude-opus-4.8/max): raw snapshot captured (curl, HTTP
  200, application/pdf, 1,153,344 bytes, 16 pages) and read directly. SERVICE
  WORDING: this advisory refers to the actor ONLY as "the Iranian cyber group
  Emennet Pasargad", "Iranian Cyber Group Aria Sepehr Ayandehsazan", and
  "Iranian state-sponsored" — it does NOT name the IRGC anywhere in its 16
  pages, so it does not by itself attest the service; the title field's
  "Iranian IRGC contractor" parenthetical is an AUSPEX editorial gloss, not the
  document's own wording. The IRGC linkage for the ir/irgc placement rests on
  the Treasury 2021-11-18 source. The PDF corroborates Aria Sepehr Ayandehsazan
  (ASA, Iranian Registration Number 504415) as Emennet Pasargad's mid-2024
  nominal-cover re-brand: "FBI obtained reliable information in mid-2024
  indicating Emennet Pasargad has more recently been using the Iranian company
  name Aria Sepehr Ayandehsazan (ASA…) as a nominal cover".
  METADATA DISCREPANCY (RESOLVED 2026-07-05): the captured PDF is Product ID
  JCSA-20241030-001 / AA24-233A dated October 30, 2024 (matching the 241030.pdf
  URL), authored by FBI + US Treasury + Israel National Cyber Directorate, and
  references a prior 20 October 2022 FBI advisory.
  AUDIT (2026-07-05, claude-opus-4.8/max): applied the corrections the 2026-06-24
  pass had only flagged. sha256 RE-VERIFIED unchanged (63c82855…364b844c,
  1,153,344 bytes, 16 pages, PDF 1.7). published_on 2024-08-14 -> 2024-10-30;
  publisher "US FBI / CISA" -> "US FBI / US Treasury / Israel INCD" (CISA not an
  author); title set to the document's own "New Tradecraft of Iranian Cyber Group
  Aria Sepehr Ayandehsazan aka Emennet Pasargad" (dropping the "Iranian IRGC
  contractor" editorial gloss noted above). Id-slug "fbi/2024-08_…" kept frozen.
  The consuming event 2024-08/aria-sepehr-ayandehsazan-fbi-advisory was re-dated
  and heavily de-fabricated to match (see that event's qc block).
