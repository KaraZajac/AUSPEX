notes: |
  FBI's public attribution of the late-May 2021 ransomware attack on
  JBS USA (world's largest meat processor) to REvil / Sodinokibi.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot verified. The
  statement carries ONLY the attribution — verbatim: "We have
  attributed the JBS attack to REvil and Sodinokibi and are working
  diligently to bring the threat actors to justice." It does NOT
  state the USD 11M ransom, the plant-shutdown, or the capacity
  figures (those are carried by JBS's own June-9 disclosure and
  contemporary wire reporting — see the event's cnbc / abc /
  aljazeera sources). Corrected a prior note defect that implied the
  FBI statement carried the USD 11M figure. A key inflection in the
  Biden administration's pivot to counter-ransomware policy.
