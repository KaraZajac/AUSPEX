notes: |
  Wray's testimony explicitly named Volt Typhoon as PRC pre-
  positioning "to wreak havoc and cause real-world harm to American
  citizens and communities" in a Taiwan-conflict scenario. The
  canonical attesting source for tagging Volt Typhoon to the Taiwan-
  reunification doctrine.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited in the cn/mss/volt-typhoon service audit. The FBI
  Director attributes Volt Typhoon only at the nation level and names NO Chinese service: "...taken
  over by the PRC state-sponsored hacking group known as Volt Typhoon. The Volt Typhoon malware
  enabled China to hide... pre-operational reconnaissance and network exploitation against critical
  infrastructure." Wray frames the actor as "the government of China, led by the CCP," but names no
  MSS, PLA, or unit (the "Bureau" instances are his own FBI). Contributes to the DEMOTE to
  cn/unscoped/volt-typhoon.
