notes: |
  FBI FLASH (Number AC-000001-MW), dated 08 January 2026, masthead
  reads "FLASH" — NOT a "Cybersecurity Advisory (CSA)"; the /CSA/ URL
  path is only IC3's hosting directory (title corrected "CSA 260108" ->
  "FBI FLASH AC-000001-MW" 2026-07-10). Coordinated with DHS/CISA,
  TLP:CLEAR. Names the "North Korean state-sponsored cyber threat group
  Kimsuky" directly (does NOT name RGB / Reconnaissance General Bureau —
  0 occurrences in raw). Documents May-June 2025 quishing campaigns
  against think tanks, academic institutions, and both U.S. and foreign
  government entities using QR codes embedded in lures impersonating a
  foreign advisor, an embassy employee, a think-tank employee, and a
  non-existent conference; credential-harvesting pages impersonate
  Microsoft 365, Okta, VPN portals, and Google. Snapshot captured live
  (HTTP 200, application/pdf) + sha256.
