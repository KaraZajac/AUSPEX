notes: |
  FBI public attribution of the September 2023 Stake.com
  crypto-casino theft ($41M across BNB, ETH, Polygon) to Lazarus
  Group.
  AUDIT (2026-06-24, claude-opus-4.8/max): service-attribution check for the TraderTraitor
  actor. Verbatim: "the FBI … attributes it to the Lazarus Group (also known as APT38) which is
  comprised of DPRK cyber actors." Names the group (Lazarus/APT38) and nation (DPRK), and
  cross-refers to the prior "cybersecurity advisory on TraderTraitor" — but NO service: no
  "Reconnaissance General Bureau"/"RGB"/"3rd Bureau"/"Bureau 121"/"Lab 110". Supports the
  actor's demotion to kp/unscoped.
  AUDIT (2026-07-02, claude-opus-4.8/max): hash re-verified for the Stake.com EVENT audit
  (2023-09/stake-com) — sha256 5bd9a240…fc19a1cc, 81966 bytes, matches; tier (primary) /
  raw_snapshot / content_sha256 unchanged. PSA confirmed to carry: $41M, Sept-4-2023 theft,
  Lazarus/APT38/DPRK attribution, Ethereum/BSC/Polygon networks + published wallet list, and
  motive "revenue for the regime" (PROXIMATE goal — NO WMD / ballistic-missile language, so the
  event's doctrine link is strongly_inferred, not attested). The event's prior summary
  embellishments (Elliptic/ZachXBT, LinkedIn/Telegram social-engineering, AppleJeus dropper,
  Sinbad mixer, private-key harvesting, OFAC-Nov-2023) are NOT in this PSA and were stripped.
