notes: |
  FBI public attribution of the September 2023 Stake.com
  crypto-casino theft ($41M across BNB, ETH, Polygon) to Lazarus
  Group.
  AUDIT (2026-06-24, claude-opus-4.8/max): service-attribution check for the TraderTraitor
  actor. Verbatim: "the FBI … attributes it to the Lazarus Group (also known as APT38) which is
  comprised of DPRK cyber actors." Names the group (Lazarus/APT38) and nation (DPRK), and
  cross-refers to the prior "cybersecurity advisory on TraderTraitor" — but NO service: no
  "Reconnaissance General Bureau"/"RGB"/"3rd Bureau"/"Bureau 121"/"Lab 110". Supports the
  actor's demotion to kp/unscoped.
