notes: |
  FBI government-primary account of Operation WireWire (the DOJ
  national OPA press release of the same day is Akamai bot-walled
  and un-snapshottable). Reproduces the operative figures: a
  six-month sweep culminating in over two weeks of intensified
  activity, "74 arrests in the U.S. and overseas, including 42 in
  the U.S., 29 in Nigeria, and three in Canada, Mauritius, and
  Poland", "seizure of nearly $2.4 million and the disruption and
  recovery of approximately $14 million in fraudulent wire
  transfers", and the coordinating agencies (DOJ, FBI, DHS, Treasury,
  USPIS). Added 2026-06-28 as the snapshottable corroborating primary
  for the bot-walled DOJ release.
