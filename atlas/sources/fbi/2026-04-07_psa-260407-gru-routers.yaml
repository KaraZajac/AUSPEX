notes: |
  FBI/IC3 PSA (Alert I-040726-PSA, 07 April 2026) attributing
  worldwide vulnerable-router exploitation + DHCP/DNS hijacking to
  GRU 85th Main Special Service Center (85th GTsSS / APT28), for
  AitM theft of passwords, authentication tokens, emails and web
  traffic — targeting military, government and critical
  infrastructure. Notes a DOJ/FBI disruption of a GRU SOHO-router
  network. Co-released with NSA and 15 international partners
  (Canada, Czechia, Denmark, Estonia, Finland, Germany, Italy,
  Latvia, Lithuania, Norway, Poland, Portugal, Romania, Slovakia,
  Ukraine) and cross-references the same-day NCSC-UK advisory.
  Technical contributions from Lumen Black Lotus Labs + Microsoft
  Threat Intelligence; MIT Lincoln Laboratory testing/validation.
