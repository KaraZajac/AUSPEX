notes: |
  Rewards for Justice (administered by DSS, in coordination with FBI)
  reward of up to USD 10M for information on PRC state-sponsored
  malicious cyber activity against US critical infrastructure, invoked
  in the Salt Typhoon tip-seeking context.
  URL corrected 2026-05-29 (Agent2): the rewardsforjustice.net
  /rewards/salt-typhoon-cyber-actors/ slug now 404s. The canonical
  FBI/IC3 public service announcement is at ic3.gov/PSA/2025/PSA250424-2
  ("FBI Seeking Tips about PRC-Targeting of US Telecommunications").
  This is the FBI's authoritative record of the bounty announcement.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured (HTTP
  200, 5,134 bytes; sha256 0cda87b6…69052d39). Confirmed REAL article —
  FBI/IC3 PSA, Alert I-042425-2-PSA, dated 2025-04-24, headline "FBI
  Seeking Tips about PRC-Targeting of US Telecommunications". title
  corrected from the prior paraphrase "Salt Typhoon Cyber Actors — Up to
  $10 Million Reward", which overstated a dedicated bounty: the PSA seeks
  public tips on Salt Typhoon and points to the STANDING RFJ reward "of
  up to $10 million (USD) for information about foreign government-linked
  individuals participating in certain malicious cyber activities against
  US critical infrastructure in violation of the CFAA" — the RFJ
  critical-infrastructure reward invoked in the Salt Typhoon context, not
  a Salt-Typhoon-specific bounty. Page names "multiple US
  telecommunications companies" (no specific carriers), "theft of call
  data logs", "a limited number of private communications", and "copying
  of select information subject to court-ordered US law enforcement
  requests" (the CALEA/lawful-intercept angle). tier primary retained
  (govt-primary FBI/IC3). Sole citing event: 2025-04/fbi-salt-typhoon-bounty.
