notes: |
  FBI PSA attributing combined ~$100M theft (Alphapo, CoinsPaid,
  Atomic Wallet) in summer 2023 to Lazarus. Identified specific
  receiving wallet addresses.

  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot captured from
  fbi.gov (54,054 bytes, sha256 6120c065…a01b2009); title "FBI Identifies
  Cryptocurrency Funds Stolen by DPRK", real release (NOT a phantom).
  Verbatim attribution: "cryptocurrency stolen by the Democratic People's
  Republic of Korea (DPRK) TraderTraitor-affiliated actors (also known as
  Lazarus Group and APT38)"; the actors "moved approximately 1,580 bitcoin"
  (>"$40 million") into six BTC addresses. Thefts listed: "the $60 million
  theft of virtual currency from Alphapo … ; the $37 million theft of
  virtual currency from CoinsPaid … ; and the $100 million theft of virtual
  currency from Atomic Wallet on June 2, 2023." NB DATE ERROR: the PSA dates
  BOTH the Alphapo and CoinsPaid thefts to "June 22, 2023" — this is an
  FBI misstatement; the real attack date is 22 July 2023 (per CoinsPaid's
  own post-mortem and Elliptic on-chain tracing). The PSA carries NO WMD /
  weapons-financing goal language (that appears only in the later Treasury
  Sinbad designation, and there only for Atomic Wallet).
