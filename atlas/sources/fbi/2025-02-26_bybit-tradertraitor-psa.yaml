notes: |
  FBI Internet Crime Complaint Center Public Service Announcement
  attributing the February 2025 Bybit / Safe{Wallet} theft
  (~$1.5B, largest cryptocurrency theft in history) to the
  TraderTraitor subset of Lazarus.
  AUDIT (2026-06-24, claude-opus-4.8/max): CORRECTION — the prior note claimed this PSA
  "explicitly maps TraderTraitor to the 3rd Bureau of the RGB." The raw PSA does NOT: it names
  no service or sub-bureau at all. Verbatim, it attributes the theft only to the nation-state —
  "the Democratic People's Republic of Korea (North Korea) was responsible for the theft of
  approximately $1.5 billion USD … from … Bybit"; "FBI refers to this specific North Korean
  malicious cyber activity as 'TraderTraitor.'"; "North Korean TraderTraitor actors." No
  "Reconnaissance General Bureau" / "RGB" / "3rd Bureau" / "Bureau 121" / "Lab 110" / "APT38"
  string occurs (confirmed by raw-text extraction AND an independent fetch). Consequently the
  actor was demoted kp/rgb/3rd-bureau → kp/unscoped/tradertraitor.
