notes: |
  FBI/IC3 first-party victim-reporting page stood up with the
  May 15 2024 BreachForums seizure (breachforums.ic3.gov). This is
  the primary FBI artifact behind the seizure; the "clear-net
  marketplace" description that TheHackerNews and The Record
  attribute to "the agencies" is quoted verbatim from this page.
  AUDIT (2026-07-04, claude-opus-4.8/max): live .gov page, HTTP 200,
  36,395 bytes. content_sha256 is of the captured snapshot; the page
  embeds a per-request anti-CSRF token, so a byte-identical re-fetch
  will NOT reproduce this hash (three fetches gave three hashes,
  ~230 differing bytes) — the informational text below is stable.
  Verbatim: "The Federal Bureau of Investigation (FBI) is
  investigating the criminal hacking forums known as BreachForums
  and Raidforums."; "From June 2023 until May 2024, BreachForums
  (hosted at breachforums.st/.cx/.is/.vc and run by ShinyHunters)
  was operating as a clear-net marketplace for cybercriminals to
  buy, sell, and trade contraband, including stolen access devices,
  means of identification, hacking tools, breached databases, and
  other illegal services."; "Previously, a separate version of
  BreachForums (hosted at breached.vc/.to/.co and run by pompompurin)
  operated a similar hacking forum from March 2022 until March 2023.";
  "Raidforums (hosted at raidforums.com and run by Omnipotent) was
  the predecessor hacking forum to both version of BreachForums and
  ran from early 2015 until February 2022." Establishes the
  three-generation lineage (RaidForums -> BreachForums v1 -> v2) and
  the FBI contacts breachforums@fbi.gov / t.me/fbi_breachforums.
  published_on set to the seizure date (the live form carries no
  explicit publication date).
