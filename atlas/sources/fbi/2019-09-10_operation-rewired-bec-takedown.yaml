notes: |
  FBI government-primary account of Operation reWired (the DOJ national
  OPA press release of the same day is Akamai bot-walled and
  un-snapshottable here). Reproduces the operative figures: the sweep
  "resulted in 281 arrests, including 74 in the United States", with
  arrests "also made in Nigeria, Turkey, Ghana, France, Italy, Japan,
  Kenya, Malaysia, and the United Kingdom", and "the seizure of nearly
  $3.7 million and the disruption and recovery of approximately $118
  million in fraudulent wire transfers." Names the partner agencies as
  "the Department of Homeland Security, Department of State, Department
  of the Treasury, and the U.S. Postal Inspection Service" (39 of the
  FBI's 56 field offices participated). Sole snapshottable primary
  carrying the $118M wire-transfer figure. Added 2026-07-01 (AUDIT).
