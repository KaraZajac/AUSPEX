notes: |
  FBI / DOJ joint announcement of infrastructure disruption and
  release of a decryption tool for ALPHV (BlackCat) ransomware
  victims, prior to the March 2024 ALPHV exit-scam.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the ru/proxies/alphv -> ru/unscoped/alphv DEMOTION.
  Live justice.gov is behind an Akamai JS interstitial (curl + WebFetch returned the bot-challenge stub
  / 403); raw_snapshot captured from the archive_url wayback copy. The release frames ALPHV as PURELY
  CRIMINAL with ZERO Russia/FSB/GRU/state-sponsored/nation-state/proxy/safe-harbor language: "Over the
  past 18 months, ALPHV/Blackcat has emerged as the second most prolific ransomware-as-a-service variant
  in the world based on the hundreds of millions of dollars in ransoms paid by victims around the world.";
  "Affiliates are responsible for identifying and attacking high-value victim institutions with the
  ransomware."; "The FBI will continue to aggressively pursue these criminal actors". The only "nation"
  tokens are international law-enforcement cooperation / "transnational organized crime". No state nexus.
