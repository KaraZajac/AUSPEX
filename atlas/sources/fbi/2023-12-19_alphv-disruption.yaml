notes: |
  FBI / DOJ joint announcement of infrastructure disruption and
  release of a decryption tool for ALPHV (BlackCat) ransomware
  victims, prior to the March 2024 ALPHV exit-scam.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the ru/proxies/alphv -> ru/unscoped/alphv DEMOTION.
  Live justice.gov is behind an Akamai JS interstitial (curl + WebFetch returned the bot-challenge stub
  / 403); raw_snapshot captured from the archive_url wayback copy. The release frames ALPHV as PURELY
  CRIMINAL with ZERO Russia/FSB/GRU/state-sponsored/nation-state/proxy/safe-harbor language: "Over the
  past 18 months, ALPHV/Blackcat has emerged as the second most prolific ransomware-as-a-service variant
  in the world based on the hundreds of millions of dollars in ransoms paid by victims around the world.";
  "Affiliates are responsible for identifying and attacking high-value victim institutions with the
  ransomware."; "The FBI will continue to aggressively pursue these criminal actors". The only "nation"
  tokens are international law-enforcement cooperation / "transnational organized crime". No state nexus.
  AUDIT (2026-07-04, claude-opus-4.8/max, 2023-12/alphv-fbi-disruption event audit): raw_snapshot hash
  re-verified (sha 9c9f9c49...e0bc544c, 106,432 bytes) — content is the genuine full release. Live URL
  check today: the /opa/pr URL now 301-redirects to
  https://www.justice.gov/archives/opa/pr/justice-department-disrupts-prolific-alphvblackcat-ransomware-variant
  (DOJ archived pre-2025 OPA releases; link not rotted). Event-audit load-bearing quotes: subhead "FBI
  Offers Decryption Tool to Over 500 Victims Around the World"; "The FBI developed a decryption tool that
  allowed FBI field offices ... to offer over 500 affected victims the capability to restore their
  systems"; "saving multiple victims from ransom demands totaling approximately $68 million"; "has seized
  several websites that the group operated"; "As detailed in a search warrant unsealed today in the
  Southern District of Florida" (companion warrant now held as doj/2023-12-19_alphv-seizure-warrant,
  fetched live via the justice.gov /media/1329536/dl endpoint); and DAG Monaco's strategic-purpose
  statement "We will continue to prioritize disruptions and place victims at the center of our strategy
  to dismantle the ecosystem fueling cybercrime" (the attested basis for the NCS-2023
  Disrupt-and-Dismantle link). The release does NOT carry the Dec 7 outage date, the "unseizure", or the
  retaliation arc — those claims are carried by the BleepingComputer / CISA AA23-353A / Krebs sources.
