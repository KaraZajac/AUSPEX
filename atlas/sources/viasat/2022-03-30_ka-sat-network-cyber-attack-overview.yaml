notes: |
  Viasat's own incident overview of the 24 February 2022 KA-SAT
  cyberattack. Added during the 2026-07-10 audit of event
  2022-02/viasat-ka-sat-acidrain (badrabbit-model re-source: the
  operator's statement is the primary carrier for the modem-scale
  figure and the intrusion vector, which neither the EU declaration
  nor SentinelLabs states in those terms).

  AUDIT (2026-07-10, claude-opus-4.8/max): raw HTML captured (HTTP 200,
  217 KB; live URL redirects news.viasat.com -> www.viasat.com
  /perspectives/corporate/2022/...) and SHA-256 hashed. Publication
  date 2022-03-30 per SentinelLabs ("On Wednesday, March 30th, 2022,
  Viasat finally released a statement"); the page carries no
  machine-readable date. Load-bearing quotes verbatim:
    - Scale: "the cyber-attack did impact several thousand customers
      located in Ukraine and tens of thousands of other fixed broadband
      customers across Europe."
    - Vector: "a ground-based network intrusion by an attacker
      exploiting a misconfiguration in a VPN appliance to gain remote
      access to the trusted management segment of the KA-SAT network.
      The attacker moved laterally ... to ... a large number of
      residential modems simultaneously."
    - Recoverability: destructive commands "overwrote key data in flash
      memory on the modems, rendering the modems unable to access the
      network, but not permanently unusable."
    - "The residential broadband modems affected use the 'Tooway'
      service brand."
