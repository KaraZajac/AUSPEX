notes: |
  Ionut Arghire, 2025-10-01 (datePublished 2025-10-01T09:25:59Z
  verified). Reports Broadcom failed to disclose active zero-day
  exploitation in its CVE-2025-41244 (CVSS 7.8) advisory; relays
  NVISO's attribution to "a Chinese state-sponsored threat actor
  tracked as UNC5174" that "has been exploiting the bug for a
  year," and notes UNC5174 was recently linked to an attack on
  SentinelOne. No MSS / Mandiant attribution in the text.
