  The aviation-wave pivot (Hawaiian Airlines, WestJet) and the FBI's
  airline-sector warning — with the airline attributions explicitly
  hedged.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed.
  Verbatim (load-bearing hedges): Mandiant observed "multiple incidents
  … which resemble the operations of UNC3944 or Scattered Spider. We
  are still working on attribution." WestJet (reported earlier in June)
  is "likely the work of the cybercrime group." Hawaiian Airlines
  (reported to the SEC in late June): "It's unclear whether Scattered
  Spider is behind the Hawaiian Airlines hack." FBI warning issued over
  the preceding weekend that Scattered Spider had expanded targeting to
  the airline sector.
