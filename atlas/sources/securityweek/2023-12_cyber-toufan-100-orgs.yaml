notes: |
  SecurityWeek coverage of the Cyber Toufan November 2023 wave
  affecting approximately 100 Israeli organizations via the
  Signature-IT hosting-provider single-pivot compromise.
  Documents the Shred-based Linux wiper tradecraft and the
  organizational target list (Israel Innovation Authority,
  Ministry of Welfare and Social Security, Ministry of Health,
  Toyota Israel, IKEA Israel, Radware, etc.).
  AUDIT (2026-06-24, claude-opus-4.8/max): cited for the ir/mois/cyber-toufan service-placement
  audit. Attributes Cyber Toufan to Iran at the state level only — names NO service (no MOIS/IRGC):
  "The group's tactics suggest that Cyber Toufan is likely sponsored by a government, with evidence
  pointing to potential Iranian involvement, Check Point reported in early December." The ICT is
  quoted that the activity "strongly suggest[s] support from a nation-state, with indications
  pointing towards Iran as the likely supporter." The persona self-styles as "Palestinian state
  cyber warriors." Supports the demotion ir/mois/cyber-toufan → ir/unscoped/cyber-toufan.
