  200 with a browser User-Agent. Verbatim support:
   - "Schneider Electric's Sustainability Business division is
     dealing with a ransomware attack that also appears to have
     resulted in a data breach, the French industrial giant said on
     Monday."
   - "the incident is limited to its Sustainability Business
     division, which it has described as an 'autonomous entity
     operating its isolated network infrastructure'."
   - "the cyberattack has impacted Resource Advisor and other
     systems used by the targeted division, but it expects access to
     business platforms and operations to resume within two business
     days."
   - "The attack was discovered on January 17 and the company's
     investigation is ongoing, but some evidence suggests that the
     hackers have accessed data, including customer information."
   - "Bleeping Computer reported that the Cactus ransomware group is
     behind the attack. However, the group has yet to list Schneider
     Electric on its Tor-based leak website."
   - Stephen Robinson (WithSecure): "Schneider Electric is yet to
     confirm if the Cactus ransomware brand were responsible for the
     attack, and they have not as yet been listed on the groups leak
     site ..."
