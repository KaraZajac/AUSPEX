notes: |
  Contemporaneous coverage (Brian Prince, 2013-06-27) of Symantec's
  "Four Years of DarkSeoul" report. Records that Symantec's
  attribution was to the "DarkSeoul" crew (an activity-cluster) —
  it named NO nation and did not use "Lazarus" or "Andariel". Used
  in the event to source the activity-cluster level of the Symantec
  attribution and to fence the June-25 tools (Castov/Castdos) off
  from the March-20 wiper. Snapshotted + hashed 2026-07-05 (curl 200,
  158007 bytes; datePublished 2013-06-27T16:14:23+00:00 confirmed in
  raw); archive.org unreachable this session — raw_snapshot is the
  archive.
