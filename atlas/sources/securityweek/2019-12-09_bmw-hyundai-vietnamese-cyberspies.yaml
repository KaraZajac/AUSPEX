  verified. Verbatim: "hackers gained access to BMW systems in the spring of
  2019, but the German carmaker decided to monitor the attackers' activities
  and only took the impacted devices offline one week ago. There is no
  evidence that the hackers gained access to the company's main data center
  in Munich and it's unlikely that they obtained any sensitive information";
  "the attackers leveraged Cobalt Strike"; "The same campaign also allegedly
  targeted South Korean carmaker Hyundai"; "BR reported that the main suspect
  in the attacks on BMW and Hyundai is OceanLotus, a Vietnam-linked threat
  group also tracked as APT32."
