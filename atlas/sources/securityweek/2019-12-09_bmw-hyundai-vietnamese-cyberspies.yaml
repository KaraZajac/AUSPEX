notes: |
  SecurityWeek's summary of the BR (Bayerischer Rundfunk) report: hackers
  gained access to BMW systems in spring 2019; BMW chose to monitor the
  attackers and only took the impacted devices offline "one week ago." No
  evidence the attackers reached BMW's main Munich data center; unlikely
  they obtained sensitive information. The attack reportedly involved a fake
  BMW Thailand website and leveraged Cobalt Strike. Same campaign also
  targeted Hyundai. BR named the main suspect as OceanLotus / APT32, a
  Vietnam-linked group. Created 2026-06-30 to re-source event
  2019-03/apt32-bmw-hyundai off the phantom br-ndr/2019-12-06 record.
