   - "751,895 individuals were affected by the incident"
   - the notice states attackers exfiltrated "names, other personally
     identifiable information, and Social Security numbers"; "the company does
     not believe that financial information was affected"
   - "On June 1, the RansomHub ransomware gang added Frontier Communications to
     its Tor-based leak site, claiming the theft of 5GB of data, including the
     names, addresses, email addresses, dates of birth, phone numbers, and
     Social Security numbers of over two million people."
   - Frontier is offering 12 months of free credit monitoring and identity-theft
     services.
  KEY figure: 751,895 NOTIFIED individuals (official) vs RansomHub's >2M CLAIM.
