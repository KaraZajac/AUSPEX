notes: |
  Secondary corroboration of the Securonix Cosmos Bank report.
  AUDIT (2026-07-01, claude-opus-4.8/max): raw captured (curl,
  HTTP 200, 168,738 bytes). Confirms "$13.5 million" loss,
  "theft took place between August 10 and 13, 2018", the
  "malicious switch" authorizing "ATM withdrawals for over $11.5
  million ... using 450 cloned (non-EMV) debit cards in 28
  countries", "three international wire transfer requests to ALM
  Trading Limited at Hang Seng Bank in Hong Kong, amounting to
  around $2 million", and "Believed to be backed by the North
  Korean government, the Lazarus group" attribution.
