notes: |
  AUDIT 2026-07-02 (claude-opus-4.8 / max): corroborating journalism for
  event 2023-11/yamaha-motor-philippines-inc-ransom. Confirms Yamaha Motor
  Philippines (the company's motorcycle manufacturing and sales subsidiary)
  as victim, the October 25 2023 attack, the November 16 2023 confirmation
  of compromised personal information, and that "the INC Ransom gang has
  claimed responsibility for the incident" and "published on its leak site
  data allegedly stolen from Yamaha Motor Philippines" — Yamaha itself did
  not name the group. Incident contained to the subsidiary; no impact to
  the wider Yamaha Motor group.
