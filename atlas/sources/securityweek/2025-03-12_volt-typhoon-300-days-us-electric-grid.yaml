notes: |
  SecurityWeek (Eduard Kovacs) coverage of the Dragos LELWD case
  study, carrying dwell-time, date, and intent details Dragos
  shared directly with SecurityWeek that are NOT in the public
  case-study PDF.
  AUDIT (2026-07-02, claude-opus-4.8/max): created to carry the load-bearing facts the Dragos
  case-study PDF omits, for event 2023-11/lelwd-volt-typhoon-discovery. Raw snapshot captured +
  hashed (200 OK, 165,845 bytes). Verbatim: "Dragos said the LELWD breach was discovered in
  November 2023, just before Thanksgiving, and an investigation showed that the hackers had been
  in the organization's network since February 2023, for more than 300 days." Intent (Dragos
  quoted): "the adversary not only aimed to maintain persistent access to the victim's environment
  for a long tenure, but also were aiming to exfiltrate specific data related to OT operating
  procedures and spatial layout data relating to energy grid operations ... This information can be
  pivotal for helping the adversary know exactly where to attack when, or if, they decide to
  utilize a Stage 2 capability." Attribution: "an intrusion attributed to the notorious Chinese
  threat actor Volt Typhoon ... which the company tracks as Voltzite"; target "Littleton Electric
  Light and Water Departments (LELWD), a small public power utility in Massachusetts." Confirms the
  case study was published Wednesday 2025-03-12.
