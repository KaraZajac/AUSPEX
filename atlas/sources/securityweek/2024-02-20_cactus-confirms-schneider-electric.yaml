  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured +
  sha256 verified (166,393 bytes, 97824deb…eb855923); fetched HTTP
  200 with a browser User-Agent. Verbatim support:
   - "The Cactus ransomware gang has claimed responsibility for the
     cyberattack that French industrial giant Schneider Electric
     disclosed at the end of January."
   - "The incident, the company said at the time, was discovered on
     January 17 and only impacted its Sustainability Business
     division, resulting in severed access to Resource Advisor and
     other systems used by the division."
   - "Schneider Electric has since updated its incident notification
     to say that it has restored access to the impacted systems and
     that the attackers exfiltrated certain Sustainability Business
     data."
   - "Initial reports suggested that the Cactus ransomware group
     might have orchestrated the attack, and the suspicions have
     been confirmed, after the gang listed the French giant on its
     Tor-based leak website."
   - "According to Cactus, roughly 1.5 terabytes of data were
     exfiltrated from Schneider Electric's systems."
   - "The ransomware gang has published a small set of allegedly
     stolen data, including copies of passports and non-disclosure
     agreements, and is threatening to make it all public unless a
     ransom is paid."
