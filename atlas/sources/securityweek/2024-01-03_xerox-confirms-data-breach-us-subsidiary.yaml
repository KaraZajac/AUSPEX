notes: |
  AUDIT 2026-07-04 (claude-fable-5 / max): corroborating journalism for
  event 2023-12/xerox-inc-ransom. Verbatim from the snapshot: "Printing
  solutions giant Xerox over the weekend confirmed that its US-based
  subsidiary Xerox Business Solutions experienced a data breach.";
  "Xerox shared no details on the type of cybersecurity incident its
  subsidiary fell victim to, but the ransomware gang known as Inc Ransom
  was quick to claim responsibility for the attack."; "On December 30,
  the group listed Xerox on its Tor-based leak site, posting screenshots
  of documents allegedly stolen from the company, as proof of
  intrusion."; "Since then, however, the entry was taken down, suggesting
  that Xerox might have engaged in communication with the attackers, to
  prevent the stolen data from being published online." Links the Xerox
  newsroom incident notice (the primary source record). NB: dates the
  leak-site listing December 30, vs BleepingComputer's December 29.
