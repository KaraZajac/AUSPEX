notes: |
  Google TAG report documenting APT42 (IRGC) phishing-campaign
  tempo surge against Israeli and US targets between February
  and late July 2024. AUDIT 2026-07-10 (claude-opus-4.8/max):
  STRIPPED a fabricated figure — the prior note's "peaking at
  approximately 45 campaigns per day against Israeli targets"
  does NOT appear in the raw (0 hits for "45"/"per day"). TAG's
  actual quantification: "Between February and late July 2024,
  APT42 heavily targeted users in Israel and the U.S."; "the
  U.S. and Israel accounted for roughly 60% of APT42's known
  geographic targeting"; and abuse of Google Sites "in more than
  50 similar campaigns". APT42 abused Google (Sites, Drive,
  Gmail), Dropbox and OneDrive for malware-hosting and phishing-
  page delivery. Companion vendor source to the August 19 ODNI
  joint statement and the September 27 DOJ trio indictment.
