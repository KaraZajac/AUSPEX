notes: |
  Google TAG report documenting APT42 (IRGC) phishing-campaign
  tempo surge against Israeli and US targets between February
  and late July 2024 — peaking at approximately 45 campaigns
  per day against Israeli targets. APT42 abused Google Sites,
  Drive, Gmail, Dropbox, OneDrive for malware-hosting and
  phishing-page delivery. Companion vendor source to the August
  19 ODNI joint statement and the September 27 DOJ trio
  indictment.
