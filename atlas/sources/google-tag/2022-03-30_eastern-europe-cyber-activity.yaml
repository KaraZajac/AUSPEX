notes: |
  Google TAG disclosure of post-invasion cyber activity targeting
  Ukrainian, Polish, and other Eastern European users. Covers
  Sandworm (FANCYBEAR), COLDRIVER (FSB Center 18), Ghostwriter
  (UNC1151), CURIOUS GORGE (PLA SSF), and Mustang Panda activity
  against Ukrainian and EU-government targets. Notably tracked
  COLDRIVER credential-phish against UK-based NGOs and European
  defense think tanks during the invasion's first weeks. Provides
  foundational public TAG documentation of the post-invasion
  Eastern European threat picture.
