notes: |
  Google TAG disclosure (Mar 30 2022) of post-invasion cyber
  activity in Eastern Europe. This bulletin covers exactly three
  named clusters over "the past two weeks": Curious Gorge (TAG
  attributes to China's PLA SSF) against government/military orgs
  in Ukraine, Russia, Kazakhstan and Mongolia; COLDRIVER (aka
  Calisto, described only as a "Russian-based threat actor")
  credential-phishing several US-based NGOs and think tanks, the
  military of a Balkans country, a Ukraine-based defense
  contractor, and — for the first time — the military of multiple
  Eastern European countries plus a NATO Centre of Excellence; and
  Ghostwriter (a "Belarusian threat actor") adopting the
  Browser-in-the-Browser technique in Ukraine-focused credential
  phishing.
