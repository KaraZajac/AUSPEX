notes: |
  Google TAG (Shane Huntley) first-party disclosure covering three
  clusters "over the past two weeks": FancyBear/APT28 (attributed to
  Russia's GRU) credential-phishing ukr.net users; Ghostwriter/UNC1151
  ("a Belarusian threat actor") credential-phishing Polish and Ukrainian
  government and military; and Mustang Panda/Temp.Hex (China) targeting
  European entities with Ukraine-invasion lures. Only the Ghostwriter/
  Belarus portion is load-bearing for the citing event.

  AUDIT (2026-07-10, claude-opus-4.8/max): raw snapshot captured (sha256
  3841801f…7080139b, 367,910 B). CORRECTIONS vs prior record:
  (1) DATE — published_on 2022-02-28 -> 2022-03-07. The live page and the
      captured snapshot both carry article:published_time / datePublished
      = "2022-03-07T16:31:00+00:00"; there was NO 28 Feb 2022 Google TAG
      post. The id-slug still reads "2022-02-28" and is KEPT for FK
      stability (cf. the mandiant/2021-04-28 stable-slug precedent).
  (2) TITLE — "...— Ukraine pre- and post-invasion" (editorialized) ->
      the actual headline "An update on the threat landscape."
  (3) TIER — secondary -> primary (Google's own first-party TAG research
      blog; matches the sibling google-tag/2022-03-30 primary record).
  Load-bearing verbatim quote (from the captured raw):
    • "Ghostwriter/UNC1151, a Belarusian threat actor, has conducted
      credential phishing campaigns over the past week against Polish and
      Ukrainian government and military organizations."
  Webmail providers the campaign targeted (verbatim list): i.ua, meta.ua,
  rambler.ru, ukr.net, wp.pl, yandex.ru. Note the post attributes the
  ukr.net targeting to FancyBear/APT28 (Russia GRU) — a SEPARATE actor
  from Ghostwriter; do not conflate.

