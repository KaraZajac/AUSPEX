notes: |
  Google TAG quarterly bulletin documenting coordinated influence
  operations Google enforced against in Q2 2023. Includes
  PUSHCHA / Ghostwriter (UNC1151) takedowns of Belarus-linked
  domains pushing pro-Lukashenko / pro-invasion narratives across
  Polish and Lithuanian audiences during the early-2023 information
  cycle. AUSPEX uses this as the primary anchor for the 2023
  GhostWriter information-operations continuation.
