notes: |
  AUDIT (2026-07-02, claude-fable-5/max) — ORPHANED / WRONG-SOURCE. This record's prior
  notes claimed the bulletin "Includes PUSHCHA / Ghostwriter (UNC1151) takedowns of
  Belarus-linked domains pushing pro-Lukashenko / pro-invasion narratives across Polish and
  Lithuanian audiences." That is FALSE and is retracted. The live page (real "TAG Bulletin:
  Q2 2023"; snapshot sha256 da7d8e5e…42978eeb, 365,938 bytes) contains ZERO mentions of
  Ghostwriter, PUSHCHA, UNC1151, Belarus, Poland/Polish, Lukashenko, or "invasion" anywhere
  across its full April/May/June coordinated-influence-operation list. Its only Lithuania item
  is an April YouTube/Ads takedown of a campaign "linked to Lithuania ... sharing content in
  Lithuanian that was supportive of Russia and critical of Ukraine, NATO and the EU" — a
  Lithuania-ORIGIN influence op with no Ghostwriter / PUSHCHA / Belarus nexus, not an intrusion.
  This source was cited by exactly one event — 2023-04/ghostwriter-pushcha-polish-lithuanian-info-ops
  — as a mis-anchor; that event has been RE-SOURCED to the genuine report
  (recorded-future/2023-04-19_ghostwriter-poland-brigade-disinfo). This record is now ORPHANED
  (no event cites it): retain as a legitimate Q2-2023 TAG bulletin record (e.g. for the
  Lithuania-origin YouTube op, if ever ingested) or retire — orchestrator's call. NB the slug
  date 2023-04-19 is spurious for this bulletin (it coincides with the Recorded Future article
  that was the real source); slug left unchanged per the stable-slug rule.
  Prior (RETRACTED) description: "Google TAG quarterly bulletin ... Includes PUSHCHA /
  Ghostwriter (UNC1151) takedowns ... pro-Lukashenko / pro-invasion narratives across Polish
  and Lithuanian audiences ... primary anchor for the 2023 GhostWriter IO continuation."
