notes: |
  Google TAG May 3, 2022 update on cyber activity targeting
  Ukrainian and EU users following the invasion. AUSPEX uses this as
  the second TAG bulletin in the invasion-phase cadence (the first
  being March 30, 2022).
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured +
  hashed. CORRECTED prior notes — the article as published does NOT
  mention COLDRIVER, Turla, Curious Gorge, US defense contractors,
  or military officials, nor APT28 targeting of Gmail government
  accounts. The bulletin actually documents: FancyBear/APT28
  ("attributed to Russia GRU") running several large credential-
  phishing campaigns against ukr.net users (UkrNet = a Ukrainian
  media company) via compromised non-Google accounts and Blogspot
  redirect landing pages; Ghostwriter/UNC1151 (Belarusian) phishing
  Polish and Ukrainian government + military orgs; Mustang Panda /
  Temp.Hex (China-based) targeting European entities with Ukraine-
  invasion lures; and DDoS attempts. The earlier note's COLDRIVER /
  US-defense description was a conflation with the March 30, 2022
  and July 19, 2022 TAG bulletins.
