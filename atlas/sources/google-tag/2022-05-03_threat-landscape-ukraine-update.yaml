notes: |
  Google TAG May 2022 update on cyber activity targeting Ukrainian
  and EU users following the invasion. Documents continued APT28
  (FANCYBEAR) credential-phish operations against Ukrainian media
  and government Gmail accounts, COLDRIVER (FSB) phishing of
  US-based defense contractors and military officials, and
  Ghostwriter / TURLA / Curious Gorge / Mustang Panda parallel
  activity. AUSPEX uses this as the second TAG bulletin in the
  invasion-phase cadence (the first being March 30, 2022).
