notes: |
  Eurojust press release on the international takedown of Genesis
  Market — the operation "referred to by law enforcement agencies as
  Operation Cookie Monster" (the operation name is absent from the
  Europol release, so this is the load-bearing source for the event
  name).

  AUDIT 2026-07-02 (claude-opus-4.8/max): raw snapshot captured +
  hashed. Verbatim: "Since its inception in 2018, Genesis Market was
  one of the largest facilitators of cybercrime. Its main criminal
  commodity was digital identities"; bots were "packages of stolen
  credentials harvested from infected computers around the world ...
  through malware deployments and account takeover attacks"; "As part
  of the coordinated effort referred to by law enforcement agencies
  as Operation Cookie Monster, on 4-5 April, more than 100 suspects
  were arrested and 200 property searches were conducted in 13
  countries"; "At the time of the takedown, Genesis Market was
  advertising for sale account credentials stolen from approximately
  460,000 computer devices"; "As of today, visitors to the Genesis
  Market website see this page" (the law-enforcement seizure page).
  Names the U.S. FBI, the Dutch authorities, Europol and Eurojust
  (judicial coordination; Eurojust hosted a command centre on 4
  April).
