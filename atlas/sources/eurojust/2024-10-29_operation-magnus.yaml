notes: |
  Dutch-led operation against RedLine and META infostealer
  infrastructure. Takedown of three servers in the Netherlands +
  two domains seized; "over 1 200 servers in dozens of countries
  were running the malware." Partners named in the release:
  Netherlands (National Police, Team Cybercrime Limburg, Public
  Prosecution Service), US (FBI, NCIS, IRS-CI, DoD-CIS, Army CID),
  Belgium (Federal Prosecutor + Federal Police), Portugal (Polícia
  Judiciária), UK (National Crime Agency), Australia (AFP).

