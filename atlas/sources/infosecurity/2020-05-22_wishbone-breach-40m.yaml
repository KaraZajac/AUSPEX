  Infosecurity Magazine (Phil Muncaster) coverage of the May 2020
  Wishbone breach. Corroborating secondary for the standalone event
  2020-05/wishbone-shinyhunters. article:published_time
  2020-05-22T09:15:00. Verbatim support:
  - ShinyHunters "posted the data to RaidForums, claiming that,
    'since people are starting to resell wishbone we've decided to
    leak it for free.'" (names the forum + free-leak motive)
  - exposed fields "usernames, email addresses, mobile numbers,
    gender, date-of-birth, Facebook and Twitter access tokens,
    MD5-hashed passwords and more."
  - "the stolen passwords were in MD5 format, a weak form of
    password hashing which can be decoded by malicious actors and
    therefore monetized" (MD5 -- matches Forbes/ZDNET consensus,
    not ZeroFox's SHA1).
