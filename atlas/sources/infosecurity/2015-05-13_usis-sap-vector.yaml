  Verbatim support in snapshot:
   - "Onapsis Research Labs analysis finds that the breach most likely
     utilized an SAP attack vector that Onapsis has been tracking in
     the wild" / "This marks the first time an SAP attack against a
     national security service provider has been publicly uncovered."
   - "The USIS attackers likely exploited either an unpatched or
     zero-day SAP vulnerability externally in order to access the
     company network; and once inside the network, they used it to
     pivot to other systems." (vector = SAP; n-day-vs-0-day is hedged.)
   - "'Attackers were able to access the USIS network in late 2013 but
     weren't discovered until June 2014,' Abraham said." (Onapsis
     researcher Sergio Abraham) — carries start (~late 2013) +
     detection (June 2014).
   - "Last fall, it came to light that Chinese hackers had roamed
     around unnoticed for months inside the network of USIS, the
     biggest commercial provider of background investigations to the
     federal US government." (China attribution as press framing.)
