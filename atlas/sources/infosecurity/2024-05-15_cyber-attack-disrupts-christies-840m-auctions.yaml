  Verbatim from the snapshot:
   - the auctions are worth an "estimated $840m. Among the items up for auction
     are a Vincent van Gogh painting valued at $35m and a rare wine."
   - "The cyber-attack has taken Christie's website offline … preventing
     potential buyers from viewing the lots online."
   - "the auction house says bids can still be placed through phone and
     in-person channels."
   - "the sale of a collection of rare watches, including those owned by
     Formula 1 star Michael Schumacher, has been delayed."
   - CEO "Guillaume Cerutti, shared the news of the attack on LinkedIn".
