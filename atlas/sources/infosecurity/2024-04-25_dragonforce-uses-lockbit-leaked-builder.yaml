notes: |
  Establishes that DragonForce is a SEPARATE ransomware operation that
  built on LockBit's LEAKED builder — NOT a LockBit rebrand. Created +
  snapshotted 2026-07-05 during the full-census RE-SOURCE of event
  2025-02/lockbit-bashe-reconstitution, which had wrongly framed
  DragonForce as a "LockBit rebrand attempt."

