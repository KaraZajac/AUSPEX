  og:title "DragonForce Ransomware Group Uses LockBit's Leaked
  Builder"). Verbatim support in snapshot:
   - "A new strain of ransomware called DragonForce has been observed
     using a leaked ransomware builder from the infamous LockBit
     ransomware group."
   - "Cyble Research & Intelligence Labs (CRIL) concluded that
     DragonForce has been leveraging the leaked builder to develop its
     own toolset after observing striking similarities in the code
     structure and functions of its ransomware payload and LockBit
     Black." (a code-reuse lineage, distinct from a rebrand.)
