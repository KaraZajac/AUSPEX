notes: |
  Microsoft Threat Intelligence disclosure of a CyberLink
  software supply-chain compromise by Diamond Sleet
  (Microsoft taxonomy for the Lazarus / ZINC cluster).
  Trojanized CyberLink installer distributed via
  legitimate update infrastructure; affected machines
  across 100+ countries spanning multiple sectors. First
  major Microsoft-attested DPRK supply-chain compromise
  of a Taiwan-headquartered software vendor.
