notes: |
  Microsoft Threat Intelligence disclosure of a CyberLink
  software supply-chain compromise by Diamond Sleet
  (Microsoft taxonomy for the Lazarus / ZINC cluster).
  Trojanized CyberLink installer distributed via
  legitimate update infrastructure; impacted over 100
  devices in multiple countries (Japan, Taiwan, Canada,
  US). First major Microsoft-attributed DPRK supply-chain
  compromise of a Taiwan-headquartered software vendor.

  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshotted
