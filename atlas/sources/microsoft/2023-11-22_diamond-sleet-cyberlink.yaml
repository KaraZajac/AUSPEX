  countries spanning multiple sectors" note: source says
  "over 100 DEVICES in multiple countries, including Japan,
  Taiwan, Canada, and the United States" and gives no
  per-victim sector breakdown (group's general industries =
  media/defense/IT). No WMD/revenue/crypto claim in source.
