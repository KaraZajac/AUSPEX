notes: |
  MSTIC/DART technical + attribution report on the July 15, 2022
  destructive attack on the Albanian government. ADDED 2026-07-10
  (claude-opus-4.8/max) during the audit of event
  2022-07/albania-homeland-justice to source-carry load-bearing facts
  the co-cited Treasury/CISA pair omit: the July-15 attack date, the
  May-2021 initial access via CVE-2019-0604, the ZeroCleare wiper
  lineage, and the MEK-retaliation motive. Fetched live HTTP 200
  (338,982 bytes); raw microsoft__2022-09-08_mstic-albania.html, sha256
  cbb18919…2026c5e8. datePublished "September 8, 2022".

  ATTRIBUTION (layered): "Microsoft assessed with high confidence that
  on July 15, 2022, actors sponsored by the Iranian government conducted
  a destructive cyberattack against the Albanian government, disrupting
  government websites and public services." The MOIS nexus is only
  MODERATE confidence, via EUROPIUM: "Microsoft assessed with moderate
  confidence that the actors involved in gaining initial access and
  exfiltrating data … are linked to EUROPIUM, which has been publicly
  linked to Iran's Ministry of Intelligence and Security (MOIS)." Tracks
  phases as DEV-0842 (ransomware + wiper), DEV-0861 (initial access +
  exfil), DEV-0166 (exfil), DEV-0133 (probing). So MSTIC's firm level is
  nation ("the Iranian government"); the MOIS unit is moderate — the
  unequivocal MOIS attribution rests on the co-cited Treasury release.

  INITIAL ACCESS: "DEV-0861 … likely gained access to the network of an
  Albanian government victim in May 2021 by exploiting the CVE-2019-0604
  vulnerability on an unpatched SharePoint Server, administrata.al";
  exfiltrated mail Oct 2021 – Jan 2022. MALWARE: ransomware GoXml.exe
  (Ransom:Win32/Eagle) distributed via Mellona.exe, then wiper cl.exe
  using "the same license key and EldoS RawDisk driver as ZeroCleare";
  ransom note How_To_Unlock_MyFiles.txt "written in Albanian"; "less
  than a 10% total impact on the customer environment."

  MOTIVE (MEK / regime-preservation): "Tehran likely used the attacks as
  retaliation for cyberattacks Iran perceives were carried out by Israel
  and the Mujahedin-e Khalq (MEK), an Iranian dissident group largely
  based in Albania that seeks to overthrow the Islamic Republic of Iran";
  the MEK "was the primary target"; ransom image "why should our taxes
  be spent on terrorists of Durres" (the MEK camp in Durrës); timing
  "one week ahead of the MEK-sponsored Free Iran World Summit."
  PERSONA-LAUNDERING + IO: "Homeland Justice, the group overtly pushing
  messages and leaking data linked to the attack"; "a broad-based
  information operation aimed at amplifying the impact of the attack."
  FALSE-FLAG: mirrored messaging "reduces the likelihood that the attack
  was a false flag operation by a country other than Iran."

  NB — does NOT name the "e-Albania" portal or the "TIMS / Total
  Information Management System" border system (says generically
  "government websites and public services"); MSTIC predates the
  September-2022 second wave and the diplomatic rupture and does not
  cover them.
