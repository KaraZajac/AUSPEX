notes: |
  MSTIC's technical companion to Tom Burt's "The hybrid war in Ukraine" blog, released
  the same day (2022-04-27). This is the report that carries the actor-cluster and
  malware-family specifics the blog only summarised: it names at least six Russia-aligned
  nation-state actors — IRIDIUM (Sandworm, GRU), STRONTIUM (Fancy Bear / APT28, GRU),
  NOBELIUM (the SolarWinds actor / APT29), DEV-0586 (WhisperGate, GRU-affiliated),
  ACTINIUM (Primitive Bear / Gamaredon), and others — and destructive malware families
  including WhisperGate, FoxBlade/HermeticWiper, CaddyWiper, Industroyer2 and
  IsaacWiper/Lasainraw. Scope: "no less than 237" operations and 38 discrete destructive
  attacks, 23 Feb–8 Apr 2022.
  AUDIT 2026-07-01 (claude-opus-4.8/max): the canonical primary is the CMS binary PDF
  (RE4Vwwd), which is bot-walled to this fetcher (returns a placeholder image, not the
  document). The raw_snapshot hashed here is Microsoft's own live Security Insider web
  edition of the report (first-party, reachable) — NOTE that web edition has since been
  rewritten and no longer prints the codename/malware tables. The codename-level
  attributions (STRONTIUM/IRIDIUM/NOBELIUM/DEV-0586) and the "HermeticWiper/CaddyWiper/
  Industroyer2 attributed to Sandworm/Iridium with MODERATE confidence" line are therefore
  corroborated across reachable tier-1/2 mirrors quoting the original PDF: The Hacker News
  (thehackernews.com/2022/04/microsoft-documents-over-200.html), BleepingComputer, and
  Malwarebytes Labs. Created during the event audit of
  2022-04/microsoft-hybrid-war-special-report to carry that event's multi-cluster
  attribution, which the blog alone does not support.
