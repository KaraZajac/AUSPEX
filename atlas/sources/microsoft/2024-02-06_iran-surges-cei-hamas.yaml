notes: |
  AUDIT 2026-07-04 (claude-opus-4.8/max): first-party MTAC biannual Iran
  report — the technical companion to the "On the Issues" announcement blog
  (microsoft/2024-02-06_iran-chaotic-start). Added during event audit because
  this report, and NOT the blog, carries the group's Microsoft tracking
  designator: verbatim "On October 18, the IRGC's Shahid Kaveh Group, which
  Microsoft tracks as Storm-0784, used customized ransomware to conduct
  cyberattacks against security cameras in Israel. It then used one of its
  cyber personas, 'Soldiers of Solomon,' to falsely claim it had ransomed
  security cameras and data at Nevatim Air Force Base." Also corroborates the
  surge tempo: "Microsoft Threat Intelligence tracked nine Iranian groups
  active in targeting Israel; that number grew to 14 groups by day 15."
  Snapshot captured 2026-07-04; both /threat-landscape/ and
  /intelligence-reports/ paths 200-redirect to the same canonical URL.
