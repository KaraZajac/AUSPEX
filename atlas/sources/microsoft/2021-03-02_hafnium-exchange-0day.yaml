notes: |
  The origin disclosure of the ProxyLogon compromise. MSTIC names the
  actor HAFNIUM and the four zero-days, and provides the downstream
  target set that the event's outcome_summary reproduces.

  AUDIT (2026-07-10, claude-opus-4.8/max): added as the load-bearing FACTS
  source for event 2021-03/exchange-proxylogon-hafnium (the pre-existing
  White House + ODNI cited sources carry the MSS attribution but NOT the
  CVEs / web-shell tradecraft / target list). Snapshot HTTP 200, sha256
  above. Carries verbatim: actor name "HAFNIUM" (48x); the four CVEs —
  "CVE-2021-26855 is a server-side request forgery (SSRF) vulnerability",
  "CVE-2021-26857 is an insecure deserialization vulnerability in the
  Unified Messaging service", "CVE-2021-26858 ... arbitrary file [write]"
  and "CVE-2021-27065" (post-authentication arbitrary file write); ASPX
  web shells ("aspx" 16x); post-exploitation tooling Procdump, Nishang,
  PowerCat; LSASS credential theft; exfil to MEGA; and the nation+actor
  framing "assessed to be state-sponsored and operating out of China,
  based on observed victimology, tactics and procedures" (named-actor:
  Hafnium + nation China). Target-set sentence verbatim: "including
  infectious disease researchers, law firms, higher education
  institutions, defense contractors, policy think tanks, and NGOs."
