notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw HTML captured + hashed (live fetch, 306 KB,
  title matches). Source fully supports the event. ATTRIBUTION — Microsoft attributes the
  activity to "Peach Sandstorm," which it calls an "Iranian nation-state threat actor"; it does
  NOT name the IRGC (0 occurrences of IRGC / Revolutionary Guard / MOIS / any Iranian service in
  the report). Confidence is stated as an assessment ("Microsoft assesses ... likely"); level is
  nation + named actor (Iran; explicit overlap with APT33/Elfin/Refined Kitten), NOT named-unit.
  Verbatim:
  "Since February 2023, Microsoft has observed password spray activity against thousands of
  organizations carried out by an actor we track as Peach Sandstorm (HOLMIUM). Peach Sandstorm is
  an Iranian nation-state threat actor who has recently pursued organizations in the satellite,
  defense, and pharmaceutical sectors around the globe. Based upon the profile of victim
  organizations targeted and the observed follow-on intrusion activity, Microsoft assesses that
  this initial access campaign is likely used to facilitate intelligence collection in support of
  Iranian state interests."
  "Activity that Microsoft attributes to Peach Sandstorm overlaps with public reporting on groups
  known as APT33, Elfin, and Refined Kitten."
  Facts corroborated verbatim: "Between February and July 2023" timeframe; password spray against
  "thousands of organizations"; exploitation of CVE-2022-47966 (Zoho ManageEngine) and
  CVE-2022-26134 (Confluence); post-compromise use of AzureHound, ROADtools, AnyDesk, the custom
  EagleRelay tunnel, and Azure Arc persistence; targeting of "the satellite, defense, and to a
  lesser extent, pharmaceutical sectors."
