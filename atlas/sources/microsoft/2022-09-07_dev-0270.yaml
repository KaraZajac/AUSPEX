notes: |
  Microsoft analysis of DEV-0270 / Nemesis Kitten ransomware operations as a sub-group of
  PHOSPHORUS / Mint Sandstorm.

  Supporting quote: "Microsoft threat intelligence teams have been tracking multiple ransomware
  campaigns and have tied these attacks to DEV-0270, also known as Nemesis Kitten, a sub-group of
  Iranian actor PHOSPHORUS. Microsoft assesses with moderate confidence that DEV-0270 conducts
  malicious network operations ... on behalf of the government of Iran. However, judging from their
  geographic and sectoral targeting, which often lacked a strategic value for the regime, we assess
  with low confidence that some of DEV-0270's ransomware attacks are a form of moonlighting for
  personal or company-specific revenue generation." Contractor naming: "Secnerd (secnerd[.]ir) and
  Lifeweb (lifeweb[.]ir) ... These organizations are also linked to Najee Technology Hooshmand ...
  located in Karaj, Iran."

  AUDIT (2026-06-24, claude-opus-4.8/max): Raw captured + hashed; live URL resolves and matches the
  citation (HTTP 200, 308 KB). SERVICE FINDING: this source attributes DEV-0270 to "the government of
  Iran" at MODERATE confidence as "a sub-group of Iranian actor PHOSPHORUS" and names NO Iranian
  service — verbatim search of the article body returns 0 hits for "IRGC", "Revolutionary Guard",
  "MOIS", and "Ministry of Intelligence". It therefore does NOT substantiate the former
  ir/irgc/black-shadow placement (the prior note's "(IRGC)" gloss was an editorial inference, not in
  the source). IDENTITY FINDING: the string "Black Shadow" appears 0 times in this source — it profiles
  DEV-0270/Nemesis Kitten/Cobalt Mirage (the Najee Technology / Secnerd ransomware contractor), a
  distinct cluster from the Israeli "Black Shadow" hack-and-leak persona. This drove the actor demote
  ir/irgc/black-shadow -> ir/unscoped/black-shadow and the "disputed"-confidence DEV-0270/Storm-0270
  aliases on that record.
