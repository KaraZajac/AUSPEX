notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): raw captured + hashed; live re-fetch reproduced
  a byte-identical SHA-256, so the snapshot is authentic. Source is the Microsoft Security
  blog post accompanying the two MSTIC CYBERWARCON 2024 talks (dated "November 22, 2024").
  Supports the Sapphire Sleet facts verbatim: "The North Korean threat actor that Microsoft
  tracks as Sapphire Sleet has been conducting cryptocurrency theft ... since at least 2020 ...
  over 10 million US dollars' worth of cryptocurrency was stolen ... from multiple companies
  over a six-month period"; VC-impersonation with a frozen-meeting lure delivering "a .scpt
  file (Mac) or a Visual Basic Script (.vbs) file (Windows)"; and a secondary LinkedIn
  "recruiter" / "skills assessment" lure. ATTRIBUTION CAVEAT: the post attributes only at the
  NATION level ("North Korean threat actor"); it never names the Reconnaissance General Bureau
  (0 occurrences) and never equates Sapphire Sleet with APT38/BlueNoroff — the kp/rgb/apt38
  mapping rests on the actor record's alias table (Microsoft post-2023 taxonomy, equivalent),
  not on this source. PURPOSE: the WMD/weapons-financing goal appears only as a generic
  class-level "focus area" for DPRK actors ("Stealing money or cryptocurrency to help fund the
  North Korea weapons programs"), not pinned to the Sapphire Sleet activity, whose own section
  states no purpose — hence the event's doctrine link is strongly_inferred, not attested.
