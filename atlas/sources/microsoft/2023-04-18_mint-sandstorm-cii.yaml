notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): NAMES THE IRGC specifically for this
  exact actor (used to KEEP the ir/irgc/apt35 service placement). Microsoft equates
  the cluster — "Mint Sandstorm ... overlaps with public reporting on groups known as
  APT35, APT42, Charming Kitten, and TA453" — then states: "Microsoft assesses that
  Mint Sandstorm is associated with an intelligence arm of Iran's military, the
  Islamic Revolutionary Guard Corps (IRGC), an assessment that has been corroborated
  by multiple credible sources including Mandiant, Proofpoint, and SecureWorks. In
  2022, the US Department of Treasury sanctioned elements of Mint Sandstorm for past
  cyberattacks citing sponsorship from the IRGC." This is a tier-1 vendor naming the
  IRGC (not merely "Iranian"/"government of Iran") as the affiliating service.
