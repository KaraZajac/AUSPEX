notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the service placement of Storm-2603
  (formerly cn/mss/storm-2603 → demoted to cn/unscoped/storm-2603). This source names NO
  intelligence service for Storm-2603 and disclaims actor linkage: "The group that Microsoft
  tracks as Storm-2603 is assessed with moderate confidence to be a China-based threat actor.
  Microsoft has not identified links between Storm-2603 and other known Chinese threat actors.
  ... Microsoft is currently unable to confidently assess the threat actor's objectives." For
  contrast, the report calls the two co-reported clusters firm state actors: "Microsoft has
  observed two named Chinese nation-state actors, Linen Typhoon and Violet Typhoon ... [and]
  another China-based threat actor, tracked as Storm-2603." No MSS basis; even the China nexus
  is moderate-confidence (consistent with the Storm-#### developing-cluster convention).
