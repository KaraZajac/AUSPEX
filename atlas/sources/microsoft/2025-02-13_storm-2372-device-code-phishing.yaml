retrieved_on: 2026-05-27
tier: primary
notes: |
  Microsoft disclosure of an ongoing Storm-2372 (assessed Russian-
  aligned) device-code phishing campaign active since at least
  August 2024 against government, NGO, IT services, defense,
  telecoms, healthcare, higher-education, and energy sectors in
  Europe, North America, Africa, and the Middle East. Operators
  used Microsoft Teams "chat" lures impersonating prominent
  individuals to socially engineer victims into authorising
  attacker-controlled OAuth device-code flows, granting persistent
  access to mailboxes and cloud resources without harvesting
  passwords. Tradecraft pivot from prior credential-spray to
  OAuth-flow abuse.
