notes: |
  Microsoft disclosure of an ongoing Storm-2372 (assessed Russian-
  aligned) device-code phishing campaign active since at least
  August 2024 against government, NGO, IT services, defense,
  telecoms, healthcare, higher-education, and energy sectors in
  Europe, North America, Africa, and the Middle East. Operators
  used Microsoft Teams "chat" lures impersonating prominent
  individuals to socially engineer victims into authorising
  attacker-controlled OAuth device-code flows, granting persistent
  access to mailboxes and cloud resources without harvesting
  passwords. Tradecraft pivot from prior credential-spray to
  OAuth-flow abuse.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured +
  hashed (sha256 b036fae0…86804f90, 306476 bytes); tier primary
  confirmed (first-party Microsoft MSTIC research). Attribution
  language verbatim: "we assess with moderate confidence [that
  Storm-2372] aligns with Russia's interests and tradecraft" /
  "aligns with Russian interests, victimology, and tradecraft" /
  "a suspected nation-state actor working toward Russian state
  interests"; "Storm" is a temporary designation for an unknown /
  emerging cluster. Report does NOT name APT29 / Midnight Blizzard /
  Cozy Bear / SVR (0 mentions) — event attribution corrected to
  nation-level against this.
