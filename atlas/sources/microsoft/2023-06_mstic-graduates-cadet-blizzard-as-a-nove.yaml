notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): URL resolves; raw snapshot captured + hashed.
  CORRECTIONS — (1) the prior record title "MSTIC graduates Cadet Blizzard as a novel, distinct
  GRU-associated Russian threat actor" was embellished/fabricated; the real article title is
  "Cadet Blizzard emerges as a novel and distinct Russian threat actor" (the word "graduates"
  and "GRU-associated" appear nowhere in MSTIC's title — corrected). (2) kind industry→vendor-research
  and tier secondary→primary: this is MSTIC's own first-hand research, a tier-1 vendor primary source
  for its own findings. Verbatim attribution: "Microsoft assesses that Cadet Blizzard operations are
  associated with the Russian General Staff Main Intelligence Directorate (GRU) but are separate from
  other known and more established GRU-affiliated groups such as Forest Blizzard (STRONTIUM) and
  Seashell Blizzard (IRIDIUM)." Verbatim confidence: "we have gained high confidence in our analysis
  and knowledge of the actor's tooling, victimology, and motivation, meeting the criteria to convert
  this group to a named threat actor." On the rename: "a threat actor formerly tracked as DEV-0586 —a
  distinct Russian state-sponsored threat actor that has now been elevated to the name Cadet Blizzard."
  NO specific GRU unit (e.g. Unit 29155) is named in this source. WhisperGate (Jan 2022 MBR wiper vs
  Ukraine), CVE-2021-26084/CVE-2022-41040/ProxyShell, web shells P0wnyshell/reGeorg/PAS, Impacket, the
  "Free Civilian" hack-and-leak persona, and the Ukraine/Europe/Central-Asia/Latin-America targeting
  with the five named Ukrainian verticals all confirmed against the raw text.
  NOTE: a near-duplicate record (mstic/2023-06-14_cadet-blizzard-novel-distinct-threat-actor) cites the
  same URL — candidate for dedup (left untouched; out of scope for this event audit).
