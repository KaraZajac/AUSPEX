notes: |
  Microsoft strategic-warning blog (Clint Watts) forecasting an
  intensified Russian cyber-kinetic campaign against Ukrainian
  energy infrastructure through winter 2022-2023. Documents a
  pattern of cyber-and-kinetic strike pairing against Ukrenergo
  and other electricity producers, plus expanded Sandworm
  Prestige-style targeting of NATO-territory logistics and
  Ukrainian government continuity. Companion to the MSTIC
  technical reporting cadence.

