notes: |
  Microsoft Threat Intelligence disclosure of Onyx Sleet
  (Microsoft's cluster name for the actor also tracked as
  Andariel / APT45 / Silent Chollima / Stonefly / DarkSeoul
  / TDrop2). Landed the same day (2024-07-25) as Mandiant's
  APT45 graduation report and the DOJ Rim Jong Hyok
  unsealing; MSTIC's post itself references only the DOJ
  indictment and its own FBI collaboration. Documents Onyx
  Sleet's tooling and tradecraft against defense,
  engineering, and energy targets in India, South Korea,
  and the US.

