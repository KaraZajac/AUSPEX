notes: |
  Microsoft's first comprehensive summary of Russian cyber activity
  against Ukraine in the first two months of the full-scale
  invasion. Documents 237+ Russian state operations against 100+
  Ukrainian organisations across at least eight separate destructive
  malware families (including FoxBlade / HermeticWiper),
  IRIDIUM / Sandworm prepositioning, NOBELIUM / APT29 espionage on
  Ukraine-aiding governments, and STRONTIUM / APT28 phishing of
  Ukrainian media and government. Companion technical report
  "Special Report: Ukraine" by MSTIC. Foundational disclosure for
  the invasion-phase Russian cyber campaign.
