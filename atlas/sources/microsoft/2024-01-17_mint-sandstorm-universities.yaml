notes: |
  Microsoft MSTIC blog documenting a Mint Sandstorm (APT35 /
  Charming Kitten / Phosphorus) subgroup's spear-phishing
  campaign from November 2023 onward against high-profile
  Middle East policy experts at universities and research
  organizations in Belgium, France, Gaza, Israel, the UK, and
  the US. TTPs noted include legitimate-but-compromised account
  abuse for phishing-lure delivery, curl-based C2 communication,
  and persona-driven rapport-building.

