notes: |
  Microsoft post-hoc disclosure of the Storm-0558 forged-token
  Exchange Online compromise of US State Department, Commerce, and
  Congressional staff (~25 organizations).
  AUDIT (2026-06-24, claude-opus-4.8/max): supports actor cn/unscoped/storm-0558
  (demoted from cn/mss this date). Source attributes the actor to China only, never the MSS or any
  Chinese service: "Storm-0558 is a China-based threat actor with espionage objectives" and "Microsoft
  Threat Intelligence assesses with moderate confidence that Storm-0558 is a China-based threat actor
  with activities and methods consistent with espionage objectives." (Note: MODERATE confidence on the
  attribution itself; the event records the attributing_org_confidence as high.) No MSS / Ministry of
  State Security mention. Raw HTML snapshot captured + hashed.
