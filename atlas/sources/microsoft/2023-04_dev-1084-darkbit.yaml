notes: |
  Microsoft analysis of the DarkBit / Technion destructive
  operation; ties DEV-1084 to MOIS-attributed MuddyWater /
  Mercury cluster.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw (HTTP 200, 330 KB).
  Corroborates the ir/mois placement: "DEV-1084 likely worked in partnership
  with MERCURY—an Iran-based actor that the US Cyber Command has publicly
  linked to Iran's Ministry of Intelligence and Security (MOIS)." (MERCURY =
  Mango Sandstorm = the MuddyWater cluster per Microsoft's own taxonomy note
  in this post.) The article names the MOIS but attributes the naming to US
  Cyber Command, so it is secondary corroboration; the primary MOIS basis is
  CISA AA22-055A.
