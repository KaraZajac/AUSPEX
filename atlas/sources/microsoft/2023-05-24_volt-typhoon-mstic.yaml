  AUDIT (2026-06-24, claude-opus-4.8/max): cited in the cn/mss/volt-typhoon service audit.
  This source attributes Volt Typhoon only at the nation level and names NO Chinese service:
  "The attack is carried out by Volt Typhoon, a state-sponsored actor based in China that
  typically focuses on espionage and information gathering. Microsoft assesses with moderate
  confidence that this Volt Typhoon campaign is pursuing development of capabilities..." No
