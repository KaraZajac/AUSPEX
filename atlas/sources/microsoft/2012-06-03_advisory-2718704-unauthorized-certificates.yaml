notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): created + snapshotted (HTTP 200,
  52,652 bytes) as the Microsoft first-party primary for Flame's forged-
  certificate Windows-Update spoof and Microsoft's remediation. Verbatim:
  "Microsoft is aware of active attacks using unauthorized digital certificates
  derived from a Microsoft Certificate Authority. An unauthorized certificate
  could be used to spoof content, perform phishing attacks, or perform man-in-
  the-middle attacks"; "The update revokes the trust of the following
  intermediate CA certificates: Microsoft Enforced Licensing Intermediate PCA
  (2 certificates) [and] Microsoft Enforced Licensing Registration Authority
  CA". Published June 03 2012, updated June 13 2012 (v1.1). NB: the advisory is
  deliberately terse — it does NOT name "Flame", "MD5", or "Terminal Server".
  The chosen-prefix MD5 collision against the Terminal-Server/Enforced-Licensing
  certificate is Microsoft's SRD-blog analysis ("Flame malware collision attack
  explained", msrc.microsoft.com) — that page is now a client-rendered JS SPA
  with no server-rendered body, so it is NOT snapshottable; the collision
  mechanism is corroborated by this advisory (the revoked "Enforced Licensing"
  CA = the Terminal-Server licensing PKI) and by extensive public record.
  Cited by: 2012-05/flame.
