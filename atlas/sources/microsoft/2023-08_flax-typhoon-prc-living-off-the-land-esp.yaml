notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): raw captured (HTTP 200, 326KB) + sha256. Resolves;
  title and publish date (article:published_time 2023-08-24T16:30Z) match the citation.
  ATTRIBUTION FINDING — Microsoft names ONLY China, NOT the MSS or any service: "Microsoft
  attributes this campaign to Flax Typhoon (overlaps with ETHEREAL PANDA), a nation-state actor
  based out of China." / "Microsoft has identified a nation-state activity group tracked as Flax
  Typhoon, based in China, that is targeting dozens of organizations in Taiwan with the likely
  intention of performing espionage." No occurrence of "Ministry of State Security" / "State
  Security" / "MSS" as an organ (only the MSSQLSERVER account). Intent is hedged: "While the
  actor's observed behavior suggests Flax Typhoon intents to perform espionage ... Microsoft has
  not observed Flax Typhoon" exfiltrate, i.e. "Flax Typhoon's discovery and credential access
  activities do not appear to enable further data-collection and exfiltration objectives." TTPs
  verbatim: living-off-the-land + LOLBins, China Chopper web shell, Metasploit, Juicy Potato,
  BadPotato, Mimikatz, SoftEther VPN, RDP with Sticky Keys (sethc.exe). Targets: Taiwan
  government agencies, education, critical manufacturing, IT; some victims in SE Asia, North
  America, Africa. Supports the event's facts/targets; supports China-nexus attribution at
  nation level, NOT the cn/mss actor placement (flagged for actor-audit).
