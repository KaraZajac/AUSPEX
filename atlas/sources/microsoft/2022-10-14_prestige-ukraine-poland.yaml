title: |
  New "Prestige" ransomware impacts organizations in Ukraine and
  Poland
url: https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
archive_url: https://web.archive.org/web/2023/https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
