notes: |
  MSTIC (Microsoft Threat Intelligence Center) disclosure of the
  "Prestige" ransomware family deployed against transportation
  and logistics organizations in Ukraine and Poland on 11 October
  2022. Microsoft tracked the activity as IRIDIUM (Sandworm); the
  novel ransomware family was deployed in waves over the course of
  approximately one hour using highly privileged credentials and
  was assessed as part of the ongoing Russian campaign against
  Ukrainian and Ukraine-aiding logistics infrastructure.
