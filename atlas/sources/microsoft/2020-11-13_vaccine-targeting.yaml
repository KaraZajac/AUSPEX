notes: |
  Microsoft MSTIC (Tom Burt) disclosure that THREE nation-state actors
  targeted seven prominent COVID-19 vaccine/treatment firms across five
  countries (Canada, France, India, South Korea, USA): Strontium (Russia;
  = APT28) using password spray / brute force; Zinc (DPRK; = Lazarus) using
  recruiter-lure spear-phishing; and Cerium (DPRK) using WHO-masquerade,
  COVID-themed spear-phishing. The blog names NONE of the seven companies and
  says the majority of attacks were blocked. Pfizer, AstraZeneca, and others
  named only in follow-on reporting (see the CNN/Reuters and Al Jazeera/NIS
  source records).
