notes: |
  Microsoft Threat Intelligence disclosure of Marbled Dust's
  exploitation of CVE-2025-27920 (Output Messenger zero-day)
  beginning April 2024 against targets in the broader region.

  AUSPEX attribution-dispute note: some earlier reporting has at
  times conflated Marbled Dust with Citizen Lab's Stealth Falcon
  cluster. Microsoft's own characterization of Marbled Dust
  frames it as overlapping with Sea Turtle (the DNS-hijacking
  Türkiye-aligned operator cluster Cisco Talos disclosed in
  2019) — i.e., as Türkiye-aligned, NOT UAE-aligned. AUSPEX
  consequently does NOT tag the May 2025 Marbled Dust event to
  UAE; it is recorded in the Türkiye corpus. The dispute is
  noted in the Stealth Falcon actor entry.
