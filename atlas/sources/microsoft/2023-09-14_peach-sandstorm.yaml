notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): used for the ir/irgc/apt33 service-placement audit.
  MSTIC names NO Iranian service (0 occurrences of "IRGC"/"Revolutionary Guard"/"MOIS"). It
  identifies the actor only at the nation level: "Peach Sandstorm (HOLMIUM) ... is an Iranian
  nation-state threat actor," and assesses the campaign "is likely used to facilitate
  intelligence collection in support of Iranian state interests." Corroborates the prior
  event-level finding; supports an Iran nexus but not the IRGC placement -> actor demoted to
  ir/unscoped/apt33.
