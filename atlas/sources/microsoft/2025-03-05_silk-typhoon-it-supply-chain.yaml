  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (316,562 bytes). Verbatim support:
   - actor identity: "Silk Typhoon, a Chinese espionage group"; article tag reads
     "Silk Typhoon (HAFNIUM)" (the Hafnium equivalence).
   - tradecraft: "Silk Typhoon was observed abusing stolen API keys and credentials
     associated with privilege access management (PAM), cloud app providers, and cloud
     data management companies..."
   - strategic purpose (supports the political/policy-intelligence doctrine reading):
     "Data of interest overlaps with China-based interests, US government policy and
     administration, and legal process and documents related to law enforcement
     investigations."
  Note: this March-2025 blog covers Silk Typhoon's broader IT-supply-chain campaign and
  does NOT itself name "BeyondTrust" or "Treasury"; it corroborates the actor identity,
  tradecraft class, and collection intent, not the specific Treasury victimology.
