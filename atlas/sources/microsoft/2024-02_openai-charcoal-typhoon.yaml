  AUDIT (2026-06-24, claude-opus-4.8/max): cited by cn/unscoped/charcoal-typhoon (formerly
  cn/mss/charcoal-typhoon). Service-placement check — this source does NOT name the MSS or any
  specific Chinese service; it attributes only at the nation/state-affiliation level. Verbatim:
  "Charcoal Typhoon (CHROMIUM) is a Chinese state-affiliated threat actor with a broad operational
  scope," whose interests extend "to institutions and individuals globally who oppose China's
  policies." The strings "MSS", "Ministry of State Security", and "PRC" do not occur anywhere in
  the captured page. Microsoft's "Typhoon" suffix denotes a China-based / state-affiliated origin
  without naming a service. Finding: supports the China nexus, not an MSS placement → actor demoted
  to cn/unscoped. Raw page captured (curl, HTTP 200, 311,155 bytes) and hashed above.
