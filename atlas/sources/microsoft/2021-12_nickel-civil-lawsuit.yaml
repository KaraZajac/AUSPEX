  AUDIT (2026-06-24, claude-opus-4.8/max): Used to support the actor cn/mss/apt15's MSS service
  placement; this source does NOT name the Ministry of State Security (or any Chinese intelligence
  service). Its attribution is nation-level only: title "Microsoft seizes 42 websites from a
  China-based hacking group (Nickel / APT15)"; body "our previous disruptions that targeted Barium,
  operating from China, Strontium, operating from Russia, Phosphorus, operating from Iran, and
  Thallium, operating from North Korea" (Nickel grouped with the China peer, all nation-level);
  "There is often a correlation between Nickel's targets and China's geopolitical interests";
  repeatedly "nation-state actor"/"nation-state hackers." No "MSS"/"Ministry of State Security"/
  "intelligence service" string anywhere in the captured page. Actor accordingly demoted
  cn/mss/apt15 → cn/unscoped/apt15 on 2026-06-24.
