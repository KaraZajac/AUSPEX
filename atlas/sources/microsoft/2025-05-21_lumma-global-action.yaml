notes: |
  First-party account of Microsoft Digital Crimes Unit's civil action
  against Lumma Stealer (LummaC2). Load-bearing quotes:
  - "Between March 16, 2025, and May 16, 2025, Microsoft identified over
    394,000 Windows computers globally infected by the Lumma malware."
  - "Via a court order granted in the United States District Court of the
    Northern District of Georgia, Microsoft's DCU seized and facilitated
    the takedown, suspension, and blocking of approximately 2,300
    malicious domains that formed the backbone of Lumma's infrastructure."
  - "The Department of Justice (DOJ) simultaneously seized the central
    command structure for Lumma and disrupted the marketplaces where the
    tool was sold to other cybercriminals."
  - "Europol's European Cybercrime Center (EC3) and Japan's Cybercrime
    Control Center (JC3) facilitated the suspension of locally based Lumma
    infrastructure."
  - "more than 1,300 domains seized by or transferred to Microsoft,
    including 300 domains actioned by law enforcement with the support of
    Europol, will be redirected to Microsoft sinkholes."
  - "The primary developer of Lumma is based in Russia and goes by the
    internet alias 'Shamel.'"
  - Lumma is a MaaS sold "since at least 2022"; used by "prolific
    ransomware actors such as Octo Tempest (Scattered Spider)."
