title: |
  Iran accelerates cyber ops against Israel from chaotic start
url: https://blogs.microsoft.com/on-the-issues/2024/02/06/iran-accelerates-cyber-ops-against-israel/
archive_url: null
published_on: 2024-02-06
retrieved_on: 2026-05-27
tier: secondary
notes: |
  Microsoft Threat Analysis Center (MTAC) retrospective on the
  October 2023 — early 2024 Iranian cyber-and-IO operations
  against Israel. Documents the increase from 9 Microsoft-tracked
  Iranian groups active against Israel in the first week to 14
  by the third week, identifies the Shahid Kaveh Group
  (Storm-0784) as the operator behind the Soldiers of Solomon
  persona's October 2023 false Nevatim Air Force Base claim,
  and frames the initial-phase operations as reactive rather
  than pre-planned.
