notes: |
  MSTIC disclosure of ZINC (Microsoft taxonomy for Lazarus
  core; renamed Diamond Sleet in April 2023 taxonomy
  refresh) weaponization of open-source software: PuTTY,
  KiTTY, TightVNC, Sumatra PDF Reader, muPDF/Subliminal
  Recording installer. Delivered via LinkedIn / WhatsApp
  fake-recruiter pretext targeting media, defense, and
  IT-services personnel. Documents the access primitive
  that subsequently supported the JumpCloud (2023) and
  CyberLink (2023) supply-chain operations.
