notes: |
  AUDIT 2026-07-01 (claude-opus-4.8/max): live article snapshotted + hashed
  (sha256 17103095…8324b20f, 312,985 bytes). Real article confirmed (title
  "ZINC weaponizing open-source software"). Verbatim attribution: "MSTIC
  attributes this campaign with high confidence to ZINC, a state-sponsored
  group based out of North Korea with objectives focused on espionage, data
  theft, financial gain, and network destruction." Victims: "media, defense
  and aerospace, and IT services in the US, UK, India, and Russia." Campaign
  window: "from late April to mid-September 2022"; "successfully compromised
  numerous organizations since June 2022." Taxonomy note in-page: "ZINC is
  now tracked as Diamond Sleet." Weaponized packages named: PuTTY, KiTTY,
  TightVNC, Sumatra PDF Reader, muPDF/Subliminal Recording installer.
  MSTIC disclosure of ZINC (Microsoft taxonomy for Lazarus
  core; renamed Diamond Sleet in April 2023 taxonomy
  refresh) weaponization of open-source software: PuTTY,
  KiTTY, TightVNC, Sumatra PDF Reader, muPDF/Subliminal
  Recording installer. Delivered via LinkedIn / WhatsApp
  fake-recruiter pretext targeting media, defense, and
  IT-services personnel. Documents the access primitive
  that subsequently supported the JumpCloud (2023) and
  CyberLink (2023) supply-chain operations.
