notes: |
  Zack Whittaker / TechCrunch, 2024-04-30, on Andrew Witty's written
  testimony ahead of the May 1 House subcommittee hearing. Load-bearing
  for the initial-access, market-share, and ransom-payment facts of the
  2024-02/change-healthcare-alphv event. Supporting quotes (raw
  snapshot, sha 47e8c943…1a781b96, 237,174 bytes):
  attackers "used compromised credentials to remotely access a Change
  Healthcare Citrix portal" which "did not have multifactor
  authentication"; "hackers deployed ransomware nine days later on
  February 21"; "Change Healthcare processes health insurance and
  billing claims for around half of all U.S. residents" (→ the ~50%-of-
  US-claims figure); Witty "provided the written testimony ahead of a
  House subcommittee hearing on Wednesday" (= 2024-05-01); UnitedHealth
  "confirmed last week that the company paid a ransom to the hackers";
  the stolen data covered "a substantial proportion of people in
  America." (NB: a later section of the same article discusses the
  April RansomHub re-extortion as "the second gang" — that content
  belongs to the separate 2024-04/change-healthcare-ransomhub-repost
  event, not this one.)
