notes: |
  Source for the named leak-site victims and the disputed-claims nuance.
  Added 2026-07-05 as a re-source for 2024-12/cl0p-cleo.
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot + sha256
  captured (ca7956f7…ba178e44, 239,890 bytes; JSON-LD datePublished
  2025-01-16T06:01:17-08:00). Real article. Verified verbatim: "the
  Russia-linked Clop gang listed 59 organizations it claims to have
  breached by exploiting the high-risk bug in Cleo's software tools"; Hertz
  "is 'aware' of Clop's claims, but said there is 'no evidence that Hertz
  data' [was compromised]"; "Spokespeople for Arrow Electronics and Western
  Alliance Bank also told TechCrunch that they have found no evidence that
  their systems had been compromised"; "Clop also listed the recently
  breached software supply chain giant Blue Yonder. The company, which
  confirmed a November ransomware attack…"; "Cleo first disclosed the
  vulnerability in an October 2024 security advisory before security
  researchers observed hackers mass exploiting the vulnerability months
  later"; and the actor history "the ransomware gang previously exploited
  vulnerabilities in Progress Software's MOVEit Transfer product, and later
  took credit for the mass exploitation of a vulnerability in Fortra's
  GoAnywhere." NB the "Russia-linked" epithet is a journalistic
  origin/nexus descriptor, not a documented state-sponsorship finding —
  AUSPEX keeps the actor in criminal/ (see criminal/clop audit). Hertz and
  Western Alliance Bank DISPUTED at this date; both later confirmed (see
  the therecord and cybersecuritydive sources).
