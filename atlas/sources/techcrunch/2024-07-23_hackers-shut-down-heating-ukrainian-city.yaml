notes: |
  Lorenzo Franceschi-Bicchierai's report on the Dragos FrostyGoop
  disclosure, drawing on the pre-release press briefing and a
  statement from a Security Council of Ukraine spokesperson. Carries
  the operation specifics the Dragos intel-brief PDF omits: the
  attack hit Lviv "during the late evening of January 22 through
  January 23"; Dragos's Mark "Magpie" Graham: it "resulted in the
  loss of heating to over 600 apartment buildings for almost 48
  hours"; the Security Council of Ukraine spokesperson confirmed the
  January 2024 attack, ">600 households" affected, and that the
  hackers targeted "the information and communication infrastructure
  of LvivTeploEnergo"; access "possibly gained" in April 2023 "by
  exploiting a vulnerability in an internet-exposed MikroTik router";
  on January 22, 2024 the attackers "connected to the network through
  Moscow-based IP addresses"; ENCO described as a Chinese-made
  controller, with exposed ENCO controllers also found in Lithuania,
  Ukraine, and Romania; "at least 46,000 Internet exposed ICS devices
  that allow Modbus today" (Graham); "the third known outage linked
  to cyberattacks to hit Ukrainians in recent years."
  ATTRIBUTION: "Despite the Russian IP addresses, Dragos didn't point
  the finger at any known particular hacking group or government as
  responsible for this cyber-enabled outage, because the company
  couldn't find ties to previous activities or tools, and because of
  the company's longstanding policy on not attributing cyberattacks,
  said Graham." STATED PURPOSE (Graham): the operation was conducted
  "likely as an effort to undermine the morale of Ukrainians living
  there. 'I think it's very much a psychological effort here,
  facilitated through cyber means when kinetic perhaps here wasn't
  the best choice.'"
