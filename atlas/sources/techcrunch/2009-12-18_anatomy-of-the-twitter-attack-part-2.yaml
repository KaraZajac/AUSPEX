notes: |
  TechCrunch (Nik Cubrilovic, 2009-12-18) detailing the DNS-hijack
  mechanism: Twitter's DNS was hosted at Dyn, and "the account
  password recovery feature was used to reset the password for the
  Twitter account at Dyn"; the attackers then repointed twitter.com
  to an IP "on the anonymous Tor network," defacing the site for
  "just under an hour." Emphasizes the compromise was an
  account/email-recovery weakness, "not a direct vulnerability with
  the DNS server." Source for the Twitter attack vector.
