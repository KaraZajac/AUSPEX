notes: |
  Zack Whittaker / TechCrunch, September 3, 2024. PRIMARY journalism source documenting
  BOTH the RansomHub self-claim (via ransom note) AND — critically — that RansomHub had
  NOT published Halliburton on its leak site. Added 2026-07-05 during the
  2024-09/halliburton-followup-ransomhub audit to disprove that event's fabricated
  "leak-site data publication Sept 2" premise and to carry the honest RansomHub
  attribution basis.
  AUDIT (2026-07-05, claude-opus-4.8/max): curl HTTP 200, snapshot + sha256 captured
  (sha 68ed214e…8ce4bf6c, 234,362 bytes). Verbatim from the snapshot:
   - "oil giant Halliburton has confirmed its systems were hacked and that intruders
     'accessed and exfiltrated information' following a cyberattack last week."
   - "TechCrunch has seen a copy of a ransom note purportedly related to the Halliburton
     incident that claims to have encrypted and stolen the company's files. The note says
     a ransomware gang known as RansomHub is taking credit for the cyberattack."
   - "RansomHub's dark web leak site, which the gang uses to publish stolen files to
     extort its victims into paying a ransom, has not yet listed Halliburton as one of
     its victims."
  NB: RansomHub's self-claim was made via a PRIVATE RANSOM NOTE, not a leak-site
  posting; as of this report Halliburton was NOT listed on RansomHub's leak site and no
  data had been published. TechCrunch names no specific categories of exfiltrated data.
