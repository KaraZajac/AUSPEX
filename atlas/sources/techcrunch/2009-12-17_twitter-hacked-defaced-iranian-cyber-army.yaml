notes: |
  Initial TechCrunch report (2009-12-17, 10:12pm PST) carrying the
  verbatim twitter.com defacement text: "THIS SITE HAS BEEN HACKED
  BY IRANIAN CYBER ARMY" and "U.S.A. Think They Controlling And
  Managing Internet By Their Access, But THey Don't, We Control And
  Manage Internet By Our Power," plus the embargo taunt "NOW WHICH
  COUNTRY IN EMBARGO LIST? IRAN? USA? WE PUSH THEM IN EMBARGO LIST
  ;)" and the contact iRANiAN.CYBER.ARMY@GMAIL.COM. Frames the
  hijack as the attackers' retaliation for Twitter's role during the
  2009 Iranian election protests. Source for the defacement content;
  carries no anti-Israel or pro-IRGC wording.
