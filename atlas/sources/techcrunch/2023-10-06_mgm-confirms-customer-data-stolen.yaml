notes: |
  TechCrunch reporting on MGM's Oct 2023 disclosures. Load-bearing
  carrier for the MGM non-payment contrast (which the SEC 8-K and the
  BleepingComputer pieces do not state). Verbatim: "According to The
  Wall Street Journal, MGM Resorts reportedly did not pay the
  attackers' ransom demand, the amount of which is not yet known."
  Also corroborates the customer-data theft (names, contact info,
  gender, dates of birth, and driver's-license numbers for customers
  who transacted before March 2019) and the ~$100M impact. Cited by
  event 2023-09/mgm-caesars-alphv.
