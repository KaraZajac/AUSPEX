notes: |
  Zack Whittaker, 2024-08-02. "TechCrunch's analysis of published
  data breach notifications shows Cencora has notified at least
  1.43 million individuals" (state-AG notices in Delaware, Iowa,
  Massachusetts, Montana, New Hampshire, Texas and Washington;
  Texas alone 1.05 million). Most recent notice submitted
  mid-July 2024 — notifications still ongoing; the affected count
  "likely to be far higher" (Cencora conceded it cannot notify
  everyone for lack of current addresses; it declined to confirm
  a total). Compromised data: "patient names, their postal
  address and date of birth, as well as information about their
  health diagnoses, medications and prescriptions", obtained via
  patient-support-program partnerships with drug makers incl.
  AbbVie, Bayer, Pfizer, Regeneron. "Cencora, known as
  AmerisourceBergen until 2023"; company declined to describe
  what led to the breach.
