notes: |
  TechCrunch (Zack Whittaker) coverage of Live Nation's 2024-05-31 SEC
  8-K. This is the report that first tied the Ticketmaster breach to
  Snowflake — Ticketmaster confirmed to TechCrunch that its stolen
  database was hosted there. Verbatim / near-verbatim:
  "A spokesperson for Ticketmaster ... told TechCrunch that its stolen
  database was hosted on Snowflake, a cloud storage and analytics
  company"; deck "A hacker claims to be selling 560 million customer
  records"; "the administrator of a since-revived popular cybercrime
  forum called BreachForums claimed to be selling the personal
  information of 560 million customers"; "Live Nation said in its
  statement that it 'identified unauthorized activity within a
  third-party cloud database environment containing Company data'";
  "Live Nation said the breach occurred on May 20, and that a
  cybercriminal 'offered what it alleged to be Company user data for
  sale via the dark web.'" (datePublished 2024-05-31T22:13:19Z;
  dateModified 2024-06-06.)
