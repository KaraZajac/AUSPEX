notes: |
  Byline Chloe Arnold. Sole-source record of the March 2009 claims of
  responsibility for the 2007 Estonia DDoS: Konstantin Goloskokov, a
  "commissar" of the pro-Kremlin youth group Nashi, said he and a group of
  friends carried out the attacks ("Goloskokov echoed Markov's original
  claim, saying he carried out the attacks on Estonia's Internet"). The
  earlier claim was by Sergei Markov, a Russian State Duma deputy. The
  article stresses these were NOT presented as a Russian-state order, and
  that Estonian experts dispute them: "Estonian experts have played down
  Goloskokov's claims, saying the attacks were too sophisticated to be the
  work of a single, mischievous group of hackers." Establishes the
  individual-self-claim attribution (one Nashi activist + one Russian
  official), not state attribution. archive_url null: Wayback availability
