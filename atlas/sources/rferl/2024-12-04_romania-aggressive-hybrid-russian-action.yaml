notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): created during phantom re-source of event
  2024-12/romanian-presidential-election-interference (the sole prior citation,
  csat-ro/2024-12_romanian-election-declassified-intel, is a real presidency.ro URL but
  returns a persistent Cloudflare 503 anti-bot challenge and cannot be snapshotted). Raw
  snapshot captured + sha256 verified (90,132 bytes). Contemporaneous report of the CSAT
  declassification. Carries the government's Russia-pointing framing at the NATION level.
  Verbatim support in snapshot:
   - "Documents declassified by Romania's security council on December 4 said the country
     was the target of an 'aggressive hybrid Russian action'"
   - "It added that it had identified more than 85,000 cyberattacks that aimed to exploit
     system vulnerabilities."
   - "The attacks continued intensively including on election day and the night after
     elections" (attributed to "one of the declassified documents")
   - "Far-right pro-Russian Romanian presidential candidate Calin Georgescu"; TikTok used
     to generate support for Georgescu among a Romanian audience "in the millions".
  Note: the "Russian" characterisation here is the disclosing government's assessment; the
  technical service (SRI) separately declined to attribute the 85k cyberattacks to a
  specific actor (see the bleepingcomputer source) — attribution remains hedged.
