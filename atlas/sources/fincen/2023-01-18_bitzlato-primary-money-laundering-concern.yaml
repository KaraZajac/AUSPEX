notes: |
  AUDIT (2026-07-02, claude-fable-5/max) — added for the
  2023-01/bitzlato-takedown event to carry the Treasury/FinCEN
  half of the coordinated action (distinct from the DOJ criminal
  complaint). Raw HTML snapshot (fincen.gov, unwalled) carries
  verbatim: "Immediate Release January 18, 2023 ... Action is the
  First Order Issued under Powerful New 'Section 9714' Authority";
  "This is the first order issued pursuant to section 9714(a) of
  the Combating Russian Money Laundering Act, as amended";
  designating Bitzlato a "primary money laundering concern" in
  connection with Russian illicit finance; and, on the ransomware
  nexus: "facilitating illicit transactions for ransomware actors
  operating in Russia, including Conti, a Ransomware-as-a-Service
  group that has links to the Government of Russia ... transactions
  involving Conti and the Russia-connected darknet market Hydra ...
  Following Hydra's closure in April 2022". NOTE: Conti and the
  section-9714 designation are FinCEN's (this order), NOT the DOJ
  complaint.
