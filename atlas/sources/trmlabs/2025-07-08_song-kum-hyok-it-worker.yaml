notes: |
  TRM Labs blockchain-analytics analysis of the Song Kum Hyok
  designation. Restates the OFAC release, then contextualizes it
  within the broader DPRK IT-worker laundering ecosystem
  (USDC/USDT wage payments moved through wallet structures and
  conversion channels) and the related 5 Jun 2025 DOJ civil
  forfeiture of ~$7.7M. NB (audit 2026-07-11): the article does
  NOT contain Song- or Asatryan-specific on-chain tracing — the
  prior note's "on-chain links to prior DPRK IT-worker revenue
  flows" overstated it; corrected to the general laundering /
  DOJ-forfeiture framing actually present ("Asatryan"=0,
  "on-chain"=0 in the snapshot).
