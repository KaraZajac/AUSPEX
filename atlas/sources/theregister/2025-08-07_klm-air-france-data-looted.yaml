notes: |
  Connor Jones, The Register, published 2025-08-07. Most precise verbatim
  data-scope source for the Air France-KLM child of the 2025 UNC6040 /
  ShinyHunters Salesforce-cloud campaign.

  Verbatim (raw snapshot, sha256 c7333152..a23b38c5, 164,197 bytes):
    - Platform (AF-KLM's own words, no vendor named): "external platform we
      use for customer service".
    - Exposed scope: "first and family names, along with contact details,
      Flying Blue numbers and tier levels, and the subject lines of service
      request emails were accessed".
    - NOT exposed: "No sensitive data such as passwords, travel details,
      Flying Blue miles, passport, or credit card information was stolen".
    - Attribution (hedged): "the prime suspect behind all of these intrusions
      is the ShinyHunters cybercrime crew, which is perhaps best known for its
      role in last year's attacks on" [Snowflake customers]. The article notes
      "Scattered Spider also" pivoted to airlines but casts "doubt on Scattered
      Spider's involvement, mainly due to the tradecraft that led to the
      intrusions" — i.e. cluster overlap, contested, not confirmed.

  IMPORTANT scope limit: AF-KLM named no actor and no CRM vendor; only Google's
  incident (in the broader campaign context) named Salesforce. "prime suspect"
  is press inference, not an AF-KLM or GTIG confidence assertion. No customer
  count is stated.

  AUDIT (2026-07-11, claude-opus-4.8/max): live URL HTTP 200, raw snapshot
  captured this audit. Created as the AF-KLM victim-specific data-scope +
  Scattered-Spider-overlap source (badrabbit re-source).
