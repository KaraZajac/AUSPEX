  AUDIT (2026-07-02, claude-opus-4.8/max): created for event 2023-11/lelwd-volt-typhoon-discovery.
  Raw snapshot captured + hashed (200 OK, 163,125 bytes). Verbatim: "The Chinese snoops gained
  initial access via a buggy FortiGate 300D firewall, according to Lawler. Fortinet patched this
  flaw in December 2022, but as of August 2023 LELWD's managed services provider still hadn't
  updated the firmware." Discovery: FBI/DHS officials handed Lawler an unclassified Volt Typhoon
  document "in November 2023, the start of Thanksgiving week"; Dragos sensors (installed August
  2023) "spotted some usual [sic — unusual] network traffic and communications with China that
  shouldn't be occurring." LOTL: DHS pamphlet "about how the Chinese government is planning these
  attacks, and living off the land." GM on scope: "I wouldn't say anything related to our substation
  or our engineering was compromised. They did access our servers. They knew where those vulnerable
  firewalls were, and they tried to get behind them" — "reconnaissance and espionage purposes."
  Attribution: "Chinese government-backed hacking crew" / "Volt Typhoon."
