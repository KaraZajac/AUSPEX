notes: |
  Contemporaneous June-2015 reattribution ("APT28 crew left their
  fingerprints all over this one"). Verbatim: France's TV5Monde
  "was knocked off air for around 18 hours in April" alongside "the
  hijack of its website and Facebook page"; attackers
  "self-identifying themselves as 'CyberCaliphate'" leaked
  "documents purporting to be ID cards of French soldiers"; "French
  investigators announced this week that they believe the TV5 Monde
  attack was carried out by Russia-based hackers" (per France 24 +
  TV5Monde's president, confirming L'Express, which broke the
  story); malware "typed out on a Cyrillic keyboard and compiled
  during office hours in Moscow and St. Petersburg"; "supported by
  findings from security vendors FireEye and Trend Micro"; FireEye
  ties the Cyber Caliphate site to APT28 infrastructure ("same IP
  block ... same name server and registrar"); Richard Turner
  (FireEye pres. EMEA): "ISIS was a decoy and APT28 was actually
  responsible for the attack on TV5Monde"; Greg Day (FireEye):
  Russian hackers "testing what type of damage they might be able
  to inflict on a media outlet ... the Cyber Caliphate-theme was
  there purely to provide plausible deniability." CAVEAT: Trend
  Micro's Rik Ferguson is "more circumspect" — links the malware to
  Pawn Storm / APT28 / Sofacy(Sednit) but says the leak source is
  unresolved and the "most likely scenario is ... two entirely
  unrelated incidents, a Pawn Storm infestation and a separate
  hactivist compromise." Also ties the persona to the Jan 2015
  CENTCOM Twitter/YouTube takeover. Snapshot published_on verified
  from page datePublished 2015-06-10T15:58:06Z. This live secondary
  REPLACES the phantom fireeye/2015-06-09_tv5monde-apt28 record
  (url null; standalone FireEye blog not recoverable — the FireEye
  attribution was in fact delivered via press statements, quoted
  here directly).
