notes: |
  October 2018 report (relaying De Standaard) on the Belgian federal
  prosecutor's confidential findings — discussed by Belgium's National
  Security Council — attributing the Belgacom/Proximus intrusion to the
  UK. Added + snapshotted 2026-07-11 (claude-opus-4.8/max) during the
  2010-05/operation-socialist-belgacom audit to date-anchor the Belgian
  public/prosecutorial attribution to OCTOBER 2018 (correcting the event's
  earlier "February 2018" conflation). Key text: "these are IP addresses
  of computers where the spyware software communicated from Belgacom.
  Three of those addresses were owned by a British company, indicating
  that the spy software manager is in Great Britain"; "This can all be
  read in a confidential report from the federal prosecutor's office that
  the National Security Council discussed at the beginning of this week";
  and the scale detail "the telco eventually confessing to 5,000 machines
  being infected." Term counts vs recorded snapshot (sha256 d723de5c…):
  GCHQ x9, Belgacom x12, British x3, prosecutor x2.
