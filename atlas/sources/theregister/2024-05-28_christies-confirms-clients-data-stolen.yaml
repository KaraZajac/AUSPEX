  2024-05-28T13:30:15Z). Verbatim from the snapshot:
   - "RansomHub claimed it was able to extract personal data belonging to 'at
     least 500,000' Christie's clients, including full names, addresses, the
     machine-readable zones of identity documents, heights, races, sexes, and
     more."
   - "There is no evidence that any financial or transactional records were
     compromised." (Christie's spokesperson to El Reg)
   - "Christie's has seemingly refused to pay up until now".
   - "cyberattack earlier in May that forced the auction house's online bidding
     system offline, an event which the company said at the time was due to a
     'technology security issue.'"
   - "The gang said there was a seven-day deadline for the victim to pay the
     ransom."
