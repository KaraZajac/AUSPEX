notes: |
  Contemporaneous reporting (Connor Jones, "Published Tue 27 May 2025
  15:19 UTC") corroborating the adidas breach notice. Load-bearing
  verbatim: affected data "mainly consists of contact information
  relating to consumers who had contacted our customer service help
  desk in the past"; "The affected data does not contain passwords,
  credit card, or any other payment-related information"; "The company
  said on May 23 that it is in the process..." (confirms the 23-May
  disclosure date). Crucially notes adidas withheld specifics: "The
  Register asked ... for a list of the exact data points involved and
  for an idea of how many people might be affected ... but it declined
  to provide any further details." The field characterization (names,
  email addresses) is The Register's inference from the customer-support
  signup minimum ("first and last names, and email addresses"), NOT an
  adidas enumeration. Does NOT name a vendor, Salesforce, or a threat
  actor.

