notes: |
  Secondary carrier of the decision + reasoning. Quotes Wayne
  Thayer ("...continuing to place trust in DarkMatter is a
  significant risk to our users") and Mozilla's Selena Deckelmann
  on the two principles that "guided our decision: first, that
  trust in our CA root store is a critical component of the
  security underpinnings of the web and second, our responsibility
  to protect individuals who rely on Mozilla products" and that the
  action followed "credible evidence from multiple sources that
  DarkMatter participates in spying." Carries the Reuters January
  2019 Project Raven trigger. Snapshotted live 2026-07-10 (curl
  HTTP 200, 163,902 B; "significant risk" 1x, "protect individuals"
  1x, "Project Raven" 2x).
