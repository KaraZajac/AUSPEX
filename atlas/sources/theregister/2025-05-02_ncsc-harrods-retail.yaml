notes: |
  Harrods becoming the third UK retailer (after M&S and Co-op) hit in
  the spring-2025 wave; the NCSC assisting all three.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed.
  Verbatim: Harrods — "We recently experienced attempts to gain
  unauthorised access to some of our systems" (access restricted, all
  sites stayed open). NCSC (Richard Horne): "The NCSC continues to work
  closely with organisations that have reported incidents to us." The
  NCSC was assisting all three retailers. Attribution is explicitly
  speculative here: Scattered Spider mentioned as "rumors" /
  "Scattered Spider-style" activity; DragonForce referenced amid
  unconfirmed rumours — no official attribution.
