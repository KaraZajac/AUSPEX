notes: |
  Contemporary reporting (John Leyden, 2009-12-18) on the twitter.com
  DNS hijack claimed by the "Iranian Cyber Army." Notes the attack
  compromised the systems responsible for Twitter's DNS records
  (Twitter's own servers were not commandeered) and frames the
  incident as hacktivism rather than confirmed state-sponsored
  activity — the attacker merely "adopted an Iranian-themed name."
  Added 2026-07-05 as a live, snapshottable replacement for the
  event's link-rotted NYT + phantom FDD citations.
