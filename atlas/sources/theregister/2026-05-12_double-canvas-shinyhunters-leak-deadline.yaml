  Jessica Lyons / The Register, on the May 2026 Instructure Canvas
  breach + extortion by ShinyHunters. Added 2026-07-05 to corroborate
  the events' timeline, self-claim framing, and actor-claimed figures.
  Verbatim: "On April 29, the online education firm 'detected
  unauthorized activity in Canvas,' immediately revoked the intruder's
  access, and initiated a probe"; "On May 7, the company 'identified
  additional unauthorized activity tied to the same incident.'
  ShinyHunters defaced about 330 Canvas school login portals";
  "data it claims belongs to more than 275 million students, teachers,
  and staff tied to nearly 9,000 schools worldwide"; "This is
  Instructure's second breach in less than a year. ShinyHunters claimed
  to have breached Instructure's Salesforce environment in September
  2025, and while Instructure didn't name the crew in its latest
  disclosure, it did address the intrusion." JSON-LD datePublished
