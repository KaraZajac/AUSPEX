notes: |
  Documents the first public wave of MOVEit victims and the supply-chain
  directionality: a single compromise at UK payroll provider Zellis
  cascaded to its downstream customers. Supporting quotes (raw snapshot,
  sha dc65631d...6d565e4f, 164,125 bytes): headline "British Airways,
  Boots, BBC payroll data stolen in MOVEit supply-chain attack"; "payroll
  services provider Zellis on Monday admitted its MOVEit installation had
  been exploited"; "fellow Zellis payroll users Boots and Aer Lingus are
  among those affected by the hack." Actor framing (relevant to the
  stateless-actor assessment): "Microsoft blames Russian Clop ransomware
  crew for theft of staff info" — a Russian-SPEAKING / Russia-based
  cybercrime-crew characterization, NOT a state-sponsorship claim. Used on
  2023-05/moveit-cl0p for British Airways, Boots, BBC, Aer Lingus and the
  Zellis supply-chain vector. AUDIT (2026-07-10, claude-opus-4.8/max):
  curl HTTP 200, snapshot + sha256 captured.
