notes: |
  Contemporary secondary report on the Banco de Chile SWIFT fraud of
  24 May 2018. Added 2026-07-11 to event 2017-10/global-swift-campaign
  to (a) carry the $10M net-theft figure and (b) correct the event's
  Chilean target from "BancoEstado" to Banco de Chile — Mandiant's
  APT38 report names "Banco de Chile in May 2018" and CISA AA20-239A
  references a 2018 Chile wiper; BancoEstado was a SEPARATE Sept-2020
  REvil incident.
  AUDIT (2026-07-11, claude-opus-4.8/max): curl HTTP 200 (159,851 B),
  raw captured + hashed (sha256 ade3fbfe…877a563a68). Verbatim: "Hackers
  reportedly used a variant of the complex KillDisk wiper malware to
  distract attention before targeting systems linked to the SWIFT
  inter-bank transfer network." / "The country's largest bank was hit
  on 24 May and thousands of workstations hobbled." / CEO Eduardo
  Ebensperger "reportedly telling Chilean business paper El Pulso …
  that the attackers had stolen '$10m' from the bank". Lazarus linkage:
  "Both assaults followed the modus operandi and used tools linked to
  the infamous Lazarus Group (AKA Hidden Cobra), a hacking crew blamed
  for the $81m cyberheist on funds held by the Central Bank of
  Bangladesh".
