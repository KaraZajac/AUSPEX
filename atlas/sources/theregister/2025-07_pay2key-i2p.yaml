  It reports Morphisec's findings: an "Iranian ransomware-as-a-service operation with ties to a
  government-backed cyber crew ... previously linked to Tehran's Pioneer Kitten," now "Pay2Key.I2P,"
  offering "80 percent instead of 70 percent" for "an attack against enemies of Iran. This is primarily
  Israel and the United States"; encryptor "uses several of the Mimic ransomware's capabilities ...
  ELENOR-Corp"; "hosts its ransomware website on I2P"; "advertised for affiliates on Russian and Chinese
  darknet forums, and also used X"; "reemerging in early 2025"; "by the end of June, the criminals
  claimed to have made more than $4 million after securing 50 ransomware payments during its four months
  in business." No "IRGC"/"Revolutionary Guard" (0 hits); no "Natanz"/"Fordow"; no "Telegram"/"Tox."
