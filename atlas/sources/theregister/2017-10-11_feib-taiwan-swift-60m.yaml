notes: |
  Contemporary secondary report on the Far Eastern International Bank
  (FEIB, Taiwan) SWIFT heist of October 2017. Added 2026-07-11 as the
  carrier of the ~$60M figure and the recovery detail for event
  2017-10/global-swift-campaign (neither of the event's govt/vendor
  sources — CISA AA20-239A, DOJ 2021, Mandiant APT38 — states a
  per-FEIB dollar amount; Mandiant names "Far Eastern International
  Bank in Taiwan in October 2017" but gives no figure).
  AUDIT (2026-07-11, claude-opus-4.8/max): curl HTTP 200 (157,868 B),
  raw captured + hashed (sha256 a87b22af…d15a42c9). Verbatim: "By the
  time staff noticed the weird transactions, $60m had already been
  wired to banks in the US, Cambodia, and Sri Lanka." and "Interpol
  has already begun its inquiries, and – thanks to security mechanism
  introduced between banks – all but $500,000 has been recovered."
  Establishes the FEIB event as an ATTEMPTED theft with near-total
  recovery (net loss < $500K), not a $60M net theft.
