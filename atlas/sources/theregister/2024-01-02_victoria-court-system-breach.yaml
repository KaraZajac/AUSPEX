notes: |
  Connor Jones, 2 January 2024 16:15 UTC. Corroborates the timeline
  and hedges the attribution. Verbatim: "The incident began on
  December 8 and attackers may have accessed hearings between
  November 1 and December 21, with a small number of recordings
  generated before this range also potentially compromised";
  "Speaking to ABC News, security expert Robert Potter said the
  attack is likely the work of the Russia-based Qilin ransomware
  group"; and — corroborating BleepingComputer's leak-site finding —
  "Qilin is yet to claim the attack on its leak site". CEO Louise
  Anderson confirmed a "cybersecurity incident" detected December 21.
