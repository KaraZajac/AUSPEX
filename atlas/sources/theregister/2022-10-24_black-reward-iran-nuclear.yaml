  AUDIT (2026-06-27, claude-opus-4.8/max): created during phantom re-source of event
  2022-10/black-reward-aeoi-leak. JSON-LD datePublished "2022-10-24T02:30:11Z" (byline Simon
  Sharwood, "Published Mon 24 Oct 2022 // 03:30 UTC"). Subhead: "Tehran laughs it off as foreign
  psyop or media stunt." Carries the quantified-impact figures and the anti-regime self-positioning:
  - "An activist group that calls itself Black Reward and claims to be from Iran took to Telegram
    last Friday with claims it had accessed an email server run by a company related to Iran's Atomic
    Energy Organization and exfiltrated 324 inboxes comprising over 100,000 messages and totalling
    over 50G of files." (source for data_leaked_gb: 50 + ~100,000 emails / 324 inboxes)
  - Leak content: "construction plans for a nuclear power plant, personal information of Iranians who
    work for the Organization, and passport details of Russian engineers"; IAEA correspondence.
  - "Black Reward's Twitter bio claims the group is part of the Iranian hacker community but is
    opposed to the nation's theocratic government, which it labels criminal." (anti-regime, NOT state).
