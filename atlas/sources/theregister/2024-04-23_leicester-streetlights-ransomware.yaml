notes: |
  The Register on the street-lighting side-effect of the Leicester
  shutdown and the completed 1.3TB data publication.

  AUDIT (2026-07-04, claude-opus-4.8/max): Raw captured + hashed
  (162,075 bytes). Verbatim: streetlights "shining brightly all day and
  night for some time"; council "not able to remotely identify faults in
  the street lighting system" and "The default mode for faults is that
  the lights stay on to ensure that roads are not left completely unlit
  and become a safety concern"; "Leicester City Council wouldn't pay
  INC's ransom demands, even after it leaked a sample of sensitive
  council data, the miscreants published the entirety of the files it
  stole, amounting to a sizeable 1.3 TB". Names INC as the actor;
  confirms no-ransom-paid and the street-lighting disruption.
