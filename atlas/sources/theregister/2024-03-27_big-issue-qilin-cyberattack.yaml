notes: |
  Primary journalism for the March-2024 Qilin leak-site claim against The
  Big Issue Group (UK street-newspaper / social-enterprise publisher
  supporting people experiencing homelessness). Created + snapshotted
  2026-07-04 to RE-SOURCE event 2024-03/big-issue-qilin off the wrong-source
  ncsc-uk/2024-06-04_synnovis-qilin-statement (an NHS England statement about
  the DIFFERENT June-2024 London Synnovis Qilin victim).

  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (164,227 bytes). Verbatim support:
   - "550 GB of company data" (Qilin's leak-site claim).
   - "The publication and distribution of the Big Issue magazine is not
     impacted by this incident"; the org was "operating with limited
     disruption" (contradicts any weeks-long vendor-system-outage claim).
   - Kevin Beaumont: the company had been dealing with the incident "for
     about a week" (as of 27 Mar 2024 -> detection ~20 Mar).
   - "driving license and salary information for Paul Cheal, CEO at Big Issue
     Group" among leaked exec/staff PII (passports, bank sort codes, home
     addresses) -> staff/executive PII, not street-vendor PII.
   - Historical scale "In 2022, it was working with 3,637 vendors" (NOT a
     count of vendors affected by the incident).
   - Qilin a "ransomware-as-a-service" gang; payload "written in Russian
     using" Rust and Go and "the criminals behind it are also thought to be
     Russian".
