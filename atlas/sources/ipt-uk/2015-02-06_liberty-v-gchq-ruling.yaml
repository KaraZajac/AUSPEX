  IPT ruling that the pre-disclosure regime under which GCHQ
  received bulk intelligence from the US was unlawful; the
  post-disclosure regime then ruled lawful. Most significant UK
  domestic-legal reckoning with Five Eyes.

  AUDIT (2026-07-10, claude-opus-4.8/max): Located the genuine IPT
  judgment (url was null) and captured it — the Tribunal's own site
  publishes this ruling as "Liberty/Privacy No 2", dated 6 February
  2015 (case nos IPT/13/77/H, IPT/13/92/CH, IPT/13/168-173/H,
  IPT/13/194/CH, IPT/13/204/CH; reported [2015] 3 AER 212). Note the
  embedded judgment PDF carries the neutral citation of the parent
  proceeding, "[2014] UKIPTrib 13_77-H" dated 05/12/2014 (Burton P) —
  the 6 Feb 2015 determination is the follow-on to Liberty/Privacy No 1
  in the same case, which is why the page dates and the embedded
  citation differ; this is not a sourcing error. VERBATIM operative
  holding (sha256 fca480ee…): "The Tribunal accordingly declared that,
  prior to the disclosures made and referred to in the earlier judgment
  and this judgment, the regime governing the soliciting, receiving,
  storing and transmitting by UK authorities of private communications
  of individuals located in the UK which had been obtained by US
  authorities pursuant to Prism and/or on the Claimants' case Upstream,
  contravened Articles 8 or 10 of the Convention, but that the regime
  now complied with the Convention." Supports the event's "pre-disclosure
  unlawful / post-disclosure lawful" summary claim. HTTP 200; captured.
