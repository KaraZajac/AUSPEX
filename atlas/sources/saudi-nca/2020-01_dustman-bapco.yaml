notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): RE-SOURCED off a phantom URL. Prior url
  (https://nca.gov.sa) was the NCA homepage shell (redirects to nca.gov.sa/ar/) and prior title
  ("Dustman Wiper Advisory") was invented — neither pointed to the report. The genuine primary
  is the 22-page NCSC/NCA "Destructive Attack 'DUSTMAN' Technical Report (TLP:WHITE)"; the
  nca.gov.sa copy has link-rotted, so url now points to a faithful public mirror
  (lastwatchdog.com), captured as a 1,168,094-byte PDF (sha256 03a60ace…). Load-bearing
  verbatim carried by this snapshot: malware "DUSTMAN ... detonated on December 29, 2019";
  "can be considered as a new variant of 'ZeroCleare' malware" and is distinct from Shamoon
  though "they all use the same third-party driver 'Eldos RawDisk'"; initial access assessed
  "with moderate confidence ... by exploiting one of the remote execution vulnerabilities in a
  VPN appliance that was disclosed" with compromise "few months prior"; distribution via domain
  admin/service accounts and "the anti-virus management console service account ... PSEXEC";
  loader is a "modified ... Turla Driver Loader (TDL)" that "exploits a vulnerable legitimate
  signed driver to bypass Window's Driver Signature Enforcement (DSE)". ATTRIBUTION (critical):
  the report leaves it "still not determined," assessing only "possibly an act of one nation
  state actor" — it names NEITHER Iran NOR APT34. published_on kept 2020-01-09 (public-
  disclosure alignment; no explicit date stamp inside the PDF). Cited only by the Bapco event.

