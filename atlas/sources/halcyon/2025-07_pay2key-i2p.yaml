notes: |
  DATE CORRECTED (2026-07-11, claude-opus-4.8/max): published_on was 2025-07-15 (an error). This
  "Back, Back Again" article is Halcyon's + Beazley Security's write-up of a Q1-2026 incident — its
  body says "In late February, Beazley Security's Incident Response team responded to a ransomware
  intrusion at a U.S. healthcare organization," "Beazley Security Incident Response handled a Pay2Key
  intrusion ... in February 2026," "The Q1 2026 intrusion," and dates the breach to "the start of the
  Israel-US-Iran conflict in 2026." It also reports post-July-2025 growth ("more than $8M ... up to
  170 victims ... since July 2025"). No machine-readable byline in the (Webflow) HTML; earliest
  Wayback capture is 2026-03-24, used as published_on. It CORROBORATES the July-2025 figures it
  recaps: "Renewed activity ... documented by Morphisec in July 2025, with researchers tracking at
  least 51 successful ransom payouts across a four-month stretch in the summer of 2025, totaling more
  than $4 million," and "increasing their ransom profit sharing program to 80% from a previous 70%
  denomination in July of 2025." (Note: the source-record id slug "2025-07" is now a misnomer for a
  2026-03 article — id left unchanged to avoid breaking FKs; flag for orchestrator.)
  AUDIT (2026-06-24, claude-opus-4.8/max): cited to support Pioneer Kitten's service placement. Does
  NOT name the IRGC ("IRGC"/"Revolutionary Guard" = 0 hits anywhere in the page — body, meta, or
  JSON). The article calls Pay2Key "an Iranian government-linked threat actor" targeting "victims
  aligned with Iranian state interests," and cites the CISA advisory "explicitly attributing Pay2Key
  as an Iranian-based threat actor"; it tracks the group as "Fox Kitten, Pioneer Kitten, UNC757,
  Parasite, RUBIDIUM, and Lemon Sandstorm." "Iranian government-linked"/"Iranian state interests" —
  no IRGC — contributed to demoting the actor to ir/unscoped/pioneer-kitten.
  Title corrected this audit: the prior AUSPEX title "Pay2Key.I2P — IRGC-Aligned Ransomware-as-a-
  Service Resurgence" was an editorial embellishment; the page's own <title>/og:title is "Pay2Key
  Iranian-Linked Ransomware is Back, Back Again" and the word "IRGC" does not appear in the source.
