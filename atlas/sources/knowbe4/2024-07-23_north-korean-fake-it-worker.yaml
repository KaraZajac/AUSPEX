notes: |
  KnowBe4 (security awareness training vendor) published a
  candid disclosure of having unknowingly hired a DPRK IT
  worker for a US-based principal software engineer role.
  Identity verification was passed via stolen US-citizen
  identity and stock-photo headshot enhanced with AI; the
  hire was detected when the company-issued Mac began
  loading malware on first boot from the laptop-farm
  hosting address. Canonical public case study of the
  IT-worker fraud detection lifecycle from the victim
  organization's perspective.
