notes: |
  Contemporaneous report (citing state news agency WAM) of the UAE
  Cabinet decision, chaired by Sheikh Mohammed bin Rashid Al Maktoum
  at a Cabinet meeting on Sunday 29 Nov 2020, to approve the formation
  of a national cyber-security council. Verbatim mandate: the new
  council "must develop a comprehensive cyber-security strategy and
  help create a safe and strong cyber infrastructure in the UAE ...
  develop a legal and regulatory framework to cover all types of
  cyber-crimes, secure existing and emerging technologies and establish
  a robust National Cyber Incident Response Plan to enable swift and
  co-ordinated response to cyber incidents in the country."
