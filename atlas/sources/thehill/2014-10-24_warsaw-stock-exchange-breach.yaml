notes: |
  Contemporaneous breach report (byline "Cory Bennett - 10/24/14").
  Carries the WSE-specific facts: "Hackers breached the Warsaw Stock
  Exchange Thursday, exposing login credentials for dozens of brokers
  in apparent retaliation for the bombing campaign against the Islamic
  State in Iraq and Syria (ISIS)." Names the poster handle
  "JAN_URBANOWICZ", who "put up the email, login and password
  information for 41 people it claimed were stock brokers", including
  employees of Bank of America, JPMorgan, Morgan Stanley and Credit
  Suisse. Verbatim persona message: "Today we HACKED Warsaw Stock
  Exchange! It's just a beginning of the FIGHT against those who're
  bombing our Homeland!" Live thehill.com URL returns HTTP 403 to
  automated fetch; snapshot captured from the Internet Archive.
