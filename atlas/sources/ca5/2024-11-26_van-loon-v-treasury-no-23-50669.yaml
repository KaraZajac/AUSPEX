notes: |
  Fifth Circuit panel opinion partially reversing the Tornado Cash
  SDN designation. AUDIT (2026-07-01, claude-opus-4.8/max): created
  to source the outcome-tail claims of event 2022-08/tornado-cash-
  sanctions that the 2022 Treasury release (jy0916) cannot carry —
  the SDN designation of Tornado Cash "smart contracts", their
  immutability, and the Nov-2024 partial vacatur. Verbatim support
  (raw snapshot pdftotext, sha256 6f5274a8…f06d376dd3, 562,945 bytes):
  "By adding Tornado Cash to the list of Specially Designated National
  and Blocked Persons (SDN), OFAC imposed an across-the-board
  prohibition against any dealings with Tornado Cash 'property,' which
  OFAC defined to include open-source computer code known as 'smart
  contracts.'"; the smart contracts offer "immutability (as the
  software code is unownable, uncontrollable, and unchangeable—even by
  its creators)"; holding "we hold that Tornado Cash's immutable smart
  contracts (the lines of privacy-enabling software code) are not the
  'property' of a foreign national or entity, meaning (1) they cannot
  be blocked under IEEPA, and (2) OFAC overstepped its congressionally
  defined authority. … We REVERSE and REMAND to the district court
  with instructions to grant Van Loon's motion for partial summary
  judgment based on the Administrative Procedure Act." Also recounts
  the DPRK/Lazarus laundering predicate ("North Korea, through … the
  Lazarus Group, has hacked and stolen just shy of one billion
  dollars' worth of cryptocurrency").
