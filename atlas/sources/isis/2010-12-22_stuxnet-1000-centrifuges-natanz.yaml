notes: |
  AUDIT (2026-07-05, claude-opus-4.8/max): David Albright, Paul Brannan
  & Christina Walrond, ISIS Report. Primary analytical origin of the
  "~1,000 IR-1 centrifuges" figure — verbatim: "In late 2009 or early
  2010, Iran decommissioned and replaced about 1,000 IR-1 centrifuges
  in the Fuel Enrichment Plant (FEP) at Natanz, implying that these
  centrifuges broke." Ties the breakage to Stuxnet's IR-1 / Siemens
  S7-315 / frequency-converter targeting, while hedging exact
  causation: "Stuxnet's exact purpose or its overall effect on the FEP
  remains hard to determine." Snapshotted from isis-online.org (HTTP
  200, PDF v1.5, 10 pp, 493,154 bytes, sha256 84855f3e…6def0c87).
  Added by the 2026-07-05 audit of event 2010-06/stuxnet-natanz to
  source-carry the centrifuge count (was previously implied only by the
  bot-walled NYT/Sanger citation).
