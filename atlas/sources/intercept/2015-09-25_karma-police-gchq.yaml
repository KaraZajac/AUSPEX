notes: |
  Snowden-archive disclosure of GCHQ's KARMA POLICE programme:
  a bulk web-browsing-pattern dragnet aiming for "a web browsing
  profile for every visible user on the internet," resolving IPs
  to the websites they visit and (via cookies) to identities.
  Collection is via GCHQ probes on the international fiber-optic
  cables; data flows into the BLACK HOLE metadata repository.
  Companion systems named in the disclosure include MUTANT BROTH
  (cookie/IP resolution against BLACK HOLE), MARBLED GECKO
  (Google Maps queries), INFINITE MONKEYS (web-forum content),
  SOCIAL ANTHROPOID, SAMUEL PEPYS and BLAZING SADDLES (analytic
  tools), all part of a documented pre-2014 GCHQ analytic
  ecosystem.

