notes: |
  Snowden-archive disclosure of GCHQ's KARMA POLICE programme:
  a bulk web-browsing-pattern dragnet linking specific IPs to
  the websites they visit and (where possible) to specific
  identities, run by GCHQ Bude on TEMPORA bearer feed. By 2012
  KARMA POLICE held approximately 1.1 trillion web-browsing
  events. Companion programmes named in the disclosure include
  BLACK HOLE (metadata storage), MUTANT BROTH (cookie-to-IP
  resolution), MARBLED GECKO (Google Maps queries), and INFINITE
  MONKEYS (web-forum content), all part of a documented
  pre-2014 GCHQ analytic ecosystem.
