notes: |
  Stable slug retained for backward compatibility. The original
  Intercept URL (great-sim-heist) was an unrelated 2015-02 piece;
  the canonical Snowden-era Regin / Five-Eyes attribution was the
  Der Spiegel piece of 2015-01-27 (with Kaspersky's QWERTY-Regin
  module comparison published the same day at
  https://securelist.com/comparing-the-regin-module-50251-and-the-qwerty-keylogger/68525/).
  URL repointed to the Der Spiegel article 2026-05-28.
  AUDIT (2026-06-25, claude-opus-4.8/max): supports the uk/gchq placement of
  uk/gchq/regin-operators — this source explicitly names GCHQ AND ties the Regin
  platform to it. "Ronald Prins, head of the Dutch security company Fox IT, which
  analyzed the attack on Belgacom, told SPIEGEL ONLINE in the summer of 2011 that
  Regin appeared to be a tool belonging to the NSA and GCHQ." Also: "And Belgacom,
  as SPIEGEL reported in the summer of 2013, was a target of the British
  intelligence agency GCHQ." and a captioned slide: "A slide from a 'top secret'
  presentation by Britain's GCHQ intelligence agency." Raw snapshot is the Der
  Spiegel article body (Regin x24 / GCHQ x5 / NSA x8 / Five Eyes x3 / Belgacom x7
  / QWERTY x6 in visible text); content_sha256 recorded for integrity.
