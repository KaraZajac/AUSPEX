notes: |
  Cumulative SIDtoday release series covering TAO sub-units, SCS,
  Special Source Operations, and operational tradecraft.
  AUDIT (2026-06-25, claude-opus-4.8/max): captured. The snapshot is the series LANDING/index page
  ("SIDtoday is the internal newsletter for the NSA's most important division, the Signals
  Intelligence Directorate"; NSA ×8), so it names the NSA but is light on TAO (×1) and silent on
  "Equation" (×0) at the index level — the TAO-sub-unit detail lives in the linked individual
  newsletter batches, not this top page. Corroborating NSA context for us/nsa/equation-group, not
  the load-bearing Equation↔NSA link.
  AUDIT (2026-06-25, claude-opus-4.8/max, re: us/nsa/tao-sub-units): same captured snapshot (sha256
  unchanged, re-verified). Corroborates the us/nsa/tao-sub-units actor (NOT load-bearing): names the
  NSA ("the internal newsletter for the NSA's most important division, the Signals Intelligence
  Directorate"; NSA ×11) and names TAO once via a listed newsletter — "Getting the 'Ungettable'
  Intelligence: An Interview with TAO's Teresa Shea" (then TAO chief). Index page is light on
  sub-unit detail (TAO ×1, Tailored Access ×0); the load-bearing TAO naming is the Spiegel ANT source.
