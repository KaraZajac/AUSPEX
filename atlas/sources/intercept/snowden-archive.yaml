  Top-level reference for the Snowden archive (rolling SIDtoday
  releases).

  AUDIT (2026-06-25, claude-opus-4.8/max): Re-fetched (HTTP 200) and
  hashed for the uk/gchq/cne-actor service-placement audit. This is the
  SIDtoday landing/index page — "SIDtoday is the internal newsletter for
  the NSA's most important division, the Signals Intelligence
  Directorate." It is a generic archive index and names NO specific GCHQ
  operation; it provides background/provenance for the Snowden corpus
  only, not a GCHQ service attribution. (The GCHQ service placement rests
  on the Guardian/TEMPORA and Intercept/Operation-Socialist sources, which
  name GCHQ directly.)
