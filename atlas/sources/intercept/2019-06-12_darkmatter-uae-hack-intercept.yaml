notes: |
  The Intercept (Sam Biddle and Matthew Cole) reports that operatives
  inside DarkMatter's UAE covert-hacking program Project Raven discussed
  targeting The Intercept itself and breaching its employees' computers,
  in retaliation for the outlet's 2016 reporting (by Jenna McLaughlin)
  that first exposed the CyberPoint / DarkMatter–UAE connection. The
  account rests on two sources — an anonymous member of the hacking team
  who says they were present in a Project Raven conference room when the
  attack was discussed, and a second source who said the discussion
  included DarkMatter executive Marc Baier — plus on-record corroboration
  from Jonathan Cole, an ex-Raven targeting employee. The Intercept could
  not find evidence an attack was carried out ("would have happened in
  2016"); a third source was unaware of any attempt. Reinforces the
  regime-protection-surveillance pattern (journalists-in-exile pillar —
  the pillar's canonical case, Rori Donaghy, is cited here as a Raven
  target) and the contractor-personnel pillar (ex-NSA/US veterans staffed
  into DarkMatter for the NESA / later SIA client).

