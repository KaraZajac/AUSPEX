title: |
  Team of American Hackers and Emirati Spies Discussed Attacking
  The Intercept
url: https://theintercept.com/2019/06/12/darkmatter-uae-hack-intercept/
archive_url: null
published_on: 2019-06-12
retrieved_on: 2026-05-28
tier: secondary
notes: |
  The Intercept reports — based on testimony from ex-DarkMatter
  operator Lori Stroud and corroborating internal documents — that
  Project Raven operators inside DarkMatter discussed targeting
  The Intercept itself (specifically reporters covering UAE
  affairs) following the publication's coverage of Reuters'
  Project Raven series. Direct first-person account of intra-
  Project-Raven targeting deliberation around US-journalist
  targets. Reinforces the regime-protection-surveillance doctrine
  pattern (journalists-in-exile pillar) and adds a US-persons
  dimension to the contractor-personnel pillar that informs the
  later DOJ DPA (September 2021) finding on operators continuing
  after FBI notification.
