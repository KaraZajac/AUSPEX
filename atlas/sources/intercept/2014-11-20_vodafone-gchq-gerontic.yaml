notes: |
  Ryan Gallagher's Snowden-archive report (The Intercept, 20 Nov 2014),
  published alongside the joint Channel 4 News / Süddeutsche Zeitung / WDR
  disclosure of the Cable & Wireless (codename GERONTIC) cable-tap
  partnership with GCHQ.

  AUDIT (2026-06-25, claude-opus-4.8/max): Captured (HTTP 200) and hashed as
  the canonical primary source for the 2014-11/cable-wireless-gchq-partnership
  event, which previously cited only a Belgacom/BICS Der Spiegel story that
  does not mention Cable & Wireless or GERONTIC. Verbatim support in the raw
  snapshot (sha256 0b0173ff…): GCHQ "designated it the codename Gerontic"
  (Cable & Wireless); "In July 2012, the multinational phone company Vodafone
  bought Cable & Wireless for about $1.5 billion"; the cable "access point"
  for GCHQ "was named Nigella and located near an agency surveillance base in
  Bude, Cornwall"; "The British government paid Cable & Wireless more than £5
  million ($9 million) of taxpayers' money as part of an annual lease for GCHQ
  to access the cables"; "in February 2009 a GCHQ employee was assigned to work
  within Cable & Wireless in a 'full-time project management' role"; "The latest
  details about the extent of the spying were revealed on Thursday by the British
  Channel 4 News, the German newspaper Süddeutsche Zeitung, and the German
  broadcaster WDR." Term counts in snapshot: Vodafone x50, GCHQ x33, Nigella x2,
  Gerontic x1, Bude x1, Süddeutsche x2.
