notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): Re-fetched (HTTP 200) and
  hashed for the uk/gchq/cne-actor service-placement audit. The article
  attributes the Belgacom hack to GCHQ explicitly and at the named-op
  level — "documents from National Security Agency whistleblower Edward
  Snowden confirmed that British surveillance agency Government
  Communications Headquarters was behind the attack, codenamed Operation
  Socialist"; "the secret GCHQ hacking operation." This is genuine
  Computer Network Exploitation by GCHQ. IMPORTANT for this audit: the
  uk/gchq/cne-actor record explicitly DISCLAIMS Operation Socialist
  ("operations ... that are not specifically attributable to the Op
  Socialist or Regin operator clusters"), so this source corroborates
  GCHQ-as-CNE-operator in general but documents a DIFFERENT (more
  specific) cluster than the generic actor it is cited under. Retained as
  org-level corroboration that GCHQ conducts named CNE operations.
