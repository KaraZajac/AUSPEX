notes: |
  Ryan Gallagher's February 2018 retrospective on the Belgian criminal
  investigation (code-named "Trinity") into the GCHQ Belgacom intrusion.
  Added + snapshotted 2026-07-11 (claude-opus-4.8/max) during the audit of
  2010-05/operation-socialist-belgacom, to snapshot-back the Belgian
  prosecutorial-corroboration claim (the pre-existing
  belgian-prosecutor/2018-02_belgacom-attribution record is url:null /
  unsnapshottable). Corroborates GCHQ authorship — "... GCHQ. The British
  spies hacked into Belgacom employees' computers and then penetrated the
  company's internal systems"; the fake-LinkedIn Quantum-Insert initial
  access — "planting malware on the engineers' computers by luring them to
  a fake version of the LinkedIn website"; and the GCHQ Network Analysis
  Centre as the operating unit — "a GCHQ unit called the Network Analysis
  Centre had hacked into the computers of three Belgacom engineers."
  IMPORTANT for the date audit: as of Feb 2018 the Belgian forensic
  evidence "pointed toward the U.K., but it was not conclusive and could
  still be denied," and no prosecution had followed (headline: "... Got
  Away With It") — i.e. Feb 2018 was NOT a formal Belgian government
  attribution. Term counts vs recorded snapshot (sha256 9f42e6b0…):
  GCHQ x26, Belgacom x49, prosecutor x7, British x20, investigation x19.
