  CloudSEK TRIAD ("An Insider Look At The IRGC-linked APT35
  Operations: Ep1 & Ep2") — English-language analyst breakdown of
  the KittenBusters GitHub leak. Byline October 7, 2025.

  AUDIT (2026-07-11, claude-opus-4.8/max): raw HTML captured + hashed
  (sha256 8f9bf0f8…208a9e0f, 194,561 bytes). Carries: (i) a
  LEGITIMACY assessment — "CloudSEK analyzed a dataset that appears to
  be a credible leak of Charming Kitten (APT35) operational
  materials," with "High Confidence Indicators" (Persian-language
  internal documentation 100+ files; Jalali dates 1402/1403;
  operational hours aligned to Tehran timezone; target selection
  matching Iranian intelligence priorities; infrastructure/TTP
  consistency with APT35); (ii) the internal ORG STRUCTURE with
  PSEUDONYMOUS/first-name operators (Mehdi Sharifi, Esmaeil Heydari,
  Vahid Molavi, Amir Hossein Aminejad, "Ali", "Mohammad", "Hossein/HSN",
  "Majid/MJD") and an "Administrative Contracts" department; (iii)
  tradecraft (day-1 CVE-2024-1709/ConnectWise exploitation, Telerik/PHP
  CVEs, custom RTM RAT, EDR evasion) and (iv) victimology (Jordan
  Ministry of Justice, Saudi Council of Ministers, Air Arabia, WISE
  University, Qistas/IBLaw legal firms). NB CloudSEK does NOT name
  "Abbas Rahrovi", the front companies, personnel photographs, or
  "Department 40 / Unit 1500" — those come from the GitHub leak README
  and Nariman Gharib (both now cited). Prior notes claiming CloudSEK
  "identifies alleged unit leader Abbas Rahrovi and the front-company
  network" were WRONG (misattributed Gharib/GitHub content to CloudSEK)
  and are corrected here. Leak source/motive unknown per all analysts.
