notes: |
  Hackread, July 1 2022 — early-wave coverage of the Sebastien
  Raoult ("Sezyo") Morocco arrest. ADDED 2026-07-10
  (claude-opus-4.8/max) to carry the biographical detail for event
  2022-05/raoult-arrest-morocco. Verbatim (raw snapshot sha256
  7d2f00d9...9f2ad034, 259,448 bytes): "The 21-year-old Raoult from
  Epinal was a computer science student."; "Apart from Raoult, four
  other French residents were questioned upon the request of the
  FBI." SCOPE/CAVEAT: this article dates the arrest to "arrested on
  June 1st 2022 from the Rabat international airport" — an OUTLIER by
  one day; the adopted arrest date is 31 May 2022 (DOJ extradition
  PR: "arrested last year in Morocco"; SecurityAffairs: "arrested ...
  on May 31, 2022"). Cited only for the computer-science-student
  biographical detail and the FBI-request framing, NOT for the arrest
  date.
