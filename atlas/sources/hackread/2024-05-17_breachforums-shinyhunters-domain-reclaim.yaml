notes: |
  Hackread (Waqas), May 17 2024. Source for the dark-web (onion)
  domain and the rapid domain-reclamation timeline; frames the
  recovery as ShinyHunters' own (unverifiable) claim.
  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured;
  content_sha256 recorded (257,294 bytes). Verbatim: "On May 15,
  2024, all domains associated with Breach Forums were defaced with
  a seizure notice by the FBI."; "regained access to the forum's
  clear net and dark web domains on May 16, 2024. This also included
  the Escrow domain and a parked domain, Breached.in."; "on Friday,
  ShinyHunters contacted the domain registrar of Breach Forums and
  successfully regained access ... the seizure notice from the clear
  net domain of Breach Forums was removed, and it was replaced with
  a 'Site Temporarily Unavailable' message."; "ShinyHunters revealed
  that one of the Breach Forums' administrators, operating under the
  alias Baphomet, had been apprehended by law enforcement." Hackread
  states it "cannot verify" ShinyHunters' claims. Corroborates the
  onion-site seizure (not stated in the TheHackerNews body) and the
  ~24h domain-reclaim vs the later full operational restoration.
