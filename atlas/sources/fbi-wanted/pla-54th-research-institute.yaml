notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): independently corroborates the
  cn/pla/54th-research-institute service placement of actor cn/pla/54th-ri-equifax at the
  named-unit level. FBI Wanted page (live curl, 200, 79 KB) names the unit verbatim: "The
  defendants were members of the 54th Research Institute, which was a component of the People's
  Liberation Army ("PLA"), the armed forces of the People's Republic of China." and ties them
  to Equifax: "...members of the 54th Research Institute conspired with each other to hack into
  the protected computers of Equifax, to maintain unauthorized access to those computers, and
  to steal sensitive personally identifiable information..." The four charged officers (Wang
  Qian, Xu Ke, Liu Lei, Wu Zhiyong) are named in the indictment caution.
