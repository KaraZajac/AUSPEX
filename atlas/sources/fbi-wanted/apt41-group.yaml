notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): does NOT name the MSS or any
  Chinese service. Describes the actor only as "a Chinese hacking group known
  as APT 41 and BARIUM" and the defendants as "Chinese nationals" who conducted
  intrusions "while employed by Chengdu 404 Network Technology Company." No
  "Ministry of State Security" / "MSS" string anywhere in the page. Therefore
  not the basis for the cn/mss placement (that rests on the Sept 2020 DOJ
  release). raw_snapshot is the archive.org capture (live fbi.gov 403s WebFetch
  and renders only partially to curl; the partial curl render and the archive
  capture agree — both 0 MSS mentions); content_sha256 over that snapshot.
