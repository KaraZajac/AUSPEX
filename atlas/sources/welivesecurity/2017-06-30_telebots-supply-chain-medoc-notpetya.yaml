notes: |
  ESET / WeLiveSecurity first-hand telemetry analysis (Anton Cherepanov &
  Robert Lipovsky, 30 Jun 2017) of the NotPetya / Diskcoder.C outbreak,
  attributing it to the TeleBots group (ESET's name for the Sandworm/
  BlackEnergy cluster). This is the canonical technical primary for the
  M.E.Doc supply-chain vector and the EternalBlue + Mimikatz + PsExec
  propagation mechanism used in the event outcome_summary.

  Supporting quotes (verbatim):
  - "Based on our ESET LiveGrid® telemetry, the malware was created right
    after execution of the M.E.Doc software that is widely used by
    accounting personnel in Ukraine."
  - "we identified a malicious PHP backdoor that was deployed under
    medoc_online.php in one of the FTP directories on M.E.Doc's server."
  - "Once the malware is executed it attempts to spread using the infamous
    EternalBlue exploit, leveraging the DoublePulsar kernel-mode backdoor.
    Exactly the same method was used in the WannaCryptor.D ransomware."
  - "Plainpwd (modified Mimikatz used for recovering Windows credentials
    from memory)" and "SysInternals' PsExec (used for lateral movement)."
  ESET names the TeleBots/Sandworm group (BlackEnergy lineage) but makes
  no formal nation-state attribution in this post.

  AUDIT (2026-07-10, claude-opus-4.8/max): created during the NotPetya
  event audit; the White House and DOJ sources carry the attribution but
  NOT the M.E.Doc/EternalBlue/Mimikatz technical vector, so this primary
  was added to source-carry it. Fetched live (HTTP 200); published date
