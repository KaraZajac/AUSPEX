notes: |
  ESET's first-hand telemetry-based analysis of the BadRabbit outbreak (Marc-Etienne M.Léveillé,
  24 Oct 2017; UPDATE 27 Oct 2017). ESET names the malware Win32/Diskcoder.D.

  Supporting quotes (verbatim):
  - "A new ransomware outbreak today and has hit some major infrastructure in Ukraine including
    Kiev metro."
  - "One of the distribution method of Bad Rabbit is via drive-by download. Some popular websites
    are compromised ... a popup asking to download an update for Flash Player is shown ... download
    of an executable file from 1dnscontrol[.]com is initiated."
  - "Win32/Diskcoder.D is modified version of Win32/Diskcoder.C." (Diskcoder.C = Not-Petya)
  - "As opposed to some public claims, it does not use the EternalBlue vulnerability like the
    Win32/Diskcoder.C (Not-Petya) outbreak." + UPDATE (27 Oct): "EternalRomance ... has been used
    to spread Diskcoder.D in the network."
  - Dropper telemetry distribution: "Russia: 65% / Ukraine: 12.2% / Bulgaria: 10.2% / Turkey: 6.4%
    / Japan: 3.8% / Other: 2.4%."
  - "It is possible that the group already had a foot inside their network and launched the watering
    hole attack at the same time as a decoy."
  ESET links BadRabbit to NotPetya by code (Diskcoder.D = modified Diskcoder.C) but names NO threat
  actor / nation (no Sandworm, TeleBots, BlackEnergy, GRU).

