notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): supports an Iran nexus for BladedFeline but NO service.
  ESET calls it "an Iran-aligned cyberespionage group" and assesses "with medium confidence that
  BladedFeline is a subgroup of OilRig, an Iran-aligned APT group going after governments and businesses
  in the Middle East." The article never names MOIS, the Ministry of Intelligence, the IRGC, or any
  specific Iranian service (verified: 0 occurrences of "MOIS"/"Ministry of Intelligence"/"IRGC"/
  "Revolutionary Guard" in the captured raw; 8 of "Iran-aligned"). Consequently the actor was demoted
  from ir/mois/bladedfeline to ir/unscoped/bladedfeline. Verbatim attribution: "We assess with medium
  confidence that BladedFeline is a subgroup within OilRig." OilRig linkage basis: "When we compare
  PrimeCache with RDAT ... we see several similarities that support our supposition that BladedFeline is
  a subgroup of OilRig." Title corrected to ESET's own ("BladedFeline: Whispering in the dark"); the
  prior title was the backfill's descriptive paraphrase. raw_snapshot captured 2026-06-24 (HTTP 200,
  153,978 bytes).
