notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Captured raw live HTML (HTTP 200, 121,797 bytes;
  curl, Mozilla research UA). On-page <title> is "Operation FishMedley targeting governments,
  NGOs, and think tanks" and the meta description calls FishMonger "the China-aligned APT group
  FishMonger" (the AUSPEX-curated title above adds the "(I-SOON)" parenthetical for the catalog).

  Used to verify the cn/mss/fishmonger SERVICE placement. Finding: ESET attributes FishMonger only
  at the nation/contractor level and names NO Chinese intelligence/security service as FishMonger's
  principal — verbatim:
    - "During our research, we were able to independently determine that FishMonger is an espionage
       team operated by I-SOON, a Chinese contractor based in Chengdu that suffered an infamous
       document leak in 2024."
    - "FishMonger - a group believed to be operated by the Chinese contractor I-SOON ... falls under
       the Winnti Group umbrella and is most likely operating out of China, from the city of Chengdu
       where I-SOON's office was located."
    - "We assess with high confidence that Operation FishMedley was conducted by the FishMonger APT
       group. Independent of the DOJ indictment, we determined that FishMonger is operated by I-SOON."

  MSS-vs-MPS: the ONLY government service named anywhere in the article is the Ministry of PUBLIC
  Security (MPS), and only as the DOJ's framing of the indicted I-SOON personnel — verbatim: "the US
  Department of Justice published a press release and unsealed an indictment against I-SOON employees
  and officers of China's Ministry of Public Security involved in multiple espionage campaigns from
  2016 to 2023." MPS (公安部 / Gonganbu) is NOT the MSS (国家安全部 / Guoanbu) the actor was filed under,
  so the cn/mss placement was a direct mismatch; raw HTML contains zero occurrences of "state
  security"/"MSS"/"Guoanbu" in any form. Because ESET does not tie the FishMonger cluster itself to
  any service (the MPS mention is second-hand DOJ framing of I-SOON), the actor was DEMOTED to
  cn/unscoped/fishmonger rather than switched to MPS, and the MPS reference flagged in the actor notes.
