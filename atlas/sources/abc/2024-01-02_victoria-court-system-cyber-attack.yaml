notes: |
  Origin of the public Qilin attribution for the Court Services
  Victoria incident. Verbatim: "Independent cyber security expert
  Robert Potter, who has seen evidence of the attack, said the court
  system had almost certainly been hit by a Russian phishing attack,
  using commercial ransomware known as Qilin. 'It's a double
  extortion approach,' he said. 'They take the data out, and then
  encrypt it. If you don't pay, they leak your data, and you will
  never access it.'" NOTE: the attribution voice is an independent
  expert relayed by ABC — CSV itself named no actor, and no Qilin
  leak-site claim existed. Also carries: discovery on 21 December
  ("staff were locked out of their computers and messages appeared on
  screens reading 'YOU HAVE BEEN PWND'"; the message directed staff
  to a text file threatening to publish stolen files, with a dark-web
  address for recovery instructions); "recordings of hearings
  including witness testimony from highly sensitive cases may have
  been accessed or stolen"; County Court worst affected, "including
  at least two cases involving historical and child sexual abuse";
  Acting Premier Ben Carroll: "this attack has essentially been
  confined, and all court cases, all hearings, all evidence, all
  procedure is thoroughly protected". Published 2024-01-02 06:59 AEDT
