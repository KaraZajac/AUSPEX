notes: |
  ABC News (US) report on JBS's own June-9-2021 disclosure of the
  ransom, added 2026-07-10 (claude-opus-4.8/max audit) as the
  carrying source for the USD 11M payment (the FBI statement does
  not state it). Verbatim: JBS "paid the ransom ... the company
  announced Wednesday night" and "'This was a very difficult
  decision to make for our company and for me personally,' JBS USA
  CEO Andre Nogueira said in a statement. 'However, we felt this
  decision had to be made to prevent any potential risk for our
  customers.'" Payment made in bitcoin; USD 11M figure attributed to
  the company. Confirms the payment was publicly CONFIRMED on
  June 9 (the payment itself was made earlier, after most plants had
  resumed — see the cybersecuritydive/WSJ sourcing).
