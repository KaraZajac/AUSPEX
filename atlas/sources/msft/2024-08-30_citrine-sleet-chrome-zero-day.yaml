  MSTIC attribution of CVE-2024-7971 (V8 type-confusion) RCE
  campaign to Citrine Sleet. FudModule rootkit (admin-to-kernel,
  previously seen on Diamond Sleet). Crypto-employee targeting via
  voyagorclub[.]space exploit domain.

  AUDIT (2026-06-24, claude-opus-4.8/max): NAMES THE DPRK SERVICE for Citrine Sleet — verbatim:
  "Citrine Sleet is tracked by other security companies as AppleJeus, Labyrinth Chollima, UNC4736,
  and Hidden Cobra, and has been attributed to Bureau 121 of North Korea's Reconnaissance General
  Bureau." Body also: "The threat actor that Microsoft tracks as Citrine Sleet is based in North
  Korea and primarily targets financial institutions, particularly organizations and individuals
  managing cryptocurrency, for financial gain." This is the source that anchors the KEEP of
  kp/rgb/citrine-sleet under the RGB (and the sub-bureau correction to kp/rgb/bureau-121).
