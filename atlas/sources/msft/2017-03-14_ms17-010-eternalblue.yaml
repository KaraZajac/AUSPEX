notes: |
  Microsoft's patch addressing the SMBv1 vulnerabilities later
  weaponized as EternalBlue (Shadow Brokers leak, April 2017) and
  used in WannaCry, NotPetya, and Bad Rabbit.
  AUDIT (2026-07-11, claude-opus-4.8/max): sha256 re-verified MATCHING (33b85a5e...a84449e2).
  Now also cited by event 2017-05/wannacry as the primary anchor for CVE-2017-0144 (x6 in
  the raw bulletin) and the 2017-03-14 patch (-> initial_vector n-day; exploited May 2017).
  NB the raw bulletin does NOT contain the strings "EternalBlue"/"DoublePulsar"/"NSA"/
  "Shadow Broker" — those are analyst-note framing here, not source text.
