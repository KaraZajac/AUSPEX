notes: |
  Microsoft MSTIC reporting on the DPRK IT-worker scheme under the
  Jasper Sleet designation (formerly Storm-0287). Documents the
  evolution from wage-fraud toward insider data theft (IP, source
  code, trade secrets) and extortion.

  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured +
  hashed (sha256 d82f0ff4…0ad0cbf6, 328,538 bytes). Article verified
  as the real Jasper Sleet report (not a phantom). Microsoft names
  ONLY the proximate purpose — "revenue generation scheme for the
  North Korean government", "generate revenue for the North Korean
  regime, which violates international sanctions", "generate revenue
  and support state interests" — and NOWHERE states the terminal WMD /
  ballistic-missile-financing goal (zero occurrences of WMD / missile /
  ballistic / nuclear). Report does NOT mention TraderTraitor,
  cryptocurrency, or crypto-firm targeting; and it explicitly states
  Microsoft had NOT observed combined AI voice-and-video (real-time
  deepfake interviews) firsthand — that is framed only as a future
  risk. Prior notes ("post-termination", "insider-espionage vector")
  overstated the source and were corrected here.
