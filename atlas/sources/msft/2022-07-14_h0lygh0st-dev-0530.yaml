notes: |
  Microsoft MSTIC introduction of the DEV-0530 / H0lyGh0st
  cluster. Opportunistic SMB ransomware operation; modest
  per-incident revenue (1.2–5 BTC demands).
  AUDIT (2026-06-24, claude-opus-4.8/max): re kp/rgb/h0lygh0st service
  audit — this report attributes H0lyGh0st/DEV-0530 ONLY at the nation
  level and does NOT name the RGB (or Bureau 121 / Unit 121 / Lab 110).
  Exact wording: "A group of actors originating from North Korea that
  Microsoft Threat Intelligence Center (MSTIC) tracks as DEV-0530 has
  been developing and using ransomware in attacks since June 2021." It
  ties DEV-0530 to Andariel/PLUTONIUM ("MSTIC assesses that DEV-0530 has
  connections with another North Korean-based group tracked as PLUTONIUM
  (aka DarkSeoul or Andariel)") but explicitly hedges the state nexus
  itself: "it is equally possible that the North Korean government is not
  enabling or supporting these ransomware attacks. Individuals with ties
  to PLUTONIUM infrastructure and tools could be moonlighting for personal
  gain." The 101 "RGB" string hits in the raw snapshot are CSS color codes
  (rgb()/rgba()/--*-rgb:), NOT the bureau acronym (0 word-form references).
  Result: actor DEMOTED kp/rgb/h0lygh0st -> kp/unscoped/h0lygh0st.
  AUDIT (2026-07-10, claude-opus-4.8/max): re-verified for the
  2022-08/h0lygh0st-ransomware event audit; content_sha256 re-confirmed
  (b11e8464…a244b7c4d7). Raw supports the corrections applied to that event:
  BTLC_C.exe is C++ with "a simple obfuscation method for strings where 0x30 is
  subtracted" (event's "unobfuscated" was wrong); execution is cmd.exe/schtasks,
  NOT PowerShell (only "powershell" hit is the btlc_C PDB build path); CVE-2022-26352
  is only "suspected" ("might have exploited"); and MSTIC reports victims had "not
  successfully extorted ransom payments" as of early July 2022. Confidence downgraded
  high->moderate on the DEV-#### + "equally possible ... not enabling" hedge.
