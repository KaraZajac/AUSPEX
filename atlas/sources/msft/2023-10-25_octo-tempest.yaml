notes: |
  Microsoft's foundational analysis of Octo Tempest (UNC3944,
  Scattered Spider, 0ktapus), tracing the cluster's evolution from
  SIM-swap fraud through hack-for-hire through ransomware affiliation
  (with ALPHV in the MGM/Caesars September 2023 attacks).
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot captured + hashed
  during the audit of event 2023-09/mgm-caesars-alphv. Does NOT name
  MGM or Caesars (0 hits each); its load-bearing role is actor identity
  + TTPs + the ALPHV affiliation. Verbatim: "In mid-2023, Octo Tempest
  became an affiliate of ALPHV/BlackCat, a human-operated ransomware as
  a service (RaaS) operation"; "By June 2023, Octo Tempest started
  deploying ALPHV/BlackCat ransomware payloads ... primarily on VMWare
  ESXi servers"; help-desk vector = "Calling an organization's help desk
  and socially engineering the help desk to reset the user's password
  and/or change/add a multi-factor authentication token/factor."
