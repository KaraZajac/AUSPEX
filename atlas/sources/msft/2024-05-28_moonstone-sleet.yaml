notes: |
  Microsoft MSTIC introduction of Moonstone Sleet (formerly
  Storm-1789). Covers trojanized PuTTY/SumatraPDF, fake-company
  social engineering, DeTankWar game, npm packages, and FakePenny
  ransomware.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the service placement of actor
  Moonstone Sleet (raw captured, HTTP 200, 321,294 bytes; sha256 above). This source attributes
  the cluster ONLY at the nation level and does NOT name the RGB or any DPRK service. Verbatim:
  the actor "is North Korean state-aligned and uses both a combination of many tried-and-true
  techniques used by other North Korean threat actors and unique attack methodologies"; and
  "activity linked to a North Korean state-sponsored threat actor has been detected." The strings
  "Reconnaissance General Bureau", "RGB" (as the unit; the 62 "rgb" hits are CSS rgba() color
  codes), "Bureau 121", "Unit 121", and "Lab 110" do not appear. Consequently the actor was
  demoted kp/rgb/moonstone-sleet → kp/unscoped/moonstone-sleet (DPRK nexus = named-actor level;
  RGB service placement unsourced).
