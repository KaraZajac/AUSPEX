notes: |
  Microsoft Threat Intelligence documents Marbled Dust (Sea Turtle
  / Teal Kurma / UNC1326) exploitation of CVE-2025-27920, a zero-
  day directory-traversal vulnerability in the Srimax Output
  Messenger LAN messaging product, in operations against entities
  associated with the Kurdish military in Iraq. Activity assessed
  to have begun April 2024 against unpatched accounts; Microsoft
  attributes with high confidence to Türkiye-affiliated espionage
  actor. First publicly documented Marbled Dust zero-day operation.
