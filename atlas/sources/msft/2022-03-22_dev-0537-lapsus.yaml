notes: |
  MSTIC's analysis of LAPSUS$/DEV-0537 tradecraft, published the same day the
  group leaked ~37 GB of internal Microsoft source code (250+ projects) via its
  Telegram channel. The blog itself does NOT name Bing/Cortana/Bing Maps (those
  product names come from press coverage of the leaked torrent, not from MSTIC);
  Microsoft states only that "a single account had been compromised, granting
  limited access" and "No customer code or data was involved." First major vendor
  write-up establishing LAPSUS$ TTPs — "phone-based social engineering; SIM-swapping
  to facilitate account takeover; ... paying employees, suppliers, or business
  partners ... for access to credentials and multifactor authentication (MFA)
  approval," Redline password stealer, and purchased credentials/session tokens.
  Snapshot retrieved/hashed 2026-07-10.
