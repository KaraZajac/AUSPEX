notes: |
  Meta's companion technical paper to the "Taking Action Against Hackers in Palestine" post.
  Supporting quotes (PDF, retrieved 2026-06-23): the trojanized iOS chat app is branded
  "MagicSmile"/"Magic Smile" — "the attacker controlled infrastructure promoting the trojanized
  Magic Smile chat application" (p.13); the iOS install-profile PayloadDisplayName is "MagicSmile"
  (p.14); "The embedded provisioning profile present in one of the Magic Smile samples contained 74
  unique device identifiers" (p.15). Attribution: "we attributed with high confidence to Arid Viper";
  on Hamas: "we cannot conclusively confirm this connection based on our evidence" (p.4).
  AUDIT (2026-06-23, claude-opus-4.8/max): this PDF is the primary that NAMES "MagicSmile" (the blog
  post omits it); added so the app name can be restored to the event with a citation.
