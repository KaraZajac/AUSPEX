notes: |
  AUDIT (2026-06-23, claude-opus-4.8/max): Live URL fetched + raw captured. Post is by Mike
  Dvilyanski (Meta Head of Cyber Espionage Investigations), 21 April 2021. CORRECTED the title
  (was the event slug's "...trojanized MagicSmile chat app" — Meta's actual post title is "Taking
  Action Against Hackers in Palestine"; the app name "MagicSmile" does NOT appear in this source).
  CORRECTED published_on 2021-04-01 -> 2021-04-21. KEY: the post covers TWO separate, explicitly
  "unconnected" clusters — (1) a PSS (Preventive Security Service / Palestinian Authority)-linked
  group, and (2) Arid Viper; only #2 is the Phenakite event. Verbatim attribution quote: "Our
  investigation linked this campaign to Arid Viper, a known advanced persistent threat actor."
  Targeting quote: "This activity originated in Palestine and targeted individuals in the same
  region, including government officials, members of the Fatah political party, student groups and
  security forces." iOS-implant quote: "We call this iOS component Phenakite ... trojanized inside
  a fully functional chat application that used the open-source RealtimeChat code." No state
  sponsor is named for Arid Viper in this post.