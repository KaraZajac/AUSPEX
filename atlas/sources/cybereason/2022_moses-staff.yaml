  AUDIT (2026-06-24, claude-opus-4.8/max): IRGC/service finding — Iran nexus YES, named service NO. Captured
  live (curl, HTTP 200, 86,162 bytes) and hashed. Cybereason Nocturnus calls the group "the Iranian hacker
  group known as Moses Staff" / "Iranian APT Moses Staff" (the latter in the title), and states the motive
  verbatim: "State-Sponsored Ransomware: Moses Staff employs ransomware post-exfiltration, not for financial
  gain, but to disrupt operations, obfuscate espionage activity, and to inflict damage to systems to advance
  Iran's geopolitical goals." No IRGC, MOIS, Quds Force, Revolutionary Guard, or any named Iranian
  intelligence service appears anywhere in the document — the "State-Sponsored" subheading describes motive,
  not a service. Supports an Iran nexus but NOT an IRGC/MOIS placement; used as a basis for demoting the
  actor to ir/unscoped/moses-staff.
