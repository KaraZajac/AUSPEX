notes: |
  Cybereason Nocturnus disclosure of a multi-wave campaign by a
  China-affiliated, likely-state-sponsored operator against global
  telecom providers, focused on call-detail-record (CDR) theft tied
  to specific high-value individuals from various countries.
  Tradecraft: modified China Chopper web shell on internet-facing
  IIS, PoisonIvy (PIVY) via DLL side-loading, modified Mimikatz,
  modified nbtscan, HTran tunneling.
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured +
  sha256. CORRECTION to prior notes: the article does NOT attribute
  "with high confidence to APT10". Cybereason's HIGH-certainty
  attribution is at the NATION level — "We've concluded with a high
  level of certainty that the threat actor is affiliated with China
  and is likely state sponsored." The APT10 link is HEDGED: tools/
  techniques "consistent with several Chinese threat actors, such as
  APT10, a threat actor believed to operate on behalf of the Chinese
  Ministry of State Security (MSS)", and the report cautions
  "Attribution is a fickle and delicate art." reGeorg and Cobalt
  Strike do NOT appear in this article (removed from notes); no
  "~10 countries" figure appears (article says "various countries").
  The APT41/GALLIUM overlap is NOT in this source and is uncited.
