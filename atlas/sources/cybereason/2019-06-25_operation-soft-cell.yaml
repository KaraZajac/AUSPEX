notes: |
  Cybereason Nocturnus disclosure of a multi-year campaign by
  PRC-nexus operator(s) against telecom providers in ~10
  countries, focused on call-detail-record (CDR) theft tied to
  specific high-value individuals. Tradecraft includes web-shell
  on internet-facing servers, PoisonIvy, modified Mimikatz, and
  custom credential dumpers, with eventual deployment of NBTScan,
  reGeorg and Cobalt Strike. Cybereason attributes with high
  confidence to APT10 / Stone Panda; some subsequent reporting
  argues the cluster also overlaps with APT41 / Gallium.
