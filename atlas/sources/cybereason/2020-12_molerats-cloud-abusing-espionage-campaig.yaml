notes: |
  Supporting quote: The Cybereason Nocturnus Team has continued tracking the group, and in recent months detected a new campaign leveraging two previously unidentified backdoors dubbed SharpStage, DropBook, as well as a downloader dubbed MoleNet.

  AUDIT (2026-06-23, claude-opus-4.8/max): Live URL fetched + hashed (raw_snapshot). This is first-party original threat research (Cybereason Nocturnus discovered/reverse-engineered SharpStage, DropBook, MoleNet), so re-tiered kind industry->vendor-research and tier secondary->primary to match the corpus convention for first-party vendor research (cf. cybereason/2017-05-25_cobalt-kitty-report). The ungated 25-page full report "Molerats in the Cloud" (dated 2020-12-09) was also fetched + hashed for cross-check (URL https://www.cybereason.com/hubfs/dam/collateral/reports/Molerats-in-the-Cloud-New-Malware-Arsenal-Abuses-Cloud-Platforms-in-Middle-East-Espionage-Campaign.pdf ; sha256 24fd3518a0a8f43a656a3fe01d0a5aa39a386f98b39bbe3379c24b4c9c757f37 ; local copy atlas/sources/raw/cybereason__2020-12_molerats-in-the-cloud-report.pdf, gitignored). The report is the source for the technical claims (.NET / Python backdoors) and the four target countries, which the blog summarizes but does not fully spell out.
  Attribution verbatim (blog + report): "The attacks were attributed to Molerats (aka The Gaza Cybergang), an Arabic-speaking, politically-motivated APT group that has operated in the Middle East since 2012." -- Cybereason names NO government / state sponsor; the report only says the toolsets appear "developed by different teams operating on behalf of similar interests." This corroborates the Palestinian/Gaza nexus as an alias-derived cluster label, not a hard state attribution -- consistent with actor ps/unscoped/molerats.
  Targeting verbatim (report): "high ranking political figures and government officials in the Middle East, including the Palestinian Territories, UAE, Egypt and Turkey." (Turkey is explicitly named -- the event targets[] originally omitted it.)
  Malware verbatim (report): "The SharpStage backdoor is a .NET malware with backdoor capabilities." and "DropBook, a new Python-[based] backdoor".
  Cloud-abuse verbatim (blog): "The newly discovered DropBook backdoor used fake Facebook accounts or Simplenote for command and control (C2), and both SharpStage and DropBook abuse a Dropbox client in order to exfiltrate stolen data as well as for storing their espionage tools." (NB: source says Google Docs / Simplenote, not "Google Drive"; see event-summary correction.)
