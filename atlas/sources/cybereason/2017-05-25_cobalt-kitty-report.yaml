notes: |
  Long-form Cybereason dissection of a year-long APT32 intrusion
  into an Asian conglomerate. Established the "Cobalt Kitty" alias
  and APT32's Cobalt Strike + DNS-tunneling tradecraft fingerprint.
  AUDIT (2026-06-24, claude-opus-4.8/max): Technical report; names NO Vietnamese service
  and does not even commit to nation-state sponsorship. Verbatim: "While there are many
  rumours and speculations circulating in the InfoSec community, at the time of writing,
  there was no publicly available evidence that can confirm that the OceanLotus Group is a
  nation-state threat actor." Provides no support for the TC2 service placement; consistent
  with the demotion vn/tc2/apt32 -> vn/unscoped/apt32. (Quote re-confirmed via WebFetch of
  the live page; the curl raw_snapshot is the technical body. sha256 is of that snapshot.)
