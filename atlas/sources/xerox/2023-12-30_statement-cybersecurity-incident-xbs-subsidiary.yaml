notes: |
  First-party newsroom statement by Xerox ("Dec 30, 2023 — Corporate,
  Norwalk, Conn.") disclosing the security incident at subsidiary Xerox
  Business Solutions (XBS). AUDIT 2026-07-04 (claude-fable-5 / max):
  created during phantom-remediation of event 2023-12/xerox-inc-ransom,
  whose sole prior citation was
  ncsc-uk/2024-03-27_nhs-dumfries-galloway-statement — a different INC
  Ransom victim (wrong-source defect). Verbatim from the snapshot:
  "Recently, Xerox's subsidiary, Xerox Business Solutions, experienced a
  security incident which was detected and contained by Xerox
  cybersecurity personnel. The event was limited to XBS U.S."; "We are
  actively working with third-party cybersecurity experts to conduct a
  thorough investigation into this incident and are taking necessary
  steps to further secure the XBS IT environment."; "The incident had no
  impact on Xerox's corporate systems, operations or data, and no effect
  on XBS operations."; "However, our preliminary investigation indicates
  that limited personal information in the XBS environment may have been
  affected. As per our policy and standard operating procedure, we will
  notify all affected individuals as required." The statement names NO
  perpetrator, gives NO intrusion date beyond "Recently", and never uses
  the word "ransomware".
