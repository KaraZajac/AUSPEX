  Contemporaneous (June 2015) forensic investigative report on the
  Bundestag intrusion (analysis by Claudio Guarnieri), already listed
  in the APT28 actor's misp_refs.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw HTML captured + hashed
  (233,560 bytes). VERBATIM support — attribution: "the infrastructure
  operated by the attackers suggest that the attack was perpetrated by
  a state-sponsored group known as Sofacy (or APT28). Previous work
  published by security vendor FireEye in October 2014 suggests the
  group might be of Russian origin." Implant: "The properties of the
  artifact show that the same authors of the malware seem to have
  called it „Xtunnel". As the same name suggests, the artifact appears
  in fact to act as a tunnel for the attacker to remotely access the
  internal network and maintain persistence." CORRECTS the event's
  prior "X-Agent" claim: the implant documented here is X-Tunnel
  (Xtunnel), not X-Agent — no source names X-Agent for this hack.
