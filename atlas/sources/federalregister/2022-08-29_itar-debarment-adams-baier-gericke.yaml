  Load-bearing text CARRIED verbatim in the snapshot (all verified
  present): "the Department of State has imposed administrative
  debarment under the International Traffic in Arms Regulations (ITAR)
  on Ryan Adams, Marc Baier, and Daniel Gericke"; "Debarment imposed
  as of August 29, 2022"; legal basis "Section 127.7(c)(2) of the ITAR
  authorizes the Assistant Secretary of State for Political-Military
  Affairs to debar any person who has been found pursuant to part 128
  of the ITAR to have committed a violation of the Arms Export Control
  Act (AECA)"; "Between January 2016 and November 2019, Ryan Adams,
  Marc Baier, and Daniel Gericke (``Respondents'') were employed by
  DarkMatter Group (DarkMatter), a privately held technology and cyber
  services company headquartered and organized in the United Arab
  Emirates (UAE) that furnished cyber services to the UAE government";
  the CyberPoint predecessor + transition "in late 2015 and early
  2016, the UAE government transitioned its contracts for cyber
  services from CyberPoint to DarkMatter. During this time period,
  DarkMatter hired certain U.S.-person former managers of CyberPoint,
  including Respondents"; the zero-click systems reaching "tens of
  millions of devices for the UAE government's intelligence purposes";
  the "furnishing defense services under U.S. Munitions List (USML)
  Category XI(d)" framing; and the consent-agreement dates "on July 7,
  2022 (Adams and Baier) and August 5, 2022 (Gericke), the Department
  of State and Respondents entered into Consent Agreements that
  administratively debarred Respondents until July 7, 2025 and August
  5, 2025, respectively." Unlike the sibling DOJ DPA release (which
  anonymizes the employer as "U.A.E. CO"), this notice NAMES DarkMatter
  and CyberPoint directly (DarkMatter 7x, CyberPoint 5x in the raw).
