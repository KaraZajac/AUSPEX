notes: |
  ZachXBT on-chain investigation of the Munchables Blast
  game-finance hack. Identified the attacker as one or more
  DPRK-origin developers hired into the Munchables team
  under a Western pseudonym — the canonical IT-worker-insider
  attack pattern. Attacker subsequently returned the funds
  voluntarily after on-chain identification, but the
  attribution illustrates the supply-chain risk of
  IT-worker placements at Web3 projects.
