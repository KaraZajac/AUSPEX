  RiskIQ's first-party technical analysis of the British Airways
  Magecart breach (original analysis by Yonathan Klijnsma,
  published 2018-09-11 on the RiskIQ Labs blog at
  https://www.riskiq.com/blog/labs/magecart-british-airways-breach/,
  which is no longer reachable since RiskIQ was absorbed into
  Microsoft Defender TI). The snapshotted copy is the verbatim
  republication by RiskIQ's then-CEO Dan Schoenbaum on Medium
  (republication timestamp 2019-03-02); published_on retains the
  original 2018-09-11 RiskIQ date.

  AUDIT (2026-06-30, claude-opus-4.8/max): Raw captured + hashed
  (183,019 bytes). Carries the BA incident specifics: headline
  "How 22 Lines of Code Claimed 380,000 Victims"; "around 380,000
  customers could have been affected" (per BA/BBC); "Payments were
  affected from 22:58 BST August 21, 2018, until 21:45 BST
  September 5, 2018"; the skimmer was a modified Modernizr
  JavaScript library (version 2.6.2) loaded from the baggage-claim
  information page and exfiltrated to a look-alike domain
  (baways.com); "only 22 lines of JavaScript"; attributes the
  breach to the Magecart crime syndicate. Note: the source does
  NOT support a resource literally named "baggageclaim.js" (it was
  a trojanized Modernizr library on the baggage-claim page).
