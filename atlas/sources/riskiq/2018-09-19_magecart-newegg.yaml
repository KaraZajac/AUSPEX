notes: |
  RiskIQ's first-party technical analysis of the Newegg Magecart
  breach (original by Yonathan Klijnsma, published 2018-09-19 on the
  RiskIQ Labs blog, the companion to Volexity's same-day report and
  the report the RiskIQ/Flashpoint "Inside Magecart" report links to
  as its Group-6 Newegg reference). The original riskiq.com URL is no
  longer reachable since RiskIQ was absorbed into Microsoft Defender
  TI, and the surviving Schoenbaum Medium republication
  (https://schoenbaum.medium.com/another-victim-of-the-magecart-assault-emerges-newegg)
  is JS-rendered — its article body is not present in the raw HTML,
  so no verbatim content snapshot could be curl-captured (hence
  raw_snapshot/content_sha256 null).

  AUDIT (2026-07-01, claude-opus-4.8/max): NOT a phantom — a genuine
  first-party RiskIQ report. Its distinguishing facts (skimmer placed
  "around August 14th"; skimmer condensed to ~15 lines because it
  only serialized one form; worked on both website and mobile app;
  live from Aug 14 until removed Sep 18, "over a month"; same
  basecode as the British Airways skimmer with only the form name and
  exfil server changed) are corroborated by reachable reporting
  attributing them to this RiskIQ blog (Infosecurity Magazine,
  SecurityWeek, TechCrunch, BankInfoSecurity, all 2018-09-19/20) and
  are consistent with the independently-snapshotted Volexity report
  (domain infra Aug 13; live confirmed Aug 16, "attackers started
  earlier"; removed Sep 18). Cited for the Aug-14 skimmer-placement
  date; the load-bearing snapshot for the event is the Volexity
  companion source.
