notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): live URL fetched (HTTP 200, 71,240 bytes) + raw
  captured. Kaspersky ICS-CERT summary of the Saudi NCA Dustman report. Carries, verbatim:
  incident "occurred on December 29, 2019"; Bapco = "Bahrain's national oil company"; initial
  access "by exploiting a remote execution vulnerability in a VPN appliance"; distribution
  "utilized the anti-virus management console service account to distribute the malware ...
  via PsExec"; "Dustman uses a third-party driver, Eldos RawDisk"; "Dustman overwrites the
  volume"; "Dustman is an upgraded and improved variant of the ZeroCleare wiper"; impact
  "Only some of the computers on the Bapco network were infected and the company was able to
  avoid disruption to its operations." Added as a snapshotted corroborator for the Bapco event.
