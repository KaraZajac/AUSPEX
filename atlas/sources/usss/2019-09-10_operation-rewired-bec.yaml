notes: |
  US Secret Service govt-primary reproduction of the same-day DOJ
  Operation reWired release (the DOJ URL itself is Akamai bot-walled /
  un-snapshottable). Carries the full department roster and the
  component-level agency credit verbatim. Opening: "Operation reWired,
  a coordinated law enforcement effort by the U.S. Department of
  Justice, U.S. Department of Homeland Security, U.S. Department of the
  Treasury, U.S. Postal Inspection Service, and the U.S. Department of
  State, was conducted over a four-month period, resulting in 281
  arrests in the United States and overseas, including 167 in Nigeria,
  18 in Turkey and 15 in Ghana. Arrests were also made in France,
  Italy, Japan, Kenya, Malaysia, and the United Kingdom (UK)." The
  operation "also resulted in the seizure of nearly $3.7 million."
  Component agencies named in the Attorney General's remarks: "the
  FBI, more than two dozen U.S. Attorney's Offices, U.S. Secret
  Service, U.S. Postal Inspection Service, Homeland Security
  Investigations, IRS Criminal Investigation, U.S. Department of
  State's Diplomatic Security Service". Note: the Treasury component
  named is IRS Criminal Investigation, NOT "Treasury OIG". Added
  2026-07-01 (AUDIT) as the snapshottable corroborating primary.
