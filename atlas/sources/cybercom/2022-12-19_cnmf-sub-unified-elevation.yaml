notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): service-placement audit of the
  us/cybercom/cnmf-actor record. cybercom.mil hard-blocks all automated agents
  (curl and WebFetch both return HTTP 403; only a 389-byte Forbidden error page
  was served, so NO content snapshot was captured — raw_snapshot intentionally
  omitted rather than record an error page). archive.org is blocked in this
  environment. The source's substance — the CNMF's elevation to a sub-unified
  command on 2022-12-19 — is independently corroborated: DefenseScoop, "Cyber
  National Mission Force declared sub-unified command" (2022-12-19); Defense News,
  "Election-defending Cyber National Mission Force elevated by Pentagon"
  (2022-12-20), with Gen. Nakasone presiding over the establishment ceremony.
  This source NAMES the Cyber National Mission Force as the subject — it is the
  founding/elevation announcement of the very unit (us/cybercom/cnmf) at which the
  actor is placed — and so supports the named-unit service placement.
