notes: |
  Hundreds of malware samples released since 2018 with attributions
  to GRU, MSS, MOIS, and RGB.

  AUDIT (2026-06-25, claude-opus-4.8/max): service-placement audit of the
  us/cybercom/cnmf-actor record. The live VirusTotal user page is a JavaScript
  single-page app: an unauthenticated curl returns HTTP 200 but only a 7.9 KB
  SPA bootstrap shell (the @CYBERCOM_Malware_Alert sample list loads dynamically
  via the VT API and is absent from the static HTML), so NO substantive content
  snapshot was captured — raw_snapshot intentionally omitted. The provenance is
  nonetheless self-evident on its face: this is CYBERCOM's own malware-disclosure
  channel, and the publisher of record is the "USCYBERCOM Cyber National Mission
  Force." The @CYBERCOM_Malware_Alert handle and the CNMF's overt VirusTotal
  releases are documented across CYBERCOM press material and tier-1 reporting
  (e.g. DefenseScoop's CNMF profiles). NAMES the CNMF/CYBERCOM as the discloser;
  supports the named-unit service placement (us/cybercom/cnmf).

  AUDIT (2026-06-28, claude-opus-4.8/max): phantom-remediation of event
  2018-06/cnmf-virustotal-cumulative. This URL is the genuine @CYBERCOM_Malware_Alert
  VirusTotal account (the real account anchor), but it is a JavaScript SPA that returns
  HTTP 200 with only a ~7.9 KB bootstrap shell and NO static article body — it carries
  none of the event's factual claims (launch date, sample batches, per-nation
  attributions) and states no strategic purpose, so it cannot serve as the sole source
  nor as the attested-doctrine attesting source. content_sha256 intentionally NOT
  recorded (hashing an empty SPA shell would be misleading). This record is RETAINED in
  the event only as the account-existence anchor; the event's facts and the
  cost-imposition attestation were re-sourced to real primaries/tier-1 reporting
  (cybercom 2018-11-05 launch PR, securityweek 2018-11-08, cyberscoop 2019-09-08, vice
  2020-02-25 [FOIA cost-imposition quote], cisa 2022-01-12 + 2022-07-21, therecord
  2024-07-08). Still also cited by actor us/cybercom/cnmf-actor — do not orphan/retire.
