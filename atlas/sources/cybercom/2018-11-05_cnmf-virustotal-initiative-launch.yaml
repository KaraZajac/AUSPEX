notes: |
  Founding announcement of the Cyber National Mission Force (CNMF) VirusTotal
  malware-sharing initiative under the @CYBERCOM_Malware_Alert account, launched
  the week of the 2018 midterms. CNMF "initiated an effort to share unclassified
  malware samples it has discovered that it believes will have the greatest impact
  on improving global cybersecurity."

  AUDIT (2026-06-28, claude-opus-4.8/max): cybercom.mil hard-blocks automated capture
  — curl and WebFetch both return HTTP 403 (541-byte Forbidden page), so NO
  raw_snapshot was captured (consistent with the sibling cybercom govt-primary
  sources). The launch date and stated purpose are corroborated by tier-1 reporting
  captured in this event's other sources: SecurityWeek (2018-11-08), The Record
  (2024-07-08: "Launch: November 5, 2018, one day before Election Day"), and the CISA
  alerts that themselves cite CYBERCOM's press releases. Created during the
  re-sourcing of event 2018-06/cnmf-virustotal-cumulative, replacing the content-free
  VirusTotal SPA citation as the founding govt-primary.
