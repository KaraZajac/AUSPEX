notes: |
  Dedicated CYBERCOM/CNMF press release (Article 3783991; dateline
  "FORT GEORGE G. MEADE, Md. / Lusaka, Zambia," NEWS | May 22, 2024) —
  the official announcement of the first CNMF Hunt Forward defensive
  deployment to Zambia. Verbatim anchors: "Cyber Command's Cyber
  National Mission Force recently returned from the command's first-ever
  defensive cyber deployment to Zambia, bringing back strengthened
  collaborative ties with the partner and actionable insights to harden
  Zambian and U.S. networks"; "During the roughly three-month
  deployment, U.S. cyber forces worked alongside network defenders from
  the Zambian Information Communication Technology Authority, identifying
  vulnerabilities and searching for adversary malicious cyber activity";
  the CNMF "has now deployed more than 60 times and conducted hunt
  operations in 28 countries since 2018"; quotes U.S. Ambassador to
  Zambia Michael Gonzales, who advised the deployed team. ZICTA
  described as "a statutory body established under the Information and
  Communication Technologies Act No. 15 of 2009."

