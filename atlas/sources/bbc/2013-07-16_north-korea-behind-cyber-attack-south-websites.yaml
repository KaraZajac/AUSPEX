notes: |
  ROK-government attribution source for the 20 March 2013 DarkSeoul
  wiper (and the 25 June 2013 follow-on). Carries the state
  attribution to NORTH KOREA at NATION level — no unit named, and
  the word "Lazarus" is not used. Load-bearing verbatim (confirmed
  in raw_snapshot): "South Korea believes North Korea was behind
  cyber attacks against several websites last month"; Park Jae-moon,
  a director-general at the Ministry of Science, ICT and Future
  Planning: "We speculate the hacking was done by North Korea";
  "Investigators said an IP address used in the attack matched one
  used in previous hacking attempts by Pyongyang"; analysis of "82
  malignant codes ... as well as the North Korea's previous hacking
  patterns" showed "the hacking methods were the same" as the 20
  March attacks; "[A] North Korean IP [address] was found ... I can
  say this is the decisive evidence." Also carries "32,000" systems
  and the broadcasters/banks framing. Snapshotted + hashed 2026-07-05
  (curl 200, 399206 bytes); archive.org was unreachable this session
  so no wayback archive_url captured — raw_snapshot is the archive.
