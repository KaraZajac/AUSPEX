notes: |
  Gordon Corera retrospective built on an interview with TV5Monde
  director-general Yves Bigot. Carries the load-bearing extended
  facts and the APT28 (NOT Sandworm) reattribution. Verbatim:
  "TV5Monde was taken off air in April 2015. A group calling itself
  the Cyber Caliphate, linked to so-called Islamic State, first
  claimed responsibility. But an investigation now suggests the
  attack was in fact carried out by a group of Russian hackers";
  at 20:40 local time (8 Apr) "all 12 channels had gone off air"
  ("We were a couple of hours from having the whole station gone
  for good"); "At 05:25 local time, one channel was restored.
  Others followed later that morning"; "The perpetrators had first
  penetrated the network on 23 January"; they "fabricated bespoke
  malicious software to corrupt and destroy the internet-connected
  hardware that controlled the TV station's operations - such as
  the encoder systems"; "seven different points of entry" incl. a
  Netherlands company that "supplied the remote controlled cameras";
  "France's cyber-agency [ANSSI] told Mr Bigot to be careful about
  linking the incident directly to IS"; "the attackers had used the
  jihadist posts to try to cover their tracks"; "attacked by a group
  of Russian hackers, who are known as APT 28"; "the attack was
  designed to destroy the channel, and ... it was linked to APT 28";
  open question "Who gave the order and the money to that Russian
  group of hackers"; London's read: "most likely an attempt to test
  forms of cyber-weaponry"; "The financial cost was €5m ($5.6m;
  £4.5m) in the first year, followed by over €3m ... every following
  year." Page metadata headline: "How France's TV5 was almost
  destroyed by 'Russian hackers'". Snapshot is a 2026 live capture;
  the 2016 article body is intact within it.
