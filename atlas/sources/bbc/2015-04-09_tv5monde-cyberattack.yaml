notes: |
  Initial news disclosure framing the CyberCaliphate persona
  before the Russian false-flag reattribution. Primarily a
  TV5Monde article (title: "France's TV5Monde 'hit by Islamic
  State hackers'"); shared with the CENTCOM event, which it
  corroborates via a January aside: "In January, the Twitter and
  YouTube accounts of the US military command were hit by pro-IS
  hackers. But Centcom said it was 'cyber-vandalism' and not a
  serious data breach." Carries NO Russia/APT28 attribution — it
  is corroboration of the CENTCOM facts + persona continuity, NOT
  an attribution source. (Snapshot is a 2026 live capture; the
  2015 article body is intact within it.)
