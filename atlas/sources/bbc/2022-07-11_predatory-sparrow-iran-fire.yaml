notes: |
  BBC News (Joe Tidy) canonical account of the June-2022 Predatory
  Sparrow / Gonjeshke Darande attack on Iranian steel. Added 2026-07-10
  as the primary attribution + self-claim + video source, replacing a
  phantom NYT URL (see event qc notes). Carries, verbatim: the actor
  self-claim as "one of three attacks it carried out against Iranian
  steel makers on 27 June, in response to unspecified acts of
  'aggression' carried out by the Islamic Republic"; the CCTV video
  ("The video appears to be CCTV footage of the incident, showing
  factory workers leaving part of the plant before a machine starts
  spewing molten steel and fire"); the HEDGED state attribution via
  Check Point ("we believe that the group is either operated, or
  sponsored by, a nation state" — no unit named, no formal Israeli
  attestation); and the advance warning to Iran's emergency services.
