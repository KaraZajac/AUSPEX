notes: |
  Joint Canadian Centre for Cyber Security (Cyber Centre) + US FBI
  cyber threat bulletin. Metadata date_created/date_modified =
  2025-06-19. Primary source for the salt-typhoon-canada-telecom
  event. Key verbatim content (snapshot sha256 b338bde0…e66e3, live
  HTTP 200, 53,805 bytes):
  - "The Canadian Centre for Cyber Security (Cyber Centre) and the
    United States' Federal Bureau of Investigation (FBI) are warning
    Canadians of the threat posed by People's Republic of China (PRC)
    state-sponsored cyber threat actor tracked in industry reporting
    as Salt Typhoon."
  - "The responsible actors are almost certainly PRC state-sponsored
    actors, specifically Salt Typhoon. Three network devices
    registered to a Canadian telecommunications company were
    compromised by likely Salt Typhoon actors in mid-February 2025.
    The actors exploited CVE-2023-20198 to retrieve the running
    configuration files from all three devices and modified at least
    one of the files to configure a GRE tunnel, enabling traffic
    collection from the network."
  - "Hostile state actors very likely rely on access to
    telecommunications service providers (TSPs) and telecommunications
    networks around the world as a key source of foreign intelligence."
  - "We assess that PRC cyber actors will almost certainly continue to
    target Canadian organizations as part of this espionage campaign,
    including telecommunications service providers and their clients,
    over the next two years."
  Attribution is nation (PRC/China) + named-actor (Salt Typhoon),
  hedged ("almost certainly" / "likely"); the bulletin names NO
  service (no MSS/Ministry of State Security) and NO unit, and does
  not name the affected carrier. Added 2026-07-10 (claude-opus-4.8/max)
  as the re-source for salt-typhoon-canada-telecom.
