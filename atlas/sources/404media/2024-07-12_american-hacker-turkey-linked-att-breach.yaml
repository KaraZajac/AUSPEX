  Joseph Cox's scoop tying John Erin Binns to the AT&T Snowflake
  breach. Verbatim (lede, ungated): "John Binns, who was previously
  arrested in Turkey, is linked to the newly announced breach of AT&T
  which impacted 'nearly all' of the company's customers, multiple
  sources told 404 Media"; "John Binns, a U.S. citizen who has been
  incarcerated in Turkey, is linked to the massive data breach of
  metadata belonging to nearly all of AT&T's customers that the
  telecommunications giant announced on Friday, three sources
  independently told 404 Media." Byline "Joseph Cox · Jul 12, 2024."
