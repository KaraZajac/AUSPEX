title: |
  Iranian-linked hacker group targets Iran International
  journalists in cyberattack
url: https://cpj.org/2025/07/iranian-linked-hacker-group-targets-iran-international-journalists-in-cyberattack/
archive_url: null
published_on: 2025-07-30
retrieved_on: 2026-05-27
tier: tertiary
notes: |
  CPJ report on coordinated cyberattacks against Iran
  International staff in summer 2024 and January 2025, using
  malware-laced Telegram messages to infect staff devices.
  Operations attributed to Banished Kitten / Storm-0842 / Dune /
  Handala — the same cluster the DOJ and Israeli security
  community treat as a MOIS cyber unit led by Yahya Hosseini
  Panjkhi. Iran International confirmed in July 2025 that
  materials published by Iranian state outlets came from those
  hacks.
