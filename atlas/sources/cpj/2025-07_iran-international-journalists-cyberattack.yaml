notes: |
  CPJ report on coordinated cyberattacks against Iran
  International staff in summer 2024 and January 2025, using
  malware-laced Telegram messages to infect staff devices.
  Operations attributed (relaying Iran International + DW Persian)
  to "Banished Kitten, also known as Storm-0842, Dune, or Handala,
  a cyber unit within Iran's Ministry of Intelligence led by Yahya
  Hosseini Panjkhi, whose identity was first revealed by [Iran
  International's] reporting." Iran International confirmed in July
  2025 that materials published by Iranian state outlets came from
  those hacks. NB: CPJ's lead loosely says "Hackers linked with
  Iran's Islamic Revolutionary Guard Corps (IRGC)" while its body
  names the Ministry of Intelligence — an internal IRGC/MOIS wobble
  (audit 2026-07-10); the prior note's "DOJ and Israeli security
  community" framing was not in the CPJ text and was removed.
