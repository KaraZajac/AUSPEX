  carried by the snapshot:
    - "threat actors were able to access some information from our
      third-party CRM platform. There is no indication of access to
      customer tenants or the data within them. We acted quickly to cut
      the access and have added extra safeguards to protect against
      similar incidents."
    - data obtained was "commonly available business contact information,
      like names, email addresses, and phone numbers."
    - method: "threat actors contact employees by text or phone pretending
      to be from human resources or IT."
  IMPORTANT: Workday's own statement names NEITHER the CRM vendor
  ("Salesforce") NOR any threat actor ("ShinyHunters" / "UNC6040"); those
  identifications are security-press inference (BleepingComputer/CSO/GTIG),
  not a Workday confirmation.
