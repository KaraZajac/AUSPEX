notes: |
  CNN write-up of Reuters' 2020-11-27 report that suspected North Korean
  hackers targeted vaccine maker AstraZeneca: attackers posed as recruiters
  on LinkedIn and WhatsApp, sent fake "job descriptions" laced with malicious
  code, and used tools/techniques previously linked to North Korea. Some
  accounts used Russian email addresses (possible false-flag misdirection).
  The attempts targeted staff including those on COVID-19 research and are
  "not thought to have been successful." Notes Oxford/AstraZeneca engagement
  with the UK NCSC on defence, and a ROK lawmaker's statement that South Korea
  thwarted DPRK attempts on its own vaccine firms.
