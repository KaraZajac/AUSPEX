notes: |
  PHANTOM RE-SOURCE (AUDIT 2026-07-10). Prior record was a placeholder:
  url was the bare CNN Money homepage (https://money.cnn.com) with an
  archive_url resolving to the 2024 CNN Business homepage shell and a
  descriptive-but-unverifiable title ("DNI Clapper Confirms Iran Behind
  Sands Casino Cyber Attack") — no genuine article behind it. Re-pointed
  to the genuine contemporaneous CNNMoney article (Jose Pagliery, "Iran
  hacked an American casino, U.S. intel director says"), snapshotted via
  archive.org. Verified body: "For the first time, Director of National
  Intelligence James Clapper said the Iranian government was behind a
  damaging cyberattack on the Sands Las Vegas Corporation (LVS) in 2014
  … he mentioned it while testifying before the Senate Armed Services
  Committee"; "Clapper described it as a 'destructive cyberattack' on
  par with North Korea's hack of Sony"; corroborates Adelson's public
  suggestion that the U.S. drop nuclear bombs on Iran. NB: CNN's
  paraphrase ("the Iranian government was behind") is FIRMER than
  Clapper's actual written wording ("Iranian actors have been implicated
  in") — a secondary-source firming; the ODNI primary governs. The id
  slug retains "2015-02-26" (kept stable to avoid FK churn) but the
  article's true publication date is 2015-02-27 (set in published_on).
