  CNN Business report on the resolution of the June 2024 CDK Global
  ransomware outage. Primary carrier of the BlackSuit attribution and
  the ~$25M ransom for AUSPEX event 2024-06/cdk-global-blacksuit.

  AUDIT (2026-07-04, claude-opus-4.8/max): captured live (HTTP 200, 5.14MB
  full-page HTML). Verbatim support: "On June 21, about 387 bitcoin — then
  the equivalent of roughly $25 million — was sent to a cryptocurrency
  account controlled by hackers affiliated with a type of ransomware called
  BlackSuit, Chris Janczewski, head of global investigations at crypto-
  tracking firm TRM Labs, told CNN"; "'substantially all' of the nearly
  15,000 car dealerships that use its software across North America were back
  online". Clarifies the prior (dead) Bloomberg citation: "The ransom payment
  of $25 million hasn't been previously reported. Bloomberg reported that the
  hackers had made a multimillion-dollar ransom demand and that the company
  planned to pay." Attribution is crypto-tracing + journalism (TRM Labs via
  CNN), NOT a self-claim or a govt/vendor named-actor attribution -> moderate
  confidence, concur-with-caveat.
