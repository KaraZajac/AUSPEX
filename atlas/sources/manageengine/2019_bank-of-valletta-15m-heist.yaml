notes: |
  Evergreen ManageEngine "data breaches" reference page (no byline date;
  published_on:null). Snapshotted 2026-07-10 (curl, HTTP 200, 40,143 B).
  Cited as the snapshot carrier for the FOUR destination jurisdictions
  and the USD conversion: "hackers attempted to withdraw EUR13 million
  ($14.7 million) from its systems. All branches, ATMs, mobile [banking]
  ..." and "The hackers had attempted to transfer EUR13 million to
  different bank accounts in the UK, US, Czech Republic, and Hong Kong."
  Vendor reference page (tier=tertiary); the UK/US/Czech/HK detail is
  corroborated across contemporaneous reporting (fintechfutures, Times of
  Malta). Note the headline's "$15 million" is a rounded figure; the body
  gives EUR13M / $14.7M.
