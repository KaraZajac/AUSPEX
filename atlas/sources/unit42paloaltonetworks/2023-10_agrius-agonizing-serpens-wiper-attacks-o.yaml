notes: |
  Supporting quote: Agonizing Serpens (aka Agrius) is an Iranian-linked APT group that has been active since 2020.

  AUDIT (2026-06-23, claude-opus-4.8/max): Raw captured + hashed (consulted while auditing the
  2021-05 Agrius event because this is the ir/...agrius actor's own cited source, load-bearing for the
  service-placement decision). Attribution is NATION-level at HIGH confidence with NO service named:
  verbatim "Our investigation revealed the perpetrators of the attacks have strong connections to an
  Iranian-backed APT group Unit 42 tracks as Agonizing Serpens (aka Agrius, BlackShadow, Pink Sandstorm,
  DEV-0022)" and "we assess with a high level of confidence that the attacks ... were carried out by the
  Iranian-linked Agonizing Serpens APT group." NO mention of MOIS, IRGC, or any Iranian service. The
  alias list (Agrius / BlackShadow / Pink Sandstorm / DEV-0022) does NOT state which vendor coined each
  name, and AMERICIUM / SPECTRAL KITTEN do NOT appear in this source. This corroborated the demote of
  the actor to ir/unscoped/agrius (Iran established, service not).

  AUDIT (2026-06-24, claude-opus-4.8/max): Re-read the raw vs the 2023-10 event it backs. Event facts
  all verbatim-supported: "a series of destructive cyberattacks beginning in January 2023 and continuing
  as recently as October 2023, targeting the education and technology sectors in Israel"; "attempts to
  steal sensitive data, such as personally identifiable information (PII) and intellectual property ...
  they deployed various wipers intended to cover the attackers' tracks and to render the infected
  endpoints unusable"; the three NOVEL wipers named "MultiLayer wiper / PartialWasher wiper / BFG
  Agonizer wiper" (+ Sqlextractor); anti-EDR is "DLL Unhooking" and "Import Address Table (IAT)
  Unhooking" run by BFG; initial access by "exploiting vulnerable internet facing web servers" (web
  shells) = n-day; lineage "multiple code overlaps with Apostle, IPsec Helper and Fantasy". DATE
  CORRECTION: page datePublished = 2023-11-06 ("Published: November 6, 2023"); published_on fixed
  2023-10-01 -> 2023-11-06 (the Jan–Oct 2023 window is the attack activity, not the report date; 2023-10
  retained only as the stable slug). NOTE for the event summary: this source does NOT contain the
  aliases "AMERICIUM" / "SPECTRAL KITTEN" (MISP-only) nor the names "DEADWOOD" / "SharpBoys" — only
  Apostle/IPsec Helper/Fantasy lineage is stated here.
