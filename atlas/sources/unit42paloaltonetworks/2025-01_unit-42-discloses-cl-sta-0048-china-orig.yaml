notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the cn/mss/cl-sta-0048 -> cn/unscoped/cl-sta-0048
  service demotion. This report (Lior Rochberger & Yoav Zemah, published 2025-01-29) attributes the
  activity at the NATION level only and never names the MSS / Ministry of State Security or any specific
  Chinese service ("Ministry of State Security" appears 0 times; every "MSS" in the text is "MSSQL").
  It tracks the actor as an uncategorized activity cluster.
  Verbatim:
  - "We identified a cluster of activity that we track as CL-STA-0048."
  - "Based on an analysis of the tactics, techniques and procedures (TTPs), as well as the tools used,
    the infrastructure and the victimology, we assess with moderate-high confidence that this activity
    originates in China."
  - "Connection to the Chinese Nexus Overlaps with DragonRank ... Our analysis indicates a strong link
    between this group and the Chinese nexus based on the observed tools, techniques and victimology."
  - "We lack sufficient data on DragonRank to definitively link it to CL-STA-0048."
  Note: the published article title is "CL-STA-0048: An Espionage Operation Against High-Value Targets
  in South Asia"; the title field here is the curated atlas descriptor and is left unchanged.
