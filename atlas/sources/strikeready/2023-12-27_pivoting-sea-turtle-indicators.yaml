notes: |
  StrikeReady infrastructure-analysis blog documenting Sea Turtle
  (Teal Kurma) infrastructure used to spoof Kurdish news sites,
  NGO portals, and Arab-world TV channels — including
  alhurra.online, al-marsad.co, and anfturkce.news. Pivot-and-
  certificate-fingerprinting picture complementing the PwC
  SnappyTCP disclosure.
