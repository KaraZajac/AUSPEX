  "Many of the spoofed domains below would be of interest to those focused on
  domestic Turkish issues"; the blog pivots off the PwC report and a Greek
  Ministry of Justice / Greek-DOJ report. NB the three highlighted domains and
  their characterizations ("A Kurdish news agency" etc.) originate in the PwC
