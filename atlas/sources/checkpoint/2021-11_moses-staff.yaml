  AUDIT (2026-06-24, claude-opus-4.8/max): IRGC/service finding — NO Iranian service named, and in fact NO
  Iran attribution at all in the prose. Captured live (curl, HTTP 200, 199,908 bytes) and hashed. Check
  Point's own Attribution section explicitly declines nation attribution, verbatim: "Attributing politically
  motivated cyberattacks is always complicated. Currently, with all the information we have available, we
  can't draw any definitive conclusions. However, a couple of artifacts caught our attention: One of the
  tools used in the attack, OICe.exe, was submitted to VT from Palestine ... it might betray the attackers'
  origins ... The background and logo PNG image files used on the site moses-staff[.]se ... were created
  and/or modified ... on the machine with the time zone GMT+3. That is the time zone of Israel and the
  Palestinian territories." The only token "Iran" in the page is inside a UI country-selector dropdown, not
  the article body. So this source supports neither an IRGC/MOIS placement nor even a firm Iran nexus — it
  points at Palestinian-territory artifacts. Used as the basis for demoting the actor to ir/unscoped/moses-staff.
