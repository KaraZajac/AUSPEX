notes: |
  Check Point Research disclosure of five-year Naikon / APT30
  campaign against ASEAN governments. Introduces the
  "Aria-body" custom loader / backdoor used to maintain access
  to foreign-ministry, science-and-tech-ministry, presidential-
  office and military targets across Indonesia, the Philippines,
  Vietnam, Thailand, Myanmar, Brunei and Australia. Naikon used
  compromised government servers as C2 to attack other
  government targets — characteristic regional pivoting.
