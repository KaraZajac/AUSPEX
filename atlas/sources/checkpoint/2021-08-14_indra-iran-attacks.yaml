notes: |
  Check Point Research's technical analysis of the July 2021 Iranian
  railway cyberattack. Attributed the operation to "Indra" — at the
  time treated as an Iranian opposition / hacktivist group. The cluster
  was later subsumed into the broader Predatory Sparrow / Gonjeshke
  Darande dossier with the Indra alias flagged as overlapping. Identified
  the "Meteor" wiper as the destructive payload.

  AUDIT (2026-07-10, claude-opus-4.8/max): captured live (curl, HTTP 200,
  233,419 bytes) + hashed. Pub date verbatim "August 14, 2021". This source
  attributes to INDRA and explicitly leans AWAY from a nation-state operator:
  "We were able to tie this activity to a threat group that identify
  themselves as regime opposition group, named Indra"; "Judging by the
  quality of the tools, their modus operandi, and their presence on social
  media, we find it unlikely that Indra is operated by a nation-state
  actor." Documents the railway/transport-ministry scope ("On July 9th and
  10th, 2021 Iranian Railways and the Ministry of Roads and Urban Development
  systems became the subject of targeted cyber attacks"), the on-screen
  self-claim ("Iranian social media spread the photos of a monitor of one of
  the hacked computers, where the attackers took responsibility for both
  consecutive attacks. 'We attacked the computer systems of the Railway
  Company and the Ministry of Roads and Urban Development'"), the 64411
  Supreme-Leader-office display, and the Meteor/Stardust/Comet wiper family
  tied to Iran Railways artifacts. It does NOT name Predatory Sparrow / Israel
  — that identity is the later corpus/press consolidation (see the event's
  wikipedia overlay source). So this record supports the Indra/Meteor
  technical attribution only, NOT an Israel/nation-state attestation.
