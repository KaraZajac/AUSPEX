notes: |
  Check Point Research's technical analysis of the July 2021 Iranian
  railway cyberattack. Attributed the operation to "Indra" — at the
  time treated as an Iranian opposition / hacktivist group. The cluster
  was later subsumed into the broader Predatory Sparrow / Gonjeshke
  Darande dossier with the Indra alias flagged as overlapping. Identified
  the "Meteor" wiper as the destructive payload.
