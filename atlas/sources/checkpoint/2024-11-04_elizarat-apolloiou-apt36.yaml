notes: |
  Check Point Research technical deep-dive on APT36 /
  Transparent Tribe's ElizaRAT implant family observed in 2024,
  documenting three ElizaRAT variants (Slack, Circle, Google
  Drive campaigns) and the companion ApoloStealer file-stealer.
  Notable for documenting the cluster's use of legitimate cloud
  services (Google Drive, Telegram, Slack) as C2 and exfiltration
  channels — a meaningful tradecraft modernization for a cluster
  historically reliant on direct C2 infrastructure. Targets
  remained Indian government and defense entities.

