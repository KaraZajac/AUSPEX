notes: |
  Check Point disclosure of a PRC-nexus campaign using
  COVID-19-themed lures (purported Mongolian Ministry of
  Foreign Affairs documents on the COVID response) to deliver
  a previously-unseen RAT against Mongolian targets.
  Infrastructure and tooling overlaps with earlier Vicious /
  Mustang Panda activity but Check Point tracks the cluster
  as distinct ("Vicious Panda").
