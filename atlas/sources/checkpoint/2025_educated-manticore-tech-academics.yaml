notes: |
  Check Point Research analysis of the actor it tracks as
  "Educated Manticore" (which it aligns with the community's
  APT42 / Charming Kitten / Mint Sandstorm and attributes to
  the IRGC-IO) targeting Israeli cyber and computer-science
  academics. AUDIT 2026-07-10 (claude-opus-4.8/max): CORRECTED
  timeline — the cybersecurity-firm-impersonation phase began
  "Starting mid-June" 2025 "Following the outbreak of the
  Iran-Israel war" (NOT mid-June 2024, as previously noted);
  the custom React phishing kit is assessed in use since
  January 2025. Operators posed as fictitious cybersecurity-firm
  employees via email and WhatsApp; pages mimicking Google
  auth / Google Meet harvested Gmail credentials and 2FA codes.
  AI-assisted lure text noted; some lures betrayed by operator-
  error name mismatches (body "Sarah Novominski" vs sender
  account "Sara Noviminski").
