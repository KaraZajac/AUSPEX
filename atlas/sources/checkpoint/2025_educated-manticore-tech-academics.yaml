notes: |
  Check Point Research analysis of APT42 / Educated Manticore /
  Charming Kitten / Mint Sandstorm operations against Israeli
  academic cyber and computer-science researchers — beginning
  mid-June 2024 and continuing into the 2025 Israel-Iran war
  period. Operators impersonated fictitious cybersecurity-firm
  employees via email and WhatsApp; phishing landing pages
  harvested Gmail credentials and 2FA codes. AI-written lure
  text noted; some lures betrayed by name-vs-address mismatches
  in operator-error fashion.
