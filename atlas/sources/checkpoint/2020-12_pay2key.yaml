notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cited to support Pioneer Kitten's service placement. Does
  NOT name the IRGC ("IRGC"/"Revolutionary Guard" = 0 hits). Traces the Pay2Key ransom payments "all
  the way to an Iranian based Bitcoin exchange" (Excoino, "an Iranian company"), and notes the
  registration/wallet evidence "may suggest the owners of the final wallets are Iranian citizens, who
  most probably are behind the Pay2Key attack on Israeli [organizations]." "Iranian" throughout — no
  Iranian service named — contributed to demoting the actor to ir/unscoped/pioneer-kitten.
  AUDIT (2026-07-10, claude-opus-4.8/max, pay2key-israeli-companies re-audit): DATE CORRECTED. The
  snapshotted article body reads "November 12, 2020" and the HTML metadata gives article:published_time
  2020-11-12T09:58:06Z / article:modified_time 2020-11-24T11:07:55Z, so published_on is 2020-11-12, NOT
  the 2020-12-17 previously recorded (2020-12-17 is in fact the ClearSky *Pay2Kitten* report date — a
  likely cross-contamination). The article confirms it is the follow-up to Check Point's initial "Last
  weekend we issued a ransomware alert" (the first Pay2Key disclosure, ~2020-11-06/08). ATTRIBUTION
  granularity is NATION-level only: Check Point names no group, attributing Pay2Key to "an Iranian based
  threat actor" ("strengthens our assumption that this wave of attacks is indeed executed by an Iranian
  based threat actor"; "most probably are behind"); the Fox Kitten / Pioneer Kitten named-actor linkage
  comes from ClearSky's Pay2Kitten report, not from this source. Live URL is reachable (HTTP 200, 181,542
  B, matches raw_snapshot byte-for-byte). NB the record id slug still reads "2020-12_pay2key" (now
  date-inaccurate) — left as-is to avoid FK breakage; authoritative date is the published_on field.
