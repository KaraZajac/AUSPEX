notes: |
  Caine's written responses to the Senate Armed Services Committee's
  advance policy questions, released the day of his 1 April 2025
  confirmation hearing. The genuine govt-primary attestation underlying
  the same-day DefenseScoop coverage.

  AUDIT (2026-07-10, claude-opus-4.8/max): created this audit to give
  event 2024-02/hunt-forward-southcom a govt-primary source (the prior
  citation dod/2025-04-01_caine-senate-testimony is in fact a DefenseScoop
  article, re-tiered to secondary). PDF snapshotted + sha256 verified
  (679,066 bytes; content_sha256 6328279c…d294fdda2). Verbatim, Question
  152 ("How will 'defend forward' and 'persistent engagement' concepts
  deter and disrupt Russia and China in cyberspace?"):
    "The DoD uses 'defend forward' to disrupt malicious cyber activity at
    its source and 'persistent engagement' to intercept and halt cyber
    threats, degrade the capabilities and networks of adversaries, and
    continuously strengthen the cybersecurity of DOD networks and
    missions. This occurs both geographically (beyond DOD networks and
    into the networks of our Allies and partners) and temporally (ahead
    of potential adversary exploitation) to enable resilience in both
    domestic and foreign partner networks. For example, U.S. CYBERCOM
    hunt forward missions in the SOUTHCOM area of responsibility have
    discovered CCP malware on multiple foreign partner networks."
  Caine does NOT name any specific partner country (consistent with the
  op-security note that host-nation identities are withheld).
