  Supporting quote: While investigating the Confucius threat actor, we found a recent spear phishing campaign that utilizes Pegasus spyware-related lures to entice victims into opening a malicious document downloading a file stealer.
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw captured live (HTTP 200, 89,544 bytes) + sha256 recorded; URL resolves and content matches. Author Daniel Lunghi; verbatim headline "Confucius Uses Pegasus Spyware-related Lures to Target Pakistani Military" (the AUSPEX title above is an accurate paraphrase); published_on 2021-08-17 confirmed via article:published_time meta + byline. All factual claims used by the event verified verbatim: two-stage attack; first email spoofing the PR wing of the Pakistani Armed Forces ("The sender address, which is spoofed, impersonates the PR wing of the Pakistani Armed Forces (info@ispr.gov.pk)"); second email a Pegasus warning linking via a cutt.ly shortener to an encrypted password-protected Word doc fetched from parinari[.]xyz; file stealer for documents/images. Patchwork link confirmed verbatim: "We disclosed multiple links between Patchwork and Confucius threat actors in the past, so this came as no surprise to us." Prior Pakistani-military targeting confirmed: "we already found Confucius, which is known for targeting Pakistan military for espionage purposes, employing multiple file stealers." ATTRIBUTION SCOPE: the report makes NO nation-state attribution — the strings 'India', 'Indian', 'pro-India' do not appear, and the only 'South Asia' occurrence is inside a linked PDF's filename; no explicit ICD confidence statement. It names only the actor "Confucius" (Trend Micro's own tracking) -> supports named-actor level, not nation.