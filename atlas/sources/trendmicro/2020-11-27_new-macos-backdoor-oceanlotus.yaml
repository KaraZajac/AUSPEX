notes: |
  Trend Micro (authors Luis Magisa, Steven Du) technical analysis of a new macOS backdoor
  detected as Backdoor.MacOS.OCEANLOTUS.F, assessed related to the OceanLotus / APT32 group.
  AUDIT (2026-07-01, claude-opus-4.8/max): curl 200, 98,260 bytes, sha256 464a25f2…b00c6a9f;
  raw_snapshot captured. Verbatim support: "a new backdoor that we believe to be related to
  the OceanLotus group ... confirmed to be a variant of the said malware"; delivery "arrives as
  an app bundled in a Zip archive ... uses the icon for a Word document file as a disguise";
  the app runs a "shell script containing the main malicious routines" that extracts a b64-encoded
  "fat binary" second-stage payload, which drops a third-stage payload
  (~/Library/User Photos/mount_devfs); backdoor supported commands include "Run command in
  terminal" (0xac), "Upload file" (0x72), "Download file"/"Download and execute a file",
  "Remove file", "Get file size", host-recon commands (processor/memory/serial/MAC via
  system_profiler, ioreg, ifconfig); "collected information is encrypted and sent to the malware
  C&C server" (C2 domains mihannevis[.]com, mykessef[.]com, idtpl[.]org — custom-encrypted TCP,
  no HTTP/HTTPS stated); "suspected to target users from Vietnam since the document's name is in
  Vietnamese and the older samples targeted the same region" (decoy filename "ALL tim nha Chi
  Ngoc Canada"). Names OceanLotus/APT32 at named-actor level; no Vietnamese state service named.
