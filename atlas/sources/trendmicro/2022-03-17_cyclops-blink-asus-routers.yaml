notes: |
  Trend Micro (Feike Hacquebord, Stephen Hilt, Fernando Merces) analysis of a Cyclops Blink
  malware variant targeting ASUS routers, published 17 March 2022 — three weeks after the joint
  CISA/NCSC AA22-054A advisory (which was WatchGuard-only). Created this audit (2026-07-10,
  claude-opus-4.8/max) as the correct source for the ASUS footprint, which AA22-054A does not
  cover.

  AUDIT: live trendmicro.com URL returned HTTP 200; snapshot captured + hashed (104,095 bytes).
  Title "Cyclops Blink Sets Sights on Asus Routers | Trend Micro (US)"; in-body date "Mar 17,
  2022." Load-bearing verbatim support: "this Cyclops Blink malware variant that targets ASUS
  routers and includes a list of more than 150 current and historical command-and-control (C&C)
  servers of the Cyclops Blink botnet"; the report ties the family to the Sandworm-operated
  botnet "recently ... used to target WatchGuard Firebox devices according to an analysis
  performed by the UK's National Cyber Security Centre (NCSC)." Establishes that Cyclops Blink
  was not confined to WatchGuard appliances (the sole vendor named in AA22-054A).
