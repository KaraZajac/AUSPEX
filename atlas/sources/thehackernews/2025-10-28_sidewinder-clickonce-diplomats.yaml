notes: |
  The Hacker News reporting on Trellix's disclosure ("SideWinder's Shifting Sands: Click
  Once for Espionage") of multi-wave 2025 SideWinder phishing against South Asian diplomats,
  incl. Pakistani targets. Corroborating source created 2026-07-05 for event
  2025-04/sidewinder-pahalgam-tempo-spike (RE-SOURCE off phantom Sekoia).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (171,938 bytes; b8c9fbfc…92dc049a). Verbatim support:
   - "A European embassy located in the Indian capital of New Delhi, as well as multiple
     organizations in Sri Lanka, Pakistan, and Bangladesh, have emerged as the target of a
     new campaign orchestrated by a threat actor known as SideWinder."
   - "As recently as May 2025, Acronis revealed SideWinder's attacks aimed at government
     institutions in Sri Lanka, Bangladesh, and Pakistan..."
   - "The consistent use of custom malware, such as ModuleInstaller and StealerBot,
     coupled with the clever exploitation of legitimate applications..." — Trellix.
   - one wave (post Sept 1, 2025, aimed at Indian embassies) used a lure titled
     "India-Pakistan Conflict -Strategic and Tactical Analysis of the May 2025.docx" sent
     from "mod.gov.bd.pk-mail[.]org" spoofing Pakistan's Ministry of Defense — a lure THEME
     referencing the conflict, not evidence of a Pakistan-targeted tempo spike.
  Underlying vendor primary (trellix.com/blogs/research/sidewinders-shifting-sands-click-once-for-espionage)
  is Cloudflare/bot-walled (curl HTTP 000, WebFetch 403); corroborated via this THN mirror.
