  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (b88506bc…396746d6, 174,966 bytes). Byline "Ravie Lakshmanan
  Feb 11, 2025". Verbatim support:
   - "Thai media reports have revealed that four European nationals – two men
     and two women – were arrested across four different locations on Monday as
     part of an effort codenamed Operation Phobos Aetor." (initial Thai-media
     framing "European"…)
   - "Update Europol, in a press statement, said the four arrested individuals
     are all Russian nationals who are alleged to have deployed a Phobos
     ransomware variant to extort victims across Europe and beyond." (…corrected
     to RUSSIAN by Europol — the authoritative nationality)
   - Seizure banner: "This hidden site and the criminal content have been seized
     by the Bavarian State Criminal Police Office on behalf of the Office of the
     Public Prosecutor General in Bamberg."
   - "They are alleged to be linked to the deployment of Phobos ransomware
     against 17 companies located in Switzerland between April 2023 and October 2024."
   - "the group has been accused of earning $16 million through attacks that
     claimed over 1,000 victims across the world."
   - "the operation led to the disruption of more than 100 servers linked to the
     cybercrime network."
   - Takedown partners: "U.K. National Crime Agency (NCA), the U.S. Federal Bureau
     of Investigation (FBI), Europol, as well as agencies from Bavaria, Belgium,
     Czechia, France, Germany, Japan, Romania, Spain, Switzerland, and Thailand."
