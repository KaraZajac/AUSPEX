  shares overlaps with another actor called Transparent Tribe." Reports the
  lure "Cyber Advisory 2023.docm" masquerading as an India Ministry of
  Communications advisory about "Android Threats and Preventions" (content
  lifted from a genuine July-2020 departmental alert), and notes ReverseRAT
  was first documented (targeting Indian government/energy) by Lumen Black
  Lotus Labs in 2021. Carries the Transparent Tribe overlap + Ministry-of-
  Communications lure detail that the ThreatMon PDF text does not surface.
  Tertiary (reports on ThreatMon's research; not itself the investigator).
