notes: |
  Secondary corroboration for event 2024-05/apt28-spd-czech-polish-spearphishing.
  Created 2026-07-04 during the phantom-remediation audit (govt primary
  link-rotted; see the aljazeera source record). Carries the CVE, the German
  victim enumeration, the Czech MFA statement, the unit-26165 identification, and
  the NATO/EU solidarity quotes.
  AUDIT (2026-07-04, claude-opus-4-8/max): raw snapshot captured + sha256 verified
  (179,963 bytes). Verbatim support:
   - "The security flaw in question is CVE-2023-23397, a now-patched critical
     privilege escalation bug in Outlook that could allow an adversary to access
     Net-NTLMv2 hashes and then use them to authenticate themselves by means of a
     relay attack."
   - "Germany's Federal Government (aka Bundesregierung) attributed the threat
     actor to a cyber attack aimed at the Executive Committee of the Social
     Democratic Party using the same Outlook vulnerability for a 'relatively long
     period,' allowing it to 'compromise numerous email accounts.'"
   - "Some of the industry verticals targeted as part of the campaign include
     logistics, armaments, the air and space industry, IT services, foundations,
     and associations located in Germany, Ukraine, and Europe, with the
     Bundesregierung also implicating the group to the 2015 attack on the German
     federal parliament (Bundestag)."
   - "APT28, assessed to be linked to Military Unit 26165 of the Russian
     Federation's military intelligence agency GRU..." (unit 26165 stated as an
     assessed/community identification, not as the German government's own wording).
   - Czech MFA: "Cyberattacks targeting political entities, state institutions and
     critical infrastructure are not only a threat to national security but also
     disrupt the democratic processes on which our free society is based."
   - NATO said Russia's hybrid actions "constitute a threat to Allied security."
   - "The Council of the European Union ... stating the 'malicious cyber campaign
     shows Russia's continuous pattern of irresponsible behavior in cyberspace.'"
