notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): live URL fetched + raw
  captured + hashed (178,224 bytes; byline Dec 18, 2025 — matches
  published_on). Summarises the same-day Chainalysis 2025 recap.
  Carries the Upbit theft + Lazarus attribution used by this event.
  Verbatim (Upbit): "The adversary is also believed to be involved
  in the theft of $36 million worth of cryptocurrency from South
  Korea's largest cryptocurrency exchange, Upbit, last month."
  (hedged — "believed to be involved"; "last month" from a 18 Dec
  2025 dateline = November 2025). Verbatim (Bybit/attribution):
  "The February 2025 hack of cryptocurrency exchange Bybit alone is
  responsible for $1.5 billion of the $2.02 billion plundered by
  North Korea. The attack was attributed to a threat cluster known
  as TraderTraitor (aka Jade Sleet and Slow Pisces)." Verbatim:
  "Lazarus Group is affiliated with Pyongyang's Reconnaissance
  General Bureau (RGB)." NOTE: this article attributes Upbit to
  "Lazarus Group" (not TraderTraitor) and does NOT mention WOO X,
  the $14M figure, July 2025, Solana, TRM Labs, or CertiK.
