notes: |
  Journalism coverage of the Group-IB / Bridewell "distinctive rattle"
  SideWinder report. Corroborates: the 55-domain/IP infrastructure;
  phishing domains mimicking "organizations in the news, government,
  telecommunications, and financial sectors"; SideWinder "setting its
  sights on financial, government, and law enforcement organizations, as
  well as companies specializing in e-commerce and mass media in Pakistan
  and China"; spear-phishing as the initial vector; documents uploaded to
  VirusTotal in March 2023 from Pakistan; SideWinder active since at least
  2012 and "widely believed to be associated with Indian espionage
  interests". AUDIT (2026-06-27, claude-opus-4.8/max): raw captured +
  hashed (above, 167043 bytes). Secondary corroborator added for the
  re-sourced event 2023-04/sidewinder-pakistan-china-ongoing.
