notes: |
  Secondary reporting on the 2025-01-17 OFAC sanctions (Yin Kecheng + Sichuan Juxinhe).
  Source for the quantified impact (Bloomberg-reported file/computer counts) AND the
  contested APT27/UNC5221 overlap in event 2024-12/treasury-beyondtrust-silk-typhoon.
  Created 2026-07-05 (RE-SOURCE).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (173,857 bytes). Verbatim support:
   - impact: "According to a recent report from Bloomberg, the attackers are said to
     have broken into no less than 400 computers belonging to the Treasury and stole
     over 3,000 files, including policy and travel documents, organizational charts,
     material on sanctions and foreign investment, and 'Law Enforcement Sensitive'
     data." (i.e. ~400 computers / 3,000+ files — corrects the event's earlier "~100")
   - MSS individual: "The sanctions target Yin Kecheng, who is assessed to have been a
     cyber actor for over a decade and affiliated with China's Ministry of State
     Security (MSS)."
   - Sichuan Juxinhe tied to Salt Typhoon (a SEPARATE AUSPEX cluster), not to this
     compromise.
   - contested APT27 overlap (hedged): "Mandiant told The Hacker News that the cluster
     it tracks as UNC5221 likely overlaps with APT27 and Silk Typhoon, although it
     pointed out that it doesn't have 'independent evidence' on its own to confirm
     these connections."
