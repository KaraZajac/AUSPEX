notes: |
  Supporting quotes (GENESIS PANDA, verbatim from the captured page): "Active since at least
  January 2024, Genesis Panda has been attributed to high-volume operations targeting the financial
  services, media, telecommunications, and technology sectors spanning 11 countries. The goal of the
  attacks is to enable access for future intelligence-collection activity." / "The possibility that
  it acts as an initial access broker stems from the group's exploitation of a wide range of
  web-facing vulnerabilities and limited data exfiltration." / "The adversary has [been] observed
  'consistently' querying the Instance Metadata Service (IMDS) associated with a cloud-hosted server
  to obtain credentials for the cloud control plane and enumerate network and general instance
  configurations." / "Although Genesis Panda targets a variety of systems, they show consistent
  interest in compromising cloud-hosted systems to leverage the cloud control plane for lateral
  movement, persistence, and enumeration," CrowdStrike said.

