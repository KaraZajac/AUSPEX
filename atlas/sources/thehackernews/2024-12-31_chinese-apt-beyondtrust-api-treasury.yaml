notes: |
  Secondary reporting that carries the U.S. Treasury 2024-12-30 letter to Congress
  verbatim. Source for the disclosure facts + the Treasury (nation-level) attribution
  in event 2024-12/treasury-beyondtrust-silk-typhoon. Created 2026-07-05 (RE-SOURCE).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (170,996 bytes). Verbatim support:
   - "On December 8, 2024, Treasury was notified by a third-party software service
     provider, BeyondTrust, that a threat actor had gained access to a key used by the
     vendor to secure a cloud-based service used to remotely provide technical support
     for Treasury Departmental Offices (DO) end users."
   - "the threat actor was able to override the service's security, remotely access
     certain Treasury DO user workstations, and access certain unclassified documents
     maintained by those users."
   - attribution is NATION-LEVEL only: "available evidence points to it being the work
     of an unnamed state-sponsored Advanced Persistent Threat (APT) actor from China."
   - "the Office of Foreign Assets Control (OFAC) as well as the Office of the Treasury
     Secretary" named as breached (citing anonymous U.S. officials).
  Note: this Dec-31 report does NOT yet name "Silk Typhoon" (that came ~Jan 9 2025 via
  Bloomberg) and carries NO file/workstation counts.
