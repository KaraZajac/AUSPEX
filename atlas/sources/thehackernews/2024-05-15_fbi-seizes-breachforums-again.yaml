notes: |
  Reporting on the FBI's May 15 2024 seizure of the
  BreachForums clearnet domain (breachforums.st) and forum
  administrator "Baphomet"'s Telegram channel. International
  operation with participation from Australia, Iceland, New
  Zealand, Switzerland, UK, US, and Ukraine.
