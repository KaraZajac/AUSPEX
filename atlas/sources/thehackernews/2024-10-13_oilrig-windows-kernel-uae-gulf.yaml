notes: |
  Corroborating journalism (Ravie Lakshmanan) on Trend Micro's
  Oct-2024 Earth Simnavaz / APT34 / OilRig report. Added
  2026-07-05 (claude-opus-4.8/max audit) because the live Trend
  Micro page has since been edited to genericize the victim to
  "Middle East"; this article preserves the original victimology
  and the Iran attribution. Verbatim quotes from the captured raw
  (sha256 78969f5a…e3b2077c, 170310 bytes): "The Iranian threat
  actor known as OilRig has been observed exploiting a now-patched
  privilege escalation flaw impacting the Windows Kernel as part of
  a cyber espionage campaign targeting the U.A.E. and the broader
  Gulf region." Attack chain: "Initial access … facilitated by
  means of infiltrating a vulnerable web server to drop a web
  shell, followed by dropping the ngrok remote management tool to
  maintain persistence and move to other endpoints"; "abuse of the
  elevated privileges to drop the password filter policy DLL
  (psgfilter.dll)"; the STEALHOOK backdoor "responsible for
  transmitting harvested data via the Exchange server to an email
  address controlled by the attacker in the form of attachments".
  Quotes Trend Micro researchers Mohamed Fahmy, Bahaa Yamany, Ahmed
  Kamal, and Nick Dai.
