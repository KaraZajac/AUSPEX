  Verbatim: "Four individuals" were arrested by the NCA in connection
  with the cyber attacks on Marks & Spencer, Co-op, and Harrods, an
  incident estimated to cost around £440 million. The reporting ties
  the wave to Scattered Spider and DragonForce ransomware. Corroborates
  the victim triad and the continued-law-enforcement-response framing
  (companion to policy-action multilateral/2025-05-20_uk-scattered-
  spider-retail, whose 2025-05-20 date should be reviewed — the NCA
  arrests were announced 2025-07-10, not May).
