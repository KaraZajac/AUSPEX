notes: |
  The Hacker News reporting on the Der Spiegel disclosure of the 2016 TeamViewer
  breach. Corroborating (secondary) source for the Winnti / Chinese-origin
  attribution and TeamViewer's no-data-stolen statement. Created 2026-07-01 as a
  second real source for event 2019-05/teamviewer-breach (RE-SOURCE off the
  phantom mandiant/2024-07-18_apt41-dust citation).
  AUDIT (2026-07-01, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (167,144 bytes). Verbatim support:
   - "the cyber attack was launched by hackers with Chinese origin who used
     Winnti trojan malware, activities of which have previously been found linked
     to the Chinese state intelligence system."
   - "TeamViewer also said both their team and the responsible authorities at
     that time found no evidence that customer data was stolen, or computer
     systems of its customers were infected."
   - "An expert team ... found no evidence that customer data or other sensitive
     information had been stolen, that customer computer systems had been infected
     or that the TeamViewer source code had been manipulated, stolen or misused
     in any other way."
