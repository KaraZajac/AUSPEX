notes: |
  The Hacker News reporting on Acronis Threat Research Unit's disclosure ("From banks
  to battalions: SideWinder's attacks on South Asia's public sector") of a 2025 SideWinder
  spear-phishing campaign against South Asian government institutions, including Pakistan.
  Real primary-mirror source created 2026-07-05 to RE-SOURCE event
  2025-04/sidewinder-pahalgam-tempo-spike off the phantom Sekoia citation
  (sekoia/2025-05-07_sidewinder-pahalgam-tempo, url:null, no article ever recovered).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (170,631 bytes; ecef0b01…fa027948). Verbatim support for the re-sourced event:
   - "High-level government institutions in Sri Lanka, Bangladesh, and Pakistan have
     emerged as the target of a new campaign orchestrated by a threat actor known as
     SideWinder."
   - "Some of the targets of the campaign, per Acronis, include Bangladesh's
     Telecommunication Regulatory Commission, Ministry of Defence, and Ministry of
     Finance; Pakistan's Directorate of Indigenous Technical Development; and Sri Lanka's
     Department of External Resources, Department of Treasury Operations, Ministry of
     Defence, and Central Bank." (the Pakistan-specific named victim is the Directorate
     of Indigenous Technical Development — a defense technical-development body.)
   - "The malicious payload is an RTF file that weaponizes CVE-2017-11882, a memory
     corruption vulnerability in the Equation Editor, to launch a shellcode-based loader
     that runs the StealerBot malware."
   - "the modus operandi is consistent with recent SideWinder attacks documented by
     Kaspersky in March 2025."
  Note: article carries NO "Pahalgam", "Operation Sindoor", "Karachi", or crisis-driven
  "tempo spike" framing — it documents an ongoing 2025 SideWinder espionage campaign whose
  window overlaps the April–May 2025 India–Pakistan crisis; the crisis-tempo linkage is an
  AUSPEX inference, not a source claim.
