notes: |
  Reports Instructure's ransom agreement with the extortion group
  ShinyHunters over the May 2026 Canvas LMS breach. ShinyHunters claimed
  >3.65 TB across ~9,000 institutions and up to 275 million individuals
  (the actor's own figures, unverified). Agreement reached 2026-05-11, a
  day before the threatened leak deadline; data reportedly returned with
  "shred logs." Second ShinyHunters compromise of Instructure in ~8
  months (after a Sept 2025 Salesforce social-engineering breach). URL
  curl-verified 2026-06-08.
  AUDIT (2026-07-05, claude-opus-4.8/max): re-snapshotted; sha256
  committed. The article's own phrasing for proof-of-destruction is
  "digital confirmation of data destruction" / "the pilfered data was
  returned to it" — it does NOT use the term "shred logs" (an embellishment
  in the summary/this note, corrected in the event). The article labels the
  figure "about 275 million records"; The Register + Bitdefender instead
  frame it as ~275 million individuals/users (the actor's claim, which
  Instructure has not confirmed). The Sept 2025 Salesforce breach and the
  "eight months" framing are NOT in this article — they are carried by the
  added Bitdefender + Reed Smith + Register sources.
