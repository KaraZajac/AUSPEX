title: |
  Instructure Reaches Ransom Agreement with ShinyHunters to Stop 3.65TB Canvas Leak
url: https://thehackernews.com/2026/05/instructure-reaches-ransom-agreement.html
archive_url: "https://web.archive.org/web/20260522220656/https://thehackernews.com/2026/05/instructure-reaches-ransom-agreement.html"
