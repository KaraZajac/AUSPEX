notes: |
  Living CSV FAQ page: first FAQs added Tuesday 2 January 2024; the
  snapshot captures the page state with updates through 20 February
  2024 (the page itself lists which FAQs were added on 2 Jan, 16 Jan,
  18 Jan and 20 Feb 2024). Load-bearing answers, verbatim: "While we
  became aware on 21 December, the incident occurred on 8 December.
  It was a breach of a single system that manages only audio-visual
  recordings for all courts and was contained to only that system.";
  "Who is responsible for the breach? We don't provide information or
  details on cyber threat actors."; on demands/threats to release
  recordings: "For security reasons, we will not comment on the
  specific details of our response to this cyber incident." (i.e. CSV
  never confirmed OR denied a ransom demand/payment); "CSV has
  notified the relevant authorities, including Victoria Police whose
  cybercrime squad is investigating" + Victorian Department of
  Government Services cyber experts + IDCARE support; restoration
  timeline ("Video conferencing was re-established in most courts on
  16 January 2024, enabling the return of hybrid hearings from Monday
  22 January 2024"; Melbourne CBD in-court recordings live late
  February/early March; regional courtrooms mid-March to April;
  affected AV network "rebuilt with current technology and increased
  security"); sensitivity FAQ on identities "protected by court
  orders or legislation".
