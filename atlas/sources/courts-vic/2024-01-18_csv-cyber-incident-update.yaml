notes: |
  CEO Louise Anderson's 18 January 2024 update on CSV's cyber-incident
  news page (the page that also hosts the 2 January statement PDF).
  Carries verbatim: "the primary investigation period initially was
  1 November to 21 December, which is when CSV identified the problem
  and isolated and disabled the affected network"; "The incident
  impacted a single network that manages only audio-visual recordings
  for all courts and was contained to only that network"; and the
  EXPANDED date ranges that emerged "from Friday 5 January 2024 when
  CSV was able to analyse devices it had disabled": County Court
  "4-6 April 2016; 28 May 2019 to 21 December 2023" (majority of
  hearings recorded on the network from 1 January 2023; some from
  28 May 2019); Coroners Court "5 August 2019 to 21 December 2023";
  Supreme Court regional/County-building hearings back to April 2016
  (Ballarat), plus Bendigo Aug 2023, Shepparton Jan/Feb/Jul/Aug 2023,
  Wodonga Oct-Dec 2023; Magistrates' and Children's Court ranges
  unchanged; VCAT none. Names NO threat actor.
