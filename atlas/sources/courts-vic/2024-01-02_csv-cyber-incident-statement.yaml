notes: |
  CSV's founding public statement on the incident (Tuesday, 2 January
  2024), the primary disclosure document. Carries verbatim: "On
  Thursday 21 December 2023, Court Services Victoria (CSV) was alerted
  to a cyber security incident impacting Victoria's courts and
  tribunals"; "unauthorised access leading to the disruption of the
  audio visual in-court technology network, impacting video
  recordings, audio recordings and transcription services";
  "Recordings of some hearings in courts between 1 November and
  21 December 2023 may have been accessed. It is possible some
  hearings before 1 November are also affected."; "No other court
  systems or records, including employee or financial data, were
  accessed."; per-court table (Supreme Court 1-21 Dec incl. Court of
  Appeal/Criminal Division/Practice Court + two regional November
  hearings; County Court all criminal and civil hearings recorded
  1 Nov-21 Dec; Magistrates' Court some committals; Children's Court
  one October hearing possibly remaining on the network; Coroners
  Court all hearings 1 Nov-21 Dec; VCAT none). Names NO threat actor
  and gives no ransom-demand details.
