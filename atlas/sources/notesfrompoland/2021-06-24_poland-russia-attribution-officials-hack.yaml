  KEY WORDING (verbatim from the snapshot):
  - POLAND'S ATTRIBUTION (Russia, via the UNC1151 cluster): Jarosław
    Kaczyński "declared that it could be 'clearly stated that the
    cyberattack was carried out from the territory of the Russian
    Federation'". Stanisław Żaryn, spokesman for Poland's security
    services: "The findings of the Internal Security Agency and the
    Military Counterintelligence Service show the attack [was] carried out
    by the UNC1151 [cyber espionage] group ... [We] have reliable
    information linking the actions of the UNC1151 group with the Russian
    security services." Belarus appears 0x — Poland framed the operation as
    Russian. (This is a load-bearing citation for the standing Ghostwriter
    Belarus-vs-Russia nation contest: the VICTIM government named Russia,
    while Mandiant homes the UNC1151 operator to Belarus.)
  - SCOPE (quantified): "attempted attacks had been made against 4,350
    Polish email accounts, including those belonging to 100 people holding
    'public functions'".
  - CAMPAIGN FRAME: Żaryn — the UNC1151 actions affecting Poland "are part
    of the 'Ghostwriter' campaign, the aim of which is to destabilise the
    political situation in Central European countries".
  - VECTOR: the attacks were carried out through "phishing ... and that
    this had resulted in 'several outside logins to the mailbox used by
    Michał Dworczyk'".
