  carries the victim identity, role, and vector).

  Captured live 2026-07-11 (HTTP 200, 290,024 B). og:published_time
  2021-06-09T10:53:34+02:00 (byline Maria Wilczek, Deputy Editor).

  KEY WORDING (verbatim from the snapshot):
  - ROLE (corrects the event's old "Minister of Defence" error): "Michał
    Dworczyk, the head of the chancellery of Poland's prime minister, has
    confirmed that private email accounts belonging to him and his wife
    were hacked"; "Dworczyk, who as well being the head of the prime
    minister's office also holds ministerial rank".
  - "no classified information had been at risk".
  - "The alleged cyberattack, which Dworczyk said was part of a
    'large-scale disinformation campaign' ... is the latest in a series of
    apparent hacks of accounts belonging to senior figures associated with
    the ruling Law and Justice (PiS) party" (carries the PiS-senior-figures
    scope).
  - LEAK VECTOR: he "noted a link between the 'Russian social media service
    Telegram' — where the documents purporting to be from his account have
    been posted".
  - NARRATIVE: the leaked material could "harm the national security of
    Poland as well as serve as evidence of alleged Polish interference in
    Belarus's internal affairs".
  This is secondary reporting of Dworczyk's own statement; it names no
  technical actor (UNC1151/Ghostwriter appear 0x here) — the Belarus/Russia
  attribution is carried by the companion sources (Mandiant, NfP 2021-06-24,
  EU Council).
