  Disclosure-anchor secondary source for the Dworczyk hack-and-leak.
  Created 2026-07-11 (claude-opus-4.8/max) during the QC audit of event
  2020-09/ghostwriter-poland-government-leaks (RE-SOURCE: the two prior
  cited sources — Mandiant Nov-2021 + EU Council — carry the Polish
