notes: |
  Picus Security threat-database profile of Handala (an evergreen page:
  the archived copy is "Last Updated: April 10" and already carries
  Feb/Mar 2026 events, so published_on 2024-09-01 is unreliable — flag).
  AUDIT (2026-07-11, claude-opus-4.8/max): live URL 404s; snapshotted +
  hashed from Wayback 20260610042622. CORRECTION — this record's prior
  notes claimed Picus "documents the February-June 2024 Israeli-
  healthcare extortion wave (8 BTC ransom demands...)"; that is FALSE.
  The archived Picus page contains ZERO bitcoin/BTC references and no
  healthcare-extortion wave. Its Feb-Jun 2024 timeline is: "3 March 2024
  - Handala claimed to have successfully hacked and defaced DRS RADA, an
  Israeli multi-purpose tactical radar company, threatening to leak 2
  terabytes of internal data" and "15 June 2024 - the group claimed
  responsibility for a ransomware attack on the Ma'agan Michael Kibbutz
  in Israel, exfiltrating 22GB of data and sending over 5,000 warning
  SMS messages to residents." Healthcare appears only as a generic
  target sector and as a "February 2026 ... targeting Israeli civilian
  healthcare systems" entry. The 8-BTC healthcare claim in
  2024-04/handala-israeli-healthcare-extortion was a mis-attribution to
  Picus; its true (sole) carrier is constella/2024-10-16_israeli-breaches.
  Still cited by 2024-07 handala-crowdstrike-outage-wiper (which the
  archived Picus timeline does support, dated 20-21 July 2024).
