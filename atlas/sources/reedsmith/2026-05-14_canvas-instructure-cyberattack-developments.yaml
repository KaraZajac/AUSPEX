notes: |
  Reed Smith LLP client alert (Weimer/Mosley/Louik/Mishkin) with the
  dated timeline of the May 2026 Instructure Canvas breach. Added
  2026-07-05 as the source anchoring the public-disclosure date and the
  paid-ransom resolution. Verbatim: "Instructure's chief information
  security officer, Steve Proud, notified customers on May 1 that the
  company had experienced a cybersecurity incident perpetrated by a
  criminal threat actor. By May 2, Instructure said the situation had
  been 'contained'"; "The Canvas breach was Instructure's second
  confirmed compromise by ShinyHunters in approximately eight months. In
  September 2025, ShinyHunters exploited a social engineering attack
  against the company's Salesforce environment"; "[Instructure] has now
  paid a ransom to ShinyHunters ... The agreement was reached on May 11,
  2026 - one day before the hackers' deadline to leak the stolen data.
  Under the agreement, the hackers reportedly returned the compromised
  data." JSON-LD datePublished 2026-05-14T00:00:00 (dateModified
  2026-06-18). URL curl-verified + snapshot captured; sha256 committed.
