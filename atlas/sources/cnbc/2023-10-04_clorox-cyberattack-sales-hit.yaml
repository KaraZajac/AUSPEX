notes: |
  Contemporaneous coverage of Clorox's post-attack guidance and the
  Scattered Spider linkage. Verbatim: "Scattered Spider, a group of
  hackers tied to recent cyberattacks on casino companies MGM and
  Caesars, is suspected of being tied to the August attack on Clorox,
  Bloomberg reported Wednesday." Also: the company "expects net sales
  to decrease 23% to 28%" for the quarter and to post a per-share
  loss. Corroborates the (suspected) attribution and the material
  sales impact; traces the attribution to the Bloomberg scoop.
