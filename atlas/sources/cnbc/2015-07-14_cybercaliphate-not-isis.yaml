notes: |
  Primary false-flag attribution source, naming the Warsaw Stock
  Exchange directly. iSight Partners analysts (Joseph Gallop, Brian
  Bartholomew) assess that "Cyber Caliphate is likely what spies call
  a 'false flag' operation" and "is actually operated by a group of
  Russians — not ISIS sympathizers." Ties it to iSight's APT28 cluster:
  "resources were shared between Cyber Caliphate and the group we call
  the Tsar Team" and shared command-and-control infrastructure ("We're
  highly confident that these groups are related"). States the WSE
  origin: the theory is "the Cyber Caliphate grew out of a hack into
  the Warsaw stock exchange in October — an attack conducted by hackers
  using ISIS type rhetoric," which "seemed to iSight that Russian
  hackers might be sending a subtle message to the Poles," and that the
  actor "in November decided to put the 'Cyber Caliphate' label on it."
  Notes the hedge: iSight "don't know whether the groups are operated
  by the Russian government, Russian criminals, or some other type of
  Russian entity" — i.e. a Russian actor (Tsar Team / APT28) but no
  confirmed GRU-unit / state-direction claim at named-unit level.
