notes: |
  CNBC reporting on the December 18, 2023 Predatory Sparrow claim
  (JSON-LD datePublished 2023-12-18T10:30:47Z). Carries verbatim:
  "A hacking group widely reported as being linked to Israel has
  taken responsibility"; the Gonjeshke Darande / Predatory Sparrow
  self-claim on X ("We, Gonjeshke Darande, carried out another
  cyberattack today, taking out a majority of the gas pumps
  throughout Iran. This cyberattack comes in response to the
  aggression of the Islamic Republic and its proxies in the
  region"); the controlled-manner + prior-warnings-to-emergency-
  services statement; the "Khamenei, playing with fire has a price"
  threat; the June 2022 Khuzestan steel prior op; and — the key
  Iranian-official line — "Iranian state TV cited the country's Oil
  Minister Javad Owji saying that outside interference was a
  possible cause after 70% of Iran's gas stations were hit by
  service disruptions, according to Reuters" (i.e. NOT an explicit
  cyber acknowledgment). Snapshotted 2026-07-10.
