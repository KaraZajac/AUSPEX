notes: |
  Contemporaneous wire/CNBC reporting on the JBS shutdown, added
  2026-07-10 (claude-opus-4.8/max audit) to carry the operational-
  impact, USDA-response, and price claims the FBI + White House
  sources do not. Verbatim load-bearing quotes:
  - Capacity: "JBS controls about 20% of the slaughtering capacity
    for U.S. cattle and hogs." (company figure; breakout reporting
    elsewhere = ~a quarter of beef / ~a fifth of pork.)
  - CEO: "we are not sparing any resources to fight this threat,"
    said Andre Nogueira, chief executive of JBS USA.
  - Price: "Prices for choice and select cuts of U.S. beef shipped
    to wholesale buyers in large boxes each jumped more than 1%, the
    USDA said." (Refutes the event's prior "~10%" spike claim.)
  - USDA action: "The USDA contacted several major meat processors to
    encourage them to keep supplies moving and slaughter additional
    livestock when possible." (Refutes the event's prior "USDA
    released emergency stocks" claim.)
  - Attribution: White House (spokeswoman Karine Jean-Pierre) said
    the attack was likely carried out by a criminal organization
    based in Russia. Also names Canada / Australia impact and the
    resumption of slaughter.
