notes: |
  Joint statement issued at the August 18, 2023 Camp David
  trilateral summit. Anchor primary source for the
  kr/korus-cyber-cooperation doctrine. Original state.gov URL
  removed in the 2024-2025 Trump administration archive
  migration; canonical text preserved at
  bidenwhitehouse.archives.gov. Identical statement also
  released by ROK MoFA and Japan MoFA on the same date.

  AUDIT (2026-07-10, claude-opus-4.8/max): captured + hashed
  (raw_snapshot above, 151,045 bytes). The archived primary is
  a WHITE HOUSE briefing-room release (bidenwhitehouse.archives
  .gov/briefing-room/statements-releases/2023/08/18/...), so
  the "state-gov" id slug and the "US Department of State"
  publisher are legacy labels — the document is a trilateral
  leaders' joint statement (Japan/ROK/US). CORRECTION to the
  prior note: the statement does NOT name a "Trilateral Cyber
  Cooperation Working Group" and does NOT use the word
  "cryptocurrency" (0 hits). Its verbatim cyber provision is:
  "We announce the establishment of a new trilateral working
  group to drive our cooperation, including with the
  international community, to combat DPRK cyber threats and
  block its cyber-enabled sanctions evasion," motivated by
  concern over "the DPRK's illicit cyber activities that fund
  its unlawful WMD and ballistic missile programs." Supply-chain
  cooperation ("supply chain resilience, particularly on
  semiconductors and batteries") is a SEPARATE economic-security
  track, not part of the cyber working group. tier/primary
  PRESERVED.
