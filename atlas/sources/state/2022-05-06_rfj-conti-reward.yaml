  AUDIT (2026-07-10, claude-opus-4.8/max): snapshot captured + sha256
  (HTTP 200, 128723 bytes). Confirmed verbatim: "Conti – Rewards For
  Justice" and "Reward Up to $10 million" for Conti leadership (Europe
  and Eurasia). NOTE: the live landing page names Conti but NOT Costa
  Rica; the Costa-Rica linkage is carried by the secondary sources
  (BBC: "It blamed Conti for the cyber-attacks which hit Costa Rica").
  The original 6 May 2022 offer combined up to $10M (leadership ID/
  location) + up to $5M (arrest/conviction) = up to $15M; the current
  landing page shows the $10M leadership tranche. Used here as the US
  govt-primary attribution corroborant, not a standalone Costa-Rica
  narrative source.
