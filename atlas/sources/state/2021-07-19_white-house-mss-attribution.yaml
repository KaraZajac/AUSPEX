notes: |
  White House high-confidence attribution of the Microsoft Exchange
  ProxyLogon compromise (Hafnium) to MSS-affiliated actors. Five Eyes
  + NATO + EU coordinated condemnation.
  AUDIT (2026-06-24, claude-opus-4.8/max): used to VERIFY the cn/mss/hafnium service
  placement (KEEP). Snapshot captured from the archive_url Wayback copy (the live WH page
  was purged at the 2025 transition; url is null). This statement NAMES the MSS as the
  affiliating service for the exact Exchange/ProxyLogon operation that defines the Hafnium
  record — not merely "China"/"PRC": "Attributing with a high degree of confidence that
  malicious cyber actors affiliated with PRC's MSS conducted cyber espionage operations
  utilizing the zero-day vulnerabilities in Microsoft Exchange Server disclosed in early
  March 2021. Before Microsoft released its security updates, MSS-affiliated cyber operators
  exploited these vulnerabilities to compromise tens of thousands of computers and networks
  worldwide..." The service attribution is therefore source-supported at the named-actor
  level. (The statement's separate "criminal contract hackers" / DOJ-four-MSS-hackers
  paragraphs concern other PRC activity and are not the Exchange attribution.)
