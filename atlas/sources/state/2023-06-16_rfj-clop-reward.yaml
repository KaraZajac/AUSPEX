notes: |
  Rewards for Justice bounty offer of up to USD 10M for information
  linking CL0P (Cl0p) ransomware operations to a foreign government,
  issued during the MOVEit mass-exploitation campaign. Exact landing
  URL may differ; the RfJ page consolidates multiple actor bounties.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited as a state-nexus source for ru/proxies/clop; it does NOT
  establish one. As captured (the generic "Foreign Malicious Cyber Activity Against U.S. Critical
  Infrastructure" landing page) it never mentions CL0P / Cl0p / TA505 / MOVEit by name (0 hits). It offers
  "a reward of up to $10 million for information leading to the identification or location of any person
  who, while acting at the direction or under the control of a foreign government, participates in
  malicious cyber activities against U.S. critical infrastructure in violation of the … (CFAA)." That is a
  CONDITIONAL bounty hypothesis the US offered to TRY to establish a state link — not a finding that Cl0p
  is state-directed/tasked/tolerated; the existing note already concedes the page "consolidates multiple
  actor bounties" and the landing URL may differ. (The lone "Russian" token is the UI language selector
  "Русский".) Supports DEMOTE ru/proxies/clop -> ru/unscoped/clop (no source-documented state nexus;
  profit-criminal -> criminal/ candidate per emotet).
