notes: |
  State Department Fact Sheet (Office of the Spokesperson,
  12 Jan 2026) issued at the UN to highlight the Multilateral
  Sanctions Monitoring Team (MSMT) report first released in
  October 2025. Preserves the US-government attestation linking
  DPRK cyber-theft and IT-worker proceeds to WMD and ballistic-
  missile programs in the post-UN-PoE era. Functional partial
  substitute for the discontinued UN 1718 Panel of Experts
  reporting.
  AUDIT (2026-07-02, claude-opus-4.8/max): raw snapshot captured
  + hashed; HTTP 200, <title> and og:title match verbatim (NOT a
  phantom). published_on corrected 2026-01-15 -> 2026-01-12 per
  the Fact Sheet byline. WMD/ballistic-missile-financing goal
  stated in substance ("These activities generate revenue for the
  DPRK's unlawful weapons of mass destruction (WMD) and ballistic
  missile programs") — supports the event's attested doctrine
  link. Only dollar figures present: +$400M (3 mo since release),
  >$2B in 2025, >=$2.8B Jan 2024-Sept 2025 across 40+ heists (no
  "$6B" figure).
