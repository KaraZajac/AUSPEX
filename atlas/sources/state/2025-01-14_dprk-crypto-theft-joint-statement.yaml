  AUDIT (2026-07-05, claude-opus-4.8/max): live URL fetched, raw
  captured + hashed (147,040 bytes; datePublished
  "2025-01-14T13:36:32+00:00"). Load-bearing verbatim:
  (1) WazirX attribution — "The United States and Republic of
  Korea additionally attribute to the DPRK, based on detailed
  industry analysis, thefts last year against WazirX for $235
  million and Radiant Capital for $50 million." (nation-level:
  "the DPRK").
  (2) Actor naming (general) — "...persistent threat groups
  affiliated with the DPRK, including the Lazarus Group, which
  was designated by the relevant authorities of our three
  countries, continue to demonstrate a pattern of malicious
  behavior in cyberspace by conducting numerous cybercrime
  campaigns to steal cr[yptocurrency]..."
  (3) WMD-financing goal (the attested bar) — "Our three
  governments strive together to prevent thefts, including from
  private industry, by the DPRK and to recover stolen funds with
  the ultimate goal of denying the DPRK illicit revenue for its
  unlawful weapons of mass destruction and ballistic missile
  programs." Standardized govt WMD/ballistic-missile-financing
  language, in the same document that names WazirX -> supports an
  `attested` 8th-Congress doctrine link for 2024-07/wazirx-multisig.
