notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): live URL fetched (HTTP 200, 56,954 bytes) + raw
  captured. Technical reverse-engineering writeup by hfiref0x — the author of the "Turla Driver
  Loader (TDL)" that both ZeroCleare and Dustman fork — so an authoritative primary-technical
  source on the loader mechanism. Carries: Dustman "delivers all the required payloads and
  drivers in a single executable, instead of bringing them separately like ZeroCleare did"; the
  "signed and vulnerable VBoxDrv driver ... exploited to ... map[] the unsigned ElRawDisk
  driver in kernel mode without ... patch[ing] Windows Driver Signature Enforcement (DSE)";
  EldoS RawDisk used "for overwriting the MBR (Master Boot Record) and other disks";
  "Dustman overwrites the volume and ZeroCleare wipes the volume." Malpedia dates it 2020-01-20.
