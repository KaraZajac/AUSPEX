notes: |
  AnyDesk's public disclosure of a production-systems intrusion
  detected mid-January 2024, with code-signing certificate
  rotation and forced password reset across customer base. The
  company's live URL returns a Cloudflare interstitial against
  curl; archive.org snapshot has the text.
  AUDIT (2026-07-04, claude-opus-4.8/max): statement could NOT be snapshotted —
  https://anydesk.com/en/public-statement now 302-redirects to trust.anydesk.com
  (a Vanta trust-center SPA, no statement text), and archive.org is blocked for
  the audit fetcher; no raw_snapshot/content_sha256 recorded (the redirect page
  was deliberately not hashed). NOT a phantom: this record already carried
  url: null + an explanation, and the statement's operative text survives
  verbatim in two independently snapshotted mirrors quoting it — BleepingComputer
  2024-02-02 ("We can confirm that the situation is under control and it is safe
  to use AnyDesk. Please ensure that you are using the latest version, with the
  new code signing certificate") and The Hacker News 2024-02-03 ("We have revoked
  all security-related certificates and systems have been remediated or replaced
  where necessary" / "We will be revoking the previous code signing certificate
  for our binaries shortly and have already started replacing it with a new one";
  my.anydesk.com portal-password revocation). Cert-revocation and password-reset
  facts verified against those mirrored statement quotes. Clarification to the
  prose above: the Feb-2 statement itself gives NO dates — "detected mid-January
  2024" is the company's LATER account (with first breach in late December 2023
  per its forensic investigation), carried by
  securityweek/2024-02-09_anydesk-shares-more-information.
