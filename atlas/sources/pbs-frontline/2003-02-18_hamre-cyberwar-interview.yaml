notes: |
  First-person account by John J. Hamre, Deputy Secretary of Defense
  during Moonlight Maze (1997–1999), for FRONTLINE's "Cyber War!"
  Created 2026-07-10 to REPLACE the phantom source
  congress/1999-03-04_hamre-senate-cyber (no canonical "4 March 1999
  Hamre SASC testimony" exists; the 4 Mar 1999 public disclosure was
  ABC Nightly News). Carries Hamre's own Moonlight Maze account:
  • the case "leaked out ... startlingly, from Congress" (late-Feb-1999
    hearing), which is why detail is discussed only "in a very general
    way";
  • sophistication — "This was not two kids from Cloverdale, California
    ... a very sophisticated set of techniques"; "they had strong
    operational doctrine"; "perpetrators who came more out of an
    intelligence background than a warfare background";
  • the intrusions came "primarily not through the Internet, but
    through the very large-scale science and engineering cyber
    environment";
  • ATTRIBUTION HEDGE (load-bearing correction): "we do not know who
    did it. We do know back a certain direction where the attack came
    from, but we don't know that ... as the ultimate source of the
    attack. It could have been a front operation." His personal read
    was "economic espionage ... I have nothing to base that on other
    than just my instinct." I.e. Hamre made NO on-record attribution
    of Moonlight Maze to Russian state operators.
