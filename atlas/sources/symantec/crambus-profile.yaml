notes: |
  The cited url is the Symantec/Broadcom threat-intelligence blog index (link-rotted to the live
  index, which now lists 2026 posts); the actual report this source represents is "Crambus: New
  Campaign Targets Middle Eastern Government" (19 Oct 2023), canonically at
  https://www.security.com/threat-intelligence/crambus-middle-east-government — that is the page
  captured in raw_snapshot.
  AUDIT (2026-06-24, claude-opus-4.8/max): re. ir/mois/apt34 service placement. This Symantec report
  attributes ONLY to "Iranian" / "Iran-linked", NOT to the MOIS or any named Iranian service.
  Verbatim: "The Iranian Crambus espionage group (aka OilRig, APT34) staged an eight-month-long
  intrusion against a government in the Middle East"; "Crambus is a long-running Iranian espionage
  group"; "Wipers were likely then deployed by other Iran-linked actors." [Corrected 2026-06-25,
  claude-opus-4.8/max: an earlier audit line here wrongly stated "No occurrence of MOIS … in the article."
  The article DOES contain "Iranian Ministry of Intelligence and Security (MOIS)" — but ONLY in reference
  to Seedworm/MuddyWater, a DIFFERENT actor, never to Crambus/OilRig/APT34.] Supports the Iran nexus for
  OilRig at the nation level, not a MOIS service placement for this actor.
