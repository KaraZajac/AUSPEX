notes: |
  Symantec's foundational technical attribution linking the
  Bangladesh Bank, Tien Phong (Vietnam), and Banco del Austro
  (Ecuador) SWIFT operations to the Lazarus Group via shared
  wiper tooling and infrastructure. Live Broadcom docs URL
  returns 404 (post-acquisition migration); canonical content
  preserved at original symantec.com/connect path via the
  Wayback Machine 2016-05-27 snapshot.
  AUDIT (2026-07-10, claude-opus-4.8/max, for event 2015-12/tien-phong-bank-swift):
  UN-SNAPSHOTTABLE — the prior "content preserved via Wayback" claim is
  corrected. The symantec.com/connect blog was a JS-rendered Drupal community
  page; every Wayback capture (2016-05-27 through 2019, ~14-18 KB each) returns
  only the app shell — the 2016-05-27 snapshot yields 607 chars of chrome
  ("You will need to enable Javascript in your browser to access this site"),
  no article body — and the live docs.broadcom.com URL 404s. No content_sha256
  recorded. This source's load-bearing claim for the Tien Phong event (Lazarus
  attribution + the Bangladesh/Vietnam/Ecuador shared-malware linkage) is
  redundantly mirror-corroborated by two snapshotted sources cited on that
  event: the DOJ 2018 complaint (which credits "Symantec, Novetta, and BAE" for
  the Lazarus-Group designation and ties the Vietnamese Bank to Bangladesh Bank)
  and the Mandiant 2018 APT38 report (which lists "Vietnam TP Bank in December
  2015"). Treated as level: partial; not load-bearing for any un-snapshotted
  claim on that event.
