notes: |
  Symantec (Threat Hunter Team / Broadcom) disclosure of a
  Lazarus "Operation Dream Job" continuation (Symantec name:
  Pompilus) targeting South Korean chemical-sector firms, with
  some IT-sector firms compromised as a means to reach the
  chemical targets. Fake-job-offer lures; malicious HTM ->
  Trojanized signed DLL (scskapplink.dll) injected into INISAFE
  Web EX Client; shellcode loaders (Trojanized ComparePlus /
  XZ-Utils). Attributed to Lazarus by shared file hashes, file
  names, and tools with prior Dream Job campaigns.
  AUDIT (2026-07-01, claude-opus-4.8/max): live URL 302->
  www.security.com/threat-intelligence/lazarus-dream-job-chemical,
  HTTP 200, 314582 bytes, sha256 b602aba1...c19aad69. Snapshot
  captured. NB: source does NOT mention LinkedIn, BLINDINGCAN,
  or "job-description attachments" — those were event-prose
  embellishments and have been stripped from the event.
