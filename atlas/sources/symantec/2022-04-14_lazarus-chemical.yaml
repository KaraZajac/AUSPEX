notes: |
  Symantec disclosure of Lazarus "Operation Dream Job"
  targeting chemical-sector and IT-sector firms in South
  Korea. LinkedIn fake-recruiter pretext with trojanized
  job-description payloads dropping BLINDINGCAN-family
  implants. Same operational pattern subsequently
  documented against Spanish aerospace (LightlessCan, ESET
  September 2023) and JumpCloud customers (Mandiant July
  2023).
