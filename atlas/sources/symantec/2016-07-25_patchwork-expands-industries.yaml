notes: |
  Symantec Security Response's report documenting Patchwork
  (a.k.a. Dropping Elephant) expanding its cyberespionage
  targeting from governments to a broad range of industries.
  Original symantec.com/connect blog is dead post-Broadcom
  acquisition; canonical content is preserved at the Broadcom
  community mirror (url above, live; page footer dated
  "Jul 25, 2016 08:56 AM").
  AUDIT (2026-07-05, claude-opus-4.8/max): CREATED as the genuine
  re-source for event 2016-08/patchwork-energy-chemicals-sectoral,
  which previously cited a phantom Forcepoint stub
  (forcepoint/2016-08_monsoon-energy-chemicals-disclosure) that
  points at the Monsoon PDF — a report containing ZERO
  energy/chemicals/sector content. Raw HTML snapshot captured
  (sha256 504e5235…97783769, 137,383 bytes). Verbatim facts:
  - SECTORS (the expanded "more recent attacks" list, exact):
    "Aviation / Broadcasting / Energy / Financial / Non-governmental
    organizations (NGO) / Pharmaceutical / Public sector /
    Publishing / Software", "while most of the interest still lies
    in the public sector." NOTE: "chemicals" is NOT in the list.
  - GEOGRAPHY: "Although approximately half of the attacks focus
    on the US, other targeted regions include China, Japan,
    Southeast Asia, and the United Kingdom." (i.e. US-heavy, NOT
    PRC-concentrated.)
  - LURES: "uses Chinese-themed content as bait"; customised
    sites mimicking "a Chinese public hospital" and "the Chinese
    military"; decoys incl. "2016_China_Military_PowerReport.pps",
    "Clingendael_Report_South_China_Sea…", "china_security_report_2016.pps";
    domains "registered under names that pose as legitimate
    sources for Chinese intelligence"; delivery via "a legitimate
    mailing list provider" newsletter links → weaponised Office
    docs dropping back-door Trojans that exfiltrate files.
  - TIMING: "Our first observation of an attempted attack related
    to this campaign dates back to November 2015, although Symantec
    telemetry data indicates that the campaign may have already
    existed in early 2015 or perhaps even earlier."
  - ATTRIBUTION: names the actor cluster only ("Patchwork, also
    known as Dropping Elephant"); confirms overlap with the recent
    Cymmetria and Kaspersky reports; does NOT attribute to India
    or any nation-state.
