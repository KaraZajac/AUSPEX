  Symantec disclosure of the Polish KNF watering-hole campaign
  and its global financial-sector targeting; attribution to
  Lazarus on the basis of shared loader code and infrastructure.
  Live symantec-enterprise-blogs URL returns 404 post-migration;
  canonical content preserved at original symantec.com/connect
  path via the Wayback Machine snapshot.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshotted the archive_url
  (Wayback 2020-02-24 capture), sha256 b7e61f7c…288abed9. That capture is
  the Symantec Connect Angular single-page-app SHELL — the article body is
  JS-rendered (ng-bind-html) and is NOT in the static HTML; the migrated
  security.com / symantec-enterprise-blogs URLs both 404, so no full-text
  capture is obtainable. The load-bearing claims are, however, carried by
  the captured page metadata: <title>"Attackers target dozens of global
  banks with new malware"; og:/meta description "Watering hole attacks
  attempt to infect more than 100 organizations in 31 different countries";
  meta content_item_tags "...Backdoor.Destover, banks, Downloader.Ratankba,
  financial, Lazarus". Cited by event 2016-10/lazarus-polish-banks (KNF
  watering hole); the article-body country breakdown is corroborated by the
  full-text BAE snapshot and SecurityWeek's Symantec précis. Correction it
  supports: the event previously said malware "RATANKBAPOS" — the correct
  Symantec name is Downloader.Ratankba.
