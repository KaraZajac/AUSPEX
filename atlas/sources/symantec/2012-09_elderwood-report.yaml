  URL corrected 2026-05-29 (Agent2): the docs.broadcom.com mirror
  of the original Symantec whitepaper (post-Broadcom acquisition)
  now returns Broadcom homepage instead of the document. The most
  reliable stable academic mirror of the original 2012 Symantec PDF
  is Cornell CS6410 course materials, which preserves the canonical
  whitepaper. CDX/wayback availability for both Symantec and Broadcom
  versions intermittent.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited as a service-placement source for cn/mss/apt17;
  this report names NO Chinese service. Its only geographic attribution is "they were attacked in
  December 2009 and that the attacks originated in China" (relaying Google), and it hedges even on
  statehood — "could only be provided by a large criminal organization, attackers supported by a
  nation state, or a nation state itself." No "Ministry of State Security"/MSS, IRGC, PLA, Jinan, or
  any unit appears (verbatim-string count 0 across the 14-page captured PDF). Used to DEMOTE the
  actor cn/mss/apt17 → cn/unscoped/apt17.
