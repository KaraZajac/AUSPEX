notes: |
  Symantec documentation of continued Andariel / Stonefly
  extortion operations against 3 US organizations following
  the July 2024 Rim Jong Hyok indictment. Proof of continued
  operations despite US legal action.
  AUDIT (2026-06-24, claude-opus-4.8/max): corroborates the RGB
  placement of kp/rgb/andariel. Symantec names the RGB explicitly
  (not merely "North Korean"): "On July 25, 2024, the U.S. Justice
  Department indicted a North Korean man named Rim Jong Hyok on
  charges related to the attack campaign. Rim is alleged to be a
  member of the Stonefly group, which is linked to the North Korean
  military intelligence agency, the Reconnaissance General Bureau
  (RGB)." (Stonefly is the actor's Symantec/Broadcom alias for
  Andariel.) Secondary source; the primary RGB attestation is OFAC
  treasury/2019-09-13_dprk-lazarus-bluenoroff-andariel.
