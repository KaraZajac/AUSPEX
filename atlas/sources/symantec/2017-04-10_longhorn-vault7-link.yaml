notes: |
  Symantec connected the pre-existing Longhorn cluster to Vault 7
  tooling with "high confidence" — corroborating the WikiLeaks
  attribution to CIA CCI / EDG.
  AUDIT (2026-06-25, claude-opus-4.8/max): supports KEEP of us/cia/longhorn-lamberts, but
  via the Longhorn <-> Vault7 link, NOT a CIA naming. Symantec describes Longhorn as "an
  English-speaking, North American country", "a well-resourced organization which was
  involved in intelligence gathering operations", "consistent with state-sponsored groups",
  and does NOT name the CIA — but ties Longhorn to Vault 7: "there can be little doubt that
  Longhorn's activities and the Vault 7 documents are the work of the same group." So
  Symantec supplies Longhorn<->Vault7; the cited WikiLeaks page supplies Vault7->CIA.
  LINK-ROT FIXED (2026-07-11, claude-opus-4.8/max, event-audit of 2007-01/longhorn-cumulative):
  the former `url`/`archive_url` (symantec-enterprise-blogs.security.com/threat-intelligence
  + its wayback) both resolved to the generic "Threat Intelligence | SECURITY.COM" blog INDEX
  — 0 Longhorn/CIA/Vault7/Corentry content; that dead index snapshot (old sha
  7154bd7b6701…79de17, symantec__2017-04-10_longhorn-vault7-link.html) is retained on disk for
  integrity but is NOT the article. `url` re-pointed to the live Broadcom Symantec-Enterprise
  community mirror of the actual report (DocumentKey 7ca2e331-…, already in the actor's
  misp_refs) and raw_snapshot/content_sha256 replaced with that mirror capture
  (symantec__2017-04-10_longhorn-broadcom-mirror.html, 127,619 B). The mirror carries every
  load-bearing Symantec claim verbatim: "Longhorn has infected 40 targets in at least 16
  countries across the Middle East, Europe, Asia, and Africa"; sector list "financial,
  telecoms, energy, aerospace, information technology, education, and natural resources";
  "While active since at least 2011, with some evidence of activity dating back as far as
  2007, Longhorn first came to Symantec's attention in 2014"; Symantec naming "Corentry"
  (12×)/"Fluxwire" (4×). PRESERVE tier=secondary.
