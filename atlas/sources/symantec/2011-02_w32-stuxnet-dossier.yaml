  69 pp; pdftotext confirms the FULL "W32.Stuxnet Dossier Version 1.4
  (February 2011)" (Falliere, O Murchu, Chien) — same version as the
  parallel record symantec/2011_stuxnet-dossier (docs.broadcom.com,
  4,332,399 bytes, sha256 9149e107…), a different file/mirror of the
  identical v1.4 content. Verbatim support captured for the four-zero-
  day claim ("Exploits a total of four unpatched Microsoft
  vulnerabilities"), removable-drive/air-gap self-replication, Realtek
  + JMicron stolen driver certificates, 6ES7-315-2 / 6ES7-417 PLC
  targeting, and Fararo Paya / Vacon frequency-converter manipulation
  (807–1210 Hz). Carries the technical facts only — Symantec made no
  geopolitical attribution and no centrifuge count ("Natanz"/"IR-1"/
  "1,000" absent). DUP-SOURCE: consider consolidating with
  symantec/2011_stuxnet-dossier.
