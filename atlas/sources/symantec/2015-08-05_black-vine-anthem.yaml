notes: |
  Vendor analysis attributing the Anthem intrusion to a PRC-nexus
  operational cluster Symantec names "Black Vine" (open-source
  overlap with Deep Panda / Shell Crew).

  AUDIT (2026-06-25, claude-opus-4.8/max): raw PDF captured (curl,
  HTTP 200, 4,267,454 bytes, application/pdf; archive.org blocked;
  a fresh same-session re-fetch byte-matched the snapshot, sha256
  16557bd2…b1d0). Document is "The Black Vine cyberespionage group,
  Version 1.11 – Aug 6, 2015" (the YAML published_on 2015-08-05 is
  the original-release date; this PDF is the v1.11 revision).
  CORRECTIONS vs the prior note: (1) the report is about ANTHEM, not
  Premera — it never names Premera; the only Premera tie in the
  document is the typosquat domain "prennera.com" (registered
  2013-09-12) listed in Table 2 of healthcare-themed domains found
  on Black Vine infrastructure used in the Anthem breach (alongside
  we11point.com = WellPoint/Anthem). (2) The report names tooling
  Sakurel (= Sakula), Mivast (Backdoor.Mivast, the variant seen in
  the Anthem breach), and Hurix — it does NOT mention "HttpBrowser"
  (removed the unsupported claim). FACTS supported: Anthem ~80M+
  records ("over 80 million"), Anthem discovered the compromised
  admin account 2015-01-26, breach "likely began in May 2014",
  Mivast code-signed with the stolen DTOPTOOLZ certificate.
  ATTRIBUTION supported at NATION level only: "China-based",
  "Chinese origin", registrant country China; Symantec ties some
  Black Vine infrastructure to the Beijing-based company Topsec and
  hedges that members "may have a past or present association" with
  it — NO Chinese intelligence service (MSS / PLA unit) is named.
  Used in this corpus only for the Anthem/Premera CLUSTER linkage
  (the prennera.com typosquat) + the China-nexus; the Premera
  headline facts are sourced to Krebs (2015-03-17).
