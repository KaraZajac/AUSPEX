notes: |
  Symantec Threat Hunter Team (Broadcom) first-party forensic report,
  published 18 Jul 2023, on FIN8 (which Symantec tracks as Syssphinx)
  deploying the Noberus / ALPHV / BlackCat ransomware via a revamped
  variant of the Sardonic backdoor. Original host
  symantec-enterprise-blogs.security.com 301-redirects to
  www.security.com (the Broadcom-consolidated blog domain); URL stored
  as the redirect target.

  AUDIT (2026-07-02, claude-opus-4.8/max): created during the phantom
  re-source of event 2023-07/fin8-alphv-sardonic, which had been
  mis-cited to a defective Bitdefender record. This Symantec report is
  the genuine primary. Raw snapshot captured + hashed (sha256
  b30a1b9f…af961544, 350,053 bytes; body text present in raw HTML —
  hash independently re-verifiable). Verbatim support for the event's
  claims:
    - Discloser / actor: "Active since at least January 2016, Syssphinx
      (aka FIN8) is a financially motivated cyber-crime group known for
      targeting organizations in the hospitality, retail, entertainment,
      insurance, technology, chemicals, and finance sectors."
    - Payload + timing: "In December 2022, Symantec observed the group
      attempting to deploy the Noberus (aka ALPHV, BlackCat) ransomware
      in attacks."
    - Sardonic revamp (C++ -> plain C): "most of the backdoor's code has
      been rewritten, such that it gains a new appearance. Interestingly,
      the backdoor code no longer uses the C++ standard library and most
      of the object-oriented features have been replaced with a plain C
      implementation. In addition, some of the reworkings look unnatural,
      suggesting that the primary goal of the threat actors could be to
      avoid similarities with previously disclosed details."
    - Original C++ Sardonic lineage: "in August 2021, Bitdefender
      researchers published details of a new backdoor dubbed Sardonic and
      linked it to the same group. The C++-based Sardonic backdoor has the
      ability to harvest system information and execute commands, and has a
      plugin system designed to load and execute additional malware
      payloads delivered as DLLs."
    - Ransomware pivot history: "In June 2021, Syssphinx was seen deploying
      the Ragnar Locker ransomware onto machines it had compromised in a
      financial services company in the U.S. earlier in the year. The
      activity marked the first time the group was observed using ransomware
      in its attacks." / "In January 2022, a family of ransomware known as
      White Rabbit was linked to Syssphinx ... attacks involving White Rabbit
      used a variant of the Sardonic backdoor."
    - Initial vector NOT identified for the Dec-2022 intrusion; only the
      group's general preference is stated: "Social engineering and
      spear-phishing are two of the group's preferred methods for initial
      compromise." No specific victim / sector / country is named for the
      December 2022 Noberus intrusion.
