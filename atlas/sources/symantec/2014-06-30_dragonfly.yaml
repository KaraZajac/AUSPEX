notes: |
  Symantec disclosure of the multi-year Dragonfly / Havex / Energetic
  Bear campaign against Western energy infrastructure via ICS vendor
  supply-chain compromise. NB: the 2014 report itself does NOT attribute
  to Russia or the FSB — it names the "Dragonfly" activity cluster, notes
  the vendor alias "Energetic Bear", and places the operators in the
  UTC+4 working-hours band; the Russian-state / FSB attribution is
  retrospective (US-CERT TA18-074A 2018, DOJ + CISA AA22-083A 2022).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw PDF captured + hashed
  (2,885,807 bytes; sha256 30ce77b9…9a9b6464). Snapshot is Symantec
  "Version 1.21: July 7, 2014", the point revision of the 30 Jun 2014
  original (published_on preserved). Verbatim support: "A cyberespionage
  campaign against a range of targets, mainly in the energy sector, gave
  attackers the ability to mount sabotage operations against their
  victims … if they had used the sabotage capabilities open to them,
  could have caused damage or disruption to the energy supply in the
  affected countries"; "in operation since at least 2011"; "shifting its
  focus to US and European energy firms in early 2013"; "three ICS
  software producers are known to have been compromised" (vendors NOT
  named in this report); "Backdoor.Oldrea, which is also known as Havex
  or the Energetic Bear RAT"; top active-infection countries "Spain,
  followed … by the US, France, Italy, and Germany" with US infections
  "mostly … collateral damage".
