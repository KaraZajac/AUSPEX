notes: |
  Symantec analysis tying the March 2013 wiper attacks against
  ROK broadcasters and banks to the broader DarkSeoul campaign
  family. Live Broadcom protection-bulletin URL returns 404
  post-acquisition; canonical content preserved at original
  symantec.com/connect path via the Wayback Machine 2013-07-01
  snapshot. Content corroborated via McAfee Operation Troy
  whitepaper (2013-07).
  AUDIT (2026-07-05, claude-opus-4.8/max): UN-SNAPSHOTTABLE — re-verified. Live
  Broadcom protection-bulletin URL still returns a 404 page-not-found (not the
  article); the community.broadcom.com library mirror requires SAML login;
  archive.org is blocked for this audit, so the wayback archive_url could not be
  captured. No raw_snapshot / content_sha256 added (nothing genuine captured; the
  404 body was discarded, NOT hashed). Tier unchanged (secondary). This is a real,
  well-documented report (link-rot), NOT a phantom. Content corroborated via
  reachable reporting: SecurityWeek "South Korea Cyber Attack Tied to DarkSeoul
  Crew: Symantec" confirms Symantec attributed the March 2013 Jokra wiper attacks
  and four years of prior ROK attacks to the "DarkSeoul gang" (an activity-cluster,
  est. 10-50 members) and did NOT name a nation, "Lazarus", or "Andariel"; and that
  Trojan.Korhigh / Trojan.Castov belong to the JUNE 25 2013 anniversary attacks, not
  the March 20 wiper. published_on 2013-06-26 retained.
