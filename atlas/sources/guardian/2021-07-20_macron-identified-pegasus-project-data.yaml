notes: |
  Guardian consortium reporting (byline Angelique Chrisafis, Dan
  Sabbagh, Stephanie Kirchgaessner and Michael Safi; Pegasus Project
  series; datePublished 2021-07-20T21:13:23Z). BADRABBIT RE-SOURCE
  (2026-07-11, claude-opus-4.8/max): added as the primary carrier of
  the France/Macron/Morocco claim after the previously-cited
  forbiddenstories/2021-07-20_pegasus-macron-targeted was found to be a
  WRONG-SOURCE (its url resolves to the generic Pegasus Project case/
  landing page — 0× Macron / 0× Morocco / 0× French officials).
  Carries verbatim:
    • "The leaked database at the heart of the Pegasus project includes
      the mobile phone numbers of the French president, Emmanuel Macron,
      and 13 other heads of state and heads of government, the Guardian
      can reveal." (Macron + 13 = 14 heads of state)
    • "Emmanuel Macron, the French president, who appears to have been
      selected as a person of interest by Morocco in 2019." (operator =
      Morocco; France-subset selection year = 2019; hedged "appears")
    • "media partners were able to identify 10 governments believed to
      be responsible for selecting the targets: Azerbaijan, Bahrain,
      Kazakhstan, Mexico, Morocco, Rwanda, Saudi Arabia, Hungary, India,
      and the United Arab Emirates." (Morocco named among the 10
      selecting client-governments)
    • Selection-not-infection hedge: "the presence of a number in the
      data does not reveal whether there was an attempt to infect the
      phone with spyware such as Pegasus … or whether any attempt
      succeeded"; the 50,000 numbers "since 2016 … believed to have been
      selected as those of people of interest by government clients of
      NSO Group."
    • Élysée reaction: "If this is proven, it is clearly very serious.
      All light will be shed on these media revelations."
  Does NOT carry the French-cabinet count (Philippe + 14/15 serving
  ministers) — that is anchored to thelocal/2021-07-21 (secondary).
