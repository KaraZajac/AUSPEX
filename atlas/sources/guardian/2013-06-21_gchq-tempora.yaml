  AUDIT (2026-06-25, claude-opus-4.8/max): Re-fetched (HTTP 200) and
  hashed for the uk/gchq/cne-actor service-placement audit. The article
  attributes the named TEMPORA programme to GCHQ specifically — "Britain's
  spy agency GCHQ has secretly gained access to the network of cables which
  carry the world's phone calls and internet traffic"; "That operation,
  codenamed Tempora, has been running for some 18 months"; the two
  components are "Mastering the Internet and Global Telecoms Exploitation."
  This is GCHQ-the-organisation named as operator of a specific named
  programme — supports the actor's uk/gchq SERVICE placement at the org
  level. (Note the programme is bulk cable-tap SIGINT / special-source
  exploitation, not active CNE in the strict sense; the actor entry is a
  deliberately-generic GCHQ bucket, see actor record.)
