notes: |
  First-party BeyondTrust security-investigation advisory (a living page first
  posted ~2024-12-08 and updated through the investigation; the captured snapshot
  carries the timeline into mid-December 2024). This is the vendor-of-origin source
  for the initial-access VECTOR in event 2024-12/treasury-beyondtrust-silk-typhoon.
  Created 2026-07-05 (RE-SOURCE: the event previously cited only the Jan-2025 OFAC
  release, which does not carry the BeyondTrust/CVE/vector facts).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (380,351 bytes). Verbatim support:
   - "In December 2024, BeyondTrust identified a security incident that involved 17
     Remote Support SaaS customers."
   - "On December 5th, 2024, a root cause analysis into a Remote Support SaaS issue
     identified a BeyondTrust infrastructure API key for Remote Support SaaS had been
     compromised and used to enable access to certain Remote Support SaaS instances by
     resetting local application passwords."
   - "December 13, 2024 - CVE-2024-12356 and CVE-2024-12686 zero-day vulnerabilities
     discovered." (i.e. the two CVEs were zero-days at the time of exploitation)
   - "No BeyondTrust products outside of Remote Support SaaS were affected."
  BeyondTrust does NOT name the customer (Treasury) or the actor (Silk Typhoon) — those
  come from the Treasury letter / Bloomberg / OFAC / Microsoft sources on the event.
