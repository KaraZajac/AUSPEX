notes: |
  Contemporaneous secondary report (byline 2019-02-25, datePublished
  2019-02-25T09:29:53) aggregating Times of Malta coverage of the Feb 13
  2019 Bank of Valletta heist. Snapshotted 2026-07-10 (curl, HTTP 200,
  86,607 B). Carries the core operational facts: "robbed the bank of at
  least 13 million euros"; "hackers broke into its systems and moved
  EUR13 million into foreign accounts"; "Bank of Valletta shut down all
  its operations on Wednesday morning [Feb 13] ... the website was taken
  off ... [the app] was back online on Thursday morning [Feb 14]"; PM
  Joseph Muscat told parliament "the fraudulent transactions had been
  traced and were 'being reversed'"; SEPA payment services restored
  Feb 15; clients still reporting payment issues Feb 23. Low-tier
  aggregator (tier=tertiary) but facts mirror-corroborated by
  manageengine + theshiftnews snapshots.
