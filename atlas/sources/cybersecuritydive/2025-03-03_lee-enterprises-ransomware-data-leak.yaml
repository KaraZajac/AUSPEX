   - "Lee Enterprises said it is investigating a claim from the Qilin ransomware
     group that it was behind a massive breach of the newspaper chain's network in
     early February."
   - "The threat group claims to have stolen 350 GB of data during an early
     February attack, according to researchers at SentinelOne."
   - "The group threatened to begin leaking data on March 5, but the specific
     ransom demand is not immediately known."
   - "The attack disrupted print distribution, billing, payments and other aspects
     of the publishing company."
   - "The firm operates in 72 markets across 25 U.S. states."
   - "Qilin, a ransomware as a service operation, emerged as a rebrand of the
     Agenda ransomware operation in 2022".
   - Double extortion: "The Lee Enterprises attack bears all the hallmarks of
     Qilin's double extortion strategy, according to researchers at Darktrace."
