notes: |
  Emily Olsen / Cybersecurity Dive, 2025-01-27, on UnitedHealth's final
  revised victim count for the February 2024 Change Healthcare breach.
  Load-bearing for the individuals_affected figure of the
  2024-02/change-healthcare-alphv event; carries the full count
  progression in one source. Supporting quotes (raw snapshot, sha
  6ce27c48…079c7b8d8, 270,574 bytes):
  "The massive cyberattack on Change Healthcare last year may have
  compromised the data of about 190 million people"; "The new estimate
  nearly doubles the company's previous report of 100 million affected
  individuals, already the largest healthcare data breach ever reported
  to federal regulators"; "In October, the technology firm and claims
  processor said the ransomware attack exposed information from 100
  million Americans." So: ~100M confirmed Oct 2024 (then the largest-
  ever US healthcare breach) → revised to ~190M by UnitedHealth's own
  disclosure, Jan 2025.
