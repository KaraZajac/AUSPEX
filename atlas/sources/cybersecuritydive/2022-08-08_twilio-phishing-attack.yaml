notes: |
  AUDIT (2026-07-01, claude-opus-4.8/max): Contemporaneous reporting of Twilio's
  disclosure. Carries: attackers "gained access to some of Twilio's internal
  systems that contain customer data on Aug. 4"; the intrusion was a
  "sophisticated social engineering attack"; "current and former employees"
  received IT-department-spoofing SMS; victims "deceived ... into sharing Okta
  credentials and two-factor authentication codes with spoofed URLs containing
  'Twilio,' 'Okta' and 'SSO'". Notes Twilio "declined to say" the number of
  affected customers at disclosure (final tally reported later — see the
  bitdefender source). Added during the re-source of event
  2022-08/twilio-cloudflare-0ktapus.
