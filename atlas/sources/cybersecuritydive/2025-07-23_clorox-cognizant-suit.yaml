notes: |
  Carrier for the Clorox v. Cognizant civil litigation. Verbatim:
  "Clorox on Tuesday sued Cognizant, which managed its IT help desk";
  "In a lawsuit filed in California Superior Court, Clorox argued that
  Cognizant failed to protect Clorox's computer systems by handing
  over credentials to the attackers without proper authentication";
  "The attack, linked to Scattered Spider, disrupted production of
  household cleaners and other goods." Damages claimed: $380 million.
  (NBC News' companion coverage breaks the $380M into ~$50M remedial
  costs + the remainder lost sales, and confirms the reporting frames
  the loss as disruption/lost-sales, not data exfiltration.)
