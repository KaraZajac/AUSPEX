notes: |
  Matt Kapko / Cybersecurity Dive, 2024-04-30, reporting on Andrew
  Witty's (UnitedHealth CEO) prepared testimony ahead of the May 1
  House Energy & Commerce Oversight & Investigations subcommittee
  hearing. Load-bearing for the initial-access + attribution facts of
  the 2024-02/change-healthcare-alphv event. Supporting quotes (raw
  snapshot, sha e804978d…cd7cdfc, 273,031 bytes):
  "On Feb. 12, the AlphV ransomware group used those compromised
  credentials to 'remotely access a Change Healthcare Citrix portal, an
  application used to enable remote access to desktops,' Witty said in
  his prepared remarks. 'The portal did not have multifactor
  authentication.'"; "Ransomware was deployed nine days later," Witty
  said" (→ ransomware deployment ~Feb 21); "Change, which touches 1 in
  3 patient records and was acquired by UnitedHealth Group for $13
  billion in late 2022, is still recovering some operations following
  the attack." Independently names the AlphV/BlackCat crew as the
  perpetrator (secondary corroboration of UnitedHealth's own attribution).
  AUDIT (2026-07-10, claude-opus-4.8/max): curl HTTP 200, snapshot +
  sha256 captured. Created during the 2024-02/change-healthcare-alphv
  event re-source (prior citations hhs bulletin [Akamai 403] +
  congress testimony [url:null] were un-snapshottable).
