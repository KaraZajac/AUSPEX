notes: |
  Phil Muncaster, "News 14 July 2025". Louis-Vuitton-specific source
  for the LVMH event.

  Verbatim facts:
    - "Louis Vuitton UK said it became aware of the breach on July 2,
      according to screenshots of the customer notification shared on X."
    - Data: "Personally identifiable information (PII) including first
      and second name, gender, country, phone number, email and postal
      address, date of birth, purchases and preference data may have
      been compromised." (No passwords / payment-card data cited.)
    - "The firm has notified the Information Commissioner's Office (ICO)."
    - "The news comes just a week after Louis Vuitton disclosed that its
      Korean operations had been targeted by hackers, leading to the
      compromise of some personal data."
    - "Two other LVMH brands, Christian Dior Couture and Tiffany, have
      also suffered customer data breaches this year. Both have been the
      subject of a government investigation since May."

  The article references the broader ShinyHunters / Salesforce / Scattered
  Spider retail-breach wave in passing (single mentions of ShinyHunters,
  Salesforce, Scattered Spider) but the load-bearing LVMH attribution is
  carried by the BleepingComputer 2025-07-30 source; this record carries
  the Louis Vuitton breach specifics.

