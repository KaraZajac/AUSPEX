notes: |
  Phil Muncaster, "News 6 August 2025". Corroborates the Pandora data
  scope and carries the explicitly-hedged ShinyHunters attribution plus
  the same-week Chanel breach (same-wave context). Created this audit as
  the Pandora corroborating secondary.

  Verbatim Pandora notice (via screenshots posted to Reddit): "We are
  writing to inform you that your contact information was accessed by an
  unauthorized party through a third-party platform we use," the notice
  read. "We stopped the access and have further strengthened our security
  measures."

  Verbatim scope: "According to the message, only names, birthdates and
  emails were impacted, with no financial data or passwords stolen."

  Verbatim hedged attribution: "ShinyHunters the Prime Suspect. Although
  the firms have yet to reveal any further details, suspicion is mounting
  that the attacks could be part of an ongoing data extortion campaign by
  the ShinyHunters (UNC6040) group. This was first flagged in June by
  Google Threat Intelligence..." — i.e. suspicion, not confirmation.

  Verbatim Chanel (same wave, separate victim): "Separately, Chanel
  informed its US customers of an incident it discovered on July 25 ...
  'Chanel became aware of a security incident involving a Chanel, Inc.
  database in the US hosted by a third-party...' ... the breach involved
  names, email and home addresses, and phone numbers."

