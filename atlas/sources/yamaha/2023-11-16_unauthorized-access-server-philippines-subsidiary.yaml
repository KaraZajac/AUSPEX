notes: |
  First-party corporate disclosure by Yamaha Motor Co., Ltd. of the
  ransomware attack on subsidiary Yamaha Motor Philippines, Inc. (YMPH).
  AUDIT 2026-07-02 (claude-opus-4.8 / max): created during
  phantom-remediation of event 2023-11/yamaha-motor-philippines-inc-ransom,
  whose sole prior citation was ncsc-uk/2024-03-27_nhs-dumfries-galloway-statement
  — a different INC Ransom victim (wrong-source defect). Verbatim from the
  snapshot: "October 25 It was confirmed that YMPH was being hit by a
  ransomware attack."; "October 27 YMPH reported to the Philippine
  authorities."; "November 16 It was confirmed that some employees'
  personal information stored by YMPH had been leaked."; "The attack was
  limited to one of the servers managed by YMPH and we have confirmed that
  it has not affected the headquarters or any other companies in the Yamaha
  Motor group." The release names NO ransomware group.
