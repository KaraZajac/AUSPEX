notes: |
  Cisco Talos's first-hand investigation of a Lazarus Group campaign
  (February-July 2022) that exploited the Log4Shell vulnerability
  (CVE-2021-44228) on public-facing VMware Horizon servers to gain
  initial access to energy providers in the United States, Canada,
  and Japan, then deployed the VSingle and YamaBot backdoors plus the
  newly-observed MagicRAT implant, with 3proxy / PuTTY-plink tunneling,
  Mimikatz and Procdump for credential access, and adfind for
  reconnaissance.
  Load-bearing verbatim (raw sha256 5266735a...ac211b7, 136,124 bytes):
  attribution - "Cisco Talos assesses with high confidence these attacks
  have been conducted by the North Korean state-sponsored threat actor
  Lazarus Group"; vector - "Cisco Talos identified the exploitation of
  the Log4Shell vulnerability on VmWare Horizon public-facing servers as
  the initial attack vector"; targets - "Lazarus was primarily targeting
  energy companies in Canada, the U.S. and Japan"; window - "conducting
  malicious activity between February and July 2022"; goal - "establish
  long-term access into victim networks to conduct espionage operations
  in support of North Korean government objectives" / "siphon off
  proprietary intellectual property". Named-actor (Lazarus) at high
  confidence; the report does NOT mention Dtrack or BLINDINGCAN
  (0 occurrences).
  Captured 2026-07-10 (claude-opus-4.8/max) as the primary on-point
  source for the 2021-12/log4shell-dprk-exploitation event re-source:
  the event previously cited only CISA AA22-187A (0 Log4Shell mentions)
  and AA23-040A (generic "DPRK state-sponsored", no cluster named), and
  mis-named the operator "Andariel".
