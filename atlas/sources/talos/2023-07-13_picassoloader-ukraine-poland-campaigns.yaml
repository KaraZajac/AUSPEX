notes: |
  Cisco Talos (Vanja Svajcer, "Thursday, July 13, 2023 06:45"; JSON-LD
  datePublished 2023-07-13) consolidating several campaigns "against
  government entities, military organizations and civilian users in
  Ukraine and Poland," active "as early as April 2022 and as recently as
  earlier this month" (July 2023).

  AUDIT (2026-07-04, claude-opus-4.8/max): created during phantom
  remediation of the event 2024-01/ghostwriter-ukraine-military-
  espionage-pivot (replaces the phantom mandiant/2024-01-23_ghostwriter-
  targets-ukraine). Raw captured + hashed (93e67e40…fe881792, 90,915
  bytes). Key verbatim claims: "We judge that these operations are very
  likely aimed at stealing information and gaining persistent remote
  access"; "Ukraine's Computer Emergency Response Team (CERT-UA) has
  attributed the July campaign to the threat actor group UNC1151, as a
  part of the GhostWriter operational activities allegedly linked to the
  Belarusian government" (attribution is CERT-UA's, relayed by Talos with
  the "allegedly" hedge — Talos states no independent attribution and
  notes njRAT's commodity use makes "the process of attribution more
  difficult"); "CERT-UA named the downloader PicassoLoader"; final
  payloads "include the AgentTesla remote access trojan (RAT), Cobalt
  Strike beacons and njRAT"; multistage chain of macro-laden Excel/
  PowerPoint documents ("possibly sent to the targets as email
  attachments") dropping a ConfuserEx-obfuscated .NET downloader that
  pulls payloads hidden in JPEG images; PowerPoint thumbnails "imitate
  Ukraine's Ministry of Defence and Poland's Ministry of National
  Defence" (lure themes); Sept-2022 lure = soldier salary-payment form;
  July-4-2023 campaign lure = payment-instruction form appearing to be
  from the State Treasury Service of Ukraine, targeting Ukrainian
  government organizations; generic campaigns hit "civilian targets in
  Poland and Ukraine" (fake VAT-return forms). NB the page's
  dateModified (2024-12-12) is a Talos blog-platform restamp; byline date
  2023-07-13 is authoritative (same pattern as the apt41-taiwan record).
