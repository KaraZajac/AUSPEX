notes: |
  Cisco Talos's foundational Sea Turtle report attributing
  state-sponsored DNS-hijacking operations to Turkish-aligned
  actors and documenting victim set across 13 countries.
  AUDIT (2026-06-25, claude-opus-4.8/max): re-read the captured raw snapshot for the Sea Turtle
  service audit. The report attributes the activity to "an advanced, state-sponsored actor" and
  does NOT name Turkey or the MIT as the perpetrator: "We assess with high confidence that this
  activity is being carried out by an advanced, state-sponsored actor that seeks to obtain
  persistent access to sensitive networks and systems." "Turkey" appears in the article only as
  one entry in the victim IP/country table (alongside Sweden, Syria, Armenia, US) — a *target*
  location, not an attribution. No occurrence of "MIT", "Millî İstihbarat", "İstihbarat",
  "Teşkilat", or "National Intelligence Organization". Used to support demoting tr/mit/sea-turtle
  → tr/unscoped/sea-turtle.
