notes: |
  Cisco Talos analysis of continuing PROMETHIUM / StrongPity
  operations through 2019-2020, documenting expanded victimology
  beyond the initial Europe / Middle East focus (Colombia, India,
  Canada, Vietnam) and continued use of trojanized installers of
  legitimate software (Firefox, VPNpro, DriverPack, 7-Zip, WinBox,
  CCleaner). Notable for documenting operational continuity
  through multiple prior public disclosures.
