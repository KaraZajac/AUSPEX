notes: |
  Cisco Talos analysis of continuing PROMETHIUM / StrongPity
  operations through 2019-2020, documenting expanded victimology
  beyond the initial Europe / Middle East focus (Colombia, India,
  Canada, Vietnam) and continued use of trojanized installers of
  legitimate software. Notable for documenting operational
  continuity through multiple prior public disclosures.
  AUDIT (2026-07-10, claude-opus-4.8/max): captured live (HTTP 200,
  title "PROMETHIUM extends global reach with StrongPity3 APT"),
  hashed (sha256 8251f69a…85901e5, 94,561 bytes) and read in full
  for the 2020-06/talos-promethium-strongpity3-global-expansion
  event audit. Byline "By Warren Mercer, Paul Rascagneres and Vitor
  Ventura", "Monday, June 29, 2020 13:59" ✓. Source-carried:
  victims "in Colombia, India, Canada and Vietnam"; "at least four
  new trojanized setup files … Firefox (a browser), VPNpro (a VPN
  client), DriverPack (a pack of drivers) and 5kPlayer (a media
  player)" (NB: 5kPlayer, NOT 7-Zip/WinBox/CCleaner); "around 30
  new C2 domains", HTTPS with "self-signed certificates"; "at least
  three different campaigns since July 2019"; infection vector NOT
  identified and explicitly "does not seem to be related to a
  supply-chain attack" (estimated ISP HTTP-redirect / watering-hole
  per CitizenLab 2018). Makes NO fresh nation attribution ("Previous
  research even linked PROMETHIUM to state-sponsored threats") and
  NO mention of Kurds; floats the actor being "an exported solution
  for other actors to use" / "enterprise service for hire". tier:
  primary retained (first-party vendor research).
