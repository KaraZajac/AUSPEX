  TITLE CORRECTED (2026-07-10 audit): stored title was the fabricated
  "Foreign Hackers Cripple Israeli Water Treatment Facility" — the real
  headline is "Foreign intelligence officials say attempted cyberattack
  on Israeli water utilities linked to Iran" (byline Joby Warrick and
  Ellen Nakashima, May 8, 2020 at 7:04 p.m. EDT; article:published_time
  2020-05-08T23:04:41Z). The fabricated "Cripple … Facility" title
  overstated a thwarted attempt as an accomplished fact.

  AUDIT (2026-07-10, claude-opus-4.8/max): verbatim carriers for the
  2020-04/israel-water-ot-poisoning event —
  - ATTEMPT + INTENT: "Iran is being linked to an attempted cyberattack
    last month that authorities believe was aimed at disrupting water
    supplies in at least two locations in Israel as that country was
    seeking to contain a covid-19 outbreak, according to foreign
    intelligence officials familiar with the matter."
  - THWARTED / NO DAMAGE: "The incident, which occurred on April 24 and
    25, was quickly detected and thwarted before it could cause damage";
    "Israeli government officials said the attack was quickly detected
    and defeated, causing no damage or harm to water supplies. Employees
    were instructed to change operational system passwords."
  - OT / PLCs (VALVES, not chlorine): "The intruders targeted
    'programmable logic controllers' that operate valves for water
    distribution networks"; "The hackers sought to cripple computers
    that control water flow and wastewater treatment for a pair of rural
    districts in Israel." NB: this WaPo piece does NOT mention chlorine
    (that detail is carried by the FT/ToI June sources).
  - DETECTION BODY: "The attack was initially detected by employees of
    the Israel Water Authority, who alerted Israel's cybersecurity
    agency."
  - ATTRIBUTION (nation-level, hedged): "according to foreign
    intelligence officials"; "two officials of a foreign government that
    monitored the attack in real time"; "The alleged Iranian link to the
    attack was first reported by Fox News"; "If Iran's involvement is
    verified …"; Iran denied ("The Iranian government does not engage in
    cyberwarfare," Alireza Miryousefi). NO IRGC/unit named; described as
    "coordinated, but not particularly sophisticated." Routed "through
    computer servers in the United States and Europe."
