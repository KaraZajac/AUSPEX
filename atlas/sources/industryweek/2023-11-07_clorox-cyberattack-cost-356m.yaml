notes: |
  Carrier for the $356M figure — which is a NET-SALES DECLINE, not a
  direct cost. Verbatim (Update Nov. 7, 2023): "Clorox reported
  first-quarter 2024 earnings earlier this month, posting a 20%
  decline in net sales, a $356 million decline, most of which it
  blamed on the cyberattack." The headline's "cost $356 million" is
  therefore the quarterly revenue shortfall, MOST (not all) of which
  Clorox attributed to the attack — distinct from the company's ~$49M
  disclosed direct incremental costs.
