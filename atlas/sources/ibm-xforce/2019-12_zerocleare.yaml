notes: |
  IBM X-Force IRIS report (datePublished 2019-12-04, Limor Kessem).
  Title corrected from "Targets Industrial Sector" to the real
  headline ("Targets Energy Sector in the Middle East"); url fixed
  from the generic ibm.com/security/xforce landing to the real (now
  link-rotted) securityintelligence.com article — snapshot taken
  from the Wayback capture (HTTP 200).

  Substance: ZeroCleare targeted the MIDDLE EAST energy/industrial
  sector, NOT the United States. Attribution is HEDGED — "we suspect
  Iran-based nation-state adversaries," "X-Force IRIS assesses that
  the ITG13 threat group, also known as APT34/OilRig, and at least
  one other group, likely based out of Iran, collaborated on the
  destructive portion." Mechanism: overwrites the MBR and disk
  partitions on Windows via EldoS RawDisk (a legitimate toolkit —
  "not due to a flaw or vulnerability in that software"), and on
  64-bit hosts abuses a separate vulnerable signed driver to bypass
  the Windows HAL; Shamoon lineage. Cited in this event only as
  CONTEXT for the kind of destructive-wiper threat CISA warned about
  — it does NOT document a US victim and does NOT mention Dustman.

  RE-HASH (2026-07-10, claude-opus-4.8/max): content_sha256 realigned
  079c6fad… -> 29a0603f… (169,784 bytes). The Wayback wrapper injects
  a few bytes that drift between fetches; the article body is
