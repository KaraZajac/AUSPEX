notes: |
  Mozilla's own bug tracker record of the ACTIVE-DISTRUST action
  against DarkMatter's EXISTING intermediate/subordinate CAs —
  opened by Wayne Thayer ("pending Kathleen's approval"), RESOLVED
  FIXED. Adds three QuoVadis-chained DarkMatter subordinate CAs to
  OneCRL (Mozilla's revocation list): "DarkMatter Assured CA",
  "DarkMatter High Assurance CA", "DarkMatter Secure CA" (SPKI
  hashes recorded in the bug). This is the primary artifact that
  corrects the common mis-statement that Mozilla distrusted only
  "new intermediate certificates" — the action revoked trust in the
  already-issued subordinate CAs. Snapshotted live 2026-07-10 (curl
  HTTP 200, 90,260 B; "OneCRL" 15x, "DarkMatter Assured CA" 4x,
  "High Assurance" 4x, "Wayne Thayer" 2x in the captured raw).
