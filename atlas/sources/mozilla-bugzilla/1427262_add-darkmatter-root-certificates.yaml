notes: |
  Mozilla's own bug tracker record of DarkMatter LLC's root-store
  inclusion request (roots: DarkMatter Root CA G3 / G4 and UAE
  Global Root CA G3 / G4). Final resolution RESOLVED WONTFIX, with
  the whiteboard notation "[ca-denied]" (Comment #96) — the
  authoritative Mozilla primary record that the pending root
  inclusion was DENIED. Snapshotted live 2026-07-10 (curl HTTP 200,
  489,761 B; "WONTFIX" 78x, "ca-denied" 3x, "DarkMatter Root CA"
  12x, "UAE Global Root" 23x in the captured raw). Companion to the
  distrust-of-existing-subordinate-CAs record (bug 1564544) and the
  link-rotted Mozilla Security Blog decision post
  (mozilla/2019-07-09_distrust-darkmatter).
