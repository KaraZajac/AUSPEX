notes: |
  The Electricity Information Sharing and Analysis Center (E-ISAC) /
  SANS ICS "Defense Use Case" (Lee, Assante, Conway), TLP:White,
  18 March 2016 — the canonical primary technical analysis of the
  23 December 2015 attack on three Ukrainian oblenergos. The
  original e-isac.com host has link-rotted; this snapshot is the
  DUC v5 PDF as mirrored by Kaspersky ContentHub, with the National
  Security Archive (GWU) copy as archive_url.

  AUDIT (2026-07-05, claude-opus-4.8/max): added as a real primary
  source for 2015-12/ukraine-power-grid-blackenergy (badrabbit-model
  re-source — the event's attributing_org already named "SANS-E-ISAC"
  but never cited it). raw_snapshot captured + hashed (content_sha256
  945b431a…88119ca5, 1,805,384 bytes). Verbatim-supports: "BlackEnergy 3
  malware, and the manipulation of Microsoft Office documents" +
  "spear phishing emails"; "persist within the environment for six
  months or more to conduct reconnaissance"; "telephone systems to
  generate thousands of calls to the energy company's call center"
  / "Telephone denial-of-service attack on the call center";
  "approximately 225,000 customers"; "executed within 30 minutes of
  each other"; "remote opening of breakers"; "write custom malicious
  firmware… serial-to-ethernet convertors, inoperable"; "modified
  KillDisk to erase the master boot record"; "virtual private networks
  (VPNs)". Names Kyivoblenergo ("On December 23, 2015, the Ukrainian
  Kyivoblenergo… reported service outages") and Prykarpattyaoblenergo
  (footnote URL); does NOT name the third oblenergo (Chernivtsioblenergo).
