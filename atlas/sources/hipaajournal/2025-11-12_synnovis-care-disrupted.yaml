   - "In the early hours of Friday morning, Qilin uploaded 400 GB of
     confidential data to its dark web data leak site... The uploaded data
     includes information from more than 300 million patient interactions
     with the NHS."
   - "The Qilin ransomware group behind the attack told Bloomberg that they
     demanded a $50 million ransom payment and required payment to be made
     within 120 hours. They also claimed to have gained access to the
     Synnovis network by exploiting a zero-day vulnerability, although they
     did not state what vulnerability they exploited."
   - "The attack affected 7 hospitals operated by those trusts, forcing them
     to cancel 1,134 planned operations and 2,194 outpatient appointments in
     the first 13 days following the attack. Blood tests in the capital are
     operating at around 10% of normal levels."
   - "A critical incident emergency status has been declared in the region";
     "a nationwide appeal has been launched by the NHS for O blood-type
     donors" / "a shortage of O-negative blood".
