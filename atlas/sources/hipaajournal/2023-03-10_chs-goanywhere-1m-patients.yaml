notes: |
  Reports Community Health Systems' SEC 8-K disclosure that the PHI of
  up to ~1 million individuals was potentially compromised via the
  Fortra GoAnywhere MFT breach. Supporting quotes (raw snapshot, sha
  92f8d5ec...37ba8ba, 388,801 bytes): headline "Community Health Systems
  to Notify Up to 1 Million Individuals About GoAnywhere Data Breach";
  "In the SEC filing, Community Health Systems explained that the
  protected health information of up to 1 million individuals was
  potentially" [compromised]; notes ransomware "was not used to encrypt
  files" (data-theft extortion). Carries the underlying primary — the
  CHS SEC 8-K (2023-02-13) — which is bot-walled (sec.gov returns HTTP
  403 to the fetcher, so the primary itself is not snapshottable here).
  AUDIT (2026-07-02, claude-opus-4.8/max): curl HTTP 200, snapshot +
  sha256 captured.
