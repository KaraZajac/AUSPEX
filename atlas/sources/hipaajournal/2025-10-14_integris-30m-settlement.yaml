notes: |
  Steve Alder's running Integris Health breach article (updated in
  place; latest update 2025-10-14, with dated update sections back to
  2023-12-27). Key quotes (raw snapshot sha 115f3cf1…e0168958,
  396,746 bytes): "Hackers gained access to its computer network on
  November 28, 2023, and exfiltrated files containing patient data.
  The threat actor did not encrypt files but demanded payment to
  prevent the release of the stolen data"; the actor "was demanding
  $50 per patient to delete their stolen data"; "Integris Health
  uploaded a notice to its website on December 24, 2023, about a data
  privacy incident"; "the protected health information of 2,385,646
  individuals was compromised in the attack"; "Integris Health has
  agreed to pay $30 million to settle class action data breach
  litigation" (Bointy, et al. v. Integris Health, Inc.; ten Oklahoma
  County District Court suits + eleven W.D. Okla. federal suits
  consolidated; the consolidated complaint claims 2,426,868 affected
  including 255,647 minors; preliminary court approval granted, final
  hearing scheduled 2025-12-16); Integris blamed business associate
  Tech Mahindra, LLC, later voluntarily dismissed from the litigation.
  CAUTION — two internal year typos in the running text: "On December
  24, 2025, Integris Health started to be contacted by patients"
  (correctly December 24, 2023 elsewhere in the same article) and the
  update header "February 13, 2025: Integris Health Confirms 2.39
  Million Individuals Affected" (the OCR-portal entry and equivalent
  BleepingComputer coverage date to 2024-02-13). The running text names
  no perpetrator; HIPAA Journal's separate 2024-roundup page attributes
  the attack to Hunters International.

  AUDIT (2026-07-04, claude-opus-4.8/max): created during wrong-source
  remediation of 2024-02/integris-hunters-international-doxing. curl
