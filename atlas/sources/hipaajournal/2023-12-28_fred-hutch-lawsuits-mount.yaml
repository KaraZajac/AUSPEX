notes: |
  Carries the official HHS Office for Civil Rights breach-portal figure
  (the "HHS OCR portal" data point — the OCR portal itself,
  ocrportal.hhs.gov, is a non-permalink JS search interface that returns
  only a search shell to a fetcher and cannot be per-entry snapshotted,
  so the figure is captured here where HIPAA Journal quotes it verbatim).
  Key quotes (raw snapshot sha a9cf8e13…591d6944, 389,250 bytes): "The
  hacking group claimed to have stolen the data of 800,000 patients,
  although the breach was reported to the HHS' Office for Civil Rights by
  Fred Hutchinson Cancer Center as involving the data of up to 1,840,927
  individuals"; "The Hunters International hacking group claimed
  responsibility for the attack"; the actors "started contacting them
  directly demanding payment of $50 to have their stolen data deleted."
  So the official affected count (1,840,927, HHS OCR) is roughly double
  the attackers' own 800,000 claim. Does NOT name an initial-access
  vector (no Citrix Bleed here).

