notes: |
  SecurityAffairs (Pierluigi Paganini), Jan 29 2023, on the
  extradition of Sebastien Raoult ("Seyzo Kaizen") from Morocco to
  the US. ADDED 2026-07-10 (claude-opus-4.8/max) to carry the arrest
  circumstances for event 2022-05/raoult-arrest-morocco that the DOJ
  releases state only as "arrested last year in Morocco". Verbatim
  (raw snapshot sha256 a8172b71...340cdf53, 127,962 bytes): "The
  22-year-old man was arrested in Morocco at Rabat international
  airport in Morocco on May 31, 2022, while trying to take a flight
  to Brussels."; "The indictment also charges 23-year-old Gabriel
  Kimiaie-Asadi Bildstein aka 'Kuroi' and 'Gnostic Players,' of
  Tarbes, France, and 22-year-old Abdel-Hakim El Ahmadi aka 'Zac'
  and 'Jordan Keso' of Lyon, France."; "Since early 2020, ShinyHunters
  Group has marketed and promoted data stolen from more than 60
  companies"; "If convicted, Raoult could face up to 116 years in
  prison." NB the age is given here as 22 (extradition-period, Jan
  2023); the DOJ extradition PR of the same week states 21 (age at
  the May 2022 arrest).
