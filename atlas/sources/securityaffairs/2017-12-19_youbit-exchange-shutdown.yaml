notes: |
  Contemporaneous news report on the collapse of the South Korean
  cryptocurrency exchange Youbit after its second hack of 2017.
  Load-bearing source for event 2017-12/sk-crypto-exchange-thefts:
  Youbit-bankruptcy fact, the December 2017 second hack, the April
  2017 first hack, and the DPRK attribution by the exchange.
  Verbatim (raw sha256 5ed9aea1…, 102,701 bytes, term-scan
  youbit/yapizon=23):
  - "The South Korea Cryptocurrency Exchange Youbit shuts down
    after suffering a major cyber attack for the second time this
    year."
  - "The company announced bankrupt on Tuesday after being hacked
    for the second time in the last eight months, the company
    declared it had lost 17 percent of its assets in the last
    attack."
  - "This is the first time that a cryptocurrency exchange based in
    South Korean has gone bankrupt."
  - "Eight months ago hackers stole nearly 4,000 bitcoin (5.5
    billion won ($5 million) at the time of the hack) that
    accounted for nearly 40 percent of the Youbit exchange's total
    assets." (the April 2017 first hack, when the exchange operated
    as Yapizon)
  - "The company blamed North Korea for the attack."
  - customers' crypto assets "marked down by 25 percent" (i.e. 75%
    recovery pending bankruptcy proceedings).
