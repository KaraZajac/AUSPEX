  ATTRIBUTION VERBATIM (technical advisory, "Assessment", p.20-21): "BADBAZAAR and MOONSHINE collect
  data which would almost certainly be of value to the Chinese state." / "Citizens from the co-sealing
  nations, in China and abroad, who are perceived to be supporting causes that threaten regime stability,
  are almost certainly under threat..." NCSC attributes ONLY to "the Chinese state" at the nation level;
  it names NO Chinese intelligence service (no MSS/PLA) and asserts NO named-actor in its own voice.
  Named threat-actor labels appear ONLY as citations to vendor reporting: Lookout's 2022 report title
  "MOONSHINE: Evolving Android Surveillanceware by Chinese APT POISON CARP To Target Tibetans and Uyghurs"
  (Fig 2); Recorded Future's TA413 (p.10); infra overlap with UPSEC = "Sichuan Dianke Network Security
  Technology Co., Ltd" (per Intelligence Online) and DKNS forensic/surveillance platforms (per Trend Micro).
  APT15/Nickel/Vixen Panda/Ke3chang are NOT mentioned anywhere in the 51pp document. Victims named:
  Uyghur, Tibetan, Taiwanese (Assessment); landing-page purpose adds "Taiwan, Tibet, Xinjiang Uyghur
  Autonomous Region, democracy movements and the Falun Gong." App example: "a Uyghur language Quran app"
  (p.20); tibetone[.]org is a BADBAZAAR C2 (p.11). Data captured: "location, audio and photo data" (p.21);
  MOONSHINE also files/live-audio/screen-recordings/contacts/call-logs/SMS. Partners confirmed verbatim:
  ASD/ACSC, CSE/CCCS, German Federal Intelligence Service (BND) + Federal Office for the Protection of the
  Constitution (BfV), NZ NCSC/GCSB, US FBI, US NSA. Published 9 April 2025 (Crown Copyright 2025).
