notes: |
  AUDIT (2026-07-10, claude-opus-4.8/max): live dni.gov URL is
  Akamai-403 bot-walled from this environment; the genuine ODNI ATA
  PDF (670,822 bytes, PDF 1.7) was retrieved and hashed from the
  Wayback capture 20260706014741. The 2025 ATA "Cyber" section
  (under China) opens: "The PRC's campaign to preposition access on
  critical infrastructure for attacks during crisis or conflict,
  tracked publicly as Volt Typhoon, and its more recently identified
  compromise of U.S. telecommunications infrastructure, also referred
  to as Salt Typhoon, demonstrates the growing breadth and depth of
  the PRC's capabilities to compromise U.S. infrastructure." Note the
  ATA distinguishes Volt Typhoon (pre-positioning) from Salt Typhoon
  (telecom compromise) as two separate campaigns.
