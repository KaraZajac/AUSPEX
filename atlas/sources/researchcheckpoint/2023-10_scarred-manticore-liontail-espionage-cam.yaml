notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw snapshot (sha256 above) and verified the
  ir/mois service placement of actor ir/mois/scarred-manticore against this source. Check Point
  Research names the MOIS specifically — not merely "Iranian"/"nation-state". Verbatim:
  - Key Findings: "Check Point Research (CPR) is monitoring an ongoing Iranian espionage campaign
    by Scarred Manticore, an actor affiliated with the Ministry of Intelligence and Security
    (MOIS)."
  - "...some of the tools described in this report have been associated with the MOIS-sponsored
    destructive attack against Albanian government infrastructure (referred to as DEV-0861)."
  - "The geographic region and the targeted profile are aligned with Iranian interests and in
    line with the typical victim profile that MOIS-affiliated clusters usually target in
    espionage operations."
  On the OilRig link the source is explicit that attribution is incomplete: "we do not have
  sufficient data to properly attribute the Scarred Manticore to OilRig, even though we do believe
  they're likely related." Finding: ir/mois placement is source-supported (KEEP).
  AUDIT (2026-06-24, claude-opus-4.8/max): re-used for the event audit of
  2023-10/scarred-manticore-liontail-espionage-campaign-across-middle-east-and-i. Raw snapshot
  re-hashed and verified (sha256 above matches on disk). Substantive event claims confirmed verbatim:
  LIONTAIL passive framework using direct HTTP.sys IOCTL calls ("the malware uses IOCTLs to interact
  directly with the underlying HTTP.sys driver ... the IOCTLs for HTTP.sys are undocumented");
  FOXSHELL/SDD/WINTAPIX/LIONHEAD tool families; targeting "across the Middle East region, including
  Saudi Arabia, the United Arab Emirates, Jordan, Kuwait, Oman, Iraq, and Israel" with "government,
  telecommunications, military, and financial sectors, as well as IT services providers" plus an NGO.
