notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Live URL fetched (HTTP 200) + raw captured. CFR
  Cyber Operations Tracker entry; a tracker/reference that itself cites Cybereason
  ("Operation Bearded Barbie: APT-C-23 Campaign Targeting Israeli Officials") and Bloomberg
  ("Hackers Posed as Flirtatious Women to Target Israeli Officials") as its underlying sources.
  Verbatim description: "Hamas-linked actor APT-C-23 targeted Israelis with an espionage campaign
  to exfiltrate sensitive information from individuals working in law enforcement, the military,
  and emergency services. The attackers used fabricated Facebook profiles to lure targets to
  install trojanized direct message applications." CFR's structured fields: Date "Apr 2022";
  Type of incident "Espionage"; Suspected state sponsor "Palestine, State of" (ps); Suspected
  victims "Israeli individuals including a group of high-profile targets working for defense, law
  enforcement, and emergency services organizations". Note: the "Hamas-linked" / sponsor framing
  is CFR's own labelling (the sponsor is flagged "Suspected"), not a primary-vendor confession of
  Hamas tasking — consistent with keeping the actor at ps/unscoped (Palestinian nexus attested,
  Hamas service suspected, not established).
