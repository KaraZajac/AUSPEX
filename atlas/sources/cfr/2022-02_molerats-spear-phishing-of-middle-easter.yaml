notes: |
  Supporting quote (CFR incident record, verbatim from the live page's embedded data):
  "The Palestinian threat actor Molerats targeted Middle Eastern governments, foreign policy
  think tanks, and a state-affiliated airline with spear-phishing emails containing a remote
  access Trojan. To avoid detection, Molerats used geofencing and URL redirects to legitimate
  sites. The hackers masqueraded as the site Quora and also created target-specific lures that
  it delivered to organizations in the form of Dropbox and WordPress URLs."
  CFR's own labels on the incident: "Date of report: Feb 2022"; "Affiliations: Believed to be
  the work of Palestine's government"; "Suspected state sponsor: Palestine, State of"; "Type of
  incident: Espionage". CFR cites a single reference: Proofpoint, "Ugg Boots 4 Sale: A Tale of
  Palestinian-Aligned Espionage".
  AUDIT (2026-06-24, claude-opus-4.8/max): Live CFR page captured (raw snapshot + sha above; the
  page is a JS SPA but the incident text is embedded in the HTML data attributes, extracted
  verbatim). CFR is a SECONDARY tracker relaying Proofpoint. NOTE: CFR's "work of Palestine's
  government" / "Suspected state sponsor: Palestine, State of" is CFR's editorial framing and is
  STRONGER than what the cited Proofpoint primary actually says — Proofpoint hedges to "a likely
  Palestinian-aligned" APT "believed to be operating in the interest of the Palestinian
  Territories" (no hard government attribution; Proofpoint never claims high confidence on the
  nation tie). Treated as a SUSPECTED/believed attribution => attributing_org_confidence capped at
  moderate. Targeting (govts + foreign-policy think tanks + state-affiliated airline) and TTPs
  (geofencing, URL redirects, Quora masquerade) match the event summary.
