notes: |
  AUDIT (2026-06-23, claude-opus-4.8/max): Live URL fetched + raw captured. This CFR tracker
  entry is the source supporting the Arid Viper actor record's Palestinian nexus. Verbatim quote:
  "Arid Viper, a threat actor believed to operate from the Palestinian Territories, created a
  compromised version of the Arabic dating app Skipped and distributed it online." CFR lists the
  affiliation "APT-C-23" and "Suspected state sponsor: Palestine, State of" — i.e. the nation is
  assessed but the sponsor framing is CFR's, not the primary vendor's; consistent with keeping the
  actor at ps/unscoped. (This entry documents the 2023 Skipped/dating-app campaign, a different
  operation from the 2021 Phenakite event; cited here only for actor-level attribution support.)
