notes: |
  Supporting quote: "The signals intelligence unit of the Israeli police is suspected of using
  Pegasus spyware to surveil local officials and their families in Israel. The warrantless
  surveillance conducted with Pegasus was used to inform later prosecutions for bribery, some of
  which were dismissed in court for lack of evidence. The police attempted to cover up evidence
  that they had used Pegasus in the investigations." (CFR entry "Targeting of local Israeli
  officials", date of report Jan 2022.) Affiliations: "Believed to be the work of Israel's
  government." Suspected state sponsor: Israel. Suspected victims: "Mayors and other local
  officials in Israel." Type of incident: Espionage. Target category: Government. Policy response:
  Unknown. Underlying source linked by CFR: Calcalist/CTech, "Israeli police used NSO's Pegasus to
  spy on local mayors, their relatives" (https://www.calcalistech.com/ctech/articles/0,7340,L-3927704,00.html).
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw CFR page captured (HTTP 200, sha above) and verified
  against the citation. CFR attributes the Pegasus use to the ISRAELI POLICE SIGINT UNIT
  specifically, at SUSPECTED confidence ("is suspected of", "Believed to be the work of Israel's
  government") — supports the named-unit service placement at low org-confidence. CFR's framing is
  already hedged, consistent with the later state-comptroller/Marari review that qualified the
  initial Calcalist reporting; CFR records the original allegation, not a confirmed finding.
