notes: |
  Supporting quote (CFR record body): "The widow of Saudi dissident Jamal Khashoggi, who was assassinated by the Saudi Arabian government in 2018, was targeted by the NSO Group's Pegasus malware at the request of the United Arab Emirates. The malware was allegedly installed while Elatr was detained at the Dubai airport." Structured fields: "Suspected state sponsor: United Arab Emirates"; "Type of incident: Espionage"; "Target category: Civil society"; "Date of report: Dec 2021".
  AUDIT (2026-06-24, claude-opus-4.8/max): URL re-verified live (HTTP 200), raw captured + hashed. The page title is "Targeting of Jamal Khashoggi's wife, Hanan Elatr" (CFR says "wife"; the record title was corrected from the "widow" slug-derived form). The CFR record is internally inconsistent: its free-text "Affiliations" line reads "Believed to be the work of the Saudi Arabian government", while its STRUCTURED "Suspected state sponsor" field reads "United Arab Emirates" — the structured UAE field matches the body ("at the request of the United Arab Emirates") and both cited 'Read more' sources (WaPo: "A UAE agency put Pegasus spyware on phone of Jamal Khashoggi's wife..."; The Verge: "New analysis further links Pegasus spyware to Jamal Khashoggi murder"), so AUSPEX attributes to the UAE. CFR labels the sponsor "Suspected" (-> event downgraded to attributing_org_confidence: moderate) and names only "a UAE agency" with no specific Emirati service (-> attribution_level: nation; actor demoted to ae/unscoped). The two 'Read more' upstream sources (WaPo, The Verge) returned 403/blocked and are not separate corpus source records.
