  Supporting quote: DarkHotel, a South Korea–linked threat actor, used five zero-days in a single campaign targeting North Koreans, demonstrating an unusual level of sophistication.
  AUDIT (2026-06-23, claude-opus-4.8/max): URL resolves (HTTP 200, raw snapshot hashed). The CFR entry's own title is "Targeting of North Koreans and North Korea–focused professionals" (corrected here from the prior AUSPEX paraphrase). The entry description supports the five-zero-day count and the North-Korea targeting, and characterizes DarkHotel as "South Korea–linked" — verbatim: "DarkHotel, a South Korea–linked threat actor, used five zero-days in a single campaign targeting North Koreans, demonstrating an unusual level of sophistication." CFR's two cited source-links are present in the raw (https://www.wired.com/story/north-korea-hacking-zero-days-google/ and the Google TAG post https://blog.google/.../identifying-vulnerabilities-and-protecting-you-phishing/). KEY FINDING: the CFR entry does NOT mention the WHO / World Health Organization — the string "WHO"/"World Health" appears nowhere in the description or its primaries. The Google TAG primary states "a single threat actor was capitalizing on five zero-day vulnerabilities" and "The majority of targets we observed were from North Korea or individuals who worked on North Korea-related issues." The WHO spear-phishing was a SEPARATE March-2020 incident not attributed to DarkHotel in this source; the prior event title's "and WHO" was a conflation (see event qc). NOTE: CFR's structured "Suspected State Sponsor" field is client-rendered and is not in the server HTML; the sponsor characterization rests on the description's "South Korea–linked" wording, which is a link-level characterization, not a confirmed state attribution.
