  Supporting quote: "ToTok, a popular Emirati messaging app, was revealed to be a mass surveillance
  tool used by the Emirati government."
  AUDIT (2026-06-23, claude-opus-4.8/max): CFR labels the sponsor "Suspected" (confidence high ->
  moderate). The DarkMatter link is per the cited NYT (ToTok developer Breej Holding tied to
  DarkMatter / Pax AI), not stated in the CFR summary. attribution_level = named-actor.
  AUDIT (2026-06-24, claude-opus-4.8/max): service-placement re-verification of the linked actor.
  This raw snapshot (sha256 02f3c8cb..., re-verified unchanged) attributes the program ONLY to the
  UAE state and names no contractor. Full entry text: "Affiliations: Government of the UAE. ToTok, a
  popular Emirati messaging app, was revealed to be a mass surveillance tool used by the Emirati
  government. Suspected victims: Millions of individuals in the UAE and globally. Suspected state
  sponsor: United Arab Emirates. Type of incident: Espionage. Target category: Civil society." The
  strings "DarkMatter", "CyberPoint", "Project Raven", "Breej" and "Pax AI" do NOT appear anywhere
  in the source. Because this is the actor's sole citation and it names no operating contractor, the
  linked actor was demoted ae/darkmatter -> ae/unscoped (the DarkMatter tie exists only in the NYT
  story CFR links to, which is not itself a cited AUSPEX source).
