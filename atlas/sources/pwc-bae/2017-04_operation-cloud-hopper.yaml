  AUDIT (2026-06-24, claude-opus-4.8/max): for the cn/mss/apt10 service-placement audit, this
  report attributes APT10 only at the NATION level — "a China-based threat actor" (17×), "PwC UK
  and BAE Systems assess it is highly likely that APT10 is a China-based threat actor", and "the
  threat actor's targeting … is closely aligned with strategic Chinese interests." It does NOT
  name the MSS, the Tianjin SSB, or Huaying Haitai (verified absent in the full 25-page PDF). It
  supports the China nexus but not the specific service; the cn/mss placement rests on the DOJ
  indictment (as quoted by MITRE G0045). Raw PDF captured + hashed.
