  baesystemsai.blogspot.com/2017/04/apt10-operation-cloud-hopper_3.html
  also still resolves.
  AUDIT (2026-06-24, claude-opus-4.8/max): for the cn/mss/apt10 service-placement audit, this
  report attributes APT10 only at the NATION level — "a China-based threat actor" (17×), "PwC UK
  and BAE Systems assess it is highly likely that APT10 is a China-based threat actor", and "the
  threat actor's targeting … is closely aligned with strategic Chinese interests." It does NOT
  name the MSS, the Tianjin SSB, or Huaying Haitai (verified absent in the full 25-page PDF). It
  supports the China nexus but not the specific service; the cn/mss placement rests on the DOJ
  indictment (as quoted by MITRE G0045). Raw PDF captured + hashed.
  AUDIT (2026-07-10, claude-opus-4.8/max) for event 2017-03/operation-cloud-hopper: snapshot
  re-hash VERIFIED unchanged (sha256 8da2fdd15a79d777a17efb0adb6fc15ea9ff64edde8ea743395235f2816356c3;
  pdfinfo: 25 pages, CreationDate Tue Apr 4 2017). This PDF carries, verbatim, the event's TTP +
  malware claims (PlugX 27×, ChChes 18×, RedLeaves 10×, Quasar 9×, Poison Ivy 12× incl. "ceased its
  use of the Poison Ivy malware family after a 2013 FireEye report"; "DLL search order hijacking and
  sideloading ... using legitimate, signed software, such as Windows Defender to load the malicious
  payloads"; mimikatz/PwDump; MSP-credential pivot via shared client/MSP infrastructure) AND the
  cn/mic2025 doctrine attestation — Figure 13 "Industries of interest outlined by 'Made in China
  2025' initiative" + "This targeting spans industries that align with China's 13th FYP which would
  provide valuable information to advance the domestic innovation goals held within China." The event's
  cn/mic2025 attesting_source_id was re-pointed doj -> this report accordingly. Confirmed the report
  does NOT name the specific MSP victims (HPE/IBM/Fujitsu/NTT = 0 hits) and attributes only at nation
  level.
