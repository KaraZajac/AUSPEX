notes: |
  Designates CARR (Cyber Army of Russia Reborn) leaders Yuliya
  Pankratova and Denis Degtyarenko under E.O. 13694.
  AUDIT (2026-06-24, claude-opus-4.8/max): RAW-VERIFIED — this
  release does NOT attribute CARR to the GRU. Actual page title:
  "Treasury Sanctions Leader and Primary Member of the Cyber Army
  of Russia Reborn." It characterizes CARR ONLY as a "Russian
  government-aligned hacktivist group" / "Russian hacktivist
  group" of "Russian cybercriminal[s]." It contains NO mention of
  GRU, Sandworm, Unit 74455, "founded/funded/directed", or any
  intelligence/military service (0 hits each). The prior note
  here — that Treasury made a "gold-standard attestation"
  attributing CARR to "GRU Unit 74455" with the wording "founded,
  funded, and directed by the GRU" — was a MISATTRIBUTION: that
  exact wording is the DOJ Dec 9, 2025 indictment's
  (doj/2025-12_carr-noname-actions), NOT Treasury's. What this
  release does state, verbatim: "the United States designated
  Yuliya Vladimirovna Pankratova ... and Denis Olegovich
  Degtyarenko ... two members of the Russian hacktivist group
  Cyber Army of Russia Reborn (CARR)." The CARR→GRU service link
  must be cited to DOJ Dec 2025, not to this source.
