title: |
  Treasury Sanctions Cyber Actors Affiliated with Russian
  Intelligence Services (CARR designations)
url: https://home.treasury.gov/news/press-releases/jy2473
archive_url: https://web.archive.org/web/2024*/https://home.treasury.gov/news/press-releases/jy2473
published_on: 2024-07-19
retrieved_on: 2026-05-25
tier: primary
notes: |
  Designates CARR (Cyber Army of Russia Reborn) leaders Yuliya
  Pankratova and Denis Degtyarenko. Treasury characterizes CARR as
  "founded, funded, and directed by the GRU" — gold-standard
  attestation linking the proxy directly to GRU Unit 74455.
  Cites CARR's "support for Russia's geopolitical interests" as
  the basis for designation.
