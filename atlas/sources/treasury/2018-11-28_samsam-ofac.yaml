notes: |
  OFAC designated Iran-based Ali Khorashadizadeh and Mohammad
  Ghorbaniyan under EO 13694 (as amended) for materially
  assisting the SamSam ransomware scheme by exchanging bitcoin
  ransom proceeds into Iranian rial and depositing the rial in
  Iranian banks. Marks "the first time OFAC is publicly
  attributing digital currency addresses to designated
  individuals" — two Bitcoin addresses listed
  (149w62rY42aZBox8fGcmqNsXUzSStKeq8C and
  1AjZPMsnmpdK2Rv9KQNfMurTXinscVro9V) that since 2013 processed
  7,000+ transactions across 40+ exchangers (~6,000 BTC), some
  SamSam-derived. Companion to the DOJ Savandi / Mansouri
  indictment; SamSam framed as a criminal scheme (over 200
  victims). Snapshot captured via the Wayback archive_url (live
  home.treasury.gov is bot-walled); content_sha256 is of that
  capture.
