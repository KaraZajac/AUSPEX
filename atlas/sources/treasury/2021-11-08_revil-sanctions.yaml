notes: |
  Treasury announcement of sanctions tied to the REvil case, including
  the Chatex cryptocurrency exchange designation. URL needs
  verification — the 2021-11-08 Treasury release covered both REvil
  arrests and Chatex sanctions.
  AUDIT (2026-06-24, claude-opus-4.8/max): URL VERIFIED live — jy0471 is the
  correct release (title "Treasury Continues to Counter Ransomware as Part of
  Whole-of-Government Effort; Sanctions Ransomware Operators and Virtual
  Currency Exchange"); full body captured (128 KB, sha256 recorded; the lone
  "akamai" token is a CDN telemetry script, not a block page). Used for the
  ru/proxies/revil placement audit -> contributed to DEMOTION to
  ru/unscoped/revil. NO Russian-state nexus (tasking/tolerance/harbor/handoff):
  pure OFAC sanctions framing — "OFAC is designating Ukrainian Yaroslav
  Vasinskyi (Vasinskyi) and Russian Yevgeniy Polyanin (Polyanin) for their part
  in perpetuating Sodinokibi/REvil ransomware incidents against the United
  States" — plus Chatex/Chatextech exchange designations and State Dept TOC
  reward offers (up to $10M) for the "Sodinokibi/REvil ransomware variant
  transnational organized crime group". "Russian" appears only as defendant
  nationality; no FSB/GRU/SVR/Kremlin/state-direction/safe-harbor language.
