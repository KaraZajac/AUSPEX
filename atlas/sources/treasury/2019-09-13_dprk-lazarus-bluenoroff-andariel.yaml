notes: |
  OFAC SDN designation of Lazarus Group, BlueNoroff, and Andariel
  as DPRK state-sponsored cyber actors. Foundational attribution
  document — names the Reconnaissance General Bureau (RGB) as the
  controlling organization and explicitly ties cyber operations
  to revenue generation for the DPRK's WMD programs.
  AUDIT (2026-06-24, claude-opus-4.8/max): RGB placement of
  kp/rgb/andariel VERIFIED against this source's own words. OFAC
  names the Reconnaissance General Bureau as Andariel's controlling
  service explicitly, not merely "North Korean"/"DPRK":
  "Today's actions identify North Korean hacking groups commonly
  known within the global cyber security private industry as
  'Lazarus Group,' 'Bluenoroff,' and 'Andariel' as agencies,
  instrumentalities, or controlled entities of the Government of
  North Korea pursuant to Executive Order (E.O.) 13722, based on
  their relationship to the Reconnaissance General Bureau (RGB).
  Lazarus Group, Bluenoroff, and Andariel are controlled by the
  U.S.- and United Nations (UN)-designated RGB, which is North
  Korea's primary intelligence bureau." The dedicated Andariel
  paragraph reinforces this: "The second Lazarus Group sub-group
  designated today is Andariel." This is the load-bearing source
  for the actor's kp/rgb placement (named-actor → named-service).
