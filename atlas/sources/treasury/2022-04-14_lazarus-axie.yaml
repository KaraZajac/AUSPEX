notes: |
  Designates the Ethereum receiving address
  0x098B716B8Aaf21512996dC57EB0615e2383E2f96 under E.O. 13722
  and adds it to the LAZARUS GROUP SDN entry.
  URL set to null 2026-05-26 after URL audit. Previously cited
  jy0731 was the U.S. Treasury "Facilitators of Russian
  Sanctions Evasion" press release — unrelated. The 2022-04-14
  Lazarus / Ronin Bridge action was an OFAC SDN-list update
  (no dedicated Treasury press release was issued); see
  https://ofac.treasury.gov/recent-actions/20220414 ("North
  Korea Designation Update") for the canonical OFAC record.
  AUDIT (2026-06-24, claude-opus-4.8/max): raw_snapshot is that canonical OFAC recent-actions
  page. CORRECTION — the prior note claimed this action "attributes the theft to Lazarus Group
  / Reconnaissance General Bureau (RGB), with explicit linkage of proceeds to DPRK WMD and
  ballistic-missile programs." The OFAC primary contains NONE of that: it is a bare SDN-list
  update reading "SPECIALLY DESIGNATED NATIONALS LIST UPDATE — … LAZARUS GROUP (a.k.a.
  'APPLEWORM'; … 'HIDDEN COBRA'; … 'OFFICE 91'; … 'ZINC'), Potonggang District, Pyongyang …".
  Term scan of the captured page: "Reconnaissance"=0, "RGB"=0, "WMD"=0, "ballistic"=0. The RGB
  control finding for the Lazarus family is the SEPARATE Sept-2019 OFAC designation
  (treasury/2019-09-13_dprk-lazarus-bluenoroff-andariel), which is NOT cited by the
  TraderTraitor actor. Hence this source does not source any RGB service placement here.
