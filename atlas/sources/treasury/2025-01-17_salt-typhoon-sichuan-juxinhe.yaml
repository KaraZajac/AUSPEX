notes: |
  OFAC SDN designation of Sichuan Juxinhe Network Technology Co.
  (Salt Typhoon operating company; explicitly identified as MSS-
  supporting) and Yin Kecheng (Shanghai-based MSS-affiliated
  individual responsible for the 2024 BeyondTrust / Treasury
  compromise associated with Silk Typhoon / APT27 cluster).
  AUDIT (2026-06-24, claude-opus-4.8/max): used in the cn/mss/apt27 -> cn/unscoped/apt27 service
  demotion. This release NAMES the MSS, but only for the individual Yin Kecheng ("...is affiliated
  with the People's Republic of China Ministry of State Security (MSS)") and for Sichuan Juxinhe,
  the SALT Typhoon operating company ("The MSS has maintained strong ties with multiple computer
  network exploitation companies, including Sichuan Juxinhe"). The text contains ZERO occurrences of
  "APT27" or "Silk Typhoon"; the only named cyber GROUP is Salt Typhoon (a separate AUSPEX cluster).
  It therefore does NOT place APT27 under the MSS — the Yin-Kecheng/BeyondTrust -> "Silk Typhoon /
  APT27 cluster" chain in this note is an AUSPEX editorial cross-walk, not a statement in the source.
