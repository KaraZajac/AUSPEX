notes: |
  OFAC SDN designation of Sichuan Juxinhe Network Technology Co.
  (Salt Typhoon operating company; explicitly identified as MSS-
  supporting) and Yin Kecheng (Shanghai-based MSS-affiliated
  individual responsible for the 2024 BeyondTrust / Treasury
  compromise associated with Silk Typhoon / APT27 cluster).
  AUDIT (2026-06-24, claude-opus-4.8/max): used in the cn/mss/apt27 -> cn/unscoped/apt27 service
  demotion. This release NAMES the MSS, but only for the individual Yin Kecheng ("...is affiliated
  with the People's Republic of China Ministry of State Security (MSS)") and for Sichuan Juxinhe,
  the SALT Typhoon operating company ("The MSS has maintained strong ties with multiple computer
  network exploitation companies, including Sichuan Juxinhe"). The text contains ZERO occurrences of
  "APT27" or "Silk Typhoon"; the only named cyber GROUP is Salt Typhoon (a separate AUSPEX cluster).
  It therefore does NOT place APT27 under the MSS — the Yin-Kecheng/BeyondTrust -> "Silk Typhoon /
  APT27 cluster" chain in this note is an AUSPEX editorial cross-walk, not a statement in the source.
  AUDIT (2026-06-24, claude-opus-4.8/max): also reviewed in the cn/mss/hafnium service verification
  (verdict KEEP). Same finding applies to Hafnium/Silk Typhoon: this release contains ZERO occurrences
  of "Silk Typhoon" or "Hafnium" (only named group = Salt Typhoon). It is therefore NOT the basis for
  the cn/mss/hafnium placement; that KEEP rests on the 2021 White House statement, which names "PRC's
  MSS" for the Exchange/ProxyLogon operation directly. Yin Kecheng's individual MSS affiliation here
  links to the Silk-Typhoon-attributed BeyondTrust/Treasury compromise only via AUSPEX's editorial
  cross-walk, not via the source's own words. Snapshot/sha256 already on file (unchanged).
  AUDIT (2026-06-24, claude-opus-4.8/max): used as the DECISIVE source in the cn/mss/salt-typhoon
  service verification (verdict KEEP). For Salt Typhoon this release IS the basis for the MSS placement:
  it names the operating company as part of Salt Typhoon ("Sichuan Juxinhe Network Technology Co., LTD.,
  a Sichuan-based cybersecurity company with direct involvement in the Salt Typhoon cyber group";
  "Sichuan Juxinhe ... had direct involvement in the exploitation of these U.S. telecommunication and
  internet service provider companies") and names the MSS as that company's affiliating service ("The MSS
  has maintained strong ties with multiple computer network exploitation companies, including Sichuan
  Juxinhe"). Unlike the Hafnium/APT27 audits above (where this release names no relevant group), here the
  named cyber group IS Salt Typhoon and the MSS tie is direct. Snapshot/sha256 already on file (unchanged).
