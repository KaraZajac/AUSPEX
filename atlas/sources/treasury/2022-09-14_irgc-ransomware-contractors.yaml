notes: |
  Designates Najee Technology and Afkar System (IRGC-affiliated
  ransomware contractor cluster) plus principals Mansour Ahmadi,
  Ahmad Khatibi Aghda, and Amir Hossein Nikaeen Ravari.
  Canonical attestation source for the sanctions-evasion /
  ransomware-revenue pillar in relation to IRGC-contractor
  patronage.
  AUDIT (2026-06-24, claude-opus-4.8/max): Names the IRGC specifically
  and ties Afkar System to it (not merely "Iranian"), supporting the
  ir/irgc placement of ir/irgc/afkar-system at the named-actor level.
  Verbatim: "The individuals and entities designated today are all
  affiliated with Iran's Islamic Revolutionary Guard Corps (IRGC)." —
  "This IRGC-affiliated group is comprised of employees and associates
  of Najee Technology Hooshmand Fater LLC (Najee Technology) and Afkar
  System Yazd Company (Afkar System)." — "The IRGC-affiliated employees
  ... of the IRGC-affiliated companies, Najee Technology and Afkar
  System, are responsible for or complicit in ... global targeting of
  various networks, including critical infrastructure." Afkar System
  was designated under E.O. 13694 (as amended) for acting for/on behalf
  of Ahmad Khatibi Aghda (its managing director).
  AUDIT (2026-06-24, claude-opus-4.8/max): The same designation also supports the ir/irgc
  placement of ir/irgc/najee-technology at the named-actor level — Najee Technology is
  itself one of the designated, IRGC-affiliated entities, not merely "Iranian." Verbatim:
  "Najee Technology was designated pursuant to E.O. 13694, as amended, for having materially
  assisted, sponsored, or provided financial, material, or technological support for ... the
  IRGC." (plus the IRGC-affiliation and "IRGC-affiliated companies, Najee Technology and Afkar
  System" statements quoted above). raw_snapshot + content_sha256 re-verified (sha256 matches).
  AUDIT (2026-07-10, claude-opus-4.8/max): re-verified for the event-audit of
  2022-09/najee-afkar-irgc-ransomware — sha256 fad8ec43…2bb1382f UNCHANGED. Additional load-
  bearing facts confirmed carried by this snapshot: "ten individuals and two entities"; the
  D.N.J. CFAA indictment of Mansour/Khatibi/Nikaeen; "since at least 2020"; the NJ-municipality
  Fortinet compromise + fast reverse proxy; BitLocker-without-authorization extortion of a law
  firm / accounting firm / construction contractor; the June-2021 US children's-hospital SCADA
  access (hospital named only generically — "Boston" does not appear); the Oct-2021 rural
  electric-utility BitLocker incident; Mimikatz + FileZilla; the $10M Rewards-for-Justice offer.
