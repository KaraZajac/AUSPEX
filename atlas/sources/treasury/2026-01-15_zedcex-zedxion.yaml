notes: |
  AUDIT 2026-06-27 (claude-opus-4.8, max): PHANTOM REPAIRED. The prior
  url was the generic /news/ index — a catalogue that returns HTTP 200
  but carries no article (zero Zedcex/Zedxion mentions): a phantom.
  Re-pointed to the genuine OFAC press release sb0375 (30 Jan 2026),
  which designates Babak Morteza Zanjani plus the two UK-registered
  digital asset exchanges Zedcex Exchange Ltd and Zedxion Exchange Ltd
  under E.O. 13902 (Iran financial sector) and E.O. 13224 (material
  support to the IRGC). Snapshot captured + hashed. Verbatim confirmed
  in snapshot: "for the first time, OFAC designated two digital asset
  exchanges linked to Zanjani that have processed large volumes of
  funds associated with IRGC-linked counterparties"; "This marks OFAC's
  first designation of a digital asset exchange for operating in the
  financial sector of the Iranian economy"; "Multiple Zedcex and
  Zedxion-attributed addresses have processed funds for wallets linked
  to the IRGC." NB the document's own title covers the broader Iran
  package (regime officials / protest repression); the Zedcex / Zedxion
  / Zanjani designations are one section of it.
  SLUG-DATE WART: id/filename carry 2026-01-15 (the bulk-import's
  fabricated date); the real designation date is 2026-01-30. Slug left
  unrenamed per the stable-slug rule — FLAGGED for orchestrator. The
  prior note's sb0519/Nobitex conflation was incorrect; the real
  release is sb0375.
