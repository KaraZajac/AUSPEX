notes: |
  Designates the Central Scientific Research Institute of Chemistry
  and Mechanics (TsNIIKhM) as the operator of Triton/Trisis. Names
  TsNIIKhM as Russian government-controlled (Treasury places it as
  MoD-affiliated; some vendor reporting places the operator as
  FSB-adjacent — see contested-attribution notes on
  services/ru/tsniikhm.yaml).
  AUDIT (2026-06-25, claude-opus-4.8/max): TsNIIKhM is NAMED by name as
  the Triton operator — confirms the ru/tsniikhm service placement of
  actor ru/tsniikhm/triton at the named-unit level. Verbatim: "This
  cyber-attack was supported by the State Research Center of the Russian
  Federation FGUP Central Scientific Research Institute of Chemistry and
  Mechanics (TsNIIKhM), a Russian government-controlled research
  institution that is responsible for building customized tools that
  enabled the attack." Headline: "Treasury Sanctions Russian Government
  Research Institution Connected to the Triton Malware." Raw HTML
  captured from the live treasury.gov page (HTTP 200).
