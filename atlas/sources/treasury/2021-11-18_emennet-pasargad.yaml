notes: |
  Designates Emennet Pasargad and individuals including Seyyed
  Mohammad Hosein Musa Kazemi and Sajjad Kashian for the 2020
  "Proud Boys" voter-intimidation campaign and voter-data theft.
  Canonical attestation source for the persona-laundering
  pillar (Emennet Pasargad → IRGC contractor).
  AUDIT (2026-06-24, claude-opus-4.8/max): SERVICE-PLACEMENT VERIFIED — this
  source names the IRGC specifically (not merely "Iran"/"Iranian") as the
  service Emennet Pasargad supports, so the ir/irgc placement is KEPT. The
  release states verbatim: "Emennet was previously designated under its former
  name, Net Peygard Samavat Company, pursuant to E.O. 13606 in February 2019,
  for having materially assisted, sponsored, or provided financial, material, or
  technological support for, or goods or services to or in support of, the
  Islamic Revolutionary Guard Corps-Electronic Warfare and Cyber Defense
  Organization (IRGC-EWCD)."; and "Emennet is managed by Iranian national
  Mohammad Bagher Shirinkar (Shirinkar), whom OFAC previously designated
  pursuant to E.O. 13606 in February 2019 for having materially assisted the
  IRGC-EWCD." Raw snapshot captured (curl, HTTP 200, text/html, 119,862 bytes,
  no bot-interstitial) and read directly.
