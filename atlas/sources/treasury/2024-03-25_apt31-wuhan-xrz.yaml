notes: |
  OFAC SDN designation of Wuhan Xiaoruizhi Science & Technology Co.
  ("Wuhan XRZ"), Zhao Guangzong, and Ni Gaobin (APT31 / MSS Hubei
  SSD). First PRC group sanctioned alongside indictment. Treasury
  press release names critical-infrastructure and political-espionage
  objectives, including a 2018 Texas energy company compromise.
  ENERGY-CLAIM VERIFIED (2026-07-10, claude-opus-4.8/max): this
  release is the load-bearing source for event 2018-11/texas-energy-
  apt31 — verbatim "In 2018, employees of Wuhan XRZ conducted an
  APT 31 malicious cyber operation on a Texas-based energy company,
  gaining unauthorized access." and "APT 31 has targeted victims in
  some of America's most vital critical infrastructure sectors,
  including the Defense Industrial Base, information technology, and
  energy sectors." No tradecraft/malware named for the energy op
  (only "unauthorized access"); no "Volt Typhoon" reference.
  AUDIT (2026-06-24, claude-opus-4.8/max): MSS placement of cn/mss/apt31
  VERIFIED against this source (raw captured via curl, HTTP 200). OFAC names
  the MSS by name as the parent of the Wuhan XRZ front and ties APT31 to the
  Hubei SSD: "Today, the Department of the Treasury's Office of Foreign Assets
  Control (OFAC) sanctioned Wuhan Xiaoruizhi Science and Technology Company,
  Limited (Wuhan XRZ), a Wuhan, China-based Ministry of State Security (MSS)
  front company that has served as cover for multiple malicious cyber
  operations."; "APT 31 is a collection of Chinese state-sponsored
  intelligence officers, contract hackers, and support staff that conduct
  malicious cyber operations on behalf of the Hubei State Security Department
  (HSSD)."; "In 2010, the HSSD established Wuhan XRZ as a front company to
  carry out cyber operations." MSS named explicitly as the affiliating
  service; KEEP.
