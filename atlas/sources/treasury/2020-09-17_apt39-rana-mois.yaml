notes: |
  Designates Rana Intelligence Computing Company plus 45
  individuals under E.O. 13553 (serious human-rights abuses).
  Formal attestation of MOIS as the parent service for the
  APT39 / Chafer cluster. Canonical attestation source for the
  Constitutional-IRGC-Role / regime-preservation pillar in
  relation to MOIS dissident surveillance.
  AUDIT (2026-06-24, claude-opus-4.8/max): ir/mois service placement for
  ir/mois/apt39 VERIFIED against this cited source — it names the MOIS
  specifically (not merely "Iranian") and ties APT39 directly to it.
  Verbatim: "Rana advances Iranian national security objectives and the
  strategic goals of Iran's Ministry of Intelligence and Security (MOIS) by
  conducting computer intrusions and malware campaigns against perceived
  adversaries..."; "APT39 is being designated pursuant to E.O. 13553 for
  being owned or controlled by the MOIS"; "details eight separate and
  distinct sets of malware used by MOIS through Rana to conduct their
  computer intrusion activities. This is the first time most of these
  technical indicators have been publicly discussed and attributed to MOIS
  by the U.S. government"; FBI Director Wray: "Iran's MOIS, through their
  front company Rana...". Raw snapshot captured (curl, HTTP 200, 883,237
  bytes).
