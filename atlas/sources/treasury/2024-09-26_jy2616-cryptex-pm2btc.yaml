notes: |
  Treasury OFAC + FinCEN press release (Sep 26 2024) announcing the
  coordinated US-Dutch action against Russian crypto-laundering
  infrastructure: OFAC SDN designation of Sergey Ivanov and the Cryptex
  exchange (E.O. 13694, as amended, + E.O. 14024), FinCEN Section 9714
  "primary money laundering concern" order on PM2BTC, US Secret Service
  + Netherlands Police + Dutch FIOD seizure of PM2BTC / UAPS / Cryptex
  domains and infrastructure, the DOJ EDVA indictment of Ivanov and
  Timur Shakhmametov, and a State Dept reward (up to $10M for Ivanov).
  Cites Cryptex's >$51.2M ransomware proceeds and ~$720M in transactions
  to cybercrime services (incl. OFAC-designated Garantex and Genesis
  Market) and Ivanov's laundering of hundreds of millions over ~20 years.
  Part of the multinational Operation Endgame.

