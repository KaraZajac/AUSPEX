notes: |
  Treasury OFAC SDN designations of four DPRK entities and
  one individual (Kim Sang Man) for facilitating
  cyber-malicious activities and the IT-worker fraud
  program. Designated entities include the Pyongyang
  University of Automation (training pipeline for DPRK
  cyber personnel), the 110th Research Center of the
  RGB, the Technical Reconnaissance Bureau, and Chinyong
  IT Cooperation Company. First Treasury action explicitly
  designating the DPRK cyber-personnel training pipeline
  rather than only operational units.
  AUDIT (2026-07-02, claude-opus-4.8/max): snapshot captured + hashed
  (raw_snapshot above, sha256 cbbfaf97…c19d8c0, 129327 bytes) — resolves
