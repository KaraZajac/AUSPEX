  body; WMD/ballistic-missile-financing language present for BOTH the
  cyber-malicious and IT-worker sides. tier primary PRESERVED (first-party
  govt-primary). Note: "premier"/"training-pipeline" wording is source-stated,
  but the "First Treasury action" superlative in this note is AUSPEX
  characterization, not verbatim OFAC text.
