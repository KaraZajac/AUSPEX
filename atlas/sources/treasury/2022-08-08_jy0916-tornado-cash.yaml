title: |
  U.S. Treasury Sanctions Notorious Virtual Currency Mixer
  Tornado Cash (jy0916)
url: https://home.treasury.gov/news/press-releases/jy0916
archive_url: null
published_on: 2022-08-08
retrieved_on: 2026-05-27
tier: primary
notes: |
  OFAC SDN designation of the Tornado Cash mixer for laundering
  more than USD 7B in virtual currency since 2019, including
  USD 455M stolen by Lazarus and proceeds from Harmony Horizon
  and Nomad bridge thefts. First sanction of a smart-contract
  mixer; later partially vacated by Fifth Circuit (Van Loon v.
  Treasury, Nov 2024) on the immutable-smart-contract limb.
