notes: |
  OFAC press release sb0248 (E.O. 13224), "Treasury Targets
  Financial Network Supporting Iran's Military": designates a pair
  of Iranian financial facilitators (Alireza Derakhshan, Arash
  Estaki Alivand) plus more than a dozen Hong Kong- and UAE-based
  individuals and front companies (Alpa, Minato, Powell, Everest,
  Unique Station, Alliance First, Paul AD Sons) moving Iranian
  oil-sale proceeds for the IRGC-Qods Force and MODAFL, laundering
  via overseas front companies and cryptocurrency. Second round of
  Iran shadow-banking sanctions under NSPM-2 maximum pressure.
  AUDIT (2026-07-10, claude-opus-4.8/max): raw snapshotted + hashed
  (sha256 7053eb11...abcbdd1e, 131,898 B). CORRECTION — the prior
  note's "~$600M shadow-banking network ... plus seven crypto
  addresses" was fabricated: sb0248 contains NO "$600M" figure and
  NO "seven crypto addresses" (grep-verified 0 hits). The only
  dollar figures in the release are "over $100 million worth of
  cryptocurrency" (Derakhshan+Alivand, oil sales, 2023-2025) and
  front companies "collectively handle hundreds of millions of U.S.
  dollars in transactions." Title corrected to the literal OFAC
  headline. Drove the re-audit of event
  2025-09/ofac-irgc-crypto-shadow-banking.
