notes: |
  OFAC press release sb0185 designating Aeza Group LLC, two
  affiliated companies (Aeza Logistic LLC, Cloud Solutions LLC),
  UK front company Aeza International Ltd (in coordination with
  the UK NCA), and four principals (Penzev, Bozoyan, Gast,
  Knyazev) pursuant to E.O. 13694 (as amended by E.O. 14144 /
  14306). Names Meduza and Lumma infostealer operators (targeting
  the U.S. defense industrial base and technology companies), plus
  BianLian ransomware, RedLine infostealer panels, and BlackSprut
  darknet drug market. url corrected 2026-07-10 from the rolling
  /news/press-releases catalogue shell (which no longer lists the
  July-2025 release) to the canonical sb0185 permalink; snapshotted
  + hashed.
