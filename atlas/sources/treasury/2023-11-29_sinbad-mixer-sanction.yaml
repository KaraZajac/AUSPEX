notes: |
  Treasury (OFAC) SDN designation of the Sinbad.io virtual-currency
  mixer as a Lazarus Group (DPRK) money-laundering tool.

  AUDIT (2026-07-02, claude-opus-4.8/max): snapshot captured from
  home.treasury.gov (122,402 bytes, sha256 f57acb36…46b3db1a); page
  title + body confirm the real release (NOT a phantom). Verbatim
  attestation of the terminal WMD/ballistic-missile goal (single
  occurrence): "the DPRK has resorted to using illicit tactics, such
  as heists perpetrated by the Lazarus Group, to generate revenue for
  its unlawful weapons of mass destruction and ballistic missile
  programs." Other verbatim quotes carried: Sinbad "serves as a key
  money-laundering tool of the OFAC-designated Lazarus Group, a
  state-sponsored cyber hacking group of the [DPRK]"; laundered "a
  significant portion of the $100 million … stolen on June 3, 2023,
  from customers of Atomic Wallet", plus "the Axie Infinity heist of
  approximately $620 million in March 2022, and the Horizon Bridge
  heist of approximately $100 million in June 2022"; "believed by some
  industry experts to be a successor to the Blender.io mixer";
  designated "pursuant to E.O. 13694, as amended by E.O. 13757". NB:
  the source says "Axie Infinity heist" (not "Ronin"), hedges the
  Blender-successor claim, and carries NO ranking ("largest" absent).
