notes: |
  Treasury OFAC sanctions under Executive Order 14024 formally
  attributing the SolarWinds Orion supply-chain compromise to the
  SVR (APT29 / Cozy Bear). Companion to White House fact sheet
  same-day public attribution.
  AUDIT (2026-06-25, claude-opus-4.8/max): SVR service placement of
  ru/svr/apt29 VERIFIED — names the Foreign Intelligence Service (SVR)
  explicitly and attributes SolarWinds to it. Captured from the live
  URL (HTTP 200). Verbatim: "The Russian Intelligence Services —
  specifically the Federal Security Service (FSB), Russia's Main
  Intelligence Directorate (GRU), and the Foreign Intelligence Service
  (SVR) — have executed some of the most dangerous and disruptive cyber
  attacks in recent history, including the SolarWinds cyber attack." And:
  "the Russian Intelligence Services' third arm, the SVR, is responsible
  for the 2020 exploit of the SolarWinds Orion platform and other
  information technology infrastructures."
