notes: |
  Designates six IRGC-CEC officials — Hamid Reza Lashgarian
  (head of the IRGC-CEC, also a commander in the IRGC-Qods Force),
  Mahdi Lashgarian, Hamid Homayunfal, Milad Mansuri, Mohammad
  Bagher Shirinkar, and Reza Mohammad Amin Saberian — in response
  to the IRGC-affiliated Unitronics Vision PLC operations
  (including the November 2023 Aliquippa, PA water-utility
  intrusion). Canonical attestation source for the
  persona-laundering doctrine (CyberAv3ngers → IRGC).
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the actor's IRGC
  placement; key granularity finding on the SUB-ORG. OFAC's exact
  wording is the IRGC Cyber-Electronic Command, NOT the IRGC
  Intelligence Organization: "OFAC sanctioned six officials in the
  Iranian Islamic Revolutionary Guard Corps Cyber-Electronic
  Command (IRGC-CEC), an Iranian government organization responsible
  for a series of malicious cyber activities against critical
  infrastructure"; "OFAC designated the IRGC-CEC, also known as the
  IRGC Electronic Warfare and Cyber Defense Organization … for being
  owned or controlled by, or acting for or on behalf of, the IRGC."
  The release ties the action to "IRGC-affiliated cyber actors'
  recent cyber operations in which they hacked and posted images on
  the screens of programmable logic controllers manufactured by
  Unitronics." NOTE: the strings "IRGC-IO", "Intelligence
  Organization", and "CyberAv3ngers" do NOT appear anywhere in this
  OFAC text — the prior note's "IRGC-IO Cyber-Electronic Command"
  framing was an AUSPEX synthesis, not the source's words. The
  source attests the IRGC (and specifically the IRGC-CEC), which
  supports the actor's placement in the IRGC service subtree; it
  does NOT independently attest the IRGC-IO (Intelligence
  Organization) sub-org the actor id currently uses. Also corrects
  a prior-note factual slip: the sixth designee is Mohammad Bagher
  Shirinkar, not "Mahdi Mohammad Sadeghi" (Sadeghi was named in a
  separate, later 2024 DOJ matter, not this OFAC action).
  AUDIT (2026-07-04, claude-opus-4.8/max): raw HTML hash re-verified
  (579b0021…7b167554, 119,852 bytes). Drove the re-audit of event
  2024-02/ofac-cyberav3ngers-irgc-io-designations: remodeled to a
  null-actor counter-action, IRGC-IO→IRGC-CEC prose fixes applied,
  sixth designee corrected Sadeghi→Shirinkar in the event, and
  incident_type set to [documentary, policy]. tier/url/keys preserved.
