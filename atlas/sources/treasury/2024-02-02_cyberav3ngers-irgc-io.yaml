notes: |
  Designates six IRGC-IO Cyber-Electronic Command officials —
  Hamid Reza Lashgarian (commander), Mahdi Lashgarian, Hamid
  Homayunfal, Mahdi Mohammad Sadeghi, Milad Mansuri, and Reza
  Mohammad Amin Saberian — as the operators behind the
  CyberAv3ngers persona that conducted the November 2023
  Aliquippa, PA water-utility intrusion and the broader
  Unitronics Vision PLC campaign. Canonical attestation source
  for the persona-laundering doctrine (CyberAv3ngers → IRGC-IO).
