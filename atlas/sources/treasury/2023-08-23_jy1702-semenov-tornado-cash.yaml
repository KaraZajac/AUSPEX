notes: |
  OFAC SDN designation of Roman Semenov, Tornado Cash co-founder.
  Companion to the same-day DOJ unsealing of indictments against
  Semenov and Roman Storm (SDNY) for conspiracy to commit money
  laundering, sanctions violations, and operating an unlicensed
  money-transmitting business. Treasury press release explicitly
  ties Tornado Cash's services to laundering of Lazarus / DPRK
  proceeds in support of WMD and ballistic-missile programs.
  AUDIT 2026-07-10 (claude-opus-4.8/max): snapshotted + hash-verified
  (direct curl 200, 126,674 B). Carries verbatim the terminal-goal
  attestation "...to generate revenue for its unlawful weapons of mass
  destruction and ballistic missile programs" (the attesting quote for
  the event's kp/8th-congress doctrine link), Semenov as "one of three
  co-founders" designated under E.O. 13694/13757, and the Lazarus Ronin
  (>$455M) / Harmony Horizon (>$96M) / Nomad (>$7.8M) laundering figures.
