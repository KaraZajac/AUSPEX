notes: |
  First joint US/UK sanctions tranche against seven members of the
  TrickBot / Conti ecosystem. Cites the group's FSB liaison
  (ContiLeaks 2022) and its targeting of US/UK government and
  critical infrastructure as the basis for designation.
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw captured from the cited URL
  (home.treasury.gov/.../jy1714). DOCUMENTS the Russian-state nexus that
  warrants keeping the actor in ru/proxies/ — verbatim: "Members of the
  Trickbot group are associated with Russian intelligence services. The
  Trickbot group's preparations in 2020 aligned them to Russian state
  objectives and actions taken by the Russian intelligence services. This
  included targeting the U.S. Government and U.S. companies." Also: the group
  "has ties to Russian intelligence services," and "Russia has long been a
  safe haven for cybercriminals, including the Trickbot group" (harboring).
  State-nexus = YES (intelligence-service ties + state-objective alignment +
  safe haven). NB the release names "Russian intelligence services" generally,
  NOT specifically "FSB Center 18" (that specificity is the actor's, sourced to
  ContiLeaks). FIDELITY FLAG: the page at jy1714 is in fact the SEPTEMBER 2023
  (eleven-individual) tranche — its body sanctions eleven people and refers to
  "the first joint U.S.-UK cyber designation ... in February 2023" — i.e. the
  URL/content does not match this record's 2023-02-09 / "seven members" first-
  tranche framing; the two tranches make the same nexus finding, but the URL
  should be corrected to the genuine Feb-2023 release.
