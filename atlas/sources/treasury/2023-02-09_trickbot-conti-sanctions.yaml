notes: |
  First joint US/UK sanctions tranche (2023-02-09) designating seven members
  of the Russia-based Trickbot cybercrime group. Cites the group's association
  with Russian intelligence services and its targeting of US/UK critical
  infrastructure (hospitals) and the US government as the basis for designation.
  AUDIT (2026-07-02, claude-fable-5/max): WRONG-URL DEFECT RESOLVED. The
  previously-cited URL (jy1714) is in fact the SEPTEMBER 2023 (eleven-individual)
  ADDITIONAL-members tranche, flagged 2026-06-24; corrected the URL to the
  genuine February-2023 first-tranche release jy1256 (title "United States and
  United Kingdom Sanction Members of Russia-Based Trickbot Cybercrime Gang" —
  note: no "Additional"). Re-curled jy1256 to the canonical raw filename;
  raw_snapshot now holds jy1256 (sha256 f0a1fa09…ff9465eb, 125,782 bytes). The
  mislabeled jy1714 September page was preserved on disk as
  treasury__2023-09-07_jy1714-additional-members.html (sha256 0b532c79…a43a4498)
  for the tranche-two orchestrator fix. jy1256 verbatim-supports: "designating
  seven individuals who are part of the Russia-based cybercrime gang Trickbot";
  "This action represents the very first sanctions of their kind for the U.K.";
  "Current members of the Trickbot Group are associated with Russian Intelligence
  Services. The Trickbot Group's preparations in 2020 aligned them to Russian
  state objectives and targeting previously conducted by Russian Intelligence
  Services. This included targeting the U.S. government and U.S. companies";
  "These malicious cyber activities have targeted critical infrastructure,
  including hospitals and medical facilities during a global pandemic, in both
  the U.S. and the U.K."; goal "to disrupt Russian cybercrime and ransomware".
  State-nexus = YES (intelligence-service association + state-objective alignment).
  NB the release names "Russian Intelligence Services" GENERICALLY — the words
  "FSB", "Conti" and "Wizard Spider" do NOT appear in jy1256 (grep-verified
  absent); the FSB-Center-18 specificity and the Conti/Wizard-Spider ecosystem
  identification are the actor's, sourced to ContiLeaks (krebs 2022-03), not this
  release.
