title: |
  Treasury Sanctions Facilitators of DPRK IT Worker Fraud
  Targeting U.S. Businesses (sb0416)
url: https://home.treasury.gov/news/press-releases/sb0416
archive_url: null
published_on: 2024-05-16
retrieved_on: 2026-05-27
tier: primary
notes: |
  Treasury OFAC SDN designations of one DPRK entity and three
  individuals for facilitating IT-worker fraud targeting US
  businesses. Press release explicitly cites the scheme
  generated approximately USD 800M in 2024 to fund the DPRK's
  WMD programs. Companion to the same-day DOJ Christina
  Chapman superseding indictment unsealing. Canonical
  WMD-financing attestation for the IT-worker fraud
  revenue stream.
