  AUDIT 2026-07-04 (claude-opus-4-8 / max): OFAC press release sb0416,
  "Treasury Sanctions Facilitators of DPRK IT Worker Fraud Targeting U.S.
  Businesses," issued 12 March 2026 (NOT 16 May 2024 — the slug's date is a
  legacy artifact). Quotes Sec. Scott Bessent. Designates two entities
  (Amnokgang Technology Development Company; Quangvietdnbg International
  Services Company Limited) and six individuals (Nguyen Quang Viet, Do Phi
  Khanh, Hoang Van Nguyen, Yun Song Guk, Hoang Minh Quang, York Louis
  Celestino Herrera) based in the DPRK, Vietnam, Laos, and Spain. States the
  IT-worker schemes "generate revenue to fund the DPRK's weapons of mass
  destruction (WMD) programs, including nearly $800 million in 2024." Raw
  snapshot captured + sha256 (137a4140…2f55095c, 127,009 bytes).

  PRIOR NOTE WAS WRONG (fabricated): it described "one DPRK entity and three
  individuals" and a "same-day DOJ Christina Chapman superseding indictment"
  companion. Neither appears in sb0416 (grep: Chapman/Bureau 313/Jong Pong
  Ju/Pak Hwa Song/superseding = 0 hits) and there was NO OFAC IT-worker
  designation on 16 May 2024 (that day = DOJ Chapman charges + State Dept
  Rewards for Justice only). Still the canonical primary source for the
  "~$800M in 2024" WMD-financing figure — that figure is accurate; only its
  date/action attribution was wrong.
