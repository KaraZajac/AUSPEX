title: |
  Treasury Sanctions Iranian Ministry of Intelligence and Minister
  for Malign Cyber Activities
url: https://home.treasury.gov/news/press-releases/jy0941
archive_url: https://web.archive.org/web/2022*/https://home.treasury.gov/news/press-releases/jy0941
published_on: 2022-09-09
retrieved_on: 2026-05-25
tier: primary
notes: |
  Designates MOIS and Minister Esmail Khatib for the July 2022
  destructive attack on the Government of Albania attributed to
  the HomeLand Justice persona. Press release explicitly cites
  the MEK presence in Albania as Iran's motive — attesting both
  the service attribution (HomeLand Justice → MOIS) and the
  strategic motive (regime-preservation against MEK).
