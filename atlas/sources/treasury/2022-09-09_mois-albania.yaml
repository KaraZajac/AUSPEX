notes: |
  Designates MOIS and Minister Esmail Khatib for the July 2022
  destructive attack on the Government of Albania. Attests the
  service attribution (the operation → MOIS).
  CORRECTION (2026-07-10, claude-opus-4.8/max): the prior note's two
  claims — that Treasury "attributed [the attack] to the HomeLand Justice
  persona" and "explicitly cites the MEK presence in Albania as Iran's
  motive" — are BOTH FALSE against the raw and were removed. The jy0941
  release contains ZERO occurrences of "HomeLand Justice" (the persona
  name comes from CISA AA22-264A / Microsoft MSTIC, not Treasury) and
  ZERO occurrences of "MEK"/"Mujahedin"/"Mojahedin" (the MEK/anti-dissident
  motive is carried by CISA + MSTIC, not Treasury). Treasury attributes
  only at the MOIS-service level and states the disruption + document
  leak without naming the persona or the MEK motive.
  AUDIT (2026-06-24, claude-opus-4.8/max): names the MOIS specifically —
  not merely "Iranian government." OFAC "is designating Iran's Ministry of
  Intelligence and Security (MOIS) and its Minister of Intelligence for
  engaging in cyber-enabled activities." Ties MOIS directly to Albania /
  HomeLand Justice: "In July 2022, cyber threat actors assessed to be
  sponsored by the Government of Iran and MOIS disrupted Albanian government
  computer systems"; "In addition to conducting malicious cyber activity
  that affected Albanian government websites, MOIS cyber actors were also
  responsible for the leaking of documents purported to be from the Albanian
  government." Sole cited source on the actor that names a service; basis for
  KEEP at ir/mois (named-actor level). Re-fetched live (HTTP 200); snapshot
  hashed above.
