notes: |
  Treasury SDN designation of Kimsuky as a DPRK government cyber
  actor responsible for stealing strategic intelligence. ROK MOFA
  imposed counterpart sanctions contemporaneously.
  URL corrected 2026-05-26: previously cited jy1924 was the
  2023 APEC Finance Ministers readout. Verified jy1938 page
  title: "Treasury Targets DPRK's International Agents and
  Illicit Cyber Intrusion Group" (published 2023-11-30).
  AUDIT (2026-06-24, claude-opus-4.8/max): kp/rgb/kimsuky service placement
  VERIFIED against this source (raw re-captured via curl, HTTP 200; jy1938).
  OFAC names the RGB (Reconnaissance General Bureau) specifically as Kimsuky's
  parent service — not merely "North Korean"/"DPRK": "Active since 2012, Kimsuky
  is subordinate to the UN- and U.S. designated Reconnaissance General Bureau
  (RGB), the DPRK's primary foreign intelligence service." Also: "OFAC sanctioned
  cyber espionage group Kimsuky for gathering intelligence to support the DPRK's
  strategic objectives." Equates Kimsuky to APT43/Emerald Sleet/Velvet Chollima/
  TA406/Black Banshee. Service named at the named-unit level; KEEP kp/rgb/kimsuky.
