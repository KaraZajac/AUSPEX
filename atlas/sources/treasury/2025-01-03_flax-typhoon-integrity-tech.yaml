notes: |
  OFAC SDN designation of Beijing-based Integrity Technology Group
  Inc. as the operating entity behind Flax Typhoon. First PRC
  critical-infrastructure operator whose contractor was sanctioned
  by name. Cites Raptor Train botnet (260,000+ IoT/SOHO devices).
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw (sha256 above).
  On the SERVICE question for actor cn/flax-typhoon — this release names
  China and "state-sponsored" but NOT the MSS. Verbatim: "These incidents
  have been publicly attributed to Flax Typhoon, a Chinese malicious
  state-sponsored cyber group that has been active since at least 2021";
  "Flax Typhoon is a state-sponsored Chinese malicious cyber group..." No
  occurrence of "Ministry of State Security"/"MSS"/"state security" in the
  release; the only named entity is the contractor Integrity Tech. Used to
  demote cn/mss/flax-typhoon → cn/unscoped/flax-typhoon (no MSS sourced).
