notes: |
  OFAC SDN designation of Beijing-based Integrity Technology Group
  Inc. as the operating entity behind Flax Typhoon. First PRC
  critical-infrastructure operator whose contractor was sanctioned
  by name. Cites Raptor Train botnet (260,000+ IoT/SOHO devices).
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw (sha256 above).
  On the SERVICE question for actor cn/flax-typhoon — this release names
  China and "state-sponsored" but NOT the MSS. Verbatim: "These incidents
  have been publicly attributed to Flax Typhoon, a Chinese malicious
  state-sponsored cyber group that has been active since at least 2021";
  "Flax Typhoon is a state-sponsored Chinese malicious cyber group..." No
  occurrence of "Ministry of State Security"/"MSS"/"state security" in the
  release; the only named entity is the contractor Integrity Tech. Used to
  demote cn/mss/flax-typhoon → cn/unscoped/flax-typhoon (no MSS sourced).
  AUDIT (2026-07-05, claude-opus-4.8/max): raw sha256 re-verified (unchanged).
  Now also cited on event 2024-09/flax-typhoon-raptor-train-takedown to carry
  "Integrity Technology Group, Incorporated (Integrity Tech), a Beijing-based
  cybersecurity company" and the 2025-01-03 OFAC designation. (Its verbatim
  text names Integrity Tech + Flax Typhoon but does NOT contain the strings
  "Raptor Train" or "260,000"; the earlier note's parenthetical to that effect
  is context, not a quote.)
  AUDIT (2026-07-05, claude-opus-4.8/max): this record is the SOLE source of
  event 2025-01/ofac-flax-typhoon-integrity-tech (the OFAC designation event),
  audited same day. Normalized full-text membership test on the snapshot
  confirms the release contains NO "botnet", "Raptor Train", device count
  ("260,000"/"200,000"), "SOHO"/"IoT"/"Mirai", dollar figure/monetary penalty,
  or named individual officer — it is a company-only SDN listing. Verbatim
  authority: designation "pursuant to Executive Order (E.O.) 13694, as amended
  by E.O. 13757"; cites the 2024-09-18 FBI/CNMF/NSA/Five-Eyes joint advisory.
  Used to strip the botnet/Raptor-Train framing from that event's prose (that
  framing is the sibling takedown event's, sourced to FBI/CISA/Lumen).
