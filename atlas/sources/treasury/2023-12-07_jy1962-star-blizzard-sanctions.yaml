notes: |
  OFAC press release jy1962 — the US half of the joint US+UK 7 Dec 2023
  Star Blizzard counter-action. Added 2026-07-10 (claude-opus-4.8/max)
  to carry the OFAC SDN designation, which was asserted in the event
  prose but previously UNSOURCED (only DOJ + CISA were cited).
  RAW facts (verbatim): "OFAC, in coordination with the United Kingdom,
  designated two individuals associated with an advanced persistent
  threat (APT) group that is sponsored by the Russian Federal Security
  Service (FSB)"; the designees are "Ruslan Aleksandrovich Peretyatko
  (Peretyatko), an FSB officer, and Andrey Stanislavovich Korinets
  (Korinets), an IT worker in Syktyvkar, Russia"; "Between at least
  2016 and 2020, Korinets fraudulently created and registered malicious
  domain infrastructure ... created at least 39 domains through 5
  different domain registrars"; designated "pursuant to E.O. 13694, as
  amended by E.O. 13757". ATTRIBUTION-LEVEL NOTE: Treasury attributes
  to "A unit within the FSB" and lists the private-sector monikers
  ("Callisto"/"Star Blizzard"/"Coldriver"/"Seaborgium"/etc.) but does
  NOT name "Centre 18" (that specificity is carried by the DOJ
  indictment + the CISA/NCSC advisory + the UK FCDO release). Snapshot
  captured clean from live home.treasury.gov (no bot wall; 127,745 B).
  Used on 2023-12/star-blizzard-fsb-indictment-sanctions.
