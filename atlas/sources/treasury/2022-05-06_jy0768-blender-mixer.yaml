publisher: US Department of the Treasury (OFAC)
title: |
  U.S. Treasury Issues First-Ever Sanctions on a Virtual Currency
  Mixer, Targets DPRK Cyber Threats (jy0768)
url: https://home.treasury.gov/news/press-releases/jy0768
archive_url: "https://web.archive.org/web/20260529070643/https://home.treasury.gov/news/press-releases/jy0768"
published_on: 2022-05-06
retrieved_on: 2026-05-27
tier: primary
notes: |
  First-ever OFAC sanction of a virtual-currency mixer. Designated
  Blender.io for processing approximately USD 20.5M of the
  Lazarus Group's Ronin Bridge proceeds. Established the
  laundering-infrastructure-as-target playbook subsequently
  reused against Tornado Cash (Aug 2022) and Sinbad (Nov 2023).
  Standard WMD-financing attestation language.
