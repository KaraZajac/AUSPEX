notes: |
  OFAC SDN designation of Dmitry Yuryevich Khoroshev ("LockBitSupp")
  paired with the DOJ unsealed indictment and UK NCA / FCDO
  designation on the same date.

  AUDIT (2026-06-24, claude-opus-4.8/max): LOAD-BEARING state-nexus source for the
  ru/proxies/lockbit placement. This OFAC release explicitly documents Russia's
  SAFE-HARBOR / non-prosecution tolerance of LockBit BY NAME — the first qualifying
  criterion in the SCHEMA "Actor placement rule" for <state>/proxies/. Verbatim:
  "Russia, where groups such as LockBit are free to launch ransomware attacks against
  the United States, and its allies and partners, continues to offer safe harbor for
  cybercriminals. The United States has previously stressed that Russia must take
  concrete steps to prevent cyber criminals from freely operating in its jurisdiction."
  Also: "the United States designated Dmitry Yuryevich Khoroshev, a Russian national and
  a leader of the Russia-based LockBit group" and "The Russia-based LockBit ransomware
  group is one of the most active ransomware groups in the world." NB the nexus is
  TOLERANCE/HARBOR, not organ-tasking — no FSB/GRU/SVR named (the 4 "intelligence"
  tokens on the page are Treasury-bureau boilerplate: "Terrorism and Financial
  Intelligence" / "Artificial Intelligence"). This is the document that keeps LockBit in
  ru/proxies/ rather than demoting it to criminal/ (contrast emotet, whose sole source
  named no state harbor). raw_snapshot = curl 2026-06-24 (HTTP 200).
