title: |
  Treasury Sanctions DPRK Bankers and Institutions Involved in
  Laundering Cybercrime Proceeds and IT Worker Funds (SB0302)
url: https://home.treasury.gov/news/press-releases/sb0302
archive_url: "https://web.archive.org/web/20260529071714/https://home.treasury.gov/news/press-releases/sb0302"
published_on: 2025-11-04
retrieved_on: 2026-05-26
tier: primary
notes: |
  Eight individuals and two entities designated, including
  Vladivostok-based DPRK bankers Jang Kuk Chol and Ho Jong Son
  (managing USD 5.3M crypto linked to a DPRK ransomware actor
  and IT-worker revenue) and Jong Sung Hyok of the DPRK FTB.
