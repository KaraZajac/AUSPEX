notes: |
  OFAC SDN designation (jy1435) of THREE individuals: Wu Huihui
  (PRC-based OTC trader) and Cheng Hung Man (Hong-Kong-based OTC
  trader) under E.O. 13722 for material support to the Lazarus
  Group / to Wu, and Sim Hyon Sop (KKBC Deputy Representative
  relocated to Dandong, PRC; KKBC is a subsidiary of the DPRK
  Foreign Trade Bank) under E.O. 13382. Names the RGB as
  controlling Lazarus; standard WMD/ballistic-missile financing
  attestation language. Companion to the same-day DOJ USAO-DC
  unsealing of the District of Columbia indictments (returned
  Apr 18, 2023) — NB: NO EDNY; the earlier "DC and EDNY / four
  facilitators / Sun Jin" framing was an unsourced defect
  corrected in the audit (AUDIT 2026-07-10).
