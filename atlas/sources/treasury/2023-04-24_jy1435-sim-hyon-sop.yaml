notes: |
  OFAC SDN designations of Sim Hyon Sop (DPRK Foreign Trade
  Bank representative based in PRC) and three other facilitators
  for laundering virtual-currency proceeds of DPRK IT-worker
  fraud and cyber theft. Companion to the same-day DOJ unsealing
  of indictments against Sim Hyon Sop in DC and EDNY. Standard
  WMD-financing attestation language.
