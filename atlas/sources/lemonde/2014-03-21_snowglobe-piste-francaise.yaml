notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): UNFETCHABLE for raw capture in this
  environment — the live lemonde.fr URL returns HTTP 402 (paywall "Accès restreint"
  stub, no article body) and web.archive.org is blocked, so no raw_snapshot/sha.
  The originating report nonetheless attributes only at the generic level: as the
  CSEC slide it relayed (quoted verbatim by G Data, 2015-02-18) puts it, SNOWGLOBE
  was assessed "put forth by a French intelligence agency"; the article's own title
  is "la piste française du cyberespionnage." It traces Snowglobe to "French
  intelligence" / the "French trail," NOT to the DGSE by name. Did not support the
  specific-service placement; actor demoted fr/dgse/animal-farm → fr/unscoped/animal-farm.
  AUDIT (2026-06-24, claude-opus-4.8/max): re-checked as the primary cited source of the
  fr/dgse/snowglobe-actor service-placement audit (this source is the originating Snowglobe
  attribution). Still UNFETCHABLE — live lemonde.fr URL re-confirmed HTTP 402 ("Accès
  restreint" paywall stub) this session, web.archive.org still blocked, so no raw_snapshot/sha.
  Same finding: attributes only generically ("a French intelligence agency" per the CSEC slide
  it relayed; title "la piste française"), never names the DGSE. Contributed to demoting
  fr/dgse/snowglobe-actor → fr/unscoped/snowglobe-actor.
  Le Monde's report drawing on Communications Security Establishment
  Canada (CSEC, now CSE) slides leaked by Edward Snowden in which
  CSEC analysts traced a cyber-espionage operation codenamed
  Snowglobe to French intelligence. The article is the first
  mainstream-press public framing of Animal Farm tooling
  (specifically the Snowglobe / Babar precursor) as French-state
  in origin. Subsequent vendor reverse-engineering by ESET (Casper
  March 2015), G Data (Babar February 2015), Cyphort (Babar
  February 2015), and Kaspersky (Animals in the APT Farm March 2015)
  corroborated the Snowglobe → Animal Farm linkage technically.
  Url verified.
