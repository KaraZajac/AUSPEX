  AUDIT (2026-07-10, claude-opus-4.8/max): the live urls now link-rot — the
  /storage/*.pdf returns HTTP 404 and the article-form page
  https://threatmon.io/apt-sidecopy-targeting-indian-government-entities/
  also 404s. Report PRESERVED via archive.org: the PDF was captured HTTP 200
  (application/pdf, 13 pages, 1,061,757 bytes) and hashed
  (sha256 29e12d9e…f661f6ea); the article-form page's earliest Wayback
  capture is 20230216204448 (2023-02-16 20:44 UTC), which fixes the
  publication date at on-or-before 2023-02-16. Snapshot keyword census
  (pdftotext): "SideCopy" 21x, "ReverseRAT" 7x, "government" 16x,
  "Pakistan" 2x, "Cyber Advisory" 1x; "ActionRAT"/"Action RAT" 0x,
  "AllaKore" 0x, "DRDO" 0x, "Defence"/"Defense" 0x, "Transparent Tribe"/
  "APT36" 0x. Verbatim (Executive Summary): "SideCopy, a Pakistani threat
  group, targeted Indian Government Entities using a spear-phishing email
  containing a macro-enabled Word document. If the recipient opens the
  document and enables macros, it triggers the execution of malicious code,
  allowing SideCopy to gain initial access. The malware used is a new
  version of ReverseRAT, which has enhanced obfuscation and sleep calls to
  avoid detection. Once ReverseRAT gains persistence, it enumerates the
  victim's device, collects data, encrypts it using RC4, and sends it to the
  Command and Control (C2) server." Also: "SideCopy is a Pakistani threat
  group that has primarily targeted South Asian" nations; lure file named
  "Cyber Advisory 2023.docm". The primary names NO Pakistani intelligence
  service (no "ISI") and does NOT name Transparent Tribe/APT36 in-body — the
  TT overlap is carried only by the secondary coverage (The Hacker News,
  Heimdal). Consistent with the pk/unscoped/sidecopy carriage.
