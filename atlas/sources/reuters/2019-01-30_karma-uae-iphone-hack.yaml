notes: |
  Companion piece to the Project Raven main investigation: details
  on the "Karma" iOS zero-click toolkit acquired and operationalized
  by DarkMatter, deployed against Qatari royal-family members,
  regional political figures, and dissidents in the 2016–2017
  window before iOS patching closed the underlying primitives.
  Reuters URL is canonical-known but environment-unverifiable
  (CAPTCHA-block from curl).

  AUDIT (2026-06-24, claude-opus-4.8/max): used as the primary attribution source in the
  ae/darkmatter/karma-operators service-placement audit — VERDICT KEEP. The article's live
  Reuters URL DataDome-CAPTCHA-blocks curl (771-byte interstitial) and WebFetch is blocked for
  www.reuters.com, but a full-text web.archive.org capture of the syndicated copy
  (idINKCN1PO1AN, 2022-02-20) was retrieved via the wayback `id_` raw endpoint and snapshotted
  (367,462 bytes; sha256 above). It NAMES DarkMatter as the operator/host, in its own words:
  "intelligence community veterans, who were paid through an Emirati cyber security firm named
  DarkMatter, according to documents reviewed by Reuters" and "Karma was used by an offensive
  cyber operations unit in Abu Dhabi comprised of Emirati security officials and former American
  intelligence operatives working as contractors for the UAE's intelligence services," with the
  unit "code named Project Raven." Provenance of the tool: "The UAE government purchased Karma
  from a vendor outside the country, the operatives said" (corroborating the not-NSO framing).
  Keyword census of the captured raw: DarkMatter 4× (one repeated sentence), Project Raven 8×,
  Karma 152×, United Arab Emirates 32×, NSO 17×, iPhone 86×, Qatar 23×; CyberPoint 0× (the
  CyberPoint→DarkMatter contractor transition lives in the separate Project Raven main article,
  reuters/2019-01-30_project-raven, not this companion piece).

