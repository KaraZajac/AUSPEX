notes: |
  Reuters exclusive (companion to Citizen Lab's Dark Basin disclosure)
  identifying BellTroX InfoTech Services in Delhi as the operator
  behind years of hack-for-hire campaigns against journalists,
  short-sellers, lawyers, and government officials worldwide.
  SNAPSHOT (2026-07-10, claude-opus-4.8/max): live reuters.com curl
  returns HTTP 401 (bot-walled, 771-byte wall). Snapshot is the
  Wayback capture (archive_url, 382,340 bytes, sha256 1e0bdc67…) which
  carries the full genuine article text. Verbatim key claims verified:
  "A little-known Indian IT firm offered its hacking services to help
  clients spy on more than 10,000 email accounts over a period of
  seven years"; "New Delhi-based BellTroX InfoTech Services targeted
  government officials in Europe, gambling tycoons in the Bahamas, and
  well-known investors in the United States including private equity
  giant KKR and short seller Muddy Waters"; "Reuters does not know the
  identity of BellTroX's clients"; owner Sumit Gupta "declined to
  disclose who had hired him and denied any wrongdoing." (Byline:
  Raphael Satter, Christopher Bing, Jack Stubbs.)
