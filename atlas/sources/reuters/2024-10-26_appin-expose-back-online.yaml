notes: |
  Reuters' own wire story on the restoration. reuters.com is
  bot-walled (HTTP 401) and the canonical reuters.com URL for this
  wire item could not be verified without fabrication, so the URL
  given is the Yahoo News syndication, which carries the wire text
  verbatim (byline "(Reuters)", "Editing by Mike Williams"); The
  Business Standard and The Star (dated 2024/10/26) syndicate the
  same item. Key text: "Reuters News has restored to its website an
  investigation into mercenary hacking after a New Delhi court
  lifted a takedown order it issued last year"; "Prior to
  publication, a group calling itself the Association of Appin
  Training Centers filed suit in a New Delhi district court to
  prevent the report from running. In court filings, the
  association claimed it was the successor to Appin's network of
  educational franchises in India"; "Reuters removed the published
  report from its website while it appealed that takedown order. On
  Oct. 3, 2024, the same court vacated the injunction, noting that
  'as yet, the plaintiff has not been able to show any prima facie
  case to make interference in the process of journalism.' The
  lawsuit remains pending."
