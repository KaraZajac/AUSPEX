notes: |
  State Bank of Vietnam (SBV) follow-up to the 2016-05-15 TPBank
  disclosure — a Reuters interview with Le Manh Hung, head of the
  SBV Information Technology Department. Cited by event
  2015-12/tien-phong-bank-swift for the details TPBank's own
  statement omitted. Captured 2026-07-10 from the syndicated Reuters
  wire copy on yahoo.com (HTTP 200, full article body intact); the
  raw_snapshot sha256 is above. Load-bearing verbatim quotes:
  "Vietnam's central bank said on Tuesday a failed hacking attempt on
  Tien Phong Bank (TPBank) using the SWIFT messaging system sought to
  fraudulently transfer 1.2 million euros ($1.36 million) to a
  Slovenian bank late last year in one transaction. The thwarted
  transfer on Dec. 8 was the only hack attempt via SWIFT detected by
  TPBank… Interpol was immediately informed of the Dec. 8 attack…
  A third-party vendor that TPBank had used to connect to the SWIFT
  money transfer system was possibly infected with malware and its
  servers were based in Singapore… he did not know the identity of
  the vendor." This is the source of record for the Slovenia
  destination, the EUR1.2M/$1.36M figure, the 8-December-2015 date,
  and the Singapore-based vendor servers.
