notes: |
  Reuters exclusive (byline Jack Stubbs, Christopher Bing, Joseph Menn) identifying the
  Sea Turtle DNS-hijacking campaign's Cyprus/Greece/Iraq government victims and the
  Turkish-interest attribution. The canonical reuters.com URL is BOT-WALLED (curl -> HTTP
  401, 771-byte reuters.com stub, no article body, no hashable content); the raw_snapshot
  and content_sha256 therefore capture the VERBATIM Reuters wire as syndicated by Arab News
  (archive_url https://www.arabnews.com/node/1618856/media, HTTP 200, 99,867 bytes, byline
  "Reuters", datePublished 2020-01-27T10:58:03) — same wire copy, reachable and hash-pinned.
  Load-bearing quotes carried (verbatim from the snapshot):
    • "The hackers have attacked at least 30 organizations, including government ministries,
      embassies and security services as well as companies and other groups, according to a
      Reuters review of public Internet records."
    • "Victims have included Cypriot and Greek government email services and the Iraqi
      government's national security adviser, the records show."
    • "The Cypriot, Greek and Iraqi attacks identified by Reuters all occurred in late 2018
      or early 2019, according to the public Internet records."
    • "The hackers used a technique known as DNS hijacking ... This involves tampering with
      the effective address book of the Internet, called the Domain Name System (DNS) ..."
    • "According to two British officials and one US official, the activity bears the
      hallmarks of a state-backed cyber espionage operation conducted to advance Turkish
      interests."
    • "The Cypriot government said in a statement that the 'relevant agencies were
      immediately aware of the attacks and moved to contain' them."
  NB: the report names "Cypriot ... government email services" and "government ministries"
  generically — it does NOT name a Cyprus ministry of foreign affairs specifically, and does
  NOT state that the Cyprus (.cy / .net.cy) ccTLD registry/operator itself was compromised.
  Attribution is hedged ("acting in Turkey's interests" / "advance Turkish interests" per
  three Western officials), not a firm Turkish-government/service attribution.
