notes: |
  The Reuters Project Raven investigation: ex-NSA personnel
  recruited via CyberPoint and then DarkMatter to run offensive
  cyber operations for the UAE government against dissidents,
  journalists, foreign officials, and (per internal-operator
  concerns documented in the piece) US persons. Canonical anchor
  of the UAE procurement-led-capability doctrine entry.

  URL is the canonical Reuters investigative URL widely cited in
  academic literature; environmental verification via curl
  returns CAPTCHA-block (Reuters anti-bot), URL itself confirmed
  via parallel cross-references including Wikipedia, DOJ September
  2021 DPA materials referencing the Reuters disclosure, and
  Mozilla 2019 distrust-of-DarkMatter blog post.

  AUDIT (2026-06-24, claude-opus-4.8/max): used in the Beacon Red operator-cluster audit
