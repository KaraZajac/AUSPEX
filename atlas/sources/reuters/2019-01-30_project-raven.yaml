  Raven contractors as CyberPoint then DarkMatter and does NOT name "Beacon Red" — it predates
  the post-Raven Beacon-Red framing and therefore cannot support a Beacon-Red operator placement.
  Raw capture unfetchable: live URL returns a DataDome CAPTCHA interstitial (771 bytes, host
