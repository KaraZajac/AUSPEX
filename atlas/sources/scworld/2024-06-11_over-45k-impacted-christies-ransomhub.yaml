  2024-06-11T10:51:15-04:00). Verbatim from the snapshot:
   - "UK-based auction house Christie's had information from 45,798 individuals
     stolen following a RansomHub ransomware attack last month, which is
     significantly lower than the more than 500,000 claimed by the ransomware
     gang to have been affected by the incident, The Register reports."
   - "Infiltration of Christie's systems between May 8 and May 9 enabled the
     exfiltration of some stored data, none of which has been so far misused by
     attackers".
