notes: |
  Carries the ~USD 52M class-action settlement total and its components.
  Key quotes (raw snapshot sha 1732ef4c…b4039de6, 103,113 bytes):
  "Seattle-based Fred Hutchinson Cancer Center has agreed to an almost
  $52.5 million settlement to resolve a class action lawsuit regarding a
  Hunters International ransomware attack in November 2023, which was
  reported to have impacted 800,000 patients, reports The Register";
  class members "will receive not only $25.5 million for insurance and
  medical fraud monitoring but also $11.5 million in cash, while almost
  $13.5 million will be allocated toward infrastructure security
  enhancements." So the "~$52.5M" total = $25.5M fraud/medical-monitoring
  + $11.5M cash to the class + ~$13.5M security infrastructure; some
  other coverage (and the HIPAA Journal settlement headline) foregrounds
  only the $11.5M CASH component, which is why "$11.5M" and "$52M" both
  circulate for the same settlement. Names Hunters International; no
  Citrix Bleed / initial-access vector stated.

