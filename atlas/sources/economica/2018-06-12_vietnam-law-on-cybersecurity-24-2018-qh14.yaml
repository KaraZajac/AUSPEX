notes: |
  Full-text unofficial English translation of Vietnam's Law on
  Cybersecurity, No. 24/2018/QH14 (33 pp.), hosted by Economica
  Vietnam. Header: "No: 24/2018/QH14 / Hanoi, June 12, 2018 / LAW /
  ON CYBERSECURITY", signed by Chairwoman of the National Assembly
  Nguyen Thi Kim Ngan.
  AUDIT (2026-07-10, claude-opus-4.8/max): PRIMARY law-text anchor
  added to re-source event 2019-01/vietnam-cybersecurity-law-effective
  (its prior post-passage source eff/2019-01-01_... has a dead URL).
  Verbatim load-bearing quotes:
  - Passage/effect: Art. 43 "This Law is of full force and effect as
    from 1 January 2019." Closing clause: "This Law was passed by
    Legislature XIV of the National Assembly ... at the 5th session
    on 12 June 2018."
  - Scope/terms: Art. 1 "This Law regulates activities of protecting
    national security and ensuring social order and safety in
    cyberspace ...".
  - Art. 8 "Conduct which is strictly prohibited" incl. (b)
    "Organizing, activating, colluding, instigating, bribing,
    cheating or tricking, manipulating, training or drilling people
    to oppose the State of the Socialist Republic of Vietnam"; (c)
    "Distorting history, denying revolutionary achievements,
    destroying the national solidarity block ...".
  - Art. 26.2(a) duty "to provide user information to the
    Cybersecurity Task Force under the Ministry of Public Security
    when so requested in writing"; 26.2(b) delete prohibited content
    "no later than twenty four (24) hours after the time of a request
    from the CTF under the Ministry of Public Security or from a
    competent agency under the Ministry of Information and
    Communications"; 26.3 data localization "must store such data in
    Vietnam for a [specified] period" and "Foreign enterprises
    referred to in this clause must have branches or representative
    offices in Vietnam."
