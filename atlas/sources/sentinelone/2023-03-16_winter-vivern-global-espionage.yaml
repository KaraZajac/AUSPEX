notes: |
  SentinelLabs disclosure of the Winter Vivern (TA473 / TAG-70 /
  UAC-0114) cluster — Russia-aligned actor primarily targeting
  Ukrainian, Polish, Italian, and Indian government and UK / EU
  parliamentary infrastructure with credential-phish and CVE
  exploitation (notably Zimbra / Roundcube webmail XSS chains).
  AUSPEX uses this profile to anchor the post-invasion Winter
  Vivern campaign tracked into 2024.

  AUDIT (2026-07-02, claude-fable-5/max): raw captured + hashed (sha256
  96b7e199…36531a04, 333,565 bytes); URL resolves to the real article (title "Winter Vivern |
  Uncovering a Wave of Global Espionage", byline Tom Hegel, 16 March 2023) — NOT a phantom.
  CORRECTION to the note above: this article does NOT mention UK/EU parliamentary infrastructure,
  Zimbra, Roundcube, any CVE, webmail, XSS, "defense", 2024, or Recorded Future/TAG-70 (verbatim
  keyword scan over the full article = zero hits); those claims belong to Proofpoint (TA473 /
  Zimbra CVE-2022-27926), ESET (Roundcube CVE-2023-5631, Oct 2023) and Recorded Future (TAG-70,
  2024) reporting, not this source. What it DOES support (verbatim): "Winter Vivern's activities
  are closely aligned with global objectives that support the interests of Belarus and Russia's
  governments"; "operates with pro-Russian objectives"; targets = "Polish government agencies,
  the Ukraine Ministry of Foreign Affairs, the Italy Ministry of Foreign Affairs, and individuals
  within the Indian government" and, since 2021, "Lithuania, India, Vatican, and Slovakia" plus
  "a private telecommunication organization" supporting Ukraine; TTPs = credential-phish pages
  mimicking CBZC / Ukraine MFA / Ukraine SSU / email.gov.in, macro-enabled XLS (Hochu Zhit /
  "I Want to Live"), "fake virus scanner" batch loaders, and the APERETIF trojan on compromised
  WordPress. No intelligence service named. Consumed by the one event
  2023-03/winter-vivern-european-government-targeting (audited same day).
