notes: |
  SentinelLabs disclosure of AcidPour, an evolved embedded-Linux
  wiper variant of the AcidRain modem wiper used in the February
  2022 Viasat KA-SAT operation. Targets x86 Linux devices including
  RAID arrays, large-storage NAS, and embedded SCADA-adjacent
  appliances. Discovery context and victimology suggest Ukrainian
  Internet-service / telecommunications operator targeting. CERT-UA
  parallel disclosure attributed AcidPour to Sandworm (UAC-0165).

  AUDIT (2026-07-04, claude-opus-4-8/max): Raw captured + hashed
  (sha256 7206f8ce…bbb215c4, 345,571 bytes); URL live, title/body
  match the citation ("AcidPour | New Embedded Wiper Variant of
  AcidRain Appears in Ukraine", Guerrero-Saade & Hegel, 21 Mar 2024).
  tier=primary retained (first-party SentinelLabs vendor research).
  NB SentinelLabs writes "Eutelsat KA-SAT" and calls the "Viasat hack"
  label a misnomer. Key verbatim: "Our analysis confirms the connection
  between AcidRain and AcidPour, effectively connecting it to threat
  clusters previously publicly attributed to Russian military
  intelligence"; "CERT-UA confirmed our findings and publicly attributed
  the activity to UAC-0165, considered a subgroup of the outdated
  Sandworm APT"; "Specific targets of AcidPour have yet to be
  conclusively verified"; "we cannot confirm that AcidPour was used to
  disrupt these ISPs". The only "medium-confidence" qualifier is the
  historical AcidRain<->VPNFilter 'dstr' developmental tie, NOT the
  AcidPour attribution.
