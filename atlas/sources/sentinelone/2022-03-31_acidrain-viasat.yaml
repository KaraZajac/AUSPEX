notes: |
  SentinelLabs technical analysis of the AcidRain wiper used against
  Viasat KA-SAT modems on 24 February 2022.

  AUDIT (2026-07-10, claude-opus-4.8/max): raw HTML captured (HTTP 200,
  341 KB) and SHA-256 hashed. CORRECTION to the prior note ("Established
  the link to GRU/Sandworm tooling") — S1 did NOT establish that link;
  it is explicitly HEDGED. Verbatim: "We assess with medium-confidence
  that there are developmental similarities between AcidRain and a
  VPNFilter stage 3 destructive plugin"; and "While we cannot
  definitively tie AcidRain to VPNFilter (or the larger Sandworm threat
  cluster), we note a medium-confidence assessment of non-trivial
  developmental similarities." The code overlap is called "interesting
  (but inconclusive)." Technical facts carried verbatim: "ELF MIPS
  malware designed to wipe modems and routers"; iterates device files
  and "overwrites it with up to 0x40000 bytes of data or (in the case of
  the /dev/mtd* device file) uses the following IOCTLS to erase it:
  MEMGETINFO, MEMUNLOCK, MEMERASE, and MEMWRITEOOB"; then "the device is
  rebooted ... rendered inoperable." Spillover: "Spillover from this
  attack rendered 5,800 Enercon wind turbines in Germany unable to
  communicate for remote monitoring or control." Vector (quoting
  Viasat): attacker "exploited a misconfigured VPN appliance, gained
  access to the trust management segment of the KA-SAT network"; KA-SAT
  "administered by an Italian company called Skylogic." Military-C2 is
  SUSPICION only: "suspicions arose that an attempt to take out Ukrainian
  military command-and-control capabilities ... spilled over to affect
  German critical infrastructure." Phrase "tens of thousands" does NOT
  appear here (carried by Viasat's overview).
