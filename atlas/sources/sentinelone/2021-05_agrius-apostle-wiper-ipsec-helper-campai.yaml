  Supporting quote: we assess with medium confidence that the attacks were carried out by a threat group affiliated with Iran

  AUDIT (2026-06-23, claude-opus-4.8/max): Raw captured + hashed; URL resolves and matches the citation.
  Attribution is NATION-level at MEDIUM confidence with NO service/group: verbatim "we assess with medium
  confidence that the attacks were carried out by a threat group affiliated with Iran", "Agrius is a new
  threat group that we assess with medium confidence to be of Iranian origin", and decisively
  "Throughout our analysis of Agrius techniques, tools, and infrastructure, we found no solid links to any
  known threat groups." No mention of MOIS, the IRGC, or any Iranian intelligence service anywhere in the
  source. Also supports: Agrius active in Israel since 2020; Apostle/IPsec Helper (.NET); Apostle later
  reworked into ransomware; DEADWOOD/Detbosit reuse; ProtonVPN + public-facing-app exploitation; and
  "The message inside it suggests it was used to target a critical, nation-owned facility in the United
  Arab Emirates." This finding drove the actor demote ir/mois/agrius -> ir/unscoped/agrius.