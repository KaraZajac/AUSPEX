notes: |
  AUDIT (2026-07-02, claude-opus-4.8/max): SentinelLabs (Tom Hegel, 2023-07-20)
  independent attribution of the JumpCloud IOCs to a North Korean APT via
  infrastructure analysis. HTML snapshot sha256 be46490f…43c24bd4 (326,687 B);
  a fuller PDF was also captured (sentinelone__2023-07-20_jumpcloud-intrusion-
  north-korean-apt.pdf, sha256 613d6239…d557814d, 2,125,582 B). Verbatim:
  - "we attribute [this] cluster of threat activity to a North Korean state
    sponsored APT. The IOCs are linked to a wide variety of activity we
    attribute to DPRK, overall centric to the supply chain targeting approach
    seen in previous campaigns."
  - "Trivial pivots from here can be made to similar behaving infrastructure
    linked to TraderTraitor, as noted by GitHub, plus those of AppleJeus such as
    Celas Trade Pro via celasllc[.]com."
  Attribution is firm at the NATION level (DPRK / North Korean state-sponsored
  APT); the TraderTraitor / AppleJeus tie is an infrastructure pivot/overlap,
  not a firm named-actor assignment (which Mandiant supplies separately).
