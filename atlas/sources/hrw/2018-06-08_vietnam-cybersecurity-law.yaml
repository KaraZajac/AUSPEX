notes: |
  HRW analysis of Vietnam's draft Cyber Security Law (later enacted
  as Law 24/2018/QH14), focused on its data-localization,
  content-takedown, and surveillance provisions.
  AUDIT (2026-07-10, claude-opus-4.8/max): published_on corrected
  2018-06-08 -> 2018-06-07 (page byline "June 7, 2018 10:00PM EDT";
  URL slug /2018/06/07/); title corrected to HRW's exact "Cyber
  Security Law" (was "Cybersecurity Law"). NB THIS IS A PRE-PASSAGE
  DRAFT-STAGE SOURCE: HRW writes "Vietnam's National Assembly is
  scheduled to vote on the draft of this highly criticized law on
  June 12, 2018." It carries verbatim: the draft was "drafted by the
  country's Ministry of Public Security"; Article 26 platform duties
  incl. "provide user information to the specialized task force for
  cyber security protection under the Ministry of Public Security",
  content deletion "within 24 hours of receiving a request" from the
  Ministry of Information and Communications or Ministry of Public
  Security, data localization ("store in Vietnam individual
  information from service users in Vietnam"), and "establish
  headquarters or representative offices in Vietnam" (Article 26);
  Article 8 content-prohibitions ("oppose the State of the Socialist
  Republic of Vietnam", "distort history, deny revolutionary
  achievements, [or] undermine national solidarity"). Does NOT carry
  the enacted law number, the 12 June 2018 passage confirmation, or
  the 1 January 2019 effective date (those re-sourced to the law text
  economica/2018-06-12_... and IISS). sha256 is of the captured live
  snapshot (HTTP 200, full article present).
