  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured (288,914 bytes, sha256
  0ec26b0d…62d20826) and audited for event 2024-06/unit42-beavertail-invisibleferret-disclosure.
  Real publication date is 2023-11-21 (was recorded 2024-06-13 — corrected published_on above).
  Verbatim: "We attribute with moderate confidence that Contagious Interview is run by a North
  Korea state-sponsored threat actor" (tracked CL-STA-0240); "we assess with high confidence that
  Wagemole can be attributed to a North Korea-sponsored APT, which we track as CL-STA-0241".
  "BeaverTail is JavaScript-based malware hidden inside Node Package Manager (NPM) packages.
  InvisibleFerret is a simple but powerful Python-based backdoor." Contagious Interview infra
  "established as early as December 2022" (first samples "as early as March 2023"); Wagemole files
  "started as early as August 2022". The article names NO victim count and does NOT contain
  "TraderTraitor" / "APT38" / "BlueNoroff" (Lazarus appears only as an Operation Dream Job
  comparison).
  Unit 42 disclosure of two parallel DPRK campaigns:
  Contagious Interview (BeaverTail JavaScript downloader +
  InvisibleFerret Python backdoor delivered via fake
  job-interview Trojan to developers — TraderTraitor
  cluster) and Wagemole (IT-worker fraud-side, fake
  resumes / GitHub profiles to obtain remote employment).
  First clean Unit-42 documentation of the BeaverTail +
  InvisibleFerret combination subsequently observed in
  multiple 2024-2025 supply-chain operations including the
  npm registry compromises.
