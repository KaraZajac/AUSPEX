notes: |
  Unit 42 disclosure of two parallel DPRK campaigns:
  Contagious Interview (BeaverTail JavaScript downloader +
  InvisibleFerret Python backdoor delivered via fake
  job-interview Trojan to developers — TraderTraitor
  cluster) and Wagemole (IT-worker fraud-side, fake
  resumes / GitHub profiles to obtain remote employment).
  First clean Unit-42 documentation of the BeaverTail +
  InvisibleFerret combination subsequently observed in
  multiple 2024-2025 supply-chain operations including the
  npm registry compromises.
