notes: |
  Unit 42 disclosure of Iran-nexus Screening Serpens (UNC1549 / Smoke
  Sandstorm) espionage against aerospace, defense-manufacturing and
  telecommunications targets in the US, Israel and the UAE (plus two
  additional Middle-Eastern entities), mid-February through April 2026,
  timed to the regional conflict that began Feb 28 2026. RAT payloads
  across two families — MiniUpdate (four variants) and MiniJunk V2 —
  and a new AppDomainManager-hijacking technique that disables a .NET
  application's own security at initialization. URL curl-verified
  2026-06-08.
  AUDIT (2026-06-24, claude-opus-4.8/max): cited as the sole source for actor
  Screening Serpens' service placement. This source attributes only an
  "Iran-nexus advanced persistent threat (APT) group Screening Serpens (aka
  UNC1549, Smoke Sandstorm and Iranian Dream Job)" that is "an Iran-nexus APT
  group operating as a cyberespionage group aligned with Iranian intelligence
  objectives," assessed "with moderate-high confidence." It names NO Iranian
  service — a fixed-string sweep of the captured page returned zero hits for
  IRGC / Islamic Revolutionary Guard Corps / Revolutionary Guard / MOIS /
  Ministry of Intelligence / Quds / Pasdaran. Finding supported the demotion of
  the actor ir/irgc/screening-serpens → ir/unscoped/screening-serpens. Raw page
  captured 2026-06-24 (HTTP 200, 291,630 bytes).
