notes: |
  Unit 42 disclosure of new Kimsuky malware families: KLogEXE
  keylogger and FPSpy surveillance tool. South Korea targeting
  focus.
  AUDIT (2026-06-24, claude-opus-4.8/max): captured for the kp/rgb/kimsuky
  service-placement audit (raw via curl, HTTP 200). Attributes at the NATION
  level only and names NO DPRK service — "RGB"/"Reconnaissance General Bureau"
  are both absent: "The North Korean APT group Sparkling Pisces (aka Kimsuky,
  THALLIUM, Velvet Chollima) is known for its sophisticated cyberespionage
  operations." Does not itself support the RGB placement; corroborates the DPRK
  nation nexus and the Sparkling Pisces = Kimsuky = APT43 alias cluster.
