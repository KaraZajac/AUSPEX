notes: |
  Unit 42 analysis of Trigona ransomware operations — small but
  notably professionalized RaaS operation, later partially disrupted
  by Ukrainian Cyber Alliance defacement in October 2023.
  AUDIT (2026-06-24, claude-opus-4.8/max): supports the Trigona ru/proxies -> ru/unscoped DEMOTE — this
  source documents NO Russia-state nexus, only a profit-RaaS strain with a Russian-LANGUAGE/CIS footprint.
  It profiles Trigona "ransomware [as] a relatively new strain that security researchers first discovered in
  late October 2022" with tradecraft overlap to CryLock and ALPHV/BlackCat. The only "Russian" tokens are
  language/ecosystem artifacts, never a state relationship: "A user on SafeZone, a Russian anti-malware
  forum, seeking help for Crylock ransomware" and "Changing the default language of NetScan to Russian is an
  option that can be configured upon initial installation" (Cyrillic strings operators left on disk). No
  kremlin/fsb/gru/svr/state-sponsor/tasking/tolerate/safe-harbor/sanction predicate is applied to Trigona.
