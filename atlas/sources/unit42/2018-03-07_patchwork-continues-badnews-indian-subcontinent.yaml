notes: |
  Palo Alto Networks Unit 42 (authors Brandon Levene, Josh Grunzweig, Brittany Barbehenn)
  report on the continuation of Patchwork's BADNEWS campaign against the Indian
  subcontinent. CREATED 2026-06-27 (claude-opus-4.8/max) to RE-SOURCE event
  2017-11/patchwork-badnews-continuation off the phantom citation
  cisco-talos/2017-11_patchwork-badnews-continuation. Snapshot via curl 2026-06-27,
  HTTP 200, 271,345 bytes, sha256 7e9c4713...d0ff9f2e.
  Verbatim supporting quotes (from the raw snapshot):
  - Targets (LOAD-BEARING, Pakistani govt/military/nuclear): "The malicious documents seen
    in recent activity refer to a number of topics, including recent military promotions
    within the Pakistan Army, information related to the Pakistan Atomic Energy Commission,
    as well as Pakistan's Ministry of the Interior."
  - CVE chain (LOAD-BEARING): "malicious embedded EPS files targeting the CVE-2015-2545 and
    CVE-2017-0261 vulnerabilities." (NOT CVE-2012-0158 / CVE-2015-1641)
  - Initial vector + implant: "Patchwork threat actors utilized a pair of EPS exploits
    rolled into legitimate, albeit malicious, documents in order to propagate their updated
    BADNEWS payload."
  - Coverage window: recent activity "in the past few months" before 2018-03-07, with
    documents dated late January 2018 — i.e. the continuation of the through-2017 BADNEWS
    campaign.
  Named victims are exclusively Pakistani government/military/nuclear; NO Indian targets
  named; does NOT attribute Patchwork to India or any specific Indian state service.
