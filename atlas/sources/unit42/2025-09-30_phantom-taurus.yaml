notes: |
  Unit 42 elevates cluster CL-STA-0043 → temporary group TGR-STA-0043
  ("Operation Diplomatic Specter," May 2024) → named group "Phantom
  Taurus." Discloses the NET-STAR .NET suite targeting IIS (the fileless
  IIServerCore backdoor + AssemblyExecuter V1/V2 in-memory payload
  loaders) and describes the shift from Exchange/email collection to
  SQL Server database targeting via mssq.bat. Victims: MFAs, embassies,
  diplomats, telecoms across the Middle East / Africa / Asia.
  Attribution: China-nexus / PRC-state-aligned; NO Chinese service named.
  AUDIT (2026-07-10, claude-opus-4.8/max): cited primary for event
  2025-09/phantom-taurus-unit42-disclosure. URL curl-verified HTTP 200
  (255,460 bytes). Raw snapshot captured, sha256 above. Corrected this
  record's prior notes ("TGR-STA-00043" → TGR-STA-0043; "three .NET IIS
  web-shells" → three-component .NET suite). Fixed-string sweeps: APT15 =
  0, MSS/PLA/contractor = 0, "primary objective is espionage" present.
