notes: |
  CoinsPaid's own detailed post-mortem of the 22 July 2023 theft
  (byline "07.08.2023 Written by Max Krupyshev"; article:published_time
  2023-08-07T15:11:34+00:00). Snapshot captured 2026-07-10 from the live
  page (266,743 bytes, sha256 4851d9ee…ed0d58bb); HTTP 200, real report
  (title "The Coinspaid Hack Explained"), NOT a phantom.

  Load-bearing verbatim quotes carried:
  - date/vector: "After 6 months of failed attempts, the hackers managed
    to attack our infrastructure on July 22, 2023, successfully."
  - social engineering: "Recruiters from crypto companies contacted
    Coinspaid employees via LinkedIn and various Messengers, offering very
    high salaries"; "One of our employees responded to a job offer from
    Crypto.com"; "While participating in the interview, they received a
    test assignment that required the installation of an application with
    malicious code."
  - campaign length: "Lazarus … spent half a year trying to infiltrate
    the Coinspaid systems"; "In June-July 2023, a malicious campaign was
    carried out involving bribing and fake-hiring critical company
    personnel."
  - attribution (HEDGED): "Based on our internal investigation, we have
    reasons to suspect that the top-tier hacker group Lazarus may be
    behind the attack on Coinspaid." (self-attribution, medium confidence)
  - Lazarus/Atomic-Wallet overlap: "The same addresses were used to
    transfer stolen funds from the Atomic Wallet, giving us one more
    reason to believe that Lazarus may be responsible"; "Match System
    specialists discovered similar patterns that Lazarus previously used
    in their recent 100M USD Atomic Wallet hack."
  NB: the report does NOT state the ~$37M loss figure in its body (that
  amount is carried by the FBI PSA and Elliptic); it embeds Match Systems'
  investigation findings.
