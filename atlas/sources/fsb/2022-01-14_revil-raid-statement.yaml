notes: |
  FSB press release announcing raids on 25 addresses and the arrest
  of 14 alleged REvil members at the request of US authorities, just
  weeks before the Russian invasion of Ukraine and the subsequent
  collapse of US-RU law-enforcement cooperation. Canonical example
  of the brief 2021-22 cooperation window.
  AUDIT (2026-06-24, claude-opus-4.8/max): live fsb.ru URL fetched and
  captured (RU primary, 29 KB, sha256 recorded). Used for the ru/proxies/revil
  placement audit -> contributed to DEMOTION to ru/unscoped/revil. This source
  is the OPPOSITE of a state nexus: it documents the FSB *prosecuting* REvil AT
  US REQUEST, not tasking/directing/harboring it. Verbatim operative text:
  "Основанием для разыскных мероприятий послужило обращение компетентных
  органов США" ("The basis for the search measures was a request from the
  competent authorities of the United States"); REvil is framed solely as an
  "организованное преступное сообщество" (organized criminal group), its members
  charged under "ч. 2 ст. 187 'Неправомерный оборот средств платежей' УК России"
  (Criminal Code art. 187 — illegal circulation of means of payment, a FINANCIAL
  -crime article, NOT a state-security/treason one), acting "С целью реализации
  преступного замысла" (to carry out a criminal scheme) for theft of funds. The
  group is reported as dismantled and US authorities informed of the results
  ("Представители компетентных органов США о результатах проведенной операции
  проинформированы"). ZERO state-direction vocabulary (по заданию / по поручению
  / в интересах государства / куратор / покровительство / ГРУ / СВР); the only
  "спецслужб"/"государственн" tokens on the page are site-navigation boilerplate.
  Per the audit rule, these arrests are a law-enforcement action (at US request),
  NOT state tasking — the END of any tolerance, not a documented nexus.
