notes: |
  AUDIT (2026-07-01, claude-opus-4.8/max): created during phantom-remediation
  re-sourcing of event 2022-05/eset-apt32-pubload-modernization, which had
  cited a nonexistent ESET 2022 "PubLoad" report (phantom; url null). This
  Netskope Threat Labs post is the genuine 2021-2022 APT32/OceanLotus
  tooling-refresh primary. Raw snapshot captured + sha256 committed. Verbatim
  supporting quotes from the snapshot (sha256 724ffa2e…94f0d93c, 1,187,774 bytes):
  - "Netskope Threat Labs is currently tracking a malicious campaign that uses
    Web Page Archive files (".mht" or ".mhtml") to deliver infected documents,
    which eventually deploys a backdoor that uses Glitch for C2 communication."
  - "The usage of Web Archive files to deliver infected documents was previously
    seen and linked to APT32 (a.k.a. Ocean Lotus and Cobalt Kitty), a cyber
    espionage group known for targeting governments and journalists."
  - "a similar backdoor used in this campaign was spotted in August 2021 and
    also linked to this same threat group."
  Attribution is an association by TTP/backdoor overlap ("linked to APT32"),
  not a first-party high-confidence attribution — hence attributing_org_confidence
  moderate on the referencing event.
