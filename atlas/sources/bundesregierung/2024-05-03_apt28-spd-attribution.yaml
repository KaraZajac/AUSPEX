published_on: 2024-05-03
retrieved_on: 2026-05-25
tier: primary
notes: |
  German Federal Government public attribution of APT28 spearphishing
  campaign against SPD (Olaf Scholz's party) and Czech/Polish
  government/military targets using CVE-2023-23397 Outlook NTLM
  relay. Germany formally summoned the Russian charge d'affaires
  and called the operation "intolerable." EU statement of solidarity
  same week.
