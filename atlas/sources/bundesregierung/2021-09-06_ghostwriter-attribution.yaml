notes: |
  German Federal Foreign Office's public attribution of Ghostwriter
  operations against Bundestag members to Russian state actors with
  Belarusian-aligned activity also documented. The German statement
  uses "Russian state actors" framing while subsequent Mandiant and
  EU action attributes the cluster to Belarus; the German statement
  is the bureaucratic foundation for the EU's September 24 declaration.

