notes: |
  Final report of the UN 1718 Panel of Experts before mandate
  expiration (April 2024 Russia veto). Documented approximately
  $3B DPRK crypto theft 2017–2023 and 58 incidents under panel
  investigation. Critical primary source for the WMD-financing
  attestation pattern.
  AUDIT (2026-07-02, claude-opus-4.8/max): the recorded url is the
  official UN 1718 PoE reports CATALOGUE (title "Reports | Security
  Council"), not the report body — but it explicitly lists this
  document as "S/2024/215" / "2024 Final" (resolution 1874), with
  the direct link https://undocs.org/en/S/2024/215. That direct
  link redirects to the docs.un.org JS document viewer (a ~4 KB
  shell), so the report PDF is not curl-snapshottable; raw snapshot
  here is the catalogue page (hashed), which corroborates the
  report's existence and symbol. URL left unchanged (shared with
  2024-04/un-poe-mandate-end). For the 2026-01 MSMT-consolidation
  event this source is non-load-bearing (anchors post-PoE lineage
  only).
