notes: |
  UNSC vote (13-1-1, Russia veto, China abstain) failed to extend the
  1718 Panel of Experts mandate beyond April 30, 2024 — ending 15
  years of DPRK sanctions monitoring. Direct effect: AUSPEX must
  rely on national designations and the post-October-2024 MSMT body
  for primary DPRK sanctions-evasion attestation.
  AUDIT (2026-07-11, claude-opus-4.8/max): snapshot captured + hashed
  from the archive_url (Wayback 20260210080953) because the live
  press.un.org URL is Cloudflare-bot-walled (returns a ~3 KB "Client
  Challenge" shell, not the release). Snapshot sha256 041d4bef…f55d
  (71,589 B); <title> matches verbatim ("Security Council Fails to
  Extend Mandate for Expert Panel Assisting Sanctions Committee on
  Democratic People's Republic of Korea"). Verbatim carried: "By a
  vote of 13 in favour to 1 against (Russian Federation), with 1
  abstention (China), the Council rejected the draft" and "would have
  extended until 30 April 2025 the mandate of the Panel of Experts
  assisting the Sanctions Committee established pursuant to resolution
  1718 (2006)." ADDED to sources[] of 2024-04/un-poe-mandate-end as
  the authoritative primary for the veto + mandate expiry (was
  previously cited nowhere). NOT a phantom.
