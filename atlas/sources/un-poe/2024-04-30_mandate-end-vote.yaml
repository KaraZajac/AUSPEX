publisher: United Nations Security Council
title: |
  Security Council Fails to Extend Mandate for Expert Panel Assisting
  Sanctions Committee on Democratic People's Republic of Korea, as
  Russian Federation Wields Veto (Meeting Coverage SC/15648)
url: https://press.un.org/en/2024/sc15648.doc.htm
archive_url: "https://web.archive.org/web/20260210080953/https://press.un.org/en/2024/sc15648.doc.htm"
published_on: 2024-03-28
retrieved_on: 2026-05-26
tier: primary
notes: |
  UNSC vote (13-1-1, Russia veto, China abstain) failed to extend the
  1718 Panel of Experts mandate beyond April 30, 2024 — ending 15
  years of DPRK sanctions monitoring. Direct effect: AUSPEX must
  rely on national designations and the post-October-2024 MSMT body
  for primary DPRK sanctions-evasion attestation.
