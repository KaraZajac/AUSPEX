notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw snapshot captured from the live URL (HTTP 200) and
  hashed (content_sha256). The article body confirms the GRIDTIDE C-based backdoor abusing the
  Google Sheets API for cell-based command-and-control, the 53 confirmed intrusions across 42
  countries (suspected activity in 20+ more), the telecom-and-government targeting across Africa/
  Asia/the Americas, the PII (voter-ID/national-ID) endpoint, the undetermined initial-access vector
  (with UNC2814's history of compromising web servers and edge systems), and GTIG's Feb-2026
  disruption (terminating attacker Cloud Projects, disabling accounts/Service Account, releasing
  IOCs). ATTRIBUTION (verbatim): "The threat actor, UNC2814, is a suspected People's Republic of
  China (PRC)-nexus cyber espionage group that GTIG has tracked since 2017." and "UNC2814 is a
  suspected PRC-nexus threat actor that has conducted global operations since at least 2017." "UNC" =
  Mandiant UNCATEGORIZED — the report attributes only a *suspected* PRC/China nexus and names NO
  service organ: the strings "MSS", "Ministry", "Chinese" and any confidence verb beyond "suspected"
  do not appear in the text. Supports cn/unscoped/unc2814 (China-nexus, service unresolved); does NOT
  support the former cn/mss placement.
