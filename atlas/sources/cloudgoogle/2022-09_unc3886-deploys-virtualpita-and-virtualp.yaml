notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): Raw snapshot captured from the live URL (HTTP 200) and
  hashed (content_sha256). The article body confirms VIRTUALPITA/VIRTUALPIE, malicious vSphere
  Installation Bundles (VIBs), ESXi-hypervisor persistence, cross-guest command execution and the
  admin-privilege prerequisite. ATTRIBUTION (verbatim): "Mandiant has begun tracking this activity
  as UNC3886. Given the highly targeted and evasive nature of this intrusion, we suspect UNC3886
  motivation to be cyber espionage related. Additionally, we assess with low confidence that
  UNC3886 has a China-nexus." "UNC" = UNCATEGORIZED — the report itself links Mandiant's "DebUNCing
  Attribution: How Mandiant Tracks Uncategorized Threat Actors", i.e. no nation/service attribution
  at confidence; the China-nexus claim is explicitly LOW confidence. The report names NO victim
  sectors or countries (the only "targeted" usage describes the intrusion's tradecraft, not
  victimology). DATE: real publish date is 2022-09-29 (page datePublished + byline "September 29,
  2022"); published_on corrected from the 2022-09-01 backfill placeholder.
