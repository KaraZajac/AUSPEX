notes: |
  Mozilla's decision not to include DarkMatter as a trusted
  certificate authority in Firefox, citing the Reuters Project
  Raven disclosures. Confirms the Reuters reporting at the
  third-party-policy-decision level.

  URL nulled (2026-05-28): the cited URL
  https://blog.mozilla.org/security/2019/07/09/distrusting-new-darkmatter-certificates/
  returns 404 and wayback availability/CDX queries returned no
  archived snapshot at the expected timestamps. Mozilla appears
  to have removed the post from blog.mozilla.org/security. The
  decision is well-documented in third-party coverage and in
  Mozilla bug 1427262 / NSS root-store removal commits, but the
  canonical security-blog URL is no longer extant.

