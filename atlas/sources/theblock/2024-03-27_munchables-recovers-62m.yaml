notes: |
  Contemporaneous report of the fund recovery. Carries the exact
  on-chain amount, the insider vector, the unconditional return,
  and ZachXBT's (hedged) DPRK attribution.
  AUDIT (2026-07-04, claude-opus-4.8/max): record created during
  the audit of 2024-03/munchables-it-worker-insider; snapshot +
  sha256 captured. Verbatim (JSON-LD articleBody): "The incident
  began with Munchables announcing a security hack, with
  suspicions directed toward an internal team member. Investigative
  efforts by on-chain detective ZachXBT suggested the involved
  individual might be linked to North Korean hackers, but this
  remains unclear." "The project's smart contracts had granted the
  developer in question the power to transfer funds at their
  discretion, a capability misused in this instance." "the
  developer had agreed to unconditionally relinquish the private
  keys to the wallet holding Munchables' assets." "A total of
  17,412.6 ETH, worth about $62.8 million, was redirected to a 2/3
  multisig wallet, as noted by security firm BlockSec." "'All user
  funds are safe,' Munchables stated".
