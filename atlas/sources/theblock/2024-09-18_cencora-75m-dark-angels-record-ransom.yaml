notes: |
  Daniel Kuhn, 2024-09-18. Same-day mirror of Bloomberg's
  paywalled 2024-09-18 report "Gang Got $75 Million for Cencora
  Hack in Largest Known Ransom" (bloomberg.com bot-walled HTTP
  403 for the fetcher; the Reuters wrap of the same Bloomberg
  story returns HTTP 401): "Hacking group Dark Angels received a
  $75 million bitcoin ransom after attacking drug distributor
  Cencora in February"; "The Pennsylvania-based Cencora paid out
  a $75 million ransom in three bitcoin payments last March";
  "Bloomberg was first to report on Wednesday". Dark Angels
  "thought to be a cybercrime syndicate based in Russia", emerged
  2021. Notes Zscaler ThreatLabz had disclosed in August that a
  then-unnamed company paid the $75M.
