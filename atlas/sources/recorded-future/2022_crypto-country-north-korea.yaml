notes: |
  Recorded Future Insikt Group cumulative analysis of DPRK
  cryptocurrency targeting through Q1 2022. Documents the
  cluster of cryptocurrency-exchange thefts and supply-chain
  operations attributable to Lazarus, TraderTraitor (then
  termed APT38 by the report), and BlueNoroff between 2018
  and early 2022. Pre-Ronin baseline document; subsequently
  cited by Treasury / FBI attribution reports.
  AUDIT 2026-07-01 (claude-opus-4.8, max): NOT a phantom — url resolves to
  the genuine "Crypto Country" report landing page (title + body match).
  The accessible page is a summary abstract; the full analysis is a gated
  PDF ("download the report as a PDF"). The summary carries state-level
  attribution ("North Korean threat actors, supported by the state" /
  "North Korean state-sponsored activity") and weapons-financing language
  ("funding military and weapons programs", "ballistic missile launches"),
  and the 2017-bubble pivot ("Since 2017 ... during the 2017 bubble,
  starting with the South Korean market and later expanding globally").
  CAVEAT: the live summary also carries full-year-2022 figures ($1.7B in
  2022, "44% of stolen cryptocurrency in 2022") that postdate an
  April-2022 report — the landing page has been updated since publication,
  so specific figures/sub-group names in the original PDF cannot be
  verified from this snapshot. Sub-group naming (APT38/BlueNoroff/
  TraderTraitor) does NOT appear on the accessible summary (likely in the
  gated PDF). archive.org blocked for fetcher; snapshot is the live page.
