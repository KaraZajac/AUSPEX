notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): this is the load-bearing source for
  the cn/mss/apt3 service placement — it names the Ministry of State Security
  explicitly and at high confidence, not merely "Chinese." Captured live
  (HTTP 200, full article body; 32 "MSS" / 14 "Ministry of State Security" /
  24 "Boyusec" / 16 "Guangdong" mentions). Verbatim:
  "APT3 is the first threat actor group that has been attributed with a high
  degree of confidence directly to the Chinese Ministry of State Security
  (MSS)." — "Recorded Future's research leads us to attribute APT3 to the
  Chinese Ministry of State Security and Boyusec with a high degree of
  confidence." — "Recorded Future's open source research and analysis has
  corroborated the company, also known as Boyusec, is working on behalf of the
  Chinese Ministry of State Security." The Boyusec→MSS-Guangdong chain is also
  laid out: "Recorded Future's research has concluded that Guangdong ITSEC is
  subordinate to an MSS-run organization called China Information Technology
  Evaluation Center (CNITSEC) and that Boyusec has been working with Guangdong
  ITSEC on a joint active defense lab since 2014," with the conclusion that
  Boyusec's partner "Guangdong ITSEC … is actually a field site for a branch of
  the MSS." Note kind=vendor-research (not govt-primary): the MSS attribution
  is Recorded Future's analytic conclusion (corroborating Intrusion Truth),
  high-confidence but vendor-sourced; the paired DOJ indictment establishes the
  Boyusec identity/indictment but does not itself name the MSS.
