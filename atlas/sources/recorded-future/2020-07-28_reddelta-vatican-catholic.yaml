notes: |
  ADDED 2026-07-01 (AUDIT, claude-opus-4.8/max) as the genuine primary source for the
  Vatican / Catholic-organizations targeting that event 2022-05/mustang-panda-eu-vatican-myanmar
  had erroneously cited to the Proofpoint 2022 EU-diplomatic report (which carries none of it).
  The fetched page is an EXCERPT of the full report ("The following post is an excerpt of a full
  report… download the report as a PDF"); the linked full PDF (go.recordedfuture.com/hubfs/reports/
  cta-2020-0728.pdf) now 302-redirects to the RF homepage (link-rotted), so the additional full-PDF
  detail — RedDelta PlugX intrusions against Myanmar government systems and two Hong Kong universities
  — is NOT captured here and is not asserted as fact in the event. Snapshot captured live (HTTP 200,
  title "Chinese State-Sponsored Group 'RedDelta' Targets the Vatican and Catholic Organizations |
  Recorded Future"; 44 "Vatican" / 47 "Catholic" / 32 "RedDelta" / 20 "Hong Kong" / 15 "Insikt" /
  12 "PlugX" mentions). Verbatim (excerpt Executive Summary):
  "From early May 2020, The Vatican and the Catholic Diocese of Hong Kong were among several Catholic
  Church-related organizations that were targeted by RedDelta, a Chinese-state sponsored threat
  activity group tracked by Insikt Group." — "This series of suspected network intrusions also
  targeted the Hong Kong Study Mission to China and the Pontifical Institute for Foreign Missions
  (PIME), Italy." — "These network intrusions occured ahead of the anticipated September 2020 renewal
  of the landmark 2018 China-Vatican provisional agreement, a deal which reportedly resulted in the
  Chinese Communist Party (CCP) gaining more control and oversight over the country's historically
  persecuted 'underground' Catholic community." — "The suspected intrusion into the Vatican would
  offer RedDelta insight into the negotiating position of the Holy See ahead of the deal's September
  2020 renewal." — "In addition to the targeting of entities related to the Catholic Church, Insikt
  Group also identified RedDelta targeting law enforcement and government entities in India and a
  government organization in Indonesia." On the actor identity: "there is considerable overlap between
  the observed TTPs of RedDelta and the threat activity group publicly referred to as Mustang Panda
  (also known as BRONZE PRESIDENT and HoneyMyte)" — RF designated the activity RedDelta (distinct
  label, overlapping cluster); AUSPEX maps RedDelta as an equivalent alias of cn/unscoped/mustang-panda.
  Attribution is NATION-level ("suspected Chinese state-sponsored" / "Chinese-state sponsored"); no
  MSS or specific Chinese service named.
