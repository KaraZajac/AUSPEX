  "Poland's Ministry of National Defense issued a warning Wednesday about a recent disinformation
  campaign that has been traced back to the Belarusian hacking group known as Ghostwriter." —
  "As part of the campaign, the hackers — who cybersecurity experts also refer to as UNC1151 — sent
  fake messages to Polish citizens about potential recruitment to the Lithuanian-Polish-Ukrainian
  brigade, a multinational military focused on conducting peacekeeping and humanitarian operations.
  The hackers made false claims that the brigade will take part in military operations in Ukraine." —
  "The hackers spread fabricated messages through SMS, Telegram channels, and email using the newly
  registered mon-gov[.]com domain, Polish authorities said. It is not clear how many people received
  these messages. Poland's cybersecurity services warned that the campaign is likely to continue in
  the future." — "Ghostwriter has been actively operating in Poland since the beginning of the war in
  Ukraine ... The group's goal in Poland is to disrupt the [country's] relations with its allies,
  including Ukraine, the U.S., and NATO countries, according to Poland's Ministry of National Defense.
  The group's campaigns have also aimed to foment social unrest among Polish citizens." —
  "The campaign is just the latest in a series of disinformation operations conducted by Russia and
  Belarus-aligned hackers." Attribution is journalistic ("Belarus-linked" / "traced back to"
  Ghostwriter/UNC1151) = moderate, named-actor; no specific Belarusian service named.
