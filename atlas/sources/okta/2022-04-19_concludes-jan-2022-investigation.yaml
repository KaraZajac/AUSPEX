notes: |
  Okta's authoritative post-incident conclusion (first-party victim disclosure) on
  the LAPSUS$/DEV-0537 compromise routed through Sitel, a third-party customer-support
  BPO. Corrects the initial worst-case figure. Compromise window "January 16 and 21";
  the threat actor's control of the Sitel support engineer's machine "lasted for 25
  consecutive minutes on January 21, 2022." "The maximum potential impact of the
  incident was 366 Okta customers whose tenants were accessed by any Sitel customer
  support engineer within that time" — "the maximum potential impact Okta initially
  shared on March 22, 2022." Final finding: the actor "accessed two active customer
  tenants within the SuperUser application (whom we have separately notified), and
  viewed limited additional information in certain other applications like Slack and
  Jira that cannot be used to perform actions in Okta customer tenants"; the actor was
  unable to reset MFA/passwords, perform impersonation events, or authenticate directly
  to any Okta accounts. Cited by the CSRB Lapsus$ report (footnote 71). The original
  CSRB-cited URL (okta.com/blog/2022/04/okta-concludes-...) 301-redirects to the
  /company-and-culture/ path recorded here. Snapshot retrieved/hashed 2026-07-10.
