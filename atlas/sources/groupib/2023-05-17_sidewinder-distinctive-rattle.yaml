notes: |
  Joint Group-IB / Bridewell investigation ("The distinctive rattle of
  APT SideWinder"; authors Nikita Rostovtsev, Joshua Penny, Yashraj
  Solanki). Documents 55 previously-unknown SideWinder IP addresses /
  domains (of 119 attributed) — "We have attributed them with high
  confidence to SideWinder." Phishing domains impersonate news,
  government, telecommunications and financial organizations; "SideWinder
  uses the identified servers as A records for domains that mimic
  government organizations in Pakistan, China, and India" and "could have
  planned attacks against financial and government organizations, as well
  as companies specialized in e-commerce and mass media in Pakistan and
  China." Named lures include a "GUIDELINES FOR JOURNAL – 2023 PAKISTAN
  NAVY WAR COLLEGE (PNWC).docx" (domain pnwc[.]bol-north[.]com) and a
  Tsinghua University mail spoof (mailtsinghua[.]sinacn[.]co) — "the
  target of SideWinder's attack may have been Tsinghua University, one of
  the leading universities in China" — whose 公管学院 archive was uploaded
  to VirusTotal from Beijing on 2022-11-24. Pakistani gov/law-enforcement
  decoys (State Bank of Pakistan, Sindh Police, Punjab Police, FIA) and
  media domains also listed. RTF / LNK / HTA (mshta.exe) staging chain.
