notes: |
  Group-IB follow-on blog to the May 2022 "Old Snake, New Skin" SideWinder report.
  Added 2026-07-01 (claude-opus-4.8/max audit of 2022-05/groupib-sidewinder-pakistan-china)
  as a reachable primary corroborating the gated Old Snake New Skin landing page.
  Full article body captured (reachable, not gated). Verbatim support:
    - "APT SideWinder ... is believed to be an Indian nation-state threat actor" /
      "believed to be originating from India and primarily targeting Pakistan".
    - "Pakistan remains the primary target for SideWinder. The attackers are especially
      interested in the Pakistani government organizations".
    - Target geography named: "Afghanistan, Nepal, Sri Lanka, Bhutan, Myanmar, Philippines,
      Bangladesh, Singapore, and China".
    - "Group-IB Threat Intelligence system identified 92 IP addresses that have been used
      by SideWinder APT for phishing emails".
    - NO "academic"/"university"/"research-institute" framing anywhere in the article
      (a standalone-word search returns zero hits) — Group-IB names China as a target
      COUNTRY (government-org domain-mimicry), not academic institutes.
