  Peer-reviewed academic article in Studies in Conflict & Terrorism
  (Taylor & Francis, DOI 10.1080/1057610X.2026.2680934), authors
  Daniel Haberfeld and Gabriel Weimann, published online 06 June 2026.
  Frames Handala as an Iranian psychological-terrorism / influence
  operation.
  AUDIT (2026-07-10, claude-opus-4.8/max): snapshotted + hashed;
  carries the named-target detail for 2024-02/handala-rafah-defacement-
  campaign verbatim: "after an alleged hack on the Rosh Ha'ayin
  Municipal Society Community Center website in February 2024, Handala
  stated, 'We stood by Rafah! This was just a warning.'" Article's
  central assessment is that Handala is an Iran-linked
  psychological-warfare persona (title question resolves toward
  psychological terrorism / influence rather than materially
  destructive cyberterrorism).
