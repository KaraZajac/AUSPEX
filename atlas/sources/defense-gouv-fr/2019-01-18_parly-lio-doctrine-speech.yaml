notes: |
  Official speech text by Defence Minister Florence Parly, "Stratégie cyber
  des Armées", delivered at the Ministère des Armées in Paris on 18 January
  2019 — the public announcement of France's military offensive-cyber
  doctrine (lutte informatique offensive, LIO).

  AUDIT (2026-06-28, claude-opus-4.8/max): PHANTOM REMEDIATION — this record
  previously carried url: null ("canonical current URL not verifiable on
  retrieval 2026-05-28"). Recovered the live canonical primary: the 11-page
  speech PDF on defense.gouv.fr (HTTP 200 on 2026-06-28); raw_snapshot +
  content_sha256 added. Cover page reads verbatim "Madame Florence Parly,
  ministre des Armées / Stratégie cyber des Armées / Paris, le 18 janvier
  2019 / – seul le prononcé fait foi –". Doctrine announcement quoted
  verbatim: "j'ai décidé de rendre publics les grands principes de notre
  doctrine de lutte informatique offensive à des fins militaires"; capability
  avowal: "Aujourd'hui, la France choisit de se doter pleinement de l'arme
  cyber pour ses opérations militaires. Nous considérons l'arme cyber comme
  une arme opérationnelle à part entière"; command authority: "le cyber est
  une capacité interarmées, sous l'autorité du chef d'état-major des Armées".
  Title corrected from the prior garbled "politique ministérielle de lutte
  informatique offensive" to the document's actual title. Date, speaker, and
  substance independently corroborated by Defense News (2019-01-18) and widely
  reported by Le Monde, AFP, L'Opinion.
