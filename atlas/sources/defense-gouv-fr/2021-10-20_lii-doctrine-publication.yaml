notes: |
  Public-version doctrine publication by the Ministry of the Armed
  Forces, presented by Defence Minister Florence Parly on Wednesday
  20 October 2021 alongside CHOD Gen. Thierry Burkhard. Publicly
  commits France to military information-warfare operations (L2I)
  in the informational layer of cyberspace. Official abbreviation
  is L2I (the AUSPEX doctrine slug uses the variant "LII").

