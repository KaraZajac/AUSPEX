notes: |
  Canonical Ministère des Armées institutional page for COMCYBER
  (Commandement de la cyberdéfense). Institutional reference for
  event 2017-05/comcyber-stand-up.

  AUDIT (2026-07-11, claude-opus-4.8 / max): live page captured
  (HTTP 200, 49,031 B, sha256 c69cd20a…44431f02). Carries verbatim:
  "(COMCYBER) est un commandement opérationnel, qui rassemble
  l'ensemble des forces de cyberdéfense du ministère sous une
  autorité interarmées. Créé en mai 2017 par décret"; mission
  "la défense des systèmes d'information et des systèmes d'armes,
  ainsi que la conception, la planification et la conduite des
  opérations militaires dans le cyberespace"; command authority
  "Placé sous l'autorité directe du chef d'état-major des Armées
  (CEMA)"; and current headcount "Le COMCYBER compte plus de 3600
  cybercombattants civils et militaires." NB: this live page gives
  the creation MONTH ("mai 2017") but not the exact day; the exact
  date (4 mai 2017) and the establishing instrument are carried by
  the Légifrance arrêté (legifrance/2017-05-04_arrete-organisation-
  etat-major-cyberdefense) and fr Wikipedia. The "plus de 3600"
  figure is a current (2026) headcount, NOT a stand-up-day figure —
  not used in the event's quantified_impact.
