notes: |
  English High Court Family Division fact-finding judgment by
  Sir Andrew McFarlane, President of the Family Division. Finds
  on the balance of probabilities that the agents of HH Sheikh
  Mohammed bin Rashid Al Maktoum (Ruler of Dubai, Vice-President
  and Prime Minister of the UAE) caused the surveillance, using
  the Pegasus software of NSO Group, of the mobile phones of (i)
  HRH Princess Haya bint Al Hussein, (ii) two of her solicitors
  (including Baroness Fiona Shackleton), (iii) her personal
  assistant, and (iv) two members of her security staff. The
  evidentiary chain rests on Citizen Lab forensic analysis by
  Dr William Marczak, tendered as expert evidence. AUDIT
  (2026-07-11, claude-opus-4.8/max): NSO Group did NOT appear via
  counsel / was not a party (prior "appeared via leading counsel"
  corrected). NSO engaged the court via a senior-manager call
  relayed through Cherie Blair QC and a letter dated 14 December
  2020 sent via CAFCASS, confirming its services to the customer
  "stopped completely as of 7 December 2020" and that its products
  "are used exclusively by government intelligence and law
  enforcement agencies" (para 106; the father "not himself a
  customer"). Court judgment is a tier-1
  primary attribution of UAE-state Pegasus deployment at the
  Ruler-of-Dubai customer level. Published with judgment-text
  release on 6 October 2021 (the present URL is the canonical
  judiciary.uk archival PDF posted on the Al Maktoum judgments
  index page).
