notes: |
  NCSC CEO Dr Richard Horne's public statement on the UK retail wave;
  establishes the NCSC's ROLE and the incident dates.
  AUDIT (2026-07-05, claude-opus-4.8/max): snapshot captured + hashed.
  Verbatim (NCSC role — corrects over-attribution): "Computer Weekly
  understands that all three retailers affected in the current spate of
  cyber attacks are currently receiving incident response support from
  the NCSC" and the NCSC works "to provide expert advice to the wider
  sector" — i.e. incident-response/guidance, NOT formal attribution.
  Horne: "These incidents should act as a wake-up call to all
  organisations." Dates: M&S 22 April 2025 (Easter weekend); Co-op
  30 April 2025; Harrods 1 May 2025. Scattered Spider mentioned only as
  speculation ("may have been behind"), not authority attribution.
