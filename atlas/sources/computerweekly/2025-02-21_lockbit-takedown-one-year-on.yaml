  Verbatim support in snapshot:
   - Paul Foster, head of the NCA's cyber crime unit: "There hasn't been
     a known, reported LockBit attack in the UK for over four months now
     and our international partners are seeing similar trends,"
   - LockBit affiliates "scattered to the four winds."
   - "RansomHub, Play, and even Cl0p, have all incorporated elements of
     LockBit's playbook into their [operations]."
   - "the number of schemes operating is indicative of that fragmentation
     in the landscape."
