  Primary journalism for the March-2024 Qilin leak-site claim against The Big
  Issue Group. Created + snapshotted 2026-07-04 to RE-SOURCE event
  2024-03/big-issue-qilin off the wrong-source Synnovis NHS statement
  (ncsc-uk/2024-06-04_synnovis-qilin-statement).

  AUDIT (2026-07-04, claude-opus-4.8/max): raw snapshot captured + sha256
  verified (381,435 bytes). Verbatim support:
   - Qilin claimed "550GB" of stolen data comprising "personnel information,
     contracts and partner data, financial statements and investment
     information" plus "passport scans" / payroll.
   - Big Issue statement: "On becoming aware of this, we took immediate steps
     to restrict access to our systems, working with external IT security
     experts, and the investigation into the incident is ongoing."
   - "The publication and distribution of the Big Issue magazine is not
     impacted by this incident."
   - Qilin characterised as operating a "ransomware-as-a-service (RaaS) model"
     with a "fairly standard double extortion practice".
