notes: |
  Primary journalism for the INC Ransom leak-site claim against NHS
  Dumfries and Galloway. Created + snapshotted 2026-07-05 during the
  event-census audit of 2024-03/nhs-dumfries-inc-ransom (the actor-
  naming source, since the health board's own statement names only
  "a recognised ransomware group").

  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured +
  sha256 verified (382,328 bytes). Verbatim support:
   - "a cyber criminal operation going by the name Inc Ransom claimed
     to be in possession of three terabytes of data purloined from
     NHS Scotland".
   - NHS D&G "first acknowledged it had fallen victim to a 'focused
     and ongoing' cyber attack on 15 March".
   - "The cyber attack publicly disclosed by Inc Ransom on 26 March".
   - "it also posted a number of supposedly stolen items as proof.
     This small data dump is understood to include sensitive
     information including medical reports and letters to patients".
   - "Inc Ransom claimed to have stolen data on over 140,000 clinical
     and back office staff working across the NHS in Scotland".
   - "NHS Dumfries and Galloway, which serves communities in
     south-western Scotland".
