  AUDIT (2026-06-25, claude-opus-4.8/max): raw captured + hashed. Computer Weekly news
  article by Alex Scroxton, "Published: 05 Sep 2024 18:52", reporting CISA/FBI/NSA + UK NCSC
  + Five-Eyes + Czechia/Estonia/Germany/Latvia/Ukraine advisory AA24-249A on GRU Unit 29155.
  Corrected backfill artifacts: publisher held the advisory's authoring-agency list and title
  held the event name; restored to the actual Computer Weekly publisher + headline (the
  advisory's agency list is preserved on the event's attributing_org). Supporting quotes:
  "Unit 29155, also designated as the 161st Specialist Training Centre, and designated by
  private sector threat researchers variously as Cadet Blizzard, Ember Bear … is likely
  composed of junior active-duty GRU personnel"; "deploying tools such as the Whispergate
  malware … deployed across Ukraine in advance of Russia's illegal February 2022 invasion";
  "thousands of domain scanning exercises across multiple Nato and European Union (EU) member
  states, with a particular focus on CNI, government, financial services, transport, energy
  and healthcare".
