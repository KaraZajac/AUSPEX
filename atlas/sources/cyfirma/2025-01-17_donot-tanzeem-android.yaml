notes: |
  CYFIRMA report on DONOT APT (APT-C-35 / Origami Elephant) Android tooling,
  the "Tanzeem" / "Tanzeem Update" malware. Created 2026-06-27 (claude-opus-4.8/max)
  to RE-SOURCE event 2024-08/donot-android-continuation-2024, whose prior citation
  (cyfirma/2024-08_donot-android-continuation, url=cyfirma.com/research/) was a
  phantom catalogue page carrying no article.
  AUDIT (2026-06-27, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (ee2b4cef…eb79fe1a, 113,385 bytes). Verbatim support:
    - Malware name: "The application is named 'Tanzeem' and 'Tanzeem Update', which in
      Urdu translates to 'organization.' Terrorist organizations and several Indian law
      enforcement agencies use this term to refer to groups they are associated with,
      such as Jaish-e-Mohammad and Lashkar."
    - Sample timing: "We collected two samples at different times, one from October and
      another from December, and found both apps nearly identical, with only slight
      changes to the user interface." (Oct & Dec 2024; report published 2025-01-17.)
    - Delivery / new tactic: "we believe the library is being misused to push
      notifications containing phishing links, as we have observed the OneSignal library
      being used in both applications." Fake chat app that "does not work once installed,
      shutting down after the necessary permissions are granted"; abuses accessibility
      services; dangerous permissions incl. READ_CALL_LOG, READ_CONTACTS.
    - Targeting / strategic purpose: "The ongoing efforts by the notorious DONOT APT
      extend beyond gathering intelligence on internal threats; they have also targeted
      various organizations in South Asia to assist India with strategic intelligence
      collection." / "the threat group's evolving intentions to continue participating in
      intelligence gathering for national interests." / "the DONOT group is actively
      targeting organizations and individuals across the South Asia region." / "The app's
      name suggests that it is designed to target specific individuals or groups both
      inside and outside the country."
  NOT present in this report (checked the raw): no "Kashmir" (0), no "WhatsApp" (0), no
  "Innefu" (0), no "Pakistan"/"Bangladesh"/"foreign ministry"/"diplomat" (0) — the
  phantom-era event prose claiming WhatsApp delivery, Innefu-tied tooling, and Pakistani/
  Bangladeshi foreign-ministry diplomatic targeting is unsupported by this primary.
  tier=secondary: CYFIRMA is an India-headquartered TI vendor; attribution is
