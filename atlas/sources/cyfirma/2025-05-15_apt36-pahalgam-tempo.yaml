notes: |
  Cyfirma consolidated OSINT write-up "Firewalls and Frontlines:
  The India-Pakistan Cyber Battlefield Crisis" on the April-May 2025
  Pahalgam / Operation Sindoor cyber escalation. The bulk of the
  report covers non-state hacktivist DDoS / defacement activity; it
  also names APT36 / Transparent Tribe and SideCopy as active
  Pakistan-linked espionage clusters (Crimson RAT, macro-laden
  Office/PDF, ELF/Linux, Mythic C2), with an IOC block of Pahalgam-
  themed lures and gov.in / military look-alike phishing domains.
  Published 2025-06-05 (article header "Published On : 2025-06-05");
  the id slug retains a 2025-05-15 mid-crisis date per editorial
  convention. Tier secondary is correct: the post aggregates open-
  source intelligence rather than reporting first-party discovery.
  AUDIT (2026-07-05, claude-opus-4.8/max): raw snapshot captured
  (sha256 e019bb14…3bfc293e, 130322 bytes). The article uses NO
  operational-"tempo" language for APT36 (its surge / "100-fold" /
  escalation metrics all describe hacktivist DDoS, not APT36); the
  prior title "APT36 tempo elevation…" was an editorial paraphrase
  and has been corrected to the real article title. Also cited by
  event 2025-04/sidecopy-pre-pahalgam-tempo.
