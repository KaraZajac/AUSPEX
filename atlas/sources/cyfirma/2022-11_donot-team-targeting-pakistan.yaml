  AUDIT (2026-06-24, claude-opus-4.8/max): used to verify the DoNot Team SERVICE
  placement. The exact 2022-11 "Pakistani Defense and Government" article could not be
  located at the stored generic /research/ URL (it now resolves to a CYFIRMA landing/archive
  page). The snapshot captured here is CYFIRMA's closest extant DoNot report,
  "DoNot APT Targets Individuals in South Asia using Android Malware"
  (https://www.cyfirma.com/research/donot-apt-targets-individuals-in-south-asia-using-android-malware/,
  dated 2023-04-14 — a date discrepancy vs the cited 2022-11; flagged for source-integrity
  follow-up). On the substantive question, CYFIRMA does NOT name the NTRO or any Indian
  service — it does not even confirm Indian origin: "There are some media articles reporting
  that the threat actor belongs to the Indian soil, but we cannot confidently confirm if they
  belong to India, or what interest they are currently serving." The strings "NTRO" /
  "National Technical Research" and "Innefu" do not appear.
  AUDIT (2026-07-01, claude-opus-4.8/max): PHANTOM confirmed. The url is CYFIRMA's
  /research/ CATALOGUE landing page, not an article; no report titled "Donot Team
  APT-C-35 Targeting Pakistani Defense and Government" (Nov 2022) exists in CYFIRMA's
  index, the SOCRadar APT-C-35 profile, or general web search. The stored raw_snapshot
  + content_sha256 (a6906d38...) are of a DIFFERENT CYFIRMA article -- <title> "DoNot APT
  Targets Individuals in South Asia using Android Malware" (2023-04) -- NOT the cited
  report; treat the hash as capturing the wrong article, not this citation. Orphan
  candidate once its remaining references are cut: currently still cited by events
