notes: |
  CYFIRMA ETLM report on a DoNot APT (APT-C-35) Android campaign distributed via the
  official Google Play Store. Created 2026-06-28 (claude-opus-4.8/max) to RE-SOURCE event
  2023-10/amnesty-donot-kashmir, whose prior citation
  (amnesty/2023-10-31_donot-targeting-kashmir-activists, url=amnesty.org/en/latest/research/)
  was a PHANTOM: the URL is the Amnesty "Research Archives" catalogue page (no article), and
  no 2023 Amnesty DoNot/Kashmir report exists (Amnesty's only DoNot piece is the 2021 Togo
  report). The underlying incident — DoNot targeting individuals in Kashmir in 2023 — is REAL
  and is documented by this genuine primary.
  AUDIT (2026-06-28, claude-opus-4.8/max): raw snapshot captured + sha256 verified
  (894b8b4e…f09429e5, 116,283 bytes). Page meta "Published On : 2023-06-16". Verbatim support:
    - Targeting / victims: "Further technical analysis revealed that the app has malware
      characteristics and belongs to the notorious Advanced Persistent Threat Group; 'DoNot',
      which recently targeted individuals in the Kashmir region. In a recent observation, we
      found the threat actor is using Android payload against individuals in the Pakistan
      region, however, it is still unknown what drives them to conduct cyber strikes in the
      South Asian region." (Motive explicitly NOT asserted.)
    - Attribution + confidence: "After conducting a thorough analysis of samples, with a
      moderate level of confidence, we can confirm that the Google Play store account is linked
      to APT DoNot, as it hosts Android apps exhibiting malicious characteristics."
    - Delivery / tooling: "The apps were stationed under an account named 'SecurITY Industry'
      on Google Play Store. A total of three Android apps were hosted with the name Device Basic
      Plus, nSure Chat, and iKHfaa VPN, with two of them having malicious characteristics, that
      are nSure Chat and iKHfaa VPN. The threat actor used cleaned and innocent Android
      Libraries and made them fetch contacts and the location of the compromised victim."
      C2 logs the installing user's username/password "in plain text".
  NOT present in this report (checked the raw): no "Innefu" (0), no "Amnesty" (0), no "WhatsApp"
  (0), no "ChatLite"/"yty" (0) — the phantom-era event prose claiming WhatsApp/ChatLite delivery,
  Innefu-tied yty tooling, and an Amnesty "state-contractor handshake" is unsupported by this
  primary (that material belongs to the separate 2021 Amnesty Togo report / event
  2021-10/amnesty-innefu-donot-contractor-link). The Hacker News (2023-06-15,
  thehackernews.com/2023/06/rogue-android-apps-target-pakistani.html) and BleepingComputer
  independently corroborate the same Cyfirma findings (iKHfaa VPN / nSure Chat, moderate
  confidence, DoNot/APT-C-35).
