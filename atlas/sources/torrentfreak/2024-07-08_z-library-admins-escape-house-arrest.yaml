notes: |
  TorrentFreak (Andy Maxwell) reporting the post-indictment disposition of
  the Z-Library operators: after their Nov 3 2022 arrest in Cordoba,
  Argentina, Judge Miguel Hugo Vaca Narvaja ordered them held under HOUSE
  ARREST in January 2023 (not custody); they appealed to Argentina's
  Supreme Court of Justice seeking political-refugee status; after a judge
  approved their extradition to the US, the pair escaped house arrest —
  their absence discovered during a Patronato del Liberado compliance visit
  in May 2024 (per La Voz) — and Judge Sanchez Freytes ordered an
  international arrest warrant.
