notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): cited by the us/cybercom/cmf-actor
  service-placement audit. The captured PDF (the edition served at the URL is
  dated June 25, 2025) describes the CMF ONLY as force structure, attributing no
  specific operation to it: "The Cyber Mission Force (CMF), CYBERCOM's
  operational arm, comprises several cyber mission forces. The CMF consists of
  the Cyber National Mission Force, the Cyber Protection Force, and the Cyber
  Combat Mission Force, each with their own associated mission teams." Every
  operational mention in the primer (China pre-positioning; the March 2025
  ordered pause on offensive ops against Russia) is attributed to CYBERCOM as
  posture/policy, never to "the CMF" as the named operator of a discrete
  operation. Supports DEMOTING us/cybercom/cmf-actor -> us/unscoped/cmf-actor
  (structural placeholder, not a sourced operational actor).
