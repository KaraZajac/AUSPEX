  Confirmed against primaries: (1) the 4 March 1999 public disclosure
  was ABC Nightly News, not Hamre testimony (Kaspersky "Penquin's
  Moonlit Maze" footnote 1: "Target Pentagon: Cyber-Attack Mounted
  Through Russia," ABC Nightly News, 4 March 1999); (2) Hamre's own
  account (PBS FRONTLINE, 18 Feb 2003) says the case "leaked out ...
  startlingly, from Congress" and "we do not know who did it" — he did
  NOT attribute Moonlight Maze to Russian state operators; (3) the
  "we're in the middle of a cyberwar" line traces to Newsweek (20 Sep
  1999), not a dated SASC transcript. Removed from event
  2007-01/moonlight-maze-retrospective (its only citer, now orphaned);
  the Hamre citation was re-sourced to
  pbs-frontline/2003-02-18_hamre-cyberwar-interview and the
  contemporaneous "traced to Russia" attribution re-anchored to
  nsarchive/moonlight-maze-archive.

  [original notes retained below]
