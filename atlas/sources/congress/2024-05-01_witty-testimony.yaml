notes: |
  Andrew Witty's written testimony (10 pp.) before the House Energy &
  Commerce Committee, Subcommittee on Oversight and Investigations,
  "Examining the Change Healthcare Cyberattack," May 1, 2024. THE
  primary-source record for the February 2024 ALPHV/BlackCat ransomware
  attack on Change Healthcare (UnitedHealth/Optum). Supporting quotes
  (raw snapshot, sha 8e672e9f…9f526e3b, 242,103 bytes):
  ATTRIBUTION + ransomware date (p.4): "On the morning of February 21, a
  cybercriminal calling themselves ALPHV or BlackCat deployed a
  ransomware attack inside Change Healthcare's information technology
  environments, encrypting Change's systems so we could not access them."
  INITIAL ACCESS (p.5): "On February 12, criminals used compromised
  credentials to remotely access a Change Healthcare Citrix portal, an
  application used to enable remote access to desktops. The portal did
  not have multi-factor authentication. Once the threat actor gained
  access, they moved laterally within the systems in more sophisticated
  ways and exfiltrated data. Ransomware was deployed nine days later."
  RANSOM DECISION (p.5): "As chief executive officer, the decision to pay
  a ransom was mine. This was one of the hardest decisions I've ever had
  to make." (NB the written testimony does NOT state the ~$22M figure —
  that is carried by Krebs/WIRED/TechCrunch.) DATA SCOPE (pp.5-6): files
  with PHI/PII "could cover a substantial proportion of people in
  America" (NB: NOT "one-third"/"110M" — the "maybe a third" line came
  from oral Q&A, not this written record; the hard counts of ~100M
  [Oct 2024] and ~190M [Jan 2025] are UnitedHealth's later disclosures).
  INCIDENT RESPONSE / Mandiant (p.7): "security teams from Mandiant and
  Palo Alto Networks." RECOVERY (pp.7-8): "By March 7, 99% of pre-incident
  pharmacies were able to process claims"; medical claims "flowing at near
  normal levels"; payment processing "at approximately 86% of pre-incident
  levels." PROVIDER HARDSHIP (p.2): "the rural family medicine practice
  struggling to make payroll."
