notes: |
  Cloudflare's disclosure of the same SMS-phishing (smishing) campaign
  that compromised Twilio and ~135 other companies in the
  "Oktapus" / "Scatter Swine" campaign. Cloudflare's hardware-key MFA
  blocked the intrusion attempt.
  AUDIT (2026-07-01, claude-opus-4.8/max): snapshot captured + hashed; tier
  raised secondary -> primary (Cloudflare's first-party account of its own
  incident). Verbatim support for event 2022-08/twilio-cloudflare-0ktapus:
  "Yesterday, August 8, 2022, Twilio shared that they'd been compromised by a
  targeted phishing attack"; the campaign began "2022-07-20 22:50 UTC" with "at
  least 76 employees" texted; "three Cloudflare employees fell for the phishing
  message and entered their credentials" but "every employee ... is issued a
  FIDO2-compliant security key from a vendor like YubiKey" with "origin binding",
  so "we confirmed that no Cloudflare systems were compromised".
