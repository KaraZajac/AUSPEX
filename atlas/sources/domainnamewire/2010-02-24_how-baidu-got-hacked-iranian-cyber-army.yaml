notes: |
  Domain Name Wire (Andrew Allemann, 2010-02-24), drawing on Baidu's
  lawsuit against Register.com, describing the Baidu hijack
  mechanism: the attacker opened a live chat with registrar
  Register.com posing as Baidu, got the account email changed to
  antiwahabi2008@gmail.com despite failing verification, then used
  the "forgot password" feature to seize the account and change the
  nameservers — in under an hour. Establishes the Baidu vector (US
  registrar Register.com social-engineering) as distinct from the
  Twitter vector (Dyn managed-DNS account password-reset).
