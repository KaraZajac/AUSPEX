notes: |
  Contemporaneous French trade-press coverage of Defence Minister
  Jean-Yves Le Drian's 12 December 2016 announcement (at the pôle
  d'excellence cyber, Bruz, Bretagne) of the future cyberdéfense
  command that would be formally stood up by the arrêté of 4 May
  2017. Corroborating secondary for event 2017-05/comcyber-stand-up.

  AUDIT (2026-07-11, claude-opus-4.8 / max): live article captured
  (HTTP 200, 80,647 B, sha256 9e2bee92…314c50e7). Carries verbatim:
  "Le ministre de la défense, Jean-Yves Le Drian, a annoncé la
  création d'un commandement de cyberdéfense afin de répondre aux
  enjeux de cybersécurité au plus haut niveau de l'Etat"; and
  "2 600 militaires appelés « combattants du numérique » placés sous
  la direction du commandeur qui répondra directement au chef
  d'état-major des armées", "épaulés par 4 400 réservistes en
  cybersécurité", deployment "d'ici 2019". Anchors the Le Drian
  authorship + the CEMA reporting line, and fixes the stand-up-era
  target headcount at ~2,600 (by 2019) — NOT the 3,200 LPM 2014-2019
  cumulative figure and NOT the ~3,600 current figure, so no personnel
  number is asserted in the event. (The article's HTML body is served
  with mixed encoding — some accented characters appear as mojibake in
  the raw bytes — but the ASCII substance is intact and the content was
  additionally WebFetch-verified.)
