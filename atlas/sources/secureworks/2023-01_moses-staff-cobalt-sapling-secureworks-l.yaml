  ATTRIBUTION — the source names the Iranian group and links the two personas but names NO Iranian service and asserts NO
  state sponsorship. Verbatim: "CTU analysis indicates that Abraham's Ax is another hacktivist group persona operated by
  the Iranian COBALT SAPLING threat group." Persona-link confidence: "suggesting they are likely operated by the same
  entity." Abraham's Ax "attacks government ministries in Saudi Arabia ... data allegedly stolen from attacks on the
  Ministry of the Interior" and claims "Hezbollah Ummah" affiliation for which Secureworks found "no evidence"; Moses Staff
  targets Israeli entities and individuals tied to "Israel's signals intelligence Unit 8200." Tooling named for the cluster
  includes the PyDCrypt loader, DCSrv wiper, StrifeWater RAT, and DriveGuard. Supports event facts and a named-actor /
  moderate ("likely") attribution; does NOT support any IRGC/MOIS service placement.
