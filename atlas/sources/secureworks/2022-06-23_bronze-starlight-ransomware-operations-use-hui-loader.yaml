notes: |
  The Secureworks CTU technical report (2022-06-23) that carries the
  detailed victimology behind BRONZE STARLIGHT's ransomware-as-cover
  thesis. Live-fetched 2026-07-01: the original secureworks.com/research
  URL 301-redirects post-Sophos-acquisition to
  sophos.com/en-us/research/bronze-starlight-ransomware-operations-use-hui-loader
  (HTTP 200, title "BRONZE STARLIGHT Ransomware Operations Use HUI Loader",
  JSON-LD datePublished 2022-06-23). Snapshot captured + hashed.
  AUDIT (2026-07-01, claude-opus-4.8/max): added to carry the victim/
  sector claims the generic BRONZE STARLIGHT threat profile does NOT
  state. Verbatim: "As of mid-April, a total of 21 victims had been
  listed across the AtomSilo, Rook, Night Sky, and Pandora leak sites.
  CTU researchers estimate that approximately 75% would be of interest
  to Chinese government-sponsored groups focused on espionage ... The
  victims include pharmaceutical companies in Brazil and the U.S., a
  U.S.-based media organization with offices in China and Hong Kong,
  electronic component designers and manufacturers in Lithuania and
  Japan, a law firm in the U.S., and an aerospace and defense division
  of an Indian conglomerate. The five victims that were not likely
  targeted for espionage include two real estate companies ... two
  small financial institutions ... and a small interior design company."
  Smokescreen thesis: "BRONZE STARLIGHT's main motivation may be
  intellectual property theft or cyberespionage rather than financial
  gain. The ransomware could distract incident responders ... and
  reduce the likelihood of attributing the malicious activity to a
  government-sponsored Chinese threat group." Families deployed:
  "LockFile, AtomSilo, Rook, Night Sky, and Pandora post-intrusion
  ransomware." NOTE on LockBit: a third-party (Trend Micro) linked HUI
  Loader samples to LockBit but CTU states "there is not enough evidence
  in the report for CTU researchers to validate this claim" — so
  Secureworks does NOT validate a LockBit tie. NOTE on service: the
  report associates BRONZE RIVERSIDE (APT10) with the MSS but does NOT
  place BRONZE STARLIGHT under the MSS (consistent with the actor's
  cn/unscoped placement). Consumed by event
  2022-06/bronze-starlight-ransomware-smokescreen.
