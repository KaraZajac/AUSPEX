notes: |
  Documents BRONZE STARLIGHT / DEV-0401 use of ransomware (LockFile,
  AtomSilo, Rook, Night Sky, Pandora) as cover for state-aligned
  IP-theft operations.
  URL preserved 2026-05-29 (Agent2): post-Sophos-acquisition the
  Secureworks threat-profile URLs now 301-redirect to a Sophos
  landing page that itself 404s. The threat-profile content was
  evidently not migrated. archive_url added pointing to a wayback
  snapshot from 2022-10-16 (last well-preserved live capture).
  AUDIT (2026-06-24, claude-opus-4.8/max): captured raw for the
  cn/unscoped/bronze-starlight service audit. The 2022 wayback captures
  (incl. the 2022-10-16 archive_url) are Angular SPA shells that never
  rendered the profile body — only the "China"/"Espionage" filter
  taxonomy. The profile prose IS preserved on the migrated Next.js site:
  raw_snapshot = wayback 2025-11-14 capture (HTTP 200, title "BRONZE
  STARLIGHT | Threat Profile Detail | Secureworks"). FINDING: the source
  attributes the group only at COUNTRY level, and hedges even that —
  "BRONZE STARLIGHT is located in China based on observed tradecraft,
  including the use of HUI Loader and PlugX which are associated with
  China-based threat group activity"; "It is plausible that BRONZE
  STARLIGHT deploys ransomware as a smokescreen ... with the underlying
  motivation of stealing intellectual property theft or conducting
  espionage." NO mention of the MSS / Ministry of State Security /
  government- or state-sponsored framing anywhere in the body (Objectives
  tag = "Espionage"; aliases credited to Microsoft and Sygnia). Does NOT
  support the former cn/mss placement → actor demoted to cn/unscoped.
