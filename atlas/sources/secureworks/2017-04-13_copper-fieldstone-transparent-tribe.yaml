notes: |
  Secureworks CTU threat profile for COPPER FIELDSTONE — Secureworks'
  designation for the cluster known as Transparent Tribe / APT36 /
  Mythic Leopard, attributed to Pakistani state interests.

  AUDIT (2026-06-24, claude-opus-4.8/max): the live secureworks.com URL now
  301-redirects to sophos.com/en-us/threat-profiles/ (Sophos acquisition; the
  profile database renders empty), so the profile body was recovered from the
  Wayback id_ raw snapshot (raw_snapshot above; the cited archive_url) and saved.
  Finding: attributes to the COUNTRY, not the ISI — "COPPER FIELDSTONE is a threat
  group operating out of Pakistan targeting primarily Indian diplomatic and
  military personnel." The words "ISI" / "Inter-Services Intelligence" do NOT
  appear. Supports a Pakistan nexus but NOT the ISI service placement.
