ttp_summary: |
  Russia-nexus information-manipulation / disinformation operation tracked by Microsoft Threat
  Intelligence under the temporary designation "Storm-1516" (equated by MISP galaxy with
  "CopyCop"). Runs coordinated inauthentic influence campaigns — fabricated stories, AI-generated
  and laundered content, and spoofed/cloned reputable news and institutional outlets — to seed and
  amplify pro-Kremlin narratives and destabilizing disinformation against Western states. France's
  VIGINUM/SGDSN assessed the operation in a May 2025 technical report as operating from Russia with
  ties to the Kremlin, published alongside the French Ministry for Europe and Foreign Affairs
  condemning Russia's "destabilizing activities."
