ttp_summary: |
  Placeholder cluster for COMCYBER-attributed military cyber
  operations. Public reporting of specific COMCYBER cluster
  activity is thin: France's military cyber doctrine (LIO 2019,
  LII 2021) is publicly declared but specific operations are
  almost never publicly attributed by Paris and have not been
  vendor-clustered with the consistency that Animal Farm enjoys.

  AUSPEX maintains the entry to give events that are publicly
  framed as COMCYBER military cyber action (e.g., declared
  Sahel-theater information operations under LII; declared
  cyber-effects support to Operation Barkhane and successor
  postures) a service-level home. Events that fit COMCYBER's
  mandate but lack public attribution should be tagged at
  service level (fr/comcyber) with actor_id null per the §9
  doctrine-without-attribution convention.
default_doctrine_alignment_ids:
  - fr/lutte-informatique-offensive/military-cyber-effects
  - fr/lutte-informatique-influence/military-information-operations
