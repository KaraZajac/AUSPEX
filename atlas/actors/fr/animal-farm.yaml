# only a "French intelligence agency" / French-state origin — NONE names the DGSE (or its Technical
# Directorate) specifically. G Data quotes the CSEC slide verbatim — SNOWGLOBE "put forth by a French
# intelligence agency" — and refers to "a 'French intelligence community'"; ESET says only that "France
