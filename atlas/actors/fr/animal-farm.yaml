ttp_summary: |
  Operator cluster associated with the Animal Farm tooling family,
  comprising at minimum Babar (espionage RAT, French-language PDB
  paths, "MEDIA-MOTHER" artifact), Casper (April 2014 Syrian
  watering-hole deployment via the Jubilee.sy compromised Ministry
  of Justice site), Bunny / EvilBunny (Lua-scripted dropper), Dino
  (modular espionage platform, Iranian targeting per ESET),
  NBot (DDoS / disruption tool), and Tafacalou. Targeting heavily
  Iranian, Syrian, and African theaters per Kaspersky / ESET
  telemetry. French-language artifacts include strings, PDB paths,
  and code-comment idiom inconsistent with Anglo-Saxon or Russian
  origin.

  Attribution to French intelligence rests on (a) the Le Monde
  March 2014 reporting of CSEC Snowden slides naming Snowglobe as
  a French operation, (b) vendor consensus across ESET, G Data,
  Cyphort, and Kaspersky 2014-2015 on shared tooling and
  development-pipeline indicators, and (c) targeting patterns
  consistent with French foreign-intelligence priorities (Syria
  during the civil war, Iran, Francophone Africa, EU institutions).
  France has not formally acknowledged the cluster.
default_doctrine_alignment_ids:
  - fr/lutte-informatique-offensive/intelligence-preparation
  - fr/revue-strategique-cyberdefense-2018/offensive-capability
auspex_assessment: |
  `concur` on attribution to *French intelligence* at the
  nation/service-generic level with moderate confidence: the
  vendor + Le Monde consensus that Animal Farm is a French-state
  operation is robust (CSEC, via Le Monde, assessed Snowglobe
  "put forth by a French intelligence agency"). But NO cited source
  names the DGSE — let alone its Technical Directorate — so the
  specific-service placement is an AUSPEX inference, not a sourced
  attribution; the actor is therefore held at fr/unscoped pending a
  cited source that names a French service. Absent formal French
  attestation the attribution also lacks tier-1 government
  confirmation. The 2018 Revue stratégique and 2019 LIO doctrine
  codify the institutional *capability* publicly without naming
  Animal Farm operations specifically. AUSPEX uses the cluster
  name in event tagging and records the non-attestation in the
  auspex_assessment field on each event.
notes: |
  Former id fr/dgse/animal-farm (primary_service_id fr/dgse/technical-directorate,
  additional_service_ids [fr/dgse]). DEMOTED to fr/unscoped on 2026-06-24
  (claude-opus-4.8/max) after auditing the service placement against the actor's
  five cited sources, captured + hashed locally. France/French-state origin is
  well-supported, but NO source names the DGSE or its Technical Directorate:
    • G Data (2015-02-18) quotes the CSEC slide verbatim — "CSEC assesses, with
      moderate certainty, SNOWGLOBE to be a state-sponsored CNO [Cyber Network
      Operation] effort, put forth by a French intelligence agency" — and notes
      "The assertion of a 'French intelligence community' being responsible
      remains unchanged." Generic, never DGSE.
    • ESET / Casper (2015-03-05): "French newspaper Le Monde revealed that France
      is suspected by the Communications Security Establishment Canada (CSEC) of
      having developed and deployed malicious software"; and of Casper itself,
      "no signs of French origin … were found in the binaries." France-level only.
    • Kaspersky / "Animals in the APT Farm" (2015-03-06): does NOT attribute to
      France at all — its only "France"/"French" occurrences are an Occitan-language
      etymology aside about the string "Ta Fa Calou."
    • Cyphort / Babar (2015-02-18): url:null (Cyphort acquired by Juniper 2017,
      original blog dead) — unfetchable, so no raw snapshot; per its YAML notes a
      technical reverse of the same Babar/Snowglobe implant, no service named.
    • Le Monde (2014-03-21): live URL paywalled (HTTP 402) and web.archive.org
      blocked in this environment — unfetchable here, no raw snapshot. The actor's
      and the source's own notes, the literature, and the CSEC slide G Data quotes
      verbatim uniformly describe Le Monde as tracing Snowglobe to "French
      intelligence" / "la piste française," never to the DGSE by name.
  The MISP galaxy entry (Animal Farm / ATK8, 3b8e7462-c83f-4e7d-9511-2fe430d80aab)
  is a clustering signal only and asserts no specific service. The DGSE / Technical
  Directorate attribution is thus an AUSPEX inference (as auspex_assessment already
  conceded), not a cited attribution — held at fr/unscoped until a source names a
  French service. FK-propagated id change to the 3 referencing events on 2026-06-24,
  whose per-attribution service_id: fr/dgse/technical-directorate overrides (likewise
  unsourced) were set to null.
