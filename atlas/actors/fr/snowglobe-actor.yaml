ttp_summary: |
  The Snowglobe label is the CSEC analyst cluster name reported by
  Le Monde in March 2014, derived from leaked Snowden slides.
  CSEC framed Snowglobe as a French-state cyber-espionage
  operation, with internal sub-clusters Snowglobe-A and
  Snowglobe-B reflecting differing tradecraft. Subsequent vendor
  reverse-engineering (ESET, G Data, Cyphort, Kaspersky 2014-2015)
  joined the Snowglobe cluster to the Animal Farm tooling family.

  AUSPEX maintains a separate Snowglobe actor entry because the
  CSEC cluster framing pre-dates the Animal Farm vendor cluster
  and because some events in the public record (Iranian targeting
  2009-2013) are referenced specifically against Snowglobe in
  Le Monde reporting without confirmed link to a specific Animal
  Farm tool. The two clusters may be co-extensive operationally;
  AUSPEX preserves the distinction for editorial honesty about the
  source framing.
default_doctrine_alignment_ids:
  - fr/lutte-informatique-offensive/intelligence-preparation
auspex_assessment: |
  `concur-with-caveat`: Le Monde / Snowden derivation is single-
  source-class at the cluster-naming level (CSEC is the only
  attributing organization in the public record); subsequent
  vendor work corroborates Snowglobe → Animal Farm linkage but
  not all Snowglobe activity has been mapped to a named tool.
  Cluster boundary with fr/dgse/animal-farm is fuzzy.
sources:
