ttp_summary: |
  The Snowglobe label is the CSEC analyst cluster name reported by
  Le Monde in March 2014, derived from leaked Snowden slides.
  CSEC framed Snowglobe as a French-state cyber-espionage
  operation, with internal sub-clusters Snowglobe-A and
  Snowglobe-B reflecting differing tradecraft. Subsequent vendor
  reverse-engineering (ESET, G Data, Cyphort, Kaspersky 2014-2015)
  joined the Snowglobe cluster to the Animal Farm tooling family.

  AUSPEX maintains a separate Snowglobe actor entry because the
  CSEC cluster framing pre-dates the Animal Farm vendor cluster
  and because some events in the public record (Iranian targeting
  2009-2013) are referenced specifically against Snowglobe in
  Le Monde reporting without confirmed link to a specific Animal
  Farm tool. The two clusters may be co-extensive operationally;
  AUSPEX preserves the distinction for editorial honesty about the
  source framing.
default_doctrine_alignment_ids:
  - fr/lutte-informatique-offensive/intelligence-preparation
auspex_assessment: |
  `concur-with-caveat`: Le Monde / Snowden derivation is single-
  source-class at the cluster-naming level (CSEC is the only
  attributing organization in the public record); subsequent
  vendor work corroborates Snowglobe → Animal Farm linkage but
  not all Snowglobe activity has been mapped to a named tool.
  Cluster boundary with fr/unscoped/animal-farm is fuzzy.

  Service placement: `concur-with-caveat` on attribution to *French
  intelligence* at the nation/service-generic level only — NO cited
  source names the DGSE (let alone its Technical Directorate), so the
  specific-service placement was an AUSPEX inference, not a sourced
  attribution; the actor is held at fr/unscoped pending a cited source
  that names a French service (mirroring the parent fr/unscoped/animal-farm
  and sibling fr/unscoped/casper-actor).
notes: |
  Former id fr/dgse/snowglobe-actor (primary_service_id fr/dgse/technical-directorate,
  additional_service_ids [fr/dgse]). DEMOTED to fr/unscoped on 2026-06-24
  (claude-opus-4.8/max) after auditing the service placement against the actor's
  two cited sources. France/French-state origin is well-supported, but NEITHER source
  names the DGSE or its Technical Directorate, nor any specific French service:
    • Le Monde / "la piste française du cyberespionnage" (2014-03-21) — the originating
      CSEC/Snowden disclosure. UNFETCHABLE for raw capture in this environment (live
      lemonde.fr URL returns HTTP 402 "Accès restreint" paywall stub, re-confirmed
      2026-06-24; web.archive.org blocked), so no raw_snapshot/sha. It attributes only
      at the generic level: the CSEC slide it relayed (quoted verbatim by G Data,
      2015-02-18) assessed SNOWGLOBE "put forth by a French intelligence agency," and
      the article's own title is "la piste française." It traces Snowglobe to "French
      intelligence" / the "French trail," NOT to the DGSE by name.
    • Kaspersky / "Animals in the APT Farm" (2015-03-06) — captured raw + hashed locally
      (content_sha256 verified OK 2026-06-24). Does NOT attribute to France at all: a
      grep of the 180 KB snapshot finds no "DGSE", no "Technical Directorate", no "French
      intelligence" / "intelligence agency"; its only "France"/"French" occurrence is an
      Occitan-language etymology aside about the attacker's internal tool name "Ta Fa Calou"
      ("the French interpretation of the Occitane 'Fa Calor'"; Occitan "is a Romance language
      spoken in southern France"). Supports cluster membership (Tafacalou fronting Babar/Dino)
      only, names no intelligence service.
  The MISP galaxy entry (Animal Farm / SNOWGLOBE / ATK8, 3b8e7462-c83f-4e7d-9511-2fe430d80aab)
  is a clustering signal only and asserts no specific service. The DGSE / Technical Directorate
  attribution is thus an AUSPEX inference (as auspex_assessment already conceded), not a cited
  attribution — held at fr/unscoped until a source names a French service. FK-propagated id
  change to the 1 referencing event (2014-03/snowglobe-le-monde-attribution) on 2026-06-24,
  whose per-attribution service_id: fr/dgse/technical-directorate override (likewise unsourced)
  was set to null.
