# Demoted to fr/unscoped 2026-06-24 (claude-opus-4.8/max): the actor's own two cited sources
# establish only a "French intelligence agency" / French-state origin — NEITHER names the DGSE
# (or its Technical Directorate), nor any specific French service. Le Monde (the originating
# report) is the CSEC/Snowden disclosure that traced Snowglobe to "French intelligence" / "la
# piste française" — and the CSEC slide it relayed (quoted verbatim by G Data) reads SNOWGLOBE
# "put forth by a French intelligence agency," generic, never the DGSE; Kaspersky's "Animals in
# the APT Farm" does not attribute to France at all (its only "French" mention is an Occitan-
# etymology aside on "Ta Fa Calou"). The DGSE/Technical-Directorate placement is an AUSPEX
# inference, not a sourced attribution — mirroring the parent fr/unscoped/animal-farm and sibling
# fr/unscoped/casper-actor demotions of the same date, off the same evidence base.
