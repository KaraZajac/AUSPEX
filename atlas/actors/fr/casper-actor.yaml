ttp_summary: |
  Operator cluster within the Animal Farm family responsible for
  the April 2014 Syrian watering-hole campaign via the Jubilee.sy
  Syrian Ministry of Justice website. The Casper implant exploited
  CVE-2014-0515 (Flash) to deliver a multi-stage backdoor. ESET's
  March 2015 disclosure named the tool Casper and traced French-
  language code artifacts ("MEDIA-MOTHER" PDB strings) consistent
  with Babar and Bunny.

  AUSPEX records Casper as a distinct operator cluster within the
  Animal Farm parent because the Syrian targeting profile (Syrian
  state actors and opposition during the civil war, 2014 timeframe)
  is editorially separable from the broader Iranian / Francophone-
  Africa Snowglobe targeting and because the Casper-specific
  tradecraft (Flash 0-day deployment via watering-hole) is
  distinct from Babar / Dino implant-delivery patterns.
default_doctrine_alignment_ids:
  - fr/lutte-informatique-offensive/intelligence-preparation
auspex_assessment: |
  `concur-with-caveat`: vendor-attributed (ESET, Kaspersky) Animal
  Farm subset operating against Syrian targets; cluster boundary
  with the broader Animal Farm operator may be a stylistic
  separation rather than a unit separation.
sources:
  - eset/2015-03-05_casper-malware-babar-bunny
  - kaspersky/2015-03-06_animals-in-the-apt-farm
