# Demoted to fr/unscoped 2026-06-24 (claude-opus-4.8/max): the actor's own two cited sources
# establish only a "France"/French-state suspicion — NEITHER names the DGSE (or its Technical
# Directorate), nor any specific French service. ESET/Casper attributes at the nation level only
# ("France is suspected by the Communications Security Establishment Canada (CSEC) of having
# developed and deployed malicious software") and finds of Casper itself "no signs of French
# origin … were found in the binaries"; Kaspersky's "Animals in the APT Farm" does not attribute
# to France at all (its only "French" mention is an Occitan-etymology aside on "Ta Fa Calou").
# The DGSE/Technical-Directorate placement is an AUSPEX inference, not a sourced attribution —
# mirroring the parent fr/unscoped/animal-farm demotion of the same date, off the same evidence base.
id: fr/unscoped/casper-actor
primary_service_id: fr/unscoped
additional_service_ids: []
canonical_name: Casper operator
aliases:
  - alias: Casper
    assigning_org: ESET (Joan Calvet, WeLiveSecurity, March 2015)
    confidence: equivalent
  - alias: Tafacalou
    assigning_org: Kaspersky GReAT (Animals in the APT Farm, March 2015)
    confidence: overlapping
    note: |
      Kaspersky's Tafacalou string and Casper as analyzed by ESET
      both reference the same April 2014 Syrian watering-hole
      campaign; whether Casper and Tafacalou are co-extensive
      tool variants or two stages of the same operation is
      unsettled.
active_since: 2014-04-01  # April 2014 Syrian watering-hole deployment
active_until: null
status: active
mission:
  - espionage
target_sector_ids:
  - government
  - government/foreign-ministry
ttp_summary: |
  Operator cluster within the Animal Farm family responsible for
  the April 2014 Syrian watering-hole campaign via the jpic.gov.sy
  Syrian Ministry of Justice website. [2026-07-05: corrected the host
  from the fabricated "Jubilee.sy" — ESET's raw names jpic.gov.sy.]
  The Casper implant exploited
  CVE-2014-0515 (Flash) to deliver a multi-stage backdoor. ESET's
  March 2015 disclosure named the tool Casper and traced French-
  language code artifacts ("MEDIA-MOTHER" PDB strings) consistent
  with Babar and Bunny.

  AUSPEX records Casper as a distinct operator cluster within the
  Animal Farm parent because the Syrian targeting profile (Syrian
  state actors and opposition during the civil war, 2014 timeframe)
  is editorially separable from the broader Iranian / Francophone-
  Africa Snowglobe targeting and because the Casper-specific
  tradecraft (Flash 0-day deployment via watering-hole) is
  distinct from Babar / Dino implant-delivery patterns.
default_doctrine_alignment_ids:
  - fr/lutte-informatique-offensive/intelligence-preparation
auspex_assessment: |
  `concur-with-caveat` on attribution to *French intelligence* at the
  nation/service-generic level: the vendor-attributed (ESET, Kaspersky)
  Animal Farm subset operating against Syrian targets is robust, but NO
  cited source names the DGSE — let alone its Technical Directorate — so
  the specific-service placement is an AUSPEX inference, not a sourced
  attribution; the actor is held at fr/unscoped pending a cited source
  that names a French service (mirroring the parent fr/unscoped/animal-farm).
  The cluster boundary with the broader Animal Farm operator may also be a
  stylistic separation rather than a unit separation.
notes: |
  Former id fr/dgse/casper-actor (primary_service_id fr/dgse/technical-directorate,
  additional_service_ids [fr/dgse]). DEMOTED to fr/unscoped on 2026-06-24
  (claude-opus-4.8/max) after auditing the service placement against the actor's
  two cited sources, both captured + hashed locally (and shared with the parent
  fr/unscoped/animal-farm record). France/French-state suspicion is supported, but
  NEITHER source names the DGSE or its Technical Directorate, nor any specific French
  service:
    • ESET / Casper (welivesecurity, 2015-03-05) attributes only at the nation level —
      "In March 2014, French newspaper Le Monde revealed that France is suspected by
      the Communications Security Establishment Canada (CSEC) of having developed and
      deployed malicious software for espionage purposes" — and of Casper itself states
      "no signs of French origin, as suggested by CSEC for Babar, were found in the
      binaries." No DGSE, no French service named.
    • Kaspersky / "Animals in the APT Farm" (2015-03-06) does NOT attribute to France at
      all — its only "France"/"French" occurrence is an Occitan-language etymology aside
      about the internal tool name "Ta Fa Calou" ("'Fa Calou' is the French interpretation
      of the Occitane 'Fa Calor' which means 'it's getting hot'"; Occitan is "spoken in
      southern France"). Supports cluster membership only, names no intelligence service.
  Casper carries no MISP galaxy entry of its own; MISP corroboration is only via the parent
  Animal Farm / ATK8 cluster (3b8e7462-c83f-4e7d-9511-2fe430d80aab), which is a clustering
  signal and asserts no specific service. The DGSE / Technical Directorate attribution is thus
  an AUSPEX inference (as auspex_assessment already conceded), not a cited attribution — held at
  fr/unscoped until a source names a French service. FK-propagated id change to the 1 referencing
  event (2015-03/casper-syria-eset-disclosure) on 2026-06-24, whose per-attribution
  service_id: fr/dgse/technical-directorate override (likewise unsourced) was set to null.
sources:
  - eset/2015-03-05_casper-malware-babar-bunny
  - kaspersky/2015-03-06_animals-in-the-apt-farm
