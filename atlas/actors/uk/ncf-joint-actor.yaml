ttp_summary: |
  Operator cluster of the joint MoD–GCHQ National Cyber Force.
  Public operational footprint is extremely limited: NCF has
  acknowledged "hundreds of operations" since 2020 in aggregate
  without per-operation attribution. Doctrinally articulated focus
  on cognitive-effect operations (degrading adversary confidence
  and decision-making) below the armed-conflict threshold, against
  counter-terrorism, counter-state, and counter-serious-crime
  targets.

  Specific operations publicly hinted at: continuation of UK
  contribution to Daesh / ISIS online presence disruption following
  the prior MoD partner contribution to the US Joint Task Force ARES
  / Op GLOWING SYMPHONY campaign. No specific NCF-attributed
  operation has been formally named by HM Government at the time
  of operation as of 2026-05.
