auspex_assessment: |
  Stub. AUSPEX expects this entry to remain thin until either
  (a) NCF starts publicly naming specific operations, or (b) a
  Snowden-scale leak surfaces NCF operational detail. Until then,
  events tagged here should be limited to those where HM
  Government has publicly acknowledged NCF involvement.
