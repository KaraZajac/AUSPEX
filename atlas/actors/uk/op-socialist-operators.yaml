id: uk/gchq/op-socialist-operators
primary_service_id: uk/gchq
additional_service_ids: []
canonical_name: Operation Socialist Operators (GCHQ MyNOC / NAC)
aliases:
  - alias: GCHQ MyNOC
    assigning_org: GCHQ (internal designator per Snowden NOC materials)
    confidence: overlapping
    note: |
      MyNOC ("My Network Operations Centre") is the GCHQ internal
      cell most directly referenced in the Operation Socialist
      slides. Whether MyNOC and the broader Network Analysis
      Centre (NAC) are the same operational cell or coordinating
      cells is not publicly resolved.
  - alias: NAC
    assigning_org: GCHQ (Network Analysis Centre)
    confidence: overlapping
active_since: 2010-05-01
active_until: 2013-09-20  # operationally disrupted by Belgacom remediation post Spiegel disclosure
status: dormant
mission:
  - espionage
target_sector_ids:
  - ict/telecom
  - ict/telecom/carrier
ttp_summary: |
  Operators behind the Belgacom / BICS compromise (2010-2013).
  Initial access via Quantum Insert — fake LinkedIn pages serving
  exploits to specifically targeted Belgacom engineers identified
  via prior SIGINT. Lateral movement to Belgacom International
  Carrier Services (BICS), one of the world's largest GRX (GPRS
  Roaming Exchange) and SS7 hubs, providing access to international
  mobile roaming and signalling traffic across Europe, the Middle
  East and Africa.

  Persistence via the Regin / WARRIORPRIDE platform (see
  uk/gchq/regin-operators). The cluster boundary between "Op
  Socialist operators" (the human operators / cell) and "Regin
  operators" (the platform users) is fuzzy in public reporting;
  AUSPEX models them as overlapping but distinct because Regin
  was deployed against many more targets than Op Socialist alone.
default_doctrine_alignment_ids:
  - uk/five-eyes
  - uk/ncs-2016
auspex_assessment: |
  `concur` on GCHQ attribution: Snowden archive (2013), Der Spiegel
  publication of the Op Socialist briefing slides (2013-09-20), The
  Intercept's full reconstruction (2014-12-13), and the Belgian
  federal prosecutor's February 2018 formal attribution to GCHQ
  together establish attribution beyond reasonable doubt. UK
  government has not formally attested.
sources:
