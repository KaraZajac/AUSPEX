# uk/gchq placement VERIFIED 2026-06-25 (claude-opus-4.8/max) against this actor's own
# cited sources. KEPT. Of the 3 cited sources, two are fetchable primaries that name GCHQ
# explicitly AND at the named-Operation-Socialist level (both raw snapshots re-hashed this
# audit and intact):
#  • intercept/2014-12-13_operation-socialist (The Intercept): "documents from National
#    Security Agency whistleblower Edward Snowden confirmed that British surveillance agency
#    Government Communications Headquarters was behind the attack, codenamed Operation
#    Socialist" + title "Operation Socialist: How GCHQ Spies Hacked Belgium's Largest Telco".
#  • spiegel/2013-09-20_socialist-belgacom (Der Spiegel): "Britain's GCHQ intelligence service
#    was behind a cyber attack against Belgacom ... conducted under the codename 'Operation
#    Socialist'", and (corroborating the NAC alias here) "The head of GCHQ's Network Analysis
#    Centre (NAC) described Operation Socialist in the presentation as a 'success'".
# The third source, belgian-prosecutor/2018-02_belgacom-attribution, is govt-primary
# corroboration (Feb 2018 Belgian prosecutorial attribution to GCHQ) but is UNFETCHABLE
# (url null — no canonical press release; archive.org blocked) so carries no raw snapshot.
# Two fetchable primaries naming GCHQ at the named-op level = the GCHQ placement stands.
# MISP-galaxy threat-actor.json is not vendored in this repo, so no MISP cross-walk was
# performed; external_refs.misp_galaxy is null. No event actor_id changes (KEEP).
id: uk/gchq/op-socialist-operators
primary_service_id: uk/gchq
additional_service_ids: []
canonical_name: Operation Socialist Operators (GCHQ MyNOC / NAC)
aliases:
  - alias: GCHQ MyNOC
    assigning_org: GCHQ (internal designator per Snowden NOC materials)
    confidence: overlapping
    note: |
      MyNOC ("My Network Operations Centre") is the GCHQ internal
      cell most directly referenced in the Operation Socialist
      slides. Whether MyNOC and the broader Network Analysis
      Centre (NAC) are the same operational cell or coordinating
      cells is not publicly resolved.
  - alias: NAC
    assigning_org: GCHQ (Network Analysis Centre)
    confidence: overlapping
active_since: 2010-05-01
active_until: 2013-09-20  # operationally disrupted by Belgacom remediation post Spiegel disclosure
status: dormant
mission:
  - espionage
target_sector_ids:
