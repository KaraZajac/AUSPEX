auspex_assessment: |
  `concur` on joint GCHQ + NSA attribution: Symantec 2014 + Kaspersky
  2015 technical clustering + Snowden QWERTY corroboration + Der
  Spiegel publication of NSA SIDtoday WARRIORPRIDE materials together
  establish attribution beyond reasonable doubt. AUSPEX models this
  actor under uk/gchq as the primary operator (GCHQ ran Op Socialist,
  the most prominent attributable Regin deployment); NSA is the
  co-operator under us/nsa/tao via additional_service_ids. The
  parallel event entry under us/nsa/equation-group remains for the
  US-leg of the Five Eyes record.
