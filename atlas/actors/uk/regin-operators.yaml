ttp_summary: |
  Highly modular multi-stage CNE platform. Six-stage architecture
  with encrypted virtual file system; modules included a GSM
  base-station monitoring capability (Stage 5 GSM module), targeted
  collection from EU institutions and member-state telecoms, and
  the QWERTY keylogger documented in Snowden NSA SIDtoday materials.
  Operators targeted Belgacom (Operation Socialist 2010-13), the
  EU's diplomatic networks, the IAEA (alleged), and roughly a dozen
  states across the Middle East and Asia per Symantec / Kaspersky
  telemetry. Code-overlap between QWERTY (Snowden archive) and Regin
  Stage 5 modules established Five Eyes attribution.
default_doctrine_alignment_ids:
