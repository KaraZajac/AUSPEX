id: uk/gchq/cne-actor
primary_service_id: uk/gchq
additional_service_ids: []
canonical_name: GCHQ Computer Network Exploitation cell (generic)
aliases:
  - alias: CNE
    assigning_org: GCHQ (Computer Network Exploitation, internal function name)
    confidence: equivalent
  - alias: JTRIG
    assigning_org: GCHQ (Joint Threat Research Intelligence Group)
    confidence: overlapping
    note: |
      JTRIG is the GCHQ unit responsible for online influence
      operations and "effects" rather than pure exploitation,
      but is grouped here for AUSPEX tagging convenience where
      the Snowden archive references it; AUSPEX may split JTRIG
      into a separate actor entry if the reporting volume warrants.
active_since: 2000-01-01  # placeholder; CNE function predates the Snowden window
active_until: null
status: active
mission:
  - espionage
  - influence
target_sector_ids:
  - government
  - ict/telecom
ttp_summary: |
  Generic placeholder cluster for GCHQ CNE operations documented in
  the Snowden archive (2013) that are not specifically attributable
  to the Op Socialist or Regin operator clusters. Includes Cable &
  Wireless / Vodafone Cable upstream collection partnerships
  (TEMPORA), the FOXACID / MUSCULAR-equivalent UK-side capability,
  and JTRIG online-effects operations.

  AUSPEX uses this entry sparingly: most named GCHQ-attributable
  operations should anchor to the more specific actor clusters
  (Op Socialist, Regin) where the source record supports it.
default_doctrine_alignment_ids:
  - uk/five-eyes
  - uk/ncs-2016
auspex_assessment: |
  `concur-with-caveat`. The CNE function inside GCHQ is uncontested,
  but treating it as a discrete "actor" risks vendor-style cluster
  inflation. AUSPEX prefers the more specific clusters above and
  reserves this entry for events where the source attributes to
  GCHQ generically without sub-cluster specificity.
sources:
  - guardian/2013-06-21_gchq-tempora
  - intercept/2014-12-13_operation-socialist
  - intercept/snowden-archive
