target_sector_ids:
  - government
  - ict/telecom
ttp_summary: |
  Generic placeholder cluster for GCHQ CNE operations documented in
  the Snowden archive (2013) that are not specifically attributable
  to the Op Socialist or Regin operator clusters. Includes Cable &
  Wireless / Vodafone Cable upstream collection partnerships
  (TEMPORA), the FOXACID / MUSCULAR-equivalent UK-side capability,
  and JTRIG online-effects operations.

  AUSPEX uses this entry sparingly: most named GCHQ-attributable
  operations should anchor to the more specific actor clusters
  (Op Socialist, Regin) where the source record supports it.
default_doctrine_alignment_ids:
  - uk/five-eyes
  - uk/ncs-2016
auspex_assessment: |
  `concur-with-caveat`. The CNE function inside GCHQ is uncontested,
  but treating it as a discrete "actor" risks vendor-style cluster
  inflation. AUSPEX prefers the more specific clusters above and
  reserves this entry for events where the source attributes to
  GCHQ generically without sub-cluster specificity.
notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max — LLM service-placement audit):
  VERDICT = KEEP the uk/gchq SERVICE placement. NOT demoted.

  This actor was flagged as a possible structural placeholder in the
  same family as the demoted fr/unscoped/joint-actor (COMCYBER) and
  kr/unscoped/joint-actor (COC) siblings, and it IS a deliberately-generic
  GCHQ bucket (canonical_name "(generic)"; ttp_summary calls it a "Generic
  placeholder cluster"). But it differs from those two demotion cases on
  the dimension that the audit turns on — whether the claimed SERVICE is
  source-named — and so the outcome is the opposite:

  (1) The claimed service is uk/gchq (GCHQ-the-organisation), NOT a
  specific named sub-unit. Two of the three cited sources name GCHQ
  explicitly as the operator of specific named programmes:
    - guardian/2013-06-21_gchq-tempora: "Britain's spy agency GCHQ has
      secretly gained access to the network of cables ..."; "That
      operation, codenamed Tempora, has been running for some 18 months."
    - intercept/2014-12-13_operation-socialist: Snowden documents
      "confirmed that British surveillance agency Government Communications
      Headquarters was behind the attack, codenamed Operation Socialist"
      ("the secret GCHQ hacking operation").
  (The third source, intercept/snowden-archive, is a generic SIDtoday
  index that names no specific op — provenance only.) The fr/kr siblings
  had NO source naming COMCYBER/COC as operator of anything (empty or
  tertiary-only sourcing); here GCHQ-as-operator is directly attested at
  the org level. The service claim is therefore source-supported, which is
  the KEEP test.

  (2) NOT a retire-candidate. Unlike the fr/kr placeholders (0 referencing
  events), this actor is in active, sourced use by 6 events, all GCHQ
  Snowden-disclosure programmes: 2013-06/gchq-tempora-disclosure,
  2013-09/bullrun-edgehill-disclosure, 2013-10/muscular-google-yahoo-
  disclosure, 2014-08/hacienda-programme-disclosure,
  2014-11/cable-wireless-gchq-partnership, 2015-09/karma-police-disclosure.
  Each carries high-confidence GCHQ attribution by Snowden-archive
  documentary evidence. None claims attribution_level: named-unit, so the
  generic bucket is not over-specified.

  CAVEATS (do not rise to demotion):
    - Most of these programmes (TEMPORA, MUSCULAR, KARMA POLICE, HACIENDA,
      Cable & Wireless) are bulk cable-tap / port-scan SIGINT — special-
      source exploitation rather than active CNE in the strict sense. The
      actor's "CNE" label is thus broader than literal network exploitation;
      it functions as a generic "GCHQ offensive/collection programme"
      bucket. This is a naming/scoping note for Kara, not a sourcing defect.
    - The actor record explicitly disclaims Op Socialist and Regin, yet the
      intercept/2014-12-13_operation-socialist source IS cited here. That
      source corroborates GCHQ-conducts-named-CNE generally but actually
      documents the separate (finer) Op Socialist cluster; consider re-
      homing that citation, or the Op Socialist events, to a dedicated
      uk/gchq/op-socialist cluster if one is created. Left as-is (no
      mandate to restructure clusters in this audit).
    - MISP-galaxy corroboration: NONE. MISP threat-actor.json (1,012
      entries) has no GCHQ / JTRIG / CNE actor and no UK/GB-attributed
      actor at all (the only "United Kingdom" strings are victim-country
      mentions inside CN/IR/etc. actor descriptions; the SIGINT sibling it
      DOES track is Equation Group = NSA, country US). Expected — vendors
      do not cluster allied SIGINT agencies as threat actors. This neither
      supports nor undermines the placement, which rests on the primary
      Snowden disclosures naming GCHQ, not on vendor clustering.

  Raw snapshots + SHA-256 captured on all three cited sources
  (2026-06-25). No id change, no primary_service_id change, no FK
  propagation, no event edits.
sources:
  - guardian/2013-06-21_gchq-tempora
  - intercept/2014-12-13_operation-socialist
  - intercept/snowden-archive
