ttp_summary: |
  Commercial hack-for-hire vendor based in Delhi, founded and
  operated by Sumit Gupta (charged in the US in 2015 in a
  separate hack-for-hire matter). Tradecraft is unremarkable —
  credential phishing at scale via custom email lures with
  shortened-URL trackers, no novel malware — but the operational
  scale is large: Citizen Lab documented 28,000+ targeted accounts
  across "seven years," with clients spanning US litigation
  finance firms, advocacy NGOs' adversaries (notably the climate-
  litigation #ExxonKnew defendants), short-sellers, oligarchs,
  and law firms. The 2022 US conviction of Israeli private
  investigator Aviram Azari (SDNY) is the canonical hub linking
  BellTroX to its clientele.
