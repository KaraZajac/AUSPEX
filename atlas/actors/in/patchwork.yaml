ttp_summary: |
  Long-running Indian-aligned APT with a "patchwork" tooling
  fingerprint (recycled commodity and open-source malware
  stitched into custom delivery chains, hence the name).
  Tradecraft includes weaponized Office documents, the
  BADNEWS / NDiskMonitor / TINYTYPHON implants, and PowerShell
  loaders. Targeting profile is broader than SideWinder's,
  with a substantial PRC-related dimension (think tanks
  studying China, Chinese diplomatic posts in South Asia),
  supplementing the Pakistani and regional
  diplomatic-collection set.
notes: |
  Former id in/ntro/patchwork (asserted an unsourced India-NTRO placement). Demoted to
  in/unscoped on 2026-06-24 after auditing the actor's five cited sources against the NTRO claim;
  none names the NTRO, the National Technical Research Organisation, R&AW, or any specific Indian
  service. Exact wording reached by each cited source:
  - MITRE ATT&CK G0040 (G0040): "While the group has not been definitively attributed,
    circumstantial evidence suggests the group may be a pro-Indian or Indian entity." (no service).
  - Forcepoint "Monsoon" (2016-08): the Attribution section opens "Reports from Special
    Investigations do not focus on specific attribution"; Adversaries states only that the
    individual tied to a domain registration "lives or has lived and works in India" and
    explicitly declines to name them ("not deemed in the public interest to publish specific
    details ... Relevant authorities are informed as and when appropriate"). The "Cui Bono?"
    section poses "who profits?" but leaves it "as an exercise ... for reader." No NTRO.
  - Kaspersky "The Dropping Elephant" (2016-07): frames the actor around targeting China's
    foreign relations ("Its victims are all involved with China's foreign relations in some
    way"); the sole India reference is attacker infrastructure ("IPs belonging to an ordinary
    ISP in India"). No attribution to the Indian state, no NTRO.
  - Norman Shark "Operation Hangover" (2013-05): title/framing is "an Indian Cyberattack
    Infrastructure" / Indian-origin; the only IA-preserved volume is the IOC Appendixes (no
    narrative attribution text). No NTRO.
  - Cymmetria "Unveiling Patchwork" (2016-07): UNFETCHABLE at audit time (HTTP 403 on the live
    URL via curl and WebFetch; wayback snapshot blocked) — no raw snapshot captured. Widely
    summarised as attributing to Indian-origin/pro-Indian actors; does not name the NTRO.
  India nexus is well-supported ("pro-Indian or Indian entity", individual living/working in
  India), but the specific NTRO/service placement is not cited anywhere — hence in/unscoped.
  Keep in/unscoped until a cited source names a specific Indian service. FK-propagated id change
  to the 9 referencing events on 2026-06-24.
