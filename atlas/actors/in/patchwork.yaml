# Demoted to in/unscoped 2026-06-24: NO cited source names India's NTRO (or any specific Indian
# service). The corpus's own sources reach only "pro-Indian or Indian entity" (MITRE G0040, which
# also states the group "has not been definitively attributed"); "the person who registered the
# domain lives or has lived and works in India" with Forcepoint expressly declining specific
# attribution ("Reports from Special Investigations do not focus on specific attribution");
# an "Indian Cyberattack Infrastructure" (Norman Shark title); and China-foreign-relations
# targeting with no Indian-state attribution at all (Kaspersky). NTRO placement was unsourced.
