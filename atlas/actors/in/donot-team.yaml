notes: |
  Former id in/ntro/donot-team. Demoted to in/unscoped on 2026-06-24 (claude-opus-4.8/max) after
  auditing the actor's SERVICE placement against its own cited sources: none names the NTRO (National
  Technical Research Organisation) or any specific Indian intelligence service. DoNot Team / APT-C-35 is
  widely described as "India-aligned" / "believed to be sponsored by the Indian government," but that is
  a nation-level assessment, not a named service.
    - Amnesty (2021, "Togo: …Indian-made spyware…"; the actor's Innefu source): attributes the activity
      to the commercial vendor Innefu Labs, which "advertises digital security, data analytics, and
      predictive policing services to law enforcement and armed forces and claims to work with the Indian
      government," and frames the wider ecosystem as "cyber-mercenaries"/"hacker-for-hire." No
      intelligence service is named; the strings "NTRO"/"National Technical Research" do not appear.
    - CYFIRMA (DoNot/Android report, the cited cyfirma source): "There are some media articles reporting
      that the threat actor belongs to the Indian soil, but we cannot confidently confirm if they belong
      to India, or what interest they are currently serving." No NTRO; Innefu not mentioned.
    - ESET 2018 source: url already null (article unlocatable per prior audit) — contributes nothing to
      a service claim.
    - The cited amnesty/2023-10-31 "DoNot/Kashmir activists" source is a misattribution: Amnesty Security
      Lab returns exactly one DoNot result (the 2021 Togo report); the Oct/Dec-2023 Amnesty India
      reporting concerns Pegasus/NSO spyware (Varadarajan/Mangnale), a different actor. Flagged for
      source-integrity follow-up; it does not name the NTRO either.
  MISP galaxy ("VICEROY TIGER", e2b87f81…) lists India as the country but names no service (signal only).
  India nexus is well-supported at the nation level; the NTRO service placement is not — hence
  in/unscoped until a cited source names a service. FK-propagated id change to the 9 referencing events
  on 2026-06-24.
