ttp_summary: |
  Indian-aligned APT distinguished by an extensive Android-implant
  capability (Cyfirma 2022; Amnesty 2023 documenting Kashmir
  activist targeting) alongside Windows tooling. The yty
  framework is the canonical Windows malware family. Mobile
  tooling has been observed delivered via WhatsApp social
  engineering against Kashmir-area civil society. A 2021
  Forensic Architecture / Amnesty Security Lab report linked
  DoNot Team's Android tooling to a commercial Indian vendor,
  Innefu Labs, that supplies the Indian government — the most
  direct contractor-to-state link in public reporting for any
  Indian-aligned cluster.
