# De-provisionalized + demoted to in/unscoped 2026-06-24: cited sources establish the actor as a
# named cluster (Bitter/TA397/APT-C-08/T-APT-17) and — via Proofpoint/Threatray (2025) — an INDIA
# nexus at high confidence ("intelligence gathering in the interests of the Indian state"), but NO
# cited source names India's NTRO or any specific Indian service. Former id in/ntro/bitter asserted
# an unsourced NTRO placement; demoted to in/unscoped (state assessed, service unresolved).
