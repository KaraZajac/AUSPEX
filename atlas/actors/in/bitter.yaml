ttp_summary: |
  South Asian, India-aligned espionage actor active since 2013, historically targeting energy,
  engineering, government and diplomatic entities in China, Pakistan, Saudi Arabia and Bangladesh
  (Cisco Talos, 2022). Espionage-motivated; relies on spear-phishing with weaponized maldocs (RTF /
  Excel) abusing the Microsoft Equation Editor (CVE-2017-11882, CVE-2018-0798, CVE-2018-0802) and
  scheduled tasks to stage payloads, downloading malware over HTTP from actor-controlled hosting
  domains and using DNS for C2. Has also exploited zero-days (e.g. CVE-2021-28310). Tooling across
  campaigns includes Bitter RAT, the Artra/MuuyDownloader downloaders, SlideRAT, AndroRAT, the ZxxZ
  downloader (Talos, 2022), and the WmRAT / MiyaRAT / BDarkRAT espionage RATs (Proofpoint, 2024–2025).
  Targets both desktop and mobile platforms. Proofpoint/Threatray (2025) assess with high confidence
  that the group is "a state-backed threat actor tasked with intelligence gathering in the interests
  of the Indian state," citing Indian-Standard-Time hands-on-keyboard working hours and tool-sharing
  overlaps with Mysterious Elephant (APT-K-47) and Confucius.
