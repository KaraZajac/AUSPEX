notes: |
  Former id in/ntro/bitter (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced NTRO
  placement and carried only an analyst-hint ttp_summary). Demoted to in/unscoped on 2026-06-24: the
  cited sources support the actor's identity and an INDIA nexus but NOT a service. Cisco Talos (2022)
  calls Bitter only "a suspected South Asian threat actor" at moderate confidence and names no nation;
  Proofpoint/Threatray (2025) assess "highly likely … a state-backed threat actor tasked with
  intelligence gathering in the interests of the Indian state" at HIGH confidence — naming the Indian
  state but no Indian service (NTRO, the Defence Cyber Agency, etc.). India nexus is well-supported
  (named-actor level); the NTRO/service placement is not — hence in/unscoped. The wider literature
  more commonly associates publicly attributed India-aligned cyber operations with the contractor /
  mercenary ecosystem than with NTRO directly; keep in/unscoped until a cited source names a service.
  FK-propagated the id change to the 5 referencing events on 2026-06-24.
