ttp_summary: |
  South Asian cyberespionage actor active since ~2013, widely assessed as India-aligned and
  related to the Patchwork / Dropping Elephant cluster (Trend Micro 2018 uncovered Confucius
  while investigating Patchwork; shared backdoor command structures). Sustained collection
  against Pakistani military, government and regional targets via bespoke backdoors,
  Office-exploit and Android-spyware delivery, and social-engineering chat-app lures. Cited
  vendor reporting (Trend Micro, Fortinet) characterizes it cautiously as a South Asian /
  India-aligned state-sponsored actor; the specific Indian service is unestablished — hence
  in/unscoped.
