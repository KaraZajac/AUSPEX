ttp_summary: |
  Indian commercial hack-for-hire firm and "training institute"
  exposed in Reuters' November 2023 investigation as one of the
  largest hack-for-hire vendors of the 2010s. Clients, per Reuters
  and SentinelOne, were reached through intermediaries — private
  investigators and law firms — acting for US litigants, foreign
  governments, and corporate adversaries. (AUDIT 2026-07-11: the
  earlier "Russian oligarchs" in the CLIENT list was wrong — the
  Russian-oligarch link, Boris Berezovsky, is a TARGET of collection,
  not a client; "lobbying firms" as clients was uncarried by any
  source and dropped.) The firm fronts as a cybersecurity training
  and consulting business while operating offensive infrastructure
  under various corporate shells. Founder Rajat Khare denies the
  allegations; multiple successor entities (BellTroX, CyberRoot,
  others) include Appin alumni and infrastructure overlap. Tradecraft
  is the canonical hack-for-hire stack: phishing-at-scale, credential
  theft, and custom attack portals (SentinelOne documents GoldenEye /
  Commando / MyCommando; the earlier "ManiBeacon" was not in the S1
  report and was removed 2026-07-11).
