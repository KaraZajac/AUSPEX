ttp_summary: |
  Indian commercial hack-for-hire firm and "training institute"
  exposed in Reuters' November 2023 investigation as one of the
  largest hack-for-hire vendors of the 2010s. Client list, per
  Reuters and SentinelOne, included Russian oligarchs, US
  litigants, foreign governments, and corporate adversaries. The
  firm fronts as a cybersecurity training and consulting business
  while operating offensive infrastructure under various corporate
  shells. Founder Rajat Khare denies the allegations; multiple
  successor entities (BellTroX, CyberRoot, others) include Appin
  alumni and infrastructure overlap. Tradecraft is the canonical
  hack-for-hire stack: phishing-at-scale, credential theft,
  occasional commodity RATs (e.g., the Reuters reporting names
  ManiBeacon and adjacent tooling).
