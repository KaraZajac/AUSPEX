ttp_summary: |
  India-nexus cyberespionage actor first publicly clustered as "Mysterious Elephant" /
  APT-K-47, conducting regional collection against government and foreign-affairs organisations
  across South Asia and the wider Asia-Pacific — with a focus on Pakistan, Bangladesh,
  Afghanistan, Nepal and Sri Lanka (its targets; "South Asian" describes its operating region,
  not its sponsor). Initial access is via personalized spear-phishing and malicious documents;
  the toolset named in 2025 Kaspersky GReAT reporting includes the BabShell reverse shell, the
  MemLoader HidenDesk in-memory module and PowerShell. The campaign aim is theft of sensitive
  documents, images and archives, and — distinctively — harvesting of WhatsApp data for
  exfiltration. The India alignment rests on tool/code-sharing overlaps with the India-aligned
  ecosystem rather than a direct state attribution: Proofpoint/Threatray (2025) cite ORPCBackdoor
  overlaps between Bitter (TA397) and "Mysterious Elephant (APT-K-47)" and Confucius, and
  Knownsec 404 likewise groups it among the India-aligned South Asian APTs alongside Bitter,
  Confucius, SideWinder and Patchwork.
