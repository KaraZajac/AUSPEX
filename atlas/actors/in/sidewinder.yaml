# Demoted to in/unscoped 2026-06-24: of the actor's four cited sources, NONE names the NTRO (or
# "National Technical Research Organisation"). The strongest service/state claim is Kaspersky 2018's
# "We have low confidence that this malware might be authored by an Indian company" and MITRE G0121's
# "a suspected Indian threat actor group"; Group-IB 2022 says only "state-sponsored"; Kaspersky 2024
# attributes to "the SideWinder APT group" (India appears there only as a victim country). India-aligned
# is well-supported at the named-actor level, the NTRO service placement is not.
