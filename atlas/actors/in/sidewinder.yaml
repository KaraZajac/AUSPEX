ttp_summary: |
  Most-active Indian-aligned APT by published-report volume.
  Tradecraft includes spear-phishing with weaponized RTF
  documents (CVE-2017-11882 the long-running staple, with
  successive office exploits added); HTA / LNK / encoded
  JavaScript droppers; the SideWinder C# loader and the
  "BackDeer" / "Konni" implant families; obfuscation via the
  StealerBot stealer (2024 Kaspersky reporting); heavy use of
  domain-squatting on Pakistani government / military / news
  domains. Primary targets are Pakistani military and government
  organizations, with continuous secondary targeting of Chinese
  academic and research institutions, Sri Lankan / Nepalese /
  Bangladeshi / Maldivian governments, and Afghan / Bhutanese
  diplomatic targets.
