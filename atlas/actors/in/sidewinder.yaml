  - in/regional-collection-pakistan-china/china-collection
  - in/regional-collection-pakistan-china/diplomatic-collection
notes: |
  Former id in/ntro/sidewinder (asserted an unsourced NTRO placement). Demoted to in/unscoped on
  2026-06-24 (claude-opus-4.8/max) after auditing the service placement against the actor's own four
  cited sources. None names the NTRO or "National Technical Research Organisation":
    - Kaspersky Q1-2018 APT trends: "We have low confidence that this malware might be authored by
      an Indian company." (an unnamed Indian *company*, at LOW confidence — not the NTRO, not the
      state directly).
    - Group-IB 2022 ("Old Snake, New Skin"): describes SideWinder only as "one of the most active
      state-sponsored hacker groups" — names no country on the public page (no "India"/"NTRO").
    - Kaspersky 2024 (StealerBot): "We attribute these activities to the SideWinder APT group with
      medium/high confidence." India appears in this report only as a *victim* country (diplomatic
      entities in "Afghanistan, France, China, India, Indonesia and Morocco"), not as the operator.
    - MITRE ATT&CK G0121: "Sidewinder is a suspected Indian threat actor group that has been active
      since at least 2012." ("suspected Indian" — no NTRO).
  A standalone-word search for "NTRO" returns zero hits across all four raw snapshots (every "ntro"
  substring is noise: "control"/"controlled"/"Control Flow"/a "intro_toddycat" URL slug). The
  India-aligned attribution is well-supported (named-actor level); the specific NTRO service placement
  is not — vendors consistently describe SideWinder as "India-aligned"/"suspected Indian"/"pro-Indian"
  without naming the NTRO. Keep in/unscoped until a cited source names a specific Indian service.
  FK-propagated the id change to the 12 referencing events on 2026-06-24.
