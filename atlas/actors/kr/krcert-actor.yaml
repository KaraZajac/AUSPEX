ttp_summary: |
  Defensive coordination cluster representing KrCERT/CC's
  public-attribution and advisory voice. AUSPEX models
  KrCERT as an "actor" only for the limited purpose of
  tagging AA-style attestation events: where the Korean
  government's defensive cyber posture is itself the
  attributable activity (publication of joint advisories,
  technical-detail releases, takedown coordination).

  Real-world activity attested:
    - Co-publication of the July 2024 AA24-207A Andariel
      advisory with US CISA / FBI / NSA, ROK NIS / DCC,
      and UK NCSC.
    - Routine bilateral advisory tradition with Japan's
      JPCERT/CC and US CISA.
    - Coordination of malware takedown on Korean
      hosting infrastructure (typically commodity
      cybercrime; sometimes DPRK infrastructure).

  AUSPEX is candid that "actor" framing is editorial
  convenience for AA-style events; KrCERT is not an
  offensive cluster.
