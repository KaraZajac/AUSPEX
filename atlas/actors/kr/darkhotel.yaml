ttp_summary: |
  Long-running espionage actor first detailed by Kaspersky (2014): compromised hotel Wi-Fi to
  serve trojanized "updates" to selected executives, Flash zero-day spear-phishing, broad P2P
  spreading, and abuse of forged certificates from 10+ weakly-keyed CAs; ~90% of infections in
  JP/TW/CN/RU/KR. Later campaigns deployed multiple zero-days against North Koreans and the WHO
  (2020). Nation nexus: characterized "South Korea-linked" by CFR/Wired/Google TAG; Kaspersky's
  original report declines nation attribution — hence kr/unscoped (sub-service unplaced).
