ttp_summary: |
  Long-running espionage actor first detailed by Kaspersky (2014): compromised hotel Wi-Fi to
  serve trojanized "updates" to selected executives, Flash zero-day spear-phishing, broad P2P
  spreading, and abuse of forged certificates from 10+ weakly-keyed CAs; ~90% of infections in
  JP/TW/CN/RU/KR. A 2019 campaign (disclosed March 2020) deployed five zero-days against North
  Koreans and North-Korea-focused professionals (Google TAG / Wired / CFR). A separate March-2020
  spear-phishing of the WHO was widely reported alongside it but was NOT definitively attributed to
  DarkHotel — do not treat the WHO incident as an established DarkHotel operation. Nation nexus:
  characterized "South Korea-linked" by CFR/Wired (relaying Kaspersky's read); the Google TAG
  primary named no nation, and Kaspersky's original 2014 report declines nation attribution — hence
  kr/unscoped (sub-service unplaced).
