ttp_summary: |
  NOT an established threat actor. This record names the Office of the President / National Security
  Office in its capacity as the *publisher* of South Korea's 2024 National Cybersecurity Strategy — a
  policy/doctrine document — and was created as a PROVISIONAL backfill stub on 2026-05-30. The single
  cited source (CSIS, 2024) is a primer summarizing the strategy's five "strategic tasks" (an offensive
  posture toward North Korea, infrastructure resilience, emerging technologies, industry-government
  coordination, global cooperation). It attributes NO offensive cyber operation to this body; the only
  ROK service the source names conducting any cyber activity is the National Intelligence Service (NIS),
  and only defensively — the NIS "put out a press release... naming North Korea as the perpetrator" of
  2023 attacks on ROK shipbuilders. The "offensive posture" the source describes is a declared strategy
  paradigm, not an executed operation. No tradecraft is attributable to this record.
default_doctrine_alignment_ids: []
notes: |
  Former id kr/nso/republic-of-korea-national-security-office (PROVISIONAL backfill stub, 2026-05-30,
  which asserted an unsourced kr/nso service placement). Demoted to kr/unscoped on 2026-06-24
  (claude-opus-4.8 audit) AND flagged as a likely MIS-MODELED ENTITY: this is the strategy-publishing
  policy body (Office of the President / National Security Office), not a documented threat actor.

  The sole cited source, CSIS (2024), is a policy primer on the *content* of the 2024 National
  Cybersecurity Strategy. It (a) never names a "National Security Office" or "Office of the President"
  at all — the phrases do not appear in the article; (b) attributes the strategy to "The Republic of
  Korea (ROK)" / "the Yoon Suk Yeol administration", not to any named operating service; and (c)
  describes NO offensive cyber operation by any ROK body. Verbatim: "The Republic of Korea (ROK)'s
  National Cybersecurity Strategy released in February 2024 is an effort to transition from a defensive
  posture... to an offensive posture." The only ROK service named conducting cyber activity is the NIS,
  defensively: "ROK's National Intelligence Service (NIS) put out a press release shortly after the
  attempted attacks naming North Korea as the perpetrator..." The operations the source actually
  describes are North Korean (the attacker) against ROK victims — the opposite direction.

  Disposition: kept as kr/unscoped rather than deleted, pending a human decision on whether this record
  should instead be retired entirely (the strategy publication is already captured as the
  doctrine-publication/policy event 2024-02/south-korea-publishes-2024-national-cybersecurity-strategy-adopting-an,
  whose actor_id was repointed to this id on 2026-06-24). There is no cited basis for ANY ROK
  service placement here, let alone an offensive-operations one; do not re-home to a real service
  without a source that names a service conducting an operation.
