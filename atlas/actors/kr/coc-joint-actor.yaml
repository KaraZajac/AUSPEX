ttp_summary: |
  Operator cluster of the ROK Cyber Operations Command
  (established as Cyber Command January 2010, renamed
  Cyber Operations Command January 2019). Public
  operational footprint is essentially nil: COC's
  offensive mandate is publicly acknowledged in MND
  policy documents but no specific operation has been
  publicly attributed to COC by HM government or by
  a vendor as of 2026-05.

  AUSPEX models this entry as a structural placeholder
  for the actor-level attribution slot. Events on the
  defensive / training side (e.g., contributions to
  Ulchi Freedom Shield, NATO Cyber Coalition Indo-
  Pacific partner exercises) tag to the service
  (kr/coc) rather than to this actor entry.
default_doctrine_alignment_ids:
  - kr/defense-cyber-policy-mnd
  - kr/ncss-2019
auspex_assessment: |
  Stub. AUSPEX expects this entry to remain thin until
  either (a) COC starts publicly naming specific
  operations, or (b) a substantial leak / journalistic
  investigation surfaces operational detail. Until then,
  events tagged here should be limited to those where
  MND has publicly acknowledged COC involvement.
