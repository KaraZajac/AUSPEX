ttp_summary: |
  Cyber / online-influence cell of the NIS Psychological
  Warfare Bureau active during the 2012 ROK presidential
  election campaign. Cell members posted political
  comments on Korean online forums (Daum Agora, DC Inside,
  Twitter), engaging in support for the conservative
  candidate (Park Geun-hye) and disparagement of
  opposition candidates, in violation of the National
  Intelligence Service Act's prohibition on political
  involvement and the Public Official Election Act.

  Operational scale per court findings (Seoul Central
  District Court, July 2017 conviction of Won Sei-hoon
  on appeal): tens of NIS officers organised in teams
  posting from multiple identities across Korean social
  platforms. The scheme was disclosed by an internal
  NIS officer in late 2012; prosecutorial investigation
  followed in early 2013; Director Won Sei-hoon was
  indicted in April 2013; first-instance conviction was
  reversed in 2015 but reinstated in part on retrial,
  with final conviction confirmed by the Korean Supreme
  Court in 2017.

  AUSPEX includes this actor entry per the editorial
  guidance that domestic-politics cyber-misuse by
  intelligence services is in-scope as a doctrine-codified
  case rather than a glamorised operational profile.
  The cluster is treated as retired following the 2013
  disbandment of the Psychological Warfare Bureau cyber
  function under the Park administration's NIS reforms.
default_doctrine_alignment_ids: []
auspex_assessment: |
  `concur` on attribution: the actor is named in Korean
  prosecutorial filings, adjudicated through the Korean
  court system, and confirmed by the Korean Supreme Court.
  AUSPEX treats this as one of the gold-standard public-
  record cases of intelligence-service cyber misuse for
  domestic political ends — distinct from external-state-
  attribution events. No false-flag risk; attribution is
  by Korean prosecutorial and judicial process.

  Editorial framing note: AUSPEX does not link this actor
  to a doctrine because (a) NIS doctrine does not
  publicly authorise domestic political interference;
  (b) the doctrine-linkage field reserves "attested" for
  alignment with a public doctrine, which is absent here;
  (c) the case is in-scope precisely because it represents
  cyber misuse *outside* doctrine, codified after the
  fact by criminal prosecution.
