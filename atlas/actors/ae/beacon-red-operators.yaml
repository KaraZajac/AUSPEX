notes: |
  Former id ae/beacon-red/operators (primary_service_id ae/darkmatter/beacon-red, additional
  ae/state-security). DEMOTED to ae/unscoped/operators on 2026-06-24 (AUDIT, claude-opus-4.8/max):
  service placement is UNSOURCED. The actor cited two sources and neither names Beacon Red as the
  operator of any specific operation:
    - Reuters, "Inside the UAE's secret hacking team of American mercenaries" (2019-01-30): the
      Project Raven investigation. The widely-corroborated public record of this piece names
      "CyberPoint" (2014-2016) and then "DarkMatter" (2016+) as the contractors running Project
      Raven for the UAE — it does NOT mention Beacon Red (the piece predates the post-Raven
      Beacon-Red framing). Environmental verification: live URL returns a DataDome CAPTCHA block,
      WebFetch blocked, archive.org blocked (unfetchable; corroborated via the DarkMatter Group
      reference, which states "From around 2014 to 2016, CyberPoint supplied U.S.-trained
      contractors to Project Raven" and "In 2016, DarkMatter replaced CyberPoint as a contractor
      for Project Raven").
    - MIT Technology Review, "The hacker-for-hire industry is now too big to fail": the cited URL
      (/2021/09/13/1035645/uae-mercenary-spies-ex-nsa-doj/) returns HTTP 404 and does not resolve
      to any article (confirmed by curl + WebFetch). The extant version of this article
      (/2021/12/28/1043029/..., 2021-12-28) does NOT mention Beacon Red anywhere — WebFetch:
      "'Beacon Red' is not mentioned anywhere in this article"; in the UAE context it names only
      "NSO Group's Pegasus". So the source the actor relied on to anchor the Beacon-Red operator
      claim does not support it.
  Beacon Red (beaconred.ae / EDGE Group, founded 2018) is real and documented, but public
  reporting frames it as a UAE national-security training / red-team / personnel firm, never as
  the named operator of a specific attributed operation. MISP corroboration: none (misp_galaxy
  null). UAE nexus is sound; the service is not — hence ae/unscoped pending a cited source that
  names Beacon Red as an operator. (Retire was considered but rejected: the cluster has a
  documentary referencing event and the post-Raven continuity is a genuine editorial anchor; it
  is kept as an unscoped placeholder rather than deleted.) FK-propagated the id change to the 1
  referencing event on 2026-06-24.
