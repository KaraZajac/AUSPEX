auspex_assessment: |
  `concur` on the existence, structure, and targeting of Project
  Raven per Reuters' multi-source reporting (corroborated by the
  September 2021 DOJ deferred-prosecution agreements). The
  attribution to "the UAE state" as the customer is direct in
  Reuters reporting; the specific UAE service customer (SIA / NESA
  versus State Security versus a national-security-adviser-level
  channel) is not pinned at sub-organizational granularity in
  public reporting.
notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): service placement ae/darkmatter VERIFIED — KEEP.
  This actor *is* Project Raven, and a CITED primary source names DarkMatter as the firm that
  staffed/hosted it — the opposite of the sibling clusters demoted in this QC pass
  (ae/unscoped/stealth-falcon, ae/unscoped/operators), where DarkMatter appeared 0× in the cited
  sources and the placement was a cross-record inference. The Reuters Karma companion article
  (reuters/2019-01-30_karma-uae-iphone-hack), captured in full from a web.archive.org snapshot
  after the live URL DataDome-CAPTCHA-blocked curl (367,462 bytes; content_sha256
  169826b7a10e41877cac156d7f435f9f08316e4ee268383e48d9cdfc82b7b5d5), states in its own words:
  "Raven was largely staffed by U.S. intelligence community veterans, who were paid through an
  Emirati cyber security firm named DarkMatter, according to documents reviewed by Reuters" and
  "Karma was used by an offensive cyber operations unit in Abu Dhabi … working as contractors for
  the UAE's intelligence services. The existence of Karma and of the hacking unit, code named
  Project Raven, haven't been previously reported." That explicitly equates Project Raven (the
  program) with DarkMatter (the operating firm). Keyword census of the captured raw: DarkMatter 4×,
  Project Raven 8×, Karma 152×; CyberPoint 0× (the CyberPoint→DarkMatter contractor transition is
  documented in the separate Project Raven main article, reuters/2019-01-30_project-raven, and the
  ae/darkmatter service record — the actor's own "DREAD (CyberPoint predecessor)" alias already
  captures it, so no FLAG). The placement is temporally coherent (DarkMatter migration 2015–2016;
  founded December 2014). Caveats retained: (1) the attribution is single-investigation-dominant
  (Reuters Schectman/Bing) — MISP has no Project Raven / DarkMatter-operator / Karma threat-actor
  galaxy cluster (misp_galaxy: null is correct), so there is no independent galaxy corroboration;
  (2) the DOJ DPA (doj/2021-09-14_baier-adams-gericke-dpa) corroborates only at the
  legal-attribution level and names the employer/customer generically, not "DarkMatter"; (3)
  additional_service_id ae/sia is retained as-is (the UAE intelligence-services customer channel
  Reuters describes; not disturbed by this audit, which scoped the primary placement). No id change;
  no FK propagation.
