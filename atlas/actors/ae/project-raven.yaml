ttp_summary: |
  Covert offensive-cyber program staffed substantially by former
  US NSA Tailored Access Operations personnel. Per Reuters'
  January 30 2019 investigation by Christopher Bing and Joel
  Schectman, Project Raven targeted dissidents, journalists,
  foreign-government officials, and US persons on behalf of the
  UAE state. The Karma iOS zero-click toolkit (separately disclosed
  by Reuters the same day) was the program's signature mobile-
  collection capability.

  Operators publicly identified or characterized in the Reuters
  series include Lori Stroud and other named ex-NSA personnel.
  Several of the US operators raised internal concerns about
  targeting US persons; subsequent FBI investigation and the
  September 2021 DOJ deferred-prosecution agreements against
  Marc Baier, Ryan Adams, and Daniel Gericke documented the
  ex-NSA-to-UAE contractor pipeline at the legal level.
