auspex_assessment: |
  `concur` on Reuters' attribution of Karma operations to Project
  Raven / DarkMatter / UAE state customer. The cluster is small
  and the public attribution chain is single-source-dominant
  (Reuters Schectman / Bing) but multi-source-corroborated by the
  September 2021 DOJ DPA materials and subsequent reporting.
notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): service placement ae/darkmatter VERIFIED — KEEP.
  Unlike the sibling clusters demoted in this QC pass (ae/darkmatter/stealth-falcon and
  ae/beacon-red/operators, where DarkMatter appeared 0× in the cited sources and the placement was
  a cross-record inference), DarkMatter is NAMED as the operator/host by THIS actor's own cited
  primary source. The Reuters Karma article (reuters/2019-01-30_karma-uae-iphone-hack) — fully
  captured from a web.archive.org snapshot after the live URL CAPTCHA-blocked — states in its own
  words: "intelligence community veterans, who were paid through an Emirati cyber security firm
  named DarkMatter, according to documents reviewed by Reuters," and "Karma was used by an
  offensive cyber operations unit in Abu Dhabi comprised of Emirati security officials and former
  American intelligence operatives working as contractors for the UAE's intelligence services,"
  with the unit "code named Project Raven." Tool provenance is also stated: "The UAE government
  purchased Karma from a vendor outside the country, the operatives said" (supporting the not-NSO
  framing). The placement is temporally coherent (Karma operational 2016–2017 per Reuters;
  DarkMatter founded December 2014 — no awkwardness, unlike Stealth Falcon's 2012 telemetry).
  Caveats retained: (1) the attribution is single-investigation-dominant (Reuters Schectman/Bing)
  — MISP has no Project Raven / DarkMatter-operator / Karma threat-actor cluster (misp_galaxy:
  null is correct), so there is no independent galaxy corroboration; (2) CyberPoint is NOT named in
  the Karma article (0×) — the CyberPoint→DarkMatter contractor transition is documented in the
  separate Project Raven main article (reuters/2019-01-30_project-raven) and the ae/darkmatter
  service record, and DarkMatter is the host at the 2016–2017 time of Karma's use; (3) the DOJ DPA
  (doj/2021-09-14_baier-adams-gericke-dpa) corroborates only at the legal-attribution level and
  names the employer generically, not "DarkMatter". additional_service_id ae/state-security is
  retained as-is (the UAE intelligence-services customer relationship Reuters describes; not
  disturbed by this audit, which scoped the primary placement). No id change; no FK propagation.
