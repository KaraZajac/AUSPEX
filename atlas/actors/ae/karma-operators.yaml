aliases:
  - alias: Karma
    assigning_org: Reuters (Schectman / Bing 2019)
    confidence: equivalent
    note: |
      "Karma" is the name of the iOS zero-click toolkit
      operated by Project Raven personnel, not a separate
      operator cluster. AUSPEX tracks it as a distinct actor
      entry for tradecraft-clustering convenience; events
      involving the Karma toolkit should attribute here.
active_since: 2016-01-01  # earliest documented Karma operational use per Reuters
active_until: 2017-12-31  # toolkit's iOS-9-era TTP became ineffective by Apple iOS 10/11 patching
status: retired
mission:
