  - civil-society/dissident
ttp_summary: |
  The Karma toolkit was an iOS zero-click exploit chain operated
  by Project Raven personnel at DarkMatter against high-value
  mobile targets — including, per Reuters reporting, Qatari royal
  family members during the 2017 GCC-blockade context, regional
  political figures, and dissidents. Karma's tradecraft did not
  require user interaction (zero-click via iMessage delivery),
  predating the better-known FORCEDENTRY / NSO Pegasus zero-click
  capability by several years.

  Karma is *not* Pegasus and is *not* NSO-supplied: Reuters
  explicitly distinguished the two, and Karma was reportedly
  acquired by DarkMatter from a non-NSO vendor before being
  operationalized by Project Raven. By 2017–2018 iOS patching had
  closed the underlying primitives and Karma fell out of
  operational use.
default_doctrine_alignment_ids:
  - ae/procurement-led-capability
  - ae/regime-protection-surveillance
auspex_assessment: |
  `concur` on Reuters' attribution of Karma operations to Project
  Raven / DarkMatter / UAE state customer. The cluster is small
  and the public attribution chain is single-source-dominant
  (Reuters Schectman / Bing) but multi-source-corroborated by the
  September 2021 DOJ DPA materials and subsequent reporting.
sources:
