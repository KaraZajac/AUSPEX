notes: |
  Former id ae/state-security/uae-pegasus (PROVISIONAL backfill stub, 2026-05-30, which asserted an
  unsourced ae/state-security placement). De-provisionalized and demoted to ae/unscoped on 2026-06-24
  (claude-opus-4.8/max): the only cited source (CFR Cyber Operations Tracker, Dec 2021, citing The
  Washington Post / The Verge) names the "Suspected state sponsor" as the "United Arab Emirates" and
  describes the operator only as "a UAE agency" — it does not name UAE State Security, DarkMatter,
  Beacon Red, or any specific Emirati service. The UAE nexus is at nation level (suspected); the
  service placement is unestablished — hence ae/unscoped. Note the cited CFR record is internally
  inconsistent (its "Affiliations" line reads "Believed to be the work of the Saudi Arabian government"
  while its structured "Suspected state sponsor" field reads "United Arab Emirates"); AUSPEX follows
  CFR's structured sponsor field (UAE), which matches the WaPo/Verge "at the request of the UAE"
  framing. FK-propagated id change to the 1 referencing event on 2026-06-24.
