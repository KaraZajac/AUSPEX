ttp_summary: |
  AUSPEX operator-cluster designation for the UAE-attributed deployment of NSO Group's Pegasus
  mobile spyware against exiled dissidents and journalist-adjacent civil-society targets. The
  type case is the December-2021 forensic finding (reported by The Washington Post and The Verge,
  tracked by CFR) that Pegasus was placed on the phone of Hanan Elatr — wife of murdered Saudi
  journalist Jamal Khashoggi — "at the request of the United Arab Emirates," allegedly while she
  was detained at Dubai airport. The Pegasus delivery is contracted (NSO is a commercial vendor);
  CFR labels the UAE sponsor "Suspected," and the reporting names only "a UAE agency" without
  identifying a specific Emirati service. Consistent with the broader pattern of UAE-procured
  commercial surveillance capability used for regime-protection monitoring of diaspora critics.
