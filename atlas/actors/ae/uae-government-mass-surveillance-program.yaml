ttp_summary: |
  Emirati government mass-surveillance program surfaced via the ToTok messaging app (CFR Cyber
  Operations Tracker, Dec 2019), which harvested users' conversations, movements, and relationships
  at population scale across the UAE and globally. CFR attributes the program to "the Emirati
  government" ("Suspected state sponsor: United Arab Emirates") and names no operating contractor.
  Press reporting (NYT, Dec 2019) tied ToTok's developer (Breej Holding) to the Abu Dhabi
  cyber-intelligence firms DarkMatter and Pax AI, but that contractor link is not present in any
  source cited by this record, so the service placement is left unscoped pending a citation that
  names the operator.
