notes: |
  Former id ae/darkmatter/uae-government-mass-surveillance-program (de-provisionalized 2026-06-23,
  which retained a darkmatter placement on the strength of NYT reporting). Demoted to ae/unscoped on
  2026-06-24 (claude-opus-4.8/max): the actor's ONLY cited source — the CFR Cyber Operations Tracker
  entry "Surveillance of individuals in the United Arab Emirates (UAE) and globally" (raw captured +
  hashed) — attributes the program solely to the UAE state and names no contractor. Its full text
  reads: "Affiliations: Government of the UAE. ToTok, a popular Emirati messaging app, was revealed to
  be a mass surveillance tool used by the Emirati government. Suspected victims: Millions of
  individuals in the UAE and globally. Suspected state sponsor: United Arab Emirates. Type of
  incident: Espionage. Target category: Civil society." The string "DarkMatter" (and "CyberPoint",
  "Project Raven", "Breej", "Pax AI") does not appear anywhere in the source. The DarkMatter link
  comes only from the NYT story CFR links to ("It Seemed Like a Popular Chat App. It's Secretly a Spy
  Tool."), which is not itself a cited AUSPEX source. UAE-state nexus is well-supported (CFR names the
  Emirati government as the suspected sponsor); the specific service (DarkMatter vs CyberPoint vs
  another contractor) is not — hence ae/unscoped. Re-home to ae/darkmatter only if a cited source
  names the operating contractor. FK-propagated id change to the 1 referencing event on 2026-06-24.
