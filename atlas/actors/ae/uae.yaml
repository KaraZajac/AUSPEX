ttp_summary: |
  State-financed transnational surveillance-and-influence cluster, scoped to the "Abu Dhabi Secrets"
  operation exposed by the European Investigative Collaborations (EIC) consortium and its members
  (Mediapart et al.) in July 2023. Per the EIC project reporting, the UAE government contracted the
  Geneva-based private intelligence firm Alp Services to compile and pass to the UAE intelligence
  services the names of more than 1,000 individuals and 400 organizations across 18 European countries,
  labelling them as part of a "Muslim Brotherhood network in Europe"; targets included French public
  figures. The tradecraft is outsourced human-led intelligence and reputational warfare — open-source
  and private-detective profiling, watchlisting, and media smear campaigns run through a deniable
  commercial contractor rather than a UAE service operating directly. The operation triggered criminal
  investigations in France and Switzerland. Not a self-named threat group: the perpetrator is the UAE
  state acting via Alp Services, so this record models the cluster, not a codenamed actor.
