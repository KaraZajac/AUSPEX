notes: |
  Former id ae/state-security/uae (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced
  UAE State Security placement). De-provisionalized + demoted to ae/unscoped/uae on 2026-06-24: the only
  cited source (EIC "Abu Dhabi Secrets" project page) names "the UAE government" as the contracting
  party and refers generically to "the UAE intelligence services" (plural, unnamed) — it does NOT name
  UAE State Security, the Signals Intelligence Agency, DarkMatter, or any specific service. The UAE
  state nexus is well-supported (nation level); the service placement is not — hence ae/unscoped. The
  vehicle is the Swiss contractor Alp Services (front/contracting arrangement reported by EIC). canonical
  name changed from the bare country name "UAE" to "UAE / Alp Services influence cluster" for clarity;
  slug head kept as `uae`. FK-propagated the id change to the 1 referencing event on 2026-06-24.
