ttp_summary: |
  Citizen Lab disclosed Stealth Falcon in May 2016 (Marczak,
  Scott-Railton, and colleagues) as a UAE-aligned operator
  cluster targeting Emirati journalists, activists, and
  dissidents — including UK-based journalist Rori Donaghy who
  covered UAE — via fake-Twitter spear-phishing personae and
  custom Windows malware. Subsequent Kaspersky reporting on
  FruityArmor (2016, 2018, 2019) extended the cluster's
  documented activity through multiple Windows zero-day
  exploitations (CVE-2016-3393, CVE-2018-8174, CVE-2018-8453).

  ESET in 2019 published reporting on a Stealth Falcon Win32
  backdoor delivered via the BITS service ("Stealth Falcon's
  use of Windows BITS"). The cluster's continuity and the
  consistency of its UAE-victim targeting make it the most
  durable named UAE-aligned actor cluster in public reporting.
default_doctrine_alignment_ids:
  - ae/regime-protection-surveillance
  - ae/procurement-led-capability
auspex_assessment: |
  `concur` on Citizen Lab attribution to a UAE-aligned operator
  cluster. The DarkMatter-as-host inference is best-available
  given operational timing (Stealth Falcon activity 2012–
  predates DarkMatter's December 2014 founding but the
  subsequent cluster activity is contemporaneous with DarkMatter)
  and per-Reuters reporting on DarkMatter's role as the UAE
  state's primary offensive-cyber vendor. AUSPEX models
  Stealth Falcon under ae/darkmatter/ accordingly, with
  ae/state-security as the additional service for the customer
  side.
