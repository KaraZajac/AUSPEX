      *disputed*: Microsoft's own subsequent characterization
      of Marbled Dust has framed it as Türkiye-aligned and
      consistent with Sea Turtle, *not* UAE-aligned. The
      May 2025 Microsoft Marbled Dust Output Messenger
      disclosure does NOT attribute to UAE / Stealth Falcon.
      Do not co-tag without explicit per-event evidence.
