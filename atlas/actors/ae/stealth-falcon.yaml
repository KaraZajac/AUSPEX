# Demoted to ae/unscoped 2026-06-24: NO cited source names DarkMatter (or any service) as the
# operator. Citizen Lab (2016), the primary attribution source, says only "Circumstantial evidence
# suggests a link between Stealth Falcon and the UAE government" — DarkMatter/CyberPoint appear 0×.
# Kaspersky (2016) names neither DarkMatter nor even Stealth Falcon (pure FruityArmor CVE writeup).
# ESET (2019) links Stealth Falcon to "Project Raven" (via Reuters/Amnesty) but does NOT name
# DarkMatter or CyberPoint. The DarkMatter placement was an AUSPEX inference from Reuters reporting
# that is not among the cited sources, and is temporally awkward (activity from 2012; DarkMatter
# founded Dec 2014). UAE nexus is well-supported; the service placement is not — hence ae/unscoped.
