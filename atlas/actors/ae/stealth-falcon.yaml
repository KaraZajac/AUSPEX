ttp_summary: |
  Citizen Lab disclosed Stealth Falcon in May 2016 (Marczak,
  Scott-Railton, and colleagues) as a UAE-aligned operator
  cluster targeting Emirati journalists, activists, and
  dissidents — including UK-based journalist Rori Donaghy who
  covered UAE — via fake-Twitter spear-phishing personae and
  custom Windows malware. Subsequent Kaspersky reporting on
  FruityArmor (2016, 2018, 2019) extended the cluster's
  documented activity through multiple Windows zero-day
  exploitations (CVE-2016-3393, CVE-2018-8174, CVE-2018-8453).

  ESET in 2019 published reporting on a Stealth Falcon Win32
  backdoor delivered via the BITS service ("Stealth Falcon's
  use of Windows BITS"). The cluster's continuity and the
  consistency of its UAE-victim targeting make it the most
  durable named UAE-aligned actor cluster in public reporting.
default_doctrine_alignment_ids:
  - ae/regime-protection-surveillance
  - ae/procurement-led-capability
auspex_assessment: |
  `concur` on Citizen Lab attribution to a UAE-aligned operator
  cluster, at the named-actor level with a UAE-government nexus
  ("circumstantial evidence suggests a link between Stealth Falcon
  and the UAE government" — Citizen Lab 2016). The specific service
  operator is NOT resolved by the cited sources: none names
  DarkMatter, CyberPoint, or any UAE intelligence service. The
  previously-asserted DarkMatter-as-host placement was an AUSPEX
  inference from Reuters' 2019 Project Raven reporting (not among
  this record's cited sources) and is temporally awkward — Stealth
  Falcon activity dates to 2012, predating DarkMatter's December
  2014 founding. AUSPEX therefore models Stealth Falcon as
  ae/unscoped pending a cited source that names a service.
notes: |
  Former id ae/darkmatter/stealth-falcon (primary_service_id ae/darkmatter;
  additional_service_ids [ae/state-security]).
  AUDIT (2026-06-24, claude-opus-4.8/max): DEMOTED to ae/unscoped — service placement is
  UNSOURCED. The three cited sources were read in full from captured raw snapshots:
    • Citizen Lab (2016-05-29, the primary attribution source) attributes only to the UAE
      government, at a circumstantial level: "Circumstantial evidence suggests a link between
      Stealth Falcon and the UAE government." DarkMatter / Dark Matter: 0 occurrences;
      CyberPoint: 0; Project Raven: 0. (UAE mentioned 152×.)
    • Kaspersky GReAT (2016-10-20) is a pure CVE-2016-3393 / FruityArmor technical writeup —
      it names neither DarkMatter, CyberPoint, the UAE, nor even "Stealth Falcon"; the link is
      only the FruityArmor↔Stealth-Falcon cluster overlap asserted by AUSPEX/Citizen Lab.
    • ESET (2019-09-09) links Stealth Falcon to "Project Raven" via Reuters/Amnesty:
      "Reuters published an investigative report into Project Raven, an initiative allegedly
      employing former NSA operatives and aiming at the same types of targets as Stealth
      Falcon … Amnesty International's Senior Technologist, Claudio Guarnieri, has concluded
      that Stealth Falcon and Project Raven actually are the same group." It does NOT name
      DarkMatter or CyberPoint as the operator.
  The DarkMatter↔Project Raven equivalence is sourced (in the DarkMatter SERVICE record) only to
  Reuters' January 2019 investigation, which is not cited on this actor — and even Reuters routes
  the ex-NSA recruitment through the predecessor contractor CyberPoint before DarkMatter. With no
  cited source naming a service, primary_service_id is set to ae/unscoped and the unsourced
  additional ae/state-security service was cleared (it too is not named by any cited source). The
  UAE nexus remains well-supported at the named-actor level; only the service is unresolved.
  FK-propagated the id change to the 6 referencing events on 2026-06-24. NB the Mansoor/Pegasus
  event (2016-08) independently carries a per-event service_id: ae/state-security backed by its own
  Citizen Lab source — that event-level override is out of this audit's scope and was left intact.
