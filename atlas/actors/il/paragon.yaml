ttp_summary: |
  Israeli commercial-spyware vendor founded around 2019; Citizen
  Lab characterizes it as a "next-generation" NSO competitor
  positioned around the Graphite mobile-spyware product. Known
  customer government: Italy (AISE external intelligence
  acknowledged use after Citizen Lab and WhatsApp disclosures).
  Other reported customers per open reporting include Canada,
  Denmark, Singapore, and the United States (DEA, ICE) under
  varying contractual states.

  Notable exposures:
    - January 31, 2025: WhatsApp disclosed targeting of ~90
      accounts to Paragon's Graphite spyware (journalists and
      civil society in Italy, elsewhere).
    - April 29, 2025: Apple iOS threat notifications to
      Paragon-targeted users including journalist Ciro
      Pellegrino (forensic confirmation per Citizen Lab June
      2025).
    - June 12, 2025: Citizen Lab "Graphite Caught" — first
      forensic confirmation of Paragon iOS spyware in the wild;
      CVE-2025-43200 patched in iOS 18.3.1.

  Acquired by AE Industrial Partners (US private equity)
  December 2024; US-acquisition status changes the
  export-control posture relative to NSO / Candiru.

  **Vendor-as-cluster, not state-operator-cluster.** Treat the
  same as NSO / Candiru: deployment events attribute to the
  customer state.
default_doctrine_alignment_ids: []  # commercial vendor; no IL state doctrine alignment for the vendor entity itself
auspex_assessment: |
  `concur` on Paragon / Graphite attribution (Citizen Lab March
  and June 2025 reports plus WhatsApp / Apple threat
  notifications). Editorial caveat: Paragon is newer than NSO /
  Candiru, public victimology is still emerging, and the post-
  acquisition US-PE ownership structure may shift the customer
  set faster than vendor-cluster naming can track.
sources:
  - citizenlab/2025-03_paragon-proliferating-spyware-operations
  - citizenlab/2025-06-12_paragon-graphite-forensic-confirmation
