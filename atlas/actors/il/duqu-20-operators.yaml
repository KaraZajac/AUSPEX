ttp_summary: |
  Operators of the Duqu 2.0 espionage platform (Kaspersky's June 2015 disclosure; an evolution
  of the 2011 Duqu, which Kaspersky tied to the Stuxnet/Equation "Tilded" lineage). The 2015
  campaign penetrated luxury hotels hosting the P5+1–Iran nuclear talks and Kaspersky Lab's own
  network. Widely suspected to be Israel (Kaspersky; WSJ, "Spy Virus Linked to Israel Targeted
  Hotels Used for Iran Nuclear Talks"), but no state has confirmed it and the specific Israeli
  service is unestablished — hence il/unscoped.
