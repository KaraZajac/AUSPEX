ttp_summary: |
  Signals-intelligence unit of the Israel Police, named by the CFR Cyber Operations Tracker
  (citing Calcalist / Tomer Ganon, 2022) as the operator suspected of using NSO Group's Pegasus
  spyware for warrantless domestic surveillance of Israeli citizens — local mayors and other
  local officials and their families. Per the cited reporting the intercepts were used to inform
  later bribery prosecutions (some dismissed in court for lack of evidence), and the police were
  alleged to have attempted to conceal the Pegasus use. The initial Calcalist allegations were
  subsequently partially qualified by the Israeli state-comptroller / Marari review, so the
  attribution stands at "suspected" confidence (CFR: "Believed to be the work of Israel's
  government"). This is the only corpus event for this actor.
