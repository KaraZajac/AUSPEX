ttp_summary: |
  Pro-Israel actor that conducts destructive cyber operations
  against Iranian critical infrastructure. Notable operations:
  October 2021 Iran fuel-station network attack; June 2022
  Khuzestan Steel Mojahedin Steel Company destructive OT attack
  (molten-steel spill); December 2023 fuel-station re-run;
  June 2025 Nobitex crypto-exchange drain (~USD 90M+ burned to
  vanity addresses); Sepah Bank attacks. Widely attributed to
  IDF Unit 8200 by Israeli media and US defense officials cited
  in The New York Times; never formally acknowledged by Israel.

  **NOT IRANIAN.** This entry exists for analyst hygiene only.
  Any Iran-context event involving destructive OT impact in
  Iran or against Iranian-state assets should be cross-checked
  against the possibility of Predatory Sparrow / Israeli
  attribution before tagging to an Iranian actor.
