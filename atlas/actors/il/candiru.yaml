ttp_summary: |
  Israeli commercial-spyware / private-sector offensive actor (PSOA).
  Tooling: DevilsTongue Windows implant (per MSTIC July 2021),
  iOS / macOS / Android implants. Sells exploitation-as-a-service
  to government customers including (per Citizen Lab telemetry)
  Saudi Arabia, the UAE, Uzbekistan, Singapore, Qatar, and others.
  CVE-2021-31979 and CVE-2021-33771 (Windows kernel zero-days)
  attributed to Candiru and patched by Microsoft July 2021
  jointly with the Citizen Lab disclosure. Approximately 100+
  Citizen Lab-confirmed victims at first disclosure including
  Palestinian Authority officials, journalists, activists,
  political dissidents, and embassy workers.

  **Vendor-as-cluster, not state-operator-cluster.** Events using
  Candiru tooling attribute to the *buyer* state where known
  (often UAE / Saudi Arabia) rather than to Israel. This actor
  entry exists for tooling-lineage tracking and for the rare
  cases where the operator is Israeli (e.g. Israeli police
  domestic Pegasus / Candiru use, partially exposed in Calcalist
  reporting 2022).
default_doctrine_alignment_ids: []  # commercial vendor; no IL state doctrine alignment for the vendor entity itself
auspex_assessment: |
  `concur` on the Candiru / SOURGUM / DEV-0336 equivalence and on
  the Israeli-vendor attribution (joint MSTIC + Citizen Lab
  publication July 2021). Sanctioned by US Commerce Entity List
  in November 2021 alongside NSO Group.
