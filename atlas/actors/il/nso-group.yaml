ttp_summary: |
  The largest and most-documented Israeli commercial-spyware
  vendor. Product line: Pegasus (iOS / Android mobile implant
  with zero-click delivery), historical Phantom (Windows /
  desktop, deprecated). Sells exclusively to government
  customers per stated policy; documented customers (per
  Citizen Lab, Amnesty Security Lab, Forensic Architecture, and
  the Pegasus Project journalism consortium) include Saudi
  Arabia, UAE, Bahrain, Morocco, Mexico, Hungary, Poland,
  India, Rwanda, El Salvador, Spain, and others.

  Notable exploit chains: FORCEDENTRY (CVE-2021-30860 iMessage
  zero-click, disclosed by Citizen Lab September 2021); KISMET
  (2020 zero-click iMessage); BLASTPASS (CVE-2023-41064 +
  CVE-2023-41061 iOS zero-click, September 2023). Apple sued
  NSO Group on 23 November 2021 in the Northern District of
  California; WhatsApp / Meta have parallel litigation.

  Sanctioned by US Commerce Entity List 3 November 2021
  alongside Candiru and two other vendors. EU Parliament PEGA
  Committee investigated NSO-deployed Pegasus use against EU
  citizens 2022-2023.

  **Vendor-as-cluster, not state-operator-cluster.** Pegasus
  deployments attribute to the customer government, not to
  NSO or Israel, unless evidence demonstrates Israeli-government
  operational use specifically (Israeli police Pegasus use
  domestically per Calcalist 2022 reporting). The NSO actor
  entry is for tooling-lineage tracking and vendor-as-cluster
  reference, consistent with editorial conventions for
  commercial-cyber mission tagging.
default_doctrine_alignment_ids: []  # commercial vendor; no IL state doctrine alignment for the vendor entity itself
auspex_assessment: |
  `concur` on the canonical attribution of Pegasus and FORCEDENTRY
  to NSO Group (Citizen Lab + Amnesty Security Lab + Apple
  complaint). Events that deploy Pegasus carry their own
  customer-state attribution; events here are confined to
  vendor-action context (sanctioning, litigation, exposure).
