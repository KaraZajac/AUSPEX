# Demoted vn/tc2/apt32 -> vn/unscoped/apt32 on 2026-06-24 (claude-opus-4.8/max LLM audit): of the actor's
# seven cited sources, NONE names TC2 / Tổng cục II / General Department II / the Ministry of Public Security
# / military intelligence or any specific Vietnamese service. All attribute only at the nation level —
# FireEye 2017 "aligned with Vietnamese state interests" / "Vietnamese government interests"; MITRE G0050
# "suspected Vietnam-based threat group"; Volexity "Vietnamese threat actor"; Facebook links activity to a
# private IT front company (CyberOne Group), not a service; and Amnesty 2021 was expressly "not able to
# attribute Ocean Lotus' activities to any company or government entity." The unsourced vn/mps-a05 secondary
# placement rested on the same unattested inference and was removed. Service placement is a QC frontier;
# the Vietnam (named-actor) nexus is well-sourced. See notes. FK-propagated to 23 referencing events.
