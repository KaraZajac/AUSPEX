ttp_summary: |
  The canonical Vietnamese-aligned APT. Tradecraft includes
  watering-hole compromises of regional news and ministry sites
  (especially Cambodian and Lao foreign-ministry sites);
  spear-phishing with weaponized Office documents; the KerrDown,
  Denis, and Roland multi-stage loaders; the Cobalt Strike
  beacon framework; macOS implants targeting Vietnamese diaspora
  Mac users (Bitdefender 2020); fake-news / influence personas
  on Facebook (Facebook takedown December 2020). Domain
  squatting on Vietnamese-language opposition outlets (Viet Tan,
  RFA Vietnamese) is a recurring infrastructure pattern.
