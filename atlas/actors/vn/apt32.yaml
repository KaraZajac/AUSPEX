notes: |
  Former id vn/tc2/apt32 (asserted placement under TC2 / Tổng cục II — General Department II,
  PAVN military intelligence), with a secondary vn/mps-a05 (MPS / A05) strand. Demoted to
  vn/unscoped on 2026-06-24 after an audit of the actor's OWN cited sources: none names a
  specific Vietnamese service. The cited attributions stop at the nation:
    • FireEye (2017, the foundational APT32 attribution): "operations that are aligned with
      Vietnamese state interests" and "APT32 is a cyber espionage group aligned with Vietnamese
      government interests." Names no service.
    • MITRE ATT&CK G0050: "APT32 is a suspected Vietnam-based threat group."
    • Volexity (2020): "the Vietnamese threat actor OceanLotus."
    • Facebook/Meta (2020): linked the activity to "CyberOne Group, an IT company in Vietnam" —
      a private contractor / front company, not a state service.
    • Amnesty Security Lab (2021): "Our investigation was not able to attribute Ocean Lotus'
      activities to any company or government entity"; "unable to independently verify any direct
      connection between Ocean Lotus and CyberOne or with the Vietnamese authorities"; the link to
      "Vietnamese state actors" is left as an open question.
    • Cybereason (2017, Cobalt Kitty): "there was no publicly available evidence that can confirm
      that the OceanLotus Group is a nation-state threat actor."
    • Bitdefender (2020, url null): macOS backdoor technical analysis; no service attribution.
  The Vietnam nexus is well-supported (named-actor level); the specific service (TC2 vs. MPS/A05)
  is an inference the cited sources do not make — the vn/tc2 service record itself concedes vendor
  reporting "attributes the cluster to 'the Vietnamese government' without consistently
  distinguishing TC2 from the Ministry of Public Security" and that "the exact lane [is]
  unattested." Hence vn/unscoped. Restore a service id only when a cited source names one.
  FK-propagated id change to the 23 referencing events on 2026-06-24.
