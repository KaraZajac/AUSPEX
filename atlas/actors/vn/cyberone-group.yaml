ttp_summary: |
  Vietnamese IT company publicly named by Facebook (Meta) on
  11 December 2020 as the operational vehicle behind a subset
  of APT32 / OceanLotus activity. Facebook's attribution
  identified CyberOne Group as the corporate front operating
  the social-media accounts, Android applications, and
  credential-phishing infrastructure that Facebook took down.
  CyberOne Group publicly denied the attribution; Facebook
  stood by it. Operationally, CyberOne Group is best modeled
  as a contractor / front for APT32 tasking rather than a
  separate cluster. AUSPEX retains the actor entry to preserve
  the corporate-attribution datum.
