notes: |
  De-provisionalized 2026-06-23 (claude-opus-4.8/max) from a PROVISIONAL backfill stub
  ("NEW: Arid Viper (Gaza-based APT)"). Kept ps/unscoped: the Palestinian/ps nexus is well
  attested (Meta: activity "originated in Palestine"; CFR/Cisco Talos: "a threat actor believed
  to operate from the Palestinian Territories"), but the service/sponsor — suspected Hamas cyber
  division — is alleged, not established, so service placement remains unresolved (unscoped is the
  honest default). Aliases APT-C-23 / Desert Falcon / Mantis / Two-tailed Scorpion sourced to
  Malpedia + the corpus's own Symantec (Mantis) reporting; broader Gaza Cybergang/Molerats
  overlaps left as disputed prose, not asserted in aliases[]. Added the Meta (Facebook) 2021
  source (the Phenakite event's primary), MITRE G1028, mission: +surveillance, and target sectors.
