ttp_summary: |
  Arid Viper is a Palestinian-aligned (Gaza/West-Bank-nexus) cyber-espionage actor active since
  at least 2015, widely assessed by vendors to be associated with Hamas — though that sponsorship
  is SUSPECTED/alleged (largely on geopolitical context), not conclusively established, which is
  why this record stays ps/unscoped. Also tracked as APT-C-23, Desert Falcon (Kaspersky), Mantis
  (Symantec), Two-tailed Scorpion, and by campaign name "Operation Bearded Barbie"; sometimes
  grouped in the broader Gaza Cybergang / Molerats ecosystem, though those overlaps are
  disputed rather than strict equivalences. Tradecraft centers on social engineering with
  fabricated personas and politically-themed phishing lures, sprawling web infrastructure
  (malware-hosting, phishing, and C2 — "over a hundred websites" in the 2021 Meta case), and a
  custom multi-platform malware toolkit: the Delphi-based Micropsia implant (with PyMicropsia and
  Android ports), the Go-based Arid Gopher backdoor, SpyC23 Android spyware, and the BarbWire
  Windows backdoor, supplemented by publicly available tools (SpyNote, NjRAT, HWorm). In 2021
  Meta disclosed Arid Viper's first known iOS surveillanceware, "Phenakite," trojanized inside a
  RealtimeChat-based chat app and using the Osiris jailbreak / Sock Port exploit for post-install
  privilege escalation. Targeting spans Palestinian government, Fatah-affiliated figures, student
  groups, and security forces, as well as Israeli defense/law-enforcement officials (Operation
  Bearded Barbie, 2022) and other Middle East targets.
