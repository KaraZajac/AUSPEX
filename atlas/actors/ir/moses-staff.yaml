notes: |
  Former id ir/moses-staff with primary_service_id: ir/irgc (an irregular 2-part id that lacked the
  service segment, with an IRGC placement the record's own inline comment flagged as "service attribution
  less firm than CyberAv3ngers / HomeLand Justice"). Demoted to ir/unscoped on 2026-06-24
  (claude-opus-4.8/max) after auditing the actor's three cited sources against their raw text: NONE names
  the IRGC, MOIS, the Quds Force, the Revolutionary Guard, or any specific Iranian service.
  - Check Point Research (2021), the primary-access source, explicitly DECLINES nation attribution in its
    own Attribution section: "Attributing politically motivated cyberattacks is always complicated.
    Currently, with all the information we have available, we can't draw any definitive conclusions." Its
    only artifacts point AWAY from Iran toward the Palestinian territories (a tool, OICe.exe, submitted to
    VirusTotal "from Palestine") and a GMT+3 timezone ("the time zone of Israel and the Palestinian
    territories"). The string "Iran" appears in the article only inside a UI country-selector dropdown,
    not in the prose.
  - Cybereason Nocturnus (2022): "tracking the Iranian hacker group known as Moses Staff"; "State-Sponsored
    Ransomware: Moses Staff employs ransomware ... not for financial gain, but to ... advance Iran's
    geopolitical goals." Iran nexus, NO service. ("State-Sponsored" here is a motive subheading, not a
    service attribution.)
  - SOCRadar (2022, updated 2024): near-verbatim echo of Cybereason — "the Iranian hacker group known as
    Moses Staff", "to advance Iran's geopolitical goals." Iran nexus, NO service.
  For completeness: the Secureworks/CTU (2023) report on the same COBALT SAPLING cluster (cited on the
  2023 event, not on this actor) likewise names only "the Iranian COBALT SAPLING threat group" and asserts
  no state sponsorship or named agency. So no source in the corpus places Moses Staff under an Iranian
  service. Iran nexus reaches at most named-actor confidence (and is itself soft — Check Point's primary
  report is non-committal and notes Palestinian-territory artifacts); the service placement is unsourced.
  Parallels the ir/mois/agrius -> ir/unscoped/agrius demotion. Keep ir/unscoped until a cited source names
  a service. FK-propagated id change to the 2 referencing events on 2026-06-24.
