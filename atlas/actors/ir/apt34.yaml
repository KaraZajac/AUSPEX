# ir/mois placement VERIFIED 2026-06-24 (claude-opus-4.8/max): of the three cited sources, the
# Lab Dookhtegan leak names the MOIS specifically as APT34/OilRig's operating service ("the cyber
# tools (APT34 / OILRIG) that the ruthless Iranian Ministry of Intelligence has been using" + dumped
# PII of MOIS officers). The two vendor sources (Mandiant/FireEye, Symantec) attribute only "Iranian"
# / "Iran-linked" — they do NOT name the MOIS. Placement therefore rests on the (tertiary) leak
# source; see notes for the full evidentiary breakdown and calibration caveat.
