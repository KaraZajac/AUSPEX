notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): ir/mois service placement VERIFIED against the actor's
  own cited sources, with a calibration caveat. APT34/OilRig is near-universally tied to the MOIS in
  the wider literature, but most tier-1 vendor reporting stops at "Iranian":
    - mandiant/apt34-profile — the foundational FireEye/Mandiant APT34 reporting attributes only to a
      "suspected Iranian threat group" working "on behalf of the Iranian government" (text preserved
      via MITRE ATT&CK G0049's verbatim citation; the cited mandiant.com URL now dead-redirects to
      cloud.google.com — see that source's note). Does NOT name the MOIS.
    - symantec/crambus-profile — Symantec's "Crambus: New Campaign Targets Middle Eastern Government"
      (2023-10-19) says "The Iranian Crambus espionage group (aka OilRig, APT34)", "a long-running
      Iranian espionage group", and "Iran-linked actors". Does NOT name the MOIS.
    - lab-dookhtegan/2019-04_apt34-leak — DOES name the MOIS specifically and at the operating-service
      level. The Lab Dookhtegan leakers' own message: "We are exposing here the cyber tools (APT34 /
      OILRIG) that the ruthless Iranian Ministry of Intelligence has been using against Iran's
      neighboring countries, including names of the cruel managers" — and the dump included "the names
      and phone numbers of some individuals working for the Iranian Ministry of Intelligence". This is
      the source the ir/mois placement rests on (already reflected in ttp_summary).
  VERDICT: KEEP ir/mois — at least one cited source (Lab Dookhtegan) names the MOIS as the operating
  service. CAVEAT: that source is TERTIARY (an anonymous 2019 Telegram leak) and the MOIS naming is
  the leakers' own claim rather than an independent attributing authority's; the corroborating tier-1
  vendors (Mandiant, Symantec) and the MISP "OilRig" galaxy describe the group only as "Iranian"
  (MISP country IR), not MOIS. The placement is therefore source-supported but leans on a tertiary
  source — weaker than ir/mois/scarred-manticore (kept on a tier-1 Check Point MOIS attribution). If
  the Lab Dookhtegan source is ever discounted, this would fall to ir/unscoped.
sources:
  - mandiant/apt34-profile
  - symantec/crambus-profile
  - lab-dookhtegan/2019-04_apt34-leak

