ttp_summary: |
  DNS tunneling (DNSpionage, Karkoff), web-shell deployment,
  supply-chain compromises of MSPs and IT vendors, credential
  theft. Toolkit (Glimpse, PoisonFrog, HyperShell, HighShell,
  Fox Panel, Webmask) leaked via the Lab Dookhtegan Telegram
  dump in April 2019 along with PII of MOIS officers.
