ttp_summary: |
  PowerShell-heavy custom tooling (POWERSTATS, PowGoop); DLL
  side-loading; exploitation of public-facing vulnerabilities;
  hands-on-keyboard intrusions. Increasingly destructive disk-
  wiping disguised as ransomware (DarkBit Golang ransomware
  used against Technion, February 2023). CISA AA22-055A
  (February 2022) formally attributed MuddyWater to MOIS.
