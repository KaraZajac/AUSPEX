ttp_summary: |
  Iran-aligned cyberespionage group, active since at least 2017 (ESET telemetry), assessed by ESET
  with medium confidence to be a subgroup of OilRig (APT34). Conducts persistent diplomatic/political
  intelligence collection against Kurdistan Regional Government officials and high-ranking Iraqi
  government officials, plus a regional telecommunications provider in Uzbekistan. Runs a custom toolkit:
  the Whisper and Shahmaran backdoors, the PrimeCache malicious IIS module, the Flog webshell, and the
  Laret/Pinar reverse tunnels. Gains access by exploiting internet-facing web servers (the suspected
  vector for the Iraqi-government compromises) to deploy webshells. The OilRig linkage rests on shared
  Middle East targeting, recovery of OilRig's VideoSRV and RDAT tools on compromised KRG systems, and
  code similarities between PrimeCache and OilRig's RDAT backdoor (ESET, 2025).
