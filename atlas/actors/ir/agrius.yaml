notes: |
  Former id ir/mois/agrius (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced MOIS
  placement). Demoted to ir/unscoped on 2026-06-23: of the cited Agrius sources, SentinelLabs (2021)
  attributes only "a threat group affiliated with Iran" / "of Iranian origin" at MEDIUM confidence and
  explicitly found "no solid links to any known threat groups"; Unit 42 (2023) calls it an
  "Iranian-linked"/"Iranian-backed" APT at HIGH confidence; ESET (2022) says only "Agrius operators."
  None names MOIS, the IRGC, or any specific Iranian service. Iran nexus is well-supported (named-actor
  level), the service placement is not — hence ir/unscoped. Agrius's specific service attribution is
  debated in the wider literature; keep ir/unscoped until a cited source names a service.
  FK-propagated id change to the 4 referencing events on 2026-06-23.
  MERGED 2026-06-24 (Kara's decision): the "Black Shadow" hack-and-leak persona (Shirbit 2020,
  Cyberserve/Atraf 2021) was folded into this record — Black Shadow = Agrius = Pink Sandstorm is one
  cluster (MISP "Pink Sandstorm" lists BlackShadow / Agrius / Agonizing Serpens / DEV-0022 / UNC2428 /
  AMERICIUM / SPECTRAL KITTEN as synonyms). The former ir/unscoped/black-shadow record was retired and
  its 2 events re-pointed here. Note: that retired record had been wrongly cross-walked to MISP DEV-0270
  (Nemesis Kitten / Cobalt Mirage — a SEPARATE Iranian ransomware contractor); the mislink is resolved
  by this merge. The 6 events now span both Agrius's wiper ops and the Black Shadow hack-and-leaks.
