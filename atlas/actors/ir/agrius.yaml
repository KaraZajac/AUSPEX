ttp_summary: |
  Iran-nexus destructive actor first surfaced by SentinelLabs in 2021, operating against Israeli
  targets since 2020. Conducts espionage, then deploys destructive wipers masqueraded as ransomware
  for deniable disruptive effect (SentinelLabs: "we find it unlikely that Agrius is a financially
  motivated threat actor"). Custom toolset includes the Apostle wiper (later reworked into functional
  ransomware), the IPsec Helper .NET backdoor, and the reused DEADWOOD/Detbosit wiper; later campaigns
  added the Fantasy, MultiLayer, PartialWasher and BFG Agonizer wipers. Gains access by exploiting
  public-facing applications and anonymizes via public VPNs (primarily ProtonVPN); has also abused an
  Israeli software vendor's update mechanism for a supply-chain wiper attack (ESET, 2022). Beyond
  Israel, one Apostle ransomware sample carried a message indicating use against a critical,
  nation-owned facility in the United Arab Emirates (SentinelLabs, 2021).
