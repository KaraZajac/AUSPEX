ttp_summary: |
  Iran-nexus espionage cluster specializing in fake-recruitment
  ("dream job") social-engineering against aerospace,
  defense-manufacturing and telecommunications targets. 2026 campaigns
  delivered RAT payloads across the MiniUpdate (four variants) and
  MiniJunk (V2) families and introduced AppDomainManager hijacking to
  disable a .NET application's own security at initialization. The cited
  Unit 42 disclosure attributes only an "Iran-nexus" cluster "aligned
  with Iranian intelligence objectives" and names no service; an
  IRGC affiliation has been reported in the wider literature (e.g.
  Mandiant on UNC1549) but is not established by this record's cited
  source, so the service is left unscoped (ir/unscoped) pending a cited
  source that names a specific Iranian service.
