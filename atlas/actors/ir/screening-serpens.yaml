ttp_summary: |
  Iran-nexus espionage cluster specializing in fake-recruitment
  ("dream job") social-engineering against aerospace,
  defense-manufacturing and telecommunications targets. 2026 campaigns
  delivered RAT payloads across the MiniUpdate (four variants) and
  MiniJunk (V2) families and introduced AppDomainManager hijacking to
  disable a .NET application's own security at initialization. Assessed
  IRGC-affiliated (Mandiant); the specific IRGC bureau is not firmly
  established, so primary_service_id ir/irgc reflects the parent-service
  assessment rather than a confirmed sub-unit.
