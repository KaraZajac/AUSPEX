  at "moderate-high confidence." A fixed-string sweep of the captured page yielded zero occurrences of IRGC /
  Islamic Revolutionary Guard Corps / Revolutionary Guard / Guard Corps / MOIS / Ministry of Intelligence /
  Quds / Pasdaran. The prior "Assessed IRGC-affiliated (Mandiant)" claim relied on a Mandiant assessment that
  is not among this record's cited sources; the misp_galaxy UNC1549 cross-ref is a name-equivalence signal
  only and carries no service claim. Iran nexus is well-supported at the named-actor level; the service
  placement is not — hence ir/unscoped, mirroring the ir/irgc→ir/unscoped demotions of imperial-kitten and the
  ir/mois→ir/unscoped demotion of agrius. Keep ir/unscoped until a cited source names a specific Iranian
  service. FK-propagated the id change to the 1 referencing event on 2026-06-24.
