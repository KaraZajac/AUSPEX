  Verification of the asserted IRGC service placement against the actor's sole cited source — Palo Alto
  Networks Unit 42, "Tracking Iranian APT Screening Serpens' 2026 Espionage Campaigns" (2026-05-22) — found
  the source names NO Iranian service. Its strongest attribution is generic: "the Iran-nexus advanced
  persistent threat (APT) group Screening Serpens (aka UNC1549, Smoke Sandstorm and Iranian Dream Job)" and
