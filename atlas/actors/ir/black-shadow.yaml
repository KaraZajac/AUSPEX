ttp_summary: |
  Iran-aligned hack-and-leak persona that struck Israeli targets: Shirbit Insurance leak (Dec 2020)
  and the CyberServe / Atraf LGBTQ-dataset leak (Oct 2021), plus Israeli tourism and telecom targeting.
  Tradecraft: intrusion via exposed internet-facing infrastructure (VPN gateways, web hosts), serial
  public PII leaks staged through a Telegram persona, and ransom demands serving as cover for
  ideological coercion. Attributed only as "Iran-aligned" by INCD; no cited source names a specific
  Iranian service. NOTE: the actor record's cited Microsoft source profiles DEV-0270 / Nemesis Kitten
  (a BitLocker-abusing ransomware sub-group of PHOSPHORUS run by the Najee Technology / Secnerd
  contractor) and assesses it acts "on behalf of the government of Iran" at MODERATE confidence — but
  it never names "Black Shadow", so it does not by itself substantiate the Black Shadow=DEV-0270
  identity. See the identity caveat in notes.
