notes: |
  SERVICE PLACEMENT (audit 2026-06-24, claude-opus-4.8/max): demoted ir/irgc/black-shadow ->
  ir/unscoped/black-shadow. The former IRGC placement was UNSOURCED by this record's own cited
  sources. Of those sources: Microsoft (2022) verbatim "tied these attacks to DEV-0270, also known as
  Nemesis Kitten, a sub-group of Iranian actor PHOSPHORUS. Microsoft assesses with moderate confidence
  that DEV-0270 conducts malicious network operations ... on behalf of the government of Iran" — and a
  LOW-confidence caveat that some attacks "are a form of moonlighting for personal or company-specific
  revenue generation"; the word "IRGC" / "Revolutionary Guard" / "MOIS" / "Ministry of Intelligence"
  appears NOWHERE in the source, and neither does the string "Black Shadow". The INCD profile is a
  gov.il department landing page titled "Iran-Aligned Black Shadow" with no service named (its captured
  snapshot is an empty JS shell). Iran nexus is well-supported (named-actor level, "Iran-aligned"); the
  service is not — hence ir/unscoped, mirroring the sibling ir/unscoped/agrius demotion.

  IDENTITY CAVEAT — is "Black Shadow" really DEV-0270? Doubtful; this looks like a MISP over-merge.
  MISP-galaxy threat-actor.json resolves uuid 7b90319a-9f7b-466d-9f90-7fcc270ed505 to cluster value
  "DEV-0270" (synonyms Nemesis Kitten, Storm-0270; "a sub-group of Iranian actor PHOSPHORUS") and that
  cluster does NOT list "Black Shadow" at all. The name "Black Shadow"/"BlackShadow" is instead a
  synonym in a SEPARATE MISP cluster — "Pink Sandstorm" / Agonizing Serpens (uuid
  0876c327-c82a-45f7-82fa-267c312ceb05; synonyms incl. Agrius, DEV-0022, UNC2428, "Black Shadow"), which
  MISP describes as having "strong connections to Iran's Ministry of Intelligence and Security". So MISP
  equates Black Shadow with AGRIUS (MOIS-linked destructive-wiper actor), not with the DEV-0270
  ransomware contractor (Cobalt Mirage / Najee Technology). The wider literature (ClearSky, Check Point)
  likewise reads the Israeli "Black Shadow" hack-and-leak persona as MuddyWater/MOIS-adjacent, not as
  the IRGC ransomware crew. The external_refs DEV-0270 link below is retained per audit instruction but
  the alias confidence is set to "disputed" to record this over-merge; a future pass may re-point the
  external_ref to the Pink Sandstorm/Agrius cluster (or fold Black Shadow into Agrius) and would then
  reassess whether the MOIS attribution carries over. FK-propagated the id change to the 2 referencing
  events on 2026-06-24.
