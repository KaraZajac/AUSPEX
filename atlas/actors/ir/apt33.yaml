ttp_summary: |
  Spear-phishing with aerospace-themed lures, custom backdoors
  (TURNEDUP, NANOCORE wrappers), commodity malware, password-
  spray. Linked by multiple vendors to the Shamoon disk-wiper
  lineage (2012 Saudi Aramco; 2016 / 2018 Shamoon 2 / 3 waves).
  Reported operating from companies including Nasr Institute
  and Sayyed Shojaa Mojarad-linked entities.
