ttp_summary: |
  Long-running social-engineering with persona development
  (impersonation of journalists, conference organizers,
  scholars). OAuth abuse; Google Workspace and Microsoft 365
  credential phishing. HYPERSCRAPE mailbox exfiltration tool.
  Mobile spyware against Iranian dissidents. Microsoft civil
  lawsuit in 2019 seized 99 APT35-related domains.
