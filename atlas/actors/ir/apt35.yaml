notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): ir/irgc service placement VERIFIED against the
  actor's own cited sources — KEEP. Of the 4 cited sources, two name the IRGC specifically
  (not merely "Iranian" / "government of Iran"):
    • Microsoft Mint Sandstorm CII (2023-04-18) — STRONGEST, tier-1 vendor: equates the
      cluster ("Mint Sandstorm ... overlaps with public reporting on groups known as APT35,
      APT42, Charming Kitten, and TA453") and states "Microsoft assesses that Mint Sandstorm
      is associated with an intelligence arm of Iran's military, the Islamic Revolutionary
      Guard Corps (IRGC), an assessment that has been corroborated by multiple credible
      sources including Mandiant, Proofpoint, and SecureWorks. In 2022, the US Department of
      Treasury sanctioned elements of Mint Sandstorm for past cyberattacks citing sponsorship
      from the IRGC."
    • CertFA (2018-12) — corroborates with a hedge: the infrastructure is run by "a group of
      hackers who are supported by the Iranian government, and that we believe have close ties
      with the Islamic Revolutionary Guard Corps (IRGC)."
  The other two cited sources do NOT name the IRGC: Google TAG (HYPERSCRAPE) says only
  "Iranian"/"Iranian government"; the Mandiant "profile" source is a placeholder (cited URL is
  the bare mandiant.com homepage — captured snapshot has no APT35/Charming Kitten/IRGC content).
  Because the placement requires only that a cited source name the service, the IRGC placement
  stands on Microsoft (+ CertFA). MISP corroborates the cluster identity (galaxy "Charming
  Kitten", uuid f98bac6b-12fd-4cad-be84-c84666932232: country IR, synonyms incl. Mint Sandstorm,
  Newscaster, CharmingCypress) but at cluster level says only "suspected nexus to Iran" (no IRGC).
  NB the IRGC has no public vendor-to-unit numbering (see ir/irgc service note), so the placement
  is at the IRGC-organization level, not a specific sub-command.
