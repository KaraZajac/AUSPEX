ttp_summary: |
  Iran-nexus espionage actor that first surfaced as the "Tortoiseshell" cluster (Symantec and
  Cisco Talos, 2019: supply-chain compromise of Saudi IT providers, and a fake US-veterans hiring
  site). Both 2019 vendors named NO nation; CrowdStrike attributed the cluster to Iran as "Imperial
  Kitten" in 2023, with a SUSPECTED (not established) connection to the IRGC — hence ir/unscoped.
  Also tracked as Tortoiseshell, TA456 (Proofpoint), and Crimson Sandstorm (Microsoft). Known for
  fake-persona / social-engineering lures, strategic web compromises, and custom malware.
