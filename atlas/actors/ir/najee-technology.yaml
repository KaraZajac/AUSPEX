notes: |
  KEPT — ir/irgc placement VERIFIED (2026-06-24, claude-opus-4.8/max) against the actor's cited
  government primaries. OFAC jy0948 (the same designation under which sibling ir/irgc/afkar-system
  was kept) names the IRGC specifically — not merely "Iranian" — and ties Najee Technology to it by
  name as one of the designated, IRGC-affiliated entities. Verbatim (Treasury): "The individuals and
  entities designated today are all affiliated with Iran's Islamic Revolutionary Guard Corps (IRGC)."
  — "This IRGC-affiliated group is comprised of employees and associates of Najee Technology Hooshmand
  Fater LLC (Najee Technology) and Afkar System Yazd Company (Afkar System)." — "The IRGC-affiliated
  employees ... of the IRGC-affiliated companies, Najee Technology and Afkar System, are responsible
  for or complicit in ... global targeting of various networks, including critical infrastructure."
  — "Najee Technology was designated pursuant to E.O. 13694, as amended, for having materially
  assisted, sponsored, or provided financial, material, or technological support for ... the IRGC."
  CISA AA22-257A corroborates at the named-actor level: "These actors often operate under the auspices
  of Najee Technology Hooshmand Fater LLC, based in Karaj, Iran, and Afkar System Yazd Company, based
  in Yazd, Iran" (in a joint advisory titled "Iranian IRGC-Affiliated Cyber Actors..."). Both
  primaries captured + hashed (see source AUDIT notes). The DOJ indictment press release corroborates
  but could not be raw-captured (justice.gov HTTP 400 to curl / HTTP 403 to WebFetch; archive.org
  blocked) and is not load-bearing. Service attribution is therefore source-supported; KEPT at ir/irgc.
