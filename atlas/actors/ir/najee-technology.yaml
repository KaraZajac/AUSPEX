ttp_summary: |
  IRGC-affiliated ransomware contractor cluster (paired with
  Afkar System; principals indicted Sept 14, 2022: Mansour
  Ahmadi, Ahmad Khatibi Aghda, Amir Hossein Nikaeen Ravari).
  Exploitation of Fortinet, Microsoft Exchange, and VMware
  Horizon (Log4j) vulnerabilities; BitLocker abuse; double
  extortion. Notable targets: Boston Children's Hospital
  (June 2021 attempt, thwarted); Vermont healthcare; a US
  domestic-violence shelter; US accounting firms.
