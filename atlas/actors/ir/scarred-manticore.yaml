ttp_summary: |
  Iranian MOIS-affiliated espionage actor that Check Point Research (with Sygnia, 2023)
  attributes to "an actor affiliated with the Ministry of Intelligence and Security (MOIS)."
  Active against Internet-facing Windows servers in the Middle East since at least 2019, with
  the latest LIONTAIL campaign peaking in mid-2023 after going undetected for at least a year.
  Targets high-profile government, military, telecommunications and financial organizations,
  plus IT-service providers and NGOs, across Saudi Arabia, the UAE, Jordan, Kuwait, Oman, Iraq
  and Israel — a victim profile Check Point notes is "in line with the typical victim profile
  that MOIS-affiliated clusters usually target." Tradecraft centers on stealthy, long-dwell
  passive implants on Windows web servers: the custom LIONTAIL framework abuses undocumented
  functionality of the Windows HTTP.sys driver (via IOCTLs rather than the HTTP API) to extract
  memory-resident shellcode payloads from inbound HTTP traffic, generating a tailor-made implant
  per compromised server to blend into legitimate traffic. Earlier and overlapping tooling
  includes the FOXSHELL and SDD .NET web-shell/backdoor families and the WINTAPIX kernel-mode
  driver. Some tools overlap with historic OilRig/APT34 activity (Check Point assesses the
  groups are "likely related" but lacks data to fully attribute Scarred Manticore to OilRig),
  and some are tied to the MOIS-sponsored destructive attack on Albanian government
  infrastructure tracked as DEV-0861. Cisco Talos published a parallel analysis of part of this
  activity.
