notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): ir/mois service placement VERIFIED against the actor's
  own cited sources. US Treasury OFAC's designation press release (jy0941, 2022-09-09) names the
  MOIS specifically as the responsible service — "designating Iran's Ministry of Intelligence and
  Security (MOIS)... In July 2022, cyber threat actors assessed to be sponsored by the Government
  of Iran and MOIS disrupted Albanian government computer systems," and "MOIS cyber actors were
  also responsible for the leaking of documents purported to be from the Albanian government" (the
  HomeLand Justice leak site). This is a named-service attribution, not merely "Iranian." The
  co-cited CISA AA22-264A attributes only at the nation level ("Iranian state cyber actors—
  identifying as 'HomeLand Justice'"; no "MOIS"), and the Mandiant blog is now link-rotted to a
  content-less Google Cloud landing page (Wayback blocked) — so the MOIS placement rests on the
  Treasury source alone, which is sufficient. MISP galaxy (HomeLand Justice,
  bfc538e1-9205-420a-8641-6292023ecd08) lists country IR and "Iranian state-sponsored" but does not
  name MOIS — corroborates Iran-nexus, not the service. KEEP at ir/mois. Contrast ir/unscoped/agrius
  (demoted: sources said only "affiliated with Iran"); this case is closer to ir/mois/scarred-manticore
  (KEPT on an explicit MOIS-affiliation statement).
