ttp_summary: |
  Iranian anti-regime hacktivist persona. Notable operations:
  October 2022 leak against the Atomic Energy Organisation of
  Iran (AEOI) — 50 GB leak issued as an ultimatum tied to the
  Mahsa Amini protests; 2023 leaks against Press TV /
  Hafhashtad. Assessed counter-regime rather than state-aligned.

  **NOT IRANIAN STATE-SPONSORED.** Included for analyst
  awareness: Iranian-language hacktivist personas can be either
  state fronts (CyberAv3ngers, HomeLand Justice, Moses Staff,
  Black Shadow, Emennet Pasargad personas) or genuinely anti-
  regime (Black Reward, Lab Dookhtegan). Analyst review is
  required for any "Iranian hacktivist" attribution that rests
  on a Telegram channel alone.
