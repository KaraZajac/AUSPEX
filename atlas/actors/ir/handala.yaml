ttp_summary: |
  Hacktivist-styled persona that launched on Telegram and X
  simultaneously on 18 December 2023 — six weeks after the
  October 7 Hamas attacks on Israel. Operational pattern: leak-
  and-defacement against Israeli government, civil-society,
  healthcare, and personal targets; wiper deployment masquerading
  as PDF (notably the 20 July 2024 CrowdStrike-outage-themed
  phishing wave); persistent credential-phishing and Telegram-
  delivered malware against Iran International diaspora-media
  journalists. The DOJ's August 2024 advisory framing of Aria
  Sepehr Ayandehsazan and the broader pattern of MOIS-operated
  hacktivist personas (HomeLand Justice attested 2022) establish
  the structural template Handala fits. Israeli National Cyber
  Directorate (INCD) issued a public warning about the persona
  on 19 December 2023.
