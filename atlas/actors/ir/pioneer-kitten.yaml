notes: |
  Former id ir/irgc/pioneer-kitten (asserted an unsourced IRGC placement). Demoted to ir/unscoped on
  2026-06-24 after an LLM audit (claude-opus-4.8/max) of all four cited sources against their raw,
  hashed snapshots: NONE names the IRGC — the literal strings "IRGC" and "Revolutionary Guard" return
  zero hits in every cited source. Per-source attribution wording:
    - FBI/CISA/DC3 joint advisory AA24-241A (2024-08-28): "Iran-based cyber actors" / "Iranian cyber
      actors"; strongest attribution is "The FBI further assesses these Iran-based cyber actors are
      associated with the Government of Iran (GOI) and ... conduct computer network exploitation
      activity in support of the GOI." A state-level (GOI) claim, NOT a service-level (IRGC) one. The
      advisory also notes the actors "do not disclose their Iran-based location to their ransomware
      affiliate contacts" and operate under the moniker Br0k3r.
    - ClearSky "Fox Kitten Campaign" (2020-02, 38-pp PDF): section "Attribution to Iranian APT Groups";
      "state-sponsored Iranian APT groups"; attributed to the "Iranian offensive groups (APT34 and
      APT33)" (and APT39/Chafer) at "medium probability" — APT-cluster level, no service named.
    - Check Point "Pay2Key — The Plot Thickens" (2020-12): traces ransoms to "an Iranian based Bitcoin
      exchange" (Excoino), assesses "the owners of the final wallets are Iranian citizens" — "Iranian",
      never IRGC.
    - Halcyon "Pay2Key.I2P" (2025-07): the article body calls Pay2Key "an Iranian government-linked
      threat actor" targeting "victims aligned with Iranian state interests" and cites the CISA advisory
      "explicitly attributing Pay2Key as an Iranian-based threat actor"; the page's own <title>/og:title
      is "Pay2Key Iranian-Linked Ransomware is Back, Back Again." (Note: the AUSPEX source-record title
      "IRGC-Aligned …" was an editorial embellishment NOT present in Halcyon's text — corrected in the
      source record during this audit.)
  Wider open-source literature does tie Fox/Pioneer Kitten to the IRGC, but no source CITED by this
  record does; keep ir/unscoped until a cited source names a service. FK-propagated id change to the
  5 attributions across 4 referencing events on 2026-06-24.
