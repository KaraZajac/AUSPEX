ttp_summary: |
  Initial-access broker selling or handing off access to
  ransomware affiliates (NoEscape, RansomHouse, ALPHV /
  BlackCat). Exploits edge devices (Fortinet, Citrix, Pulse
  Secure, F5, Palo Alto, Check Point); webshells; credential
  theft. Direct ransomware deployment via the Pay2Key persona
  (2020-21) and Pay2Key.I2P RaaS (2025-26).
