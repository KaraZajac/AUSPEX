ttp_summary: |
  Cyber-enabled influence operations and election interference.
  Voter-data scraping via cURL exploitation of misconfigured
  state election portals; mass-email intimidation campaigns
  (the 2020 spoofed "Proud Boys" emails to US registered
  voters); impersonation of US extremists and Israeli /
  American media outlets; persona-driven hack-and-leak. DOJ
  November 2021 indicted Seyyed Mohammad Hosein Musa Kazemi and
  Sajjad Kashian.
notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): ir/irgc service placement VERIFIED against the
  actor's own cited sources. US Treasury OFAC (2021-11-18, jy0494) names the IRGC specifically:
  Emennet Pasargad, under its former name Net Peygard Samavat Company, was designated in
  February 2019 for "having materially assisted, sponsored, or provided financial, material, or
  technological support for, or goods or services to or in support of, the Islamic Revolutionary
  Guard Corps-Electronic Warfare and Cyber Defense Organization (IRGC-EWCD)," and its manager
  Shirinkar was likewise designated for "having materially assisted the IRGC-EWCD." The placement
  is therefore source-supported at the named-actor level (Emennet is an IRGC-EWCD contractor firm,
  homed under ir/irgc per the AUSPEX convention; the ir/irgc service record itself lists Emennet
  Pasargad among IRGC contractor firms). The other cited sources do NOT independently name the
  IRGC: CISA AA20-304A (2020-10-30) predates the attribution and says only "Iranian Advanced
  Persistent Threat Actor"; the FBI/Treasury/INCD 2024 joint advisory (captured as AA24-233A /
  JCSA-20241030-001, dated 2024-10-30) calls it only "the Iranian cyber group Emennet Pasargad";
  the DOJ SDNY indictment release was bot-blocked and could not be captured. MISP corroborates the
  Iran nexus only: the Cotton Sandstorm galaxy entry (synonyms Emennet Pasargad / Holy Souls /
  MARNANBRIDGE / NEPTUNIUM / HAYWIRE KITTEN) says "linked to the Iranian government … sanctioned
  by the US Treasury," suspected state sponsor "Iran (Islamic Republic of)." The IRGC linkage thus
  rests squarely on the Treasury primary source — sufficient for KEEP.
