ttp_summary: |
  Hacktivist-styled persona that emerged 16 November 2023, six
  weeks after the October 7 Hamas attack. Operational pattern:
  destructive wiper deployment (Shred-based Linux file
  destruction) coupled with Telegram-channel data leaks against
  Israeli organizations. The November 2023 Signature-IT
  hosting-provider compromise produced a single-pivot breach
  affecting approximately 40-100 downstream Israeli organizations
  including Israel Innovation Authority, Israel National Archive,
  Ministry of Welfare and Social Security, Ministry of Health,
  Toyota Israel, IKEA Israel, Radware, and academic institutions.
  Vendor consensus assesses Iranian government direction: Check
  Point calls Cyber Toufan "an Iranian threat actor" and groups it
  with CyberAv3ngers among the actors "affiliated with Iran" (The
  Record, 2023-12); SecurityWeek (2024-01) cites Check Point for
  "potential Iranian involvement" and the ICT for indications
  "pointing towards Iran as the likely supporter." These sources
  treat the persona as Iranian-state-aligned WITHOUT naming a
  specific service-level operator (no MOIS / IRGC attribution in
  the cited sources); the service placement is therefore unresolved
  (ir/unscoped) pending a source that names a service. Operational
  pattern and target selection are consistent with the broader
  MOIS-operated hacktivist persona stack, but that mapping is an
  AUSPEX inference, not a sourced attribution.
