ttp_summary: |
  China-nexus espionage cluster tracked by Palo Alto Networks Unit 42 as CL-STA-0048, disclosed in
  January 2025 after an operation against high-value South Asian targets including a telecommunications
  organization and government employees. Gains initial access by exploiting unpatched internet-facing
  services (Microsoft IIS, Apache Tomcat and MSSQL servers), then deploys PlugX backdoors and Cobalt
  Strike, using a novel "Hex Staging" technique to deliver payloads. Steals personal information of
  government employees and other sensitive data, with DNS-based exfiltration (via a DNS logging service
  tailored to a Mandarin-speaking audience) and database-credential theft observed. Tooling and
  infrastructure overlap with the China-nexus DragonRank group, though Unit 42 states it "lack[s]
  sufficient data on DragonRank to definitively link it to CL-STA-0048."
default_doctrine_alignment_ids: []
notes: |
  Former id cn/mss/cl-sta-0048 (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced MSS
  placement). Demoted to cn/unscoped on 2026-06-24: the sole cited Agrius-equivalent source — Unit 42
  (2025-01) — attributes the activity at the NATION level only ("we assess with moderate-high confidence
  that this activity originates in China") and tracks it as an uncategorized activity cluster
  ("a cluster of activity that we track as CL-STA-0048"; CL-STA is Unit 42's uncategorized-cluster
  prefix). The report's strongest attribution language is nation/nexus ("Connection to the Chinese
  Nexus"; "a strong link between this group and the Chinese nexus"); the DragonRank overlap is explicitly
  tentative ("We lack sufficient data on DragonRank to definitively link it to CL-STA-0048"), and
  DragonRank itself is described only as "a Chinese-speaking SEO manipulator service provider." The
  source NEVER names the MSS, the Ministry of State Security, or any specific Chinese service. China
  nexus is well-supported (moderate-high confidence); the service placement is not — hence cn/unscoped.
  Keep cn/unscoped until a cited source names a service. FK-propagated id change to the 1 referencing
  event on 2026-06-24.
