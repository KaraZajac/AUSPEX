# Demoted to cn/unscoped 2026-06-24: both cited sources attribute Storm-0558 only to China/the PRC
# (Microsoft MSTIC 2023: "China-based threat actor", MODERATE confidence; CSRB 2024: "affiliated with
#  the People's Republic of China", "PRC-affiliated threat actor") — neither names the MSS or any
#  specific Chinese intelligence service. The "Storm-####" id is a Microsoft developing/uncategorized
#  designation. Iran-style nation nexus is well-supported; the MSS service placement is not.
