notes: |
  Former id cn/mss/storm-0558, which asserted an MSS (Ministry of State Security) placement not
  supported by either cited source. Demoted to cn/unscoped on 2026-06-24 (AUDIT, claude-opus-4.8/max):
  Microsoft MSTIC (2023-07-14) attributes the actor only as "a China-based threat actor with espionage
  objectives" and "assesses with MODERATE confidence that Storm-0558 is a China-based threat actor";
  the DHS Cyber Safety Review Board report (2024-04) — the more detailed govt-primary source — calls it
  a group "assessed to be affiliated with the People's Republic of China in pursuit of espionage
  objectives", "a China-based threat actor", and "the PRC-affiliated threat actor", and frames the
  operation as "aimed at fulfilling the PRC's intelligence needs". Neither source names the MSS, the
  PLA, or any specific Chinese service; the CSRB's only "intelligence service" reference is to
  Russia's SVR (a comparison), and it engages the "PRC government" only generically. "Storm-####" is a
  Microsoft developing/uncategorized cluster designation, not a service attribution. MISP galaxy
  (5b30bcb8…, "Storm-0558") corroborates at the nation level only (country: CN, suspected sponsor:
  China; no unit). China nexus is well-supported (named-actor level); the service placement is not —
  hence cn/unscoped. Keep cn/unscoped until a cited source names a Chinese service. FK-propagated id
  change to the 1 referencing event (2023-05/storm-0558-exchange-online) on 2026-06-24.
