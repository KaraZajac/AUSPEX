ttp_summary: |
  Stolen Microsoft consumer MSA signing key (acquired via a 2021
  Windows crash dump that improperly contained the key); token
  forgery to access Exchange Online OWA. June–July 2023 campaign
  exfiltrated approximately 60,000 US State Department emails over
  a six-week dwell, targeting the Secretary's office and EAP
  bureau; also hit Commerce (Sec. Raimondo's office), Congressional
  staff, and ~25 organizations including European foreign
  ministries.
