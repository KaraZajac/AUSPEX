notes: |
  Former id cn/mss/deep-panda. Demoted to cn/unscoped on 2026-06-24 (claude-opus-4.8/max audit).
  REASON: the actor's only cited source is the DOJ 2019 Anthem indictment (Fujie Wang), and that
  indictment names NO Chinese service. Its title and body characterize the perpetrators solely as
  a "Sophisticated China-Based Hacking Group" / "an extremely sophisticated hacking group operating
  in China" made up of "a Chinese national" (Wang) "and other members of the hacking group" — never
  the Ministry of State Security, the MSS, or any named PLA/ministry unit. DOJ indictments DO
  sometimes name the MSS (e.g. the separate Oct-2018 JSSD aerospace case named MSS officers Zha Rong
  and Chai Meng), but THIS one does not; the prior cn/mss placement was an unsourced curatorial
  inference resting on vendor/press "Deep Panda = MSS Jiangsu" lore that the cited document does not
  state. China nexus is solidly source-supported (named-individual + "China-based"); the SERVICE is
  not — hence cn/unscoped until a cited source names one. FK-propagated the id change to the 6
  referencing events (OPM, USIS, USPS, Premera, Anthem, United Airlines) the same day. The aliases,
  mission, sectors and doctrine alignment are unchanged.
