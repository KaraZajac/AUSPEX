# Demoted to cn/unscoped 2026-06-24: the actor's sole cited source — the DOJ 2019 Anthem
# indictment (Fujie Wang) — names NO Chinese intelligence service. It describes the perpetrators
# only as a "China-based"/"operating in China" "hacking group" of "Chinese national[s]"; it never
# says "Ministry of State Security"/"MSS" or names any PLA/ministry unit. The MSS placement was an
# unsourced curatorial inference (the "Deep Panda = MSS Jiangsu" claim is vendor/press lore, not in
# the cited indictment). Iran-side analogue: ir/unscoped/agrius (also demoted for an unsourced
# service); contrast ir/mois/scarred-manticore, KEPT because Check Point did name the MOIS.
