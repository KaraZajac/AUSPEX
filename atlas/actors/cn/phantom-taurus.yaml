# cn/unscoped placement (NOT cn/mss): Unit 42's 2025-09-30 naming report attributes Phantom Taurus
# only as a "China-nexus" / "PRC-state-aligned" named threat group whose "espionage operations align
# with People's Republic of China (PRC) state interests". A fixed-string sweep of the captured report
# returned ZERO hits for MSS / Ministry of State Security / PLA / People's Liberation Army / contractor.
# China nexus is well-supported (named-actor level); the service placement is not — hence cn/unscoped,
# mirroring cn/unscoped/storm-0558. Keep cn/unscoped until a cited source names a Chinese service.
# Created 2026-07-11 (AUDIT, claude-opus-4.8/max, Kara-approved) to wire 2025-09/phantom-taurus-unit42-disclosure.
