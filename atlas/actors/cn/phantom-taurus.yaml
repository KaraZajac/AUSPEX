ttp_summary: |
  China-nexus / PRC-state-aligned espionage group named by Palo Alto
  Networks Unit 42 on 30 September 2025, elevated from the long-running
  cluster CL-STA-0043 (first documented June 2023) through the temporary
  group TGR-STA-0043 / "Operation Diplomatic Specter" (May 2024). Sustained
  collection against ministries of foreign affairs, embassies, diplomats,
  and telecom networks across the Middle East, Africa, and Asia, timed to
  "coincide with major global events and regional security affairs."
  Signature tradecraft: the NET-STAR .NET/IIS backdoor suite and a
  maturation from mailbox-level (Exchange) access to DIRECT SQL Server
  database collection — reading target tables directly on the underlying
  store, harder to detect than email exfiltration. Uses shared Chinese-APT
  operational infrastructure "exclusively used by Chinese threat actors,
  including Iron Taurus (aka APT27), Starchy Taurus (aka Winnti) and Stately
  Taurus (aka Mustang Panda)," while its own components show operational
  compartmentalization within that ecosystem. Unit 42 names NO Chinese
  service (no MSS / PLA); China nexus is named-actor / nation-level.
