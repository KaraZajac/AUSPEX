ttp_summary: |
  China-nexus espionage cluster first disclosed by Cisco Talos in 2026, assessed with high
  confidence as "a China-nexus advanced persistent threat (APT) group tasked primarily with
  obtaining and maintaining long-term access to government and related entities around the
  world" (Talos). Observed against government entities in South America since at least late
  2024 and government agencies in Southeastern Europe in 2025. Talos assesses UAT-8302
  follows the China-nexus paradigm of exploiting both zero-day and n-day vulnerabilities for
  initial access (no specific entry vector disclosed for this actor); post-compromise activity
  centres on reconnaissance, credential extraction and lateral movement (Impacket, custom
  PowerShell recon such as whatpc.ps1), with proxy/tunnelling tools (Stowaway) for persistence.
  Deploys multiple custom malware families previously used by other China-nexus or
  Chinese-speaking clusters: NetDraft (a .NET-ported variant of the FinalDraft/Squidoor family
  attributed to Jewelbug/REF7707/CL-STA-0049, and disclosed by ESET as NosyDoor attributed to
  LongNosedGoblin), an updated CloudSorcerer (v3) backdoor, VSHELL, DeedRAT/ZingDoor (Earth
  Estries), Draculoader (Earth Estries / Earth Naga) and SNOWLIGHT (UNC5174 / UNC6586). "UAT"
  is Talos's prefix for an uncategorized/unclassified activity cluster — Talos attributes the
  cluster only to a China nexus, not to any specific Chinese service.
