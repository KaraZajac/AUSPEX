notes: |
  Former id cn/mss/uat-8302 (PROVISIONAL backfill stub, 2026-05-30, which asserted an
  unsourced MSS placement). Demoted to cn/unscoped on 2026-06-24 (claude-opus-4.8/max audit):
  the sole cited source, Cisco Talos (2026), attributes UAT-8302 only as a "China-nexus
  advanced persistent threat (APT) group" at HIGH confidence and never names the MSS (Ministry
  of State Security), the PLA, or any specific Chinese intelligence/military service. ("MSS",
  "Ministry of State Security", "state security", "PLA" and "intelligence service" do not
  appear anywhere in the disclosure; the only "state-sponsored" string is in an unrelated
  Related-Content teaser for a different article.) "UAT" is Talos's uncategorized-cluster
  prefix and Talos does not attribute UAT clusters to a service. The China nexus is
  well-supported at named-actor level, so the cn nation is retained; the service placement is
  not supported — hence cn/unscoped. Keep cn/unscoped until a cited source names a service.
  FK-propagated id change to the 1 referencing event on 2026-06-24.
