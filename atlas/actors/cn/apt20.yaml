  # cn/mcf removed 2026-07-01: the military-civil-fusion alignment rested on a fabricated defense/aerospace victim sector; APT20's cited targeting is broad government/MSP espionage, not dual-use/defense collection.
notes: |
  Former id cn/mss/apt20 (a curated record that asserted a cn/mss placement not backed by the
  cited source). AUDIT (2026-06-24, claude-opus-4.8/max): demoted to cn/unscoped. The actor's
  sole cited source — Fox-IT / NCC Group, "Operation Wocao — Shining a Light on One of China's
  Hidden Hacking Groups" (2019-12-19) — attributes APT20 strictly at the nation level and names
  no service. Executive summary: "Fox-IT assesses with high confidence that the actor is a Chinese
  group and that they are likely working to support the interests of the Chinese government and are
  tasked with obtaining information for espionage purposes. With medium confidence, Fox-IT assesses
  that the tools, techniques and procedures are those of the actor referred to within the industry
  as APT20." The Attribution chapter establishes only Chinese ORIGIN (Chinese Accept-Language
  header; "wocao" Mandarin slang; an untranslated simplified-Chinese 路易斯安那州 State/Region field
  in fake server registration; code overlap with a Chinese dev blog; UTC+8/CST working hours). A
  full-text search of the PDF found no mention of the MSS, the Ministry of State Security, the PLA,
  the Guoanbu, or any Chinese service or unit. The China nexus is well-supported (named-actor /
  nation level); the MSS service placement is not — hence cn/unscoped until a cited source names a
  service. The external_refs MISP galaxy entry (name cluster "APT20") is a naming signal only and
  asserts no service. ttp_summary unchanged (it is source-grounded in the same Fox-IT report and
  does not itself claim a service). FK-propagated id change to the 1 referencing event on 2026-06-24.
