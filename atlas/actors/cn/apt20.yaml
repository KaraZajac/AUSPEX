ttp_summary: |
  Persistent multi-year access, low operational tempo, careful
  cleanup. Distinctive tradecraft per Fox-IT (2019): bypass of
  RSA SecurID software-token two-factor authentication by
  stealing the token's seed material from compromised endpoints
  and patching the local check, abuse of Pulse Secure VPN and
  Citrix gateway appliances as both staging and persistence
  layers, custom backdoors (XServer, Vidar variants), Cobalt
  Strike, Mimikatz, web shells on internet-facing servers.
