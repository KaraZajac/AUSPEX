ttp_summary: |
  Persistent multi-year access, low operational tempo, careful
  cleanup. Distinctive tradecraft per Fox-IT (2019): bypass of
  RSA SecurID software-token two-factor authentication by
  stealing the token's seed material from compromised endpoints
  and patching the local check; initial access via vulnerable
  internet-facing webservers / webshells, with corporate-VPN-plus-
  stolen-credentials for persistence; custom XServer/Agent
  backdoors; Mimikatz for credential access and BloodHound /
  SharpHound for Active Directory reconnaissance; web shells on
  internet-facing servers. (Corrected 2026-07-01: the earlier
  "Pulse Secure / Citrix appliance", "Vidar", and "Cobalt Strike"
  claims are ABSENT from the sole cited Fox-IT report — 0 hits —
  and were removed; Mimikatz/BloodHound/XServer are source-carried.)
