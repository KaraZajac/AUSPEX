  2026-06-24: "UNK_" in Proofpoint's taxonomy denotes an UNCATEGORIZED, still-developing activity
  cluster — Proofpoint's analyst note reads "Proofpoint uses the UNK_ designator to define
  clusters of activity that are still developing and have not been observed for long enough to
  receive a numerical TA designation." The single cited source (Proofpoint, 2025-07) describes
  the bundled clusters as "three Chinese state-sponsored threat actors" / "China-aligned threat
  actors" and assesses the motive as "most likely espionage," but names NO Chinese service: it
  contains zero references to the MSS, the Ministry of State Security, or the PLA. The TA415/APT41
  resemblance is explicitly an overlap that is NOT an attribution — "Proofpoint is tracking
  UNK_FistBump activity as distinct to TA415 at this time." The China nexus is thus supported at
  the nation/state-sponsored level, but the service placement is not — hence cn/unscoped, not
  cn/mss. Keep cn/unscoped until a cited source names a specific Chinese service.
  FK-propagated id change to the 1 referencing event on 2026-06-24.
