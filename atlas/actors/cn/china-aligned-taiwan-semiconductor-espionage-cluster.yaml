ttp_summary: |
  China-aligned espionage activity bundling three uncategorized clusters (UNK_FistBump,
  UNK_DropPitch, UNK_SparkyCarp) that Proofpoint Threat Research observed targeting Taiwan's
  semiconductor industry between March and June 2025 — manufacturing, design and testing firms,
  the equipment/services supply chain, and financial analysts covering the sector. Assessed
  motive is "most likely espionage." UNK_FistBump runs employment-themed phishing to deliver
  Cobalt Strike or the custom Voldemort backdoor (Google Sheets command-and-control via
  CiscoCollabHost.exe DLL sideloading), an infection chain Proofpoint notes closely resembles
  one used by TA415/APT41 yet tracks as distinct at this time. UNK_DropPitch sends
  attacker-owned-address phishing to investment-bank analysts covering the sector, with
  SoftEther VPN used for infrastructure administration and exfiltration tunnelling.
  UNK_SparkyCarp ran a custom adversary-in-the-middle (AITM) credential-phishing framework
  against a Taiwanese semiconductor company it had also targeted in November 2024.
