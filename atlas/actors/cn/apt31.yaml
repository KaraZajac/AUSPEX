ttp_summary: |
  10,000+ malicious tracking/exploit emails against IPAC
  parliamentarians, US White House and State Department officials,
  congressional staff, dissidents, journalists, NGOs. HTML smuggling;
  exploitation of zero-days against Edge / Chrome via the Pwn2Own
  pipeline. Critical-infrastructure operations include a 2018
  compromise of a Texas energy company cited in the indictment.
