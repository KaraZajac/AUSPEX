notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cn/mss placement VERIFIED against
  both cited sources at the named-unit level. The DOJ EDNY indictment (24-CR-43,
  2024-03-25) states "The Hubei State Security Department ('HSSD') was the
  provincial foreign intelligence arm of the MSS in Hubei Province, PRC" and
  that the HSSD "created a front company, Wuhan Xiaoruizhi Science & Technology
  Co., Ltd." in ~2010, with the seven defendants operating "on behalf of the
  HSSD ... known by cybersecurity researchers as 'Advanced Persistent Threat
  31.'" OFAC's companion Treasury release (jy2205) calls Wuhan XRZ "a Wuhan,
  China-based Ministry of State Security (MSS) front company" and APT31 a group
  that conducts operations "on behalf of the Hubei State Security Department
  (HSSD)." The MSS is named by name (not merely "Chinese state-sponsored") as
  the parent service of the Hubei SSD bureau that directs APT31 via the Wuhan
  XRZ front — so the cn/mss placement is source-supported (MSS is the central
  ministry; Hubei SSD is its provincial bureau, the level just below the slug).
  KEEP. Raw evidence captured + hashed in both source records (DOJ via the media
  /dl PDF endpoint, as the PR HTML page 403s automated fetchers).
sources:
