ttp_summary: |
  Taiwan-focused regional MSS / PLA-aligned operator (also
  active against Japan, Hong Kong, and US tech companies with
  Asian regional ties). Tooling includes PLEAD downloader and
  Drigo / Shrouded Crossbow backdoors, BIFROSE / Kivars
  variants, TSCookie / WaterBear, and CrossWalk. Distinctive
  tradecraft: router-level MitM to inject malware into
  legitimate update streams (PLEAD via ASUS WebStorage, 2019),
  and use of compromised Cisco IOS routers as relay points
  named in a September 2023 NSA / CISA / FBI / Japanese
  NPA / NISC advisory.
