notes: |
  Former id cn/mss/blacktech (asserted an unsourced MSS placement). Demoted to cn/unscoped on
  2026-06-24: AUDIT (2026-06-24, claude-opus-4.8/max) against the actor's sole cited source —
  ESET's "PLEAD malware distributed via MitM attacks at router level, misusing ASUS WebStorage"
  (2019-05-14) — found NO Chinese intelligence service named, and indeed no mention of China,
  the PRC, "Chinese," "state-sponsored," or "nation-state" anywhere in the article (verified
  against the captured raw HTML; sha256 in the source record). ESET attributes the activity only
  to "the BlackTech group," which it says (citing Trend Micro) "is primarily focused on
  cyberespionage in Asia," with deployment "most actively" in Taiwan; the meta-description even
  labels the operators "cybercriminals." The MSS placement was therefore unsupported by any cited
  source. Separately, an earlier event-level audit of the September 2023 NSA/FBI/CISA + Japan
  (NPA/NISC) advisory on BlackTech's Cisco-router-firmware tradecraft found that advisory names
  only "PRC-linked" actors, NOT the MSS — so even the wider cited record does not reach a service.
  PRC nexus is well-attested in the broader literature (and the alias set / MITRE G0098), but the
  specific service is unresolved — hence cn/unscoped until a cited source names a service.
  FK-propagated id change to the 3 referencing events on 2026-06-24.
