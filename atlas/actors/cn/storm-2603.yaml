  fact disclaims any actor linkage: its dedicated Storm-2603 section reads "The group that
  Microsoft tracks as Storm-2603 is assessed with moderate confidence to be a China-based
  threat actor. Microsoft has not identified links between Storm-2603 and other known Chinese
  threat actors. ... Microsoft is currently unable to confidently assess the threat actor's
  objectives." There is no MSS (Ministry of State Security) basis in the cited source, so the
  prior cn/mss placement was unsourced.
  FLAG — China nexus is itself HEDGED: "Storm-####" is Microsoft's designator for a developing/
  uncategorized cluster, and the source attributes nation only at "moderate confidence" (vs. the
  two co-reported clusters Linen Typhoon and Violet Typhoon, which the same report calls "Chinese
  nation-state actors" / "Chinese state actors" outright). The cn/ id head is retained because the
  source does say "China-based," but the China assessment is moderate-confidence, not firm. The
  cn/mic2025 + cn/mcf doctrine alignments and mission: espionage are also inferred (the source
  cannot assess objectives and observed only ransomware/MachineKey theft) — left as-is pending QC,
  flagged here. Service placement and even the nation should be re-evaluated as the cluster matures.
