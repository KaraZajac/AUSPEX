  CloudScout report, attributes Evasive Panda exclusively as a "China-aligned APT group" / "the
  China-aligned Evasive Panda group" and never names the MSS, the Ministry of State Security, the PLA,
  or any specific Chinese service. China nexus is well-supported (China-aligned at the named-actor
  level), but the service placement is not — hence cn/unscoped. (CrowdStrike's "-PANDA" naming denotes
  a China-nexus adversary, not the MSS specifically.) Keep cn/unscoped until a cited source names a
  service. FK-propagated id change to the 5 referencing events on 2026-06-24.
