ttp_summary: |
  China-aligned cyberespionage APT, active since at least 2012 (ESET, 2024). ESET assesses its
  objective as "cyberespionage against countries and organizations opposing China's interests" —
  the Tibetan diaspora and independence movements, religious and academic institutions in Taiwan
  and Hong Kong, and supporters of democracy in China. Tradecraft pairs the MgBot backdoor with the
  Nightdoor implant for initial foothold and post-compromise access. In 2024 ESET documented its
  CloudScout toolset: previously undocumented .NET modules, implemented as extensions to MgBot
  plugins, that steal authenticated web-session cookies from a browser database and replay them in
  hardcoded web requests to access and exfiltrate cloud-stored data (Google Drive, Gmail, Outlook),
  bypassing 2FA and IP-tracking controls; the modules perform a full artifact cleanup after each
  collection cycle. CloudScout was observed in 2022-2023 against a religious institution and a
  suspected government entity in Taiwan, with hardcoded request fields crafted to target Taiwanese
  users (ESET, 2024).
