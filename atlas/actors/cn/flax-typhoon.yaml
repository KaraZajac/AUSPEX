notes: |
  Former id cn/mss/flax-typhoon (asserted an MSS placement). Demoted to cn/unscoped on
  2026-06-24 (AUDIT, claude-opus-4.8/max): of the two cited sources, NEITHER names the Ministry
  of State Security. US Treasury/OFAC (2025-01-03, jy2769) calls Flax Typhoon "a Chinese
  malicious state-sponsored cyber group" and "a state-sponsored Chinese malicious cyber group"
  and sanctions the contractor Integrity Technology Group by name, but never names the MSS (no
  occurrence of "Ministry of State Security"/"MSS"/"state security" in the release). FBI Director
  Wray (2024-09-18, Aspen Cyber Summit story) calls it "a Chinese government-sponsored hacker
  group" and states that Integrity Tech's chairman "has publicly admitted that for years his
  company has collected intelligence and performed reconnaissance for Chinese government security
  agencies" — a generic plural ("security agencies"), not the MSS specifically; Wray also frames
  the actor as the Chinese government acting "by their own hand or concealed through their
  proxies." The Microsoft MSTIC report (a MISP signal only, not a cited source here) says only
  "China" per a prior event-audit. China nexus is well-supported at named-actor level; the
  specific MSS service placement is not — hence cn/unscoped until a cited source names a service.
  (Open-source reporting elsewhere has tied Integrity Tech / Flax Typhoon to the MSS, but no such
  source is cited on this record.) FK-propagated id change to the 4 referencing events on
  2026-06-24.
