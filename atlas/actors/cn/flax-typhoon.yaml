ttp_summary: |
  Mirai-variant IoT botnet ("Raptor Train"; 260,000+ devices —
  IP cameras, NVRs, SOHO routers) disrupted by court-authorized
  FBI operation September 2024. China Chopper web shell; SoftEther
  VPN; LOLBins. Targeting concentrated on Taiwan critical
  infrastructure, US government, US critical infrastructure,
  academia, and media. First PRC critical-infrastructure operator
  whose operating company (Beijing-based Integrity Technology
  Group Inc.) was sanctioned by name (Jan 3 2025).
