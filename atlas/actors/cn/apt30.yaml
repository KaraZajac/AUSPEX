notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cn/pla/unit-78020 service placement VERIFIED against the
  actor's cited sources, KEPT (not demoted). Of the two cited sources, ThreatConnect's Project
  CAMERASHY (2015-09) is the unit-naming source: its summary states "...definitively attributes cyber
  espionage activity associated with the Naikon Advanced Persistent Threat (APT) group to a specific
  unit (Unit 78020) within the Chinese People's Liberation Army (PLA)" and describes ~five years of
  spear-phishing against South-East Asian government/military/diplomatic targets. FireEye's APT30
  report (2015-04) corroborates a long-running, likely-China-state-sponsored ASEAN espionage operation
  but does NOT name a PLA unit (it stops at "China / state-sponsored"; its live/archived URL now serves
  only page chrome). The PLA placement is therefore source-supported at the named-unit level.
  LOAD-BEARING CAVEAT: CAMERASHY attributes Unit 78020 to "Naikon", so the placement of this AUSPEX
  "APT30" actor depends on the Naikon=APT30 equivalence — recorded here as a Kaspersky `equivalent`
  alias. MISP treats the two as overlapping-but-SEPARATE clusters: its Naikon entry lists "PLA Unit
  78020" and "Camerashy" as synonyms (country CN), while its APT30 entry says "APT30 is a threat group
  suspected to be associated with the Chinese government. While Naikon shares some characteristics with
  APT30, the two groups do not appear to be exact matches." The unit placement is thus as firm as that
  equivalence; if a future re-grade splits APT30 from Naikon, this actor would fall back to
  cn/unscoped/apt30. Raw snapshots + sha256 captured on both cited sources.
sources:
