# cn/pla/unit-78020 placement KEPT 2026-06-24 (claude-opus-4.8/max): a cited source names the
# exact PLA unit. ThreatConnect CAMERASHY (2015): "...definitively attributes cyber espionage
# activity associated with the Naikon ... group to a specific unit (Unit 78020) within the Chinese
# People's Liberation Army (PLA)." Load-bearing caveat in `notes`: the unit attribution attaches to
# "Naikon"; the PLA placement of this "APT30" actor rests on the Naikon=APT30 equivalence (Kaspersky,
# `equivalent`), which MISP treats as overlapping-but-separate, not identical. FireEye's APT30 report
# corroborates Chinese state sponsorship but does NOT name a PLA unit.
