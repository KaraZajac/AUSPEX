ttp_summary: |
  China-aligned espionage APT that ESET independently assesses is the operational arm of
  I-SOON (Anxun), a Chinese contractor based in Chengdu whose internal documents leaked in 2024
  (ESET, Operation FishMedley, 2025: "FishMonger is an espionage team operated by I-SOON").
  ESET places FishMonger under the Winnti Group umbrella; it is also tracked as Earth Lusca,
  TAG-22, Aquatic Panda and Red Dev 10. First documented by ESET in early 2020 against
  universities in Hong Kong during the 2019 civic protests (originally attributed to Winnti
  Group, later revised to FishMonger). In Operation FishMedley (a 2022 campaign of seven
  independent compromises across Asia, Europe and the United States), the group targeted
  governments, NGOs, religious organizations and geopolitical think tanks "of obvious interest
  to the Chinese government." Tradecraft centers on modular backdoors shared among China-aligned
  groups — ShadowPad (packed with ScatterBee), SodaMaster, Spyder, RPipeCommander — alongside
  Cobalt Strike, FunnySwitch, SprySOCKS, the BIOPASS RAT, and custom credential-stealing and
  reconnaissance utilities; the group is also known to run watering-hole attacks. ESET was unable
  to identify the initial-compromise vectors in the FishMedley incidents.
