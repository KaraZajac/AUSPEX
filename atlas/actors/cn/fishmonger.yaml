notes: |
  Former id cn/mss/fishmonger (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced
  MSS placement). Demoted to cn/unscoped on 2026-06-24 after auditing the single cited source.

  ESET's own attribution of FishMonger reaches only the nation/contractor level: "FishMonger is an
  espionage team operated by I-SOON, a Chinese contractor based in Chengdu"; "the APT group run by
  I-SOON"; "most likely operating out of China, from the city of Chengdu"; and the actor is
  described throughout as a "China-aligned" group. ESET names NO Chinese intelligence/security
  service as FishMonger's principal.

  MSS-vs-MPS finding (load-bearing): the ONLY government service the article names is the Ministry
  of PUBLIC Security — "the US Department of Justice ... unsealed an indictment against I-SOON
  employees and officers of China's Ministry of Public Security." That is MPS (公安部 / Gonganbu),
  the internal-policing service, NOT the MSS (国家安全部 / Guoanbu) under which this stub was filed —
  so the original cn/mss placement is a direct mismatch with the cited evidence. The MPS reference is
  ESET relaying the DOJ indictment's framing of the indicted I-SOON personnel, not ESET attributing
  the FishMonger cluster to a service; it is recorded here but NOT adopted as a new placement, because
  (a) ESET does not tie FishMonger itself to MPS, and (b) the audit protocol demotes rather than
  silently switches when the cited source does not name the actor's service. The I-SOON leak is widely
  reported in the broader literature to span MSS/MPS/PLA clientele; the DOJ's March 2025 I-SOON
  indictment specifically names MPS officers. Re-home from cn/unscoped only when a cited source names
  the service tasking FishMonger specifically.

  FK-propagated id change to the 1 referencing event on 2026-06-24.
