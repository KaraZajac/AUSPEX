ttp_summary: |
  Spear-phishing; public-facing application exploitation (Confluence,
  Log4j, Fortinet); credential stuffing. Malware: BADFLICK, MURKYTOP,
  PHOTO, web-shell ANTSWORD. CISA AA21-200a documents tasking against
  industries "included in China's Belt and Road Initiative."
