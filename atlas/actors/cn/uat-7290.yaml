# De-provisionalized + demoted to cn/unscoped 2026-06-24: the sole cited source (Cisco Talos, Jan
# 2026) attributes UAT-7290 only to the "China-nexus of advanced persistent threat actors" at high
# confidence and names NO Chinese service. "UAT" is Talos's deliberately-uncategorized/unattributed
# cluster prefix. The only unit reference is to the PLA (a hedged victimology/infra/tooling overlap
# with Recorded Future's "Red Foxtrot", which RF in 2021 linked to PLA Unit 69010) — i.e. military,
# not MSS — so the prior cn/mss placement was unsupported in both directions.
