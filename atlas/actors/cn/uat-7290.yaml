notes: |
  Former id cn/mss/uat-7290 (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced MSS
  placement — note the backfill stub's OWN analyst hint said "Red Foxtrot / PLA Unit 69010 overlap",
  i.e. PLA/military, contradicting its own cn/mss field). Demoted to cn/unscoped on 2026-06-24: the
  sole cited source (Cisco Talos, Jan 2026) names no Chinese service. Talos attributes the actor only
  to the "China-nexus of advanced persistent threat actors (APTs)" at HIGH confidence; the single
  unit reference in the source is to the PLA — a hedged overlap ("a significant amount of overlap in
  victimology, infrastructure, and tooling with a group publicly reported by Recorded Future as Red
  Foxtrot"; "In a 2021 report, Recorded Future linked Red Foxtrot to Chinese People's Liberation Army
  (PLA) Unit 69010"). MSS / Ministry of State Security appears zero times in the source. China nexus
  is well-supported (Talos high confidence); the service placement is not — and any future placement
  is more likely PLA than MSS. Held at cn/unscoped until a cited source names a specific Chinese
  service. FK-propagated id change to the 1 referencing event on 2026-06-24.
