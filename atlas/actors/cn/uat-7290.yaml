notes: |
  PLACEMENT HISTORY. Former id cn/mss/uat-7290 (PROVISIONAL backfill stub, 2026-05-30, which asserted
  an unsourced MSS placement — the stub's OWN analyst hint already said "Red Foxtrot / PLA Unit 69010
  overlap", i.e. PLA/military, contradicting its own cn/mss field). Demoted to cn/unscoped/uat-7290 on
  2026-06-24 because the sole cited source (Cisco Talos, Jan 2026) names no Chinese service and MSS /
  Ministry of State Security appears zero times in it.

  RE-PROMOTED to cn/pla/uat-7290 (primary_service_id cn/pla-ssf) on 2026-06-24 on the strength of the
  MISP equivalence chain rather than the Talos source alone. The equivalence chain (verified against
  primary/canonical sources 2026-06-24, claude-opus-4.8/max):
    1. MISP galaxy (AUSPEX's canonical actor reference) cluster "DAGGER PANDA" (uuid
       32c534b9-abec-4823-b223-a810f897b47b, country CN) lists UAT-7290, Red Foxtrot, RedFoxtrot and
       PLA Unit 69010 as synonyms of one cluster — i.e. MISP equates DAGGER PANDA = Red Foxtrot, and
       UAT-7290 = that cluster.
    2. Recorded Future's 2021 Insikt report "Threat Activity Group RedFoxtrot Linked to China's PLA
       Unit 69010" attributes Red Foxtrot/RedFoxtrot to PLA Unit 69010, a Technical Reconnaissance
       Bureau in Ürümqi, Xinjiang (via an operator's OpSec lapse exposing the unit HQ address).
    3. Talos (2026) independently reports UAT-7290 shares "a significant amount of overlap in
       victimology, infrastructure, and tooling" with Red Foxtrot.
  Net: PLA Unit 69010 is MILITARY (PLA), definitively NOT MSS — so the prior cn/mss placement is
  correctly rejected in both directions. Service set to cn/pla-ssf: Unit 69010's specific bureau is
  not separately modeled in the corpus, the RF attribution predates the 2024 PLA reorg (SSF era), and
  Technical Reconnaissance Bureaus were rooted in the SSF Network Systems Department — matching the
  in-corpus precedent for PLA actors whose exact bureau is unnamed (cn/pla/apt26, cn/pla/su-bin-ring
  both -> cn/pla-ssf).

  CONFIDENCE: MODERATE (overlap-based, not a confessed/hard equation). Both links in the chain are
  hedged: Talos says "overlap" not "is"; RF's Unit 69010 link uses "suspected", "we believe", "likely
  the MUCD". The China nexus itself is well-supported (Talos high confidence). Were the MISP synonym
  treatment to be revised, this actor would fall back to cn/unscoped, not cn/mss.
  FK-propagated id change to the 1 referencing event on 2026-06-24.
