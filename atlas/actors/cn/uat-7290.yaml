# cn/pla-ssf), primary_service_id is set to cn/pla-ssf. Confidence is MODERATE: the chain is
# overlap-based — Talos states only "significant amount of overlap in victimology, infrastructure,
# and tooling" with Red Foxtrot (not a hard equation), and RF's Unit 69010 link is itself hedged
# ("suspected", "we believe", "likely the MUCD").
