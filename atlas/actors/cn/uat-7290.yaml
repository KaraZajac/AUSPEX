ttp_summary: |
  China-nexus espionage and initial-access actor disclosed by Cisco Talos (January 2026), active
  since at least 2022 and primarily targeting high-value telecommunications providers in South Asia.
  Talos assesses with high confidence that UAT-7290 falls under the China-nexus of APTs; it shares
  overlapping TTPs with known China-nexus adversaries and a significant overlap in victimology,
  infrastructure and tooling with the group Recorded Future tracks as Red Foxtrot (which RF in 2021
  linked to PLA Unit 69010). Gains access via one-day exploits and target-specific SSH brute force
  against public-facing edge/networking devices, using publicly available proof-of-concept exploit
  code. Operates a Linux malware suite (the RushDrop/DriveSwitch/SilentRaid implant family) and the
  Bulbature implant (first disclosed by Sekoia in late 2024) to convert compromised devices into
  Operational Relay Box (ORB) infrastructure that may then be reused by other China-nexus actors —
  giving it a dual espionage / initial-access role. May also use Windows bespoke implants such as
  RedLeaves (technical-indicator overlap with RedLeaves, attributed to APT10) or ShadowPad, both
  commonly linked to China-nexus threat actors.
