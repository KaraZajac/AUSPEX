# equates UAT-7290 to Red Foxtrot and PLA Unit 69010 within one cluster — "DAGGER PANDA", uuid
# 32c534b9-abec-4823-b223-a810f897b47b, country CN, synonyms IceFog / Trident / RedFoxtrot /
# Red Wendigo / PLA Unit 69010 / UAT-7290 / Red Foxtrot. Recorded Future's 2021 Insikt report links
# Red Foxtrot to PLA Unit 69010 (a Technical Reconnaissance Bureau, Ürümqi, Xinjiang). PLA Unit 69010
# is military, NOT MSS — the prior cn/mss placement is correctly rejected. The unit's specific bureau
# is not separately modeled in the corpus; per the in-corpus precedent for PLA actors whose exact
