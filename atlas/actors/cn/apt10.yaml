notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cn/mss placement VERIFIED — a cited source names
  the MSS specifically (not merely "China"). MITRE ATT&CK G0045 (a cited source of this record)
  states: "Individual members of menuPass are known to have acted in association with the Chinese
  Ministry of State Security's (MSS) Tianjin State Security Bureau and worked for the Huaying
  Haitai Science and Technology Development Company." MITRE attributes that sentence (footnote
  scite-1) to the DOJ indictment "United States of America v. Zhu Hua and Zhang Shilong" (USDC
  SDNY, 2018-12-17) — which is itself cited here as doj/2018-12-20_apt10-indictment, and whose
  DOJ press-release title is "Two Chinese Hackers Associated With the Ministry of State Security
  Charged…". The MSS naming is corroborated at the named-unit level (MSS Tianjin SSB, tasking the
  Huaying Haitai front company). The third cited source — PwC/BAE "Operation Cloud Hopper" (2017,
  pre-indictment) — stops at "China-based threat actor" / "closely aligned with strategic Chinese
  interests" and never names the MSS; it supports the China nexus but not the service, so the
  placement rests on the DOJ indictment as relayed/quoted by MITRE G0045. KEEP cn/mss/apt10.
  Note: the DOJ primary URL (justice.gov) returned HTTP 400 to curl and 403 to WebFetch, the FBI
  mirror returned 403, and archive.org is blocked in this environment, so no raw snapshot of the
  DOJ release could be captured (note+skip per protocol); the MSS-Tianjin quote is captured and
  hashed from the MITRE G0045 raw snapshot, which directly quotes the indictment.
