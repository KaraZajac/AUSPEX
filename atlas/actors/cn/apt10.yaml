ttp_summary: |
  Spear-phishing of MSPs → harvest admin credentials → lateral
  pivot into MSP customers (Operation Cloud Hopper). Tooling
  includes UPPERCUT/ANEL, ChChes, RedLeaves, QuasarRAT. Touched
  customers in 12+ countries via HPE, IBM, Fujitsu, NTT, and other
  MSPs. DOJ indictment also documents direct theft from US Navy
  personnel records.
