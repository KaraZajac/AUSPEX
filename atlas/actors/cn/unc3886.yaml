ttp_summary: |
  China-nexus cyber-espionage cluster tracked by Mandiant since September 2022. Specializes in
  stealthy, persistent compromise of network-edge and virtualization infrastructure that does not
  support EDR — VMware ESXi hypervisors (malicious vSphere Installation Bundles deploying the
  VIRTUALPITA and VIRTUALPIE backdoors), Fortinet FortiOS appliances (THINCRUST/CASTLETAP), and
  Juniper Junos OS routers (customized TINYSHELL variants). Repeatedly exploits zero-day
  vulnerabilities (CVE-2022-41328, CVE-2023-20867, CVE-2025-21590), harvests credentials, and uses
  custom implants tuned to disable logging and evade forensics during hands-on-keyboard operations.
  Per Mandiant's later (2023) reporting, primarily targets defense, technology, and
  telecommunication organizations in the US and Asia-Pacific/Japan regions.
