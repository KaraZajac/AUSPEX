# De-provisionalized + demoted to cn/unscoped 2026-06-24: cited Mandiant sources establish a
# China-nexus but NO service. "UNC" in Mandiant's taxonomy = UNCATEGORIZED — at first disclosure
# (Sep 2022) Mandiant assessed only "with low confidence that UNC3886 has a China-nexus"; later
# reporting hardened to "suspect ... China-nexus" (Mar 2023) and "Chinese cyber espionage group"
# (Jun 2023). None of the cited sources names the MSS, the PLA, or any specific Chinese service.
