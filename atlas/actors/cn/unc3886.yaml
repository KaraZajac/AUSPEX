notes: |
  Former id cn/mss/unc3886 (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced MSS
  placement). Demoted to cn/unscoped on 2026-06-24: "UNC" in Mandiant's taxonomy denotes an
  UNCATEGORIZED activity cluster — Mandiant deliberately did NOT attribute UNC3886 to any nation or
  service at first disclosure. Of the cited sources, Mandiant (2022-09) assesses only "with low
  confidence that UNC3886 has a China-nexus"; (2023-03) "a group we suspect has a China-nexus";
  (2023-06) calls it "a highly adept Chinese cyber espionage group"; the 2025-03 report's title
  reads "China-nexus UNC3886." The China nexus is thus supported (hardening from low-confidence in
  2022 to asserted in 2023), but NO cited source names the MSS, the PLA, or any specific Chinese
  service — hence cn/unscoped, not cn/mss. Keep cn/unscoped until a cited source names a service.
  FK-propagated id change to the 4 referencing events on 2026-06-24.
