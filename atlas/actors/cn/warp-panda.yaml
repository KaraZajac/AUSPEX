ttp_summary: |
  China-nexus targeted-intrusion adversary first publicly named by CrowdStrike Intelligence in
  December 2025, active since at least 2022 against US legal, technology and manufacturing
  entities. A cloud-conscious, high-OPSEC operator focused on persistent, long-term covert access:
  gains initial access by exploiting internet-facing edge devices (Ivanti Connect Secure VPN —
  CVE-2024-21887/CVE-2023-46805; F5 BIG-IP — CVE-2023-46747) and pivots into VMware vCenter
  environments via valid credentials or vCenter exploitation (CVE-2024-38812, CVE-2023-34048,
  CVE-2021-22005). Deploys JSP web shells and custom Golang malware — the BRICKSTORM backdoor
  (masquerading as legitimate vCenter processes, tunneling C2 over WebSocket/TLS using DNS-over-HTTPS
  and public cloud relays such as Cloudflare Workers and Heroku) plus two ESXi implants, Junction and
  GuestConduit. Tradecraft includes log clearing, file timestomping, creating and destroying
  unregistered VMs, cloning domain-controller VMs to harvest Active Directory data, and ESXi-compatible
  7-Zip staging. In the cloud, exfiltrates Microsoft 365 data (OneDrive/SharePoint/Exchange) via
  stolen Azure session tokens and Graph API enumeration, and registers attacker MFA devices for
  persistence. One intrusion was used for rudimentary reconnaissance against an Asia-Pacific
  government entity (CrowdStrike, 2025).
