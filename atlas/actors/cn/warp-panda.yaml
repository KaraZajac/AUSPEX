  "China-nexus targeted intrusion adversary" whose "operations are likely motivated by
  intelligence-collection requirements aligned with the strategic interests of the People's Republic
  of China (PRC)"; its strongest organizational claim is the moderate-confidence assessment that the
  group is "associated with a well-resourced organization that has heavily invested in cyberespionage
  capabilities" — naming no specific service. The source contains no occurrence of "MSS", "Ministry of
  State Security", the Guoanbu, the PLA, or any named unit. PRC/China nexus is well-supported
  (named-actor level), the service placement is not — hence cn/unscoped. NB CrowdStrike's "PANDA"
  suffix denotes a China-nexus adversary, not an MSS attribution. Keep cn/unscoped until a cited
  source names a service. FK-propagated id change to the 1 referencing event on 2026-06-24.
