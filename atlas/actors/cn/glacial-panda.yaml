ttp_summary: |
  China-nexus adversary tracked by CrowdStrike that, per its 2025 Threat Hunting Report, has embedded
  deep in telecommunications-provider networks and helped drive a 130% rise in nation-state activity in
  the telecom sector through long-term, espionage-driven operations. Per the same report's writeup,
  GLACIAL PANDA has since at least 2018 developed and maintained access to telecom networks to obtain
  call detail records (CDRs) and related communications telemetry, primarily targeting telcos' Linux
  systems; it deploys trojanized OpenSSH components (codenamed ShieldSlide) whose backdoored SSH server
  authenticates any account — including root — when a hardcoded password is supplied, while harvesting
  authentication sessions and credentials. Objective assessed to be intelligence collection from telecom
  infrastructure.
