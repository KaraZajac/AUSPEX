notes: |
  Former id cn/mss/apt15 (asserted an unsourced MSS placement). Demoted to cn/unscoped on
  2026-06-24 after auditing the actor's two cited sources against its claimed service:
  NEITHER names the Ministry of State Security (MSS), or any Chinese intelligence service —
  both attribute only to "China" at the nation level. Microsoft Digital Crimes Unit's 2021
  domain-seizure blog (primary; tracked by MSTIC) calls Nickel a "China-based hacking group,"
  an actor "operating from China" (listed alongside Barium/China, Strontium/Russia,
  Phosphorus/Iran, Thallium/North Korea — all nation-level peers), and a "nation-state actor,"
  and notes only "a correlation between Nickel's targets and China's geopolitical interests";
  it never names the MSS. MITRE ATT&CK G0004 (tertiary; signal only) says "Ke3chang is a threat
  group attributed to actors operating out of China." The China nexus is well-supported at the
  named-actor / nation level, but the MSS service attribution is not cited — hence cn/unscoped.
  (The wider literature does commonly link APT15/Ke3chang to the MSS, but none of THIS record's
  cited sources does so; keep cn/unscoped until a cited source names a service.)
  AUDIT (2026-06-24, claude-opus-4.8/max): MSS not named by any cited source — see per-source
  AUDIT lines on microsoft/2021-12_nickel-civil-lawsuit and mitre-attack/g0004_apt15.
  FK-propagated id change to the 3 referencing events on 2026-06-24
  (cn/mss/apt15 → cn/unscoped/apt15).
sources:
