ttp_summary: |
  Spear-phishing with weaponized documents; custom backdoor
  families (AURIGA, BANGAT, MANITSME, WEBC2, GLOOXMAIL); HTRAN
  proxy chains routed through Shanghai netblocks identified by
  Mandiant with the 61398 facility. 141 organizations documented
  across 20 industries; hundreds of TB of IP exfiltrated.
