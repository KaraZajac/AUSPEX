ttp_summary: |
  HyperBro, SysUpdate, PlugX, HUI Loader; strategic web compromises.
  Pivoted to ransomware (Polar, HelloKitty) either as smokescreen
  for IP theft or moonlighting. OFAC sanctioned Shanghai-based
