notes: |
  Former id cn/mss/apt27 (which asserted an MSS placement on the strength of the 2025 Yin Kecheng
  OFAC action). Demoted to cn/unscoped on 2026-06-24: of the two cited sources, NEITHER names the
  MSS as APT27's affiliating service.
  AUDIT (2026-06-24, claude-opus-4.8/max): MSS NOT named for APT27.
  - MITRE ATT&CK G0027 (tier=tertiary; live page now canonicalised as "Threat Group-3390") describes
    the group only at the nation level: "Threat Group-3390 is a Chinese threat group that has
    extensively used strategic Web compromises to target victims." No occurrence of "Ministry of
    State Security", "MSS", "PRC", or "state-sponsored" anywhere on the page — only "Chinese".
  - Treasury OFAC press release JY2792 (tier=primary, 2025-01-17) DOES name the MSS, but never in
    connection with APT27: "Yin Kecheng has been a cyber actor for over a decade and is affiliated
    with the People's Republic of China Ministry of State Security (MSS)" (an individual), and "The
    MSS has maintained strong ties with multiple computer network exploitation companies, including
    Sichuan Juxinhe" (the SALT Typhoon operating company — a separate AUSPEX cluster). The release
    contains ZERO occurrences of the strings "APT27" or "Silk Typhoon"; the only named cyber GROUP
    is Salt Typhoon. The prior actor note's chain (Yin Kecheng -> BeyondTrust/Treasury compromise ->
    "Silk Typhoon / APT27 cluster") was an AUSPEX editorial cross-walk, NOT a statement in the cited
    source, so it cannot carry an MSS service attribution for APT27.
  MISP galaxy (signal only) corroborates the nation, not the service: APT27 cluster country=CN,
  cfr-suspected-state-sponsor="Unknown", description "A China-based actor".
  China nexus is well-supported (named-actor level); the MSS service placement is not — hence
  cn/unscoped, mirroring the Agrius demotion. Keep cn/unscoped until a cited source names a specific
  Chinese service for APT27 (not for Yin Kecheng or Salt Typhoon as separate entities).
  FK-propagated the id change to the 5 referencing events on 2026-06-24.
