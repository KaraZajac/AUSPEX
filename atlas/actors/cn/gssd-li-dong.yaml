ttp_summary: |
  Two Chinese nationals (Li Xiaoyu and Dong Jiazhi), charged by the US
  DOJ on 2020-07-21 with an ~11-year global hacking campaign (hundreds
  of victims across 11+ countries) conducted BOTH for personal profit
  AND on behalf of the MSS Guangdong State Security Department (GSSD),
  which supplied a zero-day and directed dissident/clergy targeting.
  Exploited publicly-known web-server / web-app / collaboration-software
  vulnerabilities (some newly announced) and deployed China Chopper web
  shells. Victim sectors include software, solar/renewable energy,
  pharma/COVID-19 research, defense, and Chinese dissidents. DOJ names
  no vendor APT designation for the pair; distinct from APT40 (the MSS
  Hainan maritime cluster).
