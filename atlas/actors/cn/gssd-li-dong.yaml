# Created 2026-07-01 (census follow-up, claude-opus-4.8/max) for the 2020-07/mss-guangdong-li-xiaoyu-
# indictment event, whose actor_id had been the WRONG cn/mss/apt40. APT40 is the MSS HAINAN State Security
# Department (HSSD) maritime-espionage cluster; the DOJ 2020-07-21 indictment charges Li Xiaoyu + Dong
# Jiazhi as MSS GUANGDONG State Security Department (GSSD) contractors — a distinct, dual-tasked
# (personal-profit + MSS-directed) contractor pair the DOJ links to no vendor APT cluster. Placed at
# cn/mss (named-unit: the GSSD is named), as its own contractor-pair actor.
id: cn/mss/gssd-li-dong
primary_service_id: cn/mss
