notes: |
  Former id cn/mss/apt17 (asserted an MSS placement that no cited source supports). DEMOTED to
  cn/unscoped on 2026-06-24 after auditing the actor's only two cited sources against primary text:
  - Symantec, "The Elderwood Project" (2012): names no Chinese service. Strongest attribution is
    geographic — "they were attacked in December 2009 and that the attacks originated in China" —
    and even statehood is hedged: "could only be provided by a large criminal organization,
    attackers supported by a nation state, or a nation state itself." No MSS, IRGC, PLA, or Jinan.
  - Wikipedia, "Operation Aurora" (tertiary): the body attributes APT17 to "the Chinese threat
    actors" / "Chinese government" and the Elderwood Group "based in Beijing, China, with
    associations with the People's Liberation Army." The only MSS-flavored string — "APT-doxing
    group exposes APT17 as Jinan bureau of China's Security Ministry" — appears solely as the TITLE
    of cited reference [19] (a ZDNet article), never as Wikipedia's own assertion; that ZDNet
    article is not itself a cited source on this record.
  The MSS-Jinan attribution is real in the wider literature (Intrusion Truth's 2019 doxing of the
  Jinan State Security Bureau, echoed by ZDNet), but it does not appear in either cited source's
  own words, so the placement is unsourced as cited. China nexus is well-supported (named-actor /
  Elderwood-cluster level); the service is not — hence cn/unscoped. Keep cn/unscoped until a cited
  source names a Chinese service. FK-propagated the id change to the 2 referencing events on
  2026-06-24 (operation-aurora; the 2024-07 PRC-9002-RAT campaign against Italian government agencies).
