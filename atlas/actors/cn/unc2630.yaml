ttp_summary: |
  China-nexus espionage cluster tracked by Mandiant as UNC2630
  (alongside a related cluster UNC2717), responsible for exploiting a
  previously-unknown Pulse Connect Secure VPN zero-day (CVE-2021-22893,
  plus prior Pulse CVEs) against US defense-industrial-base, government,
  and financial organizations from ~August 2020. Deployed the
  SLOWPULSE / RADIALPULSE / THINBLOOD family of webshells and trojanized
  Pulse binaries to harvest credentials and maintain access across
  appliance upgrades. Mandiant tentatively — not definitively — links
  UNC2630 to APT5 (KEYHOLE PANDA / MANGANESE); UNC2717 is unattributed.
  No Chinese service is named in the cited reporting.
default_doctrine_alignment_ids: []
notes: |
  Stub created 2026-07-01 during the event-audit census to hold the
  UNC2630 cluster, replacing a fabricated cn/mss/apt41 attribution on
  the pulse-connect-secure event. attribution_level on that event is
  activity-cluster (uncategorized UNC cluster). If a future re-grade
  firms the APT5 link, this can be merged into a cn/unscoped/apt5 record
  (MISP apt5 uuid a47b79ae-7a0c-4308-9efc-294af19cc795).
