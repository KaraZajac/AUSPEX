# Created 2026-07-01 (census follow-up, claude-opus-4.8/max) for the 2021-05/pulse-connect-secure-
# exploitation event, whose actor_id had been the WRONG cn/mss/apt41 (falsely cited to the actor-agnostic
# CISA AA21-110A advisory). Mandiant tracks the Pulse Connect Secure zero-day exploitation as UNC2630
# (and a related cluster UNC2717), and only TENTATIVELY links UNC2630 to APT5 ("we are not able to
# definitively connect UNC2630 to APT5, or any other existing APT group"). MISP-galaxy carries UNC2630 as
# a distinct China-nexus cluster (uuid 86dfe64e-...). Uncategorized cluster, China nexus, no service named.
