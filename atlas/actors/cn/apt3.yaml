  - cn/mic2025/power-equipment
notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cn/mss placement VERIFIED — KEEP.
  Of the two cited sources, Recorded Future Insikt Group's "Recorded Future
  Research Concludes Chinese MSS Behind APT3" (2017-05-17) is the load-bearing
  one: it names the Ministry of State Security explicitly and at high
  confidence — "APT3 is the first threat actor group that has been attributed
  with a high degree of confidence directly to the Chinese Ministry of State
  Security (MSS)" and "Recorded Future's research leads us to attribute APT3 to
  the Chinese Ministry of State Security and Boyusec with a high degree of
  confidence." It also lays out the Boyusec→MSS-Guangdong contractor chain
  (Guangdong ITSEC = "a field site for a branch of the MSS"; subordinate to the
  MSS-run CNITSEC), corroborating Intrusion Truth (May 2017). The DOJ Boyusec
  indictment (2017-11-27) confirms the Boyusec identity, the three indicted
  individuals, and the named victims (Moody's, Siemens, Trimble) but does NOT
  itself name the MSS — it frames the activity as commercial espionage. Caveat:
  the MSS attribution is therefore vendor-research (Recorded Future), not
  govt-primary; it is high-confidence and consistent with the corpus's cn/mss
  service record (which cites the DOJ APT3/APT10/APT40/APT31 cases for the
  broader pattern), so the named-actor→named-service placement stands.
sources:
  - doj/2017-11-27_apt3-boyusec-indictment
  - recorded-future/2017-05_apt3-boyusec-mss

