ttp_summary: |
  Zero-day exploitation of IE and Flash; Pirpi backdoor; reused
  leaked NSA Equation Group tools (DoublePulsar, EternalBlue) in
  post-2017 operations. Notable named targets include Moody's
  Analytics (financial data), Siemens AG (industrial controls),
  Trimble Inc. (high-precision GPS / navigation).
