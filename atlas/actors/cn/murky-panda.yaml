# cn/unscoped placement VERIFIED 2026-06-25 (claude-opus-4.8/max): the cited CrowdStrike blog
# (crowdstrike/2025-08_murky-panda-china-nexus-trusted-relation) names MURKY PANDA only as a
# "China-nexus adversary" whose "activity aligns with China-nexus targeted intrusion activity
# tracked by industry sources as Silk Typhoon." It names NO service (no MSS, no PLA, no
# intelligence/security service anywhere in the captured page) and does NOT equate MURKY PANDA to
# HAFNIUM/Silk Typhoon — "aligns with" is an overlap/adjacency claim, not an identity. China nexus
# supported; service is not — hence cn/unscoped (cf. the sibling cn/unscoped/genesis-panda, which
# CrowdStrike groups alongside MURKY PANDA among "suspected cloud-conscious China-nexus actors").
id: cn/unscoped/murky-panda
primary_service_id: cn/unscoped
