canonical_name: "MURKY PANDA"
aliases:
  - alias: MURKY PANDA
    assigning_org: CrowdStrike (Counter Adversary Operations)
    confidence: equivalent
  - alias: Silk Typhoon cluster
    assigning_org: CrowdStrike / MISP galaxy
    confidence: overlapping
    note: |
      CrowdStrike states MURKY PANDA's "activity aligns with China-nexus targeted
      intrusion activity tracked by industry sources as Silk Typhoon" — an
      alignment/overlap, NOT an asserted identity. MISP galaxy folds "MURKY PANDA"
      into the HAFNIUM/Silk Typhoon cluster (uuid 4f05d6c1-3fc1-4567-91cd-dd4637cc38b5)
      as a synonym. Treated as overlapping here because the only source on the
      cited operation deliberately hedges to "aligns with," and whether Silk Typhoon =
      Hafnium = MURKY PANDA, or distinct teams in the same China-nexus ecosystem,
      is contested in open source. See cn/mss/hafnium for the MSS-attested cluster.
