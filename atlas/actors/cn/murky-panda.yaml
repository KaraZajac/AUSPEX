ttp_summary: |
  China-nexus, cloud-conscious adversary tracked by CrowdStrike Counter Adversary
  Operations, active since at least 2023. MURKY PANDA is one of a few tracked
  adversaries that conduct trusted-relationship compromises in the cloud: it has
  compromised SaaS providers (abusing Entra ID application-registration secrets to
  authenticate as service principals into downstream customer tenants) and a
  Microsoft cloud solution provider (abusing DAP/Global-Administrator cross-tenant
  access) to reach downstream victims and exfiltrate email. It rapidly weaponizes
  n-day and zero-day flaws in internet-facing appliances for initial access (e.g.
  Citrix NetScaler CVE-2023-3519), deploys the Neo-reGeorg web shell and the
  custom Golang/ELF Linux RAT CloudedHope (garble-obfuscated), uses RDP for lateral
  movement, and demonstrates high OPSEC (log/timestamp sanitization, compromised
  SOHO devices as in-country exit nodes). CrowdStrike's "PANDA" cryptonym denotes
  only a China nexus, not a specific service.
default_doctrine_alignment_ids:
  - cn/national-intelligence-law-2017
notes: |
  Created 2026-06-25 (LLM audit, claude-opus-4.8/max) during the per-event verification of
  2025-08/murky-panda-china-nexus-trusted-relationship-cloudsaas-compromise-silk. The event had
  borrowed cn/mss/hafnium, but the sole cited source (CrowdStrike, secondary/industry tier) names
  MURKY PANDA as a distinct "-PANDA" cluster, says its activity only "aligns with" Silk Typhoon,
  and names no service — so an MSS-level placement is over-attributed for this operation. Demoted
  to a conservative cn/unscoped record mirroring the sibling cn/unscoped/genesis-panda resolution
  (same vendor, same "-PANDA"=China-nexus logic, same cn/national-intelligence-law-2017 plausible
  doctrine link). DIVERGENCE FROM MISP (documented, per the MISP-as-reference directive — adopt
  where it fills/confirms, REVIEW where it conflicts with better-sourced work, cf. the `handala`
  precedent): MISP galaxy lists "MURKY PANDA" as a synonym of HAFNIUM/Silk Typhoon (a CN cluster
  that itself names no service in MISP), which would imply the MSS via cn/mss/hafnium's
  White-House-attested nexus. We do NOT auto-adopt that equation at the actor level here because
  CrowdStrike's own first-party tracking treats MURKY PANDA as a separate named cluster and
  qualifies the link to "aligns with," and the Silk-Typhoon = Hafnium = APT27-cluster equivalence
  is itself flagged contested in the cn/mss/hafnium record. Keep cn/unscoped until a cited source
  either names a specific Chinese service for MURKY PANDA or hard-equates it to Hafnium/Silk
  Typhoon; if the latter, merge into cn/mss/hafnium and carry the MURKY PANDA alias there.
sources:
