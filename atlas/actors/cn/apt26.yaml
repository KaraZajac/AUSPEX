notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): SERVICE PLACEMENT DEMOTED cn/pla/apt26 (primary_service_id
  cn/pla-ssf) → cn/unscoped/apt26 (primary_service_id cn/unscoped). The former PLA placement is
  CONTRADICTED by the actor's own cited sources, neither of which names the PLA or any PLA unit:

  (1) CrowdStrike, "Huge Fan of Your Work: How TURBINE PANDA and China's Top Spies Enabled Beijing to
  Cut Corners on the C919 Passenger Jet" (Oct 2019, the primary attributing source) attributes the
  campaign EXCLUSIVELY to the MSS Jiangsu State Security Department (JSSD), a civilian intelligence
  service. Verbatim: "Beijing used a mixture of cyber actors sourced from China's underground hacking
  scene, Ministry of State Security (MSS/国安部) officers... These operations are ultimately traceable
  back to the MSS Jiangsu Bureau"; "it is assessed with high confidence that the MSS was ultimately
  tasked with targeting firms that had technologies pertaining to the LEAP-X engine"; "This brings us
  to our culprits: the Jiangsu Bureau of the MSS (JSSD/江苏省国家安全厅) located in Nanjing"; "Sakula...was
  provided to JSSD lead operator LIU Chunliang"; closing line: "how the MSS and its cyber operators
  enhance China's leapfrog development." Figure 4 is titled "MSS JSSD Actors"; Figure 5 caption reads
  "MSS Intelligence Officer and Deputy Division Director XU Yanjun." The 15-page report contains ZERO
  mention of the PLA, PLA SSF, 3PLA/4PLA, or any military unit.

  (2) DOJ press release (Nov 2021) on the conviction of Xu Yanjun names the same MSS/JSSD affiliation
  (title: "Chinese Intelligence Officer Convicted... (Yanjun Xu, MSS JSSD)") and likewise names no PLA
  unit. (Body not re-captured this audit: justice.gov serves a bot-verification redirect to scripted
  clients — curl 400/homepage, WebFetch 403, archive.org blocked.)

  The prior "PLA-affiliated per CrowdStrike" comment was an error — CrowdStrike says MSS, not PLA. The
  source-supported state organ is the MSS (Jiangsu State Security Department / JSSD), retained as an
  additional_service_id (cn/mss). Per the audit's demotion rule the placement is moved to cn/unscoped
  (service placement unresolved to a first-class named MSS sub-unit record this pass); re-home to a
  cn/mss[/jssd] service when one exists. Iran-style note: the nexus (China, MSS) is well-supported at
  named-actor level; only the specific PLA-unit claim failed. FK-propagated id change to the 1
  referencing event (2019-10/turbine-panda-c919-aerospace-disclosure) on 2026-06-24.
