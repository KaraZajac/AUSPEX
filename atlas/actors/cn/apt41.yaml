ttp_summary: |
  The most diverse PRC APT. Supply-chain compromise (NetSarang
  ShadowPad 2017, ASUS ShadowHammer 2018);
  code-signing-certificate theft; ShadowPad, PlugX, Winnti,
  DUSTPAN/DUSTTRAP droppers (2023–24); N-day exploitation of
  Citrix, Confluence, Log4j, USAHerds (CVE-2021-44207). "Double
  Dragon" mission combines strategic IP theft with financially
  motivated cryptocurrency theft and video-game-virtual-currency
  fraud — distinctive among PRC clusters.
notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cn/mss service placement VERIFIED
  against the actor's own cited sources, KEPT. The MSS link to APT41 is debated
  in the wider literature (APT41 is a contractor doing mixed state + for-profit
  work, and most reporting calls it only "China-nexus" / "Chinese
  state-sponsored"), so this audit tested whether any CITED source names the
  Ministry of State Security rather than just "China." It does: the DOJ's
  September 16, 2020 indictment press release (doj/2020-09-16_apt41-indictment),
  a govt-primary source, states in its subtitle — directly about the APT41
  defendants — "Two Defendants Arrested in Malaysia; Remaining Five Defendants,
  One of Whom Allegedly Boasted of Connections to the Chinese Ministry of State
  Security, are Fugitives in China." (The "one" is Jiang Lizhi, per the
  underlying August 2020 indictment.) Caveat preserved honestly: the DOJ frames
  this as a defendant's own *boast* of MSS connections, not an independent DOJ
  assertion of MSS tasking — so it is weaker than a direct "the MSS tasked
  APT41" statement. It is nonetheless an explicit, on-the-record naming of the
  MSS by a cited govt-primary source in connection with this actor, which clears
  the AUSPEX bar for keeping the cn/mss placement. The other five cited sources
  corroborate only the China-state nexus and name no service: FBI Wanted ("a
  Chinese hacking group," "Chinese nationals," "Chengdu 404"); Mandiant 2022
  ("a prolific Chinese state-sponsored espionage group"); Mandiant 2024 ("Chinese
  state-sponsored espionage activity," "China-based actors"); Talos 2023
  ("alleged by the U.S. government to be comprised of Chinese nationals,"
  "Chengdu, China," medium confidence). MISP galaxy (signal only): describes
  APT41 as "Chinese state-sponsored," country CN, suspected sponsor "People's
  Republic of China" — does NOT name the MSS. Raw snapshots captured + hashed for
  all 5 fetchable sources (DOJ 2020, FBI, Mandiant ×2, Talos); the DOJ 2019
  first-indictment source is unfetchable (url null, slug collision) and was noted
  + skipped. No id/FK change (positive case).

  CLEANUP (2026-06-28, claude-opus-4.8/max, Kara-approved): (1) removed the "Group 72"
  alias — "Group 72" is Cisco Talos's 2014 designation for the Axiom/APT17 cluster
  (cn/unscoped/apt17), not APT41; it was a mis-assigned alias (and MISP also files Group 72
  under APT17). (2) removed "CCleaner 2017" from the supply-chain ttp_summary line: FireEye's
  own Double Dragon report explicitly DECLINED to attribute the CCleaner compromise to APT41
  ("we do not have enough information to attribute the CCleaner compromise to APT41 at this
  time"); the CCleaner backdoor is BLACKCOFFEE (an APT17 tool) and the code overlap points to
  APT17/Axiom — so AUSPEX attributes the 2017-09/ccleaner-supply-chain event to
  cn/unscoped/apt17. NetSarang ShadowPad 2017 + ASUS ShadowHammer 2018 remain (those ARE
  APT41/BARIUM).
