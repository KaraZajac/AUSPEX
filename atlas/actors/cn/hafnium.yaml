id: cn/mss/hafnium
primary_service_id: cn/mss
additional_service_ids: []
canonical_name: Hafnium / Silk Typhoon
aliases:
  - alias: Hafnium
    assigning_org: Microsoft (pre-2023 taxonomy)
    confidence: equivalent
  - alias: Silk Typhoon
    assigning_org: Microsoft (post-April 2023 taxonomy)
    confidence: equivalent
  - alias: ZIRCONIUM
    assigning_org: Microsoft (legacy / partial overlap)
    confidence: disputed
    note: |
      Microsoft's earlier "Zirconium" labeling overlapped at points
      with both Hafnium and APT31 (now Violet Typhoon). Microsoft's
      April 2023 taxonomy rename separated the clusters, but
      pre-2023 reporting that used "Zirconium" can refer to either.
      Treat as disputed historical overlap.
  - alias: APT27 cluster
    assigning_org: open-source consensus (post-Yin Kecheng OFAC action)
    confidence: disputed
    note: |
      The December 2024 BeyondTrust / US Treasury compromise was
      attributed to "Silk Typhoon" by Microsoft and to the APT27
      cluster by other vendors (via the Yin Kecheng OFAC designation
      Jan 17 2025). Open-source treatment of whether Silk Typhoon =
      Hafnium = APT27 cluster, or whether these are distinct teams
      operating from the same MSS Shanghai-area ecosystem, is
      contested. Flag attributions accordingly.
  - alias: ATK233
    assigning_org: MISP galaxy
    confidence: equivalent
  - alias: Operation Exchange Marauder
    assigning_org: MISP galaxy
    confidence: equivalent
  - alias: Red Dev 13
    assigning_org: MISP galaxy
    confidence: equivalent
  - alias: MURKY PANDA
    assigning_org: MISP galaxy
    confidence: equivalent
