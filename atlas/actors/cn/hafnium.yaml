ttp_summary: |
  0-day chain against on-prem Microsoft Exchange (ProxyLogon —
  CVE-2021-26855, -26857, -26858, -27065); web-shell deployment at
  unprecedented scale (~250,000 servers in March 2021). Re-emerged
  as "Silk Typhoon" in December 2024 via BeyondTrust API-key abuse
  (CVE-2024-12356 / CVE-2024-12686) to compromise US Treasury
  authentication keys.
