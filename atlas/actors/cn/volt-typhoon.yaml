ttp_summary: |
  Living off the land — LOLBins, no malware where possible. Uses
  the compromised KV-botnet of EOL Cisco and NetGear SOHO routers
  as proxy infrastructure (disrupted by court-authorized FBI
  operation January 2024). FortiGuard / Ivanti / Cisco edge-device
  exploitation; valid-account abuse; ESXi targeting. Long dwell
  (300+ days at LELWD in Massachusetts). Emphasis on Guam,
  Pacific Northwest, and sites with US INDOPACOM logistical
  relevance.
