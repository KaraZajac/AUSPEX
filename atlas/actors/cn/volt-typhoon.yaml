notes: |
  Former id cn/mss/volt-typhoon (the prior record asserted an MSS placement with the inline caveat
  "no public service-level attribution"). Demoted to cn/unscoped on 2026-06-24 after an LLM audit of
  all 7 cited sources against their raw, captured-and-hashed content: NONE names the Ministry of
  State Security, and none names the PLA or any other Chinese service. Every cited source attributes
  Volt Typhoon only at the nation level —
    - Microsoft MSTIC (2023-05-24): "a state-sponsored actor based in China" / "Microsoft assesses
      with moderate confidence";
    - CISA AA23-144A (CISA+NSA+FBI+Five Eyes, 2023-05-24): "a People's Republic of China (PRC)
      state-sponsored cyber actor, also known as Volt Typhoon";
    - CISA AA24-038A (2024-02-07): "PRC State-Sponsored Actors" / "PRC state-sponsored cyber actors";
    - DOJ (2024-01-31): title "...Botnet People's Republic of China Used to Conceal Hacking..."
      (raw page unfetchable — Akamai/Imperva bot interstitial on justice.gov and the fbi.gov mirror,
      archive.org blocked from this environment; the generic PRC attribution is established by the
      title and by the YAML/notes, and is uncontradicted by the other six sources);
    - Lumen Black Lotus Labs (2024-01-31): "Chinese state-sponsored actors" / "state-sponsored
      actors based in China";
    - FBI Director Wray testimony (2024-01-31): "the PRC state-sponsored hacking group known as Volt
      Typhoon";
    - Unit 42 (2024-02-09): identified "as People's Republic of China (PRC) state-sponsored cyber
      actors."
  The PRC/China nexus is well-supported at the named-actor level, but the MSS service placement is
  not cited — hence cn/unscoped. The former record's cn/pla-csf additional-service and "PLA tasking"
  comments were likewise unsourced inference and were removed (no cited source names the PLA; there
  is therefore no service mismatch to flag — the open literature more often associates Volt Typhoon
  with the PLA than the MSS, but no cited source resolves a service either way). Keep cn/unscoped
  until a cited source names a specific Chinese service. FK-propagated the id change to the 3
  referencing events (4 attribution entries) the same day. MISP galaxy ("Volt Typhoon",
  f02679fa-...) is a name-cluster only and asserts no service — signal, not corroboration.
