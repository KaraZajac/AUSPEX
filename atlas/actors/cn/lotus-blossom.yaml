ttp_summary: |
  Long-running cyber-espionage group that Cisco Talos (2025) attributes "with high confidence" to
  the Sagerunex campaigns based on TTPs, the Sagerunex backdoor (a RAT assessed to be an evolution
  of the older Billbug tool "Evora", DLL-injected and run in memory), and victimology; Talos states
  the group has "actively conducted cyber espionage operations since at least 2012." Operates in
  multiple stages over long dwell times (often undetected for months): post-compromise reconnaissance
  via built-in commands ("net", "tasklist", "quser", "ipconfig", "netstat", "dir"), Impacket for
  remote execution/lateral movement, and a Chrome cookie-stealer for credential harvesting. Installs
  Sagerunex into the system registry "configuring it to run as a service" for persistence; newer
  Sagerunex variants abuse legitimate third-party cloud services — Dropbox, Twitter, and Zimbra
  open-source webmail — as C2 channels, and use web-proxy autodiscovery plus hardcoded proxy
  servers/credentials (or the Venom proxy tool) to reach C2 from restricted networks. Per the cited
  source the campaigns targeted government, manufacturing, telecommunications and media sectors in
  the Philippines, Vietnam, Hong Kong and Taiwan. NB: the cited Talos report names neither a nation
  nor an intelligence service for the group (see header FLAG).
