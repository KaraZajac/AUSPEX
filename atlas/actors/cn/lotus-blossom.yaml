notes: |
  Former id cn/mss/lotus-blossom (PROVISIONAL backfill stub, 2026-05-30, which asserted an
  unsourced MSS placement). Demoted to cn/unscoped on 2026-06-24 (independent LLM audit,
  claude-opus-4.8/max): the actor's sole cited source — Cisco Talos, "Lotus Blossom espionage
  group...", 2025 — attributes the Sagerunex campaigns to "the Lotus Blossom group with high
  confidence" on the basis of TTPs, the Sagerunex backdoor and victimology, and names NO
  intelligence service (no "MSS"/"Ministry of State Security"/"state-sponsored"). It does not even
  name China/Chinese for Lotus Blossom (the only "China-nexus"/"Chinese-speaking" strings in the
  fetched page belong to unrelated Recommended/Related footer posts about UAT-8302 and a BadIIS
  MaaS cluster). NATION-SUPPORT FLAG: the retained `cn` bucket is therefore NOT established by this
  actor's own cited source; it rests on the AUSPEX editorial alias to Microsoft MSTIC's "Raspberry
  Typhoon" ("nation-state activity group based out of China", 2024-04), which MSTIC itself does NOT
  equate to Lotus Blossom in that report. Lotus Blossom / Billbug is widely treated as China-nexus
  in the broader public record (not verified in this audit), but to keep the `cn` bucket
  source-backed it should be re-grounded by adding a source that both (a) names China and (b) ties
  the name to Lotus Blossom/Billbug. Service placement unresolved → cn/unscoped until a
  cited source names a service. FK-propagated id change to the 2 referencing events on 2026-06-24.
