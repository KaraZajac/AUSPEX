  Insikt Group (2024) — attributes the group only as "highly likely a Chinese state-sponsored threat
  activity group" / "a likely Chinese state-sponsored cyber-espionage group" and never names the MSS
  (Ministry of State Security), MPS, the PLA, or any specific Chinese service. (The report's lone
  "state security" mention is a victim — "a state security organization in Africa" — not the
  perpetrator's tasking authority.) The China nexus is supported at a likely/named-actor level; the
  service placement is not — hence cn/unscoped until a cited source names a service. Recorded Future
  customarily attributes China-nexus activity to "Chinese state-sponsored" rather than to a named
  organ, consistent with that here.
  FK-propagated id change to the 1 referencing event on 2026-06-24.
