ttp_summary: |
  Chinese state-sponsored cyber-espionage group tracked by Recorded Future's Insikt Group as
  RedNovember (formerly TAG-100), active across June 2024 to July 2025. Weaponizes n-day exploits
  against internet-facing perimeter appliances — observed against SonicWall, Cisco ASA, F5 BIG-IP,
  Palo Alto GlobalProtect, Fortinet FortiGate and Ivanti Connect Secure — and leans on open-source
  and commodity tooling: the Go-based Pantegana backdoor, Cobalt Strike, SparkRAT and the
  LESLIELOADER loader, with some email-based spearphishing (e.g. a PDF lure spoofing the IT
  department of a US Navy contractor). Anonymizes its infrastructure via commercial VPNs (highly
  likely ExpressVPN, possibly Warp VPN). Targeting spans government, defense, aerospace, technology,
  law firms and intergovernmental organizations worldwide, with notable interest in US defense
  contractors, Taiwanese technology firms, and government bodies in Panama, South Korea and
  Southeast Asia; activity timing correlates with geopolitical events of strategic concern to
  Beijing (Recorded Future / Insikt Group, 2024).
