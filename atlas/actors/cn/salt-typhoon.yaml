ttp_summary: |
  PoC-grade exploitation of known N-day vulnerabilities in edge
  routers and security appliances (Cisco IOS XE, Fortinet, Ivanti,
  Palo Alto, Sophos); router-firmware modification; Demodex
  Windows kernel-mode rootkit; long-dwell living-off-the-land.
  Compromised US tier-1 carriers (AT&T, Verizon, T-Mobile, Lumen,
  Spectrum / Charter, Consolidated, Windstream) including CALEA
  lawful-intercept gateways. FBI (August 2025) reported 200+
  companies in 80 countries compromised. Targeted content
  interception of campaign staff for both 2024 US presidential
  candidates.
