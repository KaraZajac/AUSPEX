notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): cn/mss service placement VERIFIED against the actor's own
  cited sources (KEEP). The decisive source is the actor-specific Treasury/OFAC SDN designation
  (2025-01-17, jy2792), which (a) identifies the operating company as part of Salt Typhoon —
  "Sichuan Juxinhe Network Technology Co., LTD., a Sichuan-based cybersecurity company with direct
  involvement in the Salt Typhoon cyber group" and "Sichuan Juxinhe ... had direct involvement in the
  exploitation of these U.S. telecommunication and internet service provider companies" — and (b) names
  the MSS as that company's affiliating service: "The MSS has maintained strong ties with multiple
  computer network exploitation companies, including Sichuan Juxinhe." OFAC thus places the Salt Typhoon
  operating company under the MSS specifically (not merely "PRC"/"China"). The 13-government CISA advisory
  AA25-239A (2025-08-27) corroborates the contractor cluster but names it more diffusely — the named
  entities (Sichuan Juxinhe, Beijing Huanyu Tianqiong, Sichuan Zhixin Ruijie) "provide cyber-related
  products and services to China's intelligence services, including multiple units in the People's
  Liberation Army and Ministry of State Security" (MSS named, but alongside the PLA, for the cluster as a
  whole). The remaining three sources do NOT name a service: CRS IF12798 says only "PRC state-sponsored
  hackers" and notes the OFAC action without itself naming the MSS; WSJ (2024-09-25) frames it as "China's
  Salt Typhoon Hackers"; the FBI 200+/80-countries statement is impact-only. The placement therefore
  rests on the OFAC designation (named-service level), with CISA AA25-239A as supporting corroboration.
  MISP galaxy (GhostEmperor, UUID 3c3ca8f3-...; synonyms incl. Salt Typhoon / RedMike / OPERATOR PANDA /
  UNC2286 / FamousSparrow; country CN) corroborates the China nexus and the alias cluster only — it has
  no service attribution (cfr-suspected-state-sponsor: None) and is signal-only here. No id change; no
  event FK changes.
