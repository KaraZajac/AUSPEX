notes: |
  Former id cn/mss/lapdogs-orb-operator (PROVISIONAL backfill stub, 2026-05-30, whose only basis
  for the MSS placement was the analyst hint "LapDogs ORB operator (China-nexus)"). Demoted to
  cn/unscoped on 2026-06-24: the sole cited source (SecurityScorecard STRIKE, June 2025) names NO
  specific Chinese intelligence service. Its dedicated Attribution section concludes only "We
  therefore assess with moderate confidence that LapDogs is an Operational Relay Box Network that
  China-Nexus threat actors use," and states "it can be difficult to determine the exact threat
  actor operating the network... We cannot yet confirm whether UAT-5918 is the operator or just a
  client of the network." Throughout the report the attribution is uniformly "suspected
  China-Nexus" / "China-Nexus APTs," supported by Mandarin developer notes in the ShortLeash
  startup script and U.S./Southeast-Asia victimology — never MSS, MPS, the PLA/SSF, or any named
  unit. China nexus is supported at moderate confidence; the service placement is not — hence
  cn/unscoped. Keep cn/unscoped until a cited source names a service. FK-propagated id change to
  the 1 referencing event on 2026-06-24.
