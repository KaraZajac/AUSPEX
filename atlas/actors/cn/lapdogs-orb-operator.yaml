ttp_summary: |
  Operator of "LapDogs," a suspected China-Nexus Operational Relay Box (ORB) network first
  documented by SecurityScorecard's STRIKE team (June 2025). The network comprises 1,000+
  actively-infected, primarily Linux-based Small Office/Home Office (SOHO) and edge devices
  (heavily Ruckus Wireless access points and Buffalo AirStation routers, plus IP cameras, IoT,
  and some Windows hosts), built up methodically since September 2023 and concentrated in the
  United States and Southeast Asia (Japan, South Korea, Taiwan, Hong Kong — ~90% of nodes).
  Infects devices via N-day exploitation of unpatched, end-of-life embedded web/SSH services
  (e.g. CVE-2015-1548 / CVE-2017-17663 in old ACME mini_httpd, EmbedThis GoAhead on Ruckus,
  DropBearSSH). Each node runs a custom backdoor, ShortLeash, dropped into the systemd directory
  as an "ff-agent-pi.service" unit for root-level persistence across reboots; ShortLeash stands
  up a fake versionless Nginx web service and generates a unique, locally-issued self-signed TLS
  certificate sharing fixed LAPD-spoofing subject/issuer metadata and a common JARM fingerprint
  (3fd3fd16d3fd3fd22c3fd3fd3fd3fdf20014c17cd0943e6d9e2fb9cd59862b) — the pivot SecurityScorecard
  used to enumerate the network. The ORB provides covert relay infrastructure to obscure
  espionage operations; SecurityScorecard assesses Cisco Talos' UAT-5918 used LapDogs at least
  once against Taiwan but could not confirm whether UAT-5918 is the operator or merely a client,
  nor whether other actors share access. Shares some traits with the PolarEdge ORB (Sekoia) but
  is assessed a distinct, independent network.
