notes: |
  Former id cn/mss/apt19 (an unsourced MSS placement). Demoted to cn/unscoped on 2026-06-24
  (claude-opus-4.8/max audit): the actor's SOLE cited source is Mandiant's APT1 report
  ("APT1 — Exposing One of China's Cyber Espionage Units", 2013-02-19), which (a) names the
  PLA — not the MSS — as the responsible service ("APT1 is believed to be the 2nd Bureau of the
  People's Liberation Army (PLA) General Staff Department's (GSD) 3rd Department (总参三部二局),
  which is most commonly known by its Military Unit Cover Designator (MUCD) as Unit 61398
  (61398部队)"); and (b) is OFF-TOPIC / mis-cited for APT19 — the report profiles only APT1 and
  never mentions APT19 (the inline "generic Chinese-APT context" comment confirms it was only
  ever a placeholder citation, not an attribution of APT19). No source on this record names the
  Ministry of State Security or any specific Chinese service. China nexus is well-attested in the
  wider literature (MITRE G0009; MISP cluster "APT19"), but those are corroboration signals only
  and name no service. The cn/mss claim is therefore unsourced → cn/unscoped until a cited source
  names a service. No events FK-reference this actor (no actor_id propagation needed). The APT1
  report remains cited (it is the record's only source) but is flagged as off-topic — APT19 needs
  a real APT19-specific source.
sources:
  - mandiant/2013-02-19_apt1-report  # OFF-TOPIC for APT19 (profiles PLA Unit 61398/APT1, names PLA not MSS); placeholder "generic Chinese-APT context" citation flagged 2026-06-24

