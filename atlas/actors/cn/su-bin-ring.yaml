# De-provisionalized + DEMOTED to cn/unscoped 2026-06-24: the actor's sole cited source — the DOJ
# March 22, 2016 guilty-plea press release / plea agreement (doj/2016-03-22_su-bin-plea) — does NOT
# name the PLA. It describes the co-conspirators only as "two other persons in China" (= "two persons
# in China" / "two unnamed persons in China" across DOJ wording); SCMP notes "Court documents did not
# indicate to whom Su was sending the plans." The "People's Liberation Army (Air Force)" attribution
# is real in the broader record but originates in a SEPARATE July 2016 DOJ *sentencing* statement (AAG
# Carlin) and in journalists'/analysts' reporting — neither is the cited source. Per the corpus rule
# (cf. ir/unscoped/agrius), the placement must rest on the actor's OWN cited source naming the service,
# which it does not. China nexus is fully sourced (named-actor); the PLA *service* placement is not.
