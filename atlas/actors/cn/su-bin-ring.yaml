notes: |
  Former id cn/pla/su-bin-ring (primary_service_id had been set to cn/pla-ssf with the in-line caveat
  "PLA tasking per DOJ; specific bureau not publicly named"). DEMOTED to cn/unscoped on 2026-06-24
  after verifying the actor's sole cited source.
  AUDIT (2026-06-24, claude-opus-4.8/max): the cited source — DOJ's "Chinese National Pleads Guilty to
  Conspiring to Hack into U.S. Defense Contractors' Systems to Steal Sensitive Military Information"
  (2016-03-22 plea press release / plea agreement, doj/2016-03-22_su-bin-plea) — does NOT name the PLA.
  It states only: "Su Bin admitted to conspiring with TWO OTHER PERSONS IN CHINA from October 2008 to
  March 2014 to gain unauthorized access to protected computer networks in the United States ... to
  obtain sensitive military information" (verbatim, per the captured snapshot of the plea-agreement
  account; the phrase "People's Liberation Army" does not appear). Contemporaneous reporting of this
  plea concurs the co-conspirators were "two unnamed persons in China" and that "Court documents did not
  indicate to whom Su was sending the plans" (SCMP, 2016-03-23). The explicit PLA / "People's Liberation
  Army Air Force" language belongs to a SEPARATE, later DOJ *sentencing* statement (AAG John P. Carlin,
  July 2016 — "a conspiracy with hackers from the People's Liberation Army Air Force") and to journalists'
  inference ("various government reports and media outlets indicate the two are members of the People's
  Liberation Army" — DefenseNews, explicitly flagged as "the journalist's reporting, not ... the official
  March 2016 DOJ plea documentation"). That sentencing statement is not among this actor's cited sources.
  Per the project rule that a service placement must rest on the actor's OWN cited source naming the
  service (cf. ir/unscoped/agrius), the China nexus is well-supported at named-actor level but the PLA
  *service* placement is not — hence cn/unscoped until a cited source (e.g. the July 2016 DOJ sentencing
  release, or the criminal complaint's "Second Department, General Staff Headquarters, PLA" recipient
  language) is added to this record. NB: misp_galaxy carries no Su-Bin cluster, so no MISP corroboration
  of a PLA unit was available.
  FK-propagated id change cn/pla/su-bin-ring -> cn/unscoped/su-bin-ring to the 1 referencing event
  (2010-01/su-bin-aviation-ip) on 2026-06-24.
sources:
  - doj/2016-03-22_su-bin-plea
