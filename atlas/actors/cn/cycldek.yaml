ttp_summary: |
  PRC-nexus operator focused on Southeast Asian government
  targets — primarily Vietnam, Laos, Thailand. Tooling
  includes the NewCore RAT family (BlueCore, RedCore),
  USBCulprit USB-bridge for air-gapped exfiltration
  (disclosed by Kaspersky June 2020), PlugX variants. Lure
  documents typically themed on regional political /
  diplomatic affairs (China-ASEAN South China Sea, Mekong
  cooperation, party-congress materials).
