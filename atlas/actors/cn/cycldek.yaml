notes: |
  Former id cn/mss/cycldek, which asserted an MSS (Ministry of State Security) service placement.
  AUDIT (2026-06-24, claude-opus-4.8/max): DEMOTED to cn/unscoped. The actor's sole cited source —
  Kaspersky / Securelist, "Cycldek: Bridging the (air) gap" (2020-06-03) — never names the MSS, the
  PLA, or any Chinese service (0 occurrences of "Ministry of State Security" / "MSS" in the captured
  raw article). Its only attribution statement is a language inference: "Cycldek is a long-known
  Chinese-speaking threat actor," with a supporting tooling note that PlugX "was typically leveraged
  by Chinese-speaking actors." Because no source-of-record names a service, the cn/mss placement is
  unsourced and is demoted to cn/unscoped (QC frontier) pending a cited source that names a service.
  FLAG (nation attribution): the cited source does NOT explicitly attribute Cycldek to the Chinese
  STATE either — it says only "Chinese-speaking" (a language inference) and references "Chinese hacker
  forums" (tool provenance); the word "China" as a nation does not appear. The cn/ nation bucket here
  therefore currently rests on a language inference rather than an explicit nation-state attribution in
  this one source. The cn-nexus / Goblin Panda identity is corroborated only as a cluster label by
  external_refs (CrowdStrike "Goblin Panda", MISP galaxy "Cycldek") — these are signal, not a service
  attribution, and are not the actor's cited source-of-record. Kept under cn/ (not re-bucketed) but the
  thinness of the nation evidence in the lone cited source is flagged for human review; adding a govt /
  tier-1 source that explicitly names the Chinese state (and ideally the service) would resolve both.
  FK-propagated the id change to the 1 referencing event (2020-06/cycldek-usbculprit-air-gap) on
  2026-06-24.
sources:
