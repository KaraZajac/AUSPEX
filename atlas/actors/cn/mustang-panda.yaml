notes: |
  Former id cn/mss/mustang-panda (asserted an unsourced MSS placement). Demoted to cn/unscoped on
  2026-06-24 (AUDIT, claude-opus-4.8/max): of this actor's cited sources, none names the Ministry of
  State Security or any specific Chinese service — the attribution is nation-level only.
  • Proofpoint (2022, "TA416 / Mustang Panda Increases Operational Tempo Against European Diplomatic
    Entities"): "Proofpoint researchers have identified ongoing activity by the China-aligned APT
    actor TA416…"; "Since 2020, Proofpoint researchers have observed TA416, an actor assessed to be
    aligned with the Chinese state…". No "MSS"/"Ministry of State Security"/"PRC".
  • MITRE ATT&CK G0129: "Mustang Panda is a China-based cyber espionage threat actor that has been
    conducting operations since at least 2012." Zero occurrences of "MSS" or "Ministry"; the
    "state-sponsored"/"PRC-Nexus" strings on the page are titles of cited references (Insikt Group,
    GTIG), not MITRE's own attribution, and none of those name the MSS either.
  • Proofpoint (2025-09, "renewed EU/NATO campaign"): url: null — an invented slug whose underlying
    event is unconfirmed from any primary Proofpoint source (flagged by the 2026-05-26 sweep);
    RESOLVED 2026-07-05: re-pointed to the real Proofpoint TA416 article (pub 2026-04-01) in the mustang-panda-eu-nato audit; the actor placement cn/unscoped stands (no MSS).
  The China/PRC nexus is well-supported (named-actor level); the MSS service placement is not — hence
  cn/unscoped. The 2025 DOJ/FBI court-authorized PlugX deletion op described Mustang Panda as
  "PRC-backed"/"sponsored by the PRC government" — still the PRC, not the MSS — but that document is
  not among this actor's cited sources. MISP galaxy ("MUSTANG PANDA", signal only) carries no service
  assignment. Keep cn/unscoped until a cited source names a specific Chinese service.
  FK-propagated id change to the 10 referencing events on 2026-06-24.
sources:
