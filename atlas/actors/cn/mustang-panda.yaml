ttp_summary: |
  PlugX variants (PUBLOAD, Korplug); TONESHELL, MQsTTang; SnakeDisk
  USB worm; LNK / sideloading. Workhorse for regional political-
  intelligence collection — ASEAN MFAs (Mongolia, Myanmar, Pakistan,
  Vietnam, Philippines, Thailand), the Vatican, EU institutions,
  Taiwan, refugee / diaspora organizations.
