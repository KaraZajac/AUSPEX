# De-provisionalized + demoted to cn/unscoped 2026-06-24: the single cited GTIG/Mandiant source
# establishes a China-nexus but NO service. "UNC" in Mandiant's taxonomy = UNCATEGORIZED — and the
# report attributes only "a suspected People's Republic of China (PRC)-nexus cyber espionage group."
# It does not name the MSS, the PLA, or any specific Chinese service, and uses no confidence verb
# beyond "suspected." (Cf. the cn/unscoped/unc3886 precedent, same UNCATEGORIZED reasoning.)
