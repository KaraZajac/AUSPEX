notes: |
  Former id cn/mss/unc2814 (PROVISIONAL backfill stub, 2026-05-30, which asserted an unsourced MSS
  placement). Demoted to cn/unscoped on 2026-06-24: "UNC" in Mandiant's taxonomy denotes an
  UNCATEGORIZED activity cluster — Mandiant/GTIG deliberately did NOT attribute UNC2814 to any nation
  or service organ at this disclosure. The single cited source (GTIG/Mandiant, 2026-02-25) attributes
  it only as "a suspected People's Republic of China (PRC)-nexus cyber espionage group that GTIG has
  tracked since 2017" / "a suspected PRC-nexus threat actor that has conducted global operations since
  at least 2017." The China nexus is therefore supported at the "suspected" level, but NO cited source
  names the MSS, the Ministry of State Security, the PLA, or any specific Chinese service (the words
  "MSS"/"Ministry" do not appear in the report, nor does any confidence verb beyond "suspected") —
  hence cn/unscoped, not cn/mss. Keep cn/unscoped until a cited source names a service.
  FK-propagated id change to the 1 referencing event on 2026-06-24.
