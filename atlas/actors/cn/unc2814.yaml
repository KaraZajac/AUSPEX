ttp_summary: |
  Suspected PRC-nexus cyber-espionage cluster tracked by GTIG/Mandiant since 2017, with a long
  history of targeting international governments and global telecommunications providers across
  Africa, Asia and the Americas. Its recent campaign deployed GRIDTIDE, a novel C-based backdoor
  that abuses the Google Sheets API as a high-availability command-and-control channel — polling and
  writing specific spreadsheet cells, URL-safe-Base64-encoding its traffic, and disguising C2 as
  benign cloud API requests to evade network detection (the abuse is of legitimate Sheets
  functionality, not a Google product vulnerability). On-host, GRIDTIDE executes arbitrary shell
  commands, uploads/downloads files, uses living-off-the-land binaries for recon and privilege
  escalation, and persists via a malicious systemd service. GTIG confirmed 53 intrusions across 42
  countries (suspected activity in 20+ more), including dropping GRIDTIDE on an endpoint holding
  voter-ID/national-ID PII — assessed by GTIG as consistent with telecom-sector espionage to track
  persons of interest. The specific initial-access vector for the GRIDTIDE campaign was not
  determined, though UNC2814 historically gains entry by exploiting and compromising web servers and
  edge systems. In February 2026 GTIG and partners disrupted the operation by terminating the
  attacker's Google Cloud Projects, disabling its accounts/Service Account, and releasing IOCs.
