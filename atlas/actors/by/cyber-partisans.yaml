ttp_summary: |
  Belarusian opposition counter-state cyber collective formed
  after the August 2020 election protests. Operations have
  included exfiltration of Belarusian state databases (population
  registry, police personnel files, vehicle registry) and the
  January 2022 BZhD railway disruption against rolling stock
  being used to transport Russian military equipment. Operates
  publicly via Telegram and has done BlackHat / DEF CON
  presentations. Documented here as a counter-state actor for
  context; doctrine alignment is inverted (the BCP works against
  the doctrines this dossier tags).
