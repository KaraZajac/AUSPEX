ttp_summary: |
  Distinctive Belarusian-aligned cluster documented by ESET in
  August 2023 for using an ISP-position adversary-in-the-middle
  technique against foreign embassy staff stationed in Belarus.
  The cluster intercepts target connections at the Belarusian
  ISP layer (assessed by ESET as via the SORM-like lawful-
  intercept infrastructure operated under Belarusian state
  authority) and redirects target hosts to attacker-controlled
  fake-Windows-Update infrastructure to deliver the NightClub
  and Disco implant families. The operational footprint is
  small but the tradecraft is rare globally — only a handful
  of public ISP-position-AITM clusters exist, and the Belarusian
  case is the most thoroughly documented.
