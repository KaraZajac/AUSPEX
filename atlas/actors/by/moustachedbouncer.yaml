notes: |
  Former id by/kgb/moustachedbouncer. Demoted to by/unscoped on 2026-06-24 (audit
  claude-opus-4.8/max) against the actor's sole cited source. ESET's "MoustachedBouncer —
  Espionage Against Foreign Diplomats in Belarus" (2023-08-10) attributes the cluster to the
  STATE, not a service: "We assess with medium confidence that they are aligned with Belarus's
  interests." The report never names the Belarusian KGB / State Security Committee / KDB or any
  specific service (verbatim scan of the captured snapshot: zero occurrences of "KGB", "state
  security", "intelligence service/agency"). On tradecraft ESET says only that the cluster "uses
  a lawful interception system (such as SORM)" — assessed "with low confidence" — i.e. state-
  authorized infrastructure, not a named operator. MISP galaxy (UUID 01ac8b25...) corroborates
  the level only: cfr-suspected-state-sponsor "Belarus", country "BY", attribution-confidence 50.
  The by/kgb service file's own summary already conceded the placement was a best guess ("most
  plausibly placed here"). Belarus nexus is source-supported (named-actor level); the service
  placement is not — hence by/unscoped until a cited source names a Belarusian service. The KGB /
  SORM apparatus remains the most plausible host (ESET's ISP-position tradecraft implies state
  lawful-intercept authority), but plausibility is not a source naming the service. FK-propagated
  the id change to the 1 referencing event on 2026-06-24.
sources:
