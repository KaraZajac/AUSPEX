ttp_summary: |
  Influence-and-credential-theft cluster documented by Mandiant
  (UNC1151), Proofpoint (TA445), Google TAG (PUSHCHA), and
  government attribution actions. NATION ATTRIBUTION IS SPLIT
  across the cited sources: Mandiant assesses UNC1151 is linked
  with HIGH confidence to "the Belarusian government" and with
  MODERATE confidence to "the Belarusian military" (and "cannot
  rule out Russian contributions"), while the two cited government
  statements name Russia — the German Federal Foreign Office
  (2021-09-06) attributed the activities "to cyber actors of the
  Russian State and specifically to the Russian military
  intelligence service GRU," and the EU Council's September 2021
  declaration "associated these with the Russian state." Combined
  operations: credential theft against Polish, Lithuanian, German,
  and Ukrainian targets; subsequent leak-and-fabrication influence
  operations seeding false content into hijacked social-media and
  content-management accounts. None of the cited sources names the
  Belarusian KGB or any specific Belarusian service — hence the
  by/unscoped placement (see notes).
