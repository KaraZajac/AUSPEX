ttp_summary: |
  Belarusian-aligned influence-and-credential-theft cluster
  documented by Mandiant (UNC1151), Proofpoint (TA445), and EU
  attribution actions (the Council of the EU named Belarus as
  associated with Ghostwriter in 2021). Combined operations:
  credential theft against Polish, Lithuanian, German, and
  Ukrainian targets; subsequent leak-and-fabrication influence
  operations seeding false content into hijacked social-media
  and content-management accounts. The German federal government
  attributed pre-September-2021-election operations against
  Bundestag members to Ghostwriter; the EU's September 2021
  statement attributed the broader campaign to "Belarus-linked
  threat actors." Mandiant's UNC1151 attribution to Minsk was
  the technical foundation for the EU action.
