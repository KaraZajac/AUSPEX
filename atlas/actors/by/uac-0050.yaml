ttp_summary: |
  Cluster designated UAC-0050 by CERT-UA, active against
  Ukrainian targets since the 2022 invasion. Tradecraft is heavy
  on mass spear-phishing of Ukrainian state institutions with
  commodity RAT delivery — Remcos RAT being the long-running
  staple, with NetWire, Rhadamanthys/Meduza stealers, and various
  other open-source / commodity tooling rotated through. Lures are
  themed on Ukrainian military mobilization, government
  communications, judicial documents, and financial filings.
  State/service attribution is unresolved and the prior
  "Belarusian-aligned" framing is NOT supported by the cited
  sources (see notes): CERT-UA itself assesses UAC-0050 as a
  Russian-speaking mercenary group ("The DaVinci Group") with
  "ties to Russian law enforcement", and the BI.ZONE / Kaspersky
  reports cited here treat Belarus as a TARGET, not the sponsor.
