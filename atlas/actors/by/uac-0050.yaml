notes: |
  Former id by/kgb/uac-0050 (asserted a Belarusian-KGB placement). DEMOTED to by/unscoped/uac-0050 on
  2026-06-24 by primary-source audit: NONE of the four cited sources names the Belarusian KGB (Камітэт
  дзяржаўнай бяспекі / KDB) or any Belarusian intelligence service.

  AUDIT (2026-06-24, claude-opus-4.8/max): per-source findings —
  - CERT-UA advisories (3804703 / 4490832): cert.gov.ua is a JS-rendered Vue SPA; neither curl nor
    WebFetch can extract article text (the curl snapshot is the empty app shell; backend JSON-API
    endpoints all 404) and archive.org is blocked, so CERT-UA's wording is captured via authoritative
    secondary trackers that quote it. BushidoToken's "Cracking The DaVinci Code" (2024-03-06) quotes
    CERT-UA directly: "UAC-0050 is linked to a Russian-speaking mercenary organization called 'The
    DaVinci Group' … CERT-UA assessed that UAC-0050 (The DaVinci Group) has ties to Russian law
    enforcement and has been targeting Ukrainian organizations since … the Russian invasion." Malpedia's
    UAC-0050 page (citing the same CERT-UA advisories) gives NO national attribution and NO Belarus/KGB
    mention; motive "likely espionage." => CERT-UA points to RUSSIA, not Belarus, and never the KGB.
  - BI.ZONE "Sticky Werewolf" (cited slug 404s; live mirror bi-zone.medium.com): Belarus is the VICTIM —
    "public organizations in Russia and Belarus remain a popular target for espionage"; the report names
    no operator/sponsor (suspected pro-Ukrainian/hacktivist in wider coverage, "uncertain") and does not
    even reference CERT-UA/UAC-0050. The prior actor note claiming BI.ZONE "formaliz[ed] the
    Belarusian-aligned framing" misread this report.
  - Kaspersky "Angry Likho" (cited slug 404s): likewise targets Russian/Belarusian organizations
    (Belarus = victim) and is of Russian-speaking origin; names no Belarusian service.
  MISP corroboration: misp_galaxy UAC-0050 (e3ff56b6-…) carries the cluster label only — no Belarusian
  state/service claim. Signal only, consistent with no-KGB.

  FLAG — BY NATION CONTESTED/UNSOURCED: the demotion to by/unscoped keeps the actor under Belarus
  *pending human re-home only*. The cited evidence does NOT establish a Belarus nexus and in fact points
  to a Russia-aligned/Russian-speaking mercenary crew ("The DaVinci Group", "ties to Russian law
  enforcement") whose targets include Belarus. The eventual correct home is likely criminal/uac-0050 or
  ru/proxies/uac-0050, NOT by/*; left under by/unscoped here only because re-homing the nation is a
  human decision outside this service-placement audit. The by/union-state-integration doctrine alignment
  inherits the same doubt and should be revisited when the nation is resolved. The UAC-0050 ↔ Sticky
  Werewolf ↔ Angry Likho equivalences (BI.ZONE / Kaspersky) are infrastructure-overlap claims, not a
  shared state attribution. FK-propagated id change to the 5 referencing events on 2026-06-24.
