ttp_summary: |
  Belarusian-aligned cluster designated UAC-0050 by CERT-UA and
  named "Sticky Werewolf" by Russian vendor BI.ZONE. Most
  publicly visible Belarusian-state-aligned cluster in the
  Ukraine theater post-February 2022. Tradecraft is heavy on
  mass spear-phishing of Ukrainian state institutions with
  commodity RAT delivery — Remcos RAT being the long-running
  staple, with NetWire, Rhadamanthys stealer, and various other
  open-source / commodity tooling rotated through. Lures are
  themed on Ukrainian military mobilization, government
  communications, judicial documents, and financial filings.
  The "Belarusian-aligned" attribution rests on CERT-UA
  designation; some vendors prefer "Russian-Belarusian" framing
  given the operational overlap with Russian Ukraine-theater
  tasking.
