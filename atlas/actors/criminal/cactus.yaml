ttp_summary: |
  Ransomware operation emerging March 2023. First identified by
  Kroll in May 2023; notable for self-encrypting its own payload
  during deployment to evade endpoint detection (the "Cactus" name
  derives from the file extension). Initial access predominantly
  via Fortinet VPN credential abuse and Qlik Sense vulnerabilities
  (CVE-2023-41265, CVE-2023-41266, CVE-2023-48365) in late 2023 /
  early 2024. Victims include Schneider Electric (Sustainability
  Business division, Jan 2024), Coop (Sweden, Jul 2024), and
  numerous mid-market manufacturers. Mixed-jurisdiction affiliate
  base; no public state-nexus attribution.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/` because
  no specific FSB-tolerance attribution has been published. The
  Schneider Electric Sustainability Business intrusion drew brief
  attention to potential ESG / carbon-credits data-theft motive
  but no espionage thread emerged.
