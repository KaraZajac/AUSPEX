ttp_summary: |
  Commercial (mercenary) surveillance vendor — the Intellexa alliance, built around the
  spyware-developer Cytrox — that sells the Predator spyware to government customers. In the
  September 2023 case disclosed by Google TAG and The Citizen Lab, Intellexa developed an
  in-the-wild iOS zero-day exploit chain (CVE-2023-41993 Safari RCE → CVE-2023-41991
  certificate-validation → CVE-2023-41992 XNU-kernel LPE) to covertly install Predator, plus
  an Android chain (CVE-2023-4762). Primary delivery was man-in-the-middle / network injection
  over HTTP — a middlebox at the target's ISP silently redirected plain-HTTP requests to an
  Intellexa-controlled site (c.betly[.]me) and on to the exploit server (sec-flare[.]com),
  requiring no clicks; Android exploits were also delivered via one-time links. Citizen Lab
  attributed the in-country injection device to a Sandvine PacketLogic product (high
  confidence). As a vendor, Intellexa supplies capability; the operation against any given
  target is run by the purchasing state (here, the Egyptian government per Citizen Lab).
default_doctrine_alignment_ids: []
