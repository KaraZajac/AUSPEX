ttp_summary: |
  Russian-speaking BEC operator identified by Agari ACID in
  July 2020 as the first significant Russian-organized BEC
  group, in contrast to the previously West-African-dominated
  BEC landscape. Approximately 200 distinct campaigns
  against Fortune 500 and Global 2000 victims from mid-2019
  through 2020 (the Agari report's window). Agari reports most
  executive-impersonation BEC averages ~USD 55,000 while Cosmic
  Lynx demands hundreds of thousands to millions per attempt (one
  request of ~USD 2.7M). Operational signature: mature dual-
  impersonation M&A-pretext lures; mule accounts primarily in
  Hong Kong, secondarily Hungary/Portugal/Romania (US mule
  accounts deliberately avoided). (Corrected 2026-07-01: the prior
  "~$1.27M avg / 5x Nigerian BEC / Eastern-European mules" figures
  are carried by neither Agari source and were removed.)
notes: |
  Cosmic Lynx has no publicly-attributed state nexus and no
  individual operator has been indicted as of the corpus
  cutoff. AUSPEX records under `criminal/` and treats the
  Russian-speaking-but-criminal classification as the public
  record's farthest-supportable claim.
