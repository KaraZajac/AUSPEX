ttp_summary: |
  Ransomware / data-extortion group active March 2022 through
  early 2024. Used a Phobos-variant encryptor (SmokeLoader and
  SystemBC for delivery) and ran a name-and-shame leak site
  with aggressive post-payment re-extortion patterns. Heavy
  small-and-medium-business victim distribution across the US
  and Brazil. Disrupted by Operation Phobos Aetor (Thai police,
  FBI, Europol) February 2024 with arrests in Phuket and DOJ
  unsealings November 2024 of Russian national Evgenii
  Ptitsyn alleging Phobos administration. VMware Carbon Black
  Jun 2023 analysis links 8Base to Phobos lineage.
notes: |
  Phobos was a long-running ransomware brand sold on a closed
  affiliate basis since 2018; 8Base was one of its most active
  branded affiliate clusters. AUSPEX places under `criminal/`
  rather than `ru/proxies/` because the indicted Ptitsyn case is
  multi-jurisdictional and no FSB-tolerance argument has been
  publicly made about 8Base or Phobos.
