ttp_summary: |
  Ransomware-as-a-service (RaaS) crew; one of the older surviving
  brands, originally "Team Truniger" (the GandCrab-affiliate nickname
  of a key member, per CISA AA23-263A). Distinctive Windows Safe Mode
  reboot trick to evade endpoint protection during encryption. Gains
  access mainly by brute-forcing RDP and buying compromised credentials
  on criminal forums/marketplaces; C2 and RDP connections traverse a
  Russian bulletproof hosting service. Notable victims: defense
  contractor HENSOLDT France (2022), South African Department of Defense
  (2023). CISA/FBI AA23-263A (Sep 2023) joint advisory. Operator-
  affiliate model. (NB: the advisory makes no Russian-state-nexus claim;
  the "Russian-speaking" descriptor on earlier records is not supported
  by the cited source and has been removed — see notes.)
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization: unsourced; CISA AA23-263A asserts no state nexus, and that doctrine's roster never named Snatch
notes: |
  Former id ru/proxies/snatch (asserted Snatch operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/snatch on 2026-06-24 (claude-opus-4.8/max audit). REASON: the actor's only cited
  source — the joint CISA/FBI advisory AA23-263A "#StopRansomware: Snatch Ransomware" (2023-09-20) — frames
  Snatch purely as a criminal ransomware-as-a-service group ("Snatch operates a ransomware-as-a-service (RaaS)
  model and claimed their first U.S.-based victim in 2019"; "identified through FBI investigations as recently
  as June 1, 2023"; lineage "Team Truniger" from a member who "previously operated as a GandCrab affiliate").
  A full scan of the captured snapshot finds ZERO occurrences of FSB, GRU, SVR, intelligence service, state-
  sponsor(ed), nation-state, tasking, tolerate/tolerance, safe-harbor, non-prosecution, sanction, espionage,
  Kremlin, Moscow, or proxy. The ONLY "Russia/Russian" tokens in the entire advisory refer to a "Russian
  bulletproof hosting service" — verbatim: "a command and control (C2) server located on a Russian bulletproof
  hosting service [T1583.003]" and "Snatch threat actors initiated RDP connections from a Russian bulletproof
  hosting service" — which is a CRIMINAL-INFRASTRUCTURE trait (where the crew rents servers), NOT a documented
  state nexus (tasking / tolerance / handoff / safe-harbor). The ru/proxies/ namespace requires a SOURCE-
  DOCUMENTED state nexus in the actor's sources/notes (SCHEMA "Actor placement rule"); none was present, so the
  state-tolerated-proxy claim was unsourced. The unsourced ru/sanctions-response-2022/criminal-proxy-mobilization
  doctrine alignment was dropped for the same reason (that doctrine's roster — Conti/TrickBot/Wizard Spider,
  Killnet, NoName057(16), CARR — never named Snatch). The prior "Russian-speaking" descriptor is likewise NOT
  in the cited advisory body (and would be a criminal trait regardless), so it was removed from ttp_summary.
  No events reference this actor (grep 'actor_id: ru/proxies/snatch' atlas/events/ → 0 hits), so there was no
  FK propagation. MISP: no Snatch / Team Truniger entry exists in the MISP threat-actor galaxy (our record
  already carries misp_galaxy: null) — no MISP corroboration of any nexus.
  Demoted WITHIN the ru nation (mirroring ir/unscoped/agrius) rather than to criminal/ to avoid the parent
  agent's deeper taxonomy call: whether Snatch should be the stateless criminal/snatch (no documented state
  nexus at all in the cited source) is FLAGGED for human review and deliberately NOT made here (Emotet
  precedent: ru/proxies/emotet -> ru/unscoped/emotet -> criminal/emotet only on Kara's explicit decision).
  Keep ru/unscoped until a cited source names a Russian service — or re-home to criminal/snatch if the human
  judges that no inherited state nexus exists (the Russian-bulletproof-hosting link is criminal, not state).
