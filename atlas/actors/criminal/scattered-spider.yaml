ttp_summary: |
  Anglophone (US / UK / Canadian) teen-led criminal collective
  organized around English-language Telegram / Discord channels
  ("The Com" subculture). Tradecraft: SIM-swap, voice / SMS social
  engineering of IT help desks, abuse of Okta / Azure AD self-
  service password reset, SaaS-tenant pivoting. Operates as an
  affiliate of various ransomware brands rather than running its
  own — ALPHV / BlackCat (MGM, Caesars Sept 2023), RansomHub
  (post-ALPHV collapse 2024), Qilin (2024). The August 2022 0ktapus
  campaign hit Twilio, Cloudflare (unsuccessfully), DoorDash, and
  ~130 other orgs via the same Okta-phishing kit. Notable victims:
  Caesars (Sept 2023, USD 15M ransom paid), MGM Resorts (Sept 2023,
  USD 100M+ disclosed impact, ALPHV affiliate), Reddit (Feb 2023),
  Snowflake-customer pivot via UNC5537 partnership (mid-2024).
  Crypto-theft pivot 2024–25 with SIM-swap targeting of crypto-
  exchange employees and customers.
notes: |
  Scattered Spider is the canonical case of a transnational,
  Anglophone, youth-led criminal cluster with no plausible state-
  nexus — distinct from the Russian-aligned ransomware ecosystem
  it affiliates with. Documenting the absence of state nexus is
  load-bearing for AUSPEX analytic separation: SS operates as an
  *affiliate* of Russian-tolerated RaaS programs but is itself
  Western-jurisdictional.
