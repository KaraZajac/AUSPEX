ttp_summary: |
  Ransomware and data-extortion group active since at least
  June 2022, profiled in the joint CISA/FBI/HHS advisory
  AA22-294A "#StopRansomware: Daixin Team" (Oct 2022), which
  focused on the group's targeting of the US Healthcare and
  Public Health (HPH) sector — encrypting servers responsible
  for electronic health records, diagnostics, imaging and
  intranet services, and exfiltrating PII/PHI for double
  extortion. Initial access typically via VPN servers
  (unpatched vulnerabilities or credentials without MFA);
  post-compromise uses SSH, RDP and privilege escalation to
  deploy a Babuk-derived ESXi/Linux encryptor. Beyond
  healthcare, the group has hit hospitality — it claimed the
  April 2024 attack on Omni Hotels & Resorts
  (2024-05/bianlian-omni-hotels) via its dark-web leak site.
notes: |
  Created 2026-07-05 (Kara-approved) to model the press/leak-site
  attribution of the Omni Hotels 2024 breach, which a batch-33
  audit found had been WRONGLY attributed to BianLian (no source
  links BianLian to Omni; every source names Daixin Team). Daixin
  is a DISTINCT financially-motivated group, NOT a BianLian alias.
  Placed `criminal/` — no state nexus is asserted anywhere. Events
  referencing this actor should carry the Omni attribution at
  moderate confidence / concur-with-caveat (leak-site self-claim +
  security journalism, no government/forensic attribution of the
  Omni incident specifically). Canonical group profile: CISA
  AA22-294A (MISP-galaxy uuid 5e32baed-f4b5-4149-8540-7515ad8c4dc0).
