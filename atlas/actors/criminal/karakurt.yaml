notes: |
  Former id ru/proxies/karakurt (asserted Karakurt operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/karakurt on 2026-06-24 (claude-opus-4.8/max audit): the actor's only cited
  source — the CISA/FBI/Treasury/FinCEN joint advisory AA22-152A, "Karakurt Data Extortion Group"
  (published 2022-06-01, last revised 2023-12-12) — is a purely criminal / cybercrime framing. It
  calls Karakurt "the Karakurt data extortion group, also known as the Karakurt Team and Karakurt
  Lair", describes its operators as obtaining access "Via cooperating partners in the cybercrime
  community" and "third-party intrusion broker networks", and frames the activity as data theft +
  extortion ("Karakurt actors have claimed to steal data and threatened to auction it off or release
  it to the public unless they receive payment of the demanded ransom"). The advisory names ZERO
  Russia / state / proxy / FSB / GRU / SVR / Kremlin / sanction nexus for Karakurt; the only
  "espionage" token is generic intrusion-broker boilerplate ("...such as those engaged in ransomware,
  business email compromise, corporate and government espionage, etc.") and is NOT a Karakurt
  attribution, and the only state-adjacent token is the State Dept Rewards-for-Justice footer
  boilerplate ("foreign government malicious activity against U.S. critical infrastructure"), also
  generic. The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the actor's
  sources/notes (SCHEMA "Actor placement rule"); none was present, so the state-tolerated-proxy claim
  was unsourced.
  WHAT THE NEXUS ACTUALLY RODE ON (not in any cited actor source): Karakurt's coupling to Conti /
  Wizard Spider — AdvIntel ("Enter Karakurt") and Chainalysis trace Karakurt as Conti's data-extortion
  side business that monetizes failed-encryption intrusions (Chainalysis observed Karakurt moving
  ~11.6 BTC into a Conti wallet; shared victim-payment-address infrastructure). That Conti relationship
  is well-attested in the SECONDARY literature (MISP galaxy "Karakurt", BleepingComputer, AdvIntel) but
  it is a CRIMINAL-ECOSYSTEM link, not by itself a state-proxy nexus — and the Russian-state element in
  that literature is only a generic safe-harbor observation ("a Russian government that refuses to take
  action against [Russian-speaking criminals]", analyst1/SOCRadar editorializing), plus a later US
  indictment of an alleged member (The Record) which is itself a law-enforcement / criminal framing,
  not state tasking. None of that appears in the actor's one cited source. Note that
  ru/sanctions-response-2022's criminal-proxy-mobilization roster names Conti/TrickBot/Wizard Spider,
  Killnet, NoName057(16), CARR — it does NOT name Karakurt.
  CLOSEST PARALLELS TO THIS FINDING (all 2026-06-24, same audit pass): Emotet/Ladybird and
  ru/unscoped/icedid — Conti-ecosystem financially-motivated crews whose only documented state nexus is
  INHERITED via Conti coupling, not documented for the crew itself. The human ultimately moved
  ru/unscoped/emotet -> criminal/emotet (judging the inherited Conti nexus insufficient to keep it in
  the RU bucket); the same call very likely extends to Karakurt.
  Demoted WITHIN the ru nation (mirroring ir/unscoped/agrius, ru/unscoped/emotet, ru/unscoped/icedid)
  rather than to criminal/ to avoid the parent agent's deeper taxonomy call. criminal/karakurt (no
  documented state nexus at all in the cited source) is FLAGGED for human review and is deliberately
  NOT made here. Keep ru/unscoped until a cited source names a Russian service, or re-home to
  criminal/karakurt if the human judges the inherited Conti/Wizard Spider nexus insufficient to keep
  Karakurt in the RU bucket.
  No FK propagation was needed: zero events reference this actor (grep 'actor_id: ru/proxies/karakurt'
  over atlas/events/ returned nothing; the only repo reference to the id was this actor file). The MISP
  linkage (galaxy "Karakurt") is retained.
