ttp_summary: |
  PROVISIONAL stub. Financially-motivated e-crime crew tracked by CrowdStrike (CrowdStrike "-SPIDER"
  designation = e-crime / financially-motivated, not state). Part of a "new wave" of data-theft-and-extortion
  actors closely aligned with Scattered Spider and other subsets of The Com (incl. SLSH and ShinyHunters).
  Uses voice-phishing (vishing), text and email lures to direct targeted employees to phishing pages spoofing
  their employer's legitimate SSO / identity provider, capturing credentials, session keys and tokens to break
  into identity and SaaS platforms; removes/establishes MFA devices and deletes alerting. TTPs reported as
  distinct from sibling Cordial Spider (hours of operation, phishing-domain providers, preferred OS, data-leak
  sites, MFA-registration tooling). Non-paying victims subjected to DDoS; Snarky Spider also uses more aggressive
  follow-on harassment incl. swatting of victim organizations' employees. Uses residential proxy networks
  (Mullvad, NetNut, 9Proxy, Infatica, NSOCKS) to evade IP-based detection. Active since at least October 2025.
