ttp_summary: |
  Financially-motivated data-theft-and-extortion e-crime crew tracked by
  CrowdStrike, part of a "new wave" / "new generation of Scattered Spider"
  closely aligned with Scattered Spider and other subsets of The Com
  (including SLSH and ShinyHunters), per CrowdStrike's Adam Meyers. Initial
  access mirrors the Scattered Spider playbook: voice-phishing (vishing)
  plus text-message and email lures direct targeted employees to phishing
  pages spoofing their employer's legitimate single sign-on portal /
  primary identity provider, capturing credentials, session keys and tokens
  to break into identity platforms and traverse SaaS environments; the crew
  removes or establishes MFA devices and deletes alerting to maintain
  access. Objective is rapid data theft for extortion. Reported as
  operationally distinct from sibling Cordial Spider on tradecraft details
  (hours of operation, phishing-domain providers, preferred OS, data-leak
  infrastructure, MFA-registration tooling). Coercion: non-paying victims
  subjected to DDoS, and Snarky Spider specifically escalates with more
  aggressive follow-on harassment, including SWATTING of victim
  organizations' employees. Uses residential proxy networks (Mullvad,
  NetNut, 9Proxy, Infatica, NSOCKS) to evade IP-based detection and blend
  with normal traffic. CrowdStrike assesses the crew has not (yet) matched
  Scattered Spider's technical sophistication despite sharing its
  commonalities and objectives. Primarily targets U.S.-based organizations
  across the academic, aviation, retail, hospitality, automotive,
  financial-services, legal and technology sectors. Active since at least
  October 2025.
