ttp_summary: |
  Russian-speaking financial-cybercrime cluster active since at
  least 2013. Original tradecraft: point-of-sale malware (Carbanak,
  Anunak, Pillowmint) targeting US restaurant / retail chains
  (Chipotle, Arby's, Sonic, Whole Foods, etc.). Front-company
  cover: "Combi Security" purported pentest firm recruited
  unwitting talent. Pivoted to ransomware-affiliate operations
  ~2020: linked to REvil affiliate deployments and to DarkSide
  / BlackMatter / ALPHV personnel overlap. DOJ unsealed major
  indictments of Ukrainian core members Hladyr (system administrator,
  convicted Aug 2018), Iarmak, and Kolpakov; Russian nationals
  named but uncharged. Microsoft 2023 disclosed FIN7's use of
  Google Ads to deliver MSIX-packaged malware (NetSupport RAT,
  Carbanak). Some 2024 reporting suggests partial dissolution as
  core personnel migrated to ALPHV / BlackMatter / RansomHub
  affiliate operations.
notes: |
  FIN7 is multi-jurisdictional: Ukrainian operators have been
  successfully extradited and convicted in US courts; Russian-
  located core remains at large. AUSPEX places under `criminal/`
  rather than `ru/proxies/` because the indicted operator base is
  Ukrainian / multi-state and no FSB-tolerance argument applies
  to the Ukrainian arrests; doctrinally the Russian-located core
  may align with the ru/proxies pattern but no state-nexus
  documentation exists.
