ttp_summary: |
  Profit-motivated ransomware + data-extortion crew active ~2019-2020.
  Widely credited with pioneering "double extortion" at scale — pairing
  file encryption with a public leak site (the "Maze News" naming-and-
  shaming portal) to coerce payment. Delivered via exploit kits, phishing,
  and RDP / exposed-service access; used Cobalt Strike for post-exploitation.
  Notable victims include Cognizant (Apr 2020), Canon, LG, Xerox, and the
  City of Pensacola. Announced cessation of operations in November 2020;
  operators are widely assessed to have migrated to the Egregor crew.
