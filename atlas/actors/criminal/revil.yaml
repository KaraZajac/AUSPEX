ttp_summary: |
  Ransomware-as-a-service successor to GandCrab. Affiliate model
  with ~30% operator / ~70% affiliate split. Big-game-hunting
  posture (JBS USD 11M, Kaseya MSP supply chain July 2021, Apple
  supplier Quanta Apr 2021). Double-extortion via the "Happy Blog"
  leak site. After Kaseya, US pressure via the June 2021 Biden /
  Putin Geneva summit produced the unprecedented Jan 14 2022 FSB
  raid in which 14 alleged members were arrested in St. Petersburg
  and Moscow — Russia's first publicly announced ransomware
  enforcement action against its own nationals. Affiliate Yaroslav
  Vasinskyi (Kaseya operator) was extradited from Poland to the US
  and convicted May 2024; Yevgeniy Polyanin was indicted in
  parallel.
notes: |
  REvil is the canonical "FSB-tolerated until US linkage costs
  exceeded tolerance" case. The Jan 2022 raid coincided with
  Russia–US pre-invasion diplomacy and was widely read as a
  bargaining gesture; arrests went quiet after the Feb 24 2022
  invasion. The case is the inflection point for the AUSPEX
  thesis that ransomware-criminal autonomy is conditional on
  Kremlin foreign-policy calculation, not on the absence of
  state knowledge of operations.

  AUDIT (2026-06-24, claude-opus-4.8/max): DEMOTED ru/proxies/revil -> ru/unscoped/revil. None of the
  three cited sources documents a Russian-state nexus (tasking / tolerance / harbor / handoff); all three
  are profit-criminal / law-enforcement framings, and the only Russia tokens are defendant nationality:
    - DOJ 2021-11-08 (Kaseya/Vasinskyi/Polyanin indictment): characterizes the group as a "ransomware
      group" of "foreign nationals" / "ransomware criminals"; DAG Monaco: "The Sodinokibi/REvil ransomware
      group attacks companies and critical infrastructures around the world". The SOLE "Russian" reference
      is "Yevgeniy Polyanin, 28, a Russian national" (a defendant's nationality). ZERO state/FSB/GRU/SVR/
      tolerance/safe-harbor/on-behalf-of-the-state language.
    - Treasury/OFAC 2021-11-08 (jy0471): "OFAC is designating Ukrainian Yaroslav Vasinskyi … and Russian
      Yevgeniy Polyanin … for their part in perpetuating Sodinokibi/REvil ransomware incidents against the
      United States." Pure sanctions of two individuals + the Chatex exchange; State Dept TOC reward offers.
      Again "Russian" = nationality only; no state-direction language.
    - FSB 2022-01-14 raid statement (RU primary, verbatim): the raid's basis was a US request —
      "Основанием для разыскных мероприятий послужило обращение компетентных органов США" ("the basis for
      the search measures was a request from the competent U.S. authorities"); REvil is framed solely as an
      "организованное преступное сообщество" (organized criminal group) charged under ч.2 ст.187 УК
      ("Неправомерный оборот средств платежей" / illegal circulation of means of payment — a FINANCIAL-crime
      article, not a state-security one), acting "С целью реализации преступного замысла" (to carry out a
      criminal scheme). This DOCUMENTS the FSB *prosecuting* REvil at US request — the END of any tolerance —
      NOT state tasking, direction, or harbor. (Per the audit rule: arrests are a law-enforcement action, not
      a state nexus.)
  MISP-galaxy corroboration: the cited canonical entry (GOLD SOUTHFIELD, UUID 262c8537-1cdb-4297-aa3e-
