ttp_summary: |
  Loose collective of credential-stealing and data-broker operators
  prominent on RaidForums (closed Apr 2022) and successor
  BreachForums (closed twice, 2023 / 2024). Initial access through
  exposed GitHub OAuth tokens, AWS keys, and breached developer
  credentials. Major data-broker activity 2020–2022: Tokopedia
  (91M records), Wishbone (40M), Microsoft GitHub (~500GB private
  repos claim, 2020), ParkMobile (21M, 2021), AT&T (73M records,
  originally 2021, re-released Mar 2024). 2024 Snowflake-customer
  activity: ShinyHunters branded leak-site posts for AT&T,
  Ticketmaster, Santander, etc. (UNC5537 cluster overlap — see
  `criminal/unc5537`). 2025 Salesforce-cloud campaign tracked by
  Google Threat Intelligence Group as UNC6040 (vishing chain) +
  UNC6240 (extortion): victims include Adidas, Allianz Life,
  Qantas, LVMH brands, Cisco, Pandora, Workday, Air France-KLM,
  and Google itself. French national Sebastien Raoult ("Sezyo")
  arrested in Morocco May 2022, extradited Jan 2023, sentenced
  to 36 months US prison Jan 2024.
notes: |
  ShinyHunters is a brand / forum-handle as much as a stable
  cluster — leak postings under the name overlap with UNC5537,
  IntelBroker, Scattered Spider, and other 2024-2025 data-broker
  actors. Cluster boundary is fuzzy by design; the 2025 campaign
  is best understood as a brand applied to financially-motivated
  extortion follow-ons across multiple intrusion clusters.
