ttp_summary: |
  Russian-speaking financial-cybercrime cluster that operated
  from 2016 against more than 250 banks across Eastern Europe,
  Russia, the CIS, Southeast Asia, and the Americas. Tradecraft:
  spear-phishing of bank employees, lateral movement to ATM
  control infrastructure, deployment of ATMSpitter / atmii to
  dispense cash on demand to mules ("ATM jackpotting"). Used
  Cobalt Strike penetration-testing tool extensively for
  command-and-control. Operationally overlapping with Carbanak
  / FIN7 — vendor opinion treats Cobalt Group as either a
  splinter from Carbanak's banking core or a separately-
  organized parallel operation that recruited former Carbanak
  personnel. Lead defendant "Denis K." arrested in Alicante,
  Spain in March 2018 on a Spanish warrant; subsequent
  convictions in Spain and Kazakhstan through 2019–2020.
notes: |
  AUSPEX places Cobalt Group under `criminal/` rather than
  `ru/proxies/` because the indicted operator base spans
  Spain-extraditable individuals and no state-tasking
  documentation exists. Operationally Cobalt Group, Carbanak,
  and FIN7 are best understood as a tightly-related Russian-
  speaking financial-cybercrime ecosystem rather than discrete
  organizations.
