ttp_summary: |
  Brazilian / UK teen-led criminal cluster. Tradecraft: SIM-swap,
  insider recruitment via Telegram (pay-for-credentials posts),
  social engineering of IT help desks and on-premises Active
  Directory administrators, abuse of Okta superuser accounts.
  Notable victims: NVIDIA (Feb 2022, source code), Samsung (Mar
  2022, Galaxy bootloader source), Vodafone Portugal (Feb 2022),
  Microsoft (Mar 2022, Bing / Cortana source), Okta (Mar 2022,
  via Sitel third-party support contractor), Uber (Sep 2022,
  Slack / GCP / vSphere access), Rockstar Games (Sep 2022, GTA VI
  development footage). Core operator "White" / Arion Kurtaj (UK,
  17) was convicted Aug 2023; the leader was a minor at time of
  offenses and is detained indefinitely under UK secure-hospital
  order. Brazilian arrests Oct 2022. Operationally dispersed post-
  conviction but cluster identity persists on Telegram.
notes: |
  Lapsus$ is the canonical youth-led, performative-leak crew. The
  Cyber Safety Review Board (CSRB) August 2023 report "Review of
  the Attacks Associated with Lapsus$ and Related Threat Groups"
  is the authoritative US-government-commissioned analysis.
