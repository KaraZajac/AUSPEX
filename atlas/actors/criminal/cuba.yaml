ttp_summary: |
  Ransomware operation active since at least December 2019;
  unrelated to the Republic of Cuba despite branding (uses Cuban
  Revolution iconography on its leak site). CISA / FBI joint
  advisory AA22-335A (Dec 2022) documents Cuba ransomware against
  US critical infrastructure (financial-services, healthcare,
  IT, manufacturing) and ~USD 60M cumulative ransom received.
  Initial access via Microsoft Exchange ProxyShell, valid-
  credentials, and compromised RDP. Toolset overlap with Hancitor
  loader and the RomCom RAT. Operator-language profile is
  Russian-speaking but no public state-nexus attribution. Notable
  victims: Montenegro government (Aug 2022 — initially blamed
  on Cuba ransomware in some early reporting, later attributed
  by multiple analysts to a Russian state-aligned operator;
  see Montenegro 2022 events for the disputed attribution).
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/`
  despite Russian-language operator profile because the public
  attribution baseline is purely financial-cybercrime. The
  Montenegro 2022 case is the closest the Cuba brand has come to
  state-nexus framing and that attribution itself is contested.
