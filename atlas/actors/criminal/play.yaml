ttp_summary: |
  Russian-speaking ransomware operation emerging mid-2022; closed
  affiliate program (vs. open RaaS). Tradecraft: FortiOS n-days
  (CVE-2018-13379, CVE-2020-12812), Microsoft Exchange ProxyNotShell
  (CVE-2022-41040 / 41082), and ConnectWise ScreenConnect chain
  (CVE-2024-1709). Notable victims: City of Oakland CA (Feb 2023),
  Rackspace Exchange hosted-service (Dec 2022, attributed via
  ProxyNotShell exploitation), Arnold Clark UK (Dec 2022), Krispy
  Kreme (Nov 2024). CISA AA23-352A joint advisory Dec 2023 estimated
  300+ victims since June 2022.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization: no cited source documents a Russia-state nexus, and its roster (Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR) never named Play
notes: |
  Former id ru/proxies/play (asserted Play/Playcrypt operates as a Russian state-tolerated PROXY,
  financially motivated with a documented state nexus — safe-harbor / tasking-overlap / formal
  state-alignment). Demoted to ru/unscoped/play on 2026-06-24 (claude-opus-4.8/max audit): the actor's
  SOLE cited source — the joint CISA/FBI/Australian ASD ACSC advisory AA23-352A "#StopRansomware: Play
  Ransomware" (2023-12-18) — documents ONLY a criminal ransomware operation and ZERO Russia/state/proxy
  nexus. Across the full advisory body there is no russian/moscow/kremlin/fsb/gru/svr/state-sponsor/
  state-aligned/nation-state/tasking/tolerate/safe-harbor/sanction token applied to Play (the single
  "Russia" string on the page is an unrelated sidebar advisory item, "Pro-Russia Hacktivists Conduct
  Opportunistic Attacks…"; the single "proxy" string is the CVE name "ProxyNotShell"). The advisory frames
  Play purely as cybercrime — "Play ransomware actors employ a double extortion model, encrypting systems
  after exfiltrating data", operating a "data leak website", with ransom-payment boilerplate about how
  payment may "encourage other criminal actors to engage in the distribution of ransomware." Critically the
  advisory makes NO nationality attribution at all — it does not even call the group "Russian-speaking", so
  the cited source supports neither the proxy claim NOR a Russia attribution. The ru/proxies/ namespace
  requires a SOURCE-DOCUMENTED state nexus in the actor's sources/notes (SCHEMA "Actor placement rule");
  none was present, so the state-tolerated-proxy claim was unsourced.
  WHAT THE NEXUS RODE ON (not in any cited actor source): the "Russian-speaking" / Conti-infrastructure-
  overlap framing that circulates in vendor reporting on Play. That lineage signal is not in this record's
  cited source, and even where asserted it is a criminal-lineage hint, not a documented state relationship
  for the Play (Playcrypt / Balloonfly) crew itself. ru/sanctions-response-2022's criminal-proxy-
  mobilization roster names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — it does NOT name
  Play. The referencing event already concedes the predicate gap: its own contested/plausible doctrine link
  carries a counter_explanation noting "the 'Russia-nexus' / tolerated-proxy framing presupposes a Russia
  attribution the advisory does not make."
  MISP corroboration: NONE — the actor carries misp_galaxy: null and no Play/Playcrypt/Balloonfly MISP
  cluster exists in the corpus, so there is no independent MISP state-attribution to weigh.
  FLAGGED FOR HUMAN REVIEW (the Emotet precedent, NOT made here): no cited source documents a Russian-state
  relationship for the Play crew itself — and the cited source documents no nationality at all — so Play is
  a candidate for the stateless criminal/play namespace. Demoted only WITHIN the ru nation (mirroring
  ir/unscoped/agrius and the ru/unscoped/akira and ru/unscoped/emotet steps) to leave that deeper taxonomy
  call to the human; re-home to criminal/play if the human judges the (uncited) Conti-overlap lineage
  insufficient to keep Play in the RU bucket, or keep ru/unscoped until a cited source names a Russian
  service. primary_service_id set to the ru/unscoped placeholder; the ru/ doctrine alignment dropped.
  FK-propagated id change to the 1 referencing event on 2026-06-24
  (2025-06/fbicisaasd-stopransomware-play-playcrypt-advisory-900-affected-entitie).
