ttp_summary: |
  Ransomware-as-a-service emerging Feb 2024 immediately following
  the ALPHV exit scam. Absorbed displaced ALPHV affiliates including
  Scattered Spider. Aggressive affiliate-favorable economics (90%
  affiliate share). Notable victims: Change Healthcare / Optum
  (Feb 2024, re-posted via RansomHub after ALPHV exit-scammed the
  affiliate), Christie's auction house (May 2024), Frontier
  Communications (April 2024), Halliburton (Aug 2024), Kawasaki
  (Sept 2024). Code-base overlap with Knight ransomware (formerly
  Cyclops). CISA AA24-242A (Aug 2024) joint advisory. Multi-
  jurisdictional affiliate base; AUSPEX places under `criminal/`
  rather than `ru/proxies/` because operator-vs-affiliate national
  composition is mixed and no specific state-nexus is publicly
  attributed.
