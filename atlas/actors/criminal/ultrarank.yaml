ttp_summary: |
  Russian-speaking JS-skimming cluster active since 2015,
  consolidated under the UltraRank name by Group-IB
  (Nov 2020). Approximately 700 compromised e-commerce sites
  across the operating period including the Volusion
  platform-wide attack (Oct 2019) affecting an estimated
  6,500+ merchants. Monetization via the ValidCC carding
  marketplace as the principal first-buyer for harvested
  card data. Infrastructure consistency across the 2015–2020
  period: Cyrillic-language operator-control panels,
  consistent C2-host registrar fingerprints, and shared
  obfuscation patterns across the skimmer JS payloads.
notes: |
  UltraRank has no publicly-attributed state nexus. AUSPEX
  records under `criminal/`.
