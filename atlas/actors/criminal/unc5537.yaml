ttp_summary: |
  Cluster responsible for mass-exploitation of Snowflake customer
  tenants from approximately April 2024 onward. Initial access via
  infostealer-harvested credentials (RedLine, LummaC2, Raccoon
  Stealer logs purchased on criminal markets) for Snowflake
  customer-tenant accounts lacking MFA. ~165 Snowflake customers
  affected including AT&T (~110M call-detail records, ransom paid
  USD ~370K), Ticketmaster / Live Nation (~560M records), Santander,
  Advance Auto Parts, Pure Storage, Neiman Marcus. Sold and re-sold
  via BreachForums / ShinyHunters / IntelBroker branded posts —
  operator-vs-reseller boundary deliberately blurred. Connor Moucka
  (Canadian national, online handle "Judische" / "Waifu") arrested
  in Canada Oct 30 2024 on a US warrant; faces 20-count US
  indictment unsealed Nov 4 2024. Co-conspirator John Erin Binns
  (US national) previously detained in Turkey.
notes: |
  UNC5537 / Snowflake is the canonical "infostealer logs →
  enterprise SaaS-tenant access at scale" case. The cluster
  overlaps with Scattered Spider operationally (some shared
  Telegram-cluster contacts) and with ShinyHunters / IntelBroker
  for resale. AUSPEX treats as distinct from each.
