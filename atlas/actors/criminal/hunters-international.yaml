ttp_summary: |
  Ransomware-as-a-service emerging October 2023 with significant
  Rust-based encryptor code overlap with the disrupted Hive
  operation. Active October 2023 through Q1 2025 with ~300+
  victims posted to its leak site, including AutoNation (Jan
  2024), Hoya Corporation (Mar 2024), Integris Health (Dec 2023
  re-extortion), Tata Technologies (Jan 2025), and US Marshals
  Service contractor data (mid-2024). Multi-jurisdictional
  affiliate pool. Operators announced shift to data-extortion-
  only branding under "World Leaks" in early 2025, citing
  declining ransom-payment rates.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/` despite
  the Hive code lineage because operator continuity is contested
  and no public attribution has placed Hunters International under
  Russian state tolerance. The Hive predecessor is separately
  tracked at `criminal/hive`.
