ttp_summary: |
  Affiliate ransomware-as-a-service (RaaS) active since ~2019,
  administered by Evgenii Ptitsyn (extradited from South Korea to the
  US Nov 2024; 13-count D.Md. indictment). Phobos affiliates breach
  SMBs, hospitals, schools and local government primarily via exposed
  RDP and phishing, then deploy the Phobos encryptor (Crysis-derived;
  Eking/Elbie/Devos/Faust extensions). US DOJ: 1,000+ victims,
  >USD 16M in ransoms. The 8Base group (criminal/8base) is a
  high-profile Phobos affiliate that ran a data-leak-extortion site.
notes: |
  Created 2026-07-05 (Kara-approved). Prior to this the corpus
  represented the Phobos lineage only via its affiliate criminal/8base
  (see 2025-02/operation-phobos-aetor-8base) and the Ptitsyn
  extradition event (2024-11/ptitsyn-phobos-extradition, which names
  Phobos as the administered RaaS). Placed criminal/ — no state nexus.
  criminal/8base is a documented affiliate of this RaaS.
