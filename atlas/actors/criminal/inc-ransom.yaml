ttp_summary: |
  Ransomware / data-extortion group emerging July 2023 with a
  custom encryptor and aggressive multi-sector victim distribution.
  Major victims: Yamaha Motor Philippines (Nov 2023), Xerox Business
  Solutions (Dec 2023), NHS Dumfries and Galloway (Mar 2024,
  ~3TB patient data leaked), Ascension Health Indianapolis facility
  (separately from May 2024 Black Basta event). Initial access
  typically via Citrix NetScaler (CVE-2023-3519, CVE-2023-4966),
  phishing, and valid-credential abuse. Source code reportedly
  sold for USD 300K on Exploit forum May 2024; the related Lynx
  cluster emerged shortly after.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/` despite
  Russian-language forum presence because no public state-nexus
  attribution has been made and affiliate composition is mixed.
