ttp_summary: |
  Financial-cybercrime cluster active since at least 2016. Original
  tradecraft: point-of-sale memory-scraping malware (PUNCHTRACK,
  BADHATCH, FlawedAmmyy variants) against US hospitality and retail
  chains. Pivoted to ransomware-affiliate operations 2021+ deploying
  Ragnar Locker (Jul 2021) and later White Rabbit (Dec 2021) and
  ALPHV (mid-2023). Distinguished by long dormancy windows between
  campaigns and continuous toolset development (Sardonic backdoor,
  BADHATCH, ShellTea). Bitdefender Jul 2023 reporting confirmed
  FIN8 deployment of BlackCat / ALPHV via the Sardonic loader.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/` because
  FIN8 has been treated as a financially-motivated cluster across
  vendor reporting since 2016 with no state-nexus thread; the
  ALPHV affiliate relationship is operational rather than
  doctrinal.
