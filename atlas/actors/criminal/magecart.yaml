ttp_summary: |
  Umbrella term coined by RiskIQ for multiple operator clusters
  injecting payment-card skimming JavaScript into e-commerce
  checkout pages. Major historical incidents: British Airways
  (Aug 2018, ~380K cards, GBP 20M ICO fine), Newegg (Sep 2018),
  Ticketmaster UK (Jun 2018 via Inbenta third-party chat widget),
  Macy's (Oct 2019). Operator clusters span Russian-speaking
  (Groups 1–3, 5), Indonesian / Vietnamese (Groups 7–9), and
  Western (Group 4, 12) operators. Continuous activity through
  2024-25 with shift toward client-side WebSocket exfiltration
  to evade Content-Security-Policy controls.
notes: |
  AUSPEX places under `criminal/` rather than any nation-state
  bucket because the Magecart umbrella spans multiple
  jurisdictions and no specific Magecart cluster has been
  publicly tied to a state service. Some specific groups
  (Group 5) have been attributed to Indonesia-based operators
  by Group-IB but without state nexus.
