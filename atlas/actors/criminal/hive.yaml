ttp_summary: |
  Ransomware-as-a-service. Notable victims: Costa Rica CCSS public
  healthcare (May 2022, secondary state-disruption follow-on to
  Conti's April 2022 attack), Memorial Health System (Aug 2021),
  Indonesia central bank (Dec 2021). FBI conducted a covert intrusion
  of Hive infrastructure from July 2022 onward, distributing
  decryption keys to >300 active victims before the public seizure
  announcement Jan 26 2023 (DOJ + Europol joint operation, German
  / Dutch police participation). Approximately USD 130M ransom
  payments prevented per DOJ.
