ttp_summary: |
  Originally a 2014 banking trojan; evolved into the dominant
  malware loader of 2018–2020. Delivery vehicle for Trickbot,
  Qakbot, IcedID, and ransomware (Ryuk, Conti). Distribution via
  malspam with weaponized Office documents. Operation Ladybird
  (Jan 27 2021, Europol + Eurojust + Dutch + US + German + UK +
  French + Lithuanian + Canadian + Ukrainian partners) seized
  the botnet's three-tier C2 infrastructure and pushed a self-
  uninstall payload (timed for Apr 25 2021). Emotet re-emerged
  November 2021 via Trickbot infections rebuilding the botnet.
  Subsequent activity through 2023 was sporadic; effectively
  dormant since mid-2023.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022 (its roster never named Emotet); now stateless criminal/
notes: |
  Former id ru/proxies/emotet (asserted Emotet operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/emotet on 2026-06-24 (claude-opus-4.8/max audit): the actor's only cited
  source — Europol's Operation Ladybird takedown announcement (2021-01-27) — is a purely criminal /
  law-enforcement framing. Its body calls Emotet "one of the most professional and long lasting
  cybercrime services", a "'loader' operation" whose access "were sold to other top-level criminal
  groups", and names ZERO Russia/state/proxy/FSB/GRU nexus (the only "Russian" token on the page is a
  UI language-selector item). The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the
  actor's sources/notes (SCHEMA "Actor placement rule"); none was present, so the state-tolerated-proxy
  claim was unsourced.
  WHAT THE NEXUS ACTUALLY RODE ON (not in any cited actor source): Emotet's coupling to TrickBot/Conti/
  Wizard Spider (FSB Center 18 liaison per ContiLeaks 2022; Treasury 2023 TrickBot-Conti sanctions). That
  is an INHERITED/derived nexus for Emotet's downstream payloads, not a documented state relationship for
  the Emotet (TA542 / Mealybug) crew itself. Note that ru/sanctions-response-2022's criminal-proxy-
  mobilization roster names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — it does NOT name
  Emotet. The referencing event sources (CISA AA20-280A 2020; BleepingComputer 2021-11) likewise assert
  no Russia/state tie (per their own per-event audits).
  Demoted WITHIN the ru nation (mirroring ir/unscoped/agrius) rather than to criminal/ to avoid the parent
  agent's deeper taxonomy call: whether Emotet should be the stateless criminal/emotet (no documented state
  nexus at all in the cited sources) is FLAGGED for human review and deliberately NOT made here. Keep
  ru/unscoped until a cited source names a Russian service — or re-home to criminal/emotet if the human
  judges the inherited TrickBot/Conti nexus insufficient to keep Emotet in the RU bucket.
  FK-propagated id change to the referencing events on 2026-06-24 (2 active references; the 2021-01
  Ladybird event already carried actor_id: null as a counter-op).
  UPDATE 2026-06-24 (Kara's decision): moved ru/unscoped/emotet -> criminal/emotet. The human judged the
  inherited TrickBot/Conti nexus insufficient to keep Emotet in the RU bucket; no cited source documents a
  Russian-state relationship for the Emotet (TA542) crew itself, so it is now a stateless criminal actor.
  primary_service_id set null + the ru/ doctrine alignment dropped; the MISP linkage (MUMMY SPIDER) is retained.
