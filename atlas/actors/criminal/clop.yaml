ttp_summary: |
  Russian-speaking criminal cluster operating Cl0p ransomware
  as the dominant brand since 2020. TA505 historical activity
  includes Dridex, Locky, FlawedAmmyy. Cl0p's signature is
  managed-file-transfer (MFT) zero-day mass-exploitation: Accellion
  FTA (Dec 2020), GoAnywhere MFT (Jan 2023, CVE-2023-0669), MOVEit
  Transfer (May 2023, CVE-2023-34362, ~2,700 organizations affected),
  Cleo Harmony / VLTrader / LexiCom (Dec 2024, CVE-2024-50623 +
  CVE-2024-55956). Departure from intrusion-by-intrusion affiliate
  ransomware to en-masse data-theft extortion (no encryption in
  many MOVEit cases). Ukrainian operator arrests June 2021 produced
  limited disruption — Russia-based core continued. State Dept
  TOCRP USD 10M reward issued June 16 2023 for MOVEit operators.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization: no cited source documents a Russia-state nexus, and its roster (Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR) never named Cl0p/TA505/FIN11
notes: |
  Former id ru/proxies/clop (asserted Cl0p operates as a Russian state-tolerated PROXY — financially
  motivated with a documented state nexus: safe-harbor / tasking-overlap / formal state-alignment).
  Demoted to ru/unscoped/clop on 2026-06-24 (claude-opus-4.8/max audit): NEITHER of the actor's two cited
  sources documents any Russia/state/proxy nexus for Cl0p.
  (1) CISA/FBI joint advisory AA23-158A "#StopRansomware: CL0P Ransomware Gang Exploits CVE-2023-34362
  MOVEit Vulnerability" (2023-06-07) frames Cl0p purely as a criminal "CL0P Ransomware Gang, also known as
  TA505" releasing "IOCs and TTPs identified through FBI investigations" — it contains ZERO
  russia/russian/kremlin/fsb/gru/svr/state-sponsor/state-tolerate/nation-state/safe-harbor/sanction token
  applied to Cl0p (the only "foreign" string is incident-reporting guidance about "foreign IP addresses").
  It does not even call the crew Russian-speaking.
  (2) State Dept Rewards for Justice page "Foreign Malicious Cyber Activity Against U.S. Critical
  Infrastructure" (2023-06-16) is, as captured, the GENERIC critical-infrastructure cyber bounty landing
  page: it never mentions Cl0p / TA505 / MOVEit by name (0 hits) and offers up to USD 10M for info on "any
  person who, while acting at the direction or under the control of a foreign government, participates in
  malicious cyber activities against U.S. critical infrastructure." That clause is a CONDITIONAL bounty
  hypothesis the US offered to TRY to establish a state link — not a finding that Cl0p is state-directed;
  the source YAML's own note concedes "Exact landing URL may differ; the RfJ page consolidates multiple
  actor bounties." (The lone "Russian" token on the page is the UI language selector "Русский".)
  The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the actor's sources/notes (SCHEMA
  "Actor placement rule"); none was present, so the state-tolerated-proxy claim was unsourced. Cl0p / TA505
  / FIN11 is a profit-criminal, Russian-speaking, CIS-avoidant mass-MFT-exploitation crew (Accellion FTA,
  GoAnywhere, MOVEit, Cleo) — financial motivation alone is NOT a state nexus.
  MISP corroboration: the MISP-galaxy threat-actor entry for TA505 (03c80674-…, the actor's own
  misp_galaxy id) carries country: RU but has NO cfr-suspected-state-sponsor field — unlike genuine RU
  state actors APT28/Sandworm, which MISP tags cfr-suspected-state-sponsor: "Russian Federation". MISP's
  RU here denotes country-of-ORIGIN of a cybercrime crew ("TA505 … in the cybercrime business … behind the
  infamous Dridex banking trojan and Locky ransomware"), not state sponsorship.
  ru/sanctions-response-2022's criminal-proxy-mobilization roster (Conti/TrickBot/Wizard Spider, Killnet,
  NoName057(16), CARR) does NOT name Cl0p/TA505/FIN11, so that default_doctrine_alignment was likewise
  unsourced for this actor and has been dropped.
  FLAGGED FOR HUMAN REVIEW (the Emotet precedent, NOT made here): no cited source documents a Russian-state
  relationship for the Cl0p crew itself, so Cl0p is a candidate for the stateless criminal/clop namespace.
  Demoted only WITHIN the ru nation (mirroring ru/unscoped/akira, ru/unscoped/emotet, and ir/unscoped/agrius)
  to leave that deeper taxonomy call to the human; re-home to criminal/clop if the human judges there is no
  Russia bucket warrant, or keep ru/unscoped until a cited source names a Russian service / documents
  state tasking or tolerance. primary_service_id set to the ru/unscoped placeholder; the ru/ doctrine
  alignment dropped; the MISP linkage (TA505) is retained.
  FK-propagated id change to the 4 referencing events on 2026-06-24 (2023-05/cl0p-goanywhere,
  2023-05/moveit-cl0p, 2024-12/cl0p-cleo, 2025-09/cl0p-mass-extortion-via-oracle-e-business-suite-zero-day-cve-2025-6188).
