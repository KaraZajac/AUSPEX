ttp_summary: |
  Low-volume, high-value "big-game hunting" ransomware/data-extortion
  group active since ~2022, known for a small number of extremely
  large ransoms rather than mass victim distribution. Zscaler
  ThreatLabz reported (2024-07) that a Fortune-50 company paid Dark
  Angels a record USD 75 million ransom in early 2024 — the largest
  publicly known ransom payment at the time; Bloomberg and multiple
  outlets identified the payer as pharmaceutical distributor Cencora
  (formerly AmerisourceBergen). The group has used Windows and
  Linux/ESXi encryders (Babuk- and RagnarLocker-derived tooling in
  some reporting) but its signature is data theft plus quiet,
  direct, very large extortion demands with minimal public leak-site
  activity.
notes: |
  Created 2026-07-04 (Kara-approved) to model the press-level
  attribution of the Cencora 2024 breach (2024-02/cencora-data-theft).
  Placed `criminal/` — no state nexus is asserted anywhere. NB the
  Cencora attribution is journalism/vendor-level only (Bloomberg via
  The Block + Zscaler via Krebs); Cencora itself never named an actor,
  so events referencing this actor should carry the attribution at
  moderate confidence / concur-with-caveat. Structura/other aliases
  not modeled.
