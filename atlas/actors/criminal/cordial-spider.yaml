ttp_summary: |
  Financially-motivated data-theft-and-extortion e-crime crew affiliated
  with "The Com" (the English-language Comm cybercrime community) and
  closely aligned with Scattered Spider — CrowdStrike frames it (with
  sibling Snarky Spider) as a "new wave"/"new generation" of e-crime
  actors running the Scattered Spider playbook with lower technical
  sophistication. Tradecraft: voice-phishing (vishing) plus text and
  email lures directing targeted employees to phishing pages spoofing
  their employer's legitimate single sign-on (SSO) / primary identity
  provider, capturing credentials, session keys and tokens; uses that
  foothold for broad lateral movement across the victim's entire SaaS
  ecosystem (Okta account access; PowerShell exfil from SharePoint /
  OneDrive per Mandiant/UNC6671). Monetization is data-theft-for-extortion
  (Unit 42: typically seven-figure demands); non-paying victims are hit
  with DDoS attacks. Operates the BlackFile data-leak site (offline as of
  the 2026-04 reporting). Uses residential-proxy networks (Mullvad, NetNut,
  9Proxy, Infatica, NSOCKS) to evade IP-based detection. Primarily targets
  U.S.-based organizations across academic, aviation, retail, hospitality,
  automotive, financial-services, legal and technology sectors.
notes: |
  De-provisionalized 2026-06-25 (LLM audit, claude-opus-4.8/max) from the
  2026-05-30 backfill stub: populated aliases (CL-CRI-1116, UNC6671), a
  real ttp_summary, target sectors, active_since, and the MISP external_ref,
  grounded in the cited CyberScoop/CrowdStrike source (Matt Kapko, 2026-04-30,
  reporting a CrowdStrike Counter Adversary Operations report shared exclusively
  pre-release; raw snapshot captured + sha256) and corroborated by the MISP
  galaxy threat-actor.json UNC6671 cluster (origin Mandiant).
  THE COM / SCATTERED SPIDER LINEAGE: Cordial Spider is part of "The Com" —
  the loose English-language Comm cybercrime community — and CrowdStrike
  describes it and Snarky Spider as a new wave of e-crime crews "closely
  aligned with Scattered Spider and linked to other subsets of The Com,
  including SLSH and ShinyHunters." The wider Com ecosystem this crew sits in
  is documented on the sibling criminal/ actor records criminal/scattered-spider
  (the canonical Anglophone collective whose playbook Cordial Spider mirrors),
  criminal/shinyhunters (the SaaS-data-theft Com subset Mandiant ties to the
  same UNC6671 activity), and criminal/lapsus (the earlier youth-led Com-adjacent
  extortion crew) — named here as prose lineage only, not as foreign keys.
  PLACEMENT: stateless e-crime, kept in criminal/ with primary_service_id: null
  and default_doctrine_alignment_ids: [] — no state nexus in the source, and the
  MISP UNC6671 cluster carries no country / cfr-suspected-state-sponsor field.
  Sibling crew criminal/snarky-spider remains a PROVISIONAL stub.
