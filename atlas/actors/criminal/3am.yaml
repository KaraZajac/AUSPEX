ttp_summary: |
  Rust-based ransomware operation emerging September 2023, first
  publicly documented by Symantec following a LockBit affiliate's
  use of 3AM as a fallback payload when the primary LockBit
  encryptor was blocked on a target network. Initial access
  typically via phishing, Cobalt Strike beacons, gpresult /
  whoami / quser reconnaissance, and PsExec lateral movement.
  Smaller leak-site footprint than Akira / RansomHub but persistent
  operator presence through 2024-25. Cluster boundary fuzzy with
  Conti-lineage tooling; no public state-nexus attribution.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/` because
  no specific FSB-tolerance attribution has been published. 3AM's
  documented use as a LockBit affiliate fallback creates an
  operational link to the Russian-tolerated ecosystem but is not
  sufficient evidence on its own.
