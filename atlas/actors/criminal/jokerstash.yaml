# Created 2026-07-01 (census follow-up, claude-opus-4.8/max) for the 2021-01/jokers-stash-voluntary-
# shutdown event, which had actor_id null (attribution_level named-actor set in anticipation). Joker's
# Stash was a stateless profit-motivated criminal carding marketplace/persona → criminal/ namespace
# (primary_service_id null), same convention as criminal/maze. No MISP threat-actor entry (it is a
# marketplace, not a tracked intrusion cluster).
id: criminal/jokerstash
primary_service_id: null
additional_service_ids: []
canonical_name: Joker's Stash
aliases:
  - alias: JokerStash
    assigning_org: operator persona
    confidence: equivalent
  - alias: Joker's Stash
    assigning_org: vendor consensus
    confidence: equivalent
active_since: 2014-10-01  # marketplace launched ~October 2014 (per Krebs)
active_until: 2021-02-15  # announced voluntary shutdown, effective ~15 Feb 2021
status: disbanded
mission:
  - financial
target_sector_ids:
  - finance/banking
  - retail
ttp_summary: |
  Long-running (2014-2021) stolen-payment-card marketplace, by some
  accounts the largest of its era, operated under the "JokerStash"
  persona. Traded card-not-present and card-present (dumps) data,
  including large branded breaches. Announced a voluntary shutdown in
  January 2021 (effective ~15 Feb 2021), after a reported operator
  illness and law-enforcement (US DOJ + Interpol) seizures of some
  blockchain-DNS mirror domains in December 2020. The operator's true
  motive for retiring was never established.
default_doctrine_alignment_ids: []
notes: |
  Stub created 2026-07-01 during the event-audit census to restore FK
  integrity when the jokers-stash-voluntary-shutdown event was given a
  named-actor attribution. Anchor source is the Krebs 2021-01-15
  shutdown report. No state nexus → criminal/ (stateless),
  primary_service_id null.
sources:
