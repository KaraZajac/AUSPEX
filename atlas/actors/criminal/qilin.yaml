ttp_summary: |
  Ransomware-as-a-service originally written in Go (the "Agenda"
  variant, Trend Micro Aug 2022) then ported to Rust early 2023.
  Affiliate-favorable economics (80/20 split). Notable victims:
  Synnovis (London NHS pathology provider, Jun 2024, multi-week
  outage forcing cancellation of ~10,000 outpatient appointments
  and ~1,700 elective procedures across Guy's and St Thomas' /
  King's College hospitals), Yangfeng (auto-parts, Nov 2023),
  Court Services Victoria (Australia, Dec 2023), Big Issue (UK,
  Apr 2024), Lee Enterprises (US newspaper publisher, Feb 2025).
  Affiliate base recruited via Russian-language forums but
  multi-jurisdiction; no public state-nexus attribution.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/` because
  no specific FSB-tolerance attribution has been published for Qilin.
  [2026-07-05: removed a fabricated rationale claiming "victim selection
  includes Russian-language press (Lee Enterprises subsidiaries cover
  Eastern Europe)" — Lee Enterprises is a US local-newspaper chain with
  no Eastern-European subsidiaries, and no source ties Qilin's victim
  selection to Russian-language media.] The affiliate operator-language
  profile (Russian-language forum recruitment) is suggestive but not
  evidentiary.
