ttp_summary: |
  Post-Conti reconstitution cluster (with Black Basta, Karakurt,
  BlackByte). Royal operators previously linked to Conti Team 1.
  Notable victims: Dallas city government (May 2023), CDK Global
  (June 2024, US auto-dealer SaaS supply-chain incident, ~15,000
  dealerships down for two weeks), Kadokawa / Niconico (June 2024).
  Initial access through callback-phishing ("BazarCall" pattern),
  Cobalt Strike, abuse of remote-monitoring tools. CISA AA23-061A
  + AA23-243A advisory pair. Rebrand to BlackSuit ~mid-2023.
notes: |
  Royal / BlackSuit is the most operationally aggressive of the
  post-Conti splinters in 2023–24. Conti lineage is documented on
  `ru/proxies/conti`.

  AUDIT (2026-06-24, claude-opus-4.8/max): DEMOTED ru/proxies/royal -> ru/unscoped/royal.
  The actor's only cited sources are the joint CISA/FBI Royal/BlackSuit advisory pair
  (AA23-061A + AA23-243A). The cited AA23-061A page (captured; sha256 in source record) is the
  canonical Royal/BlackSuit advisory — now retitled "#StopRansomware: Blacksuit (Royal) Ransomware"
  — confirming the prior slug flag (AA23-061A IS the Royal advisory, not a mismatched doc). Across
  ~50KB of readable advisory text it documents a purely profit-driven ransomware-as-a-service
  operation: "BlackSuit conducts data exfiltration and extortion prior to encryption and then
  publishes victim data to a leak site if a ransom is not paid"; "BlackSuit ransomware is the
  evolution of the ransomware previously identified as Royal ransomware". It names ZERO Russian-
  state nexus — grep over the full text returns 0 hits for russia/moscow/kremlin/fsb/gru/svr/
  state-sponsor/nation-state/harbor/tolerat/tasked/on-behalf. The ru/proxies/ namespace requires a
  SOURCE-DOCUMENTED state nexus in the actor's own cited sources/notes (SCHEMA "Actor placement
  rule"); none is present, so the criminal-proxy-mobilization placement was unsourced.
  WHAT THE NEXUS RODE ON (not in any cited actor source): generic Conti-lineage framing — Royal
  operators previously linked to Conti Team 1 / Wizard Spider, whose FSB Center 18 liaison is the
  ContiLeaks-documented tie. That is an INHERITED/lineage nexus for the parent (ru/proxies/conti),
  not a documented state relationship for the Royal/BlackSuit (DEV-0569 / Storm-0569) crew itself,
  and ru/sanctions-response-2022's criminal-proxy roster never names Royal/BlackSuit.
  MISP CORROBORATION: the external_refs uuid (e883458d-…) maps to MISP-galaxy DEV-0569 (synonym
  Storm-0569), which records country: None and cfr-suspected-state-sponsor: None — a stateless,
  financially-motivated cluster. (The only state-sponsored "Royal" in MISP is "Royal APT", an
  unrelated synonym of APT15/China.)
  FLAGGED for human review: profit-criminal -> criminal/ candidate (per emotet). Demoted WITHIN the
  ru nation to ru/unscoped (mirroring siblings ru/unscoped/black-basta, /akira, /play, /medusa,
  /rhysida) rather than to stateless criminal/, deferring the deeper taxonomy call to the human:
  whether Royal/BlackSuit should be criminal/royal (no documented state nexus at all in the cited
  sources) or whether the inherited Conti lineage justifies keeping it in the RU bucket.
  primary_service_id set to the ru/unscoped placeholder; the ru/ doctrine alignment dropped; the
  MISP linkage (DEV-0569) retained. FK-propagated the id change to the 1 referencing event
  (2024-06/cdk-global-blacksuit).
