ttp_summary: |
  Ransomware operation emerging mid-2021 with C# / Go encryptor
  variants. Significant code-overlap with Conti ecosystem per
  multiple vendor analyses. FBI / Secret Service joint advisory
  CU-000159-MW (Feb 2022) following ransomware activity against
  US critical infrastructure including disclosed San Francisco
  49ers (Feb 2022) and other Super-Bowl-eve targeting. Uses
  ProxyShell, Microsoft Exchange (CVE-2021-34473/34523/31207),
  and valid-credential abuse for initial access. Living-off-the-
  land via Cobalt Strike, AnyDesk, and PowerShell. Has been a
  Scattered Spider affiliate payload option in 2024 cases.
notes: |
  AUSPEX places under `criminal/` rather than `ru/proxies/`
  despite Conti code overlap because no public state-nexus
  attribution has been made and operator continuity beyond the
  Conti-era code reuse is not established. The decision is
  reversible if specific FSB-tolerance reporting emerges.
