ttp_summary: |
  Ransomware / data-extortion group emerging mid-2022. Originally
  ran a Go-language encryptor but pivoted to exfiltration-only
  extortion in January 2023 after Avast released a free decryptor.
  Initial access typically via valid RDP credentials purchased from
  initial-access brokers, exploitation of public-facing applications
  (ProxyShell, SonicWall, etc.), and phishing. Post-compromise
  tradecraft uses living-off-the-land tooling, custom Go backdoors,
  Ngrok / Rsocks tunneling, and Impacket for lateral movement.
  Multi-jurisdiction operator base; primarily Russian-language but
  no specific FSB-tolerance attribution has been published. CISA
  AA23-136a (May 2023) and AA24-131A-updates document the joint
  US / Australia advisory profile.
notes: |
  BianLian targets are predominantly US healthcare and critical-
  infrastructure orgs. AUSPEX places under `criminal/` rather than
  `ru/proxies/` because no public state-nexus attribution has been
  made; the operator-language profile is suggestive but not
  evidentiary.
