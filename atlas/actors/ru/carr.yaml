ttp_summary: |
  Exploitation of internet-exposed HMIs and ICS; Telegram-published
  video proof; low-sophistication but high-visibility impact.
  Targeted small US water utilities (Muleshoe, Abernathy, Stanton
  TX; Indiana wastewater) and European water utilities and
  agricultural grain elevators. Treasury Jul 2024 assesses CARR
  was "founded, funded, and directed by the GRU"; operationally
  proximate to Sandworm (Unit 74455) per Mandiant Apr 2024.
notes: |
  Treasury OFAC characterizes CARR's link to GRU Unit 74455 as
  direct ("founded, funded, and directed"), distinguishing CARR
  from looser "hacktivist" fronts. AUSPEX still treats the
  operational structure as proxy rather than direct hierarchical
  control: CARR operators are nominally volunteers, but tasking
  and infrastructure trace to GRU per Treasury. The dossier flags
  that Aliquippa PA water utility (Nov 2023) was CyberAv3ngers /
  IRGC and is NOT to be tagged as CARR despite frequent
  misattribution in popular reporting.
