ttp_summary: |
  Exploitation of internet-exposed HMIs and ICS; Telegram-published
  video proof; low-sophistication but high-visibility impact.
  Targeted small US water utilities (Muleshoe, Abernathy, Stanton
  TX; Indiana wastewater) and European water utilities and
  agricultural grain elevators. DOJ Dec 2025 indictment assesses
  CARR was "founded, funded, and directed by the Main Directorate
  of the General Staff of the Armed Forces of the Russian
  Federation (GRU)"; the GRU (parent service), not Unit 74455, is
  what the cited sources name (see AUDIT note).
notes: |
  Service attribution to the GRU rests on the DOJ Dec 9, 2025
  indictment, which states CARR (aka Z-Pentest) "was founded,
  funded, and directed by the Main Directorate of the General
  Staff of the Armed Forces of the Russian Federation (GRU)" and
  ties tasking to "at least one GRU officer" (moniker
  "Cyber_1ce_Killer"). This is a direct GRU link, distinguishing
  CARR from looser unattributed "hacktivist" fronts. AUSPEX still
  treats the operational structure as proxy rather than direct
  hierarchical control: CARR operators are nominally volunteers,
  but financing and tasking trace to the GRU per DOJ.

  AUDIT (2026-06-24, claude-opus-4.8/max): SERVICE VERIFIED, KEPT
  at the GRU parent (ru/gru) — primary_service_id CORRECTED from
  ru/gru/74455 to ru/gru. The cited sources support GRU but NOT
  the Unit 74455 (Sandworm) sub-unit:
   - DOJ Dec 9, 2025 (raw-verified): names "...(GRU)" — the GRU at
     the parent level — and a "GRU officer"; it does NOT mention
     Unit 74455, GTsST, or Sandworm (0 hits). This is the only
     cited source that names a service.
   - Treasury jy2473 (Jul 19, 2024, raw-verified): the title is
     "Treasury Sanctions Leader and Primary Member of the Cyber
     Army of Russia Reborn"; the body calls CARR only a "Russian
     government-aligned hacktivist group" of "Russian
     cybercriminal[s]" designated under E.O. 13694 (cyber-crime
     EO). It contains NO mention of GRU, Sandworm, Unit 74455,
     "founded/funded/directed", or any service (0 hits). The
     prior actor/source claim that Treasury attested
     "founded, funded, and directed by the GRU" was a
     MISATTRIBUTION — that wording is the DOJ indictment's, not
     Treasury's.
   - Mandiant "sandworm-water-utility-attribution" (raw-verified):
     the URL resolves to Mandiant's Nov 9, 2023 "Sandworm
     Disrupts Power in Ukraine" OT blog (same URL as
     mandiant/2023-11-09_sandworm-disrupts-power-ukraine-ot). It
     establishes Sandworm = GRU / Unit 74455 but contains 0
     mentions of CARR / Cyber Army / Reborn / water / Texas /
     HMI; it does NOT link CARR to Sandworm. Its curated title +
     date (2024-04-17) describe content that is not at that URL.
   Net: GRU is attested (KEEP in ru/gru); the specific 74455/
   Sandworm placement is unsupported by any cited source, so the
   service is set to the parent ru/gru rather than ru/gru/74455.
   The actor id (ru/gru/carr) is unchanged; no event FK change.
   OUT-OF-SCOPE FLAG: ru/gru.yaml and ru/gru/74455.yaml both
   assert CARR is GRU-directed "per Treasury Jul 2024" — that
   rests on the same disproven Treasury claim; cite DOJ Dec 2025
   instead (not edited here, outside this actor's scope).

  The dossier flags that Aliquippa PA water utility (Nov 2023)
  was CyberAv3ngers / IRGC and is NOT to be tagged as CARR despite
  frequent misattribution in popular reporting.
