ttp_summary: |
  Microsoft (MSTIC) temporary "Storm" cluster assessed with moderate
  confidence to "align with Russia's interests and tradecraft" — a
  suspected nation-state actor working toward Russian state interests,
  not yet raised to a named APT. Pioneered device-code phishing at
  scale (Feb 2025 MSTIC disclosure): impersonation lures over Teams,
  Signal, WhatsApp capture OAuth device-code tokens for Microsoft
  Graph e-mail harvesting across government, defense, IT, NGO and
  higher-education targets in Europe, North America and the Middle
  East/Africa.
