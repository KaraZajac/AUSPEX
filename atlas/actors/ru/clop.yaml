ttp_summary: |
  Russian-speaking criminal cluster operating Cl0p ransomware
  as the dominant brand since 2020. TA505 historical activity
  includes Dridex, Locky, FlawedAmmyy. Cl0p's signature is
  managed-file-transfer (MFT) zero-day mass-exploitation: Accellion
  FTA (Dec 2020), GoAnywhere MFT (Jan 2023, CVE-2023-0669), MOVEit
  Transfer (May 2023, CVE-2023-34362, ~2,700 organizations affected),
  Cleo Harmony / VLTrader / LexiCom (Dec 2024, CVE-2024-50623 +
  CVE-2024-55956). Departure from intrusion-by-intrusion affiliate
  ransomware to en-masse data-theft extortion (no encryption in
  many MOVEit cases). Ukrainian operator arrests June 2021 produced
  limited disruption — Russia-based core continued. State Dept
  TOCRP USD 10M reward issued June 16 2023 for MOVEit operators.
