ttp_summary: |
  Russia / Belarus-aligned espionage cluster active since at least
  late 2020. SentinelLabs (March 2023) and Recorded Future (TAG-70,
  February 2024) profile Winter Vivern targeting Ukrainian, Polish,
  Italian, Indian, UK, and EU parliamentary infrastructure with
  credential phish and webmail XSS chains (notably Zimbra
  CVE-2022-27926 and Roundcube CVE-2023-5631). Targeting set
  consistently overlaps with Russian / Belarusian strategic
  interest — Ukrainian foreign ministry, NATO foreign ministries,
  UK Parliament. Public attribution remains "Russia/Belarus
  aligned" rather than a named-service link.
