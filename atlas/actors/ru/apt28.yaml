ttp_summary: |
  X-Agent (Chopstick) cross-platform implant, X-Tunnel, Sofacy,
  Zebrocy, Lojax UEFI rootkit. Credential phishing of webmail
  (Bitly URL shortener tradecraft). Spearphishing with weaponized
  documents and Outlook NTLM relay (CVE-2023-23397), Roundcube /
  Zimbra zero-days. On-site close-access ops (Hague OPCW 2018,
  interdicted). DOJ Mueller indictment (Jul 2018) named twelve
  GRU officers (Netyksho et al.) for DNC/DCCC hack. Oct 2018
  Morenets indictment named seven additional for WADA/USADA/OPCW/
  Westinghouse/MH17.
