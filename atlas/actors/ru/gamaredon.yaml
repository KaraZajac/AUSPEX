ttp_summary: |
  Noisy, high-volume mass-spearphishing with weaponized Office
  documents and templates; PowerShell loaders (Pterodo, PowerPunch);
  fast-iteration malware (low sophistication, high volume); domain
  churn. >5,000 attacks against >1,500 Ukrainian government, military,
  intelligence, and law-enforcement systems per SBU. Provides
  continuous tactical intelligence feeding Sandworm and military
  operations.
