ttp_summary: |
  Leak operations, doxxing, low-tier disruption presented as
  pro-Russian "hacktivism." Activity surges around Ukraine
  front-line developments. Mandiant (Sep 2023) assesses with
  moderate confidence that the XakNet Team Telegram channel is
  directly supported by — and its moderators either are GRU
  officers or work directly with — GRU-sponsored APT44 (Sandworm),
  based on XakNet's leak of a unique technical artifact APT44 used
  during the compromise of a Ukrainian network, with data leaks
  following APT44 wiping within 24 hours. MSTIC separately
  associates XakNet with the Cadet Blizzard cluster. Other smaller
  fronts in the same operational tier include Anonymous Russia,
  RaHDIt, and Solntsepyok (which claimed the Kyivstar destruction).
notes: |
  Former id ru/proxies/xaknet. Re-promoted to ru/gru/xaknet on
  2026-06-24: Mandiant's 2023-09-14 "Hacktivists Collaborate with
  GRU-sponsored Threat Actors" report names the GRU explicitly —
  "We assess with moderate confidence that the moderators of the
  XakNet Team channel are directly supported by APT44" and "...
  either are GRU intelligence officers or work directly with the
  GRU APT44 operators conducting on-net operations." APT44/Sandworm
  is the GRU's Unit 74455; primary_service_id is set to the parent
  ru/gru rather than ru/gru/74455 because Mandiant attributes XakNet
  to GRU/APT44 coordination, not membership in a specific sub-unit.
  Attribution confidence is MODERATE (Mandiant's term), not high —
  the link rests on the shared-artifact/24h-leak pattern, not a
  govt designation. MISP galaxy (country RU) also ties XakNet to the
  GRU as a likely front. No Treasury/DOJ designation has named a
  specific GRU unit for XakNet in primary documents reviewed as of
  mid-2026 (cf. CARR, which Treasury Jul 2024 tied to Unit 74455).
  FK-propagated id change to the 2 referencing events on 2026-06-24.
