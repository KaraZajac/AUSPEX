ttp_summary: |
  Triton/Trisis malware targeting Schneider Electric Triconex
  safety-instrumented-system (SIS) controllers — uniquely dangerous
  because it disables the last line of safety before a catastrophic
  physical event. Long-dwell IT-to-OT lateral movement. Demonstrated
  against Saudi Petro Rabigh petrochemical facility (Aug 2017);
  payload misfired causing plant shutdown rather than the intended
  effect. DOJ indictment of TsNIIKhM employee Evgeny Gladkikh
  unsealed Mar 2022; Treasury OFAC sanctions on TsNIIKhM Oct 2020.
notes: |
  Parent service is TsNIIKhM, whose organizational placement is
  contested (Treasury says MoD-controlled; vendors have variously
  associated the operator with FSB-adjacent direction). See
  services/ru/tsniikhm.yaml for the full contested-attribution
  notes.
