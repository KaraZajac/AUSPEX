ttp_summary: |
  Evilginx-style adversary-in-the-middle credential phishing of
  webmail (Gmail, ProtonMail, Outlook). Realistic spoofed-persona
  spearphishing — tailored impersonation of academic conferences
  and conference organizers. SPICA malware (Google TAG Jan 2024).
  Operations include pre-Brexit and 2019 UK election leak (US-UK
  trade documents). CISA/NCSC joint advisory AA23-341A (Dec 2023)
  attributed Star Blizzard specifically to FSB Centre 18. DOJ Dec
  2023 indictment of Andrey Korinets and Ruslan Peretyatko; UK
  FCDO sanctioned same individuals.
