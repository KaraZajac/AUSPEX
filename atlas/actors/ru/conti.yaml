ttp_summary: |
  TrickBot loader → Conti ransomware affiliate model. Cobalt Strike,
  BazarLoader; double-extortion leak sites. HSE Ireland 2021,
  Costa Rica government 2022. ContiLeaks and TrickLeaks (Feb–Mar
  2022) exposed FSB Center 18 contacts and tasking against US/UK/
  Ukraine targets. Conti publicly pledged loyalty to the Russian
  state Feb 2022. Group fragmented but reconstituted into
  BlackBasta, BlackByte, Royal, Karakurt.
notes: |
  This entity is a non-state criminal organization with a
  documented FSB liaison rather than a directly-tasked state actor.
  The operational link is per ContiLeaks 2022 and subsequent
  US/UK sanctions designations. AUSPEX treats Conti as a proxy
  whose doctrine-alignment via the post-2022 sanctions-response
  posture is the analytically interesting tag; direct hierarchical
  control is not asserted.
default_doctrine_alignment_ids:
  - ru/sanctions-response-2022/criminal-proxy-mobilization
