ttp_summary: |
  Self-described "combination of DarkSide, REvil, LockBit" code
  reuse and operational personnel; emerged July 2021 after
  DarkSide's May 2021 shutdown. Targeted the New Cooperative grain
  cooperative (Sep 2021) drawing immediate FBI / CISA advisory
  attention to agriculture-sector ransomware. Group announced
  Nov 3 2021 it was ceasing operations citing "pressure from
  authorities"; personnel and infrastructure reconstituted as
  ALPHV / BlackCat (Nov 2021).
notes: |
  Middle node in DarkSide → BlackMatter → ALPHV lineage. Short
  operational lifespan (4 months) marks BlackMatter as a transitional
  rebrand rather than a fully independent enterprise.

  Former id ru/proxies/blackmatter (asserted BlackMatter operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/blackmatter on 2026-06-24 (claude-opus-4.8/max audit). REASON: the actor's only
  cited source — the joint CISA/FBI/NSA advisory AA21-291A "BlackMatter Ransomware" (2021-10-18) — is a
  purely criminal / RaaS framing and names NO Russia/state/proxy/FSB/GRU/safe-harbor nexus. The full
  16,149-char advisory body was captured and scanned: ZERO occurrences of russia/russian/kremlin/moscow/
  fsb/gru/svr/soviet/proxy/state-sponsored/tolerate/safe-harbor/safe-haven/sanction, and NO country
  attribution of any kind (the advisory makes no claim the operators are even Russia-based; it has no
  CIS/Russian-language victim-exclusion clause either — and per SCHEMA that trait would not be a nexus
  regardless). Verbatim characterization from the source: "BlackMatter is ransomware-as-a-service (Raas)
  tool that allows the ransomware's developers to profit from cybercriminal affiliates (i.e., BlackMatter
  actors) who deploy it against victims. BlackMatter is a possible rebrand of DarkSide, a RaaS which was
  active from September 2020 through May 2021." The advisory was "developed by the Cybersecurity and
  Infrastructure Security Agency (CISA), the Federal Bureau of Investigation (FBI), and the National
  Security Agency (NSA) to provide information on BlackMatter ransomware" after it "targeted multiple U.S.
  critical infrastructure entities, including two U.S. Food and Agriculture Sector organizations." The
  ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the actor's sources/notes (SCHEMA
  "Actor placement rule"); none was present, so the state-tolerated-proxy claim was unsourced.
  Dropped default_doctrine_alignment_ids ru/sanctions-response-2022/criminal-proxy-mobilization: that
