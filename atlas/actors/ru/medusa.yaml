ttp_summary: |
  Ransomware-as-a-service first identified June 2021; double-extortion
  via the "Medusa Blog" leak site. Began as a closed variant, later
  moving to an affiliate model with ransom negotiation still centrally
  controlled by the developers ("Medusa actors"); initial access via
  recruited initial-access brokers in cybercriminal forums, plus
  phishing and ScreenConnect (CVE-2024-1709). CISA AA25-071A (March
  2025) estimated 300+ critical-infrastructure victims. The cited
  advisory states NO operator origin — the prior "Russian-speaking
  affiliate cluster" descriptor is NOT supported by AA25-071A and the
  source assigns Medusa no nation or state nexus (see notes).
