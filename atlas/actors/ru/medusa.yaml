ttp_summary: |
  Ransomware-as-a-service active since 2021; double-extortion via
  the "Medusa Blog" leak site. Russian-speaking affiliate cluster.
  CISA AA25-071A (March 2025) estimated 300+ critical-infrastructure
  victims. Initial access through phishing, ScreenConnect (CVE-2024-
  1709), and stolen creds. Notable victims: Minneapolis Public
  Schools (Feb 2023), Toyota Financial Services Europe (Nov 2023).
