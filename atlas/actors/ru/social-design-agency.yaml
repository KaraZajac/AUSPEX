ttp_summary: |
  Russian influence-for-hire firm and lead operator of the
  Doppelganger campaign: mass registration of typosquatted domains
  cloning Western news outlets and government sites (355+ domains over
  2022-2023 per VIGINUM), amplified through inauthentic social-media
  networks, to push pro-Kremlin narratives on Ukraine and Western
  politics. Run by Ilya Gambashidze (SDA founder) in concert with the
  sister firm Structura National Technologies. Designated by US
  Treasury/OFAC (Mar 2024) and the EU as a Presidential-Administration-
  directed influence operation.
notes: |
  Created 2026-07-02 for the Doppelganger / RRN operator, previously
  unmodeled (viginum-rrn-doppelganger-attribution + the sibling
  viginum-portal-kombat-disclosure carried null actors). Placed
  ru/proxies (not ru/unscoped): US OFAC and EU designations tie SDA
  directly to the Russian Presidential Administration's influence
  tasking — a state-directed proxy, not a merely Russia-nexus firm.
  primary_service_id null per the proxies convention (the tasking body
  is the Presidential Administration, not a named intelligence service).
  The sister firm Structura is noted in ttp_summary rather than modeled
  as a separate actor pending a dedicated audit.
