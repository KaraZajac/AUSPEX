ttp_summary: |
  Russian-speaking ransomware operation; double-extortion. Tradecraft
  overlap with CryLock and ALPHV. Notable for the October 17 2023
  defacement of Trigona's leak-site infrastructure by the Ukrainian
  Cyber Alliance (UCA) hacktivist group, which exfiltrated data,
  released decryptors, and wiped infrastructure — the only known
  case of a Russian-criminal ransomware operation being disrupted
  by Ukrainian hacktivists. Operations largely ceased thereafter.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization: no cited source documents a Russia-state nexus, and its roster (Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR) never named Trigona
notes: |
  Former id ru/proxies/trigona (asserted Trigona operates as a Russian state-tolerated PROXY, financially
  motivated with a documented state nexus — safe-harbor / tasking-overlap / formal state-alignment).
  Demoted to ru/unscoped/trigona on 2026-06-24 (claude-opus-4.8/max audit): NEITHER cited source documents
  a Russia/state/proxy/FSB/GRU/SVR nexus for the Trigona crew.
    (1) Unit 42 "Bee-Ware of Trigona, An Emerging Ransomware Strain" (2023-03-16/04-20): profiles Trigona
        purely as an emerging RaaS strain with tradecraft overlap to CryLock and ALPHV/BlackCat. The only
        "Russian" tokens on the page are Russian-LANGUAGE/CIS ecosystem artifacts, not a state relationship:
        "A user on SafeZone, a Russian anti-malware forum, seeking help for Crylock ransomware" and
        "Changing the default language of NetScan to Russian is an option" (Cyrillic strings the operators
        left on disk). No russia-state / kremlin / fsb / gru / svr / state-sponsor / tasking / tolerate /
        safe-harbor / sanction predicate applied to Trigona.
    (2) UCA / BleepingComputer "Ukrainian Cyber Alliance hacks and wipes Trigona ransomware servers"
        (2023-10-17): every "Russia/Russian" mention is about the UCA HACKTIVISTS (united "to defend the
        country's cyberspace against Russian aggression"; hacked the "Russian Ministry of Defense"; Surkov's
        "Russian propaganda") — NONE about Trigona, which the article calls "the gang", "the cybercriminals",
        and "Trigona hackers" running a Monero-ransom double-extortion operation. No state nexus for Trigona.
  The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the actor's sources/notes (SCHEMA
  "Actor placement rule" — safe-harbor / non-prosecution, documented service tasking-overlap, or formal
  state-alignment designation); none was present, so the state-tolerated-proxy claim was unsourced.
  WHAT THE NEXUS RODE ON (not in any cited actor source): only Trigona's Russian-language footprint (SafeZone
  forum, Cyrillic/NetScan-Russian artifacts) and its having been targeted BY Ukrainian hacktivists — i.e. a
  "Russian-speaking" / "Russian-aligned criminal" characterization, which is precisely the profit-RaaS signal
  the placement rule excludes, NOT a documented state relationship. ru/sanctions-response-2022's criminal-
  proxy-mobilization roster names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — it does NOT
  name Trigona. The 2024-03 referencing event already concedes its doctrine link is a "PREDICATE GAP" (the
  tolerated-proxy framing "presupposes a Russia-state nexus the cited Secureworks/Sophos profile does not
  establish"; contested/plausible).
  MISP corroboration: the actor carries misp_galaxy: null / misp_galaxy_name: null — Trigona has no MISP
  threat-actor (galaxy) entry, so MISP offers neither a state attribution nor a contradiction.
  FLAGGED FOR HUMAN REVIEW (the Emotet/Akira precedent, NOT made here): no cited source documents a Russian-
  state relationship for the Trigona crew itself, so Trigona is a candidate for the stateless criminal/trigona
  namespace. Demoted only WITHIN the ru nation (mirroring ir/unscoped/agrius and the ru/unscoped/emotet +
  ru/unscoped/akira steps) to leave that deeper taxonomy call to the human; re-home to criminal/trigona if the
  human judges the Russian-language footprint insufficient to keep Trigona in the RU bucket, or keep
  ru/unscoped until a cited source names a Russian service. primary_service_id set to the ru/unscoped
  placeholder; the ru/ doctrine alignment dropped.
  FK-propagated id change to the 2 referencing events on 2026-06-24 (2023-10/trigona-uca-defacement and
  2024-03/secureworks-ctu-attributes-trigona-ransomware-operation-to-gold-begoni).
