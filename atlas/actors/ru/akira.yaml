ttp_summary: |
  Emerged March 2023, widely assessed as a Conti-codebase rebrand
  (Conti v3 source-leak Feb 2022 enabled multiple offspring).
  Affiliate model. Initial access via Cisco ASA / FortiGate VPN
  n-days (CVE-2023-20269 a notable case) and stolen creds. Both
  Windows and Linux ESXi encryptors. By Q4 2023 CISA estimated USD
  42M in extortion revenue across 250+ organizations. Cooperative
  ties to former Conti / Karakurt / BlackByte personnel.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization: no cited source documents a Russia-state nexus, and its roster (Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR) never named Akira
notes: |
  Former id ru/proxies/akira (asserted Akira operates as a Russian state-tolerated PROXY, financially
  motivated with a documented state nexus — safe-harbor / tasking-overlap / formal state-alignment).
  Demoted to ru/unscoped/akira on 2026-06-24 (claude-opus-4.8/max audit): the actor's SOLE cited source —
  the CISA/FBI/Europol EC3/Dutch NCSC joint advisory AA24-109A "#StopRansomware: Akira Ransomware"
  (2024-04-18, updated 2025-11-13) — documents ONLY a criminal ransomware operation and ZERO Russia/state/
  proxy nexus. The page contains no russian/kremlin/fsb/gru/svr/state-sponsor/nation-state/tasking/tolerate/
  safe-harbor/sanction token applied to Akira (the single "russia" string on the page is an unrelated
  sidebar advisory item, "AA25-343A Pro-Russia Hacktivists…"); it explicitly disclaims attribution of even
  the tools ("should not be attributed as malicious without analytical evidence"). The only lineage signal
  is the hedged criminal coupling "Akira ransomware threat actors are associated with other groups known as
  Storm-1567, Howling Scorpius, Punk Spider, and Gold Sahara, and may have connections to the defunct Conti
  ransomware group." The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the actor's
  sources/notes (SCHEMA "Actor placement rule"); none was present, so the state-tolerated-proxy claim was
  unsourced.
  WHAT THE NEXUS RODE ON (not in any cited actor source): Akira's widely-assessed Conti-codebase lineage
  (the Conti v3 leak Feb 2022) and its ties to former Conti/Karakurt/BlackByte personnel. Conti/Wizard
  Spider carried an FSB Center 18 liaison (ContiLeaks 2022) and a Treasury 2023 TrickBot-Conti designation —
  but that is an INHERITED/derived nexus for Akira's progenitor, not a documented state relationship for the
  Akira (Storm-1567 / GOLD SAHARA) crew itself, and it is not cited in this record. ru/sanctions-
  response-2022's criminal-proxy-mobilization roster names Conti/TrickBot/Wizard Spider, Killnet,
  NoName057(16), CARR — it does NOT name Akira. MISP corroboration: Microsoft's threat-actor profile for
  Storm-1567 (PUNK SPIDER) classifies it solely as "Origin/Threat: Financially motivated" with NO country /
  state-sponsor field. The referencing event's own source is CyberScoop, and the event already concedes the
  doctrine link is "fundamentally revenue-driven rather than state-directed" (contested/plausible).
  FLAGGED FOR HUMAN REVIEW (the Emotet precedent, NOT made here): no cited source documents a Russian-state
  relationship for the Akira crew itself, so Akira is a candidate for the stateless criminal/akira namespace.
  Demoted only WITHIN the ru nation (mirroring ir/unscoped/agrius and the ru/unscoped/emotet step) to leave
  that deeper taxonomy call to the human; re-home to criminal/akira if the human judges the inherited
  Conti lineage insufficient to keep Akira in the RU bucket, or keep ru/unscoped until a cited source names
  a Russian service. primary_service_id set to the ru/unscoped placeholder; the ru/ doctrine alignment
  dropped; the MISP linkage (Storm-1567) is retained.
  FK-propagated id change to the 1 referencing event on 2026-06-24
  (2025-11/fbicisa-stopransomware-akira-advisory-244m-imminent-threat-to-critical).
