ttp_summary: |
  Most prolific ransomware-as-a-service operator 2020–2024 (~2,500
  victims pre-Cronos). Three-version evolution: LockBit Red (1.0),
  LockBit Black (3.0, 2022, code-borrowed from BlackMatter), LockBit
  Green (2023, code-borrowed from leaked Conti). Affiliate program
  with ~20% operator / ~80% affiliate split. Bug-bounty program for
  its own leak site (paid researchers to find decryptor bugs).
  Initial access through stolen RDP, VPN appliance n-days (Fortinet,
  Citrix), Cobalt Strike. Operated leak site mirror infrastructure
  on Tor and clearnet. Big-game-hunting catalog includes Royal Mail
  UK (Jan 2023), Boeing (Oct 2023), ICBC USA (Nov 2023), Allen-
  Bradley / Rockwell Automation (Nov 2023), AlphV-RansomHub-style
  rebrands post-Cronos. Operation Cronos (Feb 19–20 2024, FBI / NCA
  / Europol) seized leak-site infrastructure, 200 cryptocurrency
  accounts, 34 servers; published decryptors. Disruption was
  partial — LockBit relaunched within days. DOJ / OFAC / UK FCDO
  unsealed May 7 2024 a superseding indictment naming Khoroshev
  ("LockBitSupp") with USD 10M State Dept TOCRP reward.
notes: |
  LockBit is the most-documented criminal-cyber story in the AUSPEX
  corpus. Five-year arc 2019–2024 captures (a) the maturation of
  RaaS into a corporate-style enterprise, (b) the limit of leak-site
  takedowns absent state-side enforcement, and (c) the unmasking
  pattern (Conti / Khoroshev / Wazawaka) where the Kremlin's
  safe-harbor calculus shifts only when US/UK identify named
  individuals subject to OFAC SDN listing. Khoroshev unmasking
  reportedly produced no FSB enforcement response — contrast with
  the Jan 2022 REvil raid, which preceded the invasion.
