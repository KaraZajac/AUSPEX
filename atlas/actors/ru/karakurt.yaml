ttp_summary: |
  Data-extortion arm of the Conti / Wizard Spider ecosystem
  (Advintel and CISA AA22-152A characterize Karakurt as a Conti
  subsidiary rather than a standalone group). No encryption —
  pure exfiltration and extortion. Often re-extorts victims already
  ransomed by Conti / Black Basta affiliates. Continued operating
  through Conti dissolution (May 2022) and into the Black Basta era.
