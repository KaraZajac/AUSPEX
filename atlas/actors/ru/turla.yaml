ttp_summary: |
  Snake/Uroburos kernel rootkit with custom P2P C2 (most-sophisticated
  FSB tool per DOJ). ComRAT, Kazuar. Satellite-link C2 hijacking,
  watering-hole, on-host fileless persistence, abuse of compromised
  infrastructure of other APTs. Long-dwell strategic espionage
  against >50 countries — NATO MFAs and embassies especially. DOJ
  May 2023 explicitly attributed Snake to "a unit within Center 16
  of the FSB"; PERSEUS court-authorized remote disable destroyed
  the global Snake P2P network.
