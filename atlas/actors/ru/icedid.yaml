notes: |
  Former id ru/proxies/icedid (asserted IcedID operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/icedid on 2026-06-24 (claude-opus-4.8/max audit): the actor's only cited
  source — Europol's "Operation Endgame" takedown announcement (2024-05-30) — is a purely criminal /
  law-enforcement framing. It calls the targets "droppers including, IcedID, SystemBC, Pikabot,
  Smokeloader, Bumblebee and Trickbot", describes IcedID as "(also known as BokBot), initially
  categorised as a banking trojan, [that] had been further developed to serve other cybercrimes in
  addition to the theft of financial data", and frames the action as "disrupting criminal services
  through arresting High Value Targets, taking down the criminal infrastructures and freezing illegal
  proceeds". It names ZERO Russia/state/proxy/FSB/GRU/sanction nexus for IcedID (the only "Russian"
  token on the page is a UI language-selector item: {"id":516,"title":"Russian"}); the four arrests
  were "1 in Armenia and 3 in Ukraine". The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state
  nexus in the actor's sources/notes (SCHEMA "Actor placement rule"); none was present, so the
  state-tolerated-proxy claim was unsourced.
  CLOSEST PARALLEL TO THE EMOTET FINDING: like Emotet/Ladybird, IcedID is a criminal loader taken down
  by an LE takedown whose announcement carries no state framing. WHAT THE NEXUS ACTUALLY RODE ON (not
  in any cited actor source): IcedID's operational adjacency to the Conti / Wizard Spider ransomware
  ecosystem (FSB Center 18 liaison per ContiLeaks 2022; Treasury 2023 TrickBot-Conti sanctions). That
  is an INHERITED/derived nexus for IcedID's downstream payloads, not a documented state relationship
  for the IcedID (BokBot) crew itself. ru/sanctions-response-2022's criminal-proxy-mobilization roster
  names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — it does NOT name IcedID.
  Demoted WITHIN the ru nation (mirroring ir/unscoped/agrius and the earlier ru/unscoped/emotet step)
  rather than to criminal/ to avoid the parent agent's deeper taxonomy call. criminal/icedid (no
  documented state nexus at all in the cited source) is FLAGGED for human review — this is very likely
  the SAME call as Emotet (which the human ultimately moved ru/unscoped/emotet -> criminal/emotet on
  2026-06-24) — and is deliberately NOT made here. Keep ru/unscoped until a cited source names a Russian
  service, or re-home to criminal/icedid if the human judges the inherited Conti/Wizard Spider nexus
  insufficient to keep IcedID in the RU bucket.
  No FK propagation was needed: zero events reference this actor (the only repo reference to the id is
  this actor file). Adjacent context for the human (NOT changed here): the sibling Endgame loader
  ru/proxies/qakbot carries the identical placement + doctrine alignment and the same source, so the
  Emotet/IcedID call likely extends to it.
