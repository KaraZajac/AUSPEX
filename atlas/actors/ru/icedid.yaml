ttp_summary: |
  Russian-speaking malware loader-as-a-service. Originally a
  banking trojan; pivoted to ransomware-precursor loader role
  delivering Cobalt Strike, Qakbot, and ransomware payloads
  (Conti, Quantum, Diavol). Distribution via malspam, hijacked
  email threads, and SEO poisoning of common-software keywords.
  Operationally adjacent to the Conti / Wizard Spider ecosystem.
  Operators widely assessed to have migrated to Latrodectus and
  Pikabot following the Operation Endgame May 2024 disruption.
