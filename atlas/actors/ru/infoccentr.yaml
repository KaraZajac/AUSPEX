ttp_summary: |
  Pro-Russian "hacktivist" Telegram persona operating as a GRU
  information-operations front alongside XakNet and
  CyberArmyofRussia_Reborn. Leak operations and low-tier disruption
  targeting Ukrainian entities, with data leaks frequently coincident
  with APT44 (Sandworm) wiper activity (leaks within ~24h of wiping,
  amplifying the cyber effect for influence purposes). Mandiant
  (2022-09-23) assesses with MODERATE confidence that these
  self-proclaimed hacktivist channels are directly supported by /
  coordinated with GRU-sponsored APT44 (Sandworm).
notes: |
  Created 2026-07-02 to fill the third named GRU-linked Telegram
  persona in Mandiant's 2022-09-23 report (siblings ru/gru/xaknet +
  ru/gru/carr). Attribution confidence is MODERATE (Mandiant's term) —
  Mandiant reserves judgement on composition (whether GRU officers
  directly operate the channel or coordinate with its moderators).
  Service placement ru/gru follows the corpus convention for the
  XakNet/CARR sibling personas; no specific GRU sub-unit is sourced for
  Infoccentr in the reviewed primaries.
