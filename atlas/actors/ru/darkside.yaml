ttp_summary: |
  Ransomware-as-a-service launched Aug 2020 with "ethical hacker"
  posturing (claimed not to target hospitals, education, non-
  profits, government). Affiliate model. Double-extortion. Colonial
  Pipeline (May 7–12 2021) became the canonical US-CII-disruption
  ransomware case; FBI on June 7 2021 announced recovery of
  approximately 63.7 BTC (USD 2.3M of the USD 4.4M paid). DarkSide
  servers were seized by an unnamed party May 13 2021 and the
  affiliate program shut down; personnel and code reconstituted as
  BlackMatter (July 2021) and ALPHV / BlackCat (Nov 2021).
notes: |
  DarkSide is the first node in the DarkSide → BlackMatter → ALPHV
  lineage. Voluntary shutdown after the Colonial Pipeline incident
  is the canonical case of state-tolerance withdrawn under direct
  US pressure (Biden remarks 2021-05-13 indicating Russian
  territorial harboring). The May 2021 server seizure was widely
  inferred to be a Russian-state or US-led operation but never
  publicly attributed; AUSPEX flags as state-tolerance-withdrawal
  event regardless of seizure attribution.
