ttp_summary: |
  Ransomware-as-a-service launched Aug 2020 with "ethical hacker"
  posturing (claimed not to target hospitals, education, non-
  profits, government). Affiliate model. Double-extortion. Colonial
  Pipeline (May 7–12 2021) became the canonical US-CII-disruption
  ransomware case; FBI on June 7 2021 announced recovery of
  approximately 63.7 BTC (USD 2.3M of the USD 4.4M paid). DarkSide
  servers were seized by an unnamed party May 13 2021 and the
  affiliate program shut down; personnel and code reconstituted as
  BlackMatter (July 2021) and ALPHV / BlackCat (Nov 2021).
notes: |
  DarkSide is the first node in the DarkSide → BlackMatter → ALPHV
  lineage. Voluntary shutdown after the Colonial Pipeline incident
  is the canonical case of state-tolerance withdrawn under direct
  US pressure (Biden remarks 2021-05-13 indicating Russian
  territorial harboring). The May 2021 server seizure was widely
  inferred to be a Russian-state or US-led operation but never
  publicly attributed; AUSPEX flags as state-tolerance-withdrawal
  event regardless of seizure attribution.

  AUDIT 2026-06-24 (claude-opus-4.8/max): DEMOTED ru/proxies/darkside -> ru/unscoped/darkside.
  The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus (FSB/GRU/SVR tasking /
  tolerance / harbor / handoff) in the actor's cited sources/notes (SCHEMA "Actor placement rule").
  NONE of the three cited sources documents one:
    • fbi/2021-05-10_darkside-alert (raw captured, HTTP 200): the entire substantive text is one
      sentence — "The FBI confirms that the Darkside ransomware is responsible for the compromise of
      the Colonial Pipeline networks. We continue to work with the company and our government partners
      on the investigation." NO Russia / Russian / FSB / GRU / SVR / state / harbor / tolerance token.
    • cisa/2021-05-11_aa21-131a-darkside-advisory (raw captured, HTTP 200): pure criminal ransomware-
      as-a-service framing — "DarkSide is ransomware-as-a-service (RaaS)—the developers of the
      ransomware receive a share of the proceeds from the cybercriminal actors who deploy it, known as
      'affiliates.'"; "CISA and the FBI do not encourage paying a ransom to criminal actors." ZERO
      Russia/state/proxy token (the first-pass "CIS x38" was a false positive — all "CISA" the agency;
      there is no standalone CIS-avoidance language on the page).
    • doj/2021-06-07_colonial-pipeline-recovery: UNFETCHABLE for raw capture (justice.gov behind Akamai
      Bot Manager "bm-verify" JS challenge — curl 400/JS-redirect; WebFetch 403; archive.org blocked).
      By its own stored title it is a "Ransomware Extortionists DarkSide" cryptocurrency SEIZURE — a US
      law-enforcement counter-action, the opposite of a Russian-state-nexus statement. Noted + skipped;
      does not change the verdict (two captured govt sources already document zero nexus).
  WHAT THE NEXUS ACTUALLY RODE ON (not in any cited source): the actor's own UNCITED inference above —
  Biden's 2021-05-13 remarks on Russian territorial harboring and a May-2021 server seizure "widely
  inferred to be a Russian-state or US-led operation but never publicly attributed." "Widely inferred"
  + "never publicly attributed" is precisely NOT a source-documented nexus, and the Biden remarks are
  not among the cited sources. DarkSide publicly styled itself apolitical profit-RaaS with "ethical
  hacker" posturing — classic profit-criminal.
  Demoted WITHIN the ru nation (primary_service_id -> the ru/unscoped placeholder service), mirroring the
  two sibling lineage nodes demoted today — ru/unscoped/blackmatter and ru/unscoped/alphv — and
  ir/unscoped/agrius, rather than re-homing to criminal/. DarkSide is the HEAD of the DarkSide ->
  BlackMatter -> ALPHV lineage, so all three now sit unscoped. The stateless criminal/darkside call
  (whether the absence of ANY documented Russian-state relationship warrants leaving the ru bucket
  entirely) is FLAGGED for human review per the Emotet precedent and deliberately NOT made here:
  profit-criminal -> criminal/ candidate (per emotet). The MISP linkage (GOLD WATERFALL) is retained.
