ttp_summary: |
  Originally a 2014 banking trojan; evolved into the dominant
  malware loader of 2018–2020. Delivery vehicle for Trickbot,
  Qakbot, IcedID, and ransomware (Ryuk, Conti). Distribution via
  malspam with weaponized Office documents. Operation Ladybird
  (Jan 27 2021, Europol + Eurojust + Dutch + US + German + UK +
  French + Lithuanian + Canadian + Ukrainian partners) seized
  the botnet's three-tier C2 infrastructure and pushed a self-
  uninstall payload (timed for Apr 25 2021). Emotet re-emerged
  November 2021 via Trickbot infections rebuilding the botnet.
  Subsequent activity through 2023 was sporadic; effectively
  dormant since mid-2023.
