# Demoted ru/proxies/qakbot -> ru/unscoped/qakbot on 2026-06-24 (claude-opus-4.8/max audit): NEITHER
# cited actor source (DOJ "Duck Hunt" + Europol takedown, both 2023-08-29) documents a Russian-state
# nexus — both are purely criminal / law-enforcement-takedown framings ("controlled by a cybercriminal
# organization" / "operated by a group of organised cybercriminals"). The ru/proxies/ namespace requires
# a SOURCE-DOCUMENTED state nexus (SCHEMA "Actor placement rule"); none was present. Qakbot/Qbot (banking
# trojan -> loader-as-a-service, FBI Operation Duck Hunt takedown Aug-2023) is profit-criminal — the
# DIRECT ANALOGUE of Emotet (moved ru/proxies -> ru/unscoped -> criminal/emotet on 2026-06-24).
# FLAG: profit-criminal -> criminal/ candidate (direct Emotet analogue). Demote-within-nation here
# (mirroring ir/unscoped/agrius + the Emotet auditor step) leaves the stateless-criminal/ re-home as a
# human taxonomy call; see notes.
id: ru/unscoped/qakbot
primary_service_id: ru/unscoped
additional_service_ids: []
canonical_name: Qakbot
aliases:
  - alias: Qakbot
    assigning_org: vendor consensus
    confidence: equivalent
  - alias: QBot
    assigning_org: vendor consensus
    confidence: equivalent
  - alias: Pinkslipbot
    assigning_org: vendor consensus
    confidence: equivalent
  - alias: Pikabot
    assigning_org: vendor consensus (post-takedown successor loader)
    confidence: overlapping
    note: |
      Pikabot is a post-August 2023 takedown successor loader with
      strong code and infrastructure overlaps; vendors disagree on
      whether to treat as the same operator cluster.
active_since: 2007-01-01
active_until: null  # August 2023 Operation Duck Hunt takedown; partial reconstitution as Pikabot
status: dormant
mission:
  - financial
target_sector_ids:
  - finance/banking
  - ict/managed-services
  - ics/manufacturing
  - government/local
  - critical-infrastructure
ttp_summary: |
  Russian-speaking banking trojan turned loader-as-a-service.
  Distributed Cobalt Strike, Brute Ratel, Conti, Black Basta,
  ProLock, REvil ransomware. Operation Duck Hunt (Aug 29 2023,
  FBI + French / German / Dutch / UK / Romanian / Latvian
  partners) seized 52 servers and pushed a remediation tool to
  ~700,000 infected hosts via court-authorized self-removal.
  Recovered USD 8.6M in cryptocurrency. Pikabot emerged in late
  2023 with operational tradecraft overlap; operator continuity
  is widely assessed.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization — that pillar's roster names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR but NOT Qakbot/QBot; the alignment was unsourced for this actor (same finding as Emotet)
notes: |
  Former id ru/proxies/qakbot (asserted Qakbot operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/qakbot on 2026-06-24 (claude-opus-4.8/max audit). The actor's two cited
  sources are BOTH purely criminal / law-enforcement-takedown framings establishing NO Russia-state
  nexus at any confidence:
    - DOJ "Operation Duck Hunt" (2023-08-29): Qakbot is "controlled by a cybercriminal organization",
      the "Qakbot cybercriminal organization"; the action is "the largest U.S.-led financial and
      technical disruption of a botnet infrastructure leveraged by cybercriminals to commit ransomware,
      financial fraud, and other cyber-enabled criminal activity"; seized "$8.6 million in ill-gotten
      profits". ZERO Russia/state/FSB/GRU/SVR nexus — the single "Russia" token on the whole DOJ page
      is in an unrelated "Related Content" sidebar link (Blender.io money-laundering case naming "three
      Russian nationals"), NOT a Qakbot attribution.
    - Europol takedown (2023-08-29): "Qakbot, operated by a group of organised cybercriminals, targeted
      critical infrastructure and businesses across multiple countries, stealing financial data and
      login credentials. Cybercriminals used this persistent malware to commit ransomware, fraud, and
      other cyber-enabled crimes." ZERO Russia/state tokens; the only "Russian" string in the HTML is a
      UI language-selector menu item (id 516, beside Macedonian/Norwegian/Spanish) — exactly the Emotet
      pattern.
  The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus (SCHEMA "Actor placement rule");
  none is present in either cited source, so the state-tolerated-proxy claim was unsourced. The
  ru/sanctions-response-2022/criminal-proxy-mobilization alignment was likewise unsupported: that
  pillar's roster names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — it does NOT name
  Qakbot/QBot/Pinkslipbot.
  WHAT A NEXUS WOULD HAVE TO RIDE ON (not in any cited actor source): Qakbot's downstream coupling to
  ransomware crews (Conti, REvil, Black Basta, ProLock, Egregor, MegaCortex per DOJ) — an INHERITED/
  derived association of its payload customers, not a documented state relationship for the Qakbot
  operator cluster itself; and the "Russian-speaking" descriptor in the ttp_summary, which is a
  language/origin marker, NOT a state-tasking/tolerance fact.
  FLAG: profit-criminal -> criminal/ candidate (DIRECT EMOTET ANALOGUE). Demoted WITHIN the ru nation
  (mirroring ir/unscoped/agrius and the Emotet auditor step) rather than straight to criminal/, to leave
  the parent agent / human the taxonomy call: whether Qakbot should become the stateless criminal/qakbot
  (no documented state nexus at all) or stay in the RU bucket on the inherited ransomware-ecosystem
  coupling. Keep ru/unscoped until a cited source names a Russian service — or re-home to criminal/qakbot
  if the human judges the inherited coupling insufficient (Kara made exactly that call for Emotet).
  FK propagation: NONE required — both referencing events (2023-08/qakbot-takedown, 2024-05/operation-
  endgame) already carry actor_id: null as counter-ops (AUDIT-2026-05-29); their inline comments were
  refreshed to the new id for accuracy. (Sibling note: ru/icedid.yaml line ~71 cross-references this
  actor's old placement; left untouched — out of this audit's scope.)
sources:
  - doj/2023-08-29_qakbot-duck-hunt
  - europol/2023-08-29_qakbot-takedown

