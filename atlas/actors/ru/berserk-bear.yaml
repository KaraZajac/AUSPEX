ttp_summary: |
  Supply-chain compromise (Havex via ICS vendor websites 2014),
  watering-hole, credential harvesting, ICS engineering-software
  trojans, Cisco IOS Smart Install exploitation (CVE-2018-0171 —
  CISA Aug 2025 advisory). Sustained energy-sector targeting since
  ~2011. Wolf Creek Nuclear Operating Corp intrusion (2017). DOJ
  Mar 2022 indictment of FSB Center 16 officers Pavel Akulov,
  Mikhail Gavrilov, Marat Tyukov for the 2012–17 campaign. US
  Treasury OFAC sanctions on Center 16 Mar 2022.
