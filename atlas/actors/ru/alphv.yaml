ttp_summary: |
  Rust-based ransomware (a first in the family) launched Nov 2021;
  widely assessed as a rebrand / personnel migration from DarkSide
  → BlackMatter → ALPHV after DarkSide retired post-Colonial.
  Affiliate program; Scattered Spider partnership produced the
  MGM and Caesars intrusions (Sept 2023). FBI claimed a leak-site
  seizure Dec 19 2023; ALPHV partially recovered. Change Healthcare
  (UnitedHealth subsidiary) intrusion Feb 2024 produced an estimated
  USD 22M ransom payment by UnitedHealth; ALPHV operator allegedly
  exit-scammed the affiliate, who then re-posted the stolen data
  via RansomHub. Group ceased operations March 2024.
notes: |
  ALPHV / BlackCat is part of the DarkSide → BlackMatter → ALPHV
  lineage — related-but-distinct rebrands of overlapping
  personnel. Each tracked as separate actor in AUSPEX with the
  lineage documented here and in their respective notes. The
  Scattered Spider affiliate relationship (Sept 2023) is captured
  on the Scattered Spider actor entry.
