ttp_summary: |
  Strategic political and policy espionage; long-dwell collection.
  Supply-chain compromise (SolarWinds Orion → SUNBURST Mar 2020;
  TeamCity exploitation CVE-2023-42793). Cloud identity attacks
  (golden-SAML, password spray, OAuth app abuse, token theft).
  Magic Web (custom IIS module), WellMess, WellMail, Diplomatic
  Orbiter campaigns. "Low and slow" tradecraft. Microsoft corporate
  breach via password spray on legacy non-production test tenant
  without MFA (Nov 2023, disclosed Jan 2024); parallel HPE breach.
