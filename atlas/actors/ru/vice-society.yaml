ttp_summary: |
  Notorious for sustained targeting of K-12 and higher-education
  institutions. Did not develop its own encryptor — primarily
  deployed HelloKitty, Zeppelin, and (in later activity) Rhysida.
  Notable victims: Los Angeles Unified School District (Sep 2022),
  University of Manchester UK (June 2023). FBI/CISA/MS-ISAC
  AA22-249A (Sep 2022) advisory frames the group purely as a
  criminal intrusion/exfiltration/extortion crew (no state nexus;
  the advisory does not even call the crew "Russian-speaking").
  Personnel widely assessed to have reconstituted as Rhysida from
  May 2023 onward.
default_doctrine_alignment_ids: []  # dropped ru/sanctions-response-2022/criminal-proxy-mobilization: unsourced (the sole CISA advisory names no state nexus, and that roster never named Vice Society)
notes: |
  Former id ru/proxies/vice-society (asserted Vice Society operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/vice-society on 2026-06-24 (claude-opus-4.8/max audit): the actor's only cited
  source — the FBI/CISA/MS-ISAC joint advisory AA22-249A "#StopRansomware: Vice Society" (2022-09-06) — is a
  purely criminal / law-enforcement framing. It opens "Vice Society is an intrusion, exfiltration, and
  extortion hacking group that first appeared in summer 2021," notes the crew "do not use a ransomware variant
  of unique origin" (deploying Hello Kitty/Five Hands and Zeppelin instead), classes them with "the
  opportunistic targeting often seen with cyber criminals," and centers on disproportionate education-sector
  targeting. The captured raw page contains ZERO occurrences of Russia/Russian/state-sponsored/proxy/FSB/GRU/
  SVR/Kremlin/nation-state/intelligence-service (every "nation"/"state" token is boilerplate: "National
  Coordinator", "National Institute of Standards", "United State[s] Government", "State, Local, Tribal",
  "Multi-State ISAC"). The ru/proxies/ namespace requires a SOURCE-DOCUMENTED state nexus in the actor's
  sources/notes (SCHEMA "Actor placement rule"); none is present, so the state-tolerated-proxy claim was
  unsourced. The unsourced ru/sanctions-response-2022/criminal-proxy-mobilization doctrine alignment was
  dropped on the same grounds (its roster — Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — never
  named Vice Society).
  RU NATION FLAGGED: unlike the Emotet case, the sole source does not even call the crew "Russian-speaking"
  (that descriptor in the prior ttp_summary was unsourced by AA22-249A); no cited source establishes a Russian
  nexus of any kind. Demoted WITHIN the ru nation (mirroring the same-day ru/unscoped/{akira,play,medusa}
  demotions) rather than to criminal/ to avoid the deeper taxonomy call. Whether (a) the ru nation should hold
  at all and (b) Vice Society should re-home to the stateless criminal/vice-society are BOTH FLAGGED for human
  review and deliberately NOT decided here. Keep ru/unscoped until a cited source names a Russian service — or
  re-home to criminal/vice-society if the human judges the RU bucket unsupported.
  Cluster continuity: Vice Society personnel are widely assessed to have reconstituted as Rhysida from ~May
  2023 (Microsoft tracks the post-2023 activity as Vanilla Tempest); see atlas/actors/ru/rhysida.yaml. That
  continuity is a criminal-rebrand lineage, not a state nexus.
  FK-propagation: NO events reference this actor (grep of atlas/events/ for actor_id: ru/proxies/vice-society
  returned zero), so no event actor_id changes were required.
