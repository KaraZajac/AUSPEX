ttp_summary: |
  Notorious for sustained targeting of K-12 and higher-education
  institutions. Did not develop its own encryptor — primarily
  deployed HelloKitty, Zeppelin, and (in later activity) Rhysida.
  Notable victims: Los Angeles Unified School District (Sep 2022),
  University of Manchester UK (June 2023). Russian-speaking
  cluster; CISA AA22-249A (Sep 2022) advisory. Personnel widely
  assessed to have reconstituted as Rhysida from May 2023 onward.
