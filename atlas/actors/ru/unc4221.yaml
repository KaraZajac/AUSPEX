ttp_summary: |
  Russia-linked uncategorized threat cluster (GTIG: UNC4221; CERT-UA:
  UAC-0185) targeting Signal accounts used by Ukrainian military
  personnel. Operates a custom-developed Signal phishing kit that mimics
  components of Kropyva, the artillery-guidance application used by the
  Armed Forces of Ukraine, presenting malicious device-linking QR codes
  that bind a victim's Signal account to actor-controlled devices via the
  app's legitimate "linked devices" feature — granting persistent access
  to communications without full device compromise. Deploys PINPOINT, a
  lightweight JavaScript payload that collects basic user information and
  geolocation via the browser's GeoLocation API. Earlier (2022)
  operations used phishing pages crafted to appear as Signal security
  alerts. CERT-UA additionally documents credential theft via messaging
  apps (Signal, Telegram, WhatsApp) and against Ukrainian military
  systems (DELTA, TENETA, Kropyva).
