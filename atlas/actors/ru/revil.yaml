ttp_summary: |
  Ransomware-as-a-service successor to GandCrab. Affiliate model
  with ~30% operator / ~70% affiliate split. Big-game-hunting
  posture (JBS USD 11M, Kaseya MSP supply chain July 2021, Apple
  supplier Quanta Apr 2021). Double-extortion via the "Happy Blog"
  leak site. After Kaseya, US pressure via the June 2021 Biden /
  Putin Geneva summit produced the unprecedented Jan 14 2022 FSB
  raid in which 14 alleged members were arrested in St. Petersburg
  and Moscow — Russia's first publicly announced ransomware
  enforcement action against its own nationals. Affiliate Yaroslav
  Vasinskyi (Kaseya operator) was extradited from Poland to the US
  and convicted May 2024; Yevgeniy Polyanin was indicted in
  parallel.
notes: |
  REvil is the canonical "FSB-tolerated until US linkage costs
  exceeded tolerance" case. The Jan 2022 raid coincided with
  Russia–US pre-invasion diplomacy and was widely read as a
  bargaining gesture; arrests went quiet after the Feb 24 2022
  invasion. The case is the inflection point for the AUSPEX
  thesis that ransomware-criminal autonomy is conditional on
  Kremlin foreign-policy calculation, not on the absence of
  state knowledge of operations.
