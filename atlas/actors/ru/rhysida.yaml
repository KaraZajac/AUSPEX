notes: |
  Former id ru/proxies/rhysida (asserted Rhysida operates as a Russian state-tolerated PROXY).
  Demoted to ru/unscoped/rhysida on 2026-06-24 (claude-opus-4.8/max audit). The ru/proxies/ namespace
  requires a SOURCE-DOCUMENTED state nexus in the actor's sources/notes (SCHEMA "Actor placement rule" —
  safe-harbor/non-prosecution, service tasking-overlap, or formal state-aligned designation); none is
  present. The actor's SOLE cited source — the joint CISA/FBI/MS-ISAC advisory AA23-319A
  (#StopRansomware: Rhysida Ransomware, 2023-11-15) — frames Rhysida as a purely criminal, financially
  motivated operation and contains ZERO mention of Russia, any Russian service (FSB/GRU/SVR), state
  sponsorship, state toleration, safe-harbor, or proxy status. Verbatim, the advisory's own
  characterization is criminal-RaaS only:
    - "Threat actors leveraging Rhysida ransomware are known to impact 'targets of opportunity,'
      including victims in the education, healthcare, manufacturing, information technology, and
      government sectors."
    - "open source reporting has confirmed observed instances of Rhysida actors operating in a
      ransomware-as-a-service (RaaS) capacity, where ransomware tools and infrastructure are leased
      out in a profit-sharing model. Any ransoms paid are then split between the group and the associates."
    - "Rhysida actors reportedly engage in 'double extortion'... ransom payments in Bitcoin."
  (The only "FSB" token on the captured page is a substring inside a base64 asset hash, not the Russian
  service; greps for Russia/Russian/Kremlin/Moscow/GRU/SVR/state-sponsored/proxy/safe-harbor/sanctions
  all return zero. The page links Rhysida to Microsoft's DEV-0832 / Vice Society, itself tracked as an
  OPPORTUNISTIC ransomware cluster, not a state proxy.)
  FLAG — ru NATION UNSOURCED: not merely the proxy/service placement but the Russia attribution itself
  is unsupported by the cited source. Rhysida's operator nationality is not firmly Russia-attributed in
  the broader reporting, and this record cites nothing tying the crew to Russia. Demoted WITHIN the ru
  nation to ru/unscoped (mirroring the earlier ru/unscoped/emotet step) rather than to criminal/ to avoid
  the parent agent's deeper taxonomy call. Because no cited source documents a Russian-state OR Russian-
  nationality tie, this actor is a candidate for the STATELESS criminal/rhysida namespace (possibly with
  no nation at all); that move is FLAGGED for human review and deliberately NOT made here. Re-home to
  criminal/rhysida if the human judges the RU bucket unsupported, or keep ru/unscoped and add a citation
  if a source names a Russian service or firmly attributes Russian operators.
  Dropped the unsourced ru/sanctions-response-2022/criminal-proxy-mobilization doctrine alignment (that
  roster names Conti/TrickBot/Wizard Spider, Killnet, NoName057(16), CARR — it does NOT name Rhysida).
  FK propagation: ZERO events reference this actor_id (no event actor_id changes were needed).
