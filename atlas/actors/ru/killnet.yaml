ttp_summary: |
  Layer-7 DDoS, Telegram-coordinated swarming. Targets NATO
  governments and Ukraine-supporting states' government public-
  facing portals, airports, healthcare websites (Lithuania, Italy,
  Germany, US, UK). Founder "Killmilk" linked to Russian state
  media appearances. CISA AA22-110A explicitly names Killnet
  among Russian-aligned cybercrime/hacktivist groups.
notes: |
  Killnet is a nominally hacktivist front whose state nexus is
  assessed rather than formally attributed. AUSPEX flags the
  operational link as proxy rather than direct hierarchical
  control. The `primary_service_id` defaults to ru/gru on the
  basis of CISA's grouping, but no DOJ/Treasury action has named
  a specific GRU unit; treat as soft FK.
