ttp_summary: |
  Layer-7 DDoS, Telegram-coordinated swarming. Targets NATO
  governments and Ukraine-supporting states' government public-
  facing portals, airports, healthcare websites (Lithuania, Italy,
  Germany, US, UK). Founder "Killmilk" linked to Russian state
  media appearances. CISA AA22-110A lists Killnet under
  "Russian-Aligned Cybercrime Groups" (defined as financially
  motivated), noting only that Killnet "released a video pledging
  support to Russia" and claimed a March 2022 DDoS against a U.S.
  airport — a self-declared, independent alignment, with the
  Five Eyes assessing such groups "will most likely continue to
  operate primarily based on financial motivations." The advisory
  names no Russian service for Killnet.
notes: |
  Former id ru/proxies/killnet (asserted Killnet operates as a Russian state-tolerated PROXY) with
  primary_service_id ru/gru. Killnet is a nominally hacktivist front whose state nexus was assessed
  rather than formally attributed; AUSPEX flagged the link as proxy rather than direct hierarchical
  control, and the ru/gru default rested on CISA's grouping, but no DOJ/Treasury action ever named a
  specific GRU unit.
  AUDIT (2026-06-24, claude-opus-4.8/max): DEMOTED ru/proxies/killnet -> ru/unscoped/killnet, and
  primary_service_id ru/gru -> ru/unscoped. The actor's SOLE cited source — CISA/Five-Eyes joint
  advisory AA22-110A (2022-04-20) — does NOT meet the SCHEMA ru/proxies bar (a financially-motivated
  crew with a SOURCE-DOCUMENTED state nexus: safe-harbor/non-prosecution, documented service tasking-
  overlap, or formal state-aligned designation). Instead the advisory:
    - Lists Killnet under the section "Russian-Aligned Cybercrime Groups", defined as: "Cybercrime
      groups are typically financially motivated cyber actors that seek to exploit human or security
      vulnerabilities to enable direct theft of money ... These groups pose consistent threats to
      critical infrastructure organizations globally."
    - Frames the alignment as INDEPENDENT + self-declared: "Since Russia's invasion of Ukraine in
      February 2022, some cybercrime groups have independently publicly pledged support for the Russian
      government or the Russian people ..."
    - Killnet entry in full: "Overview: according to open-source reporting, Killnet released a video
      pledging support to Russia. Victims: Killnet claimed credit for carrying out a DDoS attack against
      a U.S. airport in March 2022 in response to U.S. materiel support for Ukraine." (a self-claimed
      political pledge + a self-claimed DDoS — no state tasking, tolerance, or designation).
    - Carries the DECISIVE disclaimer: "Note: although some cybercrime groups may conduct cyber
      operations in support of the Russian government, U.S., Australian, Canadian, New Zealand, and UK
      cyber authorities assess that cyber criminals will most likely continue to operate primarily based
      on financial motivations ..." — i.e. the attributing authorities affirmatively DECLINE to treat
      these groups as state-directed/tolerated proxies.
  The advisory names NO Russian service for Killnet (FSB/GRU/SVR appear only against the state APTs
  Sandworm/APT28/APT29/Berserk Bear, in a different section) and provides no safe-harbor or formal
  state-aligned designation. The ru/proxies and ru/gru claims were therefore unsourced; the source
  supports at most "Russia-aligned, self-pledged hacktivist activity". State (RU) is well-assessed
  (Russian-language, anti-NATO/anti-Ukraine-supporter target set, self-pledge to Russia), but service
  placement is unresolved -> ru/unscoped (mirrors ir/unscoped/agrius). MISP Galaxy threat-actor cluster
  Killnet (ad2d6946-1ec2-4d77-b864-39980af4e103) likewise describes a pro-Russian hacktivist DDoS
  collective and asserts no Russian-service tasking — consistent with this demotion.
  The deeper criminal/ vs ru/ taxonomy call (whether the self-pledge + target set is enough to keep
  Killnet in the RU bucket at all, vs stateless criminal/killnet) is FLAGGED for human review and
  deliberately NOT made here. Note the repo is internally inconsistent on these hacktivist fronts —
  XakNet sits at ru/gru/xaknet (MSTIC/Mandiant-backed) and NoName057(16) at ru/proxies/noname05716
  (DOJ Dec 2025 state-sanctioned) — but those rest on OTHER sources and were out of scope for this audit
  (touched only Killnet + its sources + its events' actor_id).
  FK-propagated id change to the 2 referencing events on 2026-06-24.
