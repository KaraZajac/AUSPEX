# Demoted ru/proxies -> ru/unscoped on 2026-06-24 (claude-opus-4.8/max audit): the sole cited source
# (CISA AA22-110A) files Killnet under "Russian-Aligned Cybercrime Groups" — explicitly financially
# motivated and SELF-pledged ("released a video pledging support to Russia"), with the Five Eyes Note that
# such groups "will most likely continue to operate primarily based on financial motivations." No
# source-documented state nexus (no safe-harbor, no service tasking-overlap, no formal state-aligned
# designation, no FSB/GRU unit) — so the ru/proxies state-tolerated-PROXY claim and the ru/gru service
# were unsourced. State (RU) is assessed; service placement is unresolved -> ru/unscoped. See notes.
