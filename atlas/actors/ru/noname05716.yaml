ttp_summary: |
  DDoSia client distributed to volunteers; crypto-incentivized
  participation; 1,500+ claimed attacks since 2022. Layer-7 DDoS
  against Ukraine and NATO targets (Poland, Czechia, Lithuania,
  Italy, Germany, US). EU "Operation Eastwood" (Jul 2024) takedown
  of >100 servers across 13 countries and 6 arrest warrants. DOJ
  Dec 2025 announcement assessed NoName as a state-sanctioned
  project administered partially through CISM (Center for the
  Study and Network Monitoring of the Youth Environment),
  established by 2018 Russian presidential order.
notes: |
  Per DOJ Dec 2025 the link is "state-sanctioned" via CISM rather
  than direct GRU/FSB hierarchical control. AUSPEX treats this as
  proxy operationally; the state nexus is attested. `primary_service_id`
  defaults to ru/gru pending more granular attribution.
  AUDIT (2026-06-25, claude-opus-4.8/max): KEEP ru/proxies — the
  cited DOJ source (raw-verified, sha 261fa44…) DOCUMENTS state
  direction in its own words, well beyond a self-pledge: NoName is "a
  state-sanctioned project administered in part by an information
  technology organization established by order of the President of
  Russia in October 2018" (CISM = The Center for the Study and
  Network Monitoring of the Youth Environment), whose employees built
  NoName's DDoSia infrastructure; "the Russian government backed CARR
  and NoName by providing, among other things, financial support";
  and DOJ frames it as "state-sanctioned" hacktivism where "foreign
  intelligence services use civilians to obfuscate their malicious
  cyber activity." This is the killnet bar cleared (killnet was
  DEMOTED to ru/unscoped on a self-declared, Five-Eyes-disclaimed
  pledge; NoName has a formal state-sanction + a presidential-order
  state body administering its core tooling + state financial
  backing). CAVEAT on the SERVICE (not the proxies placement): the
  DOJ page never ties NoName to the GRU — all 3 GRU mentions attach to
  CARR / generic FBI framing; NoName's named controller is CISM, not
  the GRU. So `primary_service_id: ru/gru` is an unsourced default
  (the line-2 comment overstates it); a CISM-rooted or ru/unscoped
  service would be better-sourced. Service re-home FLAGGED for human
  review — out of scope here (placement keep/demote only). MISP-galaxy
  threat-actor NoName057(16) (e62937d0-…) describes only a pro-Russian
  DDoS hacktivist collective with cfr-suspected-state-sponsor = none —
  i.e. MISP does NOT corroborate the state nexus; it rests solely on
  the DOJ source.
