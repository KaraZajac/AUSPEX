ttp_summary: |
  Emerged April 2022 immediately following Conti's dissolution;
  widely assessed as a personnel reconstitution of Conti operators
  along with BlackByte, Royal, and Karakurt. Russian-speaking
  affiliate cluster. QakBot loader (pre-takedown), Cobalt Strike,
  Brute Ratel. Ascension Health (May 2024) intrusion produced
  multi-week outages across 140 hospitals — the most disruptive
  US-healthcare ransomware incident since 2021 (CISA AA24-131A).
  Internal chat-log leak (BlackBasta-leaks Feb 2025) exposed
  operator identities, target lists, and operator dynamics; partial
  fragmentation followed but operations have continued.
notes: |
  Direct Conti-ecosystem successor. The Conti / Black Basta /
  Royal / Karakurt / BlackByte split is documented on the Conti
  actor entry (`ru/proxies/conti`). State nexus is inherited
  rather than independently re-attested.
  AUDIT 2026-06-24 (claude-opus-4.8/max) — DEMOTED ru/proxies/black-basta -> ru/unscoped/black-basta.
  The actor's OWN two cited sources document NO Russian-state nexus: (1) CISA AA24-131A (#StopRansomware:
  Black Basta, 2024-05-10; the only fetchable source) characterizes the group purely as criminal —
  "Black Basta is considered a ransomware-as-a-service (RaaS) variant and was first identified in April
  2022. Black Basta affiliates have impacted a wide range of businesses and critical infrastructure..."
  with a "double-extortion model"; the stripped advisory body contains ZERO russian/FSB/GRU/SVR/Kremlin/
  Moscow/proxy/tolerate/harbor/sanction/nation-state tokens (the only "russia"/"state-sponsored" hits are
  Related-Advisories sidebar links to unrelated AA25-343A Pro-Russia Hacktivists and AA25-239A Chinese
  advisories). (2) The HHS HC3 Ascension bulletin (companion to AA24-131A) carries url: null (placeholder
  homepage URL, no wayback) and is a healthcare-sector incident alert — also no state-nexus framing —
  so it was noted+skipped (unfetchable). The ru/proxies placement rode entirely on inherited Conti
  lineage plus this record's own admission that "State nexus is inherited rather than independently
  re-attested" — i.e. it was never documented in a cited actor source. This mirrors the emotet demotion
  (inherited TrickBot/Conti coupling is not a documented state relationship for the crew itself).
  MISP CORROBORATION (canonical threat-actor.json): the cluster UUID 8191e28a-fb2d-4d50-b992-b877807a2f37
  (value UNC4393, origin Mandiant; synonyms Storm-1811 / CURLY SPIDER / STAC5777 / Cardinal) is described
  as "a financially motivated threat actor primarily using BASTA ransomware" with NO country /
  cfr-suspected-state-sponsor field and zero Russia/FSB/GRU/state-sponsor tokens — confirms profit-criminal,
  no documented state nexus.
  NOTE the wider chat-leak picture is NOT a cited actor source: the 2025-02 BlackBasta-leaks ("crossed the
  line by attacking Russian domestic banks") evidence Russia-BASED operations + a tacit expectation of
  protection (criminal self-protection), and the corpus models that only at confidence: plausible /
  concur-with-caveat on the leak event (techcrunch source, cited on the event, not the actor). That is not
  documented FSB/GRU/SVR tasking. Demoted WITHIN the ru nation (mirroring ir/unscoped/agrius + the emotet
  arc) rather than straight to criminal/ to leave the deeper taxonomy call to the human.
  FLAG: profit-criminal -> criminal/ candidate (per emotet) — re-home to criminal/black-basta if the human
  judges the inherited Conti nexus insufficient to keep Black Basta in the RU bucket. Keep ru/unscoped
