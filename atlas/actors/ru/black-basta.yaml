ttp_summary: |
  Emerged April 2022 immediately following Conti's dissolution;
  widely assessed as a personnel reconstitution of Conti operators
  along with BlackByte, Royal, and Karakurt. Russian-speaking
  affiliate cluster. QakBot loader (pre-takedown), Cobalt Strike,
  Brute Ratel. Ascension Health (May 2024) intrusion produced
  multi-week outages across 140 hospitals — the most disruptive
  US-healthcare ransomware incident since 2021 (CISA AA24-131A).
  Internal chat-log leak (BlackBasta-leaks Feb 2025) exposed
  operator identities, target lists, and operator dynamics; partial
  fragmentation followed but operations have continued.
notes: |
