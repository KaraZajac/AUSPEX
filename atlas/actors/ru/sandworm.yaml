ttp_summary: |
  Most-active, most-destructive Russian cyber unit. Tooling lineage:
  BlackEnergy3, Industroyer/Industroyer2, NotPetya, Olympic
  Destroyer, KillDisk, HermeticWiper, CaddyWiper, IsaacWiper,
  AcidRain, SwiftSlicer, FrostyGoop (Modbus-targeting ICS).
  Living-off-the-land OT techniques (Mandiant 2023 disclosure).
  False-flag tradecraft (Olympic Destroyer disguised as Lazarus/
  Chinese). Six officers (Andrienko, Detistov, Frolov, Kovalev,
  Ochichenko, Pliskin) indicted by DOJ Oct 2020. EU/UK sanctions.
  Mandiant promoted to named APT44 Apr 2024.
