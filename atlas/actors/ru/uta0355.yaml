ttp_summary: |
  Volexity-tracked Russia-nexus cluster (first reported April 2025)
  specializing in the abuse of Microsoft 365 OAuth and Device Code
  authentication workflows to steal M365 access tokens and seize
  account access without malware. Tradecraft observed in the
  October-November 2025 campaigns:

  Rapport-building spear-phishing of individuals working on foreign
  policy / European matters and former senior US government officials,
  using polished fake websites that impersonate real European security
  events (Belgrade Security Conference, Brussels Indo-Pacific Dialogue;
  related World Nuclear Exhibition-themed infrastructure also observed).
  Targets are lured into either an OAuth-code phishing flow — landing on
  a blank page whose URL carries the OAuth token, which the attacker
  asks them to paste back under the guise of "finalizing registration" —
  or a Microsoft Device Code phishing flow. The actor offers "live
  support" over Signal/WhatsApp to coax victims through returning the
  unique per-target URL.

  Post-compromise, UTA0355 registers a rogue device in Microsoft Entra
  ID to maintain persistent access, deliberately reusing the name of an
  existing legitimate device on the account to blend in, then downloads
  email data. Volexity observed follow-on access routed through a
  residential US (Comcast) IP belonging to a proxy network (per spur.us),
  consistent with residential-proxy operational relay.
