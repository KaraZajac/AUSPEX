ttp_summary: |
  Russian-speaking ransomware-as-a-service; one of the older
  surviving brands. Distinctive Windows Safe Mode reboot trick
  to evade endpoint protection during encryption. Notable victims:
  Defense contractor HENSOLDT France (2022), South African
  Department of Defense (2023). CISA AA23-263A (Sep 2023) joint
  advisory. Operator-affiliate model.
