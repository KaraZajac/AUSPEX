ttp_summary: |
  Pakistani-aligned APT first surfaced in Indian and Western
  vendor reporting in 2019, named for its deliberate mimicry of
  SideWinder (Indian-aligned) tradecraft — LNK lures, RTF
  exploits, HTA droppers — likely an attempt to muddy attribution
  in Indian SOC environments. The cluster operates alongside
  Transparent Tribe / APT36 and is often co-reported; some
  vendors treat SideCopy as a Transparent Tribe sub-cluster,
  others as a distinct grouping. Tooling includes the AllaKore
  RAT (open-source RAT family), ReverseRAT, ActionRAT, and the
  CetaRAT family. Target set is heavily Indian military and
  defense research with secondary government targeting.
default_doctrine_alignment_ids:
  - pk/asymmetric-posture-india/military-collection
  - pk/asymmetric-posture-india/kashmir-political
notes: |
  Former id pk/isi/sidecopy (asserted an unsourced ISI placement). DEMOTED to pk/unscoped on
  2026-06-24 after auditing the actor's three cited sources against their own words:
  - Seqrite "Operation SideCopy!" (2020) attributes the cluster to Transparent Tribe — "An insight
    into Transparent Tribe's sub-division which has been incorrectly attributed for years" and "We
    suspect this threat actor has links with Transparent Tribe APT group." The captured page contains
    no occurrence of "ISI", "Inter-Services Intelligence", or even "Pakistan"/"Pakistani".
  - Cisco Talos "InSideCopy" (2021) names no Pakistani intelligence service; "ISI" and "Inter-Services
    Intelligence" are absent. Strongest framing is SideWinder-TTP mimicry and India-targeting activity,
    with Transparent Tribe/APT36 mentioned but not equated.
  - The curated Cyble URL resolves to a generic blog index (article-level page not preserved / 404 on
    the canonical slug); the closest live Cyble SideCopy report attributes it only as "a subgroup
    operating within Transparent Tribe (APT36)" — no ISI named.
  No cited source names the ISI, the Inter-Services Intelligence, or any specific Pakistani service or
  military unit. The Pakistan nexus is well-supported through the Transparent Tribe / APT36 association
  (which is itself a Pakistan-aligned cluster), but the ISI service attribution is not — vendors say
  "Pakistani-aligned" / "Transparent Tribe sub-cluster", never the ISI. Hence pk/unscoped. (The pk/isi
  service file itself notes vendor reporting "typically attributes to 'Pakistani state-aligned actors'
  without sub-organizational granularity.") Keep pk/unscoped until a cited source names a service.
  Created the pk/unscoped placeholder service in the same change. FK-propagated the id change to the
  7 referencing events on 2026-06-24.
