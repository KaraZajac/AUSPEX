ttp_summary: |
  Canonical Pakistani-aligned APT. Tradecraft includes Crimson RAT
  (the long-running Windows staple) and its multi-OS expansion
  (CapraRAT for Android since 2022, including via cloned dating
  apps targeting Indian military personnel); Poseidon and Oblique
  RAT variants; macro-laden Word documents themed on Indian
  government circulars, military pension portals, DRDO documents,
  and education-sector lures (Cisco Talos 2022 documented student-
  focused phishing in Indian education); compromised Indian
  government and military websites for staging. The cluster is
  remarkable for operational continuity (active 2013 to present)
  rather than tradecraft sophistication.
