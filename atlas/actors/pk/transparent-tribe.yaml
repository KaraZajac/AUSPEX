notes: |
  Former id pk/isi/transparent-tribe (the pre-audit placement asserted an unsourced ISI / Inter-Services
  Intelligence affiliation). Demoted to pk/unscoped on 2026-06-24 after a full read of all six cited
  sources: the Pakistan nexus is well-supported at the named-actor level, but NO cited source names the
  ISI (or any specific Pakistani service) as the affiliating organ — they attribute only to the country:
    - Secureworks COPPER FIELDSTONE profile: "COPPER FIELDSTONE is a threat group operating out of
      Pakistan targeting primarily Indian diplomatic and military personnel."
    - Cisco Talos (2022): "Transparent Tribe is a suspected Pakistan-linked threat actor"; separately
      attributes infrastructure to "a Pakistani web hosting services provider 'Zain Hosting'."
    - SentinelLabs (2023): "Transparent Tribe is a suspected Pakistani actor known for targeting
      military and diplomatic personnel in both India and Pakistan."
    - MITRE ATT&CK G0134: "Transparent Tribe is a suspected Pakistan-based threat group."
    - Proofpoint (2016, the foundational disclosure) names neither the ISI nor Pakistan in the article
      body, stating the "exact nature and attribution associated with this APT remains under
      investigation" and that the actors may be "nation-states or private parties."
    - CYFIRMA (2023): UNFETCHABLE — the cited URL (cyfirma.com/research/) is a generic research landing
      page ("Out of Band Archive") with zero Transparent Tribe content; the specific report is not
      retrievable at the cited URL (live or Wayback) and so cannot supply an ISI quote either.
  External corroboration (not upgrading the placement): MISP galaxy "Operation C-Major / Transparent
  Tribe" lists country "PK" and CFR-suspected-state-sponsor "Pakistan" with no ISI sub-attribution.
  The wider literature widely calls APT36 "Pakistan-based" / "Pakistan-aligned"; the ISI organ is rarely
  named by vendors. Keep pk/unscoped until a cited source names a specific Pakistani service.
  FK-propagated the id change to the 20 referencing events on 2026-06-24.
  AUDIT (2026-06-24, claude-opus-4.8/max): service placement demoted ISI -> unscoped (above).
