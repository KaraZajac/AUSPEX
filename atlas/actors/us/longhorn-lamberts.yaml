auspex_assessment: |
  `concur` on attribution to CIA CCI / EDG. Symantec and Kaspersky
  technical clustering converged on the same target set; the
  WikiLeaks Vault 7 release (March 2017) and the SDNY conviction of
  Joshua Schulte (EDG developer, July 2022) provide documentary and
  judicial corroboration. The cluster is a vendor abstraction over a
  US covert-action service unit; AUSPEX preserves "Longhorn / The
  Lamberts" as the canonical alias mapped to us/cia/cci.
