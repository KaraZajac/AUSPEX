ttp_summary: |
  In-memory implants; custom AES with non-standard modes per Vault 7;
  modular post-exploitation. Specific named tools per Vault 7:
  Fluxwire (Symantec naming: Corentry), HIVE C2 framework, Brutal
  Kangaroo (air-gap jump via USB), Weeping Angel (Samsung TV firmware
  implant), Year Zero, Pandemic (file-share infection), ELSA (Wi-Fi
  geolocation), Athena. Symantec counted 40+ targets in 16 countries
  across Europe, Middle East, Asia, and Africa.
