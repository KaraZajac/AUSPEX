auspex_assessment: |
  `concur` on attribution to NSA TAO with very high confidence:
  Kaspersky 2015 technical clustering + Shadow Brokers 2016-17 leak
  containing internal TAO documentation and slang corroborates beyond
  reasonable doubt. The cluster as a discrete *unit* is a vendor
  abstraction over what is internally a structured organization
  (TAO sub-branches per Snowden); AUSPEX preserves Equation Group as
  the canonical alias mapped to the us/nsa/tao service.
notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): us/nsa/tao (+additional us/nsa) placement KEPT —
  the NSA is named by, and the Equation Group is tied to it by, the actor's OWN cited sources.
  Verified against each:
  • Kaspersky GReAT 2015 ("Equation: The Death Star...", raw captured) — as expected, this report
    deliberately does NOT name the NSA: its report body (19.5k chars, pre-comments) contains ZERO
    occurrences of "NSA" or "TAO"/"Tailored Access" and attributes only at the capability level —
    "The #EquationAPT group is probably one of the most sophisticated cyber attack groups in the
    world." (Every "NSA" string on the live page is in the reader COMMENTS, not Kaspersky's text.)
    So Kaspersky alone would NOT support the service placement.
  • Reuters/Menn 2015 ("Russian researchers expose breakthrough U.S. spying program") supplies the
    on-the-record Equation-Group → NSA TAO link via former-US-IC sources (the foundational
    attribution; see this source's own notes). The live URL is bot-blocked (HTTP 401 / DataDome)
    and not capturable here — noted as unfetchable in that source record, no snapshot added.
  • Pangu Lab 2022 (raw captured via Wayback; live cert expired) names the NSA in its very title —
    "Bvp47-美国NSA方程式组织的顶级后门" = "Bvp47 — Top-tier Backdoor of US NSA Equation Group"
    (美国NSA = US NSA; 方程式组织 = Equation Group) — and ties Equation tooling to the NSA via the
    Shadow Brokers leak: "2016年，知名黑客组织'影子经纪人'（The Shadow Brokers）宣称成功黑进了
    '方程式组织'，并于2016年和2017年先后公布了大量'方程式组织'的黑客工具和数据" ("In 2016 'The Shadow
    Brokers' claimed to have hacked the 'Equation Group' and in 2016–2017 released large quantities
    of 'Equation Group' hacking tools and data"), with Bvp47's activation key recovered from those
    leaked files. This is exactly the leak-correlation chain that qualifies as NSA-naming.
  • Der Spiegel 2013 ANT catalog (raw captured) independently corroborates the *service* directly
    from Snowden docs — "the Office of Tailored Access Operations, or TAO. This is the NSA's top
    operative unit" (NSA ×66, TAO ×40 in the captured text) — though it predates and does not use
    the "Equation Group" label.
  • The Intercept SIDtoday index (raw captured) names the NSA ("the NSA's most important division,
    the Signals Intelligence Directorate") but the captured landing page is the series index, light
    on TAO and silent on "Equation"; it is corroborating context, not the load-bearing link.
  Net: NSA named by 4 of 5 cited sources; the NSA←Equation identity rests on Reuters + Pangu Lab,
  and the specific TAO sub-unit on Reuters ("NSA TAO unit") + Spiegel ("Office of Tailored Access
  Operations"). Placement source-supported → KEEP. MISP-galaxy (7036fb3d-…, "Equation Group")
  corroborates the cluster and the NSA cross-walk. No demotion; no FK changes to the 7 referencing
  events.
