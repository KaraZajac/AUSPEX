ttp_summary: |
  Hard-drive firmware implants (EquationDrug, GrayFish); supply-chain
  interdiction (Cisco router shipping intercepts per Snowden; reported
  CD-ROM intercepts at Mecca attendee returns); zero-days at scale;
  persistent BIOS/UEFI implants; DoubleFantasy / TripleFantasy
  validators; the EternalBlue / EternalRomance / EternalChampion SMB
  exploits and DoublePulsar kernel implant later weaponized by DPRK
  (WannaCry) and Russia (NotPetya) after Shadow Brokers leak; the
  FuzzBunch exploitation framework. Targeting heavily skewed to Iran,
  Russia, Pakistan, Afghanistan, India, China, Syria, and Mali per
  Kaspersky telemetry.
default_doctrine_alignment_ids:
  - us/title-10-title-50
  - us/five-eyes
auspex_assessment: |
  `concur` on attribution to NSA TAO with very high confidence:
  Kaspersky 2015 technical clustering + Shadow Brokers 2016-17 leak
  containing internal TAO documentation and slang corroborates beyond
  reasonable doubt. The cluster as a discrete *unit* is a vendor
  abstraction over what is internally a structured organization
  (TAO sub-branches per Snowden); AUSPEX preserves Equation Group as
  the canonical alias mapped to the us/nsa/tao service.
