auspex_assessment: |
  `concur-with-caveat` on existence and structure. The sub-unit
  breakout rests entirely on the Snowden 2013 documentary leak; the
  post-2019 NSA reorganization (Cybersecurity Directorate stand-up,
  Computer Network Operations Directorate naming) is not fully public.
  AUSPEX preserves the sub-unit aliases for SIGINT-history mapping but
  most contemporary attribution should default to the Equation Group
  actor or the us/nsa/tao service rather than to a specific sub-unit.
notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): us/nsa/tao (+additional us/nsa) placement KEPT —
  the NSA/TAO unit is named directly, by name, in this actor's OWN primary cited source.
  Verified against each:
  • Der Spiegel 2013 "Inside TAO" / ANT catalog (raw captured, sha256 verified) is the load-bearing
    source and is the literal subject of this actor's ttp_summary. Names the NSA ×66 and TAO ×40 in
    the captured text and states the unit explicitly: "the Office of Tailored Access Operations, or
    TAO. This is the NSA's top operative unit -- something like a squad of plumbers that can be
    called in when normal access to a target is blocked." NSA's own on-the-record statement to
    Spiegel is quoted: "Tailored Access Operations is a unique national asset that is on the front
    lines of enabling NSA to defend the nation and its allies." The ANT-catalog implants enumerated
    here (the dossier's COTTONMOUTH/RAGEMASTER/JETPLOW/FEEDTROUGH/HALLUXWATER tooling) are this very
    NSA/TAO ANT material. This single source fully supports both the NSA placement and the specific
    TAO/ANT sub-unit. (NB the captured text does not surface the literal slugs "ROC"/"ANT"-expanded;
    "ANT" hits are coincidental QUANTUM-string matches, and "Remote Operations Center" ×0 in this
    page — the ROC/600-staff detail traces to the broader Snowden corpus, not verbatim here.)
  • The Intercept SIDtoday index (raw captured, sha256 verified) corroborates the NSA ("the internal
    newsletter for the NSA's most important division, the Signals Intelligence Directorate"; NSA ×11)
    and even names TAO once — a listed newsletter "Getting the 'Ungettable' Intelligence: An
    Interview with TAO's Teresa Shea" (Teresa Shea = then TAO chief). Corroborating, not load-bearing
    (the index page is light on TAO; the sub-unit detail lives in the linked newsletter batches).
  • WaPo 2013 black-budget (Gellman/Nakashima, 231 offensive ops / GENIE) — UNFETCHABLE here:
    washingtonpost.com bot-blocks unauthenticated curl (HTTP 000 / dropped connection) and WebFetch
    returned 403; archive.org blocked. No snapshot added (matches the source's own note); it is
    corroborating context, not the load-bearing link, so its unavailability does not affect the KEEP.
  MISP-galaxy carries no discrete "TAO sub-units" threat-actor entry (TAO/ANT live in the Snowden
  documentary record, not as a standalone galaxy actor; the related galaxy entry is "Equation Group",
  uuid 7036fb3d-…, which crosswalks Equation↔NSA) — so corroboration is the leaked-doc record itself.
  Net: NSA/TAO named verbatim by this actor's own primary source → KEEP. No demotion. No events
  reference this actor (grep actor_id: us/nsa/tao-sub-units → 0 hits), so no FK changes.
