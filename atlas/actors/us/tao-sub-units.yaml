ttp_summary: |
  Sub-unit cluster within NSA TAO documented via the Snowden archive
  (Der Spiegel "NSA Secret Toolbox" Dec 30, 2013; The Intercept
  SIDtoday). The ANT catalog (50 pages, $0–$250,000 implants) lists
  hardware/firmware tooling — RF retroreflectors (COTTONMOUTH,
  RAGEMASTER), router/firewall implants (JETPLOW for Cisco PIX,
  FEEDTROUGH for Juniper, HALLUXWATER for Huawei). ROC (S321) was
  reported at ~600 staff as of 2013, operating the remote-CNE side.
  Collection mission supports the broader SIGINT enterprise; the
  toolkit underwrites Equation Group-attributed operations.
