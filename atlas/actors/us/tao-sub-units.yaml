ttp_summary: |
  Sub-unit cluster within NSA TAO documented via the Snowden archive
  (Der Spiegel "NSA Secret Toolbox" Dec 30, 2013; The Intercept
  SIDtoday). The ANT catalog (50 pages, $0–$250,000 implants) lists
  hardware/firmware tooling — RF retroreflectors (COTTONMOUTH,
  RAGEMASTER), router/firewall implants (JETPLOW for Cisco PIX,
  FEEDTROUGH for Juniper, HALLUXWATER for Huawei). ROC (S321) was
  reported at ~600 staff as of 2013, operating the remote-CNE side.
  Collection mission supports the broader SIGINT enterprise; the
  toolkit underwrites Equation Group-attributed operations.
default_doctrine_alignment_ids:
  - us/title-10-title-50
  - us/five-eyes
auspex_assessment: |
  `concur-with-caveat` on existence and structure. The sub-unit
  breakout rests entirely on the Snowden 2013 documentary leak; the
  post-2019 NSA reorganization (Cybersecurity Directorate stand-up,
  Computer Network Operations Directorate naming) is not fully public.
  AUSPEX preserves the sub-unit aliases for SIGINT-history mapping but
  most contemporary attribution should default to the Equation Group
  actor or the us/nsa/tao service rather than to a specific sub-unit.
sources:
  - spiegel/2013-12-30_nsa-ant-catalog
  - intercept/2014-03-12_nsa-sidtoday
  - wapo/2013-08-30_black-budget-231-offensive-ops
