ttp_summary: |
  Russia-based cybercrime crew (CrowdStrike: "Scully Spider") behind DanaBot, a malware-as-a-service
  family first developed as a banking trojan in 2018 and later extended into an information stealer and
  loader for follow-on malware. DanaBot hijacks banking sessions and steals account credentials, device
  information, browsing histories and cryptocurrency-wallet data, and can achieve full remote access to
  record keystrokes and video of victim activity. At takedown the botnet had infected 300,000+ machines
  worldwide, causing 300,000+ infections and at least USD 50M in fraud/ransomware damage (DOJ, via
  CyberScoop, 2025-05-22). Distinctively, the operators ran a SECOND DanaBot variant dedicated to
  espionage — targeting military, government and diplomatic personnel across North America and Europe and
  exfiltrating to a separate server from the fraud build. CrowdStrike assesses this "direct use of
  criminal infrastructure for intelligence-gathering" as evidence the operators were "acting on behalf of
  Russian government interests," and SVP Adam Meyers told CyberScoop "the Russian government had access
  and was tasking this botnet and using it for espionage purposes." On 22 May 2025, under Operation
  Endgame, DOJ/FBI(Anchorage)/DCIS seized DanaBot's command-and-control servers and unsealed a 16-defendant
  grand-jury indictment + criminal complaint; two operators are publicly named — Aleksandr Stepanov (39)
  and Artem Aleksandrovich Kalinkin (34), both of Novosibirsk, Russia, neither in custody.
