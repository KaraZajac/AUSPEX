notes: |
  Placement KEPT at ru/proxies (LLM audit 2026-06-24, claude-opus-4.8/max). Unlike a bare Russia-based
  criminal crew, the cited source documents a STATE-TASKING / proxy nexus: CrowdStrike (named tier-1
