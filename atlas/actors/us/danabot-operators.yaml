  targeted military, government and diplomatic personnel and exfiltrated to separate infrastructure. That
  documented state intelligence-tasking overlap satisfies the docs/SCHEMA.md `<state>/proxies/` bar
  (source-documented state nexus / service tasking-overlap), so the actor stays in the Russian
  criminal-proxy ecosystem rather than stateless criminal/. primary_service_id is left null — the
  established convention for ru/proxies/* actors with no named SINGLE service organ (cf. lockbit, revil,
  conti's sibling crews); CrowdStrike names the government as tasker but not a specific service unit, so a
  null service + the ru/proxies id (which derives state = ru via actorStateId's 2-letter id-head fallback)
  is the correct, consistent representation. De-provisionalized from the 2026-05-30 backfill stub; the
  prior stub carried mission: [espionage] only and a placeholder ttp_summary.
