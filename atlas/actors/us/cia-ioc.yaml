notes: |
  Former id us/cia/ioc-actor (primary_service_id us/cia/ioc, additional us/cia).
  AUDIT (2026-06-24, claude-opus-4.8/max): DEMOTED to us/unscoped — the IOC service
  placement is over-specified and not verifiable at the operational level against the
  actor's sole cited source. That source, Bob Woodward's *Obama's Wars* (2010), is a print
  book (url: null, ISBN 978-1439172490) and is unfetchable for verbatim quoting; while it
  concerns the CIA broadly and (per the source record's own description) discusses the IOC's
  role in covert cyber/influence work, no cited source attributes a specific cyber OPERATION
  to the IOC sub-component. The record itself concedes this in its ttp_summary ("No canonical
  operations are publicly attributed to IOC specifically (as distinct from CCI / EDG); public
  knowledge derives from Bob Woodward's covert-action reporting rather than technical
  attribution") and auspex_assessment ("no specific cyber-incident attribution rests on IOC
  vs. CCI distinction in the public record"). Crucially, the WikiLeaks Vault 7 disclosures
  named the CIA's Center for Cyber Intelligence (CCI) and EDG — NOT the IOC — and the corpus
  already routes that technically-attributed CIA cyber activity to a separate, well-sourced
  record: us/cia/longhorn-lamberts @ us/cia/cci (Symantec + Kaspersky + WikiLeaks + DOJ Schulte
  conviction). The CIA-level interest is genuine, but the specific IOC operational-unit
  placement is unverified — hence us/unscoped (state established via the id head, service
  placement unresolved), mirroring the ir/unscoped/agrius precedent. additional_service_ids
  emptied so the record does not re-assert an unverified CIA service placement via the back
  door. No events reference this actor (FK grep over atlas/events/ = 0 matches), so no
  actor_id propagation was needed. Re-promote to us/cia/ioc only if a cited source is found
  that attributes a specific operation to the IOC (as distinct from CCI/EDG).
