  attributing_org per the §9 doctrine-without-attribution convention
  (the events are all publicly framed as CYBERCOM action but none names
  a specific CMF sub-unit/team). Recommend Kara decide between
  (a) retaining this as a us/unscoped forward-looking fallback for
