ttp_summary: |
  Close-access SIGINT — covert insertion of collection equipment in
  diplomatic premises and difficult-access targets. Operations attributed
  in the Snowden 2013 archive include Chancellor Angela Merkel's mobile
  communications (2002–2013, via US embassy Berlin), monitoring of EU
  institutions in Brussels, the Brazilian presidency under Dilma
  Rousseff, and the UN HQ wiretap in New York. STATEROOM is the cover
  name for embassy-rooftop collection; SCS reportedly operates in dozens
  of US diplomatic posts.
default_doctrine_alignment_ids:
  - us/title-10-title-50
  - us/five-eyes
auspex_assessment: |
  `concur-with-caveat` on attribution. Existence and general mission are
  documented across the Snowden archive (Der Spiegel, The Intercept
  SIDtoday) and James Bamford's *Body of Secrets*. Specific operations
  remain officially neither confirmed nor denied; the US government's
  October 2013 statement on Merkel collection was pointedly
  forward-looking. AUSPEX maps SCS to the joint us/scs service and uses
  this actor as the canonical anchor for SCS-attributed events
  (previously placeholdered to Equation Group in some early entries —
  flag those for re-anchoring in v0.1).
sources:
  - spiegel/2013-10-23_merkel-phone-tap
  - intercept/2014-08-15_sidtoday-scs
  - globo/2013-09-08_fantastico-nsa-petrobras
