id: us/olympic-games-team
primary_service_id: us/nsa/tao  # US side anchor; joint with CIA + IL Unit 8200
additional_service_ids:
  - us/cia
  - us/cia/cci
canonical_name: Olympic Games team (US + Israel joint)
aliases:
  - alias: Tilded Team
    assigning_org: Kaspersky (Tilded Platform malware family)
    confidence: overlapping
    note: |
      "Tilded Team" is the malware-family-cluster naming for the
      developers of Stuxnet/Duqu/Flame/Gauss; whether this is
      coextensive with or a subset of "the Olympic Games team" as
      journalistically described is unsettled.
  - alias: Equation-adjacent (sometimes conflated)
    assigning_org: informal
    confidence: disputed
    note: |
      Kaspersky has noted tradecraft and infrastructure overlap
      between Equation Group and the Stuxnet/Flame developers but
      treats them as distinct clusters. AUSPEX preserves the
      distinction.
  - alias: EQGRP
    assigning_org: MISP galaxy
    confidence: equivalent
active_since: 2005-01-01  # development circa 2005-2007
active_until: 2012-12-31  # related malware family ran 2009-2012; cluster reorganized
status: dormant  # operation publicly known; specific unit composition opaque; tooling presumably retired
mission:
  - sabotage
  - espionage
target_sector_ids:
  - energy/nuclear
  - government
  - government/foreign-ministry
  - energy/oil-gas
  - finance/banking  # Lebanese banking (Gauss)
ttp_summary: |
  Four-zero-day Windows worm (Stuxnet); PLC rootkit targeting Siemens
  S7-315/417 driving Iranian IR-1 centrifuges; spread via removable
  media to bridge air gaps; certificate theft from Realtek and JMicron
  for driver-signing; ICS-specific payload mutating centrifuge rotor
  speeds while spoofing SCADA feedback. Related malware family (Tilded
  Platform): Duqu (reconnaissance, 2011), Flame (massive 20MB modular
  toolkit with MD5-collision MITM of Windows Update, 2012), Gauss
  (financial-targeting against Lebanese banks, 2012).
default_doctrine_alignment_ids: []  # predates NSPM-13 / Defend Forward; foundational counter-proliferation case
auspex_assessment: |
  `concur-with-caveat` on attribution. Multi-source tier-1 journalism
  (Sanger 2012, Zetter 2014) and the Snowden 2013 IC corroboration
  establish high confidence that this was a joint US/Israeli operation.
  Never officially acknowledged by either government.

  **v0 schema gap flagged**: Olympic Games is a *joint US + Israel*
  operation. The current AUSPEX data model does not represent
  cooperating nation-states on the actor level (it does at the event
  level per DATA_MODEL §10 future v0.1 addition). For v0, the actor
  is anchored to us/ with Unit 8200 noted in the mission text;
  event-level attributions list both nation-states as appropriate.
