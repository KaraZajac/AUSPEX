  - us/cybercom/cmf
canonical_name: Cyber National Mission Force
aliases:
  - alias: CNMF
    assigning_org: DoD
    confidence: equivalent
  - alias: Russia Small Group (sub-element, 2018)
    assigning_org: USCYBERCOM (internal task-grouping)
    confidence: overlapping
    note: |
      The Russia Small Group (RSG) was a CNMF-internal sub-element
      stood up for the 2018 midterm cycle and credited with the IRA
      disruption. AUSPEX preserves RSG as an alias of CNMF for the
      2018-2019 period.
active_since: 2014-01-01
active_until: null
status: active
mission:
  - sabotage  # disruption
  - espionage  # Hunt Forward intelligence harvest
  - influence  # cost imposition via overt attribution
target_sector_ids:
  - ict/networking  # adversary infrastructure
  - government  # partner-state networks
  - critical-infrastructure  # election infrastructure (defensive)
ttp_summary: |
  Collaborative hunt with partner CERTs / intelligence services on
  partner-government networks (Hunt Forward); release of adversary
  indicators to VirusTotal under @CYBERCOM_Malware_Alert (hundreds
  of samples since 2018); kinetic-light disruption (DDoS, account
  actions, infrastructure removal) coordinated with FBI / Treasury /
  Microsoft DCU; sample collection from partner networks fed into
  CISA / Five Eyes advisories.
default_doctrine_alignment_ids:
  - us/hunt-forward
  - us/defend-forward
  - us/persistent-engagement
  - us/nspm-13
  - us/ndaa-1642
  - us/dod-cyber-strategy-2023
auspex_assessment: |
  `concur` on attribution. CNMF is self-announced via cybercom.mil
  press releases and Congressional testimony (Nakasone, Haugh,
  Mahlock). Mapped 1:1 to the us/cybercom/cnmf service.
sources:
