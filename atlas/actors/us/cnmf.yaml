auspex_assessment: |
  `concur` on attribution. CNMF is self-announced via cybercom.mil
  press releases and Congressional testimony (Nakasone, Haugh,
  Mahlock). Mapped 1:1 to the us/cybercom/cnmf service.
notes: |
  AUDIT (2026-06-25, claude-opus-4.8/max): service-placement audit — VERDICT
  KEEP. The us/cybercom/cnmf (Cyber National Mission Force) placement is
  source-supported at the named-unit level, the opposite of a structural
  placeholder: this actor is referenced by 13 events (Hunt Forward Ukraine /
  Estonia / Montenegro / Albania / Lithuania-Latvia-Croatia / Lithuania-2 /
  Canada / Kenya / Zambia / SOUTHCOM, the 2018 IRA disruption, the 2020 Trickbot
  disruption, and the cumulative VirusTotal disclosures), and the CNMF does
  named/disclosed operations. Of its 4 cited sources, two name the Cyber National
  Mission Force explicitly for specific disclosed ops: the 2022-12-19 sub-unified
  elevation release (the founding announcement of the unit itself) and Nakasone's
  May-2022 SASC posture testimony naming the CNMF hunt-forward team's Dec-2021
  Ukraine deployment. A third (the VirusTotal cumulative) is published by the
  "USCYBERCOM Cyber National Mission Force" itself. The WaPo IRA source attributes
  the 2018 op to "U.S. Cyber Command" at the command level and does NOT name the
  CNMF/"Russia Small Group" (verified via Lawfare's quoting) — consistent with the
  record already carrying "Russia Small Group" only as an OVERLAPPING alias.
  Provenance note: cybercom.mil hard-blocks automated capture (HTTP 403 to curl
  and WebFetch), VirusTotal is a JS SPA, WaPo bot-blocks, and archive.org is
  blocked here, so no raw snapshots were captured for the 4 sources; findings were
  corroborated against independent tier-1 reporting (DefenseScoop, Defense News,
  CyberScoop, Lawfare) with quotes recorded in each source's AUDIT note. MISP-
  galaxy carries no CNMF/CYBERCOM actor entry (it tracks US offensive activity
  only as the NSA/TAO "Equation Group" cluster — a different entity), as expected
  for a self-announced government unit rather than a vendor-clustered adversary.
sources:
  - cybercom/2022-12-19_cnmf-sub-unified-elevation
  - cybercom/cnmf-virustotal-cumulative
  - wapo/2019-02-27_nakashima-ira-disruption
  - nakasone/2022-05_senate-armed-services-testimony
