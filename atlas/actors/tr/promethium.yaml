notes: |
  Former id tr/mit/promethium (CURATED, asserted an unsourced MİT placement).
  AUDIT (2026-06-25, claude-opus-4.8/max): demoted to tr/unscoped. Each of the 4 cited sources
  was captured, hashed and read in full; NONE attributes the StrongPity/PROMETHIUM operation to
  the MİT (Millî İstihbarat Teşkilatı). Per-source findings:
  • Kaspersky (2016, "On the StrongPity Waterhole Attacks…") — pure malware/TTP analysis; makes
    NO nation/state attribution. "Turkey" appears only as victim geolocation ("almost all of the
    focus on systems in Turkey"; top-5 infected countries Italy, Turkey, Belgium, Algeria, France).
  • Citizen Lab (2018, "Bad Traffic") — attributes the Türk Telekom injection to "nation-state
    spyware" / FinFisher "lawful intercept" spyware "sold only to government entities", but states
    that "StrongPity was an unattributed APT operation in 2016." It names the MİT TWICE, both as
    surveillance-LAW background, not operational attribution: "The law authorizes the Turkish
    intelligence agency, Milli İstihbarat Teşkilatı (MIT), to 'collect data relating to external
    intelligence, national defense, terrorism, international crimes and cyber security passing via
    telecommunication channels.'"; and "MIT's practical implementation of the 2014 national
    security laws requires the cooperation of the Turkish telecommunications sector, which is
    centralized around Türk Telekom." Naming MİT in a description of Law No. 6532 is NOT an
    attribution of this operation to MİT.
  • Bitdefender (2020, "StrongPity APT") — strongest operational attribution, still only to
    "government": "It is believed that the attacks attributed to StrongPity are government-sponsored
    and are used for population surveillance and intelligence exfiltration"; places the threat "in
    the geo-political context of the constant conflicts between Turkey and the Kurdish community."
    No service is named; it does not even say "the Turkish government", only "government-sponsored".
  • MITRE ATT&CK G0056 — names NO attributing nation, sponsor, or confidence level: "PROMETHIUM is
    an activity group focused on espionage… with a heavy emphasis on Turkish targets." "Turkish"
    qualifies the TARGETS only. (Note: the prior ttp_summary claim that "MITRE attributes PROMETHIUM
    to Türkiye with moderate confidence" is unsupported by the cited MITRE page and was corrected.)
  Conclusion: a Turkish-state nexus is well-supported (nation-level / "government-sponsored"), but
  the MİT-specific service placement is NOT named by any cited source — hence tr/unscoped, pending a
  cited source that names a specific Turkish service. FK-propagated id change to the 8 referencing
  events on 2026-06-25.
