ttp_summary: |
  Long-running cluster behind the StrongPity malware family,
  documented by Kaspersky since 2016 and tied to Turkish state
  interests by subsequent vendor reporting (notably Citizen Lab's
  2018 disclosure of state-aligned use of FinFisher-style
  tooling via Türk Telekom Subway-style ISP-level redirection,
  which overlapped with PROMETHIUM tradecraft). Operations
  combine watering-hole compromises, ISP-level injection
  (documented in Syrian and Turkish ISPs), and trojanized
  installers of legitimate software (notarized installers
  of WinRAR, 7-Zip, others) to deliver the StrongPity implant.
  Targets include Kurdish opposition, Syrian dissidents in Turkey,
  and ICT / political targets across the Middle East. MITRE
  attributes PROMETHIUM to Türkiye with `moderate` confidence;
  some vendor reporting (Stealth Falcon / UAE overlap discussion)
  has muddied the attribution picture, though the Turkish-aligned
  reading is the consensus.
