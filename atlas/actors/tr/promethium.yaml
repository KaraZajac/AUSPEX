# Demoted to tr/unscoped 2026-06-25: of the 4 cited sources, NONE attributes the StrongPity/
# PROMETHIUM operation to the MİT. Closest is Citizen Lab (2018), which names "Milli İstihbarat
# Teşkilatı (MIT)" only as surveillance-law background and explicitly calls StrongPity "an
# unattributed APT operation in 2016." Strongest operational attribution is Bitdefender (2020):
# "government-sponsored" + Turkey/Kurdish geopolitical context — never the MİT specifically.
# Kaspersky (2016) makes no nation attribution (Turkey = victim geolocation only); MITRE G0056
# names no attributing nation ("Turkish targets" only). Turkish-state nexus is supported; the
# MİT-specific service placement is not — hence tr/unscoped.
