ttp_summary: |
  Most distinctive Turkish-aligned cluster, named by Cisco Talos
  in April 2019 for its operational signature: DNS-hijacking at
  the registrar and ccTLD-operator level to redirect target
  organizations' traffic to attacker-controlled infrastructure
  for credential capture. Targets in the 2017–2019 campaign
  documented by Talos and ICANN included country-code TLD
  operators (notably .net.cy / Cyprus), ministries of foreign
  affairs (Cyprus, Iraq, Albania, others), telecom operators
  serving Kurdish regions, and a small number of energy and
  intelligence-service targets. The cluster largely went quiet
  after 2019 attribution; Hunt & Hackett (January 2024) and
  Microsoft (March 2024) documented a Sea Turtle resurgence
  against Dutch ISPs serving Kurdish-diaspora and Telecom-and-
  ICT-services customers — operationally consistent with the
  pre-2019 pattern but oriented to diaspora-infrastructure.
