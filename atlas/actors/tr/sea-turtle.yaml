notes: |
  Former id tr/mit/sea-turtle. Demoted to tr/unscoped on 2026-06-25 (AUDIT, claude-opus-4.8/max):
  of the actor's 6 cited sources, NONE names the MIT (Millî İstihbarat Teşkilatı / National
  Intelligence Organization) or any specific Turkish service. Per-source findings:
    • Cisco Talos, "DNS Hijacking Abuses Trust In Core Internet Service" (2019-04-17): "We assess
      with high confidence that this activity is being carried out by an advanced, state-sponsored
      actor that seeks to obtain persistent access to sensitive networks and systems." No nation is
      named; "Turkey" appears only as one entry in the victim IP/country table (alongside Sweden,
      Syria, Armenia, US).
    • Cisco Talos, "Sea Turtle Keeps on Swimming" (2019-07-09): no mention of Turkey or the MIT at
      all (a follow-on documenting continued operations).
    • ICANN DNSSEC public statement (2019-02-22): generic call for full DNSSEC deployment in
      response to DNS-hijacking abuse; names no actor and no nation (predates the Talos attribution
      by two months). No MIT.
    • Hunt & Hackett, "Turkish espionage campaigns in the Netherlands" (2024-01-04): "Hunt & Hackett
      believes that Sea Turtle is a Turkey based Advanced Persistent Threat (APT) actor that is
      motivated by espionage"; the campaigns are "believed to have been orchestrated by a cyber
      threat actor operating in alignment with Turkish interests"; "intelligence gathering aligned
      with strategic Turkish interests … with the aim of advancing Turkey's interests." Never names
      the MIT or any intelligence service/agency.
    • Microsoft, "MARBLED DUST … DNS-Hijacking" (2024-03-05): unfetchable — url is null (the cited
      Microsoft blog slug returns 404 and no archived copy was located), so no raw snapshot could be
      captured and the text could not be re-verified for an MIT naming.
    • PwC, "Teal Kurma Overview" (2023-07): the cited URL resolves to PwC's generic CTI landing
      page, which contains no Teal Kurma / Sea Turtle content (0 mentions); the report body is not at
      this URL, so it supplies no service-naming statement.
  Turkey nexus is well-supported at the nation level (Talos: "state-sponsored"; Hunt & Hackett:
  "Turkey based" / "aligned with Turkish interests"; MISP-galaxy uuid ce7bba52-... sets country: TR
  but cfr-suspected-state-sponsor: None) — but the MIT *service* placement is unsourced. The existing
  tr/mit service file's own mission text already concedes vendors attribute Turkish-aligned clusters
  to "Turkish state-aligned" actors "without naming MIT versus military / signals lanes." Hence
  tr/unscoped until a cited source names a Turkish service. Placeholder service tr/unscoped was
  created 2026-06-25 (mirroring ir/unscoped) to hold this actor. FK-propagated id change to the 14
  referencing events on 2026-06-25.
