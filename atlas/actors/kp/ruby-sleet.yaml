# Created 2026-06-25 (claude-opus-4.8/max) to resolve a census mis-attribution flag: the event
# 2024-11/mstic-cyberwarcon-2024-details-ruby-sleet had actor_id kp/rgb/kimsuky, but Ruby Sleet is
# NOT Kimsuky. Microsoft's own threat-actor naming schema maps Ruby Sleet -> previous name CERIUM,
# whereas Kimsuky is Emerald Sleet (previous name THALLIUM). They share only CrowdStrike's loose
# "Velvet Chollima" tag; on the element-codename mapping they are distinct DPRK clusters. The sole
# cited corpus source (Microsoft MSTIC, CyberWarCon 2024) attributes Ruby Sleet only at the nation
# level ("a threat actor that Microsoft has been tracking since 2020", under a "North Korean ...
# threat actors" banner) and names NO DPRK service (RGB / MSS / Bureau 121) -> kp/unscoped.
id: kp/unscoped/ruby-sleet
primary_service_id: kp/unscoped
additional_service_ids: []
canonical_name: Ruby Sleet
aliases:
  - alias: CERIUM
    assigning_org: Microsoft (predecessor designation)
    confidence: equivalent
  - alias: Velvet Chollima
    assigning_org: CrowdStrike
    confidence: overlapping
    note: |
      A loose CrowdStrike cryptonym applied across several DPRK
      clusters (also associated with Kimsuky); not an exclusive
      identity for Ruby Sleet/CERIUM. Recorded as overlapping, not
      equivalent.
active_since: 2020-01-01  # Microsoft "tracking since 2020"
active_until: null
status: active
mission:
  - espionage
target_sector_ids:
  - aerospace/defense
  - aerospace/space
  - manufacturing/heavy
ttp_summary: |
  DPRK-nexus espionage cluster (Microsoft "Ruby Sleet", previous name
  CERIUM) focused on aerospace, defense, and satellite/weapons-systems
  organizations to collect technology aligned with North Korean
  military-modernization priorities. Tradecraft per Microsoft's
  CyberWarCon 2024 presentation: a December 2023 VeraPort supply-chain
  compromise of a South Korean firm (backdoored client beaconing to
  Ruby Sleet infrastructure); abuse of compromised legitimate
  code-signing certificates; backdoored VPN clients/installers.
  Distinct from Kimsuky (Emerald Sleet / THALLIUM) despite the shared
  loose "Velvet Chollima" cryptonym.
default_doctrine_alignment_ids:
  - kp/8th-congress-defense-plan/strategic-tech-collection
notes: |
  Created 2026-06-25 (claude-opus-4.8/max) from the EVENT-census flag on
  2024-11/mstic-cyberwarcon-2024-details-ruby-sleet, which had been wrongly attributed to
  kp/rgb/kimsuky. Ruby Sleet = Microsoft CERIUM, a DISTINCT actor from Kimsuky (= Emerald Sleet /
  THALLIUM); the two share only CrowdStrike's loose "Velvet Chollima" tag. The actor's sole cited
  corpus source (Microsoft MSTIC, CyberWarCon 2024 write-up) attributes only at the nation level —
  "a threat actor that Microsoft has been tracking since 2020", under a "North Korean ... threat
  actors" banner — and never names the RGB, MSS, Bureau 121, or any specific DPRK service. The DPRK
  nexus is well-supported at named-actor level; a service placement is not, hence kp/unscoped (cf.
  the sibling kp/unscoped/moonstone-sleet). NB: Malpedia attributes CERIUM to the MSS, but that is
  NOT stated in the cited corpus source, so it is not adopted here — keep kp/unscoped until a cited
  source names a service. MISP-galaxy / MITRE external_refs to be backfilled on the next MISP pass.
sources:
  - microsoft/2024-11_mstic-cyberwarcon-2024-details-ruby-slee
