ttp_summary: |
  Not a conventional APT — a state-directed remote-employment
  fraud ecosystem. Bureaucratic owners per OFAC sb0416 (May 2024)
  are the Munitions Industry Department of the WPK and the
  Ministry of External Economic Relations; the RGB facilitates
  through forged-documents support; downstream revenue flows
  through Office 39 to weapons procurement.

  Operational pattern: stolen US-citizen identities; AI-generated
  headshots and increasingly deepfaked interviews; "laptop farms"
  inside the US (the Christina Chapman model: 309 US businesses
  defrauded, 68 identities stolen, $17M documented revenue);
  routing of corporate laptops via shipping to PRC border cities
  then into DPRK; fake LinkedIn and GitHub personas; ETH-denominated
  wage receipt.

  June 2025 Microsoft Jasper Sleet blog documented a doctrinal
  evolution from passive wage-fraud to *post-termination data
  exfiltration and extortion* — the IT-worker scheme is now an
  active insider-espionage vector in addition to a revenue
  channel. Where IT-worker placement is at a crypto firm, the
  insider access can pivot directly to TraderTraitor crypto-theft.

  AUSPEX models this entity as both an actor (this file) AND a
  program (`kp/8th-congress-defense-plan/revenue-aggregation/it-worker-fraud`
  and `kp/byungjin/sanctions-evasion-revenue/it-worker-fraud`).
