ttp_summary: |
  Volexity-named 2021 campaign sub-cluster of APT37 distinguished
  by browser-exploit watering-hole tradecraft. Used IE/Edge
  zero-day chains to deliver BLUELIGHT and RokRAT to visitors of
  the Daily NK (South Korean DPRK-focused news outlet) website.
  Target set: defectors and journalists covering the DPRK.

  AUSPEX retains InkySquid as a discrete slug for that campaign's
  attribution clarity; broader APT37 reporting consolidates the
  activity under the parent cluster.
