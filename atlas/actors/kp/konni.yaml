# Demoted kp/rgb/konni → kp/unscoped/konni 2026-06-24: the actor's SOLE cited source
# (Cisco Talos 2017, "KONNI: A Malware Under The Radar For Years") makes NO service attribution
# whatsoever — it never names the RGB, never names the MSS, and never even asserts "DPRK"/
# "North Korean state-sponsored." Its strongest claim is a targeting/lure observation, hedged:
# "Clearly the author has a real interest in North Korea, with 3 of the 4 campaigns are linked
# to North Korea" — which is not an attribution to any service (or even to the DPRK state).
