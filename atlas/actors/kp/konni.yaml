notes: |
  Former id kp/rgb/konni (asserted an unsourced RGB / Reconnaissance General Bureau placement).
  Demoted to kp/unscoped on 2026-06-24 after auditing the actor's only cited source against the
  KEEP bar (a source must name the service). Cisco Talos (2017-05-03, "KONNI: A Malware Under The
  Radar For Years", https://blog.talosintelligence.com/konni-malware-under-radar-for-years/) makes
  NO attribution to any service: the words "Reconnaissance"/"RGB", "MSS"/"Ministry of State
  Security", "DPRK", "state-sponsored", "Lazarus" and "Kimsuky" do not appear in the article at all
  (the only "attribut*" strings are HTML boilerplate in the related-posts widget). Talos's strongest
  statement is a lure/targeting observation in the Conclusion — "Clearly the author has a real
  interest in North Korea, with 3 of the 4 campaigns are linked to North Korea" — explicitly hedged
  ("We don't know if the document is a legitimate compromised document or a fake that the attacker
  has created in an effort to be credible"). That describes the decoy documents and victims (UN /
  UNICEF / embassies linked to North Korea, a "Pyongyang Directory" lure), not the operator's
  sponsor, and does not even assert a DPRK-state operation, let alone a specific service.
  No service is named (no MSS mismatch to flag — Konni is sometimes linked to APT37/ScarCruft or
  the MSS elsewhere, but NOT by this cited source). The DPRK nexus itself is disputed in the wider
  literature (Talos itself only links the *campaigns' interest* to North Korea; the actor record's
  own aliases note "other vendors decline to make the DPRK attribution at all"), so even the kp/
  state head rests on weak/disputed grounds — but it is retained pending re-scoping; only the
  unsupported RGB service placement is demoted here. No referencing events exist
  (grep 'actor_id: kp/rgb/konni' over atlas/events/ returned zero), so no FK propagation was needed.
  Keep kp/unscoped until a cited source names a service.
