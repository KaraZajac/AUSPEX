ttp_summary: |
  Microsoft's contemporary name for the long-running AppleJeus
  cluster. Specialized in cryptocurrency-sector targeting via
  trojanized trading applications, exploit-driven RCE against
  crypto employees, and supply-chain pivots into crypto firms.

  Canonical Citrine Sleet operation: the August 2024 Chromium
  V8 type-confusion zero-day (CVE-2024-7971) exploited via
  voyagorclub[.]space with Windows sandbox escape and FudModule
  rootkit (admin-to-kernel; previously used by Diamond Sleet,
  evidencing tooling-sharing across DPRK clusters).

  AUSPEX attributes the 3CX supply-chain compromise (March 2023)
  to Citrine Sleet / UNC4736 per Mandiant cluster boundary,
  rather than to Lazarus core.
