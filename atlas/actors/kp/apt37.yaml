# Demoted kp/mss/apt37 -> kp/unscoped/apt37 on 2026-06-24 (claude-opus-4.8/max): of the actor's
# four cited sources, NONE names the MSS (Ministry of State Security) or any DPRK service. Mandiant
# 2018 attributes APT37 only "on behalf of the North Korean government" (high confidence); Kaspersky
# 2016 (Operation Daybreak) names no nation at all ("unknown attackers" / "ScarCruft APT group");
# Cisco Talos 2018 (Group123) declines nation-state attribution ("origin of this group is from the
# Korean peninsula"); Volexity 2021 (InkySquid) says only "North Korean APT" and defers its
# attribution method to a follow-up post. Nation nexus (North Korea) is sourced; the MSS service
# placement is not. The MSS-vs-RGB question for APT37 is debated in the wider literature; keep
# kp/unscoped until a cited source names a service. See notes + per-source AUDIT quotes below.
