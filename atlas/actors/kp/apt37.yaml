ttp_summary: |
  North-Korean-government-backed espionage cluster (Mandiant 2018:
  "carried out on behalf of the North Korean government") focused on
  individuals and entities that threaten regime political security:
  defectors, dissidents, journalists, ROK/JP policy entities.
  Operationally distinct from Kimsuky despite target overlap — less
  financial motivation, more individual-targeting tradecraft. (The
  cited sources do not name a specific DPRK service for APT37 — see
  notes; hence kp/unscoped, not kp/mss or kp/rgb.)

  Tradecraft: Hangul Word Processor (HWP) zero-days and weaponized
  documents; ROKRAT, Chinotto, GoldBackdoor malware families;
  historical Flash zero-day chains (CVE-2018-4878, CVE-2016-4171);
  post-2023 LNK-based infection chains. Geographic targeting
  beyond Korea: Japan, Vietnam, Middle East (Kuwait, Romania),
  Russia, India, Nepal, China.
default_doctrine_alignment_ids:
