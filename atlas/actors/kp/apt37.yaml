ttp_summary: |
  MSS-attributed espionage cluster focused on individuals and
  entities that threaten regime political security: defectors,
  dissidents, journalists, ROK/JP policy entities. Operationally
  distinct from RGB-Kimsuky despite target overlap — less
  financial motivation, more individual-targeting tradecraft.

  Tradecraft: Hangul Word Processor (HWP) zero-days and weaponized
  documents; ROKRAT, Chinotto, GoldBackdoor malware families;
  historical Flash zero-day chains (CVE-2018-4878, CVE-2016-4171);
  post-2023 LNK-based infection chains. Geographic targeting
  beyond Korea: Japan, Vietnam, Middle East (Kuwait, Romania),
  Russia, India, Nepal, China.
