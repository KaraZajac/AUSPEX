ttp_summary: |
  Strategic and political intelligence collection against
  nuclear / foreign-policy targets. Long-tail spear-phishing
  impersonating journalists / researchers; credential harvesting
  via fake login pages for Naver, Google, Daum, university SSO;
  BabyShark, KLogEXE (Palo Alto Sept 2024), FPSpy malware
  families. Mandiant March 2023 APT43 report uniquely documented
  that the cluster *self-funds* through small-scale cybercrime
  to purchase operational infrastructure — a doctrinal innovation
  decoupling espionage tasking from centrally allocated budget.

  Treasury's November 30 2023 designation sanctioned Kimsuky as a
  DPRK government cyber actor responsible for stealing strategic
  intelligence. ROK MOFA imposed counterpart sanctions
  contemporaneously.

  Dossier consensus places Kimsuky under RGB, with some elements
  likely UFD-tasked on diaspora targeting. The Mandiant March
  2024 "Not So Lazarus" mapping retains this placement.
default_doctrine_alignment_ids:
  - kp/strategic-information/policy-collection
  - kp/juche/internal-security
  # removed kp/8th-congress-defense-plan/strategic-tech-collection 2026-07-02: per Mandiant
  # APT43, Kimsuky's mission is strategic/foreign-policy/nuclear-diplomacy intelligence
  # (strategic-information), NOT the 8th-Congress technical weapons-component collection
  # (missile/submarine/satellite) — that pillar is Andariel's lane.
