ttp_summary: |
  Mandiant's October 2018 report separated APT38 from the Lazarus
  core on tradecraft distinctness: long, careful pre-positioning
  (often months) inside target banks; SWIFT Alliance Access
  message manipulation; local-printer subversion to suppress
  fraudulent-transfer evidence; FASTCash ATM-cashout malware
  (CISA AA20-239A BeagleBoyz). Operationally has migrated from
  SWIFT-network targeting (2014–2019) to direct cryptocurrency
  exchange theft (2018+).

  Named victims include banks in Bangladesh (2016 — $81M), Vietnam
  (Tien Phong, attempted), Taiwan (Far Eastern International,
  ~$60M), Mexico (Bancomext attempted), Chile (BancoEstado),
  Malta (Bank of Valletta 2019), India (Cosmos Bank 2019 FASTCash
  $13.5M), and multiple crypto exchanges.
