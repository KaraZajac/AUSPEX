ttp_summary: |
  Dual-mission cluster: strategic-intelligence collection against
  defense / aerospace / nuclear / government targets, *plus*
  healthcare-sector ransomware (Maui) used to self-fund those
  operations per the July 2024 Rim Jong Hyok DOJ indictment.
  Estimated ~1,600 personnel per historical ROK MND figures.

  Tradecraft: Maui ransomware (custom, manually deployed, AES
  with operator-supplied keys); exploitation of public-facing
  applications (Log4Shell CVE-2021-44228; TerraMaster OS
  CVE-2022-24990; SonicWall SMA100 CVE-2021-20038); long-dwell
  defense-network intrusions; PRC-routed money laundering to
  fund operational infrastructure.

  Named target sets in the 2024 indictment: US hospitals (Maui
  victims, May 2021–2023); NASA Office of Inspector General; 4
  US defense contractors; 2 US Air Force bases; ROK and Taiwan
  defense industrial base. Symantec/Broadcom documented continued
  Stonefly extortion operations against 3 US organizations in
  August 2024, post-indictment.
