# KEPT kp/rgb (service verified 2026-06-25, claude-opus-4.8/max — see source AUDIT notes).
# This actor's own load-bearing source names the Reconnaissance General Bureau and ties it to
# BlueNoroff by its exact canonical name (the andariel case, not the tradertraitor case):
# OFAC 2019-09-13 (treasury/2019-09-13_dprk-lazarus-bluenoroff-andariel, tier=primary, raw-
# verified, sha 11307c91…) — "...commonly known ... as 'Lazarus Group,' 'Bluenoroff,' and
# 'Andariel' as agencies, instrumentalities, or controlled entities of the Government of North
# Korea ... based on their relationship to the Reconnaissance General Bureau (RGB). Lazarus
# Group, Bluenoroff, and Andariel are controlled by the U.S.- and United Nations (UN)-
# designated RGB, which is North Korea's primary intelligence bureau." The second cited source
# (kaspersky/2017-04-03_lazarus-under-the-hood, tier=secondary) coined the BlueNoroff name and
# is a cluster-definition source — it does NOT name the RGB (raw term-scan RGB=0/Bureau=0) and
# does not carry the service claim, mirroring Mandiant-2018 in the apt38 case. MISP-galaxy
# (context only): the KP "Lazarus Group" entry lists "Bluenoroff"/"Subgroup: Bluenoroff" plus
# "Bureau 121"/"Unit 121" as synonyms, consistent with RGB-family placement. The actor id path
# is kp/rgb/bluenoroff and primary_service_id is kp/rgb/lab-110 (RGB → Lab 110, a sub-bureau);
# the OFAC source establishes the RGB level — the Lab-110 sub-placement is a finer call carried
# by the broader Lazarus-family literature, not refuted by either cited source. Both retained.
