ttp_summary: |
  Kaspersky's name for the DPRK financial-theft cluster, coined
  in their initial Lazarus follow-up research. Operationally
  overlaps heavily with Mandiant's APT38. BlueNoroff has been
  reported with a heavier emphasis on cryptocurrency targeting in
  the post-2018 era (versus APT38's SWIFT-era heritage), but the
  distinction is not consistently drawn across vendors. Treasury's
  September 2019 designation explicitly named BlueNoroff alongside
  Lazarus and Andariel.
