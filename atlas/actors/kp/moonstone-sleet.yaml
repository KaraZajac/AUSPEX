ttp_summary: |
  Microsoft-named DPRK cluster (May 2024) that began as a Diamond
  Sleet code-reuser before diverging. Operationally distinct from
  Diamond Sleet but began as a Diamond Sleet code-reuser,
  suggesting personnel migration or shared parent organization.

  Hybrid mission: cyberespionage, revenue (FakePenny custom
  ransomware, ~$6.6M demand April 2024), and access acquisition
  through unusually creative cover. Tradecraft: trojanized
  PuTTY and SumatraPDF; fake-company social engineering
  ("StarGlow Ventures," "C.C. Waterfall"); malicious game
  DeTankWar; npm-package distribution (August 2024 follow-on).
