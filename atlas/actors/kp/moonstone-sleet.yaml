ttp_summary: |
  Microsoft-named DPRK cluster (May 2024) that began as a Diamond
  Sleet code-reuser before diverging. Operationally distinct from
  Diamond Sleet but began as a Diamond Sleet code-reuser,
  suggesting personnel migration or shared parent organization.

  Hybrid mission: cyberespionage, revenue (FakePenny custom
  ransomware, ~$6.6M demand April 2024), and access acquisition
  through unusually creative cover. Tradecraft (per the May-2024
  MSTIC disclosure): trojanized PuTTY (the trojanized SumatraPDF
  vector belonged to Diamond Sleet, not Moonstone Sleet — MSTIC
  cites it only as a prior-art comparison); fake-company social
  engineering ("StarGlow Ventures," "C.C. Waterfall"); malicious
  game DeTankWar; and malicious npm packages (documented in the
  same May-2024 disclosure, not an August-2024 follow-on).
