  - kp/8th-congress-defense-plan/strategic-tech-collection
notes: |
  Former id kp/rgb/moonstone-sleet (which asserted an RGB service placement). Demoted to
  kp/unscoped on 2026-06-24 after auditing the actor's sole cited source. Microsoft MSTIC's
  "Moonstone Sleet emerges as new North Korean threat actor with new bag of tricks"
  (2024-05-28) attributes the cluster ONLY at the nation level: it "is North Korean
  state-aligned and uses both a combination of many tried-and-true techniques used by other
  North Korean threat actors and unique attack methodologies," and the activity is described
  as "linked to a North Korean state-sponsored threat actor." The article never names the
  Reconnaissance General Bureau (RGB), Bureau 121, Unit 121, Lab 110, or any specific DPRK
  service — the strings "Reconnaissance", "bureau", and "Unit 121" do not occur in it at all.
  The DPRK nexus is well-supported at the named-actor level; the RGB service placement is not,
  hence kp/unscoped. The MISP galaxy's cross-walk of the Lazarus family to Unit 121 / Bureau 121
  is a galaxy synonym signal, NOT a claim in the cited source, so it cannot carry the placement.
  Keep kp/unscoped until a cited source names a specific DPRK service for this cluster.
  FK-propagated id change to the 2 referencing events on 2026-06-24.
