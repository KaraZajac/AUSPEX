ttp_summary: |
  North Korean / DPRK state-sponsored cluster (Lazarus/APT38
  subset, per CISA AA22-108A and the FBI Harmony/Stake/DMM/Bybit
  attributions) specialized in cryptocurrency theft via supply-
  chain attacks on Web3 vendors, fake-recruiter social engineering
  of crypto-firm employees, and trojanized crypto-trading
  applications. NB: the cited USG sources name only "North
  Korea"/"DPRK"/"Lazarus (APT38)"/"TraderTraitor" — none names the
  RGB or any sub-bureau, so no service is asserted (see notes).
  Canonical tradecraft: trojanized cryptocurrency trading apps
  (CelasTradePro, JMTTrading, Union Crypto Trader, Kupay Wallet,
  CoinGoTrade, Dorusio, Ants2Whale); fake LinkedIn recruiters
  delivering malicious "coding tests"; npm/PyPI package poisoning;
  Chromium V8 zero-day (CVE-2024-7971) with FudModule rootkit;
  cascading supply-chain pivots (3CX → X_TRADER → downstream
  crypto firms; JumpCloud → ~5 crypto customers;
  Safe{Wallet} → Bybit).

  Attributed in CISA AA22-108A (April 2022); FBI IC3 PSAs on
  Harmony (Jan 2023), Stake.com (Sept 2023), DMM Bitcoin (Dec
  2024), and Bybit (Feb 2025). Treasury's April 2022 Ronin SDN
  designation was the first DPRK crypto-wallet SDN.
