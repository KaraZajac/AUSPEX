notes: |
  AUDIT (2026-06-24, claude-opus-4.8/max): SERVICE PLACEMENT DEMOTED kp/rgb/3rd-bureau →
  kp/unscoped. Former id kp/rgb/tradertraitor (former additional_service_ids: [kp/rgb]).
  Each of the 6 cited sources was fetched and read against its raw text; NONE names the RGB /
  Reconnaissance General Bureau / 3rd Bureau / Bureau 121 / Lab 110. Per-source verbatim:
  - CISA AA22-108A (2022-04-18): titled "TraderTraitor: North Korean State-Sponsored APT
    Targets Blockchain Companies"; "This group is commonly tracked by the cybersecurity
    industry as Lazarus Group, APT38, BlueNoroff, and Stardust Chollima." No service named.
  - FBI Harmony (2023-01-23): "the North Korean malicious cyber actor group Lazarus (also
    known as APT38) was responsible…"; "the Lazarus Group (also known as APT38), cyber actors
    associated with the DPRK". No service named.
  - FBI Stake.com (2023-09-06): "attributes it to the Lazarus Group (also known as APT38)
    which is comprised of DPRK cyber actors." No service named.
  - FBI/DC3/NPA DMM Bitcoin (2024-12-23): "North Korean Cyber Actors, Tracked as
    TraderTraitor, Responsible for Theft of $308 Million USD from Bitcoin.DMM.com". No
    service named.
  - FBI IC3 Bybit PSA (2025-02-26, PSA250226): "the Democratic People's Republic of Korea
    (North Korea) was responsible…"; "FBI refers to this specific North Korean malicious cyber
    activity as 'TraderTraitor.'"; "North Korean TraderTraitor actors." NO service / sub-bureau
    appears anywhere in the PSA (verified by raw extraction AND an independent fetch). This
    REFUTES the prior source-note claim that the PSA "explicitly maps TraderTraitor to the 3rd
    Bureau of the RGB" — it does not; that claim was the sole basis for the sub-bureau placement.
  - OFAC Ronin/Axie (2022-04-14, "North Korea Designation Update"): SDN-list update only —
    "LAZARUS GROUP (a.k.a. 'APPLEWORM'; … 'HIDDEN COBRA'; … 'OFFICE 91'; … 'ZINC'), …
    Pyongyang". Term scan of the OFAC primary: RGB=0, "Reconnaissance"=0, WMD=0, ballistic=0.
    This REFUTES the prior note's claim that the action "attributes the theft to Lazarus Group
    / Reconnaissance General Bureau (RGB) … WMD and ballistic-missile programs."
  The RGB-naming authority for the Lazarus family is the Sept-2019 OFAC designation (Lazarus/
  Bluenoroff/Andariel "controlled by the … Reconnaissance General Bureau (RGB)") and the 2020
  State advisory — BOTH cited by the kp/rgb SERVICE record, NEITHER cited by this actor. DPRK /
  "North Korean" nexus is solidly attested at the named-actor level (Lazarus/APT38/
  TraderTraitor); the service placement is not source-supported here. Keep kp/unscoped until a
  cited source names a service. FK-propagated the id change to the 10 referencing events.
  Corroboration (not cited, context only): MISP galaxy and vendor reporting describe
  TraderTraitor as a Lazarus subgroup "under the RGB," consistent with — but not a substitute
  for — a cited primary; placement still abstains pending a cited service-naming source.
