# KEPT at kp/rgb (service verified 2026-06-25, claude-opus-4.8/max LLM audit — see source
# AUDIT notes). The actor's OWN cited sources name the Reconnaissance General Bureau (RGB)
# for Lazarus Group by its EXACT CANONICAL NAME, not merely "North Korean"/"DPRK":
#  - Sept-2019 OFAC (treasury/2019-09-13_…, govt-primary, raw sha 11307c91…): "'Lazarus
#    Group,' 'Bluenoroff,' and 'Andariel' … based on their relationship to the Reconnaissance
#    General Bureau (RGB). Lazarus Group, Bluenoroff, and Andariel are controlled by the …
#    RGB, which is North Korea's primary intelligence bureau." (load-bearing, named-actor →
#    named-service).
#  - DOJ 2021-02-17 indictment release (govt-primary, raw sha 4e3209c4…): defendants "were
#    members of units of the Reconnaissance General Bureau (RGB) … known by multiple names …
#    including Lazarus Group and Advanced Persistent Threat 38 (APT38)."
#  - MITRE ATT&CK G0032 (tertiary): "Lazarus Group is a North Korean state-sponsored cyber
#    threat group attributed to the Reconnaissance General Bureau (RGB)."
#  - Mandiant Not-So-Lazarus (secondary): "Reconnaissance General Bureau: 3rd Bureau — Lab
#    110 … the focal point for the Lazarus Group Umbrella."
# kp/rgb is the correct primary_service_id. No id change; no FK propagation. The contrast
# with kp/unscoped/tradertraitor (demoted) is that TraderTraitor's own cited sources named
# only DPRK/Lazarus, never a service — whereas Lazarus's own sources name the RGB four times.
