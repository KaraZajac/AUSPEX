ttp_summary: |
  Umbrella cluster comprising operational sub-units: APT38
  (financial / SWIFT), BlueNoroff (financial / crypto), Andariel
  (military-intel / ransomware-for-revenue), TraderTraitor
  (crypto / supply-chain). Tradecraft includes spear-phishing
  with weaponized documents, supply-chain compromise (3CX 2023,
  JumpCloud 2023), MagicLine4NX / X-Trader, and bespoke RATs
  (MagicRAT, YamaBot, AppleJeus crypto-trading lures). Lazarus
  pioneered the destructive-wiper pattern in financial intrusions
  (Bangladesh 2016) to hinder forensic recovery.
