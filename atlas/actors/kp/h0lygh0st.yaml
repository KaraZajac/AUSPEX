ttp_summary: |
  Microsoft-named DPRK-aligned opportunistic ransomware operation,
  covered in MSTIC July 2022 reporting and CISA's February 2023
  AA23-040A #StopRansomware DPRK advisory. Lower-tier revenue
  profile than Maui (Andariel) or FakePenny (Moonstone Sleet);
  small/medium business targeting; ransom demands ~1.2–5 BTC.

  AUSPEX treats H0lyGh0st as a distinct DPRK-nexus sub-cluster; the
  dossier flags it as one of the less-prominent named clusters. Service
  placement is unresolved (kp/unscoped) — no cited source names a
  specific DPRK service for it (see notes).
default_doctrine_alignment_ids:
  - kp/8th-congress-defense-plan/revenue-aggregation
  - kp/office-39-sanctions-evasion
notes: |
  Former id kp/rgb/h0lygh0st (which asserted an RGB service placement). Demoted to
  kp/unscoped on 2026-06-24 after auditing both cited sources against raw snapshots.
  Neither source names the Reconnaissance General Bureau (RGB), Bureau 121, Unit 121,
  or Lab 110 for this cluster:
  - Microsoft MSTIC, "North Korean Threat Actor Targets Small and Midsize Businesses
    with H0lyGh0st Ransomware" (2022-07-14): attributes only at the nation level —
    "A group of actors originating from North Korea that Microsoft Threat Intelligence
    Center (MSTIC) tracks as DEV-0530 has been developing and using ransomware in attacks
    since June 2021." It ties DEV-0530 to PLUTONIUM/Andariel ("MSTIC assesses that DEV-0530
    has connections with another North Korean-based group tracked as PLUTONIUM (aka
    DarkSeoul or Andariel)") but explicitly hedges the state nexus itself: "it is equally
    possible that the North Korean government is not enabling or supporting these ransomware
    attacks. Individuals with ties to PLUTONIUM infrastructure and tools could be moonlighting
    for personal gain." The 101 "RGB" string hits in the raw HTML are CSS color codes
    (rgb()/rgba()/--*-rgb:), not the bureau acronym.
  - CISA AA23-040A #StopRansomware (2023-02-09): attributes generically to "DPRK
    state-sponsored" actors; the raw snapshot has 0 occurrences of "Reconnaissance General
    Bureau", "RGB", "Bureau 121", "Unit 121", or "Lab 110" (the single "Reconnaissance" hit
    is "reconnaissance activities", a tradecraft verb).
  MISP's canonical Storm-0530 entry (uuid 47945864-c233-46e7-8b96-b427b97b0ebf, matching
  external_refs.misp_galaxy) places the cluster at country KP with
  cfr-suspected-state-sponsor = None — nation-level only, no service — so it cannot carry the
  RGB placement either. The DPRK nexus is well-supported; the RGB service placement is not.
  Keep kp/unscoped until a cited source names a specific DPRK service for this cluster.
  FK-propagated id change to the 2 referencing events on 2026-06-24.
sources:
