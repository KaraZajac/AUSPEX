    confidence: equivalent
  - alias: PLUTONIUM
    assigning_org: Microsoft (pre-2023 taxonomy)
    confidence: overlapping
    note: |
      Microsoft's PLUTONIUM designation also covered Andariel /
      Onyx Sleet. The H0lyGh0st sub-cluster is treated separately
      in the July 2022 MSTIC blog.
