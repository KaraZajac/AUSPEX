# Demoted to kp/unscoped 2026-06-24: neither cited source names the RGB. Microsoft MSTIC
# (2022-07-14) attributes H0lyGh0st/DEV-0530 only at the nation level — "originating from
# North Korea" / "North Korea-based actors" — and explicitly hedges even the state nexus
# ("equally possible that the North Korean government is not enabling or supporting these
# ransomware attacks"; a "moonlighting for personal gain" theory). It ties DEV-0530 to
# PLUTONIUM (Andariel) but never names the Reconnaissance General Bureau, Bureau 121,
# Unit 121, or Lab 110. The 101 "RGB" string hits in the raw HTML are CSS color codes
# (rgb()/rgba()/--*-rgb:), not the bureau. The CISA AA23-040A advisory attributes generically
# to "DPRK state-sponsored" actors (0 occurrences of "Reconnaissance General Bureau"/"RGB").
# MISP's canonical Storm-0530 entry places it at country KP with cfr-suspected-state-sponsor
# = None — nation-level, no service. So DPRK nexus is supported; RGB placement is not.
id: kp/unscoped/h0lygh0st
primary_service_id: kp/unscoped
additional_service_ids: []
canonical_name: H0lyGh0st
