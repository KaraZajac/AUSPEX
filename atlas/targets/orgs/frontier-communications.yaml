summary: |
  US residential-broadband and telecom carrier serving
  approximately 3 million subscribers across 25 states. In April
  2024 RansomHub claimed responsibility for exfiltrating
  approximately 5GB of subscriber and corporate data following
  an intrusion that briefly disrupted customer-facing operations.
  Frontier disclosed the incident via SEC 8-K April 18, 2024.
