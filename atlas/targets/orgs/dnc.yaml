summary: |
  Governing body of the US Democratic Party. Target of the 2015–2016
  hack-and-leak operation attributed by the US Intelligence Community
  to GRU Units 26165 and 74455, in which exfiltrated emails were
  laundered through the DCLeaks and Guccifer 2.0 personas and
  WikiLeaks to influence the 2016 US presidential election. The
  defining case of cyber-enabled election interference in the
  attributed-to-Russia canon and the foundation of the 2018 Mueller
  GRU-twelve indictment.
