summary: |
  London-headquartered auction house and one of the two largest
  in the world (alongside Sotheby's). In May 2024 — days before
  a USD 840M planned spring auction season — RansomHub claimed
  responsibility for a network intrusion and exfiltration of
  client KYC and identity data covering approximately 500,000
  art-buyer profiles. Christie's confirmed the incident via
  public statement May 30, 2024.
