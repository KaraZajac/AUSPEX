summary: |
  US auto-dealer management SaaS vendor (~15,000 dealership
  customers across North America). In June 2024 a BlackSuit
  ransomware intrusion forced a multi-week outage of dealership
  operations; CDK reportedly paid approximately USD 25M in
  Bitcoin ransom. Anderson Economic Group estimated industry-
  wide impact of approximately USD 1B from the outage.
