id: orgs/colonial-pipeline
name: Colonial Pipeline Company
nation_state_id: us
sector_id: energy/oil-gas/midstream
tech_focus: [pipeline, fuel-distribution, billing-IT]
criticality: national-cii
summary: |
  Operator of the largest refined-fuel pipeline in the United States
  (~5,500 miles, ~45% of East Coast fuel supply). In May 2021 a
  DarkSide ransomware intrusion against Colonial's billing/IT systems
  caused the company to preemptively shut down pipeline operations
  for six days, triggering panic-buying, regional fuel shortages, and
  the first US federal Emergency Declaration over a cyber incident.
  The defining case of US critical-infrastructure ransomware impact
  and the proximate cause of TSA's first cyber Security Directives
  for pipelines. FBI later recovered ~USD 2.3M of the ~USD 4.4M
  ransom paid.
sources:
