id: orgs/vietnamese-dissident-network
name: Vietnamese dissident network
nation_state_id: vn
sector_id: civil-society/dissident
tech_focus: [activist-targeting, civil-society-surveillance]
criticality: civil-society
summary: |
  Network of Vietnamese pro-democracy activists, dissidents, and
  journalists inside Vietnam and in diaspora. Recurring target of
  APT32 (OceanLotus, Vietnam-attributed) surveillance and credential
  theft, including via the OS-X malware campaigns disclosed by
  Volexity and EFF, and the Facebook takedown of APT32 infrastructure
  in December 2020.
