summary: |
  US energy major. Named in McAfee's 2011 Night Dragon reporting
  alongside other Western oil-and-gas firms as a target of long-running
  PRC intrusions aimed at exfiltrating bidding, exploration, and
  contract data. Also named (as "ExxonKnew defendants" / Dark Basin
  reporting) as a hack-for-hire target in the Citizen Lab BellTroX /
  Dark Basin disclosures.
