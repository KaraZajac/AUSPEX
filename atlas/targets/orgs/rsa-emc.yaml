id: orgs/rsa-emc
name: RSA Security (EMC)
nation_state_id: us
sector_id: ict/security
tech_focus: [SecurID, two-factor-authentication, seed-records]
criticality: commercial
summary: |
  US security-product vendor (then a subsidiary of EMC). In March
  2011, PRC-attributed actors exfiltrated SecurID seed records via
  a spear-phishing chain, subsequently used to compromise Lockheed
  Martin and other defense contractors. The canonical early case of
  supply-chain-via-security-vendor and the precedent invoked in every
  subsequent security-vendor compromise (Mimecast 2020, Okta 2022).
sources:
  - mandiant/2013-02-19_apt1-report
