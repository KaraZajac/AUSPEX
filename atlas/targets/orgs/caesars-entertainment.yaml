summary: |
  US gaming and hospitality operator (operates Caesars Palace,
  Harrah's, and other Las Vegas Strip and regional properties).
  In August-September 2023 a Scattered-Spider-attributed
  intrusion (with ALPHV ransomware affiliate involvement) led
  to Caesars paying approximately USD 15M in ransom — disclosed
  in a September 14, 2023 SEC 8-K filing under the newly-
  effective cybersecurity disclosure rules. The Caesars and
  near-simultaneous MGM Resorts intrusions are the canonical
  Scattered Spider Las Vegas casino-targeting cases.
