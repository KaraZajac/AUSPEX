id: orgs/solarwinds
name: SolarWinds Corporation
nation_state_id: us
sector_id: ict/software
tech_focus: [network-management, Orion, supply-chain]
criticality: commercial
summary: |
  US enterprise IT-management software vendor whose Orion platform
  was trojanized between late-2019 and December 2020 in the SUNBURST
  supply-chain campaign attributed by the White House and US
  Intelligence Community to the Russian SVR (APT29 / Cozy Bear).
  ~18,000 customer organizations received the malicious update;
  ~100 were assessed as follow-on intrusion targets, including
  multiple US federal agencies (Treasury, Commerce, State, DHS).
  The defining supply-chain-via-software-vendor case of the 2020s
  and the proximate cause of US Executive Order 14028 on software
  supply-chain security.
