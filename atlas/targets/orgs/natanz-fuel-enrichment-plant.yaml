id: orgs/natanz-fuel-enrichment-plant
name: Natanz Fuel Enrichment Plant
nation_state_id: ir
sector_id: energy/nuclear
tech_focus: [uranium-enrichment, IR-1-centrifuge, ICS-OT, Siemens-S7]
criticality: national-cii
summary: |
  Iran's principal uranium-enrichment facility (cascade halls A1000
  and B1000). Target of Stuxnet (~2007-2010), the first publicly
  known cyber weapon to cause physical destruction of strategic
  industrial infrastructure (IR-1 centrifuges), and of the April 2021
  electrical substation explosion-and-blackout attributed widely to
  Israel. The canonical case of cyber-physical effects against a
  nation-state strategic-program asset.
