summary: |
  London-based Persian-language satellite-television and digital
  news outlet, founded 2017. Iran International's coverage of
  IRGC and Quds Force activity, post-Mahsa-Amini protest movement,
  and Soleimani-era topics has made it a persistent target for
  Iranian state cyber operations against its staff. The UK
  Metropolitan Police in 2023 publicly cited Iranian threats
  against Iran International staff and the outlet temporarily
  relocated its London studios. Cyber operations against the
  outlet attested in 2024-25 attributed to Banished Kitten /
  Handala / Storm-0842 — a MOIS cyber unit.
