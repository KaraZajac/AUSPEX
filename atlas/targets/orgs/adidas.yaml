summary: |
  German multinational sportswear corporation. In May 2025
  Adidas disclosed that some customer contact information had
  been stolen via a third-party customer-service provider —
  subsequently linked to the UNC6040 / ShinyHunters
  voice-phishing / Salesforce-OAuth campaign documented by
  Google Threat Intelligence Group.
