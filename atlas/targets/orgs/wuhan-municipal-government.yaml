summary: |
  Municipal authority for Wuhan, capital of Hubei. Surfaced as a
  target in the i-Soon leaks (February 2024) as a customer / data
  source of PRC MSS-contracted operations, alongside the Wuhan-based
  Wuhan Xiaoruizhi Science and Technology contractor (named in the
  March 2024 APT31 DOJ indictment). Indicative of MSS Hubei State
  Security Department's geographic concentration.
