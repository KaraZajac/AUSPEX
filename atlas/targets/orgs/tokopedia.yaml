summary: |
  Indonesia's largest e-commerce platform (later merged with
  Gojek as GoTo). In May 2020 ShinyHunters posted approximately
  91 million Tokopedia user records (initial 15M sample,
  followed by the full database) on RaidForums, marking the
  group's first major data-broker incident. Records included
  user IDs, email addresses, full names, dates of birth, and
  hashed passwords.
