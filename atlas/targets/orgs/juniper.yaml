summary: |
  US enterprise networking vendor. Discovered an unauthorized
  ScreenOS backdoor in December 2015 enabling VPN traffic decryption
  and admin access, attributed by US officials to PRC state actors.
  Juniper routers are a recurring target for PRC living-off-the-edge
  campaigns including Salt Typhoon's 2024 intrusions into US telco
  edge infrastructure.
