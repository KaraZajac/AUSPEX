summary: |
  US managed-service-provider remote-management vendor (Virtual
  System Administrator / VSA). In July 2021, REvil/Sodinokibi
  exploited an authentication-bypass zero-day in Kaseya VSA to push
  ransomware downstream through ~50 MSPs to ~1,500 end customers
  worldwide — the most consequential MSP-tooling supply-chain
  ransomware event on record. DOJ indicted Ukrainian national
  Yaroslav Vasinskyi and seized ~USD 6.1M from co-conspirator Yevgeniy
  Polyanin in November 2021.
sources:
