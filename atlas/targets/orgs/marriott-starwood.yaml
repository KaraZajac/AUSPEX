summary: |
  Global hotel chain. Acquired Starwood in 2016 and inherited a
  pre-existing intrusion in Starwood's reservations database dating
  to ~2014. Disclosed in November 2018; ~383M guest records
  exfiltrated including passport numbers and travel patterns.
  Attributed in press reporting to PRC MSS and treated by the US
  intelligence community as part of the bulk-PII / movement-pattern
  collection portfolio supporting counterintelligence targeting.
