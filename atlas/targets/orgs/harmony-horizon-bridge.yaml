summary: |
  Cross-chain bridge between Ethereum and the Harmony blockchain.
  Drained of ~USD 100M in June 2022 via compromise of two of five
  multisig keys; FBI attributed the theft to DPRK Lazarus / APT38
  in January 2023. Part of the Ronin / Harmony / Atomic Wallet /
  DMM / Bybit progression of DPRK bridge-and-exchange thefts under
  the Byungjin sanctions-evasion-revenue pillar.
