summary: |
  US telecommunications carrier. Disclosed in 2024 as one of nine US
  telcos compromised in the PRC Salt Typhoon campaign, with
  attackers reaching CALEA / lawful-intercept infrastructure
  including (per US officials) the systems used for court-authorized
  wiretaps on PRC intelligence targets. Separately, ~109M AT&T
  customer records were stolen via the 2024 Snowflake intrusion. AT&T
  has been a Five-Eyes lawful-intercept partner since the BLARNEY
  program disclosures (2013).
