tech_focus: [mobile-carrier, telecom, civilian-comms]
criticality: national-cii
summary: |
  Ukraine's largest mobile carrier (~24M subscribers, ~half of the
  country). On 2023-12-12, attackers attributed by the SBU to GRU
  Sandworm executed a destructive intrusion that wrecked Kyivstar
  core systems and downed mobile voice/data nationwide for ~48 hours,
  also disrupting air-raid alert apps and POS terminals. The largest
  single-event civilian-telecom outage of the Ukraine war and a
  defining case of population-scale cyber disruption as wartime
  pressure.
sources:
