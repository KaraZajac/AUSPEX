summary: |
  US enterprise load-balancer / edge-appliance vendor (BIG-IP). A
  perennial PRC targeting priority owing to BIG-IP's privileged
  position as TLS-terminating edge in many enterprise and government
  networks; named in multiple CISA advisories for exploited
  zero-days (CVE-2020-5902, CVE-2022-1388) and as a Volt Typhoon
  initial-access vector.
