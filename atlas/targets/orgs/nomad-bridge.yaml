id: orgs/nomad-bridge
name: Nomad Bridge
nation_state_id: us
sector_id: finance/defi-bridge
tech_focus: [DeFi-bridge, cross-chain, optimistic-rollup]
criticality: commercial
summary: |
  Optimistic-verification cross-chain bridge connecting Ethereum,
  Moonbeam, Avalanche, Evmos, and Milkomeda. Drained of ~USD 190M
  in August 2022 after a faulty Replica-contract initialization
  enabled forged Merkle proofs. Permissionless pile-on dynamic
  meant proceeds were split across hundreds of opportunistic
  addresses; some recovered via white-hat returns, attribution
  to any single actor (including DPRK) is unsettled.
