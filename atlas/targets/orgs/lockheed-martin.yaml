summary: |
  The largest US defense contractor and prime contractor for the
  F-22, F-35, missile defense, and space programs. Repeatedly targeted
  by PRC IP-exfiltration campaigns over two decades — Titan Rain
  (2003+), Operation Shady RAT (2006-2011), the Su Bin aviation-IP
  case (2008-2014 indictment covering C-17 and F-35 data), and
  ongoing supply-chain compromises against Tier-1 and Tier-2
  suppliers. Lockheed's own 2011 intrusion via cloned RSA SecurID
  tokens established the canonical supply-chain-via-security-vendor
  pattern.
sources:
  - mandiant/2013-02-19_apt1-report
