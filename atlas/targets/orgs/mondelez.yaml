summary: |
  US food and confectionery multinational. Collateral victim of
  NotPetya in June 2017 (~24,000 endpoints destroyed; ~USD 100M+
  damages). Subsequent litigation against Zurich Insurance over the
  war-exclusion clause settled in 2022, paralleling the Merck case
  and shaping cyber-war coverage doctrine.
