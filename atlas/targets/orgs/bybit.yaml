id: orgs/bybit
name: Bybit
nation_state_id: ae
sector_id: finance/crypto-exchange
tech_focus: [crypto-exchange, multisig, cold-wallet-signing]
criticality: commercial
summary: |
  Dubai-headquartered centralized cryptocurrency exchange. On
  2025-02-21, attackers compromised the Safe{Wallet} signing
  workflow of a Bybit cold-wallet multisig, redirecting a routine
  transfer to drain ~USD 1.5B in ETH — the largest single crypto
  theft on record. US/FBI and partners attributed the theft to DPRK
  TraderTraitor (Lazarus sub-cluster). Definitive case of
  software-supply-chain-via-signing-workflow against a major CEX.
sources: []
