summary: |
  US federal foreign-ministry. A perennial strategic-intelligence
  target for adversary services seeking advance reads on US foreign
  policy. Confirmed compromise in the 2014–2015 APT29 (Russian SVR)
  unclassified-network intrusion, the 2020 SolarWinds SUNBURST
  follow-on, and the 2023 Storm-0558 (PRC) Exchange Online breach
  that targeted the email of senior State diplomats including
  Ambassador Nicholas Burns and Assistant Secretary Daniel Kritenbrink
  ahead of Blinken's June 2023 PRC visit.
