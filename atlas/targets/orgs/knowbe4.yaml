summary: |
  US-headquartered security-awareness training company.
  Disclosed in July 2024 having unknowingly hired a DPRK
  IT worker into a principal software engineer role; the
  fraud was detected on first-boot malware loading from
  the company-issued laptop. Canonical public case study
  of the IT-worker-fraud detection lifecycle.
