summary: |
  US life-insurance and annuity subsidiary of German insurer
  Allianz SE. In July 2025 Allianz Life disclosed a breach of
  a third-party cloud-based CRM platform, exposing personal
  data on the majority of its approximately 1.4 million US
  customers. The intrusion was linked to the UNC6040 /
  ShinyHunters voice-phishing / Salesforce-OAuth campaign.
