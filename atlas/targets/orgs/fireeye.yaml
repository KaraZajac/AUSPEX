summary: |
  US threat-intelligence and incident-response vendor (since merged
  with Mandiant; Mandiant subsequently acquired by Google). Disclosed
  in December 2020 that its red-team tools had been exfiltrated by
  Russian SVR actors — the public disclosure that triggered the
  unraveling of the SolarWinds SUNBURST supply-chain compromise.
  The canonical "the canary went down" event of the cyber
  intelligence ecosystem.
sources:
