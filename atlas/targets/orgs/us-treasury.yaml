summary: |
  US federal department housing OFAC (sanctions), FinCEN, and IRS.
  Strategic counterintelligence target for adversaries seeking
  advance warning of sanctions designations and policy. Compromised
  in the 2020 SolarWinds SUNBURST campaign (attributed to Russian SVR)
  and again in December 2024 via the BeyondTrust remote-support
  product, attributed by Treasury to PRC Silk Typhoon — with
  reporting that OFAC and Treasury's Committee on Foreign Investment
  (CFIUS) workstations were among those accessed.
sources:
