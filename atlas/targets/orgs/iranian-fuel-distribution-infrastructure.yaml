summary: |
  Iran's nationwide fuel-station card / subsidy infrastructure. Taken
  offline by "Predatory Sparrow" in October 2021, disabling ~4,300
  stations nationwide and triggering riots; attributed widely
  (including by Iranian agent in this corpus) as an Israeli-aligned
  operation. Part of a recurring Predatory Sparrow targeting pattern
  against Iranian retail-facing infrastructure.
