id: orgs/us-opm
name: US Office of Personnel Management
nation_state_id: us
sector_id: government/civilian
tech_focus: [SF-86, security-clearance-records, federal-personnel]
criticality: national-cii
summary: |
  US federal HR agency that processes security-clearance background
  investigations (SF-86) for the entire federal workforce. In the
  2014–2015 OPM breach (publicly disclosed June 2015), PRC actors
  exfiltrated ~21.5M records including clearance-investigation files
  on US intelligence and military personnel, plus ~5.6M fingerprint
  sets. The single most strategically valuable counterintelligence
  bulk-data acquisition by a foreign service against the US in the
  cyber era and a foundational input to the PRC's MSS targeting
  database.
sources:
  - wikipedia/opm-data-breach
