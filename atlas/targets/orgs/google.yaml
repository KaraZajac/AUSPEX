criticality: national-cii
summary: |
  US hyperscale internet platform. Targeted in Operation Aurora
  (disclosed January 2010), a PRC intrusion that exfiltrated source
  code and targeted Gmail accounts of Chinese human-rights activists
  and US government officials. Google's public disclosure was the
  first time a major US technology firm named the PRC as the
  attacker of a corporate intrusion and the political turning point
  in US-PRC cyber discourse.
sources:
