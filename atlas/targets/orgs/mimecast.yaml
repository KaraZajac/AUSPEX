summary: |
  UK email-security vendor whose M365-integration certificate was
  stolen during the 2020 SolarWinds-related Russian SVR campaign,
  enabling follow-on access to ~10 customer M365 tenants. The
  canonical case of supply-chain-via-security-vendor pivot in the
  SolarWinds cluster, alongside SolarWinds Orion itself.
