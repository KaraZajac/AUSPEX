sector_id: ict/semiconductors/equipment
tech_focus: [photomask-blanks, EUV, ophthalmic-lenses, medical-devices]
criticality: international-cii
summary: |
  Tokyo-headquartered optical-products and medical-device
  manufacturer. World's largest producer of EUV photomask
  blanks for advanced semiconductor lithography (~70% global
  share at advanced nodes) and a major ophthalmic-lens
  supplier. Suffered a Hunters International ransomware
  intrusion in late March 2024 that suspended production
  at multiple plants for approximately six weeks. The EUV
  photomask-blank market dominance makes Hoya a node of
  strategic interest to PRC semiconductor-acquisition tasking,
  but the 2024 ransomware case had no espionage indicators.
