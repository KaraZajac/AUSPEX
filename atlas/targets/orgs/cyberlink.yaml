summary: |
  Taiwan-headquartered multimedia software publisher (PowerDVD,
  PowerDirector, FaceMe, U Suite). Software supply chain
  compromised October 2023 by Diamond Sleet / Lazarus, who
  distributed a modified installer through legitimate update
  infrastructure to over 100 countries. Microsoft-attested
  in November 2023.
