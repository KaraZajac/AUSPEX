summary: |
  US consumer credit reporting bureau. In 2017, attackers exploited
  an unpatched Apache Struts vulnerability to exfiltrate PII on
  ~147M US, UK, and Canadian consumers. DOJ indicted four PLA 54th
  Research Institute officers in February 2020. Part of the canonical
  PRC bulk-PII portfolio (OPM, Anthem, Marriott, Equifax).
