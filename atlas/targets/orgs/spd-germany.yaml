id: orgs/spd-germany
name: Social Democratic Party of Germany (SPD)
nation_state_id: de
sector_id: government
criticality: national-cii
tech_focus: [political-party, email]
summary: |
  Senior governing-coalition party of German Chancellor Olaf Scholz. Its
  Executive Committee (Parteivorstand) email infrastructure was compromised by
  GRU/APT28 via the Microsoft Outlook vulnerability CVE-2023-23397 (accounts
  accessed from December 2022); the German Federal Government publicly attributed
  the intrusion to APT28 on 2024-05-03. Created 2026-07-04 during the audit of
  event 2024-05/apt28-spd-czech-polish-spearphishing to resolve a dangling
  targets[].target_id foreign key, mirroring the orgs/dnc
  governing-party-infrastructure precedent. Sector recorded as `government`
  (senior governing-coalition party; the corpus has no political-party sector)
  rather than election-systems, because this was espionage of the party executive
  and not an election-infrastructure compromise.
sources:
  - bundesregierung/2024-05-03_apt28-spd-attribution
  - aljazeera/2024-05-03_germany-russia-intolerable-cyberattack
