summary: |
  Belgian state-majority-owned telecommunications carrier (rebranded
  Proximus in 2015) and parent of BICS, a major international
  voice/SMS roaming hub for Africa and the Middle East. Target of
  "Operation Socialist," a long-running implant operation by UK GCHQ
  (with NSA support) disclosed via the Snowden documents in 2013 and
  formally attributed by the Belgian federal prosecutor to GCHQ in
  2018. The canonical case of Five-Eyes targeting of an allied
  state's telecom carrier for upstream traffic collection.
