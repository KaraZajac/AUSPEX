summary: |
  US ticketing subsidiary of Live Nation Entertainment, the
  largest concert promoter globally. In May 2024 ShinyHunters
  posted approximately 1.3TB of stolen Ticketmaster data
  (~560 million customer records, including names, addresses,
  partial payment-card data, and order history) on BreachForums,
  pricing the dump at USD 500K. Live Nation confirmed the
  incident via SEC 8-K filing May 31 2024 and attributed it to
  a third-party cloud-database environment — subsequently
  identified as the Snowflake customer-tenant intrusion by
  UNC5537. The Ticketmaster breach is the single largest known
  exfiltration from the Snowflake campaign.
