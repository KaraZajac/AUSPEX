summary: |
  Iranian state-affiliated steel producer in Ahvaz. Target of a June
  2022 Predatory Sparrow operation that published CCTV footage of a
  foundry fire allegedly induced by the cyber intrusion — the first
  publicly known cyber-physical attack against a steel mill and the
  defining demonstration of Predatory Sparrow's willingness to
  publicize cyber-physical damage.
