summary: |
  Saudi-Japanese petrochemical refinery joint venture on the Red Sea
  coast. Target of the August 2017 Triton/Trisis intrusion, in which
  attackers planted custom malware against the facility's Schneider
  Electric Triconex safety-instrumented systems — the first known
  malware specifically designed to manipulate plant safety-shutdown
  logic, with potential for mass-casualty consequences. US Treasury
  attributed the operation to Russia's TsNIIKhM (Central Scientific
  Research Institute of Chemistry and Mechanics) in October 2020. The
  canonical case of safety-system-targeting in OT cyber.
