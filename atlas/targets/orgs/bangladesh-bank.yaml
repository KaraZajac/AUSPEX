summary: |
  Central bank of Bangladesh. In February 2016, attackers attributed
  to the DPRK Lazarus Group used compromised SWIFT credentials at
  Bangladesh Bank to issue fraudulent payment orders against the
  bank's NY Federal Reserve correspondent account, attempting to move
  ~USD 951M and successfully extracting ~USD 81M via Philippine
  casinos. The canonical case of DPRK SWIFT-network targeting under
  the Byungjin sanctions-evasion-revenue pillar and the template for
  subsequent Lazarus financial-system intrusions (Banco del Austro,
  Tien Phong, Far Eastern International, Cosmos Bank).
