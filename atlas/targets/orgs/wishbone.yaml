summary: |
  US-based polling / quiz mobile app marketed to teenagers and
  young women. In May 2020 ShinyHunters posted approximately
  40 million Wishbone user records — including email addresses,
  usernames, phone numbers, and hashed passwords — on
  RaidForums. The dataset had been originally compromised in
  early 2020.
