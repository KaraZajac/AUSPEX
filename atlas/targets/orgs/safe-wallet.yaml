id: orgs/safe-wallet
name: Safe{Wallet} (Safe Ecosystem Foundation)
nation_state_id: ch
sector_id: finance/crypto-custody
tech_focus: [multisig-wallet, signing-UI, supply-chain]
criticality: commercial
summary: |
  Swiss-based developer of the Safe (formerly Gnosis Safe) Ethereum
  multisig smart-contract wallet — the dominant institutional
  cold-wallet front-end. In February 2025 attackers compromised a
  Safe{Wallet} developer machine and injected JavaScript that
  manipulated the signing UI for Bybit's cold-wallet transaction,
  enabling the USD 1.5B Bybit theft attributed to DPRK
  TraderTraitor. The canonical case of supply-chain-via-wallet-UI.
