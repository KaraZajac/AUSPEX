summary: |
  US National Football League franchise. In February 2022 the
  team's corporate IT environment was hit by BlackByte
  ransomware on the eve of Super Bowl LVI. The team confirmed
  the incident publicly without paying ransom; no impact to
  game-day operations or ticketing was reported.
