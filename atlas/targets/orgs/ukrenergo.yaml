id: orgs/ukrenergo
name: Ukrenergo (National Power Company of Ukraine)
nation_state_id: ua
sector_id: energy/electric-power/grid-ot
tech_focus: [SCADA, transmission, grid-OT]
criticality: national-cii
summary: |
  Ukraine's state-owned electricity transmission system operator
  (high-voltage backbone). Target of two of the only confirmed
  cyber-induced blackouts in history: the December 2016 Industroyer
  (CrashOverride) attack against Kyiv North 330kV substation, and
  the attempted April 2022 Industroyer2 attack on a regional Ukrainian
  electric substation. Both attributed to GRU Sandworm. The canonical
  case of OT-impact destructive cyber and a foundational data point
  for US/Five Eyes pre-positioning concerns (Volt Typhoon).
sources:
  - eset/2017-06_industroyer-win32
  - doj/2020-10-15_sandworm-six-gru-officers-indictment
