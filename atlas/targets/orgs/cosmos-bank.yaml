summary: |
  Cosmos Cooperative Bank Ltd, headquartered in Pune, India — one
  of the oldest and largest urban cooperative banks in India. In
  August 2018 attackers attributed to the DPRK Lazarus Group /
  APT38 (BeagleBoyz) compromised the bank's ATM/POS payment-switch
  infrastructure to stand up a malicious ISO8583 proxy switch,
  enabling ~US$11.5M in fraudulent ATM withdrawals across 28
  countries using 450 cloned non-EMV debit cards, and abused the
  bank's SWIFT environment to wire ~US$2M to Hong Kong — ~US$13.5M
  total. A canonical FASTCash / DPRK financial-theft case under the
  Byungjin sanctions-evasion-revenue pillar.
