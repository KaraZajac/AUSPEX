summary: |
  Saudi Arabia's state oil company and the world's largest hydrocarbon
  producer by output. The canonical example of strategic-sector
  destructive cyber targeting: hit by Shamoon in August 2012 (~30,000
  workstations wiped under the "Cutting Sword of Justice" persona),
  Shamoon 2 in November 2016, and Shamoon 3 in 2018. All three waves
  are publicly attributed (most consistently to Iran-aligned APT33 /
  Elfin) and frame the IRGC's asymmetric-cyber doctrine against Gulf
  monarchies. Continues to be a high-priority target for Iranian
  destructive and pre-positioning operations.
sources:
