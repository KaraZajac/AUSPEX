summary: |
  Hollywood film studio, US subsidiary of Sony Group. Target of the
  November 2014 destructive intrusion (Destover wiper + ~100TB
  exfiltration) presented publicly under the "Guardians of Peace"
  persona. The FBI's December 19 2014 attribution to DPRK was the
  first US government public attribution of a nation-state destructive
  attack against a US private company and the foundation of the 2018
  Park Jin Hyok DOJ complaint. The motivating event was the planned
  release of "The Interview," a comedic film depicting Kim Jong Un's
  assassination — making this the canonical case of DPRK
  regime-dignity / narrative-defense targeting abroad.
