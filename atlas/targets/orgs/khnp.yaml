summary: |
  Korean state-owned utility responsible for the operation of
  South Korea's commercial nuclear and hydroelectric power
  fleets. Subsidiary of KEPCO. Operates the Kori, Hanbit,
  Wolsong, Hanul, and Saeul nuclear plants and the principal
  ROK hydroelectric stations.

  AUSPEX cites KHNP as the target of the December 2014 cyber
  intrusion that exfiltrated design documents and personal
  data; the ROK joint government investigation (Seoul Central
  District Prosecutors' Office, with NIS participation)
  publicly attributed the intrusion to North Korea on
  16 March 2015. The case is doctrinally significant as the
  first publicly ROK-attributed destructive-threat intrusion
  at ROK critical infrastructure.
  # Corrected 2026-06-25 (claude-opus-4.8/max): the attributing body was the
  # prosecutors' joint investigation, not the NIS alone (date 16 Mar, not "March").
