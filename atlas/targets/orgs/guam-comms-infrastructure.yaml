summary: |
  Telecom and supporting communications infrastructure on the
  US-territorial island of Guam — the principal US Indo-Pacific
  power-projection hub (Andersen AFB, Naval Base Guam, submarine
  cable landings). Confirmed by Microsoft MSTIC and CISA in the
  May 2023 Volt Typhoon disclosure as a primary PRC pre-positioning
  target — the canonical case of cyber pre-positioning explicitly
  tied to a Taiwan-contingency scenario.
