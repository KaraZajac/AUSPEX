summary: |
  US pharmaceutical-distribution conglomerate (rebranded from
  AmerisourceBergen in August 2023). One of the three largest US
  drug distributors (alongside McKesson and Cardinal Health). In
  February 2024 Cencora disclosed via 8-K filing the
  exfiltration of personal and clinical-trial data via an
  intrusion of its IT environment. Eleven pharmaceutical-
  manufacturer customers (including Bayer, Bristol Myers Squibb,
  Novartis, Regeneron, AbbVie) subsequently disclosed downstream
  patient-data exposure between February and May 2024.
