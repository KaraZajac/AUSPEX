summary: |
  US-headquartered risk-and-financial-advisory firm; bankruptcy-
  claims administrator for the FTX, BlockFi, Genesis Global,
  and other 2022–2023 crypto-bankruptcy estates. Disclosed
  August 2023 that an employee was SIM-swapped, exposing
  creditor PII across the administered estates. The downstream
  data was subsequently used in targeted phishing of crypto-
  creditor victims.
