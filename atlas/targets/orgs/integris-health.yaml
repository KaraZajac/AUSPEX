summary: |
  Oklahoma-based not-for-profit regional hospital network operating
  19 hospitals and clinics across central and northwestern
  Oklahoma. Suffered a Hunters International ransomware
  intrusion November 2023 followed by a novel patient-direct
  extortion campaign in late December 2023 to early January
  2024 in which approximately 2 million patients received
  individualized USD 50 ransom demands.
