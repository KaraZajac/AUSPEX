id: orgs/parkmobile
name: ParkMobile
nation_state_id: us
sector_id: transport/road
tech_focus: [mobile-app, parking-payment]
criticality: commercial
summary: |
  US-based paid-parking mobile-payment provider operating in
  450+ North American cities. In March 2021 a breach exposed
  approximately 21 million user records — including license
  plate numbers, mobile phone numbers, email addresses, vehicle
  data, and hashed passwords — subsequently posted for sale on
  forums in April 2021 with ShinyHunters-cluster attribution.
  ParkMobile attributed the intrusion to a vulnerability in
  third-party software.
