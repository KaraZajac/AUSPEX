tech_focus: [health-insurance, PII, PHI, claims-processing]
criticality: regional-cii
summary: |
  US health-insurance carrier serving the Pacific Northwest
  (Washington, Oregon, Alaska), including federal-employee Blue
  Cross plan enrollees and large-employer plans (Amazon, Microsoft,
  Starbucks). In a breach disclosed 2015-03-17, attackers tied to
  the PRC-nexus Deep Panda / Black Vine cluster exfiltrated PII +
  PHI + financial data for approximately 11 million members
  (~6M of them Washington State residents); access traced to a
  phishing intrusion that began 2014-05-05 and went undetected
  until 2015-01-29. Part of the canonical PRC bulk-PII collection
  wave alongside Anthem (2015), OPM (2014-2015), and CareFirst.
sources:
