id: orgs/snowflake
name: Snowflake
nation_state_id: us
sector_id: ict/cloud
tech_focus: [data-warehouse, customer-credentials, infostealer]
criticality: commercial
summary: |
  US cloud data-warehouse vendor. In mid-2024, attackers tracked by
  Mandiant as UNC5537 used credentials previously harvested by
  infostealer malware to log into ~165 Snowflake customer tenants
  that lacked MFA, exfiltrating large customer datasets from victims
  including AT&T, Ticketmaster, and Santander. The canonical case of
  infostealer-to-cloud-tenant lateral movement and of single-factor
  authentication as systemic risk across a hyperscaler customer base.
  Lead suspect Connor Moucka indicted by DOJ in November 2024.
sources:
