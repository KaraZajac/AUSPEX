summary: |
  US enterprise software vendor (Acrobat/Reader, Flash Player).
  One of the dozens of companies targeted in Operation Aurora
  (disclosed January 2010); Adobe publicly confirmed on 12 January
  2010 that it was investigating a corporate-network security
  incident concurrent with Google's disclosure. Adobe's Flash Player
  and Reader were also recurrent zero-day delivery vectors for the
  same Elderwood/APT17 cluster in subsequent years (e.g. the 2012
  Flash zero-days catalogued in Symantec's Elderwood Project report).
sources:
