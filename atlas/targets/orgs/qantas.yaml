summary: |
  Australia's flag carrier airline. In July 2025 Qantas
  disclosed a cyber-intrusion exposing approximately 5.7 million
  customers' frequent-flyer data via a third-party customer-
  service platform. Initially attributed to Scattered Spider,
  the incident was subsequently linked to the UNC6040 /
  ShinyHunters voice-phishing / Salesforce-OAuth campaign.
