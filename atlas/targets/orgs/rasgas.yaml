summary: |
  Qatari state liquefied-natural-gas joint venture (since merged into
  QatarEnergy LNG). Hit by Shamoon two weeks after Saudi Aramco in
  August 2012, wiping office IT systems and disrupting corporate
  email and website operations though leaving LNG production
  unaffected. The pairing with the Aramco strike is the canonical
  evidence that Shamoon was a Gulf-monarchy-wide IRGC destructive
  campaign rather than an Aramco-specific operation.
