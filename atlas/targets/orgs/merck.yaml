summary: |
  US pharmaceutical major. Collateral victim of NotPetya in June
  2017; ~30,000 endpoints destroyed, manufacturing of Gardasil and
  other vaccines disrupted, claimed damages ~USD 1.4B. Test case for
  cyber-insurance war-exclusion litigation: Merck won a 2022 New
  Jersey appellate ruling that NotPetya's nation-state attribution
  did not trigger Merck's policy war exclusion — a foundational
  precedent for cyber-war coverage.
sources:
