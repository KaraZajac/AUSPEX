summary: |
  US healthcare claims-clearinghouse subsidiary of UnitedHealth
  Group (processes approximately 50% of US healthcare insurance
  claims). In February 2024 an ALPHV affiliate intrusion shut
  down US-wide prescription-claim and clinical-billing systems
  for multiple weeks, affecting approximately one-third of all
  Americans (~110M individuals). UnitedHealth disclosed USD
  2.87B of impact in fiscal-year 2024 results — the largest
  disclosed financial impact from any healthcare ransomware
  incident on US record.
