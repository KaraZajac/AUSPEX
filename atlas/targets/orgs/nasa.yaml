summary: |
  US civil space agency. Recurring strategic IP-collection target;
  named in the Titan Rain reporting (2003+) and in the 2018 APT10
  cloud-hopper indictment as a downstream victim. NASA's research
  centers (JPL, Goddard, Ames) hold sensitive launch, propulsion, and
  satellite-mission data attractive to PRC and Russian collectors.
