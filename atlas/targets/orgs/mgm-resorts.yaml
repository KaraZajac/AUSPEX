summary: |
  US gaming and hospitality operator (operates MGM Grand, Bellagio,
  Aria, Mandalay Bay, and other Las Vegas Strip plus Atlantic
  City, Mississippi, and Maryland properties). In September 2023
  a Scattered-Spider-attributed intrusion using ALPHV ransomware
  forced a ten-day outage of slot machines, hotel-room digital
  keys, and casino-floor systems. MGM declined to pay ransom and
  disclosed approximately USD 100M of impact in SEC filings.
