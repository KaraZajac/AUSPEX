summary: |
  US consumer-goods manufacturer (~USD 7B annual revenue) producing
  Clorox-branded cleaning products and other consumer-staple
  categories. In August 2023 a Scattered-Spider-attributed
  cybersecurity incident forced shutdown of significant portions
  of its IT environment. Clorox disclosed USD 356M of impact in
  fiscal-year 2024 results — the largest disclosed financial
  impact from any single Scattered Spider intrusion against a
  consumer-goods manufacturer. Subsequent civil litigation
  (Clorox v. Cognizant) alleges the outsourced IT help desk
  was the social-engineering entry point.
