summary: |
  Victorian state government agency administering courts and
  tribunals across the Australian state of Victoria. In December
  2023 Qilin ransomware exfiltrated audio and video recordings
  of court hearings spanning November 2023, including witness
  testimony from sensitive criminal cases. The breach
  prompted a state-government incident response and an
  independent review by Rufus Black AO.
