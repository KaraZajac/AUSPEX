criticality: national-cii
summary: |
  Joint-venture pathology-services provider (SYNLAB / Guy's and St
  Thomas' NHS Foundation Trust / King's College Hospital NHS
  Foundation Trust) supplying lab services across south-east
  London NHS trusts and primary care. In June 2024 a Qilin
  ransomware intrusion against Synnovis IT systems forced multi-
  week suspension of blood transfusion, microbiology, and
  pathology services across multiple London hospitals, causing
  the cancellation of approximately 1,700 elective procedures
  and 10,000 outpatient appointments and triggering a critical-
  incident declaration at Guy's and St Thomas'.
