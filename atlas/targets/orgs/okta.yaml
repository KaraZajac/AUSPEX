id: orgs/okta
name: Okta
nation_state_id: us
sector_id: ict/identity
tech_focus: [SSO, identity-provider, customer-tenants]
criticality: national-cii
summary: |
  US identity-as-a-service / SSO vendor. Compromised in January 2022
  via a third-party support contractor (Sitel) in the LAPSUS$
  campaign; ~366 customer tenants affected. Compromised again in
  October 2023 via the Okta customer-support case-management
  system, with downstream impact on customers including Cloudflare
  and 1Password. The canonical case of identity-provider as
  systemic-risk node in the SaaS supply chain.
sources:
  - msft/2022-03-22_dev-0537-lapsus
  - csrb/2023-08-10_lapsus-report
