summary: |
  US oilfield-services and drilling company (one of the three
  largest worldwide alongside Schlumberger and Baker Hughes).
  In August 2024 a RansomHub intrusion forced limitations on
  internal systems and customer-billing operations; Halliburton
  disclosed the incident in an 8-K filing August 22, 2024 and
  reported approximately USD 35M of impact in Q3 2024 financial
  results.
