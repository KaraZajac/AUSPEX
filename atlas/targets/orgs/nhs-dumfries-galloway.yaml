summary: |
  NHS regional health board covering south-west Scotland (~150,000
  patients across Dumfries and Galloway). In early March 2024 the
  INC Ransom group exfiltrated approximately 3TB of patient
  clinical records and progressively published them on its leak
  site after no ransom was paid. The incident became the largest
  publicly-confirmed Scottish NHS data exfiltration on record.
