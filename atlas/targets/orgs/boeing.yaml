summary: |
  US aerospace and defense major. Su Bin pleaded guilty in 2016 to a
  PRC-directed conspiracy that exfiltrated C-17 transport, F-22, and
  F-35 program data from Boeing and its prime contractors over
  2008-2014, the canonical case of named PRC IP theft against US
  defense aerospace. Also hit by LockBit ransomware-extortion in
  October 2023, with ~43GB of stolen Boeing data published.
