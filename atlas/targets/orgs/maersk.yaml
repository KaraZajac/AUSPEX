criticality: regional-cii
summary: |
  Danish global container-shipping major. Collateral victim of the
  June 2017 NotPetya wiper (delivered via the trojanized M.E.Doc
  Ukrainian accounting software) that destroyed ~49,000 endpoints,
  ~3,500 servers, and Maersk's Active Directory globally, halting
  shipping operations for ~10 days. Damages ~USD 300M. NotPetya was
  formally attributed by the White House, UK, and Five Eyes to GRU
  Sandworm in February 2018. The canonical case of catastrophic
  collateral damage from a state-targeted destructive cyber operation.
sources:
  - whitehouse/2018-02-15_notpetya-attribution
  - doj/2020-10-15_sandworm-six-gru-officers-indictment
