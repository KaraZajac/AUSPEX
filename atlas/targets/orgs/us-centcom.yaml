summary: |
  US Department of Defense unified combatant command for the Middle
  East. Recurring target of Iran-aligned cyber operations including
  the 2015 CENTCOM Twitter and YouTube account takeover by
  ISIS-aligned "CyberCaliphate" (later assessed by Western researchers
  as a Russian APT28 false-flag) and ongoing Iranian-IRGC interest in
  CENTCOM force-disposition and JTF-ME data.
