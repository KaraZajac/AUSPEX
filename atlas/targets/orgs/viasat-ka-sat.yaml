id: orgs/viasat-ka-sat
name: Viasat KA-SAT network
nation_state_id: us
sector_id: aerospace/space
tech_focus: [satellite-internet, modem-firmware, AcidRain]
criticality: regional-cii
summary: |
  European Ka-band geostationary broadband satellite network operated
  by Viasat (originally Eutelsat). On 2022-02-24, coincident with the
  Russian invasion of Ukraine, AcidRain wiper malware bricked tens of
  thousands of consumer and enterprise modems across Ukraine and
  neighboring states, severing Ukrainian military C2 use of the
  network and incidentally disabling remote-monitoring of ~5,800
  Enercon wind turbines in Germany. The EU, UK, and US Five-Eyes
  formally attributed the attack to Russia (GRU) in May 2022. The
  canonical case of strategic satellite-network targeting as
  invasion-coincident disruption.
sources:
