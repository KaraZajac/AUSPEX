summary: |
  US premium cable / entertainment network (Time Warner / WarnerMedia
  subsidiary). Victim of the May-August 2017 intrusion and extortion
  charged to Behzad Mesri (SDNY indictment, 21 November 2017): ~1.5 TB
  of pre-release content was stolen — Game of Thrones scripts and plot
  summaries plus unaired episodes of Ballers, Barry, Room 104, Curb
  Your Enthusiasm and The Deuce, cast/crew contact lists and financial
  documents — followed by a ~USD 6M Bitcoin extortion demand, which HBO
  refused to pay. Some material was leaked.
sources:
