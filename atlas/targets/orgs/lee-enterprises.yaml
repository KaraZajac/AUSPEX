summary: |
  US newspaper publisher operating 77 daily and 350 weekly
  publications across 25 US states. In February 2025 Lee
  Enterprises disclosed via SEC 8-K filing a cybersecurity
  incident that disrupted print and digital publishing across
  multiple titles for over a week. Qilin ransomware
  subsequently claimed responsibility and published exfiltrated
  data on its leak site.
