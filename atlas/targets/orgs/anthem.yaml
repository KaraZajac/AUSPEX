name: Anthem
nation_state_id: us
sector_id: healthcare/payer
tech_focus: [health-insurance, PII, PHI]
criticality: commercial
summary: |
  US health-insurance carrier (now Elevance Health). In early 2015,
  attackers attributed by DOJ to PRC actors (Fujie Wang et al.
  indictment, 2019) exfiltrated PII / PHI for ~78.8M customers and
  employees. Part of the canonical PRC bulk-PII collection portfolio
  alongside OPM (2014–2015), Equifax (2017), and Marriott/Starwood
  (2014–2018) — used to build the MSS adversary-targeting database
  per repeated US intelligence-community public statements.
sources:
  - doj/2019_anthem-fujie-wang
