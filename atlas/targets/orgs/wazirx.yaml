id: orgs/wazirx
name: WazirX
nation_state_id: in
sector_id: finance/crypto-exchange
tech_focus: [centralized-exchange, multisig-custody]
criticality: commercial
summary: |
  India-based centralized cryptocurrency exchange, formerly
  majority-owned by Binance. Drained of approximately
  USD 235M in July 2024 via compromise of a Liminal-managed
  multisig wallet — multiple Elliptic / TRM blockchain
  attributions to the DPRK Lazarus Group. Largest single
  Indian crypto-exchange theft to date and one of the
  defining 2024 Lazarus operations.
