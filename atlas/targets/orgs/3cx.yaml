summary: |
  Cyprus-headquartered VoIP / softphone vendor whose Electron desktop
  client was trojanized in March 2023 in a cascading supply-chain
  compromise attributed by Mandiant to DPRK UNC4736 (Lazarus
  sub-cluster). 3CX's own compromise traced back to an earlier
  trojanized installation of Trading Technologies' X_TRADER software
  on a 3CX engineer's machine — the first publicly documented
  software-supply-chain-of-supply-chain compromise.
sources:
