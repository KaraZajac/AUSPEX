summary: |
  Global cloud and productivity platform vendor whose Azure / M365 /
  Exchange Online / Entra ID estate is the backplane for US federal
  and most Western enterprise IT. As such, a recurring strategic
  target: SVR Midnight Blizzard intrusion into the Microsoft corporate
  tenant (late 2023), Storm-0558 / PRC theft of an MSA signing key
  enabling forged tokens into Exchange Online (2023, including the
  US State Department and Commerce Secretary), and the 2022 LAPSUS$
  source-code theft. The CSRB's March 2024 report on Storm-0558
  faulted Microsoft's security culture and was the defining public
  critique of a hyperscaler's identity hygiene.
