summary: |
  US networking-equipment vendor. In August 2025 Cisco
  disclosed that attackers accessed a Cisco-owned third-party
  cloud-based CRM containing limited customer-contact data via
  the UNC6040 / ShinyHunters voice-phishing / Salesforce-OAuth
  campaign. Separately Cisco is a high-frequency target of
  state-sponsored network-device exploitation (Salt Typhoon,
  Static Tundra).
