tech_focus: [nuclear-research, reactor-design, fuel-cycle]
criticality: national-cii
summary: |
  ROK national nuclear-research institute, headquartered in
  Daejeon. Conducts research on advanced reactor design,
  fuel cycle, radiation applications, and reactor safety.

  AUSPEX cites KAERI as the target of the June 2021 cyber
  intrusion publicly disclosed by KAERI's parliamentary
  oversight committee. ROK government and vendor reporting
  attributed the intrusion to the DPRK-aligned Kimsuky
  cluster via a VPN vulnerability; the disclosure made
  KAERI one of the canonical recent cases of DPRK
  defense-IP targeting at ROK research institutions.
sources:
