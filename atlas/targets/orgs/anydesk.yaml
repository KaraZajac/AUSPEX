summary: |
  Stuttgart-based remote-desktop software vendor (~170,000 customers
  globally including Comcast, Samsung, Siemens, MIT, and major
  professional-services firms). In February 2024 AnyDesk disclosed
  a production-systems intrusion that forced rotation of code-
  signing certificates and mandatory password resets across its
  user base. Stolen credentials subsequently appeared on cybercrime
  forums under the seller handle "Jobaaaaa." No specific operator
  was publicly attributed; AnyDesk is widely abused by ransomware
  affiliates as a living-off-the-land remote-management tool.
