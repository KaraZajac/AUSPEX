id: orgs/ronin-bridge
name: Ronin Bridge (Sky Mavis / Axie Infinity)
nation_state_id: vn
sector_id: finance/defi-bridge
tech_focus: [DeFi, sidechain-bridge, validator-keys]
criticality: commercial
summary: |
  Ethereum sidechain bridge operated by Sky Mavis for the Axie
  Infinity blockchain game. In March 2022 attackers obtained five of
  nine validator keys via spear-phishing of Sky Mavis engineers
  (forged job offer) and drained ~USD 625M in ETH and USDC — at the
  time the largest DeFi theft on record. US Treasury OFAC attributed
  the theft to DPRK Lazarus on 2022-04-14, the first formal US
  attribution of a major crypto-bridge theft to the DPRK and the
  template for subsequent Harmony / Atomic Wallet / DMM / Bybit
  attributions.
sources:
