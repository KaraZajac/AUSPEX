summary: |
  US enterprise SaaS vendor providing human-capital management
  and finance software to ~10,000 large-enterprise customers.
  In August 2025 Workday disclosed that attackers accessed a
  Workday-owned Salesforce instance containing third-party
  business-contact data — the intrusion was attributed to the
  UNC6040 / ShinyHunters voice-phishing campaign. The Workday
  case is notable in the campaign because Workday is itself a
  major SaaS-platform vendor with privileged customer-data
  access.
