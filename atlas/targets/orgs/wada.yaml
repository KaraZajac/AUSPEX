summary: |
  International independent agency for anti-doping in sport,
  headquartered in Montreal. Hacked in August 2016 by GRU Unit 26165
  (Fancy Bear / "Fancybears.com" leak persona) in retaliation for
  WADA's recommendation that Russia be banned from the Rio Olympics
  following the McLaren Report on Russian state-sponsored doping.
  Stolen athlete medical / therapeutic-use-exemption records were
  selectively leaked to frame Western athletes. Forms a central count
  in the 2018 DOJ Morenets indictment of seven GRU officers (jointly
  with the OPCW Spiez Lab close-access operation).
